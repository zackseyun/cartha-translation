id: LUK.24.17
reference: Luke 24:17
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτούς· Τίνες οἱ λόγοι οὗτοι οὓς ἀντιβάλλετε πρὸς ἀλλήλους περιπατοῦντες;
    καὶ ⸀ἐστάθησαν σκυθρωποί.
translation:
  text: And he said to them, “What are these words that you are exchanging with one
    another as you walk?” And they stood still, looking sad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What are these matters that you are discussing with one another as you
      walk?”
    reason: lexical_alternative
  - marker: b
    text: Or “they stopped, looking downcast.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he asked
  - he spoke
  lexicon: BDAG
  rationale: λέγω is the standard verb for speaking/saying. Although the content is
    a question, 'said' preserves the Greek verb without over-interpreting it as 'asked.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural English and preserves the flow without implying strong contrast.
- source_word: Τίνες οἱ λόγοι οὗτοι
  chosen: What are these words
  alternatives:
  - What are these matters
  - What is this conversation
  lexicon: BDAG
  rationale: λόγοι literally means 'words,' and the demonstrative οὗτοι points to
    the conversation just overheard. 'Words' is more formally transparent, while still
    intelligible in English.
- source_word: ἀντιβάλλετε
  chosen: you are exchanging
  alternatives:
  - you are discussing
  - you are debating
  - you are throwing back and forth
  lexicon: BDAG
  rationale: ἀντιβάλλω here conveys reciprocal verbal exchange, likely discussion
    back and forth. 'Exchanging' preserves that reciprocal sense better than the flatter
    'discussing,' while avoiding an overly literal idiom like 'throwing back and forth.'
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - to one another
  - among yourselves
  lexicon: BDAG
  rationale: The phrase marks reciprocal interaction. 'With one another' is idiomatic
    in English with a verb of verbal exchange.
- source_word: περιπατοῦντες
  chosen: as you walk
  alternatives:
  - while walking
  - walking along
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main action. 'As you walk'
    is natural modern English and preserves the temporal overlap.
- source_word: ἐστάθησαν
  chosen: they stood still
  alternatives:
  - they stopped
  - they stood
  lexicon: BDAG
  rationale: The aorist passive/intransitive form of ἵστημι here means they came to
    a stop. 'Stood still' captures both the physical halt and the narrative force
    better than simply 'stood.'
- source_word: σκυθρωποί
  chosen: looking sad
  alternatives:
  - sad
  - downcast
  - gloomy
  lexicon: BDAG
  rationale: σκυθρωπός denotes a gloomy or sad facial expression. 'Looking sad' brings
    out the visible, countenance-related nuance in idiomatic English; 'downcast' is
    possible but slightly more interpretive or literary.
