id: LUK.24.37
reference: Luke 24:37
source:
  edition: SBLGNT
  text: πτοηθέντες δὲ καὶ ἔμφοβοι γενόμενοι ἐδόκουν πνεῦμα θεωρεῖν.
translation:
  text: But they were startled and became afraid, and thought they were seeing a spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a ghost.' The Greek word is πνεῦμα, more literally 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πτοηθέντες
  chosen: startled
  alternatives:
  - terrified
  - alarmed
  lexicon: BDAG
  rationale: Aorist passive participle from πτοέομαι denotes being suddenly disturbed
    or startled. 'Startled' captures the immediate shock without overstating beyond
    the following explicit fear term.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks a mild contrast or development from the preceding appearance
    of Jesus; 'But' fits natural English discourse and preserves the turn in reaction.
- source_word: ἔμφοβοι γενόμενοι
  chosen: became afraid
  alternatives:
  - were frightened
  - became fearful
  lexicon: BDAG
  rationale: The adjective ἔμφοβοι with γενόμενοι expresses entering a state of fear.
    'Became afraid' reflects the ingressive sense more clearly than a simple stative
    rendering.
- source_word: ἐδόκουν
  chosen: thought
  alternatives:
  - supposed
  - imagined
  lexicon: BDAG
  rationale: Imperfect of δοκέω indicates their ongoing assumption or impression.
    'Thought' is idiomatic and sufficiently broad; the progressive nuance is carried
    by the clause as a whole.
- source_word: πνεῦμα
  chosen: a spirit
  alternatives:
  - a ghost
  lexicon: BDAG
  rationale: In this context πνεῦμα refers to a disembodied spirit. 'A spirit' is
    the more direct lexical equivalent and avoids the culturally loaded connotations
    of 'ghost,' while still fitting the resurrection-appearance context.
- source_word: θεωρεῖν
  chosen: were seeing
  alternatives:
  - saw
  - were looking at
  lexicon: BDAG
  rationale: 'Present infinitive after ἐδόκουν is well represented by an English progressive
    infinitive idea: ''were seeing.'' This preserves the sense of perceived ongoing
    sight better than the simple ''saw''.'
