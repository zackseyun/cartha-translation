theological_decisions:
- issue: Rendering πνεῦμα in a resurrection appearance context
  chosen_reading: a spirit
  alternative_readings:
  - a ghost
  rationale: The verse describes the disciples' mistaken interpretation of the risen
    Jesus as a non-corporeal being. 'Spirit' is lexically closer to πνεῦμα and avoids
    importing later folk notions associated with 'ghost.' This preserves the narrative's
    theological point that Jesus is not merely an apparition.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
