id: LUK.24.18
reference: Luke 24:18
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ⸂εἷς ὀνόματι⸃ Κλεοπᾶς εἶπεν πρὸς αὐτόν· Σὺ μόνος παροικεῖς Ἰερουσαλὴμ
    καὶ οὐκ ἔγνως τὰ γενόμενα ἐν αὐτῇ ἐν ταῖς ἡμέραις ταύταις;
translation:
  text: Then one of them, named Cleopas, answered and said to him, “Are you the only
    visitor to Jerusalem who does not know the things that have happened there in
    these days?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the only one staying in Jerusalem as a stranger.” The Greek verb carries
      the sense of residing as an outsider or temporary resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly introduces direct speech with
    the sense 'answered.' English idiom does not require a participial form here,
    so it is folded into the main clause naturally.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Then' fits the narrative progression in readable
    English without overstating contrast.
- source_word: εἷς ὀνόματι Κλεοπᾶς
  chosen: one of them, named Cleopas
  alternatives:
  - one, by name Cleopas
  - one named Cleopas
  lexicon: BDAG
  rationale: ὀνόματι with a personal name means 'named/by name.' 'One of them' is
    supplied from context because εἷς refers to one of the two disciples; this makes
    the English clear without altering the sense.
- source_word: εἶπεν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - said to Jesus
  - spoke to him
  lexicon: BDAG
  rationale: Standard rendering of λέγω + πρός with personal object. 'Him' preserves
    the Greek wording without importing the explicit name.
- source_word: Σὺ μόνος
  chosen: you the only
  alternatives:
  - you alone
  - are you alone
  lexicon: BDAG
  rationale: μόνος emphasizes exclusivity. In idiomatic English within a question,
    'Are you the only...' best captures the force.
- source_word: παροικεῖς
  chosen: visitor to
  alternatives:
  - sojourner in
  - staying in
  - living as a stranger in
  lexicon: BDAG
  rationale: παροικέω denotes residing as a stranger/temporary resident. In this context
    Cleopas is asking whether Jesus is the only outsider in Jerusalem unaware of recent
    events. 'Visitor to' is natural modern English and preserves the outsider nuance
    better than simply 'live in.'
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard transliteration of the place name.
- source_word: οὐκ ἔγνως
  chosen: does not know
  alternatives:
  - have not known
  - did not know
  lexicon: BDAG
  rationale: 'Although ἔγνως is aorist, in this idiomatic question the sense is present-resultative:
    being unaware of what has happened. English present ''does not know'' communicates
    the intended force more naturally than a simple past.'
- source_word: τὰ γενόμενα
  chosen: the things that have happened
  alternatives:
  - what has happened
  - the events that took place
  lexicon: BDAG
  rationale: Substantival participle from γίνομαι referring to recent events. 'The
    things that have happened' is transparent and slightly more formal than 'what
    happened,' fitting the narrative tone.
- source_word: ἐν αὐτῇ
  chosen: there
  alternatives:
  - in it
  - in her
  lexicon: BDAG
  rationale: Refers back to Jerusalem. 'There' is idiomatic English for a city reference
    and avoids awkward literalism.
- source_word: ἐν ταῖς ἡμέραις ταύταις
  chosen: in these days
  alternatives:
  - during these days
  - in recent days
  lexicon: BDAG
  rationale: A temporal expression referring to the immediately preceding days. 'In
    these days' is close to the Greek and natural in English.
