id: LUK.24.41
reference: Luke 24:41
source:
  edition: SBLGNT
  text: ἔτι δὲ ἀπιστούντων αὐτῶν ἀπὸ τῆς χαρᾶς καὶ θαυμαζόντων εἶπεν αὐτοῖς· Ἔχετέ
    τι βρώσιμον ἐνθάδε;
translation:
  text: And while they still were disbelieving because of joy and were marveling,
    he said to them, “Do you have anything here to eat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “while they still did not believe for joy and were amazed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι δὲ
  chosen: And while they still
  alternatives:
  - But still
  - And still
  lexicon: BDAG
  rationale: ἔτι conveys continuance ('still'), and δέ is a mild connective best rendered
    smoothly in English as 'And' here. The participial construction that follows is
    naturally brought into English with 'while they still...'.
- source_word: ἀπιστούντων
  chosen: were disbelieving
  alternatives:
  - did not believe
  - were unbelieving
  lexicon: BDAG
  rationale: The present participle denotes ongoing state/action. 'Were disbelieving'
    preserves the durative force better than a simple past. It also reflects that
    their hesitation is temporary and situational, not settled unbelief.
- source_word: ἀπὸ τῆς χαρᾶς
  chosen: because of joy
  alternatives:
  - from joy
  - out of joy
  lexicon: BDAG
  rationale: ἀπό here expresses cause or source. 'Because of joy' is the clearest
    idiomatic English rendering and captures the paradox that their joy itself contributed
    to their difficulty believing.
- source_word: θαυμαζόντων
  chosen: were marveling
  alternatives:
  - were amazed
  - were wondering
  lexicon: BDAG
  rationale: The participle is coordinated with ἀπιστούντων and likewise carries ongoing
    aspect. 'Marveling' preserves the sense of astonished wonder more closely than
    the flatter 'amazed'.
- source_word: Ἔχετέ
  chosen: Do you have
  alternatives:
  - Have you
  lexicon: BDAG
  rationale: A present-tense question in idiomatic English is best rendered 'Do you
    have...?' rather than a more wooden 'Have you...?'.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  lexicon: BDAG
  rationale: In a question, τι often has the sense 'anything.' This is natural English
    and fits the open-ended request.
- source_word: βρώσιμον
  chosen: to eat
  alternatives:
  - anything edible
  - food
  lexicon: BDAG
  rationale: βρώσιμος means edible, fit for eating. 'To eat' is idiomatic in English
    after 'Do you have anything here...?' and avoids awkwardness while preserving
    the sense.
- source_word: ἐνθάδε
  chosen: here
  alternatives:
  - in this place
  - here with you
  lexicon: BDAG
  rationale: The adverb simply indicates location. 'Here' is the natural concise equivalent.
