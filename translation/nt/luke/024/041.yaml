theological_decisions:
- issue: Nature of the disciples' response to the risen Jesus
  chosen_reading: Their disbelief is temporary astonishment caused by overwhelming
    joy, not hardened unbelief.
  alternative_readings:
  - They still did not believe, emphasizing skepticism without the nuance of joy-caused
    astonishment.
  rationale: 'The phrase ἀπιστούντων ... ἀπὸ τῆς χαρᾶς καὶ θαυμαζόντων presents an
    emotionally complex reaction: they are not rejecting Jesus but struggling to accept
    the reality of resurrection because it seems too joyful and astonishing. The translation
    preserves this tension rather than flattening it.'
  doctrine_reference: Preserve theological tension rather than resolve it.
