id: LUK.24.7
reference: Luke 24:7
source:
  edition: SBLGNT
  text: λέγων ⸂τὸν υἱὸν τοῦ ἀνθρώπου ὅτι δεῖ⸃ παραδοθῆναι εἰς χεῖρας ἀνθρώπων ἁμαρτωλῶν
    καὶ σταυρωθῆναι καὶ τῇ τρίτῃ ἡμέρᾳ ἀναστῆναι.
translation:
  text: saying that the Son of Man must be delivered into the hands of sinful men
    and be crucified and on the third day rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "be handed over into the hands of sinful men."
    reason: lexical_alternative
  - marker: b
    text: Or "rise"; the Greek is active, not passive (contrast "be raised").
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present participle linked to the prior verse's remembrance formula; 'saying'
    preserves the participial connection better than converting to a finite verb.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the human one
  lexicon: BDAG
  rationale: Standard translation of the self-designation/title, preserving both its
    idiomatic force and its intertextual resonance with Danielic and Gospel usage.
    'The human one' is possible but less established and weakens the title's recognizability.
- source_word: ὅτι δεῖ
  chosen: that ... must
  alternatives:
  - that it is necessary for ... to
  - that ... had to
  lexicon: BDAG
  rationale: δεῖ expresses divine necessity rather than mere prediction. 'Must' is
    concise and preserves the force of necessity. Present-tense English fits the remembered
    saying as quoted.
- source_word: παραδοθῆναι
  chosen: be delivered
  alternatives:
  - be handed over
  - be betrayed
  lexicon: BDAG
  rationale: The passive infinitive means to be handed over/delivered up. 'Be delivered'
    is slightly more formal and fits the solemn sequence. 'Be betrayed' is too narrow
    here because the focus is broader than Judas's act alone.
- source_word: εἰς χεῖρας
  chosen: into the hands of
  alternatives:
  - over to
  lexicon: BDAG
  rationale: This is a common idiom for being given into someone's power. The literal
    rendering is natural in English and preserves the imagery.
- source_word: ἀνθρώπων ἁμαρτωλῶν
  chosen: sinful men
  alternatives:
  - sinful people
  - sinners
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in context refers to
    the men who arrest and execute Jesus. Per the gender-accurate policy, 'men' is
    retained rather than neutralizing to 'people.' 'Sinners' is possible but loses
    the explicit ἀνθρώπων component.
- source_word: σταυρωθῆναι
  chosen: be crucified
  alternatives:
  - be put on a cross
  lexicon: BDAG
  rationale: The passive infinitive directly denotes crucifixion. 'Be crucified' is
    the standard, precise rendering.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after
  lexicon: BDAG
  rationale: Dative of time rendered naturally in English as 'on the third day.' No
    expansion is needed.
- source_word: ἀναστῆναι
  chosen: rise again
  alternatives:
  - be raised
  - rise
  lexicon: BDAG
  rationale: The active infinitive naturally means 'rise.' 'Rise again' is idiomatic
    in English resurrection contexts and reflects the return to life. 'Be raised'
    would shift to a passive nuance not present in this form, though theologically
    compatible elsewhere.
