theological_decisions:
- issue: Force of δεῖ in Jesus's passion prediction
  chosen_reading: must, expressing divine necessity
  alternative_readings:
  - would, as simple future prediction
  - had to, as purely past necessity
  rationale: In Luke, δεῖ regularly signals the necessity of fulfillment within God's
    redemptive plan, not mere inevitability. 'Must' preserves that theological weight
    without overexplaining it.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Rendering ἀνθρώπων ἁμαρτωλῶν with gender-accurate language
  chosen_reading: sinful men
  alternative_readings:
  - sinful people
  - sinners
  rationale: The phrase is masculine plural and contextually refers to the male agents
    involved in Jesus's arrest and crucifixion. This follows the stated gender-accurate
    policy rather than adopting an unnecessarily neutral rendering.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
