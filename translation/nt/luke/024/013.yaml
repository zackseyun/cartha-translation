id: LUK.24.13
reference: Luke 24:13
source:
  edition: SBLGNT
  text: Καὶ ἰδοὺ δύο ἐξ αὐτῶν ⸂ἐν αὐτῇ τῇ ἡμέρᾳ ἦσαν πορευόμενοι⸃ εἰς κώμην ἀπέχουσαν
    σταδίους ἑξήκοντα ἀπὸ Ἰερουσαλήμ, ᾗ ὄνομα Ἐμμαοῦς,
translation:
  text: And behold, two of them were going that very day to a village sixty stadia
    from Jerusalem, whose name was Emmaus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; sixty stadia is about 7 miles
      or 11 kilometers.
    reason: cultural_note
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - Now behold
  - And look
  lexicon: BDAG
  rationale: Retains Luke's narrative marker and sense of drawing attention. 'Behold'
    is slightly formal but still transparent and preserves the discourse force better
    than omitting it.
- source_word: δύο ἐξ αὐτῶν
  chosen: two of them
  alternatives:
  - two from among them
  lexicon: BDAG
  rationale: Natural English rendering of the partitive expression, referring back
    to the larger group of disciples/followers without over-specifying.
- source_word: ἐν αὐτῇ τῇ ἡμέρᾳ
  chosen: that very day
  alternatives:
  - on that same day
  - that day
  lexicon: BDAG
  rationale: The demonstrative plus article gives emphasis; 'that very day' captures
    the immediacy more clearly than the flatter 'that day.'
- source_word: ἦσαν πορευόμενοι
  chosen: were going
  alternatives:
  - were traveling
  - were on their way
  lexicon: BDAG
  rationale: The imperfect periphrastic construction conveys ongoing movement in past
    time. 'Were going' is simple and accurate; 'traveling' is possible but less direct.
- source_word: εἰς κώμην
  chosen: to a village
  alternatives:
  - into a village
  lexicon: BDAG
  rationale: κώμη denotes a village rather than a city or town in a more general sense.
    'To' fits the motion verb naturally in English.
- source_word: ἀπέχουσαν σταδίους ἑξήκοντα ἀπὸ Ἰερουσαλήμ
  chosen: sixty stadia from Jerusalem
  alternatives:
  - about seven miles from Jerusalem
  - sixty furlongs from Jerusalem
  lexicon: BDAG
  rationale: Preserves the ancient unit in the main text for transparency to the source.
    A modern approximation is useful but better placed in a footnote rather than replacing
    the source-culture measure.
- source_word: ᾗ ὄνομα Ἐμμαοῦς
  chosen: whose name was Emmaus
  alternatives:
  - called Emmaus
  - named Emmaus
  lexicon: BDAG
  rationale: A close but natural rendering of the relative construction. 'Whose name
    was Emmaus' preserves the explicit nominal phrasing of the Greek.
