id: LUK.24.19
reference: Luke 24:19
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς· Ποῖα; οἱ δὲ εἶπαν αὐτῷ· Τὰ περὶ Ἰησοῦ τοῦ ⸀Ναζαρηνοῦ, ὃς
    ἐγένετο ἀνὴρ προφήτης δυνατὸς ἐν ἔργῳ καὶ λόγῳ ἐναντίον τοῦ θεοῦ καὶ παντὸς τοῦ
    λαοῦ,
translation:
  text: And he said to them, “What things?” And they said to him, “The things concerning
    Jesus the Nazarene, who became a man, a prophet mighty in deed and word before
    God and all the people,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus of Nazareth”; Greek “Jesus the Nazarene.”
    reason: lexical_alternative
  - marker: b
    text: Or “who was a man, a prophet”; the verb can be rendered more idiomatically
      as “was,” though Greek more literally says “became.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποῖα
  chosen: What things?
  alternatives:
  - What?
  - Which things?
  lexicon: BDAG
  rationale: Plural neuter interrogative, naturally referring to the matters just
    mentioned. 'What things?' preserves the plural sense better than the more compressed
    'What?'.
- source_word: Τὰ περὶ Ἰησοῦ
  chosen: The things concerning Jesus
  alternatives:
  - The things about Jesus
  - What happened to Jesus
  lexicon: BDAG
  rationale: The article plus περί phrase is literally 'the things concerning Jesus.'
    This is slightly formal but transparent and avoids adding event-language not explicit
    in the Greek.
- source_word: Ναζαρηνοῦ
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: As an adjectival designation/title, 'the Nazarene' best reflects the
    Greek form Ναζαρηνός. 'Of Nazareth' is interpretive; 'the Nazorean' is possible
    but less natural in modern English.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - was
  - proved to be
  - came to be
  lexicon: BDAG
  rationale: γίνομαι commonly means 'become' or 'come to be.' Here 'became' preserves
    the verbal force better than flattening it to 'was,' while still reading naturally
    in English.
- source_word: ἀνὴρ προφήτης
  chosen: a man, a prophet
  alternatives:
  - a prophet-man
  - a man who was a prophet
  - a prophetic man
  lexicon: BDAG
  rationale: Both nouns are nominative and appositional. Rendering both explicitly
    preserves the twofold description without collapsing ἀνήρ into an idiomatic filler.
    The comma reflects apposition.
- source_word: δυνατὸς
  chosen: mighty
  alternatives:
  - powerful
  - strong
  lexicon: BDAG
  rationale: '''Mighty'' is idiomatic with ''in deed and word'' and preserves the
    elevated register appropriate to the description of Jesus.'
- source_word: ἐν ἔργῳ καὶ λόγῳ
  chosen: in deed and word
  alternatives:
  - in action and speech
  - in works and words
  lexicon: BDAG
  rationale: This is a conventional biblical pairing. 'Deed and word' is both accurate
    and natural, and avoids the slightly awkward plural 'works and words' here.
- source_word: ἐναντίον τοῦ θεοῦ καὶ παντὸς τοῦ λαοῦ
  chosen: before God and all the people
  alternatives:
  - in the sight of God and all the people
  - before the face of God and all the people
  lexicon: BDAG
  rationale: ἐναντίον here denotes being in the presence/sight of. 'Before God and
    all the people' is concise, idiomatic, and preserves the public-and-divine witness
    dimension.
