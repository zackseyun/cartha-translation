theological_decisions:
- issue: Rendering ἀνὴρ in reference to Jesus
  chosen_reading: a man, a prophet
  alternative_readings:
  - a prophet
  - a man who was a prophet
  rationale: The Greek explicitly includes ἀνήρ. In line with the gender-accurate
    principle, the translation preserves 'man' rather than omitting it for smoother
    English. This does not diminish Christology; it reflects the speakers' description
    in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
