theological_decisions:
- issue: Potential eucharistic/sacramental overtones in the meal actions
  chosen_reading: Use ordinary meal language without sacramental interpretation in
    the main text
  alternative_readings:
  - Render in a way that more strongly evokes the Lord's Supper
  rationale: The sequence 'took... blessed... broke... gave' echoes earlier meal scenes
    and may invite theological reflection, but the verse itself narrates Jesus' table
    action without explicitly identifying it as a sacramental rite. The translation
    therefore preserves the wording of the action while avoiding denominationally
    loaded expansion.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
