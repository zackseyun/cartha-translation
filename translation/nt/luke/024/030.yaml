id: LUK.24.30
reference: Luke 24:30
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἐν τῷ κατακλιθῆναι αὐτὸν μετ’ αὐτῶν λαβὼν τὸν ἄρτον εὐλόγησεν
    καὶ κλάσας ἐπεδίδου αὐτοῖς·
translation:
  text: And it happened that, when he reclined at the table with them, he took the
    bread, blessed it, and after breaking it, began giving it to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sat down with them.' The Greek more specifically refers to reclining
      at table, reflecting ancient dining practice.
    reason: cultural_note
  - marker: b
    text: Or 'was giving it to them.' The Greek imperfect can emphasize ongoing action;
      'began giving' reflects the action's onset in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Luke frequently uses ἐγένετο as a narrative transition formula. 'It happened'
    preserves the idiomatic force without archaic English like 'it came to pass.'
    The clause is retained rather than omitted because it is a meaningful discourse
    marker in Luke's style.
- source_word: ἐν τῷ κατακλιθῆναι αὐτὸν μετ’ αὐτῶν
  chosen: when he reclined at the table with them
  alternatives:
  - when he sat down with them
  - as he reclined with them
  lexicon: BDAG
  rationale: 'The articular infinitive with ἐν is temporal: ''when/as.'' κατακλίνω
    in meal contexts refers to reclining at table rather than merely sitting. ''Reclined
    at the table'' preserves the first-century dining setting more accurately than
    the more generic ''sat down.'''
- source_word: λαβὼν τὸν ἄρτον
  chosen: he took the bread
  alternatives:
  - taking the bread
  lexicon: BDAG
  rationale: The participle is rendered with a finite verb in smooth English while
    preserving sequence. The article on ἄρτον is naturally represented as 'the bread,'
    referring to the bread before them at the meal.
- source_word: εὐλόγησεν
  chosen: blessed it
  alternatives:
  - gave thanks over it
  - said a blessing
  lexicon: BDAG
  rationale: εὐλογέω here most naturally refers to pronouncing a blessing over the
    bread in a meal setting. 'Blessed it' is concise and traditional without importing
    eucharistic theology beyond the text. 'Gave thanks' would lean toward εὐχαριστέω,
    which is not the verb used here.
- source_word: κλάσας
  chosen: after breaking it
  alternatives:
  - and broke it
  - having broken it
  lexicon: BDAG
  rationale: The aorist participle denotes action prior to the main verb ἐπεδίδου.
    'After breaking it' makes the sequence explicit in natural English.
- source_word: ἐπεδίδου
  chosen: began giving it to them
  alternatives:
  - was giving it to them
  - gave it to them
  - kept giving it to them
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or inceptive action. 'Began giving'
    captures the narrative moment as the distribution starts, which fits the recognition
    scene. 'Was giving' is also possible, but 'began giving' better reflects the event's
    onset in context.
