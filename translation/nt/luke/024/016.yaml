id: LUK.24.16
reference: Luke 24:16
source:
  edition: SBLGNT
  text: οἱ δὲ ὀφθαλμοὶ αὐτῶν ἐκρατοῦντο τοῦ μὴ ἐπιγνῶναι αὐτόν.
translation:
  text: But their eyes were kept from recognizing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were restrained from recognizing him' or 'were prevented from recognizing
      him.' The Greek leaves the agent unstated.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ is a mild connective marking development or contrast. 'But' fits the
    narrative turn here, highlighting the contrast between Jesus' presence and the
    disciples' inability to recognize him.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: A natural English rendering of the nominative subject with possessive
    genitive. Retaining 'eyes' preserves the concrete bodily imagery of the Greek
    rather than abstracting to 'they' or 'their perception.'
- source_word: ἐκρατοῦντο
  chosen: were kept
  alternatives:
  - were restrained
  - were held back
  - were prevented
  lexicon: BDAG
  rationale: κρατέω in the passive here conveys being held or restrained by an external
    force/result. 'Were kept' is idiomatic English and preserves the passive sense
    without over-specifying the agent, which the Greek leaves unstated.
- source_word: τοῦ μὴ ἐπιγνῶναι
  chosen: from recognizing
  alternatives:
  - so as not to recognize
  - from knowing
  - from fully recognizing
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses result/purpose in a way naturally
    rendered in English as 'from recognizing.' ἐπιγινώσκω here means to recognize
    or identify, not merely to know in a general sense. 'Recognizing' best fits the
    Emmaus context.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative object referring to Jesus in context.
