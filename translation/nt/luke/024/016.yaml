theological_decisions:
- issue: Whether to specify who prevented recognition
  chosen_reading: 'Leave the passive unstated: ''their eyes were kept from recognizing
    him.'''
  alternative_readings:
  - Imply divine agency explicitly, e.g., 'God kept their eyes from recognizing him'
  - Use an impersonal reading, e.g., 'they were unable to recognize him'
  rationale: The Greek uses a passive verb without naming the agent. To preserve theological
    tension and avoid importing a claim beyond the text, the translation keeps the
    passive. This allows readers to see that some force or circumstance prevented
    recognition without the translation resolving whether the agent is directly God,
    providential circumstance, or another implied cause.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
