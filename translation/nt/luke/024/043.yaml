theological_decisions:
- issue: Whether to make explicit the implied object of the participle and main verb
  chosen_reading: Supplied 'it' in English for both verbs
  alternative_readings:
  - And taking, he ate before them.
  - And he took it and ate before them.
  rationale: 'The Greek omits the direct object because it is recoverable from the
    previous verse. English style strongly favors making the object explicit. This
    does not add new content but clarifies the narrative action: the risen Jesus physically
    eats the food before the disciples, underscoring the bodily reality of the resurrection
    without overexplaining it.'
  doctrine_reference: 'Affirmations: Chalcedonian orthodoxy; Translation philosophy
    §1 and §6'
