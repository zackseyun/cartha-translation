theological_decisions:
- issue: Scope of Jesus's scriptural exposition
  chosen_reading: the verse states that Jesus interpreted across the Scriptures the
    matters concerning himself, without specifying a single hermeneutical category
  alternative_readings:
  - only direct messianic predictions
  - all Old Testament passages in an exhaustive sense
  rationale: The wording supports a broad christological reading of Scripture but
    does not require narrowing the reference to explicit predictions alone, nor does
    it demand that every individual passage directly refer to him. The translation
    therefore preserves the breadth of the statement without importing a more detailed
    hermeneutical claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
