id: LUK.24.27
reference: Luke 24:27
source:
  edition: SBLGNT
  text: καὶ ἀρξάμενος ἀπὸ Μωϋσέως καὶ ἀπὸ πάντων τῶν προφητῶν ⸀διερμήνευσεν αὐτοῖς
    ἐν πάσαις ταῖς γραφαῖς τὰ περὶ ⸀ἑαυτοῦ.
translation:
  text: And beginning with Moses and all the Prophets, he interpreted to them in all
    the Scriptures the things concerning himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'explained' or 'expounded.' The Greek verb can denote detailed interpretation.
    reason: lexical_alternative
  - marker: b
    text: '''Moses and all the Prophets'' refers to the scriptural writings associated
      with Moses and the prophetic books.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - having begun
  - starting
  lexicon: BDAG
  rationale: Aorist middle participle introducing the main action. 'Beginning' is
    natural modern English and preserves the participial linkage without over-literal
    stiffness.
- source_word: ἀπὸ Μωϋσέως
  chosen: with Moses
  alternatives:
  - from Moses
  lexicon: BDAG
  rationale: Although ἀπό commonly means 'from,' in this discourse-setting idiom it
    marks the starting point in the scriptural exposition. 'Beginning with Moses'
    is idiomatic English and clearly refers to the books associated with Moses, not
    merely the person.
- source_word: πάντων τῶν προφητῶν
  chosen: all the Prophets
  alternatives:
  - all the prophets
  lexicon: BDAG
  rationale: Rendered with capitalization to reflect the recognized scriptural division
    'the Prophets' alongside 'Moses' and 'the Scriptures,' signaling the canonical
    sense rather than merely prophetic individuals in general.
- source_word: διερμήνευσεν
  chosen: interpreted
  alternatives:
  - explained
  - expounded
  lexicon: BDAG
  rationale: The verb denotes explaining or interpreting thoroughly. 'Interpreted'
    preserves the exegetical sense and fits the context of opening the meaning of
    Scripture.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Simple dative indirect object; no special nuance requires expansion.
- source_word: ἐν πάσαις ταῖς γραφαῖς
  chosen: in all the Scriptures
  alternatives:
  - throughout all the Scriptures
  - in all the writings
  lexicon: BDAG
  rationale: γραφή in Luke commonly refers to sacred Scripture. 'In all the Scriptures'
    preserves both the locative sense and the canonical breadth indicated by πάσαις.
- source_word: τὰ περὶ ἑαυτοῦ
  chosen: the things concerning himself
  alternatives:
  - the things about himself
  - what concerned himself
  lexicon: BDAG
  rationale: This neuter plural construction refers broadly to matters, passages,
    or themes relating to Jesus. 'The things concerning himself' is clear, sufficiently
    formal, and avoids over-specifying whether these were predictions, types, or themes.
