id: LUK.24.26
reference: Luke 24:26
source:
  edition: SBLGNT
  text: οὐχὶ ταῦτα ἔδει παθεῖν τὸν χριστὸν καὶ εἰσελθεῖν εἰς τὴν δόξαν αὐτοῦ;
translation:
  text: Was it not necessary for the Messiah to suffer these things and to enter into
    his glory?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its meaning in the scriptural-fulfillment context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐχὶ
  chosen: Was it not
  alternatives:
  - Was it not indeed
  - Was it not the case that
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. English idiom
    is best captured by 'Was it not' rather than a more wooden 'Not...?'.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  lexicon: BDAG
  rationale: The neuter plural demonstrative points to the sufferings just discussed.
    'These things' is natural English and preserves the demonstrative force.
- source_word: ἔδει
  chosen: was ... necessary
  alternatives:
  - had to
  - it was fitting
  - it was required
  lexicon: BDAG
  rationale: The imperfect of δεῖ expresses divine necessity in context, not mere
    external compulsion. 'Was necessary' preserves that sense without over-paraphrasing.
- source_word: παθεῖν
  chosen: to suffer
  alternatives:
  - to undergo suffering
  lexicon: BDAG
  rationale: Aorist infinitive of πάσχω is straightforwardly rendered 'to suffer.'
    This is concise and idiomatic.
- source_word: τὸν χριστὸν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title should be translated 'Messiah' rather
    than transliterated 'Christ,' especially in a context emphasizing scriptural fulfillment.
- source_word: καὶ
  chosen: and
  alternatives:
  - and then
  lexicon: BDAG
  rationale: Simple coordination joins the two infinitives. Adding 'then' would make
    the sequence more explicit than the Greek requires.
- source_word: εἰσελθεῖν εἰς τὴν δόξαν αὐτοῦ
  chosen: to enter into his glory
  alternatives:
  - to enter his glory
  - to enter into glory
  lexicon: BDAG
  rationale: The phrase expresses entrance into the state/sphere of glorification.
    'Enter into his glory' preserves both the preposition and the possessive pronoun,
    which likely points to the glory belonging to him.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and theologically appropriate rendering for
    δόξα here, especially in a resurrection/exaltation context.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - the glory appointed for him
  lexicon: BDAG
  rationale: The genitive pronoun is best rendered directly as 'his.' Expanding it
    interpretively would go beyond the text.
