theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not merely a name-like designation. Following
    the stated doctrine, the title is translated to preserve its messianic meaning
    and scriptural context.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of ἔδει
  chosen_reading: divine/Scriptural necessity expressed as 'was necessary'
  alternative_readings:
  - mere inevitability
  - simple obligation
  rationale: In Luke's resurrection discourse, the necessity is tied to God's redemptive
    plan and scriptural fulfillment. 'Was necessary' preserves this theological weight
    without adding explanatory wording to the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
