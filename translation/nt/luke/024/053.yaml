theological_decisions:
- issue: Rendering worship language toward God in εὐλογοῦντες τὸν θεόν
  chosen_reading: blessing God
  alternative_readings:
  - praising God
  rationale: The Greek verb is εὐλογέω, not αἰνέω. 'Blessing God' preserves the lexical
    form and avoids flattening the expression into a more generic worship term, while
    the alternative remains viable in English idiom.
