id: LUK.24.53
reference: Luke 24:53
source:
  edition: SBLGNT
  text: καὶ ἦσαν διὰ παντὸς ἐν τῷ ἱερῷ ⸀εὐλογοῦντες τὸν ⸀θεόν.
translation:
  text: And they were continually in the temple, blessing God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "praising God." The Greek verb is "blessing."
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - at all times
  - constantly
  lexicon: BDAG
  rationale: The idiom διὰ παντός means continuously or continually. 'Continually'
    is natural modern English and preserves the sense of ongoing regularity better
    than a wooden 'through all'.
- source_word: ἱερῷ
  chosen: temple
  alternatives:
  - temple courts
  - sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary specifically.
    'Temple' is the standard concise rendering; more expansive options are possible
    but not required by the context.
- source_word: εὐλογοῦντες
  chosen: blessing
  alternatives:
  - praising
  lexicon: BDAG
  rationale: εὐλογέω commonly means 'bless' or 'speak well of.' With God as object,
    English can use either 'bless' or 'praise.' 'Blessing God' stays closer to the
    Greek while remaining idiomatic.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of εὐλογοῦντες; the straightforward rendering is 'God'.
- source_word: ἦσαν
  chosen: they were
  alternatives:
  - they kept being
  lexicon: BDAG
  rationale: Imperfect of εἰμί indicates ongoing past state. English captures this
    naturally with 'they were,' with the durative force reinforced by 'continually'.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: Simple connective linking this concluding verse to the preceding narrative.
    'And' preserves the narrative flow without adding interpretive nuance.
