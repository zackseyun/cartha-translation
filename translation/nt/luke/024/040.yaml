id: LUK.24.40
reference: Luke 24:40
source:
  edition: SBLGNT
  text: ⸂[καὶ τοῦτο εἰπὼν ⸀ἔδειξεν αὐτοῖς τὰς χεῖρας καὶ τοὺς πόδας.]⸃
translation:
  text: And after saying this, he showed them his hands and his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit this sentence.
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; rendered simply as "And" to preserve the narrative
    flow without adding temporal force beyond the Greek.
- source_word: τοῦτο εἰπὼν
  chosen: after saying this
  alternatives:
  - having said this
  - when he had said this
  lexicon: BDAG
  rationale: The aorist participle with the demonstrative is naturally rendered as
    a prior action relative to the main verb. "After saying this" is clear modern
    English and preserves the sequence.
- source_word: ἔδειξεν
  chosen: he showed
  alternatives:
  - he displayed
  - he pointed out
  lexicon: BDAG
  rationale: δείκνυμι here means to show or display visibly. "He showed" is the most
    natural and direct rendering in context.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The indirect object is naturally expressed in English as "them" after
    "showed." This preserves the sense without unnecessary stiffness.
- source_word: τὰς χεῖρας
  chosen: his hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: Although the Greek has the article, English idiom in this context normally
    uses the possessive. The possessive is contextually implied because these are
    Jesus's own hands.
- source_word: τοὺς πόδας
  chosen: his feet
  alternatives:
  - the feet
  lexicon: BDAG
  rationale: As with "his hands," English idiom prefers the possessive here. "Feet"
    is the straightforward lexical equivalent of πόδες in this bodily context.
