id: LUK.24.34
reference: Luke 24:34
source:
  edition: SBLGNT
  text: λέγοντας ὅτι ⸂ὄντως ἠγέρθη ὁ κύριος⸃ καὶ ὤφθη Σίμωνι.
translation:
  text: saying, “The Lord has truly been raised, and he has appeared to Simon!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “The Lord really has risen” or “The Lord indeed was raised.” The Greek
      adverb and verb can be rendered in several close ways; the main text preserves
      the passive voice of the Greek.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντας
  chosen: saying
  alternatives:
  - they were saying
  - who said
  lexicon: BDAG
  rationale: Present participle of λέγω, accusative masculine plural, dependent on
    the larger sentence context ('they found...'). 'Saying' preserves the participial
    linkage naturally in English without over-specifying the subject inside this verse.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct content speech. English punctuation with quotation
    marks communicates the content more idiomatically than a wooden 'that' after 'saying,'
    while preserving the same sense.
- source_word: ὄντως
  chosen: truly
  alternatives:
  - really
  - indeed
  - certainly
  lexicon: BDAG
  rationale: Adverb emphasizing the factual reality of the resurrection report. 'Truly'
    is concise, natural, and carries the solemn affirming force of the Greek.
- source_word: ἠγέρθη
  chosen: has been raised
  alternatives:
  - is risen
  - was raised
  - rose
  lexicon: BDAG
  rationale: Aorist passive of ἐγείρω. 'Has been raised' preserves the passive voice,
    which is theologically and stylistically significant in resurrection language,
    while using idiomatic modern English. 'Rose' would obscure the passive; 'is risen'
    is archaic.
- source_word: ὁ κύριος
  chosen: The Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' Here it functions as a christological title for Jesus and should be
    translated, not transliterated or weakened.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the resurrection affirmation
    with the appearance to Simon.
- source_word: ὤφθη
  chosen: he has appeared
  alternatives:
  - he appeared
  - he was seen
  lexicon: BDAG
  rationale: Aorist passive form of ὁράω used idiomatically for resurrection appearances.
    'Has appeared' is natural English and foregrounds the manifestation to Simon.
    'Was seen' is more wooden and less idiomatic here.
- source_word: Σίμωνι
  chosen: Simon
  alternatives:
  - Simon Peter
  lexicon: BDAG
  rationale: Dative of the personal name Σίμων, transliterated per project policy.
    The Greek says 'Simon,' not explicitly 'Simon Peter,' so the shorter form is retained.
