theological_decisions:
- issue: Resurrection verb voice
  chosen_reading: has been raised
  alternative_readings:
  - rose
  - was raised
  rationale: The Greek uses a passive form (ἠγέρθη). Preserving the passive avoids
    importing a different nuance and aligns with common NT resurrection idiom, while
    still reading naturally in English.
  doctrine_reference: 'Translation philosophy: preserve source-text sense; do not
    paraphrase beyond what the source warrants.'
- issue: Rendering of κύριος
  chosen_reading: The Lord
  alternative_readings:
  - the Master
  rationale: The doctrinal guidelines specify 'Lord' as the default rendering for
    κύριος. In this resurrection context it clearly functions as a title for Jesus
    and should retain its christological weight.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
