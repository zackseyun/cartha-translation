id: LUK.24.8
reference: Luke 24:8
source:
  edition: SBLGNT
  text: καὶ ἐμνήσθησαν τῶν ῥημάτων αὐτοῦ,
translation:
  text: And they remembered his words,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sayings' or 'the things he said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard coordinating conjunction. 'And' preserves the simple narrative
    linkage without adding temporal nuance beyond the Greek.
- source_word: ἐμνήσθησαν
  chosen: remembered
  alternatives:
  - recalled
  - were reminded of
  lexicon: BDAG
  rationale: Aorist middle/passive deponent from μιμνῄσκομαι, here best rendered actively
    as 'remembered.' 'Recalled' is possible, but 'remembered' is more natural and
    direct in English while preserving the sense.
- source_word: τῶν ῥημάτων
  chosen: words
  alternatives:
  - sayings
  - things he said
  lexicon: BDAG
  rationale: ῥῆμα commonly refers to spoken words or sayings. 'Words' is the most
    straightforward rendering here; 'sayings' is possible but slightly more stylized.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - his own
  lexicon: BDAG
  rationale: Genitive pronoun modifying 'words.' The referent in context is Jesus,
    but the Greek simply says 'his,' so the translation preserves that form.
