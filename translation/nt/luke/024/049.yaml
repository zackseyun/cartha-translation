theological_decisions:
- issue: Identification of 'the promise of my Father'
  chosen_reading: Rendered literally as 'the promise of my Father' without specifying
    'the Holy Spirit' in the main text.
  alternative_readings:
  - the promised Holy Spirit
  - my Father's promise
  rationale: The broader Lukan context strongly points to the Holy Spirit, but this
    verse itself uses the more general expression. To avoid importing an interpretive
    expansion into the main text, the translation keeps the literal wording while
    allowing contextual clarification in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
- issue: Location reference 'the city'
  chosen_reading: Kept as 'the city' rather than 'Jerusalem.'
  alternative_readings:
  - Jerusalem
  rationale: Although the referent is clear from context, the Greek text here does
    not explicitly name Jerusalem. Preserving 'the city' maintains textual transparency
    and avoids unnecessary expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
