id: LUK.24.49
reference: Luke 24:49
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἐγὼ ⸀ἐξαποστέλλω τὴν ἐπαγγελίαν τοῦ πατρός μου ἐφ’ ὑμᾶς· ὑμεῖς δὲ
    καθίσατε ἐν τῇ ⸀πόλει ἕως οὗ ἐνδύσησθε ⸂ἐξ ὕψους δύναμιν⸃.
translation:
  text: And look, I am sending the promise of my Father upon you. But stay in the
    city until you are clothed with power from on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the promise associated with the Holy Spirit in the surrounding
      context; the Greek here reads more literally, 'the promise of my Father.'
    reason: cross_reference
  - marker: b
    text: '''The city'' refers to Jerusalem, though the Greek text does not name it
      explicitly in this verse.'
    reason: cross_reference
  - marker: c
    text: Or 'from above.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered as the natural modern attention-getter 'look' rather than archaic
    'behold,' preserving the deictic force without sounding dated.
- source_word: ἐξαποστέλλω
  chosen: am sending
  alternatives:
  - send out
  - send
  lexicon: BDAG
  rationale: Present tense is retained as 'am sending.' The compound verb can mean
    'send out,' but English idiom does not require 'out' here; the focus is the imminent
    dispatch of what is promised.
- source_word: ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - what was promised
  - the promised gift
  lexicon: BDAG
  rationale: Formal enough to preserve the noun and its theological resonance, while
    allowing readers to connect it with the Spirit promised by the Father in the wider
    context.
- source_word: ἐφ’ ὑμᾶς
  chosen: upon you
  alternatives:
  - to you
  - on you
  lexicon: BDAG
  rationale: '''Upon you'' best reflects ἐπί with accusative here and fits the imagery
    of something coming onto the disciples, anticipating the empowering gift.'
- source_word: καθίσατε
  chosen: stay
  alternatives:
  - sit
  - remain
  - settle yourselves
  lexicon: BDAG
  rationale: Although literally related to 'sit,' in this imperative context it idiomatically
    means to remain/stay in place. 'Stay' is the clearest modern English equivalent.
- source_word: πόλει
  chosen: the city
  alternatives:
  - the town
  lexicon: BDAG
  rationale: Definite article preserved. 'The city' reflects the Greek directly; in
    context this refers to Jerusalem, but the text itself does not name it here, so
    the translation does not import the name into the main text.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal rendering in English, preserving the sense of waiting
    up to a specified event.
- source_word: ἐνδύσησθε
  chosen: you are clothed
  alternatives:
  - you put on
  - you are dressed
  lexicon: BDAG
  rationale: 'Passive sense is important: the disciples receive this clothing rather
    than generate it themselves. ''Clothed'' preserves the metaphor and reads naturally.'
- source_word: ἐξ ὕψους
  chosen: from on high
  alternatives:
  - from above
  - from the height
  lexicon: BDAG
  rationale: Traditional but still clear idiom that captures the heavenly/source-oriented
    sense better than the flatter 'from above' in this context of divine empowerment.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - strength
  - ability
  lexicon: BDAG
  rationale: '''Power'' is the standard and contextually strongest rendering, especially
    in connection with divine empowerment for witness in Luke-Acts.'
