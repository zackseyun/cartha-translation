theological_decisions:
- issue: Temporal idiom τῇ μιᾷ τῶν σαββάτων in resurrection context
  chosen_reading: on the first day of the week
  alternative_readings:
  - on the first of the Sabbaths
  rationale: The phrase is rendered according to normal idiomatic sense rather than
    preserving a wooden form that could suggest a theological or calendrical nuance
    not required by the Greek. This avoids importing sectarian chronology claims into
    the resurrection narrative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
