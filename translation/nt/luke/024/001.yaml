id: LUK.24.1
reference: Luke 24:1
source:
  edition: SBLGNT
  text: τῇ δὲ μιᾷ τῶν σαββάτων ὄρθρου βαθέως ⸂ἐπὶ τὸ μνῆμα ἦλθον⸃ φέρουσαι ἃ ἡτοίμασαν
    ⸀ἀρώματα.
translation:
  text: But on the first day of the week, at deep dawn, they came to the tomb, bringing
    the spices they had prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'on the first of the Sabbaths,' an idiomatic expression
      meaning the first day of the week.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ μιᾷ τῶν σαββάτων
  chosen: on the first day of the week
  alternatives:
  - on the first of the Sabbaths
  - on the first day after the Sabbath
  lexicon: BDAG
  rationale: This is a standard Semitic/Koine idiom meaning the first day of the week.
    A more literal rendering with 'Sabbaths' would be obscure in English and miss
    the temporal sense.
- source_word: ὄρθρου βαθέως
  chosen: at deep dawn
  alternatives:
  - very early at dawn
  - at early dawn
  lexicon: BDAG
  rationale: The genitive phrase intensifies the time reference, indicating very early
    dawn. 'Deep dawn' preserves the vividness of the Greek while remaining intelligible
    in English.
- source_word: ἐπὶ τὸ μνῆμα
  chosen: to the tomb
  alternatives:
  - to the grave
  - to the memorial tomb
  lexicon: BDAG
  rationale: With verb of motion, ἐπί here conveys movement toward a place. 'Tomb'
    is the most natural rendering of μνῆμα in the burial context and avoids the broader
    English term 'grave'.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: BDAG
  rationale: The aorist simply reports arrival. English 'came' is idiomatic here and
    matches common narrative movement toward the referenced location.
- source_word: φέρουσαι
  chosen: bringing
  alternatives:
  - carrying
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and describes what
    they were doing as they came. 'Bringing' is smoother than 'carrying' in this context.
- source_word: ἃ ἡτοίμασαν ἀρώματα
  chosen: the spices they had prepared
  alternatives:
  - the aromatic spices they had prepared
  - what spices they had prepared
  lexicon: BDAG
  rationale: ἀρώματα refers to spices/aromatic substances used for burial preparation.
    English naturally fronts the noun as 'the spices' and renders the relative clause
    afterward.
