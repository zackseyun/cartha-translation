id: LUK.24.6
reference: Luke 24:6
source:
  edition: SBLGNT
  text: ⸂οὐκ ἔστιν ὧδε, ἀλλὰ ἠγέρθη.⸃ μνήσθητε ὡς ἐλάλησεν ὑμῖν ἔτι ὢν ἐν τῇ Γαλιλαίᾳ,
translation:
  text: He is not here, but has been raised. Remember how he spoke to you while he
    was still in Galilee,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he has risen.' The Greek verb is passive ('has been raised' / 'was
      raised'), but English translations often render it intransitively to express
      the resurrection event.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἔστιν ὧδε
  chosen: He is not here
  alternatives:
  - He is not in this place
  - He is not here present
  lexicon: BDAG
  rationale: The Greek omits the explicit subject, but the context clearly refers
    to Jesus. English requires the subject for natural clarity. ὧδε is best rendered
    'here' as a locative adverb.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: 'Simple adversative contrast fits the angelic announcement: Jesus is
    not here; instead, something else is true.'
- source_word: ἠγέρθη
  chosen: has been raised
  alternatives:
  - he was raised
  - he has risen
  lexicon: BDAG
  rationale: Aorist passive of ἐγείρω is rendered with an English passive to preserve
    the Greek voice and avoid obscuring the implied divine agency. 'Has been raised'
    is natural English and keeps the resurrection declaration without shifting to
    the intransitive 'has risen.'
- source_word: μνήσθητε
  chosen: Remember
  alternatives:
  - Recall
  - Be reminded
  lexicon: BDAG
  rationale: Aorist middle imperative calls for a direct exhortation. 'Remember' is
    idiomatic and forceful in English.
- source_word: ὡς
  chosen: how
  alternatives:
  - what
  - that which
  lexicon: BDAG
  rationale: In this context ὡς introduces the content/manner of what Jesus said to
    them; 'how he spoke to you' is idiomatic and reflects common English rendering
    of remembered speech.
- source_word: ἐλάλησεν ὑμῖν
  chosen: he spoke to you
  alternatives:
  - he told you
  - he said to you
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'say.' 'Spoke to you' preserves the verbal
    act without over-specifying content.
- source_word: ἔτι ὢν
  chosen: while he was still
  alternatives:
  - when he was still
  - while still being
  lexicon: BDAG
  rationale: ἔτι adds the sense 'still/yet,' and the participle ὢν is naturally rendered
    as a temporal clause in English.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - while in Galilee
  lexicon: BDAG
  rationale: Standard locative rendering. 'Galilee' is transliterated as a place name
    per translation philosophy.
