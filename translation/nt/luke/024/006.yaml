theological_decisions:
- issue: Rendering the resurrection verb ἠγέρθη
  chosen_reading: has been raised
  alternative_readings:
  - he was raised
  - he has risen
  rationale: The passive form is preserved to reflect the Greek wording and retain
    the theological nuance of divine action in the resurrection, while not denying
    that Jesus truly rose. This avoids importing a more interpretive active/intransitive
    form into the main text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
