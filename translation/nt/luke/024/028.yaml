theological_decisions:
- issue: Rendering of προσεποιήσατο in relation to Jesus' action
  chosen_reading: acted as though he were going farther
  alternative_readings:
  - pretended to be going farther
  - made as if to go farther
  rationale: The verse narrates Jesus giving the appearance of continuing onward.
    The chosen wording preserves the narrative tension without importing a stronger
    theological claim about deception than the Greek itself requires. This follows
    the translation philosophy of preserving the source's sense without over-resolving
    interpretive concerns.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
