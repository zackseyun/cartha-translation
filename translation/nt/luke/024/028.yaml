id: LUK.24.28
reference: Luke 24:28
source:
  edition: SBLGNT
  text: Καὶ ἤγγισαν εἰς τὴν κώμην οὗ ἐπορεύοντο, καὶ αὐτὸς ⸀προσεποιήσατο ⸀πορρώτερον
    πορεύεσθαι.
translation:
  text: And they came near to the village where they were going, and he acted as though
    he were going farther.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'pretended to be going farther' or 'made as if to go farther.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισαν
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: BDAG
  rationale: Aorist indicative of ἐγγίζω denotes nearing a place. 'Came near' is natural
    modern English and preserves the movement sense without sounding archaic like
    'drew near.'
- source_word: κώμην
  chosen: village
  alternatives:
  - town
  lexicon: BDAG
  rationale: κώμη commonly refers to a village or small settlement rather than a city.
    'Village' best matches the likely scale and standard NT usage.
- source_word: οὗ ἐπορεύοντο
  chosen: where they were going
  alternatives:
  - to which they were traveling
  - where they were traveling
  lexicon: BDAG
  rationale: The relative adverb with imperfect middle of πορεύομαι indicates the
    destination of their ongoing journey. 'Where they were going' is idiomatic and
    sufficiently precise.
- source_word: προσεποιήσατο
  chosen: acted as though
  alternatives:
  - pretended
  - made as if
  lexicon: BDAG
  rationale: προσποιέομαι can mean to pretend or to give the impression of something.
    'Acted as though' avoids an unnecessarily harsh or potentially misleading implication
    of deceit while still reflecting the narrative sense that Jesus gave the appearance
    of continuing on.
- source_word: πορρώτερον
  chosen: farther
  alternatives:
  - further on
  - more distant
  lexicon: BDAG
  rationale: Comparative adverb meaning farther/further. 'Farther' works well with
    physical travel in context.
- source_word: πορεύεσθαι
  chosen: he were going
  alternatives:
  - to go
  - to continue on
  lexicon: BDAG
  rationale: Complementary infinitive with προσεποιήσατο expresses the apparent action.
    Rendering it as 'he were going' fits the English construction 'acted as though
    he were going farther.'
