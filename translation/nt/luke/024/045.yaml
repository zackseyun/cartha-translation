theological_decisions:
- issue: Nature of Jesus' action in opening understanding
  chosen_reading: Retain the direct wording 'he opened their minds' without importing
    a doctrinal explanation of illumination.
  alternative_readings:
  - He enabled them to understand
  - He explained the Scriptures to them
  rationale: The Greek explicitly states that Jesus opened their minds for understanding
    the Scriptures. The translation preserves that theological claim while avoiding
    interpretive expansion into later doctrinal categories or reducing it to mere
    explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
