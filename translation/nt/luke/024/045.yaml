id: LUK.24.45
reference: Luke 24:45
source:
  edition: SBLGNT
  text: τότε διήνοιξεν αὐτῶν τὸν νοῦν τοῦ συνιέναι τὰς γραφάς,
translation:
  text: Then he opened their minds to understand the Scriptures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their understanding" for "their minds."
    reason: lexical_alternative
  - marker: b
    text: Or "so that they might understand the Scriptures."
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the narrative; 'Then' is the natural
    concise English equivalent.
- source_word: διήνοιξεν
  chosen: opened
  alternatives:
  - fully opened
  - enabled
  lexicon: BDAG
  rationale: Aorist active of διανοίγω, literally 'opened thoroughly/opened up.' 'Opened'
    preserves the concrete metaphor without over-paraphrasing into mere 'enabled.'
- source_word: αὐτῶν τὸν νοῦν
  chosen: their minds
  alternatives:
  - their understanding
  - their mind
  lexicon: BDAG
  rationale: νοῦς refers to the faculty of understanding/perception. The plural possessive
    with singular collective noun in Greek is best rendered idiomatically in English
    as 'their minds.' 'Understanding' is possible but would blur the concrete object
    of the verb 'opened.'
- source_word: τοῦ συνιέναι
  chosen: to understand
  alternatives:
  - so that they might understand
  - for understanding
  lexicon: BDAG
  rationale: Articular infinitive expressing purpose/result. 'To understand' is smooth
    modern English and captures the infinitival force without unnecessary expansion.
    'So that they might understand' is slightly more explicit but less concise.
- source_word: τὰς γραφάς
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: In Luke-Acts, γραφαί in this context refers to the sacred writings of
    Israel recognized as Scripture. Capitalized 'Scriptures' communicates this established
    referent in English.
