theological_decisions:
- issue: Nature of Jesus' action in blessing the disciples
  chosen_reading: Retain the simple verbal expression 'he blessed them' without expanding
    it into a liturgical or sacerdotal formula.
  alternative_readings:
  - he pronounced a blessing over them
  rationale: The verse depicts Jesus performing an act of blessing with uplifted hands.
    The translation should preserve the action without importing later ecclesial categories
    or reducing the act to mere well-wishing.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
