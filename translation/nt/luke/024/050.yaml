id: LUK.24.50
reference: Luke 24:50
source:
  edition: SBLGNT
  text: Ἐξήγαγεν δὲ αὐτοὺς ⸀ἕως ⸀πρὸς Βηθανίαν, καὶ ἐπάρας τὰς χεῖρας αὐτοῦ εὐλόγησεν
    αὐτούς.
translation:
  text: Then he led them out as far as Bethany, and lifting up his hands, he blessed
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Bethany' or 'near Bethany'; the Greek expression is somewhat fuller,
      literally 'as far as toward Bethany.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξήγαγεν
  chosen: led ... out
  alternatives:
  - brought ... out
  - took ... out
  lexicon: BDAG
  rationale: Aorist of ἐξάγω commonly means to lead or bring out. 'Led ... out' is
    natural English and preserves the directional force of ἐξ-. The subject is Jesus
    from context, so 'he led them out' is appropriate.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    conveys the transitional sense smoothly in English.
- source_word: ἕως πρὸς Βηθανίαν
  chosen: as far as Bethany
  alternatives:
  - to Bethany
  - as far as toward Bethany
  - near Bethany
  lexicon: BDAG
  rationale: The combination ἕως πρός is somewhat emphatic and indicates movement
    up to the vicinity/direction of Bethany. 'As far as Bethany' is idiomatic English
    that preserves the sense of extent without over-literal awkwardness.
- source_word: Βηθανίαν
  chosen: Bethany
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: ἐπάρας
  chosen: lifting up
  alternatives:
  - having lifted up
  - raising
  lexicon: BDAG
  rationale: Aorist participle of ἐπαίρω, antecedent in action to the main verb but
    often rendered naturally in English with a participial phrase. 'Lifting up' is
    readable and preserves the gesture accompanying the blessing.
- source_word: τὰς χεῖρας αὐτοῦ
  chosen: his hands
  alternatives:
  - the hands of him
  lexicon: BDAG
  rationale: Idiomatic rendering of the accusative object with possessive pronoun.
    The plural 'hands' is significant because it depicts the conventional posture
    of blessing.
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - spoke a blessing over
  lexicon: BDAG
  rationale: The verb εὐλογέω here refers to pronouncing blessing upon the disciples.
    'Blessed' is the standard and sufficiently clear rendering in this narrative context.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward object pronoun referring to the disciples.
