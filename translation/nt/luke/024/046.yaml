id: LUK.24.46
reference: Luke 24:46
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτοῖς ὅτι οὕτως ⸀γέγραπται παθεῖν τὸν χριστὸν καὶ ἀναστῆναι ἐκ
    νεκρῶν τῇ τρίτῃ ἡμέρᾳ,
translation:
  text: 'And he said to them, “Thus it is written: the Messiah would suffer and rise
    from the dead on the third day,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title Χριστός is rendered “Messiah” here because
      it functions as a title rather than a name-like designation.
    reason: alternative_reading
  - marker: b
    text: Or more literally, “from among the dead.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Perfect passive commonly functions as a scriptural formula indicating
    what stands written in Scripture. 'It is written' is idiomatic English and preserves
    the ongoing force of the perfect.
- source_word: παθεῖν
  chosen: would suffer
  alternatives:
  - to suffer
  - must suffer
  lexicon: BDAG
  rationale: The infinitive depends on the scriptural formula and expresses the content
    of what is written. English 'would suffer' naturally conveys the infinitival sense
    in reported speech without importing explicit necessity language not present in
    this clause. 'Must suffer' would overstate the modal force here.
- source_word: τὸν χριστόν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title.
    Here the article marks it clearly as titular rather than name-like, and 'Messiah'
    preserves the Jewish-scriptural context of Jesus' claim.
- source_word: ἀναστῆναι
  chosen: rise
  alternatives:
  - be raised
  - arise
  lexicon: BDAG
  rationale: The aorist active infinitive of ἀνίστημι here is best rendered intransitively
    as 'rise.' 'Be raised' would shift to a passive nuance not expressed in this form,
    though resurrection by God's power is the broader theological context.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic resurrection expression. 'From the dead'
    is clear modern English; 'from among the dead' is more literal but less natural.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - the third day
  lexicon: BDAG
  rationale: The dative is temporal, and 'on the third day' is the natural English
    rendering.
- source_word: οὕτως
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: BDAG
  rationale: '''Thus'' preserves the formal scriptural-introductory tone and links
    what follows to the manner/content of what stands written.'
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: After 'he said to them,' English punctuation can naturally introduce
    direct content with a colon rather than repeating 'that,' improving readability
    while preserving sense.
