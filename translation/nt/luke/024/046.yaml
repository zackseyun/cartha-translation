theological_decisions:
- issue: Rendering Χριστός in a resurrection-passion summary
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: The term is a title here, not a name-like designation. Rendering it 'Messiah'
    follows the project's default and preserves the scriptural and royal-anointed
    background of Jesus' statement.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Voice of resurrection verb ἀναστῆναι
  chosen_reading: rise from the dead
  alternative_readings:
  - be raised from the dead
  rationale: The Greek form is active infinitive, so the main text should not replace
    it with a passive. Theologically, the NT can speak both of Jesus rising and being
    raised; this verse's wording should preserve the active form actually present.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
