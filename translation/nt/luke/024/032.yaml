id: LUK.24.32
reference: Luke 24:32
source:
  edition: SBLGNT
  text: καὶ εἶπαν πρὸς ἀλλήλους· Οὐχὶ ἡ καρδία ἡμῶν καιομένη ἦν ⸂ἐν ἡμῖν⸃ ὡς ἐλάλει
    ἡμῖν ἐν τῇ ὁδῷ, ⸀ὡς διήνοιγεν ἡμῖν τὰς γραφάς;
translation:
  text: And they said to one another, “Was not our heart burning within us as he was
    speaking to us on the road, as he was opening the Scriptures to us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our hearts'; Greek has the singular 'our heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'on the way.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'opening the Scriptures,' that is, making their meaning clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ἀλλήλους
  chosen: to one another
  alternatives:
  - to each other
  lexicon: BDAG
  rationale: Idiomatic reciprocal expression; 'to one another' is natural modern English
    and preserves the mutual conversation.
- source_word: Οὐχὶ
  chosen: Was not
  alternatives:
  - Wasn't
  - Did not
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. 'Was not' preserves
    the rhetorical force and fits the verbless-English inversion with ἦν.
- source_word: ἡ καρδία ἡμῶν
  chosen: our heart
  alternatives:
  - our hearts
  lexicon: BDAG
  rationale: The Greek is singular ('the heart of us'). English can idiomatically
    use either singular or plural here; singular more closely reflects the source
    and can express their shared inward response.
- source_word: καιομένη
  chosen: burning
  alternatives:
  - aflame
  - on fire
  lexicon: BDAG
  rationale: Present participle of καίω used metaphorically for intense inward emotion
    or spiritual stirring. 'Burning' is the most direct and established English equivalent
    without over-paraphrase.
- source_word: ἐν ἡμῖν
  chosen: within us
  alternatives:
  - in us
  - inside us
  lexicon: BDAG
  rationale: '''Within us'' is idiomatic English for an internal experience and preserves
    the inward sense of ἐν.'
- source_word: ἐλάλει
  chosen: he was speaking
  alternatives:
  - he spoke
  - he was talking
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action. 'He was speaking' preserves
    the durative aspect better than simple past.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the road
  alternatives:
  - on the way
  - along the road
  lexicon: BDAG
  rationale: Literally 'on the road/way.' In this Emmaus context, 'on the road' is
    concrete and natural, while still allowing the narrative setting to remain clear.
- source_word: διήνοιγεν
  chosen: he was opening
  alternatives:
  - he opened
  - he was explaining
  lexicon: BDAG
  rationale: Imperfect tense again suggests ongoing action. διανοίγω is literally
    'open fully'; here it refers to opening up the meaning of Scripture. 'He was opening'
    preserves the metaphor and avoids interpretive expansion in the main text.
- source_word: τὰς γραφάς
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: γραφή in this context refers to the sacred writings. 'The Scriptures'
    is the standard and accurate rendering in English.
