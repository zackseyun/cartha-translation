theological_decisions:
- issue: Metaphorical force of 'heart burning'
  chosen_reading: Retain the metaphor 'our heart burning within us' rather than interpret
    it as mere emotional excitement or spiritual enlightenment.
  alternative_readings:
  - our hearts were deeply moved
  - we felt a fire inside
  rationale: The text itself uses embodied metaphor and does not specify whether the
    burning is emotional, spiritual, or cognitive; preserving the metaphor maintains
    the theological and experiential tension rather than resolving it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
