id: LUK.24.14
reference: Luke 24:14
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ὡμίλουν πρὸς ἀλλήλους περὶ πάντων τῶν συμβεβηκότων τούτων.
translation:
  text: And they were talking with one another about all these things that had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'were conversing with each other about all these events that had taken
      place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the straightforward narrative linkage
    without adding temporal nuance not explicit in the conjunction.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek but naturally absorbed into the English
    subject. The emphatic force is slight here and does not require 'themselves' in
    idiomatic English.
- source_word: ὡμίλουν
  chosen: were talking
  alternatives:
  - were conversing
  - were discussing
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing past action, best conveyed by 'were
    talking.' The verb ὁμιλέω here denotes conversation rather than formal speech;
    'talking' is natural modern English.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - to one another
  - with each other
  lexicon: BDAG
  rationale: The phrase marks reciprocal conversation. 'With one another' fits English
    idiom with 'talking' better than the more literal 'to one another.'
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  lexicon: BDAG
  rationale: In context περί introduces the topic of conversation. 'About' is the
    clearest contemporary equivalent.
- source_word: πάντων
  chosen: all
  alternatives:
  - all of
  lexicon: BDAG
  rationale: 'The genitive with περί is partitive/topic-related: they were speaking
    about the whole set of events. ''All'' is sufficient and idiomatic before ''these
    things.'''
- source_word: τῶν συμβεβηκότων τούτων
  chosen: these things that had happened
  alternatives:
  - these events that had taken place
  - these things that had come to pass
  lexicon: BDAG
  rationale: The perfect participle of συμβαίνω refers to events that have occurred,
    with present relevance in the narrative aftermath. 'These things that had happened'
    is natural English and preserves the completed-event sense without archaic phrasing.
