id: LUK.24.25
reference: Luke 24:25
source:
  edition: SBLGNT
  text: καὶ αὐτὸς εἶπεν πρὸς αὐτούς· Ὦ ἀνόητοι καὶ βραδεῖς τῇ καρδίᾳ τοῦ πιστεύειν
    ἐπὶ πᾶσιν οἷς ἐλάλησαν οἱ προφῆται·
translation:
  text: And he said to them, “O foolish ones, and slow of heart to believe all that
    the prophets have spoken!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “senseless” or “without understanding.”
    reason: lexical_alternative
  - marker: b
    text: Literally “slow of heart,” an idiom for being sluggish in the inner person
      to trust and receive what God has said.
    reason: cultural_note
  - marker: c
    text: Or “spoke.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  chosen: O
  alternatives:
  - Oh
  lexicon: BDAG
  rationale: Retains the direct vocative force and solemn rebuke of the Greek interjection
    without paraphrasing it away.
- source_word: ἀνόητοι
  chosen: foolish ones
  alternatives:
  - foolish
  - senseless
  - uncomprehending
  lexicon: BDAG
  rationale: Conveys lack of understanding rather than moral perversity alone. 'Foolish
    ones' preserves the vocative plural address more naturally than bare 'foolish'
    in English.
- source_word: βραδεῖς τῇ καρδίᾳ
  chosen: slow of heart
  alternatives:
  - slow in heart
  - slow-hearted
  - slow to understand
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the καρδία idiom as the
    inner person rather than reducing it to mere intellect. This keeps the biblical
    anthropology intact while remaining understandable.
- source_word: τοῦ πιστεύειν
  chosen: to believe
  alternatives:
  - in believing
  - for believing
  lexicon: BDAG
  rationale: The articular infinitive here expresses reference/result with βραδεῖς;
    idiomatic English is 'slow ... to believe.'
- source_word: ἐπὶ πᾶσιν οἷς
  chosen: all that
  alternatives:
  - in all that
  - upon all that
  - everything that
  lexicon: BDAG
  rationale: Idiomatic English compresses the preposition and relative construction
    into 'all that' while preserving the comprehensive scope of what the prophets
    said.
- source_word: ἐλάλησαν
  chosen: have spoken
  alternatives:
  - spoke
  - said
  lexicon: BDAG
  rationale: English present perfect works well in context to present the prophetic
    witness as a completed yet still relevant body of speech. 'Spoken' is preferable
    to 'said' for prophetic proclamation.
- source_word: οἱ προφῆται
  chosen: the prophets
  lexicon: BDAG
  rationale: Standard and contextually precise rendering referring to the prophetic
    Scriptures/witness.
- source_word: καὶ αὐτὸς εἶπεν πρὸς αὐτούς
  chosen: And he said to them
  alternatives:
  - Then he said to them
  - And he said to them
  lexicon: BDAG
  rationale: Straightforward narrative introduction. 'And' preserves καί; αὐτός is
    naturally represented by the English pronoun 'he' without added emphasis.
