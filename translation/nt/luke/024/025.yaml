theological_decisions:
- issue: Nature of Jesus's rebuke
  chosen_reading: The rebuke addresses deficient understanding and trust in the prophetic
    witness, not a denial of the prophets' authority.
  alternative_readings:
  - A primarily moral condemnation
  - A merely intellectual misunderstanding
  rationale: The wording combines ἀνόητοι with 'slow of heart to believe all that
    the prophets have spoken,' indicating both comprehension and trust are in view.
    The translation preserves this tension by keeping 'heart' and 'believe.'
  doctrine_reference: Translation philosophy §3, §6
