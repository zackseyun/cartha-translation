id: LUK.24.33
reference: Luke 24:33
source:
  edition: SBLGNT
  text: καὶ ἀναστάντες αὐτῇ τῇ ὥρᾳ ὑπέστρεψαν εἰς Ἰερουσαλήμ, καὶ εὗρον ⸀ἠθροισμένους
    τοὺς ἕνδεκα καὶ τοὺς σὺν αὐτοῖς,
translation:
  text: And rising that very hour, they returned to Jerusalem and found the Eleven
    gathered together, and those with them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled.' The Greek participle describes them as already in a gathered
      state when they were found.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  chosen: rising
  alternatives:
  - getting up
  - standing up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here functioning as an attendant circumstance
    preceding the main verb. 'Rising' is concise and natural in English, preserving
    the physical action without over-paraphrasing.
- source_word: αὐτῇ τῇ ὥρᾳ
  chosen: that very hour
  alternatives:
  - at that hour
  - immediately
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for immediacy tied to the specific moment.
    'That very hour' preserves both the temporal reference and the emphasis better
    than the looser 'immediately.'
- source_word: ὑπέστρεψαν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: Standard narrative sense of ὑποστρέφω in travel context. 'Returned' is
    slightly more formal and fits the movement back to Jerusalem.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, following the policy
    to transliterate names.
- source_word: εὗρον
  chosen: found
  alternatives:
  - came upon
  lexicon: BDAG
  rationale: The ordinary sense of εὑρίσκω in narrative context is 'found.' This is
    the most direct and natural rendering.
- source_word: ἠθροισμένους
  chosen: gathered together
  alternatives:
  - assembled
  - gathered
  lexicon: BDAG
  rationale: Perfect passive participle of ἀθροίζω describing the state in which they
    were found. 'Gathered together' preserves the collective sense and the resultant
    state, while remaining idiomatic English.
- source_word: τοὺς ἕνδεκα
  chosen: the Eleven
  alternatives:
  - the eleven apostles
  lexicon: BDAG
  rationale: This is the established designation for Jesus' core apostolic group after
    Judas's death. 'The Eleven' reflects the Greek exactly without adding 'apostles,'
    which is implied but not stated.
- source_word: τοὺς σὺν αὐτοῖς
  chosen: those with them
  alternatives:
  - those who were with them
  - their companions
  lexicon: BDAG
  rationale: The phrase refers to others present with the Eleven. 'Those with them'
    is a close, readable rendering that avoids adding interpretive specificity.
