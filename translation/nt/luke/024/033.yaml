theological_decisions:
- issue: Reference of 'the Eleven' despite Judas's absence and Thomas possibly not
    being present
  chosen_reading: Retain the titular group designation 'the Eleven' without harmonizing
    or expanding it.
  alternative_readings:
  - the eleven apostles
  - the remaining disciples
  rationale: The Greek uses the conventional designation τοὺς ἕνδεκα. Translating
    it directly preserves the narrative wording without importing a harmonization
    about exact attendance or membership beyond what Luke states.
  doctrine_reference: Translation philosophy §§1, 3, 5
