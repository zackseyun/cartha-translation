theological_decisions:
- issue: Rendering προσκυνέω toward the risen Jesus
  chosen_reading: worshiping him
  alternative_readings:
  - bowing down to him
  - paying him homage
  rationale: In this post-resurrection and ascension context, translating προσκυνέω
    as 'worship' best reflects the likely force of the act without diminishing the
    christological significance present in Luke's narrative. The translation does
    not add doctrine beyond the text, but it also does not flatten the term into mere
    physical obeisance where the context supports a stronger rendering.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Bracketed phrase ⸂[προσκυνήσαντες αὐτόν]⸃
  chosen_reading: included in the main text with a textual-variant footnote
  alternative_readings:
  - omitted as a later addition
  rationale: The bracketed text signals textual uncertainty in the critical edition.
    Because the phrase is present in the provided SBLGNT text yet marked as uncertain,
    it is retained in translation and its uncertainty is documented in a footnote
    for auditability.
