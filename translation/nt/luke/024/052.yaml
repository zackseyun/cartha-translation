id: LUK.24.52
reference: Luke 24:52
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ⸂[προσκυνήσαντες αὐτὸν]⸃ ὑπέστρεψαν εἰς Ἰερουσαλὴμ μετὰ χαρᾶς μεγάλης,
translation:
  text: And they, after worshiping him, returned to Jerusalem with great joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit 'after worshiping him.'
    reason: textual_variant
  - marker: b
    text: Or 'after bowing down to him' / 'after paying him homage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative linkage without
    adding temporal nuance beyond the Greek.
- source_word: αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is explicit and somewhat emphatic. English can carry the
    sense adequately with 'they' in this context; 'they themselves' would be overly
    marked in modern English.
- source_word: προσκυνήσαντες αὐτόν
  chosen: after worshiping him
  alternatives:
  - having worshiped him
  - bowing down to him
  lexicon: BDAG
  rationale: 'The aorist participle is best represented as antecedent action relative
    to the main verb: they worshiped him and then returned. ''Worship'' is the most
    contextually fitting rendering of προσκυνέω here, given the exalted post-resurrection
    context and the direct object ''him'' referring to Jesus. ''After worshiping him''
    is natural English and preserves the participial relationship.'
- source_word: ὑπέστρεψαν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: The verb means to return. 'Returned' is both accurate and suitably concise
    for narrative style.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: With a city name, idiomatic English prefers 'to Jerusalem.' 'Into' would
    be more wooden and adds no needed precision here.
- source_word: μετὰ χαρᾶς μεγάλης
  chosen: with great joy
  alternatives:
  - with much joy
  lexicon: BDAG
  rationale: This prepositional phrase is naturally rendered 'with great joy.' It
    preserves both the noun χαρά and the intensifying adjective μεγάλη in clear modern
    English.
