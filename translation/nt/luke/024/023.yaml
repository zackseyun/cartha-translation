id: LUK.24.23
reference: Luke 24:23
source:
  edition: SBLGNT
  text: καὶ μὴ εὑροῦσαι τὸ σῶμα αὐτοῦ ἦλθον λέγουσαι καὶ ὀπτασίαν ἀγγέλων ἑωρακέναι, οἳ λέγουσιν αὐτὸν ζῆν.
translation:
  text: and when they did not find his body, they came saying they had even seen a vision of angels, who say that he is alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'they came saying that they had seen a vision of angels and that they say he is alive,' taking 'who say' as referring to the women rather than the angels.
    reason: alternative_reading
  - marker: b
    text: Or 'saying that they had even seen'.
    reason: previous_rendering
lexical_decisions:
- source_word: μὴ εὑροῦσαι
  chosen: when they did not find
  alternatives:
  - not finding
  - having not found
  lexicon: BDAG
  rationale: Aorist active participle feminine plural modifying the women; rendered temporally in natural English as 'when they did not find' rather than a more wooden participial form. The negation μή is preserved directly.
- source_word: τὸ σῶμα αὐτοῦ
  chosen: his body
  lexicon: BDAG
  rationale: Straightforward referential phrase; 'body' is the ordinary sense of σῶμα here in the burial/resurrection context.
- source_word: ἦλθον λέγουσαι
  chosen: they came saying
  alternatives:
  - they returned saying
  - they came and said
  lexicon: BDAG
  rationale: ἦλθον is literally 'they came.' In context it implies return from the tomb, but the Greek says 'came,' so that is retained. λέγουσαι is kept with an accompanying participial sense, expressed idiomatically as 'came saying.'
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: 'The second καί before ὀπτασίαν is ascensive/intensifying: the report includes not only the missing body but also a vision. ''Even'' best captures that force in English.'
- source_word: ὀπτασίαν ἀγγέλων
  chosen: a vision of angels
  alternatives:
  - an appearance of angels
  - a supernatural vision of angels
  lexicon: BDAG
  rationale: ὀπτασία commonly denotes a supernatural sight/vision. 'Vision of angels' is clear, natural, and preserves the extraordinary character without over-expansion.
- source_word: ἑωρακέναι
  chosen: they had seen
  alternatives:
  - to have seen
  lexicon: BDAG
  rationale: Perfect infinitive in indirect discourse after λέγουσαι; English idiom renders the reported content as 'that they had seen.' The perfect aspect is naturally conveyed by the past perfect.
- source_word: οἳ λέγουσιν
  chosen: who say
  alternatives:
  - who were saying
  - who said
  lexicon: BDAG
  rationale: Present tense is retained as 'say.' The relative pronoun most naturally refers to 'angels,' not the women, so the clause reports the angels' message.
- source_word: αὐτὸν ζῆν
  chosen: that he is alive
  alternatives:
  - that he lives
  - him to be alive
  lexicon: BDAG
  rationale: Infinitival construction after λέγουσιν is rendered idiomatically with a finite clause. 'Is alive' fits the resurrection context and is more natural contemporary English than 'lives,' while preserving the claim of continued life.
