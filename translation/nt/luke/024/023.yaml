  from: saying that they had even seen
  to: saying they had even seen
  rationale: The current phrasing is grammatically correct but slightly clunky due to the sequence of 'saying that they had even seen'. Removing the optional conjunction 'that' creates a more fluid and natural-sounding clause in English. This improves the flow without altering the meaning or the translator's well-reasoned lexical choices, particularly the excellent rendering of the ascensive 'καὶ' as 'even'.
