theological_decisions:
- issue: Referent of the relative clause οἳ λέγουσιν
  chosen_reading: 'The relative pronoun refers to the angels: ''a vision of angels, who say that he is alive.'''
  alternative_readings:
  - 'The relative pronoun refers to the women: ''they came saying ... that they say he is alive.'''
  rationale: The nearest and most natural antecedent of masculine plural οἳ is ἀγγέλων, and this reading matches the narrative context in which angels announce Jesus' resurrection. This is a syntactic decision, not an imported doctrinal claim, though it coheres with the immediate context of Luke 24.
  doctrine_reference: Preserve theological tension rather than resolve it; here the syntax is sufficiently clear to translate without footnoting as a main ambiguity, though an alternative is worth preserving in a footnote.
