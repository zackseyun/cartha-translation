id: LUK.24.5
reference: Luke 24:5
source:
  edition: SBLGNT
  text: ἐμφόβων δὲ γενομένων αὐτῶν καὶ κλινουσῶν ⸂τὰ πρόσωπα⸃ εἰς τὴν γῆν εἶπαν πρὸς
    αὐτάς· Τί ζητεῖτε τὸν ζῶντα μετὰ τῶν νεκρῶν;
translation:
  text: And when they became terrified and were bowing their faces to the ground,
    they said to them, “Why are you seeking the living one among the dead?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What are you seeking the living one with the dead?”
      The sense in context is “Why are you seeking the living one among the dead?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμφόβων ... γενομένων
  chosen: when they became terrified
  alternatives:
  - when they were frightened
  - when they became afraid
  lexicon: BDAG
  rationale: The genitive absolute marks attendant circumstance prior to the main
    verb. ἔμφοβος denotes being afraid or terrified; 'became terrified' captures the
    ingressive force of γενομένων plus the intensity of ἔμφοβων.
- source_word: κλινουσῶν τὰ πρόσωπα εἰς τὴν γῆν
  chosen: were bowing their faces to the ground
  alternatives:
  - bowed their faces to the ground
  - lowering their faces to the ground
  lexicon: BDAG
  rationale: κλίνω literally means 'to bend/lean.' Here, with πρόσωπα and εἰς τὴν
    γῆν, it describes a reverential or fearful physical movement. 'Were bowing their
    faces to the ground' preserves the concrete imagery and the participial aspect.
- source_word: εἶπαν πρὸς αὐτάς
  chosen: they said to them
  alternatives:
  - they said to the women
  lexicon: BDAG
  rationale: The pronoun αὐτάς refers back to the women in context, but the Greek
    uses a pronoun rather than repeating the noun. 'To them' preserves the source
    wording without over-specifying in the main text.
- source_word: Τί ζητεῖτε
  chosen: Why are you seeking
  alternatives:
  - Why do you seek
  - What are you seeking
  lexicon: BDAG
  rationale: 'Although τί can be rendered ''what,'' in this idiom the sense is effectively
    ''why'' in English: the question challenges the appropriateness of their search.
    Present tense ζητεῖτε is naturally rendered ''are you seeking.'''
- source_word: τὸν ζῶντα
  chosen: the living one
  alternatives:
  - the one who is living
  - the living
  lexicon: BDAG
  rationale: The substantival participle is singular and personal. 'The living one'
    preserves the force of the Greek better than the more abstract 'the living,' while
    still sounding natural in English.
- source_word: μετὰ τῶν νεκρῶν
  chosen: among the dead
  alternatives:
  - with the dead
  lexicon: BDAG
  rationale: μετά with the genitive means 'with/among.' In this context, 'among the
    dead' is the most idiomatic English expression and conveys the contrast between
    Jesus as living and the realm of the dead.
