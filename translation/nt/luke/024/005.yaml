theological_decisions:
- issue: Resurrection implication in τὸν ζῶντα
  chosen_reading: the living one
  alternative_readings:
  - the living
  rationale: The phrase points to Jesus as alive in contrast to the dead, fitting
    the resurrection context without importing explanatory wording not present in
    the Greek. The translation preserves the theological force while remaining textually
    restrained.
  doctrine_reference: Preserve theological tension rather than resolve it.
