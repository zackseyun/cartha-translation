id: LUK.24.35
reference: Luke 24:35
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ἐξηγοῦντο τὰ ἐν τῇ ὁδῷ καὶ ὡς ἐγνώσθη αὐτοῖς ἐν τῇ κλάσει τοῦ ἄρτου.
translation:
  text: And they themselves were recounting the things on the road, and how he was
    made known to them in the breaking of the bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was recognized by them.' The Greek uses a passive verb, which may
      emphasize either their recognition of him or that he was made known to them.
    reason: alternative_reading
  - marker: b
    text: Or, 'in the breaking of bread.' The Greek can be read more generally, but
      'the bread' fits the specific meal scene in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in context, distinguishing these two
    disciples as now giving their own report. 'They themselves' preserves the emphasis
    better than a simple 'they.'
- source_word: ἐξηγοῦντο
  chosen: were recounting
  alternatives:
  - were explaining
  - were telling
  - were relating
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing narration/reporting. 'Were recounting'
    captures the sense of narrating events in sequence without overinterpreting the
    verb as formal exposition.
- source_word: τὰ ἐν τῇ ὁδῷ
  chosen: the things on the road
  alternatives:
  - what had happened on the road
  - the things that happened on the way
  lexicon: BDAG
  rationale: The phrase is somewhat elliptical in Greek. 'The things on the road'
    is a close rendering that remains natural enough in English while preserving the
    concise Greek expression. A more explicit expansion is possible, but the supplied
    text does not state 'happened' directly.
- source_word: ὁδῷ
  chosen: road
  alternatives:
  - way
  lexicon: BDAG
  rationale: '''Road'' is more idiomatic in contemporary English for the Emmaus journey,
    while still accurately reflecting ὁδός here. ''Way'' is possible but can sound
    abstract in English.'
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - in what way
  lexicon: BDAG
  rationale: 'Here ὡς introduces the content of their report: the manner/fact of recognition.
    ''How'' is the most natural English equivalent.'
- source_word: ἐγνώσθη
  chosen: he was made known
  alternatives:
  - he was recognized
  - he became known
  lexicon: BDAG
  rationale: The passive form of γινώσκω is best preserved as passive. 'He was made
    known' reflects both the grammar and Luke's theological nuance that the recognition
    was not merely self-generated. 'He was recognized' is possible but shifts toward
    an active human perception not explicit in the passive.
- source_word: ἐν τῇ κλάσει τοῦ ἄρτου
  chosen: in the breaking of the bread
  alternatives:
  - in the breaking of bread
  - when he broke the bread
  lexicon: BDAG
  rationale: The articular phrase is rendered closely. Including 'the' before 'bread'
    reflects the Greek article and the specific meal scene just narrated. 'Breaking
    of bread' could sound more generalized or idiomatic than this immediate context
    warrants.
- source_word: ἄρτου
  chosen: bread
  alternatives:
  - loaf
  lexicon: BDAG
  rationale: Standard rendering for ἄρτος. 'Loaf' is possible in some contexts but
    is too specific here.
