theological_decisions:
- issue: Whether ἐγνώσθη should be rendered as simple human recognition or as a divine-passive-like
    expression preserving theological nuance
  chosen_reading: Retain the passive sense with 'he was made known to them.'
  alternative_readings:
  - he was recognized by them
  rationale: Luke uses a passive form, and in the immediate context (24:31) their
    recognition is tied to divine enablement as well as the act of breaking bread.
    Preserving the passive maintains the narrative's theological tension without overstating
    a doctrine of direct revelation in the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
