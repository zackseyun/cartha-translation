id: LUK.24.22
reference: Luke 24:22
source:
  edition: SBLGNT
  text: ἀλλὰ καὶ γυναῖκές τινες ἐξ ἡμῶν ἐξέστησαν ἡμᾶς, γενόμεναι ⸀ὀρθριναὶ ἐπὶ τὸ
    μνημεῖον
translation:
  text: But also, some women from among us astonished us, having gone early in the
    morning to the tomb,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'amazed us' or 'bewildered us.' The Greek verb can express strong surprise
      or disorientation.
    reason: lexical_alternative
  - marker: b
    text: Or 'at dawn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: But also
  alternatives:
  - But even
  - Yet also
  lexicon: BDAG
  rationale: Retains the adversative-plus-additive force linking this statement to
    the preceding disappointment while adding a surprising counterpoint.
- source_word: γυναῖκές τινες
  chosen: some women
  alternatives:
  - certain women
  - some of the women
  lexicon: BDAG
  rationale: Natural modern English for an indefinite plural; 'certain women' is more
    formal but less idiomatic.
- source_word: ἐξ ἡμῶν
  chosen: from among us
  alternatives:
  - of our group
  - from us
  lexicon: BDAG
  rationale: Expresses that the women belonged to the disciples' circle, not merely
    that they came from the speakers.
- source_word: ἐξέστησαν ἡμᾶς
  chosen: astonished us
  alternatives:
  - amazed us
  - greatly surprised us
  - bewildered us
  lexicon: BDAG
  rationale: ἐξίστημι here conveys causing strong amazement or disorientation. 'Astonished'
    preserves the force without overinterpreting it as confusion alone.
- source_word: γενόμεναι
  chosen: having gone
  alternatives:
  - having been
  - after being
  lexicon: BDAG
  rationale: With the predicate adjective ὀρθριναὶ and the following prepositional
    phrase, the participle functions idiomatically to describe the women as having
    come/been present early at the tomb. English requires a more explicit motion sense
    for clarity.
- source_word: ὀρθριναὶ
  chosen: early in the morning
  alternatives:
  - at dawn
  - early
  lexicon: BDAG
  rationale: Adjectival form meaning 'early' or 'at daybreak.' The fuller phrase is
    clear modern English and fits the temporal sense in context.
- source_word: ἐπὶ τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - at the tomb
  - to the grave
  lexicon: BDAG
  rationale: With ἐπί plus accusative, movement toward is natural here, so 'to the
    tomb' fits the participial idea of going there. 'Tomb' is preferable to 'grave'
    for Jesus' burial context.
