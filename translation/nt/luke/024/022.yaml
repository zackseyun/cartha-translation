theological_decisions:
- issue: Force of ἐξέστησαν in resurrection-context report
  chosen_reading: astonished us
  alternative_readings:
  - amazed us
  - bewildered us
  rationale: The verse reports the disciples' reaction to the women's testimony without
    yet resolving the resurrection claim. 'Astonished' preserves the narrative tension
    and avoids importing either belief or disbelief beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
