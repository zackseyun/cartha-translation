theological_decisions:
- issue: Messianic expectation in 'redeem Israel'
  chosen_reading: Retain 'redeem Israel' without specifying political or purely spiritual
    redemption.
  alternative_readings:
  - deliver Israel politically
  - save Israel spiritually
  rationale: The speakers likely express messianic hope in a broad sense that may
    include national restoration, but the text itself does not narrowly define the
    mode of redemption. The translation preserves the wording and theological tension
    rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Temporal force of ἐστιν after imperfect ἠλπίζομεν
  chosen_reading: Use 'he is the one who is about to redeem' rather than shifting
    entirely to past time.
  alternative_readings:
  - he was the one who was going to redeem
  - he was the one to redeem
  rationale: Keeping the present better reflects the Greek wording and the content
    of their former hope, while still allowing the surrounding context to communicate
    disappointment. This avoids over-interpreting the syntax into a fully past, abandoned
    proposition.
