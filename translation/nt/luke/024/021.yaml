id: LUK.24.21
reference: Luke 24:21
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ἠλπίζομεν ὅτι αὐτός ἐστιν ὁ μέλλων λυτροῦσθαι τὸν Ἰσραήλ· ἀλλά γε
    ⸀καὶ σὺν πᾶσιν τούτοις τρίτην ταύτην ἡμέραν ⸀ἄγει ἀφ’ οὗ ταῦτα ἐγένετο.
translation:
  text: But we were hoping that he is the one who is about to redeem Israel. Yet besides
    all this, it is now the third day since these things happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who was going to redeem Israel.' The Greek keeps a present
      verb ('is') within the content of their past hope.
    reason: alternative_reading
  - marker: b
    text: '''Redeem Israel'' can refer broadly to hoped-for messianic deliverance;
      the text does not specify whether the speakers mean political liberation, spiritual
      salvation, or both.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  chosen: But we
  alternatives:
  - Now we
  - But as for us
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding report; 'But we' captures the adversative
    turn and the emphatic subject ἡμεῖς without sounding overly stiff.
- source_word: ἠλπίζομεν
  chosen: were hoping
  alternatives:
  - hoped
  lexicon: BDAG
  rationale: Imperfect tense conveys an ongoing or sustained expectation in the past,
    now disappointed. 'Were hoping' preserves that nuance better than simple 'hoped.'
- source_word: ὅτι αὐτός ἐστιν
  chosen: that he is
  alternatives:
  - that he was
  - that this is he who
  lexicon: BDAG
  rationale: The Greek has present ἐστιν after the imperfect main verb, reflecting
    the content of their hope rather than shifting fully into past time. English can
    naturally retain 'is' here to mirror the Greek and preserve the immediacy of the
    expectation.
- source_word: ὁ μέλλων λυτροῦσθαι
  chosen: the one who is about to redeem
  alternatives:
  - the one who was going to redeem
  - the one who would redeem
  - the one destined to redeem
  lexicon: BDAG
  rationale: μέλλων with infinitive denotes one expected or destined to do something.
    'Is about to redeem' stays close to the Greek form while remaining intelligible.
    Because the hope concerns anticipated messianic action, this wording preserves
    the forward-looking sense.
- source_word: λυτροῦσθαι
  chosen: redeem
  alternatives:
  - deliver
  - set free
  lexicon: BDAG
  rationale: λυτρόομαι carries the sense of release/redemption, often with covenantal
    and salvific overtones. 'Redeem' best preserves the theological and messianic
    resonance in relation to Israel.
- source_word: τὸν Ἰσραήλ
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: BDAG
  rationale: The direct object is the covenant people as a whole. 'Israel' is the
    most direct and textually faithful rendering.
- source_word: ἀλλά γε καὶ
  chosen: Yet besides all this
  alternatives:
  - But indeed even with all these things
  - But also besides all this
  - Yet even with all this
  lexicon: BDAG
  rationale: This cluster intensifies the contrast and adds a further discouraging
    consideration. 'Yet besides all this' captures the cumulative force in natural
    English.
- source_word: σὺν πᾶσιν τούτοις
  chosen: besides all this
  alternatives:
  - with all these things
  - in addition to all this
  lexicon: BDAG
  rationale: The phrase means 'in addition to all these things' rather than simple
    accompaniment. 'Besides all this' is idiomatic and accurate.
- source_word: τρίτην ταύτην ἡμέραν ἄγει
  chosen: it is now the third day
  alternatives:
  - this brings the third day
  - he brings this third day
  - this is the third day
  lexicon: BDAG
  rationale: ἄγει here is idiomatic for the passage of time ('it is now / it has reached').
    'It is now the third day' communicates the sense clearly in modern English.
- source_word: ἀφ’ οὗ ταῦτα ἐγένετο
  chosen: since these things happened
  alternatives:
  - since these things took place
  - from when these things happened
  lexicon: BDAG
  rationale: ἀφ’ οὗ introduces the point from which time is reckoned. 'Since these
    things happened' is natural English and preserves the temporal relation.
