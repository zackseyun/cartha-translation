theological_decisions:
- issue: Implied subject not repeated in the Greek clause
  chosen_reading: And they found the stone rolled away from the tomb
  alternative_readings:
  - And found the stone rolled away from the tomb
  rationale: English normally requires the explicit subject for a complete sentence,
    and the plural verb clearly refers back to the women in the preceding verse. Supplying
    'they' clarifies the narrative without adding theological content.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
