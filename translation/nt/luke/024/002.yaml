id: LUK.24.2
reference: Luke 24:2
source:
  edition: SBLGNT
  text: εὗρον δὲ τὸν λίθον ἀποκεκυλισμένον ἀπὸ τοῦ μνημείου,
translation:
  text: And they found the stone rolled away from the tomb,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they discovered
  lexicon: BDAG
  rationale: Aorist active indicative, third person plural, with the implied subject
    carried over from the previous verse (the women). 'Found' is the natural and sufficiently
    formal rendering in context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' best fits readable modern English while preserving the
    flow.
- source_word: λίθον
  chosen: the stone
  alternatives:
  - the rock
  lexicon: BDAG
  rationale: λίθος in this burial context refers to the stone used to close the tomb.
    'Stone' is the standard and most precise English rendering.
- source_word: ἀποκεκυλισμένον
  chosen: rolled away
  alternatives:
  - having been rolled away
  - moved away
  lexicon: BDAG
  rationale: Perfect passive participle describing the stone's resulting state. 'Rolled
    away' captures both the motion implied by the verb and the present resultant condition
    in idiomatic English.
- source_word: ἀπὸ τοῦ μνημείου
  chosen: from the tomb
  alternatives:
  - away from the tomb
  - from the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in Gospel burial narratives is best rendered 'tomb.' The preposition
    ἀπό is naturally expressed with 'from'; the sense of removal is already conveyed
    by 'rolled away.'
