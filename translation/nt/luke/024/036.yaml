id: LUK.24.36
reference: Luke 24:36
source:
  edition: SBLGNT
  text: Ταῦτα δὲ αὐτῶν λαλούντων ⸀αὐτὸς ἔστη ἐν μέσῳ ⸀αὐτῶν.
translation:
  text: While they were saying these things, he himself stood among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add, 'and he says to them, “Peace to you.”'
    reason: textual_variant
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the matters just being
    discussed. 'These things' preserves the plural form and discourse linkage better
    than the more idiomatic but less explicit 'this'.
- source_word: δὲ
  chosen: while
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ works with the genitive absolute to mark a transition in ongoing
    action. In English, 'while' best captures the temporal force of the whole construction
    rather than a simple connective such as 'and' or 'but'.
- source_word: αὐτῶν λαλούντων
  chosen: they were saying
  alternatives:
  - they were speaking
  - they were talking
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous ongoing
    speech. 'Saying' fits the immediate context of reporting specific content just
    recounted; 'speaking' is possible but slightly less natural here.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. 'He himself' preserves the emphasis,
    highlighting the sudden personal presence of Jesus rather than merely supplying
    an English subject pronoun.
- source_word: ἔστη
  chosen: stood
  alternatives:
  - appeared
  - came and stood
  - was standing
  lexicon: BDAG
  rationale: Aorist of ἵστημι here denotes taking a standing position. 'Stood' is
    the most direct rendering. 'Appeared' interprets beyond the lexical value, and
    'came and stood' adds motion not explicit in this form.
- source_word: ἐν μέσῳ αὐτῶν
  chosen: among them
  alternatives:
  - in their midst
  - in the middle of them
  lexicon: BDAG
  rationale: Idiomatic expression meaning presence in the group's midst. 'Among them'
    is natural modern English; 'in their midst' is more formal and is preserved as
    a lexical alternative.
