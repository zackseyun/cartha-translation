- issue: Whether to include the longer Byzantine reading 'and says to them, “Peace
    to you”'
  chosen_reading: Omit from the main text, following the provided SBLGNT text.
  alternative_readings:
  - Include 'and he says to them, “Peace to you.”'
  rationale: The supplied source text ends with 'among them' and does not include
    the greeting. The translation follows the given Greek text rather than harmonizing
    with later manuscript traditions or familiar English versions. Because the longer
    reading is well known and textually significant, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve alternatives in footnotes where significant.'
