id: LUK.24.44
reference: Luke 24:44
source:
  edition: SBLGNT
  text: Εἶπεν δὲ ⸂πρὸς αὐτούς⸃· Οὗτοι οἱ λόγοι ⸀μου οὓς ἐλάλησα πρὸς ὑμᾶς ἔτι ὢν σὺν
    ὑμῖν, ὅτι δεῖ πληρωθῆναι πάντα τὰ γεγραμμένα ἐν τῷ νόμῳ Μωϋσέως ⸀καὶ προφήταις
    καὶ ψαλμοῖς περὶ ἐμοῦ.
translation:
  text: 'Then he said to them, “These are my words that I spoke to you while I was
    still with you: that everything written about me in the Law of Moses and the Prophets
    and the Psalms must be fulfilled.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the things written.'
    reason: lexical_alternative
  - marker: b
    text: '''The Law of Moses and the Prophets and the Psalms'' likely refers to the
      major divisions of Israel''s Scriptures; ''Psalms'' may stand specifically for
      the Psalter or more broadly for the Writings.'
    reason: cultural_note
  - marker: c
    text: Or 'concerning me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  chosen: Then he said
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: δέ here is a mild connective moving the narrative forward. 'Then' gives
    natural English flow without overstating contrast.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Standard directional use of πρός with persons after a speech verb.
- source_word: Οὗτοι οἱ λόγοι μου
  chosen: These are my words
  alternatives:
  - These are the words of mine
  - These are my sayings
  lexicon: BDAG
  rationale: λόγοι is rendered 'words' as the most direct and natural equivalent.
    The demonstrative-plus-article construction is represented by 'These are...' rather
    than a more wooden form.
- source_word: οὓς ἐλάλησα πρὸς ὑμᾶς
  chosen: that I spoke to you
  alternatives:
  - which I spoke to you
  - that I said to you
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak.' 'That I spoke to you' is idiomatic and
    preserves the relative clause.
- source_word: ἔτι ὢν σὺν ὑμῖν
  chosen: while I was still with you
  alternatives:
  - while still being with you
  - when I was still with you
  lexicon: BDAG
  rationale: The participial construction is best rendered temporally in English.
    'Still' reflects ἔτι, and 'with you' captures σύν + dative.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely, that
  lexicon: BDAG
  rationale: Introduces the content of the words Jesus had spoken. Simple 'that' is
    sufficient.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is necessary that
  lexicon: BDAG
  rationale: δεῖ expresses divine necessity here. 'Must' is concise and preserves
    the force of necessity without paraphrase.
- source_word: πληρωθῆναι
  chosen: be fulfilled
  alternatives:
  - come to fulfillment
  - be accomplished
  lexicon: BDAG
  rationale: A standard rendering for πληρόω in scriptural-fulfillment contexts. It
    preserves the intertextual sense of prophecy/scripture reaching fulfillment.
- source_word: πάντα τὰ γεγραμμένα
  chosen: everything written
  alternatives:
  - all the things written
  - all that has been written
  lexicon: BDAG
  rationale: The neuter plural with the perfect passive participle refers comprehensively
    to the written things. 'Everything written' is natural English and retains the
    totalizing force of πάντα.
- source_word: ἐν τῷ νόμῳ Μωϋσέως καὶ προφήταις καὶ ψαλμοῖς
  chosen: in the Law of Moses and the Prophets and the Psalms
  alternatives:
  - in the law of Moses and the prophets and the psalms
  - in the Mosaic Law and the Prophets and the Psalms
  lexicon: BDAG
  rationale: This likely refers to the threefold division of Israel's Scriptures.
    Capitalizing these labels in English signals recognized scriptural sections without
    adding content not in the Greek. 'Law of Moses' is more transparent than 'Mosaic
    Law' and follows the genitive construction.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: περί with the genitive here indicates reference. 'About me' is clear
    modern English; 'concerning me' is slightly more formal but not necessary.
