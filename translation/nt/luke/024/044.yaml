theological_decisions:
- issue: Scope and force of scriptural necessity in Jesus' statement
  chosen_reading: Render δεῖ πληρωθῆναι as 'must be fulfilled,' preserving the text's
    claim of divine necessity without specifying a theory of prophecy fulfillment
    beyond the verse.
  alternative_readings:
  - Render more weakly as 'was to be fulfilled'
  - Render more expansively as 'had to come true'
  rationale: The verse presents fulfillment as necessary, but it does not itself explain
    the mechanism or extent of that necessity. 'Must be fulfilled' preserves the theological
    weight while avoiding interpretive overreach.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identification of 'the Law of Moses and the Prophets and the Psalms'
  chosen_reading: Translate as named scriptural corpora, likely the threefold division
    of the Hebrew Scriptures, without adding an explanatory gloss in the main text.
  alternative_readings:
  - Treat 'Psalms' as a synecdoche for the Writings
  - Lowercase all three terms to avoid implying formal canon categories
  rationale: The wording naturally points to recognized scriptural sections, but the
    verse does not require a technical canonical explanation in the main text. A footnote
    can preserve the broader interpretive possibility.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
