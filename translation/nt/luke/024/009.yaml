theological_decisions:
- issue: Referent of the feminine participle and plural verb
  chosen_reading: The subject is the women who had come to the tomb, implied from
    the preceding context.
  rationale: The grammar marks a feminine plural subject, which should be reflected
    by not replacing it with a masculine or mixed explicit noun in translation. English
    can leave the pronoun implicit here without loss.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Designation of the apostolic group
  chosen_reading: Render τοῖς ἕνδεκα as 'the eleven' without expansion.
  alternative_readings:
  - the eleven apostles
  rationale: The text itself uses the conventional designation 'the eleven.' Expanding
    it could clarify for some readers but would go beyond the wording of the Greek.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
