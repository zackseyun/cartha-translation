id: LUK.24.9
reference: Luke 24:9
source:
  edition: SBLGNT
  text: καὶ ὑποστρέψασαι ἀπὸ τοῦ μνημείου ἀπήγγειλαν ταῦτα πάντα τοῖς ἕνδεκα καὶ πᾶσιν
    τοῖς λοιποῖς.
translation:
  text: And returning from the tomb, they reported all these things to the eleven
    and to all the rest.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑποστρέψασαι
  chosen: returning
  alternatives:
  - having returned
  - went back
  lexicon: BDAG
  rationale: Aorist active participle, nominative feminine plural, referring to the
    women. 'Returning' gives natural English while preserving the participial linkage
    to the main verb. 'Having returned' is more formally explicit but less natural.
- source_word: μνημείου
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in the resurrection context is best rendered 'tomb,' the standard
    and most precise term for the burial place of Jesus. 'Grave' is possible but less
    specific.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: BDAG
  rationale: The verb means to report or announce. 'Reported' fits the narrative tone
    and conveys the act of relaying information without overstating formality. 'Told'
    is simpler but slightly less precise; 'announced' can sound more public than the
    context requires.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - these things, all of them
  lexicon: BDAG
  rationale: This preserves both the demonstrative and the comprehensive force of
    πάντα. 'All these things' is idiomatic and sufficiently close to the Greek.
- source_word: τοῖς ἕνδεκα
  chosen: the eleven
  alternatives:
  - the eleven apostles
  lexicon: BDAG
  rationale: The Greek says simply 'the eleven.' Although the referent is the apostolic
    group minus Judas, adding 'apostles' would import a noun not present in the text.
- source_word: πᾶσιν τοῖς λοιποῖς
  chosen: all the rest
  alternatives:
  - all the others
  - everyone else
  lexicon: BDAG
  rationale: λοιποί means the remaining others. 'All the rest' is natural English
    and preserves the distinction between the eleven and the wider group. 'Everyone
    else' is possible but slightly more interpretive.
