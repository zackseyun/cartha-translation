id: LUK.24.11
reference: Luke 24:11
source:
  edition: SBLGNT
  text: καὶ ἐφάνησαν ἐνώπιον αὐτῶν ὡσεὶ λῆρος τὰ ῥήματα ⸀ταῦτα, καὶ ἠπίστουν αὐταῖς.
translation:
  text: And these words seemed like nonsense to them, and they did not believe the
    women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like an idle tale' or 'like delirious talk.' The Greek λῆρος refers
      to speech regarded as senseless or absurd.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάνησαν
  chosen: seemed
  alternatives:
  - appeared
  - were seen
  lexicon: BDAG
  rationale: Although the verb is from φαίνω ('appear/seem'), in this impersonal evaluative
    construction with ὡσεὶ λῆρος it naturally means 'seemed' rather than a more visual
    'appeared.' This best conveys their assessment of the report.
- source_word: ἐνώπιον αὐτῶν
  chosen: to them
  alternatives:
  - before them
  - in their sight
  lexicon: BDAG
  rationale: Literally 'before them,' but in English with a verb of seeming/judgment
    the idiomatic sense is 'to them.' This preserves the dative-like perspective without
    awkwardness.
- source_word: ὡσεὶ λῆρος
  chosen: like nonsense
  alternatives:
  - like an idle tale
  - like foolish talk
  - like delirious talk
  lexicon: BDAG
  rationale: λῆρος denotes nonsense, silly talk, or delirious/empty talk. 'Nonsense'
    is clear modern English and fits the translation philosophy better than the traditional
    but dated 'idle tale.' The comparative particle ὡσεὶ is preserved with 'like.'
- source_word: τὰ ῥήματα ταῦτα
  chosen: these words
  alternatives:
  - these sayings
  - these things they said
  - this report
  lexicon: BDAG
  rationale: A straightforward rendering of the demonstrative phrase. 'Words' is more
    direct and formally closer than the more interpretive 'report,' while still natural
    in English.
- source_word: ἠπίστουν
  chosen: did not believe
  alternatives:
  - disbelieved
  - refused to believe
  lexicon: BDAG
  rationale: The imperfect indicates ongoing past disbelief; English idiom expresses
    this well as 'did not believe.' 'Refused to believe' would overstate volition
    beyond what the verb itself requires.
- source_word: αὐταῖς
  chosen: the women
  alternatives:
  - them
  lexicon: BDAG
  rationale: The pronoun is feminine plural and refers to the women mentioned in the
    immediate context. Rendering it explicitly as 'the women' avoids ambiguity in
    English and makes the referent clear without adding new information.
