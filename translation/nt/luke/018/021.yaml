id: LUK.18.21
reference: Luke 18:21
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ταῦτα πάντα ⸀ἐφύλαξα ἐκ νεότητος ⸀μου.
translation:
  text: And he said, “I have kept all these things from my youth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'all these commandments.' The Greek says
      simply 'all these things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  chosen: And he said
  alternatives:
  - But he said
  - Then he said
  lexicon: BDAG
  rationale: δέ is a mild connective that can be rendered variously depending on English
    flow. 'And he said' preserves the narrative progression naturally without overstating
    contrast.
- source_word: Ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all these
  - all these commandments
  lexicon: BDAG
  rationale: The demonstrative plus πᾶς is most directly 'all these things.' 'Commandments'
    is contextually implied from the preceding verse but not explicit here, so it
    is not supplied in the main text.
- source_word: ἐφύλαξα
  chosen: I have kept
  alternatives:
  - I kept
  - I have observed
  - I have obeyed
  lexicon: BDAG
  rationale: φυλάσσω here carries the sense of keeping/observing commandments. English
    present perfect ('I have kept') best conveys the speaker's claim of ongoing record
    up to the present, even though the Greek aorist is formally past.
- source_word: ἐκ νεότητος μου
  chosen: from my youth
  alternatives:
  - since my youth
  - from my childhood
  lexicon: BDAG
  rationale: ἐκ with the genitive here marks starting point in time. 'From my youth'
    is a natural and sufficiently literal rendering of the idiom. 'Since my youth'
    is possible, but 'from' more closely reflects ἐκ.
