id: LUK.18.4
reference: Luke 18:4
source:
  edition: SBLGNT
  text: καὶ οὐκ ⸀ἤθελεν ἐπὶ χρόνον, μετὰ ⸂ταῦτα δὲ⸃ εἶπεν ἐν ἑαυτῷ· Εἰ καὶ τὸν θεὸν
    οὐ φοβοῦμαι ⸂οὐδὲ ἄνθρωπον⸃ ἐντρέπομαι,
translation:
  text: And for a time he was unwilling, but afterward he said to himself, ‘Even though
    I do not fear God nor respect man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor respect anyone.' The Greek has singular 'man' used generically for
      a human being.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθελεν
  chosen: was unwilling
  alternatives:
  - did not want
  - refused
  lexicon: BDAG
  rationale: The imperfect indicates an ongoing refusal over a period of time. 'Was
    unwilling' preserves the volitional sense better than the flatter 'did not want,'
    while avoiding the possibly too strong finality of 'refused.'
- source_word: ἐπὶ χρόνον
  chosen: for a time
  alternatives:
  - for a while
  - for some time
  lexicon: BDAG
  rationale: This idiom denotes a span of time. 'For a time' is concise, natural English
    and preserves the temporal force without over-specifying duration.
- source_word: μετὰ ταῦτα δὲ
  chosen: but afterward
  alternatives:
  - but after these things
  - yet later
  lexicon: BDAG
  rationale: The phrase marks a subsequent turn in the narrative. 'But afterward'
    captures both sequence and mild contrast in idiomatic English.
- source_word: εἶπεν ἐν ἑαυτῷ
  chosen: he said to himself
  alternatives:
  - he said within himself
  - he thought
  lexicon: BDAG
  rationale: This expression introduces internal speech. 'He said to himself' is natural
    modern English and preserves the self-directed deliberation more explicitly than
    simply 'he thought.'
- source_word: Εἰ καὶ
  chosen: Even though
  alternatives:
  - although
  - even if
  lexicon: BDAG
  rationale: Here the construction is concessive, introducing an admission. 'Even
    though' clearly signals concession in contemporary English.
- source_word: τὸν θεὸν οὐ φοβοῦμαι
  chosen: I do not fear God
  alternatives:
  - I do not revere God
  lexicon: BDAG
  rationale: φοβέομαι with God can denote fear or reverence, but in this judge's self-description
    the blunt moral deficiency is foregrounded. 'Fear God' is also a well-established
    biblical expression that preserves the source wording.
- source_word: οὐδὲ ἄνθρωπον ἐντρέπομαι
  chosen: nor respect man
  alternatives:
  - nor respect anyone
  - nor have regard for man
  - nor feel shame before anyone
  lexicon: BDAG
  rationale: ἐντρέπομαι here carries the sense of showing regard, deference, or respect.
    'Respect man' keeps the singular generic ἄνθρωπον and aligns with the verse's
    parallelism. Because the Greek is grammatically singular and generic, 'man' is
    retained as gender-accurate per translation philosophy.
