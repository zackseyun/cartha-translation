theological_decisions:
- issue: Generic singular ἄνθρωπον
  chosen_reading: man
  alternative_readings:
  - anyone
  - people
  rationale: The Greek uses singular ἄνθρωπον generically in contrast with 'God.'
    Following the gender-accurate policy, the translation keeps 'man' rather than
    neutralizing to 'anyone,' while the sense remains representative of human beings
    generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
