theological_decisions:
- issue: Sense of ἐκδικήσω in a parable about prayer and justice
  chosen_reading: I will give her justice
  alternative_readings:
  - I will avenge her
  - I will vindicate her
  rationale: The verse concerns legal redress from an unjust judge, not personal revenge.
    Rendering with 'justice' preserves the thematic link to God's granting justice
    in the surrounding verses without importing retaliatory overtones.
