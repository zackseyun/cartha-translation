id: LUK.18.5
reference: Luke 18:5
source:
  edition: SBLGNT
  text: διά γε τὸ παρέχειν μοι κόπον τὴν χήραν ταύτην ἐκδικήσω αὐτήν ἵνα μὴ εἰς τέλος
    ἐρχομένη ὑπωπιάζῃ με.
translation:
  text: yet because this widow keeps causing me trouble, I will give her justice,
    so that she may not keep coming endlessly and wear me out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vindicate her.' The Greek verb can also be rendered 'avenge her' in
      some contexts, but here it refers to granting legal justice.
    reason: alternative_reading
  - marker: b
    text: Literally 'strike me under the eye'; idiomatically, 'wear me out' or 'beat
      me down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διά γε τὸ παρέχειν μοι κόπον
  chosen: because this widow keeps causing me trouble
  alternatives:
  - because this widow gives me trouble
  - because this widow keeps bothering me
  lexicon: BDAG
  rationale: The construction διά + articular infinitive gives a causal sense, intensified
    by γε. παρέχειν ... κόπον is idiomatic for causing trouble or difficulty. 'Keeps
    causing me trouble' captures the present infinitive's ongoing force and the idiom
    naturally in English.
- source_word: χήραν ταύτην
  chosen: this widow
  lexicon: BDAG
  rationale: Straightforward demonstrative + noun. 'Widow' should be preserved explicitly
    because her social vulnerability is important in the parable's setup.
- source_word: ἐκδικήσω αὐτήν
  chosen: I will give her justice
  alternatives:
  - I will vindicate her
  - I will grant her legal protection
  - I will avenge her
  lexicon: BDAG
  rationale: In this legal-parabolic context, ἐκδικέω refers to granting justice or
    vindication rather than personal vengeance. 'Give her justice' is clear modern
    English and fits the repeated theme in this passage.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: This introduces the judge's purpose in natural English. 'Lest' would
    be more formal but less readable.
- source_word: εἰς τέλος
  chosen: endlessly
  alternatives:
  - continually
  - in the end
  - forever
  lexicon: BDAG
  rationale: Here εἰς τέλος most naturally modifies the repeated coming as an idiom
    meaning continually or without end, not 'finally.' 'Endlessly' conveys the judge's
    exasperated perspective.
- source_word: ἐρχομένη
  chosen: keep coming
  alternatives:
  - coming
  - continually coming
  lexicon: BDAG
  rationale: The participle is contemporaneous and iterative in context. Rendering
    it with 'keep coming' brings out the repeated action implied by the parable.
- source_word: ὑπωπιάζῃ με
  chosen: wear me out
  alternatives:
  - beat me down
  - strike me under the eye
  - give me a black eye
  lexicon: BDAG
  rationale: Literally the verb can mean strike under the eye, but idiomatically it
    can mean wear down or exhaust through repeated harassment. In this context the
    figurative sense best fits the judge's complaint and avoids an implausibly literal
    threat, while preserving the force of persistent pressure.
