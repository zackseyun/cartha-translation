id: LUK.18.2
reference: Luke 18:2
source:
  edition: SBLGNT
  text: λέγων· Κριτής τις ἦν ἔν τινι πόλει τὸν θεὸν μὴ φοβούμενος καὶ ἄνθρωπον μὴ
    ἐντρεπόμενος.
translation:
  text: saying, “There was a certain judge in a certain city who did not fear God
    and did not respect man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “did not respect anyone.” The Greek has the singular “man” used generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - he said
  - saying that
  lexicon: BDAG
  rationale: Present participle introducing the content of Jesus' parable. 'Saying'
    preserves the participial linkage to the previous verse naturally in English.
- source_word: Κριτής τις
  chosen: a certain judge
  alternatives:
  - a judge
  - a judge of a certain kind
  lexicon: BDAG
  rationale: The indefinite τις adds specificity without naming the person. 'A certain
    judge' reflects the Greek idiom and suits parabolic narrative style.
- source_word: ἦν
  chosen: there was
  alternatives:
  - was
  lexicon: BDAG
  rationale: Existential 'there was' is more idiomatic in English for introducing
    a character in a story.
- source_word: ἔν τινι πόλει
  chosen: in a certain city
  alternatives:
  - in a city
  - in some city
  lexicon: BDAG
  rationale: The repeated τις is retained with 'certain' for narrative texture and
    to mirror the Greek's deliberate indefiniteness.
- source_word: τὸν θεὸν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: Although the article is present in Greek, English idiom normally omits
    it before 'God' in this sense. The reference is to God generally, not to a pagan
    deity.
- source_word: μὴ φοβούμενος
  chosen: did not fear
  alternatives:
  - not fearing
  - had no fear of
  lexicon: BDAG
  rationale: The participle describes the judge's characteristic disposition. Finite
    English verbal form after 'who' is the most natural rendering. 'Fear' preserves
    the biblical moral-religious sense better than a weaker paraphrase.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - people
  - anyone
  - human being
  lexicon: BDAG
  rationale: Singular ἄνθρωπον here is generic, contrasting with 'God.' Per the gender-accurate
    philosophy, 'man' best matches the source's representative singular rather than
    flattening it to plural 'people.'
- source_word: μὴ ἐντρεπόμενος
  chosen: did not respect
  alternatives:
  - did not regard
  - did not feel shame before
  - did not reverence
  lexicon: BDAG
  rationale: In this context ἐντρέπω conveys regard, respect, or deference toward
    others. 'Did not respect man' is concise, idiomatic, and preserves the ethical
    contrast with fearing God.
