theological_decisions:
- issue: Generic singular ἄνθρωπον in contrast with God
  chosen_reading: man
  alternative_readings:
  - people
  - anyone
  - humanity
  rationale: 'The Greek uses a singular generic noun in a paired expression: he neither
    feared God nor respected man. Following the project''s gender-accurate principle,
    the representative singular is preserved in the main text rather than neutralized
    to a plural. Because modern readers may hear ''man'' narrowly, an alternative
    is preserved in a footnote.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
