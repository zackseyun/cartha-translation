theological_decisions:
- issue: Scope of divine possibility
  chosen_reading: The verse states that what is impossible in the human sphere is
    possible with God, without specifying every conceivable action.
  alternative_readings:
  - A maxim implying absolute divine ability in every abstract sense
  rationale: The Greek contrasts human inability and divine ability in the context
    of salvation and the rich entering the kingdom. The translation preserves the
    broad statement without importing philosophical claims beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
