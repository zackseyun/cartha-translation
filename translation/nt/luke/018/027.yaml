id: LUK.18.27
reference: Luke 18:27
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Τὰ ἀδύνατα παρὰ ἀνθρώποις δυνατὰ ⸂παρὰ τῷ θεῷ ἐστιν⸃.
translation:
  text: But he said, “What is impossible with men is possible with God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What is impossible for men is possible for God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδύνατα
  chosen: what is impossible
  alternatives:
  - the impossible things
  - things impossible
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. Rendering it as 'what is
    impossible' gives natural English while preserving the category of things beyond
    human ability.
- source_word: παρὰ ἀνθρώποις
  chosen: with men
  alternatives:
  - for men
  - among men
  - with humans
  lexicon: BDAG
  rationale: παρά with the dative here expresses relation or sphere, idiomatically
    'with' in the sense of 'in the case of' or 'for.' 'Men' reflects the generic human
    reference of ἀνθρώποις and follows the project's gender-accurate principle; the
    phrase means what is impossible in the human sphere.
- source_word: δυνατὰ
  chosen: possible
  alternatives:
  - able to be done
  - powerful
  lexicon: BDAG
  rationale: As the antonym to ἀδύνατα in the same neuter plural substantival construction,
    'possible' is the most direct and idiomatic English equivalent.
- source_word: παρὰ τῷ θεῷ
  chosen: with God
  alternatives:
  - for God
  - in God's presence
  lexicon: BDAG
  rationale: As with παρὰ ἀνθρώποις, παρά with the dative marks the sphere or reference
    point. 'With God' is the standard idiomatic rendering in English and preserves
    the contrast with 'with men.'
- source_word: ὁ δὲ εἶπεν
  chosen: But he said
  alternatives:
  - And he said
  - So he said
  lexicon: BDAG
  rationale: δέ is mildly adversative or transitional here. 'But he said' fits the
    immediate response to the preceding statement and is natural English narrative
    style.
