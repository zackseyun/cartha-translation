theological_decisions:
- issue: Scope of σῴζω in a healing narrative
  chosen_reading: saved
  alternative_readings:
  - made you well
  - healed
  rationale: The verb can denote physical healing in context, but Luke often preserves
    overlap between healing and salvation. Rendering it 'saved' maintains that theological
    tension rather than resolving it into mere bodily cure.
  doctrine_reference: Translation philosophy §3; Contested terms table for πίστις
    (preserve tension where ambiguity is genuine)
