id: LUK.18.42
reference: Luke 18:42
source:
  edition: SBLGNT
  text: καὶ ὁ Ἰησοῦς εἶπεν αὐτῷ· Ἀνάβλεψον· ἡ πίστις σου σέσωκέν σε.
translation:
  text: And Jesus said to him, “Receive your sight; your faith has saved you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Regain your sight.” The Greek command can mean “see again” in a healing
      context.
    reason: lexical_alternative
  - marker: b
    text: Or “your faith has made you well” or “your faith has healed you.” The Greek
      verb can refer to healing as well as salvation.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Standard connective; retained as simple narrative coordination without
    adding interpretive force.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: Natural and direct rendering of the speech introduction, preserving the
    dative indirect object.
- source_word: Ἀνάβλεψον
  chosen: Receive your sight
  alternatives:
  - See again
  - Look up
  - Regain your sight
  lexicon: BDAG
  rationale: In this healing context ἀναβλέπω refers to recovering sight, not merely
    looking upward. 'Receive your sight' is idiomatic modern English and fits Jesus'
    healing command. 'Regain your sight' is possible, but the immediate context does
    not require emphasis on prior possession in the English wording.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. Here
    it denotes the man's believing reliance on Jesus. 'Trust' is a viable nuance,
    and 'faithfulness' is less likely in this context but preserved as a lexical alternative
    because the term can bear that sense in other contexts.
- source_word: σέσωκέν
  chosen: has saved
  alternatives:
  - has made you well
  - has healed you
  lexicon: BDAG
  rationale: The perfect of σῴζω can mean save, heal, or make well. 'Has saved you'
    preserves Luke's characteristic theological breadth, allowing both physical restoration
    and a fuller salvific sense, rather than narrowing it to bodily healing alone.
