id: LUK.18.22
reference: Luke 18:22
source:
  edition: SBLGNT
  text: ἀκούσας ⸀δὲ ὁ Ἰησοῦς εἶπεν αὐτῷ· Ἔτι ἕν σοι λείπει· πάντα ὅσα ἔχεις πώλησον
    καὶ διάδος πτωχοῖς, καὶ ἕξεις θησαυρὸν ἐν ⸀οὐρανοῖς, καὶ δεῦρο ἀκολούθει μοι.
translation:
  text: 'When Jesus heard this, he said to him, “One thing still lacks for you: sell
    all that you have and distribute it to the poor, and you will have treasure in
    heaven; and come, follow me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You still lack one thing.' The Greek more literally says, 'One thing
      still lacks for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'treasure in the heavens.' Greek has the plural 'heavens,' but English
      idiom commonly uses the singular 'heaven' here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας δὲ
  chosen: When ... heard this
  alternatives:
  - And after hearing
  - But when ... heard
  lexicon: BDAG
  rationale: The aorist participle with δέ is naturally rendered as a temporal clause
    in English. 'When Jesus heard this' is idiomatic and preserves the sequence without
    over-literal awkwardness.
- source_word: Ἔτι ἕν σοι λείπει
  chosen: One thing still lacks for you
  alternatives:
  - You still lack one thing
  - One thing is still lacking to you
  lexicon: BDAG
  rationale: λείπει literally means 'is lacking' or 'is missing.' Rendering it as
    'lacks for you' keeps the Greek subject ('one thing') rather than shifting to
    'you lack,' while remaining understandable. This preserves the emphasis on the
    single remaining deficiency.
- source_word: πάντα ὅσα ἔχεις
  chosen: all that you have
  alternatives:
  - everything you have
  - all the things you possess
  lexicon: BDAG
  rationale: This idiomatic English rendering accurately reflects the comprehensive
    force of πάντα ὅσα without sounding wooden.
- source_word: πώλησον
  chosen: sell
  alternatives:
  - sell off
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive action; simple 'sell' best matches
    the command in natural English.
- source_word: διάδος πτωχοῖς
  chosen: distribute it to the poor
  alternatives:
  - give to the poor
  - share with the poor
  lexicon: BDAG
  rationale: διαδίδωμι has the sense of distributing or apportioning, slightly more
    specific than a generic 'give.' 'Distribute it to the poor' preserves that nuance
    and makes explicit that the proceeds/resources are in view.
- source_word: πτωχοῖς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: Standard idiomatic rendering for the substantival adjective; clear and
    natural in English.
- source_word: ἕξεις θησαυρὸν ἐν οὐρανοῖς
  chosen: you will have treasure in heaven
  alternatives:
  - you will have treasure in the heavens
  - you will possess treasure in heaven
  lexicon: BDAG
  rationale: Although the Greek has plural 'heavens,' idiomatic English in this context
    is singular 'heaven.' This preserves meaning without unnecessary Hebraizing. 'Treasure'
    is the standard rendering of θησαυρός.
- source_word: δεῦρο
  chosen: come
  alternatives:
  - come here
  - then come
  lexicon: BDAG
  rationale: δεῦρο is an adverb functioning imperativally, inviting movement toward
    Jesus. 'Come' is concise and idiomatic.
- source_word: ἀκολούθει μοι
  chosen: follow me
  alternatives:
  - keep following me
  - be following me
  lexicon: BDAG
  rationale: The present imperative can imply ongoing discipleship, but in English
    'follow me' naturally carries that force in this context. A more explicit progressive
    rendering would sound unnatural.
