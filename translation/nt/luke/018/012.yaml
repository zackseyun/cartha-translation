theological_decisions:
- issue: Meaning of τοῦ σαββάτου in the fasting claim
  chosen_reading: 'idiomatic temporal sense: ''a week'''
  alternative_readings:
  - more literal 'of the Sabbath'
  rationale: The phrase is not making a theological statement about Sabbath observance
    but expressing frequency. Rendering it idiomatically avoids misleading the reader
    into thinking the speaker fasts specifically on Sabbath days twice, which is not
    the plain sense.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §6, readable modern English
