id: LUK.18.12
reference: Luke 18:12
source:
  edition: SBLGNT
  text: νηστεύω δὶς τοῦ σαββάτου, ⸀ἀποδεκατῶ πάντα ὅσα κτῶμαι.
translation:
  text: I fast twice a week; I tithe everything I acquire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'twice of the Sabbath,' an idiom meaning 'twice a week.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νηστεύω
  chosen: I fast
  alternatives:
  - I am fasting
  lexicon: BDAG
  rationale: 'Present indicative in this self-description is best rendered as a customary
    present: the speaker claims a regular practice of fasting.'
- source_word: δὶς
  chosen: twice
  lexicon: BDAG
  rationale: Straightforward adverb meaning 'twice.'
- source_word: τοῦ σαββάτου
  chosen: a week
  alternatives:
  - of the week
  - in the week
  lexicon: BDAG
  rationale: Although literally 'of the Sabbath,' this idiom in Koine usage refers
    to the weekly cycle. In context, 'twice a week' is the natural English equivalent
    and reflects the idiomatic sense rather than a wooden rendering.
- source_word: ἀποδεκατῶ
  chosen: I tithe
  alternatives:
  - I give a tenth
  lexicon: BDAG
  rationale: The verb specifically denotes giving a tenth. 'I tithe' is concise, accurate,
    and natural modern English.
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  - all
  lexicon: BDAG
  rationale: Neuter plural used comprehensively; 'everything' gives the full distributive
    sense in idiomatic English.
- source_word: ὅσα
  chosen: that
  alternatives:
  - whatever
  - as much as
  lexicon: BDAG
  rationale: Introduces the scope of what is tithed. In English, 'everything I acquire'
    naturally absorbs the relative force without awkwardness.
- source_word: κτῶμαι
  chosen: I acquire
  alternatives:
  - I get
  - I gain
  - I possess
  lexicon: BDAG
  rationale: The middle verb commonly means to acquire or gain for oneself. 'I acquire'
    fits the context of income or possessions from which tithes are calculated better
    than the stative 'I possess.'
