id: LUK.18.9
reference: Luke 18:9
source:
  edition: SBLGNT
  text: Εἶπεν δὲ ⸀καὶ πρός τινας τοὺς πεποιθότας ἐφ’ ἑαυτοῖς ὅτι εἰσὶν δίκαιοι καὶ
    ἐξουθενοῦντας τοὺς λοιποὺς τὴν παραβολὴν ταύτην·
translation:
  text: 'And he also told this parable to some who trusted in themselves that they
    were righteous and treated the rest with contempt:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despising others' / 'looking down on the others.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: he ... told
  alternatives:
  - he said
  - he spoke
  lexicon: BDAG
  rationale: λέγω can be rendered broadly as 'say' or 'tell.' Because the object is
    'this parable,' English idiom prefers 'told this parable' over 'said this parable,'
    while preserving the narrative force.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is natural
    modern English and avoids overstating contrast.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  - ''
  lexicon: BDAG
  rationale: The adverbial καί modifies the verbal idea, indicating an additional
    saying/parabolic teaching. 'Also' captures this additive sense clearly.
- source_word: πρός τινας
  chosen: to some
  alternatives:
  - for some
  - against some
  lexicon: BDAG
  rationale: πρός with persons after a speech verb commonly indicates the audience
    addressed. 'To some' is the most straightforward rendering.
- source_word: τοὺς πεποιθότας ἐφ’ ἑαυτοῖς
  chosen: who trusted in themselves
  alternatives:
  - who were confident in themselves
  - who had put confidence in themselves
  lexicon: BDAG
  rationale: The perfect participle πεποιθότας denotes a settled state of confidence;
    ἐφ’ ἑαυτοῖς specifies self-reliance. 'Trusted in themselves' is concise and preserves
    the reflexive focus.
- source_word: ὅτι εἰσὶν δίκαιοι
  chosen: that they were righteous
  alternatives:
  - that they were in the right
  - that they were just
  lexicon: BDAG
  rationale: δίκαιοι here describes their self-assessment as righteous before God/others,
    not merely legally correct. 'Righteous' preserves the moral-religious sense and
    aligns with key biblical terminology.
- source_word: ἐξουθενοῦντας
  chosen: treated ... with contempt
  alternatives:
  - despised
  - looked down on
  - scorned
  lexicon: BDAG
  rationale: ἐξουθενέω means to regard as nothing, despise, or treat with contempt.
    'Treated ... with contempt' expresses the active participial force and avoids
    sounding merely emotional.
- source_word: τοὺς λοιπούς
  chosen: the rest
  alternatives:
  - others
  - everyone else
  lexicon: BDAG
  rationale: λοιποί means 'the rest' or 'the others.' 'The rest' is a close rendering;
    'everyone else' is possible but slightly more expansive than the Greek.
- source_word: τὴν παραβολὴν ταύτην
  chosen: this parable
  alternatives:
  - this illustration
  - this comparison
  lexicon: BDAG
  rationale: παραβολή in the Synoptics is standardly 'parable.' That established gloss
    is accurate here and preserves genre recognition.
