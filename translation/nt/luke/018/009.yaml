theological_decisions:
- issue: Rendering δίκαιοι in a context of self-righteousness
  chosen_reading: righteous
  alternative_readings:
  - just
  - in the right
  rationale: Although the verse critiques self-righteous confidence, the Greek term
    itself is δίκαιοι, not a pejorative form. Rendering it 'righteous' preserves the
    theological vocabulary and lets the context supply the irony/critique rather than
    importing interpretation into the gloss.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
