theological_decisions:
- issue: Scope of τῶν τοιούτων
  chosen_reading: Jesus speaks not only of the specific children present but of persons
    characterized by childlike status or quality.
  alternative_readings:
  - Jesus refers only to the literal children being brought to him.
  rationale: The expression 'of such as these' naturally extends beyond the immediate
    individuals to a class represented by them. This preserves the text's theological
    tension without specifying in this verse exactly which childlike qualities are
    in view.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
