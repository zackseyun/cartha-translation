id: LUK.18.16
reference: Luke 18:16
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸂προσεκαλέσατο αὐτὰ λέγων⸃· Ἄφετε τὰ παιδία ἔρχεσθαι πρός με καὶ
    μὴ κωλύετε αὐτά, τῶν γὰρ τοιούτων ἐστὶν ἡ βασιλεία τοῦ θεοῦ.
translation:
  text: But Jesus called for them, saying, “Let the children come to me, and do not
    hinder them, for the kingdom of God belongs to such as these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for of such is the kingdom of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεκαλέσατο
  chosen: called for
  alternatives:
  - called
  - called to himself
  lexicon: BDAG
  rationale: Middle voice of προσκαλέομαι commonly means to summon or call to oneself.
    'Called for' fits the context of Jesus having the children brought near without
    over-specifying reflexive force.
- source_word: αὐτὰ
  chosen: them
  alternatives:
  - the children
  - those children
  lexicon: BDAG
  rationale: The pronoun refers back to the children. Rendering as 'them' preserves
    the Greek pronominal flow; the following explicit noun 'the children' clarifies
    the referent.
- source_word: Ἄφετε
  chosen: Let
  alternatives:
  - Allow
  - Permit
  lexicon: BDAG
  rationale: Imperative of ἀφίημι here means to allow or permit. 'Let' is idiomatic
    in English with an infinitive complement ('let ... come') and preserves the directness
    of Jesus's command.
- source_word: τὰ παιδία
  chosen: the children
  alternatives:
  - the little children
  - the young children
  lexicon: BDAG
  rationale: παιδία denotes children, often young children. 'The children' is the
    most direct rendering of the noun itself; adding 'little' would import nuance
    more explicit in some English traditions than in this word alone, though the context
    does involve young children.
- source_word: ἔρχεσθαι πρός με
  chosen: come to me
  alternatives:
  - come near me
  - come toward me
  lexicon: BDAG
  rationale: Standard infinitival construction after Ἄφετε. 'Come to me' is natural
    English and accurately reflects movement toward Jesus.
- source_word: μὴ κωλύετε
  chosen: do not hinder
  alternatives:
  - do not prevent
  - stop hindering
  lexicon: BDAG
  rationale: κωλύω means to hinder, prevent, or forbid. 'Do not hinder' is concise
    and preserves the broad sense without implying only a completed prevention. 'Stop
    hindering' is possible if the present imperative is taken as prohibiting ongoing
    action, but that nuance is not required in English.
- source_word: τῶν ... τοιούτων
  chosen: such as these
  alternatives:
  - such ones
  - people like these
  - such as these children
  lexicon: BDAG
  rationale: The genitive plural with τοιοῦτος points beyond the immediate children
    to those characterized like them. 'Such as these' preserves that representative
    force better than a strictly literal but awkward 'such ones'.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God belongs to
  alternatives:
  - is for
  - is of
  - belongs to such people as these
  lexicon: BDAG
  rationale: The genitive construction τῶν τοιούτων ἐστὶν ἡ βασιλεία τοῦ θεοῦ is literally
    'of such is the kingdom of God.' In idiomatic English, 'belongs to such as these'
    communicates possession/association clearly while preserving the theological sense
    that the kingdom pertains to such people.
