id: LUK.18.28
reference: Luke 18:28
source:
  edition: SBLGNT
  text: Εἶπεν δὲ ⸀ὁ Πέτρος· Ἰδοὺ ἡμεῖς ⸂ἀφέντες τὰ ἴδια⸃ ἠκολουθήσαμέν σοι.
translation:
  text: Then Peter said, “Look, we have left our own things and followed you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what was our own” or “our own possessions.” The Greek expression is
      broad and does not specify exactly what Peter and the others left.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in straightforward narrative.
    No contextual reason requires a more marked English verb.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative continuation and mild contrast/transition. 'Then'
    gives readable English discourse flow without overstating contrast.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getter. 'Look' preserves the force in modern readable
    English better than the archaic 'Behold,' while remaining more vivid than omitting
    it.
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English can convey this adequately
    with normal 'we' in this context, especially alongside 'Look.' A more emphatic
    rendering is possible but not necessary.
- source_word: ἀφέντες
  chosen: have left
  alternatives:
  - left behind
  - forsaken
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having left'), idiomatic English
    in coordination with the main verb is best expressed as 'have left ... and followed.'
    'Forsaken' is too strong here; 'left behind' is possible but slightly more interpretive.
- source_word: τὰ ἴδια
  chosen: our own things
  alternatives:
  - what was our own
  - our own possessions
  - our homes
  lexicon: BDAG
  rationale: The phrase is broad and literally refers to 'the things [that are] one's
    own.' 'Our own things' preserves the open-ended sense without narrowing it to
    houses or possessions only. 'Our own possessions' is plausible but slightly more
    specific than the Greek.
- source_word: ἠκολουθήσαμέν σοι
  chosen: followed you
  alternatives:
  - become your followers
  - gone after you
  lexicon: BDAG
  rationale: ἀκολουθέω with dative is the standard discipleship verb 'follow.' 'Followed
    you' is both natural and theologically appropriate, preserving the discipleship
    nuance without paraphrase.
