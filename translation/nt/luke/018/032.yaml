id: LUK.18.32
reference: Luke 18:32
source:
  edition: SBLGNT
  text: παραδοθήσεται γὰρ τοῖς ἔθνεσιν καὶ ἐμπαιχθήσεται καὶ ὑβρισθήσεται καὶ ἐμπτυσθήσεται,
translation:
  text: For he will be handed over to the Gentiles and will be mocked and mistreated
    and spit on,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the nations.' Here the sense is specifically non-Jewish people, that
      is, the Gentiles.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be insulted' or 'will be shamefully treated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδοθήσεται
  chosen: will be handed over
  alternatives:
  - will be delivered over
  - will be betrayed
  lexicon: BDAG
  rationale: Future passive of παραδίδωμι. 'Handed over' is the broad, natural English
    equivalent that preserves the passive and does not prematurely narrow the agent
    or motive. 'Betrayed' would be too specific in this context, since the immediate
    focus is transfer into Gentile hands.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory force connecting this line to the preceding prediction.
    'For' preserves the discourse linkage succinctly and formally.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Luke-Acts, ἔθνη commonly refers to non-Jews/Gentiles rather than nations
    in the abstract. 'Gentiles' best fits the historical setting of Jesus being delivered
    to non-Jewish authorities.
- source_word: ἐμπαιχθήσεται
  chosen: will be mocked
  alternatives:
  - will be ridiculed
  - will be made fun of
  lexicon: BDAG
  rationale: Future passive of ἐμπαίζω, denoting derision or mockery. 'Mocked' is
    the standard, weighty English equivalent and suits the passion context.
- source_word: ὑβρισθήσεται
  chosen: will be mistreated
  alternatives:
  - will be insulted
  - will be shamefully treated
  - will be abused
  lexicon: BDAG
  rationale: Future passive of ὑβρίζω can denote insulting, mistreating, or treating
    outrageously. 'Mistreated' captures the broader abusive sense without reducing
    it to verbal insult alone, fitting the escalating sequence of abuse.
- source_word: ἐμπτυσθήσεται
  chosen: spit on
  alternatives:
  - spat upon
  lexicon: BDAG
  rationale: Future passive of ἐμπτύω. English idiom prefers 'spit on' over the more
    archaic 'spat upon,' while preserving the concrete indignity of the act.
