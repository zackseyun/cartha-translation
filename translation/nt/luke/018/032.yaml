theological_decisions:
- issue: Referent of the implied subject in the passive verbs
  chosen_reading: Rendered as 'he' in English, referring to the Son of Man from the
    preceding context
  rationale: The Greek verbs are third person singular passive without an explicit
    subject in this verse, but the antecedent is clear from the immediately preceding
    context (Luke 18:31). Supplying 'he' is required for natural English and does
    not add new theological content.
  doctrine_reference: Translation philosophy §6 (readable modern English)
