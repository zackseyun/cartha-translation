id: LUK.18.23
reference: Luke 18:23
source:
  edition: SBLGNT
  text: ὁ δὲ ἀκούσας ταῦτα περίλυπος ⸀ἐγενήθη, ἦν γὰρ πλούσιος σφόδρα.
translation:
  text: But when he heard these things, he became very sorrowful, for he was extremely
    rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deeply grieved.' The Greek adjective indicates intense sorrow or distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context; 'when he heard' is
    natural English and preserves the sequence of response.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: Plural demonstrative refers to Jesus' preceding statements. 'These things'
    is a straightforward, sufficiently formal rendering.
- source_word: περίλυπος
  chosen: very sorrowful
  alternatives:
  - deeply grieved
  - greatly saddened
  lexicon: BDAG
  rationale: The adjective denotes being deeply distressed or grieved. 'Very sorrowful'
    preserves the emotional weight while fitting idiomatic English with the following
    verb.
- source_word: ἐγενήθη
  chosen: he became
  alternatives:
  - he was
  - he came to be
  lexicon: BDAG
  rationale: γίνομαι here marks entry into a state, not mere stative existence. 'He
    became' best reflects the ingressive sense.
- source_word: πλούσιος
  chosen: rich
  alternatives:
  - wealthy
  lexicon: BDAG
  rationale: Standard rendering for the adjective; concise and natural in English.
- source_word: σφόδρα
  chosen: extremely
  alternatives:
  - very
  - exceedingly
  lexicon: BDAG
  rationale: The adverb intensifies his wealth strongly. 'Extremely' captures the
    force more fully than a simple 'very,' while remaining natural modern English.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding exchange and the man's reaction. 'But'
    brings out that contrast clearly in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanation for his sorrow. 'For' is concise and preserves
    the explanatory relation.
