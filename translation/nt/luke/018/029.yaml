id: LUK.18.29
reference: Luke 18:29
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι οὐδείς ἐστιν ὃς ἀφῆκεν οἰκίαν ἢ ⸂γυναῖκα
    ἢ ἀδελφοὺς ἢ γονεῖς⸃ ἢ τέκνα ἕνεκεν τῆς βασιλείας τοῦ θεοῦ,
translation:
  text: And he said to them, “Truly I say to you, there is no one who has left a house
    or wife or brothers or parents or children for the sake of the kingdom of God,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “siblings” or “brothers and sisters,” if the reference is understood
      inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In Jesus' introductory formula Ἀμὴν λέγω ὑμῖν, English 'Truly I say to
    you' communicates the solemn affirmation idiomatically while preserving its force.
    'Amen' is possible but less natural in running English here.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the recognizable discourse formula
    without becoming wooden. 'I tell you' is idiomatic but slightly more dynamic.
- source_word: οὐδείς ἐστιν ὃς
  chosen: there is no one who
  alternatives:
  - no one is who
  - no one who
  lexicon: BDAG
  rationale: This renders the existential construction naturally in English while
    preserving the universal-negative force.
- source_word: ἀφῆκεν
  chosen: has left
  alternatives:
  - left
  - has abandoned
  lexicon: BDAG
  rationale: The aorist is best rendered in English here with present relevance because
    the statement describes anyone who has made such a renunciation. 'Abandoned' is
    too strong and may imply wrongful desertion beyond the context.
- source_word: οἰκίαν
  chosen: a house
  alternatives:
  - home
  - household
  lexicon: BDAG
  rationale: '''House'' is the most direct lexical equivalent. ''Home'' is possible
    but more interpretive; ''household'' would shift the sense from property/dwelling
    to family unit.'
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In this family-list context alongside brothers, parents, and children,
    γυνή most naturally means 'wife,' not 'woman.' This also matches the relational
    sense in context.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - siblings
  - brothers and sisters
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the grammatically masculine plural
    is retained as 'brothers.' Although mixed siblings may be in view contextually,
    the source form is masculine and should not be flattened without note.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: γονεῖς is a standard inclusive term for one's parents. Rendering it as
    'father and mother' would be an expansion not present in the Greek.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons and daughters
  lexicon: BDAG
  rationale: τέκνα is a gender-inclusive kinship term meaning 'children.' 'Sons and
    daughters' is interpretive expansion.
- source_word: ἕνεκεν
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: BDAG
  rationale: '''For the sake of'' captures purpose/motivation well in readable English
    and fits discipleship-renunciation language.'
- source_word: βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the standard and accurate rendering. 'Reign of God' highlights
    dynamic rule but is less conventional and not required by the context.
