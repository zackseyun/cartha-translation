theological_decisions:
- issue: Potential misunderstanding of leaving family members as endorsing neglect
    or divorce
  chosen_reading: left ... for the sake of the kingdom of God
  alternative_readings:
  - abandoned ... for God's kingdom
  rationale: The Greek ἀφῆκεν can denote leaving behind without specifying the moral
    status of the act in abstraction. 'Left' preserves the text's wording and avoids
    importing a stronger claim such as 'abandoned,' which could imply an ethical endorsement
    not stated here. The verse speaks of costly renunciation in discipleship, not
    a blanket doctrinal approval of family neglect.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of masculine plural ἀδελφοὺς
  chosen_reading: brothers
  alternative_readings:
  - siblings
  - brothers and sisters
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is retained rather than neutralized. Because English readers may infer a broader
    family reference, an alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
