id: LUK.18.40
reference: Luke 18:40
source:
  edition: SBLGNT
  text: σταθεὶς δὲ ⸀ὁ Ἰησοῦς ἐκέλευσεν αὐτὸν ἀχθῆναι πρὸς αὐτόν. ἐγγίσαντος δὲ αὐτοῦ
    ἐπηρώτησεν αὐτόν·
translation:
  text: So Jesus stood still and ordered that he be brought to him. And when he came
    near, he asked him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stopped.' The Greek participle can be rendered more briefly, but 'stood
      still' makes explicit that Jesus halted in place.
    reason: lexical_alternative
  - marker: b
    text: Or 'be led to him.' The verb can denote being led or brought; here the broader
      'brought' best fits the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: σταθεὶς
  chosen: stood still
  alternatives:
  - stopped
  - stood
  lexicon: BDAG
  rationale: Aorist passive participle of ἵστημι used intransitively here; 'stood
    still' captures the sense that Jesus halted in place, more explicitly than bare
    'stood' and more formally than simply 'stopped.'
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. 'So' gives natural English narrative progression
    from the previous scene without implying strong contrast.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - directed
  - told
  lexicon: BDAG
  rationale: κελεύω denotes giving an order or command. 'Ordered' preserves the authoritative
    force while remaining idiomatic modern English.
- source_word: ἀχθῆναι
  chosen: be brought
  alternatives:
  - be led
  - be brought over
  lexicon: BDAG
  rationale: Aorist passive infinitive of ἄγω. In context of others bringing the blind
    man to Jesus, 'be brought' is the most natural English rendering; 'be led' is
    possible but narrower.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - before him
  - up to him
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward Jesus. 'To him' is
    straightforward and idiomatic.
- source_word: ἐγγίσαντος δὲ αὐτοῦ
  chosen: when he came near
  alternatives:
  - when he approached
  - after he came near
  lexicon: BDAG
  rationale: Genitive absolute with aorist participle of ἐγγίζω. 'When he came near'
    preserves the temporal sense in natural English. The subject is the blind man
    just mentioned.
- source_word: ἐπηρώτησεν
  chosen: he asked
  alternatives:
  - he questioned
  - he inquired of
  lexicon: BDAG
  rationale: ἐπερωτάω commonly means 'ask' or 'question.' Here 'asked' is the clearest
    and most natural choice.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
