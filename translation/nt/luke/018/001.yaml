theological_decisions:
- issue: Force of Jesus' teaching on prayer persistence
  chosen_reading: The verse states the necessity of continual prayer and perseverance
    without specifying a denominational doctrine of prayer efficacy.
  alternative_readings:
  - A stronger moral obligation ('they must always pray')
  - A softer descriptive emphasis ('they should keep praying')
  rationale: The Greek δεῖν expresses necessity, but the translation should not import
    a theological system about prayer beyond the text. 'Their need to pray always
    and not lose heart' preserves the exhortational force while leaving the theological
    tension intact.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
