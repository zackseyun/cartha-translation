id: LUK.18.1
reference: Luke 18:1
source:
  edition: SBLGNT
  text: Ἔλεγεν ⸀δὲ παραβολὴν αὐτοῖς πρὸς τὸ δεῖν πάντοτε προσεύχεσθαι ⸀αὐτοὺς καὶ
    μὴ ἐγκακεῖν,
translation:
  text: Now he was telling them a parable about their need to pray always and not
    lose heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to show that they ought always to pray and not become discouraged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: he was telling
  alternatives:
  - he said
  - he told
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or scene-setting past action; 'was
    telling' preserves the aspect better than simple past 'said.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective marking transition. 'Now' gives natural
    English discourse flow without overstating sequence.
- source_word: παραβολὴν
  chosen: a parable
  alternatives:
  - an illustration
  lexicon: BDAG
  rationale: Standard and accurate rendering for παραβολή in the Synoptic context;
    preserves genre and intertextual consistency.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative indirect object of Ἔλεγεν; straightforwardly refers to Jesus'
    audience.
- source_word: πρὸς τὸ δεῖν
  chosen: about their need
  alternatives:
  - to show that they ought
  - for the purpose that it is necessary
  lexicon: BDAG
  rationale: The construction πρὸς τὸ + infinitive expresses purpose/reference. Rendering
    it as 'about their need' is idiomatic English that still preserves the sense of
    necessity conveyed by δεῖν.
- source_word: δεῖν
  chosen: need
  alternatives:
  - ought
  - must
  - it is necessary
  lexicon: BDAG
  rationale: δεῖ conveys necessity. In this infinitival construction, 'need' fits
    naturally with the supplied subject αὐτούς and avoids overly stiff English while
    preserving obligation/necessity.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  - at all times
  lexicon: BDAG
  rationale: '''Always'' is the most direct and natural equivalent, preserving the
    force of continual persistence without implying uninterrupted verbal prayer in
    a wooden sense.'
- source_word: προσεύχεσθαι
  chosen: to pray
  lexicon: BDAG
  rationale: Standard rendering of the middle infinitive; no contextual reason to
    vary.
- source_word: αὐτοὺς
  chosen: their
  alternatives:
  - they
  - them
  lexicon: BDAG
  rationale: Although formally accusative ('them'), in English the infinitival clause
    is best rendered by making the pronoun possessive within 'their need,' which clearly
    represents the accusative subject of the infinitives.
- source_word: μὴ ἐγκακεῖν
  chosen: not lose heart
  alternatives:
  - not become discouraged
  - not give up
  - not grow weary
  lexicon: BDAG
  rationale: ἐγκακέω commonly means to lose courage or become weary/discouraged. 'Lose
    heart' is concise, idiomatic, and preserves the inward sense of discouragement
    in context of persistent prayer.
