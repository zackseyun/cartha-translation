id: LUK.18.10
reference: Luke 18:10
source:
  edition: SBLGNT
  text: Ἄνθρωποι δύο ἀνέβησαν εἰς τὸ ἱερὸν προσεύξασθαι, ⸀ὁ εἷς Φαρισαῖος καὶ ὁ ἕτερος
    τελώνης.
translation:
  text: Two men went up into the temple to pray, one a Pharisee and the other a tax
    collector.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνθρωποι δύο
  chosen: Two men
  alternatives:
  - Two people
  - Two human beings
  lexicon: BDAG
  rationale: ἄνθρωποι can mean people/humans generally, but here the subsequent masculine
    singular descriptions (ὁ εἷς... ὁ ἕτερος) and the specific identities indicate
    male individuals. This follows the gender-accurate principle.
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: BDAG
  rationale: ἀναβαίνω literally means 'go up/ascend.' 'Went up' preserves both the
    idiom of going to Jerusalem/the temple and natural English style better than the
    more formal 'ascended.'
- source_word: εἰς τὸ ἱερὸν
  chosen: into the temple
  alternatives:
  - to the temple precincts
  - into the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple' is the standard readable rendering; 'precincts' is more precise
    but less natural in the main text. The preposition εἰς is represented by 'into,'
    though in idiomatic English this can overlap with 'to' in this context.
- source_word: προσεύξασθαι
  chosen: to pray
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: 'The aorist middle infinitive expresses purpose: they went up for the
    purpose of praying. ''To pray'' is the most direct and natural rendering.'
- source_word: ὁ εἷς
  chosen: one
  alternatives:
  - the one
  lexicon: BDAG
  rationale: Here εἷς functions distributively in contrast with ὁ ἕτερος. English
    idiom prefers 'one ... and the other' rather than repeating the article explicitly.
- source_word: Φαρισαῖος
  chosen: a Pharisee
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish sect name; titles/groups are best
    represented by established English form.
- source_word: ὁ ἕτερος
  chosen: the other
  alternatives:
  - the second
  lexicon: BDAG
  rationale: ἕτερος marks the contrasting second person in the pair. 'The other' is
    the most natural counterpart to 'one' in English.
- source_word: τελώνης
  chosen: a tax collector
  alternatives:
  - a toll collector
  - a publican
  lexicon: BDAG
  rationale: τελώνης denotes a collector of taxes/tolls. 'Tax collector' is clear
    modern English; 'publican' is traditional but archaic and potentially misleading
    in contemporary usage.
