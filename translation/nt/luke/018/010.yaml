theological_decisions:
- issue: Rendering ἱερόν distinctly from ναός
  chosen_reading: temple
  alternative_readings:
  - temple precincts
  rationale: The verse refers to the broader temple complex, not specifically the
    inner sanctuary. The main text keeps the familiar 'temple' for readability while
    documenting the more precise nuance lexically.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender rendering of ἄνθρωποι
  chosen_reading: men
  alternative_readings:
  - people
  rationale: Although ἄνθρωποι can be generic, the immediate context identifies two
    male exemplars. This follows the gender-accurate principle rather than flattening
    to a neutral term.
  doctrine_reference: Translation philosophy §4
