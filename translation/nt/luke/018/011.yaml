id: LUK.18.11
reference: Luke 18:11
source:
  edition: SBLGNT
  text: ὁ Φαρισαῖος σταθεὶς ⸂πρὸς ἑαυτὸν ταῦτα⸃ προσηύχετο· Ὁ θεός, εὐχαριστῶ σοι
    ὅτι οὐκ εἰμὶ ⸀ὥσπερ οἱ λοιποὶ τῶν ἀνθρώπων, ἅρπαγες, ἄδικοι, μοιχοί, ἢ καὶ ὡς
    οὗτος ὁ τελώνης·
translation:
  text: 'The Pharisee, standing by himself, was praying these things: ‘God, I thank
    you that I am not like the rest of men—extortioners, unrighteous, adulterers—or
    even like this tax collector.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing, he was praying to himself these things.' The phrase 'πρὸς
      ἑαυτόν' may mean either that he stood apart or that his prayer was directed
      to himself in an ironic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: σταθεὶς
  chosen: standing
  alternatives:
  - having stood
  - standing there
  lexicon: BDAG
  rationale: Aorist participle of ἵστημι is naturally rendered as a circumstantial
    participle introducing his posture. 'Standing' is idiomatic English and preserves
    the scene without overformalizing.
- source_word: πρὸς ἑαυτὸν
  chosen: by himself
  alternatives:
  - to himself
  - about himself
  lexicon: BDAG
  rationale: The phrase can mean spatially 'by himself' or reflexively 'to himself.'
    In this context both may be suggestive, but 'by himself' best fits the immediate
    narrative setting while avoiding an interpretive overstatement that he was merely
    praying inwardly. The alternative is preserved in a footnote because many understand
    it as indicating self-directed prayer.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - thus
  - this
  lexicon: BDAG
  rationale: The accusative plural demonstrative is most straightforwardly 'these
    things,' referring to the content of the prayer that follows. This is more textually
    precise than smoothing to 'thus.'
- source_word: προσηύχετο
  chosen: was praying
  alternatives:
  - prayed
  lexicon: BDAG
  rationale: The imperfect middle/passive form suggests ongoing action in narrative;
    'was praying' preserves that aspect better than the simple past 'prayed.'
- source_word: εὐχαριστῶ σοι
  chosen: I thank you
  alternatives:
  - I give thanks to you
  lexicon: BDAG
  rationale: Standard idiomatic rendering of εὐχαριστέω with dative pronoun. 'I thank
    you' is natural modern English and fully preserves the sense.
- source_word: ὥσπερ οἱ λοιποὶ τῶν ἀνθρώπων
  chosen: like the rest of men
  alternatives:
  - like other people
  - like the rest of humanity
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, but the speaker is contrasting
    himself with other persons in a representative masculine form. Per the gender-accurate
    philosophy, 'men' is retained as a natural rendering of the masculine plural in
    this rhetorical setting, while the sense is generic. 'The rest of men' also preserves
    λοιποί ('the rest').
- source_word: ἅρπαγες
  chosen: extortioners
  alternatives:
  - robbers
  - swindlers
  lexicon: BDAG
  rationale: ἅρπαξ can denote one who seizes greedily, often by exploitation. 'Extortioners'
    fits the vice-list context better than the more physical 'robbers' and aligns
    with the moral accusation being made.
- source_word: ἄδικοι
  chosen: unrighteous
  alternatives:
  - unjust
  - wicked
  lexicon: BDAG
  rationale: '''Unrighteous'' preserves the moral/religious dimension of ἄδικος better
    than the narrower civic term ''unjust.'' It also resonates with biblical diction
    without becoming archaic.'
- source_word: μοιχοί
  chosen: adulterers
  alternatives:
  - the adulterous
  lexicon: BDAG
  rationale: The plural substantive is naturally rendered 'adulterers' in English
    and fits the vice list.
- source_word: ἢ καὶ ὡς οὗτος ὁ τελώνης
  chosen: or even like this tax collector
  alternatives:
  - or also like this tax collector
  lexicon: BDAG
  rationale: ἢ καὶ heightens the comparison; 'or even' captures the climactic contempt
    directed at the nearby tax collector. 'Tax collector' is the standard rendering
    of τελώνης.
