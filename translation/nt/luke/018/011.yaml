theological_decisions:
- issue: Sense of πρὸς ἑαυτόν in the Pharisee's prayer
  chosen_reading: Rendered spatially as 'by himself' in the main text
  alternative_readings:
  - Rendered reflexively as 'to himself'
  rationale: The Greek phrase is ambiguous and can suggest either that he stood apart
    or that his prayer was effectively self-directed. To preserve the narrative flow
    without importing a stronger interpretive judgment into the main text, the translation
    uses 'by himself' and preserves 'to himself' in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
