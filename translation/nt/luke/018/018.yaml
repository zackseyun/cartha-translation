theological_decisions:
- issue: Rendering the salvation question in relation to human action
  chosen_reading: what must I do to inherit eternal life
  alternative_readings:
  - what shall I do to inherit eternal life
  - what, having done, will I inherit eternal life
  rationale: The Greek wording presents the ruler's question in terms of required
    action without endorsing that framework as Luke's theology of salvation. The translation
    preserves the man's own formulation rather than softening it or importing later
    doctrinal clarification.
  doctrine_reference: Preserve theological tension rather than resolve it.
