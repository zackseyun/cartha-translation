id: LUK.18.18
reference: Luke 18:18
source:
  edition: SBLGNT
  text: Καὶ ἐπηρώτησέν τις αὐτὸν ἄρχων λέγων· Διδάσκαλε ἀγαθέ, τί ποιήσας ζωὴν αἰώνιον
    κληρονομήσω;
translation:
  text: And a ruler asked him, saying, “Good Teacher, what must I do to inherit eternal
    life?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “what, having done, will I inherit eternal life?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησέν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: The verb ἐπερωτάω commonly means to ask or question. 'Asked' is the most
    natural modern English rendering here and fits the narrative style without overstating
    the formality of the inquiry.
- source_word: τις
  chosen: a
  alternatives:
  - someone
  - a certain
  lexicon: BDAG
  rationale: 'The indefinite pronoun introduces an unspecified individual. Because
    ἄρχων supplies the substantive identification, English idiom is best served by
    folding τις into the article-like sense: ''a ruler.'''
- source_word: ἄρχων
  chosen: ruler
  alternatives:
  - leader
  - official
  lexicon: BDAG
  rationale: ἄρχων denotes a person in authority. 'Ruler' is the standard and sufficiently
    broad rendering, preserving the social status indicated by Luke without over-specifying
    the office.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally represented by 'saying' after the main verb.
    This preserves the Greek discourse flow while remaining idiomatic in English.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: διδάσκαλος means 'teacher.' 'Master' is traditional in some English versions
    but is less precise and can suggest authority rather than instruction. 'Teacher'
    best reflects the lexical sense.
- source_word: ἀγαθέ
  chosen: Good
  alternatives:
  - virtuous
  - noble
  lexicon: BDAG
  rationale: ἀγαθός here functions as a direct address modifying 'Teacher.' 'Good'
    is the straightforward and contextually appropriate rendering, preserving the
    wording that Jesus will immediately engage in the next verse.
- source_word: τί ποιήσας
  chosen: what must I do
  alternatives:
  - what, having done, shall I
  - what should I do
  lexicon: BDAG
  rationale: 'The aorist participle ποιήσας with the future verb κληρονομήσω expresses
    means or prerequisite: ''what must I do to inherit...?'' This is a standard idiomatic
    English rendering that preserves the sense without woodenly reproducing the participial
    construction.'
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age to come
  lexicon: BDAG
  rationale: This is the established and accurate rendering of the phrase in this
    context. 'Life of the age to come' brings out possible nuance in αἰώνιος, but
    'eternal life' is both faithful and idiomatic in Luke's usage.
- source_word: κληρονομήσω
  chosen: inherit
  alternatives:
  - receive as an inheritance
  - obtain
  lexicon: BDAG
  rationale: κληρονομέω carries inheritance language, which should be preserved because
    it is theologically and narratively significant. 'Inherit' is concise and accurate.
