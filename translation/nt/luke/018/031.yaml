id: LUK.18.31
reference: Luke 18:31
source:
  edition: SBLGNT
  text: Παραλαβὼν δὲ τοὺς δώδεκα εἶπεν πρὸς αὐτούς· Ἰδοὺ ἀναβαίνομεν εἰς ⸀Ἰερουσαλήμ,
    καὶ τελεσθήσεται πάντα τὰ γεγραμμένα διὰ τῶν προφητῶν τῷ υἱῷ τοῦ ἀνθρώπου·
translation:
  text: Then taking the twelve aside, he said to them, “Look, we are going up to Jerusalem,
    and everything written through the prophets about the Son of Man will be fulfilled.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all the things written by the prophets for the Son of Man"; the Greek
      construction can be taken more literally, but here likely means what the prophets
      wrote concerning him.
    reason: alternative_reading
lexical_decisions:
- source_word: Παραλαβὼν
  chosen: taking ... aside
  alternatives:
  - taking
  - taking with him
  - drawing aside
  lexicon: BDAG
  rationale: The participle from παραλαμβάνω here implies taking the twelve along/apart
    for private instruction, not merely receiving them. 'Taking the twelve aside'
    captures the contextual nuance naturally in English.
- source_word: τοὺς δώδεκα
  chosen: the twelve
  alternatives:
  - the twelve disciples
  lexicon: BDAG
  rationale: The Greek simply says 'the twelve'; adding 'disciples' would interpret
    rather than translate. The expression is a recognized designation for Jesus' inner
    group.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English better than the archaic 'Behold.'
- source_word: ἀναβαίνομεν
  chosen: we are going up
  alternatives:
  - we are going
  - we go up
  lexicon: BDAG
  rationale: The present tense with ἀνά naturally conveys ascent, and 'going up' is
    idiomatic for travel to Jerusalem, preserving both geography and narrative immediacy.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: τελεσθήσεται
  chosen: will be fulfilled
  alternatives:
  - will be accomplished
  - will be completed
  lexicon: BDAG
  rationale: The future passive indicates that what has been written will reach its
    intended completion. 'Will be fulfilled' is the most natural rendering in prophetic
    context and matches the scriptural-fulfillment theme.
- source_word: πάντα τὰ γεγραμμένα
  chosen: everything written
  alternatives:
  - all the things that have been written
  - all that is written
  lexicon: BDAG
  rationale: This compresses the Greek idiom into natural English while preserving
    the totality expressed by πάντα and the perfect participle γεγραμμένα.
- source_word: διὰ τῶν προφητῶν
  chosen: through the prophets
  alternatives:
  - by the prophets
  lexicon: BDAG
  rationale: διά with the genitive often marks agency or instrumentality. 'Through
    the prophets' preserves the sense that God spoke by means of them, fitting biblical
    prophetic idiom.
- source_word: τῷ υἱῷ τοῦ ἀνθρώπου
  chosen: about the Son of Man
  alternatives:
  - for the Son of Man
  - concerning the Son of Man
  lexicon: BDAG
  rationale: 'Although the dative can be rendered more literally as ''to/for the Son
    of Man,'' in this construction with ''the things written through the prophets''
    the sense in English is best expressed as content/reference: what is written concerning
    him. ''Son of Man'' is translated, not paraphrased, preserving the title''s theological
    and intertextual weight.'
