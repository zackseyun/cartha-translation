theological_decisions:
- issue: Rendering the christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The traditional but still transparent rendering 'the Son of Man' preserves
    the Greek wording and its likely Danielic resonance without flattening the title
    into a generic expression. This maintains theological tension and intertextual
    depth.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological
    tension rather than resolve it.'
