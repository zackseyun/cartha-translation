id: LUK.18.3
reference: Luke 18:3
source:
  edition: SBLGNT
  text: χήρα δὲ ἦν ἐν τῇ πόλει ἐκείνῃ καὶ ἤρχετο πρὸς αὐτὸν λέγουσα· Ἐκδίκησόν με
    ἀπὸ τοῦ ἀντιδίκου μου.
translation:
  text: And there was a widow in that city, and she kept coming to him, saying, ‘Give
    me justice against my adversary.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Vindicate me from my adversary” or “Grant me justice against my opponent.”
      The Greek verb can carry the sense of securing legal justice or vindication,
      not necessarily personal revenge.
    reason: lexical_alternative
lexical_decisions:
- source_word: χήρα
  chosen: widow
  lexicon: BDAG
  rationale: Standard and precise rendering for an adult woman whose husband has died;
    socially significant in the parable's setting.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Connective particle marking continuation in narrative. 'And' preserves
    the flow naturally in English without overinterpreting contrast.
- source_word: ἦν
  chosen: there was
  alternatives:
  - was
  lexicon: BDAG
  rationale: Existential use of εἰμί is best represented idiomatically as 'there was'
    in English.
- source_word: ἐν τῇ πόλει ἐκείνῃ
  chosen: in that city
  alternatives:
  - in that town
  lexicon: BDAG
  rationale: Direct rendering of the prepositional phrase; 'city' matches πόλις more
    closely than 'town'.
- source_word: ἤρχετο
  chosen: kept coming
  alternatives:
  - was coming
  - came repeatedly
  lexicon: BDAG
  rationale: Imperfect middle indicates repeated or customary action in context; 'kept
    coming' captures the persistence central to the parable.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - before him
  lexicon: BDAG
  rationale: With verbs of motion, πρός commonly indicates movement toward a person;
    'to him' is the most natural English equivalent here.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - and saying
  - while saying
  lexicon: BDAG
  rationale: Present participle expressing attendant speech accompanying her repeated
    coming; 'saying' is concise and natural.
- source_word: Ἐκδίκησόν με
  chosen: Give me justice
  alternatives:
  - Vindicate me
  - Grant me justice
  - Avenge me
  lexicon: BDAG
  rationale: ἐκδικέω here is legal/judicial in context, not primarily retaliatory.
    'Give me justice' communicates her plea for legal redress in accessible modern
    English.
- source_word: ἀπὸ τοῦ ἀντιδίκου μου
  chosen: against my adversary
  alternatives:
  - from my opponent
  - against my accuser
  lexicon: BDAG
  rationale: ἀντίδικος denotes an opponent in a legal dispute or adversary. 'Against
    my adversary' fits the judicial setting and works idiomatically with 'give me
    justice.'
