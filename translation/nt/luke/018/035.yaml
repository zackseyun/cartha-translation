id: LUK.18.35
reference: Luke 18:35
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ ἐγγίζειν αὐτὸν εἰς Ἰεριχὼ τυφλός τις ἐκάθητο παρὰ τὴν ὁδὸν
    ⸀ἐπαιτῶν.
translation:
  text: Now as he was approaching Jericho, a certain blind man was sitting beside
    the road, begging.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was drawing near to Jericho.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'a blind man'; the Greek τις adds a slight sense of 'a certain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now
  alternatives:
  - And it happened
  - Then it happened
  - Now it happened
  lexicon: BDAG
  rationale: The idiom ἐγένετο δὲ often functions as a narrative transition rather
    than contributing full lexical weight in English. 'Now' preserves the discourse
    shift in readable modern English without woodenly reproducing 'it happened.'
- source_word: ἐν τῷ ἐγγίζειν αὐτὸν
  chosen: as he was approaching
  alternatives:
  - while he was drawing near
  - as he drew near
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous time. 'As
    he was approaching' captures the ongoing aspect and natural English flow.
- source_word: εἰς Ἰεριχὼ
  chosen: Jericho
  alternatives:
  - to Jericho
  - near Jericho
  lexicon: BDAG
  rationale: With ἐγγίζω, εἰς marks movement toward the city. In English, 'approaching
    Jericho' naturally incorporates the directional force, so 'to' need not be repeated.
- source_word: τυφλός τις
  chosen: a certain blind man
  alternatives:
  - a blind man
  - a certain man, blind
  lexicon: BDAG
  rationale: τις adds indefiniteness with a slight individuating force. 'A certain
    blind man' preserves that nuance better than simply 'a blind man,' while remaining
    idiomatic.
- source_word: ἐκάθητο
  chosen: was sitting
  alternatives:
  - sat
  - was seated
  lexicon: BDAG
  rationale: The imperfect indicates ongoing past action or scene-setting. 'Was sitting'
    reflects the imperfective aspect more clearly than simple 'sat.'
- source_word: παρὰ τὴν ὁδὸν
  chosen: beside the road
  alternatives:
  - by the road
  - alongside the road
  - beside the way
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position alongside. 'Beside the
    road' is clear, natural modern English; 'way' is possible but less idiomatic here.
- source_word: ἐπαιτῶν
  chosen: begging
  alternatives:
  - asking for alms
  - begging for money
  lexicon: BDAG
  rationale: The participle denotes the man's activity as a beggar. 'Begging' is the
    most direct and natural rendering; 'asking for alms' is more formal and less accessible.
