id: LUK.18.24
reference: Luke 18:24
source:
  edition: SBLGNT
  text: Ἰδὼν δὲ αὐτὸν ὁ ⸀Ἰησοῦς εἶπεν· Πῶς δυσκόλως οἱ τὰ χρήματα ἔχοντες ⸂εἰς τὴν
    βασιλείαν τοῦ θεοῦ εἰσπορεύονται⸃·
translation:
  text: And when Jesus saw him, he said, “How difficult it is for those who have wealth
    to enter into the kingdom of God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “How hard it is for those who have money to enter the kingdom of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω, rendered temporally in smooth English: ''when
    Jesus saw him.'' This preserves the participial relationship without awkwardness.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural and sufficiently light.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to the rich ruler in context.
- source_word: Πῶς δυσκόλως
  chosen: How difficult it is
  alternatives:
  - How hard it is
  - With what difficulty
  lexicon: BDAG
  rationale: The combination expresses exclamatory degree. 'How difficult it is' captures
    the force idiomatically in English. 'How hard it is' is possible, but 'difficult'
    better matches the adverb δυσκόλως in a readable modern register.
- source_word: οἱ τὰ χρήματα ἔχοντες
  chosen: those who have wealth
  alternatives:
  - those who have money
  - the ones possessing riches
  - the rich
  lexicon: BDAG
  rationale: Literally 'those having money/wealth.' 'Those who have wealth' preserves
    the participial construction and avoids reducing the phrase to a mere class label,
    while still reading naturally. χρήματα can denote money or possessions/wealth
    more broadly; 'wealth' best fits the context.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: into the kingdom of God
  alternatives:
  - into God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering. 'Kingdom of God' preserves the familiar
    biblical expression and theological resonance.
- source_word: εἰσπορεύονται
  chosen: to enter
  alternatives:
  - are entering
  - go in
  lexicon: BDAG
  rationale: 'Present middle/passive form of εἰσπορεύομαι. In English, an infinitive
    after ''it is difficult for...'' is the most natural restructuring: ''for those
    who have wealth to enter.'' This preserves the sense without forcing an awkward
    finite clause.'
