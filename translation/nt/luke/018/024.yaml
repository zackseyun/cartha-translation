theological_decisions:
- issue: Force of Jesus' saying about the wealthy and the kingdom
  chosen_reading: A general statement about the difficulty wealthy people face in
    entering God's kingdom
  alternative_readings:
  - An absolute impossibility for the wealthy
  rationale: The Greek says 'How difficult,' not 'impossible.' The translation preserves
    the text's stated tension without intensifying it beyond what this verse says;
    the following context may elaborate, but this verse alone expresses difficulty.
  doctrine_reference: Preserve theological tension rather than resolve it.
