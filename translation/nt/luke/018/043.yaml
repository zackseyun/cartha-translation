theological_decisions:
- issue: Aspect of the healed man's response after receiving sight
  chosen_reading: he was following him, glorifying God
  alternative_readings:
  - he followed him, glorifying God
  rationale: The imperfect ἠκολούθει is best represented as ongoing action. This preserves
    Luke's portrayal of discipleship as a continuing response to Jesus without importing
    additional theological claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Collective singular πᾶς ὁ λαὸς with singular participle and verb
  chosen_reading: all the people, when they saw it, gave praise to God
  alternative_readings:
  - all the people, seeing, gave praise to God
  rationale: English idiom prefers plural reference for a collective group even when
    Greek uses a collective singular construction. This is a stylistic adjustment
    for readability, not a theological change.
  doctrine_reference: Translation philosophy §6
