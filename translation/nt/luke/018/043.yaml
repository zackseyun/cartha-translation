id: LUK.18.43
reference: Luke 18:43
source:
  edition: SBLGNT
  text: καὶ παραχρῆμα ἀνέβλεψεν, καὶ ἠκολούθει αὐτῷ δοξάζων τὸν θεόν. καὶ πᾶς ὁ λαὸς
    ἰδὼν ἔδωκεν αἶνον τῷ θεῷ.
translation:
  text: And immediately he received his sight, and he was following him, glorifying
    God. And all the people, when they saw it, gave praise to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saw again' or 'regained his sight.' The Greek verb can mean to recover
      sight; here 'received his sight' is chosen as the most natural English rendering
      in context.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''followed him.'' The Greek imperfect may emphasize continued action:
      ''was following him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb denotes something happening without delay. 'Immediately' is
    natural modern English and preserves the temporal force.
- source_word: ἀνέβλεψεν
  chosen: received his sight
  alternatives:
  - saw again
  - regained his sight
  lexicon: BDAG
  rationale: In healing contexts ἀναβλέπω commonly means to recover or receive sight.
    'Received his sight' is idiomatic English and fits the preceding context of blindness.
    'Saw again' is more literal but less natural here, and 'regained' may over-specify
    prior sight history.
- source_word: ἠκολούθει
  chosen: he was following him
  alternatives:
  - followed him
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. Rendering with 'was following'
    preserves the durative sense better than the simple past 'followed.'
- source_word: δοξάζων
  chosen: glorifying
  alternatives:
  - praising
  - giving glory to
  lexicon: BDAG
  rationale: The participle expresses attendant action concurrent with following.
    'Glorifying' keeps the lexical connection to δοξάζω and preserves the God-directed
    honor language; 'praising' is possible but overlaps too closely with αἶνον later
    in the verse.
- source_word: λαός
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός here refers collectively to the gathered people. 'The people' is
    the most direct and standard rendering.
- source_word: ἰδὼν
  chosen: when they saw it
  alternatives:
  - seeing this
  - having seen
  lexicon: BDAG
  rationale: 'Although formally singular to agree with πᾶς ὁ λαός as a collective
    singular, idiomatic English refers back to the collective as ''they.'' Supplying
    ''it'' makes explicit the object implied by the context: the healing and response
    just described.'
- source_word: ἔδωκεν αἶνον
  chosen: gave praise
  alternatives:
  - praised
  - gave praise
  lexicon: BDAG
  rationale: The construction is literally 'gave praise.' Retaining that verbal-nominal
    expression reflects the Greek while remaining natural English. A simple 'praised'
    would be acceptable but slightly flattens the expression.
- source_word: θεός / θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The repeated reference is preserved to reflect
    the verse's emphasis on God as the object of both the healed man's glorifying
    and the people's praise.
