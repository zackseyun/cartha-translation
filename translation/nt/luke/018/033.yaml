theological_decisions:
- issue: Resurrection wording
  chosen_reading: he will rise
  alternative_readings:
  - he will be raised
  rationale: The Greek form is future middle, not passive. Rendering it 'he will rise'
    follows the source text closely while remaining fully compatible with orthodox
    resurrection theology. The alternative 'he will be raised' is theologically true
    in other passages but is not the most direct rendering here.
  doctrine_reference: Preserve theological tension rather than resolve it.
