id: LUK.18.33
reference: Luke 18:33
source:
  edition: SBLGNT
  text: καὶ μαστιγώσαντες ἀποκτενοῦσιν αὐτόν, καὶ τῇ ἡμέρᾳ τῇ τρίτῃ ἀναστήσεται.
translation:
  text: And after flogging him, they will kill him, and on the third day he will rise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will be raised.' The Greek here is more directly 'he will rise.'
    reason: alternative_reading
lexical_decisions:
- source_word: μαστιγώσαντες
  chosen: after flogging
  alternatives:
  - having flogged
  - after scourging
  - after whipping
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered as antecedent
    action in English. 'Flogging' is clear modern English and preserves the brutality
    without archaic tone; 'scourging' is possible but less accessible.
- source_word: ἀποκτενοῦσιν
  chosen: they will kill
  alternatives:
  - they will put to death
  - they will murder
  lexicon: BDAG
  rationale: Future active plural with implicit hostile agents from the context. 'Kill'
    is the plain lexical sense; 'put to death' is more formal, while 'murder' adds
    a moral nuance not explicit in the verb itself.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to the Son of Man/Jesus in context; simple
    English pronoun is sufficient.
- source_word: τῇ ἡμέρᾳ τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on the third day after this
  - on day three
  lexicon: BDAG
  rationale: Dative of time is idiomatically rendered with 'on.' This is the standard
    and natural English equivalent, preserving the temporal marker without over-interpretation.
- source_word: ἀναστήσεται
  chosen: he will rise
  alternatives:
  - he will be raised
  - he will arise
  lexicon: BDAG
  rationale: Future middle singular of ἀνίστημι here is best rendered intransitively
    as 'he will rise.' This preserves the Greek form and avoids importing an explicit
    passive ('be raised'), though the broader NT also speaks of the Father raising
    Jesus.
