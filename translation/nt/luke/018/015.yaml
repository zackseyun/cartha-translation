id: LUK.18.15
reference: Luke 18:15
source:
  edition: SBLGNT
  text: Προσέφερον δὲ αὐτῷ καὶ τὰ βρέφη ἵνα αὐτῶν ἅπτηται· ἰδόντες δὲ οἱ μαθηταὶ ⸀ἐπετίμων
    αὐτοῖς.
translation:
  text: Now they were even bringing infants to him so that he might touch them, but
    when the disciples saw it, they rebuked them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'babies.' The Greek term refers to very young children, specifically
      infants.
    reason: lexical_alternative
  - marker: b
    text: That is, those who were bringing the infants to Jesus.
    reason: lexical_alternative
  - marker: c
    text: In the parallel accounts, Jesus' touch is associated with blessing and laying
      hands on the children (cf. Matt 19:13; Mark 10:13, 16).
    reason: cross_reference
lexical_decisions:
- source_word: Προσέφερον
  chosen: were bringing
  alternatives:
  - brought
  - were bringing near
  - were presenting
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action, best reflected by
    'were bringing' rather than simple past. 'Bringing' is natural English and fits
    the context of people bringing children to Jesus.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: Used here as a mild discourse connector marking narrative development.
    'Now' gives readable English transition without overstating contrast.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun naturally refers to Jesus from context. 'To him' preserves
    the Greek wording without unnecessarily repeating the name.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - too
  lexicon: BDAG
  rationale: 'In context καὶ adds emphasis: not only older children but even infants
    were being brought. ''Even'' captures the rhetorical force better than a flat
    ''also''.'
- source_word: τὰ βρέφη
  chosen: infants
  alternatives:
  - babies
  - little children
  lexicon: BDAG
  rationale: βρέφη specifically denotes very young children, infants/babies. 'Infants'
    is slightly more precise and less colloquial than 'babies.' It also preserves
    the distinction from broader terms for children in parallel contexts.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic modern English while preserving
    the purposive force.
- source_word: αὐτῶν ἅπτηται
  chosen: he might touch them
  alternatives:
  - he might lay a hand on them
  - he might touch them
  lexicon: BDAG
  rationale: ἅπτομαι commonly means 'touch.' In this context the touch is likely blessing-related,
    but the Greek itself says 'touch,' so the translation should not import 'bless'
    into the main text. 'Them' renders the genitive pronoun by sense in English.
- source_word: ἰδόντες
  chosen: when ... saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle is best rendered temporally in smooth English here:
    ''when the disciples saw it.'' The supplied object ''it'' is implicit in English
    from the event observed.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article plus noun is straightforwardly 'the disciples.' Possessive
    'his' is contextually true but not explicit.
- source_word: ἐπετίμων
  chosen: rebuked
  alternatives:
  - were rebuking
  - scolded
  - warned sternly
  lexicon: BDAG
  rationale: ἐπιτιμάω commonly means 'rebuke' or 'censure.' Although the imperfect
    could be rendered 'were rebuking,' simple past is acceptable in English narrative
    here. 'Rebuked' preserves the stronger tone better than 'scolded.'
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - those bringing the infants
  - the people
  lexicon: BDAG
  rationale: The dative pronoun most naturally refers to those bringing the infants,
    not the infants themselves. English 'them' preserves the pronoun while leaving
    the antecedent to context.
