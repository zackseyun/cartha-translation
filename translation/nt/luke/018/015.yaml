theological_decisions:
- issue: Nature of Jesus' action toward the children
  chosen_reading: touch them
  alternative_readings:
  - bless them
  - lay his hands on them
  rationale: The immediate Greek verb is ἅπτηται, 'touch.' While the broader synoptic
    context associates this action with blessing, the translation should not import
    that fuller interpretation into the main text where Luke's wording is more restrained.
    The interpretive alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
