theological_decisions:
- issue: Christological implication of Jesus’ question
  chosen_reading: The translation preserves Jesus’ question without paraphrasing it
    into either a denial or an explicit claim of deity.
  alternative_readings:
  - A paraphrase implying Jesus denies being good in the absolute sense
  - A paraphrase implying Jesus directly asserts his deity by accepting the title
    implicitly
  rationale: In keeping with historic orthodoxy and the instruction to preserve theological
    tension rather than resolve it, the wording remains close to the Greek. The verse
    raises a theological question but does not itself explicitly spell out the full
    doctrinal conclusion; the translation should not force one.
  doctrine_reference: Affirmations; Translation philosophy §3
