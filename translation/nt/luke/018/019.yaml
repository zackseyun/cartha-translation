id: LUK.18.19
reference: Luke 18:19
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῷ ὁ Ἰησοῦς· Τί με λέγεις ἀγαθόν; οὐδεὶς ἀγαθὸς εἰ μὴ εἷς ὁ θεός.
translation:
  text: But Jesus said to him, “Why do you call me good? No one is good except one—God.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as “But” to mark the slight discourse contrast or response force
    in context. “And” is possible, but “But” better reflects Jesus’ corrective reply
    to the man’s address.
- source_word: εἶπεν ... ὁ Ἰησοῦς
  chosen: Jesus said
  alternatives:
  - Jesus answered
  - Jesus said in reply
  lexicon: BDAG
  rationale: The verb λέγω here straightforwardly means “said.” Although the context
    is responsive, the Greek does not require the more interpretive “answered.”
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to the man
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and is best preserved as “to him.” Supplying
    “the man” would be interpretive expansion beyond the immediate wording.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: Although τί is formally “what,” in this idiom τί με λέγεις ἀγαθόν it
    functions naturally as “Why do you call me good?” This is standard idiomatic English
    and best conveys the sense of the Greek question.
- source_word: με λέγεις ἀγαθόν
  chosen: do you call me good
  alternatives:
  - do you say that I am good
  - are you calling me good
  lexicon: BDAG
  rationale: This preserves the directness of λέγεις with the predicate adjective
    ἀγαθόν. “Call me good” is the most natural and sufficiently formal rendering.
- source_word: ἀγαθόν / ἀγαθὸς
  chosen: good
  alternatives:
  - morally good
  lexicon: BDAG
  rationale: Rendered consistently as “good” in both occurrences. Adding “morally”
    would over-specify the adjective; the context itself carries the moral-theological
    force.
- source_word: οὐδεὶς
  chosen: No one
  alternatives:
  - No person
  - Nobody
  lexicon: BDAG
  rationale: “No one” is clear, natural modern English and preserves the universal
    negation.
- source_word: εἰ μὴ εἷς
  chosen: except one
  alternatives:
  - except only one
  - if not one
  lexicon: BDAG
  rationale: This reflects the Greek exception construction closely while remaining
    idiomatic. It preserves the emphasis that goodness in the absolute sense belongs
    uniquely to one.
- source_word: ὁ θεός
  chosen: God
  alternatives:
  - the one God
  lexicon: BDAG
  rationale: Rendered simply as “God.” English proper-name usage does not normally
    require the article here, and “God” best communicates the referent without awkwardness.
