theological_decisions:
- issue: Messianic significance of Υἱὲ Δαυίδ
  chosen_reading: Translate as the title 'Son of David' in the main text.
  alternative_readings:
  - Retain without comment as a mere honorific
  rationale: In Luke's narrative this is a loaded Davidic-messianic title, not merely
    a polite address. Translating it directly preserves the christological significance
    without adding interpretive expansion beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
