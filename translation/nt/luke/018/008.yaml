theological_decisions:
- issue: Rendering πίστις in a context where some may hear either 'faith' or 'faithfulness'
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Following the doctrine table, πίστις defaults to 'faith' in the main
    text. Because the context emphasizes persevering reliance expressed in prayer,
    the alternatives 'faithfulness' and 'trust' are preserved in a footnote rather
    than resolved dogmatically.
