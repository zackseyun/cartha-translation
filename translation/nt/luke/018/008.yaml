id: LUK.18.8
reference: Luke 18:8
source:
  edition: SBLGNT
  text: λέγω ὑμῖν ὅτι ποιήσει τὴν ἐκδίκησιν αὐτῶν ἐν τάχει. πλὴν ὁ υἱὸς τοῦ ἀνθρώπου
    ἐλθὼν ἆρα εὑρήσει τὴν πίστιν ἐπὶ τῆς γῆς;
translation:
  text: I tell you that he will bring about justice for them quickly. Nevertheless,
    when the Son of Man comes, will he really find faith on the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will vindicate them' or 'he will grant them justice.' The Greek term
      can carry the sense of legal vindication or justice done on behalf of someone.
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness' or 'trust.' The Greek word can denote faith, trust, or
      faithfulness; the main text keeps the broader rendering 'faith.'
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσει τὴν ἐκδίκησιν αὐτῶν
  chosen: he will bring about justice for them
  alternatives:
  - he will grant them justice
  - he will vindicate them
  - he will carry out their vindication
  lexicon: BDAG
  rationale: ἐκδίκησις can denote vindication, justice, or avenging. In this context
    of the persistent widow seeking legal redress, 'bring about justice for them'
    communicates the judicial sense clearly in modern English without importing retaliatory
    overtones too strongly. 'For them' reflects the beneficiaries implied by αὐτῶν
    in context better than a more wooden 'their justice'.
- source_word: ἐν τάχει
  chosen: quickly
  alternatives:
  - soon
  - without delay
  - speedily
  lexicon: BDAG
  rationale: The phrase commonly means with swiftness or without delay. 'Quickly'
    is natural English and preserves the temporal force without overcommitting to
    'soon' as a timetable prediction.
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - however
  - yet
  - but
  lexicon: BDAG
  rationale: πλήν marks a strong concessive transition. 'Nevertheless' preserves the
    rhetorical contrast between God's prompt justice and the searching question that
    follows.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and accurate rendering of Jesus' self-designation,
    preserving both the idiomatic title and its intertextual resonance with Daniel
    7.
- source_word: ἐλθὼν
  chosen: comes
  alternatives:
  - having come
  - when he comes
  lexicon: BDAG
  rationale: 'The aorist participle is most naturally rendered in English here with
    a temporal sense: ''when ... comes.'' This avoids awkwardness while preserving
    the relation to the main verb εὑρήσει.'
- source_word: ἆρα
  chosen: really
  alternatives:
  - then
  - indeed
  - ''
  lexicon: BDAG
  rationale: ἆρα marks the question as reflective and somewhat searching. English
    often conveys this nuance with 'really' in a rhetorical question. This brings
    out the force better than leaving it untranslated.
- source_word: τὴν πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text, while
    preserving alternatives in a footnote where interpretively significant. Here the
    phrase may denote persevering faith/trust, but 'faith' best preserves the Greek's
    breadth without narrowing it.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on earth
  - in the land
  lexicon: BDAG
  rationale: γῆ can mean earth, world, or land. 'On the earth' is the most straightforward
    global sense here and suits the eschatological scope of the saying. It also reflects
    the article in Greek more closely than the idiomatic 'on earth'.
