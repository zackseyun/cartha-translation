theological_decisions:
- issue: Meaning of receiving the kingdom 'like a child'
  chosen_reading: The translation preserves the simile without specifying whether
    the emphasis is humility, trust, dependence, or receptivity.
  alternative_readings:
  - with childlike humility
  - with childlike trust
  - as one who is a child
  rationale: The Greek states the comparison but does not explicitly define the precise
    quality in view. To avoid importing a narrower doctrinal or interpretive claim
    than the text itself makes, the main text leaves the image intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
