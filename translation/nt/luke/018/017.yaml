id: LUK.18.17
reference: Luke 18:17
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ὃς ⸀ἂν μὴ δέξηται τὴν βασιλείαν τοῦ θεοῦ ὡς παιδίον, οὐ μὴ
    εἰσέλθῃ εἰς αὐτήν.
translation:
  text: Truly I tell you, whoever does not receive the kingdom of God like a child
    will certainly not enter it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a child.' The phrase may emphasize childlike receptivity, trust,
      humility, or dependence; the Greek does not specify the exact quality.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In Jesus' introductory formula ἀμὴν λέγω ὑμῖν, English idiom is best
    served by 'Truly I tell you' rather than a transliterated 'Amen, I say to you.'
    This preserves the solemn affirming force without sounding opaque.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is natural modern English and accurately conveys the
    direct-address formula. ''I say to you'' is more formal but less idiomatic here.'
- source_word: ὃς ἂν
  chosen: whoever
  alternatives:
  - whoever it is who
  - anyone who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν expresses an indefinite general condition.
    'Whoever' captures this succinctly and naturally.
- source_word: μὴ δέξηται
  chosen: does not receive
  alternatives:
  - does not accept
  - does not welcome
  lexicon: BDAG
  rationale: δέχομαι can mean receive, accept, or welcome. 'Receive' best fits the
    object 'the kingdom of God' and preserves the sense of receptive acceptance without
    overinterpreting the metaphor.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''The kingdom of God'' is the standard and transparent rendering. ''Reign
    of God'' highlights dynamic rule but is less conventional and not required by
    the context.'
- source_word: ὡς παιδίον
  chosen: like a child
  alternatives:
  - as a child
  - like a little child
  lexicon: BDAG
  rationale: ὡς with παιδίον indicates manner or comparison. 'Like a child' is clear
    and idiomatic. 'As a child' could imply identity rather than manner, and 'little
    child' adds a diminutive nuance not explicit in the Greek.
- source_word: οὐ μὴ εἰσέλθῃ
  chosen: will certainly not enter
  alternatives:
  - will never enter
  - shall by no means enter
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    not enter' preserves the force in readable modern English. 'Will never enter'
    is also possible, but 'certainly not' more directly reflects the emphatic construction.
- source_word: εἰς αὐτήν
  chosen: it
  alternatives:
  - into it
  - into the kingdom
  lexicon: BDAG
  rationale: The pronoun refers back to 'the kingdom.' English normally omits repeating
    'into' after 'enter,' so 'enter it' is the most natural rendering.
