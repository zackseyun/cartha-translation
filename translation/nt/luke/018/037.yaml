id: LUK.18.37
reference: Luke 18:37
source:
  edition: SBLGNT
  text: ἀπήγγειλαν δὲ αὐτῷ ὅτι Ἰησοῦς ὁ Ναζωραῖος παρέρχεται.
translation:
  text: And they told him, “Jesus the Nazarene is passing by.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus of Nazareth is passing by.” The Greek reads “Jesus the Nazarene,”
      preserving the designation more literally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλαν
  chosen: they told
  alternatives:
  - they reported
  - they announced
  lexicon: BDAG
  rationale: The verb means to report or tell. In this narrative context, a simple
    conversational response to the blind man is in view, so 'they told' is natural
    modern English without losing the sense of relaying information.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', but'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    preserves the flow without overstating contrast.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The indirect object is naturally expressed in English as 'told him';
    this is idiomatic and fully represents the dative.
- source_word: ὅτι
  chosen: “...,”
  alternatives:
  - that
  lexicon: BDAG
  rationale: ὅτι introduces indirect discourse. In English, direct quotation is more
    vivid and natural here, while preserving the same content.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς, in keeping
    with the translation philosophy of transliterating names.
- source_word: ὁ Ναζωραῖος
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: The Greek uses the substantival title 'the Nazarene,' not the prepositional
    expression 'from Nazareth.' 'The Nazarene' preserves the form of the Greek and
    reflects a recognized designation for Jesus. 'The Nazorean' is more formally close
    but less natural in contemporary English.
- source_word: παρέρχεται
  chosen: is passing by
  alternatives:
  - passes by
  - is going by
  - is coming by
  lexicon: BDAG
  rationale: The present middle/passive form in context describes an action currently
    occurring as Jesus moves past the location. 'Is passing by' best conveys the ongoing,
    immediate sense in natural English.
