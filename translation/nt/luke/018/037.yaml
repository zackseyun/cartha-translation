theological_decisions:
- issue: Rendering of Jesus' designation Ναζωραῖος
  chosen_reading: the Nazarene
  alternative_readings:
  - of Nazareth
  - the Nazorean
  rationale: This is primarily a geographical/designational identifier, not a christological
    title requiring doctrinal expansion. The chosen rendering stays close to the Greek
    form while remaining readable. No theological claim beyond the text is imported.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
