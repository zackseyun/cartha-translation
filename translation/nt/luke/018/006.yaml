theological_decisions:
- issue: Rendering κύριος in reference to Jesus
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: Per doctrine guidelines, κύριος defaults to 'Lord.' In Luke this title
    for Jesus carries more than a merely social sense, and translating it as 'Lord'
    preserves the christological weight without adding doctrinal content beyond the
    text.
