id: LUK.18.6
reference: Luke 18:6
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ κύριος· Ἀκούσατε τί ὁ κριτὴς τῆς ἀδικίας λέγει·
translation:
  text: And the Lord said, “Hear what the unrighteous judge says.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unjust judge.' The Greek expression is literally 'the judge of unrighteousness/injustice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is naturally rendered as simple past narrative speech
    introduction, 'said.' 'Spoke' is possible but less idiomatic here.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ','
  lexicon: BDAG
  rationale: δέ marks continuation in the narrative. 'And' preserves the connective
    force without overinterpreting it temporally.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' In Luke's narrative this refers to Jesus with titular weight, so 'the
    Lord' is preferred over the less theologically loaded 'master.'
- source_word: Ἀκούσατε
  chosen: Hear
  alternatives:
  - Listen to
  - Pay attention to
  lexicon: BDAG
  rationale: Aorist imperative of ἀκούω calls for attentive hearing. 'Hear' is concise
    and preserves the imperative force; English idiom allows this without adding words.
- source_word: τί
  chosen: what
  alternatives:
  - how
  lexicon: BDAG
  rationale: 'τί introduces the content of what is being said: ''what ... says.''
    ''How'' would shift the sense from content to manner.'
- source_word: ὁ κριτὴς
  chosen: the judge
  lexicon: BDAG
  rationale: Straightforward nominal rendering. The article is retained in English
    because it refers back to the judge in the parable.
- source_word: τῆς ἀδικίας
  chosen: unrighteous
  alternatives:
  - unjust
  - of injustice
  lexicon: BDAG
  rationale: 'The genitive is adjectival/qualitative: literally ''the judge of unrighteousness/injustice.''
    ''Unrighteous judge'' is natural English and preserves the moral quality. ''Unjust
    judge'' is also idiomatic and common, but ''unrighteous'' more closely reflects
    ἀδικία and keeps the ethical/religious dimension rather than only legal unfairness.'
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  lexicon: BDAG
  rationale: Present tense after the introductory aorist can be rendered as a vivid
    present in English. 'Says' is natural and preserves the immediacy of the Greek
    present.
