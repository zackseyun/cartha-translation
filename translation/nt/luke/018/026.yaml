theological_decisions:
- issue: Sense of σωθῆναι in context
  chosen_reading: soteriological 'be saved'
  alternative_readings:
  - be rescued
  - be delivered
  rationale: The surrounding context concerns entry into the kingdom and the difficulty
    of salvation for the rich, so the theological sense of salvation is primary rather
    than generic rescue.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
