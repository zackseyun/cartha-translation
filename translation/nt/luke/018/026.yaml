id: LUK.18.26
reference: Luke 18:26
source:
  edition: SBLGNT
  text: Εἶπαν δὲ οἱ ἀκούσαντες· Καὶ τίς δύναται σωθῆναι;
translation:
  text: Then those who heard it said, “And who can be saved?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἶπαν
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: 'Aorist indicative is best rendered as simple past narrative: ''said.'''
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression/transition. 'Then' gives natural
    English flow while preserving the connective force.
- source_word: οἱ ἀκούσαντες
  chosen: those who heard it
  alternatives:
  - those who heard
  - the ones who heard
  lexicon: BDAG
  rationale: The substantival aorist participle refers to the people who heard Jesus'
    preceding statement. English idiom commonly supplies the object 'it' from context.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: καί here introduces the content of the response with an additive/emphatic
    sense. Retaining 'And' reflects the Greek and preserves the startled continuation
    of thought.
- source_word: τίς
  chosen: who
  alternatives:
  - who then
  lexicon: BDAG
  rationale: Interrogative pronoun asking for the identity of any possible person.
    'Who' is the direct equivalent; 'who then' would add emphasis not explicit in
    the Greek.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: The verb denotes ability/possibility. 'Can' is concise, natural modern
    English and preserves the sense.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be rescued
  - be delivered
  lexicon: BDAG
  rationale: In Luke's theological context, σῴζω here refers to salvation rather than
    mere physical rescue. 'Be saved' is the standard and contextually appropriate
    rendering.
