theological_decisions:
- issue: Meaning of μακροθυμεῖ ἐπ’ αὐτοῖς in relation to God's character and action
  chosen_reading: 'Rendered as a question about delaying action: ''Will he delay long
    over them?'''
  alternative_readings:
  - 'Rendered as God''s patience toward them: ''though he is patient over them'''
  - 'Rendered concessively: ''even though he bears long with them'''
  rationale: The Greek permits a reading focused on patience/longsuffering, but the
    immediate context emphasizes God's prompt vindication of his people (v. 8). To
    preserve the rhetorical flow without resolving all ambiguity, the main text uses
    'delay long,' and the patience-oriented alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
