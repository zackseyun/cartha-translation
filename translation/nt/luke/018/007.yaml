id: LUK.18.7
reference: Luke 18:7
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς οὐ μὴ ποιήσῃ τὴν ἐκδίκησιν τῶν ἐκλεκτῶν αὐτοῦ τῶν βοώντων ⸀αὐτῷ
    ἡμέρας καὶ νυκτός, καὶ ⸀μακροθυμεῖ ἐπ’ αὐτοῖς;
translation:
  text: And will not God bring justice for his chosen ones, who cry out to him day
    and night? Will he delay long over them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'though he is patient over them' or 'and is he patient over them?' The
      Greek phrase can be understood in terms of patience/longsuffering rather than
      delay.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκδίκησιν
  chosen: bring justice
  alternatives:
  - grant justice
  - vindication
  - avenge
  lexicon: BDAG
  rationale: In this context of the unjust judge and persistent petition, ἐκδίκησις
    refers to giving legal redress or vindication rather than personal vengeance.
    'Bring justice' is natural English and preserves the judicial sense.
- source_word: ἐκλεκτῶν
  chosen: chosen ones
  alternatives:
  - elect
  - chosen
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Chosen ones' is clearer for
    modern readers than 'elect' while preserving the theological sense of those chosen
    by God without importing a narrower denominational framework.
- source_word: βοώντων
  chosen: who cry out
  alternatives:
  - calling out
  - shouting
  - crying
  lexicon: BDAG
  rationale: The participle denotes urgent, repeated appeal. 'Cry out' captures both
    intensity and prayerful petition in context.
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - continually
  - night and day
  lexicon: BDAG
  rationale: This idiom is well established in English and preserves the temporal
    emphasis of constant appeal.
- source_word: μακροθυμεῖ ἐπ’ αὐτοῖς
  chosen: Will he delay long over them?
  alternatives:
  - is he patient over them?
  - does he bear long with them?
  - will he keep putting them off?
  lexicon: BDAG
  rationale: The phrase is syntactically and semantically difficult. μακροθυμέω often
    means 'be patient/longsuffering,' but in this context and in light of the following
    verse's assurance of swift justice, the sense is whether God will postpone acting
    on their behalf. 'Delay long over them' preserves the rhetorical force without
    overstating a negative view of God.
- source_word: οὐ μὴ ποιήσῃ
  chosen: will not ... bring
  alternatives:
  - will certainly ... bring
  - will by no means ... bring
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is a strong negation in a rhetorical
    question expecting an affirmative answer. English idiom is best served by 'will
    not ... ?' while the force is carried by the question form.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering; the article marks the subject, not a distinct nuance
    requiring expansion.
