id: LUK.18.13
reference: Luke 18:13
source:
  edition: SBLGNT
  text: ⸂ὁ δὲ⸃ τελώνης μακρόθεν ἑστὼς οὐκ ἤθελεν οὐδὲ τοὺς ὀφθαλμοὺς ⸂ἐπᾶραι εἰς τὸν
    οὐρανόν⸃, ἀλλ’ ⸀ἔτυπτε τὸ στῆθος ⸀αὐτοῦ λέγων· Ὁ θεός, ἱλάσθητί μοι τῷ ἁμαρτωλῷ.
translation:
  text: But the tax collector, standing far off, was not willing even to lift up his
    eyes to heaven, but kept beating his chest, saying, ‘God, be merciful to me, the
    sinner.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "be propitious to me"; the verb is related to language of atonement and
      propitiation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τελώνης
  chosen: tax collector
  alternatives:
  - tax gatherer
  - publican
  lexicon: BDAG
  rationale: '"Tax collector" is the clearest modern English equivalent and avoids
    the archaic "publican." It preserves the social and moral stigma associated with
    the role in the Gospel context.'
- source_word: μακρόθεν
  chosen: far off
  alternatives:
  - at a distance
  - far away
  lexicon: BDAG
  rationale: '"Far off" is concise and idiomatic, preserving both spatial distance
    and the implied posture of humility in context.'
- source_word: ἑστὼς
  chosen: standing
  alternatives:
  - having stood
  - while standing
  lexicon: BDAG
  rationale: The participle is naturally rendered as "standing" in English, expressing
    his posture without awkwardness.
- source_word: οὐκ ἤθελεν οὐδὲ
  chosen: was not willing even
  alternatives:
  - did not want even
  - would not even
  lexicon: BDAG
  rationale: This reflects θέλω as volition rather than mere ability. "Was not willing
    even" preserves the force of reluctance or refusal rooted in humility/shame.
- source_word: ἐπᾶραι εἰς τὸν οὐρανόν
  chosen: to lift up his eyes to heaven
  alternatives:
  - to raise his eyes toward heaven
  lexicon: BDAG
  rationale: This is a natural English rendering of the idiom and preserves the reverential
    directionality of the Greek.
- source_word: ἔτυπτε
  chosen: kept beating
  alternatives:
  - was beating
  - beat repeatedly
  lexicon: BDAG
  rationale: The imperfect suggests repeated or continued action. "Kept beating" makes
    that aspect clear in readable English.
- source_word: τὸ στῆθος αὐτοῦ
  chosen: his chest
  alternatives:
  - his breast
  lexicon: BDAG
  rationale: '"Chest" is more natural modern English, while still conveying the gesture
    of grief and contrition. "Breast" is preserved as a lexical alternative because
    of traditional familiarity.'
- source_word: ἱλάσθητί μοι
  chosen: be merciful to me
  alternatives:
  - be propitious to me
  - make atonement for me
  lexicon: BDAG
  rationale: The verb ἱλάσκομαι carries the sense of showing mercy in a way connected
    to atonement/appeasement. For main text readability and the translation philosophy's
    avoidance of unnecessary jargon, "be merciful to me" is best; more technical alternatives
    are preserved in a footnote.
- source_word: τῷ ἁμαρτωλῷ
  chosen: the sinner
  alternatives:
  - a sinner
  lexicon: BDAG
  rationale: The Greek article is present and likely has emphatic force in this prayer
    of self-abasement. "The sinner" preserves that marked form better than the smoother
    but less specific "a sinner."
