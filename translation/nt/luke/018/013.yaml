theological_decisions:
- issue: How to render ἱλάσθητί μοι in a prayer for divine favor
  chosen_reading: be merciful to me
  alternative_readings:
  - be propitious to me
  - make atonement for me
  rationale: The verb is related to the atonement/propitiation word group, but in
    this direct prayer the most natural and accessible English is "be merciful to
    me." This avoids importing a full doctrinal explanation into the main text while
    preserving the sacrificial/propitiatory nuance in a footnote. This aligns with
    the project's preference for readable modern English without flattening theological
    weight.
  doctrine_reference: Translation philosophy §6; Contested terms entry for ἱλαστήριον
    (accessibility with theological alternatives footnoted)
