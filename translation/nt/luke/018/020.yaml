id: LUK.18.20
reference: Luke 18:20
source:
  edition: SBLGNT
  text: τὰς ἐντολὰς οἶδας· Μὴ μοιχεύσῃς, Μὴ φονεύσῃς, Μὴ κλέψῃς, Μὴ ψευδομαρτυρήσῃς,
    Τίμα τὸν πατέρα σου καὶ τὴν ⸀μητέρα.
translation:
  text: 'You know the commandments: Do not commit adultery, do not murder, do not
    steal, do not bear false witness, honor your father and mother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'You shall not commit adultery ... You shall not
      murder ... You shall not steal ... You shall not bear false witness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰς ἐντολὰς
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: BDAG
  rationale: ἐντολή commonly denotes a commandment or authoritative command. In this
    context Jesus is citing well-known Decalogue commands, so 'the commandments' best
    preserves the recognizable biblical/legal sense.
- source_word: οἶδας
  chosen: you know
  alternatives:
  - you have known
  - you are acquainted with
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect, it functions with present sense in
    Koine. 'You know' is the natural English equivalent.
- source_word: Μὴ μοιχεύσῃς
  chosen: Do not commit adultery
  alternatives:
  - Do not adulterate marriage
  - You shall not commit adultery
  lexicon: BDAG
  rationale: This is the standard sense of μοιχεύω in prohibition. 'Do not commit
    adultery' is clear modern English and preserves the command's moral specificity.
    'You shall not' would be more traditional/formal, but 'Do not' better fits readable
    modern English while retaining imperative force.
- source_word: Μὴ φονεύσῃς
  chosen: do not murder
  alternatives:
  - do not kill
  - you shall not murder
  lexicon: BDAG
  rationale: φονεύω refers to murder rather than killing in the broadest sense. 'Murder'
    is more lexically precise and avoids overstating the prohibition.
- source_word: Μὴ κλέψῃς
  chosen: do not steal
  alternatives:
  - you shall not steal
  lexicon: BDAG
  rationale: κλέπτω straightforwardly means 'steal.' The simple modern prohibition
    best matches the Greek.
- source_word: Μὴ ψευδομαρτυρήσῃς
  chosen: do not bear false witness
  alternatives:
  - do not testify falsely
  - do not give false testimony
  lexicon: BDAG
  rationale: ψευδομαρτυρέω literally means to bear false witness or testify falsely.
    Because this is a Decalogue citation, 'bear false witness' preserves the intertextual
    resonance better than a more paraphrastic legal gloss.
- source_word: Τίμα
  chosen: honor
  alternatives:
  - respect
  - show honor to
  lexicon: BDAG
  rationale: τιμάω here carries the covenantal/ethical sense of honoring parents.
    'Honor' is the established and most semantically fitting rendering.
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα
  chosen: your father and mother
  alternatives:
  - your father and your mother
  lexicon: BDAG
  rationale: The phrase directly names both parents. English idiom naturally omits
    the repeated possessive before 'mother' while preserving the sense.
