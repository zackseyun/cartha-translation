theological_decisions:
- issue: Rendering of Decalogue-style prohibitions
  chosen_reading: Use modern imperative prohibitions ('Do not ...') rather than traditional
    future-style ('You shall not ...').
  alternative_readings:
  - You shall not commit adultery, etc.
  rationale: The Greek here uses prohibitive aorist subjunctives and an imperative
    in citation form. 'Do not ...' communicates the force clearly in contemporary
    English while preserving the content of the commandments. This is a stylistic
    translation decision, not a doctrinal one.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
