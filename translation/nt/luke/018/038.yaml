theological_decisions:
- issue: Messianic force of the title υἱὲ Δαυίδ
  chosen_reading: Render as the title “Son of David.”
  alternative_readings:
  - Render more generically as “descendant of David.”
  rationale: In Luke’s narrative context this functions as a loaded royal-messianic
    address to Jesus. Translating it as “Son of David” preserves the title’s theological
    significance without adding interpretation beyond the text.
