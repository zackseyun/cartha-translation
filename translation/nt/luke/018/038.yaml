id: LUK.18.38
reference: Luke 18:38
source:
  edition: SBLGNT
  text: καὶ ἐβόησεν λέγων· Ἰησοῦ υἱὲ Δαυίδ, ἐλέησόν με.
translation:
  text: And he cried out, saying, “Jesus, Son of David, have mercy on me!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Son of David” is a messianic title, evoking the promised Davidic king;
      alternatively, more generically, “descendant of David.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: The aorist of βοάω denotes a loud cry or shout. “Cried out” preserves
    both the volume and urgency without sounding overly colloquial.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered with “saying” in English narrative
    style, preserving the Greek construction and introducing the direct speech.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: This is the vocative form of the personal name Ἰησοῦς. Per translation
    philosophy, personal names are transliterated by standard English convention.
- source_word: υἱὲ Δαυίδ
  chosen: Son of David
  alternatives:
  - descendant of David
  lexicon: BDAG
  rationale: This is a recognized messianic title in the Gospel context, not merely
    a genealogical description. “Son of David” preserves the title’s biblical and
    theological resonance better than the more explanatory “descendant of David.”
- source_word: ἐλέησόν με
  chosen: have mercy on me
  alternatives:
  - show me mercy
  - take pity on me
  lexicon: BDAG
  rationale: The aorist imperative of ἐλεάω is a direct plea for merciful action.
    “Have mercy on me” is the most natural and established English rendering, preserving
    both urgency and covenantal/theological weight.
