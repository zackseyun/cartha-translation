id: LUK.18.14
reference: Luke 18:14
source:
  edition: SBLGNT
  text: λέγω ὑμῖν, κατέβη οὗτος δεδικαιωμένος εἰς τὸν οἶκον αὐτοῦ ⸂παρ’ ἐκεῖνον⸃·
    ὅτι πᾶς ὁ ὑψῶν ἑαυτὸν ταπεινωθήσεται, ὁ δὲ ταπεινῶν ἑαυτὸν ὑψωθήσεται.
translation:
  text: I tell you, this man went down to his house justified rather than the other;
    because everyone who exalts himself will be humbled, but the one who humbles himself
    will be exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justified in comparison with that one"; the phrase contrasts this man
      with the other worshiper.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδικαιωμένος
  chosen: justified
  alternatives:
  - declared righteous
  - vindicated
  lexicon: BDAG
  rationale: Perfect passive participle of δικαιόω; 'justified' preserves the forensic/resultative
    sense in concise English and matches common NT usage. 'Declared righteous' is
    a possible unpacking but is less natural in the flow of the saying; 'vindicated'
    is possible in some contexts but here the contrast with the Pharisee and tax collector
    favors God's favorable verdict.
- source_word: παρ’ ἐκεῖνον
  chosen: rather than the other
  alternatives:
  - instead of that one
  - in comparison with that one
  - more than that one
  lexicon: BDAG
  rationale: παρά with the accusative after a comparative idea can mark contrast/comparison.
    In context, Jesus contrasts the tax collector with the Pharisee, so 'rather than
    the other' communicates the intended comparison idiomatically without overcommitting
    to a technical comparative formula.
- source_word: κατέβη
  chosen: went down
  alternatives:
  - returned
  - went back down
  lexicon: BDAG
  rationale: The aorist of καταβαίνω is literally 'went down.' Since the temple setting
    likely involves descending from the temple area, the literal motion is appropriate
    and natural enough in English. 'Returned' would smooth the idiom but lose the
    concrete imagery.
- source_word: οἶκον αὐτοῦ
  chosen: his house
  alternatives:
  - his home
  lexicon: BDAG
  rationale: οἶκος commonly means 'house' or 'home.' 'His house' preserves the lexical
    form and remains natural in English; 'home' is possible but slightly more interpretive.
- source_word: πᾶς ὁ ὑψῶν ἑαυτόν
  chosen: everyone who exalts himself
  alternatives:
  - everyone exalting himself
  - whoever lifts himself up
  lexicon: BDAG
  rationale: The articular participle expresses a general principle. 'Everyone who
    exalts himself' is idiomatic and preserves the reflexive force. Masculine singular
    is retained with 'himself' in keeping with the gender-accurate policy for representative
    statements.
- source_word: ταπεινωθήσεται
  chosen: will be humbled
  alternatives:
  - will be brought low
  lexicon: BDAG
  rationale: Future passive of ταπεινόω. 'Will be humbled' is the most direct equivalent
    and preserves the passive voice, leaving implicit the agent as in the Greek.
- source_word: ὁ δὲ ταπεινῶν ἑαυτόν
  chosen: the one who humbles himself
  alternatives:
  - but whoever humbles himself
  lexicon: BDAG
  rationale: Mirrors the first clause while preserving the contrastive δέ. 'The one
    who' keeps the parallel structure clear in English.
- source_word: ὑψωθήσεται
  chosen: will be exalted
  alternatives:
  - will be lifted up
  lexicon: BDAG
  rationale: Future passive of ὑψόω. 'Will be exalted' best matches the moral/theological
    reversal in Jesus' saying and pairs naturally with 'exalts himself.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding verdict. 'Because'
    is clearer in modern English than 'for' while preserving the causal sense.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  lexicon: BDAG
  rationale: Refers back to the tax collector in contrast with the Pharisee. 'This
    man' is natural English and makes the personal contrast explicit.
