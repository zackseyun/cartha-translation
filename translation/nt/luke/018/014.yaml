theological_decisions:
- issue: Sense of δικαιόω in the parable's conclusion
  chosen_reading: forensic/favorable divine verdict expressed as 'justified'
  alternative_readings:
  - vindicated in a broader social sense
  rationale: The immediate context contrasts the self-righteous Pharisee with the
    repentant tax collector before God. 'Justified' preserves the theological weight
    of God's approving verdict without importing a full later systematic formulation
    beyond the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Representative masculine language in the maxim
  chosen_reading: retain masculine singular reflexives ('himself')
  alternative_readings:
  - gender-neutral plurals such as 'themselves'
  rationale: The Greek uses masculine singular participles generically. Per the gender-accurate
    policy, the translation keeps the representative singular rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §4
