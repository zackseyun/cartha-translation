id: LUK.18.41
reference: Luke 18:41
source:
  edition: SBLGNT
  text: ⸀Τί σοι θέλεις ποιήσω; ὁ δὲ εἶπεν· Κύριε, ἵνα ἀναβλέψω.
translation:
  text: “What do you want me to do for you?” And he said, “Lord, that I may see again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir”; the Greek κύριε can be a respectful form of address, though “Lord”
      is the project's default rendering for κύριος.
    reason: alternative_reading
  - marker: b
    text: Or “that I may regain my sight.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί
  chosen: What
  alternatives:
  - Why
  lexicon: BDAG
  rationale: Interrogative pronoun introducing Jesus' question about the specific
    request; 'what' is the plain sense here, not causal 'why'.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative pronoun with ποιήσω is naturally rendered in English as benefactive
    'for you' rather than the less idiomatic 'to you.'
- source_word: θέλεις
  chosen: do you want
  alternatives:
  - do you wish
  - do you desire
  lexicon: BDAG
  rationale: Present indicative of θέλω expresses volition. 'Want' is clear modern
    English and fits the direct conversational tone.
- source_word: ποιήσω
  chosen: me to do
  alternatives:
  - that I should do
  - me to make
  lexicon: BDAG
  rationale: Aorist subjunctive after θέλεις in an indirect-question-like construction
    is best rendered idiomatically in English as 'do you want me to do.'
- source_word: ὁ δὲ εἶπεν
  chosen: And he said
  alternatives:
  - But he said
  - Then he said
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative; 'And he
    said' gives natural narrative flow.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Following the project's default rendering for κύριος as 'Lord.' In this
    address to Jesus, 'Lord' preserves both respect and possible recognition beyond
    mere politeness; alternatives are worth preserving because the vocative can also
    function as respectful 'sir' in some contexts.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the request. In English prayer/request
    style, 'that I may...' is concise and natural.
- source_word: ἀναβλέψω
  chosen: I may see again
  alternatives:
  - I may regain my sight
  - I may look up
  lexicon: BDAG
  rationale: In healing contexts ἀναβλέπω commonly means to recover sight. 'See again'
    is direct and reflects the lexical sense without over-expanding; 'regain my sight'
    is a valid interpretive alternative.
