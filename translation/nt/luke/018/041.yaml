theological_decisions:
- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrine guidelines specify κύριος defaulting to 'Lord.' In this
    context the term can denote respectful address and may also carry christological
    resonance; retaining 'Lord' preserves that theological openness rather than reducing
    it to mere politeness.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological
    tension rather than resolve it'
