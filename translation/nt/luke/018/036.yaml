id: LUK.18.36
reference: Luke 18:36
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὄχλου διαπορευομένου ἐπυνθάνετο ⸀τί εἴη τοῦτο·
translation:
  text: And hearing a crowd passing by, he began asking what this was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was asking what this might be.' The imperfect verb can suggest repeated
      inquiry, and the optative in the indirect question can be rendered with a slightly
      more tentative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: hearing
  alternatives:
  - when he heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω is rendered with an English participle to
    preserve the circumstantial sense and the narrative flow. 'Hearing' is concise
    and natural, while allowing the temporal nuance to be inferred from context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative. 'And' preserves
    the continuity without overstating contrast.
- source_word: ὄχλου
  chosen: a crowd
  alternatives:
  - the crowd
  - a multitude
  lexicon: BDAG
  rationale: 'The genitive with the participle διαπορευομένου indicates what he heard:
    a crowd passing by. Because the noun is anarthrous, ''a crowd'' is the most natural
    English rendering.'
- source_word: διαπορευομένου
  chosen: passing by
  alternatives:
  - going by
  - moving along
  - passing through
  lexicon: BDAG
  rationale: The present middle/passive participle conveys ongoing movement. 'Passing
    by' fits the immediate scene of people moving past the blind man and is idiomatic
    in English.
- source_word: ἐπυνθάνετο
  chosen: he began asking
  alternatives:
  - he was asking
  - he inquired
  - he kept asking
  lexicon: BDAG
  rationale: The imperfect middle indicates repeated or inceptive action in past time.
    'He began asking' captures the likely inceptive nuance in a readable way; 'he
    was asking' is possible but less pointed.
- source_word: τί εἴη τοῦτο
  chosen: what this was
  alternatives:
  - what this might be
  - what this meant
  lexicon: BDAG
  rationale: The indirect question with the optative εἴη after a past-tense main verb
    is naturally rendered in English as 'what this was.' 'What this might be' is possible
    but sounds more tentative than necessary; 'what this meant' interprets beyond
    the immediate lexical sense.
