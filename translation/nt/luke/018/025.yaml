id: LUK.18.25
reference: Luke 18:25
source:
  edition: SBLGNT
  text: εὐκοπώτερον γάρ ἐστιν κάμηλον διὰ ⸂τρήματος βελόνης⸃ εἰσελθεῖν ἢ πλούσιον
    εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελθεῖν.
translation:
  text: For it is easier for a camel to enter through the eye of a needle than for
    a rich man to enter into the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'through a needle's eye.'
    reason: lexical_alternative
  - marker: b
    text: Some have proposed interpretive explanations such as a narrow gate called
      'the needle's eye' or the sense 'rope' instead of 'camel,' but the Greek text
      here reads 'camel.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐκοπώτερον
  chosen: easier
  alternatives:
  - more easily
  lexicon: BDAG
  rationale: Comparative adjective used predicatively with ἐστιν; idiomatic English
    expresses the comparison as 'it is easier' rather than the more wooden 'it is
    more easy.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force linking this saying to the preceding context.
    'For' is concise and natural in English.
- source_word: κάμηλον
  chosen: a camel
  lexicon: BDAG
  rationale: The standard meaning of κάμηλος is 'camel.' This should not be replaced
    by interpretive alternatives such as 'rope' without textual warrant.
- source_word: διὰ τρήματος βελόνης
  chosen: through the eye of a needle
  alternatives:
  - through a needle's eye
  - through the opening of a needle
  lexicon: BDAG
  rationale: This is the natural English equivalent of the genitive construction 'opening/hole
    of a needle.' 'Eye of a needle' is both accurate and idiomatic.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go in
  lexicon: BDAG
  rationale: Infinitive of εἰσέρχομαι; 'enter' is the standard concise rendering and
    fits both occurrences in the comparison.
- source_word: πλούσιον
  chosen: a rich man
  alternatives:
  - a rich person
  lexicon: BDAG
  rationale: The Greek adjective is masculine singular used substantivally. Per the
    translation philosophy, gender-accurate rendering is preferred; here 'man' matches
    the source form and the representative singular construction.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  chosen: into the kingdom of God
  alternatives:
  - into God's kingdom
  lexicon: BDAG
  rationale: βασιλεία τοῦ θεοῦ is a key biblical phrase best kept in its familiar,
    transparent form 'kingdom of God.' 'Into' preserves the directional force of εἰς
    and distinguishes it from the earlier spatial image.
