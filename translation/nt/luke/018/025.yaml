theological_decisions:
- issue: Interpretation of the camel/needle image
  chosen_reading: Retain the literal hyperbolic image 'a camel ... through the eye
    of a needle.'
  alternative_readings:
  - Interpretive explanations involving a narrow gate called 'the needle's eye'
  - The variant sense 'rope' instead of 'camel'
  rationale: The Greek text as given reads κάμηλον, 'camel,' and the phrase denotes
    an intentionally impossible or absurd image to stress the difficulty described.
    Later explanatory traditions should not be imported into the main text without
    textual support.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
