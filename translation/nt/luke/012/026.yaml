id: LUK.12.26
reference: Luke 12:26
source:
  edition: SBLGNT
  text: εἰ οὖν ⸀οὐδὲ ἐλάχιστον δύνασθε, τί περὶ τῶν λοιπῶν μεριμνᾶτε;
translation:
  text: If, then, you are not able to do even the smallest thing, why are you anxious
    about the rest?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why do you worry about the remaining things?'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ οὖν
  chosen: If, then
  alternatives:
  - If therefore
  - Since then
  lexicon: BDAG
  rationale: Retains the inferential conditional force of εἰ + οὖν from the preceding
    argument. 'If, then' is natural modern English while preserving the logical connection.
- source_word: οὐδὲ ἐλάχιστον
  chosen: not able to do even the smallest thing
  alternatives:
  - cannot do even the least
  - cannot do even a very little thing
  lexicon: BDAG
  rationale: The phrase is idiomatic and elliptical; ἐλάχιστον is neuter singular
    functioning substantivally, referring to the least/smallest matter. Adding 'thing'
    makes the sense explicit in English without over-paraphrasing.
- source_word: δύνασθε
  chosen: you are not able to do
  alternatives:
  - you cannot do
  - you are unable to do
  lexicon: BDAG
  rationale: δύναμαι denotes ability or capability. 'Are not able to do' preserves
    the verbal idea and works smoothly with the object supplied from ἐλάχιστον.
- source_word: τί
  chosen: why
  alternatives:
  - what
  - for what reason
  lexicon: BDAG
  rationale: 'Although literally ''what,'' τί in this construction with περὶ and a
    verb of anxiety is idiomatically causal/rhetorical: ''why are you anxious...?''
    This is standard and clearer English.'
- source_word: περὶ τῶν λοιπῶν
  chosen: about the rest
  alternatives:
  - about the remaining things
  - about the others
  lexicon: BDAG
  rationale: λοιπός here refers to the remaining matters beyond the 'smallest thing.'
    'The rest' is concise and idiomatic, preserving the comparative logic.
- source_word: μεριμνᾶτε
  chosen: are you anxious
  alternatives:
  - do you worry
  - are you concerned
  lexicon: BDAG
  rationale: μεριμνάω can mean 'be anxious' or 'worry.' 'Are you anxious' aligns well
    with the surrounding teaching against anxiety in this discourse and preserves
    the present-tense ongoing sense.
