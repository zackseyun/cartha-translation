theological_decisions:
- issue: Rendering of μεριμνάω in Jesus' teaching on dependence on God
  chosen_reading: anxious
  alternative_readings:
  - worry
  - be concerned
  rationale: The verse addresses improper anxiety rather than forbidding all prudent
    concern. 'Anxious' best matches the discourse context in Luke 12 and avoids sounding
    overly colloquial, while not importing a modern clinical sense.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather
    than resolve it
