theological_decisions:
- issue: Metaphorical force of 'leaven'
  chosen_reading: Retain 'leaven' as a metaphor for corrupting influence, explicitly
    identified in the text as hypocrisy.
  alternative_readings:
  - Render dynamically as 'teaching' or 'influence'
  rationale: Because Luke himself explains the metaphor with 'which is hypocrisy,'
    the translation should preserve the image rather than replace it with an interpretive
    paraphrase. This maintains theological and literary tension without importing
    a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of πρῶτον
  chosen_reading: Jesus spoke 'first to his disciples,' implying priority of audience
    rather than inserting an unstated sequence of later speeches.
  alternative_readings:
  - '''First of all, he said to his disciples'''
  rationale: The Greek allows either a discourse marker or an audience-priority nuance.
    The chosen rendering preserves the likely narrative sense without overinterpreting.
  doctrine_reference: Translation philosophy §3
