id: LUK.12.1
reference: Luke 12:1
source:
  edition: SBLGNT
  text: Ἐν οἷς ἐπισυναχθεισῶν τῶν μυριάδων τοῦ ὄχλου, ὥστε καταπατεῖν ἀλλήλους, ἤρξατο
    λέγειν πρὸς τοὺς μαθητὰς αὐτοῦ πρῶτον· Προσέχετε ἑαυτοῖς ἀπὸ τῆς ζύμης, ⸂ἥτις
    ἐστὶν ὑπόκρισις, τῶν Φαρισαίων⸃.
translation:
  text: Meanwhile, when the many thousands of the crowd had gathered together, so
    that they were trampling one another, he began to say first to his disciples,
    “Beware for yourselves of the leaven of the Pharisees, which is hypocrisy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the myriads of the crowd'; Greek μυριάδες can denote 'tens of thousands'
      or, more generally, a very large multitude.
    reason: lexical_alternative
  - marker: b
    text: Or 'Watch yourselves' / 'Be on your guard against the leaven of the Pharisees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν οἷς
  chosen: Meanwhile, when
  alternatives:
  - In the meantime, when
  - Under these circumstances, when
  lexicon: BDAG
  rationale: The idiom ἐν οἷς is temporal/circumstantial rather than spatial here,
    linking this scene to the preceding context. 'Meanwhile, when' gives natural English
    while preserving the transitional force.
- source_word: ἐπισυναχθεισῶν
  chosen: had gathered together
  alternatives:
  - had assembled
  - had been gathered together
  lexicon: BDAG
  rationale: Aorist passive participle in a genitive absolute. 'Had gathered together'
    captures the completed assembling of the crowd in idiomatic English; the passive
    nuance is not prominent enough to require a wooden rendering.
- source_word: τῶν μυριάδων τοῦ ὄχλου
  chosen: the many thousands of the crowd
  alternatives:
  - the myriads of the crowd
  - the thousands of the crowd
  lexicon: BDAG
  rationale: μυριάς can denote ten thousand or, more generally, a very large number.
    In narrative English, 'many thousands' best conveys the sense without sounding
    artificially literal. The genitive τοῦ ὄχλου is retained as 'of the crowd.'
- source_word: ὥστε καταπατεῖν ἀλλήλους
  chosen: so that they were trampling one another
  alternatives:
  - with the result that they trampled one another
  - so as to trample one another
  lexicon: BDAG
  rationale: ὥστε with infinitive expresses result here. 'They were trampling one
    another' communicates the ongoing, chaotic effect in readable English.
- source_word: ἤρξατο λέγειν
  chosen: he began to say
  alternatives:
  - he began speaking
  - he began to speak
  lexicon: BDAG
  rationale: This is a common inceptive construction. 'Began to say' stays close to
    the Greek while remaining natural.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ πρῶτον
  chosen: first to his disciples
  alternatives:
  - to his disciples first
  - first of all to his disciples
  lexicon: BDAG
  rationale: 'πρῶτον most naturally modifies the direction/priority of his address:
    before speaking more broadly, he addresses his disciples. ''First to his disciples''
    preserves that emphasis.'
- source_word: Προσέχετε ἑαυτοῖς
  chosen: Beware for yourselves
  alternatives:
  - Watch yourselves
  - Be on your guard
  lexicon: BDAG
  rationale: προσέχω with reflexive dative carries the sense of paying careful attention
    for one's own protection. 'Beware for yourselves' preserves both the warning force
    and the reflexive element better than a flatter 'beware.'
- source_word: ἀπὸ τῆς ζύμης
  chosen: of the leaven
  alternatives:
  - against the leaven
  - from the leaven
  - of the yeast
  lexicon: BDAG
  rationale: The warning is to guard oneself from the influence symbolized by leaven.
    'Leaven' is preferred over 'yeast' because it preserves the biblical metaphorical
    register and intertextual resonance.
- source_word: ἥτις ἐστὶν ὑπόκρισις
  chosen: which is hypocrisy
  alternatives:
  - that is, hypocrisy
  - which means hypocrisy
  lexicon: BDAG
  rationale: ἥτις is qualitative/explanatory, identifying the metaphor's referent.
    'Which is hypocrisy' is straightforward and preserves the appositional explanation.
- source_word: τῶν Φαρισαίων
  chosen: of the Pharisees
  alternatives:
  - belonging to the Pharisees
  - the Pharisees'
  lexicon: BDAG
  rationale: 'The genitive is possessive/descriptive: the leaven characterized by
    the Pharisees. ''Of the Pharisees'' is clear and close to the Greek.'
