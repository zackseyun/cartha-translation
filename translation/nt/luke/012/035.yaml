id: LUK.12.35
reference: Luke 12:35
source:
  edition: SBLGNT
  text: Ἔστωσαν ὑμῶν αἱ ὀσφύες περιεζωσμέναι καὶ οἱ λύχνοι καιόμενοι,
translation:
  text: Let your waists be girded and your lamps burning,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Let your clothes be ready for action.' The image is of gathering up
      long garments and fastening them for readiness.
    reason: cultural_note
lexical_decisions:
- source_word: Ἔστωσαν
  chosen: Let ... be
  alternatives:
  - Be
  - Keep ...
  lexicon: BDAG
  rationale: Third-person present imperative of εἰμί, introducing an exhortation.
    English idiom is best conveyed with 'Let ... be' rather than a stiffer 'Be' with
    plural body-part subjects.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: Genitive pronoun functioning possessively with both coordinated noun
    phrases; natural English requires 'your'.
- source_word: ὀσφύες
  chosen: waists
  alternatives:
  - loins
  lexicon: BDAG
  rationale: Literally refers to the loins/waist area. 'Waists' is more readable modern
    English, while still preserving the bodily image. 'Loins' is a traditional rendering
    but sounds archaic or overly anatomical in contemporary English.
- source_word: περιεζωσμέναι
  chosen: girded
  alternatives:
  - belted
  - dressed for action
  lexicon: BDAG
  rationale: Perfect passive participle of περιζώννυμι, literally 'having been girded
    around.' 'Girded' preserves the metaphor of securing one's garments for readiness.
    'Dressed for action' captures the sense but moves further toward interpretation;
    it is better preserved as a footnote.
- source_word: λύχνοι
  chosen: lamps
  alternatives:
  - lights
  lexicon: BDAG
  rationale: λύχνος denotes an oil lamp rather than light in the abstract. 'Lamps'
    is the precise concrete rendering.
- source_word: καιόμενοι
  chosen: burning
  alternatives:
  - lit
  - kept burning
  lexicon: BDAG
  rationale: Present participle of καίω, describing an ongoing state. 'Burning' preserves
    the durative sense better than the stative 'lit'; 'kept burning' is interpretive
    but possible.
