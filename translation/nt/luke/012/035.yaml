theological_decisions:
- issue: Idiomatic readiness imagery
  chosen_reading: Preserve the concrete metaphor ('waists be girded') in the main
    text
  alternative_readings:
  - Let your clothes be ready for action
  - Be dressed for action
  rationale: The verse uses a culturally specific image of preparedness. Following
    optimal equivalence, the main text keeps the metaphor rather than replacing it
    with a fully interpreted paraphrase. A footnote can preserve the idiomatic sense
    for modern readers.
  doctrine_reference: Translation philosophy §§1, 6
