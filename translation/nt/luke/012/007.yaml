id: LUK.12.7
reference: Luke 12:7
source:
  edition: SBLGNT
  text: ἀλλὰ καὶ αἱ τρίχες τῆς κεφαλῆς ὑμῶν πᾶσαι ἠρίθμηνται· ⸀μὴ φοβεῖσθε· πολλῶν
    στρουθίων διαφέρετε.
translation:
  text: But even the hairs of your head have all been counted. Do not fear; you are
    worth more than many sparrows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you are more valuable than many sparrows.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'are numbered' for 'have been counted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: But even
  alternatives:
  - Indeed even
  - But also
  lexicon: BDAG
  rationale: 'Combines adversative ἀλλά with additive/intensive καί to mark contrast
    with the preceding thought while heightening the reassurance: not only are sparrows
    noticed, but even the hairs are counted.'
- source_word: αἱ τρίχες τῆς κεφαλῆς ὑμῶν
  chosen: the hairs of your head
  alternatives:
  - your head hairs
  - the hairs on your head
  lexicon: BDAG
  rationale: A natural but still fairly formal rendering of the genitive construction,
    preserving the concrete image.
- source_word: πᾶσαι
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: Placed with 'have all been counted' to reflect the distributive force
    without awkward English word order.
- source_word: ἠρίθμηνται
  chosen: have all been counted
  alternatives:
  - are numbered
  - have been numbered
  lexicon: BDAG
  rationale: Perfect passive indicates a completed action with present result. 'Have
    been counted' is clearer in contemporary English than the traditional 'are numbered,'
    while preserving the sense of exact divine knowledge.
- source_word: μὴ φοβεῖσθε
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: BDAG
  rationale: A direct imperative rendering. 'Do not fear' is concise and natural,
    and it matches the verbal force without adding words.
- source_word: πολλῶν στρουθίων
  chosen: many sparrows
  alternatives:
  - many small birds
  lexicon: BDAG
  rationale: στρουθίον refers here to sparrows, the same bird in the immediate context.
    Retaining 'sparrows' preserves contextual continuity.
- source_word: διαφέρετε
  chosen: you are worth more than
  alternatives:
  - you are more valuable than
  - you surpass
  lexicon: BDAG
  rationale: In this context διαφέρω expresses comparative value rather than mere
    difference. 'Are worth more than' communicates the idiomatic sense clearly in
    modern English.
