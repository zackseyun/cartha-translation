theological_decisions:
- issue: Comparative statement about human value relative to sparrows
  chosen_reading: you are worth more than many sparrows
  alternative_readings:
  - you are more valuable than many sparrows
  rationale: The verse teaches God's attentive care for disciples by arguing from
    lesser to greater. 'Worth more' expresses comparative value in context without
    importing a broader philosophical claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
