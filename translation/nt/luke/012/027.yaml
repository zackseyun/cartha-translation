theological_decisions:
- issue: Reference of the floral imagery
  chosen_reading: Specific 'lilies' retained rather than generalized to 'flowers'
    or 'wildflowers.'
  alternative_readings:
  - the flowers
  - the wildflowers
  rationale: The Greek text names κρίνα specifically. While the broader teaching concerns
    God's care in creation, no doctrinal issue requires broadening the term beyond
    the source wording.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Rendering of δόξα in Solomon's description
  chosen_reading: Rendered as 'glory' rather than 'splendor.'
  alternative_readings:
  - splendor
  rationale: Both are viable, but 'glory' preserves lexical continuity and biblical
    resonance while remaining readable in context.
  doctrine_reference: Translation philosophy §5, consistency of key terms, or documented
    exception
