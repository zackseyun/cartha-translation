id: LUK.12.27
reference: Luke 12:27
source:
  edition: SBLGNT
  text: κατανοήσατε τὰ κρίνα πῶς αὐξάνει· οὐ κοπιᾷ οὐδὲ νήθει· λέγω δὲ ὑμῖν, οὐδὲ
    Σολομὼν ἐν πάσῃ τῇ δόξῃ αὐτοῦ περιεβάλετο ὡς ἓν τούτων.
translation:
  text: 'Consider the lilies, how they grow: they do not labor or spin; yet I tell
    you, not even Solomon in all his glory was clothed like one of these.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wildflowers' or 'the flowers'; the Greek specifically says 'lilies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with all his splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  chosen: Consider
  alternatives:
  - Observe
  - Think carefully about
  lexicon: BDAG
  rationale: Aorist imperative calling for attentive reflection, not mere sight. 'Consider'
    is concise, idiomatic, and preserves the force of deliberate observation.
- source_word: τὰ κρίνα
  chosen: the lilies
  alternatives:
  - the wildflowers
  - the flowers
  lexicon: BDAG
  rationale: κρίνα most naturally refers to lilies. Although the broader point concerns
    field flowers generally in the parallel tradition, this verse specifically uses
    'lilies,' so the more specific rendering is retained.
- source_word: πῶς αὐξάνει
  chosen: how they grow
  alternatives:
  - how it grows
  - in what way they grow
  lexicon: BDAG
  rationale: 'The neuter plural subject takes a singular verb in Greek, but idiomatic
    English uses plural agreement: ''they grow.'' ''How'' preserves the manner-focused
    sense of πῶς.'
- source_word: οὐ κοπιᾷ
  chosen: they do not labor
  alternatives:
  - they do not toil
  - it does not labor
  lexicon: BDAG
  rationale: κοπιάω denotes laboring or toiling. 'Labor' is natural modern English
    and pairs well with 'spin' in the next clause.
- source_word: οὐδὲ νήθει
  chosen: or spin
  alternatives:
  - nor spin thread
  lexicon: BDAG
  rationale: νήθω refers to spinning fiber/thread. 'Spin' is the standard concise
    English equivalent and fits the contrast with human clothing production.
- source_word: λέγω δὲ ὑμῖν
  chosen: yet I tell you
  alternatives:
  - but I tell you
  - and I tell you
  lexicon: BDAG
  rationale: δὲ here marks a mild contrast or transition. 'Yet' fits the rhetorical
    movement from observation to emphatic conclusion.
- source_word: οὐδὲ Σολομὼν
  chosen: not even Solomon
  alternatives:
  - nor even Solomon
  lexicon: BDAG
  rationale: 'οὐδὲ adds emphatic negation: even the paradigmatically glorious king
    does not match the lilies.'
- source_word: ἐν πάσῃ τῇ δόξῃ αὐτοῦ
  chosen: in all his glory
  alternatives:
  - with all his splendor
  - in all his splendor
  lexicon: BDAG
  rationale: δόξα here refers to regal splendor rather than abstract honor. 'Glory'
    is traditional and understandable, and preserves the broader semantic resonance.
- source_word: περιεβάλετο
  chosen: was clothed
  alternatives:
  - was dressed
  - clothed himself
  lexicon: BDAG
  rationale: The middle/passive form here is best rendered idiomatically as 'was clothed'
    or 'was dressed.' 'Was clothed' preserves the clothing imagery without over-specifying
    agency.
- source_word: ὡς ἓν τούτων
  chosen: like one of these
  alternatives:
  - like one of these lilies
  - as one of these
  lexicon: BDAG
  rationale: A straightforward comparison. 'These' naturally refers back to the lilies;
    adding 'lilies' is possible but unnecessary in the main text.
