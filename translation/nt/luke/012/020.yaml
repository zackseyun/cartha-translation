id: LUK.12.20
reference: Luke 12:20
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῷ ὁ θεός· ⸀Ἄφρων, ταύτῃ τῇ νυκτὶ τὴν ψυχήν σου ⸀ἀπαιτοῦσιν ἀπὸ
    σοῦ· ἃ δὲ ἡτοίμασας, τίνι ἔσται;
translation:
  text: But God said to him, ‘Fool! This very night your life is being demanded back
    from you, and the things you prepared—whose will they be?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your soul is being demanded back from you.' The Greek word can mean
      'life' or 'soul,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄφρων
  chosen: Fool
  alternatives:
  - You fool
  - Senseless one
  lexicon: BDAG
  rationale: Vocative singular adjective used as direct address. 'Fool' is the most
    natural and forceful English equivalent, preserving the rebuke without unnecessary
    expansion.
- source_word: ταύτῃ τῇ νυκτί
  chosen: This very night
  alternatives:
  - This night
  - On this very night
  lexicon: BDAG
  rationale: The demonstrative plus dative temporal expression emphasizes immediacy.
    'This very night' captures the urgency and emphasis more idiomatically than the
    more wooden 'this night.'
- source_word: ψυχήν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this context ψυχή refers to the man's life as that which can be taken
    from him that very night, not primarily to the immaterial soul in abstraction.
    'Life' best fits the immediate context, while 'soul' is preserved in a footnote
    because of the word's broader semantic range and traditional rendering.
- source_word: ἀπαιτοῦσιν ἀπὸ σοῦ
  chosen: is being demanded back from you
  alternatives:
  - they are demanding from you
  - is required of you
  - they demand back from you
  lexicon: BDAG
  rationale: ἀπαιτέω can mean to demand back, require, or exact. The plural verb with
    unspecified subject is naturally rendered in English with an impersonal passive
    to avoid inventing agents. 'Demanded back' preserves the sense of reclamation,
    fitting the idea that life is not ultimately self-owned.
- source_word: ἃ δὲ ἡτοίμασας
  chosen: the things you prepared
  alternatives:
  - what you have prepared
  - the things you made ready
  lexicon: BDAG
  rationale: The neuter plural relative pronoun points to the accumulated goods. 'The
    things you prepared' is clear and close to the Greek, while still natural English.
- source_word: τίνι ἔσται
  chosen: whose will they be?
  alternatives:
  - to whom will they belong?
  - for whom will they be?
  lexicon: BDAG
  rationale: The dative interrogative asks about possession or ownership. 'Whose will
    they be?' is concise, idiomatic, and preserves the rhetorical force of the question.
