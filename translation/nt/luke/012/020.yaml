theological_decisions:
- issue: Rendering ψυχή in a context of death
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse speaks of the man's imminent death and the forfeiture of his
    earthly life. Rendering ψυχή as 'life' avoids importing a narrower anthropological
    claim than the context requires, while preserving 'soul' in a footnote because
    the Greek term can bear that sense and many readers will expect it.
  doctrine_reference: Preserve theological tension rather than resolve it.
