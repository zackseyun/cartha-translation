id: LUK.12.44
reference: Luke 12:44
source:
  edition: SBLGNT
  text: ἀληθῶς λέγω ὑμῖν ὅτι ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ καταστήσει αὐτόν.
translation:
  text: Truly I tell you that he will appoint him over all that he has.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all his possessions' or 'all his property.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀληθῶς
  chosen: Truly
  alternatives:
  - Indeed
  - Certainly
  lexicon: BDAG
  rationale: Adverb emphasizing the truthfulness and solemnity of the statement. 'Truly'
    preserves the emphatic force in natural English and fits Jesus' speech style.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A common discourse formula. 'I tell you' is slightly more natural in
    contemporary English while preserving the direct address and authoritative assertion.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what is being said; standard English complementizer.
- source_word: ἐπὶ
  chosen: over
  alternatives:
  - in charge of
  - upon
  lexicon: BDAG
  rationale: With the dative here, ἐπί expresses authority or supervision. 'Over'
    is concise and matches the sense of being placed in authority.
- source_word: πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ
  chosen: all that he has
  alternatives:
  - all his possessions
  - all his property
  lexicon: BDAG
  rationale: The participial expression from ὑπάρχω refers to what belongs to someone,
    i.e., possessions or property. 'All that he has' is idiomatic, broad, and preserves
    the comprehensive scope without over-specifying material goods only.
- source_word: καταστήσει
  chosen: he will appoint
  alternatives:
  - he will put
  - he will set
  - he will place
  lexicon: BDAG
  rationale: Future of καθίστημι in this context means to appoint or put someone in
    charge. 'Appoint' clearly conveys formal entrusting of responsibility.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to the faithful manager/slave in the immediate
    context. Masculine singular should be retained per gender-accurate translation
    philosophy.
