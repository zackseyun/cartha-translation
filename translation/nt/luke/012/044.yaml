theological_decisions:
- issue: Representative masculine pronouns in a parabolic context
  chosen_reading: Retain 'he' and 'him'
  alternative_readings:
  - use gender-neutral forms such as 'they' or 'that person'
  rationale: The Greek uses masculine singular forms, referring to the male character
    within the parable. Following the stated gender-accurate philosophy, the translation
    preserves the masculine singular rather than neutralizing it.
