id: LUK.12.11
reference: Luke 12:11
source:
  edition: SBLGNT
  text: ὅταν δὲ ⸀εἰσφέρωσιν ὑμᾶς ἐπὶ τὰς συναγωγὰς καὶ τὰς ἀρχὰς καὶ τὰς ἐξουσίας,
    μὴ ⸀μεριμνήσητε πῶς ⸂ἢ τί⸃ ἀπολογήσησθε ἢ τί εἴπητε·
translation:
  text: But whenever they bring you before the synagogues and the rulers and the authorities,
    do not worry about how or what you should defend yourselves, or what you should
    say;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'how you should make your defense.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the synagogues and the rulers and the authorities' refers to
      religious and civil bodies before whom disciples might be examined.
    reason: cultural_note
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But whenever
  alternatives:
  - And whenever
  - Whenever
  lexicon: BDAG
  rationale: ὅταν introduces an indefinite future contingency ('whenever'), and δέ
    is best represented with a mild adversative/continuative 'But' in context, preserving
    discourse flow without overstating contrast.
- source_word: εἰσφέρωσιν
  chosen: they bring
  alternatives:
  - they bring in
  - they lead
  lexicon: BDAG
  rationale: The verb literally means 'bring in' or 'bring before.' In this judicial
    context, 'bring' is natural English and fits the following ἐπί + accusative phrase
    indicating appearance before authorities.
- source_word: ἐπὶ τὰς συναγωγὰς καὶ τὰς ἀρχὰς καὶ τὰς ἐξουσίας
  chosen: before the synagogues and the rulers and the authorities
  alternatives:
  - to the synagogues and the rulers and the authorities
  - before synagogues and rulers and authorities
  lexicon: BDAG
  rationale: ἐπί with the accusative here has the sense of being brought before tribunals
    or governing bodies. 'Before' communicates judicial setting better than a bare
    'to.' The articles are retained in English for rhythm and specificity.
- source_word: συναγωγάς
  chosen: synagogues
  alternatives:
  - synagogue courts
  lexicon: BDAG
  rationale: The noun is literally 'synagogues.' In context it likely refers metonymically
    to synagogue tribunals, but the translation keeps the formal lexical value and
    lets context imply the judicial function.
- source_word: ἀρχάς
  chosen: rulers
  alternatives:
  - magistrates
  - principalities
  lexicon: BDAG
  rationale: In this legal/governing context, ἀρχαί refers to ruling authorities or
    magistrates. 'Rulers' is broad, readable, and contextually appropriate.
- source_word: ἐξουσίας
  chosen: authorities
  alternatives:
  - powers
  - official authorities
  lexicon: BDAG
  rationale: ἐξουσίαι here denotes authorities vested with power. 'Authorities' is
    the most natural judicial-political rendering in modern English.
- source_word: μὴ μεριμνήσητε
  chosen: do not worry
  alternatives:
  - do not be anxious
  - do not be concerned
  lexicon: BDAG
  rationale: The prohibition concerns anxious preoccupation. 'Do not worry' is idiomatic
    modern English and preserves the force without sounding clinical or archaic.
- source_word: πῶς ἢ τί
  chosen: how or what
  alternatives:
  - how
  - how or with what
  lexicon: BDAG
  rationale: The paired interrogatives cover both manner and content. The textual
    form includes both πῶς and τί, so both are represented in the main text.
- source_word: ἀπολογήσησθε
  chosen: you should defend yourselves
  alternatives:
  - you should make your defense
  - you should answer in your defense
  lexicon: BDAG
  rationale: The middle voice and forensic setting support 'defend yourselves.' This
    is more natural than the noun-like 'make your defense' while preserving the legal
    sense of ἀπολογέομαι.
- source_word: ἢ τί εἴπητε
  chosen: or what you should say
  alternatives:
  - or what you are to say
  - or what you should speak
  lexicon: BDAG
  rationale: This clause distinguishes the content of speech from the manner/defense
    clause before it. 'What you should say' is clear and idiomatic.
