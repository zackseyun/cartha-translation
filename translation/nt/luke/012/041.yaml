id: LUK.12.41
reference: Luke 12:41
source:
  edition: SBLGNT
  text: Εἶπεν ⸀δὲ ὁ Πέτρος· Κύριε, πρὸς ἡμᾶς τὴν παραβολὴν ταύτην λέγεις ἢ καὶ πρὸς
    πάντας;
translation:
  text: Then Peter said, “Lord, are you telling this parable to us, or also to everyone?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to all.” The Greek πάντας is masculine plural but used generically here
      for the broader audience.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said.' Although the content
    is interrogative, English can preserve that through punctuation and wording without
    changing the reporting verb to 'asked.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks discourse continuation. 'Then' gives a natural narrative transition
    in modern English while preserving sequence better than a bare 'and.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' In direct address to Jesus here, 'Lord' fits both the lexical sense
    and the project's consistency rule.
- source_word: πρὸς ἡμᾶς
  chosen: to us
  alternatives:
  - for us
  - to us disciples
  lexicon: BDAG
  rationale: πρός with accusative after λέγεις indicates direction of speech, so 'to
    us' is the most straightforward rendering. 'For us' is possible idiomatic English
    but less precise.
- source_word: τὴν παραβολὴν ταύτην
  chosen: this parable
  alternatives:
  - this illustration
  lexicon: BDAG
  rationale: παραβολή is regularly rendered 'parable' in the Synoptics and clearly
    refers to Jesus' figurative teaching here. 'Illustration' is possible but loses
    canonical and literary continuity.
- source_word: λέγεις
  chosen: are you telling
  alternatives:
  - do you tell
  - are you speaking
  lexicon: BDAG
  rationale: 'Present indicative in a direct question can be rendered with English
    progressive for natural idiom: ''are you telling.'' This preserves the immediacy
    of Peter''s question.'
- source_word: ἢ καὶ
  chosen: or also
  alternatives:
  - or even
  - or
  lexicon: BDAG
  rationale: The combination heightens the second option rather than merely contrasting
    it. 'Or also' preserves both the disjunctive force of ἤ and the additive force
    of καί.
- source_word: πρὸς πάντας
  chosen: to everyone
  alternatives:
  - to all
  - to everyone present
  lexicon: BDAG
  rationale: πάντας is masculine plural but generic in context, referring broadly
    to all hearers rather than only males. Per the gender-accurate policy, 'everyone'
    best conveys the representative sense in natural English.
