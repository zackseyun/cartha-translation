theological_decisions:
- issue: Rendering of κύριος in Peter's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine file specifies 'Lord' as the default rendering for κύριος.
    Nothing in this context requires deviation, and 'Lord' preserves both respect
    and possible christological resonance without overstating the verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Generic masculine πάντας
  chosen_reading: everyone
  alternative_readings:
  - all
  - all people
  rationale: The Greek masculine plural is generic here, contrasting 'us' with the
    wider audience. Rendering it as 'everyone' preserves the inclusive referent without
    importing a male-specific limitation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 (Gender-accurate over
    gender-neutral)'
