theological_decisions:
- issue: Jesus' refusal of civil-adjudicative role
  chosen_reading: Render the statement as a rhetorical refusal to accept appointment
    as judge or divider in this dispute, without importing a broader denial of all
    judicial authority.
  alternative_readings:
  - A broader rejection of any social or legal role
  - An implicit critique of inheritance law itself
  rationale: The Greek focuses narrowly on who appointed him to this role over the
    disputants. The translation should preserve that immediate sense and not overread
    it into a comprehensive political or theological program.
  doctrine_reference: Preserve theological tension rather than resolve it.
