id: LUK.12.14
reference: Luke 12:14
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτῷ· Ἄνθρωπε, τίς με κατέστησεν ⸀κριτὴν ἢ μεριστὴν ἐφ’ ὑμᾶς;
translation:
  text: But he said to him, “Man, who appointed me a judge or divider over you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, who appointed me a judge or divider over you?”
    reason: lexical_alternative
  - marker: b
    text: “Divider” refers to one who apportions property, likely in an inheritance
      dispute.
    reason: cultural_note
lexical_decisions:
- source_word: Ἄνθρωπε
  chosen: Man
  alternatives:
  - Sir
  lexicon: BDAG
  rationale: Vocative singular of ἄνθρωπος used in direct address. 'Man' preserves
    the blunt, generic address of the Greek better than the more polite 'sir.' This
    follows the gender-accurate principle and matches the source's tone.
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: Interrogative pronoun asking for the identity of the one who authorized
    such a role. Standard English 'who' is the natural equivalent.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - made
  - set
  - established
  lexicon: BDAG
  rationale: Aorist of καθίστημι here means to appoint or designate someone to an
    office or function. 'Appointed' best conveys formal authorization in context,
    more precisely than the broader 'made.'
- source_word: κριτήν
  chosen: judge
  alternatives:
  - arbiter
  lexicon: BDAG
  rationale: κριτής denotes one who judges or decides a case. 'Judge' is the most
    direct and natural rendering; 'arbiter' is possible but less transparent for modern
    readers.
- source_word: μεριστήν
  chosen: divider
  alternatives:
  - arbitrator
  - distributor
  - one who divides
  lexicon: BDAG
  rationale: μεριστής refers to one who apportions or divides property. 'Divider'
    is slightly unusual in English but preserves the concrete sense of dividing an
    inheritance, and pairs closely with the Greek noun. 'Arbitrator' would blur the
    distinction from 'judge.'
- source_word: ἐφ’ ὑμᾶς
  chosen: over you
  alternatives:
  - concerning you
  - among you
  lexicon: BDAG
  rationale: ἐπί with accusative can indicate authority or jurisdiction over persons.
    'Over you' best fits the sense of being appointed to exercise judicial or distributive
    authority in their case.
- source_word: ὁ δὲ εἶπεν αὐτῷ
  chosen: But he said to him
  alternatives:
  - And he said to him
  lexicon: BDAG
  rationale: δέ often marks a mild contrast or continuation. 'But' fits the responsive
    turn after the man's request and is idiomatic in English narrative.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Simple disjunctive conjunction linking the two roles, judge and divider.
