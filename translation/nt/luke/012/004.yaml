id: LUK.12.4
reference: Luke 12:4
source:
  edition: SBLGNT
  text: Λέγω δὲ ὑμῖν τοῖς φίλοις μου, μὴ φοβηθῆτε ἀπὸ τῶν ἀποκτεινόντων τὸ σῶμα καὶ
    μετὰ ταῦτα μὴ ἐχόντων περισσότερόν τι ποιῆσαι.
translation:
  text: But I say to you, my friends, do not fear those who kill the body and after
    that have nothing more they can do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not be afraid of those who kill the body and after that cannot do
      anything more.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ
  chosen: But I say
  alternatives:
  - And I say
  - Now I say
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here, marking a transition in Jesus'
    address. 'But I say' preserves the discourse shift naturally in English without
    overstating contrast.
- source_word: ὑμῖν τοῖς φίλοις μου
  chosen: to you, my friends
  alternatives:
  - to you who are my friends
  - to my friends
  lexicon: BDAG
  rationale: 'The dative phrase is appositional/explanatory: Jesus addresses the hearers
    as ''my friends.'' ''To you, my friends'' preserves both the pronoun and the affectionate
    designation.'
- source_word: μὴ φοβηθῆτε
  chosen: do not fear
  alternatives:
  - do not be afraid of
  - do not become afraid of
  lexicon: BDAG
  rationale: Aorist passive/deponent subjunctive with μή functions as a prohibition.
    'Do not fear' is concise and idiomatic, while retaining the force of forbidding
    fear rather than merely describing emotion.
- source_word: ἀπὸ τῶν ἀποκτεινόντων
  chosen: those who kill
  alternatives:
  - those killing
  - those who are killing
  lexicon: BDAG
  rationale: The preposition ἀπό after φοβέομαι marks the object/source of fear. The
    present participle is best rendered generically as 'those who kill,' referring
    to people characterized by the ability or act of killing.
- source_word: τὸ σῶμα
  chosen: the body
  lexicon: BDAG
  rationale: σῶμα is the physical body here, contrasted implicitly with what lies
    beyond bodily death. 'The body' is the plain and contextually appropriate rendering.
- source_word: καὶ μετὰ ταῦτα
  chosen: and after that
  alternatives:
  - and after these things
  - and afterward
  lexicon: BDAG
  rationale: μετὰ ταῦτα is temporal. 'After that' is natural modern English and preserves
    the sequence following bodily death.
- source_word: μὴ ἐχόντων περισσότερόν τι ποιῆσαι
  chosen: have nothing more they can do
  alternatives:
  - are unable to do anything more
  - have nothing further to do
  lexicon: BDAG
  rationale: The participial phrase describes the killers' limitation after death.
    περισσότερόν τι conveys 'anything more/further.' 'Have nothing more they can do'
    is idiomatic and keeps the emphasis on their inability to go beyond killing the
    body.
