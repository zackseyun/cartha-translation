theological_decisions:
- issue: Scope of human power after bodily death
  chosen_reading: The verse is rendered to state only that human persecutors can kill
    the body and cannot do anything further beyond that.
  alternative_readings:
  - An interpretive expansion specifying that they cannot kill the soul
  rationale: Although the broader context in the next verse contrasts human limits
    with God's authority, this verse itself does not explicitly mention the soul.
    The translation preserves the text's wording without importing the next verse's
    theological contrast into this line.
  doctrine_reference: Preserve theological tension rather than resolve it.
