id: LUK.12.49
reference: Luke 12:49
source:
  edition: SBLGNT
  text: Πῦρ ἦλθον βαλεῖν ⸀ἐπὶ τὴν γῆν, καὶ τί θέλω εἰ ἤδη ἀνήφθη;
translation:
  text: I came to cast fire on the earth, and how I wish it were already kindled!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and what do I want if it has already been kindled?'
      The Greek clause is difficult; the main text reflects the probable idiomatic
      sense of strong desire.
    reason: alternative_reading
lexical_decisions:
- source_word: Πῦρ
  chosen: fire
  alternatives:
  - a fire
  lexicon: BDAG
  rationale: The anarthrous noun is best rendered simply as 'fire.' In context it
    is metaphorical and programmatic, but the translation should preserve the image
    rather than interpret it as 'judgment' or 'purification' in the main text.
- source_word: ἦλθον
  chosen: I came
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: The aorist is idiomatically rendered in English as 'I came' here, expressing
    Jesus' mission/purpose. 'I have come' is also possible in English for mission
    statements, but 'I came' more directly reflects the Greek form while remaining
    natural.
- source_word: βαλεῖν
  chosen: to cast
  alternatives:
  - to throw
  - to bring
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast.' 'Cast' preserves the vividness and
    solemn tone of the saying better than the flatter 'bring.'
- source_word: ἐπὶ τὴν γῆν
  chosen: on the earth
  alternatives:
  - upon the earth
  - on the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'land,' or 'ground.' In this universal-sounding
    mission saying, 'the earth' is the most natural scope. 'Land' would sound too
    localized without contextual warrant.
- source_word: καὶ τί θέλω εἰ ἤδη ἀνήφθη;
  chosen: and how I wish it were already kindled!
  alternatives:
  - and what do I want if it has already been kindled?
  - and what more do I desire if it is already lit?
  lexicon: BDAG
  rationale: 'This clause is famously difficult. Although a very literal rendering
    of τί θέλω εἰ could be ''what do I want if...,'' the idiomatic sense in context
    is exclamatory: Jesus expresses intense desire that the fire already be ignited.
    This is a widely recognized sense and yields coherent English without over-paraphrase.'
- source_word: ἤδη
  chosen: already
  lexicon: BDAG
  rationale: ἤδη straightforwardly marks the desired action as already accomplished.
- source_word: ἀνήφθη
  chosen: were kindled
  alternatives:
  - had been ignited
  - were lit
  lexicon: BDAG
  rationale: From ἀνάπτω, passive 'be kindled/ignited.' 'Kindled' fits the fire imagery
    and elevated tone better than 'lit.' The English subjunctive-like form 'were kindled'
    matches the wish construction.
