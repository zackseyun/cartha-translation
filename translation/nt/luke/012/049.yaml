theological_decisions:
- issue: Meaning of 'fire' in Jesus' saying
  chosen_reading: Retain the metaphor as 'fire' without specifying whether it refers
    to judgment, purification, the Spirit, or division.
  alternative_readings:
  - judgment
  - purification
  - the Holy Spirit
  - the divisive crisis of Jesus' mission
  rationale: The verse itself does not explicitly define the metaphor, and the translation
    should preserve the theological tension rather than resolve it. Context in the
    surrounding passage suggests conflict and crisis, but the image may carry multiple
    resonances.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of the difficult clause τί θέλω εἰ ἤδη ἀνήφθη
  chosen_reading: 'Render as an exclamation of desire: ''how I wish it were already
    kindled!'''
  alternative_readings:
  - 'a literal question: ''what do I want if it has already been kindled?'''
  rationale: The literal wording is awkward and obscure in English, while the exclamatory
    sense is a well-established interpretation that best accounts for the discourse
    context and yields natural English. This is a translational decision about idiom,
    not an attempt to settle a doctrinal dispute.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning in readable modern English.'
