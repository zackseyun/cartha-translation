id: LUK.12.21
reference: Luke 12:21
source:
  edition: SBLGNT
  text: οὕτως ὁ θησαυρίζων ⸀ἑαυτῷ καὶ μὴ εἰς θεὸν πλουτῶν.
translation:
  text: So is the man who stores up treasure for himself and is not rich toward God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who stores up treasure for himself and is not rich before God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So is
  alternatives:
  - Thus is
  - This is how it is with
  lexicon: BDAG
  rationale: Here οὕτως draws an application from the preceding parable ('so/thus').
    'So is' gives concise proverbial force in English and naturally introduces the
    implied predicate about the kind of person just described.
- source_word: ὁ θησαυρίζων
  chosen: the man who stores up treasure
  alternatives:
  - the one storing up
  - he who treasures up
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    generically to a person characterized by this action. 'Stores up treasure' preserves
    the lexical connection to treasure/hoarding better than a flatter 'saves up.'
    'Man' reflects the grammatically masculine representative singular per the project's
    gender-accurate policy.
- source_word: ἑαυτῷ
  chosen: for himself
  alternatives:
  - for his own benefit
  - for himself alone
  lexicon: BDAG
  rationale: The dative reflexive indicates personal advantage. 'For himself' is the
    most direct and idiomatic rendering, preserving the self-directed focus of the
    rich fool.
- source_word: καὶ μὴ
  chosen: and is not
  alternatives:
  - but is not
  - and not being
  lexicon: BDAG
  rationale: With the second participle coordinated to the first, English idiom is
    best served by supplying 'is' in parallel with the substantival participle construction.
    'And' preserves the Greek conjunction without overstating contrast.
- source_word: εἰς θεὸν
  chosen: toward God
  alternatives:
  - for God
  - in relation to God
  - before God
  lexicon: BDAG
  rationale: The preposition εἰς with πλουτέω is idiomatic and directional. 'Rich
    toward God' is a well-established and semantically transparent rendering that
    preserves the relational orientation rather than reducing it merely to possession
    or divine evaluation.
- source_word: πλουτῶν
  chosen: rich
  alternatives:
  - being rich
  - abounding in wealth
  lexicon: BDAG
  rationale: Although formally a participle ('being rich'), idiomatic English after
    'is not' prefers the predicate adjective 'rich.' This preserves the sense without
    awkwardness and keeps the contrast with storing up earthly treasure.
