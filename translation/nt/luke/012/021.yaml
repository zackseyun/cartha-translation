theological_decisions:
- issue: Representative masculine singular in a moral saying
  chosen_reading: the man who
  alternative_readings:
  - the one who
  - the person who
  rationale: The Greek uses a masculine singular substantival participle with article.
    Following the project's gender-accurate policy, the translation retains a masculine
    representative singular rather than neutralizing it, since the saying presents
    a generic exemplar rather than specifying male-only application.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Meaning of being 'rich toward God'
  chosen_reading: retain the relational phrase without interpretive expansion
  alternative_readings:
  - rich in what matters to God
  - rich before God
  rationale: The phrase is theologically suggestive but not explicitly defined in
    the verse. To preserve the text's tension and avoid importing a narrower doctrinal
    explanation, the translation keeps the idiomatic wording 'rich toward God.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
