theological_decisions:
- issue: Supplying the antecedent of ἐκεῖνοι
  chosen_reading: those servants
  alternative_readings:
  - those
  rationale: 'The Greek uses a demonstrative pronoun whose referent is clear from
    the immediate context: the master''s servants/slaves in the preceding verses.
    Supplying ''servants'' in English improves clarity without adding new theological
    content. Because δοῦλος is not present in this verse, no slave/servant lexical
    decision is being made here for the Greek text of this verse itself.'
  doctrine_reference: Translation philosophy §1, §5
