id: LUK.12.38
reference: Luke 12:38
source:
  edition: SBLGNT
  text: ⸂κἂν ἐν τῇ δευτέρᾳ κἂν⸃ ἐν τῇ τρίτῃ φυλακῇ ἔλθῃ καὶ εὕρῃ οὕτως, μακάριοί ⸀εἰσιν
    ἐκεῖνοι.
translation:
  text: Even if he comes in the second watch, or even in the third, and finds them
    so, blessed are those servants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in the second watch of the night, or in the third
      watch of the night.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'blessed are those.' The referent is the servants mentioned in
      the immediate context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἂν ... κἂν
  chosen: Even if ... or even
  alternatives:
  - and if
  - even if ... even if
  lexicon: BDAG
  rationale: κἄν introduces a concessive/indefinite condition ('even if'). Repeating
    it before both time phrases is naturally represented in English as 'Even if ...
    or even ...', preserving the emphatic repetition without awkwardness.
- source_word: δευτέρᾳ ... τρίτῃ φυλακῇ
  chosen: the second watch ... the third
  alternatives:
  - the second watch of the night ... the third watch of the night
  - the second shift ... the third shift
  lexicon: BDAG
  rationale: φυλακή here refers to a watch of the night, not imprisonment or a guard-post.
    'Watch' is the standard concise rendering. 'Of the night' is implicit from context
    and can be omitted in the main text for readability.
- source_word: ἔλθῃ
  chosen: he comes
  alternatives:
  - he should come
  - he may come
  lexicon: BDAG
  rationale: Aorist subjunctive in this conditional construction is well conveyed
    by a simple present in English ('if he comes'), which is idiomatic and preserves
    the indefinite future sense.
- source_word: εὕρῃ οὕτως
  chosen: finds them so
  alternatives:
  - finds them like this
  - finds it so
  lexicon: BDAG
  rationale: 'οὕτως points back to the servants'' state of readiness in the preceding
    verse. English idiom favors supplying the implied object from context: ''finds
    them so.'''
- source_word: μακάριοί
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: μακάριος carries the sense of being in a favored or enviable state before
    God. 'Blessed' preserves the biblical and theological weight better than 'happy'
    or 'fortunate'.
- source_word: ἐκεῖνοι
  chosen: those servants
  alternatives:
  - those
  - they
  lexicon: BDAG
  rationale: The pronoun literally means 'those,' but English style benefits from
    making explicit the antecedent from the context ('servants') to avoid ambiguity.
    This is a minimal contextual supply rather than paraphrase.
