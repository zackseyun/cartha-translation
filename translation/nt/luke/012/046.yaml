id: LUK.12.46
reference: Luke 12:46
source:
  edition: SBLGNT
  text: ἥξει ὁ κύριος τοῦ δούλου ἐκείνου ἐν ἡμέρᾳ ᾗ οὐ προσδοκᾷ καὶ ἐν ὥρᾳ ᾗ οὐ γινώσκει,
    καὶ διχοτομήσει αὐτὸν καὶ τὸ μέρος αὐτοῦ μετὰ τῶν ἀπίστων θήσει.
translation:
  text: the master of that slave will come on a day when he does not expect him and
    at an hour he does not know, and will cut him in pieces and assign his place with
    the unfaithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will cut him in two'; some take this expression idiomatically as 'will
      punish him severely.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'with the unbelievers.'
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος commonly defaults to 'Lord,' here it refers to the owner/master
    in the parable's master-slave relationship ('ὁ κύριος τοῦ δούλου ἐκείνου'). 'Master'
    best conveys the social relation in context and avoids suggesting a direct christological
    title in the narrative wording.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the translation philosophy, δοῦλος is rendered 'slave' where the
    bonded nature is salient. In this parabolic household setting, the hierarchical
    ownership relation is explicit, so 'slave' is preferable to the softer 'servant.'
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: Future of ἥκω here naturally means the master's arrival. 'Will come'
    is idiomatic and fits the warning context.
- source_word: ἐν ἡμέρᾳ ᾗ οὐ προσδοκᾷ
  chosen: on a day when he does not expect him
  alternatives:
  - on a day when he is not expecting it
  - on a day he does not expect
  lexicon: BDAG
  rationale: 'The verb προσδοκάω means ''expect'' or ''look for.'' The object is implicit
    from context: the slave does not expect the master''s coming. Supplying ''him''
    makes the English clear without over-paraphrasing.'
- source_word: ἐν ὥρᾳ ᾗ οὐ γινώσκει
  chosen: at an hour he does not know
  alternatives:
  - at an hour he is unaware of
  - at an hour he does not expect
  lexicon: BDAG
  rationale: 'γινώσκω is ''know,'' not ''expect,'' so the translation preserves the
    distinction between the two clauses: lack of expectation and lack of knowledge.'
- source_word: διχοτομήσει
  chosen: will cut him in pieces
  alternatives:
  - will cut him in two
  - will punish him severely
  lexicon: BDAG
  rationale: The verb literally denotes cutting in two/partitioning. The main text
    preserves the stark imagery rather than softening it into a mere metaphorical
    punishment. Because some understand it idiomatically for severe punishment, that
    alternative is preserved in a footnote.
- source_word: τὸ μέρος αὐτοῦ
  chosen: his place
  alternatives:
  - his portion
  - his share
  lexicon: BDAG
  rationale: μέρος can mean 'part, share, portion.' In the idiom 'assign his μέρος
    with ...,' 'place' communicates assigned lot/destiny in natural English. 'Portion'
    is possible but less idiomatic for many readers.
- source_word: ἀπίστων
  chosen: the unfaithful
  alternatives:
  - the unbelievers
  lexicon: BDAG
  rationale: ἄπιστος can mean either 'unbelieving' or 'unfaithful.' In this context
    of a slave proved disloyal, 'unfaithful' fits the immediate moral frame while
    still allowing the broader sense of those outside faithful allegiance. The alternative
    is preserved in a footnote because the term can be heard eschatologically as 'unbelievers.'
- source_word: θήσει
  chosen: assign
  alternatives:
  - put
  - place
  lexicon: BDAG
  rationale: τίθημι here means to put/place someone into a category or lot. 'Assign'
    captures the judicial sense of determining his destiny with the unfaithful.
