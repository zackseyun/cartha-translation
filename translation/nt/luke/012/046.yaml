theological_decisions:
- issue: Whether to render the punishment imagery literally or soften it as metaphorical
    severe punishment
  chosen_reading: Retain the literal imagery 'will cut him in pieces' in the main
    text
  alternative_readings:
  - Render idiomatically as 'will punish him severely'
  rationale: Optimal equivalence favors preserving the force of the Greek unless context
    plainly demands paraphrase. The verse uses severe judgment imagery, and softening
    it would mute the text's warning. Because some interpreters take the expression
    idiomatically, that option is preserved in a footnote rather than adopted in the
    main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether ἀπίστων should be rendered relationally ('unfaithful') or confessionally
    ('unbelievers')
  chosen_reading: Use 'the unfaithful' in the main text
  alternative_readings:
  - the unbelievers
  rationale: The immediate parable concerns fidelity of a household slave, so 'unfaithful'
    best matches the narrative logic. Yet the Greek adjective can also denote unbelief,
    especially in eschatological judgment contexts, so the alternative is preserved
    in a footnote to maintain theological tension.
  doctrine_reference: Translation philosophy §3
