id: LUK.12.16
reference: Luke 12:16
source:
  edition: SBLGNT
  text: εἶπεν δὲ παραβολὴν πρὸς αὐτοὺς λέγων· Ἀνθρώπου τινὸς πλουσίου εὐφόρησεν ἡ
    χώρα.
translation:
  text: Then he told them a parable, saying, “The land of a certain rich man produced
    abundantly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “yielded plentifully” or “was very productive.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν δὲ
  chosen: Then he told
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: δέ is rendered with a mild connective in natural English. Because παραβολὴν
    is the direct object, English idiom prefers 'told' rather than the more wooden
    'said a parable.' 'Then' captures narrative progression without overstating contrast.
- source_word: παραβολὴν
  chosen: a parable
  alternatives:
  - an illustration
  lexicon: BDAG
  rationale: παραβολή is the standard Gospel term for a parable; 'parable' preserves
    the literary and theological category better than the more generic 'illustration.'
- source_word: πρὸς αὐτοὺς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The indirect object is naturally incorporated into English as 'told them.'
    This preserves the sense of address without unnecessary literalism.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the parable. 'Saying' is a standard
    and clear way to represent the participial construction in English.
- source_word: Ἀνθρώπου τινὸς πλουσίου
  chosen: of a certain rich man
  alternatives:
  - of a rich man
  - belonging to a certain rich man
  lexicon: BDAG
  rationale: 'The genitive phrase is possessive with χώρα as subject: ''the land of
    a certain rich man.'' ''Certain'' reflects τινός and preserves the narrative specificity
    of the Greek. ''Man'' is retained as gender-accurate, matching the singular masculine
    referent rather than neutralizing it.'
- source_word: εὐφόρησεν
  chosen: produced abundantly
  alternatives:
  - was fruitful
  - yielded plentifully
  - brought forth well
  lexicon: BDAG
  rationale: εὐφορέω refers to producing well or yielding abundantly, especially of
    land. 'Produced abundantly' is idiomatic modern English and makes the agricultural
    sense explicit.
- source_word: ἡ χώρα
  chosen: the land
  alternatives:
  - the field
  - the estate
  - the country
  lexicon: BDAG
  rationale: χώρα here refers to landed property or farmland, not a geopolitical 'country.'
    'Land' best fits the agricultural context and the possessive relation to the rich
    man.
