id: LUK.12.18
reference: Luke 12:18
source:
  edition: SBLGNT
  text: καὶ εἶπεν· Τοῦτο ποιήσω· καθελῶ μου τὰς ἀποθήκας καὶ μείζονας οἰκοδομήσω,
    καὶ συνάξω ἐκεῖ πάντα ⸂τὸν σῖτον⸃ καὶ τὰ ἀγαθά μου,
translation:
  text: 'And he said, ‘This is what I will do: I will tear down my barns and build
    larger ones, and there I will gather all my grain and my goods.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “storehouses” for “barns” (ἀποθήκας).
    reason: lexical_alternative
  - marker: b
    text: “Grain” (σῖτος) could more specifically mean “wheat” in some contexts.
    reason: lexical_alternative
  - marker: c
    text: Or “my possessions” for “my goods” (τὰ ἀγαθά μου).
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο ποιήσω
  chosen: This is what I will do
  alternatives:
  - I will do this
  lexicon: BDAG
  rationale: Natural English that preserves the emphatic forward-looking statement
    introduced by τοῦτο.
- source_word: καθελῶ
  chosen: I will tear down
  alternatives:
  - I will pull down
  - I will demolish
  lexicon: BDAG
  rationale: Conveys the future act of taking down existing structures. 'Tear down'
    is idiomatic and appropriately concrete.
- source_word: ἀποθήκας
  chosen: barns
  alternatives:
  - storehouses
  - granaries
  lexicon: BDAG
  rationale: In this agrarian context, 'barns' is the most natural English rendering,
    though the term can more broadly denote storage places.
- source_word: μείζονας
  chosen: larger ones
  alternatives:
  - bigger ones
  - greater ones
  lexicon: BDAG
  rationale: Supplies the implied noun in smooth English while preserving the comparative
    sense.
- source_word: οἰκοδομήσω
  chosen: build
  alternatives:
  - rebuild
  - construct
  lexicon: BDAG
  rationale: Standard rendering for οἰκοδομέω; 'build' is clear and sufficient here.
- source_word: συνάξω
  chosen: I will gather
  alternatives:
  - I will store up
  - I will collect
  lexicon: BDAG
  rationale: Keeps the basic sense of bringing together. 'Store up' would lean more
    interpretive, though contextually related.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - into them
  - in that place
  lexicon: BDAG
  rationale: Directly reflects the adverb and indicates the location of storage without
    over-specifying.
- source_word: πάντα τὸν σῖτον
  chosen: all my grain
  alternatives:
  - all the grain
  - all my wheat
  - all my crops
  lexicon: BDAG
  rationale: σῖτος commonly refers to grain, often wheat; 'grain' is broad and contextually
    appropriate. The possessive 'my' is supplied in English from the speaker's perspective
    and parallelism with 'my goods.'
- source_word: τὰ ἀγαθά μου
  chosen: my goods
  alternatives:
  - my possessions
  - my good things
  - my wealth
  lexicon: BDAG
  rationale: Preserves the broad sense of material goods or possessions without narrowing
    it to money alone.
