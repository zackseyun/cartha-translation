id: LUK.12.31
reference: Luke 12:31
source:
  edition: SBLGNT
  text: πλὴν ζητεῖτε τὴν βασιλείαν ⸀αὐτοῦ, καὶ ⸀ταῦτα προστεθήσεται ὑμῖν.
translation:
  text: But seek his kingdom, and these things will be added to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's kingdom'; the Greek reads 'his kingdom,' with the referent supplied
      by the context.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'the kingdom of God' instead of 'his kingdom.'
    reason: textual_variant
lexical_decisions:
- source_word: πλὴν
  chosen: But
  alternatives:
  - Instead
  - Nevertheless
  - Rather
  lexicon: BDAG
  rationale: Introduces a contrast with the preceding prohibition against anxious
    pursuit of material needs. 'But' is concise and natural in English, preserving
    the adversative force without overtranslating.
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - keep seeking
  - strive for
  lexicon: BDAG
  rationale: The present imperative calls for ongoing orientation, but English imperative
    'seek' can naturally carry this force. 'Keep seeking' is possible but slightly
    more interpretive; 'seek' best balances form and readability.
- source_word: βασιλείαν
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard and most recognizable rendering, and in
    Luke it can encompass both reign and realm. ''Reign'' or ''rule'' may highlight
    divine sovereignty but are narrower than the term''s semantic range here.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to God in context. Rendering it
    as 'his' preserves the Greek wording; 'God's' would make the referent explicit
    but would move beyond the pronoun actually used.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - all these things
  lexicon: BDAG
  rationale: The demonstrative refers to the necessities discussed in the surrounding
    context. The shorter reading in Luke lacks the explicit 'all' found in the Matthean
    parallel, so 'these things' best reflects the Greek without harmonizing to Matthew.
- source_word: προστεθήσεται
  chosen: will be added
  alternatives:
  - will be given in addition
  - will be provided as well
  lexicon: BDAG
  rationale: The future passive is naturally rendered 'will be added.' This preserves
    the metaphor of addition and avoids paraphrasing into a more interpretive expression
    like 'provided,' though that sense is contextually implied.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is straightforwardly represented by 'to you.' 'For you' is
    possible in idiomatic English, but 'to you' stays closer to the Greek and fits
    the passive construction.
