theological_decisions:
- issue: Referent of αὐτοῦ
  chosen_reading: The pronoun refers to God, rendered implicitly as 'his kingdom.'
  alternative_readings:
  - The pronoun could be made explicit in translation as 'God's kingdom.'
  rationale: The immediate context speaks of 'your Father' and God's care, so the
    referent is clear. Retaining 'his' preserves the Greek form while leaving the
    contextual identification intact.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense without unnecessary expansion.'
