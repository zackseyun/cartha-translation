theological_decisions:
- issue: Nuance of τὸ δίκαιον
  chosen_reading: what is right
  alternative_readings:
  - what is just
  - the right thing
  rationale: The verse concerns moral and practical discernment rather than a technical
    doctrinal statement about justice or righteousness. Rendering δίκαιον as 'right'
    preserves the broad ethical sense without narrowing it to legal justice alone.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without importing doctrinal claims.'
