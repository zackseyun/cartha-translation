id: LUK.12.57
reference: Luke 12:57
source:
  edition: SBLGNT
  text: Τί δὲ καὶ ἀφ’ ἑαυτῶν οὐ κρίνετε τὸ δίκαιον;
translation:
  text: And why do you not judge for yourselves what is right?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is just' or 'the right thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί δὲ καὶ
  chosen: And why
  alternatives:
  - Why also
  - But why also
  lexicon: BDAG
  rationale: The idiomatic combination introduces a rhetorical question that presses
    the audience further from the previous argument. 'And why' is natural English
    and preserves the connective force without woodenly reproducing each particle.
- source_word: ἀφ’ ἑαυτῶν
  chosen: for yourselves
  alternatives:
  - from yourselves
  - by yourselves
  - on your own
  lexicon: BDAG
  rationale: The phrase means from one's own initiative or by one's own capacity/judgment.
    'For yourselves' communicates independent personal discernment in idiomatic English.
    'From yourselves' is too literal and awkward; 'on your own' is possible but slightly
    more colloquial.
- source_word: οὐ κρίνετε
  chosen: do you not judge
  alternatives:
  - do you not decide
  - do you not discern
  lexicon: BDAG
  rationale: κρίνω here carries the sense of making a judgment or evaluating rightly.
    'Judge' best preserves the lexical connection while remaining clear in context.
    'Discern' captures nuance but moves away from the core judicial/evaluative sense.
- source_word: τὸ δίκαιον
  chosen: what is right
  alternatives:
  - the right thing
  - what is just
  - the just thing
  lexicon: BDAG
  rationale: 'The neuter singular adjective functions substantivally: ''the right/just
    thing.'' ''What is right'' is the most natural English rendering and preserves
    both moral and evaluative force. ''What is just'' is possible, but in this context
    ''right'' better fits Jesus'' appeal to proper judgment in ordinary speech.'
