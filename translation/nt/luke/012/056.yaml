theological_decisions:
- issue: Meaning of καιρός in Jesus' rebuke
  chosen_reading: this present time
  alternative_readings:
  - this season
  - this decisive time
  rationale: The verse concerns failure to discern the significance of the moment
    of Jesus' ministry and God's action, but the translation should not over-specify
    beyond the Greek. 'Present time' preserves the temporal and qualitative force
    without importing a narrower theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
