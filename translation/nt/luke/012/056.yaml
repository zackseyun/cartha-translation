id: LUK.12.56
reference: Luke 12:56
source:
  edition: SBLGNT
  text: ὑποκριταί, τὸ πρόσωπον τῆς γῆς καὶ τοῦ οὐρανοῦ οἴδατε δοκιμάζειν, τὸν ⸂δὲ
    καιρὸν⸃ τοῦτον πῶς ⸂οὐκ οἴδατε δοκιμάζειν⸃;
translation:
  text: Hypocrites! You know how to interpret the appearance of the earth and the
    sky, but how is it that you do not know how to interpret this present time?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this season' or 'this decisive time.' The Greek καιρός can mean a significant
      or opportune time, not merely time in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριταί
  chosen: Hypocrites
  alternatives:
  - Actors
  - Pretenders
  lexicon: BDAG
  rationale: A direct vocative rebuke. 'Hypocrites' is the established and contextually
    accurate sense for moral-religious pretense, not literal stage actors.
- source_word: πρόσωπον
  chosen: appearance
  alternatives:
  - face
  - surface
  lexicon: BDAG
  rationale: Here πρόσωπον in the idiom 'the face of the earth/sky' refers to outward
    appearance or visible aspect. 'Appearance' communicates the idiomatic sense in
    natural English better than the more literal 'face'.
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: Either 'earth' or 'land' is possible, but paired with 'sky' the broader
    cosmic/weather sense favors 'earth' in English.
- source_word: οὐρανοῦ
  chosen: sky
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: In this context Jesus speaks of reading weather signs, so 'sky' better
    reflects the immediate referent than 'heaven,' which could suggest the divine
    realm.
- source_word: οἴδατε δοκιμάζειν
  chosen: you know how to interpret
  alternatives:
  - you know how to test
  - you know how to discern
  lexicon: BDAG
  rationale: The combination of οἶδα with infinitive expresses ability/knowledge ('know
    how to'), and δοκιμάζω here means to evaluate or discern signs. 'Interpret' best
    fits the context of reading observable indicators.
- source_word: καιρόν
  chosen: present time
  alternatives:
  - season
  - time
  - opportune moment
  lexicon: BDAG
  rationale: καιρός often denotes a decisive or fitting time rather than mere chronological
    time. 'Present time' captures both the demonstrative τοῦτον and the contextual
    sense of the spiritually significant moment.
- source_word: πῶς οὐκ οἴδατε δοκιμάζειν
  chosen: how is it that you do not know how to interpret
  alternatives:
  - why do you not know how to discern
  - how do you not know how to evaluate
  lexicon: BDAG
  rationale: πῶς introduces an indignant rhetorical question. Expanding slightly to
    'how is it that' preserves the force in idiomatic English while retaining the
    repeated 'know how to interpret' structure.
