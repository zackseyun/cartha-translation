id: LUK.12.55
reference: Luke 12:55
source:
  edition: SBLGNT
  text: καὶ ὅταν νότον πνέοντα, λέγετε ὅτι Καύσων ἔσται, καὶ γίνεται.
translation:
  text: And when you see the south wind blowing, you say, ‘There will be scorching
    heat,’ and it happens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘the south’—that is, the south wind.
    reason: lexical_alternative
  - marker: b
    text: Or ‘heat’ or ‘burning heat.’
    reason: lexical_alternative
lexical_decisions:
- source_word: νότον
  chosen: the south wind
  alternatives:
  - the south
  - a south wind
  lexicon: BDAG
  rationale: Although the noun literally means ‘south’ or ‘south wind,’ in weather
    context with πνέοντα (‘blowing’) English idiom requires ‘the south wind’ rather
    than the bare ‘south.’ This makes explicit the meteorological sense already present
    in Greek usage.
- source_word: πνέοντα
  chosen: blowing
  alternatives:
  - blow
  - coming from the south
  lexicon: BDAG
  rationale: The present participle modifies νότον and describes the wind in action.
    ‘Blowing’ is the most natural English equivalent and preserves the ongoing/weather-observation
    sense.
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you keep saying
  - you say to yourselves
  lexicon: BDAG
  rationale: Simple present fits the generic, customary force of Jesus’ statement
    about their repeated practice of weather prediction.
- source_word: Καύσων
  chosen: scorching heat
  alternatives:
  - heat
  - a heat wave
  - burning heat
  lexicon: BDAG
  rationale: The noun denotes oppressive heat, especially the hot conditions associated
    with the south wind in Palestine. ‘Scorching heat’ communicates the intensity
    better than the flatter ‘heat’ while avoiding the overly modern idiom ‘heat wave.’
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - it will be
  - is coming
  lexicon: BDAG
  rationale: 'With Καύσων as the predicted condition, English idiom is best expressed
    existentially: ‘There will be scorching heat.’'
- source_word: γίνεται
  chosen: it happens
  alternatives:
  - it comes about
  - it occurs
  - it is so
  lexicon: BDAG
  rationale: The verb marks the prediction being fulfilled. ‘It happens’ is concise,
    natural modern English and preserves the sense that events turn out as predicted.
