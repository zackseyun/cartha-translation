id: LUK.12.59
reference: Luke 12:59
source:
  edition: SBLGNT
  text: λέγω σοι, οὐ μὴ ἐξέλθῃς ἐκεῖθεν ἕως ⸂καὶ τὸ⸃ ἔσχατον λεπτὸν ἀποδῷς.
translation:
  text: I tell you, you will certainly not get out of there until you have paid even
    the last lepton.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the last small coin.' The Greek λεπτόν refers to a very small coin.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A standard direct-address formula. 'I tell you' is natural modern English
    while preserving the force of the present indicative and dative pronoun.
- source_word: οὐ μὴ ἐξέλθῃς
  chosen: you will certainly not get out
  alternatives:
  - you will by no means come out
  - you will never get out
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive expresses emphatic negation about a
    future event. 'Will certainly not get out' preserves the strong denial without
    sounding archaic.
- source_word: ἐκεῖθεν
  chosen: of there
  alternatives:
  - from there
  lexicon: BDAG
  rationale: The adverb means 'from there/out of there.' In idiomatic English after
    'get out,' 'of there' is more natural than repeating 'from.'
- source_word: ἕως
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: Temporal marker indicating the point up to which the negated condition
    remains in force.
- source_word: καὶ τὸ ἔσχατον
  chosen: even the last
  alternatives:
  - the very last
  - also the last
  lexicon: BDAG
  rationale: καί here is intensive/additive, naturally rendered 'even,' emphasizing
    completeness; ἔσχατον means 'last/final.'
- source_word: λεπτόν
  chosen: lepton
  alternatives:
  - penny
  - small coin
  lexicon: BDAG
  rationale: A λεπτόν was a very small coin. Translating it as 'lepton' preserves
    the historical specificity of the source text; a footnote can explain the value-related
    sense through alternatives.
- source_word: ἀποδῷς
  chosen: you have paid
  alternatives:
  - you pay
  - you have repaid
  lexicon: BDAG
  rationale: 'The aorist subjunctive after ἕως is well represented in English by a
    perfect construction here: release will not occur until the payment is completed.
    ''Paid'' fits the debt/legal context.'
