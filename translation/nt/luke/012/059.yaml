theological_decisions:
- issue: Nature of the saying's imagery
  chosen_reading: Retain the debt-prison image without specifying whether it refers
    to earthly legal consequences, divine judgment, or purgatorial punishment.
  alternative_readings:
  - earthly legal warning
  - metaphor for divine judgment
  - supporting text in later purgatorial interpretation
  rationale: The verse itself states the image of confinement until full payment but
    does not explicitly identify the referent. To preserve theological tension and
    avoid importing later doctrinal conclusions, the translation remains literal and
    non-interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it.
