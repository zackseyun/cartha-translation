id: LUK.12.6
reference: Luke 12:6
source:
  edition: SBLGNT
  text: οὐχὶ πέντε στρουθία ⸀πωλοῦνται ἀσσαρίων δύο; καὶ ἓν ἐξ αὐτῶν οὐκ ἔστιν ἐπιλελησμένον
    ἐνώπιον τοῦ θεοῦ.
translation:
  text: Are not five sparrows sold for two assaria? Yet not one of them is forgotten
    before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for two pennies' or 'for two copper coins'; the Greek names the coin
      as assaria, small Roman copper coins.
    reason: cultural_note
  - marker: b
    text: Or 'is overlooked in the sight of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρουθία
  chosen: sparrows
  alternatives:
  - small birds
  lexicon: BDAG
  rationale: The term commonly refers to sparrows in this context and in standard
    English Bible usage. 'Small birds' is possible more generally, but 'sparrows'
    is the natural and specific rendering here.
- source_word: πωλοῦνται
  chosen: are sold
  alternatives:
  - sell for
  lexicon: BDAG
  rationale: Present passive/medio-passive is most naturally rendered 'are sold.'
    English idiom could also use active-like 'sell for,' but the passive better reflects
    the Greek form without sounding unnatural.
- source_word: ἀσσαρίων δύο
  chosen: for two assaria
  alternatives:
  - for two pennies
  - for two copper coins
  lexicon: BDAG
  rationale: Using 'assaria' preserves the specific ancient coin name rather than
    replacing it with an inexact modern equivalent. Readability is maintained by the
    familiar sales construction; a footnote preserves more interpretive alternatives.
- source_word: ἐπιλελησμένον
  chosen: forgotten
  alternatives:
  - overlooked
  - unremembered
  lexicon: BDAG
  rationale: From ἐπιλανθάνομαι, the perfect participle conveys a state of being forgotten.
    'Forgotten' is the clearest and most idiomatic English equivalent; 'overlooked'
    is interpretive and slightly weaker.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: '''Before God'' is a direct, natural rendering of ἐνώπιον τοῦ θεοῦ and
    preserves the relational/judicial sense of being in God''s view. ''In the sight
    of God'' is also possible but slightly more expansive.'
- source_word: οὐχὶ ... ;
  chosen: Are not ... ?
  alternatives:
  - Are ... not ?
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer. 'Are not
    ... ?' captures the rhetorical force in idiomatic English.
- source_word: καὶ ἓν ἐξ αὐτῶν
  chosen: Yet not one of them
  alternatives:
  - And one of them not even
  - And not one of them
  lexicon: BDAG
  rationale: The phrase emphasizes even a single sparrow among the five. 'Yet not
    one of them' brings out the contrast between their low market value and God's
    regard, while remaining faithful to the Greek sense.
