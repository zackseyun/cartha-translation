theological_decisions:
- issue: Divine remembrance/providence language
  chosen_reading: not one of them is forgotten before God
  alternative_readings:
  - not one of them is overlooked by God
  rationale: The verse emphasizes God's attentive knowledge and care for even insignificant
    creatures. 'Forgotten' stays close to the lexical sense without importing a fuller
    doctrine of providence beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
