theological_decisions:
- issue: Rendering the contrast between speaking against the Son of Man and blaspheming
    against the Holy Spirit
  chosen_reading: Preserve the textual distinction without explaining or resolving
    the theology of the 'unforgivable sin' in the translation itself.
  alternative_readings:
  - Interpret the first clause as lesser ignorance and the second as final impenitence
  - Harmonize with parallel passages by expanding the sense in translation
  rationale: The verse itself states a contrast in forgivability but does not define
    the mechanism in this wording. Per doctrine, the translation should preserve theological
    tension rather than resolve contested interpretations beyond the Greek text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
