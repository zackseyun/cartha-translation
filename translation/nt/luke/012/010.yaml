id: LUK.12.10
reference: Luke 12:10
source:
  edition: SBLGNT
  text: καὶ πᾶς ὃς ἐρεῖ λόγον εἰς τὸν υἱὸν τοῦ ἀνθρώπου, ἀφεθήσεται αὐτῷ τῷ δὲ εἰς
    τὸ ἅγιον πνεῦμα βλασφημήσαντι οὐκ ἀφεθήσεται.
translation:
  text: And everyone who speaks a word against the Son of Man, it will be forgiven
    him; but the one who has blasphemed against the Holy Spirit will not be forgiven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever says a word against the Son of Man.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'it will be forgiven him,' with the offense implied as the
      thing forgiven.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὃς
  chosen: everyone who
  alternatives:
  - whoever
  - every one who
  lexicon: BDAG
  rationale: The construction is distributive and generic. 'Everyone who' is natural
    modern English and preserves the universal scope of the statement.
- source_word: ἐρεῖ λόγον
  chosen: speaks a word
  alternatives:
  - says a word
  - speaks
  lexicon: BDAG
  rationale: The idiom literally includes 'word' (λόγον). Retaining 'speaks a word'
    preserves the Greek expression without becoming unnatural. 'Says a word' is possible
    but slightly less idiomatic here.
- source_word: εἰς
  chosen: against
  alternatives:
  - to
  - concerning
  lexicon: BDAG
  rationale: In this hostile context with speech and blasphemy, εἰς is best rendered
    idiomatically as 'against,' expressing opposition rather than mere direction.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and accurate rendering of the titular expression
    used by Jesus. It preserves both the Semitic background and the christological
    force of the phrase.
- source_word: ἀφεθήσεται αὐτῷ
  chosen: it will be forgiven him
  alternatives:
  - he will be forgiven
  - it will be forgiven for him
  lexicon: BDAG
  rationale: The passive of ἀφίημι here refers to forgiveness of the offense. Rendering
    the implied object with 'it' reflects the Greek more closely than simply 'he will
    be forgiven,' while remaining clear in English.
- source_word: τῷ ... βλασφημήσαντι
  chosen: the one who has blasphemed
  alternatives:
  - the one blaspheming
  - whoever blasphemes
  lexicon: BDAG
  rationale: The aorist participle is best represented as a completed act viewed as
    such. 'The one who has blasphemed' preserves the substantival participle and the
    contrast with the prior clause.
- source_word: τὸ ἅγιον πνεῦμα
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary English rendering of the divine person named in
    the text. 'Holy Ghost' is archaic and less suitable for readable modern English.
- source_word: οὐκ ἀφεθήσεται
  chosen: will not be forgiven
  alternatives:
  - shall not be forgiven
  lexicon: BDAG
  rationale: A straightforward future passive negation. 'Will not' is modern and clear,
    preserving the severity of the statement without archaic diction.
