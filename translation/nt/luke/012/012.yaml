id: LUK.12.12
reference: Luke 12:12
source:
  edition: SBLGNT
  text: τὸ γὰρ ἅγιον πνεῦμα διδάξει ὑμᾶς ἐν αὐτῇ τῇ ὥρᾳ ἃ δεῖ εἰπεῖν.
translation:
  text: for the Holy Spirit will teach you in that very hour what you must say.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at that hour' or 'in that hour.' The Greek expression emphasizes the
      precise moment of need.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this verse to the prior assurance;
    'for' is concise and natural in context.
- source_word: τὸ ἅγιον πνεῦμα
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the articular phrase referring to
    the divine Spirit; 'Holy Spirit' is clear modern English and preserves the personal
    referent.
- source_word: διδάξει
  chosen: will teach
  alternatives:
  - will instruct
  lexicon: BDAG
  rationale: Future active of διδάσκω is straightforwardly rendered 'will teach';
    this best preserves both lexical sense and the promise of future aid.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, naturally rendered 'you' in English; plurality
    is contextually clear from the discourse though not marked in English.
- source_word: ἐν αὐτῇ τῇ ὥρᾳ
  chosen: in that very hour
  alternatives:
  - at that hour
  - in that hour
  lexicon: BDAG
  rationale: The combination of demonstrative/intensive αὐτῇ with τῇ ὥρᾳ adds emphasis;
    'that very hour' captures the immediacy better than the flatter 'at that hour.'
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  lexicon: BDAG
  rationale: The neuter plural relative pronoun introducing content is idiomatically
    rendered 'what' in English rather than the more wooden 'the things that.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - ought to
  - need to
  lexicon: BDAG
  rationale: Conveys necessity or obligation inherent in the situation. 'Must' is
    the most direct equivalent and fits the solemn context.
- source_word: εἰπεῖν
  chosen: say
  alternatives:
  - speak
  lexicon: BDAG
  rationale: Aorist infinitive of λέγω here refers to what is to be spoken in defense;
    'say' is the most natural English equivalent in this construction.
