theological_decisions:
- issue: Reference of 'the Holy Spirit'
  chosen_reading: A personal divine agent who will actively teach the disciples what
    to say
  alternative_readings:
  - A more impersonal divine influence or inspiration
  rationale: The text presents the Holy Spirit as the subject of a future active verb
    ('will teach'), which supports a personal-agent reading without importing later
    doctrinal formulations beyond the verse itself. This aligns with historic orthodoxy
    while remaining text-driven.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
