theological_decisions:
- issue: Scope and force of the saying
  chosen_reading: A general principle that what is presently concealed will eventually
    be disclosed/known.
  alternative_readings:
  - A specifically eschatological disclosure at final judgment
  - A more immediate exposure of hypocrisy in the present age
  rationale: The Greek future passives support eventual disclosure without specifying
    the exact timing. The translation preserves this theological tension rather than
    narrowing it to only final judgment or only present exposure.
  doctrine_reference: Preserve theological tension rather than resolve it.
