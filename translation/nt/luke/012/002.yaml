id: LUK.12.2
reference: Luke 12:2
source:
  edition: SBLGNT
  text: οὐδὲν δὲ συγκεκαλυμμένον ἐστὶν ὃ οὐκ ἀποκαλυφθήσεται, καὶ κρυπτὸν ὃ οὐ γνωσθήσεται.
translation:
  text: But nothing is covered up that will not be revealed, and hidden that will
    not be known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concealed' for 'covered up'; the Greek uses imagery of something having
      been covered and later revealed.
    reason: lexical_alternative
  - marker: b
    text: Or 'secret' for 'hidden.'
    reason: lexical_alternative
  - marker: c
    text: The saying can refer broadly to eventual disclosure, whether in the present
      or at the final judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - not anything
  lexicon: BDAG
  rationale: Indefinite negative pronoun in neuter singular; 'nothing' is the natural
    English equivalent and preserves the absolute scope.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast or development. 'But' fits the
    immediate warning context and preserves the adversative nuance better than a simple
    'and'.
- source_word: συγκεκαλυμμένον
  chosen: covered up
  alternatives:
  - concealed
  - veiled
  lexicon: BDAG
  rationale: Perfect passive participle of συγκαλύπτω, describing something presently
    in a state of being covered/concealed. 'Covered up' is idiomatic, readable modern
    English and retains the metaphor of concealment.
- source_word: ἀποκαλυφθήσεται
  chosen: will not be revealed
  alternatives:
  - will not be uncovered
  - will not be disclosed
  lexicon: BDAG
  rationale: Future passive of ἀποκαλύπτω. 'Revealed' is the standard and most transparent
    rendering, matching the semantic contrast with 'covered up.' The negation is carried
    by the preceding οὐκ in the relative clause, yielding the idiom 'nothing ... that
    will not be revealed.'
- source_word: κρυπτὸν
  chosen: hidden
  alternatives:
  - secret
  - concealed
  lexicon: BDAG
  rationale: Adjective meaning hidden/secret. 'Hidden' pairs well with 'covered up'
    while avoiding over-interpretation toward 'secret' as a noun.
- source_word: γνωσθήσεται
  chosen: will not be known
  alternatives:
  - will not become known
  - will not be made known
  lexicon: BDAG
  rationale: Future passive of γινώσκω. 'Will not be known' is formally close and
    preserves the passive/resultative sense. 'Become known' is possible, but the simpler
    wording is sufficiently clear in English.
- source_word: ὃ οὐκ / ὃ οὐ
  chosen: that will not
  alternatives:
  - which will not
  lexicon: BDAG
  rationale: The relative pronoun introduces two parallel clauses. 'That' is smoother
    in contemporary English than 'which' in restrictive clauses and preserves the
    structure.
