theological_decisions:
- issue: Nature of the division described
  chosen_reading: A description of social and familial conflict resulting from Jesus' mission, not a doctrinal endorsement of family hostility.
  alternative_readings:
  - A merely generic proverb about family tensions
  rationale: The verse lists reciprocal family oppositions as the outworking of the preceding context about division. The translation keeps the stark wording without softening it, while not importing approval of such conflict.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
revisions:
- timestamp: '2026-04-21T12:41:43Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/luke/012/053.json
  category: awkward_english
  tier: 1
  from: and daughter-in-law against mother-in-law
  to: and daughter-in-law against her mother-in-law
  rationale: The Greek text omits the possessive pronoun in the final clause ('νύμφη ἐπὶ τὴν πενθεράν'), which the current translation faithfully mirrors. While this is a formally accurate choice, it results in slightly unnatural English. The reciprocal nature of the pairing strongly implies the possessive. Adding 'her' would improve the parallelism and flow in English, making the relationship clearer to the reader at a minimal cost to formal equivalence.
