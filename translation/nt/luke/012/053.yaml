id: LUK.12.53
reference: Luke 12:53
source:
  edition: SBLGNT
  text: ⸀διαμερισθήσονται πατὴρ ἐπὶ υἱῷ καὶ υἱὸς ἐπὶ πατρί, μήτηρ ⸀ἐπὶ ⸀θυγατέρα καὶ θυγάτηρ ἐπὶ ⸂τὴν μητέρα⸃, πενθερὰ ἐπὶ τὴν νύμφην αὐτῆς καὶ νύμφη ἐπὶ τὴν ⸀πενθεράν.
translation:
  text: 'They will be divided: father against son and son against father, mother against daughter and daughter against mother, mother-in-law against her daughter-in-law and daughter-in-law against her mother-in-law.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be split apart.' The Greek verb emphasizes division within a group or household.
    reason: lexical_alternative
  - marker: b
    text: The Greek word for 'daughter-in-law' can also mean 'bride' in other contexts, but here the family pairing with 'mother-in-law' favors 'daughter-in-law.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and daughter-in-law against mother-in-law'.
    reason: previous_rendering
lexical_decisions:
- source_word: διαμερισθήσονται
  chosen: will be divided
  alternatives:
  - will be split apart
  - will be set against one another
  lexicon: BDAG
  rationale: Future passive of διαμερίζω, here introducing the state of familial division that follows. 'Will be divided' is natural English and preserves the passive/resultative sense without overinterpreting the cause.
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - over
  - with respect to
  lexicon: BDAG
  rationale: In this repeated relational construction with persons, ἐπί conveys opposition/hostility. 'Against' best captures the adversarial sense in idiomatic English.
- source_word: πατήρ
  chosen: father
  lexicon: BDAG
  rationale: Standard gloss; singular and specific, matching the familial pair structure.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: The Greek specifically denotes a male child, so 'son' preserves the gendered and reciprocal pairing with 'father'.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Standard gloss; retained consistently in the reciprocal pair.
- source_word: θυγάτηρ
  chosen: daughter
  alternatives:
  - child
  lexicon: BDAG
  rationale: The Greek specifically denotes a female child, so 'daughter' preserves the gendered family relationship.
- source_word: πενθερά
  chosen: mother-in-law
  lexicon: BDAG
  rationale: Standard kinship term for a husband's or wife's mother; 'mother-in-law' is the clear contemporary equivalent.
- source_word: νύμφη
  chosen: daughter-in-law
  alternatives:
  - bride
  lexicon: BDAG
  rationale: Although νύμφη can mean 'bride' in some contexts, here the reciprocal pairing with πενθερά clearly indicates the kinship sense 'daughter-in-law'.
- source_word: αὐτῆς
  chosen: her
  lexicon: BDAG
  rationale: The possessive pronoun explicitly marks the relationship as 'her daughter-in-law'; retained in English for clarity and fidelity.
