theological_decisions:
- issue: Nature of the division described
  chosen_reading: A description of social and familial conflict resulting from Jesus'
    mission, not a doctrinal endorsement of family hostility.
  alternative_readings:
  - A merely generic proverb about family tensions
  rationale: The verse lists reciprocal family oppositions as the outworking of the
    preceding context about division. The translation keeps the stark wording without
    softening it, while not importing approval of such conflict.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
