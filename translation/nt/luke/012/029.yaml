theological_decisions:
- issue: Rendering the prohibition about material provision without importing a broader
    ascetic or anti-material theology
  chosen_reading: A direct prohibition against anxious seeking of food and drink
  alternative_readings:
  - A prohibition against ordinary planning for food and drink
  - A call to total indifference toward bodily needs
  rationale: In context Jesus addresses anxious preoccupation, not legitimate daily
    provision or the goodness of food and drink. The wording 'do not seek what you
    may eat and what you may drink, and do not be anxious' preserves the force of
    the command without overstating it into asceticism or understating it into mere
    advice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
