id: LUK.12.29
reference: Luke 12:29
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς μὴ ζητεῖτε τί φάγητε ⸀καὶ τί πίητε, καὶ μὴ μετεωρίζεσθε,
translation:
  text: And you, do not seek what you may eat and what you may drink, and do not be
    anxious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be worried,' 'do not be unsettled,' or more literally 'do not
      be kept in suspense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic in Greek. English can reflect this
    with simple fronting ('And you,') without overtranslating. 'You yourselves' is
    possible but sounds heavier than the context requires.
- source_word: ζητεῖτε
  chosen: seek
  alternatives:
  - strive for
  - keep seeking
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'strive for.' 'Seek' preserves the lexical
    link and the prohibition against preoccupation. The present imperative with μή
    conveys an ongoing prohibition, but English need not explicitly mark durative
    force here.
- source_word: τί φάγητε
  chosen: what you may eat
  alternatives:
  - what you will eat
  - what you should eat
  lexicon: BDAG
  rationale: The deliberative/indefinite sense after ζητεῖτε is well represented by
    'what you may eat,' preserving the sense of concern over provisions without making
    it overly deterministic. 'What you will eat' is idiomatic but slightly more predictive
    than the Greek requires.
- source_word: τί πίητε
  chosen: what you may drink
  alternatives:
  - what you will drink
  lexicon: BDAG
  rationale: Parallel to τί φάγητε. 'May drink' keeps the open-ended deliberative
    nuance and mirrors the Greek structure closely.
- source_word: μετεωρίζεσθε
  chosen: be anxious
  alternatives:
  - be worried
  - be unsettled
  - be in suspense
  lexicon: BDAG
  rationale: μετεωρίζομαι literally evokes being raised up/in suspense and idiomatically
    denotes mental agitation or anxious uncertainty. 'Be anxious' best fits the context
    of worry about material needs in the surrounding passage. 'Be worried' is possible
    but slightly flatter; 'be unsettled' is less specific.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - and ... or ... and
  lexicon: BDAG
  rationale: The repeated καί gives a cumulative rhythm. Retaining 'and' throughout
    preserves the Greek coordination better than smoothing to English 'or,' even though
    English idiom might prefer 'eat or drink.'
