id: LUK.12.54
reference: Luke 12:54
source:
  edition: SBLGNT
  text: Ἔλεγεν δὲ καὶ τοῖς ὄχλοις· Ὅταν ⸀ἴδητε νεφέλην ἀνατέλλουσαν ⸀ἐπὶ δυσμῶν, εὐθέως
    λέγετε ⸀ὅτι Ὄμβρος ἔρχεται, καὶ γίνεται οὕτως·
translation:
  text: He was also saying to the crowds, “When you see a cloud rising in the west,
    you immediately say, ‘A rainstorm is coming,’ and so it happens.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “rain is coming.” The Greek ὄμβρος can denote rain generally or a rainstorm/downpour
      more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: He was also saying
  alternatives:
  - He said
  - He kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in narrative background.
    'Was saying' preserves that aspect better than simple past, while remaining natural
    English.
- source_word: δὲ καὶ
  chosen: was also
  alternatives:
  - and
  - now also
  lexicon: BDAG
  rationale: The combination marks continuation with addition. Rendering with 'also'
    captures the additive force without overtranslating δέ.
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: Plural is explicit in Greek. 'Crowds' is natural modern English and preserves
    the plural better than the collective singular 'crowd'.
- source_word: Ὅταν ἴδητε
  chosen: When you see
  alternatives:
  - Whenever you see
  lexicon: BDAG
  rationale: Ὅταν with aorist subjunctive expresses a general future contingency.
    'When you see' is idiomatic and sufficient in English; 'whenever' is possible
    but less smooth here.
- source_word: νεφέλην
  chosen: a cloud
  alternatives:
  - a rain cloud
  lexicon: BDAG
  rationale: The noun simply means 'cloud.' The weather implication is supplied by
    context, so the more basic gloss is preferred in the main text.
- source_word: ἀνατέλλουσαν
  chosen: rising
  alternatives:
  - coming up
  - appearing
  lexicon: BDAG
  rationale: The participle literally denotes rising/upcoming. 'Rising' is concise
    and fits the meteorological image.
- source_word: ἐπὶ δυσμῶν
  chosen: in the west
  alternatives:
  - from the west
  - over the western horizon
  lexicon: BDAG
  rationale: Literally 'upon/from the west/western regions.' In this weather-observation
    context, 'in the west' is the most natural English expression while preserving
    the directional sense.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: '''Immediately'' preserves the adverb''s force and suits the observational
    proverb-like statement.'
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Present indicative here expresses customary action. Simple present in
    English best matches the generalizing sense.
- source_word: ὅτι
  chosen: that / introducing direct speech as quotation punctuation
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what the crowds say. In idiomatic
    English, quotation punctuation conveys this naturally.
- source_word: Ὄμβρος
  chosen: a rainstorm
  alternatives:
  - rain
  - a shower
  lexicon: BDAG
  rationale: ὄμβρος denotes rain, often a rainstorm or downpour. 'Rainstorm' better
    reflects the concrete weather prediction than the bare mass noun 'rain'.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on the way
  lexicon: BDAG
  rationale: Present tense with imminent force is well rendered by the English progressive
    'is coming.'
- source_word: καὶ γίνεται οὕτως
  chosen: and so it happens
  alternatives:
  - and it happens so
  - and it turns out that way
  lexicon: BDAG
  rationale: This clause states that the prediction proves true. 'And so it happens'
    is natural and preserves the confirmatory force of οὕτως.
