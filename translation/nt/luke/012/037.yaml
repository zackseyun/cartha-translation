theological_decisions:
- issue: Rendering κύριος in a parabolic context with possible christological resonance
  chosen_reading: Lord
  alternative_readings:
  - master
  rationale: The immediate household imagery could justify 'master,' but DOCTRINE.md
    sets 'Lord' as the default for κύριος. Because Luke's formulation also resonates
    with the Lord unexpectedly serving his own, retaining 'Lord' preserves both lexical
    consistency and theological depth without importing claims beyond the text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy #5'
- issue: Rendering δοῦλος in household imagery
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse depicts a hierarchical household relation in which the bonded
    status is part of the image. Following the doctrine guidance, 'slave' is preferred
    where that status is salient, while alternatives are preserved for readers sensitive
    to English connotations.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1; Contested terms table
    (δοῦλος → servant / slave context-dependent)'
