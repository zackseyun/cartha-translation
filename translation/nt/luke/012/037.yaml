id: LUK.12.37
reference: Luke 12:37
source:
  edition: SBLGNT
  text: μακάριοι οἱ δοῦλοι ἐκεῖνοι, οὓς ἐλθὼν ὁ κύριος εὑρήσει γρηγοροῦντας· ἀμὴν
    λέγω ὑμῖν ὅτι περιζώσεται καὶ ἀνακλινεῖ αὐτοὺς καὶ παρελθὼν διακονήσει αὐτοῖς.
translation:
  text: Blessed are those slaves whom the Lord, when he comes, will find staying awake.
    Truly I say to you, he will dress himself for service and have them recline at
    the table, and he will come and serve them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' (Greek doulos); 'slaves' is used here because the household
      relationship to the master is explicit in the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'master' for 'Lord' (Greek kyrios) in the immediate parable setting.
    reason: lexical_alternative
  - marker: c
    text: Literally 'will gird himself.' The expression means to dress for active
      service.
    reason: cultural_note
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude language; 'Blessed' preserves the solemn, covenantal/religious
    force better than the more subjective 'happy' or merely circumstantial 'fortunate'.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'slave' where bonded status is salient.
    In this master-slave household scene, the social relation is explicit, so 'slaves'
    best reflects the source, while 'servants' is preserved as an alternative.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: The doctrine default for κύριος is 'Lord.' Although the immediate parable
    setting could support 'master,' Luke's wording also invites resonance with the
    Lord's own action in serving his people. The default title is therefore retained,
    with 'master' noted as a lexical alternative.
- source_word: γρηγοροῦντας
  chosen: staying awake
  alternatives:
  - watching
  - being alert
  lexicon: BDAG
  rationale: The participle denotes wakefulness/watchfulness. 'Staying awake' is vivid
    and idiomatic in context, while still conveying readiness; 'watching' and 'being
    alert' are viable alternatives.
- source_word: ἀμὴν λέγω ὑμῖν
  chosen: Truly I say to you
  alternatives:
  - Amen, I say to you
  - Truly I tell you
  lexicon: BDAG
  rationale: This preserves the emphatic introductory formula in readable modern English.
    'Amen, I say to you' is more formally transparent but less idiomatic; 'tell' is
    possible but 'say' stays closer to the Greek.
- source_word: περιζώσεται
  chosen: will dress himself for service
  alternatives:
  - will gird himself
  - will tie up his garments
  lexicon: BDAG
  rationale: The middle voice and cultural image refer to girding oneself for active
    service. 'Will dress himself for service' communicates the function clearly in
    modern English, while the more literal 'gird himself' is preserved in a footnote-worthy
    alternative.
- source_word: ἀνακλινεῖ αὐτούς
  chosen: have them recline at the table
  alternatives:
  - seat them
  - make them recline
  lexicon: BDAG
  rationale: The verb refers to reclining for a meal, not merely generic seating.
    'Have them recline at the table' makes the banquet setting explicit for modern
    readers without over-paraphrasing.
- source_word: παρελθὼν
  chosen: he will come
  alternatives:
  - he will come up
  - he will pass along
  lexicon: BDAG
  rationale: In this serving context, the participle likely conveys the host's movement
    to wait on guests. 'He will come' is natural English and fits the sequence; more
    literal options are awkward here.
- source_word: διακονήσει αὐτοῖς
  chosen: serve them
  alternatives:
  - wait on them
  - minister to them
  lexicon: BDAG
  rationale: The verb denotes practical service, especially table service in this
    context. 'Serve them' is clear and direct; 'minister to them' would sound overly
    ecclesiastical.
