theological_decisions:
- issue: Generic masculine expression
  chosen_reading: a person’s life ... his possessions
  alternative_readings:
  - his life ... his possessions
  - one's life ... possessions
  rationale: The saying is generic, not specifically male-directed. The main clause
    uses inclusive 'a person’s life' to reflect representative force, while retaining
    'his possessions' as a natural singular generic continuation. This balances source
    accuracy and readable English under the project's gender-accurate policy.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Nature of the warning against πλεονεξία
  chosen_reading: every kind of greed
  alternative_readings:
  - all covetousness
  - every form of greed
  rationale: The verse warns against acquisitive desire broadly, not merely desire
    for another's property in a narrow legal sense. 'Greed' best communicates the
    moral scope of the warning in contemporary English without importing extra doctrinal
    content.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
