id: LUK.12.15
reference: Luke 12:15
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτούς· Ὁρᾶτε καὶ φυλάσσεσθε ἀπὸ ⸀πάσης πλεονεξίας, ὅτι οὐκ
    ἐν τῷ περισσεύειν τινὶ ἡ ζωὴ ⸀αὐτοῦ ἐστιν ἐκ τῶν ὑπαρχόντων ⸀αὐτῷ.
translation:
  text: Then he said to them, “Watch out and guard yourselves from every kind of greed,
    because a person’s life does not consist in the abundance of his possessions.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from all covetousness.” The Greek πλεονεξία can denote greed, covetousness,
      or acquisitiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁρᾶτε
  chosen: Watch out
  alternatives:
  - See
  - Take heed
  - Be on guard
  lexicon: BDAG
  rationale: Imperative plural with warning force; 'Watch out' is idiomatic modern
    English that preserves the alerting sense better than the more literal but less
    natural 'See'.
- source_word: φυλάσσεσθε
  chosen: guard yourselves
  alternatives:
  - beware
  - keep yourselves
  - be on guard
  lexicon: BDAG
  rationale: Middle/passive imperative plural conveys reflexive self-protection. 'Guard
    yourselves' preserves the reflexive nuance alongside the preceding warning imperative.
- source_word: ἀπὸ πάσης πλεονεξίας
  chosen: from every kind of greed
  alternatives:
  - from all covetousness
  - from every form of greed
  - from all greed
  lexicon: BDAG
  rationale: πλεονεξία can denote greed, covetousness, or acquisitiveness. 'Greed'
    is clearer in contemporary English, and πάσης is well represented by 'every kind
    of,' highlighting the comprehensive warning against all forms of the vice.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the warning. 'Because' is more natural in modern
    English than 'for' while preserving the causal force.
- source_word: οὐκ ἐν τῷ περισσεύειν τινὶ
  chosen: does not consist in the abundance
  alternatives:
  - is not in having an abundance
  - does not come from abundance
  - is not when someone has plenty
  lexicon: BDAG
  rationale: The construction expresses that life is not constituted by or grounded
    in abundance. 'Does not consist in the abundance' captures the idiom compactly
    and faithfully.
- source_word: ἡ ζωὴ αὐτοῦ
  chosen: a person’s life
  alternatives:
  - his life
  - one's life
  lexicon: BDAG
  rationale: Although the Greek pronoun is masculine singular, the sense is generic.
    'A person's life' communicates the representative force in natural English without
    implying maleness as the point of the saying.
- source_word: ἐκ τῶν ὑπαρχόντων αὐτῷ
  chosen: of his possessions
  alternatives:
  - from what belongs to him
  - from the things he has
  - from his property
  lexicon: BDAG
  rationale: ὑπάρχοντα here refers to one's belongings or possessions. 'Possessions'
    is concise and idiomatic, and with 'abundance' yields a clear rendering of the
    whole clause.
