theological_decisions:
- issue: Anthropological sense of 'heart'
  chosen_reading: Retain 'heart' as the biblical term for the center of a person's
    affections and commitments.
  alternative_readings:
  - Render more interpretively as 'desires' or 'mind'
  rationale: The verse speaks proverbially about a person's inward orientation following
    what is valued. Preserving 'heart' maintains theological and literary continuity
    without narrowing the meaning.
  doctrine_reference: Translation philosophy §3, §6
