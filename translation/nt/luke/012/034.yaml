id: LUK.12.34
reference: Luke 12:34
source:
  edition: SBLGNT
  text: ὅπου γάρ ἐστιν ὁ θησαυρὸς ὑμῶν, ἐκεῖ καὶ ἡ καρδία ὑμῶν ἔσται.
translation:
  text: For where your treasure is, there your heart will be also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For wherever your treasure is, there your heart will be too.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - wherever
  lexicon: BDAG
  rationale: Introduces the location clause straightforwardly. 'Where' fits the gnomic
    saying naturally; 'wherever' is possible but slightly more expansive than needed.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this saying to the preceding
    instruction. 'For' is concise and standard in English for this discourse function.
- source_word: θησαυρός
  chosen: treasure
  alternatives:
  - store of wealth
  - what you treasure
  lexicon: BDAG
  rationale: '''Treasure'' is the direct and idiomatic rendering, preserving both
    literal and metaphorical force in context about heavenly versus earthly wealth.'
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - desire
  lexicon: BDAG
  rationale: '''Heart'' preserves the biblical anthropological sense of the center
    of desire, affection, and orientation without over-interpreting to one psychological
    component.'
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Maintains the correlative structure 'where... there...' of the Greek.
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: 'Placed at the end in English for natural style while preserving the
    additive emphasis: the heart accompanies the treasure.'
- source_word: ἔσται
  chosen: will be
  alternatives:
  - is going to be
  - shall be
  lexicon: BDAG
  rationale: Future tense is explicit in Greek and should be preserved. 'Will be'
    is modern and clear; it can express both future result and proverbial certainty.
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: Second person plural possessive in both instances is naturally rendered
    'your' in English; number distinction is not marked in standard English pronouns
    here.
