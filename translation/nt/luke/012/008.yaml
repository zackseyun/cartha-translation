id: LUK.12.8
reference: Luke 12:8
source:
  edition: SBLGNT
  text: Λέγω δὲ ὑμῖν, πᾶς ὃς ἂν ⸀ὁμολογήσῃ ἐν ἐμοὶ ἔμπροσθεν τῶν ἀνθρώπων, καὶ ὁ υἱὸς
    τοῦ ἀνθρώπου ὁμολογήσει ἐν αὐτῷ ἔμπροσθεν τῶν ἀγγέλων τοῦ θεοῦ·
translation:
  text: And I tell you, everyone who confesses me before men, the Son of Man also
    will confess before the angels of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who acknowledges me before people.' The Greek says 'before
      men,' using a masculine plural with representative force for human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ ὑμῖν
  chosen: And I tell you
  alternatives:
  - But I tell you
  - Now I tell you
  lexicon: BDAG
  rationale: λέγω is a present indicative used discourse-pragmatically as a solemn
    assertion. δέ is mildly connective; 'And' fits natural English while preserving
    continuity without overstating contrast.
- source_word: πᾶς ὃς ἂν
  chosen: everyone who
  alternatives:
  - whoever
  - every one who
  lexicon: BDAG
  rationale: This construction expresses an indefinite general condition. 'Everyone
    who' is natural English and preserves the universal scope.
- source_word: ὁμολογήσῃ
  chosen: confesses
  alternatives:
  - acknowledges
  - declares allegiance to
  lexicon: BDAG
  rationale: ὁμολογέω here means to acknowledge or confess publicly. 'Confesses' preserves
    the verbal link with the second ὁμολογήσει and retains the public, declarative
    sense.
- source_word: ἐν ἐμοὶ
  chosen: me
  alternatives:
  - in me
  - for me
  lexicon: BDAG
  rationale: Although the Greek uses ἐν, in this idiom with ὁμολογέω the sense is
    personal acknowledgment with reference to Jesus. English idiom prefers 'confesses
    me' or 'acknowledges me' over the less natural 'confesses in me.' This also preserves
    the parallel with 'in him' in the second clause at the level of meaning rather
    than wooden form.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  - in the presence of men
  lexicon: BDAG
  rationale: ἔμπροσθεν means 'before/in the presence of.' ἀνθρώπων is grammatically
    masculine plural but here representative of human beings generally. Per the gender-accurate
    policy, 'men' is retained as matching the source form and traditional representative
    force; inclusivity can be clarified in a footnote.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' self-designation and a recognized title with Danielic
    resonance. It should be translated, not paraphrased, to preserve both idiom and
    theological weight.
- source_word: ὁμολογήσει
  chosen: will confess
  alternatives:
  - will acknowledge
  lexicon: BDAG
  rationale: Future of the same verb as earlier in the verse; 'will confess' preserves
    lexical consistency and the reciprocal correspondence between human confession
    of Jesus and the Son of Man's confession of the person.
- source_word: ἐν αὐτῷ
  chosen: him
  alternatives:
  - in him
  - for him
  lexicon: BDAG
  rationale: As with ἐν ἐμοὶ, the preposition functions idiomatically with ὁμολογέω.
    'Confess him' is the most natural English rendering and best reflects reciprocal
    acknowledgment.
- source_word: ἔμπροσθεν τῶν ἀγγέλων τοῦ θεοῦ
  chosen: before the angels of God
  alternatives:
  - in the presence of God's angels
  lexicon: BDAG
  rationale: A straightforward rendering preserving the solemn heavenly courtroom/public-witness
    setting implied by the phrase.
