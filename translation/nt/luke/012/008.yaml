theological_decisions:
- issue: Rendering the reciprocal confession formula with ἐν + dative
  chosen_reading: Translate idiomatically as 'confesses me ... will confess [him]'
    rather than woodenly retaining 'in me/in him.'
  alternative_readings:
  - everyone who confesses in me ... will confess in him
  rationale: The Greek prepositional construction is unusual in English if rendered
    literally. An idiomatic rendering better communicates the public acknowledgment
    motif without importing additional doctrinal nuance. The reciprocity of witness
    remains intact.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of ἀνθρώπων
  chosen_reading: Use 'men' in the main text, with inclusive force understood.
  alternative_readings:
  - people
  - others
  rationale: The source is grammatically masculine plural with representative force.
    Per the gender-accurate policy, the translation should match the source's intent
    rather than flatten it into a neutral term in the main text; an explanatory footnote
    preserves clarity for modern readers.
  doctrine_reference: Translation philosophy §4
