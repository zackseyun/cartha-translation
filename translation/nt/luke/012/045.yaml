theological_decisions:
- issue: Rendering κύριος in a parable where it refers to a human household superior
    rather than directly to God or the Messiah
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: The project's default for κύριος is 'Lord,' but context governs. Here
    the referent is the slave's household superior within the story world, so 'master'
    avoids confusion with a divine title while preserving the authority relation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy #1 and #5'
- issue: Rendering δοῦλος in this parabolic context
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The verse foregrounds hierarchy, ownership, and abuse within a household,
    making the bonded nature of δοῦλος salient. Therefore 'slave' better reflects
    the social reality than the softer 'servant.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy #1'
