id: LUK.12.45
reference: Luke 12:45
source:
  edition: SBLGNT
  text: ἐὰν δὲ εἴπῃ ὁ δοῦλος ἐκεῖνος ἐν τῇ καρδίᾳ αὐτοῦ· Χρονίζει ὁ κύριός μου ἔρχεσθαι,
    καὶ ἄρξηται τύπτειν τοὺς παῖδας καὶ τὰς παιδίσκας, ἐσθίειν τε καὶ πίνειν καὶ μεθύσκεσθαι,
translation:
  text: But if that slave says in his heart, ‘My master is delaying his coming,’ and
    begins to beat the male servants and the female servants, and to eat and drink
    and get drunk,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My lord delays coming.' The Greek has 'my lord/master is delaying to
      come,' with κύριος here referring to the household superior in the parable.
    reason: alternative_reading
  - marker: b
    text: Or 'servant' for 'slave' (Greek δοῦλος); 'slave' is used here because the
      bonded household relationship is prominent in the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Rendered 'slave' rather than 'servant' because the household authority
    structure and accountability in this parable make the bonded status more salient,
    in line with the project's context-dependent policy for δοῦλος.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  chosen: in his heart
  alternatives:
  - to himself
  - within himself
  lexicon: BDAG
  rationale: A natural but still formally transparent rendering of the idiom, preserving
    the inward/private nature of the thought.
- source_word: Χρονίζει
  chosen: is delaying
  alternatives:
  - delays
  - is taking a long time
  lexicon: BDAG
  rationale: The present tense conveys ongoing delay; 'is delaying' fits idiomatic
    English and preserves the servant's complaint about the master's postponed arrival.
- source_word: κύριός μου
  chosen: my master
  alternatives:
  - my lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord,' in this parabolic household setting
    it refers to the slave's human superior, so 'master' best conveys the social relation
    without importing a divine-title sense.
- source_word: ἔρχεσθαι
  chosen: his coming
  alternatives:
  - to come
  - to arrive
  lexicon: BDAG
  rationale: The complementary infinitive after χρονίζει is expressed idiomatically
    in English as 'is delaying his coming'; this preserves the sense of postponed
    arrival.
- source_word: ἄρξηται
  chosen: begins
  alternatives:
  - starts
  lexicon: BDAG
  rationale: Standard rendering of ingressive aspect, introducing the ensuing abusive
    and self-indulgent actions.
- source_word: τύπτειν
  chosen: to beat
  alternatives:
  - to strike
  - to hit
  lexicon: BDAG
  rationale: '''Beat'' best reflects repeated abusive action in this context, stronger
    and more contextually appropriate than the more neutral ''strike'' or ''hit.'''
- source_word: τοὺς παῖδας
  chosen: the male servants
  alternatives:
  - the servants
  - the boys
  - the menservants
  lexicon: BDAG
  rationale: Given the paired contrast with παιδίσκας, the masculine term is best
    rendered specifically as 'male servants' to preserve the gender distinction present
    in the Greek.
- source_word: τὰς παιδίσκας
  chosen: the female servants
  alternatives:
  - the servant girls
  - the maidservants
  lexicon: BDAG
  rationale: Rendered to match the explicit feminine counterpart to παῖδας. 'Female
    servants' is clear modern English and preserves the gendered pair.
- source_word: ἐσθίειν τε καὶ πίνειν
  chosen: to eat and drink
  lexicon: BDAG
  rationale: Straightforward rendering of the paired infinitives; no expansion beyond
    the Greek is needed.
- source_word: μεθύσκεσθαι
  chosen: get drunk
  alternatives:
  - become drunk
  - get drunk repeatedly
  lexicon: BDAG
  rationale: Natural modern English for the infinitive, conveying intoxication without
    unnecessary paraphrase.
