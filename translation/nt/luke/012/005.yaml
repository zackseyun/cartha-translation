theological_decisions:
- issue: Rendering of γέεννα in a judgment context
  chosen_reading: Gehenna
  alternative_readings:
  - hell
  rationale: To avoid importing later theological associations beyond the Greek term
    itself, the main text keeps the transliterated place-name 'Gehenna.' Because many
    English readers understand 'hell' as the functional equivalent in this context,
    that alternative is preserved in a footnote rather than placed in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
