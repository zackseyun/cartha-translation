id: LUK.12.5
reference: Luke 12:5
source:
  edition: SBLGNT
  text: ὑποδείξω δὲ ὑμῖν τίνα φοβηθῆτε· φοβήθητε τὸν μετὰ τὸ ἀποκτεῖναι ⸂ἔχοντα ἐξουσίαν⸃
    ἐμβαλεῖν εἰς τὴν γέενναν· ναί, λέγω ὑμῖν, τοῦτον φοβήθητε.
translation:
  text: 'But I will show you whom to fear: fear the one who, after killing, has authority
    to throw into Gehenna. Yes, I tell you, fear this one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hell.' The Greek term is Gehenna, a judgment term with roots in the
      Valley of Hinnom imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδείξω
  chosen: I will show
  alternatives:
  - I will point out
  - I will warn
  lexicon: BDAG
  rationale: Future indicative of ὑποδείκνυμι introduces Jesus' instruction. 'Show'
    is natural English and preserves the sense of indicating or pointing out without
    adding interpretive force.
- source_word: τίνα φοβηθῆτε
  chosen: whom to fear
  alternatives:
  - whom you should fear
  lexicon: BDAG
  rationale: The indirect question with aorist passive/deponent subjunctive is idiomatically
    rendered 'whom to fear.' This keeps the force concise and natural.
- source_word: φοβήθητε
  chosen: fear
  alternatives:
  - be afraid of
  - revere
  lexicon: BDAG
  rationale: Imperative repeated for emphasis. 'Fear' best preserves the lexical continuity
    with φοβηθῆτε and the solemn warning context. 'Revere' is too weak here; 'be afraid
    of' is more paraphrastic.
- source_word: τὸν
  chosen: the one
  alternatives:
  - him who
  lexicon: BDAG
  rationale: The article functions substantivally. 'The one' is clear modern English
    and avoids unnecessary archaism.
- source_word: μετὰ τὸ ἀποκτεῖναι
  chosen: after killing
  alternatives:
  - after he has killed
  - after putting to death
  lexicon: BDAG
  rationale: The articular infinitive with μετά denotes temporal sequence. 'After
    killing' is compact and preserves the Greek structure; the implied subject is
    the same as 'the one.'
- source_word: ἀποκτεῖναι
  chosen: killing
  alternatives:
  - putting to death
  - slaying
  lexicon: BDAG
  rationale: A common verb for killing. 'Killing' is straightforward modern English;
    'putting to death' is possible but slightly more formal than needed.
- source_word: ἔχοντα ἐξουσίαν
  chosen: has authority
  alternatives:
  - has power
  - has the right
  lexicon: BDAG
  rationale: ἐξουσία often denotes authority or delegated right, not mere raw power.
    'Has authority' best captures the term's semantic force.
- source_word: ἐμβαλεῖν εἰς
  chosen: to throw into
  alternatives:
  - to cast into
  lexicon: BDAG
  rationale: '''Throw into'' is a natural modern rendering of ἐμβάλλω εἰς. ''Cast
    into'' is traditional but more archaic.'
- source_word: γέενναν
  chosen: Gehenna
  alternatives:
  - hell
  lexicon: BDAG
  rationale: The Greek term γέεννα refers specifically to Gehenna. Transliteration
    preserves the source term and its Jewish contextual resonance better than flattening
    it to 'hell.' The more interpretive alternative is preserved in a footnote.
- source_word: ναί
  chosen: 'Yes'
  alternatives:
  - indeed
  - certainly
  lexicon: BDAG
  rationale: ναί adds emphatic affirmation. 'Yes' is simple and forceful in modern
    English.
- source_word: τοῦτον
  chosen: this one
  alternatives:
  - him
  lexicon: BDAG
  rationale: The demonstrative heightens emphasis in the final clause. 'This one'
    preserves that emphasis better than the flatter 'him'.
