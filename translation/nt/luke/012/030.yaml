id: LUK.12.30
reference: Luke 12:30
source:
  edition: SBLGNT
  text: ταῦτα γὰρ πάντα τὰ ἔθνη τοῦ κόσμου ⸀ἐπιζητοῦσιν, ὑμῶν δὲ ὁ πατὴρ οἶδεν ὅτι
    χρῄζετε τούτων.
translation:
  text: For all these things the nations of the world seek after, but your Father
    knows that you need these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gentiles of the world.' The Greek term can mean 'nations' or 'Gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα ... πάντα
  chosen: all these things
  alternatives:
  - all these
  lexicon: BDAG
  rationale: The accusative neuter plural demonstrative with πᾶς refers to the material
    necessities mentioned in context (food, drink, clothing). 'All these things' is
    natural English and preserves the object reference explicitly.
- source_word: τὰ ἔθνη τοῦ κόσμου
  chosen: the nations of the world
  alternatives:
  - the Gentiles of the world
  - the peoples of the world
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In this saying, the contrast is
    between those outside covenantal filial trust and Jesus' disciples, but the phrase
    is broad rather than narrowly ethnic. 'The nations of the world' preserves the
    literal wording and avoids over-specifying 'Gentiles' while still echoing biblical
    usage.
- source_word: ἐπιζητοῦσιν
  chosen: seek after
  alternatives:
  - seek
  - strive for
  lexicon: BDAG
  rationale: The compound verb ἐπιζητέω intensifies ζητέω, conveying active pursuit.
    'Seek after' reflects that force better than bare 'seek' while remaining idiomatic.
- source_word: ὑμῶν ... ὁ πατήρ
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The genitive pronoun with the nominative noun yields the possessive sense.
    'Your Father' is the exact wording present here; 'heavenly' is supplied in the
    Matthean parallel but not in this Greek text, so it should not be imported.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - has known
  - is aware
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect in form, it functions with present
    sense. 'Knows' is the standard and natural rendering.
- source_word: χρῄζετε
  chosen: you need
  alternatives:
  - you have need of
  lexicon: BDAG
  rationale: χρῄζω means 'to need' or 'to have need of.' 'You need' is clear modern
    English and preserves the sense without archaic phrasing.
- source_word: τούτων
  chosen: these things
  alternatives:
  - them
  lexicon: BDAG
  rationale: Repeating 'these things' mirrors the Greek demonstrative and keeps the
    referent explicit, matching the verse's rhetorical emphasis.
