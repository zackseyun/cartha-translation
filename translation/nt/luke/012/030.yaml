theological_decisions:
- issue: Rendering the contrast between unbelieving pursuit and filial trust
  chosen_reading: Retain 'the nations of the world' and 'your Father' without interpretive
    expansion.
  alternative_readings:
  - Translate ἔθνη as 'Gentiles' to sharpen covenantal contrast
  - Add 'heavenly' before 'Father' from the parallel context
  rationale: The verse contrasts the anxious pursuit characteristic of the world with
    the disciples' relationship to God as Father. The translation preserves that theological
    tension without importing additional wording or narrowing the scope beyond what
    Luke's Greek states.
  doctrine_reference: Translation philosophy §§1, 3, 6
