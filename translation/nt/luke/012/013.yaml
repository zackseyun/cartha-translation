id: LUK.12.13
reference: Luke 12:13
source:
  edition: SBLGNT
  text: Εἶπεν δέ τις ⸂ἐκ τοῦ ὄχλου αὐτῷ⸃· Διδάσκαλε, εἰπὲ τῷ ἀδελφῷ μου μερίσασθαι
    μετ’ ἐμοῦ τὴν κληρονομίαν.
translation:
  text: Then someone from the crowd said to him, “Teacher, tell my brother to divide
    the inheritance with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “share the inheritance with me” or “apportion the inheritance to me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δέ
  chosen: Then ... said
  alternatives:
  - And ... said
  - Now ... said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Then' gives natural English narrative progression
    without overstating contrast.
- source_word: τις
  chosen: someone
  alternatives:
  - a certain man
  - one
  lexicon: BDAG
  rationale: Indefinite pronoun referring to an unspecified individual; 'someone'
    is idiomatic modern English.
- source_word: ἐκ τοῦ ὄχλου
  chosen: from the crowd
  alternatives:
  - out of the crowd
  lexicon: BDAG
  rationale: Expresses source/origin from among the assembled people; 'from the crowd'
    is natural and accurate.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object referring to Jesus; straightforwardly rendered
    'to him'.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of address for an instructor; 'Teacher' best matches the plain
    sense in contemporary English without importing extra authority nuances.
- source_word: εἰπὲ
  chosen: tell
  alternatives:
  - say to
  - command
  lexicon: BDAG
  rationale: Aorist imperative of λέγω here functions as a request for Jesus to address
    the brother. 'Tell' is the most natural English equivalent in this construction.
- source_word: τῷ ἀδελφῷ μου
  chosen: my brother
  lexicon: BDAG
  rationale: Dative object of εἰπὲ; possessive retained directly.
- source_word: μερίσασθαι
  chosen: to divide
  alternatives:
  - to share out
  - to apportion
  lexicon: BDAG
  rationale: Aorist middle infinitive meaning to divide or distribute portions. 'Divide'
    fits inheritance context and standard English legal/familial usage.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - between us
  lexicon: BDAG
  rationale: μετά with genitive indicates association/participation. 'With me' preserves
    the Greek wording; 'between us' is interpretive and less direct.
- source_word: τὴν κληρονομίαν
  chosen: the inheritance
  alternatives:
  - the estate
  - the family inheritance
  lexicon: BDAG
  rationale: Refers to inherited property or share of an estate. 'The inheritance'
    is the broad, accurate term and avoids over-specifying the legal situation.
