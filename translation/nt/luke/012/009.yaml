theological_decisions:
- issue: Identity of the implied agent in 'will be denied'
  chosen_reading: Leave the passive as stated without supplying an explicit subject
    such as 'by the Son of Man' or 'by God.'
  alternative_readings:
  - Interpret the passive as implicitly referring to Jesus
  - Interpret the passive as a divine passive referring to God
  rationale: The Greek uses a passive verb without naming the agent. In the immediate
    context (cf. v. 8), readers may infer Jesus as the one who acknowledges/denies,
    but this verse itself does not explicitly state the agent. Preserving the passive
    maintains the text's theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
