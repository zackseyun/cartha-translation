id: LUK.12.9
reference: Luke 12:9
source:
  edition: SBLGNT
  text: ὁ δὲ ἀρνησάμενός με ἐνώπιον τῶν ἀνθρώπων ἀπαρνηθήσεται ἐνώπιον τῶν ἀγγέλων
    τοῦ θεοῦ.
translation:
  text: But the one who denies me before men will be denied before the angels of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people' for 'men'; the Greek says 'men/human beings' in contrast with
      'the angels of God.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''will be disowned''; the Greek verb is a stronger cognate of ''deny,''
      but the main text keeps the verbal parallel: ''denies ... will be denied.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνησάμενός
  chosen: the one who denies
  alternatives:
  - whoever denies
  - the one having denied
  - the one who disowns
  lexicon: BDAG
  rationale: 'Aorist middle participle with the article functions substantivally:
    ''the one who denies.'' In this paired saying with v. 8, English present sense
    communicates the general principle more naturally than a wooden past/perfect form.
    ''Denies'' preserves the verbal link with ἀπαρνηθήσεται better than ''disowns.'''
- source_word: με
  chosen: me
  rationale: Direct object pronoun referring to Jesus; retained explicitly.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: Standard idiomatic rendering in judicial/public-witness contexts; concise
    and natural while preserving the public setting.
- source_word: τῶν ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings in contrast with 'the angels of
    God.' Per gender-accurate philosophy, 'men' is acceptable when representing humanity
    in a generic plural, and it preserves the rhetorical parallel with the Greek.
    Inclusive alternatives are possible but less formally aligned.
- source_word: ἀπαρνηθήσεται
  chosen: will be denied
  alternatives:
  - will be disowned
  - will be utterly denied
  lexicon: BDAG
  rationale: Future passive of ἀπαρνέομαι. 'Will be denied' preserves the lexical
    correspondence with ἀρνησάμενος and keeps the solemn reciprocity of the saying.
    The prefixed form may intensify, but English need not force that nuance in the
    main text.
- source_word: τῶν ἀγγέλων τοῦ θεοῦ
  chosen: the angels of God
  alternatives:
  - God's angels
  lexicon: BDAG
  rationale: A transparent genitival rendering that preserves the formal cadence of
    the Greek and the heavenly-court setting.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding verse about confessing Jesus before
    men; 'But' best signals the antithetical parallel.
