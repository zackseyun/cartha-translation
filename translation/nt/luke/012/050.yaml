id: LUK.12.50
reference: Luke 12:50
source:
  edition: SBLGNT
  text: βάπτισμα δὲ ἔχω βαπτισθῆναι, καὶ πῶς συνέχομαι ἕως ⸀ὅτου τελεσθῇ.
translation:
  text: But I have a baptism to undergo, and how distressed I am until it is accomplished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have a baptism to be baptized with.' The Greek keeps the baptism imagery
      explicit.
    reason: lexical_alternative
  - marker: b
    text: '''Baptism'' here is metaphorical, referring to the overwhelming suffering
      Jesus is about to undergo.'
    reason: alternative_reading
  - marker: c
    text: Or 'how constrained I am' or 'how I am under pressure' until it is completed.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  chosen: a baptism
  alternatives:
  - an immersion
  lexicon: BDAG
  rationale: Rendered literally as 'baptism' rather than paraphrasing as 'suffering'
    or 'death,' since the noun is metaphorical but intentionally evokes immersion/overwhelming
    experience. In context Jesus refers to his impending passion, but the image should
    be preserved in the main text.
- source_word: ἔχω βαπτισθῆναι
  chosen: I have a baptism to undergo
  alternatives:
  - I have a baptism to be baptized with
  - I must undergo a baptism
  lexicon: BDAG
  rationale: The construction ἔχω + infinitive expresses an impending necessity or
    obligation. 'To undergo' gives natural English while preserving the passive sense
    of βαπτισθῆναι without the awkward repetition 'baptism to be baptized with.'
- source_word: πῶς
  chosen: how
  alternatives:
  - how greatly
  - how much
  lexicon: BDAG
  rationale: Kept as the exclamatory 'how,' introducing Jesus' emotional state. English
    idiom requires expansion in the following verb phrase rather than a bare literal
    rendering.
- source_word: συνέχομαι
  chosen: am distressed
  alternatives:
  - am constrained
  - am under pressure
  - am in anguish
  lexicon: BDAG
  rationale: The passive/middle of συνέχω here conveys being pressed, constrained,
    or distressed inwardly as Jesus anticipates what lies ahead. 'Am distressed' is
    clear modern English and fits the context of intense emotional pressure without
    over-specifying the exact nuance.
- source_word: ἕως ὅτου
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: This combination marks the temporal endpoint of Jesus' distress. Simple
    'until' is idiomatic and sufficient in English.
- source_word: τελεσθῇ
  chosen: it is accomplished
  alternatives:
  - it is completed
  - it is fulfilled
  - it is finished
  lexicon: BDAG
  rationale: The passive subjunctive of τελέω denotes bringing something to its intended
    completion. 'Accomplished' preserves the sense of completion of a divinely appointed
    event without importing the specific wording 'It is finished' from John 19:30.
