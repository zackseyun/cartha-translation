theological_decisions:
- issue: Metaphorical reference of 'baptism'
  chosen_reading: Jesus speaks metaphorically of his coming suffering and death, while
    retaining the baptism imagery in translation.
  alternative_readings:
  - A more general reference to overwhelming trial
  - A strictly literal reference to water baptism
  rationale: The immediate context and broader Gospel usage indicate a forward-looking
    reference to Jesus' passion, yet the translation should not flatten the metaphor
    into an interpretive paraphrase. Preserving 'baptism' maintains the theological
    and literary tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
