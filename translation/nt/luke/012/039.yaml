id: LUK.12.39
reference: Luke 12:39
source:
  edition: SBLGNT
  text: Τοῦτο δὲ γινώσκετε ὅτι εἰ ᾔδει ὁ οἰκοδεσπότης ποίᾳ ὥρᾳ ὁ κλέπτης ἔρχεται,
    ⸂οὐκ ἂν⸃ ἀφῆκεν ⸀διορυχθῆναι τὸν οἶκον αὐτοῦ.
translation:
  text: 'But know this: if the master of the house had known at what hour the thief
    was coming, he would not have allowed his house to be broken into.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to be dug through,' reflecting the practice of breaking through
      the wall of a house.
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦτο δὲ γινώσκετε
  chosen: But know this
  alternatives:
  - But understand this
  - Yet know this
  lexicon: BDAG
  rationale: γινώσκετε is a present active imperative plural, calling for recognition
    or understanding. 'Know this' is idiomatic and direct in English; δέ is carried
    by 'But' to mark transition/contrast.
- source_word: ὅτι
  chosen: ': if'
  alternatives:
  - that if
  lexicon: BDAG
  rationale: ὅτι introduces the content of what is to be known. In English, a colon
    after 'know this' naturally conveys the same function without awkwardness.
- source_word: οἰκοδεσπότης
  chosen: the master of the house
  alternatives:
  - the householder
  - the homeowner
  lexicon: BDAG
  rationale: οἰκοδεσπότης literally denotes the head/master of a household. 'Master
    of the house' preserves the social sense better than the more modern but flatter
    'homeowner' and is more transparent than 'householder' for contemporary readers.
- source_word: ποίᾳ ὥρᾳ
  chosen: at what hour
  alternatives:
  - at what time
  - when
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the specificity of the Greek
    expression while remaining natural. 'Hour' also fits the watchfulness motif in
    the context.
- source_word: ὁ κλέπτης ἔρχεται
  chosen: the thief was coming
  alternatives:
  - the thief comes
  - the thief would come
  lexicon: BDAG
  rationale: Although ἔρχεται is present, in indirect discourse with a past contrary-to-fact
    condition English commonly shifts to 'was coming' to express the anticipated event
    from the householder's past perspective.
- source_word: οὐκ ἂν ἀφῆκεν
  chosen: he would not have allowed
  alternatives:
  - he would not have let
  - he would not have permitted
  lexicon: BDAG
  rationale: The combination marks a contrary-to-fact apodosis. 'Would not have allowed'
    clearly conveys the counterfactual sense and fits the following infinitive construction.
- source_word: διορυχθῆναι
  chosen: to be broken into
  alternatives:
  - to be dug through
  - to be burglarized
  lexicon: BDAG
  rationale: The verb literally refers to digging through, especially mud-brick walls,
    but in this context the idiomatic sense is unauthorized entry by breaking in.
    'Broken into' communicates the meaning clearly in modern English; the more literal
    image is worth preserving in a footnote.
- source_word: τὸν οἶκον αὐτοῦ
  chosen: his house
  alternatives:
  - his home
  lexicon: BDAG
  rationale: '''House'' is the direct lexical equivalent of οἶκος here and matches
    the imagery of physical break-in more precisely than ''home''.'
