id: LUK.12.42
reference: Luke 12:42
source:
  edition: SBLGNT
  text: ⸂καὶ εἶπεν⸃ ὁ κύριος· Τίς ἄρα ἐστὶν ὁ πιστὸς οἰκονόμος, ⸀ὁ φρόνιμος, ὃν καταστήσει
    ὁ κύριος ἐπὶ τῆς θεραπείας αὐτοῦ τοῦ διδόναι ἐν καιρῷ ⸀τὸ σιτομέτριον;
translation:
  text: And the Lord said, “Who then is the faithful and prudent steward, whom the
    master will appoint over his household staff to give them their food allowance
    at the proper time?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wise' steward.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the ration of grain,' that is, the measured food portion assigned
      to each servant.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: For the narrative speaker reference ὁ κύριος, the default doctrinal rendering
    is 'Lord.' In the relative clause, the second ὁ κύριος refers within the parable
    to the household owner; English idiom favors 'master' there to distinguish the
    parabolic figure from the narrator's designation of Jesus while preserving the
    semantic range of κύριος.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: πιστός here describes reliability in entrusted responsibility; 'faithful'
    is the most natural and established rendering in this stewardship context.
- source_word: οἰκονόμος
  chosen: steward
  alternatives:
  - manager
  - household manager
  lexicon: BDAG
  rationale: οἰκονόμος denotes one entrusted with management of a household or estate.
    'Steward' preserves the entrusted-administration sense better than the more generic
    'manager.'
- source_word: φρόνιμος
  chosen: prudent
  alternatives:
  - wise
  - sensible
  lexicon: BDAG
  rationale: φρόνιμος emphasizes practical wisdom and sound judgment. 'Prudent' captures
    this managerial discernment well in context.
- source_word: καταστήσει
  chosen: will appoint
  alternatives:
  - will put
  - will set
  lexicon: BDAG
  rationale: καθίστημι in this future active context means to place someone in a position
    of responsibility. 'Will appoint' expresses formal entrustment clearly in modern
    English.
- source_word: θεραπείας
  chosen: household staff
  alternatives:
  - servants
  - household
  - attendants
  lexicon: BDAG
  rationale: θεραπεία can denote a body of attendants/servants rather than the abstract
    idea of service. 'Household staff' communicates the collective group under the
    steward's oversight in accessible modern English.
- source_word: ἐν καιρῷ
  chosen: at the proper time
  alternatives:
  - in due time
  - at the right time
  lexicon: BDAG
  rationale: The phrase denotes the fitting or appointed time. 'At the proper time'
    is idiomatic and preserves the temporal appropriateness implied by καιρός.
- source_word: σιτομέτριον
  chosen: food allowance
  alternatives:
  - ration of grain
  - food ration
  - measured portion of food
  lexicon: BDAG
  rationale: σιτομέτριον refers to an allotted measured portion of food, historically
    grain-based. 'Food allowance' communicates the distributive function naturally
    in English, while a footnote preserves the more literal 'ration of grain' nuance.
