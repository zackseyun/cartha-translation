theological_decisions:
- issue: Rendering repeated κύριος in narrative and parabolic clause
  chosen_reading: '''the Lord'' for Jesus as speaker; ''the master'' for the parable''s
    household owner'
  alternative_readings:
  - '''the Lord'' in both places'
  rationale: The Greek uses the same word, but English can distinguish levels of reference
    without altering meaning. This avoids confusion between Jesus as narrator/speaker
    and the parable's internal figure while retaining κύριος as a title meaning 'lord/master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; translation philosophy
    allows context-dependent variance when documented.'
