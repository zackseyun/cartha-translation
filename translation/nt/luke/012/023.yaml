id: LUK.12.23
reference: Luke 12:23
source:
  edition: SBLGNT
  text: ἡ ⸀γὰρ ψυχὴ πλεῖόν ἐστιν τῆς τροφῆς καὶ τὸ σῶμα τοῦ ἐνδύματος.
translation:
  text: For life is more than food, and the body than clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''soul'': the Greek word ψυχή can mean ''life,'' ''self,'' or ''soul'';
      here the context favors ''life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding command not to be
    anxious. 'For' is idiomatic and preserves the connective force.
- source_word: ψυχή
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: BDAG
  rationale: In this context of eating, anxiety, and bodily provision, ψυχή refers
    to one's life rather than the immaterial soul. 'Life' best matches the immediate
    contrast with food and clothing and avoids importing a narrower anthropological
    claim.
- source_word: πλεῖόν
  chosen: more than
  alternatives:
  - greater than
  - more important than
  lexicon: BDAG
  rationale: The comparative neuter is used idiomatically with the genitive to express
    surpassing value. 'More than' is natural English and preserves the comparison
    without over-interpreting it.
- source_word: τροφή
  chosen: food
  alternatives:
  - nourishment
  lexicon: BDAG
  rationale: '''Food'' is the plain, natural English equivalent in this context. ''Nourishment''
    is possible but less idiomatic and slightly more abstract.'
- source_word: σῶμα
  chosen: body
  lexicon: BDAG
  rationale: Literal reference to the physical body, paired with clothing. No contextual
    reason to depart from the standard gloss.
- source_word: ἔνδυμα
  chosen: clothing
  alternatives:
  - garment
  - raiment
  lexicon: BDAG
  rationale: '''Clothing'' is clear modern English and fits the general sense of what
    covers the body. ''Garment'' is possible but slightly less natural in contemporary
    style.'
