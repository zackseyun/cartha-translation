theological_decisions:
- issue: Sense of ψυχή in a teaching about anxiety and provision
  chosen_reading: ψυχή is rendered 'life' rather than 'soul'
  alternative_readings:
  - soul
  rationale: The verse contrasts ψυχή with food and σώμα with clothing, indicating
    concern for earthly life and bodily existence rather than making a direct statement
    about the immortal soul. This preserves the contextual meaning without denying
    broader theological uses of ψυχή elsewhere.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
