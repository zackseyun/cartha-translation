id: LUK.12.32
reference: Luke 12:32
source:
  edition: SBLGNT
  text: Μὴ φοβοῦ, τὸ μικρὸν ποίμνιον, ὅτι εὐδόκησεν ὁ πατὴρ ὑμῶν δοῦναι ὑμῖν τὴν βασιλείαν.
translation:
  text: Do not fear, little flock, because your Father was pleased to give you the
    kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be afraid.'
    reason: lexical_alternative
  - marker: b
    text: Or 'small flock.'
    reason: lexical_alternative
  - marker: c
    text: '''The kingdom'' may also be understood as ''the reign,'' emphasizing God''s
      royal rule as well as the realm given to his people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβοῦ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: BDAG
  rationale: Present middle/passive imperative with μή gives a prohibition. 'Do not
    fear' is slightly more formal and concise, preserving the directness of the Greek
    while remaining natural English. 'Do not be afraid' is a valid idiomatic alternative.
- source_word: τὸ μικρὸν ποίμνιον
  chosen: little flock
  alternatives:
  - small flock
  - little sheepfold
  lexicon: BDAG
  rationale: ποίμνιον denotes a flock, especially of sheep; μικρόν modifies it as
    'small/little.' 'Little flock' is the most natural vocative rendering in English
    and preserves the pastoral metaphor and affectionate tone. 'Small flock' is possible
    but less idiomatic here.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the exhortation not to fear. 'Because'
    makes the causal force explicit in contemporary English.
- source_word: εὐδόκησεν
  chosen: was pleased
  alternatives:
  - has been pleased
  - delighted
  - determined graciously
  lexicon: BDAG
  rationale: Aorist indicative of εὐδοκέω conveys favorable intention or good pleasure.
    'Was pleased' best captures the sense of the Father's gracious delight without
    overinterpreting the aorist. 'Delighted' may overstate the emotional nuance; 'determined
    graciously' is too interpretive.
- source_word: ὁ πατὴρ ὑμῶν
  chosen: your Father
  alternatives:
  - your heavenly Father
  lexicon: BDAG
  rationale: The Greek reads simply 'your Father' with no adjective. The possessive
    is naturally fronted in English. Adding 'heavenly' would import wording not present
    in this verse.
- source_word: δοῦναι ὑμῖν
  chosen: to give you
  alternatives:
  - to grant to you
  - to give to you
  lexicon: BDAG
  rationale: Infinitive of δίδωμι with dative pronoun is straightforwardly rendered
    'to give you.' 'Grant' is possible but slightly more elevated and interpretive.
- source_word: τὴν βασιλείαν
  chosen: the kingdom
  alternatives:
  - the reign
  - the kingdom of God
  lexicon: BDAG
  rationale: βασιλεία can denote reign/rule or kingdom. In this context, 'the kingdom'
    is the established and natural rendering, preserving the eschatological and covenantal
    breadth of the term without adding 'of God,' which is not explicit in the Greek.
