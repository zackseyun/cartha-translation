theological_decisions:
- issue: Nuance of βασιλεία
  chosen_reading: the kingdom
  alternative_readings:
  - the reign
  rationale: The term can emphasize either the realm or the exercise of royal rule.
    'The kingdom' preserves the familiar biblical expression while leaving the full
    theological scope intact rather than narrowing it to either spatial realm or abstract
    rule alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Sense of εὐδόκησεν in relation to divine will
  chosen_reading: was pleased
  alternative_readings:
  - graciously chose
  - determined
  rationale: The verse emphasizes the Father's benevolent good pleasure. Rendering
    it as 'was pleased' avoids importing a more technical doctrinal statement about
    decree while still conveying divine initiative.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
