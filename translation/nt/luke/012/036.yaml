theological_decisions:
- issue: Rendering κύριος in a parabolic context
  chosen_reading: lord
  alternative_readings:
  - master
  rationale: The project's default for κύριος is 'Lord,' but in this verse the referent
    is a human figure in a household analogy, so lowercase 'lord' preserves the lexical
    choice without implying a direct divine title. 'Master' was considered but not
    chosen because the default rendering should be maintained unless context demands
    otherwise.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered language for ἀνθρώποις
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The Greek is grammatically masculine plural and functions representatively
    within the parable. Per the gender-accurate policy, 'men' is retained rather than
    neutralizing to 'people.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
