id: LUK.12.36
reference: Luke 12:36
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς ὅμοιοι ἀνθρώποις προσδεχομένοις τὸν κύριον ἑαυτῶν πότε ἀναλύσῃ ἐκ
    τῶν γάμων, ἵνα ἐλθόντος καὶ κρούσαντος εὐθέως ἀνοίξωσιν αὐτῷ.
translation:
  text: And you, be like men waiting for their lord when he returns from the wedding
    feast, so that when he comes and knocks, they may open to him at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the wedding' or 'from the marriage feast.' The Greek plural can
      refer to the wedding festivities as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'master' for 'lord.' Greek kyrios can denote a human superior as well
      as the divine title 'Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅμοιοι
  chosen: be like
  alternatives:
  - are like
  lexicon: BDAG
  rationale: Though the verb 'be' is implied rather than expressed, English idiom
    requires it. 'Be like' preserves the comparative force in this exhortational context
    better than a flat descriptive 'are like.'
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - servants
  lexicon: BDAG
  rationale: The noun means 'people/humans/men.' Here it refers to a group in a household
    analogy. 'Men' preserves the grammatically masculine representative form in keeping
    with the gender-accurate policy. 'Servants' is interpretive and not stated by
    the Greek in this verse, even if implied by context.
- source_word: προσδεχομένοις
  chosen: waiting for
  alternatives:
  - expecting
  - looking for
  lexicon: BDAG
  rationale: The participle conveys expectant waiting or readiness. 'Waiting for'
    is natural English and preserves the anticipatory sense without overinterpreting
    emotional nuance.
- source_word: κύριον
  chosen: lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: The default rendering for κύριος in DOCTRINE.md is 'Lord.' In this parabolic
    household setting, lowercase 'lord' best reflects a human superior rather than
    a direct divine title, while still preserving the lexical value of κύριος. 'Master'
    is possible but not the project's default.
- source_word: ἑαυτῶν
  chosen: their
  alternatives:
  - their own
  lexicon: BDAG
  rationale: The reflexive pronoun marks possession by the men themselves. English
    normally expresses this simply as 'their'; adding 'own' is possible but unnecessary
    here.
- source_word: πότε ἀναλύσῃ
  chosen: when he returns
  alternatives:
  - when he comes back
  - when he departs and returns
  lexicon: BDAG
  rationale: In this context ἀναλύω refers to returning from an event, not merely
    departing. 'When he returns' fits the following phrase 'from the wedding feast'
    and yields clear English. A more wooden rendering would be less natural and potentially
    misleading.
- source_word: ἐκ τῶν γάμων
  chosen: from the wedding feast
  alternatives:
  - from the wedding
  - from the marriage feast
  lexicon: BDAG
  rationale: The plural γάμοι often refers idiomatically to wedding festivities or
    a wedding banquet. 'Wedding feast' communicates the event more clearly in modern
    English than the bare 'wedding' while remaining faithful to the sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This conjunction introduces purpose. 'So that' is idiomatic modern English
    and preserves the purposive force.
- source_word: ἐλθόντος καὶ κρούσαντος
  chosen: when he comes and knocks
  alternatives:
  - when he has come and knocked
  lexicon: BDAG
  rationale: The genitive absolute is best rendered with a temporal clause in English.
    'When he comes and knocks' preserves the sequence and avoids awkward literalism.
- source_word: εὐθέως
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: The adverb denotes promptness. 'At once' is concise, natural, and suitably
    formal in tone.
- source_word: ἀνοίξωσιν αὐτῷ
  chosen: they may open to him
  alternatives:
  - they may open the door to him
  - they may open for him
  lexicon: BDAG
  rationale: The verb's object is implicit. 'Open to him' keeps close to the Greek
    without adding 'door,' though that is understood from context.
