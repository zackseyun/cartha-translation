theological_decisions:
- issue: Whether Jesus' statement should be softened to avoid apparent tension with
    texts about peace
  chosen_reading: 'Retain the stark contrast: Jesus denies that his coming brings
    peace in this immediate sense and states that it brings division.'
  alternative_readings:
  - Render more interpretively as 'not peace, but conflict'
  - Soften to imply only an accidental social effect
  rationale: The Greek is deliberately sharp and should not be harmonized away. In
    context, Jesus speaks of the divisive effect of his mission among people, especially
    households, not a denial of all biblical themes of peace. Preserving the tension
    accords with the translation philosophy's instruction not to resolve genuine theological
    tension beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
