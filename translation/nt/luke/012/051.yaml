id: LUK.12.51
reference: Luke 12:51
source:
  edition: SBLGNT
  text: δοκεῖτε ὅτι εἰρήνην παρεγενόμην δοῦναι ἐν τῇ γῇ; οὐχί, λέγω ὑμῖν, ἀλλ’ ἢ διαμερισμόν.
translation:
  text: Do you think that I came to give peace on the earth? No, I tell you, but rather
    division.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring peace.' The Greek verb is literally 'to give,' but some English
      translations use 'bring' idiomatically.
    reason: lexical_alternative
  - marker: b
    text: '''On the earth'' could also be rendered ''in the land,'' but the broader
      sense is more likely here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκεῖτε
  chosen: Do you think
  alternatives:
  - Do you suppose
  - Do you imagine
  lexicon: BDAG
  rationale: Present active indicative, second person plural, introducing a rhetorical
    question about the hearers' assumption. 'Do you think' is natural modern English
    and preserves the direct challenge.
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Standard gloss for εἰρήνη. In context it refers to social peace/harmony
    rather than inner tranquility alone, but 'peace' is broad enough to preserve that
    range without over-specifying.
- source_word: παρεγενόμην
  chosen: I came
  alternatives:
  - I have come
  - I arrived
  lexicon: BDAG
  rationale: Aorist middle of παραγίνομαι here functions idiomatically for Jesus'
    coming/appearing with purpose, followed by the infinitive δοῦναι. English idiom
    favors 'I came' in this rhetorical question. 'I have come' is possible, but 'I
    came' matches the aorist well and reads naturally.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to bring
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/complement after παρεγενόμην. 'To give'
    is the direct lexical equivalent and should be retained unless English demands
    otherwise. 'To bring' is idiomatic in some translations, but 'to give' stays closer
    to the Greek.
- source_word: ἐν τῇ γῇ
  chosen: on the earth
  alternatives:
  - in the earth
  - in the land
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'world,' or 'land.' Here the scope is broad and
    parallels Jesus' mission in the world, so 'on the earth' best fits. 'In the land'
    would narrow the sense too much to a local territory.
- source_word: οὐχί
  chosen: 'No'
  alternatives:
  - Certainly not
  - Not at all
  lexicon: BDAG
  rationale: Strong negative answer to the rhetorical question. 'No' is concise, natural,
    and forceful in English.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Common discourse formula in the Gospels. 'I tell you' is idiomatic modern
    English while preserving the emphatic direct address.
- source_word: ἀλλ’ ἢ
  chosen: but rather
  alternatives:
  - but instead
  - rather
  lexicon: BDAG
  rationale: 'This combination intensifies the contrast after the negation: not peace,
    but rather its opposite outcome. ''But rather'' captures the adversative force
    clearly.'
- source_word: διαμερισμόν
  chosen: division
  alternatives:
  - dissension
  - separation
  lexicon: BDAG
  rationale: The noun denotes division or dissension, especially social/familial splitting
    in the immediate context (vv. 52–53). 'Division' is the most direct and sufficiently
    broad rendering.
