id: LUK.12.33
reference: Luke 12:33
source:
  edition: SBLGNT
  text: πωλήσατε τὰ ὑπάρχοντα ὑμῶν καὶ δότε ἐλεημοσύνην· ποιήσατε ἑαυτοῖς βαλλάντια
    μὴ παλαιούμενα, θησαυρὸν ἀνέκλειπτον ἐν τοῖς οὐρανοῖς, ὅπου κλέπτης οὐκ ἐγγίζει
    οὐδὲ σὴς διαφθείρει·
translation:
  text: Sell your possessions and give to the poor. Make for yourselves money bags
    that do not wear out, an unfailing treasure in the heavens, where no thief comes
    near and no moth destroys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give alms.' The Greek term refers to acts of mercy expressed in giving
      to the needy.
    reason: lexical_alternative
  - marker: b
    text: Or 'in heaven.' Greek has the plural, 'in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πωλήσατε
  chosen: Sell
  alternatives:
  - Sell off
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive action. 'Sell' is the plain
    English equivalent without adding the stronger nuance of total liquidation unless
    context requires it.
- source_word: τὰ ὑπάρχοντα ὑμῶν
  chosen: your possessions
  alternatives:
  - what belongs to you
  - your belongings
  lexicon: BDAG
  rationale: The participle ὑπάρχοντα with possessive pronoun refers to one's property
    or possessions. 'Your possessions' is idiomatic and accurate in modern English.
- source_word: δότε ἐλεημοσύνην
  chosen: give to the poor
  alternatives:
  - give alms
  - give charity
  lexicon: BDAG
  rationale: ἐλεημοσύνη commonly denotes almsgiving to the needy. 'Give to the poor'
    communicates the sense clearly for modern readers; 'give alms' is more formal
    but less accessible, while 'give charity' can sound institutional rather than
    personal.
- source_word: ποιήσατε ἑαυτοῖς
  chosen: Make for yourselves
  alternatives:
  - Provide yourselves
  - Make yourselves
  lexicon: BDAG
  rationale: The reflexive dative indicates acting for one's own benefit. 'Make for
    yourselves' preserves both the imperative force and reflexive sense.
- source_word: βαλλάντια
  chosen: money bags
  alternatives:
  - purses
  - wallets
  lexicon: BDAG
  rationale: βαλλάντιον refers to a money pouch or purse. 'Money bags' fits the plural
    and preserves the concrete metaphor better than the more modern but potentially
    anachronistic 'wallets.'
- source_word: μὴ παλαιούμενα
  chosen: that do not wear out
  alternatives:
  - that do not grow old
  - that do not become worn
  lexicon: BDAG
  rationale: The participle from παλαιόω literally means becoming old/worn. In context
    of money bags, 'do not wear out' is the most natural English expression.
- source_word: θησαυρὸν ἀνέκλειπτον
  chosen: an unfailing treasure
  alternatives:
  - an inexhaustible treasure
  - a treasure that does not fail
  lexicon: BDAG
  rationale: ἀνέκλειπτος conveys not failing, not running out. 'Unfailing treasure'
    is concise and natural while preserving the metaphorical force.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural. 'In the heavens' preserves the form of the source
    and reflects common Jewish/NT idiom, even though idiomatic English often uses
    singular 'in heaven.'
- source_word: ὅπου κλέπτης οὐκ ἐγγίζει
  chosen: where no thief comes near
  alternatives:
  - where no thief approaches
  - where no thief draws near
  lexicon: BDAG
  rationale: ἐγγίζω means come near/approach. 'Comes near' is natural modern English
    and keeps the spatial imagery.
- source_word: οὐδὲ σὴς διαφθείρει
  chosen: and no moth destroys
  alternatives:
  - nor does moth ruin
  - and no moth corrupts
  lexicon: BDAG
  rationale: σής is moth, and διαφθείρω here refers to ruining or destroying by consumption.
    'Destroys' is idiomatic and fits the parallel with the thief.
