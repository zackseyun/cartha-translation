theological_decisions:
- issue: Rendering of ἐλεημοσύνην in an exhortation about possessions and heavenly
    treasure
  chosen_reading: give to the poor
  alternative_readings:
  - give alms
  - give charity
  rationale: The verse concerns concrete generosity toward the needy, not merely a
    generalized virtue. The chosen rendering makes the social target explicit in line
    with the semantic range of ἐλεημοσύνη while remaining accessible. This does not
    import a broader economic program beyond the text's command.
  doctrine_reference: Translation philosophy sections 1 and 6
- issue: Rendering of ἐν τοῖς οὐρανοῖς
  chosen_reading: in the heavens
  alternative_readings:
  - in heaven
  rationale: The plural is retained to reflect the Greek form and Jewish idiom rather
    than smoothing to traditional singular English. This preserves source-language
    texture without changing doctrine.
  doctrine_reference: Translation philosophy sections 1 and 5
