theological_decisions:
- issue: Rendering ψυχή in a self-address within a parable
  chosen_reading: soul
  alternative_readings:
  - self
  - life
  rationale: The verse is not making a technical anthropological statement but depicts
    a man speaking to his inner self. 'Soul' preserves the literary and theological
    resonance of ψυχή without over-interpreting the term.
  doctrine_reference: Translation philosophy §3, §6
