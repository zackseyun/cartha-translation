id: LUK.12.19
reference: Luke 12:19
source:
  edition: SBLGNT
  text: καὶ ἐρῶ τῇ ψυχῇ μου· Ψυχή, ἔχεις πολλὰ ἀγαθὰ κείμενα εἰς ἔτη πολλά· ἀναπαύου,
    φάγε, πίε, εὐφραίνου.
translation:
  text: And I will say to my soul, ‘Soul, you have many good things laid up for many
    years. Rest, eat, drink, celebrate.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'self' or 'life' for 'soul' (Greek ψυχή), depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'be merry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρῶ
  chosen: I will say
  alternatives:
  - I shall say
  - I will tell
  lexicon: BDAG
  rationale: Future active of λέγω; straightforward future speech. 'Say' is the most
    natural and direct rendering here.
- source_word: ψυχῇ / Ψυχή
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: The speaker addresses his inner self. 'Soul' preserves the Greek term
    and the rhetorical force of self-address better than the flatter 'self,' while
    'life' is less fitting in direct address.
- source_word: ἀγαθὰ
  chosen: good things
  alternatives:
  - goods
  - possessions
  lexicon: BDAG
  rationale: The term is broad and refers to beneficial material assets in context.
    'Good things' preserves the lexical breadth while still fitting the rich fool's
    stored wealth.
- source_word: κείμενα
  chosen: laid up
  alternatives:
  - stored
  - set aside
  lexicon: BDAG
  rationale: The participle of κεῖμαι literally means 'lying' or 'being laid,' and
    in this context refers to goods kept in storage. 'Laid up' is idiomatic English
    that preserves the sense of stored reserve.
- source_word: εἰς ἔτη πολλά
  chosen: for many years
  alternatives:
  - for many a year
  - for a long time
  lexicon: BDAG
  rationale: This prepositional phrase expresses duration into the future. 'For many
    years' is clear, natural, and close to the Greek.
- source_word: ἀναπαύου
  chosen: Rest
  alternatives:
  - Take your ease
  - Relax
  lexicon: BDAG
  rationale: Middle/passive imperative calling for ease or repose. 'Rest' is concise
    and natural; 'take your ease' is traditional but dated.
- source_word: φάγε
  chosen: eat
  lexicon: BDAG
  rationale: Aorist imperative of ἐσθίω; simple command best rendered directly.
- source_word: πίε
  chosen: drink
  lexicon: BDAG
  rationale: Aorist imperative of πίνω; simple command best rendered directly.
- source_word: εὐφραίνου
  chosen: celebrate
  alternatives:
  - be merry
  - rejoice
  lexicon: BDAG
  rationale: The verb denotes being glad or making merry. 'Celebrate' communicates
    festive self-indulgence in contemporary English better than the archaic 'be merry,'
    while 'rejoice' can sound more morally positive than the context suggests.
