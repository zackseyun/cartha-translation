theological_decisions:
- issue: Whether to render οἶκος concretely as 'house' or interpretively as 'household'
    in a context of family division
  chosen_reading: house
  alternative_readings:
  - household
  rationale: The verse immediately precedes explicit family-role language in v.53,
    so the referent is clearly the domestic family unit. Still, the Greek term itself
    is literally 'house,' and optimal equivalence favors preserving that form in the
    main text while noting the broader social sense in a footnote rather than resolving
    the nuance too strongly.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological/interpretive
    tension rather than over-resolve'
