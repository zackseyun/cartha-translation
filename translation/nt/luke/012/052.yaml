id: LUK.12.52
reference: Luke 12:52
source:
  edition: SBLGNT
  text: ἔσονται γὰρ ἀπὸ τοῦ νῦν πέντε ἐν ⸂ἑνὶ οἴκῳ⸃ διαμεμερισμένοι, τρεῖς ἐπὶ δυσὶν
    καὶ δύο ἐπὶ τρισίν,
translation:
  text: For from now on there will be five in one house divided, three against two
    and two against three,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “household.” The Greek word can refer to the house itself or to the family
      unit within it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσονται
  chosen: there will be
  alternatives:
  - they will be
  lexicon: BDAG
  rationale: Future of εἰμί. English existential 'there will be' is more natural here
    because the clause introduces the presence of five persons in a household, rather
    than emphasizing their bare existence as subjects.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this statement to the preceding
    saying about division. 'For' is concise and natural in context.
- source_word: ἀπὸ τοῦ νῦν
  chosen: from now on
  alternatives:
  - from this time forward
  - henceforth
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the temporal expression, preserving the
    forward-looking sense without archaic diction.
- source_word: πέντε
  chosen: five
  lexicon: BDAG
  rationale: Straightforward numeral; refers to five persons in the household.
- source_word: ἐν ἑνὶ οἴκῳ
  chosen: in one house
  alternatives:
  - in one household
  - in a single house
  lexicon: BDAG
  rationale: οἶκος can denote either the physical house or the household/family unit.
    Here the immediate context in the next verse names family relationships, so 'household'
    is a viable interpretive rendering; however, 'house' preserves the Greek wording
    while still naturally implying the domestic unit in English. The alternative is
    preserved in a footnote because it affects nuance.
- source_word: διαμεμερισμένοι
  chosen: divided
  alternatives:
  - split apart
  - distributed
  lexicon: BDAG
  rationale: Perfect passive participle of διαμερίζω. In this context of relational
    conflict, 'divided' best captures the state resulting from division. 'Distributed'
    is lexically possible elsewhere but not suitable here.
- source_word: τρεῖς ἐπὶ δυσὶν
  chosen: three against two
  alternatives:
  - three opposed to two
  - three over against two
  lexicon: BDAG
  rationale: ἐπί with the dative here expresses opposition in a divided group. 'Against'
    is the clearest modern English rendering.
- source_word: καὶ δύο ἐπὶ τρισίν
  chosen: and two against three
  alternatives:
  - and two opposed to three
  - and two over against three
  lexicon: BDAG
  rationale: Parallel to the previous phrase; 'against' preserves the adversative
    symmetry of the Greek.
