theological_decisions:
- issue: Divine providence in the comparison
  chosen_reading: and God feeds them
  rationale: The verse presents God's active care for creatures as the basis for Jesus'
    argument about human value. The translation preserves this theological point without
    expanding it into a broader doctrinal claim not explicit in the text.
