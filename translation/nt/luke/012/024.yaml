id: LUK.12.24
reference: Luke 12:24
source:
  edition: SBLGNT
  text: κατανοήσατε τοὺς κόρακας ὅτι οὐ σπείρουσιν οὐδὲ θερίζουσιν, οἷς οὐκ ἔστιν
    ταμεῖον οὐδὲ ἀποθήκη, καὶ ὁ θεὸς τρέφει αὐτούς· πόσῳ μᾶλλον ὑμεῖς διαφέρετε τῶν
    πετεινῶν.
translation:
  text: 'Consider the ravens: they neither sow nor reap; they have neither storeroom
    nor barn, and God feeds them. How much more valuable are you than the birds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Observe the ravens' or 'Think carefully about the ravens.'
    reason: lexical_alternative
  - marker: b
    text: '''Storeroom'' translates ταμεῖον; ''barn'' translates ἀποθήκη. The Greek
      uses two distinct storage terms.'
    reason: lexical_alternative
  - marker: c
    text: Or 'How much more are you worth than the birds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  chosen: Consider
  alternatives:
  - Observe
  - Think carefully about
  lexicon: BDAG
  rationale: Aorist imperative calling for attentive reflection, not merely a glance.
    'Consider' is concise, natural English and preserves the force of deliberate observation.
- source_word: κόρακας
  chosen: ravens
  alternatives:
  - crows
  lexicon: BDAG
  rationale: κόραξ specifically denotes 'raven,' not the broader 'bird' or the more
    colloquial 'crow.' This preserves the concrete image in the Greek.
- source_word: σπείρουσιν οὐδὲ θερίζουσιν
  chosen: they neither sow nor reap
  alternatives:
  - they do not sow or harvest
  lexicon: BDAG
  rationale: A straightforward rendering of the paired agricultural verbs. 'Reap'
    matches θερίζω well and preserves the compact parallelism.
- source_word: ταμεῖον
  chosen: storeroom
  alternatives:
  - storehouse
  - granary
  lexicon: BDAG
  rationale: ταμεῖον refers to an inner storage place or storeroom. 'Storeroom' distinguishes
    it from ἀποθήκη and avoids collapsing the two nouns into one idea.
- source_word: ἀποθήκη
  chosen: barn
  alternatives:
  - storehouse
  - granary
  lexicon: BDAG
  rationale: ἀποθήκη commonly denotes a place for storing produce, suitably rendered
    'barn' here. Using 'barn' alongside 'storeroom' preserves the rhetorical pair
    without redundancy.
- source_word: τρέφει
  chosen: feeds
  alternatives:
  - nourishes
  lexicon: BDAG
  rationale: Simple present verb indicating God's ongoing provision. 'Feeds' is idiomatic
    and fits the context of birds being sustained by God.
- source_word: πόσῳ μᾶλλον
  chosen: How much more
  alternatives:
  - By how much more
  - How much greater
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the comparative argument from lesser
    to greater.
- source_word: διαφέρετε
  chosen: are ... valuable
  alternatives:
  - are worth more
  - excel
  - differ
  lexicon: BDAG
  rationale: In this context the verb carries the sense of surpassing in value or
    importance, not merely being different. 'Are ... valuable' communicates the comparative
    force naturally in English.
- source_word: τῶν πετεινῶν
  chosen: than the birds
  alternatives:
  - than the birds of the sky
  - than the fowl
  lexicon: BDAG
  rationale: πετεινόν is a general term for birds/flying creatures. Since ravens have
    just been mentioned specifically, the broader comparison is best rendered 'the
    birds.'
