theological_decisions:
- issue: Rendering κύριος in a parabolic household setting
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: The verse speaks of a slave and his superior within a household analogy.
    Translating κύριος as 'master' preserves the social relation in the parable and
    avoids implying that the noun here functions directly as a divine title in the
    sentence itself, while still allowing the broader parabolic reference to stand.
  doctrine_reference: 'DOCTRINE.md: ''κύριος Kyrios → Lord'' default applies to covenantal
    and NT usage; context may require variance if documented.'
- issue: Severity phrase πολλάς
  chosen_reading: with many blows
  alternative_readings:
  - severely
  - with many stripes
  rationale: The Greek leaves the noun implicit, but the idiom clearly refers to repeated
    blows. Supplying 'blows' preserves the concrete warning imagery without archaic
    diction like 'stripes.'
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; readable modern English,
    not archaic or academic.'
