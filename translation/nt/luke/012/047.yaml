id: LUK.12.47
reference: Luke 12:47
source:
  edition: SBLGNT
  text: ἐκεῖνος δὲ ὁ δοῦλος ὁ γνοὺς τὸ θέλημα τοῦ κυρίου ⸀αὐτοῦ καὶ μὴ ἑτοιμάσας ⸀ἢ
    ποιήσας πρὸς τὸ θέλημα αὐτοῦ δαρήσεται πολλάς·
translation:
  text: But that slave, who knew his master's will and did not prepare or act according
    to his will, will be beaten with many blows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will be beaten many times' or 'will receive many stripes.'
      The Greek leaves the noun implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: The term denotes a bonded subordinate rather than a hired servant. In
    this parabolic context the master's authority and the punitive consequence make
    the bonded nature salient, so 'slave' best fits the translation philosophy and
    the doctrine guideline for δοῦλος.
- source_word: γνοὺς
  chosen: knew
  alternatives:
  - having known
  - understood
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω here indicates prior knowledge of the master's
    will. 'Knew' is natural English and preserves the sense without over-translating
    the participial form.
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - wish
  lexicon: BDAG
  rationale: '''Will'' is the standard and most contextually fitting rendering for
    the master''s intended command or desire.'
- source_word: κυρίου
  chosen: master's
  alternatives:
  - lord's
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' in theological/title contexts, here
    it refers to the owner/master within the parable, not directly as a christological
    title. 'Master' best conveys the household relationship in English.
- source_word: ἑτοιμάσας
  chosen: prepare
  alternatives:
  - get ready
  - make ready
  lexicon: BDAG
  rationale: The verb means to make ready or prepare. 'Prepare' is concise and works
    well with the implied object left unstated in Greek.
- source_word: ἢ ποιήσας πρὸς τὸ θέλημα αὐτοῦ
  chosen: or act according to his will
  alternatives:
  - or do according to his will
  - or do what accords with his will
  lexicon: BDAG
  rationale: 'The construction gives two failures: not preparing, or not doing in
    accordance with the master''s will. ''Act according to his will'' is idiomatic
    English while preserving the force of ποιέω plus πρός.'
- source_word: δαρήσεται
  chosen: will be beaten
  alternatives:
  - will receive a beating
  - will be flogged
  lexicon: BDAG
  rationale: The future passive of δέρω refers to physical beating in the parable.
    'Will be beaten' is direct and clear without adding specificity beyond the Greek.
- source_word: πολλάς
  chosen: with many blows
  alternatives:
  - severely
  - many times
  lexicon: BDAG
  rationale: The feminine plural adjective is elliptical, with 'blows/stripes' understood.
    Rendering the implied noun in English is necessary for clarity; 'many blows' preserves
    the concrete image better than the more interpretive 'severely'.
