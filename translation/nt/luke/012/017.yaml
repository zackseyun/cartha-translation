id: LUK.12.17
reference: Luke 12:17
source:
  edition: SBLGNT
  text: καὶ διελογίζετο ἐν ⸀ἑαυτῷ λέγων· Τί ποιήσω, ὅτι οὐκ ἔχω ποῦ συνάξω τοὺς καρπούς
    μου;
translation:
  text: And he reasoned within himself, saying, ‘What will I do, since I have nowhere
    to gather my crops?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What shall I do?'
    reason: lexical_alternative
  - marker: b
    text: Or 'my produce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελογίζετο
  chosen: reasoned
  alternatives:
  - thought
  - deliberated
  lexicon: BDAG
  rationale: The imperfect middle indicates an internal process of deliberation. 'Reasoned'
    preserves the reflective, calculating sense better than the flatter 'thought,'
    while remaining natural English.
- source_word: ἐν ἑαυτῷ
  chosen: within himself
  alternatives:
  - to himself
  - in himself
  lexicon: BDAG
  rationale: This phrase marks inward deliberation. 'Within himself' preserves the
    internal sense more explicitly than 'to himself,' which can suggest spoken words.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of his inner speech. 'Saying' closely
    follows the Greek structure and works naturally in English after 'reasoned within
    himself.'
- source_word: Τί ποιήσω
  chosen: What will I do
  alternatives:
  - What shall I do
  lexicon: BDAG
  rationale: The aorist subjunctive in a deliberative question is well represented
    by 'What will I do?' in contemporary English. 'What shall I do?' is also possible
    but sounds more formal and archaic to many readers.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for his question. 'Since' gives a smooth
    causal sense in modern English without sounding stilted.
- source_word: ποῦ
  chosen: nowhere
  alternatives:
  - no place where
  lexicon: BDAG
  rationale: With οὐκ ἔχω, the idiom means 'I have nowhere.' This is more idiomatic
    in English than a more literal 'I do not have where.'
- source_word: συνάξω
  chosen: to gather
  alternatives:
  - to store up
  - to bring together
  lexicon: BDAG
  rationale: The verb means 'gather together.' In this agricultural context it can
    imply storage, but 'gather' stays closer to the Greek while fitting the immediate
    context.
- source_word: τοὺς καρπούς μου
  chosen: my crops
  alternatives:
  - my produce
  - my fruits
  lexicon: BDAG
  rationale: In context καρποί refers to agricultural yield, not specifically 'fruits'
    in the narrow English sense. 'My crops' is clear, natural, and contextually precise.
