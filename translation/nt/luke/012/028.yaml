id: LUK.12.28
reference: Luke 12:28
source:
  edition: SBLGNT
  text: εἰ δὲ ⸂ἐν ἀγρῷ τὸν χόρτον ὄντα σήμερον⸃ καὶ αὔριον εἰς κλίβανον βαλλόμενον
    ὁ θεὸς οὕτως ⸀ἀμφιέζει, πόσῳ μᾶλλον ὑμᾶς, ὀλιγόπιστοι.
translation:
  text: But if God so clothes the grass in the field, which is here today and tomorrow
    is thrown into an oven, how much more will he clothe you, you of little faith!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vegetation' or 'herbage' for 'grass.'
    reason: lexical_alternative
  - marker: b
    text: The 'oven' refers to a baking oven; dried field grass could be used as fuel.
    reason: cultural_note
lexical_decisions:
- source_word: χόρτον
  chosen: grass
  alternatives:
  - vegetation
  - herbage
  lexicon: BDAG
  rationale: χόρτος commonly denotes grass or herbage. In this context of short-lived
    field growth used as fuel, 'grass' is the most natural and idiomatic English rendering.
- source_word: ἐν ἀγρῷ
  chosen: in the field
  alternatives:
  - in a field
  - in the open field
  lexicon: BDAG
  rationale: The phrase locates the grass in its ordinary outdoor setting. 'In the
    field' is idiomatic and preserves the generic sense without over-specifying.
- source_word: ὄντα σήμερον καὶ αὔριον ... βαλλόμενον
  chosen: which is here today and tomorrow is thrown
  alternatives:
  - being today and tomorrow being thrown
  - alive today and tomorrow thrown
  lexicon: BDAG
  rationale: The participial construction is compressed in Greek. English requires
    expansion for clarity. 'Which is here today and tomorrow is thrown' preserves
    the temporal contrast and the transient nature of the grass without awkward literalism.
- source_word: κλίβανον
  chosen: oven
  alternatives:
  - furnace
  lexicon: BDAG
  rationale: κλίβανος refers to an oven, often a clay baking oven. 'Oven' is the plain
    and accurate modern equivalent; 'furnace' sounds too industrial and intense.
- source_word: ἀμφιέζει
  chosen: clothes
  alternatives:
  - dresses
  - arrays
  lexicon: BDAG
  rationale: The verb means to clothe or dress. 'Clothes' is clear modern English
    and fits the comparison with human clothing in the surrounding context. 'Arrays'
    is too elevated; 'dresses' is possible but slightly less natural here.
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - how much more surely
  - much more
  lexicon: BDAG
  rationale: This is the standard comparative idiom expressing an argument from lesser
    to greater. 'How much more' is both accurate and idiomatic.
- source_word: ὀλιγόπιστοι
  chosen: you of little faith
  alternatives:
  - you who have little faith
  - little-faith ones
  lexicon: BDAG
  rationale: The vocative addresses the disciples directly and carries a mild rebuke.
    'You of little faith' preserves the familiar force and directness without sounding
    wooden.
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: BDAG
  rationale: δέ here marks continuation with slight contrast from the previous example.
    'But if' best captures the argumentative turn in English.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The subject is explicitly ὁ θεός. No expansion is needed; 'God' is direct
    and accurate.
- source_word: οὕτως
  chosen: so
  alternatives:
  - in this way
  - thus
  lexicon: BDAG
  rationale: οὕτως modifies the manner of clothing. 'So' is concise, natural, and
    preserves the emphasis.
