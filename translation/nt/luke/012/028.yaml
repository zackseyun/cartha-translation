theological_decisions:
- issue: Force of ὀλιγόπιστοι in Jesus' address
  chosen_reading: 'A direct but gentle rebuke: ''you of little faith'''
  alternative_readings:
  - an exasperated rebuke
  - a merely descriptive statement about weak trust
  rationale: The term critiques deficient trust in God without making a technical
    doctrinal statement about saving faith or apostasy. The translation preserves
    the tension and pastoral tone of Jesus' words rather than intensifying or softening
    them beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
