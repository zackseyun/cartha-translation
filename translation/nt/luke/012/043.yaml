theological_decisions:
- issue: Potential christological resonance of κύριος in a parable about a master's
    return
  chosen_reading: Rendered as 'master' in the main text
  alternative_readings:
  - Rendered as 'Lord' to foreground possible allusion to Jesus as Lord
  rationale: The immediate narrative image is a household master and servant, so 'master'
    best reflects the parable's surface sense. Because Luke's context also invites
    eschatological application to the Lord's return, the alternative is preserved
    in a footnote rather than imported into the main text.
  doctrine_reference: 'DOCTRINE.md: κύριος default ''Lord''; preserve theological
    tension rather than resolve it'
