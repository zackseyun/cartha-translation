id: LUK.12.43
reference: Luke 12:43
source:
  edition: SBLGNT
  text: μακάριος ὁ δοῦλος ἐκεῖνος, ὃν ἐλθὼν ὁ κύριος αὐτοῦ εὑρήσει ποιοῦντα οὕτως·
translation:
  text: Blessed is that servant whom his master, when he comes, will find doing so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is that servant whom his Lord, when he comes, will find doing
      so.' The Greek word can mean 'master' in the parable's household setting or
      'Lord' where the broader application is in view.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Retains the beatitude-like force and covenantal/religious weight better
    than the more subjective 'happy' or merely circumstantial 'fortunate'.
- source_word: δοῦλος
  chosen: servant
  alternatives:
  - slave
  - bondservant
  lexicon: BDAG
  rationale: The term can denote a slave or servant. Here the parabolic household
    setting emphasizes role and duty under a master, but the bonded nature is not
    the main theological point, so 'servant' fits the context while remaining within
    the doctrine's allowed default range.
- source_word: κύριος
  chosen: master
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord,' in this immediate parabolic context
    it refers to the servant's household superior rather than functioning as a christological
    title in direct address. 'Master' best conveys the social relation in English.
    The alternative 'Lord' is preserved in a footnote because the parable may also
    evoke the Lord's return.
- source_word: ἐλθὼν
  chosen: when he comes
  alternatives:
  - having come
  - upon coming
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered in English as a temporal
    clause here. 'When he comes' is idiomatic and preserves the sequence relative
    to 'will find'.
- source_word: εὑρήσει
  chosen: will find
  alternatives:
  - finds
  lexicon: BDAG
  rationale: Future indicative is straightforwardly represented by 'will find.'
- source_word: ποιοῦντα οὕτως
  chosen: doing so
  alternatives:
  - doing thus
  - acting in this way
  lexicon: BDAG
  rationale: This concise rendering naturally points back to the previously described
    faithful conduct without sounding wooden. 'Doing thus' is overly literal in modern
    English.
- source_word: ἐκεῖνος
  chosen: that
  alternatives:
  - the
  lexicon: BDAG
  rationale: 'The demonstrative adds specificity and emphasis: not merely any servant,
    but that servant.'
