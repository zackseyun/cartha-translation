theological_decisions:
- issue: Rendering the christological title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions here as Jesus' self-designation with strong apocalyptic
    and messianic overtones. Retaining the traditional literal rendering preserves
    the title's intertextual resonance, especially with Danielic background, without
    importing extra doctrinal claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Temporal force of ἔρχεται in an eschatological saying
  chosen_reading: is coming
  alternative_readings:
  - will come
  rationale: The Greek present can be futuristic. Rendering it as 'is coming' preserves
    the immediacy and warning tone while remaining idiomatic. This does not resolve
    any broader eschatological system; it simply reflects the verbal form's force
    in context.
  doctrine_reference: Translation philosophy §3
