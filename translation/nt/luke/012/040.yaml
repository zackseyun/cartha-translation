id: LUK.12.40
reference: Luke 12:40
source:
  edition: SBLGNT
  text: καὶ ⸀ὑμεῖς γίνεσθε ἕτοιμοι, ὅτι ᾗ ὥρᾳ οὐ δοκεῖτε ὁ υἱὸς τοῦ ἀνθρώπου ἔρχεται.
translation:
  text: You also must be ready, because the Son of Man is coming at an hour you do
    not expect.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You too be ready.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the hour you do not think' or 'when you do not expect it.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the Son of Man,' a title Jesus uses for himself with likely echoes
      of Daniel 7:13–14.
    reason: cross_reference
lexical_decisions:
- source_word: γίνεσθε ἕτοιμοι
  chosen: must be ready
  alternatives:
  - be ready
  - become ready
  - keep yourselves ready
  lexicon: BDAG
  rationale: γίνεσθε is a present middle/passive imperative, calling for an ongoing
    state or posture. In idiomatic English, 'must be ready' conveys the imperative
    force clearly without awkwardness. 'Be ready' is possible, but 'must be ready'
    better reflects the command's urgency in context.
- source_word: καὶ ὑμεῖς
  chosen: You also
  alternatives:
  - And you
  - You too
  lexicon: BDAG
  rationale: 'The combination marks inclusion/emphasis: the hearers, like the servants
    in the preceding illustration, are likewise addressed. ''You also'' preserves
    this force in natural English.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the command. 'Because' is the clearest
    modern English connector.
- source_word: ᾗ ὥρᾳ
  chosen: at an hour
  alternatives:
  - at the hour
  - when
  lexicon: BDAG
  rationale: 'The dative relative phrase is idiomatically temporal: ''at the hour''
    or ''at an hour.'' English prefers the indefinite expression here because the
    point is unexpected timing rather than a specific known hour.'
- source_word: οὐ δοκεῖτε
  chosen: you do not expect
  alternatives:
  - you do not think
  - you do not suppose
  lexicon: BDAG
  rationale: 'δοκέω can mean ''think, suppose, seem.'' In this eschatological warning
    context, ''expect'' best captures the practical sense: the coming occurs when
    the hearers are not anticipating it.'
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and most transparent rendering of the Greek title,
    preserving both its literal form and its messianic/apocalyptic resonance. It should
    not be flattened to 'the human one' here because the title's canonical and theological
    associations are significant.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - will come
  lexicon: BDAG
  rationale: The present tense is used futuristically. 'Is coming' preserves the Greek
    aspect/form while sounding natural in English. 'Will come' is possible but loses
    the vividness of the present.
