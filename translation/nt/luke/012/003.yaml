theological_decisions:
- issue: Nature of the saying's disclosure imagery
  chosen_reading: Render the verse as a warning that what is hidden or whispered will
    become public, without specifying whether the disclosure is divine judgment, providential
    exposure in history, or eschatological revelation.
  alternative_readings:
  - Primarily final judgment disclosure
  - Primarily exposure of hypocrisy in present history
  rationale: The immediate context concerns hidden hypocrisy being uncovered, but
    the verse itself does not narrowly define the timing or mechanism of disclosure.
    The translation preserves the broad theological tension rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
