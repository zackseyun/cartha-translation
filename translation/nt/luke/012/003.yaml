id: LUK.12.3
reference: Luke 12:3
source:
  edition: SBLGNT
  text: ἀνθ’ ὧν ὅσα ἐν τῇ σκοτίᾳ εἴπατε ἐν τῷ φωτὶ ἀκουσθήσεται, καὶ ὃ πρὸς τὸ οὖς
    ἐλαλήσατε ἐν τοῖς ταμείοις κηρυχθήσεται ἐπὶ τῶν δωμάτων.
translation:
  text: Therefore, whatever you said in the darkness will be heard in the light, and
    what you spoke into the ear in the inner rooms will be proclaimed on the housetops.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the rooftops.' The image is of public announcement from the flat
      roofs of houses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθ’ ὧν
  chosen: Therefore
  alternatives:
  - For this reason
  - Accordingly
  - Because of this
  lexicon: BDAG
  rationale: The idiom ἀνθ’ ὧν here functions inferentially, drawing a conclusion
    from the previous verse about hidden things being disclosed. 'Therefore' captures
    the discourse force in natural English better than a more wooden 'for which things'.
- source_word: ὅσα
  chosen: whatever
  alternatives:
  - all that
  - the things that
  lexicon: BDAG
  rationale: 'An indefinite relative sense fits the construction: Jesus refers comprehensively
    to anything said in secret. ''Whatever'' is concise and natural while preserving
    the breadth.'
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  - in the dark
  lexicon: BDAG
  rationale: The phrase is both literal and metaphorical for secrecy/concealment.
    'In the darkness' preserves the imagery and rhetorical contrast with 'in the light'.
- source_word: εἴπατε
  chosen: you said
  alternatives:
  - you spoke
  lexicon: BDAG
  rationale: λέγω commonly means 'say.' Keeping 'said' distinguishes it slightly from
    the later ἐλαλήσατε ('spoke'), though the English distinction is not heavily pressed.
- source_word: ἐν τῷ φωτί
  chosen: in the light
  alternatives:
  - in daylight
  - in the open
  lexicon: BDAG
  rationale: This preserves the antithesis with 'in the darkness' and allows both
    literal and figurative senses of public disclosure.
- source_word: ἀκουσθήσεται
  chosen: will be heard
  alternatives:
  - will be made heard
  lexicon: BDAG
  rationale: Future passive is straightforward. 'Will be heard' is idiomatic and preserves
    the passive disclosure motif.
- source_word: ὃ
  chosen: what
  alternatives:
  - whatever
  lexicon: BDAG
  rationale: The singular relative pronoun introduces the second parallel clause.
    'What' is the most natural English equivalent here.
- source_word: πρὸς τὸ οὖς
  chosen: into the ear
  alternatives:
  - in the ear
  - to the ear
  - in someone's ear
  lexicon: BDAG
  rationale: The idiom denotes whispering privately. 'Into the ear' is a fairly literal
    rendering that remains intelligible and preserves the vividness of the Greek singular
    expression.
- source_word: ἐλαλήσατε
  chosen: you spoke
  alternatives:
  - you said
  lexicon: BDAG
  rationale: λαλέω often carries the sense 'speak.' Rendering it 'spoke' provides
    slight lexical differentiation from εἴπατε without overstating a semantic contrast.
- source_word: ἐν τοῖς ταμείοις
  chosen: in the inner rooms
  alternatives:
  - in the storerooms
  - in the private rooms
  - in the chambers
  lexicon: BDAG
  rationale: ταμεῖον can denote an inner room, storeroom, or private chamber. In this
    context of secrecy, 'inner rooms' best conveys enclosed privacy without implying
    only storage use.
- source_word: κηρυχθήσεται
  chosen: will be proclaimed
  alternatives:
  - will be announced
  - will be preached
  lexicon: BDAG
  rationale: κηρύσσω is public heralding. 'Will be proclaimed' captures the formal
    public announcement sense better than the narrower religious term 'preached' in
    this context.
- source_word: ἐπὶ τῶν δωμάτων
  chosen: on the housetops
  alternatives:
  - from the rooftops
  - on the roofs
  lexicon: BDAG
  rationale: The idiom evokes public broadcast from flat roofs in the ancient setting.
    'On the housetops' is a familiar but still clear rendering that stays close to
    the Greek preposition and noun.
