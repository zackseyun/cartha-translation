id: LUK.12.22
reference: Luke 12:22
source:
  edition: SBLGNT
  text: Εἶπεν δὲ πρὸς τοὺς μαθητὰς αὐτοῦ· Διὰ τοῦτο ⸂λέγω ὑμῖν⸃, μὴ μεριμνᾶτε τῇ ⸀ψυχῇ
    τί φάγητε, μηδὲ τῷ ⸀σώματι τί ἐνδύσησθε.
translation:
  text: Then he said to his disciples, “For this reason I tell you, do not worry about
    your life, what you will eat, nor about your body, what you will wear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be anxious.'
    reason: lexical_alternative
  - marker: b
    text: Or 'about your soul'; here the Greek word often means 'life' in the sense
      of one's earthly existence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  chosen: Then he said
  alternatives:
  - And he said
  - Now he said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Then' gives natural English narrative progression
    without overstating contrast.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit in Greek and should be retained. 'Disciples'
    is the standard rendering of μαθηταί in this context.
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: The phrase points back to the preceding teaching and introduces an inference.
    'For this reason' preserves the explicit causal/inferential force more transparently
    than the more compressed 'therefore.'
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Both are possible; 'I tell you' is idiomatic modern English while preserving
    the direct address.
- source_word: μὴ μεριμνᾶτε
  chosen: do not worry
  alternatives:
  - do not be anxious
  - do not be concerned
  lexicon: BDAG
  rationale: μεριμνάω here denotes anxious care or worry. 'Do not worry' is clear,
    natural English; 'be anxious' is also viable but slightly less idiomatic for many
    readers.
- source_word: τῇ ψυχῇ
  chosen: about your life
  alternatives:
  - for your life
  - about your soul
  lexicon: BDAG
  rationale: In this context ψυχή refers to one's life in the sense of earthly living/existence,
    especially as tied to food, not specifically the immaterial soul. 'About your
    life' best fits the immediate parallel with food and body/clothing.
- source_word: τί φάγητε
  chosen: what you will eat
  alternatives:
  - what you may eat
  - what to eat
  lexicon: BDAG
  rationale: The aorist subjunctive in an indirect deliberative sense is naturally
    rendered in English as future-oriented 'what you will eat.'
- source_word: μηδὲ τῷ σώματι
  chosen: nor about your body
  alternatives:
  - and not about your body
  lexicon: BDAG
  rationale: μηδέ coordinates the second prohibition element. 'Nor about your body'
    preserves the parallel structure with the first phrase.
- source_word: τί ἐνδύσησθε
  chosen: what you will wear
  alternatives:
  - what you may put on
  - what to wear
  lexicon: BDAG
  rationale: ἐνδύω in the middle commonly means 'put on' clothing. 'What you will
    wear' is idiomatic and matches the structure of 'what you will eat.'
