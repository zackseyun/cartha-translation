theological_decisions:
- issue: Meaning of ψυχή in this context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The immediate context contrasts food for ψυχή and clothing for σώμα,
    indicating ordinary earthly life rather than the soul as a theological category.
    This preserves the text's practical force and avoids importing a dualistic reading
    the verse itself does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
