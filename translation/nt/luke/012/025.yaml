id: LUK.12.25
reference: Luke 12:25
source:
  edition: SBLGNT
  text: τίς δὲ ἐξ ὑμῶν μεριμνῶν δύναται ⸂ἐπὶ τὴν ἡλικίαν αὐτοῦ προσθεῖναι⸃ ⸀πῆχυν;
translation:
  text: And which of you, by worrying, is able to add a cubit to his lifespan?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'add a cubit to his stature.' The Greek word can refer either to stature
      or to age/lifespan.
    reason: alternative_reading
lexical_decisions:
- source_word: τίς δὲ ἐξ ὑμῶν
  chosen: And which of you
  alternatives:
  - But which of you
  - And who among you
  lexicon: BDAG
  rationale: τίς introduces a rhetorical question; ἐξ ὑμῶν means 'from among you.'
    δέ is lightly connective here and is naturally rendered 'And' in English discourse.
- source_word: μεριμνῶν
  chosen: by worrying
  alternatives:
  - being anxious
  - by being anxious
  lexicon: BDAG
  rationale: The present participle expresses means or attendant circumstance. 'By
    worrying' is idiomatic modern English and fits the immediate context about anxiety,
    while preserving the negative sense of μεριμνάω.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: The verb denotes capability. 'Is able' is slightly more explicit than
    'can' and works well in the rhetorical question.
- source_word: ἐπὶ τὴν ἡλικίαν αὐτοῦ
  chosen: to his lifespan
  alternatives:
  - to his stature
  - to his life
  - to his age
  lexicon: BDAG
  rationale: ἡλικία can mean 'age,' 'span of life,' or 'stature.' In this context,
    paired with anxiety and the parallel in Luke 12:26 about inability regarding even
    a very small thing, 'lifespan' best fits the sense of extending one's life. The
    preposition ἐπί with προσθεῖναι conveys addition 'to' something.
- source_word: προσθεῖναι
  chosen: to add
  alternatives:
  - to increase
  lexicon: BDAG
  rationale: The infinitive straightforwardly means 'to add.' This preserves the metaphor
    without overinterpreting it.
- source_word: πῆχυν
  chosen: a cubit
  alternatives:
  - about eighteen inches
  - a forearm's length
  lexicon: BDAG
  rationale: πῆχυς is a cubit, a standard ancient measure. Retaining 'cubit' preserves
    the concrete metaphor and avoids flattening the imagery into a modern approximation.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per the project's gender-accurate
    policy, the representative masculine is preserved as 'his' rather than neutralizing
    it.
