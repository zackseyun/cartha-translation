theological_decisions:
- issue: Meaning of ἡλικία in this saying
  chosen_reading: lifespan
  alternative_readings:
  - stature
  rationale: The saying is about the futility of anxiety. While ἡλικία can denote
    physical stature, in this context the sense of extending one's life better matches
    the broader discourse on anxiety and life. Because the alternative is longstanding
    and plausible, it is preserved in a footnote rather than erased.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
