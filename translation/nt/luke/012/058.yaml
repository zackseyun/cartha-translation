theological_decisions:
- issue: Interpretive specificity of the legal exhortation
  chosen_reading: Retain the legal image without making the spiritual application
    explicit in the verse itself.
  alternative_readings:
  - Translate more interpretively as a call to reconcile with God before final judgment.
  rationale: The immediate wording is a legal analogy. While the broader context may
    imply eschatological urgency, the verse itself does not explicitly identify the
    accuser, judge, or prison with theological referents. Following the translation
    philosophy, the main text preserves the image and leaves broader application to
    context rather than importing doctrinal interpretation into the translation.
  doctrine_reference: Translation philosophy items 1 and 3
