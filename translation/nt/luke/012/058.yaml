id: LUK.12.58
reference: Luke 12:58
source:
  edition: SBLGNT
  text: ὡς γὰρ ὑπάγεις μετὰ τοῦ ἀντιδίκου σου ἐπ’ ἄρχοντα, ἐν τῇ ὁδῷ δὸς ἐργασίαν
    ἀπηλλάχθαι ἀπ’ αὐτοῦ, μήποτε κατασύρῃ σε πρὸς τὸν κριτήν, καὶ ὁ κριτής σε ⸀παραδώσει
    τῷ πράκτορι, καὶ ὁ πράκτωρ σε ⸀βαλεῖ εἰς φυλακήν.
translation:
  text: For as you are going with your accuser before a magistrate, make an effort
    on the way to be released from him, lest he drag you to the judge, and the judge
    hand you over to the officer, and the officer throw you into prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to settle with him.' The Greek wording is literally 'to be released
      from him,' but in context it likely refers to resolving the case before it reaches
      the judge.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιδίκου
  chosen: accuser
  alternatives:
  - adversary
  - opponent in a lawsuit
  lexicon: BDAG
  rationale: In this legal context, the term refers to the opposing party bringing
    a charge. 'Accuser' is natural modern English and fits the warning scene better
    than the more generic 'adversary.'
- source_word: ἄρχοντα
  chosen: magistrate
  alternatives:
  - ruler
  - official
  lexicon: BDAG
  rationale: Here ἄρχων is a civic authority before whom the dispute is first brought.
    'Magistrate' preserves the legal-administrative sense more precisely than the
    broader 'ruler' or 'official.'
- source_word: δὸς ἐργασίαν
  chosen: make an effort
  alternatives:
  - give diligence
  - work hard
  lexicon: BDAG
  rationale: The idiom combines δίδωμι with ἐργασία to urge active exertion. 'Make
    an effort' communicates the force in clear modern English without archaic phrasing
    like 'give diligence.'
- source_word: ἀπηλλάχθαι ἀπ’ αὐτοῦ
  chosen: to be released from him
  alternatives:
  - to be rid of him
  - to settle with him
  lexicon: BDAG
  rationale: The infinitive expresses freeing oneself from the accuser's claim or
    control. 'Be released from him' stays close to the Greek while remaining idiomatic.
    'Settle with him' captures the practical implication but is more interpretive,
    so it is preserved in a footnote rather than the main text.
- source_word: κατασύρῃ
  chosen: drag
  alternatives:
  - haul
  - drag down
  lexicon: BDAG
  rationale: The verb is forceful and vivid. 'Drag' best conveys the coercive movement
    to court in natural English.
- source_word: κριτήν / κριτής
  chosen: judge
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The standard legal sense is intended here. 'Judge' is the clear and consistent
    rendering.
- source_word: παραδώσει
  chosen: hand you over
  alternatives:
  - deliver you over
  - turn you over
  lexicon: BDAG
  rationale: '''Hand you over'' is idiomatic modern English and preserves the judicial
    transfer implied by the verb.'
- source_word: πράκτορι / πράκτωρ
  chosen: officer
  alternatives:
  - bailiff
  - court officer
  lexicon: BDAG
  rationale: The term denotes an official who executes the judge's order, likely involved
    in debt collection or custody. 'Officer' is readable and sufficiently precise;
    'bailiff' is possible but more culturally specific to English legal systems.
- source_word: βαλεῖ εἰς φυλακήν
  chosen: throw you into prison
  alternatives:
  - cast you into prison
  - put you in prison
  lexicon: BDAG
  rationale: βάλλω is vivid and forceful; 'throw you into prison' preserves that force
    better than the flatter 'put you in prison.'
- source_word: ὡς γὰρ
  chosen: For as
  alternatives:
  - For when
  - As
  lexicon: BDAG
  rationale: This introduces an illustrative comparison connected to the preceding
    exhortation. 'For as' preserves both the explanatory γάρ and comparative ὡς.
- source_word: ἐν τῇ ὁδῷ
  chosen: on the way
  alternatives:
  - along the road
  - while still on the way
  lexicon: BDAG
  rationale: The phrase is both literal and temporally urgent in context. 'On the
    way' is concise and natural, preserving the immediacy of settling before formal
    judgment.
