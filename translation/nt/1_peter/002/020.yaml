id: 1PE.2.20
reference: 1 Peter 2:20
source:
  edition: SBLGNT
  text: ποῖον γὰρ κλέος εἰ ἁμαρτάνοντες καὶ κολαφιζόμενοι ὑπομενεῖτε; ἀλλ’ εἰ ἀγαθοποιοῦντες
    καὶ πάσχοντες ὑπομενεῖτε, τοῦτο χάρις παρὰ θεῷ.
translation:
  text: For what credit is it if, when you are sinning and being beaten, you endure?
    But if, when you are doing good and suffering, you endure, this is grace before
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this finds favor with God' or 'this is commendable before God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κλέος
  chosen: credit
  alternatives:
  - glory
  - praise
  - renown
  lexicon: BDAG
  rationale: In this rhetorical question, κλέος refers to commendation or credit gained,
    not fame in a broad sense. 'Credit' is natural modern English and fits the ethical
    point better than 'glory' or 'renown.'
- source_word: ἁμαρτάνοντες
  chosen: sinning
  alternatives:
  - doing wrong
  lexicon: BDAG
  rationale: The participle directly denotes committing sin. 'Sinning' preserves the
    moral-theological force better than the more generic 'doing wrong.'
- source_word: κολαφιζόμενοι
  chosen: being beaten
  alternatives:
  - being struck
  - being buffeted
  lexicon: BDAG
  rationale: The verb literally refers to being struck with the fist or physically
    beaten. 'Being beaten' communicates the concrete physical abuse clearly in contemporary
    English; 'buffeted' is traditional but archaic.
- source_word: ὑπομενεῖτε
  chosen: you endure
  alternatives:
  - you persevere
  - you bear up
  lexicon: BDAG
  rationale: ὑπομένω means to remain steadfast under hardship. 'Endure' is concise,
    idiomatic, and preserves the repeated verbal emphasis in both clauses.
- source_word: ἀγαθοποιοῦντες
  chosen: doing good
  alternatives:
  - doing what is good
  - benefiting others
  lexicon: BDAG
  rationale: The participle denotes acting rightly or beneficently. 'Doing good' is
    the most direct and idiomatic rendering.
- source_word: πάσχοντες
  chosen: suffering
  alternatives:
  - being mistreated
  - undergoing suffering
  lexicon: BDAG
  rationale: The term broadly denotes suffering. Since the verse contrasts deserved
    punishment with undeserved suffering, the broader 'suffering' is preferable to
    a narrower gloss.
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - commendable
  lexicon: BDAG
  rationale: χάρις can mean grace, favor, thanks, or that which wins approval. Here
    the phrase τοῦτο χάρις παρὰ θεῷ most naturally means that such endurance finds
    favor with God. The main text keeps the theologically important term 'grace,'
    while a footnote preserves 'favor with God' as an explanatory alternative.
- source_word: παρὰ θεῷ
  chosen: before God
  alternatives:
  - with God
  - in God's sight
  lexicon: BDAG
  rationale: παρά with the dative can indicate presence or relation, here meaning
    in God's estimation or before him. 'Before God' is concise and preserves the relational
    sense; alternatives are viable and worth noting.
