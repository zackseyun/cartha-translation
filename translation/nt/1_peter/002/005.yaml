  from: as a spiritual house into a holy priesthood
  to: as a spiritual house, to be a holy priesthood
  rationale: 'The current rendering chains ''as'' and ''into'' in a way that is slightly
    awkward and could imply a sequence (the house becomes the priesthood). The Greek
    presents two parallel metaphors for the community: a ''spiritual house'' (what
    they are) and a ''holy priesthood'' (their purpose/identity). Using a purpose
    clause like ''to be a holy priesthood''—an alternative already provided in footnote
    ''b''—clarifies the relationship between the two metaphors, stating that the function
    of the house is to be the priesthood. This improves the flow and semantic clarity
    of the English.'
