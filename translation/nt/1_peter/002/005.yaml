id: 1PE.2.5
reference: 1 Peter 2:5
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ὡς λίθοι ζῶντες οἰκοδομεῖσθε οἶκος πνευματικὸς ⸀εἰς ἱεράτευμα ἅγιον,
    ἀνενέγκαι πνευματικὰς θυσίας ⸀εὐπροσδέκτους θεῷ διὰ Ἰησοῦ Χριστοῦ·
translation:
  text: you yourselves also, as living stones, are being built up as a spiritual house
    into a holy priesthood, to offer spiritual sacrifices acceptable to God through
    Jesus Christ.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like living stones.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a holy priesthood' or 'to be a holy priesthood.' The Greek preposition
      can express goal or result.
    reason: alternative_reading
  - marker: c
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' here because Χριστός functions
      as a title.
    reason: lexical_alternative
  - marker: d
    text: Or 'as a spiritual house into a holy priesthood'.
    reason: previous_rendering
lexical_decisions:
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you also
  - you yourselves also
  lexicon: BDAG
  rationale: Retains the emphatic force of the pronoun and addresses the readers directly
    in the plural. 'Yourselves' conveys emphasis; 'also' is preserved in the clause
    to reflect καί.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - even
  lexicon: BDAG
  rationale: Here καί links the readers with the preceding description of Christ as
    the living stone; 'also' best brings out the additive force in English.
- source_word: ὡς λίθοι ζῶντες
  chosen: as living stones
  alternatives:
  - like living stones
  lexicon: BDAG
  rationale: A close, natural rendering of the comparison. 'Living' preserves the
    participial adjective force of ζῶντες and echoes the preceding context.
- source_word: οἰκοδομεῖσθε
  chosen: are being built up
  alternatives:
  - are built up
  - are being built
  lexicon: BDAG
  rationale: Present passive indicative suggests an ongoing divine action. 'Are being
    built up' preserves both the passive voice and progressive aspect better than
    a simple present.
- source_word: οἶκος πνευματικὸς
  chosen: a spiritual house
  alternatives:
  - as a spiritual house
  - into a spiritual house
  lexicon: BDAG
  rationale: The nominative phrase functions as the result/complement of the passive
    building imagery. 'A spiritual house' is the most straightforward rendering; the
    English sentence includes 'as' for smoothness while preserving the metaphor.
- source_word: εἰς ἱεράτευμα ἅγιον
  chosen: into a holy priesthood
  alternatives:
  - for a holy priesthood
  - to be a holy priesthood
  lexicon: BDAG
  rationale: εἰς commonly marks goal or result. 'Into' preserves the directional/resultative
    sense without over-paraphrasing. ἱεράτευμα denotes a priestly body or priesthood,
    not merely individual priests.
- source_word: ἀνενέγκαι
  chosen: to offer
  alternatives:
  - to bring up
  - to present
  lexicon: BDAG
  rationale: The aorist infinitive from ἀναφέρω in sacrificial context means 'to offer
    up.' 'To offer' is idiomatic and sufficiently precise in English.
- source_word: πνευματικὰς θυσίας
  chosen: spiritual sacrifices
  lexicon: BDAG
  rationale: A direct rendering preserving both cultic imagery and the adjective πνευματικός.
    It does not specify the exact nature of the sacrifices beyond what the text states.
- source_word: εὐπροσδέκτους θεῷ
  chosen: acceptable to God
  alternatives:
  - well-pleasing to God
  - pleasing to God
  lexicon: BDAG
  rationale: '''Acceptable'' best matches sacrificial acceptance language in accessible
    modern English. It preserves the Godward dative without adding interpretive detail.'
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: 'διά with genitive indicates means or mediation: these sacrifices are
    acceptable through him. Per doctrine, Χριστός is translated as ''Messiah'' where
    functioning as a title rather than retained as the traditional name-like ''Christ''.'
