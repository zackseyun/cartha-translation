theological_decisions:
- issue: Rendering Χριστοῦ in the phrase διὰ Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase presents Χριστός as a title attached to Jesus, and the project
    default is to translate the title where context supports it. This preserves the
    messianic sense without altering orthodox Christology.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Voice and agency in οἰκοδομεῖσθε
  chosen_reading: passive ('are being built up') without specifying the agent
  alternative_readings:
  - middle/reflexive nuance ('build yourselves up')
  rationale: The form is morphologically passive/present and the immediate context
    supports believers being acted upon in God's building project. The translation
    preserves the passive and does not import an explicit agent the verse itself does
    not name.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
