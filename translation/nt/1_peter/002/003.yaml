id: 1PE.2.3
reference: 1 Peter 2:3
source:
  edition: SBLGNT
  text: ⸀εἰ ἐγεύσασθε ὅτι χρηστὸς ὁ κύριος.
translation:
  text: if indeed you have tasted that the Lord is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since you have tasted.' The Greek uses a conditional form that may assume
      the condition is true.
    reason: alternative_reading
  - marker: b
    text: '''Good'' could also be rendered ''kind'' or ''gracious.'' The wording echoes
      Psalm 34:8.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: if indeed
  alternatives:
  - if
  - since
  lexicon: BDAG
  rationale: Rendered with a slightly strengthened conditional force ('if indeed')
    to reflect the common rhetorical use here, likely echoing Psalm 34:8 LXX, while
    preserving the Greek conditional form rather than converting it fully to an asserted
    'since'.
- source_word: ἐγεύσασθε
  chosen: you have tasted
  alternatives:
  - you tasted
  - you have experienced
  lexicon: BDAG
  rationale: Aorist middle indicative of γεύομαι, literally 'taste.' The perfect-like
    English 'have tasted' reads naturally in context and conveys a past experience
    with present relevance. The metaphorical sense 'experience' is possible, but the
    literal image should be preserved because it fits the surrounding nourishment
    imagery in 2:2–3 and the Psalm allusion.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  - because
  lexicon: BDAG
  rationale: 'Introduces the content of what has been tasted/experienced: ''that the
    Lord is good.'' ''How'' is possible in idiomatic English, especially under influence
    of Psalm 34:8 (''taste and see that/how good...''), but ''that'' more directly
    reflects the Greek syntax.'
- source_word: χρηστὸς
  chosen: good
  alternatives:
  - kind
  - gracious
  lexicon: BDAG
  rationale: χρηστός can denote moral goodness, kindness, or benevolence. 'Good' preserves
    the likely Psalm 34:8 echo in familiar form and keeps the statement broad; 'kind'
    or 'gracious' narrow the sense more than the Greek requires.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In context
    this likely refers to Christ, while also echoing the Psalm's language about the
    Lord; 'Lord' preserves both the title's theological weight and the intertextual
    resonance.
