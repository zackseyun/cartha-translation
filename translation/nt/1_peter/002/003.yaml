theological_decisions:
- issue: Force of the conditional εἰ clause
  chosen_reading: 'A real conditional retained in the main text: ''if indeed you have
    tasted'''
  alternative_readings:
  - since you have tasted
  rationale: The clause likely assumes the readers' genuine experience, but the Greek
    still uses εἰ. Retaining the conditional preserves the apostolic exhortation's
    rhetorical shape without overstating the assertion. 'Indeed' signals the expected
    reality behind the condition.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'the Lord'
  chosen_reading: Render simply as 'the Lord' without specifying 'Christ' in the text
  alternative_readings:
  - the Lord (Christ)
  rationale: Within 1 Peter 2 the referent is closely tied to Jesus, yet the wording
    also intentionally echoes Psalm 34:8. Leaving the title untranslated beyond 'Lord'
    preserves the canonical resonance and avoids importing an explanatory gloss into
    the main text.
  doctrine_reference: 'κύριος default rendering: Lord; preserve theological tension
    rather than resolve it.'
