theological_decisions:
- issue: Vice-list wording and moral scope
  chosen_reading: Translate each vice concretely without expanding into doctrinal
    paraphrase.
  alternative_readings:
  - Render κακία broadly as 'wickedness'
  - Render καταλαλιάς as 'backbiting' or 'evil speaking'
  rationale: The verse is ethical exhortation, not a contested doctrinal locus. The
    chosen wording preserves the concrete moral force of the Greek list in readable
    modern English.
  doctrine_reference: Translation philosophy §§1, 5, 6
