id: 1PE.2.1
reference: 1 Peter 2:1
source:
  edition: SBLGNT
  text: Ἀποθέμενοι οὖν πᾶσαν κακίαν καὶ πάντα δόλον καὶ ⸀ὑποκρίσεις καὶ φθόνους καὶ
    πάσας καταλαλιάς,
translation:
  text: Therefore, having put away all malice and all deceit and hypocrisies and envies
    and all slanders,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having laid aside.' The Greek participle can also be rendered more formally
      as 'putting away.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all evil speaking' for 'all slanders.' The Greek refers broadly to speech
      against others.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποθέμενοι
  chosen: having put away
  alternatives:
  - having laid aside
  - putting away
  lexicon: BDAG
  rationale: Aorist middle participle, nominative plural, functioning adverbially
    before the main imperative in v.2. 'Having put away' preserves the completed/preparatory
    force better than a simple imperative-like 'put away,' while remaining natural
    in English.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding context (especially 1:22–25). 'Therefore'
    clearly signals the logical connection.
- source_word: πᾶσαν κακίαν
  chosen: all malice
  alternatives:
  - every kind of evil
  - all wickedness
  lexicon: BDAG
  rationale: κακία here denotes ill will or moral badness expressed toward others.
    'Malice' fits the vice list context better than the broader 'evil' or 'wickedness'.
- source_word: πάντα δόλον
  chosen: all deceit
  alternatives:
  - all guile
  - all treachery
  lexicon: BDAG
  rationale: δόλος refers to deceitfulness or craftiness. 'Deceit' is clear modern
    English; 'guile' is traditional but less current.
- source_word: ὑποκρίσεις
  chosen: hypocrisies
  alternatives:
  - hypocrisy
  - pretense
  lexicon: BDAG
  rationale: The plural is explicit in Greek and is retained in English to reflect
    repeated or varied acts/forms of hypocrisy.
- source_word: φθόνους
  chosen: envies
  alternatives:
  - envy
  - jealousies
  lexicon: BDAG
  rationale: The plural is explicit and parallels 'hypocrisies' and 'slanders.' 'Envies'
    preserves the list structure better than singular 'envy.'
- source_word: πάσας καταλαλιάς
  chosen: all slanders
  alternatives:
  - all evil speaking
  - all speaking against others
  - all backbiting
  lexicon: BDAG
  rationale: καταλαλιά denotes speech that defames or speaks against others. 'Slanders'
    is concise and contemporary, though broader than strictly legal defamation in
    modern usage.
