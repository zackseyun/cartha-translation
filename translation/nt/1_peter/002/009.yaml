theological_decisions:
- issue: Corporate identity language drawn from Israel's covenant titles
  chosen_reading: Retain the OT-derived collective descriptors in direct form ('chosen
    people,' 'royal priesthood,' 'holy nation') without softening them into mere metaphor.
  alternative_readings:
  - Render more abstractly to avoid perceived supersessionist implications
  rationale: The verse intentionally applies covenantal identity language to Peter's
    audience. The translation should preserve that theological force while not importing
    a broader system beyond the text itself. The wording remains close to the Greek
    and lets readers wrestle with the intertextual claim.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Implied possessor in 'a people for his own possession'
  chosen_reading: Make the possessive referent explicit with 'his' in English.
  alternative_readings:
  - Leave as 'a people for possession'
  rationale: Although αὐτοῦ is not repeated in this phrase, the context clearly points
    to God as the possessor. English normally requires the relation to be made explicit
    for clarity. This is an explicitation warranted by context, not an added doctrinal
    claim.
  doctrine_reference: 'Translation philosophy #6'
