id: 1PE.2.9
reference: 1 Peter 2:9
source:
  edition: SBLGNT
  text: Ὑμεῖς δὲ γένος ἐκλεκτόν, βασίλειον ἱεράτευμα, ἔθνος ἅγιον, λαὸς εἰς περιποίησιν,
    ὅπως τὰς ἀρετὰς ἐξαγγείλητε τοῦ ἐκ σκότους ὑμᾶς καλέσαντος εἰς τὸ θαυμαστὸν αὐτοῦ
    φῶς·
translation:
  text: But you are a chosen people, a royal priesthood, a holy nation, a people for
    his own possession, so that you may proclaim the excellencies of the one who called
    you out of darkness into his marvelous light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a chosen race.' The Greek term can denote a people, stock, or race;
      'people' is used here to avoid misleading modern ethnic overtones while preserving
      the corporate sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the praises' or 'the mighty deeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς δὲ
  chosen: But you
  alternatives:
  - But you yourselves
  - Yet you
  lexicon: BDAG
  rationale: δὲ marks contrast with the preceding description of unbelievers; the
    explicit pronoun Ὑμεῖς is emphatic. 'But you' preserves both the contrast and
    the direct address without overloading the English.
- source_word: γένος ἐκλεκτόν
  chosen: a chosen people
  alternatives:
  - a chosen race
  - an elect race
  lexicon: BDAG
  rationale: γένος can denote lineage, stock, people, or race. In contemporary English,
    'race' can mislead toward modern ethnic categories, while Peter applies covenant
    identity to a multiethnic Christian community. 'Chosen people' preserves the corporate-election
    sense and echoes OT covenant language.
- source_word: βασίλειον ἱεράτευμα
  chosen: a royal priesthood
  alternatives:
  - a kingdom of priests
  - a kingly priesthood
  lexicon: BDAG
  rationale: The phrase echoes Exodus 19:6 LXX. As a compact nominal expression, 'royal
    priesthood' is the most natural English rendering and preserves both regal and
    priestly dimensions. 'Kingdom of priests' is possible but reflects the Hebrew/Exodus
    formulation more interpretively than this Greek phrase requires here.
- source_word: ἔθνος ἅγιον
  chosen: a holy nation
  alternatives:
  - a consecrated nation
  lexicon: BDAG
  rationale: A straightforward rendering. 'Holy' preserves the covenantal and set-apart
    sense of ἅγιον better than the more explanatory 'consecrated' in the main text.
- source_word: λαὸς εἰς περιποίησιν
  chosen: a people for his own possession
  alternatives:
  - a people for possession
  - a people belonging to God
  - a treasured people
  lexicon: BDAG
  rationale: περιποίησις here conveys possession/acquisition in the sense of belonging
    specially to someone. 'For his own possession' makes the implied divine referent
    clear in context and communicates covenant belonging. 'Treasured people' is attractive
    but adds an affective nuance not explicit in the noun itself.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ὅπως introduces purpose. 'So that' is idiomatic modern English and preserves
    the purposive force.
- source_word: τὰς ἀρετὰς
  chosen: the excellencies
  alternatives:
  - the praises
  - the mighty deeds
  - the virtues
  lexicon: BDAG
  rationale: ἀρετή can denote excellence, virtue, or praiseworthy quality. In this
    context, referring to God's praiseworthy character and acts, 'excellencies' best
    preserves the breadth of the term without reducing it merely to human-style 'virtues'
    or only to acts. Because 'praises' is a traditional rendering with contextual
    merit, it is preserved in a footnote.
- source_word: ἐξαγγείλητε
  chosen: you may proclaim
  alternatives:
  - you may declare
  - you may announce abroad
  lexicon: BDAG
  rationale: The aorist subjunctive after ὅπως expresses intended action. 'Proclaim'
    captures the public declarative force of ἐξαγγέλλω better than the flatter 'declare'.
- source_word: τοῦ ... καλέσαντος
  chosen: of the one who called
  alternatives:
  - of him who called
  lexicon: BDAG
  rationale: The genitive participial construction identifies God by his action. 'The
    one who called' is natural English and preserves the personal reference without
    unnecessary repetition of 'God,' which is implied by context.
- source_word: ἐκ σκότους
  chosen: out of darkness
  alternatives:
  - from darkness
  lexicon: BDAG
  rationale: ἐκ naturally conveys movement out from. 'Out of darkness' preserves the
    metaphor of deliverance from a realm or condition.
- source_word: εἰς τὸ θαυμαστὸν αὐτοῦ φῶς
  chosen: into his marvelous light
  alternatives:
  - into his wonderful light
  - into his astonishing light
  lexicon: BDAG
  rationale: θαυμαστός denotes what is wonderful, marvelous, or astonishing. 'Marvelous
    light' is clear, dignified, and idiomatic, preserving the elevated tone of the
    verse.
