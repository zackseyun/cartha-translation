theological_decisions:
- issue: Force of ὑπὲρ ὑμῶν in relation to Christ's suffering
  chosen_reading: Rendered 'for you' with representative/benefactive breadth preserved
  alternative_readings:
  - on your behalf
  - for your sake
  - in your place
  rationale: The verse clearly states that Messiah suffered ὑπὲρ the readers, but
    in this immediate context Peter emphasizes exemplary suffering leading believers
    to follow him. Rendering 'for you' preserves the theological depth, including
    possible substitutionary resonance, without importing a more specific atonement
    formula not explicit in this clause alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
