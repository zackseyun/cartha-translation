id: 1PE.2.21
reference: 1 Peter 2:21
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ ἐκλήθητε, ὅτι καὶ Χριστὸς ἔπαθεν ὑπὲρ ⸀ὑμῶν, ὑμῖν ὑπολιμπάνων
    ὑπογραμμὸν ἵνα ἐπακολουθήσητε τοῖς ἴχνεσιν αὐτοῦ·
translation:
  text: For you were called to this, because the Messiah also suffered for you, leaving
    you an example so that you might follow in his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pattern' or 'a copybook'—the Greek term refers to a model set before
      learners to trace.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  chosen: to this
  alternatives:
  - for this
  - for this purpose
  lexicon: BDAG
  rationale: Idiomatic expression pointing back to the preceding call to endure unjust
    suffering; 'to this' is natural English while preserving the telic force of εἰς.
- source_word: ἐκλήθητε
  chosen: you were called
  alternatives:
  - you were summoned
  lexicon: BDAG
  rationale: Passive of καλέω in a theological context commonly denotes divine calling.
    'Called' preserves both the verbal link and theological resonance without over-specifying
    effectual-calling categories.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the calling. 'Because' makes
    the causal relation clear in modern English.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the title underscores Jesus as the
    anointed exemplar in suffering.
- source_word: ἔπαθεν
  chosen: suffered
  alternatives:
  - suffered death
  - underwent suffering
  lexicon: BDAG
  rationale: The aorist of πάσχω is best rendered simply 'suffered'; the object or
    manner is not specified in this verse and should not be expanded.
- source_word: ὑπὲρ ὑμῶν
  chosen: for you
  alternatives:
  - on your behalf
  - for your sake
  lexicon: BDAG
  rationale: ὑπέρ with genitive here naturally conveys benefactive representation.
    'For you' is concise and preserves the possibility of substitutionary nuance without
    forcing a narrower doctrinal reading in this verse alone.
- source_word: ὑμῖν ὑπολιμπάνων
  chosen: leaving you
  alternatives:
  - leaving behind for you
  lexicon: BDAG
  rationale: The participle modifies Messiah and takes ὑμῖν as the indirect object.
    'Leaving you' is idiomatic and retains the sense of something bequeathed as a
    pattern.
- source_word: ὑπογραμμὸν
  chosen: an example
  alternatives:
  - a pattern
  - a copybook
  - a model
  lexicon: BDAG
  rationale: The noun can denote a writing-copy set before learners to trace. 'Example'
    communicates the metaphor clearly in contemporary English; the more concrete pedagogical
    nuance is worth preserving in a footnote.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose. 'So that' is natural modern English and preserves the
    purposive force.
- source_word: ἐπακολουθήσητε
  chosen: you might follow
  alternatives:
  - you may follow closely
  - you should follow
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended result/purpose. 'Might
    follow' preserves the subjunctive nuance without sounding wooden.
- source_word: τοῖς ἴχνεσιν αὐτοῦ
  chosen: in his steps
  alternatives:
  - his footsteps
  - his tracks
  lexicon: BDAG
  rationale: Idiomatic English equivalent for following someone's path of conduct.
    'In his steps' preserves the metaphor and reads naturally.
