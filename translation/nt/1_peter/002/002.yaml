theological_decisions:
- issue: Meaning of λογικός in the metaphor 'milk'
  chosen_reading: Rendered 'spiritual' in the main text
  alternative_readings:
  - rational
  - reasonable
  rationale: The verse uses metaphorical milk for Christian nourishment. 'Spiritual'
    best communicates the intended contrast with literal milk and fits the broader
    Petrine context of new birth and growth. Because λογικός can also be rendered
    'rational'/'reasonable' (as in some translations and in Rom 12:1), the alternative
    is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Force of 'into salvation'
  chosen_reading: Retained directional language without softening it to a purely present
    or purely future doctrinal formula
  alternative_readings:
  - that you may grow up in your salvation
  - that you may grow unto salvation
  rationale: The Greek expresses movement toward salvation's consummation. The translation
    preserves this tension and avoids importing a denominationally loaded account
    of sanctification or assurance.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives
    unless the Greek unambiguously supports one reading
