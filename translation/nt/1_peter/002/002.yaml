id: 1PE.2.2
reference: 1 Peter 2:2
source:
  edition: SBLGNT
  text: ὡς ἀρτιγέννητα βρέφη τὸ λογικὸν ἄδολον γάλα ἐπιποθήσατε, ἵνα ἐν αὐτῷ αὐξηθῆτε
    ⸂εἰς σωτηρίαν⸃,
translation:
  text: Like newborn infants, long for the pure, spiritual milk, so that by it you
    may grow into salvation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pure, rational milk' or 'the pure, reasonable milk.' The Greek adjective
      can carry the sense of what pertains to reason or the inner life; here it likely
      refers to spiritual nourishment rather than literal milk.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: Like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces a comparison rather than identity; 'like' is idiomatic modern
    English for the simile.
- source_word: ἀρτιγέννητα βρέφη
  chosen: newborn infants
  alternatives:
  - newborn babies
  - newly born infants
  lexicon: BDAG
  rationale: The adjective ἀρτιγέννητα intensifies recent birth ('just/newly born'),
    and βρέφη denotes infants/babies. 'Newborn infants' is natural and preserves the
    image.
- source_word: τὸ λογικὸν
  chosen: spiritual
  alternatives:
  - rational
  - reasonable
  lexicon: BDAG
  rationale: λογικός can mean 'rational' or 'pertaining to the inner/reasoned life.'
    In this context modifying 'milk' metaphorically, 'spiritual' best conveys the
    non-literal, inward nourishment intended, while remaining accessible. The more
    literal alternative is preserved in a footnote because the term is interpretively
    significant.
- source_word: ἄδολον
  chosen: pure
  alternatives:
  - unadulterated
  - without deceit
  lexicon: BDAG
  rationale: The adjective means unadulterated, pure, free from deceitful mixture.
    'Pure' is concise and idiomatic with 'milk' in English.
- source_word: γάλα
  chosen: milk
  lexicon: BDAG
  rationale: Retains the metaphor of nourishment central to the verse.
- source_word: ἐπιποθήσατε
  chosen: long for
  alternatives:
  - crave
  - yearn for
  - desire eagerly
  lexicon: BDAG
  rationale: Aorist imperative calling for earnest desire. 'Long for' is strong without
    sounding colloquial; 'crave' is possible but can sound overly idiomatic.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purpose clause; 'so that' is natural modern English.
- source_word: ἐν αὐτῷ
  chosen: by it
  alternatives:
  - in it
  - through it
  lexicon: BDAG
  rationale: The pronoun is neuter singular, referring back to the milk. With αὐξάνω
    in English, 'grow by it' communicates means/instrument more naturally than 'grow
    in it,' while preserving the connection to the milk.
- source_word: αὐξηθῆτε
  chosen: you may grow
  alternatives:
  - you may be caused to grow
  - you may grow up
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα. In English the passive nuance is
    not naturally foregrounded here; 'you may grow' communicates the intended result.
- source_word: εἰς σωτηρίαν
  chosen: into salvation
  alternatives:
  - unto salvation
  - for salvation
  lexicon: BDAG
  rationale: εἰς marks goal/result. 'Into salvation' preserves the directional force
    better than the traditional 'unto salvation' while avoiding the implication that
    salvation is merely future-earned. The phrase expresses growth toward the full
    realization of salvation.
