theological_decisions:
- issue: Meaning of 'the day of visitation' (ἡμέρᾳ ἐπισκοπῆς)
  chosen_reading: Retain the broader phrase 'the day of visitation' without specifying
    whether the visitation is primarily for judgment, salvation, or conversion.
  alternative_readings:
  - the day when God visits in judgment
  - the day when God visits in mercy leading to conversion
  rationale: 'The phrase can carry either positive or negative connotations in biblical
    usage, and here Peter may intentionally preserve that tension: the observers''
    response to believers'' good works results in glorifying God when he visits. The
    translation should not collapse the ambiguity into one doctrinally narrower option.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
