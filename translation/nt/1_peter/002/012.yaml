id: 1PE.2.12
reference: 1 Peter 2:12
source:
  edition: SBLGNT
  text: τὴν ἀναστροφὴν ὑμῶν ⸂ἐν τοῖς ἔθνεσιν ἔχοντες καλήν⸃, ἵνα, ἐν ᾧ καταλαλοῦσιν
    ὑμῶν ὡς κακοποιῶν, ἐκ τῶν καλῶν ἔργων ⸀ἐποπτεύοντες δοξάσωσι τὸν θεὸν ἐν ἡμέρᾳ
    ἐπισκοπῆς.
translation:
  text: Keep your conduct among the Gentiles honorable, so that, in what they slander
    you as evildoers, by observing your good works they may glorify God on the day
    of visitation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the matter in which they speak against you as evildoers.'
    reason: lexical_alternative
  - marker: c
    text: '''Day of visitation'' can refer to a time when God visits people, whether
      for mercy or for judgment.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναστροφή
  chosen: conduct
  alternatives:
  - way of life
  - behavior
  lexicon: BDAG
  rationale: In Petrine usage the term refers to one's manner of life, not merely
    isolated actions. 'Conduct' is concise, natural English and preserves the ethical
    sense.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  - among the pagans
  lexicon: BDAG
  rationale: ἔθνη in this context contrasts believers with non-Jewish surrounding
    peoples. 'Gentiles' is the most direct rendering; 'pagans' is interpretive and
    more pejorative than the Greek requires.
- source_word: ἔχοντες καλήν
  chosen: Keep ... honorable
  alternatives:
  - having ... good
  - maintain ... excellent
  lexicon: BDAG
  rationale: The participial construction is idiomatically rendered as an exhortation
    to maintain a certain quality. καλός here carries the sense of morally beautiful
    or honorable, stronger than merely 'good' in English.
- source_word: καταλαλοῦσιν
  chosen: they slander
  alternatives:
  - they speak against
  - they malign
  lexicon: BDAG
  rationale: The verb denotes hostile speech against someone. 'Slander' captures the
    defamatory force better than the more neutral 'speak against.'
- source_word: κακοποιῶν
  chosen: evildoers
  alternatives:
  - wrongdoers
  - criminals
  lexicon: BDAG
  rationale: The noun labels them as people who do evil. 'Evildoers' is a close and
    traditional equivalent without narrowing the charge to legal criminality.
- source_word: ἐποπτεύοντες
  chosen: by observing
  alternatives:
  - seeing
  - carefully observing
  lexicon: BDAG
  rationale: The participle suggests attentive observation rather than a mere glance.
    'By observing' communicates means and preserves the participial relation to the
    main verb.
- source_word: καλῶν ἔργων
  chosen: good works
  alternatives:
  - good deeds
  lexicon: BDAG
  rationale: This is a standard ethical expression in early Christian discourse. 'Good
    works' is clear, established, and not misleading here.
- source_word: δοξάσωσι τὸν θεόν
  chosen: they may glorify God
  alternatives:
  - they may give glory to God
  lexicon: BDAG
  rationale: A straightforward rendering of the purpose clause with aorist subjunctive
    after ἵνα.
- source_word: ἐν ἡμέρᾳ ἐπισκοπῆς
  chosen: on the day of visitation
  alternatives:
  - on the day of his visitation
  - on the day of inspection
  - on the day when he visits
  lexicon: BDAG
  rationale: ἐπισκοπή can denote a divine visitation, whether for mercy or judgment.
    'Day of visitation' preserves the biblical-theological ambiguity and avoids over-resolving
    whether the emphasis is salvation, judgment, or both. 'His' is not explicit in
    Greek, so it is omitted from the main text.
- source_word: ἐν ᾧ
  chosen: in what
  alternatives:
  - wherein
  - when
  - in the matter in which
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic and refers to the sphere or matter in
    which the slander occurs. 'In what' preserves the connection without forcing a
    temporal reading.
