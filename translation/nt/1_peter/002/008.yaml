id: 1PE.2.8
reference: 1 Peter 2:8
source:
  edition: SBLGNT
  text: καὶ λίθος προσκόμματος καὶ πέτρα σκανδάλου· οἳ προσκόπτουσιν τῷ λόγῳ ἀπειθοῦντες·
    εἰς ὃ καὶ ἐτέθησαν.
translation:
  text: and, “a stone of stumbling and a rock of offense.” They stumble because they
    disobey the word, and to this they were also appointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a rock of stumbling.' The Greek σκάνδαλον can denote a cause of offense
      or a cause of falling.
    reason: lexical_alternative
  - marker: b
    text: Or 'They stumble at the word, being disobedient.' The Greek participle may
      be rendered more literally as 'being disobedient.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for which they were also appointed' or 'to which they were also appointed.'
      The clause is syntactically compressed, and interpreters differ on whether the
      appointment refers to their stumbling, their disobedience, or the resulting
      judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: λίθος προσκόμματος
  chosen: a stone of stumbling
  alternatives:
  - a stumbling stone
  - a stone that causes stumbling
  lexicon: BDAG
  rationale: Genitive construction is rendered naturally in English while preserving
    the metaphor from Isaiah 8:14. 'Stone of stumbling' is a recognizable biblical
    phrase and keeps the concrete image.
- source_word: πέτρα σκανδάλου
  chosen: a rock of offense
  alternatives:
  - a rock of stumbling
  - a rock that causes offense
  lexicon: BDAG
  rationale: σκάνδαλον can denote a cause for falling, offense, or stumbling. 'Rock
    of offense' preserves the traditional distinction between πρόσκομμα and σκάνδαλον
    while remaining understandable. The metaphorical sense is retained rather than
    flattened.
- source_word: προσκόπτουσιν
  chosen: they stumble
  alternatives:
  - they strike against
  - they take offense
  lexicon: BDAG
  rationale: The verb matches the preceding stumbling imagery and is the most natural
    English rendering in context.
- source_word: τῷ λόγῳ
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος here likely refers to the proclaimed gospel word already mentioned
    in the context (1 Pet 1:23–25; 2:7). 'The word' preserves the lexical link and
    biblical idiom; 'message' is possible but less textually transparent.
- source_word: ἀπειθοῦντες
  chosen: because they disobey
  alternatives:
  - because they refuse to believe
  - being disobedient
  lexicon: BDAG
  rationale: ἀπειθέω can carry the sense of disobeying or refusing to be persuaded/believe.
    In Petrine usage, disobedience to the proclaimed word includes unbelief, but 'disobey'
    best preserves the moral-volitional force without narrowing it to mere intellectual
    disbelief.
- source_word: εἰς ὃ
  chosen: to this
  alternatives:
  - for which
  - for this purpose
  lexicon: BDAG
  rationale: The phrase is syntactically compressed and somewhat ambiguous. 'To this'
    is concise and preserves the referential ambiguity better than a more interpretive
    expansion.
- source_word: ἐτέθησαν
  chosen: they were also appointed
  alternatives:
  - they were destined
  - they were assigned
  - they were placed
  lexicon: BDAG
  rationale: Passive of τίθημι here conveys being set or appointed. 'Appointed' is
    idiomatic and preserves the passive divine implication without over-specifying
    a theological system. 'Destined' is possible but more interpretively loaded in
    English.
