theological_decisions:
- issue: Scope of the appointment in εἰς ὃ καὶ ἐτέθησαν
  chosen_reading: The text is rendered to preserve that they were appointed 'to this,'
    with the referent left somewhat open, most naturally connected to their stumbling
    in relation to the word.
  alternative_readings:
  - appointed to disobey
  - appointed to stumble
  - appointed to the consequence of stumbling
  rationale: This clause is theologically disputed, especially regarding divine appointment
    and human responsibility. The Greek does not require the translator to resolve
    the full scope of the appointment beyond the immediate antecedent structure. The
    chosen rendering preserves the tension rather than forcing a specifically Reformed
    or non-Reformed interpretation, in keeping with the doctrine statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
