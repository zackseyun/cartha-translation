id: 1PE.2.18
reference: 1 Peter 2:18
source:
  edition: SBLGNT
  text: Οἱ οἰκέται ὑποτασσόμενοι ἐν παντὶ φόβῳ τοῖς δεσπόταις, οὐ μόνον τοῖς ἀγαθοῖς
    καὶ ἐπιεικέσιν ἀλλὰ καὶ τοῖς σκολιοῖς.
translation:
  text: Household servants, submitting yourselves to your masters with all respect,
    not only to the good and gentle but also to the crooked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'household slaves.' The Greek οἰκέται refers specifically to domestic
      dependents within a household.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in all fear'; here the sense is respectful deference.
    reason: lexical_alternative
  - marker: c
    text: Or 'harsh' or 'unjust'; the Greek literally means 'crooked' or 'twisted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέται
  chosen: household servants
  alternatives:
  - household slaves
  - servants
  lexicon: BDAG
  rationale: οἰκέτης refers specifically to a domestic or household servant/slave
    rather than a general servant. 'Household servants' preserves the domestic setting
    and avoids importing the broader term δοῦλοι, while still signaling a subordinate
    bonded role. 'Household slaves' is possible, but the term here is more specifically
    domestic than the more overtly bonded δοῦλος.
- source_word: ὑποτασσόμενοι
  chosen: submitting yourselves
  alternatives:
  - be subject
  - be submissive
  lexicon: BDAG
  rationale: The participle functions imperativally in context, continuing the exhortation.
    'Submitting yourselves' preserves the middle/passive participial form and the
    voluntary posture implied by the paraenetic context. 'Be subject' is also viable
    but slightly less transparent in contemporary English.
- source_word: ἐν παντὶ φόβῳ
  chosen: with all respect
  alternatives:
  - in all fear
  - with all reverence
  lexicon: BDAG
  rationale: φόβος can mean fear, reverence, or respect depending on context. Here
    a literal 'fear' in English could imply terror of masters, whereas the phrase
    more naturally denotes a posture of respectful deference within the household
    code. 'With all respect' communicates the sense in readable modern English while
    remaining faithful to the semantic range.
- source_word: δεσπόταις
  chosen: masters
  alternatives:
  - owners
  - lords
  lexicon: BDAG
  rationale: δεσπότης denotes one who exercises authority over household servants/slaves.
    'Masters' best matches the social relation in this context. 'Owners' is too reductionistic,
    and 'lords' risks confusion with divine or christological usage of κύριος.
- source_word: ἀγαθοῖς
  chosen: good
  alternatives:
  - kind
  lexicon: BDAG
  rationale: ἀγαθός broadly means good. Retaining 'good' keeps the moral evaluation
    straightforward and pairs naturally with ἐπιεικής as a second descriptor.
- source_word: ἐπιεικέσιν
  chosen: gentle
  alternatives:
  - considerate
  - fair
  lexicon: BDAG
  rationale: ἐπιεικής often conveys gentleness, forbearance, or reasonableness. 'Gentle'
    is concise, idiomatic, and preserves the humane quality contrasted with σκολιοῖς.
- source_word: σκολιοῖς
  chosen: crooked
  alternatives:
  - harsh
  - unjust
  - perverse
  lexicon: BDAG
  rationale: σκολιός literally means crooked or twisted and can metaphorically describe
    morally warped or unfair persons. 'Crooked' preserves the metaphor and avoids
    over-narrowing the term to mere severity ('harsh'). Because 'crooked' may sound
    unusual in this context, an alternative is preserved in a footnote.
