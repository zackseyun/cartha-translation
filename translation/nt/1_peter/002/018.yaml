theological_decisions:
- issue: Rendering a household-status term in a way that neither softens nor overstates
    the social condition
  chosen_reading: Use 'household servants' for οἰκέται and 'masters' for δεσπόταις
  alternative_readings:
  - household slaves ... masters
  - servants ... masters
  rationale: The verse addresses a specific domestic dependent class. Following the
    translation philosophy, the rendering should reflect the original social relation
    without flattening it into generic service or importing a different Greek term.
    'Household servants' best captures the domestic scope of οἰκέται while 'masters'
    accurately reflects δεσπόταις.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5; Contested terms table
    on δοῦλος as context-dependent servant/slave
- issue: Whether φόβος should be rendered as 'fear' or with a contextual equivalent
  chosen_reading: Render ἐν παντὶ φόβῳ as 'with all respect'
  alternative_readings:
  - in all fear
  - with all reverence
  rationale: The text exhorts a posture of deferential submission, not necessarily
    emotional terror. 'With all respect' preserves the ethical force in contemporary
    English and avoids a misleading implication that Peter commands servile dread
    as such.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
