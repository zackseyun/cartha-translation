theological_decisions:
- issue: Intertextual echo of Isaiah 53:9 in describing the sinlessness and truthfulness
    of Jesus
  chosen_reading: Retain wording close to the Greek with 'committed no sin' and 'deceit
    found in his mouth' to preserve the Isaianic resonance without expanding the claim
    beyond the text.
  alternative_readings:
  - More interpretive renderings such as 'he never sinned, and he never spoke deceitfully'
  rationale: The verse presents Christ's sinlessness in language echoing Isaiah. A
    relatively formal rendering preserves both the theological force and the OT allusion
    while avoiding paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
