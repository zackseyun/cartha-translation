id: 1PE.2.22
reference: 1 Peter 2:22
source:
  edition: SBLGNT
  text: ὃς ἁμαρτίαν οὐκ ἐποίησεν οὐδὲ εὑρέθη δόλος ἐν τῷ στόματι αὐτοῦ·
translation:
  text: who committed no sin, nor was deceit found in his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guile'; the Greek term denotes deceit, fraud, or treachery.
    reason: lexical_alternative
  - marker: b
    text: This wording echoes Isaiah 53:9.
    reason: cross_reference
lexical_decisions:
- source_word: ὃς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to Christ in the preceding verse; simple
    'who' is natural English and preserves the relative connection without adding
    emphasis not present in the Greek.
- source_word: ἁμαρτίαν
  chosen: sin
  lexicon: BDAG
  rationale: 'Standard rendering of ἁμαρτία. Singular is retained in English as a
    category term: ''no sin.'''
- source_word: οὐκ ἐποίησεν
  chosen: committed no
  alternatives:
  - did not do
  - did not commit
  lexicon: BDAG
  rationale: ποιέω literally means 'do/make,' but with ἁμαρτίαν the idiomatic sense
    is 'commit sin.' 'Committed no sin' is both accurate and idiomatic in English.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: Connects the second negative clause smoothly in English while preserving
    the coordinate negation.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - was discovered
  - was seen
  lexicon: BDAG
  rationale: Aorist passive of εὑρίσκω is best represented by the passive 'was found.'
    This preserves the scriptural allusion and avoids over-interpretation of agency.
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  - deception
  lexicon: BDAG
  rationale: '''Deceit'' is clear modern English and captures the sense of deliberate
    falsehood or fraud. ''Guile'' is traditional but archaic for the target audience.'
- source_word: ἐν τῷ στόματι αὐτοῦ
  chosen: in his mouth
  alternatives:
  - on his lips
  lexicon: BDAG
  rationale: A formally close rendering that preserves the bodily metaphor and the
    likely echo of Isaiah 53:9. 'On his lips' is possible but less direct to the Greek.
