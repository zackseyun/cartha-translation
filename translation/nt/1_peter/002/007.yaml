theological_decisions:
- issue: Meaning of ἡ τιμή in relation to believers and Christ the stone
  chosen_reading: The clause means that honor belongs to believers, in contrast to
    the shame of unbelief.
  alternative_readings:
  - The preciousness is for you who believe, referring primarily to Christ as precious
    to believers.
  rationale: The Greek phrase ὑμῖν οὖν ἡ τιμή most naturally states that 'the honor'
    is for believers. This also fits the broader Isaianic context of not being put
    to shame. The alternative, that Christ is 'precious' to believers, is possible
    because of the preceding verse, but it is less direct here and is preserved in
    a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Rendering of κεφαλὴ γωνίας
  chosen_reading: A transparent rendering of the metaphor is kept in the main text.
  alternative_readings:
  - cornerstone
  - chief cornerstone
  rationale: The phrase is christologically significant, but the translation should
    not flatten the metaphor into a single architectural interpretation where the
    Greek itself is more literal. The familiar interpretive equivalent is preserved
    in a footnote for readers.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
