id: 1PE.2.7
reference: 1 Peter 2:7
source:
  edition: SBLGNT
  text: ὑμῖν οὖν ἡ τιμὴ τοῖς πιστεύουσιν· ⸀ἀπιστοῦσιν δὲ ⸀λίθος ὃν ἀπεδοκίμασαν οἱ
    οἰκοδομοῦντες οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας
translation:
  text: Therefore, for you who believe is the honor; but for those who do not believe,
    “The stone that the builders rejected—this one has become the head of the corner.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the preciousness is for you who believe,' that is, the stone is precious
      to believers.
    reason: alternative_reading
  - marker: b
    text: Or 'those who disobey'; the verb can carry the sense of refusing belief
      and so acting in disobedience.
    reason: lexical_alternative
  - marker: c
    text: Traditionally, 'the cornerstone' or 'the chief cornerstone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμή
  chosen: honor
  alternatives:
  - value
  - preciousness
  lexicon: BDAG
  rationale: τιμή can denote honor, value, or preciousness. In this context, following
    the citation of the stone as 'chosen and precious' in the previous verse and the
    contrast with unbelievers, the sense is that honor belongs to believers. 'Honor'
    best preserves the concise Greek expression ὑμῖν ... ἡ τιμή without over-interpreting
    it as either the stone's preciousness alone or believers' subjective esteem.
- source_word: τοῖς πιστεύουσιν
  chosen: for you who believe
  alternatives:
  - to you who believe
  - for the believing
  lexicon: BDAG
  rationale: The dative participle is linked with ὑμῖν and naturally rendered personally.
    'For you who believe' preserves both the direct address and the participial force.
- source_word: ἀπιστοῦσιν
  chosen: those who do not believe
  alternatives:
  - the unbelieving
  - those who disobey
  lexicon: BDAG
  rationale: ἀπιστέω primarily means to disbelieve or be unfaithful. In this immediate
    contrast with πιστεύουσιν, 'those who do not believe' is the clearest and most
    contextually parallel rendering. Because the term can shade toward disobedience
    in some contexts, that alternative is preserved in a footnote rather than imported
    into the main text.
- source_word: λίθος
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: '''Stone'' is the standard rendering and matches the building metaphor
    and the Psalm citation underlying the verse.'
- source_word: ἀπεδοκίμασαν
  chosen: rejected
  alternatives:
  - disqualified
  - tested and rejected
  lexicon: BDAG
  rationale: The verb means to reject after examination or evaluation. 'Rejected'
    is idiomatic and standard in this citation context.
- source_word: οἰκοδομοῦντες
  chosen: builders
  alternatives:
  - those building
  lexicon: BDAG
  rationale: Substantival participle in a construction metaphor; 'builders' is natural
    English and preserves the image.
- source_word: κεφαλὴν γωνίας
  chosen: the head of the corner
  alternatives:
  - the cornerstone
  - the chief cornerstone
  lexicon: BDAG
  rationale: The Greek is literally 'head of the corner.' While 'cornerstone' is traditional
    and likely conveys the architectural sense, the more transparent rendering 'head
    of the corner' preserves the wording of the citation and avoids prematurely narrowing
    the image. The common interpretive rendering is preserved in a footnote.
