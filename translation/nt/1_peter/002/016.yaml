- issue: Rendering δοῦλοι in relation to Christian identity
  chosen_reading: slaves of God
  alternative_readings:
  - servants of God
  - bondservants of God
  rationale: The verse intentionally juxtaposes Christian freedom with total belonging
    to God. Following the project's contested-terms guidance, the bonded nature is
    theologically salient here, so 'slaves' best preserves the tension rather than
    softening it.
