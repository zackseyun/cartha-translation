id: 1PE.2.16
reference: 1 Peter 2:16
source:
  edition: SBLGNT
  text: ὡς ἐλεύθεροι, καὶ μὴ ὡς ἐπικάλυμμα ἔχοντες τῆς κακίας τὴν ἐλευθερίαν, ἀλλ’
    ὡς ⸂θεοῦ δοῦλοι⸃.
translation:
  text: as free people, and not using freedom as a cover for evil, but as slaves of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants of God.' The Greek word can denote either, but 'slaves' is
      used here to preserve the stronger contrast with 'free people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύθεροι
  chosen: free people
  alternatives:
  - free men
  - those who are free
  lexicon: BDAG
  rationale: The adjective is nominative masculine plural and refers to the audience
    collectively. 'Free people' preserves the social-legal sense of being free while
    avoiding an unnecessarily male-specific English form where the referent is mixed.
    This fits the gender-accurate principle by matching representative force rather
    than woodenly preserving masculine morphology.
- source_word: ἐπικάλυμμα
  chosen: cover
  alternatives:
  - pretext
  - cloak
  - covering
  lexicon: BDAG
  rationale: The noun denotes a covering or veil. 'Cover' is natural modern English
    and preserves the metaphor of something used to conceal wrongdoing. 'Pretext'
    captures the sense but loses the concrete image; 'cloak' is traditional but less
    contemporary.
- source_word: ἔχοντες ... τὴν ἐλευθερίαν
  chosen: using freedom
  alternatives:
  - having freedom
  - holding freedom as
  lexicon: BDAG
  rationale: Although literally 'having freedom as a cover,' idiomatic English expresses
    the participial construction as 'using freedom as a cover.' This preserves the
    instrumental force without awkwardness and stays within optimal equivalence rather
    than paraphrase.
- source_word: κακίας
  chosen: evil
  alternatives:
  - wickedness
  - malice
  lexicon: BDAG
  rationale: κακία can denote badness, wickedness, or malice. In this context Peter
    warns against using Christian liberty to conceal morally wrong behavior broadly,
    so 'evil' is the clearest general rendering. 'Malice' is too narrow here.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος should be rendered 'slave' where the
    bonded nature is salient. Here the contrast is between being socially 'free' and
    yet belonging wholly to God; the paradox depends on the stronger term. 'Servants'
    would soften the force of the contrast.
- source_word: θεοῦ δοῦλοι
  chosen: slaves of God
  alternatives:
  - God's slaves
  - servants of God
  lexicon: BDAG
  rationale: 'The genitive is possessive/relational: those who belong to God as his
    slaves. ''Slaves of God'' is clear and preserves the rhetorical contrast with
    ''free people.'''
