theological_decisions:
- issue: Rendering ἐπίσκοπος as a Christological title
  chosen_reading: Overseer
  alternative_readings:
  - Guardian
  - Bishop
  rationale: The verse applies both ποιμήν and ἐπίσκοπος to Christ. 'Overseer' preserves
    the title's meaning while avoiding denominationally loaded office language ('Bishop')
    and avoiding a more interpretive paraphrase ('Guardian'). This maintains historic
    orthodoxy without importing later church polity into the verse.
  doctrine_reference: Affirmations; Translation philosophy §§1, 5, 6
- issue: Voice nuance of ἐπεστράφητε
  chosen_reading: you have returned
  alternative_readings:
  - you were turned back
  rationale: The passive form could be pressed as divine agency ('you were turned
    back'), but the Greek verb often functions in a middle/intransitive sense. Rendering
    it 'have returned' preserves readable English and avoids over-resolving the interplay
    between divine action and human response.
  doctrine_reference: Translation philosophy §3
