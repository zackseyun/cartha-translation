id: 1PE.2.25
reference: 1 Peter 2:25
source:
  edition: SBLGNT
  text: ἦτε γὰρ ὡς πρόβατα ⸀πλανώμενοι, ἀλλὰ ἐπεστράφητε νῦν ἐπὶ τὸν ποιμένα καὶ ἐπίσκοπον
    τῶν ψυχῶν ὑμῶν.
translation:
  text: For you were like sheep going astray, but now you have returned to the Shepherd
    and Overseer of your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wandering' or 'being led astray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have turned back'; the Greek form may also be understood with passive
      nuance, 'you were turned back.'
    reason: alternative_reading
  - marker: c
    text: Or 'Guardian'; traditionally, 'Bishop.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦτε γὰρ
  chosen: For you were
  alternatives:
  - because you were
  - for you had been
  lexicon: BDAG
  rationale: γάρ is naturally rendered 'for' here, linking this verse as the ground
    for the previous statement. ἦτε is imperfect, describing their former state.
- source_word: ὡς πρόβατα
  chosen: like sheep
  alternatives:
  - as sheep
  lexicon: BDAG
  rationale: ὡς marks comparison. πρόβατα is plural 'sheep'; English idiom prefers
    the unchanged plural form 'sheep'.
- source_word: πλανώμενοι
  chosen: going astray
  alternatives:
  - wandering
  - being led astray
  lexicon: BDAG
  rationale: The participle from πλανάω can be intransitive ('go astray, wander')
    or passive-like ('be led astray'). In this pastoral/sheep image and in continuity
    with Isaianic background, 'going astray' best preserves the metaphor without over-specifying
    agency.
- source_word: ἀλλὰ ἐπεστράφητε νῦν
  chosen: but now you have returned
  alternatives:
  - but now you have turned back
  - but now you were turned
  lexicon: BDAG
  rationale: ἀλλά marks strong contrast. The aorist passive ἐπεστράφητε can be rendered
    in English with active sense 'returned/turned back' in idiomatic middle-passive
    usage. 'Have returned' communicates the completed change with present relevance,
    and 'now' is placed naturally in English.
- source_word: ἐπὶ τὸν ποιμένα
  chosen: to the Shepherd
  alternatives:
  - to the shepherd
  - to the Pastor
  lexicon: BDAG
  rationale: ποιμήν means 'shepherd.' The article is retained with capitalization
    because the referent is clearly Christ as a title in this context, not a generic
    shepherd.
- source_word: καὶ ἐπίσκοπον
  chosen: and Overseer
  alternatives:
  - and Guardian
  - and Bishop
  lexicon: BDAG
  rationale: ἐπίσκοπος literally denotes one who watches over/cares for others. 'Overseer'
    is the most transparent lexical rendering in modern English. 'Bishop' is avoided
    because it imports later ecclesiastical office associations not required by the
    text; 'Guardian' is interpretive and less formally tied to the Greek root.
- source_word: τῶν ψυχῶν ὑμῶν
  chosen: of your souls
  alternatives:
  - of your lives
  - of you
  lexicon: BDAG
  rationale: ψυχή can mean soul, life, self, or person depending on context. Here
    'of your souls' preserves the traditional and lexical sense in a context of spiritual
    care, without denying the fuller personhood implied by ψυχή.
