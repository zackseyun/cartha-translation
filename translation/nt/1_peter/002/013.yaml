theological_decisions:
- issue: Nature of civil authority in κτίσει
  chosen_reading: Rendered as 'human institution' rather than 'ordinance of man' or
    'human creature.'
  alternative_readings:
  - every ordinance of man
  - every human creature
  rationale: The verse addresses submission to civic structures, clarified by the
    following references to king and governors. Translating κτίσις as 'institution'
    avoids the misleading sense that believers submit to every individual person ('creature')
    and avoids implying merely human legitimacy apart from God's sovereignty. The
    text itself emphasizes the human/social form of the institution while grounding
    submission 'for the Lord’s sake.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of κύριον
  chosen_reading: Left as 'Lord' without specifying 'Jesus' or 'God.'
  alternative_readings:
  - Jesus
  - God
  rationale: The Greek says only 'the Lord.' Preserving the title maintains the text's
    theological breadth and avoids importing a specificity not explicit in the verse.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
