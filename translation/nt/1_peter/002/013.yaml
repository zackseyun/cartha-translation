id: 1PE.2.13
reference: 1 Peter 2:13
source:
  edition: SBLGNT
  text: ⸀Ὑποτάγητε πάσῃ ἀνθρωπίνῃ κτίσει διὰ τὸν κύριον· εἴτε βασιλεῖ ὡς ὑπερέχοντι,
translation:
  text: Submit yourselves to every human institution for the Lord’s sake, whether
    to a king as one in authority,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every human creation,' traditionally 'every ordinance of man.' Here
      the phrase refers to human civic institutions or authorities, as the following
      references to the king and governors show.
    reason: lexical_alternative
  - marker: b
    text: Or 'as supreme.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑποτάγητε
  chosen: Submit yourselves
  alternatives:
  - Be subject
  - Subject yourselves
  lexicon: BDAG
  rationale: Aorist passive imperative of ὑποτάσσω functioning as a middle/passive
    command. 'Submit yourselves' is idiomatic modern English and preserves the exhortational
    force without sounding overly wooden.
- source_word: πάσῃ
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: With singular dative and κτίσει, πᾶς is best rendered distributively
    as 'every' rather than 'all.'
- source_word: ἀνθρωπίνῃ
  chosen: human
  alternatives:
  - human-made
  - of man
  lexicon: BDAG
  rationale: The adjective marks the institution/order as belonging to human society.
    'Human' is the most natural concise rendering.
- source_word: κτίσει
  chosen: institution
  alternatives:
  - creation
  - creature
  - authority
  - ordinance
  lexicon: BDAG
  rationale: Although κτίσις often means 'creation,' in this context with ἀνθρωπίνῃ
    and followed by examples of king and governors, it refers to a humanly ordered
    civic structure or institution. 'Institution' best captures the sense in context
    without importing specifically divine establishment language.
- source_word: διὰ τὸν κύριον
  chosen: for the Lord’s sake
  alternatives:
  - because of the Lord
  - for the sake of the Lord
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or motive. 'For the Lord’s
    sake' is idiomatic and preserves that Christian submission is grounded in relation
    to the Lord.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In Petrine
    context this most naturally refers to the Lord Jesus or the Lord in Christian
    confession without needing to over-specify in translation.
- source_word: εἴτε
  chosen: whether
  alternatives:
  - either to
  lexicon: BDAG
  rationale: Introduces the first member of a whether/or construction continued in
    the next verse.
- source_word: βασιλεῖ
  chosen: a king
  alternatives:
  - the king
  - emperor
  lexicon: BDAG
  rationale: βασιλεύς is lexically 'king.' Although in Roman imperial context 'emperor'
    is historically plausible, the Greek term itself is broader; 'a king' preserves
    the lexical form and fits the generic framing of civic authority.
- source_word: ὡς ὑπερέχοντι
  chosen: as one in authority
  alternatives:
  - as supreme
  - as the one who is above others
  - as superior
  lexicon: BDAG
  rationale: The participle ὑπερέχοντι denotes having higher status or authority.
    'As one in authority' communicates the functional sense in clear modern English.
    'Supreme' is possible, but can sound absolute in a way the context need not require.
