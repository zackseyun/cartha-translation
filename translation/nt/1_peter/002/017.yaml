theological_decisions:
- issue: Distinction between the response due to God and the response due to civil
    ruler
  chosen_reading: Render φοβεῖσθε as 'fear' and τιμάω as 'honor,' preserving the stronger
    response for God and the lesser response for the king.
  alternative_readings:
  - Render φοβεῖσθε as 'revere' and τιμάω as 'respect'
  rationale: 'The verse intentionally distinguishes obligations: universal honor,
    familial love within the believing community, fear toward God, and honor toward
    the king. Using ''fear'' for God and ''honor'' for the king preserves that theological
    hierarchy without importing a broader political theology.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
