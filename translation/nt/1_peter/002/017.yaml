id: 1PE.2.17
reference: 1 Peter 2:17
source:
  edition: SBLGNT
  text: πάντας τιμήσατε, τὴν ἀδελφότητα ⸀ἀγαπᾶτε, τὸν θεὸν φοβεῖσθε, τὸν βασιλέα τιμᾶτε.
translation:
  text: Honor everyone, love the brotherhood, fear God, honor the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the emperor'; the Greek word is 'king,' but in Peter's Roman context
      it likely refers to the emperor.
    reason: alternative_reading
  - marker: b
    text: '''The brotherhood'' refers to the community of fellow believers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντας
  chosen: everyone
  alternatives:
  - all people
  - everyone
  lexicon: BDAG
  rationale: Accusative plural of πᾶς functioning substantivally. 'Everyone' is concise,
    natural English and captures the universal scope without awkwardness. 'All people'
    is possible but slightly heavier.
- source_word: τιμήσατε
  chosen: honor
  alternatives:
  - show honor to
  - respect
  lexicon: BDAG
  rationale: Aorist active imperative of τιμάω. 'Honor' preserves the lexical link
    with the final τιμᾶτε and keeps the force stronger than mere 'respect.' English
    imperative style naturally uses the bare verb.
- source_word: ἀδελφότητα
  chosen: the brotherhood
  alternatives:
  - the family of believers
  - the brotherhood of believers
  - the community of brothers and sisters
  lexicon: BDAG
  rationale: ἀδελφότης denotes the brotherhood/fellowship of fellow believers. 'The
    brotherhood' is the most direct lexical equivalent and preserves the familial
    corporate sense. Because the Greek term is grammatically rooted in 'brother,'
    this follows the gender-accurate policy rather than replacing it with a neutral
    paraphrase.
- source_word: ἀγαπᾶτε
  chosen: love
  alternatives:
  - keep loving
  - show love to
  lexicon: BDAG
  rationale: Present active imperative of ἀγαπάω. 'Love' is the standard rendering
    and aligns with the project's default for ἀγάπη cognates. The present imperative
    may imply ongoing action, but English imperative style normally leaves that aspect
    implicit unless emphasis is required.
- source_word: θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of φοβεῖσθε. Straightforward rendering as 'God.'
- source_word: φοβεῖσθε
  chosen: fear
  alternatives:
  - revere
  - stand in awe of
  lexicon: BDAG
  rationale: Present middle/passive imperative of φοβέομαι. 'Fear' is the most direct
    and theologically weighty rendering; softer options like 'revere' can undertranslate
    the term. In this context the contrast with honoring the king supports retaining
    the stronger verb for God alone.
- source_word: βασιλέα
  chosen: the king
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: βασιλεύς can denote a king or, in Roman imperial context, the emperor.
    Since the Greek word itself is 'king' and the translation philosophy prioritizes
    source-language primacy, 'the king' is retained in the main text. The historical
    referent to the Roman emperor is worth preserving in a footnote.
- source_word: τιμᾶτε
  chosen: honor
  alternatives:
  - show honor to
  - respect
  lexicon: BDAG
  rationale: Present active imperative of τιμάω. Rendered the same as earlier τιμήσατε
    to preserve the repeated lexical pattern in the Greek. Although the aspect differs
    (aorist earlier, present here), English style does not require differentiating
    them in this compact series of imperatives.
