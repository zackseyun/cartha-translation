id: 1PE.2.23
reference: 1 Peter 2:23
source:
  edition: SBLGNT
  text: ὃς λοιδορούμενος οὐκ ἀντελοιδόρει, πάσχων οὐκ ἠπείλει, παρεδίδου δὲ τῷ κρίνοντι
    δικαίως·
translation:
  text: who, when he was insulted, did not insult in return; when he suffered, he
    did not threaten, but kept entrusting himself to the one who judges justly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he was reviled, he did not revile in return.'
    reason: lexical_alternative
  - marker: b
    text: Or 'but kept committing himself to him who judges righteously.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λοιδορούμενος
  chosen: when he was insulted
  alternatives:
  - being reviled
  - when he was reviled
  lexicon: BDAG
  rationale: Passive participle from λοιδορέω denotes being verbally abused or insulted.
    'Insulted' is more natural modern English than 'reviled' while preserving the
    verbal-abuse sense.
- source_word: ἀντελοιδόρει
  chosen: did not insult in return
  alternatives:
  - did not revile in return
  - did not return insult for insult
  lexicon: BDAG
  rationale: Imperfect of ἀντιλοιδορέω indicates repeated or characteristic non-retaliation.
    'Insult in return' captures both the verbal nature and the reciprocal force of
    ἀντί-.
- source_word: πάσχων
  chosen: when he suffered
  alternatives:
  - while suffering
  - suffering
  lexicon: BDAG
  rationale: Present participle from πάσχω can be rendered temporally here in parallel
    with the previous participial clause. 'When he suffered' reads smoothly and preserves
    the circumstance.
- source_word: ἠπείλει
  chosen: he did not threaten
  alternatives:
  - he was not threatening
  - he did not make threats
  lexicon: BDAG
  rationale: Imperfect of ἀπειλέω refers to uttering threats. Simple past in English
    best conveys the repeated past sense in this coordinated description.
- source_word: παρεδίδου
  chosen: kept entrusting himself
  alternatives:
  - entrusted himself
  - kept handing himself over
  - was committing himself
  lexicon: BDAG
  rationale: Imperfect of παραδίδωμι here likely has the sense of continual yielding/committing
    rather than a single punctiliar act. 'Kept entrusting himself' reflects the imperfective
    aspect and the context of patient suffering.
- source_word: τῷ κρίνοντι δικαίως
  chosen: to the one who judges justly
  alternatives:
  - to him who judges righteously
  - to the just judge
  lexicon: BDAG
  rationale: Articular participle with adverb identifies God descriptively. 'The one
    who judges justly' is clear modern English and preserves the ongoing judicial
    characterization without over-compressing it into a title.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: δέ marks contrast between Christ's refusal to retaliate and his positive
    response of entrusting himself to God. 'But' best signals that contrast in English.
- source_word: ὃς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to Christ in the previous verse. 'Who'
    is the natural English continuation.
