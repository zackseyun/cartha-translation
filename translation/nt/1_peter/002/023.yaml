theological_decisions:
- issue: Referent of 'the one who judges justly'
  chosen_reading: God the Father is the implied referent, expressed descriptively
    rather than by explicit title.
  alternative_readings:
  - a general reference to God without specifying person
  rationale: In context the verse describes Messiah's response in suffering by entrusting
    himself to God. The translation preserves the descriptive wording of the Greek
    and does not import a more specific title than the text gives.
  doctrine_reference: Preserve theological tension rather than resolve it.
