theological_decisions:
- issue: Rendering of σαρκικῶν in a moral context
  chosen_reading: fleshly
  alternative_readings:
  - sinful
  - of the flesh
  rationale: The doctrine excerpt specifies σάρξ as 'flesh' literally or 'sinful nature'
    metaphorically, context-dependent. Here the adjective σαρκικός describes desires
    opposed to the believer's well-being. 'Fleshly' preserves the source metaphor
    and theological tension without importing a full doctrinal paraphrase such as
    'sinful nature' into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Sense of ψυχή
  chosen_reading: the soul
  alternative_readings:
  - the life
  - the self
  rationale: The verse depicts moral desires as attacking the person's inner life.
    'Soul' best preserves the anthropological weight of ψυχή in this context while
    avoiding reduction to mere biological life. The translation does not press a technical
    body-soul dichotomy beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it
