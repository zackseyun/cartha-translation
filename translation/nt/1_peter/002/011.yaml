id: 1PE.2.11
reference: 1 Peter 2:11
source:
  edition: SBLGNT
  text: Ἀγαπητοί, παρακαλῶ ὡς παροίκους καὶ παρεπιδήμους ἀπέχεσθαι τῶν σαρκικῶν ἐπιθυμιῶν,
    αἵτινες στρατεύονται κατὰ τῆς ψυχῆς·
translation:
  text: Beloved, I urge you as sojourners and exiles to abstain from fleshly desires,
    which wage war against the soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners' and 'temporary residents.' The paired terms emphasize that
      believers do not fully belong to the present age or society.
    reason: lexical_alternative
  - marker: b
    text: '''Fleshly desires'' could also be rendered ''desires of the flesh'' or,
      more interpretively, ''sinful desires.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'against the life' or 'against the self.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  - Loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a warm address. 'Beloved' preserves
    both the affectionate tone and the lexical connection to ἀγαπάω/ἀγάπη better than
    the more interpretive 'dear friends'.
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I exhort
  - I appeal
  lexicon: BDAG
  rationale: παρακαλέω here carries earnest exhortation rather than mere request or
    comfort. 'I urge' is natural modern English and preserves the force without sounding
    overly technical like 'I exhort'.
- source_word: ὡς
  chosen: as
  alternatives:
  - since you are
  - as those who are
  lexicon: BDAG
  rationale: The particle marks the manner or identity in which the readers are addressed.
    'As' is sufficiently direct and avoids adding causal nuance not explicit in the
    Greek.
- source_word: παροίκους
  chosen: sojourners
  alternatives:
  - strangers
  - resident foreigners
  lexicon: BDAG
  rationale: πάροικος denotes one living in a place not one's homeland, with temporary
    or non-native status. 'Sojourners' preserves the pilgrim/temporary-residence sense
    better than the vaguer 'strangers'.
- source_word: παρεπιδήμους
  chosen: exiles
  alternatives:
  - temporary residents
  - foreigners
  lexicon: BDAG
  rationale: Paired with πάροικος, this term intensifies the readers' outsider status.
    'Exiles' gives a concise, weighty English equivalent that distinguishes it from
    'sojourners' while preserving the social and theological sense of not belonging
    fully to the present world.
- source_word: ἀπέχεσθαι
  chosen: to abstain
  alternatives:
  - to keep away
  - to refrain
  lexicon: BDAG
  rationale: The present middle infinitive after παρακαλῶ expresses an ongoing call
    to hold oneself away from something. 'To abstain' is idiomatic and morally clear
    in this context.
- source_word: σαρκικῶν
  chosen: fleshly
  alternatives:
  - of the flesh
  - sinful
  lexicon: BDAG
  rationale: Per doctrine, σάρξ-family terms are rendered contextually. Here σαρκικός
    modifies desires and points to desires arising from fallen human flesh. 'Fleshly'
    preserves the lexical tie to σάρξ without over-interpreting to 'sinful nature'
    in the main text.
- source_word: ἐπιθυμιῶν
  chosen: desires
  alternatives:
  - passions
  - lusts
  lexicon: BDAG
  rationale: ἐπιθυμία can denote desire broadly, often negative in moral contexts.
    'Desires' is accurate and readable; 'lusts' is too narrow/sexualized, while 'passions'
    may suggest emotions more generally.
- source_word: αἵτινες
  chosen: which
  alternatives:
  - these
  - such desires as
  lexicon: BDAG
  rationale: The relative pronoun introduces a qualitative explanatory clause about
    the desires. 'Which' is the most natural English connector here.
- source_word: στρατεύονται
  chosen: wage war
  alternatives:
  - make war
  - campaign
  lexicon: BDAG
  rationale: The verb is military imagery in the middle voice, depicting active hostile
    engagement. 'Wage war' is vivid, idiomatic, and preserves the metaphor's force.
- source_word: κατὰ τῆς ψυχῆς
  chosen: against the soul
  alternatives:
  - against your soul
  - against the life
  lexicon: BDAG
  rationale: ψυχή here refers to the inner life/person rather than merely physical
    life. 'The soul' preserves the traditional and lexical sense without narrowing
    it to psychology alone. 'Your' is not explicit in Greek and is therefore omitted
    from the main text.
