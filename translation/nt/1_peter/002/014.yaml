theological_decisions:
- issue: Referent of αὐτοῦ in δι’ αὐτοῦ
  chosen_reading: the governors are sent through the emperor/king mentioned in the
    previous verse
  alternative_readings:
  - through God
  rationale: The nearest and most natural antecedent in context is the king/emperor
    of v.13, yielding the sense of delegated civil authority. This fits the syntax
    and immediate flow without making a broader theological claim beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
