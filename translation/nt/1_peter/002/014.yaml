id: 1PE.2.14
reference: 1 Peter 2:14
source:
  edition: SBLGNT
  text: εἴτε ἡγεμόσιν ὡς δι’ αὐτοῦ πεμπομένοις εἰς ἐκδίκησιν κακοποιῶν ἔπαινον δὲ
    ἀγαθοποιῶν
translation:
  text: or to governors, as those sent through him for the punishment of evildoers
    and the praise of those who do good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by him," referring to the king/emperor mentioned in the previous verse;
      some understand "through him" to refer more broadly to God’s ordering of authority.
    reason: alternative_reading
lexical_decisions:
- source_word: ἡγεμόσιν
  chosen: governors
  alternatives:
  - rulers
  - provincial governors
  lexicon: BDAG
  rationale: ἡγεμών commonly denotes a governing official or ruler; in this civic
    context 'governors' is the most natural and specific English rendering without
    over-specifying Roman administrative structure.
- source_word: ὡς
  chosen: as
  alternatives:
  - as being
  - as those who are
  lexicon: BDAG
  rationale: Introduces the manner or characterization of the governors relative to
    the emperor in the previous verse. Simple 'as' preserves the Greek connection
    and reads naturally in English.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with genitive normally expresses agency or instrumentality. 'Through
    him' preserves the prepositional force and links αὐτοῦ to the emperor mentioned
    in v.13.
- source_word: πεμπομένοις
  chosen: sent
  alternatives:
  - being sent
  - commissioned
  lexicon: BDAG
  rationale: The participle describes governors as delegated authorities. 'Sent' is
    concise and idiomatic; 'commissioned' is interpretive and slightly stronger than
    the Greek requires.
- source_word: ἐἰς ἐκδίκησιν
  chosen: for the punishment
  alternatives:
  - for vengeance
  - for justice against
  lexicon: BDAG
  rationale: ἐκδίκησις can denote vengeance, punishment, or carrying out justice.
    In a governmental context, 'punishment' best fits the civic/judicial function
    without importing excessive emotional force.
- source_word: κακοποιῶν
  chosen: evildoers
  alternatives:
  - those who do evil
  - wrongdoers
  lexicon: BDAG
  rationale: The genitive depends on ἐκδίκησιν and refers to people characterized
    by doing evil. 'Evildoers' is compact and matches the moral-legal sense.
- source_word: ἔπαινον
  chosen: the praise
  alternatives:
  - praise
  - approval
  lexicon: BDAG
  rationale: 'The accusative balances ἐκδίκησιν in the purpose construction. Including
    the article in English helps preserve the parallel structure: ''the punishment
    ... and the praise ...''.'
- source_word: ἀγαθοποιῶν
  chosen: those who do good
  alternatives:
  - doers of good
  - the good-doers
  lexicon: BDAG
  rationale: Refers to people characterized by beneficent or good conduct. 'Those
    who do good' is natural modern English and preserves the verbal idea.
- source_word: εἴτε
  chosen: or
  alternatives:
  - whether to
  lexicon: BDAG
  rationale: This continues the either/or structure from v.13 ('whether to the king
    ... or to governors'). Since this verse is translated as a continuation, 'or'
    is the appropriate standalone rendering.
