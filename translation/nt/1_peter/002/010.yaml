id: 1PE.2.10
reference: 1 Peter 2:10
source:
  edition: SBLGNT
  text: οἵ ποτε οὐ λαὸς νῦν δὲ λαὸς θεοῦ, οἱ οὐκ ἠλεημένοι νῦν δὲ ἐλεηθέντες.
translation:
  text: you who once were not a people, but now are God's people; you who had not
    received mercy, but now have received mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peter echoes Hosea 1:9-10; 2:23, applying Israel-restoration language to
      his readers' present identity in God's people.
    reason: cross_reference
  - marker: b
    text: 'Or: ''you who were not shown mercy, but now have been shown mercy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ
  chosen: you who
  alternatives:
  - who
  - those who
  lexicon: BDAG
  rationale: The nominative plural relative pronoun refers back to the audience addressed
    in the previous verse. Rendering it as 'you who' makes the connection explicit
    in natural English without adding content beyond the discourse context.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: ποτε here marks a former state contrasted with νῦν ('now'). 'Once' is
    concise and idiomatic in English.
- source_word: λαὸς
  chosen: a people / God's people
  alternatives:
  - people
  - nation
  lexicon: BDAG
  rationale: λαός often denotes a people-group, especially in covenantal language.
    'A people' preserves the qualitative/corporate sense in the first clause, while
    'God's people' naturally renders λαὸς θεοῦ in the second clause.
- source_word: θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The genitive is possessive. 'God's people' is the most natural English
    expression and preserves the covenantal force.
- source_word: οὐκ ἠλεημένοι
  chosen: had not received mercy
  alternatives:
  - were not shown mercy
  - had not been pitied
  lexicon: BDAG
  rationale: The perfect/passive participle describes a prior state of not having
    been the recipients of mercy. 'Had not received mercy' communicates the resultant-state
    sense in clear English and avoids the less natural 'not having been mercied.'
- source_word: ἐλεηθέντες
  chosen: have received mercy
  alternatives:
  - have been shown mercy
  - were shown mercy
  lexicon: BDAG
  rationale: The aorist passive participle is contrasted with the previous state and,
    in English, 'have received mercy' best expresses the present standing resulting
    from God's merciful action. It also keeps lexical consistency with the previous
    clause.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now however
  lexicon: BDAG
  rationale: δέ marks contrast in both clauses. 'But' clearly signals the reversal
    from former alienation to present covenant inclusion.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: νῦν marks the believers' present status in contrast to their former condition.
    'Now' is direct and idiomatic.
