theological_decisions:
- issue: Allusion to Hosea and covenant-identity language
  chosen_reading: Render the verse in a way that preserves the corporate covenant
    reversal without importing a narrower ethnic or denominational claim.
  alternative_readings:
  - Translate more woodenly as 'not people ... people of God'
  - Translate more interpretively as 'not God's people ... now God's people' in both
    halves
  rationale: The Greek first says 'not a people' rather than explicitly 'not God's
    people,' then 'now God's people.' Preserving this distinction reflects the wording
    while still allowing the Hosea background to be heard. The translation communicates
    incorporation into God's covenant people without over-specifying the mechanism
    beyond the text.
  doctrine_reference: Translation philosophy items 1, 3, and 5
