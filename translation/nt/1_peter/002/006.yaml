id: 1PE.2.6
reference: 1 Peter 2:6
source:
  edition: SBLGNT
  text: διότι περιέχει ⸀ἐν γραφῇ· Ἰδοὺ τίθημι ἐν Σιὼν λίθον ⸂ἀκρογωνιαῖον ἐκλεκτὸν⸃ ἔντιμον, καὶ ὁ πιστεύων ἐπ’ αὐτῷ οὐ μὴ καταισχυνθῇ.
translation:
  text: 'For it is contained in Scripture: “Behold, I lay in Zion a chosen, honored cornerstone, and the one who believes in him will certainly not be put to shame.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “it stands in Scripture” or “Scripture says.” The Greek idiom is literally “it contains in Scripture.”'
    reason: lexical_alternative
  - marker: b
    text: Or “precious cornerstone.” The Greek term can denote high value as well as honor.
    reason: lexical_alternative
  - marker: c
    text: Some translations render “in it” because the quotation speaks of a stone; here “in him” reflects Peter’s christological application of the stone text in the surrounding context.
    reason: alternative_reading
  - marker: d
    text: Or “will never be put to shame.” The Greek construction is strongly emphatic.
    reason: lexical_alternative
  - marker: e
    text: Or 'it contains in Scripture'.
    reason: previous_rendering
lexical_decisions:
- source_word: διότι
  chosen: For
  alternatives:
  - because
  - therefore
  lexicon: BDAG
  rationale: Introduces the scriptural support for the preceding claim. 'For' fits the explanatory force in context better than the more causal-sounding 'because' or inferential 'therefore'.
- source_word: περιέχει ἐν γραφῇ
  chosen: it contains in Scripture
  alternatives:
  - it stands in Scripture
  - it is contained in Scripture
  - Scripture says
  lexicon: BDAG
  rationale: The Greek idiom literally means something like 'it contains in Scripture.' This preserves the unusual wording more closely than the smoother traditional 'it stands in Scripture,' while remaining natural enough in English. 'It' refers to Scripture/the scriptural witness implicitly.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic, attention-commanding force of the citation. Though slightly elevated, it remains recognizable and suits the solemn quotation.
- source_word: τίθημι
  chosen: I lay
  alternatives:
  - I place
  - I set
  lexicon: BDAG
  rationale: In a building metaphor, 'lay' is the most idiomatic English choice for placing a foundational stone.
- source_word: ἐν Σιὼν
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: BDAG
  rationale: The preposition ἐν is most naturally rendered 'in' here, preserving the locative sense of the prophetic image.
- source_word: λίθον ἀκρογωνιαῖον
  chosen: cornerstone
  alternatives:
  - chief cornerstone
  - capstone
  - corner stone
  lexicon: BDAG
  rationale: The adjective-noun combination denotes a cornerstone. 'Chief cornerstone' is interpretive and more traditional; 'capstone' is less likely here. 'Cornerstone' is clear and standard.
- source_word: ἐκλεκτὸν
  chosen: chosen
  alternatives:
  - elect
  - choice
  lexicon: BDAG
  rationale: '''Chosen'' is the most natural modern English rendering and preserves the divine-selection sense without importing later theological shorthand.'
- source_word: ἔντιμον
  chosen: honored
  alternatives:
  - precious
  - valuable
  - held in honor
  lexicon: BDAG
  rationale: The term denotes honor/high value. 'Honored' foregrounds the honor aspect and aligns well with the immediate context in 2:7 where honor is thematically important. 'Precious' is possible but can sound sentimental in modern English.
- source_word: ὁ πιστεύων ἐπ’ αὐτῷ
  chosen: the one who believes in him
  alternatives:
  - whoever believes in him
  - the one who trusts in him
  lexicon: BDAG
  rationale: The substantival participle is well represented by 'the one who believes.' With πιστεύω, the project's default is 'faith/believe' language unless context requires otherwise. 'In him' is the natural English rendering of ἐπ’ αὐτῷ here.
- source_word: οὐ μὴ καταισχυνθῇ
  chosen: will certainly not be put to shame
  alternatives:
  - will never be put to shame
  - will by no means be disappointed
  - will certainly not be shamed
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is emphatically negative; 'will certainly not' captures that force. 'Be put to shame' reflects καταισχυνθῇ more directly than 'be disappointed,' which is a possible contextual sense but less literal.
