theological_decisions:
- issue: Referent of αὐτῷ in the Isaiah citation as used by Peter
  chosen_reading: rendered personally as 'him'
  alternative_readings:
  - render as 'it' to match the stone metaphor more strictly
  rationale: Although the immediate image is a stone, Peter applies the stone text christologically in the surrounding context (2:4–8). Rendering αὐτῷ as 'him' preserves Peter's personal application to Messiah/Jesus without obscuring the metaphor. This does not add doctrine beyond the context; it reflects the apostolic use of the citation.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Order and relation of ἀκρογωνιαῖον ἐκλεκτὸν ἔντιμον
  chosen_reading: chosen, honored cornerstone
  alternative_readings:
  - a cornerstone, chosen and precious
  - a chosen and honored cornerstone
  rationale: English style favors placing 'chosen, honored' before 'cornerstone.' This preserves all three descriptors while keeping the line readable. 'Honored' rather than 'precious' also maintains the honor theme in the immediate context.
  doctrine_reference: 'Translation philosophy #6'
revisions:
- timestamp: '2026-04-21T01:37:49Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_peter/002/006.json
  category: awkward_english
  tier: 1
  from: it contains in Scripture
  to: it is contained in Scripture
  rationale: The current rendering uses an impersonal 'it' as the subject of the active verb 'contains,' which is unidiomatic English. The Greek 'περιέχει' is used impersonally, meaning 'it is contained' or 'it stands written.' A passive construction like 'it is contained in Scripture' is more natural English and arguably a more precise rendering of the impersonal Greek verb. Alternatively, 'Scripture contains' would also be smoother, though it changes the grammatical subject.
