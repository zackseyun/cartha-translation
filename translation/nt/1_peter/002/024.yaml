id: 1PE.2.24
reference: 1 Peter 2:24
source:
  edition: SBLGNT
  text: ὃς τὰς ἁμαρτίας ἡμῶν αὐτὸς ἀνήνεγκεν ἐν τῷ σώματι αὐτοῦ ἐπὶ τὸ ξύλον, ἵνα
    ταῖς ἁμαρτίαις ἀπογενόμενοι τῇ δικαιοσύνῃ ζήσωμεν· οὗ τῷ ⸀μώλωπι ἰάθητε.
translation:
  text: He himself bore our sins in his body on the tree, so that, having died to
    sins, we might live to righteousness. By his wound you were healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the cross'; Greek 'on the tree,' preserving the wording of ξύλον
      and likely echoing Deuteronomy 21:23.
    reason: alternative_reading
  - marker: b
    text: Or 'By his stripe' or 'By his bruise'; the singular noun echoes Isaiah 53:5.
    reason: lexical_alternative
  - marker: c
    text: The healing here is expressed broadly; in context it is tied to sins and
      righteousness, without limiting the sense to either physical or spiritual healing
      alone.
    reason: cross_reference
lexical_decisions:
- source_word: ἀνήνεγκεν
  chosen: bore
  alternatives:
  - carried up
  - offered
  lexicon: BDAG
  rationale: ἀναφέρω can mean 'bring up,' 'offer,' or 'bear/carry.' In this sacrificial
    context, with 'our sins' as the object and 'on the tree' following, 'bore' best
    preserves both the Isaianic allusion and the sense of bearing sins without over-specifying
    a technical sacrificial gloss in English.
- source_word: ἐν τῷ σώματι αὐτοῦ
  chosen: in his body
  alternatives:
  - in his own body
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'In his body'
    preserves the embodied, concrete nature of the suffering and avoids unnecessary
    expansion, while αὐτός earlier already supplies emphasis ('he himself').
- source_word: ἐπὶ τὸ ξύλον
  chosen: on the tree
  alternatives:
  - on the wood
  - on the cross
  lexicon: BDAG
  rationale: ξύλον literally means 'wood/tree.' 'On the tree' preserves the Greek
    wording and its likely echo of Deut 21:23 / early Christian usage, while still
    being intelligible as a reference to the crucifixion. 'Cross' is interpretive
    and less transparent to the source wording.
- source_word: ταῖς ἁμαρτίαις ἀπογενόμενοι
  chosen: having died to sins
  alternatives:
  - having become separated from sins
  - having ceased from sins
  lexicon: BDAG
  rationale: ἀπογίνομαι here conveys a decisive break or departure. 'Having died to
    sins' is idiomatic English that captures the force of separation from sin and
    fits the purpose clause naturally. The plural 'sins' is retained to match the
    Greek.
- source_word: τῇ δικαιοσύνῃ
  chosen: to righteousness
  alternatives:
  - for righteousness
  - to justice
  lexicon: BDAG
  rationale: δικαιοσύνη is rendered by the project's default as 'righteousness.' Here
    the dative after ζήσωμεν is well represented by 'live to righteousness,' expressing
    life directed toward righteous living. 'Justice' is possible lexically but less
    fitting in this immediate ethical context.
- source_word: μώλωπι
  chosen: wound
  alternatives:
  - stripe
  - bruise
  - welts
  lexicon: BDAG
  rationale: μώλωψ denotes a wound/bruise left by blows. 'Wound' is natural modern
    English and preserves the singular collective sense. 'Stripe' reflects older tradition
    and Isaiah 53 language in some English versions, but is less transparent for contemporary
    readers.
- source_word: ἰάθητε
  chosen: you were healed
  alternatives:
  - you were cured
  - you were made whole
  lexicon: BDAG
  rationale: The aorist passive is best rendered 'you were healed.' This preserves
    the metaphorical and salvific breadth of the term without narrowing it to physical
    cure alone.
- source_word: αὐτὸς
  chosen: himself
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The intensive pronoun is significant and is brought out in English as
    'himself.' Combined with the subject pronoun in translation ('He himself'), it
    preserves the emphatic force of the Greek.
