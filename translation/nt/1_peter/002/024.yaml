theological_decisions:
- issue: Extent of healing in the final clause
  chosen_reading: Retain 'you were healed' without specifying physical-only or spiritual-only
    healing.
  alternative_readings:
  - physical healing
  - spiritual healing from sin
  - comprehensive healing with primary soteriological focus
  rationale: The immediate context centers on sins, righteousness, and Christ's suffering,
    so the healing language clearly includes restoration from sin; however, the translation
    should not collapse the metaphor into a narrow doctrinal formula beyond what the
    text states. Preserving the broader wording maintains the theological tension
    and the Isaiah 53 echo.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ξύλον
  chosen_reading: Use 'tree' rather than 'cross' in the main text.
  alternative_readings:
  - cross
  rationale: The verse plainly refers to Jesus' crucifixion, but the Greek uses ξύλον
    rather than σταυρός. Rendering it 'tree' preserves the wording and likely scriptural
    allusion, while readers can still understand the referent. This avoids importing
    a more interpretive term into the main text.
  doctrine_reference: Original-language primacy over translation tradition.
