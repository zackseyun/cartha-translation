id: 1PE.2.4
reference: 1 Peter 2:4
source:
  edition: SBLGNT
  text: Πρὸς ὃν προσερχόμενοι, λίθον ζῶντα, ὑπὸ ἀνθρώπων μὲν ἀποδεδοκιμασμένον παρὰ
    δὲ θεῷ ἐκλεκτὸν ἔντιμον
translation:
  text: As you come to him, a living stone, rejected by men but chosen and precious
    in the sight of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to whom, coming' or 'as you are coming to him.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'by men'; that is, by human beings or people.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρὸς ὃν
  chosen: to him
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: The phrase literally means 'to whom,' but in contemporary English with
    the motion verb προσέρχομαι, 'to him' is more natural while preserving the directional
    sense.
- source_word: προσερχόμενοι
  chosen: as you come
  alternatives:
  - coming
  - approaching
  lexicon: BDAG
  rationale: 'The present middle participle is rendered with a temporal/aspectual
    sense tied to the readers: ''as you come.'' This preserves the ongoing action
    and fits the exhortational flow from the previous verse better than a bare participle.'
- source_word: λίθον
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: λίθος ordinarily means 'stone.' 'Rock' would overstate the lexical sense
    and blur the building-stone imagery developed in the context.
- source_word: ζῶντα
  chosen: living
  alternatives:
  - alive
  lexicon: BDAG
  rationale: '''Living'' is the idiomatic attributive rendering with ''stone'' and
    preserves the paradoxical metaphor central to the verse.'
- source_word: ὑπὸ ἀνθρώπων
  chosen: by men
  alternatives:
  - by people
  - by human beings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and contrasts human evaluation
    with God's. Per the gender-accurate policy, 'men' best matches the source form
    and rhetorical force here, while not claiming only males are in view.
- source_word: ἀποδεδοκιμασμένον
  chosen: rejected
  alternatives:
  - disapproved
  - discarded after testing
  lexicon: BDAG
  rationale: The perfect passive participle conveys having been examined and rejected.
    'Rejected' is the clearest natural English rendering; the fuller nuance of disapproval
    after evaluation is implicit and can be noted in a footnote if needed.
- source_word: παρὰ δὲ θεῷ
  chosen: in the sight of God
  alternatives:
  - with God
  - before God
  lexicon: BDAG
  rationale: παρά with the dative here expresses standing or status in relation to
    God. 'In the sight of God' communicates evaluative perspective more clearly in
    English than the more literal 'with God.'
- source_word: ἐκλεκτὸν
  chosen: chosen
  alternatives:
  - elect
  - choice
  lexicon: BDAG
  rationale: '''Chosen'' is the most natural modern English equivalent and avoids
    unnecessary theological jargon while preserving the divine-election sense.'
- source_word: ἔντιμον
  chosen: precious
  alternatives:
  - honored
  - highly valued
  lexicon: BDAG
  rationale: ἔντιμος denotes high value or honor. 'Precious' fits both the semantic
    range and the stone imagery, and it is a familiar biblical-English expression
    without being archaic.
