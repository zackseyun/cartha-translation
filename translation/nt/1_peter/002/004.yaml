theological_decisions:
- issue: Referent of 'him' and the stone imagery
  chosen_reading: The verse refers to the Lord Jesus/Messiah as the living stone.
  rationale: The immediate context (2:3-4) and the broader catena of stone texts in
    2:6-8 identify the referent as Christ. The translation keeps the pronoun 'him'
    rather than inserting the name, since the Greek leaves it pronominal here.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1, §2'
- issue: Rendering ἀνθρώπων
  chosen_reading: '''men'' in the main text, with inclusive alternative preserved
    in a footnote.'
  alternative_readings:
  - people
  - human beings
  rationale: The Greek form is masculine plural and the project's policy is gender-accurate
    over gender-neutral. Because English readers may hear 'men' as male-only, an inclusive
    alternative is worth preserving in a footnote without altering the main text.
  doctrine_reference: Translation philosophy §4
