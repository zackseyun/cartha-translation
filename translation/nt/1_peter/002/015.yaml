- issue: Gender rendering of ἀνθρώπων
  chosen_reading: people
  alternative_readings:
  - men
  rationale: Although the Greek form is grammatically masculine, the referent is generic
    human opponents, not specifically males. This follows the stated gender-accurate
    policy without flattening the source's intent.
