theological_decisions:
- issue: Sense of χάρις in context
  chosen_reading: Rendered as 'grace' rather than an interpretive paraphrase like
    'commendable' or 'finds favor with God.'
  alternative_readings:
  - This is a gracious thing
  - This is commendable
  - This finds favor with God
  rationale: The verse does not explicitly state 'with God' until the following verse
    in many English renderings inferentially. Keeping 'grace' avoids importing explanatory
    theology not overtly present in this clause, while still allowing the reader to
    hear the theological resonance of divine favor.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of συνείδησις θεοῦ
  chosen_reading: 'Objective/reference sense: awareness of God, expressed as ''consciousness
    of God.'''
  alternative_readings:
  - conscience toward God
  - mindful of God
  rationale: The phrase should preserve theological tension rather than collapse into
    a single interpretive paraphrase. 'Consciousness of God' keeps the God-directed
    motive in view without excluding the conscience nuance. A more idiomatic alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
