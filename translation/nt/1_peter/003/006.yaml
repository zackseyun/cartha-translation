id: 1PE.3.6
reference: 1 Peter 3:6
source:
  edition: SBLGNT
  text: ὡς Σάρρα ⸀ὑπήκουσεν τῷ Ἀβραάμ, κύριον αὐτὸν καλοῦσα· ἧς ἐγενήθητε τέκνα ἀγαθοποιοῦσαι
    καὶ μὴ φοβούμεναι μηδεμίαν πτόησιν.
translation:
  text: just as Sarah obeyed Abraham, calling him lord. You have become her children
    if you do good and do not fear any intimidation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any terror' or 'anything frightening.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces Sarah as the model corresponding to the preceding exhortation.
    'Just as' makes the comparative force clear in natural English.
- source_word: ὑπήκουσεν
  chosen: obeyed
  alternatives:
  - submitted to
  - listened to
  lexicon: BDAG
  rationale: The verb ὑπακούω ordinarily means 'obey' or 'heed.' 'Obeyed' is the most
    direct rendering here and matches the dative object construction with Abraham.
- source_word: κύριον
  chosen: lord
  alternatives:
  - master
  - Lord
  lexicon: BDAG
  rationale: Here κύριος is not a divine title but Sarah's respectful designation
    for Abraham (cf. Gen 18:12). Lowercase 'lord' preserves the lexical sense without
    implying deity. 'Master' is possible but sounds harsher and less idiomatic in
    this marital context.
- source_word: καλοῦσα
  chosen: calling
  alternatives:
  - addressing as
  - speaking of as
  lexicon: BDAG
  rationale: Present participle expressing the manner/evidence of Sarah's obedience.
    'Calling' is straightforward and preserves the verbal connection to her speech.
- source_word: ἧς
  chosen: her
  alternatives:
  - whose
  lexicon: BDAG
  rationale: Genitive feminine singular relative pronoun referring to Sarah. In English,
    'her children' is the most natural expression of filial relation.
- source_word: ἐγενήθητε
  chosen: have become
  alternatives:
  - became
  - are
  lexicon: BDAG
  rationale: Aorist passive/deponent of γίνομαι here denotes entering a state. 'Have
    become' captures the resultant present identity better than simple past, while
    avoiding flattening it to a mere stative 'are.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: τέκνα commonly denotes children in a literal or figurative sense. 'Children'
    is idiomatic and preserves the familial imagery.
- source_word: ἀγαθοποιοῦσαι
  chosen: if you do good
  alternatives:
  - as you do good
  - while doing good
  lexicon: BDAG
  rationale: The participle is attendant to the main clause and in context functions
    conditionally with the following participle. Rendering it with 'if' makes the
    implied conditional force clear in English.
- source_word: μὴ φοβούμεναι
  chosen: do not fear
  alternatives:
  - not being afraid
  - without fearing
  lexicon: BDAG
  rationale: Present middle/passive participle coordinated with ἀγαθοποιοῦσαι. English
    finite verb form reads naturally and conveys the ongoing disposition envisioned.
- source_word: μηδεμίαν πτόησιν
  chosen: any intimidation
  alternatives:
  - any terror
  - anything frightening
  - any alarm
  lexicon: BDAG
  rationale: πτόησις can denote terror, alarm, or that which causes fright. 'Any intimidation'
    fits the paraenetic context of wives facing social pressure or threats and avoids
    suggesting only inward emotion; however, the more literal 'terror' is worth preserving
    in a footnote.
