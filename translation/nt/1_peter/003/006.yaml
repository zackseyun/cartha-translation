theological_decisions:
- issue: Sense of Sarah's exemplary obedience in relation to Christian wives
  chosen_reading: The verse presents Sarah as an example of respectful conduct without
    importing a broader doctrinal claim beyond the text; 'obeyed' is retained because
    it is the plain sense of ὑπήκουσεν.
  alternative_readings:
  - Render more weakly as 'submitted to' to avoid overstatement in modern English
  rationale: The translation should not soften the Greek verb for doctrinal or cultural
    reasons, but neither should it expand the verse into a comprehensive theology
    of marriage. The wording remains close to the source and leaves broader application
    to context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Conditional force of the participles ἀγαθοποιοῦσαι καὶ μὴ φοβούμεναι
  chosen_reading: Expressed as a condition with 'if you do good and do not fear any
    intimidation.'
  alternative_readings:
  - 'Express as descriptive: ''as you do good and do not fear...'''
  rationale: English normally requires the relation of the participles to the main
    clause to be made explicit. In context, the participles describe the manner in
    which the readers show themselves to be Sarah's children, with a practical conditional
    nuance. This preserves the exhortational tension without over-systematizing it.
  doctrine_reference: Translation philosophy §3
