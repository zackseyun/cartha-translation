theological_decisions:
- issue: Force of the rhetorical question in relation to suffering for righteousness
  chosen_reading: The verse is rendered as a general rhetorical assurance ('who will
    harm you...?') without implying an absolute promise that believers will never
    suffer.
  alternative_readings:
  - A stronger absolute-sounding promise that no one can truly harm believers
  rationale: The immediate context (especially the following verses) acknowledges
    that believers may in fact suffer for doing good. Therefore the translation preserves
    the rhetorical form without overstating it into a doctrinal guarantee of immunity
    from suffering.
  doctrine_reference: Preserve theological tension rather than resolve it.
