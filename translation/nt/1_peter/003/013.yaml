id: 1PE.3.13
reference: 1 Peter 3:13
source:
  edition: SBLGNT
  text: Καὶ τίς ὁ κακώσων ὑμᾶς ἐὰν τοῦ ἀγαθοῦ ⸀ζηλωταὶ γένησθε;
translation:
  text: And who will harm you if you become zealous for what is good?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eager for what is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Standard connective carried forward to preserve the flow from the preceding
    exhortation. 'And' is the most neutral discourse connector here.
- source_word: τίς ὁ κακώσων
  chosen: who will harm
  alternatives:
  - who is the one who will mistreat
  - who will do evil to
  lexicon: BDAG
  rationale: 'The article with the future participle functions substantivally: ''who
    is the one who will harm.'' Smooth English is best achieved with ''who will harm,''
    preserving the rhetorical question and future sense without woodenness.'
- source_word: κακώσων
  chosen: harm
  alternatives:
  - mistreat
  - injure
  lexicon: BDAG
  rationale: '''Harm'' fits the broad semantic range of causing injury or ill-treatment
    and reads naturally in English. ''Mistreat'' is possible but narrower and more
    behavioral; ''harm'' better matches the general rhetorical force.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object plural, naturally rendered 'you' in English.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - provided that
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive; 'if' is the standard
    and sufficient rendering.
- source_word: τοῦ ἀγαθοῦ
  chosen: what is good
  alternatives:
  - the good
  - goodness
  lexicon: BDAG
  rationale: The genitive with ζηλωταί is idiomatically rendered as the object of
    zeal. 'What is good' communicates the abstract neuter adjective naturally in English
    better than the more wooden 'the good.'
- source_word: ζηλωταὶ
  chosen: zealous for
  alternatives:
  - eager for
  - devoted to
  lexicon: BDAG
  rationale: The noun ζηλωτής denotes one who is enthusiastic or zealous for something.
    In English, converting the nominal expression into the predicate 'become zealous
    for' is natural and preserves the intensity of commitment.
- source_word: γένησθε
  chosen: you become
  alternatives:
  - you prove to be
  - you are found to be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι in the conditional clause is well
    represented by 'become.' This preserves the ingressive nuance better than simply
    'are.'
