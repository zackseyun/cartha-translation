theological_decisions:
- issue: Relation of suffering to divine will
  chosen_reading: The verse states that suffering may occur within God's will, especially
    in the case of suffering while doing good, without specifying a full doctrine
    of causation or divine approval of evil acts.
  alternative_readings:
  - God positively decrees each instance of suffering in a deterministic sense
  - God merely permits suffering and is otherwise uninvolved
  rationale: The phrase εἰ θέλοι τὸ θέλημα τοῦ θεοῦ indicates conditional reference
    to God's will but does not settle broader theological debates about decree versus
    permission. The translation preserves the wording without importing a denominational
    framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
