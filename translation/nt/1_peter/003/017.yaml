id: 1PE.3.17
reference: 1 Peter 3:17
source:
  edition: SBLGNT
  text: κρεῖττον γὰρ ἀγαθοποιοῦντας, εἰ θέλοι τὸ θέλημα τοῦ θεοῦ, πάσχειν ἢ κακοποιοῦντας.
translation:
  text: For it is better to suffer while doing good, if the will of God should so
    will it, than while doing evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for doing good ... than for doing evil.' The participles can be taken
      in a causal sense ('for') or more generally as describing the circumstance ('while').
    reason: lexical_alternative
  - marker: b
    text: The Greek says literally, 'if the will of God should will it,' an emphatic
      expression preserved here in sense rather than exact repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖττον
  chosen: better
  alternatives:
  - it is preferable
  - it is superior
  lexicon: BDAG
  rationale: 'Impersonal comparative adjective functioning predicatively: ''it is
    better.'' ''Better'' is the natural and standard English equivalent.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connective giving the reason or explanation for the preceding exhortation.
    'For' preserves the logical connection succinctly.
- source_word: ἀγαθοποιοῦντας
  chosen: while doing good
  alternatives:
  - for doing good
  - doing good
  lexicon: BDAG
  rationale: Present active participle accusative plural paired antithetically with
    κακοποιοῦντας. English idiom requires supplying a circumstance relation with the
    infinitive πάσχειν. 'While doing good' preserves the durative participial sense
    without over-specifying causation. 'For doing good' is possible, but the Greek
    does not explicitly mark causal force.
- source_word: εἰ θέλοι
  chosen: if ... should so will it
  alternatives:
  - if ... wills
  - if ... should desire
  lexicon: BDAG
  rationale: The optative θέλοι after εἰ expresses a more tentative or potential condition.
    Rendering with 'should' captures that nuance better than a flat present 'wills.'
    Repeating 'will' reflects the verbal connection with θέλημα, though idiomatically
    expanded as 'so will it' to avoid awkwardness.
- source_word: τὸ θέλημα τοῦ θεοῦ
  chosen: the will of God
  alternatives:
  - God's will
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'The will of God' preserves
    the formal shape and solemnity of the phrase; 'God's will' would also be acceptable
    but is slightly less formal.
- source_word: πάσχειν
  chosen: to suffer
  alternatives:
  - to endure suffering
  lexicon: BDAG
  rationale: Complementary infinitive governed by κρεῖττον in an impersonal construction.
    'To suffer' is direct and idiomatic.
- source_word: ἢ
  chosen: than
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: Standard comparative conjunction after κρεῖττον.
- source_word: κακοποιοῦντας
  chosen: while doing evil
  alternatives:
  - for doing evil
  - doing evil
  lexicon: BDAG
  rationale: Present active participle set in contrast to ἀγαθοποιοῦντας. 'While doing
    evil' mirrors the chosen rendering of the first participle and preserves the parallelism.
