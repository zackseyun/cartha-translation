theological_decisions:
- issue: Meaning of 'weaker vessel'
  chosen_reading: Retained as a comparative description of relative weakness/vulnerability,
    not inferiority in dignity or spiritual status.
  alternative_readings:
  - physically weaker
  - socially more vulnerable
  - emotionally weaker
  rationale: The immediate context balances the phrase with the command to honor the
    woman and with the statement that wives are 'also fellow heirs of the grace of
    life.' The translation should preserve the metaphor without importing a specific
    modern explanation into the main text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
- issue: Referent of shared inheritance
  chosen_reading: Wives are included equally as 'fellow heirs of the grace of life.'
  alternative_readings:
  - fellow heirs with husbands of eternal life
  - fellow heirs of God's gracious gift of life more broadly
  rationale: The text explicitly grounds the husband's honoring conduct in the wife's
    shared heirship. The translation preserves this without narrowing the inheritance
    beyond the phrase used.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
