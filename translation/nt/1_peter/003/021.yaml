theological_decisions:
- issue: Relation of baptism to salvation
  chosen_reading: Retain the direct statement 'baptism now also saves you' and let
    Peter's own qualification define the sense.
  alternative_readings:
  - Paraphrasing to weaken the statement, e.g., 'baptism symbolizes salvation'
  - Expanding the statement to specify a denominational sacramental theology
  rationale: The text explicitly attributes a saving role to baptism, yet immediately
    clarifies that this is not mere bodily washing but is bound up with conscience
    before God and the resurrection of Jesus. To preserve theological tension and
    avoid denominational overreach, the translation keeps the direct wording without
    explanatory additions.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of ἐπερώτημα in baptismal context
  chosen_reading: Render ἐπερώτημα as 'appeal' in the main text, with 'pledge' preserved
    in a footnote.
  alternative_readings:
  - pledge
  - answer
  rationale: The term is genuinely debated. 'Appeal' fits well with εἰς θεόν and preserves
    the sense of calling upon God; 'pledge' has substantial support and should be
    preserved for auditability rather than suppressed.
  doctrine_reference: Translation philosophy §3
