id: 1PE.3.21
reference: 1 Peter 3:21
source:
  edition: SBLGNT
  text: ὃ ⸂καὶ ὑμᾶς ἀντίτυπον νῦν⸃ σῴζει βάπτισμα, οὐ σαρκὸς ἀπόθεσις ῥύπου ἀλλὰ συνειδήσεως
    ἀγαθῆς ἐπερώτημα εἰς θεόν, δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ,
translation:
  text: Corresponding to that, baptism now also saves you—not the removal of dirt
    from the flesh, but an appeal to God from a good conscience—through the resurrection
    of Jesus Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but the pledge of a good conscience to God.' The Greek term rendered
      'appeal' (ἐπερώτημα) can also be understood as 'pledge' or 'answer.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντίτυπον
  chosen: Corresponding to that
  alternatives:
  - which corresponds to this
  - as an antitype
  lexicon: BDAG
  rationale: The adjective/neuter nominative singular refers back to the preceding
    flood/water event as a corresponding figure. 'Corresponding to that' is natural
    English and preserves the typological linkage without importing later technical
    sacramental language. 'Antitype' is more formal but less accessible.
- source_word: σῴζει
  chosen: saves
  alternatives:
  - is saving
  lexicon: BDAG
  rationale: Present indicative is best rendered with simple present in English. The
    verb should remain direct and unsoftened; the verse explicitly says baptism 'saves,'
    while the following qualifiers explain the sense.
- source_word: βάπτισμα
  chosen: baptism
  lexicon: BDAG
  rationale: Standard rendering; no contextual reason to paraphrase as 'washing' since
    Peter immediately distinguishes it from mere physical washing.
- source_word: σαρκὸς
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' in literal contexts.
    Here the contrast is with physical dirt, so literal 'flesh' is preferable to interpretive
    'body'.
- source_word: ἀπόθεσις ῥύπου
  chosen: the removal of dirt
  alternatives:
  - the putting away of filth
  - the washing off of dirt
  lexicon: BDAG
  rationale: This phrase denotes physical cleansing. 'Removal of dirt' is idiomatic
    modern English and preserves Peter's denial that baptism is merely external washing.
- source_word: συνειδήσεως ἀγαθῆς
  chosen: from a good conscience
  alternatives:
  - of a good conscience
  - for a good conscience
  lexicon: BDAG
  rationale: The genitive modifies ἐπερώτημα and is difficult to represent neatly
    in English. 'From a good conscience' captures the likely sense that the appeal/request
    arises out of a conscience made right before God, while avoiding overprecision
    where the Greek is compressed.
- source_word: ἐπερώτημα
  chosen: an appeal
  alternatives:
  - a pledge
  - an answer
  - a request
  lexicon: BDAG
  rationale: This is a major crux. The noun can denote an appeal/request or, in some
    contexts, a pledge/answer. 'Appeal' best fits the direction εἰς θεόν ('to God')
    and avoids importing a specifically baptismal vow theology into the main text.
    Because the term is contested, the alternative 'pledge' is preserved in a footnote.
- source_word: εἰς θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: 'Simple directional sense is most natural here with ἐπερώτημα: an appeal
    directed to God.'
- source_word: δι’ ἀναστάσεως
  chosen: through the resurrection
  alternatives:
  - by means of the resurrection
  lexicon: BDAG
  rationale: διά with genitive expresses means/instrumentality. 'Through' is concise
    and natural.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title rather than a fixed name-like form. Here the confessional/theological force
    remains title-like, so 'Messiah' is preferred.
