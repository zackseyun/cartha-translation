id: 1PE.3.15
reference: 1 Peter 3:15
source:
  edition: SBLGNT
  text: κύριον δὲ τὸν ⸀Χριστὸν ἁγιάσατε ἐν ταῖς καρδίαις ὑμῶν, ⸀ἕτοιμοι ἀεὶ πρὸς ἀπολογίαν
    παντὶ τῷ αἰτοῦντι ὑμᾶς λόγον περὶ τῆς ἐν ὑμῖν ἐλπίδος,
translation:
  text: But regard the Messiah as Lord in your hearts, always ready to give a defense
    to everyone who asks you for a reason concerning the hope that is in you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “sanctify the Messiah as Lord in your hearts.”
    reason: lexical_alternative
  - marker: b
    text: Some English versions read “Christ as Lord”; the Greek title Χριστός is
      rendered here as “Messiah.”
    reason: alternative_reading
lexical_decisions:
- source_word: κύριον ... Χριστὸν
  chosen: the Messiah as Lord
  alternatives:
  - Christ as Lord
  - the Lord Messiah
  lexicon: BDAG
  rationale: 'The construction is best taken together with ἁγιάσατε: ''sanctify/regard
    as holy the Messiah as Lord.'' Per doctrine, Χριστός as a title is rendered ''Messiah,''
    and κύριος is rendered ''Lord.'' This also preserves the likely echo of Isa 8:13
    while making the christological identification explicit in Peter''s wording.'
- source_word: ἁγιάσατε
  chosen: regard ... as Lord
  alternatives:
  - sanctify
  - set apart as holy
  lexicon: BDAG
  rationale: Literally 'sanctify' or 'set apart as holy.' In English, with a personal
    object and title complement, 'regard ... as Lord' communicates the force idiomatically
    without implying that Christ becomes holy by human action. The holiness/set-apart
    sense is carried by the reverential acknowledgment of his lordship.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  lexicon: BDAG
  rationale: Standard rendering preserving the inner-person sense of καρδία and the
    locative phrase.
- source_word: ἕτοιμοι ἀεὶ
  chosen: always ready
  alternatives:
  - ready at all times
  lexicon: BDAG
  rationale: Natural English equivalent that preserves both the predicate adjective
    and the adverb ἀεί.
- source_word: πρὸς ἀπολογίαν
  chosen: to give a defense
  alternatives:
  - for a defense
  - for an answer
  lexicon: BDAG
  rationale: ἀπολογία denotes a defense, explanation, or reply. 'Give a defense' is
    idiomatic in English and preserves the apologetic/legal nuance better than the
    vaguer 'answer'.
- source_word: παντὶ τῷ αἰτοῦντι ὑμᾶς
  chosen: to everyone who asks you
  alternatives:
  - to anyone asking you
  lexicon: BDAG
  rationale: παντί is inclusive and αἰτοῦντι is a present participle; this rendering
    preserves the distributive sense in natural English.
- source_word: λόγον
  chosen: a reason
  alternatives:
  - an account
  - an explanation
  - a word
  lexicon: BDAG
  rationale: In this context λόγος means an account or reasoned explanation. 'Reason'
    fits the collocation with ἀπολογία and the object of inquiry.
- source_word: περὶ τῆς ἐν ὑμῖν ἐλπίδος
  chosen: concerning the hope that is in you
  alternatives:
  - about the hope in you
  lexicon: BDAG
  rationale: A close but readable rendering of the prepositional phrase, preserving
    the internal/possessive sense of ἐν ὑμῖν.
