theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated 'Messiah' where it functions
    as a title rather than a name-like form. Here it is articular and paired with
    κύριος in a confessional expression, so the titular sense is strong.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of ἁγιάσατε with Christ as object
  chosen_reading: regard the Messiah as Lord
  alternative_readings:
  - sanctify the Messiah as Lord
  - set apart the Messiah as Lord as holy
  rationale: The verse does not suggest believers make Christ holy; rather, they acknowledge
    and honor him as holy Lord in their hearts. The chosen rendering avoids theological
    misunderstanding while preserving the imperative's reverential force.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source meaning without
    importing doctrinal claims'
