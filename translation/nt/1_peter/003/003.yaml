id: 1PE.3.3
reference: 1 Peter 3:3
source:
  edition: SBLGNT
  text: ὧν ἔστω οὐχ ὁ ἔξωθεν ἐμπλοκῆς τριχῶν καὶ περιθέσεως χρυσίων ἢ ἐνδύσεως ἱματίων
    κόσμος,
translation:
  text: Do not let your adornment be the outward one—braiding of hair, wearing of
    gold jewelry, or putting on of clothing—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''whose adornment must not be merely outward: braided hair, gold ornaments,
      or fine clothing.'' Peter''s point is the priority of inner character over external
      display, not a blanket ban on grooming or dress.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὧν
  chosen: your
  alternatives:
  - whose
  lexicon: BDAG
  rationale: Genitive plural relative pronoun referring back to the women/wives addressed
    in the previous verse. In idiomatic English, the possessive sense is best carried
    by 'your' rather than a more wooden 'whose' construction.
- source_word: ἔστω
  chosen: Do not let ... be
  alternatives:
  - let ... not be
  - must not be
  lexicon: BDAG
  rationale: Third-person present imperative of εἰμί. English commonly renders this
    prohibitive imperative with 'Do not let ... be' to preserve the exhortational
    force without sounding unnatural.
- source_word: οὐχ
  chosen: Do not
  alternatives:
  - not
  lexicon: BDAG
  rationale: 'Negates the imperative construction. In English it is best brought forward
    with the imperative verb phrase: ''Do not let...''.'
- source_word: ὁ ἔξωθεν ... κόσμος
  chosen: the outward ... adornment
  alternatives:
  - the outward adorning
  - external adornment
  lexicon: BDAG
  rationale: κόσμος here does not mean 'world' but 'adornment/arrangement.' The attributive
    ἔξωθεν marks it as external or outward. 'Adornment' is clear modern English and
    preserves the contrast with the inner person in the next verse.
- source_word: ἐμπλοκῆς τριχῶν
  chosen: braiding of hair
  alternatives:
  - braided hair
  - plaiting of hair
  lexicon: BDAG
  rationale: The genitive construction denotes the specific kind of outward adornment
    in view. 'Braiding of hair' is a natural rendering that preserves the verbal-noun
    force of ἐμπλοκή.
- source_word: περιθέσεως χρυσίων
  chosen: wearing of gold jewelry
  alternatives:
  - putting on of gold ornaments
  - wearing gold
  lexicon: BDAG
  rationale: περίθεσις is the act of putting on/placing around; χρυσίων refers to
    gold items, likely ornaments/jewelry. 'Wearing of gold jewelry' communicates the
    sense clearly in contemporary English.
- source_word: ἢ
  chosen: or
  alternatives:
  - or even
  lexicon: BDAG
  rationale: Simple disjunction in a list.
- source_word: ἐνδύσεως ἱματίων
  chosen: putting on of clothing
  alternatives:
  - wearing of clothes
  - putting on garments
  lexicon: BDAG
  rationale: A formal rendering is retained because Peter is listing external modes
    of adornment in parallel genitive phrases. 'Clothing' is more natural than 'garments'
    for modern readers.
