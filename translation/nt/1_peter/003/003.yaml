theological_decisions:
- issue: Whether Peter absolutely forbids external grooming and clothing or comparatively
    subordinates it to inner character
  chosen_reading: Comparative/subordinating sense preserved by wording that focuses
    on what their adornment is not to be centered on
  alternative_readings:
  - Absolute prohibition of braiding hair, jewelry, and clothing
  rationale: The immediate context in v. 4 contrasts outward adornment with 'the hidden
    person of the heart,' indicating priority rather than a literal ban on all external
    dress. The translation keeps the Greek negated imperative while avoiding an overextended
    doctrinal reading that would imply Christians should not wear clothing at all.
  doctrine_reference: Preserve theological tension rather than resolve it
