theological_decisions:
- issue: Gendered sibling language in φιλάδελφοι
  chosen_reading: loving as brothers
  alternative_readings:
  - loving one another as brothers and sisters
  - brotherly
  rationale: Following the stated gender-accurate philosophy, the translation preserves
    the familial sibling imagery of the Greek rather than neutralizing it. Because
    the term functions representatively for the mixed Christian community, an inclusive
    explanatory alternative is preserved in a footnote rather than moved into the
    main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Textual form of the final adjective
  chosen_reading: ταπεινόφρονες = humble-minded
  alternative_readings:
  - φιλόφρονες = courteous/friendly
  rationale: The provided source text is SBLGNT, which reads ταπεινόφρονες. The alternative
    reading is textually significant and worth preserving in a footnote, but should
    not replace the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
