id: 1PE.3.8
reference: 1 Peter 3:8
source:
  edition: SBLGNT
  text: Τὸ δὲ τέλος πάντες ὁμόφρονες, συμπαθεῖς, φιλάδελφοι, εὔσπλαγχνοι, ⸀ταπεινόφρονες,
translation:
  text: Finally, all of you, be like-minded, sympathetic, loving as brothers, tenderhearted,
    humble-minded,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of brotherly love'; the Greek uses sibling-family language, with
      an inclusive sense for the believing community.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'courteous' or 'friendly' instead of 'humble-minded.'
    reason: textual_variant
lexical_decisions:
- source_word: Τὸ δὲ τέλος
  chosen: Finally
  alternatives:
  - To sum up
  - In the end
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing a concluding summary of exhortations.
    'Finally' is natural English and fits the paraenetic flow better than a more wooden
    'the end.'
- source_word: πάντες
  chosen: all of you
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The vocative-like nominative addresses the whole audience directly. 'All
    of you' makes the collective address explicit in natural English.
- source_word: ὁμόφρονες
  chosen: like-minded
  alternatives:
  - of one mind
  - harmonious
  lexicon: BDAG
  rationale: Conveys shared mindset or unity of outlook. 'Like-minded' is clear modern
    English and preserves the cognitive element of the compound.
- source_word: συμπαθεῖς
  chosen: sympathetic
  alternatives:
  - compassionate
  - understanding
  lexicon: BDAG
  rationale: Retains the sense of sharing in others' feelings. 'Sympathetic' is a
    close lexical equivalent without over-paraphrasing.
- source_word: φιλάδελφοι
  chosen: loving as brothers
  alternatives:
  - brotherly
  - loving one another as brothers and sisters
  - full of brotherly love
  lexicon: BDAG
  rationale: The adjective denotes familial affection among siblings in the believing
    community. Because the Greek uses sibling-family language with masculine form,
    'loving as brothers' preserves the source imagery while remaining intelligible.
    A more explicitly inclusive expansion would go beyond the wording of the text.
- source_word: εὔσπλαγχνοι
  chosen: tenderhearted
  alternatives:
  - compassionate
  - kindhearted
  lexicon: BDAG
  rationale: This term denotes deep inward compassion or warmhearted mercy. 'Tenderhearted'
    captures both affective warmth and moral disposition in readable English.
- source_word: ταπεινόφρονες
  chosen: humble-minded
  alternatives:
  - humble
  - courteous
  lexicon: BDAG
  rationale: The best-attested reading means humble in mindset or attitude. 'Humble-minded'
    preserves the mental/dispositional nuance of the compound better than the simpler
    'humble.' 'Courteous' reflects a later textual variant rather than the SBLGNT
    reading.
