id: 1PE.3.5
reference: 1 Peter 3:5
source:
  edition: SBLGNT
  text: οὕτως γάρ ποτε καὶ αἱ ἅγιαι γυναῖκες αἱ ἐλπίζουσαι ⸀εἰς θεὸν ἐκόσμουν ἑαυτάς,
    ὑποτασσόμεναι τοῖς ἰδίοις ἀνδράσιν,
translation:
  text: For in this way formerly the holy women who hoped in God also adorned themselves,
    submitting to their own husbands,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who set their hope on God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Adverb pointing back to the manner just described in the preceding context.
    'In this way' is natural modern English and preserves the demonstrative force
    better than bare 'thus'.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/ground for the preceding exhortation. 'For' is the
    most straightforward discourse connector here.
- source_word: ποτε
  chosen: formerly
  alternatives:
  - once
  - in former times
  lexicon: BDAG
  rationale: Temporal adverb referring to women of earlier generations. 'Formerly'
    fits the exemplary-historical sense in context.
- source_word: ἅγιαι γυναῖκες
  chosen: the holy women
  alternatives:
  - the saintly women
  - the women who were holy
  lexicon: BDAG
  rationale: Retains the attributive adjective and the article. 'Holy' is the standard
    rendering of ἅγιος and should not be weakened to merely 'godly' without necessity.
- source_word: ἐλπίζουσαι εἰς θεὸν
  chosen: who hoped in God
  alternatives:
  - who set their hope on God
  - who were hoping in God
  lexicon: BDAG
  rationale: Present participle used attributively to characterize these women. 'Hoped
    in God' is concise and idiomatic enough, while preserving the direct object of
    hope. 'Set their hope on God' is possible but slightly more interpretive.
- source_word: ἐκόσμουν ἑαυτάς
  chosen: adorned themselves
  alternatives:
  - made themselves beautiful
  - beautified themselves
  lexicon: BDAG
  rationale: κοσμέω here refers to adornment, linking with the immediate context about
    true beauty/adornment. 'Adorned themselves' preserves the lexical connection without
    oversexualizing or flattening the metaphor.
- source_word: ὑποτασσόμεναι
  chosen: submitting
  alternatives:
  - being subject
  - subjecting themselves
  lexicon: BDAG
  rationale: Present participle expressing the manner in which they adorned themselves.
    'Submitting' is natural English and avoids the stiffness of 'being subject' while
    preserving the participial relation.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  chosen: to their own husbands
  alternatives:
  - to their own men
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; in household context and with ἰδίοις,
    'husbands' is clearly intended. 'Their own' should be retained because it is explicit
    in the Greek and limits the scope to the marital relationship.
