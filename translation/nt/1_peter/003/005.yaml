theological_decisions:
- issue: Rendering the exhortation regarding marital submission
  chosen_reading: submitting to their own husbands
  alternative_readings:
  - being subject to their husbands
  - subjecting themselves to their own husbands
  rationale: The verse describes the conduct of exemplary holy women in marriage.
    The translation preserves the participial form and the relational limitation 'their
    own husbands' without expanding the statement into a broader doctrinal claim about
    all women and all men. This maintains the text's scope and avoids importing denominational
    distinctives.
  doctrine_reference: Translation philosophy §§1, 3, 4
