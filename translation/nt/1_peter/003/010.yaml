theological_decisions:
- issue: Generic singular and gender representation
  chosen_reading: Use 'the one who' in the subject, but idiomatic possessives 'his
    tongue' and 'his lips' for the singular generic person.
  alternative_readings:
  - 'Use fully gender-neutral possessives: ''their tongue ... their lips'''
  - 'Use explicitly masculine wording throughout: ''the man who ... his tongue ...
    his lips'''
  rationale: The Greek is singular and representative. Per the translation philosophy,
    gender accuracy should match source intent. 'The one who' preserves generic force
    naturally, while singular possessives maintain coherence in English. This does
    not import male-specific meaning but reflects the singular moral exhortation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
