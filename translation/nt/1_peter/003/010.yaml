id: 1PE.3.10
reference: 1 Peter 3:10
source:
  edition: SBLGNT
  text: ὁ γὰρ θέλων ζωὴν ἀγαπᾶν καὶ ἰδεῖν ἡμέρας ἀγαθὰς παυσάτω τὴν ⸀γλῶσσαν ἀπὸ κακοῦ
    καὶ ⸀χείλη τοῦ μὴ λαλῆσαι δόλον,
translation:
  text: For the one who wants to love life and see good days must keep his tongue
    from evil and his lips from speaking deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from speaking guile.' The Greek noun can denote deceit, treachery, or
      guile.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... θέλων
  chosen: the one who wants
  alternatives:
  - whoever wants
  - the man who desires
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    generically to any person. 'The one who wants' preserves the singular form and
    representative force without over-specifying gender in the main text.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the scriptural support or explanation for the preceding exhortation;
    'For' is the most natural connective in context.
- source_word: ζωὴν ἀγαπᾶν
  chosen: to love life
  alternatives:
  - to love his life
  - to cherish life
  lexicon: BDAG
  rationale: A straightforward infinitival expression. 'Love life' is idiomatic English
    and reflects the Greek closely without adding possessive nuance absent from the
    text.
- source_word: ἰδεῖν ἡμέρας ἀγαθὰς
  chosen: and see good days
  alternatives:
  - and experience good days
  - and see prosperous days
  lexicon: BDAG
  rationale: Retains the concrete verb 'see' from the Greek while allowing the idiom
    to convey experiencing favorable days. 'Good' is preferred over 'prosperous' because
    ἀγαθός is broader than material prosperity.
- source_word: παυσάτω
  chosen: must keep
  alternatives:
  - let him stop
  - must restrain
  - let him cease
  lexicon: BDAG
  rationale: Although formally an aorist imperative ('let him stop/cease'), in English
    the sense here is a general moral injunction to refrain. 'Must keep ... from'
    communicates the imperative force naturally with the following complements.
- source_word: τὴν γλῶσσαν ἀπὸ κακοῦ
  chosen: his tongue from evil
  alternatives:
  - the tongue from evil
  - his tongue from what is evil
  lexicon: BDAG
  rationale: English idiom normally supplies a possessive with body parts in such
    exhortations. 'Evil' is kept broad, matching the Greek genitive after ἀπό and
    the Psalm citation background.
- source_word: χείλη
  chosen: his lips
  alternatives:
  - the lips
  lexicon: BDAG
  rationale: As with 'tongue,' English idiom favors the possessive. The plural concrete
    image is retained.
- source_word: τοῦ μὴ λαλῆσαι δόλον
  chosen: from speaking deceit
  alternatives:
  - from speaking guile
  - so as not to speak deceit
  - from uttering deceit
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses prevention/purpose after the
    verb of restraint. 'Speaking deceit' is clear modern English. 'Guile' is traditional
    but less accessible for the target audience.
