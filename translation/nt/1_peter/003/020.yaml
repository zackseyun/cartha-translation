theological_decisions:
- issue: Potentially loaded soteriological wording in διεσώθησαν
  chosen_reading: were brought safely through water
  alternative_readings:
  - were saved through water
  - were saved by water
  rationale: The Greek verb can be rendered 'saved,' but in this immediate narrative
    context it refers to preservation through the flood. Using 'brought safely through'
    preserves the concrete event while allowing the following baptism typology to
    emerge from the text rather than from imported doctrinal language. The common
    alternative is preserved in a footnote because of its interpretive significance.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Rendering ψυχαί
  chosen_reading: persons
  alternative_readings:
  - souls
  rationale: The verse counts human beings aboard the ark, not making a technical
    statement about the soul. 'Persons' is the clearest English equivalent, while
    'souls' is preserved in a footnote because of its familiarity and literal connection.
  doctrine_reference: Translation philosophy §6, readable modern English, not archaic
    or academic
