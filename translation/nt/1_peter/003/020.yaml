id: 1PE.3.20
reference: 1 Peter 3:20
source:
  edition: SBLGNT
  text: ἀπειθήσασίν ποτε ὅτε ἀπεξεδέχετο ἡ τοῦ θεοῦ μακροθυμία ἐν ἡμέραις Νῶε κατασκευαζομένης
    κιβωτοῦ εἰς ἣν ⸀ὀλίγοι, τοῦτ’ ἔστιν ὀκτὼ ψυχαί, διεσώθησαν δι’ ὕδατος.
translation:
  text: who formerly were disobedient, when the patience of God was waiting in the
    days of Noah while the ark was being prepared, into which a few—that is, eight
    persons—were brought safely through water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eight souls.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were saved through water.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπειθήσασίν
  chosen: were disobedient
  alternatives:
  - did not obey
  - were unbelieving
  lexicon: BDAG
  rationale: Aorist participle of ἀπειθέω denotes refusal to obey or disobedience.
    'Were disobedient' fits the participial reference to the people of Noah's day
    and avoids narrowing the term to mere intellectual unbelief.
- source_word: ποτε
  chosen: formerly
  alternatives:
  - once
  - at one time
  lexicon: BDAG
  rationale: ποτε here marks a past time relative to the main discourse. 'Formerly'
    reads naturally in English and connects smoothly with the participle.
- source_word: ἀπεξεδέχετο
  chosen: was waiting
  alternatives:
  - was patiently waiting
  - was expecting
  lexicon: BDAG
  rationale: The imperfect middle of ἀπεκδέχομαι conveys ongoing waiting or expectation.
    Because μακροθυμία already supplies the patience idea, 'was waiting' avoids redundancy
    in English while preserving the progressive sense.
- source_word: μακροθυμία
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: '''Patience'' is clear modern English and captures God''s restrained
    delay of judgment. ''Longsuffering'' is more traditional but less natural for
    the target audience.'
- source_word: κατασκευαζομένης
  chosen: was being prepared
  alternatives:
  - was being built
  - was being constructed
  lexicon: BDAG
  rationale: The participle means being prepared or made ready. Since κιβωτός can
    suggest a vessel under construction, 'was being prepared' preserves the broader
    sense without over-specifying the process.
- source_word: κιβωτοῦ
  chosen: the ark
  alternatives:
  - the chest
  - the vessel
  lexicon: BDAG
  rationale: In the Noah context, 'ark' is the established and accurate rendering.
- source_word: εἰς ἣν
  chosen: into which
  alternatives:
  - in which
  lexicon: BDAG
  rationale: εἰς normally indicates movement into, not merely location. 'Into which'
    preserves the preposition's force more precisely than the traditional 'wherein/in
    which.'
- source_word: ὀλίγοι
  chosen: a few
  alternatives:
  - few
  lexicon: BDAG
  rationale: Idiomatic English prefers the indefinite article here. The point is the
    small number saved.
- source_word: ψυχαί
  chosen: persons
  alternatives:
  - souls
  - lives
  lexicon: BDAG
  rationale: Although literally 'souls,' ψυχή can stand for persons. 'Persons' communicates
    the referent clearly in contemporary English and avoids suggesting an anthropological
    distinction not intended here.
- source_word: διεσώθησαν
  chosen: were brought safely
  alternatives:
  - were saved
  - were brought through safely
  lexicon: BDAG
  rationale: διασῴζω emphasizes being brought safely through danger. 'Were brought
    safely' preserves that nuance better than the more theologically loaded but less
    specific 'were saved.'
- source_word: δι’ ὕδατος
  chosen: through water
  alternatives:
  - by water
  - through the water
  lexicon: BDAG
  rationale: διά with the genitive normally indicates means or agency, but in this
    context 'through water' best reflects passage amid the floodwaters and aligns
    with the typological connection to baptism in the following verse.
