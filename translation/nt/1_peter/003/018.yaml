theological_decisions:
- issue: Meaning of the flesh/spirit contrast in the final clause
  chosen_reading: Rendered as 'in the flesh ... in the spirit' to preserve the parallel
    datives as spheres/aspects rather than explicitly identifying 'Spirit' as the
    Holy Spirit in the main text.
  alternative_readings:
  - '''in the body ... in the spirit'''
  - '''by the Spirit'' as explicit agency of the Holy Spirit'
  rationale: The Greek text is compact and debated. A capitalized 'Spirit' or an explicit
    agentive rendering would resolve an ambiguity the text itself leaves open. The
    chosen wording preserves Chalcedonian compatibility and the text's tension without
    importing a narrower doctrinal conclusion.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
- issue: Substitutionary force of 'the righteous for the unrighteous'
  chosen_reading: Retained the representative/substitutionary wording 'the righteous
    for the unrighteous' without expanding it into a fuller atonement theory.
  alternative_readings:
  - More interpretive paraphrases such as 'the innocent in place of the guilty'
  rationale: The verse clearly presents Messiah's suffering as on behalf of others,
    but the translation should not import a more developed doctrinal formulation than
    the Greek states.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
