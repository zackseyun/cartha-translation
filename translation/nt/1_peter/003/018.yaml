id: 1PE.3.18
reference: 1 Peter 3:18
source:
  edition: SBLGNT
  text: ὅτι καὶ Χριστὸς ἅπαξ περὶ ἁμαρτιῶν ⸀ἔπαθεν, δίκαιος ὑπὲρ ἀδίκων, ἵνα ⸀ὑμᾶς
    προσαγάγῃ τῷ θεῷ, θανατωθεὶς μὲν σαρκὶ ζῳοποιηθεὶς δὲ πνεύματι·
translation:
  text: For Messiah also suffered once for sins, the righteous for the unrighteous,
    so that he might bring you to God, having been put to death in the flesh but made
    alive in the spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'died' instead of 'suffered.'
    reason: textual_variant
  - marker: b
    text: Or 'made alive by the Spirit.' The Greek may refer either to the sphere/aspect
      of spirit or to the agency of the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name-like form in keeping with the project's
    default for Χριστός; this preserves the messianic sense.
- source_word: ἅπαξ
  chosen: once
  alternatives:
  - once for all
  lexicon: BDAG
  rationale: ἅπαξ straightforwardly means 'once.' 'Once for all' captures a common
    theological implication but adds emphasis not explicit in the single adverb here.
- source_word: περὶ ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - concerning sins
  - because of sins
  lexicon: BDAG
  rationale: In sacrificial/redemptive contexts περί with genitive commonly carries
    the sense 'for' with reference to sins. This is the most natural English rendering
    here.
- source_word: ἔπαθεν
  chosen: suffered
  alternatives:
  - died
  lexicon: BDAG
  rationale: The attested SBLGNT reading is ἔπαθεν ('suffered'), not ἀπέθανεν ('died').
    'Suffered' should therefore stand in the main text, while the textual alternative
    is worth preserving in a footnote because of its familiarity and interpretive
    significance.
- source_word: δίκαιος
  chosen: the righteous
  alternatives:
  - a righteous one
  - the just
  lexicon: BDAG
  rationale: With reference to Messiah in contrast to 'the unrighteous,' the substantival
    adjective is best rendered as 'the righteous.' This preserves the representative
    contrast.
- source_word: ὑπὲρ ἀδίκων
  chosen: for the unrighteous
  alternatives:
  - on behalf of the unrighteous
  - for the unjust
  lexicon: BDAG
  rationale: ὑπέρ here expresses substitutionary/representative benefit. 'For the
    unrighteous' is concise and preserves that force without over-specifying a doctrinal
    model.
- source_word: προσαγάγῃ
  chosen: might bring
  alternatives:
  - might bring near
  - might lead into access
  lexicon: BDAG
  rationale: The verb can mean to bring into someone's presence or grant access. 'Bring
    you to God' is idiomatic and preserves the relational/access sense without awkwardness.
- source_word: θανατωθεὶς
  chosen: having been put to death
  alternatives:
  - being put to death
  - killed
  lexicon: BDAG
  rationale: The aorist passive participle is well represented by 'having been put
    to death.' This preserves both passive voice and the participial relation to the
    main clause.
- source_word: σαρκὶ
  chosen: in the flesh
  alternatives:
  - in flesh
  - in the body
  - with respect to the flesh
  lexicon: BDAG
  rationale: Given the contrast with πνεύματι and the doctrine guidance on σάρξ, 'flesh'
    should be retained rather than interpreted as 'sinful nature.' Here it refers
    to the sphere/aspect of embodied mortal existence.
- source_word: ζῳοποιηθεὶς
  chosen: made alive
  alternatives:
  - given life
  - vivified
  lexicon: BDAG
  rationale: '''Made alive'' is the standard, clear rendering of the passive participle
    and avoids overly technical English.'
- source_word: πνεύματι
  chosen: in the spirit
  alternatives:
  - by the Spirit
  - in spirit
  lexicon: BDAG
  rationale: The dative is ambiguous between sphere/reference and agency. To preserve
    theological tension rather than resolve it, 'in the spirit' is kept in the main
    text, with the agency reading ('by the Spirit') preserved in a footnote.
