theological_decisions:
- issue: Nature of ὑποτασσόμεναι in household instruction
  chosen_reading: Render as 'being subject to' without importing stronger notions
    such as absolute obedience or inferiority.
  alternative_readings:
  - submitting to
  - obeying
  rationale: The verse gives a household-order exhortation but does not itself state
    ontological inferiority or use the stronger verb for obedience. The translation
    preserves the relational ordering expressed by ὑποτάσσω without adding doctrinal
    claims beyond the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of ἀπειθοῦσιν τῷ λόγῳ
  chosen_reading: Translate as 'are disobeying the word' while preserving the gospel-belief
    sense in a footnote.
  alternative_readings:
  - do not believe the message
  - refuse to obey the gospel
  rationale: The Greek verb can encompass both unbelief and disobedience. Keeping
    'disobeying the word' preserves the lexical force and theological tension between
    belief and obedience, while the footnote notes the interpretive alternative.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
