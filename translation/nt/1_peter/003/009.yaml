theological_decisions:
- issue: Nature of the calling in εἰς τοῦτο ἐκλήθητε
  chosen_reading: The clause refers to believers being called by God to the countercultural
    practice of blessing in response to mistreatment, with the purpose that they inherit
    blessing.
  alternative_readings:
  - The calling refers more broadly to the Christian life of suffering and non-retaliation
    as a whole.
  rationale: The immediate context favors linking 'to this' with the exhortation just
    given, especially the command to bless rather than retaliate. The translation
    keeps the referent broad enough not to over-specify beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
