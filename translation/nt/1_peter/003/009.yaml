id: 1PE.3.9
reference: 1 Peter 3:9
source:
  edition: SBLGNT
  text: μὴ ἀποδιδόντες κακὸν ἀντὶ κακοῦ ἢ λοιδορίαν ἀντὶ λοιδορίας τοὐναντίον δὲ ⸀εὐλογοῦντες,
    ὅτι εἰς τοῦτο ἐκλήθητε ἵνα εὐλογίαν κληρονομήσητε.
translation:
  text: not repaying evil for evil or insult for insult, but on the contrary blessing,
    because you were called to this, so that you might inherit a blessing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reviling for reviling.' The Greek term can denote abusive or insulting
      speech.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''but instead.'' The Greek expression marks a strong reversal: ''on
      the contrary.'''
    reason: lexical_alternative
  - marker: c
    text: That is, called by God to respond to mistreatment with blessing rather than
      retaliation.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποδιδόντες
  chosen: repaying
  alternatives:
  - returning
  - paying back
  lexicon: BDAG
  rationale: Present participle with μή in a paraenetic context; 'repaying' preserves
    the reciprocal sense of giving back in response to prior treatment without sounding
    overly wooden.
- source_word: κακὸν ἀντὶ κακοῦ
  chosen: evil for evil
  alternatives:
  - harm for harm
  - wrong for wrong
  lexicon: BDAG
  rationale: A standard ethical contrast in early Christian exhortation. 'Evil' best
    preserves the moral weight of κακός here, while 'for' naturally renders ἀντί as
    exchange/retaliation.
- source_word: λοιδορίαν ἀντὶ λοιδορίας
  chosen: insult for insult
  alternatives:
  - reviling for reviling
  - abuse for abuse
  lexicon: BDAG
  rationale: λοιδορία refers to abusive or insulting speech. 'Insult' is clear modern
    English and fits the parallel retaliatory structure. 'Reviling' is more traditional
    but less natural for contemporary readers.
- source_word: τοὐναντίον δὲ
  chosen: but on the contrary
  alternatives:
  - but instead
  - rather
  lexicon: BDAG
  rationale: This adversative expression marks a strong reversal of expected conduct.
    'But on the contrary' preserves the emphatic contrast more fully than the simpler
    'instead,' while remaining readable.
- source_word: εὐλογοῦντες
  chosen: blessing
  alternatives:
  - speaking blessing
  - blessing them
  lexicon: BDAG
  rationale: The participle is left somewhat concise in English to match the Greek's
    terse exhortational style. 'Blessing' captures both speaking well and invoking
    God's favor, without adding an explicit object not present in the Greek.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason or ground for the exhortation. 'Because' is clearer
    in modern English than 'for' and preserves the causal force.
- source_word: εἰς τοῦτο ἐκλήθητε
  chosen: you were called to this
  alternatives:
  - you were called for this
  - you were called into this
  lexicon: BDAG
  rationale: The passive of καλέω here refers to God's calling, and εἰς τοῦτο points
    to the ethical pattern just stated. 'To this' is idiomatic and sufficiently direct.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose or intended result. 'So that' is natural modern English
    while preserving the telic sense.
- source_word: εὐλογίαν
  chosen: a blessing
  alternatives:
  - blessing
  lexicon: BDAG
  rationale: The anarthrous noun is rendered with the English indefinite article for
    idiomatic sense. It likely denotes the blessing believers receive from God as
    inheritance, and 'a blessing' reads naturally after 'inherit.'
- source_word: κληρονομήσητε
  chosen: might inherit
  alternatives:
  - may inherit
  - might receive as an inheritance
  lexicon: BDAG
  rationale: The aorist subjunctive under ἵνα is well represented by 'might inherit.'
    'Inherit' preserves the covenantal/familial nuance of receiving what is granted
    as an heir, stronger than merely 'receive.'
