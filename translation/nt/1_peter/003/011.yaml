id: 1PE.3.11
reference: 1 Peter 3:11
source:
  edition: SBLGNT
  text: ἐκκλινάτω ⸀δὲ ἀπὸ κακοῦ καὶ ποιησάτω ἀγαθόν, ζητησάτω εἰρήνην καὶ διωξάτω
    αὐτήν·
translation:
  text: But let him turn away from evil and do good; let him seek peace and pursue
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let one turn away from evil and do good; let one seek peace and pursue
      it.' The Greek uses a masculine singular form with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλινάτω
  chosen: let him turn away
  alternatives:
  - let him avoid
  - let him depart from
  lexicon: BDAG
  rationale: Aorist active imperative, third singular, calling for decisive action.
    'Turn away' preserves the directional force of ἐκκλίνω better than the flatter
    'avoid'.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast from the previous line; 'But'
    fits the exhortational flow in English.
- source_word: ἀπὸ κακοῦ
  chosen: from evil
  alternatives:
  - from what is evil
  - from harm
  lexicon: BDAG
  rationale: κακοῦ here is best taken morally, not as misfortune or injury. 'Evil'
    is concise and natural, matching the ethical contrast with 'good'.
- source_word: ποιησάτω ἀγαθόν
  chosen: do good
  alternatives:
  - do what is good
  - practice good
  lexicon: BDAG
  rationale: A standard ethical collocation. 'Do good' is idiomatic English and preserves
    the active moral sense of the Greek.
- source_word: ζητησάτω
  chosen: let him seek
  alternatives:
  - let him pursue
  - let him strive for
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'look for.' Since διωξάτω follows, rendering
    ζητησάτω as 'seek' preserves the rhetorical progression rather than collapsing
    both verbs into the same English idea.
- source_word: εἰρήνην
  chosen: peace
  alternatives:
  - wholeness
  - reconciliation
  lexicon: BDAG
  rationale: εἰρήνη retains its broad biblical sense, but 'peace' is the standard
    and sufficiently elastic English rendering here.
- source_word: διωξάτω αὐτήν
  chosen: and pursue it
  alternatives:
  - and chase after it
  - and follow after it
  lexicon: BDAG
  rationale: διώκω can mean 'pursue' strongly or even 'persecute' in other contexts;
    here the object 'peace' requires the positive sense 'pursue.' 'It' clearly refers
    back to peace.
- source_word: 3rd person singular imperatives across the verse
  chosen: let him ...
  alternatives:
  - he must ...
  - one should ...
  lexicon: Greek grammar
  rationale: The Greek uses third-person singular imperatives in a citation context.
    'Let him' preserves the form and cadence more closely than converting to a direct
    second-person or generic paraphrase.
