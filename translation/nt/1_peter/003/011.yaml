theological_decisions:
- issue: Generic masculine force in the imperative citation
  chosen_reading: Use 'let him' in the main text
  alternative_readings:
  - let one
  - let them
  - you should
  rationale: The Greek is grammatically singular and masculine in a representative
    sense, echoing the Psalm citation. Per the doctrine's gender-accurate principle,
    the translation preserves the source form rather than neutralizing it, while the
    sense remains generic.
