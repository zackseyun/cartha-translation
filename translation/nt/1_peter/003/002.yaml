theological_decisions:
- issue: Meaning of φόβος in the phrase ἐν φόβῳ
  chosen_reading: Retain the more literal 'in fear' in the main text, allowing readers
    to hear the likely sense of reverent fear before God without over-resolving the
    referent.
  alternative_readings:
  - with reverence
  - in reverence toward God
  - with respectful behavior toward husbands
  rationale: The phrase is semantically capable of expressing reverence/respect, but
    the Greek uses φόβος, not a less ambiguous term for respect. In keeping with the
    translation philosophy, the draft preserves the tension rather than collapsing
    it into a single interpretive option.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
