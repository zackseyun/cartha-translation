id: 1PE.3.22
reference: 1 Peter 3:22
source:
  edition: SBLGNT
  text: ὅς ἐστιν ἐν ⸀δεξιᾷ θεοῦ πορευθεὶς εἰς οὐρανὸν ὑποταγέντων αὐτῷ ἀγγέλων καὶ
    ἐξουσιῶν καὶ δυνάμεων.
translation:
  text: who is at the right hand of God, having gone into heaven, with angels and
    authorities and powers having been subjected to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to heaven.' The Greek more literally says 'into heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to Jesus Messiah in the previous verse;
    simple 'who' preserves the Greek linkage without adding emphasis.
- source_word: ἐν δεξιᾷ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - on the right hand of God
  - at God's right hand
  lexicon: BDAG
  rationale: Idiomatic expression for exalted position and honor. 'At the right hand
    of God' is natural English and preserves the biblical idiom without over-paraphrasing.
- source_word: πορευθεὶς
  chosen: having gone
  alternatives:
  - after going
  - having proceeded
  lexicon: BDAG
  rationale: Aorist participle indicating antecedent action relative to the main verb.
    'Having gone' preserves the participial force and verbal connection better than
    a finite paraphrase.
- source_word: εἰς οὐρανόν
  chosen: into heaven
  alternatives:
  - to heaven
  lexicon: BDAG
  rationale: εἰς normally marks movement into. 'Into heaven' reflects the directional
    force more closely than the more idiomatic but slightly less precise 'to heaven'.
- source_word: ὑποταγέντων
  chosen: having been subjected
  alternatives:
  - being subjected
  - having been made subject
  lexicon: BDAG
  rationale: Aorist passive participle, genitive absolute-like construction modifying
    the following plural nouns. 'Having been subjected' preserves both passive voice
    and completed subordination.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - under him
  lexicon: BDAG
  rationale: Dative after ὑποτάσσω commonly marks the one to whom others are subjected.
    'To him' is the most direct rendering; the sense of subordination is already carried
    by the verb.
- source_word: ἀγγέλων
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this exaltation context alongside cosmic powers, supernatural 'angels'
    is the clear sense rather than human messengers.
- source_word: ἐξουσιῶν
  chosen: authorities
  alternatives:
  - rulers
  - powers
  lexicon: BDAG
  rationale: Standard rendering for ἐξουσίαι in lists of spiritual or cosmic ranks.
    'Authorities' distinguishes it from the following δυνάμεις.
- source_word: δυνάμεων
  chosen: powers
  alternatives:
  - mighty powers
  - forces
  lexicon: BDAG
  rationale: Common NT term in cosmic-order lists. 'Powers' is concise, traditional,
    and distinct enough from 'authorities' to preserve the triadic sequence.
