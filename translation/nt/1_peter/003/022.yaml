theological_decisions:
- issue: Nature of Christ's exaltation at God's right hand
  chosen_reading: Retain the spatial-relational biblical idiom 'at the right hand
    of God' without reducing it to a mere metaphor for honor.
  alternative_readings:
  - in the place of highest honor beside God
  rationale: The phrase carries theological significance in apostolic Christology
    and is best preserved as written. A paraphrase would interpret rather than translate.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1, §3'
- issue: Identity of 'angels and authorities and powers'
  chosen_reading: Render as a broad hierarchy of heavenly/cosmic beings and powers
    subjected to Christ, without specifying whether all are good, evil, or mixed.
  alternative_readings:
  - angelic beings only
  - hostile spiritual powers specifically
  rationale: The Greek list itself does not explicitly classify these beings morally.
    Preserving the broader wording maintains the text's theological tension and avoids
    importing a narrower system.
  doctrine_reference: Translation philosophy §3
