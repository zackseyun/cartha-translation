theological_decisions:
- issue: Anthropomorphic language for God's eyes, ears, and face
  chosen_reading: Preserve the imagery directly in translation
  alternative_readings:
  - Interpretive paraphrase such as 'the Lord watches over... and listens to...'
  rationale: The verse intentionally uses embodied imagery, echoing the Psalm source,
    to communicate divine favor and opposition. Preserving the metaphors maintains
    the text's theological and literary force without implying corporeality in a crude
    sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
