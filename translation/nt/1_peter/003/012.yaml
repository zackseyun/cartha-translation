id: 1PE.3.12
reference: 1 Peter 3:12
source:
  edition: SBLGNT
  text: ὅτι ὀφθαλμοὶ κυρίου ἐπὶ δικαίους καὶ ὦτα αὐτοῦ εἰς δέησιν αὐτῶν, πρόσωπον
    δὲ κυρίου ἐπὶ ποιοῦντας κακά.
translation:
  text: For the eyes of the Lord are on the righteous, and his ears are open to their
    prayer, but the face of the Lord is against those who do evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his ears unto their prayer'; the English supplies the sense
      'are open to' for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this introduces the scriptural ground for the preceding exhortation/quotation,
    so 'For' reads naturally in English while preserving the causal force.
- source_word: ὀφθαλμοὶ κυρίου
  chosen: the eyes of the Lord
  lexicon: BDAG
  rationale: A formal rendering preserves the anthropomorphic imagery from the source
    and from the Psalm citation behind it. κύριος follows the doctrinal default 'Lord'.
- source_word: ἐπὶ δικαίους
  chosen: are on the righteous
  alternatives:
  - are toward the righteous
  - are upon the righteous
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys direction/attention toward. 'Are on'
    is idiomatic English and preserves the sense of attentive regard. δίκαιος is rendered
    substantivally as 'the righteous,' matching the plural adjective used as a noun.
- source_word: ὦτα αὐτοῦ
  chosen: his ears
  lexicon: BDAG
  rationale: Straightforward formal rendering, preserving the parallel anthropomorphic
    image.
- source_word: εἰς δέησιν αὐτῶν
  chosen: are open to their prayer
  alternatives:
  - are toward their prayer
  - are attentive to their plea
  - for their prayer
  lexicon: BDAG
  rationale: The Greek is elliptical ('his ears unto their prayer'). English normally
    supplies the implied sense of attentiveness. 'Are open to their prayer' makes
    the idiom clear without over-paraphrasing. δέησις here is 'prayer/plea'; 'prayer'
    best fits the citation's broad sense.
- source_word: πρόσωπον δὲ κυρίου
  chosen: but the face of the Lord
  alternatives:
  - and the face of the Lord
  lexicon: BDAG
  rationale: πρόσωπον is literally 'face,' and retaining it preserves the Hebrew/Greek
    idiom of personal opposition or favor. δέ is adversative here, well represented
    by 'but'.
- source_word: ἐπὶ ποιοῦντας κακά
  chosen: is against those who do evil
  alternatives:
  - is upon those doing evil
  - is against evildoers
  lexicon: BDAG
  rationale: ἐπί with accusative again indicates direction, but in this negative clause
    the idiomatic sense is hostile opposition, hence 'against.' ποιοῦντας κακά is
    a participial expression best rendered as 'those who do evil' for natural English
    while preserving the verbal force.
