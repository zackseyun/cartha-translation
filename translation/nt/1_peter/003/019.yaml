theological_decisions:
- issue: Referent of ἐν ᾧ
  chosen_reading: Rendered neutrally as 'in which,' likely referring to the preceding
    'spirit' sphere/state, without resolving the full interpretive debate.
  alternative_readings:
  - '''in whom,'' referring more directly to Messiah himself'
  - '''by which,'' taking the phrase instrumentally'
  rationale: This verse is syntactically and theologically disputed. The translation
    preserves the grammatical neuter and avoids collapsing the ambiguity into a specific
    doctrinal interpretation about the mode of Messiah's proclamation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Identity of 'the spirits in prison'
  chosen_reading: Left unspecified in the main text as 'the spirits in prison.'
  alternative_readings:
  - deceased humans from Noah's generation
  - fallen angelic beings
  - a broader class of imprisoned spirits
  rationale: The Greek phrase itself does not identify the spirits with enough precision
    to justify narrowing the referent in translation. Historic orthodox interpretations
    differ, and the translation should not settle the question beyond the text.
  doctrine_reference: 'Affirmations + Translation philosophy §3: Preserve theological
    tension rather than resolve it.'
- issue: Nature of Christ's message in ἐκήρυξεν
  chosen_reading: Rendered 'proclaimed' rather than 'preached.'
  alternative_readings:
  - preached the gospel
  - announced judgment
  - heralded victory
  rationale: The verb indicates proclamation but does not itself specify whether the
    content was evangelistic, judicial, or triumphant. 'Proclaimed' preserves that
    openness.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve ambiguity where genuine.'
