id: 1PE.3.19
reference: 1 Peter 3:19
source:
  edition: SBLGNT
  text: ἐν ᾧ καὶ τοῖς ἐν φυλακῇ πνεύμασιν πορευθεὶς ἐκήρυξεν,
translation:
  text: in which also he went and proclaimed to the spirits in prison,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whom'; alternatively, 'by which.' The Greek can be understood in
      more than one way regarding the relation to the preceding clause.
    reason: alternative_reading
  - marker: b
    text: Or 'preached.' The verb denotes making a proclamation, but the text does
      not specify the exact content of the message here.
    reason: lexical_alternative
  - marker: c
    text: The identity of 'the spirits in prison' is debated; possibilities include
      deceased humans or fallen angelic beings.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: in which
  alternatives:
  - in whom
  - by which
  lexicon: BDAG
  rationale: 'The relative pronoun is dative singular neuter, most naturally referring
    back to the immediately preceding neuter concept (''spirit'' in v. 18: ζωοποιηθεὶς
    δὲ πνεύματι). ''In which'' preserves the grammatical form and leaves the precise
    nuance open. ''In whom'' would require taking the referent more personally, and
    ''by which'' would foreground instrumentality more strongly than the Greek demands.'
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: καί here adds a further action connected with the prior clause. 'Also'
    captures the additive force cleanly in English.
- source_word: τοῖς ... πνεύμασιν
  chosen: to the spirits
  alternatives:
  - to the spiritual beings
  - to the souls
  lexicon: BDAG
  rationale: πνεύμασιν is most directly 'spirits.' 'Souls' would import a different
    Greek term, and 'spiritual beings' is interpretive. The simple rendering preserves
    the ambiguity of identity present in the Greek.
- source_word: ἐν φυλακῇ
  chosen: in prison
  alternatives:
  - in custody
  - in confinement
  lexicon: BDAG
  rationale: φυλακή can denote a place of guarding or imprisonment. 'In prison' is
    the most natural and established English equivalent here without overexplaining
    the image.
- source_word: πορευθεὶς
  chosen: he went
  alternatives:
  - having gone
  - after going
  lexicon: BDAG
  rationale: The aorist participle is commonly rendered with a finite verb in smooth
    English when linked to the main verb. 'He went' preserves the movement idea without
    forcing a temporal sequence more explicitly than the Greek does.
- source_word: ἐκήρυξεν
  chosen: proclaimed
  alternatives:
  - preached
  - announced
  - heralded
  lexicon: BDAG
  rationale: κηρύσσω means to make a public proclamation as a herald. 'Proclaimed'
    is broader and less interpretively loaded than 'preached,' which could imply evangelistic
    preaching not specified by the text.
