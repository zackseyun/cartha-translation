theological_decisions:
- issue: Meaning of φόβου in the exhortation 'with gentleness and fear'
  chosen_reading: Retain the broader term 'fear' in the main text without specifying
    its object.
  alternative_readings:
  - reverence
  - respect
  - fear of God
  rationale: The immediate context does not explicitly state the object of φόβος.
    Rendering it as 'fear' preserves the interpretive openness rather than deciding
    for a narrower paraphrase such as 'respect' or an explicit theological gloss like
    'fear of God.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as 'Messiah'
    where it functions as a title. In this phrase the title sense remains live, so
    'Messiah' is preferred, while the traditional 'Christ' is preserved as an alternative.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
