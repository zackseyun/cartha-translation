id: 1PE.3.4
reference: 1 Peter 3:4
source:
  edition: SBLGNT
  text: ἀλλ’ ὁ κρυπτὸς τῆς καρδίας ἄνθρωπος ἐν τῷ ἀφθάρτῳ τοῦ ⸂πραέως καὶ ἡσυχίου⸃
    πνεύματος, ὅ ἐστιν ἐνώπιον τοῦ θεοῦ πολυτελές.
translation:
  text: but the hidden person of the heart, in the imperishable beauty of a gentle
    and quiet spirit, which is very precious before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hidden man of the heart.' The Greek ἄνθρωπος can mean 'man' or more
      generally 'person/human being'; here it refers to the inward self.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the imperishable of a gentle and quiet spirit'; 'beauty' is
      supplied in English from the contrast with outward adornment in the previous
      verse.
    reason: lexical_alternative
  - marker: c
    text: '''Quiet'' refers to a calm, peaceable disposition, not necessarily to silence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτὸς τῆς καρδίας ἄνθρωπος
  chosen: the hidden person of the heart
  alternatives:
  - the hidden man of the heart
  - the inner person of the heart
  lexicon: BDAG
  rationale: ἄνθρωπος can mean 'human/person' rather than specifically 'male man.'
    In this context addressing women's adornment, the phrase refers to the inward
    self, so 'person' best preserves the sense without introducing unnecessary male
    specificity. 'Hidden' reflects κρυπτός more directly than the interpretive 'inner.'
- source_word: ἐν τῷ ἀφθάρτῳ
  chosen: in the imperishable beauty
  alternatives:
  - in the imperishable quality
  - with the imperishable
  lexicon: BDAG
  rationale: The dative with article and adjective is elliptical; English requires
    an implied noun. In context contrasting external adornment with inward adornment,
    'beauty' is the most natural supplied sense and matches the contrast of vv. 3–4.
    'Imperishable' is the core meaning of ἀφθάρτῳ and preserves the contrast with
    perishable outward ornament.
- source_word: πραέως
  chosen: gentle
  alternatives:
  - meek
  - humble
  lexicon: BDAG
  rationale: '''Gentle'' communicates πραΰς in clear modern English without the potential
    weakness connotations of ''meek,'' while preserving the virtue commended in the
    text.'
- source_word: ἡσυχίου
  chosen: quiet
  alternatives:
  - peaceful
  - tranquil
  lexicon: BDAG
  rationale: '''Quiet'' is the most direct rendering of ἡσύχιος here. It refers to
    a calm, non-disruptive disposition rather than enforced silence; alternatives
    are possible but less direct.'
- source_word: πνεύματος
  chosen: spirit
  alternatives:
  - disposition
  lexicon: BDAG
  rationale: '''Spirit'' is the natural lexical equivalent and preserves the text''s
    wording. Although the sense is close to ''disposition'' or ''demeanor,'' those
    are more interpretive and flatten the anthropological language.'
- source_word: ὅ ἐστιν
  chosen: which is
  alternatives:
  - this is
  lexicon: BDAG
  rationale: The relative pronoun ὅ most naturally refers to the preceding quality/spirit
    complex as a whole, so 'which is' preserves the Greek linkage.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in God's sight
  - in the sight of God
  lexicon: BDAG
  rationale: '''Before God'' is concise and faithful, expressing divine evaluation.
    ''In God''s sight'' is also good idiomatic English but slightly more interpretive.'
- source_word: πολυτελές
  chosen: very precious
  alternatives:
  - of great worth
  - costly
  - precious
  lexicon: BDAG
  rationale: πολυτελής denotes high value or costly worth. 'Very precious' communicates
    the intensification naturally in English and fits the contrast with expensive
    outward adornment in the immediate context.
