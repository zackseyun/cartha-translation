theological_decisions:
- issue: Anthropological expression in a gendered context
  chosen_reading: Render ἄνθρωπος as 'person' rather than 'man' in 'the hidden person
    of the heart.'
  alternative_readings:
  - the hidden man of the heart
  rationale: 'The phrase denotes the inward self, not maleness. This follows the project''s
    gender-accurate principle: where the Greek term is generic rather than specifically
    male, English should reflect the source intent. Because the verse addresses women,
    ''man'' in English could misleadingly suggest a male referent rather than a generic
    human one.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Supplying an implied noun with ἀφθάρτῳ
  chosen_reading: 'Supply ''beauty'' in English: ''in the imperishable beauty of a
    gentle and quiet spirit.'''
  alternative_readings:
  - in the imperishable quality of a gentle and quiet spirit
  - with the imperishable gentle and quiet spirit
  rationale: The Greek is compressed and elliptical. Given the explicit contrast with
    external adornment in v. 3, supplying 'beauty' makes the sense clear in natural
    English without over-paraphrasing. It preserves Peter's contrast between outward
    decoration and inward adornment.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 6
