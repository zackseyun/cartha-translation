id: 1PE.3.14
reference: 1 Peter 3:14
source:
  edition: SBLGNT
  text: ἀλλ’ εἰ καὶ πάσχοιτε διὰ δικαιοσύνην, μακάριοι. τὸν δὲ φόβον αὐτῶν μὴ φοβηθῆτε
    μηδὲ ταραχθῆτε,
translation:
  text: But even if you should suffer for righteousness, you are blessed. And do not
    fear their fear, nor be troubled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear of them' or 'what they fear.' The Greek phrase 'their fear' is
      intentionally retained in the main text because it closely follows the wording
      of Isaiah 8:12 and preserves the ambiguity.
    reason: alternative_reading
lexical_decisions:
- source_word: πάσχοιτε
  chosen: you should suffer
  alternatives:
  - you suffer
  - you might suffer
  lexicon: BDAG
  rationale: Present active optative, second plural, in a conditional construction
    with εἰ καὶ; 'should suffer' best conveys a potential but real possibility in
    natural English without flattening the mood.
- source_word: διὰ δικαιοσύνην
  chosen: for righteousness
  alternatives:
  - because of righteousness
  - for doing what is right
  - for justice
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason/cause. 'For righteousness'
    preserves the key theological term δικαιοσύνη and aligns with the project's default
    rendering; 'for doing what is right' is interpretive, and 'justice' is possible
    but less fitting in this Petrine ethical context.
- source_word: μακάριοι
  chosen: you are blessed
  alternatives:
  - blessed
  - fortunate
  - happy
  lexicon: BDAG
  rationale: Predicate adjective addressed to the readers; supplying 'you are' makes
    idiomatic English. 'Blessed' preserves biblical resonance better than 'fortunate'
    or 'happy,' which can sound merely circumstantial or emotional.
- source_word: τὸν ... φόβον αὐτῶν
  chosen: their fear
  alternatives:
  - fear of them
  - what they fear
  lexicon: BDAG
  rationale: 'The phrase echoes Isaiah 8:12 LXX and is syntactically ambiguous: it
    can mean the fear they inspire or the fear they themselves fear. The more literal
    ''their fear'' preserves the wording and intertextual echo in the main text, while
    alternatives are preserved in a footnote.'
- source_word: μὴ φοβηθῆτε
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: BDAG
  rationale: Aorist passive subjunctive used in prohibition after μή. 'Do not fear'
    closely matches the Greek and works well with the repeated φόβος/φοβέομαι wordplay;
    'do not be afraid' is idiomatic but loses the lexical repetition.
- source_word: μηδὲ ταραχθῆτε
  chosen: nor be troubled
  alternatives:
  - nor be disturbed
  - nor be shaken
  lexicon: BDAG
  rationale: Aorist passive subjunctive in coordinated prohibition. 'Be troubled'
    is a natural rendering that preserves the inward agitation implied by ταράσσω
    without overinterpreting the emotional state.
- source_word: ἀλλ’ εἰ καὶ
  chosen: But even if
  alternatives:
  - But if indeed
  - Yet even if
  lexicon: BDAG
  rationale: This combination marks a concessive condition. 'But even if' captures
    both the contrast with the previous verse and the concessive force.
- source_word: δὲ
  chosen: And
  alternatives:
  - But
  - ', and'
  lexicon: BDAG
  rationale: δέ here lightly advances the thought into the scriptural-style prohibition.
    'And' is smoother in English than repeating 'but' while still signaling continuation.
