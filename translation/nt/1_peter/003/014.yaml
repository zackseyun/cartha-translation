theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file lists δικαιοσύνη with default English 'righteousness,'
    preserving 'justice' as an alternative where relevant. In 1 Peter 3:14 the context
    is suffering for upright conduct before God and others, so 'righteousness' best
    preserves the moral-theological sense without narrowing it to social justice alone.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
