id: 1PE.4.16
reference: 1 Peter 4:16
source:
  edition: SBLGNT
  text: εἰ δὲ ὡς Χριστιανός, μὴ αἰσχυνέσθω, δοξαζέτω δὲ τὸν θεὸν ἐν τῷ ⸀ὀνόματι τούτῳ.
translation:
  text: But if as a Christian, let him not be ashamed, but let him glorify God in
    this name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in this matter' or 'because of this name.' The Greek more literally
      says 'in this name,' likely referring to the name 'Christian.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - But if indeed
  - Yet if
  lexicon: BDAG
  rationale: Renders the conditional particle with the mild contrastive force of δέ.
    'But if' is natural English and preserves the shift from the previous clause.
- source_word: ὡς Χριστιανός
  chosen: as a Christian
  alternatives:
  - as one called a Christian
  - as a Messiah-follower
  lexicon: BDAG
  rationale: Χριστιανός is an established designation meaning 'Christian.' Although
    the project often translates titles such as Χριστός as 'Messiah,' this noun is
    a lexicalized label rather than a transparent title construction, so standard
    English 'Christian' best reflects usage and readability.
- source_word: μὴ αἰσχυνέσθω
  chosen: let him not be ashamed
  alternatives:
  - he must not be ashamed
  - let him not feel shame
  lexicon: BDAG
  rationale: The present middle imperative is naturally rendered as a third-person
    exhortation, 'let him not be ashamed.' This preserves the imperative force without
    over-paraphrasing.
- source_word: δοξαζέτω δὲ
  chosen: but let him glorify
  alternatives:
  - but let him give glory to
  - but he should glorify
  lexicon: BDAG
  rationale: δοξάζω commonly means 'glorify' in God-directed contexts. The repeated
    δέ is preserved with 'but' to mark the contrast between shame and God-honoring
    response.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of δοξαζέτω; rendered straightforwardly as 'God.'
- source_word: ἐν τῷ ὀνόματι τούτῳ
  chosen: in this name
  alternatives:
  - in this matter
  - in this respect
  - because of this name
  lexicon: BDAG
  rationale: The most direct sense is 'in this name,' referring back to the designation
    'Christian.' While some take ἐν here in a looser instrumental or causal sense,
    the wording about the name itself is prominent in the Greek and should be preserved
    in the main text.
