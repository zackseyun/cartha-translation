theological_decisions:
- issue: Reference of 'this name' (ἐν τῷ ὀνόματι τούτῳ)
  chosen_reading: The phrase refers to the name/designation 'Christian.'
  alternative_readings:
  - The phrase means 'in this matter' or 'in this circumstance.'
  - The phrase means 'because you bear this name.'
  rationale: The immediate antecedent is Χριστιανός, and ὄνομα naturally denotes a
    name/designation. Preserving 'name' maintains the textual linkage and avoids flattening
    the social-religious significance of suffering under the Christian name.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
