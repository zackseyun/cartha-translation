theological_decisions:
- issue: Nature of πειρασμός in context
  chosen_reading: testing/trial rather than temptation to sin
  alternative_readings:
  - temptation
  rationale: In the immediate context of suffering and persecution, the term refers
    to a proving ordeal rather than an inward enticement to evil. The translation
    therefore renders the purpose phrase as 'to test you.'
  doctrine_reference: Translation philosophy §3, preserve theological tension where
    genuine ambiguity exists; here context sufficiently favors 'testing'.
