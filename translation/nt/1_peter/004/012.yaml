id: 1PE.4.12
reference: 1 Peter 4:12
source:
  edition: SBLGNT
  text: Ἀγαπητοί, μὴ ξενίζεσθε τῇ ἐν ὑμῖν πυρώσει πρὸς πειρασμὸν ὑμῖν γινομένῃ ὡς
    ξένου ὑμῖν συμβαίνοντος,
translation:
  text: Beloved, do not be surprised at the fiery trial among you that is happening
    to test you, as though something strange were happening to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fiery ordeal among you ... for testing.' The Greek πυρώσει literally
      evokes burning/fire imagery, and πειρασμός can mean 'testing,' 'trial,' or in
      other contexts 'temptation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  - Loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a warm pastoral address. 'Beloved'
    preserves both the affectionate tone and the lexical connection to ἀγαπάω/ἀγάπη
    better than the more interpretive 'Dear friends.'
- source_word: ξενίζεσθε
  chosen: do not be surprised
  alternatives:
  - do not be astonished
  - do not think it strange
  lexicon: BDAG
  rationale: The verb can mean to be surprised or to regard something as strange.
    In this context, paired with ξένου later in the verse, the sense is that they
    should not react as if the experience were alien or unexpected. 'Do not be surprised'
    is idiomatic modern English while preserving the sense.
- source_word: πυρώσει
  chosen: fiery trial
  alternatives:
  - burning
  - refining fire
  - fiery ordeal
  lexicon: BDAG
  rationale: Literally 'burning' or 'burning effect,' but in context it refers metaphorically
    to severe suffering that tests believers. 'Fiery trial' preserves the fire imagery
    and communicates the metaphor naturally in English. 'Fiery ordeal' is possible,
    but 'trial' fits the following πρὸς πειρασμόν.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - in your midst
  lexicon: BDAG
  rationale: The phrase may mean either 'among you' corporately or 'in you' experientially.
    Given the communal address and the external suffering context, 'among you' best
    captures the corporate sense without excluding personal experience.
- source_word: πρὸς πειρασμόν
  chosen: to test you
  alternatives:
  - for testing
  - for a trial
  - for temptation
  lexicon: BDAG
  rationale: πειρασμός can denote testing, trial, or temptation depending on context.
    Here the sense is not enticement to sin but the proving character of suffering.
    Rendering the phrase verbally as 'to test you' produces clear English and reflects
    purpose.
- source_word: γινομένῃ
  chosen: that is happening
  alternatives:
  - that is coming upon you
  - that is taking place
  lexicon: BDAG
  rationale: Present middle/passive participle modifying πυρώσει. 'That is happening'
    is a natural English participial equivalent and keeps the ongoing aspect.
- source_word: ὡς ξένου
  chosen: as though something strange
  alternatives:
  - as though something foreign
  - as though something unusual
  lexicon: BDAG
  rationale: ξένος means strange, foreign, or unfamiliar. The construction links conceptually
    with ξενίζεσθε earlier. 'Something strange' preserves the wordplay in understandable
    English.
- source_word: συμβαίνοντος
  chosen: were happening
  alternatives:
  - were befalling
  - were occurring
  lexicon: BDAG
  rationale: The participle denotes something happening or occurring to someone. 'Were
    happening' is idiomatic and fits the comparative clause introduced by ὡς.
