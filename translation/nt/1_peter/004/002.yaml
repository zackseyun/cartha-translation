id: 1PE.4.2
reference: 1 Peter 4:2
source:
  edition: SBLGNT
  text: εἰς τὸ μηκέτι ἀνθρώπων ἐπιθυμίαις ἀλλὰ θελήματι θεοῦ τὸν ἐπίλοιπον ἐν σαρκὶ
    βιῶσαι χρόνον.
translation:
  text: so as to live the rest of his time in the flesh no longer for human desires,
    but for the will of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remaining time in the body.' The Greek phrase 'in the flesh' here
      refers to earthly embodied life, not necessarily to the 'sinful nature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὸ
  chosen: so as to
  alternatives:
  - for
  - to
  lexicon: BDAG
  rationale: The preposition with the articular infinitive expresses purpose/result
    in relation to the previous verse. 'So as to' captures the purposive force in
    natural English better than a bare 'to' while remaining close to the Greek structure.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: Standard rendering of the adverb indicating cessation of a prior pattern.
- source_word: ἀνθρώπων
  chosen: human
  alternatives:
  - of men
  - people's
  lexicon: BDAG
  rationale: Genitive plural modifying 'desires.' 'Human' communicates the generic
    sense without implying only males. This follows the gender-accurate principle
    because the Greek is generic, not specifically male.
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - lusts
  - passions
  lexicon: BDAG
  rationale: '''Desires'' is the broadest and most contextually fitting gloss. ''Lusts''
    is too narrow and sexually loaded; ''passions'' is possible but less direct. The
    dative is governed in contrast with θελήματι under the infinitive construction.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: 'Marks strong contrast between two spheres of orientation: human desires
    versus God''s will.'
- source_word: θελήματι θεοῦ
  chosen: for the will of God
  alternatives:
  - by the will of God
  - according to God's will
  lexicon: BDAG
  rationale: Paired with the previous dative phrase, this is best taken as indicating
    the governing aim or standard of life. 'For the will of God' preserves the contrast
    with 'for human desires' in idiomatic English.
- source_word: τὸν ἐπίλοιπον ... χρόνον
  chosen: the rest of his time
  alternatives:
  - the remaining time
  - the rest of the time
  lexicon: BDAG
  rationale: This accusative phrase is the object of the infinitive βιῶσαι. 'The rest
    of his time' is idiomatic and reflects the singular, individualized force carried
    over from the preceding context ('the one who has suffered in the flesh').
- source_word: ἐν σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the body
  - in mortal life
  lexicon: BDAG
  rationale: Here σάρξ refers to embodied earthly existence, not explicitly to the
    ethical sense 'sinful nature.' The default doctrinal guidance prefers 'flesh'
    when literal, and this context concerns remaining life in mortal human existence.
- source_word: βιῶσαι
  chosen: to live
  alternatives:
  - to spend
  - to pass
  lexicon: BDAG
  rationale: Aorist infinitive of βιόω, denoting the conduct or spending of one's
    life/time. 'To live' is the clearest English equivalent; the nuance of spending
    the remaining time is carried by the object phrase.
