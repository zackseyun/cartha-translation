theological_decisions:
- issue: Sense of σάρξ in ἐν σαρκὶ
  chosen_reading: embodied earthly life ('in the flesh')
  alternative_readings:
  - sinful nature
  rationale: The phrase here refers to the believer's remaining mortal existence,
    not to an inner sinful principle. The immediate context contrasts former sinful
    behavior with present obedience, but the expression itself denotes life in the
    body/on earth. This preserves the lexical distinction required by the doctrine
    guidance for σάρξ.
