id: 1PE.4.14
reference: 1 Peter 4:14
source:
  edition: SBLGNT
  text: εἰ ὀνειδίζεσθε ἐν ὀνόματι Χριστοῦ, μακάριοι, ὅτι τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ
    πνεῦμα ἐφ’ ὑμᾶς ⸀ἀναπαύεται.
translation:
  text: If you are insulted in the name of the Messiah, you are blessed, because the
    Spirit of glory and of God rests upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the glorious Spirit of God'; alternatively, 'the Spirit of glory, that
      is, the Spirit of God.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a
      title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀνειδίζεσθε
  chosen: are insulted
  alternatives:
  - are reproached
  - are reviled
  lexicon: BDAG
  rationale: The passive present indicates being subjected to verbal abuse or disgrace.
    'Insulted' is natural modern English and preserves the social-shame dimension
    without sounding archaic.
- source_word: ἐν ὀνόματι Χριστοῦ
  chosen: in the name of the Messiah
  alternatives:
  - for the name of Christ
  - because of Christ
  lexicon: BDAG
  rationale: ἐν ὀνόματι here denotes association with or on account of the name/identity
    of Jesus as Messiah. 'In the name of the Messiah' keeps the Greek wording and
    the titular force of Χριστοῦ per doctrine guidance to translate titles where context
    supports.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like identifier. Following
    the contested-terms guidance, 'Messiah' is preferred where the title sense is
    active.
- source_word: μακάριοι
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: '''Blessed'' best preserves the covenantal and theological weight of
    μακάριοι in beatitude-like statements. ''Happy'' is too subjective and weak.'
- source_word: τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα
  chosen: the Spirit of glory and of God
  alternatives:
  - the glorious Spirit of God
  - the Spirit of glory, who is the Spirit of God
  lexicon: BDAG
  rationale: The repeated articles before the genitives are awkward in English but
    significant. A fairly literal rendering preserves the appositional/genitival richness
    without over-resolving whether 'of glory' and 'of God' are coordinate descriptors
    or the second explains the first.
- source_word: δόξης
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the standard theological rendering and resonates with biblical
    usage, especially in connection with the divine presence.'
- source_word: ἀναπαύεται
  chosen: rests upon
  alternatives:
  - rests on
  - abides upon
  lexicon: BDAG
  rationale: The verb means to rest or settle, and with ἐφ’ ὑμᾶς naturally becomes
    'rests upon you.' This also echoes Isaianic language about the Spirit resting
    upon someone.
