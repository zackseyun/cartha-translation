theological_decisions:
- issue: How to construe τὸ τῆς δόξης καὶ τὸ τοῦ θεοῦ πνεῦμα
  chosen_reading: Render it transparently as 'the Spirit of glory and of God' without
    collapsing the phrase into a smoother interpretive paraphrase.
  alternative_readings:
  - the glorious Spirit of God
  - the Spirit of glory, that is, the Spirit of God
  rationale: The Greek phrase is syntactically compressed and can be taken as two
    coordinated genitives modifying 'Spirit' or as an appositional clarification.
    To preserve theological tension rather than resolve it, the main text keeps the
    ambiguity visible in readable English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
