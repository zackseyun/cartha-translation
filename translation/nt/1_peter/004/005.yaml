theological_decisions:
- issue: Identity of 'the one who stands ready to judge the living and the dead'
  chosen_reading: Kept as 'the one' rather than explicitly naming God or Messiah/Christ
    in the main text.
  alternative_readings:
  - God
  - Messiah/Christ
  rationale: The Greek does not explicitly name the judge here, though the wider NT
    context often identifies God as judge and also speaks of the Messiah judging.
    To preserve theological tension rather than resolve it beyond the wording of the
    verse, the translation retains the Greek's substantival participial expression.
  doctrine_reference: Preserve theological tension rather than resolve it.
