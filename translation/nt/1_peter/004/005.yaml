id: 1PE.4.5
reference: 1 Peter 4:5
source:
  edition: SBLGNT
  text: οἳ ἀποδώσουσιν λόγον τῷ ἑτοίμως ⸂ἔχοντι κρῖναι⸃ ζῶντας καὶ νεκρούς·
translation:
  text: They will give an account to the one who stands ready to judge the living
    and the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is ready to judge.' The Greek expression literally describes one 'having
      readiness to judge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  chosen: They
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to the people just mentioned in the
    previous verse. In English, beginning the sentence with 'They' is natural and
    preserves the referent clearly.
- source_word: ἀποδώσουσιν λόγον
  chosen: will give an account
  alternatives:
  - will render an account
  - will answer
  lexicon: BDAG
  rationale: The idiom ἀποδίδωμι λόγον means to give an account or answer for oneself.
    'Will give an account' is standard, clear modern English and preserves the judicial
    nuance.
- source_word: τῷ
  chosen: to the one
  alternatives:
  - to him
  - to the one who
  lexicon: BDAG
  rationale: The article with the participle functions substantivally. 'To the one'
    prepares for the participial description that follows and avoids prematurely specifying
    the referent beyond the Greek.
- source_word: ἑτοίμως
  chosen: ready
  alternatives:
  - readily
  - prepared
  lexicon: BDAG
  rationale: The adverb conveys readiness or preparedness. In idiomatic English with
    'stands,' 'ready' communicates the sense naturally and forcefully.
- source_word: ἔχοντι κρῖναι
  chosen: stands ready to judge
  alternatives:
  - is ready to judge
  - has readiness to judge
  lexicon: BDAG
  rationale: Literally, 'having readiness to judge' or 'being ready to judge.' 'Stands
    ready to judge' is an optimal-equivalence rendering that captures the present
    participle's vivid sense of poised readiness without woodenness.
- source_word: ζῶντας καὶ νεκρούς
  chosen: the living and the dead
  alternatives:
  - living people and dead people
  lexicon: BDAG
  rationale: This is a conventional and accurate rendering of the accusative objects
    of κρῖναι. The phrase has broad eschatological scope and is best preserved in
    its familiar, concise form.
