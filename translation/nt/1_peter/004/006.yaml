theological_decisions:
- issue: Identity of 'the dead'
  chosen_reading: Rendered neutrally as 'the dead' without specifying whether they
    were spiritually dead when preached to or physically dead at the time of proclamation.
  alternative_readings:
  - those now physically dead who heard the gospel while alive
  - the spiritually dead
  - the dead in connection with Christ's proclamation to imprisoned spirits
  rationale: The verse is interpretively disputed, especially in relation to 3:19.
    The translation preserves the Greek wording and does not import a specific doctrinal
    explanation not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'judged according to men in the flesh ... live according to God
    in the spirit'
  chosen_reading: Maintained the antithetical parallel without defining whether 'judged'
    refers to human condemnation, physical death, or divine judgment experienced in
    the human sphere.
  alternative_readings:
  - judged by human standards in bodily life
  - condemned to physical death as all humans are
  - judged in the flesh by God but live spiritually
  rationale: The Greek allows multiple closely related interpretations. The translation
    keeps the contrastive structure and avoids narrowing the sense beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
