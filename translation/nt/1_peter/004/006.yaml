id: 1PE.4.6
reference: 1 Peter 4:6
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ καὶ νεκροῖς εὐηγγελίσθη ἵνα κριθῶσι μὲν κατὰ ἀνθρώπους σαρκὶ
    ζῶσι δὲ κατὰ θεὸν πνεύματι.
translation:
  text: 'For this is why the gospel was also proclaimed to the dead: so that, though
    judged according to men in the flesh, they might live according to God in the
    spirit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to people' / 'according to human standards.' The Greek says
      'according to men,' using a representative human term in contrast with 'according
      to God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in spirit.' The phrase may denote the sphere of spiritual life, in contrast
      with 'in the flesh'; some understand it more specifically as life by the Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς τοῦτο
  chosen: For this is why
  alternatives:
  - for this reason
  - to this end
  lexicon: BDAG
  rationale: Idiomatic causal-forward expression introducing explanation of the preceding
    discussion; 'For this is why' is natural English while preserving the explanatory
    force.
- source_word: νεκροῖς
  chosen: to the dead
  alternatives:
  - to dead people
  lexicon: BDAG
  rationale: Dative plural adjective used substantivally. 'The dead' is the most natural
    and sufficiently formal rendering.
- source_word: εὐηγγελίσθη
  chosen: was ... proclaimed
  alternatives:
  - was preached
  - was announced as good news
  lexicon: BDAG
  rationale: Passive of εὐαγγελίζω. Rendering with 'the gospel was ... proclaimed'
    makes explicit the cognate object implied in English and avoids archaic church-register
    'preached' while preserving the evangelistic sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purposive conjunction.
- source_word: κριθῶσι
  chosen: though judged
  alternatives:
  - they might be judged
  - having been judged
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive under ἵνα. In the μὲν...δὲ contrast, English
    reads more naturally with concessive force: ''though judged ... they might live
    ...,'' while retaining the passive sense.'
- source_word: κατὰ ἀνθρώπους
  chosen: according to men
  alternatives:
  - according to human standards
  - as men judge
  - according to people
  lexicon: BDAG
  rationale: κατά with accusative here expresses standard or perspective. 'According
    to men' preserves the source's anthropological contrast with 'according to God.'
    Because ἀνθρώπους is grammatically masculine but representative, a footnote preserves
    the inclusive alternative.
- source_word: σαρκὶ
  chosen: in the flesh
  alternatives:
  - in flesh
  - with respect to the flesh
  - in the body
  lexicon: BDAG
  rationale: From the contested-terms guidance, σάρξ is rendered 'flesh' in literal/non-metaphorical
    contexts. Here it contrasts with πνεύματι and refers to the sphere of bodily human
    existence, not specifically 'sinful nature.'
- source_word: ζῶσι
  chosen: they might live
  alternatives:
  - they may live
  lexicon: BDAG
  rationale: Present active subjunctive in purpose/result clause; 'might live' fits
    the English sequence after 'so that' and preserves the intended outcome.
- source_word: κατὰ θεὸν
  chosen: according to God
  alternatives:
  - according to God's standard
  - as God lives
  - in God's sight
  lexicon: BDAG
  rationale: Parallel to κατὰ ἀνθρώπους; expresses God's perspective/standard. The
    more literal rendering preserves the deliberate contrast.
- source_word: πνεύματι
  chosen: in the spirit
  alternatives:
  - in spirit
  - by the Spirit
  lexicon: BDAG
  rationale: Dative of sphere, parallel to σαρκί. Lowercase 'spirit' is preferred
    because the text does not explicitly identify the Holy Spirit, and the flesh/spirit
    contrast here most naturally refers to mode or sphere of life rather than agency.
