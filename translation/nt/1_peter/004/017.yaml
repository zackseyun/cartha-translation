id: 1PE.4.17
reference: 1 Peter 4:17
source:
  edition: SBLGNT
  text: ὅτι ὁ καιρὸς τοῦ ἄρξασθαι τὸ κρίμα ἀπὸ τοῦ οἴκου τοῦ θεοῦ· εἰ δὲ πρῶτον ἀφ’
    ἡμῶν, τί τὸ τέλος τῶν ἀπειθούντων τῷ τοῦ θεοῦ εὐαγγελίῳ;
translation:
  text: For it is time for judgment to begin from the household of God; and if it
    begins first from us, what will be the outcome for those who disobey the gospel
    of God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of God.' The Greek οἶκος can mean either 'house' or 'household';
      here it likely refers to God's people as his household.
    reason: lexical_alternative
  - marker: b
    text: Or 'what will be the end.' The Greek τέλος can mean 'end,' 'outcome,' or
      'result.'
    reason: lexical_alternative
  - marker: c
    text: '''Those who disobey'' may also be rendered ''those who refuse to believe,''
      since the Greek verb can denote both disobedience and unbelief in response to
      the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this clause gives the reason for the preceding exhortation
    about not being ashamed in suffering, so a causal connector is best. 'For' is
    concise and natural in English.
- source_word: καιρός
  chosen: time
  alternatives:
  - season
  - appointed time
  lexicon: BDAG
  rationale: The noun denotes a fitting or appointed time rather than mere chronological
    time. 'Time' is the most natural English rendering here, with the sense of a divinely
    appointed moment carried by context.
- source_word: τοῦ ἄρξασθαι
  chosen: to begin
  alternatives:
  - for ... to begin
  - for the beginning of
  lexicon: BDAG
  rationale: 'The articular infinitive expresses purpose/content after καιρός: ''it
    is time for judgment to begin.'' This is smoother than a more wooden infinitival
    construction while preserving the syntax.'
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - judicial process
  - sentence
  lexicon: BDAG
  rationale: '''Judgment'' best captures the broad sense here of God''s evaluative
    dealing, not merely final condemnation. The context includes purifying judgment
    among God''s people and a more severe end for the disobedient.'
- source_word: ἀπὸ τοῦ οἴκου τοῦ θεοῦ
  chosen: from the household of God
  alternatives:
  - from the house of God
  - with the house of God
  lexicon: BDAG
  rationale: οἶκος can mean house or household. Here the referent is God's people
    rather than a building, so 'household of God' communicates the communal sense
    clearly. 'From' preserves ἀπό and the idea of judgment starting there.
- source_word: εἰ δὲ πρῶτον ἀφ’ ἡμῶν
  chosen: and if it begins first from us
  alternatives:
  - but if first from us
  - and if first from us
  lexicon: BDAG
  rationale: The verb 'begins' is supplied from the previous clause in English for
    clarity. δέ is lightly connective here; 'and' fits the flow. 'From us' preserves
    the repeated ἀπό and links 'us' with the household of God.
- source_word: τέλος
  chosen: outcome
  alternatives:
  - end
  - destiny
  lexicon: BDAG
  rationale: τέλος can mean end, outcome, or result. 'Outcome' avoids suggesting only
    temporal cessation and better fits the rhetorical contrast between present judgment
    on believers and the final result for the disobedient.
- source_word: ἀπειθούντων
  chosen: those who disobey
  alternatives:
  - those who refuse to believe
  - the disobedient
  lexicon: BDAG
  rationale: The participle can carry the sense of disobedience and unbelief together,
    especially in relation to the gospel. 'Those who disobey' preserves the verbal
    force and the moral response implied by the dative object.
- source_word: τῷ τοῦ θεοῦ εὐαγγελίῳ
  chosen: the gospel of God
  alternatives:
  - God's gospel
  - the good news of God
  lexicon: BDAG
  rationale: 'The genitive is most naturally possessive/source: the gospel that comes
    from God or belongs to him. ''The gospel of God'' is idiomatic and preserves the
    formal weight of the phrase.'
