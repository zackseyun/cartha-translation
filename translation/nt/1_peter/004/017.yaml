theological_decisions:
- issue: Nature of κρίμα in relation to God's people
  chosen_reading: Rendered as 'judgment' without specifying condemnation, allowing
    the text's tension that God's purifying/judicial dealing begins with his own people.
  alternative_readings:
  - condemnation
  - discipline
  rationale: The verse contrasts God's present judgment beginning with his household
    and the future outcome of those who disobey the gospel. Translating with a narrower
    term like 'condemnation' would overstate the sense for believers; 'discipline'
    would understate the judicial seriousness. 'Judgment' preserves the theological
    tension required by the context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Referent of 'household of God'
  chosen_reading: Understood as God's people rather than a temple building.
  alternative_readings:
  - house/temple of God as cultic structure
  rationale: In Petrine context believers are described corporately as God's house
    (cf. 1 Pet 2:5), and the following 'from us' confirms a personal/community referent.
    The translation makes this explicit with 'household.'
