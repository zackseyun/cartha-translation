id: 1PE.4.8
reference: 1 Peter 4:8
source:
  edition: SBLGNT
  text: πρὸ ⸀πάντων τὴν εἰς ἑαυτοὺς ἀγάπην ἐκτενῆ ἔχοντες, ὅτι ἀγάπη ⸀καλύπτει πλῆθος ἁμαρτιῶν·
translation:
  text: Above all, maintain a fervent love for one another, because love covers a multitude of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'earnest' love.
    reason: lexical_alternative
  - marker: b
    text: The wording echoes Proverbs 10:12; 'covers' may also be understood as 'overlooks' or 'conceals' in the sense of not stirring up offenses.
    reason: cross_reference
  - marker: c
    text: Or 'having fervent love for one another'.
    reason: previous_rendering
lexical_decisions:
- source_word: πρὸ πάντων
  chosen: Above all
  alternatives:
  - before all things
  - most of all
  lexicon: BDAG
  rationale: Idiomatic expression marking priority or supreme importance rather than temporal sequence alone. 'Above all' is natural modern English and preserves the exhortational force.
- source_word: εἰς ἑαυτοὺς
  chosen: for one another
  alternatives:
  - among yourselves
  - toward yourselves
  lexicon: BDAG
  rationale: In this reciprocal community context, the reflexive phrase is best rendered idiomatically as mutual action within the group. 'For one another' communicates reciprocal love clearly in English.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the standard and contextually appropriate gloss.
- source_word: ἐκτενῆ
  chosen: fervent
  alternatives:
  - earnest
  - constant
  - deep
  lexicon: BDAG
  rationale: The adjective conveys being stretched out, hence earnest, intense, or persistent. 'Fervent' preserves both intensity and moral seriousness in concise English.
- source_word: ἔχοντες
  chosen: having
  alternatives:
  - maintaining
  - keeping
  lexicon: BDAG
  rationale: A present participle modifying the implied audience, expressing the manner of their conduct. 'Having' is formally close and works smoothly with the exhortational flow from the previous verse.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the exhortation. 'Because' makes the causal force explicit in contemporary English.
- source_word: καλύπτει
  chosen: covers
  alternatives:
  - conceals
  - overlooks
  lexicon: BDAG
  rationale: The verb literally means 'covers' and echoes the wording of Proverbs 10:12 in the Greek tradition. 'Covers' preserves the metaphor and avoids overinterpreting it as either mere concealment or automatic forgiveness.
- source_word: πλῆθος
  chosen: a multitude
  alternatives:
  - many
  - a great number
  lexicon: BDAG
  rationale: '''A multitude'' is a natural equivalent that preserves the collective sense and rhetorical weight of the singular noun.'
- source_word: ἁμαρτιῶν
  chosen: of sins
  lexicon: BDAG
  rationale: Straightforward genitive complement to 'multitude.' No contextual reason to narrow or paraphrase the term.
