theological_decisions:
- issue: Meaning of 'love covers a multitude of sins'
  chosen_reading: Retain the metaphor 'covers' without specifying whether the sins
    are those committed by others against believers or sins within the community more
    broadly.
  alternative_readings:
  - love overlooks many offenses
  - love brings forgiveness for many sins
  rationale: The phrase is proverb-like and allusive, and the Greek itself does not
    force a single doctrinally loaded interpretation. Preserving 'covers' maintains
    the theological tension and avoids importing a sacramental, meritorious, or merely
    psychological reading not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
