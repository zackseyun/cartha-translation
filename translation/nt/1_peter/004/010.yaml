theological_decisions:
- issue: Whether χάρισμα should be rendered narrowly as 'spiritual gift'
  chosen_reading: gift
  alternative_readings:
  - spiritual gift
  - gracious gift
  rationale: The context concerns grace-enabled service within the church, but the
    noun itself does not require the narrower technical sense 'spiritual gift.' 'Gift'
    preserves the lexical breadth while allowing the ecclesial context to supply the
    application.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: How to express the communal force of εἰς ἑαυτούς
  chosen_reading: among yourselves
  alternative_readings:
  - for one another
  - to one another
  rationale: The Greek reflexive plural points to the believing community as the sphere
    and beneficiaries of service. 'Among yourselves' preserves that communal sense
    without forcing a more reciprocal gloss than the preposition itself demands. A
    footnote preserves the common alternative.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; optimal equivalence.'
