id: 1PE.4.3
reference: 1 Peter 4:3
source:
  edition: SBLGNT
  text: ἀρκετὸς ⸀γὰρ ὁ παρεληλυθὼς ⸀χρόνος τὸ ⸀βούλημα τῶν ἐθνῶν ⸀κατειργάσθαι, πεπορευμένους
    ἐν ἀσελγείαις, ἐπιθυμίαις, οἰνοφλυγίαις, κώμοις, πότοις, καὶ ἀθεμίτοις εἰδωλολατρίαις.
translation:
  text: For the time that has passed is enough to have carried out the will of the
    Gentiles, having walked in sensualities, lusts, drunkennesses, carousing, drinking
    parties, and lawless idolatries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'debaucheries' for 'sensualities' (ἀσελγείαις), emphasizing shameless
      excess.
    reason: lexical_alternative
  - marker: b
    text: Or 'drunken bouts' for 'drunkennesses' (οἰνοφλυγίαις).
    reason: lexical_alternative
  - marker: c
    text: Or 'abominable idolatries' for 'lawless idolatries' (ἀθεμίτοις εἰδωλολατρίαις).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρκετὸς γὰρ ὁ παρεληλυθὼς χρόνος
  chosen: For the time that has passed is enough
  alternatives:
  - For enough time has passed
  - The past time is sufficient
  lexicon: BDAG
  rationale: ἀρκετός means 'sufficient, enough.' With the articular participle ὁ παρεληλυθὼς
    modifying χρόνος, the clause idiomatically states that the already-elapsed time
    is sufficient. 'For' renders γάρ as explanatory.
- source_word: τὸ βούλημα τῶν ἐθνῶν
  chosen: the will of the Gentiles
  alternatives:
  - what the Gentiles want
  - the desire of the nations
  lexicon: BDAG
  rationale: βούλημα denotes will, intention, or purpose. ἐθνῶν in this Petrine context
    refers to non-Jews/pagans rather than 'nations' in a geopolitical sense, so 'Gentiles'
    best fits.
- source_word: κατειργάσθαι
  chosen: to have carried out
  alternatives:
  - to accomplish
  - to do
  lexicon: BDAG
  rationale: 'The perfect infinitive conveys completed action relative to the past
    time: the readers'' former life had already accomplished/performed pagan willing.
    ''Carried out'' is natural English while preserving the sense of effecting or
    practicing.'
- source_word: πεπορευμένους
  chosen: having walked
  alternatives:
  - having lived
  - having conducted yourselves
  lexicon: BDAG
  rationale: πορεύομαι is literally 'go, travel,' but in moral contexts commonly means
    'walk/live/conduct oneself.' 'Having walked' preserves the metaphor and links
    to biblical ethical idiom.
- source_word: ἐν ἀσελγείαις
  chosen: in sensualities
  alternatives:
  - in debaucheries
  - in acts of sensuality
  - in licentiousness
  lexicon: BDAG
  rationale: ἀσέλγεια denotes shameless self-indulgence, especially sexual excess.
    The plural likely points to repeated forms/acts. 'Sensualities' keeps the plural
    and broad moral sense, though an alternative is worth preserving.
- source_word: ἐπιθυμίαις
  chosen: lusts
  alternatives:
  - desires
  - cravings
  lexicon: BDAG
  rationale: ἐπιθυμία can be neutral or negative by context; here within a vice list
    it is clearly negative. 'Lusts' captures disordered desires more sharply than
    the broader 'desires.'
- source_word: οἰνοφλυγίαις
  chosen: drunkennesses
  alternatives:
  - drunken bouts
  - excesses of wine
  lexicon: BDAG
  rationale: This rare plural noun refers to excessive drinking or drunken revelry.
    'Drunkennesses' is somewhat wooden but preserves the plural and repeated-pattern
    sense; a smoother alternative is footnoted.
- source_word: κώμοις
  chosen: carousing
  alternatives:
  - revelries
  - wild parties
  lexicon: BDAG
  rationale: κῶμος refers to festive revelry, often with drinking and immoral excess.
    'Carousing' is concise and natural.
- source_word: πότοις
  chosen: drinking parties
  alternatives:
  - drinking bouts
  - banquets
  lexicon: BDAG
  rationale: πότος denotes a drinking occasion or bout. 'Drinking parties' communicates
    the social setting more clearly than the archaic-sounding 'banquets' in modern
    English.
- source_word: ἀθεμίτοις εἰδωλολατρίαις
  chosen: lawless idolatries
  alternatives:
  - abominable idolatries
  - forbidden idolatries
  lexicon: BDAG
  rationale: ἀθέμιτος means unlawful, forbidden, or contrary to accepted divine/human
    norms. 'Lawless' preserves the moral-legal force without importing merely emotional
    disgust. The plural 'idolatries' reflects varied idolatrous practices.
