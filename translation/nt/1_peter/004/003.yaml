theological_decisions:
- issue: Rendering ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  - pagans
  rationale: In context Peter contrasts the readers' former life with the behavior
    characteristic of non-Jewish society. 'Gentiles' is the most standard and contextually
    precise rendering, while 'pagans' is interpretive and 'nations' is too broad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Moral force of ἀθεμίτοις εἰδωλολατρίαις
  chosen_reading: lawless idolatries
  alternative_readings:
  - abominable idolatries
  - detestable idolatries
  rationale: The phrase condemns idolatrous practices as contrary to what is permitted,
    not merely as emotionally detestable. 'Lawless' preserves the objective moral
    violation without heightening rhetoric beyond the Greek.
  doctrine_reference: Translation philosophy §1, §6
