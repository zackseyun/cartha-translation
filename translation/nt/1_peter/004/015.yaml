id: 1PE.4.15
reference: 1 Peter 4:15
source:
  edition: SBLGNT
  text: μὴ γάρ τις ὑμῶν πασχέτω ὡς φονεὺς ἢ κλέπτης ἢ κακοποιὸς ἢ ὡς ἀλλοτριεπίσκοπος·
translation:
  text: For let none of you suffer as a murderer or a thief or an evildoer or as a
    meddler in other people's affairs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'busybody'; more literally, 'one who oversees another's affairs,' that
      is, someone who meddles in matters not his own.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γάρ
  chosen: For let ... not
  alternatives:
  - For none ... should
  - Indeed, let ... not
  lexicon: BDAG
  rationale: μὴ with the present imperative πασχέτω gives a prohibition ('let ...
    not'), while γάρ is retained as 'For' to preserve the explanatory connection to
    the surrounding context.
- source_word: τις ὑμῶν
  chosen: none of you
  alternatives:
  - any of you
  - any one of you
  lexicon: BDAG
  rationale: The indefinite τις with the partitive genitive ὑμῶν is naturally rendered
    'none of you' in English under the negation, giving idiomatic force without losing
    the individualizing sense.
- source_word: πασχέτω
  chosen: suffer
  alternatives:
  - be made to suffer
  - suffer punishment
  lexicon: BDAG
  rationale: πάσχω broadly means 'suffer' or 'experience suffering.' 'Suffer' is the
    most direct and contextually appropriate rendering in 1 Peter, where the theme
    is enduring suffering. Adding 'punishment' would over-specify what the Greek does
    not explicitly state.
- source_word: ὡς
  chosen: as
  alternatives:
  - in the capacity of
  - like
  lexicon: BDAG
  rationale: ὡς here marks the character or basis under which one suffers—'as' a murderer,
    etc. The simple English 'as' preserves the force cleanly.
- source_word: φονεύς
  chosen: murderer
  alternatives:
  - killer
  lexicon: BDAG
  rationale: φονεύς denotes one who commits murder. 'Murderer' is more morally and
    legally precise than the broader 'killer.'
- source_word: κλέπτης
  chosen: thief
  alternatives:
  - robber
  lexicon: BDAG
  rationale: κλέπτης is the standard term for 'thief.' 'Robber' would suggest a different
    nuance not present in the word itself.
- source_word: κακοποιός
  chosen: evildoer
  alternatives:
  - criminal
  - wrongdoer
  lexicon: BDAG
  rationale: κακοποιός is a broad term for one who does evil. 'Evildoer' preserves
    the generality and moral tone better than the more juridical 'criminal.'
- source_word: ἀλλοτριεπίσκοπος
  chosen: a meddler in other people's affairs
  alternatives:
  - busybody
  - one who meddles in matters not his own
  - overseer of others' affairs
  lexicon: BDAG
  rationale: This rare compound literally combines the ideas of 'another's' and 'overseer,'
    but in context it refers negatively to intrusive interference in matters belonging
    to others. 'Meddler in other people's affairs' communicates the sense clearly
    in modern English. 'Busybody' is possible but can sound too light; the more literal
    'overseer of others' affairs' is obscure.
