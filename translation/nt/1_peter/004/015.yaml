theological_decisions:
- issue: Meaning of ἀλλοτριεπίσκοπος
  chosen_reading: a meddler in other people's affairs
  alternative_readings:
  - busybody
  - one who meddles in matters not his own
  rationale: The term is lexically difficult and rare, but the context lists wrongful
    behaviors for which suffering would be blameworthy. A rendering emphasizing wrongful
    intrusion best fits the vice list without importing ecclesiastical overtones from
    the -ἐπίσκοπος element.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source sense over tradition.'
