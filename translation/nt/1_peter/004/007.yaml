id: 1PE.4.7
reference: 1 Peter 4:7
source:
  edition: SBLGNT
  text: Πάντων δὲ τὸ τέλος ἤγγικεν. σωφρονήσατε οὖν καὶ νήψατε ⸀εἰς προσευχάς·
translation:
  text: But the end of all things has drawn near. Therefore be self-controlled and
    sober-minded for prayers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is near.' The Greek perfect verb can be rendered more formally as 'has
      drawn near' or more idiomatically as 'is near.'
    reason: lexical_alternative
  - marker: b
    text: Or 'be of sound mind and be sober.' The two imperatives emphasize clear
      judgment and spiritual alertness.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντων
  chosen: of all things
  alternatives:
  - of all
  - of everything
  lexicon: BDAG
  rationale: The genitive plural of πᾶς is best completed idiomatically in English
    as 'of all things' with τέλος, yielding the common eschatological expression 'the
    end of all things.' Supplying 'things' is natural and reflects the neuter sense
    implied by the construction.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or contrast with the preceding context. 'But'
    preserves the discourse turn and urgency better than the flatter 'now' or simple
    'and.'
- source_word: τὸ τέλος
  chosen: the end
  alternatives:
  - the outcome
  - the consummation
  lexicon: BDAG
  rationale: τέλος can mean end, outcome, or goal, but in this eschatological context
    'the end' is the most direct and natural rendering.
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: The perfect tense conveys a present state resulting from approach. 'Has
    drawn near' preserves that aspect better than the simpler present 'is near,' while
    remaining idiomatic English.
- source_word: σωφρονήσατε
  chosen: be self-controlled
  alternatives:
  - be of sound mind
  - be sensible
  - be clear-minded
  lexicon: BDAG
  rationale: The aorist imperative calls for a decisive posture of sound judgment
    and disciplined thinking. 'Be self-controlled' communicates both mental steadiness
    and practical restraint in contemporary English.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν explicitly draws an inference from the preceding statement. 'Therefore'
    clearly signals the logical connection.
- source_word: νήψατε
  chosen: be sober-minded
  alternatives:
  - be sober
  - keep alert
  - be clear-headed
  lexicon: BDAG
  rationale: νήφω literally relates to sobriety but often extends metaphorically to
    alertness and clear-headedness. 'Be sober-minded' preserves the metaphor while
    making the mental/spiritual sense explicit.
- source_word: εἰς προσευχάς
  chosen: for prayers
  alternatives:
  - for prayer
  - unto prayers
  - with a view to prayers
  lexicon: BDAG
  rationale: The preposition εἰς here expresses purpose or result. The plural προσευχάς
    is best retained as 'prayers,' reflecting repeated acts or a life characterized
    by prayer rather than a single abstract act.
