theological_decisions:
- issue: Eschatological force of 'the end of all things'
  chosen_reading: Retained as a straightforward eschatological statement without specifying
    a detailed timeline or system.
  alternative_readings:
  - A more existential sense such as 'the goal of all things'
  - A fully realized sense minimizing future eschatology
  rationale: The verse plainly announces the nearness of 'the end of all things' and
    grounds ethical exhortation in that reality. The translation preserves the text's
    urgency without importing a particular millennial or denominational framework.
  doctrine_reference: Affirmations; Translation philosophy §3
