id: 1PE.4.11
reference: 1 Peter 4:11
source:
  edition: SBLGNT
  text: εἴ τις λαλεῖ, ὡς λόγια θεοῦ· εἴ τις διακονεῖ, ὡς ἐξ ἰσχύος ⸀ἧς χορηγεῖ ὁ θεός· ἵνα ἐν πᾶσιν δοξάζηται ὁ θεὸς διὰ Ἰησοῦ Χριστοῦ, ᾧ ἐστιν ἡ δόξα καὶ τὸ κράτος εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
translation:
  text: If anyone speaks, let it be as the utterances of God; if anyone serves, let it be from the strength that God supplies, so that in everything God may be glorified through Jesus Messiah, to whom belong the glory and the dominion forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oracles of God.' The Greek λόγια carries the sense of divine utterances.
    reason: lexical_alternative
  - marker: b
    text: Greek 'through Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'to whom' most naturally refers to Jesus Messiah, though some understand the doxology as referring to God the Father in light of the preceding clause.
    reason: alternative_reading
  - marker: d
    text: Literally 'to the ages of ages.'
    reason: lexical_alternative
  - marker: e
    text: Or 'let it be as from the strength'.
    reason: previous_rendering
lexical_decisions:
- source_word: λαλεῖ
  chosen: speaks
  alternatives:
  - speaks out
  - utters
  lexicon: BDAG
  rationale: A straightforward present-tense rendering fits the generic conditional construction. 'Speaks' is natural English and broad enough to cover public verbal ministry without narrowing the sense to preaching alone.
- source_word: λόγια
  chosen: utterances
  alternatives:
  - oracles
  - words
  lexicon: BDAG
  rationale: λόγια often denotes divine utterances or oracles, not merely ordinary words. 'Utterances' preserves the elevated sense while remaining more accessible than 'oracles.'
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of God' here, preserving the close association between the speech and divine utterance without overstating direct inspiration in every instance.
- source_word: διακονεῖ
  chosen: serves
  alternatives:
  - ministers
  lexicon: BDAG
  rationale: The verb refers broadly to rendering service or ministry. 'Serves' is clearer modern English and avoids restricting the sense to formal church office.
- source_word: ἐξ ἰσχύος
  chosen: from the strength
  alternatives:
  - with the strength
  - out of the strength
  lexicon: BDAG
  rationale: ἐξ marks source, so 'from the strength' best reflects that the ability originates in God rather than merely accompanying the action.
- source_word: ἧς χορηγεῖ ὁ θεός
  chosen: that God supplies
  alternatives:
  - which God provides
  - which God richly supplies
  lexicon: BDAG
  rationale: χορηγέω conveys supplying or providing, sometimes generously. 'Supplies' is concise and natural; the relative pronoun is absorbed into idiomatic English as 'that God supplies.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: This introduces purpose. 'So that' is idiomatic modern English while preserving the telic force.
- source_word: ἐν πᾶσιν
  chosen: in everything
  alternatives:
  - in all things
  - in all this
  lexicon: BDAG
  rationale: The dative plural is broad and comprehensive. 'In everything' communicates the scope clearly in modern English.
- source_word: δοξάζηται
  chosen: may be glorified
  alternatives:
  - might be glorified
  lexicon: BDAG
  rationale: The present passive subjunctive after ἵνα is well represented by 'may be glorified,' preserving both purpose and passive voice.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: Following the project's policy, Χριστοῦ is rendered 'Messiah' where it functions as a title rather than a name-like element. Here the mediatorial phrase retains clear titular force.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: In doxological contexts κράτος commonly denotes ruling power or dominion. 'Dominion' best matches the exalted, royal nuance.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - to the ages of ages
  lexicon: BDAG
  rationale: The idiom denotes unending duration. 'Forever and ever' is the standard natural English equivalent; the more literal 'to the ages of ages' is preserved as an alternative.
- source_word: ᾧ
  chosen: to whom belong
  alternatives:
  - to whom is
  - to whom be
  lexicon: BDAG
  rationale: English doxological style often supplies 'belong' to make the predication natural. This preserves the sense of ascribed glory and dominion without awkwardness.
