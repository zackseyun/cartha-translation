id: 1PE.4.1
reference: 1 Peter 4:1
source:
  edition: SBLGNT
  text: Χριστοῦ οὖν ⸀παθόντος σαρκὶ καὶ ὑμεῖς τὴν αὐτὴν ἔννοιαν ὁπλίσασθε, ὅτι ὁ ⸀παθὼν
    σαρκὶ πέπαυται ⸀ἁμαρτίας,
translation:
  text: Therefore, since the Messiah suffered in the flesh, you also arm yourselves
    with the same mindset, because the one who has suffered in the flesh has ceased
    from sin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah' (Greek Christos). The title sense is retained
      here.
    reason: lexical_alternative
  - marker: b
    text: '''In the flesh'' renders Greek sarx literally here, referring to bodily
      human existence, not necessarily to ''sinful nature.'''
    reason: lexical_alternative
  - marker: c
    text: The clause 'the one who has suffered in the flesh has ceased from sin' is
      debated. It may refer specifically to the Messiah, to believers sharing his
      pattern, or to a general principle of a decisive break with sin.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the title 'the Messiah' rather than the traditional 'Christ'
    in keeping with the project's default for Χριστός where title sense is active.
    The genitive with the participle yields 'since the Messiah suffered.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding context; 'Therefore' best carries
    the logical connection in natural English.
- source_word: παθόντος
  chosen: suffered
  alternatives:
  - having suffered
  lexicon: BDAG
  rationale: Aorist participle dependent on Χριστοῦ; English smooths the participial
    construction to 'since the Messiah suffered,' which preserves temporal-causal
    force without awkwardness.
- source_word: σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the body
  - in his flesh
  lexicon: BDAG
  rationale: Rendered literally as 'in the flesh' per project guidance for σάρξ in
    literal contexts. Here it refers to bodily human existence/suffering, not specifically
    'sinful nature.'
- source_word: ἔννοιαν
  chosen: mindset
  alternatives:
  - way of thinking
  - intention
  - resolve
  lexicon: BDAG
  rationale: Conveys the sense of thought, attitude, or mental disposition in idiomatic
    modern English. 'Mindset' fits the exhortational context and pairs naturally with
    'arm yourselves.'
- source_word: ὁπλίσασθε
  chosen: arm yourselves
  alternatives:
  - equip yourselves
  - take up arms
  lexicon: BDAG
  rationale: Middle imperative with military metaphor; 'arm yourselves' preserves
    the vivid metaphor and the reflexive force.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground or reason for the exhortation. 'Because' makes
    the causal relation explicit in contemporary English.
- source_word: ὁ παθὼν
  chosen: the one who has suffered
  alternatives:
  - whoever has suffered
  - the one having suffered
  lexicon: BDAG
  rationale: Substantival participle rendered generically. 'The one who has suffered'
    preserves the gnomic/general force while remaining readable.
- source_word: σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the body
  lexicon: BDAG
  rationale: Again kept as the literal 'in the flesh.' Repetition is preserved for
    rhetorical coherence with the first clause.
- source_word: πέπαυται
  chosen: has ceased
  alternatives:
  - has stopped
  - is done
  lexicon: BDAG
  rationale: 'Perfect middle/passive form of παύω indicates a resulting state: one
    has come to a cessation. ''Has ceased'' best preserves the aspect and solemn tone.'
- source_word: ἁμαρτίας
  chosen: from sin
  alternatives:
  - with sin
  - from sins
  lexicon: BDAG
  rationale: 'Genitive after παύω commonly expresses separation: ''ceased from sin.''
    Singular ''sin'' better reflects the Greek and likely denotes sin as a sphere/power
    or practice rather than individual acts.'
