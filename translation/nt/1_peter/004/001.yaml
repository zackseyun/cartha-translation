theological_decisions:
- issue: Referent and force of 'the one who has suffered in the flesh has ceased from
    sin'
  chosen_reading: Kept the statement in its broad, text-level form without specifying
    whether it refers exclusively to Messiah, to believers united with him, or to
    a general principle about decisive renunciation of sin through suffering.
  alternative_readings:
  - It refers specifically to Messiah's sinlessness and completed relation to sin.
  - It refers to believers who, by sharing in suffering, break with sin's rule.
  - It expresses a general maxim that suffering marks a decisive break with sinful
    living.
  rationale: The Greek wording is compressed and interpretively disputed. The translation
    preserves the theological tension rather than resolving it by adding explanatory
    wording not present in the text. 'Has ceased from sin' is retained as the text's
    stark claim, while interpretive options are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
