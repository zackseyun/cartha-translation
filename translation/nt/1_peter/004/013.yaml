id: 1PE.4.13
reference: 1 Peter 4:13
source:
  edition: SBLGNT
  text: ἀλλὰ καθὸ κοινωνεῖτε τοῖς τοῦ Χριστοῦ παθήμασιν χαίρετε, ἵνα καὶ ἐν τῇ ἀποκαλύψει
    τῆς δόξης αὐτοῦ χαρῆτε ἀγαλλιώμενοι.
translation:
  text: But insofar as you share in the sufferings of the Messiah, rejoice, so that
    at the revelation of his glory you may also rejoice, exulting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ's sufferings.' The Greek title Χριστός is rendered 'Messiah'
      here because it functions as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'at the unveiling of his glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὸ
  chosen: insofar as
  alternatives:
  - to the degree that
  - as
  lexicon: BDAG
  rationale: Conveys proportional force more precisely than a simple temporal or comparative
    'as.' Peter grounds the command to rejoice in the extent to which the readers
    participate in Messiah's sufferings.
- source_word: κοινωνεῖτε
  chosen: you share in
  alternatives:
  - you participate in
  - you have fellowship with
  lexicon: BDAG
  rationale: '''Share in'' is natural English and preserves the participatory sense
    of κοινωνέω without sounding overly technical. The dative phrase that follows
    indicates participation in sufferings, not merely emotional sympathy.'
- source_word: τοῖς τοῦ Χριστοῦ παθήμασιν
  chosen: the sufferings of the Messiah
  alternatives:
  - Christ's sufferings
  - the sufferings belonging to the Messiah
  lexicon: BDAG
  rationale: Genitive construction is rendered possessively in idiomatic English.
    'Messiah' follows the project's default for Χριστός when used as a title rather
    than a name-like form.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title identifying Jesus in his messianic
    role, so 'Messiah' best reflects the source and follows the contested-terms guidance.
- source_word: χαίρετε
  chosen: rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: Imperative verb calling for active joy. 'Rejoice' preserves the elevated
    but still accessible tone and matches the lexical connection with χαρῆτε later
    in the verse.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose/result in clear modern English. 'So that' is more readable
    than 'in order that' while preserving the clause relation.
- source_word: ἀποκαλύψει
  chosen: revelation
  alternatives:
  - revealing
  - unveiling
  - appearing
  lexicon: BDAG
  rationale: A formal noun is present in Greek, and 'revelation' preserves that form.
    In context it refers to the future disclosure of Messiah's glory.
- source_word: δόξης αὐτοῦ
  chosen: his glory
  alternatives:
  - the glory that belongs to him
  lexicon: BDAG
  rationale: Straightforward possessive rendering. The phrase points to the eschatological
    manifestation of the Messiah's glorious status.
- source_word: χαρῆτε
  chosen: you may also rejoice
  alternatives:
  - you may also be glad
  lexicon: BDAG
  rationale: Maintains lexical continuity with χαίρετε and preserves the subjunctive
    nuance under ἵνα. 'Also' renders καὶ and links present rejoicing with future rejoicing.
- source_word: ἀγαλλιώμενοι
  chosen: exulting
  alternatives:
  - with exultation
  - overflowing with joy
  lexicon: BDAG
  rationale: Captures the intensified, celebratory sense of the participle without
    excessive paraphrase. Rendered as a participial complement to the future rejoicing.
