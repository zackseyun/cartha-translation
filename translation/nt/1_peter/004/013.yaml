theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is titular here rather than functioning as a near-proper name.
    Following project doctrine, the title is translated to preserve its meaning and
    Jewish-messianic context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table
    for Χριστός'
- issue: Nature of participation in 'the sufferings of the Messiah'
  chosen_reading: share in the sufferings of the Messiah
  alternative_readings:
  - share the Messiah's sufferings
  - participate in sufferings for the Messiah
  rationale: The Greek most naturally speaks of participation in sufferings associated
    with the Messiah, likely believers' sufferings in union with him rather than a
    repetition of his atoning work. The translation preserves the participatory wording
    without importing a more specific doctrinal explanation into the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
