id: 1PE.4.9
reference: 1 Peter 4:9
source:
  edition: SBLGNT
  text: φιλόξενοι εἰς ἀλλήλους ἄνευ ⸀γογγυσμοῦ·
translation:
  text: Be hospitable to one another without grumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Show hospitality to one another without complaining.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλόξενοι
  chosen: Be hospitable
  alternatives:
  - Show hospitality
  - hospitable
  lexicon: BDAG
  rationale: The adjective functions imperativally in context, so English supplies
    the verbal force with 'Be hospitable.' This preserves the exhortational sense
    without over-paraphrasing. 'Show hospitality' is possible, but 'be hospitable'
    more closely reflects the adjectival form while remaining natural English.
- source_word: εἰς ἀλλήλους
  chosen: to one another
  alternatives:
  - toward one another
  - to each other
  lexicon: BDAG
  rationale: The phrase expresses mutual direction within the community. 'To one another'
    is idiomatic and preserves the reciprocal sense. 'Toward one another' is slightly
    more literal but less natural here.
- source_word: ἄνευ
  chosen: without
  lexicon: BDAG
  rationale: Standard prepositional sense indicating absence.
- source_word: γογγυσμοῦ
  chosen: grumbling
  alternatives:
  - complaining
  - murmuring
  lexicon: BDAG
  rationale: '''Grumbling'' best captures the nuance of discontented complaint in
    a communal setting and matches common biblical usage. ''Complaining'' is broader
    and weaker; ''murmuring'' is more traditional but less natural in contemporary
    English.'
