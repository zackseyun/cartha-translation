id: 1PE.4.19
reference: 1 Peter 4:19
source:
  edition: SBLGNT
  text: ὥστε καὶ οἱ πάσχοντες κατὰ τὸ θέλημα τοῦ ⸀θεοῦ πιστῷ κτίστῃ παρατιθέσθωσαν
    τὰς ψυχὰς ⸀αὐτῶν ἐν ἀγαθοποιΐᾳ.
translation:
  text: Therefore, let also those who suffer according to the will of God entrust
    their souls to a faithful Creator while doing good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their lives' or 'themselves'; the Greek word can refer to the soul,
      life, or self.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument. 'Therefore'
    is natural English and preserves the logical force.
- source_word: οἱ πάσχοντες
  chosen: those who suffer
  alternatives:
  - the ones suffering
  - those who are suffering
  lexicon: BDAG
  rationale: Substantival present participle referring to a class of people characterized
    by suffering. 'Those who suffer' is idiomatic and preserves the generic force.
- source_word: κατὰ τὸ θέλημα τοῦ θεοῦ
  chosen: according to the will of God
  alternatives:
  - in accordance with God's will
  lexicon: BDAG
  rationale: A straightforward rendering of κατά with accusative expressing conformity
    or accordance. Retains the theological weight without over-interpreting why or
    how the suffering relates to God's will.
- source_word: πιστῷ κτίστῃ
  chosen: to a faithful Creator
  alternatives:
  - to the faithful Creator
  - to a trustworthy Creator
  lexicon: BDAG
  rationale: Dative object after παρατιθέσθωσαν. 'Faithful' preserves the covenantal/reliability
    nuance of πιστός; 'Creator' is the natural rendering of κτίστης. The anarthrous
    Greek does not require the English definite article, and 'a faithful Creator'
    reads naturally while still referring to God.
- source_word: παρατιθέσθωσαν
  chosen: entrust
  alternatives:
  - commit
  - place in the care of
  lexicon: BDAG
  rationale: Middle imperative conveys committing something to another's safekeeping.
    'Entrust' is clear modern English and fits the context of confident reliance on
    God.
- source_word: τὰς ψυχὰς αὐτῶν
  chosen: their souls
  alternatives:
  - their lives
  - themselves
  lexicon: BDAG
  rationale: ψυχή can denote 'soul,' 'life,' or 'self.' Here, in a context of suffering
    and entrusting oneself to God, 'souls' preserves the traditional and theological
    depth of the term without reducing it merely to physical life. The broader semantic
    possibility is preserved in a footnote.
- source_word: ἐν ἀγαθοποιΐᾳ
  chosen: while doing good
  alternatives:
  - in doing good
  - in good conduct
  lexicon: BDAG
  rationale: The prepositional phrase expresses the manner or accompanying circumstance
    of the entrusting. 'While doing good' is idiomatic and captures ongoing righteous
    action amid suffering.
