theological_decisions:
- issue: Relation of suffering to God's will
  chosen_reading: according to the will of God
  alternative_readings:
  - in line with what God wills
  - by God's will
  rationale: The Greek states that the suffering occurs 'according to' God's will,
    but does not specify whether this means divine permission, ordination, or approval
    in a more detailed theological system. The translation preserves the text's wording
    and tension rather than resolving the doctrinal mechanics.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of ψυχή in context
  chosen_reading: souls
  alternative_readings:
  - lives
  - selves
  rationale: Using 'souls' preserves the lexical form and theological resonance of
    ψυχή, while acknowledging that the term can also refer more broadly to one's life
    or self. Because the context could support a broader sense, the alternative is
    preserved in a footnote rather than flattened in the main text.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented
    exception.'
