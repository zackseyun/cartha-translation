theological_decisions:
- issue: Nature of hostile speech in βλασφημοῦντες
  chosen_reading: human-directed slander/reviling rather than blasphemy against God
  alternative_readings:
  - blaspheming
  - speaking evil generally
  rationale: The immediate context concerns unbelievers reacting to believers' changed
    conduct. English 'blaspheme' usually suggests speech against God, which would
    mislead here. Rendering as 'slander you' preserves the interpersonal hostility
    indicated by the context.
