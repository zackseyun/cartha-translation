id: 1PE.4.18
reference: 1 Peter 4:18
source:
  edition: SBLGNT
  text: καὶ εἰ ὁ δίκαιος μόλις σῴζεται, ⸀ὁ ἀσεβὴς καὶ ἁμαρτωλὸς ποῦ φανεῖται;
translation:
  text: And if the righteous is scarcely saved, where will the ungodly and sinner
    appear?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with difficulty is saved' or 'is barely saved.' The sense is that the
      righteous are saved through severe trial, not that salvation is doubtful in
      itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'where will the ungodly and sinner be found?'
    reason: alternative_reading
lexical_decisions:
- source_word: δίκαιος
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: BDAG
  rationale: Substantival adjective with article, singular masculine. Rendered as
    a representative singular, 'the righteous,' preserving the generic force without
    over-expanding. 'Just' is possible but less natural in contemporary English.
- source_word: μόλις
  chosen: scarcely
  alternatives:
  - with difficulty
  - barely
  lexicon: BDAG
  rationale: μόλις denotes difficulty or narrowness. 'Scarcely' preserves the traditional
    and concise sense here, fitting the rhetorical citation-like form. It should not
    be taken to imply uncertainty of final salvation, but difficulty in the process/context.
- source_word: σῴζεται
  chosen: is saved
  alternatives:
  - is being saved
  - comes through safely
  lexicon: BDAG
  rationale: Present passive/middle indicative of σῴζω. 'Is saved' is the most idiomatic
    English rendering in this proverbial statement. 'Is being saved' is grammatically
    possible and highlights process, but sounds less natural here; the broader context
    of suffering supports the idea of salvation through hardship without requiring
    an explicitly progressive English form.
- source_word: ἀσεβής
  chosen: the ungodly
  alternatives:
  - the impious
  - the irreverent
  lexicon: BDAG
  rationale: Standard rendering for ἀσεβής in biblical contexts, preserving the moral-religious
    sense of one who is not reverent toward God.
- source_word: ἁμαρτωλός
  chosen: sinner
  alternatives:
  - sinful person
  lexicon: BDAG
  rationale: Common and accurate rendering. Kept distinct from ἀσεβής rather than
    collapsing the pair into a single expression, since the Greek uses two coordinated
    descriptors.
- source_word: ποῦ
  chosen: where
  alternatives:
  - in what place
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the interrogative adverb, preserving
    the rhetorical force.
- source_word: φανεῖται
  chosen: will appear
  alternatives:
  - will be found
  - will show up
  lexicon: BDAG
  rationale: Future middle of φαίνω can mean 'appear' or 'be seen/appear.' 'Will appear'
    preserves the formal rhetorical question and echoes the likely background in Proverbs
    11:31 LXX. 'Will be found' is interpretively possible but less direct.
