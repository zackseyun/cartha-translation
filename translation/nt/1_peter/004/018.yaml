theological_decisions:
- issue: Implication of μόλις σῴζεται
  chosen_reading: The verse speaks of the difficulty or severity attending the righteous
    person's salvation in the context of suffering/judgment, not uncertainty about
    whether the righteous will finally be saved.
  alternative_readings:
  - The righteous are only barely saved in the sense of uncertain final outcome.
  rationale: The immediate context in 1 Peter 4 concerns suffering, divine judgment
    beginning with God's household, and endurance. Rendering μόλις as 'scarcely' preserves
    the text's tension without importing a doctrine of insecure salvation. The wording
    should remain transparent to the Greek while avoiding a misleading paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Representative singular masculine
  chosen_reading: Use 'the righteous' as a generic singular rather than expanding
    to a plural or gender-neutral paraphrase.
  alternative_readings:
  - the righteous person
  - righteous people
  rationale: The Greek is singular masculine with representative force. This follows
    the project's gender-accurate policy while keeping the proverbial style compact.
  doctrine_reference: Gender-accurate over gender-neutral.
