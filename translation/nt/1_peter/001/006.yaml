theological_decisions:
- issue: Sense of πειρασμοῖς in a suffering context
  chosen_reading: trials
  alternative_readings:
  - temptations
  - testings
  rationale: The immediate context speaks of grief and the testing/proving of faith
    in the next verse, so 'trials' best captures external hardships without narrowing
    the term to inward temptation. This preserves the theological tension of suffering
    as a proving context rather than importing a doctrine of temptation to sin.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it
