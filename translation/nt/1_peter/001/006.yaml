id: 1PE.1.6
reference: 1 Peter 1:6
source:
  edition: SBLGNT
  text: ἐν ᾧ ἀγαλλιᾶσθε, ὀλίγον ἄρτι εἰ ⸀δέον λυπηθέντες ἐν ποικίλοις πειρασμοῖς,
translation:
  text: In this you rejoice, though now for a little while, if necessary, you have
    been grieved by various trials,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testings'; the Greek term can also mean 'temptations' in other contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In this
  alternatives:
  - In which
  - Because of this
  lexicon: BDAG
  rationale: The relative pronoun likely refers back to the preceding salvation hope/inheritance
    complex. 'In this' is idiomatic English that preserves the sphere/basis sense
    of ἐν without the awkwardness of 'in which.' 'Because of this' is interpretive
    and slightly stronger than the Greek.
- source_word: ἀγαλλιᾶσθε
  chosen: you rejoice
  alternatives:
  - you greatly rejoice
  - you exult
  lexicon: BDAG
  rationale: The verb denotes strong joy or exultation. 'You rejoice' is clear modern
    English and fits optimal equivalence; 'greatly rejoice' may over-specify intensity
    in English, while 'exult' is accurate but less natural for the target audience.
- source_word: ὀλίγον ἄρτι
  chosen: now for a little while
  alternatives:
  - for a little while now
  - at present for a little while
  lexicon: BDAG
  rationale: 'This preserves both temporal elements: present time (ἄρτι) and brevity
    (ὀλίγον). The chosen order is natural in English and reflects the concessive temporal
    sense in context.'
- source_word: εἰ δέον
  chosen: if necessary
  alternatives:
  - if it is necessary
  - if need be
  lexicon: BDAG
  rationale: δέον expresses necessity, and εἰ introduces a conditional nuance. 'If
    necessary' is concise, idiomatic, and preserves the contingency without adding
    theological explanation.
- source_word: λυπηθέντες
  chosen: you have been grieved
  alternatives:
  - you have been distressed
  - you have been made sorrowful
  lexicon: BDAG
  rationale: The participle is passive and indicates experiencing sorrow. 'You have
    been grieved' preserves the passive force and emotional weight better than the
    more generic 'distressed.'
- source_word: ἐν ποικίλοις πειρασμοῖς
  chosen: by various trials
  alternatives:
  - in various trials
  - by various testings
  - by various temptations
  lexicon: BDAG
  rationale: πειρασμοῖς can mean trials, tests, or temptations depending on context.
    Here the surrounding context of suffering and proving faith (vv. 6–7) favors 'trials.'
    Rendering ἐν instrumentally as 'by' communicates the means/circumstance causing
    grief in natural English. 'Temptations' would misdirect toward enticement to sin,
    which is not primary here.
