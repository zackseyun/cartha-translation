theological_decisions:
- issue: Extent of preserving metaphor versus using idiomatic interpretation
  chosen_reading: Retain the metaphor 'the loins of your mind girded up' in the main text, with an idiomatic alternative in a footnote.
  alternative_readings:
  - prepare your minds for action
  rationale: The Greek uses a vivid embodied metaphor for readiness. Optimal equivalence here favors preserving the image rather than replacing it entirely with interpretation, while still helping readers via footnote.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where title is active. In this context the phrase still functions as a christological title, not merely a surname-like label.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
revisions:
- timestamp: '2026-04-21T01:33:49Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_peter/001/013.json
  category: awkward_english
  tier: 1
  from: with the loins of your mind girded up, and being fully clear-minded
  to: having girded up the loins of your mind and being clear-minded
  rationale: 'The draft renders two parallel Greek participles (ἀναζωσάμενοι, νήφοντες) with two different English constructions: a prepositional phrase (''with...'') and a participial phrase (''being...''). This is slightly unbalanced. Translating both as participles (''Having girded... and being...'') would more closely reflect the parallel structure of the Greek and arguably improve the flow. This is a stylistic suggestion for improved elegance, as the current rendering is not incorrect.'
