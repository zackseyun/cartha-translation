theological_decisions:
- issue: Meaning of προεγνωσμένου with reference to Messiah before creation
  chosen_reading: Retain 'foreknown' in the main text rather than interpretively rendering
    'chosen beforehand.'
  alternative_readings:
  - chosen beforehand
  - destined beforehand
  rationale: The verse speaks of God's pretemporal relation to Messiah, but the participle
    προεγνωσμένου does not require the translator to collapse foreknowledge into predestination
    or election language. Preserving 'foreknown' maintains the text's wording and
    theological tension without forcing a denominationally loaded interpretation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Temporal force of ἐπ’ ἐσχάτου τῶν χρόνων
  chosen_reading: Render as 'at the end of the times' rather than a more interpretive
    'in these last times.'
  alternative_readings:
  - in these last times
  rationale: The Greek marks an eschatological period but does not explicitly include
    'these.' The chosen rendering preserves the temporal phrase more closely while
    still sounding natural in English.
  doctrine_reference: Translation philosophy §1 and §3
