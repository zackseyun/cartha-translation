id: 1PE.1.20
reference: 1 Peter 1:20
source:
  edition: SBLGNT
  text: προεγνωσμένου μὲν πρὸ καταβολῆς κόσμου, φανερωθέντος δὲ ἐπ’ ⸀ἐσχάτου τῶν χρόνων
    δι’ ὑμᾶς
translation:
  text: He was foreknown before the foundation of the world, but was revealed at the
    end of the times for your sake,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was chosen beforehand'; the Greek says 'was foreknown,' which may imply
      divine purpose but does not require that fuller interpretation in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'in these last times.'
    reason: alternative_reading
lexical_decisions:
- source_word: προεγνωσμένου
  chosen: was foreknown
  alternatives:
  - was known beforehand
  - was chosen beforehand
  lexicon: BDAG
  rationale: Aorist/passive participle modifying the antecedent from v. 19 (Messiah).
    'Foreknown' preserves the lexical sense of προγινώσκω without importing the stronger
    idea of 'chosen' into the main text. Because in biblical usage foreknowledge can
    imply divine purpose, 'chosen beforehand' is a possible interpretive alternative,
    but the more transparent rendering is preferred.
- source_word: πρὸ καταβολῆς κόσμου
  chosen: before the foundation of the world
  alternatives:
  - before the world's foundation
  lexicon: BDAG
  rationale: This is a standard idiom for pretemporal divine action. 'Foundation of
    the world' is clear, natural English and preserves the established biblical phrase.
- source_word: φανερωθέντος
  chosen: was revealed
  alternatives:
  - was made manifest
  - appeared
  lexicon: BDAG
  rationale: The passive participle indicates being made visible/openly disclosed.
    'Was revealed' is readable modern English and preserves the theological sense
    of manifestation without sounding overly technical.
- source_word: ἐπ’ ἐσχάτου τῶν χρόνων
  chosen: at the end of the times
  alternatives:
  - in these last times
  - at the last of the times
  lexicon: BDAG
  rationale: The phrase is literally 'at the last of the times.' 'At the end of the
    times' keeps the temporal and eschatological force while remaining idiomatic.
    'In these last times' is smoother but adds a deictic nuance not explicit in the
    Greek.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - for you
  - because of you
  lexicon: BDAG
  rationale: διά with the accusative here expresses benefit/purpose. 'For your sake'
    communicates that Messiah's manifestation was for the readers' benefit more clearly
    than the bare 'for you'.
