theological_decisions:
- issue: Rendering God's holiness in relation to the believers' call
  chosen_reading: the Holy One who called you ... be holy
  alternative_readings:
  - the one who called you is holy, so be holy
  rationale: The Greek structure places ἅγιον with the caller and then repeats ἅγιοι
    for believers, creating a deliberate correspondence. 'The Holy One' preserves
    the theological weight of God's character without expanding the syntax into an
    explanatory paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§1, 5, 6
- issue: Force of the imperative γενήθητε
  chosen_reading: be holy
  alternative_readings:
  - become holy
  rationale: The exhortation concerns the believers' manner of life in light of God's
    holiness. 'Be holy' preserves the imperative without importing a specific doctrinal
    model of sanctification process. It also matches the OT citation in the next verse
    more naturally.
  doctrine_reference: Translation philosophy §§1, 3, 6
