theological_decisions:
- issue: Meaning of 'Spirit of the Messiah' in relation to the prophets
  chosen_reading: Retain the direct wording 'the Spirit of the Messiah in them' without
    paraphrastic reduction.
  alternative_readings:
  - the prophetic Spirit speaking about the Messiah
  - the Spirit given by the Messiah
  rationale: The Greek naturally presents the Spirit associated with the Messiah as
    active in the prophets. In keeping with orthodox Christology and the instruction
    not to flatten theological weight, the translation preserves the wording rather
    than resolving it into a less direct interpretive paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Force of εἰς in 'τὰ εἰς Χριστὸν παθήματα'
  chosen_reading: Render as 'the sufferings destined for the Messiah' in the main
    text, while preserving 'the sufferings of the Messiah' in a footnote.
  alternative_readings:
  - the sufferings of the Messiah
  - the sufferings concerning the Messiah
  rationale: The construction is somewhat contested. The main text aims to reflect
    the prepositional nuance rather than defaulting to a possessive genitive idea,
    but the traditional and contextually strong alternative is preserved in a footnote
    per the project's policy to preserve genuine ambiguity.
  doctrine_reference: Translation philosophy §3; Contested terms table for Χριστός
