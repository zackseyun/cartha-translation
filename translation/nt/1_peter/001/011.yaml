id: 1PE.1.11
reference: 1 Peter 1:11
source:
  edition: SBLGNT
  text: ἐραυνῶντες εἰς τίνα ἢ ποῖον καιρὸν ἐδήλου τὸ ἐν αὐτοῖς πνεῦμα Χριστοῦ προμαρτυρόμενον
    τὰ εἰς Χριστὸν παθήματα καὶ τὰς μετὰ ταῦτα δόξας·
translation:
  text: inquiring into what person or what time the Spirit of the Messiah in them
    was indicating, as it testified beforehand to the sufferings destined for the
    Messiah and the glories after these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sufferings of the Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐραυνῶντες
  chosen: inquiring
  alternatives:
  - searching
  - investigating
  lexicon: BDAG
  rationale: The participle continues the thought from the previous verse about the
    prophets' activity. 'Inquiring' fits the object clause that follows ('into what
    person or what time') and is natural English without losing the investigative
    sense.
- source_word: εἰς τίνα ἢ ποῖον καιρόν
  chosen: into what person or what time
  alternatives:
  - into what or what sort of time
  - into whom or what time
  lexicon: BDAG
  rationale: The phrase is syntactically difficult. τίνα is best taken personally
    ('what person') and ποῖον καιρόν qualitatively/temporally ('what time' or 'what
    sort of time'). Rendering both preserves the twofold inquiry rather than collapsing
    it into a single temporal question.
- source_word: ἐδήλου
  chosen: was indicating
  alternatives:
  - made clear
  - was revealing
  - signified
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing indication rather than a punctiliar
    act. 'Was indicating' is clear modern English and preserves the sense of disclosure.
- source_word: τὸ ἐν αὐτοῖς πνεῦμα Χριστοῦ
  chosen: the Spirit of the Messiah in them
  alternatives:
  - the Messiah's Spirit in them
  - the Spirit of Christ in them
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as possession/association.
    Per project doctrine, Χριστοῦ as a title is translated 'Messiah' rather than transliterated
    'Christ.' Word order is adjusted for natural English while preserving that the
    Spirit was in the prophets.
- source_word: προμαρτυρόμενον
  chosen: as it testified beforehand
  alternatives:
  - foretelling
  - bearing witness beforehand
  lexicon: BDAG
  rationale: The participle explains how the Spirit was indicating. 'Testified beforehand'
    preserves both the witness element and the temporal prefix προ- better than the
    flatter 'foretelling'.
- source_word: τὰ εἰς Χριστὸν παθήματα
  chosen: the sufferings destined for the Messiah
  alternatives:
  - the sufferings of the Messiah
  - the sufferings for Christ
  - the sufferings leading to the Messiah
  lexicon: BDAG
  rationale: The preposition εἰς with παθήματα is not the most direct way to say 'the
    Messiah's sufferings,' so a slightly interpretive rendering is warranted. 'Destined
    for the Messiah' captures sufferings pertaining to him / appointed in relation
    to him, while avoiding overstatement. The more traditional 'the sufferings of
    the Messiah' is preserved in a footnote because it remains a plausible and familiar
    construal.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title.
- source_word: τὰς μετὰ ταῦτα δόξας
  chosen: the glories after these things
  alternatives:
  - the subsequent glories
  - the glories that would follow
  lexicon: BDAG
  rationale: A formally transparent rendering preserves the plural 'glories' and the
    temporal phrase 'after these things.' The plural may encompass the manifold exaltation/glorious
    outcomes following the sufferings.
