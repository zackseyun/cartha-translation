theological_decisions:
- issue: Rendering of ἐκλεκτοῖς
  chosen_reading: chosen
  alternative_readings:
  - elect
  rationale: The verse identifies the recipients as those chosen by God, but the translation
    avoids using the more systematized English theological label 'elect' in the main
    text where the Greek itself does not specify a particular doctrinal framework.
    This preserves the text's affirmation without importing denominational distinctives.
  doctrine_reference: Affirmations; Translation philosophy items 3 and 6
- issue: Sense of παρεπιδήμοις διασπορᾶς
  chosen_reading: 'literal-social designation with theological resonance: ''exiles
    of the dispersion'''
  alternative_readings:
  - metaphorical spiritual exiles
  - Jewish diaspora residents
  rationale: The wording is preserved in a way that allows both the social-geographical
    and theological dimensions to remain in tension. The translation does not force
    a purely ethnic-Jewish or purely metaphorical-Christian reading in the main text.
  doctrine_reference: Translation philosophy item 3
- issue: Rendering of Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Per the contested-terms guidance, Χριστός is rendered 'Messiah' where
    title force is present. In an epistolary superscription identifying Jesus, the
    titular sense remains strong enough to preserve the messianic meaning.
  doctrine_reference: 'Contested terms table: Χριστός'
