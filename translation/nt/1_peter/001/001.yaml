id: 1PE.1.1
reference: 1 Peter 1:1
source:
  edition: SBLGNT
  text: Πέτρος ἀπόστολος Ἰησοῦ Χριστοῦ ἐκλεκτοῖς παρεπιδήμοις διασπορᾶς Πόντου, Γαλατίας,
    Καππαδοκίας, Ἀσίας, καὶ Βιθυνίας,
translation:
  text: Peter, an apostle of Jesus Messiah, to the chosen exiles of the dispersion
    in Pontus, Galatia, Cappadocia, Asia, and Bithynia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elect exiles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sojourners' or 'resident aliens.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Jesus Christ.'
    reason: alternative_reading
  - marker: d
    text: The phrase 'of the dispersion' may evoke both the Jewish Diaspora and the
      broader idea of God's people living away from their true homeland.
    reason: cultural_note
lexical_decisions:
- source_word: Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Πέτρος into English as
    'Peter,' following the policy to transliterate names rather than translate them.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: Retained as 'apostle' because in NT epistolary self-identification it
    functions as a recognized office/title, not merely a generic 'messenger.' This
    preserves the formal authority claim of the sender.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Rendered 'Messiah' rather than 'Christ' because Χριστός here is a title
    in keeping with the translation policy for Christos where context supports title
    force. 'Jesus Messiah' preserves the Hebraic messianic sense while remaining natural
    English.
- source_word: ἐκλεκτοῖς
  chosen: chosen
  alternatives:
  - elect
  lexicon: BDAG
  rationale: Rendered 'chosen' for readable modern English. 'Elect' is more traditional
    but more ecclesiastically loaded in English; the Greek adjective itself denotes
    those selected/chosen. This preserves the sense without importing a narrower doctrinal
    system.
- source_word: παρεπιδήμοις
  chosen: exiles
  alternatives:
  - sojourners
  - resident aliens
  - strangers
  lexicon: BDAG
  rationale: Rendered 'exiles' to communicate social displacement and non-belonging
    in concise modern English. 'Sojourners' is more formal but less natural; 'resident
    aliens' is accurate but bureaucratic in tone. 'Exiles' best captures the lived
    outsider status in context.
- source_word: διασπορᾶς
  chosen: of the dispersion
  alternatives:
  - in the dispersion
  - of the Diaspora
  lexicon: BDAG
  rationale: Rendered with the article-like English phrase 'of the dispersion' to
    preserve the genitive construction and the likely technical resonance of diaspora/dispersed
    people. Lowercase 'dispersion' avoids overcommitting to a formal title while preserving
    the allusive force.
- source_word: Πόντου, Γαλατίας, Καππαδοκίας, Ἀσίας, καὶ Βιθυνίας
  chosen: in Pontus, Galatia, Cappadocia, Asia, and Bithynia
  lexicon: BDAG
  rationale: These are Roman provincial/geographical names, transliterated in standard
    English form. The preposition 'in' is supplied naturally in English to clarify
    the relation of the regions to 'dispersion,' since the Greek genitive list functions
    locatively in context.
