id: 1PE.1.4
reference: 1 Peter 1:4
source:
  edition: SBLGNT
  text: εἰς κληρονομίαν ἄφθαρτον καὶ ἀμίαντον καὶ ἀμάραντον, τετηρημένην ἐν οὐρανοῖς
    εἰς ὑμᾶς
translation:
  text: into an inheritance imperishable and undefiled and unfading, kept in the heavens
    for you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''in heaven.'' The Greek has the plural ''in the heavens.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς
  chosen: into
  alternatives:
  - for
  - to
  lexicon: BDAG
  rationale: Retains the directional force from the preceding context ('has begotten
    us again ... into'), linking the new birth to its goal. 'Into' is more formally
    transparent than smoothing to 'for' here.
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - heritage
  lexicon: BDAG
  rationale: '''Inheritance'' is the standard and clearest rendering for κληρονομία,
    preserving both familial and eschatological overtones without paraphrase.'
- source_word: ἄφθαρτον
  chosen: imperishable
  alternatives:
  - incorruptible
  - undecaying
  lexicon: BDAG
  rationale: '''Imperishable'' is idiomatic modern English and captures freedom from
    decay or destruction better than the more archaic ''incorruptible.'''
- source_word: ἀμίαντον
  chosen: undefiled
  alternatives:
  - unstained
  - unpolluted
  lexicon: BDAG
  rationale: '''Undefiled'' preserves the moral/cultic sense of freedom from contamination
    and is a well-established but still readable English equivalent.'
- source_word: ἀμάραντον
  chosen: unfading
  alternatives:
  - unwithering
  lexicon: BDAG
  rationale: The adjective evokes something that does not lose its beauty or vitality
    like a flower. 'Unfading' is natural English and preserves the imagery.
- source_word: τετηρημένην
  chosen: kept
  alternatives:
  - reserved
  - guarded
  - preserved
  lexicon: BDAG
  rationale: 'Perfect passive participle indicates a state resulting from prior action:
    the inheritance stands kept/reserved. ''Kept'' is concise and natural; ''reserved''
    is possible but slightly more interpretive.'
- source_word: ἐν οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural. Rendering it 'in the heavens' preserves the form
    of the source text rather than conforming to the more traditional singular English
    idiom.
- source_word: εἰς ὑμᾶς
  chosen: for you
  alternatives:
  - unto you
  - for your sake
  lexicon: BDAG
  rationale: Here εἰς with the accusative expresses orientation toward the recipients.
    'For you' is the clearest idiomatic English rendering.
