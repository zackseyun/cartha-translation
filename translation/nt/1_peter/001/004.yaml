- issue: Rendering οὐρανοῖς in plural form
  chosen_reading: in the heavens
  alternative_readings:
  - in heaven
  rationale: No doctrinal issue is at stake, but the translation philosophy prioritizes
    original-language primacy over inherited English tradition. The plural better
    reflects the Greek form while remaining understandable.
