theological_decisions:
- issue: Distinction between φιλαδελφία and ἀγαπάω in the same verse
  chosen_reading: Render φιλαδελφία as 'brotherly love' and ἀγαπήσατε as 'love' to
    preserve the rhetorical progression from familial affection to the broader imperative
    of love.
  alternative_readings:
  - Render both with 'love' in idiomatic English
  rationale: The Greek uses two related but distinct love terms. Preserving the distinction
    reflects the source text's texture without forcing a theological contrast stronger
    than the verse itself states.
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms) and Contested
    terms table for ἀγάπη → love'
- issue: Gendered force of φιλαδελφία
  chosen_reading: Keep 'brotherly love' in the main text, with an explanatory footnote
    that the term refers to familial love among fellow believers, including sisters.
  alternative_readings:
  - love for fellow believers
  - love for brothers and sisters
  rationale: The project prefers gender-accurate rendering. Here the lexical form
    is specifically sibling/familial, and 'brotherly love' best preserves the Greek
    term and its distinction from ἀγαπάω. Inclusivity is contextually relevant and
    therefore noted in a footnote rather than replacing the lexical form in the text.
  doctrine_reference: 'Translation philosophy #4 (gender-accurate over gender-neutral)'
- issue: Textual variant after ἐκ καρδίας
  chosen_reading: Translate the SBLGNT text 'from the heart' without adding 'pure.'
  alternative_readings:
  - from a pure heart
  rationale: The provided base text reads ἐκ καρδίας. The variant καθαρᾶς is well
    known and worth preserving in a footnote, but it should not be imported into the
    main text against the stated source text.
