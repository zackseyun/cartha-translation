id: 1PE.1.22
reference: 1 Peter 1:22
source:
  edition: SBLGNT
  text: Τὰς ψυχὰς ὑμῶν ἡγνικότες ἐν τῇ ὑπακοῇ τῆς ⸀ἀληθείας εἰς φιλαδελφίαν ἀνυπόκριτον
    ⸀ἐκ καρδίας ἀλλήλους ἀγαπήσατε ἐκτενῶς,
translation:
  text: Having purified your souls by obedience to the truth for sincere brotherly
    love, love one another earnestly from the heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love for fellow believers'; Greek 'brotherly love' denotes familial
      affection among fellow Christians, including sisters as well as brothers.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'from a pure heart.'
    reason: textual_variant
lexical_decisions:
- source_word: ἡγνικότες
  chosen: having purified
  alternatives:
  - having cleansed
  - since you have purified
  lexicon: BDAG
  rationale: Perfect active participle indicates a completed action with continuing
    relevance prior to the main imperative. 'Having purified' preserves the participial
    structure and avoids over-interpreting causality beyond the Greek.
- source_word: ψυχὰς
  chosen: souls
  alternatives:
  - lives
  - selves
  lexicon: BDAG
  rationale: ψυχή can denote life, self, or soul. Here 'souls' is retained because
    it is the direct lexical equivalent and fits Petrine usage without requiring a
    reduction to mere inwardness; it refers to the persons themselves in their inner
    life.
- source_word: ἐν τῇ ὑπακοῇ τῆς ἀληθείας
  chosen: by obedience to the truth
  alternatives:
  - in obedience to the truth
  lexicon: BDAG
  rationale: ἐν with the dative can express means or sphere. 'By obedience to the
    truth' communicates the instrumental nuance naturally in English while preserving
    the close link between purification and obedient response to the gospel truth.
- source_word: ἀληθείας
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is present in Greek. 'The truth' likely refers to the Christian
    message/gospel truth rather than truth in the abstract, so the article is preserved.
- source_word: εἰς φιλαδελφίαν ἀνυπόκριτον
  chosen: for sincere brotherly love
  alternatives:
  - unto unhypocritical brotherly love
  - resulting in sincere brotherly love
  lexicon: BDAG
  rationale: εἰς here expresses goal or result. φιλαδελφία is specifically familial
    affection among fellow believers; 'brotherly love' preserves the lexical distinction
    from ἀγαπάω later in the verse. ἀνυπόκριτον is rendered 'sincere' as idiomatic
    English for 'without hypocrisy.'
- source_word: φιλαδελφίαν
  chosen: brotherly love
  alternatives:
  - love for the brothers and sisters
  - familial love
  lexicon: BDAG
  rationale: The term literally denotes sibling/family affection. 'Brotherly love'
    keeps the lexical form and preserves the distinction from the following ἀγαπήσατε.
    A more inclusive paraphrase is possible but would blur the source wording; inclusivity
    can be noted in a footnote.
- source_word: ἐκ καρδίας
  chosen: from the heart
  alternatives:
  - from a pure heart
  - from your heart
  lexicon: BDAG
  rationale: The SBLGNT reading is ἐκ καρδίας without an adjective. 'From the heart'
    is the straightforward rendering. 'From a pure heart' reflects a later textual
    variant and should be preserved only in a footnote, not adopted into the main
    text.
- source_word: ἀγαπήσατε
  chosen: love
  alternatives:
  - keep loving
  lexicon: BDAG
  rationale: Aorist imperative calls for decisive exhortation. English simple imperative
    'love' is the most natural equivalent. 'Keep loving' would import an imperfective
    nuance not explicit in the aorist.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering; 'one another' suits the elevated paraenetic
    style.
- source_word: ἐκτενῶς
  chosen: earnestly
  alternatives:
  - fervently
  - constantly
  - deeply
  lexicon: BDAG
  rationale: The adverb conveys intensity and persistence. 'Earnestly' is clear modern
    English and avoids archaic tone, while still expressing serious, stretched-out
    devotion.
