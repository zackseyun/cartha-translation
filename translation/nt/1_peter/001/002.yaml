id: 1PE.1.2
reference: 1 Peter 1:2
source:
  edition: SBLGNT
  text: κατὰ πρόγνωσιν θεοῦ πατρός, ἐν ἁγιασμῷ πνεύματος, εἰς ὑπακοὴν καὶ ῥαντισμὸν
    αἵματος Ἰησοῦ Χριστοῦ· χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη.
translation:
  text: 'according to the foreknowledge of God the Father, in the sanctification of
    the Spirit, for obedience and the sprinkling of the blood of Jesus Messiah: Grace
    to you and peace be multiplied.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Jesus Christ." The Greek title Χριστός can function in a name-like way
      in some contexts; here it is rendered "Messiah" to preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: '"Foreknowledge" translates πρόγνωσις. Interpreters differ on whether this
      emphasizes God''s prior knowledge, his prior choice, or both.'
    reason: lexical_alternative
  - marker: c
    text: The phrase "sprinkling of the blood" likely echoes Old Testament covenant
      and purification imagery, especially Exodus 24:8.
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ πρόγνωσιν
  chosen: according to the foreknowledge
  alternatives:
  - in accordance with the foreknowledge
  - by the foreknowledge
  lexicon: BDAG
  rationale: κατά with the accusative commonly expresses norm or accordance. πρόγνωσις
    is best rendered 'foreknowledge' here; this preserves the lexical sense without
    importing a full theological system into the translation.
- source_word: θεοῦ πατρός
  chosen: of God the Father
  alternatives:
  - of God, the Father
  lexicon: BDAG
  rationale: The genitives identify the one whose foreknowledge is in view. 'God the
    Father' is natural English and preserves the appositional force.
- source_word: ἐν ἁγιασμῷ πνεύματος
  chosen: in the sanctification of the Spirit
  alternatives:
  - by the sanctifying work of the Spirit
  - in sanctification by the Spirit
  lexicon: BDAG
  rationale: ἁγιασμός denotes sanctification/holiness-making. Retaining 'sanctification'
    preserves the theological term present in the Greek. The genitive πνεύματος is
    taken as referring to the Holy Spirit; 'of the Spirit' is more formally transparent
    than the more interpretive 'by the Spirit.'
- source_word: εἰς ὑπακοὴν
  chosen: for obedience
  alternatives:
  - unto obedience
  - for obedientness
  lexicon: BDAG
  rationale: εἰς marks purpose or result. 'For obedience' is idiomatic and preserves
    the telic sense.
- source_word: καὶ ῥαντισμὸν αἵματος
  chosen: and the sprinkling of the blood
  alternatives:
  - and sprinkling with the blood
  - and blood-sprinkling
  lexicon: BDAG
  rationale: ῥαντισμός is 'sprinkling,' likely evoking covenant/purification imagery.
    The construction is kept close to the Greek to preserve the allusive texture.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a name-like form. Here the phrase still carries titular
    force.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  chosen: Grace to you and peace
  alternatives:
  - Grace and peace to you
  lexicon: BDAG
  rationale: This preserves the standard epistolary blessing while following the Greek
    word order closely enough for transparency.
- source_word: πληθυνθείη
  chosen: be multiplied
  alternatives:
  - be increased
  - increase
  lexicon: BDAG
  rationale: The optative expresses a wish or blessing. 'Be multiplied' is the conventional
    and accurate rendering in this epistolary context.
