theological_decisions:
- issue: Meaning of πρόγνωσις in relation to election
  chosen_reading: Rendered neutrally as 'foreknowledge' without expanding to 'foreordaining
    love' or reducing to mere foresight.
  alternative_readings:
  - foreordination
  - foreordaining love
  - prescience
  rationale: The Greek term itself is πρόγνωσις, and the translation should preserve
    the theological tension rather than resolve a debated doctrinal question beyond
    the text's wording.
  doctrine_reference: Translation philosophy §3
- issue: Referent of πνεύματος
  chosen_reading: Capitalized as 'the Spirit' to indicate the Holy Spirit.
  alternative_readings:
  - spirit (human spirit or a non-personal sense)
  rationale: In the triadic structure of the verse ('God the Father' ... 'the Spirit'
    ... 'Jesus Messiah'), the referent is best understood as the Holy Spirit. Capitalization
    communicates this in English without adding words absent from the Greek.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Force of Χριστοῦ
  chosen_reading: Translated as the title 'Messiah' rather than retained as the name-like
    'Christ.'
  alternative_readings:
  - Christ
  rationale: Project doctrine directs that Χριστός be translated as 'Messiah' where
    context supports titular force. Here it identifies Jesus in a theologically meaningful
    title.
  doctrine_reference: 'Contested terms table: Χριστός'
