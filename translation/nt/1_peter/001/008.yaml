theological_decisions:
- issue: Rendering πιστεύοντες with εἰς ὃν
  chosen_reading: believing in him
  alternative_readings:
  - trusting in him
  - having faith in him
  rationale: The doctrine excerpt sets πίστις default as 'faith' while preserving
    tension where needed. Here the verbal participle πιστεύοντες is not a major contested
    construction like pistis Christou, so 'believing in him' best balances lexical
    transparency and natural English. 'Trusting in him' is a legitimate nuance but
    not required in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
- issue: Rendering δεδοξασμένῃ χαρᾷ
  chosen_reading: glorified joy
  alternative_readings:
  - joy filled with glory
  - glorious joy
  rationale: The Greek uses a perfect passive participle, and the translation preserves
    that form rather than flattening it to a simple adjective. This avoids importing
    a more interpretive paraphrase while still remaining understandable. Because English
    readers may find 'glorified joy' unusual, a footnote preserves the smoother alternatives.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #6'
