id: 1PE.1.8
reference: 1 Peter 1:8
source:
  edition: SBLGNT
  text: ὃν οὐκ ⸀ἰδόντες ἀγαπᾶτε, εἰς ὃν ἄρτι μὴ ὁρῶντες πιστεύοντες δὲ ⸀ἀγαλλιᾶσθε
    χαρᾷ ἀνεκλαλήτῳ καὶ δεδοξασμένῃ,
translation:
  text: Though you have not seen him, you love him. Though you do not now see him,
    yet believing in him, you rejoice with inexpressible and glorified joy,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you rejoice with joy that is full of glory' or 'with glorious joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  chosen: him
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Relative pronoun referring back to Jesus Christ in the prior context.
    English object pronoun 'him' is natural and avoids stiffness; 'whom' is possible
    but less readable in modern English.
- source_word: ἰδόντες
  chosen: have not seen
  alternatives:
  - did not see
  - not having seen
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, paired with present main verb ἀγαπᾶτε. Rendered
    as 'have not seen' to convey prior non-experience with present relevance in idiomatic
    English.
- source_word: ἀγαπᾶτε
  chosen: you love
  alternatives:
  - you are loving
  lexicon: BDAG
  rationale: Present indicative of ἀγαπάω. Following the project's default for ἀγάπη
    cognates, rendered with 'love.' Simple present is the natural English equivalent.
- source_word: εἰς ὃν
  chosen: in him
  alternatives:
  - into whom
  - on whom
  lexicon: BDAG
  rationale: With πιστεύοντες, εἰς commonly expresses the object of faith/trust. 'Believing
    in him' is standard and idiomatic English for πιστεύειν εἰς.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - for the present time
  lexicon: BDAG
  rationale: Temporal adverb marking the present situation in contrast with future
    sight. 'Now' is concise and natural.
- source_word: ὁρῶντες
  chosen: do not now see
  alternatives:
  - are not seeing now
  - not seeing now
  lexicon: BDAG
  rationale: Present participle of ὁράω. Rendered with an English finite clause for
    smoothness while preserving ongoing present non-sight.
- source_word: πιστεύοντες
  chosen: believing in him
  alternatives:
  - trusting in him
  - having faith in him
  lexicon: BDAG; Louw-Nida
  rationale: Present participle of πιστεύω. In line with the doctrine table, the default
    rendering family is 'faith'; here the verbal form is best expressed as 'believing.'
    Because πιστεύω takes εἰς ὃν, 'believing in him' is preferable to the less explicit
    'believing.' 'Trusting' is semantically possible but not chosen as the default.
- source_word: δὲ
  chosen: yet
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Mild adversative/continuative particle marking contrast between not seeing
    and still believing/rejoicing. 'Yet' captures the concessive force well in context.
- source_word: ἀγαλλιᾶσθε
  chosen: you rejoice
  alternatives:
  - you exult
  - you greatly rejoice
  lexicon: BDAG
  rationale: Present middle indicative conveying exuberant joy. 'Rejoice' is clear
    modern English; the intensified sense is carried by the following description
    of the joy rather than by a more wooden gloss like 'exult.'
- source_word: χαρᾷ
  chosen: with ... joy
  alternatives:
  - in ... joy
  lexicon: BDAG
  rationale: Dative of manner/instrument accompanying ἀγαλλιᾶσθε. 'With joy' is the
    most natural English expression.
- source_word: ἀνεκλαλήτῳ
  chosen: inexpressible
  alternatives:
  - unspeakable
  - indescribable
  lexicon: BDAG
  rationale: Describes joy as beyond verbal expression. 'Inexpressible' is modern
    and precise; 'unspeakable' can sound archaic or misleading in contemporary English.
- source_word: δεδοξασμένῃ
  chosen: glorified
  alternatives:
  - full of glory
  - glorious
  lexicon: BDAG
  rationale: Perfect passive participle modifying joy. 'Glorified' preserves the verbal
    aspect and the connection to δόξα/δοξάζω. Alternatives such as 'full of glory'
    are interpretive expansions and are preserved in a footnote because they are common
    and plausible.
