id: 1PE.1.25
reference: 1 Peter 1:25
source:
  edition: SBLGNT
  text: τὸ δὲ ῥῆμα κυρίου μένει εἰς τὸν αἰῶνα. τοῦτο δέ ἐστιν τὸ ῥῆμα τὸ εὐαγγελισθὲν
    εἰς ὑμᾶς.
translation:
  text: but the word of the Lord remains forever." And this is the word that was proclaimed
    as good news to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word that was preached to you as the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥῆμα
  chosen: word
  alternatives:
  - message
  - saying
  lexicon: BDAG
  rationale: ῥῆμα commonly denotes a spoken word, saying, or message. 'Word' preserves
    the intertextual echo of Isaiah 40:8 in the immediately preceding citation and
    fits both clauses consistently.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - the LORD
  - the Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here the genitive means
    'of the Lord.' 'The LORD' could stress the Isaiah source context, but the NT wording
    uses κύριος and the default rendering is retained.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - endures
  lexicon: BDAG
  rationale: μένω here expresses continuing permanence. 'Remains' is clear modern
    English and preserves the durative force without archaic tone.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  - into eternity
  lexicon: BDAG
  rationale: This idiom means enduring perpetually. 'Forever' is the most natural
    modern equivalent while preserving the sense of unending duration.
- source_word: τοῦτο δέ ἐστιν
  chosen: And this is
  alternatives:
  - Now this is
  - This, then, is
  lexicon: BDAG
  rationale: δέ marks a mild transition. 'And this is' reads naturally in English
    and links the citation to Peter's application.
- source_word: τὸ ῥῆμα τὸ εὐαγγελισθὲν
  chosen: the word that was proclaimed as good news
  alternatives:
  - the word that was preached as the gospel
  - the message that was evangelized
  - the word that was announced as good news
  lexicon: BDAG
  rationale: The participle εὐαγγελισθέν comes from εὐαγγελίζω, 'to proclaim good
    news.' Rendering it verbally as 'was proclaimed as good news' preserves the gospel
    sense without relying on ecclesiastical shorthand. 'Preached as the gospel' is
    possible but less transparent to modern readers.
- source_word: εἰς ὑμᾶς
  chosen: to you
  alternatives:
  - for you
  - among you
  lexicon: BDAG
  rationale: With εὐαγγελίζω, εἰς + accusative can indicate direction toward the hearers.
    'To you' is the most straightforward idiomatic rendering in English.
