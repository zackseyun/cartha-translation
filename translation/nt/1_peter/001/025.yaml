theological_decisions:
- issue: Referent of 'the word of the Lord' in relation to Isaiah 40:8 and Peter's
    gospel application
  chosen_reading: Retain 'the word of the Lord' in the citation and identify it in
    the second clause as the gospel message proclaimed to the readers.
  alternative_readings:
  - Render more interpretively as 'the message from the Lord' throughout
  rationale: The verse first cites Scripture, then applies it christologically and
    evangelistically. Keeping 'word of the Lord' preserves the scriptural wording
    and theological continuity, while the second clause explains that this enduring
    word is the gospel announced to the audience. This preserves the text's tension
    rather than collapsing citation and application into a paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of εὐαγγελισθέν
  chosen_reading: Translate with explicit 'good news' language rather than the noun
    'gospel' alone.
  alternative_readings:
  - '''preached to you'''
  - '''preached as the gospel to you'''
  rationale: This choice makes the verbal force of εὐαγγελίζω clear and accessible
    in modern English while preserving the theological content of gospel proclamation.
    It does not add doctrinal content beyond the Greek.
  doctrine_reference: Translation philosophy §6
