id: 1PE.1.23
reference: 1 Peter 1:23
source:
  edition: SBLGNT
  text: ἀναγεγεννημένοι οὐκ ἐκ σπορᾶς φθαρτῆς ἀλλὰ ἀφθάρτου, διὰ λόγου ζῶντος θεοῦ
    καὶ ⸀μένοντος·
translation:
  text: having been born again, not from perishable seed but imperishable, through
    the living and abiding word of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through the word of the living and abiding God.' The Greek participles
      'living' and 'abiding' can be taken with either 'word' or 'God,' though the
      context favors their modifying 'word.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναγεγεννημένοι
  chosen: having been born again
  alternatives:
  - having been begotten again
  - since you have been born again
  lexicon: BDAG
  rationale: 'Perfect passive participle, nominative plural: denotes a completed action
    with continuing result. ''Having been born again'' preserves the participial form
    and the passive sense without over-paraphrasing.'
- source_word: σπορᾶς
  chosen: seed
  alternatives:
  - seed-stock
  - sowing
  lexicon: BDAG
  rationale: In this metaphorical contrast with 'perishable/imperishable,' 'seed'
    is the most natural and established English equivalent and fits the birth imagery.
- source_word: φθαρτῆς
  chosen: perishable
  alternatives:
  - corruptible
  - decaying
  lexicon: BDAG
  rationale: '''Perishable'' is clear modern English and matches the contrast with
    ἀφθάρτου. ''Corruptible'' is more traditional but less natural for contemporary
    readers.'
- source_word: ἀφθάρτου
  chosen: imperishable
  alternatives:
  - incorruptible
  lexicon: BDAG
  rationale: Chosen to preserve the lexical contrast with φθαρτῆς in readable modern
    English.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive, διά indicates means or instrumentality. 'Through'
    is concise and idiomatic.
- source_word: λόγου
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' Here 'word' preserves the traditional
    and lexical sense, while the surrounding modifiers explain its life-giving character.
    'Message' is possible but less textually direct.
- source_word: ζῶντος
  chosen: living
  alternatives:
  - alive
  - life-giving
  lexicon: BDAG
  rationale: Present participle used adjectivally. 'Living' is the most direct rendering
    and works naturally with 'word.'
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: 'The genitive most naturally modifies λόγου as possession/source: ''the
    word of God.'' ''From God'' is interpretive and less formally tied to the Greek
    construction.'
- source_word: μένοντος
  chosen: abiding
  alternatives:
  - enduring
  - remaining
  lexicon: BDAG
  rationale: Present participle parallel to ζῶντος. 'Abiding' preserves the durative
    sense and echoes Johannine and Petrine theological diction without sounding archaic.
