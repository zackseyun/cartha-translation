theological_decisions:
- issue: Whether ζῶντος θεοῦ καὶ μένοντος modifies 'word' or 'God'
  chosen_reading: 'Both participles modify ''word'': ''the living and abiding word
    of God'''
  alternative_readings:
  - '''through the word of the living and abiding God'''
  rationale: Grammatically, the genitive participles ζῶντος and μένοντος most naturally
    agree with λόγου (genitive masculine singular), while θεοῦ stands as a dependent
    genitive ('word of God'). This also fits the immediate context, especially v.25's
    emphasis on the enduring word. The alternative is syntactically possible and worth
    preserving in a footnote because English punctuation and phrasing can suggest
    either attachment.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it where ambiguity is genuine.'
