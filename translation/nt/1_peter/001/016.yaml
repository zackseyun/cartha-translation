theological_decisions:
- issue: Force of the future ἔσεσθε in a holiness citation
  chosen_reading: Render as 'You shall be holy' to preserve both the formal future
    and its scriptural-command force.
  alternative_readings:
  - You will be holy
  - Be holy
  rationale: The Greek cites Levitical wording in future form, which in biblical legal/exhortatory
    style can function imperativally. 'You shall be holy' best preserves the intertextual
    form without flattening it into a mere prediction or recasting it as a simple
    imperative.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than over-resolve.'
