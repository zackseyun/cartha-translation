id: 1PE.1.16
reference: 1 Peter 1:16
source:
  edition: SBLGNT
  text: διότι γέγραπται ⸀ὅτι Ἅγιοι ⸀ἔσεσθε, ὅτι ἐγὼ ⸀ἅγιος.
translation:
  text: because it is written, “You shall be holy, because I am holy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more directly as an imperative, 'Be holy.' The Greek follows the wording
      of the Scripture citation with a future form, 'You shall be holy.'
    reason: alternative_reading
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the scriptural basis for the preceding exhortation. 'Because'
    is natural modern English and preserves the causal force.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation. 'It is written' preserves both the idiomatic citation formula and the
    abiding authority implied by the perfect.
- source_word: ὅτι
  chosen: that / quotation marker omitted in English
  alternatives:
  - that
  lexicon: BDAG
  rationale: The first ὅτι introduces the quotation. English idiom normally omits
    an explicit 'that' before a direct quotation, so quotation marks carry the function.
- source_word: Ἅγιοι
  chosen: holy
  alternatives:
  - set apart
  lexicon: BDAG
  rationale: ἅγιος in this ethical and covenantal context is best rendered 'holy.'
    'Set apart' captures part of the sense but is too narrow here, since the citation
    grounds moral likeness to God.
- source_word: ἔσεσθε
  chosen: you shall be
  alternatives:
  - you will be
  - be
  lexicon: BDAG
  rationale: Future middle indicative, echoing the wording of the LXX citation from
    Leviticus. 'You shall be' preserves the scriptural and imperative-like force better
    than the flatter 'you will be.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'The second ὅτι gives the reason for the command/citation: God''s own
    holiness. ''Because'' clearly expresses the causal relationship in contemporary
    English.'
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun retained in translation because it is part of the citation's
    emphatic divine self-reference.
- source_word: ἅγιος
  chosen: holy
  alternatives:
  - set apart
  lexicon: BDAG
  rationale: Rendered consistently with the earlier adjective in the verse. The statement
    grounds the believer's holiness in God's own holiness, so lexical consistency
    is important.
