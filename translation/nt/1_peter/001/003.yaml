id: 1PE.1.3
reference: 1 Peter 1:3
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ κατὰ τὸ πολὺ αὐτοῦ
    ἔλεος ἀναγεννήσας ἡμᾶς εἰς ἐλπίδα ζῶσαν δι’ ἀναστάσεως Ἰησοῦ Χριστοῦ ἐκ νεκρῶν,
translation:
  text: Blessed be the God and Father of our Lord Jesus Messiah, who according to
    his great mercy has caused us to be born again into a living hope through the
    resurrection of Jesus Messiah from the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its titular sense.
    reason: alternative_reading
  - marker: b
    text: Or 'has given us new birth.' The Greek verb keeps the imagery of being begotten
      or born again.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  chosen: Blessed be
  alternatives:
  - Blessed
  - Praised be
  lexicon: BDAG
  rationale: Predicate adjective used in a doxological exclamation. 'Blessed be' is
    idiomatic English for this benedictory form and preserves the worshipful force
    better than a flat adjectival 'Blessed' alone.
- source_word: θεὸς καὶ πατὴρ
  chosen: the God and Father
  alternatives:
  - God and Father
  lexicon: BDAG
  rationale: The single article governs both nouns, yielding the familiar relational
    expression 'the God and Father.' Retaining both nouns preserves the formal structure
    and theological specificity of the doxology.
- source_word: κυρίου
  chosen: Lord
  alternatives: []
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' This is a title,
    not merely a polite address.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός functions as a title here rather than a fixed surname, so 'Messiah'
    best reflects the source and the project's stated preference to translate titles
    where context supports it.
- source_word: κατὰ τὸ πολὺ αὐτοῦ ἔλεος
  chosen: according to his great mercy
  alternatives:
  - because of his great mercy
  - in keeping with his abundant mercy
  lexicon: BDAG
  rationale: 'κατά with the accusative here expresses standard or measure: God''s
    action is in accordance with the abundance of his mercy. ''Great mercy'' is natural
    English and preserves πολὺ without overexpansion.'
- source_word: ἀναγεννήσας
  chosen: has caused us to be born again
  alternatives:
  - has begotten us again
  - has given us new birth
  lexicon: BDAG
  rationale: Aorist participle from ἀναγεννάω denotes bringing to new birth. 'Has
    caused us to be born again' preserves divine agency and the birth imagery more
    explicitly than the more abstract 'has given us new birth.' Present perfect English
    fits the completed act with present result in context.
- source_word: εἰς ἐλπίδα ζῶσαν
  chosen: into a living hope
  alternatives:
  - to a living hope
  lexicon: BDAG
  rationale: εἰς marks result or goal. 'Into a living hope' preserves the directional
    nuance and the vivid metaphor, while 'living' straightforwardly renders ζῶσαν.
- source_word: δι’ ἀναστάσεως
  chosen: through the resurrection
  alternatives:
  - by the resurrection
  lexicon: BDAG
  rationale: διά with the genitive normally indicates means or instrumentality. 'Through'
    is the most transparent rendering here.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. The more literal
    'out from among the dead' is possible but too cumbersome for the main text.
