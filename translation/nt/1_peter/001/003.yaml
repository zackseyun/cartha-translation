theological_decisions:
- issue: Rendering Χριστός in a christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase 'Jesus Messiah' preserves Χριστός as a meaningful title rather
    than treating it as a name-like element. This follows the project's default unless
    context clearly favors the name-like 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Monergistic nuance of ἀναγεννήσας
  chosen_reading: has caused us to be born again
  alternative_readings:
  - has begotten us again
  - has given us new birth
  rationale: The Greek explicitly presents God as the acting subject in new birth.
    The translation preserves that agency without importing a broader denominational
    system beyond what the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition'
