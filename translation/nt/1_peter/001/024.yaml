id: 1PE.1.24
reference: 1 Peter 1:24
source:
  edition: SBLGNT
  text: διότι πᾶσα σὰρξ ὡς χόρτος, καὶ πᾶσα δόξα ⸀αὐτῆς ὡς ἄνθος χόρτου· ἐξηράνθη
    ὁ χόρτος, καὶ τὸ ⸀ἄνθος ἐξέπεσεν·
translation:
  text: because all flesh is like grass, and all its glory is like the flower of grass.
    The grass withered, and the flower fell off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity.' The Greek says 'all flesh,' echoing Isaiah 40:6 and emphasizing
      human mortality.
    reason: lexical_alternative
  - marker: b
    text: Or 'all its splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the scriptural ground for the preceding statement; 'because'
    is clear modern English and preserves the causal force.
- source_word: πᾶσα σὰρξ
  chosen: all flesh
  alternatives:
  - all humanity
  - every person
  lexicon: BDAG
  rationale: Following the doctrine default for σάρξ, this is rendered literally as
    'flesh' in a quotation about human frailty and mortality, not as 'sinful nature.'
    The phrase echoes Isa 40:6 and preserves the metaphorical force of mortal humanity.
- source_word: ὡς χόρτος
  chosen: is like grass
  alternatives:
  - is as grass
  lexicon: BDAG
  rationale: χόρτος here refers to grass/vegetation in a simile of transience. 'Is
    like grass' is natural English while retaining the comparison.
- source_word: πᾶσα δόξα αὐτῆς
  chosen: all its glory
  alternatives:
  - all its splendor
  - all human glory
  lexicon: BDAG
  rationale: δόξα in this context denotes outward splendor or honor belonging to 'all
    flesh.' 'Its' correctly refers back to the collective singular 'flesh.' 'Glory'
    preserves the lexical connection and biblical resonance.
- source_word: ὡς ἄνθος χόρτου
  chosen: is like the flower of grass
  alternatives:
  - is like a flower of the field
  - is like the flower of grassland
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitival image from the Isaiah
    quotation. Although 'flower of the field' is idiomatic in some English traditions,
    χόρτου is specifically 'of grass.'
- source_word: ἐξηράνθη
  chosen: withered
  alternatives:
  - dried up
  lexicon: BDAG
  rationale: The aorist verb describes the grass drying out. 'Withered' is idiomatic
    in English for vegetation and fits the poetic citation.
- source_word: ἐξέπεσεν
  chosen: fell off
  alternatives:
  - fell
  - dropped
  lexicon: BDAG
  rationale: ἐκπίπτω here describes a flower falling from its stem. 'Fell off' makes
    the image explicit in natural English.
