theological_decisions:
- issue: Rendering of σάρξ in a quotation about human mortality
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - every person
  rationale: The context is not ethical corruption but the frailty and transience
    of mortal life. The doctrinal guidance specifies 'flesh' for literal uses and
    'sinful nature' only for metaphorical contexts of moral weakness. Retaining 'flesh'
    also preserves the intertextual echo of Isaiah 40:6.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy
    #1 and #5'
