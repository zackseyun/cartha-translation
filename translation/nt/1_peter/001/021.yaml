theological_decisions:
- issue: Sense of πιστούς
  chosen_reading: '''believers'' referring to those who believe in God through Christ'
  alternative_readings:
  - '''faithful ones'''
  rationale: The immediate phrase εἰς θεόν strongly favors the sense of believing/trusting
    rather than general faithfulness. This avoids importing a works-oriented nuance
    not demanded by the syntax.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: Relation of Christ to access to God
  chosen_reading: '''through him'' indicates mediated access/belief in God through
    Christ'
  alternative_readings:
  - a looser causal sense such as 'because of him'
  rationale: The verse presents Christ as the mediating means by which believers come
    to faith in God, consistent with the grammar of διά + genitive and without adding
    later doctrinal formulations beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Force of ὥστε clause
  chosen_reading: '''so that your faith and hope are in God'''
  alternative_readings:
  - '''with the result that your faith and hope are in God'''
  rationale: The clause can be heard as result flowing from God's action in Christ,
    and English 'so that' preserves that theological logic without over-specifying
    whether Peter intends pure result or purpose.
  doctrine_reference: Translation philosophy §3
