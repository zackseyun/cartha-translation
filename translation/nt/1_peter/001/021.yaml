id: 1PE.1.21
reference: 1 Peter 1:21
source:
  edition: SBLGNT
  text: τοὺς δι’ αὐτοῦ ⸀πιστοὺς εἰς θεὸν τὸν ἐγείραντα αὐτὸν ἐκ νεκρῶν καὶ δόξαν αὐτῷ
    δόντα, ὥστε τὴν πίστιν ὑμῶν καὶ ἐλπίδα εἶναι εἰς θεόν.
translation:
  text: who through him are believers in God, who raised him from the dead and gave
    him glory, so that your faith and hope are in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithful ones'; the phrase here most likely means those who believe
      in God through Christ.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the result that your faith and hope are in God.'
    reason: alternative_reading
lexical_decisions:
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with the genitive normally expresses means or agency. 'Through him'
    best captures mediated access to God through Christ without overstating direct
    agency.
- source_word: πιστούς
  chosen: believers
  alternatives:
  - faithful ones
  - those who believe
  lexicon: BDAG
  rationale: Although πιστός can mean 'faithful' or 'trustworthy,' in this construction
    with εἰς θεόν it denotes those who believe in God. 'Believers' is concise, natural
    English and fits the syntax.
- source_word: εἰς θεόν
  chosen: in God
  alternatives:
  - toward God
  - into God
  lexicon: BDAG
  rationale: With πιστούς and later with πίστιν/ἐλπίδα, εἰς marks direction/object
    of trust. Idiomatic English uses 'in God' for belief, faith, and hope directed
    toward God.
- source_word: τὸν ἐγείραντα αὐτὸν ἐκ νεκρῶν
  chosen: who raised him from the dead
  alternatives:
  - who awakened him from among the dead
  lexicon: BDAG
  rationale: Standard resurrection idiom. 'Raised him from the dead' is both accurate
    and clear in English.
- source_word: δόξαν αὐτῷ δόντα
  chosen: and gave him glory
  alternatives:
  - and gave glory to him
  - and granted him glory
  - and honored him
  lexicon: BDAG
  rationale: The aorist participle parallels 'raised' and refers to God's bestowal
    of exalted glory on Christ. 'Gave him glory' is the most direct rendering.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: ὥστε here introduces result/purpose flowing from God's raising and glorifying
    Christ. 'So that' preserves the connection without forcing a stricter distinction
    between result and purpose.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    it denotes the readers' believing reliance on God, not Christ's faithfulness.
- source_word: ἐλπίδα
  chosen: hope
  alternatives:
  - confident hope
  - expectation
  lexicon: BDAG
  rationale: ἐλπίς denotes hope or expectation. 'Hope' is the standard and sufficient
    rendering here.
- source_word: εἶναι εἰς θεόν
  chosen: are in God
  alternatives:
  - might be in God
  - would be in God
  - are directed toward God
  lexicon: BDAG
  rationale: The infinitive with ὥστε expresses the resulting state of the readers'
    faith and hope. 'Are in God' is idiomatic and preserves the repeated εἰς θεόν
    from earlier in the verse.
