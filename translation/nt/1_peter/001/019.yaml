id: 1PE.1.19
reference: 1 Peter 1:19
source:
  edition: SBLGNT
  text: ἀλλὰ τιμίῳ αἵματι ὡς ἀμνοῦ ἀμώμου καὶ ἀσπίλου Χριστοῦ,
translation:
  text: but with the precious blood of the Messiah, like that of a lamb without blemish
    and without spot,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Christ.'' The Greek title Χριστοῦ can be rendered ''Christ'' in more
      traditional English, but ''Messiah'' preserves the title''s meaning more transparently
      here.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast with the previous verse's negation ('not with perishable
    things... but...'). 'But' is natural and sufficiently forceful in English.
- source_word: τιμίῳ
  chosen: precious
  alternatives:
  - valuable
  - costly
  lexicon: BDAG
  rationale: Conveys both high value and honor in context. 'Precious' is idiomatic
    with 'blood' in English and preserves the elevated tone without sounding commercial
    like 'costly'.
- source_word: αἵματι
  chosen: blood
  lexicon: BDAG
  rationale: Literal rendering is required; in context it denotes sacrificial death,
    but that theological implication should not replace the concrete noun in translation.
- source_word: ὡς
  chosen: like that of
  alternatives:
  - as
  - like
  lexicon: BDAG
  rationale: Introduces comparison between the blood and that of a sacrificial lamb.
    'Like that of' makes explicit in idiomatic English that the comparison modifies
    'blood,' not that Messiah is merely one lamb among others.
- source_word: ἀμνοῦ
  chosen: lamb
  lexicon: BDAG
  rationale: Standard and direct rendering. The sacrificial resonance is important,
    likely evoking Passover and unblemished offering imagery, but should remain implicit
    in the main text.
- source_word: ἀμώμου
  chosen: without blemish
  alternatives:
  - unblemished
  - blameless
  lexicon: BDAG
  rationale: Best matches sacrificial vocabulary and preserves likely allusion to
    acceptable offerings. 'Blameless' could over-personalize the adjective morally
    rather than cultically.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination of the two descriptive adjectives.
- source_word: ἀσπίλου
  chosen: without spot
  alternatives:
  - spotless
  - without defect
  lexicon: BDAG
  rationale: Keeps the paired sacrificial descriptors distinct while remaining readable.
    'Spotless' is possible, but 'without spot' better mirrors the formal parallelism
    with 'without blemish.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title rather than a name-like identifier. Here the genitive most naturally means
    'of the Messiah,' preserving the title's meaning and Jewish sacrificial-messianic
    context.
