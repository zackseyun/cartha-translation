theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a christological title here, not merely a proper-name
    element. Following the doctrine's contested-terms guidance, 'Messiah' is preferred
    in title contexts to preserve meaning. 'Christ' is preserved as an alternative
    in a footnote for readers familiar with traditional English renderings.
