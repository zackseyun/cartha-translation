theological_decisions:
- issue: Referent and capitalization of πνεύματι ἁγίῳ
  chosen_reading: the Holy Spirit as the divine agent in gospel proclamation
  alternative_readings:
  - holy spirit as a more general spiritual power/disposition
  rationale: In Petrine usage and in this salvation-historical context, the phrase
    naturally refers to the personal Holy Spirit. Capitalization reflects orthodox
    Trinitarian reading without adding content beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §1, §6'
- issue: Temporal relation between prophetic ministry and apostolic proclamation
  chosen_reading: the prophets served later believers by speaking of realities now
    announced in the gospel
  alternative_readings:
  - the prophets served only their own contemporaries
  rationale: The syntax explicitly contrasts 'not themselves but you' and links the
    prophetic message with the present gospel proclamation. The translation preserves
    this salvation-historical continuity without flattening distinctions.
  doctrine_reference: Translation philosophy §3
