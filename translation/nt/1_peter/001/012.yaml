id: 1PE.1.12
reference: 1 Peter 1:12
source:
  edition: SBLGNT
  text: οἷς ἀπεκαλύφθη ὅτι οὐχ ἑαυτοῖς ὑμῖν δὲ διηκόνουν αὐτά, ἃ νῦν ἀνηγγέλη ὑμῖν
    διὰ τῶν εὐαγγελισαμένων ⸀ὑμᾶς πνεύματι ἁγίῳ ἀποσταλέντι ἀπ’ οὐρανοῦ, εἰς ἃ ἐπιθυμοῦσιν
    ἄγγελοι παρακύψαι.
translation:
  text: To them it was revealed that they were serving not themselves but you in these
    things, which now have been announced to you through those who preached the good
    news to you by the Holy Spirit sent from heaven—things into which angels long
    to look.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not for themselves but for you'; the Greek dative marks the beneficiaries
      of the prophets' service.
    reason: lexical_alternative
  - marker: b
    text: Or 'through those who proclaimed the gospel to you.' The Greek uses the
      verb 'to announce good news.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'to look' can also be rendered 'to peer into' or 'to stoop and
      look into,' expressing eager, intent observation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  chosen: To them
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: Dative relative pronoun referring back to the prophets in the previous
    verse. 'To them' is idiomatic in English and preserves the indirect-object sense.
- source_word: ἀπεκαλύφθη
  chosen: it was revealed
  alternatives:
  - it was disclosed
  - it was made known
  lexicon: BDAG
  rationale: Aorist passive indicative of ἀποκαλύπτω. 'It was revealed' preserves
    the passive and the revelatory/theological register without overinterpreting the
    agent.
- source_word: οὐχ ἑαυτοῖς ὑμῖν δὲ
  chosen: not themselves but you
  alternatives:
  - not for themselves but for you
  lexicon: BDAG
  rationale: The dative contrast indicates beneficiaries. English idiom requires either
    direct objects or an explicit 'for'; here 'serving not themselves but you' is
    concise and natural while preserving the contrast.
- source_word: διηκόνουν
  chosen: were serving
  alternatives:
  - were ministering
  - were rendering service
  lexicon: BDAG
  rationale: Imperfect of διακονέω indicates ongoing past service. 'Were serving'
    is clear modern English; 'ministering' is possible but more ecclesiastical and
    less transparent.
- source_word: αὐτά
  chosen: these things
  alternatives:
  - them
  lexicon: BDAG
  rationale: Refers to the prophetic matters just mentioned. 'These things' makes
    the referent explicit in English and avoids an ambiguous pronoun.
- source_word: ἃ νῦν ἀνηγγέλη
  chosen: which now have been announced
  alternatives:
  - which now were reported
  - which now have been proclaimed
  lexicon: BDAG
  rationale: Aorist passive with νῦν is well rendered in English by present perfect
    to connect past proclamation with present relevance. 'Announced' matches ἀναγγέλλω
    without importing more technical preaching language than necessary.
- source_word: διὰ τῶν εὐαγγελισαμένων ὑμᾶς
  chosen: through those who preached the good news to you
  alternatives:
  - through those who evangelized you
  - through those who proclaimed the gospel to you
  lexicon: BDAG
  rationale: Aorist middle participle of εὐαγγελίζω. 'Preached the good news' translates
    the verbal idea accessibly and avoids unnecessary transliteration of 'gospel'
    as a noun where the Greek uses a verb.
- source_word: πνεύματι ἁγίῳ
  chosen: by the Holy Spirit
  alternatives:
  - in the Holy Spirit
  lexicon: BDAG
  rationale: Dative can be instrumental or locative; here instrumental best fits the
    means by which the gospel was preached. Capitalization reflects the personal divine
    referent in context.
- source_word: ἀποσταλέντι ἀπ’ οὐρανοῦ
  chosen: sent from heaven
  alternatives:
  - having been sent from heaven
  lexicon: BDAG
  rationale: Attributive participial phrase modifying 'Holy Spirit.' 'Sent from heaven'
    is natural English and preserves the passive divine-mission sense.
- source_word: εἰς ἃ
  chosen: things into which
  alternatives:
  - into which things
  - which
  lexicon: BDAG
  rationale: The preposition εἰς is significant and should be retained. Fronting 'things'
    clarifies the antecedent and prepares for the idiom that follows.
- source_word: ἐπιθυμοῦσιν
  chosen: long
  alternatives:
  - desire
  - yearn
  lexicon: BDAG
  rationale: Present tense indicates continuing desire. 'Long' is idiomatic and suitably
    weighty without sounding overly emotional.
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this heavenly context the referent is clearly angelic beings, not
    human messengers.
- source_word: παρακύψαι
  chosen: to look
  alternatives:
  - to peer
  - to stoop and look
  lexicon: BDAG
  rationale: The infinitive denotes looking intently or peering into something. 'To
    look' is the cleanest main-text rendering; the more vivid nuance is worth preserving
    in a footnote.
