id: 1PE.1.14
reference: 1 Peter 1:14
source:
  edition: SBLGNT
  text: ὡς τέκνα ὑπακοῆς, μὴ συσχηματιζόμενοι ταῖς πρότερον ἐν τῇ ἀγνοίᾳ ὑμῶν ἐπιθυμίαις,
translation:
  text: as children of obedience, not conforming yourselves to the desires you formerly
    had in your ignorance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'obedient children.' The Greek literally reads 'children of obedience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces the manner or identity in which the exhortation is given.
    'As' fits the idiomatic exhortational force in context.
- source_word: τέκνα ὑπακοῆς
  chosen: children of obedience
  alternatives:
  - obedient children
  lexicon: BDAG
  rationale: A literal genitival construction is preserved to retain the Semitic/ethical
    force of identity characterized by obedience. 'Obedient children' is smoother
    English, but 'children of obedience' better exposes the source structure and parallels
    expressions like 'children of disobedience.'
- source_word: μὴ συσχηματιζόμενοι
  chosen: not conforming yourselves
  alternatives:
  - not being conformed
  - not fashioning yourselves according to
  lexicon: BDAG
  rationale: 'The present middle/passive participle in this paraenetic context is
    best rendered as an ongoing reflexive prohibition: ''not conforming yourselves.''
    This preserves the active moral responsibility implied in context while remaining
    natural English.'
- source_word: ταῖς ... ἐπιθυμίαις
  chosen: to the desires
  alternatives:
  - to the lusts
  - to the cravings
  lexicon: BDAG
  rationale: ἐπιθυμίαι can denote strong desires, often morally disordered in this
    context. 'Desires' is accessible modern English and avoids archaic or overly narrow
    sexual connotations of 'lusts,' while still fitting the ethical warning.
- source_word: πρότερον
  chosen: formerly had
  alternatives:
  - former
  - previously
  lexicon: BDAG
  rationale: Used adverbially to mark the readers' prior way of life. Rendering it
    with the verb phrase 'formerly had' makes the relation to 'desires' clear in idiomatic
    English.
- source_word: ἐν τῇ ἀγνοίᾳ ὑμῶν
  chosen: in your ignorance
  alternatives:
  - during your ignorance
  - when you were ignorant
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'Ignorance'
    here refers to their former state apart from true knowledge of God, and the literal
    phrasing preserves that theological-ethical nuance without overinterpreting.
