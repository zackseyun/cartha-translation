theological_decisions:
- issue: Whether to smooth the Hebraic ethical expression τέκνα ὑπακοῆς into an adjectival
    phrase
  chosen_reading: children of obedience
  alternative_readings:
  - obedient children
  rationale: The translation preserves the identity-forming force of the genitive
    rather than reducing it to a simple attribute. This keeps the text's theological
    emphasis on believers as characterized by obedience while avoiding doctrinal overstatement
    beyond the verse itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning over translation tradition.'
