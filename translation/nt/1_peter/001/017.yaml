theological_decisions:
- issue: Meaning of φόβος in relation to God the Father as judge
  chosen_reading: Retain 'fear' in the main text
  alternative_readings:
  - reverence
  - reverent awe
  rationale: The verse links God's fatherhood with his impartial judgment. Rendering
    φόβος as 'fear' preserves the text's moral seriousness and the tension between
    intimacy and accountability, rather than resolving it into a softer devotional
    term.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Scope of judgment according to works
  chosen_reading: Translate straightforwardly as 'according to each person's work'
    without importing a doctrinal system
  alternative_readings:
  - final judgment of believers' deeds
  - general principle of divine evaluation
  rationale: The Greek states impartial judgment according to each person's work.
    The translation should not force a particular denominational account of judgment,
    merit, or assurance beyond what the text says.
  doctrine_reference: 'Affirmations + Translation philosophy: do not advocate denominational
    distinctives unless the Greek unambiguously supports one reading.'
