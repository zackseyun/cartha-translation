id: 1PE.1.17
reference: 1 Peter 1:17
source:
  edition: SBLGNT
  text: Καὶ εἰ πατέρα ἐπικαλεῖσθε τὸν ἀπροσωπολήμπτως κρίνοντα κατὰ τὸ ἑκάστου ἔργον,
    ἐν φόβῳ τὸν τῆς παροικίας ὑμῶν χρόνον ἀναστράφητε·
translation:
  text: And if you call as Father the one who judges impartially according to each
    person's work, conduct yourselves in fear during the time of your sojourn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'call on as Father.'
    reason: lexical_alternative
  - marker: b
    text: Or 'during the time of your exile.' The Greek term can denote life as a
      foreigner or temporary resident.
    reason: lexical_alternative
  - marker: c
    text: Or 'with reverence' or 'in reverent awe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεῖσθε
  chosen: call as
  alternatives:
  - call on
  - invoke
  lexicon: BDAG
  rationale: Middle voice here refers to addressing or appealing to God. 'Call as
    Father' best captures both the verbal action and the predicate accusative πατέρα
    without sounding wooden.
- source_word: πατέρα
  chosen: Father
  alternatives:
  - a father
  lexicon: BDAG
  rationale: 'Anarthrous accusative functions predicatively with ἐπικαλεῖσθε: believers
    address God as Father. Capitalized because it refers to God.'
- source_word: ἀπροσωπολήμπτως
  chosen: impartially
  alternatives:
  - without partiality
  - without showing favoritism
  lexicon: BDAG
  rationale: The adverb denotes judging without regard to outward status or persons.
    'Impartially' is concise, natural English and preserves the sense.
- source_word: κρίνοντα
  chosen: judges
  alternatives:
  - judging
  lexicon: BDAG
  rationale: 'Present participle substantivally describing God: ''the one who judges.''
    In English, finite ''judges'' within the relative clause is most natural.'
- source_word: κατὰ τὸ ἑκάστου ἔργον
  chosen: according to each person's work
  alternatives:
  - according to each one's deed
  - according to the work of each
  lexicon: BDAG
  rationale: κατά with accusative expresses standard or basis. ἔργον here is singular
    collective. 'Each person's work' is idiomatic and preserves individual accountability.
- source_word: ἐν φόβῳ
  chosen: in fear
  alternatives:
  - with fear
  - reverently
  lexicon: BDAG
  rationale: φόβος can denote fear, reverence, or awe depending on context. 'In fear'
    preserves the lexical form and theological tension without prematurely narrowing
    it to mere reverence.
- source_word: παροικίας
  chosen: sojourn
  alternatives:
  - exile
  - temporary residence
  - pilgrimage
  lexicon: BDAG
  rationale: The noun denotes residence as a foreigner or temporary stay. 'Sojourn'
    preserves the pilgrim/alien nuance central to 1 Peter without over-specifying
    political exile.
- source_word: ἀναστράφητε
  chosen: conduct yourselves
  alternatives:
  - live
  - behave
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative of ἀναστρέφω commonly means to conduct
    one's life. 'Conduct yourselves' is a standard, accurate rendering that retains
    ethical force.
- source_word: τὸν τῆς παροικίας ὑμῶν χρόνον
  chosen: during the time of your sojourn
  alternatives:
  - throughout your time as foreigners
  - for the time of your exile
  lexicon: BDAG
  rationale: The accusative χρόνον is the duration of time object with ἀναστράφητε.
    'During the time of your sojourn' renders the phrase naturally while preserving
    the temporal and pilgrim motifs.
