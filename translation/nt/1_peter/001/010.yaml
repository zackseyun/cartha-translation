theological_decisions:
- issue: Whether to make explicit a future element in 'the grace for you'
  chosen_reading: Retain 'the grace for you' without adding 'that was to come' in
    the main text
  alternative_readings:
  - the grace that was to come to you
  rationale: The future orientation is inferable from the broader context and from
    the prophets' forward-looking role, but the Greek of this verse itself does not
    include an explicit future verb or participle. To avoid importing words beyond
    the source text, the main text keeps the more literal phrasing, while the alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T01:35:49Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/1_peter/001/010.json
  category: awkward_english
  tier: 1
  from: Concerning this salvation, the prophets who prophesied about the grace for
    you searched and investigated carefully,
  to: Concerning this salvation, prophets searched and investigated carefully—those
    who prophesied about the grace for you,
  rationale: The current word order, while correctly preserving the Greek's fronting
    of the topic, creates an awkward English sentence by placing a long relative clause
    between the introductory phrase and the main verbs. This separates 'Concerning
    this salvation' from 'searched and investigated' by a long subject. Restructuring
    the verse to use an appositive phrase ('—those who prophesied...') makes the main
    clause more direct and improves readability. This change also has the secondary
    benefit of mirroring the Greek more closely by first introducing the anarthrous
    'προφῆται' as 'prophets' and then specifying them, whereas the current draft pre-emptively
    makes the noun definite ('the prophets').
