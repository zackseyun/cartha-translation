id: 1PE.1.10
reference: 1 Peter 1:10
source:
  edition: SBLGNT
  text: Περὶ ἧς σωτηρίας ἐξεζήτησαν καὶ ἐξηραύνησαν προφῆται οἱ περὶ τῆς εἰς ὑμᾶς
    χάριτος προφητεύσαντες,
translation:
  text: Concerning this salvation, the prophets who prophesied about the grace for
    you searched and investigated carefully,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the grace that was to come to you.' The future sense is often inferred
      from the context, though not stated explicitly in this verse.
    reason: alternative_reading
  - marker: b
    text: Or 'Concerning this salvation, the prophets who prophesied about the grace
      for you searched and investigated carefully,'.
    reason: previous_rendering
lexical_decisions:
- source_word: Περὶ ἧς σωτηρίας
  chosen: Concerning this salvation
  alternatives:
  - About which salvation
  - Concerning which salvation
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic ('concerning/about'). ἧς
    is a relative pronoun referring back to the salvation just mentioned in the previous
    context; in English, 'this salvation' is more natural and clearer than the more
    wooden 'which salvation' while preserving the anaphoric force.
- source_word: σωτηρίας
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία commonly denotes salvation/deliverance. In this Petrine context,
    'salvation' best preserves the theological weight and continuity with the surrounding
    passage.
- source_word: ἐξεζήτησαν
  chosen: searched
  alternatives:
  - sought out
  - inquired diligently
  lexicon: BDAG
  rationale: The aorist verb ἐκζητέω conveys earnest seeking. 'Searched' is natural
    modern English and pairs well with the following verb without unnecessary redundancy.
- source_word: ἐξηραύνησαν
  chosen: investigated carefully
  alternatives:
  - examined carefully
  - searched out
  lexicon: BDAG
  rationale: ἐξεραυνάω has the sense of searching out or investigating thoroughly.
    Rendering it distinctly from ἐξεζήτησαν preserves the rhetorical intensification
    of the two coordinated verbs.
- source_word: προφῆται
  chosen: the prophets
  alternatives:
  - prophets
  lexicon: BDAG
  rationale: Although anarthrous here, the following articular participial phrase
    identifies the group specifically. English idiom prefers 'the prophets' for the
    known class of OT prophets in view.
- source_word: οἱ περὶ τῆς εἰς ὑμᾶς χάριτος προφητεύσαντες
  chosen: who prophesied about the grace for you
  alternatives:
  - who prophesied about the grace that was to come to you
  - who prophesied concerning the grace toward you
  lexicon: BDAG
  rationale: The article plus participle functions attributively, modifying 'prophets.'
    περί marks the content of prophecy. χάρις here is best rendered 'grace.' εἰς ὑμᾶς
    is literally 'to/for you'; 'for you' is idiomatic and preserves the directional-benefactive
    sense without importing extra words not present in Greek.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in this salvation-historical context refers to God's gracious favor/blessing.
    'Grace' is the standard and theologically appropriate rendering.
- source_word: εἰς ὑμᾶς
  chosen: for you
  alternatives:
  - to you
  - unto you
  lexicon: BDAG
  rationale: εἰς with persons can indicate direction toward or relation to. 'For you'
    communicates the intended benefit to the readers in clear English; 'to you' is
    possible but slightly less natural in this construction.
