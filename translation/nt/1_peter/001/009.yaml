id: 1PE.1.9
reference: 1 Peter 1:9
source:
  edition: SBLGNT
  text: κομιζόμενοι τὸ τέλος τῆς πίστεως ⸀ὑμῶν σωτηρίαν ψυχῶν.
translation:
  text: as you receive the outcome of your faith, the salvation of your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the end,' 'goal,' or 'result' of your faith.
    reason: lexical_alternative
  - marker: b
    text: Or 'the salvation of your lives' or 'the salvation of your persons.' The
      Greek word can mean 'souls,' 'lives,' or 'persons' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κομιζόμενοι
  chosen: as you receive
  alternatives:
  - receiving
  - obtaining
  - gaining for yourselves
  - carrying away
  lexicon: BDAG
  rationale: The participle is present middle/passive nominative plural and links
    to the readers from the previous context. In context it denotes coming into possession
    of what faith leads to. 'As you receive' captures the participial, ongoing sense
    and reads naturally in English without overstating voice distinctions that are
    not central here.
- source_word: τέλος
  chosen: outcome
  alternatives:
  - end
  - goal
  - result
  lexicon: BDAG
  rationale: '''Outcome'' best fits the sense of the realized result of faith in this
    context. ''End'' could sound merely temporal, while ''goal'' could overemphasize
    intention rather than attained result.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    Here the genitive 'of your faith' most naturally refers to the believers' faith.
    Alternatives are possible at the lexical level, but the context does not strongly
    require them in the main text.
- source_word: ὑμῶν
  chosen: your
  rationale: The pronoun modifies 'faith' and is best rendered directly as second
    person plural possessive in English.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Salvation'' is the standard and contextually appropriate rendering
    in this epistle, preserving both present experience and eschatological fullness.
    ''Deliverance'' is possible but weaker in theological continuity here.'
- source_word: ψυχῶν
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: The Greek term can denote soul, life, or person depending on context.
    Here 'souls' preserves the traditional and likely intended sense in the phrase
    'salvation of your souls,' while not requiring a body-soul dualism beyond what
    the text states.
