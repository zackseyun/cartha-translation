theological_decisions:
- issue: Rendering πίστις in a potentially nuanced context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith,' with alternatives preserved
    where contested. In this verse the phrase 'your faith' refers most naturally to
    the readers' believing response rather than an abstract quality needing reinterpretation.
    The alternatives are lexical possibilities but not the best main-text choice here.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Translation philosophy
    §3'
- issue: Meaning of ψυχαί in 'salvation of your souls'
  chosen_reading: souls
  alternative_readings:
  - lives
  - persons
  rationale: The translation preserves the wording of the Greek without importing
    a detailed anthropology. 'Souls' is retained because it is the most direct rendering
    here, while the rationale explicitly avoids reading the verse as denying bodily
    salvation or endorsing a strict dualism.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
