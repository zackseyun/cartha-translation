id: 1PE.1.18
reference: 1 Peter 1:18
source:
  edition: SBLGNT
  text: εἰδότες ὅτι οὐ φθαρτοῖς, ἀργυρίῳ ἢ χρυσίῳ, ἐλυτρώθητε ἐκ τῆς ματαίας ὑμῶν
    ἀναστροφῆς πατροπαραδότου,
translation:
  text: knowing that you were redeemed from your futile way of life handed down from
    your fathers, not with perishable things such as silver or gold,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ransomed.' The Greek verb carries the sense of release by payment.
    reason: lexical_alternative
  - marker: b
    text: Or 'inherited from your ancestors.' Literally, 'handed down from your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: Perfect participle of οἶδα functioning adverbially; 'knowing' preserves
    the participial connection to the surrounding exhortation while remaining natural
    English.
- source_word: ἐλυτρώθητε
  chosen: you were redeemed
  alternatives:
  - you were ransomed
  - you were set free by payment
  lexicon: BDAG
  rationale: λυτρόομαι carries the sense of release by payment/ransom. 'Redeemed'
    is the most natural and theologically weighty English equivalent here, while still
    allowing the following contrast with silver and gold to clarify the ransom imagery.
- source_word: φθαρτοῖς
  chosen: perishable things
  alternatives:
  - corruptible things
  - things subject to decay
  lexicon: BDAG
  rationale: The adjective is substantival in context and contrasts with precious,
    imperishable value in the next verse. 'Perishable things' is clear modern English
    and preserves the decay/transience sense.
- source_word: ἀργυρίῳ ἢ χρυσίῳ
  chosen: such as silver or gold
  alternatives:
  - with silver or gold
  - by silver or gold
  lexicon: BDAG
  rationale: These datives specify examples of the 'perishable things.' Adding 'such
    as' makes explicit the appositional/explanatory force in idiomatic English without
    changing the meaning.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: 'Standard source/separation sense: redemption out of a former manner
    of life.'
- source_word: ματαίας
  chosen: futile
  alternatives:
  - empty
  - vain
  - worthless
  lexicon: BDAG
  rationale: μάταιος denotes emptiness or uselessness. 'Futile' best captures moral
    and existential emptiness in readable modern English.
- source_word: ἀναστροφῆς
  chosen: way of life
  alternatives:
  - conduct
  - manner of life
  lexicon: BDAG
  rationale: In Petrine usage ἀναστροφή commonly refers to one's conduct or manner
    of life. 'Way of life' is natural English and broad enough to include conduct
    shaped by inherited patterns.
- source_word: πατροπαραδότου
  chosen: handed down from your fathers
  alternatives:
  - inherited from your ancestors
  - tradition from your fathers
  lexicon: BDAG
  rationale: The adjective means 'handed down from the fathers/ancestors.' 'From your
    fathers' preserves the explicit paternal language of the Greek in keeping with
    the gender-accurate policy, while 'handed down' conveys the traditional/inherited
    sense.
