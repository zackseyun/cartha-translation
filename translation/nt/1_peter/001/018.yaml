theological_decisions:
- issue: Rendering of inherited tradition language
  chosen_reading: from your fathers
  alternative_readings:
  - from your ancestors
  rationale: The Greek explicitly refers to the fathers. Following the translation
    philosophy's gender-accurate principle, the paternal wording is retained rather
    than neutralized, while the broader sense can be noted as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Redemption terminology
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  rationale: The verse uses ransom/redemption imagery without specifying a doctrinal
    mechanism in this clause alone. 'Redeemed' preserves the biblical-theological
    resonance while avoiding over-specification; the payment imagery remains clear
    through the contrast with silver and gold and the next verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
