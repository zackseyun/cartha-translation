theological_decisions:
- issue: Relationship between divine preservation and human response in διὰ πίστεως
  chosen_reading: God is the one guarding, and faith is the means through which that
    guarding is experienced.
  alternative_readings:
  - God guards independently of faith as a merely descriptive add-on
  - faithfulness as the primary sense of πίστις here
  rationale: The syntax places God's power as the source/instrument of the guarding
    and faith as the mediating means. The translation preserves both elements without
    importing a denominational account of perseverance or apostasy beyond what the
    text states.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    default rendering is 'faith' with alternatives preserved where contested.
- issue: Eschatological timing of salvation
  chosen_reading: Salvation is future in its revealed fullness, though not denying
    present aspects elsewhere in the NT.
  alternative_readings:
  - salvation here refers only to present conversion
  - salvation here refers exclusively to final deliverance with no present dimension
  rationale: The phrase 'ready to be revealed in the last time' clearly points to
    a future unveiling. The translation keeps that future orientation without flattening
    broader NT usage of salvation into a single temporal category.
  doctrine_reference: Do not import doctrinal claims the text does not make; preserve
    theological tension.
