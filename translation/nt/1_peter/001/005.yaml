id: 1PE.1.5
reference: 1 Peter 1:5
source:
  edition: SBLGNT
  text: τοὺς ἐν δυνάμει θεοῦ φρουρουμένους διὰ πίστεως εἰς σωτηρίαν ἑτοίμην ἀποκαλυφθῆναι
    ἐν καιρῷ ἐσχάτῳ.
translation:
  text: who are being guarded by the power of God through faith for a salvation ready
    to be revealed in the last time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through trust'; less likely here, 'through faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the last time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φρουρουμένους
  chosen: are being guarded
  alternatives:
  - are being protected
  - are being kept under guard
  lexicon: BDAG
  rationale: Present passive participle indicates an ongoing action done to the addressees.
    'Guarded' preserves the military/protective sense of φρουρέω better than the broader
    'protected,' while remaining natural English.
- source_word: ἐν δυνάμει θεοῦ
  chosen: by the power of God
  alternatives:
  - in the power of God
  - by God's power
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' here it expresses means or instrument
    in connection with the passive participle. 'By the power of God' communicates
    the agency/instrument clearly in English.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the phrase most naturally denotes the means by which believers participate in
    God's guarding. 'Trust' is possible as an explanatory gloss; 'faithfulness' is
    less likely in this context but worth preserving as a lexical alternative.
- source_word: εἰς σωτηρίαν
  chosen: for a salvation
  alternatives:
  - unto salvation
  - for salvation
  lexicon: BDAG
  rationale: εἰς marks goal or result. 'For a salvation' preserves the forward-looking
    orientation of the phrase and works well with the following modifier 'ready to
    be revealed.' The article is absent in Greek, but English idiom often uses the
    indefinite article with a singular abstract noun modified in this way.
- source_word: ἑτοίμην ἀποκαλυφθῆναι
  chosen: ready to be revealed
  alternatives:
  - prepared to be revealed
  lexicon: BDAG
  rationale: This adjectival + infinitive construction is naturally rendered 'ready
    to be revealed.' 'Prepared' is possible, but 'ready' is the more direct gloss
    for ἕτοιμος and fits the eschatological imminence of the context.
- source_word: ἐν καιρῷ ἐσχάτῳ
  chosen: in the last time
  alternatives:
  - in the final time
  - at the last time
  lexicon: BDAG
  rationale: καιρός denotes a decisive or appointed time rather than mere chronological
    duration. 'In the last time' is a natural rendering that preserves the eschatological
    sense without overinterpreting it as a technical end-times scheme.
- source_word: τοὺς
  chosen: who
  alternatives:
  - you who
  lexicon: BDAG
  rationale: The accusative article resumes the addressees from the previous verse
    and is best rendered by a relative pronoun in English. 'Who' keeps the connection
    smooth; the explicit 'you' is implied by context from v. 4.
