theological_decisions:
- issue: Sense of the genitive phrase τὸ δοκίμιον ὑμῶν τῆς πίστεως
  chosen_reading: '''the proven genuineness of your faith'' refers to faith shown genuine through trials'
  alternative_readings:
  - '''the testing of your faith'' focusing on the process rather than the result'
  rationale: The noun δοκίμιον more naturally denotes the approved/proven quality resulting from testing, especially in comparison with gold tested by fire. This preserves Peter's emphasis on what the trials reveal about faith.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent of 'praise and glory and honor'
  chosen_reading: The verse leaves implicit whose praise/glory/honor is in view; the translation preserves that ambiguity
  alternative_readings:
  - honor bestowed on believers
  - praise directed to God/Christ
  - a blended eschatological vindication before God
  rationale: The Greek does not explicitly specify the recipient/source of the triad. To avoid importing a doctrinally loaded interpretation, the English keeps the wording open.
  doctrine_reference: Translation philosophy §3
