id: 1PE.1.7
reference: 1 Peter 1:7
source:
  edition: SBLGNT
  text: ἵνα τὸ δοκίμιον ὑμῶν τῆς πίστεως ⸀πολυτιμότερον χρυσίου τοῦ ἀπολλυμένου διὰ πυρὸς δὲ δοκιμαζομένου εὑρεθῇ εἰς ἔπαινον καὶ ⸂δόξαν καὶ τιμὴν⸃ ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ.
translation:
  text: so that the proven genuineness of your faith—more precious than gold that perishes though it is tested by fire—may prove to be for praise and glory and honor at the revelation of Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the testing of your faith'; the Greek term can emphasize either the testing process or the proven genuineness that results from testing.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.' Here 'Messiah' translates the title Χριστός in keeping with its meaning.
    reason: lexical_alternative
  - marker: c
    text: Or 'may be found to result in'.
    reason: previous_rendering
lexical_decisions:
- source_word: δοκίμιον
  chosen: proven genuineness
  alternatives:
  - tested genuineness
  - proof
  - tested character
  lexicon: BDAG
  rationale: The noun refers to what is shown genuine through testing, not merely the act of testing. 'Proven genuineness' captures the resultative sense in context and fits the comparison with refined gold.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, 'faith' is the main-text rendering. In this context the phrase refers to the believers' faith being tested. The alternatives are possible nuances of the semantic range but are not as likely here.
- source_word: πολυτιμότερον
  chosen: more precious
  alternatives:
  - more valuable
  - of greater worth
  lexicon: BDAG
  rationale: The comparative adjective naturally expresses value language. 'More precious' is idiomatic in English and preserves the comparison with gold.
- source_word: χρυσίου
  chosen: gold
  lexicon: BDAG
  rationale: Straightforward lexical rendering in the genitive of comparison after the comparative adjective.
- source_word: ἀπολλυμένου
  chosen: that perishes
  alternatives:
  - that is perishable
  - that is passing away
  lexicon: BDAG
  rationale: The participle contrasts even refined gold's temporary nature with the enduring value of faith. 'That perishes' is direct and preserves the verbal force.
- source_word: διὰ πυρὸς
  chosen: by fire
  alternatives:
  - through fire
  lexicon: BDAG
  rationale: Either is possible, but 'tested by fire' is the most natural English collocation and accurately conveys instrumentality.
- source_word: δοκιμαζομένου
  chosen: is tested
  alternatives:
  - is refined
  - is proved
  lexicon: BDAG
  rationale: This participle describes the assaying/testing of gold. 'Tested' preserves the lexical link with δοκίμιον without over-specifying metallurgical refinement.
- source_word: εὑρεθῇ
  chosen: may be found to result in
  alternatives:
  - may be found for
  - may be found unto
  - may be found to bring about
  lexicon: BDAG
  rationale: The passive with εἰς plus the three nouns expresses the outcome disclosed at the final revelation. 'May be found to result in' makes the idiom clear in modern English without paraphrasing away the passive.
- source_word: ἔπαινον
  chosen: praise
  alternatives:
  - commendation
  lexicon: BDAG
  rationale: Standard rendering. In this triad it denotes eschatological approval/honor.
- source_word: δόξαν
  chosen: glory
  lexicon: BDAG
  rationale: Standard rendering; part of the climactic triad of eschatological honor.
- source_word: τιμήν
  chosen: honor
  alternatives:
  - value
  - esteem
  lexicon: BDAG
  rationale: In this context 'honor' best matches the public recognition sense alongside praise and glory.
- source_word: ἐν ἀποκαλύψει
  chosen: at the revelation
  alternatives:
  - in the revelation
  - when ... is revealed
  lexicon: BDAG
  rationale: 'Temporal sense is most natural here: the outcome will be manifested at the time of Jesus'' revelation.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions as a title rather than a fixed name-like form. Here the phrase retains titular force in an eschatological context.
