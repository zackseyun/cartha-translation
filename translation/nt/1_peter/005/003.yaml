theological_decisions:
- issue: Meaning of κλήρων in relation to church leadership
  chosen_reading: refers to believers assigned to the elders' care, not possessions
    owned by the elders
  alternative_readings:
  - literal 'lots/allotments' left unexplained
  - the elders' jurisdictions
  rationale: The immediate context addresses elders shepherding God's flock. Rendering
    the phrase as 'those entrusted to you' guards the stewardship emphasis in the
    Greek and avoids implying ownership or a merely territorial concept of authority.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Force of κατακυριεύοντες
  chosen_reading: prohibits oppressive or overbearing exercise of authority, not all
    exercise of authority
  alternative_readings:
  - forbids any ruling role by elders
  rationale: The lexical force concerns domineering misuse of authority. The verse
    contrasts abusive leadership with exemplary leadership, not leadership itself.
  doctrine_reference: Affirmations; Translation philosophy §3
