id: 1PE.5.3
reference: 1 Peter 5:3
source:
  edition: SBLGNT
  text: μηδ’ ὡς κατακυριεύοντες τῶν κλήρων ἀλλὰ τύποι γινόμενοι τοῦ ποιμνίου·
translation:
  text: not domineering over those entrusted to you, but becoming examples to the
    flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not lording it over your allotments.' The Greek literally says 'the
      lots/allotments,' likely referring to the portions of God's flock assigned to
      each elder's care.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδ’ ὡς
  chosen: not
  alternatives:
  - nor as
  - not as though
  lexicon: BDAG
  rationale: Carries forward the negative coordination from the previous verse and
    introduces a prohibited manner of shepherding. In English, simple 'not' best fits
    the participial construction without awkwardness.
- source_word: κατακυριεύοντες
  chosen: domineering over
  alternatives:
  - lording it over
  - ruling harshly over
  - exercising mastery over
  lexicon: BDAG
  rationale: The verb denotes exercising lordship in an overbearing or oppressive
    way, not merely legitimate leadership. 'Domineering over' communicates abusive
    authority in clear modern English better than the more traditional but idiomatic
    'lording it over.'
- source_word: τῶν κλήρων
  chosen: those entrusted to you
  alternatives:
  - the portions
  - your allotments
  - those in your charge
  lexicon: BDAG
  rationale: Literally 'the lots/allotments.' In this pastoral context it refers metaphorically
    to the portions of God's people assigned to particular elders' care. 'Those entrusted
    to you' expresses the sense naturally in English while preserving the idea of
    stewardship rather than ownership.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between forbidden conduct and required conduct;
    'but' is the most natural concise rendering.
- source_word: τύποι
  chosen: examples
  alternatives:
  - models
  - patterns
  lexicon: BDAG
  rationale: τύπος here refers to an example or pattern for imitation. 'Examples'
    is idiomatic and readily understood.
- source_word: γινόμενοι
  chosen: becoming
  alternatives:
  - being
  - proving yourselves to be
  lexicon: BDAG
  rationale: The middle participle emphasizes conduct that comes to be embodied in
    practice. 'Becoming' preserves the verbal force better than a static 'being.'
- source_word: τοῦ ποιμνίου
  chosen: the flock
  alternatives:
  - the little flock
  - the sheepfold
  lexicon: BDAG
  rationale: A common pastoral metaphor for the community of believers under care.
    'The flock' is the standard clear rendering.
