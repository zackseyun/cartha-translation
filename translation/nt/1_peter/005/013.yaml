id: 1PE.5.13
reference: 1 Peter 5:13
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς ἡ ἐν Βαβυλῶνι συνεκλεκτὴ καὶ Μᾶρκος ὁ υἱός μου.
translation:
  text: She who is in Babylon, chosen together with you, greets you, and so does Mark,
    my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'The church in Babylon, chosen together with you.'
      The Greek has a feminine singular expression with an implied noun.
    reason: alternative_reading
  - marker: b
    text: '''Babylon'' may be a symbolic reference to Rome in early Christian usage;
      the text itself says ''Babylon.'''
    reason: cultural_note
  - marker: c
    text: '''My son'' likely expresses spiritual rather than biological relationship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζεται
  chosen: greets
  alternatives:
  - sends greetings to
  - greets warmly
  lexicon: BDAG
  rationale: The verb ἀσπάζομαι commonly means to greet or send greetings. 'Greets'
    is concise, natural English and preserves the epistolary sense without unnecessary
    expansion.
- source_word: ἡ ... συνεκλεκτὴ
  chosen: She who is ... chosen together with you
  alternatives:
  - the fellow chosen one in Babylon
  - the church in Babylon, chosen together with you
  lexicon: BDAG
  rationale: The feminine singular adjective with article is elliptical, literally
    'the [feminine singular] co-elect one.' Because no explicit noun is present, the
    translation preserves the personal feminine form with 'She who is...' rather than
    supplying 'church' in the main text. This keeps the Greek ambiguity visible while
    remaining readable.
- source_word: ἐν Βαβυλῶνι
  chosen: in Babylon
  alternatives:
  - in Rome
  lexicon: BDAG
  rationale: The text says 'in Babylon.' The translation retains the place name as
    written rather than interpreting it in the main text. If understood symbolically
    as Rome, that belongs in a footnote, not the translation itself.
- source_word: συνεκλεκτὴ
  chosen: chosen together with you
  alternatives:
  - co-elect
  - fellow chosen
  lexicon: BDAG
  rationale: The adjective denotes being chosen together with others. 'Chosen together
    with you' expresses the relational force clearly in modern English. 'Co-elect'
    is more literal but unnatural.
- source_word: Μᾶρκος
  chosen: Mark
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Μᾶρκος.
- source_word: ὁ υἱός μου
  chosen: my son
  alternatives:
  - my child
  lexicon: BDAG
  rationale: υἱός normally means 'son.' Here it is likely spiritual rather than biological,
    but the Greek expression itself is simply 'my son,' so the translation keeps the
    literal wording and leaves the relational nuance to interpretation or footnote.
