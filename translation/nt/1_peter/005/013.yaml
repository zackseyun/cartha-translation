theological_decisions:
- issue: Identity of ἡ ... συνεκλεκτὴ
  chosen_reading: 'An unnamed feminine referent is left implicit in the main text:
    ''She who is ... chosen together with you.'''
  alternative_readings:
  - A reference to the church in Babylon
  - A reference to Peter's wife or another Christian woman
  rationale: The Greek uses a feminine singular article and adjective without an explicit
    noun. Many interpreters understand an implied 'church,' but that is supplied rather
    than stated. To preserve the source-text ambiguity and avoid over-interpretation,
    the main text leaves the referent implicit while a footnote preserves the common
    ecclesial reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of Babylon
  chosen_reading: Retain 'Babylon' in the main text.
  alternative_readings:
  - A symbolic reference to Rome
  - The literal Mesopotamian Babylon
  rationale: The Greek names Babylon directly. Because the referent is historically
    debated, the translation does not resolve the question in the main text. A footnote
    preserves the common symbolic interpretation.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve ambiguity where genuine.'
- issue: Sense of 'my son' for Mark
  chosen_reading: Keep the literal familial language in the main text.
  alternative_readings:
  - my spiritual son
  - my dear son
  rationale: The phrase likely expresses spiritual kinship, but the Greek does not
    explicitly mark that nuance. The translation therefore preserves the literal wording
    without importing an interpretive gloss into the text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants.'
