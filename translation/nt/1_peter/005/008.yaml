id: 1PE.5.8
reference: 1 Peter 5:8
source:
  edition: SBLGNT
  text: νήψατε, γρηγορήσατε. ὁ ἀντίδικος ὑμῶν διάβολος ὡς λέων ὠρυόμενος περιπατεῖ
    ζητῶν ⸀τινα ⸀καταπιεῖν·
translation:
  text: Be clear-minded; stay alert. Your adversary, the devil, walks around like
    a roaring lion, seeking someone to devour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be sober-minded' (traditional) or 'Be sober.' The Greek verb νήψατε literally
      means "be sober [from wine]," but every NT use of νήφω is figurative — here
      the sense is mental clarity and self-possession under spiritual attack, not abstinence
      from drink. "Clear-minded" preserves the actual force and keeps the rendering
      distinct from the paired γρηγορήσατε ("stay alert").
    reason: lexical_alternative
  - marker: b
    text: Or 'prowls around.' The Greek verb is more literally 'walks around' or 'goes
      about,' but the lion imagery naturally suggests prowling.
    reason: lexical_alternative
lexical_decisions:
- source_word: νήψατε
  chosen: Be clear-minded
  alternatives:
  - Be sober-minded
  - Be self-controlled
  - Keep your wits about you
  lexicon: BDAG
  rationale: νήφω literally means "to be sober [from wine]" but every NT use is figurative.
    BDAG catalogues all NT occurrences under fig., glossing "be well-balanced, self-controlled,
    sober." The sober/drunk metaphor is not active in this verse — Peter is naming
    spiritual warfare readiness, not contrasting with literal drunkenness. In modern
    English "sober-minded" carries a residual abstinence-from-alcohol connotation that
    the Greek here is not invoking. "Clear-minded" captures the intended force — mental
    clarity under pressure, not being caught off guard by emotional reaction or deception
    — and preserves the distinction from the paired γρηγορήσατε ("stay alert"), which
    names watchfulness rather than mental clarity.
- source_word: γρηγορήσατε
  chosen: stay alert
  alternatives:
  - be watchful
  - keep watch
  lexicon: BDAG
  rationale: The imperative complements νήψατε with the sense of wakeful vigilance.
    'Stay alert' is natural modern English and preserves the ongoing practical force
    without sounding archaic.
- source_word: ἀντίδικος
  chosen: adversary
  alternatives:
  - opponent
  - accuser
  lexicon: BDAG
  rationale: The term can denote an opponent in a legal setting, but here broadly
    names one hostile to the readers. 'Adversary' preserves the antagonistic force
    and leaves room for the legal nuance without over-specifying it.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: Although the noun's lexical sense is 'slanderer,' in this context it
    functions as the recognized personal designation for Satan. 'The devil' is the
    clearest idiomatic English rendering and best reflects usage in the New Testament.
- source_word: ὡς λέων ὠρυόμενος
  chosen: like a roaring lion
  alternatives:
  - like a lion roaring
  lexicon: BDAG
  rationale: The comparison is explicit and vivid. 'Roaring lion' is idiomatic English
    and preserves the image of threatening predation.
- source_word: περιπατεῖ
  chosen: walks around
  alternatives:
  - prowls around
  - goes about
  lexicon: BDAG
  rationale: The basic verb means 'walk' or 'go about.' Because the lion imagery already
    conveys menace, 'walks around' preserves the source verb more transparently, while
    the footnote preserves the more interpretive traditional rendering 'prowls around.'
- source_word: ζητῶν
  chosen: seeking
  alternatives:
  - looking for
  lexicon: BDAG
  rationale: The participle expresses purpose or attendant action. 'Seeking' is concise
    and preserves the active searching sense.
- source_word: τινα
  chosen: someone
  alternatives:
  - anyone
  lexicon: BDAG
  rationale: The indefinite pronoun is singular and nonspecific. 'Someone' is natural
    English and conveys the open-ended target of the devil's search.
- source_word: καταπιεῖν
  chosen: to devour
  alternatives:
  - to swallow up
  - to consume
  lexicon: BDAG
  rationale: The infinitive literally has the sense 'to swallow down/up.' In the lion
    metaphor, 'to devour' is the most natural English equivalent and preserves the
    violent predatory force.
