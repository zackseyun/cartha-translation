theological_decisions:
- issue: Implied verbal predicate in the doxology
  chosen_reading: To him be the dominion
  alternative_readings:
  - To him belongs the dominion
  - His is the dominion
  rationale: The Greek is verbless, and English requires an implied predicate. 'To
    him be the dominion' preserves the doxological tone and formal force without adding
    more interpretation than necessary.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
