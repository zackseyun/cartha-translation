id: 1PE.5.11
reference: 1 Peter 5:11
source:
  edition: SBLGNT
  text: ⸀αὐτῷ τὸ κράτος εἰς τοὺς αἰῶνας ⸂τῶν αἰώνων⸃· ἀμήν.
translation:
  text: To him be the dominion forever and ever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'To him be the dominion unto the ages of ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτῷ
  chosen: To him
  alternatives:
  - to him
  - his
  lexicon: BDAG
  rationale: Dative singular pronoun referring back to God in the preceding context.
    English doxological style naturally renders the dative with 'To him' rather than
    a possessive construction.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  - strength
  lexicon: BDAG
  rationale: In a doxology, κράτος denotes ruling power or dominion rather than mere
    abstract strength. 'Dominion' best captures the ascribed sovereign might in idiomatic
    English.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  chosen: forever and ever
  alternatives:
  - unto the ages of ages
  - for the ages of the ages
  lexicon: BDAG
  rationale: This is a standard idiomatic doxological expression meaning unending
    duration. 'Forever and ever' communicates the sense clearly in modern English
    while preserving the emphatic force.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration is standard in English biblical usage and
    preserves the liturgical force of the closing affirmation.
