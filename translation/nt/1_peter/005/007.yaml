theological_decisions:
- issue: Referent of αὐτόν/αὐτῷ
  chosen_reading: him = God
  alternative_readings:
  - him = the Lord more generally, with the immediate antecedent supplied from context
  rationale: 'The immediate literary context (1 Pet 5:6: ''under the mighty hand of
    God'') makes God the most natural referent. The English pronoun ''him'' preserves
    the Greek''s pronominal form without over-specifying beyond the context.'
  doctrine_reference: Affirmations; Translation philosophy §1, §3
