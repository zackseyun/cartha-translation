id: 1PE.5.7
reference: 1 Peter 5:7
source:
  edition: SBLGNT
  text: πᾶσαν τὴν μέριμναν ὑμῶν ἐπιρίψαντες ἐπ’ αὐτόν, ὅτι αὐτῷ μέλει περὶ ὑμῶν.
translation:
  text: casting all your anxiety on him, because he cares about you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'care' or 'concern' for μέριμνα; here the sense is specifically anxious
      care or worry.
    reason: lexical_alternative
  - marker: b
    text: Literally 'having cast' or 'casting upon him.'
    reason: lexical_alternative
  - marker: c
    text: That is, God, from the immediate context (v. 6).
    reason: cross_reference
lexical_decisions:
- source_word: πᾶσαν
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: Accusative singular modifying μέριμναν; 'all' is the most natural English
    rendering in this construction and preserves the comprehensive force.
- source_word: μέριμναν
  chosen: anxiety
  alternatives:
  - care
  - worry
  - concern
  lexicon: BDAG
  rationale: In this context the noun denotes anxious concern or worry rather than
    neutral 'care.' 'Anxiety' best fits modern English and matches the pastoral sense
    of burdens to be cast on God.
- source_word: ὑμῶν
  chosen: your
  rationale: Genitive plural possessive modifying μέριμναν and later object of περί;
    straightforward second-person plural possessive/pronominal sense.
- source_word: ἐπιρίψαντες
  chosen: casting
  alternatives:
  - having cast
  - throwing
  lexicon: BDAG
  rationale: Aorist active participle, nominative masculine plural, dependent on the
    surrounding exhortation. 'Casting' preserves the participial connection and works
    idiomatically in English; 'having cast' is more wooden, while 'throwing' is too
    colloquial here.
- source_word: ἐπ’ αὐτόν
  chosen: on him
  alternatives:
  - upon him
  lexicon: BDAG
  rationale: ἐπί with accusative after ἐπιρίπτω naturally expresses movement onto
    someone/something. 'On him' is idiomatic and preserves the metaphor of transferring
    one's burden.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the exhortation. 'Because' is clear modern
    English and slightly more explicit than 'for.'
- source_word: μέλει
  chosen: he cares
  alternatives:
  - it matters to him
  - he is concerned
  lexicon: BDAG
  rationale: The impersonal/personal sense here conveys active concern. 'He cares'
    is the most natural English equivalent and preserves the relational force.
- source_word: περὶ ὑμῶν
  chosen: about you
  alternatives:
  - for you
  - concerning you
  lexicon: BDAG
  rationale: περί with genitive can mean 'about/concerning' and in this idiom with
    μέλει expresses concern for someone. 'About you' is natural with 'cares'; 'for
    you' is possible but can suggest provision rather than concern.
