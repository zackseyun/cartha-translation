id: 1PE.5.2
reference: 1 Peter 5:2
source:
  edition: SBLGNT
  text: ποιμάνατε τὸ ἐν ὑμῖν ποίμνιον τοῦ θεοῦ, ⸀ἐπισκοποῦντες μὴ ἀναγκαστῶς ἀλλὰ
    ἑκουσίως ⸂κατὰ θεόν⸃, μηδὲ αἰσχροκερδῶς ἀλλὰ προθύμως,
translation:
  text: Shepherd the flock of God among you, exercising oversight not under compulsion
    but willingly, according to God; nor for shameful gain, but eagerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as God would have it' / 'in keeping with God's will.'
    reason: alternative_reading
lexical_decisions:
- source_word: ποιμάνατε
  chosen: Shepherd
  alternatives:
  - tend
  - pastor
  lexicon: BDAG
  rationale: Aorist active imperative calling elders to act as shepherds. 'Shepherd'
    preserves the pastoral metaphor more fully than 'tend' and avoids importing the
    later office term 'pastor' into the verb itself.
- source_word: τὸ ἐν ὑμῖν ποίμνιον τοῦ θεοῦ
  chosen: the flock of God among you
  alternatives:
  - the flock of God that is among you
  - God's flock in your care
  lexicon: BDAG
  rationale: ποίμνιον is 'flock.' The phrase ἐν ὑμῖν is best taken locally/relationally
    as the flock among the elders addressed, not possession by them. 'Of God' is retained
    explicitly to stress divine ownership.
- source_word: ἐπισκοποῦντες
  chosen: exercising oversight
  alternatives:
  - overseeing
  - watching over
  lexicon: BDAG
  rationale: The participle explains how the shepherding is carried out. 'Exercising
    oversight' preserves the administrative/care nuance without collapsing it into
    a technical church-office title.
- source_word: μὴ ἀναγκαστῶς
  chosen: not under compulsion
  alternatives:
  - not by constraint
  - not reluctantly under pressure
  lexicon: BDAG
  rationale: ἀναγκαστῶς denotes acting from necessity or coercion. 'Under compulsion'
    is idiomatic and preserves the contrast with willing service.
- source_word: ἀλλὰ ἑκουσίως
  chosen: but willingly
  alternatives:
  - but voluntarily
  - but of your own accord
  lexicon: BDAG
  rationale: Clear adverbial contrast to compulsion; 'willingly' is concise and natural.
- source_word: κατὰ θεόν
  chosen: according to God
  alternatives:
  - in keeping with God's will
  - as God would have it
  lexicon: BDAG
  rationale: The phrase is somewhat compressed. A more literal rendering is kept in
    the main text to preserve the wording and avoid over-interpreting whether the
    sense is God's will, God's standard, or God's manner. A smoother interpretive
    alternative is preserved in a footnote.
- source_word: μηδὲ αἰσχροκερδῶς
  chosen: nor for shameful gain
  alternatives:
  - not greedily for dishonest profit
  - not for sordid gain
  lexicon: BDAG
  rationale: αἰσχροκερδῶς refers to base or disgraceful pursuit of profit. 'Shameful
    gain' is transparent modern English and preserves the moral force.
- source_word: ἀλλὰ προθύμως
  chosen: but eagerly
  alternatives:
  - but willingly
  - but with readiness
  lexicon: BDAG
  rationale: προθύμως conveys readiness and eagerness. 'Eagerly' distinguishes it
    from the earlier ἑκουσίως ('willingly') while preserving the positive contrast
    to mercenary motives.
