theological_decisions:
- issue: Whether ἐπισκοποῦντες should be rendered as a technical office term
  chosen_reading: Rendered descriptively as 'exercising oversight' rather than as
    an office label such as 'serving as bishops.'
  alternative_readings:
  - serving as overseers
  - fulfilling the office of bishop
  rationale: The participle here describes the activity expected of the elders addressed
    in context, not necessarily a later fixed ecclesiastical title. This avoids importing
    denominational polity into the verse while preserving the lexical connection to
    oversight.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: How explicitly to interpret κατὰ θεόν
  chosen_reading: Kept as 'according to God' in the main text, with a clarifying alternative
    in a footnote.
  alternative_readings:
  - according to God's will
  - as God would have it
  rationale: The phrase is theologically weighty but semantically compressed. Preserving
    the literal wording maintains the text's tension rather than resolving it into
    one interpretive paraphrase.
  doctrine_reference: Translation philosophy §3
