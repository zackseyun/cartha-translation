id: 1PE.5.6
reference: 1 Peter 5:6
source:
  edition: SBLGNT
  text: Ταπεινώθητε οὖν ὑπὸ τὴν κραταιὰν χεῖρα τοῦ θεοῦ, ἵνα ὑμᾶς ὑψώσῃ ἐν καιρῷ,
translation:
  text: Humble yourselves, therefore, under the mighty hand of God, so that he may
    exalt you at the proper time,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Be humbled ... so that he may exalt you in due time.'' The Greek imperative
      is passive in form, though here it is commonly understood with reflexive force:
      ''humble yourselves.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταπεινώθητε
  chosen: Humble yourselves
  alternatives:
  - Be humbled
  lexicon: BDAG
  rationale: Aorist passive imperative, but in this exhortational context the passive
    commonly carries a reflexive/middle sense in English. 'Humble yourselves' is idiomatic
    and preserves the command's force better than the more awkward 'be humbled,' while
    still allowing the implied submission to God in the following phrase.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding exhortation about God's opposition
    to the proud and grace to the humble. 'Therefore' best preserves the logical connection.
- source_word: ὑπὸ τὴν κραταιὰν χεῖρα
  chosen: under the mighty hand
  alternatives:
  - under the strong hand
  - beneath the mighty hand
  lexicon: BDAG
  rationale: A conventional biblical metaphor for God's powerful, sovereign action,
    echoing OT usage. 'Mighty hand' is the most natural and recognizable English rendering
    of κραταιὰν χεῖρα.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward genitive identifying whose hand is in view.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the telic sense.
- source_word: ὑμᾶς ὑψώσῃ
  chosen: he may exalt you
  alternatives:
  - he may lift you up
  - he may raise you up
  lexicon: BDAG
  rationale: 'The understood subject is God from the previous clause. ''Exalt'' preserves
    the semantic range of ὑψόω here: God raising the humble to honor or vindication,
    not merely physical lifting.'
- source_word: ἐν καιρῷ
  chosen: at the proper time
  alternatives:
  - in due time
  - at the appointed time
  lexicon: BDAG
  rationale: καιρός denotes a fitting or appointed time rather than mere chronological
    time. 'At the proper time' is clear modern English; 'in due time' is traditional
    but slightly less transparent.
