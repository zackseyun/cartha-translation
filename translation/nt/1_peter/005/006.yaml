theological_decisions:
- issue: Voice and agency in Ταπεινώθητε
  chosen_reading: The command is rendered reflexively as 'Humble yourselves' while
    retaining the following phrase 'under the mighty hand of God' to show that humility
    is exercised in submission to God's power.
  alternative_readings:
  - Be humbled
  rationale: This avoids implying autonomous self-abasement detached from God, while
    also avoiding an English passive that sounds unnatural. The verse presents human
    responsibility to take the low place before God, with God as the one who later
    exalts.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
