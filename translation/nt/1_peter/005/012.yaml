theological_decisions:
- issue: Reference of 'this' in 'this is the true grace of God'
  chosen_reading: '''This'' refers to the message/content of Peter''s letter and apostolic
    exhortation as embodying or attesting God''s true grace.'
  alternative_readings:
  - '''This'' refers more narrowly to the readers'' present experience of grace'
  - '''This'' refers specifically to the gospel message delivered through Silvanus'
  rationale: The immediate context of writing, exhorting, and testifying favors taking
    'this' as the substance of what Peter has written, without narrowing it beyond
    the text. The translation preserves the ambiguity of scope rather than resolving
    it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the final imperative στῆτε
  chosen_reading: 'Imperative: Peter commands the readers to remain steadfast in God''s
    grace.'
  alternative_readings:
  - 'Indicative textual variant: ''you stand'''
  rationale: The provided SBLGNT text reads the imperative στῆτε, which yields a fitting
    closing exhortation. A known variant supports an indicative sense, but the main
    text should follow the given critical text while preserving the alternative in
    a footnote.
