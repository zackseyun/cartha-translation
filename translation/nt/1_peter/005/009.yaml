theological_decisions:
- issue: Meaning of τῇ πίστει
  chosen_reading: objective Christian faith/steadfast faith commitment expressed as
    'the faith'
  alternative_readings:
  - subjective trust expressed as 'faith'
  rationale: The article and paraenetic context support a reference to steadfastness
    in the Christian faith, though the distinction is not absolute. The rendering
    preserves the text's call to stability without importing a denominational reading.
  doctrine_reference: 'DOCTRINE.md: πίστις default rendering ''faith''; preserve tension
    rather than over-resolve where ambiguity remains.'
- issue: Rendering of ἀδελφότητι
  chosen_reading: brotherhood
  alternative_readings:
  - family of believers
  - brothers and sisters
  rationale: The Greek uses a collective familial noun, not the simple plural 'brothers.'
    'Brotherhood' best preserves the lexical form while a footnote can clarify that
    the reference is to the whole community of believers.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
