id: 1PE.5.5
reference: 1 Peter 5:5
source:
  edition: SBLGNT
  text: ὁμοίως, νεώτεροι, ὑποτάγητε πρεσβυτέροις. πάντες δὲ ⸀ἀλλήλοις τὴν ταπεινοφροσύνην
    ἐγκομβώσασθε, ὅτι Ὁ θεὸς ὑπερηφάνοις ἀντιτάσσεται ταπεινοῖς δὲ δίδωσιν χάριν.
translation:
  text: Likewise, you younger men, submit yourselves to the elders. And all of you,
    clothe yourselves with humility toward one another, because God opposes the proud,
    but gives grace to the humble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who are younger.' The Greek is masculine plural ('younger men'),
      though some take it more generally as the younger members of the congregation.
    reason: lexical_alternative
  - marker: b
    text: Or 'tie on humility.' The Greek verb evokes putting on or fastening a garment,
      likely intensifying the image of deliberately wearing humility.
    reason: lexical_alternative
  - marker: c
    text: Quotation/allusion to Proverbs 3:34 (LXX).
    reason: cross_reference
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Standard discourse marker linking this exhortation to the preceding instructions;
    'Likewise' is concise and natural.
- source_word: νεώτεροι
  chosen: you younger men
  alternatives:
  - you who are younger
  - younger people
  lexicon: BDAG
  rationale: Vocative masculine plural contrasted with πρεσβυτέροις in the prior clause.
    'Younger men' preserves the gendered form and likely social contrast with male
    elders, in keeping with the gender-accurate policy. A more inclusive 'you who
    are younger' is possible but less formally transparent.
- source_word: ὑποτάγητε
  chosen: submit yourselves
  alternatives:
  - be subject
  - submit
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative of ὑποτάσσω in paraenetic usage commonly
    carries the sense 'submit yourselves' or 'be subject.' 'Submit yourselves' is
    idiomatic and preserves the voluntary responsive force without sounding overly
    wooden.
- source_word: πρεσβυτέροις
  chosen: the elders
  alternatives:
  - older men
  - elders
  lexicon: BDAG
  rationale: In the immediate context (5:1–4), πρεσβύτερος refers to church elders,
    not merely older males. The article in English clarifies the recognized group
    in view.
- source_word: πάντες
  chosen: all of you
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: Explicitly broadens the exhortation beyond the younger men to the whole
    community. 'All of you' is natural and clear.
- source_word: ἀλλήλοις
  chosen: toward one another
  alternatives:
  - to one another
  - with one another
  lexicon: BDAG
  rationale: Dative reciprocal pronoun here expresses mutual relational orientation.
    'Toward one another' fits the exhortation to humility in communal relations.
- source_word: ταπεινοφροσύνην
  chosen: humility
  alternatives:
  - humble-mindedness
  - lowliness
  lexicon: BDAG
  rationale: '''Humility'' is the clearest modern English equivalent. ''Humble-mindedness''
    is more literal but less natural.'
- source_word: ἐγκομβώσασθε
  chosen: clothe yourselves with
  alternatives:
  - tie on
  - put on
  lexicon: BDAG
  rationale: The verb evokes putting on or tying on a garment/apron. 'Clothe yourselves
    with' communicates the metaphor clearly in readable English, while preserving
    the clothing imagery. The more vivid 'tie on' is possible but less idiomatic in
    this context.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the scriptural ground for the exhortation. 'Because' is clearer
    in contemporary English than 'for'.
- source_word: Ὁ θεὸς
  chosen: God
  alternatives:
  - God himself
  lexicon: BDAG
  rationale: Simple subject; no expansion needed.
- source_word: ὑπερηφάνοις
  chosen: the proud
  alternatives:
  - proud people
  - the arrogant
  lexicon: BDAG
  rationale: Substantival adjective. 'The proud' is concise and traditional without
    being archaic.
- source_word: ἀντιτάσσεται
  chosen: opposes
  alternatives:
  - sets himself against
  - resists
  lexicon: BDAG
  rationale: The verb means to set oneself against or oppose. 'Opposes' is strong,
    clear, and idiomatic. 'Resists' is traditional but can sound weaker in modern
    English.
- source_word: ταπεινοῖς
  chosen: the humble
  alternatives:
  - humble people
  - the lowly
  lexicon: BDAG
  rationale: Substantival adjective parallel to 'the proud.' 'The humble' preserves
    the contrast cleanly.
- source_word: δίδωσιν χάριν
  chosen: gives grace
  alternatives:
  - shows favor
  - gives favor
  lexicon: BDAG
  rationale: χάρις is best kept as 'grace' here because of its theological and scriptural
    resonance, while still being understandable in context. 'Favor' is a viable lexical
    alternative and reflects the proverb's sense, but 'grace' better preserves canonical
    diction.
