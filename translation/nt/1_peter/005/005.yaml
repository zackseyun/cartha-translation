theological_decisions:
- issue: Referent of πρεσβυτέροις
  chosen_reading: church elders
  alternative_readings:
  - older men generally
  rationale: The immediate literary context addresses elders explicitly in 5:1–4,
    making the ecclesial office/group the most likely referent here rather than a
    general age-based category.
- issue: Gender rendering of νεώτεροι
  chosen_reading: you younger men
  alternative_readings:
  - you who are younger
  - younger people
  rationale: The Greek form is masculine plural and likely addresses the corresponding
    male group in relation to the elders. Per the translation philosophy, gender-accurate
    rendering is preferred over flattening to a neutral term. Because English readers
    may wonder whether the exhortation applies more broadly, the following πάντες
    δὲ makes explicit that the humility command extends to all.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
