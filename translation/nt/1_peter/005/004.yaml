theological_decisions:
- issue: Identity of 'the Chief Shepherd'
  chosen_reading: A christological title referring to Jesus
  rationale: In the immediate context of shepherd imagery and eschatological revelation,
    the title refers to Jesus without requiring expansion in the main text. Capitalization
    signals titular usage while avoiding doctrinal overstatement beyond the context.
  doctrine_reference: 'Affirmations: Nicene Creed; Chalcedon'
- issue: Eschatological manifestation language
  chosen_reading: is revealed
  alternative_readings:
  - appears
  rationale: The passive wording preserves the text's manifestation theme and avoids
    narrowing the event's description beyond the Greek. This maintains theological
    tension in eschatological language rather than over-specifying it.
  doctrine_reference: Translation philosophy §3
