id: 1PE.5.4
reference: 1 Peter 5:4
source:
  edition: SBLGNT
  text: καὶ φανερωθέντος τοῦ ἀρχιποίμενος κομιεῖσθε τὸν ἀμαράντινον τῆς δόξης στέφανον.
translation:
  text: And when the Chief Shepherd is revealed, you will receive the unfading crown
    of glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appears' for 'is revealed.'
    reason: alternative_reading
  - marker: b
    text: The Greek word for 'crown' can refer to a victor's wreath awarded as a prize
      of honor, not specifically a royal crown.
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερωθέντος
  chosen: when ... is revealed
  alternatives:
  - when ... appears
  - at the appearing of
  lexicon: BDAG
  rationale: 'Aorist passive participle in a genitive absolute, naturally rendered
    temporally: ''when ... is revealed.'' ''Is revealed'' preserves the passive sense
    and the motif of manifestation, while remaining idiomatic English. ''Appears''
    is possible but slightly flattens the passive nuance.'
- source_word: ἀρχιποίμενος
  chosen: Chief Shepherd
  alternatives:
  - chief shepherd
  - arch-shepherd
  - head shepherd
  lexicon: BDAG
  rationale: Compound title meaning the principal or supreme shepherd. 'Chief Shepherd'
    is clear, idiomatic, and preserves the titular force. Capitalization reflects
    its use as a christological title in context.
- source_word: κομιεῖσθε
  chosen: you will receive
  alternatives:
  - you will obtain
  - you will be given
  lexicon: BDAG
  rationale: Future middle indicative, here conveying reception of what is awarded
    or obtained. 'Receive' is the most natural English equivalent in this reward context.
    'Be given' would obscure the verb's active reception nuance.
- source_word: ἀμαράντινον
  chosen: unfading
  alternatives:
  - imperishable
  - amaranthine
  - that does not wither
  lexicon: BDAG
  rationale: The adjective denotes not fading or losing freshness. 'Unfading' is both
    accurate and readable, and it resonates with Petrine imagery of imperishable inheritance
    without importing a stronger term than the word itself requires. 'Amaranthine'
    is too opaque for modern readers.
- source_word: τῆς δόξης
  chosen: of glory
  alternatives:
  - glorious
  - which is glory
  lexicon: BDAG
  rationale: The genitive is best retained as 'of glory,' allowing the phrase to preserve
    its compact metaphorical force. An attributive paraphrase like 'glorious crown'
    is possible but less formally transparent.
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - victor's wreath
  lexicon: BDAG
  rationale: στέφανος refers to a wreath/crown awarded as honor or victory rather
    than a royal diadem. 'Crown' is the standard readable rendering in English; the
    more specific athletic nuance can be preserved in a footnote.
