theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title rather than a mere name-like identifier.
    Following the doctrine's contested-terms guidance, the title is translated to
    preserve meaning and messianic context.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Relation of suffering to divine action
  chosen_reading: after you have suffered a little while
  alternative_readings:
  - when you have suffered a little while
  rationale: The Greek participial phrase can be rendered with slight temporal flexibility,
    but the verse clearly presents present suffering as limited and followed by God's
    restorative action. The translation preserves that sequence without specifying
    a doctrinal system of suffering or sanctification beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
