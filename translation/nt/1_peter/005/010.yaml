id: 1PE.5.10
reference: 1 Peter 5:10
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς πάσης χάριτος, ὁ καλέσας ὑμᾶς εἰς τὴν αἰώνιον αὐτοῦ δόξαν ἐν ⸀Χριστῷ,
    ὀλίγον παθόντας αὐτὸς ⸀καταρτίσει, στηρίξει, σθενώσει, ⸀θεμελιώσει.
translation:
  text: And the God of all grace, who called you into his eternal glory in Messiah,
    after you have suffered a little while, will himself restore, establish, strengthen,
    and ground you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can be rendered 'Messiah' or, in
      traditional English, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'will perfect' or 'will make complete.' The verb includes the sense of
      restoring something to proper condition.
    reason: lexical_alternative
  - marker: c
    text: Or 'will found you' or 'will set you on a firm foundation.' The Greek uses
      foundation imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσης χάριτος
  chosen: of all grace
  alternatives:
  - of every grace
  lexicon: BDAG
  rationale: A straightforward genitive construction. 'All grace' is idiomatic English
    and preserves the comprehensive sense without over-specifying kinds of grace.
- source_word: καλέσας
  chosen: who called
  alternatives:
  - who has called
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as a simple past relative
    clause in English. This keeps the sequence clear and avoids importing aspectual
    nuance beyond the Greek.
- source_word: εἰς τὴν αἰώνιον αὐτοῦ δόξαν
  chosen: into his eternal glory
  alternatives:
  - to his eternal glory
  lexicon: BDAG
  rationale: εἰς commonly marks movement toward/into; 'into' preserves the directional
    force and the believer's participation in that glory more clearly than the flatter
    'to'.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  - by Messiah
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here ἐν Χριστῷ is a standard christological phrase; 'in Messiah' preserves
    the title's meaning and covenantal resonance.
- source_word: ὀλίγον παθόντας
  chosen: after you have suffered a little while
  alternatives:
  - after suffering briefly
  - when you have suffered a little
  lexicon: BDAG
  rationale: ὀλίγον here is best taken adverbially/temporally ('for a little while')
    rather than as a direct object. Rendering it with 'after you have suffered a little
    while' makes the temporal relation to the future verbs explicit and natural in
    English.
- source_word: αὐτὸς
  chosen: will himself
  alternatives:
  - himself will
  - he himself will
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'Will himself' preserves the emphasis that God
    personally acts on behalf of the readers.
- source_word: καταρτίσει
  chosen: restore
  alternatives:
  - perfect
  - repair
  - make complete
  lexicon: BDAG
  rationale: In this context of believers after suffering, 'restore' communicates
    the sense of putting into proper condition better than the archaic 'perfect.'
    It is accessible modern English while preserving the reparative nuance.
- source_word: στηρίξει
  chosen: establish
  alternatives:
  - confirm
  - make firm
  lexicon: BDAG
  rationale: '''Establish'' is a natural rendering that conveys firmness and stability
    without sounding overly technical. It also pairs well with the surrounding future
    verbs.'
- source_word: σθενώσει
  chosen: strengthen
  alternatives:
  - make strong
  lexicon: BDAG
  rationale: This is the most direct and idiomatic English equivalent, preserving
    the semantic distinction from the neighboring verbs as much as possible.
- source_word: θεμελιώσει
  chosen: ground
  alternatives:
  - found
  - set on a firm foundation
  lexicon: BDAG
  rationale: The verb carries foundation imagery. 'Ground' preserves that metaphor
    in concise modern English and avoids redundancy with 'establish,' while still
    signaling firm footing.
