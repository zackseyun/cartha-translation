id: 1PE.5.1
reference: 1 Peter 5:1
source:
  edition: SBLGNT
  text: Πρεσβυτέρους ⸀οὖν ἐν ὑμῖν παρακαλῶ ὁ συμπρεσβύτερος καὶ μάρτυς τῶν τοῦ Χριστοῦ
    παθημάτων, ὁ καὶ τῆς μελλούσης ἀποκαλύπτεσθαι δόξης κοινωνός,
translation:
  text: 'Therefore I exhort the elders among you, as a fellow elder and a witness
    of the sufferings of the Messiah, and also a sharer in the glory that is about
    to be revealed:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'of Christ's sufferings.' The Greek title Χριστός can be rendered 'Messiah'
      or, more traditionally, 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or, 'a participant in the glory that is going to be revealed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the older men
  - the presbyters
  lexicon: BDAG
  rationale: In this ecclesial context, πρεσβύτερος refers to church leaders rather
    than merely older males. 'Elders' is the clearest natural English equivalent and
    preserves the office/function without importing later denominational terminology.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding discussion. 'Therefore'
    preserves the logical connection more clearly than the lighter 'so'.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among yourselves
  lexicon: BDAG
  rationale: Idiomatic English for the relational sense of ἐν with persons in this
    context.
- source_word: παρακαλῶ
  chosen: I exhort
  alternatives:
  - I urge
  - I appeal to
  lexicon: BDAG
  rationale: παρακαλέω here carries earnest pastoral urging rather than mere request
    or comfort. 'Exhort' preserves the solemn paraenetic force, though 'urge' is a
    viable alternative.
- source_word: συμπρεσβύτερος
  chosen: a fellow elder
  alternatives:
  - a co-elder
  lexicon: BDAG
  rationale: The compound explicitly identifies the speaker as sharing the same elder-status.
    'Fellow elder' is natural English and preserves the collegial force.
- source_word: μάρτυς
  chosen: a witness
  alternatives:
  - one who testifies
  - a martyr
  lexicon: BDAG
  rationale: The primary sense here is one who bears witness to Christ's sufferings,
    not necessarily one who dies as a martyr. 'Witness' best fits the immediate context.
- source_word: τῶν τοῦ Χριστοῦ παθημάτων
  chosen: of the sufferings of the Messiah
  alternatives:
  - of Christ's sufferings
  - of the sufferings belonging to the Messiah
  lexicon: BDAG
  rationale: The genitive construction is most naturally rendered as the sufferings
    endured by the Messiah. Per doctrine, Χριστός as title is rendered 'Messiah' rather
    than 'Christ' where context supports title sense.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here, not merely a name-like identifier. 'Messiah' preserves
    the meaning of Χριστός in keeping with project policy.
- source_word: κοινωνός
  chosen: a sharer
  alternatives:
  - a participant
  - a partner
  lexicon: BDAG
  rationale: κοινωνός denotes one who shares in something. 'Sharer' is concise and
    readable, preserving participation without commercial overtones that 'partner'
    may suggest.
- source_word: τῆς μελλούσης ἀποκαλύπτεσθαι δόξης
  chosen: in the glory that is about to be revealed
  alternatives:
  - in the glory that is going to be revealed
  - in the coming revealed glory
  lexicon: BDAG
  rationale: μέλλω + infinitive indicates futurity/imminence; ἀποκαλύπτεσθαι is passive
    ('to be revealed'). 'About to be revealed' keeps the Greek structure and eschatological
    expectancy, though English readers may also hear it as simple future.
