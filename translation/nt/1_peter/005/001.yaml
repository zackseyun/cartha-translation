theological_decisions:
- issue: Rendering Χριστοῦ in a christological title
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The project's doctrine specifies translating Χριστός as 'Messiah' where
    it functions as a title. In this verse the genitive construction refers to the
    sufferings of the anointed one, and the titular sense is still live. The traditional
    'Christ' is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; Translation philosophy §2'
- issue: Force of μελλούσης ἀποκαλύπτεσθαι
  chosen_reading: about to be revealed
  alternative_readings:
  - to be revealed
  - going to be revealed
  rationale: The Greek expresses future revelation with an expectancy nuance. 'About
    to be revealed' is a close rendering, though not intended to settle broader debates
    about NT imminence or eschatological timing.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (preserve tension rather
    than resolve it)'
