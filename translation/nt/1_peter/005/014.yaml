theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title rather than a name-like form. In this closing blessing, the
    phrase 'in Messiah' retains the title's meaning and preserves the theological
    sense of union with the Anointed One. Because 'in Christ' is deeply familiar in
    English tradition, the alternative is preserved in a footnote rather than adopted
    in the main text.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
