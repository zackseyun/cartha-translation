id: 1PE.5.14
reference: 1 Peter 5:14
source:
  edition: SBLGNT
  text: ἀσπάσασθε ἀλλήλους ἐν φιλήματι ἀγάπης. εἰρήνη ὑμῖν πᾶσιν τοῖς ἐν ⸀Χριστῷ.
translation:
  text: Greet one another with a kiss of love. Peace to all of you who are in Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'who are in Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Greet one another
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, calling for a mutual
    act of greeting. 'Greet' is the most natural modern English imperative and fits
    epistolary closing usage without overtranslating.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Reciprocal pronoun indicating mutual action within the community. 'One
    another' is standard and clear.
- source_word: ἐν φιλήματι ἀγάπης
  chosen: with a kiss of love
  alternatives:
  - with a loving kiss
  - with a kiss of affection
  lexicon: BDAG
  rationale: The preposition ἐν here is rendered idiomatically as 'with' in English
    for the manner/instrument of greeting. φίλημα is 'kiss,' and ἀγάπης is a genitive
    qualifying the kiss. 'Kiss of love' preserves the lexical link to ἀγάπη ('love')
    more transparently than 'loving kiss.'
- source_word: εἰρήνη
  chosen: Peace
  alternatives:
  - May peace be
  lexicon: BDAG
  rationale: Nominal blessing formula in epistolary closing. 'Peace' preserves the
    concise benedictory force of the Greek without adding words not present in the
    text.
- source_word: ὑμῖν πᾶσιν
  chosen: to all of you
  alternatives:
  - to you all
  - to you all collectively
  lexicon: BDAG
  rationale: The dative pronoun with πᾶσιν expresses the recipients of the blessing.
    'To all of you' is natural modern English and preserves the inclusive scope.
- source_word: τοῖς ἐν Χριστῷ
  chosen: who are in Messiah
  alternatives:
  - who are in Christ
  - in the Messiah
  lexicon: BDAG
  rationale: 'The article plus prepositional phrase functions substantivally: ''those
    who are in ...'' English requires an explicit relative clause for clarity. Per
    doctrine, Χριστός as a title is rendered ''Messiah'' where context supports title
    sense; here the phrase denotes union with the Anointed One, so ''Messiah'' is
    preferred. ''Christ'' is preserved in a footnote as the familiar traditional rendering.'
