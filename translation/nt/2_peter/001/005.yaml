id: 2PE.1.5
reference: 2 Peter 1:5
source:
  edition: SBLGNT
  text: καὶ αὐτὸ τοῦτο δὲ σπουδὴν πᾶσαν παρεισενέγκαντες ἐπιχορηγήσατε ἐν τῇ πίστει
    ὑμῶν τὴν ἀρετήν, ἐν δὲ τῇ ἀρετῇ τὴν γνῶσιν,
translation:
  text: And for this very reason, making every effort, supply virtue in your faith,
    and in virtue, knowledge,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' or 'trust' for 'faith' (πίστις). The main text follows
      the project's default rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'moral excellence' for 'virtue' (ἀρετή).
    reason: lexical_alternative
  - marker: c
    text: The verb translated 'supply' can also be rendered 'add' or 'provide,' with
      the sense of furnishing generously.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτὸ τοῦτο δὲ
  chosen: And for this very reason
  alternatives:
  - And for this very thing
  - And indeed for this very reason
  lexicon: BDAG
  rationale: The combination intensifies the connection to the previous verse. 'For
    this very reason' captures the emphatic transitional force in natural English
    better than a more wooden rendering.
- source_word: σπουδὴν πᾶσαν
  chosen: every effort
  alternatives:
  - all diligence
  - full diligence
  lexicon: BDAG
  rationale: σπουδή here denotes earnestness or diligence. 'Every effort' is idiomatic
    modern English and preserves the sense of wholehearted exertion without archaic
    phrasing.
- source_word: παρεισενέγκαντες
  chosen: making
  alternatives:
  - bringing in
  - contributing
  lexicon: BDAG
  rationale: 'As an aorist participle modifying the imperative, it conveys attendant
    action: the readers are to act by bringing full diligence to the task. ''Making
    every effort'' is a natural participial-to-verbal restructuring in English.'
- source_word: ἐπιχορηγήσατε
  chosen: supply
  alternatives:
  - add
  - provide
  lexicon: BDAG
  rationale: The verb literally carries the sense of furnishing or supplying generously.
    'Supply' preserves that nuance better than the traditional but potentially flattening
    'add.'
- source_word: ἐν τῇ πίστει ὑμῶν
  chosen: in your faith
  alternatives:
  - with your faith
  - by your faith
  lexicon: BDAG
  rationale: 'The repeated ἐν + dative structures form a chain: in faith, virtue;
    in virtue, knowledge. ''In'' best preserves the Greek pattern and the sense of
    one quality being furnished in connection with another.'
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this virtue list, 'faith' is the most straightforward sense; alternatives are
    preserved in a footnote because the term can carry overlapping nuances.
- source_word: ἀρετήν
  chosen: virtue
  alternatives:
  - moral excellence
  - excellence
  lexicon: BDAG
  rationale: ἀρετή denotes excellence of character or virtue. 'Virtue' is concise
    and traditional without being obscure, while still carrying moral force. 'Moral
    excellence' is a viable explanatory alternative but less compact.
- source_word: γνῶσιν
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: BDAG
  rationale: γνῶσις is best rendered 'knowledge' here, matching the lexical core and
    fitting the progression of qualities. Broader interpretive glosses like 'discernment'
    go beyond the immediate wording.
