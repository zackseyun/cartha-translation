theological_decisions:
- issue: Nuance of ἐπίγνωσις in a spiritually charged context
  chosen_reading: knowledge
  alternative_readings:
  - full knowledge
  - true knowledge
  rationale: The term often bears a strengthened sense in 2 Peter, but rendering it
    simply as 'knowledge' avoids importing a technical theological nuance beyond what
    the immediate phrase requires. The stronger possibilities are preserved in a footnote
    for auditability.
  doctrine_reference: Translation philosophy §3, §6
- issue: Force of ἐν with ἐπιγνώσει
  chosen_reading: in the knowledge of God and of Jesus our Lord
  alternative_readings:
  - through the knowledge of God and of Jesus our Lord
  - by means of the knowledge of God and of Jesus our Lord
  rationale: The Greek permits either sphere ('in') or means ('through/by means of').
    The main text preserves the formal wording and theological tension rather than
    resolving the relation too narrowly.
  doctrine_reference: Translation philosophy §3
