id: 2PE.1.2
reference: 2 Peter 1:2
source:
  edition: SBLGNT
  text: χάρις ὑμῖν καὶ εἰρήνη πληθυνθείη ἐν ἐπιγνώσει τοῦ θεοῦ καὶ Ἰησοῦ τοῦ κυρίου
    ἡμῶν.
translation:
  text: Grace to you and peace be multiplied in the knowledge of God and of Jesus
    our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the knowledge of God and of Jesus our Lord.' The Greek preposition
      can indicate sphere ('in') or means ('through/by means of').
    reason: alternative_reading
  - marker: b
    text: Or 'full knowledge' for 'knowledge' (Greek ἐπίγνωσις), a term that can carry
      the sense of fuller or more complete knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  - grace
  lexicon: BDAG
  rationale: Standard epistolary blessing term; 'grace' preserves both the greeting
    formula and the theological sense of divine favor without flattening it to mere
    'favor'.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: Conventional and theologically rich rendering in greetings; 'peace' preserves
    the likely Semitic resonance behind the term.
- source_word: πληθυνθείη
  chosen: be multiplied
  alternatives:
  - be increased
  - increase
  lexicon: BDAG
  rationale: Aorist passive optative in a wish/blessing formula is well represented
    by 'be multiplied.' This is more formally aligned than 'increase' and preserves
    the passive sense.
- source_word: ἐν
  chosen: in
  alternatives:
  - through
  - by means of
  lexicon: BDAG
  rationale: The preposition can express sphere or means here. 'In' is retained in
    the main text because it is the most direct rendering and preserves the interpretive
    openness between sphere and instrument.
- source_word: ἐπιγνώσει
  chosen: the knowledge
  alternatives:
  - full knowledge
  - true knowledge
  - recognition
  lexicon: BDAG
  rationale: ἐπίγνωσις can carry the nuance of fuller or more complete knowledge,
    but 'knowledge' is the most natural English rendering here. The article in English
    helps reflect the genitival construction and the specific relational knowledge
    in view without overtranslating to 'full knowledge'.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Straightforward genitive after ἐπιγνώσει: the knowledge is of God.'
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated per project philosophy.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine table, κύριος defaults to 'Lord.' This preserves both the
    title's christological weight and standard NT usage.
- source_word: τοῦ θεοῦ καὶ Ἰησοῦ τοῦ κυρίου ἡμῶν
  chosen: of God and of Jesus our Lord
  alternatives:
  - of God and Jesus our Lord
  lexicon: Greek grammar
  rationale: English repeats 'of' before 'Jesus' to make clear that both nouns depend
    on 'knowledge.' This is stylistic clarification, not addition of a second Greek
    preposition.
