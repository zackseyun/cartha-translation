id: 2PE.1.19
reference: 2 Peter 1:19
source:
  edition: SBLGNT
  text: καὶ ἔχομεν βεβαιότερον τὸν προφητικὸν λόγον, ᾧ καλῶς ποιεῖτε προσέχοντες ὡς
    λύχνῳ φαίνοντι ἐν αὐχμηρῷ τόπῳ, ἕως οὗ ἡμέρα διαυγάσῃ καὶ φωσφόρος ἀνατείλῃ ἐν
    ταῖς καρδίαις ὑμῶν·
translation:
  text: And we have the prophetic word made more certain, to which you do well to
    pay attention as to a lamp shining in a dark place, until the day dawns and the
    morning star rises in your hearts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And we have the prophetic word more sure.' The Greek can be understood
      either as the prophetic word being confirmed by the apostolic witness, or as
      emphasizing the prophetic word's sure character.
    reason: alternative_reading
  - marker: b
    text: '''Morning star'' may echo a Messianic image; compare Rev 22:16.'
    reason: cross_reference
lexical_decisions:
- source_word: βεβαιότερον
  chosen: made more certain
  alternatives:
  - more certain
  - more sure
  lexicon: BDAG
  rationale: Comparative adjective modifying 'the prophetic word.' The English 'made
    more certain' brings out the predicative force in context after the apostolic
    eyewitness testimony, while avoiding an overly wooden phrasing. 'More sure' is
    traditional but less natural in contemporary English and can sound absolute rather
    than comparative.
- source_word: προφητικὸν λόγον
  chosen: the prophetic word
  alternatives:
  - the prophetic message
  - the word of prophecy
  lexicon: BDAG
  rationale: A natural, fairly formal rendering that preserves both elements. 'Word
    of prophecy' is possible, but 'prophetic word' better reflects the adjectival
    construction and idiomatic English.
- source_word: ᾧ ... προσέχοντες
  chosen: to which you do well to pay attention
  alternatives:
  - to which you do well to give heed
  - to which you do well paying attention
  lexicon: BDAG
  rationale: προσέχω here means to pay careful attention or heed. 'Pay attention'
    is readable modern English; 'give heed' is more traditional but less current.
    The dative relative pronoun is naturally rendered with 'to which.'
- source_word: λύχνῳ φαίνοντι
  chosen: a lamp shining
  alternatives:
  - a lamp giving light
  - a lamp that shines
  lexicon: BDAG
  rationale: Retains the simile and present participle's ongoing sense in concise
    English.
- source_word: αὐχμηρῷ τόπῳ
  chosen: a dark place
  alternatives:
  - a gloomy place
  - a murky place
  - a squalid place
  lexicon: BDAG
  rationale: αὐχμηρός can denote dingy, dark, or murky conditions. 'Dark place' best
    fits the lamp imagery and is the clearest idiomatic English. 'Squalid' is possible
    in some lexical discussions but is less fitting in this metaphorical context.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - until the time when
  lexicon: BDAG
  rationale: Standard temporal rendering; concise and natural.
- source_word: ἡμέρα διαυγάσῃ
  chosen: the day dawns
  alternatives:
  - day breaks
  - the day shines forth
  lexicon: BDAG
  rationale: διαυγάζω refers to dawning or becoming fully light. 'The day dawns' is
    idiomatic and preserves the metaphor.
- source_word: φωσφόρος
  chosen: the morning star
  alternatives:
  - the day star
  - the light-bringer
  lexicon: BDAG
  rationale: In this context the term denotes the morning star. 'Morning star' is
    standard contemporary English and avoids the misleading connotations that 'light-bringer'
    may carry in later tradition.
- source_word: ἀνατείλῃ
  chosen: rises
  alternatives:
  - springs up
  - appears
  lexicon: BDAG
  rationale: Astral imagery favors 'rises' as the most natural equivalent.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  chosen: in your hearts
  alternatives:
  - within your hearts
  lexicon: BDAG
  rationale: A direct and idiomatic rendering. 'Hearts' in biblical usage includes
    the inner person, not merely emotions; no expansion is added in the main text
    to avoid over-interpretation.
