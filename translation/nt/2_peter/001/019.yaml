theological_decisions:
- issue: Sense of βεβαιότερον in relation to apostolic eyewitness testimony and prophecy
  chosen_reading: Rendered as 'the prophetic word made more certain,' indicating confirmation/strengthening
    rather than implying prophecy is intrinsically more reliable than the apostolic
    witness.
  alternative_readings:
  - '''the prophetic word more sure'''
  - '''we have the more sure prophetic word'''
  rationale: The Greek permits different construals. This rendering preserves the
    likely sense that the prophetic word is confirmed by the transfiguration account,
    without forcing a polemical contrast between prophecy and apostolic testimony.
    It also keeps the comparative force visible.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'the morning star'
  chosen_reading: Kept as metaphorical 'the morning star' without explicitly identifying
    the referent in the main text.
  alternative_readings:
  - an implicit reference to Messiah/Christ
  - a metaphor for eschatological illumination
  rationale: Given biblical intertexts, many readers will hear a Messianic resonance,
    but the verse itself presents the image without explicit identification. The translation
    preserves the imagery and leaves the theological resonance intact rather than
    importing an interpretation into the text.
  doctrine_reference: Do not import doctrinal claims the text does not make; preserve
    theological tension rather than resolve it.
