theological_decisions:
- issue: Means or basis in the phrase ἰδίᾳ δόξῃ καὶ ἀρετῇ
  chosen_reading: by his own glory and excellence
  alternative_readings:
  - to his own glory and excellence
  rationale: 'The dative phrase is textually and syntactically debated, but with the
    given SBLGNT reading the dative is most naturally taken as instrumental or means:
    the caller acts by means of his own glory and excellence. This avoids importing
    a stronger teleological sense unless the text clearly requires it. The alternative
    is preserved in a footnote because many translations reflect that reading.'
  doctrine_reference: Preserve theological tension rather than resolve it.
