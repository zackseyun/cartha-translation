id: 2PE.1.3
reference: 2 Peter 1:3
source:
  edition: SBLGNT
  text: Ὡς πάντα ἡμῖν τῆς θείας δυνάμεως αὐτοῦ τὰ πρὸς ζωὴν καὶ εὐσέβειαν δεδωρημένης
    διὰ τῆς ἐπιγνώσεως τοῦ καλέσαντος ἡμᾶς ⸂ἰδίᾳ δόξῃ καὶ ἀρετῇ⸃,
translation:
  text: As his divine power has granted to us all things for life and godliness, through
    the knowledge of the one who called us by his own glory and excellence,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “to his own glory and excellence.” The Greek dative phrase can be understood
      differently.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς
  chosen: As
  alternatives:
  - Since
  - seeing that
  lexicon: BDAG
  rationale: Introduces the ground or basis for the exhortation that follows. 'As'
    preserves the Greek connective force without over-interpreting it as strictly
    causal, though 'since' is possible.
- source_word: πάντα ... τὰ πρὸς ζωὴν καὶ εὐσέβειαν
  chosen: all things for life and godliness
  alternatives:
  - everything pertaining to life and godliness
  - all things needed for life and godliness
  lexicon: BDAG
  rationale: The articular phrase τὰ πρὸς + accusative means 'the things pertaining
    to' or 'for.' 'For life and godliness' is concise and natural while preserving
    the scope of πάντα.
- source_word: θείας δυνάμεως αὐτοῦ
  chosen: his divine power
  alternatives:
  - the divine power of him
  - his godlike power
  lexicon: BDAG
  rationale: Genitive construction is naturally rendered in English as 'his divine
    power.' 'Divine' is the standard sense of θεῖος here.
- source_word: δεδωρημένης
  chosen: has granted
  alternatives:
  - has given
  - has bestowed
  lexicon: BDAG
  rationale: Perfect middle/passive participle from δωρέομαι conveys a gracious giving
    with abiding result. 'Has granted' captures both the benefactive nuance and the
    completed action with present effect.
- source_word: διὰ τῆς ἐπιγνώσεως
  chosen: through the knowledge
  alternatives:
  - through full knowledge
  - through knowing
  lexicon: BDAG
  rationale: ἐπίγνωσις can suggest fuller or more complete knowledge, but 'knowledge'
    is the most transparent English rendering and avoids overstating a technical nuance
    not demanded by the context.
- source_word: τοῦ καλέσαντος ἡμᾶς
  chosen: of the one who called us
  alternatives:
  - of him who called us
  - of the one having called us
  lexicon: BDAG
  rationale: The substantival participle is best rendered personally. 'The one who
    called us' is clear, natural, and preserves the verbal force of καλέσαντος.
- source_word: ἰδίᾳ
  chosen: his own
  alternatives:
  - his
  - proper
  lexicon: BDAG
  rationale: ἴδιος adds emphasis of possession or belonging. 'His own' preserves that
    emphasis better than a simple possessive.
- source_word: δόξῃ
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: δόξα in this context refers to divine majesty or manifested excellence.
    'Glory' is the standard and theologically weighty rendering.
- source_word: ἀρετῇ
  chosen: excellence
  alternatives:
  - virtue
  - moral excellence
  lexicon: BDAG
  rationale: ἀρετή can mean virtue or excellence. 'Excellence' is more idiomatic in
    contemporary English and fits the paired expression with 'glory' without implying
    merely human moralism.
- source_word: ζωὴν
  chosen: life
  alternatives:
  - true life
  lexicon: BDAG
  rationale: No modifier in Greek warrants expansion. 'Life' should remain broad,
    allowing both present and eschatological resonance.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: '''Godliness'' is the standard rendering in the Pastorals and Petrine
    literature and preserves the God-directed ethical sense of εὐσέβεια.'
