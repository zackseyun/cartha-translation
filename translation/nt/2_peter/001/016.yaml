id: 2PE.1.16
reference: 2 Peter 1:16
source:
  edition: SBLGNT
  text: Οὐ γὰρ σεσοφισμένοις μύθοις ἐξακολουθήσαντες ἐγνωρίσαμεν ὑμῖν τὴν τοῦ κυρίου
    ἡμῶν Ἰησοῦ Χριστοῦ δύναμιν καὶ παρουσίαν, ἀλλ’ ἐπόπται γενηθέντες τῆς ἐκείνου
    μεγαλειότητος.
translation:
  text: For we did not make known to you the power and coming of our Lord Jesus Messiah
    by following cleverly devised myths, but by becoming eyewitnesses of his majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presence' (or 'arrival') of our Lord Jesus Messiah.' The Greek παρουσία
      can denote presence, arrival, or, in many New Testament contexts, the Messiah's
      coming.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a
      title.
    reason: lexical_alternative
lexical_decisions:
- source_word: σεσοφισμένοις μύθοις
  chosen: cleverly devised myths
  alternatives:
  - ingeniously concocted myths
  - sophisticated myths
  - clever myths
  lexicon: BDAG
  rationale: The perfect passive participle of σοφίζω modifies μύθοις and conveys
    myths that have been artfully fabricated or made clever. 'Cleverly devised myths'
    preserves both the pejorative sense and the crafted quality without sounding archaic.
- source_word: ἐξακολουθήσαντες
  chosen: by following
  alternatives:
  - following
  - having followed
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered as attendant circumstance/background
    to the main verb ἐγνωρίσαμεν. ''By following'' makes the instrumental/means contrast
    with ἀλλά clear in English: not by following myths, but by becoming eyewitnesses.'
- source_word: ἐγνωρίσαμεν
  chosen: we did not make known to you
  alternatives:
  - we did not proclaim to you
  - we did not inform you
  lexicon: BDAG
  rationale: γνωρίζω means to make known or disclose. 'Make known to you' is a natural
    and fairly formal rendering that preserves the dative ὑμῖν.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - might
  lexicon: BDAG
  rationale: δύναμις regularly means power/might. 'Power' is the most direct and idiomatic
    choice here.
- source_word: παρουσίαν
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In early Christian usage παρουσία often refers to Christ's eschatological
    coming, though the lexical sense includes presence/arrival. Given the collocation
    with 'power' and the broader NT usage, 'coming' best fits the likely referent
    while remaining natural English.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This also fits standard
    NT titular usage for Jesus.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is translated 'Messiah' where functioning
    as a title rather than a fixed name-like form. In 'Jesus Messiah' the titular
    sense remains transparent and preserves the meaning of the Greek.
- source_word: ἐπόπται
  chosen: eyewitnesses
  alternatives:
  - witnesses
  - observers
  lexicon: BDAG
  rationale: ἐπόπτης denotes one who has seen for oneself, an eyewitness or direct
    observer. 'Eyewitnesses' brings out the evidentiary force in contrast to myths.
- source_word: γενηθέντες
  chosen: by becoming
  alternatives:
  - having become
  - because we became
  lexicon: BDAG
  rationale: 'The aorist passive/deponent participle of γίνομαι is rendered instrumentally
    in coordination with the previous participle: not by following myths, but by becoming
    eyewitnesses. ''By becoming'' keeps the parallel structure clear.'
- source_word: μεγαλειότητος
  chosen: majesty
  alternatives:
  - greatness
  - splendor
  lexicon: BDAG
  rationale: μεγαλειότης denotes magnificence or majesty. 'Majesty' is concise, elevated,
    and fits the likely allusion to the transfiguration.
- source_word: ἐκείνου
  chosen: his
  alternatives:
  - that one's
  - that man's
  lexicon: BDAG
  rationale: The demonstrative refers back to 'our Lord Jesus Messiah.' English normally
    uses the possessive pronoun 'his' here rather than the more wooden 'that one's,'
    while preserving the referent.
