theological_decisions:
- issue: Rendering παρουσία in a christological context
  chosen_reading: coming
  alternative_readings:
  - presence
  - arrival
  rationale: The term can lexically mean 'presence' or 'arrival,' but in New Testament
    contexts concerning Jesus it commonly bears eschatological force. Here Peter denies
    proclaiming fabricated stories about the Lord Jesus Messiah's 'power and coming,'
    which coheres with that usage. Because 'presence' remains lexically possible,
    it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3; Contested terms table does not fix
    παρουσία, so ambiguity is documented rather than erased.
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated 'Messiah' where
    it functions as a title. In this verse the phrase 'our Lord Jesus Messiah' still
    reads as a title-bearing designation rather than a fully fossilized proper name,
    so 'Messiah' is preferred.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός.
