theological_decisions:
- issue: Metaphorical reference of 'this tent'
  chosen_reading: Render the bodily metaphor directly as 'this tent' rather than interpretively
    as 'this body.'
  alternative_readings:
  - this body
  - this dwelling
  rationale: The Greek uses a metaphor for mortal embodied life. Preserving 'tent'
    maintains the author's imagery and the eschatological transience implied by the
    metaphor, especially in connection with the next verse, without importing extra
    doctrinal explanation into the main text.
  doctrine_reference: 'Translation philosophy: preserve source-text meaning and avoid
    paraphrase beyond what the text warrants.'
