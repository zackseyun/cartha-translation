id: 2PE.1.13
reference: 2 Peter 1:13
source:
  edition: SBLGNT
  text: δίκαιον δὲ ἡγοῦμαι, ἐφ’ ὅσον εἰμὶ ἐν τούτῳ τῷ σκηνώματι, διεγείρειν ὑμᾶς ἐν
    ὑπομνήσει,
translation:
  text: But I consider it right, as long as I am in this tent, to stir you up by way
    of reminder,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelling' or 'body'; Greek 'tent,' a metaphor for Peter's present mortal
      life in the body.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιον
  chosen: right
  alternatives:
  - proper
  - just
  lexicon: BDAG
  rationale: Here δίκαιον functions idiomatically with ἡγοῦμαι ('I consider') to express
    what is fitting or proper. 'Right' is natural modern English and preserves the
    moral/propriety sense without sounding stiff.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous statement.
    'But' best captures the transition in context.
- source_word: ἡγοῦμαι
  chosen: I consider
  alternatives:
  - I think
  - I regard
  lexicon: BDAG
  rationale: The verb denotes a considered judgment rather than a mere passing thought.
    'I consider' is both accurate and suitably formal.
- source_word: ἐφ’ ὅσον
  chosen: as long as
  alternatives:
  - insofar as
  - while
  lexicon: BDAG
  rationale: In this temporal construction with εἰμί, the phrase means 'for as long
    as' or 'while.' 'As long as' is the clearest idiomatic rendering.
- source_word: σκηνώματι
  chosen: tent
  alternatives:
  - dwelling
  - tabernacle
  lexicon: BDAG
  rationale: σκηνώμα denotes a tent-like dwelling and is used metaphorically here
    for Peter's mortal body. 'Tent' preserves the metaphor vividly and prepares for
    the following verse's reference to putting it off. 'Tabernacle' would sound archaic
    and over-theologized in English.
- source_word: διεγείρειν
  chosen: to stir ... up
  alternatives:
  - to awaken
  - to rouse
  lexicon: BDAG
  rationale: The infinitive means to arouse or awaken. In context of moral/spiritual
    prompting, 'to stir you up' is idiomatic and faithful.
- source_word: ἐν ὑπομνήσει
  chosen: by way of reminder
  alternatives:
  - with a reminder
  - in remembrance
  lexicon: BDAG
  rationale: 'This prepositional phrase expresses means or manner: Peter is stirring
    them up through reminding them. ''By way of reminder'' is a standard and accurate
    English rendering.'
