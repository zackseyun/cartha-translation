id: 2PE.1.4
reference: 2 Peter 1:4
source:
  edition: SBLGNT
  text: δι’ ὧν τὰ ⸂τίμια καὶ μέγιστα ἡμῖν⸃ ἐπαγγέλματα δεδώρηται, ἵνα διὰ τούτων γένησθε
    θείας κοινωνοὶ φύσεως, ἀποφυγόντες τῆς ἐν ⸀τῷ κόσμῳ ἐν ἐπιθυμίᾳ φθορᾶς.
translation:
  text: through which he has granted to us his precious and very great promises, so
    that through these you may become sharers in the divine nature, having escaped
    the corruption that is in the world because of sinful desire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participants in the divine nature.' The phrase speaks of sharing in
      what comes from God, not of becoming divine in essence.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of desire' or 'by lust.' The Greek term can mean 'desire' generally,
      but here it is morally negative in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὧν
  chosen: through which
  alternatives:
  - through these things
  - by which
  lexicon: BDAG
  rationale: διά with the genitive is instrumental/mediating. The relative pronoun
    most naturally refers back to the preceding realities in v. 3 (his glory and excellence,
    or the means just mentioned), so 'through which' preserves the linkage without
    over-specifying the antecedent.
- source_word: τίμια καὶ μέγιστα
  chosen: precious and very great
  alternatives:
  - valuable and greatest
  - precious and magnificent
  lexicon: BDAG
  rationale: τίμιος commonly means 'precious/valuable'; μέγιστα is a superlative,
    but in idiomatic English 'very great' better conveys the force here than the awkward
    'greatest' modifying 'promises.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: The dative with δωρέομαι is naturally rendered 'to us' or 'for us.' 'To
    us' fits the verbal idea of granting while keeping the Greek structure visible.
- source_word: ἐπαγγέλματα
  chosen: promises
  alternatives:
  - pledges
  lexicon: BDAG
  rationale: Standard rendering for ἐπάγγελμα in this context; 'promises' is clear,
    natural, and theologically established without distortion.
- source_word: δεδώρηται
  chosen: he has granted
  alternatives:
  - has given
  - has bestowed
  lexicon: BDAG
  rationale: Perfect middle/passive of δωρέομαι conveys a gracious giving with present
    result. 'Has granted' preserves the sense of generous bestowal better than the
    flatter 'has given.' The subject is implicit from context (God, from v. 3), so
    English supplies 'he.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the telic force.
- source_word: διὰ τούτων
  chosen: through these
  alternatives:
  - by these things
  lexicon: BDAG
  rationale: Again instrumental διά with genitive. 'These' most naturally points to
    the promises just mentioned.
- source_word: γένησθε
  chosen: you may become
  alternatives:
  - you may be
  - you may come to be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι denotes becoming rather than simple
    stative being. 'May become' preserves the transformational nuance.
- source_word: θείας κοινωνοὶ φύσεως
  chosen: sharers in the divine nature
  alternatives:
  - participants in the divine nature
  - partners of the divine nature
  lexicon: BDAG
  rationale: κοινωνός denotes one who shares/participates in something. 'Sharers in'
    is idiomatic and accessible. 'Divine nature' is the standard rendering of θείας
    φύσεως and should be preserved without interpretive expansion.
- source_word: ἀποφυγόντες
  chosen: having escaped
  alternatives:
  - after escaping
  - escaping
  lexicon: BDAG
  rationale: Aorist participle is best rendered as antecedent or attendant action.
    'Having escaped' clearly relates the escape to the believers' participation without
    flattening the participial structure.
- source_word: φθορᾶς
  chosen: the corruption
  alternatives:
  - decay
  - ruin
  lexicon: BDAG
  rationale: φθορά here refers to moral/spiritual corruption rather than merely physical
    decay. 'Corruption' best fits the ethical context.
- source_word: ἐν τῷ κόσμῳ
  chosen: that is in the world
  alternatives:
  - in the world
  lexicon: BDAG
  rationale: The attributive construction modifies 'corruption.' Rendering it explicitly
    as 'that is in the world' preserves the Greek syntax and avoids ambiguity.
- source_word: ἐν ἐπιθυμίᾳ
  chosen: because of sinful desire
  alternatives:
  - in desire
  - by lust
  - through craving
  lexicon: BDAG
  rationale: The prepositional phrase explains the sphere/cause of the world's corruption.
    ἐπιθυμία can mean desire generally, but in this moral context it carries a negative
    sense; 'sinful desire' makes that force clear in contemporary English without
    archaic 'lust.'
