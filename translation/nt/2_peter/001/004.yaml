theological_decisions:
- issue: θείας κοινωνοὶ φύσεως and the doctrine of participation
  chosen_reading: Rendered 'sharers in the divine nature' without explanatory expansion.
  alternative_readings:
  - participants in the divine nature
  - partakers of the divine nature
  rationale: The phrase is theologically weighty and has been read in relation to
    sanctification, union with Christ, and theosis. The translation should preserve
    the text's strong language without importing later doctrinal formulations or weakening
    it. 'Sharers in the divine nature' communicates real participation while avoiding
    any suggestion that believers become divine by essence.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Negative moral force of ἐπιθυμία
  chosen_reading: Rendered as 'sinful desire' in context.
  alternative_readings:
  - desire
  - lust
  rationale: Although ἐπιθυμία is not always negative lexically, here it is tied to
    worldly corruption. Adding 'sinful' reflects contextual force rather than importing
    a separate doctrine, and avoids the archaic narrowing of 'lust' to sexual desire
    alone.
  doctrine_reference: Translation philosophy §6
