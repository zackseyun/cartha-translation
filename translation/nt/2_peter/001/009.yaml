id: 2PE.1.9
reference: 2 Peter 1:9
source:
  edition: SBLGNT
  text: ᾧ γὰρ μὴ πάρεστιν ταῦτα, τυφλός ἐστιν μυωπάζων, λήθην λαβὼν τοῦ καθαρισμοῦ
    τῶν πάλαι αὐτοῦ ⸀ἁμαρτημάτων.
translation:
  text: For the one who lacks these things is blind, being shortsighted, having forgotten
    the cleansing of his former sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these qualities.' The phrase points back to the virtues named in the
      previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'nearsighted' or 'seeing only what is near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  chosen: the one who
  alternatives:
  - who
  - whomever
  - the person who
  lexicon: BDAG
  rationale: The dative relative pronoun refers back generally to a person characterized
    by lacking the listed virtues. 'The one who' makes the sense clear in natural
    English without over-specifying gender.
- source_word: πάρεστιν
  chosen: lacks
  alternatives:
  - does not have
  - is not present with
  lexicon: BDAG
  rationale: With ταῦτα as subject/complement, the idiom means that these qualities
    are not present in someone. 'Lacks' is concise and idiomatic English.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these qualities
  - these
  lexicon: BDAG
  rationale: A formally transparent rendering that points back to the virtues in the
    previous verse. 'These qualities' is interpretive; the main text keeps the broader
    'these things'.
- source_word: τυφλός
  chosen: blind
  alternatives:
  - blind person
  lexicon: BDAG
  rationale: Direct adjectival predicate; 'blind' preserves the metaphor plainly.
- source_word: μυωπάζων
  chosen: being shortsighted
  alternatives:
  - seeing only what is near
  - nearsighted
  lexicon: BDAG
  rationale: The participle likely explains or intensifies the metaphor of blindness.
    'Being shortsighted' preserves the verbal force and the figurative image in readable
    English.
- source_word: λήθην λαβὼν
  chosen: having forgotten
  alternatives:
  - having received forgetfulness
  - having become forgetful
  lexicon: BDAG
  rationale: The idiom literally 'having taken/received forgetfulness' is best rendered
    idiomatically in English as 'having forgotten'.
- source_word: καθαρισμοῦ
  chosen: the cleansing
  alternatives:
  - the purification
  - the purging
  lexicon: BDAG
  rationale: '''Cleansing'' communicates removal of defilement in accessible English
    and fits the moral/spiritual context. ''Purification'' is possible but slightly
    more technical.'
- source_word: τῶν πάλαι αὐτοῦ ἁμαρτημάτων
  chosen: of his former sins
  alternatives:
  - from his sins long ago
  - of his past sins
  lexicon: BDAG
  rationale: πάλαι modifies the sins as belonging to an earlier time. 'Former sins'
    is concise and natural, preserving the temporal contrast.
