theological_decisions:
- issue: Gender representation in the singular pronoun αὐτοῦ
  chosen_reading: his former sins
  alternative_readings:
  - their former sins
  rationale: The Greek is singular masculine, referring to a representative individual.
    Per the translation philosophy, gender-accurate rendering is preferred over flattening
    to plural. The phrase is generic rather than exclusively male.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
