id: 2PE.1.12
reference: 2 Peter 1:12
source:
  edition: SBLGNT
  text: Διὸ ⸀μελλήσω ἀεὶ ὑμᾶς ὑπομιμνῄσκειν περὶ τούτων, καίπερ εἰδότας καὶ ἐστηριγμένους
    ἐν τῇ παρούσῃ ἀληθείᾳ.
translation:
  text: Therefore I will always be ready to remind you about these things, even though
    you know them and have been established in the present truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the truth you now have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument.
    'Therefore' is natural modern English and preserves the logical connection.
- source_word: μελλήσω
  chosen: I will always be ready
  alternatives:
  - I intend
  - I am about to
  - I will make it my business
  lexicon: BDAG
  rationale: Future of μέλλω with complementary infinitive can express intention/readiness
    rather than mere futurity. In this context Peter is stating his ongoing resolve
    to keep reminding them, so 'I will always be ready' captures the volitional nuance
    better than a bare 'I will' or the misleadingly immediate 'I am about to'.
- source_word: ἀεὶ
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Adverb of continual/repeated action. 'Always' is the most direct and
    idiomatic rendering.
- source_word: ὑπομιμνῄσκειν
  chosen: to remind
  alternatives:
  - to keep reminding
  - to call to mind
  lexicon: BDAG
  rationale: The verb means to remind or cause someone to remember. English 'remind'
    is sufficient; the durative sense is already supported by ἀεί and the broader
    context.
- source_word: περὶ τούτων
  chosen: about these things
  alternatives:
  - concerning these things
  - of these things
  lexicon: BDAG
  rationale: περί with genitive here means 'about/concerning.' 'About these things'
    is clear modern English.
- source_word: καίπερ
  chosen: even though
  alternatives:
  - although
  - though indeed
  lexicon: BDAG
  rationale: Concessive conjunction. 'Even though' clearly marks the concessive force
    in contemporary English.
- source_word: εἰδότας
  chosen: you know them
  alternatives:
  - you know
  - you are aware of them
  lexicon: BDAG
  rationale: Perfect participle from οἶδα functioning with ὑμᾶς as the understood
    object of the infinitive clause. Since the knowledge concerns 'these things,'
    supplying 'them' in English makes the sense explicit and natural.
- source_word: ἐστηριγμένους
  chosen: have been established
  alternatives:
  - have been strengthened
  - have been firmly grounded
  - have been confirmed
  lexicon: BDAG
  rationale: Perfect passive participle of στηρίζω conveys a settled state resulting
    from prior strengthening/establishing. 'Have been established' preserves both
    the passive and the enduring-result nuance without overinterpreting.
- source_word: ἐν τῇ παρούσῃ ἀληθείᾳ
  chosen: in the present truth
  alternatives:
  - in the truth you now have
  - in the truth present with you
  lexicon: BDAG
  rationale: παρούσῃ literally means 'present' or 'at hand.' The phrase likely refers
    to the truth currently available to or possessed by the readers. 'In the present
    truth' is formally close to the Greek and preserves the slightly unusual but meaningful
    expression.
