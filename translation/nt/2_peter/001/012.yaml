theological_decisions:
- issue: Meaning of 'the present truth'
  chosen_reading: Rendered as 'the present truth' without expanding it into a technical
    doctrinal phrase.
  alternative_readings:
  - the truth you now have
  - the truth presently among you
  rationale: The Greek does not specify a special dispensational or epochal sense;
    it most naturally refers to the truth currently known and held by the readers.
    The translation preserves the phrase's wording and leaves interpretation open
    rather than importing a system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
