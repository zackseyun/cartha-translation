theological_decisions:
- issue: Meaning of 'make your calling and election sure'
  chosen_reading: An exhortation to confirm or demonstrate the reality of God's call
    and choice in one's life through persevering virtue, not to cause God's calling/election
    to come into existence.
  alternative_readings:
  - An exhortation to secure one's status by human effort in a way that determines
    God's election
  rationale: The syntax uses ποιεῖσθαι with βεβαίαν to speak of making firm/confirming.
    In context (vv. 5–9, 11), Peter urges moral earnestness as evidence and stabilization
    of one's calling, while the nouns 'calling' and 'election' remain grounded in
    God's prior action. The translation 'make ... sure' preserves the text's tension
    without importing a specific Reformed or Arminian framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of 'you will certainly never stumble'
  chosen_reading: A promise of preservation from stumbling/falling in the course of
    faithful Christian living, not an absolute claim of sinless perfection.
  alternative_readings:
  - A guarantee of never committing any sin
  - A guarantee specifically of never finally falling away
  rationale: πταίω commonly denotes stumbling, and the metaphor fits the paraenetic
    context. The wording should not be sharpened into either perfectionism or a narrowly
    systematized doctrine of perseverance beyond what the verse itself states.
  doctrine_reference: Within historic orthodoxy, do not advocate a denominational
    distinctive unless the Greek unambiguously supports it.
