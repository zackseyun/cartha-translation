theological_decisions:
- issue: Rendering the virtue chain's elliptical syntax
  chosen_reading: Preserve the compressed list structure rather than expanding it
    into a full paraphrase.
  alternative_readings:
  - and with knowledge, self-control; and with self-control, steadfastness; and with
    steadfastness, godliness
  - in your knowledge, show self-control; in your self-control, steadfastness; in
    your steadfastness, godliness
  rationale: The Greek continues the virtue-addition pattern from the previous verse
    and is syntactically compressed. Preserving that compression respects the source
    text and avoids importing interpretive expansion beyond what the Greek explicitly
    states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition; Never paraphrase beyond what the source text
    warrants.'
