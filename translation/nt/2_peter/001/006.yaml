id: 2PE.1.6
reference: 2 Peter 1:6
source:
  edition: SBLGNT
  text: ἐν δὲ τῇ γνώσει τὴν ἐγκράτειαν, ἐν δὲ τῇ ἐγκρατείᾳ τὴν ὑπομονήν, ἐν δὲ τῇ
    ὑπομονῇ τὴν εὐσέβειαν,
translation:
  text: and in knowledge, self-control; and in self-control, steadfastness; and in
    steadfastness, godliness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'endurance,' 'perseverance,' or 'patient endurance' for 'steadfastness'
      (ὑπομονή).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek is elliptical, continuing the virtue chain from the previous
      verse: one quality is to be supplied with the next.'
    reason: cross_reference
lexical_decisions:
- source_word: γνώσει
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: γνῶσις commonly denotes knowledge. In this virtue list, 'knowledge' is
    the most direct and consistent rendering, matching the preceding structure of
    supplying one virtue with another.
- source_word: ἐγκράτειαν / ἐγκρατείᾳ
  chosen: self-control
  alternatives:
  - temperance
  - self-mastery
  lexicon: BDAG
  rationale: ἐγκράτεια refers to mastery over one's desires or impulses. 'Self-control'
    is clear modern English and preserves the ethical sense better than the more archaic
    'temperance.'
- source_word: ὑπομονήν / ὑπομονῇ
  chosen: steadfastness
  alternatives:
  - endurance
  - perseverance
  - patient endurance
  lexicon: BDAG
  rationale: ὑπομονή denotes remaining under difficulty with constancy. 'Steadfastness'
    fits the virtue-list context well and avoids narrowing the term merely to passive
    patience, while remaining readable.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: εὐσέβεια in this context refers to reverent devotion expressed in life
    before God. 'Godliness' is the standard and most natural English equivalent in
    NT virtue contexts.
- source_word: ἐν δὲ τῇ ... τὴν ...
  chosen: and in ..., ...
  alternatives:
  - and with ..., ...
  - and to ..., add ...
  lexicon: BDAG
  rationale: The repeated prepositional construction is elliptical, continuing the
    syntax from the previous verse's exhortation to supply one virtue with another.
    Rendering it as 'and in ..., ...' preserves the Greek structure closely while
    remaining intelligible in English.
- source_word: δέ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ links items in a sequence rather than marking strong contrast.
    'And' best reflects the additive flow of the virtue chain.
