theological_decisions:
- issue: Meaning of the clause ἰδίας ἐπιλύσεως οὐ γίνεται
  chosen_reading: The verse speaks of prophecy not arising from one's own interpretation/explanation,
    with wording left broad enough to preserve the ambiguity between the prophet's
    own disclosure and the reader's private interpretation.
  alternative_readings:
  - no prophecy of Scripture is a matter of private interpretation
  - no prophecy of Scripture comes from the prophet's own interpretation
  - no prophecy of Scripture is of one's own explanation
  rationale: This clause is famously disputed. The immediate context in v.21 emphasizes
    prophecy's divine origin rather than merely rules for readers, so the translation
    should not lock the verse into a purely reader-centered meaning. At the same time,
    the traditional 'private interpretation' reading is historically important and
    lexically possible. 'Does not come about from one's own interpretation' preserves
    the origin-oriented force of γίνεται while keeping the object of ἰδίας open enough
    to reflect the Greek's ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
