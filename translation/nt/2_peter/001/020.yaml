id: 2PE.1.20
reference: 2 Peter 1:20
source:
  edition: SBLGNT
  text: τοῦτο πρῶτον γινώσκοντες ὅτι πᾶσα προφητεία γραφῆς ἰδίας ἐπιλύσεως οὐ γίνεται,
translation:
  text: 'knowing this first: that every prophecy of Scripture does not come about
    from one''s own interpretation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no prophecy of Scripture is a matter of private interpretation.' The
      Greek can be understood either as referring to the prophecy's origin/explanation
      or to how it is interpreted.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο πρῶτον γινώσκοντες
  chosen: knowing this first
  alternatives:
  - understanding this first
  - first of all know this
  lexicon: BDAG
  rationale: Participial construction introducing a foundational point. 'Knowing this
    first' preserves the participle and the priority sense of πρῶτον in natural English.
- source_word: πᾶσα προφητεία γραφῆς
  chosen: every prophecy of Scripture
  alternatives:
  - all prophecy of Scripture
  - every scriptural prophecy
  lexicon: BDAG
  rationale: πᾶσα with singular noun is naturally rendered 'every.' γραφῆς is best
    taken as a genitive qualifying prophecy as belonging to Scripture, not merely
    prophecy in general.
- source_word: ἰδίας
  chosen: one's own
  alternatives:
  - its own
  - private
  lexicon: BDAG
  rationale: ἰδίας denotes what is one's own or private. Because the referent is debated,
    'one's own' keeps the expression somewhat open while avoiding the traditional
    but potentially misleading shorthand 'private' in the main text.
- source_word: ἐπιλύσεως
  chosen: interpretation
  alternatives:
  - explanation
  - unloosing
  lexicon: BDAG
  rationale: In this context ἐπίλυσις most plausibly refers to interpretation/explanation.
    'Interpretation' is the standard and clearest English equivalent, though the exact
    subject of that interpretation is debated.
- source_word: οὐ γίνεται
  chosen: does not come about
  alternatives:
  - is not
  - does not arise
  - does not happen
  lexicon: BDAG
  rationale: γίνεται often carries the sense of coming into being or arising. 'Does
    not come about' preserves that verbal nuance better than a flat copula ('is not')
    and avoids prematurely deciding whether Peter means origin or status.
