id: 2PE.1.1
reference: 2 Peter 1:1
source:
  edition: SBLGNT
  text: ⸀Συμεὼν Πέτρος δοῦλος καὶ ἀπόστολος Ἰησοῦ Χριστοῦ τοῖς ἰσότιμον ἡμῖν λαχοῦσιν
    πίστιν ἐν δικαιοσύνῃ τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ·
translation:
  text: 'Simeon Peter, a servant and apostle of Jesus Messiah, to those who have obtained
    a faith as precious as ours in the righteousness of our God and Savior Jesus Messiah:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a faith of equal standing with ours.' The adjective can emphasize equal
      value, honor, or privilege.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the righteousness' or 'by the righteousness.' The preposition
      may express sphere or means.
    reason: lexical_alternative
  - marker: c
    text: The Greek most naturally reads 'our God and Savior Jesus Messiah' as one
      referent, identifying Jesus as both God and Savior. A less likely alternative
      is 'our God and the Savior Jesus Messiah,' referring to two persons.
    reason: alternative_reading
  - marker: d
    text: Or 'equally precious with ours'.
    reason: previous_rendering
lexical_decisions:
- source_word: Συμεὼν Πέτρος
  chosen: Simeon Peter
  alternatives:
  - Simon Peter
  lexicon: BDAG
  rationale: The Greek reads Συμεών, not Σίμων. 'Simeon' more directly reflects the
    form in the source text, while 'Peter' is the standard transliteration of Πέτρος.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per translation philosophy, δοῦλος is rendered 'slave' where the bonded
    nature is theologically salient. In an apostolic self-designation paired with
    'apostle,' the term emphasizes total belonging to Jesus Messiah rather than mere
    service.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: '''Apostle'' is the established and precise rendering for the commissioned
    office indicated here; alternatives are possible semantically but too weak for
    this context.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστός is a title meaning 'Messiah.' Per doctrine guidance, titles are
    translated where context supports it. Here the title remains semantically alive,
    not merely name-like.
- source_word: τοῖς ... λαχοῦσιν
  chosen: to those who have obtained
  alternatives:
  - to those who have received
  - to those who have been allotted
  lexicon: BDAG
  rationale: λαγχάνω can denote receiving by lot or obtaining/being assigned. 'Have
    obtained' preserves the sense of receiving rather than achieving, without over-literalizing
    the lot imagery.
- source_word: ἰσότιμον ... πίστιν
  chosen: a faith equally precious with ours
  alternatives:
  - a faith of equal standing with ours
  - an equally honored faith with ours
  lexicon: BDAG
  rationale: ἰσότιμος denotes equal value, privilege, or honor. 'Equally precious'
    communicates parity with the apostles' faith in idiomatic English, though 'equal
    standing' is also viable.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this context it refers to the believers' shared faith rather than Christ's faithfulness.
- source_word: ἐν δικαιοσύνῃ
  chosen: in the righteousness
  alternatives:
  - through the righteousness
  - by the righteousness
  lexicon: BDAG
  rationale: ἐν with the dative can be rendered in several ways depending on nuance.
    'In the righteousness' is formally close and leaves the exact instrumental/spheric
    nuance appropriately open.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text. 'Justice' is a legitimate alternative but less natural in this Petrine
    context.
- source_word: τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ
  chosen: of our God and Savior Jesus Messiah
  alternatives:
  - of God and of our Savior Jesus Messiah
  lexicon: BDAG
  rationale: The single article governing θεοῦ and σωτῆρος naturally yields a unified
    reference ('our God and Savior, Jesus Messiah'), consistent with standard Greek
    syntax. The alternative two-person reading is less likely grammatically and should
    be preserved in a footnote due to theological significance.
