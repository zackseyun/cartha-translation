theological_decisions:
- issue: Whether 'our God and Savior Jesus Messiah' refers to one person (Jesus) or
    two (the Father and Jesus)
  chosen_reading: 'One person: Jesus is called ''our God and Savior.'''
  alternative_readings:
  - 'Two persons: ''our God'' and ''the Savior Jesus Messiah'''
  rationale: The construction τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ uses one article
    with two singular personal nouns joined by καί, strongly favoring a single referent
    in Koine Greek. This reading is also coherent in the immediate literary context
    of 2 Peter. Because the phrase is christologically significant and sometimes disputed,
    the alternative is preserved in a footnote rather than ignored.
  doctrine_reference: 'Affirmations (Nicene Creed; Chalcedon); Translation philosophy
    #3'
