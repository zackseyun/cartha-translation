theological_decisions:
- issue: Metaphor for Peter's impending death
  chosen_reading: Retain the bodily metaphor 'the putting off of my tent' rather than interpret directly as 'my death' or 'my departure.'
  alternative_readings:
  - my departure is soon
  - I will soon die
  rationale: The Greek uses a vivid metaphor for bodily life as a temporary tent. Preserving the metaphor maintains the text's imagery and theological texture while still allowing readers to infer the meaning from context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering Χριστός in the title Ἰησοῦς Χριστός
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The doctrine default is to translate Christological titles and use 'Messiah' where context supports title force. Here the phrase still functions as a meaningful title, not merely a surname-like fixed label.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
revisions:
- timestamp: '2026-04-21T02:17:50Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_peter/001/014.json
  category: awkward_english
  tier: 1
  from: is soon
  to: is near
  rationale: The Greek predicate adjective 'ταχινή' (swift, quick) is rendered as 'soon'. While the meaning is correct, the English construction 'the putting off... is soon' is slightly awkward. A more natural and idiomatic phrasing in this context would be 'is near' or 'is at hand', which fits the formal register of a Bible translation better without altering the core meaning.
