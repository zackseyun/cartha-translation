id: 2PE.1.14
reference: 2 Peter 1:14
source:
  edition: SBLGNT
  text: εἰδὼς ὅτι ταχινή ἐστιν ἡ ἀπόθεσις τοῦ σκηνώματός μου, καθὼς καὶ ὁ κύριος ἡμῶν Ἰησοῦς Χριστὸς ἐδήλωσέν μοι·
translation:
  text: knowing that the putting off of my tent is near, just as our Lord Jesus Messiah made clear to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the removal of my tent'; that is, Peter speaks of his coming death with the metaphor of laying aside a temporary dwelling.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός is treated as a title.
    reason: alternative_reading
  - marker: c
    text: Or 'is soon'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since I know
  - because I know
  lexicon: BDAG
  rationale: A participial form best carried by the English participle 'knowing,' preserving the connection to the previous verse without over-interpreting it as explicitly causal.
- source_word: ταχινή
  chosen: soon
  alternatives:
  - swift
  - imminent
  lexicon: BDAG
  rationale: The adjective describes nearness/quickness of the event. 'Soon' is natural modern English and fits the predicate construction better than the more wooden 'swift.' 'Imminent' is interpretive and slightly stronger.
- source_word: ἀπόθεσις
  chosen: putting off
  alternatives:
  - removal
  - laying aside
  - departure
  lexicon: BDAG
  rationale: The noun literally denotes a putting off or laying aside. 'Putting off' preserves the metaphor and avoids prematurely interpreting it simply as 'death' or 'departure.'
- source_word: σκηνώματός
  chosen: tent
  alternatives:
  - tabernacle
  - dwelling
  - body
  lexicon: BDAG
  rationale: The term literally refers to a tent or temporary dwelling. 'Tent' preserves Peter's bodily metaphor in accessible English. 'Body' captures the referent but loses the image; 'tabernacle' is too traditional and potentially misleading in modern English.
- source_word: καθὼς καὶ
  chosen: just as
  alternatives:
  - even as
  - as also
  lexicon: BDAG
  rationale: This idiomatic combination introduces comparison/corroboration. 'Just as' is clear and natural.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This is the standard title here and fits both NT usage and Christological context.
- source_word: Ἰησοῦς Χριστὸς
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where it functions as a title rather than a fixed name-like form. In this context the full designation remains titular enough to preserve the meaning 'Messiah.'
- source_word: ἐδήλωσέν
  chosen: made clear
  alternatives:
  - showed
  - revealed
  - made known
  lexicon: BDAG
  rationale: The verb means to make something clear or known. 'Made clear' is idiomatic and reflects the explanatory force without overstating it as a formal revelation term.
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: Standard dative of indirect object.
