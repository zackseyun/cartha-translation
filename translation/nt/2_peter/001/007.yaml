id: 2PE.1.7
reference: 2 Peter 1:7
source:
  edition: SBLGNT
  text: ἐν δὲ τῇ εὐσεβείᾳ τὴν φιλαδελφίαν, ἐν δὲ τῇ φιλαδελφίᾳ τὴν ἀγάπην·
translation:
  text: and in godliness, brotherly affection; and in brotherly affection, love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brotherly love.' The Greek term φιλαδελφία refers to affectionate love
      for brothers, especially fellow believers.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσεβείᾳ
  chosen: godliness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: εὐσέβεια denotes reverent devotion expressed in life and conduct. 'Godliness'
    is the established and still understandable English equivalent that preserves
    both the God-directed and ethical dimensions better than the narrower 'piety.'
- source_word: φιλαδελφίαν
  chosen: brotherly affection
  alternatives:
  - brotherly love
  - familial affection among believers
  lexicon: BDAG
  rationale: φιλαδελφία literally refers to love/affection for brothers and in Christian
    usage commonly denotes affectionate regard among fellow believers. 'Brotherly
    affection' avoids using 'love' here so that the distinction from the following
    ἀγάπη remains visible in English.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - self-giving love
  lexicon: BDAG
  rationale: Per the project's default rendering, ἀγάπη is translated 'love.' Here
    it climactically follows φιλαδελφία, so a simple 'love' preserves the lexical
    link and the broader scope of the term without over-interpreting it.
- source_word: ἐν δὲ τῇ ... τὴν ...
  chosen: and in ..., ...
  alternatives:
  - with ..., ...
  - by means of ..., ...
  lexicon: BDAG
  rationale: This verse continues the virtue-chain from the previous verse, with ἐν
    marking the sphere or element in which the next virtue is to be supplied. Rendering
    it as 'and in ...' preserves the repeated structure and linkage without adding
    explanatory words not present in the Greek.
- source_word: δέ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And'
    best fits the cumulative list structure in English.
