theological_decisions:
- issue: Distinguishing φιλαδελφία from ἀγάπη in the virtue sequence
  chosen_reading: Render φιλαδελφία as 'brotherly affection' and ἀγάπη as 'love'
  alternative_readings:
  - Render φιλαδελφία as 'brotherly love' and ἀγάπη as 'love'
  rationale: The Greek intentionally uses two related but distinct terms in sequence.
    Using 'brotherly affection' for φιλαδελφία preserves the semantic distinction
    and the rhetorical progression from affection for fellow believers to the broader
    virtue of love.
