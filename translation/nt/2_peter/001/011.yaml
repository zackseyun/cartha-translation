theological_decisions:
- issue: Reference of 'our Lord and Savior'
  chosen_reading: Both titles refer to one person, Jesus Messiah.
  alternative_readings:
  - The titles could be read more loosely, though the grammar strongly favors a single
    referent.
  rationale: The construction τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ uses a single
    article governing two singular personal nouns connected by καί, a pattern that
    strongly indicates one referent. This supports a high christological reading already
    consistent with orthodox doctrine, but the decision is grounded in Greek syntax
    rather than imported theology.
