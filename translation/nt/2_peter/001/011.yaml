id: 2PE.1.11
reference: 2 Peter 1:11
source:
  edition: SBLGNT
  text: οὕτως γὰρ πλουσίως ἐπιχορηγηθήσεται ὑμῖν ἡ εἴσοδος εἰς τὴν αἰώνιον βασιλείαν
    τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ.
translation:
  text: For in this way entry into the eternal kingdom of our Lord and Savior Jesus
    Messiah will be richly provided for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'entrance.' The Greek εἴσοδος can denote entry or entrance.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστοῦ is translated
      here as ''Messiah'' to preserve its meaning.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Links this verse back to the manner of life described in the preceding
    context. 'In this way' is natural English and preserves the demonstrative force
    better than a bare 'thus' for modern readers.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous statement. 'For' is
    concise and standard for γάρ in this discourse function.
- source_word: πλουσίως
  chosen: richly
  alternatives:
  - abundantly
  - generously
  lexicon: BDAG
  rationale: Captures the adverb's sense of abundance without overparaphrasing. 'Richly
    provided' is idiomatic in English and reflects the lavish nuance.
- source_word: ἐπιχορηγηθήσεται
  chosen: will be provided
  alternatives:
  - will be supplied
  - will be granted
  lexicon: BDAG
  rationale: The future passive indicates that the entrance is supplied or furnished
    to the readers. 'Provided' works well with πλουσίως and avoids an overly wooden
    rendering while preserving the passive voice.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: With 'provided,' English idiom prefers 'for you.' This still reflects
    the dative of advantage without changing the sense.
- source_word: ἡ εἴσοδος
  chosen: entry
  alternatives:
  - entrance
  lexicon: BDAG
  rationale: Both are possible, but 'entry' is slightly more natural in this clause
    and can denote both the act and the granted access. The article is not separately
    represented because English idiom does not require 'the' before 'entry into' here.
- source_word: εἰς τὴν αἰώνιον βασιλείαν
  chosen: into the eternal kingdom
  alternatives:
  - into the everlasting kingdom
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'Eternal' is
    the standard gloss for αἰώνιος in this eschatological context.
- source_word: τοῦ κυρίου ἡμῶν καὶ σωτῆρος
  chosen: of our Lord and Savior
  alternatives:
  - of our Lord and deliverer
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord.' σωτήρ is best rendered
    'Savior' in this christological context. The single article with two singular
    personal nouns joined by καί naturally presents both titles as referring to the
    same person.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per translation philosophy, Χριστός is translated as 'Messiah' where
    it functions as a title rather than left as the traditional transliteration 'Christ.'
    Here the phrase remains clearly titular and christological.
