id: 2PE.1.21
reference: 2 Peter 1:21
source:
  edition: SBLGNT
  text: οὐ γὰρ θελήματι ἀνθρώπου ἠνέχθη ⸂προφητεία ποτέ⸃, ἀλλὰ ὑπὸ πνεύματος ἁγίου
    φερόμενοι ἐλάλησαν ⸀ἀπὸ θεοῦ ἄνθρωποι.
translation:
  text: For prophecy was never brought forth by the will of man, but men spoke from
    God as they were carried along by the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was produced' for 'was brought forth'; the Greek verb is passive and
      related to the participle later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'being moved by the Holy Spirit.' The Greek more literally says 'being
      carried along,' emphasizing the Spirit's active guidance.
    reason: lexical_alternative
  - marker: c
    text: '''Man'' and ''men'' render Greek ἄνθρωπος/ἄνθρωποι in a representative
      human sense, not to exclude women where the context is generic.'
    reason: cultural_note
lexical_decisions:
- source_word: θελήματι ἀνθρώπου
  chosen: by the will of man
  alternatives:
  - by human will
  - by the will of a human being
  lexicon: BDAG
  rationale: 'The dative with passive verb is instrumental: prophecy did not originate
    through human volition. ''Man'' preserves the singular generic ἀνθρώπου in line
    with the gender-accurate policy; ''human will'' is possible but less formally
    tied to the Greek wording.'
- source_word: ἠνέχθη
  chosen: was brought forth
  alternatives:
  - was produced
  - came
  lexicon: BDAG
  rationale: Aorist passive of φέρω, matching the later participle φερόμενοι. 'Was
    brought forth' preserves the passive sense and the idea of origination without
    overinterpreting. 'Produced' is possible but slightly more idiomatic than the
    Greek; 'came' is too weak.
- source_word: προφητεία
  chosen: prophecy
  alternatives:
  - prophetic message
  - prophetic utterance
  lexicon: BDAG
  rationale: '''Prophecy'' is the standard and sufficiently clear rendering here,
    referring to prophetic revelation/utterance generally.'
- source_word: ποτέ
  chosen: never
  alternatives:
  - at no time
  - ever
  lexicon: BDAG
  rationale: With οὐ, ποτέ yields the emphatic sense 'never.' This is natural English
    and preserves the force of the denial.
- source_word: ὑπὸ πνεύματος ἁγίου
  chosen: by the Holy Spirit
  alternatives:
  - by Holy Spirit
  lexicon: BDAG
  rationale: ὑπό with genitive marks agency. The anarthrous Greek still refers to
    the definite Holy Spirit in this context; standard English idiom requires the
    article.
- source_word: φερόμενοι
  chosen: as they were carried along
  alternatives:
  - being carried along
  - moved
  lexicon: BDAG
  rationale: The participle from φέρω echoes ἠνέχθη and depicts divine impetus/guidance
    rather than mere inspiration in the abstract. 'Carried along' is more concrete
    and textually grounded than the traditional but less transparent 'moved.'
- source_word: ἐλάλησαν
  chosen: spoke
  alternatives:
  - spoke out
  - uttered
  lexicon: BDAG
  rationale: λαλέω is straightforwardly 'speak.' No need to heighten the diction.
- source_word: ἀπὸ θεοῦ
  chosen: from God
  alternatives:
  - by God
  - from the side of God
  lexicon: BDAG
  rationale: ἀπό indicates source/origin. 'From God' best preserves that nuance; 'by
    God' would blur the distinction from the Spirit's agency already expressed with
    ὑπό.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: The plural noun refers to human speakers, and 'men' preserves the Greek
    form and the contrast with God/Spirit. It is not necessarily male-exclusive in
    abstraction, but the source is grammatically masculine and representative; this
    follows the gender-accurate policy.
