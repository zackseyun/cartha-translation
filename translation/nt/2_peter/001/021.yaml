theological_decisions:
- issue: Relation of divine and human agency in prophecy
  chosen_reading: The verse states that prophecy did not originate in human will,
    but that human speakers spoke from God while being carried along by the Holy Spirit.
  alternative_readings:
  - Prophecy was merely dictated mechanically by the Spirit
  - Prophecy arose partly from human initiative and partly from divine influence
  rationale: The Greek preserves both real human speech ('men spoke') and decisive
    divine source/agency ('from God,' 'carried along by the Holy Spirit'). The translation
    should not collapse this tension into either mechanical dictation or autonomous
    human origination.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
