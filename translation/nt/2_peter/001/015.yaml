id: 2PE.1.15
reference: 2 Peter 1:15
source:
  edition: SBLGNT
  text: σπουδάσω δὲ καὶ ἑκάστοτε ἔχειν ὑμᾶς μετὰ τὴν ἐμὴν ἔξοδον τὴν τούτων μνήμην
    ποιεῖσθαι.
translation:
  text: And I will make every effort so that, after my departure, you may be able
    at any time to recall these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'after my death.' The Greek says 'after my departure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπουδάσω
  chosen: I will make every effort
  alternatives:
  - I will be diligent
  - I will strive
  lexicon: BDAG
  rationale: Future of σπουδάζω conveys earnest effort or diligence. 'Make every effort'
    is idiomatic modern English that preserves the intensity better than the less
    natural 'be diligent' in this construction.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks continuation rather than strong contrast. 'And' best fits
    the flow from the previous verse.
- source_word: καὶ
  chosen: so that
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: In combination with the infinitival construction, καί contributes to
    the sense that Peter's effort has a further aim. This is brought out idiomatically
    in English by 'so that' rather than a wooden 'and also'.
- source_word: ἑκάστοτε
  chosen: at any time
  alternatives:
  - always
  - each time
  lexicon: BDAG
  rationale: 'ἑκάστοτε denotes on each occasion / whenever needed. ''At any time''
    communicates the practical sense in context: ongoing ability to remember after
    Peter''s death.'
- source_word: ἔχειν ὑμᾶς
  chosen: you may be able
  alternatives:
  - you may have
  - for you to have
  lexicon: BDAG
  rationale: The idiom ἔχειν + infinitive can express ability or opportunity. Rendering
    it woodenly as 'have you to recall' is unnatural; 'you may be able' captures the
    Greek sense in clear English.
- source_word: μετὰ τὴν ἐμὴν ἔξοδον
  chosen: after my departure
  alternatives:
  - after my death
  - after my exodus
  lexicon: BDAG
  rationale: ἔξοδος literally means 'departure' or 'exit' and here is a reverent way
    of referring to Peter's impending death. 'Departure' preserves the metaphor without
    over-interpreting; 'death' is interpretive, while 'exodus' is too opaque in English
    main text.
- source_word: τὴν τούτων μνήμην ποιεῖσθαι
  chosen: to recall these things
  alternatives:
  - to remember these things
  - to make remembrance of these things
  lexicon: BDAG
  rationale: The phrase μνήμην ποιεῖσθαι is an idiom meaning to remember or call to
    mind. 'Recall these things' is natural English and retains the active sense of
    bringing them to mind.
- source_word: τούτων
  chosen: these things
  alternatives:
  - these matters
  lexicon: BDAG
  rationale: τούτων refers back to the truths Peter has been emphasizing in the immediate
    context. 'These things' is the most direct and transparent rendering.
