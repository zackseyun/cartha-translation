theological_decisions:
- issue: Meaning of ἔξοδος in reference to Peter's impending end
  chosen_reading: departure
  alternative_readings:
  - death
  - exodus
  rationale: The verse uses a metaphorical term for Peter's coming death. Following
    optimal equivalence, the main text preserves the metaphor with 'departure' while
    a footnote can note the more explicit sense 'death.' This avoids importing extra
    theological nuance while remaining clear.
  doctrine_reference: Translation philosophy §1, §3, §6
