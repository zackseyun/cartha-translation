theological_decisions:
- issue: Reference of 'the holy mountain'
  chosen_reading: A descriptive reference to the mountain of Jesus' transfiguration,
    without identifying a specific mountain in the translation.
  alternative_readings:
  - An explicit identification with Mount Tabor
  - An explicit identification with Mount Hermon
  rationale: The Greek text calls it 'the holy mountain' but does not name it. The
    translation preserves the wording without importing a traditional identification
    not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
