id: 2PE.1.18
reference: 2 Peter 1:18
source:
  edition: SBLGNT
  text: καὶ ταύτην τὴν φωνὴν ἡμεῖς ἠκούσαμεν ἐξ οὐρανοῦ ἐνεχθεῖσαν σὺν αὐτῷ ὄντες
    ἐν τῷ ⸂ἁγίῳ ὄρει⸃.
translation:
  text: And we ourselves heard this voice brought from heaven when we were with him
    on the holy mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'borne from heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην τὴν φωνὴν
  chosen: this voice
  alternatives:
  - this sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' in contexts of speech; here it refers back
    to the divine utterance of the previous verse, so 'voice' is more precise than
    the broader 'sound'.
- source_word: ἡμεῖς
  chosen: we ourselves
  alternatives:
  - we
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for the verb's person/number and
    therefore adds emphasis. 'We ourselves' preserves the emphatic force and eyewitness
    stress.
- source_word: ἠκούσαμεν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω here denotes the event of hearing the
    heavenly voice, not the ongoing act of listening.
- source_word: ἐξ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the prepositional phrase; 'from heaven'
    is natural English and preserves the source sense.
- source_word: ἐνεχθεῖσαν
  chosen: brought
  alternatives:
  - borne
  - carried
  lexicon: BDAG
  rationale: Aorist passive participle of φέρω, modifying 'voice.' 'Brought' is clear
    modern English and preserves the passive sense that the voice was conveyed from
    heaven. 'Borne' is more traditional but less natural for contemporary readers.
- source_word: σὺν αὐτῷ ὄντες
  chosen: when we were with him
  alternatives:
  - being with him
  - while we were with him
  lexicon: BDAG
  rationale: The participial construction is most naturally rendered temporally in
    English. 'With him' refers to Jesus in context, and 'when we were with him' reads
    smoothly while preserving the relation.
- source_word: ἐν τῷ ἁγίῳ ὄρει
  chosen: on the holy mountain
  alternatives:
  - on the sacred mountain
  - in the holy mountain
  lexicon: BDAG
  rationale: For ὄρος, English idiom uses 'on' rather than a wooden 'in.' ἅγιος is
    best rendered 'holy' here, echoing biblical diction and the mountain's sanctified
    significance in the transfiguration event.
