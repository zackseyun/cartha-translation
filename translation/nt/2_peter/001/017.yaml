id: 2PE.1.17
reference: 2 Peter 1:17
source:
  edition: SBLGNT
  text: λαβὼν γὰρ παρὰ θεοῦ πατρὸς τιμὴν καὶ δόξαν φωνῆς ἐνεχθείσης αὐτῷ τοιᾶσδε ὑπὸ
    τῆς μεγαλοπρεποῦς δόξης· ⸂Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν⸃, εἰς ὃν ἐγὼ εὐδόκησα—
translation:
  text: 'For when he received honor and glory from God the Father, a voice like this
    was borne to him from the Majestic Glory: “This is my Son, my Beloved, in whom
    I am well pleased”—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by the Majestic Glory.” The Greek ὑπό can mark agency; the translation
      “from” brings out the voice’s source in more natural English.
    reason: lexical_alternative
  - marker: b
    text: Or “This is my beloved Son.” The Greek more literally has “This is my Son,
      my Beloved.”
    reason: lexical_alternative
  - marker: c
    text: Or “with whom I am well pleased” or “in whom I took delight.” The Greek
      reads literally “into whom I delighted,” an idiom echoed in the Gospel accounts
      of Jesus’ baptism and transfiguration.
    reason: alternative_reading
lexical_decisions:
- source_word: λαβὼν
  chosen: when he received
  alternatives:
  - having received
  - after receiving
  lexicon: BDAG
  rationale: Aorist participle modifying the implied subject (Jesus in context). 'When
    he received' gives natural English temporal force while preserving the participial
    relation.
- source_word: παρὰ θεοῦ πατρὸς
  chosen: from God the Father
  alternatives:
  - from God, the Father
  - from Father God
  lexicon: BDAG
  rationale: παρά with genitive indicates source. 'God the Father' is standard, clear
    English and preserves both nouns without overpunctuation.
- source_word: τιμὴν καὶ δόξαν
  chosen: honor and glory
  alternatives:
  - honor and splendor
  lexicon: BDAG
  rationale: Both nouns are significant and should be retained distinctly. 'Honor
    and glory' is the most direct and idiomatic rendering.
- source_word: φωνῆς ἐνεχθείσης αὐτῷ
  chosen: a voice ... was borne to him
  alternatives:
  - a voice ... was brought to him
  - a voice came to him
  lexicon: BDAG
  rationale: The genitive absolute is rendered as a finite clause in English. ἐνεχθείσης
    from φέρω literally means 'having been borne/brought'; 'was borne to him' preserves
    the elevated passive better than the flatter 'came to him'.
- source_word: τοιᾶσδε
  chosen: like this
  alternatives:
  - such as this
  - of this kind
  lexicon: BDAG
  rationale: Demonstrative adjective referring forward to the quoted words. 'Like
    this' is natural modern English while preserving the cataphoric sense.
- source_word: ὑπὸ τῆς μεγαλοπρεποῦς δόξης
  chosen: from the Majestic Glory
  alternatives:
  - by the Majestic Glory
  - from the magnificent glory
  lexicon: BDAG
  rationale: Although ὑπό commonly marks agency ('by'), in English 'from the Majestic
    Glory' better conveys the heavenly source of the voice and avoids awkwardness.
    'Majestic Glory' preserves the reverential, almost circumlocutory expression for
    God’s glorious presence.
- source_word: Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν
  chosen: This is my Son, my Beloved
  alternatives:
  - This is my beloved Son
  - This is my Son, whom I love
  lexicon: BDAG
  rationale: The Greek places 'my Son' and 'my beloved' in apposition with emphasis.
    'My Beloved' preserves the adjectival force of ἀγαπητός and the repeated μου more
    transparently than collapsing to the traditional 'my beloved Son.'
- source_word: εἰς ὃν ἐγὼ εὐδόκησα
  chosen: in whom I am well pleased
  alternatives:
  - with whom I am well pleased
  - in whom I took delight
  lexicon: BDAG
  rationale: This clause echoes the Synoptic baptism/transfiguration wording. Although
    the aorist εὐδόκησα is formally past, idiomatic English in this divine declaration
    is best rendered with the established present sense 'I am well pleased.' 'In whom'
    follows the Greek preposition εἰς more closely than 'with whom,' while remaining
    understandable.
