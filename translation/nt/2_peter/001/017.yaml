theological_decisions:
- issue: Rendering the divine circumlocution τῆς μεγαλοπρεποῦς δόξης
  chosen_reading: the Majestic Glory
  alternative_readings:
  - the magnificent glory
  - the divine Majesty
  rationale: The phrase likely reverentially refers to God without naming him directly.
    Capitalization signals this as a divine title/circumlocution while avoiding interpretive
    expansion beyond the Greek.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Quotation wording for the Father's declaration about the Son
  chosen_reading: This is my Son, my Beloved, in whom I am well pleased
  alternative_readings:
  - This is my beloved Son, with whom I am well pleased
  rationale: The chosen wording preserves the appositional structure and theological
    weight of the Father's affirmation without importing later doctrinal formulation.
    It remains fully consistent with orthodox Christology while staying close to the
    Greek.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
