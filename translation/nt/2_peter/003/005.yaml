theological_decisions:
- issue: Whether λόγῳ should be rendered in a way that suggests the personal Logos
  chosen_reading: by the word of God
  alternative_readings:
  - by God's command
  rationale: In this context λόγος refers to God's effective spoken word in creation,
    not explicitly to the preincarnate Son as a title. The translation preserves the
    phrase without adding christological specificity the verse itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
