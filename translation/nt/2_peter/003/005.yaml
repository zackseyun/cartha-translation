id: 2PE.3.5
reference: 2 Peter 3:5
source:
  edition: SBLGNT
  text: λανθάνει γὰρ αὐτοὺς τοῦτο θέλοντας ὅτι οὐρανοὶ ἦσαν ἔκπαλαι καὶ γῆ ἐξ ὕδατος
    καὶ δι’ ὕδατος συνεστῶσα τῷ τοῦ θεοῦ λόγῳ,
translation:
  text: 'For they deliberately overlook this: that heavens existed long ago, and an
    earth formed out of water and through water by the word of God,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For this escapes them willingly' or 'For they willingly ignore this.'
      The Greek expression combines being unaware with a willful disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth.' The Greek lacks the article, which may emphasize the earth
      as a created realm in the argument rather than as a proper name.
    reason: lexical_alternative
  - marker: c
    text: Or 'by God's command.' The phrase more literally reads 'by the word of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λανθάνει γὰρ αὐτοὺς τοῦτο θέλοντας
  chosen: For they deliberately overlook this
  alternatives:
  - For this escapes them willingly
  - For this is hidden from them because they want it to be
  - For they willingly ignore this
  lexicon: BDAG
  rationale: The idiom λανθάνει αὐτούς with the participle θέλοντας conveys not mere
    accidental ignorance but a willful failure to notice or acknowledge. 'Deliberately
    overlook' captures both the cognitive and volitional force in natural English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what they overlook; simple 'that' is sufficient
    and natural.
- source_word: οὐρανοὶ
  chosen: heavens
  alternatives:
  - heavens/skies
  - the heavens
  lexicon: BDAG
  rationale: Plural in Greek should be preserved. 'Heavens' reflects the Greek form
    better than singular 'heaven' and fits biblical cosmological language.
- source_word: ἔκπαλαι
  chosen: long ago
  alternatives:
  - from long ago
  - of old
  lexicon: BDAG
  rationale: '''Long ago'' is clear modern English and preserves the temporal sense
    without archaic tone.'
- source_word: γῆ
  chosen: an earth
  alternatives:
  - the earth
  - land
  lexicon: BDAG
  rationale: The noun lacks the article in Greek. 'An earth' best reflects the anarthrous
    form in this cosmological statement and avoids over-importing English convention,
    while still referring to the created world.
- source_word: ἐξ ὕδατος καὶ δι’ ὕδατος
  chosen: out of water and through water
  alternatives:
  - from water and by means of water
  - out of water and by water
  lexicon: BDAG
  rationale: Preserves the distinction between ἐκ ('out of') and διά ('through/by
    means of'). 'Through water' is slightly more literal and keeps the parallelism.
- source_word: συνεστῶσα
  chosen: formed
  alternatives:
  - having been established
  - consisting
  - held together
  lexicon: BDAG
  rationale: The participle describes the earth's coming-to-be/constitution in context.
    'Formed' fits the creation setting and reads naturally with the prepositional
    phrases.
- source_word: τῷ τοῦ θεοῦ λόγῳ
  chosen: by the word of God
  alternatives:
  - by God's word
  lexicon: BDAG
  rationale: Instrumental dative is well represented by 'by.' 'The word of God' preserves
    the formal phrasing and avoids reducing λόγος to a merely impersonal command while
    not importing Johannine overtones.
