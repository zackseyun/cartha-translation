id: 2PE.3.18
reference: 2 Peter 3:18
source:
  edition: SBLGNT
  text: αὐξάνετε δὲ ἐν χάριτι καὶ γνώσει τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ.
    αὐτῷ ἡ δόξα καὶ νῦν καὶ εἰς ἡμέραν αἰῶνος. ⸀ἀμήν.
translation:
  text: But grow in the grace and knowledge of our Lord and Savior Jesus Messiah.
    To him be the glory both now and to the day of eternity. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following traditional English usage, 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'now and forever.' The Greek more literally reads 'now and to the day
      of eternity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐξάνετε
  chosen: grow
  alternatives:
  - keep growing
  - increase
  lexicon: BDAG
  rationale: Present active imperative, second person plural. 'Grow' is the natural
    imperative in English and preserves the ongoing force without over-paraphrasing.
    'Keep growing' is possible but slightly more explicit than the Greek requires.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition from the preceding warnings and exhortations.
    'But' best preserves the adversative nuance in context.
- source_word: ἐν χάριτι καὶ γνώσει
  chosen: in the grace and knowledge
  alternatives:
  - in grace and knowledge
  lexicon: BDAG
  rationale: 'The preposition ἐν governs both datives. Adding ''the'' in English yields
    idiomatic expression while still reflecting the article-less Greek construction
    as a qualitative sphere: growth within grace and knowledge.'
- source_word: χάριτι
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Standard NT theological sense; 'grace' is both accurate and established
    without being misleading here.
- source_word: γνώσει
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: γνῶσις here denotes knowledge of Christ, not merely intellectual data
    but still properly rendered 'knowledge' rather than a more interpretive gloss.
- source_word: τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ
  chosen: of our Lord and Savior Jesus Messiah
  alternatives:
  - of our Lord and Savior Jesus Christ
  lexicon: BDAG
  rationale: The single article with κύριος and σωτήρ naturally refers to one person,
    Jesus. 'Lord' follows the doctrine default for κύριος. 'Savior' is the standard
    rendering of σωτήρ. Χριστοῦ is rendered 'Messiah' because it functions as a title
    and the translation philosophy prefers translating titles where context supports
    it.
- source_word: αὐτῷ ἡ δόξα
  chosen: To him be the glory
  alternatives:
  - to him belongs the glory
  - his is the glory
  lexicon: BDAG
  rationale: A doxological ascription with implied verb. 'To him be the glory' is
    idiomatic, reverent, and close to the Greek structure.
- source_word: καὶ νῦν καὶ εἰς ἡμέραν αἰῶνος
  chosen: both now and to the day of eternity
  alternatives:
  - now and forever
  - now and unto the eternal day
  - now and to the day of the age
  lexicon: BDAG
  rationale: This phrase is somewhat unusual. Retaining 'day' reflects ἡμέραν, and
    'of eternity' reflects the genitive αἰῶνος without flattening it into the more
    interpretive 'forever.' 'Both ... and ...' captures the correlative καὶ ... καὶ.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration preserved in English doxological contexts.
