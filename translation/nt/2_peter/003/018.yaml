theological_decisions:
- issue: Rendering Χριστοῦ in the name-title 'Ἰησοῦ Χριστοῦ'
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: Per translation philosophy, titles are translated rather than merely
    transliterated where context supports it. Here Χριστός still carries titular force
    in a christological confession and doxology, so 'Messiah' preserves meaning. The
    traditional 'Christ' remains understandable and is preserved as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Referent of 'our Lord and Savior'
  chosen_reading: Both titles refer to the one person, Jesus Messiah
  alternative_readings:
  - The phrase could be read less explicitly in English if one avoided the syntactic
    implication
  rationale: The Greek construction with a single article governing κύριος and σωτῆρος
    strongly indicates one referent. The translation reflects this straightforwardly
    without importing extra doctrinal content beyond the grammar.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
