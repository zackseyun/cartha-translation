id: 2PE.3.6
reference: 2 Peter 3:6
source:
  edition: SBLGNT
  text: δι’ ὧν ὁ τότε κόσμος ὕδατι κατακλυσθεὶς ἀπώλετο·
translation:
  text: through which the world of that time, having been flooded with water, perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by which"; the plural "which" refers back to the means mentioned in
      the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or "was destroyed."
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὧν
  chosen: through which
  alternatives:
  - by which
  - through these things
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality ('through,
    by means of'). The relative pronoun is plural, referring back to the antecedents
    in the previous verse (God's word and water, or the means just mentioned). 'Through
    which' preserves the plural and the somewhat open reference without over-specifying
    it.
- source_word: ὁ τότε κόσμος
  chosen: the world of that time
  alternatives:
  - the world then
  - the world of that day
  lexicon: BDAG
  rationale: κόσμος here refers not to the physical planet alone but the ordered world/human
    world as it existed in Noah's era. τότε marks temporal contrast with the present
    world in the surrounding context. 'The world of that time' is natural English
    and preserves the temporal distinction.
- source_word: ὕδατι
  chosen: with water
  alternatives:
  - by water
  - in water
  lexicon: BDAG
  rationale: The dative here expresses means/instrument in connection with κατακλυσθείς.
    'With water' is idiomatic in English for the means of flooding, while still reflecting
    the Greek dative.
- source_word: κατακλυσθεὶς
  chosen: having been flooded
  alternatives:
  - having been deluged
  - having been inundated
  - being flooded
  lexicon: BDAG
  rationale: The aorist passive participle from κατακλύζω denotes being overwhelmed
    by a flood/deluge. 'Having been flooded' preserves the participial relation to
    the main verb and avoids importing the noun 'flood' where the Greek uses a verb.
    'Deluged' is possible but less common in contemporary English.
- source_word: ἀπώλετο
  chosen: perished
  alternatives:
  - was destroyed
  - came to ruin
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/intransitive can mean 'perish' or 'be destroyed.'
    'Perished' keeps the intransitive force and avoids suggesting absolute annihilation;
    in context it refers to the destruction of the former world-order in the flood.
