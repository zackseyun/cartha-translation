theological_decisions:
- issue: Nature of the flood judgment
  chosen_reading: perished
  alternative_readings:
  - was destroyed
  rationale: The verse speaks of catastrophic judgment on the world of Noah's time,
    but the Greek verb does not require a metaphysical claim of annihilation. 'Perished'
    preserves the severity of judgment while avoiding overstatement beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
