id: 2PE.3.12
reference: 2 Peter 3:12
source:
  edition: SBLGNT
  text: προσδοκῶντας καὶ σπεύδοντας τὴν παρουσίαν τῆς τοῦ θεοῦ ἡμέρας, δι’ ἣν οὐρανοὶ
    πυρούμενοι λυθήσονται καὶ στοιχεῖα καυσούμενα τήκεται·
translation:
  text: as you wait for and hasten the coming of the day of God, because of which
    the heavens, being set on fire, will be dissolved, and the elements, burning,
    are melted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eagerly await the coming of the day of God.' The Greek verb can mean
      either 'hasten' or 'be eager for.'
    reason: alternative_reading
  - marker: b
    text: '''Elements'' may refer to the basic components of the world, or possibly
      the heavenly bodies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδοκῶντας
  chosen: wait for
  alternatives:
  - look for
  - expect
  lexicon: BDAG
  rationale: Present active participle continuing the exhortation from the previous
    verse; 'wait for' is natural modern English while preserving the sense of expectant
    anticipation.
- source_word: σπεύδοντας
  chosen: hasten
  alternatives:
  - hurry toward
  - eagerly await
  lexicon: BDAG
  rationale: The verb can mean either 'hasten' transitively/intransitively or 'be
    zealous for/eager for.' Given the direct object 'the coming,' the traditional
    and grammatically straightforward sense 'hasten' is retained in the main text,
    while the interpretive alternative is preserved in a footnote because of theological
    significance.
- source_word: παρουσίαν
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In eschatological context, 'coming' is the clearest idiomatic rendering
    in English, though the noun more literally denotes presence/arrival.
- source_word: τῆς τοῦ θεοῦ ἡμέρας
  chosen: the day of God
  alternatives:
  - God's day
  lexicon: BDAG
  rationale: A formal rendering preserves the unusual expression distinct from the
    more common 'day of the Lord.'
- source_word: δι’ ἣν
  chosen: because of which
  alternatives:
  - on account of which
  - through which
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause here. This best fits
    the ensuing cosmic dissolution as associated with that day.
- source_word: οὐρανοὶ
  chosen: the heavens
  alternatives:
  - the skies
  - heaven
  lexicon: BDAG
  rationale: Plural is explicit in Greek and commonly refers to the cosmic heavens
    in apocalyptic contexts.
- source_word: πυρούμενοι
  chosen: being set on fire
  alternatives:
  - burning
  - ignited
  lexicon: BDAG
  rationale: The participle describes the heavens as undergoing fiery burning; 'being
    set on fire' captures the passive nuance more clearly than a simple adjective.
- source_word: λυθήσονται
  chosen: will be dissolved
  alternatives:
  - will be destroyed
  - will be loosed
  lexicon: BDAG
  rationale: λύω here carries the sense of being undone/disintegrated rather than
    annihilated in a metaphysical sense; 'dissolved' matches the context and nearby
    usage in the passage.
- source_word: στοιχεῖα
  chosen: the elements
  alternatives:
  - the heavenly bodies
  - the elemental principles
  lexicon: BDAG
  rationale: In this cosmic judgment context, 'elements' is the most defensible broad
    rendering, preserving ambiguity between physical constituents and celestial components.
    More specific interpretations are possible but should not be forced into the main
    text.
- source_word: καυσούμενα
  chosen: burning
  alternatives:
  - being burned
  - set ablaze
  lexicon: BDAG
  rationale: The participle denotes being consumed by heat/fire; 'burning' is concise
    and natural in English.
- source_word: τήκεται
  chosen: are melted
  alternatives:
  - melt away
  - are dissolved
  lexicon: BDAG
  rationale: τήκομαι means to melt or waste away from heat. Although the present tense
    after futures is stylistically vivid and somewhat irregular, English can render
    the sense naturally as 'are melted.'
