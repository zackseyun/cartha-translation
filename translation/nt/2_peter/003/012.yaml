theological_decisions:
- issue: Meaning of σπεύδοντας τὴν παρουσίαν
  chosen_reading: hasten the coming
  alternative_readings:
  - eagerly await the coming
  rationale: The Greek permits either the idea of hastening the arrival or earnestly
    desiring it. To preserve theological tension rather than resolve it away, the
    more direct object-taking sense is used in the main text, with the less causally
    loaded alternative preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Referent of στοιχεῖα
  chosen_reading: the elements
  alternative_readings:
  - the heavenly bodies
  - the elemental principles
  rationale: The term is debated in eschatological passages. A minimally interpretive
    rendering best fits the translation philosophy and avoids importing a specific
    cosmological scheme.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
