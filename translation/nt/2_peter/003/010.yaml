theological_decisions:
- issue: Meaning of the final clause καὶ γῆ καὶ τὰ ἐν αὐτῇ ἔργα εὑρεθήσεται
  chosen_reading: Retain the difficult reading 'the earth and the works in it will
    be found' in the main text.
  alternative_readings:
  - the earth and the works in it will be laid bare
  - the earth and the works in it will be burned up
  rationale: The Greek given is εὑρεθήσεται, which most directly means 'will be found.'
    Because the phrase is textually and interpretively contested, the translation
    preserves the harder reading in the main text rather than importing a smoother
    doctrinally loaded resolution. Alternatives are preserved in footnotes to maintain
    transparency and theological tension.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Referent of στοιχεῖα
  chosen_reading: Translate as 'the elements' without specifying physical elements
    or heavenly bodies.
  alternative_readings:
  - the heavenly bodies
  - the basic elements of the universe
  rationale: The term can denote elemental components or heavenly bodies in context.
    Since the verse itself does not unambiguously specify which, the main text keeps
    the broader 'elements' and avoids over-resolving the imagery.
  doctrine_reference: Translation philosophy §3
