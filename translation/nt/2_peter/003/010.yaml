id: 2PE.3.10
reference: 2 Peter 3:10
source:
  edition: SBLGNT
  text: ἥξει δὲ ⸀ἡμέρα κυρίου ὡς ⸀κλέπτης, ἐν ᾗ οἱ οὐρανοὶ ῥοιζηδὸν παρελεύσονται,
    στοιχεῖα δὲ καυσούμενα ⸀λυθήσεται, καὶ γῆ καὶ τὰ ἐν αὐτῇ ἔργα ⸀εὑρεθήσεται.
translation:
  text: But the day of the Lord will come like a thief, in which the heavens will
    pass away with a roar, and the elements, being burned, will be dissolved, and
    the earth and the works in it will be found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heavenly bodies' for 'the elements' (στοιχεῖα); the term can refer
      more specifically to the components of the cosmos in this context.
    reason: lexical_alternative
  - marker: b
    text: Some understand 'will be found' to mean 'will be laid bare' or 'will be
      exposed.'
    reason: alternative_reading
  - marker: c
    text: Many manuscripts read 'will be burned up' instead of 'will be found.'
    reason: textual_variant
lexical_decisions:
- source_word: ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: Future of ἥκω commonly means 'come/arrive.' 'Will come' is idiomatic
    in English and fits the eschatological subject 'the day of the Lord.'
- source_word: ἡμέρα κυρίου
  chosen: the day of the Lord
  alternatives:
  - the Lord's day
  lexicon: BDAG
  rationale: This is the established eschatological expression in prophetic and apostolic
    usage, not a reference to a weekly day of worship. κύριος is rendered 'Lord' per
    doctrine defaults.
- source_word: κλέπτης
  chosen: a thief
  alternatives:
  - a burglar
  lexicon: BDAG
  rationale: The comparison emphasizes unexpected arrival. 'Thief' is the standard
    and most natural rendering in this biblical idiom.
- source_word: ἐν ᾗ
  chosen: in which
  alternatives:
  - on which
  - in that day
  lexicon: BDAG
  rationale: The relative construction links the cosmic events to the day just mentioned.
    'In which' preserves the Greek syntax without over-paraphrasing.
- source_word: οἱ οὐρανοὶ
  chosen: the heavens
  alternatives:
  - the skies
  - heaven
  lexicon: BDAG
  rationale: Plural οὐρανοί is best preserved as 'the heavens,' especially in cosmic/judgment
    context.
- source_word: ῥοιζηδόν
  chosen: with a roar
  alternatives:
  - with a rushing noise
  - with a loud crash
  lexicon: BDAG
  rationale: The adverb denotes a whizzing/rushing or roaring sound. 'With a roar'
    is vivid, natural English and suitably weighty.
- source_word: παρελεύσονται
  chosen: will pass away
  alternatives:
  - will disappear
  - will pass by
  lexicon: BDAG
  rationale: In eschatological contexts παρέρχομαι commonly means 'pass away.' This
    preserves intertextual resonance with other biblical cosmic-judgment texts.
- source_word: στοιχεῖα
  chosen: the elements
  alternatives:
  - the heavenly bodies
  - the elemental principles
  lexicon: BDAG
  rationale: In this context of cosmic dissolution, 'elements' is the most textually
    restrained rendering. More specific options such as 'heavenly bodies' are interpretive
    and should be preserved as alternatives rather than placed in the main text.
- source_word: καυσούμενα
  chosen: being burned
  alternatives:
  - burning
  - set on fire
  lexicon: BDAG
  rationale: The participle describes the state/process accompanying dissolution.
    'Being burned' reflects the passive/middle sense without forcing a more explicit
    agent.
- source_word: λυθήσεται
  chosen: will be dissolved
  alternatives:
  - will be loosed
  - will be destroyed
  lexicon: BDAG
  rationale: λύω here carries the sense of being broken up or dissolved. 'Destroyed'
    is possible by implication but less precise than the image of disintegration.
- source_word: γῆ
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: Given the cosmic scope ('the heavens ... the elements'), 'earth' is the
    appropriate referent rather than a localized 'land.'
- source_word: τὰ ἐν αὐτῇ ἔργα
  chosen: the works in it
  alternatives:
  - everything done on it
  - the deeds in it
  lexicon: BDAG
  rationale: ἔργα refers to works/deeds/things done. 'The works in it' stays close
    to the Greek while allowing both human works and what is found on the earth to
    remain in view.
- source_word: εὑρεθήσεται
  chosen: will be found
  alternatives:
  - will be laid bare
  - will be exposed
  - will be discovered
  lexicon: BDAG
  rationale: The manuscript reading here is difficult and much discussed. The direct
    sense of εὑρίσκω is 'find.' Following original-language primacy, the main text
    keeps the attested reading 'will be found,' while major interpretive alternatives
    and textual variants are preserved in footnotes.
