id: 2PE.3.16
reference: 2 Peter 3:16
source:
  edition: SBLGNT
  text: ὡς καὶ ἐν πάσαις ⸀ταῖς ἐπιστολαῖς λαλῶν ἐν αὐταῖς περὶ τούτων, ἐν ⸀αἷς ἐστιν
    δυσνόητά τινα, ἃ οἱ ἀμαθεῖς καὶ ἀστήρικτοι στρεβλοῦσιν ὡς καὶ τὰς λοιπὰς γραφὰς
    πρὸς τὴν ἰδίαν αὐτῶν ἀπώλειαν.
translation:
  text: as also in all his letters, speaking in them about these things. In them are
    some things hard to understand, which the ignorant and unstable twist, as they
    do the rest of the Scriptures, to their own destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the other Scriptures.' The Greek can mean either 'the rest' or 'the
      other,' though 'the rest of the Scriptures' best fits the comparison being made.
    reason: lexical_alternative
  - marker: b
    text: Or 'untaught' for 'ignorant.'
    reason: lexical_alternative
  - marker: c
    text: Or 'distort' for 'twist.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολαῖς
  chosen: letters
  alternatives:
  - epistles
  lexicon: BDAG
  rationale: Rendered with the common modern English term 'letters' rather than the
    more traditional but less natural 'epistles,' while preserving the sense of written
    correspondence.
- source_word: λαλῶν
  chosen: speaking
  alternatives:
  - writing
  - saying
  lexicon: BDAG
  rationale: The participle literally means 'speaking.' In context it refers to what
    Paul communicates in his letters. 'Speaking' preserves the Greek wording without
    over-paraphrasing to 'writing,' though the medium is epistolary.
- source_word: περὶ τούτων
  chosen: about these things
  alternatives:
  - about these matters
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the demonstrative reference
    to the topics just mentioned in context.
- source_word: δυσνόητά τινα
  chosen: some things hard to understand
  alternatives:
  - some things difficult to understand
  - certain things hard to grasp
  lexicon: BDAG
  rationale: This captures both the indefinite τινα ('some things') and δυσνόητα ('hard
    to understand'). 'Hard to understand' is idiomatic and accessible.
- source_word: ἀμαθεῖς
  chosen: ignorant
  alternatives:
  - untaught
  - unlearned
  lexicon: BDAG
  rationale: Chose 'ignorant' to reflect lack of understanding or instruction without
    implying merely formal illiteracy. 'Untaught' is possible, but 'ignorant' better
    matches the broader semantic force here.
- source_word: ἀστήρικτοι
  chosen: unstable
  alternatives:
  - unsettled
  - unestablished
  lexicon: BDAG
  rationale: Rendered as 'unstable' in line with common NT usage for those not firmly
    grounded. It conveys moral and doctrinal lack of firmness.
- source_word: στρεβλοῦσιν
  chosen: twist
  alternatives:
  - distort
  - wrench
  lexicon: BDAG
  rationale: '''Twist'' is vivid, natural English and reflects the metaphor of wrenching
    something out of shape. ''Distort'' is a viable alternative but slightly less
    concrete.'
- source_word: τὰς λοιπὰς γραφὰς
  chosen: the rest of the Scriptures
  alternatives:
  - the other Scriptures
  - the remaining writings
  lexicon: BDAG
  rationale: γραφή in the plural in this context is best rendered 'Scriptures.' λοιπάς
    indicates 'the rest' or 'the other,' and 'the rest of the Scriptures' most naturally
    conveys that Paul's letters are being compared with other scriptural writings.
- source_word: ἀπώλειαν
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: '''Destruction'' is the clearest modern rendering and preserves the grave
    result without importing a more technical theological term than the text itself
    requires.'
