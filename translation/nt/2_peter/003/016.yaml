theological_decisions:
- issue: Implication of scriptural status in τὰς λοιπὰς γραφὰς
  chosen_reading: Rendered as 'the rest of the Scriptures,' preserving the natural
    implication that Paul's letters are grouped alongside other scriptural writings.
  alternative_readings:
  - the other writings
  rationale: The noun γραφαί in the New Testament ordinarily refers to sacred writings/Scriptures,
    and λοιπάς ('the rest') suggests comparison with an already recognized category.
    The translation should not flatten this to a generic 'writings.' At the same time,
    the wording simply reflects the Greek and does not add a doctrinal claim beyond
    the text.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
