theological_decisions:
- issue: Rendering of δικαιοσύνη in an eschatological context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file sets 'righteousness' as the default rendering of δικαιοσύνη,
    while preserving 'justice' in a footnote where appropriate. In this verse, the
    new creation is characterized by the settled presence of what is right before
    God; 'righteousness' preserves that theological breadth better than the more sociopolitical-sounding
    'justice,' though 'justice' remains a meaningful alternative nuance.
