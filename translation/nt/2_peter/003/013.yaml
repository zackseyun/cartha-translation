id: 2PE.3.13
reference: 2 Peter 3:13
source:
  edition: SBLGNT
  text: καινοὺς δὲ οὐρανοὺς καὶ γῆν καινὴν κατὰ τὸ ἐπάγγελμα αὐτοῦ προσδοκῶμεν, ἐν
    οἷς δικαιοσύνη κατοικεῖ.
translation:
  text: But according to his promise, we are waiting for new heavens and a new earth,
    in which righteousness dwells.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice dwells.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καινοὺς ... οὐρανοὺς / γῆν καινὴν
  chosen: new heavens and a new earth
  alternatives:
  - new skies and a new land
  - renewed heavens and renewed earth
  lexicon: BDAG
  rationale: καινός normally denotes newness in kind or quality rather than merely
    recent origin. 'Heavens' and 'earth' preserves the biblical-cosmic language and
    echoes Isa 65:17; 66:22 and Rev 21:1. 'Skies/land' would narrow the scope too
    much; 'renewed' interprets beyond the adjective itself.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the preceding destruction of the present
    heavens and earth (v. 12). 'But' best conveys that contrast in natural English.
- source_word: κατὰ τὸ ἐπάγγελμα αὐτοῦ
  chosen: according to his promise
  alternatives:
  - in keeping with his promise
  - according to what he promised
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or accordance. ἐπάγγελμα
    is 'promise.' The singular with αὐτοῦ is naturally rendered 'his promise,' referring
    to God's pledged word.
- source_word: προσδοκῶμεν
  chosen: we are waiting for
  alternatives:
  - we wait for
  - we look for
  - we expect
  lexicon: BDAG
  rationale: The present indicative conveys ongoing expectation. 'We are waiting for'
    captures the durative sense in idiomatic English without losing the future-oriented
    hope.
- source_word: ἐν οἷς
  chosen: in which
  alternatives:
  - where
  - in them
  lexicon: BDAG
  rationale: The relative pronoun is plural, agreeing with 'new heavens,' but the
    phrase refers collectively to the new creation ('new heavens and a new earth').
    English idiom prefers the singular collective 'in which' for the combined realm.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, with 'justice' preserved as an alternative where relevant. Here the
    term likely denotes the moral order characteristic of the new creation; 'righteousness'
    best preserves the broader biblical-theological sense.
- source_word: κατοικεῖ
  chosen: dwells
  alternatives:
  - lives
  - makes its home
  - resides
  lexicon: BDAG
  rationale: κατοικέω means to dwell or reside. 'Dwells' is concise, elevated without
    being archaic, and conveys settled permanence better than 'lives.'
