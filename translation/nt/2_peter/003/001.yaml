theological_decisions:
- issue: Reference of the plural relative pronoun ἐν αἷς
  chosen_reading: It refers to both letters Peter has written to the recipients.
  alternative_readings:
  - It refers only to the present letter by a loose plural or epistolary usage.
  rationale: The most straightforward grammatical reading is that the plural relative
    pronoun refers to the two letters just mentioned/implied, hence 'in both of them.'
    This preserves the text's plain sense without importing a broader doctrinal claim.
  doctrine_reference: Translation philosophy §1, §3, §5
