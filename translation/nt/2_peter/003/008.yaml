id: 2PE.3.8
reference: 2 Peter 3:8
source:
  edition: SBLGNT
  text: Ἓν δὲ τοῦτο μὴ λανθανέτω ὑμᾶς, ἀγαπητοί, ὅτι μία ἡμέρα παρὰ κυρίῳ ὡς χίλια
    ἔτη καὶ χίλια ἔτη ὡς ἡμέρα μία.
translation:
  text: 'But do not let this one thing escape your notice, beloved: with the Lord
    one day is like a thousand years, and a thousand years like one day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be unaware of this one thing.'
    reason: lexical_alternative
  - marker: b
    text: The comparison uses 'like/as,' expressing analogy rather than a literal
      equation of one day with a thousand years.
    reason: cultural_note
  - marker: c
    text: Echoing Psalm 90:4.
    reason: cross_reference
lexical_decisions:
- source_word: Ἓν ... τοῦτο
  chosen: this one thing
  alternatives:
  - one thing
  - this
  lexicon: BDAG
  rationale: The neuter singular construction foregrounds a single specific point.
    Rendering as 'this one thing' preserves both the demonstrative force of τοῦτο
    and the emphasis of Ἓν.
- source_word: μὴ λανθανέτω ὑμᾶς
  chosen: do not let ... escape your notice
  alternatives:
  - do not let ... be hidden from you
  - do not overlook
  - do not be unaware of
  lexicon: BDAG
  rationale: λανθάνω here means to escape someone's notice or remain unnoticed. 'Do
    not let this ... escape your notice' is natural English while preserving the imperative
    force and the object relation with ὑμᾶς.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: As a vocative address to fellow believers, 'beloved' preserves the affectionate
    and ecclesial tone without flattening it into casual modern idiom.
- source_word: παρὰ κυρίῳ
  chosen: with the Lord
  alternatives:
  - before the Lord
  - in the Lord's sight
  lexicon: BDAG
  rationale: παρά with the dative can denote proximity or perspective ('with, in the
    presence of, in the estimation of'). 'With the Lord' is concise and idiomatic,
    preserving the relational/perspectival sense. κύριος follows the doctrinal default
    'Lord'.
- source_word: μία ἡμέρα ... ὡς χίλια ἔτη
  chosen: one day is like a thousand years
  alternatives:
  - one day is as a thousand years
  lexicon: BDAG
  rationale: ὡς marks comparison, not identity. 'Is like' communicates simile clearly
    in modern English while avoiding archaic phrasing.
- source_word: καὶ χίλια ἔτη ὡς ἡμέρα μία
  chosen: and a thousand years like one day
  alternatives:
  - and a thousand years as one day
  lexicon: BDAG
  rationale: The second clause mirrors the first and should remain balanced. The verbless
    Greek permits English ellipsis after the first clause; repeating 'is' is unnecessary.
- source_word: χίλια ἔτη
  chosen: a thousand years
  lexicon: BDAG
  rationale: Standard cardinal expression; no contextual reason to paraphrase or symbolize
    in translation.
