theological_decisions:
- issue: Nature of the temporal comparison
  chosen_reading: Render the statement as a simile about the Lord's relation to time,
    not as a literal equation or a prophetic conversion formula.
  alternative_readings:
  - Treating one day as literally equal to a thousand years
  - Using the verse as a timetable key for eschatological calculation
  rationale: The repeated ὡς ('like/as') marks analogy. The translation should preserve
    the comparison without importing a doctrinal scheme about prophetic chronology.
    This maintains the text's theological tension and plain sense.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
