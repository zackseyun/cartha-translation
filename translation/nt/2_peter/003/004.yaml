id: 2PE.3.4
reference: 2 Peter 3:4
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Ποῦ ἐστιν ἡ ἐπαγγελία τῆς παρουσίας αὐτοῦ; ἀφ’ ἧς γὰρ οἱ πατέρες
    ἐκοιμήθησαν, πάντα οὕτως διαμένει ἀπ’ ἀρχῆς κτίσεως.
translation:
  text: and saying, “Where is the promise of his coming? For ever since the fathers
    fell asleep, all things continue just as they have from the beginning of creation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “presence” or “arrival” for “coming” (παρουσία). In this context it refers
      to the expected future return of Christ.
    reason: lexical_alternative
  - marker: b
    text: “Fell asleep” is a Greek euphemism for death.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: and saying
  alternatives:
  - and saying this
  - and they say
  lexicon: BDAG
  rationale: Present participle coordinated with the previous description of the scoffers;
    'and saying' preserves the participial flow without over-paraphrasing into a finite
    verb.
- source_word: ἐπαγγελία
  chosen: promise
  alternatives:
  - promised fulfillment
  lexicon: BDAG
  rationale: Standard and natural rendering for ἐπαγγελία; the context is the mocked
    assurance of the Lord's return, not merely the act of promising.
- source_word: παρουσίας
  chosen: coming
  alternatives:
  - presence
  - arrival
  lexicon: BDAG
  rationale: In eschatological NT usage παρουσία commonly refers to the future coming/arrival
    of Christ. 'Coming' is the clearest idiomatic English here, while 'presence' is
    too static in this context.
- source_word: ἀφ’ ἧς
  chosen: ever since
  alternatives:
  - since the time when
  - from the time that
  lexicon: BDAG
  rationale: This idiom marks elapsed time from a past point. 'Ever since' captures
    the temporal force naturally in English.
- source_word: οἱ πατέρες
  chosen: the fathers
  alternatives:
  - our fathers
  - the ancestors
  lexicon: BDAG
  rationale: The Greek has the article but no possessive pronoun. 'The fathers' preserves
    the wording and likely refers to earlier generations/forefathers as invoked by
    the scoffers. 'Ancestors' is possible but less formally transparent.
- source_word: ἐκοιμήθησαν
  chosen: fell asleep
  alternatives:
  - died
  - were laid to rest
  lexicon: BDAG
  rationale: κοιμάομαι is a conventional euphemism for death. 'Fell asleep' preserves
    the metaphor present in the Greek; the meaning is clear in context.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'All things' is slightly more formal
    and matches the universal scope of the scoffers' claim.
- source_word: οὕτως
  chosen: just as they have
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Combined with διαμένει, the sense is that things remain in the same state.
    'Just as they have' brings out the comparative force in idiomatic English.
- source_word: διαμένει
  chosen: continue
  alternatives:
  - remain
  - persist
  lexicon: BDAG
  rationale: Although singular in form with neuter plural subject, the sense in English
    is plural. 'Continue' fits the scoffers' argument about ongoing uniformity.
- source_word: ἀπ’ ἀρχῆς κτίσεως
  chosen: from the beginning of creation
  alternatives:
  - since the beginning of creation
  - from creation's beginning
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'From the beginning of creation'
    is clear, natural, and close to the Greek wording.
