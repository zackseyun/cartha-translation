theological_decisions:
- issue: Meaning of παρουσία in an eschatological context
  chosen_reading: his coming
  alternative_readings:
  - his presence
  - his arrival
  rationale: Given the mockery of delayed eschatological fulfillment in context, παρουσία
    refers to the expected future return of Christ. 'Coming' best communicates this
    in standard English while preserving theological sense.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the death euphemism ἐκοιμήθησαν
  chosen_reading: fell asleep
  alternative_readings:
  - died
  rationale: The text uses a metaphor for death rather than the blunt term 'died.'
    Preserving the metaphor maintains the source texture without importing a doctrinal
    claim beyond the idiom itself.
  doctrine_reference: Translation philosophy §1, §6
