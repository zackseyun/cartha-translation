id: 2PE.3.7
reference: 2 Peter 3:7
source:
  edition: SBLGNT
  text: οἱ δὲ νῦν οὐρανοὶ καὶ ἡ γῆ τῷ ⸀αὐτῷ λόγῳ τεθησαυρισμένοι εἰσὶν πυρὶ τηρούμενοι
    εἰς ἡμέραν κρίσεως καὶ ἀπωλείας τῶν ἀσεβῶν ἀνθρώπων.
translation:
  text: But the present heavens and the earth are stored up by the same word, being
    kept for fire until the day of judgment and destruction of ungodly men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of ungodly people'; Greek 'men' can function representatively for human
      beings in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ νῦν οὐρανοὶ καὶ ἡ γῆ
  chosen: But the present heavens and the earth
  alternatives:
  - But the heavens and earth that now exist
  - And the present heavens and earth
  lexicon: BDAG
  rationale: νῦν modifies the current created order in contrast with the former world
    in the preceding context. δέ is rendered adversatively as 'But' to mark the contrast.
    The plural οὐρανοί is kept as 'heavens,' while γῆ is 'earth.'
- source_word: τῷ αὐτῷ λόγῳ
  chosen: by the same word
  alternatives:
  - by that same word
  - through the same word
  lexicon: BDAG
  rationale: λόγος here refers back to God's effective word mentioned in the context.
    The dative is rendered instrumentally as 'by the same word.' 'Same' preserves
    αὐτῷ's anaphoric force.
- source_word: τεθησαυρισμένοι εἰσὶν
  chosen: are stored up
  alternatives:
  - have been stored up
  - are reserved
  lexicon: BDAG
  rationale: The periphrastic perfect indicates a present state resulting from prior
    action. 'Are stored up' captures both the completed action and continuing state
    in natural English. 'Reserved' is possible but overlaps too much with τηρούμενοι
    later in the verse.
- source_word: πυρὶ τηρούμενοι
  chosen: being kept for fire
  alternatives:
  - being reserved for fire
  - kept for the fire
  lexicon: BDAG
  rationale: 'τηρέω means keep, preserve, reserve. The dative πυρί is best taken as
    reference/purpose here: the heavens and earth are being kept for fire, i.e., for
    fiery judgment. The anarthrous ''fire'' is retained rather than ''the fire.'''
- source_word: εἰς ἡμέραν κρίσεως
  chosen: until the day of judgment
  alternatives:
  - for the day of judgment
  - unto the day of judgment
  lexicon: BDAG
  rationale: εἰς with temporal force is naturally rendered 'until' or 'for' in this
    context. 'Until the day of judgment' reads smoothly and conveys the eschatological
    endpoint toward which the keeping is directed.
- source_word: καὶ ἀπωλείας
  chosen: and destruction
  alternatives:
  - and ruin
  - and perdition
  lexicon: BDAG
  rationale: ἀπώλεια denotes destruction or ruin. 'Destruction' is the clearest modern
    English equivalent and fits the judgment context without importing later technical
    theological nuance.
- source_word: τῶν ἀσεβῶν ἀνθρώπων
  chosen: of ungodly men
  alternatives:
  - of ungodly people
  - of ungodly humans
  lexicon: BDAG
  rationale: ἀσεβῶν means ungodly, irreverent. ἀνθρώπων is grammatically masculine
    plural and can be generic for human beings, but per the project's gender-accurate
    policy, 'men' is retained where the source uses the masculine form with representative
    force unless context strongly demands otherwise. A footnote preserves the inclusive
    sense.
