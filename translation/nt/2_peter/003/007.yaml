theological_decisions:
- issue: Nature of the coming fiery end
  chosen_reading: The verse speaks of the present heavens and earth being kept for
    a future fiery judgment, without specifying in this verse whether that entails
    annihilation or transformative renewal.
  alternative_readings:
  - complete cosmic annihilation
  - purifying transformation of creation
  rationale: The wording 'kept for fire' and 'day of judgment and destruction of ungodly
    men' clearly affirms eschatological judgment, but the object of 'destruction'
    is explicitly the ungodly men, not necessarily the heavens and earth in the same
    sense. The translation therefore preserves the text's wording and does not resolve
    a broader doctrinal debate beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
