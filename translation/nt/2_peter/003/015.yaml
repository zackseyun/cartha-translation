theological_decisions:
- issue: Implication of divine agency in 'the wisdom given to him'
  chosen_reading: Retain the passive 'given to him' without explicitly supplying 'by
    God' in the main text.
  alternative_readings:
  - according to the wisdom God gave him
  rationale: The passive likely implies divine agency, but the Greek does not state
    the agent explicitly. To avoid importing what is implied but unstated, the translation
    preserves the passive form while allowing readers to infer the source from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of the Lord's delayed action
  chosen_reading: Translate μακροθυμία as 'patience' and σωτηρία as 'salvation,' preserving
    the theological point that the Lord's delay serves saving ends.
  alternative_readings:
  - forbearance ... opportunity for salvation
  rationale: The verse does not merely say that delay permits repentance in an abstract
    sense; it identifies the Lord's patience with salvation in purpose. The translation
    keeps that direct predication rather than expanding it interpretively.
  doctrine_reference: Translation philosophy §3
