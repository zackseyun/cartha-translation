id: 2PE.3.15
reference: 2 Peter 3:15
source:
  edition: SBLGNT
  text: καὶ τὴν τοῦ κυρίου ἡμῶν μακροθυμίαν σωτηρίαν ἡγεῖσθε, καθὼς καὶ ὁ ἀγαπητὸς
    ἡμῶν ἀδελφὸς Παῦλος κατὰ τὴν ⸂δοθεῖσαν αὐτῷ⸃ σοφίαν ἔγραψεν ὑμῖν,
translation:
  text: And regard the patience of our Lord as salvation, just as our beloved brother
    Paul also wrote to you according to the wisdom given to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forbearance'; the sense is that the Lord's delay is meant for salvation,
      not indifference.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the wisdom given to him' likely implies wisdom given by God,
      though the Greek leaves the agent unstated.
    reason: alternative_reading
lexical_decisions:
- source_word: μακροθυμίαν
  chosen: patience
  alternatives:
  - longsuffering
  - forbearance
  lexicon: BDAG
  rationale: The noun denotes patient restraint or delay in judgment. 'Patience' is
    the most natural modern English rendering here and fits the context of the Lord's
    delayed coming in the preceding verse. 'Longsuffering' is traditional but archaic;
    'forbearance' is possible but less idiomatic in this construction.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: In this eschatological context, the sense is not merely general rescue
    but God's saving purpose accomplished through delayed judgment. 'Salvation' preserves
    the theological weight and standard NT sense.
- source_word: ἡγεῖσθε
  chosen: regard
  alternatives:
  - consider
  - count
  lexicon: BDAG
  rationale: The middle imperative calls the readers to reckon or consider something
    in a certain way. 'Regard ... as' is idiomatic English and clearly conveys the
    predicative relationship with σωτηρίαν.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it refers to Jesus
    in context ('our Lord'), and 'Lord' preserves both title and theological force.
- source_word: ἀγαπητὸς ... ἀδελφὸς
  chosen: beloved brother
  alternatives:
  - dear brother
  lexicon: BDAG
  rationale: The phrase is an affectionate designation for Paul. 'Beloved brother'
    preserves the warmth and the lexical connection to ἀγαπητός better than the looser
    'dear brother.'
- source_word: κατὰ τὴν δοθεῖσαν αὐτῷ σοφίαν
  chosen: according to the wisdom given to him
  alternatives:
  - in keeping with the wisdom given him
  - according to the wisdom that was given to him
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity or accordance. The
    participle δοθεῖσαν is best rendered as a divine passive ('given'), and the whole
    phrase indicates that Paul's writing accords with wisdom granted to him.
- source_word: ἔγραψεν ὑμῖν
  chosen: wrote to you
  alternatives:
  - has written to you
  lexicon: BDAG
  rationale: The aorist is naturally rendered as a simple past in English narrative
    reference. Although English versions sometimes use the present perfect for epistolary
    relevance, 'wrote to you' is closer to the Greek form.
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - just as
  lexicon: BDAG
  rationale: This pairing links Peter's exhortation with Paul's corresponding teaching.
    Rendering both particles preserves the comparative force and the additive nuance.
