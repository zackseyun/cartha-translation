theological_decisions:
- issue: Eschatological description of the world's fate
  chosen_reading: Rendered λύομένων as 'are being dissolved' rather than a stronger
    interpretive term such as 'are being destroyed.'
  alternative_readings:
  - are being destroyed
  - will be dissolved
  rationale: The Greek participle itself speaks of loosening/dissolution. In context
    this refers to eschatological unmaking, but the translation should not intensify
    the wording beyond the lexical value. The present participle is retained with
    an English progressive form.
  doctrine_reference: Translation philosophy §§1, 3, 5
