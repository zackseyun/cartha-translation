theological_decisions:
- issue: Referent of αὐτῷ in the eschatological setting
  chosen_reading: The phrase is rendered 'by him,' leaving the referent implicit rather
    than specifying 'by the Lord' or 'by God.'
  alternative_readings:
  - before him
  - in his sight
  rationale: The Greek pronoun's antecedent is contextually the divine figure associated
    with the coming day, but the verse itself does not restate the noun. The translation
    preserves that textual economy and avoids importing a more explicit doctrinal
    identification than the immediate wording provides. Because the dative can also
    be taken in a relational/reference sense, the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
