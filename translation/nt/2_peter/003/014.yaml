id: 2PE.3.14
reference: 2 Peter 3:14
source:
  edition: SBLGNT
  text: Διό, ἀγαπητοί, ταῦτα προσδοκῶντες σπουδάσατε ἄσπιλοι καὶ ἀμώμητοι αὐτῷ εὑρεθῆναι
    ἐν εἰρήνῃ,
translation:
  text: Therefore, beloved, since you are waiting for these things, make every effort
    to be found by him spotless and blameless, in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be found before him spotless and blameless.' The Greek dative can be
      understood as agency ('by him') or reference/presence ('before him').
    reason: alternative_reading
lexical_decisions:
- source_word: Διό
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding discussion
    about the day of the Lord and the promised new heavens and new earth. 'Therefore'
    is natural and sufficiently formal.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: Vocative plural used as an affectionate address. 'Beloved' preserves
    both the warmth and the epistolary tone better than the more paraphrastic 'dear
    friends'.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  - this
  lexicon: BDAG
  rationale: The demonstrative likely refers back to the eschatological realities
    just described. 'These things' keeps the Greek's explicit object and avoids over-specifying
    the referent.
- source_word: προσδοκῶντες
  chosen: since you are waiting for
  alternatives:
  - as you wait for
  - expecting
  - looking for
  lexicon: BDAG
  rationale: Present participle indicating ongoing expectation. 'Since you are waiting
    for' captures the participial connection to the imperative and reads naturally
    in English while preserving the temporal-causal force.
- source_word: σπουδάσατε
  chosen: make every effort
  alternatives:
  - be diligent
  - be eager
  lexicon: BDAG
  rationale: Aorist imperative calling for earnest exertion. 'Make every effort' conveys
    the active, strenuous sense more clearly in contemporary English than the somewhat
    traditional but less transparent 'be diligent'.
- source_word: ἄσπιλοι
  chosen: spotless
  alternatives:
  - without spot
  - unstained
  lexicon: BDAG
  rationale: Moral purity imagery, likely echoing sacrificial or ethical blamelessness
    language. 'Spotless' is concise, idiomatic, and preserves the metaphor.
- source_word: ἀμώμητοι
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: Paired with ἄσπιλοι for ethical integrity. 'Blameless' is the standard
    natural rendering and distinguishes it from the more image-based 'spotless' while
    preserving the semantic overlap.
- source_word: αὐτῷ
  chosen: by him
  alternatives:
  - before him
  - to him
  lexicon: BDAG
  rationale: 'Dative with εὑρεθῆναι can be understood as agency or reference: ''be
    found by him'' or ''be found before him.'' Given the likely implied divine examiner
    at the Lord''s coming, ''by him'' best reflects the dative naturally in this construction,
    while the alternative is preserved in a footnote because the phrase is genuinely
    ambiguous.'
- source_word: εὑρεθῆναι
  chosen: to be found
  alternatives:
  - to be discovered
  - to be shown
  lexicon: BDAG
  rationale: Aorist passive infinitive dependent on the imperative, expressing the
    desired state at the eschatological evaluation. 'To be found' is the standard
    and contextually apt rendering.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - at peace
  - in peace with him
  lexicon: BDAG
  rationale: The prepositional phrase likely describes the state in which believers
    are to be found. 'In peace' is formally close to the Greek and leaves open whether
    the emphasis is inner tranquility, reconciled standing, or communal peace. 'With
    him' is interpretive and not explicit in the Greek.
