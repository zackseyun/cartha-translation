theological_decisions:
- issue: Eschatological expression ἐπ’ ἐσχάτων τῶν ἡμερῶν
  chosen_reading: in the last days
  alternative_readings:
  - at the end of the days
  rationale: The phrase is rendered in its conventional eschatological sense without
    narrowing its theological scope to a specific millennial or denominational framework.
    This preserves the text's warning function and avoids importing a detailed end-times
    system not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless unambiguous.
