id: 2PE.3.3
reference: 2 Peter 3:3
source:
  edition: SBLGNT
  text: τοῦτο πρῶτον γινώσκοντες ὅτι ἐλεύσονται ἐπ’ ⸀ἐσχάτων τῶν ἡμερῶν ⸂ἐν ἐμπαιγμονῇ⸃
    ἐμπαῖκται κατὰ τὰς ἰδίας ἐπιθυμίας αὐτῶν πορευόμενοι
translation:
  text: 'knowing this first: that in the last days scoffers will come with scoffing,
    walking according to their own desires,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''mockers will come in mockery.'' The Greek uses cognate terms for emphasis:
      ''scoffers'' and ''scoffing.'''
    reason: lexical_alternative
  - marker: b
    text: '''Desires'' may also be rendered ''lusts''; the Greek term can denote strong
      cravings more broadly, not only sexual desire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο πρῶτον γινώσκοντες
  chosen: knowing this first
  alternatives:
  - understanding this first
  - first of all, know this
  lexicon: BDAG
  rationale: The participial construction is carried into English as a fronted participial
    phrase. 'Knowing this first' preserves both the adverbial force of πρῶτον and
    the participle γινώσκοντες without over-paraphrasing into an imperative.
- source_word: ἐλεύσονται
  chosen: will come
  alternatives:
  - will arrive
  - will appear
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι is naturally rendered 'will come.' This is idiomatic
    and sufficiently formal.
- source_word: ἐπ’ ἐσχάτων τῶν ἡμερῶν
  chosen: in the last days
  alternatives:
  - in the last of the days
  - at the end of the days
  lexicon: BDAG
  rationale: This is a standard eschatological expression. 'In the last days' is the
    most natural English equivalent and preserves the temporal force of ἐπί with the
    genitive phrase.
- source_word: ἐν ἐμπαιγμονῇ
  chosen: with scoffing
  alternatives:
  - in mockery
  - mockingly
  lexicon: BDAG
  rationale: The phrase is somewhat emphatic alongside ἐμπαῖκται. 'With scoffing'
    preserves the cognate relationship ('scoffers ... with scoffing') better than
    smoothing it away, while remaining readable.
- source_word: ἐμπαῖκται
  chosen: scoffers
  alternatives:
  - mockers
  lexicon: BDAG
  rationale: '''Scoffers'' is the standard and clearest rendering for ἐμπαῖκται in
    this warning context. ''Mockers'' is possible but slightly less idiomatic in biblical
    warning language.'
- source_word: κατὰ τὰς ἰδίας ἐπιθυμίας αὐτῶν
  chosen: according to their own desires
  alternatives:
  - according to their own lusts
  - following their own desires
  lexicon: BDAG
  rationale: ἐπιθυμίαι can mean desires or lusts depending on context. Here the moral
    force is negative, but 'desires' is broader, more accessible modern English and
    avoids importing a narrowly sexual sense. The possessive ἰδίας αὐτῶν is preserved
    with 'their own.'
- source_word: πορευόμενοι
  chosen: walking
  alternatives:
  - going
  - living
  - conducting themselves
  lexicon: BDAG
  rationale: The participle denotes manner of life or conduct. 'Walking' preserves
    the metaphor and biblical texture while remaining understandable in context.
