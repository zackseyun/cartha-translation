theological_decisions:
- issue: Nature of the 'knowledge' in relation to apostasy
  chosen_reading: Render ἐπίγνωσις simply as 'knowledge' without specifying whether
    it implies saving regeneration or merely real acquaintance.
  alternative_readings:
  - saving knowledge
  - mere outward knowledge
  rationale: The verse is debated theologically, but the Greek term itself does not
    settle the doctrinal question. To preserve theological tension, the translation
    stays lexical and does not encode a denominational reading about whether the persons
    were truly saved.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance prefers 'Messiah' where Χριστός functions as a
    title. Here the phrase 'Jesus Messiah' preserves the titular force while remaining
    readable.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
