id: 2PE.2.20
reference: 2 Peter 2:20
source:
  edition: SBLGNT
  text: εἰ γὰρ ἀποφυγόντες τὰ μιάσματα τοῦ κόσμου ἐν ἐπιγνώσει τοῦ ⸀κυρίου καὶ σωτῆρος
    Ἰησοῦ Χριστοῦ τούτοις δὲ πάλιν ἐμπλακέντες ἡττῶνται, γέγονεν αὐτοῖς τὰ ἔσχατα
    χείρονα τῶν πρώτων.
translation:
  text: For if, after escaping the defilements of the world through the knowledge
    of our Lord and Savior Jesus Messiah, they are again entangled in these things
    and overcome, the last state has become worse for them than the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through full knowledge of our Lord and Savior Jesus Christ/Messiah.'
      The Greek word can suggest fuller or more direct knowledge, though 'knowledge'
      is retained in the main text for natural English.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός is treated
      as a title in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποφυγόντες
  chosen: after escaping
  alternatives:
  - having escaped
  - escaping
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb;
    'after escaping' makes the temporal relationship clear in natural English without
    over-paraphrasing.
- source_word: μιάσματα
  chosen: defilements
  alternatives:
  - pollutions
  - stains
  - corruptions
  lexicon: BDAG
  rationale: μίασμα denotes what defiles or pollutes. 'Defilements' preserves the
    moral and contaminating sense better than the more physical-sounding 'pollutions.'
- source_word: κόσμου
  chosen: of the world
  alternatives:
  - world's
  lexicon: BDAG
  rationale: Standard genitival rendering; keeps the moral sphere in view without
    interpretive expansion.
- source_word: ἐν ἐπιγνώσει
  chosen: through the knowledge
  alternatives:
  - in the knowledge
  - by the knowledge
  - through full knowledge
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' here it is instrumental or means-related
    in context: their escape occurs by means of knowing Jesus. ''Knowledge'' is preferred
    over ''full knowledge'' to avoid overstating the lexical force in English, though
    ἐπίγνωσις can imply fuller or more direct knowledge.'
- source_word: κυρίου καὶ σωτῆρος
  chosen: Lord and Savior
  alternatives:
  - Master and Savior
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' σωτήρ is straightforwardly
    'Savior.' The paired titles are rendered as titles of Jesus.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where title is active rather
    than name-like. In this epistolary theological context, the titular sense remains
    audible, so 'Jesus Messiah' preserves meaning.
- source_word: τούτοις
  chosen: in these things
  alternatives:
  - in them
  - by these things
  lexicon: BDAG
  rationale: The dative pronoun refers back to the defilements. 'In these things'
    makes the antecedent explicit enough in English while preserving the Greek reference.
- source_word: πάλιν ἐμπλακέντες
  chosen: again entangled
  alternatives:
  - entangled again
  - again involved
  lexicon: BDAG
  rationale: The participle conveys renewed involvement or ensnarement. 'Entangled'
    captures the image of being caught up again in what they had escaped.
- source_word: ἡττῶνται
  chosen: are overcome
  alternatives:
  - are defeated
  - are mastered
  lexicon: BDAG
  rationale: The verb indicates being defeated or subdued. 'Are overcome' is idiomatic
    and fits the moral-spiritual context, echoing the theme in the immediate context
    of being mastered.
- source_word: γέγονεν αὐτοῖς
  chosen: has become worse for them
  alternatives:
  - it has become for them
  - it has happened to them
  lexicon: BDAG
  rationale: The perfect γέγονεν marks a resulting state. In English the predicate
    must be completed with what follows; 'has become worse for them' naturally carries
    the sense into the comparative phrase.
- source_word: τὰ ἔσχατα
  chosen: the last state
  alternatives:
  - the last things
  - their end
  lexicon: BDAG
  rationale: Idiomatic expression for one's final condition or latter state. 'The
    last state' is clearer in English than the more literal 'the last things' and
    avoids importing eschatological specificity.
- source_word: χείρονα τῶν πρώτων
  chosen: worse for them than the first
  alternatives:
  - worse than the former things
  - worse than the first state
  lexicon: BDAG
  rationale: Comparative construction contrasting final and initial condition. 'Than
    the first' is concise and natural; 'state' is already supplied by 'the last state'
    in the first half of the clause.
