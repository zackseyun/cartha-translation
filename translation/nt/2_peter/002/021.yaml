theological_decisions:
- issue: Whether the verse should be translated in a way that settles the theological
    question of apostasy versus mere false profession
  chosen_reading: Use wording that states the comparison and reversal plainly without
    importing a doctrinal conclusion beyond the text.
  alternative_readings:
  - Translate more strongly to imply loss of salvation
  - Translate more weakly to imply only superficial exposure to the faith
  rationale: The Greek says it would have been better not to have known the way of
    righteousness than, after knowing, to turn back from the holy commandment delivered
    to them. It describes real knowledge and reversal, but the translation should
    not encode a denominational resolution of debates about perseverance/apostasy
    beyond that wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
