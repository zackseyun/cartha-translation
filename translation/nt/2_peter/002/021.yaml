id: 2PE.2.21
reference: 2 Peter 2:21
source:
  edition: SBLGNT
  text: κρεῖττον γὰρ ἦν αὐτοῖς μὴ ἐπεγνωκέναι τὴν ὁδὸν τῆς δικαιοσύνης ἢ ἐπιγνοῦσιν
    ⸀ὑποστρέψαι ἐκ τῆς παραδοθείσης αὐτοῖς ἁγίας ἐντολῆς·
translation:
  text: For it would have been better for them not to have known the way of righteousness
    than, after knowing it, to turn back from the holy commandment delivered to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the path of righteousness'; δικαιοσύνη can also be rendered 'justice,'
      though 'righteousness' best fits the context here.
    reason: lexical_alternative
  - marker: b
    text: Or 'to return from' or 'to turn away from.'
    reason: lexical_alternative
  - marker: c
    text: Or 'handed down to them' for 'delivered to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖττον
  chosen: better
  alternatives:
  - preferable
  lexicon: BDAG
  rationale: Comparative adjective used idiomatically with ἦν to express what would
    have been preferable. 'Better' is natural modern English and preserves the comparative
    force.
- source_word: ἐπεγνωκέναι / ἐπιγνοῦσιν
  chosen: to have known / after knowing
  alternatives:
  - to have come to know / after coming to know
  - to have fully known / after fully knowing
  lexicon: BDAG
  rationale: The repeated ἐπιγινώσκω frames the comparison. English 'know' best fits
    readable modern style; 'come to know' is possible but heavier. The compound may
    imply fuller or more definite knowledge, but 'fully known' would overstate beyond
    what the context requires, so the nuance is left implicit.
- source_word: ὁδὸν τῆς δικαιοσύνης
  chosen: the way of righteousness
  alternatives:
  - the path of righteousness
  - the way of justice
  lexicon: BDAG
  rationale: ὁδός is metaphorical for a manner of life or course; 'way' is the most
    idiomatic biblical-English equivalent. δικαιοσύνη follows the project's default
    as 'righteousness'; 'justice' is lexically possible but less fitting in this Petrine
    moral context.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per DOCTRINE.md contested terms, δικαιοσύνη defaults to 'righteousness.'
    In this verse the sense is ethical rightness/the right way before God, not primarily
    social justice.
- source_word: ὑποστρέψαι
  chosen: to turn back
  alternatives:
  - to return
  - to turn away
  lexicon: BDAG
  rationale: The infinitive denotes reversal after prior knowledge. 'Turn back' captures
    the backward movement and apostasy-like force better than the more neutral 'return.'
    'Turn away' is interpretive and loses the explicit back-motion.
- source_word: ἐκ
  chosen: from
  alternatives:
  - away from
  - out of
  lexicon: BDAG
  rationale: With ὑποστρέψαι, ἐκ marks separation from what had been received. 'From'
    is the most natural English equivalent here.
- source_word: παραδοθείσης
  chosen: delivered
  alternatives:
  - handed down
  - entrusted
  - passed on
  lexicon: BDAG
  rationale: Passive participle from παραδίδωμι. 'Delivered' preserves the formal
    sense of something transmitted to them. 'Handed down' could suggest tradition-history
    more specifically than the verse requires; 'entrusted' adds a stewardship nuance
    not explicit here.
- source_word: ἁγίας ἐντολῆς
  chosen: the holy commandment
  alternatives:
  - the sacred commandment
  - the holy command
  lexicon: BDAG
  rationale: Singular ἐντολή should remain singular. 'Holy commandment' is straightforward
    and preserves the moral-religious weight of ἁγίας without paraphrase.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this verse as grounds for the preceding statement. 'For' is
    concise and preserves the explanatory relation.
- source_word: ἦν
  chosen: would have been
  alternatives:
  - was
  lexicon: BDAG
  rationale: Although formally imperfect, in this comparative construction with infinitives
    and the unreal past sense in context, English idiom requires 'would have been
    better' rather than a flat past 'was better.'
