theological_decisions:
- issue: Sense of Lot's moral description in relation to Genesis narrative
  chosen_reading: Retain the explicit description 'righteous Lot' without softening
    or qualifying it.
  alternative_readings:
  - Translate more neutrally as 'Lot, a righteous man'
  - Avoid the evaluative adjective because of interpretive discomfort with Lot's actions
    in Genesis
  rationale: The Greek text plainly applies δίκαιος to Lot, and the translation should
    preserve that theological assessment rather than harmonize it with readers' difficulties
    from Genesis. This preserves the text's own evaluative stance without importing
    further doctrinal explanation.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
