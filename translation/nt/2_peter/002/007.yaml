id: 2PE.2.7
reference: 2 Peter 2:7
source:
  edition: SBLGNT
  text: καὶ δίκαιον Λὼτ καταπονούμενον ὑπὸ τῆς τῶν ἀθέσμων ἐν ἀσελγείᾳ ἀναστροφῆς
    ἐρρύσατο—
translation:
  text: and he rescued righteous Lot, who was being tormented by the lawless in their
    sensual way of life—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was being oppressed' or 'was being distressed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'conduct' or 'behavior' for 'way of life.'
    reason: lexical_alternative
  - marker: c
    text: '''Sensual'' translates a term that can also be rendered ''licentious''
      or ''debauched,'' emphasizing shameless moral excess.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιον
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Predicate-like adjectival description of Lot's moral status; 'righteous'
    is the standard rendering in biblical English and aligns with the verse's evaluative
    force better than the less common 'just' in modern usage.
- source_word: Λὼτ
  chosen: Lot
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: καταπονούμενον
  chosen: was being tormented
  alternatives:
  - was being oppressed
  - was being worn down
  - was being distressed
  lexicon: BDAG
  rationale: The present passive participle conveys ongoing severe distress or harassment.
    'Was being tormented' preserves both the passive force and the intensity better
    than the milder 'distressed.'
- source_word: ὑπὸ τῆς ... ἀναστροφῆς
  chosen: by ... way of life
  alternatives:
  - by ... conduct
  - by ... behavior
  lexicon: BDAG
  rationale: The prepositional phrase marks the source/cause of Lot's torment. ἀναστροφή
    commonly denotes manner of life or conduct; 'way of life' is natural modern English
    and broad enough to include habitual conduct.
- source_word: τῶν ἀθέσμων
  chosen: the lawless
  alternatives:
  - the wicked
  - the unlawful
  lexicon: BDAG
  rationale: ἄθεσμος denotes those who disregard law or what is right/ordained. 'The
    lawless' is the most direct and preserves the term's moral-legal nuance.
- source_word: ἐν ἀσελγείᾳ
  chosen: in their sensual way of life
  alternatives:
  - in sensuality
  - in licentiousness
  - in debauchery
  lexicon: BDAG
  rationale: ἀσέλγεια denotes shameless sensual excess. Because it modifies ἀναστροφή,
    the phrase is best expressed in idiomatic English as 'their sensual way of life.'
    'Licentiousness' is precise but less accessible; 'debauchery' is possible but
    slightly narrower in tone.
- source_word: ἐρρύσατο
  chosen: he rescued
  alternatives:
  - he delivered
  lexicon: BDAG
  rationale: Aorist middle of ῥύομαι means to rescue or deliver from danger. 'Rescued'
    is clear, vivid, and natural in context.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple connective continuing the sequence from the previous verse; 'and'
    is sufficient and most natural.
