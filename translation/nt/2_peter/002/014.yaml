theological_decisions:
- issue: Whether to soften the sexual imagery in μοιχαλίδος
  chosen_reading: Preserve the concrete image 'an adulteress' in the main text
  alternative_readings:
  - Render interpretively as 'adultery'
  rationale: The verse is a moral denunciation, not a doctrinally contested passage,
    so the translation should not mute the Greek's sharp imagery for stylistic reasons.
    This follows the stated principle of original-language primacy over translation
    tradition.
  doctrine_reference: Translation philosophy §1
- issue: Whether to render πλεονεξία with the more traditional 'covetousness' or the
    more accessible 'greed'
  chosen_reading: greed
  alternative_readings:
  - covetousness
  rationale: No doctrinal distinction turns on the choice here. 'Greed' communicates
    clearly to modern readers while preserving the vice's moral force, consistent
    with readable modern English.
  doctrine_reference: Translation philosophy §6
