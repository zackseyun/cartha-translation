id: 2PE.2.14
reference: 2 Peter 2:14
source:
  edition: SBLGNT
  text: ὀφθαλμοὺς ἔχοντες μεστοὺς μοιχαλίδος καὶ ⸀ἀκαταπαύστους ἁμαρτίας, δελεάζοντες
    ψυχὰς ἀστηρίκτους, καρδίαν γεγυμνασμένην πλεονεξίας ἔχοντες, κατάρας τέκνα,
translation:
  text: having eyes full of an adulteress and insatiable for sin, enticing unstable
    souls, having a heart trained in greed, children of a curse,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'full of adultery' or 'full of adulterous desire.'
      The Greek is literally 'full of an adulteress,' a vivid idiom.
    reason: lexical_alternative
  - marker: b
    text: Or 'unable to cease from sin' or 'unceasing from sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεστοὺς μοιχαλίδος
  chosen: full of an adulteress
  alternatives:
  - full of adultery
  - full of adulterous desire
  lexicon: BDAG
  rationale: The Greek reads literally 'full of an adulteress' (genitive singular
    of μοιχαλίς), an intentionally vivid expression. Rather than smoothing to the
    traditional interpretive rendering 'full of adultery,' the translation preserves
    the concrete singular image in line with original-language primacy. Because English
    readers may find the idiom unusual, alternatives are preserved in a footnote.
- source_word: ἀκαταπαύστους ἁμαρτίας
  chosen: insatiable for sin
  alternatives:
  - unceasing from sin
  - unable to cease from sin
  lexicon: BDAG
  rationale: Although the phrase is literally 'unceasing of sin,' idiomatic English
    requires some adjustment. 'Insatiable for sin' captures the adjectival force modifying
    the implied persons through 'eyes' and conveys ongoing sinful appetite. The more
    formal alternatives are preserved in a footnote because they are common and plausible.
- source_word: δελεάζοντες
  chosen: enticing
  alternatives:
  - luring
  - baiting
  lexicon: BDAG
  rationale: The verb has the sense of luring or baiting, often with predatory overtones.
    'Enticing' is natural modern English while retaining the seducing sense.
- source_word: ψυχὰς ἀστηρίκτους
  chosen: unstable souls
  alternatives:
  - unsteady souls
  - unestablished souls
  lexicon: BDAG
  rationale: ψυχή here refers to persons/lives in a morally vulnerable sense; 'souls'
    is appropriate and traditional without being misleading. ἀστήρικτος means not
    firmly established or unstable.
- source_word: καρδίαν γεγυμνασμένην πλεονεξίας
  chosen: a heart trained in greed
  alternatives:
  - a heart exercised in greed
  - a heart trained in covetousness
  lexicon: BDAG
  rationale: γεγυμνασμένην evokes training or exercise; 'trained' is vivid and readable.
    πλεονεξία can mean greed or covetousness; 'greed' is more accessible modern English
    and fits the vice list context.
- source_word: κατάρας τέκνα
  chosen: children of a curse
  alternatives:
  - accursed children
  - children under a curse
  lexicon: BDAG
  rationale: The genitive construction is preserved as 'children of a curse,' a Semitic-like
    idiom meaning people characterized by or destined for curse. This keeps the force
    of the Greek better than the flatter adjectival 'accursed.'
- source_word: ἔχοντες ... ἔχοντες
  chosen: having ... having
  alternatives:
  - with ... with
  lexicon: BDAG
  rationale: The repeated participles structure Peter's piling denunciation. Retaining
    'having' in English preserves some of the rhetorical accumulation, though the
    sentence remains idiomatic.
