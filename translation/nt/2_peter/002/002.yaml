theological_decisions:
- issue: Referent and force of 'the way of the truth'
  chosen_reading: An early Christian designation for the true faith/way of life, rendered
    literally as 'the way of the truth.'
  alternative_readings:
  - 'A more idiomatic expression for Christianity: ''the way of truth'''
  - 'A qualitative paraphrase: ''the true way'''
  rationale: The phrase likely refers to the Christian message and life that corresponds
    to truth. A literal rendering preserves the metaphor and avoids collapsing it
    into a narrower doctrinal slogan or paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Moral scope of ἀσέλγεια
  chosen_reading: Rendered as 'sensuality' to preserve broad moral and sexual shamelessness.
  alternative_readings:
  - '''debauchery'''
  - '''licentiousness'''
  rationale: The term includes sexual excess but can also denote broader shameless
    self-indulgence. 'Sensuality' is accessible and serious without importing a narrower
    doctrinal category.
  doctrine_reference: Translation philosophy §§1, 6
