id: 2PE.2.2
reference: 2 Peter 2:2
source:
  edition: SBLGNT
  text: καὶ πολλοὶ ἐξακολουθήσουσιν αὐτῶν ταῖς ἀσελγείαις, δι’ οὓς ἡ ὁδὸς τῆς ἀληθείας
    βλασφημηθήσεται·
translation:
  text: And many will follow their sensuality, and because of them the way of the
    truth will be blasphemed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'debauchery,' 'licentiousness,' or 'lewdness.' The Greek term denotes
      shameless, unrestrained conduct, often with sexual overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'the way of truth.' This phrase likely refers to the Christian faith
      and manner of life as the true way.
    reason: lexical_alternative
  - marker: c
    text: Or 'will be reviled' or 'will be spoken against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - multitudes
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural and sufficiently
    weighty English rendering.
- source_word: ἐξακολουθήσουσιν
  chosen: will follow
  alternatives:
  - will follow after
  - will imitate
  lexicon: BDAG
  rationale: Future active of ἐξακολουθέω means to follow after or follow in the path
    of. 'Will follow' is clear modern English and preserves the predictive force without
    over-paraphrase.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - them
  - those men
  lexicon: BDAG
  rationale: 'Genitive plural pronoun linked with the false teachers in context. Rendering
    with possessive ''their'' in English naturally connects the following dative noun
    phrase: ''their sensuality.'''
- source_word: ταῖς ἀσελγείαις
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  - lewdness
  lexicon: BDAG
  rationale: ἀσέλγεια denotes shameless, unrestrained sexual or moral excess. 'Sensuality'
    is readable modern English and broad enough to cover the vice term without narrowing
    it to only one manifestation. Singular in English is idiomatic though the Greek
    is plural.
- source_word: δι’ οὓς
  chosen: because of them
  alternatives:
  - through whom
  - because of whom
  lexicon: BDAG
  rationale: 'διά with accusative here expresses cause/result: ''because of whom.''
    Since the referent is plural persons, ''because of them'' is idiomatic and clear.'
- source_word: ἡ ὁδὸς τῆς ἀληθείας
  chosen: the way of the truth
  alternatives:
  - the way of truth
  - the true way
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitival construction and likely
    early Christian idiom for the Christian faith or manner of life aligned with truth.
    'The way of truth' is smoother English, but 'the way of the truth' more transparently
    reflects the Greek articles and keeps the phrase's theological weight.
- source_word: βλασφημηθήσεται
  chosen: will be blasphemed
  alternatives:
  - will be slandered
  - will be reviled
  - will be spoken against
  lexicon: BDAG
  rationale: Future passive of βλασφημέω. 'Blasphemed' is the most direct formal equivalent
    and fits the gravity of abusive speech against what is sacred. Because the object
    is 'the way of the truth,' the term extends beyond casual slander.
