theological_decisions:
- issue: Rendering of moral-path imagery in εὐθεῖαν ὁδὸν / τῇ ὁδῷ
  chosen_reading: Retain 'way' language rather than interpretive paraphrase such as 'true path' or 'moral course.'
  alternative_readings:
  - the right path
  - the true way
  rationale: The verse uses established biblical path imagery for moral deviation. Preserving 'way' maintains the metaphor and avoids importing a more interpretive gloss than the Greek requires.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Identification of Βοσόρ
  chosen_reading: Translate as 'Bosor' in the main text while preserving the familiar alternative 'Beor' in a footnote.
  alternative_readings:
  - Beor
  rationale: The Greek text reads Βοσόρ, so original-language primacy favors reflecting that form in the main text. Because readers will recognize the OT figure as Balaam son of Beor (Num 22:5; 24:3), the alternative should be preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 3
revisions:
- timestamp: '2026-04-21T02:19:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/2_peter/002/015.json
  category: awkward_english
  tier: 1
  from: they went astray, having followed
  to: they went astray by following
  rationale: The Greek aorist participle ἐξακολουθήσαντες likely expresses the means by which the main action (ἐπλανήθησαν, 'they went astray') occurred. The current rendering 'having followed' is formally correct but creates a slightly clunky English sentence and presents the action as merely subsequent or attendant. Using 'by following' makes the instrumental relationship explicit, improves the sentence's flow, and better captures the logical connection between the two clauses.
