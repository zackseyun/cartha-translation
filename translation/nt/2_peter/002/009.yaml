id: 2PE.2.9
reference: 2 Peter 2:9
source:
  edition: SBLGNT
  text: οἶδεν κύριος εὐσεβεῖς ἐκ πειρασμοῦ ῥύεσθαι, ἀδίκους δὲ εἰς ἡμέραν κρίσεως
    κολαζομένους τηρεῖν,
translation:
  text: then the Lord knows how to rescue the godly from trial, and to keep the unrighteous
    under punishment for the day of judgment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from temptation." The Greek word can mean either temptation or trial/testing;
      here the context favors deliverance from trial.
    reason: lexical_alternative
  - marker: b
    text: Or "to keep the unrighteous for the day of judgment to be punished"; the
      Greek participle may be taken as describing ongoing punishment or punishment
      associated with the coming judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: οἶδεν
  chosen: knows how
  alternatives:
  - knows
  - has known how
  lexicon: BDAG
  rationale: 'οἶδα functions with an infinitive construction here to express capability
    or practical knowledge: ''knows how to rescue ... and to keep ...''. English ''knows
    how'' best captures the idiom.'
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Definite article is natural in English here. Per doctrine defaults, κύριος
    is rendered 'Lord' rather than alternatives such as 'Master'.
- source_word: εὐσεβεῖς
  chosen: the godly
  alternatives:
  - godly people
  - the devout
  lexicon: BDAG
  rationale: The adjective used substantivally refers to people characterized by piety/devotion.
    'The godly' is concise, natural, and preserves the moral-religious sense.
- source_word: ἐκ πειρασμοῦ
  chosen: from trial
  alternatives:
  - from temptation
  - out of testing
  lexicon: BDAG
  rationale: πειρασμός can mean temptation or testing/trial. In this context, recalling
    Noah and Lot as examples of deliverance from adverse circumstances, 'trial' better
    fits than inward 'temptation' while still allowing broad application.
- source_word: ῥύεσθαι
  chosen: to rescue
  alternatives:
  - to deliver
  lexicon: BDAG
  rationale: ῥύομαι denotes deliverance from danger. 'Rescue' is vivid, idiomatic
    modern English and fits the context of divine preservation.
- source_word: ἀδίκους
  chosen: the unrighteous
  alternatives:
  - the unjust
  - wrongdoers
  lexicon: BDAG
  rationale: '''The unrighteous'' preserves the moral and judicial force of ἄδικος
    and aligns with common biblical usage.'
- source_word: εἰς ἡμέραν κρίσεως
  chosen: for the day of judgment
  alternatives:
  - until the day of judgment
  - for judgment day
  lexicon: BDAG
  rationale: εἰς with this expression points forward to the coming day. 'For the day
    of judgment' is a natural rendering that preserves the future orientation without
    over-specifying temporal nuance.
- source_word: κολαζομένους
  chosen: under punishment
  alternatives:
  - being punished
  - while being punished
  - for punishment
  lexicon: BDAG
  rationale: The present participle most naturally describes the unrighteous as presently
    in a state of punishment while being kept for final judgment. 'Under punishment'
    captures the durative/state sense in idiomatic English.
- source_word: τηρεῖν
  chosen: to keep
  alternatives:
  - to hold
  - to reserve
  lexicon: BDAG
  rationale: τηρέω commonly means keep, guard, preserve, or reserve. 'Keep' is broad
    and natural here, allowing the participle κολαζομένους to supply the punitive
    nuance.
