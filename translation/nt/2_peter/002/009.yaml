theological_decisions:
- issue: Meaning of πειρασμός in context
  chosen_reading: trial/testing rather than specifically temptation
  alternative_readings:
  - temptation
  rationale: The verse summarizes examples of divine rescue from catastrophic judgment
    and oppressive circumstances in the preceding context. Rendering πειρασμός as
    'trial' avoids narrowing the sense to inward enticement to sin and better matches
    the contextual emphasis on deliverance.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of κολαζομένους
  chosen_reading: present state of punishment prior to final judgment
  alternative_readings:
  - reserved for punishment at the day of judgment
  rationale: 'The present participle is best represented rather than flattened away.
    This preserves the text''s tension: the unrighteous are kept with punishment in
    view of the final day, without forcing a full doctrinal scheme about intermediate-state
    judgment beyond what the Greek states.'
  doctrine_reference: Translation philosophy §3
