id: 2PE.2.4
reference: 2 Peter 2:4
source:
  edition: SBLGNT
  text: Εἰ γὰρ ὁ θεὸς ἀγγέλων ἁμαρτησάντων οὐκ ἐφείσατο, ἀλλὰ ⸀σειραῖς ζόφου ταρταρώσας
    παρέδωκεν εἰς κρίσιν τηρουμένους,
translation:
  text: For if God did not spare angels when they sinned, but cast them into Tartarus
    and committed them to chains of gloom, being kept for judgment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "cast them into hell." The Greek verb specifically means to consign
      to Tartarus, so the main text preserves that more exact term.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read "pits of gloom/darkness" instead of "chains of gloom."
    reason: textual_variant
lexical_decisions:
- source_word: ἐφείσατο
  chosen: did not spare
  alternatives:
  - did not refrain from punishing
  - did not have pity on
  lexicon: BDAG
  rationale: Standard idiomatic rendering of φείδομαι in judicial/punitive contexts;
    preserves the force of withholding mercy.
- source_word: ἀγγέλων ἁμαρτησάντων
  chosen: angels when they sinned
  alternatives:
  - angels who sinned
  - sinning angels
  lexicon: BDAG
  rationale: The genitive participial construction is naturally rendered as a temporal-relative
    clause in English. 'When they sinned' preserves the aorist participle's eventive
    force without awkwardness.
- source_word: σειραῖς ζόφου
  chosen: to chains of gloom
  alternatives:
  - in chains of gloomy darkness
  - to chains of darkness
  lexicon: BDAG
  rationale: σειραῖς is best taken as 'chains' and ζόφου as 'of gloom/darkness.' 'Gloom'
    preserves the somber, underworld nuance of ζόφος and avoids flattening it to ordinary
    darkness. The prepositional force is supplied in English with 'to' after 'committed
    them.'
- source_word: ταρταρώσας
  chosen: cast them into Tartarus
  alternatives:
  - cast them into hell
  - threw them into the abyss
  lexicon: BDAG
  rationale: The verb ταρταρόω specifically evokes Tartarus from Greek usage, not
    the more general concept 'hell.' Translating rather than paraphrasing preserves
    the source-text specificity and the mythic/judgment imagery Peter employs.
- source_word: παρέδωκεν
  chosen: committed them
  alternatives:
  - handed them over
  - delivered them
  lexicon: BDAG
  rationale: In judicial contexts παραδίδωμι often means to hand over into custody.
    'Committed them' fits the following phrase about confinement and judgment.
- source_word: εἰς κρίσιν
  chosen: for judgment
  alternatives:
  - unto judgment
  - for condemnation
  lexicon: BDAG
  rationale: κρίσις here denotes impending judgment, not necessarily the verdict alone.
    'For judgment' is concise and natural.
- source_word: τηρουμένους
  chosen: being kept
  alternatives:
  - being held
  - reserved
  lexicon: BDAG
  rationale: The present passive participle indicates an ongoing state of custody
    pending judgment. 'Being kept' preserves that durative passive sense.
- source_word: ζόφου
  chosen: gloom
  alternatives:
  - darkness
  - black darkness
  lexicon: BDAG
  rationale: ζόφος often carries the sense of murky, oppressive darkness. 'Gloom'
    is readable modern English while retaining the term's weight.
