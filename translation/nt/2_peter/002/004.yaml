theological_decisions:
- issue: Rendering ταρταρώσας in a way that does not import later doctrinal specificity
    beyond the Greek term
  chosen_reading: cast them into Tartarus
  alternative_readings:
  - cast them into hell
  rationale: The Greek uses the rare verb ταρταρόω, which specifically refers to consigning
    to Tartarus. Rendering it as 'hell' would generalize and potentially import later
    theological associations not explicit in the text. Retaining 'Tartarus' preserves
    the text's imagery while remaining within orthodox bounds.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension rather than resolve it)
- issue: Relationship of 'chains of gloom' to 'Tartarus' and the participle τηρουμένους
  chosen_reading: God cast them into Tartarus and committed them to chains of gloom,
    being kept for judgment
  alternative_readings:
  - God cast them into Tartarus in chains of gloom to be kept for judgment
  rationale: The Greek syntax allows close connection among the participle ταρταρώσας,
    the dative phrase σειραῖς ζόφου, and τηρουμένους. The chosen English keeps all
    elements without over-resolving whether the chains are metaphorical, locative,
    or instrumental. This preserves the compressed Greek imagery.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
