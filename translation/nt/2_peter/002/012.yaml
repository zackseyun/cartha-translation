id: 2PE.2.12
reference: 2 Peter 2:12
source:
  edition: SBLGNT
  text: οὗτοι δέ, ὡς ἄλογα ζῷα ⸂γεγεννημένα φυσικὰ⸃ εἰς ἅλωσιν καὶ φθοράν, ἐν οἷς
    ἀγνοοῦσιν βλασφημοῦντες, ἐν τῇ φθορᾷ αὐτῶν ⸂καὶ φθαρήσονται⸃,
translation:
  text: But these, like irrational animals—creatures of instinct, born for capture
    and destruction—blaspheming about things they do not understand, will also be
    destroyed in their destruction,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unreasoning animals.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'born natural'; the phrase means creatures governed by instinct
      or nature.
    reason: lexical_alternative
  - marker: c
    text: Or 'reviling about things they do not know.'
    reason: lexical_alternative
  - marker: d
    text: The Greek repeats related words for 'destruction'/'be destroyed,' preserving
      a wordplay between ruin and perishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλογα ζῷα
  chosen: irrational animals
  alternatives:
  - unreasoning animals
  - senseless animals
  lexicon: BDAG
  rationale: ἄλογα with ζῷα denotes animals lacking reason, not merely speechless
    creatures. 'Irrational animals' is natural modern English and preserves the contrast
    with moral rationality.
- source_word: γεγεννημένα φυσικὰ
  chosen: creatures of instinct
  alternatives:
  - natural creatures
  - born natural
  - creatures by nature
  lexicon: BDAG
  rationale: The participle-adjective combination is compressed in Greek. A highly
    literal rendering ('born natural') is awkward in English. 'Creatures of instinct'
    captures φυσικά as governed by natural impulse rather than reason, while still
    reflecting the birth imagery of γεγεννημένα in the broader phrase.
- source_word: εἰς ἅλωσιν καὶ φθοράν
  chosen: born for capture and destruction
  alternatives:
  - for capture and ruin
  - to be caught and destroyed
  lexicon: BDAG
  rationale: εἰς marks purpose/result. ἅλωσις is 'capture' or 'being caught'; φθορά
    here carries the sense of destruction/ruin. The phrase modifies the animal comparison
    and is best brought into idiomatic English as part of the preceding description.
- source_word: ἐν οἷς ἀγνοοῦσιν
  chosen: about things they do not understand
  alternatives:
  - in matters they are ignorant of
  - concerning what they do not know
  lexicon: BDAG
  rationale: The relative pronoun is neuter plural and likely refers to matters/topics
    rather than persons. 'Do not understand' is slightly fuller than 'do not know'
    and fits the polemical context of ignorant speech.
- source_word: βλασφημοῦντες
  chosen: blaspheming
  alternatives:
  - reviling
  - slandering
  lexicon: BDAG
  rationale: βλασφημέω can denote abusive or slanderous speech. 'Blaspheming' preserves
    the stronger term used by the Greek and leaves open whether the objects are heavenly
    beings or sacred matters from context.
- source_word: ἐν τῇ φθορᾷ αὐτῶν
  chosen: in their destruction
  alternatives:
  - in their corruption
  - by their corruption
  lexicon: BDAG
  rationale: φθορά can mean either moral corruption or physical destruction. In this
    verse, because φθαρήσονται follows and the earlier phrase also uses φθορά in the
    sense of ruin, 'destruction' best preserves the wordplay and immediate context.
- source_word: καὶ φθαρήσονται
  chosen: will also be destroyed
  alternatives:
  - will certainly perish
  - will be corrupted also
  lexicon: BDAG
  rationale: Future passive of φθείρω here most naturally means 'be destroyed/perish.'
    'Also' reflects καί and links their fate to the destruction just mentioned.
