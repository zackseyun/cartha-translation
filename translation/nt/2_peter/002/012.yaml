theological_decisions:
- issue: Sense of βλασφημοῦντες in context
  chosen_reading: Retain the stronger term 'blaspheming' rather than softening to
    'reviling.'
  alternative_readings:
  - reviling
  - slandering
  rationale: The text condemns impious speech with a term that can include slander
    but is stronger than ordinary insult. Keeping 'blaspheming' avoids minimizing
    the severity while not specifying an object beyond what the Greek states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of φθορά / φθαρήσονται
  chosen_reading: Render the cluster with 'destruction' language rather than moral
    'corruption.'
  alternative_readings:
  - corruption
  - ruin
  rationale: The verse uses a deliberate wordplay, but the immediate imagery of animals
    caught and destroyed favors physical ruin/judgment over merely moral decay. This
    preserves the warning without importing a more specific doctrinal claim.
  doctrine_reference: Translation philosophy §1, §5
