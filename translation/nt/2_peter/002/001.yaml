id: 2PE.2.1
reference: 2 Peter 2:1
source:
  edition: SBLGNT
  text: Ἐγένοντο δὲ καὶ ψευδοπροφῆται ἐν τῷ λαῷ, ὡς καὶ ἐν ὑμῖν ἔσονται ψευδοδιδάσκαλοι,
    οἵτινες παρεισάξουσιν αἱρέσεις ἀπωλείας, καὶ τὸν ἀγοράσαντα αὐτοὺς δεσπότην ἀρνούμενοι,
    ἐπάγοντες ἑαυτοῖς ταχινὴν ἀπώλειαν·
translation:
  text: But false prophets also arose among the people, just as there will also be
    false teachers among you, who will secretly bring in destructive heresies, even
    denying the Master who bought them, bringing swift destruction on themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destructive factions.' The Greek word can denote parties or sects, but
      here likely refers to teachings or movements that lead to destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord who redeemed them.' The Greek says 'the Master who bought them,'
      preserving a purchase metaphor without resolving broader theological debates
      about its scope.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγένοντο
  chosen: arose
  alternatives:
  - came to be
  - appeared
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι here introduces the historical emergence of
    false prophets. 'Arose' is idiomatic English and preserves the sense of appearing
    within the community better than the wooden 'came to be'.
- source_word: ψευδοπροφῆται
  chosen: false prophets
  lexicon: BDAG
  rationale: Standard and transparent rendering of the compound noun; no reason to
    soften or paraphrase.
- source_word: ἐν τῷ λαῷ
  chosen: among the people
  alternatives:
  - among the people of Israel
  - in the people
  lexicon: BDAG
  rationale: ἐν with dative here is associative/location within a community. 'The
    people' reflects the likely covenant people in view without over-specifying 'Israel'
    in the main text, though that is contextually implied from the OT comparison.
- source_word: ὡς καὶ ἐν ὑμῖν ἔσονται
  chosen: just as there will also be among you
  alternatives:
  - so also among you there will be
  - even among you there will be
  lexicon: BDAG
  rationale: This preserves the comparison between past false prophets and future
    false teachers in Peter's audience, with natural English word order.
- source_word: ψευδοδιδάσκαλοι
  chosen: false teachers
  lexicon: BDAG
  rationale: Direct rendering of the compound noun, matching the parallel with 'false
    prophets'.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - such men as
  - the sort who
  lexicon: BDAG
  rationale: The relative pronoun has a qualitative nuance, but simple 'who' is sufficient
    in readable English; the following verbs carry the characterization.
- source_word: παρεισάξουσιν
  chosen: will secretly bring in
  alternatives:
  - will introduce secretly
  - will smuggle in
  lexicon: BDAG
  rationale: The verb carries the idea of introducing something alongside or by stealth.
    'Will secretly bring in' preserves both the future action and the covert nuance
    without slang.
- source_word: αἱρέσεις ἀπωλείας
  chosen: destructive heresies
  alternatives:
  - heresies of destruction
  - destructive factions
  lexicon: BDAG
  rationale: 'The genitive ἀπωλείας is taken attributively/resultatively: heresies
    characterized by or leading to destruction. ''Destructive heresies'' is idiomatic
    and preserves the serious theological force. ''Factions'' is possible for αἵρεσις
    in some contexts, but here doctrinally deviant teachings are in view.'
- source_word: τὸν ... δεσπότην
  chosen: the Master
  alternatives:
  - the Lord
  - the sovereign Master
  lexicon: BDAG
  rationale: δεσπότης is not κύριος and is best rendered 'Master' to preserve the
    lexical distinction and the authority implied. This also aligns with the translation
    philosophy of translating titles by meaning.
- source_word: ἀγοράσαντα αὐτοὺς
  chosen: who bought them
  alternatives:
  - who redeemed them
  - who purchased them
  lexicon: BDAG
  rationale: ἀγοράζω literally means 'buy/purchase.' 'Bought' keeps the commercial
    metaphor and avoids importing a fuller doctrinal interpretation into the verb
    itself. 'Redeemed' is more interpretive and should not replace the source metaphor
    in the main text.
- source_word: ἀρνούμενοι
  chosen: denying
  alternatives:
  - disowning
  - rejecting
  lexicon: BDAG
  rationale: 'Present participle expressing attendant manner or means: they bring
    in heresies while denying the Master. ''Denying'' is the most direct and theologically
    weighty equivalent.'
- source_word: ἐπάγοντες ἑαυτοῖς
  chosen: bringing on themselves
  alternatives:
  - bringing upon themselves
  - incurring for themselves
  lexicon: BDAG
  rationale: The participle indicates consequence resulting from their actions. 'Bringing
    on themselves' is natural modern English and preserves reflexive force.
- source_word: ταχινὴν ἀπώλειαν
  chosen: swift destruction
  alternatives:
  - sudden destruction
  - speedy ruin
  lexicon: BDAG
  rationale: ταχινή emphasizes quickness/imminence. 'Swift destruction' is concise
    and traditional without being archaic; it pairs well with the earlier ἀπώλεια
    language.
