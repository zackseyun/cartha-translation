theological_decisions:
- issue: Meaning of αἱρέσεις in this context
  chosen_reading: heresies
  alternative_readings:
  - factions
  - sects
  rationale: Although αἵρεσις can denote a party or sect, in this context the phrase
    is tied to covert introduction and denial of the Master, so doctrinally destructive
    teaching is foregrounded. 'Heresies' best captures the sense without flattening
    the warning into mere social division.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent and force of τὸν ἀγοράσαντα αὐτοὺς δεσπότην
  chosen_reading: the Master who bought them
  alternative_readings:
  - the Lord who redeemed them
  - the sovereign who purchased them
  rationale: The text states that these false teachers deny 'the Master who bought
    them.' The translation preserves the wording and theological tension without resolving
    debates about the extent or nature of the purchase. 'Bought' is retained rather
    than a doctrinally narrower paraphrase such as 'redeemed.'
  doctrine_reference: Translation philosophy §3
- issue: Rendering δεσπότης distinctly from κύριος
  chosen_reading: Master
  alternative_readings:
  - Lord
  - Sovereign
  rationale: Because the Greek uses δεσπότης rather than κύριος, the translation preserves
    that distinction. This avoids collapsing separate titles and maintains lexical
    transparency.
  doctrine_reference: Translation philosophy §2, §5
