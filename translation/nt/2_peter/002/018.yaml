id: 2PE.2.18
reference: 2 Peter 2:18
source:
  edition: SBLGNT
  text: ὑπέρογκα γὰρ ματαιότητος φθεγγόμενοι δελεάζουσιν ἐν ἐπιθυμίαις σαρκὸς ἀσελγείαις
    τοὺς ⸀ὀλίγως ⸀ἀποφεύγοντας τοὺς ἐν πλάνῃ ἀναστρεφομένους,
translation:
  text: For, speaking inflated words of emptiness, they entice by fleshly desires,
    by sensuality, those who are barely escaping from those who live in error,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speaking boastful words of emptiness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by desires of the flesh'; the Greek σάρξ here is rendered metaphorically
      in a moral sense as 'fleshly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those who are just now escaping from those who live in error.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπέρογκα
  chosen: inflated words
  alternatives:
  - arrogant things
  - boastful words
  - swollen words
  lexicon: BDAG
  rationale: The adjective denotes something excessive, pompous, or overblown. Because
    it functions with φθεγγόμενοι ('speaking/uttering'), English idiom is best captured
    by supplying 'words' and rendering the sense as 'inflated words.'
- source_word: ματαιότητος
  chosen: of emptiness
  alternatives:
  - of vanity
  - of futility
  - empty
  lexicon: BDAG
  rationale: 'The genitive qualifies the content or character of the speech: it is
    empty, futile, devoid of substance. ''Of emptiness'' preserves the genitival linkage
    while remaining natural in English.'
- source_word: φθεγγόμενοι
  chosen: speaking
  alternatives:
  - uttering
  - voicing
  lexicon: BDAG
  rationale: A participle describing the manner in which they entice. 'Speaking' is
    the most natural modern English equivalent; 'uttering' is possible but less readable.
- source_word: δελεάζουσιν
  chosen: they entice
  alternatives:
  - they lure
  - they bait
  lexicon: BDAG
  rationale: The verb carries the sense of luring as with bait. 'Entice' preserves
    the moral and seductive force without becoming overly idiomatic.
- source_word: ἐν ἐπιθυμίαις σαρκὸς
  chosen: by fleshly desires
  alternatives:
  - in desires of the flesh
  - by desires of the flesh
  lexicon: BDAG
  rationale: 'Here ἐν is instrumental or means-related: they entice by means of such
    desires. Because σάρξ here refers not to literal flesh but to fallen bodily appetites,
    ''fleshly desires'' is concise and natural while preserving the source concept.'
- source_word: σάρξ
  chosen: fleshly
  alternatives:
  - of the flesh
  - sinful
  lexicon: BDAG
  rationale: Per project guidance, σάρξ may be rendered 'flesh' literally or according
    to metaphorical context. Here it modifies desires in a moral context, so 'fleshly'
    preserves the metaphor without over-interpreting as 'sinful nature.'
- source_word: ἀσελγείαις
  chosen: by sensuality
  alternatives:
  - by debauchery
  - by licentiousness
  - by sensual acts
  lexicon: BDAG
  rationale: The term denotes unrestrained sensual conduct. Singular English 'sensuality'
    works well as an abstract means alongside 'desires,' though the Greek dative plural
    is preserved in sense rather than number.
- source_word: ὀλίγως
  chosen: barely
  alternatives:
  - just now
  - for a little while
  - slightly
  lexicon: BDAG
  rationale: The adverb most naturally modifies ἀποφεύγοντας and indicates that these
    people are only just escaping or scarcely escaping. 'Barely' captures that precarious
    state clearly.
- source_word: ἀποφεύγοντας
  chosen: escaping
  alternatives:
  - fleeing from
  - getting away from
  lexicon: BDAG
  rationale: Present participle indicating those in the process of escaping. 'Escaping'
    is straightforward and preserves the ongoing aspect.
- source_word: τοὺς ἐν πλάνῃ ἀναστρεφομένους
  chosen: those who live in error
  alternatives:
  - those who conduct themselves in error
  - those who wander in error
  - those living in deception
  lexicon: BDAG
  rationale: ἀναστρέφω in the middle/passive can denote one's way of life or conduct;
    πλάνη is error/deception. 'Those who live in error' communicates habitual conduct
    in a state of moral/spiritual error in idiomatic English.
