theological_decisions:
- issue: Meaning of σάρξ in a moral context
  chosen_reading: Rendered metaphorically as 'fleshly' rather than literally 'flesh'
    or more interpretive 'sinful nature.'
  alternative_readings:
  - of the flesh
  - sinful nature
  rationale: The context is moral seduction through illicit desires. 'Fleshly' preserves
    the Greek metaphor and theological texture without importing a more systematized
    doctrinal category such as 'sinful nature.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
- issue: Referent of those being enticed
  chosen_reading: Those 'barely escaping' from people who live in error.
  alternative_readings:
  - those who have truly escaped from those who live in error
  - those who are escaping from error itself
  rationale: The syntax most naturally takes τοὺς ἐν πλάνῃ ἀναστρεφομένους as the
    group from whom the victims are escaping. Rendering 'barely escaping from those
    who live in error' preserves the precariousness and avoids overstating whether
    the escape is complete or saving in a theological sense.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
