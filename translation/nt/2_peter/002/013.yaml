theological_decisions:
- issue: Textual variant at ἀπάταις / ἀγάπαις
  chosen_reading: ἀπάταις rendered 'their deceptions' in the main text
  alternative_readings:
  - ἀγάπαις rendered 'love feasts'
  rationale: The provided SBLGNT text reads ἀπάταις, and this reading coheres with
    the immediate emphasis on deceitful false teachers. Because ἀγάπαις is a meaningful
    alternative with interpretive significance, it is preserved in a footnote rather
    than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension/alternatives
    in footnotes where meaningful)
