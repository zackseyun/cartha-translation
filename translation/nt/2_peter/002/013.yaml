id: 2PE.2.13
reference: 2 Peter 2:13
source:
  edition: SBLGNT
  text: ⸀ἀδικούμενοι μισθὸν ἀδικίας· ἡδονὴν ἡγούμενοι τὴν ἐν ἡμέρᾳ τρυφήν, σπίλοι
    καὶ μῶμοι ἐντρυφῶντες ἐν ταῖς ⸀ἀπάταις αὐτῶν συνευωχούμενοι ὑμῖν,
translation:
  text: suffering the wages of unrighteousness, considering daytime indulgence a pleasure.
    They are stains and blemishes, reveling in their deceptions while feasting with
    you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts read ''love feasts'' instead of ''deceptions'': ''reveling
      in their love feasts while feasting with you.'''
    reason: textual_variant
  - marker: b
    text: Or 'the reward of wrongdoing' for 'the wages of unrighteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικούμενοι
  chosen: suffering
  alternatives:
  - being wronged
  - receiving back
  lexicon: BDAG
  rationale: In context this participle expresses recompense or penalty received,
    not merely being treated unjustly by others. Rendering it as 'suffering' captures
    the sense of undergoing the consequence introduced by 'wages of unrighteousness.'
- source_word: μισθὸν ἀδικίας
  chosen: the wages of unrighteousness
  alternatives:
  - the reward of wrongdoing
  - the wages of injustice
  lexicon: BDAG
  rationale: μισθός is 'wages/reward'; ἀδικία can mean wrongdoing, unrighteousness,
    or injustice. 'Wages of unrighteousness' preserves the genitive structure and
    moral force while echoing biblical idiom about recompense.
- source_word: ἡδονὴν ἡγούμενοι
  chosen: considering ... a pleasure
  alternatives:
  - counting ... delight
  - thinking ... enjoyment
  lexicon: BDAG
  rationale: ἡγέομαι with a predicate accusative means 'consider/regard as.' ἡδονή
    is 'pleasure.' This yields a natural but close rendering.
- source_word: τὴν ἐν ἡμέρᾳ τρυφήν
  chosen: daytime indulgence
  alternatives:
  - luxury in the daytime
  - revelry in broad daylight
  lexicon: BDAG
  rationale: τρυφή denotes luxurious self-indulgence or reveling. The phrase ἐν ἡμέρᾳ
    is literally 'in the day/daytime,' likely stressing shamelessness. 'Daytime indulgence'
    is concise and preserves that force.
- source_word: σπίλοι καὶ μῶμοι
  chosen: stains and blemishes
  alternatives:
  - spots and blemishes
  - blots and defects
  lexicon: BDAG
  rationale: Both nouns are terms of moral defilement/disgrace. 'Stains and blemishes'
    is idiomatic modern English and preserves the paired imagery, likely contrasting
    with the language of purity.
- source_word: ἐντρυφῶντες
  chosen: reveling
  alternatives:
  - luxuriating
  - indulging themselves
  lexicon: BDAG
  rationale: The participle continues the theme of self-indulgent excess. 'Reveling'
    fits the moral tone and links naturally with the surrounding language.
- source_word: ἀπάταις αὐτῶν
  chosen: their deceptions
  alternatives:
  - their deceits
  - their pleasures
  lexicon: BDAG
  rationale: The best-supported reading here is ἀπάταις ('deceptions/deceits'), not
    ἀγάπαις ('love feasts'). 'Their deceptions' fits the false-teacher context and
    explains the corrupt character of their conduct.
- source_word: συνευωχούμενοι ὑμῖν
  chosen: while feasting with you
  alternatives:
  - as they feast with you
  - sharing your meals with you
  lexicon: BDAG
  rationale: The verb means to feast together or carouse together. 'While feasting
    with you' preserves the contemporaneous participial sense and the social setting
    without over-specifying the meal.
