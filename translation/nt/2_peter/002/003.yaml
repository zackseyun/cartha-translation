id: 2PE.2.3
reference: 2 Peter 2:3
source:
  edition: SBLGNT
  text: καὶ ἐν πλεονεξίᾳ πλαστοῖς λόγοις ὑμᾶς ἐμπορεύσονται· οἷς τὸ κρίμα ἔκπαλαι
    οὐκ ἀργεῖ, καὶ ἡ ἀπώλεια αὐτῶν οὐ ⸀νυστάζει.
translation:
  text: And in greed they will exploit you with fabricated words. Their judgment from
    long ago is not idle, and their destruction is not asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will make merchandise of you'—the Greek uses a commercial metaphor
      for profiting from people.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεονεξίᾳ
  chosen: in greed
  alternatives:
  - out of greed
  - with greed
  - in covetousness
  lexicon: BDAG
  rationale: πλεονεξία denotes greed/covetousness, here expressing the sphere or motive
    in which the false teachers act. 'In greed' is concise and natural while preserving
    the moral force.
- source_word: πλαστοῖς λόγοις
  chosen: with fabricated words
  alternatives:
  - with false words
  - with made-up stories
  - with deceptive words
  lexicon: BDAG
  rationale: πλαστός means molded, fabricated, invented; with λόγοις it refers to
    contrived speech rather than merely generic falsehood. 'Fabricated words' preserves
    the sense of manufactured teaching or claims.
- source_word: ἐμπορεύσονται
  chosen: they will exploit you
  alternatives:
  - they will make merchandise of you
  - they will trade on you
  - they will profit from you
  lexicon: BDAG
  rationale: The commercial metaphor of ἐμπορεύομαι is used figuratively here for
    treating people as objects of profit. 'Exploit you' communicates the sense clearly
    in modern English; the more literal 'make merchandise of you' is preserved in
    a footnote-worthy alternative.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: BDAG
  rationale: κρίμα here refers to the judicial verdict or punishment awaiting the
    false teachers. 'Judgment' is broad enough to preserve the legal sense without
    over-specifying condemnation as the only nuance.
- source_word: ἔκπαλαι
  chosen: from long ago
  alternatives:
  - long ago
  - from of old
  lexicon: BDAG
  rationale: ἔκπαλαι emphasizes that the judgment has been set in place since ancient
    time. 'From long ago' fits idiomatic English and preserves the temporal force.
- source_word: οὐκ ἀργεῖ
  chosen: is not idle
  alternatives:
  - is not delayed
  - is not inactive
  - does not linger
  lexicon: BDAG
  rationale: ἀργέω means to be idle, inactive, or ineffective. The image is that judgment
    is not dormant or failing to act. 'Is not idle' preserves the metaphor better
    than a purely temporal rendering like 'is not delayed.'
- source_word: ἀπώλεια
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: BDAG
  rationale: ἀπώλεια commonly denotes destruction or ruin. 'Destruction' is the clearest
    modern equivalent and fits the parallel with coming judgment.
- source_word: οὐ νυστάζει
  chosen: is not asleep
  alternatives:
  - does not slumber
  - is not drowsy
  lexicon: BDAG
  rationale: νυστάζω literally means to nod or be drowsy. In context it personifies
    destruction as not sleeping or failing to arrive. 'Is not asleep' is natural English
    and keeps the vivid personification.
