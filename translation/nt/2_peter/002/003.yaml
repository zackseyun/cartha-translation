theological_decisions:
- issue: Nature of the announced punishment
  chosen_reading: Render the language straightforwardly as impending divine judgment
    and destruction without specifying a doctrinal system beyond the text.
  alternative_readings:
  - Read 'destruction' as annihilation
  - Read 'destruction' as ruin without final judgment
  rationale: The verse clearly announces certain judgment on false teachers, but it
    does not itself define the mechanics or duration of that punishment. The translation
    preserves the warning without importing a fuller doctrinal conclusion not explicit
    in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
