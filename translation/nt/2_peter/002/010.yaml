theological_decisions:
- issue: Referent of κυριότητος
  chosen_reading: generic ruling authority
  alternative_readings:
  - the Lord's lordship
  - angelic dominion
  rationale: The term can point to dominion/lordship in a broad sense. The immediate
    context condemns contempt for authority generally, and the verse does not unambiguously
    specify Christ's lordship. The translation therefore uses 'authority' without
    importing a narrower doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of δόξας
  chosen_reading: glorious heavenly beings left unspecified in the main text
  alternative_readings:
  - angels
  - celestial majesties
  - glories as abstract dignities
  rationale: The following verse mentions angels, which supports a heavenly referent,
    but this verse itself uses the more ambiguous δόξας. The main text preserves that
    ambiguity with 'glorious ones'; an alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
