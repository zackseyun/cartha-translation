id: 2PE.2.10
reference: 2 Peter 2:10
source:
  edition: SBLGNT
  text: μάλιστα δὲ τοὺς ὀπίσω σαρκὸς ἐν ἐπιθυμίᾳ μιασμοῦ πορευομένους καὶ κυριότητος
    καταφρονοῦντας. Τολμηταί, αὐθάδεις, δόξας οὐ τρέμουσιν, βλασφημοῦντες,
translation:
  text: especially those who go after the flesh in the desire for defilement and despise
    authority. Bold, self-willed, they do not tremble as they blaspheme glorious ones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in lust for uncleanness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'despise lordship' or 'despise dominion.'
    reason: lexical_alternative
  - marker: c
    text: '''Glorious ones'' likely refers to glorious heavenly beings; possibly ''angels.'''
    reason: alternative_reading
lexical_decisions:
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - particularly
  - chiefly
  lexicon: BDAG
  rationale: Marks special emphasis within the judgment described in the previous
    verse; 'especially' is natural and sufficiently strong.
- source_word: ὀπίσω σαρκὸς
  chosen: after the flesh
  alternatives:
  - after sinful flesh
  - after the body
  lexicon: BDAG
  rationale: Retains the idiom and the key term σάρξ. Here σάρξ is morally charged
    in context of immoral desire, but the phrase is still best preserved as 'the flesh'
    rather than interpreting more heavily as 'sinful nature' in the main text.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine, σάρξ may be rendered 'flesh' literally or 'sinful nature'
    metaphorically depending on context. Here the phrase concerns sensual, bodily
    corruption; 'flesh' preserves the source wording and theological texture without
    over-resolving the metaphor.
- source_word: ἐν ἐπιθυμίᾳ μιασμοῦ
  chosen: in the desire for defilement
  alternatives:
  - in lust for uncleanness
  - with a craving for pollution
  lexicon: BDAG
  rationale: ἐπιθυμία can be neutral or negative, but here clearly denotes illicit
    desire. μιασμός refers to defilement/impurity. 'Desire for defilement' is readable
    and preserves the moral force without archaic 'uncleanness'.
- source_word: πορευομένους
  chosen: who go
  alternatives:
  - who walk
  - who follow
  lexicon: BDAG
  rationale: A common participle for conduct. 'Go' works idiomatically with ὀπίσω
    ('after') and avoids over-idiomatizing to 'live' or 'behave'.
- source_word: κυριότητος
  chosen: authority
  alternatives:
  - lordship
  - dominion
  lexicon: BDAG
  rationale: κυριότης can denote dominion or lordship, and in this context likely
    refers broadly to ruling authority rather than specifically to Christ's lordship.
    'Authority' is the clearest English in context while leaving the referent somewhat
    open.
- source_word: καταφρονοῦντας
  chosen: despise
  alternatives:
  - scorn
  - look down on
  lexicon: BDAG
  rationale: '''Despise'' captures active contempt and matches the severity of the
    Greek.'
- source_word: Τολμηταί
  chosen: Bold
  alternatives:
  - Daring
  - Audacious
  lexicon: BDAG
  rationale: Predicate nominative beginning a staccato characterization. 'Bold' is
    concise and natural, though negative in context.
- source_word: αὐθάδεις
  chosen: self-willed
  alternatives:
  - arrogant
  - self-pleasing
  - presumptuous
  lexicon: BDAG
  rationale: Conveys stubborn self-assertion. 'Self-willed' preserves the idea more
    precisely than the broader 'arrogant.'
- source_word: δόξας
  chosen: glorious ones
  alternatives:
  - glories
  - glorious beings
  lexicon: BDAG
  rationale: The plural likely refers to glorious heavenly beings rather than abstract
    'glories.' 'Glorious ones' is idiomatic and preserves the ambiguity of identity
    better than specifying 'angels' in the main text.
- source_word: οὐ τρέμουσιν
  chosen: they do not tremble
  alternatives:
  - they are not afraid
  - they do not shudder
  lexicon: BDAG
  rationale: Keeps the vivid physical metaphor of fear/reverence rather than flattening
    it to 'are not afraid.'
- source_word: βλασφημοῦντες
  chosen: as they blaspheme
  alternatives:
  - reviling
  - slandering
  lexicon: BDAG
  rationale: The participle is contemporaneous with 'do not tremble.' 'Blaspheme'
    preserves the gravity of abusive speech against exalted beings, though in English
    it can sound God-directed only; the object here clarifies the broader sense.
