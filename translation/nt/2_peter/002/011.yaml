id: 2PE.2.11
reference: 2 Peter 2:11
source:
  edition: SBLGNT
  text: ὅπου ἄγγελοι ἰσχύϊ καὶ δυνάμει μείζονες ὄντες οὐ φέρουσιν κατ’ ⸀αὐτῶν βλάσφημον
    κρίσιν.
translation:
  text: whereas angels, though greater in strength and power, do not bring a slanderous
    judgment against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a blasphemous judgment' or 'a reviling judgment.' The Greek adjective
      can denote abusive, reviling, or slanderous speech.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' likely refers back to the 'glorious ones' in the previous
      verse, but Peter does not identify them more explicitly here.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπου
  chosen: whereas
  alternatives:
  - where
  - in which case
  lexicon: BDAG
  rationale: Here ὅπου functions less as a strictly locative adverb ('where') and
    more as a comparative/contrastive connector with the previous verse. 'Whereas'
    brings out the contrast in idiomatic English without over-paraphrasing.
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this context of heavenly beings contrasted with arrogant false teachers,
    'angels' is the clear sense, not human messengers.
- source_word: ἰσχύϊ καὶ δυνάμει
  chosen: in strength and power
  alternatives:
  - in might and power
  - in force and power
  lexicon: BDAG
  rationale: The paired datives express the sphere/respect in which angels are superior.
    'Strength and power' preserves the near-synonymous intensification in natural
    English.
- source_word: μείζονες ὄντες
  chosen: though greater
  alternatives:
  - being greater
  - although they are greater
  lexicon: BDAG
  rationale: 'The participial construction is concessive in context: despite being
    greater, angels do not do what the false teachers do. ''Though greater'' captures
    this force concisely.'
- source_word: οὐ φέρουσιν
  chosen: do not bring
  alternatives:
  - do not pronounce
  - do not bear
  lexicon: BDAG
  rationale: φέρω with κρίσιν here means to bring forward or utter a judgment/charge.
    'Bring' is a natural legal/judicial rendering and keeps the verbal imagery.
- source_word: κατ’ αὐτῶν
  chosen: against them
  alternatives:
  - against these
  - against such ones
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the glorious ones of the previous
    verse. 'Against them' preserves the anaphoric reference without over-specifying
    in the main text.
- source_word: βλάσφημον
  chosen: slanderous
  alternatives:
  - blasphemous
  - reviling
  lexicon: BDAG
  rationale: βλάσφημος can denote speech that is abusive, reviling, or slanderous.
    Since the object is a judgment spoken against others, 'slanderous' communicates
    defamatory speech clearly in modern English. 'Blasphemous' in English can sound
    restricted to speech against God and is therefore less precise here.
- source_word: κρίσιν
  chosen: judgment
  alternatives:
  - charge
  - condemnation
  lexicon: BDAG
  rationale: κρίσις here is a judicial assessment or verdict. 'Judgment' is the broadest
    and most transparent rendering, while the adjective clarifies its abusive character.
