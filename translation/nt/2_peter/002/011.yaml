theological_decisions:
- issue: Referent of αὐτῶν in relation to the previous verse's 'glorious ones'
  chosen_reading: The pronoun is left as 'them' in the main text, preserving the Greek's
    lack of explicit identification.
  alternative_readings:
  - fallen angelic beings
  - human dignitaries
  - glorious celestial beings generally
  rationale: The verse does not explicitly identify the antecedent beyond the prior
    context. Preserving 'them' avoids importing a more specific doctrinal interpretation
    than the text itself states, while allowing readers to connect it with v.10.
  doctrine_reference: Preserve theological tension rather than resolve it.
