theological_decisions:
- issue: Nature of the final clause as judgment language
  chosen_reading: Render the clause as an impersonal statement of reserved judgment
    without specifying the divine agent.
  alternative_readings:
  - Explicitly supply 'by God' in translation
  rationale: The Greek states that the gloom of darkness 'has been kept' for them,
    implying divine judgment but not naming the agent. To avoid importing doctrinal
    content beyond the text, the translation preserves the passive as written.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
