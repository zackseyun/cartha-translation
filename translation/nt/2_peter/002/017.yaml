id: 2PE.2.17
reference: 2 Peter 2:17
source:
  edition: SBLGNT
  text: Οὗτοί εἰσιν πηγαὶ ἄνυδροι ⸂καὶ ὁμίχλαι⸃ ὑπὸ λαίλαπος ἐλαυνόμεναι, οἷς ὁ ζόφος
    τοῦ ⸀σκότους τετήρηται.
translation:
  text: These are waterless springs and mists driven by a storm, for whom the gloom
    of darkness has been kept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clouds driven by a storm.' The Greek word more precisely denotes 'mists'
      or 'fog,' but some translations render it more broadly as 'clouds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the blackness of darkness has been reserved for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πηγαὶ ἄνυδροι
  chosen: waterless springs
  alternatives:
  - springs without water
  - dry wells
  lexicon: BDAG
  rationale: πηγή normally denotes a spring or fountain rather than a dug well. ἄνυδρος
    means lacking water. 'Waterless springs' is vivid, natural English and preserves
    the irony of something expected to give water but failing to do so.
- source_word: ὁμίχλαι
  chosen: mists
  alternatives:
  - mist
  - clouds
  lexicon: BDAG
  rationale: ὁμίχλη denotes mist or fog. 'Mists' fits the image of insubstantial,
    transient atmospheric phenomena. 'Clouds' is a traditional rendering in some English
    versions, but 'mists' more closely reflects the Greek term.
- source_word: ὑπὸ λαίλαπος ἐλαυνόμεναι
  chosen: driven by a storm
  alternatives:
  - driven by a whirlwind
  - swept along by a tempest
  lexicon: BDAG
  rationale: λαῖλαψ refers to a violent windstorm or tempest, and ἐλαύνω means to
    drive or propel. 'Driven by a storm' is concise, idiomatic, and preserves the
    passive force of the participle.
- source_word: οἷς
  chosen: for whom
  alternatives:
  - for which
  - to whom
  lexicon: BDAG
  rationale: The dative relative pronoun refers back to the false teachers introduced
    by Οὗτοί, even though the intervening metaphors are feminine plural. English should
    reflect the personal referent rather than the grammatical gender of the images,
    so 'for whom' is preferable.
- source_word: ὁ ζόφος τοῦ σκότους
  chosen: the gloom of darkness
  alternatives:
  - the blackness of darkness
  - the deepest darkness
  lexicon: BDAG
  rationale: ζόφος conveys murky gloom or black darkness; σκότος is darkness. The
    genitive intensifies the image. 'The gloom of darkness' preserves the two-term
    construction without sounding archaic, while still conveying ominous judgment.
- source_word: τετήρηται
  chosen: has been kept
  alternatives:
  - has been reserved
  - is kept in store
  lexicon: BDAG
  rationale: Perfect passive of τηρέω indicates something has been kept or reserved
    and remains so. 'Has been kept' preserves the perfect aspect and avoids overinterpreting
    the nuance, though 'reserved' is also possible in judgment contexts.
