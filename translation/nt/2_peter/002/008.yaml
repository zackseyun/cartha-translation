theological_decisions:
- issue: Sense of ψυχή in relation to anthropology
  chosen_reading: Rendered as 'soul' in a non-speculative sense referring to Lot's
    inner self/person.
  alternative_readings:
  - self
  - inner being
  rationale: The verse speaks of Lot's inward moral anguish, not a technical doctrinal
    statement about body-soul composition. 'Soul' is the most direct lexical equivalent
    and preserves traditional biblical diction without importing a detailed anthropological
    system.
  doctrine_reference: Preserve theological tension rather than resolve it.
