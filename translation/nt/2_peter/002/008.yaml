id: 2PE.2.8
reference: 2 Peter 2:8
source:
  edition: SBLGNT
  text: βλέμματι γὰρ καὶ ἀκοῇ ⸀ὁ δίκαιος ἐγκατοικῶν ἐν αὐτοῖς ἡμέραν ἐξ ἡμέρας ψυχὴν
    δικαίαν ἀνόμοις ἔργοις ἐβασάνιζεν—
translation:
  text: for as that righteous man lived among them, day after day he was tormenting
    his righteous soul by what he saw and heard—their lawless deeds—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from day to day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he was tormenting himself in his righteous soul by the lawless deeds
      he saw and heard.' The Greek order places 'by sight and hearing' first and 'by
      lawless deeds' later, making the exact English arrangement somewhat flexible.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέμματι
  chosen: what he saw
  alternatives:
  - sight
  - seeing
  lexicon: BDAG
  rationale: 'Dative singular paired with ἀκοῇ expresses means or respect: Lot was
    affected by visual perception. Rendering idiomatically as ''what he saw'' is clearer
    in modern English than the more wooden ''by sight.'''
- source_word: ἀκοῇ
  chosen: what he heard
  alternatives:
  - hearing
  - by hearing
  lexicon: BDAG
  rationale: Paired with βλέμματι, this refers to auditory perception. 'What he heard'
    preserves the sense naturally in English and matches the instrumental force of
    the dative.
- source_word: ὁ δίκαιος
  chosen: that righteous man
  alternatives:
  - the righteous one
  - the righteous man
  lexicon: BDAG
  rationale: The article plus adjective functions substantivally, referring back to
    Lot in the previous verse. 'That righteous man' makes the anaphoric reference
    clear and preserves the masculine singular.
- source_word: ἐγκατοικῶν ἐν αὐτοῖς
  chosen: lived among them
  alternatives:
  - dwelling among them
  - living among them
  lexicon: BDAG
  rationale: The participle denotes residing in their midst. 'Lived among them' is
    natural English and captures the durative sense without unnecessary stiffness.
- source_word: ἡμέραν ἐξ ἡμέρας
  chosen: day after day
  alternatives:
  - from day to day
  - day by day
  lexicon: BDAG
  rationale: This idiom expresses repeated ongoing action. 'Day after day' conveys
    the cumulative, continual force well in contemporary English.
- source_word: ψυχὴν δικαίαν
  chosen: his righteous soul
  alternatives:
  - his righteous self
  - his righteous inner being
  lexicon: BDAG
  rationale: ψυχή here refers to the inner life/person, not an abstract detachable
    entity in contrast with the body. 'Soul' remains the most direct and traditional
    rendering, while 'his' is supplied from context because the object refers back
    to the subject.
- source_word: ἀνόμοις ἔργοις
  chosen: their lawless deeds
  alternatives:
  - lawless works
  - deeds of lawlessness
  lexicon: BDAG
  rationale: Dative plural likely expresses means or cause in relation to ἐβασάνιζεν.
    'Lawless deeds' is idiomatic and preserves the moral-legal force of ἄνομος. 'Their'
    is contextually supplied to identify the deeds as those of the people among whom
    he lived.
- source_word: ἐβασάνιζεν
  chosen: was tormenting
  alternatives:
  - was torturing
  - was tormenting himself
  - was distressed
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing action in past time. The verb βασανίζω
    is stronger than mere sadness or vexation; 'was tormenting' preserves the intensity.
    The active voice is retained rather than softened to an intransitive paraphrase.
