theological_decisions:
- issue: Elliptical proverbial citation and its force
  chosen_reading: The verse states that the content of the proverb has proved true
    in the false teachers' case, without adding doctrinal explanation beyond the image
    of relapse.
  alternative_readings:
  - The true proverb itself has happened to them
  - What is spoken in the true proverb applies to them
  rationale: The Greek is elliptical and can be rendered more formally or more idiomatically.
    The chosen wording preserves the warning imagery and avoids importing a more developed
    doctrinal claim not explicit in the text.
  doctrine_reference: Translation philosophy items 1, 3, and 6
