id: 2PE.2.22
reference: 2 Peter 2:22
source:
  edition: SBLGNT
  text: ⸀συμβέβηκεν αὐτοῖς τὸ τῆς ἀληθοῦς παροιμίας· Κύων ἐπιστρέψας ἐπὶ τὸ ἴδιον
    ἐξέραμα, καί· Ὗς λουσαμένη εἰς ⸀κυλισμὸν βορβόρου.
translation:
  text: 'What the true proverb says has happened to them: “A dog, after returning
    to its own vomit,” and, “A washed sow, to wallowing in the mud.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “The word of the true proverb has happened to them.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “A dog, having returned to its own vomit … and a washed sow to
      wallowing in the mud.” The first line echoes Proverbs 26:11.
    reason: cross_reference
lexical_decisions:
- source_word: συμβέβηκεν
  chosen: has happened
  alternatives:
  - has come upon
  - has occurred
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from what has occurred;
    'has happened' is idiomatic and preserves the force of the Greek.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative pronoun here marks those to whom the proverb applies; 'to them'
    is the most natural English rendering.
- source_word: τὸ τῆς ἀληθοῦς παροιμίας
  chosen: what the true proverb says
  alternatives:
  - the word of the true proverb
  - the true proverb
  lexicon: BDAG
  rationale: The construction is somewhat elliptical. Rendering it as 'what the true
    proverb says' makes explicit that the proverb's content has proved true in their
    case, while preserving the sense of τὸ ... παροιμίας.
- source_word: ἀληθοῦς
  chosen: 'true'
  alternatives:
  - genuine
  - real
  lexicon: BDAG
  rationale: '''True'' is the straightforward gloss and fits the idiom ''true proverb.'''
- source_word: παροιμίας
  chosen: proverb
  alternatives:
  - saying
  - maxim
  lexicon: BDAG
  rationale: '''Proverb'' is the standard and best contextual rendering for a concise
    proverbial statement.'
- source_word: Κύων
  chosen: A dog
  alternatives:
  - The dog
  lexicon: BDAG
  rationale: Anarthrous nominative in proverbial style is well represented by the
    English indefinite, matching the generic force.
- source_word: ἐπιστρέψας
  chosen: after returning
  alternatives:
  - returning
  - having returned
  - turning back
  lexicon: BDAG
  rationale: The aorist participle is adverbial, indicating action prior to the implied
    result; 'after returning' communicates that sequence naturally in English.
- source_word: ἐπὶ τὸ ἴδιον ἐξέραμα
  chosen: to its own vomit
  alternatives:
  - onto its own vomit
  lexicon: BDAG
  rationale: This echoes the proverb from Proverbs 26:11. 'To its own vomit' is idiomatic
    and preserves ἴδιον ('its own') and ἐξέραμα ('vomit').
- source_word: Ὗς
  chosen: a sow
  alternatives:
  - a pig
  lexicon: BDAG
  rationale: ὗς can denote pig/swine, but 'sow' preserves the feminine singular nuance
    present in the Greek and matches the traditional proverbial image.
- source_word: λουσαμένη
  chosen: washed
  alternatives:
  - having washed herself
  - after being washed
  lexicon: BDAG
  rationale: The participle denotes the sow as washed. English 'washed sow' is concise
    and natural. The middle/passive form does not require an explicit reflexive in
    translation here.
- source_word: εἰς κυλισμὸν βορβόρου
  chosen: to wallowing in the mud
  alternatives:
  - for rolling in the mire
  - into the filth of mud
  lexicon: BDAG
  rationale: κυλισμός denotes rolling/wallowing, and βόρβορος denotes mud/mire/filth.
    'Wallowing in the mud' is vivid, natural English that preserves the image without
    archaic diction.
