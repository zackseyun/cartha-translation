theological_decisions:
- issue: Whether to identify ὑποζύγιον specifically as 'donkey' from the Balaam narrative
    background
  chosen_reading: Retain the broader 'beast of burden' in the main text
  alternative_readings:
  - donkey
  rationale: The allusion is clearly to Balaam's donkey in Numbers 22, but the Greek
    text itself uses the generic term ὑποζύγιον rather than ὄνος. Following original-language
    primacy, the translation preserves the broader wording while allowing the specific
    identification in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
- issue: Rendering ἀνθρώπου in ἐν ἀνθρώπου φωνῇ
  chosen_reading: human
  alternative_readings:
  - man's
  rationale: Although grammatically singular masculine, ἄνθρωπος here contrasts human
    speech with an animal's muteness, not male speech with female speech. 'Human'
    is therefore gender-accurate to the source intent.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
