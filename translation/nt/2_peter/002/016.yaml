id: 2PE.2.16
reference: 2 Peter 2:16
source:
  edition: SBLGNT
  text: ἔλεγξιν δὲ ἔσχεν ἰδίας παρανομίας· ὑποζύγιον ἄφωνον ἐν ἀνθρώπου φωνῇ φθεγξάμενον
    ἐκώλυσεν τὴν τοῦ προφήτου παραφρονίαν.
translation:
  text: 'But he received a rebuke for his own lawlessness: a mute beast of burden,
    speaking with a human voice, restrained the prophet’s madness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'a beast of burden'; the reference is to Balaam’s donkey (Num
      22:28–30).
    reason: cross_reference
  - marker: b
    text: Or 'with a man’s voice.' The Greek likely means 'with a human voice,' contrasting
      the animal with a human speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγξιν
  chosen: a rebuke
  alternatives:
  - a reproof
  - a condemnation
  lexicon: BDAG
  rationale: ἔλεγξις denotes censure or rebuke. 'Rebuke' is natural modern English
    and fits the narrative context of Balaam being corrected.
- source_word: ἰδίας παρανομίας
  chosen: his own lawlessness
  alternatives:
  - his own transgression
  - his own wrongdoing
  lexicon: BDAG
  rationale: παρανομία is more than a generic mistake; it is lawless or unlawful conduct.
    'His own' reflects ἰδίας, emphasizing personal culpability.
- source_word: ὑποζύγιον
  chosen: beast of burden
  alternatives:
  - pack animal
  - donkey
  lexicon: BDAG
  rationale: The noun means a beast under a yoke or burden-bearing animal. Although
    the OT background identifies Balaam's donkey, the Greek here uses the broader
    term, so 'beast of burden' best preserves the source wording without over-specifying.
- source_word: ἄφωνον
  chosen: mute
  alternatives:
  - speechless
  - voiceless
  lexicon: BDAG
  rationale: ἄφωνος means without speech/voice. 'Mute' is concise and idiomatic here,
    highlighting the irony of the animal speaking.
- source_word: ἐν ἀνθρώπου φωνῇ
  chosen: with a human voice
  alternatives:
  - in a human voice
  - with a man's voice
  lexicon: BDAG
  rationale: The phrase expresses manner or instrument. 'With a human voice' is idiomatic
    English and avoids an unnecessarily male-specific rendering where ἀνθρώπου is
    human rather than male in force.
- source_word: φθεγξάμενον
  chosen: speaking
  alternatives:
  - uttering speech
  - making a sound
  lexicon: BDAG
  rationale: The participle refers to articulate utterance. 'Speaking' is the clearest
    natural rendering in context.
- source_word: ἐκώλυσεν
  chosen: restrained
  alternatives:
  - prevented
  - hindered
  - held back
  lexicon: BDAG
  rationale: κωλύω can mean prevent or hinder. 'Restrained' fits the sense of checking
    or stopping Balaam's irrational course without implying the action was fully prevented
    in every respect.
- source_word: παραφρονίαν
  chosen: madness
  alternatives:
  - insanity
  - folly
  lexicon: BDAG
  rationale: παραφρονία denotes irrationality or madness. 'Madness' preserves the
    strong force of the term better than the weaker 'folly'.
- source_word: τοῦ προφήτου
  chosen: the prophet’s
  alternatives:
  - of the prophet
  lexicon: BDAG
  rationale: The genitive is possessive. 'The prophet' reflects the Greek wording,
    which identifies Balaam by his prophetic status without endorsing his conduct.
