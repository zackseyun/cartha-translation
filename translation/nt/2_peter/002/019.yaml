theological_decisions:
- issue: Rendering δοῦλοι/δεδούλωται in a context contrasting false freedom with actual
    bondage
  chosen_reading: Use 'slaves' and 'enslaved' rather than softer terms.
  alternative_readings:
  - servants
  - bondservants
  - in bondage
  rationale: The verse's theological point depends on the stark contradiction between
    the promise of freedom and the reality of domination by corruption. Softer renderings
    weaken the argument and obscure the bonded nature emphasized in the Greek.
