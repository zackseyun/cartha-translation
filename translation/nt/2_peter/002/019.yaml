id: 2PE.2.19
reference: 2 Peter 2:19
source:
  edition: SBLGNT
  text: ἐλευθερίαν αὐτοῖς ἐπαγγελλόμενοι, αὐτοὶ δοῦλοι ὑπάρχοντες τῆς φθορᾶς· ᾧ γάρ
    τις ἥττηται, τούτῳ ⸀καὶ δεδούλωται.
translation:
  text: promising them freedom while they themselves are slaves of corruption; for
    whatever a person is overcome by, to that he is also enslaved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'liberty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For by what anyone has been defeated, by this he has also been enslaved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλευθερίαν
  chosen: freedom
  alternatives:
  - liberty
  lexicon: BDAG
  rationale: Standard sense is freedom/liberty. 'Freedom' is more natural modern English
    and fits the false promise being offered.
- source_word: ἐπαγγελλόμενοι
  chosen: promising
  alternatives:
  - offering
  - declaring
  lexicon: BDAG
  rationale: The participle denotes making a promise. 'Promising' preserves the verbal
    force and links directly with the object 'freedom.'
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. Here the contrast between promised freedom and actual bondage
    is central, so 'slaves' best preserves the irony and theological force.
- source_word: ὑπάρχοντες
  chosen: while they themselves are
  alternatives:
  - being
  - existing as
  lexicon: BDAG
  rationale: The participle expresses their actual state concurrent with their promising.
    Rendering with 'while they themselves are' makes the concessive contrast clear
    in idiomatic English.
- source_word: φθορᾶς
  chosen: corruption
  alternatives:
  - decay
  - destruction
  - depravity
  lexicon: BDAG
  rationale: φθορά in 2 Peter commonly carries the sense of corruption/ruin, often
    moral and destructive. 'Corruption' best preserves both moral and ruinous overtones
    without over-specifying.
- source_word: ᾧ γάρ τις ἥττηται
  chosen: for whatever a person is overcome by
  alternatives:
  - for by what anyone has been defeated
  - for whatever someone is conquered by
  lexicon: BDAG
  rationale: The construction is a general principle. 'A person' renders τις generically
    in natural English. 'Is overcome by' is idiomatic and preserves the passive sense
    of being mastered/defeated.
- source_word: τούτῳ καὶ δεδούλωται
  chosen: to that he is also enslaved
  alternatives:
  - by this he has also been enslaved
  - to this he is in bondage
  lexicon: BDAG
  rationale: The perfect passive indicates a resulting state of bondage. 'Is also
    enslaved' communicates the enduring condition and keeps the verbal link to δοῦλος/slavery.
- source_word: τις
  chosen: a person ... he
  alternatives:
  - anyone ... that person
  - someone ... they
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular but generic. Following
    the gender-accurate policy, the generic singular is preserved in English with
    'a person' and then 'he' to reflect the source's singular form.
