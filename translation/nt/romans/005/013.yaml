theological_decisions:
- issue: Referent of 'law' in Paul's argument
  chosen_reading: Rendered as 'the law' with Mosaic reference implied by context.
  alternative_readings:
  - Rendered more generically as 'law' without specifying Mosaic law
  rationale: Romans 5 contrasts the period from Adam to Moses, so the Mosaic law is
    in view contextually. The translation preserves that likely referent without adding
    explanatory words beyond the Greek.
- issue: Force of ἐλλογεῖται
  chosen_reading: Used the non-technical 'is counted' in the main text.
  alternative_readings:
  - is imputed
  - is charged to one's account
  rationale: The verse touches theological discussions of imputation, but the Greek
    itself need not be rendered with a loaded doctrinal term in the main text. A footnote
    preserves the stronger accounting alternatives.
  doctrine_reference: Preserve theological tension rather than resolve it
