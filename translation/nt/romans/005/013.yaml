id: ROM.5.13
reference: Romans 5:13
source:
  edition: SBLGNT
  text: ἄχρι γὰρ νόμου ἁμαρτία ἦν ἐν κόσμῳ, ἁμαρτία δὲ οὐκ ἐλλογεῖται μὴ ὄντος νόμου,
translation:
  text: For until the law, sin was in the world; but sin is not counted where there
    is no law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “is charged to one’s account” or “is imputed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι
  chosen: until
  alternatives:
  - up to
  - before
  lexicon: BDAG
  rationale: Temporal preposition marking the period leading up to the giving of the
    law; “until” is the most natural English equivalent here.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: In Pauline context this most naturally refers to the Mosaic law. Rendering
    with the article in English reflects the anarthrous Greek used in a well-known
    covenantal sense.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard Pauline singular abstraction; “sin” preserves both the category
    and its potentially personified force without overinterpreting.
- source_word: ἐν κόσμῳ
  chosen: in the world
  alternatives:
  - in the world order
  lexicon: BDAG
  rationale: κόσμος here refers to the human world/order in which sin was present;
    “in the world” is the plain and idiomatic rendering.
- source_word: ἐλλογεῖται
  chosen: is counted
  alternatives:
  - is charged to one's account
  - is imputed
  - is reckoned
  lexicon: BDAG
  rationale: The verb has accounting/imputation sense. “Is counted” is clear modern
    English and preserves the judicial/accounting idea without importing heavier theological
    jargon into the main text.
- source_word: μὴ ὄντος νόμου
  chosen: where there is no law
  alternatives:
  - when there is no law
  - with no law being present
  lexicon: BDAG
  rationale: This genitive absolute expresses the absence of law as the condition
    for the statement. “Where there is no law” is idiomatic and fits Paul's general
    formulation.
