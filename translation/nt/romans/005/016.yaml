theological_decisions:
- issue: Forensic force of δικαίωμα in contrast with κατάκριμα
  chosen_reading: δικαίωμα is rendered 'justification' as the judicial outcome opposite
    condemnation.
  alternative_readings:
  - righteous verdict
  - acquittal
  rationale: 'The verse is structured around judicial antithesis: judgment/condemnation
    versus gracious gift/δικαίωμα. ''Justification'' best conveys that forensic contrast
    in idiomatic English without denying the noun''s more concrete verdict-like nuance.'
