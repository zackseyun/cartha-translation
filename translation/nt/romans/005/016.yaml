id: ROM.5.16
reference: Romans 5:16
source:
  edition: SBLGNT
  text: καὶ οὐχ ὡς δι’ ἑνὸς ἁμαρτήσαντος τὸ δώρημα· τὸ μὲν γὰρ κρίμα ἐξ ἑνὸς εἰς κατάκριμα,
    τὸ δὲ χάρισμα ἐκ πολλῶν παραπτωμάτων εἰς δικαίωμα.
translation:
  text: And the gift is not like what came through the one who sinned. For the judgment
    from one trespass led to condemnation, but the gracious gift from many trespasses
    led to justification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gift is not like what came through one man who sinned.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from one offense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'led to a righteous verdict' or 'led to acquittal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δώρημα
  chosen: the gift
  alternatives:
  - the free gift
  lexicon: BDAG
  rationale: δώρημα denotes a gift given; 'the gift' is natural English here and avoids
    importing 'free' where the noun itself already carries giftedness.
- source_word: δι’ ἑνὸς ἁμαρτήσαντος
  chosen: what came through the one who sinned
  alternatives:
  - through one man who sinned
  - through the one man's sin
  lexicon: BDAG
  rationale: The construction is elliptical, comparing the gift with what came through
    Adam. 'What came through the one who sinned' preserves the personal reference
    and the compressed Greek syntax without overparaphrasing.
- source_word: κρίμα
  chosen: the judgment
  alternatives:
  - the verdict
  lexicon: BDAG
  rationale: κρίμα here is the judicial decision or judgment, set in contrast with
    κατάκριμα and δικαίωμα. 'Judgment' is the clearest and most natural rendering.
- source_word: ἐξ ἑνὸς
  chosen: from one trespass
  alternatives:
  - from one
  - from one offense
  lexicon: BDAG
  rationale: The neuter ἑνός likely points to one trespass rather than one person,
    especially in contrast with 'many trespasses' later in the verse. Supplying 'trespass'
    makes the sense explicit in English.
- source_word: κατάκριμα
  chosen: condemnation
  alternatives:
  - a sentence of condemnation
  lexicon: BDAG
  rationale: κατάκριμα is a judicial condemnation. 'Condemnation' is standard, clear,
    and fits the forensic contrast in the sentence.
- source_word: χάρισμα
  chosen: the gracious gift
  alternatives:
  - the gift
  - the free gift
  lexicon: BDAG
  rationale: χάρισμα emphasizes a gift of grace. Rendering it 'the gracious gift'
    preserves its relation to grace and distinguishes it from δώρημα earlier in the
    verse.
- source_word: παραπτωμάτων
  chosen: trespasses
  alternatives:
  - offenses
  - transgressions
  lexicon: BDAG
  rationale: παράπτωμα in Paul often denotes a false step or violation. 'Trespasses'
    is readable and preserves the moral-legal sense.
- source_word: δικαίωμα
  chosen: justification
  alternatives:
  - righteous verdict
  - acquittal
  lexicon: BDAG
  rationale: In this forensic context, paired with κατάκριμα, δικαίωμα points to the
    judicial result opposite condemnation. 'Justification' communicates that contrast
    well in Pauline English, though the more concrete sense of a righteous verdict
    remains possible.
