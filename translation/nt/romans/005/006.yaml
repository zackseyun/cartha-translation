theological_decisions:
- issue: Force of Christ’s death expressed by ὑπὲρ ἀσεβῶν
  chosen_reading: for the ungodly
  alternative_readings:
  - on behalf of the ungodly
  rationale: The verse clearly states that the Messiah’s death was for the benefit
    of the ungodly, but the English main text should not press beyond the Greek into
    a more systematized doctrinal formula. “For” preserves the theological weight
    while leaving the precise nuance of representation/substitution appropriately
    open at the translation level.
  doctrine_reference: Preserve theological tension rather than resolve it.
