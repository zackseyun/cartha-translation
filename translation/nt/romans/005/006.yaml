id: ROM.5.6
reference: Romans 5:6
source:
  edition: SBLGNT
  text: ⸂Ἔτι γὰρ⸃ Χριστὸς ὄντων ἡμῶν ἀσθενῶν ⸀ἔτι κατὰ καιρὸν ὑπὲρ ἀσεβῶν ἀπέθανεν.
translation:
  text: For while we were still weak, at the right time the Messiah died for the ungodly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on behalf of the ungodly.”
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the translated title “Messiah” rather than the traditional
    transliteration “Christ,” following the project’s default for Χριστός when it
    functions as a title rather than a name-like label.
- source_word: ὄντων ἡμῶν ἀσθενῶν
  chosen: while we were still weak
  alternatives:
  - while we were still helpless
  - while we were still powerless
  lexicon: BDAG
  rationale: The genitive absolute is best rendered with a temporal clause in natural
    English. “Weak” preserves the broad sense of human incapacity without over-specifying
    physical weakness or importing a narrower doctrinal term.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: The adverb marks continuing condition. In English, one explicit “still”
    naturally conveys the force of the clause without awkward repetition.
- source_word: κατὰ καιρὸν
  chosen: at the right time
  alternatives:
  - at the appointed time
  - in due time
  lexicon: BDAG
  rationale: This phrase indicates fitting or appointed timing. “At the right time”
    is clear modern English and preserves the sense of divinely fitting timing without
    becoming overly interpretive.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  lexicon: BDAG
  rationale: In this sacrificial context, “for” is the most natural English rendering
    and preserves the representative/substitutionary force without overloading the
    line.
- source_word: ἀσεβῶν
  chosen: the ungodly
  alternatives:
  - the godless
  lexicon: BDAG
  rationale: “Ungodly” is the standard and clearest rendering in Pauline usage, preserving
    the moral-religious sense of those lacking reverence toward God.
- source_word: ἀπέθανεν
  chosen: died
  lexicon: BDAG
  rationale: The aorist verb is straightforwardly rendered as “died.” No expansion
    is warranted by the Greek.
