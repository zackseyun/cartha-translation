id: ROM.5.18
reference: Romans 5:18
source:
  edition: SBLGNT
  text: Ἄρα οὖν ὡς δι’ ἑνὸς παραπτώματος εἰς πάντας ἀνθρώπους εἰς κατάκριμα, οὕτως
    καὶ δι’ ἑνὸς δικαιώματος εἰς πάντας ἀνθρώπους εἰς δικαίωσιν ζωῆς·
translation:
  text: So then, as through one trespass condemnation came to all people, so also
    through one righteous act justification that brings life came to all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, "through one act of righteousness ... to justification
      of life."
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπτώματος
  chosen: trespass
  alternatives:
  - transgression
  - offense
  lexicon: BDAG
  rationale: '"Trespass" is a clear and established rendering for παράπτωμα in Paul,
    conveying a wrongful act without the broader abstraction of "sin."'
- source_word: κατάκριμα
  chosen: condemnation
  alternatives:
  - judgment
  - sentence of condemnation
  lexicon: BDAG
  rationale: '"Condemnation" best matches the judicial force of κατάκριμα and preserves
    the Adam/Christ contrast in the verse.'
- source_word: δικαιώματος
  chosen: righteous act
  alternatives:
  - act of righteousness
  - righteous deed
  lexicon: BDAG
  rationale: In this context the singular refers to Christ's decisive obedient act,
    so "righteous act" is the most natural and precise English rendering.
- source_word: δικαίωσιν ζωῆς
  chosen: justification that brings life
  alternatives:
  - justification of life
  - life-giving justification
  lexicon: BDAG
  rationale: A more literal rendering would be "justification of life," but "justification
    that brings life" expresses the genitive relation in clear modern English while
    preserving Paul's judicial-and-life-giving sense.
- source_word: πάντας ἀνθρώπους
  chosen: all people
  alternatives:
  - all men
  - all humanity
  lexicon: BDAG
  rationale: The phrase is inclusive in sense though grammatically masculine, so "all
    people" accurately conveys the representative human scope in natural English.
- source_word: Ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore then
  - Consequently
  lexicon: BDAG
  rationale: '"So then" neatly carries the inferential force of the doubled connective
    in readable English.'
