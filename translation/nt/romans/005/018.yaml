theological_decisions:
- issue: Whether the second 'all people' should be narrowed to avoid an apparent universal
    scope
  chosen_reading: Retain 'all people' in the main text without interpretive limitation.
  alternative_readings:
  - all the justified
  - all who believe
  rationale: The Greek repeats the same phrase in both halves of the comparison. Narrowing
    it in translation would resolve a theological tension the text itself leaves for
    the wider context to address.
  doctrine_reference: Preserve theological tension rather than resolve it.
