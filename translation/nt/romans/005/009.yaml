theological_decisions:
- issue: Nature of justification language in δικαιωθέντες
  chosen_reading: Retain 'justified' in the main text
  alternative_readings:
  - declared righteous
  rationale: The verse uses standard Pauline forensic language. 'Justified' best preserves
    the lexical and theological continuity of δικαιόω without importing a denominationally
    narrow explanation of how justification operates.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Referent of ἡ ὀργή
  chosen_reading: Render as 'the wrath' without explicit expansion
  alternative_readings:
  - God's wrath
  rationale: The context strongly implies divine wrath, but the Greek text does not
    state 'God's' explicitly. The translation therefore preserves the wording of the
    source and avoids importing an additional word into the main text.
  doctrine_reference: Never import doctrinal claims the text does not make.
