id: ROM.5.9
reference: Romans 5:9
source:
  edition: SBLGNT
  text: πολλῷ οὖν μᾶλλον δικαιωθέντες νῦν ἐν τῷ αἵματι αὐτοῦ σωθησόμεθα δι’ αὐτοῦ
    ἀπὸ τῆς ὀργῆς.
translation:
  text: Therefore, having now been justified by his blood, much more shall we be saved
    through him from the wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declared righteous.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through his blood.'
    reason: lexical_alternative
  - marker: c
    text: That is, the divine wrath implied by the context.
    reason: cross_reference
lexical_decisions:
- source_word: πολλῷ οὖν μᾶλλον
  chosen: Therefore, much more
  alternatives:
  - So then, much more
  - How much more, then
  lexicon: BDAG
  rationale: Captures the inferential οὖν and the intensifying comparative construction
    πολλῷ ... μᾶλλον in natural English. 'Therefore' preserves the logical link to
    the prior verse, while 'much more' retains Paul's escalation.
- source_word: δικαιωθέντες
  chosen: having ... been justified
  alternatives:
  - having been declared righteous
  lexicon: BDAG
  rationale: The aorist passive participle is best rendered as a completed prior action
    relative to the future main verb. 'Justified' is the established and accurate
    rendering for δικαιόω in Pauline soteriological contexts; 'declared righteous'
    is interpretively possible but less concise for the main text.
- source_word: νῦν
  chosen: now
  alternatives:
  - at this time
  lexicon: BDAG
  rationale: A straightforward temporal adverb marking the present state resulting
    from justification.
- source_word: ἐν τῷ αἵματι αὐτοῦ
  chosen: by his blood
  alternatives:
  - in his blood
  - through his blood
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' the phrase here expresses means or basis
    in idiomatic English. 'By his blood' is both natural and faithful, preserving
    the sacrificial and atoning sense without paraphrase.
- source_word: σωθησόμεθα
  chosen: shall we be saved
  alternatives:
  - we will be saved
  lexicon: BDAG
  rationale: The future passive indicates a salvation still to be realized in a future
    sense. 'Shall we be saved' preserves both the future and the rhetorical cadence
    of the verse.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with the genitive normally denotes agency or instrumentality. 'Through
    him' is the most natural and theologically transparent English rendering here.
- source_word: ἀπὸ τῆς ὀργῆς
  chosen: from the wrath
  alternatives:
  - from wrath
  - from God's wrath
  lexicon: BDAG
  rationale: The article supports a definite referent, and 'the wrath' preserves the
    gravity and eschatological force of Paul's expression without adding 'God's,'
    which is implied by context but not explicit in the Greek.
