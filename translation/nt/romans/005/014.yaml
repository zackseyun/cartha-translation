theological_decisions:
- issue: Referent of 'the coming one'
  chosen_reading: The phrase refers to Christ as the future counterpart to Adam in
    Paul's typology.
  alternative_readings:
  - A more generic 'the one to come' without explicit messianic identification in
    translation
  rationale: In context (Romans 5:12–21), Paul is setting Adam in correspondence with
    Christ. The translation keeps the text's wording rather than importing 'Messiah'
    or 'Christ' directly, while recognizing the referent in interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
