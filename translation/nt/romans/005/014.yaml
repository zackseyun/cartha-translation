id: ROM.5.14
reference: Romans 5:14
source:
  edition: SBLGNT
  text: ἀλλὰ ἐβασίλευσεν ὁ θάνατος ἀπὸ Ἀδὰμ μέχρι Μωϋσέως καὶ ἐπὶ τοὺς μὴ ἁμαρτήσαντας
    ἐπὶ τῷ ὁμοιώματι τῆς παραβάσεως Ἀδάμ, ὅς ἐστιν τύπος τοῦ μέλλοντος.
translation:
  text: Yet death reigned from Adam until Moses, even over those who did not sin in
    the likeness of Adam’s transgression, who is a type of the coming one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pattern' or 'foreshadowing' for 'type.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one to come.' The referent in context is Christ.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: Yet
  alternatives:
  - But
  - Nevertheless
  rationale: Marks a strong contrast with the preceding statement while sounding natural
    in modern English.
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - ruled
  - was king
  lexicon: BDAG
  rationale: The verb βασιλεύω carries royal-rule imagery; 'reigned' preserves Paul's
    personification of death as exercising dominion.
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: Straightforward rendering of the noun, preserving the personified force
    in context.
- source_word: ἀπὸ Ἀδὰμ μέχρι Μωϋσέως
  chosen: from Adam until Moses
  alternatives:
  - from Adam to Moses
  lexicon: BDAG
  rationale: This preserves the temporal span clearly and idiomatically.
- source_word: καὶ ἐπὶ τοὺς μὴ ἁμαρτήσαντας
  chosen: even over those who did not sin
  alternatives:
  - also over those who did not sin
  lexicon: BDAG
  rationale: Here ἐπί with the accusative after 'reigned' indicates the reach of death's
    rule; 'even over' brings out the surprising extension of that reign.
- source_word: ἐπὶ τῷ ὁμοιώματι
  chosen: in the likeness
  alternatives:
  - in the same way as
  - according to the likeness of
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the wording and leaves Paul's
    comparison intact without over-interpreting it.
- source_word: παραβάσεως
  chosen: transgression
  alternatives:
  - trespass
  - violation
  lexicon: BDAG
  rationale: '''Transgression'' fits Paul''s emphasis on crossing a command-boundary
    and is a standard, theologically precise rendering.'
- source_word: τύπος
  chosen: type
  alternatives:
  - pattern
  - foreshadowing
  lexicon: BDAG
  rationale: '''Type'' preserves the established typological sense without collapsing
    it into a more interpretive paraphrase.'
- source_word: τοῦ μέλλοντος
  chosen: the coming one
  alternatives:
  - the one to come
  - the coming man
  lexicon: BDAG
  rationale: The substantival participle refers to the future representative figure
    in Paul's Adam-Christ comparison. 'The coming one' is natural English and keeps
    the expression concise.
