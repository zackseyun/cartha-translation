theological_decisions:
- issue: Whether to render οἱ πολλοί as “the many” or interpretively as “all.”
  chosen_reading: the many
  alternative_readings:
  - all
  - many people
  rationale: Paul’s actual phrase is οἱ πολλοί, and the translation should preserve
    his wording rather than resolve its scope interpretively. This keeps the textual-theological
    tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether κατασταθήσονται δίκαιοι should be rendered as status language (“will
    be made righteous”) or as the more interpretive forensic phrase “will be declared
    righteous.”
  chosen_reading: will be made righteous
  alternative_readings:
  - will be declared righteous
  - will be constituted righteous
  rationale: The Greek uses καθίστημι with the adjective δίκαιοι, not δικαιόω. “Will
    be made righteous” best reflects the wording while leaving doctrinal inferences
    to readers.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
