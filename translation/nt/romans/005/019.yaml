id: ROM.5.19
reference: Romans 5:19
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ διὰ τῆς παρακοῆς τοῦ ἑνὸς ἀνθρώπου ἁμαρτωλοὶ κατεστάθησαν οἱ πολλοί,
    οὕτως καὶ διὰ τῆς ὑπακοῆς τοῦ ἑνὸς δίκαιοι κατασταθήσονται οἱ πολλοί.
translation:
  text: For just as through the disobedience of the one man the many were made sinners,
    so also through the obedience of the one man the many will be made righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were constituted sinners.”
    reason: lexical_alternative
  - marker: b
    text: Greek “through the obedience of the one”; “man” is supplied for clear English
      parallelism.
    reason: lexical_alternative
  - marker: c
    text: Or “will be constituted righteous.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακοῆς
  chosen: disobedience
  alternatives:
  - transgression
  lexicon: BDAG
  rationale: παρακοή denotes failure to obey; “disobedience” is the most direct and
    natural English equivalent here and preserves the Adam/Christ contrast with ὑπακοή.
- source_word: τοῦ ἑνὸς ἀνθρώπου
  chosen: of the one man
  alternatives:
  - of one man
  lexicon: BDAG
  rationale: The article plus numeral has an identifying force in context, pointing
    to Adam. “The one man” preserves the representative contrast developed in Romans
    5.
- source_word: ἁμαρτωλοὶ
  chosen: sinners
  alternatives:
  - sinful
  lexicon: BDAG
  rationale: The adjective functions substantivally/predicatively here. “Sinners”
    is the standard and clearest rendering.
- source_word: κατεστάθησαν
  chosen: were made
  alternatives:
  - were appointed
  - were constituted
  lexicon: BDAG
  rationale: καθίστημι here expresses being placed or constituted in a status. “Were
    made” is idiomatic English and keeps the representative force without sounding
    overly technical.
- source_word: οἱ πολλοί
  chosen: the many
  alternatives:
  - many
  lexicon: BDAG
  rationale: The article should be represented. “The many” preserves Paul’s wording
    and avoids collapsing the phrase into a loose indefinite expression.
- source_word: ὑπακοῆς
  chosen: obedience
  lexicon: BDAG
  rationale: This is the natural lexical counterpart to παρακοή and preserves the
    Adam/Christ parallel.
- source_word: τοῦ ἑνὸς
  chosen: of the one man
  alternatives:
  - of the one
  lexicon: BDAG
  rationale: Although ἀνθρώπου is omitted in the Greek second clause, supplying “man”
    in English makes the parallel explicit and natural. The supplied noun is clearly
    implied from the first clause.
- source_word: δίκαιοι
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: δίκαιος is best rendered “righteous” in this Pauline context. “Just”
    is possible but less clear in contemporary English and less consistent with the
    project’s handling of δικ- language.
- source_word: κατασταθήσονται
  chosen: will be made
  alternatives:
  - will be appointed
  - will be constituted
  lexicon: BDAG
  rationale: The future passive mirrors κατεστάθησαν in the first half of the verse.
    “Will be made righteous” preserves the formal parallel and avoids importing a
    narrower doctrinal term not used in the Greek.
