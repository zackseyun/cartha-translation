id: ROM.5.1
reference: Romans 5:1
source:
  edition: SBLGNT
  text: Δικαιωθέντες οὖν ἐκ πίστεως εἰρήνην ⸀ἔχομεν πρὸς τὸν θεὸν διὰ τοῦ κυρίου ἡμῶν
    Ἰησοῦ Χριστοῦ,
translation:
  text: Therefore, since we have been justified by faith, we have peace with God through
    our Lord Jesus Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in some manuscripts, 'let us have peace with God.'
    reason: textual_variant
  - marker: b
    text: Or 'on the basis of faith.'
    reason: lexical_alternative
  - marker: c
    text: Greek Christos, 'Messiah'; traditionally 'Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δικαιωθέντες
  chosen: having been justified / we have been justified
  alternatives:
  - having been declared righteous
  - having been acquitted
  lexicon: BDAG
  rationale: Aorist passive participle of δικαιόω. 'Justified' preserves the established
    forensic sense in Paul without over-paraphrasing; 'declared righteous' is a viable
    explanatory alternative but is less concise for the main text.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' best preserves
    the logical connection in clear modern English.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - on the basis of faith
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' in this Pauline construction
    idiomatic English is 'by faith.' This preserves the source sense while remaining
    natural. The contested term πίστις is rendered by the doctrinal default 'faith'
    here.
- source_word: εἰρήνην
  chosen: peace
  alternatives:
  - reconciliation
  - peacefulness
  lexicon: BDAG
  rationale: The noun means 'peace.' 'Reconciliation' is interpretive and narrower
    than the Greek; 'peace' preserves the theological breadth of restored relation
    with God without reducing it to subjective calm.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - let us have
  lexicon: BDAG
  rationale: The supplied SBLGNT text reads the indicative ἔχομεν, so the translation
    follows 'we have.' The hortatory subjunctive reading is a known textual variant
    and is preserved in a footnote.
- source_word: πρὸς τὸν θεὸν
  chosen: with God
  alternatives:
  - toward God
  - before God
  lexicon: BDAG
  rationale: In this context πρὸς with 'peace' is most naturally rendered 'with God,'
    expressing relational peace between believers and God.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος and fits both NT usage and reverential
    address.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title, so 'Messiah' follows the doctrinal
    default and preserves the term's meaning rather than treating it as a bare name.
