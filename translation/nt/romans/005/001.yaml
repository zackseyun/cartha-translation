theological_decisions:
- issue: Meaning of δικαιωθέντες in Pauline theology
  chosen_reading: Rendered as 'we have been justified' without expanding it into a
    fuller doctrinal formula.
  alternative_readings:
  - we have been declared righteous
  - we have been made righteous
  rationale: The verse states the result of God's justifying action but does not itself
    specify every theological mechanism. 'Justified' preserves the wording of the
    text while avoiding importing a narrower denominational formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'peace with God'
  chosen_reading: Objective peace with God as restored relation, stated simply as
    'peace with God.'
  alternative_readings:
  - subjective inner peace from God
  - explicitly 'reconciliation with God'
  rationale: The phrase speaks primarily of peace in relation to God, but the Greek
    noun itself is 'peace,' not the more interpretive 'reconciliation.' The translation
    preserves the text's wording and breadth.
  doctrine_reference: Never import doctrinal claims the text does not make.
