theological_decisions:
- issue: Whether to preserve a distinction between δικαίου and ἀγαθοῦ
  chosen_reading: Render them distinctly as 'righteous person' and 'good person.'
  alternative_readings:
  - Treat both as near-synonyms and flatten the distinction in English
  rationale: Paul's argument gains force from the movement between two related but
    non-identical categories. Preserving the distinction avoids smoothing over a potentially
    meaningful nuance in the source text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
