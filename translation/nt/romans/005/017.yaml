theological_decisions:
- issue: Rendering δικαιοσύνης in a Pauline phrase
  chosen_reading: gift of righteousness
  alternative_readings:
  - gift of justice
  rationale: The doctrinal guidance sets "righteousness" as the default rendering
    for δικαιοσύνη while preserving "justice" in footnotes for Pauline passages. Here
    "righteousness" best fits the immediate Adam/Christ justification context without
    collapsing the broader right-order/justice nuance.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved in footnotes for Pauline passages'
- issue: Rendering Χριστοῦ in the phrase Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Christ
  alternative_readings:
  - Jesus Messiah
  rationale: The doctrinal guidance prefers translating Χριστός as "Messiah" where
    its titular sense is active, but retaining "Christ" where the expression functions
    name-like. In this verse the established collocation after the personal name is
    most naturally name-like in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah where title;
    Christ where name-like'
