id: ROM.5.17
reference: Romans 5:17
source:
  edition: SBLGNT
  text: εἰ γὰρ τῷ τοῦ ἑνὸς παραπτώματι ὁ θάνατος ἐβασίλευσεν διὰ τοῦ ἑνός, πολλῷ μᾶλλον
    οἱ τὴν περισσείαν τῆς χάριτος καὶ τῆς δωρεᾶς τῆς δικαιοσύνης λαμβάνοντες ἐν ζωῇ
    βασιλεύσουσιν διὰ τοῦ ἑνὸς Ἰησοῦ Χριστοῦ.
translation:
  text: For if, by the trespass of the one, death reigned through the one, much more
    will those who receive the abundance of grace and the gift of righteousness reign
    in life through the one, Jesus the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the gift of justice."
    reason: lexical_alternative
  - marker: b
    text: Or "Jesus Messiah."
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπτώματι
  chosen: trespass
  alternatives:
  - transgression
  - offense
  lexicon: BDAG
  rationale: '"Trespass" preserves the concrete sense of a false step or violation
    and fits Paul''s Adam/Christ contrast in this context without becoming overly
    technical.'
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - ruled as king
  lexicon: BDAG
  rationale: The verb is royal in force; "reigned" preserves the metaphor cleanly
    and matches the parallel future verb later in the verse.
- source_word: περισσείαν
  chosen: abundance
  alternatives:
  - overflow
  - surpassing measure
  lexicon: BDAG
  rationale: '"Abundance" is natural English and communicates excess fullness without
    sounding paraphrastic.'
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '"Grace" is the established and contextually appropriate Pauline rendering
    here, carrying both gift and divine favor.'
- source_word: δωρεᾶς
  chosen: gift
  alternatives:
  - free gift
  lexicon: BDAG
  rationale: '"Gift" is sufficient because the surrounding language of grace already
    conveys freeness; adding "free" would be slightly redundant in this verse.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine, the default rendering is "righteousness." In Paul this
    term can also carry the sense of justice/right order, so that alternative is preserved
    in a footnote.
- source_word: λαμβάνοντες
  chosen: receive
  alternatives:
  - are receiving
  - accept
  lexicon: BDAG
  rationale: The participle identifies the people characterized by receiving; the
    simple present "receive" is the most idiomatic way to express that in English.
- source_word: ἐν ζωῇ
  chosen: in life
  alternatives:
  - in the realm of life
  - in the life
  lexicon: BDAG
  rationale: '"In life" keeps the concise Greek expression and preserves the contrast
    with death reigning earlier in the verse.'
- source_word: βασιλεύσουσιν
  chosen: reign
  alternatives:
  - rule as kings
  lexicon: BDAG
  rationale: Using "reign" preserves the royal metaphor and keeps the deliberate contrast
    with death having reigned.
- source_word: Χριστοῦ
  chosen: Christ
  alternatives:
  - Messiah
  lexicon: BDAG
  rationale: Although Χριστός is often rendered "Messiah" when its titular force is
    foregrounded, in the collocation "Jesus Christ" here it functions name-like, so
    "Christ" is preferred per doctrine while preserving "Messiah" as an alternative.
