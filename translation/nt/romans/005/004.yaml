id: ROM.5.4
reference: Romans 5:4
source:
  edition: SBLGNT
  text: ἡ δὲ ὑπομονὴ δοκιμήν, ἡ δὲ δοκιμὴ ἐλπίδα.
translation:
  text: and endurance produces proven character, and proven character produces hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tested character' or 'approval.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομονή
  chosen: endurance
  alternatives:
  - perseverance
  - steadfastness
  - patient endurance
  lexicon: BDAG
  rationale: Chosen for clear modern English that conveys sustained bearing up under
    trial. It fits the progression from affliction to mature Christian formation in
    context.
- source_word: δοκιμή
  chosen: proven character
  alternatives:
  - character
  - tested character
  - approvedness
  lexicon: BDAG
  rationale: Chosen because the noun emphasizes character that has been tested and
    shown genuine, not merely abstract moral quality. 'Proven character' best preserves
    the resultative sense in readable English.
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - confident hope
  lexicon: BDAG
  rationale: Standard rendering and the most natural English equivalent. In Pauline
    usage it carries expectation grounded in God, but the simple term 'hope' is sufficient
    here.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ links steps in a sequence rather than marking strong contrast.
    'And' best reflects the chain-like progression in idiomatic English.
- source_word: ellipsis of verb
  chosen: produces
  alternatives:
  - brings about
  - works
  - results in
  rationale: The Greek omits the repeated verb, supplied from the previous clause
    in context (cf. v. 3 κατεργάζεται). 'Produces' makes the progression explicit
    and natural in English without overtranslation.
