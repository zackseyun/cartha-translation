theological_decisions:
- issue: Sense of δοκιμή in the sanctification sequence
  chosen_reading: A quality of character shown genuine through testing ('proven character')
  alternative_readings:
  - the process of testing
  - approval
  rationale: In this chain the term functions as the outcome of endurance rather than
    the testing event itself. Rendering it as 'proven character' preserves the moral
    and experiential result without importing extra doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    significant interpretive choices.
