id: ROM.5.15
reference: Romans 5:15
source:
  edition: SBLGNT
  text: Ἀλλ’ οὐχ ὡς τὸ παράπτωμα, οὕτως καὶ τὸ χάρισμα· εἰ γὰρ τῷ τοῦ ἑνὸς παραπτώματι
    οἱ πολλοὶ ἀπέθανον, πολλῷ μᾶλλον ἡ χάρις τοῦ θεοῦ καὶ ἡ δωρεὰ ἐν χάριτι τῇ τοῦ
    ἑνὸς ἀνθρώπου Ἰησοῦ Χριστοῦ εἰς τοὺς πολλοὺς ἐπερίσσευσεν.
translation:
  text: But the gift is not like the trespass. For if by the trespass of the one man
    the many died, much more the grace of God and the gift by the grace of the one
    man, Jesus Messiah, overflowed to the many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gift in grace' / 'the gift that came by grace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παράπτωμα
  chosen: trespass
  alternatives:
  - offense
  - transgression
  lexicon: BDAG
  rationale: In this Adam/Christ contrast, παράπτωμα denotes a wrongful act or lapse.
    'Trespass' is natural modern English and preserves the moral-legal force without
    sounding overly technical.
- source_word: χάρισμα
  chosen: gift
  alternatives:
  - gracious gift
  - free gift
  lexicon: BDAG
  rationale: The contrast is between Adam's trespass and God's gift. 'Gift' is the
    cleanest rendering in English; the gracious character is then reinforced by the
    following χάρις language rather than doubled awkwardly in the same noun.
- source_word: οἱ πολλοί / τοὺς πολλούς
  chosen: the many
  alternatives:
  - many
  - all
  lexicon: BDAG
  rationale: The article is present in both occurrences, and 'the many' preserves
    Paul's representative-corporate contrast between the one and the many. 'All' would
    over-resolve the rhetoric; 'many' alone would under-represent the Greek form.
- source_word: ἡ χάρις τοῦ θεοῦ
  chosen: the grace of God
  alternatives:
  - God's grace
  lexicon: BDAG
  rationale: A slightly more formal phrasing preserves the structure of the Greek
    and keeps parallelism with 'the gift by the grace...' in the next phrase.
- source_word: ἡ δωρεὰ ἐν χάριτι
  chosen: the gift by the grace
  alternatives:
  - the gift in grace
  - the gift in the grace
  - the gift that came by grace
  lexicon: BDAG
  rationale: Here ἐν is rendered instrumentally or associatively in idiomatic English.
    'By the grace' best communicates that the gift comes in connection with and by
    means of grace, while remaining readable.
- source_word: τοῦ ἑνὸς ἀνθρώπου
  chosen: the one man
  alternatives:
  - one man
  lexicon: BDAG
  rationale: The repeated article supports the marked contrast with Adam in the surrounding
    context. 'The one man' preserves Paul's tight one/many parallelism.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Following project policy, Χριστός is translated as 'Messiah' where the
    titular sense remains audible. In this Adam/Christ comparison, the messianic title
    is still meaningful rather than merely surname-like.
- source_word: ἐπερίσσευσεν
  chosen: overflowed
  alternatives:
  - abounded
  - increased greatly
  lexicon: BDAG
  rationale: '''Overflowed'' vividly captures the surplus force of περισσεύω and fits
    the ''much more'' argument of the verse in clear modern English.'
