theological_decisions:
- issue: Scope implied by 'the many' in Adam/Christ parallelism
  chosen_reading: Retain 'the many' without resolving it to 'all.'
  alternative_readings:
  - Render as 'all' to make the representative scope explicit
  rationale: Paul's rhetoric here deliberately uses one/many language. Translating
    'the many' preserves the textual tension and avoids importing a fuller theological
    conclusion from the larger passage into this single verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
