id: ROM.5.2
reference: Romans 5:2
source:
  edition: SBLGNT
  text: δι’ οὗ καὶ τὴν προσαγωγὴν ἐσχήκαμεν τῇ πίστει εἰς τὴν χάριν ταύτην ἐν ᾗ ἑστήκαμεν,
    καὶ καυχώμεθα ἐπ’ ἐλπίδι τῆς δόξης τοῦ θεοῦ·
translation:
  text: through whom we also have obtained access by faith into this grace in which
    we stand, and we boast in the hope of the glory of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "rejoice" or "exult".
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαγωγή
  chosen: access
  alternatives:
  - entrance
  - introduction
  lexicon: BDAG
  rationale: '"Access" best fits Paul''s idea of being brought into a state of favor
    before God, while remaining natural in English. "Introduction" is possible but
    sounds too interpersonal here.'
- source_word: πίστει
  chosen: by faith
  alternatives:
  - through faith
  lexicon: BDAG
  rationale: The dative is naturally rendered instrumentally here. "By faith" is concise,
    idiomatic, and aligns with the project's default rendering of πίστις as "faith."
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '"Grace" is the established and theologically appropriate rendering in
    this Pauline context, referring to God''s gracious standing granted to believers.'
- source_word: ἑστήκαμεν
  chosen: we stand
  alternatives:
  - we have stood
  - we stand firm
  lexicon: BDAG
  rationale: The perfect conveys a present state resulting from prior action. "We
    stand" communicates that ongoing state clearly in natural English.
- source_word: καυχώμεθα
  chosen: we boast
  alternatives:
  - we rejoice
  - we exult
  lexicon: BDAG
  rationale: Paul frequently uses this verb in a positive theological sense of confident
    boasting. "Boast" preserves the lexical link better than "rejoice," though the
    latter is a viable contextual alternative.
- source_word: ἐπ’ ἐλπίδι
  chosen: in the hope
  alternatives:
  - on the basis of hope
  - in hope
  lexicon: BDAG
  rationale: This rendering is idiomatic and preserves the sense that hope is the
    sphere or basis of the boasting.
- source_word: δόξης τοῦ θεοῦ
  chosen: the glory of God
  alternatives:
  - God's glory
  lexicon: BDAG
  rationale: '"The glory of God" is the most transparent rendering of the genitive
    construction and preserves the solemn tone of the Greek.'
