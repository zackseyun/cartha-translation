theological_decisions:
- issue: Rendering καυχώμεθα in a way that preserves Paul's theological tension
  chosen_reading: we boast
  alternative_readings:
  - we rejoice
  - we exult
  rationale: The Greek verb can sound jarring in English if rendered too literally,
    but "boast" preserves Paul's deliberate rhetorical force and maintains lexical
    continuity with nearby uses. A smoother rendering like "rejoice" is possible but
    softens that force.
  doctrine_reference: Preserve theological tension rather than resolve it.
