theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline passage
  chosen_reading: through righteousness
  alternative_readings:
  - through justice
  rationale: The doctrinal guidance sets 'righteousness' as the main-text default
    for δικαιοσύνη, while requiring 'justice' to be preserved in a footnote for Pauline
    contexts. This keeps the familiar theological sense without erasing the term's
    justice dimension.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The doctrinal guidance prefers translating Χριστός as 'Messiah' where
    context supports a titular sense. In this closing prepositional phrase, the title
    remains semantically transparent and meaningful.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
