id: ROM.5.21
reference: Romans 5:21
source:
  edition: SBLGNT
  text: ἵνα ὥσπερ ἐβασίλευσεν ἡ ἁμαρτία ἐν τῷ θανάτῳ, οὕτως καὶ ἡ χάρις βασιλεύσῃ
    διὰ δικαιοσύνης εἰς ζωὴν αἰώνιον διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν.
translation:
  text: so that, just as sin reigned in death, so also grace might reign through righteousness
    to eternal life through Jesus the Messiah our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through justice.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' here because Χριστός functions
      as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - so that ... might
  lexicon: BDAG
  rationale: Preserves the clause of purpose/result that governs the following subjunctive,
    while remaining natural in English.
- source_word: ἐβασίλευσεν
  chosen: reigned
  alternatives:
  - ruled as king
  lexicon: BDAG
  rationale: Aorist indicative of βασιλεύω is best rendered with the simple past 'reigned,'
    matching Paul's royal metaphor.
- source_word: ἐν τῷ θανάτῳ
  chosen: in death
  alternatives:
  - through death
  - in the realm of death
  lexicon: BDAG
  rationale: The preposition ἐν most naturally marks sphere here. 'In death' preserves
    the compact Greek expression without over-interpreting it.
- source_word: ἡ χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard rendering that preserves Paul's personification and theological
    contrast with sin.
- source_word: βασιλεύσῃ
  chosen: might reign
  alternatives:
  - may reign
  - should reign
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα is well represented by 'might reign,' preserving
    the purpose/result nuance.
- source_word: διὰ δικαιοσύνης
  chosen: through righteousness
  alternatives:
  - through justice
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'righteousness' as the default for δικαιοσύνη, while
    preserving 'justice' in a footnote for Pauline passages. 'Through' reflects διά
    with the genitive as means or agency.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: to eternal life
  alternatives:
  - unto eternal life
  lexicon: BDAG
  rationale: Clear modern English that preserves the directional force of εἰς and
    the full phrase's theological weight.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per DOCTRINE.md, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the titular sense remains clear.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: our Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord,' and the possessive
    pronoun is naturally carried as 'our Lord.'
