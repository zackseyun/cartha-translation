theological_decisions:
- issue: Sense of καυχώμεθα in a spiritually positive context
  chosen_reading: A positive, God-centered rejoicing rather than self-focused boasting
  alternative_readings:
  - boast
  - exult
  rationale: Paul's argument concerns confidence in what God accomplishes through
    suffering. Rendering with “rejoice” preserves that theological tone in natural
    English without importing prideful overtones.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
