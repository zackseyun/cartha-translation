theological_decisions:
- issue: Rendering Χριστοῦ in a christological title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is a title rather than a mere name component here, so 'Messiah'
    preserves the meaning more transparently while remaining within normal English
    style.
