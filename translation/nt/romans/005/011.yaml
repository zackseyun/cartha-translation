id: ROM.5.11
reference: Romans 5:11
source:
  edition: SBLGNT
  text: οὐ μόνον δέ, ἀλλὰ καὶ καυχώμενοι ἐν τῷ θεῷ διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
    δι’ οὗ νῦν τὴν καταλλαγὴν ἐλάβομεν.
translation:
  text: And not only that, but we also rejoice in God through our Lord Jesus the Messiah,
    through whom we have now received the reconciliation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boast' or 'exult in God.'
    reason: lexical_alternative
  - marker: b
    text: Greek Christos; traditionally 'Christ.'
    reason: alternative_reading
  - marker: c
    text: Or simply 'received reconciliation.'
    reason: lexical_alternative
  - marker: d
    text: For 'Lord,' alternatives sometimes considered include 'Master' or, in other
      contexts, 'LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καυχώμενοι
  chosen: rejoice
  alternatives:
  - boast
  - exult
  lexicon: BDAG
  rationale: In this context of celebratory confidence in God, 'rejoice' communicates
    the positive sense naturally in English while preserving the verbal idea behind
    Paul's wording. 'Boast' is possible, but in contemporary English it can misleadingly
    suggest sinful self-exaltation.
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: A straightforward rendering of the dative object after ἐν, expressing
    the sphere/object of rejoicing.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  - LORD
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος in New Testament
    christological usage.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστοῦ functions as a title with theological meaning, so 'Messiah'
    better preserves the sense of Χριστός than the name-like traditional 'Christ,'
    in keeping with project policy.
- source_word: καταλλαγὴν
  chosen: the reconciliation
  alternatives:
  - reconciliation
  - restoration
  lexicon: BDAG
  rationale: καταλλαγή denotes reconciliation, the restored relationship effected
    through Christ. The article is retained as 'the reconciliation' because Paul points
    to the specific reconciling reality just described in the context.
- source_word: ἐλάβομεν
  chosen: have now received
  alternatives:
  - received
  - obtained
  lexicon: BDAG
  rationale: The aorist is rendered with idiomatic English perfect force alongside
    νῦν ('now') to express a present possession resulting from Christ's completed
    work.
