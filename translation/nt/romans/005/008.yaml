id: ROM.5.8
reference: Romans 5:8
source:
  edition: SBLGNT
  text: συνίστησιν δὲ τὴν ἑαυτοῦ ἀγάπην εἰς ἡμᾶς ὁ θεὸς ὅτι ἔτι ἁμαρτωλῶν ὄντων ἡμῶν
    Χριστὸς ὑπὲρ ἡμῶν ἀπέθανεν.
translation:
  text: But God demonstrates his own love for us in that while we were still sinners,
    Messiah died for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward us' for 'for us' in the phrase 'his own love for us.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christos'; traditionally 'Christ.' Here rendered 'Messiah' as a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'on our behalf' for 'for us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνίστησιν
  chosen: demonstrates
  alternatives:
  - shows
  - proves
  - commends
  lexicon: BDAG
  rationale: Present-tense verb expressing active display or commendation; 'demonstrates'
    is clear modern English and preserves the evidential force without sounding archaic.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  rationale: Marks a mild contrast with the preceding thought; 'But' best reflects
    the argumentative turn here.
- source_word: ἑαυτοῦ
  chosen: his own
  alternatives:
  - his
  lexicon: BDAG
  rationale: The reflexive form adds emphasis; 'his own' preserves that emphasis naturally
    in English.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Matches the project's default rendering for ἀγάπη and fits the context
    straightforwardly.
- source_word: εἰς ἡμᾶς
  chosen: for us
  alternatives:
  - toward us
  lexicon: BDAG
  rationale: In this context the phrase expresses direction of divine love toward
    believers/humans; 'for us' is idiomatic and pairs well with the clause that follows,
    while retaining the sense of love directed toward us.
- source_word: ὅτι
  chosen: in that
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Introduces the content explaining how God demonstrates his love; 'in
    that' captures the explanatory force in natural English.
- source_word: ἔτι ἁμαρτωλῶν ὄντων ἡμῶν
  chosen: while we were still sinners
  alternatives:
  - while we were yet sinners
  - while we were still sinful
  lexicon: BDAG
  rationale: Genitive absolute best rendered as a temporal concessive clause. 'Still
    sinners' is natural, accurate, and preserves the force of ἔτι.
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where used as a title.
    Here it functions christologically rather than merely as a name.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - for our sake
  lexicon: BDAG
  rationale: ὑπέρ here indicates benefactive/substitution-related reference without
    requiring a more theologically loaded English gloss in the main text. 'For us'
    is faithful and readable.
- source_word: ἀπέθανεν
  chosen: died
  lexicon: BDAG
  rationale: Simple aorist verb; 'died' is the direct and sufficient rendering.
