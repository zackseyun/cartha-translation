theological_decisions:
- issue: Rendering Χριστός in Pauline discourse
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is a title and the doctrine file directs that christological
    titles be translated where context supports. In Romans, this preserves the messianic
    sense without changing the verse's theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of ὑπὲρ ἡμῶν
  chosen_reading: for us
  alternative_readings:
  - on our behalf
  - in our place
  rationale: The verse clearly states Christ's death was for our benefit; the Greek
    preposition can support nuances debated in atonement theology, but the text here
    should not be made more specific than warranted. A broader main-text rendering
    preserves theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
