id: ROM.5.5
reference: Romans 5:5
source:
  edition: SBLGNT
  text: ἡ δὲ ἐλπὶς οὐ καταισχύνει· ὅτι ἡ ἀγάπη τοῦ θεοῦ ἐκκέχυται ἐν ταῖς καρδίαις
    ἡμῶν διὰ πνεύματος ἁγίου τοῦ δοθέντος ἡμῖν.
translation:
  text: And hope does not put to shame, because God’s love has been poured out in
    our hearts through the Holy Spirit, who was given to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, “our love for God.”
    reason: alternative_reading
  - marker: b
    text: Or “does not disappoint.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίς
  chosen: hope
  alternatives:
  - the hope
  lexicon: BDAG
  rationale: Standard gloss; the article is generic rather than requiring a more marked
    English expression.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: A light connective is present in Greek and should be represented without
    overstating contrast.
- source_word: καταισχύνει
  chosen: does not put to shame
  alternatives:
  - does not disappoint
  - does not shame
  lexicon: BDAG
  rationale: Keeps the core shame/honor sense of the Greek rather than flattening
    it to mere disappointment, while remaining intelligible in English.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Matches the project’s default rendering for ἀγάπη.
- source_word: τοῦ θεοῦ
  chosen: God’s love
  alternatives:
  - love for God
  lexicon: BDAG
  rationale: The genitive is formally ambiguous, but in context the following clause
    about the Spirit pouring it out in our hearts strongly supports God’s love for
    us rather than our love for God.
- source_word: ἐκκέχυται
  chosen: has been poured out
  alternatives:
  - has been poured
  lexicon: BDAG
  rationale: The perfect tense is best represented with 'has been,' emphasizing a
    past act with abiding result.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  chosen: in our hearts
  lexicon: BDAG
  rationale: Natural and direct rendering of the prepositional phrase.
- source_word: διὰ πνεύματος ἁγίου
  chosen: through the Holy Spirit
  alternatives:
  - through holy spirit
  lexicon: BDAG
  rationale: διά with the genitive is instrumental/mediating here; capitalization
    reflects the personal divine referent in context.
- source_word: τοῦ δοθέντος ἡμῖν
  chosen: who was given to us
  alternatives:
  - which was given to us
  lexicon: BDAG
  rationale: The participle modifies 'Holy Spirit'; English personal 'who' better
    reflects the personal referent than impersonal 'which'.
