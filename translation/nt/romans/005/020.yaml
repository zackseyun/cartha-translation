theological_decisions:
- issue: Whether ἵνα in 'the law came in alongside so that the trespass might increase'
    should be rendered as straightforward purpose or softened to result to avoid implying
    divine approval of sin.
  chosen_reading: 'Rendered with a purpose-style clause: ''so that the trespass might
    increase.'''
  alternative_readings:
  - so that the trespass would increase
  - with the result that the trespass increased
  rationale: The Greek syntax plainly uses ἵνα with the subjunctive, and the translation
    should preserve that force rather than resolve the theological tension. The wording
    does not itself imply moral approval, only divine purpose within Paul's argument.
  doctrine_reference: Preserve theological tension rather than resolve it.
