id: ROM.5.20
reference: Romans 5:20
source:
  edition: SBLGNT
  text: νόμος δὲ παρεισῆλθεν ἵνα πλεονάσῃ τὸ παράπτωμα· οὗ δὲ ἐπλεόνασεν ἡ ἁμαρτία,
    ὑπερεπερίσσευσεν ἡ χάρις,
translation:
  text: Now the law came in alongside so that the trespass might increase; but where
    sin increased, grace overflowed all the more,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came in' or 'slipped in'; the Greek suggests entering alongside or in
      addition.
    reason: lexical_alternative
  - marker: b
    text: Or 'the transgression' or 'the offense.'
    reason: lexical_alternative
  - marker: c
    text: Or 'grace abounded much more.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: With the article and Pauline context, this most naturally refers to the
    Mosaic law. Lowercase 'law' is retained in English since that is standard style,
    while the article preserves the specific referent.
- source_word: παρεισῆλθεν
  chosen: came in alongside
  alternatives:
  - came in
  - slipped in
  - entered in addition
  lexicon: BDAG
  rationale: The verb has the sense of entering alongside or in addition, not merely
    simple entrance. 'Came in alongside' preserves the para- nuance while remaining
    readable modern English.
- source_word: ἵνα πλεονάσῃ
  chosen: so that ... might increase
  alternatives:
  - in order that ... might increase
  - with the result that ... increased
  lexicon: BDAG
  rationale: The aorist subjunctive with ἵνα is best represented with a purpose-style
    clause in English. 'Might increase' preserves the clause's force without overstating
    a simplistic causal mechanism.
- source_word: τὸ παράπτωμα
  chosen: the trespass
  alternatives:
  - the transgression
  - the offense
  lexicon: BDAG
  rationale: '''Trespass'' is natural English and fits Paul''s contrast between Adamic
    offense and divine grace in this context. It is more idiomatic than ''transgression''
    while still conveying a concrete violation.'
- source_word: οὗ
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: This adverbial relative is most naturally rendered 'where' in the contrastive
    construction that follows.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard Pauline rendering; no contextual reason to vary.
- source_word: ὑπερεπερίσσευσεν
  chosen: overflowed all the more
  alternatives:
  - abounded much more
  - overflowed beyond measure
  - super-abounded
  lexicon: BDAG
  rationale: The compound verb intensifies the idea beyond simple increase. 'Overflowed
    all the more' captures both abundance and intensification in clear contemporary
    English.
- source_word: ἡ χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard theological term and the clearest rendering of χάρις here.
