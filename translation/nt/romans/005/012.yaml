id: ROM.5.12
reference: Romans 5:12
source:
  edition: SBLGNT
  text: Διὰ τοῦτο ὥσπερ δι’ ἑνὸς ἀνθρώπου ἡ ἁμαρτία εἰς τὸν κόσμον εἰσῆλθεν καὶ διὰ
    τῆς ἁμαρτίας ὁ θάνατος, καὶ οὕτως εἰς πάντας ἀνθρώπους ὁ θάνατος διῆλθεν ἐφ’ ᾧ
    πάντες ἥμαρτον—
translation:
  text: Therefore, just as sin entered into the world through one man, and death through
    sin, so also death spread to all people, because all sinned—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in whom all sinned.'
    reason: alternative_reading
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding argument; 'Therefore'
    is natural, concise English.
- source_word: δι’ ἑνὸς ἀνθρώπου
  chosen: through one man
  alternatives:
  - by one man
  - through one person
  lexicon: BDAG
  rationale: διά with the genitive is instrumental/mediate, and ἀνθρώπου here points
    to the representative male figure Adam; 'one man' preserves the typological force.
- source_word: ἡ ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: The articular noun is rendered with the standard Pauline gloss 'sin';
    no expansion beyond the Greek is warranted.
- source_word: εἰς τὸν κόσμον εἰσῆλθεν
  chosen: entered into the world
  alternatives:
  - entered the world
  lexicon: BDAG
  rationale: Retains the directional force of εἰς while remaining idiomatic in English.
- source_word: διὰ τῆς ἁμαρτίας ὁ θάνατος
  chosen: and death through sin
  alternatives:
  - and through sin, death
  lexicon: BDAG
  rationale: 'Preserves the parallel structure: sin enters through one man, and death
    enters through sin.'
- source_word: οὕτως
  chosen: so also
  alternatives:
  - thus
  - and so
  lexicon: BDAG
  rationale: Signals the resulting correspondence in Paul's comparison while reading
    smoothly in English.
- source_word: εἰς πάντας ἀνθρώπους
  chosen: to all people
  alternatives:
  - to all men
  - to all humanity
  lexicon: BDAG
  rationale: The phrase is generically inclusive, referring to humanity as a whole
    rather than males specifically; 'all people' best matches the sense in contemporary
    English.
- source_word: ὁ θάνατος διῆλθεν
  chosen: death spread
  alternatives:
  - death passed through
  - death came
  lexicon: BDAG
  rationale: διέρχομαι here conveys movement extending through the human race; 'spread'
    communicates the scope clearly and naturally.
- source_word: ἐφ’ ᾧ
  chosen: because
  alternatives:
  - in whom
  - on the basis of which
  lexicon: BDAG
  rationale: 'In this context the phrase is best taken causally: death spread to all
    because all sinned. This is the most natural reading in context, while the more
    traditional representational reading is preserved in a footnote.'
- source_word: πάντες ἥμαρτον
  chosen: all sinned
  alternatives:
  - all have sinned
  lexicon: BDAG
  rationale: The aorist is rendered as a simple past, matching the Greek verbal form
    without importing a different aspect.
