theological_decisions:
- issue: The sense of ἐφ’ ᾧ πάντες ἥμαρτον
  chosen_reading: 'causal: ''because all sinned'''
  alternative_readings:
  - 'representative/incorporative: ''in whom all sinned'''
  - 'resultative: ''with the result that all sinned'''
  rationale: The Greek most naturally supports a causal sense here, and this avoids
    importing a more specific doctrinal formulation than the text itself requires.
    Because the phrase has major theological significance in discussions of Adam and
    humanity, the traditional alternative is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contested interpretive questions and preserve alternatives in footnotes.
