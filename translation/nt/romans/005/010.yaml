id: ROM.5.10
reference: Romans 5:10
source:
  edition: SBLGNT
  text: εἰ γὰρ ἐχθροὶ ὄντες κατηλλάγημεν τῷ θεῷ διὰ τοῦ θανάτου τοῦ υἱοῦ αὐτοῦ, πολλῷ
    μᾶλλον καταλλαγέντες σωθησόμεθα ἐν τῇ ζωῇ αὐτοῦ·
translation:
  text: For if, while we were enemies, we were reconciled to God through the death
    of his Son, much more, having been reconciled, will we be saved by his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will we be saved in his life.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For since
  lexicon: BDAG
  rationale: 'Keeps Paul''s argumentative flow: γάρ links to the prior claim (''for''),
    and εἰ introduces the conditional premise (''if'').'
- source_word: ἐχθροὶ ὄντες
  chosen: while we were enemies
  alternatives:
  - being enemies
  - while we were hostile
  lexicon: BDAG
  rationale: This rendering communicates both the participial force of ὄντες and the
    relational sense of ἐχθροί in context. 'Enemies' is more direct and natural than
    'hostile,' while preserving the state prior to reconciliation.
- source_word: κατηλλάγημεν
  chosen: we were reconciled
  alternatives:
  - we were restored to favor
  - we were brought into reconciliation
  lexicon: BDAG
  rationale: '''Reconciled'' is the standard and most precise gloss for καταλλάσσω
    in Pauline usage, preserving covenant-relational restoration without paraphrase.'
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - with God
  lexicon: BDAG
  rationale: The dative after καταλλάσσω is naturally rendered 'to God' here, preserving
    the directionality of reconciliation in the Greek while remaining idiomatic English.
- source_word: διὰ τοῦ θανάτου τοῦ υἱοῦ αὐτοῦ
  chosen: through the death of his Son
  alternatives:
  - by means of the death of his Son
  lexicon: BDAG
  rationale: '''Through'' cleanly represents διά with the genitive as means/instrument,
    and ''his Son'' preserves the filial christological designation without expansion.'
- source_word: πολλῷ μᾶλλον
  chosen: much more
  alternatives:
  - all the more
  - far more
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of Paul's a-fortiori expression
    and keeps the rhetorical force concise.
- source_word: καταλλαγέντες
  chosen: having been reconciled
  alternatives:
  - now that we have been reconciled
  - being reconciled
  lexicon: BDAG
  rationale: The aorist passive participle is best represented as antecedent to the
    future verb σωθησόμεθα. 'Having been reconciled' preserves that sequence clearly.
- source_word: σωθησόμεθα
  chosen: will we be saved
  alternatives:
  - we will be saved
  lexicon: BDAG
  rationale: '''Saved'' is the established and contextually appropriate rendering
    of σῴζω here, preserving Paul''s future-oriented soteriological statement. The
    wording keeps the English aligned with the fronted conditional structure.'
- source_word: ἐν τῇ ζωῇ αὐτοῦ
  chosen: by his life
  alternatives:
  - in his life
  lexicon: BDAG
  rationale: 'Although ἐν is often locative (''in''), here the sense is best taken
    instrumentally or causally in context: believers will be saved by virtue of the
    Son''s living existence after death. ''By his life'' is idiomatic and matches
    the death/life contrast in the verse.'
