theological_decisions:
- issue: Force of ἐν τῇ ζωῇ αὐτοῦ
  chosen_reading: 'instrumental: ''by his life'''
  alternative_readings:
  - 'locative/associative: ''in his life'''
  rationale: 'The immediate contrast with ''through the death of his Son'' favors
    a complementary sense: reconciliation came through his death; final salvation
    comes by his living life. This preserves the resurrection-life implication without
    adding terms absent from the Greek.'
  doctrine_reference: Preserve theological tension rather than resolve it
