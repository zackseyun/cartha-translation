id: ROM.1.19
reference: Romans 1:19
source:
  edition: SBLGNT
  text: διότι τὸ γνωστὸν τοῦ θεοῦ φανερόν ἐστιν ἐν αὐτοῖς, ὁ ⸂θεὸς γὰρ⸃ αὐτοῖς ἐφανέρωσεν.
translation:
  text: because what can be known about God is plain among them, for God has made
    it plain to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "within them" or "in them."
    reason: alternative_reading
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground for the previous statement; 'because' gives a clear
    causal connection in natural English.
- source_word: τὸ γνωστὸν
  chosen: what can be known
  alternatives:
  - what is known
  - the knowable
  lexicon: BDAG
  rationale: The articular neuter adjective functions substantivally. 'What can be
    known' best captures the sense of what is knowable or accessible to human knowledge
    here.
- source_word: τοῦ θεοῦ
  chosen: about God
  alternatives:
  - of God
  - concerning God
  lexicon: BDAG
  rationale: 'The genitive is best taken as objective in English idiom: the clause
    speaks of what may be known concerning God, not something belonging to God.'
- source_word: φανερόν
  chosen: plain
  alternatives:
  - evident
  - clear
  - manifest
  lexicon: BDAG
  rationale: '''Plain'' is readable modern English and pairs naturally with the later
    verb ἐφανέρωσεν while preserving the idea of open visibility.'
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in them
  - within them
  lexicon: BDAG
  rationale: The phrase can mean either internal or corporate location. 'Among them'
    fits the immediate context of publicly available revelation, while the internal
    sense is preserved in a footnote.
- source_word: ὁ θεὸς γὰρ αὐτοῖς ἐφανέρωσεν
  chosen: for God has made it plain to them
  alternatives:
  - for God revealed it to them
  - for God manifested it to them
  lexicon: BDAG
  rationale: This keeps the cognate link with φανερόν and uses natural English. 'Made
    it plain' preserves the emphasis on disclosure without sounding overly technical.
