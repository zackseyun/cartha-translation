theological_decisions:
- issue: Sense of ἐν αὐτοῖς
  chosen_reading: among them
  alternative_readings:
  - in them
  - within them
  rationale: The phrase is genuinely ambiguous. The main text adopts the corporate/public
    sense because the surrounding context emphasizes revelation accessible in creation,
    but the possible inward sense is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
