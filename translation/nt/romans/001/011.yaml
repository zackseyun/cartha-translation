theological_decisions:
- issue: Whether 'spiritual gift' should be rendered in a way that suggests a specific
    miraculous charisma or a broader spiritual benefit
  chosen_reading: some spiritual gift
  alternative_readings:
  - some gift of the Spirit
  - some gracious spiritual benefit
  rationale: The Greek phrase itself does not require a narrow technical sense, so
    the translation keeps the broader expression and avoids importing a denominationally
    loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
