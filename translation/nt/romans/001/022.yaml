id: ROM.1.22
reference: Romans 1:22
source:
  edition: SBLGNT
  text: φάσκοντες εἶναι σοφοὶ ἐμωράνθησαν,
translation:
  text: Claiming to be wise, they became fools,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Professing to be wise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they became foolish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φάσκοντες
  chosen: Claiming
  alternatives:
  - Professing
  - Asserting
  lexicon: BDAG
  rationale: A present participle indicating their self-assertion or claim. 'Claiming'
    is natural modern English and preserves the ironic force without adding content.
- source_word: εἶναι
  chosen: to be
  lexicon: BDAG
  rationale: Complements φάσκοντες with the content of the claim; carried straightforwardly
    in English infinitival sense.
- source_word: σοφοὶ
  chosen: wise
  alternatives:
  - wise people
  lexicon: BDAG
  rationale: The predicate adjective is rendered simply as 'wise,' preserving both
    the evaluative sense and the compactness of Paul's wording.
- source_word: ἐμωράνθησαν
  chosen: they became fools
  alternatives:
  - they became foolish
  - they were made foolish
  lexicon: BDAG
  rationale: 'The passive/intransitive force of μωραίνω here is best represented by
    an ingressive result: they came to be fools/foolish. ''They became fools'' preserves
    the sharp irony and matches the nominative σοφοὶ with a parallel nominal contrast
    in English.'
