theological_decisions:
- issue: Whether to render ἐμωράνθησαν as moral quality ('became foolish') or as a
    stronger personal designation ('became fools')
  chosen_reading: became fools
  alternative_readings:
  - became foolish
  - were made foolish
  rationale: 'Paul''s rhetoric is antithetical and biting: claiming wisdom, they are
    exposed as fools. The stronger rendering better preserves the force of the Greek
    without importing extra doctrine.'
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
