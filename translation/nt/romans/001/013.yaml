id: ROM.1.13
reference: Romans 1:13
source:
  edition: SBLGNT
  text: οὐ θέλω δὲ ὑμᾶς ἀγνοεῖν, ἀδελφοί, ὅτι πολλάκις προεθέμην ἐλθεῖν πρὸς ὑμᾶς,
    καὶ ἐκωλύθην ἄχρι τοῦ δεῦρο, ἵνα τινὰ καρπὸν σχῶ καὶ ἐν ὑμῖν καθὼς καὶ ἐν τοῖς
    λοιποῖς ἔθνεσιν.
translation:
  text: Now I do not want you to be unaware, brothers, that I have often planned to
    come to you—but have been prevented until now—so that I might have some fruit
    among you also, just as among the rest of the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters.'
    reason: lexical_alternative
  - marker: b
    text: '''Fruit'' here refers to the results of Paul''s ministry among them.'
    reason: cultural_note
  - marker: c
    text: Or 'the other nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ θέλω ... ἀγνοεῖν
  chosen: I do not want you to be unaware
  alternatives:
  - I do not want you to be ignorant
  - I want you to know
  lexicon: BDAG
  rationale: Keeps Paul's conventional formula with clear modern English. 'Be unaware'
    preserves the negated infinitive structure more transparently than the more idiomatic
    'I want you to know.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, fellow believers
  lexicon: BDAG
  rationale: The vocative is formally masculine plural. Per doctrine, gender-accurate
    rendering is preferred in the main text, with inclusivity noted in a footnote
    where context suggests a mixed audience.
- source_word: πολλάκις προεθέμην
  chosen: I have often planned
  alternatives:
  - I often purposed
  - I often intended
  lexicon: BDAG
  rationale: '''Planned'' is natural modern English for repeated prior intention and
    fits optimal equivalence better than the stiffer ''purposed.'' The English present
    perfect conveys repeated intention extending up to the present context.'
- source_word: ἐκωλύθην
  chosen: have been prevented
  alternatives:
  - was hindered
  - was prevented
  lexicon: BDAG
  rationale: The passive indicates outside hindrance. 'Have been prevented' works
    well with 'until now' and communicates continuing frustration of Paul's plan.
- source_word: ἄχρι τοῦ δεῦρο
  chosen: until now
  alternatives:
  - until the present
  - up to this point
  lexicon: BDAG
  rationale: This idiom is best rendered as a natural temporal expression in English.
- source_word: ἵνα τινὰ καρπὸν σχῶ
  chosen: so that I might have some fruit
  alternatives:
  - so that I might reap some harvest
  - so that I might obtain some result
  lexicon: BDAG
  rationale: Retains Paul's agricultural metaphor while remaining understandable in
    context as ministry result rather than literal produce.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  lexicon: BDAG
  rationale: In context Paul speaks of fruit arising in relation to the Roman believers
    as a group; 'among you' is clearer idiomatic English than the more ambiguous 'in
    you.'
- source_word: τοῖς λοιποῖς ἔθνεσιν
  chosen: the rest of the Gentiles
  alternatives:
  - the other nations
  - the rest of the nations
  lexicon: BDAG
  rationale: In Pauline usage, ἔθνη in this context most naturally refers to Gentiles
    rather than nations in a geopolitical sense. 'The rest' reflects λοιποῖς and implies
    Rome belongs within Paul's wider Gentile mission field.
