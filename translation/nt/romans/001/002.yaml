theological_decisions:
- issue: Whether to render γραφαῖς ἁγίαις as 'holy writings' or 'holy Scriptures'
  chosen_reading: the holy Scriptures
  alternative_readings:
  - holy writings
  - sacred writings
  rationale: Because γραφαί in Pauline usage commonly denotes scriptural writings
    rather than literature in a general sense, 'the holy Scriptures' best conveys
    the recognized canonical force without overinterpreting beyond the text.
