id: ROM.1.2
reference: Romans 1:2
source:
  edition: SBLGNT
  text: ὃ προεπηγγείλατο διὰ τῶν προφητῶν αὐτοῦ ἐν γραφαῖς ἁγίαις
translation:
  text: which he promised beforehand through his prophets in the holy Scriptures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in holy writings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Neuter singular relative pronoun referring back to 'the gospel' in Romans
    1:1; 'which' preserves the formal linkage cleanly in English.
- source_word: προεπηγγείλατο
  chosen: promised beforehand
  alternatives:
  - promised previously
  - announced beforehand
  lexicon: BDAG
  rationale: The compound verb includes the sense of prior promise; 'promised beforehand'
    best preserves both the promissory force and the temporal prefix without sounding
    unnatural.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive it expresses agency or instrumentality; 'through' is
    the most natural English rendering here.
- source_word: προφητῶν
  chosen: prophets
  lexicon: BDAG
  rationale: Standard and precise rendering for the prophetic messengers through whom
    God previously spoke.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The possessive pronoun identifies the prophets as belonging to God; 'his'
    is straightforward and faithful.
- source_word: ἐν
  chosen: in
  alternatives:
  - within
  lexicon: BDAG
  rationale: 'Locative sense is most likely: the promise came through the prophets
    in the sphere of the sacred writings.'
- source_word: γραφαῖς
  chosen: Scriptures
  alternatives:
  - writings
  lexicon: BDAG
  rationale: In this context γραφαί refers not merely to writings in general but to
    sacred scriptural writings; 'Scriptures' communicates that recognized sense in
    natural English.
- source_word: ἁγίαις
  chosen: holy
  alternatives:
  - sacred
  lexicon: BDAG
  rationale: The adjective marks these writings as set apart to God; 'holy' is more
    biblically resonant, while 'sacred' remains a viable alternative.
