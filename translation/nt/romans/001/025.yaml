theological_decisions:
- issue: Genitive nuance in τὴν ἀλήθειαν τοῦ θεοῦ
  chosen_reading: the truth of God
  alternative_readings:
  - God's truth
  - the truth about God
  rationale: The phrase may point to truth belonging to God or truth concerning God.
    Because both are contextually plausible in Romans 1, the main text preserves the
    ambiguity rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
