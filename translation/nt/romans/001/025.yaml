id: ROM.1.25
reference: Romans 1:25
source:
  edition: SBLGNT
  text: οἵτινες μετήλλαξαν τὴν ἀλήθειαν τοῦ θεοῦ ἐν τῷ ψεύδει, καὶ ἐσεβάσθησαν καὶ
    ἐλάτρευσαν τῇ κτίσει παρὰ τὸν κτίσαντα, ὅς ἐστιν εὐλογητὸς εἰς τοὺς αἰῶνας· ἀμήν.
translation:
  text: who exchanged the truth of God for the lie, and revered and served the creation
    rather than the Creator, who is blessed forever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “God's truth” or “the truth about God.”
    reason: alternative_reading
  - marker: b
    text: Or “worshiped and served”; the two Greek verbs are related but not identical,
      the first emphasizing reverence and the second religious service.
    reason: lexical_alternative
  - marker: c
    text: Or “the creature” or “created thing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μετήλλαξαν
  chosen: exchanged
  alternatives:
  - traded
  - changed
  lexicon: BDAG
  rationale: The verb denotes an exchange or substitution, not merely an internal
    change. “Exchanged” is clear, direct, and fits Paul’s accusation of replacing
    what is true with what is false.
- source_word: τὴν ἀλήθειαν τοῦ θεοῦ
  chosen: the truth of God
  alternatives:
  - God's truth
  - the truth about God
  lexicon: BDAG
  rationale: The genitive can be understood in more than one way. “The truth of God”
    preserves that compact ambiguity without forcing either possession (“God's truth”)
    or object (“the truth about God”) into the main text.
- source_word: ἐν τῷ ψεύδει
  chosen: for the lie
  alternatives:
  - in the lie
  - for falsehood
  lexicon: BDAG
  rationale: In this exchange construction, idiomatic English is best expressed with
    “for,” indicating replacement. The singular “the lie” fittingly presents false
    worship as a concentrated, paradigmatic falsehood rather than mere abstract falsity.
- source_word: ἐσεβάσθησαν
  chosen: revered
  alternatives:
  - worshiped
  - venerated
  lexicon: BDAG
  rationale: This verb overlaps with worship language but is distinct from the following
    ἐλάτρευσαν. “Revered” preserves the distinction between giving religious honor
    and rendering cultic service.
- source_word: ἐλάτρευσαν
  chosen: served
  alternatives:
  - worshiped
  - rendered sacred service
  lexicon: BDAG
  rationale: λατρεύω commonly refers to religious service. “Served” is the most natural
    English choice and preserves the distinction from the preceding verb.
- source_word: τῇ κτίσει
  chosen: the creation
  alternatives:
  - the creature
  - created thing
  lexicon: BDAG
  rationale: Given the contrast with “the Creator,” the collective sense “the creation”
    is more natural in English and better captures Paul’s creator/creation contrast
    than the narrower “creature.”
- source_word: παρὰ τὸν κτίσαντα
  chosen: rather than the Creator
  alternatives:
  - instead of the Creator
  - more than the Creator
  lexicon: BDAG
  rationale: Here παρά marks contrast and preference. “Rather than” is idiomatic,
    clear, and suitably strong without overstating the nuance.
- source_word: ὅς ἐστιν εὐλογητὸς εἰς τοὺς αἰῶνας
  chosen: who is blessed forever
  alternatives:
  - who is blessed through the ages
  - who is forever blessed
  lexicon: BDAG
  rationale: This is a doxological relative clause referring to the Creator. “Blessed
    forever” is natural English and preserves the solemn liturgical force of the Greek.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Standard transliteration is appropriate for this liturgical affirmation
    and is immediately recognizable in English.
