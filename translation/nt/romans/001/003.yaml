id: ROM.1.3
reference: Romans 1:3
source:
  edition: SBLGNT
  text: περὶ τοῦ υἱοῦ αὐτοῦ, τοῦ γενομένου ἐκ σπέρματος Δαυὶδ κατὰ σάρκα,
translation:
  text: concerning his Son, who came from the offspring of David according to the
    flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who was descended from the seed of David.”
    reason: lexical_alternative
  - marker: b
    text: “According to the flesh” here refers to human lineage or earthly descent,
      not to sinful nature.
    reason: cultural_note
lexical_decisions:
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  lexicon: BDAG
  rationale: In this epistolary context, περί introduces the content of the gospel
    announced in the previous verse. “Concerning” is slightly more formal and fits
    Paul's compressed syntax well.
- source_word: υἱοῦ
  chosen: Son
  alternatives:
  - son
  lexicon: BDAG
  rationale: Capitalized because the referent is explicitly God's Son in this christological
    context. This reflects referential clarity in English, not an added lexical claim.
- source_word: γενομένου
  chosen: came from
  alternatives:
  - was descended from
  - was born from
  - came to be from
  lexicon: BDAG
  rationale: The participle from γίνομαι can denote coming into a state, origin, or
    descent. “Came from” preserves the verbal force better than the flatter genealogical
    gloss “was descended from,” while remaining natural English.
- source_word: σπέρματος
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: Literally “seed,” but “offspring” is the clearest natural English here
    for Davidic lineage. “Seed” is preserved as an alternative because of its biblical
    resonance.
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name, in keeping with
    the translation policy to transliterate names.
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - in terms of the flesh
  - according to human descent
  lexicon: BDAG
  rationale: Because σάρξ is a contested and theologically weighty term, the default
    rendering “flesh” is preserved in the main text. In this context it refers to
    Christ's human, Davidic lineage rather than to sinful nature.
