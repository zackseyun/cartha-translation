theological_decisions:
- issue: How to render the relation between God's Son and Davidic descent
  chosen_reading: 'Retain both elements straightforwardly: ''his Son'' and ''who came
    from the offspring of David according to the flesh'''
  alternative_readings:
  - Make the line more interpretive with 'with respect to his human nature'
  - Flatten γενομένου into a purely genealogical 'who was descended from David'
  rationale: The verse intentionally holds together divine sonship and genuine human
    Davidic descent without explaining the metaphysics. The translation preserves
    that tension rather than resolving it into later doctrinal shorthand.
  doctrine_reference: Preserve theological tension rather than resolve it; Definition
    of Chalcedon affirmed in DOCTRINE.md
