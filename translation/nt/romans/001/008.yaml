id: ROM.1.8
reference: Romans 1:8
source:
  edition: SBLGNT
  text: Πρῶτον μὲν εὐχαριστῶ τῷ θεῷ μου διὰ Ἰησοῦ Χριστοῦ ⸀περὶ πάντων ὑμῶν, ὅτι ἡ
    πίστις ὑμῶν καταγγέλλεται ἐν ὅλῳ τῷ κόσμῳ.
translation:
  text: First, I thank my God through Jesus Messiah for all of you, because your faith
    is being proclaimed throughout the whole world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or Christ.
    reason: alternative_reading
  - marker: b
    text: Or your faithfulness; also possibly your trust.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρῶτον μὲν
  chosen: First
  alternatives:
  - To begin with
  - First of all
  rationale: Marks the opening point of Paul's discourse. The μὲν is a discourse particle
    naturally absorbed into idiomatic English rather than translated separately.
- source_word: εὐχαριστῶ
  chosen: I thank
  alternatives:
  - I give thanks
  lexicon: BDAG
  rationale: The verb directly expresses thanksgiving; 'I thank' is clear, natural
    English and preserves the personal force.
- source_word: τῷ θεῷ μου
  chosen: my God
  lexicon: BDAG
  rationale: A straightforward possessive construction; preserves Paul's personal
    devotional tone.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: διά with the genitive indicates means or mediation, so 'through' is retained.
    Χριστοῦ is rendered 'Messiah' per the project's default for the title Χριστός
    where its meaning is still felt, rather than preserving the traditional transliteration
    'Christ'.
- source_word: περὶ πάντων ὑμῶν
  chosen: for all of you
  alternatives:
  - concerning all of you
  - regarding all of you
  lexicon: BDAG
  rationale: In this thanksgiving context, περί is idiomatically expressed as 'for'
    in English, yielding natural phrasing without losing sense.
- source_word: ἡ πίστις ὑμῶν
  chosen: your faith
  alternatives:
  - your faithfulness
  - your trust
  lexicon: BDAG
  rationale: πίστις follows the project's default rendering 'faith.' In context it
    refers to the Romans' well-known believing response, while alternative nuances
    remain possible and are preserved in a footnote.
- source_word: καταγγέλλεται
  chosen: is being proclaimed
  alternatives:
  - is proclaimed
  - is being reported
  lexicon: BDAG
  rationale: The present passive suggests an ongoing public declaration. 'Is being
    proclaimed' preserves both the passive voice and the durative sense.
- source_word: ἐν ὅλῳ τῷ κόσμῳ
  chosen: throughout the whole world
  alternatives:
  - in the whole world
  - throughout all the world
  lexicon: BDAG
  rationale: κόσμος here refers to the inhabited world in broad rhetorical scope.
    'Throughout the whole world' communicates the expansive reach of the report in
    natural English.
