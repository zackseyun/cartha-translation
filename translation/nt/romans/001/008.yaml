theological_decisions:
- issue: Rendering Χριστοῦ in the phrase διὰ Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The term is a christological title, and the doctrine guide directs that
    Χριστός be translated as 'Messiah' where the title sense is active. This preserves
    meaning rather than relying on inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms / Translate titles; transliterate
    names'
- issue: Rendering πίστις in ἡ πίστις ὑμῶν
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine guide sets 'faith' as the default rendering for πίστις,
    while requiring significant alternatives to be preserved in a footnote where relevant.
    Here 'faith' best fits Paul's report of the Romans' Christian belief becoming
    widely known.
  doctrine_reference: 'DOCTRINE.md: Contested terms / Preserve theological tension
    rather than resolve it'
