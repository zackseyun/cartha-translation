id: ROM.1.28
reference: Romans 1:28
source:
  edition: SBLGNT
  text: Καὶ καθὼς οὐκ ἐδοκίμασαν τὸν θεὸν ἔχειν ἐν ἐπιγνώσει, παρέδωκεν αὐτοὺς ὁ θεὸς
    εἰς ἀδόκιμον νοῦν, ποιεῖν τὰ μὴ καθήκοντα,
translation:
  text: And since they did not see fit to acknowledge God, God gave them over to an
    unfit mind, to do what is not fitting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to retain God in their knowledge.'
    reason: lexical_alternative
  - marker: b
    text: '''Unfit'' translates a word related to ''see fit'' earlier in the verse,
      preserving Paul''s wordplay; alternatively, ''debased mind.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: since
  alternatives:
  - just as
  - and because
  rationale: Here it introduces the basis for the following judgment, so 'since' communicates
    the causal force more naturally in English than a more wooden 'just as'.
- source_word: ἐδοκίμασαν
  chosen: did not see fit
  alternatives:
  - did not approve
  - did not think worthwhile
  lexicon: BDAG
  rationale: δοκιμάζω here carries the sense of approving after evaluation. 'Did not
    see fit' expresses that evaluative refusal and also helps preserve the wordplay
    with ἀδόκιμον later in the verse.
- source_word: ἔχειν ἐν ἐπιγνώσει
  chosen: to acknowledge
  alternatives:
  - to retain in their knowledge
  - to have in full knowledge
  lexicon: BDAG
  rationale: The phrase is somewhat idiomatic. 'Acknowledge' captures the volitional
    sense of recognizing God rightly, while avoiding awkward English. The alternative
    'retain in their knowledge' is possible and preserved in a footnote because it
    reflects the imagery of keeping God within one's understanding.
- source_word: παρέδωκεν
  chosen: gave them over
  alternatives:
  - handed them over
  - delivered them over
  lexicon: BDAG
  rationale: This is a key repeated verb in the context and 'gave them over' is clear,
    idiomatic, and consistent with the judicial sense of divine abandonment.
- source_word: ἀδόκιμον νοῦν
  chosen: an unfit mind
  alternatives:
  - a debased mind
  - a depraved mind
  - a reprobate mind
  lexicon: BDAG
  rationale: ἀδόκιμος means unapproved or failing the test. 'Unfit' best preserves
    the lexical echo with ἐδοκίμασαν ('did not see fit'), making Paul's wordplay visible
    in English. More traditional options like 'debased' or 'depraved' are interpretively
    heavier.
- source_word: ποιεῖν
  chosen: to do
  alternatives:
  - so that they do
  lexicon: BDAG
  rationale: The infinitive is retained as a purpose/result expression following 'gave
    them over,' and 'to do' is the most direct rendering.
- source_word: τὰ μὴ καθήκοντα
  chosen: what is not fitting
  alternatives:
  - the things that ought not be done
  - what is improper
  lexicon: BDAG
  rationale: καθήκω denotes what is fitting, proper, or appropriate. 'What is not
    fitting' is both accurate and readable, while preserving the moral impropriety
    without overparaphrase.
