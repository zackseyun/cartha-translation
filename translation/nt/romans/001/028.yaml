theological_decisions:
- issue: Whether to heighten ἀδόκιμον νοῦν into a stronger doctrinal rendering such
    as 'depraved' or 'reprobate.'
  chosen_reading: an unfit mind
  alternative_readings:
  - a debased mind
  - a depraved mind
  - a reprobate mind
  rationale: The verse describes God's judicial giving-over, but the adjective itself
    need not be rendered with later theological terminology. 'Unfit' preserves the
    immediate lexical sense and Paul's wordplay without importing a more systematized
    doctrinal term into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
