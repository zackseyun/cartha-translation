id: ROM.1.9
reference: Romans 1:9
source:
  edition: SBLGNT
  text: μάρτυς γάρ μού ἐστιν ὁ θεός, ᾧ λατρεύω ἐν τῷ πνεύματί μου ἐν τῷ εὐαγγελίῳ
    τοῦ υἱοῦ αὐτοῦ, ὡς ἀδιαλείπτως μνείαν ὑμῶν ποιοῦμαι
translation:
  text: For God, whom I serve in my spirit in the good news of his Son, is my witness
    that I continually mention you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “in my spirit.”'
    reason: lexical_alternative
  - marker: b
    text: 'Or: “gospel.”'
    reason: lexical_alternative
  - marker: c
    text: Literally, “I make mention of you.”
    reason: lexical_alternative
  - marker: d
    text: Or 'For God is my witness—whom I serve with my spirit in the good news of
      his Son—that I continually mention you.'.
    reason: previous_rendering
lexical_decisions:
- source_word: μάρτυς
  chosen: witness
  alternatives:
  - testimony
  lexicon: BDAG
  rationale: In this oath-like appeal, μάρτυς refers to one who bears witness to the
    truth of Paul's claim; 'witness' is the most natural English equivalent.
- source_word: λατρεύω
  chosen: serve
  alternatives:
  - worship
  lexicon: BDAG
  rationale: λατρεύω can denote religious service or worship. Here Paul describes
    his devoted service to God, and 'serve' preserves both the cultic sense and readable
    English flow.
- source_word: ἐν τῷ πνεύματί μου
  chosen: with my spirit
  alternatives:
  - in my spirit
  lexicon: BDAG
  rationale: The preposition ἐν here likely expresses means or manner rather than
    simple location. 'With my spirit' is idiomatic in English while preserving the
    inward, personal dimension of Paul's service.
- source_word: εὐαγγελίῳ
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: The project prioritizes readable modern English over inherited ecclesiastical
    jargon where appropriate. 'Good news' communicates the plain sense of εὐαγγέλιον
    clearly.
- source_word: τοῦ υἱοῦ αὐτοῦ
  chosen: of his Son
  alternatives:
  - about his Son
  lexicon: BDAG
  rationale: The genitive is retained straightforwardly as 'of his Son.' While 'about
    his Son' is a possible interpretive expansion, the more transparent rendering
    better matches the Greek form.
- source_word: ἀδιαλείπτως
  chosen: continually
  alternatives:
  - unceasingly
  - constantly
  lexicon: BDAG
  rationale: The adverb conveys ongoing regularity. 'Continually' is natural modern
    English and preserves the sense without sounding overly wooden.
- source_word: μνείαν ὑμῶν ποιοῦμαι
  chosen: I mention you
  alternatives:
  - I make mention of you
  - I remember you
  lexicon: BDAG
  rationale: This idiom literally means 'make mention of you.' 'I mention you' preserves
    the sense in smoother English; 'remember you' would overinterpret beyond the wording.
