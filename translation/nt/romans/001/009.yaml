theological_decisions:
- issue: Whether to render εὐαγγέλιον as the traditional 'gospel' or the more transparent
    'good news'
  chosen_reading: good news
  alternative_readings:
  - gospel
  rationale: No doctrinal issue is altered by either rendering, but 'good news' better
    fits the project's stated preference for accessible modern English while remaining
    faithful to the source.
  doctrine_reference: Translation philosophy §6
