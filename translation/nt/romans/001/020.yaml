id: ROM.1.20
reference: Romans 1:20
source:
  edition: SBLGNT
  text: τὰ γὰρ ἀόρατα αὐτοῦ ἀπὸ κτίσεως κόσμου τοῖς ποιήμασιν νοούμενα καθορᾶται,
    ἥ τε ἀΐδιος αὐτοῦ δύναμις καὶ θειότης, εἰς τὸ εἶναι αὐτοὺς ἀναπολογήτους,
translation:
  text: For his invisible attributes—both his eternal power and divinity—have been
    clearly seen since the creation of the world, being understood through what has
    been made, so that they are without excuse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his invisible qualities.”
    reason: lexical_alternative
  - marker: b
    text: Or “divine nature”; the Greek word here is θειότης, not the stronger term
      θεότης.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἀόρατα αὐτοῦ
  chosen: his invisible attributes
  alternatives:
  - the invisible things about him
  - his invisible qualities
  lexicon: BDAG
  rationale: The neuter plural refers broadly to what is unseen about God. “Attributes”
    makes explicit that Paul is speaking of perceivable aspects of God’s reality,
    not invisible objects.
- source_word: ἀπὸ κτίσεως κόσμου
  chosen: since the creation of the world
  alternatives:
  - from the creation of the world
  lexicon: BDAG
  rationale: This phrase marks the time from which God’s invisible attributes have
    been perceivable. “Since” is natural modern English and preserves the temporal
    force of ἀπό.
- source_word: τοῖς ποιήμασιν
  chosen: through what has been made
  alternatives:
  - through the things that have been made
  - in his works
  lexicon: BDAG
  rationale: 'The dative is instrumental here: created things are the means through
    which understanding occurs. “What has been made” is readable and faithful to the
    passive/resultative sense.'
- source_word: νοούμενα
  chosen: being understood
  alternatives:
  - being perceived by the mind
  - being comprehended
  lexicon: BDAG
  rationale: 'The participle explains how the unseen becomes perceptible: it is grasped
    mentally from creation. “Being understood” preserves that cognitive nuance without
    sounding academic.'
- source_word: καθορᾶται
  chosen: have been clearly seen
  alternatives:
  - are clearly seen
  - have been perceived plainly
  lexicon: BDAG
  rationale: The present passive states an ongoing reality; the English present perfect
    naturally conveys that this has been the case from creation onward. “Clearly seen”
    reflects the intensive force of the verb.
- source_word: ἥ τε ἀΐδιος αὐτοῦ δύναμις
  chosen: both his eternal power
  alternatives:
  - namely, his everlasting power
  lexicon: BDAG
  rationale: This phrase stands in apposition to “his invisible attributes.” “Eternal”
    is the most natural rendering of ἀΐδιος and preserves the sense of unending divine
    power.
- source_word: θειότης
  chosen: divinity
  alternatives:
  - divine nature
  - deity
  lexicon: BDAG
  rationale: θειότης refers to divine quality or divinity, not quite the stronger
    ontological term θεότης. “Divinity” best preserves that distinction in English.
- source_word: εἰς τὸ εἶναι αὐτοὺς ἀναπολογήτους
  chosen: so that they are without excuse
  alternatives:
  - so that they may be without excuse
  - leaving them without excuse
  lexicon: BDAG
  rationale: The construction expresses result. “So that they are without excuse”
    stays close to the Greek while reading clearly in modern English.
