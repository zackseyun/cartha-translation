theological_decisions:
- issue: Rendering θειότης without overstating Paul’s wording
  chosen_reading: divinity
  alternative_readings:
  - divine nature
  - deity
  rationale: The verse affirms that creation reveals truly divine reality about God,
    but θειότης is better rendered with a term of divine quality rather than the stronger
    “deity,” which can blur the lexical distinction from θεότης.
