theological_decisions:
- issue: Rendering Χριστός in a Pauline self-identification
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The term functions as a title, and the doctrine excerpt directs that Christological titles be translated where context supports. This preserves the messianic sense without importing extra doctrinal explanation.
  doctrine_reference: 'DOCTRINE.md: ''Χριστός Christos → Messiah (where title; Christ where name-like)'''
- issue: Rendering δοῦλος in Romans 1:1
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt explicitly identifies Romans 1:1 as a context where the bonded nature of δοῦλος is salient, so 'slave' best reflects the source text's force.
  doctrine_reference: 'DOCTRINE.md: ''δοῦλος doulos → servant / slave (context-dependent)'' with Rom 1:1 named as a ''slave'' context'
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/romans/001/001.json
  category: awkward_english
  tier: 1
  from: called as an apostle
  to: a called apostle
  rationale: 'The Greek presents three descriptions of Paul: a noun phrase (''a slave...''), an adjectival noun phrase (''a called apostle''), and a participial phrase (''set apart...''). The current rendering turns the second item into a verbal phrase, which slightly disrupts the parallelism and requires adding ''as''. The suggested rewrite ''a called apostle'' is perfectly natural English (cf. ESV, NASB, NRSV), more closely reflects the Greek syntax (adjective + noun), and maintains the appositional flow from the preceding phrase.'
