id: ROM.1.1
reference: Romans 1:1
source:
  edition: SBLGNT
  text: Παῦλος δοῦλος ⸂Χριστοῦ Ἰησοῦ⸃, κλητὸς ἀπόστολος, ἀφωρισμένος εἰς εὐαγγέλιον θεοῦ
translation:
  text: Paul, a slave of Messiah Jesus, a called apostle, set apart for the gospel of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or servant; also traditionally bondservant.
    reason: lexical_alternative
  - marker: b
    text: Or Christ Jesus.
    reason: lexical_alternative
  - marker: c
    text: Or called apostle; more interpretively, called to be an apostle.
    reason: alternative_reading
  - marker: d
    text: Or 'called as an apostle'.
    reason: previous_rendering
lexical_decisions:
- source_word: Παῦλος
  chosen: Paul
  alternatives:
  - Paulos
  rationale: Standard English transliteration of the personal name rather than a more literal transliteration.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: In Romans 1:1 the bonded, owned relationship is theologically salient, and the doctrine excerpt explicitly cites this verse as a case where 'slave' is preferred over 'servant'.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title, so it is translated rather than transliterated, following the doctrine guideline for Χριστός.
- source_word: Ἰησοῦ
  chosen: Jesus
  rationale: Standard English transliteration of the personal name.
- source_word: κλητὸς ἀπόστολος
  chosen: called as an apostle
  alternatives:
  - called apostle
  - called to be an apostle
  lexicon: BDAG
  rationale: Conveys the predicative force of the Greek naturally in English without adding too much beyond the text. 'Called to be an apostle' is interpretive; 'called apostle' is more wooden.
- source_word: ἀφωρισμένος
  chosen: set apart
  alternatives:
  - separated
  - appointed
  lexicon: BDAG
  rationale: '''Set apart'' preserves the passive participial sense and its consecratory nuance in readable English.'
- source_word: εἰς
  chosen: for
  alternatives:
  - for the purpose of
  - unto
  lexicon: BDAG
  rationale: Here εἰς marks purpose/result; 'for' is the most natural concise rendering.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is readable modern English and preserves the term''s established theological weight; ''good news'' is possible but slightly flatter here.'
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: A straightforward genitive rendering that stays close to the Greek phrasing and cadence.
