id: ROM.1.29
reference: Romans 1:29
source:
  edition: SBLGNT
  text: πεπληρωμένους πάσῃ ⸀ἀδικίᾳ πονηρίᾳ πλεονεξίᾳ κακίᾳ, μεστοὺς φθόνου φόνου ἔριδος
    δόλου κακοηθείας, ψιθυριστάς,
translation:
  text: filled with every kind of unrighteousness, evil, greed, and malice; full of
    envy, murder, strife, deceit, and maliciousness; whisperers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all unrighteousness'; the Greek phrase expresses comprehensive scope.
    reason: lexical_alternative
  - marker: b
    text: '''Whisperers'' can also be rendered ''gossips'' or ''secret slanderers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πεπληρωμένους
  chosen: filled
  alternatives:
  - having been filled
  - being filled
  lexicon: BDAG
  rationale: The perfect passive participle describes an existing state resulting
    from prior action. 'Filled' is natural English in this vice-list context and preserves
    the passive/resultative sense without awkwardness.
- source_word: πάσῃ
  chosen: every kind of
  alternatives:
  - all
  - every
  lexicon: BDAG
  rationale: With the singular abstract nouns that follow, πᾶς is best expressed idiomatically
    as 'every kind of,' conveying comprehensive scope in readable English.
- source_word: ἀδικίᾳ
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: In Paul, ἀδικία often carries a moral dimension broader than merely social
    injustice. 'Unrighteousness' preserves that ethical breadth and fits the vice-list
    register.
- source_word: πονηρίᾳ
  chosen: evil
  alternatives:
  - wickedness
  lexicon: BDAG
  rationale: A concise and natural rendering that captures general moral badness without
    sounding archaic.
- source_word: πλεονεξίᾳ
  chosen: greed
  alternatives:
  - covetousness
  - avarice
  lexicon: BDAG
  rationale: '''Greed'' is the clearest modern-English equivalent and communicates
    grasping desire for more.'
- source_word: κακίᾳ
  chosen: malice
  alternatives:
  - badness
  - wickedness
  lexicon: BDAG
  rationale: '''Malice'' gives this term a sharper interpersonal sense and helps distinguish
    it from the broader πονηρία already rendered ''evil.'''
- source_word: μεστοὺς
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: A distinct rendering from πεπληρωμένους helps reflect the Greek variation
    while remaining idiomatic.
- source_word: φθόνου
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: '''Envy'' is the standard and more precise vice-term here.'
- source_word: φόνου
  chosen: murder
  alternatives:
  - killing
  lexicon: BDAG
  rationale: The vice-list context favors the morally charged 'murder' rather than
    the more neutral 'killing.'
- source_word: ἔριδος
  chosen: strife
  alternatives:
  - quarreling
  - rivalry
  lexicon: BDAG
  rationale: '''Strife'' is concise, traditional in vice lists, and captures contentious
    discord.'
- source_word: δόλου
  chosen: deceit
  alternatives:
  - treachery
  - guile
  lexicon: BDAG
  rationale: '''Deceit'' is clear modern English and preserves the sense of deliberate
    deception.'
- source_word: κακοηθείας
  chosen: maliciousness
  alternatives:
  - spite
  - ill will
  lexicon: BDAG
  rationale: This term overlaps with κακία but is not identical; 'maliciousness' preserves
    the nuance of ill-disposed character and avoids collapsing the two Greek words
    into one English gloss.
- source_word: ψιθυριστάς
  chosen: whisperers
  alternatives:
  - gossips
  - secret slanderers
  lexicon: BDAG
  rationale: The literal imagery of whispering is worth preserving, especially since
    the next verse uses a different term for overt slanderers. This keeps the distinction
    visible to the reader.
