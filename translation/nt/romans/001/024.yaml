theological_decisions:
- issue: Whether to intensify παρέδωκεν into an interpretive gloss such as 'judicially
    abandoned them'
  chosen_reading: gave them over
  alternative_readings:
  - abandoned them
  - judged them by handing them over
  rationale: The verse clearly presents divine handing over, but more explicit doctrinal
    interpretation goes beyond the wording of the text. The translation preserves
    the text's theological weight without importing a fuller systematic gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
