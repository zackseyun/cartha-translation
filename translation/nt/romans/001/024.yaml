id: ROM.1.24
reference: Romans 1:24
source:
  edition: SBLGNT
  text: ⸀Διὸ παρέδωκεν αὐτοὺς ὁ θεὸς ἐν ταῖς ἐπιθυμίαις τῶν καρδιῶν αὐτῶν εἰς ἀκαθαρσίαν
    τοῦ ἀτιμάζεσθαι τὰ σώματα αὐτῶν ἐν ⸀αὐτοῖς,
translation:
  text: Therefore God gave them over in the desires of their hearts to impurity, so
    that their bodies were dishonored among themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among them'; possibly 'in themselves.'
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' is natural
    modern English and preserves the logical connection.
- source_word: παρέδωκεν
  chosen: gave them over
  alternatives:
  - handed them over
  - delivered them over
  lexicon: BDAG
  rationale: This verb carries the sense of handing someone over to a controlling
    power or condition. 'Gave them over' is established, clear English and preserves
    the judicial force without paraphrase.
- source_word: ἐν ταῖς ἐπιθυμίαις τῶν καρδιῶν αὐτῶν
  chosen: in the desires of their hearts
  alternatives:
  - through the desires of their hearts
  - to the desires of their hearts
  lexicon: BDAG
  rationale: The prepositional phrase is retained with 'in' to stay close to the Greek
    while remaining understandable. It expresses the sphere or operative context in
    which the handing over occurs.
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - lusts
  - cravings
  lexicon: BDAG
  rationale: '''Desires'' is broad enough to reflect the Greek without prematurely
    narrowing it to sexual lust alone, though the context develops in that direction.'
- source_word: καρδιῶν
  chosen: hearts
  alternatives:
  - inner selves
  - minds
  lexicon: BDAG
  rationale: '''Hearts'' preserves the biblical anthropology of the source text and
    remains standard readable English.'
- source_word: ἀκαθαρσίαν
  chosen: impurity
  alternatives:
  - uncleanness
  lexicon: BDAG
  rationale: '''Impurity'' is natural modern English and conveys moral uncleanness
    without archaic tone.'
- source_word: τοῦ ἀτιμάζεσθαι
  chosen: so that ... were dishonored
  alternatives:
  - for the dishonoring of
  - resulting in ... being dishonored
  lexicon: BDAG
  rationale: The articular infinitive is rendered as a result clause for readable
    English. This captures the sense of consequence without flattening the syntax
    into mere paraphrase.
- source_word: σώματα
  chosen: bodies
  alternatives:
  - physical bodies
  lexicon: BDAG
  rationale: The plain term 'bodies' accurately reflects the concrete noun and preserves
    Paul's bodily emphasis.
- source_word: ἐν αὐτοῖς
  chosen: among themselves
  alternatives:
  - among them
  - in themselves
  lexicon: BDAG
  rationale: The phrase is syntactically compact and somewhat debated. 'Among themselves'
    best captures the reciprocal/social sense in context while remaining idiomatic
    English.
