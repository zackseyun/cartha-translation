theological_decisions:
- issue: Concessive force of γνόντες
  chosen_reading: Although they knew God
  alternative_readings:
  - Having known God
  - When they knew God
  rationale: 'The participle is best taken concessively in context: Paul emphasizes
    culpability despite genuine knowledge of God. This is a grammatical-contextual
    judgment, not an imported doctrinal conclusion.'
  doctrine_reference: Preserve theological tension rather than resolve it.
