id: ROM.1.4
reference: Romans 1:4
source:
  edition: SBLGNT
  text: τοῦ ὁρισθέντος υἱοῦ θεοῦ ἐν δυνάμει κατὰ πνεῦμα ἁγιωσύνης ἐξ ἀναστάσεως νεκρῶν,
    Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν,
translation:
  text: and who was appointed Son of God in power according to the Spirit of holiness
    by the resurrection from the dead—Jesus the Messiah, our Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declared' or 'designated' Son of God in power.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the Holy Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁρισθέντος
  chosen: appointed
  alternatives:
  - declared
  - designated
  - determined
  lexicon: BDAG
  rationale: The participle of ὁρίζω can mean determine, appoint, or designate. 'Appointed'
    best preserves the force of being marked out into a new manifest status 'in power'
    while avoiding an overly interpretive paraphrase. Because this term is theologically
    sensitive, major alternatives are preserved in a footnote.
- source_word: υἱοῦ θεοῦ
  chosen: Son of God
  lexicon: BDAG
  rationale: This is the standard and direct rendering of the genitive phrase, preserving
    both the christological title and the anarthrous compression of the Greek without
    dilution.
- source_word: ἐν δυνάμει
  chosen: in power
  alternatives:
  - with power
  - powerfully
  lexicon: BDAG
  rationale: '''In power'' is the most natural close rendering and preserves the likely
    sense that the Son is appointed in a new mode or manifestation of power, rather
    than merely described as powerful.'
- source_word: κατὰ πνεῦμα ἁγιωσύνης
  chosen: according to the Spirit of holiness
  alternatives:
  - according to the Holy Spirit
  - according to his holy spirit
  lexicon: BDAG
  rationale: A formally transparent rendering best preserves the unusual phrase and
    avoids prematurely resolving whether Paul refers directly to the Holy Spirit or
    to a contrastive sphere of holiness over against 'according to the flesh' in verse
    3. The capitalized 'Spirit' is retained as the most likely reading, with alternatives
    footnoted.
- source_word: ἐξ ἀναστάσεως νεκρῶν
  chosen: by the resurrection from the dead
  alternatives:
  - from the resurrection of the dead
  - by resurrection from among the dead
  lexicon: BDAG
  rationale: This rendering is idiomatic in English and captures ἐξ as indicating
    the basis or occasion of the designation. 'From the dead' is the clearest natural
    equivalent in context.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where it functions
    as a title rather than a name-like form. Here 'Jesus the Messiah' naturally preserves
    the title's meaning.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the project's default rendering for κύριος, 'Lord' best preserves
    both christological and covenantal resonance in Pauline usage.
