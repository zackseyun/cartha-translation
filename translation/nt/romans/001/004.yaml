theological_decisions:
- issue: Whether ὁρισθέντος implies that Jesus became Son of God only at the resurrection
  chosen_reading: The translation preserves the Greek expression 'appointed Son of
    God in power' without implying that Jesus first became God's Son at the resurrection.
  alternative_readings:
  - declared to be the Son of God in power
  - designated Son of God in power
  rationale: In context with verse 3 and historic orthodox Christology, the phrase
    is best understood as referring to a new public or powerful manifestation of sonship,
    not an adoptionist beginning of sonship. The wording preserves the textual tension
    rather than resolving it beyond what the Greek states.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
- issue: Whether πνεῦμα ἁγιωσύνης refers specifically to the Holy Spirit
  chosen_reading: The main text uses 'the Spirit of holiness' and leaves the exact
    referent somewhat open.
  alternative_readings:
  - the Holy Spirit
  - his holy spirit
  rationale: The phrase is unusual and likely intentionally parallel to 'according
    to the flesh' in verse 3. A transparent rendering avoids importing more interpretive
    certainty than the Greek demands.
