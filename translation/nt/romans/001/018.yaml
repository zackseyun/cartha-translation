id: ROM.1.18
reference: Romans 1:18
source:
  edition: SBLGNT
  text: Ἀποκαλύπτεται γὰρ ὀργὴ θεοῦ ἀπ’ οὐρανοῦ ἐπὶ πᾶσαν ἀσέβειαν καὶ ἀδικίαν ἀνθρώπων
    τῶν τὴν ἀλήθειαν ἐν ἀδικίᾳ κατεχόντων,
translation:
  text: For the wrath of God is being revealed from heaven against all ungodliness
    and unrighteousness of people who suppress the truth in unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "is revealed."
    reason: lexical_alternative
  - marker: b
    text: Or "men"; the Greek refers to human beings generally.
    reason: lexical_alternative
  - marker: c
    text: Or "in unrighteousness."
    reason: lexical_alternative
  - marker: d
    text: '"Suppress" may also be rendered "hold down" or "restrain" in this context.'
    reason: lexical_alternative
  - marker: e
    text: Or 'unrighteousness of people who suppress the truth by unrighteousness'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀποκαλύπτεται
  chosen: is being revealed
  alternatives:
  - is revealed
  lexicon: BDAG
  rationale: Present passive indicative; "is being revealed" preserves the ongoing
    present sense more clearly than a simple English present while remaining natural.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation or grounding for the preceding statement; "For" best
    preserves Paul’s connective logic.
- source_word: ὀργὴ θεοῦ
  chosen: God’s wrath
  alternatives:
  - the wrath of God
  lexicon: BDAG
  rationale: A direct genitival rendering. "Wrath" preserves the personal, judicial
    force of ὀργή better than softened alternatives such as "anger" in this context.
- source_word: ἀπ’ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: A straightforward prepositional rendering indicating heavenly source/origin.
- source_word: πᾶσαν ἀσέβειαν
  chosen: all ungodliness
  alternatives:
  - every ungodliness
  - all impiety
  lexicon: BDAG
  rationale: '"Ungodliness" is the clearest established equivalent for ἀσέβεια and
    preserves its vertical orientation toward irreverence toward God.'
- source_word: ἀδικίαν
  chosen: unrighteousness
  alternatives:
  - wickedness
  - injustice
  lexicon: BDAG
  rationale: '"Unrighteousness" keeps the moral and relational breadth of ἀδικία and
    aligns with Pauline usage. "Injustice" is possible but too narrow here.'
- source_word: ἀνθρώπων
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: The noun is generic here, referring to humanity rather than males specifically.
    "People" is gender-accurate to the sense of the Greek in this context.
- source_word: τῶν ... κατεχόντων
  chosen: who suppress
  alternatives:
  - who hold down
  - who restrain
  lexicon: BDAG
  rationale: In context κατέχω carries the sense of suppressing or stifling the truth,
    not merely possessing or restraining in a neutral sense.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  lexicon: BDAG
  rationale: A direct rendering; no contextual reason to narrow or paraphrase the
    term.
- source_word: ἐν ἀδικίᾳ
  chosen: by unrighteousness
  alternatives:
  - in unrighteousness
  lexicon: BDAG
  rationale: 'The phrase most naturally expresses means or manner here: they suppress
    the truth by means of unrighteousness. The more literal "in unrighteousness" remains
    a viable alternative.'
