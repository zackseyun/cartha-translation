theological_decisions:
- issue: Whether ὀργὴ θεοῦ should be softened to an impersonal consequence
  chosen_reading: God’s wrath refers to God’s own judicial wrath
  alternative_readings:
  - an impersonal process of moral consequence
  rationale: The genitive construction and Pauline argument support a personal divine response, not merely an abstract built-in consequence. The translation preserves the text’s theological weight without expanding beyond it.
revisions:
- timestamp: '2026-04-21T05:23:38Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/romans/001/018.json
  category: awkward_english
  tier: 1
  from: unrighteousness of people who suppress the truth by unrighteousness
  to: unrighteousness of those who suppress the truth in their unrighteousness
  rationale: The repetition of 'unrighteousness' is faithful to the Greek (ἀδικίαν...ἐν
    ἀδικίᾳ) and theologically significant. However, the phrasing in the current draft
    can sound slightly circular in English. Using 'those who' (a classic rendering
    for the articular participle τῶν...κατεχόντων) and specifying 'their unrighteousness'
    can improve the rhetorical flow and clarity for the English reader without altering
    the core meaning. This also allows for the equally valid 'in' for ἐν, which can
    convey the sense of unrighteousness as the sphere in which suppression occurs.
- timestamp: '2026-04-23T10:00:34Z'
  adjudicator: azure-gpt-5.4-revision-pass
