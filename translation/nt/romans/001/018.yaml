  from: For God’s wrath is being revealed from heaven against all ungodliness and
    unrighteousness of those who suppress the truth in their unrighteousness.
  to: For the wrath of God is being revealed from heaven against all ungodliness and
    unrighteousness of people who suppress the truth in unrighteousness.
  rationale: Added the article in 'the wrath of God' for closer correspondence to
    the Greek, and replaced 'those' with 'people' to make explicit that ἀνθρώπων means
    'people/humans.'
