id: ROM.1.30
reference: Romans 1:30
source:
  edition: SBLGNT
  text: καταλάλους, θεοστυγεῖς, ὑβριστάς, ὑπερηφάνους, ἀλαζόνας, ἐφευρετὰς κακῶν,
    γονεῦσιν ἀπειθεῖς,
translation:
  text: slanderers, God-haters, insolent, arrogant, boastful, inventors of evil, disobedient
    to parents,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “hated by God.”
    reason: alternative_reading
lexical_decisions:
- source_word: καταλάλους
  chosen: slanderers
  alternatives:
  - gossips
  - backbiters
  - malicious talkers
  lexicon: BDAG
  rationale: The term denotes those who speak against others in a defamatory way.
    “Slanderers” is clear, natural English and preserves the ethical force better
    than the more archaic “backbiters.”
- source_word: θεοστυγεῖς
  chosen: God-haters
  alternatives:
  - hated by God
  - God-hating
  lexicon: BDAG
  rationale: The most straightforward active sense is people who hate God. Although
    some have taken it passively (“hated by God”), the active sense best fits the
    vice list and common modern interpretation. A footnote preserves the alternative.
- source_word: ὑβριστάς
  chosen: insolent
  alternatives:
  - violent
  - abusive
  - insulting
  lexicon: BDAG
  rationale: The word can include arrogant and abusive mistreatment of others. “Insolent”
    best captures the shamelessly abusive attitude in concise English without over-narrowing
    to physical violence.
- source_word: ὑπερηφάνους
  chosen: arrogant
  alternatives:
  - proud
  - haughty
  lexicon: BDAG
  rationale: “Arrogant” is readable modern English and distinguishes this term from
    adjacent words in the list while preserving its elevated self-regard.
- source_word: ἀλαζόνας
  chosen: boastful
  alternatives:
  - braggarts
  - pretentious boasters
  lexicon: BDAG
  rationale: The noun refers to swaggering pretenders or boasters. “Boastful” reads
    smoothly in an asyndetic vice list and preserves the core meaning.
- source_word: ἐφευρετὰς κακῶν
  chosen: inventors of evil
  alternatives:
  - devisers of evil
  - inventors of wickedness
  lexicon: BDAG
  rationale: This phrase describes people who creatively devise evil acts. “Inventors
    of evil” is vivid, close to the Greek, and idiomatic in English.
- source_word: γονεῦσιν ἀπειθεῖς
  chosen: disobedient to parents
  alternatives:
  - rebellious against parents
  lexicon: BDAG
  rationale: The dative with the adjective naturally yields “disobedient to parents.”
    This is standard, clear English and preserves the relational focus of the Greek.
