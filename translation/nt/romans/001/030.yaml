theological_decisions:
- issue: Sense of θεοστυγεῖς
  chosen_reading: 'active: ''God-haters'''
  alternative_readings:
  - 'passive: ''hated by God'''
  rationale: The active reading better matches the flow of Paul's human vice list,
    where each term names human dispositions or behaviors rather than divine evaluation.
    The passive possibility is preserved in a footnote because the form has been historically
    discussed.
  doctrine_reference: Preserve theological tension rather than resolve it; preserve
    genuine alternatives in footnotes.
