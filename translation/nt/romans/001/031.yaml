id: ROM.1.31
reference: Romans 1:31
source:
  edition: SBLGNT
  text: ἀσυνέτους, ἀσυνθέτους, ⸀ἀστόργους, ἀνελεήμονας·
translation:
  text: senseless, faithless, heartless, merciless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “untrustworthy” or “covenant-breakers” for faithless.
    reason: lexical_alternative
  - marker: b
    text: Heartless likely carries the sense of being without natural family affection.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσυνέτους
  chosen: senseless
  alternatives:
  - without understanding
  - undiscerning
  - foolish
  lexicon: BDAG
  rationale: The adjective denotes a lack of understanding or discernment. “Senseless”
    is concise, natural English and preserves the moral-intellectual force without
    overstating it as mere low intelligence.
- source_word: ἀσυνθέτους
  chosen: faithless
  alternatives:
  - untrustworthy
  - covenant-breakers
  lexicon: BDAG
  rationale: The term refers to one who does not keep agreements or remains unreliable
    in pledged relationships. “Faithless” communicates relational and moral unreliability
    in idiomatic modern English, while the more specific ‘covenant-breakers’ is preserved
    as an alternative.
- source_word: ἀστόργους
  chosen: heartless
  alternatives:
  - without natural affection
  - without family love
  - unloving
  lexicon: BDAG
  rationale: The word negates στοργή, especially natural familial affection. “Heartless”
    is the best concise modern rendering in this vice list, while the more explicit
    familial nuance is preserved in a footnote.
- source_word: ἀνελεήμονας
  chosen: merciless
  alternatives:
  - unmerciful
  - without mercy
  lexicon: BDAG
  rationale: The adjective straightforwardly means lacking mercy or compassion. “Merciless”
    is the clearest contemporary equivalent and matches the force of the Greek.
