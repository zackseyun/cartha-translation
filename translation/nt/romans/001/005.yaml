theological_decisions:
- issue: Interpretation of ὑπακοὴν πίστεως
  chosen_reading: the obedience of faith
  alternative_readings:
  - the obedience that comes from faith
  - the obedience that consists in faith
  rationale: The phrase is syntactically compressed and theologically discussed. In
    line with the project’s philosophy, the main text preserves the ambiguity rather
    than selecting one interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    defaults to “faith.”
