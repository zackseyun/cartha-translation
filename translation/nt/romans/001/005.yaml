id: ROM.1.5
reference: Romans 1:5
source:
  edition: SBLGNT
  text: δι’ οὗ ἐλάβομεν χάριν καὶ ἀποστολὴν εἰς ὑπακοὴν πίστεως ἐν πᾶσιν τοῖς ἔθνεσιν
    ὑπὲρ τοῦ ὀνόματος αὐτοῦ,
translation:
  text: Through whom we received grace and apostleship for the obedience of faith
    among all the nations for the sake of his name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the obedience that comes from faith,” or “the obedience that is faith.”
    reason: alternative_reading
  - marker: b
    text: Or “among all the Gentiles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ οὗ
  chosen: Through whom
  alternatives:
  - through him
  lexicon: BDAG
  rationale: διά with the genitive is instrumental/mediating here. “Through whom”
    preserves the relative connection to the immediately preceding reference to Jesus
    Messiah and keeps Paul’s wording transparent.
- source_word: ἐλάβομεν
  chosen: we received
  alternatives:
  - I received
  lexicon: BDAG
  rationale: The aorist active indicative first person plural is straightforwardly
    “we received.” Although some interpreters take the plural rhetorically or corporately,
    the translation preserves the Greek person and number rather than resolving that
    interpretive question in the main text.
- source_word: χάριν
  chosen: grace
  lexicon: BDAG
  rationale: χάρις is regularly “grace” in Pauline usage and here likely denotes unmerited
    divine favor empowering Paul’s commission.
- source_word: καὶ ἀποστολήν
  chosen: and apostleship
  alternatives:
  - and an apostolic commission
  - the grace of apostleship
  lexicon: BDAG
  rationale: The Greek presents two coordinated accusatives, so the draft keeps both
    nouns rather than collapsing them into a single idea. “Apostleship” preserves
    the formal sense of Paul’s commissioned role.
- source_word: εἰς
  chosen: for
  alternatives:
  - unto
  - resulting in
  lexicon: BDAG
  rationale: Here εἰς expresses purpose/goal. “For” is natural English while preserving
    the forward movement toward the intended outcome of Paul’s apostolic ministry.
- source_word: ὑπακοὴν πίστεως
  chosen: the obedience of faith
  alternatives:
  - the obedience that comes from faith
  - the obedience that is faith
  lexicon: BDAG
  rationale: This genitive construction is meaningfully ambiguous. The main text keeps
    the more transparent and formally close “the obedience of faith,” preserving Pauline
    theological tension rather than over-resolving the phrase.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine guidelines, πίστις defaults to “faith.” In this phrase,
    alternatives are possible at the interpretive level, but “faith” remains the standard
    rendering.
- source_word: ἐν πᾶσιν τοῖς ἔθνεσιν
  chosen: among all the nations
  alternatives:
  - among all the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean “nations” or “Gentiles.” “Nations” preserves the broader
    ethnic-geographic sense and reflects the missionary scope of Paul’s commission,
    while the Gentile-focused nuance is preserved in a footnote.
- source_word: ὑπὲρ τοῦ ὀνόματος αὐτοῦ
  chosen: for the sake of his name
  alternatives:
  - on behalf of his name
  - for his name
  lexicon: BDAG
  rationale: ὑπέρ here expresses motive/benefit. “For the sake of his name” is idiomatic
    English and preserves the biblical weight of acting for the honor and renown of
    Jesus.
