id: ROM.1.6
reference: Romans 1:6
source:
  edition: SBLGNT
  text: ἐν οἷς ἐστε καὶ ὑμεῖς κλητοὶ Ἰησοῦ Χριστοῦ,
translation:
  text: among whom you also are, called to belong to Jesus the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'called by Jesus the Messiah,' or more literally, 'called ones of Jesus
      the Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν οἷς
  chosen: among whom
  alternatives:
  - in whom
  lexicon: BDAG
  rationale: The relative pronoun is plural dative, referring back to the Gentiles
    in the previous verse; in English, 'among whom' best expresses inclusion within
    that group.
- source_word: ἐστε
  chosen: you are
  alternatives:
  - are
  lexicon: BDAG
  rationale: A straightforward present indicative of εἰμί, retained explicitly in
    English for clarity.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - also you
  - even you
  lexicon: BDAG
  rationale: This preserves the emphatic inclusion of the Roman believers within the
    group just mentioned while keeping natural English word order.
- source_word: κλητοὶ
  chosen: called
  alternatives:
  - called ones
  - invited
  - summoned
  lexicon: BDAG
  rationale: '''Called'' preserves the theological and lexical force of κλητός without
    adding interpretive weight beyond the Greek. ''Called ones'' is more wooden than
    needed in English.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  - the Messiah Jesus
  lexicon: BDAG
  rationale: Ἰησοῦ is transliterated as the personal name 'Jesus.' Χριστοῦ is treated
    as a title here and rendered 'the Messiah' in keeping with the project's policy
    to translate titles where context supports it.
- source_word: κλητοὶ Ἰησοῦ Χριστοῦ
  chosen: called to belong to Jesus the Messiah
  alternatives:
  - called by Jesus the Messiah
  - called ones of Jesus the Messiah
  lexicon: BDAG
  rationale: The bare genitive after κλητοί is compressed in Greek and can suggest
    possession or relation. 'Called to belong to' makes the relationship natural in
    English and fits the context of divine calling into Christ's sphere, while preserving
    the alternative possibilities in a footnote.
