theological_decisions:
- issue: How to represent the genitive relation in κλητοὶ Ἰησοῦ Χριστοῦ
  chosen_reading: called to belong to Jesus the Messiah
  alternative_readings:
  - called by Jesus the Messiah
  - called ones of Jesus the Messiah
  rationale: The phrase most naturally identifies the Roman believers as those who
    belong to Jesus the Messiah by divine calling. This avoids flattening the expression
    into mere agency while still preserving the compressed Greek sense.
