theological_decisions:
- issue: Ἕλληνι in the phrase 'Jew first and also Greek'
  chosen_reading: Greek in the main text, with broader non-Jewish sense noted in a
    footnote
  alternative_readings:
  - Gentile in the main text
  rationale: The translation preserves the actual lexical choice of the Greek text
    while acknowledging that in Pauline usage the term often functions as a representative
    label for Gentiles more broadly. This keeps lexical transparency without collapsing
    the historical-cultural nuance.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
