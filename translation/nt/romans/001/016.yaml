id: ROM.1.16
reference: Romans 1:16
source:
  edition: SBLGNT
  text: Οὐ γὰρ ἐπαισχύνομαι τὸ ⸀εὐαγγέλιον, δύναμις γὰρ θεοῦ ἐστιν εἰς σωτηρίαν παντὶ
    τῷ πιστεύοντι, Ἰουδαίῳ τε πρῶτον καὶ Ἕλληνι·
translation:
  text: For I am not ashamed of the good news, for it is the power of God for salvation
    to everyone who believes, to the Jew first and also to the Greek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gospel.'
    reason: lexical_alternative
  - marker: b
    text: '''Greek'' here can refer more broadly to a Gentile, that is, a non-Jew.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαισχύνομαι
  chosen: am not ashamed
  alternatives:
  - am not embarrassed
  lexicon: BDAG
  rationale: The verb denotes experiencing shame or shrinking back in disgrace. 'Am
    not ashamed' is the clear, idiomatic English equivalent and preserves Paul's bold
    public stance.
- source_word: εὐαγγέλιον
  chosen: good news
  alternatives:
  - gospel
  lexicon: BDAG
  rationale: Following original-language primacy and readable modern English, 'good
    news' conveys the lexical sense more transparently than the traditional ecclesiastical
    term 'gospel.'
- source_word: δύναμις
  chosen: power
  alternatives:
  - might
  lexicon: BDAG
  rationale: '''Power'' is the standard and most natural rendering here, expressing
    God''s effective saving action through the good news.'
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - unto salvation
  - for deliverance
  lexicon: BDAG
  rationale: '''For salvation'' is natural modern English and preserves the telic
    force of εἰς without sounding archaic.'
- source_word: παντὶ τῷ πιστεύοντι
  chosen: to everyone who believes
  alternatives:
  - for everyone believing
  - to every believer
  lexicon: BDAG
  rationale: This rendering preserves the distributive sense of παντί and the participial
    force of πιστεύοντι in clear English. 'Everyone who believes' is slightly more
    transparent than 'every believer.'
- source_word: Ἰουδαίῳ
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Paul's salvation-historical contrast with Ἕλλην, the ethnic-religious
    sense 'Jew' fits better than the more geographically marked 'Judean.'
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: '''First'' preserves the concise salvation-historical ordering in the
    Greek without adding interpretive expansion.'
- source_word: Ἕλληνι
  chosen: Greek
  alternatives:
  - Gentile
  lexicon: BDAG
  rationale: The Greek text specifically says 'Greek.' In Paul this term can function
    broadly for the non-Jewish world, but the main text should preserve the lexical
    form while noting the broader sense in a footnote.
- source_word: τε ... καί
  chosen: and also
  alternatives:
  - both ... and
  - and
  lexicon: BDAG
  rationale: The pairing marks addition after priority. 'And also' reads naturally
    in English and reflects the connective force without awkwardness.
