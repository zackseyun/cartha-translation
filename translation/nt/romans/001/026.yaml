theological_decisions:
- issue: Whether to heighten or soften the moral force of Paul's description
  chosen_reading: Retain the evaluative wording 'dishonorable' and 'contrary to nature'
    without adding explanatory paraphrase.
  alternative_readings:
  - Use softer idioms such as 'improper desires' or 'non-natural relations'
  - Use stronger interpretive paraphrase specifying modern categories not named in
    the text
  rationale: The verse itself contains moral evaluation, so the translation should
    preserve that force. At the same time, it should not import doctrinal or cultural
    categories beyond Paul's actual wording.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not paraphrase beyond the source text.
