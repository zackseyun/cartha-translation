id: ROM.1.26
reference: Romans 1:26
source:
  edition: SBLGNT
  text: Διὰ τοῦτο παρέδωκεν αὐτοὺς ὁ θεὸς εἰς πάθη ἀτιμίας· αἵ τε γὰρ θήλειαι αὐτῶν
    μετήλλαξαν τὴν φυσικὴν χρῆσιν εἰς τὴν παρὰ φύσιν,
translation:
  text: For this reason God gave them over to dishonorable passions, for even their
    women exchanged natural relations for what is contrary to nature,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'their females.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the natural use.'
    reason: lexical_alternative
  - marker: c
    text: Or 'what is against nature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  entry: διά
  rationale: A natural English causal connector that preserves the inferential force
    of the phrase and links this verse to the prior argument.
- source_word: παρέδωκεν
  chosen: gave them over
  alternatives:
  - handed them over
  - delivered them over
  lexicon: BDAG
  entry: παραδίδωμι
  rationale: This is the established plain-sense rendering in this context and preserves
    the judicial sense of God giving people over to the consequences of their rebellion.
- source_word: πάθη ἀτιμίας
  chosen: dishonorable passions
  alternatives:
  - degrading passions
  - shameful passions
  lexicon: BDAG
  entry: πάθος; ἀτιμία
  rationale: '''Dishonorable'' closely reflects ἀτιμία without over-interpreting,
    while remaining readable modern English.'
- source_word: θήλειαι
  chosen: women
  alternatives:
  - females
  lexicon: BDAG
  entry: θῆλυς
  rationale: Although the Greek term is more literally 'females,' 'women' is more
    natural in contemporary English and still accurately refers to human females in
    context. The more literal alternative is preserved in a footnote because the term
    forms a male/female pairing with the next verse.
- source_word: μετήλλαξαν
  chosen: exchanged
  alternatives:
  - traded
  - changed
  lexicon: BDAG
  entry: μεταλλάσσω
  rationale: '''Exchanged'' is the most direct and idiomatic rendering and preserves
    the deliberate swap implied by the verb.'
- source_word: τὴν φυσικὴν χρῆσιν
  chosen: natural relations
  alternatives:
  - the natural use
  - natural function
  lexicon: BDAG
  entry: φυσικός; χρῆσις
  rationale: A more literal 'use' is possible, but in English it is awkward and potentially
    misleading here. 'Natural relations' communicates the sexual-relational sense
    demanded by context without importing more than the Greek warrants.
- source_word: τὴν παρὰ φύσιν
  chosen: what is contrary to nature
  alternatives:
  - what is against nature
  - the unnatural
  lexicon: BDAG
  entry: παρά; φύσις
  rationale: This preserves the Greek idiom clearly and avoids a flatter adjective
    like 'unnatural,' which is less transparent to the underlying wording.
