id: ROM.1.32
reference: Romans 1:32
source:
  edition: SBLGNT
  text: οἵτινες τὸ δικαίωμα τοῦ θεοῦ ἐπιγνόντες, ὅτι οἱ τὰ τοιαῦτα πράσσοντες ἄξιοι
    θανάτου εἰσίν, οὐ μόνον αὐτὰ ποιοῦσιν ἀλλὰ καὶ συνευδοκοῦσιν τοῖς πράσσουσιν.
translation:
  text: who, although they know God's righteous decree—that those who practice such
    things are worthy of death—not only do them but also approve of those who practice
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ordinance,' 'requirement,' or 'judgment' for 'decree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - whoever
  - such people as
  lexicon: BDAG
  rationale: Introduces a relative description of the people in view from the previous
    context; simple 'who' is natural English and fits the syntax.
- source_word: δικαίωμα
  chosen: righteous decree
  alternatives:
  - ordinance
  - requirement
  - judgment
  lexicon: BDAG
  rationale: Here it refers to God's just legal/moral verdict, especially as clarified
    by the following clause about worthiness of death. 'Righteous decree' preserves
    both the juridical sense and the moral force of δικαίωμα.
- source_word: ἐπιγνόντες
  chosen: although they know
  alternatives:
  - having known
  - fully knowing
  - even though they know
  lexicon: BDAG
  rationale: 'The participle is best represented concessively in English in this context:
    despite knowing God''s decree, they still act this way. ''Know'' is smoother than
    ''fully know'' while still reflecting recognition.'
- source_word: οἱ τὰ τοιαῦτα πράσσοντες
  chosen: those who practice such things
  alternatives:
  - those who do such things
  - those who commit such things
  lexicon: BDAG
  rationale: '''Practice'' reflects the participial aspect and ongoing conduct better
    than a single-act English verb.'
- source_word: ἄξιοι θανάτου
  chosen: worthy of death
  alternatives:
  - deserving death
  - fit for death
  lexicon: BDAG
  rationale: This is the most direct and idiomatic rendering of the Greek expression
    and preserves its judicial force.
- source_word: ποιοῦσιν
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: Using 'do' here keeps a natural distinction with the earlier πράσσοντες/'practice,'
    while still faithfully rendering the verb.
- source_word: συνευδοκοῦσιν
  chosen: approve of
  alternatives:
  - agree with
  - applaud
  - give approval to
  lexicon: BDAG
  rationale: The verb expresses more than mere participation; it includes consenting
    to or endorsing others' actions. 'Approve of' is clear, natural, and sufficiently
    strong.
- source_word: τοῖς πράσσουσιν
  chosen: those who practice them
  alternatives:
  - those who do them
  - those practicing them
  lexicon: BDAG
  rationale: Repeats the ongoing-action sense of πράσσω and preserves the parallelism
    with the earlier participial phrase.
