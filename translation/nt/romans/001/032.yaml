theological_decisions:
- issue: Meaning of 'worthy of death'
  chosen_reading: The phrase is rendered as a statement of divine judicial verdict
    without specifying more than the text itself states.
  alternative_readings:
  - A reference primarily to civil death penalty
  - A broader reference including eschatological death
  rationale: Paul states that such people are 'worthy of death,' but the verse itself
    does not define the full scope of that death. The translation preserves the wording
    and theological weight without narrowing it beyond the text.
