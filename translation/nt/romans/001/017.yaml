  category: awkward_english
  tier: 1
  from: But the righteous one shall live by faith.
  to: The righteous one shall live by faith.
  rationale: The Greek text of the quotation includes the particle 'δὲ'. While translating
    it as 'But' is formally accurate, it creates an awkwardness in English by suggesting
    a contrast that is not the primary function of the quotation here. Paul is using
    the Habakkuk text to support, not contrast with, the preceding clause. For this
    reason, nearly all major English translations omit the conjunction to improve
    flow and avoid this misleading contrastive sense. Removing 'But' would align the
    draft with this strong translation tradition and create a more natural reading.
