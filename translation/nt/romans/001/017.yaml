id: ROM.1.17
reference: Romans 1:17
source:
  edition: SBLGNT
  text: δικαιοσύνη γὰρ θεοῦ ἐν αὐτῷ ἀποκαλύπτεται ἐκ πίστεως εἰς πίστιν, καθὼς γέγραπται·
    Ὁ δὲ δίκαιος ἐκ πίστεως ζήσεται.
translation:
  text: 'For in it the righteousness of God is revealed from faith to faith, just
    as it is written: “The righteous one shall live by faith.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the justice of God.”
    reason: lexical_alternative
  - marker: b
    text: The Greek ἐκ πίστεως εἰς πίστιν is a notorious crux; “from faith to faith”
      preserves both prepositions and the rhetorical repetition without collapsing
      the ambiguity. More interpretive options include “from faith for faith,” “by
      faith from first to last,” or “through faith, for faith.”
    reason: alternative_reading
  - marker: c
    text: Or “the one who is righteous by faith shall live.”
    reason: alternative_reading
  - marker: d
    text: Or 'But the righteous one shall live by faith.'.
    reason: previous_rendering
lexical_decisions:
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: DOCTRINE.md gives “righteousness” as the default for δικαιοσύνη, while
    noting “justice” as an important alternative in Pauline contexts. The phrase here
    is programmatic in Romans, so the traditional theological sense is best preserved
    in the main text, with “justice” noted in a footnote.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  - God’s covenant justice
  lexicon: BDAG
  rationale: The genitive is intentionally left transparent rather than resolved interpretively.
    “Of God” preserves the Greek form and allows readers to feel the ambiguity between
    God’s own righteousness and righteousness associated with or given by God.
- source_word: ἐν αὐτῷ
  chosen: in it
  alternatives:
  - in him
  lexicon: BDAG
  rationale: The pronoun is neuter, referring back most naturally to the gospel in
    Romans 1:16, not to a person. “In it” preserves that grammatical linkage.
- source_word: ἀποκαλύπτεται
  chosen: is revealed
  alternatives:
  - is being revealed
  - is disclosed
  lexicon: BDAG
  rationale: The present passive is well represented by “is revealed.” This keeps
    the statement direct and idiomatic without over-interpreting aspect.
- source_word: ἐκ πίστεως εἰς πίστιν
  chosen: from faith to faith
  alternatives:
  - from faith for faith
  - by faith from first to last
  - through faith, for faith
  lexicon: BDAG
  rationale: Notoriously difficult. The traditional “from faith to faith” (KJV, ESV,
    NASB) preserves both prepositions cleanly, mirrors the Greek rhetorical repetition,
    and is the most natural reading of ἐκ...εἰς as directional (out of… into…). Commentators
    divide on the meaning (“from the faithfulness of God to the faith of believers,”
    “from initial faith to mature faith,” “by faith from start to finish”), so the
    main text holds the ambiguity open rather than resolving it into any one construal.
- source_word: δίκαιος
  chosen: the righteous one
  alternatives:
  - the righteous man
  - the one who is righteous
  lexicon: BDAG
  rationale: The substantival adjective is singular masculine. “The righteous one”
    is gender-accurate to the representative singular while sounding natural in English.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - through faith
  lexicon: BDAG
  rationale: In the Habakkuk citation, “by faith” is the most natural English rendering
    and best conveys the instrumental or modal sense most readers will hear, while
    still leaving some syntactical ambiguity intact.
- source_word: ζήσεται
  chosen: shall live
  alternatives:
  - will live
  lexicon: BDAG
  rationale: “Shall live” fits the elevated citation style and preserves the future
    force of the verb in clear, readable English.
