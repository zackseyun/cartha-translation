theological_decisions:
- issue: Meaning of δικαιοσύνη θεοῦ
  chosen_reading: the righteousness of God
  alternative_readings:
  - righteousness from God
  - God’s justice
  rationale: The Greek genitive is debated, and the phrase is theologically loaded
    in Romans. The main text preserves the more literal and traditional rendering
    without collapsing the ambiguity. Alternatives are preserved in footnotes for
    reader transparency.
  doctrine_reference: Preserve theological tension rather than resolve it; δικαιοσύνη
    default rendering table.
- issue: Sense of ἐκ πίστεως εἰς πίστιν
  chosen_reading: from faith to faith
  alternative_readings:
  - from faith for faith
  - by faith from first to last
  - through faith, for faith
  rationale: The phrase is genuinely ambiguous and has generated multiple defensible
    renderings. The chosen text stays as close to the Greek as English permits — matching
    the prepositions (out of / into) and preserving the repetition of πίστις — while
    leaving the interpretive move (what God-to-human, or beginning-to-end, or faithfulness-to-faith
    movement is being named) for the reader and the footnotes rather than embedding
    a specific resolution.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    default rendering table.
- issue: Attachment of ἐκ πίστεως in the Habakkuk quotation
  chosen_reading: the righteous one shall live by faith
  alternative_readings:
  - the one who is righteous by faith shall live
  rationale: In Greek, ἐκ πίστεως may be heard with either “righteous” or “shall live.” The traditional rendering is retained in the main text because it is idiomatic and widely intelligible, while the alternative construal is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate over gender-neutral.
