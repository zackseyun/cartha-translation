id: ROM.1.14
reference: Romans 1:14
source:
  edition: SBLGNT
  text: Ἕλλησίν τε καὶ βαρβάροις, σοφοῖς τε καὶ ἀνοήτοις ὀφειλέτης εἰμί·
translation:
  text: I am under obligation both to Greeks and to barbarians, both to the wise and
    to the foolish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners' or 'non-Greeks'; here 'barbarians' reflects the common Greek
      cultural contrast with 'Greeks,' not necessarily moral savagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕλλησίν
  chosen: Greeks
  alternatives:
  - Greeks-speaking people
  - Hellenes
  lexicon: BDAG
  rationale: The dative plural refers to Greeks as an ethnic-cultural category. 'Greeks'
    is the plain English equivalent and preserves Paul's first social pairing.
- source_word: βαρβάροις
  chosen: barbarians
  alternatives:
  - foreigners
  - non-Greeks
  lexicon: BDAG
  rationale: The Greek term is the conventional opposite of 'Greeks' in this cultural
    pairing. 'Barbarians' preserves the historical first-century Greek/Roman social
    label more transparently than 'foreigners,' though a footnote is useful because
    modern English can imply savagery more strongly than the Greek here.
- source_word: σοφοῖς
  chosen: wise
  alternatives:
  - learned
  lexicon: BDAG
  rationale: '''Wise'' is the direct and natural rendering, matching the paired contrast
    with ἀνοήτοις.'
- source_word: ἀνοήτοις
  chosen: foolish
  alternatives:
  - unlearned
  - senseless
  lexicon: BDAG
  rationale: '''Foolish'' best matches the semantic contrast with ''wise'' in concise
    modern English. ''Unlearned'' is possible in context, but it narrows the sense
    too much.'
- source_word: ὀφειλέτης
  chosen: under obligation
  alternatives:
  - a debtor
  - obligated
  lexicon: BDAG
  rationale: Although the noun literally means 'debtor,' in this context Paul speaks
    of moral/apostolic obligation rather than monetary debt. 'Under obligation' communicates
    the idiomatic sense clearly in modern English while preserving the force of indebted
    duty.
- source_word: τε ... καὶ / τε ... καὶ
  chosen: both ... and ... / both ... and ...
  alternatives:
  - and ... and ...
  lexicon: Greek grammar
  rationale: Rendering the correlative structure as 'both ... and ...' preserves the
    balanced rhetorical pairing of the Greek.
