theological_decisions:
- issue: Whether to soften the biologically marked terms into relational language
  chosen_reading: males ... the female ... males with males
  alternative_readings:
  - men ... woman ... men with men
  rationale: The Greek uses sex-marked terms rather than the more common adult relational
    pair. Preserving that distinction best reflects the source wording without adding
    further doctrinal claims.
  doctrine_reference: Gender-accurate over gender-neutral; original-language primacy
    over translation tradition
- issue: Whether to make the moral evaluation more explicit than the text does
  chosen_reading: committing indecency
  alternative_readings:
  - committing shameless acts
  - performing homosexual acts
  rationale: The verse already carries moral force through ἀσχημοσύνη. I preserved
    that force but avoided adding a more explicit label not present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it
