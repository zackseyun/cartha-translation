id: ROM.1.27
reference: Romans 1:27
source:
  edition: SBLGNT
  text: ὁμοίως τε καὶ οἱ ἄρσενες ἀφέντες τὴν φυσικὴν χρῆσιν τῆς θηλείας ἐξεκαύθησαν
    ἐν τῇ ὀρέξει αὐτῶν εἰς ἀλλήλους, ἄρσενες ἐν ἄρσεσιν τὴν ἀσχημοσύνην κατεργαζόμενοι
    καὶ τὴν ἀντιμισθίαν ἣν ἔδει τῆς πλάνης αὐτῶν ἐν ⸀ἑαυτοῖς ἀπολαμβάνοντες.
translation:
  text: And likewise the males, having abandoned the natural relations with the female,
    were inflamed in their desire for one another, males with males committing indecency
    and receiving in themselves the due penalty for their error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural use of the female.'
    reason: lexical_alternative
  - marker: b
    text: Or 'burned in their lust for one another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'doing what is shameful.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the fitting recompense' or 'the due recompense' for their error.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρσενες / θηλείας
  chosen: males / the female
  alternatives:
  - men / woman
  - males / females
  lexicon: BDAG
  rationale: I preserved the biologically marked language of the Greek rather than
    smoothing it to 'men' and 'women.' This also fits the verse's deliberate male/female
    contrast and avoids importing a more relational nuance than the source supplies.
- source_word: ἀφέντες
  chosen: having abandoned
  alternatives:
  - having left
  - forsaking
  lexicon: BDAG
  rationale: The participle marks prior action relative to the main verb. 'Having
    abandoned' is clear modern English and preserves the sense of leaving behind.
- source_word: φυσικὴν χρῆσιν
  chosen: the natural relations
  alternatives:
  - the natural use
  - the natural sexual function
  - natural sexual relations
  lexicon: BDAG
  rationale: χρῆσις here refers to sexual use/relations in context. 'Natural relations'
    is readable English that preserves the semantic force without unnecessary crudity.
    The sexual sense is clear from context.
- source_word: ἐξεκαύθησαν ἐν τῇ ὀρέξει αὐτῶν
  chosen: were inflamed in their desire
  alternatives:
  - burned in their lust
  - were consumed with passion
  lexicon: BDAG
  rationale: '''Were inflamed'' closely reflects the verbal imagery, while ''desire''
    is more readable than ''lust'' and avoids overstating beyond the noun ὄρεξις itself.'
- source_word: εἰς ἀλλήλους
  chosen: for one another
  alternatives:
  - toward one another
  lexicon: BDAG
  rationale: This is the most natural English rendering of the reciprocal expression.
- source_word: ἄρσενες ἐν ἄρσεσιν
  chosen: males with males
  alternatives:
  - men with men
  lexicon: BDAG
  rationale: I kept the repeated biologically marked wording for consistency with
    the Greek and to preserve the rhetorical force of the repetition.
- source_word: τὴν ἀσχημοσύνην κατεργαζόμενοι
  chosen: committing indecency
  alternatives:
  - doing what is shameful
  - committing the shameless act
  lexicon: BDAG
  rationale: '''Committing indecency'' preserves the noun''s moral force and the participle''s
    active sense, while staying readable and not over-specifying beyond the text.'
- source_word: τὴν ἀντιμισθίαν
  chosen: the due penalty
  alternatives:
  - the fitting recompense
  - the due recompense
  lexicon: BDAG
  rationale: The context points to a corresponding return or consequence. 'Due penalty'
    communicates that correspondence clearly in contemporary English.
- source_word: ἣν ἔδει
  chosen: due
  alternatives:
  - which was necessary
  - which was fitting
  lexicon: BDAG
  rationale: 'Rather than a wooden relative clause, I folded the sense into idiomatic
    English: ''the due penalty.'' This preserves the idea of what was fitting or required.'
- source_word: τῆς πλάνης αὐτῶν
  chosen: for their error
  alternatives:
  - for their wandering
  - for their deception
  lexicon: BDAG
  rationale: '''Error'' is the clearest concise rendering here. ''Wandering'' is more
    literal in some contexts, but less natural in this sentence.'
- source_word: ἐν ἑαυτοῖς ἀπολαμβάνοντες
  chosen: receiving in themselves
  alternatives:
  - receiving among themselves
  - receiving in their own persons
  lexicon: BDAG
  rationale: This keeps the reflexive force of ἑαυτοῖς and the participial sense of
    ἀπολαμβάνοντες without over-interpreting the precise mode of reception.
