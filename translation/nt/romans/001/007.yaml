id: ROM.1.7
reference: Romans 1:7
source:
  edition: SBLGNT
  text: πᾶσιν τοῖς οὖσιν ἐν Ῥώμῃ ἀγαπητοῖς θεοῦ, κλητοῖς ἁγίοις· χάρις ὑμῖν καὶ εἰρήνη
    ἀπὸ θεοῦ πατρὸς ἡμῶν καὶ κυρίου Ἰησοῦ Χριστοῦ.
translation:
  text: 'To all those in Rome who are beloved by God, called saints: Grace to you
    and peace from God our Father and the Lord Jesus Messiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “called holy ones”; traditionally, “called to be saints.”
    reason: lexical_alternative
  - marker: b
    text: Or “Christ.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσιν τοῖς οὖσιν ἐν Ῥώμῃ
  chosen: To all those in Rome
  alternatives:
  - To all who are in Rome
  - To everyone in Rome
  lexicon: BDAG
  rationale: Renders the dative phrase idiomatically in English while preserving the
    universal address and location. “Those in Rome” is concise and natural.
- source_word: ἀγαπητοῖς θεοῦ
  chosen: who are beloved by God
  alternatives:
  - loved by God
  - beloved of God
  lexicon: BDAG
  rationale: “Beloved by God” preserves the adjectival force of ἀγαπητοῖς and reads
    naturally in modern English without flattening the relational weight.
- source_word: κλητοῖς ἁγίοις
  chosen: called saints
  alternatives:
  - called holy ones
  - saints by calling
  - called to be saints
  lexicon: BDAG
  rationale: The Greek has two adjectives, not an explicit infinitive, so “called
    saints” keeps closest to the form and sense. “Called to be saints” is interpretive
    and adds words not present in the text.
- source_word: χάρις
  chosen: Grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: “Grace” is the standard and contextually appropriate Pauline greeting
    term and preserves the theological resonance of χάρις.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: “Peace” is the straightforward equivalent and preserves both greeting
    function and theological depth.
- source_word: θεοῦ πατρὸς ἡμῶν
  chosen: God our Father
  alternatives:
  - God, our Father
  - our Father God
  lexicon: BDAG
  rationale: This is the most natural English rendering of the genitival construction
    and standard Pauline expression.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project’s default rendering for κύριος and preserves its
    christological force.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project policy, titles are translated where context supports title
    sense. Here Ἰησοῦ Χριστοῦ is still transparently titular, so “Jesus Messiah” preserves
    meaning better than the traditional transliteration.
