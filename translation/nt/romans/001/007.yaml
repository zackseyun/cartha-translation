theological_decisions:
- issue: Whether to render κλητοῖς ἁγίοις as 'called saints' or the traditional 'called
    to be saints'
  chosen_reading: called saints
  alternative_readings:
  - called to be saints
  - called holy ones
  rationale: The Greek text does not include an infinitive equivalent to 'to be.'
    Retaining the adjectival construction avoids importing an interpretive expansion
    while preserving Paul’s description of the Roman believers.
  doctrine_reference: Translation philosophy 1 and 3
