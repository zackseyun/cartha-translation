id: ROM.1.10
reference: Romans 1:10
source:
  edition: SBLGNT
  text: πάντοτε ἐπὶ τῶν προσευχῶν μου, δεόμενος εἴ πως ἤδη ποτὲ εὐοδωθήσομαι ἐν τῷ
    θελήματι τοῦ θεοῦ ἐλθεῖν πρὸς ὑμᾶς.
translation:
  text: always in my prayers, asking whether somehow, at last, by the will of God
    I may succeed in coming to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I may be prospered' or 'I may have a successful journey' in coming to
      you.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - constantly
  lexicon: BDAG
  rationale: A straightforward adverb of continual practice; 'always' is natural English
    and preserves Paul's emphasis on regularity.
- source_word: ἐπὶ τῶν προσευχῶν μου
  chosen: in my prayers
  alternatives:
  - at my prayers
  - upon my prayers
  lexicon: BDAG
  rationale: This prepositional phrase is idiomatically expressed in English as 'in
    my prayers,' preserving the sense without wooden wording.
- source_word: δεόμενος
  chosen: asking
  alternatives:
  - pleading
  - begging
  - praying
  lexicon: BDAG
  rationale: The participle conveys earnest petition. 'Asking' fits readable modern
    English here while still matching the prayer context established by the previous
    phrase.
- source_word: εἴ πως
  chosen: whether somehow
  alternatives:
  - if somehow
  - whether by some means
  lexicon: BDAG
  rationale: This captures both uncertainty and desire. 'Whether somehow' fits the
    syntax of dependent petition in English.
- source_word: ἤδη ποτὲ
  chosen: at last
  alternatives:
  - now at last
  - by now somehow
  lexicon: BDAG
  rationale: The combination intensifies Paul's long-standing hope for an opportunity.
    'At last' expresses that sense smoothly; 'now' is implicit but not required in
    English.
- source_word: εὐοδωθήσομαι
  chosen: I may succeed
  alternatives:
  - I may be prospered
  - I may be granted success
  - I may have a prosperous journey
  lexicon: BDAG
  rationale: The verb literally involves being prospered or having one's way made
    successful. In this context with 'to come to you,' 'I may succeed' communicates
    the intended result in natural English while avoiding misleading financial overtones
    of 'prospered'.
- source_word: ἐν τῷ θελήματι τοῦ θεοῦ
  chosen: by the will of God
  alternatives:
  - in the will of God
  - within God's will
  lexicon: BDAG
  rationale: This expresses divine willing as the governing condition of Paul's hoped-for
    visit. 'By the will of God' is idiomatic and clear in English.
- source_word: ἐλθεῖν πρὸς ὑμᾶς
  chosen: in coming to you
  alternatives:
  - to come to you
  - to visit you
  lexicon: BDAG
  rationale: Linked to 'succeed,' the gerund construction makes smooth English. 'Visit
    you' would add nuance not explicit in ἔρχεσθαι.
