id: ROM.6.10
reference: Romans 6:10
source:
  edition: SBLGNT
  text: ὃ γὰρ ἀπέθανεν, τῇ ἁμαρτίᾳ ἀπέθανεν ἐφάπαξ· ὃ δὲ ζῇ, ζῇ τῷ θεῷ.
translation:
  text: For the death he died, he died to sin once for all; but the life he lives,
    he lives to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he died for sin' or 'he died with respect to sin.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ
  chosen: the death he died
  alternatives:
  - what he died
  - in that he died
  lexicon: BDAG
  rationale: The neuter relative pronoun functions idiomatically with the repeated
    verb, pointing to the event or matter of his dying. Rendering it as 'the death
    he died' preserves the Greek emphasis and yields natural English.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation for the prior statement, and 'For' preserves
    that logical connection clearly and concisely.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - has died
  lexicon: BDAG
  rationale: The aorist is best rendered as a simple past here, matching the completed
    historical act of Messiah's death.
- source_word: τῇ ἁμαρτίᾳ
  chosen: to sin
  alternatives:
  - for sin
  - with respect to sin
  lexicon: BDAG
  rationale: 'The dative here most naturally expresses relation: Christ died ''to
    sin,'' that is, in relation to sin''s realm and claim. This preserves Paul''s
    death/life contrast (''to sin'' / ''to God'') better than ''for sin,'' while the
    alternative is preserved in a footnote.'
- source_word: ἐφάπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: '''Once for all'' communicates the adverb''s sense of a single, unrepeatable
    act with enduring significance, and is established, clear English.'
- source_word: ὃ δὲ ζῇ
  chosen: but the life he lives
  alternatives:
  - but what he lives
  - but in that he lives
  lexicon: BDAG
  rationale: Mirroring the first clause with 'the life he lives' preserves the Greek
    parallelism and reads more naturally in English than a more wooden relative construction.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a contrast between death and life here, so 'but' best reflects
    the discourse movement.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  - with reference to God
  lexicon: BDAG
  rationale: 'The dative balances ''to sin'' in the first half of the verse and conveys
    orientation or relation: his living is wholly directed to God.'
