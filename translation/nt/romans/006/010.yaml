theological_decisions:
- issue: Whether τῇ ἁμαρτίᾳ should be rendered in a way that could imply Christ had
    personal sin.
  chosen_reading: to sin
  alternative_readings:
  - for sin
  - with respect to sin
  rationale: The phrase describes Christ's death in relation to sin's domain and judicial
    claim, not any personal sinfulness in him. 'To sin' keeps Paul's antithesis with
    'to God' and preserves the theological tension without importing an explanatory
    paraphrase into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
