id: ROM.6.9
reference: Romans 6:9
source:
  edition: SBLGNT
  text: εἰδότες ὅτι Χριστὸς ἐγερθεὶς ἐκ νεκρῶν οὐκέτι ἀποθνῄσκει, θάνατος αὐτοῦ οὐκέτι
    κυριεύει·
translation:
  text: knowing that the Messiah, having been raised from the dead, no longer dies;
    death no longer rules over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since we know
  - because we know
  lexicon: BDAG
  rationale: The participle introduces shared knowledge grounding the statement. “Knowing”
    preserves the participial form and keeps the connection to the surrounding argument
    without over-specifying the conjunctional force.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Here Χριστός functions as a title rather than merely a name-like identifier,
    so “the Messiah” follows the doctrinal default and preserves the title’s meaning
    in context.
- source_word: ἐγερθεὶς
  chosen: having been raised
  alternatives:
  - being raised
  - raised
  lexicon: BDAG
  rationale: The aorist passive participle is best represented by “having been raised,”
    which preserves both the passive voice and the antecedent action relative to “no
    longer dies.”
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out of the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic English rendering of the Greek expression
    and clearly communicates resurrection from among the dead.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: “No longer” is clear, natural, and appropriately weighty for both occurrences,
    preserving the force of finality in the verse.
- source_word: ἀποθνῄσκει
  chosen: dies
  alternatives:
  - is dying
  lexicon: BDAG
  rationale: The present tense here expresses the ongoing reality that Christ is no
    longer subject to death. English simple present communicates this well.
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: The noun is rendered directly and personified in the clause as the subject
    of the verb, matching Paul’s rhetoric.
- source_word: κυριεύει
  chosen: rules over
  alternatives:
  - has dominion over
  - is lord over
  - masters
  lexicon: BDAG
  rationale: The verb conveys dominion or mastery. “Rules over” is strong, natural
    modern English that preserves the image of death’s former power without sounding
    archaic like “has dominion over.”
