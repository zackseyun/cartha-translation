id: ROM.6.19
reference: Romans 6:19
source:
  edition: SBLGNT
  text: ἀνθρώπινον λέγω διὰ τὴν ἀσθένειαν τῆς σαρκὸς ὑμῶν· ὥσπερ γὰρ παρεστήσατε τὰ
    μέλη ὑμῶν δοῦλα τῇ ἀκαθαρσίᾳ καὶ τῇ ἀνομίᾳ εἰς τὴν ἀνομίαν, οὕτως νῦν παραστήσατε
    τὰ μέλη ὑμῶν δοῦλα τῇ δικαιοσύνῃ εἰς ἁγιασμόν.
translation:
  text: I am speaking in human terms because of the weakness of your flesh. For just
    as you presented your members as slaves to impurity and to lawlessness, leading
    to lawlessness, so now present your members as slaves to righteousness, leading
    to sanctification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice."
    reason: lexical_alternative
  - marker: b
    text: '"Flesh" could also be understood more interpretively as "sinful nature"
      here, though the Greek leaves the expression broader.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθρώπινον λέγω
  chosen: I am speaking in human terms
  alternatives:
  - I speak in human terms
  - I am using a human analogy
  lexicon: BDAG
  rationale: This idiom signals that Paul is expressing himself in a way accommodated
    to ordinary human understanding. 'In human terms' is natural English and preserves
    the idiomatic sense without over-paraphrasing into 'analogy.'
- source_word: ἀσθένειαν
  chosen: weakness
  alternatives:
  - frailty
  lexicon: BDAG
  rationale: '''Weakness'' is the standard and broad rendering, fitting both physical
    and moral limitation here without narrowing the sense beyond the Greek.'
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Following the doctrine guideline, 'flesh' is preferred unless the context
    plainly requires the interpretive rendering 'sinful nature.' Here Paul speaks
    of human weakness in embodied fallen existence; 'flesh' preserves that breadth
    better than the more interpretive alternative.
- source_word: παρεστήσατε / παραστήσατε
  chosen: presented / present
  alternatives:
  - offered
  - yielded
  lexicon: BDAG
  rationale: Using 'present' preserves the repeated verbal link in the verse and reflects
    Paul's exhortational contrast between past conduct and present duty. 'Yield' is
    idiomatic in some English traditions but less directly tied to the Greek verb.
- source_word: μέλη
  chosen: members
  alternatives:
  - body parts
  lexicon: BDAG
  rationale: '''Members'' is the established Pauline rendering for bodily faculties
    or capacities and fits the metaphorical-ethical use here better than the more
    concrete ''body parts.'''
- source_word: δοῦλα
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: In keeping with the doctrine excerpt, 'slave' is used where the bonded
    nature is theologically salient. Romans 6 centrally develops slavery imagery for
    mastery and allegiance, so 'slaves' best preserves Paul's force.
- source_word: ἀκαθαρσίᾳ
  chosen: impurity
  alternatives:
  - uncleanness
  lexicon: BDAG
  rationale: '''Impurity'' is clear modern English and preserves the moral sense without
    archaic wording.'
- source_word: ἀνομίᾳ / ἀνομίαν
  chosen: lawlessness / lawlessness
  alternatives:
  - wickedness
  lexicon: BDAG
  rationale: Rendering both occurrences with 'lawlessness' preserves the lexical repetition
    and rhetorical force of movement from lawlessness into further lawlessness.
- source_word: εἰς τὴν ἀνομίαν
  chosen: leading to lawlessness
  alternatives:
  - for lawlessness
  - unto lawlessness
  lexicon: BDAG
  rationale: The preposition εἰς here expresses result or direction. 'Leading to lawlessness'
    makes the progression explicit in natural English while staying close to the sense.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: For Pauline usage, the project's default is 'righteousness,' while preserving
    'justice' as a footnoted alternative where relevant. Here 'righteousness' best
    matches the ethical contrast with impurity and lawlessness.
- source_word: ἁγιασμόν
  chosen: sanctification
  alternatives:
  - holiness
  - consecration
  lexicon: BDAG
  rationale: '''Sanctification'' best captures the processive/resultative sense in
    Paul''s argument, where presenting oneself to righteousness leads toward a holy
    state. ''Holiness'' is possible but slightly less explicit about this movement.'
