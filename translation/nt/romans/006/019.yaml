theological_decisions:
- issue: Interpretation of σάρξ in the phrase 'the weakness of your flesh'
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The context concerns human weakness and susceptibility within embodied
    fallen life, but the phrase does not require the narrower doctrinal interpretation
    'sinful nature.' Preserving 'flesh' maintains Paul's theological tension rather
    than resolving it.
  doctrine_reference: 'DOCTRINE.md: ''σάρξ sarx | flesh (literal) / sinful nature
    (metaphorical) | Context-dependent; per-verse documented'''
- issue: Rendering δικαιοσύνη in Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt sets 'righteousness' as the main-text default for
    δικαιοσύνη while preserving 'justice' in a footnote for Pauline passages. This
    verse's ethical contrast favors 'righteousness' in the text.
  doctrine_reference: 'DOCTRINE.md: ''δικαιοσύνη dikaiosynē | righteousness | justice
    | Both renderings preserved in footnotes for Pauline passages'''
