theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term is functioning as a title rather than a fixed name in this theological
    argument about union with Jesus. The doctrine excerpt directs that Χριστός be
    translated as “Messiah” where context supports title-sense.
  doctrine_reference: DOCTRINE.md Contested terms / Translate titles; transliterate
    names
- issue: Nature of future life in συζήσομεν αὐτῷ
  chosen_reading: we will also live with him
  alternative_readings:
  - we will live again with him
  - we will share resurrection life with him
  rationale: The translation preserves the wording of shared future life with Christ/Messiah
    without narrowing it to a specific doctrinal mechanism beyond what the Greek states.
    This keeps the theological tension and breadth of Paul’s statement intact.
  doctrine_reference: DOCTRINE.md Preserve theological tension rather than resolve
    it
