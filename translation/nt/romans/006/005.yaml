id: ROM.6.5
reference: Romans 6:5
source:
  edition: SBLGNT
  text: Εἰ γὰρ σύμφυτοι γεγόναμεν τῷ ὁμοιώματι τοῦ θανάτου αὐτοῦ, ἀλλὰ καὶ τῆς ἀναστάσεως
    ἐσόμεθα·
translation:
  text: For if we have become united with him in the likeness of his death, we will
    certainly also be united with him in the likeness of his resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grown together with him.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''we will be also of the resurrection,'' with ''united with him''
      understood from the first clause.'
    reason: alternative_reading
lexical_decisions:
- source_word: σύμφυτοι
  chosen: united with him
  alternatives:
  - grown together with
  - joined with
  - united
  lexicon: BDAG
  rationale: The adjective conveys organic union or shared participation. 'United
    with him' expresses the relational force clearly in modern English and fits Paul's
    baptismal-union context better than the more wooden 'grown together with.'
- source_word: γεγόναμεν
  chosen: have become
  alternatives:
  - have come to be
  - became
  lexicon: BDAG
  rationale: The perfect tense suggests a past action with present result. 'Have become'
    preserves that aspect more naturally than a simple past.
- source_word: τῷ ὁμοιώματι
  chosen: in the likeness
  alternatives:
  - with the likeness
  - by the likeness
  lexicon: BDAG
  rationale: The dative is best taken as expressing relation or sphere here. 'In the
    likeness' is idiomatic and preserves Paul's wording without over-interpreting
    the precise nuance.
- source_word: τοῦ θανάτου αὐτοῦ
  chosen: of his death
  lexicon: BDAG
  rationale: A straightforward genitival construction; no expansion is needed.
- source_word: ἀλλὰ καὶ
  chosen: we will certainly also
  alternatives:
  - but also we will
  - also indeed we will
  lexicon: BDAG
  rationale: Here ἀλλά has an ascensive/adversative force linking the second half
    emphatically to the first. 'Certainly also' captures the strong inferential emphasis
    in clear English.
- source_word: τῆς ἀναστάσεως
  chosen: in the likeness of his resurrection
  alternatives:
  - of the resurrection
  - of his resurrection
  lexicon: BDAG
  rationale: Although 'his' is not repeated in Greek, English naturally carries it
    forward from the prior phrase, and the parallelism strongly implies Christ's resurrection.
    Repeating 'in the likeness of' makes explicit the ellipsis for readability while
    preserving the structure.
- source_word: ἐσόμεθα
  chosen: we will be united with him
  alternatives:
  - we will be
  - we will become
  lexicon: BDAG
  rationale: The verb is simply 'we will be,' but English requires the predicate idea
    from σύμφυτοι to be supplied. Repeating 'united with him' makes the ellipsis clear
    and preserves the sentence's meaning.
