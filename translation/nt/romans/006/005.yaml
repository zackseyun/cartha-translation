theological_decisions:
- issue: Whether to make Paul's union language more sacramental, mystical, or metaphorical
    than the Greek states
  chosen_reading: Kept the wording at 'united with him in the likeness of his death
    ... in the likeness of his resurrection' without importing a narrower doctrinal
    explanation.
  alternative_readings:
  - joined to the pattern of his death
  - grown together with him in death and resurrection
  - united with the form of his death
  rationale: The verse teaches real participation in Christ while using the qualifying
    term 'likeness.' The translation preserves that tension rather than resolving
    how the participation operates.
  doctrine_reference: Preserve theological tension rather than resolve it.
