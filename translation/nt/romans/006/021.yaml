theological_decisions:
- issue: Whether to render τέλος as 'end' or interpretively as 'outcome'
  chosen_reading: end
  alternative_readings:
  - outcome
  - result
  rationale: The verse speaks of the terminus of their former way of life, and 'end'
    preserves that fuller sense while still allowing consequential force in context.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
