id: ROM.6.21
reference: Romans 6:21
source:
  edition: SBLGNT
  text: τίνα οὖν καρπὸν εἴχετε τότε ἐφ’ οἷς νῦν ἐπαισχύνεσθε; τὸ γὰρ τέλος ἐκείνων
    θάνατος·
translation:
  text: So what fruit did you have then from the things of which you are now ashamed?
    For the end of those things is death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "outcome" for "end."
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα
  chosen: what
  alternatives:
  - what kind of
  - which
  lexicon: BDAG
  rationale: Introduces a rhetorical question about the nature of the result they
    formerly had; simple 'what' is natural English and preserves the force.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - benefit
  - outcome
  lexicon: BDAG
  rationale: '''Fruit'' preserves Paul''s metaphor of produced result rather than
    flattening it to an abstract term.'
- source_word: εἴχετε
  chosen: did you have
  alternatives:
  - were you having
  - used to have
  lexicon: BDAG
  rationale: The imperfect refers to their former ongoing state, but idiomatic English
    expresses this well as 'did you have' within the rhetorical question.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  - formerly
  lexicon: BDAG
  rationale: Keeps the temporal contrast concise and pairs naturally with 'now' later
    in the verse.
- source_word: ἐφ’ οἷς
  chosen: from the things of which
  alternatives:
  - from which things
  - in those things which
  - for which things
  lexicon: BDAG
  rationale: This rendering makes explicit the likely implied antecedent ('things')
    and conveys the sense of deriving fruit from those former practices while preserving
    the relative construction.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Maintains the sharp contrast with 'then' in plain modern English.
- source_word: ἐπαισχύνεσθε
  chosen: are ashamed
  alternatives:
  - feel shame
  - are embarrassed
  lexicon: BDAG
  rationale: '''Are ashamed'' is the most direct and weighty rendering; ''embarrassed''
    is too weak for the moral force here.'
- source_word: τέλος
  chosen: end
  alternatives:
  - outcome
  - result
  lexicon: BDAG
  rationale: '''End'' preserves both the terminus and consequence sense of τέλος;
    the context then explains that this end is death.'
- source_word: ἐκείνων
  chosen: those things
  alternatives:
  - those
  - such things
  lexicon: BDAG
  rationale: Supplying 'things' makes the English referent clear and matches the implied
    antecedent from the previous clause.
- source_word: θάνατος
  chosen: death
  alternatives:
  - deadness
  lexicon: BDAG
  rationale: The plain and standard rendering best fits Paul's warning and preserves
    the theological gravity of the term.
