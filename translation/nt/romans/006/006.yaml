theological_decisions:
- issue: Anthropological idiom in ὁ παλαιὸς ἡμῶν ἄνθρωπος
  chosen_reading: our old man
  alternative_readings:
  - our old self
  rationale: The Greek expression is formally masculine singular and functions as
    a theological idiom for the former human condition in Adamic solidarity. To preserve
    source texture and gendered form without claiming male-only reference, the main
    text keeps 'old man' and the more idiomatic modern alternative is footnoted.
  doctrine_reference: Gender-accurate over gender-neutral; preserve theological tension
    rather than resolve it.
- issue: Force of καταργηθῇ in relation to the body of sin
  chosen_reading: might be rendered powerless
  alternative_readings:
  - might be abolished
  - might be destroyed
  rationale: The verse speaks of sin's effective dominion being broken through union
    with Messiah's crucifixion. 'Rendered powerless' best preserves that theological
    force without importing a stronger claim of ontological destruction than the wording
    requires.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
