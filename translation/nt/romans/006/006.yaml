id: ROM.6.6
reference: Romans 6:6
source:
  edition: SBLGNT
  text: τοῦτο γινώσκοντες ὅτι ὁ παλαιὸς ἡμῶν ἄνθρωπος συνεσταυρώθη, ἵνα καταργηθῇ
    τὸ σῶμα τῆς ἁμαρτίας, τοῦ μηκέτι δουλεύειν ἡμᾶς τῇ ἁμαρτίᾳ,
translation:
  text: knowing this, that our old man was crucified with him, so that the body of
    sin might be rendered powerless, so that we should no longer be enslaved to sin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'our old self.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'might be abolished' or 'might be nullified.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'so that we should no longer serve sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκοντες
  chosen: knowing
  alternatives:
  - since we know
  - being aware
  lexicon: BDAG
  rationale: A participial form is best carried into English as 'knowing' to preserve
    the connective force with the previous context without over-paraphrasing it into
    a full causal clause.
- source_word: ὁ παλαιὸς ἡμῶν ἄνθρωπος
  chosen: our old man
  alternatives:
  - our old self
  - our old human being
  lexicon: BDAG
  rationale: This Pauline expression is anthropological and contrasts with the renewed
    person in Messiah. 'Old man' preserves the source image and the masculine singular
    form more directly than the smoother but more interpretive 'old self.' Because
    modern English may hear 'man' narrowly, the more idiomatic alternative is preserved
    in a footnote.
- source_word: συνεσταυρώθη
  chosen: was crucified with him
  alternatives:
  - was crucified together with him
  - was co-crucified
  lexicon: BDAG
  rationale: The verb includes the συν- prefix, so the sense of shared crucifixion
    should be explicit. 'With him' is natural English and makes the union-with-Christ
    sense clear without using the less readable 'co-crucified.'
- source_word: καταργηθῇ
  chosen: might be rendered powerless
  alternatives:
  - might be abolished
  - might be nullified
  - might be brought to nothing
  lexicon: BDAG
  rationale: In Pauline usage, καταργέω often conveys the disabling or nullifying
    of operative power rather than annihilation. 'Rendered powerless' communicates
    that the 'body of sin' is deprived of dominion, not necessarily destroyed metaphysically.
- source_word: τὸ σῶμα τῆς ἁμαρτίας
  chosen: the body of sin
  alternatives:
  - the sinful body
  - the body ruled by sin
  lexicon: BDAG
  rationale: The genitival construction is preserved rather than interpreted. 'The
    body of sin' leaves Paul's compact phrase intact and avoids prematurely resolving
    whether he means the body as dominated by sin, the sinful body, or the body in
    relation to sin.
- source_word: τοῦ μηκέτι δουλεύειν ἡμᾶς τῇ ἁμαρτίᾳ
  chosen: so that we should no longer be enslaved to sin
  alternatives:
  - so that we should no longer serve sin
  - for us no longer to be slaves to sin
  lexicon: BDAG
  rationale: δουλεύω denotes slavery/service under a master. In this context of sin's
    dominion, the bonded sense is salient, so 'enslaved' best fits the doctrine's
    guidance on doulos-wording and preserves the force of Paul's imagery.
