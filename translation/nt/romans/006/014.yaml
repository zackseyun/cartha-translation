theological_decisions:
- issue: Whether to make sin's personification explicit through capitalization or
    stronger metaphor
  chosen_reading: Keep 'sin' lowercase and render the verb as 'will not rule over
    you.'
  alternative_readings:
  - '''Sin will not have dominion over you'''
  - '''Sin will not be master over you'''
  rationale: The verse clearly personifies sin as a ruling power, but the Greek does
    not require capitalization. The chosen wording preserves the theological image
    without importing extra doctrinal framing.
  doctrine_reference: Preserve theological tension rather than resolve it.
