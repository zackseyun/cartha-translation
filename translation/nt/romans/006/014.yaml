id: ROM.6.14
reference: Romans 6:14
source:
  edition: SBLGNT
  text: ἁμαρτία γὰρ ὑμῶν οὐ κυριεύσει, οὐ γάρ ἐστε ὑπὸ νόμον ἀλλὰ ὑπὸ χάριν.
translation:
  text: For sin will not rule over you, because you are not under the law but under
    grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not have dominion over you.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'under law,' an idiom meaning under the law's authority or regime.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτία
  chosen: sin
  alternatives:
  - Sin
  lexicon: BDAG
  rationale: Rendered with the standard Pauline gloss 'sin.' Although the noun is
    personified here as a ruling power, capitalization would add an interpretive layer
    not required by the Greek.
- source_word: κυριεύσει
  chosen: will rule over
  alternatives:
  - will have dominion over
  - will be lord over
  - will master
  lexicon: BDAG
  rationale: The verb denotes exercising lordship or dominion. 'Will rule over' is
    clear modern English and preserves the personified image of sin as a master without
    sounding archaic.
- source_word: ὑπὸ νόμον
  chosen: under the law
  alternatives:
  - under law
  lexicon: BDAG
  rationale: This Pauline idiom refers to being under the regime or authority of the
    law. Although νόμον is anarthrous in Greek, idiomatic English normally requires
    'the law' here, and in Romans this most naturally refers to the Mosaic law-order.
- source_word: χάριν
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the established and contextually fitting rendering in Paul''s
    contrast between law and grace. ''Favor'' is possible lexically but too weak for
    the theological force of the passage.'
- source_word: γὰρ
  chosen: for / because
  alternatives:
  - for
  lexicon: BDAG
  rationale: The first γὰρ is represented by 'For' to preserve the discourse connection,
    while the second is naturally expressed as 'because' in English to show the explanatory
    force of the clause.
