theological_decisions:
- issue: Whether δικαιόω here should be rendered in a purely forensic sense ('justified')
    or in an emancipatory sense ('freed').
  chosen_reading: Rendered as 'has been acquitted' in the main text, with 'justified'
    and 'freed' preserved as alternatives.
  alternative_readings:
  - has been justified from sin
  - has been freed from sin
  rationale: Romans 6 emphasizes release from sin's dominion, but Paul uses δικαιόω
    rather than a more common emancipation verb. 'Acquitted' keeps the judicial force
    while fitting the context of release from sin's claim. This preserves the theological
    tension rather than flattening the verse into either courtroom-only or liberation-only
    language.
  doctrine_reference: Preserve theological tension rather than resolve it.
