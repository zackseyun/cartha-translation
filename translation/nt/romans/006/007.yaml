id: ROM.6.7
reference: Romans 6:7
source:
  edition: SBLGNT
  text: ὁ γὰρ ἀποθανὼν δεδικαίωται ἀπὸ τῆς ἁμαρτίας.
translation:
  text: For the one who has died has been acquitted from sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has been justified from sin'; contextually also 'has been freed from
      sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... ἀποθανὼν
  chosen: the one who has died
  alternatives:
  - he who has died
  - the person who died
  lexicon: BDAG
  rationale: The article with the aorist participle functions substantivally. 'The
    one who has died' is natural English and preserves the representative force without
    over-specifying gender.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding statement. 'For'
    is concise and suitably connective in English.
- source_word: δεδικαίωται
  chosen: has been acquitted
  alternatives:
  - has been justified
  - has been freed
  lexicon: BDAG
  rationale: δικαιόω normally carries a forensic sense such as justify or declare
    righteous. In this context, with death ending sin's claim, 'has been acquitted'
    preserves the legal force while making idiomatic sense with 'from sin.' 'Freed'
    captures the contextual result but risks obscuring the verb's judicial nuance;
    'justified from sin' is more literal but awkward in English.
- source_word: ἀπὸ τῆς ἁμαρτίας
  chosen: from sin
  alternatives:
  - from the sin
  - away from sin
  lexicon: BDAG
  rationale: The prepositional phrase marks separation or release. 'From sin' is the
    most natural rendering and fits Paul's broader personified use of sin in Romans
    6 without narrowing it to either guilt alone or power alone.
