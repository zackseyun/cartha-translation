id: ROM.6.3
reference: Romans 6:3
source:
  edition: SBLGNT
  text: ἢ ἀγνοεῖτε ὅτι ὅσοι ἐβαπτίσθημεν εἰς Χριστὸν Ἰησοῦν εἰς τὸν θάνατον αὐτοῦ
    ἐβαπτίσθημεν;
translation:
  text: Or do you not know that all of us who were baptized into Messiah Jesus were
    baptized into his death?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ Jesus.'' Greek: ''Christos Iēsous.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or is it that
  lexicon: BDAG
  rationale: Retains Paul's argumentative transition and mild rebuke, linking this
    question to the preceding discussion.
- source_word: ἀγνοεῖτε
  chosen: do you not know
  alternatives:
  - are you unaware
  lexicon: BDAG
  rationale: The present active indicative in a rhetorical question is naturally rendered
    as 'do you not know,' which is idiomatic and preserves Paul's appeal to shared
    knowledge.
- source_word: ὅσοι
  chosen: all of us who
  alternatives:
  - as many of us as
  - we who
  lexicon: BDAG
  rationale: Given the first-person plural verb, this English rendering is natural
    and captures the inclusive scope of the relative expression.
- source_word: ἐβαπτίσθημεν
  chosen: were baptized
  lexicon: BDAG
  rationale: The aorist passive is best represented straightforwardly. This preserves
    the eventive sense without importing a denominational explanation of baptism.
- source_word: εἰς
  chosen: into
  alternatives:
  - in relation to
  - into union with
  lexicon: BDAG
  rationale: '''Into'' is the most direct rendering and preserves the text''s strong
    incorporation imagery. It avoids resolving the precise theological mechanics beyond
    what the Greek states.'
- source_word: Χριστὸν Ἰησοῦν
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the titular sense remains clear.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: A direct and fully adequate rendering of θάνατος; no expansion is warranted.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: 'The genitive pronoun is most naturally rendered possessively in English:
    ''his death.'''
