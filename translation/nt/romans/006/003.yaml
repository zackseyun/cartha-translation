theological_decisions:
- issue: Whether εἰς with baptism language should be rendered in a way that favors
    sacramental efficacy, symbolic identification, or covenantal union.
  chosen_reading: Translated both instances of εἰς as 'into.'
  alternative_readings:
  - '''in relation to'''
  - '''into union with'''
  rationale: The Greek expresses movement toward or incorporation into Christ Jesus
    and his death. 'Into' preserves that theological force while avoiding commitment
    to a specific denominational account of baptism.
  doctrine_reference: Preserve theological tension rather than resolve it.
