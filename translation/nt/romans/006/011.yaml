id: ROM.6.11
reference: Romans 6:11
source:
  edition: SBLGNT
  text: οὕτως καὶ ὑμεῖς λογίζεσθε ἑαυτοὺς ⸂εἶναι νεκροὺς μὲν⸃ τῇ ἁμαρτίᾳ ζῶντας δὲ
    τῷ θεῷ ἐν Χριστῷ ⸀Ἰησοῦ.
translation:
  text: So also you, consider yourselves to be dead to sin but alive to God in Messiah
    Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'count' or 'reckon yourselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'living to God.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'in Christ Jesus'; 'Messiah' translates the title Χριστός.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  chosen: So also
  alternatives:
  - In this way also
  - Thus also
  rationale: Preserves the inferential link to the preceding argument while sounding
    natural in English.
- source_word: λογίζεσθε
  chosen: consider
  alternatives:
  - count
  - reckon
  lexicon: BDAG
  rationale: Carries the sense of regarding or reckoning something as true. 'Consider'
    is natural modern English without losing the mental-accounting force.
- source_word: ἑαυτοὺς
  chosen: yourselves
  rationale: Reflexive pronoun retained explicitly because the Greek directly marks
    self-regard.
- source_word: εἶναι
  chosen: to be
  rationale: Kept in translation because the infinitive is explicit in the Greek text
    and supports the full construction after 'consider yourselves.'
- source_word: νεκροὺς μὲν τῇ ἁμαρτίᾳ
  chosen: dead to sin
  alternatives:
  - dead indeed to sin
  - dead with respect to sin
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the dative relation here. The μέν marks
    contrast with δέ, which is adequately carried by 'but' in the paired clause rather
    than by adding 'indeed'.
- source_word: ζῶντας δὲ τῷ θεῷ
  chosen: alive to God
  alternatives:
  - living to God
  lexicon: BDAG
  rationale: Although the participle literally means 'living,' English idiom in this
    antithetical pairing is better served by 'alive,' matching the contrast with 'dead'
    while preserving the sense.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  rationale: Following the doctrine guideline, Χριστός is translated as the title
    'Messiah' where title force is present. 'In' is retained to preserve the important
    Pauline union/sphere language rather than paraphrasing it.
