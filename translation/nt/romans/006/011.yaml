theological_decisions:
- issue: Rendering Χριστῷ as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Here Χριστῷ still functions as a meaningful title within Paul's theological
    language, so the default doctrinal rendering 'Messiah' is preferred.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of ἐν Χριστῷ Ἰησοῦ
  chosen_reading: in Messiah Jesus
  alternative_readings:
  - through Messiah Jesus
  - because of Messiah Jesus
  rationale: The preposition ἐν is preserved as 'in' to maintain Paul's characteristic
    union-with-Christ language and avoid over-interpreting the relation.
  doctrine_reference: Preserve theological tension rather than resolve it
