id: ROM.6.17
reference: Romans 6:17
source:
  edition: SBLGNT
  text: χάρις δὲ τῷ θεῷ ὅτι ἦτε δοῦλοι τῆς ἁμαρτίας ὑπηκούσατε δὲ ἐκ καρδίας εἰς ὃν
    παρεδόθητε τύπον διδαχῆς,
translation:
  text: But thanks be to God that, though you were slaves of sin, you obeyed from
    the heart the pattern of teaching to which you were handed over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the form of teaching" or "the standard of teaching."
    reason: lexical_alternative
  - marker: b
    text: Or "into which you were handed over."
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  chosen: thanks be
  alternatives:
  - grace
  - thanks
  lexicon: BDAG
  rationale: In this idiomatic construction with τῷ θεῷ, the sense is thanksgiving
    directed to God rather than 'grace' as an abstract quality. 'Thanks be to God'
    is natural English and reflects Paul's doxological tone.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The bonded, dominated sense is central in Romans 6, where Paul contrasts
    slavery to sin with slavery to righteousness. This matches the doctrine guide's
    preference for 'slave' where the bonded nature is theologically salient.
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - to sin
  lexicon: BDAG
  rationale: 'The genitive is rendered straightforwardly as possession/subjection:
    they were characterized as slaves belonging to sin''s mastery.'
- source_word: ὑπηκούσατε
  chosen: obeyed
  alternatives:
  - became obedient
  - listened submissively
  lexicon: BDAG
  rationale: The aorist verb denotes obedience, not mere hearing. 'Obeyed' is direct
    and preserves the ethical force of the verb.
- source_word: ἐκ καρδίας
  chosen: from the heart
  alternatives:
  - wholeheartedly
  - from your heart
  lexicon: BDAG
  rationale: This preserves the concrete metaphor of καρδία while remaining clear
    in modern English. It also keeps Paul's emphasis on inward, sincere obedience.
- source_word: τύπον διδαχῆς
  chosen: the pattern of teaching
  alternatives:
  - the form of teaching
  - the standard of teaching
  - the pattern of instruction
  lexicon: BDAG
  rationale: τύπος here refers to a mold, pattern, or standard, and διδαχή is teaching/instruction.
    'Pattern of teaching' is clear, faithful, and avoids overly traditional but less
    transparent phrasing like 'form of doctrine.'
- source_word: παρεδόθητε
  chosen: were handed over
  alternatives:
  - were delivered over
  - were entrusted
  - were committed
  lexicon: BDAG
  rationale: The passive voice is retained because the Greek presents the believers
    as being transferred over to a pattern of teaching, a striking image that should
    not be flattened. 'Handed over' is natural English and preserves the passivity
    of the construction.
- source_word: εἰς ὃν
  chosen: to which
  alternatives:
  - into which
  lexicon: BDAG
  rationale: Although εἰς can more literally suggest movement 'into,' English idiom
    prefers 'to which' with 'handed over' here. The translation preserves the relational
    direction without awkwardness.
