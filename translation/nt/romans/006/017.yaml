theological_decisions:
- issue: Whether to soften δοῦλοι as 'servants' or render it as 'slaves'
  chosen_reading: slaves of sin
  alternative_readings:
  - servants of sin
  - bondservants of sin
  rationale: Romans 6 develops an explicit slavery metaphor of ownership and domination.
    Rendering δοῦλοι as 'slaves' preserves Paul's theological contrast and follows
    the project's stated default when bondedness is salient.
  doctrine_reference: 'Contested terms: δοῦλος → servant / slave (context-dependent);
    use ''slave'' where the bonded nature is salient.'
- issue: Whether to restructure the passive phrase so that the teaching is delivered
    to the believers rather than the believers being handed over to the teaching
  chosen_reading: the pattern of teaching to which you were handed over
  alternative_readings:
  - the form of teaching that was handed on to you
  - the standard of teaching entrusted to you
  rationale: The Greek passive naturally presents the Roman believers as handed over
    to the teaching-pattern. Retaining that imagery preserves the text's force without
    importing a more interpretive active paraphrase.
