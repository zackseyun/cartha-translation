theological_decisions:
- issue: Whether διὰ τοῦ βαπτίσματος should be rendered in a way that implies a specific
    sacramental doctrine
  chosen_reading: through baptism
  alternative_readings:
  - by baptism, with stronger sacramental-sounding force
  rationale: The translation preserves the grammatical instrumentality of the phrase
    without importing a denominational conclusion about how baptism relates to union
    with Christ.
  doctrine_reference: Preserve theological tension rather than resolve it.
