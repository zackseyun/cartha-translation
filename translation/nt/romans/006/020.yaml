id: ROM.6.20
reference: Romans 6:20
source:
  edition: SBLGNT
  text: Ὅτε γὰρ δοῦλοι ἦτε τῆς ἁμαρτίας, ἐλεύθεροι ἦτε τῇ δικαιοσύνῃ.
translation:
  text: For when you were slaves of sin, you were free in regard to righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with respect to righteousness.”
    reason: lexical_alternative
  - marker: b
    text: Or “justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The bonded sense is theologically salient in Romans 6, where Paul contrasts
    rival slaveries; this matches the doctrine guideline to prefer “slave” where δοῦλος
    carries that force.
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - to sin
  lexicon: BDAG
  rationale: 'The genitive is rendered naturally in English as possession or domain:
    they belonged to sin as its slaves.'
- source_word: ἐλεύθεροι
  chosen: free
  alternatives:
  - unbound
  - independent
  lexicon: BDAG
  rationale: '“Free” preserves Paul’s sharp irony: they were not under righteousness
    while enslaved to sin.'
- source_word: τῇ δικαιοσύνῃ
  chosen: in regard to righteousness
  alternatives:
  - with respect to righteousness
  - from righteousness
  lexicon: BDAG
  rationale: The dative is best taken as reference/respect rather than simple separation.
    “In regard to righteousness” is clear modern English and avoids implying righteousness
    itself was an oppressor.
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults for Pauline usage, the main text uses “righteousness,”
    while the alternative “justice” is preserved in a footnote.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: “For” keeps the explanatory connection to the surrounding argument in
    a natural but still fairly formal way.
