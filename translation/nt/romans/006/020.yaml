theological_decisions:
- issue: How to express the relation to righteousness in Paul's contrast
  chosen_reading: you were free in regard to righteousness
  alternative_readings:
  - you were free from righteousness
  - you had nothing to do with righteousness
  rationale: This preserves the rhetorical tension of the Greek without softening
    Paul’s moral contrast or making righteousness sound negatively binding.
  doctrine_reference: Preserve theological tension rather than resolve it.
