theological_decisions:
- issue: Rendering the δουλόω metaphor
  chosen_reading: you were enslaved to righteousness
  alternative_readings:
  - you became servants of righteousness
  - you were made slaves of righteousness
  rationale: The slavery metaphor is central to Paul’s argument in Romans 6 and should
    not be softened. “Enslaved” preserves the stark transfer of mastery from sin to
    righteousness without importing denominational conclusions beyond the text.
  doctrine_reference: 'Contested terms: δοῦλος — use “slave” where the bonded nature
    is salient.'
