id: ROM.6.18
reference: Romans 6:18
source:
  edition: SBLGNT
  text: ἐλευθερωθέντες δὲ ἀπὸ τῆς ἁμαρτίας ἐδουλώθητε τῇ δικαιοσύνῃ·
translation:
  text: And having been freed from sin, you were enslaved to righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “justice.”
    reason: lexical_alternative
  - marker: b
    text: Or “you were made slaves of righteousness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλευθερωθέντες
  chosen: having been freed
  alternatives:
  - having been set free
  - having been liberated
  lexicon: BDAG
  rationale: Aorist passive participle indicating a completed action received by the
    addressees. “Freed” is natural English and preserves the passive sense without
    unnecessary expansion.
- source_word: δὲ
  chosen: And
  alternatives:
  - But
  - Now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective continuing Paul’s argument. “And”
    is smoother in English while still reflecting the discourse connection.
- source_word: ἁμαρτίας
  chosen: sin
  lexicon: BDAG
  rationale: Singular with the article in Pauline usage commonly personifies sin as
    a ruling power. “Sin” preserves both the abstract and quasi-personified force.
- source_word: ἐδουλώθητε
  chosen: you were enslaved
  alternatives:
  - you were made slaves
  - you were bound as slaves
  lexicon: BDAG
  rationale: From δουλόω, the bonded/slave sense is theologically salient in this
    context. Following the doctrine guidance on doulos-family terms, “enslaved” preserves
    the force better than softer renderings like “served” or “became servants.”
- source_word: δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In Paul, δικαιοσύνη can carry both moral and covenantal/forensic resonance.
    The project default is “righteousness,” while preserving “justice” as a footnoted
    alternative in Pauline contexts.
