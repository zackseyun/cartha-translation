theological_decisions:
- issue: Slave imagery in relation to God
  chosen_reading: Retain the strong metaphor with 'enslaved to God.'
  alternative_readings:
  - bound to God
  - devoted to God
  - in service to God
  rationale: The doctrine excerpt explicitly prefers 'slave' language where the bonded
    nature is salient. Romans 6 intentionally contrasts former slavery to sin with
    new slavery to God, so softening the image would reduce Paul's argument.
  doctrine_reference: 'Contested terms: δοῦλος *doulos* | servant / slave (context-dependent)
    | Uses ''slave'' where the bonded nature is salient'
- issue: Rendering ἁγιασμός
  chosen_reading: Use 'sanctification' in the main text.
  alternative_readings:
  - holiness
  rationale: Both are defensible, but 'sanctification' better preserves the process/result
    nuance in this context. Because 'holiness' is also a strong lexical option, it
    is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; documented
    per-verse variance/alternatives
