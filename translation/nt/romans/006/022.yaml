id: ROM.6.22
reference: Romans 6:22
source:
  edition: SBLGNT
  text: νυνὶ δέ, ἐλευθερωθέντες ἀπὸ τῆς ἁμαρτίας δουλωθέντες δὲ τῷ θεῷ, ἔχετε τὸν
    καρπὸν ὑμῶν εἰς ἁγιασμόν, τὸ δὲ τέλος ζωὴν αἰώνιον.
translation:
  text: But now, having been freed from sin and enslaved to God, you have your fruit
    leading to sanctification, and the outcome, eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resulting in holiness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having been made slaves to God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δέ
  chosen: But now
  alternatives:
  - Now, however
  - But as it is now
  rationale: Keeps the strong transitional contrast with the previous state while
    sounding natural in English.
- source_word: ἐλευθερωθέντες
  chosen: having been freed
  alternatives:
  - having been set free
  - being freed
  lexicon: BDAG
  rationale: The aorist passive participle is well represented by 'having been freed,'
    preserving the completed action received by the believers.
- source_word: ἁμαρτίας
  chosen: sin
  lexicon: BDAG
  rationale: The singular is best kept as the power or realm of sin, which is Paul's
    emphasis in Romans 6.
- source_word: δουλωθέντες
  chosen: enslaved
  alternatives:
  - made slaves
  - brought into slavery
  lexicon: BDAG
  rationale: In Romans 6 the bonded nature of the imagery is theologically salient,
    so 'enslaved' better reflects the force of δουλόω than a softer term such as 'serve'.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: The dative after δουλόω is naturally rendered 'to God,' preserving the
    slave-master relation in the metaphor.
- source_word: ἔχετε τὸν καρπὸν ὑμῶν
  chosen: you have your fruit
  alternatives:
  - you have your benefit
  - you are bearing your fruit
  lexicon: BDAG
  rationale: Retains the agricultural metaphor of καρπός and the directness of ἔχετε
    rather than paraphrasing it away.
- source_word: εἰς ἁγιασμόν
  chosen: leading to sanctification
  alternatives:
  - resulting in holiness
  - for sanctification
  lexicon: BDAG
  rationale: This conveys movement toward a result, matching εἰς. 'Sanctification'
    preserves the theological force of ἁγιασμός, while the alternative 'holiness'
    remains viable and is noted in a footnote.
- source_word: τὸ δὲ τέλος
  chosen: the outcome
  alternatives:
  - the end
  - the final result
  lexicon: BDAG
  rationale: τέλος here points to the resulting end-state rather than merely termination,
    so 'outcome' communicates the sense clearly in modern English.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard and precise rendering, preserving both the theological
    weight and idiomatic English usage.
