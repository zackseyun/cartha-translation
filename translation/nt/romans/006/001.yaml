id: ROM.6.1
reference: Romans 6:1
source:
  edition: SBLGNT
  text: Τί οὖν ἐροῦμεν; ⸀ἐπιμένωμεν τῇ ἁμαρτίᾳ, ἵνα ἡ χάρις πλεονάσῃ;
translation:
  text: What then shall we say? Should we continue in sin so that grace may increase?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Should we persist in sin ... ?'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that grace may abound.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  chosen: What then
  alternatives:
  - What, then
  - So what
  rationale: Preserves Paul's inferential transition and rhetorical tone without sounding
    colloquial.
- source_word: ἐροῦμεν
  chosen: shall we say
  alternatives:
  - will we say
  - are we to say
  lexicon: BDAG
  rationale: A standard future deliberative expression in context; 'shall we say'
    best fits the rhetorical setup in natural English.
- source_word: ἐπιμένωμεν
  chosen: should we continue
  alternatives:
  - should we persist
  - are we to remain
  lexicon: BDAG
  rationale: The present subjunctive in a deliberative question asks about an ongoing
    course of action. 'Continue' is natural English and preserves the sense of persistence.
- source_word: τῇ ἁμαρτίᾳ
  chosen: in sin
  alternatives:
  - in the sin
  - in sinfulness
  lexicon: BDAG
  rationale: The dative after ἐπιμένω conveys remaining in the sphere or practice
    of sin. English idiom favors 'in sin' rather than the more wooden 'in the sin.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Keeps the clause's stated aim or proposed outcome explicit, matching
    Paul's rhetorical formulation.
- source_word: ἡ χάρις
  chosen: grace
  lexicon: BDAG
  rationale: The established and accurate rendering for χάρις here, referring to God's
    gracious favor in Paul's argument.
- source_word: πλεονάσῃ
  chosen: may increase
  alternatives:
  - may abound
  - might increase
  lexicon: BDAG
  rationale: Conveys increase in quantity or extent in clear modern English. 'Abound'
    is traditional, but 'increase' more directly reflects the verb's sense for contemporary
    readers.
