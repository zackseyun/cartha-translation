theological_decisions:
- issue: Whether to frame Paul's question as permission, obligation, or mere prediction
  chosen_reading: 'A deliberative moral question: ''Should we continue in sin'''
  alternative_readings:
  - '''Shall we continue in sin'''
  - '''Are we to continue in sin'''
  rationale: The Greek subjunctive poses a rhetorical question about proposed conduct.
    'Should we' makes the moral force plain without importing extra doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English.
