theological_decisions:
- issue: Paul's contrast between sin and God as rival masters
  chosen_reading: The verse is rendered with direct dative relationships (“to sin,”
    “to God”) without expanding them into interpretive paraphrases such as “in service
    to.”
  alternative_readings:
  - Do not offer yourselves in service to sin ... but offer yourselves in service
    to God
  rationale: The Greek already implies allegiance and direction; the translation preserves
    that theological force without importing extra wording.
