id: ROM.6.13
reference: Romans 6:13
source:
  edition: SBLGNT
  text: μηδὲ παριστάνετε τὰ μέλη ὑμῶν ὅπλα ἀδικίας τῇ ἁμαρτίᾳ, ἀλλὰ παραστήσατε ἑαυτοὺς
    τῷ θεῷ ⸀ὡσεὶ ἐκ νεκρῶν ζῶντας καὶ τὰ μέλη ὑμῶν ὅπλα δικαιοσύνης τῷ θεῷ.
translation:
  text: And do not present your members to sin as weapons of unrighteousness, but
    present yourselves to God as those alive from the dead, and your members to God
    as weapons of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “instruments” of righteousness / unrighteousness.
    reason: lexical_alternative
  - marker: b
    text: Or “justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παριστάνετε / παραστήσατε
  chosen: present
  alternatives:
  - offer
  - yield
  lexicon: BDAG
  rationale: Using “present” preserves the repeated verb across both clauses and fits
    Paul's imagery of placing oneself or one's body at another's disposal. “Offer”
    is possible, but “present” is more transparent to the Greek and keeps the imperative
    contrast tight.
- source_word: μέλη
  chosen: members
  alternatives:
  - body parts
  - limbs
  lexicon: BDAG
  rationale: “Members” is the standard Pauline term for bodily parts used in moral
    action. “Body parts” is clearer but less natural and less consistent with Paul's
    usage.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - instruments
  - arms
  lexicon: BDAG
  rationale: The noun often denotes weapons or implements of conflict. “Weapons” preserves
    the verse's warfare imagery more vividly than the traditional but broader “instruments.”
- source_word: ἀδικίας
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: “Unrighteousness” matches the moral-theological register of the passage
    and pairs naturally with “righteousness” in the second half.
- source_word: ἁμαρτίᾳ
  chosen: sin
  alternatives:
  - the power of sin
  lexicon: BDAG
  rationale: Rendering simply as “sin” follows the Greek directly while still allowing
    readers to hear Paul's personifying usage in context.
- source_word: ὡσεὶ ἐκ νεκρῶν ζῶντας
  chosen: as those alive from the dead
  alternatives:
  - as if brought to life from the dead
  - as those living out from among the dead
  lexicon: BDAG
  rationale: This wording preserves both the comparative force of ὡσεὶ and the resurrection-shaped
    contrast between death and life without overparaphrasing.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults for δικαιοσύνη in Pauline contexts, the main text
    uses “righteousness,” while the alternative “justice” is preserved in a footnote.
