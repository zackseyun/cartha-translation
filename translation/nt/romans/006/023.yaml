id: ROM.6.23
reference: Romans 6:23
source:
  edition: SBLGNT
  text: τὰ γὰρ ὀψώνια τῆς ἁμαρτίας θάνατος, τὸ δὲ χάρισμα τοῦ θεοῦ ζωὴ αἰώνιος ἐν
    Χριστῷ Ἰησοῦ τῷ κυρίῳ ἡμῶν.
translation:
  text: For the wages of sin is death, but the gift of God is eternal life in Messiah
    Jesus our Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gracious gift.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in Christ Jesus our Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψώνια
  chosen: wages
  alternatives:
  - pay
  - provisions
  lexicon: BDAG
  rationale: The plural noun refers to what is earned or paid out, fitting Paul's
    earned-vs-gift contrast. 'Wages' is the clearest idiomatic English rendering and
    preserves the metaphor of earned recompense.
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - from sin
  lexicon: BDAG
  rationale: 'The genitive is best rendered attributively/possessively here: the wages
    belonging to or paid by sin. ''Of sin'' preserves the compact force of the Greek.'
- source_word: θάνατος
  chosen: death
  lexicon: BDAG
  rationale: The predicate nominative is straightforward. 'Death' preserves both the
    literal and theological weight without over-interpreting the kind of death in
    the translation itself.
- source_word: χάρισμα
  chosen: gift
  alternatives:
  - gracious gift
  - free gift
  lexicon: BDAG
  rationale: The word emphasizes a gift of grace, but 'gift' is the most natural English
    here and keeps the contrast with earned 'wages.' 'Gracious gift' is semantically
    fuller but less idiomatic in this sentence.
- source_word: ζωὴ αἰώνιος
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the established and accurate rendering for the phrase, preserving
    both duration and theological resonance in readable modern English.
- source_word: ἐν
  chosen: in
  alternatives:
  - through
  - by union with
  lexicon: BDAG
  rationale: The preposition is retained as 'in' to preserve the Pauline union-with-Christ
    idiom without importing a narrower interpretive gloss into the main text.
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here in the phrase 'in Messiah Jesus' the titular sense remains clear.
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' This preserves both early Christian
    confessional usage and the term's theological weight.
