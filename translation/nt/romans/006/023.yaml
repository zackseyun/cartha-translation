theological_decisions:
- issue: Force of ἐν Χριστῷ Ἰησοῦ
  chosen_reading: Rendered 'in Messiah Jesus'
  alternative_readings:
  - through Messiah Jesus
  - by Messiah Jesus
  rationale: The Greek most naturally expresses sphere or union rather than merely
    instrumentality. Keeping 'in' preserves Paul's theological tension and avoids
    narrowing the phrase to causation alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
