id: ROM.6.15
reference: Romans 6:15
source:
  edition: SBLGNT
  text: Τί οὖν; ⸀ἁμαρτήσωμεν ὅτι οὐκ ἐσμὲν ὑπὸ νόμον ἀλλὰ ὑπὸ χάριν; μὴ γένοιτο·
translation:
  text: What then? Should we sin because we are not under law but under grace? May
    it never be!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Are we to sin?'
    reason: lexical_alternative
  - marker: b
    text: Or 'By no means!'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  chosen: What then?
  alternatives:
  - What then shall we say?
  - So what then?
  lexicon: BDAG
  rationale: A concise inferential question that naturally carries Paul’s argumentative
    transition without adding words not present in the Greek.
- source_word: ἁμαρτήσωμεν
  chosen: Should we sin
  alternatives:
  - Are we to sin?
  - Shall we sin?
  lexicon: BDAG
  rationale: The first person plural aorist subjunctive is deliberative here. 'Should
    we sin' communicates the rhetorical proposal in clear modern English without sounding
    either archaic or overly interpretive.
- source_word: ὅτι
  chosen: because
  alternatives:
  - since
  - for the reason that
  lexicon: BDAG
  rationale: 'Here ὅτι gives the proposed rationale for the question: sinning on the
    grounds that believers are not under law but under grace.'
- source_word: ὑπὸ νόμον
  chosen: under law
  alternatives:
  - under the law
  - subject to law
  lexicon: BDAG
  rationale: The anarthrous Greek is preserved most directly with 'under law.' This
    keeps Paul’s covenantal-legal contrast broad and avoids importing a more specific
    referent than the text explicitly states.
- source_word: ὑπὸ χάριν
  chosen: under grace
  alternatives:
  - under favor
  - under God's grace
  lexicon: BDAG
  rationale: '''Grace'' is the established and accurate rendering of χάρις here, preserving
    Paul’s theological contrast with law without unnecessary expansion.'
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Absolutely not!
  - By no means!
  lexicon: BDAG
  rationale: This preserves the strong repudiating force of Paul’s idiom while remaining
    intelligible in modern English. It is weightier and less colloquial than 'Absolutely
    not!'.
