theological_decisions:
- issue: Scope of νόμος in Paul's contrast
  chosen_reading: Render generically as 'law' rather than specifying 'the law' or
    'the Mosaic law' in the main text.
  alternative_readings:
  - the law
  - the Mosaic law
  rationale: The Greek lacks the article, and the immediate task is translation rather
    than interpretive narrowing. 'Under law' preserves the Pauline expression and
    leaves the precise theological scope to context and exegesis.
  doctrine_reference: Preserve theological tension rather than resolve it.
