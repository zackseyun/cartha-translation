theological_decisions:
- issue: Whether Paul's wording presents sin merely as acts or as a ruling power
  chosen_reading: The main text preserves the personification of sin as a reigning
    power by retaining 'let sin reign.'
  alternative_readings:
  - Interpret sin more abstractly as sinful behavior taking control
  rationale: Paul's verb choice is royal and personalizing. Keeping that imagery preserves
    the theological tension of the passage without importing a fuller doctrinal explanation
    into the translation.
- issue: Antecedent of αὐτοῦ ('its')
  chosen_reading: Read 'its desires' as referring to the mortal body.
  alternative_readings:
  - Read the pronoun as referring more broadly to sin's desires
  rationale: The pronoun is genitive singular masculine/neuter, which naturally fits
    the neuter singular 'body' rather than the feminine 'sin.' An alternative interpretive
    linkage to sin is possible in context, so it is preserved in a footnote.
