id: ROM.6.12
reference: Romans 6:12
source:
  edition: SBLGNT
  text: Μὴ οὖν βασιλευέτω ἡ ἁμαρτία ἐν τῷ θνητῷ ὑμῶν σώματι εἰς τὸ ⸀ὑπακούειν ταῖς
    ἐπιθυμίαις αὐτοῦ,
translation:
  text: Therefore, do not let sin reign in your mortal body so that you obey its desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'so that you obey sin's desires.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So then
  - then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' preserves
    the logical connection clearly in modern English.
- source_word: βασιλευέτω
  chosen: do not let ... reign
  alternatives:
  - must not reign
  - do not let ... rule as king
  lexicon: BDAG
  rationale: The present active imperative calls for ongoing prohibition. 'Do not
    let ... reign' preserves both the imperatival force and the royal metaphor without
    sounding wooden.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Rendered as 'sin,' while preserving Paul's personifying usage by pairing
    it with 'reign.' This keeps the theological force of sin as an enslaving power
    without adding interpretive language to the noun itself.
- source_word: θνητῷ
  chosen: mortal
  alternatives:
  - subject to death
  lexicon: BDAG
  rationale: '''Mortal'' is the natural concise equivalent and preserves the contrast
    between the believer''s present bodily condition and the new life argued in context.'
- source_word: σώματι
  chosen: body
  lexicon: BDAG
  rationale: A straightforward formal rendering; no contextual pressure here warrants
    expanding it to 'physical body' or treating it as a metaphor.
- source_word: εἰς τὸ ὑπακούειν
  chosen: so that you obey
  alternatives:
  - with the result that you obey
  - for obeying
  lexicon: BDAG
  rationale: This construction expresses intended or resulting outcome. 'So that you
    obey' gives clear idiomatic English and fits the warning against sin's reign.
- source_word: ἐπιθυμίαις
  chosen: desires
  alternatives:
  - passions
  - lusts
  lexicon: BDAG
  rationale: '''Desires'' is broad enough to reflect the Greek without narrowing the
    sense only to sexual lust, while still carrying moral weight in context.'
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - their
  - of sin
  lexicon: BDAG
  rationale: Taken most naturally with the nearest suitable antecedent, 'body' (neuter
    singular), yielding 'its desires.' This follows the Greek form closely, though
    some interpreters understand the reference more conceptually in relation to sin.
