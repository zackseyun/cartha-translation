theological_decisions:
- issue: Whether Paul's statement describes moral improvement or a decisive break
    with sin's dominion
  chosen_reading: The wording 'died to sin' is preserved as a decisive relational
    break, without paraphrasing it into explanation.
  alternative_readings:
  - became deadened to sin
  - turned away from sin
  rationale: The Greek states the metaphor directly. Preserving it maintains Paul's
    theological tension and avoids importing a narrower doctrinal interpretation about
    sanctification mechanics.
  doctrine_reference: Preserve theological tension rather than resolve it.
