id: ROM.6.2
reference: Romans 6:2
source:
  edition: SBLGNT
  text: μὴ γένοιτο· οἵτινες ἀπεθάνομεν τῇ ἁμαρτίᾳ, πῶς ἔτι ζήσομεν ἐν αὐτῇ;
translation:
  text: Absolutely not! We who died to sin—how can we still live in it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May it never be!'; a strong expression of repudiation.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γένοιτο
  chosen: Absolutely not!
  alternatives:
  - May it never be!
  - By no means!
  - Certainly not!
  lexicon: BDAG
  rationale: A strong idiomatic repudiation in Paul. 'Absolutely not!' preserves the
    force in natural modern English without archaic phrasing.
- source_word: οἵτινες
  chosen: We who
  alternatives:
  - we, who
  - those who
  lexicon: BDAG
  rationale: The relative pronoun identifies the believers being discussed. 'We who'
    is direct, natural, and keeps Paul's inclusive first-person framing.
- source_word: ἀπεθάνομεν
  chosen: died
  alternatives:
  - have died
  lexicon: BDAG
  rationale: The aorist is best rendered simply as a past event in English here. 'Died'
    is concise and fits Paul's argument about definitive rupture with sin.
- source_word: τῇ ἁμαρτίᾳ
  chosen: to sin
  alternatives:
  - to the sin
  - in relation to sin
  lexicon: BDAG
  rationale: 'The dative with ἀποθνῄσκω expresses relation: death with respect to
    sin''s realm or claim. ''To sin'' is the established and clearest English equivalent.'
- source_word: πῶς ἔτι
  chosen: how can we still
  alternatives:
  - how shall we yet
  - how will we any longer
  lexicon: BDAG
  rationale: This combination expresses incredulity about continuation. 'How can we
    still' captures both the rhetorical force and the temporal sense of ἔτι.
- source_word: ζήσομεν
  chosen: live
  alternatives:
  - go on living
  - continue to live
  lexicon: BDAG
  rationale: 'The future indicative is used rhetorically: ''how can we live.'' English
    idiom favors the simpler present-inflected expression after ''can'' without losing
    the sense.'
- source_word: ἐν αὐτῇ
  chosen: in it
  alternatives:
  - in sin
  - within it
  lexicon: BDAG
  rationale: The pronoun refers back to sin personified as a sphere or dominion. 'In
    it' preserves the Greek cohesion and avoids unnecessary repetition in the main
    text.
