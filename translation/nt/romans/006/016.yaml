theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline contrast
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: 'The immediate contrast is moral-spiritual: slavery to sin ends in death,
    while obedience issues in δικαιοσύνη. "Righteousness" best preserves Paul''s theological
    register here, while "justice" remains a viable lexical alternative and is footnoted
    per doctrine guidance.'
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → righteousness; justice
    preserved in footnotes for Pauline passages'
