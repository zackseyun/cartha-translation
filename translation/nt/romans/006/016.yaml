id: ROM.6.16
reference: Romans 6:16
source:
  edition: SBLGNT
  text: οὐκ οἴδατε ὅτι ᾧ παριστάνετε ἑαυτοὺς δούλους εἰς ὑπακοήν, δοῦλοί ἐστε ᾧ ὑπακούετε,
    ἤτοι ἁμαρτίας εἰς θάνατον ἢ ὑπακοῆς εἰς δικαιοσύνην;
translation:
  text: Do you not know that if you present yourselves as slaves for obedience, you
    are slaves of the one whom you obey—either of sin leading to death, or of obedience
    leading to righteousness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, justice.
    reason: lexical_alternative
lexical_decisions:
- source_word: παριστάνετε
  chosen: present yourselves
  alternatives:
  - offer yourselves
  - yield yourselves
  lexicon: BDAG
  rationale: '"Present yourselves" preserves the concrete sense of placing oneself
    at another''s disposal while remaining natural in modern English. "Yield" is possible
    but slightly more interpretive.'
- source_word: δούλους / δοῦλοί
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The bonded, owned status is central to Paul's contrast in this verse,
    so "slaves" best reflects δοῦλος here per the project's stated principle.
- source_word: εἰς ὑπακοήν
  chosen: for obedience
  alternatives:
  - to obey
  - for the purpose of obedience
  lexicon: BDAG
  rationale: The preposition εἰς here expresses purpose/result. "For obedience" is
    concise and preserves the noun form of ὑπακοή.
- source_word: ᾧ ὑπακούετε
  chosen: the one whom you obey
  alternatives:
  - what you obey
  - the master you obey
  lexicon: BDAG
  rationale: The dative relative pronoun is personal in context, referring to the
    master to whom one gives obedience. "The one whom you obey" makes that relationship
    explicit without adding a noun absent from the Greek.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - the sinful power
  - sin as master
  lexicon: BDAG
  rationale: Paul personifies sin here, but the Greek simply says "sin." The translation
    preserves the direct wording and lets the surrounding slave imagery carry the
    personification.
- source_word: εἰς θάνατον
  chosen: leading to death
  alternatives:
  - resulting in death
  - unto death
  lexicon: BDAG
  rationale: '"Leading to death" clearly conveys the directional/resultative force
    of εἰς in readable English without archaic tone.'
- source_word: ὑπακοῆς
  chosen: obedience
  alternatives:
  - obedient response
  lexicon: BDAG
  rationale: Paul sets "obedience" over against "sin" as the contrasting sphere/master.
    Keeping the abstract noun preserves the symmetry of the Greek.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In Paul, δικαιοσύνη commonly carries covenantal and moral-theological
    force broader than social justice alone. Per project defaults, "righteousness"
    stands in the main text while "justice" is preserved in a footnote.
