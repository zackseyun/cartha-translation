id: ROM.4.22
reference: Romans 4:22
source:
  edition: SBLGNT
  text: ⸀διὸ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
translation:
  text: Therefore it was counted to him as righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “credited” or “reckoned.”
    reason: lexical_alternative
  - marker: b
    text: Or “justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; “Therefore” preserves
    the logical connection clearly in natural English.
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was credited
  - was reckoned
  lexicon: BDAG
  rationale: A passive rendering preserves the Greek form and keeps the key Romans
    4 accounting/imputation language without overmodernizing it.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: The dative is naturally expressed as “to him” in English and preserves
    the personal reference to Abraham.
- source_word: εἰς
  chosen: as
  alternatives:
  - for
  lexicon: BDAG
  rationale: In the idiom ἐλογίσθη ... εἰς δικαιοσύνην, “as” is the most natural English
    expression of result/status and best reflects established Pauline usage here without
    sounding wooden.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults for δικαιοσύνη in Pauline usage, “righteousness”
    is the main-text rendering. The alternative “justice” is preserved in a footnote
    because the term can carry that sense as well.
