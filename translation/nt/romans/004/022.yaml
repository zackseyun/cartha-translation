theological_decisions:
- issue: Rendering Paul’s imputation/accounting language without importing extra doctrinal
    phrasing
  chosen_reading: was counted to him as righteousness
  alternative_readings:
  - was credited to him as righteousness
  - was reckoned to him as righteousness
  rationale: This preserves the text’s declarative/accounting metaphor while avoiding
    interpretive expansion beyond what the Greek explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
