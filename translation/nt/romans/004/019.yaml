id: ROM.4.19
reference: Romans 4:19
source:
  edition: SBLGNT
  text: καὶ μὴ ἀσθενήσας τῇ ⸀πίστει κατενόησεν τὸ ἑαυτοῦ ⸀σῶμα νενεκρωμένον, ἑκατονταετής
    που ὑπάρχων, καὶ τὴν νέκρωσιν τῆς μήτρας Σάρρας,
translation:
  text: And without weakening in faith, he considered his own body as good as dead—since
    he was about a hundred years old—and the deadness of Sarah’s womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, in another textual tradition: ''he did not consider his own body, which
      was as good as dead.'''
    reason: textual_variant
  - marker: b
    text: Or 'sterility' for 'deadness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενήσας
  chosen: without weakening
  alternatives:
  - not being weak
  - without becoming weak
  lexicon: BDAG
  rationale: Aorist participle of ἀσθενέω is rendered verbally to preserve the participial
    connection while producing natural English. 'Without weakening' conveys failure
    to lose strength rather than mere stative weakness.
- source_word: πίστει
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith.' In this context the
    sense is Abraham's trustful reliance on God's promise, not a contested genitival
    construction requiring a main-text alternative.
- source_word: κατενόησεν
  chosen: he considered
  alternatives:
  - he observed
  - he took note of
  lexicon: BDAG
  rationale: '''Considered'' best captures deliberate mental notice without overstating
    perception or analysis, and fits Paul''s argument that Abraham faced the facts
    realistically.'
- source_word: νενεκρωμένον
  chosen: as good as dead
  alternatives:
  - dead
  - already deadened
  lexicon: BDAG
  rationale: The perfect participle indicates a state of being effectively lifeless
    with respect to procreation, not literal physical death. 'As good as dead' communicates
    the idiomatic force clearly in modern English.
- source_word: ἑκατονταετής που ὑπάρχων
  chosen: since he was about a hundred years old
  alternatives:
  - being about a hundred years old
  - as he was about a hundred years old
  lexicon: BDAG
  rationale: πού softens the number ('about'), and the participial idea is rendered
    smoothly with 'since he was' to explain why his body was regarded as reproductively
    dead.
- source_word: νέκρωσιν
  chosen: deadness
  alternatives:
  - barrenness
  - sterility
  lexicon: BDAG
  rationale: The noun is cognate with the preceding death-language and should retain
    that imagery. 'Barrenness' is interpretive and weakens Paul's parallel between
    Abraham's body and Sarah's womb.
- source_word: μήτρας Σάρρας
  chosen: Sarah’s womb
  alternatives:
  - the womb of Sarah
  lexicon: BDAG
  rationale: This is the most natural English rendering of the genitive phrase while
    preserving the concrete bodily image of the Greek.
