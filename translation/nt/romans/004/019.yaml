theological_decisions:
- issue: Whether to soften the reproductive death imagery into a more interpretive
    expression like 'barrenness' or 'sterility'
  chosen_reading: 'Retain explicit death-language in both clauses: ''as good as dead''
    and ''the deadness of Sarah’s womb'''
  alternative_readings:
  - his body was barren
  - Sarah’s womb was barren/sterile
  rationale: Paul's wording intentionally pairs Abraham's body and Sarah's womb with
    cognate death terms to emphasize the impossibility overcome by God's promise.
    Preserving that tension is preferable to resolving it into smoother medical terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not paraphrase.
