id: ROM.4.25
reference: Romans 4:25
source:
  edition: SBLGNT
  text: ὃς παρεδόθη διὰ τὰ παραπτώματα ἡμῶν καὶ ἠγέρθη διὰ τὴν δικαίωσιν ἡμῶν.
translation:
  text: who was handed over because of our trespasses and was raised for our justification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "because of our justification."
    reason: alternative_reading
  - marker: b
    text: '"Justification" may also be expressed as "acquittal" or "being declared
      righteous."'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεδόθη
  chosen: was handed over
  alternatives:
  - was delivered up
  - was given over
  lexicon: BDAG
  rationale: Passive wording preserves the Greek form and its likely divine-passive
    force, while 'handed over' is clearer in modern English than the more traditional
    'delivered up.'
- source_word: διὰ τὰ παραπτώματα ἡμῶν
  chosen: because of our trespasses
  alternatives:
  - for our trespasses
  - because of our transgressions
  lexicon: BDAG
  rationale: With διά plus the accusative, the first clause is most naturally causal
    here. 'Trespasses' closely matches παράπτωμα and remains readable modern English.
- source_word: παραπτώματα
  chosen: trespasses
  alternatives:
  - transgressions
  - offenses
  lexicon: BDAG
  rationale: '''Trespasses'' is a natural and established rendering for παράπτωμα
    that conveys moral wrongdoing without flattening the term into the broader ''sins.'''
- source_word: ἠγέρθη
  chosen: was raised
  alternatives:
  - was raised up
  lexicon: BDAG
  rationale: The simple passive best reflects the Greek and avoids unnecessary expansion.
- source_word: διὰ τὴν δικαίωσιν ἡμῶν
  chosen: for our justification
  alternatives:
  - because of our justification
  - for our acquittal
  lexicon: BDAG
  rationale: This δεύτερον διά + accusative is debated. The main text uses the traditional
    and contextually coherent prospective sense, 'for our justification,' while preserving
    the causal alternative in a footnote.
- source_word: δικαίωσιν
  chosen: justification
  alternatives:
  - acquittal
  - vindication
  lexicon: BDAG
  rationale: '''Justification'' is the most precise Pauline rendering in English here,
    even if less conversational, because it preserves the legal-soteriological force
    of δικαίωσις.'
