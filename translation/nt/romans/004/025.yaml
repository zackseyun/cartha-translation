theological_decisions:
- issue: Whether διὰ τὴν δικαίωσιν ἡμῶν means purpose/result ('for our justification')
    or cause ('because of our justification').
  chosen_reading: for our justification
  alternative_readings:
  - because of our justification
  rationale: The verse pairs Messiah's being handed over with his being raised in
    relation to the believers' salvation. Rendering the second phrase prospectively
    preserves the common Pauline sense that the resurrection is bound up with the
    securing and manifestation of believers' justification, while the causal reading
    remains grammatically possible and should be preserved in a footnote.
