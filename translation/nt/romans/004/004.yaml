theological_decisions:
- issue: Rendering χάρις in a labor-payment contrast
  chosen_reading: Translate κατὰ χάριν as 'as a gift' rather than 'according to grace.'
  alternative_readings:
  - as grace
  - according to grace
  rationale: The verse contrasts earned payment with unearned favor. 'As a gift' preserves
    Paul's point in clear English while avoiding unnecessary abstraction. This is
    a contextual rendering of χάρις, not a denial of its broader theological sense
    as grace.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense in readable modern English.'
