id: ROM.4.4
reference: Romans 4:4
source:
  edition: SBLGNT
  text: τῷ δὲ ἐργαζομένῳ ὁ μισθὸς οὐ λογίζεται κατὰ χάριν ἀλλὰ κατὰ ὀφείλημα·
translation:
  text: Now to the one who works, the wages are not credited as a gift, but as an
    obligation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not counted according to grace.'
    reason: lexical_alternative
  - marker: b
    text: Or 'but according to debt' or 'as what is owed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐργαζομένῳ
  chosen: the one who works
  alternatives:
  - the worker
  - the one who is working
  lexicon: BDAG
  rationale: The present participle with article is substantival, referring generally
    to a person characterized by working. 'The one who works' is natural English and
    preserves the generic force.
- source_word: μισθὸς
  chosen: wages
  alternatives:
  - pay
  - reward
  lexicon: BDAG
  rationale: In this labor-payment context, 'wages' best captures earned compensation
    more precisely than the broader 'reward'.
- source_word: λογίζεται
  chosen: are credited
  alternatives:
  - is reckoned
  - is counted
  - is credited
  lexicon: BDAG
  rationale: In Paul's accounting language, λογίζομαι commonly carries the sense of
    crediting or reckoning to an account. 'Are credited' communicates the financial
    metaphor clearly in modern English.
- source_word: κατὰ χάριν
  chosen: as a gift
  alternatives:
  - according to grace
  - as grace
  lexicon: BDAG
  rationale: Although χάρις is often rendered 'grace,' in this contrast with earned
    wages Paul is emphasizing unearned favor or gift-status. 'As a gift' makes the
    sense explicit in contemporary English without importing extra theology.
- source_word: ὀφείλημα
  chosen: obligation
  alternatives:
  - debt
  - what is owed
  lexicon: BDAG
  rationale: The term denotes something owed. 'Obligation' fits the idiom 'credited
    ... as an obligation' and preserves the employer-debt contrast with gift. 'Debt'
    is possible but slightly less smooth in this construction.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a transition or contrast with the preceding argument. 'Now'
    gives a clear discourse transition in English without overstating adversative
    force.
