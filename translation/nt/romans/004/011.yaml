id: ROM.4.11
reference: Romans 4:11
source:
  edition: SBLGNT
  text: καὶ σημεῖον ἔλαβεν περιτομῆς, σφραγῖδα τῆς δικαιοσύνης τῆς πίστεως τῆς ἐν
    τῇ ἀκροβυστίᾳ, εἰς τὸ εἶναι αὐτὸν πατέρα πάντων τῶν πιστευόντων δι’ ἀκροβυστίας,
    εἰς τὸ ⸀λογισθῆναι αὐτοῖς τὴν δικαιοσύνην,
translation:
  text: And he received the sign of circumcision as a seal of the righteousness of
    the faith that he had while uncircumcised, so that he might be the father of all
    who believe while uncircumcised, so that righteousness might be counted to them
    also,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "justice" for "righteousness" (δικαιοσύνη) here and later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Literally "in uncircumcision"; that is, while he was uncircumcised.
    reason: lexical_alternative
  - marker: c
    text: Or "credited" or "reckoned" to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - mark
  - token
  lexicon: BDAG
  rationale: '"Sign" is the most natural and transparent rendering in this covenantal
    context, preserving the idea of circumcision as an outward indicator rather than
    paraphrasing it more interpretively.'
- source_word: περιτομή
  chosen: circumcision
  lexicon: BDAG
  rationale: Standard and precise rendering for the rite in Pauline argumentation.
- source_word: σφραγίς
  chosen: seal
  alternatives:
  - confirmation
  - certification
  lexicon: BDAG
  rationale: '"Seal" best preserves the metaphor of authentication/attestation tied
    to the sign of circumcision without flattening the imagery.'
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults for Pauline usage, "righteousness" is retained
    in the main text; "justice" is preserved in a footnote as a meaningful alternative.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, "faith" is the main-text rendering. Here the genitival
    chain points to the righteousness associated with faith, not chiefly to faithfulness
    as the foregrounded sense.
- source_word: ἐν τῇ ἀκροβυστίᾳ
  chosen: while uncircumcised
  alternatives:
  - in uncircumcision
  lexicon: BDAG
  rationale: This expresses Abraham's state when that faith was present. "While uncircumcised"
    is clearer modern English than the more wooden "in uncircumcision," while preserving
    the temporal-state sense.
- source_word: πατέρα πάντων τῶν πιστευόντων
  chosen: the father of all who believe
  alternatives:
  - father of all the believing ones
  lexicon: BDAG
  rationale: Idiomatic English that preserves Paul's representative-language argument
    without unnecessary literal awkwardness.
- source_word: δι’ ἀκροβυστίας
  chosen: while uncircumcised
  alternatives:
  - through uncircumcision
  - in uncircumcision
  lexicon: BDAG
  rationale: In this context διά with the genitive refers to the condition in which
    these people believe, not instrumentality. "While uncircumcised" best communicates
    that force in natural English.
- source_word: λογίζομαι
  chosen: counted
  alternatives:
  - credited
  - reckoned
  lexicon: BDAG
  rationale: '"Counted" is clear, modern, and faithful to Paul''s accounting/imputation
    language. "Credited" and "reckoned" remain viable alternatives, but "counted"
    is less jargon-heavy.'
- source_word: καί
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: The final καί is represented by "also" to make explicit that righteousness
    is counted to uncircumcised believers as well, matching Paul's inclusion argument.
