theological_decisions:
- issue: Relation of circumcision to righteousness
  chosen_reading: Circumcision is rendered as a sign and seal of righteousness received
    by faith, not as the means of obtaining that righteousness.
  alternative_readings:
  - A rendering could be phrased in a way that sounds as though circumcision conveys
    righteousness.
  rationale: The Greek presents circumcision as subsequent attestation of righteousness
    already associated with faith in uncircumcision. The translation preserves Paul's
    sequence and theological tension without importing later sacramental formulations.
