theological_decisions:
- issue: Relation between 'lawless deeds' and 'sins'
  chosen_reading: Render both terms distinctly in English
  alternative_readings:
  - Translate both with the same generic term such as 'sins'
  rationale: Paul preserves the poetic parallelism of the Psalm while using two related
    but non-identical terms. Keeping both distinct reflects the source text without
    importing a sharper theological distinction than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
