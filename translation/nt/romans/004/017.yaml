id: ROM.4.17
reference: Romans 4:17
source:
  edition: SBLGNT
  text: καθὼς γέγραπται ὅτι Πατέρα πολλῶν ἐθνῶν τέθεικά σε), κατέναντι οὗ ἐπίστευσεν
    θεοῦ τοῦ ζῳοποιοῦντος τοὺς νεκροὺς καὶ καλοῦντος τὰ μὴ ὄντα ὡς ὄντα·
translation:
  text: as it is written, "I have made you the father of many nations"—in the presence
    of the God in whom he believed, who gives life to the dead and calls the things
    that are not as though they were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, "calls into existence the things that do not exist."
    reason: alternative_reading
  - marker: b
    text: '"Nations" here may also be understood as "Gentiles," but in this Genesis
      quotation the broader sense is more likely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it is written
  lexicon: BDAG
  rationale: Standard scriptural citation formula; the concise English preserves the
    written-and-standing force of the perfect passive.
- source_word: Πατέρα πολλῶν ἐθνῶν
  chosen: the father of many nations
  alternatives:
  - a father of many nations
  - the father of many Gentiles
  lexicon: BDAG
  rationale: With the Genesis quotation in view, the articular phrase is best carried
    over as 'the father.' ἐθνῶν here refers broadly to nations/peoples, not specifically
    Gentiles as contrasted with Jews.
- source_word: τέθεικά σε
  chosen: I have made you
  alternatives:
  - I have appointed you
  lexicon: BDAG
  rationale: The perfect is naturally rendered 'have made,' matching the cited promise
    and its enduring validity.
- source_word: κατέναντι
  chosen: in the presence of
  alternatives:
  - before
  - in the sight of
  lexicon: BDAG
  rationale: This keeps the relational/spatial sense without sounding wooden; it fits
    the following genitive construction well in English.
- source_word: οὗ ἐπίστευσεν
  chosen: in whom he believed
  alternatives:
  - whom he believed
  lexicon: BDAG
  rationale: English idiom normally requires 'believe in' for personal trust. This
    makes the sense clear while preserving Abraham's faith directed toward God.
- source_word: ζῳοποιοῦντος τοὺς νεκρούς
  chosen: who gives life to the dead
  alternatives:
  - who makes the dead alive
  - who brings the dead to life
  lexicon: BDAG
  rationale: '''Gives life'' is natural modern English and preserves the participle''s
    portrayal of God as the one characterized by life-giving power.'
- source_word: καλοῦντος
  chosen: calls
  alternatives:
  - summons
  - calls into being
  lexicon: BDAG
  rationale: The more basic 'calls' is retained in the main text because the direct
    object and comparison phrase carry the difficult nuance; a more interpretive expansion
    is preserved in a footnote.
- source_word: τὰ μὴ ὄντα ὡς ὄντα
  chosen: the things that are not as though they were
  alternatives:
  - the things that do not exist as though they exist
  - into existence the things that do not exist
  lexicon: BDAG
  rationale: This rendering stays close to the Greek wording and preserves interpretive
    openness. It avoids prematurely resolving the phrase into explicit creation-from-nothing
    language in the main text.
