theological_decisions:
- issue: Whether Paul's final clause should be rendered as a straightforward statement
    of creation ex nihilo or left broader and more text-near.
  chosen_reading: calls the things that are not as though they were
  alternative_readings:
  - calls into existence the things that do not exist
  rationale: The Greek can support the theological implication of divine creative
    power, but the wording itself is more compressed and idiomatic. The main text
    preserves that tension; the more explicit interpretive expansion is noted in a
    footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
