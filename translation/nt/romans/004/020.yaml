id: ROM.4.20
reference: Romans 4:20
source:
  edition: SBLGNT
  text: εἰς δὲ τὴν ἐπαγγελίαν τοῦ θεοῦ οὐ διεκρίθη τῇ ἀπιστίᾳ ἀλλὰ ἐνεδυναμώθη τῇ
    πίστει, δοὺς δόξαν τῷ θεῷ
translation:
  text: Yet regarding the promise of God, he did not waver in unbelief, but was strengthened
    in faith, giving glory to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "did not doubt through unbelief."
    reason: lexical_alternative
  - marker: b
    text: Or "was strengthened by faith."
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς δὲ
  chosen: Yet regarding
  alternatives:
  - But with respect to
  - And concerning
  lexicon: BDAG
  rationale: Here εἰς with the accusative has a referential sense ('with respect to/regarding'),
    not motion. δέ marks mild contrast or continuation; 'Yet' preserves that flow
    into the contrast with the previous verse.
- source_word: ἐπαγγελίαν
  chosen: promise
  alternatives:
  - promised thing
  lexicon: BDAG
  rationale: The noun refers to God's promise to Abraham, and 'promise' is the natural,
    precise English equivalent in this Pauline context.
- source_word: διεκρίθη
  chosen: did not waver
  alternatives:
  - did not doubt
  - did not hesitate
  lexicon: BDAG
  rationale: In context διακρίνω conveys inner wavering or divided hesitation rather
    than abstract intellectual inquiry. 'Did not waver' best fits the contrast with
    being strengthened in faith.
- source_word: τῇ ἀπιστίᾳ
  chosen: in unbelief
  alternatives:
  - through unbelief
  - by unbelief
  lexicon: BDAG
  rationale: 'The dative is rendered idiomatically as a sphere or attendant manner:
    Abraham did not waver ''in unbelief.'' This preserves the close contrast with
    ''in faith'' later in the verse.'
- source_word: ἐνεδυναμώθη
  chosen: was strengthened
  alternatives:
  - was empowered
  - grew strong
  lexicon: BDAG
  rationale: The passive form is best represented by 'was strengthened.' It preserves
    the verbal contrast with his not wavering and avoids overstating the mechanism
    beyond the text.
- source_word: τῇ πίστει
  chosen: in faith
  alternatives:
  - by faith
  lexicon: BDAG
  rationale: πίστις is rendered by the project's default 'faith.' The dative is expressed
    as 'in faith' to match the antithetical parallel with 'in unbelief' and to preserve
    Paul's contrast.
- source_word: δοὺς δόξαν τῷ θεῷ
  chosen: giving glory to God
  alternatives:
  - and gave glory to God
  lexicon: BDAG
  rationale: The aorist participle is translated with an English participial construction
    to preserve the Greek flow and show the action accompanying his strengthening
    in faith.
