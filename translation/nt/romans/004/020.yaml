theological_decisions:
- issue: Whether Abraham's response should be rendered as simple cognitive 'doubt'
    or as broader covenantal wavering
  chosen_reading: did not waver in unbelief
  alternative_readings:
  - did not doubt through unbelief
  rationale: The broader language of wavering better reflects διακρίνω in context
    and preserves the rhetorical contrast with being strengthened in faith, without
    reducing the verse to merely intellectual uncertainty.
  doctrine_reference: Preserve theological tension rather than resolve it.
