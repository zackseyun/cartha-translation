id: ROM.4.18
reference: Romans 4:18
source:
  edition: SBLGNT
  text: ὃς παρ’ ἐλπίδα ἐπ’ ἐλπίδι ἐπίστευσεν εἰς τὸ γενέσθαι αὐτὸν πατέρα πολλῶν ἐθνῶν
    κατὰ τὸ εἰρημένον· Οὕτως ἔσται τὸ σπέρμα σου·
translation:
  text: 'who, against hope, believed in hope, so that he might become the father of
    many nations, according to what had been spoken: “So shall your offspring be.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “beyond hope” or “contrary to hope.”
    reason: lexical_alternative
  - marker: b
    text: Or “your seed,” preserving the singular collective image of the Greek.
    reason: lexical_alternative
  - marker: c
    text: Quoted from Genesis 15:5; compare Genesis 17:5.
    reason: cross_reference
lexical_decisions:
- source_word: παρ’ ἐλπίδα
  chosen: against hope
  alternatives:
  - beyond hope
  - contrary to hope
  lexicon: BDAG
  rationale: The preposition παρά with the accusative here conveys a sense of going
    beyond or contrary to normal expectation. “Against hope” preserves the paradoxical
    force in concise English and fits established idiom without overstating the phrase.
- source_word: ἐπ’ ἐλπίδι
  chosen: in hope
  alternatives:
  - upon hope
  - with hope
  lexicon: BDAG
  rationale: The phrase balances the prior expression and indicates the sphere or
    basis in which Abraham believed. “In hope” is natural English and preserves the
    rhetorical contrast with “against hope.”
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - had faith
  - trusted
  lexicon: BDAG
  rationale: The aorist verb from πιστεύω is best rendered “believed.” This keeps
    verbal correspondence with Pauline usage and aligns with the doctrine default
    for πίστις/πιστεύω language without importing interpretive expansion.
- source_word: εἰς τὸ γενέσθαι αὐτὸν
  chosen: so that he might become
  alternatives:
  - with the result that he became
  - for him to become
  lexicon: BDAG
  rationale: The εἰς τό + infinitive construction expresses purpose or result. “So
    that he might become” captures the prospective force in smooth English while preserving
    the connection to Abraham’s believing and the promised outcome.
- source_word: πατέρα πολλῶν ἐθνῶν
  chosen: the father of many nations
  alternatives:
  - a father of many nations
  lexicon: BDAG
  rationale: Although Greek lacks the article here, English idiom favors “the father”
    because this is a defined covenant role tied to the cited promise. “Nations” is
    preferred over “Gentiles” because ἔθνη here refers to peoples descended from or
    included in the promise, echoing Genesis language rather than contrasting Jews
    and non-Jews directly.
- source_word: κατὰ τὸ εἰρημένον
  chosen: according to what had been spoken
  alternatives:
  - according to what was said
  - as it had been said
  lexicon: BDAG
  rationale: The perfect passive participle emphasizes a prior utterance with continuing
    validity. “What had been spoken” preserves the solemn, scriptural tone and avoids
    an overly casual rendering.
- source_word: Οὕτως ἔσται
  chosen: So shall ... be
  alternatives:
  - Thus will ... be
  - So will ... be
  lexicon: BDAG
  rationale: This clause quotes Scripture in elevated diction. “So shall ... be” preserves
    the formal scriptural cadence appropriate to the citation without becoming archaic
    overall.
- source_word: τὸ σπέρμα σου
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: BDAG
  rationale: '“Offspring” is the best optimal-equivalence rendering of σπέρμα here:
    it preserves the singular collective sense better than “descendants” and is more
    natural for modern readers than the more literal “seed.”'
