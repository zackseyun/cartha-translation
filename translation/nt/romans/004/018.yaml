theological_decisions:
- issue: Reference of many nations in Abrahamic promise
  chosen_reading: Rendered ἐθνῶν as “nations” rather than “Gentiles.”
  alternative_readings:
  - Gentiles
  - peoples
  rationale: In Romans 4:18 Paul is citing the Abraham promise from Genesis, where
    the covenantal scope concerns many nations arising from Abraham. “Gentiles” would
    import Paul's later Jew-Gentile contrast too directly into this clause and narrow
    the allusive OT frame.
