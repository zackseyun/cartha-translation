id: ROM.4.21
reference: Romans 4:21
source:
  edition: SBLGNT
  text: καὶ πληροφορηθεὶς ὅτι ὃ ἐπήγγελται δυνατός ἐστιν καὶ ποιῆσαι.
translation:
  text: and being fully convinced that he was able also to do what he had promised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being fully assured' or 'being fully persuaded.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'is able'; rendered 'was able' for natural English in the past narrative
      context.
    reason: lexical_alternative
  - marker: c
    text: The implicit 'he' refers to God from the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: πληροφορηθεὶς
  chosen: being fully convinced
  alternatives:
  - being fully assured
  - being fully persuaded
  lexicon: BDAG
  rationale: The participle denotes a state of complete certainty. 'Fully convinced'
    is natural modern English and preserves the strength of the Greek without sounding
    archaic.
- source_word: ὅτι
  chosen: that
  rationale: Introduces the content of Abraham's conviction in a straightforward way.
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: The relative pronoun is best rendered idiomatically in English as 'what'
    in the construction 'what he had promised.'
- source_word: ἐπήγγελται
  chosen: had promised
  alternatives:
  - has promised
  - promised
  lexicon: BDAG
  rationale: The Greek perfect highlights a completed promise with continuing force.
    'Had promised' fits the narrative flow in English while preserving prior completed
    action.
- source_word: δυνατός ἐστιν
  chosen: was able
  alternatives:
  - is able
  lexicon: BDAG
  rationale: Although the Greek present is 'is able,' English style in this past-oriented
    narrative reads more naturally as 'was able.' This preserves the sense without
    woodenly reproducing the tense.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: 'Here καί intensifies the statement: God was not only the one who promised
    but also able to perform. ''Also'' is the clearest natural rendering.'
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to accomplish
  - to carry out
  lexicon: BDAG
  rationale: ποιέω is broad and simple here. 'To do' keeps the wording close to the
    Greek; more specific renderings like 'accomplish' are interpretive.
