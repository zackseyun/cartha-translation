id: ROM.4.23
reference: Romans 4:23
source:
  edition: SBLGNT
  text: Οὐκ ἐγράφη δὲ δι’ αὐτὸν μόνον ὅτι ἐλογίσθη αὐτῷ,
translation:
  text: Now it was not written for his sake alone that it was credited to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counted' or 'reckoned' to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγράφη
  chosen: was written
  alternatives:
  - was recorded
  lexicon: BDAG
  rationale: A straightforward passive rendering preserves the formal link to Scripture
    as written text without sounding stiff.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - and
  lexicon: BDAG
  rationale: Here δέ marks a transition in Paul’s argument more than a sharp contrast;
    'Now' communicates discourse movement naturally in English.
- source_word: δι’ αὐτὸν μόνον
  chosen: for his sake alone
  alternatives:
  - for him alone
  - because of him alone
  lexicon: BDAG
  rationale: This captures διά with accusative in an idiomatic explanatory sense and
    preserves Paul's emphasis that the statement was not written only with Abraham
    in view.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  - quotation marker left implicit
  lexicon: BDAG
  rationale: The conjunction introduces the content of what was written; 'that' is
    the most direct and natural English equivalent.
- source_word: ἐλογίσθη
  chosen: was credited
  alternatives:
  - was counted
  - was reckoned
  lexicon: BDAG
  rationale: λογίζομαι in Romans 4 carries accounting/imputation force. 'Credited'
    is clear modern English and preserves Paul's forensic/accounting sense.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: BDAG
  rationale: The dative is best represented as 'to him' in English, matching the passive
    verb 'was credited.'
