theological_decisions:
- issue: Rendering λογίζομαι in a Pauline justification context
  chosen_reading: credited
  alternative_readings:
  - counted
  - reckoned
  rationale: The verse participates in Paul's broader argument about righteousness
    being reckoned to Abraham. 'Credited' preserves that imputation/accounting sense
    in contemporary English without adding doctrinal content beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
