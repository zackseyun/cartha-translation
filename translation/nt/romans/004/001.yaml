id: ROM.4.1
reference: Romans 4:1
source:
  edition: SBLGNT
  text: Τί οὖν ἐροῦμεν ⸀εὑρηκέναι Ἀβραὰμ τὸν ⸀προπάτορα ⸀ἡμῶν κατὰ σάρκα;
translation:
  text: What then shall we say that Abraham, our forefather according to the flesh,
    has found?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “our physical ancestor.”
    reason: lexical_alternative
  - marker: b
    text: Some take “according to the flesh” with “has found,” i.e., what Abraham
      found by human means or from a merely human standpoint.
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  chosen: What then shall we say
  alternatives:
  - What then are we to say
  - What then shall we say?
  lexicon: BDAG
  entry: λέγω
  rationale: Preserves Paul's rhetorical transition and forward-looking deliberative
    force without sounding archaic beyond standard biblical English.
- source_word: εὑρηκέναι
  chosen: has found
  alternatives:
  - has discovered
  - found
  lexicon: BDAG
  entry: εὑρίσκω
  rationale: The perfect infinitive is well represented by 'has found,' expressing
    a result arrived at by Abraham. 'Discovered' is possible but slightly more interpretive.
- source_word: προπάτορα
  chosen: forefather
  alternatives:
  - ancestor
  - father
  lexicon: BDAG
  entry: προπάτωρ
  rationale: '''Forefather'' best captures the masculine singular and ancestral sense
    in context. ''Ancestor'' is possible, but ''forefather'' more closely reflects
    the gendered Greek and Paul''s appeal to Abraham as Israel''s patriarch.'
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - '-'
  lexicon: BDAG
  entry: ἐγώ
  rationale: Retained explicitly to preserve Paul's shared identification with Abraham
    in the argument.
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - by human descent
  - as regards physical ancestry
  lexicon: BDAG
  entry: σάρξ
  rationale: Here σάρξ refers to physical lineage rather than sinful nature. The more
    literal Pauline phrase is preserved in the main text, while a more idiomatic alternative
    is suitable for a footnote.
