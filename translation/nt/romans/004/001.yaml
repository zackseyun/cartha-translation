theological_decisions:
- issue: Scope of κατὰ σάρκα
  chosen_reading: It modifies Abraham as 'our forefather according to the flesh,'
    referring to physical descent/ancestry.
  alternative_readings:
  - It modifies 'has found,' yielding something like 'what Abraham found according
    to the flesh' or 'by human means'.
  rationale: The appositional flow with 'Abraham, our forefather' naturally takes
    the phrase as qualifying Abraham's ancestral relation to Paul's interlocutors.
    This also fits Paul's broader argument about Jewish identity and descent in Romans.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    genuine ambiguity.
