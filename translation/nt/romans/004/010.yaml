id: ROM.4.10
reference: Romans 4:10
source:
  edition: SBLGNT
  text: πῶς οὖν ἐλογίσθη; ἐν περιτομῇ ὄντι ἢ ἐν ἀκροβυστίᾳ; οὐκ ἐν περιτομῇ ἀλλ’ ἐν
    ἀκροβυστίᾳ·
translation:
  text: How then was it counted? While he was circumcised, or uncircumcised? Not while
    circumcised, but while uncircumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "credited" or "reckoned" for "counted."
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - In what way
  lexicon: BDAG
  rationale: Standard interrogative adverb; 'How' is natural English and preserves
    Paul's question about the manner or circumstance of the reckoning.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Carries inferential or resumptive force in Paul's argument. 'Then' fits
    the flow of the rhetorical question in clear modern English.
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was credited
  - was reckoned
  lexicon: BDAG
  rationale: Passive of λογίζομαι in Romans 4 refers to something being counted to
    Abraham. 'Was counted' is transparent and consistent with the surrounding argument,
    while avoiding overly financial language in the main text.
- source_word: ἐν περιτομῇ ὄντι
  chosen: while he was circumcised
  alternatives:
  - when he was in circumcision
  - being in circumcision
  lexicon: BDAG
  rationale: 'The Greek uses the noun ''circumcision'' with a participle, but idiomatic
    English expresses the state adjectivally: ''while he was circumcised.'' This preserves
    the temporal sense without wooden phrasing.'
- source_word: ἀκροβυστίᾳ
  chosen: uncircumcised
  alternatives:
  - in uncircumcision
  - foreskinned
  lexicon: BDAG
  rationale: In this context the noun denotes the state of being uncircumcised. Rendering
    it adjectivally in English matches the contrast with 'circumcised' and keeps the
    rhetoric clear.
- source_word: οὐκ ... ἀλλ’
  chosen: Not ... but ...
  alternatives:
  - not ... rather ...
  lexicon: BDAG
  rationale: This is the standard Greek contrastive construction. 'Not ... but ...'
    preserves Paul's emphatic correction cleanly in English.
