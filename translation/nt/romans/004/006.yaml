theological_decisions:
- issue: Representative masculine language in ἀνθρώπου
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The singular masculine form is retained in line with the project's gender-accurate
    policy, while the sense is representative rather than restricted to males.
  doctrine_reference: Translation philosophy §4
- issue: Pauline δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table sets 'righteousness' as the default for δικαιοσύνη,
    with 'justice' preserved in a footnote for Pauline passages to retain the semantic
    range without flattening the theological idiom.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
