id: ROM.4.6
reference: Romans 4:6
source:
  edition: SBLGNT
  text: καθάπερ καὶ Δαυὶδ λέγει τὸν μακαρισμὸν τοῦ ἀνθρώπου ᾧ ὁ θεὸς λογίζεται δικαιοσύνην
    χωρὶς ἔργων·
translation:
  text: 'Just as David also speaks of the blessedness of the man to whom God credits
    righteousness apart from works:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the person"; Greek "the man," used here in a representative sense.
    reason: lexical_alternative
  - marker: b
    text: Or "counts" or "reckons" righteousness.
    reason: lexical_alternative
  - marker: c
    text: Or "justice" for "righteousness."
    reason: alternative_reading
lexical_decisions:
- source_word: καθάπερ
  chosen: Just as
  alternatives:
  - just as indeed
  - even as
  lexicon: BDAG
  rationale: Introduces a comparison with the preceding argument; 'Just as' is natural
    and sufficiently formal.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Here καί adds David as an additional witness, so 'also' best conveys
    the additive force.
- source_word: λέγει
  chosen: speaks
  alternatives:
  - says
  lexicon: BDAG
  rationale: Present tense in citation formula is well represented by English present;
    'speaks' fits the object 'of the blessedness' more idiomatically than 'says'.
- source_word: μακαρισμός
  chosen: blessedness
  alternatives:
  - blessing
  - blessed state
  lexicon: BDAG
  rationale: The noun denotes the state or declaration of being blessed; 'blessedness'
    preserves that abstract sense better than 'blessing'.
- source_word: ἀνθρώπου
  chosen: the man
  alternatives:
  - the person
  - the human being
  lexicon: BDAG
  rationale: The Greek is singular masculine with representative force. Per doctrine,
    gender-accurate wording is preferred when it matches the source's intent.
- source_word: λογίζεται
  chosen: credits
  alternatives:
  - counts
  - reckons
  - imputes
  lexicon: BDAG
  rationale: In this accounting metaphor, 'credits' is clear modern English and preserves
    the forensic sense without relying on heavier theological jargon.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: For Pauline usage, the doctrine table gives 'righteousness' as the default
    rendering, while preserving 'justice' as an alternative in a footnote.
- source_word: χωρὶς ἔργων
  chosen: apart from works
  alternatives:
  - without works
  lexicon: BDAG
  rationale: This phrase contrasts divine reckoning with works as a basis; 'apart
    from works' is idiomatic and preserves Paul's theological contrast.
