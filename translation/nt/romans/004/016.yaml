id: ROM.4.16
reference: Romans 4:16
source:
  edition: SBLGNT
  text: Διὰ τοῦτο ἐκ πίστεως, ἵνα κατὰ χάριν, εἰς τὸ εἶναι βεβαίαν τὴν ἐπαγγελίαν
    παντὶ τῷ σπέρματι, οὐ τῷ ἐκ τοῦ νόμου μόνον ἀλλὰ καὶ τῷ ἐκ πίστεως Ἀβραάμ (ὅς
    ἐστιν πατὴρ πάντων ἡμῶν,
translation:
  text: For this reason it is by faith, so that it may be according to grace, in order
    that the promise may be certain to all the offspring—not only to those from the
    law, but also to those who share the faith of Abraham, who is the father of us
    all,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'seed'; here used collectively for Abraham's offspring or descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'not only to the one from the law, but also to the one from the faith
      of Abraham.'
    reason: alternative_reading
  - marker: c
    text: '''Faith'' could also be understood as ''trust''; ''faithfulness'' is less
      likely in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: This preserves the inferential force of the phrase while sounding natural
    in modern English.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - on the basis of faith
  lexicon: BDAG
  rationale: The phrase indicates basis or means. 'By faith' is idiomatic English
    and preserves Paul's emphasis on faith as the means rather than law.
- source_word: ἵνα κατὰ χάριν
  chosen: so that it may be according to grace
  alternatives:
  - so that it may rest on grace
  - so that it may be in accordance with grace
  lexicon: BDAG
  rationale: This keeps the purpose clause explicit and preserves the relation between
    faith and grace without adding interpretive language beyond the Greek.
- source_word: βεβαίαν
  chosen: certain
  alternatives:
  - sure
  - secure
  lexicon: BDAG
  rationale: '''Certain'' gives clear modern English for the promise''s reliability.
    ''Sure'' was also viable, but ''certain'' reads slightly more naturally here.'
- source_word: ἐπαγγελίαν
  chosen: promise
  alternatives: []
  lexicon: BDAG
  rationale: Standard and natural rendering for Paul's covenantal language.
- source_word: σπέρματι
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: Although literally 'seed,' the sense here is collective. 'Offspring'
    communicates that collective meaning in readable modern English while avoiding
    overly biological wording.
- source_word: οὐ τῷ ἐκ τοῦ νόμου μόνον
  chosen: not only to those from the law
  alternatives:
  - not only to the one from the law
  - not only to those of the law
  lexicon: BDAG
  rationale: The Greek singular is collective in sense. English plural better communicates
    the referent naturally without changing the meaning.
- source_word: τῷ ἐκ πίστεως Ἀβραάμ
  chosen: to those who share the faith of Abraham
  alternatives:
  - to the one from the faith of Abraham
  - to those of Abraham's faith
  lexicon: BDAG
  rationale: The Greek is compressed and somewhat awkward if translated mechanically.
    This rendering makes the relationship clear in natural English while preserving
    πίστις as 'faith' and Abraham as the model of that faith.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Following the project's default rendering for πίστις, 'faith' fits Paul's
    argument here better than 'faithfulness.' 'Trust' is possible but less consistent
    with the surrounding discourse.
- source_word: πατὴρ πάντων ἡμῶν
  chosen: the father of us all
  alternatives:
  - father of all of us
  lexicon: BDAG
  rationale: This closely follows the Greek and preserves the familial-covenantal
    wording with natural English rhythm.
