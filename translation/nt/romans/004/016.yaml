theological_decisions:
- issue: Whether to render τῷ ἐκ πίστεως Ἀβραάμ in a highly literal but awkward form
    or in clearer English.
  chosen_reading: to those who share the faith of Abraham
  alternative_readings:
  - to the one from the faith of Abraham
  - to those of Abraham's faith
  rationale: The clause refers to people characterized by the same faith Abraham had,
    not to Abraham alone. The chosen wording preserves that theological sense without
    over-paraphrasing.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
