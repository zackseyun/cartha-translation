theological_decisions:
- issue: Whether the condition should be phrased as a real or merely hypothetical
    case
  chosen_reading: Rendered straightforwardly as 'For if Abraham was justified by works'
    without adding interpretive qualifiers.
  alternative_readings:
  - For if Abraham was in fact justified by works
  - If Abraham had been justified by works
  rationale: The Greek conditional form itself should be translated directly. Paul's
    larger argument rejects justification by works, but the translation should preserve
    the text's argumentative setup rather than importing that conclusion into the
    wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
