id: ROM.4.2
reference: Romans 4:2
source:
  edition: SBLGNT
  text: εἰ γὰρ Ἀβραὰμ ἐξ ἔργων ἐδικαιώθη, ἔχει καύχημα· ἀλλ’ οὐ ⸀πρὸς θεόν,
translation:
  text: For if Abraham was justified by works, he has a boast—but not before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "was declared righteous."'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "he has grounds for boasting."'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For if indeed
  lexicon: BDAG
  rationale: 'Keeps Paul''s argumentative flow: γάρ connects to the prior claim (''for''),
    while εἰ introduces the conditional premise (''if'').'
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Personal names are transliterated by standard English convention.
- source_word: ἐξ ἔργων
  chosen: by works
  alternatives:
  - from works
  - on the basis of works
  lexicon: BDAG
  rationale: Expresses source/ground in idiomatic English. 'By works' is concise and
    natural here, while still conveying works as the basis of justification.
- source_word: ἐδικαιώθη
  chosen: was justified
  alternatives:
  - was declared righteous
  - was acquitted
  lexicon: BDAG
  rationale: '''Was justified'' is the standard Pauline rendering and fits the passive
    aorist well. ''Declared righteous'' is a valid explanatory alternative, preserved
    in a footnote.'
- source_word: ἔχει καύχημα
  chosen: he has a boast
  alternatives:
  - he has grounds for boasting
  - he has something to boast about
  lexicon: BDAG
  rationale: This keeps the nominal force of καύχημα ('boast' / 'grounds for boasting')
    while remaining readable. It is slightly more formal than the expanded alternatives
    and matches Paul's compact style.
- source_word: ἀλλ’ οὐ πρὸς θεόν
  chosen: but not before God
  alternatives:
  - but not with respect to God
  - but not in God's sight
  lexicon: BDAG
  rationale: '''Before God'' is natural English for πρὸς θεόν in this context and
    preserves the contrast between human boasting and divine evaluation.'
