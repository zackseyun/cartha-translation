id: ROM.4.12
reference: Romans 4:12
source:
  edition: SBLGNT
  text: καὶ πατέρα περιτομῆς τοῖς οὐκ ἐκ περιτομῆς μόνον ἀλλὰ καὶ τοῖς στοιχοῦσιν τοῖς ἴχνεσιν τῆς ⸂ἐν ἀκροβυστίᾳ πίστεως⸃ τοῦ πατρὸς ἡμῶν Ἀβραάμ.
translation:
  text: and the father of circumcision to those who are not merely circumcised, but who also walk in the footsteps of the faith that our father Abraham had while uncircumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the father of circumcision.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'not of circumcision only.'
    reason: lexical_alternative
  - marker: c
    text: Or 'follow in the footsteps of the faith.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the father of the circumcised to those who are not merely circumcised'.
    reason: previous_rendering
lexical_decisions:
- source_word: πατέρα περιτομῆς
  chosen: the father of the circumcised
  alternatives:
  - the father of circumcision
  lexicon: BDAG
  rationale: A literal rendering ('father of circumcision') is understandable but less natural in English and risks sounding abstract. In context Paul means Abraham as father of the circumcised community, not of the ritual itself.
- source_word: οὐκ ἐκ περιτομῆς μόνον
  chosen: not merely circumcised
  alternatives:
  - not only from circumcision
  - not merely of the circumcision
  lexicon: BDAG
  rationale: The phrase is literally 'not from circumcision only,' but idiomatic English expresses the sense as 'not merely circumcised.' This preserves Paul's contrast between outward circumcision alone and circumcision joined with Abraham-like faith.
- source_word: στοιχοῦσιν
  chosen: walk
  alternatives:
  - follow
  - live in step
  lexicon: BDAG
  rationale: '''Walk'' preserves the metaphorical sense of ordered conduct and fits the common biblical idiom without becoming wooden.'
- source_word: τοῖς ἴχνεσιν
  chosen: in the footsteps
  alternatives:
  - in the tracks
  - according to the steps
  lexicon: BDAG
  rationale: The noun refers to footprints or tracks. 'In the footsteps' is the clearest natural English equivalent and preserves the image of patterned imitation.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' Here the genitive refers to Abraham's believing response in context, not chiefly to his reliability, so 'faith' best fits the argument.
- source_word: ἐν ἀκροβυστίᾳ
  chosen: while uncircumcised
  alternatives:
  - in uncircumcision
  lexicon: BDAG
  rationale: The prepositional phrase is rendered temporally and idiomatically in English. Paul refers to the state in which Abraham exercised faith before circumcision.
- source_word: τοῦ πατρὸς ἡμῶν Ἀβραάμ
  chosen: that our father Abraham had
  alternatives:
  - of our father Abraham
  lexicon: BDAG
  rationale: The genitive construction is unpacked for readable English while retaining the communal designation 'our father Abraham,' which is important to Paul's argument.
