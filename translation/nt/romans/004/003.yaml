theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline justification context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default for δικαιοσύνη is 'righteousness,' especially in
    Pauline passages where covenantal and declarative dimensions are central. 'Justice'
    remains a legitimate lexical alternative and is preserved in a footnote rather
    than adopted in the main text.
