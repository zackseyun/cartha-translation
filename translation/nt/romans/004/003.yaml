id: ROM.4.3
reference: Romans 4:3
source:
  edition: SBLGNT
  text: τί γὰρ ἡ γραφὴ λέγει; Ἐπίστευσεν δὲ Ἀβραὰμ τῷ θεῷ καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
translation:
  text: For what does the Scripture say? Abraham believed God, and it was counted
    to him as righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was reckoned to him as righteousness' or 'was credited to him as righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γραφή
  chosen: the Scripture
  alternatives:
  - the writing
  - Scripture
  lexicon: BDAG
  rationale: In Pauline usage, ἡ γραφή commonly refers to the sacred written Scriptures,
    not merely a generic writing. 'The Scripture' is idiomatic and precise in English.
- source_word: Ἐπίστευσεν
  chosen: believed
  alternatives:
  - put faith in
  - trusted
  lexicon: BDAG
  rationale: The aorist of πιστεύω is best rendered here as 'believed.' It is direct,
    natural, and matches the citation's established sense without importing a more
    interpretive expansion.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - in God
  lexicon: BDAG
  rationale: The dative after πιστεύω here is most naturally rendered 'believed God,'
    emphasizing that Abraham believed what God said. 'Believed in God' is possible
    in English tradition but is less exact to this construction in this context.
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was reckoned
  - was credited
  lexicon: BDAG
  rationale: '''Was counted'' preserves the passive force and communicates λογίζομαι
    clearly in contemporary English. ''Reckoned'' is more traditional but less natural;
    ''credited'' is possible but can sound overly financial.'
- source_word: εἰς δικαιοσύνην
  chosen: as righteousness
  alternatives:
  - for righteousness
  - as justice
  lexicon: BDAG
  rationale: '''As righteousness'' is the most natural English rendering of the idiom
    here and matches Pauline usage. Per project guidance, δικαιοσύνη in Pauline passages
    defaults to ''righteousness,'' while ''justice'' is preserved in a footnote as
    a lexical alternative.'
