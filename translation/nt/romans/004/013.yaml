theological_decisions:
- issue: Relation of δικαιοσύνης πίστεως
  chosen_reading: Rendered literally as 'the righteousness of faith' rather than resolving
    it to an explicitly interpretive paraphrase.
  alternative_readings:
  - the righteousness that comes by faith
  - righteousness based on faith
  rationale: Paul contrasts law and faith here. The genitive construction allows several
    close English expansions, but the Greek itself is compressed. Preserving the compact
    form best maintains the theological tension without importing a stronger doctrinal
    formulation than the text itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
