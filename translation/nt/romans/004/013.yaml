id: ROM.4.13
reference: Romans 4:13
source:
  edition: SBLGNT
  text: Οὐ γὰρ διὰ νόμου ἡ ἐπαγγελία τῷ Ἀβραὰμ ἢ τῷ σπέρματι αὐτοῦ, τὸ κληρονόμον
    αὐτὸν ⸀εἶναι κόσμου, ἀλλὰ διὰ δικαιοσύνης πίστεως·
translation:
  text: For the promise to Abraham or to his offspring that he would be heir of the
    world was not through the law, but through the righteousness of faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''seed.'' The Greek is singular but can function collectively: ''offspring''
      or ''descendants.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'through righteousness by faith' or 'through the righteousness that comes
      by faith.'
    reason: alternative_reading
  - marker: c
    text: '''Righteousness'' may also be rendered ''justice'' in Pauline contexts.'
    reason: lexical_alternative
  - marker: d
    text: '''Faith'' may also be rendered ''faithfulness'' or ''trust'' depending
      on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγελία
  chosen: promise
  alternatives:
  - pledge
  lexicon: BDAG
  rationale: The standard Pauline sense is a divine promise. 'Promise' is natural
    modern English and preserves the covenantal force.
- source_word: σπέρματι
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: The noun is singular in Greek but can function collectively. 'Offspring'
    preserves that collective-singular force in readable English better than 'descendants,'
    while avoiding overly wooden phrasing.
- source_word: κληρονόμον ... κόσμου
  chosen: heir of the world
  alternatives:
  - inheritor of the world
  lexicon: BDAG
  rationale: This keeps Paul's inheritance language explicit and preserves the broad
    scope of κόσμος without narrowing it.
- source_word: διὰ νόμου
  chosen: through the law
  alternatives:
  - through law
  - by means of the law
  lexicon: BDAG
  rationale: Although νόμου is anarthrous, in Pauline argument the reference is naturally
    heard as the law, especially the Mosaic law. 'Through the law' is idiomatic and
    clear.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine, δικαιοσύνη defaults to 'righteousness.' In Paul this term
    often carries covenantal and forensic weight that 'justice' alone may underspecify,
    though the alternative should be preserved in a footnote.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' Here the phrase most naturally
    refers to righteousness associated with faith rather than law, though 'faithfulness'
    remains a possible lexical alternative and is preserved in a footnote.
- source_word: διὰ δικαιοσύνης πίστεως
  chosen: through the righteousness of faith
  alternatives:
  - through the righteousness that comes by faith
  - through righteousness by faith
  lexicon: BDAG
  rationale: The Greek is compact and genitival. 'Righteousness of faith' preserves
    the form of the source without over-interpreting the precise relation, while remaining
    understandable in English.
