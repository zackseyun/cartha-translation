theological_decisions:
- issue: Scope of νόμος in Paul's argument
  chosen_reading: law
  alternative_readings:
  - the Law
  rationale: The verse states a principle tied to Paul's broader argument about commandment
    and violation. Using 'law' preserves that principle without prematurely restricting
    the statement to the Mosaic Law alone, though that background remains relevant.
