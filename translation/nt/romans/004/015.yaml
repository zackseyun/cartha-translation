id: ROM.4.15
reference: Romans 4:15
source:
  edition: SBLGNT
  text: ὁ γὰρ νόμος ὀργὴν κατεργάζεται, οὗ ⸀δὲ οὐκ ἔστιν νόμος, οὐδὲ παράβασις.
translation:
  text: For the law produces wrath, but where there is no law, neither is there transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Law produces wrath.'
    reason: alternative_reading
  - marker: b
    text: Or 'neither is there violation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  chosen: law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: Rendered as 'law' to preserve the broad Pauline term here rather than
    narrowing it to the Mosaic Law alone in the main text. The anarthrous-like English
    phrasing is natural while still allowing the reader to hear Paul's general principle.
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: Chose 'wrath' because in Pauline usage the term often carries judicial
    and theological weight beyond ordinary human irritation. 'Anger' is possible but
    weaker in this context.
- source_word: κατεργάζεται
  chosen: produces
  alternatives:
  - brings about
  - works
  lexicon: BDAG
  rationale: Rendered as 'produces' for clear modern English while preserving the
    causative sense. 'Works' is more traditional but less natural to many readers
    today.
- source_word: οὗ δὲ
  chosen: but where
  alternatives:
  - and where
  - now where
  lexicon: BDAG
  rationale: Translated as 'but where' to reflect the mildly adversative force of
    δέ and the locative-relative construction, marking the contrast with the first
    clause.
- source_word: παράβασις
  chosen: transgression
  alternatives:
  - violation
  - trespass
  lexicon: BDAG
  rationale: Chose 'transgression' because it specifically denotes the violation of
    a known boundary or command, which fits Paul's point that such violation is not
    reckoned where no law exists.
