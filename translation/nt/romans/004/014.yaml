theological_decisions:
- issue: Rendering πίστις in a Pauline contrast with νόμος
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine file sets 'faith' as the default for πίστις, with alternatives
    preserved where contested. Here the broader argument in Romans 4 contrasts inheritance
    by law with inheritance through faith, so 'faith' best preserves Paul's line of
    thought.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith; alternatives
    footnoted where contested'
