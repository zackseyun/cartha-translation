id: ROM.4.14
reference: Romans 4:14
source:
  edition: SBLGNT
  text: εἰ γὰρ οἱ ἐκ νόμου κληρονόμοι, κεκένωται ἡ πίστις καὶ κατήργηται ἡ ἐπαγγελία·
translation:
  text: For if those of the law are heirs, faith has been emptied and the promise
    has been nullified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are of the law.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faith has been made empty.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the promise has been rendered ineffective' or 'invalidated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐκ νόμου
  chosen: those of the law
  alternatives:
  - those who are of the law
  - those who live by the law
  - those from the law
  lexicon: BDAG
  rationale: Keeps the compact Pauline expression and preserves the sense of people
    defined by relation to the law, without over-interpreting it as mere law-keeping.
- source_word: κληρονόμοι
  chosen: heirs
  alternatives:
  - inheritors
  lexicon: BDAG
  rationale: '''Heirs'' is the standard, natural English rendering in covenant and
    inheritance contexts.'
- source_word: κεκένωται
  chosen: has been emptied
  alternatives:
  - has been made empty
  - has been rendered void
  lexicon: BDAG
  rationale: Reflects the perfect tense and preserves Paul's metaphor of something
    being emptied of force or content.
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Follows the doctrinal default rendering. In this context Paul's contrast
    is between faith and law as principles of inheritance, so 'faith' is the clearest
    main-text choice.
- source_word: κατήργηται
  chosen: has been nullified
  alternatives:
  - has been abolished
  - has been rendered ineffective
  - has been invalidated
  lexicon: BDAG
  rationale: Conveys the sense of being brought to no effect without overstating it
    as annihilation.
- source_word: ἐπαγγελία
  chosen: the promise
  alternatives:
  - the covenant promise
  lexicon: BDAG
  rationale: Direct and idiomatic; the article is retained because Paul refers to
    the specific promise under discussion.
