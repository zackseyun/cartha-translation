theological_decisions:
- issue: Rendering of δικαιοῦντα in a doctrinally loaded Pauline context
  chosen_reading: the one who justifies
  alternative_readings:
  - the one who declares righteous
  rationale: The Greek verb δικαιόω is central to Paul's argument and should retain
    its established forensic/theological force without importing a denominationally
    specific system. 'Justifies' best preserves that tension and lexical continuity
    with δικαιοσύνη.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Rendering of πίστις/πιστεύω in a contested theological domain
  chosen_reading: faith / believing
  alternative_readings:
  - trust / trusting
  - faithfulness
  rationale: The doctrine table sets 'faith' as the default main-text rendering for
    πίστις, with alternatives preserved where relevant. In this verse, the immediate
    contrast with works favors 'faith' rather than 'faithfulness,' but 'trust' remains
    a meaningful lexical alternative worth noting.
  doctrine_reference: 'Contested terms table: πίστις = faith; alternatives preserved
    in footnotes where contested.'
