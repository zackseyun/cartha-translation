id: ROM.4.5
reference: Romans 4:5
source:
  edition: SBLGNT
  text: τῷ δὲ μὴ ἐργαζομένῳ, πιστεύοντι δὲ ἐπὶ τὸν δικαιοῦντα τὸν ἀσεβῆ, λογίζεται
    ἡ πίστις αὐτοῦ εἰς δικαιοσύνην,
translation:
  text: But to the one not working, but believing in the one who justifies the ungodly,
    his faith is counted as righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trusting in.'
    reason: lexical_alternative
  - marker: b
    text: Or 'declares righteous.'
    reason: lexical_alternative
  - marker: c
    text: Or 'credited' or 'reckoned.'
    reason: lexical_alternative
  - marker: d
    text: Or 'righteousness'; in Pauline contexts δικαιοσύνη can also be rendered
      'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ... μὴ ἐργαζομένῳ
  chosen: to the one not working
  alternatives:
  - to the one who does not work
  - to the non-working one
  lexicon: BDAG
  rationale: A substantival participle with μή; 'the one not working' preserves the
    Greek structure and the contrast with believing, without overstating Paul as condemning
    all work in general.
- source_word: πιστεύοντι δὲ ἐπὶ
  chosen: but believing in
  alternatives:
  - but trusting in
  - but believing on
  lexicon: BDAG
  rationale: πίστις/πιστεύω defaults to the faith word-group in Cartha's doctrine
    table. 'Believing in' is natural modern English for πιστεύω with ἐπί and preserves
    the reliance implied by the construction; 'trusting in' is possible but would
    reduce consistency with the default rendering.
- source_word: τὸν δικαιοῦντα
  chosen: the one who justifies
  alternatives:
  - the one who declares righteous
  - the one who counts as righteous
  lexicon: BDAG
  rationale: δικαιόω in Pauline argument is a key theological term. 'Justifies' preserves
    the technical force and lexical connection to δικαιοσύνη better than a looser
    paraphrase.
- source_word: τὸν ἀσεβῆ
  chosen: the ungodly
  alternatives:
  - the impious
  - the wicked
  lexicon: BDAG
  rationale: '''Ungodly'' is the standard concise rendering and fits Paul''s theological
    contrast. ''Wicked'' would tilt more toward moral evil than impiety toward God.'
- source_word: λογίζεται
  chosen: is counted
  alternatives:
  - is credited
  - is reckoned
  lexicon: BDAG
  rationale: λογίζομαι in this context concerns accounting/imputation language. 'Is
    counted' is transparent modern English and sufficiently formal; 'credited' is
    viable but slightly narrower and more financial in tone.
- source_word: ἡ πίστις αὐτοῦ
  chosen: his faith
  alternatives:
  - his trust
  - his faithfulness
  lexicon: BDAG
  rationale: Following the doctrine table, πίστις is rendered 'faith' in the main
    text. 'Faithfulness' is less likely here because the verse contrasts not works
    with believing, pointing to the act/posture of faith.
- source_word: εἰς δικαιοσύνην
  chosen: as righteousness
  alternatives:
  - for righteousness
  - unto righteousness
  lexicon: BDAG
  rationale: The idiom λογίζομαι ... εἰς regularly conveys being counted as something.
    'As righteousness' is the clearest English expression of the result while preserving
    the link to δικαιοσύνη.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the contested terms table, δικαιοσύνη defaults to 'righteousness,'
    while 'justice' should be preserved in a footnote for Pauline passages.
