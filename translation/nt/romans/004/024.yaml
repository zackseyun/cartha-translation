theological_decisions:
- issue: Whether to make explicit the implied object of λογίζεσθαι
  chosen_reading: 'Included ''it'' in English: ''to whom it will be credited'''
  alternative_readings:
  - to whom will be credited
  - to whom righteousness will be credited
  rationale: The Greek leaves the object implicit because it is carried over from
    the previous context, where righteousness is in view. English normally requires
    an explicit object here. Using 'it' preserves the ellipsis without over-importing
    the full noun into the verse itself.
