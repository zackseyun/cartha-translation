id: ROM.4.24
reference: Romans 4:24
source:
  edition: SBLGNT
  text: ἀλλὰ καὶ δι’ ἡμᾶς οἷς μέλλει λογίζεσθαι, τοῖς πιστεύουσιν ἐπὶ τὸν ἐγείραντα
    Ἰησοῦν τὸν κύριον ἡμῶν ἐκ νεκρῶν,
translation:
  text: but also for us, to whom it will be credited—to us who believe in the one
    who raised Jesus our Lord from the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'counted' or 'reckoned' for them.
    reason: lexical_alternative
  - marker: b
    text: Or 'trust in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ καὶ
  chosen: but also
  alternatives:
  - but even
  - but indeed also
  lexicon: BDAG
  rationale: Preserves the adversative-plus-additive force, linking this statement
    to the prior discussion while extending its relevance to believers now.
- source_word: δι’ ἡμᾶς
  chosen: for us
  alternatives:
  - because of us
  - on account of us
  lexicon: BDAG
  rationale: 'In this context διά with the accusative naturally conveys reference
    or concern: the statement was written with us in view.'
- source_word: οἷς
  chosen: to whom
  alternatives:
  - for whom
  lexicon: BDAG
  rationale: The dative relative pronoun fits the passive infinitive construction
    and is most naturally rendered 'to whom' in English.
- source_word: μέλλει λογίζεσθαι
  chosen: it will be credited
  alternatives:
  - it is going to be credited
  - it is about to be counted
  - it will be reckoned
  lexicon: BDAG
  rationale: This combines the future-oriented force of μέλλω with λογίζομαι in Paul's
    accounting metaphor. 'Credited' is clear modern English and preserves the forensic/accounting
    sense better than a looser paraphrase. 'Will be' is smoother than 'is about to'
    here and avoids suggesting immediacy stronger than the Greek requires.
- source_word: λογίζεσθαι
  chosen: credited
  alternatives:
  - counted
  - reckoned
  lexicon: BDAG
  rationale: Paul's argument in Romans 4 uses accounting/imputation language. 'Credited'
    is readable modern English and preserves that metaphor. Alternatives are preserved
    in a footnote.
- source_word: τοῖς πιστεύουσιν
  chosen: to us who believe
  alternatives:
  - to those who believe
  - to those who trust
  lexicon: BDAG
  rationale: The article-participle construction identifies the people in view. Rendering
    it with 'us who believe' keeps the connection to 'for us' clear and natural in
    English.
- source_word: πιστεύουσιν ἐπὶ
  chosen: believe in
  alternatives:
  - trust in
  - believe on
  lexicon: BDAG
  rationale: πιστεύω with ἐπί plus the accusative expresses directed faith or trust
    toward a person. 'Believe in' is idiomatic and preserves the sense without archaic
    phrasing.
- source_word: τὸν ἐγείραντα
  chosen: the one who raised
  alternatives:
  - him who raised
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring to God by
    action. 'The one who raised' is natural English and preserves the participial
    force.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: standard transliteration
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: τὸν κύριον ἡμῶν
  chosen: our Lord
  alternatives:
  - the Lord of us
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for this contested
    term. The possessive is naturally brought forward in English.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: This is the standard and accurate idiomatic rendering for resurrection
    language in English.
