theological_decisions:
- issue: Representative masculine language
  chosen_reading: Retain 'man' in the main text with generic force.
  alternative_readings:
  - person
  - one
  rationale: The Greek uses masculine singular ἀνήρ in a representative sense. Per
    project policy, the main text keeps the gendered form where it matches source
    intent, while clarifying inclusivity in a footnote.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
