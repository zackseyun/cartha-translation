id: ROM.4.8
reference: Romans 4:8
source:
  edition: SBLGNT
  text: μακάριος ἀνὴρ ⸀οὗ οὐ μὴ λογίσηται κύριος ἁμαρτίαν.
translation:
  text: Blessed is the man against whom the Lord will never count sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Blessed is the person'; 'man' here has a representative sense, not a
      male-exclusive one.
    reason: lexical_alternative
  - marker: b
    text: Or 'will certainly not count sin against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: Chosen for its covenantal and theological weight in biblical blessing
    language; 'happy' is too subjective and light for Paul's citation of Scripture.
- source_word: ἀνήρ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: BDAG
  rationale: Rendered 'man' to preserve the grammatically masculine singular representative
    force of the Greek, in line with the project's gender-accurate policy. The sense
    is generic rather than male-exclusive.
- source_word: οὗ
  chosen: against whom
  alternatives:
  - whose
  - of whom
  lexicon: BDAG
  rationale: This relative genitive is best carried into idiomatic English through
    the construction 'against whom ... count sin,' which preserves the relational
    force without awkward literalism.
- source_word: οὐ μὴ
  chosen: will never
  alternatives:
  - will certainly not
  - will by no means
  lexicon: BDAG
  rationale: The double negative with the subjunctive intensifies the negation. 'Will
    never' communicates the emphatic force in natural modern English.
- source_word: λογίσηται
  chosen: count
  alternatives:
  - reckon
  - credit
  - impute
  lexicon: BDAG
  rationale: '''Count'' is clear, natural, and preserves the accounting metaphor central
    to the surrounding context in Romans 4 without importing more technical theological
    wording than the text itself requires.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: This follows the project's default rendering for κύριος and matches the
    scriptural citation context.
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - a sin
  lexicon: BDAG
  rationale: The singular is retained as in Greek. In English, anarthrous singular
    'sin' works naturally as a category term and fits the citation's style.
