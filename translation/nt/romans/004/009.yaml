id: ROM.4.9
reference: Romans 4:9
source:
  edition: SBLGNT
  text: Ὁ μακαρισμὸς οὖν οὗτος ἐπὶ τὴν περιτομὴν ἢ καὶ ἐπὶ τὴν ἀκροβυστίαν; λέγομεν
    ⸀γάρ· Ἐλογίσθη τῷ Ἀβραὰμ ἡ πίστις εἰς δικαιοσύνην.
translation:
  text: Is this blessing, then, for the circumcised, or also for the uncircumcised?
    For we say, “Faith was counted to Abraham as righteousness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μακαρισμός
  chosen: blessing
  alternatives:
  - blessedness
  lexicon: BDAG
  rationale: In this context Paul refers back to the pronounced blessed state in 4:6–8.
    “Blessing” is natural modern English and communicates the result of that pronouncement
    without sounding archaic.
- source_word: περιτομή
  chosen: the circumcised
  alternatives:
  - circumcision
  lexicon: BDAG
  rationale: Although the Greek noun is literally “circumcision,” here it functions
    as a metonym for the people marked by circumcision. Rendering it as “the circumcised”
    makes the referent explicit in idiomatic English.
- source_word: ἀκροβυστία
  chosen: the uncircumcised
  alternatives:
  - uncircumcision
  lexicon: BDAG
  rationale: Like περιτομή, this noun functions metonymically for a group of people.
    “The uncircumcised” best communicates Paul's contrast in clear English.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: The doctrine guide gives “faith” as the default rendering for πίστις.
    In this quotation from Genesis as used by Paul, “faith” is the best fit in context.
- source_word: ἐλογίσθη
  chosen: was counted
  alternatives:
  - was credited
  - was reckoned
  lexicon: BDAG
  rationale: “Was counted” is faithful to λογίζομαι and preserves Paul's accounting/imputation
    language in accessible English.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The doctrine guide sets “righteousness” as the default rendering for
    δικαιοσύνη, while preserving “justice” in a footnote for Pauline passages. Here
    “righteousness” fits Paul's argument about Abraham's standing before God.
- source_word: εἰς δικαιοσύνην
  chosen: as righteousness
  alternatives:
  - for righteousness
  lexicon: BDAG
  rationale: In this idiom, “as righteousness” is the most established and understandable
    English rendering, conveying that Abraham's faith was reckoned in relation to
    righteousness.
