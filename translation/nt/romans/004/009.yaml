theological_decisions:
- issue: Paul's wording for Abraham's faith and righteousness
  chosen_reading: Faith was counted to Abraham as righteousness.
  alternative_readings:
  - Faith was credited to Abraham for righteousness.
  rationale: The verse does not itself demand a doctrinal expansion beyond Paul's
    quotation. The chosen wording preserves the textual tension and avoids importing
    a fuller theological system into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
