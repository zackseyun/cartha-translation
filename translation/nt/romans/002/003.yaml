id: ROM.2.3
reference: Romans 2:3
source:
  edition: SBLGNT
  text: λογίζῃ δὲ τοῦτο, ὦ ἄνθρωπε ὁ κρίνων τοὺς τὰ τοιαῦτα πράσσοντας καὶ ποιῶν αὐτά,
    ὅτι σὺ ἐκφεύξῃ τὸ κρίμα τοῦ θεοῦ;
translation:
  text: But do you suppose this, O man—you who judge those who practice such things
    and yet do them yourself—that you will escape the judgment of God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O person.' Greek 'man' is masculine singular and addresses a representative
      human being.
    reason: cultural_note
lexical_decisions:
- source_word: λογίζῃ
  chosen: do you suppose
  alternatives:
  - do you think
  - do you reckon
  lexicon: BDAG
  rationale: The verb denotes considering or calculating mentally. 'Do you suppose'
    fits the rhetorical-question force in natural English while preserving the sense
    of a personal assumption under scrutiny.
- source_word: ἄνθρωπε
  chosen: O man
  alternatives:
  - O human
  - O person
  lexicon: BDAG
  rationale: The vocative singular directly addresses a representative human interlocutor.
    Following the project's gender-accurate principle, 'man' preserves the masculine
    singular form and the diatribe style of Paul's address.
- source_word: κρίνων
  chosen: judge
  alternatives:
  - condemn
  - pass judgment on
  lexicon: BDAG
  rationale: '''Judge'' is the most direct rendering and matches the immediate context
    of moral evaluation. ''Condemn'' is somewhat stronger than the participle itself
    and is not required here.'
- source_word: πράσσοντας
  chosen: practice
  alternatives:
  - do
  - commit
  lexicon: BDAG
  rationale: Using 'practice' helps retain a distinction from ποιῶν later in the verse
    and conveys ongoing conduct.
- source_word: ποιῶν
  chosen: do
  alternatives:
  - practice
  - commit
  lexicon: BDAG
  rationale: Rendered differently from πράσσοντας to preserve Paul's variation in
    diction without overstating a semantic contrast. 'Do them yourself' is natural
    English and clearly expresses the accusation.
- source_word: αὐτά
  chosen: them yourself
  alternatives:
  - the same things
  - them
  lexicon: BDAG
  rationale: The pronoun refers back to 'such things.' Adding 'yourself' brings out
    the emphatic force in idiomatic English, though the emphasis is primarily carried
    by the context and explicit σύ later in the clause.
- source_word: ἐκφεύξῃ
  chosen: will escape
  alternatives:
  - will get away from
  - will avoid
  lexicon: BDAG
  rationale: '''Will escape'' is the standard and precise rendering for evading a
    coming judgment, fitting the future-oriented rhetorical question.'
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - sentence
  - verdict
  lexicon: BDAG
  rationale: In this context the noun refers to God's judicial judgment broadly, not
    merely the pronouncement of a sentence. 'Judgment' is the clearest and most theologically
    appropriate English choice.
