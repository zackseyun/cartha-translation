theological_decisions:
- issue: How explicitly to interpret φύσει in relation to moral knowledge and conscience
  chosen_reading: Retain the broader phrase “by nature” in the main text without explaining
    whether Paul means innate moral awareness, customary practice, or natural condition.
  alternative_readings:
  - Render more interpretively as “instinctively”
  - Render more expansively as “by their natural sense”
  rationale: The verse participates in a larger Pauline argument, and the single word
    φύσει does not by itself force a narrow theological explanation. Preserving the
    more literal expression keeps the tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
