id: ROM.2.14
reference: Romans 2:14
source:
  edition: SBLGNT
  text: ὅταν γὰρ ἔθνη τὰ μὴ νόμον ἔχοντα φύσει τὰ τοῦ νόμου ⸀ποιῶσιν, οὗτοι νόμον
    μὴ ἔχοντες ἑαυτοῖς εἰσιν νόμος·
translation:
  text: For whenever Gentiles, who do not have the law, do by nature the things of
    the law, these, though not having the law, are a law to themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “nations.”
    reason: lexical_alternative
  - marker: b
    text: Or “instinctively” for “by nature.”
    reason: lexical_alternative
  - marker: c
    text: Or “do what the law requires.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: In Pauline usage here, the contrast is with Jews and the Mosaic law,
    so “Gentiles” communicates the ethnic-religious sense more clearly than the broader
    “nations.”
- source_word: νόμον / νόμου / νόμος
  chosen: law / the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Rendered with lowercase “law” while supplying “the law” where English
    requires specificity. In context the phrase refers to the Mosaic law, but Paul’s
    final clause uses νόμος in a predicative, metaphorical sense (“are a law to themselves”),
    so retaining the same English term preserves the rhetorical wordplay and conceptual
    continuity.
- source_word: φύσει
  chosen: by nature
  alternatives:
  - instinctively
  - naturally
  lexicon: BDAG
  rationale: “By nature” is the most transparent formal rendering and preserves the
    interpretive openness of the Greek; alternatives like “instinctively” narrow the
    sense too quickly toward one explanation.
- source_word: τὰ τοῦ νόμου ποιῶσιν
  chosen: do the things of the law
  alternatives:
  - do what the law requires
  - practice the law’s requirements
  lexicon: BDAG
  rationale: This keeps the Greek expression visible while remaining readable English.
    “Do what the law requires” is smoother, but the chosen rendering better preserves
    the source wording and leaves room for Paul’s broader rhetorical point.
- source_word: ἑαυτοῖς εἰσιν νόμος
  chosen: are a law to themselves
  alternatives:
  - are a law for themselves
  lexicon: BDAG
  rationale: “To themselves” is the most natural English rendering of the dative and
    preserves the familiar Pauline formulation without implying autonomous self-legislation
    more strongly than the Greek does.
