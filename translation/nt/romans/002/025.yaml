theological_decisions:
- issue: Whether to render Paul's point as literal physical status or covenantal standing
    in the final clause
  chosen_reading: Retain the concrete covenantal expression 'your circumcision has
    become uncircumcision' in the main text.
  alternative_readings:
  - your circumcision is regarded as uncircumcision
  - your circumcision counts as uncircumcision
  rationale: Paul's wording is stronger than mere evaluation language; γέγονεν presents
    a rhetorical reversal of covenant privilege due to transgression. The more interpretive
    alternatives may explain the sense, but they soften the stark force of the Greek.
