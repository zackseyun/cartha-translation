  text: οὐ γὰρ οἱ ἀκροαταὶ ⸀νόμου δίκαιοι παρὰ ⸀τῷ θεῷ, ἀλλ’ οἱ ποιηταὶ ⸁νόμου δικαιωθήσονται.
translation:
  text: submit_verse_draft({"english_text":"For it is not the hearers of the law who
    are righteous before God, but the doers of the law who will be justified.","translation_philosophy":"optimal-equivalence","lexical_decisions":[{"source_word":"ἀκροαταὶ","chosen":"hearers","alternatives":["listeners"],"lexicon":"BDAG","entry":null,"rationale":"‘Hearers’
