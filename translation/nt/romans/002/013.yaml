    ‘justified’ better preserves the term’s theological and lexical continuity in
    Romans."}],"theological_decisions":[{"issue":"Rendering δικαιωθήσονται in a way
    that preserves Pauline theological terminology without over-paraphrase","chosen_reading":"will
    be justified","alternative_readings":["will be declared righteous","will be vindicated"],"rationale":"The
    verb δικαιόω in Romans carries important theological weight. ‘Will be justified’
    preserves that weight and avoids importing a narrower interpretive gloss, while
