    merely hearing the law versus acting on it."},{"source_word":"νόμου","chosen":"of
    the law","alternatives":["of law"],"lexicon":"BDAG","entry":null,"rationale":"Although
    anarthrous in Greek, ‘the law’ is the most natural English rendering in this Pauline
    context and clearly signals the law under discussion without sounding unnatural."},{"source_word":"δίκαιοι","chosen":"righteous","alternatives":["just"],"lexicon":"BDAG","entry":null,"rationale":"‘Righteous’
    is the clearest English equivalent in this context and fits established Pauline
