    evaluation."},{"source_word":"ποιηταὶ","chosen":"doers","alternatives":["those
    who do","practicers"],"lexicon":"BDAG","entry":null,"rationale":"‘Doers’ preserves
    the direct antithesis with ‘hearers’ and reflects the substantival force of the
    Greek succinctly."},{"source_word":"δικαιωθήσονται","chosen":"will be justified","alternatives":["will
    be declared righteous","will be vindicated"],"lexicon":"BDAG","entry":null,"rationale":"‘Will
