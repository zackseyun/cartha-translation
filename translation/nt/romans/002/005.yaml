theological_decisions:
- issue: Whether to make the temporal phrase more interpretive ('when God’s righteous
    judgment is revealed') or preserve the nominal structure of the Greek.
  chosen_reading: 'Preserve the nominal structure: ''on the day of wrath and the revelation
    of God’s righteous judgment.'''
  alternative_readings:
  - '''on the day of wrath when God’s righteous judgment is revealed'''
  rationale: The interpretive clause is contextually sound, but the Greek presents
    coordinated nouns rather than an explicit finite verb. Preserving that structure
    better reflects the source while remaining understandable in English.
  doctrine_reference: Preserve theological tension rather than resolve it.
