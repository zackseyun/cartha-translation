id: ROM.2.5
reference: Romans 2:5
source:
  edition: SBLGNT
  text: κατὰ δὲ τὴν σκληρότητά σου καὶ ἀμετανόητον καρδίαν θησαυρίζεις σεαυτῷ ὀργὴν
    ἐν ἡμέρᾳ ὀργῆς καὶ ⸀ἀποκαλύψεως δικαιοκρισίας τοῦ θεοῦ,
translation:
  text: But because of your hardness and unrepentant heart, you are storing up wrath
    for yourself on the day of wrath and the revelation of God’s righteous judgment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''God’s just judgment.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ δὲ
  chosen: But because of
  alternatives:
  - But according to
  - But in keeping with
  lexicon: BDAG
  rationale: κατά with the accusative here introduces the standard/cause corresponding
    to the addressee’s condition. In idiomatic English, 'because of' best conveys
    the causal force, while δέ is retained with a mild adversative 'But'.
- source_word: σκληρότης
  chosen: hardness
  alternatives:
  - stubbornness
  lexicon: BDAG
  rationale: '''Hardness'' preserves the metaphor of moral insensibility and matches
    the established biblical idiom without unnecessary paraphrase.'
- source_word: ἀμετανόητον καρδίαν
  chosen: unrepentant heart
  alternatives:
  - impenitent heart
  lexicon: BDAG
  rationale: This keeps the heart-language of the Greek and uses readable modern English.
    'Impenitent' is accurate but less accessible.
- source_word: θησαυρίζεις
  chosen: are storing up
  alternatives:
  - are treasuring up
  - are accumulating
  lexicon: BDAG
  rationale: The verb literally evokes storing treasure, but in this negative context
    'storing up' communicates the accumulating force clearly without sounding positive
    like 'treasuring up' might in modern English.
- source_word: σεαυτῷ
  chosen: for yourself
  alternatives:
  - for yourself alone
  lexicon: BDAG
  rationale: The reflexive dative marks personal consequence. 'For yourself' is the
    most natural and precise rendering.
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: In Pauline judgment contexts, 'wrath' better preserves the gravity and
    judicial sense of divine anger.
- source_word: ἐν ἡμέρᾳ ὀργῆς καὶ ἀποκαλύψεως
  chosen: on the day of wrath and the revelation
  alternatives:
  - for the day of wrath and revelation
  - in the day of wrath and revelation
  lexicon: BDAG
  rationale: ἐν with 'day' is naturally temporal in English as 'on the day.' The coordinate
    genitives are preserved rather than recast into a full subordinate clause, keeping
    close to the Greek structure.
- source_word: δικαιοκρισία
  chosen: righteous judgment
  alternatives:
  - just judgment
  lexicon: BDAG
  rationale: The compound emphasizes the justice/rightness of God's judgment. 'Righteous
    judgment' is slightly more transparent to the Greek components and fits Pauline
    diction; 'just judgment' is a viable English alternative preserved in a footnote.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God’s
  lexicon: BDAG
  rationale: Rendered possessively in English sense, while retaining explicit reference
    to God as the source and owner of the judgment.
