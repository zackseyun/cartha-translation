id: ROM.2.15
reference: Romans 2:15
source:
  edition: SBLGNT
  text: οἵτινες ἐνδείκνυνται τὸ ἔργον τοῦ νόμου γραπτὸν ἐν ταῖς καρδίαις αὐτῶν, συμμαρτυρούσης
    αὐτῶν τῆς συνειδήσεως καὶ μεταξὺ ἀλλήλων τῶν λογισμῶν κατηγορούντων ἢ καὶ ἀπολογουμένων,
translation:
  text: They show that the work of the law is written on their hearts, while their
    conscience also bears witness and their thoughts accuse or even defend one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the requirements of the law" or "what the law requires."
    reason: lexical_alternative
  - marker: b
    text: Or "their thoughts accuse or even defend them"; the Greek more literally
      has a reciprocal sense, "one another."
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνδείκνυνται
  chosen: show
  alternatives:
  - demonstrate
  - prove
  lexicon: BDAG
  rationale: '"Show" is clear modern English and preserves the evidential force of
    the middle verb without overstating it as strict proof.'
- source_word: τὸ ἔργον τοῦ νόμου
  chosen: the work of the law
  alternatives:
  - the requirements of the law
  - what the law requires
  lexicon: BDAG
  rationale: The Greek says "work" singular, not "requirements." Main text keeps the
    source expression more transparently; a common interpretive alternative is preserved
    in a footnote.
- source_word: γραπτὸν ἐν ταῖς καρδίαις αὐτῶν
  chosen: written on their hearts
  alternatives:
  - written in their hearts
  lexicon: BDAG
  rationale: English idiom naturally uses "written on their hearts," while still reflecting
    the metaphor of inward inscription.
- source_word: συμμαρτυρούσης ... τῆς συνειδήσεως
  chosen: their conscience also bears witness
  alternatives:
  - their conscience testifies with it
  - their conscience bears witness with it
  lexicon: BDAG
  rationale: This renders the genitive absolute smoothly in English and preserves
    the corroborating sense of the compound verb.
- source_word: μεταξὺ ἀλλήλων τῶν λογισμῶν
  chosen: their thoughts ... one another
  alternatives:
  - their conflicting thoughts
  - their thoughts among themselves
  lexicon: BDAG
  rationale: The phrase is syntactically compressed. The draft preserves the reciprocal
    idea of ἀλλήλων rather than smoothing it away, while keeping readable English.
- source_word: κατηγορούντων ἢ καὶ ἀπολογουμένων
  chosen: accuse or even defend
  alternatives:
  - accuse or excuse
  - accuse or justify
  lexicon: BDAG
  rationale: ἀπολογέομαι is more literally "defend" than "excuse." "Even" reflects
    the emphatic καὶ after ἢ.
