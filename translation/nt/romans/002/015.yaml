theological_decisions:
- issue: Whether Paul refers to inward moral awareness in general or specifically
    to "the requirements of the law."
  chosen_reading: Retain the less interpretive phrase "the work of the law" in the
    main text.
  alternative_readings:
  - the requirements of the law
  - what the law requires
  rationale: The Greek wording is more compact and less explicit than the common interpretive
    rendering. Keeping "work of the law" preserves the text's theological tension
    and lets readers see Paul's actual expression.
  doctrine_reference: Preserve theological tension rather than resolve it.
