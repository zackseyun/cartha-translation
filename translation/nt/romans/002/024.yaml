id: ROM.2.24
reference: Romans 2:24
source:
  edition: SBLGNT
  text: τὸ γὰρ ὄνομα τοῦ θεοῦ δι’ ὑμᾶς βλασφημεῖται ἐν τοῖς ἔθνεσιν, καθὼς γέγραπται.
translation:
  text: For the name of God is blasphemed among the Gentiles because of you, just
    as it is written.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “among the nations.”'
    reason: lexical_alternative
  - marker: b
    text: Paul is echoing Scripture, especially Isaiah 52:5 and themes also reflected
      in Ezekiel 36:20–23.
    reason: cross_reference
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces an explanatory ground for the preceding rebuke; 'For' preserves
    the discourse connection in natural English.
- source_word: ὄνομα
  chosen: name
  lexicon: BDAG
  rationale: A straightforward rendering; in biblical usage 'name' can carry reputational
    force, but the Greek itself states 'name' and should not be paraphrased beyond
    that.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Standard rendering of θεός here in a genitive construction: ''the name
    of God.'''
- source_word: δι’ ὑμᾶς
  chosen: because of you
  alternatives:
  - through you
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses cause here; 'because of you'
    best conveys Paul's accusation in idiomatic English.
- source_word: βλασφημεῖται
  chosen: is blasphemed
  alternatives:
  - is being blasphemed
  - is slandered
  lexicon: BDAG
  rationale: The passive present is preserved with 'is blasphemed.' This keeps the
    strong religious sense of speaking impiously against God, stronger than merely
    'slandered.'
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  lexicon: BDAG
  rationale: In Paul's Jewish-Gentile context, ἔθνη most naturally refers to Gentiles
    rather than nations in a purely geopolitical sense. The alternative is preserved
    in a footnote because 'nations' is also lexically possible.
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: A standard formula introducing scriptural citation. 'Just as' slightly
    better reflects καθώς while remaining natural English.
