id: ROM.2.12
reference: Romans 2:12
source:
  edition: SBLGNT
  text: Ὅσοι γὰρ ἀνόμως ἥμαρτον, ἀνόμως καὶ ἀπολοῦνται· καὶ ὅσοι ἐν νόμῳ ἥμαρτον,
    διὰ νόμου κριθήσονται·
translation:
  text: For all who sinned apart from the law will also perish apart from the law,
    and all who sinned under the law will be judged through the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without the law' / 'lawlessly' for both occurrences of ἀνόμως.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the law'; 'under the law' brings out the sense of being within the
      law's jurisdiction.
    reason: lexical_alternative
  - marker: c
    text: Or 'by the law' for 'through the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνόμως
  chosen: apart from the law
  alternatives:
  - without the law
  - lawlessly
  lexicon: BDAG
  rationale: Rendered relationally rather than adverbially as mere 'lawlessly' to
    match Paul's contrast with those who sin 'under the law.' This expresses absence
    of Mosaic law as covenantal standard, not merely immoral behavior.
- source_word: ἥμαρτον
  chosen: sinned
  alternatives:
  - committed sin
  lexicon: BDAG
  rationale: Standard past-tense rendering of the aorist, preserving the simple verbal
    idea without overinterpreting aspect.
- source_word: ἀπολοῦνται
  chosen: will perish
  alternatives:
  - will be destroyed
  lexicon: BDAG
  rationale: '''Will perish'' is natural English and preserves the future middle sense
    without importing a more technical doctrine of annihilation or over-specifying
    the mode of destruction.'
- source_word: ἐν νόμῳ
  chosen: under the law
  alternatives:
  - in the law
  - within the law
  lexicon: BDAG
  rationale: Although literally 'in law,' the idiomatic sense in Paul's argument is
    living within the sphere or jurisdiction of the law. 'Under the law' best conveys
    that covenantal/judicial setting in English.
- source_word: διὰ νόμου
  chosen: through the law
  alternatives:
  - by the law
  - according to the law
  lexicon: BDAG
  rationale: Kept the distinct force of διά from ἐν by rendering 'through the law,'
    indicating the law as the means or standard by which judgment is rendered.
- source_word: κριθήσονται
  chosen: will be judged
  alternatives:
  - will be condemned
  - will come under judgment
  lexicon: BDAG
  rationale: Rendered neutrally as 'will be judged' because κρίνω here denotes judicial
    evaluation, and the context should determine whether condemnation is entailed.
- source_word: Ὅσοι ... καὶ ὅσοι
  chosen: all who ... and all who
  alternatives:
  - whoever ... and whoever
  - those who ... and those who
  lexicon: BDAG
  rationale: '''All who'' best captures the distributive force with clear, natural
    English parallelism.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: BDAG
  rationale: Retained the connective to show this verse grounds the previous statement
    in Paul's argument.
