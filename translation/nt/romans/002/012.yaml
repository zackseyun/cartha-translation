theological_decisions:
- issue: Reference of 'law' (νόμος)
  chosen_reading: Mosaic law in particular, expressed simply as 'the law' in translation
  alternative_readings:
  - law in a more general moral sense
  rationale: In Romans 2 Paul's Jew-Gentile contrast centers on those apart from the
    Mosaic law and those within its jurisdiction. Rendering with the definite phrase
    'the law' preserves Paul's likely reference without inserting explanatory wording
    into the main text.
- issue: Force of 'perish' versus final condemnation
  chosen_reading: Use 'will perish' without specifying annihilation or eternal punishment
    in the wording
  alternative_readings:
  - will be condemned
  - will be destroyed
  rationale: The verse states outcome in judicial terms but does not itself define
    the mechanics of final judgment. The translation preserves that theological tension
    rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
