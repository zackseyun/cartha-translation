theological_decisions:
- issue: νόμος in Pauline rhetoric
  chosen_reading: the law
  alternative_readings:
  - Law (capitalized, as a technical title for the Mosaic Law)
  rationale: The referent is clearly the Jewish law, but lower-case 'law' is more
    natural English and avoids importing a technical convention not explicit in the
    Greek. Context still makes the Mosaic reference plain.
  doctrine_reference: Original-language primacy over translation tradition; readable
    modern English, not archaic or academic.
