id: ROM.2.23
reference: Romans 2:23
source:
  edition: SBLGNT
  text: ὃς ἐν νόμῳ καυχᾶσαι, διὰ τῆς παραβάσεως τοῦ νόμου τὸν θεὸν ἀτιμάζεις;
translation:
  text: You who boast in the law, do you dishonor God through your transgression of
    the law?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by breaking the law."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν νόμῳ
  chosen: in the law
  alternatives:
  - in law
  - about the law
  lexicon: BDAG
  rationale: Retains Paul's locative phrasing and the covenantal/juridical sense of
    νόμος without over-interpreting it as merely 'about' the law.
- source_word: καυχᾶσαι
  chosen: boast
  alternatives:
  - take pride
  - glory
  lexicon: BDAG
  rationale: '''Boast'' best preserves the sharp, critical tone of Paul''s accusation
    and is a standard rendering of καυχάομαι in this context.'
- source_word: διὰ τῆς παραβάσεως
  chosen: through your transgression
  alternatives:
  - through transgressing
  - by breaking
  lexicon: BDAG
  rationale: Uses a noun to reflect the Greek noun παράβασις and adds 'your' in English
    because the second-person singular verbs make the personal reference explicit
    in context.
- source_word: παραβάσεως τοῦ νόμου
  chosen: transgression of the law
  alternatives:
  - breaking the law
  - violation of the law
  lexicon: BDAG
  rationale: Keeps the lexical connection to παράβασις and νόμος more transparently
    than the more idiomatic 'breaking the law,' while still reading naturally.
- source_word: τὸν θεὸν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English normally omits the article before 'God' here; the referent is
    definite without needing a wooden rendering.
- source_word: ἀτιμάζεις
  chosen: dishonor
  alternatives:
  - bring dishonor on
  - insult
  lexicon: BDAG
  rationale: '''Dishonor'' cleanly matches the semantic force of ἀτιμάζω and fits
    the rhetorical contrast with boasting in the law while violating it.'
