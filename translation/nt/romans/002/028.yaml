id: ROM.2.28
reference: Romans 2:28
source:
  edition: SBLGNT
  text: οὐ γὰρ ὁ ἐν τῷ φανερῷ Ἰουδαῖός ἐστιν, οὐδὲ ἡ ἐν τῷ φανερῷ ἐν σαρκὶ περιτομή·
translation:
  text: For a Jew is not one outwardly, nor is circumcision something outward in the
    flesh;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “externally” / “in what is visible.”
    reason: lexical_alternative
  - marker: b
    text: “In the flesh” is literal here, referring to physical circumcision.
    reason: lexical_alternative
  - marker: c
    text: “Jew” could also be rendered “Judean” in some contexts, but here the covenantal
      sense is more likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Romans, Paul is speaking of covenant identity within Israel and its
    relation to law and circumcision, not merely regional origin, so “Jew” best fits
    the context.
- source_word: ἐν τῷ φανερῷ
  chosen: outwardly
  alternatives:
  - openly
  - in what is visible
  - externally
  lexicon: BDAG
  rationale: The phrase contrasts visible/external status with the inward reality
    made explicit in the following verse. “Outwardly” gives natural English while
    preserving the external-visible sense.
- source_word: περιτομή
  chosen: circumcision
  lexicon: BDAG
  rationale: This is the standard and precise rendering for the covenant sign under
    discussion.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - in the body
  - physical
  lexicon: BDAG
  rationale: Here σάρξ is literal/physical rather than metaphorical, so the doctrinal
    default favors “flesh.” This also preserves the bodily contrast with inward reality
    in the next verse.
- source_word: οὐδὲ ἡ ἐν τῷ φανερῷ ἐν σαρκὶ περιτομή
  chosen: nor is circumcision something outward in the flesh
  alternatives:
  - nor is circumcision outward in the flesh
  - nor is outward circumcision in the flesh circumcision
  lexicon: BDAG
  rationale: The Greek is elliptical, so English needs slight smoothing. This rendering
    preserves the denial of merely external, physical circumcision without over-paraphrasing.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Because
  lexicon: BDAG
  rationale: “For” preserves the explanatory link to the preceding argument in natural
    English.
