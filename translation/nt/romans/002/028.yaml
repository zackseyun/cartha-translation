theological_decisions:
- issue: Meaning of covenant identity in 'Jew' and 'circumcision'
  chosen_reading: Paul denies that merely visible ethnic-marker possession, by itself,
    defines true covenant standing.
  alternative_readings:
  - Paul denies Jewish identity itself
  - Paul replaces Jewish identity with a purely spiritual category
  rationale: The verse contrasts outward and inward dimensions rather than abolishing
    the category of Jewish identity. The wording should preserve that tension for
    verse 29.
