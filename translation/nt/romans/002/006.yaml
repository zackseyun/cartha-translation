theological_decisions:
- issue: Judgment according to works
  chosen_reading: Retain the judicial recompense wording without softening or harmonizing
    it with broader Pauline discussions of justification.
  alternative_readings:
  - Render more generally as 'treat' or 'reward'
  rationale: The verse explicitly states recompense according to works; the translation
    should preserve that theological tension rather than resolve it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
