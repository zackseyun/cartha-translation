id: ROM.2.6
reference: Romans 2:6
source:
  edition: SBLGNT
  text: ὃς ἀποδώσει ἑκάστῳ κατὰ τὰ ἔργα αὐτοῦ·
translation:
  text: who will repay each one according to his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “deeds.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek “his,” with representative generic force: “each person’s.”'
    reason: cultural_note
lexical_decisions:
- source_word: ὃς
  chosen: who
  alternatives:
  - the one who
  lexicon: BDAG
  rationale: A straightforward relative pronoun linking back to God in the prior context;
    'who' is idiomatic and precise.
- source_word: ἀποδώσει
  chosen: will repay
  alternatives:
  - will render
  - will give back
  lexicon: BDAG
  rationale: The verb carries the sense of giving back or repaying in a judicial/recompense
    context. 'Will repay' preserves that force in clear modern English.
- source_word: ἑκάστῳ
  chosen: each one
  alternatives:
  - each person
  - everyone
  lexicon: BDAG
  rationale: This keeps the distributive force of the singular dative while remaining
    natural in English. It also avoids flattening the individual emphasis into a collective.
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  lexicon: BDAG
  rationale: This is the standard and best-matched rendering with the accusative here,
    expressing measure or standard.
- source_word: τὰ ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the most direct lexical equivalent and preserves Pauline
    verbal consistency. ''Deeds'' is a viable English alternative but is less formally
    aligned to ἔργα.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - their
  - one's
  lexicon: BDAG
  rationale: The Greek is masculine singular and functions representatively with ἑκάστῳ.
    'His' preserves the grammatical form most closely; the generic sense can be clarified
    in a footnote rather than neutralized in the main text.
