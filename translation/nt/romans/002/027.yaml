theological_decisions:
- issue: Whether to make Paul's contrast explicitly ethnic by translating ἀκροβυστία
    as 'Gentile'
  chosen_reading: Retain the narrower expression 'the uncircumcised person' in the
    main text.
  alternative_readings:
  - the Gentile
  rationale: Paul's argument certainly concerns Jews and Gentiles, but the specific
    lexical contrast in this verse is circumcision versus uncircumcision. The translation
    preserves that textual emphasis rather than resolving it into an ethnic label
    not stated in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
