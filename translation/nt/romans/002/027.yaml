id: ROM.2.27
reference: Romans 2:27
source:
  edition: SBLGNT
  text: καὶ κρινεῖ ἡ ἐκ φύσεως ἀκροβυστία τὸν νόμον τελοῦσα σὲ τὸν διὰ γράμματος καὶ
    περιτομῆς παραβάτην νόμου.
translation:
  text: And the uncircumcised person by nature, while fulfilling the law, will judge
    you who, through the letter and circumcision, are a transgressor of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the uncircumcision'; that is, an uncircumcised person.
    reason: lexical_alternative
  - marker: b
    text: '''Through the letter'' may also be rendered ''with the written code.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροβυστία
  chosen: the uncircumcised person
  alternatives:
  - uncircumcision
  - the foreskinned person
  - the Gentile
  lexicon: BDAG
  rationale: Though the noun is literally 'uncircumcision,' Paul uses it metonymically
    for a person who is uncircumcised. Rendering it as 'the uncircumcised person'
    preserves the personal referent in clear English without importing the broader
    ethnic term 'Gentile' beyond what the word itself states.
- source_word: ἐκ φύσεως
  chosen: by nature
  alternatives:
  - naturally
  - from birth
  lexicon: BDAG
  rationale: The phrase contrasts natural uncircumcision with Jewish possession of
    circumcision. 'By nature' is the most idiomatic and sufficiently literal rendering
    in Pauline usage.
- source_word: τελοῦσα
  chosen: while fulfilling
  alternatives:
  - keeping
  - carrying out
  - observing
  lexicon: BDAG
  rationale: The participle describes actual compliance with the law. 'Fulfilling'
    preserves the verbal force of τελέω and fits Paul's argument, while 'keeping'
    is possible but slightly flatter.
- source_word: νόμον
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: In context Paul refers to the Mosaic law as a known category. Lowercase
    'law' is retained here for readable English style, while the article preserves
    specificity.
- source_word: διὰ γράμματος
  chosen: through the letter
  alternatives:
  - with the written code
  - through the written code
  lexicon: BDAG
  rationale: γράμμα here refers to the written form of the law. 'Through the letter'
    stays close to the Greek wording and preserves Paul's rhetoric; the more interpretive
    'written code' is preserved as an alternative.
- source_word: περιτομῆς
  chosen: circumcision
  lexicon: BDAG
  rationale: The covenant sign is best rendered directly and consistently as 'circumcision.'
- source_word: παραβάτην νόμου
  chosen: a transgressor of the law
  alternatives:
  - a lawbreaker
  lexicon: BDAG
  rationale: This preserves the explicit relation to νόμος in the Greek. 'Lawbreaker'
    is idiomatic but slightly compresses the phrase.
