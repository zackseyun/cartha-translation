id: ROM.2.2
reference: Romans 2:2
source:
  edition: SBLGNT
  text: οἴδαμεν δὲ ὅτι τὸ κρίμα τοῦ θεοῦ ἐστιν κατὰ ἀλήθειαν ἐπὶ τοὺς τὰ τοιαῦτα πράσσοντας.
translation:
  text: And we know that the judgment of God is according to truth against those who
    practice such things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in accordance with truth'; that is, God's judgment accords with what
      is true.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we know for certain
  - we understand
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense; 'we know' is the natural
    and direct English rendering.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ marks discourse continuation here more than strong contrast; 'And'
    preserves the connective force in readable English.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - verdict
  - condemnation
  lexicon: BDAG
  rationale: κρίμα denotes God's judicial judgment here. 'Judgment' is the clearest
    broad rendering without narrowing it to the result alone ('condemnation') or making
    it too forensic ('verdict').
- source_word: κατὰ ἀλήθειαν
  chosen: according to truth
  alternatives:
  - rightly
  - in accordance with truth
  lexicon: BDAG
  rationale: The phrase expresses conformity to truth or reality. 'According to truth'
    preserves the lexical components and Paul's moral-judicial emphasis better than
    the interpretive adverb 'rightly.'
- source_word: ἐπὶ
  chosen: against
  alternatives:
  - upon
  - 'on'
  lexicon: BDAG
  rationale: With persons under adverse judgment, ἐπί is best represented here as
    'against,' making the judicial direction explicit in idiomatic English.
- source_word: τὰ τοιαῦτα
  chosen: such things
  alternatives:
  - these kinds of things
  lexicon: BDAG
  rationale: A natural equivalent for the neuter plural phrase referring back to the
    vices in context.
- source_word: πράσσοντας
  chosen: practice
  alternatives:
  - do
  - carry out
  lexicon: BDAG
  rationale: The present participle conveys ongoing or characteristic action. 'Practice'
    captures repeated conduct better than the simpler 'do'.
