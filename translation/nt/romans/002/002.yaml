theological_decisions:
- issue: Whether κατὰ ἀλήθειαν should be rendered more interpretively as 'rightly'
    or more transparently as 'according to truth.'
  chosen_reading: according to truth
  alternative_readings:
  - rightly
  - in accordance with truth
  rationale: The translation philosophy favors original-language primacy and preserving
    theological texture. 'According to truth' keeps Paul's grounding of divine judgment
    in truth/reality, rather than collapsing it into a smoother but less explicit
    adverb.
  doctrine_reference: Translation philosophy items 1, 3, and 5
