id: ROM.2.9
reference: Romans 2:9
source:
  edition: SBLGNT
  text: θλῖψις καὶ στενοχωρία, ἐπὶ πᾶσαν ψυχὴν ἀνθρώπου τοῦ κατεργαζομένου τὸ κακόν,
    Ἰουδαίου τε πρῶτον καὶ Ἕλληνος·
translation:
  text: There will be affliction and distress upon every human soul that does evil,
    to the Jew first and also to the Greek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every person' or 'every human being.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the Greek,' that is, to the non-Jew in this Jew/Greek contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις
  chosen: affliction
  alternatives:
  - tribulation
  - distress
  lexicon: BDAG
  rationale: Conveys severe trouble or oppression in clear modern English. 'Tribulation'
    is possible but more traditional and less natural here; 'distress' is reserved
    for στενοχωρία to preserve the paired intensification.
- source_word: στενοχωρία
  chosen: distress
  alternatives:
  - anguish
  - trouble
  lexicon: BDAG
  rationale: 'Pairs naturally with θλῖψις while preserving a distinction: external
    affliction followed by inner constriction/distress.'
- source_word: ἐπὶ πᾶσαν ψυχὴν ἀνθρώπου
  chosen: upon every human soul
  alternatives:
  - upon every person
  - upon every human being
  lexicon: BDAG
  rationale: Retains the concrete force of ψυχή ('soul') while making ἀνθρώπου clearly
    generic with 'human.' 'Person' would be smoother, but this wording better preserves
    the source imagery and solemnity.
- source_word: τοῦ κατεργαζομένου
  chosen: that does
  alternatives:
  - who practices
  - who works
  lexicon: BDAG
  rationale: Idiomatic English for the substantival participle in this moral context.
    'Practices' is possible, but 'does' is closer and simpler.
- source_word: τὸ κακόν
  chosen: evil
  alternatives:
  - what is evil
  - the evil
  lexicon: BDAG
  rationale: The articular neuter singular functions generically; 'evil' gives the
    natural English sense without unnecessary expansion.
- source_word: Ἰουδαίου
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Romans this term ordinarily marks the Jewish people rather than merely
    residents of Judea, so 'Jew' best fits Paul's ethnic-religious contrast.
- source_word: Ἕλληνος
  chosen: Greek
  alternatives:
  - Gentile
  lexicon: BDAG
  rationale: Preserves Paul's actual wording and the recurring Jew/Greek pairing in
    Romans. 'Gentile' is interpretive and broader than the lexical form.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: A direct and natural rendering that preserves the sequence of priority
    without adding explanation.
