theological_decisions:
- issue: Whether to make the verse fully explicit in English despite the compact Greek
    phrasing
  chosen_reading: There will be affliction and distress...
  alternative_readings:
  - Affliction and distress upon every human soul...
  rationale: English normally requires an explicit predicate here. Supplying 'There
    will be' clarifies the clause without adding doctrinal content and reflects the
    verse's judgment context.
