id: ROM.2.8
reference: Romans 2:8
source:
  edition: SBLGNT
  text: τοῖς δὲ ἐξ ἐριθείας καὶ ⸀ἀπειθοῦσι τῇ ἀληθείᾳ πειθομένοις δὲ τῇ ἀδικίᾳ ⸂ὀργὴ
    καὶ θυμός⸃,
translation:
  text: 'But for those who are driven by selfish ambition and disobey the truth, while
    obeying unrighteousness: wrath and fury.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'self-seeking' for 'driven by selfish ambition.'
    reason: lexical_alternative
  - marker: b
    text: Or 'obeying injustice' for 'obeying unrighteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἐριθείας
  chosen: driven by selfish ambition
  alternatives:
  - from self-seeking
  - out of rivalry
  lexicon: BDAG
  rationale: The phrase indicates motive or source. 'Driven by selfish ambition' preserves
    the idea of action arising from partisan/self-interested motives while reading
    naturally in English.
- source_word: ἀπειθοῦσι τῇ ἀληθείᾳ
  chosen: disobey the truth
  alternatives:
  - refuse to obey the truth
  - are disobedient to the truth
  lexicon: BDAG
  rationale: ἀπειθέω in Paul commonly carries the sense of disobedience rather than
    mere disbelief. 'Disobey the truth' keeps the moral-volitional force of the verb.
- source_word: πειθομένοις δὲ τῇ ἀδικίᾳ
  chosen: while obeying unrighteousness
  alternatives:
  - but obeying injustice
  - submitting to wrongdoing
  lexicon: BDAG
  rationale: The participle is parallel to 'disobey the truth' and expresses allegiance
    in the opposite direction. 'Unrighteousness' fits Paul's moral vocabulary better
    than a flatter 'wrongdoing,' though 'injustice' remains a possible alternative.
- source_word: ἀδικίᾳ
  chosen: unrighteousness
  alternatives:
  - injustice
  lexicon: BDAG
  rationale: In Pauline usage this term often carries both moral and relational weight
    before God. Per doctrine guidance, 'unrighteousness' is preferred in the main
    text, with 'injustice' preserved as an alternative.
- source_word: ὀργὴ
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: '''Wrath'' better preserves the solemn judicial force of the noun in
    this context than the more ordinary ''anger.'''
- source_word: θυμός
  chosen: fury
  alternatives:
  - indignation
  - rage
  lexicon: BDAG
  rationale: Used alongside ὀργή, this term intensifies the expression. 'Fury' preserves
    the heightened force while remaining idiomatic modern English.
- source_word: implicit verbal ellipsis
  chosen: colon after 'unrighteousness'
  alternatives:
  - there will be wrath and fury
  - wrath and fury will come
  rationale: The Greek leaves the result as a verbless expression, dependent on the
    larger sentence context. The colon preserves that terseness without importing
    too much additional wording.
