theological_decisions:
- issue: Rendering ἀδικία in a Pauline judgment context
  chosen_reading: unrighteousness
  alternative_readings:
  - injustice
  rationale: The immediate context concerns divine judgment and moral opposition to
    truth. 'Unrighteousness' better preserves Paul's theological register, while 'injustice'
    is a viable but narrower alternative that should be footnoted.
