id: ROM.2.1
reference: Romans 2:1
source:
  edition: SBLGNT
  text: Διὸ ἀναπολόγητος εἶ, ὦ ἄνθρωπε πᾶς ὁ κρίνων· ἐν ᾧ γὰρ κρίνεις τὸν ἕτερον,
    σεαυτὸν κατακρίνεις, τὰ γὰρ αὐτὰ πράσσεις ὁ κρίνων·
translation:
  text: Therefore you are without excuse, O man, every one who judges. For in passing
    judgment on another, you condemn yourself, because you who judge practice the
    same things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O person' / 'O human being.' Greek 'man' is masculine singular but representative
      in force.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' preserves
    the logical force in natural English.
- source_word: ἀναπολόγητος
  chosen: without excuse
  alternatives:
  - inexcusable
  - without a defense
  lexicon: BDAG
  rationale: '''Without excuse'' is clear modern English and preserves the judicial
    nuance of having no valid defense.'
- source_word: ὦ ἄνθρωπε
  chosen: O man
  alternatives:
  - O human being
  - O person
  lexicon: BDAG
  rationale: The Greek is masculine singular vocative and representative/generic.
    'O man' best matches the source form and rhetorical address; an inclusive alternative
    is preserved in a footnote.
- source_word: πᾶς ὁ κρίνων
  chosen: every one who judges
  alternatives:
  - everyone who judges
  - you who judge
  lexicon: BDAG
  rationale: This construction apposes and specifies the addressee. 'Every one who
    judges' preserves the universalizing force of πᾶς while remaining readable.
- source_word: ἐν ᾧ κρίνεις τὸν ἕτερον
  chosen: in passing judgment on another
  alternatives:
  - in that by which you judge another
  - when you judge another
  - on whatever grounds you judge another
  lexicon: BDAG
  rationale: The Greek ἐν ᾧ γὰρ κρίνεις is a compact relative construction combining
    instrumental ("by means of") and temporal ("in the act of") force. "In that
    by which" is lexically faithful but reads stilted in modern English and strands
    the preposition awkwardly. "In passing judgment on" (ESV) preserves both
    nuances — the act of judging is itself both the means and the moment of
    self-condemnation — while reading naturally. The literal rendering is preserved
    as a lexical alternative.
- source_word: τὸν ἕτερον
  chosen: another
  alternatives:
  - the other person
  - someone else
  lexicon: BDAG
  rationale: '''Another'' is concise and natural, preserving the contrast with the
    judging self.'
- source_word: κατακρίνεις
  chosen: you condemn
  alternatives:
  - you pass sentence on
  - you condemn as guilty
  lexicon: BDAG
  rationale: Stronger than κρίνεις, this verb carries a condemnatory/judicial force,
    well rendered by 'condemn.'
- source_word: τὰ γὰρ αὐτὰ πράσσεις
  chosen: because you who judge practice the same things
  alternatives:
  - for you do the same things
  - because you are doing the same things
  lexicon: BDAG
  rationale: πράσσω here denotes doing/practicing. 'Practice the same things' captures
    the ongoing ethical behavior implied by the present tense better than a simple
    punctiliar 'do.'
- source_word: ὁ κρίνων
  chosen: you who judge
  alternatives:
  - the one who judges
  lexicon: BDAG
  rationale: Rendered as a direct second-person apposition for smoother English while
    preserving the participial identification of the addressee.
