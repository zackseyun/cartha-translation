theological_decisions:
- issue: Representative masculine address in Paul's rebuke
  chosen_reading: Retain 'O man' in the main text, with an inclusive lexical alternative
    footnoted.
  alternative_readings:
  - O person
  - O human being
  rationale: The doctrine excerpt directs gender-accurate rendering over gender-neutral
    rendering when the source is grammatically masculine with representative force.
    The footnote preserves the broader referential sense without flattening Paul's
    rhetoric.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
