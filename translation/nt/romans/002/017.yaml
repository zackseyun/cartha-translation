id: ROM.2.17
reference: Romans 2:17
source:
  edition: SBLGNT
  text: ⸂Εἰ δὲ⸃ σὺ Ἰουδαῖος ἐπονομάζῃ καὶ ἐπαναπαύῃ ⸀νόμῳ καὶ καυχᾶσαι ἐν θεῷ
translation:
  text: But if you call yourself a Jew and rely on the law and boast in God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear the name of a Jew' or 'are called a Jew.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rest on the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - But if indeed
  rationale: Preserves the conditional force of εἰ and the mildly contrastive/continuative
    force of δέ in Paul's ongoing argument.
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  rationale: In Romans this term is primarily ethno-religious rather than geographic,
    so 'Jew' best fits Paul's contrast.
- source_word: ἐπονομάζῃ
  chosen: call yourself
  alternatives:
  - are called
  - bear the name of
  lexicon: BDAG
  rationale: 'The middle voice naturally supports a reflexive sense here: claiming
    or bearing the designation oneself. ''Call yourself'' is idiomatic and preserves
    the rhetorical edge.'
- source_word: ἐπαναπαύῃ
  chosen: rely on
  alternatives:
  - rest on
  - depend on
  lexicon: BDAG
  rationale: Conveys misplaced confidence rather than physical rest. 'Rely on' is
    clearer in modern English while retaining Paul's critique.
- source_word: νόμῳ
  chosen: the law
  alternatives:
  - law
  rationale: The article is naturally supplied in English for Paul's likely reference
    to the Mosaic law as a recognized covenantal category.
- source_word: καυχᾶσαι
  chosen: boast
  alternatives:
  - take pride
  - glory
  lexicon: BDAG
  rationale: '''Boast'' is the standard Pauline rendering and preserves the morally
    charged tone, whether positive or negative by context.'
- source_word: ἐν θεῷ
  chosen: in God
  alternatives:
  - about God
  rationale: The preposition ἐν is retained straightforwardly. 'Boast in God' is natural
    English and matches Pauline usage.
