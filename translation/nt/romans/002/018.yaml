id: ROM.2.18
reference: Romans 2:18
source:
  edition: SBLGNT
  text: καὶ γινώσκεις τὸ θέλημα καὶ δοκιμάζεις τὰ διαφέροντα κατηχούμενος ἐκ τοῦ νόμου,
translation:
  text: and know his will and approve what is superior, because you are instructed
    from the law,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the will'; the Greek does not explicitly state 'his,' though God is
      the implied referent in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'approve what is excellent'; more literally, 'test the things that differ.'
    reason: alternative_reading
lexical_decisions:
- source_word: γινώσκεις
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: BDAG
  rationale: Present indicative, straightforwardly expressing active knowledge; 'know'
    is the most natural and direct English equivalent here.
- source_word: τὸ θέλημα
  chosen: his will
  alternatives:
  - the will
  lexicon: BDAG
  rationale: The Greek text has 'the will' without an explicit possessive, but the
    referent in context is God (cf. the preceding mention of boasting in God). 'His
    will' makes the implicit referent clear in natural English without materially
    adding new content.
- source_word: δοκιμάζεις
  chosen: approve
  alternatives:
  - test
  - discern
  lexicon: BDAG
  rationale: In this context the verb carries the sense of evaluating and recognizing
    what is worthy or preferable, not merely testing in a neutral sense. 'Approve'
    captures the evaluative result.
- source_word: τὰ διαφέροντα
  chosen: what is superior
  alternatives:
  - what is excellent
  - the things that differ
  lexicon: BDAG
  rationale: The participial expression can mean either 'the things that differ' in
    a more literal sense or, idiomatically in context, 'the things that matter more
    / are superior.' Given the moral-discernment context, 'what is superior' best
    captures the likely sense while remaining fairly close to the Greek.
- source_word: κατηχούμενος
  chosen: because you are instructed
  alternatives:
  - being instructed
  - since you are taught
  lexicon: BDAG
  rationale: The passive participle is rendered with a causal nuance in smooth English
    because it explains how the addressee comes to know and approve these things.
    'Instructed' also preserves the pedagogical sense behind κατηχέω.
- source_word: ἐκ τοῦ νόμου
  chosen: from the law
  alternatives:
  - out of the law
  - by the law
  lexicon: BDAG
  rationale: ἐκ naturally means 'from/out of.' 'From the law' is idiomatic English
    and preserves the source idea without over-interpreting the preposition.
