id: ROM.2.11
reference: Romans 2:11
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν προσωπολημψία παρὰ τῷ θεῷ.
translation:
  text: For there is no partiality with God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “favoritism.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks this verse as grounding the previous statement; “For” preserves
    the explanatory force naturally in English.
- source_word: προσωπολημψία
  chosen: partiality
  alternatives:
  - favoritism
  - respect of persons
  lexicon: BDAG
  rationale: The noun denotes showing preference based on status or outward factors.
    “Partiality” is precise, natural, and preserves the moral-judicial sense without
    archaic phrasing.
- source_word: παρὰ τῷ θεῷ
  chosen: with God
  alternatives:
  - before God
  - from God
  lexicon: BDAG
  rationale: 'In this construction παρά communicates relation or presence: such partiality
    does not exist in relation to God. “With God” is idiomatic and close to the Greek
    form.'
- source_word: οὐ γάρ ἐστιν ... παρὰ τῷ θεῷ
  chosen: For there is no partiality with God.
  alternatives:
  - For God shows no partiality.
  - For there is no favoritism with God.
  lexicon: BDAG
  rationale: The existential construction is retained rather than converted into an
    active verbal paraphrase. This keeps closer to the Greek while remaining readable
    modern English.
