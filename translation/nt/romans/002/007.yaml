theological_decisions:
- issue: Relation of the dative phrase to the implied verb from the previous verse
  chosen_reading: The English supplies a complete sense as 'eternal life to those
    who...,' carrying forward the implied recompense from Romans 2:6 without adding
    theological interpretation beyond the syntax.
  alternative_readings:
  - A more formally elliptical rendering such as 'to those who... eternal life'
  rationale: The Greek clause depends on the prior verse for its governing verb, but
    English benefits from making the sense explicit. This preserves the syntax's function
    while keeping the verse readable as a standalone unit.
