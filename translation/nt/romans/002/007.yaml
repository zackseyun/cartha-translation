id: ROM.2.7
reference: Romans 2:7
source:
  edition: SBLGNT
  text: τοῖς μὲν καθ’ ὑπομονὴν ἔργου ἀγαθοῦ δόξαν καὶ τιμὴν καὶ ἀφθαρσίαν ζητοῦσιν
    ζωὴν αἰώνιον·
translation:
  text: eternal life to those who by perseverance in doing good seek glory and honor
    and immortality.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθ’ ὑπομονὴν
  chosen: by perseverance
  alternatives:
  - with perseverance
  - in perseverance
  - by patient endurance
  lexicon: BDAG
  rationale: κατά with the accusative here expresses manner or norm. 'By perseverance'
    is natural English and preserves the durative sense of steady endurance without
    over-expanding the phrase.
- source_word: ἔργου ἀγαθοῦ
  chosen: in doing good
  alternatives:
  - in good work
  - of good work
  lexicon: BDAG
  rationale: Although the Greek uses the singular 'good work,' the idiomatic sense
    in this construction is persistence in the practice of doing what is good. 'In
    doing good' communicates that sense clearly in modern English while remaining
    close to the source.
- source_word: ζητοῦσιν
  chosen: seek
  alternatives:
  - are seeking
  - strive for
  lexicon: BDAG
  rationale: The participle denotes an ongoing orientation or pursuit. 'Seek' preserves
    the lexical force and works idiomatically in English without adding interpretive
    intensity.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the standard and most theologically transparent rendering,
    fitting Paul''s moral-eschatological context.'
- source_word: τιμήν
  chosen: honor
  alternatives:
  - esteem
  lexicon: BDAG
  rationale: '''Honor'' is the most direct equivalent and pairs naturally with ''glory''
    in English, preserving the rhetorical balance of the Greek list.'
- source_word: ἀφθαρσίαν
  chosen: immortality
  alternatives:
  - incorruptibility
  - imperishability
  lexicon: BDAG
  rationale: The term can denote incorruptibility or imperishability, but in this
    eschatological context 'immortality' is the clearest natural English rendering
    for contemporary readers.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard rendering and best conveys both the durative and
    eschatological sense of the phrase in Pauline usage.
