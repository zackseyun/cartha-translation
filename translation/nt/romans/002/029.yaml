id: ROM.2.29
reference: Romans 2:29
source:
  edition: SBLGNT
  text: ἀλλ’ ὁ ἐν τῷ κρυπτῷ Ἰουδαῖος, καὶ περιτομὴ καρδίας ἐν πνεύματι οὐ γράμματι,
    οὗ ὁ ἔπαινος οὐκ ἐξ ἀνθρώπων ἀλλ’ ἐκ τοῦ θεοῦ.
translation:
  text: But the Jew is one inwardly, and circumcision is of the heart—by the Spirit,
    not by the letter—whose praise is not from people but from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''in spirit,'' that is, in inward spiritual reality rather than outward
      written code.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ κρυπτῷ
  chosen: inwardly
  alternatives:
  - in secret
  - in the hidden part
  - in what is hidden
  lexicon: BDAG
  rationale: Idiomatic English best conveys the inward/hidden contrast Paul is making,
    rather than a merely spatial or secretive sense.
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Romans 2 the contrast is covenantal/religious rather than geographic,
    so 'Jew' fits the argument better than 'Judean'.
- source_word: περιτομὴ καρδίας
  chosen: circumcision is of the heart
  alternatives:
  - heart-circumcision
  - circumcision of the heart
  lexicon: BDAG
  rationale: This preserves the metaphor and reads naturally in English while making
    clear that the true circumcision Paul describes is heart-level, not merely physical.
- source_word: ἐν πνεύματι
  chosen: by the Spirit
  alternatives:
  - in spirit
  - by spirit
  lexicon: BDAG
  rationale: Capitalized 'Spirit' is preferred because the contrast with 'letter'
    in Pauline usage commonly points to the Holy Spirit's work rather than merely
    human inwardness. 'By' conveys means naturally in English.
- source_word: οὐ γράμματι
  chosen: not by the letter
  alternatives:
  - not in letter
  - not by written code
  lexicon: BDAG
  rationale: '''Letter'' preserves the lexical correspondence with γράμμα and the
    established Pauline contrast between Spirit and letter, without over-paraphrasing.'
- source_word: οὗ ὁ ἔπαινος
  chosen: whose praise
  alternatives:
  - his praise
  - the praise of whom
  lexicon: BDAG
  rationale: '''Whose praise'' is the most natural concise rendering linking back
    to the inward Jew described in the verse.'
- source_word: ἐξ ἀνθρώπων
  chosen: from people
  alternatives:
  - from men
  - from human beings
  lexicon: BDAG
  rationale: The plural is generic, so 'people' communicates the human source accurately
    in natural modern English without implying only males.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the one God
  lexicon: BDAG
  rationale: Straightforward rendering of the source phrase; no expansion is warranted
    by the Greek.
