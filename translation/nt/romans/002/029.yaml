theological_decisions:
- issue: Whether πνεύματι refers to the Holy Spirit or to the human spirit
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the human spirit
  - spiritual inwardness in a general sense
  rationale: In Paul's contrast 'Spirit' versus 'letter,' especially in close conceptual
    parallel to later Pauline usage, the Holy Spirit is the more likely referent.
    Because the phrase is not fully unambiguous, the alternative is preserved in a
    footnote.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine.
