id: ROM.2.19
reference: Romans 2:19
source:
  edition: SBLGNT
  text: πέποιθάς τε σεαυτὸν ὁδηγὸν εἶναι τυφλῶν, φῶς τῶν ἐν σκότει,
translation:
  text: And you are convinced that you yourself are a guide to the blind, a light
    to those in darkness,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πέποιθάς
  chosen: are convinced
  alternatives:
  - are confident
  - are persuaded
  lexicon: BDAG
  rationale: The perfect form conveys a settled state of confidence or persuasion.
    “Are convinced” fits the introspective, self-assured tone of Paul’s charge better
    than the slightly weaker “are confident.”
- source_word: τε
  chosen: And
  alternatives:
  - and also
  - indeed
  rationale: The particle links this clause with the preceding accusations. Simple
    “And” preserves the connective force without overtranslating.
- source_word: σεαυτὸν
  chosen: you yourself
  alternatives:
  - yourself
  lexicon: BDAG
  rationale: The reflexive pronoun is retained with emphasis. “You yourself” brings
    out the self-regarding force present in the Greek.
- source_word: ὁδηγὸν
  chosen: a guide
  alternatives:
  - leader
  - one who leads
  lexicon: BDAG
  rationale: “Guide” is the most natural and precise English equivalent in this metaphorical
    context.
- source_word: τυφλῶν
  chosen: the blind
  alternatives:
  - blind people
  lexicon: BDAG
  rationale: The genitive depends on “guide” and is idiomatically rendered “guide
    to the blind.” “The blind” is concise, natural English and preserves the representative
    force of the Greek.
- source_word: φῶς
  chosen: a light
  alternatives:
  - light
  lexicon: BDAG
  rationale: The noun is metaphorical here. “A light” is standard and clear English
    for one who gives guidance or illumination.
- source_word: τῶν ἐν σκότει
  chosen: those in darkness
  alternatives:
  - those in the darkness
  - those in dark places
  lexicon: BDAG
  rationale: This phrase is best rendered personally rather than woodenly. “Those
    in darkness” preserves the metaphor and reads naturally in English.
