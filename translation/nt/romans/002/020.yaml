id: ROM.2.20
reference: Romans 2:20
source:
  edition: SBLGNT
  text: παιδευτὴν ἀφρόνων, διδάσκαλον νηπίων, ἔχοντα τὴν μόρφωσιν τῆς γνώσεως καὶ
    τῆς ἀληθείας ἐν τῷ νόμῳ—
translation:
  text: an instructor of the foolish, a teacher of infants, having in the law the
    embodiment of knowledge and truth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the form of knowledge and truth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδευτὴν
  chosen: instructor
  alternatives:
  - corrector
  - trainer
  lexicon: BDAG
  rationale: παιδευτής denotes one who trains or disciplines. “Instructor” fits the
    educational boast in context without overemphasizing punishment.
- source_word: ἀφρόνων
  chosen: the foolish
  alternatives:
  - the senseless
  - the unwise
  lexicon: BDAG
  rationale: ἄφρων commonly means foolish or senseless. “The foolish” is natural English
    and preserves the contemptuous tone of the speaker’s self-description.
- source_word: διδάσκαλον
  chosen: teacher
  alternatives:
  - master
  lexicon: BDAG
  rationale: The standard sense is “teacher.” This is the clearest and most natural
    rendering here.
- source_word: νηπίων
  chosen: infants
  alternatives:
  - children
  - babes
  lexicon: BDAG
  rationale: νήπιος literally refers to infants or very young children, though it
    can be figurative for the immature. “Infants” preserves the literal metaphor and
    rhetorical sharpness.
- source_word: ἔχοντα
  chosen: having
  alternatives:
  - possessing
  lexicon: BDAG
  rationale: The present participle is straightforwardly rendered “having,” preserving
    the Greek structure and connection to the preceding accusative descriptors.
- source_word: μόρφωσιν
  chosen: embodiment
  alternatives:
  - form
  - outline
  lexicon: BDAG
  rationale: μόρφωσις can mean form, embodiment, or formulation. “Embodiment” best
    conveys that the law is viewed as the concrete expression of knowledge and truth,
    not merely an external shape.
- source_word: γνώσεως
  chosen: knowledge
  alternatives: []
  lexicon: BDAG
  rationale: γνῶσις is naturally rendered “knowledge” here and pairs closely with
    ἀλήθεια.
- source_word: ἀληθείας
  chosen: truth
  alternatives: []
  lexicon: BDAG
  rationale: ἀλήθεια is best rendered “truth,” preserving the familiar Pauline pairing
    with knowledge.
- source_word: ἐν τῷ νόμῳ
  chosen: in the law
  alternatives:
  - in the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish law as the sphere in which this claimed
    embodiment is found. “In the law” preserves the prepositional force and avoids
    adding interpretive emphasis beyond the text.
