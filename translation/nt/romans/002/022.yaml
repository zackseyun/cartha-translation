id: ROM.2.22
reference: Romans 2:22
source:
  edition: SBLGNT
  text: ὁ λέγων μὴ μοιχεύειν μοιχεύεις; ὁ βδελυσσόμενος τὰ εἴδωλα ἱεροσυλεῖς;
translation:
  text: You who say, “Do not commit adultery,” do you commit adultery? You who detest
    idols, do you rob temples?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, “do you commit sacrilege?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  chosen: You who say
  alternatives:
  - the one who says
  - you, the one saying
  lexicon: BDAG
  rationale: The article with present participle is used substantivally to address
    a representative person. 'You who say' brings the participial force into natural
    English while preserving Paul's direct rhetorical address.
- source_word: μὴ μοιχεύειν
  chosen: Do not commit adultery
  alternatives:
  - Do not adulterate
  - Do not be adulterous
  lexicon: BDAG
  rationale: 'The infinitive with μή expresses the content of what is said: a prohibition
    against adultery. ''Commit adultery'' is the standard, precise English equivalent
    for μοιχεύω.'
- source_word: μοιχεύεις
  chosen: do you commit adultery
  alternatives:
  - are you committing adultery
  lexicon: BDAG
  rationale: Present indicative in a rhetorical question. English simple present best
    fits the generic accusatory force of Paul's diatribe style.
- source_word: ὁ βδελυσσόμενος
  chosen: You who detest
  alternatives:
  - you who abhor
  - the one who loathes
  lexicon: BDAG
  rationale: βδελύσσομαι denotes strong revulsion. 'Detest' is idiomatic modern English
    and preserves the force without sounding archaic.
- source_word: τὰ εἴδωλα
  chosen: idols
  alternatives:
  - images
  - idol-images
  lexicon: BDAG
  rationale: εἴδωλα in this context refers to cult images/idols. 'Idols' is the clear
    and conventional rendering.
- source_word: ἱεροσυλεῖς
  chosen: do you rob temples
  alternatives:
  - do you commit sacrilege
  - do you plunder temples
  lexicon: BDAG
  rationale: ἱεροσυλέω most concretely means robbing temples or temple property. Because
    the immediate context mentions idols, the concrete sense 'rob temples' best preserves
    the irony and historical texture; the broader sense 'commit sacrilege' is preserved
    in a footnote.
