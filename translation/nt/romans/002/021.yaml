id: ROM.2.21
reference: Romans 2:21
source:
  edition: SBLGNT
  text: ὁ οὖν διδάσκων ἕτερον σεαυτὸν οὐ διδάσκεις; ὁ κηρύσσων μὴ κλέπτειν κλέπτεις;
translation:
  text: You, therefore, who teach another, do you not teach yourself? You who proclaim,
    “Do not steal,” do you steal?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding argument; “therefore”
    preserves the logical force more clearly than the looser “then.”
- source_word: διδάσκων
  chosen: who teach
  alternatives:
  - teaching
  - who instruct
  lexicon: BDAG
  rationale: Rendered as a substantival participle with an English relative clause
    for naturalness while preserving the ongoing characteristic sense.
- source_word: ἕτερον
  chosen: another
  alternatives:
  - someone else
  - others
  lexicon: BDAG
  rationale: The singular object is best preserved as “another,” matching the Greek
    form without unnecessarily broadening to plural.
- source_word: σεαυτὸν
  chosen: yourself
  lexicon: BDAG
  rationale: Direct reflexive object; “yourself” keeps the sharp rhetorical contrast
    between teaching others and failing to teach oneself.
- source_word: οὐ διδάσκεις;
  chosen: do you not teach
  alternatives:
  - do you not instruct
  lexicon: BDAG
  rationale: The negated question expects a rebuking force in context; “do you not
    teach” preserves both the interrogative form and the irony.
- source_word: κηρύσσων
  chosen: who proclaim
  alternatives:
  - who preach
  - who announce
  lexicon: BDAG
  rationale: “Proclaim” conveys public heralding without importing overly church-specific
    connotations that “preach” may carry in modern English.
- source_word: μὴ κλέπτειν
  chosen: Do not steal
  alternatives:
  - not to steal
  lexicon: BDAG
  rationale: As reported proclamation content, it is most idiomatic in English as
    a direct prohibition in quotation marks rather than an infinitival phrase.
- source_word: κλέπτεις;
  chosen: do you steal
  lexicon: BDAG
  rationale: A simple present rhetorical question best captures Paul's direct accusatory
    style.
