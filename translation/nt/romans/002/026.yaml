id: ROM.2.26
reference: Romans 2:26
source:
  edition: SBLGNT
  text: ἐὰν οὖν ἡ ἀκροβυστία τὰ δικαιώματα τοῦ νόμου φυλάσσῃ, ⸀οὐχ ἡ ἀκροβυστία αὐτοῦ
    εἰς περιτομὴν λογισθήσεται;
translation:
  text: So then, if the uncircumcised man keeps the requirements of the law, will
    not his uncircumcision be counted as circumcision?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'if the uncircumcision keeps ... will not his uncircumcision
      be counted as circumcision?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκροβυστία
  chosen: the uncircumcised man
  alternatives:
  - uncircumcision
  - the uncircumcised person
  lexicon: BDAG
  rationale: Although the noun literally denotes 'uncircumcision,' Paul's usage here
    is personal and is reinforced by αὐτοῦ ('his'). 'The uncircumcised man' brings
    the referent into natural English while preserving the Jewish-Gentile contrast
    in context.
- source_word: δικαιώματα
  chosen: requirements
  alternatives:
  - righteous requirements
  - ordinances
  - statutes
  lexicon: BDAG
  rationale: '''Requirements'' best captures the plural sense of what the law demands
    in clear modern English without sounding overly technical. ''Righteous requirements''
    is possible but would add emphasis not explicit in the immediate phrase.'
- source_word: νόμου
  chosen: of the law
  alternatives:
  - of Law
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of the law.' Lowercase 'law' is standard
    English here and fits Paul's argument about the Mosaic law.
- source_word: φυλάσσῃ
  chosen: keeps
  alternatives:
  - observes
  - guards
  lexicon: BDAG
  rationale: '''Keeps'' is idiomatic English for obeying commandments or legal requirements
    and matches the context better than the more literal but less natural ''guards.'''
- source_word: λογισθήσεται
  chosen: be counted
  alternatives:
  - be reckoned
  - be regarded
  lexicon: BDAG
  rationale: '''Be counted'' is clear, faithful, and preserves Paul''s accounting/imputation
    language without sounding archaic.'
- source_word: εἰς περιτομήν
  chosen: as circumcision
  alternatives:
  - for circumcision
  - into circumcision
  lexicon: BDAG
  rationale: In this idiom, εἰς expresses result or status. 'As circumcision' communicates
    the sense that his uncircumcised state is reckoned in the category of circumcision.
- source_word: οὐχ
  chosen: will not ... ?
  alternatives:
  - is it not the case that ... ?
  lexicon: Greek grammar
  rationale: The negative particle introduces a question expecting a positive answer.
    English is best served by the rhetorical form 'will not ... ?'.
