id: ROM.2.10
reference: Romans 2:10
source:
  edition: SBLGNT
  text: δόξα δὲ καὶ τιμὴ καὶ εἰρήνη παντὶ τῷ ἐργαζομένῳ τὸ ἀγαθόν, Ἰουδαίῳ τε πρῶτον
    καὶ Ἕλληνι·
translation:
  text: but glory and honor and peace to everyone who does good, to the Jew first
    and also to the Greek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "what is good."
    reason: lexical_alternative
  - marker: b
    text: '"Greek" here likely means non-Jew more broadly; that is, Gentile.'
    reason: cultural_note
lexical_decisions:
- source_word: δόξα
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: '"Glory" is the standard and most natural rendering here, preserving
    both honorific weight and eschatological reward language.'
- source_word: τιμή
  chosen: honor
  alternatives:
  - value
  - esteem
  lexicon: BDAG
  rationale: '"Honor" fits the paired reward language with δόξα and is the normal
    English equivalent in this context.'
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '"Peace" preserves the broad biblical sense without over-specifying whether
    the emphasis is internal, social, or covenantal.'
- source_word: παντὶ τῷ ἐργαζομένῳ
  chosen: to everyone who does
  alternatives:
  - to everyone who works
  - to everyone who practices
  lexicon: BDAG
  rationale: The participial construction denotes the person characterized by doing
    something. "Everyone who does" is clear modern English and preserves the ongoing,
    characteristic sense without sounding wooden.
- source_word: τὸ ἀγαθόν
  chosen: good
  alternatives:
  - what is good
  lexicon: BDAG
  rationale: The article plus adjective means "the good/what is good." In idiomatic
    English after "does," simply "good" communicates the sense naturally. The fuller
    alternative is possible but less smooth.
- source_word: Ἰουδαίῳ
  chosen: the Jew
  alternatives:
  - the Jewish person
  lexicon: BDAG
  rationale: '"Jew" is the direct and standard rendering of Ἰουδαῖος here. The singular
    with article is representative, and English can mirror that naturally.'
- source_word: πρῶτον
  chosen: first
  alternatives:
  - in the first place
  lexicon: BDAG
  rationale: '"First" preserves the concise Greek and fits Paul''s recurring salvation-historical
    ordering in Romans without adding explanation to the main text.'
- source_word: Ἕλληνι
  chosen: the Greek
  alternatives:
  - the Gentile
  lexicon: BDAG
  rationale: Paul often uses "Jew and Greek" as a set phrase. "Greek" keeps the source
    wording; the broader ethnic-religious sense can be clarified in a footnote.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding statement of wrath and distress
    in verse 9, so "but" best brings out the rhetorical opposition.
