theological_decisions:
- issue: Meaning of Ἕλληνι in Paul's Jew/Greek contrast
  chosen_reading: Rendered as "the Greek" in the main text, with the broader sense
    "Gentile" noted in a footnote.
  alternative_readings:
  - the Gentile
  rationale: The Greek term is literally "Greek," but in Romans this contrast often
    functions as Jew versus non-Jew more generally. Keeping "Greek" preserves the
    source expression while the footnote preserves the interpretive breadth.
  doctrine_reference: Preserve theological tension rather than resolve it.
