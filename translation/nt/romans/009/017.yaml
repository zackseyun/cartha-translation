theological_decisions:
- issue: Meaning of ἐξήγειρά σε in relation to Pharaoh and divine sovereignty
  chosen_reading: Rendered as 'I raised you up' with intentionally broad force, referring
    to God's bringing Pharaoh forward/preserving him for this purpose rather than
    narrowing it to creation, resurrection, or mere survival alone.
  alternative_readings:
  - I preserved you
  - I caused you to stand
  - I brought you onto the stage for this purpose
  rationale: The verse is often central in debates over divine sovereignty and human
    responsibility. The Greek, echoing the Exodus citation tradition, supports a broad
    sense of God's sovereign positioning of Pharaoh. The translation preserves that
    claim without importing a narrower doctrinal conclusion not explicitly stated
    by the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
