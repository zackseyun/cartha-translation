id: ROM.9.17
reference: Romans 9:17
source:
  edition: SBLGNT
  text: λέγει γὰρ ἡ γραφὴ τῷ Φαραὼ ὅτι Εἰς αὐτὸ τοῦτο ἐξήγειρά σε ὅπως ἐνδείξωμαι
    ἐν σοὶ τὴν δύναμίν μου, καὶ ὅπως διαγγελῇ τὸ ὄνομά μου ἐν πάσῃ τῇ γῇ.
translation:
  text: 'For the Scripture says to Pharaoh, “For this very purpose I raised you up:
    that I might display my power in you, and that my name might be proclaimed in
    all the earth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I preserved you” / “I caused you to stand,” reflecting the broader sense
      of the verb in the Exodus citation context.
    reason: lexical_alternative
  - marker: b
    text: “My name” refers to God's revealed renown and reputation, not merely a spoken
      label.
    reason: cultural_note
lexical_decisions:
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - Scripture
  lexicon: BDAG
  rationale: Definite singular is retained, reflecting Paul's personification of the
    written Scripture as speaking. English idiom prefers 'the Scripture' here.
- source_word: λέγει ... τῷ Φαραώ
  chosen: says to Pharaoh
  alternatives:
  - said to Pharaoh
  - speaks to Pharaoh
  lexicon: BDAG
  rationale: Present tense λέγει is kept as a literary/historical present, a common
    NT way of citing Scripture. 'Says to Pharaoh' is natural English and preserves
    the personification.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: BDAG
  rationale: Maintains the explanatory connection with the preceding argument.
- source_word: Εἰς αὐτὸ τοῦτο
  chosen: For this very purpose
  alternatives:
  - For this very thing
  - For this reason
  lexicon: BDAG
  rationale: Idiomatic rendering of the emphatic expression, preserving the force
    of purpose and emphasis.
- source_word: ἐξήγειρά σε
  chosen: I raised you up
  alternatives:
  - I brought you forward
  - I caused you to stand
  - I preserved you
  lexicon: BDAG
  rationale: The Greek verb can mean to raise up, bring on the scene, or cause to
    appear/stand. In this Exodus citation context, 'raised you up' is the standard
    and suitably broad rendering, covering God's sovereign appointment/preservation
    of Pharaoh for this role without over-specifying the mechanism.
- source_word: ὅπως
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'That' reads smoothly in English while preserving
    purposive force in both clauses.
- source_word: ἐνδείξωμαι
  chosen: I might display
  alternatives:
  - I might show
  - I might demonstrate
  lexicon: BDAG
  rationale: Middle subjunctive with sense of showing forth or demonstrating. 'Display'
    communicates public manifestation clearly in contemporary English.
- source_word: ἐν σοὶ
  chosen: in you
  alternatives:
  - through you
  - on you
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in,' since the wording points to God's
    power being shown in Pharaoh's case/person. 'Through you' is interpretive and
    potentially shifts the nuance.
- source_word: τὴν δύναμίν μου
  chosen: my power
  alternatives:
  - my might
  lexicon: BDAG
  rationale: Standard rendering of δύναμις; clear, consistent, and contextually apt.
- source_word: καὶ ὅπως διαγγελῇ
  chosen: and that ... might be proclaimed
  alternatives:
  - and so that ... might be announced
  - and that ... might be made known
  lexicon: BDAG
  rationale: Passive subjunctive indicates broad proclamation. 'Proclaimed' preserves
    the public heralding sense better than the more generic 'made known.'
- source_word: τὸ ὄνομά μου
  chosen: my name
  lexicon: BDAG
  rationale: Literal rendering is best; in biblical usage 'name' carries the sense
    of God's revealed reputation and renown without needing expansion in the main
    text.
- source_word: ἐν πάσῃ τῇ γῇ
  chosen: in all the earth
  alternatives:
  - throughout all the earth
  - in all the land
  lexicon: BDAG
  rationale: Given the universal scope of the statement and Paul's use of the Exodus
    text, 'earth' is preferable to 'land.' 'In all the earth' is natural and preserves
    the global scope.
