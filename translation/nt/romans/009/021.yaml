theological_decisions:
- issue: Whether to render the potter's ἐξουσία as 'authority' or 'right' in a passage
    often invoked in debates over divine sovereignty and human responsibility
  chosen_reading: authority
  alternative_readings:
  - right
  - power
  rationale: '''Authority'' best matches ἐξουσία and preserves the text''s claim about
    rightful prerogative without importing a more developed doctrinal formulation.
    It leaves intact the theological tension in Paul''s argument rather than resolving
    debates about determinism or freedom.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether to interpret εἰς τιμὴν / εἰς ἀτιμίαν as explicit functional categories
    ('for honorable/common use') or retain the more literal honor-shame language
  chosen_reading: for honor ... for dishonor
  alternative_readings:
  - for honorable use ... for common use
  - for noble purposes ... for ignoble purposes
  rationale: The Greek uses honor-shame terminology directly. Retaining that wording
    avoids narrowing Paul's point to household utility alone and keeps the metaphor
    open at the level expressed by the text.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
