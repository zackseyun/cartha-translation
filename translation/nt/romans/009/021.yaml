id: ROM.9.21
reference: Romans 9:21
source:
  edition: SBLGNT
  text: ἢ οὐκ ἔχει ἐξουσίαν ὁ κεραμεὺς τοῦ πηλοῦ ἐκ τοῦ αὐτοῦ φυράματος ποιῆσαι ὃ
    μὲν εἰς τιμὴν σκεῦος ὃ δὲ εἰς ἀτιμίαν;
translation:
  text: Or does the potter not have authority over the clay, to make from the same
    lump one vessel for honor and another for dishonor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does the potter not have the right over the clay.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the same batch' or 'from the same mass.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one vessel for honorable use and another for common use.'
    reason: alternative_reading
  - marker: d
    text: The imagery echoes Old Testament potter-clay passages such as Isaiah 29:16;
      45:9; Jeremiah 18:1–6.
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or rather
  - Or indeed
  lexicon: BDAG
  rationale: Introduces the next rhetorical question in Paul's argument; simple 'Or'
    best preserves the argumentative flow without adding emphasis not explicit in
    the Greek.
- source_word: οὐκ ἔχει ἐξουσίαν
  chosen: does ... not have authority
  alternatives:
  - has no right
  - does ... not have the right
  - does ... not have power
  lexicon: BDAG
  rationale: The phrase expresses rightful authority or jurisdiction rather than mere
    ability. 'Authority' preserves the legal-relational sense of ἐξουσία while remaining
    natural English.
- source_word: ὁ κεραμεὺς
  chosen: the potter
  lexicon: BDAG
  rationale: Standard and precise rendering for the artisan shaping clay; also preserves
    the allusion to prophetic potter-clay imagery.
- source_word: τοῦ πηλοῦ
  chosen: over the clay
  alternatives:
  - with the clay
  - of the clay
  lexicon: BDAG
  rationale: Though formally a genitive after ἐξουσία, English idiom with 'authority'
    is best expressed as 'authority over the clay.' This conveys the governing relationship
    implied by the construction.
- source_word: ἐκ τοῦ αὐτοῦ φυράματος
  chosen: from the same lump
  alternatives:
  - from the same batch
  - from the same mass
  lexicon: BDAG
  rationale: φύραμα refers to that which has been mixed into a mass or lump, especially
    dough or clay mixture. 'Lump' is traditional but also accurate and clear here.
- source_word: ποιῆσαι
  chosen: to make
  alternatives:
  - to fashion
  lexicon: BDAG
  rationale: Simple infinitive of making/producing. 'Make' is the most straightforward
    equivalent; 'fashion' is possible but slightly more interpretive and elevated.
- source_word: ὃ μὲν ... ὃ δὲ
  chosen: one ... and another
  alternatives:
  - one ... but another
  - one indeed ... and another
  lexicon: BDAG
  rationale: This correlates two contrasting products. 'One ... and another' gives
    clear English contrast without over-literalizing μέν...δέ.
- source_word: εἰς τιμὴν
  chosen: for honor
  alternatives:
  - for honorable use
  - for honor's sake
  lexicon: BDAG
  rationale: τιμή here denotes honor/status. 'For honor' preserves the concise Greek
    expression and allows the reader to hear the category without prematurely specifying
    function.
- source_word: σκεῦος
  chosen: vessel
  alternatives:
  - container
  - object
  - article
  lexicon: BDAG
  rationale: '''Vessel'' is the most natural equivalent in potter imagery and preserves
    biblical diction without sounding archaic in this context.'
- source_word: εἰς ἀτιμίαν
  chosen: for dishonor
  alternatives:
  - for common use
  - for ignoble use
  - for disgrace
  lexicon: BDAG
  rationale: ἀτιμία is the opposite of τιμή, meaning dishonor/disgrace. 'For dishonor'
    preserves the lexical contrast directly. More interpretive renderings like 'common
    use' reflect contextual inferences from potter imagery but are not stated explicitly
    here.
