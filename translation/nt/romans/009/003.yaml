id: ROM.9.3
reference: Romans 9:3
source:
  edition: SBLGNT
  text: ηὐχόμην γὰρ ⸂ἀνάθεμα εἶναι αὐτὸς ἐγὼ⸃ ἀπὸ τοῦ Χριστοῦ ὑπὲρ τῶν ἀδελφῶν μου
    τῶν συγγενῶν μου κατὰ σάρκα,
translation:
  text: For I could wish that I myself were accursed, cut off from the Messiah, for
    the sake of my brothers, my kinsmen according to the flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accursed from Christ' or 'under a curse, separated from Christ.' The
      Greek expression combines the idea of being under a curse with separation from
      the Messiah.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my brothers'; in context Paul refers to his fellow Israelites, his
      ethnic kindred.
    reason: cultural_note
  - marker: c
    text: '''According to the flesh'' here means by physical descent or ethnic lineage,
      not ''sinful nature.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὐχόμην
  chosen: I could wish
  alternatives:
  - I was wishing
  - I could pray
  - I myself was wishing
  lexicon: BDAG
  rationale: Imperfect middle of εὔχομαι here is idiomatic and expresses a hypothetical
    or potential wish rather than a simple past action. 'I could wish' best captures
    Paul's emotionally charged, unreal or difficult-to-state sentiment in context.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Maintains the explanatory connection to the preceding statement and preserves
    Paul's argumentative flow.
- source_word: ἀνάθεμα
  chosen: accursed
  alternatives:
  - anathema
  - under a curse
  lexicon: BDAG
  rationale: The noun denotes being devoted to destruction or under divine curse.
    'Accursed' is accessible English with strong theological weight. 'Anathema' is
    more traditional but less transparent for modern readers.
- source_word: εἶναι
  chosen: were
  alternatives:
  - to be
  lexicon: BDAG
  rationale: With ηὐχόμην, English idiom prefers a finite clause, 'that I myself were,'
    rather than the more wooden infinitival 'to be.'
- source_word: αὐτὸς ἐγὼ
  chosen: I myself
  alternatives:
  - myself
  - I personally
  lexicon: BDAG
  rationale: The emphatic pronoun plus explicit subject heightens Paul's personal
    identification with the wish; 'I myself' preserves the emphasis naturally.
- source_word: ἀπὸ τοῦ Χριστοῦ
  chosen: cut off from the Messiah
  alternatives:
  - from Christ
  - separated from the Messiah
  lexicon: BDAG
  rationale: ἀπό marks separation. 'Cut off from' makes the force of exclusion clearer
    in English than bare 'from.' Χριστοῦ is rendered 'the Messiah' per project policy
    for title usage rather than name-like 'Christ'.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title, not merely a name-like designation, so 'Messiah' preserves
    the messianic sense in keeping with project guidance.
- source_word: ὑπὲρ
  chosen: for the sake of
  alternatives:
  - for
  - on behalf of
  lexicon: BDAG
  rationale: Conveys benefactive force clearly and naturally in this sacrificial context.
- source_word: τῶν ἀδελφῶν μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my brethren
  lexicon: BDAG
  rationale: ἀδελφῶν is grammatically masculine plural. Here Paul immediately specifies
    ethnic kinship, and the wording should remain gender-accurate to the source while
    allowing a footnote about inclusive reference if needed. 'Brothers' is the project's
    preferred gender-accurate rendering.
- source_word: τῶν συγγενῶν μου
  chosen: my kinsmen
  alternatives:
  - my relatives
  - my kindred
  lexicon: BDAG
  rationale: συγγενῶν in context refers to Paul's fellow Jews as ethnic kindred. 'Kinsmen'
    preserves the collective, lineage-based sense better than the more domestic-sounding
    'relatives.'
- source_word: κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - by physical descent
  - according to the body
  lexicon: BDAG
  rationale: Here σάρκα refers to physical/ethnic descent, not sinful nature. The
    formal phrase 'according to the flesh' is a standard Pauline expression and remains
    intelligible; it preserves intertextual consistency while signaling literal rather
    than metaphorical sarx.
