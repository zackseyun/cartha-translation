theological_decisions:
- issue: Whether Paul's statement describes an actual prayer/request or a hypothetical
    wish
  chosen_reading: A hypothetical or potential wish is reflected in 'I could wish'
    rather than a flat past statement.
  alternative_readings:
  - I was wishing
  - I prayed
  rationale: This avoids overstating that Paul literally prayed to be separated from
    Messiah while preserving the intensity of his expressed willingness for Israel's
    sake.
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: Rendered as 'the Messiah' in the main text.
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Christological titles where context
    supports title force. Here the title sense is fully appropriate and theologically
    transparent.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah where title;
    Christ where name-like'
- issue: Sense of σάρξ in κατὰ σάρκα
  chosen_reading: 'Literal/ethnic sense: ''according to the flesh.'''
  alternative_readings:
  - sinful nature
  rationale: In this context Paul is identifying ethnic kinship, not moral anthropology.
    The translation preserves that distinction and avoids importing Pauline 'sinful
    nature' language where it does not belong.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ = flesh (literal) / sinful
    nature (metaphorical), context-dependent'
