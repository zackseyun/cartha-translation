id: ROM.9.31
reference: Romans 9:31
source:
  edition: SBLGNT
  text: Ἰσραὴλ δὲ διώκων νόμον δικαιοσύνης εἰς ⸀νόμον οὐκ ἔφθασεν.
translation:
  text: But Israel, though pursuing a law of righteousness, did not attain that law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''justice'': ''a law of justice.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'did not reach it' or 'did not attain to the law.' The Greek phrase is
      compressed and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰσραήλ
  chosen: Israel
  rationale: Standard transliteration of the proper name, referring here to ethnic/national
    Israel in Paul's argument.
- source_word: δέ
  chosen: But
  alternatives:
  - and
  - now
  rationale: Marks contrast with the preceding statement about Gentiles; 'but' best
    carries the adversative force in natural English.
- source_word: διώκων
  chosen: though pursuing
  alternatives:
  - pursuing
  - seeking
  - striving for
  lexicon: BDAG
  rationale: The participle denotes active pursuit. 'Though pursuing' makes the concessive
    sense explicit in English in light of the negative outcome that follows, without
    overparaphrasing.
- source_word: νόμον δικαιοσύνης
  chosen: a law of righteousness
  alternatives:
  - the law of righteousness
  - a law that leads to righteousness
  - a righteous law
  lexicon: BDAG
  rationale: 'Anarthrous νόμον is best rendered ''a law'' rather than ''the law''
    here. The genitive δικαιοσύνης is taken as attributive or epexegetical: a law
    characterized by or pertaining to righteousness. This preserves Paul''s wording
    without importing an interpretive expansion.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine guidance, δικαιοσύνη defaults to 'righteousness' in Pauline
    usage, while preserving 'justice' as an alternative in a footnote where helpful.
- source_word: εἰς νόμον
  chosen: that law
  alternatives:
  - to the law
  - to a law
  - to the goal of the law
  lexicon: BDAG
  rationale: 'The phrase is textually and syntactically difficult. Given the repeated
    νόμον and the verb ἔφθασεν (''attained/reached''), ''that law'' best captures
    the resumptive sense in context: Israel did not arrive at the law it was pursuing.
    More expansive readings such as ''to the goal of the law'' interpret beyond the
    wording.'
- source_word: οὐκ ἔφθασεν
  chosen: did not attain
  alternatives:
  - did not reach
  - did not arrive at
  lexicon: BDAG
  rationale: The aorist with negation states failure to reach the intended objective.
    'Attain' reads naturally in English and fits Paul's argument about failing to
    obtain righteousness.
