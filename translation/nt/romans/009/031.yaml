theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrinal guidance specifies 'righteousness' as the default for δικαιοσύνη
    in Pauline passages, while preserving 'justice' as an alternative. Here 'righteousness'
    better matches Paul's argument about right standing before God, though 'justice'
    remains a lexical possibility.
