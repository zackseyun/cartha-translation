theological_decisions:
- issue: Whether Paul's denial should be rendered in a way that preserves the rhetorical
    objection without importing a specific theological system into Romans 9.
  chosen_reading: The verse is translated as a rhetorical denial of any injustice
    in God, without adding explanatory language about election, reprobation, or divine
    fairness beyond the Greek text itself.
  alternative_readings:
  - A more interpretive rendering could specify 'Is God unjust?'
  - A more formal rendering could retain 'unrighteousness' and 'May it never be!'
  rationale: The Greek states the objection and emphatic rejection tersely. The translation
    preserves that tension and force while avoiding doctrinal expansion not explicit
    in the verse.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
