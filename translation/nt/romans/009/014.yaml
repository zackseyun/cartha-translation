id: ROM.9.14
reference: Romans 9:14
source:
  edition: SBLGNT
  text: Τί οὖν ἐροῦμεν; μὴ ἀδικία παρὰ τῷ θεῷ; μὴ γένοιτο·
translation:
  text: What then shall we say? Is there injustice with God? Certainly not!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unrighteousness.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''May it never be!'' A strongly emphatic denial; also commonly rendered
      ''By no means!'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  chosen: What then shall we say?
  alternatives:
  - What then are we to say?
  - What then will we say?
  lexicon: BDAG
  rationale: A standard Pauline transitional formula introducing an inference or objection.
    'Shall we say' is idiomatic and preserves the deliberative future force of ἐροῦμεν
    without sounding wooden.
- source_word: μὴ
  chosen: Is there
  alternatives:
  - Surely there is not
  - There is not, is there
  lexicon: BDAG
  rationale: In direct questions μή often marks a question expecting a negative answer.
    English conveys this best by phrasing the clause as a rhetorical question rather
    than mechanically reproducing the particle.
- source_word: ἀδικία
  chosen: injustice
  alternatives:
  - unrighteousness
  - wrongdoing
  lexicon: BDAG
  rationale: In this context Paul is denying unfairness or injustice in God’s dealings.
    'Injustice' is clearer and more idiomatic in modern English than 'unrighteousness,'
    while retaining the moral-judicial sense.
- source_word: παρὰ τῷ θεῷ
  chosen: with God
  alternatives:
  - on God's part
  - in God
  - before God
  lexicon: BDAG
  rationale: The prepositional phrase here idiomatically means 'with God' or 'on God's
    part.' 'With God' is concise and traditional while still natural in English.
- source_word: μὴ γένοιτο
  chosen: Certainly not!
  alternatives:
  - By no means!
  - May it never be!
  lexicon: BDAG
  rationale: Paul’s emphatic repudiation should sound forceful in contemporary English.
    'Certainly not!' preserves the strong denial without archaic wording. 'By no means!'
    remains a viable alternative, and 'May it never be!' is more formally literal
    but less idiomatic.
