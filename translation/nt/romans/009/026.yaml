theological_decisions:
- issue: Rendering of υἱοὶ in a representative plural
  chosen_reading: sons
  alternative_readings:
  - children
  - sons and daughters
  rationale: The source text uses υἱοὶ, not a generic τέκνα term. Rendering it 'sons'
    preserves the lexical form and possible inheritance/sonship overtones important
    in Pauline theology and the Hosea citation, while avoiding unnecessary doctrinal
    flattening. An inclusive alternative is worth noting in a footnote because the
    referent includes all those incorporated as God's people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
- issue: Covenantal identity in λαός μου
  chosen_reading: my people
  alternative_readings:
  - my own people
  rationale: '''My people'' is the standard covenant formula from the OT background
    and should be retained rather than paraphrased, since Paul is invoking Hosea''s
    restoration language.'
