id: ROM.9.26
reference: Romans 9:26
source:
  edition: SBLGNT
  text: καὶ ἔσται ἐν τῷ τόπῳ οὗ ἐρρέθη ⸀αὐτοῖς· Οὐ λαός μου ὑμεῖς, ἐκεῖ κληθήσονται
    υἱοὶ θεοῦ ζῶντος.
translation:
  text: And in the very place where it was said to them, ‘You are not my people,’
    there they will be called sons of the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of the living God.' The Greek reads 'sons,' which is retained
      in the main text to preserve the source wording and its sonship/inheritance
      resonance.
    reason: lexical_alternative
  - marker: b
    text: Quotation/allusion from Hos 1:10(2:1 LXX), using covenant-restoration language.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - And so
  - Then
  lexicon: BDAG
  rationale: Simple connective linking this citation to the preceding statement; 'And'
    preserves the flow without adding inferential force.
- source_word: ἔσται
  chosen: will be
  alternatives:
  - shall be
  - it will happen
  lexicon: BDAG
  rationale: Future of εἰμί used idiomatically to introduce what will occur; 'will
    be' is natural modern English and preserves the future sense.
- source_word: ἐν τῷ τόπῳ
  chosen: in the very place
  alternatives:
  - in the place
  - at the place
  lexicon: BDAG
  rationale: τόπος means 'place.' Adding 'very' brings out the emphatic correspondence
    in the citation context without over-paraphrasing.
- source_word: οὗ
  chosen: where
  alternatives:
  - in which
  - at which
  lexicon: BDAG
  rationale: Relative adverb naturally rendered 'where' in English.
- source_word: ἐρρέθη αὐτοῖς
  chosen: it was said to them
  alternatives:
  - it was spoken to them
  - they were told
  lexicon: BDAG
  rationale: Aorist passive of λέγω; impersonal passive is best preserved. 'It was
    said to them' is straightforward and formally close.
- source_word: Οὐ λαός μου ὑμεῖς
  chosen: You are not my people
  alternatives:
  - Not my people are you
  - You are no people of mine
  lexicon: BDAG
  rationale: The clause is a direct citation echoing Hosea. English requires reordering
    for clarity; 'my people' preserves covenantal language tied to the OT source.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Adverb marking emphatic reversal at the same location; 'there' is concise
    and idiomatic.
- source_word: κληθήσονται
  chosen: will be called
  alternatives:
  - will be named
  - will be called by God
  lexicon: BDAG
  rationale: Future passive of καλέω. 'Will be called' preserves the passive and leaves
    the implied divine agency unstated, as in the Greek.
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  - sons and daughters
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and evokes sonship language
    with covenantal and inheritance resonance. Per translation philosophy, gender-accurate
    wording is preferred over neutralization.
- source_word: θεοῦ ζῶντος
  chosen: of the living God
  alternatives:
  - of God who lives
  lexicon: BDAG
  rationale: Genitive construction with participle functioning adjectivally; the established
    and natural English rendering is 'the living God,' preserving the theological
    contrast with idols present in biblical usage.
