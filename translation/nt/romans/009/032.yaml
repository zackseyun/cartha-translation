id: ROM.9.32
reference: Romans 9:32
source:
  edition: SBLGNT
  text: διὰ τί; ὅτι οὐκ ἐκ πίστεως ἀλλ’ ὡς ἐξ ⸀ἔργων· ⸀προσέκοψαν τῷ λίθῳ τοῦ προσκόμματος,
translation:
  text: Why? Because it was not from faith, but as if from works. They stumbled over
    the stone of stumbling,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not by faith' or 'not on the basis of faith.' The Greek reads 'not from
      faith.'
    reason: lexical_alternative
  - marker: b
    text: Or 'but as though it were from works.' The wording preserves the nuance
      of 'as if.'
    reason: lexical_alternative
  - marker: c
    text: An allusion to Isaiah 8:14; compare also Isaiah 28:16 in the next verse.
    reason: cross_reference
  - marker: d
    text: Or 'the stone of offense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  chosen: Why?
  alternatives:
  - For what reason?
  lexicon: BDAG
  rationale: Idiomatic interrogative introducing Paul's explanation; concise English
    preserves the rhetorical force.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - That
  - For
  lexicon: BDAG
  rationale: Causal conjunction explaining the preceding question; 'Because' is the
    most natural English fit.
- source_word: οὐκ ἐκ πίστεως
  chosen: not from faith
  alternatives:
  - not by faith
  - not on the basis of faith
  lexicon: BDAG
  rationale: Preserves the preposition ἐκ ('from/out of') while remaining natural.
    Per doctrine, πίστις defaults to 'faith'; alternatives are noted because of the
    term's theological weight, though this instance is not the debated pistis-Christou
    construction.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Default rendering per doctrine. Here Paul contrasts faith with works
    as the basis of pursuing righteousness; 'faith' best matches the Pauline category
    without importing a more specific nuance.
- source_word: ἀλλ’ ὡς ἐξ ἔργων
  chosen: but as if from works
  alternatives:
  - but as though it were from works
  - but as from works
  lexicon: BDAG
  rationale: 'The particle ὡς softens the expression: Israel pursued it not actually
    from works in a strictly grammatical sense, but as though righteousness were attainable
    on that basis. ''As if from works'' preserves that nuance better than the flatter
    ''by works''.'
- source_word: ἔργων
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: Standard Pauline term in this contrast; 'works' preserves intertextual
    consistency in Romans.
- source_word: προσέκοψαν
  chosen: They stumbled over
  alternatives:
  - They struck against
  - They took offense at
  lexicon: BDAG
  rationale: Aorist verb from προσκόπτω in the metaphor of tripping over an obstacle.
    'Stumbled over' is clear modern English and preserves the concrete imagery.
- source_word: τῷ λίθῳ
  chosen: the stone
  alternatives:
  - the rock
  - the stone block
  lexicon: BDAG
  rationale: λίθος is straightforwardly 'stone.' 'Rock' would blur the specific Isaiah
    citation imagery in Paul's wording.
- source_word: τοῦ προσκόμματος
  chosen: of stumbling
  alternatives:
  - of offense
  - that causes stumbling
  lexicon: BDAG
  rationale: Genitive modifying 'stone' in a citation/allusion to Isa 8:14 and 28:16.
    'Of stumbling' preserves the lexical tie to προσέκοψαν and keeps the metaphor
    compact; 'offense' is possible but less concrete in this context.
