id: ROM.9.24
reference: Romans 9:24
source:
  edition: SBLGNT
  text: οὓς καὶ ἐκάλεσεν ἡμᾶς οὐ μόνον ἐξ Ἰουδαίων ἀλλὰ καὶ ἐξ ἐθνῶν;—
translation:
  text: even us, whom he also called, not only from the Jews but also from the Gentiles—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'those whom he also called, us.' Paul identifies the
      previously mentioned objects of mercy as 'us.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'from the nations'; in this context Paul contrasts Jews with Gentiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς
  chosen: whom
  alternatives:
  - those whom
  lexicon: BDAG
  rationale: Accusative masculine plural relative pronoun referring back to the 'vessels
    of mercy' in the previous verse. English requires an explicit relative expression;
    'whom' preserves the personal reference and syntactic linkage. 'Those whom' is
    possible but less concise given the following appositional 'us'.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: 'This καί links with ἐκάλεσεν and adds emphasis: God not only prepared
    such people but also called them. ''Also'' best reflects the additive force in
    natural English, though the full clause begins with ''even us'' to capture the
    marked emphasis created by οὓς ... ἡμᾶς.'
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: Aorist active indicative of καλέω. In Pauline usage, 'called' is the
    established and theologically important sense, especially in salvation-historical
    contexts. 'Summoned' is too weakly theological and less idiomatic here.
- source_word: ἡμᾶς
  chosen: us
  alternatives:
  - even us
  lexicon: BDAG
  rationale: 'Direct object in apposition to the relative pronoun''s referent. In
    English, placing ''even us'' at the front communicates the emphatic clarification
    Paul makes: the called ones include ''us.'' The main gloss remains ''us''.'
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not only ... but even
  lexicon: BDAG
  rationale: Standard correlative construction. 'Not only ... but also' is the clearest
    equivalent and preserves the rhetorical balance.
- source_word: ἐξ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Here ἐκ/ἐξ marks source or origin/group membership. 'From' is idiomatic
    and sufficiently precise; 'out of' would be more wooden without improving meaning.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - Jews
  - Jewish people
  lexicon: BDAG
  rationale: Genitive plural after ἐξ. 'The Jews' is a straightforward people-group
    designation in this contrastive expression ('from the Jews ... from the Gentiles').
    The article in English helps the paired categories read naturally.
- source_word: ἀλλὰ καὶ
  chosen: but also
  alternatives:
  - but even
  lexicon: BDAG
  rationale: Completes the correlative contrast and includes the additional group.
    'But also' best matches the Greek syntax and discourse flow.
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline Jewish-Gentile contrast, ἔθνη conventionally means non-Jewish
    peoples, i.e., Gentiles. 'The nations' is more literal but less transparent in
    English and may obscure the Jew/Gentile contrast central to the context.
