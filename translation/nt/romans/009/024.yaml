theological_decisions:
- issue: Rendering ἐθνῶν in a salvation-historical Jew/non-Jew contrast
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  rationale: The immediate contrast with Ἰουδαίων indicates Paul's ethnic-redemptive
    categories rather than a generic reference to nations. 'Gentiles' preserves the
    theological and historical contrast without importing a specific doctrinal system.
- issue: Maintaining the referential link to the previous verse's 'vessels of mercy'
  chosen_reading: even us, whom he also called
  alternative_readings:
  - whom he also called, namely us
  - us whom he also called
  rationale: The verse depends syntactically on the prior clause. This wording preserves
    the continuity and emphasis without over-resolving debates about election beyond
    what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it
