theological_decisions:
- issue: Relation of physical descent to covenant childship
  chosen_reading: The verse distinguishes being Abraham's physical offspring from
    being counted as his covenant children, without specifying here the full mechanism
    of election.
  alternative_readings:
  - A stronger predestinarian construal importing later argument
  - A merely ethnic construal with no covenantal distinction
  rationale: Paul's immediate contrast is between biological descent ('Abraham’s offspring')
    and the line identified by God's promise ('Through Isaac...'). The translation
    should preserve that distinction without importing theological systematization
    beyond the wording of the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the Genesis citation
  chosen_reading: The quotation is rendered in terms of lineal designation ('your
    offspring will be named') rather than explicit interpretation such as 'reckoned'
    or 'considered.'
  alternative_readings:
  - your offspring will be reckoned
  - descendants will come through Isaac
  rationale: The Greek says 'will be called/named,' echoing the citation. A more interpretive
    rendering could prematurely explain Paul's theological use of the text. The chosen
    wording preserves the scriptural phrasing and leaves the theological inference
    to the surrounding context.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
