id: ROM.9.7
reference: Romans 9:7
source:
  edition: SBLGNT
  text: οὐδ’ ὅτι εἰσὶν σπέρμα Ἀβραάμ, πάντες τέκνα, ἀλλ’· Ἐν Ἰσαὰκ κληθήσεταί σοι
    σπέρμα.
translation:
  text: Nor is it the case that because they are Abraham’s offspring, they are all
    children. Rather, “Through Isaac your offspring will be named.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “seed.” The Greek word is singular but collective, referring to offspring
      or descendants.
    reason: lexical_alternative
  - marker: b
    text: Or “In Isaac your seed will be called,” echoing Genesis 21:12 more formally.
    reason: cross_reference
  - marker: c
    text: “Will be named” may also be understood as “will be called” or, in context,
      “will be reckoned/designated.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδ’ ὅτι
  chosen: Nor is it the case that because
  alternatives:
  - Nor because
  - And not because
  lexicon: BDAG
  rationale: οὐδέ links v.7 to the previous argument with an additional negation,
    and ὅτι introduces the content/reason clause. English requires some expansion
    for clarity; 'Nor is it the case that because' preserves the logical force without
    over-paraphrasing.
- source_word: εἰσὶν
  chosen: they are
  alternatives:
  - they exist as
  lexicon: BDAG
  rationale: Simple copulative verb; rendered idiomatically in English with an explicit
    subject supplied from context.
- source_word: σπέρμα Ἀβραάμ
  chosen: Abraham’s offspring
  alternatives:
  - Abraham's seed
  - descendants of Abraham
  lexicon: BDAG
  rationale: σπέρμα can denote seed/offspring/descendants. 'Offspring' preserves the
    singular collective sense better than 'descendants' and avoids the archaic feel
    of 'seed,' while keeping Paul's terminology available for the quotation later
    in the verse.
- source_word: πάντες τέκνα
  chosen: they are all children
  alternatives:
  - all are children
  - they are all sons/children
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not 'sons.' The supplied verb smooths
    the verbless Greek predicate construction. 'All children' is kept indefinite because
    the following quotation clarifies that the issue is covenant lineage, not mere
    physical descent.
- source_word: ἀλλ’
  chosen: Rather
  alternatives:
  - But
  - On the contrary
  lexicon: BDAG
  rationale: Marks sharp contrast and correction; 'Rather' reads naturally in modern
    English and signals Paul's argumentative turn.
- source_word: Ἐν Ἰσαὰκ
  chosen: Through Isaac
  alternatives:
  - In Isaac
  - By Isaac
  lexicon: BDAG
  rationale: This citation from Gen 21:12 uses ἐν in a semitic/lineal sense. 'Through
    Isaac' best conveys descent or line of reckoning in contemporary English.
- source_word: κληθήσεταί
  chosen: will be named
  alternatives:
  - will be called
  - will be reckoned
  lexicon: BDAG
  rationale: Future passive of καλέω. 'Will be named' preserves the lexical link to
    calling/naming while fitting the lineage context. 'Will be reckoned' is interpretive
    and better left as an alternative.
- source_word: σοι
  chosen: your
  alternatives:
  - for you
  - to you
  lexicon: BDAG
  rationale: 'The dative pronoun in the Genesis quotation is naturally rendered as
    a possessive in English: the offspring belonging to Abraham''s line.'
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: Maintains consistency with earlier σπέρμα in the verse and preserves
    the collective-singular nuance. 'Offspring' is more natural than 'seed' while
    still allowing theological linkage to Paul's later argument about Abraham's line.
