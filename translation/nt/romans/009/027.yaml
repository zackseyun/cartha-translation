id: ROM.9.27
reference: Romans 9:27
source:
  edition: SBLGNT
  text: Ἠσαΐας δὲ κράζει ὑπὲρ τοῦ Ἰσραήλ· Ἐὰν ᾖ ὁ ἀριθμὸς τῶν υἱῶν Ἰσραὴλ ὡς ἡ ἄμμος
    τῆς θαλάσσης, τὸ ⸀ὑπόλειμμα σωθήσεται·
translation:
  text: But Isaiah cries out concerning Israel, “Though the number of the sons of
    Israel is like the sand of the sea, only the remnant will be saved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Greek reads 'the sons
      of Israel,' a traditional covenantal designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'If the number of the sons of Israel is like the sand of the sea.' The
      Greek conditional can be rendered more literally, though here it carries a concessive
      force in context.
    reason: alternative_reading
  - marker: c
    text: Or 'will be delivered.' The wording echoes Isaiah's prophecy of a surviving
      remnant.
    reason: cross_reference
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast/continuation with the preceding argument; 'But'
    fits Paul's rhetorical turn better than a simple connective.
- source_word: κράζει
  chosen: cries out
  alternatives:
  - cries
  - calls out
  - proclaims
  lexicon: BDAG
  rationale: Preserves the vivid present tense and forceful speech sense of κράζω.
- source_word: ὑπὲρ τοῦ Ἰσραήλ
  chosen: concerning Israel
  alternatives:
  - about Israel
  - on behalf of Israel
  - over Israel
  lexicon: BDAG
  rationale: In prophetic citation context, ὑπέρ here most naturally means 'concerning/about'
    rather than advocacy 'on behalf of.'
- source_word: Ἐὰν ᾖ
  chosen: Though ... is
  alternatives:
  - If ... is
  - Even if ... is
  lexicon: BDAG
  rationale: In this citation formula, the conditional clause has concessive force
    in English context. 'Though' communicates the sense more naturally while preserving
    the logic of contrast between large number and small surviving group.
- source_word: ὁ ἀριθμὸς
  chosen: the number
  alternatives:
  - the count
  lexicon: BDAG
  rationale: Standard and natural rendering of ἀριθμός.
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the descendants of Israel
  - the Israelites
  lexicon: BDAG
  rationale: Retains the formal wording of the citation and follows the gender-accurate
    policy; this is a traditional corporate designation, not merely a generic neutral
    expression. A footnote can preserve the more idiomatic alternative.
- source_word: ὡς ἡ ἄμμος τῆς θαλάσσης
  chosen: like the sand of the sea
  alternatives:
  - as the sand of the sea
  - like the seashore sand
  lexicon: BDAG
  rationale: Preserves the recognizable scriptural simile with natural English diction.
- source_word: τὸ ὑπόλειμμα
  chosen: the remnant
  alternatives:
  - the remainder
  - those left
  lexicon: BDAG
  rationale: Established and precise rendering for the prophetic/theological concept
    of a surviving subset preserved by God.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  - will be preserved
  lexicon: BDAG
  rationale: In Paul's usage and this salvation-historical context, 'saved' best preserves
    the theological weight, while 'delivered' remains a possible background nuance
    from the Isaiah source.
