theological_decisions:
- issue: Sense of the conditional clause Ἐὰν ᾖ in a prophetic citation
  chosen_reading: Concessive sense rendered as 'Though the number ... is ...'
  alternative_readings:
  - 'Strict conditional: ''If the number ... is ...'''
  - 'Emphatic concessive: ''Even if the number ... is ...'''
  rationale: The point of the citation is the contrast between Israel's vast number
    and the fact that only a remnant experiences salvation. English 'though' communicates
    this clearly without importing a doctrinal conclusion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering σωθήσεται
  chosen_reading: '''will be saved'''
  alternative_readings:
  - '''will be delivered'''
  - '''will be preserved'''
  rationale: Given Pauline context in Romans 9–11, 'saved' is the most natural rendering
    and does not force a denominational reading; it preserves the text's theological
    gravity while allowing the prophetic background of deliverance to remain visible
    in a footnote.
  doctrine_reference: Historic ecumenical orthodoxy; no denominationally distinctive
    resolution imported
