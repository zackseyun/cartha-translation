theological_decisions:
- issue: Force of ἵνα in a predestination-context verse
  chosen_reading: 'Rendered as purpose clause: ''so that God’s purpose according to
    election might remain'''
  alternative_readings:
  - 'Rendered more weakly as result: ''with the result that ...'''
  - 'Rendered more interpretively to emphasize decree: ''in order to establish God''s
    electing purpose'''
  rationale: The syntax most naturally presents divine purpose without requiring the
    translation to settle broader Reformed/Arminian debates beyond the text itself.
    This preserves theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἐκλογή
  chosen_reading: election
  alternative_readings:
  - choice
  - selection
  rationale: In Pauline usage here, 'election' is the established theological term
    and best represents the lexical and contextual weight, while still allowing readers
    to engage the interpretive implications without paraphrase.
