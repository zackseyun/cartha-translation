id: ROM.9.11
reference: Romans 9:11
source:
  edition: SBLGNT
  text: μήπω γὰρ γεννηθέντων μηδὲ πραξάντων τι ἀγαθὸν ἢ ⸀φαῦλον, ἵνα ἡ κατ’ ἐκλογὴν
    πρόθεσις τοῦ θεοῦ μένῃ,
translation:
  text: For before they had yet been born or had done anything good or bad, so that
    God’s purpose according to election might remain,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything good or evil.' The Greek φαῦλον can denote what is bad, base,
      or morally evil; 'bad' is used in the main text as the more idiomatic counterpart
      to 'good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God’s electing purpose' / 'the purpose of God according to election.'
    reason: lexical_alternative
  - marker: c
    text: Or 'might stand.' The Greek verb means 'remain' or 'continue,' and in this
      context may carry the sense of standing firm.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήπω
  chosen: before ... had yet
  alternatives:
  - not yet
  - before yet
  lexicon: BDAG
  rationale: Conveys the temporal force 'not yet' idiomatically in English when paired
    with the following participle, yielding 'before they had yet been born.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Maintains Paul's explanatory connection to the previous verse.
- source_word: γεννηθέντων
  chosen: had ... been born
  alternatives:
  - were born
  lexicon: BDAG
  rationale: Aorist passive participle in a genitive absolute; rendered with pluperfect
    sense in English to match the temporal relation to the main clause.
- source_word: μηδὲ πραξάντων
  chosen: or had done
  alternatives:
  - and had not done
  - nor had done
  lexicon: BDAG
  rationale: Completes the genitive absolute with coordinated negation; 'or had done'
    is natural after 'before they had yet been born' while preserving the negative
    sense from μηδέ.
- source_word: τι ἀγαθὸν ἢ φαῦλον
  chosen: anything good or bad
  alternatives:
  - anything good or evil
  - anything right or worthless
  lexicon: BDAG
  rationale: τι plus paired adjectives is naturally 'anything good or bad.' φαῦλος
    can mean 'bad,' 'base,' or 'worthless'; 'bad' is the most idiomatic counterpart
    to 'good' here without over-interpreting moral intensity.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: Preserves the purpose/aim sense without forcing a stronger philosophical
    conclusion than the syntax itself requires.
- source_word: ἡ κατ’ ἐκλογὴν πρόθεσις
  chosen: purpose according to election
  alternatives:
  - electing purpose
  - purpose of election
  - purpose based on choice
  lexicon: BDAG
  rationale: Keeps the prepositional structure visible and avoids collapsing interpretation
    into a more theological paraphrase. 'Election' is standard and suitably transparent
    for ἐκλογή here.
- source_word: τοῦ θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Possessive form is idiomatic English and preserves the genitive relationship.
- source_word: μένῃ
  chosen: might remain
  alternatives:
  - might stand
  - might continue
  lexicon: BDAG
  rationale: μένω commonly means 'remain' or 'continue.' 'Remain' fits the context
    of God's purpose persisting independent of human works; 'stand' is possible but
    less direct to the Greek verb.
