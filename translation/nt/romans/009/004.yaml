theological_decisions:
- issue: Meaning of υἱοθεσία in relation to Israel
  chosen_reading: Rendered as Israel's covenantal 'adoption' without importing later
    individual-soteriological nuances.
  alternative_readings:
  - adoption as sons
  - sonship
  rationale: Romans 9:4 catalogs historical privileges belonging to Israel as a people.
    'Adoption' preserves the biblical metaphor while avoiding over-specification beyond
    the verse.
- issue: Referent of ἡ δόξα
  chosen_reading: Left as 'the glory' in the main text, understood as God's manifested
    glory associated with Israel.
  alternative_readings:
  - the divine glory
  - the glory-presence
  rationale: The verse likely refers to the Shekinah-like manifestation of God's presence,
    but the Greek itself simply says 'the glory.' The translation preserves that theological
    density without narrowing it in the text.
- issue: Scope of λατρεία
  chosen_reading: Rendered 'the worship' to denote Israel's ordained cultic worship.
  alternative_readings:
  - the temple service
  - the priestly service
  rationale: The context is Israel's covenant privileges. 'The worship' keeps the
    cultic sense while not restricting it more than the term itself requires.
