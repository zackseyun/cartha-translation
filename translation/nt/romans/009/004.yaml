id: ROM.9.4
reference: Romans 9:4
source:
  edition: SBLGNT
  text: οἵτινές εἰσιν Ἰσραηλῖται, ὧν ἡ υἱοθεσία καὶ ἡ δόξα καὶ αἱ διαθῆκαι καὶ ἡ νομοθεσία
    καὶ ἡ λατρεία καὶ αἱ ἐπαγγελίαι,
translation:
  text: who are Israelites, and to whom belong the adoption, the glory, the covenants,
    the giving of the law, the worship, and the promises,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose are the adoption, the glory, the covenants, the giving of the
      law, the worship, and the promises.'
    reason: lexical_alternative
  - marker: b
    text: '''The glory'' likely refers to God''s manifested presence among Israel.'
    reason: cross_reference
  - marker: c
    text: Or 'adoption as sons' or 'sonship.'
    reason: lexical_alternative
  - marker: d
    text: That is, Israel's covenantal worship/service before God.
    reason: cultural_note
lexical_decisions:
- source_word: οἵτινές
  chosen: who
  alternatives:
  - who indeed
  - inasmuch as they are the ones who
  lexicon: BDAG
  rationale: Relative pronoun introducing an explanatory description of Paul's kinsmen
    from the previous verse. Simple 'who' preserves natural English while retaining
    the identifying force without over-translating the qualitative nuance.
- source_word: εἰσιν
  chosen: are
  alternatives:
  - are indeed
  lexicon: BDAG
  rationale: Present indicative copula; straightforwardly rendered as 'are'.
- source_word: Ἰσραηλῖται
  chosen: Israelites
  alternatives:
  - the people of Israel
  lexicon: BDAG
  rationale: Standard transliteration-based ethnic designation. 'Israelites' is concise
    and preserves the covenantal-historical identity named by Paul.
- source_word: ὧν
  chosen: to whom belong
  alternatives:
  - whose are
  - of whom are
  lexicon: BDAG
  rationale: Genitive relative pronoun here expresses possession. 'To whom belong'
    is idiomatic modern English and clearly conveys the possessive force better than
    the wooden 'whose are'.
- source_word: υἱοθεσία
  chosen: the adoption
  alternatives:
  - adoption as sons
  - sonship
  lexicon: BDAG
  rationale: In Pauline usage the term refers to filial placement/adoption. 'The adoption'
    is clear and sufficiently formal; 'adoption as sons' is more literal but can sound
    awkward here, while 'sonship' risks abstraction. In this context it refers to
    Israel's covenantal filial status.
- source_word: δόξα
  chosen: the glory
  alternatives:
  - the divine glory
  - the glory-presence
  lexicon: BDAG
  rationale: '''The glory'' preserves the likely technical, salvation-historical sense
    referring to God''s manifested presence associated with Israel, while avoiding
    interpretive expansion in the main text.'
- source_word: διαθῆκαι
  chosen: the covenants
  alternatives:
  - the covenantal arrangements
  lexicon: BDAG
  rationale: Plural in Greek should be preserved. 'The covenants' naturally reflects
    the successive covenantal administrations associated with Israel.
- source_word: νομοθεσία
  chosen: the giving of the law
  alternatives:
  - the lawgiving
  - the legislation
  lexicon: BDAG
  rationale: The noun refers not merely to 'law' but to the giving/enactment of the
    law. 'The giving of the law' is the clearest idiomatic rendering in modern English.
- source_word: λατρεία
  chosen: the worship
  alternatives:
  - the temple service
  - the service
  lexicon: BDAG
  rationale: The term denotes cultic worship/service rendered to God, especially in
    Israel's ordained worship. 'The worship' is broad enough to preserve the term
    while remaining readable; 'temple service' is possible but slightly more specific
    than the word itself demands.
- source_word: ἐπαγγελίαι
  chosen: the promises
  alternatives:
  - the promise-words
  lexicon: BDAG
  rationale: Plural should be retained. 'The promises' clearly refers to God's covenantal
    promises given to Israel.
