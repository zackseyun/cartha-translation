theological_decisions:
- issue: Meaning of 'righteousness' in Pauline argument
  chosen_reading: Render δικαιοσύνη as 'righteousness' in the main text, without narrowing
    it to imputed righteousness alone.
  alternative_readings:
  - justice
  - covenant membership status
  - right standing before God
  rationale: The verse states Paul's contrast without fully unpacking the doctrinal
    mechanics. 'Righteousness' preserves Pauline theological breadth and avoids importing
    a narrower confessional interpretation than the verse itself specifies.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness; preserve
    justice in footnote for Pauline passages'
- issue: Sense of 'from faith'
  chosen_reading: Translate ἐκ πίστεως as 'from faith' rather than expanding to 'by
    faith alone' or another doctrinally loaded phrase.
  alternative_readings:
  - by faith
  - on the basis of faith
  rationale: The preposition ἐκ is best preserved with minimal interpretive expansion.
    This maintains theological tension and avoids importing later formulae not present
    in the Greek.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
