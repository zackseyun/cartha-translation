id: ROM.9.30
reference: Romans 9:30
source:
  edition: SBLGNT
  text: Τί οὖν ἐροῦμεν; ὅτι ἔθνη τὰ μὴ διώκοντα δικαιοσύνην κατέλαβεν δικαιοσύνην,
    δικαιοσύνην δὲ τὴν ἐκ πίστεως·
translation:
  text: What then shall we say? That the Gentiles, who were not pursuing righteousness,
    attained righteousness—but the righteousness that is from faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη) here and in the repeated uses
      of the term; Paul can use the word with a range that includes both moral/legal
      rightness and covenantal justice.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations' for 'the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the righteousness that comes by faith' or, less likely here, 'the righteousness
      that comes from faithfulness.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  chosen: What then shall we say?
  alternatives:
  - What then are we to say?
  - What then do we say?
  lexicon: BDAG
  rationale: A standard Pauline transitional formula. 'Shall we say' preserves the
    deliberative future nuance and idiomatic English flow.
- source_word: ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline context this refers to non-Jewish peoples in contrast with
    Israel, so 'Gentiles' is clearer than the more literal 'nations'.
- source_word: τὰ μὴ διώκοντα
  chosen: who were not pursuing
  alternatives:
  - who did not pursue
  - not pursuing
  lexicon: BDAG
  rationale: The present participle conveys ongoing action or characteristic posture.
    'Were not pursuing' expresses that ongoing sense in natural English while modifying
    'Gentiles'.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine default, δικαιοσύνη is rendered 'righteousness' in Pauline
    usage, while preserving 'justice' as a viable alternative in a footnote because
    the semantic range can include justice/covenant rightness.
- source_word: κατέλαβεν
  chosen: attained
  alternatives:
  - obtained
  - grasped
  - laid hold of
  lexicon: BDAG
  rationale: In context the verb denotes coming to possess or reach what was not being
    pursued. 'Attained' fits Paul's contrastive argument and reads naturally; 'grasped'
    is too physical here.
- source_word: δικαιοσύνην δὲ τὴν ἐκ πίστεως
  chosen: but the righteousness that is from faith
  alternatives:
  - that is, the righteousness from faith
  - namely, the righteousness that comes from faith
  lexicon: BDAG
  rationale: The repeated noun followed by the article and prepositional phrase specifies
    the kind of righteousness meant. 'From faith' preserves ἐκ and avoids over-interpreting
    the construction. 'But' renders δέ here as a clarifying/adversative pivot in idiomatic
    English.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith.' In this construction
    ('righteousness from faith') the sense is best taken as faith/trust rather than
    faithfulness, though alternatives are worth noting.
