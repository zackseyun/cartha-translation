id: ROM.9.16
reference: Romans 9:16
source:
  edition: SBLGNT
  text: ἄρα οὖν οὐ τοῦ θέλοντος οὐδὲ τοῦ τρέχοντος ἀλλὰ τοῦ ἐλεῶντος θεοῦ.
translation:
  text: So then, it does not depend on the one who wills or the one who runs, but
    on God who shows mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Therefore it is not of the one who wills nor of the
      one who runs, but of God who shows mercy.' The Greek is elliptical; the implied
      subject is supplied from the context of God's purpose and mercy.
    reason: lexical_alternative
  - marker: b
    text: '''Runs'' likely carries a metaphor of human effort or striving, but the
      Greek verb is literally ''runs.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Consequently
  lexicon: BDAG
  rationale: The paired inferential particles intensify Paul's conclusion from the
    preceding argument. 'So then' preserves the logical force in natural modern English
    without sounding overly formal.
- source_word: οὐ
  chosen: does not
  alternatives:
  - is not
  - not
  lexicon: BDAG
  rationale: English requires an explicit verbal expression to convey the negation
    of the implied predicate. 'Does not' supplies the sense idiomatically.
- source_word: τοῦ θέλοντος
  chosen: the one who wills
  alternatives:
  - the one who desires
  - the one who wants
  lexicon: BDAG
  rationale: The participle with article functions substantivally. 'Wills' preserves
    the verbal and volitional nuance of θέλω better than the softer 'wants' or more
    affective 'desires.'
- source_word: οὐδὲ
  chosen: or
  alternatives:
  - nor
  lexicon: BDAG
  rationale: In English, 'or' after a negated clause naturally carries the force of
    'nor' and reads more smoothly in contemporary style.
- source_word: τοῦ τρέχοντος
  chosen: the one who runs
  alternatives:
  - the one who strives
  - the one who exerts himself
  lexicon: BDAG
  rationale: τρέχω is literally 'run.' While metaphorical overtones of effort are
    present in context, the main text keeps the concrete imagery and lets readers
    hear Paul's wording directly.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast. 'But' is the most direct and idiomatic rendering
    here.
- source_word: τοῦ ἐλεῶντος θεοῦ
  chosen: God who shows mercy
  alternatives:
  - the merciful God
  - God who has mercy
  lexicon: BDAG
  rationale: The genitive participial phrase identifies God by his merciful action.
    'God who shows mercy' preserves the participial force and active verbal sense
    better than an adjectival paraphrase.
- source_word: implied predicate/expression
  chosen: it does not depend on
  alternatives:
  - it is not of
  - it is not from
  lexicon: BDAG
  rationale: The Greek omits the governing noun or verb, leaving the sense elliptical
    from context. In Romans 9:16 the referent is the outcome of God's purpose/mercy
    in salvation history. 'It does not depend on' is clear English that reflects the
    idiomatic force without over-specifying beyond the context.
