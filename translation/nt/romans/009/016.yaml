theological_decisions:
- issue: Elliptical subject and scope of dependence
  chosen_reading: Use the impersonal 'it does not depend on' without explicitly naming
    salvation, election, or God's choice in the main text.
  alternative_readings:
  - it is not of him who wills
  - therefore salvation does not depend on human desire or effort
  - therefore God's choice does not depend on human willing or running
  rationale: Paul's Greek is elliptical, and the immediate context concerns God's
    purpose and mercy in election. To preserve theological tension and avoid importing
    a narrower denominational reading, the translation keeps the statement general
    in the main text while allowing context to supply the referent.
  doctrine_reference: Preserve theological tension rather than resolve it.
