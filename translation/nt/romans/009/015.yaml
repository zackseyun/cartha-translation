theological_decisions:
- issue: Speaker identification in the citation formula
  chosen_reading: Render the subject personally as 'he says,' referring to God speaking
    in Scripture to Moses.
  alternative_readings:
  - Render impersonally as 'it says to Moses' with Scripture as subject
  rationale: The Greek verb lacks an explicit subject, but the quotation is God's
    direct speech from Exodus 33:19. Personal rendering better reflects the source
    context without adding doctrinal content beyond the text.
- issue: Divine freedom in mercy/compassion
  chosen_reading: Preserve the taut, repetitive formulation without softening it into
    an explanatory paraphrase.
  alternative_readings:
  - Expand the sense to 'I will have mercy on anyone I choose'
  rationale: Romans 9:15 is central in debates over election and mercy. The translation
    should preserve the text's wording and theological tension rather than resolve
    interpretive disputes by importing 'choose' or other explanatory language not
    present in the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it
