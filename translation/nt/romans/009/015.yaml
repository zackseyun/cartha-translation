id: ROM.9.15
reference: Romans 9:15
source:
  edition: SBLGNT
  text: τῷ ⸂Μωϋσεῖ γὰρ⸃ λέγει· Ἐλεήσω ὃν ἂν ἐλεῶ, καὶ οἰκτιρήσω ὃν ἂν οἰκτίρω.
translation:
  text: For he says to Moses, “I will have mercy on whomever I have mercy, and I will
    have compassion on whomever I have compassion.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will show mercy to whomever I show mercy, and I will show compassion
      to whomever I show compassion.'
    reason: lexical_alternative
  - marker: b
    text: Quotation from Exodus 33:19.
    reason: cross_reference
lexical_decisions:
- source_word: τῷ Μωϋσεῖ
  chosen: to Moses
  alternatives:
  - to Moyses
  lexicon: BDAG
  rationale: Dative indirect object after λέγει is naturally rendered 'to Moses.'
    Personal names are transliterated by standard English convention.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces Paul's explanation for the preceding assertion; 'For' preserves
    the argumentative connection in readable English.
- source_word: λέγει
  chosen: he says
  alternatives:
  - it says
  - he said
  lexicon: BDAG
  rationale: Present tense in citation formula is best preserved as vivid/scriptural
    present, and the implicit subject refers to God from the Exodus quotation context.
    'It says' would depersonalize the speaker more than the Greek warrants here.
- source_word: Ἐλεήσω
  chosen: I will have mercy
  alternatives:
  - I will show mercy
  - I will be merciful
  lexicon: BDAG
  rationale: Future active first person; 'have mercy' is idiomatic and preserves the
    covenantal/theological force of ἐλεέω better than a flatter paraphrase.
- source_word: ὃν ἂν
  chosen: whomever
  alternatives:
  - whomsoever
  - whoever
  lexicon: BDAG
  rationale: The construction with relative pronoun plus ἄν expresses an indefinite
    object, naturally rendered 'whomever.' Object case in English favors 'whomever'
    in formal written style.
- source_word: ἐλεῶ
  chosen: I have mercy
  alternatives:
  - I show mercy
  - I am merciful to
  lexicon: BDAG
  rationale: Present subjunctive in the quotation paired with future Ἐλεήσω forms
    a Hebrew-influenced idiom of emphatic divine freedom. Repeating 'have mercy' maintains
    lexical consistency with ἐλεέω in the first clause.
- source_word: οἰκτιρήσω
  chosen: I will have compassion
  alternatives:
  - I will show compassion
  - I will pity
  lexicon: BDAG
  rationale: Future active first person of οἰκτίρω; 'have compassion' is natural English
    and preserves distinction from ἐλεέω while avoiding the weaker or potentially
    condescending nuance of 'pity.'
- source_word: οἰκτίρω
  chosen: I have compassion
  alternatives:
  - I show compassion
  - I pity
  lexicon: BDAG
  rationale: Present subjunctive echoing the prior future; repetition in English preserves
    the emphatic parallelism of the Greek quotation.
