id: ROM.9.8
reference: Romans 9:8
source:
  edition: SBLGNT
  text: τοῦτ’ ἔστιν, οὐ τὰ τέκνα τῆς σαρκὸς ταῦτα τέκνα τοῦ θεοῦ, ἀλλὰ τὰ τέκνα τῆς
    ἐπαγγελίας λογίζεται εἰς σπέρμα·
translation:
  text: That is, it is not the children of the flesh who are the children of God,
    but the children of the promise are counted as offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the children by natural descent.'' Greek: ''the children of the flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'are reckoned as seed.' 'Offspring' renders Greek sperma here in the
      sense of descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτ’ ἔστιν
  chosen: That is
  alternatives:
  - That means
  - This is
  lexicon: BDAG
  rationale: Introduces Paul's explanation of the preceding statement. 'That is' is
    concise, idiomatic, and preserves the explanatory force better than the more wooden
    'this is.'
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: The plural τέκνα is gender-inclusive and refers to descendants/children
    rather than specifically male sons. 'Children' fits all three occurrences and
    preserves consistency.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - natural descent
  - human descent
  lexicon: BDAG
  rationale: Per doctrine defaults, σάρξ is rendered 'flesh' when literal or genealogical
    rather than metaphorically ethical. Here the contrast is between physical lineage
    and divine promise, so 'flesh' preserves Paul's wording while still being understandable
    in context.
- source_word: τὰ τέκνα τῆς σαρκὸς
  chosen: the children of the flesh
  alternatives:
  - the children by natural descent
  - the physical children
  lexicon: BDAG
  rationale: This genitive construction refers to those descended according to physical
    lineage. The formal rendering keeps the Pauline contrast with 'children of the
    promise' explicit.
- source_word: τέκνα τοῦ θεοῦ
  chosen: the children of God
  alternatives:
  - God's children
  lexicon: BDAG
  rationale: Both are valid English renderings, but the article + genitive construction
    is mirrored more transparently by 'the children of God,' which also maintains
    the rhetorical contrast.
- source_word: ἐπαγγελία
  chosen: promise
  alternatives:
  - the promised word
  lexicon: BDAG
  rationale: Standard and contextually clear in Romans 9, referring to God's promissory
    word to Abraham and Sarah.
- source_word: τὰ τέκνα τῆς ἐπαγγελίας
  chosen: the children of the promise
  alternatives:
  - the children of promise
  - the promised children
  lexicon: BDAG
  rationale: 'Including the article in English yields smoother modern style while
    preserving the genitival relation: these are children defined by God''s promise,
    not by mere physical descent.'
- source_word: λογίζεται
  chosen: are counted
  alternatives:
  - are reckoned
  - are regarded
  lexicon: BDAG
  rationale: 'Passive sense is natural here: these children are counted/reckoned by
    God as the true seed. ''Counted'' is readable modern English without losing theological
    force.'
- source_word: εἰς σπέρμα
  chosen: as offspring
  alternatives:
  - as seed
  - for offspring
  lexicon: BDAG
  rationale: σπέρμα in this Abrahamic context means descendants/offspring. 'As offspring'
    communicates the sense clearly in modern English while avoiding overly literal
    'seed,' which can sound opaque. The preposition εἰς after λογίζομαι conveys result/classification,
    suitably rendered 'as.'
