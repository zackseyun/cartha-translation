theological_decisions:
- issue: Meaning of Paul's contrast between physical Israel and the line defined by
    God's promise
  chosen_reading: The verse distinguishes physical descendants ('children of the flesh')
    from those recognized by God as Abraham's true offspring through the promise,
    without importing a narrower denominational scheme.
  alternative_readings:
  - A specifically corporate-historical reading only
  - An individually predestinarian reading made explicit in translation
  rationale: The Greek states the contrast but does not require the translator to
    resolve broader theological debates within Romans 9. The translation therefore
    preserves the wording and tension rather than encoding one doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it.
