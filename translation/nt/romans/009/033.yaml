id: ROM.9.33
reference: Romans 9:33
source:
  edition: SBLGNT
  text: καθὼς γέγραπται· Ἰδοὺ τίθημι ἐν Σιὼν λίθον προσκόμματος καὶ πέτραν σκανδάλου,
    ⸀καὶ ὁ πιστεύων ἐπ’ αὐτῷ οὐ καταισχυνθήσεται.
translation:
  text: As it is written, “Look, I am laying in Zion a stone of stumbling and a rock
    of offense, and the one who believes in him will not be put to shame.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “on him.” Greek: “upon him.”'
    reason: lexical_alternative
  - marker: b
    text: Or “will not be disappointed.”
    reason: lexical_alternative
  - marker: c
    text: Paul combines Isaiah 8:14 and Isaiah 28:16 here.
    reason: cross_reference
  - marker: d
    text: Some translations render “it” instead of “him,” referring back to the stone;
      Paul’s context applies the image to the Messiah.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς γέγραπται
  chosen: As it is written
  alternatives:
  - Just as it has been written
  lexicon: BDAG
  rationale: Standard formula introducing Scripture citation; English idiom favors
    the conventional present-perfect sense without sounding stilted.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Retains the deictic force of the citation in readable modern English;
    'Behold' is more traditional but archaic for the stated audience.
- source_word: τίθημι
  chosen: I am laying
  alternatives:
  - I place
  - I set
  lexicon: BDAG
  rationale: Present tense in the citation is preserved. 'Laying' fits the building-stone
    imagery better than the flatter 'place'.
- source_word: ἐν Σιὼν
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: BDAG
  rationale: ἐν normally means 'in'; this is also the conventional rendering for the
    prophetic citation and suits the locative sense.
- source_word: λίθον προσκόμματος
  chosen: a stone of stumbling
  alternatives:
  - a stumbling stone
  lexicon: BDAG
  rationale: Keeps the genitival construction transparent while remaining natural
    English; preserves the metaphor of causing someone to stumble.
- source_word: πέτραν σκανδάλου
  chosen: a rock of offense
  alternatives:
  - a rock that causes offense
  - a rock of stumbling
  lexicon: BDAG
  rationale: Maintains distinction from the previous phrase while reflecting σκάνδαλον
    as offense/scandal or cause for falling. 'Offense' is concise and traditional
    without being opaque.
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - whoever believes
  - the believer
  lexicon: BDAG
  rationale: Represents the substantival participle accurately in natural English.
    Avoids over-specific gender while preserving the generic singular force.
- source_word: ἐπ’ αὐτῷ
  chosen: in him
  alternatives:
  - on him
  lexicon: BDAG
  rationale: With πιστεύω, English idiom normally uses 'believe in.' The Greek preposition
    is literally 'on,' but 'in him' best communicates the sense in standard English.
- source_word: καταισχυνθήσεται
  chosen: will not be put to shame
  alternatives:
  - will not be disappointed
  - will never be ashamed
  lexicon: BDAG
  rationale: This preserves the passive future and the honor-shame nuance of the verb
    better than the more interpretive 'disappointed.'
