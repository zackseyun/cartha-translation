theological_decisions:
- issue: Referent of αὐτῷ in the Isaiah composite citation
  chosen_reading: Rendered as 'him,' taking the stone/rock image personally in Paul's
    application to Messiah.
  alternative_readings:
  - Rendered impersonally as 'it' to agree with 'stone' grammatically
  rationale: Although the antecedent in the image is a stone, Paul applies the prophecy
    christologically in context (Rom 9:32–33; 10:11), and the masculine pronoun in
    Greek naturally supports personal rendering here. This preserves Paul's theological
    use of the citation without importing claims beyond the context.
  doctrine_reference: Nicene/Chalcedonian christological orthodoxy affirmed; translation
    follows the text's christological application.
