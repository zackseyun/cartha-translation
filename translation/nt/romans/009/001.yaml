id: ROM.9.1
reference: Romans 9:1
source:
  edition: SBLGNT
  text: Ἀλήθειαν λέγω ἐν Χριστῷ, οὐ ψεύδομαι, συμμαρτυρούσης μοι τῆς συνειδήσεώς μου
    ἐν πνεύματι ἁγίῳ,
translation:
  text: I am telling the truth in the Messiah; I am not lying, as my conscience bears
    witness with me in the Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.' The Greek title Χριστός can function title-like ('Messiah')
      or name-like ('Christ'); here it is rendered as a title.
    reason: lexical_alternative
  - marker: b
    text: Or 'with my conscience bearing witness' or 'my conscience testifying with
      me.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'in a holy spirit,' though in Paul this is most naturally understood
      as a reference to the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀλήθειαν λέγω
  chosen: I am telling the truth
  alternatives:
  - I speak the truth
  - I tell the truth
  lexicon: BDAG
  rationale: Accusative ἀλήθειαν with λέγω is an idiomatic expression meaning to speak
    truthfully. The progressive English form is natural in context and preserves the
    solemn assertion without sounding stilted.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is the title Χριστός, not a personal name here. Per project policy,
    titles are translated where context supports; 'Messiah' preserves the titular
    force of Paul's oath-like assertion made in relation to the anointed one.
- source_word: οὐ ψεύδομαι
  chosen: I am not lying
  alternatives:
  - I do not lie
  - I am speaking no falsehood
  lexicon: BDAG
  rationale: Direct present middle/passive deponent verb rendered with simple contemporary
    English. 'I am not lying' matches the emphatic denial naturally.
- source_word: συμμαρτυρούσης
  chosen: as ... bears witness with me
  alternatives:
  - my conscience testifying with me
  - bearing witness together with me
  lexicon: BDAG
  rationale: Genitive absolute participle expressing attendant circumstance. 'As ...
    bears witness with me' communicates the participial construction smoothly while
    retaining the compound sense of συμ- ('with').
- source_word: τῆς συνειδήσεώς μου
  chosen: my conscience
  alternatives:
  - my own conscience
  lexicon: BDAG
  rationale: Standard rendering of συνείδησις in Pauline usage; possessive μου is
    naturally incorporated in English.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - in a holy spirit
  - by the Holy Spirit
  lexicon: BDAG
  rationale: Anarthrous ἐν πνεύματι ἁγίῳ is best read here as a reference to the Holy
    Spirit, especially in Pauline idiom. 'In the Holy Spirit' preserves the preposition
    ἐν rather than over-interpreting it instrumentally as 'by.'
