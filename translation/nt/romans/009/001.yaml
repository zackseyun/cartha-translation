theological_decisions:
- issue: Referent of πνεύματι ἁγίῳ
  chosen_reading: Reference to the Holy Spirit, the divine Spirit, not merely Paul's
    human spirit
  alternative_readings:
  - Paul's spirit understood as holy/dispositionally sanctified
  rationale: In Pauline usage, 'Holy Spirit' is the most natural reading, and the
    solemn truth-claim is grounded in divine corroboration rather than merely subjective
    sincerity. The capitalization reflects this interpretive judgment while preserving
    the Greek preposition 'in.'
  doctrine_reference: Nicene Creed affirmation of the Holy Spirit as divine person;
    translation aims not to flatten explicit or probable references to the Spirit.
