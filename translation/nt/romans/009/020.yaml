theological_decisions:
- issue: Representative force of ἄνθρωπε
  chosen_reading: Rendered as 'O man' rather than a gender-neutral form
  alternative_readings:
  - O human
  rationale: The verse addresses an individual rhetorically as representative of humanity
    before God. Following the doctrine's gender-accurate policy, masculine singular
    is retained where it carries generic force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rhetorical force of Paul's rebuke
  chosen_reading: Preserved a sharp challenge without softening divine-human asymmetry
  alternative_readings:
  - More neutral 'reply to God'
  rationale: The Greek emphasizes the impropriety of the creature's opposition to
    God. 'Answer back' better preserves that tension than a softened verb.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
