id: ROM.9.20
reference: Romans 9:20
source:
  edition: SBLGNT
  text: ⸂ὦ ἄνθρωπε, μενοῦνγε⸃ σὺ τίς εἶ ὁ ἀνταποκρινόμενος τῷ θεῷ; μὴ ἐρεῖ τὸ πλάσμα
    τῷ πλάσαντι Τί με ἐποίησας οὕτως;
translation:
  text: But who are you, O man, to answer back to God? Will what is formed say to
    the one who formed it, “Why did you make me like this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “On the contrary, O man” for μενοῦνγε, making the corrective force more
      explicit.
    reason: lexical_alternative
  - marker: b
    text: Greek “O man,” a masculine singular form used here representatively for
      a human being.
    reason: cultural_note
  - marker: c
    text: Or “Will not what is formed say…?” The Greek question expects a negative
      answer.
    reason: lexical_alternative
  - marker: d
    text: Literally, “Why did you make me thus?”
    reason: lexical_alternative
lexical_decisions:
- source_word: μενοῦνγε
  chosen: But
  alternatives:
  - On the contrary
  - Indeed
  lexicon: BDAG
  rationale: The particle strengthens and slightly corrects the preceding line. In
    smooth modern English, 'But' best carries the adversative turn without sounding
    overly formal; 'On the contrary' is possible but too heavy here.
- source_word: ὦ ἄνθρωπε
  chosen: O man
  alternatives:
  - O human
  - Man
  lexicon: BDAG
  rationale: This is a direct vocative singular. Per the gender-accurate policy, 'man'
    fits the representative/generic force better than the gender-neutral 'human,'
    while retaining the rhetorical sharpness of Paul's address.
- source_word: σὺ τίς εἶ
  chosen: who are you
  alternatives:
  - who indeed are you
  - who are you, then
  lexicon: BDAG
  rationale: This idiom expresses rhetorical challenge rather than mere identification.
    'Who are you' is the natural English equivalent and preserves the confrontational
    force.
- source_word: ὁ ἀνταποκρινόμενος τῷ θεῷ
  chosen: to answer back to God
  alternatives:
  - answering back to God
  - replying against God
  lexicon: BDAG
  rationale: The participle ἀνταποκρινόμενος carries the sense of contradicting or
    answering back, not neutral response. The infinitival English construction after
    'who are you' is idiomatic and preserves the improper oppositional nuance.
- source_word: μὴ ἐρεῖ
  chosen: Will ... say
  alternatives:
  - Surely ... will not say
  - Will not ... say
  lexicon: BDAG
  rationale: μή with a future indicative introduces a rhetorical question expecting
    a negative answer. English normally conveys this expectation by context and tone;
    'Will ... say' is readable, with the negative expectation left implicit.
- source_word: τὸ πλάσμα
  chosen: what is formed
  alternatives:
  - the thing formed
  - the molded thing
  lexicon: BDAG
  rationale: πλάσμα denotes something formed or molded. 'What is formed' sounds natural
    in English while preserving the creature/object contrast with its maker.
- source_word: τῷ πλάσαντι
  chosen: to the one who formed it
  alternatives:
  - to its molder
  - to the one who fashioned it
  lexicon: BDAG
  rationale: The aorist participle identifies the maker. 'The one who formed it' closely
    matches the Greek and maintains verbal linkage with πλάσμα.
- source_word: Τί με ἐποίησας οὕτως;
  chosen: Why did you make me like this?
  alternatives:
  - Why have you made me thus?
  - Why did you make me this way?
  lexicon: BDAG
  rationale: The Greek literally asks 'Why did you make me thus?' In modern English,
    'like this' is the clearest idiomatic equivalent without loss of meaning. 'This
    way' is also viable.
