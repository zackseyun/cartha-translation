id: ROM.9.5
reference: Romans 9:5
source:
  edition: SBLGNT
  text: ὧν οἱ πατέρες, καὶ ἐξ ὧν ὁ χριστὸς τὸ κατὰ σάρκα, ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς
    εἰς τοὺς αἰῶνας· ἀμήν.
translation:
  text: theirs are the fathers, and from them, according to the flesh, is the Messiah,
    who is over all, God blessed forever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with respect to human descent.' Literally, 'according to the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or, taking the last clause as a separate doxology, 'May God, who is over
      all, be blessed forever. Amen,' rather than a description of the Messiah.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πατέρες
  chosen: the fathers
  alternatives:
  - the patriarchs
  - the ancestors
  lexicon: BDAG
  rationale: The phrase refers to Israel's revered forefathers. 'The fathers' is a
    close rendering of the Greek and preserves Paul's covenant-historical language;
    'the patriarchs' is interpretive and narrower, though possible.
- source_word: ἐξ ὧν
  chosen: from them
  alternatives:
  - from whom
  lexicon: BDAG
  rationale: The genitive relative refers back to Paul's fellow Israelites. 'From
    them' is idiomatic modern English while preserving source meaning.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where functioning
    as a title rather than a name-like form. Here it is titular and tied to Israel's
    privileges.
- source_word: τὸ κατὰ σάρκα
  chosen: according to the flesh
  alternatives:
  - with respect to human descent
  - according to human nature
  lexicon: BDAG
  rationale: This idiom marks descent in terms of earthly lineage. 'According to the
    flesh' preserves Paul's wording and leaves the fuller anthropological nuance intact;
    a more explanatory alternative is suitable for a footnote.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - human descent
  lexicon: BDAG
  rationale: Per project defaults, σάρξ is rendered 'flesh' in literal contexts. Here
    it denotes physical lineage, not sinful nature.
- source_word: ὁ ὢν ἐπὶ πάντων
  chosen: who is over all
  alternatives:
  - the one who is over all
  - being over all
  lexicon: BDAG
  rationale: The articular participle naturally continues the description of the Messiah.
    'Who is over all' is clear, natural English and preserves the participial force.
- source_word: θεὸς εὐλογητὸς
  chosen: God blessed
  alternatives:
  - God, who is blessed
  - blessed God
  lexicon: BDAG
  rationale: The Greek word order can be read predicatively/appositionally with the
    preceding clause. 'God blessed' keeps close to the source while allowing the punctuation
    decision to be documented theologically.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the doxological phrase; concise and natural.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Standard liturgical affirmation retained by transliteration in English.
