theological_decisions:
- issue: Whether the clause 'ὁ ὢν ἐπὶ πάντων, θεὸς εὐλογητὸς εἰς τοὺς αἰῶνας' describes
    the Messiah or begins a separate doxology to God the Father
  chosen_reading: 'The clause is taken as continuing to describe the Messiah: ''who
    is over all, God blessed forever.'''
  alternative_readings:
  - 'A separate doxology: ''He who is God over all be blessed forever'' or ''God,
    who is over all, be blessed forever'''
  rationale: The most natural flow of the Greek is to read the articular participle
    ὁ ὢν as appositional to ὁ χριστός, yielding a christological affirmation. This
    reading is also well attested in historic Christian interpretation and is fully
    compatible with the project's orthodox doctrinal commitments, while still being
    grounded in the syntax rather than imported theology. Because the punctuation
    is not explicit in the earliest manuscripts and the verse has long been contested,
    the doxological alternative should be preserved in a footnote rather than suppressed.
  doctrine_reference: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)
