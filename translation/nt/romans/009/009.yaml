theological_decisions:
- issue: Quotation of the Abrahamic promise and divine agency
  chosen_reading: Render the promise straightforwardly as God's direct speech without
    importing interpretive expansions.
  alternative_readings:
  - Use 'I will return' to align more explicitly with some OT translation traditions
  rationale: Paul's argument depends on the divine promise as the ground of Isaac's
    birth. The translation should preserve that theological force while adhering to
    the Greek wording actually cited in Romans.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
