id: ROM.9.9
reference: Romans 9:9
source:
  edition: SBLGNT
  text: ἐπαγγελίας γὰρ ὁ λόγος οὗτος· Κατὰ τὸν καιρὸν τοῦτον ἐλεύσομαι καὶ ἔσται τῇ
    Σάρρᾳ υἱός.
translation:
  text: 'For this is the word of promise: “At this time I will come, and Sarah will
    have a son.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will return.” The Greek here reads “I will come,” though some translations
      reflect the wording of the Genesis background as “return.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαγγελίας
  chosen: of promise
  alternatives:
  - promissory
  - of the promise
  lexicon: BDAG
  rationale: Genitive modifying λόγος is best rendered attributively in natural English
    as 'word of promise.' The anarthrous form does not require 'the promise,' though
    that is possible. 'Promise' preserves Paul's emphasis on divine promise in context.
- source_word: λόγος
  chosen: word
  alternatives:
  - statement
  - message
  lexicon: BDAG
  rationale: λόγος here refers to the cited utterance itself; 'word' is concise and
    idiomatic in biblical English without over-paraphrasing to 'message.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces Paul's explanation for the previous claim. 'For' preserves
    the logical connection in a formal yet readable way.
- source_word: Κατὰ τὸν καιρὸν τοῦτον
  chosen: At this time
  alternatives:
  - According to this time
  - At this appointed time
  - About this time
  lexicon: BDAG
  rationale: This phrase echoes the promise formula from Genesis and idiomatically
    indicates the specified future time of fulfillment. 'At this time' is clear and
    sufficiently literal. 'About this time' is possible from the LXX/OT background,
    but the Greek here more naturally supports 'at this time' in English.
- source_word: ἐλεύσομαι
  chosen: I will come
  alternatives:
  - I will return
  lexicon: BDAG
  rationale: The verb is simply 'I will come.' Although the Genesis background in
    some traditions is rendered 'I will return,' the Greek text here uses ἔρχομαι,
    so 'I will come' better reflects the source-text primacy principle.
- source_word: ἔσται τῇ Σάρρᾳ υἱός
  chosen: Sarah will have a son
  alternatives:
  - there will be a son for Sarah
  - a son will be to Sarah
  lexicon: BDAG
  rationale: 'The Greek construction is literally ''a son will be to Sarah,'' an idiom
    naturally expressed in English as possession: ''Sarah will have a son.'' This
    preserves the meaning without woodenness.'
- source_word: Σάρρᾳ
  chosen: Sarah
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: The noun specifically means 'son,' and the gender is significant in the
    Abraham-Sarah promise context; gender-accurate rendering is required.
