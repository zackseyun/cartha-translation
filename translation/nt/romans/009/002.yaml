id: ROM.9.2
reference: Romans 9:2
source:
  edition: SBLGNT
  text: ὅτι λύπη μοί ἐστιν μεγάλη καὶ ἀδιάλειπτος ὀδύνη τῇ καρδίᾳ μου·
translation:
  text: that I have great sorrow and unceasing pain in my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grief' for 'sorrow.'
    reason: lexical_alternative
  - marker: b
    text: Or 'anguish' for 'pain.'
    reason: lexical_alternative
  - marker: c
    text: The Greek literally says 'to my heart,' an idiom naturally rendered 'in
      my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of Paul's solemn assertion from the previous verse.
    'That' fits the declarative continuation best in context, while 'because' would
    suggest a causal nuance less likely here.
- source_word: λύπη
  chosen: sorrow
  alternatives:
  - grief
  lexicon: BDAG
  rationale: Denotes deep sadness or grief. 'Sorrow' is natural modern English and
    pairs well with 'pain' for the second noun while preserving emotional weight.
- source_word: μοί ἐστιν
  chosen: I have
  alternatives:
  - there is to me
  - is to me
  lexicon: BDAG
  rationale: The dative pronoun with εἰμί is idiomatically rendered in English as
    possession or experience. 'I have' communicates the sense clearly without wooden
    phrasing.
- source_word: μεγάλη
  chosen: great
  alternatives:
  - deep
  - large
  lexicon: BDAG
  rationale: A straightforward qualitative intensifier modifying λύπη. 'Great sorrow'
    is idiomatic and preserves the force of the Greek.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination of the two grief expressions.
- source_word: ἀδιάλειπτος
  chosen: unceasing
  alternatives:
  - continual
  - constant
  lexicon: BDAG
  rationale: Conveys uninterrupted or continual duration. 'Unceasing' preserves the
    intensity slightly better than the flatter 'continual.'
- source_word: ὀδύνη
  chosen: pain
  alternatives:
  - anguish
  - distress
  lexicon: BDAG
  rationale: Refers to severe inward distress. 'Pain' is direct and works well with
    the heart-language; 'anguish' is a strong alternative but slightly more interpretive.
- source_word: τῇ καρδίᾳ μου
  chosen: in my heart
  alternatives:
  - in my inner being
  lexicon: BDAG
  rationale: Retains the concrete biblical idiom 'heart' for the seat of inner emotional
    life rather than interpreting it away.
