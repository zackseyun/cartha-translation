theological_decisions:
- issue: How explicitly to render the conception/sexual-union idiom in Paul's election
    argument
  chosen_reading: Express the point as Rebekah having conceived children by one man
  alternative_readings:
  - Render more literally as 'having one bed from Isaac our father'
  - Render more minimally as 'conceived by one'
  rationale: 'Paul''s contrast is between Sarah/Hagar and Rebekah: in Rebekah''s case
    the twins shared the same mother and the same father, strengthening the point
    that God''s purpose of election was not based on differing parentage or works.
    Making the implied male referent explicit clarifies the argument without adding
    doctrinal content beyond the Greek idiom.'
