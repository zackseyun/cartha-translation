id: ROM.9.10
reference: Romans 9:10
source:
  edition: SBLGNT
  text: οὐ μόνον δέ, ἀλλὰ καὶ Ῥεβέκκα ἐξ ἑνὸς κοίτην ἔχουσα, Ἰσαὰκ τοῦ πατρὸς ἡμῶν·
translation:
  text: And not only that, but Rebekah also had conceived children by one man, our
    father Isaac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'having conception/bed from one, Isaac our father'—an idiomatic
      expression referring to conception by one man.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μόνον δέ, ἀλλὰ καί
  chosen: And not only that, but ... also
  alternatives:
  - And not only so, but also
  - And not only this, but also
  lexicon: BDAG
  rationale: Renders the correlative construction idiomatically in modern English
    while preserving Paul's additive argument.
- source_word: Ῥεβέκκα
  chosen: Rebekah
  alternatives:
  - Rebecca
  lexicon: BDAG
  rationale: Standard English transliteration of the matriarch's name; this spelling
    better reflects the Hebrew/Greek form than the more traditional 'Rebecca.'
- source_word: ἐξ ἑνός
  chosen: by one man
  alternatives:
  - from one
  - by one
  lexicon: BDAG
  rationale: The phrase points to a single male parent in contrast to Abraham's children
    by different women; 'man' makes the implied referent explicit in natural English.
- source_word: κοίτην ἔχουσα
  chosen: had conceived children
  alternatives:
  - having conception
  - having a bed
  - being pregnant
  lexicon: BDAG
  rationale: The idiom literally involves 'having a bed/lying with,' but in this context
    it refers to conception from sexual union. 'Had conceived children' communicates
    the sense clearly without crudeness and fits the argument about twin offspring.
- source_word: Ἰσαὰκ
  chosen: Isaac
  lexicon: BDAG
  rationale: Standard English transliteration of the patriarch's name.
- source_word: τοῦ πατρὸς ἡμῶν
  chosen: our father
  alternatives:
  - our forefather
  lexicon: BDAG
  rationale: A natural rendering of the genitive phrase that preserves the covenantal/ancestral
    sense. 'Forefather' is possible but less direct; 'father' is standard and contextually
    clear.
