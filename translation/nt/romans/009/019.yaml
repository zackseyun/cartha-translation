id: ROM.9.19
reference: Romans 9:19
source:
  edition: SBLGNT
  text: Ἐρεῖς ⸂μοι οὖν⸃· Τί ⸀οὖν ἔτι μέμφεται; τῷ γὰρ βουλήματι αὐτοῦ τίς ἀνθέστηκεν;
translation:
  text: You will say to me then, “Why then does he still find fault? For who has resisted
    his purpose?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his will.” The Greek βούλημα can mean will, intention, or purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐρεῖς
  chosen: You will say
  alternatives:
  - You say
  - You will ask
  lexicon: BDAG
  rationale: Future indicative is naturally rendered as a rhetorical future in English,
    introducing Paul's anticipated objection. 'Say' is closer to λέγω than 'ask,'
    though the context is interrogative.
- source_word: μοι
  chosen: to me
  alternatives:
  - to me personally
  lexicon: BDAG
  rationale: Simple dative indirect object; explicit in English for clarity.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Inferential particle marking the next step in the argument. 'Then' is
    idiomatic and preserves discourse flow. The first οὖν is rendered; the second
    is also rendered to reflect the Greek's emphatic progression.
- source_word: Τί οὖν ἔτι
  chosen: Why then does he still
  alternatives:
  - What then, does he still
  - Why does he still
  lexicon: BDAG
  rationale: 'Although τί is formally ''what,'' in this idiom before a verb of blaming
    it is best rendered ''why'' in English: the objection concerns the reason for
    God''s blaming. ἔτι adds the sense ''still/yet.'''
- source_word: μέμφεται
  chosen: find fault
  alternatives:
  - blame
  - fault
  lexicon: BDAG
  rationale: Middle/passive deponent meaning 'blame, find fault with.' 'Find fault'
    is idiomatic and carries the evaluative sense without over-paraphrase.
- source_word: τῷ ... βουλήματι αὐτοῦ
  chosen: his purpose
  alternatives:
  - his will
  - his intention
  - his plan
  lexicon: BDAG
  rationale: βούλημα denotes resolved intention, purpose, or will. 'Purpose' best
    captures a settled divine intent here and avoids prematurely importing later doctrinal
    categories tied to 'will.' The dative after ἀνθίστημι is represented by English
    object structure rather than a preposition.
- source_word: τίς
  chosen: who
  alternatives:
  - who indeed
  lexicon: BDAG
  rationale: Indefinite/interrogative pronoun introducing the rhetorical question.
- source_word: ἀνθέστηκεν
  chosen: has resisted
  alternatives:
  - has opposed
  - has stood against
  lexicon: BDAG
  rationale: Perfect tense form of ἀνθίστημι; 'has resisted' is idiomatic and preserves
    the sense of standing in opposition with continuing relevance to the objection.
