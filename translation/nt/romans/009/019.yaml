theological_decisions:
- issue: Rendering βούλημα in a divine-sovereignty context
  chosen_reading: his purpose
  alternative_readings:
  - his will
  - his intention
  rationale: Romans 9 is theologically contested regarding divine sovereignty and
    human responsibility. 'Purpose' reflects βούλημα as deliberate intent while preserving
    the text's tension and avoiding a more system-laden English term where the Greek
    does not require it. The objection remains strong without forcing a denominational
    reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
