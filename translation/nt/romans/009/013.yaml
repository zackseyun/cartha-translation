theological_decisions:
- issue: Whether to soften 'I hated' to an interpretive rendering in light of debates
    about divine election and Semitic idiom
  chosen_reading: Retain the direct rendering 'I hated' in the main text
  alternative_readings:
  - I rejected
  - I loved less
  rationale: The Greek citation from Malachi uses the ordinary verb μισέω, and the
    translation philosophy requires preserving theological tension rather than resolving
    it. Softened renderings import an interpretation tied to doctrinal debates; therefore
    the stronger lexical form remains in the text, with alternatives preserved in
    a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
