id: ROM.9.13
reference: Romans 9:13
source:
  edition: SBLGNT
  text: ⸀καθὼς γέγραπται· Τὸν Ἰακὼβ ἠγάπησα, τὸν δὲ Ἠσαῦ ἐμίσησα.
translation:
  text: 'as it is written: “Jacob I loved, but Esau I hated.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I rejected' or 'I loved less.' The quotation is from Malachi 1:2–3;
      some understand 'hated' here as covenantal rejection or comparative preference
      rather than an expression of emotional hostility.
    reason: lexical_alternative
  - marker: b
    text: Quotation from Malachi 1:2–3.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces the scriptural citation in a standard comparative way. 'As'
    is concise and natural in English before 'it is written.'
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Perfect passive commonly functions as a citation formula in the New Testament.
    'It is written' is the established and accurate English equivalent.
- source_word: Ἰακώβ
  chosen: Jacob
  rationale: Personal name is transliterated by standard convention, per translation
    philosophy.
- source_word: ἠγάπησα
  chosen: I loved
  alternatives:
  - I have loved
  lexicon: BDAG
  rationale: Aorist active indicative in this citation is best rendered with simple
    past in idiomatic English. The verb is cognate with ἀγάπη, whose default rendering
    is 'love.'
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - while
  lexicon: BDAG
  rationale: Marks contrast between Jacob and Esau; 'but' brings out the adversative
    force clearly in English.
- source_word: Ἠσαῦ
  chosen: Esau
  rationale: Personal name is transliterated by standard convention, per translation
    philosophy.
- source_word: ἐμίσησα
  chosen: I hated
  alternatives:
  - I rejected
  - I loved less
  lexicon: BDAG
  rationale: The direct lexical sense of μισέω is 'hate.' Because the source text
    states the stronger term, the main text preserves it rather than softening it
    interpretively. Possible idiomatic or covenantal nuances are better preserved
    in a footnote than imported into the main text.
