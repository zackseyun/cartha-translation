id: ROM.9.23
reference: Romans 9:23
source:
  edition: SBLGNT
  text: ⸀καὶ ἵνα γνωρίσῃ τὸν πλοῦτον τῆς δόξης αὐτοῦ ἐπὶ σκεύη ἐλέους, ἃ προητοίμασεν
    εἰς δόξαν,
translation:
  text: and in order to make known the riches of his glory upon vessels of mercy,
    which he prepared beforehand for glory,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that he might make known.' The Greek ἵνα γνωρίσῃ expresses purpose.
    reason: lexical_alternative
  - marker: b
    text: Or 'on vessels of mercy.' The preposition can be rendered 'on/upon' here;
      the sense is that God's glorious riches are displayed in relation to these vessels.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Standard connective continuing the argument from the previous verse;
    'and' preserves the syntax without overstating nuance.
- source_word: ἵνα
  chosen: in order to
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Marks purpose. 'In order to' makes the purposive force explicit and fits
    the sentence's elevated style.
- source_word: γνωρίσῃ
  chosen: make known
  alternatives:
  - make evident
  - reveal
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα expressing purpose. 'Make known' is a natural
    and semantically direct rendering of γνωρίζω.
- source_word: τὸν πλοῦτον
  chosen: the riches
  alternatives:
  - the wealth
  - the abundance
  lexicon: BDAG
  rationale: Pauline idiom commonly uses πλοῦτος for the abundance or richness of
    divine attributes; 'riches' preserves that established semantic range without
    sounding monetary in context.
- source_word: τῆς δόξης αὐτοῦ
  chosen: of his glory
  alternatives:
  - of his majesty
  - of his splendor
  lexicon: BDAG
  rationale: Genitival construction most naturally rendered literally. 'Glory' is
    a key biblical-theological term and should be preserved rather than softened.
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  - toward
  - for
  lexicon: BDAG
  rationale: With the accusative here, ἐπί likely conveys direction or extension upon
    the objects in view. 'Upon' preserves the metaphorical sense of glory being displayed
    on or in relation to these vessels better than the flatter 'for'.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - containers
  - objects
  lexicon: BDAG
  rationale: The metaphor in the immediate context is pottery/vessels; 'vessels' preserves
    Paul's imagery and links with the preceding 'vessels of wrath'.
- source_word: ἐλέους
  chosen: of mercy
  alternatives:
  - for mercy
  - characterized by mercy
  lexicon: BDAG
  rationale: A genitive of quality or relation. 'Of mercy' is concise, conventional,
    and preserves the metaphorical category in parallel with 'vessels of wrath' in
    the context.
- source_word: ἃ
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring back to 'vessels'; 'which' is
    standard and suitably formal in this elevated argument.
- source_word: προητοίμασεν
  chosen: he prepared beforehand
  alternatives:
  - he made ready beforehand
  - he prearranged
  lexicon: BDAG
  rationale: The προ- prefix contributes the temporal nuance 'beforehand,' which should
    be retained for auditability and because it is significant in Pauline argumentation.
- source_word: εἰς δόξαν
  chosen: for glory
  alternatives:
  - for glorious honor
  - unto glory
  lexicon: BDAG
  rationale: εἰς expresses goal or result. 'For glory' is idiomatic modern English
    while preserving the teleological force; 'unto glory' would be more formal but
    less natural.
