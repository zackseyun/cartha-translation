theological_decisions:
- issue: Whether προητοίμασεν implies a specific doctrinal model of predestination
    beyond the text's wording
  chosen_reading: Retain the verbal idea 'he prepared beforehand' without adding interpretive
    qualifiers.
  alternative_readings:
  - Render more interpretively as 'he predestined beforehand'
  - Soften to 'he readied' in a less theologically loaded way
  rationale: The verse clearly states divine prior preparation, but broader doctrinal
    systems about election and reprobation are contested. The translation preserves
    the text's claim without importing a denominational framework not explicit in
    the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether 'vessels of mercy' should be individualized or collectivized
  chosen_reading: Keep the metaphor 'vessels of mercy' in the plural.
  alternative_readings:
  - '''people who receive mercy'''
  - '''objects of mercy'''
  rationale: Paul's metaphor is integral to the argument in Romans 9 and should remain
    intact rather than be paraphrased into an interpretive explanation.
  doctrine_reference: Original-language primacy over translation tradition; never
    paraphrase beyond what the source warrants.
