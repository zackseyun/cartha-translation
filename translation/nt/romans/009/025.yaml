id: ROM.9.25
reference: Romans 9:25
source:
  edition: SBLGNT
  text: ὡς καὶ ἐν τῷ Ὡσηὲ λέγει· Καλέσω τὸν οὐ λαόν μου λαόν μου καὶ τὴν οὐκ ἠγαπημένην
    ἠγαπημένην·
translation:
  text: as he also says in Hosea, “I will call those who were not my people, ‘my people,’
    and her who was not loved, ‘loved.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I will call the one not my people ‘my people,’ and the
      one not loved ‘loved.’” The Greek uses singular forms, but the first clause
      is naturally collective in English.
    reason: lexical_alternative
  - marker: b
    text: Quoted from Hosea (cf. Hos 2:23 LXX/MT numbering differs in some traditions).
      Paul applies Hosea’s restoration language to God’s calling of a people for himself.
    reason: cross_reference
  - marker: c
    text: Or “beloved” for the final term. The Greek is from the same love-word family
      used elsewhere for divine love.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς καὶ
  chosen: as he also
  alternatives:
  - as also
  - just as also
  lexicon: BDAG
  rationale: Introduces a supporting scriptural citation. 'As he also' is idiomatic
    English while preserving the comparative/corroborative force of ὡς with καί.
- source_word: ἐν τῷ Ὡσηὲ
  chosen: in Hosea
  alternatives:
  - in the book of Hosea
  - through Hosea
  lexicon: BDAG
  rationale: A standard citation formula meaning 'in Hosea,' i.e., in the writing/book
    of Hosea. This keeps the Greek preposition ἐν without over-expanding the phrase.
- source_word: λέγει
  chosen: he says
  alternatives:
  - it says
  - he speaks
  lexicon: BDAG
  rationale: The implied subject is God speaking in Scripture, though the citation
    formula is personal in Greek. 'He says' preserves the singular verbal form and
    the scriptural-personal style better than impersonal 'it says'.
- source_word: Καλέσω
  chosen: I will call
  alternatives:
  - I will name
  - I will declare
  lexicon: BDAG
  rationale: Future active of καλέω here carries covenantal designation/identification.
    'I will call' is the most direct rendering and preserves the verbal echo from
    Hosea.
- source_word: τὸν οὐ λαόν μου
  chosen: those who were not my people
  alternatives:
  - the one not my people
  - not-my-people
  lexicon: BDAG
  rationale: Although singular in form, the phrase is collective and naturally rendered
    in English as plural/generic 'those who were not my people.' Adding 'were' makes
    smooth English and reflects the predicative sense of οὐ with λαόν μου.
- source_word: λαόν μου
  chosen: my people
  alternatives:
  - a people for me
  - my own people
  lexicon: BDAG
  rationale: Standard covenantal expression in both prophetic and Pauline usage. 'My
    people' is concise and preserves the biblical idiom.
- source_word: τὴν οὐκ ἠγαπημένην
  chosen: her who was not loved
  alternatives:
  - the one not loved
  - the unloved woman
  - not-beloved
  lexicon: BDAG
  rationale: The feminine singular participle reflects the Hosea source text's feminine
    referent. 'Her who was not loved' preserves both gender and the verbal idea without
    resorting to the less natural label 'not-beloved.'
- source_word: ἠγαπημένην
  chosen: loved
  alternatives:
  - beloved
  lexicon: BDAG
  rationale: As a perfect/passive participial form used predicatively, it denotes
    one who is loved. 'Loved' is clearer and less formal than 'beloved,' while still
    retaining the lexical connection to ἀγαπάω.
