theological_decisions:
- issue: Corporate versus individual force in Hosea citation
  chosen_reading: Render the singular phrases as collective in English ('those who
    were not my people') while retaining the feminine singular in the second clause
    ('her who was not loved').
  alternative_readings:
  - 'Retain both clauses in strict singular form: ''the one who was not my people
    ... the one who was not loved'''
  - 'Render with titular forms from Hosea: ''Not My People'' and ''Not Loved'''
  rationale: Paul cites Hosea to support God's calling of a people; English idiom
    naturally expresses λαός collectively. At the same time, the feminine singular
    in the second clause is significant to the Hosea background and should be visible
    rather than flattened.
