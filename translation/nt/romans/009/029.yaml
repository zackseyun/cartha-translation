theological_decisions:
- issue: Rendering the divine title κύριος Σαβαώθ in an OT quotation
  chosen_reading: the Lord of Hosts
  alternative_readings:
  - the Lord Sabaoth
  - the LORD of Hosts
  - the Lord of Armies
  rationale: The Greek text uses κύριος plus a transliterated Hebrew title. Following
    the project's philosophy to translate titles, 'Lord of Hosts' preserves the meaning
    of the divine warrior-king title while remaining recognizable in English. 'LORD
    of Hosts' would foreground the Hebrew Tetragrammaton behind the Isaiah source,
    but Paul cites the Greek form κύριος, so 'Lord' is retained in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested
    term κύριος → Lord'
- issue: Whether σπέρμα should be rendered with the more theological term 'remnant'
  chosen_reading: offspring
  alternative_readings:
  - seed
  - remnant
  rationale: Although the broader context concerns a remnant, the lexical item here
    is σπέρμα, 'seed/offspring.' Using 'offspring' avoids importing a doctrinally
    freighted term not present in the wording, while the remnant concept remains implicit
    in the citation's sense.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension rather than resolve it'
