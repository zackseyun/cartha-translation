id: ROM.9.29
reference: Romans 9:29
source:
  edition: SBLGNT
  text: καὶ καθὼς προείρηκεν Ἠσαΐας· Εἰ μὴ κύριος Σαβαὼθ ἐγκατέλιπεν ἡμῖν σπέρμα,
    ὡς Σόδομα ἂν ἐγενήθημεν καὶ ὡς Γόμορρα ἂν ὡμοιώθημεν.
translation:
  text: And just as Isaiah has said before, “If the Lord of Hosts had not left us
    offspring, we would have become like Sodom and been made like Gomorrah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Lord Sabaoth”; Greek Σαβαώθ transliterates the Hebrew divine title
      often rendered “of Hosts” or “of Armies.”
    reason: lexical_alternative
  - marker: b
    text: Literally “seed.” Here it refers to surviving offspring or descendants.
    reason: lexical_alternative
  - marker: c
    text: Quotation from Isaiah 1:9.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces correspondence with the preceding citation formula; 'just
    as' is natural English and preserves the comparative force.
- source_word: προείρηκεν
  chosen: has said before
  alternatives:
  - said previously
  - foretold
  lexicon: BDAG
  rationale: Perfect tense indicates a prior statement with continuing relevance.
    'Has said before' preserves the temporal sense without overstating prophecy as
    prediction, since Paul is citing prior Scripture.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' best matches both NT usage and
    the cited Isaianic context mediated through the Greek text.
- source_word: Σαβαὼθ
  chosen: of Hosts
  alternatives:
  - Sabaoth
  - of Armies
  lexicon: BDAG
  rationale: Although often transliterated in English tradition, the title is best
    translated here to preserve meaning. 'Of Hosts' is the established and readable
    rendering for the Hebrew divine title behind the Greek transliteration.
- source_word: ἐγκατέλιπεν
  chosen: had not left
  alternatives:
  - had not preserved
  - had not allowed to remain
  lexicon: BDAG
  rationale: In context the verb means leaving behind or preserving a remainder. 'Had
    not left' is closest to the Greek while still clear in English.
- source_word: σπέρμα
  chosen: offspring
  alternatives:
  - seed
  - descendants
  - remnant
  lexicon: BDAG
  rationale: Literally 'seed,' but in this context it refers to surviving posterity.
    'Offspring' is natural modern English and avoids wooden phrasing. 'Remnant' is
    interpretively adjacent but less precise lexically, so it is not used in the main
    text.
- source_word: ὡς Σόδομα
  chosen: like Sodom
  alternatives:
  - as Sodom
  lexicon: BDAG
  rationale: Comparative ὡς is naturally rendered 'like' in contemporary English.
- source_word: ἂν ἐγενήθημεν
  chosen: we would have become
  alternatives:
  - we would have been
  lexicon: BDAG
  rationale: The combination with ἄν marks a contrary-to-fact result. 'Become' reflects
    γίνομαι more precisely than a simple copula.
- source_word: ὡς Γόμορρα
  chosen: like Gomorrah
  alternatives:
  - as Gomorrah
  lexicon: BDAG
  rationale: Same comparative construction as with Sodom; 'like' is idiomatic English.
- source_word: ἂν ὡμοιώθημεν
  chosen: been made like
  alternatives:
  - become like
  - been likened to
  lexicon: BDAG
  rationale: ὁμοιόω is a passive 'to be made like' or 'to be likened to.' Rendering
    it distinctly from ἐγενήθημεν preserves Paul's paired verbs instead of flattening
    them into identical English.
