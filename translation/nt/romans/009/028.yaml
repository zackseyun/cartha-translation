theological_decisions:
- issue: Nature of the divine action in the Isaianic citation
  chosen_reading: The verse speaks of the Lord decisively bringing his spoken word
    to completion in judgment/history, without specifying a denominationally loaded
    doctrine beyond the text.
  alternative_readings:
  - The Lord will execute a judicial sentence swiftly and decisively
  - The Lord will complete and abbreviate his saving/judging work
  rationale: The paired participles can be understood with judicial overtones, but
    the translation should not import a more specific doctrinal scheme than the Greek
    warrants. 'Carry out his word ... finishing it and cutting it short' preserves
    the text's force and tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
