id: ROM.9.28
reference: Romans 9:28
source:
  edition: SBLGNT
  text: λόγον γὰρ συντελῶν καὶ ⸀συντέμνων ποιήσει κύριος ἐπὶ τῆς γῆς.
translation:
  text: For the Lord will carry out his word on the earth, finishing it and cutting
    it short.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord will execute the matter/sentence on the earth.'
    reason: lexical_alternative
  - marker: b
    text: '''Cutting it short'' may also be understood as ''shortening it'' or, by
      implication, ''executing it swiftly.'''
    reason: lexical_alternative
  - marker: c
    text: Some translate ἐπὶ τῆς γῆς as 'in the land,' reflecting the wording of Isaiah
      in its original setting; Romans here reads 'on the earth.'
    reason: cross_reference
lexical_decisions:
- source_word: λόγον
  chosen: his word
  alternatives:
  - the word
  - the matter
  - the sentence
  - the decree
  lexicon: BDAG
  rationale: λόγος here is the direct object of ποιήσει and in this Isaianic citation
    refers to what the Lord has spoken/declared that he will bring to completion.
    'Word' preserves the verbal/declarative sense better than 'matter,' while 'his'
    is supplied naturally in English from the subject κύριος.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the explanatory ground for the previous statement. 'For' is
    the standard concise rendering and fits Paul's argumentative flow.
- source_word: συντελῶν
  chosen: finishing it
  alternatives:
  - bringing it to completion
  - completing
  lexicon: BDAG
  rationale: The present participle modifies κύριος with an attendant/circumstantial
    sense explaining how he will carry out the word. 'Finishing it' is idiomatic and
    preserves the idea of bringing something to its intended end.
- source_word: καὶ συντέμνων
  chosen: and cutting it short
  alternatives:
  - and shortening it
  - and executing it swiftly
  lexicon: BDAG
  rationale: συντέμνω can mean to shorten or cut short. In this context of divine
    execution/judgment, 'cutting it short' preserves the vivid force and avoids over-interpretive
    paraphrase such as 'swiftly,' though that idea is contextually related.
- source_word: ποιήσει
  chosen: will carry out
  alternatives:
  - will do
  - will accomplish
  - will execute
  lexicon: BDAG
  rationale: ποιέω is semantically broad. With λόγον as object, 'carry out' communicates
    that the Lord will perform what he has spoken. It is clearer in modern English
    than the overly literal 'do' and less technical than 'execute.'
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The article is retained
    because it is present in sense in English style here and identifies the God of
    the citation.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - upon the earth
  - in the land
  lexicon: BDAG
  rationale: The phrase most naturally means 'on the earth' in this citation as transmitted
    in Romans. 'In the land' would reflect a possible Isaianic/Hebrew contextual narrowing,
    but Paul's Greek wording here is broader and should govern the translation.
