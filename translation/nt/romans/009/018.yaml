id: ROM.9.18
reference: Romans 9:18
source:
  edition: SBLGNT
  text: ἄρα οὖν ὃν θέλει ἐλεεῖ, ὃν δὲ θέλει σκληρύνει.
translation:
  text: So then, he shows mercy to whom he wills, and he hardens whom he wills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he has mercy on whom he wills.'
    reason: lexical_alternative
  - marker: b
    text: '''Hardens'' can also be rendered ''makes stubborn'' or ''renders obstinate'';
      the Greek uses an active verb and should not be softened to mere permission.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Consequently
  - Thus then
  lexicon: BDAG
  rationale: The paired inferential particles intensify Paul's conclusion from the
    preceding argument. 'So then' is natural modern English that preserves the inferential
    force without sounding overly formal.
- source_word: ὃν θέλει
  chosen: to whom he wills
  alternatives:
  - to whomever he wants
  - to whom he desires
  lexicon: BDAG
  rationale: The relative pronoun with θέλει is rendered idiomatically as 'to whom
    he wills' in the first clause to preserve the formal parallelism and the weight
    of divine volition. 'Wills' better reflects the solemn theological register here
    than 'wants.'
- source_word: ἐλεεῖ
  chosen: shows mercy
  alternatives:
  - has mercy
  - is merciful
  lexicon: BDAG
  rationale: The verb denotes extending mercy or compassion. 'Shows mercy' is clear,
    idiomatic English and makes the verbal action explicit.
- source_word: ὃν δὲ θέλει
  chosen: and whom he wills
  alternatives:
  - but whom he wants
  - and to whom he wills
  lexicon: BDAG
  rationale: δέ marks contrast between the two clauses; 'and' in English preserves
    the paired structure smoothly while still implying contrast from the second predicate.
    Repeating 'whom he wills' maintains the deliberate symmetry of the Greek.
- source_word: σκληρύνει
  chosen: hardens
  alternatives:
  - makes stubborn
  - renders obstinate
  lexicon: BDAG
  rationale: The verb means to harden or make stubborn. 'Hardens' is the established
    and most precise rendering, preserving the biblical intertextual echo with Pharaoh
    traditions and the theological tension of the passage.
