theological_decisions:
- issue: Divine volition in θέλει
  chosen_reading: Retain the direct statement of God's willing without softening or
    resolving debates about predestination and human responsibility.
  alternative_readings:
  - Render θέλει as 'wants' for colloquial clarity
  - Paraphrase to emphasize permission rather than active willing
  rationale: The Greek plainly states divine willing in both clauses. In keeping with
    the doctrine statement, the translation preserves the text's theological tension
    rather than importing a denominational explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Agency in σκληρύνει
  chosen_reading: Translate actively as 'he hardens.'
  alternative_readings:
  - '''he allows to be hardened'''
  - '''he gives over to hardness'''
  rationale: The Greek active verb directly attributes the action to the subject.
    Softening it into mere permission would go beyond the wording of the source text.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
