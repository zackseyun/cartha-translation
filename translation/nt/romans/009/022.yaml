theological_decisions:
- issue: Agency implied by the passive participle κατηρτισμένα ('prepared')
  chosen_reading: Render the passive as 'prepared' without specifying who prepared
    the vessels.
  alternative_readings:
  - prepared by God for destruction
  - fit for destruction
  - having prepared themselves for destruction
  rationale: The Greek perfect passive participle states the condition of being prepared
    but does not explicitly name the agent. In keeping with the instruction to preserve
    theological tension rather than resolve it, the translation leaves agency unstated
    in the main text. Alternatives are preserved in a footnote because this is a major
    interpretive and doctrinally contested issue in Romans 9.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of the unfinished conditional sentence beginning with εἰ
  chosen_reading: Retain the rhetorical conditional with 'But what if' and allow the
    sentence to continue into the next verse.
  alternative_readings:
  - Translate more assertively as a direct statement
  - Smooth into a complete sentence within this verse
  rationale: Paul's syntax is intentionally suspended across verses 22–23. Preserving
    that structure avoids importing a stronger assertion than the Greek makes in verse
    22 alone.
  doctrine_reference: Translation philosophy §1 and §3
