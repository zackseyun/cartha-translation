id: ROM.9.22
reference: Romans 9:22
source:
  edition: SBLGNT
  text: εἰ δὲ θέλων ὁ θεὸς ἐνδείξασθαι τὴν ὀργὴν καὶ γνωρίσαι τὸ δυνατὸν αὐτοῦ ἤνεγκεν
    ἐν πολλῇ μακροθυμίᾳ σκεύη ὀργῆς κατηρτισμένα εἰς ἀπώλειαν,
translation:
  text: But what if God, wanting to display his wrath and make known his power, endured
    with great patience vessels of wrath prepared for destruction,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But if.' The Greek opens a rhetorical conditional sentence that continues
      into the next verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'his might.' The phrase literally refers to what is powerful or possible
      for him, here meaning God's power.
    reason: lexical_alternative
  - marker: c
    text: The passive 'prepared for destruction' does not state who prepared these
      vessels. Interpreters differ on whether Paul implies divine action, self-hardening,
      or simply a state of readiness for judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But what if
  alternatives:
  - But if
  - What if
  lexicon: BDAG
  rationale: Introduces the conditional/apodotic setup that continues into the next
    verse. 'But what if' best reflects the rhetorical force in English without pretending
    the sentence is complete here.
- source_word: θέλων
  chosen: wanting to
  alternatives:
  - although he desired to
  - because he wanted to
  lexicon: BDAG
  rationale: The present participle expresses God's intention or desire connected
    with the main verb. 'Wanting to' is a natural, close rendering that preserves
    the participial nuance.
- source_word: ἐνδείξασθαι
  chosen: to display
  alternatives:
  - to show
  - to demonstrate
  lexicon: BDAG
  rationale: Conveys purposeful manifestation. 'Display' fits the rhetorical context
    of publicly showing wrath, while remaining readable.
- source_word: ὀργή
  chosen: wrath
  alternatives:
  - anger
  lexicon: BDAG
  rationale: In Pauline theological context, 'wrath' better carries the judicial and
    divine sense than the more ordinary 'anger'.
- source_word: γνωρίσαι
  chosen: make known
  alternatives:
  - to reveal
  - to make evident
  lexicon: BDAG
  rationale: A standard and transparent rendering that preserves the causative sense
    of bringing something to knowledge.
- source_word: τὸ δυνατὸν αὐτοῦ
  chosen: his power
  alternatives:
  - what is possible for him
  - his might
  lexicon: BDAG
  rationale: Idiomatic expression referring to God's power/might. 'His power' is the
    clearest natural English equivalent in context.
- source_word: ἤνεγκεν
  chosen: endured
  alternatives:
  - bore with
  - put up with
  lexicon: BDAG
  rationale: In this context φέρω with an object of persons/things and modified by
    'with much patience' conveys patient bearing. 'Endured' is concise and natural.
- source_word: ἐν πολλῇ μακροθυμίᾳ
  chosen: with great patience
  alternatives:
  - with much patience
  - with great long-suffering
  lexicon: BDAG
  rationale: Expresses manner. 'With great patience' is accessible modern English;
    'long-suffering' is weighty but less natural for contemporary readers.
- source_word: σκεύη
  chosen: vessels
  alternatives:
  - objects
  - containers
  lexicon: BDAG
  rationale: '''Vessels'' preserves Paul''s pottery imagery from the immediate context
    and maintains inter-verse coherence.'
- source_word: σκεύη ὀργῆς
  chosen: vessels of wrath
  alternatives:
  - objects of wrath
  - vessels destined for wrath
  lexicon: BDAG
  rationale: A close rendering that preserves the compact genitival expression and
    its rhetorical force without over-interpreting the genitive.
- source_word: κατηρτισμένα
  chosen: prepared
  alternatives:
  - made ready
  - fitted
  lexicon: BDAG
  rationale: The perfect passive participle indicates a state of readiness/preparation.
    'Prepared' is clear and avoids archaic 'fitted.' Because the passive leaves agency
    unstated here, the English should also avoid specifying the agent.
- source_word: εἰς ἀπώλειαν
  chosen: for destruction
  alternatives:
  - for ruin
  - for perdition
  lexicon: BDAG
  rationale: '''For destruction'' is the most straightforward English rendering of
    result/destination here and fits Pauline usage.'
