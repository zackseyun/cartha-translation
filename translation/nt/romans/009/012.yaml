id: ROM.9.12
reference: Romans 9:12
source:
  edition: SBLGNT
  text: οὐκ ἐξ ἔργων ἀλλ’ ἐκ τοῦ καλοῦντος, ἐρρέθη αὐτῇ ὅτι Ὁ μείζων δουλεύσει τῷ
    ἐλάσσονι·
translation:
  text: not from works but from the One who calls, it was said to her, “The older
    will serve the younger.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “not on the basis of works but on the basis of the One who calls.”
    reason: lexical_alternative
  - marker: b
    text: Quotation from Gen 25:23.
    reason: cross_reference
  - marker: c
    text: Or, “The greater will serve the lesser,” with “older/younger” reflecting
      the Jacob and Esau context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐξ ἔργων
  chosen: not from works
  alternatives:
  - not by works
  - not on the basis of works
  lexicon: BDAG
  rationale: ἐκ with the genitive here expresses source or basis. 'Not from works'
    preserves Paul's compact contrast while remaining natural in English; 'on the
    basis of works' is interpretively clearer but less direct.
- source_word: ἀλλ’ ἐκ τοῦ καλοῦντος
  chosen: but from the One who calls
  alternatives:
  - but from him who calls
  - but from the one calling
  lexicon: BDAG
  rationale: The articular present participle τοῦ καλοῦντος functions substantivally.
    Capitalizing 'One' reflects a reverential reference to God without changing the
    sense. Present tense 'calls' preserves the participial aspect better than a past
    rendering.
- source_word: ἐρρέθη αὐτῇ
  chosen: it was said to her
  alternatives:
  - she was told
  - it was spoken to her
  lexicon: BDAG
  rationale: The aorist passive is best represented by the impersonal passive 'it
    was said to her,' which keeps the formal link to the citation formula and avoids
    adding an explicit subject not present in the Greek.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: ὅτι introduces direct discourse here. English punctuation with quotation
    marks communicates the sense naturally without needing the conjunction 'that'.
- source_word: Ὁ μείζων
  chosen: The older
  alternatives:
  - the greater
  - the elder
  lexicon: BDAG
  rationale: In the Jacob-Esau context, comparative age is in view, so 'older' is
    clearer than the more literal but potentially ambiguous 'greater.'
- source_word: δουλεύσει
  chosen: will serve
  alternatives:
  - will be slave to
  - will be subject to
  lexicon: BDAG
  rationale: Although δουλεύω can denote serving as a slave, in this Genesis citation
    the idiomatic relationship of subordination is well conveyed by 'will serve.'
    'Will be slave to' would over-specify the bonded nuance in a context about relative
    status between brothers/nations.
- source_word: τῷ ἐλάσσονι
  chosen: the younger
  alternatives:
  - the lesser
  - the smaller
  lexicon: BDAG
  rationale: In context ἐλάσσων contrasts with μείζων as the younger sibling rather
    than merely the lesser in rank. 'Younger' best captures the intended pair in idiomatic
    English.
