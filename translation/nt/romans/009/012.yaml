theological_decisions:
- issue: Whether the contrast 'not from works but from the One who calls' should be
    expanded to make explicit a doctrine of unconditional election
  chosen_reading: Retained the compact wording without interpretive expansion.
  alternative_readings:
  - not because of works but because of God who calls
  rationale: The verse clearly contrasts works with God's calling, but broader doctrinal
    conclusions are drawn from the context rather than inserted into this single verse.
    The translation preserves the theological tension and argument structure without
    denominationally loaded expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
