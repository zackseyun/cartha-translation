theological_decisions:
- issue: πιστεύω / faith-language
  chosen_reading: believe / believed
  alternative_readings:
  - have faith
  - trust
  rationale: The doctrine file sets πίστις-language default to 'faith'; the verbal
    form πιστεύω is correspondingly rendered 'believe' in the main text. 'Trust' is
    possible in some contexts, but here 'believe' best preserves Paul's lexical chain
    with minimal interpretive expansion.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις default ''faith''; preserve
    tension rather than resolve it'
- issue: Object of hearing in οὗ οὐκ ἤκουσαν
  chosen_reading: of whom
  alternative_readings:
  - about whom
  rationale: The Greek genitive relative pronoun can be rendered more literally as
    'of whom,' while many English versions use 'of whom' or dynamically 'about whom.'
    The main text keeps the more text-near rendering; the alternative is preserved
    in a footnote because English readers may otherwise misread the construction as
    direct personal hearing rather than hearing the proclaimed message concerning
    him.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve ambiguity where genuine'
