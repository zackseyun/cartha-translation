id: ROM.10.14
reference: Romans 10:14
source:
  edition: SBLGNT
  text: Πῶς οὖν ⸀ἐπικαλέσωνται εἰς ὃν οὐκ ἐπίστευσαν; πῶς δὲ ⸀πιστεύσωσιν οὗ οὐκ ἤκουσαν;
    πῶς δὲ ⸀ἀκούσωσιν χωρὶς κηρύσσοντος;
translation:
  text: How then will they call on him in whom they have not believed? And how will
    they believe in him of whom they have not heard? And how will they hear without
    someone preaching?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'how will they believe in him about whom they have not heard?'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πῶς οὖν
  chosen: How then
  alternatives:
  - How, then
  - How therefore
  lexicon: BDAG
  rationale: Retains the inferential force of οὖν and the rhetorical-question structure.
    'How then' is natural modern English and preserves Paul's argumentative flow from
    the preceding context.
- source_word: ἐπικαλέσωνται
  chosen: will they call on
  alternatives:
  - might they call on
  - shall they call upon
  lexicon: BDAG
  rationale: The aorist middle subjunctive in a rhetorical question following Πῶς
    is well represented idiomatically in English by a future-like 'will they.' 'Call
    on' preserves the idiomatic sense of invoking or appealing to the Lord, echoing
    the citation in the immediate context.
- source_word: εἰς ὃν
  chosen: on him in whom
  alternatives:
  - on him whom
  - on the one in whom
  lexicon: BDAG
  rationale: The construction with εἰς after ἐπικαλέω is awkward if flattened. 'Call
    on him in whom' preserves the prepositional force while remaining intelligible,
    and it aligns the clause with the following πιστεύω + object construction.
- source_word: ἐπίστευσαν
  chosen: they have not believed
  alternatives:
  - they did not believe
  - they have not put faith
  lexicon: BDAG
  rationale: Uses the default rendering 'believed' for πιστεύω/πίστις language. The
    English present perfect fits the logic of prior non-belief leading to present
    inability to call.
- source_word: πιστεύσωσιν
  chosen: will they believe
  alternatives:
  - might they believe
  - will they have faith
  lexicon: BDAG
  rationale: Again renders the subjunctive in this rhetorical sequence with idiomatic
    English future. 'Believe' is the standard and most natural gloss here.
- source_word: οὗ
  chosen: of whom
  alternatives:
  - him whom
  - the one about whom
  lexicon: BDAG
  rationale: The genitive relative pronoun after ἀκούω is most naturally rendered
    'of whom' in formal English. This preserves the likely sense that faith comes
    from hearing a message concerning Christ, without over-paraphrasing to 'about
    whom' in the main text.
- source_word: ἤκουσαν
  chosen: they have not heard
  alternatives:
  - they did not hear
  lexicon: BDAG
  rationale: Present perfect suits the chain of prior conditions in English and keeps
    the rhetorical progression smooth.
- source_word: ἀκούσωσιν
  chosen: will they hear
  alternatives:
  - might they hear
  - will they listen
  lexicon: BDAG
  rationale: '''Hear'' is the direct lexical equivalent and preserves the connection
    with the previous clause and the broader argument about hearing the proclaimed
    message.'
- source_word: χωρὶς κηρύσσοντος
  chosen: without someone preaching
  alternatives:
  - without a preacher
  - without one proclaiming
  - apart from someone preaching
  lexicon: BDAG
  rationale: The participle κηρύσσοντος denotes the act of proclamation more directly
    than the noun 'preacher.' 'Without someone preaching' is natural English and avoids
    implying an office where the Greek emphasizes the activity.
