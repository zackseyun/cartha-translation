theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine excerpt directs
    that Christological titles be translated where context supports. 'Messiah' preserves
    the semantic content of Χριστός rather than relying on inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Interpretation of 'the abyss' in Paul's explanatory gloss
  chosen_reading: Retain 'abyss' in the main text without collapsing it into 'grave'
    or 'realm of the dead.'
  alternative_readings:
  - the deep
  - the realm of the dead
  - Hades
  rationale: Paul's wording is metaphorical and allusive, tied to Deut 30 while now
    referring to bringing the Messiah up from the dead. Preserving 'abyss' keeps the
    textual imagery and theological tension rather than resolving it into a narrower
    interpretive term.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
