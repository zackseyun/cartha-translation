id: ROM.10.7
reference: Romans 10:7
source:
  edition: SBLGNT
  text: ἤ· Τίς καταβήσεται εἰς τὴν ἄβυσσον; τοῦτ’ ἔστιν Χριστὸν ἐκ νεκρῶν ἀναγαγεῖν.
translation:
  text: or, “Who will descend into the abyss?” (that is, to bring the Messiah up from
    the dead).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the deep.” Paul echoes Deuteronomy 30:13, but here uses “the abyss,”
      applying the language to bringing the Messiah up from the dead.
    reason: lexical_alternative
  - marker: b
    text: Greek “Christ”; translated “Messiah” here because Χριστός functions as a
      title.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤ
  chosen: or
  alternatives:
  - or else
  lexicon: BDAG
  rationale: Introduces the second half of the Deuteronomy citation contrastively;
    simple 'or' best matches the Greek and English discourse flow.
- source_word: Τίς
  chosen: Who
  alternatives:
  - Who is it that
  lexicon: BDAG
  rationale: Direct interrogative pronoun; concise rendering preserves the rhetorical
    question.
- source_word: καταβήσεται
  chosen: will descend
  alternatives:
  - will go down
  lexicon: BDAG
  rationale: Future middle of καταβαίνω. 'Descend' fits the elevated rhetorical register
    and pairs naturally with 'into the abyss.'
- source_word: εἰς τὴν ἄβυσσον
  chosen: into the abyss
  alternatives:
  - into the deep
  - into the bottomless depth
  lexicon: BDAG
  rationale: Paul adapts Deut 30:13 and uses ἄβυσσος rather than 'sea.' 'Abyss' preserves
    the specific Greek term and its grave/depth connotations better than the more
    interpretive 'deep.'
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - that means
  - in other words
  lexicon: BDAG
  rationale: Standard explanatory formula; 'that is' is both natural and suitably
    close to the Greek.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like designation. Here it refers to the anointed deliverer
    in a theological explanation, so the titular sense is strong.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Established and accurate rendering of the idiom; the fuller alternative
    is more explicit but less natural in English.
- source_word: ἀναγαγεῖν
  chosen: to bring ... up
  alternatives:
  - to lead ... up
  - to raise up
  lexicon: BDAG
  rationale: Aorist infinitive of ἀνάγω means 'to bring up' or 'lead up.' 'Bring up'
    preserves the spatial imagery corresponding to 'descend into the abyss.' 'Raise
    up' would risk importing resurrection terminology more directly than the verb
    itself states, though resurrection is clearly the referent from context.
