id: ROM.10.6
reference: Romans 10:6
source:
  edition: SBLGNT
  text: ἡ δὲ ἐκ πίστεως δικαιοσύνη οὕτως λέγει· Μὴ εἴπῃς ἐν τῇ καρδίᾳ σου· Τίς ἀναβήσεται
    εἰς τὸν οὐρανόν; τοῦτ’ ἔστιν Χριστὸν καταγαγεῖν·
translation:
  text: 'But the righteousness from faith speaks this way: “Do not say in your heart,
    ‘Who will ascend into heaven?’” (that is, to bring the Messiah down).'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice from faith.' Paul’s δικαιοσύνη can carry both 'righteousness'
      and 'justice' in context.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title
      rather than a name-like designation.
    reason: lexical_alternative
  - marker: c
    text: Paul is echoing Deuteronomy 30:12 and applying it to the Messiah.
    reason: cross_reference
lexical_decisions:
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default Pauline rendering per doctrine table. In Romans, δικαιοσύνη carries
    covenantal and forensic resonance; 'righteousness' best preserves this, while
    'justice' is a meaningful alternative preserved in a footnote.
- source_word: ἐκ πίστεως
  chosen: from faith
  alternatives:
  - by faith
  - out of faith
  lexicon: BDAG
  rationale: Rendered 'from faith' to reflect ἐκ more directly while remaining idiomatic.
    This preserves Paul's contrast with righteousness based on law in the surrounding
    context. 'By faith' is possible but slightly more interpretive.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine table, πίστις defaults to 'faith.' Here the phrase is not
    the contested pistis Christou construction, so 'faith' is the clearest rendering.
- source_word: οὕτως λέγει
  chosen: speaks this way
  alternatives:
  - says this
  - speaks thus
  lexicon: BDAG
  rationale: Natural modern English that still reflects the adverb οὕτως and the present
    tense λέγει. 'Speaks this way' preserves the personification of righteousness.
- source_word: Μὴ εἴπῃς ἐν τῇ καρδίᾳ σου
  chosen: Do not say in your heart
  alternatives:
  - Do not say in your heart to yourself
  lexicon: BDAG
  rationale: A close rendering of the quoted Deuteronomic wording, preserving the
    inward/self-directed sense of καρδία as the seat of thought and intention.
- source_word: Τίς ἀναβήσεται εἰς τὸν οὐρανόν;
  chosen: Who will ascend into heaven?
  alternatives:
  - Who will go up into heaven?
  lexicon: BDAG
  rationale: '''Ascend'' matches the elevated register of ἀναβήσεται and fits the
    scriptural allusion. ''Into heaven'' is the straightforward sense of εἰς τὸν οὐρανόν.'
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine table, Χριστός is translated 'Messiah' where it functions
    as a title. Here it is clearly titular within Paul's scriptural exposition, not
    merely name-like.
- source_word: καταγαγεῖν
  chosen: to bring ... down
  alternatives:
  - to lead ... down
  lexicon: BDAG
  rationale: 'The infinitive explains the meaning of the rhetorical question: ascending
    to heaven would imply bringing the Messiah down. ''Bring down'' is the most natural
    English equivalent in this context.'
