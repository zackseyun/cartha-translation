theological_decisions:
- issue: Personification of 'the righteousness from faith'
  chosen_reading: 'Retained the personification: ''the righteousness from faith speaks
    this way'''
  alternative_readings:
  - Rendered more abstractly, e.g., 'this is what righteousness by faith says'
  rationale: The Greek presents δικαιοσύνη as the grammatical subject of λέγει. Preserving
    the personification keeps Paul's rhetorical style and his contrast with the previous
    verse.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense over tradition where possible.'
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs translating Christological titles to preserve
    meaning where context supports it. In this verse the term functions as a title
    in a salvation-historical/scriptural argument.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
