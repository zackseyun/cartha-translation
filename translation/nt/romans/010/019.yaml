id: ROM.10.19
reference: Romans 10:19
source:
  edition: SBLGNT
  text: ἀλλὰ λέγω, μὴ ⸂Ἰσραὴλ οὐκ ἔγνω⸃; πρῶτος Μωϋσῆς λέγει· Ἐγὼ παραζηλώσω ὑμᾶς
    ἐπ’ οὐκ ἔθνει, ἐπ’ ἔθνει ἀσυνέτῳ παροργιῶ ὑμᾶς.
translation:
  text: But I ask, did Israel not understand? First Moses says, “I will make you jealous
    by what is not a nation; by a foolish nation I will provoke you to anger.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “did Israel not know?” The Greek verb can mean either know or understand;
      here it likely carries the sense of grasping the significance of what was heard.
    reason: lexical_alternative
  - marker: b
    text: Quotation from Deuteronomy 32:21. “What is not a nation” may refer to a
      people regarded as no true nation, that is, the Gentiles.
    reason: cross_reference
lexical_decisions:
- source_word: μὴ Ἰσραὴλ οὐκ ἔγνω
  chosen: did Israel not understand?
  alternatives:
  - did Israel not know?
  - surely Israel did not know?
  lexicon: BDAG
  rationale: The construction introduces a rhetorical question expecting a negative
    answer in form but functioning as Paul's renewed challenge. ἔγνω from γινώσκω
    can be rendered 'know,' but in this context of hearing and responding to God's
    message, 'understand' better captures the sense of grasping what was said, especially
    in parallel with the following citation.
- source_word: πρῶτος
  chosen: First
  alternatives:
  - First of all
  - In the first place
  lexicon: BDAG
  rationale: Retains the adverbial force marking Moses as the first witness cited
    in Paul's sequence of scriptural testimony.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: παραζηλώσω
  chosen: I will make you jealous
  alternatives:
  - I will provoke you to jealousy
  lexicon: BDAG
  rationale: The future verb means to provoke to jealousy. 'Make you jealous' is natural
    modern English and preserves the causative sense.
- source_word: ἐπ’ οὐκ ἔθνει
  chosen: by what is not a nation
  alternatives:
  - by a non-nation
  - by those who are not a nation
  lexicon: BDAG
  rationale: 'Echoes the wording of Deut 32:21 while remaining readable. The dative
    with ἐπί here is instrumental/associative in the citation''s sense: God uses a
    people regarded as ''not a nation'' to provoke Israel. ''What is not a nation''
    preserves the singular neuter and the rhetorical sting of the quotation.'
- source_word: ἔθνει ἀσυνέτῳ
  chosen: by a foolish nation
  alternatives:
  - by an unintelligent nation
  - by a senseless nation
  lexicon: BDAG
  rationale: ἀσύνετος denotes lack of understanding or senselessness. 'Foolish' is
    idiomatic and fits biblical register without sounding overly technical.
- source_word: παροργιῶ
  chosen: I will provoke you to anger
  alternatives:
  - I will anger you
  - I will enrage you
  lexicon: BDAG
  rationale: The verb means to provoke to anger. This rendering preserves the causative
    nuance and parallels the previous future verb.
- source_word: ὑμᾶς
  chosen: you
  rationale: Second person plural in Greek; English 'you' is the natural equivalent,
    with plurality understood from context.
