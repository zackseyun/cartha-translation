theological_decisions:
- issue: Referent of 'not a nation' and 'foolish nation' in the Mosaic citation
  chosen_reading: Retain the quotation's wording without explicitly identifying the
    referent in the main text.
  alternative_readings:
  - Gentiles
  - a people Israel regards as no true nation
  rationale: Paul cites Deut 32:21 to show that Israel should have understood from
    Scripture that God would use outsiders to provoke Israel. The translation preserves
    the scriptural phrasing rather than importing an interpretive gloss into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
