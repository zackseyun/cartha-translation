theological_decisions:
- issue: Referent of 'Lord' in context
  chosen_reading: '''Lord'' refers to the same Lord confessed in the surrounding context,
    namely Jesus as Lord, while the wording also preserves the scriptural resonance
    of calling on the Lord.'
  alternative_readings:
  - A more general reference to God without specifying Christ
  rationale: Romans 10:9-13 centers on confessing Jesus as Lord and then cites Joel
    about calling on the Lord. The translation keeps the title 'Lord' without adding
    interpretive expansion, allowing Paul's high christological claim to stand from
    context rather than paraphrase.
  doctrine_reference: 'Affirmations: Nicene Creed; Contested terms: κύριος → Lord'
- issue: Scope of 'all'
  chosen_reading: '''All'' is qualified by ''who call on him,'' not an unqualified
    statement of salvation for every person.'
  alternative_readings:
  - An unqualified universalist reading
  rationale: The syntax explicitly limits the beneficiaries to 'all who call on him.'
    The translation preserves both the universal availability across Jew/Greek and
    the conditional participial qualifier, maintaining the theological tension present
    in the text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
