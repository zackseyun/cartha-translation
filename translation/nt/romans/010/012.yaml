id: ROM.10.12
reference: Romans 10:12
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν διαστολὴ Ἰουδαίου τε καὶ Ἕλληνος, ὁ γὰρ αὐτὸς κύριος πάντων,
    πλουτῶν εἰς πάντας τοὺς ἐπικαλουμένους αὐτόν·
translation:
  text: For there is no distinction between Jew and Greek, for the same Lord is Lord
    of all, being rich toward all who call on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'Greek'; here the Jew/Greek pairing functions as a Jew/non-Jew contrast.
      Some translations render 'Gentile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the same Lord over all.'
    reason: alternative_reading
lexical_decisions:
- source_word: διαστολή
  chosen: distinction
  alternatives:
  - difference
  - distinction made
  lexicon: BDAG
  rationale: In Pauline usage here, the noun denotes a differentiation or distinction
    between groups. 'Distinction' is idiomatic English and preserves the social-soteriological
    point without overinterpreting it as value judgment.
- source_word: Ἰουδαίου ... Ἕλληνος
  chosen: Jew ... Greek
  alternatives:
  - Jew ... Gentile
  lexicon: BDAG
  rationale: The Greek text says 'Greek,' not the broader 'Gentile.' In Romans this
    pairing functions as a Jew/non-Jew contrast, but 'Greek' should be retained in
    the main text for source transparency.
- source_word: ὁ ... αὐτὸς κύριος πάντων
  chosen: the same Lord is Lord of all
  alternatives:
  - the same Lord of all
  - the same Lord over all
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the doctrine's default for Kyrios. Repeating
    'Lord' makes the predication explicit in natural English and preserves the force
    of the Greek nominal clause. 'Of all' reflects πάντων straightforwardly.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: 'This is a christological title and falls under the doctrine''s contested
    terms table: κύριος defaults to ''Lord.'' ''Master'' would underplay the title''s
    theological resonance in Romans 10.'
- source_word: πλουτῶν
  chosen: being rich toward
  alternatives:
  - abounding toward
  - rich for
  - lavishing riches on
  lexicon: BDAG
  rationale: The present participle describes the Lord's generous abundance. 'Being
    rich toward' keeps the metaphor of richness and the participial connection while
    sounding natural in English.
- source_word: εἰς πάντας
  chosen: toward all
  alternatives:
  - for all
  - to all
  lexicon: BDAG
  rationale: With πλουτῶν, εἰς conveys direction or extension of generosity. 'Toward
    all' preserves that sense without implying universalism apart from the qualifying
    phrase that follows.
- source_word: τοὺς ἐπικαλουμένους αὐτόν
  chosen: all who call on him
  alternatives:
  - all who invoke him
  - all who appeal to him
  lexicon: BDAG
  rationale: ἐπικαλέω in this context refers to calling upon the Lord in faith. 'Call
    on him' is standard, clear English and aligns with the immediate context in Romans
    10:13.
