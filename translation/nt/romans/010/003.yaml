theological_decisions:
- issue: Meaning of 'the righteousness of God' in Pauline usage
  chosen_reading: Rendered as 'the righteousness of God' without resolving whether
    the genitive is primarily possessive ('God's righteousness'), source ('righteousness
    from God'), or covenantal saving activity.
  alternative_readings:
  - God's righteousness
  - righteousness from God
  - God's covenant justice/righteousness
  rationale: The Greek phrase can carry layered Pauline meaning. The translation preserves
    that theological tension rather than narrowing it to one doctrinally loaded interpretation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; δικαιοσύνη default rendering ''righteousness'' with ''justice'' preserved
    in footnotes.'
