id: ROM.10.3
reference: Romans 10:3
source:
  edition: SBLGNT
  text: ἀγνοοῦντες γὰρ τὴν τοῦ θεοῦ δικαιοσύνην, καὶ τὴν ⸀ἰδίαν ζητοῦντες στῆσαι,
    τῇ δικαιοσύνῃ τοῦ θεοῦ οὐχ ὑπετάγησαν·
translation:
  text: For, being ignorant of the righteousness of God and seeking to establish their
    own, they did not submit to the righteousness of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' (for both occurrences of 'righteousness'). In Paul, δικαιοσύνη
      can denote righteousness, justice, or God's righteous way of making people right.
    reason: lexical_alternative
  - marker: b
    text: '''The righteousness of God'' may also be understood as ''righteousness
      from God'' or ''God''s righteousness.'' The Greek wording allows more than one
      nuance.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγνοοῦντες
  chosen: being ignorant of
  alternatives:
  - not knowing
  - being unaware of
  lexicon: BDAG
  rationale: Present participle introducing the causal circumstance behind Israel's
    failure. 'Being ignorant of' preserves the durative participial force and the
    culpable lack of recognition without overstating it as willful rejection.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Standard explanatory conjunction linking this verse to the previous statement.
    'For' preserves the discourse connection in a formal yet natural way.
- source_word: δικαιοσύνην / δικαιοσύνῃ
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in Pauline
    contexts, while preserving 'justice' as a meaningful alternative in a footnote.
    Here the term likely refers to right standing/status and God's righteous way of
    making people right, not merely distributive justice.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - God's
  lexicon: BDAG
  rationale: The genitive can be heard as possessive or source-related. 'Of God' preserves
    the Greek's compact ambiguity better than forcing either 'from God' or 'God's'
    in the main text.
- source_word: ἰδίαν
  chosen: their own
  alternatives:
  - their own righteousness
  lexicon: BDAG
  rationale: The adjective stands elliptically with δικαιοσύνη understood from the
    previous phrase. English requires completion of the sense; 'their own' naturally
    carries forward 'righteousness' without unnecessary repetition before the infinitive
    phrase.
- source_word: ζητοῦντες
  chosen: seeking
  alternatives:
  - trying
  - attempting
  lexicon: BDAG
  rationale: Present participle parallel to ἀγνοοῦντες. 'Seeking' preserves the lexical
    sense and avoids overinterpreting motive or degree.
- source_word: στῆσαι
  chosen: to establish
  alternatives:
  - to set up
  - to make stand
  lexicon: BDAG
  rationale: 'Aorist infinitive of ἵστημι in an idiomatic sense: to establish or set
    up. ''Establish'' is the most natural English rendering in this Pauline argument
    about righteousness.'
- source_word: ὑπετάγησαν
  chosen: did not submit
  alternatives:
  - were not subject
  - did not subject themselves
  lexicon: BDAG
  rationale: Aorist passive with middle-like sense in context. 'Did not submit' is
    idiomatic English and captures the volitional refusal to come under God's righteousness
    without awkwardness.
