theological_decisions:
- issue: Rendering of κύριος in the confession formula
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: Per DOCTRINE.md contested terms, κύριος defaults to 'Lord.' In Romans
    10:9 the title carries both authority and strong scriptural resonance from the
    surrounding context without requiring a narrower gloss like 'Master.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Form of the confession clause κύριον Ἰησοῦν
  chosen_reading: that Jesus is Lord
  alternative_readings:
  - Jesus as Lord
  - the Lord Jesus
  rationale: This rendering preserves the confessional content explicitly in English
    and avoids importing a fixed titular name where the Greek more naturally expresses
    what is confessed.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; translate
    titles'
- issue: Soteriological force of σωθήσῃ
  chosen_reading: you will be saved
  alternative_readings:
  - you will be delivered
  rationale: The verse speaks in a salvation context, and the translation should not
    flatten this into a merely general rescue. This preserves historic Christian soteriological
    language without adding doctrinal qualifiers beyond the text.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy: do not import
    doctrinal claims beyond the text'
