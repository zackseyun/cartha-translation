id: ROM.10.9
reference: Romans 10:9
source:
  edition: SBLGNT
  text: ὅτι ἐὰν ⸀ὁμολογήσῃς ἐν τῷ στόματί ⸀σου κύριον Ἰησοῦν, καὶ πιστεύσῃς ἐν τῇ
    καρδίᾳ σου ὅτι ὁ θεὸς αὐτὸν ἤγειρεν ἐκ νεκρῶν, σωθήσῃ·
translation:
  text: because if you confess with your mouth that Jesus is Lord, and believe in
    your heart that God raised him from the dead, you will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confess Jesus as Lord.' The Greek phrase κύριον Ἰησοῦν can be rendered
      more compactly, but the main text makes the confessional content explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding statement; 'because'
    best captures the causal force in context.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - if ever
  lexicon: BDAG
  rationale: Standard conditional particle with the subjunctives ὁμολογήσῃς and πιστεύσῃς;
    simple 'if' is natural English.
- source_word: ὁμολογήσῃς
  chosen: confess
  alternatives:
  - acknowledge
  - declare
  lexicon: BDAG
  rationale: '''Confess'' preserves the public, verbal sense of acknowledging allegiance
    or truth; stronger and more traditional than ''acknowledge'' without becoming
    archaic.'
- source_word: ἐν τῷ στόματί σου
  chosen: with your mouth
  alternatives:
  - by your mouth
  - in your mouth
  lexicon: BDAG
  rationale: Idiomatic English for instrumental/public verbal confession; more natural
    than a formally wooden rendering.
- source_word: κύριον Ἰησοῦν
  chosen: that Jesus is Lord
  alternatives:
  - Jesus as Lord
  - the Lord Jesus
  lexicon: BDAG
  rationale: The accusative phrase after ὁμολογέω is commonly rendered as the content
    of confession. 'That Jesus is Lord' makes the predicative force explicit in English
    and preserves κύριος as the title 'Lord' per doctrine defaults.
- source_word: πιστεύσῃς
  chosen: believe
  alternatives:
  - trust
  - have faith
  lexicon: BDAG
  rationale: '''Believe'' is the most direct rendering in this clause and fits the
    content clause that follows. While πίστις defaults to ''faith,'' the verbal form
    πιστεύω is naturally rendered ''believe'' here.'
- source_word: ἐν τῇ καρδίᾳ σου
  chosen: in your heart
  alternatives:
  - with your heart
  lexicon: BDAG
  rationale: Retains the biblical anthropological sense of inward conviction without
    over-paraphrase.
- source_word: ὁ θεὸς αὐτὸν ἤγειρεν
  chosen: God raised him
  alternatives:
  - God has raised him
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this context.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Established and accurate idiom for resurrection from among dead persons;
    concise and natural.
- source_word: σωθήσῃ
  chosen: you will be saved
  alternatives:
  - you will be delivered
  lexicon: BDAG
  rationale: Future passive of σῴζω in Pauline soteriological context is best rendered
    'will be saved'; 'delivered' is too broad and weakens the salvation context.
