id: ROM.10.20
reference: Romans 10:20
source:
  edition: SBLGNT
  text: Ἠσαΐας δὲ ἀποτολμᾷ καὶ λέγει· Εὑρέθην ⸀ἐν τοῖς ἐμὲ μὴ ζητοῦσιν, ἐμφανὴς ⸀ἐγενόμην
    τοῖς ἐμὲ μὴ ἐπερωτῶσιν.
translation:
  text: But Isaiah is bold and says, “I was found by those who were not seeking me;
    I became visible to those who were not asking for me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I was found among those who were not seeking me.”
    reason: lexical_alternative
  - marker: b
    text: Or “I made myself known to those who were not asking for me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποτολμᾷ
  chosen: is bold
  alternatives:
  - dares
  - speaks boldly
  lexicon: BDAG
  rationale: The verb conveys daring or boldness. 'Is bold' gives natural English
    while preserving the present-tense vividness introducing Isaiah's striking statement.
- source_word: Εὑρέθην
  chosen: I was found
  alternatives:
  - I was discovered
  lexicon: BDAG
  rationale: Aorist passive, first person singular, echoing the Isaiah citation. 'I
    was found' is the standard and most transparent rendering, preserving the divine
    self-reference in the quotation.
- source_word: ἐν τοῖς ἐμὲ μὴ ζητοῦσιν
  chosen: by those who were not seeking me
  alternatives:
  - among those who were not seeking me
  - in those who were not seeking me
  lexicon: BDAG
  rationale: Although ἐν is formally 'in/among,' in this citation it functions idiomatically
    with the passive 'was found' to indicate the people by whom God was found. 'By
    those who were not seeking me' communicates the sense clearly in English. 'Among'
    is possible and closer to the preposition, so it is preserved in a footnote.
- source_word: ζητοῦσιν
  chosen: seeking
  alternatives:
  - looking for
  lexicon: BDAG
  rationale: '''Seeking'' preserves the biblical and theological resonance of ζητέω
    better than the more colloquial ''looking for.'''
- source_word: ἐμφανὴς ἐγενόμην
  chosen: I became visible
  alternatives:
  - I became manifest
  - I made myself known
  lexicon: BDAG
  rationale: The phrase literally means 'I became manifest/visible.' 'I became visible'
    preserves the predicative adjective plus middle verb structure without over-interpreting
    it. 'I made myself known' is idiomatic and contextually plausible, but it is more
    interpretive, so it is preserved in a footnote.
- source_word: ἐπερωτῶσιν
  chosen: asking for me
  alternatives:
  - inquiring about me
  - calling on me
  lexicon: BDAG
  rationale: ἐπερωτάω here denotes asking or inquiring. 'Asking for me' fits the parallelism
    with 'seeking me' and avoids importing the more specific theological sense 'calling
    on,' which belongs more naturally to other verbs in Romans 10.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: '''But'' marks the contrast with the preceding citation and argument
    more clearly in English.'
- source_word: Ἠσαΐας
  chosen: Isaiah
  lexicon: standard transliteration
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
