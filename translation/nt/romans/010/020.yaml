theological_decisions:
- issue: Rendering the divine self-disclosure in the Isaiah quotation
  chosen_reading: I became visible to those who were not asking for me
  alternative_readings:
  - I made myself known to those who were not asking for me
  rationale: The Greek wording emphasizes manifestation rather than explicitly stating
    the reflexive action 'made myself known.' The chosen rendering preserves the textual
    form and theological tension without paraphrasing beyond the source. The more
    idiomatic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
