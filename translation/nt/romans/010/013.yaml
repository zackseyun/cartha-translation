id: ROM.10.13
reference: Romans 10:13
source:
  edition: SBLGNT
  text: Πᾶς γὰρ ὃς ἂν ἐπικαλέσηται τὸ ὄνομα κυρίου σωθήσεται.
translation:
  text: For everyone who calls on the name of the Lord will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Paul is quoting Joel 2:32. In Joel, the referent is YHWH ('the LORD'); here
      Paul applies the text to Jesus in context.
    reason: cross_reference
  - marker: b
    text: Or 'whoever calls upon.' The Greek expression means to invoke or appeal
      to the Lord by name.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς
  chosen: everyone
  alternatives:
  - everyone
  - every person
  - all
  lexicon: BDAG
  rationale: Though grammatically masculine singular, πᾶς here is generic and representative
    in the construction πᾶς ... ὃς ἂν. 'Everyone' conveys the universal scope naturally
    in modern English without implying male-only reference.
- source_word: γὰρ
  chosen: For
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: γάρ introduces the scriptural support or explanation for the preceding
    claim. 'For' preserves the connective force in a concise, standard English way.
- source_word: ὃς ἂν
  chosen: who
  alternatives:
  - whoever
  - who
  lexicon: BDAG
  rationale: The relative pronoun with ἄν forms an indefinite/generalizing clause,
    meaning 'whoever' or 'who.' Because the sentence already begins with 'everyone,'
    rendering the pair as 'everyone who' avoids redundancy while preserving the sense.
- source_word: ἐπικαλέσηται
  chosen: calls on
  alternatives:
  - calls upon
  - invokes
  - appeals to
  lexicon: BDAG
  rationale: In this biblical idiom, ἐπικαλέω with 'the name' means to invoke or call
    upon in appeal, prayer, or confession. 'Calls on' is idiomatic modern English
    and preserves the scriptural resonance, including the Joel citation background.
- source_word: τὸ ὄνομα
  chosen: the name
  alternatives:
  - the name
  lexicon: BDAG
  rationale: This is a standard Semitic and biblical expression denoting the revealed
    identity, authority, and person invoked. It should be translated literally rather
    than paraphrased.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In Romans 10, Paul
    applies the Joel text about YHWH to Jesus in context, but the translation should
    preserve the wording 'Lord' rather than importing an interpretive expansion into
    the main text.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be rescued
  - will be delivered
  lexicon: BDAG
  rationale: The future passive of σῴζω here carries the Pauline salvation sense,
    not merely temporal rescue. 'Will be saved' is the clearest and most theologically
    appropriate rendering in context.
