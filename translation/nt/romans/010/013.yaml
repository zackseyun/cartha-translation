theological_decisions:
- issue: Referent of 'the Lord' in the Joel citation as used by Paul
  chosen_reading: Retain 'the Lord' in the main text without specifying 'Jesus,' while
    recognizing that in Romans 10 Paul applies this scripture christologically.
  alternative_readings:
  - the LORD
  - the Lord Jesus
  rationale: The Greek text reads κυρίου, and the immediate Pauline context strongly
    identifies Jesus as the referent of the confession and invocation. However, the
    translation should not expand the wording beyond the source text. A footnote preserves
    the intertextual and theological significance that this citation comes from Joel's
    reference to YHWH and is applied here to Jesus.
  doctrine_reference: 'Affirmations; Translation philosophy §§1, 3; Contested terms:
    κύριος, יְהוָה YHWH'
