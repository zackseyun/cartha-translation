theological_decisions:
- issue: Generic masculine expression in Πᾶς ὁ πιστεύων
  chosen_reading: Everyone who believes
  alternative_readings:
  - Every man who believes
  - Whoever believes
  rationale: The Greek masculine singular has representative/generic force rather
    than male-specific reference. Per the translation philosophy, the English should
    match the source's intent rather than mechanically preserve grammatical gender
    where it is not semantically male-specific.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Referent of αὐτῷ
  chosen_reading: him
  rationale: The immediate context identifies the referent as the one in whom faith
    is placed, namely the Messiah/Lord in Paul's argument. The pronoun is retained
    rather than expanded to preserve the quotation's form and avoid importing explanatory
    material into the text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
