id: ROM.10.11
reference: Romans 10:11
source:
  edition: SBLGNT
  text: λέγει γὰρ ἡ γραφή· Πᾶς ὁ πιστεύων ἐπ’ αὐτῷ οὐ καταισχυνθήσεται.
translation:
  text: For the Scripture says, “Everyone who believes in him will not be put to shame.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Whoever believes in him will not be ashamed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - is saying
  - speaks
  lexicon: BDAG
  rationale: 'Present tense is naturally rendered as a vivid present in citation formulae:
    ''the Scripture says.'' This is standard, readable English and preserves the force
    of the Greek.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ grounds the preceding statement, so 'For' best preserves the connective
    and Paul's argumentative flow.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - Scripture
  - the writing
  lexicon: BDAG
  rationale: 'In Pauline citation formulae, γραφή refers to sacred Scripture, not
    merely a writing. The article is retained in English for naturalness: ''the Scripture
    says.'''
- source_word: Πᾶς ὁ πιστεύων
  chosen: Everyone who believes
  alternatives:
  - Whoever believes
  - Every one believing
  lexicon: BDAG
  rationale: The construction is substantival and generic. 'Everyone who believes'
    communicates the universal scope clearly in modern English. This also avoids an
    awkwardly literal participial form while preserving the representative force.
- source_word: πιστεύων
  chosen: believes
  alternatives:
  - has faith
  - trusts
  lexicon: BDAG
  rationale: The verb πιστεύω is best rendered here as 'believes' in a direct quotation
    context. Although related to the contested term πίστις, this verse uses the verb,
    and 'believes' is the most natural and contextually precise rendering.
- source_word: ἐπ’ αὐτῷ
  chosen: in him
  alternatives:
  - on him
  - upon him
  lexicon: BDAG
  rationale: With πιστεύω, ἐπί plus dative commonly conveys reliance or trust directed
    toward a person. In idiomatic English, 'believes in him' best expresses the sense;
    'believes on him' is traditional but less natural in contemporary English.
- source_word: καταισχυνθήσεται
  chosen: will not be put to shame
  alternatives:
  - will not be ashamed
  - will not be disgraced
  lexicon: BDAG
  rationale: The future passive is preserved with 'will not be put to shame.' This
    reflects the passive form more closely than 'will not be ashamed' and fits the
    Isaianic citation background, where public vindication is in view.
