theological_decisions:
- issue: Relation of the messenger quotation to gospel proclamation
  chosen_reading: Retain the Isaiah-derived imagery of messengers whose arrival is
    celebrated, without narrowing it to ordained preaching only.
  alternative_readings:
  - Render κηρύξωσιν as 'preach' and εὐαγγελιζομένων as 'preach the gospel,' which
    may suggest a more formal ministry setting.
  rationale: Paul's chain concerns the sending and proclamation of the gospel, but
    the quotation itself celebrates those who announce good news. The translation
    preserves both the missionary/sending logic and the broader messenger imagery
    without importing a specific ecclesial office.
  doctrine_reference: Translation philosophy §§1, 6
