id: ROM.10.15
reference: Romans 10:15
source:
  edition: SBLGNT
  text: πῶς δὲ ⸀κηρύξωσιν ἐὰν μὴ ἀποσταλῶσιν; ⸀καθὼς γέγραπται· Ὡς ὡραῖοι οἱ πόδες
    τῶν ⸀εὐαγγελιζομένων ⸀τὰ ἀγαθά.
translation:
  text: And how are they to proclaim unless they are sent? As it is written, “How
    beautiful are the feet of those who bring good news of good things!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How welcome' or 'How timely' are the feet… The Greek adjective can suggest
      not only beauty but also the welcome, fitting arrival of the messenger.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'those who bring good news of good things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρύξωσιν
  chosen: proclaim
  alternatives:
  - preach
  - herald
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation or heralding. 'Proclaim' preserves
    the broad sense without restricting it to formal sermonizing implied by 'preach,'
    while remaining more natural than 'herald.'
- source_word: ἀποσταλῶσιν
  chosen: are sent
  alternatives:
  - are commissioned
  - are dispatched
  lexicon: BDAG
  rationale: Passive of ἀποστέλλω indicates being sent by another. 'Are sent' is the
    most direct and idiomatic rendering and preserves the implied dependence on a
    sender.
- source_word: καθὼς γέγραπται
  chosen: As it is written
  alternatives:
  - just as it is written
  lexicon: BDAG
  rationale: Standard citation formula introducing Scripture. 'As it is written' is
    idiomatic and sufficiently formal.
- source_word: ὡραῖοι
  chosen: beautiful
  alternatives:
  - lovely
  - timely
  - welcome
  lexicon: BDAG
  rationale: In the Isaiah citation, ὡραῖος can carry the sense of beauty or pleasantness,
    with possible connotations of seasonableness/welcome. 'Beautiful' is the established
    and most transparent rendering in context, while the nuance of welcome fitness
    is preserved in a footnote.
- source_word: πόδες
  chosen: feet
  lexicon: BDAG
  rationale: Literal body-part term retained from the quotation; metaphorically refers
    to the arrival of messengers, but the image should be preserved in the main text.
- source_word: εὐαγγελιζομένων
  chosen: those who bring good news
  alternatives:
  - those who proclaim good news
  - those who preach the gospel
  lexicon: BDAG
  rationale: The participle denotes announcing good news. 'Bring good news' fits the
    messenger imagery of the quotation and avoids importing later ecclesiastical jargon
    into the citation.
- source_word: τὰ ἀγαθά
  chosen: good things
  alternatives:
  - good news
  - good
  - good tidings
  lexicon: BDAG
  rationale: The Greek phrase is literally 'the good things.' Retaining 'good things'
    reflects the text more closely than collapsing it into a second instance of 'good
    news,' while still sounding natural in English.
