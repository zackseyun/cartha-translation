theological_decisions:
- issue: Nature of Israel's zeal
  chosen_reading: their zeal is directed toward God but lacks proper knowledge
  alternative_readings:
  - they have God's own zeal
  - they have religious zeal without specifying its object
  rationale: 'The phrase ζῆλον θεοῦ is best read as an objective genitive in context,
    since Paul is describing Israel''s earnest devotion while critiquing its misdirected
    understanding in the following verses. This preserves the text''s tension: sincerity
    is acknowledged, but correctness is denied.'
  doctrine_reference: Preserve theological tension rather than resolve it
