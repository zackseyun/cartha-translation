id: ROM.10.2
reference: Romans 10:2
source:
  edition: SBLGNT
  text: μαρτυρῶ γὰρ αὐτοῖς ὅτι ζῆλον θεοῦ ἔχουσιν· ἀλλ’ οὐ κατ’ ἐπίγνωσιν,
translation:
  text: For I testify about them that they have zeal for God, but not according to
    knowledge,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have a zeal of God'; the Greek genitive could be rendered more
      literally, but here likely means zeal directed toward God.
    reason: lexical_alternative
  - marker: b
    text: Or 'not with full knowledge' or 'not based on knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρῶ
  chosen: I testify
  alternatives:
  - I bear witness
  - I can testify
  lexicon: BDAG
  rationale: Present indicative first person singular; 'I testify' preserves the direct
    evidentiary force of Paul's statement in clear modern English. 'Bear witness'
    is more formal/traditional but less natural here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse. 'For' is concise
    and natural in Pauline argumentation.
- source_word: αὐτοῖς
  chosen: about them
  alternatives:
  - to them
  - concerning them
  lexicon: BDAG
  rationale: With μαρτυρέω in this context, the dative refers to the people concerning
    whom testimony is given, not the indirect object receiving testimony. 'About them'
    best reflects the sense in English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of Paul's testimony straightforwardly.
- source_word: ζῆλον
  chosen: zeal
  alternatives:
  - ardor
  - enthusiasm
  lexicon: BDAG
  rationale: '''Zeal'' is the standard and most precise rendering, preserving both
    intensity and possible religious devotion without over-paraphrase.'
- source_word: θεοῦ
  chosen: for God
  alternatives:
  - of God
  - for God's cause
  lexicon: BDAG
  rationale: 'The genitive with ζῆλον is best taken objectively here: zeal directed
    toward God. ''Zeal of God'' in English is ambiguous and could suggest God''s own
    zeal rather than Israel''s zeal toward him.'
- source_word: ἔχουσιν
  chosen: they have
  alternatives:
  - they possess
  lexicon: BDAG
  rationale: Simple present indicative; 'they have' is the natural English equivalent.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - however
  lexicon: BDAG
  rationale: Marks the contrast sharply and naturally.
- source_word: οὐ κατ’ ἐπίγνωσιν
  chosen: not according to knowledge
  alternatives:
  - not with full knowledge
  - not in accordance with knowledge
  - not based on true knowledge
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the Greek construction κατά +
    accusative and leaves intact the nuance of knowledge that is real, proper, or
    full. More interpretive options like 'true knowledge' or 'full knowledge' are
    possible but go beyond what the phrase explicitly states.
