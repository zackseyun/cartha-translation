id: ROM.10.18
reference: Romans 10:18
source:
  edition: SBLGNT
  text: Ἀλλὰ λέγω, μὴ οὐκ ἤκουσαν; μενοῦνγε· Εἰς πᾶσαν τὴν γῆν ἐξῆλθεν ὁ φθόγγος αὐτῶν,
    καὶ εἰς τὰ πέρατα τῆς οἰκουμένης τὰ ῥήματα αὐτῶν.
translation:
  text: 'But I ask, did they not hear? Indeed they did: “Their voice has gone out
    into all the earth, and their words to the ends of the inhabited world.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Their sound has gone out into all the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'world'; Greek 'inhabited world.'
    reason: lexical_alternative
  - marker: c
    text: Paul is quoting Psalm 19:4 and applying its language to the spread of the
      message.
    reason: cross_reference
lexical_decisions:
- source_word: μὴ οὐκ ἤκουσαν
  chosen: did they not hear?
  alternatives:
  - have they not heard?
  lexicon: BDAG
  rationale: The double negative with μή οὐκ introduces a rhetorical question expecting
    a positive answer. English preserves this naturally as 'did they not hear?' A
    present-perfect alternative is possible in English, but the aorist is well represented
    by simple past here.
- source_word: μενοῦνγε
  chosen: Indeed they did
  alternatives:
  - Certainly
  - On the contrary, indeed
  lexicon: BDAG
  rationale: This particle gives an emphatic affirmative response to the rhetorical
    question. 'Indeed they did' makes the implied verb explicit in natural English
    and preserves the force of the answer.
- source_word: φθόγγος
  chosen: voice
  alternatives:
  - sound
  - tone
  lexicon: BDAG
  rationale: In the Psalm citation underlying Paul's wording, the term refers to the
    audible proclamation going out broadly. 'Voice' is idiomatic in English biblical
    style and pairs well with 'words' in the second colon, though 'sound' is a viable
    lexical alternative.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In this universalizing poetic citation, 'earth' best conveys the worldwide
    scope rather than a particular territory or land.
- source_word: πέρατα
  chosen: ends
  alternatives:
  - extremities
  - furthest parts
  lexicon: BDAG
  rationale: '''Ends'' is the natural English equivalent in this idiom (''to the ends
    of...'') and preserves the poetic parallelism.'
- source_word: οἰκουμένης
  chosen: inhabited world
  alternatives:
  - world
  lexicon: BDAG
  rationale: οἰκουμένη often denotes the inhabited world, not merely the physical
    globe in abstraction. Rendering it explicitly as 'inhabited world' preserves the
    lexical nuance, even though 'world' would be smoother.
- source_word: ῥήματα
  chosen: words
  alternatives:
  - message
  - sayings
  lexicon: BDAG
  rationale: '''Words'' is the straightforward lexical equivalent and maintains the
    parallelism with ''voice.'' ''Message'' would be more interpretive than the Greek
    requires.'
- source_word: ἐξῆλθεν
  chosen: has gone out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: Although the Greek aorist is formally past, English present perfect works
    well in a citation whose effect continues into the present argument. It also matches
    common English idiom for a proclamation that has spread abroad.
