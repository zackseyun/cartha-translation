theological_decisions:
- issue: Referent of 'their' in the Psalm citation applied by Paul
  chosen_reading: Retain the pronouns without interpretive expansion
  alternative_readings:
  - Interpret 'their' explicitly as the heavens from Psalm 19
  - Interpret 'their' as gospel preachers/apostles in Paul's application
  rationale: Paul cites Psalm 19 and applies its language to the spread of the proclaimed
    message. The translation should preserve the wording of the citation without resolving
    the debated referent in the main text. This maintains the intertextual tension
    rather than importing an interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
