id: ROM.10.16
reference: Romans 10:16
source:
  edition: SBLGNT
  text: ἀλλ’ οὐ πάντες ὑπήκουσαν τῷ εὐαγγελίῳ· Ἠσαΐας γὰρ λέγει· Κύριε, τίς ἐπίστευσεν
    τῇ ἀκοῇ ἡμῶν;
translation:
  text: But not all obeyed the good news. For Isaiah says, “Lord, who has believed
    our message?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the gospel.”
    reason: lexical_alternative
  - marker: b
    text: Or “our report”; literally “our hearing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast with the preceding argument; 'But' is the most natural
    concise English adversative here.
- source_word: οὐ πάντες
  chosen: not all
  alternatives:
  - not everyone
  lexicon: BDAG
  rationale: Preserves the partial negation of the Greek rather than implying total
    rejection. 'Not all' closely matches the syntax and rhetorical force.
- source_word: ὑπήκουσαν
  chosen: obeyed
  alternatives:
  - listened to
  - responded obediently to
  lexicon: BDAG
  rationale: ὑπακούω denotes obedience rather than mere hearing. In context Paul speaks
    of the demanded response to the gospel, so 'obeyed' preserves the stronger covenantal
    and moral sense.
- source_word: τῷ εὐαγγελίῳ
  chosen: the good news
  alternatives:
  - the gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον means 'good news.' This rendering is more transparent in modern
    English while still fitting Paul's usage. 'The gospel' remains a viable traditional
    alternative.
- source_word: Ἠσαΐας
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces scriptural support for the preceding statement. 'For' preserves
    the explanatory connection in a natural literary register.
- source_word: λέγει
  chosen: says
  alternatives:
  - declares
  lexicon: BDAG
  rationale: Present tense is retained, reflecting the common New Testament practice
    of citing Scripture as a living voice.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - O Lord
  lexicon: BDAG
  rationale: Follows the default rendering of κύριος as 'Lord.' The vocative could
    be expanded as 'O Lord,' but simple 'Lord' is idiomatic and sufficiently reverent
    in contemporary English.
- source_word: τίς
  chosen: who
  lexicon: BDAG
  rationale: Straightforward interrogative pronoun.
- source_word: ἐπίστευσεν
  chosen: has believed
  alternatives:
  - believed
  lexicon: BDAG
  rationale: English present perfect naturally conveys the force of the aorist in
    this rhetorical quotation as a completed response viewed in relation to the present
    argument.
- source_word: τῇ ἀκοῇ ἡμῶν
  chosen: our message
  alternatives:
  - what we heard
  - our report
  lexicon: BDAG
  rationale: ἀκοή can mean 'hearing,' 'report,' or 'message.' In the Isaiah citation,
    the sense is the proclaimed report/message that is heard. 'Our message' is clear
    modern English; 'our report' is more traditional and is preserved in a footnote.
