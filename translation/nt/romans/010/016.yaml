theological_decisions:
- issue: Nature of the response demanded by the gospel in ὑπήκουσαν τῷ εὐαγγελίῳ
  chosen_reading: Rendered as 'obeyed the good news' rather than reducing the verb
    to mere hearing or acceptance.
  alternative_readings:
  - did not listen to the gospel
  - did not heed the gospel
  rationale: The Greek verb is explicitly one of obedience. This preserves Paul's
    linkage between faith and obedient response without importing a denominational
    scheme about the mechanics of salvation.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of ἀκοή in the Isaiah quotation
  chosen_reading: Rendered as 'message' in the main text.
  alternative_readings:
  - report
  - hearing
  rationale: The term can denote the content heard or the act of hearing. In this
    citation the content sense is most natural in English. Because 'our report' is
    a longstanding and defensible rendering, it is preserved in a footnote to maintain
    transparency.
  doctrine_reference: Translation philosophy §§1, 3
