theological_decisions:
- issue: Rendering δικαιοσύνη in a Pauline contrast
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The project default specifies 'righteousness' for δικαιοσύνη, while preserving
    'justice' in footnotes for Pauline passages. Here Paul contrasts righteousness
    from the law with righteousness from faith in the surrounding context, so 'righteousness'
    best preserves the theological linkage.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice
    preserved in footnotes for Pauline passages'
- issue: Representative force of ἄνθρωπος
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Greek is masculine singular but representative. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral flattening; the inclusive force can
    be noted in a footnote rather than changed in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
