id: ROM.10.5
reference: Romans 10:5
source:
  edition: SBLGNT
  text: Μωϋσῆς γὰρ γράφει ⸂ὅτι τὴν δικαιοσύνην τὴν ἐκ ⸀τοῦ νόμου⸃ ὁ ⸀ποιήσας ἄνθρωπος
    ζήσεται ἐν ⸀αὐτῇ.
translation:
  text: 'For Moses writes about the righteousness that is from the law: the man who
    does these things will live by them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη).
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is grammatically masculine in Greek and here represents any
      person who does these things.'
    reason: cultural_note
  - marker: c
    text: Or 'will live in them'; Paul is echoing Leviticus 18:5.
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: BDAG
  rationale: Marks an explanatory connection to the preceding argument; 'For' is the
    most natural concise English equivalent here.
- source_word: γράφει
  chosen: writes
  alternatives:
  - says
  lexicon: BDAG
  rationale: Present tense in citation formula is naturally rendered 'writes' in English,
    preserving the scriptural-reference idiom.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the project's default for δικαιοσύνη in Pauline usage. In Romans
    this term carries covenantal and forensic-theological weight better preserved
    by 'righteousness,' while 'justice' is worth preserving as an alternative in a
    footnote per doctrine guidance.
- source_word: τὴν ἐκ τοῦ νόμου
  chosen: that is from the law
  alternatives:
  - from law
  - based on the law
  lexicon: BDAG
  rationale: ἐκ denotes source/origin; 'that is from the law' closely reflects the
    Greek structure and Paul's contrast between kinds of righteousness.
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: The article supports 'the law,' and in Pauline context this normally
    refers to the Mosaic law as a known category.
- source_word: ὁ ποιήσας
  chosen: who does
  alternatives:
  - the one who has done
  - the one who practices
  lexicon: BDAG
  rationale: Aorist participle used in a scriptural citation expressing the person
    characterized by doing the commandments. English present 'who does' is idiomatic
    and reflects the general principle rather than a single past act.
- source_word: ἄνθρωπος
  chosen: the man
  alternatives:
  - the person
  - the human being
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular with representative force.
    Per doctrine, a gender-accurate rendering is preferred over gender-neutral smoothing;
    a footnote can clarify the representative sense.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - will have life
  lexicon: BDAG
  rationale: Future middle is straightforwardly rendered 'will live,' echoing the
    Leviticus citation and preserving its covenantal force.
- source_word: ἐν αὐτῇ
  chosen: by them
  alternatives:
  - in them
  - by it
  lexicon: BDAG
  rationale: Although αὐτῇ is singular feminine in the immediate Greek, Paul is echoing
    Leviticus 18:5, where the sense is living by doing the statutes/commandments.
    English 'by them' best conveys the idiomatic sense of the citation. 'In them'
    is a more formal alternative worth preserving in a footnote.
