id: ROM.10.17
reference: Romans 10:17
source:
  edition: SBLGNT
  text: ἄρα ἡ πίστις ἐξ ἀκοῆς, ἡ δὲ ἀκοὴ διὰ ῥήματος ⸀Χριστοῦ.
translation:
  text: So faith comes from hearing, and hearing through the word of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the word about the Messiah' / 'through the message concerning
      the Messiah.' The Greek genitive can be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρα
  chosen: So
  alternatives:
  - Therefore
  - Consequently
  lexicon: BDAG
  rationale: Inferential particle drawing a conclusion from the preceding argument;
    'So' is natural modern English while preserving the logical connection.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith.' In this context it
    refers to the believer's responsive faith arising from hearing the proclaimed
    message, not primarily 'faithfulness.'
- source_word: ἐξ ἀκοῆς
  chosen: comes from hearing
  alternatives:
  - is from hearing
  - comes by hearing
  lexicon: BDAG
  rationale: ἐξ marks source/origin. Supplying 'comes' makes idiomatic English and
    reflects the implied verbal sense in the verbless Greek clause.
- source_word: ἀκοή
  chosen: hearing
  alternatives:
  - report
  - message heard
  lexicon: BDAG
  rationale: ἀκοή can denote either the act of hearing or the content heard. Here
    the first occurrence is best taken as the act/result of hearing in relation to
    faith; the second retains the same English gloss for consistency, while the following
    phrase clarifies its mediated source.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: δέ here links the second clause in a mild continuative way rather than
    marking strong contrast; 'and' fits the flow in English.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  - by
  lexicon: BDAG
  rationale: διά with the genitive indicates means or agency; 'through' is the most
    transparent rendering.
- source_word: ῥήματος
  chosen: word
  alternatives:
  - message
  - utterance
  lexicon: BDAG
  rationale: ῥῆμα often denotes a spoken word or utterance. 'Word' preserves the lexical
    form and traditional resonance, while remaining understandable in context.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  - Messiah's
  - about the Messiah
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated ''Messiah'' where it functions as
    a title. The genitive is rendered straightforwardly as ''of the Messiah'' in idiomatic
    English: ''the word of the Messiah.'' Because some understand the genitive as
    objective (''word about the Messiah''), that alternative is preserved in a footnote
    rather than resolved absolutely in the main text.'
