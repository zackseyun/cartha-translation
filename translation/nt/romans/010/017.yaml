theological_decisions:
- issue: Meaning of πίστις in Pauline usage here
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The immediate context concerns the human response to the proclaimed gospel
    (10:14–16), so 'faith' best captures Paul's point without importing a more specialized
    sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved
    where contested'
- issue: Rendering of Χριστοῦ after ῥήματος
  chosen_reading: the word of the Messiah
  alternative_readings:
  - the word about the Messiah
  - the message concerning the Messiah
  rationale: The Greek genitive can be read as subjective/possessive or objective.
    A relatively formal rendering in the main text preserves the Greek wording, while
    the more interpretive objective sense is preserved in a footnote to maintain the
    ambiguity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it; Contested terms: Χριστός → Messiah where title'
