theological_decisions:
- issue: Relationship of belief/confession to righteousness/salvation
  chosen_reading: 'Render the verse straightforwardly as describing the ordinary pattern:
    inward belief is unto righteousness, outward confession is unto salvation, without
    specifying a mechanistic order of justification or making confession a meritorious
    work.'
  alternative_readings:
  - Treat confession as merely evidential of salvation
  - Treat confession as an additional condition that earns salvation
  rationale: The Greek presents paired clauses with parallel εἰς phrases. The translation
    should preserve the theological tension and not resolve debates about ordo salutis
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
