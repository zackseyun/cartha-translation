id: ROM.10.10
reference: Romans 10:10
source:
  edition: SBLGNT
  text: καρδίᾳ γὰρ πιστεύεται εἰς δικαιοσύνην, στόματι δὲ ὁμολογεῖται εἰς σωτηρίαν·
translation:
  text: For with the heart one believes unto righteousness, and with the mouth one
    confesses unto salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unto justice.' The Greek δικαιοσύνη can also be rendered 'justice,'
      though in Paul 'righteousness' is the default rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδίᾳ
  chosen: with the heart
  alternatives:
  - in the heart
  - by the heart
  lexicon: BDAG
  rationale: Dative used instrumentally or with reference to the inner person. 'With
    the heart' is idiomatic in English and preserves the anthropological emphasis
    on inward belief rather than mere cognition.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation of the preceding statement. 'For' preserves the connective
    force without overinterpreting the exact nuance.
- source_word: πιστεύεται
  chosen: one believes
  alternatives:
  - it is believed
  - a person believes
  lexicon: BDAG
  rationale: Present passive/middle-form verb used in a generalizing sense. English
    impersonal passive ('it is believed') is awkward here; 'one believes' best conveys
    the generic force while keeping the statement proverbial and universal.
- source_word: εἰς δικαιοσύνην
  chosen: unto righteousness
  alternatives:
  - resulting in righteousness
  - for righteousness
  lexicon: BDAG
  rationale: εἰς here indicates movement toward/result. 'Unto righteousness' preserves
    Paul's compact phrasing and avoids flattening the theological relation. Because
    δικαιοσύνη is a contested Pauline term, the alternative 'justice' is preserved
    in a footnote per doctrine guidance.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Default rendering per DOCTRINE.md for Pauline usage. In Romans this term
    can carry covenantal/forensic and ethical overtones; 'righteousness' best preserves
    the established theological range without narrowing it to social justice alone.
- source_word: στόματι
  chosen: with the mouth
  alternatives:
  - by the mouth
  lexicon: BDAG
  rationale: Dative parallel to καρδίᾳ, indicating the outward organ/instrument of
    confession. 'With the mouth' is natural English and preserves the inward/outward
    parallelism.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks a mild contrast or continuation between inward belief and
    outward confession. 'And' best reflects the complementary pairing in English without
    suggesting opposition.
- source_word: ὁμολογεῖται
  chosen: one confesses
  alternatives:
  - it is confessed
  - one acknowledges
  - one professes
  lexicon: BDAG
  rationale: Generalizing passive/middle-form parallel to πιστεύεται. 'Confesses'
    fits the immediate context of verbal acknowledgment of Jesus as Lord (v. 9) better
    than the broader 'acknowledges' or the more formal 'professes'.
- source_word: εἰς σωτηρίαν
  chosen: unto salvation
  alternatives:
  - resulting in salvation
  - for salvation
  lexicon: BDAG
  rationale: εἰς again expresses goal/result. 'Unto salvation' preserves the formal
    parallel with 'unto righteousness' and avoids overexplaining Paul's concise formulation.
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: In Pauline soteriological context, 'salvation' is the most fitting and
    standard rendering, preserving both present and eschatological dimensions.
