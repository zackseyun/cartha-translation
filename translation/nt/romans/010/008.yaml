theological_decisions:
- issue: Rendering of πίστις in the phrase τὸ ῥῆμα τῆς πίστεως
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine guide sets 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. In this verse Paul refers to the proclaimed
    message that calls for and is characterized by faith; rendering it 'faith' preserves
    standard Pauline usage without importing a narrower doctrinal system.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
