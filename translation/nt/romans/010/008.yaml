id: ROM.10.8
reference: Romans 10:8
source:
  edition: SBLGNT
  text: ἀλλὰ τί λέγει; Ἐγγύς σου τὸ ῥῆμά ἐστιν, ἐν τῷ στόματί σου καὶ ἐν τῇ καρδίᾳ
    σου, τοῦτ’ ἔστιν τὸ ῥῆμα τῆς πίστεως ὃ κηρύσσομεν.
translation:
  text: But what does it say? “The word is near you, in your mouth and in your heart”
    — that is, the word of faith that we proclaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message of faith'; also, πίστις can in some contexts be rendered
      'faithfulness' or 'trust.'
    reason: lexical_alternative
  - marker: b
    text: Paul is echoing Deuteronomy 30:14, applying its language to the proclaimed
      gospel message.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - But instead
  lexicon: BDAG
  rationale: Adversative conjunction introducing Paul's contrast with the preceding
    discussion. 'But' is the most natural English transition here.
- source_word: τί λέγει
  chosen: what does it say?
  alternatives:
  - what does Scripture say?
  - what does he say?
  lexicon: BDAG
  rationale: The singular 'it' reflects the implied scriptural citation being personified,
    matching Paul's idiom. Supplying 'Scripture' in the main text would be interpretive
    beyond the explicit Greek, though context makes that referent clear.
- source_word: Ἐγγύς
  chosen: near
  alternatives:
  - close
  - at hand
  lexicon: BDAG
  rationale: Standard spatial/metaphorical sense. 'Near' preserves the concise wording
    of the citation and works naturally in English.
- source_word: τὸ ῥῆμά
  chosen: the word
  alternatives:
  - the message
  - the saying
  lexicon: BDAG
  rationale: ῥῆμα can mean 'word,' 'statement,' or 'message.' 'The word' preserves
    the citation's wording and allows Paul’s explanatory apposition to define its
    gospel sense. 'Message' is possible but slightly more interpretive.
- source_word: ἐν τῷ στόματί σου
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: BDAG
  rationale: A direct and idiomatic rendering of the prepositional phrase, preserving
    the bodily imagery from the source text.
- source_word: ἐν τῇ καρδίᾳ σου
  chosen: in your heart
  alternatives:
  - in your inner being
  lexicon: BDAG
  rationale: '''Heart'' is the standard rendering of καρδία and preserves the biblical
    anthropology of inward thought and commitment without paraphrase.'
- source_word: τοῦτ’ ἔστιν
  chosen: that is,
  alternatives:
  - that means
  - namely
  lexicon: BDAG
  rationale: Introduces Paul's explanation of the citation. 'That is' is both accurate
    and readable.
- source_word: τὸ ῥῆμα τῆς πίστεως
  chosen: the word of faith
  alternatives:
  - the message of faith
  - the word about faith
  lexicon: BDAG
  rationale: Retains the lexical link with the earlier ῥῆμα as 'word.' For πίστις,
    the doctrinal default is 'faith.' The genitive likely denotes content or characteristic
    ('the word characterized by / calling for faith'), but 'of faith' preserves the
    Greek compactly without over-resolving the nuance.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith.' Here the phrase is not one
    of the specifically contested constructions like pistis Christou, so 'faith' is
    preferred in the main text while alternatives are preserved in a footnote.
- source_word: ὃ κηρύσσομεν
  chosen: that we proclaim
  alternatives:
  - which we preach
  - that we announce
  lexicon: BDAG
  rationale: κηρύσσω is the act of heralding or proclaiming publicly. 'Proclaim' is
    more accessible than 'preach' while preserving the authoritative public-announcement
    sense.
