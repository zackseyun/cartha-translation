theological_decisions:
- issue: Meaning of τέλος νόμου in relation to the Mosaic law
  chosen_reading: '''end'' in the main text, preserving both termination and goal/culmination
    nuances'
  alternative_readings:
  - '''goal of the law'''
  - '''culmination of the law'''
  - '''fulfillment of the law'''
  rationale: This is a major interpretive crux in Romans 10:4. The Greek permits both
    temporal/terminative and teleological senses. In keeping with the doctrine's instruction
    to preserve theological tension rather than resolve genuine ambiguity, the main
    text uses 'end' and a footnote preserves 'goal/culmination.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse concerns Jesus' relation to Israel's law and covenant story,
    so the titular, messianic sense is foregrounded. This follows the doctrine's default
    for Χριστός where context supports title rather than name-like usage.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like)'
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table sets 'righteousness' as the default, while preserving
    'justice' in footnotes for Pauline passages. This verse is Pauline and the alternative
    is worth preserving because it can affect how readers hear Paul's claim.
  doctrine_reference: 'Contested terms table: δικαιοσύνη → righteousness; justice
    preserved in footnotes for Pauline passages'
