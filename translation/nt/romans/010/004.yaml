id: ROM.10.4
reference: Romans 10:4
source:
  edition: SBLGNT
  text: τέλος γὰρ νόμου Χριστὸς εἰς δικαιοσύνην παντὶ τῷ πιστεύοντι.
translation:
  text: For Messiah is the end of the law for righteousness to everyone who believes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''goal'' or ''culmination'': the Greek word translated ''end'' can mean
      termination, goal, or fulfillment.'
    reason: alternative_reading
  - marker: b
    text: Or 'justice' for 'righteousness' in Pauline usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέλος
  chosen: end
  alternatives:
  - goal
  - culmination
  - fulfillment
  lexicon: BDAG
  rationale: 'τέλος can denote end, goal, outcome, or culmination. In this compressed
    Pauline clause, ''end'' best preserves the Greek''s ambiguity: Messiah is both
    the law''s terminating point in a salvation-historical sense and its goal/culmination.
    Choosing ''end'' in the main text keeps the wording concise and traditional while
    allowing the teleological nuance to be preserved in a footnote.'
- source_word: νόμου
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: With the anarthrous genitive after τέλος, English idiom still favors
    'the law' in this Pauline context, referring to the Mosaic law as a known covenantal
    category rather than law in the abstract.
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where the titular
    sense is active. Here Paul is making a theological claim about Jesus in relation
    to Israel's law and covenant hopes, so the title's meaning should be preserved
    rather than transliterated.
- source_word: εἰς δικαιοσύνην
  chosen: for righteousness
  alternatives:
  - unto righteousness
  - resulting in righteousness
  lexicon: BDAG
  rationale: εἰς here expresses purpose/result. 'For righteousness' is natural English
    and preserves the directional force without over-interpreting. Because δικαιοσύνη
    is a contested Pauline term in the doctrine table, the alternative 'justice' is
    preserved in a footnote rather than adopted in the main text.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the default rendering in DOCTRINE.md for Pauline usage, δικαιοσύνη
    is rendered 'righteousness' in the main text. 'Justice' is a legitimate semantic
    alternative but would shift the verse's perceived emphasis; it is therefore preserved
    in a footnote.
- source_word: παντὶ τῷ πιστεύοντι
  chosen: to everyone who believes
  alternatives:
  - for everyone who believes
  - to every believer
  lexicon: BDAG
  rationale: The dative phrase marks the persons for whom this righteousness is effective
    or available. 'To everyone who believes' is clear, idiomatic, and preserves the
    participial sense of πιστεύοντι without importing a denominationally loaded formulation.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ links this verse as an explanation of the preceding argument. 'For'
    is the most natural discourse marker in formal-modern English here.
