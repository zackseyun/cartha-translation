theological_decisions:
- issue: Characterization of Israel's response to God
  chosen_reading: Rendered the participles as 'disobedient and contrary people' to
    preserve both refusal and active opposition without importing a narrower doctrinal
    claim about ethnic Israel beyond Paul's citation.
  alternative_readings:
  - disobedient and opposing people
  - unbelieving and contradicting people
  rationale: The verse quotes Isaiah to describe Israel's persistent resistance to
    God's overtures. The translation preserves the prophetic and theological tension
    of divine initiative and human refusal, without resolving broader debates about
    Israel's status beyond what the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
