id: ROM.10.21
reference: Romans 10:21
source:
  edition: SBLGNT
  text: πρὸς δὲ τὸν Ἰσραὴλ λέγει· Ὅλην τὴν ἡμέραν ἐξεπέτασα τὰς χεῖράς μου πρὸς λαὸν
    ἀπειθοῦντα καὶ ἀντιλέγοντα.
translation:
  text: But concerning Israel he says, “All day long I have stretched out my hands
    to a disobedient and contrary people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But to Israel he says.' The Greek construction can be understood as
      direct address or as speech concerning Israel.
    reason: alternative_reading
  - marker: b
    text: '''Disobedient'' can also carry the sense ''unbelieving'' or ''refusing
      to be persuaded.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'opposing,' 'contradicting,' or 'speaking against.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς δὲ τὸν Ἰσραὴλ
  chosen: But concerning Israel
  alternatives:
  - But to Israel
  - But with regard to Israel
  lexicon: BDAG
  rationale: πρός with λέγει here introduces the topic or reference of what is said
    rather than direct address alone. 'Concerning Israel' is natural English and preserves
    the sense that the statement is about Israel. 'But to Israel' is possible and
    traditional, so preserved as an alternative.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he says of
  - he says to
  lexicon: BDAG
  rationale: Present tense is retained as a vivid citation formula common in Paul.
    English idiom favors 'he says.' The implied subject is God in the Isaiah citation
    context, but the Greek leaves it implicit here.
- source_word: Ὅλην τὴν ἡμέραν
  chosen: All day long
  alternatives:
  - The whole day
  - All the day
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the accusative of extent of time; preserves
    the durative force without archaic phrasing.
- source_word: ἐξεπέτασα
  chosen: I have stretched out
  alternatives:
  - I stretched out
  - I spread out
  lexicon: BDAG
  rationale: The aorist in the quotation refers to God's action in the prophetic text;
    in English, 'have stretched out' conveys the present relevance and ongoing force
    of the cited divine appeal. 'Stretched out' is preferred over 'spread out' as
    the more idiomatic rendering with 'hands.'
- source_word: τὰς χεῖράς μου
  chosen: my hands
  lexicon: BDAG
  rationale: Literal rendering preserves the anthropomorphic image of appeal, invitation,
    or entreaty from the source text.
- source_word: πρὸς λαὸν
  chosen: to a people
  alternatives:
  - toward a people
  lexicon: BDAG
  rationale: With the gesture verb, πρός naturally indicates direction toward the
    object of appeal. 'To a people' is idiomatic and fits the image of outstretched
    hands directed toward them.
- source_word: λαὸν
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: λαός commonly means 'people' here, especially in covenantal and corporate
    terms. 'Nation' is possible but less natural in this context and may overemphasize
    political identity.
- source_word: ἀπειθοῦντα
  chosen: disobedient
  alternatives:
  - unbelieving
  - refusing to be persuaded
  lexicon: BDAG
  rationale: ἀπειθέω can denote disobedience and refusal to believe/be persuaded.
    In this context, where Israel resists God's message, 'disobedient' best captures
    the moral-volitional sense without narrowing it merely to intellectual unbelief.
    The overlap with unbelief is preserved in a footnote.
- source_word: καὶ ἀντιλέγοντα
  chosen: and contrary
  alternatives:
  - and opposing
  - and contradicting
  - and speaking against
  lexicon: BDAG
  rationale: ἀντιλέγω denotes speaking against, opposing, or contradicting. 'Contrary'
    is concise and idiomatic in English when paired with 'disobedient,' preserving
    the characterization of active resistance. More explicit alternatives are preserved
    in a footnote.
