theological_decisions:
- issue: Gendered address Ἀδελφοί
  chosen_reading: Brothers
  alternative_readings:
  - Brothers and sisters
  rationale: Following the doctrine's gender-accurate principle, the masculine plural
    is preserved in the main text rather than neutralized. Because the address likely
    includes the mixed congregation, the inclusive sense is preserved in a footnote
    rather than replacing the source-form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
