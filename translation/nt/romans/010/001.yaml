id: ROM.10.1
reference: Romans 10:1
source:
  edition: SBLGNT
  text: Ἀδελφοί, ἡ μὲν εὐδοκία τῆς ἐμῆς καρδίας καὶ ἡ ⸀δέησις πρὸς τὸν θεὸν ὑπὲρ ⸀αὐτῶν
    εἰς σωτηρίαν.
translation:
  text: Brothers, the desire of my heart and my prayer to God for them is for their
    salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek uses the masculine plural form, which
      can address a mixed group.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  chosen: Brothers
  alternatives:
  - Brothers and sisters
  - Siblings
  lexicon: BDAG
  rationale: Vocative plural of ἀδελφός. Per doctrine, gender-accurate over gender-neutral;
    Paul addresses the congregation with the conventional masculine plural. Inclusive
    force may be noted, but the main text preserves the source-form.
- source_word: εὐδοκία
  chosen: desire
  alternatives:
  - good pleasure
  - heart's desire
  - delight
  lexicon: BDAG
  rationale: In this context εὐδοκία refers to what Paul wants or longs for, not abstract
    goodwill. 'Desire' is natural modern English and fits the genitive phrase 'of
    my heart.'
- source_word: τῆς ἐμῆς καρδίας
  chosen: of my heart
  alternatives:
  - in my heart
  - my heart's
  lexicon: BDAG
  rationale: The genitive construction is retained straightforwardly. 'Of my heart'
    preserves the possessive/genitival relation without over-paraphrase.
- source_word: δέησις
  chosen: prayer
  alternatives:
  - petition
  - supplication
  lexicon: BDAG
  rationale: δέησις often emphasizes earnest request, but 'prayer' is the most readable
    natural rendering here, especially since the phrase is completed by 'to God for
    them.' The nuance of petition is not lost in context.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: πρός with accusative here expresses direction of the prayer. 'To God'
    is the plain and idiomatic English equivalent.
- source_word: ὑπὲρ αὐτῶν
  chosen: for them
  alternatives:
  - on their behalf
  lexicon: BDAG
  rationale: ὑπέρ here indicates benefit or representation. 'For them' is concise
    and idiomatic; 'on their behalf' is possible but heavier.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - Israel
  - my fellow Israelites
  lexicon: BDAG
  rationale: The pronoun's referent is supplied by the preceding context (Israelites
    in 9:31–10:1), but the Greek uses a pronoun, so the translation keeps 'them' rather
    than importing the noun into the main text.
- source_word: εἰς σωτηρίαν
  chosen: for their salvation
  alternatives:
  - for salvation
  - resulting in salvation
  lexicon: BDAG
  rationale: εἰς marks goal or result. 'For their salvation' makes explicit in English
    that the salvation pertains to 'them,' which is the natural sense of the clause,
    while remaining faithful to the Greek syntax.
- source_word: μὲν
  chosen: implicitly untranslated
  alternatives:
  - indeed
  - for my part
  lexicon: BDAG
  rationale: μέν often sets up a contrast, but here it functions lightly and is not
    matched by an explicit δέ in the verse. Rendering it overtly in English would
    sound stiff; its discourse effect is adequately carried by the sentence structure.
