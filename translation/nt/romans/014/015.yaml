theological_decisions:
- issue: Force of ἀπόλλυε in relation to the weaker believer
  chosen_reading: Rendered as a serious warning, 'Do not destroy,' without specifying
    whether Paul means spiritual ruin in a temporal sense or final perdition.
  alternative_readings:
  - Do not ruin
  - Do not cause to perish eternally
  rationale: The verb is intentionally strong, but the verse itself does not require
    the translator to resolve debates about apostasy, loss of salvation, or merely
    severe spiritual harm. The translation preserves the severity and theological
    tension rather than importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of ἀδελφός
  chosen_reading: Main text keeps 'brother' as the masculine singular form.
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The Greek form is masculine singular and should be reflected in the main
    text under the gender-accurate policy. Because the context likely applies representatively
    within the church, an inclusive explanatory footnote is appropriate.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine guidelines direct
    translating titles to preserve meaning. 'Messiah' foregrounds the title's sense
    better than the traditional but less transparent 'Christ.'
  doctrine_reference: Translate titles; transliterate names; Contested terms table
    for Χριστός.
