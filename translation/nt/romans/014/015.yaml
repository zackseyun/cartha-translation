id: ROM.14.15
reference: Romans 14:15
source:
  edition: SBLGNT
  text: εἰ ⸀γὰρ διὰ βρῶμα ὁ ἀδελφός σου λυπεῖται, οὐκέτι κατὰ ἀγάπην περιπατεῖς. μὴ
    τῷ βρώματί σου ἐκεῖνον ἀπόλλυε ὑπὲρ οὗ Χριστὸς ἀπέθανεν.
translation:
  text: For if your brother is grieved because of food, you are no longer walking
    according to love. Do not destroy that one with your food—the one for whom the
    Messiah died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'brother or sister'; Greek 'brother' can function representatively for
      a fellow believer.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Do not ruin' or 'Do not cause to perish.' The Greek verb is strong
      and may denote severe spiritual harm; the verse itself does not specify the
      precise doctrinal implication.
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; rendered 'the Messiah' here because Χριστός functions as
      a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: βρῶμα / βρώματι
  chosen: food / with your food
  alternatives:
  - what you eat
  - meal
  lexicon: BDAG
  rationale: βρῶμα denotes food in general rather than specifically meat in this verse.
    Rendering it as 'food' preserves the broader scope of the dispute in Romans 14
    while remaining natural English. The instrumental/dative phrase τῷ βρώματί σου
    is rendered 'with your food' to reflect means or occasion.
- source_word: ἀδελφός
  chosen: brother
  alternatives:
  - brother or sister
  - fellow believer
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular. Per the gender-accurate
    policy, 'brother' is retained in the main text rather than neutralizing it. Because
    the referent may be representative within the Christian community, an inclusive
    alternative is preserved in a footnote.
- source_word: λυπεῖται
  chosen: is grieved
  alternatives:
  - is distressed
  - is hurt
  lexicon: BDAG
  rationale: The present passive/middle indicates being caused sorrow or distress.
    'Is grieved' preserves the emotional and moral weight without overinterpreting
    the exact nature of the offense.
- source_word: κατὰ ἀγάπην
  chosen: according to love
  alternatives:
  - in line with love
  - by love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the default 'love' per doctrine. 'According to love'
    closely reflects κατὰ while remaining idiomatic enough in English and preserving
    Paul's ethical standard.
- source_word: περιπατεῖς
  chosen: you are ... walking
  alternatives:
  - you are living
  - you conduct yourself
  lexicon: BDAG
  rationale: Paul's ethical metaphor of 'walking' is common and theologically resonant.
    Retaining 'walking' preserves the metaphor rather than flattening it to 'living,'
    while the surrounding English keeps it readable.
- source_word: ἀπόλλυε
  chosen: do not destroy
  alternatives:
  - do not ruin
  - do not cause to perish
  lexicon: BDAG
  rationale: The present imperative with μή gives a prohibition. ἀπόλλυμι can range
    from ruin to destroy/perish. 'Destroy' best preserves the severity of Paul's warning
    without forcing a narrower doctrinal conclusion about eternal condemnation; alternatives
    are preserved in a footnote.
- source_word: ὑπὲρ οὗ
  chosen: for whom
  alternatives:
  - on behalf of whom
  lexicon: BDAG
  rationale: ὑπέρ with the genitive commonly means 'for' or 'on behalf of.' 'For whom'
    is idiomatic and preserves the representative/sacrificial nuance in context.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here it is titular and theological rather than merely name-like, so 'the
    Messiah' best preserves meaning.
- source_word: ἀπέθανεν
  chosen: died
  lexicon: BDAG
  rationale: The aorist verb straightforwardly denotes death. 'Died' is the natural
    and accurate rendering.
- source_word: ἐκεῖνον
  chosen: that one
  alternatives:
  - him
  - that brother
  lexicon: BDAG
  rationale: The demonstrative gives emphasis to the individual in view. 'That one'
    preserves the force better than a simple pronoun, though it remains natural in
    context.
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For when
  lexicon: BDAG
  rationale: γάρ connects this sentence to the prior argument, so 'For if' preserves
    both the inferential link and the conditional structure.
