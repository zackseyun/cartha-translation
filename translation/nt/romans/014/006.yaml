theological_decisions:
- issue: Meaning of observing 'the day'
  chosen_reading: A general reference to esteeming/observing a particular day in the
    disputed practice of Romans 14, without specifying a Sabbath, feast day, or fast
    day.
  alternative_readings:
  - A specific reference to the Sabbath
  - A specific reference to Jewish festival days
  - A specific reference to fasting days
  rationale: Paul's wording is intentionally general in this verse, and the translation
    should preserve that breadth rather than importing a narrower denominational or
    historical identification not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - God
  rationale: In Pauline usage within this context, κύριος most naturally refers to
    the Lord Jesus, while thanksgiving is explicitly directed to God. The translation
    retains 'Lord' rather than collapsing the distinction.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
