id: ROM.14.6
reference: Romans 14:6
source:
  edition: SBLGNT
  text: ὁ φρονῶν τὴν ἡμέραν κυρίῳ ⸀φρονεῖ. καὶ ὁ ἐσθίων κυρίῳ ἐσθίει, εὐχαριστεῖ γὰρ
    τῷ θεῷ· καὶ ὁ μὴ ἐσθίων κυρίῳ οὐκ ἐσθίει, καὶ εὐχαριστεῖ τῷ θεῷ.
translation:
  text: The one who observes the day, observes it for the Lord. And the one who eats,
    eats for the Lord, for he gives thanks to God; and the one who does not eat, does
    not eat for the Lord, and he gives thanks to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'regards the day' or 'thinks of the day'; the Greek verb can denote setting
      one's mind on or giving regard to something. Here it likely carries the sense
      of observing a day.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρονῶν / φρονεῖ
  chosen: observes / observes it
  alternatives:
  - regards / regards it
  - thinks about / thinks of
  lexicon: BDAG
  rationale: In this context with τὴν ἡμέραν ('the day'), φρονέω carries the sense
    of giving regard to or observing a day, not merely thinking about it mentally.
    'Observes' communicates practical regard in English and fits the parallel with
    eating/not eating.
- source_word: ἡμέραν
  chosen: the day
  alternatives:
  - a day
  lexicon: BDAG
  rationale: The article is present in Greek, and Paul is referring to a day under
    discussion in the immediate context of esteeming one day over another. 'The day'
    preserves the specificity of the Greek without over-interpreting which day is
    meant.
- source_word: κυρίῳ
  chosen: for the Lord
  alternatives:
  - to the Lord
  - unto the Lord
  lexicon: BDAG
  rationale: The dative here expresses orientation or purpose. 'For the Lord' is idiomatic
    modern English and preserves the sense that the action is done with reference
    to and for the sake of the Lord. 'Lord' follows the doctrinal default for κύριος.
- source_word: ἐσθίων / ἐσθίει
  chosen: eats / eats
  alternatives:
  - is eating / eats food
  lexicon: BDAG
  rationale: The present participle and verb describe the practice of eating in the
    disputed matter of food. Simple present English best captures the general customary
    sense.
- source_word: εὐχαριστεῖ
  chosen: gives thanks
  alternatives:
  - thanks
  - is thankful
  lexicon: BDAG
  rationale: '''Gives thanks'' is the most natural verbal rendering in English and
    preserves the explicit act directed to God.'
- source_word: θεῷ
  chosen: to God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The dative after εὐχαριστεῖ is naturally rendered 'to God' in English,
    making the direction of thanksgiving explicit.
- source_word: ὁ μὴ ἐσθίων
  chosen: the one who does not eat
  alternatives:
  - the one abstaining
  - the one who refrains from eating
  lexicon: BDAG
  rationale: This directly reflects the Greek negated participial construction and
    keeps the parallelism with 'the one who eats.' 'Abstaining' is possible but less
    explicit about the object in English.
