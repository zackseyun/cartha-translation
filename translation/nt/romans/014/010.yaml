id: ROM.14.10
reference: Romans 14:10
source:
  edition: SBLGNT
  text: Σὺ δὲ τί κρίνεις τὸν ἀδελφόν σου; ἢ καὶ σὺ τί ἐξουθενεῖς τὸν ἀδελφόν σου;
    πάντες γὰρ παραστησόμεθα τῷ βήματι τοῦ ⸀θεοῦ,
translation:
  text: But you, why do you judge your brother? Or you also, why do you despise your
    brother? For we will all stand before the judgment seat of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “the judgment seat of Christ.”
    reason: textual_variant
  - marker: b
    text: Or “your brother or sister”; Greek “your brother.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ δὲ
  chosen: But you
  alternatives:
  - But as for you
  - You, however
  lexicon: BDAG
  rationale: Retains the adversative force of δέ and the emphatic fronting of σύ in
    natural English.
- source_word: τί κρίνεις
  chosen: why do you judge
  alternatives:
  - what right do you have to judge
  - why are you judging
  lexicon: BDAG
  rationale: In this rhetorical question, τί with the verb is idiomatically rendered
    'why.' 'Judge' preserves κρίνω without overinterpreting it as 'condemn,' since
    the broader context concerns passing judgment on a fellow believer.
- source_word: τὸν ἀδελφόν σου
  chosen: your brother
  alternatives:
  - your brother or sister
  - your fellow believer
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per gender-accurate policy,
    'brother' is retained in the main text rather than neutralizing to 'sibling' or
    expanding interpretively to 'fellow believer.'
- source_word: ἢ καὶ σὺ
  chosen: Or you also
  alternatives:
  - Or even you
  - Or you, too
  lexicon: BDAG
  rationale: Preserves the second-person emphasis and the additive force of καί. 'Or
    you also' is direct and readable.
- source_word: τί ἐξουθενεῖς
  chosen: why do you despise
  alternatives:
  - why do you treat with contempt
  - why do you look down on
  lexicon: BDAG
  rationale: ἐξουθενέω denotes treating someone as of no account or with contempt.
    'Despise' is concise and strong, matching the rebuke.
- source_word: πάντες γὰρ
  chosen: For we will all
  alternatives:
  - For all of us will
  - Because we all will
  lexicon: BDAG
  rationale: γάρ is causal/explanatory, and πάντες includes Paul with his audience.
    'We will all' is natural English and preserves the inclusive force.
- source_word: παραστησόμεθα
  chosen: stand before
  alternatives:
  - appear before
  - be presented before
  lexicon: BDAG
  rationale: Future middle of παρίστημι here conveys appearing/standing before a tribunal.
    'Stand before' is idiomatic in English and fits the courtroom imagery.
- source_word: τῷ βήματι
  chosen: the judgment seat
  alternatives:
  - the tribunal
  - the court
  lexicon: BDAG
  rationale: βῆμα in Pauline usage commonly refers to a judicial seat or tribunal.
    'Judgment seat' is the clearest established English equivalent and preserves the
    legal nuance.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  lexicon: BDAG
  rationale: The genitive is straightforwardly rendered 'of God.' This follows the
    SBLGNT reading in this verse.
