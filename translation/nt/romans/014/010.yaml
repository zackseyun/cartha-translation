theological_decisions:
- issue: Identity of the one before whose βῆμα all stand
  chosen_reading: of God
  alternative_readings:
  - of Christ
  rationale: The provided Greek text reads τοῦ θεοῦ, which is translated directly
    as 'of God.' Because some manuscripts read 'of Christ' and the parallel in 2 Corinthians
    5:10 speaks of the judgment seat of Messiah/Christ, the alternative is preserved
    in a footnote rather than harmonized into the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
