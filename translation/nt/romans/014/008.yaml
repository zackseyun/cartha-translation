theological_decisions:
- issue: Referent and force of κύριος in this verse
  chosen_reading: '''Lord'' is retained as a title without specifying beyond the text;
    in context it refers to the Lord Jesus while preserving the title''s theological
    resonance.'
  alternative_readings:
  - '''Lord'' as a more general reference to God'
  - '''Master'' emphasizing authority'
  rationale: The immediate context in Romans 14:9 points toward Christ, but the translation
    should not over-specify where the Greek simply says κύριος. Retaining 'Lord' preserves
    both contextual christological reference and canonical resonance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Affirmations
    on historic orthodoxy'
- issue: Relational nuance of living/dying 'to the Lord'
  chosen_reading: The verse expresses belonging and orientation to the Lord in both
    life and death, without narrowing it to service alone.
  alternative_readings:
  - living/dying for the Lord
  - living/dying under the Lord's authority
  rationale: The repeated dative plus the concluding possessive clause ('we are the
    Lord’s') together emphasize relation and belonging. 'To the Lord' preserves this
    tension better than a single narrowed gloss.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
