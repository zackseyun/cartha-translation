theological_decisions:
- issue: Nature of 'weakness' in ἀσθενῶν
  chosen_reading: Rendered as 'who is weak' without specifying 'in faith' in this
    verse alone.
  alternative_readings:
  - who is weak in faith
  rationale: The immediate context (14:1) defines the category as weakness in faith/conscience
    regarding disputable matters. However, verse 2 itself only says 'the one who is
    weak.' The translation preserves the wording of this verse and lets the context
    supply the nuance, avoiding interpretive expansion in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
