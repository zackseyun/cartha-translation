id: ROM.14.2
reference: Romans 14:2
source:
  edition: SBLGNT
  text: ὃς μὲν πιστεύει φαγεῖν πάντα, ὁ δὲ ἀσθενῶν λάχανα ἐσθίει.
translation:
  text: One person believes he may eat anything, but the one who is weak eats vegetables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is convinced he can eat all things.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'who is weak' refers in context to weakness of faith or conscience
      regarding food practices (see Rom. 14:1).
    reason: cross_reference
lexical_decisions:
- source_word: ὃς μὲν
  chosen: One person
  alternatives:
  - One man
  - One
  lexicon: BDAG
  rationale: The construction introduces the first member of a contrast ('on the one
    hand ... on the other'). 'One person' communicates the representative singular
    naturally in English without overstating maleness, while preserving the singular
    contrast with the second clause.
- source_word: πιστεύει
  chosen: believes
  alternatives:
  - is convinced
  - has faith
  lexicon: BDAG
  rationale: Here πιστεύω governs an infinitive ('to eat') and expresses personal
    conviction rather than saving faith. 'Believes' is the most direct rendering;
    'is convinced' is possible but slightly more interpretive. The main text keeps
    the lexical connection to πιστεύω.
- source_word: φαγεῖν πάντα
  chosen: he may eat anything
  alternatives:
  - to eat all things
  - to eat everything
  lexicon: BDAG
  rationale: The infinitive with πάντα expresses the content of the belief/conviction.
    'Eat anything' is idiomatic modern English and accurately conveys unrestricted
    diet. 'May' is supplied in English to express the sense of permissibility implied
    by the context of disputed food practices.
- source_word: ὁ δὲ
  chosen: but the one
  alternatives:
  - but another
  - but he who
  lexicon: BDAG
  rationale: This marks the contrasting second member of the sentence. 'But the one'
    preserves the parallel structure with the first clause more closely than 'another,'
    while remaining natural English.
- source_word: ἀσθενῶν
  chosen: who is weak
  alternatives:
  - being weak
  - the weak one
  lexicon: BDAG
  rationale: The participle is substantival and describes the person characterized
    as weak in the context of conscience/faith, not physical frailty. 'Who is weak'
    is clear and natural, while leaving Paul’s evaluative category intact without
    overexplaining it.
- source_word: λάχανα
  chosen: vegetables
  alternatives:
  - herbs
  - greens
  lexicon: BDAG
  rationale: λάχανα refers to garden produce/vegetables. 'Vegetables' is the clearest
    contemporary English equivalent. 'Herbs' reflects older English tradition but
    is too narrow or potentially misleading for modern readers.
- source_word: ἐσθίει
  chosen: eats
  alternatives:
  - eats only vegetables
  lexicon: BDAG
  rationale: The verb simply states what the weak person eats. The exclusivity ('only')
    is contextually implied by the contrast but not explicit in the Greek, so it is
    not added to the main text.
