id: ROM.14.22
reference: Romans 14:22
source:
  edition: SBLGNT
  text: σὺ πίστιν ⸀ἣν ἔχεις κατὰ σεαυτὸν ἔχε ἐνώπιον τοῦ θεοῦ. μακάριος ὁ μὴ κρίνων
    ἑαυτὸν ἐν ᾧ δοκιμάζει·
translation:
  text: The faith that you have, keep to yourself before God. Blessed is the one who
    does not judge himself by what he approves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The conviction that you have, keep to yourself before God.' Greek πίστις
      is rendered 'faith' by default, but here it can denote a personal conviction
      about disputed matters.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not condemn himself by what he approves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν
  chosen: faith
  alternatives:
  - conviction
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Following the project's default rendering for πίστις as 'faith.' In this
    context it refers to one's settled conviction before God regarding disputed matters,
    not saving faith specifically. 'Conviction' captures the nuance but is less consistent
    with the key-term policy, so it is preserved as an alternative rather than used
    in the main text.
- source_word: κατὰ σεαυτὸν
  chosen: to yourself
  alternatives:
  - by yourself
  - for yourself
  - according to yourself
  lexicon: BDAG
  rationale: The phrase idiomatically means to keep one's faith/conviction private
    rather than pressing it on others. 'To yourself' is natural English and fits the
    exhortation in context.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: 'A standard rendering that preserves the vertical accountability implied:
    the conviction is held privately, yet consciously before God, not in secrecy from
    him.'
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the moral and theological weight better than the
    more subjective ''happy,'' especially in Pauline ethical instruction.'
- source_word: κρίνων ἑαυτὸν
  chosen: judge himself
  alternatives:
  - condemn himself
  lexicon: BDAG
  rationale: κρίνω can mean judge or condemn depending on context. Here the sense
    is self-condemnation arising from acting against one's approved conviction, but
    'judge himself' stays closer to the Greek while allowing the context to carry
    the condemnatory nuance.
- source_word: ἐν ᾧ δοκιμάζει
  chosen: by what he approves
  alternatives:
  - in what he approves
  - in what he tests and approves
  lexicon: BDAG
  rationale: δοκιμάζω here denotes approving after evaluation. 'By what he approves'
    gives clear English sense with the instrumental nuance of ἐν, expressing the standard
    or sphere in which self-judgment would occur.
