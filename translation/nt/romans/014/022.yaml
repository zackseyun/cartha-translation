theological_decisions:
- issue: Meaning of πίστις in an ethical-disputable-matters context
  chosen_reading: faith understood as personal conviction before God regarding the
    matter in question
  alternative_readings:
  - faith as general trust in God
  - faithfulness
  rationale: The immediate context concerns disputable practices and conscience. Retaining
    'faith' follows the project's default for πίστις while allowing the contextual
    sense of conviction to be understood. A lexical alternative is preserved in a
    footnote rather than replacing the key term in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy sections 3 and 5'
