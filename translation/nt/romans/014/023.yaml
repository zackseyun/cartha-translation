id: ROM.14.23
reference: Romans 14:23
source:
  edition: SBLGNT
  text: ὁ δὲ διακρινόμενος ἐὰν φάγῃ κατακέκριται, ὅτι οὐκ ἐκ πίστεως· πᾶν δὲ ὃ οὐκ
    ἐκ πίστεως ἁμαρτία ⸀ἐστίν.
translation:
  text: But the one who doubts is condemned if he eats, because it is not from faith;
    and everything that is not from faith is sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because it does not proceed from conviction.' The Greek says 'from faith,'
      which can include the sense of acting with settled conviction before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακρινόμενος
  chosen: the one who doubts
  alternatives:
  - the one who is wavering
  - the one who is divided within himself
  - the one who disputes
  lexicon: BDAG
  rationale: In this context of scruples about eating, the participle refers to inward
    hesitation or doubting rather than arguing with others. 'The one who doubts' is
    idiomatic and fits Paul's concern with acting against conscience.
- source_word: ἐὰν φάγῃ
  chosen: if he eats
  alternatives:
  - if he should eat
  lexicon: BDAG
  rationale: The aorist subjunctive with ἐάν expresses a conditional event. 'If he
    eats' is natural English and preserves the conditional force.
- source_word: κατακέκριται
  chosen: is condemned
  alternatives:
  - stands condemned
  - has been condemned
  lexicon: BDAG
  rationale: The perfect passive indicates a state of condemnation resulting from
    the act. 'Is condemned' communicates the resulting state clearly in modern English
    without overcomplicating the tense.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the condemnation. 'Because' is the clearest
    contemporary rendering.
- source_word: ἐκ πίστεως
  chosen: from faith
  alternatives:
  - from conviction
  - from trust
  - from faithfulness
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' In this context the phrase
    denotes action arising out of faith-based conviction before God. 'From faith'
    preserves the Greek metaphor and Paul's wording better than a more interpretive
    paraphrase like 'from conviction,' while the nuance can be preserved in a footnote.
- source_word: πᾶν ... ὃ
  chosen: everything that
  alternatives:
  - whatever
  - all that which
  lexicon: BDAG
  rationale: The neuter singular construction is well represented by 'everything that,'
    which is natural and comprehensive in English.
- source_word: ἁμαρτία ἐστίν
  chosen: is sin
  alternatives:
  - is sinful
  lexicon: BDAG
  rationale: The predicate noun construction is more directly and forcefully rendered
    'is sin' rather than the adjectival 'is sinful.' This preserves Paul's categorical
    statement.
