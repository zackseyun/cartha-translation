theological_decisions:
- issue: Rendering of πίστις in a morally charged Pauline context
  chosen_reading: faith
  alternative_readings:
  - conviction
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In Romans 14:23 the immediate sense
    includes personal conviction before God, but translating with 'faith' preserves
    Paul's broader theological vocabulary and avoids narrowing the term to mere subjective
    preference. A footnote preserves 'conviction' as a contextual nuance.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith; footnote alternatives
    where contested'
- issue: Scope of condemnation in κατακέκριται
  chosen_reading: is condemned
  alternative_readings:
  - is self-condemned
  - stands condemned before God
  rationale: The Greek passive does not explicitly specify the agent. The translation
    therefore preserves the passive 'is condemned' without importing a more specific
    doctrinal explanation. This maintains the theological tension rather than resolving
    whether the emphasis is divine judgment, conscience, or both.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
