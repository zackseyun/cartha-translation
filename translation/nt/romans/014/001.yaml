id: ROM.14.1
reference: Romans 14:1
source:
  edition: SBLGNT
  text: Τὸν δὲ ἀσθενοῦντα τῇ πίστει προσλαμβάνεσθε, μὴ εἰς διακρίσεις διαλογισμῶν.
translation:
  text: Now receive the one who is weak in faith, not for disputes over opinions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcome' instead of 'receive.' The Greek verb can mean to receive into
      one's company or fellowship.
    reason: lexical_alternative
  - marker: b
    text: Or 'not for judging disputed opinions' or 'not for quarrels over reasonings.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσθενοῦντα
  chosen: the one who is weak
  alternatives:
  - the weak person
  - the one who is weak in conscience
  lexicon: BDAG
  rationale: Present participle used substantivally with the article; 'the one who
    is weak' preserves the verbal/adjectival force without over-specifying the nature
    of the weakness. 'In conscience' is interpretive from the broader context and
    is not stated here.
- source_word: τῇ πίστει
  chosen: in faith
  alternatives:
  - in the faith
  - in trust
  - in faithfulness
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    The dative is best taken as the sphere/respect in which the person is weak. 'The
    faith' would suggest a more objective doctrinal body than the immediate context
    requires; 'trust' and 'faithfulness' are possible nuances but less fitting here.
- source_word: προσλαμβάνεσθε
  chosen: receive
  alternatives:
  - welcome
  - accept
  lexicon: BDAG
  rationale: The middle imperative calls for taking someone to oneself / receiving
    into fellowship. 'Receive' is slightly more formal and broad, fitting both personal
    and communal acceptance. 'Welcome' is also strong and idiomatic, but 'receive'
    better preserves the verb's breadth.
- source_word: μὴ εἰς
  chosen: not for
  alternatives:
  - not unto
  - not with a view to
  lexicon: BDAG
  rationale: The construction expresses purpose or result to be avoided. 'Not for'
    gives natural English while preserving the prohibition against receiving the person
    for a wrong end.
- source_word: διακρίσεις
  chosen: disputes
  alternatives:
  - judgments
  - quarrels
  - distinctions
  lexicon: BDAG
  rationale: In this context the noun refers to contentious differentiations or evaluative
    disputes rather than neutral distinctions. 'Disputes' best captures the relational
    and argumentative sense in context.
- source_word: διαλογισμῶν
  chosen: opinions
  alternatives:
  - reasonings
  - thoughts
  - scruples
  lexicon: BDAG
  rationale: 'The genitive likely denotes the matters under dispute: internal reasonings,
    opinions, or debatable thoughts. ''Opinions'' is clear modern English and fits
    the context of differing convictions about disputable matters. ''Scruples'' is
    possible but narrower and more interpretive.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ marks a transition to a new exhortation. 'Now' signals discourse movement
    in natural English without implying a strong adversative contrast.
