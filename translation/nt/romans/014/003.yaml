theological_decisions:
- issue: Scope of the eating/not eating contrast
  chosen_reading: Render the contrast generically as eating versus not eating, without
    specifying vegetarianism or ritual scruples in the verse itself.
  alternative_readings:
  - Interpret explicitly as eating all foods versus abstaining from certain foods
  rationale: The immediate context concerns disputes over food practices, but this
    verse itself states the contrast simply in terms of eating and not eating. The
    translation preserves the wording of the Greek without importing explanatory detail
    from surrounding verses into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of 'him' in 'for God has welcomed him'
  chosen_reading: Keep the singular pronoun without resolving whether Paul especially
    points to the eater, the non-eater, or either party as applicable in the reciprocal
    argument.
  alternative_readings:
  - '''for God has welcomed that person'''
  - Interpret the pronoun as specifically referring to the eater
  rationale: The immediate antecedent in the second clause is 'the one who eats,'
    but the broader rhetorical point applies to the fellow believer whom God has received.
    Retaining 'him' preserves the Greek's singular pronoun and the verse's rhetorical
    force without over-interpreting.
  doctrine_reference: Translation philosophy §3, §4
