id: ROM.14.3
reference: Romans 14:3
source:
  edition: SBLGNT
  text: ὁ ἐσθίων τὸν μὴ ἐσθίοντα μὴ ἐξουθενείτω, ⸂ὁ δὲ⸃ μὴ ἐσθίων τὸν ἐσθίοντα μὴ
    κρινέτω, ὁ θεὸς γὰρ αὐτὸν προσελάβετο.
translation:
  text: The one who eats must not despise the one who does not eat, and the one who
    does not eat must not judge the one who eats, for God has welcomed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'must not treat with contempt' for 'must not despise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'must not pass judgment on' for 'must not judge.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has accepted him' or 'received him.' The verb also carries the sense
      of welcoming into fellowship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐσθίων
  chosen: the one who eats
  alternatives:
  - the eater
  - whoever eats
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a class of person characterized by eating. 'The one who eats' is natural English
    and preserves the participial force better than the less idiomatic 'the eater'.
- source_word: τὸν μὴ ἐσθίοντα
  chosen: the one who does not eat
  alternatives:
  - the non-eater
  - the one abstaining
  lexicon: BDAG
  rationale: This mirrors the Greek construction closely and preserves the contrast
    with the eater. 'Abstaining' is possible in context, but 'does not eat' stays
    nearer to the wording and avoids specifying more than the text states.
- source_word: ἐξουθενείτω
  chosen: must not despise
  alternatives:
  - must not treat with contempt
  - must not look down on
  lexicon: BDAG
  rationale: The verb conveys regarding someone as of no account or with contempt.
    'Despise' is concise and strong, matching the moral force of the prohibition.
    'Look down on' is more idiomatic but slightly softer.
- source_word: ὁ δὲ μὴ ἐσθίων
  chosen: and the one who does not eat
  alternatives:
  - but the one who does not eat
  lexicon: BDAG
  rationale: δέ marks contrast, but in English the sentence reads smoothly with 'and'
    while still preserving the reciprocal contrast through the parallel structure.
    The contrast remains clear from the paired clauses.
- source_word: κρινέτω
  chosen: must not judge
  alternatives:
  - must not condemn
  - must not pass judgment on
  lexicon: BDAG
  rationale: κρίνω here refers to passing judgment on a fellow believer. 'Judge' is
    the broad and standard rendering; 'condemn' would narrow the sense too much, while
    'pass judgment on' is more expansive but less concise.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject. No article is needed in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: '''For'' preserves the explanatory connection to the preceding prohibitions
    in a way common to English Bible style without sounding archaic in this context.'
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is singular masculine accusative, referring to the person
    being judged or despised. 'Him' is gender-accurate to the Greek form and natural
    in English; the representative force is clear from context.
- source_word: προσελάβετο
  chosen: has welcomed
  alternatives:
  - has accepted
  - received
  lexicon: BDAG
  rationale: προσλαμβάνομαι in this context means to receive or welcome into fellowship.
    'Has welcomed' fits the relational context of Romans 14 and aligns with the nearby
    usage in 14:1 and 15:7. 'Accepted' is possible but can sound more abstract or
    merely evaluative.
