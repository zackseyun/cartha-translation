id: ROM.14.4
reference: Romans 14:4
source:
  edition: SBLGNT
  text: σὺ τίς εἶ ὁ κρίνων ἀλλότριον οἰκέτην; τῷ ἰδίῳ κυρίῳ στήκει ἢ πίπτει· σταθήσεται
    δέ, ⸂δυνατεῖ γὰρ⸃ ὁ ⸀κύριος στῆσαι αὐτόν.
translation:
  text: Who are you to judge another's household slave? He stands or falls to his
    own lord, and he will be made to stand, for the Lord is able to make him stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another's household servant.' The Greek οἰκέτης refers specifically
      to a member of a household staff and can denote either a servant or a slave;
      'household slave' was chosen here to preserve the bonded social relation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his own master.' The same Greek word, κύριος, is used here and again
      in 'the Lord'; 'lord' was retained in the first instance to preserve the verbal
      connection.
    reason: lexical_alternative
  - marker: c
    text: Some understand 'the Lord' here as the slave's master within the analogy;
      more likely Paul now points to the Lord in the theological sense, whose power
      secures the believer's standing.
    reason: alternative_reading
lexical_decisions:
- source_word: σὺ τίς εἶ
  chosen: Who are you
  alternatives:
  - Who are you, then
  - Who are you yourself
  lexicon: BDAG
  rationale: The emphatic pronoun σὺ with τίς εἶ forms a rhetorical challenge. English
    naturally conveys this as 'Who are you,' preserving the rebuke without over-translating
    the emphasis.
- source_word: ὁ κρίνων
  chosen: to judge
  alternatives:
  - the one judging
  - to pass judgment on
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally (''the one who judges''),
    but idiomatic English after ''Who are you'' is infinitival: ''to judge.'' ''Pass
    judgment on'' is possible, but ''judge'' is more direct and sufficiently reflects
    κρίνω here.'
- source_word: ἀλλότριον οἰκέτην
  chosen: another's household slave
  alternatives:
  - someone else's household servant
  - another man's servant
  lexicon: BDAG
  rationale: οἰκέτης denotes a household servant/slave, one belonging to a household.
    Given the translation philosophy's preference to preserve bonded status where
    salient, 'household slave' best captures the social relation. ἀλλότριον is possessive/relational
    here, hence 'another's.'
- source_word: τῷ ἰδίῳ κυρίῳ
  chosen: to his own lord
  alternatives:
  - before his own master
  - to his own master
  lexicon: BDAG
  rationale: 'The dative expresses relation/reference: the slave''s standing or falling
    is with respect to his own κύριος. ''To his own lord'' preserves the lexical distinction
    and allows the later occurrence of κύριος for God/Christ to echo. ''Master'' would
    fit the slave metaphor, but the doctrine default for κύριος is ''Lord'' unless
    context strongly demands otherwise.'
- source_word: στήκει ἢ πίπτει
  chosen: He stands or falls
  alternatives:
  - he stands firm or falls
  - he is upheld or falls
  lexicon: BDAG
  rationale: στήκω commonly means 'stand' or 'stand firm'; paired with πίπτω, the
    idiom contrasts approval/stability with failure. 'Stands or falls' is concise
    and preserves the metaphor without interpretive expansion.
- source_word: σταθήσεται
  chosen: he will be made to stand
  alternatives:
  - he will stand
  - he will be upheld
  lexicon: BDAG
  rationale: 'The future passive of ἵστημι is best represented with an explicit passive:
    ''will be made to stand.'' This preserves the implied divine agency, which the
    following clause makes explicit. ''Will stand'' would flatten the passive nuance.'
- source_word: δυνατεῖ γὰρ
  chosen: for ... is able
  alternatives:
  - for ... has power
  - because ... is able
  lexicon: BDAG
  rationale: γὰρ gives the reason for the preceding assurance, and δυνατέω denotes
    ability/power. 'For ... is able' is natural and close to the Greek.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - his lord
  lexicon: BDAG
  rationale: The anarthrous sense is not in view; with article and Pauline usage,
    this most naturally refers to the Lord in the theological sense rather than merely
    the human master of the analogy. The doctrine default for κύριος is 'Lord.'
- source_word: στῆσαι αὐτόν
  chosen: to make him stand
  alternatives:
  - to uphold him
  - to establish him
  lexicon: BDAG
  rationale: The aorist infinitive of ἵστημι here expresses causation corresponding
    to the passive σταθήσεται. 'Make him stand' preserves the verbal linkage and the
    metaphor of being upheld in judgment.
