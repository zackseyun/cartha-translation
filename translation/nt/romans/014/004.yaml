theological_decisions:
- issue: Referent of ὁ κύριος in the final clause
  chosen_reading: the Lord refers to the Lord in the theological sense (most likely
    Christ in Paul's discourse), not merely the human master in the analogy
  alternative_readings:
  - his master within the household metaphor
  rationale: Paul moves from the household-slave analogy to the believer's accountability
    before the Lord. The assurance 'he will be made to stand' is grounded in divine
    ability, which fits the theological use of κύριος. Rendering 'the Lord' preserves
    this and aligns with the default treatment of κύριος, while the metaphorical background
    remains visible from the earlier 'household slave' and 'his own lord.'
  doctrine_reference: 'Contested terms: κύριος → Lord; Preserve theological tension
    rather than resolve it only where genuine ambiguity remains'
