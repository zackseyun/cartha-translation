id: ROM.14.17
reference: Romans 14:17
source:
  edition: SBLGNT
  text: οὐ γάρ ἐστιν ἡ βασιλεία τοῦ θεοῦ βρῶσις καὶ πόσις, ἀλλὰ δικαιοσύνη καὶ εἰρήνη
    καὶ χαρὰ ἐν πνεύματι ἁγίῳ·
translation:
  text: For the kingdom of God is not eating and drinking, but righteousness and peace
    and joy in the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek δικαιοσύνη can denote righteousness or justice;
      the main text follows the project's default Pauline rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: '''Kingdom'' is the standard and natural rendering for βασιλεία and fits
    Paul''s contrast between what God''s kingdom is not and what it is. ''Reign''
    or ''rule'' are possible, but here the established theological concept is not
    misleading and preserves the breadth of the term.'
- source_word: βρῶσις
  chosen: eating
  alternatives:
  - food
  - consumption
  lexicon: BDAG
  rationale: Although βρῶσις can denote 'food' or 'eating,' the paired abstract nouns
    βρῶσις and πόσις are best rendered symmetrically as activities, 'eating and drinking,'
    matching the Greek form and the context of disputable practices.
- source_word: πόσις
  chosen: drinking
  alternatives:
  - drink
  lexicon: BDAG
  rationale: Rendered as 'drinking' to match βρῶσις as an activity noun and to preserve
    the parallelism of the Greek.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults for Pauline usage, δικαιοσύνη is rendered 'righteousness'
    in the main text, while 'justice' is preserved as a meaningful alternative in
    a footnote because the semantic range can include covenantal and ethical rightness
    with social implications.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering that naturally expresses the relational and communal
    harmony in view.
- source_word: χαρά
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: '''Joy'' is the most idiomatic and theologically weighty English equivalent
    in Pauline usage.'
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - in the holy spirit
  lexicon: BDAG
  rationale: The absence of the article does not require an impersonal or merely qualitative
    sense. In Pauline usage this phrase naturally refers to the Holy Spirit, and capitalization
    reflects that referent. 'In' is retained rather than paraphrased as 'by' to preserve
    the Greek preposition and the sphere/instrument nuance.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Rendered 'For' to preserve the explanatory connection with the preceding
    argument in a natural but still formal way.
