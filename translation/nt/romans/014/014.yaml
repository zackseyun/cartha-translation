id: ROM.14.14
reference: Romans 14:14
source:
  edition: SBLGNT
  text: οἶδα καὶ πέπεισμαι ἐν κυρίῳ Ἰησοῦ ὅτι οὐδὲν κοινὸν δι’ ⸀ἑαυτοῦ· εἰ μὴ τῷ λογιζομένῳ
    τι κοινὸν εἶναι, ἐκείνῳ κοινόν.
translation:
  text: I know and am persuaded in the Lord Jesus that nothing is unclean in itself;
    except that to the one who considers anything to be unclean, to that person it
    is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common.' The Greek term commonly refers here to something regarded as
      ritually defiled or profane.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: Straightforward cognitive verb; 'I know' is the natural and sufficiently
    formal English equivalent.
- source_word: πέπεισμαι
  chosen: am persuaded
  alternatives:
  - am convinced
  lexicon: BDAG
  rationale: Perfect passive/middle conveys settled conviction. 'Am persuaded' preserves
    the verbal nuance and traditional Pauline force slightly better than the more
    colloquial 'am convinced'.
- source_word: ἐν κυρίῳ Ἰησοῦ
  chosen: in the Lord Jesus
  alternatives:
  - by the Lord Jesus
  - in union with the Lord Jesus
  lexicon: BDAG
  rationale: Retains the preposition 'in' rather than over-interpreting the relation.
    'Lord' follows the doctrine default for κύριος.
- source_word: κοινόν
  chosen: unclean
  alternatives:
  - common
  - defiled
  - impure
  lexicon: BDAG
  rationale: In this Jewish purity-context, κοινός means ritually/commonly defiled
    rather than merely 'shared' or 'ordinary.' 'Unclean' communicates the sense clearly
    in English. 'Common' is preserved in a footnote because it is a more literal rendering
    with historical translation significance.
- source_word: δι’ ἑαυτοῦ
  chosen: in itself
  alternatives:
  - by itself
  - through itself
  lexicon: BDAG
  rationale: Idiomatic expression indicating intrinsic status. 'In itself' best conveys
    that nothing is inherently unclean.
- source_word: τῷ λογιζομένῳ
  chosen: to the one who considers
  alternatives:
  - for the one who regards
  - to the one who thinks
  lexicon: BDAG
  rationale: λογίζομαι here denotes considering/regarding something in a certain way.
    'Considers' is clear modern English and preserves the cognitive aspect.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  lexicon: BDAG
  rationale: Indefinite object in a general principle; 'anything' sounds more natural
    in English than 'something' here.
- source_word: ἐκείνῳ κοινόν
  chosen: to that person it is unclean
  alternatives:
  - for that one it is unclean
  - to him it is unclean
  lexicon: BDAG
  rationale: Dative pronoun marks personal applicability. 'To that person' avoids
    unnecessary masculine narrowing while preserving the individualized force of the
    Greek.
