theological_decisions:
- issue: Meaning of κοινός in relation to food/purity
  chosen_reading: Rendered as 'unclean' rather than 'common' to communicate ritual/moral-perception
    language in context, while not asserting intrinsic impurity.
  alternative_readings:
  - common
  rationale: Paul's point is that no thing is intrinsically defiling, yet conscience
    can render it unclean for a given person. 'Unclean' best communicates the purity-context
    to modern readers; the more literal 'common' is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
