id: ROM.14.5
reference: Romans 14:5
source:
  edition: SBLGNT
  text: Ὃς ⸀μὲν κρίνει ἡμέραν παρ’ ἡμέραν, ὃς δὲ κρίνει πᾶσαν ἡμέραν· ἕκαστος ἐν τῷ
    ἰδίῳ νοῒ πληροφορείσθω·
translation:
  text: One person judges one day above another day, while another judges every day
    alike. Let each one be fully convinced in his own mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One person considers one day more important than another day.'
    reason: lexical_alternative
  - marker: b
    text: Lit. 'every day'; the sense in context is 'every day alike' or 'all days
      the same.'
    reason: lexical_alternative
  - marker: c
    text: Or 'be fully assured' or 'be fully persuaded.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνει
  chosen: judges
  alternatives:
  - considers
  - esteems
  - regards
  lexicon: BDAG
  rationale: The verb κρίνω here carries the sense of making an evaluative distinction
    or assessment, not necessarily condemning. 'Judges' preserves the lexical link
    to κρίνω while remaining natural in English. Alternatives like 'considers' or
    'esteems' are possible, but 'judges' better reflects the Greek verb and the contrastive
    structure.
- source_word: ἡμέραν παρ’ ἡμέραν
  chosen: one day above another day
  alternatives:
  - one day more than another
  - one day over another
  lexicon: BDAG
  rationale: The construction with παρά conveys comparison/distinction between days.
    'One day above another day' makes the comparative force explicit without overinterpreting
    which days are in view. It avoids importing 'holy day' or 'Sabbath' into the text.
- source_word: πᾶσαν ἡμέραν
  chosen: every day alike
  alternatives:
  - every day
  - all days the same
  lexicon: BDAG
  rationale: '''Every day alike'' brings out the implied contrast: the second person
    does not distinguish among days. The adverb ''alike'' is not a separate Greek
    word, but it is warranted by the contrast with the first clause and is standard
    optimal-equivalence English.'
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each person
  - each man
  lexicon: BDAG
  rationale: The Greek is singular and distributive. 'Each one' is natural modern
    English and preserves the individual emphasis without unnecessarily narrowing
    or expanding the referent.
- source_word: ἐν τῷ ἰδίῳ νοῒ
  chosen: in his own mind
  alternatives:
  - in his own understanding
  - in his own conviction
  lexicon: BDAG
  rationale: νοῦς refers to the mind, understanding, or faculty of thought. 'In his
    own mind' is the most direct rendering. The masculine possessive reflects the
    grammatically masculine singular with representative force, in keeping with the
    gender-accurate policy.
- source_word: πληροφορείσθω
  chosen: be fully convinced
  alternatives:
  - be fully assured
  - be fully persuaded
  lexicon: BDAG
  rationale: The present passive imperative calls for settled certainty or full assurance.
    'Be fully convinced' is clear modern English and fits the context of personal
    conviction regarding disputable matters. 'Fully assured' and 'fully persuaded'
    are viable alternatives and worth preserving.
