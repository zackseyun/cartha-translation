id: ROM.14.9
reference: Romans 14:9
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ ⸀Χριστὸς ⸀ἀπέθανεν καὶ ἔζησεν ἵνα καὶ νεκρῶν καὶ ζώντων κυριεύσῃ.
translation:
  text: For to this end the Messiah died and lived again, so that he might be Lord
    of both the dead and the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lived' or more explicitly 'rose to life.' The Greek says 'died and lived,'
      with the context indicating resurrection life.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  chosen: for to this end
  alternatives:
  - for this reason
  - for this purpose
  lexicon: BDAG
  rationale: The idiom points to purpose or goal. 'To this end' preserves the teleological
    force more clearly than the looser 'for this reason,' while remaining natural
    in English when preceded by γάρ as 'for.'
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support to the previous statement. 'For' is the
    standard concise rendering and fits Paul's argumentative flow.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where it functions
    as a title rather than a name-like form. Here it is anarthrous in Greek but clearly
    titular in reference to Jesus'' redemptive work; English idiom benefits from the
    article: ''the Messiah.'''
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - died off
  lexicon: BDAG
  rationale: Aorist indicative of ἀποθνῄσκω is straightforwardly 'died.' No expansion
    is warranted.
- source_word: ἔζησεν
  chosen: lived again
  alternatives:
  - lived
  - came to life again
  - rose to life
  lexicon: BDAG
  rationale: In this context, paired with 'died' and followed by dominion over dead
    and living, the verb refers to post-death life, not merely earthly living. 'Lived
    again' is concise and preserves the resurrection implication without over-paraphrasing.
    A footnote preserves the more explicit alternative 'rose to life.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English and adequately
    reflects the telic force.
- source_word: νεκρῶν
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: The genitive plural substantive after κυριεύσῃ is best rendered substantivally
    as 'the dead.' This is idiomatic and preserves the contrast with 'the living.'
- source_word: ζώντων
  chosen: the living
  alternatives:
  - living people
  - those who are alive
  lexicon: BDAG
  rationale: Present participle used substantivally in contrast with νεκρῶν. 'The
    living' is the most natural paired expression in English.
- source_word: κυριεύσῃ
  chosen: might be Lord of
  alternatives:
  - might rule over
  - might exercise lordship over
  lexicon: BDAG
  rationale: The verb means to rule, have dominion, or be lord over. Given the lexical
    connection to κύριος and the verse's christological force, 'might be Lord of'
    preserves both authority and the title-like resonance better than the flatter
    'rule over.'
