theological_decisions:
- issue: Rendering the resurrection-related verb ἔζησεν
  chosen_reading: The Messiah 'lived again,' implying resurrection after death.
  alternative_readings:
  - The Messiah 'lived'
  - The Messiah 'rose to life'
  rationale: The immediate pairing 'died and lived' and the purpose clause concerning
    lordship over dead and living strongly indicate resurrection life. 'Lived again'
    communicates this without adding more than the context warrants. The more explicit
    'rose to life' is preserved in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
- issue: Rendering κυριεύσῃ in relation to Christology
  chosen_reading: '''might be Lord of both the dead and the living'''
  alternative_readings:
  - might rule over both the dead and the living
  rationale: This wording preserves the christological weight of the verb and aligns
    with the doctrine's preference to translate titles meaningfully. It does not import
    a later creedal formulation, but it does reflect the text's claim of Messiah's
    dominion over all states of human existence.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Translation philosophy
    §2'
