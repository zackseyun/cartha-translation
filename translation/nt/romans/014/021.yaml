id: ROM.14.21
reference: Romans 14:21
source:
  edition: SBLGNT
  text: καλὸν τὸ μὴ φαγεῖν κρέα μηδὲ πιεῖν οἶνον μηδὲ ἐν ᾧ ὁ ἀδελφός σου προσκόπτει
    ⸂ἢ σκανδαλίζεται ἢ ἀσθενεῖ⸃·
translation:
  text: It is good not to eat meat or drink wine or do anything by which your brother
    stumbles or is caused to stumble or is weakened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in context, 'your brother or sister'—that is, a fellow
      believer.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  chosen: good
  alternatives:
  - better
  - noble
  lexicon: BDAG
  rationale: καλός here evaluates the course of action as morally fitting or commendable.
    'Good' is the most natural and sufficiently broad English equivalent.
- source_word: τὸ μὴ φαγεῖν
  chosen: not to eat
  alternatives:
  - to refrain from eating
  lexicon: BDAG
  rationale: The articular infinitive expresses the action in an abstract way. 'Not
    to eat' preserves the Greek structure cleanly; the broader sense of refraining
    is implicit.
- source_word: κρέα
  chosen: meat
  alternatives:
  - flesh
  - meat foods
  lexicon: BDAG
  rationale: In context this refers to food, not literal flesh as such. 'Meat' is
    idiomatic and contextually precise.
- source_word: μηδὲ πιεῖν οἶνον
  chosen: or drink wine
  alternatives:
  - nor to drink wine
  lexicon: BDAG
  rationale: μηδέ coordinates another abstention. 'Or drink wine' reads naturally
    in English while preserving the cumulative prohibition.
- source_word: μηδὲ ἐν ᾧ
  chosen: or do anything by which
  alternatives:
  - nor anything in which
  - nor in what
  lexicon: BDAG
  rationale: 'The Greek text leaves the final element elliptical after ''nor in/by
    which.'' English normally requires the implied action to be supplied. ''Do anything
    by which'' makes the sense explicit without over-paraphrasing: any conduct that
    becomes the occasion for harm to a fellow believer.'
- source_word: ὁ ἀδελφός σου
  chosen: your brother
  alternatives:
  - your brother or sister
  - your fellow believer
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred. In this context it likely has representative force for
    a fellow Christian, but the main text keeps 'brother' and inclusivity can be noted
    in a footnote.
- source_word: προσκόπτει
  chosen: stumbles
  alternatives:
  - strikes against
  - falls
  lexicon: BDAG
  rationale: The verb literally involves striking against, but in Pauline ethical
    context 'stumbles' is the established and accurate metaphor for spiritual/moral
    hindrance.
- source_word: σκανδαλίζεται
  chosen: is caused to stumble
  alternatives:
  - is offended
  - is ensnared
  lexicon: BDAG
  rationale: To avoid collapsing it into the same English as προσκόπτει while preserving
    the overlap, 'is caused to stumble' reflects the passive form and the idea of
    being tripped up or scandalized.
- source_word: ἀσθενεῖ
  chosen: is weakened
  alternatives:
  - becomes weak
  - is spiritually weak
  lexicon: BDAG
  rationale: ἀσθενέω can mean to be weak physically or figuratively. In this context
    of conscience and conduct, 'is weakened' best captures the moral/spiritual sense
    without importing too much interpretation.
