theological_decisions:
- issue: Rendering ἀδελφός in a representative sense
  chosen_reading: your brother
  alternative_readings:
  - your brother or sister
  - your fellow believer
  rationale: The Greek is masculine singular, and the doctrine excerpt directs gender-accurate
    translation over gender-neutral renderings. Because the referent in context is
    likely any fellow Christian, an inclusive alternative is preserved in a footnote
    rather than moved into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
