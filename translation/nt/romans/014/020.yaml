id: ROM.14.20
reference: Romans 14:20
source:
  edition: SBLGNT
  text: μὴ ἕνεκεν βρώματος κατάλυε τὸ ἔργον τοῦ θεοῦ. πάντα μὲν καθαρά, ἀλλὰ κακὸν
    τῷ ἀνθρώπῳ τῷ διὰ προσκόμματος ἐσθίοντι.
translation:
  text: Do not, for the sake of food, tear down the work of God. All things are indeed
    clean, but it is evil for the man who eats in a way that causes stumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Everything is indeed clean.' The context concerns food, so some translations
      make that explicit with 'All foods are clean.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for the person who eats so as to cause stumbling.' The Greek 'man'
      is representative here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνεκεν βρώματος
  chosen: for the sake of food
  alternatives:
  - because of food
  - on account of food
  lexicon: BDAG
  rationale: ἕνεκεν with the genitive expresses cause or motive. 'For the sake of
    food' preserves the sense that food is a trivial motive not worth the resulting
    damage.
- source_word: κατάλυε
  chosen: tear down
  alternatives:
  - destroy
  - demolish
  lexicon: BDAG
  rationale: The present imperative with μή prohibits an action; 'tear down' captures
    the metaphorical force of dismantling what God is building, while avoiding an
    over-absolute 'destroy' that may sound final in English.
- source_word: τὸ ἔργον τοῦ θεοῦ
  chosen: the work of God
  alternatives:
  - God's work
  lexicon: BDAG
  rationale: A straightforward genitival rendering best preserves the phrase's breadth
    and theological weight; Paul likely refers to what God is doing in the fellow
    believer/community.
- source_word: πάντα μὲν καθαρά
  chosen: All things are indeed clean
  alternatives:
  - Everything is indeed clean
  - All foods are indeed clean
  lexicon: BDAG
  rationale: πάντα is broad and contextually refers to foods, but 'all things' preserves
    the Greek wording while remaining understandable in context. μέν is lightly represented
    by 'indeed.' καθαρά is rendered 'clean' in keeping with purity-language rather
    than a more interpretive 'permissible'.
- source_word: κακὸν
  chosen: evil
  alternatives:
  - wrong
  - bad
  lexicon: BDAG
  rationale: '''Evil'' preserves the moral force of κακόν more strongly than ''wrong''
    or ''bad,'' fitting Paul''s ethical warning.'
- source_word: τῷ ἀνθρώπῳ
  chosen: for the man
  alternatives:
  - for the person
  - for a man
  lexicon: BDAG
  rationale: Following the project's gender-accurate principle, ἄνθρωπος here is rendered
    with the masculine form reflected in the Greek construction, while functioning
    representatively. A more inclusive alternative is preserved in a footnote.
- source_word: διὰ προσκόμματος
  chosen: in a way that causes stumbling
  alternatives:
  - with offense
  - through a stumbling block
  - so as to cause someone to stumble
  lexicon: BDAG
  rationale: πρόσκομμα denotes a cause of stumbling/offense. The phrase modifies the
    manner of eating; this rendering makes the ethical sense clear in natural English
    without losing the stumbling imagery.
- source_word: ἐσθίοντι
  chosen: who eats
  alternatives:
  - while eating
  - as he eats
  lexicon: BDAG
  rationale: The present participle is substantival with τῷ ... τῷ, identifying the
    person characterized by such eating. 'Who eats' is the most natural English equivalent.
