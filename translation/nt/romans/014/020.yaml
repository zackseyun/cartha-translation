theological_decisions:
- issue: Scope of 'clean' language in relation to food laws and Christian liberty
  chosen_reading: Render καθαρά as 'clean' and leave the statement broad but contextually
    tied to food.
  alternative_readings:
  - Render as 'permissible' to foreground liberty
  - Render as 'all foods are clean' to make the food context explicit
  rationale: Paul affirms the cleanness of foods in context, but the Greek says πάντα
    μὲν καθαρά, not explicitly 'foods.' Keeping 'clean' preserves the purity-language
    and avoids importing a more interpretive paraphrase while still fitting the immediate
    discussion of eating.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Representative masculine ἄνθρωπος
  chosen_reading: Use 'man' in the main text, with an inclusive alternative footnoted.
  alternative_readings:
  - person
  rationale: The Greek is grammatically masculine singular and representative. Per
    the doctrine's gender-accurate principle, the main text should reflect the source
    form and intent, while a footnote can clarify the representative sense for modern
    readers.
  doctrine_reference: Translation philosophy §4
