theological_decisions:
- issue: Referent of 'your good' (τὸ ἀγαθόν)
  chosen_reading: Rendered broadly as 'your good' without specifying the referent.
  alternative_readings:
  - your freedom
  - your privilege
  - your good teaching/testimony
  rationale: Paul's wording is intentionally concise and can encompass the good associated
    with the Roman believers' conviction and liberty in disputable matters. Narrowing
    it to 'freedom' or 'privilege' would import an interpretation not explicit in
    the Greek. Preserving the broader phrase maintains the text's theological and
    pastoral tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
