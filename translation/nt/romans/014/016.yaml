id: ROM.14.16
reference: Romans 14:16
source:
  edition: SBLGNT
  text: μὴ βλασφημείσθω οὖν ὑμῶν τὸ ἀγαθόν.
translation:
  text: Therefore, do not let your good be spoken of as evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not let your good be reviled' or 'be slandered.' The Greek verb can
      denote abusive or defamatory speech; 'blasphemed' is more literal but in English
      can sound too specifically religious here.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: do not let
  alternatives:
  - let not
  lexicon: BDAG
  rationale: With the present passive imperative βλασφημείσθω, μή introduces a prohibition.
    In natural English, 'do not let' best conveys the prohibitive force without archaic
    style.
- source_word: βλασφημείσθω
  chosen: be spoken of as evil
  alternatives:
  - be blasphemed
  - be slandered
  - be reviled
  lexicon: BDAG
  rationale: The verb βλασφημέω can mean 'speak in a disrespectful/defamatory way,'
    including 'blaspheme' when the object is divine, but here the object is τὸ ἀγαθόν
    ('the good'), not God. 'Be spoken of as evil' captures the passive sense and the
    idea that something good comes to be treated verbally as bad, while avoiding the
    overly religious English sense of 'blaspheme.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding argument. 'Therefore' preserves
    the logical connection clearly in contemporary English.
- source_word: ὑμῶν
  chosen: your
  alternatives:
  - of you
  lexicon: BDAG
  rationale: 'The genitive pronoun modifies τὸ ἀγαθόν, indicating possession or association:
    ''your good.'' This is the most natural English rendering.'
- source_word: τὸ ἀγαθόν
  chosen: your good
  alternatives:
  - what is good for you
  - your good thing
  - your good [thing/blessing]
  lexicon: BDAG
  rationale: 'The articular neuter adjective functions substantivally: ''the good.''
    In context it likely refers to the believers'' good/benefit/freedom that should
    not, through misuse, become the object of reproach. ''Your good'' preserves the
    Greek''s compactness and leaves the referent appropriately broad, rather than
    over-interpreting it as specifically ''freedom'' or ''privilege.'''
