theological_decisions:
- issue: Sense of the reflexive dative ἑαυτῷ in both clauses
  chosen_reading: for himself
  alternative_readings:
  - to himself
  - for his own sake
  rationale: The verse in context concerns whether believers' living and dying are
    oriented toward themselves or toward the Lord (made explicit in v. 8). Rendering
    ἑαυτῷ as 'for himself' preserves that teleological sense without importing extra
    doctrinal language.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
- issue: Generic masculine reflexive in English
  chosen_reading: himself
  alternative_readings:
  - themselves
  - oneself
  rationale: The Greek uses singular masculine reflexive forms generically. Per the
    gender-accurate policy, the translation keeps the singular masculine form rather
    than flattening it into plural gender-neutral English.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral
