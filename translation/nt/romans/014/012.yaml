theological_decisions:
- issue: Gendered reflexive in representative statement
  chosen_reading: concerning himself
  alternative_readings:
  - concerning themselves
  - for himself
  rationale: Following the project's gender-accurate policy, the masculine singular
    ἑαυτοῦ is reflected with singular masculine English rather than a pluralized gender-neutral
    rendering. The statement is generic and applies to every person, but the Greek
    presents it distributively in the singular.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
