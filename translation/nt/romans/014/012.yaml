id: ROM.14.12
reference: Romans 14:12
source:
  edition: SBLGNT
  text: ⸀ἄρα ἕκαστος ἡμῶν περὶ ἑαυτοῦ λόγον ⸀δώσει.
translation:
  text: So then, each of us will give an account concerning himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about himself' or idiomatically 'for himself.' The Greek literally says
      'concerning himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  chosen: So then
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument; 'So then'
    is natural modern English and preserves the logical force better than a bare 'then'.
- source_word: ἕκαστος ἡμῶν
  chosen: each of us
  alternatives:
  - every one of us
  lexicon: BDAG
  rationale: Represents the distributive force of ἕκαστος with the partitive genitive
    ἡμῶν in clear contemporary English.
- source_word: περὶ ἑαυτοῦ
  chosen: concerning himself
  alternatives:
  - about himself
  - for himself
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'concerning/about.' 'Concerning
    himself' preserves the prepositional sense more closely than the idiomatic but
    less explicit 'for himself.' The masculine singular reflexive follows the Greek
    form; in context it is representative/generic, referring to each person individually.
- source_word: λόγον
  chosen: an account
  alternatives:
  - account
  - word
  - reason
  lexicon: BDAG
  rationale: In the idiom λόγον δώσει, the sense is to render or give an account,
    especially in a judicial or evaluative setting. 'An account' best captures the
    idiomatic meaning in English.
- source_word: δώσει
  chosen: will give
  alternatives:
  - will render
  lexicon: BDAG
  rationale: Future active indicative of δίδωμι. 'Will give' is the straightforward
    verbal component of the idiom and reads naturally with 'an account.'
