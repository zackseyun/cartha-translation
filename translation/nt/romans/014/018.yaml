theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrine excerpt directs
    that Christological titles be translated where context supports. 'Messiah' preserves
    the semantic content of Χριστός without importing a denominational distinctive.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Scope of ἐν τούτῳ
  chosen_reading: manner/sphere reference ('in this way')
  alternative_readings:
  - locative/object reference ('in this')
  - specific reference to 'the kingdom of God'
  rationale: The phrase most naturally summarizes the kind of conduct described in
    the preceding context rather than introducing a narrow doctrinal claim. This preserves
    the contextual flow without over-specifying Paul's referent.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
