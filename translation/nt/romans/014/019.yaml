theological_decisions:
- issue: Scope of communal edification
  chosen_reading: The verse exhorts believers corporately to pursue peace and mutual
    edification within the Christian community.
  alternative_readings:
  - A more individualistic reading focused only on personal moral improvement
  rationale: The hortatory first-person plural and reciprocal ἀλλήλους point to shared
    community life, especially in the context of disputes over conscience in Romans
    14. The translation preserves this communal emphasis without importing denominational
    distinctives.
  doctrine_reference: Translation philosophy §§3, 6
