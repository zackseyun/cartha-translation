id: ROM.14.19
reference: Romans 14:19
source:
  edition: SBLGNT
  text: ἄρα οὖν τὰ τῆς εἰρήνης διώκωμεν καὶ τὰ τῆς οἰκοδομῆς τῆς εἰς ἀλλήλους.
translation:
  text: So then, let us pursue what makes for peace and what builds up one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the things of peace and the things of edification for
      one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Accordingly then
  lexicon: BDAG
  rationale: The paired inferential particles draw a conclusion from the preceding
    argument. 'So then' is natural modern English and preserves the cumulative inferential
    force without sounding wooden.
- source_word: τὰ τῆς εἰρήνης
  chosen: what makes for peace
  alternatives:
  - the things of peace
  - the things that lead to peace
  lexicon: BDAG
  rationale: The articular neuter plural with genitive is idiomatic, referring to
    matters pertaining to peace. 'What makes for peace' communicates the sense clearly
    in English while staying close to the Greek idea of pursuing peace-promoting things.
- source_word: διώκωμεν
  chosen: let us pursue
  alternatives:
  - let us strive for
  - let us seek after
  lexicon: BDAG
  rationale: The present active subjunctive in hortatory use calls for ongoing communal
    action. 'Pursue' preserves the energetic force of διώκω better than the weaker
    'seek,' while fitting Paul's exhortational tone.
- source_word: τὰ τῆς οἰκοδομῆς
  chosen: what builds up
  alternatives:
  - the things of edification
  - the things that build up
  lexicon: BDAG
  rationale: οἰκοδομή is literally 'building' but commonly metaphorical for edification.
    'What builds up' is readable modern English and preserves the metaphor without
    ecclesiastical jargon.
- source_word: τῆς εἰς ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  - for one another
  lexicon: BDAG
  rationale: This phrase modifies the building-up idea in a reciprocal sense within
    the community. Rendering it as 'one another' captures the mutuality naturally.
    English idiom places it after 'builds up' rather than reproducing the prepositional
    structure woodenly.
