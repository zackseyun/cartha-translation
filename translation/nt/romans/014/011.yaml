theological_decisions:
- issue: Relation of 'Lord' and 'God' within the quotation
  chosen_reading: Retain the wording 'says the Lord ... every tongue will confess
    to God' without harmonizing the referents.
  alternative_readings:
  - Render the final phrase as 'confess to me' for smoother parallelism
  - Interpret the verse explicitly as identifying Jesus with YHWH in the translation
    itself
  rationale: Paul's wording intentionally preserves the scriptural citation while
    applying it in context. The translation should not smooth out the shift from first
    person divine speech ('to me') to 'to God,' nor should it import an explicit doctrinal
    conclusion into the wording. Historic orthodoxy permits the christological implications,
    but the translation should preserve the text's own form and tension.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering 'Lord'.
