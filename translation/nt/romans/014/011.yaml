id: ROM.14.11
reference: Romans 14:11
source:
  edition: SBLGNT
  text: γέγραπται γάρ· Ζῶ ἐγώ, λέγει κύριος, ὅτι ἐμοὶ κάμψει πᾶν γόνυ, καὶ ⸂πᾶσα γλῶσσα
    ἐξομολογήσεται⸃ τῷ θεῷ.
translation:
  text: 'For it is written: “As I live, says the Lord, every knee will bow to me,
    and every tongue will confess to God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will acknowledge' or 'will give praise to God.' The Greek verb can carry
      nuances of confession, acknowledgment, or praise depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard English rendering of the perfect passive formula introducing
    Scripture citation; 'it is written' is idiomatic and preserves the authoritative
    written status.
- source_word: Ζῶ ἐγώ
  chosen: As I live
  alternatives:
  - I live
  - By my life
  lexicon: BDAG
  rationale: In citation formulae this idiom functions as an oath-like declaration.
    'As I live' is natural English and preserves the solemn force better than the
    bare 'I live.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - LORD
  lexicon: BDAG
  rationale: DOCTRINE.md gives 'Lord' as the default for κύριος. Although the quotation
    echoes Isaiah's divine speech, the Greek here reads κύριος, not the Tetragrammaton.
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - before me
  lexicon: BDAG
  rationale: The dative is most directly rendered 'to me.' In the context of bowing,
    English can also say 'before me,' but 'to me' stays closer to the Greek and matches
    the parallel dative with 'to God.'
- source_word: κάμψει πᾶν γόνυ
  chosen: every knee will bow
  alternatives:
  - every knee shall bend
  lexicon: BDAG
  rationale: This is the natural English idiom for the future act of submission/worship.
    'Bow' is more idiomatic than 'bend' while preserving the image.
- source_word: πᾶσα γλῶσσα
  chosen: every tongue
  alternatives:
  - every person
  - every language
  lexicon: BDAG
  rationale: A literal rendering preserves the bodily metaphor and scriptural resonance.
    Broader paraphrases would flatten the imagery.
- source_word: ἐξομολογήσεται
  chosen: will confess
  alternatives:
  - will acknowledge
  - will praise
  lexicon: BDAG
  rationale: The verb can denote confessing, acknowledging, or praising depending
    on context. Here 'will confess' best preserves the lexical form and the solemn
    public acknowledgment in view; the praise nuance is worth preserving in a footnote.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The dative is retained explicitly as 'to God.' This also reflects Paul's
    wording, even though the preceding clause says 'to me' in the divine quotation.
