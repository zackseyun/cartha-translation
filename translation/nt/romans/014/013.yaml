id: ROM.14.13
reference: Romans 14:13
source:
  edition: SBLGNT
  text: Μηκέτι οὖν ἀλλήλους κρίνωμεν· ἀλλὰ τοῦτο κρίνατε μᾶλλον, τὸ μὴ τιθέναι πρόσκομμα
    τῷ ἀδελφῷ ἢ σκάνδαλον.
translation:
  text: 'Therefore, let us no longer judge one another, but rather decide this: not
    to put a stumbling block or an offense before a brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before a brother or sister'; the Greek says 'brother' in the singular,
      referring here to a fellow believer.
    reason: alternative_reading
  - marker: b
    text: Or 'a cause for falling' or 'a snare'; here 'offense' means something that
      trips another into sin, not merely something that hurts feelings.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηκέτι
  chosen: no longer
  alternatives:
  - not any longer
  - stop
  lexicon: BDAG
  rationale: Captures the adverb's sense of ceasing an ongoing practice. 'No longer'
    is natural modern English and fits the hortatory subjunctive that follows.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inferential transition from the preceding argument. 'Therefore'
    preserves the logical connection more clearly than the lighter 'so.'
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English; both are possible, but 'one
    another' is slightly more formal and suits the paraenetic tone.
- source_word: κρίνωμεν
  chosen: let us ... judge
  alternatives:
  - let us ... pass judgment on
  - let us ... condemn
  lexicon: BDAG
  rationale: The hortatory subjunctive calls for an exhortation. 'Judge' preserves
    the lexical repetition with κρίνατε later in the verse, which Paul uses rhetorically.
    'Pass judgment on' is interpretive and longer; 'condemn' is too narrow.
- source_word: ἀλλὰ τοῦτο κρίνατε μᾶλλον
  chosen: but rather decide this
  alternatives:
  - but rather judge this
  - but instead resolve this
  lexicon: BDAG
  rationale: Paul intentionally repeats κρίνω with a different object. In English,
    rendering the second occurrence as 'decide' preserves the wordplay while making
    clear that the command is to make a determination about one's own conduct, not
    to judge another person. 'Rather' reflects μᾶλλον.
- source_word: τὸ μὴ τιθέναι
  chosen: not to put
  alternatives:
  - not to place
  - not to set
  lexicon: BDAG
  rationale: The articular infinitive expresses the content of what is to be decided/resolved.
    'Put' is idiomatic and concise in English.
- source_word: πρόσκομμα
  chosen: a stumbling block
  alternatives:
  - an obstacle
  - a cause for stumbling
  lexicon: BDAG
  rationale: A well-established and transparent metaphor for something that causes
    another to stumble spiritually or morally. It preserves the imagery of the Greek.
- source_word: τῷ ἀδελφῷ
  chosen: before a brother
  alternatives:
  - for a brother
  - in a brother's way
  - before a fellow believer
  lexicon: BDAG
  rationale: The dative with τιθέναι in this context is naturally expressed in English
    as placing something before/in the way of someone. 'Brother' follows the singular
    ἀδελφῷ and the project's gender-accurate policy; in Pauline usage here it is representative
    of a fellow believer, which can be clarified in a footnote.
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: BDAG
  rationale: The conjunction is disjunctive. English 'or' preserves the Greek structure
    without forcing a distinction sharper than Paul may intend between the near-synonyms.
- source_word: σκάνδαλον
  chosen: an offense
  alternatives:
  - a snare
  - a trap
  - a cause for falling
  lexicon: BDAG
  rationale: In this paired expression with πρόσκομμα, σκάνδαλον denotes something
    that trips someone up or leads into sin. 'Offense' is a traditional rendering,
    though not in the modern sense of hurt feelings; a footnote preserves the more
    explicit sense.
