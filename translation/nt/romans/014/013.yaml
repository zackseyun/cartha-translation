theological_decisions:
- issue: Rendering ἀδελφῷ in a representative singular context
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: Following the doctrine's gender-accurate policy, the grammatically masculine
    singular is rendered 'brother' in the main text rather than neutralizing it. Because
    the referent in context is a fellow Christian generally, an inclusive alternative
    is preserved in a footnote rather than moved into the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Semantic force of σκάνδαλον in ethical exhortation
  chosen_reading: offense
  alternative_readings:
  - cause for falling
  - snare
  rationale: The main text keeps a concise traditional equivalent while a footnote
    clarifies that the sense is not mere personal offense but something that leads
    another into spiritual or moral stumbling. This preserves theological and ethical
    force without over-paraphrasing the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
