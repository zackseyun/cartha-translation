theological_decisions:
- issue: Rendering σάρξ in a morally charged Pauline context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The verse contrasts mind and flesh, but the Greek uses σάρξ rather than
    an explicit term for a sinful disposition. Rendering it 'flesh' preserves Paul's
    anthropological tension without importing a fuller doctrinal explanation into
    the text itself.
  doctrine_reference: 'DOCTRINE.md: σάρξ default rendering and preserve theological
    tension'
