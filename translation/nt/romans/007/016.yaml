id: ROM.7.16
reference: Romans 7:16
source:
  edition: SBLGNT
  text: εἰ δὲ ὃ οὐ θέλω τοῦτο ποιῶ, σύμφημι τῷ νόμῳ ὅτι καλός.
translation:
  text: But if I do what I do not want, I agree with the law that it is good.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - If then
  rationale: Keeps the conditional force of εἰ and the mildly contrastive/continuative
    sense of δέ in natural English.
- source_word: ὃ … τοῦτο
  chosen: what
  alternatives:
  - that which
  rationale: The correlative construction is idiomatically compressed in English as
    'what,' preserving sense without awkwardness.
- source_word: θέλω
  chosen: want
  alternatives:
  - wish
  - will
  lexicon: BDAG
  rationale: '''Want'' is the clearest modern-English equivalent here and matches
    the internal desire being contrasted with the action.'
- source_word: ποιῶ
  chosen: do
  alternatives:
  - practice
  - carry out
  lexicon: BDAG
  rationale: A simple present-tense verb best reflects Paul's straightforward wording
    in this clause.
- source_word: σύμφημι
  chosen: I agree with
  alternatives:
  - I concur with
  - I affirm
  lexicon: BDAG
  rationale: This best conveys giving assent to the law's judgment, with the dative
    τῷ νόμῳ naturally rendered 'with the law.'
- source_word: νόμῳ
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: The article supports a definite expression; in Romans this normally refers
    to the Mosaic law as a known category, and lower-case 'law' avoids overinterpreting
    with a stylized title.
- source_word: καλός
  chosen: good
  alternatives:
  - right
  - excellent
  - noble
  lexicon: BDAG
  rationale: '''Good'' is the most direct and standard rendering here, expressing
    the law''s positive moral quality without overtranslation.'
