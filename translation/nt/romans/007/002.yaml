id: ROM.7.2
reference: Romans 7:2
source:
  edition: SBLGNT
  text: ἡ γὰρ ὕπανδρος γυνὴ τῷ ζῶντι ἀνδρὶ δέδεται νόμῳ· ἐὰν δὲ ἀποθάνῃ ὁ ἀνήρ, κατήργηται
    ἀπὸ τοῦ νόμου τοῦ ἀνδρός.
translation:
  text: For a married woman is bound by law to her living husband; but if the husband
    dies, she is released from the law concerning her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "she is freed from her husband's law"; the Greek likely means the legal
      bond that tied her to her husband.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕπανδρος γυνή
  chosen: a married woman
  alternatives:
  - a woman under a husband
  - a wife
  lexicon: BDAG
  rationale: The compound adjective plus noun denotes a woman who is under the bond
    of marriage. 'Married woman' is clear, natural English and preserves the legal-marital
    sense without awkward literalism.
- source_word: τῷ ζῶντι ἀνδρί
  chosen: to her living husband
  alternatives:
  - to the living husband
  - to a living husband
  lexicon: BDAG
  rationale: The dative phrase identifies the husband as living, which is central
    to Paul's analogy. Adding 'her' makes the relational sense idiomatic in English
    though possession is implicit in context.
- source_word: δέδεται
  chosen: is bound
  alternatives:
  - has been bound
  - is legally bound
  lexicon: BDAG
  rationale: The perfect passive indicates a present state resulting from a binding
    act. 'Is bound' conveys the ongoing state well in natural English.
- source_word: νόμῳ
  chosen: by law
  alternatives:
  - by the law
  - by a law
  lexicon: BDAG
  rationale: Anarthrous νόμῳ here is best taken generically or qualitatively, referring
    to legal principle rather than specifically the Mosaic law. 'By law' preserves
    that force.
- source_word: κατήργηται
  chosen: is released
  alternatives:
  - has been released
  - is discharged
  - is freed
  lexicon: BDAG
  rationale: The verb conveys being rendered free from legal force or obligation in
    this context. 'Is released' fits the marital-legal imagery more naturally than
    a more wooden 'has been abolished.'
- source_word: ἀπὸ τοῦ νόμου τοῦ ἀνδρός
  chosen: from the law concerning her husband
  alternatives:
  - from the law of her husband
  - from her husband's law
  - from the marriage law
  lexicon: BDAG
  rationale: The genitive construction is somewhat compressed. 'The law concerning
    her husband' best communicates the law binding her in relation to him, without
    implying that the husband himself is the lawgiver.
