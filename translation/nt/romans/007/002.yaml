theological_decisions:
- issue: Whether νόμῳ / τοῦ νόμου here refers specifically to Mosaic law or to the
    general legal bond of marriage
  chosen_reading: general marriage law / legal principle
  alternative_readings:
  - the Mosaic law applied to marriage
  rationale: In context Paul is using marriage as an analogy to explain release from
    law through death. The lack of article in νόμῳ and the immediate marital frame
    favor a general legal-marital sense rather than a direct reference to the Mosaic
    law itself in this verse.
