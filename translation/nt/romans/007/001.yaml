theological_decisions:
- issue: Scope of νόμος in Paul's statement
  chosen_reading: Rendered simply as 'the law' without narrowing it in translation.
  alternative_readings:
  - the Mosaic law specifically
  - law as a general legal principle
  rationale: The Greek text itself does not explicitly resolve the full scope here.
    Paul's immediate argument develops with Mosaic law in view, but the wording is
    general enough that the translation should preserve that breadth rather than interpret
    it for the reader.
  doctrine_reference: Preserve theological tension rather than resolve it.
