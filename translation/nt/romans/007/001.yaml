id: ROM.7.1
reference: Romans 7:1
source:
  edition: SBLGNT
  text: Ἢ ἀγνοεῖτε, ἀδελφοί, γινώσκουσιν γὰρ νόμον λαλῶ, ὅτι ὁ νόμος κυριεύει τοῦ
    ἀνθρώπου ἐφ’ ὅσον χρόνον ζῇ;
translation:
  text: Or do you not know, brothers—for I am speaking to those who know the law—that
    the law rules over a person for as long as he lives?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine plural adelphoi; in this context
      it likely includes the women among Paul''s hearers.'
    reason: cultural_note
  - marker: b
    text: Or 'has authority over a person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  chosen: Or
  alternatives:
  - Or is it that
  lexicon: BDAG
  rationale: Retains Paul's argumentative transition from the previous discussion
    rather than weakening it into a mere discourse filler.
- source_word: ἀγνοεῖτε
  chosen: do you not know
  alternatives:
  - are you unaware
  lexicon: BDAG
  rationale: A natural English rendering of the present active indicative in a rhetorical
    question; it preserves the appeal to shared knowledge.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers,
  - siblings
  lexicon: BDAG
  rationale: Following the doctrine's gender-accurate principle, the masculine plural
    is preserved in the main text. Because Paul addresses a mixed Christian audience,
    the inclusive force is preserved in a footnote rather than flattened in the main
    text.
- source_word: γινώσκουσιν γὰρ νόμον λαλῶ
  chosen: for I am speaking to those who know the law
  alternatives:
  - for I am speaking to people who know the law
  lexicon: BDAG
  rationale: This keeps the parenthetical explanatory force of γάρ and the participial
    idea of γινώσκουσιν while producing clear modern English.
- source_word: νόμον / ὁ νόμος
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: νόμος is kept consistently as 'law.' The article is retained in English
    because Paul speaks of law as a recognizable authority, with Mosaic law especially
    in view in context, without over-specifying beyond the Greek.
- source_word: κυριεύει
  chosen: rules over
  alternatives:
  - has authority over
  - exercises lordship over
  lexicon: BDAG
  rationale: This verb conveys mastery or dominion. 'Rules over' is clear, direct,
    and preserves the authority nuance without sounding overly wooden.
- source_word: τοῦ ἀνθρώπου
  chosen: a person
  alternatives:
  - the person
  - a man
  - a human being
  lexicon: BDAG
  rationale: ἄνθρωπος here is generic rather than specifically male. 'A person' best
    reflects the representative singular sense in natural English.
- source_word: ἐφ’ ὅσον χρόνον ζῇ
  chosen: for as long as he lives
  alternatives:
  - as long as he is alive
  - for the whole time he lives
  lexicon: BDAG
  rationale: This preserves the temporal force of the idiom in idiomatic English.
    The singular 'he' reflects the representative singular construction tied to ἄνθρωπος.
