id: ROM.7.23
reference: Romans 7:23
source:
  edition: SBLGNT
  text: βλέπω δὲ ἕτερον νόμον ἐν τοῖς μέλεσίν μου ἀντιστρατευόμενον τῷ νόμῳ τοῦ νοός
    μου καὶ αἰχμαλωτίζοντά με ⸀ἐν τῷ νόμῳ τῆς ἁμαρτίας τῷ ὄντι ἐν τοῖς μέλεσίν μου.
translation:
  text: But I see another law in my members, waging war against the law of my mind
    and taking me captive to the law of sin that is in my members.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "principle" or "power" for "law" in these repeated uses of νόμος.
    reason: lexical_alternative
  - marker: b
    text: Lit. "in the law of sin"; the English "to the law of sin" expresses the
      sense of being brought into captivity under its power.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπω
  chosen: I see
  alternatives:
  - I observe
  - I perceive
  lexicon: BDAG
  rationale: Present-tense firsthand perception is best kept with the simple English
    present, preserving Paul's vivid self-description.
- source_word: ἕτερον
  chosen: another
  alternatives:
  - a different
  lexicon: BDAG
  rationale: '"Another" is natural English and preserves the contrast with the prior
    "law" without overtranslating the nuance.'
- source_word: νόμον / νόμῳ (repeated)
  chosen: law
  alternatives:
  - principle
  - power
  lexicon: BDAG
  rationale: Paul repeats νόμος several times with rhetorical force. Rendering each
    instance as "law" preserves that verbal pattern and the theological tension, rather
    than resolving it into the more interpretive "principle" or "power."
- source_word: ἐν τοῖς μέλεσίν μου
  chosen: in my members
  alternatives:
  - in my body
  - in my limbs
  - in the parts of my body
  lexicon: BDAG
  rationale: '"Members" is the established anatomical metaphor in Pauline usage and
    keeps the concrete bodily sense without flattening it to simply "body."'
- source_word: ἀντιστρατευόμενον
  chosen: waging war against
  alternatives:
  - fighting against
  - making war against
  lexicon: BDAG
  rationale: The military imagery should be preserved. "Waging war against" is vivid,
    natural, and suitably weighty.
- source_word: τοῦ νοός
  chosen: of my mind
  alternatives:
  - of my understanding
  - of my inner self
  lexicon: BDAG
  rationale: νοῦς here refers to the rational, volitional inner faculty. "Mind" is
    the most direct and readable rendering.
- source_word: αἰχμαλωτίζοντά
  chosen: taking me captive
  alternatives:
  - capturing me
  - making me a prisoner
  lexicon: BDAG
  rationale: This keeps the force of the participle and continues the warfare imagery
    established by the previous verb.
- source_word: ἐν τῷ νόμῳ τῆς ἁμαρτίας
  chosen: to the law of sin
  alternatives:
  - in the law of sin
  - under the law of sin
  lexicon: BDAG
  rationale: Although the Greek preposition is ἐν, English idiom with "take captive"
    more naturally expresses the resulting subjection as "to." This is an optimal-equivalence
    adjustment for clear English while preserving the sense of enslavement to sin's
    law.
- source_word: ἁμαρτίας
  chosen: sin
  lexicon: BDAG
  rationale: The standard rendering is clear and precise here.
