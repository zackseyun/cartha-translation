theological_decisions:
- issue: Whether to render νόμος in this verse as "law" or interpretively as "principle/power."
  chosen_reading: Render all instances as "law" in the main text.
  alternative_readings:
  - Render one or more instances as "principle"
  - Render one or more instances as "power"
  rationale: The verse uses repeated νόμος language in a rhetorically dense way. Keeping
    "law" preserves Paul's deliberate tension between divine law, the mind's alignment,
    and sin's operative counterforce, rather than collapsing the metaphor into a single
    modern interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
