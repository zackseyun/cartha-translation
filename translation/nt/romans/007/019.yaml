theological_decisions:
- issue: Whether to soften Paul's moral contrast into weaker ethical language
  chosen_reading: Retain “the good” / “the evil” as direct moral categories.
  alternative_readings:
  - the right thing / the wrong thing
  - good / bad
  rationale: Paul’s contrast is ethically weighty and should not be flattened into
    merely pragmatic language. The Greek adjectives naturally bear moral force here.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
