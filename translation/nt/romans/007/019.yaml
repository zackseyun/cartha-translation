id: ROM.7.19
reference: Romans 7:19
source:
  edition: SBLGNT
  text: οὐ γὰρ ὃ θέλω ποιῶ ἀγαθόν, ἀλλὰ ὃ οὐ θέλω κακὸν τοῦτο πράσσω.
translation:
  text: For I do not do the good that I want, but the evil that I do not want—this
    I practice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “carry out” for “do” (ποιῶ); the Greek uses a different verb later in
      the verse.
    reason: lexical_alternative
  - marker: b
    text: Or “do” for “practice” (πράσσω); the translation distinguishes the two Greek
      verbs for clarity, though the overlap in meaning is substantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλω
  chosen: want
  alternatives:
  - will
  - desire
  lexicon: BDAG
  rationale: “Want” is natural modern English and accurately conveys volition here
    without sounding overly philosophical or archaic.
- source_word: ποιῶ
  chosen: do
  alternatives:
  - carry out
  - practice
  lexicon: BDAG
  rationale: A plain rendering fits the contrast with πράσσω and preserves readable
    modern English.
- source_word: ἀγαθόν
  chosen: the good
  alternatives:
  - good
  - what is good
  lexicon: BDAG
  rationale: The article is implicit in English idiom but helpful to preserve the
    sense of the morally good thing Paul intends.
- source_word: κακὸν
  chosen: the evil
  alternatives:
  - evil
  - what is evil
  - the bad
  lexicon: BDAG
  rationale: “The evil” matches the parallel with “the good” and keeps the moral contrast
    stronger than “the bad.”
- source_word: πράσσω
  chosen: practice
  alternatives:
  - do
  - carry out
  lexicon: BDAG
  rationale: Using “practice” preserves a plausible distinction from ποιῶ without
    overstating it; it suggests enacted conduct or repeated doing in context.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'The demonstrative is emphatic and is best retained explicitly in English:
    “this I practice.”'
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - For ... do not
  - Indeed ... not
  lexicon: BDAG
  rationale: “For” preserves the explanatory force of γάρ and maintains the verse’s
    connection to Paul’s surrounding argument.
