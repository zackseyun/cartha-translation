theological_decisions:
- issue: Anthropological nuance of 'the inner man'
  chosen_reading: Rendered as 'my inner man' as an idiomatic reference to the inward
    self, without importing a more technical doctrinal model of human composition.
  alternative_readings:
  - my inner self
  - my inner being
  rationale: The phrase should retain Paul's metaphorical wording while avoiding an
    interpretive paraphrase that would resolve broader theological debates not explicit
    in the verse.
  doctrine_reference: Gender-accurate over gender-neutral; preserve theological tension
    rather than resolve it.
