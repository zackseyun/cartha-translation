id: ROM.7.22
reference: Romans 7:22
source:
  edition: SBLGNT
  text: συνήδομαι γὰρ τῷ νόμῳ τοῦ θεοῦ κατὰ τὸν ἔσω ἄνθρωπον,
translation:
  text: For I delight in the law of God in my inner man,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my inner self' or 'my inner being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήδομαι
  chosen: delight in
  alternatives:
  - rejoice with
  - agree with joy in
  lexicon: BDAG
  rationale: The verb expresses glad approval or delighted concurrence, not mere intellectual
    agreement. 'Delight in' is natural English and preserves the affective force.
- source_word: νόμῳ
  chosen: law
  alternatives:
  - instruction
  lexicon: BDAG
  rationale: In Romans, νόμος commonly refers to law in a strong Pauline sense; 'law'
    best preserves the established usage and theological weight here.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is straightforward. 'Of God' keeps the phrasing slightly
    more formal and matches Paul's style in context.
- source_word: κατὰ
  chosen: in
  alternatives:
  - according to
  - with respect to
  lexicon: BDAG
  rationale: Here κατά marks the standard or sphere from which the delight is considered.
    'In' gives clear modern English while still reflecting the inward sphere intended.
- source_word: τὸν ἔσω ἄνθρωπον
  chosen: my inner man
  alternatives:
  - the inner man
  - my inner self
  - my inner being
  lexicon: BDAG
  rationale: This is a recognizable Pauline expression. 'Inner man' preserves the
    metaphor and the masculine singular form of the Greek; adding 'my' makes the English
    idiomatic from the first-person context. Inclusive alternatives are better preserved
    in a footnote rather than replacing the source-shaped expression.
