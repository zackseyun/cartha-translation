theological_decisions:
- issue: Whether to render the final phrase hyper-literally or idiomatically
  chosen_reading: this body of death
  alternative_readings:
  - the body of this death
  rationale: The verse is an anguished cry, and the idiomatic English phrase 'this
    body of death' preserves the meaning and rhetorical force better than a formally
    rigid rendering. This choice does not resolve a doctrinal issue but preserves
    the text's tension and imagery.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it.'
