id: ROM.7.24
reference: Romans 7:24
source:
  edition: SBLGNT
  text: ταλαίπωρος ἐγὼ ἄνθρωπος· τίς με ῥύσεται ἐκ τοῦ σώματος τοῦ θανάτου τούτου;
translation:
  text: What a wretched man I am! Who will rescue me from this body of death?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the body of this death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'deliver me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταλαίπωρος
  chosen: wretched
  alternatives:
  - miserable
  - pitiful
  lexicon: BDAG
  rationale: Conveys severe misery and distress with natural modern English. 'Wretched'
    preserves the emotional force better than the flatter 'miserable' and fits Paul's
    anguished outcry.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: BDAG
  rationale: Here Paul refers to himself in the masculine singular, so 'man' is the
    gender-accurate rendering rather than a neutral substitute.
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: The interrogative is personal, asking for a deliverer, so 'who' is the
    plain and natural English equivalent.
- source_word: ῥύσεται
  chosen: will rescue
  alternatives:
  - will deliver
  - will save
  lexicon: BDAG
  rationale: The verb denotes deliverance from danger or bondage. 'Rescue' is vivid,
    natural English and avoids overly traditional phrasing while preserving the sense.
    'Deliver' remains a strong alternative.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Standard and clear rendering of separation/source in this context.
- source_word: σώματος
  chosen: body
  alternatives: []
  lexicon: BDAG
  rationale: The literal sense 'body' should be preserved; the text does not warrant
    paraphrasing to something less concrete.
- source_word: τοῦ θανάτου τούτου
  chosen: of death
  alternatives:
  - of this death
  - belonging to this death
  lexicon: BDAG
  rationale: The Greek expression is awkward in English if rendered hyper-literally
    ('of this death'). 'This body of death' best reflects the construction in clear
    English while preserving the association of the body with death. The demonstrative
    force is carried by 'this body' in the whole phrase.
