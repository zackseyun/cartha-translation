theological_decisions:
- issue: Whether νόμον refers to the Mosaic Law or to a governing principle/pattern
  chosen_reading: Rendered as 'law' in the main text while allowing the contextual
    sense of a principle.
  alternative_readings:
  - principle
  - rule
  rationale: Paul's wording intentionally echoes νόμος language, and translating it
    as 'law' preserves that resonance without over-resolving the interpretive question.
    Because English readers may hear 'Mosaic Law' too narrowly, the alternative is
    preserved in a footnote.
