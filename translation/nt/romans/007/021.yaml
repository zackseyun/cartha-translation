id: ROM.7.21
reference: Romans 7:21
source:
  edition: SBLGNT
  text: Εὑρίσκω ἄρα τὸν νόμον τῷ θέλοντι ἐμοὶ ποιεῖν τὸ καλὸν ὅτι ἐμοὶ τὸ κακὸν παράκειται·
translation:
  text: 'So I find this law: when I want to do what is good, evil lies close at hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'principle' or 'rule.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὑρίσκω
  chosen: I find
  alternatives:
  - I discover
  lexicon: BDAG
  rationale: Present tense is naturally rendered as a present English statement of
    ongoing recognition.
- source_word: ἄρα
  chosen: So
  alternatives:
  - then
  - therefore
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'So' is natural modern
    English.
- source_word: νόμον
  chosen: law
  alternatives:
  - principle
  - rule
  lexicon: BDAG
  rationale: The Greek uses νόμος, so the main text preserves 'law.' In this context
    Paul may mean a governing principle rather than the Mosaic Law, but retaining
    'law' best preserves the wording and tension.
- source_word: τῷ θέλοντι ἐμοὶ ποιεῖν τὸ καλὸν
  chosen: when I want to do what is good
  alternatives:
  - for me, wanting to do the good
  - to me who wants to do the good
  lexicon: BDAG
  rationale: The dative construction is awkward if carried over woodenly; 'when I
    want to do what is good' expresses the sense in clear English while preserving
    the volitional force of θέλω and the infinitive phrase.
- source_word: τὸ καλὸν
  chosen: what is good
  alternatives:
  - the good
  - good
  lexicon: BDAG
  rationale: English idiom prefers 'what is good' here over the more wooden 'the good.'
- source_word: τὸ κακὸν
  chosen: evil
  alternatives:
  - what is evil
  - the evil
  lexicon: BDAG
  rationale: The substantival adjective is best rendered simply as 'evil' in this
    context.
- source_word: παράκειται
  chosen: lies close at hand
  alternatives:
  - is present with me
  - lies beside me
  lexicon: BDAG
  rationale: This conveys the sense of something lying near or being readily present,
    with idiomatic English force.
