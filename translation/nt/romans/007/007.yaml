theological_decisions:
- issue: Relationship between the law and sin
  chosen_reading: Is the law sin? May it never be!
  alternative_readings:
  - Is the law sinful?
  rationale: The Greek predicate noun asks whether the law is to be identified with
    sin, not merely whether it possesses a sinful quality. The chosen rendering preserves
    Paul's sharper formulation without softening the theological contrast.
