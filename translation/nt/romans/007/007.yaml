id: ROM.7.7
reference: Romans 7:7
source:
  edition: SBLGNT
  text: Τί οὖν ἐροῦμεν; ὁ νόμος ἁμαρτία; μὴ γένοιτο· ἀλλὰ τὴν ἁμαρτίαν οὐκ ἔγνων εἰ
    μὴ διὰ νόμου, τήν τε γὰρ ἐπιθυμίαν οὐκ ᾔδειν εἰ μὴ ὁ νόμος ἔλεγεν· Οὐκ ἐπιθυμήσεις·
translation:
  text: What then shall we say? Is the law sin? May it never be! On the contrary,
    I would not have known sin except through the law. For I would not have known
    coveting if the law had not said, "You shall not covet."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desire' for 'coveting' (ἐπιθυμία), but the immediate citation of the
      commandment favors the more specific sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  chosen: What then shall we say?
  alternatives:
  - What then are we to say?
  - What then do we say?
  rationale: Keeps Paul's rhetorical-transition formula in natural but still fairly
    formal English.
- source_word: ὁ νόμος
  chosen: the law
  alternatives:
  - Law
  rationale: Standard rendering for νόμος in Pauline argument; the article supports
    the definite form, referring to the Mosaic law in context.
- source_word: ἁμαρτία
  chosen: sin
  rationale: The predicate noun is qualitative and theological; 'sin' is the direct
    and established equivalent.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Certainly not!
  - By no means!
  rationale: Preserves the forceful repudiation of Paul's idiom with strong English.
    This is more emphatic than a flat 'no.'
- source_word: ἀλλὰ
  chosen: On the contrary
  alternatives:
  - But
  rationale: Signals a strong corrective contrast after Paul's denial, matching the
    argumentative flow.
- source_word: τὴν ἁμαρτίαν οὐκ ἔγνων εἰ μὴ διὰ νόμου
  chosen: I would not have known sin except through the law
  alternatives:
  - I did not know sin except through the law
  - I would not have recognized sin except through the law
  lexicon: BDAG
  rationale: The counterfactual construction with εἰ μὴ is naturally conveyed in English
    with 'would not have known.' 'Known' is preferred over 'recognized' for simplicity
    and closer lexical continuity.
- source_word: ἐπιθυμίαν
  chosen: coveting
  alternatives:
  - desire
  - covetous desire
  lexicon: BDAG
  rationale: Because Paul immediately cites the command 'You shall not covet,' the
    noun is best rendered specifically as 'coveting' rather than the broader 'desire.'
- source_word: οὐκ ᾔδειν
  chosen: I would not have known
  alternatives:
  - I would not have understood
  lexicon: BDAG
  rationale: Keeps the verbal idea parallel with the previous clause while remaining
    natural in English, even though the Greek verb differs from ἔγνων.
- source_word: Οὐκ ἐπιθυμήσεις
  chosen: You shall not covet
  alternatives:
  - Do not covet
  rationale: Matches the wording of the commandment in idiomatic formal English and
    preserves its prohibitive legal force.
