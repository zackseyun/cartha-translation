id: ROM.7.9
reference: Romans 7:9
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἔζων χωρὶς νόμου ποτέ· ἐλθούσης δὲ τῆς ἐντολῆς ἡ ἁμαρτία ἀνέζησεν,
translation:
  text: Now I was once alive apart from the law, but when the commandment came, sin
    came to life,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sin revived.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔζων
  chosen: was ... alive
  alternatives:
  - lived
  lexicon: BDAG
  rationale: Rendered with predicate sense ('was alive') rather than merely 'lived'
    to preserve the life/death contrast developed in the immediate context.
- source_word: χωρὶς νόμου
  chosen: apart from the law
  alternatives:
  - without law
  - apart from law
  lexicon: BDAG
  rationale: Used 'the law' for natural English and likely reference to the Mosaic
    law in Pauline usage, while preserving the separative force of χωρίς.
- source_word: ποτέ
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: Concise temporal adverb that fits Paul's retrospective statement in clear
    modern English.
- source_word: ἐλθούσης ... τῆς ἐντολῆς
  chosen: when the commandment came
  alternatives:
  - when the commandment arrived
  - with the coming of the commandment
  lexicon: BDAG
  rationale: Restructured the genitive absolute into natural English temporal syntax
    while preserving the event-like force of the construction.
- source_word: ἐντολῆς
  chosen: the commandment
  alternatives:
  - the command
  lexicon: BDAG
  rationale: '''Commandment'' better matches Pauline and biblical diction, especially
    in relation to νόμος and the following context.'
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Kept the singular personified 'sin,' consistent with Paul's usage in
    Romans 7.
- source_word: ἀνέζησεν
  chosen: came to life
  alternatives:
  - revived
  - sprang to life
  lexicon: BDAG
  rationale: This preserves the metaphorical animation of personified sin in readable
    English. 'Revived' is possible, but 'came to life' is clearer for modern readers
    without overstating prior literal life.
