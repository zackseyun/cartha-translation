theological_decisions:
- issue: Whether to make Paul's statement explicitly autobiographical, representative,
    or salvation-historical
  chosen_reading: Retained the simple first-person wording without interpretive expansion.
  alternative_readings:
  - A strictly autobiographical statement about Paul's own experience
  - A representative statement speaking as Israel or humanity under the law
  rationale: The Greek itself does not resolve the larger interpretive question in
    this verse alone, so the translation preserves the ambiguity rather than importing
    a doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
