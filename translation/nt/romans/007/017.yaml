theological_decisions:
- issue: Paul's distinction between 'I' and 'sin dwelling in me' can be misread as
    evading responsibility.
  chosen_reading: Retain the text's stark distinction without explanatory smoothing.
  alternative_readings:
  - Paraphrasing to emphasize inner conflict rather than agency
  - Expanding the clause to avoid misunderstanding
  rationale: The doctrine excerpt requires preserving theological tension rather than
    resolving it. The verse itself presents the distinction sharply, so the translation
    should do the same.
  doctrine_reference: Preserve theological tension rather than resolve it.
