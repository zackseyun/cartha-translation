id: ROM.7.17
reference: Romans 7:17
source:
  edition: SBLGNT
  text: νυνὶ δὲ οὐκέτι ἐγὼ κατεργάζομαι αὐτὸ ἀλλὰ ἡ ⸀οἰκοῦσα ἐν ἐμοὶ ἁμαρτία.
translation:
  text: But now I am no longer the one doing it, but sin dwelling in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it is no longer I who do it, but the sin that dwells in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - So now
  - Now then
  lexicon: BDAG
  rationale: Marks a logical and temporal transition from the preceding argument;
    'But now' preserves the contrast naturally in English.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: This directly conveys cessation or disassociation and fits Paul's contrastive
    structure.
- source_word: ἐγὼ
  chosen: I am no longer the one
  alternatives:
  - I
  - it is no longer I
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. Rendering it with 'the one'
    brings that emphasis into idiomatic English without sounding wooden.
- source_word: κατεργάζομαι
  chosen: doing
  alternatives:
  - carrying out
  - producing
  - accomplishing
  lexicon: BDAG
  rationale: In this context, the verb refers to the commission of the act under discussion.
    'Doing' is the clearest natural English choice, while 'carrying out' is possible
    but heavier.
- source_word: αὐτὸ
  chosen: it
  alternatives:
  - this
  lexicon: BDAG
  rationale: The pronoun points back to the act already mentioned in context. 'It'
    is the most direct and natural English rendering.
- source_word: ἡ οἰκοῦσα ἐν ἐμοὶ ἁμαρτία
  chosen: sin dwelling in me
  alternatives:
  - the sin that dwells in me
  - sin living in me
  lexicon: BDAG
  rationale: This keeps the participial force and preserves Paul's vivid personification
    of sin. Omitting the article in English makes the clause more natural while retaining
    the sense.
- source_word: οἰκοῦσα
  chosen: dwelling
  alternatives:
  - living
  - residing
  lexicon: BDAG
  rationale: '''Dwelling'' preserves the metaphorical and somewhat weightier tone
    of the Greek better than the more casual ''living''.'
