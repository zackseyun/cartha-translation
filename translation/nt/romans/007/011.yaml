id: ROM.7.11
reference: Romans 7:11
source:
  edition: SBLGNT
  text: ἡ γὰρ ἁμαρτία ἀφορμὴν λαβοῦσα διὰ τῆς ἐντολῆς ἐξηπάτησέν με καὶ δι’ αὐτῆς
    ἀπέκτεινεν.
translation:
  text: For sin, having seized an opportunity through the commandment, deceived me
    and through it killed me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having taken occasion.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'it' refers to 'the commandment.'
    reason: cross_reference
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this verse to the previous statement
    in a natural English way.
- source_word: ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Standard Pauline usage treats sin as an active power here; 'sin' preserves
    both the lexical sense and the personified force of the subject.
- source_word: ἀφορμὴν λαβοῦσα
  chosen: having seized an opportunity
  alternatives:
  - having taken opportunity
  - having taken occasion
  lexicon: BDAG
  rationale: This participial expression means to take or exploit an occasion/opening.
    'Seized an opportunity' is idiomatic English and preserves sin's aggressive agency
    better than the flatter 'having taken occasion.'
- source_word: διὰ τῆς ἐντολῆς
  chosen: through the commandment
  alternatives:
  - by means of the commandment
  lexicon: BDAG
  rationale: '''Through'' naturally conveys instrumentality while keeping the singular
    ''commandment'' required by the Greek.'
- source_word: ἐξηπάτησέν
  chosen: deceived
  alternatives:
  - thoroughly deceived
  - led astray
  lexicon: BDAG
  rationale: The verb means to deceive thoroughly or lead astray. 'Deceived' is the
    clearest base rendering in modern English; the intensified nuance is better left
    implicit than overstated.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct personal object should remain explicit and unembellished.
- source_word: δι’ αὐτῆς
  chosen: through it
  alternatives:
  - through the commandment
  - by it
  lexicon: BDAG
  rationale: The pronoun refers back to the feminine singular 'commandment.' 'Through
    it' is concise, accurate, and avoids unnecessary repetition while preserving the
    instrumental sense.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: '''Killed'' is the most natural modern equivalent. ''Put to death'' can
    sound overly juridical here, while the context already conveys the lethal effect
    of sin through the commandment.'
