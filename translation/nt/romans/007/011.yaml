theological_decisions:
- issue: Degree of personification in Paul's portrayal of sin
  chosen_reading: Render sin as an active personal-like agent without adding interpretive
    wording beyond the Greek.
  alternative_readings:
  - Soften the agency into an abstract force by using less vivid phrasing.
  rationale: Paul makes sin the grammatical subject of consecutive actions ('having
    seized,' 'deceived,' 'killed'). The translation preserves this theological and
    rhetorical tension without inserting explanatory paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
