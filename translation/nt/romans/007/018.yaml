theological_decisions:
- issue: Rendering of σάρξ in a morally charged Pauline context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: The doctrine excerpt marks σάρξ as context-dependent and requires preserving
    theological tension rather than resolving ambiguity prematurely. In Romans 7:18,
    'flesh' allows Paul's own formulation to stand without importing a fuller doctrinal
    paraphrase into the text.
  doctrine_reference: 'Contested terms table: σάρξ → flesh (literal) / sinful nature
    (metaphorical)'
