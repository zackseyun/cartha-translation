id: ROM.7.18
reference: Romans 7:18
source:
  edition: SBLGNT
  text: οἶδα γὰρ ὅτι οὐκ οἰκεῖ ἐν ἐμοί, τοῦτ’ ἔστιν ἐν τῇ σαρκί μου, ἀγαθόν· τὸ γὰρ
    θέλειν παράκειταί μοι, τὸ δὲ κατεργάζεσθαι τὸ καλὸν ⸀οὔ·
translation:
  text: For I know that nothing good dwells in me—that is, in my flesh. For the willing
    is present with me, but the doing of the good is not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "sinful nature" for "flesh."
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: The perfect-form verb functions with present sense here; 'I know' is
    the natural and standard English equivalent.
- source_word: οἰκεῖ
  chosen: dwells
  alternatives:
  - lives
  - resides
  lexicon: BDAG
  rationale: '''Dwells'' preserves the metaphor of indwelling and fits Paul''s rhetorical
    style better than the flatter ''lives'' or more formal ''resides''.'
- source_word: ἀγαθόν
  chosen: nothing good
  alternatives:
  - good
  lexicon: BDAG
  rationale: Because οὐκ negates the clause and ἀγαθόν is anarthrous neuter singular
    used substantivally, idiomatic English requires 'nothing good' rather than the
    less natural 'good does not dwell.'
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine defaults, σάρξ may be rendered 'flesh' literally or 'sinful
    nature' metaphorically. Here Paul himself appositionally clarifies 'in me, that
    is, in my flesh,' and retaining 'flesh' preserves his wording and the theological
    tension rather than resolving it into an interpretation.
- source_word: θέλειν
  chosen: the willing
  alternatives:
  - to will
  - the desire
  lexicon: BDAG
  rationale: The articular infinitive is substantival. 'The willing' best mirrors
    Paul's abstraction while remaining understandable. 'The desire' is smoother but
    slightly interpretive.
- source_word: παράκειταί μοι
  chosen: is present with me
  alternatives:
  - lies near me
  - is at hand for me
  lexicon: BDAG
  rationale: This conveys availability or proximity in idiomatic English. 'Is present
    with me' preserves the personal dative μοι and the sense that the willing is close
    at hand.
- source_word: κατεργάζεσθαι
  chosen: the doing
  alternatives:
  - to accomplish
  - to carry out
  lexicon: BDAG
  rationale: As with θέλειν, the infinitive is substantival. 'The doing' keeps the
    parallel structure between willing and doing; 'to carry out' is a valid sense
    but would disrupt that balance.
- source_word: τὸ καλόν
  chosen: the good
  alternatives:
  - what is good
  - the noble thing
  lexicon: BDAG
  rationale: The article plus adjective is substantival. 'The good' is concise and
    preserves the moral category Paul invokes; 'what is good' is possible but less
    formally parallel.
- source_word: οὔ
  chosen: is not
  alternatives:
  - is not present
  - is absent
  lexicon: BDAG
  rationale: The final negative is elliptical. Supplying 'is' in English is necessary,
    and a minimal completion best reflects the Greek's terse style.
