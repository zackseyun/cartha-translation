id: ROM.7.15
reference: Romans 7:15
source:
  edition: SBLGNT
  text: ὃ γὰρ κατεργάζομαι οὐ γινώσκω· οὐ γὰρ ὃ θέλω τοῦτο πράσσω, ἀλλ’ ὃ μισῶ τοῦτο
    ποιῶ.
translation:
  text: For I do not understand what I am doing, because I do not practice what I
    want; instead, I do the very thing I hate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For I do not know/recognize what I am doing.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I do not do what I want.' The Greek uses different verbs in the two
      clauses ('practice' / 'do'), which may or may not be stylistically significant.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεργάζομαι
  chosen: am doing
  alternatives:
  - am accomplishing
  - am carrying out
  - am producing
  lexicon: BDAG
  rationale: In this context the verb refers to Paul's actual conduct or enacted behavior.
    'Am doing' is natural English and fits the contrast with πράσσω and ποιῶ, while
    avoiding a stilted rendering like 'am accomplishing.'
- source_word: γινώσκω
  chosen: understand
  alternatives:
  - know
  - recognize
  - approve
  lexicon: BDAG
  rationale: The sense here is not mere awareness but failure to comprehend his own
    behavior. 'Understand' communicates that tension clearly in modern English. 'Approve'
    is possible interpretively, but it is narrower than the plain lexical sense and
    so is kept out of the main text.
- source_word: πράσσω
  chosen: practice
  alternatives:
  - do
  - carry out
  lexicon: BDAG
  rationale: Using 'practice' helps preserve a distinction from ποιῶ later in the
    verse and suggests ongoing or enacted behavior rather than a single abstract action.
    This reflects the flow of Paul's contrast without overtranslating.
- source_word: ποιῶ
  chosen: do
  alternatives:
  - perform
  - carry out
  lexicon: BDAG
  rationale: A simple verb is best here. Since πράσσω is rendered 'practice,' translating
    ποιῶ as 'do' preserves a modest English distinction between the two Greek verbs
    while remaining idiomatic.
- source_word: θέλω
  chosen: want
  alternatives:
  - will
  - desire
  lexicon: BDAG
  rationale: '''Want'' is clear, natural modern English and accurately expresses volition
    here without sounding overly formal.'
- source_word: μισῶ
  chosen: hate
  alternatives:
  - detest
  - reject
  lexicon: BDAG
  rationale: The verb is strong and should remain strong in English. 'Hate' preserves
    the force of Paul's moral revulsion.
- source_word: γάρ
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: The conjunction is explanatory. 'Because' communicates the logical relationship
    more clearly in contemporary English than repeating 'for,' while staying faithful
    to the sense.
- source_word: ἀλλά
  chosen: instead
  alternatives:
  - but
  lexicon: BDAG
  rationale: '''Instead'' makes the contrast especially clear in modern English prose.
    It preserves the adversative force of ἀλλά without wooden repetition.'
- source_word: ὃ ... τοῦτο
  chosen: what ... the very thing
  alternatives:
  - that which ... this
  - what ... that
  lexicon: Greek grammar
  rationale: The correlative structure is emphatic. Rendering the final pair as 'the
    very thing' brings out the emphasis naturally in English.
