theological_decisions:
- issue: Rendering Χριστοῦ in Pauline discourse
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The noun functions as a title connected to covenantal and redemptive
    themes, not merely as a fixed proper name. Rendering it 'Messiah' preserves that
    meaning and aligns with the project's default policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Preserving the relational/marital metaphor in εἰς τὸ γενέσθαι ὑμᾶς ἑτέρῳ
  chosen_reading: so that you might belong to another
  alternative_readings:
  - so that you might be joined to another
  - so that you might become another's
  rationale: Paul's argument in context compares release from the law to the ending
    of a marriage bond by death. 'Belong to another' communicates the covenantal transfer
    clearly while preserving the metaphor's force.
