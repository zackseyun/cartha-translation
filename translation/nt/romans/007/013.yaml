id: ROM.7.13
reference: Romans 7:13
source:
  edition: SBLGNT
  text: Τὸ οὖν ἀγαθὸν ἐμοὶ ⸀ἐγένετο θάνατος; μὴ γένοιτο· ἀλλὰ ἡ ἁμαρτία, ἵνα φανῇ
    ἁμαρτία διὰ τοῦ ἀγαθοῦ μοι κατεργαζομένη θάνατον· ἵνα γένηται καθ’ ὑπερβολὴν ἁμαρτωλὸς
    ἡ ἁμαρτία διὰ τῆς ἐντολῆς.
translation:
  text: So then, did what is good become death to me? May it never be! Rather, it
    was sin, so that it might be shown to be sin by producing death in me through
    what is good, in order that through the commandment sin might become exceedingly
    sinful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that sin might appear as sin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through the commandment sin might become sinful beyond measure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ ... ἀγαθὸν
  chosen: what is good
  alternatives:
  - the good thing
  - the good
  lexicon: BDAG
  rationale: Substantival neuter adjective; 'what is good' is natural English while
    preserving the abstract/substantival force.
- source_word: ἐμοὶ
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: Dative of personal reference; 'to me' fits the rhetorical question idiomatically
    in English.
- source_word: ἐγένετο θάνατος
  chosen: become death
  alternatives:
  - became death
  - resulted in death
  lexicon: BDAG
  rationale: Keeps the predicative sense of γίνομαι with θάνατος rather than paraphrasing
    more dynamically.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - By no means!
  - Certainly not!
  lexicon: BDAG
  rationale: Standard emphatic repudiation in Paul; this rendering is strong and idiomatic
    without sounding archaic.
- source_word: ἡ ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Personified but still abstract; English can preserve the personification
    simply with 'sin'.
- source_word: ἵνα φανῇ ἁμαρτία
  chosen: so that it might be shown to be sin
  alternatives:
  - so that sin might appear as sin
  - so that it might be revealed as sin
  lexicon: BDAG
  rationale: Makes explicit the predicate force implied by the repeated noun and preserves
    Paul's purpose clause.
- source_word: διὰ τοῦ ἀγαθοῦ
  chosen: through what is good
  alternatives:
  - through the good
  - by means of what is good
  lexicon: BDAG
  rationale: Matches the earlier substantival neuter and preserves the instrumental
    διά construction.
- source_word: μοι κατεργαζομένη θάνατον
  chosen: by producing death in me
  alternatives:
  - working death in me
  - bringing about death for me
  lexicon: BDAG
  rationale: κατεργάζομαι here denotes effecting or producing a result; 'producing
    death in me' is clear modern English and retains the participial sense.
- source_word: ἵνα γένηται
  chosen: in order that ... might become
  alternatives:
  - so that ... might become
  lexicon: BDAG
  rationale: Maintains the second purpose clause and the force of γίνομαι.
- source_word: καθ’ ὑπερβολὴν
  chosen: exceedingly
  alternatives:
  - beyond measure
  - utterly
  - to an extraordinary degree
  lexicon: BDAG
  rationale: Adverbial idiom expressing excess; 'exceedingly' is concise and preserves
    intensity.
- source_word: ἁμαρτωλὸς
  chosen: sinful
  alternatives:
  - sinful beyond measure
  lexicon: BDAG
  rationale: Natural adjectival rendering paired with 'exceedingly'; avoids overloading
    the clause while preserving Paul's intensification.
- source_word: διὰ τῆς ἐντολῆς
  chosen: through the commandment
  alternatives:
  - through the command
  lexicon: BDAG
  rationale: ἐντολή in this context refers to the commandment associated with the
    law; 'commandment' best preserves Pauline diction.
