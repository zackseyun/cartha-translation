theological_decisions:
- issue: Paul's rhetorical defense of the goodness of the law/commandment
  chosen_reading: The verse denies that 'what is good' itself became death, and instead
    attributes the death-producing work to sin operating through the good commandment.
  alternative_readings:
  - A looser rendering could imply the commandment itself caused death in a morally
    culpable sense.
  rationale: The Greek contrast after μὴ γένοιτο places responsibility on sin, not
    on the good thing itself. The translation preserves that theological tension and
    agency structure without softening sin's role.
  doctrine_reference: Preserve theological tension rather than resolve it.
