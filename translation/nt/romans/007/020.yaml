id: ROM.7.20
reference: Romans 7:20
source:
  edition: SBLGNT
  text: εἰ δὲ ὃ οὐ ⸀θέλω τοῦτο ποιῶ, οὐκέτι ἐγὼ κατεργάζομαι αὐτὸ ἀλλὰ ἡ οἰκοῦσα ἐν
    ἐμοὶ ἁμαρτία.
translation:
  text: But if I do what I do not want, I am no longer the one accomplishing it, but
    sin dwelling in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am no longer the one doing it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - If however
  lexicon: BDAG
  rationale: Carries forward Paul's conditional argument with mild contrast; 'But
    if' is natural English and preserves the discourse shift.
- source_word: ὃ οὐ θέλω τοῦτο ποιῶ
  chosen: I do what I do not want
  alternatives:
  - I practice what I do not want
  - I do this very thing that I do not want
  lexicon: BDAG
  rationale: Uses clear modern English while preserving the relative-correlative structure
    in idiomatic form. 'Do' fits ποιῶ well here without overcomplicating the clause.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Standard temporal/logical sense; 'no longer' is the most natural modern
    equivalent.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English can usually convey this
    without 'myself.' The emphasis is adequately preserved by word order and contrast.
- source_word: κατεργάζομαι
  chosen: accomplishing
  alternatives:
  - doing
  - working out
  - producing
  lexicon: BDAG
  rationale: Chosen to distinguish κατεργάζομαι from the earlier ποιῶ rather than
    flatten both to the same English verb. 'Accomplishing' preserves the sense of
    effecting or bringing about the action.
- source_word: αὐτὸ
  chosen: it
  alternatives:
  - this
  lexicon: BDAG
  rationale: Straightforward pronominal reference back to the unwanted action.
- source_word: ἡ οἰκοῦσα ἐν ἐμοὶ ἁμαρτία
  chosen: sin dwelling in me
  alternatives:
  - the sin that dwells in me
  - sin living in me
  lexicon: BDAG
  rationale: Retains the participial force of οἰκοῦσα and preserves Paul's personified
    description of sin without overexpansion. 'Dwelling' is slightly more formal and
    stable than 'living' here.
