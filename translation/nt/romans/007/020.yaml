theological_decisions:
- issue: Whether Paul's statement should be rendered in a way that lessens personal
    agency or turns 'sin' into a mere abstraction.
  chosen_reading: Translate the clause straightforwardly as Paul's rhetorical distinction
    between 'I' and 'sin dwelling in me,' without softening either element.
  alternative_readings:
  - Render more paraphrastically to explain the theology of indwelling sin
  - Translate 'sinful nature' instead of 'sin'
  rationale: The Greek names ἁμαρτία directly, not σάρξ, and the translation should
    preserve the tension of Paul's wording rather than resolve debated theological
    implications.
  doctrine_reference: Preserve theological tension rather than resolve it.
