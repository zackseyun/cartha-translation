theological_decisions:
- issue: Whether to soften Paul’s personification of sin or explain “dead” interpretively
  chosen_reading: Retain the personification (“sin, seizing… produced… sin is dead”)
    and preserve “dead” as metaphorical language.
  alternative_readings:
  - Interpret sin more abstractly
  - Render νεκρά as “inactive” in the main text
  rationale: The Greek presents sin as an acting power and uses vivid metaphor. Preserving
    that tension matches the translation philosophy of not resolving theological imagery
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
