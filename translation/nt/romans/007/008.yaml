id: ROM.7.8
reference: Romans 7:8
source:
  edition: SBLGNT
  text: ἀφορμὴν δὲ λαβοῦσα ἡ ἁμαρτία διὰ τῆς ἐντολῆς κατειργάσατο ἐν ἐμοὶ πᾶσαν ἐπιθυμίαν,
    χωρὶς γὰρ νόμου ἁμαρτία νεκρά.
translation:
  text: But sin, seizing an opportunity through the commandment, produced in me every
    kind of coveting. For apart from the law, sin is dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “every desire”; in this context the sense is specifically coveting.
    reason: lexical_alternative
  - marker: b
    text: Or “taking an occasion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφορμήν
  chosen: opportunity
  alternatives:
  - occasion
  - base of operations
  lexicon: BDAG
  rationale: In this context Paul depicts sin as exploiting the commandment as a launching
    point. “Opportunity” is natural English and preserves the idea of a seized advantage
    without over-paraphrasing.
- source_word: λαβοῦσα
  chosen: seizing
  alternatives:
  - taking
  - having taken
  lexicon: BDAG
  rationale: The participle is aorist and antecedent to the main verb. “Seizing” conveys
    the active, opportunistic force in idiomatic English while fitting the metaphor
    begun by ἀφορμήν.
- source_word: ἡ ἁμαρτία
  chosen: sin
  lexicon: BDAG
  rationale: Paul personifies sin here, but English can preserve that personification
    simply with “sin” as the grammatical subject.
- source_word: διὰ τῆς ἐντολῆς
  chosen: through the commandment
  alternatives:
  - through the command
  lexicon: BDAG
  rationale: The singular likely points to the specific commandment just cited in
    the context, while still representing the commandment as the means sin exploits.
- source_word: κατειργάσατο
  chosen: produced
  alternatives:
  - worked out
  - brought about
  lexicon: BDAG
  rationale: The verb denotes effecting or producing a result. “Produced” is clear,
    direct, and suitably strong in modern English.
- source_word: πᾶσαν ἐπιθυμίαν
  chosen: every kind of coveting
  alternatives:
  - all kinds of desire
  - every desire
  lexicon: BDAG
  rationale: Because the immediate context is the commandment against coveting, rendering
    ἐπιθυμία here as “coveting” best reflects the local sense. “Every kind of” brings
    out πᾶσαν idiomatically in English.
- source_word: χωρὶς γὰρ νόμου
  chosen: For apart from the law
  alternatives:
  - For without law
  - For apart from law
  lexicon: BDAG
  rationale: “Apart from the law” is idiomatic English for χωρὶς νόμου and preserves
    Paul’s explanatory force introduced by γάρ.
- source_word: νεκρά
  chosen: dead
  alternatives:
  - inactive
  lexicon: BDAG
  rationale: The predicate adjective should remain “dead,” preserving Paul’s stark
    metaphor rather than interpreting it away as mere inactivity.
