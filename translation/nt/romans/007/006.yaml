id: ROM.7.6
reference: Romans 7:6
source:
  edition: SBLGNT
  text: νυνὶ δὲ κατηργήθημεν ἀπὸ τοῦ νόμου, ἀποθανόντες ἐν ᾧ κατειχόμεθα, ὥστε δουλεύειν
    ἡμᾶς ἐν καινότητι πνεύματος καὶ οὐ παλαιότητι γράμματος.
translation:
  text: But now we have been released from the law, having died to what held us, so
    that we serve in newness of the Spirit and not in oldness of the letter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “having died to that by which we were bound.”
    reason: lexical_alternative
  - marker: b
    text: Or “in newness of spirit.”
    reason: alternative_reading
  - marker: c
    text: Or “not in oldness of the written code.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηργήθημεν
  chosen: have been released
  alternatives:
  - were discharged
  - were set free
  - were nullified in relation to
  lexicon: BDAG
  rationale: In this context with ἀπὸ τοῦ νόμου, the passive conveys being released
    from the law’s binding claim, not that the law ceased to exist. “Have been released”
    is natural English and preserves the relational force.
- source_word: νόμου
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: Paul’s reference is to the Mosaic law in context. Lowercase “law” keeps
    the English readable while preserving the referent.
- source_word: ἀποθανόντες
  chosen: having died
  alternatives:
  - after dying
  lexicon: BDAG
  rationale: The aorist participle is best carried by “having died,” preserving the
    sequence and Paul’s claim that we, not the law, are the ones who died.
- source_word: ἐν ᾧ κατειχόμεθα
  chosen: to what held us
  alternatives:
  - to that in which we were held
  - to that by which we were bound
  lexicon: BDAG
  rationale: This compresses an awkward Greek construction into clear English while
    preserving the sense of prior bondage. “What held us” reflects κατέχω as being
    held fast or bound.
- source_word: δουλεύειν
  chosen: serve
  alternatives:
  - be enslaved
  - render service
  lexicon: BDAG
  rationale: Although δουλεύω can carry slave imagery, here the emphasis is on manner
    of service in contrast with old covenant existence. “Serve” is the most idiomatic
    fit in this clause.
- source_word: καινότητι
  chosen: newness
  alternatives:
  - new way
  lexicon: BDAG
  rationale: “Newness” preserves Paul’s abstract noun and his deliberate contrast
    with παλαιότης. It is slightly formal, but still readable and more textually precise
    than paraphrastic alternatives.
- source_word: πνεύματος
  chosen: the Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In Pauline contrast with γράμματος, the reference is best taken as the
    Holy Spirit’s new-covenant work, not merely an inward human disposition. The alternative
    remains possible and is preserved in a footnote.
- source_word: παλαιότητι
  chosen: oldness
  alternatives:
  - old way
  lexicon: BDAG
  rationale: Keeping “oldness” matches the form of “newness” and preserves the rhetorical
    symmetry of the Greek.
- source_word: γράμματος
  chosen: the letter
  alternatives:
  - the written code
  lexicon: BDAG
  rationale: “The letter” is the more direct rendering and preserves Paul’s idiom.
    A more interpretive gloss like “written code” is possible but not required in
    the main text.
