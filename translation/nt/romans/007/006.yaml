theological_decisions:
- issue: Whether Paul says the law died or believers died in relation to the law
  chosen_reading: 'Believers are the ones who died: “having died to what held us.”'
  alternative_readings:
  - The law died in relation to us
  rationale: The participle ἀποθανόντες is nominative plural and refers to the implied
    subject “we.” The translation preserves Paul’s grammar and avoids importing the
    alternate idea into the main text.
- issue: Whether πνεύματος refers to the Holy Spirit or the human spirit
  chosen_reading: “the Spirit”
  alternative_readings:
  - “spirit”
  rationale: Given the Pauline contrast between Spirit and letter and the new-covenant
    context, the Holy Spirit is the more likely referent. Because the phrase can be
    read more generally, the alternative is preserved in a footnote.
