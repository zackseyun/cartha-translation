id: ROM.7.14
reference: Romans 7:14
source:
  edition: SBLGNT
  text: Οἴδαμεν γὰρ ὅτι ὁ νόμος πνευματικός ἐστιν· ἐγὼ δὲ ⸀σάρκινός εἰμι, πεπραμένος
    ὑπὸ τὴν ἁμαρτίαν.
translation:
  text: For we know that the law is spiritual, but I am fleshly, sold under sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sold as a slave under sin,' that is, under the power of sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  chosen: we know
  alternatives:
  - we understand
  lexicon: BDAG
  rationale: The verb denotes settled knowledge shared by Paul and his audience; 'we
    know' is the most natural and direct English rendering.
- source_word: νόμος
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: '''The law'' preserves the Greek wording without over-specifying in the
    translation itself; in Romans this often refers to the Mosaic law, but lowercase
    best preserves the sentence''s immediate lexical form.'
- source_word: πνευματικός
  chosen: spiritual
  alternatives:
  - of the Spirit
  - spiritually characterized
  lexicon: BDAG
  rationale: '''Spiritual'' is the standard and most transparent equivalent here,
    expressing that the law belongs to or accords with the sphere and character of
    the Spirit rather than merely external fleshliness.'
- source_word: σάρκινός
  chosen: fleshly
  alternatives:
  - of the flesh
  - unspiritual
  lexicon: BDAG
  rationale: The adjective is not σάρξ itself but the cognate adjective meaning 'made
    of flesh' or 'fleshly.' 'Fleshly' preserves the contrast with 'spiritual' and
    avoids importing the more interpretive phrase 'sinful nature,' which goes beyond
    the Greek.
- source_word: πεπραμένος
  chosen: sold
  alternatives:
  - sold as a slave
  - having been sold
  lexicon: BDAG
  rationale: The perfect passive participle conveys a resulting state of being sold.
    'Sold' is concise and preserves the metaphor; the slavery nuance is real but left
    for the footnote so the main text remains transparent to the Greek wording.
- source_word: ὑπὸ τὴν ἁμαρτίαν
  chosen: under sin
  alternatives:
  - under the power of sin
  - to sin
  lexicon: BDAG
  rationale: '''Under sin'' closely follows the Greek and preserves Paul''s compact
    expression of subjection without prematurely expanding it into a full interpretive
    paraphrase.'
