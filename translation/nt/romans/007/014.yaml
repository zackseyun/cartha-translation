theological_decisions:
- issue: How strongly to interpret Paul's flesh-language
  chosen_reading: Retain 'fleshly' in the main text rather than 'sinful' or 'having
    a sinful nature.'
  alternative_readings:
  - sinful
  - of a sinful nature
  - unspiritual
  rationale: The doctrine guidelines prefer 'flesh' language where possible and require
    context-specific documentation when a more interpretive rendering is considered.
    Here the contrast with 'spiritual' is preserved without resolving Paul's anthropology
    into a later doctrinal formula.
  doctrine_reference: 'Contested terms: σάρξ → flesh (literal) / sinful nature (metaphorical)'
