theological_decisions:
- issue: Scope of νόμος in the analogy
  chosen_reading: Rendered as 'the law' in the main text, with the immediate referent
    understood as the marriage-binding legal principle rather than a broad doctrinal
    statement about Mosaic law in general.
  alternative_readings:
  - the marriage law
  - law in a broader Pauline sense
  rationale: The immediate context is the legal status of a married woman relative
    to her husband’s life or death. Keeping 'the law' preserves Paul’s wording while
    avoiding over-interpretation in translation.
