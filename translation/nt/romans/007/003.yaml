id: ROM.7.3
reference: Romans 7:3
source:
  edition: SBLGNT
  text: ἄρα οὖν ζῶντος τοῦ ἀνδρὸς μοιχαλὶς χρηματίσει ἐὰν γένηται ἀνδρὶ ἑτέρῳ· ἐὰν
    δὲ ἀποθάνῃ ὁ ἀνήρ, ἐλευθέρα ἐστὶν ἀπὸ τοῦ νόμου, τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα
    γενομένην ἀνδρὶ ἑτέρῳ.
translation:
  text: So then, while her husband is living, she will be called an adulteress if
    she becomes another man’s wife. But if the husband dies, she is free from the
    law, so that she is not an adulteress if she becomes another man’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if she belongs to another man' or 'if she is joined to another man.'
    reason: lexical_alternative
  - marker: b
    text: '''The law'' here refers immediately to the legal bond governing the marriage
      relationship.'
    reason: cultural_note
lexical_decisions:
- source_word: ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Accordingly
  rationale: The paired inferential particles mark a conclusion drawn from the preceding
    analogy. 'So then' preserves the connective force in natural modern English without
    sounding overly formal.
- source_word: ζῶντος τοῦ ἀνδρός
  chosen: while her husband is living
  alternatives:
  - while the husband is alive
  - with the husband living
  rationale: This genitive absolute expresses contemporaneous circumstance. 'While
    her husband is living' communicates the temporal sense clearly. 'Her' is supplied
    in English from the context of the married woman under discussion.
- source_word: μοιχαλὶς
  chosen: adulteress
  alternatives:
  - an unfaithful wife
  lexicon: BDAG
  rationale: The noun specifically denotes a woman guilty of adultery. 'Adulteress'
    is the most direct and precise rendering, despite being somewhat less common in
    contemporary English.
- source_word: χρηματίσει
  chosen: will be called
  alternatives:
  - will be known as
  - will be designated
  lexicon: BDAG
  rationale: Here the verb carries the sense of being called or designated. 'Will
    be called' is idiomatic and preserves the future passive-like force conveyed by
    the verb in context.
- source_word: ἐὰν γένηται ἀνδρὶ ἑτέρῳ
  chosen: if she becomes another man’s wife
  alternatives:
  - if she belongs to another man
  - if she is joined to another man
  - if she becomes another man’s
  lexicon: BDAG
  rationale: The expression is idiomatic, with γίνομαι plus dative indicating entering
    relation to another man in marriage-like union. 'Becomes another man's wife' makes
    the relational meaning explicit in clear English and fits the legal-marital context.
- source_word: ἐλευθέρα
  chosen: free
  alternatives:
  - released
  lexicon: BDAG
  rationale: The adjective denotes freedom from obligation or binding claim. 'Free'
    is concise and natural.
- source_word: ἀπὸ τοῦ νόμου
  chosen: from the law
  alternatives:
  - from the binding law
  - from the marriage law
  lexicon: BDAG
  rationale: Paul uses νόμος here with the immediate sense of the binding legal principle
    governing the marriage bond. The simple rendering 'the law' preserves the Greek
    wording and allows the surrounding context to specify which law is in view.
- source_word: τοῦ μὴ εἶναι αὐτὴν μοιχαλίδα
  chosen: so that she is not an adulteress
  alternatives:
  - with the result that she is not an adulteress
  - so as not to be an adulteress
  rationale: The articular infinitive expresses result or intended consequence. 'So
    that she is not' captures the clause smoothly in English while preserving the
    logical relation.
- source_word: γενομένην ἀνδρὶ ἑτέρῳ
  chosen: if she becomes another man’s wife
  alternatives:
  - though she has become another man’s wife
  - having become another man’s
  lexicon: BDAG
  rationale: The participial construction restates the prior marital transition. Repeating
    the same English expression preserves consistency of the legal analogy and avoids
    obscurity.
