id: ROM.7.10
reference: Romans 7:10
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἀπέθανον, καὶ εὑρέθη μοι ἡ ἐντολὴ ἡ εἰς ζωὴν αὕτη εἰς θάνατον·
translation:
  text: and I died, and the commandment that was for life proved to be for death to
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the commandment that was meant for life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'this very commandment proved to result in death for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανον
  chosen: I died
  alternatives:
  - I was dead
  - I came to die
  lexicon: BDAG
  rationale: 'Aorist active indicative, first person singular, is best rendered simply
    as a past event: Paul states the result in direct terms, not as a process.'
- source_word: εὑρέθη μοι
  chosen: proved to be ... to me
  alternatives:
  - was found by me to be
  - was found to be for me
  lexicon: BDAG
  rationale: The passive with dative μοι is idiomatically rendered in English as 'proved
    to be ... to me,' preserving both the experiential force and the sense of discovery
    without wooden phrasing.
- source_word: ἐντολή
  chosen: the commandment
  alternatives:
  - the command
  - the commandment of the law
  lexicon: BDAG
  rationale: '''Commandment'' is the standard Pauline/legal term here and matches
    the singular noun in the Greek without importing extra wording not present in
    the text.'
- source_word: ἡ εἰς ζωὴν
  chosen: that was for life
  alternatives:
  - that led to life
  - that was meant for life
  lexicon: BDAG
  rationale: εἰς with ζωή here expresses intended direction or result. 'For life'
    stays closer to the Greek while remaining clear. More interpretive expansions
    are preserved as alternatives.
- source_word: αὕτη
  chosen: the commandment that was for life
  alternatives:
  - this very commandment
  - that very commandment
  lexicon: BDAG
  rationale: αὕτη is demonstrative and somewhat emphatic. In English, its force is
    naturally absorbed into the clause without requiring awkward fronting; the emphasis
    can be noted as an alternative.
- source_word: εἰς θάνατον
  chosen: for death
  alternatives:
  - resulting in death
  - bringing death
  lexicon: BDAG
  rationale: The second εἰς phrase deliberately mirrors the first. 'For death' preserves
    that rhetorical contrast between life and death more transparently than a freer
    rendering.
