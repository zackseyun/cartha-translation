theological_decisions:
- issue: Whether to make Paul's statement more interpretive by saying the commandment
    'brought' death
  chosen_reading: Retain the more neutral 'proved to be for death to me'
  alternative_readings:
  - proved deadly to me
  - brought death to me
  rationale: The verse states the discovered outcome of the commandment in Paul's
    experience; it should not be paraphrased in a way that over-explains causation
    beyond the Greek wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
