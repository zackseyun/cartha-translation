theological_decisions:
- issue: Meaning of 'the weak' and 'the strong'
  chosen_reading: The terms refer primarily to believers with differing degrees of
    freedom/strength of conscience in the Romans 14 context, not to social power or
    physical strength.
  alternative_readings:
  - socially powerful vs. powerless
  - physically strong vs. physically weak
  rationale: The immediate literary context concerns disputes over food and days,
    so the ethical exhortation is about accommodating fellow believers whose consciences
    are more restrictive.
  doctrine_reference: Translation philosophy §1, §3
