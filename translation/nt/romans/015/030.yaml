theological_decisions:
- issue: Reference of 'the Spirit' in 'the love of the Spirit'
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spirit in a non-personal sense
  rationale: In Pauline usage, τὸ πνεῦμα with this construction most naturally refers
    to the Holy Spirit. The translation capitalizes 'Spirit' while preserving the
    genitive ambiguity of whether this is the Spirit's love or love produced by the
    Spirit.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Here Χριστός functions as a title within 'our Lord Jesus Messiah,' so
    the project's default title rendering applies. The traditional alternative is
    preserved in a footnote for reader familiarity.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Rendering ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The project prioritizes gender-accurate rendering in the main text. Because
    the address likely includes the whole congregation, the inclusive sense is preserved
    in a footnote rather than replacing the masculine form in the text.
  doctrine_reference: Translation philosophy §4
