theological_decisions:
- issue: Referent of πνεύματος
  chosen_reading: the Spirit, referring to the Holy Spirit
  alternative_readings:
  - spirit in a more general sense
  - the Holy Spirit
  rationale: The immediate context of apostolic ministry empowered by divine signs
    and wonders strongly supports a reference to the Holy Spirit. The main text uses
    'the Spirit' to preserve the likely referent without over-translating the anarthrous
    Greek as 'the Holy Spirit.'
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Sense of πεπληρωκέναι τὸ εὐαγγέλιον
  chosen_reading: I have fulfilled the gospel of the Messiah
  alternative_readings:
  - I have fully proclaimed the gospel of the Messiah
  rationale: The Greek verb πληρόω with 'gospel' can denote bringing the gospel fully
    to expression across a region, not merely internal fulfillment. To remain auditable
    and close to the source, the main text keeps 'fulfilled,' while a footnote preserves
    the common interpretive rendering 'fully proclaimed.'
  doctrine_reference: 'Translation philosophy #1, #3, #5'
