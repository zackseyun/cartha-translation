id: ROM.15.33
reference: Romans 15:33
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς τῆς εἰρήνης μετὰ πάντων ὑμῶν· ἀμήν.
translation:
  text: Now may the God of peace be with all of you. Amen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here is mildly connective or transitional rather than strongly adversative.
    'Now' gives natural English for a concluding benediction while preserving the
    discourse movement.
- source_word: θεὸς τῆς εἰρήνης
  chosen: the God of peace
  alternatives:
  - God of peace
  lexicon: BDAG
  rationale: A straightforward genitival title. Retaining the article and full phrase
    preserves the recognizable Pauline designation without paraphrase.
- source_word: εἰρήνης
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering of εἰρήνη. In this benedictory title it carries both
    peace as wholeness and reconciled well-being, but 'peace' is the natural and sufficient
    English gloss.
- source_word: μετὰ πάντων ὑμῶν
  chosen: be with all of you
  alternatives:
  - with all of you
  - be among you all
  lexicon: BDAG
  rationale: The Greek omits an explicit verb in a verbless benediction; English idiom
    requires supplying 'may ... be.' 'All of you' accurately reflects πάντων ὑμῶν
    and preserves the inclusive scope of the blessing.
- source_word: ἀμήν
  chosen: Amen
  alternatives:
  - Truly
  lexicon: BDAG
  rationale: As a liturgical conclusion, 'Amen' should be retained rather than translated,
    since it is standard English usage and preserves the solemn closing force.
