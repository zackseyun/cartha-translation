theological_decisions:
- issue: Whether to render the verbless clause as an indicative statement or a benedictory
    wish
  chosen_reading: 'Rendered as a benediction: ''Now may the God of peace be with all
    of you.'''
  alternative_readings:
  - Now the God of peace is with all of you.
  rationale: Although the Greek lacks an explicit optative or imperative verb, in
    epistolary closing formulas this construction is naturally understood as a wish-prayer
    or benediction. English should supply 'may ... be' to convey the function of the
    clause rather than force a bare nominal sentence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    sense in readable modern English without paraphrase.'
