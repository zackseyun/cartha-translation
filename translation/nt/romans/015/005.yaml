theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The doctrine guidelines direct translating christological titles to preserve
    meaning, with Χριστός rendered 'Messiah' where title sense is active. In this
    exhortational phrase, the title remains semantically meaningful rather than functioning
    as a bare surname-like identifier.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Sense of τὸ αὐτὸ φρονεῖν
  chosen_reading: shared mindset/unity of thought
  alternative_readings:
  - uniformity of opinion in every matter
  - same love or affection
  rationale: Paul's wording calls for harmony in mindset among believers, not necessarily
    absolute sameness on all secondary matters. The translation preserves the wording
    without importing a stronger doctrinal claim about total uniformity.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
