id: ROM.15.4
reference: Romans 15:4
source:
  edition: SBLGNT
  text: ὅσα γὰρ προεγράφη, ⸀εἰς τὴν ἡμετέραν διδασκαλίαν ⸀ἐγράφη, ἵνα διὰ τῆς ὑπομονῆς
    καὶ διὰ τῆς παρακλήσεως τῶν γραφῶν τὴν ἐλπίδα ἔχωμεν.
translation:
  text: For whatever was written beforehand was written for our instruction, so that
    through the endurance and through the encouragement of the Scriptures we might
    have hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the comfort of the Scriptures'; παράκλησις can mean encouragement,
      comfort, or exhortation.
    reason: lexical_alternative
  - marker: b
    text: Or 'we may have hope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα
  chosen: whatever
  alternatives:
  - all that
  - whatever things
  lexicon: BDAG
  rationale: Neuter plural relative pronoun used comprehensively; 'whatever' gives
    the broad, indefinite scope in natural English without sounding wooden.
- source_word: προεγράφη
  chosen: was written beforehand
  alternatives:
  - was written previously
  - was written in former times
  lexicon: BDAG
  rationale: The verb here refers to prior writing, not public posting. 'Beforehand'
    preserves the temporal prefix προ- and fits Paul's reference to earlier Scripture.
- source_word: εἰς τὴν ἡμετέραν διδασκαλίαν
  chosen: for our instruction
  alternatives:
  - for our teaching
  - for our learning
  lexicon: BDAG
  rationale: εἰς with the accusative expresses purpose/result. διδασκαλία can mean
    teaching/instruction; 'instruction' best conveys the formative purpose of Scripture
    in this context and is idiomatic in English.
- source_word: ἐγράφη
  chosen: was written
  alternatives:
  - was recorded
  lexicon: BDAG
  rationale: Simple passive of γράφω. Repeating 'was written' mirrors the Greek and
    preserves the rhetorical emphasis.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is clear modern English while preserving
    the telic force.
- source_word: διὰ τῆς ὑπομονῆς
  chosen: through the endurance
  alternatives:
  - through perseverance
  - through steadfastness
  lexicon: BDAG
  rationale: ὑπομονή denotes patient endurance under difficulty. 'Endurance' is concise
    and natural; the article is retained as part of the paired means with the following
    phrase.
- source_word: διὰ τῆς παρακλήσεως τῶν γραφῶν
  chosen: through the encouragement of the Scriptures
  alternatives:
  - through the comfort of the Scriptures
  - through the exhortation of the Scriptures
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement, comfort, or exhortation. In this
    context of sustaining hope, 'encouragement' best captures the strengthening function
    of Scripture without narrowing it to emotional comfort alone.
- source_word: τῶν γραφῶν
  chosen: of the Scriptures
  alternatives:
  - of the writings
  lexicon: BDAG
  rationale: γραφή in Pauline usage commonly refers to sacred writings. Capitalized
    'Scriptures' reflects that recognized referent in context.
- source_word: τὴν ἐλπίδα
  chosen: hope
  alternatives:
  - the hope
  lexicon: BDAG
  rationale: Although the Greek has the article, English idiom often omits it with
    abstract nouns. 'Hope' reads naturally while preserving the sense; the article
    is not necessarily specifying a distinct technical object here.
- source_word: ἔχωμεν
  chosen: we might have
  alternatives:
  - we may have
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα. 'Might have' conveys intended result in
    smooth English without implying uncertainty beyond the Greek purpose construction.
