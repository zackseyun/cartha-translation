theological_decisions:
- issue: Function of 'the Scriptures' in producing hope
  chosen_reading: The verse states that previously written Scripture serves believers'
    instruction and, through its endurance-producing and encouraging ministry, leads
    to hope.
  alternative_readings:
  - The genitives could be taken more narrowly as endurance and encouragement supplied
    by reading Scripture rather than qualities exemplified in Scripture.
  rationale: The Greek permits some nuance in how the genitives relate, but the translation
    preserves the wording without over-interpreting. 'Of the Scriptures' is kept attached
    to 'encouragement' as in the Greek sequence, while the overall sentence leaves
    the broader theological function intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
