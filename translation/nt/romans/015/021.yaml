id: ROM.15.21
reference: Romans 15:21
source:
  edition: SBLGNT
  text: ἀλλὰ καθὼς γέγραπται· ⸂Οἷς οὐκ ἀνηγγέλη περὶ αὐτοῦ ὄψονται⸃, καὶ οἳ οὐκ ἀκηκόασιν
    συνήσουσιν.
translation:
  text: 'but as it is written: Those who were not told about him will see, and those
    who have not heard will understand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Paul is quoting Isaiah 52:15. The pronoun 'him' refers within Isaiah's context
      to the servant figure and is applied here to Paul's proclamation of the gospel.
    reason: cross_reference
  - marker: b
    text: Or 'to whom nothing was announced concerning him ... those who have not
      heard shall understand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks contrast with Paul's preceding statement about his ministry aim;
    'but' is the natural English adversative here.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it has been written
  lexicon: BDAG
  rationale: Standard citation formula. The perfect passive γέγραπται is idiomatically
    rendered in English as 'it is written' rather than a more wooden perfect.
- source_word: Οἷς
  chosen: Those who
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: The dative relative pronoun is carried into idiomatic English by restructuring
    the clause as 'Those who were not told...'; this preserves the referential sense
    without awkwardness.
- source_word: οὐκ ἀνηγγέλη
  chosen: were not told
  alternatives:
  - was not announced
  - were not informed
  lexicon: BDAG
  rationale: Aorist passive of ἀναγγέλλω means 'announce/report/tell.' Because the
    subject is personal ('those who'), 'were not told' is the clearest natural rendering.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: περί with genitive indicates reference or concern. 'About him' is natural
    modern English and preserves the personal object of the proclamation.
- source_word: ὄψονται
  chosen: will see
  lexicon: BDAG
  rationale: Future middle of ὁράω, straightforwardly 'will see.' The verb is retained
    literally rather than interpreted as 'perceive,' since the parallel with 'will
    understand' already supplies the cognitive development.
- source_word: οἳ οὐκ ἀκηκόασιν
  chosen: those who have not heard
  alternatives:
  - those who had not heard
  lexicon: BDAG
  rationale: Perfect of ἀκούω highlights a present state resulting from not having
    heard. English present perfect best captures this.
- source_word: συνήσουσιν
  chosen: will understand
  alternatives:
  - will comprehend
  lexicon: BDAG
  rationale: Future of συνίημι means to understand or comprehend. 'Will understand'
    is clear, direct, and preserves the prophetic promise.
