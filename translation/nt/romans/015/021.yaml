theological_decisions:
- issue: Referent of 'him' in the Isaiah citation as used by Paul
  chosen_reading: Retain the pronoun 'him' without expanding it to 'the Messiah' or
    'Christ.'
  alternative_readings:
  - about the Messiah
  - about Christ
  rationale: Paul cites Isaiah in a way that applies to his gospel mission, but the
    Greek text itself uses the pronoun αὐτοῦ. Expanding the referent in the main text
    would import interpretation beyond the wording of the citation. The pronoun preserves
    the scriptural texture and Paul's use of it.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
