id: ROM.15.10
reference: Romans 15:10
source:
  edition: SBLGNT
  text: καὶ πάλιν λέγει· Εὐφράνθητε, ἔθνη, μετὰ τοῦ λαοῦ αὐτοῦ.
translation:
  text: And again he says, “Rejoice, Gentiles, with his people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rejoice, nations, with his people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - further
  - in turn
  lexicon: BDAG
  rationale: In citation formulae, πάλιν commonly means 'again,' introducing another
    scriptural quotation. This is the most natural and standard English equivalent
    here.
- source_word: λέγει
  chosen: he says
  alternatives:
  - it says
  - he said
  lexicon: BDAG
  rationale: Present tense is retained to reflect the common NT citation formula treating
    Scripture as presently speaking. 'He says' fits the implicit subject from the
    scriptural source better than the impersonal 'it says,' though that is also possible.
- source_word: Εὐφράνθητε
  chosen: Rejoice
  alternatives:
  - Be glad
  - Celebrate
  lexicon: BDAG
  rationale: The aorist passive imperative functions idiomatically as an intransitive/passive-like
    command meaning 'rejoice' or 'be glad.' 'Rejoice' preserves the elevated but still
    readable tone and matches the imperative force well.
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: In Paul's argument in Romans 15 about the inclusion of non-Jews in the
    praise of God, ἔθνη is best rendered 'Gentiles' rather than the more generic 'nations.'
    This makes the Jew-Gentile dimension explicit, which is central to the context.
    The underlying OT citation can also be rendered 'nations,' so that alternative
    is preserved in a footnote.
- source_word: μετὰ τοῦ λαοῦ αὐτοῦ
  chosen: with his people
  alternatives:
  - together with his people
  lexicon: BDAG
  rationale: μετά with the genitive means 'with,' expressing association. 'His people'
    is the natural rendering of τοῦ λαοῦ αὐτοῦ and preserves the covenantal sense
    without over-expansion. 'Together with' is possible but unnecessarily fuller in
    English.
- source_word: λαοῦ
  chosen: people
  alternatives:
  - people of Israel
  lexicon: BDAG
  rationale: λαός often refers to God's covenant people, and in the OT source that
    referent is Israel. Here 'people' is kept in the main text because it is what
    the Greek says directly; specifying 'Israel' would be interpretive overtranslation,
    though the contextual referent is clear.
