theological_decisions:
- issue: Rendering ἔθνη in a Pauline citation about Jew-Gentile unity
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The immediate context in Romans 15 emphasizes the inclusion of the Gentiles
    alongside Israel in praising God. Rendering ἔθνη as 'Gentiles' best communicates
    Paul's theological point without denying the broader lexical range of the term.
    Because the OT citation may be heard more broadly as 'nations,' that alternative
    is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §§1, 3, 5
