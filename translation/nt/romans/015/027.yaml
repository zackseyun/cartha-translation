id: ROM.15.27
reference: Romans 15:27
source:
  edition: SBLGNT
  text: εὐδόκησαν γάρ, καὶ ὀφειλέται ⸂εἰσὶν αὐτῶν⸃· εἰ γὰρ τοῖς πνευματικοῖς αὐτῶν
    ἐκοινώνησαν τὰ ἔθνη, ὀφείλουσιν καὶ ἐν τοῖς σαρκικοῖς λειτουργῆσαι αὐτοῖς.
translation:
  text: For they were pleased to do it, and they are indebted to them. For if the
    Gentiles have shared in their spiritual things, they also owe it to minister to
    them in material things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations' for 'the Gentiles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their spiritual blessings.' The Greek says 'their spiritual things.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in fleshly things'; here the sense is material or bodily support,
      in contrast to spiritual things.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  chosen: were pleased to do it
  alternatives:
  - were glad
  - thought it good
  lexicon: BDAG
  rationale: Aorist indicative of εὐδοκέω conveys willing approval or pleasure. 'Were
    pleased to do it' captures both the favorable disposition and the implied action
    from context (the contribution mentioned in the preceding verse) without over-paraphrasing.
- source_word: ὀφειλέται εἰσὶν αὐτῶν
  chosen: they are indebted to them
  alternatives:
  - they are debtors to them
  - they owe them
  lexicon: BDAG
  rationale: ὀφειλέται denotes those under obligation. 'Indebted to them' is idiomatic
    modern English and preserves the moral obligation Paul asserts toward the Jerusalem
    believers.
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Pauline usage here, ἔθνη contrasts non-Jews with Jewish believers,
    so 'the Gentiles' is more precise than the more literal but potentially ambiguous
    'the nations'.
- source_word: τοῖς πνευματικοῖς αὐτῶν
  chosen: their spiritual things
  alternatives:
  - their spiritual blessings
  - their spiritual goods
  lexicon: BDAG
  rationale: The adjective πνευματικός is substantivized. 'Spiritual things' stays
    close to the Greek and avoids importing 'blessings' where the noun is not explicit,
    while still naturally referring to spiritual benefits received from Israel/Jewish
    believers.
- source_word: ἐκοινώνησαν
  chosen: have shared in
  alternatives:
  - have participated in
  - have had a share in
  lexicon: BDAG
  rationale: κοινωνέω expresses participation or sharing. 'Have shared in' is natural
    English and fits the dative construction with τοῖς πνευματικοῖς.
- source_word: ἐν τοῖς σαρκικοῖς
  chosen: in material things
  alternatives:
  - in fleshly things
  - with material things
  lexicon: BDAG
  rationale: σαρκικός here is not ethical ('sinful') but pertains to bodily/material
    matters. 'Material things' best conveys the contrast with 'spiritual things' in
    this context. The preposition ἐν is rendered idiomatically rather than woodenly.
- source_word: λειτουργῆσαι
  chosen: to minister
  alternatives:
  - to serve
  - to render service
  lexicon: BDAG
  rationale: λειτουργέω can denote service, often with a public or sacred nuance.
    'Minister' preserves the dignified service sense Paul gives to the Gentiles' financial
    support, without restricting it to clergy.
