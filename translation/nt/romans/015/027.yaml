theological_decisions:
- issue: Meaning of σαρκικοῖς in contrast with πνευματικοῖς
  chosen_reading: material things
  alternative_readings:
  - fleshly things
  rationale: Given the immediate context of a monetary collection for Jerusalem, σαρκικοῖς
    refers to material/physical support, not sinful flesh. This follows the doctrine
    guideline that σάρξ-family terms are rendered contextually and documented when
    varied.
  doctrine_reference: 'DOCTRINE.md: Contested terms table on σάρξ / sarx; Translation
    philosophy #5'
- issue: Referent of αὐτῶν / αὐτοῖς
  chosen_reading: the Jerusalem Jewish believers/saints are the ones to whom the Gentiles
    are indebted
  alternative_readings:
  - Israel more broadly
  rationale: The immediate context in Romans 15:25–26 concerns the collection for
    the saints in Jerusalem. While Paul's logic draws on salvation-historical indebtedness
    to the Jews, the pronouns in this verse most directly point to the Jerusalem believers
    receiving aid.
