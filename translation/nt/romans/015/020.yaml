theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this context, and the doctrine guidelines
    prefer 'Messiah' where context supports a titular sense rather than a name-like
    usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Interpretation of Paul's ministry principle
  chosen_reading: Paul states a missionary aim to evangelize unreached places rather
    than a universal prohibition on all ministry where Christ is already known.
  alternative_readings:
  - A strict ban on any ministry in previously evangelized regions
  rationale: The verse describes Paul's personal ambition and strategy, not an absolute
    doctrinal rule for all Christian workers. The translation preserves this by rendering
    the first-person volitional language plainly without expanding it into a command.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension
    rather than resolve it'
