id: ROM.15.20
reference: Romans 15:20
source:
  edition: SBLGNT
  text: οὕτως δὲ ⸀φιλοτιμούμενον εὐαγγελίζεσθαι οὐχ ὅπου ὠνομάσθη Χριστός, ἵνα μὴ
    ἐπ’ ἀλλότριον θεμέλιον οἰκοδομῶ,
translation:
  text: And in this way I make it my ambition to proclaim the good news, not where
    the Messiah has already been named, so that I might not build on another man's
    foundation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title rather than a name-like form.
    reason: alternative_reading
  - marker: b
    text: Or 'on someone else's foundation.' The Greek says literally 'on another's
      foundation,' using a building metaphor for prior apostolic work.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Adverb linking this statement to Paul's preceding description of his
    ministry strategy; 'in this way' is natural English while preserving the connective
    force.
- source_word: δὲ
  chosen: And
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Mild connective continuing the argument rather than marking strong contrast;
    'And' fits the flow in English.
- source_word: φιλοτιμούμενον
  chosen: I make it my ambition
  alternatives:
  - I aspire
  - I am eager
  - I consider it an honor
  lexicon: BDAG
  rationale: The participle conveys earnest ambition or aspiration. 'Make it my ambition'
    is an established and accurate idiom that preserves the volitional force.
- source_word: εὐαγγελίζεσθαι
  chosen: to proclaim the good news
  alternatives:
  - to preach the gospel
  - to announce good news
  lexicon: BDAG
  rationale: The infinitive denotes gospel proclamation. 'Proclaim the good news'
    is accessible modern English and preserves the verbal sense better than the more
    traditional but jargon-heavy 'preach the gospel.'
- source_word: οὐχ ὅπου
  chosen: not where
  alternatives:
  - not in places where
  lexicon: BDAG
  rationale: Straightforward locative negation; concise and faithful.
- source_word: ὠνομάσθη
  chosen: has already been named
  alternatives:
  - was named
  - was known
  - was proclaimed
  lexicon: BDAG
  rationale: Passive of 'name/call upon/mention.' In context it refers to places where
    Messiah was already publicly identified or proclaimed. 'Has already been named'
    preserves the passive and the prior-existing state; 'already' is supplied from
    context to make the contrast with Paul's frontier mission explicit.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here it is titular and refers to the one
    being proclaimed.
- source_word: ἵνα μὴ
  chosen: so that I might not
  alternatives:
  - in order that I would not
  - lest I
  lexicon: BDAG
  rationale: Expresses purpose with negation. 'So that I might not' is clear modern
    English and preserves the purposive nuance.
- source_word: ἐπ’ ἀλλότριον θεμέλιον
  chosen: on another man's foundation
  alternatives:
  - on someone else's foundation
  - on a чужой foundation
  lexicon: BDAG
  rationale: ἀλλότριος means belonging to another, foreign, someone else's. In this
    ministry-building metaphor, 'another man's foundation' is idiomatic and reflects
    the implied personal referent, though the noun 'man' is not explicit in Greek.
- source_word: οἰκοδομῶ
  chosen: build
  alternatives:
  - build up
  lexicon: BDAG
  rationale: Construction metaphor for apostolic work. 'Build' fits the image with
    'foundation' and avoids overinterpreting with 'build up.'
