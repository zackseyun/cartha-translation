theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine guidelines specify translating Χριστός as 'Messiah' where
    it functions as a title rather than a name-like fixed expression. In Romans 15:17,
    the title remains semantically active and is best rendered rather than transliterated.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Translate titles; transliterate
    names.'''
- issue: Force of Paul's καύχησις
  chosen_reading: Paul claims legitimate boasting only in union with Messiah Jesus
    regarding his God-directed ministry
  alternative_readings:
  - Paul claims a general personal confidence
  - Paul speaks merely of subjective rejoicing
  rationale: The phrase is constrained by 'in Messiah Jesus' and 'the things pertaining
    to God,' so the translation should preserve that Paul's boasting is not autonomous
    self-exaltation but bounded by Christ and divine service. This is an interpretive
    clarification behind the chosen wording, not an expansion of the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; optimal equivalence'
