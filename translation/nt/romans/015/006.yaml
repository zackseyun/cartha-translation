theological_decisions:
- issue: Rendering Χριστοῦ in the name-title sequence Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where title
    is in view. In this verse the phrase identifies Jesus with his messianic office
    in a doxological formula; retaining the title's meaning is preferred over traditional
    transliteration.
