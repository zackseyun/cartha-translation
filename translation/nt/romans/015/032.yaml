id: ROM.15.32
reference: Romans 15:32
source:
  edition: SBLGNT
  text: ἵνα ἐν χαρᾷ ⸀ἐλθὼν πρὸς ὑμᾶς διὰ θελήματος ⸀θεοῦ συναναπαύσωμαι ὑμῖν.
translation:
  text: so that by God's will I may come to you with joy and be refreshed together
    with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be mutually refreshed with you' or 'find rest together with you.' The
      Greek verb conveys shared refreshment or rest.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces Paul's purpose clause from the preceding request. 'So that'
    is natural modern English while preserving the telic force.
- source_word: ἐν χαρᾷ
  chosen: with joy
  alternatives:
  - in joy
  - joyfully
  lexicon: BDAG
  rationale: The prepositional phrase expresses attendant manner/circumstance. 'With
    joy' is idiomatic and preserves the noun rather than converting it fully into
    an adverb.
- source_word: ἐλθὼν πρὸς ὑμᾶς
  chosen: I may come to you
  alternatives:
  - having come to you
  - come to you
  lexicon: BDAG
  rationale: 'The aorist participle is subordinate to the main verb and in English
    is best smoothed into the purpose construction: Paul''s hoped-for arrival to the
    Roman believers.'
- source_word: διὰ θελήματος θεοῦ
  chosen: by God's will
  alternatives:
  - through the will of God
  - by the will of God
  lexicon: BDAG
  rationale: διά with the genitive here expresses agency/means in accordance with
    divine willing. 'By God's will' is concise, natural, and faithful.
- source_word: θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Rendered as an English possessive for natural style without loss of meaning.
- source_word: συναναπαύσωμαι
  chosen: be refreshed together with you
  alternatives:
  - be mutually refreshed with you
  - find rest together with you
  - be refreshed with you
  lexicon: BDAG
  rationale: The middle subjunctive of συναναπαύομαι carries the sense of sharing
    rest/refreshment together. 'Be refreshed together with you' preserves the mutuality
    signaled by the συν- prefix better than a simple 'be refreshed.'
