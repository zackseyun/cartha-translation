theological_decisions:
- issue: Mutuality of Paul's hoped-for fellowship with the Roman believers
  chosen_reading: be refreshed together with you
  alternative_readings:
  - be refreshed with you
  - find rest with you
  rationale: The wording preserves the reciprocal nuance of συναναπαύσωμαι without
    overstating a technical theological concept. It presents Paul not merely as giving
    ministry but also receiving shared encouragement and rest among them.
