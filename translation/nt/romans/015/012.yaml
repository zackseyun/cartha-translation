id: ROM.15.12
reference: Romans 15:12
source:
  edition: SBLGNT
  text: καὶ πάλιν Ἠσαΐας λέγει· Ἔσται ἡ ῥίζα τοῦ Ἰεσσαί, καὶ ὁ ἀνιστάμενος ἄρχειν
    ἐθνῶν· ἐπ’ αὐτῷ ἔθνη ἐλπιοῦσιν.
translation:
  text: And again Isaiah says, “The root of Jesse will be, and the one who rises to
    rule the Gentiles; in him the Gentiles will hope.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the nations” in both occurrences of ἔθνη/ἐθνῶν.
    reason: alternative_reading
  - marker: b
    text: Literally “on him the Gentiles will hope.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - further
  - in turn
  lexicon: BDAG
  rationale: Introduces another supporting citation in Paul's catena of quotations;
    'again' is the most natural discourse marker in English.
- source_word: Ἠσαΐας
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name, following the
    policy to transliterate personal names.
- source_word: Ἔσται
  chosen: will be
  alternatives:
  - shall be
  - there will be
  lexicon: BDAG
  rationale: Future of εἰμί is rendered straightforwardly. 'Will be' is clear modern
    English and preserves the predictive force of the citation.
- source_word: ἡ ῥίζα τοῦ Ἰεσσαί
  chosen: the root of Jesse
  alternatives:
  - the root from Jesse
  - the rootstock of Jesse
  lexicon: BDAG
  rationale: Formal rendering of the messianic expression from Isaiah. 'Root of Jesse'
    is established and accurately reflects the genitive construction without over-interpreting
    the metaphor.
- source_word: ὁ ἀνιστάμενος
  chosen: the one who rises
  alternatives:
  - the one arising
  - the one who stands up
  lexicon: BDAG
  rationale: Present participle used substantivally. 'The one who rises' preserves
    the verbal force and avoids prematurely specifying whether the emphasis is appearance,
    exaltation, or resurrection.
- source_word: ἄρχειν ἐθνῶν
  chosen: to rule the Gentiles
  alternatives:
  - to rule the nations
  - to reign over the Gentiles
  lexicon: BDAG
  rationale: ἄρχειν denotes ruling/governing. ἔθνη in Romans commonly refers to Gentiles
    in contrast to Jews, and that sense fits Paul's argument about the inclusion of
    the nations. 'Rule' is more direct than 'reign over' and keeps the infinitive
    construction concise.
- source_word: ἐπ’ αὐτῷ
  chosen: in him
  alternatives:
  - on him
  - upon him
  lexicon: BDAG
  rationale: Although ἐπί with dative can be rendered more literally as 'on/upon,'
    in this idiom with ἐλπίζω the sense is placing hope in someone. 'In him' is idiomatic
    English and best conveys the relational object of hope.
- source_word: ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: Rendered consistently with the earlier ἐθνῶν in this verse. In Pauline
    usage here the emphasis is on non-Jewish peoples being included in God's saving
    purpose, so 'Gentiles' is more contextually precise than the broader 'nations'.
- source_word: ἐλπιοῦσιν
  chosen: will hope
  alternatives:
  - will place their hope
  - will put their hope
  lexicon: BDAG
  rationale: Future active indicative of ἐλπίζω. 'Will hope' is the most direct rendering;
    the object of hope is already expressed by ἐπ’ αὐτῷ.
