theological_decisions:
- issue: Rendering of ἔθνη in an Isaiah citation reused by Paul
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: Both are lexically possible, especially given the OT background. In Romans
    15 Paul's argument centers on the inclusion of non-Jews alongside Jews in glorifying
    God, so 'Gentiles' best reflects the apostolic use of the citation while preserving
    the universal scope. The alternative is preserved in a footnote because the Isaianic
    background naturally evokes 'nations.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Messianic force of 'the root of Jesse'
  chosen_reading: Retained as a literal messianic title without explicit interpretive
    expansion
  alternative_readings:
  - the heir from Jesse
  - the descendant of Jesse
  rationale: The phrase is a recognized messianic image fulfilled in Jesus, but the
    translation should not paraphrase the metaphor into an interpretation the Greek
    does not state explicitly. Retaining the image preserves both the OT resonance
    and theological depth.
  doctrine_reference: Translation philosophy §1, §3
