theological_decisions:
- issue: Rendering ἅγιοι in a Pauline context
  chosen_reading: saints
  alternative_readings:
  - holy ones
  - God's people
  rationale: The term is Paul's regular designation for believers and carries ecclesial
    identity without requiring later canonization connotations. 'Saints' preserves
    that established theological register while remaining faithful to the Greek.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
