id: ROM.15.26
reference: Romans 15:26
source:
  edition: SBLGNT
  text: εὐδόκησαν γὰρ Μακεδονία καὶ Ἀχαΐα κοινωνίαν τινὰ ποιήσασθαι εἰς τοὺς πτωχοὺς
    τῶν ἁγίων τῶν ἐν Ἰερουσαλήμ.
translation:
  text: For Macedonia and Achaia were pleased to make some contribution for the poor
    among the saints in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make some sharing'; the Greek expression emphasizes fellowship expressed
      through material support.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησαν
  chosen: were pleased
  alternatives:
  - thought it good
  - were glad
  - decided willingly
  lexicon: BDAG
  rationale: Aorist active indicative of εὐδοκέω conveys favorable willingness or
    pleasure. 'Were pleased' preserves both volition and positive disposition better
    than a bare 'decided.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanatory ground for the preceding statement; 'For'
    is the standard concise English connective here.
- source_word: Μακεδονία καὶ Ἀχαΐα
  chosen: Macedonia and Achaia
  alternatives:
  - the believers in Macedonia and Achaia
  - the churches of Macedonia and Achaia
  lexicon: BDAG
  rationale: The regions are grammatically the subjects by metonymy for their Christian
    communities. Retaining the place names matches the Greek directly without adding
    'churches' or 'believers,' which are implied but not stated.
- source_word: κοινωνίαν τινὰ ποιήσασθαι
  chosen: to make some contribution
  alternatives:
  - to make some sharing
  - to make a fellowship offering
  - to provide some participation
  lexicon: BDAG
  rationale: The idiom ποιέω + κοινωνία can denote making a contribution or sharing
    materially. In this collection context, 'contribution' best communicates the practical
    financial sense while still reflecting κοινωνία's sharing nuance. 'Some' renders
    τινά, indicating an indefinite contribution rather than specifying amount.
- source_word: εἰς τοὺς πτωχοὺς
  chosen: for the poor
  alternatives:
  - for the needy
  - for poor people
  lexicon: BDAG
  rationale: εἰς here expresses purpose/benefit toward the recipients. 'For the poor'
    is natural English and preserves the adjective used substantivally.
- source_word: τῶν ἁγίων
  chosen: among the saints
  alternatives:
  - of the saints
  - among God's holy people
  lexicon: BDAG
  rationale: The genitive most naturally identifies the poor as belonging to the group
    of the saints. 'Among the saints' makes that relation clear in idiomatic English
    while preserving ἅγιοι as 'saints,' a standard Pauline designation for believers.
- source_word: τῶν ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - who are in Jerusalem
  - at Jerusalem
  lexicon: BDAG
  rationale: The article-participle-like construction with ἐν + place modifies 'saints.'
    'In Jerusalem' is the most direct and natural rendering.
