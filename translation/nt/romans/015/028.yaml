theological_decisions:
- issue: Meaning of Paul's metaphor 'sealed to them this fruit' in relation to the
    Jerusalem collection
  chosen_reading: Retain the metaphor 'sealed' in the main text rather than interpretively
    replacing it with 'delivered' or 'made sure they receive.'
  alternative_readings:
  - have safely delivered to them this fruit
  - have guaranteed this fruit for them
  rationale: The phrase is not a doctrinal crux, but it is interpretively significant.
    Optimal equivalence here favors preserving Paul's metaphorical wording while allowing
    readers to see the underlying image of formal confirmation/secure delivery. More
    interpretive renderings risk obscuring the lexical choice σφραγίζω.
  doctrine_reference: Translation philosophy §1, §3, §5
