id: ROM.15.11
reference: Romans 15:11
source:
  edition: SBLGNT
  text: καὶ πάλιν· Αἰνεῖτε, ⸂πάντα τὰ ἔθνη, τὸν κύριον⸃, καὶ ⸀ἐπαινεσάτωσαν αὐτὸν
    πάντες οἱ λαοί.
translation:
  text: 'And again: “Praise the Lord, all the nations, and let all the peoples praise
    him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the Gentiles.” Greek ἔθνη can mean “nations” or “Gentiles”; here
      the quotation has a universal sense, while also fitting Paul’s argument about
      the Gentiles.
    reason: lexical_alternative
  - marker: b
    text: Or “Praise the LORD,” reflecting the Hebrew source of the quotation, where
      the divine name is represented in Greek by κύριος (“Lord”).
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - further
  - and again
  lexicon: BDAG
  rationale: Introduces another scriptural citation in Paul's catena. 'Again' is the
    natural discourse marker in English; retained with 'And' to reflect καὶ πάλιν.
- source_word: Αἰνεῖτε
  chosen: Praise
  alternatives:
  - Give praise to
  - Extol
  lexicon: BDAG
  rationale: Second person plural present active imperative in a citation; 'Praise'
    is the most direct and idiomatic imperative equivalent.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples of the nations
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In this quotation's universal
    worship context, 'nations' best preserves the broad collective sense while still
    supporting Paul's Jew-Gentile argument. The alternative 'Gentiles' is worth preserving
    because of the immediate context in Romans 15.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the LORD
  - the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' Although the OT source
    refers to YHWH, the Greek text here has κύριον, and in NT citation context 'the
    Lord' is the standard rendering; 'the LORD' is preserved as an alternative reflecting
    the Hebrew source.
- source_word: ἐπαινεσάτωσαν
  chosen: let ... praise
  alternatives:
  - let ... extol
  - let ... commend
  lexicon: BDAG
  rationale: Third person plural aorist active imperative is naturally rendered in
    English with 'let ... praise.' This preserves the hortatory force without awkwardness.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: The pronoun directly refers back to τὸν κύριον. 'Him' is natural English
    and avoids unnecessary repetition while preserving the personal object.
- source_word: πάντες οἱ λαοί
  chosen: all the peoples
  alternatives:
  - all the peoples of the earth
  - all the peoples/nations
  lexicon: BDAG
  rationale: λαοί is distinct from ἔθνη in the Greek citation, so varying the English
    to 'peoples' preserves the parallelism and lexical distinction rather than flattening
    both to 'nations'.
