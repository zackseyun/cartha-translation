theological_decisions:
- issue: Rendering of κύριος in an OT citation referring to Israel's God
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Because this line quotes
    the Greek Scriptures where κύριος stands for the divine name, 'the LORD' is a
    meaningful alternative tied to the Hebrew source and is preserved in a footnote
    rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Rendering of ἔθνη in Paul's Jew-Gentile context
  chosen_reading: all the nations
  alternative_readings:
  - all the Gentiles
  rationale: The quotation itself is universal in scope and addresses the nations
    as nations; 'nations' is the broader and more source-transparent rendering. Since
    Romans 15 emphasizes Gentile inclusion, 'Gentiles' is preserved as an interpretive
    alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
