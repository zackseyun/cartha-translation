id: ROM.15.25
reference: Romans 15:25
source:
  edition: SBLGNT
  text: νυνὶ δὲ πορεύομαι εἰς Ἰερουσαλὴμ διακονῶν τοῖς ἁγίοις.
translation:
  text: But now I am going to Jerusalem, ministering to the saints.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'serving the saints' or 'bringing aid to the saints.' The participle
      διακονῶν can denote practical service, here likely referring to Paul's delivery
      of the collection for the believers in Jerusalem (cf. Rom 15:26).
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now, however
  - But at present
  lexicon: BDAG
  rationale: νυνί marks present time with emphasis ('now, at present'), and δέ provides
    a mild adversative/continuative transition. 'But now' preserves both the temporal
    and discourse contrast naturally in English.
- source_word: πορεύομαι
  chosen: I am going
  alternatives:
  - I am traveling
  - I am on my way
  lexicon: BDAG
  rationale: The present middle/passive indicative here conveys current movement/intention
    toward Jerusalem. 'I am going' is the most direct and idiomatic rendering without
    adding nuance beyond the Greek.
- source_word: εἰς Ἰερουσαλὴμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς with a city name normally indicates motion toward/destination. 'To
    Jerusalem' is standard English for travel to a city.
- source_word: διακονῶν
  chosen: ministering
  alternatives:
  - serving
  - bringing aid to
  lexicon: BDAG
  rationale: The present active participle modifies the subject and explains the purpose/circumstance
    of Paul's journey. 'Ministering' preserves the service-oriented sense of διακονέω
    while allowing the dative object to remain explicit. 'Serving' is possible, but
    'ministering' better reflects the term's recognized ministry/service nuance in
    Pauline usage without overstating ecclesiastical office.
- source_word: τοῖς ἁγίοις
  chosen: to the saints
  alternatives:
  - to the holy ones
  - to God's people
  lexicon: BDAG
  rationale: In Pauline usage, οἱ ἅγιοι commonly refers to believers as 'saints' or
    'holy ones.' 'Saints' is concise, traditional, and accurate here. 'God's people'
    is interpretive and less formally tied to the lexical form; 'holy ones' is more
    literal but less idiomatic in contemporary English.
