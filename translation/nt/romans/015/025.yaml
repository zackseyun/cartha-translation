theological_decisions:
- issue: Referent of 'the saints'
  chosen_reading: believers in Jerusalem, especially the poor among them in the immediate
    context
  alternative_readings:
  - a broader reference to holy people without specifying the Jerusalem church
  rationale: The phrase itself lexically means 'the saints,' and in context Paul is
    speaking of the collection for believers in Jerusalem. The translation keeps the
    ecclesial term 'saints' rather than paraphrasing the referent into the main text,
    preserving the source wording while allowing contextual understanding.
  doctrine_reference: Translation philosophy §§1, 5
