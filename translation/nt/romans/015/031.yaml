theological_decisions:
- issue: Meaning of ἀπειθούντων in relation to Paul's opponents in Judea
  chosen_reading: Rendered as 'those who are disobedient' in the main text
  alternative_readings:
  - those who are unbelieving
  rationale: The participle can denote refusal to believe and resultant disobedience.
    The broader rendering preserves the lexical force without reducing it to one side
    of that semantic range. Because 'unbelieving' is a common contextual rendering
    here, it is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
