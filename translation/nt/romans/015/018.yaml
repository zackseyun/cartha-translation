theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the project's doctrine specifies
    'Messiah' where context supports title sense rather than name-like usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Meaning of ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In Romans, Paul commonly uses ἔθνη to distinguish non-Jews from Jews
    within salvation-history argument. 'Gentiles' communicates that contextual sense
    more clearly, while 'nations' remains a viable lexical alternative.
