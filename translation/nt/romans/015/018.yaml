id: ROM.15.18
reference: Romans 15:18
source:
  edition: SBLGNT
  text: οὐ γὰρ τολμήσω ⸂τι λαλεῖν⸃ ὧν οὐ κατειργάσατο Χριστὸς δι’ ἐμοῦ εἰς ὑπακοὴν
    ἐθνῶν, λόγῳ καὶ ἔργῳ,
translation:
  text: For I will not dare to speak of anything except what the Messiah has accomplished
    through me for the obedience of the Gentiles, by word and deed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the nations."
    reason: lexical_alternative
  - marker: b
    text: Or "I dare not speak of anything except what Christ has accomplished through
      me."
    reason: alternative_reading
lexical_decisions:
- source_word: τολμήσω
  chosen: I will not dare
  alternatives:
  - I dare not
  - I will not venture
  lexicon: BDAG
  rationale: Future active indicative with οὐ γὰρ introduces Paul's stated restraint.
    'I will not dare' is natural modern English and preserves the volitional nuance
    of daring/venturing.
- source_word: τι λαλεῖν
  chosen: to speak of anything except
  alternatives:
  - to speak anything
  - to mention anything except
  lexicon: BDAG
  rationale: 'The construction with ὧν οὐ following is idiomatically restrictive:
    Paul will not speak of anything other than what Christ has done. English requires
    ''except'' to make the contrast clear.'
- source_word: ὧν οὐ κατειργάσατο
  chosen: except what ... has accomplished
  alternatives:
  - but what ... accomplished
  - other than what ... worked
  lexicon: BDAG
  rationale: κατεργάζομαι here means to bring about or accomplish effectively. Present
    perfect in English ('has accomplished') captures the abiding relevance of Christ's
    completed work in Paul's ministry.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated 'Messiah' where functioning as a
    title rather than a name-like proper designation. Here it identifies Jesus in
    his messianic role as the one acting through Paul.
- source_word: δι’ ἐμοῦ
  chosen: through me
  alternatives:
  - by me
  - by means of me
  lexicon: BDAG
  rationale: διά with genitive denotes agency/instrumentality. 'Through me' best preserves
    Christ as the primary actor and Paul as the instrument.
- source_word: εἰς ὑπακοὴν ἐθνῶν
  chosen: for the obedience of the Gentiles
  alternatives:
  - to bring the Gentiles to obedience
  - for the obedience of the nations
  lexicon: BDAG
  rationale: A fairly formal rendering preserves the prepositional phrase and leaves
    intact the possible nuance of resultant obedience among the Gentiles. 'Gentiles'
    fits Pauline usage in Romans better than 'nations' in this context.
- source_word: λόγῳ καὶ ἔργῳ
  chosen: by word and deed
  alternatives:
  - in word and deed
  - by speech and action
  lexicon: BDAG
  rationale: Dative singulars likely express means/instrument. 'By word and deed'
    is idiomatic and preserves the paired contrast between proclamation and action.
