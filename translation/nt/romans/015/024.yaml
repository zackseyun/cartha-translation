theological_decisions:
- issue: Nature of Paul's hoped-for support from the Roman believers
  chosen_reading: Rendered προπεμφθῆναι as 'to be sent on my way there by you,' implying
    practical support for onward mission without specifying financial or ecclesial
    details.
  alternative_readings:
  - to be helped on my journey there by you
  - to be escorted there by you
  rationale: The verb can include accompaniment or material assistance, but the text
    itself does not define the exact form. The translation preserves the general sense
    and avoids importing a more specific missionary-support model than the Greek requires.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve ambiguity where the source is not specific.'
- issue: Meaning of Paul's anticipated fulfillment with the Romans
  chosen_reading: Rendered ἐμπλησθῶ with 'I may be filled in part with your company,'
    preserving the metaphor of fullness and the limitation expressed by ἀπὸ μέρους.
  alternative_readings:
  - I may be satisfied in part by you
  - I may enjoy your company for a while
  rationale: The phrase concerns relational enjoyment/fellowship, but the exact shade—emotional
    satisfaction, refreshment, or limited duration—is not fully explicit. The chosen
    wording keeps the metaphor and avoids over-interpretation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; readable modern English, not paraphrase.'
