id: ROM.15.22
reference: Romans 15:22
source:
  edition: SBLGNT
  text: Διὸ καὶ ἐνεκοπτόμην τὰ πολλὰ τοῦ ἐλθεῖν πρὸς ὑμᾶς·
translation:
  text: Therefore I also was often hindered from coming to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many times' or 'repeatedly'; the Greek phrase τὰ πολλὰ is an idiom expressing
      frequent repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' is natural
    English and preserves the logical connection.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: Adds Paul's personal circumstance to what precedes; 'also' best reflects
    the additive force here.
- source_word: ἐνεκοπτόμην
  chosen: was hindered
  alternatives:
  - was prevented
  - was obstructed
  lexicon: BDAG
  rationale: Imperfect passive/middle indicates repeated or ongoing prevention in
    past time. 'Was hindered' is idiomatic and preserves the sense of obstruction
    without over-specifying the agent.
- source_word: τὰ πολλὰ
  chosen: often
  alternatives:
  - many times
  - for the most part
  lexicon: BDAG
  rationale: This accusative idiom functions adverbially. In context it means repeatedly/on
    many occasions, not 'mostly.' 'Often' gives clear modern English while preserving
    the iterative sense.
- source_word: τοῦ ἐλθεῖν
  chosen: from coming
  alternatives:
  - from coming in order to see
  - from being able to come
  lexicon: BDAG
  rationale: Articular infinitive with τοῦ after a verb of hindrance expresses what
    Paul was hindered from doing. 'From coming' is the most direct and natural rendering.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - to visit you
  - to come to you
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward the Roman believers.
    'To you' is concise English; the motion is already carried by 'coming'.
