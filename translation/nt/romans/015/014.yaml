theological_decisions:
- issue: Gendered address ἀδελφοί in a mixed congregation
  chosen_reading: my brothers
  alternative_readings:
  - my brothers and sisters
  rationale: Following the project's gender-accurate policy, the grammatically masculine
    term is retained in the main text. Since the referent is the Roman Christian community
    broadly, an inclusive explanatory footnote preserves the representative force
    without replacing the source-form in translation.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nuance of νουθετεῖν
  chosen_reading: instruct one another
  alternative_readings:
  - admonish one another
  - warn one another
  rationale: The verb can denote admonition or corrective instruction. In this commendatory
    context, a broader and more constructive English rendering is preferred in the
    main text, while preserving the sharper alternatives in a footnote to avoid flattening
    the lexical range.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
