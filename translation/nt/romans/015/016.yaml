theological_decisions:
- issue: Paul's self-description in priestly terms
  chosen_reading: Paul metaphorically describes his apostolic ministry to the Gentiles
    in priestly language without asserting a separate sacrificial atonement or importing
    later ecclesial office structures.
  alternative_readings:
  - A more narrowly cultic reading emphasizing formal priestly office
  - A flattened non-cultic reading that removes priestly imagery
  rationale: The verse combines λειτουργός, ἱερουργέω, and προσφορά, so the priestly
    metaphor must be preserved. At the same time, the text speaks of gospel ministry
    and the Gentiles as an offering acceptable to God, not of Paul offering an atoning
    sacrifice.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Referent of 'the offering of the Gentiles'
  chosen_reading: The Gentiles themselves are presented to God as the offering resulting
    from Paul's gospel ministry.
  alternative_readings:
  - An offering made by the Gentiles
  rationale: The immediate priestly metaphor and Paul's mission context favor understanding
    the converted Gentiles as what is offered to God. The Greek genitive allows some
    ambiguity, so the more explicit alternative is noted lexically rather than forced
    into the main text.
  doctrine_reference: Translation philosophy §3
