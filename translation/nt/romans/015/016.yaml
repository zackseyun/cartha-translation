id: ROM.15.16
reference: Romans 15:16
source:
  edition: SBLGNT
  text: εἰς τὸ εἶναί με λειτουργὸν ⸂Χριστοῦ Ἰησοῦ⸃ εἰς τὰ ἔθνη, ἱερουργοῦντα τὸ εὐαγγέλιον
    τοῦ θεοῦ, ἵνα γένηται ἡ προσφορὰ τῶν ἐθνῶν εὐπρόσδεκτος, ἡγιασμένη ἐν πνεύματι
    ἁγίῳ.
translation:
  text: to be a minister of Messiah Jesus to the Gentiles, serving as a priest in
    the gospel of God, so that the offering of the Gentiles may become acceptable,
    sanctified by the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the nations."
    reason: lexical_alternative
  - marker: b
    text: Or "ministering priestly" or "performing priestly service."
    reason: lexical_alternative
  - marker: c
    text: That is, likely the Gentiles themselves presented to God as an offering;
      alternatively, "the offering made by the Gentiles."
    reason: alternative_reading
  - marker: d
    text: Or "sanctified in the Holy Spirit."
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργὸν
  chosen: minister
  alternatives:
  - servant
  - public servant
  lexicon: BDAG
  rationale: λειτουργός can denote one engaged in public/religious service. Here,
    with the accompanying priestly participle ἱερουργοῦντα, 'minister' preserves both
    service and sacred connotation without overstating a formal cultic office beyond
    Paul's metaphor.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title.
    In this Pauline phrase the titular sense remains clear, so 'Messiah Jesus' preserves
    the meaning of the Greek rather than defaulting to traditional 'Christ Jesus'.
- source_word: εἰς τὰ ἔθνη
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Romans, ἔθνη in contrastive Jewish/Gentile contexts normally refers
    to non-Jews. 'Gentiles' is the clearest contextual rendering, though 'nations'
    is a more literal alternative worth preserving.
- source_word: ἱερουργοῦντα
  chosen: serving as a priest
  alternatives:
  - ministering priestly
  - performing priestly service
  lexicon: BDAG
  rationale: The participle is cultic and specifically priestly, not merely general
    service. 'Serving as a priest' communicates the metaphor in natural English while
    avoiding an awkwardly literal participial form.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  chosen: the gospel of God
  alternatives:
  - God's gospel
  - the good news of God
  lexicon: BDAG
  rationale: This preserves the familiar Pauline expression with transparent meaning.
    'Gospel' is retained as standard Christian vocabulary; 'good news' is possible
    but less consistent with Pauline usage across the corpus.
- source_word: προσφορὰ τῶν ἐθνῶν
  chosen: the offering of the Gentiles
  alternatives:
  - the offering consisting of the Gentiles
  - the Gentiles as an offering
  lexicon: BDAG
  rationale: The genitive likely indicates that the Gentiles themselves, as won to
    God, are the offering Paul presents. 'The offering of the Gentiles' keeps the
    Greek structure while allowing the metaphorical sense to emerge from context;
    the more explicit paraphrases are preserved as alternatives.
- source_word: εὐπρόσδεκτος
  chosen: acceptable
  alternatives:
  - well-pleasing
  - favorably received
  lexicon: BDAG
  rationale: '''Acceptable'' is idiomatic in sacrificial contexts and matches the
    idea of an offering received by God.'
- source_word: ἡγιασμένη
  chosen: sanctified
  alternatives:
  - made holy
  - consecrated
  lexicon: BDAG
  rationale: The perfect passive participle denotes a state resulting from consecrating
    action. 'Sanctified' preserves the theological register and connection to holiness
    language in Paul.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: by the Holy Spirit
  alternatives:
  - in the Holy Spirit
  lexicon: BDAG
  rationale: Here ἐν is rendered instrumentally to express the agency or means by
    which the offering is sanctified. Because the phrase can also be read locatively/spherically,
    that alternative is preserved in a footnote.
