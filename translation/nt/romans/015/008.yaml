id: ROM.15.8
reference: Romans 15:8
source:
  edition: SBLGNT
  text: λέγω ⸀γὰρ ⸀Χριστὸν διάκονον ⸀γεγενῆσθαι περιτομῆς ὑπὲρ ἀληθείας θεοῦ, εἰς
    τὸ βεβαιῶσαι τὰς ἐπαγγελίας τῶν πατέρων,
translation:
  text: For I say that the Messiah has become a servant of the circumcised for the
    sake of God's truth, in order to confirm the promises to the fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for the sake of God's truthfulness," highlighting God's faithfulness
      in keeping his covenant promises.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ
  chosen: For I say
  alternatives:
  - For I tell you
  - For I mean
  lexicon: BDAG
  rationale: γάρ is explanatory, so 'For' preserves the logical connection. λέγω in
    Pauline discourse is naturally rendered 'I say' rather than a more colloquial
    expansion.
- source_word: Χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here it is anarthrous in Greek but clearly
    titular in sense within salvation-historical argumentation.
- source_word: διάκονον
  chosen: a servant
  alternatives:
  - a minister
  - a deacon
  lexicon: BDAG
  rationale: διάκονος here denotes one who serves in a commissioned role. 'Servant'
    is the clearest modern English choice and avoids importing the later ecclesial
    office sense of 'deacon.'
- source_word: γεγενῆσθαι
  chosen: has become
  alternatives:
  - has been made
  - became
  lexicon: BDAG
  rationale: The perfect infinitive of γίνομαι conveys a state resulting from becoming.
    'Has become' best preserves that aspect in idiomatic English.
- source_word: περιτομῆς
  chosen: of the circumcised
  alternatives:
  - of the circumcision
  - for the circumcision
  lexicon: BDAG
  rationale: The genitive refers to the circumcised people, i.e., Jews. 'Of the circumcised'
    is more transparent for modern readers than the idiomatic but less clear 'of the
    circumcision.'
- source_word: ὑπὲρ ἀληθείας θεοῦ
  chosen: for the sake of God's truth
  alternatives:
  - on behalf of the truth of God
  - for the truthfulness of God
  lexicon: BDAG
  rationale: ὑπέρ here expresses purpose/benefit. 'For the sake of' is natural English.
    ἀλήθεια θεοῦ can mean God's truth or truthfulness; in this context of covenant
    fidelity, 'God's truth' is concise while a footnote preserves 'truthfulness' as
    a viable nuance.
- source_word: εἰς τὸ βεβαιῶσαι
  chosen: in order to confirm
  alternatives:
  - to establish
  - to validate
  lexicon: BDAG
  rationale: The construction expresses purpose. βεβαιόω here concerns making firm
    or confirming covenant promises; 'confirm' is both accurate and readable.
- source_word: τὰς ἐπαγγελίας
  chosen: the promises
  alternatives:
  - the pledged promises
  lexicon: BDAG
  rationale: Standard rendering of ἐπαγγελίαι in Pauline covenantal context.
- source_word: τῶν πατέρων
  chosen: to the fathers
  alternatives:
  - to the patriarchs
  - to the ancestors
  lexicon: BDAG
  rationale: '''The fathers'' preserves the source wording and its salvation-historical
    specificity, referring to Israel''s patriarchal forefathers. ''Ancestors'' is
    broader and less precise; ''patriarchs'' is interpretive though plausible.'
