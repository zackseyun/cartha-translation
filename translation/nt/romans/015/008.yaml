theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in a context emphasizing Israel, circumcision,
    and the patriarchal promises. This aligns with the project's policy to translate
    titles where context supports it.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; Translation philosophy §2'
- issue: Nuance of ἀλήθεια θεοῦ
  chosen_reading: God's truth
  alternative_readings:
  - God's truthfulness
  rationale: The phrase can denote either God's truth in a broad sense or his truthfulness/fidelity
    in keeping covenant promises. Because the following clause explicitly mentions
    confirming the promises to the fathers, the covenant-faithfulness nuance is strong;
    this is preserved in a footnote rather than overloaded into the main text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 preserve theological
    tension rather than resolve it'
