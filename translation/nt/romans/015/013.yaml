id: ROM.15.13
reference: Romans 15:13
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς τῆς ἐλπίδος πληρώσαι ὑμᾶς πάσης χαρᾶς καὶ εἰρήνης ἐν τῷ πιστεύειν,
    εἰς τὸ περισσεύειν ὑμᾶς ἐν τῇ ἐλπίδι ἐν δυνάμει πνεύματος ἁγίου.
translation:
  text: Now may the God of hope fill you with all joy and peace in believing, so that
    you may abound in hope by the power of the Holy Spirit.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ θεὸς τῆς ἐλπίδος
  chosen: Now may the God of hope
  alternatives:
  - And may the God of hope
  - May the God of hope
  lexicon: BDAG
  rationale: 'δὲ is mildly connective; ''Now'' preserves the transition without overstating
    contrast. The genitive τῆς ἐλπίδος is best taken attributively/descriptively:
    God characterized as the source/object of hope, idiomatically ''the God of hope.'''
- source_word: πληρώσαι
  chosen: fill
  alternatives:
  - cause ... to be full
  - fully fill
  lexicon: BDAG
  rationale: Aorist optative in a benedictory/wish construction is naturally rendered
    'may ... fill.' 'Fill' is idiomatic and preserves the metaphor of fullness.
- source_word: πάσης χαρᾶς καὶ εἰρήνης
  chosen: with all joy and peace
  alternatives:
  - with every joy and peace
  - with all gladness and peace
  lexicon: BDAG
  rationale: Genitives after πληρόω are content genitives. 'Joy' and 'peace' are standard,
    clear renderings; 'all' preserves πάσης as comprehensive.
- source_word: ἐν τῷ πιστεύειν
  chosen: in believing
  alternatives:
  - as you believe
  - in faith
  - while believing
  lexicon: BDAG
  rationale: 'The articular infinitive with ἐν is most naturally rendered as sphere
    or circumstance: ''in believing.'' This keeps close to the Greek while remaining
    natural English. Because πιστεύω here denotes the act/state of believing rather
    than the noun πίστις, ''in faith'' would be less precise.'
- source_word: εἰς τὸ περισσεύειν ὑμᾶς
  chosen: so that you may abound
  alternatives:
  - for you to abound
  - resulting in your abounding
  lexicon: BDAG
  rationale: εἰς τὸ + infinitive commonly expresses purpose or result. In this prayer
    context, 'so that you may abound' communicates intended result clearly and idiomatically.
- source_word: ἐν τῇ ἐλπίδι
  chosen: in hope
  alternatives:
  - with hope
  - in the hope
  lexicon: BDAG
  rationale: The dative with ἐν is retained as 'in hope.' The article is not usually
    reproduced in English here. This also preserves the lexical link with earlier
    ἐλπίδος.
- source_word: ἐν δυνάμει
  chosen: by the power
  alternatives:
  - in power
  - through the power
  lexicon: BDAG
  rationale: 'Instrumental nuance is prominent: the believers'' abounding in hope
    occurs by means of divine power. ''By the power'' is natural and clear.'
- source_word: πνεύματος ἁγίου
  chosen: of the Holy Spirit
  alternatives:
  - of Holy Spirit
  lexicon: BDAG
  rationale: In Pauline usage this refers to the divine Holy Spirit. English idiom
    normally includes the article and capitalizes the title.
