theological_decisions:
- issue: Rendering of πνεύματος ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - holy spirit
  rationale: Given Pauline context and historic orthodox reading, the phrase denotes
    the personal divine Spirit, not merely a disposition or impersonal force. Capitalization
    and article in English communicate this referent without adding content beyond
    the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy:
    do not import doctrinal claims the text does not make, but preserve plain sense.'
