id: ROM.15.3
reference: Romans 15:3
source:
  edition: SBLGNT
  text: καὶ γὰρ ὁ Χριστὸς οὐχ ἑαυτῷ ἤρεσεν· ἀλλὰ καθὼς γέγραπται· Οἱ ὀνειδισμοὶ τῶν
    ὀνειδιζόντων σε ἐπέπεσαν ἐπ’ ἐμέ.
translation:
  text: For even the Messiah did not please himself, but as it is written, “The reproaches
    of those who reproached you fell on me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ” for “the Messiah.”
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For even
  alternatives:
  - For
  - Indeed even
  - For also
  lexicon: BDAG
  rationale: The combination is inferential and emphatic, linking this verse to the
    preceding exhortation while stressing Christ as the supporting example. 'For even'
    preserves both functions in natural English.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like designation. Here the article and exemplary force favor
    title usage.
- source_word: οὐχ ἑαυτῷ ἤρεσεν
  chosen: did not please himself
  alternatives:
  - did not seek his own pleasure
  - did not live to please himself
  lexicon: BDAG
  rationale: A close rendering best preserves the verbal idea of pleasing and the
    reflexive pronoun. More interpretive alternatives are possible but go beyond the
    Greek's compact expression.
- source_word: ἀλλὰ καθὼς γέγραπται
  chosen: but as it is written
  alternatives:
  - but rather, as it is written
  - instead, as it has been written
  lexicon: BDAG
  rationale: This is the standard scriptural citation formula. 'It is written' communicates
    the force of the perfect γέγραπται in idiomatic English.
- source_word: ὀνειδισμοί
  chosen: reproaches
  alternatives:
  - insults
  - taunts
  - revilings
  lexicon: BDAG
  rationale: '''Reproaches'' preserves the formal and biblical tone of the citation
    while accurately conveying verbal abuse and disgrace.'
- source_word: τῶν ὀνειδιζόντων σε
  chosen: of those who reproached you
  alternatives:
  - of those insulting you
  - of your reproachers
  lexicon: BDAG
  rationale: The participial construction is rendered with a relative-like phrase
    for natural English while keeping the repeated cognate idea with ὀνειδισμοί.
- source_word: ἐπέπεσαν ἐπ’ ἐμέ
  chosen: fell on me
  alternatives:
  - have fallen on me
  - came upon me
  lexicon: BDAG
  rationale: The aorist is best rendered as simple past within the quotation. 'Fell
    on me' is the most direct equivalent of the idiom.
