theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The verse presents Jesus in his messianic representative role as the
    model for believers, and the article supports title usage. This follows the project's
    default for Χριστός where context supports a title sense.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Voice of the Scripture quotation
  chosen_reading: The quotation is rendered straightforwardly without specifying more
    than the text states about speaker identity.
  alternative_readings:
  - Interpreting the 'me' explicitly as Messiah/Christ in the translation
  rationale: Paul applies Psalm 69:9 to the Messiah, but the translation should preserve
    the citation as written rather than importing explanatory identification into
    the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; original-language primacy'
