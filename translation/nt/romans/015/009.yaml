theological_decisions:
- issue: Referent and force of the opening infinitival clause
  chosen_reading: 'The clause is rendered as a continuation of Paul''s argument from
    the previous verse: Christ''s ministry results in the Gentiles glorifying God
    for mercy.'
  alternative_readings:
  - 'A more wooden fragment: ''and the Gentiles to glorify God for mercy'''
  rationale: 'The Greek here is syntactically dependent on v. 8. Supplying ''might''
    in English makes the logic intelligible without importing extra theology. ''Mercy''
    highlights the asymmetry in Paul''s Jew/Gentile contrast: promises confirmed to
    Israel, mercy extended to the Gentiles.'
  doctrine_reference: Translation philosophy §1, §3
