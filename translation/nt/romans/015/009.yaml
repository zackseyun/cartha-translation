id: ROM.15.9
reference: Romans 15:9
source:
  edition: SBLGNT
  text: τὰ δὲ ἔθνη ὑπὲρ ἐλέους δοξάσαι τὸν θεόν· καθὼς γέγραπται· Διὰ τοῦτο ἐξομολογήσομαί
    σοι ἐν ἔθνεσι, καὶ τῷ ὀνόματί σου ψαλῶ.
translation:
  text: and the Gentiles might glorify God for his mercy, as it is written, “Therefore
    I will praise you among the Gentiles, and sing praise to your name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “among the nations” (for both occurrences of ἔθνη/ἔθνεσι). Paul’s argument
      applies the citation to the Gentiles specifically, but the underlying quotation
      also carries the broader sense “nations.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: In Romans, ἔθνη commonly refers to non-Jewish peoples in contrast to
    Jews; 'Gentiles' best captures Paul's ethnic-redemptive context here. The quotation
    also uses ἔθνεσι; retaining 'Gentiles' there preserves Paul's application, though
    'among the nations' is a viable more formal alternative.
- source_word: ὑπὲρ ἐλέους
  chosen: for his mercy
  alternatives:
  - because of mercy
  - on account of mercy
  lexicon: BDAG
  rationale: ὑπέρ with the genitive here expresses reason or basis. 'For his mercy'
    is idiomatic English and makes explicit that the mercy is God's, as required by
    the sense.
- source_word: δοξάσαι
  chosen: might glorify
  alternatives:
  - to glorify
  lexicon: BDAG
  rationale: The aorist infinitive depends on the preceding clause from v. 8 and expresses
    purpose/result in parallel with Christ's ministry to the circumcised. 'Might glorify'
    communicates this subordinate, purposive sense in natural English.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it is written
  lexicon: BDAG
  rationale: Standard citation formula; 'as it is written' is clear, natural, and
    preserves the scriptural appeal.
- source_word: ἐξομολογήσομαί
  chosen: I will praise
  alternatives:
  - I will confess
  - I will give thanks
  lexicon: BDAG
  rationale: In this citation context the verb carries the sense of public praise/thanksgiving
    to God rather than confession of sin. 'Praise' fits the parallel with ψαλῶ and
    the worship setting.
- source_word: ἐν ἔθνεσι
  chosen: among the Gentiles
  alternatives:
  - among the nations
  lexicon: BDAG
  rationale: ἐν with the dative is locative here, 'among.' Because Paul cites this
    text to support Gentile inclusion, 'among the Gentiles' brings out his argumentative
    use, while 'among the nations' remains a defensible more literal rendering of
    the Psalm context.
- source_word: ψαλῶ
  chosen: sing praise
  alternatives:
  - sing psalms
  - make melody
  lexicon: BDAG
  rationale: ψάλλω in Koine commonly means to sing praise. 'Sing praise' is natural
    modern English and preserves the worshipful force without implying only canonical
    psalms.
- source_word: τῷ ὀνόματί σου
  chosen: to your name
  alternatives:
  - for your name
  lexicon: BDAG
  rationale: The dative after ψαλῶ is naturally rendered 'to your name,' preserving
    the biblical idiom of praising God's revealed name.
