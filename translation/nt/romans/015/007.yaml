id: ROM.15.7
reference: Romans 15:7
source:
  edition: SBLGNT
  text: Διὸ προσλαμβάνεσθε ἀλλήλους, καθὼς καὶ ὁ Χριστὸς προσελάβετο ⸀ὑμᾶς, εἰς δόξαν
    ⸀τοῦ θεοῦ.
translation:
  text: Therefore welcome one another, just as the Messiah also welcomed you, to the
    glory of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'accept one another' / 'receive one another.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for the glory of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' is natural
    English and preserves the logical connection.
- source_word: προσλαμβάνεσθε
  chosen: welcome
  alternatives:
  - accept
  - receive
  lexicon: BDAG
  rationale: The middle/passive-form imperative here calls for mutual reception. 'Welcome'
    best conveys active, relational acceptance in context, stronger and warmer than
    mere 'accept' while remaining faithful to the verb's sense.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English; preserves the mutual force
    of the pronoun.
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - just as
  lexicon: BDAG
  rationale: Represents both comparison and the additive καί. English idiom places
    'also' with the following clause.
- source_word: ὁ Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the article supports titular force.
- source_word: προσελάβετο
  chosen: welcomed
  alternatives:
  - accepted
  - received
  lexicon: BDAG
  rationale: Uses the same English gloss as προσλαμβάνεσθε to preserve the verbal
    parallel Paul makes between the believers' action and the Messiah's action toward
    them.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object of προσελάβετο; straightforward second-person plural sense,
    naturally rendered 'you' in English.
- source_word: εἰς δόξαν τοῦ θεοῦ
  chosen: to the glory of God
  alternatives:
  - for the glory of God
  - resulting in God's glory
  lexicon: BDAG
  rationale: εἰς with δόξαν expresses goal or result. 'To the glory of God' is idiomatic,
    concise, and preserves the teleological force without overinterpreting.
