theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title here, and the doctrinal guidance prefers
    'Messiah' in such contexts to preserve the Hebraic messianic sense. This does
    not alter orthodox Christology but clarifies the title's meaning.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos*'
- issue: Nuance of προσλαμβάνομαι in ecclesial context
  chosen_reading: welcome one another
  alternative_readings:
  - accept one another
  - receive one another
  rationale: The verse addresses communal reception between believers, likely across
    Jew-Gentile and strong-weak differences in Romans 14–15. 'Welcome' preserves the
    ethical force without importing a narrower doctrinal claim.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6'
