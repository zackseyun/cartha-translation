theological_decisions:
- issue: Ethical scope of pleasing the neighbor
  chosen_reading: The command is qualified by the neighbor's good and edification,
    not by people-pleasing as an absolute value.
  alternative_readings:
  - A broader reading that could sound like unqualified accommodation of others
  rationale: Paul's wording includes two purpose phrases that restrict the sense of
    'please' to what benefits and builds up the neighbor. The translation keeps both
    qualifiers explicit to avoid importing an unbounded ethic of approval-seeking.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims.'
