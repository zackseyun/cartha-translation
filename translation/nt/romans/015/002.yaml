id: ROM.15.2
reference: Romans 15:2
source:
  edition: SBLGNT
  text: ἕκαστος ἡμῶν τῷ πλησίον ἀρεσκέτω εἰς τὸ ἀγαθὸν πρὸς οἰκοδομήν·
translation:
  text: Let each of us please his neighbor for his good, for building him up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for good' or 'unto what is good.' The Greek phrase emphasizes what is
      beneficial, not mere gratification.
    reason: lexical_alternative
  - marker: b
    text: Or 'for edification.' The Greek literally refers to 'building up,' used
      metaphorically for strengthening another person.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος ἡμῶν
  chosen: each of us
  alternatives:
  - every one of us
  lexicon: BDAG
  rationale: Natural rendering of the distributive singular with partitive genitive;
    preserves the individual exhortation addressed to the whole group.
- source_word: τῷ πλησίον
  chosen: his neighbor
  alternatives:
  - the neighbor
  - his fellow person
  lexicon: BDAG
  rationale: πλησίον here means one's fellow/neighbor in an ethical sense. 'His neighbor'
    fits the generic singular construction in English and follows the project's gender-accurate
    policy for representative masculine forms.
- source_word: ἀρεσκέτω
  chosen: let ... please
  alternatives:
  - let ... seek to please
  - must please
  lexicon: BDAG
  rationale: 'Present active imperative, third singular: an exhortation, not merely
    a suggestion. ''Let ... please'' preserves the imperative force without overtranslating
    aspect.'
- source_word: εἰς τὸ ἀγαθὸν
  chosen: for his good
  alternatives:
  - for good
  - unto what is good
  lexicon: BDAG
  rationale: The phrase indicates goal or benefit. 'For his good' makes explicit that
    the pleasing in view is not flattery but the neighbor's benefit, in context tied
    to edification.
- source_word: πρὸς οἰκοδομήν
  chosen: for building him up
  alternatives:
  - for edification
  - toward building up
  lexicon: BDAG
  rationale: οἰκοδομή is metaphorical for spiritual strengthening/edification. 'Building
    him up' preserves the metaphor in readable modern English better than the ecclesiastical
    term 'edification.' The object 'him' is supplied naturally from the singular neighbor
    in context.
