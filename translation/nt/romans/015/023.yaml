id: ROM.15.23
reference: Romans 15:23
source:
  edition: SBLGNT
  text: νυνὶ δὲ μηκέτι τόπον ἔχων ἐν τοῖς κλίμασι τούτοις, ἐπιποθίαν δὲ ἔχων τοῦ ἐλθεῖν
    πρὸς ὑμᾶς ἀπὸ ⸀ἱκανῶν ἐτῶν,
translation:
  text: But now, no longer having any place in these regions, and having had a longing
    for many years to come to you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having room/opportunity in these regions'; the Greek expression can
      refer to no remaining scope for ministry there, not merely no physical location.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now however
  - But as it is now
  lexicon: BDAG
  rationale: Renders the transitional force of δέ with the temporal adverb νυνί in
    natural English while preserving Paul's shift to his present situation.
- source_word: μηκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating cessation of a previous condition.
- source_word: τόπον ἔχων
  chosen: having any place
  alternatives:
  - having room
  - having opportunity
  - having a place
  lexicon: BDAG
  rationale: τόπος here is metaphorical for scope or room for ministry, not literal
    geography alone. 'Any place' preserves the idiom while remaining readable. 'Opportunity'
    is interpretive and therefore kept as an alternative only.
- source_word: ἐν τοῖς κλίμασι τούτοις
  chosen: in these regions
  alternatives:
  - in these parts
  - in these districts
  lexicon: BDAG
  rationale: κλίμασι refers to geographical regions/areas. 'Regions' is clear modern
    English and fits Paul's missionary context.
- source_word: ἐπιποθίαν ... ἔχων
  chosen: having had a longing
  alternatives:
  - having a strong desire
  - longing
  lexicon: BDAG
  rationale: The participial construction is retained. ἐπιποθία denotes strong desire
    or longing. 'Having had' works with ἀπὸ ἱκανῶν ἐτῶν ('for many years') to express
    a desire extending over time.
- source_word: τοῦ ἐλθεῖν πρὸς ὑμᾶς
  chosen: to come to you
  alternatives:
  - to visit you
  - to come to be with you
  lexicon: BDAG
  rationale: A straightforward infinitival construction of purpose/content. 'Come
    to you' is more formally aligned than 'visit you,' which adds nuance not explicit
    in the Greek.
- source_word: ἀπὸ ἱκανῶν ἐτῶν
  chosen: for many years
  alternatives:
  - for quite a few years
  - for a long time
  lexicon: BDAG
  rationale: Although literally 'from many years,' idiomatic English is 'for many
    years,' expressing duration from the past up to the present.
