id: ROM.15.29
reference: Romans 15:29
source:
  edition: SBLGNT
  text: οἶδα δὲ ὅτι ἐρχόμενος πρὸς ὑμᾶς ἐν πληρώματι ⸀εὐλογίας Χριστοῦ ἐλεύσομαι.
translation:
  text: And I know that when I come to you, I will come in the fullness of the blessing
    of the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the blessing of Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am sure
  - I am convinced
  lexicon: BDAG
  rationale: οἶδα regularly expresses knowledge or certainty. 'I know' preserves Paul's
    confident assertion without softening it into mere opinion.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective moving the discourse forward.
    'And' is natural English and avoids overstating contrast.
- source_word: ἐρχόμενος πρὸς ὑμᾶς
  chosen: when I come to you
  alternatives:
  - coming to you
  - as I come to you
  lexicon: BDAG
  rationale: The participle ἐρχόμενος with πρὸς ὑμᾶς is temporal in sense relative
    to the future main verb. 'When I come to you' gives idiomatic English while preserving
    the participial relationship.
- source_word: ἐλεύσομαι
  chosen: I will come
  alternatives:
  - I will arrive
  lexicon: BDAG
  rationale: 'The future middle of ἔρχομαι is straightforwardly future: Paul states
    that his coming will occur in a certain manner. ''I will come'' is the most direct
    rendering.'
- source_word: ἐν πληρώματι
  chosen: in the fullness
  alternatives:
  - with the fullness
  - in full measure
  lexicon: BDAG
  rationale: ἐν with the dative can express accompanying circumstance or manner. 'In
    the fullness' preserves the metaphor of abundance/completeness carried by πλήρωμα
    better than a flatter paraphrase.
- source_word: εὐλογίας
  chosen: of the blessing
  alternatives:
  - of blessing
  lexicon: BDAG
  rationale: 'The genitive is most naturally taken as attributive/content-related
    with πλήρωμα: a fullness characterized by blessing. Including the article in English
    yields a more natural phrase.'
- source_word: Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the genitive identifies the source
    or character of the blessing as belonging to the Messiah.
