theological_decisions:
- issue: Rendering Χριστόν
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Here Χριστός functions as a title rather than a fixed name, and the doctrine
    guidelines prefer 'Messiah' where context supports. This preserves the title's
    meaning without importing extra doctrinal nuance.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Meaning of ἀπαρχὴ τῆς Ἀσίας εἰς Χριστόν
  chosen_reading: who is the firstfruits of Asia for the Messiah
  alternative_readings:
  - who was the first convert in Asia to Christ
  - who is the firstfruits of Asia in Christ
  rationale: The phrase likely means Epaenetus was the earliest believer from/probably
    in Asia connected to the Messiah. The main text preserves Paul's metaphor 'firstfruits'
    rather than resolving it into the interpretive gloss 'first convert.' Because
    the construction is somewhat idiomatic, the alternative should be preserved in
    a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
