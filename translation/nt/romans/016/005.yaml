id: ROM.16.5
reference: Romans 16:5
source:
  edition: SBLGNT
  text: καὶ τὴν κατ’ οἶκον αὐτῶν ἐκκλησίαν. ἀσπάσασθε Ἐπαίνετον τὸν ἀγαπητόν μου,
    ὅς ἐστιν ἀπαρχὴ τῆς ⸀Ἀσίας εἰς Χριστόν.
translation:
  text: Also greet the church in their house. Greet Epaenetus, my beloved, who is
    the firstfruits of Asia for the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the church that meets in their house.'
    reason: lexical_alternative
  - marker: b
    text: That is, the Roman province of Asia, not the modern continent.
    reason: cultural_note
  - marker: c
    text: Or, 'who was the first convert in Asia to Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: κατ’ οἶκον αὐτῶν ἐκκλησίαν
  chosen: the church in their house
  alternatives:
  - the church that meets in their house
  - their house church
  lexicon: BDAG
  rationale: The phrase literally denotes the assembly associated with or meeting
    in their house. 'The church in their house' stays close to the Greek while remaining
    natural English. 'That meets in' is interpretive but plausible; 'house church'
    is idiomatic but less formally transparent.
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Give greetings to
  lexicon: BDAG
  rationale: In epistolary greeting lists, ἀσπάζομαι is best rendered 'greet.' It
    is concise, idiomatic, and standard for this context.
- source_word: Ἐπαίνετον
  chosen: Epaenetus
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: ἀγαπητόν μου
  chosen: my beloved
  alternatives:
  - my dear one
  - the one I love
  lexicon: BDAG
  rationale: ἀγαπητός here expresses warm personal affection. 'My beloved' preserves
    the elevated but still understandable tone and reflects the adjective closely.
- source_word: ἀπαρχὴ
  chosen: the firstfruits
  alternatives:
  - the first convert
  - the first portion
  lexicon: BDAG
  rationale: ἀπαρχή literally means 'firstfruits' and carries metaphorical theological
    resonance of the first portion offered to God. Although 'first convert' captures
    the sense in context, 'firstfruits' better preserves Paul's imagery.
- source_word: τῆς Ἀσίας
  chosen: of Asia
  alternatives:
  - in Asia
  - of the province of Asia
  lexicon: BDAG
  rationale: The genitive most naturally yields 'of Asia.' In the NT this refers to
    the Roman province of Asia, not the modern continent; that clarification is best
    preserved in a footnote rather than expanded in the main text.
- source_word: εἰς Χριστόν
  chosen: for the Messiah
  alternatives:
  - for Christ
  - to Christ
  - in Christ
  lexicon: BDAG
  rationale: 'With ἀπαρχή, εἰς can express goal or relation: Epaenetus is the firstfruits
    belonging with reference to Christ/Messiah, i.e., the firstfruits for the Messiah.
    Per doctrine, Χριστός as a title is rendered ''Messiah'' where context supports.
    ''For the Messiah'' is more natural here than the more wooden ''into Messiah.'''
