theological_decisions:
- issue: Rendering Χριστός in a Pauline title phrase
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The phrase presents Χριστός as a title, not merely a fixed surname-like
    element. Following the doctrine's contested-terms guidance, the title is translated
    as 'Messiah' in the main text while the traditional 'Christ' is preserved as an
    alternative.
