id: ROM.16.18
reference: Romans 16:18
source:
  edition: SBLGNT
  text: οἱ γὰρ τοιοῦτοι τῷ κυρίῳ ⸀ἡμῶν Χριστῷ οὐ δουλεύουσιν ἀλλὰ τῇ ἑαυτῶν κοιλίᾳ,
    καὶ διὰ τῆς χρηστολογίας καὶ εὐλογίας ἐξαπατῶσι τὰς καρδίας τῶν ἀκάκων.
translation:
  text: For such people do not serve our Lord Messiah, but their own belly, and by
    smooth talk and flattery they deceive the hearts of the unsuspecting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'our Lord Christ.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'their own belly,' a vivid image for self-indulgent desire.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the innocent' or 'the guileless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιοῦτοι
  chosen: such people
  alternatives:
  - such men
  - such ones
  lexicon: BDAG
  rationale: Refers back to the divisive persons of the previous verse. 'Such people'
    is natural modern English and avoids an unnecessarily wooden 'such ones' while
    preserving the demonstrative force.
- source_word: κυρίῳ ἡμῶν Χριστῷ
  chosen: our Lord Messiah
  alternatives:
  - our Lord Christ
  - our Lord Jesus Christ
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per default. Χριστός is rendered 'Messiah'
    as a title rather than a name-like form, following the doctrine guideline. 'Jesus'
    is not present in the Greek and should not be supplied.
- source_word: δουλεύουσιν
  chosen: serve
  alternatives:
  - are slaves to
  - render service to
  lexicon: BDAG
  rationale: The verb means 'serve as a slave/be subject to.' Here the contrast is
    between serving the Lord and serving their own belly. English 'serve' communicates
    the idiom naturally; the bonded nuance is less foregrounded than when δοῦλος itself
    appears as a noun.
- source_word: κοιλίᾳ
  chosen: belly
  alternatives:
  - stomach
  - appetite
  lexicon: BDAG
  rationale: A literal rendering preserves Paul's vivid metaphor. 'Appetite' captures
    the sense but interprets the image; 'belly' keeps the concrete expression and
    allows the broader idea of self-indulgent desire.
- source_word: χρηστολογίας
  chosen: smooth talk
  alternatives:
  - kind speech
  - plausible speech
  - fine-sounding words
  lexicon: BDAG
  rationale: The term denotes pleasant, ingratiating speech. 'Smooth talk' is idiomatic
    modern English and fits the deceptive context better than the overly literal 'kind
    speech.'
- source_word: εὐλογίας
  chosen: flattery
  alternatives:
  - blessing
  - praise
  - fair speech
  lexicon: BDAG
  rationale: In this context the word refers to flattering speech rather than actual
    blessing. 'Flattery' best captures the manipulative sense in parallel with χρηστολογία.
- source_word: ἐξαπατῶσι
  chosen: deceive
  alternatives:
  - thoroughly deceive
  - mislead
  lexicon: BDAG
  rationale: The compound verb intensifies the idea of deception, but standard English
    'deceive' adequately conveys the sense in context without awkwardness.
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - minds
  - inner selves
  lexicon: BDAG
  rationale: '''Hearts'' is the standard biblical rendering and preserves the anthropological
    sense of the inner person rather than reducing it to intellect alone.'
- source_word: ἀκάκων
  chosen: the unsuspecting
  alternatives:
  - the innocent
  - the naive
  - the guileless
  lexicon: BDAG
  rationale: The adjective can mean innocent, guileless, or unsuspecting. In this
    warning context, 'unsuspecting' best conveys vulnerability to deception without
    implying moral guilt or complete simplicity.
