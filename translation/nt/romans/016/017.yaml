id: ROM.16.17
reference: Romans 16:17
source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, σκοπεῖν τοὺς τὰς διχοστασίας καὶ τὰ σκάνδαλα παρὰ
    τὴν διδαχὴν ἣν ὑμεῖς ἐμάθετε ποιοῦντας, καὶ ⸀ἐκκλίνετε ἀπ’ αὐτῶν·
translation:
  text: Now I urge you, brothers, to watch out for those who cause divisions and stumbling
    blocks contrary to the teaching that you learned, and turn away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and likely addresses
      the whole congregation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: παρακαλέω here introduces a strong pastoral appeal. 'I urge' is natural
    modern English and preserves the earnest force without sounding overly formal.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative masculine plural is retained as 'brothers' in keeping with
    the gender-accurate policy. In Pauline usage it often addresses the whole congregation,
    so an inclusivity note is appropriate rather than changing the main text.
- source_word: σκοπεῖν
  chosen: to watch out for
  alternatives:
  - to keep an eye on
  - to mark
  - to observe carefully
  lexicon: BDAG
  rationale: The infinitive depends on 'I urge you' and calls for alert attention
    to certain people. 'Watch out for' communicates both notice and caution better
    than the more archaic 'mark'.
- source_word: διχοστασίας
  chosen: divisions
  alternatives:
  - dissensions
  - factions
  lexicon: BDAG
  rationale: '''Divisions'' is the clearest and most natural rendering in context,
    referring to schismatic disruptions within the community.'
- source_word: σκάνδαλα
  chosen: stumbling blocks
  alternatives:
  - offenses
  - obstacles
  - causes of stumbling
  lexicon: BDAG
  rationale: σκάνδαλα literally evokes causes of stumbling. 'Stumbling blocks' preserves
    the metaphor and avoids flattening it to mere personal offense.
- source_word: παρὰ τὴν διδαχήν
  chosen: contrary to the teaching
  alternatives:
  - beside the teaching
  - against the teaching
  lexicon: BDAG
  rationale: With παρά plus accusative, the sense is deviation from or opposition
    to the standard of teaching received. 'Contrary to the teaching' captures this
    well.
- source_word: διδαχήν
  chosen: the teaching
  alternatives:
  - the doctrine
  - the instruction
  lexicon: BDAG
  rationale: '''Teaching'' is more readable modern English than ''doctrine'' while
    still conveying authoritative apostolic instruction.'
- source_word: ἐμάθετε
  chosen: you learned
  alternatives:
  - you received instruction in
  - you were taught
  lexicon: BDAG
  rationale: The aorist points to the instruction the Roman believers had already
    learned. 'You learned' is direct and idiomatic.
- source_word: ποιοῦντας
  chosen: who cause
  alternatives:
  - who are making
  - who produce
  - who are doing
  lexicon: BDAG
  rationale: 'The participle modifies ''those'' and in context means producing or
    causing divisions and stumbling blocks. English idiom prefers an explicit relative
    clause: ''those who cause...''.'
- source_word: ἐκκλίνετε ἀπ’ αὐτῶν
  chosen: turn away from them
  alternatives:
  - avoid them
  - keep away from them
  lexicon: BDAG
  rationale: ἐκκλίνω means to turn aside or away. 'Turn away from them' preserves
    the directional imagery and the imperative force; 'avoid them' is possible but
    slightly less literal.
