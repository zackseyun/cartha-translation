theological_decisions:
- issue: Representative force of ἀδελφοί in address to the Roman congregation
  chosen_reading: Retain 'brothers' in the main text and note likely mixed-gender
    reference in a footnote.
  alternative_readings:
  - Render inclusively in the main text as 'brothers and sisters'
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings. Since the masculine plural vocative likely addresses the whole church,
    the inclusive force is preserved by annotation rather than by altering the main
    text.
