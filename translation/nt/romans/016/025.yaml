id: ROM.16.25
reference: Romans 16:25
source:
  edition: robinson-pierpont-2005-byzantine
  text: Τῷ δὲ δυναμένῳ ὑμᾶς στηρίξαι κατὰ τὸ εὐαγγέλιόν μου καὶ τὸ κήρυγμα Ἰησοῦ Χριστοῦ, κατὰ ἀποκάλυψιν μυστηρίου χρόνοις αἰωνίοις σεσιγημένου,
  language: Greek
translation:
  text: Now[a] to him who is able to strengthen you according to my gospel and the preaching of Jesus Christ, according to the revelation of the mystery kept secret for long ages,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 25–27 form a closing doxology that appears in different locations across ancient manuscripts. It is found at the end of chapter 14 in the Byzantine majority tradition, after chapter 15 in the earliest surviving papyrus, and here at the end of chapter 16 in major 4th-century manuscripts and the Latin tradition. Some manuscripts include it in multiple places, while a few omit it entirely. Most modern translations retain it here as the conclusion to Paul's letter.
    reason: textual_critical
lexical_decisions:
- source_word: στηρίζω
  chosen: strengthen
  alternatives:
  - establish
  - make stand firm
  lexicon: BDAG
  rationale: Refers to establishing or strengthening believers in their faith; 'strengthen' clearly conveys the supportive, fortifying action of God in the believer's life.
- source_word: σιγάω
  chosen: kept secret
  alternatives:
  - kept silent
  - concealed
  lexicon: BDAG
  rationale: In the context of a 'mystery' (μυστήριον), the perfect passive participle σεσιγημένου implies a truth that was intentionally left unspoken or unrevealed until the appointed time.
- source_word: αἰώνιος
  chosen: long ages
  alternatives:
  - eternal times
  - ages past
  lexicon: BDAG
  rationale: While αἰώνιος often means 'eternal', in the dative plural phrase χρόνοις αἰωνίοις it idiomatically refers to vast stretches of past time during which the mystery was hidden.
