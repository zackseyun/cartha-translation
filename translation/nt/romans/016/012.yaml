theological_decisions:
- issue: Meaning of κυρίῳ in Pauline ministry formula
  chosen_reading: in the Lord
  alternative_readings:
  - for the Lord
  - in service to the Lord
  rationale: The phrase denotes labor carried out within relation to and sphere of
    the Lord, not merely labor done on his behalf. Retaining 'in the Lord' preserves
    Pauline theological texture without narrowing the sense.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy #5'
- issue: Rendering ἀγαπητήν without adding possessive nuance
  chosen_reading: the beloved
  alternative_readings:
  - my beloved
  rationale: The text does not include μου ('my'). Translating simply 'the beloved'
    avoids importing a more intimate or possessive nuance than the Greek states.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 and #3'
