id: ROM.16.12
reference: Romans 16:12
source:
  edition: SBLGNT
  text: ἀσπάσασθε Τρύφαιναν καὶ Τρυφῶσαν τὰς κοπιώσας ἐν κυρίῳ. ἀσπάσασθε Περσίδα
    τὴν ἀγαπητήν, ἥτις πολλὰ ἐκοπίασεν ἐν κυρίῳ.
translation:
  text: Greet Tryphaena and Tryphosa, who have labored in the Lord. Greet Persis,
    the beloved, who has labored much in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who work hard in the Lord' / 'who have toiled in the Lord.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Persis, my beloved' in some English renderings; Greek reads simply 'the
      beloved,' without an explicit 'my.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Give greetings to
  lexicon: BDAG
  rationale: Imperative plural of ἀσπάζομαι in epistolary greeting lists is most naturally
    rendered 'Greet' in concise modern English. 'Welcome' is too strong for this context,
    and 'Give greetings to' is more cumbersome.
- source_word: Τρύφαιναν
  chosen: Tryphaena
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: Τρυφῶσαν
  chosen: Tryphosa
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: τὰς κοπιώσας
  chosen: who have labored
  alternatives:
  - who labor
  - who have worked hard
  - the women who have toiled
  lexicon: BDAG
  rationale: The article plus participle functions attributively, describing Tryphaena
    and Tryphosa. The aoristic/perfective sense is not explicit in the participle
    form here, so 'who have labored' gives a natural English description of their
    known ministry. 'Worked hard' is possible but slightly less transparent to the
    lexical link with ἐκοπίασεν later in the verse.
- source_word: κοπιάω
  chosen: labored
  alternatives:
  - worked hard
  - toiled
  lexicon: BDAG
  rationale: Used consistently for both κοπιώσας and ἐκοπίασεν to preserve the lexical
    repetition in the Greek. 'Labored' is natural, readable, and retains the sense
    of strenuous effort in ministry.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - for the Lord
  - in service to the Lord
  lexicon: BDAG
  rationale: This Pauline phrase is best kept in its familiar and theologically rich
    form 'in the Lord.' It preserves the sphere/relationship nuance without over-interpreting
    it as merely instrumental or purposive.
- source_word: Περσίδα
  chosen: Persis
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: τὴν ἀγαπητήν
  chosen: the beloved
  alternatives:
  - my beloved
  - the dear one
  - the loved one
  lexicon: BDAG
  rationale: The Greek has the article plus adjective, not an explicit possessive
    pronoun, so 'the beloved' is the most textually precise rendering. 'My beloved'
    would import a possessive not present in the Greek.
- source_word: ἥτις
  chosen: who
  alternatives:
  - who indeed
  - she who
  lexicon: BDAG
  rationale: The qualitative relative pronoun can carry a slight nuance of characterization,
    but in smooth English 'who' adequately introduces the clause without awkwardness.
    Stronger expansions would over-translate the nuance.
- source_word: πολλὰ
  chosen: much
  alternatives:
  - greatly
  - a great deal
  lexicon: BDAG
  rationale: As an adverbial accusative modifying ἐκοπίασεν, πολλὰ means 'much' or
    'a great deal.' 'Much' is concise and preserves the emphasis on the extent of
    Persis's labor.
- source_word: ἐκοπίασεν
  chosen: has labored
  alternatives:
  - labored
  - worked hard
  lexicon: BDAG
  rationale: Rendered 'has labored' to fit natural English in a commendatory greeting
    list and to align with the preceding 'who have labored.' The aorist here summarizes
    Persis's recognized ministry; English present perfect communicates that completed-yet-relevant
    sense well in context.
