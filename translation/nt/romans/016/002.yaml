theological_decisions:
- issue: Rendering of προστάτις for Phoebe
  chosen_reading: patron
  alternative_readings:
  - helper
  - benefactor
  - protector
  rationale: The term likely reflects a socially recognized role of support or patronage
    rather than a generic act of helping. Translating it as 'patron' preserves Phoebe's
    significant agency and status without importing later ecclesiastical office language.
    This is a lexical-social decision with possible theological implications for how
    Phoebe's ministry is perceived, so it is documented explicitly.
  doctrine_reference: Translation philosophy §§1, 5
