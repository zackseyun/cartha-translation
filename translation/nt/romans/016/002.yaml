id: ROM.16.2
reference: Romans 16:2
source:
  edition: SBLGNT
  text: ἵνα ⸂αὐτὴν προσδέξησθε⸃ ἐν κυρίῳ ἀξίως τῶν ἁγίων, καὶ παραστῆτε αὐτῇ ἐν ᾧ
    ἂν ὑμῶν χρῄζῃ πράγματι, καὶ γὰρ αὐτὴ προστάτις πολλῶν ἐγενήθη καὶ ⸂ἐμοῦ αὐτοῦ⸃.
translation:
  text: so that you may welcome her in the Lord in a manner worthy of the saints,
    and stand by her in whatever matter she may need from you, for she herself has
    become a patron of many, and of myself as well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assist her' for 'stand by her.'
    reason: lexical_alternative
  - marker: b
    text: Or 'benefactor' or 'helper' for 'patron.' The Greek term suggests a woman
      who provided support or patronage for others.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέξησθε
  chosen: welcome
  alternatives:
  - receive
  - accept
  lexicon: BDAG
  rationale: The verb προσδέχομαι here refers to receiving Phoebe favorably into the
    community. 'Welcome' best captures both reception and hospitable acceptance in
    natural English.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - as one in the Lord
  lexicon: BDAG
  rationale: A standard Pauline locution indicating the sphere or relationship of
    Christian fellowship. The traditional and clear rendering 'in the Lord' preserves
    the theological nuance without paraphrase.
- source_word: ἀξίως τῶν ἁγίων
  chosen: in a manner worthy of the saints
  alternatives:
  - as is fitting for the saints
  - worthily of the saints
  lexicon: BDAG
  rationale: ἀξίως expresses manner ('worthily'), and τῶν ἁγίων most naturally refers
    to God's holy people. 'In a manner worthy of the saints' is idiomatic while preserving
    the comparison.
- source_word: ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - God's people
  lexicon: BDAG
  rationale: Paul commonly uses ἅγιοι for believers. 'Saints' preserves the established
    Pauline term and its ecclesial resonance; alternatives are possible but less consistent
    with Pauline diction.
- source_word: παραστῆτε αὐτῇ
  chosen: stand by her
  alternatives:
  - assist her
  - help her
  lexicon: BDAG
  rationale: In this context the aorist subjunctive of παρίστημι likely means to come
    to someone's aid or support them. 'Stand by her' preserves the supportive sense
    without over-specifying the form of help.
- source_word: ἐν ᾧ ἂν ὑμῶν χρῄζῃ πράγματι
  chosen: in whatever matter she may need from you
  alternatives:
  - in whatever business she may have need of you
  - in whatever matter she may require your help
  lexicon: BDAG
  rationale: πρᾶγμα can mean matter, affair, or business; χρῄζῃ with genitive ὑμῶν
    indicates needing something from them. 'Whatever matter she may need from you'
    is natural and broad enough to cover practical assistance.
- source_word: προστάτις
  chosen: patron
  alternatives:
  - helper
  - benefactor
  - protector
  lexicon: BDAG
  rationale: προστάτις denotes a woman who stands before others in support, likely
    with the sense of benefactor/patron in a social context. 'Patron' best reflects
    the probable first-century social and material support implied, whereas 'helper'
    is too weak and 'protector' too narrow.
- source_word: πολλῶν
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The genitive plural is indefinite and contextually personal. 'Many' is
    sufficiently clear in English and avoids adding words not present in the Greek.
- source_word: ἐγενήθη
  chosen: has become
  alternatives:
  - became
  - has been
  lexicon: BDAG
  rationale: The aorist can be rendered simply as past ('became'), but in English
    'has become' naturally conveys the present relevance of her established role without
    distorting the sense.
- source_word: ἐμοῦ αὐτοῦ
  chosen: of myself as well
  alternatives:
  - of me myself too
  - even of me
  lexicon: BDAG
  rationale: The emphatic pronoun αὐτοῦ intensifies ἐμοῦ. 'Of myself as well' preserves
    the emphasis and the additive force of καί in idiomatic English.
