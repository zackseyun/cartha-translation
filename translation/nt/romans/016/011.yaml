theological_decisions:
- issue: Meaning of συγγενής in Paul's greetings
  chosen_reading: Rendered broadly as 'kinsman' rather than specifying either blood
    relative or fellow Jew.
  alternative_readings:
  - my relative
  - my fellow Jew
  rationale: The term can bear either familial or ethnic/tribal association in Paul.
    The verse itself does not force a narrower conclusion, so the translation preserves
    the ambiguity rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Scope of those associated with Narcissus
  chosen_reading: Rendered as 'those of Narcissus' without adding 'household' to the
    main text.
  alternative_readings:
  - those from the household of Narcissus
  - members of Narcissus's household
  rationale: The Greek phrase indicates association with Narcissus but does not explicitly
    include the noun 'household.' To avoid importing detail beyond the text, the main
    text remains restrained, with the likely household sense preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
