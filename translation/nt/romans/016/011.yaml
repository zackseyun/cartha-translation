id: ROM.16.11
reference: Romans 16:11
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ἡρῳδίωνα τὸν ⸀συγγενῆ μου. ἀσπάσασθε τοὺς ἐκ τῶν Ναρκίσσου τοὺς
    ὄντας ἐν κυρίῳ.
translation:
  text: Greet Herodion, my kinsman. Greet those of Narcissus who are in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my relative' or 'my fellow Jew'; the Greek term can refer to a blood
      relative or a fellow member of Paul's people.
    reason: lexical_alternative
  - marker: b
    text: Probably refers to those from Narcissus's household or estate who are believers.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Imperative plural of ἀσπάζομαι in epistolary greeting contexts is most
    naturally rendered 'Greet.' 'Welcome' is too strong for this context, and 'give
    greetings to' is accurate but less natural in modern English.
- source_word: Ἡρῳδίωνα
  chosen: Herodion
  rationale: 'Personal name is transliterated according to the translation philosophy:
    names are transliterated by standard conventions.'
- source_word: συγγενῆ μου
  chosen: my kinsman
  alternatives:
  - my relative
  - my fellow Jew
  lexicon: BDAG
  rationale: συγγενής can denote a blood relative or, in Paul, more broadly a fellow
    Jew/compatriot. 'Kinsman' preserves the lexical breadth without over-specifying
    either close family relation or ethnic identity. 'Relative' may sound too narrowly
    familial; 'fellow Jew' is interpretive and should remain an alternative rather
    than the main text.
- source_word: τοὺς ἐκ τῶν Ναρκίσσου
  chosen: those of Narcissus
  alternatives:
  - those from the household of Narcissus
  - those belonging to Narcissus
  lexicon: BDAG
  rationale: The expression likely refers to people associated with Narcissus, probably
    his household or estate, but the Greek does not explicitly state 'household.'
    'Those of Narcissus' preserves the concise ambiguity of the source while remaining
    intelligible. A more explicit household sense is preserved in a footnote.
- source_word: τοὺς ὄντας ἐν κυρίῳ
  chosen: who are in the Lord
  alternatives:
  - who belong to the Lord
  - who are believers in the Lord
  lexicon: BDAG
  rationale: The participial phrase identifies a subset associated with Narcissus
    who are 'in the Lord,' a Pauline expression for union with or belonging to Christ.
    The more literal 'who are in the Lord' preserves Paul's idiom and theological
    resonance better than explanatory paraphrases.
- source_word: κυρίῳ
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the doctrine's contested-terms guidance, κύριος is rendered 'Lord.'
    In Pauline usage here, 'in the Lord' is a standard Christian expression and should
    be preserved.
