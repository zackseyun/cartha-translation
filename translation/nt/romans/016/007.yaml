id: ROM.16.7
reference: Romans 16:7
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ἀνδρόνικον καὶ ⸀Ἰουνίαν τοὺς συγγενεῖς μου καὶ συναιχμαλώτους μου,
    οἵτινές εἰσιν ἐπίσημοι ἐν τοῖς ἀποστόλοις, οἳ καὶ πρὸ ἐμοῦ ⸀γέγοναν ἐν Χριστῷ.
translation:
  text: Greet Andronicus and Junia, my kinsmen and my fellow prisoners. They are well
    known among the apostles, and they were in the Messiah before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Junia: alternatively, ''Junias,'' a masculine name; the feminine reading
      is more likely from the Greek form and historical usage.'
    reason: alternative_reading
  - marker: b
    text: Or 'outstanding among the apostles'; the phrase may also be understood as
      'well known to the apostles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: A standard epistolary imperative meaning to greet or convey greetings.
    'Greet' is concise, natural English, and preserves the direct imperative force.
- source_word: Ἀνδρόνικον
  chosen: Andronicus
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: Ἰουνίαν
  chosen: Junia
  alternatives:
  - Junias
  lexicon: BDAG
  rationale: The accusative form most naturally corresponds to the feminine name Junia,
    which is well attested; the masculine 'Junias' is much less likely and reflects
    later interpretive tradition. The source text is rendered according to its plain
    sense, while the alternative is preserved in a footnote because of the historical
    debate.
- source_word: συγγενεῖς μου
  chosen: my kinsmen
  alternatives:
  - my relatives
  - my fellow Jews
  lexicon: BDAG
  rationale: The term can denote relatives or compatriots. In Paul it often carries
    the broader sense of fellow Jews/kinsmen according to ethnicity, but here the
    exact nuance cannot be proven. 'Kinsmen' preserves the ambiguity better than 'relatives'
    or the more interpretive 'fellow Jews'.
- source_word: συναιχμαλώτους μου
  chosen: my fellow prisoners
  alternatives:
  - my fellow captives
  lexicon: BDAG
  rationale: The compound denotes those imprisoned with someone. 'Fellow prisoners'
    is the clearest modern rendering and preserves the concrete sense.
- source_word: οἵτινές εἰσιν
  chosen: They are
  alternatives:
  - who are
  lexicon: BDAG
  rationale: This relative construction introduces a descriptive comment. 'They are'
    gives natural English while preserving the explanatory force.
- source_word: ἐπίσημοι
  chosen: well known
  alternatives:
  - outstanding
  - notable
  - distinguished
  lexicon: BDAG
  rationale: The adjective can mean outstanding/notable or well known/prominent. In
    this context, paired with ἐν τοῖς ἀποστόλοις, 'well known' avoids overresolving
    whether they are counted within the apostles or simply recognized by them, while
    still conveying high regard.
- source_word: ἐν τοῖς ἀποστόλοις
  chosen: among the apostles
  alternatives:
  - to the apostles
  - in the eyes of the apostles
  lexicon: BDAG
  rationale: 'The prepositional phrase most naturally means ''among the apostles,''
    but the expression is debated: it may mean either notable within the apostolic
    circle or well known to the apostles. The main text keeps the more straightforward
    rendering, and the alternative is preserved in a footnote in keeping with the
    instruction to preserve theological tension where ambiguity is genuine.'
- source_word: πρὸ ἐμοῦ
  chosen: before me
  alternatives:
  - earlier than I
  lexicon: BDAG
  rationale: Temporal priority is in view. 'Before me' is idiomatic and sufficiently
    clear in context.
- source_word: γέγοναν ἐν Χριστῷ
  chosen: they were in the Messiah
  alternatives:
  - they became believers in Christ
  - they came to be in Christ
  lexicon: BDAG
  rationale: The perfect of γίνομαι with ἐν Χριστῷ indicates that they had come to
    be 'in Christ' prior to Paul and remained so. 'Were in the Messiah' is concise
    and preserves the idiom without overparaphrasing into an explicitly interpretive
    conversion formula. 'Messiah' is used for Χριστός as a title, per doctrine guidance.
