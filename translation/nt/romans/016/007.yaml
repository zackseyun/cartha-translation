theological_decisions:
- issue: Identity/gender of Ἰουνίαν
  chosen_reading: Junia is rendered as a feminine personal name.
  alternative_readings:
  - Junias as a masculine name
  rationale: The Greek form is best taken as the feminine name Junia. Rendering it
    this way follows original-language primacy rather than later tradition. Because
    the masculine alternative has been historically influential in interpretation,
    it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §2, §3
- issue: Sense of ἐπίσημοι ἐν τοῖς ἀποστόλοις
  chosen_reading: Rendered 'well known among the apostles' in the main text, with
    an alternative footnote preserving 'outstanding among the apostles.'
  alternative_readings:
  - outstanding among the apostles
  - well known to the apostles
  rationale: The phrase is genuinely debated both lexically and syntactically, with
    implications for whether Andronicus and Junia are themselves included among the
    apostles. The main text adopts a restrained rendering that fits the Greek while
    avoiding an unnecessarily sharpened conclusion; alternatives are preserved in
    footnotes to maintain transparency and theological tension.
  doctrine_reference: Translation philosophy §3
