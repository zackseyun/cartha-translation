theological_decisions:
- issue: Rendering Χριστῷ in the Pauline phrase ἐν Χριστῷ
  chosen_reading: in the Messiah
  alternative_readings:
  - in Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where the title
    sense is active. In this commendation formula, the phrase still carries Paul's
    theological category of union/sphere in relation to the Anointed One, so the titular
    rendering is retained. The traditional 'in Christ' is preserved in a footnote
    because of its familiarity and because some readers may hear the phrase as name-like.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
