id: ROM.16.10
reference: Romans 16:10
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ἀπελλῆν τὸν δόκιμον ἐν Χριστῷ. ἀσπάσασθε τοὺς ἐκ τῶν Ἀριστοβούλου.
translation:
  text: Greet Apelles, the approved one in the Messiah. Greet those of the household
    of Aristobulus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Imperative plural calling for the conveyance of greetings. 'Greet' is
    concise, natural English and fits the repeated paraenetic style of Romans 16.
- source_word: Ἀπελλῆν
  chosen: Apelles
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: τὸν δόκιμον
  chosen: the approved one
  alternatives:
  - the approved man
  - the proven one
  - the tested and approved one
  lexicon: BDAG
  rationale: δόκιμος denotes someone tested and found genuine/approved. The article
    plus adjective functions substantivally. 'The approved one' preserves the commendatory
    force without overexpanding; 'proven' is possible but slightly more interpretive.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: ἐν Χριστῷ is Paul's standard sphere/union expression. Here Χριστῷ is
    titular rather than merely name-like, so 'Messiah' follows the project's default
    for Χριστός where title is in view. 'In' is retained rather than paraphrased as
    'as a believer in' to preserve Pauline theological idiom.
- source_word: τοὺς ἐκ τῶν Ἀριστοβούλου
  chosen: those of the household of Aristobulus
  alternatives:
  - those belonging to Aristobulus
  - those from among Aristobulus' people
  - those of Aristobulus
  lexicon: BDAG
  rationale: The expression likely refers not to Aristobulus himself but to people
    associated with his household/estate. English 'those of Aristobulus' is possible
    but opaque; 'those of the household of Aristobulus' makes the idiom clear while
    staying close to the Greek.
