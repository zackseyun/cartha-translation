theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the project's contested-terms guidance, Χριστός is translated
    as 'Messiah' where it functions as a title. In 'the churches of the Messiah,'
    the titular sense is still transparent and preserves the Hebraic meaning better
    than the traditional 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
