id: ROM.16.16
reference: Romans 16:16
source:
  edition: SBLGNT
  text: Ἀσπάσασθε ἀλλήλους ἐν φιλήματι ἁγίῳ. Ἀσπάζονται ὑμᾶς αἱ ἐκκλησίαι ⸀πᾶσαι τοῦ
    Χριστοῦ.
translation:
  text: Greet one another with a holy kiss. All the churches of the Messiah greet
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'All the churches of Christ greet you.'
    reason: alternative_reading
  - marker: b
    text: The 'holy kiss' was a culturally recognized greeting expressing holy affection
      and fellowship among believers.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Welcome
  - Greet one another
  lexicon: BDAG
  rationale: Aorist middle imperative of ἀσπάζομαι, commonly used for greeting/salutation.
    'Greet' is the most natural concise English imperative here.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal pronoun; 'one another' is idiomatic and slightly
    more formal in English Bible style.
- source_word: ἐν φιλήματι ἁγίῳ
  chosen: with a holy kiss
  alternatives:
  - with a sacred kiss
  - in a holy kiss
  lexicon: BDAG
  rationale: ἐν plus dative here is instrumental/associative in sense. φίλημα is 'kiss';
    ἅγιος qualifies it as set apart/pure within Christian fellowship. 'With a holy
    kiss' is the established and accurate idiom.
- source_word: Ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  lexicon: BDAG
  rationale: Present middle/passive indicative of ἀσπάζομαι. English often omits an
    explicit 'send' and simply says 'greet' in epistolary contexts.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object plural pronoun addressed to the Roman believers; English
    'you' adequately represents the plural in context.
- source_word: αἱ ἐκκλησίαι πᾶσαι
  chosen: All the churches
  alternatives:
  - All churches
  - The churches, all of them
  lexicon: BDAG
  rationale: The article with πᾶσαι is naturally rendered 'all the churches.' This
    preserves the collective emphasis.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: 'Χριστοῦ is the title ''Messiah'' rather than a mere name-like form here,
    and the doctrine guidance prefers translating Χριστός as ''Messiah'' where context
    supports title sense. The genitive denotes belonging/association: the churches
    belonging to the Messiah.'
