id: ROM.16.4
reference: Romans 16:4
source:
  edition: SBLGNT
  text: οἵτινες ὑπὲρ τῆς ψυχῆς μου τὸν ἑαυτῶν τράχηλον ὑπέθηκαν, οἷς οὐκ ἐγὼ μόνος
    εὐχαριστῶ ἀλλὰ καὶ πᾶσαι αἱ ἐκκλησίαι τῶν ἐθνῶν,
translation:
  text: who laid down their own neck for my life, to whom not only I give thanks,
    but also all the churches of the Gentiles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own necks.' The Greek has singular 'neck' in an idiomatic expression
      for exposing oneself to mortal danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the churches of the nations.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - such people as
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause referring back to Prisca and
    Aquila. Simple 'who' is natural English while preserving the connection.
- source_word: ὑπὲρ τῆς ψυχῆς μου
  chosen: for my life
  alternatives:
  - for my soul
  - on behalf of my life
  lexicon: BDAG
  rationale: ψυχή here refers to Paul's life rather than the immaterial soul, in the
    idiom of risking oneself for someone's survival. 'For my life' is the plain contextual
    sense.
- source_word: τὸν ἑαυτῶν τράχηλον
  chosen: their own neck
  alternatives:
  - their own necks
  lexicon: BDAG
  rationale: The Greek uses singular τράχηλον with plural reflexive pronoun in an
    idiomatic expression. English can preserve the singular collective image, though
    'necks' is also possible. Singular keeps the vividness of the Greek idiom.
- source_word: ὑπέθηκαν
  chosen: laid down
  alternatives:
  - risked
  - offered up
  - placed under
  lexicon: BDAG
  rationale: In this idiom the verb conveys exposing oneself to deadly danger. 'Laid
    down' preserves the concrete imagery with sufficient clarity, rather than flattening
    it to the interpretive 'risked'.
- source_word: οἷς
  chosen: to whom
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Dative with εὐχαριστῶ is naturally rendered 'to whom I give thanks' in
    English.
- source_word: οὐκ ἐγὼ μόνος εὐχαριστῶ ἀλλὰ καὶ
  chosen: not only I give thanks, but also
  alternatives:
  - I alone do not give thanks, but also
  - not I alone am thankful, but also
  lexicon: BDAG
  rationale: This preserves the emphatic contrast of Paul not being the only one who
    is thankful.
- source_word: πᾶσαι αἱ ἐκκλησίαι
  chosen: all the churches
  alternatives:
  - every church
  lexicon: BDAG
  rationale: Plural with article is best represented by 'all the churches,' indicating
    the wider body of assemblies known to Paul.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: In Pauline usage ἔθνη commonly denotes Gentiles/non-Jews. 'Gentiles'
    best communicates the ethnic-religious contrast in context, though 'nations' is
    a more literal alternative.
