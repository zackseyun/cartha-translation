theological_decisions:
- issue: Meaning of ψυχή in Paul's statement
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The context is concrete danger and gratitude for sacrificial action,
    so ψυχή is best understood as Paul's life rather than his soul in a narrower anthropological
    sense.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Rendering of ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: Paul's phrase most naturally refers to predominantly non-Jewish churches.
    This avoids obscuring the Jew-Gentile dimension of Romans while preserving the
    ordinary Pauline sense.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
