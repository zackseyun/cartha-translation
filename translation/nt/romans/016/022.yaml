theological_decisions:
- issue: Sense of 'in the Lord'
  chosen_reading: 'Retained as a relational/sphere expression modifying the greeting:
    Tertius greets the recipients in the Lord.'
  alternative_readings:
  - Taken with 'who wrote the letter' ('I, Tertius, who wrote the letter in the Lord')
  rationale: The phrase most naturally attaches to the main greeting in this epistolary
    context, indicating Christian fellowship or union with the Lord rather than describing
    the manner of writing. The translation preserves the ambiguity minimally by not
    overexplaining.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
