id: ROM.16.22
reference: Romans 16:22
source:
  edition: SBLGNT
  text: ἀσπάζομαι ὑμᾶς ἐγὼ Τέρτιος ὁ γράψας τὴν ἐπιστολὴν ἐν κυρίῳ.
translation:
  text: I, Tertius, who wrote the letter, greet you in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'I, Tertius, who wrote the letter in the Lord, greet you.'
      The Greek phrase 'in the Lord' could be taken with 'wrote,' though it more naturally
      qualifies the greeting.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάζομαι
  chosen: greet
  alternatives:
  - send greetings to
  - greet warmly
  lexicon: BDAG
  rationale: The verb commonly means to greet or send greetings. 'Greet' is the most
    natural concise English equivalent here and fits the epistolary closing context
    without adding warmth not explicit in the Greek.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, naturally rendered 'you' in English. Number
    is not marked in standard English here.
- source_word: ἐγὼ Τέρτιος
  chosen: I, Tertius
  alternatives:
  - I—Tertius
  - I, Tertius myself
  lexicon: BDAG
  rationale: The explicit pronoun with the proper name marks the speaker distinctly.
    'I, Tertius' preserves the self-identification clearly and idiomatically.
- source_word: ὁ γράψας
  chosen: who wrote
  alternatives:
  - the one who wrote
  - the writer of
  lexicon: BDAG
  rationale: The articular aorist participle identifies Tertius as the one who physically
    wrote the letter. 'Who wrote' is smooth English and preserves the participial
    sense.
- source_word: τὴν ἐπιστολήν
  chosen: the letter
  alternatives:
  - this letter
  - the epistle
  lexicon: BDAG
  rationale: ἐπιστολή is best rendered 'letter' in readable modern English. 'This
    letter' is possible contextually, but the Greek has the article, not an explicit
    demonstrative; 'the letter' is closer to the source.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in Lord
  - as one in the Lord
  lexicon: BDAG
  rationale: This standard Pauline phrase is best kept as 'in the Lord.' It likely
    expresses the sphere or basis of Christian fellowship in which the greeting is
    offered. Per doctrine, κύριος is rendered 'Lord'.
