theological_decisions:
- issue: Sense of συγγενεῖς μου in Pauline usage
  chosen_reading: my kinsmen
  alternative_readings:
  - my relatives
  - my fellow Jews
  rationale: The term can refer either to close relatives or to broader kinship/ethnic
    relation. Because the verse itself does not specify which nuance Paul intends,
    the translation preserves the ambiguity with 'kinsmen' and notes the alternatives
    rather than resolving the question doctrinally or historically.
  doctrine_reference: Preserve theological tension rather than resolve it.
