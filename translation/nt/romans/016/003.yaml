theological_decisions:
- issue: Rendering Χριστῷ in the Pauline formula ἐν Χριστῷ Ἰησοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Χριστός be rendered 'Messiah'
    where title is in view, and 'Christ' where it has become more name-like. In this
    verse, the phrase describes the sphere of ministry relation to Jesus in his messianic
    identity; thus 'Messiah Jesus' best preserves meaning while remaining readable.
    The traditional 'Christ Jesus' is preserved in a footnote for transparency.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
