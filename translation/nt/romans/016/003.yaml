id: ROM.16.3
reference: Romans 16:3
source:
  edition: SBLGNT
  text: Ἀσπάσασθε Πρίσκαν καὶ Ἀκύλαν τοὺς συνεργούς μου ἐν Χριστῷ Ἰησοῦ,
translation:
  text: Greet Prisca and Aquila, my fellow workers in Messiah Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Prisca is the formal name; Priscilla is the more familiar form used elsewhere
      for the same person.
    reason: alternative_reading
  - marker: b
    text: Or 'in Christ Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a standard
    epistolary instruction to convey greetings. 'Greet' is the most natural concise
    English equivalent in this context.
- source_word: Πρίσκαν
  chosen: Prisca
  alternatives:
  - Priscilla
  lexicon: BDAG
  rationale: The Greek text has the formal name Πρίσκαν, not the diminutive/form Priscilla
    found elsewhere. Following the principle to transliterate names and reflect the
    source text's actual form, 'Prisca' is preferred; 'Priscilla' is preserved in
    a footnote as the more familiar equivalent.
- source_word: Ἀκύλαν
  chosen: Aquila
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἀκύλας.
- source_word: συνεργούς
  chosen: fellow workers
  alternatives:
  - coworkers
  - fellow laborers
  - co-workers
  lexicon: BDAG
  rationale: The noun denotes those who work together with someone in a shared mission.
    'Fellow workers' preserves the collaborative sense and fits Paul's ministry language
    without sounding overly corporate or archaic.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: Simple possessive genitive indicating Paul's personal association with
    Prisca and Aquila as his fellow workers.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: The prepositional phrase marks the sphere or union in which their shared
    labor takes place. Per doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like fixed form. Here the phrase still retains titular
    force, so 'Messiah Jesus' is preferred, while the traditional 'Christ Jesus' is
    preserved as an alternative.
