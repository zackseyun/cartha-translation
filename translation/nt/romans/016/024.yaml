id: ROM.16.24
reference: Romans 16:24
source:
  edition: SBLGNT
  text: ⸂Ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ μετὰ πάντων ὑμῶν.⸃ ⸀Ἀμήν.
translation:
  text: The grace of our Lord Jesus Christ be with all of you. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek Χριστός can be represented by the traditional
      transliteration ''Christ''; here it is rendered ''Messiah'' to preserve the
      title''s meaning.'
    reason: alternative_reading
  - marker: b
    text: Some manuscripts include this verse, while others omit it; many modern editions
      bracket it as a textual variant in the closing of Romans.
    reason: textual_variant
lexical_decisions:
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Standard Pauline benediction term denoting gracious favor/gift; 'grace'
    best preserves both theological weight and established semantic range here.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: DOCTRINE.md lists κύριος with default rendering 'Lord'; in this christological
    title it naturally denotes Jesus' lordship.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where functioning as a title
    rather than a name-like fixed form. In this benediction, the full title-name sequence
    still retains titular force, so 'Jesus Messiah' preserves meaning more transparently.
- source_word: μετὰ πάντων ὑμῶν
  chosen: with all of you
  alternatives:
  - with you all
  - with all of you all
  lexicon: BDAG
  rationale: μετά with genitive means 'with'; πάντων ὑμῶν is inclusive of the whole
    audience. 'With all of you' is natural modern English and preserves the distributive
    breadth.
- source_word: Ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration in English for the liturgical affirmation;
    preserving the familiar form is clearer than translating it as 'truly' or similar.
