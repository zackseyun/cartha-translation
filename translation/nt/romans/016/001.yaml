id: ROM.16.1
reference: Romans 16:1
source:
  edition: SBLGNT
  text: Συνίστημι δὲ ὑμῖν Φοίβην τὴν ἀδελφὴν ἡμῶν, οὖσαν ⸀καὶ διάκονον τῆς ἐκκλησίας
    τῆς ἐν Κεγχρεαῖς,
translation:
  text: Now I commend to you Phoebe, our sister, who is also a deacon of the church
    in Cenchreae,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a servant' or 'a minister' of the church in Cenchreae. The Greek term
      diakonos can refer either to a recognized ministry role or more generally to
      one who serves.
    reason: alternative_reading
lexical_decisions:
- source_word: Συνίστημι
  chosen: I commend
  alternatives:
  - I recommend
  - I present
  lexicon: BDAG
  rationale: In epistolary context, συνίστημι commonly introduces a person favorably
    to recipients, functioning as a recommendation or commendation. 'I commend' is
    natural English and preserves the formal sense without over-paraphrasing.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' reflects
    the discourse shift smoothly in modern English.
- source_word: Φοίβην
  chosen: Phoebe
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: τὴν ἀδελφὴν ἡμῶν
  chosen: our sister
  alternatives:
  - our sister in the faith
  lexicon: BDAG
  rationale: ἀδελφή with ἡμῶν in Pauline usage naturally denotes a fellow believer.
    'Our sister' is the most direct rendering and preserves the familial ecclesial
    language without adding explanatory words to the main text.
- source_word: οὖσαν καὶ
  chosen: who is also
  alternatives:
  - being also
  - and who is
  lexicon: BDAG
  rationale: This participial construction gives additional identifying information
    about Phoebe. 'Who is also' renders the syntax idiomatically in English while
    preserving the additive force of καί.
- source_word: διάκονον
  chosen: a deacon
  alternatives:
  - a servant
  - a minister
  lexicon: BDAG
  rationale: διάκονος can denote either a general servant/minister or a recognized
    ministry role. In this construction, linked with a specific church ('of the church
    in Cenchreae'), 'deacon' best preserves the likely formal or semi-formal ecclesial
    sense without importing more than the text states. Because the term is debated,
    alternatives are preserved in a footnote.
- source_word: τῆς ἐκκλησίας
  chosen: of the church
  alternatives:
  - of the assembly
  lexicon: BDAG
  rationale: ἐκκλησία in Pauline letters ordinarily refers to the Christian congregation/church.
    'Church' is the standard and clearest rendering in this context.
- source_word: τῆς ἐν Κεγχρεαῖς
  chosen: in Cenchreae
  alternatives:
  - at Cenchreae
  rationale: Κεγχρεαί is transliterated as the place name Cenchreae. 'In Cenchreae'
    is the most natural rendering of the locative phrase with ἐν.
