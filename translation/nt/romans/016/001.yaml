theological_decisions:
- issue: Whether διάκονον should be rendered as a general service term or as the ministry
    title 'deacon'
  chosen_reading: a deacon
  alternative_readings:
  - a servant
  - a minister
  rationale: The immediate genitive phrase 'of the church in Cenchreae' suggests an
    identifiable relationship to a local congregation beyond a vague description of
    helpfulness. Rendering it 'deacon' preserves the lexical possibility of an ecclesial
    role while not specifying later denominational structures. Because the term is
    contested in interpretation, alternatives are preserved in a footnote rather than
    erased.
  doctrine_reference: Translation philosophy §§1, 3, 5
