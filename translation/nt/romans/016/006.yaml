id: ROM.16.6
reference: Romans 16:6
source:
  edition: SBLGNT
  text: ἀσπάσασθε ⸀Μαριάμ, ἥτις πολλὰ ἐκοπίασεν εἰς ⸀ὑμᾶς.
translation:
  text: Greet Mary, who has worked very hard for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'for us' or 'among you' instead of 'for you.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, used epistolarily for
    conveying greetings. 'Greet' is the standard concise English imperative and fits
    modern readable style without unnecessary expansion.
- source_word: Μαριάμ
  chosen: Mary
  alternatives:
  - Mariam
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy. 'Mary' is the conventional English form of Μαριάμ.
- source_word: ἥτις
  chosen: who
  alternatives:
  - she who
  - who indeed
  lexicon: BDAG
  rationale: The relative pronoun introduces a descriptive clause about Mary. English
    'who' communicates the sense naturally; the slightly qualitative nuance of ἥτις
    does not require explicit representation in the main text.
- source_word: πολλὰ
  chosen: very hard
  alternatives:
  - much
  - a great deal
  lexicon: BDAG
  rationale: Used adverbially with ἐκοπίασεν, indicating the extent of labor. 'Worked
    very hard' is idiomatic English that captures the intensive force better than
    the wooden 'labored much.'
- source_word: ἐκοπίασεν
  chosen: has worked
  alternatives:
  - labored
  - toiled
  lexicon: BDAG
  rationale: κοπιάω denotes strenuous labor or toil. 'Worked' is more natural in contemporary
    English; 'very hard' supplies the strenuous nuance. The perfect English form ('has
    worked') renders the aorist in a way that suits the present commendation of Mary's
    past service in context.
- source_word: εἰς ὑμᾶς
  chosen: for you
  alternatives:
  - among you
  - for your benefit
  - on your behalf
  lexicon: BDAG
  rationale: The preposition εἰς with persons here is text-critically significant
    and most naturally conveys direction toward or benefit for the Roman believers.
    'For you' is the clearest idiomatic rendering. 'Among you' reflects an alternate
    textual reading rather than the adopted text.
