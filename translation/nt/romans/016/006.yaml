theological_decisions:
- issue: Textual variant in the final phrase
  chosen_reading: for you
  alternative_readings:
  - for us
  - among you
  rationale: The SBLGNT text reads εἰς ὑμᾶς ('for you'). Other well-known variants
    read εἰς ἡμᾶς ('for us') or ἐν ὑμῖν ('among you'). The main text follows the provided
    Greek source, while preserving the alternatives in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where meaningful'
