theological_decisions:
- issue: Rendering of Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the doctrine's contested-terms guidance, Χριστός is rendered
    'Messiah' where title is in view and 'Christ' where it functions more like a name.
    In this commendatory phrase, the titular sense remains clear enough to prefer
    'Messiah.'
