id: ROM.16.9
reference: Romans 16:9
source:
  edition: SBLGNT
  text: ἀσπάσασθε Οὐρβανὸν τὸν συνεργὸν ἡμῶν ἐν Χριστῷ καὶ Στάχυν τὸν ἀγαπητόν μου.
translation:
  text: Greet Urbanus, our fellow worker in Messiah, and Stachys, my beloved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Imperative plural of ἀσπάζομαι in greeting lists is most naturally rendered
    as the concise command 'Greet.' 'Give greetings to' is possible but less natural
    in modern English.
- source_word: Οὐρβανὸν
  chosen: Urbanus
  alternatives:
  - Urban
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions. 'Urbanus'
    preserves the conventional form of the Latin name represented in Greek.
- source_word: συνεργὸν
  chosen: fellow worker
  alternatives:
  - coworker
  - co-worker
  - helper
  lexicon: BDAG
  rationale: συνεργός denotes one who works together with another. 'Fellow worker'
    preserves the collaborative ministry sense and reads naturally in English. 'Coworker'
    is possible but slightly more contemporary/colloquial in tone.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - of us
  lexicon: BDAG
  rationale: The genitive pronoun modifies συνεργόν and is best rendered idiomatically
    as 'our,' indicating shared partnership with Paul and his associates.
- source_word: ἐν Χριστῷ
  chosen: in Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: The phrase marks sphere/union in relation to Χριστός. Per doctrine, Χριστός
    is rendered 'Messiah' where functioning as a title rather than a name-like form.
    Here the phrase is still transparently titular, so 'in Messiah' best preserves
    the Greek sense.
- source_word: Στάχυν
  chosen: Stachys
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: ἀγαπητόν μου
  chosen: my beloved
  alternatives:
  - my dear one
  - the one I love
  lexicon: BDAG
  rationale: ἀγαπητός in personal address/apposition commonly means 'beloved' or 'dear.'
    'My beloved' preserves the warmth and lexical connection to the ἀγαπάω/ἀγάπη word
    group without sounding overly paraphrastic.
