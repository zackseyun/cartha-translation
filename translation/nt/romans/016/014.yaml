theological_decisions:
- issue: Rendering of ἀδελφούς in a communal greeting
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: The Greek is explicitly masculine plural. In keeping with the stated
    gender-accurate policy, the translation preserves the form 'brothers' unless context
    clearly requires an inclusive expansion. Here the text simply identifies a group
    associated with the named men, and the more literal rendering is preferable.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
