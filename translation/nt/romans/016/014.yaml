id: ROM.16.14
reference: Romans 16:14
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ἀσύγκριτον, Φλέγοντα, ⸂Ἑρμῆν, Πατροβᾶν, Ἑρμᾶν⸃ καὶ τοὺς σὺν αὐτοῖς
    ἀδελφούς.
translation:
  text: Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers with
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers who are with them.' The phrase likely refers to fellow
      believers associated with these men.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning in Paul's
    closing greetings list. 'Greet' is the natural concise English imperative in this
    epistolary context and avoids the slightly cumbersome 'give greetings to.'
- source_word: Ἀσύγκριτον
  chosen: Asyncritus
  rationale: Personal name; per translation philosophy, names are transliterated by
    standard English convention rather than translated.
- source_word: Φλέγοντα
  chosen: Phlegon
  rationale: Personal name; transliterated in standard English form.
- source_word: Ἑρμῆν
  chosen: Hermes
  rationale: Personal name; transliterated. Although identical in form to the name
    of the Greek deity, here it is clearly a personal name in a greeting list.
- source_word: Πατροβᾶν
  chosen: Patrobas
  rationale: Personal name; transliterated in standard English form.
- source_word: Ἑρμᾶν
  chosen: Hermas
  rationale: Personal name; transliterated in standard English form and distinguished
    from the preceding Ἑρμῆν ('Hermes').
- source_word: τοὺς σὺν αὐτοῖς ἀδελφούς
  chosen: the brothers with them
  alternatives:
  - the brothers who are with them
  - the brothers among them
  lexicon: BDAG
  rationale: ἀδελφούς is grammatically masculine plural and in Paul often refers to
    fellow believers. Following the project's gender-accurate policy, 'brothers' is
    retained rather than generalized to 'brothers and sisters' because the phrase
    is brief, formulaic, and does not itself make explicit a mixed-gender referent.
    'With them' straightforwardly renders σὺν αὐτοῖς.
