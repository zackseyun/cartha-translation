id: ROM.16.19
reference: Romans 16:19
source:
  edition: SBLGNT
  text: ἡ γὰρ ὑμῶν ὑπακοὴ εἰς πάντας ἀφίκετο· ⸂ἐφ’ ὑμῖν οὖν χαίρω⸃, θέλω δὲ ὑμᾶς ⸀σοφοὺς
    εἶναι εἰς τὸ ἀγαθόν, ἀκεραίους δὲ εἰς τὸ κακόν.
translation:
  text: For your obedience has reached everyone. Therefore I rejoice over you, but
    I want you to be wise as to what is good, and innocent as to what is evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has become known to all.' The Greek literally says 'your obedience
      has reached all.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I rejoice because of you.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'pure' or 'guileless' as to what is evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπακοή
  chosen: obedience
  alternatives:
  - hearing
  - submission
  lexicon: BDAG
  rationale: In Pauline usage this noun commonly denotes obedient response, not mere
    hearing. 'Obedience' best fits the commendation of the Roman believers' conduct.
- source_word: εἰς πάντας
  chosen: has reached everyone
  alternatives:
  - has become known to all
  - has reached all people
  lexicon: BDAG
  rationale: The idiom with ἀφικνέομαι conveys arrival/reaching. In context it refers
    to the report of their obedience becoming widely known. 'Everyone' is natural
    English for πάντας here without overstating universality beyond the rhetorical
    sense.
- source_word: ἀφίκετο
  chosen: has reached
  alternatives:
  - came
  - arrived
  - has become known
  lexicon: BDAG
  rationale: 'Perfective aorist of ἀφικνέομαι literally means ''arrived/reached.''
    In this context the subject is ''your obedience,'' so English idiom requires a
    figurative rendering: the report of it has reached others.'
- source_word: ἐφ’ ὑμῖν
  chosen: over you
  alternatives:
  - because of you
  - concerning you
  lexicon: BDAG
  rationale: With χαίρω, ἐπί plus dative can express the basis or occasion of rejoicing.
    'Over you' is concise, idiomatic, and preserves Paul's positive regard for them.
- source_word: χαίρω
  chosen: I rejoice
  alternatives:
  - I am glad
  - I rejoice greatly
  lexicon: BDAG
  rationale: '''I rejoice'' preserves the verbal force and slightly elevated tone
    better than the flatter ''I am glad.'''
- source_word: σοφούς
  chosen: wise
  alternatives:
  - skilled
  - shrewd
  lexicon: BDAG
  rationale: The term denotes wisdom or practical discernment. 'Wise' is the standard
    and best contextual rendering here.
- source_word: εἰς τὸ ἀγαθόν
  chosen: as to what is good
  alternatives:
  - for the good
  - in what is good
  lexicon: BDAG
  rationale: The prepositional phrase marks the sphere/object in which wisdom is to
    operate. 'As to what is good' communicates discernment directed toward the good.
- source_word: ἀκεραίους
  chosen: innocent
  alternatives:
  - pure
  - unmixed
  - guileless
  lexicon: BDAG
  rationale: The adjective can mean unmixed, pure, or innocent. In contrast with evil,
    'innocent' best conveys moral untaintedness and echoes familiar biblical usage
    without sounding archaic.
- source_word: εἰς τὸ κακόν
  chosen: as to what is evil
  alternatives:
  - regarding evil
  - in relation to evil
  lexicon: BDAG
  rationale: Parallel to εἰς τὸ ἀγαθόν, this phrase identifies the sphere/object relative
    to which they should be ἀκέραιοι. 'As to what is evil' preserves the parallel
    structure in natural English.
