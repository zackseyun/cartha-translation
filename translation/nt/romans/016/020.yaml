id: ROM.16.20
reference: Romans 16:20
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς τῆς εἰρήνης συντρίψει τὸν Σατανᾶν ὑπὸ τοὺς πόδας ὑμῶν ἐν τάχει.
    ἡ χάρις τοῦ κυρίου ἡμῶν Ἰησοῦ ⸀Χριστοῦ μεθ’ ὑμῶν.
translation:
  text: And the God of peace will soon crush Satan under your feet. The grace of our
    Lord Jesus the Messiah be with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'Jesus Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ θεὸς τῆς εἰρήνης
  chosen: the God of peace
  alternatives:
  - the peace-giving God
  lexicon: BDAG
  rationale: A straightforward genitival title. 'God of peace' is idiomatic in Paul
    and preserves the established theological title without paraphrasing it into an
    interpretive expansion.
- source_word: συντρίψει
  chosen: will ... crush
  alternatives:
  - will shatter
  - will break
  lexicon: BDAG
  rationale: The future active indicates a definite future action. 'Crush' best fits
    the idiom with 'under your feet' and echoes the defeat imagery familiar from Scripture
    without over-translating.
- source_word: τὸν Σατανᾶν
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: As a proper name in the Greek, it is best transliterated 'Satan' rather
    than translated. This preserves standard New Testament usage and avoids introducing
    an interpretive gloss into the main text.
- source_word: ὑπὸ τοὺς πόδας ὑμῶν
  chosen: under your feet
  alternatives:
  - beneath your feet
  lexicon: BDAG
  rationale: This is a conventional victory/subjugation idiom. The plural 'your feet'
    reflects the second person plural pronoun and keeps the corporate address to the
    Roman believers.
- source_word: ἐν τάχει
  chosen: soon
  alternatives:
  - quickly
  - in a short time
  lexicon: BDAG
  rationale: '''Soon'' is the most natural modern English rendering here, expressing
    temporal nearness rather than manner alone. ''Quickly'' could be heard as referring
    to speed of action rather than imminence.'
- source_word: ἡ χάρις
  chosen: The grace
  alternatives:
  - Grace
  lexicon: BDAG
  rationale: The article is retained in natural English style. 'Grace' is a key Pauline
    theological term and should be preserved rather than paraphrased as 'favor' in
    this benedictory formula.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: of our Lord
  alternatives:
  - from our Lord
  lexicon: BDAG
  rationale: 'The genitive is possessive in the blessing formula: ''the grace of our
    Lord.'' ''Lord'' follows the doctrinal default for κύριος.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  - Jesus the Messiah
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a fixed name-like element. Here the phrase remains transparently titular,
    so 'Jesus Messiah' preserves the meaning of Χριστός while remaining concise.
- source_word: μεθ’ ὑμῶν
  chosen: be with you
  alternatives:
  - be among you
  lexicon: BDAG
  rationale: Although the verb is implied rather than expressed, English requires
    it for a natural benediction. 'With you' is the standard and contextually appropriate
    rendering of μετά with the genitive.
