theological_decisions:
- issue: Rendering Χριστοῦ in the closing benediction
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance specifies translating Χριστός as 'Messiah' where
    it functions as a title, and 'Christ' where it is name-like. In this benediction,
    the term still carries titular force attached to Jesus, so 'Messiah' is preferred.
    The traditional 'Christ' is preserved in a footnote for auditability and reader
    familiarity.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos* | Default
    English: Messiah (where title; Christ where name-like)'
