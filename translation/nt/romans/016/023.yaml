theological_decisions:
- issue: Rendering ἐκκλησία in a non-technical greeting context
  chosen_reading: church
  alternative_readings:
  - assembly
  - congregation
  rationale: Although ἐκκλησία can be rendered more literally as 'assembly,' in Pauline
    usage it commonly denotes the Christian community. 'Church' is both accurate and
    natural here without importing extra ecclesiology beyond the text.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
- issue: Gendered familial term ἀδελφός
  chosen_reading: the brother
  alternative_readings:
  - our brother
  - the fellow believer
  rationale: The source is grammatically masculine singular and refers to an individual
    male. Following the gender-accurate policy, the translation keeps 'brother' rather
    than neutralizing it.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
