id: ROM.16.23
reference: Romans 16:23
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς Γάϊος ὁ ξένος μου καὶ ⸂ὅλης τῆς ἐκκλησίας⸃. ἀσπάζεται ὑμᾶς
    Ἔραστος ὁ οἰκονόμος τῆς πόλεως καὶ Κούαρτος ὁ ἀδελφός.
translation:
  text: Gaius, my host and the host of the whole church, greets you. Erastus, the
    city treasurer, greets you, and Quartus, the brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city steward.' The Greek term can denote a civic administrator more
      broadly, though 'treasurer' fits the likely municipal office here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζεται
  chosen: greets
  alternatives:
  - sends greetings to
  - greets warmly
  lexicon: BDAG
  rationale: Standard epistolary sense of ἀσπάζομαι in Pauline closings is to convey
    greeting. 'Greets' is natural modern English and preserves the direct personal
    force without unnecessary expansion.
- source_word: ξένος
  chosen: host
  alternatives:
  - guest-friend
  - lodging host
  lexicon: BDAG
  rationale: In context with Gaius as the subject and with the genitive 'of the whole
    church,' ξένος is best understood in the sense of one who receives others as a
    host rather than 'stranger' or 'guest.' 'Host' is the clearest idiomatic English
    rendering here.
- source_word: ὅλης τῆς ἐκκλησίας
  chosen: the whole church
  alternatives:
  - the entire assembly
  - the whole congregation
  lexicon: BDAG
  rationale: ἐκκλησία here refers to the gathered Christian community. 'Church' is
    the standard and contextually appropriate rendering. ὅλης is retained as 'whole'
    to show the breadth of Gaius's hospitality.
- source_word: οἰκονόμος τῆς πόλεως
  chosen: the city treasurer
  alternatives:
  - the city manager
  - the city steward
  lexicon: BDAG
  rationale: οἰκονόμος denotes an administrator or steward. In a civic context, 'city
    treasurer' is a well-established and likely sense in English, conveying an official
    municipal financial role more clearly than the broader 'steward.'
- source_word: ἀδελφός
  chosen: the brother
  alternatives:
  - our brother
  - a brother
  lexicon: BDAG
  rationale: The Greek has the article with ἀδελφός and no explicit possessive. 'The
    brother' preserves the form of the text and likely marks Quartus as a fellow believer
    known in Christian fellowship. 'Our brother' would be interpretive expansion beyond
    the Greek.
