theological_decisions:
- issue: Sense of Paul's affection and the force of ἐν κυρίῳ
  chosen_reading: 'Paul identifies Ampliatus as ''my beloved'' specifically within
    the sphere of Christian fellowship: ''my beloved in the Lord.'''
  alternative_readings:
  - Paul means simply 'my dear friend' with little theological force
  - The phrase modifies Paul's act of greeting rather than Ampliatus
  rationale: The Greek word order most naturally links both τὸν ἀγαπητόν μου and ἐν
    κυρίῳ to Ampliatus. Retaining 'in the Lord' preserves Paul's theological framing
    of Christian affection without reducing it to mere personal fondness.
  doctrine_reference: 'Translation philosophy §§2, 3, 6; Contested terms: κύριος →
    Lord'
