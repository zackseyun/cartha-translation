id: ROM.16.8
reference: Romans 16:8
source:
  edition: SBLGNT
  text: ἀσπάσασθε ⸀Ἀμπλιᾶτον τὸν ἀγαπητόν μου ἐν κυρίῳ.
translation:
  text: Greet Ampliatus, my beloved in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek name form may also be represented as 'Amplias'; the SBLGNT reading
      here supports 'Ampliatus.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a standard
    epistolary command to convey greetings. 'Greet' is the most natural concise English
    equivalent in this context.
- source_word: Ἀμπλιᾶτον
  chosen: Ampliatus
  alternatives:
  - Amplias
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. Although some manuscripts/readers reflect the shorter form 'Amplias,'
    the SBLGNT reading here is Ἀμπλιᾶτον, corresponding to 'Ampliatus.' The accusative
    form is normalized to the nominative English name.
- source_word: ἀγαπητόν μου
  chosen: my beloved
  alternatives:
  - my dear one
  - the one I love
  lexicon: BDAG
  rationale: ἀγαπητός commonly means 'beloved' in relational and Christian usage.
    'My beloved' preserves both the warmth and the compactness of the Greek better
    than looser paraphrases.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in Lord
  - in the Lord Jesus
  lexicon: BDAG
  rationale: The prepositional phrase is a common Pauline expression denoting relationship
    or sphere of life in union with the Lord. 'In the Lord' is the natural and theologically
    established rendering; adding 'Jesus' would go beyond the Greek. κύριος is rendered
    'Lord' in keeping with the project's default for Kyrios.
