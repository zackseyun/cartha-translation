theological_decisions:
- issue: Sense of ἐκλεκτὸν ἐν κυρίῳ
  chosen_reading: Rufus is described as 'chosen in the Lord,' indicating distinguished
    status or divine election in relation to the Lord without specifying a narrower
    doctrinal system.
  alternative_readings:
  - Rufus is 'choice' or 'outstanding' in the Lord
  - Rufus is 'elect' in a more technical soteriological sense
  rationale: The phrase can denote one chosen by God or one choice/excellent within
    the Christian sphere. The translation keeps the wording broad enough to preserve
    the theological tension rather than resolve it toward either a merely honorific
    or a systematized doctrinal reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'his mother—and mine'
  chosen_reading: Paul refers to Rufus's mother as his own in an affectionate relational
    sense, not as a literal biological claim.
  alternative_readings:
  - Literal biological motherhood
  rationale: The social and epistolary context strongly favors a figurative familial
    expression of Christian affection and care. The translation preserves the literal
    wording while allowing the relational sense to be inferred.
