id: ROM.16.13
reference: Romans 16:13
source:
  edition: SBLGNT
  text: ἀσπάσασθε Ῥοῦφον τὸν ἐκλεκτὸν ἐν κυρίῳ καὶ τὴν μητέρα αὐτοῦ καὶ ἐμοῦ.
translation:
  text: Greet Rufus, chosen in the Lord, and his mother—and mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elect in the Lord.' The Greek adjective can also carry the sense 'choice'
      or 'outstanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Imperative plural calling for greeting/salutation. 'Greet' is the natural
    concise English equivalent in Paul's closing greetings.
- source_word: Ῥοῦφον
  chosen: Rufus
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
- source_word: ἐκλεκτὸν
  chosen: chosen
  alternatives:
  - elect
  - select
  lexicon: BDAG
  rationale: The adjective means 'chosen' or 'elect.' 'Chosen' is more readable modern
    English while preserving the theological sense. 'Elect' is a viable traditional
    alternative but can sound more technical in English.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - in the Lord Jesus
  lexicon: BDAG
  rationale: 'The prepositional phrase most naturally expresses sphere or relation:
    Rufus is distinguished as chosen in relation to the Lord. ''Lord'' follows the
    doctrine''s default rendering for κύριος.'
- source_word: μητέρα αὐτοῦ καὶ ἐμοῦ
  chosen: his mother—and mine
  alternatives:
  - his mother and my mother
  - his mother, who is also a mother to me
  lexicon: BDAG
  rationale: 'The Greek is elliptical: literally ''his mother and mine.'' The dash
    preserves the warm personal aside and the ellipsis in idiomatic English without
    over-paraphrasing into a metaphorical explanation.'
