theological_decisions:
- issue: Rendering ἅγιοι in a Pauline greeting list
  chosen_reading: saints
  alternative_readings:
  - holy ones
  - God's holy people
  rationale: The term here identifies fellow believers associated with the named persons.
    'Saints' preserves Paul's customary designation and avoids paraphrastic expansion,
    while not implying a later canonization concept. No doctrinally contested term
    from DOCTRINE.md requires a footnote here.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Gender of Ἰουλίαν
  chosen_reading: Julia
  alternative_readings:
  - Julias
  rationale: The form is best taken as the feminine name Julia. Because the name's
    gender has occasionally been disputed in translation tradition, the alternative
    is preserved in a footnote for auditability, while the main text follows the plainest
    reading of the Greek form and standard onomastic usage.
  doctrine_reference: Translation philosophy §§1, 4
