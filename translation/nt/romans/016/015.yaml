id: ROM.16.15
reference: Romans 16:15
source:
  edition: SBLGNT
  text: ἀσπάσασθε Φιλόλογον καὶ Ἰουλίαν, Νηρέα καὶ τὴν ἀδελφὴν αὐτοῦ, καὶ Ὀλυμπᾶν
    καὶ τοὺς σὺν αὐτοῖς πάντας ἁγίους.
translation:
  text: Greet Philologus and Julia, Nereus and his sister, and Olympas and all the
    saints with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Julias,' if the name is taken as masculine; the Greek form
      is commonly understood as the feminine name 'Julia.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative, second person plural, functioning as a directive
    to convey greetings. 'Greet' is the most natural concise English equivalent in
    epistolary context.
- source_word: Φιλόλογον
  chosen: Philologus
  rationale: Personal name; transliterated according to standard English convention
    per translation philosophy.
- source_word: Ἰουλίαν
  chosen: Julia
  alternatives:
  - Julias
  rationale: The accusative form most naturally represents the feminine name Julia.
    While some have proposed the masculine Julias, the standard and more likely reading
    is the feminine personal name; the alternative is preserved in a footnote because
    the form has been discussed in translation history.
- source_word: Νηρέα
  chosen: Nereus
  rationale: Personal name; transliterated by standard convention.
- source_word: τὴν ἀδελφὴν αὐτοῦ
  chosen: his sister
  alternatives:
  - the sister of him
  lexicon: BDAG
  rationale: ἀδελφή means 'sister.' The possessive αὐτοῦ is naturally rendered 'his'
    in English. The phrase refers to Nereus's sister in straightforward apposition.
- source_word: Ὀλυμπᾶν
  chosen: Olympas
  alternatives:
  - Olympan
  rationale: Personal name; 'Olympas' is the conventional English transliteration
    of Ὀλυμπᾶς in the accusative form Ὀλυμπᾶν.
- source_word: τοὺς σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - who are with them
  - in their company
  lexicon: BDAG
  rationale: σύν with the dative denotes association. English idiom prefers 'with
    them'; the article is absorbed into the natural phrase rather than rendered woodenly.
- source_word: πάντας ἁγίους
  chosen: all the saints
  alternatives:
  - all the holy ones
  - all God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Paul commonly denotes believers as 'saints' or 'holy ones.'
    'Saints' preserves the established Pauline ecclesial sense without unnecessary
    expansion. πάντας is brought forward as 'all.'
