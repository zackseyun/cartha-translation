theological_decisions:
- issue: Scope of Paul's statement about rulers and praise
  chosen_reading: Render the statement descriptively about the normal function of
    governing authorities without importing an absolute theological endorsement of
    every ruler's behavior.
  alternative_readings:
  - Treat as an unqualified universal claim that all rulers always reward good and
    punish evil
  - Treat as ironic or subversive speech
  rationale: The verse states the intended/ordinary role of civil authority in context.
    The translation should not intensify this into a doctrinal claim beyond the wording,
    nor should it inject irony absent textual markers.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
