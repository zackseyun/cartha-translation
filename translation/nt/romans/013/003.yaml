id: ROM.13.3
reference: Romans 13:3
source:
  edition: SBLGNT
  text: οἱ γὰρ ἄρχοντες οὐκ εἰσὶν φόβος ⸂τῷ ἀγαθῷ ἔργῳ⸃ ἀλλὰ ⸂τῷ κακῷ⸃. θέλεις δὲ
    μὴ φοβεῖσθαι τὴν ἐξουσίαν; τὸ ἀγαθὸν ποίει, καὶ ἕξεις ἔπαινον ἐξ αὐτῆς·
translation:
  text: For rulers are not a terror to good conduct, but to bad. But do you want not
    to fear the authority? Do what is good, and you will have praise from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a good deed ... to wrongdoing.' The Greek contrasts what is good
      with what is bad in a general ethical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'Do you wish not to fear the authority?'
    reason: lexical_alternative
  - marker: c
    text: That is, from the governing authority.
    reason: cross_reference
lexical_decisions:
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - authorities
  - governing officials
  lexicon: BDAG
  rationale: ἄρχοντες refers to those who rule or hold governing office. 'Rulers'
    is natural English and fits the immediate political context without over-specifying
    office.
- source_word: φόβος
  chosen: a terror
  alternatives:
  - fear
  - something to fear
  lexicon: BDAG
  rationale: 'Predicate nominative used concretely: rulers are not ''a terror'' to
    good conduct, meaning not an object/cause of fear. ''A terror'' preserves the
    idiomatic force better than the abstract ''fear''.'
- source_word: τῷ ἀγαθῷ ἔργῳ
  chosen: to good conduct
  alternatives:
  - to a good deed
  - for good work
  lexicon: BDAG
  rationale: Although ἔργον is singular ('work/deed'), in English the sense is generic.
    'Good conduct' captures the ethical-behavioral force in context and pairs naturally
    with the contrast to bad behavior.
- source_word: τῷ κακῷ
  chosen: to bad
  alternatives:
  - to evil
  - to wrongdoing
  - to bad conduct
  lexicon: BDAG
  rationale: The adjective stands substantivally. 'Bad' is concise and mirrors the
    antithesis with 'good'; the behavioral sense is supplied by context from the previous
    phrase.
- source_word: θέλεις δὲ μὴ φοβεῖσθαι
  chosen: But do you want not to fear
  alternatives:
  - Do you want to be unafraid of
  - Do you wish not to fear
  lexicon: BDAG
  rationale: 'This preserves the Greek structure closely: θέλεις + infinitive with
    μή. Slightly formal English is retained for transparency and auditability.'
- source_word: ἐξουσίαν
  chosen: the authority
  alternatives:
  - authority
  - the governing authority
  - the ruling power
  lexicon: BDAG
  rationale: The singular with article likely refers to governing authority as an
    institution. 'The authority' preserves the singular and links with the surrounding
    discussion in Romans 13.
- source_word: τὸ ἀγαθὸν ποίει
  chosen: Do what is good
  alternatives:
  - Do good
  - Practice what is good
  lexicon: BDAG
  rationale: The articular adjective functions substantivally. 'Do what is good' is
    idiomatic and preserves the moral category rather than reducing it merely to isolated
    acts.
- source_word: ἕξεις ἔπαινον
  chosen: you will have praise
  alternatives:
  - you will receive praise
  - you will gain approval
  lexicon: BDAG
  rationale: ἕξεις literally means 'you will have.' Retaining 'have praise' stays
    closer to the Greek while remaining understandable.
- source_word: ἐξ αὐτῆς
  chosen: from it
  alternatives:
  - from her
  - from the authority
  lexicon: BDAG
  rationale: αὐτῆς is feminine singular, referring back to ἐξουσία. English normally
    uses 'it' for an impersonal institution; this avoids personifying the authority
    beyond the Greek requirement.
