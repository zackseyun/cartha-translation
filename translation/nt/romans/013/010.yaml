id: ROM.13.10
reference: Romans 13:10
source:
  edition: SBLGNT
  text: ἡ ἀγάπη τῷ πλησίον κακὸν οὐκ ἐργάζεται· πλήρωμα οὖν νόμου ἡ ἀγάπη.
translation:
  text: Love does no harm to a neighbor; therefore love is the fulfillment of the
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Love does not work evil against a neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'love is the fullness of the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the natural
    modern English equivalent and preserves the lexical connection across the verse,
    where the term appears twice for emphasis.
- source_word: τῷ πλησίον
  chosen: to a neighbor
  alternatives:
  - to the neighbor
  - to one's neighbor
  lexicon: BDAG
  rationale: 'The dative marks the person affected: ''to a neighbor'' communicates
    the generic ethical sense in idiomatic English. The anarthrous force in English
    is better represented generically than by the more wooden ''to the neighbor.'''
- source_word: κακὸν
  chosen: harm
  alternatives:
  - evil
  - wrong
  lexicon: BDAG
  rationale: In this context κακόν refers to injury or wrongdoing done to another
    person. 'Harm' is concise, natural, and fits the ethical context better than the
    broader and more abstract 'evil.'
- source_word: οὐκ ἐργάζεται
  chosen: does no harm
  alternatives:
  - does not work evil
  - does not do wrong
  lexicon: BDAG
  rationale: ἐργάζομαι here means 'do/produce/practice.' Combined with κακόν, the
    idiomatic sense is that love does not bring about harm. The English wording folds
    the negation and object into a natural clause while preserving the meaning.
- source_word: πλήρωμα
  chosen: the fulfillment
  alternatives:
  - fullness
  - completion
  lexicon: BDAG
  rationale: In Paul's ethical argument, πλήρωμα denotes that which brings the law
    to its intended completion. 'Fulfillment' is the established and contextually
    precise rendering; 'fullness' would sound less clear in English here.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding statement. 'Therefore'
    clearly signals Paul's logical progression.
- source_word: νόμου
  chosen: of the law
  alternatives:
  - of law
  lexicon: BDAG
  rationale: The genitive is best rendered with the article in English because Paul
    is referring to the Mosaic law as a recognizable category in context. 'Of law'
    would be awkward and less clear.
