theological_decisions:
- issue: Meaning of love's relation to the law
  chosen_reading: love is the fulfillment of the law
  alternative_readings:
  - love is the fullness of the law
  - love fulfills the law
  rationale: The Greek is a nominal clause, not an imperative or explicit verbal statement.
    Rendering it as 'love is the fulfillment of the law' preserves both the syntax
    and Paul's theological claim without over-interpreting how love relates to each
    commandment beyond the immediate context.
  doctrine_reference: Translation philosophy §3, §5
