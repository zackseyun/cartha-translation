id: ROM.13.2
reference: Romans 13:2
source:
  edition: SBLGNT
  text: ὥστε ὁ ἀντιτασσόμενος τῇ ἐξουσίᾳ τῇ τοῦ θεοῦ διαταγῇ ἀνθέστηκεν, οἱ δὲ ἀνθεστηκότες
    ἑαυτοῖς κρίμα λήμψονται.
translation:
  text: Therefore, the one who resists the authority has opposed the ordinance of
    God, and those who have opposed it will receive judgment on themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's ordinance' for 'the ordinance of God.'
    reason: lexical_alternative
  - marker: b
    text: '''Judgment'' could also be rendered ''condemnation'' or ''sentence,'' but
      the Greek does not require the stronger sense of final condemnation here.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  chosen: Therefore
  alternatives:
  - So then
  - Consequently
  lexicon: BDAG
  rationale: Introduces an inferential conclusion from the previous verse. 'Therefore'
    is natural modern English and preserves the logical force.
- source_word: ὁ ἀντιτασσόμενος
  chosen: the one who resists
  alternatives:
  - whoever opposes
  - the one who sets himself against
  lexicon: BDAG
  rationale: The articular present middle participle functions substantivally, referring
    generically to a person characterized by resistance. 'Resists' is concise and
    idiomatic.
- source_word: τῇ ἐξουσίᾳ
  chosen: the authority
  alternatives:
  - the governing authority
  - the ruling authority
  lexicon: BDAG
  rationale: ἐξουσία here refers back to the governing authority in the immediate
    context (Rom 13:1). 'The authority' preserves the singular and allows the contextual
    referent to supply the governmental sense without overloading the phrase.
- source_word: τῇ τοῦ θεοῦ διαταγῇ
  chosen: the ordinance of God
  alternatives:
  - God's ordinance
  - the arrangement of God
  - the decree of God
  lexicon: BDAG
  rationale: διαταγή denotes an arrangement, directive, or ordinance. 'Ordinance of
    God' preserves the formal, institutional sense in context, namely what God has
    ordered regarding authority.
- source_word: ἀνθέστηκεν
  chosen: has opposed
  alternatives:
  - has resisted
  - has set himself against
  lexicon: BDAG
  rationale: Perfect tense indicates a completed stance with present relevance. 'Has
    opposed' avoids awkward repetition with the earlier 'resists' while preserving
    the semantic link.
- source_word: οἱ δὲ ἀνθεστηκότες
  chosen: and those who have opposed it
  alternatives:
  - and those who have resisted
  - but those who have opposed
  lexicon: BDAG
  rationale: The perfect active participle parallels the previous verb and refers
    to those who have taken such a stand. 'It' makes explicit the object implied from
    context in English.
- source_word: ἑαυτοῖς
  chosen: on themselves
  alternatives:
  - for themselves
  - upon themselves
  lexicon: BDAG
  rationale: The reflexive dative indicates that the consequence comes back upon the
    resisters themselves. 'On themselves' communicates incurred liability clearly
    in English.
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: BDAG
  rationale: κρίμα can mean judgment or condemnation depending on context. 'Judgment'
    is broader and avoids importing a stronger final-condemnation sense than the verse
    itself explicitly states.
- source_word: λήμψονται
  chosen: will receive
  alternatives:
  - will incur
  - will bring upon themselves
  lexicon: BDAG
  rationale: Future middle here conveys that they will receive/incur the consequence.
    'Will receive' is straightforward and preserves the verbal idea without overinterpretation.
