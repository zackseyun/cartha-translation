theological_decisions:
- issue: Scope of κρίμα
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  rationale: The verse states that resisters incur divine/judicial judgment, but it
    does not specify eternal condemnation. Rendering κρίμα as 'judgment' preserves
    the warning without overstating the theological consequence.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of ἐξουσία
  chosen_reading: civil/governing authority in context
  alternative_readings:
  - authority in a broader abstract sense
  rationale: The immediate context in Romans 13:1 concerns governing authorities established
    by God. The translation keeps 'the authority' in the text for readability while
    understanding it contextually as civil authority.
  doctrine_reference: Original-language primacy over translation tradition.
