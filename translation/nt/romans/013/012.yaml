theological_decisions:
- issue: Eschatological metaphor of night and day
  chosen_reading: Retained the temporal imagery literally ('night'/'day') while allowing
    its moral and salvation-historical force to remain implicit.
  alternative_readings:
  - Interpretive renderings such as 'this dark age is nearly over' / 'the new day
    is near'
  rationale: The verse uses metaphor that is both temporal and ethical. A more explicit
    paraphrase would resolve the tension rather than preserve it. Optimal equivalence
    favors the literal imagery in readable English.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Meaning of ὅπλα τοῦ φωτός
  chosen_reading: Rendered as 'the armor of light' in the main text.
  alternative_readings:
  - the weapons of light
  rationale: The immediate verb 'put on' favors wearable martial equipment. 'Armor'
    also preserves the ethical-spiritual warfare sense without narrowing to offensive
    weaponry alone. The alternative remains worth preserving because ὅπλα commonly
    denotes weapons.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented
    exception.
