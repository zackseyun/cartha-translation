id: ROM.13.12
reference: Romans 13:12
source:
  edition: SBLGNT
  text: ἡ νὺξ προέκοψεν, ἡ δὲ ἡμέρα ἤγγικεν. ⸀ἀποβαλώμεθα οὖν τὰ ἔργα τοῦ σκότους,
    ⸂ἐνδυσώμεθα δὲ⸃ τὰ ὅπλα τοῦ φωτός.
translation:
  text: The night is far gone; the day has drawn near. Therefore let us cast off the
    works of darkness and put on the armor of light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the night has advanced.' The Greek verb pictures the night as having
      moved forward, that is, as largely spent.
    reason: lexical_alternative
  - marker: b
    text: Or 'the weapons of light.'
    reason: alternative_reading
lexical_decisions:
- source_word: νὺξ
  chosen: night
  alternatives:
  - darkness
  lexicon: BDAG
  rationale: Rendered literally as 'night' in the temporal metaphor contrasting with
    'day.' The following phrase about darkness clarifies the moral dimension without
    collapsing the image here.
- source_word: προέκοψεν
  chosen: is far gone
  alternatives:
  - advanced
  - progressed
  - passed on
  lexicon: BDAG
  rationale: The aorist verb literally denotes advancing/progressing. In English idiom
    for time, 'is far gone' best conveys that the night has substantially passed,
    matching the eschatological sense better than the less natural 'advanced.'
- source_word: ἡμέρα
  chosen: day
  lexicon: BDAG
  rationale: Kept literal to preserve the temporal and moral contrast with 'night.'
- source_word: ἤγγικεν
  chosen: has drawn near
  alternatives:
  - is near
  - has come near
  lexicon: BDAG
  rationale: The perfect tense suggests a present state resulting from approach. 'Has
    drawn near' preserves that aspect more clearly than the flatter 'is near.'
- source_word: ἀποβαλώμεθα
  chosen: let us cast off
  alternatives:
  - let us throw off
  - let us put away
  lexicon: BDAG
  rationale: 'Aorist middle subjunctive in hortatory use: ''let us cast off.'' ''Cast
    off'' is vivid and idiomatic for removing clothing, fitting the paired clothing
    metaphor with ''put on.'''
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is retained as a standard Pauline term and fits the moral
    sense here. ''Deeds'' is possible but less consistent with Pauline diction.'
- source_word: σκότους
  chosen: darkness
  lexicon: BDAG
  rationale: 'Literal genitive: ''of darkness.'' Preserves the ethical metaphor without
    over-interpreting it as evil in the main text.'
- source_word: ἐνδυσώμεθα
  chosen: put on
  alternatives:
  - clothe ourselves with
  lexicon: BDAG
  rationale: Aorist middle subjunctive in hortatory use, paired with 'cast off.' 'Put
    on' is natural English and preserves the clothing imagery.
- source_word: ὅπλα
  chosen: armor
  alternatives:
  - weapons
  - instruments
  lexicon: BDAG
  rationale: Ὅπλα can mean weapons or instruments, but in this context with 'put on'
    and the contrast with works of darkness, 'armor' best captures wearable equipment
    and coheres with Paul's martial-clothing imagery elsewhere.
- source_word: φωτός
  chosen: light
  lexicon: BDAG
  rationale: 'Literal genitive: ''of light.'' Preserves the metaphorical contrast
    with darkness and the ethical/escheatological symbolism.'
