id: ROM.13.1
reference: Romans 13:1
source:
  edition: SBLGNT
  text: Πᾶσα ψυχὴ ἐξουσίαις ὑπερεχούσαις ὑποτασσέσθω, οὐ γὰρ ἔστιν ἐξουσία εἰ μὴ ὑπὸ
    θεοῦ, αἱ δὲ ⸀οὖσαι ⸀ὑπὸ θεοῦ τεταγμέναι εἰσίν.
translation:
  text: Let every person be subject to the governing authorities, for there is no
    authority except from God, and those that exist have been appointed by God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the higher authorities' or 'the superior authorities.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have been instituted by God' or 'have been ordered by God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶσα ψυχὴ
  chosen: every person
  alternatives:
  - every soul
  - everyone
  lexicon: BDAG
  rationale: Literally 'every soul,' but in idiomatic Koine this means each person.
    'Every person' preserves the distributive force of πᾶσα while using natural modern
    English and avoiding an overly literal rendering that could mislead readers into
    hearing a technical anthropology not intended here.
- source_word: ἐξουσίαις
  chosen: authorities
  alternatives:
  - powers
  - ruling authorities
  lexicon: BDAG
  rationale: ἐξουσία denotes delegated or exercised authority. In this civic context,
    'authorities' is the clearest base gloss and fits the later clause about their
    being ordered by God.
- source_word: ὑπερεχούσαις
  chosen: governing
  alternatives:
  - higher
  - superior
  - those in authority over
  lexicon: BDAG
  rationale: The participle literally means 'being above/surpassing.' In context it
    qualifies civil authorities as those in a superior ruling position. 'Governing'
    communicates the functional sense in idiomatic English better than the traditional
    but potentially vague 'higher.'
- source_word: ὑποτασσέσθω
  chosen: be subject
  alternatives:
  - submit
  - be subordinate
  lexicon: BDAG
  rationale: The present imperative calls for ordered subjection. 'Be subject' preserves
    the passive/middle nuance and avoids importing a stronger voluntative tone than
    the Greek necessarily carries, while remaining natural English.
- source_word: οὐ γὰρ ἔστιν ἐξουσία εἰ μὴ ὑπὸ θεοῦ
  chosen: for there is no authority except from God
  alternatives:
  - for there is no authority except by God
  - for authority does not exist unless from God
  lexicon: BDAG
  rationale: This clause states the ultimate source of authority. 'From God' is the
    most natural rendering of ὑπό here in this construction in English, expressing
    source/origin without over-specifying agency in a way that could flatten the nuance.
- source_word: αἱ δὲ οὖσαι
  chosen: those that exist
  alternatives:
  - the existing authorities
  - those that are
  lexicon: BDAG
  rationale: The feminine plural participle refers back to authorities. 'Those that
    exist' is concise and natural, though the referent remains clear from context.
- source_word: τεταγμέναι
  chosen: have been appointed
  alternatives:
  - have been instituted
  - have been ordered
  - have been established
  lexicon: BDAG
  rationale: The perfect passive of τάσσω indicates a state resulting from God's ordering.
    'Have been appointed' communicates divine ordering/placement clearly in modern
    English. 'Instituted' is also possible, but 'appointed' better matches the personal/governing
    context.
