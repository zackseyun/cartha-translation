theological_decisions:
- issue: Scope and force of Paul's statement about civil authority and God
  chosen_reading: Render the verse as affirming that governing authorities derive
    their authority from God and that existing authorities stand in a divinely ordered
    relation, without expanding this into an unconditional endorsement of every act
    of every ruler.
  alternative_readings:
  - A stronger reading that every specific regime or action is positively approved
    by God
  - A weaker reading that Paul speaks only of authority as an abstract principle,
    not actual governing authorities
  rationale: The Greek speaks concretely of governing authorities and says existing
    ones have been τεταγμέναι by God. The translation should preserve that claim while
    not importing a broader theological conclusion beyond the verse itself. 'Appointed'
    reflects divine ordering without requiring the reader to infer moral approval
    of all governmental behavior.
  doctrine_reference: Preserve theological tension rather than resolve it
