id: ROM.13.6
reference: Romans 13:6
source:
  edition: SBLGNT
  text: διὰ τοῦτο γὰρ καὶ φόρους τελεῖτε, λειτουργοὶ γὰρ θεοῦ εἰσιν εἰς αὐτὸ τοῦτο
    προσκαρτεροῦντες.
translation:
  text: For because of this you also pay taxes, for they are God’s ministers, devoting
    themselves to this very thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For this reason you also pay taxes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'servants of God' or 'public servants of God.' The Greek λειτουργοί denotes
      those engaged in official service.
    reason: lexical_alternative
  - marker: c
    text: Or 'for this very purpose,' emphasizing their ongoing attention to governmental
      duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  lexicon: BDAG
  rationale: The phrase points back to the preceding argument about subjection to
    governing authorities and conscience. 'Because of this' is natural English and
    preserves the causal force of διά with the accusative.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Both instances of γάρ are explanatory. 'For' preserves the connective,
    argumentative style of Paul without over-paraphrasing.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  lexicon: BDAG
  rationale: καί here adds tax payment as a further implication of the preceding principle.
    'Also' best reflects the additive sense.
- source_word: φόρους
  chosen: taxes
  alternatives:
  - tributes
  - tax payments
  lexicon: BDAG
  rationale: φόρος commonly refers to taxes or tribute paid to governing authorities.
    'Taxes' is the clearest modern equivalent.
- source_word: τελεῖτε
  chosen: pay
  alternatives:
  - render
  - pay in full
  lexicon: BDAG
  rationale: In context with φόρους, τελέω means to pay or discharge an obligation.
    'Pay' is idiomatic and sufficiently precise.
- source_word: λειτουργοὶ
  chosen: ministers
  alternatives:
  - servants
  - public servants
  lexicon: BDAG
  rationale: λειτουργός denotes one engaged in public service, and in Pauline usage
    can carry a dignified sense of service before God. 'Ministers' preserves the elevated
    register and the idea of official service better than the flatter 'servants.'
- source_word: θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: 'The genitive is possessive/relational: these authorities function as
    God''s ministers in the limited sense stated by the text. The rendering avoids
    importing approval of every action while preserving Paul''s wording.'
- source_word: εἰς αὐτὸ τοῦτο
  chosen: to this very thing
  alternatives:
  - for this very purpose
  - for this very matter
  lexicon: BDAG
  rationale: The phrase intensifies purpose/focus. 'To this very thing' is a fairly
    literal rendering that remains readable and matches the following participle.
- source_word: προσκαρτεροῦντες
  chosen: devoting themselves
  alternatives:
  - attending continually
  - persisting
  - being continually occupied
  lexicon: BDAG
  rationale: The participle conveys ongoing, persistent attention to a task. 'Devoting
    themselves' captures the durative sense in natural English.
