theological_decisions:
- issue: How to render λειτουργοὶ θεοῦ for governing authorities
  chosen_reading: '''God’s ministers'''
  alternative_readings:
  - '''servants of God'''
  - '''public servants of God'''
  rationale: The text attributes a real derivative role to civil authorities under
    God's ordering, but does not imply that every act of rulers is morally approved.
    'Ministers' preserves the formal dignity of λειτουργοί and the theological claim
    of divine commission without expanding it beyond the verse.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
