id: ROM.13.13
reference: Romans 13:13
source:
  edition: SBLGNT
  text: ὡς ἐν ἡμέρᾳ εὐσχημόνως περιπατήσωμεν, μὴ κώμοις καὶ μέθαις, μὴ κοίταις καὶ
    ἀσελγείαις, μὴ ἔριδι καὶ ζήλῳ,
translation:
  text: Let us walk properly as in the daytime, not in revelries and drunkenness,
    not in sexual immorality and sensuality, not in strife and jealousy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'decently' for 'properly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'envy' for 'jealousy'; the Greek term can denote either, but here carries
      a negative sense in the vice list.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἐν ἡμέρᾳ
  chosen: as in the daytime
  alternatives:
  - as in the day
  - as in daylight
  lexicon: BDAG
  rationale: The phrase is idiomatic, contrasting behavior appropriate to daylight
    with deeds of darkness in the surrounding context. 'Daytime' gives natural English
    while preserving the metaphor.
- source_word: εὐσχημόνως
  chosen: properly
  alternatives:
  - decently
  - honorably
  - becomingly
  lexicon: BDAG
  rationale: The adverb denotes conduct that is respectable or decent. 'Properly'
    is clear modern English; 'decently' is a close alternative preserved in the rationale.
- source_word: περιπατήσωμεν
  chosen: Let us walk
  alternatives:
  - let us live
  - let us conduct ourselves
  lexicon: BDAG
  rationale: Paul commonly uses 'walk' metaphorically for manner of life. Retaining
    'walk' preserves Pauline idiom and the hortatory subjunctive force is represented
    by 'Let us'.
- source_word: κώμοις
  chosen: revelries
  alternatives:
  - carousing
  - orgies
  - wild parties
  lexicon: BDAG
  rationale: The term refers to riotous feasting or carousing, often with drinking.
    'Revelries' is suitably broad and dignified; 'orgies' would be misleadingly narrowed
    in modern English to sexual excess.
- source_word: μέθαις
  chosen: drunkenness
  alternatives:
  - drinking bouts
  - intoxication
  lexicon: BDAG
  rationale: The noun denotes states or episodes of intoxication. 'Drunkenness' is
    the standard and natural rendering.
- source_word: κοίταις
  chosen: sexual immorality
  alternatives:
  - beds
  - sexual promiscuity
  - debauched beds
  lexicon: BDAG
  rationale: Literally 'beds,' but idiomatically a reference to illicit sexual activity.
    A literal rendering would be opaque in English, so the sense is translated.
- source_word: ἀσελγείαις
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  - indecency
  lexicon: BDAG
  rationale: The word denotes shameless, unrestrained conduct, often sexual. 'Sensuality'
    is readable modern English and pairs well with the preceding term without over-specifying.
- source_word: ἔριδι
  chosen: strife
  alternatives:
  - quarreling
  - contention
  lexicon: BDAG
  rationale: The noun refers to discord or contentious rivalry. 'Strife' is concise
    and preserves the vice-list style.
- source_word: ζήλῳ
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: BDAG
  rationale: In this vice context the negative sense is intended. 'Jealousy' fits
    the pairing with strife better than the more positive or ambiguous 'zeal'; 'envy'
    is a viable alternative preserved in a footnote.
