theological_decisions:
- issue: Metaphorical contrast of day and darkness in ethical exhortation
  chosen_reading: Rendered the imagery straightforwardly as 'as in the daytime' without
    allegorizing beyond Paul's ethical contrast.
  alternative_readings:
  - as if it were daytime
  - as in the day
  rationale: The verse participates in the surrounding day/night metaphor, but the
    translation should preserve the image rather than interpret it into a fuller doctrinal
    statement not explicit in the verse itself.
  doctrine_reference: Translation philosophy §3
- issue: Idiomatic sexual terminology in κοίταις
  chosen_reading: Translated by sense as 'sexual immorality' rather than the literal
    'beds.'
  alternative_readings:
  - beds
  rationale: Optimal equivalence favors clarity where a literal rendering would obscure
    the moral force of the Greek idiom. This does not expand the text beyond its clear
    sexual reference.
  doctrine_reference: Translation philosophy §1, §6
