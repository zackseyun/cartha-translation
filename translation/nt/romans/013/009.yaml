theological_decisions:
- issue: Rendering of the Decalogue prohibitions in quoted law
  chosen_reading: Traditional covenantal command form ('You shall not ...')
  alternative_readings:
  - Direct imperative form ('Do not ...')
  rationale: The Greek reproduces the scriptural future-indicative style of the commandments.
    Preserving that form maintains the intertextual connection to the Decalogue and
    Leviticus without altering meaning.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English with preserved theological weight'
- issue: Scope of λόγος in ἐν τῷ λόγῳ τούτῳ
  chosen_reading: '''word'' meaning a summarizing statement/principle'
  alternative_readings:
  - '''saying'''
  - '''message'''
  rationale: Paul is not referring to a single lexical item but to the scriptural
    formulation that follows. 'Word' is retained in the main text because it is faithful
    to λόγος and biblically resonant; the sense is clarified by context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than over-interpret'
