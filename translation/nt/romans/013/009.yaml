id: ROM.13.9
reference: Romans 13:9
source:
  edition: SBLGNT
  text: τὸ γάρ· Οὐ μοιχεύσεις, Οὐ φονεύσεις, Οὐ κλέψεις, Οὐκ ἐπιθυμήσεις, καὶ εἴ τις
    ἑτέρα ἐντολή, ἐν ⸂τῷ λόγῳ τούτῳ⸃ ἀνακεφαλαιοῦται, ⸂ἐν τῷ⸃· Ἀγαπήσεις τὸν πλησίον
    σου ὡς σεαυτόν.
translation:
  text: 'For this: “You shall not commit adultery, you shall not murder, you shall
    not steal, you shall not covet,” and if there is any other commandment, it is
    summed up in this word: “You shall love your neighbor as yourself.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it is summed up in this statement.' The Greek word can mean 'word,'
      'statement,' or 'saying' in context.
    reason: lexical_alternative
  - marker: b
    text: '''You shall not murder'' is more precise than the traditional ''You shall
      not kill,'' since the Greek verb refers to unlawful killing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ γάρ
  chosen: For this
  alternatives:
  - For the
  - For
  lexicon: BDAG
  rationale: 'The neuter article with γάρ introduces the content or matter under discussion:
    the commandments just cited. ''For this'' is idiomatic English that preserves
    the explanatory force better than a wooden ''for the.'''
- source_word: μοιχεύσεις
  chosen: you shall not commit adultery
  alternatives:
  - do not commit adultery
  lexicon: BDAG
  rationale: Future indicative used in citation of the Decalogue functions imperativally.
    'You shall not commit adultery' preserves the scriptural/legal form familiar from
    the source tradition.
- source_word: φονεύσεις
  chosen: you shall not murder
  alternatives:
  - you shall not kill
  lexicon: BDAG
  rationale: φονεύω denotes murder rather than killing in the broadest sense. 'Murder'
    is more lexically precise and avoids overstating the prohibition.
- source_word: κλέψεις
  chosen: you shall not steal
  alternatives:
  - do not steal
  lexicon: BDAG
  rationale: As with the other Decalogue citations, the future indicative is rendered
    in standard English command form.
- source_word: ἐπιθυμήσεις
  chosen: you shall not covet
  alternatives:
  - you shall not desire
  lexicon: BDAG
  rationale: In this Decalogue context, 'covet' is the established and contextually
    precise sense of ἐπιθυμέω, narrower than the broader 'desire.'
- source_word: εἴ τις ἑτέρα ἐντολή
  chosen: if there is any other commandment
  alternatives:
  - and whatever other commandment there may be
  - if any other commandment
  lexicon: BDAG
  rationale: This clause broadens the scope beyond the listed commandments. 'There
    is' makes natural English while preserving the indefinite force of τις and the
    qualitative sense of ἑτέρα as 'other.'
- source_word: ἀνακεφαλαιοῦται
  chosen: it is summed up
  alternatives:
  - it is recapitulated
  - it is brought together under one heading
  lexicon: BDAG
  rationale: The verb means to sum up, bring together, or gather under a heading.
    'Summed up' is clear modern English and fits Paul's point that the commandments
    are comprehended in one principle.
- source_word: ἐν τῷ λόγῳ τούτῳ
  chosen: in this word
  alternatives:
  - in this statement
  - in this saying
  lexicon: BDAG
  rationale: λόγος here refers to a verbal formulation or statement. 'Word' preserves
    the compactness of the Greek and echoes biblical diction, while still being understandable
    in context.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - Love
  lexicon: BDAG
  rationale: The future indicative again cites Scripture in command form. Rendering
    with 'You shall love' preserves the quotation's formal shape.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow human being
  lexicon: BDAG
  rationale: The term in this citation from Leviticus conventionally means 'neighbor.'
    This is both accurate and idiomatic, and it preserves the intertextual link.
- source_word: ὡς σεαυτόν
  chosen: as yourself
  alternatives:
  - as you love yourself
  lexicon: BDAG
  rationale: The reflexive comparison is concise in Greek; 'as yourself' is the natural
    direct equivalent without adding interpretive expansion.
