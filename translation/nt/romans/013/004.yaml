theological_decisions:
- issue: Nature of the authority's punitive role in relation to divine wrath
  chosen_reading: Render εἰς ὀργὴν as 'for wrath' without specifying 'God's wrath'
    in the main text.
  alternative_readings:
  - to execute wrath
  - to bring God's wrath
  - for punishment
  rationale: The context strongly suggests the ruler functions as God's agent in punitive
    judgment, but the Greek phrase itself is concise and does not explicitly repeat
    'God's.' Preserving 'for wrath' maintains the theological connection without importing
    a fuller doctrinal explanation into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
