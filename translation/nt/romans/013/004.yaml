id: ROM.13.4
reference: Romans 13:4
source:
  edition: SBLGNT
  text: θεοῦ γὰρ διάκονός ἐστιν σοὶ εἰς τὸ ἀγαθόν. ἐὰν δὲ τὸ κακὸν ποιῇς, φοβοῦ· οὐ
    γὰρ εἰκῇ τὴν μάχαιραν φορεῖ· θεοῦ γὰρ διάκονός ἐστιν, ἔκδικος εἰς ὀργὴν τῷ τὸ
    κακὸν πράσσοντι.
translation:
  text: For it is God’s servant for your good. But if you do what is evil, be afraid,
    for it does not bear the sword for nothing. For it is God’s servant, an avenger
    for wrath against the one who practices evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in vain' for 'for nothing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to execute wrath on the one who does evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: διάκονός
  chosen: servant
  alternatives:
  - minister
  lexicon: BDAG
  rationale: διάκονος commonly denotes an agent who serves or carries out a commission.
    Here it refers to governing authority as functioning under God. 'Servant' is clear
    modern English and avoids the ecclesiastical narrowing of 'minister,' while fitting
    the civic context better than 'slave.'
- source_word: σοὶ
  chosen: for your
  alternatives:
  - to you
  lexicon: BDAG
  rationale: 'The dative pronoun with εἰς τὸ ἀγαθόν is best expressed idiomatically
    in English as benefit: ''for your good.'' This preserves the sense of advantage
    rather than a merely directional ''to you.'''
- source_word: εἰς τὸ ἀγαθόν
  chosen: for your good
  alternatives:
  - for good
  - for the good
  lexicon: BDAG
  rationale: The phrase indicates beneficial purpose/result. 'For your good' makes
    explicit the relation to σοὶ and reads naturally in English.
- source_word: τὸ κακὸν ποιῇς
  chosen: you do what is evil
  alternatives:
  - you do evil
  - you do the bad
  lexicon: BDAG
  rationale: κακόν here is moral evil, not merely harm or misfortune. 'Do what is
    evil' is idiomatic and preserves the ethical force.
- source_word: φοβοῦ
  chosen: be afraid
  alternatives:
  - fear
  - be in fear
  lexicon: BDAG
  rationale: The middle/passive imperative is naturally rendered 'be afraid' in context,
    referring to fear of the authority's punitive role.
- source_word: εἰκῇ
  chosen: for nothing
  alternatives:
  - in vain
  - without cause
  lexicon: BDAG
  rationale: The adverb means 'without purpose' or 'in vain.' 'For nothing' is more
    natural contemporary English while preserving the point that the sword is borne
    with real punitive significance.
- source_word: μάχαιραν
  chosen: sword
  alternatives:
  - short sword
  - weapon
  lexicon: BDAG
  rationale: μάχαιρα literally denotes a sword/dagger. 'Sword' preserves the concrete
    image and the traditional judicial-symbolic force; 'weapon' would flatten the
    metaphor.
- source_word: φορεῖ
  chosen: bear
  alternatives:
  - carry
  - wear
  lexicon: BDAG
  rationale: φορέω can mean wear or carry habitually. With μάχαιρα in this context,
    'bear' is the established and semantically fitting English for carrying authority
    to punish.
- source_word: ἔκδικος
  chosen: an avenger
  alternatives:
  - one who executes justice
  - an agent of vengeance
  lexicon: BDAG
  rationale: ἔκδικος denotes one who carries out justice or vengeance. 'An avenger'
    is concise and preserves the retributive sense present in the Greek.
- source_word: εἰς ὀργὴν
  chosen: for wrath
  alternatives:
  - to bring wrath
  - for punishment
  lexicon: BDAG
  rationale: The phrase expresses purpose/result in relation to wrath. 'For wrath'
    is compact and close to the Greek; it leaves open whether the wrath is God's wrath
    mediated through the authority, which suits Paul's wording better than an overinterpretive
    paraphrase.
- source_word: τῷ τὸ κακὸν πράσσοντι
  chosen: against the one who practices evil
  alternatives:
  - on the evildoer
  - against the one doing evil
  lexicon: BDAG
  rationale: πράσσοντι is a substantival participle describing the person characterized
    by evil conduct. 'The one who practices evil' captures the durative/characterizing
    nuance better than a bare 'evildoer,' though that remains a viable alternative.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ links the clauses by explanation. 'For' preserves the argumentative
    flow of Paul's reasoning.
