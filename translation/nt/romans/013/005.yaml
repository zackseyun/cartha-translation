theological_decisions:
- issue: Referent of 'wrath' (ὀργή)
  chosen_reading: Rendered simply as 'wrath' without specifying whether it is divine
    wrath or the magistrate's punitive wrath.
  alternative_readings:
  - the wrath of God
  - the ruler's punishment/penal wrath
  rationale: The immediate context includes both God's ordering of authorities and
    the ruler as an agent who bears the sword. The Greek does not explicitly identify
    the referent here, so the translation preserves the ambiguity rather than resolving
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ὑποτάσσεσθαι in relation to governing authorities
  chosen_reading: submit
  alternative_readings:
  - be subject
  rationale: The verse speaks of the believer's proper posture toward authorities.
    'Submit' communicates the demanded response in clear English without importing
    a broader doctrine of absolute obedience beyond what the text states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import
    doctrinal claims the text does not make.'
