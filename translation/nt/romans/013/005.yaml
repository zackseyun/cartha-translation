id: ROM.13.5
reference: Romans 13:5
source:
  edition: SBLGNT
  text: διὸ ἀνάγκη ὑποτάσσεσθαι, οὐ μόνον διὰ τὴν ὀργὴν ἀλλὰ καὶ διὰ τὴν συνείδησιν,
translation:
  text: Therefore it is necessary to submit, not only because of wrath but also because
    of conscience,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of punishment'; the Greek says 'because of wrath,' which may
      refer either to the ruler's punitive action or, more broadly, to divine wrath
      working through civil authority.
    reason: alternative_reading
  - marker: b
    text: Or 'to be subject.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument
    about governing authorities; 'Therefore' is natural modern English and preserves
    the logical force.
- source_word: ἀνάγκη
  chosen: it is necessary
  alternatives:
  - there is necessity
  - one must
  lexicon: BDAG
  rationale: Impersonal predicate expressing necessity. 'It is necessary' preserves
    the force without over-paraphrasing; 'one must' would be slightly more interpretive.
- source_word: ὑποτάσσεσθαι
  chosen: to submit
  alternatives:
  - to be subject
  - to subject oneself
  lexicon: BDAG
  rationale: Present middle/passive infinitive in context of relation to governing
    authorities. 'To submit' is concise, idiomatic, and captures the voluntary responsive
    sense better than the more wooden 'to be subject,' while remaining faithful to
    the source.
- source_word: οὐ μόνον
  chosen: not only
  alternatives:
  - not merely
  lexicon: BDAG
  rationale: Standard correlative construction with ἀλλὰ καί; 'not only' sets up the
    contrast cleanly in English.
- source_word: διὰ τὴν ὀργὴν
  chosen: because of wrath
  alternatives:
  - on account of wrath
  - because of punishment
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or motive. 'Wrath' preserves
    the lexical value of ὀργή and leaves open whether the reference is to divine wrath
    or the punitive wrath exercised through authorities in context; 'punishment' is
    too interpretive.
- source_word: ἀλλὰ καὶ
  chosen: but also
  alternatives:
  - but even
  - but moreover
  lexicon: BDAG
  rationale: Completes the correlative pair with natural English contrast/addition.
- source_word: διὰ τὴν συνείδησιν
  chosen: because of conscience
  alternatives:
  - for the sake of conscience
  - on account of conscience
  lexicon: BDAG
  rationale: Again διά with accusative gives motive. 'Because of conscience' is direct
    and readable; it conveys inward moral awareness as a reason for submission.
