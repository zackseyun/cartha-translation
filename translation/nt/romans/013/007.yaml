id: ROM.13.7
reference: Romans 13:7
source:
  edition: SBLGNT
  text: ⸀ἀπόδοτε πᾶσι τὰς ὀφειλάς, τῷ τὸν φόρον τὸν φόρον, τῷ τὸ τέλος τὸ τέλος, τῷ
    τὸν φόβον τὸν φόβον, τῷ τὴν τιμὴν τὴν τιμήν.
translation:
  text: 'Pay to all what is owed: to the one due tax, tax; to the one due revenue,
    revenue; to the one due fear, fear; to the one due honor, honor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tribute' for tax (φόρος), and 'customs duty' or 'toll' for revenue (τέλος).
      Paul likely distinguishes different kinds of civic payments.
    reason: lexical_alternative
  - marker: b
    text: Or 'respect' for fear. The Greek word is φόβος, literally 'fear,' but in
      this context it can include deferential respect toward those in authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόδοτε
  chosen: Pay
  alternatives:
  - Render
  - Give back
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive action. 'Pay' is natural
    modern English in the context of obligations and preserves the sense of rendering
    what is due.
- source_word: πᾶσι
  chosen: to all
  alternatives:
  - to everyone
  - to all people
  lexicon: BDAG
  rationale: Dative plural with ἀπόδοτε indicates the recipients of what is owed.
    'To all' is concise and preserves the broad scope.
- source_word: ὀφειλάς
  chosen: what is owed
  alternatives:
  - debts
  - obligations
  - dues
  lexicon: BDAG
  rationale: Though literally 'debts,' the following examples broaden the sense beyond
    monetary debt alone. 'What is owed' captures the category heading for taxes, revenue,
    fear, and honor.
- source_word: φόρον
  chosen: tax
  alternatives:
  - tribute
  lexicon: BDAG
  rationale: φόρος commonly denotes a tax or tribute paid to governing authorities,
    especially direct tax. 'Tax' is the clearest contemporary equivalent.
- source_word: τέλος
  chosen: revenue
  alternatives:
  - customs duty
  - toll
  - tax
  lexicon: BDAG
  rationale: In this fiscal pairing with φόρος, τέλος likely refers to indirect taxes
    such as customs, duties, or tolls. 'Revenue' works as a broad modern term while
    preserving distinction from φόρος.
- source_word: φόβον
  chosen: fear
  alternatives:
  - respect
  - reverence
  lexicon: BDAG
  rationale: The noun's basic sense is 'fear.' In this civic context it can imply
    respectful deference toward authority, but the translation preserves the stronger
    lexical form and lets context supply nuance.
- source_word: τιμήν
  chosen: honor
  alternatives:
  - respect
  - esteem
  lexicon: BDAG
  rationale: τιμή denotes honor or esteem shown to someone. 'Honor' is the standard
    and most precise rendering here.
- source_word: τῷ ... τὸν/τὸ/τὴν ...
  chosen: to the one due ...
  alternatives:
  - to whom ... is due
  - to the one who is owed ...
  lexicon: BDAG
  rationale: The repeated article construction is elliptical in Greek. English must
    supply the sense. 'To the one due ...' preserves the distributive force while
    remaining readable.
