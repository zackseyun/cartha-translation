theological_decisions:
- issue: Meaning of φόβον in relation to governing authorities
  chosen_reading: Retain 'fear' in the main text rather than softening to 'respect.'
  alternative_readings:
  - respect
  - reverence
  rationale: The verse concerns obligations owed within the social order, including
    toward authorities. The Greek term is stronger than mere courtesy, and preserving
    'fear' maintains the text's rhetorical force without specifying a doctrine of
    absolute submission beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
