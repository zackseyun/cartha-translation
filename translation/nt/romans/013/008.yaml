theological_decisions:
- issue: Scope of Paul's prohibition on debt
  chosen_reading: Render the statement straightforwardly as a prohibition on owing,
    while preserving the exception of mutual love without expanding it into a doctrinal
    claim about all financial borrowing.
  alternative_readings:
  - Treat as an absolute ban on all borrowing
  - Treat as only a metaphor for moral obligation
  rationale: The verse itself speaks in terms of owing and then makes an exception
    for love. The translation should not resolve broader ethical debates beyond what
    the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
