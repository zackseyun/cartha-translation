id: ROM.13.8
reference: Romans 13:8
source:
  edition: SBLGNT
  text: Μηδενὶ μηδὲν ὀφείλετε, εἰ μὴ τὸ ⸂ἀλλήλους ἀγαπᾶν⸃· ὁ γὰρ ἀγαπῶν τὸν ἕτερον
    νόμον πεπλήρωκεν.
translation:
  text: Owe no one anything, except to love one another; for the one who loves the
    other has fulfilled the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''another person.'' Greek: ''the other.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδενὶ μηδὲν
  chosen: no one anything
  alternatives:
  - nothing to anyone
  - no one anything at all
  lexicon: BDAG
  rationale: 'The paired negatives express a comprehensive prohibition: ''to no one,
    nothing.'' English idiom is best preserved as ''Owe no one anything,'' which is
    both natural and close to the Greek structure.'
- source_word: ὀφείλετε
  chosen: owe
  alternatives:
  - be indebted
  - be under obligation
  lexicon: BDAG
  rationale: In this context the verb naturally refers to indebtedness or obligation.
    'Owe' is the clearest modern English rendering and preserves the financial/obligational
    metaphor without overexpanding it.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - except that
  - unless
  lexicon: BDAG
  rationale: Here εἰ μὴ introduces the sole permitted continuing obligation. 'Except'
    is concise and idiomatic in English.
- source_word: τὸ ἀλλήλους ἀγαπᾶν
  chosen: to love one another
  alternatives:
  - the loving of one another
  - to keep loving one another
  lexicon: BDAG
  rationale: The articular infinitive functions substantivally, naming the one ongoing
    obligation. 'To love one another' is natural English and preserves the verbal
    force better than the more wooden 'the loving of one another.'
- source_word: ἀγαπᾶν / ἀγαπῶν
  chosen: love / loves
  alternatives:
  - show love to
  - care for
  lexicon: BDAG
  rationale: ' In keeping with the project''s default rendering of ἀγάπη cognates,
    ''love'' preserves lexical consistency and theological resonance.'
- source_word: ὁ γὰρ ἀγαπῶν
  chosen: for the one who loves
  alternatives:
  - for whoever loves
  - for he who loves
  lexicon: BDAG
  rationale: The substantival participle is well represented by 'the one who loves.'
    This keeps the singular representative force without sounding archaic.
- source_word: τὸν ἕτερον
  chosen: the other
  alternatives:
  - another person
  - his neighbor
  lexicon: BDAG
  rationale: The Greek reads 'the other,' not the more explicit 'neighbor' of some
    translations. Rendering it directly respects original-language primacy. 'Another
    person' is possible but less precise; 'neighbor' imports wording from the following
    citation context rather than this clause itself.
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: The anarthrous/arthrous issue in English is best handled as 'the law'
    because Paul is speaking of the known moral demand of the Mosaic law as summarized
    in the following verses.
- source_word: πεπλήρωκεν
  chosen: has fulfilled
  alternatives:
  - has completed
  - has fully kept
  lexicon: BDAG
  rationale: The perfect tense indicates a completed state with abiding result. 'Has
    fulfilled' is the standard and most accurate rendering in this Pauline context.
