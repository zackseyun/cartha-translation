id: ROM.13.11
reference: Romans 13:11
source:
  edition: SBLGNT
  text: Καὶ τοῦτο εἰδότες τὸν καιρόν, ὅτι ὥρα ⸂ἤδη ὑμᾶς⸃ ἐξ ὕπνου ἐγερθῆναι, νῦν γὰρ
    ἐγγύτερον ἡμῶν ἡ σωτηρία ἢ ὅτε ἐπιστεύσαμεν.
translation:
  text: 'And do this, knowing the time: that it is already the hour for you to wake
    from sleep, for now our salvation is nearer than when we believed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'us' instead of 'you' in 'it is already the hour for
      you to wake from sleep.'
    reason: textual_variant
  - marker: b
    text: Or 'than when we first believed.' The Greek simply says 'when we believed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ τοῦτο
  chosen: And do this
  alternatives:
  - And this
  - And do this also
  lexicon: BDAG
  rationale: In context, τοῦτο points back to the ethical exhortations of the preceding
    verses and functions idiomatically with an implied imperative force in English.
    Rendering simply 'And this' is too elliptical for natural English; 'And do this'
    makes the discourse connection clear without adding content beyond the contextual
    ellipsis.
- source_word: εἰδότες
  chosen: knowing
  alternatives:
  - since you know
  - because you know
  lexicon: BDAG
  rationale: The participle is best carried as 'knowing,' preserving the Greek participial
    structure and allowing the causal nuance to be inferred from context. More explicit
    causal renderings are possible but less formally aligned.
- source_word: τὸν καιρόν
  chosen: the time
  alternatives:
  - the season
  - the critical time
  lexicon: BDAG
  rationale: καιρός here denotes the decisive or opportune time rather than mere chronological
    time. 'The time' is idiomatic and sufficiently weighty in English; 'season' is
    possible but weaker in this exhortational context.
- source_word: ὅτι ὥρα
  chosen: that it is ... the hour
  alternatives:
  - because it is ... time
  - that the hour has come
  lexicon: BDAG
  rationale: This preserves both ὅτι and the nominal force of ὥρα. 'The hour' keeps
    the urgency and rhetorical sharpness of the Greek better than the flatter 'time.'
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  lexicon: BDAG
  rationale: 'ἤδη intensifies the urgency: the decisive moment is not merely future
    but present already. ''Already'' is the most natural concise rendering.'
- source_word: ὑμᾶς
  chosen: for you
  alternatives:
  - for us
  - for you all
  lexicon: BDAG
  rationale: The SBLGNT text reads ὑμᾶς, so the translation reflects second person
    plural. English 'you' can represent the plural naturally; 'for you' fits the infinitival
    construction with ὥρα. A textual alternative with first person exists and is preserved
    in a footnote.
- source_word: ἐξ ὕπνου ἐγερθῆναι
  chosen: to wake from sleep
  alternatives:
  - to awake from sleep
  - to be awakened from sleep
  lexicon: BDAG
  rationale: The aorist infinitive with ἐξ ὕπνου expresses emergence from a state
    of sleep. 'To wake from sleep' is readable modern English and preserves the metaphor
    without archaic diction. 'Awake' is possible but sounds stilted in contemporary
    prose.
- source_word: νῦν γὰρ
  chosen: for now
  alternatives:
  - for already now
  - because now
  lexicon: BDAG
  rationale: γάρ gives the reason for the wake-up exhortation, and νῦν marks the present
    moment. 'For now' is concise and natural.
- source_word: ἐγγύτερον
  chosen: nearer
  alternatives:
  - closer
  lexicon: BDAG
  rationale: The comparative adverb is naturally rendered 'nearer.' It preserves the
    eschatological progression implied in the Greek.
- source_word: ἡ σωτηρία
  chosen: our salvation
  alternatives:
  - the salvation for us
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία in Paul can denote the consummated aspect of salvation still
    approaching in history. 'Our salvation' is idiomatic and preserves the already/not-yet
    tension without over-specifying justification, sanctification, or glorification.
- source_word: ἢ ὅτε ἐπιστεύσαμεν
  chosen: than when we believed
  alternatives:
  - than when we first believed
  - than when we came to faith
  lexicon: BDAG
  rationale: The Greek simply says 'when we believed.' Adding 'first' is interpretively
    common and contextually plausible, but it is not explicit in the text, so it is
    omitted from the main line. 'Believed' preserves the verbal simplicity of ἐπιστεύσαμεν.
