theological_decisions:
- issue: Meaning of 'salvation' as something nearer now than at belief
  chosen_reading: Retain 'our salvation' without narrowing it, allowing Paul's eschatological
    already/not-yet tension to stand.
  alternative_readings:
  - our final salvation
  - our deliverance at the Lord's return
  - the full realization of salvation
  rationale: The verse speaks of salvation as both already related to believers ('our')
    and yet still approaching ('nearer'). The translation should not collapse this
    into a single doctrinal stage. This preserves theological tension rather than
    resolving it beyond the text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
