id: ROM.3.27
reference: Romans 3:27
source:
  edition: SBLGNT
  text: Ποῦ οὖν ἡ καύχησις; ἐξεκλείσθη. διὰ ποίου νόμου; τῶν ἔργων; οὐχί, ἀλλὰ διὰ
    νόμου πίστεως.
translation:
  text: Where, then, is boasting? It has been excluded. Through what kind of law?
    A law of works? No, but through a law of faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “through the principle of faith.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: καύχησις
  chosen: boasting
  alternatives:
  - boast
  - grounds for boasting
  lexicon: BDAG
  rationale: The noun denotes the act or basis of exulting in oneself. 'Boasting'
    is natural English and preserves Paul's focus on human self-glorying.
- source_word: ἐξεκλείσθη
  chosen: has been excluded
  alternatives:
  - was shut out
  - has been shut out
  lexicon: BDAG
  rationale: The aorist passive presents boasting as decisively ruled out. 'Has been
    excluded' is clear modern English and preserves the passive force.
- source_word: διά
  chosen: through
  alternatives:
  - by
  - by means of
  lexicon: BDAG
  rationale: Here διά introduces means or instrument. 'Through' reads naturally in
    the repeated rhetorical questions and answers.
- source_word: ποίου
  chosen: what kind of
  alternatives:
  - what
  - which sort of
  lexicon: BDAG
  rationale: The interrogative asks about the kind or character of the law in view,
    not merely its identity.
- source_word: νόμος
  chosen: law
  alternatives:
  - principle
  - rule
  lexicon: BDAG
  rationale: Paul uses νόμος three times in close succession. Retaining 'law' preserves
    his deliberate wording and rhetorical tension, even though the sense in the final
    phrase approaches 'principle.' The alternative is preserved in a footnote.
- source_word: ἔργων
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is standard Pauline terminology and fits the contrast with
    faith.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    it marks the contrasting basis to works; 'faithfulness' is possible in abstraction
    but less likely in this construction.
