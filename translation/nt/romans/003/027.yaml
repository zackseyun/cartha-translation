theological_decisions:
- issue: Meaning of νόμος in 'law of faith'
  chosen_reading: 'Retain ''law'' in the main text: ''through a law of faith.'''
  alternative_readings:
  - through a principle of faith
  - through the principle of faith
  rationale: Paul's rhetoric intentionally plays on νόμος across the verse. Rendering
    all three instances as 'law' preserves the verbal link and the paradox that faith,
    not works, is the operative norm. Because English readers may hear 'principle'
    here, that alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§3, 5
