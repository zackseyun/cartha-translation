id: ROM.3.22
reference: Romans 3:22
source:
  edition: SBLGNT
  text: δικαιοσύνη δὲ θεοῦ διὰ πίστεως Ἰησοῦ Χριστοῦ, εἰς ⸀πάντας τοὺς πιστεύοντας,
    οὐ γάρ ἐστιν διαστολή.
translation:
  text: And the righteousness of God through faith in Jesus the Messiah, for all who
    believe; for there is no distinction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the justice of God."
    reason: lexical_alternative
  - marker: b
    text: Or "through the faithfulness of Jesus Messiah."
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: In Paul, δικαιοσύνη can denote both righteous status and the broader
    idea of justice. The doctrinal default is 'righteousness,' while preserving 'justice'
    as a footnoted alternative in Pauline contexts.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as 'of God.' 'From God' is
    possible as an interpretive gloss, but the more transparent rendering better preserves
    the Greek wording and its theological breadth.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - through faithfulness
  - through trust
  lexicon: BDAG
  rationale: πίστις is rendered by the project's default 'faith.' Because πίστις can
    also carry the sense of 'faithfulness,' especially in debated Pauline constructions,
    that alternative is preserved in a footnote rather than imported into the main
    text.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where it functions
    as a title. Here the phrase is naturally read as the titular designation of Jesus
    rather than a mere name-like fixed surname.
- source_word: εἰς πάντας τοὺς πιστεύοντας
  chosen: for all who believe
  alternatives:
  - to all who believe
  - for all the believing ones
  lexicon: BDAG
  rationale: This gives idiomatic modern English while preserving the inclusive scope
    and the participial force of τοὺς πιστεύοντας. 'For all who believe' fits the
    movement of the clause and reads naturally.
- source_word: διαστολή
  chosen: distinction
  alternatives:
  - difference
  lexicon: BDAG
  rationale: '''Distinction'' is the most natural rendering in this context of equal
    standing before God, and it matches common Pauline usage without sounding overly
    technical.'
