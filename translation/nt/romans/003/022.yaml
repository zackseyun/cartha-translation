theological_decisions:
- issue: πίστεως Ἰησοῦ Χριστοῦ
  chosen_reading: faith in Jesus Messiah
  alternative_readings:
  - faithfulness of Jesus Messiah
  rationale: This genitive construction is genuinely contested. Following the doctrine's
    instruction to preserve theological tension without over-resolving it, the main
    text uses the more common objective-genitive rendering 'faith in Jesus Messiah,'
    while the subjective-genitive alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3; Contested terms table for πίστις'
- issue: δικαιοσύνη θεοῦ
  chosen_reading: the righteousness of God
  alternative_readings:
  - the justice of God
  rationale: The phrase may evoke both God's righteous character/activity and the
    status he grants. The doctrinal default for δικαιοσύνη is 'righteousness,' but
    in Pauline contexts 'justice' remains a meaningful alternative and is preserved
    in a footnote.
  doctrine_reference: Contested terms table for δικαιοσύνη
