theological_decisions:
- issue: Force of Paul's repudiation formula μὴ γένοιτο
  chosen_reading: A strong denial of the preceding inference, rendered idiomatically
    rather than woodenly.
  alternative_readings:
  - A more formal rendering such as 'May it never be!'
  rationale: The phrase is a conventional Pauline rejection formula. Rendering it
    idiomatically preserves the force without importing extra doctrinal content.
  doctrine_reference: Readable modern English, not archaic or academic; preserve the
    source text's plain sense.
