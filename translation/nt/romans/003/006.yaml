id: ROM.3.6
reference: Romans 3:6
source:
  edition: SBLGNT
  text: μὴ γένοιτο· ἐπεὶ πῶς κρινεῖ ὁ θεὸς τὸν κόσμον;
translation:
  text: Absolutely not! Otherwise, how will God judge the world?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “By no means!” or more formally, “May it never be!”
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ γένοιτο
  chosen: Absolutely not!
  alternatives:
  - By no means!
  - May it never be!
  lexicon: BDAG
  rationale: This is a strong idiomatic repudiation, not a literal wish-form in natural
    English. 'Absolutely not!' preserves the force in clear modern English, while
    alternatives remain viable more formal renderings.
- source_word: ἐπεὶ
  chosen: Otherwise
  alternatives:
  - For then
  - Since
  lexicon: BDAG
  rationale: In this rhetorical question, ἐπεὶ introduces the consequence of the rejected
    premise. 'Otherwise' best captures Paul's argumentative flow in idiomatic English.
- source_word: κρινεῖ
  chosen: how will God judge
  alternatives:
  - how is God to judge
  - how can God judge
  lexicon: BDAG
  rationale: The verb is future indicative, so 'will judge' is the most direct rendering.
    The modal-like alternatives are interpretive and less formally aligned with the
    Greek tense.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the world-order
  - the inhabited world
  lexicon: BDAG
  rationale: κόσμος here refers to the world in the broad human/cosmic sense as the
    object of divine judgment. 'The world' is the standard and clearest English equivalent.
