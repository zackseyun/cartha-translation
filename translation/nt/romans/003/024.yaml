theological_decisions:
- issue: Pauline justification language
  chosen_reading: Retain 'justified' in the main text rather than replacing it with
    a fuller interpretive gloss.
  alternative_readings:
  - being declared righteous
  rationale: The verse uses δικαιόω in a compact participial form. 'Justified' preserves
    the legal-forensic force without over-interpreting the mechanism. The explanatory
    alternative is preserved as a lexical alternative rather than elevated into the
    main text.
  doctrine_reference: Translation philosophy §§3, 6
