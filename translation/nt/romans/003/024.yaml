id: ROM.3.24
reference: Romans 3:24
source:
  edition: SBLGNT
  text: δικαιούμενοι δωρεὰν τῇ αὐτοῦ χάριτι διὰ τῆς ἀπολυτρώσεως τῆς ἐν Χριστῷ Ἰησοῦ·
translation:
  text: being justified freely by his grace through the redemption that is in Messiah
    Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being declared righteous.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''Christ Jesus.'''
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιούμενοι
  chosen: being justified
  alternatives:
  - being declared righteous
  lexicon: BDAG
  rationale: The present passive participle is best carried over as a participial
    phrase to preserve Paul's syntax with the preceding verse. 'Justified' is the
    standard Pauline legal-covenantal term; 'declared righteous' is a valid explanatory
    alternative but is less concise for the main text.
- source_word: δωρεὰν
  chosen: freely
  alternatives:
  - as a gift
  - without cost
  lexicon: BDAG
  rationale: The adverb emphasizes that justification is given gratuitously, not earned.
    'Freely' is compact and natural English, while still preserving the sense of gift.
- source_word: χάριτι
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the established and most theologically accurate rendering
    in Paul''s usage here, referring to God''s unmerited favor and action.'
- source_word: ἀπολυτρώσεως
  chosen: redemption
  alternatives:
  - release
  - ransom-redemption
  lexicon: BDAG
  rationale: '''Redemption'' preserves the liberation-by-payment nuance of the term
    and is standard, clear English in this theological context.'
- source_word: Χριστῷ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where functioning
    as a title. Here the title remains meaningful, even in the familiar expression
    'Messiah Jesus.' The traditional alternative 'Christ Jesus' is preserved in a
    footnote.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: that is in Messiah Jesus
  alternatives:
  - in Christ Jesus
  - found in Messiah Jesus
  lexicon: BDAG
  rationale: The article and prepositional phrase modify 'redemption.' 'That is in
    Messiah Jesus' preserves the Greek structure and clearly locates the redemption
    in relation to Jesus the Messiah.
