lexical_decisions:
- source_word: εἴπερ
  chosen: since
  alternatives:
  - if indeed
  - since indeed
  lexicon: BDAG
  rationale: In this argument Paul is not expressing uncertainty but drawing an inference
    from shared monotheistic conviction, so a causal rendering fits the discourse
    better than a conditional English phrasing.
- source_word: εἷς ὁ θεός
  chosen: God is one
  alternatives:
  - there is one God
  lexicon: BDAG
  rationale: This preserves the emphatic monotheistic claim while reading naturally
    in English. It also keeps the connection to the argumentative basis for what follows.
- source_word: δικαιώσει
  chosen: will justify
  alternatives:
  - will declare righteous
  lexicon: BDAG
  rationale: '"Justify" is the established and precise Pauline rendering for δικαιόω
    here, and the future tense should be retained.'
- source_word: περιτομήν
  chosen: the circumcised
  alternatives:
  - circumcision
  - the Jews
  lexicon: BDAG
  rationale: The noun is a metonymy for circumcised people rather than the rite itself.
    "The circumcised" preserves the metaphorical force without over-interpreting it
    as an ethnic label in the main text.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - on the basis of faith
  lexicon: BDAG
  rationale: This gives clear modern English while preserving faith as the means or
    basis. "By faith" is concise and idiomatic.
- source_word: ἀκροβυστίαν
  chosen: the uncircumcised
  alternatives:
  - uncircumcision
  - the Gentiles
  lexicon: BDAG
  rationale: Like περιτομήν, this is a metonymy for people, so "the uncircumcised"
    is more accurate in English than the abstract noun alone. "The Gentiles" is interpretive
    and therefore left out of the main text.
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - by faith
  - through the faith
  lexicon: BDAG
  rationale: This preserves the distinct preposition διά in the Greek rather than
    flattening it to the same English phrase used for ἐκ πίστεως. The article is not
    naturally represented in English here.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per the project's default for πίστις, "faith" is used in the main text.
    In this verse the referent is not a contested genitival construction like pistis
    Christou, so no alternative is required in the main line.
