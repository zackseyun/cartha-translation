theological_decisions:
- issue: Whether Paul intends a theological distinction between ἐκ πίστεως and διὰ
    τῆς πίστεως
  chosen_reading: Preserve the prepositional difference in English as 'by faith' and
    'through faith' without asserting a doctrinal contrast.
  alternative_readings:
  - Treat both expressions as stylistic equivalents and translate both 'by faith'
  - Read a subtle distinction of basis versus means
  rationale: The Greek uses two different prepositions, so the translation should
    preserve that tension. But the context does not require the translator to resolve
    the distinction into a stronger doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
