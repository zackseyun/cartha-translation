theological_decisions:
- issue: Whether ἀλήθεια τοῦ θεοῦ should be rendered abstractly ('truth') or personally/morally
    ('truthfulness').
  chosen_reading: God’s truthfulness
  alternative_readings:
  - the truth of God
  - God’s truth
  rationale: Paul’s argument in Romans 3:4–7 contrasts God as true with humans as
    liars. Rendering ἀλήθεια here as 'truthfulness' preserves that theological contrast
    without importing a denominational reading.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
