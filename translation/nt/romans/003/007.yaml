id: ROM.3.7
reference: Romans 3:7
source:
  edition: SBLGNT
  text: εἰ ⸀δὲ ἡ ἀλήθεια τοῦ θεοῦ ἐν τῷ ἐμῷ ψεύσματι ἐπερίσσευσεν εἰς τὴν δόξαν αὐτοῦ,
    τί ἔτι κἀγὼ ὡς ἁμαρτωλὸς κρίνομαι,
translation:
  text: But if God’s truthfulness has abounded through my lie for his glory, why am
    I still being judged as a sinner?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the truth of God' / 'God’s truth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through my falsehood.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to his glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια τοῦ θεοῦ
  chosen: God’s truthfulness
  alternatives:
  - the truth of God
  - God’s truth
  lexicon: BDAG
  rationale: In this immediate context Paul contrasts God’s ἀλήθεια with human falsehood
    (cf. v. 4), so 'truthfulness' brings out the relational and moral sense more clearly
    than the more abstract 'truth.'
- source_word: ἐν τῷ ἐμῷ ψεύσματι
  chosen: through my lie
  alternatives:
  - in my lie
  - by my falsehood
  lexicon: BDAG
  rationale: ἐν here is best taken instrumentally or by means, not merely locatively.
    'Through my lie' is natural English and preserves the contrast with God’s truthfulness.
- source_word: ψεύσματι
  chosen: lie
  alternatives:
  - falsehood
  lexicon: BDAG
  rationale: '''Lie'' is more direct and idiomatic in English, while still accurately
    conveying deliberate falsehood.'
- source_word: ἐπερίσσευσεν
  chosen: has abounded
  alternatives:
  - abounded
  - overflowed
  - increased
  lexicon: BDAG
  rationale: The verb conveys increase or abundance. 'Has abounded' preserves that
    sense while fitting the rhetorical argument's present relevance in English.
- source_word: εἰς τὴν δόξαν αὐτοῦ
  chosen: for his glory
  alternatives:
  - to his glory
  lexicon: BDAG
  rationale: '''For his glory'' is idiomatic and clearly expresses result/purpose
    without losing the sense of εἰς.'
- source_word: τί ἔτι
  chosen: why ... still
  alternatives:
  - why yet
  - why any longer
  lexicon: BDAG
  rationale: This preserves the force of continued judgment implied by ἔτι in clear
    modern English.
- source_word: κἀγὼ
  chosen: I
  alternatives:
  - I also
  - even I
  lexicon: BDAG
  rationale: The compound includes an additive nuance, but English can express the
    sense naturally without overloading the line. The rhetorical force is retained
    in the sentence as a whole.
- source_word: κρίνομαι
  chosen: am ... being judged
  alternatives:
  - am judged
  - am condemned
  lexicon: BDAG
  rationale: The present passive denotes ongoing judgment. 'Being judged' preserves
    that aspect without prematurely narrowing the sense to final condemnation.
- source_word: ὡς ἁμαρτωλὸς
  chosen: as a sinner
  alternatives:
  - as sinful
  - as one who sins
  lexicon: BDAG
  rationale: This is the most straightforward rendering of the predicate expression
    and matches normal English usage.
