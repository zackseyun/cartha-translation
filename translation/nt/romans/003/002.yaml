id: ROM.3.2
reference: Romans 3:2
source:
  edition: SBLGNT
  text: πολὺ κατὰ πάντα τρόπον. πρῶτον μὲν ⸀γὰρ ὅτι ἐπιστεύθησαν τὰ λόγια τοῦ θεοῦ.
translation:
  text: Much in every way. First of all, that they were entrusted with the words of
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the oracles of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πολὺ
  chosen: Much
  alternatives:
  - Greatly
  - A great deal
  lexicon: BDAG
  rationale: Used adverbially to answer the implied question of advantage; “Much”
    is concise and natural in English.
- source_word: κατὰ πάντα τρόπον
  chosen: in every way
  alternatives:
  - in every respect
  - by every means
  lexicon: BDAG
  rationale: This idiom expresses comprehensiveness. “In every way” is clear, idiomatic,
    and preserves the breadth of Paul’s claim.
- source_word: πρῶτον μὲν γὰρ
  chosen: First of all
  alternatives:
  - For first
  - Firstly
  lexicon: BDAG
  rationale: This cluster introduces the first stated advantage. “First of all” communicates
    the discourse function in natural modern English, even though no second item follows
    immediately in the same verse.
- source_word: ἐπιστεύθησαν
  chosen: they were entrusted with
  alternatives:
  - they were committed
  - they were entrusted to keep
  lexicon: BDAG
  rationale: The passive of πιστεύω here means to entrust something to someone, not
    ‘they believed.’ “Were entrusted with” best captures the stewardship sense.
- source_word: λόγια
  chosen: words
  alternatives:
  - oracles
  - utterances
  lexicon: BDAG
  rationale: λόγια refers to divine utterances. “Words” is more readable in contemporary
    English while still accurately conveying that these are God’s spoken revelations;
    the more formal alternative is preserved in a footnote.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as possession/source. “Of
    God” is the most direct and least interpretively loaded English choice.
