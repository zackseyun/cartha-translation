id: ROM.3.13
reference: Romans 3:13
source:
  edition: SBLGNT
  text: τάφος ἀνεῳγμένος ὁ λάρυγξ αὐτῶν, ταῖς γλώσσαις αὐτῶν ἐδολιοῦσαν, ἰὸς ἀσπίδων
    ὑπὸ τὰ χείλη αὐτῶν,
translation:
  text: Their throat is an open grave; they deceive with their tongues; the venom
    of asps is under their lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "they were deceiving with their tongues," preserving the Greek imperfect's
      ongoing sense.
    reason: lexical_alternative
  - marker: b
    text: Or "the poison of asps"; "venom" is used for contemporary precision.
    reason: lexical_alternative
  - marker: c
    text: '"Asps" may also be rendered more generally as "vipers" or "adders."'
    reason: lexical_alternative
lexical_decisions:
- source_word: τάφος
  chosen: grave
  alternatives:
  - tomb
  lexicon: BDAG
  rationale: '"Grave" is natural modern English and preserves the image of death and
    corruption; "tomb" is possible but slightly more architectural/formal in tone.'
- source_word: ἀνεῳγμένος
  chosen: open
  alternatives:
  - opened
  lexicon: BDAG
  rationale: The perfect passive participle means "having been opened," but idiomatic
    English in this predicate expression is "an open grave," which preserves the resultant-state
    force without awkwardness.
- source_word: λάρυγξ
  chosen: throat
  alternatives:
  - gullet
  lexicon: BDAG
  rationale: '"Throat" is the standard and clearest English equivalent in this metaphorical
    context.'
- source_word: ἐδολιοῦσαν
  chosen: they deceive
  alternatives:
  - they were deceiving
  - they use deceit
  lexicon: BDAG
  rationale: The imperfect verb conveys ongoing deceitful speech. "They deceive" gives
    clear, natural English in a proverbial indictment, while the note preserves the
    more explicitly durative alternative.
- source_word: ἰὸς
  chosen: venom
  alternatives:
  - poison
  lexicon: BDAG
  rationale: In connection with snakes, "venom" is the most precise contemporary English
    term, though "poison" is a traditional rendering.
- source_word: ἀσπίδων
  chosen: asps
  alternatives:
  - vipers
  - adders
  lexicon: BDAG
  rationale: '"Asps" closely reflects the traditional species reference and preserves
    the biblical image; more generic snake terms are possible but less exact to the
    Greek wording.'
- source_word: ὑπὸ τὰ χείλη αὐτῶν
  chosen: under their lips
  alternatives:
  - beneath their lips
  lexicon: BDAG
  rationale: This is a straightforward formal rendering of the prepositional phrase
    and retains the vivid bodily imagery of the source.
