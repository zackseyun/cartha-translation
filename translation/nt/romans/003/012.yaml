id: ROM.3.12
reference: Romans 3:12
source:
  edition: SBLGNT
  text: πάντες ἐξέκλιναν, ἅμα ἠχρεώθησαν· οὐκ ⸀ἔστιν ποιῶν χρηστότητα, οὐκ ἔστιν ἕως
    ἑνός.
translation:
  text: All have turned aside; together they have become worthless. There is no one
    who does what is good; there is not even one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "There is no one who does goodness," with χρηστότητα also carrying the
      sense "kindness."
    reason: lexical_alternative
  - marker: b
    text: Or "have become useless" / "have become corrupt" for "have become worthless."
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: All
  alternatives:
  - Everyone
  - All people
  lexicon: BDAG
  rationale: Retains the universal scope of the plural without adding an explicit
    noun not present in Greek.
- source_word: ἐξέκλιναν
  chosen: have turned aside
  alternatives:
  - have deviated
  - have gone astray
  lexicon: BDAG
  rationale: Conveys moral departure in idiomatic English while preserving the completed
    verbal sense.
- source_word: ἅμα
  chosen: together
  alternatives:
  - all together
  - at the same time
  lexicon: BDAG
  rationale: 'Best matches the collective force here: humanity shares this condition
    as one.'
- source_word: ἠχρεώθησαν
  chosen: have become worthless
  alternatives:
  - have become useless
  - have become corrupt
  lexicon: BDAG
  rationale: Reflects the passive/resultative sense and preserves the strong negative
    evaluation of the Greek more clearly than a softer rendering.
- source_word: ποιῶν
  chosen: does
  alternatives:
  - is doing
  - practices
  lexicon: BDAG
  rationale: English idiom prefers a finite verb with the implied subject after 'there
    is no one who,' while preserving the participle’s habitual force.
- source_word: χρηστότητα
  chosen: what is good
  alternatives:
  - goodness
  - kindness
  lexicon: BDAG
  rationale: A natural optimal-equivalence rendering in this moral context. The noun
    can denote goodness or kindness; 'what is good' reads clearly in English while
    preserving the ethical sense.
- source_word: οὐκ ἔστιν
  chosen: There is no one
  alternatives:
  - There is none
  lexicon: BDAG
  rationale: Uses contemporary English while keeping the emphatic negation.
- source_word: ἕως ἑνός
  chosen: not even one
  alternatives:
  - up to one
  - even one
  lexicon: BDAG
  rationale: Captures the idiomatic emphatic conclusion of the clause in clear English.
