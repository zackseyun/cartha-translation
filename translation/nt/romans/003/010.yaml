theological_decisions:
- issue: Whether to make the statement individually focused ('no righteous person')
    or more literal and sweeping ('no one righteous').
  chosen_reading: There is no one righteous
  alternative_readings:
  - There is no righteous person
  - No one is righteous
  rationale: The Greek is maximally general and absolute. 'No one righteous' preserves
    the universality and the sharp rhetorical force of Paul's citation without adding
    wording not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
