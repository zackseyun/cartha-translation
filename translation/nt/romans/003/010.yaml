id: ROM.3.10
reference: Romans 3:10
source:
  edition: SBLGNT
  text: καθὼς γέγραπται ὅτι Οὐκ ἔστιν δίκαιος οὐδὲ εἷς,
translation:
  text: 'As it is written: “There is no one righteous, not even one.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθὼς
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: BDAG
  rationale: Introduces the scriptural citation in a natural English way when paired
    with γέγραπται.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive citation formula; English idiom
    favors 'it is written' while preserving the enduring authority implied by the
    perfect.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: After the citation formula, English reads more naturally with punctuation
    introducing the quotation rather than an explicit 'that.'
- source_word: Οὐκ ἔστιν
  chosen: There is no
  alternatives:
  - There is not
  - Not one is
  lexicon: BDAG
  rationale: Idiomatic English expression of existence plus negation, matching the
    Greek sense.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: BDAG
  rationale: '''Righteous'' best preserves the moral and covenantal sense in Pauline
    usage and matches established biblical-theological meaning.'
- source_word: οὐδὲ εἷς
  chosen: not even one
  alternatives:
  - not one
  - not a single one
  lexicon: BDAG
  rationale: Captures the emphatic force of the Greek and reads naturally in English.
