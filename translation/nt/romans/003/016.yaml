id: ROM.3.16
reference: Romans 3:16
source:
  edition: SBLGNT
  text: σύντριμμα καὶ ταλαιπωρία ἐν ταῖς ὁδοῖς αὐτῶν,
translation:
  text: Ruin and misery are in their paths,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Destruction and misery are in their ways.”
    reason: lexical_alternative
lexical_decisions:
- source_word: σύντριμμα
  chosen: Ruin
  alternatives:
  - Destruction
  - crushing
  lexicon: BDAG
  rationale: Rendered as “Ruin” to convey the result of violent breaking or devastation
    in concise, natural English. “Destruction” is a viable alternative, but “Ruin”
    pairs more idiomatically with the following noun and preserves the compact force
    of the Greek.
- source_word: ταλαιπωρία
  chosen: misery
  alternatives:
  - wretchedness
  - distress
  lexicon: BDAG
  rationale: Rendered as “misery” for readable modern English that communicates severe
    affliction or wretched suffering without sounding overly abstract or archaic.
- source_word: ἐν ταῖς ὁδοῖς αὐτῶν
  chosen: in their paths
  alternatives:
  - in their ways
  lexicon: BDAG
  rationale: Translated literally enough to preserve the roadway/path imagery while
    also communicating the moral course of life implied by the idiom. “In their ways”
    is possible, but “in their paths” better preserves the concrete metaphor.
- source_word: καὶ
  chosen: and
  rationale: Standard connective joining the two coordinated nouns.
