id: ROM.3.8
reference: Romans 3:8
source:
  edition: SBLGNT
  text: καὶ μὴ καθὼς βλασφημούμεθα καὶ καθώς φασίν τινες ἡμᾶς λέγειν ὅτι Ποιήσωμεν
    τὰ κακὰ ἵνα ἔλθῃ τὰ ἀγαθά; ὧν τὸ κρίμα ἔνδικόν ἐστιν.
translation:
  text: And why not say—as we are slandered, and as some claim that we say—“Let us
    do evil so that good may come”? Their condemnation is just.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And not—as we are slanderously reported and as some
      say that we say—"Let us do evil that good may come"?'
    reason: lexical_alternative
  - marker: b
    text: '''Their condemnation'' refers to those who make or endorse this accusation
      and reasoning.'
    reason: alternative_reading
lexical_decisions:
- source_word: βλασφημούμεθα
  chosen: are slandered
  alternatives:
  - are blasphemed
  - are reviled
  - are slanderously reported
  lexicon: BDAG
  rationale: In this context the verb refers to hostile misrepresentation of Paul's
    teaching rather than direct blasphemy against God, so 'are slandered' gives the
    plain sense in natural English.
- source_word: φασίν τινες
  chosen: some claim
  alternatives:
  - some say
  - some assert
  lexicon: BDAG
  rationale: This communicates reported accusation with a slightly adversarial nuance
    that fits the context of false charges.
- source_word: λέγειν
  chosen: that we say
  alternatives:
  - that we are saying
  - that we teach
  lexicon: BDAG
  rationale: The infinitive is most directly represented by 'say'; 'teach' would interpret
    beyond the wording.
- source_word: Ποιήσωμεν
  chosen: Let us do
  alternatives:
  - Should we do
  - Let us practice
  lexicon: BDAG
  rationale: The first-person aorist subjunctive is hortatory, naturally rendered
    'Let us do.'
- source_word: τὰ κακὰ
  chosen: evil
  alternatives:
  - evil things
  - what is evil
  lexicon: BDAG
  rationale: The article-plus-adjective construction is idiomatically conveyed by
    the concise mass expression 'evil' in English.
- source_word: ἵνα ἔλθῃ τὰ ἀγαθά
  chosen: so that good may come
  alternatives:
  - that good may come
  - in order that good things may come
  lexicon: BDAG
  rationale: This preserves the purpose/result force of ἵνα in readable modern English
    without sounding wooden.
- source_word: κρίμα
  chosen: condemnation
  alternatives:
  - judgment
  - sentence
  lexicon: BDAG
  rationale: Here the sense is adverse judicial verdict, so 'condemnation' is more
    precise than the broader 'judgment.'
- source_word: ἔνδικόν
  chosen: just
  alternatives:
  - deserved
  - right
  lexicon: BDAG
  rationale: '''Just'' preserves the forensic and moral sense of the adjective with
    appropriate gravity.'
- source_word: καὶ μὴ
  chosen: And why not say
  alternatives:
  - And not
  - And should we not say
  lexicon: BDAG
  rationale: The Greek is elliptical in context, continuing the argument from the
    previous verse. Supplying 'why not say' makes the sentence intelligible in English
    while reflecting the implied sense rather than adding new content.
