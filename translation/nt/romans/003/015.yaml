id: ROM.3.15
reference: Romans 3:15
source:
  edition: SBLGNT
  text: ὀξεῖς οἱ πόδες αὐτῶν ἐκχέαι αἷμα,
translation:
  text: Their feet are swift to shed blood,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'sharp are their feet to pour out blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀξεῖς
  chosen: swift
  alternatives:
  - sharp
  - quick
  lexicon: BDAG
  rationale: Literally 'sharp,' but in this idiom describing feet poised for violent
    action, 'swift' gives the natural English sense without losing the urgency.
- source_word: πόδες
  chosen: feet
  lexicon: BDAG
  rationale: A direct and natural rendering of the plural noun, preserving the bodily
    imagery of the source.
- source_word: ἐκχέαι
  chosen: to shed
  alternatives:
  - to pour out
  lexicon: BDAG
  rationale: Although the verb literally means 'to pour out,' with 'blood' the idiomatic
    English equivalent is 'shed,' which preserves the violent sense in readable modern
    English.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Standard rendering of the noun; no contextual reason to vary it here.
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: 'The genitive pronoun naturally expresses possession with ''feet'' in
    English: ''their feet.'''
