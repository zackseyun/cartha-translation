id: ROM.3.14
reference: Romans 3:14
source:
  edition: SBLGNT
  text: ὧν τὸ στόμα ἀρᾶς καὶ πικρίας γέμει·
translation:
  text: whose mouth is full of cursing and bitterness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὧν
  chosen: whose
  alternatives:
  - of whom
  - their
  lexicon: BDAG
  rationale: The genitive relative pronoun introduces a relative clause describing
    the people mentioned in the previous context. 'Whose' is the most natural and
    idiomatic English equivalent here.
- source_word: στόμα
  chosen: mouth
  lexicon: BDAG
  rationale: A straightforward literal rendering of the singular noun; English likewise
    uses the singular collectively in this idiom.
- source_word: ἀρᾶς
  chosen: cursing
  alternatives:
  - curse
  - an oath of cursing
  lexicon: BDAG
  rationale: Although the noun can denote a 'curse,' in this construction with 'mouth
    is full of' English reads more naturally with the verbal noun 'cursing,' preserving
    the sense of speech that invokes harm.
- source_word: πικρίας
  chosen: bitterness
  alternatives:
  - harshness
  - bitter speech
  lexicon: BDAG
  rationale: '''Bitterness'' is the standard and most transparent rendering, preserving
    both the lexical sense and the moral force of the term.'
- source_word: γέμει
  chosen: is full
  alternatives:
  - is filled
  - teems with
  lexicon: BDAG
  rationale: The verb means 'is full' or 'is filled with.' 'Is full' is the most idiomatic
    English expression in this clause and preserves the present-tense force.
