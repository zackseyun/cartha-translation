theological_decisions:
- issue: Meaning of σὰρξ in πᾶσα σὰρξ
  chosen_reading: Idiomatic reference to all humanity, rendered 'no one' in context.
  alternative_readings:
  - Literal 'all flesh'
  - Metaphorical 'sinful nature'
  rationale: Here σὰρξ functions as a Semitic/Greek idiom for human beings generally,
    not as Paul's more specialized ethical sense of fallen human nature. Rendering
    it idiomatically avoids importing the 'sinful nature' reading where the text does
    not require it.
  doctrine_reference: 'Contested terms: σάρξ = ''flesh'' literal / ''sinful nature''
    metaphorical, context-dependent.'
