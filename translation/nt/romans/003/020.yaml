id: ROM.3.20
reference: Romans 3:20
source:
  edition: SBLGNT
  text: διότι ἐξ ἔργων νόμου οὐ δικαιωθήσεται πᾶσα σὰρξ ἐνώπιον αὐτοῦ, διὰ γὰρ νόμου
    ἐπίγνωσις ἁμαρτίας.
translation:
  text: because by works of the law no one will be justified before him, for through
    the law comes the knowledge of sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'no flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground for the preceding statement; 'because' gives clear
    contemporary English causal force.
- source_word: ἐξ
  chosen: by
  alternatives:
  - from
  - on the basis of
  lexicon: BDAG
  rationale: With 'works of the law,' the preposition expresses means or basis; 'by'
    is natural and concise in English.
- source_word: ἔργων νόμου
  chosen: works of the law
  alternatives:
  - works of law
  - deeds of the law
  lexicon: BDAG
  rationale: This is a well-established Pauline expression. 'Works of the law' preserves
    the genitival construction without over-interpreting it.
- source_word: δικαιωθήσεται
  chosen: will be justified
  alternatives:
  - will be declared righteous
  - will be acquitted
  lexicon: BDAG
  rationale: '''Justified'' is the most precise and established rendering for Paul''s
    forensic usage here, while remaining readable.'
- source_word: πᾶσα σὰρξ
  chosen: no one
  alternatives:
  - no flesh
  - no human being
  lexicon: BDAG
  rationale: In this context σάρξ is an idiom for humanity rather than a literal or
    metaphorical 'flesh/sinful nature' sense. 'No one' communicates the meaning clearly
    in idiomatic English, while the literal form is preserved in a footnote.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his sight
  - before his presence
  lexicon: BDAG
  rationale: '''Before him'' is clear, natural, and preserves the relational/judicial
    sense of standing in God''s presence.'
- source_word: διὰ γὰρ νόμου
  chosen: for through the law
  alternatives:
  - for by the law
  - for through law
  lexicon: BDAG
  rationale: διά with the genitive expresses means or instrumentality. 'Through the
    law' preserves the Greek structure and Paul's logic.
- source_word: ἐπίγνωσις
  chosen: the knowledge
  alternatives:
  - knowledge
  - awareness
  - full knowledge
  lexicon: BDAG
  rationale: The article is naturally supplied in English, and 'knowledge' best preserves
    the cognitive force of ἐπίγνωσις without narrowing it to mere feeling or conscience.
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - about sin
  lexicon: BDAG
  rationale: The genitive is straightforward and is best rendered directly as 'of
    sin.'
