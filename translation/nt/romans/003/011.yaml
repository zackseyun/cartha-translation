theological_decisions:
- issue: Scope of the negation in Paul's catena citation
  chosen_reading: Retain the absolute wording 'There is no one...' twice without softening
    it.
  alternative_readings:
  - No one really understands; no one truly seeks God
  rationale: The Greek presents categorical negation, and the translation should preserve
    that force rather than interpretively qualify it.
