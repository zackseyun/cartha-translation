id: ROM.3.11
reference: Romans 3:11
source:
  edition: SBLGNT
  text: οὐκ ἔστιν ⸀ὁ συνίων, οὐκ ἔστιν ⸁ὁ ἐκζητῶν τὸν θεόν·
translation:
  text: There is no one who understands; there is no one who seeks God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeks out God' or 'seeks after God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνίων
  chosen: understands
  alternatives:
  - has insight
  - comprehends
  lexicon: BDAG
  rationale: The participle denotes understanding or grasping with insight. 'Understands'
    is natural modern English and preserves the sense without sounding technical or
    paraphrastic.
- source_word: ἐκζητῶν
  chosen: seeks
  alternatives:
  - seeks out
  - seeks after
  lexicon: BDAG
  rationale: The compound verb can intensify the sense of seeking, but in clear English
    'seeks God' best balances readability and force. The stronger nuance is preserved
    as an alternative in a footnote.
- source_word: οὐκ ἔστιν
  chosen: There is no one
  alternatives:
  - there is not one
  - none is
  lexicon: BDAG
  rationale: This idiomatic rendering preserves the emphatic universal negation while
    using standard English syntax.
- source_word: ὁ συνίων / ὁ ἐκζητῶν
  chosen: the substantival participles are rendered as relative clauses ('who understands,'
    'who seeks')
  alternatives:
  - the understanding one
  - the one understanding
  lexicon: Greek grammar
  rationale: English normally expresses substantival participles more naturally with
    relative clauses. This preserves the meaning without wooden diction.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English idiom omits the article before 'God' in this context, while fully
    preserving the referent.
