id: ROM.3.23
reference: Romans 3:23
source:
  edition: SBLGNT
  text: πάντες γὰρ ἥμαρτον καὶ ὑστεροῦνται τῆς δόξης τοῦ θεοῦ,
translation:
  text: For all have sinned and fall short of the glory of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lack the glory of God” or “are lacking the glory of God.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “the glory of God” may refer to God’s own glory, the glory humans
      were meant to reflect, or the glory granted by God.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: The nominative plural has a comprehensive human scope in context. “All”
    is concise and preserves Paul’s universal claim without adding words not present
    in the Greek.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: “For” naturally carries the explanatory force of γάρ and connects this
    verse to Paul’s preceding argument.
- source_word: ἥμαρτον
  chosen: have sinned
  alternatives:
  - sinned
  lexicon: BDAG
  rationale: The aorist summarizes the fact of human sin. “Have sinned” is idiomatic
    modern English and preserves the completed reality with present relevance in context.
- source_word: ὑστεροῦνται
  chosen: fall short
  alternatives:
  - lack
  - are deprived of
  - are lacking
  lexicon: BDAG
  rationale: The present tense suggests an ongoing condition. “Fall short” is the
    most natural English rendering here and retains the sense of present deficiency
    before God.
- source_word: δόξης
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: “Glory” is the established and most theologically fitting rendering of
    δόξα here, referring to the divine glory humans fail to attain or reflect.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly as “of God.” This preserves
    the Greek wording without prematurely resolving the full nuance beyond what the
    text states.
