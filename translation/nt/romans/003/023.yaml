theological_decisions:
- issue: Meaning of 'the glory of God'
  chosen_reading: Rendered neutrally as 'the glory of God' without interpretive expansion.
  alternative_readings:
  - the glory that comes from God
  - God's glorious standard
  - sharing in God's glory
  rationale: Paul’s phrase carries theological depth, but the Greek expression itself
    is compact and somewhat open-textured. The translation preserves that tension
    rather than importing one doctrinally narrowed interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
