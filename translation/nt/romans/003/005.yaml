theological_decisions:
- issue: How to render Paul’s rhetorical question about God’s justice in judgment
  chosen_reading: 'Express the question with an expected negative answer: “God is
    not unjust to inflict wrath, is he?”'
  alternative_readings:
  - Is God unjust to inflict wrath?
  rationale: The Greek μή indicates that Paul is voicing an objection he rejects,
    not seriously entertaining divine injustice. The rendering preserves the rhetorical
    structure without softening the force of the objection.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims beyond the text.
