id: ROM.3.5
reference: Romans 3:5
source:
  edition: SBLGNT
  text: εἰ δὲ ἡ ἀδικία ἡμῶν θεοῦ δικαιοσύνην συνίστησιν, τί ἐροῦμεν; μὴ ἄδικος ὁ θεὸς
    ὁ ἐπιφέρων τὴν ὀργήν; κατὰ ἄνθρωπον λέγω.
translation:
  text: But if our unrighteousness demonstrates God’s righteousness, what shall we
    say? God is not unjust to inflict wrath, is he? (I am speaking in a human way.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “our injustice demonstrates God’s justice.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικία
  chosen: unrighteousness
  alternatives:
  - injustice
  lexicon: BDAG
  rationale: Rendered as “unrighteousness” to match the moral/relational contrast
    with God’s δικαιοσύνη in Paul’s argument, while preserving “injustice” as a viable
    contextual alternative.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the doctrine table’s default rendering, “righteousness” is
    kept in the main text; “justice” remains a meaningful Pauline alternative and
    is preserved in a footnote.
- source_word: συνίστησιν
  chosen: demonstrates
  alternatives:
  - shows
  - commends
  - proves
  lexicon: BDAG
  rationale: “Demonstrates” best captures the sense that human unrighteousness serves
    to display or make evident God’s righteousness in context.
- source_word: μὴ ἄδικος
  chosen: God is not unjust ... is he?
  alternatives:
  - Is God unjust...?
  lexicon: BDAG
  rationale: The particle μή signals a question expecting a negative answer, so English
    is shaped to preserve that rhetorical force rather than leaving the polarity ambiguous.
- source_word: ἐπιφέρων τὴν ὀργήν
  chosen: to inflict wrath
  alternatives:
  - to bring wrath
  - to bring the wrath
  lexicon: BDAG
  rationale: “Inflict wrath” is natural modern English and preserves the judicial
    sense of ἐπιφέρω with ὀργή in this context.
- source_word: κατὰ ἄνθρωπον λέγω
  chosen: I am speaking in a human way
  alternatives:
  - I speak according to man
  - I am speaking from a human perspective
  lexicon: BDAG
  rationale: This idiom signals a merely human mode of argument or standpoint; the
    chosen rendering is clear, idiomatic, and preserves Paul’s disclaimer.
