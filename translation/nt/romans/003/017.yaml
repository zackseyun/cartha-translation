id: ROM.3.17
reference: Romans 3:17
source:
  edition: SBLGNT
  text: καὶ ὁδὸν εἰρήνης οὐκ ἔγνωσαν.
translation:
  text: and they have not known the way of peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the path of peace."
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  alternatives:
  - and also
  lexicon: BDAG
  rationale: Rendered with the straightforward coordinating conjunction to preserve
    the verse's continued accumulation of indictments in Paul's catena.
- source_word: ὁδὸν
  chosen: way
  alternatives:
  - path
  - road
  lexicon: BDAG
  rationale: '"Way" is the most natural English rendering here, preserving both the
    literal image of a road and the idiomatic sense of a manner of life or course
    of conduct.'
- source_word: εἰρήνης
  chosen: peace
  alternatives:
  - wholeness
  lexicon: BDAG
  rationale: '"Peace" is the standard and clearest rendering of εἰρήνη. In this construction,
    it describes the kind of way not known by the subjects: a way characterized by
    peace.'
- source_word: ἔγνωσαν
  chosen: have not known
  alternatives:
  - did not know
  - have not come to know
  lexicon: BDAG
  rationale: The aorist was rendered with English present perfect for natural contemporary
    English in this indictment context, expressing their failure to know or recognize
    this way. "Have not known" preserves the force well without sounding wooden.
