id: ROM.3.18
reference: Romans 3:18
source:
  edition: SBLGNT
  text: οὐκ ἔστιν φόβος θεοῦ ἀπέναντι τῶν ὀφθαλμῶν αὐτῶν.
translation:
  text: There is no fear of God before their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “There is no reverence for God before their eyes.”
    reason: lexical_alternative
  - marker: b
    text: Quoted from Psalm 36:1 (LXX 35:2).
    reason: cross_reference
lexical_decisions:
- source_word: οὐκ ἔστιν
  chosen: There is no
  alternatives:
  - there is not
  lexicon: BDAG
  rationale: Uses natural English existential phrasing while preserving the force
    of the negated present verb.
- source_word: φόβος
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: “Fear” is the plain lexical sense and fits both the Greek and the scriptural
    idiom of proper fear toward God; broader interpretive nuances like reverence are
    secondary and need not replace the primary term in the main text.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - for God
  - toward God
  lexicon: BDAG
  rationale: The genitive is most naturally rendered “of God” in this established
    biblical expression, leaving the object of fear explicit without over-interpreting
    the relationship.
- source_word: ἀπέναντι
  chosen: before
  alternatives:
  - in front of
  - before the face of
  lexicon: BDAG
  rationale: “Before” is idiomatic English and preserves the spatial-metaphorical
    sense of being set before someone's sight.
- source_word: τῶν ὀφθαλμῶν αὐτῶν
  chosen: their eyes
  alternatives:
  - their sight
  lexicon: BDAG
  rationale: Keeps the concrete image “eyes,” which is natural in English and preserves
    the biblical idiom concerning perception, attention, and moral orientation.
