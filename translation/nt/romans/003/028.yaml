id: ROM.3.28
reference: Romans 3:28
source:
  edition: SBLGNT
  text: λογιζόμεθα ⸀γὰρ ⸂δικαιοῦσθαι πίστει⸃ ἄνθρωπον χωρὶς ἔργων νόμου.
translation:
  text: For we conclude that a person is justified by faith apart from works of the
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "is declared righteous."
    reason: lexical_alternative
  - marker: b
    text: Or "a man"; the Greek term is grammatically masculine but used here in a
      generic sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: λογιζόμεθα
  chosen: we conclude
  alternatives:
  - we consider
  - we reckon
  lexicon: BDAG
  rationale: The verb marks Paul's reasoned judgment or conclusion. 'We conclude'
    is natural modern English and fits the argumentative flow better than the more
    literal but less idiomatic 'we reckon.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: The conjunction grounds the previous argument. 'For' preserves the explanatory
    connection in a concise, standard way.
- source_word: δικαιοῦσθαι
  chosen: is justified
  alternatives:
  - is declared righteous
  - is acquitted
  lexicon: BDAG
  rationale: The present passive infinitive is best rendered with the established
    Pauline expression 'is justified.' This preserves theological continuity while
    remaining understandable; 'declared righteous' is a valuable explanatory alternative
    preserved in a footnote.
- source_word: πίστει
  chosen: by faith
  alternatives:
  - through faith
  - by trust
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' 'By faith' is idiomatic
    here and preserves Paul's instrumental sense without over-interpreting the construction.
- source_word: ἄνθρωπον
  chosen: a person
  alternatives:
  - a man
  - a human being
  lexicon: BDAG
  rationale: Although grammatically masculine, the noun is generic here rather than
    male-specific. 'A person' best matches the intended representative sense in clear
    modern English.
- source_word: χωρὶς
  chosen: apart from
  alternatives:
  - without
  lexicon: BDAG
  rationale: '''Apart from'' preserves the sense of separation or exclusion in Paul''s
    contrast between faith and works.'
- source_word: ἔργων νόμου
  chosen: works of the law
  alternatives:
  - works of law
  - deeds required by the law
  lexicon: BDAG
  rationale: This is a recognized Pauline expression. 'Works of the law' preserves
    the formal linkage to νόμος and avoids narrowing the phrase prematurely to merely
    moral effort or generic good deeds.
