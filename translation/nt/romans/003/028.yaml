theological_decisions:
- issue: Rendering of generic ἄνθρωπον
  chosen_reading: a person
  alternative_readings:
  - a man
  rationale: The Greek masculine form carries generic force here. In keeping with
    the project's gender-accurate principle, the translation reflects the author's
    representative meaning rather than implying a specifically male referent.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Nuance of δικαιοῦσθαι in Pauline usage
  chosen_reading: is justified
  alternative_readings:
  - is declared righteous
  rationale: The main text retains the established forensic rendering 'is justified'
    for precision and continuity, while the footnote preserves the explanatory alternative
    that makes the declarative sense more explicit without forcing it into the main
    line.
  doctrine_reference: Preserve theological tension rather than resolve it
