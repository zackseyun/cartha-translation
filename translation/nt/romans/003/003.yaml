theological_decisions:
- issue: Rendering πίστιν τοῦ θεοῦ in a contested Pauline phrase
  chosen_reading: God's faithfulness
  alternative_readings:
  - the faith of God
  - God's faith
  rationale: The doctrine guidance allows per-verse variance from the default 'faith'
    when context demands it, provided the alternative is documented. Here Paul's contrast
    between human ἀπιστία and divine πίστις strongly favors 'faithfulness' as the
    sense most transparent in English.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; πίστις default ''faith'' with footnoted alternatives where contested.'
