id: ROM.3.3
reference: Romans 3:3
source:
  edition: SBLGNT
  text: τί γάρ; εἰ ἠπίστησάν τινες, μὴ ἡ ἀπιστία αὐτῶν τὴν πίστιν τοῦ θεοῦ καταργήσει;
translation:
  text: What then? If some were unfaithful, will their unfaithfulness nullify God's
    faithfulness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's faith.' The Greek phrase is literally 'the faith of God,' but
      here likely means God's faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ
  chosen: What then?
  alternatives:
  - What?
  - What indeed then?
  lexicon: BDAG
  rationale: Paul uses τί γάρ as a concise discourse marker introducing an objection
    or inference. 'What then?' is idiomatic in modern English and preserves the argumentative
    turn without over-translating.
- source_word: ἠπίστησάν
  chosen: were unfaithful
  alternatives:
  - did not believe
  - were unbelieving
  lexicon: BDAG
  rationale: Although ἀπιστέω can denote unbelief, the immediate parallel with ἀπιστία
    and the contrast with God's πίστις favors covenantal/reliability language here.
    'Were unfaithful' preserves the rhetorical symmetry.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: An indefinite plural is intended, not a technically marked subset. 'Some'
    is the natural English equivalent.
- source_word: ἀπιστία
  chosen: unfaithfulness
  alternatives:
  - unbelief
  lexicon: BDAG
  rationale: This noun is paired with ἠπίστησάν and set against God's πίστις. 'Unfaithfulness'
    best preserves the contrast in this context, though 'unbelief' remains possible.
- source_word: πίστιν τοῦ θεοῦ
  chosen: God's faithfulness
  alternatives:
  - the faith of God
  - God's faith
  lexicon: BDAG
  rationale: Though πίστις defaults to 'faith,' this is a contextually justified variance.
    In Romans 3:3 the genitive construction most naturally refers to God's faithfulness
    or reliability, especially in contrast with human unfaithfulness. This preserves
    Paul's theological tension without forcing a less natural English expression.
- source_word: καταργήσει
  chosen: nullify
  alternatives:
  - invalidate
  - abolish
  lexicon: BDAG
  rationale: '''Nullify'' fits Paul''s rhetorical question well and clearly communicates
    the sense of rendering something ineffective or void.'
