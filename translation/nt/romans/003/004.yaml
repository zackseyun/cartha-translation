id: ROM.3.4
reference: Romans 3:4
source:
  edition: SBLGNT
  text: μὴ γένοιτο· γινέσθω δὲ ὁ θεὸς ἀληθής, πᾶς δὲ ἄνθρωπος ψεύστης, ⸀καθὼς γέγραπται·
    Ὅπως ἂν δικαιωθῇς ἐν τοῖς λόγοις σου καὶ ⸀νικήσεις ἐν τῷ κρίνεσθαί σε.
translation:
  text: 'May it never be! Rather, let God be true, and every person a liar, as it
    is written: “So that you may be justified in your words and prevail when you are
    judged.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “be shown to be in the right” or “be vindicated.”
    reason: lexical_alternative
  - marker: b
    text: Or, “when you judge”; this reflects the Hebrew wording of Psalm 51:4 more
      directly, while Romans' Greek wording is naturally read as “when you are judged.”
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - By no means!
  - Absolutely not!
  lexicon: BDAG
  rationale: Preserves the idiomatic force of Paul's emphatic repudiation while keeping
    the optative coloring more transparently than a flatter idiom like 'By no means.'
- source_word: γινέσθω ... ὁ θεὸς ἀληθής
  chosen: let God be true
  alternatives:
  - let God be found true
  - let God be truthful
  lexicon: BDAG
  rationale: Keeps the imperative force of γινέσθω and preserves the sharp contrast
    with 'liar.' 'True' reads naturally in English and fits the antithesis.
- source_word: πᾶς ... ἄνθρωπος
  chosen: every person
  alternatives:
  - every man
  - everyone
  lexicon: BDAG
  rationale: ἄνθρωπος here has generic human reference, not specifically male reference.
    'Every person' preserves the distributive sense of πᾶς while communicating the
    source intent in natural modern English.
- source_word: ψεύστης
  chosen: liar
  alternatives:
  - false one
  lexicon: BDAG
  rationale: The noun denotes one who lies or is false. 'Liar' is the most direct
    and idiomatic English equivalent.
- source_word: καθὼς γέγραπται
  chosen: as it is written
  alternatives:
  - just as it has been written
  lexicon: BDAG
  rationale: Standard citation formula; concise and natural while still reflecting
    the perfect tense's scriptural authority nuance.
- source_word: δικαιωθῇς
  chosen: be justified
  alternatives:
  - be shown to be in the right
  - be vindicated
  lexicon: BDAG
  rationale: In this quotation about God, the sense is forensic vindication rather
    than moral transformation. 'Be justified' is formally close to the Greek and preserves
    the judicial register, with the clearer interpretive alternatives preserved in
    a footnote.
- source_word: λόγοις
  chosen: words
  alternatives:
  - sayings
  - statements
  lexicon: BDAG
  rationale: A straightforward rendering that fits both the Greek and the Psalm citation
    context.
- source_word: νικήσεις
  chosen: prevail
  alternatives:
  - win
  - be victorious
  lexicon: BDAG
  rationale: In the judicial context created by the following clause, 'prevail' best
    conveys success in judgment without sounding overly martial.
- source_word: ἐν τῷ κρίνεσθαί σε
  chosen: when you are judged
  alternatives:
  - when you enter into judgment
  - when you judge
  lexicon: BDAG
  rationale: The Greek form in Romans is most naturally read as passive ('when you
    are judged'). Because readers may know the Psalm's Hebrew-based rendering 'when
    you judge,' that alternative is preserved in a footnote.
