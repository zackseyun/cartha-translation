theological_decisions:
- issue: Forensic sense of δικαιωθῇς in a statement about God
  chosen_reading: Rendered as judicial vindication ('be justified') rather than moral
    rectification.
  alternative_readings:
  - be shown righteous
  - be vindicated
  rationale: The context is God's truthfulness over against human falsehood, reinforced
    by a Scripture quotation about God's rightness in judgment. The verse does not
    suggest that God becomes righteous, but that he is shown to be in the right.
