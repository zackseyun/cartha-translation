theological_decisions:
- issue: How to render the contested term ἱλαστήριον
  chosen_reading: atoning sacrifice
  alternative_readings:
  - propitiation
  - mercy seat
  rationale: DOCTRINE.md specifies "atoning sacrifice" as the default rendering, with
    alternatives preserved in a footnote. This avoids requiring technical jargon in
    the main text while leaving the fuller interpretive range visible for review.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἱλαστήριον'
- issue: How to construe διὰ πίστεως ἐν τῷ αὐτοῦ αἵματι
  chosen_reading: through faith in his blood
  alternative_readings:
  - through faith, by his blood
  - through faith, in his blood
  rationale: The main text follows a common and coherent construal in which faith
    is directed to Christ's blood/sacrificial death. Because the syntactic relationship
    is debated, the alternatives are preserved in a footnote rather than being erased.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: How to render δικαιοσύνη in Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrinal default is "righteousness," but Pauline usage can foreground
    God's justice as well. The alternative is preserved in a footnote to maintain
    the semantic range without flattening the theological tension.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
