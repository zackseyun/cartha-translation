theological_decisions:
- issue: Whether ἐθνῶν should be rendered 'Gentiles' or 'nations'
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: Because the verse explicitly contrasts Jews with ἔθνη, the referent is
    ethnic non-Jews rather than nations in a geopolitical sense. 'Gentiles' preserves
    Paul's theological argument about one God for both Jews and non-Jews.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
