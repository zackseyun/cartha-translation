id: ROM.3.29
reference: Romans 3:29
source:
  edition: SBLGNT
  text: ἢ Ἰουδαίων ὁ θεὸς μόνον; ⸀οὐχὶ καὶ ἐθνῶν; ναὶ καὶ ἐθνῶν,
translation:
  text: Or is God the God of the Jews only? Is he not also the God of the Gentiles?
    Yes, of the Gentiles also.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations' in a more literal rendering of ἐθνῶν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  lexicon: BDAG
  rationale: Introduces the next rhetorical alternative in Paul's argument, so the
    simple adversative/disjunctive 'Or' fits natural English and preserves the argumentative
    flow.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - Jews
  - Jewish people
  lexicon: BDAG
  rationale: The genitive depends on 'God' and is best brought into idiomatic English
    as 'the God of the Jews.' The article in English clarifies the class reference.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering for θεός. Repeated in English in the second clause
    for clarity, since English does not naturally leave it implied as tersely as Greek.
- source_word: μόνον
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: Directly conveys exclusivity and preserves the rhetorical force of Paul's
    question.
- source_word: οὐχὶ
  chosen: Is he not also
  alternatives:
  - is not also
  - surely also
  lexicon: BDAG
  rationale: οὐχί marks a question expecting an affirmative answer. Rendering it with
    normal English interrogative syntax preserves both the question form and its expected-yes
    force.
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Paul's Jew/Gentile contrast, ἔθνη refers to non-Jewish peoples, so
    'Gentiles' is more precise than the more literal but less contextually clear 'nations.'
- source_word: ναὶ
  chosen: 'Yes'
  alternatives:
  - Certainly
  - Indeed
  lexicon: BDAG
  rationale: A concise affirmative response fits the rhetorical exchange and reads
    naturally in English.
- source_word: καὶ
  chosen: also
  alternatives:
  - too
  - even
  lexicon: BDAG
  rationale: In both occurrences, καί adds the Gentiles alongside the Jews; 'also'
    preserves that inclusive emphasis cleanly.
