id: ROM.3.9
reference: Romans 3:9
source:
  edition: SBLGNT
  text: Τί οὖν; προεχόμεθα; οὐ πάντως, προῃτιασάμεθα γὰρ Ἰουδαίους τε καὶ Ἕλληνας
    πάντας ὑφ’ ἁμαρτίαν εἶναι,
translation:
  text: What then? Are we better off? Not at all, for we have already charged that
    both Jews and Greeks are all under sin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do we have any advantage?”
    reason: alternative_reading
  - marker: b
    text: Or, “are all under the power of sin.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν
  chosen: What then?
  alternatives:
  - What then shall we say?
  - So what then?
  rationale: A concise inferential question fits Paul's argumentative style and keeps
    the discourse marker οὖν explicit without adding words not present in the Greek.
- source_word: προεχόμεθα
  chosen: Are we better off?
  alternatives:
  - Do we have any advantage?
  - Do we excel?
  lexicon: BDAG
  rationale: The middle voice here is debated. In this immediate context Paul is asking
    whether Jews stand in a superior position. 'Are we better off?' is natural English
    and captures comparative standing; the alternative 'Do we have any advantage?'
    is preserved in a footnote because the verb can be taken in that sense.
- source_word: οὐ πάντως
  chosen: Not at all
  alternatives:
  - Certainly not
  - By no means
  lexicon: BDAG
  rationale: This is a strong denial in context. 'Not at all' is clear, idiomatic
    modern English, and preserves the force without importing extra rhetorical coloration.
- source_word: προῃτιασάμεθα
  chosen: we have already charged
  alternatives:
  - we have already accused
  - we have already made the case
  lexicon: BDAG
  rationale: The verb denotes making a prior charge or accusation. 'Charged' best
    fits Paul's forensic argument in Romans and remains readable in modern English.
- source_word: Ἰουδαίους τε καὶ Ἕλληνας
  chosen: both Jews and Greeks
  alternatives:
  - Jews as well as Greeks
  lexicon: BDAG
  rationale: This preserves the paired construction τε καὶ in smooth English and reflects
    Paul's Jew/Gentile contrast using the conventional term 'Greeks' found in the
    source text.
- source_word: πάντας
  chosen: all
  alternatives:
  - all alike
  - every one of them
  lexicon: BDAG
  rationale: Placed with the group pair, πάντας emphasizes totality across both groups.
    'All' is the cleanest rendering and avoids unnecessary expansion.
- source_word: ὑφ’ ἁμαρτίαν εἶναι
  chosen: are all under sin
  alternatives:
  - are all under the power of sin
  - are all under sin's dominion
  lexicon: BDAG
  rationale: A formally close rendering preserves Paul's metaphor of subjection. 'Under
    sin' is theologically weighty and lets the reader feel the compressed Pauline
    phrasing; more interpretive expansions are possible but are better left to footnote
    or commentary.
