id: ROM.3.21
reference: Romans 3:21
source:
  edition: SBLGNT
  text: Νυνὶ δὲ χωρὶς νόμου δικαιοσύνη θεοῦ πεφανέρωται, μαρτυρουμένη ὑπὸ τοῦ νόμου
    καὶ τῶν προφητῶν,
translation:
  text: But now, apart from the law, the righteousness of God has been revealed, being
    testified to by the Law and the Prophets,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the justice of God.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'righteousness from God.'
    reason: alternative_reading
  - marker: c
    text: That is, the Scriptures; compare 'the Law and the Prophets' as a designation
      for the Old Testament witness.
    reason: cross_reference
lexical_decisions:
- source_word: Νυνὶ δὲ
  chosen: But now
  alternatives:
  - Now, however
  - But as it is now
  lexicon: BDAG
  rationale: Marks a strong transition in Paul's argument with both temporal and contrastive
    force; 'But now' is natural English and preserves both elements.
- source_word: χωρὶς νόμου
  chosen: apart from the law
  alternatives:
  - without law
  - apart from law
  lexicon: BDAG
  rationale: χωρίς conveys separation rather than mere negation. 'The law' best fits
    Paul's reference to the Mosaic law in context, while remaining idiomatic in English.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per DOCTRINE.md, the default rendering is 'righteousness,' while 'justice'
    remains a meaningful Pauline alternative and is preserved in a footnote.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - from God
  - God's
  lexicon: BDAG
  rationale: The genitive is theologically significant and somewhat open in Paul.
    'Of God' preserves the source-language ambiguity better than resolving it to either
    source ('from God') or simple possession ('God's').
- source_word: πεφανέρωται
  chosen: has been revealed
  alternatives:
  - has been manifested
  - has appeared
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from prior disclosure.
    'Has been revealed' is clear modern English and preserves that sense.
- source_word: μαρτυρουμένη
  chosen: being testified to
  alternatives:
  - being witnessed to
  - attested by
  lexicon: BDAG
  rationale: The participle explains that this revealed righteousness is corroborated
    by prior scriptural witness. 'Being testified to' is transparent and fits the
    passive form.
- source_word: ὑπὸ τοῦ νόμου καὶ τῶν προφητῶν
  chosen: by the Law and the Prophets
  alternatives:
  - by the law and the prophets
  lexicon: BDAG
  rationale: This likely refers to the recognized scriptural division, not merely
    legal material plus prophetic speakers. Capitalization signals that idiomatic
    canonical reference.
