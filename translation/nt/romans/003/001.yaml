id: ROM.3.1
reference: Romans 3:1
source:
  edition: SBLGNT
  text: Τί οὖν τὸ περισσὸν τοῦ Ἰουδαίου, ἢ τίς ἡ ὠφέλεια τῆς περιτομῆς;
translation:
  text: What then is the advantage of the Jew? Or what is the benefit of circumcision?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What then is the value of circumcision?'
    reason: lexical_alternative
  - marker: b
    text: '''The Jew'' is a representative singular, referring to the Jewish person
      as a category.'
    reason: cultural_note
lexical_decisions:
- source_word: Τί οὖν
  chosen: What then
  alternatives:
  - So what
  - What, then
  lexicon: BDAG
  rationale: Preserves Paul's inferential transition and rhetorical-question structure
    in natural English.
- source_word: τὸ περισσὸν
  chosen: the advantage
  alternatives:
  - the benefit
  - the excess
  - the superiority
  lexicon: BDAG
  rationale: Here περισσός functions idiomatically for what is exceptional or advantageous.
    'Advantage' best fits Paul's question about Jewish distinctiveness without overstating
    ethnic superiority.
- source_word: τοῦ Ἰουδαίου
  chosen: of the Jew
  alternatives:
  - of a Jew
  - of the Jewish person
  lexicon: BDAG
  rationale: The singular with article is generic. 'The Jew' keeps the representative
    singular used by Paul and is more textually transparent than recasting to plural
    or gender-neutral language.
- source_word: ἢ τίς
  chosen: Or what
  alternatives:
  - Or what is it
  - Or which
  lexicon: BDAG
  rationale: Maintains the parallelism of the second rhetorical question in straightforward
    English.
- source_word: ἡ ὠφέλεια
  chosen: the benefit
  alternatives:
  - the value
  - the profit
  - the usefulness
  lexicon: BDAG
  rationale: '''Benefit'' is clear modern English and pairs well with ''advantage''
    while preserving a slight distinction between the two Greek terms.'
- source_word: τῆς περιτομῆς
  chosen: of circumcision
  alternatives:
  - of the circumcision
  lexicon: BDAG
  rationale: A literal rendering is best. In context it refers to circumcision as
    the covenant sign marking Jewish identity, but the text names the rite directly.
