theological_decisions:
- issue: Whether to render Ἰουδαίου generically or as a gender-neutral paraphrase
  chosen_reading: of the Jew
  alternative_readings:
  - of the Jewish person
  - of Jews
  rationale: Following the project's gender-accurate policy, the masculine singular
    is retained because Paul uses a representative singular, not an explicitly inclusive
    abstraction. This preserves his rhetorical style without importing a broader paraphrase.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
