id: ROM.3.26
reference: Romans 3:26
source:
  edition: SBLGNT
  text: ἐν τῇ ἀνοχῇ τοῦ θεοῦ, πρὸς ⸀τὴν ἔνδειξιν τῆς δικαιοσύνης αὐτοῦ ἐν τῷ νῦν καιρῷ,
    εἰς τὸ εἶναι αὐτὸν δίκαιον καὶ δικαιοῦντα τὸν ἐκ πίστεως Ἰησοῦ.
translation:
  text: in God's forbearance, for the demonstration of his righteousness at the
    present time, so that he might be just and the justifier of the one who has
    faith in Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who is of Jesus' faithfulness.'
    reason: alternative_reading
  - marker: c
    text: Or 'declares righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοχῇ
  chosen: forbearance
  alternatives:
  - patience
  - restraint
  lexicon: BDAG
  rationale: '''Forbearance'' best captures God''s deliberate withholding of immediate
    judgment in this context and fits Paul''s argument better than the more general
    ''patience''.'
- source_word: ἔνδειξιν
  chosen: demonstration
  alternatives:
  - proof
  - display
  lexicon: BDAG
  rationale: '''Demonstration'' preserves the evidential force of the noun while remaining
    natural in English.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Following the project's default for δικαιοσύνη, 'righteousness' is retained
    in the main text; 'justice' remains a valid Pauline nuance and is preserved in
    a footnote.
- source_word: νῦν καιρῷ
  chosen: the present time
  alternatives:
  - this present time
  - the now-time
  lexicon: BDAG
  rationale: '''The present time'' is idiomatic modern English and preserves the temporal
    emphasis of νῦν with καιρός.'
- source_word: δίκαιον
  chosen: just
  alternatives:
  - righteous
  lexicon: BDAG
  rationale: '''Just'' fits the judicial context and pairs naturally with ''justifies,''
    preserving Paul''s wordplay without flattening the legal sense.'
- source_word: δικαιοῦντα
  chosen: the justifier of
  alternatives:
  - the one who justifies
  - one who declares righteous
  - one who vindicates
  lexicon: BDAG
  rationale: Present active participle used substantivally. Rendered as the noun
    "justifier" to preserve the deliberate wordplay with δίκαιον ("just")
    immediately before it — Paul's argument hinges on God being both the standard
    of justice *and* the one who justifies. "The one who justifies the one who
    has faith" (the earlier draft) is lexically accurate but produces a double
    "the one who" that reads awkwardly in English. "Justifier" (KJV, ESV) is
    classical and preserves the just/justifier echo in a single clean phrase.
- source_word: ἐκ πίστεως Ἰησοῦ
  chosen: has faith in Jesus
  alternatives:
  - is of faith in Jesus
  - is of Jesus' faithfulness
  lexicon: BDAG
  rationale: The main text follows the project's default rendering of πίστις as 'faith'
    and construes the phrase in the familiar objective sense for readability. Because
    the genitive construction is contested, the alternative 'Jesus' faithfulness'
    is preserved in a footnote.
