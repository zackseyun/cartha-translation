- issue: Meaning of ἐκ πίστεως Ἰησοῦ
  chosen_reading: the one who has faith in Jesus
  alternative_readings:
  - the one who is of Jesus' faithfulness
  rationale: The main text follows the doctrine table's default rendering of πίστις
    as 'faith' while preserving the debated subjective-genitive reading in a footnote,
    since the phrase is genuinely contested in Pauline usage.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; πίστις default rendering'
