id: ROM.3.31
reference: Romans 3:31
source:
  edition: SBLGNT
  text: νόμον οὖν καταργοῦμεν διὰ τῆς πίστεως; μὴ γένοιτο, ἀλλὰ νόμον ⸀ἱστάνομεν.
translation:
  text: Do we then nullify the law through faith? May it never be! On the contrary,
    we uphold the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "we establish the law."
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμον
  chosen: the law
  alternatives:
  - law
  lexicon: BDAG
  rationale: Though anarthrous in Greek, the referent in Romans is the definite concept
    of the law/Torah within Paul's argument. English idiom strongly prefers the article
    here, and repeating 'the law' preserves coherence without over-paraphrasing.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: '"Then" fits the rhetorical inference from the prior argument and sounds
    natural in modern English.'
- source_word: καταργοῦμεν
  chosen: nullify
  alternatives:
  - abolish
  - invalidate
  - overthrow
  lexicon: BDAG
  rationale: '"Nullify" preserves the sense of rendering something ineffective or
    void and pairs well with the later positive contrast. "Abolish" can sound too
    absolute or legislative in English.'
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - by faith
  - through trust
  lexicon: BDAG
  rationale: Following the project's default rendering of πίστις as "faith." "Through
    faith" is a natural rendering of διά with the genitive and preserves Paul's instrumental
    sense.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - Absolutely not!
  - By no means!
  lexicon: BDAG
  rationale: This preserves the forceful repudiation of Paul's idiom without flattening
    it into mere conversational denial. It is strong, recognizable, and suitably emphatic.
- source_word: ἀλλὰ
  chosen: On the contrary
  alternatives:
  - rather
  - but
  lexicon: BDAG
  rationale: The phrase marks a sharp corrective contrast and makes Paul's rebuttal
    explicit in clear modern English.
- source_word: ἱστάνομεν
  chosen: uphold
  alternatives:
  - establish
  - confirm
  lexicon: BDAG
  rationale: While ἵστημι can mean "establish," "uphold" better fits English usage
    with "the law" in this context and clearly contrasts with "nullify." It conveys
    maintaining the law's validity rather than instituting it anew.
