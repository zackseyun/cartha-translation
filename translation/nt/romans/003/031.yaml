theological_decisions:
- issue: Relationship of faith and the law
  chosen_reading: Render Paul's claim as 'we uphold the law' rather than 'we establish
    the law' in the main text.
  alternative_readings:
  - we establish the law
  - we confirm the law
  rationale: The Greek permits "establish," but in contemporary English that may suggest
    bringing the law into existence. In context Paul denies that faith voids the law;
    "uphold" communicates that faith maintains the law's validity and role without
    importing a specific denominational scheme.
