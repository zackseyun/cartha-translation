id: ROM.3.19
reference: Romans 3:19
source:
  edition: SBLGNT
  text: Οἴδαμεν δὲ ὅτι ὅσα ὁ νόμος λέγει τοῖς ἐν τῷ νόμῳ λαλεῖ, ἵνα πᾶν στόμα φραγῇ
    καὶ ὑπόδικος γένηται πᾶς ὁ κόσμος τῷ θεῷ·
translation:
  text: Now we know that whatever the law says, it speaks to those under the law,
    so that every mouth may be stopped and the whole world may become accountable
    to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, "those in the law."
    reason: lexical_alternative
  - marker: b
    text: Or "every mouth may be shut."
    reason: lexical_alternative
  - marker: c
    text: Or "answerable," "liable to judgment," or "found guilty" before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  chosen: Now we know
  alternatives:
  - And we know
  - We know
  lexicon: BDAG
  rationale: Rendered as a present-state statement of shared knowledge. "Now" brings
    out δέ naturally in English discourse without overstating contrast.
- source_word: νόμος
  chosen: the law
  alternatives:
  - Law
  - the Law
  lexicon: BDAG
  rationale: Retained as "the law" to preserve Paul's reference to the law as a recognized
    covenantal authority, without over-specifying beyond the Greek.
- source_word: τοῖς ἐν τῷ νόμῳ
  chosen: those under the law
  alternatives:
  - those in the law
  - those within the law
  lexicon: BDAG
  rationale: Although the Greek is literally "those in the law," English idiom and
    Pauline usage are better represented by "under the law," referring to those within
    its jurisdiction.
- source_word: λαλεῖ
  chosen: it speaks
  alternatives:
  - it says
  - it addresses
  lexicon: BDAG
  rationale: Used "speaks" to preserve the verbal distinction from λέγει earlier in
    the clause while remaining natural English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Standard purposive rendering that is clear and natural in modern English.
- source_word: πᾶν στόμα φραγῇ
  chosen: every mouth may be stopped
  alternatives:
  - every mouth may be shut
  - every mouth may be silenced
  lexicon: BDAG
  rationale: Kept the concrete metaphor of "mouth" and chose "stopped" as a natural
    judicial image of silencing defense.
- source_word: ὑπόδικος
  chosen: accountable
  alternatives:
  - answerable
  - guilty
  - liable to judgment
  lexicon: BDAG
  rationale: Chose "accountable" as the best balance of legal force and readable modern
    English. "Guilty" is somewhat stronger than the adjective itself, while "liable
    to judgment" is interpretive.
- source_word: γένηται
  chosen: may become
  alternatives:
  - may be
  - might become
  lexicon: BDAG
  rationale: Preserves the ingressive sense of becoming under the law's verdict rather
    than merely existing in that state.
- source_word: πᾶς ὁ κόσμος
  chosen: the whole world
  alternatives:
  - all the world
  - the entire world
  lexicon: BDAG
  rationale: A natural rendering that preserves the comprehensive scope of humanity
    under God's judgment.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: Chose "to God" to reflect the dative construction with ὑπόδικος; the
    legal accountability is directed toward God.
