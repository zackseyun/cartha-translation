theological_decisions:
- issue: Legal force of ὑπόδικος in relation to divine judgment
  chosen_reading: The phrase is rendered as universal accountability before God's
    judgment rather than as a narrowed declaration of already-condemned guilt.
  alternative_readings:
  - the whole world may be found guilty before God
  - the whole world may be liable to God's judgment
  rationale: Paul's wording emphasizes the world's status under God's tribunal as
    established by the law's speech. "Accountable" preserves that legal-theological
    force without importing a stronger verdict than the adjective itself requires.
