theological_decisions:
- issue: Quotation of Psalm 44:22 in a context of suffering
  chosen_reading: Retain the corporate, ongoing sense of believers being treated as
    destined for death without importing additional theological explanation into the
    translation.
  alternative_readings:
  - Use a more interpretive rendering emphasizing martyrdom specifically
  rationale: The Greek presents the quoted lament plainly. The translation should
    preserve its force and imagery without narrowing it to one doctrinal application
    beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
