id: ROM.8.36
reference: Romans 8:36
source:
  edition: SBLGNT
  text: καθὼς γέγραπται ὅτι Ἕνεκεν σοῦ θανατούμεθα ὅλην τὴν ἡμέραν, ἐλογίσθημεν ὡς
    πρόβατα σφαγῆς.
translation:
  text: 'Just as it is written: “For your sake we are being put to death all day long;
    we were counted as sheep for slaughter.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we were regarded as sheep for slaughter.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  - Even as
  lexicon: BDAG
  rationale: Introduces the scriptural citation with a comparative force; 'Just as'
    is natural modern English and preserves the connection to what precedes.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture;
    'it is written' preserves the abiding authority implied by the perfect.
- source_word: Ἕνεκεν σοῦ
  chosen: For your sake
  alternatives:
  - Because of you
  - On account of you
  lexicon: BDAG
  rationale: Best captures causal sense with idiomatic English and preserves the direct
    address to God in the quotation.
- source_word: θανατούμεθα
  chosen: we are being put to death
  alternatives:
  - we are killed
  - we are being killed
  lexicon: BDAG
  rationale: The present passive indicates ongoing lethal treatment. 'Being put to
    death' is slightly more formal and weighty than 'killed' while remaining clear.
- source_word: ὅλην τὴν ἡμέραν
  chosen: all day long
  alternatives:
  - the whole day
  - all the day
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the accusative expression of extent
    of time; preserves the sense of continual exposure.
- source_word: ἐλογίσθημεν
  chosen: we were counted
  alternatives:
  - we were regarded
  - we were considered
  lexicon: BDAG
  rationale: Passive of λογίζομαι here conveys being reckoned or regarded as something.
    'Counted' is concise, natural, and close to the Greek.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces the comparison straightforwardly. 'As' is more direct and
    formally closer here than 'like.'
- source_word: πρόβατα σφαγῆς
  chosen: sheep for slaughter
  alternatives:
  - sheep to be slaughtered
  - sheep for the slaughter
  lexicon: BDAG
  rationale: A natural English rendering of the genitive construction, preserving
    the sacrificial/slaughter imagery without unnecessary expansion.
