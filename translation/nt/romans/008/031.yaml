theological_decisions:
- issue: Conditional force of εἰ ὁ θεὸς ὑπὲρ ἡμῶν
  chosen_reading: Rendered as 'If God is for us' in the main text.
  alternative_readings:
  - Rendered as 'Since God is for us' to make the assumed truth explicit.
  rationale: The Greek uses εἰ, and preserving 'if' keeps the rhetorical structure
    intact while allowing readers to feel the force of Paul's triumphant question.
    The context makes clear that this is not expressing doubt about God's favor.
