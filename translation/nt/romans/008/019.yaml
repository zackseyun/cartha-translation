theological_decisions:
- issue: Whether to render υἱῶν θεοῦ inclusively as "children of God" or retain the
    masculine "sons of God."
  chosen_reading: sons of God
  alternative_readings:
  - children of God
  rationale: The Greek is explicitly masculine plural, and the project's stated policy
    prefers gender-accurate renderings over gender-neutral ones. Here "sons" may also
    preserve the filial-status/heirship resonance in Paul's argument.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
