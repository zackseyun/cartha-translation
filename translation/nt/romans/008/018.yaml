id: ROM.8.18
reference: Romans 8:18
source:
  edition: SBLGNT
  text: Λογίζομαι γὰρ ὅτι οὐκ ἄξια τὰ παθήματα τοῦ νῦν καιροῦ πρὸς τὴν μέλλουσαν δόξαν
    ἀποκαλυφθῆναι εἰς ἡμᾶς.
translation:
  text: For I consider that the sufferings of the present time are not worthy to be
    compared with the coming glory that is to be revealed to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “revealed in us.”
    reason: alternative_reading
lexical_decisions:
- source_word: Λογίζομαι
  chosen: I consider
  alternatives:
  - I reckon
  - I conclude
  - I count
  lexicon: BDAG
  rationale: Conveys a reasoned judgment rather than a mere feeling. 'Consider' is
    natural modern English and preserves Paul's evaluative sense.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation or grounding for the previous statement. 'For' preserves
    the connective force succinctly.
- source_word: οὐκ ἄξια
  chosen: are not worthy to be compared
  alternatives:
  - are not worthy
  - are not equal
  lexicon: BDAG
  rationale: The adjective ἄξια with πρὸς here expresses disproportionality in comparison.
    'To be compared' makes the implicit comparative force explicit in idiomatic English
    without over-paraphrasing.
- source_word: τὰ παθήματα
  chosen: the sufferings
  alternatives:
  - the afflictions
  - the sufferings endured
  lexicon: BDAG
  rationale: Standard rendering for πάθημα in Pauline context, referring to experienced
    sufferings rather than abstract passion.
- source_word: τοῦ νῦν καιροῦ
  chosen: of the present time
  alternatives:
  - of this present time
  - of the current age
  lexicon: BDAG
  rationale: καιρός here denotes the present season or time. 'Present time' is clear
    and restrained; 'age' would add eschatological coloring not demanded by the phrase
    itself.
- source_word: πρὸς
  chosen: to be compared with
  alternatives:
  - in comparison with
  - relative to
  lexicon: BDAG
  rationale: Here πρὸς introduces the standard of comparison. English expresses that
    most naturally with 'compared with'.
- source_word: τὴν μέλλουσαν δόξαν
  chosen: the coming glory
  alternatives:
  - the glory to come
  - the future glory
  lexicon: BDAG
  rationale: μέλλουσαν is a participle meaning 'about to be' or 'coming/future.' 'Coming
    glory' is concise, natural, and preserves the forward-looking sense.
- source_word: ἀποκαλυφθῆναι
  chosen: that is to be revealed
  alternatives:
  - to be revealed
  - to be disclosed
  lexicon: BDAG
  rationale: The infinitive depends on δόξαν and specifies the glory as one destined
    for revelation. Rendering it as a relative clause is idiomatic English and preserves
    the passive future-oriented sense.
- source_word: εἰς ἡμᾶς
  chosen: to us
  alternatives:
  - in us
  - for us
  lexicon: BDAG
  rationale: εἰς with persons here can be understood as movement toward or reference
    to us. In this context, 'to us' best fits the sense of glory revealed to believers,
    while preserving the possibility of inward participation in a footnote.
