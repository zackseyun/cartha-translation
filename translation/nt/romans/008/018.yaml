theological_decisions:
- issue: Meaning of εἰς ἡμᾶς in the revelation of glory
  chosen_reading: to us
  alternative_readings:
  - in us
  - upon us
  - for us
  rationale: The phrase can be taken in more than one closely related sense. 'To us'
    is the most natural English rendering for glory disclosed to believers, while
    not foreclosing the participatory nuance often heard in 'in us.' Because the ambiguity
    bears interpretive weight, the alternative is preserved in a footnote rather than
    resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
