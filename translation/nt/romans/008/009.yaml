id: ROM.8.9
reference: Romans 8:9
source:
  edition: SBLGNT
  text: Ὑμεῖς δὲ οὐκ ἐστὲ ἐν σαρκὶ ἀλλὰ ἐν πνεύματι, εἴπερ πνεῦμα θεοῦ οἰκεῖ ἐν ὑμῖν.
    εἰ δέ τις πνεῦμα Χριστοῦ οὐκ ἔχει, οὗτος οὐκ ἔστιν αὐτοῦ.
translation:
  text: But you are not in the flesh but in the Spirit, if indeed the Spirit of God
    dwells in you. But if anyone does not have the Spirit of the Messiah, he does
    not belong to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''in the sinful nature.'' Greek: ''in the flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Spirit of Christ.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'is not his.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Rendered as 'flesh' to preserve Paul’s own terminology and the theological
    tension of sphere/existence language. Although the sense here is metaphorical
    rather than merely bodily, DOCTRINE.md prefers 'flesh' as the default Pauline
    rendering unless context demands otherwise.
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized because the immediate context identifies this as 'the Spirit
    of God' and 'the Spirit of the Messiah,' indicating the Holy Spirit rather than
    a merely human disposition.
- source_word: οἰκεῖ
  chosen: dwells
  alternatives:
  - lives
  lexicon: BDAG
  rationale: '''Dwells'' preserves the indwelling nuance of settled residence and
    matches common biblical usage without sounding archaic.'
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as 'the Messiah' in keeping with the project’s default for Χριστός
    when used as a title rather than as a name-like form.
- source_word: οὐκ ἔστιν αὐτοῦ
  chosen: does not belong to him
  alternatives:
  - is not his
  lexicon: BDAG
  rationale: This is an optimal-equivalence rendering of the genitival possession
    idiom. 'Does not belong to him' is more natural in modern English while preserving
    the force of covenantal/relational possession.
- source_word: εἴπερ
  chosen: if indeed
  alternatives:
  - if
  - since indeed
  lexicon: BDAG
  rationale: Rendered 'if indeed' to preserve the conditional form while signaling
    the clause’s rhetorical assumption-like force.
- source_word: Ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic in Greek; English keeps the pronoun,
    with the contrast carried naturally by 'But you.'
- source_word: οὗτος
  chosen: he
  alternatives:
  - that person
  - this one
  lexicon: BDAG
  rationale: Rendered with the generic singular 'he' because the Greek is grammatically
    masculine singular with representative force, and the project prefers gender-accurate
    rendering over flattening the form.
