theological_decisions:
- issue: Paul’s contrast between 'in the flesh' and 'in the Spirit'
  chosen_reading: sphere/existence language tied to the Holy Spirit’s indwelling,
    without replacing Paul's term 'flesh' with an interpretive paraphrase
  alternative_readings:
  - psychological contrast between sinful impulses and spiritual mindset
  - paraphrastic 'sinful nature' versus 'Spirit-controlled life'
  rationale: The verse describes the believer’s realm or mode of existence in relation
    to God’s Spirit. Retaining 'flesh' and 'Spirit' preserves Paul’s theological categories
    without importing a narrower doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms.
- issue: Antecedent of 'him' in 'does not belong to him'
  chosen_reading: the pronoun most naturally refers to the Messiah in the immediate
    phrase 'Spirit of the Messiah'
  alternative_readings:
  - God, by broader contextual linkage between 'Spirit of God' and 'Spirit of the
    Messiah'
  rationale: The nearest grammatical antecedent is 'the Messiah,' so the English leaves
    the pronoun unchanged rather than over-specifying beyond the Greek.
  doctrine_reference: Do not import doctrinal claims the text does not make.
