theological_decisions:
- issue: Meaning of σάρξ in this verse
  chosen_reading: Rendered 'flesh' in both occurrences, not 'sinful nature.'
  alternative_readings:
  - '''sinful nature'' in metaphorical contexts'
  rationale: 'The doctrine guide defaults σάρξ to ''flesh'' literally and only variably
    to ''sinful nature'' when context clearly demands it. Romans 8:3 benefits from
    preserving Paul''s layered usage: the law was weak through human flesh, and God
    condemned sin in the flesh through the incarnation.'
  doctrine_reference: 'Contested terms table: σάρξ'
- issue: Meaning of περὶ ἁμαρτίας
  chosen_reading: Rendered 'as a sin offering' in the main text.
  alternative_readings:
  - for sin
  - concerning sin
  rationale: The phrase often carries sacrificial force in scriptural usage, and that
    sense fits the argument here. Because the phrase is genuinely discussed, the less
    specific alternative is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Christological force of 'in the likeness of sinful flesh'
  chosen_reading: Retained 'likeness' without weakening true incarnation or implying
    Christ's sinfulness.
  alternative_readings:
  - phrasing that over-explains either similarity or difference
  rationale: 'The wording must preserve Chalcedonian balance: the Son truly came in
    flesh, yet not as personally sinful. The Greek itself maintains that tension,
    so the translation should also.'
  doctrine_reference: Definition of Chalcedon; preserve theological tension
