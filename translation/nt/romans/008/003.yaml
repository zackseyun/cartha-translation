id: ROM.8.3
reference: Romans 8:3
source:
  edition: SBLGNT
  text: τὸ γὰρ ἀδύνατον τοῦ νόμου, ἐν ᾧ ἠσθένει διὰ τῆς σαρκός, ὁ θεὸς τὸν ἑαυτοῦ
    υἱὸν πέμψας ἐν ὁμοιώματι σαρκὸς ἁμαρτίας καὶ περὶ ἁμαρτίας κατέκρινε τὴν ἁμαρτίαν
    ἐν τῇ σαρκί,
translation:
  text: For God condemned sin in the flesh by sending his own Son in the likeness
    of sinful flesh and as a sin offering, because what the law could not do, in that
    it was weak through the flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the law’s inability.'
    reason: lexical_alternative
  - marker: b
    text: '''Flesh'' here likely refers to human flesh in its fallen weakness; some
      translations render the term more interpretively as ''sinful nature'' in certain
      contexts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for sin.' The Greek expression can carry a sacrificial sense, 'as a
      sin offering.'
    reason: alternative_reading
  - marker: d
    text: '''In the likeness of sinful flesh'' affirms the Son’s real humanity while
      carefully distinguishing him from sin itself.'
    reason: cultural_note
lexical_decisions:
- source_word: τὸ ἀδύνατον τοῦ νόμου
  chosen: what the law could not do
  alternatives:
  - the impossibility of the law
  - the law's inability
  lexicon: BDAG
  rationale: This impersonal neuter expression is most naturally rendered as the law's
    inability or what it could not accomplish. The chosen wording is idiomatic in
    English while preserving the sense of incapacity.
- source_word: νόμος
  chosen: law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: Rendered 'law' rather than 'the Law' in the main text because the Greek
    lacks the article here and the phrase emphasizes the law's incapacity in function.
    The Mosaic reference remains clear from context.
- source_word: ἐν ᾧ ἠσθένει
  chosen: in that it was weak
  alternatives:
  - because it was weak
  - wherein it was weak
  lexicon: BDAG
  rationale: This clause explains the respect in which the law was unable. 'In that
    it was weak' preserves the explanatory force with readable English.
- source_word: διὰ τῆς σαρκός
  chosen: through the flesh
  alternatives:
  - because of the flesh
  - through human flesh
  lexicon: BDAG
  rationale: σάρξ is a contested term. Here it refers to human flesh in its fallen
    weakness as the sphere through which the law was rendered powerless. 'Through
    the flesh' preserves the Greek image and theological tension better than importing
    'sinful nature'.
- source_word: πέμψας
  chosen: by sending
  alternatives:
  - having sent
  - when he sent
  lexicon: BDAG
  rationale: 'The aorist participle is best expressed instrumentally here: God acted
    by sending his Son. This fits the syntax and English flow.'
- source_word: τὸν ἑαυτοῦ υἱόν
  chosen: his own Son
  alternatives:
  - his Son
  lexicon: BDAG
  rationale: ἑαυτοῦ adds emphasis; 'his own Son' preserves that force and underscores
    the personal relation without adding doctrinal content beyond the text.
- source_word: ἐν ὁμοιώματι σαρκὸς ἁμαρτίας
  chosen: in the likeness of sinful flesh
  alternatives:
  - in the likeness of flesh characterized by sin
  - in the likeness of flesh of sin
  lexicon: BDAG
  rationale: This phrasing preserves both πραγματική humanity and the careful qualification
    of 'likeness,' avoiding any denial of the Son's true incarnation while also avoiding
    attribution of sin to him.
- source_word: περὶ ἁμαρτίας
  chosen: as a sin offering
  alternatives:
  - for sin
  - concerning sin
  lexicon: BDAG; LXX usage
  rationale: In sacrificial contexts περὶ ἁμαρτίας commonly means 'for a sin offering'
    or 'as a sin offering.' Given Paul's sacrificial logic here, this rendering is
    more specific and likely than the more general 'for sin,' while the alternative
    should be preserved in a footnote.
- source_word: κατέκρινε τὴν ἁμαρτίαν
  chosen: condemned sin
  alternatives:
  - passed sentence on sin
  lexicon: BDAG
  rationale: The verb denotes judicial condemnation. 'Condemned sin' is direct, idiomatic,
    and preserves the forensic force.
- source_word: ἐν τῇ σαρκί
  chosen: in the flesh
  alternatives:
  - in flesh
  - in his flesh
  lexicon: BDAG
  rationale: The Greek says 'in the flesh' without an explicit pronoun. This preserves
    a deliberate compactness that may refer to the incarnate sphere in which sin was
    condemned, likely in the Son's flesh, without over-specifying in the main text.
