id: ROM.8.13
reference: Romans 8:13
source:
  edition: SBLGNT
  text: εἰ γὰρ κατὰ σάρκα ζῆτε μέλλετε ἀποθνῄσκειν, εἰ δὲ πνεύματι τὰς πράξεις τοῦ
    σώματος θανατοῦτε, ζήσεσθε.
translation:
  text: For if you live according to the sinful nature, you are going to die; but
    if by the Spirit you put to death the deeds of the body, you will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'according to the flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force linking this verse to the previous argument.
- source_word: κατὰ σάρκα
  chosen: according to the sinful nature
  alternatives:
  - according to the flesh
  - according to the fleshly nature
  lexicon: BDAG
  rationale: Here σάρξ is metaphorical in Paul's ethical contrast, so the project's
    default contextual rendering favors 'sinful nature' rather than the more literal
    'flesh.' 'According to' preserves κατά's governing sense.
- source_word: ζῆτε
  chosen: you live
  alternatives:
  - you are living
  lexicon: BDAG
  rationale: Simple present best matches the Greek present indicative in a conditional
    statement.
- source_word: μέλλετε ἀποθνῄσκειν
  chosen: you are going to die
  alternatives:
  - you are about to die
  - you are destined to die
  lexicon: BDAG
  rationale: This naturally conveys μέλλω with the infinitive in readable English
    without overstating temporal immediacy.
- source_word: πνεύματι
  chosen: by the Spirit
  alternatives:
  - by the spirit
  - in the Spirit
  lexicon: BDAG
  rationale: The dative is taken instrumentally, and in Romans 8 the referent is best
    understood as the Holy Spirit rather than the human spirit.
- source_word: τὰς πράξεις τοῦ σώματος
  chosen: the deeds of the body
  alternatives:
  - the practices of the body
  - the actions of the body
  lexicon: BDAG
  rationale: '''Deeds'' is idiomatic and preserves the concrete ethical sense of πράξεις;
    ''of the body'' keeps the genitive explicit.'
- source_word: θανατοῦτε
  chosen: you put to death
  alternatives:
  - you kill
  - you mortify
  lexicon: BDAG
  rationale: This is the clearest modern equivalent that preserves the force of decisive
    moral execution without archaic wording.
- source_word: ζήσεσθε
  chosen: you will live
  alternatives:
  - you will have life
  lexicon: BDAG
  rationale: Future middle is well represented by a simple future in English here.
