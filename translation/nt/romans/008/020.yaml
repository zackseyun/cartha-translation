id: ROM.8.20
reference: Romans 8:20
source:
  edition: SBLGNT
  text: τῇ γὰρ ματαιότητι ἡ κτίσις ὑπετάγη, οὐχ ἑκοῦσα ἀλλὰ διὰ τὸν ὑποτάξαντα, ⸀ἐφ’
    ἑλπίδι
translation:
  text: For the creation was subjected to futility, not willingly, but because of
    the one who subjected it, in hope
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vanity' or 'frustration' for 'futility.'
    reason: lexical_alternative
  - marker: b
    text: '''The one who subjected it'' is not explicitly identified in the Greek.'
    reason: alternative_reading
  - marker: c
    text: Or 'with hope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ματαιότητι
  chosen: futility
  alternatives:
  - vanity
  - frustration
  - emptiness
  lexicon: BDAG
  rationale: μάταιοτης here denotes frustrated or purposeless condition rather than
    moral evil. 'Futility' is natural modern English and preserves the Pauline sense
    of creation's inability to attain its proper end.
- source_word: κτίσις
  chosen: creation
  alternatives:
  - creature
  - created order
  lexicon: BDAG
  rationale: In Romans 8:19–22 the term refers collectively to the non-human created
    order, not to an individual creature. 'Creation' best fits the broader context.
- source_word: ὑπετάγη
  chosen: was subjected
  alternatives:
  - was made subject
  - was subordinated
  lexicon: BDAG
  rationale: The passive indicates that creation underwent an imposed subjection.
    'Was subjected' is idiomatic and preserves the passive force.
- source_word: οὐχ ἑκοῦσα
  chosen: not willingly
  alternatives:
  - not of its own will
  - not voluntarily
  lexicon: BDAG
  rationale: The phrase contrasts creation's lack of agency with the action of the
    one who subjected it. 'Not willingly' is concise and clear.
- source_word: διὰ τὸν ὑποτάξαντα
  chosen: because of the one who subjected it
  alternatives:
  - because of him who subjected it
  - through the one who subjected it
  lexicon: BDAG
  rationale: διά with the accusative here is best taken causally. 'Because of the
    one who subjected it' preserves the personal referent while avoiding over-interpretation
    in the main text.
- source_word: ἐφ’ ἑλπίδι
  chosen: in hope
  alternatives:
  - on the basis of hope
  - with hope
  lexicon: BDAG
  rationale: This compact idiom is well represented by 'in hope,' which preserves
    both brevity and the forward-looking sense without over-expansion.
