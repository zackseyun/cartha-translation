theological_decisions:
- issue: Identity of 'the one who subjected' creation
  chosen_reading: Kept the phrase generic as 'the one who subjected it' in the main
    text.
  alternative_readings:
  - God subjected creation in judgment yet with redemptive purpose
  - Adam's fall occasioned creation's subjection
  - Satan is proposed by some interpreters but is less likely in context
  rationale: The Greek does not explicitly identify the subject here, and the translation
    should preserve that textual restraint rather than resolve the interpretive question
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
