theological_decisions:
- issue: Meaning of the phrase 'in Messiah Jesus'
  chosen_reading: A union-with-Christ phrase identifying those who belong to and are
    incorporated into Messiah Jesus.
  alternative_readings:
  - a looser sense such as 'because of Messiah Jesus'
  rationale: The preposition ἐν in Pauline usage here is best preserved as 'in,' maintaining
    the theological tension and richness of participation/union language rather than
    reducing it to a single explanatory paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
