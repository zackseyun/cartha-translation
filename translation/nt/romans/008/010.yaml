id: ROM.8.10
reference: Romans 8:10
source:
  edition: SBLGNT
  text: εἰ δὲ Χριστὸς ἐν ὑμῖν, τὸ μὲν σῶμα νεκρὸν διὰ ἁμαρτίαν, τὸ δὲ πνεῦμα ζωὴ διὰ
    δικαιοσύνην.
translation:
  text: But if the Messiah is in you, the body is dead because of sin, but the spirit
    is life because of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Spirit is life.' The Greek term can be read as referring either
      to the human spirit enlivened by God or to the Holy Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'the body is subject to death' or 'the body is mortal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Cartha policy prefers translating Χριστός as the title 'Messiah' where
    it retains titular force rather than functioning merely as a name.
- source_word: σῶμα
  chosen: body
  alternatives:
  - flesh
  lexicon: BDAG
  rationale: σῶμα ordinarily denotes the body, not σάρξ ('flesh'). 'Body' preserves
    the concrete contrast with πνεῦμα.
- source_word: νεκρὸν
  chosen: dead
  alternatives:
  - subject to death
  - dead in the sense of mortal
  lexicon: BDAG
  rationale: The adjective straightforwardly means 'dead.' Although Paul may imply
    mortality rather than literal present corpse-state, the main text preserves the
    sharper lexical form and leaves the nuance to interpretation.
- source_word: διὰ ἁμαρτίαν
  chosen: because of sin
  alternatives:
  - on account of sin
  lexicon: BDAG
  rationale: διά with the accusative here is best rendered causally. 'Because of sin'
    is natural English and preserves Paul's causal logic.
- source_word: πνεῦμα
  chosen: the spirit
  alternatives:
  - the Spirit
  lexicon: BDAG
  rationale: The term is contextually ambiguous. In this clause, rendering it as 'the
    spirit' best preserves the contrast with 'the body' and avoids prematurely resolving
    whether Paul means the human spirit enlivened by God's Spirit or the Holy Spirit
    directly.
- source_word: ζωὴ
  chosen: is life
  alternatives:
  - is alive
  - brings life
  lexicon: BDAG
  rationale: The noun ζωή is 'life,' not the adjective 'alive.' 'Is life' preserves
    the nominal form and Paul's compressed expression.
- source_word: διὰ δικαιοσύνην
  chosen: because of righteousness
  alternatives:
  - because of justice
  lexicon: BDAG
  rationale: For Pauline δικαιοσύνη, Cartha's default is 'righteousness,' while preserving
    'justice' as a footnoted alternative where relevant. The causal force of διά is
    retained with 'because of.'
