theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: the spirit
  alternative_readings:
  - the Spirit
  rationale: The clause likely contrasts the believer's body with the believer's spirit,
    while still depending on the indwelling Messiah and the prior context of the Holy
    Spirit. Lowercase 'spirit' preserves that tension without foreclosing the Spirit-reference
    reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of νεκρὸν with σῶμα
  chosen_reading: the body is dead
  alternative_readings:
  - the body is subject to death
  - the body is mortal
  rationale: Paul may be speaking of the body's mortality under sin's regime, but
    the Greek adjective is 'dead.' The main text stays close to the source while allowing
    the interpretive nuance in a footnote.
  doctrine_reference: Original-language primacy over translation tradition.
