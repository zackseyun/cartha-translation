id: ROM.8.15
reference: Romans 8:15
source:
  edition: SBLGNT
  text: οὐ γὰρ ἐλάβετε πνεῦμα δουλείας πάλιν εἰς φόβον, ἀλλὰ ἐλάβετε πνεῦμα υἱοθεσίας
    ἐν ᾧ κράζομεν· Αββα ὁ πατήρ·
translation:
  text: For you did not receive a spirit of slavery leading back into fear, but you
    received a spirit of adoption as sons, by whom we cry, “Abba! Father!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Spirit of adoption as sons."
    reason: alternative_reading
  - marker: b
    text: Or more literally, "in whom"; the Greek relative pronoun is neuter to agree
      with "spirit."
    reason: lexical_alternative
  - marker: c
    text: '"Adoption as sons" preserves the legal-sonship nuance of the Greek term;
      alternatively, simply "adoption."'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα δουλείας
  chosen: a spirit of slavery
  alternatives:
  - a spirit of bondage
  - the spirit of slavery
  lexicon: BDAG
  rationale: Rendered πνεῦμα generically as "spirit" and δουλείας as "slavery" to
    preserve the contrast with the following phrase and to keep the bonded force of
    the slavery image.
- source_word: πάλιν εἰς φόβον
  chosen: leading back into fear
  alternatives:
  - again for fear
  - to fall back into fear
  - resulting again in fear
  lexicon: BDAG
  rationale: A more idiomatic English rendering is needed for natural sense. "Leading
    back into fear" preserves both πάλιν (again/back) and εἰς φόβον (into fear) without
    adding an unwarranted finite verb.
- source_word: πνεῦμα υἱοθεσίας
  chosen: a spirit of adoption as sons
  alternatives:
  - the Spirit of adoption
  - a spirit of sonship
  - a spirit of adoption
  lexicon: BDAG
  rationale: '"Adoption as sons" preserves the legal-sonship force of υἱοθεσία better
    than the flatter "adoption." The article is absent, so the main text keeps "a
    spirit," while the capitalized/personal reading is preserved in a footnote.'
- source_word: υἱοθεσίας
  chosen: adoption as sons
  alternatives:
  - adoption
  - sonship
  lexicon: BDAG
  rationale: Because the term is built on "son" and carries inheritance/legal-status
    connotations in Pauline usage, "adoption as sons" best reflects the source while
    remaining readable. This follows the gender-accurate principle rather than neutralizing
    the masculine form.
- source_word: ἐν ᾧ
  chosen: by whom
  alternatives:
  - in whom
  - in which
  lexicon: BDAG
  rationale: Although the form is literally "in whom/which," English idiom and the
    likely instrumental sense favor "by whom" if the referent is the personal Spirit.
    The more formally literal alternative is preserved in a footnote.
- source_word: κράζομεν
  chosen: we cry
  alternatives:
  - we call out
  - we cry out
  lexicon: BDAG
  rationale: '"Cry" is the most natural concise equivalent and preserves the direct,
    fervent force of the verb.'
- source_word: Αββα ὁ πατήρ
  chosen: Abba! Father!
  alternatives:
  - Abba, Father
  - Father
  lexicon: BDAG
  rationale: '"Abba" is transliterated, following the principle to transliterate names/forms
    rather than flatten them, and "Father" translates the Greek apposition. The punctuation
    reflects the emotional force of the invocation.'
