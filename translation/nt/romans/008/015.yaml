theological_decisions:
- issue: Whether πνεῦμα υἱοθεσίας should be rendered as an impersonal "spirit" or
    explicitly as the Holy Spirit
  chosen_reading: Main text keeps "a spirit of adoption as sons" while translating
    ἐν ᾧ as "by whom," signaling the likely personal referent without fully collapsing
    the parallelism with "a spirit of slavery."
  alternative_readings:
  - '"the Spirit of adoption"'
  - '"a spirit of adoption ... in which we cry"'
  rationale: The context strongly points toward the Holy Spirit, especially with the
    following cry to the Father and the nearby discussion in Romans 8. But the syntax
    also preserves a deliberate parallel with "a spirit of slavery," so the main text
    avoids over-resolving the phrase while the footnote records the more explicit
    alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
