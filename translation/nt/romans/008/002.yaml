id: ROM.8.2
reference: Romans 8:2
source:
  edition: SBLGNT
  text: ὁ γὰρ νόμος τοῦ πνεύματος τῆς ζωῆς ἐν Χριστῷ Ἰησοῦ ἠλευθέρωσέν ⸀σε ἀπὸ τοῦ
    νόμου τῆς ἁμαρτίας καὶ τοῦ θανάτου.
translation:
  text: For the law of the Spirit of life in Messiah Jesus has set you free from the
    law of sin and death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “principle”: “the principle of the Spirit of life.”'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read “me” instead of “you.”
    reason: textual_variant
  - marker: c
    text: 'Traditional rendering: “in Christ Jesus.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  chosen: law
  alternatives:
  - principle
  - power
  lexicon: BDAG
  rationale: Rendered literally as “law” in both occurrences to preserve Paul’s repeated
    noun and the tension of his metaphor; “principle” is possible interpretively but
    narrows the semantic range too soon.
- source_word: πνεύματος
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized as a reference to the Holy Spirit in context; the genitive
    construction “of the Spirit of life” most naturally points to the Spirit as the
    giver/mediator of life.
- source_word: ζωῆς
  chosen: life
  lexicon: BDAG
  rationale: Straightforward rendering of the genitive, preserving the phrase “Spirit
    of life” without expansion.
- source_word: ἐν Χριστῷ Ἰησοῦ
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  lexicon: BDAG
  rationale: Translated Χριστῷ as the title “Messiah” per project doctrine; retained
    “in” rather than paraphrasing to preserve Paul’s union-with-Christ language.
- source_word: ἠλευθέρωσέν
  chosen: has set ... free
  alternatives:
  - freed
  - released
  lexicon: BDAG
  rationale: Rendered with present-result force in idiomatic English; “has set ...
    free” preserves the completed act with ongoing effect.
- source_word: σε
  chosen: you
  alternatives:
  - me
  lexicon: NA28/SBLGNT textual tradition
  rationale: Followed the printed text’s second-person singular reading σε; a first-person
    singular variant is well known and should be preserved in a footnote.
- source_word: ἁμαρτίας
  chosen: sin
  lexicon: BDAG
  rationale: Standard rendering; singular “sin” suits Paul’s usage as an enslaving
    power as well as the abstract reality.
- source_word: θανάτου
  chosen: death
  lexicon: BDAG
  rationale: Standard rendering; kept in coordination with “sin” as a compact genitival
    phrase, “sin and death.”
