theological_decisions:
- issue: Whether πνεύματος refers to the Holy Spirit or a human/spiritual principle
  chosen_reading: Holy Spirit (“Spirit” capitalized)
  alternative_readings:
  - human spirit
  - spiritual principle
  rationale: In Romans 8 the contrast between flesh, sin, death, and the life-giving
    divine Spirit strongly favors reference to the Holy Spirit rather than an impersonal
    principle alone.
