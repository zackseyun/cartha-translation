theological_decisions:
- issue: Rendering υἱοθεσίαν in a way that preserves Paul's sonship-and-inheritance
    imagery without excluding women from the referent
  chosen_reading: adoption as sons
  alternative_readings:
  - adoption
  rationale: The Greek term explicitly contains the sonship element. Following the
    doctrine's gender-accurate principle, the main text preserves that feature, while
    the context makes clear that all believers are included in this filial status.
  doctrine_reference: Gender-accurate over gender-neutral; preserve theological tension
    rather than resolve it.
- issue: Whether 'firstfruits of the Spirit' means a gift from the Spirit or the Spirit
    himself as firstfruits
  chosen_reading: the firstfruits of the Spirit
  alternative_readings:
  - the Spirit as firstfruits
  rationale: The Greek construction can be understood more than one way. The main
    text keeps the traditional and straightforward rendering while preserving the
    appositional possibility in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
