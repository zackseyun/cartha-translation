id: ROM.8.23
reference: Romans 8:23
source:
  edition: SBLGNT
  text: οὐ μόνον δέ, ἀλλὰ ⸂καὶ αὐτοὶ⸃ τὴν ἀπαρχὴν τοῦ πνεύματος ἔχοντες ⸂ἡμεῖς καὶ⸃
    αὐτοὶ ἐν ἑαυτοῖς στενάζομεν, υἱοθεσίαν ἀπεκδεχόμενοι τὴν ἀπολύτρωσιν τοῦ σώματος
    ἡμῶν.
translation:
  text: And not only that, but we ourselves also, who have the firstfruits of the
    Spirit, even we ourselves groan within ourselves, eagerly awaiting adoption as
    sons—the redemption of our bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “the Spirit as firstfruits.”
    reason: alternative_reading
  - marker: b
    text: Or simply, “adoption.” The Greek term more literally includes the sense
      of sonship.
    reason: lexical_alternative
  - marker: c
    text: 'Greek: “of our body,” with singular used distributively.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μόνον δέ, ἀλλὰ
  chosen: And not only that, but
  alternatives:
  - And not only
  - Not only so, but
  rationale: Carries Paul's contrast forward from the prior verse in natural English
    while preserving the emphatic adversative structure.
- source_word: καὶ αὐτοὶ / ἡμεῖς καὶ αὐτοὶ
  chosen: we ourselves also, even we ourselves
  alternatives:
  - we ourselves too
  - we ourselves
  rationale: Preserves the repeated emphatic αυτοί and the explicit ἡμεῖς, reflecting
    Paul's stress that believers too share in the groaning.
- source_word: τὴν ἀπαρχὴν τοῦ πνεύματος
  chosen: the firstfruits of the Spirit
  alternatives:
  - the firstfruit of the Spirit
  - the Spirit as firstfruits
  lexicon: BDAG
  rationale: ἀπαρχή commonly denotes firstfruits/first portion. The genitive τοῦ πνεύματος
    is left in a natural English form that preserves the ambiguity between source
    and appositional nuances.
- source_word: ἔχοντες
  chosen: who have
  alternatives:
  - having
  rationale: A relative clause is smoother in English than a bare participle here
    while preserving the participial sense.
- source_word: ἐν ἑαυτοῖς
  chosen: within ourselves
  alternatives:
  - in ourselves
  - inwardly
  lexicon: BDAG
  rationale: Expresses the inward location of the groaning clearly without over-paraphrasing.
- source_word: στενάζομεν
  chosen: groan
  alternatives:
  - groan deeply
  - sigh
  lexicon: BDAG
  rationale: Retains the verbal connection to creation's groaning in the surrounding
    context.
- source_word: υἱοθεσίαν
  chosen: adoption as sons
  alternatives:
  - adoption
  lexicon: BDAG
  rationale: This preserves the sonship nuance of the Greek term and follows the gender-accurate
    philosophy, since the legal-heir status conveyed by 'sons' is theologically significant
    in Paul's argument.
- source_word: ἀπεκδεχόμενοι
  chosen: eagerly awaiting
  alternatives:
  - waiting eagerly
  - eagerly waiting for
  lexicon: BDAG
  rationale: Conveys the intensified sense of expectant waiting in idiomatic English.
- source_word: τὴν ἀπολύτρωσιν
  chosen: the redemption
  alternatives:
  - release
  - deliverance
  lexicon: BDAG
  rationale: '''Redemption'' best preserves Paul''s theological vocabulary and its
    eschatological weight.'
- source_word: τοῦ σώματος ἡμῶν
  chosen: of our bodies
  alternatives:
  - of our body
  lexicon: BDAG
  rationale: Although σώματος is singular in Greek, English normally uses the distributive
    plural here. This preserves the sense clearly and naturally for modern readers.
