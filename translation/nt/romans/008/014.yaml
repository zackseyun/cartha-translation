id: ROM.8.14
reference: Romans 8:14
source:
  edition: SBLGNT
  text: ὅσοι γὰρ πνεύματι θεοῦ ἄγονται, οὗτοι ⸂υἱοί εἰσιν θεοῦ⸃.
translation:
  text: For all who are led by the Spirit of God, these are sons of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of God.' 'Sons' preserves the Greek wording and the adoption/inheritance
      nuance in the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - as many as
  - those who
  lexicon: BDAG
  rationale: Idiomatic English for the plural correlative construction, preserving
    the universal class sense without wooden wording.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this statement to the preceding
    argument.
- source_word: πνεύματι θεοῦ
  chosen: by the Spirit of God
  alternatives:
  - by God's Spirit
  - in the Spirit of God
  lexicon: BDAG
  rationale: The dative is best rendered instrumentally here with ἄγονται ('are led').
    'Spirit of God' preserves the genitival wording and Pauline diction.
- source_word: ἄγονται
  chosen: are led
  alternatives:
  - are being led
  - are guided
  lexicon: BDAG
  rationale: Present passive indicative. 'Are led' is natural English and preserves
    the ongoing passive sense without overtranslating the aspect.
- source_word: οὗτοι
  chosen: these are
  alternatives:
  - these ones are
  - they are
  lexicon: BDAG
  rationale: Keeps the demonstrative emphasis of the Greek while remaining idiomatic.
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  - sons and daughters
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural. Per the project's gender-accurate
    policy, 'sons' is retained in the main text; in Paul's adoption context it can
    carry inheritance/sonship nuance that 'children' alone may flatten.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  - God's
  lexicon: BDAG
  rationale: A direct and transparent rendering of the genitive in both occurrences,
    preserving the repeated phraseology of the verse.
