theological_decisions:
- issue: Whether υἱοί θεοῦ should be rendered 'sons of God' or with a more inclusive
    English expression.
  chosen_reading: sons of God
  alternative_readings:
  - children of God
  - sons and daughters of God
  rationale: The source text uses the masculine plural υἱοί, and the doctrine excerpt
    directs gender-accurate rendering over gender-neutral smoothing. In Romans 8,
    sonship language is also connected with adoption and inheritance, so retaining
    'sons' preserves Paul's wording and theological texture while an inclusive explanation
    can be supplied in a footnote.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
