theological_decisions:
- issue: Whether πνεῦμα here refers to the Holy Spirit or the human spirit
  chosen_reading: the Spirit
  alternative_readings:
  - the spirit
  rationale: In Romans 8, Paul's flesh/Spirit contrast is best read as contrast between
    life oriented to the fallen flesh and life oriented to God's Spirit. Capitalization
    reflects that contextual judgment while preserving the lexical form 'Spirit.'
