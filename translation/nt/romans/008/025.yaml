theological_decisions:
- issue: Nuance of Christian hope in relation to unseen future fulfillment
  chosen_reading: Rendered the verse in terms of ongoing hope and waiting without
    specifying the object beyond the Greek relative clause.
  alternative_readings:
  - Expanded the object as salvation, redemption, or resurrection from context
  rationale: Paul’s immediate context informs the referent, but this verse itself
    leaves it expressed as “what we do not see.” The translation preserves that textual
    restraint rather than importing a fuller doctrinal specification into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
