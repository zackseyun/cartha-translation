id: ROM.8.25
reference: Romans 8:25
source:
  edition: SBLGNT
  text: εἰ δὲ ὃ οὐ βλέπομεν ἐλπίζομεν, δι’ ὑπομονῆς ἀπεκδεχόμεθα.
translation:
  text: But if we hope for what we do not see, we wait for it with patient endurance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with perseverance.”
    reason: lexical_alternative
  - marker: b
    text: The verb can also mean “await eagerly.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - Now if
  - And if
  lexicon: BDAG
  rationale: Retains the conditional force of εἰ and the mildly contrastive/continuing
    force of δέ. “But if” best fits the flow from the previous verse in natural English.
- source_word: ὃ οὐ βλέπομεν
  chosen: what we do not see
  alternatives:
  - that which we do not see
  - what we cannot see
  lexicon: BDAG
  rationale: The neuter relative ὃ is best rendered idiomatically as “what.” “Do not
    see” preserves the present tense and straightforward sense of βλέπομεν without
    adding interpretive nuance.
- source_word: ἐλπίζομεν
  chosen: we hope for
  alternatives:
  - we hope
  - we set our hope on
  lexicon: BDAG
  rationale: English idiom normally requires “hope for” with this object. This keeps
    the present active sense and matches the future-oriented expectation in context.
- source_word: δι’ ὑπομονῆς
  chosen: with patient endurance
  alternatives:
  - with patience
  - through perseverance
  - with perseverance
  lexicon: BDAG
  rationale: ὑπομονή is richer than mere passive patience; it includes steadfast endurance
    under delay or difficulty. “Patient endurance” preserves both readability and
    lexical weight.
- source_word: ἀπεκδεχόμεθα
  chosen: we wait for it
  alternatives:
  - we eagerly wait for it
  - we await it
  lexicon: BDAG
  rationale: The verb denotes awaiting with expectation, but in English “eagerly wait”
    can sound awkward alongside “patient endurance.” “Wait for it” is clear and natural,
    while the expectancy nuance is noted in the alternative.
