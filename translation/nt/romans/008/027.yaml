theological_decisions:
- issue: Whether to make κατὰ θεὸν explicit as "according to God's will"
  chosen_reading: Retained the more literal "according to God" in the main text.
  alternative_readings:
  - according to God's will
  - in accordance with God's will
  rationale: The sense likely involves conformity to God's will, but the Greek text
    does not state "will" explicitly. Preserving the more compact expression maintains
    the text's wording and theological restraint.
  doctrine_reference: Preserve theological tension rather than resolve it.
