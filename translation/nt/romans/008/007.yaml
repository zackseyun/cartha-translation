id: ROM.8.7
reference: Romans 8:7
source:
  edition: SBLGNT
  text: διότι τὸ φρόνημα τῆς σαρκὸς ἔχθρα εἰς θεόν, τῷ γὰρ νόμῳ τοῦ θεοῦ οὐχ ὑποτάσσεται,
    οὐδὲ γὰρ δύναται·
translation:
  text: because the mindset of the flesh is hostility toward God, for it does not
    submit to the law of God, for it is not even able.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mindset of the sinful nature.'
    reason: lexical_alternative
  - marker: b
    text: Or 'enmity against God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground for the previous statement; 'because' is natural
    modern English and preserves the causal force.
- source_word: φρόνημα
  chosen: mindset
  alternatives:
  - mind
  - way of thinking
  - mind-set
  lexicon: BDAG
  rationale: Refers not merely to the intellect but to the set, orientation, or disposition
    of the mind. 'Mindset' best captures this dispositional sense in readable English.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: This is a metaphorical Pauline use referring to fallen human nature in
    rebellion against God. Per doctrine, 'flesh' remains the default main-text rendering,
    while the interpretive alternative 'sinful nature' is preserved in a footnote.
- source_word: ἔχθρα
  chosen: hostility
  alternatives:
  - enmity
  lexicon: BDAG
  rationale: The noun denotes active opposition or hostility. 'Hostility' is clearer
    in contemporary English, while preserving the relational antagonism toward God.
- source_word: εἰς θεόν
  chosen: toward God
  alternatives:
  - against God
  lexicon: BDAG
  rationale: The preposition here marks direction of hostility. 'Toward God' is slightly
    more literal, while naturally conveying that the hostility is directed at God.
- source_word: ὑποτάσσεται
  chosen: does not submit
  alternatives:
  - is not subject
  - does not subject itself
  lexicon: BDAG
  rationale: The present passive/middle conveys being in subjection. 'Does not submit'
    is idiomatic and preserves the refusal of subordination to God's law.
- source_word: νόμῳ τοῦ θεοῦ
  chosen: the law of God
  alternatives:
  - God's law
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'The law of God' preserves
    the formal weight and parallelism of the Greek.
- source_word: οὐδὲ γὰρ δύναται
  chosen: for it is not even able
  alternatives:
  - indeed it cannot
  - for it cannot
  lexicon: BDAG
  rationale: The clause intensifies the previous statement, expressing inability,
    not mere unwillingness. 'Not even able' preserves the emphatic sense of οὐδέ while
    remaining transparent English.
