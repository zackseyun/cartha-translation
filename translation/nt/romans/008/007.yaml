theological_decisions:
- issue: Whether to render σάρξ interpretively as 'sinful nature' or more formally
    as 'flesh'
  chosen_reading: Render σάρξ as 'flesh' in the main text, with the interpretive alternative
    preserved in a footnote.
  alternative_readings:
  - sinful nature
  rationale: The context is clearly metaphorical and refers to fallen human orientation
    rather than literal corporeality, but the project's doctrine prefers preserving
    the source term 'flesh' in the main text where possible and documenting the interpretive
    alternative.
  doctrine_reference: 'Contested terms table: σάρξ = ''flesh'' (literal) / ''sinful
    nature'' (metaphorical), context-dependent; per-verse documented.'
- issue: Whether the final clause should be softened to inability plus unwillingness
    or left as a plain statement of inability
  chosen_reading: 'Translate as a plain statement of inability: ''it is not even able.'''
  alternative_readings:
  - it will not submit
  - it cannot submit
  rationale: δύναται directly expresses ability. The text states incapacity in relation
    to submission to God's law; the translation should preserve that theological tension
    without importing a fuller doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it.
