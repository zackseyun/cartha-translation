id: ROM.8.35
reference: Romans 8:35
source:
  edition: SBLGNT
  text: τίς ἡμᾶς χωρίσει ἀπὸ τῆς ἀγάπης τοῦ Χριστοῦ; θλῖψις ἢ στενοχωρία ἢ διωγμὸς
    ἢ λιμὸς ἢ γυμνότης ἢ κίνδυνος ἢ μάχαιρα;
translation:
  text: Who will separate us from the Messiah’s love? Will trouble or distress or
    persecution or famine or nakedness or danger or sword?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “from our love for the Messiah.” The Greek genitive could be read that
      way, though the context favors “the Messiah’s love.”
    reason: alternative_reading
lexical_decisions:
- source_word: τίς
  chosen: Who
  alternatives:
  - What person
  - Who is it that
  lexicon: BDAG
  rationale: An interrogative personal pronoun is most naturally rendered as “Who”
    here, preserving Paul’s rhetorical question.
- source_word: χωρίσει
  chosen: will separate
  alternatives:
  - will divide
  - will sever
  lexicon: BDAG
  rationale: The future active verb indicates a future-or-potential act of separation.
    “Will separate” is the most direct and idiomatic rendering.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: This follows the project’s default rendering of ἀγάπη as “love.”
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah’s
  alternatives:
  - Christ’s
  - the Messiah
  lexicon: BDAG
  rationale: 'Χριστός is a title here, so the project default favors “Messiah” rather
    than “Christ.” The genitive is rendered possessively in English for natural style:
    “the Messiah’s love.”'
- source_word: θλῖψις
  chosen: trouble
  alternatives:
  - affliction
  - tribulation
  lexicon: BDAG
  rationale: “Trouble” is clear modern English and suitably broad, fitting the project’s
    readable but serious style.
- source_word: στενοχωρία
  chosen: distress
  alternatives:
  - anguish
  - hardship
  lexicon: BDAG
  rationale: “Distress” captures the sense of constriction and pressure without becoming
    overly technical.
- source_word: διωγμός
  chosen: persecution
  lexicon: BDAG
  rationale: This is the standard and precise rendering in this context.
- source_word: λιμός
  chosen: famine
  alternatives:
  - hunger
  lexicon: BDAG
  rationale: “Famine” better matches the noun’s usual sense of severe lack of food
    rather than mere personal appetite.
- source_word: γυμνότης
  chosen: nakedness
  alternatives:
  - lack of clothing
  - destitution
  lexicon: BDAG
  rationale: “Nakedness” is the most direct lexical equivalent and preserves the traditional
    biblical force, while still understandable in modern English.
- source_word: κίνδυνος
  chosen: danger
  alternatives:
  - peril
  lexicon: BDAG
  rationale: “Danger” is natural contemporary English; “peril” is accurate but more
    archaic.
- source_word: μάχαιρα
  chosen: sword
  alternatives:
  - violent death
  lexicon: BDAG
  rationale: “Sword” is the literal rendering and preserves both the image and the
    threat of lethal violence.
