theological_decisions:
- issue: Genitive force in τοῦ Χριστοῦ
  chosen_reading: the Messiah’s love
  alternative_readings:
  - love for the Messiah
  rationale: The Greek genitive can in principle be read subjectively or objectively.
    In Romans 8:31–39, the broader context strongly favors the Messiah’s love for
    believers, so that reading is adopted in the main text while the alternative is
    preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
