theological_decisions:
- issue: Whether ἀρχαὶ and δυνάμεις should be rendered as technical names for spiritual
    beings
  chosen_reading: Used the broader renderings 'rulers' and 'powers' in the main text
  alternative_readings:
  - principalities and powers
  - rulers and authorities
  rationale: The verse likely includes cosmic or spiritual powers, but the Greek terms
    themselves can remain broad. The main text preserves that breadth rather than
    narrowing the reference to a specific theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
