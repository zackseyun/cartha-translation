theological_decisions:
- issue: Whether προέγνω should be rendered in a way that resolves the foreknowledge/predestination
    debate.
  chosen_reading: Rendered as 'foreknew' without embedding a specific doctrinal interpretation.
  alternative_readings:
  - '''knew beforehand'' in a more general cognitive sense'
  - '''set his covenantal love on beforehand'' as a relational-election paraphrase'
  rationale: The translation preserves the lexical wording of the Greek and does not
    import a denominationally specific explanation where the text itself does not
    explicitly define the mechanism of foreknowledge.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ἀδελφοῖς should be made gender-neutral in the main text.
  chosen_reading: Retained 'brothers' in the main text with an inclusive footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine plural and should be represented
    accordingly in the main text under the project's gender-accurate policy, while
    the likely mixed-gender reference is acknowledged in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
