id: ROM.8.29
reference: Romans 8:29
source:
  edition: SBLGNT
  text: ὅτι οὓς προέγνω, καὶ προώρισεν συμμόρφους τῆς εἰκόνος τοῦ υἱοῦ αὐτοῦ, εἰς
    τὸ εἶναι αὐτὸν πρωτότοκον ἐν πολλοῖς ἀδελφοῖς·
translation:
  text: For those whom he foreknew, he also predestined to be conformed to the image
    of his Son, so that he might be the firstborn among many brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “knew beforehand”; some understand “foreknew” here in a relational sense,
      that is, “set his regard on beforehand.”
    reason: alternative_reading
  - marker: b
    text: “Brothers” is grammatically masculine; the referent may include both men
      and women in God’s family.
    reason: cultural_note
lexical_decisions:
- source_word: προέγνω
  chosen: foreknew
  alternatives:
  - knew beforehand
  - set his regard on beforehand
  lexicon: BDAG
  rationale: The verb literally means 'knew beforehand.' 'Foreknew' preserves the
    Greek form and Pauline theological density without forcing a narrower interpretive
    paraphrase such as relational choice alone.
- source_word: προώρισεν
  chosen: predestined
  alternatives:
  - determined beforehand
  - appointed beforehand
  lexicon: BDAG
  rationale: '''Predestined'' is the standard and most precise English rendering for
    προορίζω here, matching the temporal prefix and purposive force of the verb.'
- source_word: συμμόρφους
  chosen: to be conformed
  alternatives:
  - to be made like
  - conformed
  lexicon: BDAG
  rationale: Paired with the accusative object and the following genitive phrase,
    the sense is likeness in form. 'To be conformed' reads naturally in English while
    preserving the transformational nuance.
- source_word: εἰκόνος
  chosen: image
  alternatives:
  - likeness
  lexicon: BDAG
  rationale: '''Image'' is the normal rendering and carries important biblical resonance,
    especially in creation and Christological contexts.'
- source_word: υἱοῦ
  chosen: Son
  alternatives: []
  lexicon: BDAG
  rationale: The filial title is explicit and christologically significant; it should
    be preserved directly.
- source_word: εἰς τὸ εἶναι
  chosen: so that he might be
  alternatives:
  - for him to be
  - with the result that he would be
  lexicon: BDAG
  rationale: This preposition + articular infinitive expresses purpose/result. 'So
    that he might be' captures the intended telic sense in smooth English.
- source_word: πρωτότοκον
  chosen: firstborn
  alternatives:
  - preeminent one
  lexicon: BDAG
  rationale: '''Firstborn'' is the established lexical sense and should be retained,
    especially because of its biblical-theological importance. The implied primacy
    is preserved without replacing the metaphor.'
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the project's gender-accurate philosophy, the grammatically masculine
    plural is retained as 'brothers.' Because the referent is likely mixed, the inclusive
    sense is noted in a footnote rather than flattened in the main text.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: At the head of the clause, ὅτι introduces the explanatory basis for the
    prior statement. 'For' is concise and natural in English.
