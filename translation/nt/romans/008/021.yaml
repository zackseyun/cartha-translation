id: ROM.8.21
reference: Romans 8:21
source:
  edition: SBLGNT
  text: ὅτι καὶ αὐτὴ ἡ κτίσις ἐλευθερωθήσεται ἀπὸ τῆς δουλείας τῆς φθορᾶς εἰς τὴν
    ἐλευθερίαν τῆς δόξης τῶν τέκνων τοῦ θεοῦ.
translation:
  text: because creation itself also will be set free from slavery to decay into the
    glorious freedom of the children of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “into the freedom of the glory of the children of God.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι is best taken causally, explaining the basis of the preceding
    hope rather than merely introducing content.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: Placed with αὐτὴ, it adds emphasis that creation too shares in the coming
    liberation. 'Also' is natural English while preserving the additive force.
- source_word: αὐτὴ ἡ κτίσις
  chosen: creation itself
  alternatives:
  - the creation itself
  - the created order itself
  lexicon: BDAG
  rationale: The pronoun adds emphasis, so 'itself' is retained. κτίσις in this context
    refers to creation as a whole, not an individual creature.
- source_word: ἐλευθερωθήσεται
  chosen: will be set free
  alternatives:
  - will be freed
  - will be liberated
  lexicon: BDAG
  rationale: The future passive indicates a coming act of liberation done to creation.
    'Set free' is clear, natural, and preserves the passive sense.
- source_word: ἀπὸ τῆς δουλείας
  chosen: from slavery
  alternatives:
  - from bondage
  - from enslavement
  lexicon: BDAG
  rationale: δουλεία denotes a condition of bondage or slavery. 'Slavery' preserves
    the strength of the metaphor better than the softer 'bondage,' while still reading
    naturally in English.
- source_word: τῆς φθορᾶς
  chosen: to decay
  alternatives:
  - of corruption
  - to corruption
  lexicon: BDAG
  rationale: In the context of the created order, φθορά most naturally denotes decay
    or perishability rather than primarily moral corruption. 'Slavery to decay' is
    idiomatic and contextually precise.
- source_word: εἰς τὴν ἐλευθερίαν
  chosen: into the ... freedom
  alternatives:
  - into freedom
  - for freedom
  lexicon: BDAG
  rationale: εἰς marks movement into a new state. Retaining 'into' preserves the transition
    from one realm to another.
- source_word: τῆς δόξης
  chosen: glorious
  alternatives:
  - of glory
  - belonging to glory
  lexicon: BDAG
  rationale: Rendering the genitive adjectivally as 'glorious' produces clear English
    while preserving the sense that this freedom is characterized by glory. A more
    literal form is preserved in a footnote.
- source_word: τῶν τέκνων τοῦ θεοῦ
  chosen: of the children of God
  alternatives:
  - of God's children
  lexicon: BDAG
  rationale: τέκνων means 'children,' not specifically 'sons,' so the familial and
    inclusive sense should be retained. 'Children of God' is also a familiar biblical
    expression in English.
