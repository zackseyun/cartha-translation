theological_decisions:
- issue: How to render the genitive chain τὴν ἐλευθερίαν τῆς δόξης τῶν τέκνων τοῦ
    θεοῦ
  chosen_reading: the glorious freedom of the children of God
  alternative_readings:
  - the freedom of the glory of the children of God
  rationale: The more literal sequence is somewhat awkward in English. Rendering δόξης
    adjectivally preserves the idea that the freedom believers receive is glory-marked
    or glory-filled, without importing extra doctrinal meaning.
  doctrine_reference: Preserve theological tension rather than resolve it.
