theological_decisions:
- issue: Whether κτίσις should be rendered as 'creation' or 'creature/created thing.'
  chosen_reading: creation
  alternative_readings:
  - every creature
  - all created things
  rationale: In Romans 8:19–23 Paul speaks in cosmic, personified terms about the
    non-human created order subjected to futility and awaiting liberation. 'Creation'
    best preserves that broader scope without narrowing the sense to individual creatures.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
