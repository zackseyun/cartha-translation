theological_decisions:
- issue: Whether εἴπερ συμπάσχομεν presents suffering as a meritorious condition or
    as the expected pattern of union with the Messiah
  chosen_reading: Rendered as a real condition ('if indeed we suffer with him') without
    importing the idea that suffering earns glorification.
  alternative_readings:
  - Rendered more weakly as 'since we suffer with him'
  - Interpreted as implying meritorious suffering
  rationale: The Greek retains genuine conditional force, but in context Paul describes
    participation with the Messiah, not a works-based basis for inheritance.
  doctrine_reference: Preserve theological tension rather than resolve it.
