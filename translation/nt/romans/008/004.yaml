theological_decisions:
- issue: Whether πνεῦμα refers to the human spirit or the Holy Spirit
  chosen_reading: the Spirit
  alternative_readings:
  - the spirit
  rationale: The immediate context in Romans 8 strongly emphasizes the Holy Spirit's
    agency and realm, so 'Spirit' best fits the discourse, though the Greek form itself
    could be read more generally in isolation.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contested ambiguity.
- issue: Whether ἐν ἡμῖν implies fulfillment by us or in us
  chosen_reading: fulfilled in us
  alternative_readings:
  - fulfilled by us
  - fulfilled among us
  rationale: The preposition ἐν is best kept as 'in,' which avoids overstating human
    agency while still allowing the transformative sense Paul likely intends in context.
  doctrine_reference: Do not import doctrinal claims the text does not make.
