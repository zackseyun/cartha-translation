theological_decisions:
- issue: Rendering ἐκλεκτῶν in a way that does not over-import later doctrinal systems
  chosen_reading: chosen ones
  alternative_readings:
  - elect
  rationale: The Greek plainly refers to those chosen by God, but the translation
    should not rely on a more technical English theological label when a transparent
    equivalent is available. 'Chosen ones' preserves the text's meaning without flattening
    or denying its theological weight.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Expressing the emphatic clause θεὸς ὁ δικαιῶν
  chosen_reading: It is God who justifies
  alternative_readings:
  - God is the one who justifies
  - God—the one who justifies
  rationale: 'The Greek is elliptical but emphatic. This rendering communicates Paul''s
    point clearly: no accusation can stand because God himself is the justifying judge.'
  doctrine_reference: Optimal equivalence; original-language primacy over translation
    tradition.
