id: ROM.8.33
reference: Romans 8:33
source:
  edition: SBLGNT
  text: τίς ἐγκαλέσει κατὰ ἐκλεκτῶν θεοῦ; θεὸς ὁ δικαιῶν·
translation:
  text: Who will bring a charge against God's chosen ones? It is God who justifies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "God''s elect."'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "Who will accuse God''s chosen ones?"'
    reason: lexical_alternative
  - marker: c
    text: 'The clause "It is God who justifies" carries a forensic sense: God is the
      one who declares righteous.'
    reason: cultural_note
lexical_decisions:
- source_word: τίς
  chosen: Who
  alternatives:
  - Who is it that
  - Who could
  lexicon: BDAG
  rationale: An interrogative pronoun introducing a rhetorical question. 'Who' is
    the most direct and natural English equivalent.
- source_word: ἐγκαλέσει
  chosen: will bring a charge
  alternatives:
  - will accuse
  - will bring an accusation
  lexicon: BDAG
  rationale: The verb has a legal/forensic sense of bringing a charge or accusation.
    'Bring a charge' preserves the courtroom tone more clearly than the simpler 'accuse'.
- source_word: κατὰ
  chosen: against
  alternatives:
  - concerning
  - in opposition to
  lexicon: BDAG
  rationale: With a verb of accusation and a genitive object, κατά is naturally rendered
    'against' in English legal idiom.
- source_word: ἐκλεκτῶν
  chosen: chosen ones
  alternatives:
  - elect
  - chosen people
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Chosen ones' preserves the sense
    while using accessible modern English; 'elect' remains a viable more traditional
    alternative.
- source_word: θεοῦ
  chosen: God's
  alternatives:
  - of God
  lexicon: BDAG
  rationale: 'The genitive is rendered idiomatically as an English possessive: ''God''s
    chosen ones.'''
- source_word: θεὸς
  chosen: It is God
  alternatives:
  - God
  - God is the one
  lexicon: BDAG
  rationale: The nominative subject is set forward for emphasis. 'It is God' captures
    the emphatic force in natural English.
- source_word: ὁ δικαιῶν
  chosen: who justifies
  alternatives:
  - the one justifying
  - who declares righteous
  lexicon: BDAG
  rationale: The present participle is substantival/appositional and identifies God
    as the justifying one. 'Who justifies' is concise and natural, while retaining
    the forensic Pauline sense.
