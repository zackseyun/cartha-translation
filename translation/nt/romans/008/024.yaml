id: ROM.8.24
reference: Romans 8:24
source:
  edition: SBLGNT
  text: τῇ γὰρ ἐλπίδι ἐσώθημεν· ἐλπὶς δὲ βλεπομένη οὐκ ἔστιν ἐλπίς, ὃ γὰρ βλέπει ⸀τίς
    ἐλπίζει;
translation:
  text: For in hope we were saved. But hope that is seen is not hope, for who hopes
    for what he sees?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "by hope we were saved."
    reason: alternative_reading
  - marker: b
    text: That is, hope concerns what is not yet seen.
    reason: cross_reference
lexical_decisions:
- source_word: τῇ ἐλπίδι
  chosen: in hope
  alternatives:
  - by hope
  - with hope
  lexicon: BDAG
  rationale: 'The dative is best taken as expressing sphere or manner here: salvation
    is possessed in the mode of hope, not yet in sight. "In hope" preserves Paul’s
    eschatological tension better than the more instrumental-sounding "by hope."'
- source_word: ἐσώθημεν
  chosen: we were saved
  alternatives:
  - we have been saved
  lexicon: BDAG
  rationale: The aorist passive is rendered with simple past to reflect the Greek
    tense-form without importing an English perfect nuance not explicit in the form.
    The passive is preserved rather than paraphrased.
- source_word: ἐλπὶς ... βλεπομένη
  chosen: hope that is seen
  alternatives:
  - seen hope
  - hope being seen
  lexicon: BDAG
  rationale: The participle is rendered as a natural English relative clause. This
    keeps the predicate clear while preserving the contrast between hope and sight.
- source_word: οὐκ ἔστιν ἐλπίς
  chosen: is not hope
  alternatives:
  - is no hope
  lexicon: BDAG
  rationale: This preserves the qualitative force of the Greek predicate and reads
    naturally in modern English.
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: The neuter relative pronoun refers to a thing seen, so idiomatic English
    "what" best matches the sense.
- source_word: βλέπει
  chosen: he sees
  alternatives:
  - one sees
  - someone sees
  lexicon: BDAG
  rationale: The singular verb with τίς is rendered with generic "he" for natural
    English while remaining source-close; the statement is generic rather than specifically
    male.
- source_word: τίς ἐλπίζει
  chosen: who hopes
  alternatives:
  - who keeps hoping
  lexicon: BDAG
  rationale: The present tense is rendered simply and proverbially in English. A progressive
    form would over-specify aspect here.
