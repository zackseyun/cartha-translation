theological_decisions:
- issue: Relation of salvation to hope in τῇ ἐλπίδι ἐσώθημεν
  chosen_reading: The main text renders the dative as "in hope," preserving Paul’s
    tension that salvation is real yet awaits visible consummation.
  alternative_readings:
  - '"by hope we were saved" as a more instrumental rendering of the dative'
  rationale: This verse sits in an already/not-yet context. "In hope" better preserves
    that salvation is presently possessed but future in full manifestation, without
    making hope the efficient cause of salvation.
  doctrine_reference: Preserve theological tension rather than resolve it
