theological_decisions:
- issue: Rendering σάρξ in a contested Pauline context
  chosen_reading: in the flesh
  alternative_readings:
  - in the sinful nature
  - under the domination of the flesh
  rationale: Because the doctrine guidance calls for preserving theological tension
    rather than resolving it, the translation retains the traditional but textually
    grounded term 'flesh' in the main text. A more interpretive alternative is preserved
    in a footnote rather than imported into the verse itself.
  doctrine_reference: 'Contested terms table: σάρξ → flesh (literal) / sinful nature
    (metaphorical), context-dependent'
