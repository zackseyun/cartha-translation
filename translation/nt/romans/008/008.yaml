id: ROM.8.8
reference: Romans 8:8
source:
  edition: SBLGNT
  text: οἱ δὲ ἐν σαρκὶ ὄντες θεῷ ἀρέσαι οὐ δύνανται.
translation:
  text: Those who are in the flesh cannot please God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''in the sinful nature.'' The Greek says ''in the flesh,'' a key Pauline
      term in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... ὄντες
  chosen: Those who are
  alternatives:
  - the ones who are
  - those being
  lexicon: BDAG
  entry: εἰμί
  rationale: The article with participle functions substantivally, referring to a
    class of people. 'Those who are' is natural English and preserves the present-state
    force.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  entry: δέ
  rationale: The connective marks continuation/contrast with the previous context,
    but English reads best without an explicit conjunction here. The contrast is still
    conveyed by the clause itself and immediate context.
- source_word: ἐν σαρκὶ
  chosen: in the flesh
  alternatives:
  - in the sinful nature
  - under the power of the flesh
  lexicon: BDAG
  entry: σάρξ
  rationale: In Romans 8, σάρξ is a theologically weighty Pauline term. Although metaphorical
    here, the main text keeps 'flesh' to preserve Paul's wording and the chapter's
    conceptual linkage, rather than resolving it into an interpretive paraphrase.
- source_word: ἀρέσαι
  chosen: please
  alternatives:
  - be pleasing to
  lexicon: BDAG
  entry: ἀρέσκω
  rationale: 'The aorist infinitive after δύνανται expresses ability: ''cannot please.''
    This is the clearest natural English equivalent.'
- source_word: θεῷ
  chosen: God
  alternatives:
  - to God
  lexicon: BDAG
  entry: θεός
  rationale: English idiom requires the object directly with 'please God,' though
    the dative sense is preserved semantically.
- source_word: οὐ δύνανται
  chosen: cannot
  alternatives:
  - are not able to
  - are unable to
  lexicon: BDAG
  entry: δύναμαι
  rationale: '''Cannot'' is the most concise and natural rendering of negated ability
    in modern English without loss of meaning.'
