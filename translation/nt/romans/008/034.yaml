theological_decisions:
- issue: Rendering Χριστός in a Christological title context
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The verse uses Χριστός as a meaningful title within Paul's salvation
    argument, so the translation preserves that sense per the doctrine's contested-terms
    guidance rather than defaulting to inherited English tradition.
  doctrine_reference: 'DOCTRINE.md: ''Χριστός Christos → Messiah (where title; Christ
    where name-like)'''
- issue: Voice of ἐγερθείς
  chosen_reading: who was raised
  alternative_readings:
  - who rose
  rationale: The passive is retained to reflect the Greek wording and to avoid smoothing
    over the text's presentation of resurrection as an act done to Christ.
