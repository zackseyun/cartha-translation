id: ROM.8.34
reference: Romans 8:34
source:
  edition: SBLGNT
  text: τίς ὁ ⸀κατακρινῶν; ⸀Χριστὸς ὁ ἀποθανών, μᾶλλον ⸀δὲ ⸀ἐγερθείς, ὅς ⸀καί ἐστιν
    ἐν δεξιᾷ τοῦ θεοῦ, ὃς καὶ ἐντυγχάνει ὑπὲρ ἡμῶν·
translation:
  text: Who is the one condemning? The Messiah is the one who died—more than that,
    who was raised—who is also at the right hand of God, who also intercedes for us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “who rose.” The Greek verb is passive: “who was raised.”'
    reason: alternative_reading
  - marker: c
    text: “At the right hand of God” is a biblical expression for the place of highest
      honor and authority.
    reason: cultural_note
  - marker: d
    text: Or “intercedes on our behalf.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακρινῶν
  chosen: the one condemning
  alternatives:
  - the one who condemns
  - the one bringing condemnation
  lexicon: BDAG
  rationale: The articular present participle is rendered as a substantival expression.
    'The one condemning' preserves the rhetorical force and ongoing verbal idea without
    over-paraphrasing.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title here, so 'Messiah' follows the project's default for
    Χριστός where the titular sense is active rather than functioning merely as a
    name.
- source_word: ἀποθανών
  chosen: who died
  alternatives:
  - the one who died
  lexicon: BDAG
  rationale: The aorist participle is best rendered with a simple past relative clause
    in natural English while preserving the historical act.
- source_word: μᾶλλον δὲ
  chosen: more than that
  alternatives:
  - rather
  - indeed rather
  lexicon: BDAG
  rationale: This idiom intensifies and corrects upward from Christ's death to his
    resurrection. 'More than that' is idiomatic modern English and preserves the escalation.
- source_word: ἐγερθείς
  chosen: who was raised
  alternatives:
  - who has been raised
  - who rose
  lexicon: BDAG
  rationale: The passive form is preserved as 'was raised,' matching the Greek voice
    and avoiding importing an interpretive shift to the active 'rose.'
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - at God's right hand
  lexicon: BDAG
  rationale: This is a conventional biblical expression for exalted position and authority.
    The familiar wording is clear and faithful to the prepositional phrase.
- source_word: ἐντυγχάνει
  chosen: intercedes
  alternatives:
  - pleads
  - appeals
  lexicon: BDAG
  rationale: '''Intercedes'' best captures the sense of active representation before
    God in this context and preserves the theological weight without unnecessary jargon.'
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  lexicon: BDAG
  rationale: '''For us'' is the most natural rendering in context, while still conveying
    representative benefit; the fuller sense is noted by the alternative.'
