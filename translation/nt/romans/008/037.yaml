theological_decisions:
- issue: Identity of 'the one who loved us'
  chosen_reading: Rendered generically as 'the one who loved us' without specifying
    Christ in the main text.
  alternative_readings:
  - understood contextually as Christ
  - understood more broadly as God in Christ
  rationale: The immediate context strongly points to Christ, especially in Romans
    8:35 and 8:39, but the Greek expression itself is not expanded with an explicit
    name in this verse. The translation preserves the text's wording rather than importing
    the referent into the main line.
