theological_decisions:
- issue: Whether σάρξ should be rendered interpretively in this Pauline contrast
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: To preserve theological tension and Paul’s own vocabulary, the main text
    keeps “flesh” rather than resolving it fully into an interpretive gloss. Because
    the context is metaphorical rather than merely physical, the alternative “sinful
    nature” is preserved in a footnote.
  doctrine_reference: 'Contested terms table: σάρξ = flesh (literal) / sinful nature
    (metaphorical)'
