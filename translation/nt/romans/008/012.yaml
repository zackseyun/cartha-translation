id: ROM.8.12
reference: Romans 8:12
source:
  edition: SBLGNT
  text: Ἄρα οὖν, ἀδελφοί, ὀφειλέται ἐσμέν, οὐ τῇ σαρκὶ τοῦ κατὰ σάρκα ζῆν,
translation:
  text: So then, brothers, we are under obligation—not to the flesh, to live according
    to the flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “brothers and sisters”; the Greek has “brothers” as a form of address
      to the believing community.
    reason: lexical_alternative
  - marker: b
    text: “Flesh” here refers to fallen human nature; alternatively, “sinful nature.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρα οὖν
  chosen: So then
  alternatives:
  - Therefore
  - Consequently, then
  lexicon: BDAG
  rationale: The paired inferential particles mark a conclusion from the preceding
    argument. “So then” preserves the transitional and inferential force in natural
    modern English.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and follows the project’s
    gender-accurate policy. “Brothers” preserves the form of address; an inclusive
    sense can be noted in a footnote because Paul addresses the whole believing community.
- source_word: ὀφειλέται ἐσμέν
  chosen: we are under obligation
  alternatives:
  - we are debtors
  - we are obligated
  lexicon: BDAG
  rationale: ὀφειλέται is literally “debtors,” but here it expresses moral obligation
    rather than financial debt. “Under obligation” communicates the idiomatic sense
    clearly in contemporary English while preserving the metaphorical force.
- source_word: σάρξ / σαρκί
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: In Romans 8, σάρξ carries Paul's theological contrast between flesh and
    Spirit. The project default favors “flesh” where possible to preserve Paul’s terminology,
    while recognizing the metaphorical sense of fallen human nature. The interpretive
    alternative is preserved in a footnote.
- source_word: τοῦ κατὰ σάρκα ζῆν
  chosen: to live according to the flesh
  alternatives:
  - to live in accordance with the flesh
  - to live as the flesh dictates
  lexicon: BDAG
  rationale: 'This articular infinitive expresses the content/purpose excluded by
    the negation: believers are not obligated to the flesh so as to live by its standard.
    “According to the flesh” closely reflects Paul’s repeated idiom in the immediate
    context.'
