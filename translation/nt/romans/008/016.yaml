id: ROM.8.16
reference: Romans 8:16
source:
  edition: SBLGNT
  text: αὐτὸ τὸ πνεῦμα συμμαρτυρεῖ τῷ πνεύματι ἡμῶν ὅτι ἐσμὲν τέκνα θεοῦ.
translation:
  text: The Spirit himself testifies with our spirit that we are God's children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the Spirit itself''; the Greek noun ''Spirit'' is neuter, but
      English commonly uses personal language here because the referent is the Holy
      Spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bears witness with our spirit.'
    reason: lexical_alternative
  - marker: c
    text: Or 'children of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸ τὸ πνεῦμα
  chosen: The Spirit himself
  alternatives:
  - the Spirit itself
  - the Spirit itself personally
  lexicon: BDAG
  rationale: The article-noun phrase with αὐτό is emphatic, so English should preserve
    that emphasis with 'himself.' Although πνεῦμα is grammatically neuter in Greek,
    'himself' best reflects the personal agency of the Holy Spirit in natural English.
- source_word: συμμαρτυρεῖ
  chosen: testifies with
  alternatives:
  - bears witness with
  - testifies to
  lexicon: BDAG
  rationale: The verb means to bear witness together with or alongside. 'Testifies
    with' is clear modern English and preserves the sense of shared or concurrent
    witness better than the less common 'bears witness with.'
- source_word: τῷ πνεύματι ἡμῶν
  chosen: with our spirit
  alternatives:
  - to our spirit
  lexicon: BDAG
  rationale: 'With συμμαρτυρεῖ, the dative is best taken as accompaniment or association:
    the Spirit testifies together with our spirit, not merely to it.'
- source_word: ὅτι ἐσμὲν
  chosen: that we are
  alternatives:
  - that we ourselves are
  lexicon: BDAG
  rationale: A straightforward declarative content clause introduced by ὅτι; no added
    emphasis is required in English.
- source_word: τέκνα θεοῦ
  chosen: God's children
  alternatives:
  - children of God
  lexicon: BDAG
  rationale: τέκνα refers to children rather than specifically sons. 'God's children'
    is natural modern English and preserves the familial sense without shifting to
    a more formal register.
