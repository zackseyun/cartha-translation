theological_decisions:
- issue: Pronoun for πνεῦμα in English
  chosen_reading: himself
  alternative_readings:
  - itself
  rationale: The Greek noun πνεῦμα is neuter, but the referent here is the Holy Spirit.
    Rendering αὐτὸ ... πνεῦμα as 'himself' preserves the text's emphasis while avoiding
    an impersonal English rendering that would miscommunicate the referent.
  doctrine_reference: Affirmations; Translation philosophy §§3, 6
