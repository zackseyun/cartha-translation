theological_decisions:
- issue: Whether πνεῦμα refers to the Holy Spirit or the human spirit
  chosen_reading: Holy Spirit
  alternative_readings:
  - human spirit
  - spirit in a more general sense
  rationale: The immediate context in Romans 8 repeatedly contrasts flesh with the
    Spirit as the divine agent of life, so rendering with capitalized “Spirit” best
    fits Paul's argument here.
