theological_decisions:
- issue: Whether to preserve the causal force of διὰ with the accusative in the final
    clause
  chosen_reading: because of his Spirit dwelling in you
  alternative_readings:
  - through his Spirit dwelling in you
  rationale: The main text follows the supplied SBLGNT form and its most straightforward
    grammatical sense. This avoids importing a more familiar instrumental reading
    where the printed text supports a causal expression.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
