theological_decisions:
- issue: Whether προώρισεν should be softened to avoid denominational implications
  chosen_reading: predestined
  alternative_readings:
  - foreordained
  - determined beforehand
  rationale: The Greek itself states prior determination. The translation should preserve
    that wording while avoiding explanatory additions that would resolve later theological
    debates beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ἐδόξασεν should be translated as past ('glorified') or future ('will
    glorify')
  chosen_reading: glorified
  alternative_readings:
  - will glorify
  rationale: The Greek uses an aorist indicative, so the main text should reflect
    the past form. Because interpreters often understand this as proleptic in context,
    that alternative is preserved in a footnote rather than moved into the main text.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
