id: ROM.8.30
reference: Romans 8:30
source:
  edition: SBLGNT
  text: οὓς δὲ προώρισεν, τούτους καὶ ἐκάλεσεν· καὶ οὓς ἐκάλεσεν, τούτους καὶ ἐδικαίωσεν·
    οὓς δὲ ἐδικαίωσεν, τούτους καὶ ἐδόξασεν.
translation:
  text: And those whom he predestined, he also called; and those whom he called, he
    also justified; and those whom he justified, he also glorified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "foreordained" for "predestined."
    reason: lexical_alternative
  - marker: b
    text: Greek "glorified"; some understand the past tense here as speaking of a
      future glory so certain that it is described as already accomplished.
    reason: alternative_reading
lexical_decisions:
- source_word: προώρισεν
  chosen: predestined
  alternatives:
  - foreordained
  - determined beforehand
  lexicon: BDAG
  rationale: The verb means to decide or appoint beforehand. 'Predestined' is the
    clearest established English equivalent and best preserves Paul's compact wording
    without importing a narrower denominational system.
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: '''Called'' is the standard rendering of καλέω here and preserves the
    theological linkage in Paul''s sequence without over-specifying the manner of
    the call.'
- source_word: ἐδικαίωσεν
  chosen: justified
  alternatives:
  - declared righteous
  - vindicated
  lexicon: BDAG
  rationale: In Pauline usage δικαιόω commonly carries a forensic sense. 'Justified'
    is the most concise and conventional rendering, while 'declared righteous' remains
    a viable explanatory alternative.
- source_word: ἐδόξασεν
  chosen: glorified
  alternatives:
  - honored
  - will glorify
  lexicon: BDAG
  rationale: The Greek form is aorist, so 'glorified' should be preserved in the main
    text. This keeps Paul's rhetorical sequence intact, even though some interpreters
    understand it proleptically with future reference.
- source_word: οὓς ... τούτους
  chosen: those whom ... he
  alternatives:
  - whom ... these he
  lexicon: Greek grammar
  rationale: The repeated correlative structure marks the same group through each
    clause. Natural English smooths the explicit demonstrative while preserving the
    chained argument.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: Greek grammar
  rationale: 'Here καί has an additive force within each repeated clause. Rendering
    it as ''also'' best reflects the progression: predestined → called → justified
    → glorified.'
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: Greek grammar
  rationale: δέ functions as a mild connective here, not a strong contrast. 'And'
    best fits the flow in English.
