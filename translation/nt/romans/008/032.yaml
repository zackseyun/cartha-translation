theological_decisions:
- issue: Whether ὑπὲρ ἡμῶν πάντων should be rendered in a way that specifies substitution
    rather than broad benefaction
  chosen_reading: for us all
  alternative_readings:
  - on behalf of us all
  rationale: The verse clearly states benefactive action and supports sacrificial
    overtones, but the wording need not be sharpened into a more technical atonement
    formula than the Greek itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
