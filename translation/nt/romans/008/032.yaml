id: ROM.8.32
reference: Romans 8:32
source:
  edition: SBLGNT
  text: ὅς γε τοῦ ἰδίου υἱοῦ οὐκ ἐφείσατο, ἀλλὰ ὑπὲρ ἡμῶν πάντων παρέδωκεν αὐτόν,
    πῶς οὐχὶ καὶ σὺν αὐτῷ τὰ πάντα ἡμῖν χαρίσεται;
translation:
  text: He indeed did not spare his own Son, but gave him over for us all—how will
    he not also with him graciously give us all things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'handed him over' for παρέδωκεν αὐτόν.
    reason: lexical_alternative
  - marker: b
    text: Or 'freely give us all things' for χαρίσεται.
    reason: lexical_alternative
  - marker: c
    text: '''For us all'' may also be rendered ''on behalf of us all.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ὅς
  chosen: He
  alternatives:
  - He who
  lexicon: BDAG
  rationale: Refers back to God from the prior context; simple pronominal rendering
    is natural English while preserving the connection.
- source_word: γε
  chosen: indeed
  alternatives:
  - certainly
  - surely
  lexicon: BDAG
  rationale: Marks emphasis; 'indeed' preserves the strengthening force without overtranslation.
- source_word: τοῦ ἰδίου υἱοῦ
  chosen: his own Son
  alternatives:
  - his own son
  lexicon: BDAG
  rationale: ἴδιος intensifies possession and relationship, so 'his own Son' best
    preserves the force. 'Son' is capitalized because the referent is Jesus, not to
    import extra meaning.
- source_word: οὐκ ἐφείσατο
  chosen: did not spare
  alternatives:
  - did not withhold
  - did not refrain from giving
  lexicon: BDAG
  rationale: Standard idiomatic rendering of φείδομαι here, matching the sacrificial/deliverance
    context and echoing scriptural usage.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Simple adversative contrast is sufficient in English.
- source_word: ὑπὲρ ἡμῶν πάντων
  chosen: for us all
  alternatives:
  - on behalf of us all
  - for all of us
  lexicon: BDAG
  rationale: ὑπέρ here naturally conveys benefit/on behalf of. 'For us all' is idiomatic
    and preserves the inclusive scope of πάντων.
- source_word: παρέδωκεν αὐτόν
  chosen: gave him over
  alternatives:
  - handed him over
  - delivered him up
  lexicon: BDAG
  rationale: παραδίδωμι here carries the sense of handing over to suffering/death.
    'Gave him over' is clear modern English and preserves the gravity better than
    a softened gloss.
- source_word: πῶς οὐχὶ καὶ
  chosen: how will he not also
  alternatives:
  - how will he also not
  - will he not also
  lexicon: BDAG
  rationale: This retains the rhetorical-force construction and the future-oriented
    inference from the greater gift to the lesser.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - together with him
  lexicon: BDAG
  rationale: The σύν phrase is straightforward; 'with him' is sufficiently precise
    and natural.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Formal enough to preserve Paul's broad expression while remaining natural
    English.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: English places the indirect object naturally after the verb phrase; the
    dative sense remains intact.
- source_word: χαρίσεται
  chosen: graciously give
  alternatives:
  - freely give
  - grant
  lexicon: BDAG
  rationale: χαρίζομαι includes the nuance of giving graciously or freely. 'Graciously
    give' preserves the gift/grace connection more transparently than simply 'give'.
