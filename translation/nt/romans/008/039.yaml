theological_decisions:
- issue: Meaning of the genitive in 'the love of God'
  chosen_reading: God's love for believers
  alternative_readings:
  - believers' love for God
  - a deliberately broad genitive allowing both senses
  rationale: In the immediate context of Romans 8:31–39, Paul emphasizes God's action
    toward his people and climaxes with assurance that nothing can sever them from
    divine love. The phrase is left formally as 'the love of God' in the main text,
    but the contextual sense is best understood as God's love for us.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine; here the context favors one reading, so no alternative is elevated
    into the main text.
