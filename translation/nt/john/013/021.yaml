theological_decisions:
- issue: Rendering Jesus' inner disturbance
  chosen_reading: was troubled in spirit
  alternative_readings:
  - was troubled in his spirit
  - was deeply moved in spirit
  rationale: The wording preserves the text's portrayal of Jesus' genuine human emotional
    disturbance without diminishing his dignity or importing later doctrinal explanation.
    This aligns with Chalcedonian orthodoxy by allowing the verse's full human realism
    to stand.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Rendering παραδίδωμι in the betrayal prediction
  chosen_reading: will betray me
  alternative_readings:
  - will hand me over
  rationale: The immediate context identifies the act as treacherous betrayal by one
    of the disciples, so 'betray' best communicates the force in English. Because
    παραδίδωμι can also be rendered more literally as 'hand over,' that alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3; §5
