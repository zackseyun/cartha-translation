id: JHN.13.21
reference: John 13:21
source:
  edition: SBLGNT
  text: Ταῦτα εἰπὼν ⸀ὁ Ἰησοῦς ἐταράχθη τῷ πνεύματι καὶ ἐμαρτύρησεν καὶ εἶπεν· Ἀμὴν
    ἀμὴν λέγω ὑμῖν ὅτι εἷς ἐξ ὑμῶν παραδώσει με.
translation:
  text: After saying these things, Jesus was troubled in spirit, and testified and
    said, “Truly, truly, I say to you, one of you will betray me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “will hand me over.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα εἰπὼν
  chosen: After saying these things
  alternatives:
  - Having said these things
  - When he had said these things
  lexicon: BDAG
  rationale: The aorist participle with ταῦτα is naturally rendered as a temporal
    participial clause in English. 'After saying these things' is idiomatic and preserves
    the sequence without overformal stiffness.
- source_word: ἐταράχθη τῷ πνεύματι
  chosen: was troubled in spirit
  alternatives:
  - was troubled in his spirit
  - was deeply troubled in spirit
  lexicon: BDAG
  rationale: 'ἐταράχθη is passive/intransitive here, indicating inner agitation or
    distress. The dative τῷ πνεύματι is best taken as sphere/respect: ''in spirit.''
    This preserves the text''s psychological and spiritual depth without adding intensity
    not explicit in the Greek.'
- source_word: ἐμαρτύρησεν
  chosen: testified
  alternatives:
  - bore witness
  - declared
  lexicon: BDAG
  rationale: John often uses μαρτυρέω in the sense of bearing witness/testifying.
    'Testified' keeps Johannine diction and signals solemn attestation better than
    the flatter 'declared.'
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: This is the standard Johannine emphatic formula. 'Truly, truly' communicates
    solemn emphasis in readable English while preserving the repetition.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering fits the solemn introductory formula and
    preserves the directness of λέγω with the dative pronoun.
- source_word: εἷς ἐξ ὑμῶν
  chosen: one of you
  alternatives:
  - one from among you
  lexicon: BDAG
  rationale: This is the natural English equivalent of the partitive expression and
    preserves the shocking intimacy of the statement.
- source_word: παραδώσει με
  chosen: will betray me
  alternatives:
  - will hand me over
  lexicon: BDAG
  rationale: While παραδίδωμι literally means 'hand over/deliver,' in this context
    of Judas's act 'betray' is the contextually precise and standard sense. The alternative
    is worth preserving because the broader semantic range can matter in passion narratives.
