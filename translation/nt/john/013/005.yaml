id: JHN.13.5
reference: John 13:5
source:
  edition: SBLGNT
  text: εἶτα βάλλει ὕδωρ εἰς τὸν νιπτῆρα, καὶ ἤρξατο νίπτειν τοὺς πόδας τῶν μαθητῶν
    καὶ ἐκμάσσειν τῷ λεντίῳ ᾧ ἦν διεζωσμένος.
translation:
  text: Then he pours water into the washbasin, and began to wash the disciples’ feet
    and to wipe them with the towel with which he was wrapped around himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'basin.' The Greek term denotes a vessel used for washing.
    reason: lexical_alternative
  - marker: b
    text: Or 'with which he was girded.' The Greek idiom refers to the towel tied
      around him for service.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - Next
  - After that
  lexicon: BDAG
  rationale: Marks sequential action in the narrative; 'Then' is natural and sufficiently
    formal.
- source_word: βάλλει
  chosen: pours
  alternatives:
  - puts
  - throws
  lexicon: BDAG
  rationale: Although βάλλω is broadly 'throw/put,' with water into a basin the idiomatic
    English sense is 'pours.' This reflects the action without wooden literalism.
- source_word: νιπτῆρα
  chosen: washbasin
  alternatives:
  - basin
  - washbowl
  lexicon: BDAG
  rationale: Specifies a vessel used for washing. 'Washbasin' is clear modern English
    and preserves the function better than the more generic 'basin.'
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Standard rendering of ἄρχομαι + infinitive indicating the inception of
    the following actions.
- source_word: νίπτειν
  chosen: to wash
  lexicon: BDAG
  rationale: Direct and standard rendering for washing a part of the body, here specifically
    feet.
- source_word: τοὺς πόδας τῶν μαθητῶν
  chosen: the disciples’ feet
  alternatives:
  - the feet of the disciples
  lexicon: BDAG
  rationale: English possessive is more natural while preserving the genitival relationship.
- source_word: ἐκμάσσειν
  chosen: to wipe them
  alternatives:
  - to dry them
  - to wipe off
  lexicon: BDAG
  rationale: The verb denotes wiping/drying by rubbing. 'Wipe them' stays close to
    the lexical sense; the object 'them' is supplied naturally from 'feet.'
- source_word: τῷ λεντίῳ
  chosen: with the towel
  alternatives:
  - with the linen cloth
  lexicon: BDAG
  rationale: λέντιον refers to a towel or cloth used for wiping. 'Towel' is the clearest
    contextual equivalent.
- source_word: ᾧ ἦν διεζωσμένος
  chosen: with which he was wrapped around himself
  alternatives:
  - with which he was girded
  - that he had tied around himself
  lexicon: BDAG
  rationale: The participle from διαζώννυμι means to gird oneself around with something.
    A fully literal 'girded' is less accessible; this rendering aims to express the
    sense, though the idiom is somewhat expanded for clarity.
