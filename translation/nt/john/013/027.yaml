theological_decisions:
- issue: Nature of Satan's action toward Judas
  chosen_reading: Retain the direct wording 'Satan entered into him' without explanatory
    expansion.
  alternative_readings:
  - Satan took control of him
  - Judas yielded himself to Satan
  rationale: The verse states a personal satanic entry and should not be reduced to
    a mere metaphor nor expanded into a fuller doctrine of possession beyond what
    the text says. This preserves theological tension and avoids importing claims
    the verse itself does not make.
  doctrine_reference: Preserve theological tension rather than resolve it.
