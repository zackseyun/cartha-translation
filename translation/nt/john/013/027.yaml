id: JHN.13.27
reference: John 13:27
source:
  edition: SBLGNT
  text: καὶ μετὰ τὸ ψωμίον τότε εἰσῆλθεν εἰς ἐκεῖνον ὁ Σατανᾶς. λέγει οὖν αὐτῷ ⸀ὁ
    Ἰησοῦς· Ὃ ποιεῖς ποίησον τάχιον.
translation:
  text: And after the piece of bread, then Satan entered into him. So Jesus says to
    him, “What you are doing, do more quickly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the morsel.' The Greek ψωμίον refers to a small piece of food, here
      likely the dipped bread given during the meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'do quickly.' The Greek τάχιον is comparative ('more quickly'), though
      many English versions smooth it to 'quickly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ψωμίον
  chosen: the piece of bread
  alternatives:
  - the morsel
  - the sop
  - the bite
  lexicon: BDAG
  rationale: ψωμίον refers to a small piece or morsel of food, here the dipped bread
    in the meal context. 'Piece of bread' is clear modern English and avoids archaic
    'sop' while preserving the concreteness better than the vaguer 'bite.'
- source_word: εἰσῆλθεν εἰς ἐκεῖνον
  chosen: entered into him
  alternatives:
  - entered him
  - came into him
  lexicon: BDAG
  rationale: The construction εἰσέρχομαι + εἰς + accusative is most naturally rendered
    'entered into him.' This preserves the force of hostile personal entry without
    softening the expression.
- source_word: ὁ Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Σατανᾶς is a proper name/title already conventional in English as 'Satan.'
    Translating it as 'the Adversary' would foreground etymology over established
    NT usage.
- source_word: λέγει οὖν
  chosen: So ... says
  alternatives:
  - therefore ... says
  - then ... says
  - so ... said
  lexicon: BDAG
  rationale: λέγει is present tense in the Greek and John often uses the historical
    present. 'So ... says' preserves that discourse vividness better than converting
    to simple past. οὖν is rendered 'so' as a natural connective in modern English.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, with the article not separately
    represented in English.
- source_word: Ὃ ποιεῖς
  chosen: What you are doing
  alternatives:
  - What you are about to do
  - What you do
  lexicon: BDAG
  rationale: 'The present tense ποιεῖς is best represented as an ongoing or immediate
    action: ''What you are doing.'' ''About to do'' is interpretive and shifts the
    aspect from present to imminent future.'
- source_word: ποίησον
  chosen: do
  alternatives:
  - carry out
  - perform
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive action. Simple 'do' is idiomatic
    and preserves the stark brevity of Jesus' command.
- source_word: τάχιον
  chosen: more quickly
  alternatives:
  - quickly
  - faster
  - at once
  lexicon: BDAG
  rationale: τάχιον is the comparative form, so 'more quickly' best reflects the Greek
    form. 'Quickly' is common in English translations but loses the comparative nuance.
