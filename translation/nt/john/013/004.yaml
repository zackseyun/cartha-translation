id: JHN.13.4
reference: John 13:4
source:
  edition: SBLGNT
  text: ἐγείρεται ἐκ τοῦ δείπνου καὶ τίθησιν τὰ ἱμάτια καὶ λαβὼν λέντιον διέζωσεν
    ἑαυτόν·
translation:
  text: he rises from the supper and lays aside his outer garments, and taking a towel,
    tied it around himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he gets up from the meal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'girded himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεται
  chosen: he rises
  alternatives:
  - he gets up
  - he arose
  lexicon: BDAG
  rationale: Present middle/passive form in narrative often has vivid present force;
    'he rises' preserves the historical present without over-paraphrasing. 'Gets up'
    is possible but slightly more colloquial.
- source_word: ἐκ τοῦ δείπνου
  chosen: from the supper
  alternatives:
  - from the meal
  - from dinner
  lexicon: BDAG
  rationale: δεῖπνον denotes the meal/supper setting. 'Supper' fits the Johannine
    context and traditional meal reference without requiring a specific modern mealtime
    nuance.
- source_word: τίθησιν τὰ ἱμάτια
  chosen: lays aside his outer garments
  alternatives:
  - sets down the garments
  - takes off his clothes
  lexicon: BDAG
  rationale: τίθημι here means to put aside/remove rather than merely 'place.' ἱμάτια
    commonly refers to outer garments/clothing. 'Outer garments' is more precise than
    the overly broad 'clothes' and avoids implying total undressing.
- source_word: λαβὼν λέντιον
  chosen: taking a towel
  alternatives:
  - having taken a towel
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered with an English participial
    clause. λέντιον refers to a linen cloth/towel used for service; 'towel' is the
    clearest idiomatic rendering.
- source_word: διέζωσεν ἑαυτόν
  chosen: tied it around himself
  alternatives:
  - girded himself
  - wrapped himself with it
  lexicon: BDAG
  rationale: διαζώννυμι means to gird or tie around oneself. 'Tied it around himself'
    communicates the action clearly in modern English, while 'girded himself' is more
    traditional but less accessible. 'It' is supplied in English from the immediately
    preceding 'towel'.
