id: JHN.13.11
reference: John 13:11
source:
  edition: SBLGNT
  text: ᾔδει γὰρ τὸν παραδιδόντα αὐτόν· διὰ τοῦτο εἶπεν ⸀ὅτι Οὐχὶ πάντες καθαροί ἐστε.
translation:
  text: For he knew the one betraying him; for this reason he said, “Not all of you
    are clean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the one handing him over.” In context this refers to
      Judas’ betrayal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  chosen: he knew
  alternatives:
  - he had known
  - he was knowing
  lexicon: BDAG
  rationale: οἶδα commonly functions with present sense despite perfect/pluperfect
    forms; in context it states Jesus' existing knowledge, so simple English past
    'knew' is the most natural narrative rendering.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the previous statement. 'For' preserves
    the explanatory connection concisely and naturally in English.
- source_word: τὸν παραδιδόντα αὐτόν
  chosen: the one betraying him
  alternatives:
  - the one handing him over
  - the one who would betray him
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over/deliver up,' but in Johannine passion
    context it idiomatically refers to Judas' betrayal. 'The one betraying him' is
    clear and contextually accurate while retaining the participial force with 'the
    one...'.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: BDAG
  rationale: The phrase marks result/explanation from Jesus' knowledge to his prior
    statement. 'For this reason' preserves the explicit causal linkage more fully
    than the terser 'therefore'.
- source_word: εἶπεν ὅτι
  chosen: he said
  alternatives:
  - he said that
  lexicon: BDAG
  rationale: In English, 'said' naturally introduces direct speech without needing
    an explicit 'that.' The ὅτι is represented by the quotation structure.
- source_word: Οὐχὶ
  chosen: Not
  alternatives:
  - Surely not
  lexicon: BDAG
  rationale: 'οὐχί here negates the clause with slight emphasis. In direct discourse,
    simple ''Not'' best yields idiomatic English: ''Not all of you are clean.'''
- source_word: πάντες
  chosen: all of you
  alternatives:
  - all
  - every one of you
  lexicon: BDAG
  rationale: Because Jesus addresses the disciples directly, 'all of you' makes the
    second-person plural force explicit in natural English.
- source_word: καθαροί
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: In the immediate footwashing context, καθαρός carries both literal and
    moral/spiritual resonance. 'Clean' preserves that deliberate double sense better
    than 'pure,' which would over-spiritualize the statement.
- source_word: ἐστε
  chosen: are
  lexicon: BDAG
  rationale: Standard present plural copula; rendered straightforwardly as 'are'.
