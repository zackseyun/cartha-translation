theological_decisions:
- issue: Sense of παραδιδόντα in relation to Judas
  chosen_reading: betraying
  alternative_readings:
  - handing over
  rationale: Although παραδίδωμι can be rendered more literally as 'hand over,' in
    this narrative context the referent is Judas' treacherous act. 'Betraying' communicates
    the contextual force without importing extra doctrine.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition; §3, preserve tension where genuine ambiguity exists.
- issue: Sense of καθαροί in the footwashing discourse
  chosen_reading: clean
  alternative_readings:
  - pure
  rationale: The verse alludes to both ritual/physical washing imagery and spiritual
    condition. 'Clean' preserves the theological tension already present in the discourse
    rather than resolving it into a purely moral category.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
