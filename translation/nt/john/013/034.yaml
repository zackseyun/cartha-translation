theological_decisions:
- issue: Nature of the 'new commandment'
  chosen_reading: Rendered straightforwardly as 'A new commandment' without explaining
    in the main text how it is new.
  alternative_readings:
  - new in time
  - new in quality
  - new in covenantal realization through Jesus' example
  rationale: The Greek states the command is 'new' but does not itself define the
    precise sense of that newness within the verse. To preserve theological tension,
    the translation leaves the term unexpanded.
  doctrine_reference: Preserve theological tension rather than resolve it.
