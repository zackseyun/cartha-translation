id: JHN.13.34
reference: John 13:34
source:
  edition: SBLGNT
  text: ἐντολὴν καινὴν δίδωμι ὑμῖν ἵνα ἀγαπᾶτε ἀλλήλους, καθὼς ἠγάπησα ὑμᾶς ἵνα καὶ
    ὑμεῖς ἀγαπᾶτε ἀλλήλους.
translation:
  text: 'A new commandment I give to you: that you love one another. Just as I loved
    you, you also are to love one another.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'command.' The Greek term can be rendered either way, but 'commandment'
      better preserves the formal ethical force here.
    reason: lexical_alternative
  - marker: b
    text: The second clause may also be rendered, 'that you also may love one another.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐντολὴν
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: Rendered as 'commandment' to preserve the formal, covenantal and ethical
    force of ἐντολή in Johannine usage, while remaining natural English.
- source_word: καινὴν
  chosen: new
  alternatives:
  - fresh
  lexicon: BDAG
  rationale: '''New'' is the plain sense of καινός here, indicating a command marked
    by newness in quality or realization, not merely recent origin.'
- source_word: δίδωμι
  chosen: I give
  alternatives:
  - I am giving
  lexicon: BDAG
  rationale: Present indicative is rendered with simple present 'I give,' which is
    idiomatic in English and preserves the solemn force of Jesus' direct bestowal.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: Explicitly rendered to preserve the dative recipient and the personal
    address.
- source_word: ἵνα ἀγαπᾶτε ἀλλήλους
  chosen: that you love one another
  alternatives:
  - so that you may love one another
  - that you should love one another
  lexicon: BDAG
  rationale: After δίδωμι ἐντολήν, ἵνα introduces the content/purpose of the command.
    'That you love one another' is natural English and preserves the imperative force
    without over-paraphrase.
- source_word: ἀγαπᾶτε / ἠγάπησα
  chosen: love / loved
  alternatives:
  - show love to / showed love to
  lexicon: BDAG
  rationale: Following the project's default for ἀγάπη cognates, rendered with 'love'
    language consistently. This preserves the lexical repetition and theological emphasis
    of the verse.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: '''One another'' is the standard reciprocal rendering and fits the elevated
    tone of the discourse.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: BDAG
  rationale: '''Just as'' clearly marks Jesus'' love as the pattern and measure for
    the disciples'' love.'
- source_word: ἠγάπησα
  chosen: I loved
  alternatives:
  - I have loved
  lexicon: BDAG
  rationale: Aorist is best rendered here as simple past, referring to Jesus' demonstrated
    love already shown to the disciples, without importing a more interpretive English
    perfect.
- source_word: ἵνα καὶ ὑμεῖς ἀγαπᾶτε ἀλλήλους
  chosen: you also are to love one another
  alternatives:
  - that you also love one another
  - so that you also may love one another
  lexicon: BDAG
  rationale: The second ἵνα clause restates the intended result/content with emphasis
    on καὶ ὑμεῖς. 'You also are to love one another' brings out the exhortational
    force in idiomatic English while preserving the emphasis on 'you also'.
