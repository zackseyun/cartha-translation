theological_decisions:
- issue: Force of Jesus' statement in relation to disciples' imitation
  chosen_reading: Render the verse as presenting Jesus' action as an example for imitation
    without specifying sacramental, ecclesial, or merely symbolic conclusions beyond
    the text.
  alternative_readings:
  - A direct ordinance of footwashing for all believers in all contexts
  - A purely symbolic act with no concrete imitative force
  rationale: The verse explicitly states that Jesus gave an example so that the disciples
    would act correspondingly. The translation should preserve that ethical exemplar
    function while not importing a denominational conclusion about whether the act
    is universally ritualized or only generally paradigmatic.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
