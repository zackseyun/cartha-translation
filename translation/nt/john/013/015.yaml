id: JHN.13.15
reference: John 13:15
source:
  edition: SBLGNT
  text: ὑπόδειγμα γὰρ ἔδωκα ὑμῖν ἵνα καθὼς ἐγὼ ἐποίησα ὑμῖν καὶ ὑμεῖς ποιῆτε.
translation:
  text: For I have given you an example, so that just as I have done for you, you
    also may do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a pattern' or 'a model.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I gave you an example.' The Greek uses a simple past form; English 'have
      given' brings out its present relevance in context.
    reason: lexical_alternative
  - marker: c
    text: Or 'I have done to you.' Here 'for you' reflects the benefactive sense in
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόδειγμα
  chosen: an example
  alternatives:
  - a pattern
  - a model
  lexicon: BDAG
  rationale: ὑπόδειγμα denotes an example or pattern set for imitation. 'Example'
    is the most natural modern English rendering here and fits Jesus' stated purpose
    in the footwashing context without sounding overly technical.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces an explanation of the preceding action and teaching. 'For'
    preserves the explanatory connection in a concise, readable way.
- source_word: ἔδωκα
  chosen: I have given
  alternatives:
  - I gave
  lexicon: BDAG
  rationale: Although the Greek aorist is formally past, English present perfect idiomatically
    conveys a past act with present relevance. In context, Jesus' action just performed
    remains the basis for the disciples' ongoing obligation.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα marks purpose. 'So that' is clear modern English and preserves the
    purposive force.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: καθώς expresses correspondence between Jesus' action and the disciples'
    action. 'Just as' makes the comparative force explicit.
- source_word: ἐποίησα ὑμῖν
  chosen: I have done for you
  alternatives:
  - I did to you
  - I did for you
  lexicon: BDAG
  rationale: ποιέω is broad ('do, make'), and with ὑμῖν in this context refers to
    what Jesus has done on the disciples' behalf. 'For you' better captures the benefactive
    sense in the footwashing scene than the more awkward or potentially misleading
    'to you'.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - you yourselves also
  lexicon: BDAG
  rationale: The combination adds the disciples in corresponding fashion. 'You also'
    is natural and preserves the emphatic inclusion.
- source_word: ποιῆτε
  chosen: may do
  alternatives:
  - should do
  - do
  lexicon: BDAG
  rationale: Following ἵνα, the present subjunctive expresses intended or expected
    action. 'May do' preserves the purposive/subjunctive nuance without overstating
    it as a bare imperative, while still implying ethical obligation from context.
