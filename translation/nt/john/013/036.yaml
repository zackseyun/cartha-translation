theological_decisions:
- issue: Implication of Peter's future following Jesus
  chosen_reading: Render the statement without specifying in the main text whether
    it refers to Peter's later martyrdom, post-resurrection discipleship, or ultimate
    following in death/glory.
  alternative_readings:
  - reference to Peter's martyrdom
  - reference to Peter's restoration and later discipleship
  - broader eschatological following
  rationale: The Greek states only that Peter cannot follow now but will follow later.
    The translation preserves this theological and narrative openness rather than
    importing a specific interpretation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
