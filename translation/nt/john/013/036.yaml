id: JHN.13.36
reference: John 13:36
source:
  edition: SBLGNT
  text: Λέγει αὐτῷ Σίμων Πέτρος· Κύριε, ποῦ ὑπάγεις; ⸀ἀπεκρίθη Ἰησοῦς· Ὅπου ὑπάγω
    οὐ δύνασαί μοι νῦν ἀκολουθῆσαι, ⸂ἀκολουθήσεις δὲ ὕστερον⸃.
translation:
  text: Simon Peter says to him, “Lord, where are you going?” Jesus answered, “Where
    I am going, you are not able to follow me now, but you will follow later.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you cannot follow me now.” The Greek explicitly uses a verb of ability.
    reason: lexical_alternative
  - marker: b
    text: “You will follow later” may allude to Peter’s later following of Jesus in
      suffering or death; the wording itself does not specify how.
    reason: cross_reference
lexical_decisions:
- source_word: Λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as historical present ('says') to reflect the Greek present
    tense in Johannine narrative, preserving the vividness of the discourse.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In this
    direct address to Jesus, 'Lord' preserves both respect and the title's theological
    resonance better than 'Master'.
- source_word: ποῦ ὑπάγεις
  chosen: where are you going
  alternatives:
  - where are you departing to
  lexicon: BDAG
  rationale: ὑπάγω commonly means 'go' or 'depart.' 'Where are you going' is natural
    modern English and fits the immediate context without overinterpreting the destination.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; concise and
    idiomatic.
- source_word: Ὅπου ὑπάγω
  chosen: Where I am going
  alternatives:
  - Where I go
  - Where I am departing
  lexicon: BDAG
  rationale: Uses English progressive to match the present-tense movement sense in
    context and to echo Peter's question. This preserves the verbal link with ὑπάγεις/ὑπάγω.
- source_word: οὐ δύνασαί μοι νῦν ἀκολουθῆσαι
  chosen: you are not able to follow me now
  alternatives:
  - you cannot follow me now
  - you are unable to follow me now
  lexicon: BDAG
  rationale: Keeps the explicit sense of ability in δύναμαι while remaining readable.
    'Follow me' reflects the dative μοι with ἀκολουθέω. 'Now' is retained in its natural
    English position.
- source_word: ἀκολουθήσεις δὲ ὕστερον
  chosen: but you will follow later
  alternatives:
  - but you will follow afterward
  - but later you will follow
  lexicon: BDAG
  rationale: Future tense is preserved. δέ is rendered adversatively as 'but' to mark
    the contrast with 'not now.' ὕστερον is naturally expressed as 'later.'
