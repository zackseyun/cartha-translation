id: JHN.13.28
reference: John 13:28
source:
  edition: SBLGNT
  text: τοῦτο δὲ οὐδεὶς ἔγνω τῶν ἀνακειμένων πρὸς τί εἶπεν αὐτῷ·
translation:
  text: But none of those reclining at the table knew why he said this to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'for what purpose he said this to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - it
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to the preceding statement/action; 'this'
    is the natural English equivalent and preserves the deictic force.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous verse. 'But'
    best captures the contrast that the narrator now notes the disciples' lack of
    understanding.
- source_word: οὐδεὶς
  chosen: none
  alternatives:
  - no one
  lexicon: BDAG
  rationale: The sense is total negation. 'None' works smoothly with the following
    partitive phrase ('of those reclining at the table'). 'No one' would also be valid.
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - understood
  - came to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes the fact that no one grasped the matter.
    'Knew' is idiomatic and sufficiently broad; 'understood' is interpretive but possible.
- source_word: τῶν ἀνακειμένων
  chosen: of those reclining at the table
  alternatives:
  - of those reclining
  - of those at table
  lexicon: BDAG
  rationale: ἀνάκειμαι in meal contexts refers to reclining for a meal. Because modern
    English readers may not immediately associate 'reclining' with table fellowship,
    'at the table' is supplied to make the scene clear while remaining close to the
    source.
- source_word: πρὸς τί
  chosen: why
  alternatives:
  - for what purpose
  - to what end
  lexicon: BDAG
  rationale: The idiom πρὸς τί asks purpose or reason. 'Why' is the most natural modern
    English rendering, with 'for what purpose' as a more formal alternative.
- source_word: εἶπεν αὐτῷ
  chosen: he said this to him
  alternatives:
  - he spoke to him about this
  - he said to him
  lexicon: BDAG
  rationale: The verb λέγω with indirect object αὐτῷ is straightforwardly 'said to
    him.' English idiom commonly repeats 'this' to make explicit the object of the
    speech, corresponding to τοῦτο at the front of the sentence.
