theological_decisions:
- issue: Rendering κύριος in a non-titular comparison
  chosen_reading: master
  alternative_readings:
  - Lord
  rationale: 'The verse uses a social analogy: slave/master and apostle/sender. Rendering
    κύριος as ''master'' best preserves the analogy and avoids importing a direct
    titular sense where the immediate context does not require it. This is a documented
    contextual exception to the default rendering ''Lord.'''
