id: JHN.13.16
reference: John 13:16
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, οὐκ ἔστιν δοῦλος μείζων τοῦ κυρίου αὐτοῦ οὐδὲ ἀπόστολος
    μείζων τοῦ πέμψαντος αὐτόν.
translation:
  text: Truly, truly, I say to you, a slave is not greater than his master, nor is
    an apostle greater than the one who sent him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλος); the Greek denotes one under the authority
      of a master, and 'slave' is used here to preserve that stronger social relation.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lord' for 'master' (κύριος); here it is rendered in its social sense
      to match the slave/master comparison.
    reason: lexical_alternative
  - marker: c
    text: Or 'messenger' for 'apostle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: The doubled ἀμήν is a solemn emphatic formula in John. 'Truly, truly'
    preserves both the repetition and the force in natural modern English better than
    leaving it untranslated as 'Amen, amen.'
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the present-tense speech formula
    and Johannine style. 'I tell you' is possible, but 'I say to you' stays slightly
    closer to the Greek without sounding unnatural.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος is rendered 'slave' where bonded status
    is salient. Here the comparison with 'master' highlights hierarchical subordination,
    so 'slave' best preserves the social reality. 'Servant' is smoother but weaker;
    'bondservant' is accurate but less accessible.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - above
  lexicon: BDAG
  rationale: The comparative adjective expresses superiority in rank or status. 'Greater'
    is the standard and sufficiently broad rendering, fitting both clauses.
- source_word: κύριος
  chosen: master
  alternatives:
  - lord
  lexicon: BDAG
  rationale: Although the project's default for κύριος is 'Lord,' context here is
    a household/master-slave analogy rather than a direct christological title. 'Master'
    best matches the social relation implied by δοῦλος and avoids confusion with a
    titular use of 'Lord' in this proverb-like statement.
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: The Greek term can denote a commissioned messenger, and the parallel
    with 'the one who sent him' makes that sense explicit. However, 'apostle' preserves
    the lexical form and Johannine resonance while remaining understandable in context.
- source_word: τοῦ πέμψαντος αὐτόν
  chosen: the one who sent him
  alternatives:
  - his sender
  - the one having sent him
  lexicon: BDAG
  rationale: This articular participial construction is naturally rendered as 'the
    one who sent him.' It clearly expresses the sender-agent relationship and preserves
    the parallel with the first clause.
