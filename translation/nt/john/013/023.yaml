id: JHN.13.23
reference: John 13:23
source:
  edition: SBLGNT
  text: ⸀ἦν ἀνακείμενος εἷς ⸀ἐκ τῶν μαθητῶν αὐτοῦ ἐν τῷ κόλπῳ τοῦ Ἰησοῦ, ὃν ἠγάπα
    ὁ Ἰησοῦς·
translation:
  text: One of his disciples, whom Jesus loved, was reclining close beside Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in the bosom of Jesus,' an expression describing the position
      of one reclining next to another at a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνακείμενος
  chosen: was reclining
  alternatives:
  - was lying down
  - was at table
  lexicon: BDAG
  rationale: The participle refers to the posture of dining at a formal meal in the
    ancient Mediterranean world. 'Was reclining' preserves the historical scene more
    precisely than the generic 'was at table,' while remaining natural English.
- source_word: εἷς ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: One of his disciples
  alternatives:
  - one from among his disciples
  lexicon: BDAG
  rationale: This is the straightforward partitive expression. 'One of his disciples'
    is idiomatic English and accurately reflects the Greek.
- source_word: ἐν τῷ κόλπῳ τοῦ Ἰησοῦ
  chosen: close beside Jesus
  alternatives:
  - in Jesus' bosom
  - at Jesus' side
  - in the lap of Jesus
  lexicon: BDAG
  rationale: κόλπος literally denotes the bosom/chest area or the fold of a garment,
    and in meal context it describes the position of one reclining next to another.
    'Close beside Jesus' communicates the relational and spatial sense without misleading
    modern readers into overly literal or anachronistically intimate imagery. The
    more formal alternative is preserved in a footnote.
- source_word: ὃν ἠγάπα ὁ Ἰησοῦς
  chosen: whom Jesus loved
  alternatives:
  - the one Jesus loved
  lexicon: BDAG
  rationale: ἀγαπάω is best rendered with the default 'love' per doctrine guidance.
    The relative clause is translated directly and naturally as 'whom Jesus loved.'
