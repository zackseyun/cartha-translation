theological_decisions:
- issue: Rendering the beloved disciple's position relative to Jesus
  chosen_reading: Translate the meal posture idiomatically as spatial closeness rather
    than with the literal 'in the bosom of Jesus' in the main text.
  alternative_readings:
  - in Jesus' bosom
  - at Jesus' side
  rationale: The phrase is not primarily making a theological claim about mystical
    union but describing table arrangement at the supper. A more idiomatic rendering
    in the main text avoids misunderstanding while a footnote preserves the literal
    wording and its resonance with Johannine usage (cf. John 1:18).
  doctrine_reference: Translation philosophy §§1, 3, 6
