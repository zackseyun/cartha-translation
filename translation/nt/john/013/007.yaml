id: JHN.13.7
reference: John 13:7
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Ὃ ἐγὼ ποιῶ σὺ οὐκ οἶδας ἄρτι, γνώσῃ δὲ μετὰ
    ταῦτα.
translation:
  text: Jesus answered and said to him, “What I am doing you do not understand now,
    but you will understand after these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you do not know now … but you will know later.” The Greek uses two different
      verbs, one often rendered “know” and the other “come to know/understand.”
    reason: lexical_alternative
  - marker: b
    text: “After these things” may refer to what follows in this episode or, more
      broadly, to later events that would clarify Jesus’ action.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' fits common Johannine
    style and pairs naturally with the following speech introduction.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: 'Retained alongside ''answered'' because the Greek uses both verbs. English
    often compresses this, but preserving both reflects the source without sounding
    unnatural: ''answered and said.'''
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object referring to Peter in context; straightforwardly
    rendered 'to him.'
- source_word: Ὃ
  chosen: What
  alternatives:
  - That which
  lexicon: BDAG
  rationale: Neuter relative pronoun introducing the object clause. 'What' is idiomatic
    modern English and preserves the sense better than the more wooden 'that which.'
- source_word: ποιῶ
  chosen: I am doing
  alternatives:
  - I do
  lexicon: BDAG
  rationale: Present tense here naturally carries progressive force in context, referring
    to Jesus' ongoing act of washing the disciples' feet. 'I am doing' best captures
    the immediate action.
- source_word: οἶδας
  chosen: understand
  alternatives:
  - know
  lexicon: BDAG
  rationale: Although οἶδα often means 'know,' in this context Jesus contrasts present
    lack of comprehension with later realization. 'Understand' better conveys cognitive
    grasp of the act's meaning in English.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - for the moment
  lexicon: BDAG
  rationale: Temporal adverb indicating the present moment. 'Now' is the clearest
    and most natural rendering.
- source_word: γνώσῃ
  chosen: you will understand
  alternatives:
  - you will know
  - you will come to know
  lexicon: BDAG
  rationale: Future middle of γινώσκω contrasts with present οἶδας. Rendering both
    with 'understand' in English preserves the sense of present incomprehension versus
    future comprehension, even though the Greek uses different verbs.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  lexicon: BDAG
  rationale: Marks contrast between Peter's present lack of understanding and future
    understanding; 'but' brings out that contrast clearly.
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - later
  - afterward
  lexicon: BDAG
  rationale: A relatively formal but still natural rendering that preserves the Greek
    wording and Johannine flavor. 'Later' is smoother but less transparent to the
    source text.
