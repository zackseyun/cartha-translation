theological_decisions:
- issue: Temporal scope of Jesus' promise of future understanding
  chosen_reading: Rendered generally as future understanding without specifying whether
    it refers narrowly to the completion of the footwashing, the cross/resurrection,
    or the coming of the Spirit.
  alternative_readings:
  - Reference primarily to understanding after the footwashing explanation in 13:12-17
  - Reference primarily to post-resurrection understanding
  - Reference primarily to fuller understanding through the Spirit
  rationale: The Greek simply says 'after these things' and does not force a single
    theological timeline. The translation preserves that openness rather than resolving
    it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
