id: JHN.13.35
reference: John 13:35
source:
  edition: SBLGNT
  text: ἐν τούτῳ γνώσονται πάντες ὅτι ἐμοὶ μαθηταί ἐστε, ἐὰν ἀγάπην ἔχητε ἐν ἀλλήλοις.
translation:
  text: By this everyone will know that you are my disciples, if you have love for
    one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In this everyone will know' or 'By this means everyone will know.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'have love among one another'; that is, show mutual love.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: By this
  alternatives:
  - In this
  - By this means
  lexicon: BDAG
  rationale: The prepositional phrase is instrumental/demonstrative here, pointing
    to the identifying mark just stated. 'By this' is idiomatic English and best captures
    the sense that this is the means or evidence by which recognition occurs.
- source_word: γνώσονται
  chosen: will know
  alternatives:
  - will recognize
  - will come to know
  lexicon: BDAG
  rationale: Future middle of γινώσκω here denotes coming to know or recognizing a
    fact. 'Will know' is the most natural and sufficiently broad English rendering;
    'recognize' is possible but slightly more interpretive.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all people
  - all
  lexicon: BDAG
  rationale: Although formally masculine plural, the referent is generic. 'Everyone'
    communicates the universal scope in natural modern English without implying only
    males.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Standard content conjunction introducing what everyone will know.
- source_word: ἐμοὶ
  chosen: my
  alternatives:
  - belonging to me
  - mine
  lexicon: BDAG
  rationale: 'The dative with μαθηταί ἐστε functions possessively: ''you are my disciples.''
    This is the most idiomatic English expression.'
- source_word: μαθηταί
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and most accurate rendering for μαθηταί
    in the Gospels, preserving the teacher-follower relationship better than the flatter
    ''followers'' or the overly narrow ''learners''.'
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  - provided that
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. 'If' is the straightforward
    rendering in English.
- source_word: ἀγάπην
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' 'Charity' is archaic
    in contemporary English and would obscure the lexical connection to nearby Johannine
    usage.
- source_word: ἔχητε
  chosen: you have
  alternatives:
  - you possess
  - you hold
  lexicon: BDAG
  rationale: Simple present subjunctive after ἐάν. 'Have' is direct and idiomatic.
- source_word: ἐν ἀλλήλοις
  chosen: for one another
  alternatives:
  - among one another
  - among yourselves
  - in one another
  lexicon: BDAG
  rationale: Although literally 'in one another' or 'among one another,' in this context
    the phrase expresses mutual relational direction of love. 'For one another' is
    idiomatic English that clearly conveys reciprocal love without wooden awkwardness.
