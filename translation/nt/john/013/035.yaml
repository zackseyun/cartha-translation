theological_decisions:
- issue: Rendering the generic masculine πάντες
  chosen_reading: everyone
  alternative_readings:
  - all men
  - all people
  rationale: The Greek masculine plural is generic, not male-specific. Following the
    project's gender-accurate principle, 'everyone' preserves the universal sense
    without unnecessary masculine wording.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Nature of the condition introduced by ἐὰν
  chosen_reading: if you have love for one another
  alternative_readings:
  - when you have love for one another
  rationale: The clause states the identifying condition/evidence of discipleship,
    not a doctrinal mechanism of earning discipleship. 'If' preserves the Greek conditional
    form and the text's evidential force without importing merit theology.
  doctrine_reference: DOCTRINE.md § Affirmations; § Translation philosophy, point
    3
