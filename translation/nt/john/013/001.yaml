theological_decisions:
- issue: Meaning of εἰς τέλος in the climactic statement of Jesus' love
  chosen_reading: Rendered in the main text as 'to the end' to preserve both temporal and qualitative resonance.
  alternative_readings:
  - to the fullest extent
  - completely
  rationale: 'The phrase likely carries deliberate Johannine richness: Jesus loved his own through the final moment and with complete fullness. Following the philosophy of preserving theological tension rather than collapsing ambiguity, the main text retains the more literal wording and the qualitative sense is preserved in a footnote.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
