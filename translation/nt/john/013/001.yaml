id: JHN.13.1
reference: John 13:1
source:
  edition: SBLGNT
  text: Πρὸ δὲ τῆς ἑορτῆς τοῦ πάσχα εἰδὼς ὁ Ἰησοῦς ὅτι ⸀ἦλθεν αὐτοῦ ἡ ὥρα ἵνα μεταβῇ ἐκ τοῦ κόσμου τούτου πρὸς τὸν πατέρα ἀγαπήσας τοὺς ἰδίους τοὺς ἐν τῷ κόσμῳ εἰς τέλος ἠγάπησεν αὐτούς.
translation:
  text: Now before the Passover feast, Jesus, knowing that his hour had come to depart from this world to the Father, having loved his own who were in the world, he loved them to the end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the fullest extent' or 'completely.' The Greek phrase may express both enduring love to the final moment and love in its fullest measure.
    reason: lexical_alternative
  - marker: b
    text: Or 'having loved his own who were in the world, loved them to the end'.
    reason: previous_rendering
lexical_decisions:
- source_word: Πρὸ δὲ
  chosen: Now before
  alternatives:
  - Before
  - And before
  lexicon: BDAG
  rationale: Πρό with the genitive marks temporal priority ('before'), while δέ is a mild connective. 'Now before' preserves the discourse transition without overstating contrast.
- source_word: ἑορτῆς τοῦ πάσχα
  chosen: the Passover feast
  alternatives:
  - the feast of Passover
  - Passover
  lexicon: BDAG
  rationale: The genitive construction naturally means 'the feast of Passover.' 'Passover feast' is idiomatic English and preserves the festival sense of ἑορτή.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - being aware
  - having known
  lexicon: BDAG
  rationale: The participle is contemporaneous in sense with the main action and is best rendered 'knowing,' expressing Jesus' conscious awareness at this moment.
- source_word: ἦλθεν ... ἡ ὥρα
  chosen: his hour had come
  alternatives:
  - his hour came
  - the time had come for him
  lexicon: BDAG
  rationale: This is Johannine idiom for the decisive appointed moment of Jesus' passion, departure, and glorification. 'His hour had come' preserves the idiom and its theological resonance.
- source_word: μεταβῇ
  chosen: to depart
  alternatives:
  - to pass over
  - to go
  - to move on
  lexicon: BDAG
  rationale: In context, μεταβαίνω refers to transition from this world to the Father. 'Depart' captures both movement and the solemnity of Jesus' impending death/exaltation without over-paraphrasing.
- source_word: ἐκ τοῦ κόσμου τούτου
  chosen: from this world
  alternatives:
  - out of this world
  lexicon: BDAG
  rationale: κόσμος here denotes the present world order or earthly sphere. 'From this world' is natural English and preserves the contrast with 'to the Father.'
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to his Father
  lexicon: BDAG
  rationale: The article with πατήρ in John often functions as a relational title. 'To the Father' preserves Johannine style and theological weight better than the more interpretive 'his Father.'
- source_word: ἀγαπήσας
  chosen: having loved
  alternatives:
  - after loving
  - because he loved
  lexicon: BDAG
  rationale: 'The aorist participle is best taken as antecedent or summary circumstance: Jesus'' prior love for his own forms the basis for the climactic statement that follows. ''Having loved'' preserves the participial structure.'
- source_word: τοὺς ἰδίους
  chosen: his own
  alternatives:
  - his own people
  - his own disciples
  lexicon: BDAG
  rationale: The phrase is intentionally broad and relational. While the immediate context centers on the disciples, 'his own' preserves the Greek's compactness and avoids narrowing the referent beyond the text.
- source_word: τοὺς ἐν τῷ κόσμῳ
  chosen: who were in the world
  alternatives:
  - those in the world
  - who were in this world
  lexicon: BDAG
  rationale: This attributive phrase identifies 'his own' as those still located in the earthly sphere. 'Who were in the world' is clear and keeps the relative force.
- source_word: εἰς τέλος
  chosen: to the end
  alternatives:
  - to the fullest extent
  - completely
  lexicon: BDAG
  rationale: The phrase can denote either temporal completion ('to the end') or qualitative fullness ('completely'). The main text keeps the more literal and traditional rendering, preserving the ambiguity; the fuller alternative is worth noting in a footnote.
- source_word: ἠγάπησεν αὐτούς
  chosen: loved them
  alternatives:
  - showed love to them
  lexicon: BDAG
  rationale: ἀγαπάω should be rendered with the cognate 'love' per translation philosophy and lexical consistency. The simple past fits the narrative summary.
