  category: awkward_english
  tier: 1
  from: having loved his own who were in the world, loved them to the end
  to: having loved his own who were in the world, he loved them to the end
  rationale: The subject 'Jesus' is separated from its main verb 'loved' by two long participial clauses. In English prose, when a subject is so distant from its predicate, it is common and stylistically clearer to reintroduce the subject with a pronoun ('he'). This small addition makes the main clause ('he loved them to the end') stand out more clearly as the sentence's climax, rather than feeling like a clause tacked onto the end of a long list of descriptions.
