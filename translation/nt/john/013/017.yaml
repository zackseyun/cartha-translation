theological_decisions:
- issue: Rendering of μακάριοι in a discipleship context
  chosen_reading: blessed
  alternative_readings:
  - happy
  - fortunate
  rationale: The verse speaks of the state of those who not only know Jesus' teaching
    but practice it. 'Blessed' preserves the biblical-theological sense of favor and
    flourishing under God rather than reducing the statement to emotion.
  doctrine_reference: Translation philosophy §6; Contested terms table principle of
    preserving theological weight in accessible English
