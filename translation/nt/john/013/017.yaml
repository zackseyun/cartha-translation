id: JHN.13.17
reference: John 13:17
source:
  edition: SBLGNT
  text: εἰ ταῦτα οἴδατε, μακάριοί ἐστε ἐὰν ποιῆτε αὐτά.
translation:
  text: If you know these things, you are blessed if you do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy' or 'fortunate'; Greek 'blessed' carries the sense of being in
      a favored or flourishing state, not merely feeling happy.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a conditional clause. A straightforward conditional 'if' best
    matches the Greek syntax.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to Jesus' preceding example
    and teaching. 'These things' preserves the plural form and the slightly formal
    demonstrative force better than collapsing to singular 'this'.
- source_word: οἴδατε
  chosen: you know
  alternatives:
  - you have understood
  lexicon: BDAG
  rationale: From οἶδα, commonly expressing knowledge or awareness. 'You know' is
    the most direct rendering; while context includes understanding, the verb itself
    is not explicitly 'understand.'
- source_word: μακάριοί
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: μακάριος often denotes a state of divine favor or blessedness, not merely
    subjective happiness. 'Blessed' preserves the theological and biblical resonance
    better than 'happy'.
- source_word: ἐστε
  chosen: you are
  lexicon: BDAG
  rationale: Present indicative of 'to be'; simple copular rendering is sufficient.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: With the present subjunctive ποιῆτε, ἐὰν marks a contingent condition.
    English 'if' is the most natural equivalent here.
- source_word: ποιῆτε
  chosen: you do
  alternatives:
  - you practice
  - you carry out
  lexicon: BDAG
  rationale: ποιέω here refers to putting Jesus' teaching into action. 'Do' is idiomatic,
    concise, and preserves the practical emphasis without overinterpreting.
- source_word: αὐτά
  chosen: them
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Pronoun referring back to ταῦτα. 'Them' avoids unnecessary repetition
    in English while clearly maintaining the antecedent.
