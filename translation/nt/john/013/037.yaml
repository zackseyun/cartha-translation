theological_decisions:
- issue: Meaning of ψυχή in Peter's declaration
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - my soul
  rationale: The immediate context concerns Peter's willingness to die for Jesus,
    and the idiom τίθημι τὴν ψυχήν means to lay down one's life. Rendering 'soul'
    would sound more metaphysical than the Greek intends here.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of ἀκολουθέω
  chosen_reading: Rendered 'follow' to preserve both literal and discipleship sense
  alternative_readings:
  - accompany
  - go with
  rationale: Jesus has spoken of where he is going and Peter's inability to follow
    now; the verb carries both spatial and discipleship resonance in John. 'Follow'
    preserves the theological tension rather than flattening it to mere movement.
  doctrine_reference: Translation philosophy §3
