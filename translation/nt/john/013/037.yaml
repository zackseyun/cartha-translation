id: JHN.13.37
reference: John 13:37
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ⸀ὁ Πέτρος· Κύριε, διὰ τί οὐ δύναμαί σοι ⸀ἀκολουθῆσαι ἄρτι; τὴν
    ψυχήν μου ὑπὲρ σοῦ θήσω.
translation:
  text: Peter said to him, “Lord, why am I not able to follow you now? I will lay
    down my life for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Why can I not follow you right now?'
    reason: lexical_alternative
  - marker: b
    text: Greek 'my soul'; in this idiom the sense is 'my life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally renders it as past tense here. This preserves sense without
    awkwardness.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus, this preserves both respect and possible theological weight without overinterpreting.
- source_word: διὰ τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the interrogative phrase.
- source_word: οὐ δύναμαί
  chosen: am I not able
  alternatives:
  - can I not
  - am I unable
  lexicon: BDAG
  rationale: This closely reflects the Greek construction while remaining natural
    English. 'Can I not' is possible, but 'am I not able' better mirrors δύναμαι.
- source_word: σοι ἀκολουθῆσαι
  chosen: to follow you
  alternatives:
  - to accompany you
  - to go with you
  lexicon: BDAG
  rationale: ἀκολουθέω in Johannine context commonly means 'follow,' with discipleship
    overtones as well as literal following. 'Follow you' preserves both layers.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - right now
  - at this moment
  lexicon: BDAG
  rationale: Simple, natural rendering of the temporal adverb. 'Now' is sufficiently
    immediate in context.
- source_word: τὴν ψυχήν μου
  chosen: my life
  alternatives:
  - my soul
  lexicon: BDAG
  rationale: ψυχή can mean 'life' or 'soul'; in the idiom 'lay down one's ψυχή,' 'life'
    is the clear sense, referring to one's life being given up in death.
- source_word: ὑπὲρ σοῦ
  chosen: for you
  alternatives:
  - on your behalf
  - for your sake
  lexicon: BDAG
  rationale: ὑπέρ here expresses acting for another's benefit or in another's place
    in a broad sense. 'For you' is the most natural English rendering and leaves the
    exact nuance appropriately open.
- source_word: θήσω
  chosen: I will lay down
  alternatives:
  - I will place
  - I will give up
  lexicon: BDAG
  rationale: In combination with ψυχήν, τίθημι forms the idiom 'lay down [one's life].'
    This is both accurate and established English.
