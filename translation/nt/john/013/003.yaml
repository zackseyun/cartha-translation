id: JHN.13.3
reference: John 13:3
source:
  edition: SBLGNT
  text: ⸀εἰδὼς ὅτι πάντα ⸀ἔδωκεν αὐτῷ ὁ πατὴρ εἰς τὰς χεῖρας, καὶ ὅτι ἀπὸ θεοῦ ἐξῆλθεν
    καὶ πρὸς τὸν θεὸν ὑπάγει,
translation:
  text: Jesus, knowing that the Father had given all things into his hands, and that
    he had come from God and was going to God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he came forth from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was going back to God'; the Greek says simply 'was going to God.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - being aware
  - having known
  lexicon: BDAG
  rationale: A participial form introducing the circumstance for the following action
    in context. 'Knowing' is natural English and preserves the causal/background force
    without overtranslating tense.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The neuter plural is best represented explicitly as 'all things,' preserving
    the comprehensive scope of what the Father had entrusted to him.
- source_word: ἔδωκεν
  chosen: had given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Although formally aorist, English pluperfect fits the discourse relation
    after 'knowing that,' indicating a prior completed act relative to the scene.
- source_word: εἰς τὰς χεῖρας
  chosen: into his hands
  alternatives:
  - into his power
  - under his control
  lexicon: BDAG
  rationale: The idiom is retained literally because it is clear in English and preserves
    the concrete metaphor of authority/entrustment without flattening it into abstraction.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - his Father
  lexicon: BDAG
  rationale: The Greek has the articular noun 'the Father' rather than an explicit
    possessive. In Johannine context this title is theologically weighty and should
    be preserved as such.
- source_word: ἀπὸ θεοῦ
  chosen: from God
  alternatives:
  - from the Father
  - from God's presence
  lexicon: BDAG
  rationale: The text says 'from God,' not 'from the Father.' Preserving 'God' maintains
    the wording of the Greek and the Johannine theological formulation.
- source_word: ἐξῆλθεν
  chosen: had come
  alternatives:
  - came forth
  - went out
  lexicon: BDAG
  rationale: In Johannine usage this verb often denotes origin or mission. 'Had come'
    is idiomatic English and communicates provenance without archaic phrasing like
    'came forth.'
- source_word: πρὸς τὸν θεὸν
  chosen: to God
  alternatives:
  - to be with God
  - toward God
  lexicon: BDAG
  rationale: The preposition πρός can imply movement toward or relation with; here
    'to God' is the most direct and natural rendering, while the fuller relational
    nuance is not excluded.
- source_word: ὑπάγει
  chosen: was going
  alternatives:
  - was departing
  - was going away
  lexicon: BDAG
  rationale: Present tense in narrative is well represented by 'was going,' which
    preserves the sense of imminent departure without adding interpretive detail.
