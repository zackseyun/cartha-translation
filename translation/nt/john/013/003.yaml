theological_decisions:
- issue: Christological origin language in ἀπὸ θεοῦ ἐξῆλθεν
  chosen_reading: he had come from God
  alternative_readings:
  - he came forth from God
  rationale: The wording should preserve John's strong statement of Jesus's divine
    origin/mission without importing later doctrinal formulations not explicit in
    the verse. 'From God' is retained exactly, and 'had come' gives idiomatic English
    while leaving the theological weight intact.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Destination language in πρὸς τὸν θεὸν ὑπάγει
  chosen_reading: was going to God
  alternative_readings:
  - was going back to God
  - was departing to be with God
  rationale: The verse indicates Jesus's return/destination in relation to God, but
    adding 'back' would make explicit a nuance many infer from context rather than
    from this clause alone. The translation preserves the theological tension and
    avoids over-specification.
  doctrine_reference: Translation philosophy §3
