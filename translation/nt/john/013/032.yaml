id: JHN.13.32
reference: John 13:32
source:
  edition: SBLGNT
  text: ⸂εἰ ὁ θεὸς ἐδοξάσθη ἐν αὐτῷ,⸃ καὶ ὁ θεὸς δοξάσει αὐτὸν ἐν ⸀αὑτῷ, καὶ εὐθὺς
    δοξάσει αὐτόν.
translation:
  text: If God was glorified in him, God will also glorify him in himself, and will
    glorify him at once.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Since God was glorified in him.' The Greek uses εἰ ('if'), though in
      context the condition is likely assumed as true.
    reason: alternative_reading
  - marker: b
    text: Or, 'in himself' may be understood as 'with himself' or 'by himself'; the
      Greek expression is compact and theologically dense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: If
  alternatives:
  - Since
  lexicon: BDAG
  rationale: Rendered as the straightforward conditional/concessive particle 'if.'
    In context some take it as assuming the condition to be true ('since'), but the
    Greek form itself is εἰ, not an explicit causal conjunction. Preserving 'if' keeps
    the Greek wording while allowing the implied certainty to be heard from context.
- source_word: ἐδοξάσθη
  chosen: was glorified
  alternatives:
  - has been glorified
  lexicon: BDAG
  rationale: Aorist passive indicative of δοξάζω. 'Was glorified' is the most natural
    English rendering here, preserving the passive voice and the completed verbal
    aspect without overinterpreting the timing.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - through him
  lexicon: BDAG
  rationale: ἐν with the dative is rendered 'in him' as the default, preserving the
    Greek preposition and Johannine idiom of mutual indwelling/glorification. 'Through
    him' is possible contextually but is more interpretive.
- source_word: δοξάσει
  chosen: will glorify
  alternatives:
  - will honor
  lexicon: BDAG
  rationale: Future active of δοξάζω. 'Will glorify' preserves the theological and
    lexical continuity with the preceding clause and with Johannine usage; 'honor'
    is too weak for this context.
- source_word: ἐν ἑαυτῷ
  chosen: in himself
  alternatives:
  - by himself
  - with himself
  lexicon: BDAG
  rationale: The reflexive pronoun refers back to God, so 'in himself' best reflects
    the Greek wording and preserves the dense theological language of divine self-glorification.
    Alternatives such as 'with himself' or 'by himself' are interpretive expansions.
- source_word: εὐθύς
  chosen: at once
  alternatives:
  - immediately
  - soon
  lexicon: BDAG
  rationale: '''At once'' gives clear modern English for εὐθύς and preserves the sense
    of immediacy. ''Immediately'' is also possible but slightly stiffer in style.'
