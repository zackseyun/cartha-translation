theological_decisions:
- issue: Conditional force of εἰ in a context where Jesus speaks of a reality already
    set in motion
  chosen_reading: Retain 'If God was glorified in him' in the main text
  alternative_readings:
  - Since God was glorified in him
  rationale: The context strongly implies the condition is true, and many English
    versions therefore use 'since.' However, preserving 'if' better reflects the Greek
    particle εἰ and avoids resolving the syntax beyond what the text explicitly states.
    The contextual alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
