theological_decisions:
- issue: Rendering of ψυχή in a discipleship/self-sacrifice context
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse concerns Peter's claim of willingness to die for Jesus. Rendering
    ψυχή as 'life' preserves the concrete sacrificial meaning and avoids importing
    a narrower anthropological sense not required by the context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
