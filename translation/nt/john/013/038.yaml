id: JHN.13.38
reference: John 13:38
source:
  edition: SBLGNT
  text: ⸀ἀποκρίνεται Ἰησοῦς· Τὴν ψυχήν σου ὑπὲρ ἐμοῦ θήσεις; ἀμὴν ἀμὴν λέγω σοι, οὐ
    μὴ ἀλέκτωρ φωνήσῃ ἕως οὗ ⸀ἀρνήσῃ με τρίς.
translation:
  text: Jesus answered, “Will you lay down your life for me? Truly, truly, I say to
    you, the rooster will certainly not crow until you have denied me three times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “soul”: “Will you lay down your soul for me?” The Greek ψυχή can mean
      “soul” or “life”; here the sense is giving up one’s life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκρίνεται
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: BDAG
  rationale: Standard narrative use of ἀποκρίνομαι introducing Jesus' response. English
    past tense is natural in narrative despite the Greek historical present.
- source_word: ψυχήν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In the idiom τίθημι τὴν ψυχήν, the sense is to give up one's life, not
    specifically the immaterial soul. 'Life' best conveys the sacrificial sense in
    idiomatic English.
- source_word: ὑπὲρ ἐμοῦ
  chosen: for me
  alternatives:
  - on my behalf
  lexicon: BDAG
  rationale: ὑπέρ here expresses representation/benefit. 'For me' is the most natural
    concise rendering in Jesus' rhetorical question.
- source_word: θήσεις
  chosen: will you lay down
  alternatives:
  - will you place
  - will you give
  lexicon: BDAG
  rationale: τίθημι in this idiom means 'lay down' one's life. This preserves the
    established Johannine expression without paraphrase.
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: A solemn emphatic formula characteristic of Jesus in John. 'Truly, truly'
    is clear modern English while preserving the repetition.
- source_word: οὐ μὴ
  chosen: will certainly not
  alternatives:
  - will by no means
  - will never
  lexicon: BDAG
  rationale: οὐ μή with the following verb gives strong negation. 'Will certainly
    not' preserves the emphatic force without sounding archaic.
- source_word: ἀλέκτωρ
  chosen: rooster
  alternatives:
  - cock
  lexicon: BDAG
  rationale: '''Rooster'' is standard contemporary English and avoids archaic or potentially
    distracting wording.'
- source_word: φωνήσῃ
  chosen: crow
  alternatives:
  - call out
  lexicon: BDAG
  rationale: With ἀλέκτωρ, the verb refers to the rooster's cry; 'crow' is the idiomatic
    English equivalent.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: Temporal marker indicating the point up to which the negated action will
    not occur. 'Until' is the direct and accurate rendering.
- source_word: ἀρνήσῃ με
  chosen: you have denied me
  alternatives:
  - you deny me
  - you disown me
  lexicon: BDAG
  rationale: ἀρνέομαι means to deny or repudiate. 'Denied me' is the most direct rendering;
    the English perfect after 'until' is idiomatic and marks the action as completed
    before the rooster crows.
- source_word: τρίς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: Modern English prefers 'three times'; 'thrice' is archaic.
