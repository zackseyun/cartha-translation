id: JHN.13.13
reference: John 13:13
source:
  edition: SBLGNT
  text: ὑμεῖς φωνεῖτέ με Ὁ διδάσκαλος καὶ Ὁ κύριος, καὶ καλῶς λέγετε, εἰμὶ γάρ.
translation:
  text: You call me Teacher and Lord, and you speak rightly, for I am.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Master.' Greek kyrios can denote authority or lordship; here 'Lord'
      is retained as the default title rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνεῖτέ
  chosen: call
  alternatives:
  - address
  - name
  lexicon: BDAG
  rationale: In this construction with a double accusative/complement ('call me X
    and Y'), 'call' is the most natural English equivalent and preserves the directness
    of Jesus' statement.
- source_word: Ὁ διδάσκαλος
  chosen: Teacher
  alternatives:
  - the Teacher
  - Master
  lexicon: BDAG
  rationale: As a title used in direct reference to Jesus, 'Teacher' is the clearest
    modern English rendering. The article in Greek marks the title, but idiomatic
    English omits 'the' after 'call me.' 'Master' is possible historically but is
    less precise and may overlap confusingly with κύριος.
- source_word: Ὁ κύριος
  chosen: Lord
  alternatives:
  - the Lord
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it functions as
    a christological title claimed by Jesus. English idiom again omits the article
    after 'call me.' 'Master' is preserved as an alternative footnote because some
    readers may hear a social-status nuance, but 'Lord' best matches NT title usage.
- source_word: καλῶς
  chosen: rightly
  alternatives:
  - well
  - correctly
  lexicon: BDAG
  rationale: '''Rightly'' conveys correctness of their confession more naturally than
    the adverb ''well'' in contemporary English, while preserving the evaluative force.'
- source_word: λέγετε
  chosen: you speak
  alternatives:
  - you say
  lexicon: BDAG
  rationale: Combined with καλῶς, 'you speak rightly' is idiomatic and slightly more
    natural than 'you say rightly,' while still reflecting the verb λέγω.
- source_word: εἰμὶ γάρ
  chosen: for I am
  alternatives:
  - for so I am
  - for that is what I am
  lexicon: BDAG
  rationale: The concise 'for I am' closely follows the Greek and preserves the emphatic
    self-identification without adding explanatory words not present in the text.
    More expansive English alternatives are interpretive.
