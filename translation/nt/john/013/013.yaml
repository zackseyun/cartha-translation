theological_decisions:
- issue: Rendering κύριος as a title for Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse presents Jesus affirming the disciples' use of κύριος for him.
    Following the doctrine table, the default rendering is 'Lord.' This preserves
    the title's theological weight without over-expanding its implications beyond
    the verse itself.
