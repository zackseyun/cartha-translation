id: JHN.13.29
reference: John 13:29
source:
  edition: SBLGNT
  text: τινὲς γὰρ ἐδόκουν, ἐπεὶ τὸ γλωσσόκομον ⸀εἶχεν Ἰούδας, ὅτι λέγει αὐτῷ ⸀ὁ Ἰησοῦς·
    Ἀγόρασον ὧν χρείαν ἔχομεν εἰς τὴν ἑορτήν, ἢ τοῖς πτωχοῖς ἵνα τι δῷ.
translation:
  text: For some thought, because Judas had the money box, that Jesus was telling
    him, “Buy what we need for the feast,” or that he should give something to the
    poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'moneybag.' The Greek term refers to the container holding the group's
      funds.
    reason: lexical_alternative
  - marker: b
    text: '''The feast'' refers to the festival meal context of Passover in this section.'
    reason: cross_reference
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - some of them
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to some among those present; 'some' is concise
    and natural in English.
- source_word: ἐδόκουν
  chosen: thought
  alternatives:
  - supposed
  - assumed
  lexicon: BDAG
  rationale: Imperfect indicates ongoing or inceptive perception in narrative; 'thought'
    fits idiomatic English without overtranslating aspect.
- source_word: ἐπεὶ
  chosen: because
  alternatives:
  - since
  lexicon: BDAG
  rationale: 'Here it gives the reason for their assumption: Judas had charge of the
    money box.'
- source_word: γλωσσόκομον
  chosen: money box
  alternatives:
  - moneybag
  - money chest
  - common purse
  lexicon: BDAG
  rationale: Refers to the group's money container. 'Money box' is a transparent rendering
    close to the Greek and avoids importing a more specific image than the term requires.
    'Moneybag' is common in English tradition and preserved as an alternative.
- source_word: εἶχεν
  chosen: had
  alternatives:
  - kept
  - was in charge of
  lexicon: BDAG
  rationale: The verb is simply 'had/held.' The context implies possession or custody
    of the money box; the English keeps the basic verb and lets context supply the
    nuance.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus was telling him
  alternatives:
  - Jesus said to him
  - Jesus was saying to him
  lexicon: BDAG
  rationale: The historical present λέγει is naturally rendered in English narrative
    as past tense. 'Was telling him' reflects the content clause introduced by ὅτι
    and fits the disciples' inference about what Jesus meant.
- source_word: Ἀγόρασον
  chosen: Buy
  alternatives:
  - Purchase
  lexicon: BDAG
  rationale: Aorist imperative calling for a simple command; 'Buy' is direct, natural,
    and appropriately modern.
- source_word: ὧν χρείαν ἔχομεν
  chosen: what we need
  alternatives:
  - the things we need
  - what we have need of
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the relative construction plus χρεία.
    'What we need' is clear and faithful without sounding wooden.
- source_word: εἰς τὴν ἑορτήν
  chosen: for the feast
  alternatives:
  - for the festival
  lexicon: BDAG
  rationale: ἑορτή denotes a religious feast/festival. In Johannine context this is
    the Passover setting; 'feast' is concise and natural, while not adding 'Passover'
    where the verse itself does not explicitly repeat it.
- source_word: τοῖς πτωχοῖς
  chosen: to the poor
  alternatives:
  - for the poor
  lexicon: BDAG
  rationale: Standard substantive use of the adjective meaning poor people. 'To the
    poor' fits the following verb 'give' most directly.
- source_word: ἵνα τι δῷ
  chosen: that he should give something
  alternatives:
  - that he might give something
  - to give something
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses intended action as understood by the disciples.
    'That he should give something' preserves the indirect-speech sense in smooth
    English.
