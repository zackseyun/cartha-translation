id: JHN.13.14
reference: John 13:14
source:
  edition: SBLGNT
  text: εἰ οὖν ἐγὼ ἔνιψα ὑμῶν τοὺς πόδας ὁ κύριος καὶ ὁ διδάσκαλος, καὶ ὑμεῖς ὀφείλετε
    ἀλλήλων νίπτειν τοὺς πόδας·
translation:
  text: If I then, the Lord and the Teacher, have washed your feet, you also ought
    to wash one another’s feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Master.' Greek κύριος is rendered 'Lord' here in keeping with its
      usual title sense and the project's default practice.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ οὖν
  chosen: If ... then
  alternatives:
  - Therefore if
  - If therefore
  lexicon: BDAG
  rationale: Represents the conditional particle εἰ with inferential οὖν in natural
    English while preserving the logical force of Jesus' argument.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained in English because it contributes emphasis
    in the Greek, especially in contrast with the disciples' obligation.
- source_word: ἔνιψα
  chosen: have washed
  alternatives:
  - washed
  lexicon: BDAG
  rationale: The aorist refers to the completed act just performed. English present
    perfect fits the immediate discourse context naturally ('have washed') while preserving
    completed action with present relevance.
- source_word: ὑμῶν τοὺς πόδας
  chosen: your feet
  alternatives:
  - the feet of you
  lexicon: BDAG
  rationale: Idiomatic English possessive rendering accurately reflects the genitive
    pronoun with the direct object.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' In this
    context it functions as a title Jesus applies to himself, matching the disciples'
    address in the surrounding passage.
- source_word: ὁ διδάσκαλος
  chosen: the Teacher
  alternatives:
  - the teacher
  - the master
  lexicon: BDAG
  rationale: Translated as a title rather than transliterated or paraphrased. Capitalized
    to match its titular use alongside 'the Lord' in reference to Jesus.
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  - you yourselves also
  lexicon: BDAG
  rationale: 'Captures both the conjunction and the emphatic pronoun, preserving the
    responsive force: as Jesus has acted, so they are likewise obligated.'
- source_word: ὀφείλετε
  chosen: ought to
  alternatives:
  - are obligated to
  - must
  lexicon: BDAG
  rationale: Expresses moral obligation without overstating into a harsher imperative
    than the Greek indicative of indebted obligation requires.
- source_word: ἀλλήλων
  chosen: one another’s
  alternatives:
  - each other's
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English; the possessive form fits the
    construction with 'feet.'
- source_word: νίπτειν τοὺς πόδας
  chosen: to wash ... feet
  alternatives:
  - to wash the feet
  lexicon: BDAG
  rationale: νίπτω commonly refers to washing a part of the body rather than bathing
    the whole person; 'wash feet' preserves the concrete act and its symbolic force
    in context.
