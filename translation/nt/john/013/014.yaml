theological_decisions:
- issue: Rendering of κύριος as a christological title
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The doctrine guidelines specify κύριος → 'Lord' as the default. Here
    the title contributes to the contrast between Jesus' exalted status and his humble
    action, which grounds the disciples' obligation.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Nature of the command about foot washing
  chosen_reading: Retain the concrete act 'wash one another’s feet' without reducing
    it to a generalized metaphor in the main text
  alternative_readings:
  - serve one another humbly
  rationale: The Greek explicitly names foot washing. While the act has exemplary
    significance, the translation should not paraphrase it into a broader application
    that the text itself does not state in this verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Never paraphrase beyond what the source text warrants'
