theological_decisions:
- issue: Relation of Jesus' choosing to the betrayer
  chosen_reading: Translate ἐξελεξάμην straightforwardly as 'I have chosen' without
    importing a doctrinal explanation of election or excluding Judas in the wording.
  alternative_readings:
  - Render in a way that implies salvific election specifically
  - Render in a way that implies only appointment to apostleship
  rationale: The verse states that Jesus knows whom he has chosen, in immediate context
    including the betrayer, but does not itself define the theological category of
    'chosen.' Per doctrine, the translation preserves the tension rather than resolving
    denominational debates about election or apostasy.
  doctrine_reference: Translation philosophy §3
- issue: Force of ἀλλ’ ἵνα in relation to betrayal and Scripture
  chosen_reading: Render as 'But this is so that the Scripture may be fulfilled' to
    preserve the text's statement of scriptural fulfillment without expanding into
    a deterministic theological paraphrase.
  alternative_readings:
  - But in order that the Scripture would be fulfilled
  - Yet this happened because the Scripture had to come true
  rationale: The Greek presents fulfillment language, but the translation should not
    add explanatory claims about causation beyond the text. This preserves Johannine
    fulfillment theology while avoiding overstatement.
  doctrine_reference: Translation philosophy §1, §3
