id: JHN.13.18
reference: John 13:18
source:
  edition: SBLGNT
  text: οὐ περὶ πάντων ὑμῶν λέγω· ἐγὼ οἶδα ⸀τίνας ἐξελεξάμην· ἀλλ’ ἵνα ἡ γραφὴ πληρωθῇ·
    Ὁ τρώγων ⸀μου τὸν ἄρτον ἐπῆρεν ἐπ’ ἐμὲ τὴν πτέρναν αὐτοῦ.
translation:
  text: 'I am not speaking about all of you. I know whom I have chosen. But this is
    so that the Scripture may be fulfilled: ‘The one who eats my bread has lifted
    up his heel against me.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I do not speak concerning all of you.'
    reason: lexical_alternative
  - marker: b
    text: Quotation/allusion to Psalm 41:9.
    reason: cross_reference
  - marker: c
    text: Or 'has raised his heel against me.' The expression is an idiom of hostility
      and betrayal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ περὶ πάντων ὑμῶν λέγω
  chosen: I am not speaking about all of you
  alternatives:
  - I do not speak concerning all of you
  - I am not referring to all of you
  lexicon: BDAG
  rationale: Uses natural modern English while preserving the scope of negation and
    the prepositional sense of περὶ ('about/concerning'). Present tense λέγω is rendered
    as progressive English for idiomatic discourse context.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I have known
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect in form, it functions with present
    meaning in Koine; 'I know' is the standard sense here.
- source_word: τίνας ἐξελεξάμην
  chosen: whom I have chosen
  alternatives:
  - those whom I chose
  - who I chose
  lexicon: BDAG
  rationale: Retains the personal object ('whom') and the force of ἐκλέγομαι as 'choose/select.'
    English present perfect fits the continuing relevance of Jesus' prior choosing.
- source_word: ἀλλ’ ἵνα
  chosen: But this is so that
  alternatives:
  - but so that
  - but in order that
  lexicon: BDAG
  rationale: Makes explicit the clause connection in readable English without over-paraphrasing.
    The phrase introduces divine/scriptural purpose or result in context.
- source_word: ἡ γραφὴ πληρωθῇ
  chosen: the Scripture may be fulfilled
  alternatives:
  - the Scripture might be fulfilled
  - the writing may be fulfilled
  lexicon: BDAG
  rationale: γραφή in Johannine usage commonly refers to Scripture as sacred writ.
    Passive subjunctive πληρωθῇ is well represented by 'may be fulfilled.'
- source_word: Ὁ τρώγων μου τὸν ἄρτον
  chosen: The one who eats my bread
  alternatives:
  - He who eats my bread
  - The one eating my bread
  lexicon: BDAG
  rationale: 'Substantival participle rendered inclusively but accurately as ''The
    one who...''. τρώγω is a vivid verb for eating/chewing, but ''eats'' is the most
    natural English here. Possessive μου is taken with ἄρτον: ''my bread.'''
- source_word: ἐπῆρεν ἐπ’ ἐμὲ τὴν πτέρναν αὐτοῦ
  chosen: has lifted up his heel against me
  alternatives:
  - has raised his heel against me
  - has turned his heel against me
  lexicon: BDAG
  rationale: Preserves the metaphor from the Psalm citation (Ps 41:9 LXX/MT 41:10
    Eng). 'Lifted up his heel against me' is understandable in English and retains
    the betrayal imagery better than a flattened paraphrase.
