theological_decisions:
- issue: Identification of Judas in the final phrase
  chosen_reading: Rendered as 'Judas, the son of Simon Iscariot'
  alternative_readings:
  - '''Judas Iscariot, Simon''s son'''
  rationale: The Greek genitives Σίμωνος Ἰσκαριώτου most directly read as 'of Simon
    Iscariot.' Since the syntax can be understood either as Simon bearing the epithet
    or as the traditional designation 'Judas Iscariot, son of Simon,' the main text
    follows the immediate grammatical construction, and the traditional alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
