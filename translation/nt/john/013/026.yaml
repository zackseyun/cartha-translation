id: JHN.13.26
reference: John 13:26
source:
  edition: SBLGNT
  text: ⸀ἀποκρίνεται ὁ Ἰησοῦς· Ἐκεῖνός ἐστιν ᾧ ἐγὼ ⸀βάψω τὸ ψωμίον ⸂καὶ δώσω αὐτῷ⸃·
    ⸂βάψας οὖν⸃ τὸ ⸀ψωμίον δίδωσιν Ἰούδᾳ Σίμωνος ⸀Ἰσκαριώτου.
translation:
  text: Jesus answers, “It is the one to whom I will dip the piece of bread and give
    it.” So when he had dipped the piece of bread, he gives it to Judas, the son of
    Simon Iscariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Judas Iscariot, Simon's son.' The Greek wording can be taken either
      way.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκρίνεται
  chosen: answers
  alternatives:
  - answered
  - replies
  lexicon: BDAG
  rationale: Present-tense historical narrative in Greek is naturally rendered in
    English as a vivid present or simple present here. 'Answers' preserves the immediacy
    without awkwardness.
- source_word: Ἐκεῖνός ἐστιν
  chosen: It is the one
  alternatives:
  - He is the one
  - That is the one
  lexicon: BDAG
  rationale: The demonstrative plus copula identifies a person. 'It is the one' is
    idiomatic in English after a question about identity, while still preserving the
    identifying force.
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - for whom
  lexicon: BDAG
  rationale: Dative relative pronoun governed by the giving action; 'to whom' best
    fits the sense with both 'dip' and 'give' in English.
- source_word: βάψω
  chosen: will dip
  alternatives:
  - dip
  lexicon: BDAG
  rationale: Future indicative should be represented explicitly. 'Dip' refers to dipping
    food, not ritual washing or baptism.
- source_word: ψωμίον
  chosen: piece of bread
  alternatives:
  - morsel
  - piece
  - bite of bread
  lexicon: BDAG
  rationale: ψωμίον denotes a small piece or morsel of bread/food. 'Piece of bread'
    is clear modern English; 'morsel' is possible but less natural for the target
    audience.
- source_word: καὶ δώσω αὐτῷ
  chosen: and give it
  alternatives:
  - and give it to him
  lexicon: BDAG
  rationale: The object 'it' is supplied in English from the preceding ψωμίον. The
    indirect object is then expressed in the relative clause by 'to whom'; repeating
    'to him' would be redundant.
- source_word: βάψας οὖν
  chosen: So when he had dipped
  alternatives:
  - Then, after dipping
  - So having dipped
  lexicon: BDAG
  rationale: Aorist participle with οὖν indicates antecedent action followed by the
    main verb. 'So when he had dipped' is natural English and preserves sequence.
- source_word: δίδωσιν
  chosen: he gives
  alternatives:
  - he gave
  lexicon: BDAG
  rationale: Another historical present. 'He gives' preserves Johannine vividness
    and matches the present 'answers' earlier in the verse.
- source_word: Ἰούδᾳ Σίμωνος Ἰσκαριώτου
  chosen: to Judas, the son of Simon Iscariot
  alternatives:
  - to Judas son of Simon Iscariot
  - to Judas Iscariot, Simon's son
  lexicon: BDAG
  rationale: The genitives identify Judas by his father and epithet. 'The son of Simon
    Iscariot' follows the Greek order closely enough while remaining clear in English.
    It avoids prematurely deciding whether 'Iscariot' modifies Simon or Judas beyond
    the immediate Greek construction, while still conveying the familial identification
    idiomatically.
