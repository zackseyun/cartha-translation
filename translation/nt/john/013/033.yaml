theological_decisions:
- issue: Rendering of Ἰουδαίοις in Johannine context
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  rationale: The Greek term is literally 'the Jews.' While in John the referent can
    at times be narrower than the whole Jewish people, this verse explicitly recalls
    an earlier statement and does not itself justify narrowing the term. To avoid
    importing an interpretive restriction not demanded by the text, the main text
    keeps 'the Jews,' with the contextual alternative preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
