id: JHN.13.33
reference: John 13:33
source:
  edition: SBLGNT
  text: τεκνία, ἔτι μικρὸν μεθ’ ὑμῶν εἰμι· ζητήσετέ με, καὶ καθὼς εἶπον τοῖς Ἰουδαίοις
    ὅτι Ὅπου ⸂ἐγὼ ὑπάγω⸃ ὑμεῖς οὐ δύνασθε ἐλθεῖν, καὶ ὑμῖν λέγω ἄρτι.
translation:
  text: Little children, I am with you a little while longer. You will seek me, and
    just as I said to the Jews, ‘Where I am going, you are not able to come,’ so now
    I also say to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jewish leaders,' since in John 'the Jews' can sometimes refer more
      specifically to the Judean authorities depending on context.
    reason: alternative_reading
  - marker: b
    text: Or more simply, 'you cannot come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνία
  chosen: Little children
  alternatives:
  - Children
  - Dear children
  lexicon: BDAG
  rationale: Vocative plural diminutive of τεκνίον, expressing tender affection. 'Little
    children' preserves both the familial metaphor and the diminutive force better
    than the flatter 'children'; 'dear children' captures affection but loses the
    lexical imagery.
- source_word: ἔτι μικρόν
  chosen: a little while longer
  alternatives:
  - a little longer
  - for a little while yet
  lexicon: BDAG
  rationale: The adverb ἔτι with neuter accusative μικρόν forms an idiom of short
    remaining time. 'A little while longer' is natural English and preserves the temporal
    sense without over-literal awkwardness.
- source_word: μεθ’ ὑμῶν εἰμι
  chosen: I am with you
  alternatives:
  - I remain with you
  lexicon: BDAG
  rationale: Straightforward present-tense statement of presence. 'I am with you'
    is the plain sense and keeps the immediacy of Jesus' address.
- source_word: ζητήσετέ με
  chosen: You will seek me
  alternatives:
  - You will look for me
  lexicon: BDAG
  rationale: Future of ζητέω can mean seek/look for. 'Seek' is slightly weightier
    and fits Johannine usage, while still idiomatic.
- source_word: καθὼς εἶπον τοῖς Ἰουδαίοις
  chosen: just as I said to the Jews
  alternatives:
  - as I said to the Jewish leaders
  - just as I told the Jews
  lexicon: BDAG
  rationale: Ἰουδαίοις is literally 'the Jews' and should not be narrowed to 'Jewish
    leaders' unless context requires it. 'Said to the Jews' is direct and source-faithful;
    'just as' reflects καθώς.
- source_word: Ὅπου ἐγὼ ὑπάγω
  chosen: Where I am going
  alternatives:
  - Where I go
  - Where I am going away
  lexicon: BDAG
  rationale: ὑπάγω here denotes departure/go away. 'Where I am going' is idiomatic
    and sufficient in context; adding 'away' is possible but unnecessary.
- source_word: οὐ δύνασθε ἐλθεῖν
  chosen: you are not able to come
  alternatives:
  - you cannot come
  lexicon: BDAG
  rationale: This more formally preserves δύνασθε ('are able') rather than collapsing
    it to 'cannot.' It keeps the statement's force without implying more than inability/access
    restriction.
- source_word: καὶ ὑμῖν λέγω ἄρτι
  chosen: so now I also say to you
  alternatives:
  - and now I say to you
  - and I say to you now
  lexicon: BDAG
  rationale: The clause links what Jesus previously said to the Jews with what he
    now says to the disciples. 'So now I also say to you' brings out the comparative
    force and the present application. 'Also' is implied by the parallelism though
    not separately expressed in Greek; it clarifies the discourse relation in natural
    English.
