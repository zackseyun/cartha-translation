id: JHN.13.19
reference: John 13:19
source:
  edition: SBLGNT
  text: ἀπ’ ἄρτι λέγω ὑμῖν πρὸ τοῦ γενέσθαι, ἵνα ⸂πιστεύσητε ὅταν γένηται⸃ ὅτι ἐγώ
    εἰμι.
translation:
  text: From now on I am telling you before it happens, so that when it does happen,
    you may believe that I am he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'that I am.' The Greek expression may also echo divine
      self-identification in Isaiah and elsewhere in John.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπ’ ἄρτι
  chosen: From now on
  alternatives:
  - From this moment
  - Already now
  lexicon: BDAG
  rationale: Idiomatic temporal expression indicating the present point forward. 'From
    now on' is natural English and preserves the forward-looking force better than
    the less idiomatic 'already now.'
- source_word: λέγω ὑμῖν
  chosen: I am telling you
  alternatives:
  - I tell you
  - I say to you
  lexicon: BDAG
  rationale: Present tense with direct address. 'I am telling you' reflects the ongoing
    present in context, though simple present would also be possible.
- source_word: πρὸ τοῦ γενέσθαι
  chosen: before it happens
  alternatives:
  - before it comes to pass
  - before it takes place
  lexicon: BDAG
  rationale: The articular infinitive with πρό marks prior time. 'Before it happens'
    is clear modern English and fits the unspecified event reference in context.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is the most natural modern equivalent while
    preserving purposive force.
- source_word: πιστεύσητε
  chosen: you may believe
  alternatives:
  - you may come to believe
  - you may trust
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended result/purpose. The default
    rendering of πιστεύω-related language is 'believe/faith' unless context strongly
    favors 'trust.' 'May believe' preserves the verbal connection and avoids overinterpreting
    ingressive force.
- source_word: ὅταν γένηται
  chosen: when it does happen
  alternatives:
  - when it happens
  - when it comes to pass
  lexicon: BDAG
  rationale: ὅταν with subjunctive marks a future contingency. 'Does happen' slightly
    heightens the fulfillment emphasis in English, matching the predictive context.
- source_word: ὅτι ἐγώ εἰμι
  chosen: that I am he
  alternatives:
  - that I am
  - that I am the one
  lexicon: BDAG
  rationale: In Johannine usage, ἐγώ εἰμι can function absolutely and may echo divine
    self-identification, but in English an unqualified 'I am' can sound opaque here.
    'I am he' is a traditional and intelligible rendering that preserves the self-identificatory
    force without forcing an explicit predicate not present in Greek; the more literal
    alternative is preserved in a footnote.
