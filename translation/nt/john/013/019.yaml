theological_decisions:
- issue: Rendering the absolute expression ἐγώ εἰμι in a Johannine context with possible
    allusion to divine self-identification
  chosen_reading: that I am he
  alternative_readings:
  - that I am
  rationale: The phrase likely carries more than simple self-reference in John, potentially
    echoing Isaianic and divine-identification language. However, the Greek lacks
    an explicit predicate, and the translation should preserve the tension rather
    than over-resolve it. 'I am he' gives intelligible English while a footnote preserves
    the more literal 'I am' and alerts readers to the possible theological weight.
  doctrine_reference: Preserve theological tension rather than resolve it.
