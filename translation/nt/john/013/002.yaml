theological_decisions:
- issue: Agency in Judas's betrayal
  chosen_reading: The verse is rendered to state that the devil had already implanted
    the intention in Judas's heart, without wording that removes Judas's own agency.
  alternative_readings:
  - The devil had already prompted Judas
  - The devil had already decided through Judas
  rationale: The Greek attributes satanic influence but still presents Judas as the
    one who would betray Jesus. The translation preserves that tension rather than
    resolving questions of determinism or sole causation.
  doctrine_reference: Preserve theological tension rather than resolve it.
