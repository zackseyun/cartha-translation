id: JHN.13.2
reference: John 13:2
source:
  edition: SBLGNT
  text: καὶ δείπνου ⸀γινομένου, τοῦ διαβόλου ἤδη βεβληκότος εἰς τὴν καρδίαν ⸂ἵνα παραδοῖ
    αὐτὸν Ἰούδας Σίμωνος ⸀Ἰσκαριώτου⸃,
translation:
  text: And during supper, when the devil had already put it into the heart of Judas,
    son of Simon Iscariot, to betray him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while supper was taking place.' The Greek does not mean that the supper
      had already ended.
    reason: lexical_alternative
  - marker: b
    text: Or 'had already prompted.' Literally, 'had already put into the heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to hand him over.' In this context, 'betray' brings out the force of
      the expression.
    reason: alternative_reading
lexical_decisions:
- source_word: δείπνου γινομένου
  chosen: during supper
  alternatives:
  - while supper was taking place
  - during the meal
  lexicon: BDAG
  rationale: The genitive absolute marks contemporaneous circumstance. 'During supper'
    is concise, natural English and avoids the misleading traditional rendering 'supper
    being ended,' which does not fit γινομένου ('happening/taking place').
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: In Johannine narrative this clearly refers to the personal evil one,
    so the established title 'the devil' best conveys the referent rather than the
    lexical root sense.
- source_word: ἤδη βεβληκότος εἰς τὴν καρδίαν
  chosen: had already put it into the heart
  alternatives:
  - had already placed in the heart
  - had already prompted
  lexicon: BDAG
  rationale: βάλλω with εἰς τὴν καρδίαν is idiomatic for implanting an intention.
    'Put it into the heart' preserves the metaphor more transparently than the more
    interpretive 'prompted.' The pluperfect sense is conveyed by 'had already put.'
- source_word: καρδίαν
  chosen: heart
  alternatives:
  - mind
  lexicon: BDAG
  rationale: '''Heart'' preserves the anthropological metaphor of the Greek, which
    in biblical usage includes will and intention, not merely emotion.'
- source_word: ἵνα παραδοῖ
  chosen: to betray
  alternatives:
  - that he should hand him over
  - to hand him over
  lexicon: BDAG
  rationale: In the Judas context, παραδίδωμι conventionally and contextually means
    'betray.' The infinitival English construction naturally renders the purpose clause
    after 'put it into the heart.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus and is straightforwardly rendered 'him.'
- source_word: Ἰούδας Σίμωνος Ἰσκαριώτου
  chosen: Judas, son of Simon Iscariot
  alternatives:
  - Judas Iscariot, Simon's son
  - Judas son of Simon Iscariot
  lexicon: BDAG
  rationale: The genitives identify Judas by paternal relation. 'Son of Simon Iscariot'
    follows the Greek sequence most closely, while the commas clarify the appositional
    structure in English.
