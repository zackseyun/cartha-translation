id: JHN.13.12
reference: John 13:12
source:
  edition: SBLGNT
  text: Ὅτε οὖν ἔνιψεν τοὺς πόδας αὐτῶν ⸀καὶ ἔλαβεν τὰ ἱμάτια αὐτοῦ ⸂καὶ ἀνέπεσεν⸃,
    πάλιν εἶπεν αὐτοῖς· Γινώσκετε τί πεποίηκα ὑμῖν;
translation:
  text: So when he had washed their feet and taken his outer garments and reclined
    again, he said to them, “Do you understand what I have done for you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'sat down again'; the Greek verb refers to reclining
      at table.
    reason: lexical_alternative
  - marker: b
    text: Or 'what I have done to you'; the Greek dative can be rendered either way,
      though 'for you' best fits the context of service.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτε οὖν
  chosen: So when
  alternatives:
  - When therefore
  - Therefore when
  lexicon: BDAG
  rationale: Ὅτε introduces the temporal clause ('when'), while οὖν marks narrative
    progression/inference. 'So when' preserves both the temporal sense and the connective
    force in natural modern English.
- source_word: ἔνιψεν
  chosen: had washed
  alternatives:
  - washed
  lexicon: BDAG
  rationale: Aorist indicative in a temporal clause preceding the main action; English
    past perfect naturally conveys the completed action prior to the subsequent verbs.
- source_word: τοὺς πόδας αὐτῶν
  chosen: their feet
  alternatives:
  - the feet of them
  lexicon: BDAG
  rationale: Idiomatic English rendering of the accusative object with possessive
    pronoun; no loss of meaning.
- source_word: ἔλαβεν τὰ ἱμάτια αὐτοῦ
  chosen: taken his outer garments
  alternatives:
  - took his garments
  - put on his garments
  lexicon: BDAG
  rationale: ἱμάτια refers to garments/clothing, here specifically the outer clothing
    Jesus had set aside in the footwashing scene. 'Taken his outer garments' stays
    close to the Greek while making the narrative sense clear. 'Put on' is interpretive
    and not the lexical value of ἔλαβεν.
- source_word: ἀνέπεσεν
  chosen: reclined again
  alternatives:
  - sat down again
  - took his place again at the table
  lexicon: BDAG
  rationale: ἀναπίπτω in meal contexts commonly means to recline at table. 'Reclined
    again' preserves the first-century dining posture better than the traditional
    but less precise 'sat down again.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Simple adverb of repetition; 'again' is the most direct and natural rendering.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; 'said to them' is appropriately
    neutral and direct.
- source_word: Γινώσκετε
  chosen: Do you understand
  alternatives:
  - Do you know
  - Are you knowing
  lexicon: BDAG
  rationale: Although γινώσκω often means 'know,' in this interrogative context about
    the significance of his action, 'understand' better captures the intended sense
    of grasping meaning rather than mere awareness.
- source_word: τί πεποίηκα ὑμῖν
  chosen: what I have done for you
  alternatives:
  - what I have done to you
  - what I did for you
  lexicon: BDAG
  rationale: The perfect πεποίηκα highlights the present significance of the completed
    act, well conveyed by 'have done.' With ὑμῖν, 'for you' best fits the benefactive
    sense in context; 'to you' is possible more formally but can sound harsher and
    less contextually apt in English.
