theological_decisions:
- issue: Interpretation of Jesus' table posture after washing the disciples' feet
  chosen_reading: Rendered ἀνέπεσεν as 'reclined again' rather than 'sat down again.'
  alternative_readings:
  - sat down again
  - took his place again at the table
  rationale: This is not a doctrinal dispute but a historically and culturally significant
    translation choice. The Greek specifically reflects reclining at table in the
    ancient dining setting. Preserving that image improves historical accuracy without
    importing extra interpretation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ὑμῖν in Jesus' question
  chosen_reading: Rendered as 'for you' in the main text.
  alternative_readings:
  - to you
  rationale: The dative can be rendered either way, but in this context Jesus is asking
    whether they grasp the significance and service-oriented purpose of his act. 'For
    you' better communicates the benefactive nuance while preserving the theological
    tension of humble service rather than domination.
  doctrine_reference: Translation philosophy §3, §6
