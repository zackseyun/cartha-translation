id: JHN.13.30
reference: John 13:30
source:
  edition: SBLGNT
  text: λαβὼν οὖν τὸ ψωμίον ἐκεῖνος ⸂ἐξῆλθεν εὐθύς⸃. ἦν δὲ νύξ.
translation:
  text: So after taking the piece of bread, that man went out immediately. And it
    was night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the morsel' or 'the piece.' The Greek ψωμίον refers to a small piece
      of bread or food given at the meal.
    reason: lexical_alternative
  - marker: b
    text: Greek 'that one'; the wording is more emphatic than a simple 'he,' likely
      drawing attention to Judas.
    reason: lexical_alternative
  - marker: c
    text: John's mention that 'it was night' is a literal time reference and may also
      echo the Gospel's light/darkness theme.
    reason: cross_reference
lexical_decisions:
- source_word: λαβὼν
  chosen: after taking
  alternatives:
  - having taken
  - when he had taken
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω is rendered temporally in natural English.
    'After taking' preserves the sequence leading into the main verb without sounding
    wooden.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is concise, readable
    modern English and fits the flow of the scene better than the more formal 'therefore.'
- source_word: τὸ ψωμίον
  chosen: the piece of bread
  alternatives:
  - the morsel
  - the piece
  - the sop
  lexicon: BDAG
  rationale: ψωμίον refers to a piece or morsel of bread/food. 'The piece of bread'
    is clear modern English and avoids archaic 'sop' while being more concrete than
    simply 'the morsel.'
- source_word: ἐκεῖνος
  chosen: that man
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: The demonstrative is emphatic and should not be flattened to a simple
    pronoun. 'That man' preserves the marked reference to Judas and reflects John's
    distancing effect.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: BDAG
  rationale: ἐξέρχομαι is straightforwardly 'go out/come out.' 'Went out' preserves
    the spatial sense better than the more interpretive 'left' or the more formal
    'departed.'
- source_word: εὐθύς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθύς indicates promptness. 'Immediately' is precise and suitably weighty
    in this solemn narrative context.
- source_word: ἦν δὲ νύξ
  chosen: And it was night
  alternatives:
  - Now it was night
  - and it was nighttime
  lexicon: BDAG
  rationale: This clause states the time plainly while also carrying Johannine narrative
    resonance. 'And it was night' preserves the simplicity and literary force of the
    Greek without over-interpreting the symbolism in the main text.
