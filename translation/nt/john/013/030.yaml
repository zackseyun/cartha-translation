theological_decisions:
- issue: Possible symbolic force of 'night' in Johannine context
  chosen_reading: 'Render the clause literally as a temporal statement: ''And it was
    night.'''
  alternative_readings:
  - Treat 'night' explicitly as symbolic of spiritual darkness in the main text
  rationale: John often uses darkness/light symbolically, especially around Judas.
    However, the Greek here is a simple temporal clause. In keeping with the translation
    philosophy, the main text preserves the literal wording and leaves symbolic implications
    to interpretation rather than importing them into the translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ἐκεῖνος in reference to Judas
  chosen_reading: Retain emphasis with 'that man' rather than reducing it to 'he.'
  alternative_readings:
  - he
  - that one
  rationale: The demonstrative likely carries narrative emphasis and distancing. Rendering
    it explicitly helps preserve the text's rhetorical force without adding doctrinal
    content.
  doctrine_reference: 'Translation philosophy §1 and §5: original-language primacy
    and consistency/documented exception.'
