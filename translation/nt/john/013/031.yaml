id: JHN.13.31
reference: John 13:31
source:
  edition: SBLGNT
  text: Ὅτε ⸀οὖν ἐξῆλθεν ⸀λέγει Ἰησοῦς· Νῦν ἐδοξάσθη ὁ υἱὸς τοῦ ἀνθρώπου, καὶ ὁ θεὸς
    ἐδοξάσθη ἐν αὐτῷ·
translation:
  text: So when he had gone out, Jesus said, “Now the Son of Man has been glorified,
    and God has been glorified in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “through him.” The Greek phrase can be understood either as God being
      glorified in the Son or through the Son.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτε οὖν
  chosen: So when
  alternatives:
  - When therefore
  - Therefore when
  lexicon: BDAG
  rationale: Ὅτε introduces the temporal clause ('when'), while οὖν marks narrative/logical
    progression. 'So when' preserves both the temporal sense and the forward movement
    in natural English better than the more wooden 'when therefore.'
- source_word: ἐξῆλθεν
  chosen: he had gone out
  alternatives:
  - he went out
  - he left
  lexicon: BDAG
  rationale: Aorist indicative of ἐξέρχομαι, referring to Judas's departure in the
    preceding context. English past perfect fits the sequence naturally after 'when'
    and clarifies prior action before Jesus speaks. 'Gone out' preserves the spatial
    nuance better than simply 'left.'
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, standard English narrative
    style commonly renders it as simple past. This is an optimal-equivalence choice
    for readable modern English without loss of meaning.
- source_word: Νῦν
  chosen: Now
  alternatives:
  - At this moment
  lexicon: BDAG
  rationale: Retains the discourse and temporal force of νῦν, signaling that Judas's
    departure triggers the moment Jesus is announcing.
- source_word: ἐδοξάσθη
  chosen: has been glorified
  alternatives:
  - was glorified
  - is glorified
  lexicon: BDAG
  rationale: The aorist passive can be rendered simply as past, but in context Jesus
    speaks of glorification as now inaugurated with immediate and continuing significance.
    English present perfect captures that aspectual force well without overinterpreting
    the theology.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus's established self-designation with strong intertextual
    resonance, especially Daniel 7. 'The Son of Man' preserves the title's traditional
    and textual force better than a paraphrastic alternative.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of θεός. The article is not normally reproduced
    in English here.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - through him
  - by him
  lexicon: BDAG
  rationale: ἐν with the dative most naturally yields 'in him' here. While some interpreters
    understand an instrumental nuance ('through him'), the more direct locative/relational
    rendering best preserves the Greek wording and the theological mutuality of glorification
    in the Johannine context.
