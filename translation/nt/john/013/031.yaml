theological_decisions:
- issue: Meaning of Jesus's glorification statement
  chosen_reading: Render the two passive verbs straightforwardly as divine glorification
    already set in motion, without specifying whether the reference is primarily to
    the cross, resurrection, exaltation, or the whole complex of events.
  alternative_readings:
  - A narrower reference to the crucifixion alone
  - A narrower reference to resurrection/exaltation alone
  rationale: John commonly treats Jesus's 'glorification' as a unified reality encompassing
    his death, resurrection, and return to the Father. The translation preserves that
    theological breadth rather than narrowing it in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἐν αὐτῷ
  chosen_reading: in him
  alternative_readings:
  - through him
  rationale: The phrase can be interpreted relationally or instrumentally. The main
    text keeps the more literal 'in him' and preserves the alternative in a footnote,
    avoiding unnecessary interpretive narrowing while remaining natural English.
  doctrine_reference: Preserve theological tension rather than resolve it.
