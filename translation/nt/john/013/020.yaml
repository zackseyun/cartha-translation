theological_decisions:
- issue: Identification of 'the one who sent me'
  chosen_reading: the one who sent me
  alternative_readings:
  - the Father who sent me
  rationale: In Johannine context this refers to the Father, but the verse itself
    uses relational language rather than the explicit title 'Father.' The translation
    preserves the text's wording and lets the theological identification arise from
    context rather than importing it into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of generic masculine participles
  chosen_reading: whoever receives
  alternative_readings:
  - he who receives
  - the one who receives
  rationale: The masculine singular participles are generic/representative, not male-specific.
    Rendering with 'whoever' communicates the source intent accurately in natural
    English while avoiding an artificially male-restricted sense.
  doctrine_reference: Translation philosophy §4
