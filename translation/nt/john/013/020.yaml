id: JHN.13.20
reference: John 13:20
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ὁ λαμβάνων ⸀ἄν τινα πέμψω ἐμὲ λαμβάνει, ὁ δὲ ἐμὲ λαμβάνων
    λαμβάνει τὸν πέμψαντά με.
translation:
  text: Truly, truly, I say to you, whoever receives anyone I send receives me, and
    whoever receives me receives the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who receives whomever I send.'
    reason: lexical_alternative
  - marker: b
    text: In context, 'the one who sent me' refers to the Father.
    reason: cross_reference
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most certainly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula while using natural English. 'Truly,
    truly' preserves the solemn introductory force better than leaving it untranslated
    as 'Amen, amen' for a general audience.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering of the present indicative plus dative pronoun.
    'I say to you' is slightly more formal and preserves the discourse formula common
    in John.
- source_word: ὁ λαμβάνων
  chosen: whoever receives
  alternatives:
  - the one who receives
  - he who receives
  lexicon: BDAG
  rationale: The articular present participle has a generic force. 'Whoever receives'
    communicates that representative/general sense in idiomatic English without unnecessary
    gender marking.
- source_word: ἄν τινα πέμψω
  chosen: anyone I send
  alternatives:
  - whomever I send
  - someone I send
  lexicon: BDAG
  rationale: 'The combination of ἄν with the indefinite τινα and the subjunctive πέμψω
    expresses an indefinite contingency: any person whom Jesus may send. ''Anyone
    I send'' is natural English and preserves the open-ended scope.'
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - welcomes
  - accepts
  lexicon: BDAG
  rationale: λαμβάνω here denotes receiving/accepting a person. 'Receives' preserves
    the lexical repetition across the verse, which is important to the chain of representation.
    'Welcomes' is possible but slightly narrows the sense to hospitality.
- source_word: ἐμέ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; rendered plainly.
- source_word: ὁ δὲ ἐμὲ λαμβάνων
  chosen: and whoever receives me
  alternatives:
  - but whoever receives me
  - the one who receives me
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And'
    fits the ascending parallelism in English better than 'but'.
- source_word: τὸν πέμψαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The aorist participle identifies the Father as the sender. 'The one who
    sent me' is clear, natural, and preserves the relational language without importing
    a title not explicit in the text.
