id: JHN.13.6
reference: John 13:6
source:
  edition: SBLGNT
  text: ἔρχεται οὖν πρὸς Σίμωνα Πέτρον. ⸀λέγει ⸀αὐτῷ· Κύριε, σύ μου νίπτεις τοὺς πόδας;
translation:
  text: So he comes to Simon Peter. He says to him, “Lord, are you washing my feet?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, are you washing my feet?” The Greek κύριε can function as a respectful
      address, though here “Lord” is retained as the default rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - goes
  lexicon: BDAG
  rationale: Present-tense narrative verb is retained as historical present in English
    for Johannine vividness. 'Comes' fits movement toward Simon Peter better than
    'goes.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: πρὸς Σίμωνα Πέτρον
  chosen: to Simon Peter
  alternatives:
  - toward Simon Peter
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person; 'to Simon
    Peter' is idiomatic in English narrative.
- source_word: λέγει αὐτῷ
  chosen: He says to him
  alternatives:
  - he said to him
  lexicon: BDAG
  rationale: Another historical present, retained for consistency with the Greek narrative
    style. Explicit 'to him' reflects αὐτῷ.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this context Peter
    addresses Jesus respectfully; 'Lord' also preserves the Gospel's christological
    resonance better than 'Sir' or 'Master'.
- source_word: σύ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can convey the emphasis
    through the interrogative wording and context without an awkwardly overexplicit
    'you yourself.'
- source_word: μου
  chosen: my
  alternatives:
  - of me
  lexicon: BDAG
  rationale: Genitive pronoun naturally expresses possession with 'feet' in English.
- source_word: νίπτεις
  chosen: are washing
  alternatives:
  - wash
  - are you going to wash
  lexicon: BDAG
  rationale: νίπτω refers specifically to washing a part of the body, not bathing
    the whole person. Progressive English ('are washing') fits the immediate scene
    and Peter's startled question.
- source_word: τοὺς πόδας
  chosen: feet
  alternatives:
  - the feet
  lexicon: BDAG
  rationale: English normally uses the possessive alone ('my feet') rather than reproducing
    the Greek article plus noun literally ('my the feet').
