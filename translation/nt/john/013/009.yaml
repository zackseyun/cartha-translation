theological_decisions:
- issue: Rendering of κύριος as a form of address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse presents Peter addressing Jesus with κύριος. Per the doctrine
    file's contested-terms guidance, the default rendering is 'Lord.' This preserves
    the title's normal NT force without overstating beyond the immediate context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
