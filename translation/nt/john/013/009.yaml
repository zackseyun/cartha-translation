id: JHN.13.9
reference: John 13:9
source:
  edition: SBLGNT
  text: λέγει αὐτῷ Σίμων Πέτρος· Κύριε, μὴ τοὺς πόδας μου μόνον ἀλλὰ καὶ τὰς χεῖρας
    καὶ τὴν κεφαλήν.
translation:
  text: Simon Peter says to him, “Lord, not my feet only, but also my hands and my
    head.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “Master.” Greek: “Kyrios.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says,' reflecting the Greek present
    tense common in narrative and preserving Johannine vividness. English can also
    smooth this to past tense, but the present is natural enough here.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The dative pronoun is translated directly as 'to him.' Although the referent
    is Jesus from context, the Greek uses a pronoun, so the translation preserves
    that form.
- source_word: Σίμων Πέτρος
  chosen: Simon Peter
  rationale: Personal names are transliterated by standard English convention, per
    project philosophy.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Following the project's default rendering for κύριος as a title, 'Lord'
    preserves both respect and Johannine theological resonance better than 'Master.'
- source_word: μὴ ... μόνον ἀλλὰ καὶ
  chosen: not ... only, but also
  alternatives:
  - not only ... but also
  lexicon: BDAG
  rationale: 'This combination expresses contrastive extension: not merely one thing,
    but additional things as well. The chosen English keeps the Greek emphasis while
    reading naturally.'
- source_word: τοὺς πόδας μου
  chosen: my feet
  alternatives:
  - my foot-washing of the feet
  lexicon: BDAG
  rationale: 'A straightforward rendering of the accusative object with possessive
    pronoun. English idiom places the possessive before the noun: ''my feet.'''
- source_word: τὰς χεῖρας
  chosen: my hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: Although μου is not repeated in Greek, English naturally supplies the
    possessive across the coordinated body parts. This reflects the sense without
    adding a new idea.
- source_word: τὴν κεφαλήν
  chosen: my head
  alternatives:
  - the head
  lexicon: BDAG
  rationale: As with 'my hands,' English idiom supplies the possessive implied by
    coordination with 'my feet.' 'Head' is the ordinary lexical sense here.
