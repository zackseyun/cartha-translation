id: JHN.13.10
reference: John 13:10
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ⸀ὁ Ἰησοῦς· Ὁ λελουμένος ⸂οὐκ ἔχει χρείαν⸃ ⸂εἰ μὴ⸃ τοὺς πόδας νίψασθαι,
    ἀλλ’ ἔστιν καθαρὸς ὅλος· καὶ ὑμεῖς καθαροί ἐστε, ἀλλ’ οὐχὶ πάντες.
translation:
  text: Jesus said to him, “The one who has bathed has no need except to wash his
    feet, but is completely clean. And you are clean, but not all of you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two different washing verbs: λούω (''bathe,'' of washing the
      whole body) and νίπτω (''wash,'' often of a part such as the feet).'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ λελουμένος
  chosen: The one who has bathed
  alternatives:
  - He who has bathed
  - The one who has washed
  lexicon: BDAG
  rationale: λελουμένος is a perfect participle of λούω, commonly referring to bathing/washing
    the whole body. 'The one who has bathed' preserves the substantival participle
    and the completed-state nuance better than a simple present expression.
- source_word: οὐκ ἔχει χρείαν
  chosen: has no need
  alternatives:
  - does not need
  lexicon: BDAG
  rationale: This is the natural rendering of the idiom ἔχει χρείαν. 'Has no need'
    is slightly more formal and matches the Greek construction closely while remaining
    clear.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - except that
  - unless
  lexicon: BDAG
  rationale: Here εἰ μὴ introduces the sole exception to the preceding statement.
    'Except' is concise and idiomatic in English.
- source_word: τοὺς πόδας νίψασθαι
  chosen: to wash his feet
  alternatives:
  - to wash the feet
  - to wash his own feet
  lexicon: BDAG
  rationale: νίπτω often refers to washing a part of the body, in contrast to λούω
    for bathing. Supplying 'his' makes the English natural and reflects the singular
    subject implied by the participle.
- source_word: καθαρὸς
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: In Johannine usage καθαρός can carry both literal and moral/spiritual
    overtones. 'Clean' preserves the washing imagery while allowing the broader symbolic
    sense to remain implicit.
- source_word: ὅλος
  chosen: completely
  alternatives:
  - entirely
  - altogether
  - wholly
  lexicon: BDAG
  rationale: Used adverbially with καθαρὸς in context, ὅλος emphasizes totality. 'Completely
    clean' is idiomatic modern English and preserves the force.
- source_word: καὶ ὑμεῖς καθαροί ἐστε
  chosen: And you are clean
  alternatives:
  - And you are clean ones
  - And you are pure
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the plural address to the
    disciples and the thematic repetition of καθαρός from the previous clause.
- source_word: ἀλλ’ οὐχὶ πάντες
  chosen: but not all of you
  alternatives:
  - but not all
  - but not everyone among you
  lexicon: BDAG
  rationale: The phrase contrasts the group statement with an exception within the
    group. 'Not all of you' makes the referent explicit and natural in English.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus said to him
  alternatives:
  - Jesus says to him
  lexicon: BDAG
  rationale: Although λέγει is present (historical present), English narrative style
    commonly renders it as simple past. This is an optimal-equivalence choice for
    readability.
