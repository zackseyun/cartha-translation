theological_decisions:
- issue: Literal washing imagery and symbolic/spiritual cleanness
  chosen_reading: Retain 'bathed,' 'wash his feet,' and 'clean' without making the
    symbolism explicit in the main text.
  alternative_readings:
  - Interpretively expand to 'spiritually clean'
  - Flatten the distinction by rendering both λούω and νίπτω simply as 'wash'
  rationale: The verse intentionally works on both literal and symbolic levels in
    context. Preserving the lexical distinction between λούω (bathe) and νίπτω (wash)
    maintains the narrative image and theological tension without importing a specific
    doctrinal explanation into the translation.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Gendered singular participle
  chosen_reading: Use 'The one who has bathed' rather than a masculine-specific 'He
    who has bathed.'
  alternative_readings:
  - He who has bathed
  rationale: The Greek participle is grammatically masculine singular but functions
    generically in this saying. 'The one who has bathed' is gender-accurate to the
    sense without obscuring the singular form.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
