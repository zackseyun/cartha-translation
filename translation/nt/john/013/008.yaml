id: JHN.13.8
reference: John 13:8
source:
  edition: SBLGNT
  text: λέγει αὐτῷ Πέτρος· Οὐ μὴ νίψῃς ⸂μου τοὺς πόδας⸃ εἰς τὸν αἰῶνα. ἀπεκρίθη ⸂Ἰησοῦς
    αὐτῷ⸃· Ἐὰν μὴ νίψω σε, οὐκ ἔχεις μέρος μετ’ ἐμοῦ.
translation:
  text: Peter said to him, “You will never wash my feet.” Jesus answered him, “If
    I do not wash you, you have no share with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you have no part with me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ μὴ νίψῃς
  chosen: You will never wash
  alternatives:
  - You shall certainly not wash
  - You will by no means wash
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή with the aorist subjunctive expresses strong
    denial or refusal about a future action. 'You will never wash' captures the force
    in natural modern English without archaic stiffness.
- source_word: μου τοὺς πόδας
  chosen: my feet
  alternatives:
  - my foot-washing contextually implied feet
  lexicon: BDAG
  rationale: 'A straightforward possessive construction: ''my feet.'' No expansion
    is needed because the object is explicit in Greek.'
- source_word: εἰς τὸν αἰῶνα
  chosen: never
  alternatives:
  - forever
  - for all time
  lexicon: BDAG
  rationale: In this idiom, εἰς τὸν αἰῶνα intensifies the negation and is best rendered
    idiomatically as 'never' rather than the more wooden 'forever.'
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb. 'Answered' is slightly more literal
    and fits common English Gospel style.
- source_word: Ἐὰν μὴ νίψω σε
  chosen: If I do not wash you
  alternatives:
  - Unless I wash you
  lexicon: BDAG
  rationale: The conditional clause is naturally rendered 'If I do not wash you.'
    'Unless I wash you' is also possible, but the chosen form preserves the explicit
    first-person subject and conditional structure.
- source_word: νίψω / νίψῃς
  chosen: wash
  alternatives:
  - wash clean
  lexicon: BDAG
  rationale: νίπτω commonly refers to washing, especially a part of the body such
    as feet. 'Wash' is sufficient in English; 'wash clean' adds emphasis not explicit
    in the Greek.
- source_word: οὐκ ἔχεις μέρος
  chosen: you have no share
  alternatives:
  - you have no part
  - you have no portion
  lexicon: BDAG
  rationale: μέρος can mean 'part,' 'share,' or 'portion.' 'Share' communicates relational
    participation clearly in modern English while preserving the metaphorical force.
    'Part' is a strong traditional alternative and is preserved in a footnote because
    of its familiarity and possible theological resonance.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - in me
  lexicon: BDAG
  rationale: μετά with the genitive means 'with,' indicating association or fellowship.
    Rendering it 'in me' would import Johannine language not present here.
