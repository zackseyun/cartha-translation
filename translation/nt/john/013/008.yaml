theological_decisions:
- issue: Meaning of Jesus' statement about having μέρος with him
  chosen_reading: Relational participation/fellowship with Jesus is in view, expressed
    without over-specifying sacramental or soteriological mechanics.
  alternative_readings:
  - Primarily sacramental reference to cleansing
  - Primarily symbolic reference to humble service
  - Direct statement of salvific belonging
  rationale: The verse clearly states that Jesus' washing is necessary for Peter to
    have a 'share' with him, but the Greek does not itself define the precise theological
    mechanism. The translation therefore preserves the broad term 'share' and avoids
    importing a narrower doctrinal interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
