id: JHN.13.24
reference: John 13:24
source:
  edition: SBLGNT
  text: νεύει οὖν τούτῳ Σίμων Πέτρος ⸂πυθέσθαι τίς ἂν εἴη⸃ περὶ οὗ λέγει.
translation:
  text: So Simon Peter motioned to this one to ask who it might be that he was speaking
    about.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Simon Peter therefore gestures to him to inquire who
      it might be about whom he is speaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νεύει
  chosen: motioned
  alternatives:
  - gestured
  - nodded
  - signaled
  lexicon: BDAG
  rationale: The verb denotes making a sign or gesture, likely nonverbal communication
    across the table. 'Motioned' is natural modern English and preserves the physical
    signaling sense better than the more specific 'nodded.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Here οὖν marks narrative consequence or continuation. 'So' fits readable
    modern English and reflects the inferential flow from the previous verse.
- source_word: τούτῳ
  chosen: to this one
  alternatives:
  - to him
  - to that disciple
  lexicon: BDAG
  rationale: The demonstrative points to the nearby disciple already in view from
    context. 'To this one' preserves the demonstrative force more transparently than
    simply 'to him,' while remaining understandable in English.
- source_word: πυθέσθαι
  chosen: to ask
  alternatives:
  - to inquire
  - to find out
  lexicon: BDAG
  rationale: 'The infinitive expresses the content of Peter''s signal: that the disciple
    should ask/inquire. ''To ask'' is the clearest idiomatic rendering in context.'
- source_word: τίς ἂν εἴη
  chosen: who it might be
  alternatives:
  - who it could be
  - who he might be
  lexicon: BDAG
  rationale: The combination with ἄν and the optative conveys indefiniteness or tentativeness.
    'Who it might be' captures that nuance naturally in English.
- source_word: περὶ οὗ
  chosen: about
  alternatives:
  - concerning whom
  - about whom
  lexicon: BDAG
  rationale: The phrase means 'about whom.' Because English idiom with 'speaking'
    normally takes 'about,' the relative sense is absorbed into the clause 'that he
    was speaking about.'
- source_word: λέγει
  chosen: he was speaking
  alternatives:
  - he speaks
  - he was talking
  lexicon: BDAG
  rationale: 'Although formally present tense, John''s narrative style often uses
    the historical present. Rendering it as past-progressive in English gives natural
    narrative flow: Jesus was speaking about someone.'
