theological_decisions:
- issue: Rendering hostile accusation about Jesus' condition
  chosen_reading: He has a demon and is insane
  alternative_readings:
  - He is demon-possessed and mad
  rationale: The translation preserves the opponents' slander in straightforward terms
    without softening it or importing a clinical or doctrinal explanation beyond the
    Greek wording. This maintains the narrative tension and avoids paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
