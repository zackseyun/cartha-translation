id: JHN.10.20
reference: John 10:20
source:
  edition: SBLGNT
  text: ἔλεγον δὲ πολλοὶ ἐξ αὐτῶν· Δαιμόνιον ἔχει καὶ μαίνεται· τί αὐτοῦ ἀκούετε;
translation:
  text: But many of them were saying, “He has a demon and is insane. Why do you listen
    to him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He is demon-possessed and mad.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated speech in the scene, better
    reflected by 'were saying' than simple past 'said.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the preceding positive reaction; 'But' captures the
    adversative force naturally in English.
- source_word: πολλοὶ ἐξ αὐτῶν
  chosen: many of them
  alternatives:
  - many from among them
  lexicon: BDAG
  rationale: Idiomatic rendering of the partitive expression ἐξ αὐτῶν while preserving
    that this was a subset of the group.
- source_word: Δαιμόνιον ἔχει
  chosen: He has a demon
  alternatives:
  - He is demon-possessed
  - He has an unclean spirit
  lexicon: BDAG
  rationale: A direct, transparent rendering of the Greek expression. 'He is demon-possessed'
    is interpretive and more idiomatic, but 'has a demon' stays closer to the source
    wording.
- source_word: μαίνεται
  chosen: is insane
  alternatives:
  - is mad
  - is out of his mind
  - raves
  lexicon: BDAG
  rationale: Conveys the sense of being mentally deranged or acting as one mad. 'Is
    mad' is traditional but can sound archaic or ambiguous in modern English; 'is
    insane' is clearer for contemporary readers.
- source_word: τί αὐτοῦ ἀκούετε;
  chosen: Why do you listen to him?
  alternatives:
  - Why are you listening to him?
  - Why do you hear him?
  lexicon: BDAG
  rationale: The interrogative τί here functions idiomatically as 'why?' in context.
    ἀκούω with a genitive object commonly means 'listen to' or 'hear'; 'listen to
    him' best fits the accusatory force of the question in natural English.
