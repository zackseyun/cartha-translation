id: JHN.10.42
reference: John 10:42
source:
  edition: SBLGNT
  text: καὶ ⸂πολλοὶ ἐπίστευσαν εἰς αὐτὸν ἐκεῖ⸃.
translation:
  text: And many believed in him there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this verse to the preceding
    narrative. 'And' is the most straightforward and least interpretive rendering.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The nominative masculine plural adjective functions substantivally, referring
    to many persons. 'Many' is concise and natural English; 'many people' is possible
    but unnecessarily explicit.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to believe
  - put their faith
  lexicon: BDAG
  rationale: Aorist active indicative of πιστεύω, here denoting the act of believing.
    'Believed' is the most direct rendering. 'Came to believe' adds an ingressive
    nuance not required by the aorist alone, and 'put their faith' is more interpretive.
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: The construction πιστεύω εἰς commonly means to believe in someone, expressing
    personal trust directed toward him. 'In him' is standard and idiomatic English.
    More literal 'into him' is not natural English, and 'on him' is less common here.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Locative adverb indicating the place where this believing occurred. 'There'
    is the natural English equivalent and preserves the narrative emphasis on location.
