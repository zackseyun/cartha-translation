theological_decisions:
- issue: Rendering πιστεύω εἰς αὐτόν in a salvation-faith context
  chosen_reading: believed in him
  alternative_readings:
  - put their faith in him
  - believed into him
  rationale: The Greek expresses trust directed toward Jesus. 'Believed in him' preserves
    the theological force without over-paraphrasing. This aligns with the project's
    default rendering of πίστις-related language as 'faith'/'believe' unless a context
    requires otherwise.
