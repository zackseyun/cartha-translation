theological_decisions:
- issue: Rendering the reciprocal relationship between Jesus and his people without
    importing later doctrinal formulations
  chosen_reading: my own
  alternative_readings:
  - my sheep
  - those who are mine
  rationale: The verse emphasizes mutual knowledge between Jesus and those who belong
    to him. Rendering τὰ ἐμά as 'my own' preserves the relational belonging in the
    text while avoiding unnecessary expansion. This keeps the theological emphasis
    on mutual personal knowledge and covenantal belonging without over-paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 5
