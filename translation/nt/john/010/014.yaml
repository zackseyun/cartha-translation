id: JHN.10.14
reference: John 10:14
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ὁ ποιμὴν ὁ καλός, καὶ γινώσκω τὰ ἐμὰ καὶ ⸂γινώσκουσί με τὰ ἐμά⸃,
translation:
  text: I am the good shepherd, and I know my own, and my own know me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my sheep.' The Greek says literally 'my own' in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιμήν
  chosen: shepherd
  alternatives:
  - pastor
  lexicon: BDAG
  rationale: The ordinary sense is 'shepherd.' 'Pastor' would import later ecclesial
    associations not present in the immediate metaphor. Retaining 'shepherd' preserves
    the pastoral imagery of the discourse.
- source_word: καλός
  chosen: good
  alternatives:
  - noble
  - fine
  - ideal
  lexicon: BDAG
  rationale: In Johannine usage here, καλός carries the sense of moral excellence
    and fitting nobility. 'Good' is the established and natural English rendering
    that preserves both ethical and exemplary force without sounding wooden. Alternatives
    like 'noble' capture part of the nuance but are less idiomatic in this context.
- source_word: γινώσκω
  chosen: know
  alternatives:
  - recognize
  lexicon: BDAG
  rationale: The verb denotes personal knowledge and relational knowing, not mere
    cognition. 'Know' best preserves the reciprocal relational sense between Jesus
    and his own. 'Recognize' is too weak and situational for the context.
- source_word: τὰ ἐμὰ / τὰ ἐμά
  chosen: my own
  alternatives:
  - what is mine
  - those who are mine
  - my sheep
  lexicon: BDAG
  rationale: The neuter plural adjective literally means 'my own (things/ones).' In
    context it refers to those belonging to the shepherd, but the Greek does not explicitly
    repeat 'sheep' in this verse. 'My own' preserves the Greek's concise possessive
    expression and relational belonging without over-specifying beyond the text. 'My
    sheep' is contextually true from the surrounding passage but is not stated here,
    so it is better preserved as a footnoted alternative rather than placed in the
    main text.
- source_word: ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: 'This is the straightforward present-tense self-identification. In John''s
    Gospel it also resonates with the broader ''I am'' pattern, but here it functions
    grammatically as the explicit predicate introduction: ''I am the good shepherd.'''
- source_word: καί
  chosen: and
  alternatives:
  - indeed
  lexicon: BDAG
  rationale: The repeated conjunction links the clauses in a simple, cumulative way.
    'And' preserves the Greek coordination without adding emphasis not demanded by
    the text.
