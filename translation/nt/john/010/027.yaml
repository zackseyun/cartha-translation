theological_decisions:
- issue: Relational force of γινώσκω in the shepherd-sheep metaphor
  chosen_reading: Rendered as 'know' without expansion
  alternative_readings:
  - know personally
  - recognize
  rationale: The verse presents mutual relationship and recognition between Jesus
    and his sheep, but the Greek itself does not require an expanded paraphrase. Leaving
    'know' preserves theological depth without importing a narrower doctrinal formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
