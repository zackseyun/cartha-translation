id: JHN.10.27
reference: John 10:27
source:
  edition: SBLGNT
  text: τὰ πρόβατα τὰ ἐμὰ τῆς φωνῆς μου ⸀ἀκούουσιν, κἀγὼ γινώσκω αὐτά, καὶ ἀκολουθοῦσίν
    μοι,
translation:
  text: My sheep hear my voice, and I know them, and they follow me.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρόβατα
  chosen: sheep
  lexicon: BDAG
  rationale: Standard meaning of the noun; in this Johannine shepherd metaphor, 'sheep'
    is the natural and established English equivalent.
- source_word: τὰ ἐμὰ
  chosen: my
  alternatives:
  - that are mine
  - my own
  lexicon: BDAG
  rationale: The possessive adjective with article marks possession/emphasis. English
    idiom is best served by 'my sheep'; 'my own sheep' is possible but slightly heavier
    than the Greek requires here.
- source_word: φωνῆς
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: In context of personal recognition between shepherd and sheep, 'voice'
    is more precise than the broader 'sound' and fits Johannine usage.
- source_word: ἀκούουσιν
  chosen: hear
  alternatives:
  - listen to
  lexicon: BDAG
  rationale: Present active indicative denotes ongoing characteristic action. 'Hear'
    preserves the direct lexical sense and works idiomatically with 'my voice.' 'Listen
    to' would add a nuance of attentiveness not explicit in the verb alone.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: The crasis joins καί + ἐγώ. 'And I' preserves the connective and mild
    emphasis without overtranslating.
- source_word: γινώσκω
  chosen: know
  alternatives:
  - know personally
  - recognize
  lexicon: BDAG
  rationale: '''Know'' is the straightforward rendering and preserves the relational
    depth common in Johannine usage. ''Recognize'' is too weak; ''know personally''
    is interpretive expansion.'
- source_word: αὐτά
  chosen: them
  lexicon: BDAG
  rationale: Accusative plural pronoun referring back to the sheep; English personal
    object pronoun 'them' is the natural rendering.
- source_word: ἀκολουθοῦσίν μοι
  chosen: they follow me
  alternatives:
  - they are following me
  lexicon: BDAG
  rationale: Present tense again expresses characteristic ongoing action. English
    simple present best conveys this gnomic or customary sense.
