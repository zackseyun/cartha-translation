id: JHN.10.8
reference: John 10:8
source:
  edition: SBLGNT
  text: πάντες ὅσοι ἦλθον ⸂πρὸ ἐμοῦ⸃ κλέπται εἰσὶν καὶ λῃσταί· ἀλλ’ οὐκ ἤκουσαν αὐτῶν
    τὰ πρόβατα.
translation:
  text: All who came before me are thieves and robbers, but the sheep did not listen
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ahead of me.' The phrase may be understood temporally ('before me')
      or with the sense of coming in advance while claiming authority apart from Jesus;
      the context suggests false shepherds rather than all earlier servants of God.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες ὅσοι
  chosen: All who
  alternatives:
  - Everyone who
  - All those who
  lexicon: BDAG
  rationale: The combination is idiomatic and distributive, referring comprehensively
    to the group in view. 'All who' is concise, natural English and preserves the
    universal scope.
- source_word: ἦλθον
  chosen: came
  alternatives:
  - have come
  lexicon: BDAG
  rationale: Aorist indicative is best rendered here with simple past in English.
    'Came' fits the narrative discourse and avoids importing a present-result nuance
    not explicit in the Greek.
- source_word: πρὸ ἐμοῦ
  chosen: before me
  alternatives:
  - ahead of me
  - prior to me
  lexicon: BDAG
  rationale: The phrase can be temporal ('before me') and in this context most naturally
    refers to those who came prior to Jesus in relation to the shepherd imagery. 'Before
    me' is the standard, clear rendering. Because the phrase has been interpreted
    in different ways, an alternative nuance is preserved in a footnote.
- source_word: κλέπται
  chosen: thieves
  alternatives:
  - stealers
  lexicon: BDAG
  rationale: Standard rendering for κλέπτης, matching the immediate context of John
    10 where illicit taking is contrasted with the true shepherd.
- source_word: λῃσταί
  chosen: robbers
  alternatives:
  - bandits
  - brigands
  lexicon: BDAG
  rationale: λῃστής is distinct from κλέπτης and often denotes a more violent or predatory
    kind of criminal. 'Robbers' preserves the paired contrast in familiar English
    without over-specifying.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Simple adversative conjunction; 'but' is the most natural English equivalent
    here.
- source_word: οὐκ ἤκουσαν αὐτῶν
  chosen: did not listen to them
  alternatives:
  - did not hear them
  - did not heed them
  lexicon: BDAG
  rationale: ἀκούω with a genitive object can mean hear/listen to, often with the
    sense of responsive hearing. 'Did not listen to them' best fits the shepherd-sheep
    motif, where hearing implies recognizing and following a voice.
- source_word: τὰ πρόβατα
  chosen: the sheep
  lexicon: BDAG
  rationale: Standard rendering in the Johannine shepherd discourse. English uses
    'sheep' for both singular collective and plural; the article is retained.
