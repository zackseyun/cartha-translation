theological_decisions:
- issue: Scope and force of 'all who came before me'
  chosen_reading: Render the phrase straightforwardly as 'All who came before me'
    without narrowing it to every prior prophet or leader.
  alternative_readings:
  - All who came ahead of me
  - All who came before me [i.e., claiming messianic or shepherd authority apart from
    Jesus]
  rationale: The Greek is broad in form, but the discourse context cautions against
    reading Jesus as condemning all previous God-sent figures. The translation preserves
    the wording of the Greek without importing an interpretive limitation into the
    main text; contextual clarification is better handled in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
