theological_decisions:
- issue: Metaphorical rendering of θύρα in a shepherding context
  chosen_reading: door
  alternative_readings:
  - gate
  rationale: The verse presents one of Jesus's 'I am' metaphors. Rendering θύρα as
    'door' preserves the direct lexical form of the Greek and the familiar Johannine
    formulation, while not denying the pastoral nuance that could support 'gate.'
    Because the difference is interpretive rather than doctrinal, the alternative
    is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of σωθήσεται
  chosen_reading: will be saved
  alternative_readings:
  - will be rescued
  - will be delivered
  rationale: The text should not be flattened into merely physical safety nor expanded
    into a narrower systematic-theological formula than the verse itself states. 'Will
    be saved' preserves the Gospel's theological breadth and allows the text's own
    tension between spiritual salvation and pastoral security imagery to stand.
  doctrine_reference: Affirmations; Translation philosophy §3
