id: JHN.10.9
reference: John 10:9
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ἡ θύρα· δι’ ἐμοῦ ἐάν τις εἰσέλθῃ σωθήσεται καὶ εἰσελεύσεται καὶ ἐξελεύσεται
    καὶ νομὴν εὑρήσει.
translation:
  text: I am the door. If anyone enters through me, he will be saved, and will go
    in and go out and find pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "gate." The Greek word can denote a door or gate; "door" is kept in the
      main text as the more direct lexical rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: θύρα
  chosen: door
  alternatives:
  - gate
  lexicon: BDAG
  rationale: θύρα most basically denotes a door or entrance. In this metaphor, either
    'door' or 'gate' is possible in English, especially in a shepherding context.
    'Door' is retained because it is the more direct lexical equivalent and preserves
    the Johannine metaphor as stated, while 'gate' is preserved in a footnote as a
    contextual alternative.
- source_word: δι’ ἐμοῦ
  chosen: through me
  alternatives:
  - by me
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'Through me'
    is the most natural English rendering here and clearly conveys Jesus as the means
    of entry.
- source_word: ἐάν τις εἰσέλθῃ
  chosen: If anyone enters
  alternatives:
  - If someone enters
  - If anyone should enter
  lexicon: BDAG
  rationale: The construction ἐάν + aorist subjunctive presents a general conditional.
    'If anyone enters' is idiomatic modern English and preserves the open, indefinite
    scope of τις.
- source_word: σωθήσεται
  chosen: he will be saved
  alternatives:
  - will be rescued
  - will be delivered
  lexicon: BDAG
  rationale: σῴζω can mean save, rescue, or deliver depending on context. In John,
    the theological sense of salvation is prominent, so 'will be saved' best preserves
    both the lexical meaning and the Gospel's theological register. The masculine
    pronoun reflects the singular τις used generically, in keeping with the gender-accurate
    policy.
- source_word: εἰσελεύσεται καὶ ἐξελεύσεται
  chosen: will go in and go out
  alternatives:
  - will enter and go out
  - will come in and go out
  lexicon: BDAG
  rationale: The future middle forms are rendered with a natural English sequence.
    'Go in and go out' is idiomatic and preserves the paired movement imagery of freedom
    and security without overinterpreting it.
- source_word: νομὴν
  chosen: pasture
  alternatives:
  - grazing place
  - fodder
  lexicon: BDAG
  rationale: νομή refers to pasture or grazing. 'Pasture' is the clearest and most
    natural choice in the shepherd metaphor and fits the immediate context of sheep
    imagery in John 10.
- source_word: εὑρήσει
  chosen: find
  alternatives:
  - discover
  - obtain
  lexicon: BDAG
  rationale: εὑρίσκω is straightforwardly 'find.' This keeps the statement simple
    and direct, matching the Greek.
