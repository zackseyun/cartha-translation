id: JHN.10.28
reference: John 10:28
source:
  edition: SBLGNT
  text: κἀγὼ ⸂δίδωμι αὐτοῖς ζωὴν αἰώνιον⸃, καὶ οὐ μὴ ἀπόλωνται εἰς τὸν αἰῶνα, καὶ
    οὐχ ἁρπάσει τις αὐτὰ ἐκ τῆς χειρός μου.
translation:
  text: And I give them eternal life, and they will certainly never perish forever,
    and no one will snatch them out of my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shall never perish' or 'they will by no means perish.' The Greek
      uses a strong double negative for emphatic denial.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - And I myself
  - I also
  lexicon: BDAG
  rationale: Contraction of καὶ ἐγώ. Rendered 'And I' to preserve the connective force
    and the emphatic subject without overloading the English. The emphasis is sufficiently
    carried by word order in context.
- source_word: δίδωμι
  chosen: give
  alternatives:
  - am giving
  lexicon: BDAG
  rationale: Present indicative first singular. English simple present is the most
    natural optimal-equivalence rendering here, expressing Jesus' ongoing action without
    awkwardness.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Dative indirect object. English idiom prefers 'give them' rather than
    the more wooden 'give to them'.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: Standard and accurate rendering of the phrase in Johannine usage. 'Eternal
    life' best captures both duration and the established theological sense in John,
    while 'life of the age' is too literal for normal English.
- source_word: οὐ μὴ ἀπόλωνται
  chosen: they will certainly never perish
  alternatives:
  - they shall never perish
  - they will by no means perish
  lexicon: BDAG
  rationale: οὐ μή with the aorist middle subjunctive is a strong negation of future
    possibility. 'Will certainly never perish' preserves the emphatic force in clear
    modern English better than a flat 'will never perish' or archaic 'shall never
    perish'.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'forever' or 'for ever.' Included explicitly
    to preserve the Greek phrase rather than absorbing it silently into the preceding
    negation.
- source_word: οὐχ ἁρπάσει
  chosen: will snatch
  alternatives:
  - will seize
  - will take by force
  lexicon: BDAG
  rationale: Future indicative of ἁρπάζω, which commonly conveys forceful seizure.
    'Snatch' is concise, natural, and preserves the violent nuance.
- source_word: τις
  chosen: no one
  alternatives:
  - anyone
  lexicon: BDAG
  rationale: 'With the preceding negation, the sense is universal: ''no one.'' This
    is the clearest English rendering.'
- source_word: αὐτὰ
  chosen: them
  alternatives:
  - these
  lexicon: BDAG
  rationale: Neuter plural pronoun referring to the sheep. English naturally uses
    personal 'them' for animate referents, even when Greek uses neuter grammatical
    agreement.
- source_word: ἐκ τῆς χειρός μου
  chosen: out of my hand
  alternatives:
  - from my hand
  lexicon: BDAG
  rationale: A conventional metaphor for possession, protection, and control. 'Out
    of my hand' is the most natural and established English equivalent for ἐκ with
    χείρ in this context.
