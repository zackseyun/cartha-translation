theological_decisions:
- issue: Strength of the negation in Jesus' promise
  chosen_reading: Rendered the double negative emphatically as 'they will certainly
    never perish' without softening it.
  alternative_readings:
  - they will never perish
  - they shall never perish
  - they will by no means perish
  rationale: The Greek οὐ μή construction is unusually strong. The translation preserves
    that force while remaining readable. This reflects the grammar of the verse itself
    without importing a broader denominational doctrine beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of the neuter pronoun αὐτά
  chosen_reading: Translated as 'them' referring to Jesus' sheep.
  alternative_readings:
  - those things
  rationale: Although αὐτά is neuter, it refers back to the sheep in the discourse.
    English should reflect the animate referent naturally. This is a grammatical decision,
    not a depersonalizing theological one.
