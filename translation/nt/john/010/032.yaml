id: JHN.10.32
reference: John 10:32
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς· Πολλὰ ⸂ἔργα καλὰ ἔδειξα ὑμῖν⸃ ἐκ τοῦ ⸀πατρός· διὰ
    ποῖον αὐτῶν ἔργον ⸂ἐμὲ λιθάζετε⸃;
translation:
  text: Jesus answered them, “I showed you many good works from the Father; for which
    of them are you stoning me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of which of these works.'
    reason: lexical_alternative
  - marker: b
    text: Some translations read 'from my Father,' but the Greek here says simply
      'from the Father.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - responded
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for replying; 'answered' is the most natural
    and conventional English rendering here without loss of meaning.
- source_word: Πολλὰ ἔργα καλὰ
  chosen: many good works
  alternatives:
  - many fine works
  - many noble works
  lexicon: BDAG
  rationale: ἔργα is best rendered 'works' in Johannine context, often referring to
    Jesus's deeds/signs with theological significance. καλὰ here means 'good' in the
    sense of commendable or beneficial; 'good works' is idiomatic and preserves the
    moral quality.
- source_word: ἔδειξα
  chosen: I showed
  alternatives:
  - I have shown
  - I displayed
  lexicon: BDAG
  rationale: Aorist indicative is naturally rendered as simple past in English narrative
    dialogue. 'Showed' fits both the literal sense and the idea of making his works
    evident to them.
- source_word: ἐκ τοῦ πατρός
  chosen: from the Father
  alternatives:
  - from my Father
  - on the Father's behalf
  lexicon: BDAG
  rationale: The Greek text reads simply 'from the Father' without an explicit possessive
    pronoun. 'From the Father' preserves the source wording and indicates origin/source
    of Jesus's works without adding interpretive material.
- source_word: διὰ ποῖον αὐτῶν ἔργον
  chosen: for which of them
  alternatives:
  - because of which of these works
  - for which work among them
  lexicon: BDAG
  rationale: 'διά with the accusative here expresses cause or basis: ''because of/for
    which.'' The pronoun αὐτῶν refers back to the many works, so ''for which of them''
    is concise and natural while preserving the singular ἔργον by implication in English.'
- source_word: λιθάζετε
  chosen: are you stoning me
  alternatives:
  - do you stone me
  - are you trying to stone me
  lexicon: BDAG
  rationale: Present indicative can be rendered as progressive in this immediate confrontation
    context. 'Are you stoning me' reflects the action underway/intended. 'Trying to
    stone me' is interpretive and not explicit in the verb itself.
