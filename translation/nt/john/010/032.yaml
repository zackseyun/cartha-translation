theological_decisions:
- issue: Reference of 'the Father' in Jesus's speech
  chosen_reading: Retain 'the Father' as spoken, without expanding to 'my Father'
  alternative_readings:
  - from my Father
  rationale: The Greek lacks μου ('my'). Since the verse already carries strong christological
    significance, the translation should not intensify the filial claim beyond the
    wording actually present. The context still clearly identifies Jesus's relation
    to the Father without expansion.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
