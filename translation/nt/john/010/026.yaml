theological_decisions:
- issue: Force of ὅτι in relation to unbelief and belonging to Jesus' sheep
  chosen_reading: 'causal: ''because you are not among my sheep'''
  alternative_readings:
  - 'content/epexegetical: ''that you are not among my sheep'''
  rationale: The immediate discourse in John 10 contrasts Jesus' sheep, who hear and
    follow him, with these opponents, whose unbelief is explained by their not belonging
    to his flock. Rendering ὅτι causally preserves the Greek's likely sense without
    importing a broader doctrinal system. Because this wording can be discussed in
    debates over divine election and human unbelief, the translation preserves the
    alternative in a footnote rather than overstating certainty.
  doctrine_reference: Preserve theological tension rather than resolve it.
