id: JHN.10.26
reference: John 10:26
source:
  edition: SBLGNT
  text: ἀλλὰ ὑμεῖς οὐ πιστεύετε, ⸂ὅτι οὐκ⸃ ἐστὲ ἐκ τῶν προβάτων τῶν ⸀ἐμῶν.
translation:
  text: But you do not believe, because you are not among my sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'But you do not believe that you are not among my sheep.' The Greek
      conjunction can also be read as introducing content rather than cause.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  lexicon: BDAG
  rationale: Adversative conjunction marking contrast with the preceding description
    of Jesus' sheep hearing his voice. 'But' is the most natural modern English equivalent.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and adds emphasis. English can convey
    this adequately with normal word order in context; adding 'yourselves' would overstate
    the emphasis.
- source_word: οὐ πιστεύετε
  chosen: do not believe
  alternatives:
  - are not believing
  lexicon: BDAG
  rationale: Present active indicative with negation is best rendered as a simple
    present in English. 'Believe' fits Johannine usage better than 'trust' here, since
    the object is implicit and the issue is refusal to believe Jesus' testimony.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'In this context ὅτι can be read either causally (''because'') or as
    introducing content (''that''). The causal sense best fits the flow of argument:
    their unbelief is explained by their not being among Jesus'' sheep. The alternative
    is preserved in a footnote because the construction is interpretively significant.'
- source_word: οὐκ ἐστὲ
  chosen: you are not
  alternatives:
  - you are not existing as
  lexicon: BDAG
  rationale: Straightforward negated copula. Idiomatic English simply uses 'you are
    not'.
- source_word: ἐκ τῶν προβάτων
  chosen: among the sheep
  alternatives:
  - of the sheep
  - from the sheep
  lexicon: BDAG
  rationale: ἐκ here denotes belonging/origin from a group. 'Among the sheep' communicates
    group membership naturally in English, while preserving the sense that they do
    not belong to that flock.
- source_word: τῶν ἐμῶν
  chosen: my
  alternatives:
  - that are mine
  lexicon: BDAG
  rationale: The possessive adjective is most naturally rendered attributively in
    English as 'my,' modifying 'sheep'.
