id: JHN.10.39
reference: John 10:39
source:
  edition: SBLGNT
  text: ἐζήτουν οὖν ⸂πάλιν αὐτὸν⸃ πιάσαι· καὶ ἐξῆλθεν ἐκ τῆς χειρὸς αὐτῶν.
translation:
  text: So they were seeking again to seize him, but he went out from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of their hands' or 'from their grasp.' The Greek reads literally
      'from their hand,' an idiom for power or control.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  chosen: they were seeking
  alternatives:
  - they were trying
  - they sought
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or attempted action in past time. 'Were
    seeking' preserves the aspect better than simple 'sought,' while remaining natural
    English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference or development from the preceding exchange. 'So' is
    natural modern English and preserves the discourse connection without sounding
    overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: The adverb indicates repetition; the opponents had previously attempted
    to take Jesus. 'Again' is the most direct and idiomatic rendering.
- source_word: πιάσαι
  chosen: to seize
  alternatives:
  - to arrest
  - to take
  lexicon: BDAG
  rationale: πιάζω commonly means to seize or grasp, and in Johannine conflict contexts
    often carries the sense of apprehending Jesus. 'Seize' preserves the physical
    and hostile force without importing the more formal legal nuance of 'arrest' into
    the main text.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he escaped
  - he departed
  lexicon: BDAG
  rationale: The verb literally means 'went out.' Although the context implies escape,
    the Greek does not use an explicit verb for escaping. The more literal rendering
    preserves the narrative wording while allowing the implication to be inferred.
- source_word: ἐκ τῆς χειρὸς αὐτῶν
  chosen: from their hand
  alternatives:
  - out of their hands
  - from their grasp
  lexicon: BDAG
  rationale: χείρ here is singular in Greek ('hand') in an idiomatic expression meaning
    power or control. 'From their hand' preserves the idiom closely; the plural English
    alternative is more idiomatic but less formally aligned. 'From their grasp' interprets
    the idiom more dynamically.
