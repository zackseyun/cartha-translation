theological_decisions:
- issue: Whether to make Jesus' deliverance explicit as 'escaped' or retain the more
    literal narrative expression
  chosen_reading: Retain the literal wording 'he went out from their hand' rather
    than interpretively rendering 'he escaped from them.'
  alternative_readings:
  - he escaped from them
  - he slipped out of their grasp
  rationale: The verse narrates Jesus' inability to be captured at this moment, but
    the Greek expresses this through the idiom of going out from their hand rather
    than an explicit escape verb. Preserving the idiom avoids adding interpretive
    force beyond the text while still communicating the outcome.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
