theological_decisions:
- issue: Meaning of the neuter ἕν with plural ἐσμεν in a christologically significant
    statement
  chosen_reading: 'The verse is translated as an assertion of real oneness between
    Jesus and the Father while preserving personal distinction: ''I and the Father
    are one.'''
  alternative_readings:
  - '''I and the Father are one thing'''
  - '''I and the Father are in unity'''
  rationale: The neuter 'one' avoids Sabellian/person-collapsing implications that
    a masculine form might suggest, while the plural verb avoids denying distinction
    of persons. The translation should not weaken the statement into mere agreement,
    nor should it paraphrase it into later creedal terminology not present in the
    text. The simple English 'one' best preserves the theological tension affirmed
    by orthodox doctrine and the Greek grammar.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Translation philosophy §3 Preserve theological tension rather than resolve it.'
