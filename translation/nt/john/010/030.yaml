id: JHN.10.30
reference: John 10:30
source:
  edition: SBLGNT
  text: ἐγὼ καὶ ὁ πατὴρ ἕν ἐσμεν.
translation:
  text: I and the Father are one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'one' is neuter, which emphasizes oneness without identifying Jesus
      and the Father as one person.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Standard first-person singular pronoun; explicit in Greek and retained
    in English for the emphatic subject.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining the two subjects without adding
    nuance beyond coordination.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: With the article and Johannine usage, this functions as a titular reference
    to Jesus' Father; capitalization in English signals the personal/divine title
    rather than an indefinite familial reference.
- source_word: ἕν
  chosen: one
  alternatives:
  - one thing
  - in unity
  lexicon: BDAG
  rationale: Neuter singular, not masculine, indicating unity or oneness without collapsing
    the persons into one person. 'One' is the most direct and traditional rendering;
    alternatives either over-interpret or sound unnatural in English.
- source_word: ἐσμεν
  chosen: are
  lexicon: BDAG
  rationale: First-person plural present indicative of 'to be'; the plural is important
    because it preserves distinction between 'I' and 'the Father' even while asserting
    oneness.
