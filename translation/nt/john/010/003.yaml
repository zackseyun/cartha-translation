id: JHN.10.3
reference: John 10:3
source:
  edition: SBLGNT
  text: τούτῳ ὁ θυρωρὸς ἀνοίγει, καὶ τὰ πρόβατα τῆς φωνῆς αὐτοῦ ἀκούει καὶ τὰ ἴδια
    πρόβατα ⸀φωνεῖ κατ’ ὄνομα καὶ ἐξάγει αὐτά.
translation:
  text: To him the gatekeeper opens, and the sheep hear his voice, and he calls his
    own sheep by name and leads them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brings them out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  chosen: To him
  alternatives:
  - For this one
  - To this one
  lexicon: BDAG
  rationale: Dative singular of οὗτος refers back to the shepherd figure in the prior
    verse. 'To him' is idiomatic English and preserves the personal reference better
    than the more wooden 'to this one.'
- source_word: θυρωρός
  chosen: gatekeeper
  alternatives:
  - doorkeeper
  - porter
  lexicon: BDAG
  rationale: Refers to the one who keeps/opens the entrance. 'Gatekeeper' fits the
    sheepfold setting better than 'doorkeeper'; 'porter' is archaic in this context.
- source_word: ἀνοίγει
  chosen: opens
  alternatives:
  - opens up
  lexicon: BDAG
  rationale: Simple present active; 'opens' is the natural direct rendering.
- source_word: τὰ πρόβατα
  chosen: the sheep
  lexicon: BDAG
  rationale: Standard rendering of πρόβατα in this pastoral metaphor.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - the sound of his voice
  lexicon: BDAG
  rationale: Genitive construction after ἀκούω is naturally rendered 'hear his voice.'
    'Voice' preserves both literal and relational dimensions of the image.
- source_word: ἀκούει
  chosen: hear
  alternatives:
  - listen to
  lexicon: BDAG
  rationale: 'Although morphologically singular in the provided text, the neuter plural
    subject τὰ πρόβατα commonly takes a singular verb in Greek while remaining plural
    in sense. English therefore requires plural agreement: ''the sheep hear.'' ''Hear''
    is preferable to ''listen to'' because it reflects recognition rather than mere
    attentiveness.'
- source_word: τὰ ἴδια πρόβατα
  chosen: his own sheep
  alternatives:
  - the sheep that are his own
  lexicon: BDAG
  rationale: ἴδια marks possession and special relation. 'His own sheep' is idiomatic
    and preserves the emphasis.
- source_word: φωνεῖ
  chosen: calls
  alternatives:
  - summons
  - calls for
  lexicon: BDAG
  rationale: In context of naming and leading, 'calls' is the most natural rendering
    and preserves the shepherd imagery.
- source_word: κατ’ ὄνομα
  chosen: by name
  alternatives:
  - name by name
  - according to name
  lexicon: BDAG
  rationale: Idiomatic expression meaning individually/by each one's name. 'By name'
    is the standard natural English equivalent.
- source_word: ἐξάγει
  chosen: leads ... out
  alternatives:
  - brings ... out
  - takes ... out
  lexicon: BDAG
  rationale: ἐξάγω can mean bring out/lead out. In shepherd imagery, 'leads them out'
    best conveys personal guidance rather than mere movement.
- source_word: αὐτά
  chosen: them
  lexicon: BDAG
  rationale: Refers back to the sheep; English uses the personal/object pronoun 'them'
    naturally for animals in a flock.
