theological_decisions:
- issue: Shepherd imagery and agency
  chosen_reading: 'Rendered the actions straightforwardly as those of the shepherd
    figure: the gatekeeper opens to him, the sheep hear his voice, he calls his own
    sheep, and he leads them out.'
  alternative_readings:
  - More interpretive renderings that foreground Jesus' identity explicitly in the
    verse
  rationale: The verse is metaphorical within its discourse context, but the translation
    should not import christological interpretation into the wording itself. Historic
    orthodoxy is preserved without overtranslating the metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
