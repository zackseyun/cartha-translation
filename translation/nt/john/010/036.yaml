id: JHN.10.36
reference: John 10:36
source:
  edition: SBLGNT
  text: ὃν ὁ πατὴρ ἡγίασεν καὶ ἀπέστειλεν εἰς τὸν κόσμον ὑμεῖς λέγετε ὅτι Βλασφημεῖς,
    ὅτι εἶπον· Υἱὸς τοῦ θεοῦ εἰμι;
translation:
  text: do you say of the one whom the Father sanctified and sent into the world,
    ‘You are blaspheming,’ because I said, ‘I am the Son of God’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consecrated' or 'set apart' for ἡγίασεν.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγίασεν
  chosen: sanctified
  alternatives:
  - consecrated
  - set apart
  lexicon: BDAG
  rationale: ἁγιάζω commonly means to make holy, consecrate, or set apart. In this
    context, referring to the Son's commissioning by the Father, 'sanctified' preserves
    the theological and lexical connection to holiness without over-paraphrasing.
    'Consecrated' and 'set apart' are viable, but 'sanctified' best retains the verbal
    force and Johannine theological weight.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: ἀποστέλλω straightforwardly means 'send.' 'Commissioned' captures part
    of the sense but is more interpretive. 'Sent' preserves the common Johannine mission
    language and keeps the wording transparent.
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: κόσμος in John regularly carries the sense 'world,' often with theological
    overtones regarding the created order and humanity in rebellion. The standard
    rendering is appropriate here.
- source_word: Βλασφημεῖς
  chosen: You are blaspheming
  alternatives:
  - You blaspheme
  lexicon: BDAG
  rationale: The present indicative can be rendered either as simple present or progressive.
    'You are blaspheming' fits natural English in direct accusation and reflects the
    ongoing charge being voiced by Jesus' opponents.
- source_word: Υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: The anarthrous Υἱὸς with the genitive τοῦ θεοῦ in a predicate construction
    is best rendered idiomatically as the titular expression 'the Son of God.' This
    preserves the christological force recognized in the context. 'God's Son' is possible
    but less clearly reflects the title form.
- source_word: ὃν ὁ πατὴρ
  chosen: the one whom the Father
  alternatives:
  - him whom the Father
  lexicon: BDAG
  rationale: This relative construction is naturally rendered in English as 'the one
    whom the Father.' It is clearer and more idiomatic than 'him whom the Father'
    while preserving the referential force.
- source_word: ὅτι ... ὅτι
  chosen: do you say ... because I said
  alternatives:
  - do you say ... because I said that
  - do you say ... for saying
  lexicon: BDAG
  rationale: 'The first ὅτι introduces indirect discourse (''that''), while the second
    gives the content/reason tied to the accusation. Rendering the second as ''because''
    makes the logic explicit in idiomatic English: the accusation of blasphemy is
    based on Jesus'' statement. This is a contextual, not doctrinal, clarification.'
