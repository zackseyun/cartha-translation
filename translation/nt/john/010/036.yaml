theological_decisions:
- issue: Rendering ἡγίασεν in relation to the Son
  chosen_reading: sanctified
  alternative_readings:
  - consecrated
  - set apart
  rationale: The verse speaks of the Father's action toward the Son prior to sending
    him into the world. 'Sanctified' preserves the text's own wording and theological
    tension without implying that the Son was morally improved or previously unholy.
    The context indicates consecration/setting apart for mission, but the translation
    keeps the more literal term in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations on Nicene and
    Chalcedonian orthodoxy
- issue: Christological force of 'Son of God'
  chosen_reading: the Son of God
  alternative_readings:
  - God's Son
  rationale: Given the immediate context of a blasphemy accusation and Jesus' defense
    in John 10, the phrase functions as a significant christological title. Rendering
    it as 'the Son of God' preserves that force without importing later doctrinal
    formulations beyond the text.
  doctrine_reference: Affirmations on Nicene and Chalcedonian orthodoxy; Translation
    philosophy §1
