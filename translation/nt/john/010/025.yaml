id: JHN.10.25
reference: John 10:25
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς· Εἶπον ὑμῖν καὶ οὐ πιστεύετε· τὰ ἔργα ἃ ἐγὼ ποιῶ
    ἐν τῷ ὀνόματι τοῦ πατρός μου ταῦτα μαρτυρεῖ περὶ ἐμοῦ·
translation:
  text: Jesus answered them, “I told you, and you do not believe. The works that I
    do in the name of my Father—these testify about me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the authority of my Father.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these bear witness concerning me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; 'answered'
    is idiomatic and fits the discourse context.
- source_word: Εἶπον
  chosen: I told
  alternatives:
  - I said to you
  lexicon: BDAG
  rationale: Aorist λέγω here refers to prior speech already given; 'I told you' is
    natural English and preserves the force of a previous statement addressed to them.
- source_word: πιστεύετε
  chosen: you do not believe
  alternatives:
  - you are not believing
  - you do not trust
  lexicon: BDAG
  rationale: πιστεύω in Johannine usage commonly means believing Jesus' claims/testimony.
    'Believe' is the default rendering and best preserves the theological and lexical
    continuity of the Gospel.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the standard Johannine term for Jesus'' actions/signs and
    preserves intertextual consistency within John better than the more generic ''deeds.'''
- source_word: ἐν τῷ ὀνόματι
  chosen: in the name of
  alternatives:
  - by the authority of
  - under the name of
  lexicon: BDAG
  rationale: This phrase can imply agency/authority, but 'in the name of' preserves
    the Greek expression while allowing the full semantic range, including representation
    and authorization.
- source_word: πατρός μου
  chosen: my Father
  alternatives:
  - my father
  lexicon: BDAG
  rationale: Capitalized 'Father' reflects its use as a divine relational title for
    God in this context, not merely a generic familial reference.
- source_word: ταῦτα μαρτυρεῖ περὶ ἐμοῦ
  chosen: these testify about me
  alternatives:
  - these bear witness concerning me
  - they testify about me
  lexicon: BDAG
  rationale: Fronted ταῦτα is retained with 'these' for emphasis. μαρτυρέω is rendered
    'testify' for clear modern English while preserving the legal-witness nuance central
    to John's Gospel; 'about me' is idiomatic for περὶ ἐμοῦ.
