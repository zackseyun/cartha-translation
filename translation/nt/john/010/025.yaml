theological_decisions:
- issue: Relation of Jesus' works to the Father's authority and identity
  chosen_reading: The works are done 'in the name of my Father,' preserving the text's
    claim of divine authorization without expanding it beyond what the verse explicitly
    states.
  alternative_readings:
  - The works are done 'by my Father's authority'
  rationale: The verse contributes to Johannine Christology, but the translation should
    not over-interpret the phrase into a fuller doctrinal statement than the Greek
    itself expresses. The idiom 'in the name of' keeps the theological tension and
    breadth intact.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
