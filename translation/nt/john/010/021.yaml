id: JHN.10.21
reference: John 10:21
source:
  edition: SBLGNT
  text: ⸀ἄλλοι ἔλεγον· Ταῦτα τὰ ῥήματα οὐκ ἔστιν δαιμονιζομένου· μὴ δαιμόνιον δύναται
    τυφλῶν ὀφθαλμοὺς ⸀ἀνοῖξαι;
translation:
  text: Others were saying, “These words are not those of a demon-possessed man. A
    demon cannot open the eyes of the blind, can it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “These words are not from one who is demon-possessed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι
  chosen: Others
  alternatives:
  - Some others
  lexicon: BDAG
  rationale: Contrasts this group with the previous speakers in context; simple 'Others'
    is natural and sufficient in English.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the crowd, better
    reflected by 'were saying' than simple past.
- source_word: Ταῦτα τὰ ῥήματα
  chosen: These words
  alternatives:
  - These sayings
  - These statements
  lexicon: BDAG
  rationale: ῥήματα here refers to Jesus' spoken utterances. 'Words' is the most direct
    and natural rendering; 'sayings' is possible but slightly more idiomatic than
    necessary.
- source_word: οὐκ ἔστιν δαιμονιζομένου
  chosen: are not those of a demon-possessed man
  alternatives:
  - are not from one who is demon-possessed
  - do not belong to a demonized person
  lexicon: BDAG
  rationale: The genitive participle functions idiomatically to describe the kind
    of speaker these words would come from. 'Those of a demon-possessed man' makes
    the implied source explicit in natural English. 'Demon-possessed' is retained
    as the clearest established rendering for δαιμονίζομαι in this context.
- source_word: μὴ
  chosen: can it?
  alternatives:
  - surely not
  - can a demon really
  lexicon: BDAG
  rationale: μή introduces a question expecting a negative answer. In English, a negative
    assertion followed by the tag 'can it?' best captures the rhetorical force.
- source_word: δαιμόνιον
  chosen: A demon
  alternatives:
  - an evil spirit
  lexicon: BDAG
  rationale: δαιμόνιον is directly 'demon.' 'Evil spirit' is interpretive and less
    formally aligned with the Greek term.
- source_word: δύναται
  chosen: cannot
  alternatives:
  - is not able to
  lexicon: BDAG
  rationale: Combined with μή in the rhetorical question, the expected-negative sense
    is best conveyed idiomatically as 'cannot' in English.
- source_word: τυφλῶν ὀφθαλμοὺς
  chosen: the eyes of the blind
  alternatives:
  - blind people's eyes
  - the eyes of blind people
  lexicon: BDAG
  rationale: A literal genitive construction is clear and idiomatic in English. It
    also preserves the allusion to the healing of the man born blind in the preceding
    context.
- source_word: ἀνοῖξαι
  chosen: open
  alternatives:
  - restore sight to
  lexicon: BDAG
  rationale: The infinitive literally means 'to open.' Since 'eyes' is explicit in
    the Greek, 'open' preserves the concrete imagery better than the more interpretive
    'restore sight to'.
