theological_decisions:
- issue: Rendering of δαιμονίζομαι / δαιμόνιον language
  chosen_reading: demon-possessed man / A demon
  alternative_readings:
  - demonized man / a demon
  - oppressed by a demon / an evil spirit
  rationale: The verse presents opponents reasoning that Jesus' words and works are
    inconsistent with demonic agency. 'Demon-possessed' is the clearest standard English
    rendering for δαιμονίζομαι here, while 'demon' straightforwardly renders δαιμόνιον.
    This avoids softening the text while not importing a more technical doctrine of
    possession than the Greek itself requires.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic'
- issue: Force of the rhetorical question introduced by μή
  chosen_reading: A demon cannot open the eyes of the blind, can it?
  alternative_readings:
  - Surely a demon cannot open the eyes of the blind?
  - Can a demon open the eyes of the blind?
  rationale: μή marks a question expecting a negative answer. The chosen English preserves
    that expectation without over-paraphrasing. It keeps the crowd's reasoning force
    clear while remaining natural modern English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English'
