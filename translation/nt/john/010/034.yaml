id: JHN.10.34
reference: John 10:34
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς· Οὐκ ἔστιν γεγραμμένον ἐν τῷ νόμῳ ὑμῶν ⸀ὅτι Ἐγὼ εἶπα·
    Θεοί ἐστε;
translation:
  text: Jesus answered them, “Is it not written in your Law, ‘I said, you are gods’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divine beings.' Jesus is quoting Psalm 82:6, where the term is debated
      in interpretation; the main text preserves the direct wording of the citation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the most natural and
    common English equivalent in Johannine dialogue.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative object is naturally incorporated into English as 'answered
    them' rather than the more wooden 'answered to them.'
- source_word: Οὐκ ἔστιν γεγραμμένον
  chosen: Is it not written
  alternatives:
  - Has it not been written
  - Is it not recorded
  lexicon: BDAG
  rationale: This idiom introduces a scriptural citation. English commonly renders
    the perfect passive participle with present force as 'is written.' The interrogative
    form reflects the Greek question.
- source_word: ἐν τῷ νόμῳ ὑμῶν
  chosen: in your Law
  alternatives:
  - in your law
  lexicon: BDAG
  rationale: νόμος here refers broadly to the Jewish Scriptures as cited by Jesus,
    specifically including Psalm 82:6, not merely the Pentateuch in a narrow sense.
    Capitalizing 'Law' signals this recognized scriptural designation in context.
- source_word: ὅτι
  chosen: ‘I said, you are gods’
  alternatives:
  - that, 'I said, you are gods'
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what is written. In idiomatic English,
    the quotation can follow directly without an explicit 'that' after 'written.'
- source_word: Ἐγὼ εἶπα
  chosen: I said
  alternatives:
  - I myself said
  lexicon: BDAG
  rationale: The explicit pronoun reflects the wording of the cited Psalm. English
    does not need extra emphasis here beyond 'I said' unless the context demands stress.
- source_word: Θεοί
  chosen: gods
  alternatives:
  - divine beings
  lexicon: BDAG
  rationale: The plural noun θεοί is most directly rendered 'gods' in the Psalm citation.
    This preserves the wording of the cited text without importing an interpretive
    paraphrase.
- source_word: ἐστε
  chosen: you are
  alternatives:
  - you are called
  lexicon: BDAG
  rationale: The copula should be translated directly. Adding 'called' would interpret
    beyond the Greek wording.
