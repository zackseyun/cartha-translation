theological_decisions:
- issue: Rendering θεοί in Jesus' citation of Psalm 82:6
  chosen_reading: gods
  alternative_readings:
  - divine beings
  rationale: The direct quotation is best preserved with the plain lexical equivalent
    'gods.' This maintains the rhetorical force of Jesus' argument and avoids softening
    the citation into interpretation. Because readers may misconstrue the phrase apart
    from its Psalm context, an alternative explanatory rendering is preserved in a
    footnote rather than adopted in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
