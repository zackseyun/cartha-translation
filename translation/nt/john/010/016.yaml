id: JHN.10.16
reference: John 10:16
source:
  edition: SBLGNT
  text: καὶ ἄλλα πρόβατα ἔχω ἃ οὐκ ἔστιν ἐκ τῆς αὐλῆς ταύτης· κἀκεῖνα ⸂δεῖ με⸃ ἀγαγεῖν,
    καὶ τῆς φωνῆς μου ἀκούσουσιν, καὶ ⸀γενήσονται μία ποίμνη, εἷς ποιμήν.
translation:
  text: And I have other sheep that are not from this sheepfold. I must bring them
    also, and they will listen to my voice. Then there will be one flock, one shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will hear my voice.' The Greek verb can mean either 'hear' or 'listen,'
      but here likely includes the sense of responsive hearing.
    reason: lexical_alternative
  - marker: b
    text: Greek distinguishes 'sheepfold' (αὐλή, an enclosure) from 'flock' (ποίμνη,
      the group of sheep). Some translations render the final phrase 'one fold,' but
      'one flock' better reflects the Greek wording here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλα πρόβατα
  chosen: other sheep
  alternatives:
  - other lambs
  lexicon: BDAG
  rationale: πρόβατα is the standard term for sheep, not specifically lambs. ἄλλα
    indicates other sheep in addition to those already in view.
- source_word: αὐλή
  chosen: sheepfold
  alternatives:
  - fold
  - courtyard
  - enclosure
  lexicon: BDAG
  rationale: In this shepherding context, αὐλή refers to a sheep enclosure or fold.
    'Sheepfold' makes the referent explicit in natural English and fits the immediate
    metaphor better than the broader 'courtyard.'
- source_word: κἀκεῖνα
  chosen: them also
  alternatives:
  - those also
  - those too
  lexicon: BDAG
  rationale: The pronoun refers back to the neuter plural 'other sheep.' English idiom
    prefers 'them also' over the more wooden 'those also.'
- source_word: δεῖ με ἀγαγεῖν
  chosen: I must bring
  alternatives:
  - it is necessary for me to bring
  - I need to bring
  - I must lead
  lexicon: BDAG
  rationale: δεῖ expresses necessity, and ἀγαγεῖν from ἄγω here means to bring/lead.
    'I must bring' preserves the force of divine necessity in idiomatic English without
    over-paraphrase. 'Lead' is possible because of the shepherd image, but 'bring'
    more directly reflects ἄγω in this construction.
- source_word: τῆς φωνῆς μου ἀκούσουσιν
  chosen: they will listen to my voice
  alternatives:
  - they will hear my voice
  lexicon: BDAG
  rationale: ἀκούω can mean hear or listen. In Johannine shepherd imagery, the sense
    is not mere auditory perception but responsive hearing, so 'listen to my voice'
    better conveys the relational and obedient nuance.
- source_word: γενήσονται
  chosen: there will be
  alternatives:
  - they will become
  lexicon: BDAG
  rationale: γίνομαι can mean become or come to be. Here 'there will be' is smoother
    English for the resulting state while preserving the future sense.
- source_word: μία ποίμνη
  chosen: one flock
  alternatives:
  - one herd
  lexicon: BDAG
  rationale: ποίμνη means flock, the group of sheep. This is the best fit for the
    pastoral metaphor.
- source_word: εἷς ποιμήν
  chosen: one shepherd
  lexicon: BDAG
  rationale: ποιμήν is literally shepherd. The phrase is central to the verse's imagery
    and should remain explicit.
