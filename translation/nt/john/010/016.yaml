theological_decisions:
- issue: Rendering αὐλή and ποίμνη distinctly
  chosen_reading: this sheepfold ... one flock
  alternative_readings:
  - this fold ... one flock
  - this fold ... one fold
  rationale: 'The Greek uses two different nouns: αὐλή (enclosure/fold) and ποίμνη
    (flock). Rendering both as ''fold'' obscures the distinction and can suggest one
    institutional enclosure rather than one gathered flock under one shepherd. The
    chosen rendering preserves the lexical contrast in the source text.'
  doctrine_reference: 'Translation philosophy #1, #5'
- issue: Force of δεῖ
  chosen_reading: I must bring them also
  alternative_readings:
  - I need to bring them also
  - it is necessary for me to bring them also
  rationale: δεῖ often signals necessity with theological weight in John. 'Must' preserves
    that force without importing a specific doctrinal explanation of the necessity.
  doctrine_reference: 'Translation philosophy #3'
