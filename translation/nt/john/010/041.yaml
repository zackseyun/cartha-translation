theological_decisions:
- issue: Johannine σημεῖον terminology
  chosen_reading: sign
  alternative_readings:
  - miracle
  rationale: Because John's Gospel uses σημεῖον with thematic significance, the translation
    preserves 'sign' rather than flattening it to 'miracle.' This is a lexical-theological
    choice rooted in authorial usage, not a doctrinal imposition.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
