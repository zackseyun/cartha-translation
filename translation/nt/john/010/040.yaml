id: JHN.10.40
reference: John 10:40
source:
  edition: SBLGNT
  text: Καὶ ἀπῆλθεν πάλιν πέραν τοῦ Ἰορδάνου εἰς τὸν τόπον ὅπου ἦν Ἰωάννης τὸ πρῶτον
    βαπτίζων, καὶ ἔμεινεν ἐκεῖ.
translation:
  text: And he went away again across the Jordan to the place where John had first
    been baptizing, and he stayed there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure from the present location. 'Went
    away' preserves the sense of leaving more clearly than simple 'went,' while remaining
    natural English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense indicating a repeated movement; 'again' is the
    most natural and direct rendering.
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: across the Jordan
  alternatives:
  - beyond the Jordan
  - to the other side of the Jordan
  lexicon: BDAG
  rationale: πέραν with the genitive indicates location on the far side. 'Across the
    Jordan' is clear modern English; 'beyond the Jordan' is more traditional but less
    idiomatic.
- source_word: εἰς τὸν τόπον
  chosen: to the place
  alternatives:
  - into the place
  lexicon: BDAG
  rationale: εἰς marks movement toward a destination. 'To the place' is idiomatic
    in English for travel to a location.
- source_word: ὅπου ἦν Ἰωάννης
  chosen: where John had been
  alternatives:
  - where John was
  lexicon: BDAG
  rationale: Although ἦν is imperfect ('was'), English past perfect is preferable
    here because the clause refers to an earlier period relative to Jesus' return
    there. This helps the temporal relation read naturally.
- source_word: τὸ πρῶτον
  chosen: first
  alternatives:
  - at first
  - formerly
  lexicon: BDAG
  rationale: Idiomatic adverbial accusative meaning 'at first' or 'formerly.' 'First'
    works smoothly with 'had been baptizing' and preserves the temporal reference
    to John's earlier ministry there.
- source_word: βαπτίζων
  chosen: been baptizing
  alternatives:
  - baptizing
  lexicon: BDAG
  rationale: Present participle describes John's ongoing activity at that earlier
    time. Rendering with English past perfect progressive ('had been baptizing') best
    conveys the durative aspect in relation to Jesus' return.
- source_word: ἔμεινεν
  chosen: stayed
  alternatives:
  - remained
  lexicon: BDAG
  rationale: Aorist of μένω means to remain or stay. 'Stayed' is more natural contemporary
    English, while preserving the sense.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Straightforward locative adverb; 'there' is the direct equivalent.
