id: JHN.10.35
reference: John 10:35
source:
  edition: SBLGNT
  text: εἰ ἐκείνους εἶπεν θεοὺς πρὸς οὓς ὁ λόγος τοῦ θεοῦ ἐγένετο, καὶ οὐ δύναται
    λυθῆναι ἡ γραφή,
translation:
  text: If he called those to whom the word of God came ‘gods’—and the Scripture cannot
    be broken—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'divine ones.' The Greek says 'gods,' echoing Psalm 82:6; some interpreters
      understand the referent as human judges.
    reason: lexical_alternative
  - marker: b
    text: Or 'cannot be annulled' or 'cannot be set aside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a first-class conditional argument in Jesus' reasoning. 'If'
    is the natural English equivalent and preserves the argumentative structure.
- source_word: ἐκείνους
  chosen: those
  alternatives:
  - those men
  lexicon: BDAG
  rationale: Refers back to the persons cited from Scripture (Psalm 82). 'Those' is
    sufficiently specific without adding 'men,' which is not explicit here.
- source_word: εἶπεν
  chosen: he called
  alternatives:
  - he said
  lexicon: BDAG
  rationale: 'Although the verb is literally ''said,'' the construction ''said gods''
    in English is awkward. ''Called'' accurately conveys the predicative sense: he
    designated them as ''gods.'''
- source_word: θεοὺς
  chosen: gods
  alternatives:
  - divine ones
  lexicon: BDAG
  rationale: The accusative plural directly reflects the wording of Psalm 82:6 as
    cited by Jesus. Lowercase 'gods' preserves the distinction from the one true God
    and avoids importing a stronger ontological claim than the context warrants.
- source_word: πρὸς οὓς
  chosen: to whom
  alternatives:
  - against whom
  - with whom
  lexicon: BDAG
  rationale: 'In this idiom with ἐγένετο, πρός conveys direction toward persons: ''the
    word of God came to.'' This is the most natural English rendering in context.'
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: A standard and transparent rendering. Here it likely refers to the divine
    utterance/judicial address in Scripture rather than the personal Logos of John
    1, so the ordinary phrase 'the word of God' is best.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - came to be
  - was given
  lexicon: BDAG
  rationale: In the expression 'the word of God came to someone,' English idiom prefers
    'came.' This preserves the eventive sense without woodenly rendering 'became.'
- source_word: οὐ δύναται λυθῆναι
  chosen: cannot be broken
  alternatives:
  - cannot be annulled
  - cannot be set aside
  lexicon: BDAG
  rationale: 'This is the established and contextually strong sense: Scripture''s
    authority cannot be nullified or invalidated. ''Broken'' is concise and idiomatic,
    while the alternatives are preserved because they make the legal/authoritative
    nuance more explicit.'
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - Scripture
  lexicon: BDAG
  rationale: With the article, the phrase refers to Scripture as an authoritative
    written text. 'The Scripture' preserves that specificity and matches common Johannine
    usage.
