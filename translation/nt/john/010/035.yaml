theological_decisions:
- issue: Meaning of 'gods' in Jesus' citation
  chosen_reading: Retain the literal term 'gods' in lowercase for those addressed
    in Scripture, without explaining or softening it in the main text.
  alternative_readings:
  - judges
  - divine beings
  rationale: Jesus' argument depends on the exact wording of Psalm 82:6. Translating
    θεούς as 'judges' would move from translation into interpretation and weaken the
    verbal force of his argument. Lowercase formatting signals that this does not
    equate them with the one true God.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Force of 'the Scripture cannot be broken'
  chosen_reading: 'Render as a statement of Scripture''s inviolable authority: ''the
    Scripture cannot be broken.'''
  alternative_readings:
  - the Scripture cannot be annulled
  - the Scripture cannot be set aside
  rationale: The clause functions parenthetically to ground Jesus' argument in the
    unassailable authority of Scripture. 'Broken' preserves the traditional concise
    force while remaining faithful to the Greek; alternatives are noted because they
    clarify the sense of invalidation.
  doctrine_reference: Affirmations consistent with historic orthodoxy; no denominationally
    specific claim imported.
