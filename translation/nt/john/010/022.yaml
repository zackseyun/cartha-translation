theological_decisions:
- issue: Identification of τὰ ἐγκαίνια
  chosen_reading: Rendered as 'the Feast of Dedication' in the main text
  alternative_readings:
  - the Dedication
  - Hanukkah
  rationale: This is not a major doctrinal dispute, but it is a culturally significant
    identification. The main text translates the Greek term rather than replacing
    it with the later/common festival name, in keeping with original-language primacy
    and readability. The common identification 'Hanukkah' is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
