id: JHN.10.12
reference: John 10:12
source:
  edition: SBLGNT
  text: ὁ ⸀μισθωτὸς καὶ οὐκ ὢν ποιμήν, οὗ οὐκ ⸀ἔστιν τὰ πρόβατα ἴδια, θεωρεῖ τὸν λύκον
    ἐρχόμενον καὶ ἀφίησιν τὰ πρόβατα καὶ φεύγει— καὶ ὁ λύκος ἁρπάζει αὐτὰ καὶ ⸀σκορπίζει—
translation:
  text: The hired hand, who is not a shepherd and whose sheep are not his own, sees
    the wolf coming and leaves the sheep and flees—and the wolf snatches them and
    scatters them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abandons the sheep.' The verb 'leaves' can carry the stronger sense
      of deserting them in danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθωτός
  chosen: hired hand
  alternatives:
  - hired man
  - hireling
  lexicon: BDAG
  rationale: Denotes one who works for wages. 'Hired hand' is natural modern English
    and preserves the contrast with the true shepherd without the archaic tone of
    'hireling.'
- source_word: οὐκ ὢν ποιμήν
  chosen: who is not a shepherd
  alternatives:
  - not being a shepherd
  lexicon: BDAG
  rationale: 'The participial construction is rendered as a relative clause for clear
    English while preserving the predicative force: he is not truly a shepherd.'
- source_word: οὗ οὐκ ἔστιν τὰ πρόβατα ἴδια
  chosen: whose sheep are not his own
  alternatives:
  - to whom the sheep do not belong
  - whose own sheep they are not
  lexicon: BDAG
  rationale: Expresses lack of ownership/personal belonging. 'His own' captures ἴδια
    well and fits the Johannine emphasis on personal relation.
- source_word: θεωρεῖ
  chosen: sees
  alternatives:
  - observes
  - notices
  lexicon: BDAG
  rationale: In context the verb marks perception of danger. 'Sees' is idiomatic and
    sufficient without overtranslating.
- source_word: τὸν λύκον ἐρχόμενον
  chosen: the wolf coming
  alternatives:
  - the wolf approaching
  lexicon: BDAG
  rationale: A straightforward rendering of the accusative object with participle.
    'Coming' preserves the vivid present-participial movement.
- source_word: ἀφίησιν
  chosen: leaves
  alternatives:
  - abandons
  lexicon: BDAG
  rationale: The verb can mean leave or abandon. 'Leaves' is the more direct lexical
    equivalent here; the context itself conveys the culpable abandonment.
- source_word: φεύγει
  chosen: flees
  alternatives:
  - runs away
  lexicon: BDAG
  rationale: '''Flees'' is concise, vivid, and matches the danger context better than
    the more colloquial ''runs away.'''
- source_word: ἁρπάζει
  chosen: snatches
  alternatives:
  - seizes
  - catches
  lexicon: BDAG
  rationale: Conveys violent taking. 'Snatches' is vivid and idiomatic in English
    for predatory action.
- source_word: σκορπίζει
  chosen: scatters them
  alternatives:
  - scatters
  lexicon: BDAG
  rationale: The object is implicit from context after αὐτά. Supplying 'them' in English
    makes the sense explicit and natural.
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - flock
  lexicon: BDAG
  rationale: The noun is plural and concrete; 'sheep' preserves the imagery better
    than the collective 'flock'.
