theological_decisions:
- issue: Metaphorical force of shepherd imagery
  chosen_reading: Retain 'shepherd' and 'hired hand' as literal pastoral terms within
    the metaphor, without importing interpretive explanation into the text.
  alternative_readings:
  - Use more interpretive language such as 'leader' or 'caretaker'
  rationale: John 10 depends on sustained shepherd imagery. Replacing the terms with
    explanatory abstractions would flatten the metaphor and import interpretation
    beyond the Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
