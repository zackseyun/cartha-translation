id: JHN.10.17
reference: John 10:17
source:
  edition: SBLGNT
  text: διὰ τοῦτό ⸂με ὁ πατὴρ⸃ ἀγαπᾷ ὅτι ἐγὼ τίθημι τὴν ψυχήν μου, ἵνα πάλιν λάβω
    αὐτήν.
translation:
  text: 'For this reason the Father loves me: because I lay down my life so that I
    may take it up again.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul.' Here ψυχή most naturally means 'life' in the sense of the
      life Jesus lays down in death and takes up again.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - For this
  lexicon: BDAG
  rationale: A natural causal-forward rendering that preserves the discourse connection
    and sounds idiomatic in modern English.
- source_word: με ὁ πατὴρ ἀγαπᾷ
  chosen: the Father loves me
  alternatives:
  - my Father loves me
  lexicon: BDAG
  rationale: The Greek has the articular subject 'the Father,' not the possessive
    'my Father.' Rendering it as 'the Father loves me' preserves Johannine theological
    diction and the explicit subject-object relation.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the Father's love, not merely content.
    'Because' best reflects the causal sense in context.
- source_word: τίθημι
  chosen: lay down
  alternatives:
  - set down
  - give up
  lexicon: BDAG
  rationale: In the immediate context of John 10, τίθημι with ψυχήν is the established
    idiom for voluntarily laying down one's life. 'Lay down' preserves both the idiom
    and the theme of willing self-offering.
- source_word: τὴν ψυχήν μου
  chosen: my life
  alternatives:
  - my soul
  lexicon: BDAG
  rationale: Although ψυχή can mean 'soul,' in this Johannine context it refers to
    one's life in the sense of mortal life given up in death. 'My life' is the plain
    contextual sense and avoids importing a body-soul contrast the verse does not
    emphasize.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: This preserves the clause's purposive force in readable English without
    over-formal stiffness.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard and natural rendering indicating restoration after laying down
    his life.
- source_word: λάβω αὐτήν
  chosen: I may take it up again
  alternatives:
  - I may receive it again
  - I may take it again
  lexicon: BDAG
  rationale: Given the object is 'my life' and the broader context in vv. 17–18, 'take
    it up again' best captures the sense of resuming life after death. The added particle
    'up' is idiomatic in English and reflects the contextual meaning, though not a
    separate Greek word.
