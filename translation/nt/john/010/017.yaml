theological_decisions:
- issue: Meaning of ψυχή in a christological self-sacrifice context
  chosen_reading: Rendered as 'life' rather than 'soul'
  alternative_readings:
  - my soul
  rationale: The verse speaks of Jesus' voluntary death and subsequent resumption
    of life. Translating ψυχή as 'soul' here could suggest an anthropological claim
    not foregrounded by the context. 'Life' preserves the intended sense of life laid
    down and taken again.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ἵνα with λάβω in relation to Jesus' death and resurrection
  chosen_reading: Purpose/result nuance preserved as 'so that I may take it up again'
  alternative_readings:
  - so that I will take it up again
  - in order to take it up again
  rationale: The subjunctive after ἵνα is best represented with 'may' in English,
    preserving the Greek syntax without flattening it into a bare future. This avoids
    over-specifying philosophical questions about purpose versus result while retaining
    the text's theological tension.
  doctrine_reference: Translation philosophy §3
