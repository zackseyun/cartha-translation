theological_decisions:
- issue: Rendering of ἐξουσία in relation to Jesus' death and resurrection
  chosen_reading: authority
  alternative_readings:
  - power
  - right
  rationale: The verse presents Jesus' death as voluntary and exercised under rightful
    authority, not as mere capacity. 'Authority' preserves both his agency and the
    ordered relation to the Father's command, without diminishing orthodox Christology
    or collapsing the nuance into raw power.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Force of ἀπ’ ἐμαυτοῦ
  chosen_reading: of myself
  alternative_readings:
  - on my own initiative
  rationale: The wording should preserve Jesus' voluntary self-giving without implying
    independence from the Father, since the verse immediately adds that he received
    this command from his Father. The chosen rendering keeps both truths in tension.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referent of αὐτήν
  chosen_reading: it
  alternative_readings:
  - my life
  rationale: The pronoun refers back to 'my life' in the immediate context (v. 17).
    Retaining 'it' avoids unnecessary repetition while remaining clear in context.
    The antecedent is not obscured in normal reading.
  doctrine_reference: Translation philosophy §6
