id: JHN.10.18
reference: John 10:18
source:
  edition: SBLGNT
  text: οὐδεὶς ⸀αἴρει αὐτὴν ἀπ’ ἐμοῦ, ἀλλ’ ἐγὼ τίθημι αὐτὴν ἀπ’ ἐμαυτοῦ. ἐξουσίαν
    ἔχω θεῖναι αὐτήν, καὶ ἐξουσίαν ἔχω πάλιν λαβεῖν αὐτήν· ταύτην τὴν ἐντολὴν ἔλαβον
    παρὰ τοῦ πατρός μου.
translation:
  text: No one takes it from me, but I lay it down of myself. I have authority to
    lay it down, and I have authority to take it up again. This command I received
    from my Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from myself' or 'on my own initiative.' The phrase stresses that Jesus
      gives his life voluntarily.
    reason: lexical_alternative
  - marker: b
    text: Or 'power' or 'right' for 'authority.' The Greek term can include both capability
      and rightful authorization.
    reason: lexical_alternative
  - marker: c
    text: That is, his life; compare the repeated 'my life' in the immediate context
      (John 10:17).
    reason: cross_reference
lexical_decisions:
- source_word: αἴρει
  chosen: takes
  alternatives:
  - takes away
  - removes
  lexicon: BDAG
  rationale: In context of Jesus speaking about his life, αἴρω with αὐτήν and ἀπ’
    ἐμοῦ naturally means 'take' in the sense of taking away from him. 'Takes' is idiomatic
    and pairs well with the following voluntary contrast.
- source_word: τίθημι αὐτὴν
  chosen: I lay it down
  alternatives:
  - I set it down
  lexicon: BDAG
  rationale: τίθημι is the established and contextually precise verb for voluntarily
    laying down one's life in this discourse. 'Lay it down' preserves the metaphor
    and the sacrificial nuance without over-paraphrase.
- source_word: ἀπ’ ἐμαυτοῦ
  chosen: of myself
  alternatives:
  - from myself
  - on my own initiative
  lexicon: BDAG
  rationale: The phrase emphasizes Jesus' own agency. 'Of myself' is concise and natural
    in English while preserving the reflexive force. 'On my own initiative' is interpretive
    and more expansive than the Greek.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated or rightful authority rather than
    mere ability. 'Authority' best preserves the relational and juridical sense, especially
    alongside the closing reference to a command from the Father.
- source_word: θεῖναι
  chosen: to lay it down
  alternatives:
  - to put it down
  lexicon: BDAG
  rationale: Infinitival repetition should match τίθημι earlier for consistency within
    the verse and discourse.
- source_word: πάλιν λαβεῖν αὐτήν
  chosen: to take it up again
  alternatives:
  - to receive it again
  - to take it again
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive,' but here the active, self-involving
    sense fits the context of Jesus resuming his life. 'Take it up again' is idiomatic
    in English and preserves πάλιν.
- source_word: ἐντολήν
  chosen: command
  alternatives:
  - charge
  - commission
  lexicon: BDAG
  rationale: ἐντολή most directly means 'command.' Although 'charge' or 'commission'
    could soften the sense in context, 'command' best reflects the lexical force and
    preserves the Father-Son relationship stated in the text.
- source_word: παρὰ τοῦ πατρός μου
  chosen: from my Father
  alternatives:
  - from beside my Father
  lexicon: BDAG
  rationale: παρά with the genitive commonly means 'from' in the sense of source/origin.
    'My Father' preserves the personal and relational language central to Johannine
    theology.
