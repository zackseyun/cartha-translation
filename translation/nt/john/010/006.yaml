id: JHN.10.6
reference: John 10:6
source:
  edition: SBLGNT
  text: ταύτην τὴν παροιμίαν εἶπεν αὐτοῖς ὁ Ἰησοῦς· ἐκεῖνοι δὲ οὐκ ἔγνωσαν τίνα ⸀ἦν
    ἃ ἐλάλει αὐτοῖς.
translation:
  text: Jesus spoke this figure of speech to them, but they did not understand what
    he was saying to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "parable," "illustration," or "proverb." The Greek word can refer broadly
      to a figurative saying; here it introduces Jesus' shepherd discourse in a non-literal
      form.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροιμίαν
  chosen: figure of speech
  alternatives:
  - parable
  - illustration
  - proverb
  lexicon: BDAG
  rationale: παροιμία can denote a figurative saying, proverb, or veiled illustration.
    In John, it is distinct from the Synoptic παραβολή and here refers to the shepherd
    discourse just given. 'Figure of speech' best captures a figurative utterance
    without overcommitting to the technical sense 'parable' or the narrower sense
    'proverb.'
- source_word: εἶπεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: λέγω commonly means 'say,' but 'spoke' reads naturally with an object
    like 'this figure of speech' in English and preserves the act of addressing them.
- source_word: ἐκεῖνοι δὲ
  chosen: but they
  alternatives:
  - but those men
  - but those ones
  lexicon: BDAG
  rationale: ἐκεῖνοι marks contrast with Jesus; δέ is adversative here. 'But they'
    is idiomatic and preserves the contrast without unnecessary stiffness.
- source_word: οὐκ ἔγνωσαν
  chosen: did not understand
  alternatives:
  - did not know
  - did not recognize
  lexicon: BDAG
  rationale: γινώσκω can mean 'know' or 'come to understand.' In context, the issue
    is failure to grasp the meaning of Jesus' figurative discourse, so 'did not understand'
    best conveys the sense.
- source_word: τίνα ἦν ἃ ἐλάλει αὐτοῖς
  chosen: what he was saying to them
  alternatives:
  - what the things were that he was speaking to them
  - what he meant by what he was saying to them
  lexicon: BDAG
  rationale: The clause is somewhat awkward in Greek, literally asking what the things
    were that he was speaking to them. The sense is their failure to grasp the content/meaning
    of his speech. 'What he was saying to them' is a clear optimal-equivalence rendering
    that preserves the meaning without wooden English.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: The dative here is the indirect object of Jesus' speech and is best rendered
    'to them.' Repeating it at the end reflects the Greek structure and emphasis.
