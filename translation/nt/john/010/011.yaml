id: JHN.10.11
reference: John 10:11
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι ὁ ποιμὴν ὁ καλός· ὁ ποιμὴν ὁ καλὸς τὴν ψυχὴν αὐτοῦ τίθησιν ὑπὲρ τῶν
    προβάτων·
translation:
  text: I am the good shepherd. The good shepherd lays down his life for the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "noble shepherd"; Greek καλός can denote what is good, noble, or exemplary.
    reason: lexical_alternative
  - marker: b
    text: Literally, "lays down his soul"; the Greek idiom means "lays down his life."
    reason: lexical_alternative
  - marker: c
    text: Or "on behalf of the sheep."
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I myself am
  lexicon: BDAG
  rationale: Rendered with the straightforward copular expression. The explicit pronoun
    Ἐγώ adds emphasis, but English naturally conveys this without an expanded paraphrase
    in the main text.
- source_word: ποιμήν
  chosen: shepherd
  alternatives:
  - herdsman
  - pastor
  lexicon: BDAG
  rationale: '"Shepherd" is the direct and contextually appropriate gloss. "Pastor"
    would import later ecclesial associations not present in the immediate image.'
- source_word: καλός
  chosen: good
  alternatives:
  - noble
  - excellent
  - 'true'
  lexicon: BDAG
  rationale: '"Good" preserves the familiar and natural English rendering while allowing
    the term''s sense of moral excellence and ideal fitness. "Noble" is possible but
    less idiomatic here.'
- source_word: ψυχήν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In the idiom τίθησιν τὴν ψυχὴν αὐτοῦ, ψυχή refers to one's life rather
    than the immaterial soul. "Lays down his life" is the natural English equivalent
    and best matches the sacrificial sense.
- source_word: τίθησιν
  chosen: lays down
  alternatives:
  - gives
  - sets down
  lexicon: BDAG
  rationale: With ψυχήν and ὑπέρ, τίθημι forms an established expression meaning to
    lay down one's life. "Gives" is interpretive and less tied to the Greek idiom.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: '"For" is concise and idiomatic in English, while still preserving the
    representative/benefactive force of ὑπέρ in this context.'
- source_word: προβάτων
  chosen: the sheep
  alternatives:
  - his sheep
  lexicon: BDAG
  rationale: The Greek has the article with "sheep" but no possessive pronoun. "The
    sheep" preserves the wording without adding an explicit possessive not present
    in the text.
