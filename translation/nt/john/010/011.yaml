theological_decisions:
- issue: Force of Jesus' self-identification Ἐγώ εἰμι
  chosen_reading: Rendered simply as "I am" without typographical or explanatory expansion.
  alternative_readings:
  - An explicitly emphatic rendering such as "I myself am"
  - A theologically heightened rendering implying an allusion to the divine name
  rationale: The phrase here functions grammatically as a predicate self-identification
    ("I am the good shepherd"). While Johannine theology may invite broader resonance,
    this verse itself does not require an expanded rendering that would overstate
    the allusion in translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of καλός in the shepherd title
  chosen_reading: '"good shepherd"'
  alternative_readings:
  - '"noble shepherd"'
  - '"ideal shepherd"'
  rationale: The term can carry nuances beyond mere moral goodness, including nobility
    and exemplary character. "Good shepherd" is both accurate and established, and
    it preserves the theological image without interpretive over-specification.
- issue: Sense of ὑπὲρ τῶν προβάτων in relation to Jesus' death
  chosen_reading: '"for the sheep"'
  alternative_readings:
  - '"on behalf of the sheep"'
  - '"for the sake of the sheep"'
  rationale: The preposition can bear representative or benefactive force. The translation
    preserves that breadth without narrowing the phrase to a specific atonement theory
    not explicitly stated in the verse.
  doctrine_reference: Within orthodox bounds, the translation does not advocate for
    a particular denominational distinctive unless the Greek unambiguously supports
    one reading over another.
