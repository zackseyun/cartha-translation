theological_decisions:
- issue: Text-critical and syntactic difficulty in ὃ δέδωκέν μοι
  chosen_reading: 'Render the clause in line with the contextual referent of the sheep:
    ''who has given them to me'''
  alternative_readings:
  - My Father, what he has given me, is greater than all
  - What my Father has given me is greater than all
  rationale: The printed Greek here is syntactically awkward, and manuscripts differ.
    A more literal neuter rendering in English ('what he has given me') is possible,
    but in context it can sound impersonal and obscure the referent, whereas the discourse
    is about the sheep given by the Father to the Son. Optimal equivalence supports
    making the implied object explicit in English while preserving the verse's claim
    about the Father's gift and protection. The alternative is preserved in a footnote
    because the ambiguity is genuine and should remain auditable.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Scope of the comparison in πάντων μεῖζων
  chosen_reading: Use the broad expression 'greater than all' without specifying persons
    or things
  alternative_readings:
  - greater than all people
  - greater than all things
  rationale: The Greek genitive πάντων is formally open enough that over-specification
    would resolve an ambiguity the text itself leaves broad. The chosen rendering
    preserves the absolute force of the statement and avoids importing a narrower
    doctrinal claim.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
