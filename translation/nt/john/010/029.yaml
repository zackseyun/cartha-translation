id: JHN.10.29
reference: John 10:29
source:
  edition: SBLGNT
  text: ὁ πατήρ μου ⸀ὃ δέδωκέν ⸀μοι ⸂πάντων μεῖζων⸃ ἐστίν, καὶ οὐδεὶς δύναται ἁρπάζειν
    ἐκ τῆς χειρὸς τοῦ ⸀πατρός.
translation:
  text: My Father, who has given them to me, is greater than all, and no one is able
    to snatch them out of the Father's hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'My Father, what he has given me, is greater than all.'
      The Greek wording here is difficult, and some understand the gift itself rather
      than the persons given as the subject of the comparison.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πατήρ μου
  chosen: My Father
  alternatives:
  - the Father of me
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the possessive expression, preserving
    Jesus' filial relation to God without adding interpretive expansion.
- source_word: ὃ δέδωκέν μοι
  chosen: who has given them to me
  alternatives:
  - what he has given me
  - that which he has given me
  lexicon: BDAG
  rationale: The neuter singular relative ὃ is text-critically difficult and can be
    taken collectively ('what/that which'). In context with the immediately preceding
    sheep imagery (vv. 27–28) and the parallel concern about being snatched away,
    English requires an explicit personal referent; thus 'them' makes the sense clear.
    The perfect δέδωκεν is rendered 'has given' to preserve the abiding result of
    the Father's gift.
- source_word: πάντων μεῖζων
  chosen: greater than all
  alternatives:
  - greater than everything
  - greater than all things
  lexicon: BDAG
  rationale: Comparative μεῖζων with the genitive πάντων is naturally rendered 'greater
    than all.' This preserves the broad, absolute comparison without forcing either
    masculine ('all people') or neuter ('all things') exclusively.
- source_word: οὐδεὶς δύναται
  chosen: no one is able
  alternatives:
  - no one can
  lexicon: BDAG
  rationale: Slightly fuller than 'can,' preserving the explicit sense of ability/inability
    in δύναται while remaining natural English.
- source_word: ἁρπάζειν
  chosen: to snatch
  alternatives:
  - to seize
  - to take by force
  lexicon: BDAG
  rationale: '''Snatch'' matches Johannine usage in the immediate context (v. 28)
    and conveys sudden, forceful removal.'
- source_word: ἐκ τῆς χειρὸς τοῦ πατρός
  chosen: out of the Father's hand
  alternatives:
  - from the Father's hand
  lexicon: BDAG
  rationale: '''Out of'' reflects ἐκ more precisely than ''from,'' and ''hand'' preserves
    the metaphor of protective possession and power.'
