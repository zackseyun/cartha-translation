theological_decisions:
- issue: Mutual indwelling of the Father and the Son
  chosen_reading: Retain the literal relational language 'the Father is in me, and
    I am in the Father' without explanatory paraphrase.
  alternative_readings:
  - the Father is united with me, and I with the Father
  - the Father dwells in me, and I dwell in the Father
  rationale: The verse contributes to Johannine high Christology and coheres with
    historic orthodoxy, but the translation should not import later creedal terminology
    directly into the text. The literal wording preserves the theological claim and
    its tension without flattening it into later doctrinal shorthand.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
