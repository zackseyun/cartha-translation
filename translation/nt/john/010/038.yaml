id: JHN.10.38
reference: John 10:38
source:
  edition: SBLGNT
  text: εἰ δὲ ποιῶ, κἂν ἐμοὶ μὴ πιστεύητε τοῖς ἔργοις ⸀πιστεύετε, ἵνα γνῶτε καὶ ⸀γινώσκητε
    ὅτι ἐν ἐμοὶ ὁ πατὴρ κἀγὼ ἐν ⸂τῷ πατρί⸃.
translation:
  text: But if I do them, even if you do not believe me, believe the works, so that
    you may know and continue knowing that the Father is in me, and I am in the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even if you do not believe in me.' The Greek more literally uses 'believe'
      with a dative pronoun, which can mean 'believe me' or 'believe in me'; here
      'believe me' best fits the contrast with 'believe the works.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'know and continue knowing' reflects two different Greek
      verb forms, likely emphasizing both coming to know and ongoing recognition.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῶ
  chosen: I do them
  alternatives:
  - I am doing
  - I do
  lexicon: BDAG
  rationale: The verb is present active indicative, referring back to Jesus' works
    in the immediate context. English supplies 'them' for clarity from context, since
    the object is implicit but clearly the works/signs under discussion.
- source_word: κἂν ἐμοὶ μὴ πιστεύητε
  chosen: even if you do not believe me
  alternatives:
  - even if you do not believe in me
  - even if you do not trust me
  lexicon: BDAG
  rationale: With πιστεύω plus dative (ἐμοί), the sense is 'believe me' or 'trust
    me,' focusing on accepting Jesus' testimony. 'Believe me' is the more direct and
    idiomatic rendering here, while the following dative phrase with τοῖς ἔργοις is
    rendered distinctly.
- source_word: τοῖς ἔργοις πιστεύετε
  chosen: believe the works
  alternatives:
  - believe in the works
  - trust the works
  lexicon: BDAG
  rationale: 'The dative with πιστεύω can indicate the object believed. ''Believe
    the works'' preserves the Greek''s compact force: if they will not believe Jesus''
    direct claim, they should accept the evidential testimony of his deeds. ''Believe
    in the works'' would suggest misplaced faith directed toward the works themselves
    rather than belief on the basis of their witness.'
- source_word: ἔργοις
  chosen: works
  alternatives:
  - deeds
  - works/signs
  lexicon: BDAG
  rationale: John regularly uses 'works' for Jesus' deeds as revelatory acts. 'Works'
    preserves Johannine terminology better than 'deeds,' while 'signs' would over-interpret
    because the text says ἔργα, not σημεῖα.
- source_word: ἵνα γνῶτε καὶ γινώσκητε
  chosen: so that you may know and continue knowing
  alternatives:
  - so that you may know and understand
  - so that you may come to know and know
  - so that you may know and recognize
  lexicon: BDAG
  rationale: 'The aorist subjunctive γνῶτε followed by present subjunctive γινώσκητε
    likely carries a nuanced progression: coming to know and then continuing in that
    knowledge. Rendering the distinction as ''know and continue knowing'' preserves
    the aspectual contrast without becoming overly wooden.'
- source_word: ἐν ἐμοὶ ὁ πατὴρ κἀγὼ ἐν τῷ πατρί
  chosen: the Father is in me, and I am in the Father
  alternatives:
  - the Father is in union with me, and I in the Father
  - the Father is in me and I am in union with the Father
  lexicon: BDAG
  rationale: The repeated ἐν expresses mutual indwelling. 'In' is the most direct
    rendering and preserves the theological and literary force of the Johannine expression
    without interpretive expansion.
- source_word: πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the articular noun 'the Father,' not 'my Father,' and the
    translation should preserve that form.
