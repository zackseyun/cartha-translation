theological_decisions:
- issue: Force of ὑπὲρ in Jesus' self-giving
  chosen_reading: Rendered 'for' to preserve the text's sacrificial, representative
    sense without narrowing it to a single doctrinal formula in translation.
  alternative_readings:
  - on behalf of
  - in place of
  rationale: The verse presents Jesus' death as intentionally for the benefit of the
    sheep and within a sacrificial framework. English 'for' best preserves the theological
    breadth of ὑπέρ here, allowing readers to see both representative and potentially
    substitutionary force without importing a more technical formulation than the
    Greek itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ψυχή in this context
  chosen_reading: Rendered as 'life' rather than 'soul.'
  alternative_readings:
  - soul
  rationale: Given the immediate context of the good shepherd's death for the sheep
    (John 10), ψυχή refers to Jesus' life laid down, not merely an inner immaterial
    aspect. This avoids misleading anthropological implications while remaining faithful
    to the Greek.
