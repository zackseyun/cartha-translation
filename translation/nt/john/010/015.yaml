id: JHN.10.15
reference: John 10:15
source:
  edition: SBLGNT
  text: καθὼς γινώσκει με ὁ πατὴρ κἀγὼ γινώσκω τὸν πατέρα, καὶ τὴν ψυχήν μου τίθημι
    ὑπὲρ τῶν προβάτων.
translation:
  text: just as the Father knows me and I know the Father, and I lay down my life
    for the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul.' Here the sense is 'my life' in the context of self-sacrifice.
    reason: lexical_alternative
  - marker: b
    text: Or 'on behalf of the sheep.' The Greek preposition can carry representative
      or sacrificial force.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Introduces comparison with the preceding statement about mutual knowledge
    between shepherd and sheep. 'Just as' clearly signals the strength of the comparison
    in natural English.
- source_word: γινώσκει / γινώσκω
  chosen: knows / know
  alternatives:
  - understands
  - has intimate knowledge of
  lexicon: BDAG
  rationale: The verb denotes knowing, here in the relational and intimate sense between
    the Father and the Son. 'Know' preserves the lexical link and theological depth
    without over-paraphrasing.
- source_word: ὁ πατὴρ / τὸν πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the article with 'Father,' not the possessive pronoun.
    'The Father' preserves Johannine usage and the formal parallelism of the clause.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - I also
  - and I also
  lexicon: BDAG
  rationale: The crasis combines καί + ἐγώ. 'And I' preserves the coordinate structure
    and contrastive balance with the previous clause.
- source_word: ψυχήν μου
  chosen: my life
  alternatives:
  - my soul
  lexicon: BDAG
  rationale: In this context of sacrificial self-giving, ψυχή refers to one's life
    rather than the immaterial soul. 'My life' is the most idiomatic and contextually
    accurate English rendering.
- source_word: τίθημι
  chosen: lay down
  alternatives:
  - give
  - set down
  lexicon: BDAG
  rationale: In Johannine usage with ψυχή, τίθημι forms the idiom 'lay down one's
    life.' This preserves both the lexical sense and the established contextual meaning
    in John 10.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: ὑπέρ here expresses benefactive and sacrificial substitution/representation.
    'For' is concise and natural in English while leaving the full theological weight
    intact.
- source_word: τῶν προβάτων
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: BDAG
  rationale: The literal 'the sheep' preserves the shepherding metaphor central to
    the passage. 'Flock' would smooth the image too much and move away from the Greek
    noun.
