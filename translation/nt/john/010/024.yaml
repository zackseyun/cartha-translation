id: JHN.10.24
reference: John 10:24
source:
  edition: SBLGNT
  text: ἐκύκλωσαν οὖν αὐτὸν οἱ Ἰουδαῖοι καὶ ἔλεγον αὐτῷ· Ἕως πότε τὴν ψυχὴν ἡμῶν αἴρεις;
    εἰ σὺ εἶ ὁ χριστός, εἰπὲ ἡμῖν παρρησίᾳ.
translation:
  text: So the Jews surrounded him and were saying to him, “How long will you keep
    us in suspense? If you are the Messiah, tell us plainly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “How long do you keep our soul hanging?”—an idiom meaning
      to keep someone in uncertainty or suspense.
    reason: lexical_alternative
  - marker: b
    text: In John, “the Jews” can in context refer more specifically to the Judean
      authorities or opponents of Jesus, not to the Jewish people as a whole.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκύκλωσαν
  chosen: surrounded
  alternatives:
  - gathered around
  - encircled
  lexicon: BDAG
  rationale: The verb κυκλόω literally denotes surrounding or encircling. 'Surrounded'
    is natural modern English and preserves the confrontational physical sense better
    than the softer 'gathered around.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is idiomatic in modern
    narrative English and preserves the connective force without sounding wooden.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' Although in John the referent
    can be more specific than the entire Jewish people, the text here does not explicitly
    narrow it to leaders. To avoid importing an interpretive restriction not stated
    in the Greek, the main text keeps 'the Jews.' A footnote preserves the contextual
    nuance.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated speech. 'Were saying'
    preserves that aspect in readable English.
- source_word: Ἕως πότε
  chosen: How long
  alternatives:
  - Until when
  lexicon: BDAG
  rationale: This idiom is naturally rendered 'How long' in English.
- source_word: τὴν ψυχὴν ἡμῶν αἴρεις
  chosen: will you keep us in suspense
  alternatives:
  - do you take away our life
  - do you keep our soul hanging
  - do you annoy us
  lexicon: BDAG
  rationale: Literally the phrase is 'do you lift up our soul/life,' an idiom meaning
    to keep someone in uncertainty or suspense. A wooden rendering would be obscure
    in English, so optimal equivalence favors the idiomatic sense. A footnote preserves
    the more literal imagery.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός as a title is translated 'Messiah' rather
    than transliterated 'Christ,' preserving the Jewish messianic context of the question.
- source_word: εἰπὲ ἡμῖν
  chosen: tell us
  alternatives:
  - say to us
  lexicon: BDAG
  rationale: The aorist imperative is a direct command. 'Tell us' is idiomatic and
    forceful in English.
- source_word: παρρησίᾳ
  chosen: plainly
  alternatives:
  - openly
  - boldly
  - with frankness
  lexicon: BDAG
  rationale: παρρησία can denote openness, boldness, or plainness of speech. In this
    context they are demanding an unambiguous public statement, so 'plainly' best
    captures the sense.
