theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions here as a Jewish royal-deliverer title under interrogation,
    not as a name-like designation. Following the project's contested-terms guidance,
    the title is translated 'Messiah.'
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Referent of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: John often uses the phrase in a contextually narrowed way, but this verse
    itself does not specify leaders or Judeans. The translation preserves the Greek
    wording in the main text and notes the possible narrower referent in a footnote
    rather than resolving the ambiguity in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy 3: Preserve theological
    tension rather than resolve it'
