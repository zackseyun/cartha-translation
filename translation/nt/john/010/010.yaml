id: JHN.10.10
reference: John 10:10
source:
  edition: SBLGNT
  text: ὁ κλέπτης οὐκ ἔρχεται εἰ μὴ ἵνα κλέψῃ καὶ θύσῃ καὶ ἀπολέσῃ· ἐγὼ ἦλθον ἵνα
    ζωὴν ἔχωσιν καὶ περισσὸν ἔχωσιν.
translation:
  text: The thief comes only to steal and slaughter and destroy; I came so that they
    may have life, and have it abundantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kill' for 'slaughter' (θύσῃ). The Greek verb often refers to slaughtering,
      which fits the sheep imagery of the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'have life in abundance' or 'have it to the full.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ κλέπτης
  chosen: the thief
  alternatives:
  - a thief
  lexicon: BDAG
  rationale: The article supports a definite/generic singular, referring to the thief
    as a representative figure in Jesus's shepherd discourse rather than merely any
    individual thief.
- source_word: οὐκ ἔρχεται εἰ μὴ
  chosen: comes only
  alternatives:
  - does not come except
  lexicon: BDAG
  rationale: 'This idiom expresses exclusive purpose: the thief''s coming is for no
    other reason than what follows. ''Comes only'' is natural English that preserves
    the force without wooden phrasing.'
- source_word: ἵνα κλέψῃ
  chosen: to steal
  alternatives:
  - so that he might steal
  lexicon: BDAG
  rationale: After the exclusivizing idiom, an English infinitive best conveys purpose
    succinctly while preserving the intended action.
- source_word: θύσῃ
  chosen: slaughter
  alternatives:
  - kill
  - slay
  lexicon: BDAG
  rationale: θύω commonly denotes slaughtering, especially of animals. In the sheep/shepherd
    context, 'slaughter' is more vivid and contextually fitting than the more generic
    'kill'.
- source_word: ἀπολέσῃ
  chosen: destroy
  alternatives:
  - ruin
  - cause to perish
  lexicon: BDAG
  rationale: In sequence with 'steal and slaughter,' 'destroy' captures comprehensive
    devastation without overinterpreting the object or mode of destruction.
- source_word: ἐγὼ ἦλθον
  chosen: I came
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: The aorist is naturally rendered as a simple past here, contrasting Jesus's
    mission with that of the thief. English present perfect is possible but not necessary.
- source_word: ἵνα ζωὴν ἔχωσιν
  chosen: so that they may have life
  alternatives:
  - that they may have life
  lexicon: BDAG
  rationale: This preserves the purpose clause and keeps ζωὴ as 'life,' a key Johannine
    term with both present and theological fullness, without narrowing it to 'eternal
    life' where the verse itself does not explicitly do so.
- source_word: περισσὸν ἔχωσιν
  chosen: have it abundantly
  alternatives:
  - have abundance
  - have life in abundance
  - have it to the full
  lexicon: BDAG
  rationale: περισσόν here functions adverbially with ἔχωσιν, modifying the manner/measure
    of having life. 'Have it abundantly' makes explicit that the abundance qualifies
    'life' and reads naturally in English.
