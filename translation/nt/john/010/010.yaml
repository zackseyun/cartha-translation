theological_decisions:
- issue: Scope of ζωὴ in Johannine usage
  chosen_reading: life
  alternative_readings:
  - eternal life
  - true life
  rationale: The verse uses ζωὴ without the adjective 'eternal.' Rendering it simply
    as 'life' preserves John's theological depth without importing a more specific
    doctrinal phrase not present in the Greek. Readers may infer eternal-life resonance
    from Johannine context, but the translation should not make that interpretive
    move in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of περισσὸν
  chosen_reading: abundantly
  alternative_readings:
  - to the full
  - in abundance
  rationale: The phrase describes the richness or fullness of the life Jesus gives,
    but should not be expanded into prosperity-language or material blessing claims.
    'Abundantly' preserves the text's positive fullness while avoiding doctrinal overreach.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
