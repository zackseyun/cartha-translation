theological_decisions:
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: Rendered 'the Jews' in the main text, with a footnote clarifying
    that in John the term often refers contextually to Judean Jews or Jewish authorities
    rather than the Jewish people as a whole.
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation philosophy prioritizes original-language primacy and
    readable English. The literal rendering is preserved in the main text, but because
    John's usage is context-sensitive and can be misread in modern English as an ethnic
    generalization, the nuance is documented in a footnote rather than resolved interpretively
    in the text.
  doctrine_reference: Translation philosophy §§1, 6
