id: JHN.10.19
reference: John 10:19
source:
  edition: SBLGNT
  text: ⸀Σχίσμα πάλιν ἐγένετο ἐν τοῖς Ἰουδαίοις διὰ τοὺς λόγους τούτους.
translation:
  text: Because of these words, a division arose again among the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Judeans' or, in some contexts in John, 'among the Jewish leaders.'
      The term 'the Jews' here reflects the Greek wording, but in John's Gospel it
      often refers to a particular group in context rather than to the Jewish people
      as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σχίσμα
  chosen: a division
  alternatives:
  - a split
  - dissension
  lexicon: BDAG
  rationale: The noun denotes a tear, split, or division. In this discourse context
    it refers to a divided response among people, so 'a division' is the most natural
    and sufficiently formal English rendering.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: The adverb marks repetition, indicating this is not the first such division
    in John's narrative. 'Again' is the clearest concise rendering.
- source_word: ἐγένετο
  chosen: arose
  alternatives:
  - came about
  - occurred
  - happened
  lexicon: BDAG
  rationale: From γίνομαι, here indicating that a state or event came into being.
    'Arose' reads naturally with 'division' in English while preserving the eventive
    sense.
- source_word: ἐν τοῖς Ἰουδαίοις
  chosen: among the Jews
  alternatives:
  - among the Jewish leaders
  - among the Judeans
  lexicon: BDAG
  rationale: The phrase is literally 'among the Jews.' In John, Ἰουδαῖοι can at times
    mean Judeans or Jewish authorities depending on context, but here the broader
    crowd response is in view after Jesus' public words, so 'the Jews' is retained
    as the most direct rendering. Because this expression can be misunderstood in
    English, an explanatory footnote preserves the contextual nuance.
- source_word: διὰ
  chosen: Because of
  alternatives:
  - on account of
  - for
  lexicon: BDAG
  rationale: With the accusative, διά expresses cause or reason. 'Because of' clearly
    conveys causation in contemporary English.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - these sayings
  - these statements
  lexicon: BDAG
  rationale: λόγοι here refers to Jesus' preceding spoken statements. 'Words' is straightforward
    and idiomatic, while 'sayings' is possible but slightly more stylized.
