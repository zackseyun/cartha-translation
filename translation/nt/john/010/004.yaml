id: JHN.10.4
reference: John 10:4
source:
  edition: SBLGNT
  text: ⸀ὅταν τὰ ἴδια ⸀πάντα ἐκβάλῃ, ἔμπροσθεν αὐτῶν πορεύεται, καὶ τὰ πρόβατα αὐτῷ
    ἀκολουθεῖ, ὅτι οἴδασιν τὴν φωνὴν αὐτοῦ·
translation:
  text: When he has brought out all his own, he goes before them, and the sheep follow
    him, because they know his voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has driven out' or 'has led out'; the Greek verb can carry the sense
      of driving or bringing out from an enclosure.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: When
  alternatives:
  - Whenever
  - After
  lexicon: BDAG
  rationale: Introduces an indefinite temporal clause with the subjunctive ('when/whenever').
    'When' is natural in English and fits the narrative-generic sense without overemphasizing
    repetition.
- source_word: τὰ ἴδια πάντα
  chosen: all his own
  alternatives:
  - his own sheep, all of them
  - all that are his
  lexicon: BDAG
  rationale: The neuter plural idiom refers to what belongs to the shepherd; in context
    it points to his sheep. 'All his own' preserves the Greek expression without adding
    'sheep' too early, since 'the sheep' appears explicitly later in the verse.
- source_word: ἐκβάλῃ
  chosen: has brought out
  alternatives:
  - drives out
  - leads out
  lexicon: BDAG
  rationale: Although ἐκβάλλω often means 'throw out' or 'drive out,' in shepherding
    context it can denote bringing animals out from the fold. 'Has brought out' avoids
    an unnecessarily harsh English sense while preserving the movement out from enclosure.
    The aorist subjunctive under ὅταν is naturally rendered with English perfect in
    this temporal clause.
- source_word: ἔμπροσθεν αὐτῶν
  chosen: before them
  alternatives:
  - ahead of them
  - in front of them
  lexicon: BDAG
  rationale: A straightforward spatial expression. 'Before them' is idiomatic and
    preserves the image of the shepherd taking the lead.
- source_word: πορεύεται
  chosen: he goes
  alternatives:
  - he walks
  - he proceeds
  lexicon: BDAG
  rationale: A common verb of movement. 'He goes' is simple, natural English and fits
    the shepherding scene.
- source_word: τὰ πρόβατα
  chosen: the sheep
  lexicon: BDAG
  rationale: Standard rendering for πρόβατα in this pastoral metaphor.
- source_word: αὐτῷ ἀκολουθεῖ
  chosen: follow him
  alternatives:
  - follow after him
  - go with him
  lexicon: BDAG
  rationale: 'Dative object with ἀκολουθέω is idiomatically rendered in English with
    a direct object: ''follow him.'' Singular Greek verb with neuter plural subject
    is normal; English uses plural verb with ''sheep.'''
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason the sheep follow. 'Because' is the clearest modern
    English connector.
- source_word: οἴδασιν
  chosen: they know
  alternatives:
  - they recognize
  - they are acquainted with
  lexicon: BDAG
  rationale: οἶδα commonly means 'know.' In context recognition is involved, but 'know'
    preserves the lexical force and allows the relational nuance to remain.
- source_word: τὴν φωνὴν αὐτοῦ
  chosen: his voice
  alternatives:
  - the sound of his voice
  lexicon: BDAG
  rationale: φωνή here refers to the shepherd's voice/call. 'His voice' is the natural
    and sufficient rendering.
