theological_decisions:
- issue: Shepherding imagery and the force of ἐκβάλῃ
  chosen_reading: Rendered ἐκβάλῃ as 'has brought out' rather than 'drives out.'
  alternative_readings:
  - has driven out
  - has led out
  rationale: The immediate context is the shepherd with his own sheep, not an act
    of hostile expulsion. The translation preserves the concrete shepherding image
    without importing coercive theological implications about Christ's treatment of
    his sheep. 'Brought out' best fits the pastoral scene while remaining faithful
    to the verb's outward-motion sense.
  doctrine_reference: Translation philosophy §1, §3
