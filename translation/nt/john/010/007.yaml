theological_decisions:
- issue: Metaphorical self-identification in the 'I am' saying
  chosen_reading: I am the door of the sheep
  alternative_readings:
  - I am the gate for the sheep
  rationale: The verse presents Jesus as the exclusive point of access/safety in the
    shepherding metaphor. The translation preserves the metaphor without expanding
    it into doctrinal paraphrase. 'Door' is chosen for lexical transparency; 'gate'
    is preserved as a contextual alternative because the setting is a sheepfold.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
