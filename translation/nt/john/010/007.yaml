id: JHN.10.7
reference: John 10:7
source:
  edition: SBLGNT
  text: Εἶπεν οὖν πάλιν ⸀αὐτοῖς ὁ Ἰησοῦς· Ἀμὴν ἀμὴν λέγω ὑμῖν ⸀ὅτι ἐγώ εἰμι ἡ θύρα
    τῶν προβάτων.
translation:
  text: So Jesus said to them again, “Truly, truly, I say to you, I am the door of
    the sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the gate of the sheep.” The Greek θύρα can mean “door” or “gate,” especially
      in shepherding imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: Straightforward adverb indicating repetition; 'again' is the most natural
    and direct rendering.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: This Johannine doubled formula introduces a solemn, emphatic declaration.
    'Truly, truly' preserves the repetition and force in readable English. 'Amen,
    amen' is more formal/literal but less transparent for many readers.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close and idiomatic rendering of the present-tense speech formula.
    'I say to you' preserves the formal cadence of Jesus's declaration better than
    the slightly freer 'I tell you'.
- source_word: ὅτι
  chosen: —
  alternatives:
  - that
  lexicon: BDAG
  rationale: After the introductory formula, English idiom often omits an explicit
    'that.' The content clause is still fully represented in the direct quotation.
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I myself am
  lexicon: BDAG
  rationale: Standard rendering of the emphatic self-identification. The explicit
    pronoun adds emphasis in Greek, but English naturally conveys this sufficiently
    with 'I am' in this context.
- source_word: θύρα
  chosen: door
  alternatives:
  - gate
  lexicon: BDAG
  rationale: The noun denotes a door, gateway, or entrance. 'Door' is retained in
    the main text because it is the direct lexical equivalent and aligns with the
    immediate metaphor in this discourse. 'Gate' is a viable contextual alternative
    given sheepfold imagery and is preserved in a footnote.
- source_word: τῶν προβάτων
  chosen: of the sheep
  alternatives:
  - for the sheep
  - to the sheepfold
  lexicon: BDAG
  rationale: 'The genitive is best taken as possessive/associative: the door belonging
    to or associated with the sheep. ''Of the sheep'' is formally close and leaves
    the metaphorical relation intact without over-interpreting it.'
