id: JHN.10.37
reference: John 10:37
source:
  edition: SBLGNT
  text: εἰ οὐ ποιῶ τὰ ἔργα τοῦ πατρός μου, μὴ πιστεύετέ μοι·
translation:
  text: If I am not doing the works of my Father, do not believe me;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not believe what I say.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  chosen: If
  lexicon: BDAG
  rationale: Introduces a conditional clause; standard protasis rendering in English.
- source_word: οὐ
  chosen: not
  alternatives:
  - do not
  lexicon: BDAG
  rationale: Negates the verb ποιῶ. In English the negation is naturally expressed
    with the auxiliary in 'am not doing'.
- source_word: ποιῶ
  chosen: am not doing
  alternatives:
  - do
  - am not performing
  lexicon: BDAG
  rationale: Present active indicative first singular. Rendered progressively ('am
    ... doing') to reflect the present tense in context, where Jesus speaks of his
    ongoing works. 'Doing' is more natural and broad than 'performing.'
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  lexicon: BDAG
  rationale: ἔργα commonly means works/deeds. 'Works' fits Johannine usage, where
    Jesus' actions/signs are repeatedly called his works and carry theological weight.
- source_word: τοῦ πατρός μου
  chosen: of my Father
  alternatives:
  - of my own Father
  - that belong to my Father
  lexicon: BDAG
  rationale: Genitive construction best rendered straightforwardly. Capitalized 'Father'
    because in Johannine context it functions as a divine title for God in relation
    to Jesus.
- source_word: μὴ πιστεύετέ
  chosen: do not believe
  alternatives:
  - do not trust
  lexicon: BDAG
  rationale: Present active imperative with μή gives a prohibition. 'Believe' is the
    default rendering for πιστεύω and aligns with the project's handling of the pistis
    word group; 'trust' is possible but less consistent here.
- source_word: μοι
  chosen: me
  alternatives:
  - what I say
  lexicon: BDAG
  rationale: Dative pronoun after πιστεύω can mean 'believe me' or 'believe what I
    say.' The direct personal sense is retained in the main text as the most literal
    and natural English rendering; the propositional nuance is implicit.
