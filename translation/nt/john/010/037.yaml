theological_decisions:
- issue: Force of πιστεύω with dative μοι
  chosen_reading: 'personal trust/credence directed toward Jesus: ''do not believe
    me'''
  alternative_readings:
  - do not believe what I say
  rationale: The Greek construction πιστεύω + dative commonly allows the sense 'believe
    someone.' In context Jesus appeals to his works as grounds for accepting his claims,
    so the personal and testimonial senses overlap. The main text preserves the direct
    address without expanding into interpretation.
  doctrine_reference: Translation philosophy items 3 and 5
