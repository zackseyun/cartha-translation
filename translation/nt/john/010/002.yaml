theological_decisions:
- issue: Definiteness of ποιμήν in the predicate
  chosen_reading: the shepherd
  alternative_readings:
  - a shepherd
  rationale: The verse contrasts the rightful entrant with thieves and robbers, so
    the sense is not merely membership in a class ('a shepherd') but identification
    as the legitimate shepherd belonging to the sheep. Rendering it definitely in
    English best conveys the discourse function without importing later christological
    claims beyond the immediate metaphor.
  doctrine_reference: Translation philosophy §1, §5
