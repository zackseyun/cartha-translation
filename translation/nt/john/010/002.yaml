id: JHN.10.2
reference: John 10:2
source:
  edition: SBLGNT
  text: ὁ δὲ εἰσερχόμενος διὰ τῆς θύρας ποιμήν ἐστιν τῶν προβάτων.
translation:
  text: But the one who enters through the door is the shepherd of the sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or "a shepherd of the sheep." The Greek predicate noun ποιμήν lacks the
      article, but the context favors a definite sense: the rightful shepherd in contrast
      to illegitimate intruders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἰσερχόμενος
  chosen: But the one who enters
  alternatives:
  - But he who enters
  - But the one entering
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a person characterized by entering. 'The one who enters' is natural modern
    English and preserves the generic force better than the more wooden 'the one entering.'
    δέ is rendered 'But' to mark the contrast with the thief/robber in the previous
    verse.
- source_word: διὰ τῆς θύρας
  chosen: through the door
  alternatives:
  - by the door
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes movement through. 'Through the
    door' is the plain spatial sense and fits the immediate imagery.
- source_word: ποιμήν
  chosen: the shepherd
  alternatives:
  - a shepherd
  lexicon: BDAG
  rationale: Although the Greek predicate noun lacks the article, English idiom in
    this context favors 'the shepherd' because the construction identifies the legitimate,
    recognized shepherd in contrast to illegitimate intruders. This also coheres with
    the following genitive phrase 'of the sheep.'
- source_word: τῶν προβάτων
  chosen: of the sheep
  alternatives:
  - of the flock
  lexicon: BDAG
  rationale: πρόβατα literally means 'sheep.' 'Flock' would be interpretive and less
    formally tied to the source image.
