id: JHN.10.23
reference: John 10:23
source:
  edition: SBLGNT
  text: καὶ περιεπάτει ὁ Ἰησοῦς ἐν τῷ ἱερῷ ἐν τῇ στοᾷ ⸀τοῦ Σολομῶνος.
translation:
  text: And Jesus was walking in the temple courts, in Solomon’s Portico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “colonnade”; Greek στοά refers to a covered walkway with columns.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: περιεπάτει
  chosen: was walking
  alternatives:
  - walked
  - was walking about
  lexicon: BDAG
  rationale: Imperfect indicative conveys ongoing or progressive action in past time;
    'was walking' preserves that aspect better than simple 'walked.'
- source_word: ἱερῷ
  chosen: temple courts
  alternatives:
  - temple
  - temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple courts' communicates the broader public area in natural English.
- source_word: στοᾷ
  chosen: Portico
  alternatives:
  - colonnade
  - porch
  lexicon: BDAG
  rationale: στοά denotes a covered colonnade or portico. 'Portico' is a clear architectural
    term in modern English and fits the named location.
- source_word: τοῦ Σολομῶνος
  chosen: Solomon’s
  alternatives:
  - of Solomon
  lexicon: BDAG
  rationale: The genitive is naturally rendered as an English possessive in this place-name
    construction.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: A simple connective is sufficient and reflects the Greek coordination
    without adding temporal nuance not explicit in the text.
