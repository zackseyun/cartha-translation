id: JHN.10.5
reference: John 10:5
source:
  edition: SBLGNT
  text: ἀλλοτρίῳ δὲ οὐ μὴ ⸀ἀκολουθήσουσιν ἀλλὰ φεύξονται ἀπ’ αὐτοῦ, ὅτι οὐκ οἴδασι
    τῶν ἀλλοτρίων τὴν φωνήν.
translation:
  text: But they will certainly not follow a stranger; instead, they will flee from
    him, because they do not know the voice of strangers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will never follow a stranger.' The Greek uses an emphatic negation
      (οὐ μὴ).
    reason: lexical_alternative
  - marker: b
    text: '''Know the voice'' can also be understood as ''recognize the voice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλοτρίῳ
  chosen: a stranger
  alternatives:
  - someone чужой?
  - another
  - a foreigner
  lexicon: BDAG
  rationale: Dative singular of ἀλλότριος in the shepherding metaphor refers to one
    who does not belong to the sheep, hence 'a stranger' is the most natural English
    rendering. 'Foreigner' would overemphasize ethnicity, and 'another' is too weak.
- source_word: οὐ μὴ ἀκολουθήσουσιν
  chosen: will certainly not follow
  alternatives:
  - will never follow
  - shall by no means follow
  lexicon: BDAG
  rationale: οὐ μή with the future indicative is an emphatic negation. 'Will certainly
    not follow' preserves the force in readable modern English without archaic phrasing.
- source_word: ἀκολουθήσουσιν
  chosen: follow
  alternatives:
  - go after
  lexicon: BDAG
  rationale: In context of sheep and shepherd, 'follow' is the standard and clearest
    rendering.
- source_word: φεύξονται ἀπ’ αὐτοῦ
  chosen: will flee from him
  alternatives:
  - will run away from him
  lexicon: BDAG
  rationale: Future middle of φεύγω with ἀπό expresses withdrawal/escape from the
    stranger. 'Flee from him' is concise and preserves the stronger sense of avoidance.
- source_word: οἴδασι
  chosen: do not know
  alternatives:
  - do not recognize
  lexicon: BDAG
  rationale: οἶδα can denote knowledge or recognition. Here the object is 'the voice,'
    so 'know' works naturally in English and preserves the relational contrast with
    the shepherd's known voice in the context. 'Recognize' is possible but slightly
    more interpretive.
- source_word: τῶν ἀλλοτρίων
  chosen: of strangers
  alternatives:
  - of strangers'
  - belonging to strangers
  lexicon: BDAG
  rationale: Genitive plural matches the class of non-shepherd outsiders. 'Of strangers'
    is the most direct rendering with 'voice'.
- source_word: φωνήν
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: φωνή in this discourse refers to the identifiable voice/call of the shepherd
    or stranger. 'Voice' preserves both literal and relational dimensions.
- source_word: δὲ ... ἀλλὰ
  chosen: But ... instead
  alternatives:
  - and ... but
  - but ... but rather
  lexicon: BDAG
  rationale: 'The paired particles mark contrast: they will not do one thing, but
    rather the opposite. ''But ... instead'' gives smooth modern English while preserving
    the adversative structure.'
