theological_decisions:
- issue: Metaphorical force of the sheep-shepherd imagery
  chosen_reading: Retain the metaphor straightforwardly without allegorical expansion.
  alternative_readings:
  - Interpret 'stranger' explicitly as false teacher or illegitimate leader in the
    main text
  rationale: The verse itself speaks within the metaphor and does not identify the
    referent explicitly here. Expanding the metaphor in translation would import interpretation
    beyond the Greek.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
