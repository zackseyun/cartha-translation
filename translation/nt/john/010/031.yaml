theological_decisions:
- issue: Referent and scope of οἱ Ἰουδαῖοι in John's Gospel
  chosen_reading: Render literally as 'the Jews' in the main text, while preserving
    a contextual alternative in a footnote.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The Greek wording is explicit, and the translation should not narrow
    the referent in the main text beyond what the verse itself states. At the same
    time, John's usage is often contextually focused on particular opponents rather
    than the Jewish people universally, so an explanatory footnote helps prevent misunderstanding
    without altering the wording of the text.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension rather than resolve it)
