id: JHN.10.31
reference: John 10:31
source:
  edition: SBLGNT
  text: Ἐβάστασαν ⸀οὖν πάλιν λίθους οἱ Ἰουδαῖοι ἵνα λιθάσωσιν αὐτόν.
translation:
  text: So the Jews picked up stones again to stone him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, in context, 'the Jewish leaders' or 'the Judeans.' John's phrase
      'the Jews' often refers to particular Jewish opponents of Jesus rather than
      to the Jewish people as a whole.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐβάστασαν
  chosen: picked up
  alternatives:
  - carried
  - took up
  lexicon: BDAG
  rationale: βαστάζω commonly means 'carry' or 'take up,' but with λίθους in this
    hostile scene, idiomatic English is 'picked up,' expressing the action of taking
    stones in hand for immediate use.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks inference or continuation from the preceding claim. 'So' is
    natural modern English and preserves the narrative connection without sounding
    overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν indicates repetition. 'Again' is the most direct and natural rendering,
    also echoing the repeated hostile response in the context.
- source_word: λίθους
  chosen: stones
  alternatives:
  - rocks
  lexicon: BDAG
  rationale: λίθος is straightforwardly 'stone.' In this context it refers to stones
    intended for execution by stoning, but the noun itself should remain 'stones'
    rather than importing the verbal idea into the noun.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' In John this term can be
    contextually narrower than the entire Jewish people, but the text here does not
    explicitly specify 'leaders.' Following original-language primacy, the main text
    keeps 'the Jews,' while a footnote preserves the contextual alternative to avoid
    overgeneralization.
- source_word: ἵνα
  chosen: to
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. In English, 'to stone him'
    is the most natural concise rendering of purpose after 'picked up stones.'
- source_word: λιθάσωσιν
  chosen: stone
  alternatives:
  - kill by stoning
  lexicon: BDAG
  rationale: λιθάζω specifically means 'to stone.' The more explicit 'kill by stoning'
    is interpretive; the simple verb best matches the Greek while allowing the reader
    to infer the lethal intent.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; 'him' is the plain and accurate
    rendering.
