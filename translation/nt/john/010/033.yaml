id: JHN.10.33
reference: John 10:33
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν αὐτῷ οἱ ⸀Ἰουδαῖοι· Περὶ καλοῦ ἔργου οὐ λιθάζομέν σε ἀλλὰ περὶ
    βλασφημίας, καὶ ὅτι σὺ ἄνθρωπος ὢν ποιεῖς σεαυτὸν θεόν.
translation:
  text: The Jews answered him, “We are not stoning you for a good work, but for blasphemy,
    and because you, being a man, make yourself God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'make yourself a god.' The Greek θεόν lacks the article, but in this
      context of a blasphemy charge the sense is most likely 'God.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: In John's Gospel, Ἰουδαῖοι can denote Judeans, Jewish authorities, or
    Jews more broadly depending on context. Here the immediate referent is the hostile
    group confronting Jesus in the temple setting. 'The Jews' is the most direct rendering
    of the Greek and preserves Johannine diction; narrower interpretive renderings
    are possible but would resolve the reference more than the text itself does.
- source_word: Περὶ καλοῦ ἔργου
  chosen: for a good work
  alternatives:
  - concerning a good deed
  - because of a good work
  lexicon: BDAG
  rationale: περί with the genitive here expresses the matter or cause under discussion.
    'For a good work' is idiomatic English and keeps the singular ἔργου and the moral
    quality conveyed by καλοῦ.
- source_word: λιθάζομέν
  chosen: are stoning
  alternatives:
  - stone
  - are going to stone
  lexicon: BDAG
  rationale: 'Present indicative first plural is best represented as a progressive
    present in English in this immediate confrontation: they are in the act or intent
    of stoning him. ''Are stoning'' preserves the vividness better than a simple ''stone.'''
- source_word: βλασφημίας
  chosen: blasphemy
  alternatives:
  - blaspheming
  - slander against God
  lexicon: BDAG
  rationale: The noun denotes blasphemy, especially speech or action dishonoring God.
    'Blasphemy' is the standard and most concise rendering here.
- source_word: ἄνθρωπος ὢν
  chosen: being a man
  alternatives:
  - though you are a man
  - being human
  lexicon: BDAG
  rationale: 'The participial construction is concessive or circumstantial in sense:
    Jesus is, in their view, merely human. ''Being a man'' closely follows the Greek
    and preserves the contrast they intend. ''Though you are a man'' is interpretive
    but possible.'
- source_word: ποιεῖς σεαυτὸν θεόν
  chosen: make yourself God
  alternatives:
  - make yourself a god
  - make yourself to be God
  lexicon: BDAG
  rationale: ποιέω with reflexive object plus predicate accusative means 'make oneself
    X' or 'present oneself as X.' Because θεόν lacks the article, either 'God' or
    'a god' is grammatically possible in isolation; in Johannine monotheistic context
    and in the charge of blasphemy, 'God' best captures the intended accusation that
    Jesus is claiming equality with the God of Israel, not merely divinity in a lesser
    sense. The alternative is preserved in a footnote for auditability.
