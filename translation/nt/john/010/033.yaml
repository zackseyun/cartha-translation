theological_decisions:
- issue: Rendering of θεόν in the accusation ποιεῖς σεαυτὸν θεόν
  chosen_reading: God
  alternative_readings:
  - a god
  rationale: The anarthrous θεόν could be rendered either way at a strictly grammatical
    level, but the immediate context of blasphemy and the broader Johannine setting
    indicate that the accusers understand Jesus to be claiming a status belonging
    uniquely to God. Rendering 'God' preserves that force without importing later
    doctrinal formulation beyond the text. The alternative 'a god' is preserved in
    a footnote because it is a known grammatical possibility.
  doctrine_reference: Affirmations; Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
