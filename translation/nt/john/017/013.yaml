theological_decisions:
- issue: Nature of 'my joy'
  chosen_reading: Jesus speaks of joy that belongs to him and is to be present fully
    in his disciples.
  alternative_readings:
  - '''my joy'' as joy about Jesus rather than Jesus'' own joy shared with them'
  rationale: The possessive ἐμὴν most naturally refers to Jesus' own joy. The translation
    preserves this without expanding into doctrinal explanation about participation
    or union beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
