theological_decisions:
- issue: Reciprocal possession between the Son and the Father
  chosen_reading: 'Render the statement straightforwardly as mutual possession: ''all
    that is mine is yours, and what is yours is mine.'''
  alternative_readings:
  - A weakened reading that treats the statement as merely functional cooperation
    rather than shared possession
  rationale: The Greek states reciprocal possession plainly. Within Johannine theology
    this contributes to the high Christology of the passage, and the translation should
    not soften it. At the same time, the wording should not import later creedal terminology
    not present in the verse itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Referent and force of 'in them'
  chosen_reading: Keep the locative wording 'in them' in the main text.
  alternative_readings:
  - '''through them'' as instrumental'
  - '''among them'' as relational presence'
  rationale: The Greek preposition ἐν allows several contextual nuances, but the text
    itself does not require resolving the ambiguity. Per translation philosophy, the
    main text preserves the more direct rendering and alternatives are noted in a
    footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
