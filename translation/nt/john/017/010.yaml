id: JHN.17.10
reference: John 17:10
source:
  edition: SBLGNT
  text: καὶ τὰ ἐμὰ πάντα σά ἐστιν καὶ τὰ σὰ ἐμά, καὶ δεδόξασμαι ἐν αὐτοῖς.
translation:
  text: And all that is mine is yours, and what is yours is mine, and I have been
    glorified in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through them' or 'among them.' The Greek says 'in them,' which may express
      location, means, or manifestation in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἐμὰ πάντα
  chosen: all that is mine
  alternatives:
  - all my things
  - everything that is mine
  lexicon: BDAG
  rationale: The neuter plural with πᾶς functions substantivally, referring broadly
    to all that belongs to Jesus. 'All that is mine' is idiomatic English and preserves
    the comprehensive scope without sounding overly material ('things').
- source_word: σά
  chosen: yours
  alternatives:
  - your own
  lexicon: BDAG
  rationale: The possessive adjective is best rendered as the English possessive pronoun
    'yours' in this equative clause. This keeps the reciprocal possession concise
    and natural.
- source_word: τὰ σὰ ἐμά
  chosen: what is yours is mine
  alternatives:
  - the things that are yours are mine
  - yours are mine
  lexicon: BDAG
  rationale: This mirrors the first clause while using idiomatic English. 'What is
    yours is mine' preserves the reciprocal relationship and avoids awkward literalism.
- source_word: δεδόξασμαι
  chosen: I have been glorified
  alternatives:
  - I am glorified
  - I have received glory
  lexicon: BDAG
  rationale: The perfect passive indicates a completed action with continuing result.
    'I have been glorified' best reflects the verbal form and avoids flattening the
    aspect into a simple present. 'I am glorified' is possible idiomatically, but
    the perfect nuance is better retained here.
- source_word: ἐν αὐτοῖς
  chosen: in them
  alternatives:
  - through them
  - among them
  lexicon: BDAG
  rationale: The most direct rendering of ἐν is 'in.' In context, αὐτοῖς most naturally
    refers to the disciples/people given by the Father in the surrounding passage.
    'In them' preserves the Greek wording while allowing the sense that Jesus' glory
    is manifested in them. Alternative nuances such as 'through them' are interpretive
    and are better preserved in a footnote.
