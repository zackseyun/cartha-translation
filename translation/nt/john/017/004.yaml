id: JHN.17.4
reference: John 17:4
source:
  edition: SBLGNT
  text: ἐγώ σε ἐδόξασα ἐπὶ τῆς γῆς, τὸ ἔργον ⸀τελειώσας ὃ δέδωκάς μοι ἵνα ποιήσω·
translation:
  text: I glorified you on the earth by completing the work that you have given me
    to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having completed the work that you have given me to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόξασα
  chosen: glorified
  alternatives:
  - honored
  lexicon: BDAG
  rationale: δοξάζω in Johannine usage commonly carries the sense of bringing glory
    or revealing honor in a weighty theological sense. 'Glorified' preserves this
    established Johannine meaning better than the flatter 'honored'.
- source_word: ἐπὶ τῆς γῆς
  chosen: on the earth
  alternatives:
  - on earth
  - upon the earth
  lexicon: BDAG
  rationale: A more formally transparent rendering is 'on the earth.' It preserves
    the article in Greek and the spatial sense of ἐπί with the genitive, while remaining
    natural English.
- source_word: τελειώσας
  chosen: by completing
  alternatives:
  - having completed
  - finishing
  - bringing to completion
  lexicon: BDAG
  rationale: The aorist participle is most naturally understood as expressing means
    or attendant circumstance in relation to 'I glorified you.' 'By completing' makes
    the participial relationship clear in idiomatic English. 'Having completed' is
    more formally literal but less natural here.
- source_word: τὸ ἔργον
  chosen: the work
  alternatives:
  - the task
  - the deed
  lexicon: BDAG
  rationale: ἔργον is broadly 'work' or 'task.' 'The work' is the most direct and
    contextually fitting rendering in John, where Jesus speaks of the mission given
    by the Father.
- source_word: δέδωκάς μοι
  chosen: you have given me
  alternatives:
  - you gave me
  lexicon: BDAG
  rationale: The perfect δέδωκάς conveys a completed act with ongoing relevance. 'You
    have given me' better reflects the Greek aspect than the simple past 'you gave
    me.'
- source_word: ἵνα ποιήσω
  chosen: to do
  alternatives:
  - that I should do
  - for me to do
  lexicon: BDAG
  rationale: After verbs of giving, ἵνα + subjunctive often expresses purpose or intended
    result. In idiomatic English, 'to do' best captures the sense without unnecessary
    stiffness.
- source_word: ἐγώ σε
  chosen: I ... you
  alternatives:
  - I myself ... you
  lexicon: BDAG
  rationale: The explicit pronoun ἐγώ adds emphasis, but English does not require
    'I myself' here. The emphasis is sufficiently conveyed by word order and context
    without overtranslation.
