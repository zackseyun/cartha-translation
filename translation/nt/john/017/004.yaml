theological_decisions:
- issue: Relation of Jesus' glorifying the Father to the participle τελειώσας
  chosen_reading: 'The participle is rendered as means: Jesus glorified the Father
    by completing the assigned work.'
  alternative_readings:
  - 'Temporal: ''after completing the work'''
  - 'Coordinate/attendant: ''I glorified you on earth; I completed the work...'''
  rationale: The syntax naturally links the participle to the main verb as explaining
    how the glorification occurred. This preserves the theological connection between
    Jesus' obedient mission and the Father's glorification without importing a broader
    doctrinal claim beyond the verse.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it beyond the text)
