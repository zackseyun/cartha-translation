id: JHN.17.25
reference: John 17:25
source:
  edition: SBLGNT
  text: ⸀Πάτερ δίκαιε, καὶ ὁ κόσμος σε οὐκ ἔγνω, ἐγὼ δέ σε ἔγνων, καὶ οὗτοι ἔγνωσαν
    ὅτι σύ με ἀπέστειλας,
translation:
  text: Righteous Father, even though the world has not known you, I have known you,
    and these have known that you sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''and the world did not know you, but I knew you, and these knew that
      you sent me.'' The Greek uses aorist forms throughout; the main text renders
      them with English perfects for naturalness and present relevance in context.'
    reason: lexical_alternative
  - marker: b
    text: '''The world'' in John often refers not merely to the created order but
      to humanity in its estrangement from God.'
    reason: cross_reference
lexical_decisions:
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: BDAG
  rationale: Vocative of address. 'Father' is the natural direct address in modern
    English; adding 'O' would sound more archaic than the translation philosophy prefers.
- source_word: δίκαιε
  chosen: Righteous
  alternatives:
  - Just
  lexicon: BDAG
  rationale: Predicate adjective in vocative modifying 'Father.' 'Righteous' is the
    standard rendering for δίκαιος in Johannine and broader biblical usage and preserves
    moral/theological weight better than 'Just' here.
- source_word: καὶ
  chosen: even though
  alternatives:
  - and
  - although
  lexicon: BDAG
  rationale: 'The first καὶ introduces a concessive sense in context: Jesus addresses
    the Father and contrasts the world''s failure to know him with Jesus'' own knowledge.
    Rendering it woodenly as ''and'' obscures the discourse relation; ''even though''
    brings out the concessive force in idiomatic English. The later καὶ instances
    are rendered as simple coordination.'
- source_word: ὁ κόσμος
  chosen: the world
  lexicon: BDAG
  rationale: Standard Johannine usage for the world-order of humanity in alienation
    from God. 'World' preserves the theological resonance without over-interpreting
    it as 'people of the world' in the main text.
- source_word: ἔγνω / ἔγνων / ἔγνωσαν
  chosen: has not known / have known / have known
  alternatives:
  - did not know / knew / knew
  - has not come to know / have come to know / have come to know
  lexicon: BDAG
  rationale: Aorist forms of γινώσκω are rendered with English perfects to reflect
    the present relevance in this prayer context and to sound natural in English.
    'Known' preserves the relational-cognitive sense better than a purely punctiliar
    'came to know,' though that nuance is possible.
- source_word: ἐγὼ δέ
  chosen: I
  alternatives:
  - but I
  - yet I
  lexicon: BDAG
  rationale: The contrastive force of δέ is carried by the surrounding clause structure
    in English. Explicit 'but I' is possible, but simple 'I' after 'even though' yields
    smoother English while retaining the contrast.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these people
  - these disciples
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to Jesus' followers in context. 'These'
    is closest to the Greek and avoids importing an interpretive noun into the main
    text.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what 'these' have known.
- source_word: σύ με ἀπέστειλας
  chosen: you sent me
  alternatives:
  - you have sent me
  lexicon: BDAG
  rationale: Aorist of ἀποστέλλω is naturally rendered 'sent.' English perfect is
    possible in Johannine contexts, but simple past is the clearest and most direct
    here.
