theological_decisions:
- issue: Rendering the Father's attribute δίκαιε
  chosen_reading: Righteous Father
  alternative_readings:
  - Just Father
  rationale: The verse emphasizes the Father's moral rectitude in contrast with the
    world's failure to know him. 'Righteous' aligns with established biblical usage
    and avoids narrowing the term to judicial fairness alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #6; Contested terms table
    entry for δικαιοσύνη by semantic family'
- issue: Meaning of κόσμος in Johannine context
  chosen_reading: the world
  alternative_readings:
  - the people of the world
  - the world-system
  rationale: The Greek term carries layered Johannine meaning. The main text preserves
    the source term's breadth and theological tension rather than resolving it into
    one interpretive gloss.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Temporal/aspectual rendering of γινώσκω aorists
  chosen_reading: English perfects for the knowing clauses
  alternative_readings:
  - simple past throughout
  rationale: Using 'has/have known' communicates enduring relational knowledge and
    the present relevance of the completed action in Jesus' prayer, while remaining
    faithful to the Greek sense in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
