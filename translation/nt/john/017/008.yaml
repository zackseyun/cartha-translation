id: JHN.17.8
reference: John 17:8
source:
  edition: SBLGNT
  text: ὅτι τὰ ῥήματα ἃ ⸀ἔδωκάς μοι δέδωκα αὐτοῖς, καὶ αὐτοὶ ἔλαβον καὶ ἔγνωσαν ἀληθῶς
    ὅτι παρὰ σοῦ ἐξῆλθον, καὶ ἐπίστευσαν ὅτι σύ με ἀπέστειλας.
translation:
  text: For the words that you gave me I have given to them, and they received them
    and truly came to know that I came from you, and they believed that you sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sayings that you gave me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I came forth from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - message
  lexicon: BDAG
  rationale: ῥῆμα commonly denotes spoken words, sayings, or utterances. 'Words' preserves
    the plural concrete sense better than the more interpretive singular 'message.'
- source_word: ἔδωκάς ... δέδωκα
  chosen: you gave ... I have given
  alternatives:
  - you have given ... I gave
  - you gave ... I gave
  lexicon: BDAG
  rationale: The first verb is aorist and the second is perfect. Rendering the second
    as 'I have given' preserves the completed action with present result, matching
    the Greek aspectual contrast.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - them
  lexicon: BDAG
  rationale: The dative is naturally represented in English with 'to them' after 'have
    given,' making the indirect-object relation explicit.
- source_word: ἔλαβον
  chosen: received
  alternatives:
  - accepted
  - took
  lexicon: BDAG
  rationale: In Johannine usage, λαμβάνω often carries the sense of receiving what
    is given, especially revelation. 'Received' fits the context better than the more
    physical 'took' or the more interpretive 'accepted.'
- source_word: ἔγνωσαν ἀληθῶς
  chosen: truly came to know
  alternatives:
  - truly knew
  - knew for certain
  - recognized truly
  lexicon: BDAG
  rationale: γινώσκω can denote coming to know or knowing by recognition. 'Came to
    know' reflects the aorist as an attained realization, and 'truly' preserves ἀληθῶς
    without overinterpreting it as mere certainty.
- source_word: παρὰ σοῦ ἐξῆλθον
  chosen: I came from you
  alternatives:
  - I came forth from you
  - I went out from you
  lexicon: BDAG
  rationale: ἐξέρχομαι with παρά + genitive here expresses origin. 'I came from you'
    is idiomatic modern English and preserves the sense of proceeding from the Father
    without archaic phrasing.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - put faith in
  - trusted
  lexicon: BDAG
  rationale: πιστεύω followed by ὅτι introduces belief that a proposition is true.
    'Believed' is the most direct rendering; 'trusted' would shift the construction's
    force.
- source_word: ἀπέστειλας
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: ἀποστέλλω here refers to the Father's sending of the Son. 'Sent' is the
    standard and sufficiently weighty English equivalent without adding interpretive
    nuance.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: The initial ὅτι introduces the content/reason for the preceding statement
    in context. 'For' works naturally in English to connect this verse to the prior
    claim while preserving the explanatory force.
