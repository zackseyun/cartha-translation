theological_decisions:
- issue: Relation between Jesus and the Father in παρὰ σοῦ ἐξῆλθον
  chosen_reading: I came from you
  alternative_readings:
  - I came forth from you
  rationale: The translation preserves the statement of origin without importing later
    doctrinal terminology beyond the text itself. 'Came from you' is faithful and
    readable while leaving the theological weight intact.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Rendering πιστεύω in a ὅτι-clause
  chosen_reading: believed that
  alternative_readings:
  - trusted that
  rationale: Because the object is a proposition ('that you sent me'), the translation
    uses 'believed that' rather than a more relational rendering that could blur the
    syntax.
  doctrine_reference: 'Contested terms: πίστις default ''faith'' with alternatives
    documented where contested'
