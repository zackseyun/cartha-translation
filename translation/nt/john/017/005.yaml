id: JHN.17.5
reference: John 17:5
source:
  edition: SBLGNT
  text: καὶ νῦν δόξασόν με σύ, πάτερ, παρὰ σεαυτῷ τῇ δόξῃ ᾗ εἶχον πρὸ τοῦ τὸν κόσμον
    εἶναι παρὰ σοί.
translation:
  text: And now, Father, glorify me in your presence with the glory that I had with
    you before the world existed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with yourself'; the Greek phrase can more literally denote proximity
      to the Father.
    reason: lexical_alternative
  - marker: b
    text: Or 'before the world was' or 'before the world came to be.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόξασόν
  chosen: glorify
  alternatives:
  - honor
  lexicon: BDAG
  rationale: Aorist active imperative of δοξάζω. 'Glorify' preserves the Johannine
    theological vocabulary of glory and mutual glorification between Father and Son
    better than the flatter 'honor.'
- source_word: παρὰ σεαυτῷ
  chosen: in your presence
  alternatives:
  - beside yourself
  - with yourself
  lexicon: BDAG
  rationale: παρά with the dative can denote proximity or presence. In idiomatic English,
    'in your presence' best conveys the relational/spatial sense without awkwardness.
    It also fits the parallel final phrase παρὰ σοί.
- source_word: τῇ δόξῃ
  chosen: with the glory
  alternatives:
  - by the glory
  - in the glory
  lexicon: BDAG
  rationale: 'Dative here is best taken as associative/instrumental in connection
    with the imperative: the requested glorification is with the glory specified by
    the relative clause. ''With the glory'' is the most natural English rendering.'
- source_word: ᾗ εἶχον
  chosen: that I had
  alternatives:
  - which I was having
  - that was mine
  lexicon: BDAG
  rationale: Imperfect εἶχον refers to Jesus' prior possession of glory. English simple
    past is the most natural idiomatic rendering in this temporal clause.
- source_word: πρὸ τοῦ τὸν κόσμον εἶναι
  chosen: before the world existed
  alternatives:
  - before the world was
  - before the world came to be
  lexicon: BDAG
  rationale: This articular infinitive construction expresses antecedent time. 'Before
    the world existed' is clear modern English and preserves the ontological force
    of εἶναι here.
- source_word: παρὰ σοί
  chosen: with you
  alternatives:
  - in your presence
  - beside you
  lexicon: BDAG
  rationale: παρά with the dative again indicates proximity/presence. 'With you' is
    concise and natural here, and the repetition with the earlier phrase is preserved
    conceptually without forcing identical English wording.
- source_word: σύ, πάτερ
  chosen: Father
  alternatives:
  - you, Father
  lexicon: BDAG
  rationale: 'The explicit pronoun σύ adds emphasis in Greek, but English style normally
    conveys the address adequately with ''Father'' in this prayer context. The emphasis
    is sufficiently retained by word order: ''And now, Father, glorify me...''.'
- source_word: κόσμον
  chosen: world
  alternatives:
  - universe
  - created order
  lexicon: BDAG
  rationale: κόσμος in John commonly means the world/order of human creation. 'World'
    is the standard and contextually appropriate rendering.
