theological_decisions:
- issue: Preexistence of the Son implied by the verse
  chosen_reading: Render the temporal clause straightforwardly as referring to glory
    Jesus had with the Father before the world's existence.
  rationale: The Greek plainly presents pretemporal existence and shared glory with
    the Father. The translation should neither soften nor over-expand this claim,
    in keeping with historic orthodoxy and original-language primacy.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language)'
- issue: Nature of 'glory' shared with the Father
  chosen_reading: Retain 'glory' without interpretive expansion.
  alternative_readings:
  - majesty
  - honor
  rationale: The text states shared glory but does not define it further here. Preserving
    'glory' maintains Johannine theological tension and avoids importing a narrower
    doctrinal explanation into the translation itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
