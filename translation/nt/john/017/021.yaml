theological_decisions:
- issue: Nature of the believers' oneness in relation to the Father and the Son
  chosen_reading: Render ἓν as 'one' and retain 'in us' language without interpretive
    expansion.
  alternative_readings:
  - that they may all be united
  - that they may all be one in purpose
  rationale: The text presents believers' unity by analogy to the Father-Son relation
    but does not define it narrowly as organizational, moral, or metaphysical unity.
    Preserving 'one' and 'in us' maintains the theological depth while avoiding doctrinal
    overreach. This also fits the affirmed Nicene and Chalcedonian framework without
    importing later technical formulations into the translation.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed, Chalcedon)
- issue: Rendering Johannine indwelling language
  chosen_reading: Use 'in me,' 'in you,' and 'in us' literally.
  alternative_readings:
  - with me / with you / with us
  - united with us
  rationale: The Greek repeatedly uses ἐν, and Johannine theology depends on this
    mutual indwelling language. A more paraphrastic rendering would reduce the text's
    theological resonance and resolve ambiguity the source leaves intact.
  doctrine_reference: Translation philosophy §1, §3, §5
