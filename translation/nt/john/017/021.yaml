id: JHN.17.21
reference: John 17:21
source:
  edition: SBLGNT
  text: ἵνα πάντες ἓν ὦσιν, καθὼς σύ, ⸀πάτερ, ἐν ἐμοὶ κἀγὼ ἐν σοί, ἵνα καὶ αὐτοὶ ἐν
    ⸀ἡμῖν ὦσιν, ἵνα ὁ κόσμος ⸀πιστεύῃ ὅτι σύ με ἀπέστειλας.
translation:
  text: that they may all be one, just as you, Father, are in me and I am in you;
    that they also may be in us, so that the world may believe that you sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that they may all be united.' The Greek more literally says 'that they
      may all be one,' which preserves the fuller sense of unity without narrowing
      it to one aspect.
    reason: lexical_alternative
  - marker: b
    text: The repeated phrase 'in' ("in me," "in you," "in us") reflects Johannine
      language of mutual indwelling and participation; it is stronger than mere association.
    reason: cross_reference
  - marker: c
    text: Or 'may come to believe.' The Greek can be understood as the world's believing,
      without explicitly specifying whether the emphasis is on beginning to believe
      or continuing in belief.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: that / so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: The verse uses three ἵνα clauses in sequence. Rendering the first two
    as 'that' and the final one as 'so that' preserves the purpose/result flow in
    natural English without flattening the repeated structure.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: '''All'' is the natural concise rendering of the nominative plural and
    keeps the universal scope of Jesus'' prayer.'
- source_word: ἓν
  chosen: one
  alternatives:
  - united
  lexicon: BDAG
  rationale: The neuter singular 'one' is important and should be preserved rather
    than interpreted as 'united.' It expresses unity without specifying its exact
    mode, matching the Greek and preserving theological tension.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks the comparison between the believers'' oneness
    and the Father-Son relation.'
- source_word: πάτερ
  chosen: Father
  lexicon: BDAG
  rationale: Vocative direct address should be retained explicitly. It is both relational
    and theological in context.
- source_word: ἐν ἐμοὶ ... ἐν σοί
  chosen: in me ... in you
  alternatives:
  - with me ... with you
  lexicon: BDAG
  rationale: The repeated ἐν should be rendered consistently as 'in,' since Johannine
    theology regularly uses this language of mutual indwelling. 'With' would weaken
    the intimacy and theological force.
- source_word: κἀγώ
  chosen: and I
  alternatives:
  - I also
  lexicon: BDAG
  rationale: 'Here the crasis naturally coordinates the reciprocal relation: ''and
    I [am] in you.'' ''I also'' is possible but less smooth in English.'
- source_word: καὶ αὐτοὶ
  chosen: they also
  alternatives:
  - they too
  lexicon: BDAG
  rationale: This preserves the additive force of καί and links believers' participation
    to the Father-Son relationship.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: '''In us'' best reflects the Greek and the Johannine theme of participation/indwelling.
    ''Among us'' would shift the sense toward mere association.'
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the people of the world
  lexicon: BDAG
  rationale: John regularly uses κόσμος with theological density. 'The world' preserves
    the established Johannine term and its broad scope.
- source_word: πιστεύῃ
  chosen: may believe
  alternatives:
  - may come to believe
  lexicon: BDAG
  rationale: The present subjunctive after ἵνα is well represented by 'may believe.'
    'May come to believe' is interpretive and could overstate an ingressive nuance
    not explicit in the form.
- source_word: ἀπέστειλας
  chosen: sent
  alternatives:
  - have sent
  lexicon: BDAG
  rationale: The aorist is most naturally rendered 'sent' here. English present perfect
    is possible in Johannine contexts, but simple past is cleaner and sufficient in
    this clause.
