theological_decisions:
- issue: Meaning of 'keep them in your name'
  chosen_reading: Rendered as 'keep them in your name' without expanding the phrase
    in the main text.
  alternative_readings:
  - keep them by your name
  - protect them through your name
  rationale: The phrase can suggest sphere, means, authority, or revealed character.
    To preserve theological tension and avoid interpretive overreach, the main text
    keeps the more literal 'in your name,' while lexical notes explain the semantic
    range.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Force of 'that they may be one, just as we are'
  chosen_reading: The verse expresses a real analogy between the disciples' unity
    and the Father-Son unity, without specifying metaphysical identity in the translation.
  alternative_readings:
  - A merely moral unity
  - A stronger ontological parallel
  rationale: Given orthodox commitments, the translation must not flatten the comparison
    into mere cooperation, nor should it import later doctrinal formulations directly
    into the verse. 'Just as we are' preserves the text's theological weight while
    leaving the nature of the analogy to context.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 Preserve theological tension rather than resolve it.'
