id: JHN.17.11
reference: John 17:11
source:
  edition: SBLGNT
  text: καὶ οὐκέτι εἰμὶ ἐν τῷ κόσμῳ, καὶ ⸀αὐτοὶ ἐν τῷ κόσμῳ εἰσίν, κἀγὼ πρὸς σὲ ἔρχομαι.
    πάτερ ἅγιε, τήρησον αὐτοὺς ἐν τῷ ὀνόματί σου ᾧ δέδωκάς μοι, ἵνα ὦσιν ἓν ⸀καθὼς
    ἡμεῖς.
translation:
  text: And I am no longer in the world, but they are in the world, and I am coming
    to you. Holy Father, keep them in your name, which you have given to me, so that
    they may be one, just as we are.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keep them by your name' or 'protect them through your name.' The Greek
      phrase can express sphere, means, or authority.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'keep them in your name which you have given me,'
      while others are understood as 'keep them in your name those whom you have given
      me.' This translation follows the SBLGNT reading, in which 'which' refers to
      'name.'
    reason: textual_variant
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Standard temporal negation indicating cessation from the speaker's present
    standpoint; 'no longer' is idiomatic modern English.
- source_word: κόσμος
  chosen: world
  lexicon: BDAG
  rationale: In Johannine usage here, κόσμος refers to the earthly human sphere/order
    in which the disciples remain and from which Jesus is departing. 'World' preserves
    the established Johannine term without over-interpreting it as 'age' or 'society.'
- source_word: κἀγὼ πρὸς σὲ ἔρχομαι
  chosen: and I am coming to you
  alternatives:
  - and I come to you
  - and I am going to you
  lexicon: BDAG
  rationale: The present tense ἔρχομαι is naturally rendered as a progressive/futuristic
    present in context. 'Coming' preserves the Greek verb directly; 'going' would
    reflect English viewpoint but is less literal to the source.
- source_word: πάτερ ἅγιε
  chosen: Holy Father
  alternatives:
  - Father, holy one
  lexicon: BDAG
  rationale: A vocative address. 'Holy Father' is the natural English rendering and
    preserves both the intimacy of 'Father' and the consecrated distinctness conveyed
    by ἅγιε.
- source_word: τήρησον
  chosen: keep
  alternatives:
  - guard
  - protect
  - preserve
  lexicon: BDAG
  rationale: τηρέω commonly means keep, guard, preserve. 'Keep' is broad enough to
    include protection and faithful preservation, and it fits Johannine style without
    narrowing the sense to merely physical protection.
- source_word: ἐν τῷ ὀνόματί σου
  chosen: in your name
  alternatives:
  - by your name
  - through your name
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve the relational/sphere
    nuance rather than reducing it to mere instrumentality. The phrase likely conveys
    being kept within the revealed character, authority, and covenantal reality of
    God's name.
- source_word: ᾧ δέδωκάς μοι
  chosen: which you have given to me
  alternatives:
  - that you have given me
  lexicon: BDAG
  rationale: The relative pronoun agrees with ὀνόματι ('name'), yielding the sense
    that the Father has given his name to the Son. This is the best-supported reading
    of the clause as transmitted here and should not be paraphrased away.
- source_word: ἵνα ὦσιν ἓν
  chosen: so that they may be one
  alternatives:
  - that they may be one
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and ἓν is neuter singular, indicating unity rather
    than one person/one thing in a simplistic numerical sense. 'Be one' is the established
    and accurate rendering.
- source_word: καθὼς ἡμεῖς
  chosen: just as we are
  alternatives:
  - as we are
  - even as we are
  lexicon: BDAG
  rationale: καθώς marks comparison. 'Just as we are' preserves the analogy between
    the disciples' unity and the unity of Father and Son without specifying more than
    the text states.
