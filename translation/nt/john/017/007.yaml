theological_decisions:
- issue: Relationship between the Father's gifts to the Son and their source
  chosen_reading: 'Rendered the clause as a statement of origin: ''everything you
    have given me is from you.'''
  alternative_readings:
  - everything that you have given me comes from you
  rationale: The verse emphasizes the Father's role as the source of all that the
    Son has received, without expanding into later doctrinal formulations. The wording
    preserves the text's theological claim while avoiding interpretive overstatement.
  doctrine_reference: Preserve theological tension rather than resolve it.
