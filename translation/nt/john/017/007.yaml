id: JHN.17.7
reference: John 17:7
source:
  edition: SBLGNT
  text: νῦν ἔγνωκαν ὅτι πάντα ὅσα ⸀δέδωκάς μοι παρὰ σοῦ ⸀εἰσιν·
translation:
  text: Now they have come to know that everything you have given me is from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'everything that you have given me comes from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  chosen: Now
  alternatives:
  - At this point
  lexicon: BDAG
  rationale: Temporal adverb marking the present stage/result in the disciples' understanding.
    'Now' is concise and natural in English.
- source_word: ἔγνωκαν
  chosen: they have come to know
  alternatives:
  - they have known
  - they know
  lexicon: BDAG
  rationale: Perfect tense of γινώσκω indicates a present state resulting from prior
    realization. 'Have come to know' captures both the ingressive and resultant force
    better than simple 'know'.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Standard content conjunction introducing what they have come to know.
- source_word: πάντα ὅσα
  chosen: everything
  alternatives:
  - all things that
  - everything that
  lexicon: BDAG
  rationale: 'The combination functions idiomatically to express totality. ''Everything''
    is natural English and preserves the comprehensive sense. The relative nuance
    is carried by the following clause: ''everything you have given me''.'
- source_word: δέδωκάς
  chosen: you have given
  alternatives:
  - you gave
  lexicon: BDAG
  rationale: Perfect tense of δίδωμι is best represented by English present perfect
    here, emphasizing what the Father has given and its continuing significance.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: Dative indirect object. English idiom prefers 'given me' rather than
    the more formal 'given to me' in this context.
- source_word: παρὰ σοῦ
  chosen: from you
  alternatives:
  - from beside you
  - at your side
  lexicon: BDAG
  rationale: With verbs/statements of origin, παρά + genitive commonly denotes source/origin.
    'From you' best conveys that all Jesus has received has its source in the Father.
- source_word: εἰσιν
  chosen: is
  alternatives:
  - are
  lexicon: BDAG
  rationale: Although the Greek verb is plural, English commonly treats 'everything'
    as a singular collective subject. Singular 'is' is the most natural rendering
    in contemporary English while preserving the sense.
