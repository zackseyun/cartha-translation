theological_decisions:
- issue: Rendering the reciprocal glorification between the Father and the Son
  chosen_reading: Retained 'Glorify your Son, so that the Son may glorify you' without
    interpretive expansion.
  alternative_readings:
  - Glorify your Son so that your Son may bring glory to you
  - Honor your Son so that he may honor you
  rationale: The verse expresses mutual glorification within the Father-Son relationship.
    The translation preserves the theological weight and symmetry of the Greek without
    importing later doctrinal formulations into the wording, while remaining fully
    compatible with historic Nicene and Chalcedonian orthodoxy.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Capitalization of 'Son'
  chosen_reading: Capitalized 'Son' in reference to Jesus.
  alternative_readings:
  - son
  rationale: In context υἱός functions as a christological title in direct address
    and prayer. Capitalization aids English readers in recognizing the titular reference
    without altering the lexical content.
  doctrine_reference: Affirmations
