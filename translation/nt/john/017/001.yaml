id: JHN.17.1
reference: John 17:1
source:
  edition: SBLGNT
  text: Ταῦτα ⸀ἐλάλησεν Ἰησοῦς, καὶ ⸂ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ εἰς τὸν οὐρανὸν εἶπεν⸃·
    Πάτερ, ἐλήλυθεν ἡ ὥρα· δόξασόν σου τὸν υἱόν, ⸀ἵνα ὁ ⸀υἱὸς δοξάσῃ σέ,
translation:
  text: 'Jesus said these things, and lifting up his eyes to heaven, he said: “Father,
    the hour has come. Glorify your Son, so that the Son may glorify you,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the preceding discourse;
    'these things' is the natural and sufficiently formal English rendering.
- source_word: ἐλάλησεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Though λαλέω is more literally 'speak,' idiomatic English with a following
    quotation and summary object favors 'said.' The content remains unchanged.
- source_word: ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ
  chosen: lifting up his eyes
  alternatives:
  - having lifted up his eyes
  - raising his eyes
  lexicon: BDAG
  rationale: Aorist participle from ἐπαίρω with object 'eyes'; rendered as a contemporaneous
    participial phrase in natural English while preserving the physical gesture.
- source_word: εἰς τὸν οὐρανόν
  chosen: to heaven
  alternatives:
  - toward heaven
  lexicon: BDAG
  rationale: εἰς with accusative here marks direction. 'To heaven' is idiomatic in
    English and preserves the upward orientation of prayer.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - My Father
  lexicon: BDAG
  rationale: Vocative address is simply 'Father'; adding 'my' would import emphasis
    not present in the Greek.
- source_word: ἐλήλυθεν ἡ ὥρα
  chosen: the hour has come
  alternatives:
  - the time has come
  lexicon: BDAG
  rationale: Perfect tense indicates the decisive arrival of the appointed hour. 'Hour'
    preserves Johannine thematic language better than the more interpretive 'time.'
- source_word: δόξασόν
  chosen: Glorify
  alternatives:
  - Honor
  lexicon: BDAG
  rationale: δοξάζω in John carries revelatory and honor-shame theological weight;
    'glorify' is the established and most precise rendering.
- source_word: σου τὸν υἱόν
  chosen: your Son
  alternatives:
  - the Son who is yours
  lexicon: BDAG
  rationale: Genitive pronoun with 'Son' is naturally possessive in English. Capitalization
    reflects titular reference to Jesus in context, not a change in meaning.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the clause's teleological force.
- source_word: ὁ υἱὸς
  chosen: the Son
  alternatives:
  - your Son
  lexicon: BDAG
  rationale: The article is explicit in Greek. Rendering it as 'the Son' preserves
    the shift from direct object 'your Son' to the titular subject of the purpose
    clause.
- source_word: δοξάσῃ σέ
  chosen: may glorify you
  alternatives:
  - might glorify you
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα is well represented by 'may' in contemporary
    English; it preserves purpose without sounding archaic.
