id: JHN.17.2
reference: John 17:2
source:
  edition: SBLGNT
  text: καθὼς ἔδωκας αὐτῷ ἐξουσίαν πάσης σαρκός, ἵνα πᾶν ὃ δέδωκας αὐτῷ ⸀δώσῃ αὐτοῖς
    ζωὴν αἰώνιον.
translation:
  text: just as you gave him authority over all flesh, so that he may give eternal
    life to all whom you have given him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over all humanity.' The Greek reads 'over all flesh,' a biblical idiom
      for human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally 'all that you have given him'; the Greek uses a neuter singular
      collective expression for the people given to the Son.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Introduces comparison/correspondence with the preceding request in v.1.
    'Just as' preserves the comparative force more clearly than simple 'as'.
- source_word: ἔδωκας
  chosen: you gave
  alternatives:
  - you have given
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past here, referring to
    the Father's granting of authority to the Son.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: '''Authority'' best captures delegated right and jurisdiction, not merely
    raw power.'
- source_word: πάσης σαρκός
  chosen: over all flesh
  alternatives:
  - over all humanity
  - over every person
  lexicon: BDAG
  rationale: Following the doctrine guideline for σάρξ, the literal sense is preferred
    here because the phrase is idiomatic for all human beings while preserving the
    biblical texture. A more interpretive alternative is preserved in a footnote.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is natural modern English while retaining
    the clause's purposive force.
- source_word: πᾶν ὃ
  chosen: all whom
  alternatives:
  - everything that
  - all that
  lexicon: BDAG
  rationale: Although πᾶν is neuter singular, in Johannine usage here it functions
    collectively for the people given by the Father to the Son. 'All whom' communicates
    the personal referent in idiomatic English better than the wooden 'all that.'
- source_word: δέδωκας
  chosen: you have given
  alternatives:
  - you gave
  lexicon: BDAG
  rationale: 'The perfect indicates a completed act with ongoing relevance: those
    whom the Father has given remain given to the Son.'
- source_word: δώσῃ
  chosen: he may give
  alternatives:
  - he might give
  - he should give
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα is naturally rendered with 'may' in English
    to express intended result/purpose without overstatement.
- source_word: αὐτοῖς
  chosen: to all whom you have given him
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative pronoun is made explicit in English by linking it to the antecedent
    for clarity and readability.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and accurate Johannine expression,
    conveying both unending life and the life belonging to the age to come.'
