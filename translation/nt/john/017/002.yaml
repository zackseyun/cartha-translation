theological_decisions:
- issue: Scope and referent of 'all flesh' and 'all whom you have given him'
  chosen_reading: Retain the universal scope of the Son's authority ('over all flesh')
    while also preserving the particular group who receive eternal life ('all whom
    you have given him') without importing a denominational system.
  alternative_readings:
  - Render 'all flesh' as 'all humanity'
  - Render πᾶν ὃ more woodenly as 'all that you have given him'
  rationale: The verse itself distinguishes between universal authority and the giving
    of eternal life to those given by the Father. The translation preserves that tension
    rather than resolving it into a broader or narrower theological claim than the
    Greek states.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
