theological_decisions:
- issue: Preexistence of the Son implied by the Father's love 'before the foundation
    of the world'
  chosen_reading: 'Retained the straightforward temporal statement without weakening
    it: ''because you loved me before the foundation of the world.'''
  alternative_readings:
  - Interpretive paraphrases that soften or metaphorize pretemporal reference
  rationale: In keeping with historic orthodoxy and the plain sense of the Greek,
    the verse presents the Father's love for the Son prior to creation. The translation
    should preserve this claim without explanatory expansion.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language)'
- issue: Force of θέλω in Jesus' prayer
  chosen_reading: Rendered as 'I desire' rather than 'I will.'
  alternative_readings:
  - I will
  - I want
  rationale: This avoids importing a more dogmatically loaded tone of decree while
    still preserving genuine volition. The Greek supports strong desire/will, but
    the prayer setting favors an English rendering that is both reverent and accurate.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
