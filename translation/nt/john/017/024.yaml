id: JHN.17.24
reference: John 17:24
source:
  edition: SBLGNT
  text: ⸀πάτερ, ⸀ὃ δέδωκάς μοι, θέλω ἵνα ὅπου εἰμὶ ἐγὼ κἀκεῖνοι ὦσιν μετ’ ἐμοῦ, ἵνα
    θεωρῶσιν τὴν δόξαν τὴν ἐμὴν ἣν ⸀δέδωκάς μοι, ὅτι ἠγάπησάς με πρὸ καταβολῆς κόσμου.
translation:
  text: Father, I desire that those whom you have given me also may be with me where
    I am, so that they may see my glory that you have given me, because you loved
    me before the foundation of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'what/that which you have given me'; the expression is
      collective and refers to the people the Father has given to the Son, hence 'those
      whom you have given me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  chosen: Father
  alternatives:
  - My Father
  lexicon: BDAG
  rationale: Direct vocative address to God; 'Father' is the natural and standard
    English equivalent without adding possessive wording not present in the Greek.
- source_word: ὃ δέδωκάς μοι
  chosen: those whom you have given me
  alternatives:
  - what you have given me
  - that which you have given me
  lexicon: BDAG
  rationale: Although ὃ is neuter singular ('what/that which'), in Johannine usage
    it can function collectively for the people given by the Father to the Son. The
    following plural κἀκεῖνοι and ὦσιν require a personal plural sense in English.
    Rendering it as 'those whom' communicates the referent clearly and idiomatically.
- source_word: δέδωκάς
  chosen: have given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with continuing result; English
    present perfect best reflects this in context.
- source_word: θέλω
  chosen: I desire
  alternatives:
  - I will
  - I want
  lexicon: BDAG
  rationale: θέλω can mean 'want, wish, desire, will.' In this prayer context, 'I
    desire' preserves the volitional force without sounding like a bare command or
    an overly weak preference. 'I will' could be misunderstood in English as simple
    futurity.
- source_word: ἵνα
  chosen: that / so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: The first ἵνα introduces the content of Jesus' desire ('that ... may
    be'); the second expresses purpose/result ('so that they may see'). Using slightly
    different English connectors reflects natural English while preserving the Greek
    syntax.
- source_word: ὅπου εἰμὶ ἐγὼ
  chosen: where I am
  alternatives:
  - where I myself am
  lexicon: BDAG
  rationale: The explicit ἐγώ adds emphasis, but standard English usually conveys
    the sense adequately with 'where I am.' A more emphatic rendering is possible
    but would sound heavy here.
- source_word: κἀκεῖνοι ὦσιν μετ’ ἐμοῦ
  chosen: they also may be with me
  alternatives:
  - those also may be with me
  lexicon: BDAG
  rationale: κἀκεῖνοι means 'and those' or 'they also.' 'They also may be with me'
    preserves the additive force and reads naturally in English.
- source_word: θεωρῶσιν
  chosen: may see
  alternatives:
  - may behold
  - may observe
  lexicon: BDAG
  rationale: θεωρέω can carry the sense 'see, behold, observe.' 'See' is clear modern
    English; 'behold' is more elevated but less natural for the target style. The
    context still preserves the contemplative sense through the object 'my glory.'
- source_word: τὴν δόξαν τὴν ἐμὴν
  chosen: my glory
  alternatives:
  - the glory that is mine
  lexicon: BDAG
  rationale: The repeated article plus possessive adjective is naturally rendered
    in English as 'my glory.' This preserves the possessive emphasis without wooden
    phrasing.
- source_word: ἣν δέδωκάς μοι
  chosen: that you have given me
  alternatives:
  - which you have given me
  lexicon: BDAG
  rationale: Relative clause specifying the glory; present perfect again reflects
    the Greek perfect.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι gives the reason the Father gave the Son this glory: because
    the Father loved him before the world''s foundation. ''Because'' makes the causal
    relation explicit.'
- source_word: ἠγάπησάς με
  chosen: you loved me
  alternatives:
  - you have loved me
  lexicon: BDAG
  rationale: Aorist is best rendered as simple past here, referring to the Father's
    love in relation to the pretemporal clause that follows.
- source_word: πρὸ καταβολῆς κόσμου
  chosen: before the foundation of the world
  alternatives:
  - before the world's foundation
  lexicon: BDAG
  rationale: This is a standard idiom for pre-creation temporality. 'Foundation of
    the world' is established, accurate, and readily understandable.
