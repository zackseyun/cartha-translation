id: JHN.17.9
reference: John 17:9
source:
  edition: SBLGNT
  text: ἐγὼ περὶ αὐτῶν ἐρωτῶ· οὐ περὶ τοῦ κόσμου ἐρωτῶ ἀλλὰ περὶ ὧν δέδωκάς μοι, ὅτι
    σοί εἰσιν,
translation:
  text: I am asking concerning them. I am not asking concerning the world, but concerning
    those whom you have given me, because they are yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for them' instead of 'concerning them'; the Greek preposition can carry
      either sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I pray'; the Greek verb more literally means 'I ask' or 'I request.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτῶ
  chosen: am asking
  alternatives:
  - ask
  - pray
  - request
  lexicon: BDAG
  rationale: Rendered as present progressive to reflect the immediate, ongoing prayer
    context. 'Asking' preserves the basic sense of ἐρωτάω without importing more explicitly
    religious language than the Greek itself requires, though in context it is prayer
    addressed to the Father.
- source_word: περὶ αὐτῶν
  chosen: concerning them
  alternatives:
  - for them
  - about them
  lexicon: BDAG
  rationale: περί with the genitive can mean 'concerning/about' and in prayer contexts
    often carries the sense 'for.' 'Concerning them' stays closer to the Greek structure
    and preserves the repeated parallelism across the verse.
- source_word: κόσμου
  chosen: the world
  lexicon: BDAG
  rationale: κόσμος is consistently rendered 'world' in Johannine usage. Here it refers
    to the world in contrast with those given by the Father to the Son, and the translation
    preserves that theological tension without narrowing it further.
- source_word: ὧν δέδωκάς μοι
  chosen: those whom you have given me
  alternatives:
  - those you have given to me
  lexicon: BDAG
  rationale: 'The relative pronoun with the perfect verb is naturally rendered as
    a personal group: ''those whom you have given me.'' The perfect δέδωκάς conveys
    a completed act with ongoing result, well represented by English present perfect.'
- source_word: δέδωκάς
  chosen: have given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: The Greek perfect is significant here, indicating a past giving with
    present continuing significance; therefore 'have given' is preferable to simple
    past 'gave.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally gives the reason for Jesus'' intercession: he
    asks concerning them because they belong to the Father. ''Because'' makes the
    causal force explicit in natural English.'
- source_word: σοί εἰσιν
  chosen: they are yours
  alternatives:
  - they belong to you
  lexicon: BDAG
  rationale: A direct and idiomatic rendering of the dative pronoun with εἰμί. 'They
    are yours' preserves the relational and possessive force without overexplaining.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained in English to preserve the emphatic
    subject, especially fitting the contrastive structure of the verse.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks the strong contrast between 'not concerning the world' and 'concerning
    those whom you have given me.' 'But' is the most natural English equivalent in
    this structure.
