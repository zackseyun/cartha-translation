theological_decisions:
- issue: Whether to render ἐρωτῶ with explicitly prayer-language
  chosen_reading: Rendered as 'am asking' rather than 'pray'
  alternative_readings:
  - I pray for them
  - I ask for them
  rationale: Although the context is Jesus' prayer to the Father, the Greek verb is
    ἐρωτάω, whose basic sense is 'ask/request.' Using 'am asking' preserves lexical
    transparency and avoids importing traditional ecclesiastical phrasing beyond the
    source text, while still fitting the prayer setting.
  doctrine_reference: Translation philosophy §1, §6
- issue: Scope of 'the world' in contrast to those given by the Father
  chosen_reading: Kept as 'the world' without interpretive narrowing
  alternative_readings:
  - humanity in general
  - the unbelieving world system
  rationale: Johannine κόσμος can bear several nuanced senses, and this verse participates
    in that tension. The translation preserves the term rather than resolving the
    theological question in favor of a particular denominational reading.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives;
    Translation philosophy §3
