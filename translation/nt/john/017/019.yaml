id: JHN.17.19
reference: John 17:19
source:
  edition: SBLGNT
  text: καὶ ὑπὲρ αὐτῶν ἐγὼ ἁγιάζω ἐμαυτόν, ἵνα ⸂ὦσιν καὶ αὐτοὶ⸃ ἡγιασμένοι ἐν ἀληθείᾳ.
translation:
  text: And for their sake I sanctify myself, so that they also may be sanctified
    in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consecrate myself.' The Greek verb is the same root used later in the
      verse for 'be sanctified.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the truth'; compare 17:17.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ αὐτῶν
  chosen: for their sake
  alternatives:
  - on their behalf
  - for them
  lexicon: BDAG
  rationale: ὑπέρ with the genitive commonly expresses benefit or representation.
    'For their sake' fits the context of Jesus acting for the disciples' benefit and
    sounds natural in English without overstating substitution.
- source_word: ἁγιάζω
  chosen: sanctify
  alternatives:
  - consecrate
  - make holy
  - set apart
  lexicon: BDAG
  rationale: The verb carries the sense of setting apart as holy or consecrating.
    'Sanctify' preserves the theological linkage with the following perfect passive
    participle ἡγιασμένοι and keeps the repeated root visible in English. 'Consecrate'
    is a strong contextual alternative, especially for self-dedication, but using
    'sanctify' in both clauses better reflects the Greek repetition.
- source_word: ἐμαυτόν
  chosen: myself
  lexicon: BDAG
  rationale: Reflexive pronoun indicating Jesus' self-directed action; straightforwardly
    rendered 'myself.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic modern English and adequately
    preserves the telic force.
- source_word: ὦσιν
  chosen: may be
  alternatives:
  - might be
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα expressing intended result or purpose.
    'May be' is natural and sufficiently formal.
- source_word: καὶ αὐτοὶ
  chosen: they also
  alternatives:
  - they themselves also
  - also they
  lexicon: BDAG
  rationale: The combination adds emphasis and inclusion. 'They also' captures the
    sense without awkwardness.
- source_word: ἡγιασμένοι
  chosen: sanctified
  alternatives:
  - consecrated
  - made holy
  lexicon: BDAG
  rationale: Perfect passive participle denotes a state resulting from sanctifying
    action. 'Sanctified' preserves lexical correspondence with ἁγιάζω earlier in the
    verse and maintains theological continuity.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - in the truth
  - by truth
  lexicon: BDAG
  rationale: The anarthrous phrase can be rendered 'in truth,' expressing sphere or
    manner. This also echoes John 17:17 while avoiding importing the article where
    Greek lacks it. 'In the truth' is possible as a more definite rendering and is
    preserved in a footnote because of the close contextual link to v. 17.
