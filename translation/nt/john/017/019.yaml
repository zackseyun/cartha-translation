theological_decisions:
- issue: Meaning of Jesus' self-sanctification
  chosen_reading: Jesus speaks of setting himself apart/consecrating himself for the
    disciples' benefit, not of becoming morally holier.
  alternative_readings:
  - Jesus makes himself holy
  rationale: Within Johannine theology and the broader christological affirmations
    of orthodoxy, the sinless Son does not move from impurity to purity. The verb
    here is best understood as consecratory self-dedication unto his mission, especially
    in view of the disciples' sanctification.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon
    (451 AD)'
- issue: Force of ἐν ἀληθείᾳ
  chosen_reading: The phrase is rendered 'in truth' as the sphere or reality in which
    sanctification occurs.
  alternative_readings:
  - in the truth
  - by truth
  rationale: The Greek lacks the article, so the translation avoids making the phrase
    more definite than the source requires, while still allowing readers to hear the
    resonance with the preceding context about God's word and truth.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
