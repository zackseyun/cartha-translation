id: JHN.17.22
reference: John 17:22
source:
  edition: SBLGNT
  text: κἀγὼ τὴν δόξαν ἣν δέδωκάς μοι δέδωκα αὐτοῖς, ἵνα ὦσιν ἓν καθὼς ἡμεῖς ⸀ἕν,
translation:
  text: And I have given them the glory that you have given me, so that they may be
    one, just as we are one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I also have given them the glory that you have given me.' The Greek
      κἀγώ can carry an additive emphasis ('I also').
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - I also
  - And I also
  lexicon: BDAG
  rationale: The crasis combines καί + ἐγώ, adding an emphatic/additive sense. 'And
    I' preserves the connective flow from the prior context while keeping the subject
    explicit; 'also' is possible but not required in smooth English here.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: BDAG
  rationale: δόξα in Johannine theology commonly carries the sense of divine glory,
    not merely human honor. 'Glory' preserves the theological weight and intertextual
    consistency in John.
- source_word: ἣν δέδωκάς μοι
  chosen: that you have given me
  alternatives:
  - which you have given me
  lexicon: BDAG
  rationale: The perfect δέδωκάς indicates a completed act with abiding result. English
    present perfect best reflects this aspect. 'That' is idiomatic for the relative
    clause.
- source_word: δέδωκα αὐτοῖς
  chosen: I have given them
  alternatives:
  - I gave to them
  - I have given to them
  lexicon: BDAG
  rationale: The perfect δέδωκα is likewise rendered with the English present perfect
    to preserve the sense of an accomplished gift with continuing effect. Indirect-object
    placement 'given them' is natural modern English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is clear, natural, and preserves
    the telic force without sounding wooden.
- source_word: ὦσιν
  chosen: they may be
  alternatives:
  - they might be
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is well represented by 'may be' in English,
    expressing intended result/purpose.
- source_word: ἓν
  chosen: one
  alternatives:
  - united
  lexicon: BDAG
  rationale: 'The neuter singular ''one'' is important: it emphasizes unity rather
    than one person. ''United'' interprets the sense but moves away from the text''s
    concise wording.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks comparison and is idiomatic contemporary English.'
- source_word: ἡμεῖς ἕν
  chosen: we are one
  alternatives:
  - we are united
  lexicon: BDAG
  rationale: Although 'are' is implied rather than repeated in Greek, English requires
    it. 'We are one' preserves the compact, theologically significant comparison without
    over-interpreting its nature.
