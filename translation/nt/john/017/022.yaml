theological_decisions:
- issue: Nature of the believers' oneness in comparison with the Father-Son oneness
  chosen_reading: Render the comparison straightforwardly as 'so that they may be
    one, just as we are one' without specifying whether the unity is ontological,
    relational, or missional.
  alternative_readings:
  - Interpret as purely relational unity
  - Interpret as participation in divine life
  - Interpret as institutional/ecclesial unity
  rationale: The verse presents a real comparison between the disciples' unity and
    the Father-Son unity, but the text itself does not define the exact mode of that
    comparison here. To preserve theological tension and avoid importing later doctrinal
    precision into the translation, the wording remains literal and open-textured
    while fully compatible with Nicene and Chalcedonian orthodoxy.
  doctrine_reference: Preserve theological tension rather than resolve it.
