id: JHN.17.3
reference: John 17:3
source:
  edition: SBLGNT
  text: αὕτη δέ ἐστιν ἡ αἰώνιος ζωὴ ἵνα γινώσκωσι σὲ τὸν μόνον ἀληθινὸν θεὸν καὶ ὃν
    ἀπέστειλας Ἰησοῦν Χριστόν.
translation:
  text: 'And this is eternal life: that they may know you, the only true God, and
    Jesus the Messiah whom you sent.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'Jesus Christ.' The Greek Χριστός can function as a title
      ('Messiah') or, in some contexts, as a name-like designation ('Christ').
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη δέ ἐστιν
  chosen: And this is
  alternatives:
  - Now this is
  - This, then, is
  lexicon: BDAG
  rationale: αὕτη with δέ and ἐστιν introduces an explanatory statement. 'And this
    is' preserves the connective force of δέ in smooth English without overstating
    contrast.
- source_word: ἡ αἰώνιος ζωὴ
  chosen: eternal life
  alternatives:
  - the life of the age
  - everlasting life
  lexicon: BDAG
  rationale: Standard Johannine expression denoting life belonging to the age to come
    and characterized by enduring divine life. 'Eternal life' is both accurate and
    idiomatic.
- source_word: ἵνα γινώσκωσι
  chosen: that they may know
  alternatives:
  - that they know
  - so that they may know
  lexicon: BDAG
  rationale: After a predicate nominative construction, ἵνα here expresses content/result
    defining what eternal life consists in. The present subjunctive γινώσκωσι conveys
    ongoing relational knowledge; 'may know' preserves the verbal form better than
    a bare infinitive.
- source_word: σὲ
  chosen: you
  lexicon: BDAG
  rationale: Direct object of γινώσκωσι, referring to the Father in Jesus' prayer.
- source_word: τὸν μόνον ἀληθινὸν θεὸν
  chosen: the only true God
  alternatives:
  - the one true God alone
  - the only genuine God
  lexicon: BDAG
  rationale: μόνον modifies ἀληθινὸν θεὸν, and ἀληθινός in John often carries the
    sense 'true/genuine' in contrast to what is partial or false. 'The only true God'
    is the most natural and established rendering.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple coordination joining the Father and the one sent, without implying
    identity collapse or separation beyond the syntax.
- source_word: ὃν ἀπέστειλας
  chosen: whom you sent
  alternatives:
  - the one whom you sent
  lexicon: BDAG
  rationale: Relative clause identifying Jesus in relation to the Father's mission.
    Aorist ἀπέστειλας is naturally rendered as simple past in English.
- source_word: Ἰησοῦν Χριστόν
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name-like surname. In this confessional and explanatory
    context, the titular sense is still audible, so 'Jesus the Messiah' best preserves
    meaning.
