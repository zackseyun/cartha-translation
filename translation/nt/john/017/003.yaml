theological_decisions:
- issue: Relation of 'the only true God' to Jesus in a verse sometimes used in anti-Trinitarian
    argument
  chosen_reading: 'Retain the verse''s direct wording without importing explanatory
    additions: the Father is addressed as ''the only true God,'' and Jesus is distinguished
    as the one sent by the Father.'
  alternative_readings:
  - Paraphrasing to make Trinitarian theology explicit
  - Rendering in a way that weakens the distinction between the Father and Jesus in
    the sentence
  rationale: The translation must preserve the text's own wording and theological
    tension. Historic orthodoxy affirmed in DOCTRINE.md requires no denial of Christ's
    full deity, but the verse itself should not be expanded to resolve later doctrinal
    debates. John's Gospel elsewhere supplies the broader Christological context.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering Χριστόν
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where title
    is in view, while preserving 'Christ' as an alternative where name-like usage
    is possible. Here the title remains semantically meaningful, so the main text
    uses 'Messiah' and the traditional alternative is preserved in a footnote.
  doctrine_reference: 'Contested terms: Χριστός'
