id: JHN.17.26
reference: John 17:26
source:
  edition: SBLGNT
  text: καὶ ἐγνώρισα αὐτοῖς τὸ ὄνομά σου καὶ γνωρίσω, ἵνα ἡ ἀγάπη ἣν ἠγάπησάς με ἐν
    αὐτοῖς ᾖ κἀγὼ ἐν αὐτοῖς.
translation:
  text: And I made your name known to them, and I will make it known, so that the
    love with which you loved me may be in them, and I in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I revealed your name to them, and I will reveal it.'
    reason: lexical_alternative
  - marker: b
    text: '''Your name'' refers to God''s revealed identity and character, not merely
      a spoken designation.'
    reason: cultural_note
  - marker: c
    text: Or 'among them' for 'in them,' though 'in them' better preserves the Johannine
      theme of indwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώρισα
  chosen: I made known
  alternatives:
  - I revealed
  - I made ... known
  lexicon: BDAG
  rationale: Aorist active indicative, first person singular. 'Made known' preserves
    the causative sense of γνωρίζω and fits the parallel with future γνωρίσω. 'Revealed'
    is possible but slightly more interpretive.
- source_word: τὸ ὄνομά σου
  chosen: your name
  alternatives:
  - who you are
  - your character
  lexicon: BDAG
  rationale: Retains the concrete expression 'name' rather than paraphrasing. In Johannine
    usage this carries the sense of God's revealed identity and character, but the
    text itself says 'name,' so the literal wording is preserved.
- source_word: γνωρίσω
  chosen: I will make it known
  alternatives:
  - I will make known
  - I will reveal
  lexicon: BDAG
  rationale: Future active indicative matching ἐγνώρισα. 'It' is supplied in English
    to refer back to 'your name' and avoid awkward repetition while preserving the
    Greek sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Expresses purpose/result naturally in modern English while preserving
    the clause's teleological force.
- source_word: ἡ ἀγάπη
  chosen: the love
  lexicon: BDAG
  rationale: Follows the default rendering of ἀγάπη as 'love' per doctrine guidelines.
- source_word: ἣν ἠγάπησάς με
  chosen: with which you loved me
  alternatives:
  - that you loved me with
  lexicon: BDAG
  rationale: 'The relative clause is rendered with an English preposition to reflect
    the instrumental/associative sense implied by the construction: the love by which
    the Father loved the Son.'
- source_word: ἐν αὐτοῖς
  chosen: in them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: '''In them'' is the most direct rendering of ἐν plus dative here and
    fits the indwelling theme of John''s Gospel better than ''among them.'''
- source_word: ᾖ
  chosen: may be
  alternatives:
  - might be
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα, appropriately rendered as 'may be' in
    English.
- source_word: κἀγὼ ἐν αὐτοῖς
  chosen: and I in them
  alternatives:
  - and that I may be in them
  lexicon: BDAG
  rationale: The Greek is elliptical, omitting a repeated verb. English can preserve
    the compact force by leaving the second clause verbless after 'may be in them,'
    while still clearly implying indwelling.
