theological_decisions:
- issue: Meaning of 'your name' in Johannine theology
  chosen_reading: Retain 'your name' in the main text without expanding it to 'your
    character' or 'your person.'
  alternative_readings:
  - your character
  - who you are
  rationale: The phrase carries theological depth, referring to the Father's revealed
    identity, but expanding it in translation would import interpretation into the
    text. Preserving 'name' keeps the biblical idiom and allows the theological resonance
    to remain implicit.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Final clause relation between divine love and Christ's indwelling
  chosen_reading: 'Render both elements coordinately: ''so that the love ... may be
    in them, and I in them.'''
  alternative_readings:
  - so that ... I may be in them
  - so that the love ... may be in them because I am in them
  rationale: The Greek presents two coordinated realities without explicitly subordinating
    one to the other. The translation preserves that structure rather than resolving
    the theological relationship more explicitly than the text does.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
