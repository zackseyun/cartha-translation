id: JHN.17.14
reference: John 17:14
source:
  edition: SBLGNT
  text: ἐγὼ δέδωκα αὐτοῖς τὸν λόγον σου, καὶ ὁ κόσμος ἐμίσησεν αὐτούς, ὅτι οὐκ εἰσὶν
    ἐκ τοῦ κόσμου καθὼς ἐγὼ οὐκ εἰμὶ ἐκ τοῦ κόσμου.
translation:
  text: I have given them your word, and the world has hated them because they are
    not from the world, just as I am not from the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the world.' The Greek expression literally uses 'from' and can denote
      source or belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: δέδωκα
  chosen: have given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Perfect tense in Greek indicates a completed action with continuing result;
    'have given' preserves that aspect better than simple past.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος here refers to the Father's communicated word given through Jesus.
    'Word' preserves Johannine diction and theological resonance better than the more
    interpretive 'message'.
- source_word: κόσμος
  chosen: world
  alternatives:
  - world-system
  lexicon: BDAG
  rationale: In John, κόσμος often denotes the human order in rebellion against God.
    'World' is the standard rendering and preserves the term's breadth; the fuller
    hostile sense is conveyed by context rather than expanded in translation.
- source_word: ἐμίσησεν
  chosen: has hated
  alternatives:
  - hated
  lexicon: BDAG
  rationale: Aorist can be rendered as simple past, but in this context English present
    perfect naturally conveys the world's settled hostility as a reality flowing from
    Jesus' giving them the word.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Causal sense fits the clause: the world''s hatred is grounded in the
    disciples'' not being from the world.'
- source_word: ἐκ τοῦ κόσμου
  chosen: from the world
  alternatives:
  - of the world
  - out of the world
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the world' is clear modern English and
    preserves the idea of origin or belonging without overreading.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks the comparison between the disciples'' relation
    to the world and Jesus'' relation to the world.'
