theological_decisions:
- issue: Relation of the disciples to 'the world' in comparison with Jesus
  chosen_reading: Render the comparison straightforwardly as 'they are not from the
    world, just as I am not from the world' without weakening or overexplaining it.
  alternative_readings:
  - they do not belong to the world, just as I do not belong to the world
  rationale: The verse presents a real analogy between Jesus and his disciples in
    relation to the world, but the translation should not flatten the Greek ἐκ into
    a purely sociological paraphrase nor import metaphysical claims beyond the text.
    'From the world' preserves the source-language tension and Johannine theology
    of origin/belonging.
  doctrine_reference: Preserve theological tension rather than resolve it.
