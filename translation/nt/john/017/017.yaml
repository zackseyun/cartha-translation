theological_decisions:
- issue: Whether to render ἀλήθεια qualitatively or definitively in the second clause
  chosen_reading: your word is truth
  alternative_readings:
  - your word is the truth
  rationale: The anarthrous predicate ἀλήθεια most naturally carries a qualitative
    sense. This preserves the force of Jesus' statement without importing an exclusivity
    claim beyond what the Greek form itself explicitly marks, while still fully affirming
    the truthfulness and divine character of God's word.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
