id: JHN.17.17
reference: John 17:17
source:
  edition: SBLGNT
  text: ἁγίασον αὐτοὺς ἐν τῇ ⸀ἀληθείᾳ· ὁ λόγος ὁ σὸς ἀλήθειά ἐστιν.
translation:
  text: Sanctify them in the truth; your word is truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your word is the truth.' The Greek predicate noun 'truth' lacks the
      article, which may emphasize quality ('is truth') rather than simple identification.
    reason: alternative_reading
lexical_decisions:
- source_word: ἁγίασον
  chosen: Sanctify
  alternatives:
  - Set apart
  - Make holy
  lexicon: BDAG
  rationale: Aorist active imperative of ἁγιάζω. 'Sanctify' preserves both the consecratory
    and holiness-related sense in Johannine usage, while remaining standard and theologically
    weighty. 'Set apart' is possible but can understate the moral/spiritual holiness
    dimension; 'make holy' is clear but less idiomatic here.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative plural pronoun referring to the disciples. Simple English
    object pronoun is sufficient and accurate.
- source_word: ἐν τῇ ἀληθείᾳ
  chosen: in the truth
  alternatives:
  - by the truth
  - in truth
  lexicon: BDAG
  rationale: The preposition ἐν with the dative most naturally yields 'in the truth'
    here, preserving the locative/instrumental breadth without over-specifying. 'By
    the truth' narrows the sense to instrument alone; 'in truth' risks sounding adverbial
    or indefinite, whereas the article points to a definite referent.
- source_word: λόγος
  chosen: word
  alternatives:
  - message
  - speech
  lexicon: BDAG
  rationale: In this context, λόγος refers to God's communicated word. 'Word' is the
    most natural and theologically resonant rendering in Johannine literature. 'Message'
    is possible but slightly more interpretive and less textually transparent.
- source_word: ὁ σὸς
  chosen: your
  alternatives:
  - yours
  lexicon: BDAG
  rationale: 'The possessive adjective with article modifies λόγος: literally ''the
    word, the one that is yours.'' Idiomatic English compresses this to ''your word''
    without loss of meaning.'
- source_word: ἀλήθειά ἐστιν
  chosen: is truth
  alternatives:
  - is the truth
  - is true
  lexicon: BDAG
  rationale: 'The predicate noun is anarthrous, so ''is truth'' best preserves the
    qualitative force: God''s word is characterized by truth, not merely one true
    thing among others. ''Is the truth'' is traditional and possible, but the Greek
    lacks the article here; ''is true'' weakens the substantive force of ἀλήθεια.'
