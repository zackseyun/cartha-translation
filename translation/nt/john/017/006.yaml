id: JHN.17.6
reference: John 17:6
source:
  edition: SBLGNT
  text: Ἐφανέρωσά σου τὸ ὄνομα τοῖς ἀνθρώποις οὓς ⸀ἔδωκάς μοι ἐκ τοῦ κόσμου. σοὶ ἦσαν
    κἀμοὶ αὐτοὺς ⸁ἔδωκας, καὶ τὸν λόγον σου τετήρηκαν.
translation:
  text: I have made your name known to the men whom you gave me out of the world.
    They were yours, and you gave them to me, and they have kept your word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I revealed your name.'
    reason: lexical_alternative
  - marker: b
    text: '''Your name'' refers to God''s revealed identity and character, not merely
      a spoken designation.'
    reason: cultural_note
  - marker: c
    text: Or 'to the people,' if taken generically; here the immediate referent is
      Jesus' male disciples.
    reason: lexical_alternative
  - marker: d
    text: Or 'from the world.'
    reason: lexical_alternative
  - marker: e
    text: Or 'they have obeyed your word'; the Greek more literally says 'they have
      kept your word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐφανέρωσά
  chosen: I have made known
  alternatives:
  - I revealed
  - I manifested
  lexicon: BDAG
  rationale: Aorist φανερόω denotes making something known or visible. 'Made known'
    is natural English and fits the object 'your name' without the awkwardness of
    'manifested,' while preserving the disclosure sense better than a looser paraphrase.
- source_word: τὸ ὄνομα
  chosen: your name
  alternatives:
  - who you are
  - your character
  lexicon: BDAG
  rationale: In Johannine usage, 'name' carries the sense of God's revealed identity
    and character, but the text explicitly says 'name.' The translation preserves
    the concrete wording and lets the theological depth remain implicit rather than
    paraphrasing it away.
- source_word: τοῖς ἀνθρώποις
  chosen: to the men
  alternatives:
  - to the people
  - to the humans
  lexicon: BDAG
  rationale: ἄνθρωποι can mean people/humans generically, but here the referent is
    Jesus' male disciples in the immediate context. Per the gender-accurate philosophy,
    'men' best matches the historical referent without unnecessary neutralization.
- source_word: οὓς ἔδωκάς μοι
  chosen: whom you gave me
  alternatives:
  - whom you have given me
  lexicon: BDAG
  rationale: The aorist ἔδωκας is most straightforwardly rendered as a simple past
    in this clause. English relative clause style favors 'whom you gave me' as a clear
    and direct equivalent.
- source_word: ἐκ τοῦ κόσμου
  chosen: out of the world
  alternatives:
  - from the world
  lexicon: BDAG
  rationale: ἐκ regularly means 'out of' and here likely conveys selection from within
    the world-order. 'Out of the world' preserves that nuance more clearly than the
    flatter 'from the world.'
- source_word: σοὶ ἦσαν
  chosen: They were yours
  alternatives:
  - They belonged to you
  lexicon: BDAG
  rationale: This clause is terse and possessive. 'They were yours' closely reflects
    the Greek structure and keeps the solemn simplicity of the prayer.
- source_word: κἀμοὶ αὐτοὺς ἔδωκας
  chosen: and you gave them to me
  alternatives:
  - and to me you gave them
  lexicon: BDAG
  rationale: The compound κἀμοί means 'and to me/also to me.' Standard English word
    order is preferable in the main text, while retaining the sense that the Father
    gave these people to the Son.
- source_word: τὸν λόγον σου
  chosen: your word
  alternatives:
  - your message
  - your teaching
  lexicon: BDAG
  rationale: λόγος can mean word, message, or teaching. In Johannine theology 'word'
    is an important term, and here 'your word' preserves both lexical consistency
    and theological resonance without overinterpreting.
- source_word: τετήρηκαν
  chosen: they have kept
  alternatives:
  - they have obeyed
  - they have guarded
  lexicon: BDAG
  rationale: Perfect τηρέω indicates an action with abiding result. 'Have kept' preserves
    both the verbal aspect and the semantic range of observing/keeping, whereas 'obeyed'
    is interpretive and narrower.
