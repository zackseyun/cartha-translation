theological_decisions:
- issue: Meaning of 'your name' in Johannine theology
  chosen_reading: Retain the literal expression 'your name' in the main text
  alternative_readings:
  - Render interpretively as 'who you are'
  - Render interpretively as 'your character'
  rationale: The phrase refers to the Father's revealed identity, character, and presence,
    but the Greek text uses the concrete term 'name.' Preserving the literal wording
    maintains biblical-theological depth without collapsing it into a paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referent and gender of τοῖς ἀνθρώποις
  chosen_reading: Translate as 'the men'
  alternative_readings:
  - the people
  - those people
  rationale: Although ἄνθρωποι can be generic, the immediate referent is the circle
    of disciples Jesus has been speaking about, who in this setting are male. This
    follows the gender-accurate principle rather than adopting a generic rendering.
  doctrine_reference: Translation philosophy §4
- issue: Implication of divine giving in election/discipleship
  chosen_reading: Preserve the wording of the Father giving people to the Son without
    importing a denominational framework
  alternative_readings:
  - A specifically Reformed reading of unconditional election
  - A specifically Arminian reading centered on foreknown response
  rationale: The verse clearly states that the Father gave these people to the Son,
    but it does not here explain the full mechanism or doctrinal system behind that
    giving. The translation therefore preserves the text's wording and theological
    tension without resolving later debates.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
