theological_decisions:
- issue: Force of the comparison in 'you loved them just as you loved me'
  chosen_reading: 'Render the comparison directly without softening or qualifying
    it: ''just as you loved me.'''
  alternative_readings:
  - '''as you loved me'''
  - interpretively softened renderings such as 'with the same kind of love'
  rationale: The Greek καθὼς naturally introduces a real comparison. The translation
    should preserve the theological weight of the Father's love for believers in relation
    to his love for the Son without reducing it to a vague similarity or expanding
    it into a doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of τετελειωμένοι in context
  chosen_reading: Express completion toward unity rather than absolute sinless perfection.
  alternative_readings:
  - '''made perfect in one'''
  - '''completed in unity'''
  rationale: In Johannine context, τελειόω often carries the sense of bringing to
    completion or full maturity. 'Perfected into one' preserves the lexical form while
    avoiding an overreading that would suggest the text teaches believers have already
    attained absolute perfection.
  doctrine_reference: Original-language primacy over translation tradition; Preserve
    theological tension rather than resolve it.
