id: JHN.17.23
reference: John 17:23
source:
  edition: SBLGNT
  text: ἐγὼ ἐν αὐτοῖς καὶ σὺ ἐν ἐμοί, ἵνα ὦσιν τετελειωμένοι εἰς ἕν, ⸀ἵνα γινώσκῃ
    ὁ κόσμος ὅτι σύ με ἀπέστειλας καὶ ἠγάπησας αὐτοὺς καθὼς ἐμὲ ἠγάπησας.
translation:
  text: I in them and you in me, so that they may be perfected into one, so that the
    world may know that you sent me and loved them just as you loved me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made perfect into one' or 'brought to completion into one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτοῖς / ἐν ἐμοί
  chosen: in them / in me
  alternatives:
  - among them / in me
  lexicon: BDAG
  rationale: Retains the Johannine indwelling language with the preposition 'in,'
    which is theologically and literarily significant in this Gospel. 'Among' would
    weaken the mutual indwelling sense.
- source_word: τετελειωμένοι
  chosen: perfected
  alternatives:
  - made perfect
  - brought to completion
  - completed
  lexicon: BDAG
  rationale: The perfect passive participle of τελειόω conveys a state resulting from
    completed action. 'Perfected' preserves both the completion sense and the transformative
    nuance without implying sinless moral perfection as the only idea.
- source_word: εἰς ἕν
  chosen: into one
  alternatives:
  - in one
  - to one
  - as one
  lexicon: BDAG
  rationale: '''Into one'' best reflects εἰς with the accusative, expressing movement/result
    toward unity rather than merely describing an existing state.'
- source_word: γινώσκῃ
  chosen: may know
  alternatives:
  - may come to know
  - may recognize
  lexicon: BDAG
  rationale: A straightforward rendering of the present subjunctive after ἵνα. 'May
    know' is idiomatic and preserves the purpose clause; 'come to know' is possible
    but slightly more interpretive.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world-system
  - the people of the world
  lexicon: BDAG
  rationale: Standard Johannine usage is best preserved by 'the world.' More interpretive
    expansions import theological explanation into the text.
- source_word: ἀπέστειλας
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: '''Sent'' is the natural and consistent rendering of ἀποστέλλω in John,
    preserving the Father''s mission of the Son without unnecessary elaboration.'
- source_word: ἠγάπησας
  chosen: loved
  alternatives: []
  lexicon: BDAG
  rationale: Follows the default rendering of ἀγαπάω/ἀγάπη as 'love' per doctrine
    guidance and preserves the lexical repetition in the verse.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: BDAG
  rationale: '''Just as'' clearly marks the comparison while remaining natural English.
    It preserves the force of the comparison without overexplaining its extent.'
