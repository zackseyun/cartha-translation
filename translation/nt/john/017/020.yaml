theological_decisions:
- issue: Scope of Jesus' prayer beyond the immediate disciples
  chosen_reading: The verse includes future believers who come to faith through the
    apostles' witness.
  alternative_readings:
  - The verse refers only to a narrower circle already beginning to believe through
    the disciples.
  rationale: The participle τῶν πιστευόντων with διὰ τοῦ λόγου αὐτῶν naturally extends
    beyond 'these' to others who will believe through apostolic testimony. The translation
    leaves the temporal scope implicit rather than adding 'will' to avoid importing
    more than the Greek states, while still allowing the broader ecclesial sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
