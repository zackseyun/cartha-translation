id: JHN.17.20
reference: John 17:20
source:
  edition: SBLGNT
  text: Οὐ περὶ τούτων δὲ ἐρωτῶ μόνον, ἀλλὰ καὶ περὶ τῶν πιστευόντων διὰ τοῦ λόγου
    αὐτῶν εἰς ἐμέ,
translation:
  text: I do not ask concerning these only, but also concerning those who believe
    in me through their word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through their message.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'those believing in me through their word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτῶ
  chosen: I ask
  alternatives:
  - I pray
  - I request
  lexicon: BDAG
  rationale: In Johannine context ἐρωτάω commonly denotes Jesus' asking the Father.
    'Ask' is the most transparent and least interpretively loaded English equivalent;
    'pray' is possible but adds devotional coloring beyond the verb's basic sense.
- source_word: περὶ τούτων
  chosen: concerning these
  alternatives:
  - for these
  - about these
  lexicon: BDAG
  rationale: περί with the genitive here marks reference, 'concerning/about.' 'Concerning
    these' preserves the formal structure and likely points back to the immediate
    disciples without over-specifying in the translation.
- source_word: μόνον
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: μόνον limits the scope of Jesus' request. 'Only' is the natural modern
    equivalent.
- source_word: ἀλλὰ καὶ
  chosen: but also
  alternatives:
  - but even
  - but
  lexicon: BDAG
  rationale: The correlative contrast extends the prayer beyond the immediate group.
    'But also' preserves both contrast and addition.
- source_word: τῶν πιστευόντων
  chosen: those who believe
  alternatives:
  - those who are believing
  - the believers
  lexicon: BDAG
  rationale: The present participle is substantival. 'Those who believe' is idiomatic
    and preserves the verbal force better than the more static 'believers.'
- source_word: διὰ τοῦ λόγου αὐτῶν
  chosen: through their word
  alternatives:
  - through their message
  - through what they say
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'account.' 'Word' keeps Johannine
    resonance and formal closeness, while still making sense in English. The possessive
    'their' refers to the disciples' witness.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with πιστεύω in John it is conventionally
    and idiomatically rendered 'believe in.' This preserves the established Johannine
    construction without flattening the personal object of faith.
- source_word: Οὐ ... μόνον
  chosen: I do not ask ... only
  alternatives:
  - I am not asking only
  lexicon: BDAG
  rationale: The present tense is best rendered as a simple present in English. The
    negation-plus-limiter structure is preserved closely to reflect the Greek emphasis.
