id: JHN.17.18
reference: John 17:18
source:
  edition: SBLGNT
  text: καθὼς ἐμὲ ἀπέστειλας εἰς τὸν κόσμον, κἀγὼ ἀπέστειλα αὐτοὺς εἰς τὸν κόσμον·
translation:
  text: Just as you sent me into the world, I also sent them into the world.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  - Just as
  lexicon: BDAG
  rationale: Introduces a comparison between the Father's sending of Jesus and Jesus'
    sending of the disciples. 'Just as' brings out the comparative force clearly in
    natural English.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Direct object of ἀπέστειλας; straightforwardly rendered 'me.' The emphatic
    position is adequately conveyed by normal English word order in this context.
- source_word: ἀπέστειλας
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: Aorist of ἀποστέλλω, commonly 'send.' 'Commissioned' captures part of
    the sense but is too interpretive here; 'sent' preserves both the literal action
    and Johannine mission language.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - to the world
  lexicon: BDAG
  rationale: εἰς with accusative naturally indicates movement into. In Johannine usage
    κόσμος often denotes the human world-order in which Jesus and the disciples carry
    out their mission; 'into the world' preserves both spatial and theological resonance.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - and I
  - I too
  lexicon: BDAG
  rationale: Contraction of καὶ ἐγώ. 'I also' best reflects the additive force while
    reading smoothly in English and maintaining the parallel with the first clause.
- source_word: ἀπέστειλα
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: Rendered consistently with ἀπέστειλας to preserve the deliberate parallelism
    between the Father's sending of the Son and the Son's sending of the disciples.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring to the disciples in context; 'them' is the natural
    English equivalent.
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: κόσμος is a key Johannine term. 'World' is the standard and contextually
    appropriate rendering, preserving the theological tension of mission into a realm
    often opposed to God without over-interpreting it.
