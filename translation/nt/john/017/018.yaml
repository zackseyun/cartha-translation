theological_decisions:
- issue: Mission parallel between the Father's sending of the Son and the Son's sending
    of the disciples
  chosen_reading: Preserve the verbal parallel with 'sent ... sent' rather than varying
    the English gloss.
  alternative_readings:
  - sent ... commissioned
  - sent ... dispatched
  rationale: The verse emphasizes analogy, not identity of status. Using the same
    English verb in both clauses preserves the textual parallel while avoiding doctrinal
    overstatement about the disciples' mission being identical in nature to the Son's
    unique mission.
  doctrine_reference: Translation philosophy §5; Affirmations on historic Christology
