theological_decisions:
- issue: Meaning of 'the world' in Johannine theology
  chosen_reading: Retain 'the world' without interpretive expansion in the main text.
  alternative_readings:
  - the world system
  - the present fallen order
  rationale: John often uses κόσμος with theological depth, but the verse itself does
    not require an expanded paraphrase. Preserving the simple term maintains Johannine
    tension and avoids importing a narrower doctrinal gloss than the text states.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it.'
