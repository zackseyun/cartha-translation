id: JHN.17.16
reference: John 17:16
source:
  edition: SBLGNT
  text: ἐκ τοῦ κόσμου οὐκ εἰσὶν καθὼς ἐγὼ ⸂οὐκ εἰμὶ ἐκ τοῦ κόσμου⸃.
translation:
  text: They are not from the world, just as I am not from the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the world.' The Greek phrase uses 'from' (ἐκ), which can express
      source, origin, or belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: With κόσμος, ἐκ marks source/origin or sphere of derivation. 'From' is
    idiomatic modern English and preserves the sense that they do not derive their
    identity from the world.
- source_word: κόσμου
  chosen: the world
  alternatives:
  - world order
  - the world system
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often denotes the human world in alienation
    from God, but here the simple phrase 'from the world' is best preserved in the
    main text without importing an interpretive expansion. The theological nuance
    is carried by context.
- source_word: οὐκ εἰσὶν
  chosen: are not
  lexicon: BDAG
  rationale: Straightforward negated present of εἰμί. English present 'are not' matches
    the Greek assertion.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: καθώς introduces comparison. 'Just as' clearly signals the parallel between
    the disciples and Jesus and is natural contemporary English.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained in English because it contributes to
    the comparison and emphasis in the clause.
- source_word: οὐκ εἰμὶ
  chosen: am not
  lexicon: BDAG
  rationale: Straightforward negated present of εἰμί in the first person; English
    present preserves the force.
- source_word: ἐκ τοῦ κόσμου
  chosen: from the world
  alternatives:
  - of the world
  - out of the world
  lexicon: BDAG
  rationale: Repeated phrase kept consistently in both clauses. 'Of the world' is
    traditional in English and captures belonging, but 'from the world' more directly
    reflects ἐκ and preserves the source/origin nuance of the Greek.
