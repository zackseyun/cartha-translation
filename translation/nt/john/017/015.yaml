theological_decisions:
- issue: Whether τοῦ πονηροῦ is impersonal ('evil') or personal ('the evil one')
  chosen_reading: the evil one
  alternative_readings:
  - evil
  rationale: The Greek form is ambiguous, but Johannine usage and the immediate context
    of divine protection favor a personal referent. To preserve theological tension
    rather than over-resolve it, the impersonal alternative is retained in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
