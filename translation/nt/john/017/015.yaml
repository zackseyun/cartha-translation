id: JHN.17.15
reference: John 17:15
source:
  edition: SBLGNT
  text: οὐκ ἐρωτῶ ἵνα ἄρῃς αὐτοὺς ἐκ τοῦ κόσμου ἀλλ’ ἵνα τηρήσῃς αὐτοὺς ἐκ τοῦ πονηροῦ.
translation:
  text: I am not asking that you take them out of the world, but that you keep them
    from the evil one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'keep them from evil.' The Greek τοῦ πονηροῦ can mean either 'the evil
      one' or 'evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτῶ
  chosen: I am asking
  alternatives:
  - I ask
  - I pray
  lexicon: BDAG
  rationale: Present indicative first singular; 'I am asking' reflects the immediate,
    ongoing sense in Jesus' prayer. 'Pray' is possible in context, but 'ask' more
    directly represents the lexical meaning without importing a more ecclesiastical
    register.
- source_word: ἄρῃς
  chosen: take
  alternatives:
  - remove
  - lift
  lexicon: BDAG
  rationale: From αἴρω, here in the sense of taking away/removing. 'Take ... out of'
    is idiomatic English and matches the construction with ἐκ τοῦ κόσμου.
- source_word: κόσμου
  chosen: world
  alternatives:
  - world order
  - human society
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often carries the sense of the world in its
    fallen human order, but 'world' is the natural and sufficiently broad English
    rendering here.
- source_word: τηρήσῃς
  chosen: keep
  alternatives:
  - guard
  - preserve
  - protect
  lexicon: BDAG
  rationale: τηρέω commonly means keep, guard, preserve. 'Keep' is concise, idiomatic,
    and preserves the verbal link to Johannine usage without over-specifying the mode
    of protection.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  - away from
  lexicon: BDAG
  rationale: With τηρήσῃς ... ἐκ, the sense is protection from or preservation from.
    Rendering ἐκ as 'from' in the second clause gives natural English while preserving
    the contrast with 'out of the world' in the first clause.
- source_word: τοῦ πονηροῦ
  chosen: the evil one
  alternatives:
  - evil
  - the wicked one
  lexicon: BDAG
  rationale: The genitive singular adjective with article can be either neuter ('evil')
    or masculine ('the evil one'). In Johannine usage, the personal sense referring
    to Satan is strong (cf. 1 John 5:19), and the parallel with being kept from hostile
    personal evil fits the context. Because the phrase is genuinely ambiguous, the
    alternative 'evil' is preserved in a footnote.
