theological_decisions:
- issue: The statement 'does not believe in me, but in the one who sent me' could
    be misconstrued as diminishing faith in Jesus.
  chosen_reading: The wording is retained as a rhetorical/theological assertion that
    faith in Jesus is inseparable from and directed toward the Father who sent him,
    not as a denial of Jesus' proper objecthood of faith.
  alternative_readings:
  - A looser paraphrase such as 'does not believe only in me'
  - An interpretive rendering specifying 'the Father' in the main text
  rationale: The Greek text does not include 'only,' so adding it would resolve the
    tension rather than preserve it. In Johannine theology, Jesus' unity with the
    Father explains the statement; the translation should preserve that tension without
    doctrinally flattening it.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
