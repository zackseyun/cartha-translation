id: JHN.12.44
reference: John 12:44
source:
  edition: SBLGNT
  text: Ἰησοῦς δὲ ἔκραξεν καὶ εἶπεν· Ὁ πιστεύων εἰς ἐμὲ οὐ πιστεύει εἰς ἐμὲ ἀλλὰ εἰς
    τὸν πέμψαντά με,
translation:
  text: But Jesus cried out and said, “The one who believes in me does not believe
    in me, but in the one who sent me,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Whoever believes in me.”
    reason: lexical_alternative
  - marker: b
    text: This does not deny that Jesus is the proper object of faith; it expresses
      that believing in him is inseparable from believing in the Father who sent him.
    reason: cross_reference
lexical_decisions:
- source_word: ἔκραξεν
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: BDAG
  rationale: κράζω denotes a loud, public utterance. “Cried out” preserves the force
    and solemnity better than the flatter “said loudly,” while remaining natural English.
- source_word: Ὁ πιστεύων
  chosen: The one who believes
  alternatives:
  - Whoever believes
  - The person believing
  lexicon: BDAG
  rationale: The articular present participle has a generic substantive force. “The
    one who believes” closely reflects the Greek form while remaining readable. It
    also preserves the ongoing/generic sense without overinterpreting aspect.
- source_word: πιστεύων / πιστεύει
  chosen: believes
  alternatives:
  - has faith in
  - trusts
  lexicon: BDAG
  rationale: For πιστεύω with εἰς, “believe in” is the most established and accurate
    rendering in Johannine usage. Although “trust in” is possible, “believe in” better
    preserves the repeated verbal pattern in this verse and aligns with the default
    handling of the pistis word-group.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: With πιστεύω, εἰς is idiomatically rendered “in,” expressing personal
    reliance directed toward Jesus. A more literal “into” would be unnatural in English
    and would not improve transparency here.
- source_word: ἀλλὰ εἰς τὸν πέμψαντά με
  chosen: but in the one who sent me
  alternatives:
  - but in him who sent me
  - but in the one having sent me
  lexicon: BDAG
  rationale: The contrastive ἀλλά sets belief in Jesus in relation to belief in the
    Father. “The one who sent me” preserves the participial construction and keeps
    the referent slightly indirect, as in the Greek, rather than prematurely specifying
    “the Father” in the main text.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild transition with some contrast to the preceding context.
    “But” best captures the discourse movement in idiomatic English.
