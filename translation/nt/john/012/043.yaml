theological_decisions:
- issue: Meaning of δόξα in the human/God contrast
  chosen_reading: glory
  alternative_readings:
  - praise
  - approval
  - honor
  rationale: The verse contrasts human and divine esteem in a way that participates
    in John's broader theology of glory. Rendering δόξα as 'glory' preserves that
    theological and lexical continuity, while alternatives are possible interpretive
    glosses but narrower than the source text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering ἀνθρώπων with gender-accurate English
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The Greek is grammatically masculine plural and generically refers to
    humans. In keeping with the gender-accurate policy, 'men' is retained as representative
    usage matching the source form and traditional idiom; an inclusive alternative
    is preserved in a footnote because modern readers may otherwise hear it as male-exclusive.
  doctrine_reference: Translation philosophy §4
