id: JHN.12.43
reference: John 12:43
source:
  edition: SBLGNT
  text: ἠγάπησαν γὰρ τὴν δόξαν τῶν ἀνθρώπων μᾶλλον ἤπερ τὴν δόξαν τοῦ θεοῦ.
translation:
  text: For they loved the glory of men rather than the glory of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the glory of people' / 'human approval.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάπησαν
  chosen: loved
  alternatives:
  - preferred
  - were fond of
  lexicon: BDAG
  rationale: Aorist active indicative, third plural of ἀγαπάω. 'Loved' preserves the
    lexical connection to ἀγάπη-family language and reflects the strong volitional
    affection implied, stronger and more direct than merely 'preferred,' though the
    comparative phrase supplies the preference nuance.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' is a natural
    formal-causal connector in English and preserves the discourse linkage without
    over-paraphrasing.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - praise
  - honor
  - approval
  lexicon: BDAG
  rationale: δόξα can denote honor, praise, reputation, or glory. Here the contrast
    is between what comes from humans and what comes from God. 'Glory' preserves the
    repeated lexical form and Johannine theological resonance, while narrower options
    like 'approval' interpret the term more specifically than the Greek requires.
- source_word: τῶν ἀνθρώπων
  chosen: of men
  alternatives:
  - from people
  - of people
  - from men
  lexicon: BDAG
  rationale: The genitive with δόξα can be understood as sourced from or belonging
    to humans. 'Of men' is concise and preserves the Greek structure. Per the gender-accurate
    policy, ἄνθρωποι here refers to human beings generally; 'men' reflects traditional
    representative usage, though 'people' is a possible contextual alternative.
- source_word: μᾶλλον ἤπερ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: The comparative pair marks preference between two objects. 'Rather than'
    is idiomatic modern English and clearly expresses the contrast.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: As with 'of men,' the genitive may imply source or possession. 'Of God'
    preserves the parallelism of the Greek and leaves the semantic range appropriately
    broad.
