theological_decisions:
- issue: Rendering κύριος in the Psalm citation/acclamation
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek text reads κυρίου, and the project's default rendering for
    κύριος is 'Lord.' Because this line echoes Psalm 118:26, some English translations
    use 'LORD' to signal the divine name behind the Hebrew source, but the present
    Greek wording is best represented as 'Lord' in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Messianic and royal force of the crowd's acclamation
  chosen_reading: Retain the royal title 'the King of Israel' without softening or
    expanding it
  alternative_readings:
  - the king of Israel
  - Israel's king
  rationale: The verse explicitly presents Jesus in royal-messianic terms. The translation
    preserves the title as stated without importing additional doctrinal explanation
    beyond the text itself.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1 and §3
