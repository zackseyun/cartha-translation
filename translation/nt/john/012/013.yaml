id: JHN.12.13
reference: John 12:13
source:
  edition: SBLGNT
  text: ἔλαβον τὰ βαΐα τῶν φοινίκων καὶ ἐξῆλθον εἰς ὑπάντησιν αὐτῷ, καὶ ⸀ἐκραύγαζον·
    Ὡσαννά, εὐλογημένος ὁ ἐρχόμενος ἐν ὀνόματι κυρίου, ⸂καὶ ὁ⸃ βασιλεὺς τοῦ Ἰσραήλ.
translation:
  text: They took the branches of the palm trees and went out to meet him, and they
    were crying out, “Hosanna! Blessed is the one who comes in the name of the Lord,
    even the King of Israel!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hosanna is a Hebrew-derived acclamation meaning 'save now' or 'please save,'
      which by this period also functioned as a shout of praise.
    reason: lexical_alternative
  - marker: b
    text: This line echoes Psalm 118:26.
    reason: cross_reference
  - marker: c
    text: Or 'and the King of Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: βαΐα τῶν φοινίκων
  chosen: the branches of the palm trees
  alternatives:
  - palm branches
  - branches from the palm trees
  lexicon: BDAG
  rationale: βάϊον refers to a branch, especially of a palm in this context, and τῶν
    φοινίκων specifies the kind of tree. 'The branches of the palm trees' preserves
    both nouns explicitly rather than compressing to the traditional 'palm branches,'
    while remaining natural English.
- source_word: ἐξῆλθον εἰς ὑπάντησιν αὐτῷ
  chosen: went out to meet him
  alternatives:
  - went out for a meeting with him
  - went out to welcome him
  lexicon: BDAG
  rationale: ὑπάντησις commonly denotes going out to meet someone. 'Went out to meet
    him' is the most direct and idiomatic rendering; 'welcome' would add an interpretive
    nuance not strictly required by the phrase.
- source_word: ἐκραύγαζον
  chosen: were crying out
  alternatives:
  - cried out
  - kept shouting
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action. 'Were crying
    out' preserves that aspect better than the simple past 'cried out,' while avoiding
    over-interpretation.
- source_word: Ὡσαννά
  chosen: Hosanna
  alternatives:
  - Save now!
  - Please save!
  lexicon: BDAG
  rationale: This liturgical acclamation is best preserved by transliteration in English
    because it functions as a recognized shout of praise while retaining its Hebrew
    background. A lexical alternative is worth preserving in a footnote because the
    underlying sense relates to a plea for salvation.
- source_word: εὐλογημένος ὁ ἐρχόμενος
  chosen: Blessed is the one who comes
  alternatives:
  - Blessed is he who comes
  - Blessed is the coming one
  lexicon: BDAG
  rationale: This echoes Psalm 118:26. 'The one who comes' is natural modern English
    and preserves the substantival participle without archaic masculine generic wording.
    'The coming one' is less idiomatic here.
- source_word: ἐν ὀνόματι κυρίου
  chosen: in the name of the Lord
  alternatives:
  - with the authority of the Lord
  - in the Lord's name
  lexicon: BDAG
  rationale: This is a standard biblical expression and should be preserved formally.
    κύριος is rendered 'Lord' in keeping with the project's default for Kyrios and
    the Psalmic allusion.
- source_word: καὶ ὁ βασιλεὺς τοῦ Ἰσραήλ
  chosen: even the King of Israel
  alternatives:
  - and the King of Israel
  - indeed the King of Israel
  lexicon: BDAG
  rationale: καί here can be rendered simply 'and,' but in English 'even' smoothly
    apposes and heightens the climactic royal title without implying a separate sentence
    element. This captures the acclamatory force in context.
