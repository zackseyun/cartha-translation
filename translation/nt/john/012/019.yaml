id: JHN.12.19
reference: John 12:19
source:
  edition: SBLGNT
  text: οἱ οὖν Φαρισαῖοι εἶπαν πρὸς ἑαυτούς· Θεωρεῖτε ὅτι οὐκ ὠφελεῖτε οὐδέν· ἴδε
    ὁ ⸀κόσμος ὀπίσω αὐτοῦ ἀπῆλθεν.
translation:
  text: So the Pharisees said to one another, “You see that you are accomplishing
    nothing. Look—the world has gone after him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone has gone after him.' The Greek says 'the world,' likely as
      rhetorical exaggeration.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential or consequential transition from the preceding scene.
    'So' is natural modern English and preserves the discourse connection without
    sounding overly formal.
- source_word: πρὸς ἑαυτούς
  chosen: to one another
  alternatives:
  - among themselves
  - to themselves
  lexicon: BDAG
  rationale: 'The reciprocal sense is idiomatic here: the Pharisees are speaking among
    themselves as a group. ''To one another'' is clearer in English than the more
    literal ''to themselves.'''
- source_word: Θεωρεῖτε
  chosen: You see
  alternatives:
  - See
  - You observe
  - You realize
  lexicon: BDAG
  rationale: Present indicative plural, likely addressed by the Pharisees to each
    other in a rhetorical, exasperated statement. 'You see' captures the force better
    than an imperative-like 'See.'
- source_word: οὐκ ὠφελεῖτε οὐδέν
  chosen: you are accomplishing nothing
  alternatives:
  - you are gaining nothing
  - you are helping nothing
  - you are profiting nothing
  lexicon: BDAG
  rationale: The idiom conveys futility of their efforts against Jesus. 'Accomplishing
    nothing' communicates the practical sense in clear modern English better than
    the more wooden 'profiting nothing.'
- source_word: ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: An attention-getting particle/interjection. 'Look' is readable modern
    English and preserves the abrupt rhetorical force.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - everyone
  - the whole world
  - the crowd
  lexicon: BDAG
  rationale: κόσμος is used hyperbolically here, not as a literal statement about
    every human being. The main text keeps the lexical form 'the world,' while interpretation
    of the hyperbole is left to the reader rather than flattened into 'everyone.'
- source_word: ὀπίσω αὐτοῦ
  chosen: after him
  alternatives:
  - behind him
  - following him
  lexicon: BDAG
  rationale: Idiomatic expression for going after or following someone. 'After him'
    preserves the Greek image and works naturally with the verb 'has gone.'
- source_word: ἀπῆλθεν
  chosen: has gone
  alternatives:
  - went
  - has departed
  lexicon: BDAG
  rationale: 'Aorist in narrative can be rendered as simple past, but English present
    perfect here conveys the Pharisees'' focus on the now-evident result: the world
    has gone after Jesus.'
