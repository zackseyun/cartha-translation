theological_decisions:
- issue: Scope of κόσμος in the Pharisees' statement
  chosen_reading: Retain 'the world' as hyperbolic speech rather than interpretively
    narrowing it in the main text.
  alternative_readings:
  - everyone has gone after him
  - the whole crowd has gone after him
  rationale: The speakers are using rhetorical exaggeration in frustration. Preserving
    'the world' keeps the Greek wording and Johannine resonance without making a doctrinal
    claim about universal discipleship.
  doctrine_reference: Translation philosophy §1, §3, §6
