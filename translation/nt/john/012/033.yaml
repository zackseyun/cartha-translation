id: JHN.12.33
reference: John 12:33
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἔλεγεν σημαίνων ποίῳ θανάτῳ ἤμελλεν ἀποθνῄσκειν.
translation:
  text: Now he was saying this to signify what kind of death he was about to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by what kind of death.' The Greek expression can emphasize the manner
      of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - these things
  - it
  lexicon: BDAG
  rationale: Neuter singular demonstrative referring to Jesus' preceding statement;
    'this' is the natural English equivalent.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is mildly connective or transitional rather than strongly adversative.
    'Now' signals narrative transition in readable English without overstating contrast.
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or contextual past action. 'Was
    saying' preserves the aspect better than simple 'said,' while remaining natural.
- source_word: σημαίνων
  chosen: to signify
  alternatives:
  - signifying
  - indicating
  - showing
  lexicon: BDAG
  rationale: 'Present participle expressing manner or attendant circumstance: he said
    this while indicating/signifying. ''To signify'' preserves the semantic nuance
    of making something known by indication and echoes Johannine usage.'
- source_word: ποίῳ θανάτῳ
  chosen: what kind of death
  alternatives:
  - by what kind of death
  - what death
  lexicon: BDAG
  rationale: The dative with ποίῳ specifies the manner or kind of death rather than
    merely the fact of death. 'What kind of death' is idiomatic and accurate; 'by
    what kind of death' is possible but slightly heavier in English.
- source_word: ἤμελλεν
  chosen: was about to
  alternatives:
  - was going to
  - was destined to
  lexicon: BDAG
  rationale: μέλλω commonly denotes imminence or intended future. 'Was about to' is
    a straightforward rendering here. 'Was destined to' would import a stronger theological
    nuance than the verb itself requires in this context.
- source_word: ἀποθνῄσκειν
  chosen: die
  alternatives:
  - be dying
  lexicon: BDAG
  rationale: Complementary infinitive with ἤμελλεν. English idiom requires the simple
    infinitive 'die'.
