theological_decisions:
- issue: Whether to make explicit that the verse refers to crucifixion
  chosen_reading: 'Retain the text''s indirect wording: ''what kind of death he was
    about to die'''
  alternative_readings:
  - what kind of death he was about to die on a cross
  - how he was going to be executed
  rationale: The evangelist states that Jesus' words signified the manner of his death
    without naming crucifixion in this verse. Making crucifixion explicit in the main
    text would interpret correctly from context but go beyond the wording here. The
    translation preserves the narrative's indirectness.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
