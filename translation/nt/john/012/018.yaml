theological_decisions:
- issue: Rendering Johannine σημεῖον
  chosen_reading: sign
  alternative_readings:
  - miracle
  rationale: John's Gospel uses σημεῖον to emphasize the revelatory significance of
    Jesus's works, not merely their wondrous character. 'Sign' preserves that theological
    nuance without importing additional interpretation.
  doctrine_reference: Translation philosophy §1, §5
