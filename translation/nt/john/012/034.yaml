theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is clearly titular here ('the Messiah remains forever'), so
    the doctrinal default favors 'Messiah' to preserve the Jewish messianic context.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Meaning of ὑψωθῆναι in Johannine usage
  chosen_reading: be lifted up
  alternative_readings:
  - be exalted
  - be raised up
  rationale: The Gospel of John uses ὑψόω with layered meaning, referring both to
    Jesus' being lifted up on the cross and to exaltation. The translation preserves
    this tension rather than collapsing it into a single interpretive sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
