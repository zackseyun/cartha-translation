id: JHN.12.34
reference: John 12:34
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀οὖν αὐτῷ ὁ ὄχλος· Ἡμεῖς ἠκούσαμεν ἐκ τοῦ νόμου ὅτι ὁ χριστὸς μένει
    εἰς τὸν αἰῶνα, καὶ πῶς ⸂λέγεις σὺ⸃ ⸀ὅτι δεῖ ὑψωθῆναι τὸν υἱὸν τοῦ ἀνθρώπου; τίς
    ἐστιν οὗτος ὁ υἱὸς τοῦ ἀνθρώπου;
translation:
  text: So the crowd answered him, "We have heard from the Law that the Messiah remains
    forever, and how can you say that the Son of Man must be lifted up? Who is this
    Son of Man?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "be exalted." In John, "lifted up" can carry both the sense of being
      raised up physically and being exalted.
    reason: lexical_alternative
  - marker: b
    text: Greek "the Christ"; here rendered "the Messiah" because the term functions
      as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη οὖν
  chosen: So ... answered
  alternatives:
  - Then ... answered
  - Therefore ... answered
  lexicon: BDAG
  rationale: οὖν marks discourse continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding wooden.
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος in John commonly refers to the gathered crowd. 'Crowd' is idiomatic
    and suitably neutral.
- source_word: Ἡμεῖς ἠκούσαμεν
  chosen: We have heard
  alternatives:
  - We heard
  lexicon: BDAG
  rationale: Although ἠκούσαμεν is aorist, English present perfect naturally conveys
    received tradition with present relevance in this context.
- source_word: ἐκ τοῦ νόμου
  chosen: from the Law
  alternatives:
  - from the law
  - in the Law
  - from Scripture
  lexicon: BDAG
  rationale: νόμος here likely refers broadly to the scriptural witness as heard in
    Jewish teaching, but 'the Law' preserves the Greek expression and its Jewish scriptural
    framing better than the broader 'Scripture'.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ'
    to preserve the Hebraic messianic sense.
- source_word: μένει εἰς τὸν αἰῶνα
  chosen: remains forever
  alternatives:
  - abides forever
  - remains for the age
  lexicon: BDAG
  rationale: μένει is durative; εἰς τὸν αἰῶνα is the standard idiom for enduring forever.
    'Remains forever' is clear modern English.
- source_word: πῶς λέγεις σὺ
  chosen: how can you say
  alternatives:
  - how do you say
  - how is it that you say
  lexicon: BDAG
  rationale: The question is incredulous rather than merely informational. 'Can' brings
    out the challenge implied in πῶς in context; σὺ is reflected by the direct address
    'you' without overemphasis.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary that
  - it is necessary for
  lexicon: BDAG
  rationale: δεῖ expresses necessity. 'Must' is the most natural concise rendering.
- source_word: ὑψωθῆναι
  chosen: be lifted up
  alternatives:
  - be exalted
  - be raised up
  lexicon: BDAG
  rationale: 'In John this verb carries deliberate double meaning: physical lifting
    up in crucifixion and exaltation. ''Be lifted up'' preserves that theological
    tension better than resolving it to either sense alone.'
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and semantically appropriate rendering of the
    titular expression, preserving both its idiomatic force and Danielic resonance.
- source_word: τίς ἐστιν οὗτος ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: Who is this Son of Man?
  alternatives:
  - Who is this son of man?
  lexicon: BDAG
  rationale: Capitalization reflects recognition that the phrase functions as Jesus'
    self-designation/title in context, not a generic human reference.
