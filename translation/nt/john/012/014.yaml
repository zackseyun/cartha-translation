theological_decisions:
- issue: Relation of Jesus' action to the Scripture citation
  chosen_reading: Translate the verse so that Jesus' finding and sitting on the donkey
    is presented as corresponding to what Scripture says, without making an explicit
    claim here about whether he intentionally fulfilled prophecy or merely acted in
    accordance with it.
  alternative_readings:
  - Translate more dynamically to imply deliberate prophetic enactment
  rationale: The verse itself states the action and then introduces the written citation
    formula. It supports prophetic correspondence, but does not explicitly spell out
    motive. The translation preserves that textual restraint.
  doctrine_reference: Preserve theological tension rather than resolve it.
