id: JHN.12.14
reference: John 12:14
source:
  edition: SBLGNT
  text: εὑρὼν δὲ ὁ Ἰησοῦς ὀνάριον ἐκάθισεν ἐπ’ αὐτό, καθώς ἐστιν γεγραμμένον·
translation:
  text: 'Then Jesus, having found a young donkey, sat on it, just as it is written:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a donkey colt." The Greek ὀνάριον refers to a donkey, often a young
      one.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρὼν
  chosen: having found
  alternatives:
  - found
  - after finding
  lexicon: BDAG
  rationale: Aorist active participle, nominative masculine singular, modifying Jesus
    and indicating action prior to the main verb. 'Having found' preserves the participial
    sequence more clearly than a simple coordinate finite verb.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'Then'
    gives natural English flow without overstating contrast.
- source_word: ὀνάριον
  chosen: a young donkey
  alternatives:
  - a donkey colt
  - a little donkey
  lexicon: BDAG
  rationale: ὀνάριον is a diminutive form referring to a donkey, often a young one.
    'A young donkey' is clear modern English and fits the Zechariah allusion without
    importing more specificity than the word itself requires.
- source_word: ἐκάθισεν ἐπ’ αὐτό
  chosen: sat on it
  alternatives:
  - mounted it
  - sat upon it
  lexicon: BDAG
  rationale: 'The Greek idiom is straightforward: ''sat on it.'' ''Mounted it'' is
    interpretive and slightly more dynamic; ''sat upon it'' is more formal but less
    natural in contemporary English.'
- source_word: καθώς ἐστιν γεγραμμένον
  chosen: just as it is written
  alternatives:
  - as it is written
  - just as has been written
  lexicon: BDAG
  rationale: This standard citation formula introduces Scripture. 'Just as it is written'
    preserves the comparative force of καθώς and the present-result nuance of γεγραμμένον
    in idiomatic English.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name with article used in Greek narrative style; standard English
    omits the article before personal names.
