id: JHN.12.30
reference: John 12:30
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸂Ἰησοῦς καὶ εἶπεν⸃· Οὐ δι’ ἐμὲ ⸂ἡ φωνὴ αὕτη⸃ γέγονεν ἀλλὰ δι’ ὑμᾶς.
translation:
  text: Jesus answered and said, “This voice has not come for my sake, but for yours.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This voice has not happened because of me, but because of you.' The
      Greek preposition can also be understood causally, though the context favors
      'for the sake of' or 'for the benefit of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue. 'Answered'
    is idiomatic in English and preserves the discourse function.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: The common Johannine formula ἀπεκρίθη ... καὶ εἶπεν is naturally rendered
    'answered and said.' Retaining both verbs reflects the Greek without awkwardness.
- source_word: φωνή
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: In context this refers to the heavenly utterance just heard, so 'voice'
    is more specific and contextually appropriate than the broader 'sound'.
- source_word: γέγονεν
  chosen: has not come
  alternatives:
  - has happened
  - has occurred
  - came into being
  lexicon: BDAG
  rationale: Perfect γέγονεν from γίνομαι here refers to the occurrence of the voice.
    English 'has not come' is idiomatic with 'voice' and conveys the event/result
    sense better than the more wooden 'has happened.'
- source_word: δι’ ἐμέ
  chosen: for my sake
  alternatives:
  - because of me
  - for me
  lexicon: BDAG
  rationale: διά with the accusative here expresses purpose/benefit. 'For my sake'
    best captures that the voice was not intended for Jesus' benefit.
- source_word: δι’ ὑμᾶς
  chosen: for yours
  alternatives:
  - for your sake
  - for you
  lexicon: BDAG
  rationale: Parallel to δι’ ἐμέ, indicating the voice was for the benefit of the
    hearers. 'For yours' is concise and natural in English while preserving the contrast.
- source_word: Οὐ ... ἀλλὰ
  chosen: not ... but
  lexicon: BDAG
  rationale: This straightforward adversative contrast should be preserved directly
    in English.
