theological_decisions:
- issue: Purpose of the heavenly voice
  chosen_reading: The voice was not given for Jesus' benefit but for the benefit of
    the surrounding hearers.
  alternative_readings:
  - The voice came because of Jesus but was intended for the crowd.
  rationale: The διά + accusative construction in both clauses is best taken in a
    benefactive/purpose sense in this context. This preserves Jesus' statement that
    the voice served the audience, not his own need for confirmation, without importing
    further doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
