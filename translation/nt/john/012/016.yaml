theological_decisions:
- issue: Meaning of Jesus being 'glorified' in Johannine context
  chosen_reading: Retain the wording 'was glorified' without specifying whether this
    refers narrowly to resurrection/exaltation or more broadly to the whole passion-resurrection-exaltation
    complex.
  alternative_readings:
  - was exalted
  - was honored
  rationale: John regularly uses glorification language with layered theological meaning.
    The translation preserves that tension rather than resolving it into a narrower
    interpretive paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
