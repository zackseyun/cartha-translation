id: JHN.12.16
reference: John 12:16
source:
  edition: SBLGNT
  text: ⸀ταῦτα οὐκ ἔγνωσαν ⸂αὐτοῦ οἱ μαθηταὶ⸃ τὸ πρῶτον, ἀλλ’ ὅτε ἐδοξάσθη Ἰησοῦς
    τότε ἐμνήσθησαν ὅτι ταῦτα ἦν ἐπ’ αὐτῷ γεγραμμένα καὶ ταῦτα ἐποίησαν αὐτῷ.
translation:
  text: His disciples did not understand these things at first, but when Jesus was
    glorified, then they remembered that these things had been written about him and
    that they had done these things to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not know these things at first.'
    reason: lexical_alternative
  - marker: b
    text: '''Was glorified'' in John commonly refers to Jesus'' glorification through
      his death, resurrection, and exaltation.'
    reason: cross_reference
  - marker: c
    text: Or 'had been written concerning him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνωσαν
  chosen: did not understand
  alternatives:
  - did not know
  - did not recognize
  lexicon: BDAG
  rationale: In context, the disciples' lack is not mere factual ignorance but failure
    to grasp the significance of the events. 'Understand' communicates this better
    in natural English while remaining faithful to γινώσκω in Johannine usage.
- source_word: αὐτοῦ οἱ μαθηταί
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: The genitive pronoun naturally expresses possession/association. Standard
    English requires 'his disciples.'
- source_word: τὸ πρῶτον
  chosen: at first
  alternatives:
  - the first time
  - initially
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning 'at first' or 'initially.' 'At
    first' is concise and natural.
- source_word: ἐδοξάσθη
  chosen: was glorified
  alternatives:
  - was honored
  lexicon: BDAG
  rationale: δοξάζω in John carries strong theological weight tied to Jesus' death,
    resurrection, and exaltation. 'Was glorified' preserves this established Johannine
    sense better than flatter alternatives.
- source_word: ἐμνήσθησαν
  chosen: they remembered
  alternatives:
  - they were reminded
  - they recalled
  lexicon: BDAG
  rationale: Aorist passive/deponent here is well rendered by active English 'they
    remembered.' This fits the narrative sequence and common NT usage.
- source_word: ἐπ’ αὐτῷ γεγραμμένα
  chosen: had been written about him
  alternatives:
  - were written concerning him
  - had been written of him
  - had been written on him
  lexicon: BDAG
  rationale: ἐπί with dative here idiomatically means 'about/concerning him,' not
    spatial 'on him.' The pluperfect sense in English ('had been written') best conveys
    the prior scriptural witness relative to the remembering.
- source_word: ταῦτα ἐποίησαν αὐτῷ
  chosen: they had done these things to him
  alternatives:
  - they did these things to him
  - they had done this for him
  lexicon: BDAG
  rationale: The subject is best understood as the people involved in the triumphal-entry
    actions, now recognized by the disciples as fulfilling Scripture. English pluperfect
    coordinates naturally with 'had been written.' 'To him' reflects αὐτῷ without
    softening the construction to 'for him.'
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The repeated neuter plural demonstrative points back to the narrated
    actions and scriptural details collectively; 'these things' preserves the repetition
    and cohesion of the verse.
