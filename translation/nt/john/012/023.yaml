id: JHN.12.23
reference: John 12:23
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ⸀ἀποκρίνεται αὐτοῖς λέγων· Ἐλήλυθεν ἡ ὥρα ἵνα δοξασθῇ ὁ υἱὸς τοῦ
    ἀνθρώπου.
translation:
  text: But Jesus answered them, saying, “The hour has come for the Son of Man to
    be glorified.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The time has come.” The Greek says “hour,” a recurring Johannine term
      for Jesus’ appointed moment of suffering and glory.
    reason: lexical_alternative
  - marker: b
    text: Or “the Human One.” The Greek title “the Son of Man” echoes Daniel 7 and
      is retained here for its theological and intertextual force.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκρίνεται
  chosen: answered
  alternatives:
  - responded
  lexicon: BDAG
  rationale: Although the Greek is present tense ('answers'), English narrative style
    normally renders this idiomatically as past tense here. 'Answered' is the standard
    and natural equivalent for ἀποκρίνομαι in this discourse setting.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative object is naturally carried in English as 'them' after 'answered';
    'answered to them' would be unnatural.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces Jesus' direct speech. 'Saying' preserves the
    Greek structure without awkwardness.
- source_word: Ἐλήλυθεν
  chosen: has come
  alternatives:
  - came
  - is here
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from arrival. 'Has
    come' best preserves that aspect better than simple past 'came'; 'is here' captures
    result but loses the verbal imagery of coming.
- source_word: ὥρα
  chosen: hour
  alternatives:
  - time
  - moment
  lexicon: BDAG
  rationale: In Johannine usage ὥρα is a theologically loaded term referring to the
    appointed decisive time of Jesus' glorification. 'Hour' preserves this motif better
    than the more generic 'time' or 'moment'.
- source_word: ἵνα
  chosen: for
  alternatives:
  - that
  - so that
  lexicon: BDAG
  rationale: Here ἵνα with the passive subjunctive expresses the content or purpose
    associated with the arrival of the hour. English idiom is smoother with 'for the
    Son of Man to be glorified,' which preserves the sense without woodenly reproducing
    'that'.
- source_word: δοξασθῇ
  chosen: to be glorified
  alternatives:
  - to receive glory
  - to be honored
  lexicon: BDAG
  rationale: The passive of δοξάζω in John carries rich theological weight, encompassing
    Jesus' exaltation through death, resurrection, and vindication. 'To be glorified'
    is the most direct and theologically transparent rendering.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation with strong Danielic and
    Johannine resonance. 'The Son of Man' preserves the title's intertextual and theological
    force better than interpretive alternatives.
