theological_decisions:
- issue: Rendering the title ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase functions as a christological title, not merely a generic
    reference to humanity. Retaining the traditional title preserves its connection
    to Daniel 7 and Johannine theology without flattening its messianic and eschatological
    significance.
  doctrine_reference: Affirmations; Translation philosophy §2, §3, §4
- issue: Aspect and theological force of Ἐλήλυθεν ἡ ὥρα
  chosen_reading: The hour has come
  alternative_readings:
  - The time has come
  - The hour is here
  rationale: John's 'hour' language is a recurring theological motif tied to Jesus'
    appointed path to glorification. 'Has come' preserves the perfect aspect and signals
    that the decisive moment has now arrived.
  doctrine_reference: Translation philosophy §1, §5
