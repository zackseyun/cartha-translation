id: JHN.12.6
reference: John 12:6
source:
  edition: SBLGNT
  text: εἶπεν δὲ τοῦτο οὐχ ὅτι περὶ τῶν πτωχῶν ἔμελεν αὐτῷ, ἀλλ’ ὅτι κλέπτης ἦν καὶ
    τὸ γλωσσόκομον ⸀ἔχων τὰ βαλλόμενα ἐβάσταζεν.
translation:
  text: Now he said this not because he cared about the poor, but because he was a
    thief, and having the money box, he used to take what was put into it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the moneybag.' The Greek term can refer to a container
      for holding money.
    reason: lexical_alternative
  - marker: b
    text: Or 'he carried off' or 'he used to steal what was put into it.' The verb
      often means 'carry' or 'bear,' but here the context ('he was a thief') indicates
      misappropriation.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν δὲ τοῦτο
  chosen: Now he said this
  alternatives:
  - But he said this
  - So he said this
  lexicon: BDAG
  rationale: δέ is lightly connective here; 'Now' gives natural English discourse
    flow without overstating contrast. 'Said this' directly reflects εἶπεν ... τοῦτο.
- source_word: οὐχ ὅτι
  chosen: not because
  alternatives:
  - not that
  lexicon: BDAG
  rationale: This construction introduces the denied motive. 'Not because' is idiomatic
    and clear in modern English.
- source_word: περὶ τῶν πτωχῶν
  chosen: about the poor
  alternatives:
  - for the poor
  - concerning the poor
  lexicon: BDAG
  rationale: With μέλει, περί + genitive expresses concern regarding someone. 'About
    the poor' fits the idiom 'care about' in English.
- source_word: ἔμελεν αὐτῷ
  chosen: he cared
  alternatives:
  - it mattered to him
  - he was concerned
  lexicon: BDAG
  rationale: μέλει/ἔμελεν with dative conveys personal concern. 'He cared' is concise
    and natural; the dative αὐτῷ is absorbed into the English verbal expression.
- source_word: ἀλλ’ ὅτι
  chosen: but because
  alternatives:
  - but rather because
  lexicon: BDAG
  rationale: This balances the earlier οὐχ ὅτι and clearly marks the true motive in
    English.
- source_word: κλέπτης
  chosen: a thief
  alternatives:
  - a robber
  - a stealer
  lexicon: BDAG
  rationale: κλέπτης denotes a thief, one who steals secretly. 'Robber' would suggest
    a different nuance.
- source_word: τὸ γλωσσόκομον
  chosen: the money box
  alternatives:
  - the moneybag
  - the common purse
  lexicon: BDAG
  rationale: γλωσσόκομον refers to the box or bag used to hold money. 'Money box'
    is a transparent rendering close to the lexical sense; 'moneybag' is traditional
    and possible, but 'box' better reflects the term's basic meaning.
- source_word: ἔχων
  chosen: having
  alternatives:
  - while he had
  - since he had charge of
  lexicon: BDAG
  rationale: 'The participle is retained with a simple English participial construction.
    It indicates attendant circumstance: he had possession/control of the money box.'
- source_word: τὰ βαλλόμενα
  chosen: what was put into it
  alternatives:
  - the things being put in
  - what was deposited
  lexicon: BDAG
  rationale: The passive participle from βάλλω here refers to money/items placed into
    the box. English requires the destination to be made explicit for clarity, hence
    'into it'.
- source_word: ἐβάσταζεν
  chosen: he used to take
  alternatives:
  - he was carrying off
  - he used to steal
  - he bore
  lexicon: BDAG
  rationale: Although βαστάζω often means 'carry' or 'bear,' in this context with
    Judas as 'a thief' and the contents of the money box, it idiomatically means taking
    away/misappropriating. 'He used to take' preserves the imperfect aspect and lets
    the prior 'thief' supply the negative force without over-paraphrasing to 'steal'
    in the main text.
