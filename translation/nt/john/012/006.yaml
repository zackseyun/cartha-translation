theological_decisions:
- issue: Interpretation of ἐβάσταζεν in relation to Judas's theft
  chosen_reading: 'Render as ongoing misappropriation: ''he used to take what was
    put into it'''
  alternative_readings:
  - he carried what was put into it
  - he used to steal what was put into it
  rationale: The immediate context ('because he was a thief') strongly favors a sense
    of taking away for himself rather than merely carrying. At the same time, rendering
    the verb itself as 'take' avoids importing more than the context warrants into
    the lexical value of βαστάζω, while still communicating John's accusation clearly.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
