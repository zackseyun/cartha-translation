id: JHN.12.22
reference: John 12:22
source:
  edition: SBLGNT
  text: ἔρχεται ⸀ὁ Φίλιππος καὶ λέγει τῷ Ἀνδρέᾳ· ⸀ἔρχεται Ἀνδρέας καὶ Φίλιππος ⸀καὶ
    λέγουσιν τῷ Ἰησοῦ.
translation:
  text: Philip comes and tells Andrew; Andrew and Philip come and tell Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek uses the historical present throughout ('comes ... tells ... come
      ... tell'), a common narrative feature that heightens immediacy. English translations
      often smooth these to past tense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - goes
  - came
  lexicon: BDAG
  rationale: Rendered as the historical present 'comes' to reflect John's vivid present-tense
    narrative style rather than smoothing to an English past tense. 'Goes' is less
    suitable here because the movement is toward the next interlocutor in the narrative
    flow, and 'came' would flatten the Greek aspect.
- source_word: λέγει
  chosen: tells
  alternatives:
  - says to
  - speaks to
  lexicon: BDAG
  rationale: Rendered 'tells' rather than the more wooden 'says to' because the verb
    here introduces reported communication to a person, and 'tells' is natural modern
    English while remaining close to the sense.
- source_word: Ἀνδρέᾳ
  chosen: Andrew
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: ἔρχεται
  chosen: come
  alternatives:
  - go
  - came
  lexicon: BDAG
  rationale: Again preserved as a historical present, but rendered in English plural
    sequence as part of 'Andrew and Philip come' to match the following plural verb
    and maintain narrative immediacy.
- source_word: λέγουσιν
  chosen: tell
  alternatives:
  - say to
  - speak to
  lexicon: BDAG
  rationale: Plural form rendered 'tell' for natural English parallelism with the
    first clause. This keeps the communicative force without unnecessary stiffness.
- source_word: τῷ Ἰησοῦ
  chosen: Jesus
  rationale: The dative is expressed in English by the verb 'tell' taking a direct
    object complement in idiomatic usage ('tell Jesus'). The personal name is transliterated.
- source_word: καί
  chosen: and
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Retained as 'and' throughout to preserve the simple paratactic flow of
    the Greek rather than adding interpretive temporal or logical nuance.
- source_word: ὁ Φίλιππος
  chosen: Philip
  rationale: Personal name transliterated. The Greek article before the name is not
    represented in English because it is idiomatic in Greek with proper names and
    not semantically marked here.
