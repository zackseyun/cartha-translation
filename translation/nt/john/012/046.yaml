id: JHN.12.46
reference: John 12:46
source:
  edition: SBLGNT
  text: ἐγὼ φῶς εἰς τὸν κόσμον ἐλήλυθα, ἵνα πᾶς ὁ πιστεύων εἰς ἐμὲ ἐν τῇ σκοτίᾳ μὴ
    μείνῃ.
translation:
  text: I have come into the world as light, so that everyone who believes in me may
    not remain in the darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a light.' The Greek lacks the article, and the phrase may be rendered
      either qualitatively ('as light') or more literally ('a light').
    reason: lexical_alternative
  - marker: b
    text: Or 'whoever believes in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  chosen: light
  alternatives:
  - a light
  lexicon: BDAG
  rationale: Anarthrous predicate nominative used qualitatively; 'as light' communicates
    Jesus' identity/function without forcing an English article. 'Light' is the standard
    and contextually loaded Johannine term.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - to the world
  - in the world
  lexicon: BDAG
  rationale: εἰς with accusative naturally expresses movement into a sphere. 'Into
    the world' best reflects the incarnational/mission sense of Jesus' coming.
- source_word: ἐλήλυθα
  chosen: I have come
  alternatives:
  - I came
  lexicon: BDAG
  rationale: Perfect tense of ἔρχομαι highlights a present state resulting from the
    coming; English present perfect best preserves this nuance.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    purposive force.
- source_word: πᾶς ὁ πιστεύων
  chosen: everyone who believes
  alternatives:
  - whoever believes
  - every one believing
  lexicon: BDAG
  rationale: Substantival present participle with πᾶς denotes a general class. 'Everyone
    who believes' is idiomatic and preserves the ongoing/generic force better than
    a wooden rendering.
- source_word: πιστεύων εἰς ἐμέ
  chosen: believes in me
  alternatives:
  - trusts in me
  lexicon: BDAG
  rationale: For πιστεύω with εἰς plus personal object, standard Johannine sense is
    personal faith directed toward Jesus. 'Believes in me' is the default rendering;
    'trusts in me' is a viable nuance but not necessary in the main text.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: The article points to darkness as a recognizable moral/spiritual realm
    in Johannine usage. 'The darkness' preserves that thematic force better than the
    more abstract 'darkness'.
- source_word: μὴ μείνῃ
  chosen: may not remain
  alternatives:
  - should not remain
  - may not stay
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα with μή expresses intended negative result/purpose.
    'May not remain' is natural English and preserves the sense of continuing in a
    state.
