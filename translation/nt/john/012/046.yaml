theological_decisions:
- issue: Christological self-identification in Johannine light imagery
  chosen_reading: Rendered φῶς as 'light' in a way that presents Jesus as the revelatory
    and saving light entering the world, without adding interpretive expansion.
  alternative_readings:
  - Rendered more formally as 'I have come a light into the world'
  - Rendered more dynamically as 'I came to bring light to the world'
  rationale: The verse contributes to Johannine high Christology, but the translation
    should preserve the text's own metaphor rather than paraphrase it into a doctrinal
    explanation. 'As light' keeps the metaphor and aligns with orthodox Christological
    affirmation without overtranslation.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Scope expression πᾶς ὁ πιστεύων
  chosen_reading: Translated as 'everyone who believes' without importing a denominationally
    specific doctrine of election or free will.
  alternative_readings:
  - whoever believes
  rationale: The Greek states the universal class of believers and the purpose of
    Jesus' coming; it does not here resolve broader theological debates about the
    mechanics of belief. The rendering preserves the text's invitation and scope without
    doctrinal overreach.
  doctrine_reference: Affirmations; Translation philosophy §3
