theological_decisions:
- issue: Fulfillment language and divine purpose/result
  chosen_reading: Retain 'so that ... might be fulfilled' without resolving whether
    John's ἵνα expresses divine purpose, result, or both.
  alternative_readings:
  - so that ... would be fulfilled
  - with the result that ... was fulfilled
  rationale: The Greek allows a fulfillment formulation that can carry both purpose
    and result nuances in Johannine style. To preserve theological tension and avoid
    importing a deterministic explanation beyond the text, the translation keeps the
    standard fulfillment clause without interpretive expansion.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of ἀκοή in the Isaiah citation
  chosen_reading: Render as 'report' in the main text.
  alternative_readings:
  - hearing
  - message
  - what we heard
  rationale: The term can denote either the act/content of hearing. 'Report' best
    fits the quoted prophetic lament in English while preserving the proclaimed-content
    sense. Because the semantic range is genuine, alternatives are preserved in a
    footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
