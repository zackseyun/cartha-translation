id: JHN.12.38
reference: John 12:38
source:
  edition: SBLGNT
  text: ἵνα ὁ λόγος Ἠσαΐου τοῦ προφήτου πληρωθῇ ὃν εἶπεν· Κύριε, τίς ἐπίστευσεν τῇ
    ἀκοῇ ἡμῶν; καὶ ὁ βραχίων κυρίου τίνι ἀπεκαλύφθη;
translation:
  text: 'so that the word of Isaiah the prophet might be fulfilled, which he said:
    “Lord, who has believed our report? And to whom has the arm of the Lord been revealed?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what we heard” or “our message.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the result/purpose clause tied to the preceding unbelief
    narrative. 'So that' preserves the Greek connective naturally in English without
    over-specifying whether the nuance is purpose or result.
- source_word: λόγος
  chosen: word
  alternatives:
  - message
  - saying
  lexicon: BDAG
  rationale: In the phrase ὁ λόγος Ἠσαΐου τοῦ προφήτου, 'word' is the most direct
    rendering and fits the citation-fulfillment formula. 'Message' is possible but
    less idiomatic in this construction.
- source_word: Ἠσαΐου τοῦ προφήτου
  chosen: Isaiah the prophet
  rationale: Name is transliterated and title translated in keeping with project philosophy.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - might come to fulfillment
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα is well represented by 'might be
    fulfilled.' This preserves the fulfillment motif common in John without sounding
    wooden.
- source_word: Κύριε
  chosen: Lord
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine table, κύριος is rendered 'Lord.' In
    this quotation from Isaiah, 'Lord' also fits the scriptural address.
- source_word: ἐπίστευσεν
  chosen: has believed
  alternatives:
  - believed
  lexicon: BDAG
  rationale: English present perfect works well in the rhetorical question, expressing
    the enduring fact of unbelief. Simple past is possible but less natural in this
    citation context.
- source_word: τῇ ἀκοῇ ἡμῶν
  chosen: our report
  alternatives:
  - what we heard
  - our message
  lexicon: BDAG
  rationale: ἀκοή can denote hearing, report, or message heard. 'Our report' is a
    traditional and still clear rendering in Isaiah 53:1/Jn 12:38, preserving the
    objective sense of what was proclaimed. Alternatives are viable and worth preserving.
- source_word: βραχίων κυρίου
  chosen: the arm of the Lord
  lexicon: BDAG
  rationale: This is a literal rendering of the biblical metaphor for divine power/action.
    The metaphor should be preserved rather than interpreted away.
- source_word: ἀπεκαλύφθη
  chosen: has been revealed
  alternatives:
  - was revealed
  lexicon: BDAG
  rationale: English present perfect suits the rhetorical force and keeps the passive
    sense explicit. It also pairs naturally with 'has believed' in the quotation.
