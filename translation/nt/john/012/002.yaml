id: JHN.12.2
reference: John 12:2
source:
  edition: SBLGNT
  text: ἐποίησαν οὖν αὐτῷ δεῖπνον ἐκεῖ, καὶ ἡ Μάρθα διηκόνει, ὁ δὲ Λάζαρος εἷς ἦν
    ⸀ἐκ τῶν ἀνακειμένων σὺν αὐτῷ·
translation:
  text: So they made a dinner for him there, and Martha was serving, but Lazarus was
    one of those reclining at the table with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'one of those reclining with him.' Reclining was the
      customary posture for a formal meal.
    reason: cultural_note
lexical_decisions:
- source_word: ἐποίησαν
  chosen: made
  alternatives:
  - prepared
  - gave
  lexicon: BDAG
  rationale: ποιέω with δεῖπνον commonly means to make or prepare a meal. 'Made' is
    natural English and stays close to the Greek without overinterpreting the hosts'
    identity.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν marks narrative continuation/inference from the prior context. 'So'
    is idiomatic modern English and preserves the connective force without sounding
    overly formal.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: 'With δεῖπνον and ἐποίησαν, the dative is best rendered as advantage/reference:
    the dinner was made for Jesus.'
- source_word: δεῖπνον
  chosen: dinner
  alternatives:
  - supper
  - meal
  - banquet
  lexicon: BDAG
  rationale: δεῖπνον denotes the main meal, often evening. 'Dinner' is clear modern
    English. 'Supper' is traditional but less current; 'banquet' overstates the term.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Straightforward locative adverb referring back to Bethany in context.
- source_word: διηκόνει
  chosen: was serving
  alternatives:
  - served
  - was ministering
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action, so 'was serving' better reflects
    the aspect than simple past. 'Ministering' would sound too ecclesiastical here
    for table service.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast between Martha's serving and Lazarus's posture
    at the meal. 'But' brings out that contrast naturally.
- source_word: εἷς ἦν ἐκ
  chosen: was one of
  alternatives:
  - was among
  lexicon: BDAG
  rationale: This idiom identifies Lazarus as one member of a larger group present
    at table.
- source_word: ἀνακειμένων
  chosen: those reclining at the table
  alternatives:
  - those reclining
  - those dining
  lexicon: BDAG
  rationale: ἀνάκειμαι in meal contexts refers to reclining for a formal meal. 'At
    the table' is supplied in English to make the scene clear; 'dining' loses the
    culturally specific posture.
- source_word: σὺν αὐτῷ
  chosen: with him
  lexicon: BDAG
  rationale: Simple accompaniment; the pronoun refers to Jesus in context.
