theological_decisions:
- issue: Whether Jesus's words 'Father, save me from this hour' should be translated
    as a direct prayer request or as part of a rhetorical question extending from
    'what should I say?'
  chosen_reading: 'Render as a direct utterance: ''Father, save me from this hour.'''
  alternative_readings:
  - 'Render as rhetorical: ''What should I say? “Father, save me from this hour”?'''
  rationale: 'The punctuation of the earliest manuscripts is not original, so the
    clause can be read either as a prayer or as a rejected possibility. The Greek
    as presented in SBLGNT punctuates it as a direct petition followed by a contrasting
    statement of purpose. This preserves the text''s tension: Jesus truly recoils
    from the hour yet embraces the mission for which he came. A footnote preserves
    the rhetorical alternative rather than resolving the tension dogmatically.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
