id: JHN.12.27
reference: John 12:27
source:
  edition: SBLGNT
  text: Νῦν ἡ ψυχή μου τετάρακται, καὶ τί εἴπω; πάτερ, σῶσόν με ἐκ τῆς ὥρας ταύτης.
    ἀλλὰ διὰ τοῦτο ἦλθον εἰς τὴν ὥραν ταύτην.
translation:
  text: Now my soul is troubled, and what should I say? Father, save me from this
    hour. But for this reason I came to this hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What should I say? “Father, save me from this hour”?' The Greek may
      also be read as a rhetorical question rather than a direct request.
    reason: alternative_reading
lexical_decisions:
- source_word: Νῦν
  chosen: Now
  alternatives:
  - At this moment
  lexicon: BDAG
  rationale: Temporal adverb marking the immediacy of Jesus's present distress; 'Now'
    is natural and sufficiently direct.
- source_word: ψυχή
  chosen: soul
  alternatives:
  - life
  - self
  - inner being
  lexicon: BDAG
  rationale: In Johannine usage here the term refers to Jesus's inner life/person
    in distress. 'Soul' preserves the gravity and traditional anthropological sense
    without over-paraphrasing.
- source_word: τετάρακται
  chosen: is troubled
  alternatives:
  - has been troubled
  - is distressed
  - is shaken
  lexicon: BDAG
  rationale: Perfect passive indicates a present state resulting from disturbance.
    'Is troubled' is idiomatic English and preserves the emotional and existential
    agitation without overstating it.
- source_word: τί εἴπω
  chosen: what should I say?
  alternatives:
  - what am I to say?
  - what shall I say?
  lexicon: BDAG
  rationale: The deliberative subjunctive expresses reflective uncertainty. 'What
    should I say?' communicates the force in clear modern English.
- source_word: πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: BDAG
  rationale: Direct address to God; 'Father' is the natural vocative rendering in
    contemporary English.
- source_word: σῶσόν με ἐκ τῆς ὥρας ταύτης
  chosen: save me from this hour
  alternatives:
  - deliver me from this hour
  - rescue me out of this hour
  lexicon: BDAG
  rationale: Aorist imperative with ἐκ expresses deliverance from the impending ordeal.
    'Save me from this hour' is concise and preserves the wording closely; 'hour'
    in John often carries theological weight tied to Jesus's appointed suffering/glorification.
- source_word: ὥρα
  chosen: hour
  alternatives:
  - time
  - moment
  lexicon: BDAG
  rationale: John uses 'hour' as a theologically loaded term for the decisive appointed
    time of Jesus's suffering, death, and glorification. Retaining 'hour' preserves
    this Johannine motif.
- source_word: ἀλλὰ διὰ τοῦτο
  chosen: But for this reason
  alternatives:
  - But because of this
  - Yet for this purpose
  lexicon: BDAG
  rationale: The phrase marks contrast and purpose/explanation. 'For this reason'
    best fits the immediate logic while remaining natural English.
- source_word: ἦλθον εἰς τὴν ὥραν ταύτην
  chosen: I came to this hour
  alternatives:
  - I have come to this hour
  - I came for this hour
  lexicon: BDAG
  rationale: Aorist 'came' is rendered simply. εἰς is most naturally 'to/into,' not
    necessarily 'for,' though purpose is implied by context. 'I came to this hour'
    preserves the Greek wording and Johannine sense of arrival at the appointed climactic
    moment.
