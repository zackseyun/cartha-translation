id: JHN.12.45
reference: John 12:45
source:
  edition: SBLGNT
  text: καὶ ὁ θεωρῶν ἐμὲ θεωρεῖ τὸν πέμψαντά με.
translation:
  text: And the one who sees me sees the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beholds'; the Greek verb can carry the sense of seeing with attentive
      perception, not merely physical sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρῶν
  chosen: the one who sees
  alternatives:
  - whoever sees
  - the one beholding
  - the one who looks at
  lexicon: BDAG
  rationale: The articular present participle ὁ θεωρῶν functions substantivally, referring
    generically to a person characterized by the action. 'The one who sees' preserves
    the participial force and the representative singular without sounding wooden.
    'Whoever sees' is possible but slightly more dynamic.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun of the first person singular. The emphatic form
    ἐμέ is naturally rendered 'me' in English; English word order does not require
    additional emphasis marking here.
- source_word: θεωρεῖ
  chosen: sees
  alternatives:
  - beholds
  - looks upon
  lexicon: BDAG
  rationale: θεωρέω can mean to see, observe, behold, or perceive. 'Sees' is the most
    natural modern English rendering and preserves the verbal repetition with the
    participle. 'Beholds' is more formal/literary but less natural for the target
    audience.
- source_word: τὸν πέμψαντά
  chosen: the one who sent
  alternatives:
  - him who sent
  - the one having sent
  lexicon: BDAG
  rationale: The articular aorist participle refers to the Father as the sender of
    Jesus. 'The one who sent' is clear, idiomatic, and preserves the relational description
    without importing a title not explicit in the Greek.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: First person singular object of πέμψαντά. Rendered straightforwardly
    as 'me'.
- source_word: καὶ
  chosen: And
  alternatives:
  - Also
  - Indeed
  lexicon: BDAG
  rationale: Simple connective linking this saying to the preceding context. 'And'
    is the most direct and contextually appropriate rendering.
