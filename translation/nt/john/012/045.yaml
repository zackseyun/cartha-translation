theological_decisions:
- issue: Relation between seeing Jesus and seeing the Father
  chosen_reading: 'Rendered straightforwardly as a representative statement of revelatory
    unity: seeing Jesus is seeing the one who sent him.'
  alternative_readings:
  - A weaker sense of merely learning about the sender through Jesus
  - A stronger paraphrase implying ontological identity beyond the wording of the
    verse
  rationale: The verse states a direct equivalence in revelatory vision without requiring
    paraphrastic expansion. The translation preserves the theological force while
    not importing explanatory doctrinal language absent from the Greek. This aligns
    with orthodox Christology while respecting the text's own wording.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 Preserve theological tension rather than resolve
    it.'
