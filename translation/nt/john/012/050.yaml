theological_decisions:
- issue: Meaning of 'his command is eternal life'
  chosen_reading: The Father's command leads to or consists in life-giving revelation,
    rendered literally as 'is eternal life' without interpretive expansion.
  alternative_readings:
  - The command results in eternal life
  - The command concerns eternal life
  rationale: The Greek uses a direct equative expression ('is eternal life'). To preserve
    theological tension and avoid importing a narrower doctrinal explanation, the
    main text keeps the literal predicate while allowing readers to infer the precise
    nuance from context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
