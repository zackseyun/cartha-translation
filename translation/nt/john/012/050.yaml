id: JHN.12.50
reference: John 12:50
source:
  edition: SBLGNT
  text: καὶ οἶδα ὅτι ἡ ἐντολὴ αὐτοῦ ζωὴ αἰώνιός ἐστιν. ἃ οὖν ⸂ἐγὼ λαλῶ⸃, καθὼς εἴρηκέν
    μοι ὁ πατήρ, οὕτως λαλῶ.
translation:
  text: And I know that his command is eternal life. So what I speak, I speak just
    as the Father has told me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his command leads to eternal life' or 'his command concerns eternal
      life.' The Greek more literally says 'his command is eternal life.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐντολή
  chosen: command
  alternatives:
  - commandment
  - instruction
  lexicon: BDAG
  rationale: '''Command'' is the most natural modern English rendering and preserves
    the sense of an authoritative charge. ''Commandment'' is possible but sounds more
    traditional and less idiomatic here.'
- source_word: ζωὴ αἰώνιος
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard Johannine expression. 'Eternal life' preserves both
    duration and the theological weight of life belonging to the age to come.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - whatever
  lexicon: BDAG
  rationale: The neuter plural relative pronoun is idiomatically rendered 'what' in
    English. This avoids awkward literalism while preserving the object of Jesus'
    speaking.
- source_word: λαλῶ
  chosen: I speak
  alternatives:
  - I say
  lexicon: BDAG
  rationale: Using 'speak' for both occurrences preserves the repetition of λαλέω
    in the Greek. 'Say' would be possible but would reduce the verbal consistency.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - exactly as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks correspondence between the Father''s instruction
    and Jesus'' speech, with a natural English cadence.'
- source_word: εἴρηκέν μοι
  chosen: has told me
  alternatives:
  - has said to me
  - told me
  lexicon: BDAG
  rationale: The perfect tense indicates a completed utterance with abiding relevance.
    'Has told me' communicates that force naturally in English better than the stiffer
    'has said to me.'
- source_word: πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text has the articular noun 'the Father,' not 'my Father.'
    The translation preserves the wording while retaining the Johannine relational
    title.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: '''So'' gives a natural English inference from the previous clause without
    sounding overly formal. It preserves the logical connection.'
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: '''I know'' is the direct and idiomatic rendering of οἶδα and fits the
    solemn certainty of the statement.'
