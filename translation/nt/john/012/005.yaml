id: JHN.12.5
reference: John 12:5
source:
  edition: SBLGNT
  text: Διὰ τί τοῦτο τὸ μύρον οὐκ ἐπράθη τριακοσίων δηναρίων καὶ ἐδόθη πτωχοῖς;
translation:
  text: Why was this perfume not sold for three hundred denarii and given to the poor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard daily wage for a laborer; three hundred denarii
      was roughly a year's earnings, allowing for days not worked.
    reason: cultural_note
lexical_decisions:
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: BDAG
  rationale: Idiomatic interrogative meaning 'why?' or 'for what reason?'; concise
    modern English best matches the force of the question.
- source_word: μύρον
  chosen: perfume
  alternatives:
  - ointment
  - fragrant oil
  lexicon: BDAG
  rationale: Refers to costly scented ointment/perfume. 'Perfume' is natural modern
    English and fits the context of expensive aromatic liquid used for anointing.
- source_word: ἐπράθη
  chosen: was sold
  alternatives:
  - was it sold
  lexicon: BDAG
  rationale: Aorist passive of πιπράσκω, 'to sell.' English passive preserves the
    Greek form and the rhetorical complaint.
- source_word: τριακοσίων δηναρίων
  chosen: for three hundred denarii
  alternatives:
  - for three hundred silver coins
  - for three hundred days' wages
  lexicon: BDAG
  rationale: The genitive expresses price. 'Denarii' preserves the historical monetary
    term rather than flattening it into an approximate modern equivalent. A more interpretive
    gloss such as 'days' wages' is better reserved for a note if needed, not the main
    text.
- source_word: ἐδόθη
  chosen: given
  alternatives:
  - distributed
  - donated
  lexicon: BDAG
  rationale: Aorist passive of δίδωμι. 'Given' is the most direct and sufficiently
    broad rendering in this charitable context.
- source_word: πτωχοῖς
  chosen: to the poor
  alternatives:
  - to poor people
  - to the needy
  lexicon: BDAG
  rationale: Standard idiomatic English for the dative plural adjective used substantivally.
    'The poor' is natural and preserves the social category in view.
