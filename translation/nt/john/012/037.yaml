id: JHN.12.37
reference: John 12:37
source:
  edition: SBLGNT
  text: τοσαῦτα δὲ αὐτοῦ σημεῖα πεποιηκότος ἔμπροσθεν αὐτῶν οὐκ ἐπίστευον εἰς αὐτόν,
translation:
  text: Although he had done so many signs before them, they were not believing in him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not believe in him'; the Greek verb is imperfect, which may suggest ongoing or repeated unbelief.
    reason: lexical_alternative
  - marker: b
    text: Or 'But although he had done'.
    reason: previous_rendering
lexical_decisions:
- source_word: τοσαῦτα
  chosen: so many
  alternatives:
  - so great a number of
  - such many
  lexicon: BDAG
  rationale: τοσοῦτος here modifies σημεῖα quantitatively, emphasizing the large number of signs. 'So many' is natural modern English and preserves the emphatic force.
- source_word: δὲ
  chosen: But
  alternatives:
  - Yet
  - Now
  lexicon: BDAG
  rationale: 'δέ marks contrast with the preceding context. ''But'' best signals the adversative turn: despite the signs, unbelief remained.'
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  - miracles
  lexicon: BDAG
  rationale: In John, σημεῖον is a theologically loaded term pointing beyond the act to its revelatory significance. 'Signs' preserves Johannine usage better than 'miracles,' which can flatten that nuance.
- source_word: πεποιηκότος
  chosen: had done
  alternatives:
  - having done
  - had performed
  lexicon: BDAG
  rationale: The genitive absolute with perfect participle conveys prior action with continuing relevance. 'Although he had done' captures both the temporal priority and the concessive force required by the context.
- source_word: ἔμπροσθεν αὐτῶν
  chosen: before them
  alternatives:
  - in their presence
  - in front of them
  lexicon: BDAG
  rationale: The phrase indicates public visibility. 'Before them' is concise and idiomatic, while retaining the sense that the signs were done openly in their sight.
- source_word: οὐκ ἐπίστευον
  chosen: were not believing
  alternatives:
  - did not believe
  - kept refusing to believe
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated unbelief. 'Were not believing' preserves that durative aspect more clearly than the simple past 'did not believe,' while avoiding an overly interpretive expansion like 'kept refusing.'
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  lexicon: BDAG
  rationale: John's πιστεύω + εἰς construction is idiomatically rendered 'believe in.' This preserves the relational and directional sense of trust toward Jesus without awkward literalism.
