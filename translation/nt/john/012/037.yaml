theological_decisions:
- issue: Rendering Johannine unbelief in light of the imperfect verb
  chosen_reading: They were not believing in him
  alternative_readings:
  - They did not believe in him
  - They kept refusing to believe in him
  rationale: The verse emphasizes persistent unbelief despite abundant public signs. The chosen rendering preserves the Greek imperfect's ongoing aspect without importing a stronger volitional nuance than the text explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
revisions:
- timestamp: '2026-04-21T12:26:22Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/012/037.json
  category: awkward_english
  tier: 1
  from: But although he had done
  to: Although he had done
  rationale: The conjunction 'although' sufficiently renders the concessive force of the genitive absolute clause in contrast to the main clause. The initial 'But' (translating δὲ) becomes slightly redundant in English. Removing it creates a smoother sentence without losing the adversative meaning, which is already inherent in the 'Although... [main clause]' structure.
