theological_decisions:
- issue: Referent of the pronouns αὐτοῦ / αὐτοῦ
  chosen_reading: Both pronouns refer to Jesus, so the verse states that Isaiah saw
    Jesus' glory and spoke about Jesus.
  alternative_readings:
  - The pronouns refer more generally to God/the Lord without specifying Jesus in
    the translation.
  rationale: Within John's argument, the citation of Isaiah is applied christologically
    to explain unbelief in response to Jesus. The immediate context (John 12:37–41)
    points to Jesus as the referent, and this reading coheres with John's high Christology
    without importing more than the text itself asserts.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy §3 Preserve theological tension rather than
    resolve it.'
