id: JHN.12.41
reference: John 12:41
source:
  edition: SBLGNT
  text: ταῦτα εἶπεν Ἠσαΐας ⸀ὅτι εἶδεν τὴν δόξαν αὐτοῦ, καὶ ἐλάλησεν περὶ αὐτοῦ.
translation:
  text: Isaiah said these things because he saw his glory and spoke about him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Isaiah said these things because he saw God's glory and spoke about
      him." The pronouns likely refer to Jesus in John's context, but the broader
      Isaianic background is the vision of the Lord's glory (Isa 6:1).
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the cited prophetic statements;
    'these things' is the natural plural rendering.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most simply rendered 'said'; the later ἐλάλησεν carries
    the 'spoke' nuance, so differentiating the English helps reflect the Greek verbs.
- source_word: Ἠσαΐας
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name, following the
    policy to transliterate personal names.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'In context ὅτι most naturally gives the reason Isaiah said these things:
    he saw his glory and spoke about him. ''That'' is grammatically possible, but
    ''because'' better fits Johannine explanatory usage here.'
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - caught sight of
  lexicon: BDAG
  rationale: Straightforward aorist rendering of ὁράω.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: δόξα in Johannine theology regularly carries the weighty sense 'glory';
    'splendor' is possible but weaker and less consistent.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: 'Genitive pronoun naturally rendered possessively with δόξαν: ''his glory.''
    In context the pronoun refers to Jesus, as the surrounding discourse indicates.'
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: Aorist of λαλέω is well rendered 'spoke'; this preserves a slight distinction
    from εἶπεν earlier in the verse.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: περί with genitive means 'about/concerning.' 'About him' is more natural
    modern English while preserving the sense.
