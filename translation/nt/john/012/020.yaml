theological_decisions:
- issue: Identity of Ἕλληνες
  chosen_reading: '''Greeks'' is retained as an ethnic/cultural designation rather
    than generalized to ''Gentiles.'''
  alternative_readings:
  - Gentiles
  rationale: The Greek term used is Ἕλληνες, whose plain lexical sense is 'Greeks.'
    While interpreters debate whether these were Greek-speaking Jews, proselytes,
    or God-fearers, the text itself does not specify beyond calling them Greeks and
    noting that they came to worship at the feast. The translation preserves that
    tension rather than resolving it.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
