id: JHN.12.20
reference: John 12:20
source:
  edition: SBLGNT
  text: Ἦσαν δὲ ⸂Ἕλληνές τινες⸃ ἐκ τῶν ἀναβαινόντων ἵνα προσκυνήσωσιν ἐν τῇ ἑορτῇ·
translation:
  text: Now there were some Greeks among those going up to worship at the feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'certain Greeks'; possibly non-Jews who had come up to worship at the
      festival.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦσαν δὲ
  chosen: Now there were
  alternatives:
  - And there were
  - Now there were
  lexicon: BDAG
  rationale: ἦσαν gives existential 'there were'; δέ is a mild connective. 'Now' preserves
    the discourse shift in natural English better than a bare 'and'.
- source_word: Ἕλληνές τινες
  chosen: some Greeks
  alternatives:
  - certain Greeks
  - some Gentiles
  lexicon: BDAG
  rationale: Ἕλληνες most naturally means 'Greeks' here, not generically 'Gentiles,'
    since the lexical sense is ethnic/cultural Greeks; τινες adds indefiniteness,
    hence 'some.' 'Certain Greeks' is possible but less natural in modern English.
- source_word: ἐκ τῶν ἀναβαινόντων
  chosen: among those going up
  alternatives:
  - from among those going up
  - among those coming up
  lexicon: BDAG
  rationale: ἐκ with the participle indicates these Greeks were part of the group
    traveling up. 'Going up' preserves the conventional pilgrimage idiom to Jerusalem
    without overexplaining.
- source_word: ἵνα προσκυνήσωσιν
  chosen: to worship
  alternatives:
  - in order to worship
  - to bow down in worship
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. In English, the infinitive
    'to worship' is the most natural equivalent. προσκυνέω here refers to religious
    worship, not merely physical prostration.
- source_word: ἐν τῇ ἑορτῇ
  chosen: at the feast
  alternatives:
  - during the feast
  - at the festival
  lexicon: BDAG
  rationale: ἑορτή in Johannine context refers to the Jewish festival occasion, here
    naturally rendered 'feast.' 'At the feast' is idiomatic and sufficiently specific
    without adding words not in the text.
