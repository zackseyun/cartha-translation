id: JHN.12.48
reference: John 12:48
source:
  edition: SBLGNT
  text: ὁ ἀθετῶν ἐμὲ καὶ μὴ λαμβάνων τὰ ῥήματά μου ἔχει τὸν κρίνοντα αὐτόν· ὁ λόγος
    ὃν ἐλάλησα ἐκεῖνος κρινεῖ αὐτὸν ἐν τῇ ἐσχάτῃ ἡμέρᾳ·
translation:
  text: 'The one who rejects me and does not receive my words has one who judges him:
    the word that I spoke will judge him on the last day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not accept my words.' The Greek verb can carry the sense of receiving,
      welcoming, or accepting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the message that I spoke.' Greek logos can mean 'word' or 'message'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετῶν
  chosen: rejects
  alternatives:
  - sets aside
  - disregards
  - rejects
  lexicon: BDAG
  rationale: ἀθετέω here denotes repudiating or rejecting a person/message, not merely
    ignoring. 'Rejects' is idiomatic and preserves the personal force toward Jesus
    better than the weaker 'disregards' or the more wooden 'sets aside'.
- source_word: λαμβάνων τὰ ῥήματά μου
  chosen: does not receive my words
  alternatives:
  - does not accept my words
  - does not take my words
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'receive' in Johannine contexts, often with the
    sense of welcoming or accepting revelation. 'Receive' preserves Johannine diction
    and avoids flattening the relational nuance into mere intellectual assent.
- source_word: ῥήματά
  chosen: words
  alternatives:
  - sayings
  - spoken words
  lexicon: BDAG
  rationale: ῥῆμα often emphasizes spoken utterances. 'Words' is natural English and
    sufficiently reflects the plural spoken content; 'sayings' sounds more specialized
    and archaic here.
- source_word: ἔχει τὸν κρίνοντα αὐτόν
  chosen: has one who judges him
  alternatives:
  - has his judge
  - has that which judges him
  lexicon: BDAG
  rationale: 'The construction is somewhat elliptical: the rejecter already ''has''
    a judge. Rendering it as ''has one who judges him'' preserves the personal participial
    force of τὸν κρίνοντα while remaining clear in English. It also prepares for the
    appositional explanation that follows: the word Jesus spoke is that judge.'
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the message
  - the saying
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' Here 'the word' best preserves the
    singular, weighty, almost personified force in context, while still referring
    to Jesus' spoken revelation. 'Message' is possible but less formally connected
    to the Greek.
- source_word: ὃν ἐλάλησα
  chosen: that I spoke
  alternatives:
  - which I spoke
  - that I have spoken
  lexicon: BDAG
  rationale: ἐλάλησα is aorist, so 'spoke' is the most direct rendering. 'That I spoke'
    is idiomatic modern English and keeps the focus on Jesus' uttered revelation.
- source_word: ἐκεῖνος
  chosen: that
  alternatives:
  - it
  - that word
  lexicon: BDAG
  rationale: ἐκεῖνος is emphatic, pointing back to ὁ λόγος. In English, 'that' after
    a colon naturally carries the demonstrative emphasis without sounding awkward.
    The sense is that this very word will judge.
- source_word: κρινεῖ
  chosen: will judge
  alternatives:
  - will condemn
  - will pass judgment on
  lexicon: BDAG
  rationale: κρίνω includes judging and, in context, eschatological judgment. 'Will
    judge' is the broadest and most textually faithful choice; 'will condemn' would
    over-specify the outcome beyond the verb itself.
- source_word: ἐν τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - in the last day
  - at the last day
  lexicon: BDAG
  rationale: This is standard Johannine eschatological language. 'On the last day'
    is idiomatic modern English for temporal ἐν and preserves the eschatological reference
    without importing a more detailed doctrinal scheme.
