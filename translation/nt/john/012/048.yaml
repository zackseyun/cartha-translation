theological_decisions:
- issue: Nature of the judging agent in the verse
  chosen_reading: The verse presents Jesus' spoken word/message as the instrument
    or basis of final judgment, without denying Jesus' own role in judgment elsewhere.
  alternative_readings:
  - The word is personified as the direct judge
  - Jesus himself is exclusively the judge and 'word' is only shorthand for his standard
  rationale: The syntax first says the rejecter 'has one who judges him,' then identifies
    that judge as 'the word that I spoke.' The translation preserves this wording
    without harmonizing away the tension with other Johannine statements about the
    Son's role in judgment. This follows the doctrine's instruction to preserve theological
    tension rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
