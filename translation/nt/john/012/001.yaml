id: JHN.12.1
reference: John 12:1
source:
  edition: SBLGNT
  text: Ὁ οὖν Ἰησοῦς πρὸ ἓξ ἡμερῶν τοῦ πάσχα ἦλθεν εἰς Βηθανίαν, ὅπου ἦν ⸀Λάζαρος,
    ὃν ἤγειρεν ἐκ νεκρῶν ⸀Ἰησοῦς.
translation:
  text: So Jesus came to Bethany six days before the Passover, where Lazarus was,
    whom Jesus had raised from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, "from among the dead."
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  - Now
  lexicon: BDAG
  rationale: Rendered as "So" to preserve the narrative connective force without sounding
    overly formal. It links this verse to the preceding context while remaining natural
    in modern English.
- source_word: πρὸ ἓξ ἡμερῶν τοῦ πάσχα
  chosen: six days before the Passover
  alternatives:
  - before six days of the Passover
  - six days prior to the Passover
  lexicon: BDAG
  rationale: This idiom is most naturally expressed in English as a temporal phrase
    meaning "six days before the Passover." "The Passover" preserves the article and
    refers to the known Jewish feast.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: '"Came" is the standard narrative rendering for ἔρχομαι and fits English
    viewpoint naturally here. "Arrived" is possible but slightly more interpretive.'
- source_word: Βηθανίαν
  chosen: Bethany
  rationale: Personal and place names are transliterated by standard convention per
    translation philosophy.
- source_word: ὅπου ἦν Λάζαρος
  chosen: where Lazarus was
  alternatives:
  - where Lazarus was staying
  - where Lazarus lived
  lexicon: BDAG
  rationale: A simple existential/locative rendering best matches the Greek. More
    specific options like "staying" or "lived" add information not explicit in the
    text.
- source_word: ἤγειρεν
  chosen: had raised
  alternatives:
  - raised
  - awakened
  lexicon: BDAG
  rationale: The aorist is rendered with English past perfect in the relative clause
    to clarify that Lazarus's raising occurred before Jesus's arrival in this verse.
    "Raised" is the appropriate contextual sense of ἐγείρω in resurrection context.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out of the dead
  - from among the dead
  lexicon: BDAG
  rationale: '"From the dead" is the standard idiomatic English rendering in resurrection
    contexts. "From among the dead" is more literal but less natural here.'
- source_word: πάσχα
  chosen: Passover
  lexicon: BDAG
  rationale: Standard rendering for the Jewish feast; this is not a christological
    title or contested term requiring special handling.
