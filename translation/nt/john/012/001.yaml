theological_decisions:
- issue: Resurrection language in reference to Lazarus
  chosen_reading: whom Jesus had raised from the dead
  alternative_readings:
  - whom he had raised from the dead
  rationale: The Greek explicitly repeats the subject name Ἰησοῦς at the end of the
    clause. Retaining "Jesus" rather than reducing to "he" preserves the emphatic
    identification of Jesus as the one who raised Lazarus and reflects the source
    text more transparently.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
