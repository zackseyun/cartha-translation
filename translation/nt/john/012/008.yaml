id: JHN.12.8
reference: John 12:8
source:
  edition: SBLGNT
  text: τοὺς πτωχοὺς γὰρ πάντοτε ἔχετε μεθ’ ἑαυτῶν, ἐμὲ δὲ οὐ πάντοτε ἔχετε.
translation:
  text: For you always have the poor with you, but you do not always have me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''poor people.'' The Greek adjective is used substantivally: ''the
      poor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: πτωχούς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: The adjective used substantivally refers to poor persons. 'The poor'
    is idiomatic, concise English and preserves the generic class reference without
    unnecessary expansion.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Here γάρ gives an explanatory ground for the preceding statement. 'For'
    preserves the connective force in a natural but still fairly formal way.
- source_word: πάντοτε
  chosen: always
  alternatives:
  - at all times
  - continually
  lexicon: BDAG
  rationale: The adverb denotes continual or constant availability in this context.
    'Always' is the most natural modern equivalent and matches both occurrences for
    consistency.
- source_word: ἔχετε
  chosen: have
  alternatives:
  - keep
  - possess
  lexicon: BDAG
  rationale: In context the verb indicates ongoing presence or availability rather
    than ownership. 'Have' is the straightforward English equivalent and works naturally
    in both clauses.
- source_word: μεθ’ ἑαυτῶν
  chosen: with you
  alternatives:
  - among yourselves
  - with yourselves
  lexicon: BDAG
  rationale: The phrase means in one's company or presence. 'With you' is idiomatic
    English; 'with yourselves' would be overly literal and awkward.
- source_word: ἐμέ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus himself; simple first-person
    object pronoun is required.
- source_word: δέ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: δέ marks contrast between the continuing presence of the poor and the
    limited duration of Jesus' bodily presence. 'But' best conveys that contrast.
- source_word: οὐ πάντοτε
  chosen: do not always
  alternatives:
  - not always
  lexicon: BDAG
  rationale: English requires auxiliary support with the finite verb. 'Do not always
    have' clearly renders the negated adverbial phrase without changing the sense.
