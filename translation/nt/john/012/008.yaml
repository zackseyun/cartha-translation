theological_decisions:
- issue: Potential misuse of Jesus' statement as diminishing care for the poor
  chosen_reading: Render the statement straightforwardly as a contrast of presence
    and timing, without implying that care for the poor is unimportant.
  alternative_readings:
  - A paraphrastic rendering that suggests the poor matter less than Jesus
  - A softened rendering that obscures the contrast
  rationale: 'The Greek states a factual contrast: the poor remain continually present,
    whereas Jesus'' physical presence with the disciples is temporary. The translation
    should neither blunt the urgency of the moment nor import a theological devaluation
    of the poor that the wording itself does not state.'
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
