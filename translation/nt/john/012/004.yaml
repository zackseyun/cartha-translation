theological_decisions:
- issue: Rendering παραδιδόναι in reference to Judas's action toward Jesus
  chosen_reading: betray
  alternative_readings:
  - hand over
  - deliver over
  rationale: The verb παραδίδωμι can be rendered more literally as 'hand over,' and
    some translations preserve that broader wording. In passages about Judas, however,
    the contextual sense in English is conventionally and accurately 'betray,' since
    the act is not a neutral transfer but treachery. This is a lexical-theological
    decision because 'betray' foregrounds the moral character of the act, while 'hand
    over' preserves verbal consistency across contexts. The main text uses the contextually
    specific sense, with the literal alternative preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
