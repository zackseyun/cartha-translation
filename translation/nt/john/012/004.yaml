id: JHN.12.4
reference: John 12:4
source:
  edition: SBLGNT
  text: λέγει ⸀δὲ ⸂Ἰούδας ὁ Ἰσκαριώτης εἷς τῶν μαθητῶν αὐτοῦ⸃, ὁ μέλλων αὐτὸν παραδιδόναι·
translation:
  text: But Judas Iscariot, one of his disciples—the one who was about to betray him—said,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one who was about to hand him over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English commonly renders this narrative present as simple past ('said') in running
    narrative. This preserves natural readability while conveying the same discourse
    function.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the immediate contrast
    with the woman's act and the objection that follows. 'Now' or 'And' are possible,
    but 'But' better signals the narrative turn.
- source_word: Ἰούδας ὁ Ἰσκαριώτης
  chosen: Judas Iscariot
  alternatives:
  - Judas the Iscariot
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Judas Iscariot' is the established and natural English form.
- source_word: εἷς τῶν μαθητῶν αὐτοῦ
  chosen: one of his disciples
  alternatives:
  - one of his followers
  lexicon: BDAG
  rationale: μαθητής is best rendered 'disciple' in Gospel contexts because it preserves
    the teacher-disciple relationship central to the narrative. 'Followers' is broader
    and less precise.
- source_word: ὁ μέλλων
  chosen: the one who was about to
  alternatives:
  - who was going to
  - who would
  lexicon: BDAG
  rationale: μέλλω with infinitive often indicates imminence or future intention.
    'Was about to' preserves the anticipatory force and keeps the participial apposition
    clear in English.
- source_word: παραδιδόναι
  chosen: betray
  alternatives:
  - hand over
  - deliver over
  lexicon: BDAG
  rationale: While παραδίδωμι literally means 'hand over' or 'deliver,' in this context
    of Judas and Jesus the relational and narrative sense is specifically betrayal.
    'Betray' is the clearest contextual rendering in English, though the more literal
    alternative is worth preserving in a footnote.
