id: JHN.12.29
reference: John 12:29
source:
  edition: SBLGNT
  text: ὁ οὖν ὄχλος ὁ ἑστὼς καὶ ἀκούσας ἔλεγεν βροντὴν γεγονέναι· ἄλλοι ἔλεγον· Ἄγγελος
    αὐτῷ λελάληκεν.
translation:
  text: So the crowd that was standing there and had heard it was saying that thunder
    had happened; others were saying, “An angel has spoken to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “that it had thundered” or “that there had been thunder.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the preceding divine voice;
    'So' is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: Standard Johannine sense of a gathered mass of people; 'crowd' is readable
    modern English.
- source_word: ὁ ἑστὼς
  chosen: that was standing there
  alternatives:
  - standing
  - which stood there
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι functions adjectivally for the crowd's present
    posture/location. Expanded slightly in English for natural syntax and to reflect
    the scene.
- source_word: ἀκούσας
  chosen: had heard it
  alternatives:
  - having heard
  - heard
  lexicon: BDAG
  rationale: Aorist participle prior to the main verb; 'had heard it' conveys antecedent
    action clearly in English. 'It' is supplied because the object is implicit from
    context, namely the voice/sound just mentioned in the previous verse.
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect suggests ongoing/repeated speech; 'was saying' preserves the
    aspect better than simple past.
- source_word: βροντὴν γεγονέναι
  chosen: that thunder had happened
  alternatives:
  - that it had thundered
  - that there had been thunder
  lexicon: BDAG
  rationale: The Greek is literally 'thunder to have happened/come about.' The chosen
    rendering stays close to the form while remaining intelligible. A smoother idiomatic
    alternative is preserved in a footnote.
- source_word: ἄλλοι
  chosen: others
  alternatives:
  - other people
  lexicon: BDAG
  rationale: Contrasts a second group within the crowd.
- source_word: Ἄγγελος
  chosen: An angel
  alternatives:
  - A messenger
  lexicon: BDAG
  rationale: In this context the referent is a heavenly being, not a human messenger,
    given the crowd's interpretation of a heavenly voice.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: Dative indirect object after λαλέω is naturally rendered 'to him'; the
    referent is Jesus.
- source_word: λελάληκεν
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with present relevance; 'has
    spoken' preserves that force better than simple past.
