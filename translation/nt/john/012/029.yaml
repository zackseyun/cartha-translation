theological_decisions:
- issue: Nature of the heavenly speaker
  chosen_reading: An angel has spoken to him
  alternative_readings:
  - A messenger has spoken to him
  rationale: The context is the crowd's interpretation of the heavenly voice from
    the previous verse. Rendering ἄγγελος as 'angel' reflects the likely supernatural
    referent without adding doctrinal explanation beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
