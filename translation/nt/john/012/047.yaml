theological_decisions:
- issue: Meaning of Jesus' statement 'I do not judge him' in relation to Johannine
    judgment language
  chosen_reading: Render κρίνω consistently as 'judge' and leave the temporal/missional
    nuance implicit in context.
  alternative_readings:
  - Render as 'condemn' to stress final adverse judgment
  - Explicitly paraphrase as 'I am not judging him now'
  rationale: The verse states the purpose of Jesus' coming in this mission as salvation
    rather than judgment. Translating κρίνω as 'judge' preserves the tension with
    nearby passages where judgment is also attributed to Jesus, without resolving
    it by paraphrase or doctrinal harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine pronoun αὐτόν
  chosen_reading: Use 'him' in the main text.
  alternative_readings:
  - '''that person'''
  - singular 'them'
  rationale: The Greek is singular masculine following τις with representative generic
    force. Per the translation philosophy, gender-accurate rendering is preferred
    over gender-neutral smoothing; an inclusivity-oriented alternative is worth preserving
    in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
