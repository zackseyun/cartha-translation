id: JHN.12.47
reference: John 12:47
source:
  edition: SBLGNT
  text: καὶ ἐάν τίς μου ἀκούσῃ τῶν ῥημάτων καὶ μὴ ⸀φυλάξῃ, ἐγὼ οὐ κρίνω αὐτόν, οὐ
    γὰρ ἦλθον ἵνα κρίνω τὸν κόσμον ἀλλ’ ἵνα σώσω τὸν κόσμον.
translation:
  text: And if anyone hears my words and does not keep them, I do not judge him; for
    I did not come to judge the world, but to save the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not condemn him.' The Greek verb can mean 'judge' or, in context,
      carry the sense of adverse judgment.
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''him,'' with generic force: the statement applies to anyone who
      hears and does not keep Jesus'' words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τίς
  chosen: if anyone
  alternatives:
  - if someone
  lexicon: BDAG
  rationale: Indefinite conditional construction introducing a general case. 'Anyone'
    is natural modern English and preserves the open, generic force.
- source_word: ἀκούσῃ
  chosen: hears
  alternatives:
  - listens to
  lexicon: BDAG
  rationale: Primary sense is to hear. 'Hears' keeps the verbal link with Jesus' spoken
    message without adding the stronger nuance of attentive response that 'listens
    to' may imply.
- source_word: τῶν ῥημάτων
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: BDAG
  rationale: ῥήματα refers to spoken words/utterances. 'My words' is both natural
    and sufficiently formal; 'sayings' sounds more stylized, and 'what I say' is more
    paraphrastic.
- source_word: φυλάξῃ
  chosen: keep them
  alternatives:
  - obey them
  - guard them
  lexicon: BDAG
  rationale: φυλάσσω can mean keep, guard, observe. In Johannine usage it often carries
    the sense of keeping Jesus' word in obedient fidelity. 'Keep them' preserves the
    broader semantic range, allowing both retention and obedience, whereas 'obey'
    narrows the sense.
- source_word: οὐ κρίνω αὐτόν
  chosen: I do not judge him
  alternatives:
  - I do not condemn him
  - I do not judge that person
  lexicon: BDAG
  rationale: κρίνω is 'judge' in the immediate context, repeated in the purpose clause.
    Retaining 'judge' preserves lexical consistency and the theological tension with
    other Johannine statements about judgment. 'Condemn' is interpretive. 'Him' reflects
    the singular masculine pronoun tied to the generic τις.
- source_word: ἦλθον
  chosen: I did not come
  alternatives:
  - I have not come
  lexicon: BDAG
  rationale: Aorist refers to Jesus' coming/mission in summary. English simple past
    is the most natural rendering here.
- source_word: ἵνα κρίνω
  chosen: to judge
  alternatives:
  - in order to judge
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. Infinitival 'to judge' is
    idiomatic English and adequately conveys purpose without wooden phrasing.
- source_word: κόσμον
  chosen: the world
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the world of humanity in its fallen order.
    'The world' is the standard and contextually appropriate rendering; no narrower
    gloss is warranted here.
- source_word: σώσω
  chosen: save
  alternatives:
  - rescue
  lexicon: BDAG
  rationale: σῴζω is a central theological verb meaning save/rescue. 'Save' best preserves
    the established Johannine and broader biblical soteriological sense.
