theological_decisions:
- issue: Messianic citation/allusion to Zechariah 9:9 and related prophetic language
  chosen_reading: Retain the prophetic address 'daughter of Zion' and royal title
    'your King' in straightforward English without expanding the allusion in the main
    text.
  alternative_readings:
  - More explicitly interpretive renderings that identify Zion as Jerusalem or expand
    the messianic significance in the verse itself
  rationale: The verse presents Jesus in fulfillment of prophetic royal imagery, but
    the translation should preserve the text's wording rather than import explanatory
    interpretation into the main line. The allusive force is maintained by keeping
    the prophetic diction recognizable.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Capitalization of 'King'
  chosen_reading: Capitalize 'King'
  alternative_readings:
  - lowercase 'king'
  rationale: Greek manuscripts do not mark capitalization, so this is an English editorial
    decision. Capitalization reflects the title-like, messianic reference to Jesus
    while not altering lexical content. This is a readability and reverential convention,
    not an added doctrinal claim beyond the context.
  doctrine_reference: Affirmations; Translation philosophy §6
