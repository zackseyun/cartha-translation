id: JHN.12.15
reference: John 12:15
source:
  edition: SBLGNT
  text: Μὴ φοβοῦ, θυγάτηρ Σιών· ἰδοὺ ὁ βασιλεύς σου ἔρχεται, καθήμενος ἐπὶ πῶλον ὄνου.
translation:
  text: Do not be afraid, daughter of Zion. Look, your King is coming, seated on a
    donkey’s colt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fear.'
    reason: lexical_alternative
  - marker: b
    text: '''Daughter of Zion'' is a prophetic personification of Zion/Jerusalem.'
    reason: cultural_note
  - marker: c
    text: Or 'Behold' or 'See.'
    reason: lexical_alternative
  - marker: d
    text: Literally, 'on a colt of a donkey.'
    reason: lexical_alternative
  - marker: e
    text: This wording echoes Zechariah 9:9, presenting Jesus as Zion’s promised king.
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  - Fear not
  lexicon: BDAG
  rationale: Imperative with μή + present middle/passive imperative of φοβέομαι expresses
    prohibition of fear. 'Do not be afraid' is natural modern English and preserves
    the force without archaic diction.
- source_word: θυγάτηρ Σιών
  chosen: daughter of Zion
  alternatives:
  - Daughter Zion
  - daughter Zion
  lexicon: BDAG
  rationale: Vocative θυγάτηρ with genitive Σιών reflects the prophetic personification
    of Zion/Jerusalem as a daughter. 'daughter of Zion' is the established and transparent
    English equivalent.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic particle drawing attention. 'Look' preserves the discourse function
    in readable modern English better than archaic 'Behold.'
- source_word: ὁ βασιλεύς σου
  chosen: your King
  alternatives:
  - your king
  lexicon: BDAG
  rationale: Definite noun phrase with possessive pronoun. Capitalized 'King' is used
    because the referent is Jesus in a messianic royal context; this signals title-like
    force without changing the meaning.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on his way
  lexicon: BDAG
  rationale: Present middle/passive indicative used with vivid immediacy. English
    progressive 'is coming' best captures the present, in-progress sense in context.
- source_word: καθήμενος
  chosen: seated
  alternatives:
  - sitting
  - mounted
  lexicon: BDAG
  rationale: Present participle of κάθημαι describes the manner of his coming. 'Seated'
    is concise and idiomatic; 'mounted' would add an interpretive nuance not explicit
    in the participle itself.
- source_word: ἐπὶ πῶλον ὄνου
  chosen: on a donkey’s colt
  alternatives:
  - on a colt of a donkey
  - on a young donkey
  lexicon: BDAG
  rationale: πῶλος denotes a young animal/colt; ὄνου specifies that it is of a donkey.
    'a donkey’s colt' is natural English and preserves both elements of the Greek.
