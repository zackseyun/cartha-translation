id: JHN.12.10
reference: John 12:10
source:
  edition: SBLGNT
  text: ἐβουλεύσαντο δὲ οἱ ἀρχιερεῖς ἵνα καὶ τὸν Λάζαρον ἀποκτείνωσιν,
translation:
  text: So the chief priests decided to kill Lazarus also,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'planned to kill Lazarus too.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύσαντο
  chosen: decided
  alternatives:
  - planned
  - took counsel
  - resolved
  lexicon: BDAG
  rationale: The verb βουλεύομαι here denotes deliberation leading to a settled course
    of action. 'Decided' gives clear modern English while preserving the sense of
    intentional resolve. 'Planned' is possible but slightly more process-oriented;
    'took counsel' is more formal but less natural in contemporary English.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a connective with flexible force. In this narrative context, 'So'
    naturally conveys progression from the previous verse's cause-and-effect flow.
    'And' is possible but flatter; 'but' would overstate contrast.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the leading priests
  lexicon: BDAG
  rationale: ἀρχιερεῖς in the Gospels commonly refers to the chief-priestly leadership
    rather than a single high priest. 'Chief priests' is the standard and most precise
    rendering in context.
- source_word: ἵνα
  chosen: to
  alternatives:
  - in order that
  - so that
  lexicon: BDAG
  rationale: With a verb of planning/deciding, ἵνα plus subjunctive expresses intended
    purpose/content. English idiom after 'decided' is best represented by the infinitive
    'to' rather than the more wooden 'in order that' or 'so that.'
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: καί here adds Lazarus to the group targeted by the chief priests, likely
    in addition to Jesus. 'Also' captures the additive force clearly. 'Even' would
    add emphasis not required by the Greek.
- source_word: τὸν Λάζαρον
  chosen: Lazarus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. The article is not separately represented in English.
- source_word: ἀποκτείνωσιν
  chosen: kill
  alternatives:
  - put to death
  - murder
  lexicon: BDAG
  rationale: ἀποκτείνω means 'kill' or 'put to death.' 'Kill' is the most direct and
    natural rendering here. 'Put to death' is more formal and can imply judicial process,
    which is not explicit in this clause; 'murder' imports moral evaluation beyond
    the lexical content.
