theological_decisions:
- issue: Narrative portrayal of the chief priests' intent toward Lazarus
  chosen_reading: Render the clause straightforwardly as a hostile decision to kill
    Lazarus, without adding explanatory motive beyond the immediate context.
  alternative_readings:
  - Render with stronger premeditation language such as 'plotted' or 'conspired'
  rationale: The verse states a deliberate decision by the chief priests but does
    not itself use a specialized term for conspiracy. The translation preserves the
    gravity of their intent without importing additional interpretive shading.
  doctrine_reference: 'Translation philosophy: preserve what the source text plainly
    says without importing doctrinal or interpretive claims.'
