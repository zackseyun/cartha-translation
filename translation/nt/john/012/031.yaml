id: JHN.12.31
reference: John 12:31
source:
  edition: SBLGNT
  text: νῦν κρίσις ἐστὶν τοῦ κόσμου τούτου, νῦν ὁ ἄρχων τοῦ κόσμου τούτου ἐκβληθήσεται
    ἔξω·
translation:
  text: Now is the judgment of this world; now the ruler of this world will be cast
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prince of this world.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the ruler of this world' is commonly understood to refer to
      Satan.
    reason: alternative_reading
lexical_decisions:
- source_word: νῦν
  chosen: Now
  alternatives:
  - at this time
  lexicon: BDAG
  rationale: Rendered as 'Now' in both occurrences to preserve the emphatic temporal
    force and the parallel structure of the Greek.
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - judgment crisis
  - condemnation
  lexicon: BDAG
  rationale: '''Judgment'' best fits Johannine usage here: a decisive act of judgment
    falling on ''this world,'' not merely an abstract process of evaluation.'
- source_word: κόσμου τούτου
  chosen: this world
  alternatives:
  - the world
  - this age
  lexicon: BDAG
  rationale: Translated literally as 'this world' to preserve the demonstrative τούτου
    and the Johannine contrast between the present world-order and God's reign.
- source_word: ἄρχων
  chosen: ruler
  alternatives:
  - prince
  - leader
  lexicon: BDAG
  rationale: '''Ruler'' is clear modern English and preserves the sense of one exercising
    authority. ''Prince'' is traditional but less transparent in contemporary usage.'
- source_word: ἐκβληθήσεται ἔξω
  chosen: will be cast out
  alternatives:
  - will be driven out
  - will be thrown outside
  lexicon: BDAG
  rationale: The future passive of ἐκβάλλω with ἔξω intensifies expulsion. 'Will be
    cast out' preserves both the passive form and the force of removal/exclusion in
    idiomatic English.
