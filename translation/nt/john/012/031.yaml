theological_decisions:
- issue: Identity of 'the ruler of this world'
  chosen_reading: Left implicit in the main text as 'the ruler of this world' without
    interpretive expansion.
  alternative_readings:
  - Satan/the devil
  - the present world-system personified
  rationale: The phrase is widely understood in John as referring to Satan, but the
    Greek text itself uses the title rather than the name. The translation preserves
    the wording of the text and does not import an explicit identification into the
    main line.
  doctrine_reference: Preserve theological tension rather than resolve it.
