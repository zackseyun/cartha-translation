theological_decisions:
- issue: Nature of the stated inability to believe
  chosen_reading: Render the text straightforwardly as inability ('they were not able
    to believe') without importing a doctrinal explanation of why or how this inability
    operates.
  alternative_readings:
  - Soften to 'they would not believe'
  - Interpret explicitly in Calvinist or Arminian categories
  rationale: The Greek states inability, not merely unwillingness, and the translation
    should preserve that tension. At the same time, this verse alone does not require
    the translator to resolve broader debates about divine hardening and human responsibility;
    those belong to interpretation, not the wording of the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
