id: JHN.12.39
reference: John 12:39
source:
  edition: SBLGNT
  text: διὰ τοῦτο οὐκ ἠδύναντο πιστεύειν ὅτι πάλιν εἶπεν Ἠσαΐας·
translation:
  text: 'For this reason they were not able to believe, because Isaiah said again:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: διά with the accusative τοῦτο expresses cause or reason. 'For this reason'
    preserves the explicit causal link to the preceding context more clearly than
    the more inferential 'therefore.'
- source_word: οὐκ ἠδύναντο
  chosen: they were not able
  alternatives:
  - they could not
  lexicon: BDAG
  rationale: The imperfect middle/passive of δύναμαι denotes inability. 'Were not
    able' is slightly more transparent to the Greek form and preserves the sense of
    incapacity without softening it.
- source_word: πιστεύειν
  chosen: to believe
  alternatives:
  - to have faith
  lexicon: BDAG
  rationale: πιστεύω is most naturally rendered 'believe' here in Johannine usage.
    'Have faith' is possible but less idiomatic in this construction and less consistent
    with John's repeated use of the verb.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: In context ὅτι introduces the reason for their inability, namely the
    further citation from Isaiah in the next verse. 'Because' best captures the causal
    force here.
- source_word: πάλιν
  chosen: again
  alternatives:
  - further
  - in turn
  lexicon: BDAG
  rationale: πάλιν marks an additional citation from Isaiah, following the previous
    quotation. 'Again' is the most direct and natural rendering.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: λέγω in this citation formula is conventionally and accurately rendered
    'said.' 'Spoke' is possible but less idiomatic in English quotation introduction.
- source_word: Ἠσαΐας
  chosen: Isaiah
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
