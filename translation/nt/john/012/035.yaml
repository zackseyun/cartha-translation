theological_decisions:
- issue: Meaning of ἐν ὑμῖν in relation to 'the light'
  chosen_reading: among you
  alternative_readings:
  - in you
  - with you
  rationale: Given the immediate narrative setting, Jesus is speaking to a crowd about
    the limited duration of his presence as the light in the world. 'Among you' best
    preserves that public, relational presence without importing a later doctrine
    of indwelling. Because the Greek preposition ἐν can also be understood more internally
    or associatively, the alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
