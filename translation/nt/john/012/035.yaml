id: JHN.12.35
reference: John 12:35
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτοῖς ὁ Ἰησοῦς· Ἔτι μικρὸν χρόνον τὸ φῶς ⸂ἐν ὑμῖν⸃ ἐστιν. περιπατεῖτε
    ⸀ὡς τὸ φῶς ἔχετε, ἵνα μὴ σκοτία ὑμᾶς καταλάβῃ, καὶ ὁ περιπατῶν ἐν τῇ σκοτίᾳ οὐκ
    οἶδεν ποῦ ὑπάγει.
translation:
  text: So Jesus said to them, “The light is still among you for a little while. Walk
    while you have the light, so that darkness may not overtake you. The one who walks
    in the darkness does not know where he is going.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in you” or “with you.” The Greek phrase can be understood in more than
      one way, though “among you” best fits the immediate context of Jesus’ present
      public presence.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Rendered as a natural discourse connector in English, linking Jesus'
    statement to the preceding exchange without overstating logical force.
- source_word: Ἔτι μικρὸν χρόνον
  chosen: still ... for a little while
  alternatives:
  - yet a little while
  - for a short time longer
  lexicon: BDAG
  rationale: Captures both ἔτι ('still/yet') and the temporal phrase μικρὸν χρόνον
    in idiomatic modern English.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Retained literally. In Johannine context this carries metaphorical and
    christological weight, but the text itself uses the image directly and should
    not be paraphrased.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in you
  - with you
  lexicon: BDAG
  rationale: In this context Jesus speaks of the light's present presence in relation
    to the crowd, not primarily an inward indwelling. 'Among you' best fits the public,
    incarnational setting. The alternative 'in you' is preserved in a footnote because
    the Greek phrase can bear that sense.
- source_word: περιπατεῖτε
  chosen: Walk
  alternatives:
  - Live
  - Conduct yourselves
  lexicon: BDAG
  rationale: Kept the common biblical metaphor 'walk,' which is both literal enough
    to reflect the Greek and idiomatic enough to convey manner of life without flattening
    the imagery.
- source_word: ὡς
  chosen: while
  alternatives:
  - as
  - while/as long as
  lexicon: BDAG
  rationale: Here ὡς is best taken temporally in connection with ἔχετε ('while you
    have the light'), matching the urgency of the saying.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: Expresses purpose in clear modern English; 'lest' would be more formal
    but less natural for the target audience.
- source_word: σκοτία
  chosen: darkness
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering, preserving the Johannine
    light/darkness contrast.
- source_word: καταλάβῃ
  chosen: overtake
  alternatives:
  - seize
  - overcome
  - catch
  lexicon: BDAG
  rationale: '''Overtake'' fits the image of darkness coming upon someone in a way
    that leaves them lost. ''Overcome'' is possible, but here the motion/image of
    being caught by darkness is more prominent.'
- source_word: ὁ περιπατῶν
  chosen: The one who walks
  alternatives:
  - Whoever walks
  - The person walking
  lexicon: BDAG
  rationale: This preserves the substantival participle with a generic singular form
    in natural English.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: The article is retained in English because it suits John's thematic contrast
    with 'the light' and gives the phrase a more definite, literary force.
- source_word: οὐκ οἶδεν ποῦ ὑπάγει
  chosen: does not know where he is going
  alternatives:
  - does not know where he goes
  lexicon: BDAG
  rationale: Idiomatic English rendering of the present tense clause; preserves the
    existential and directional sense of ὑπάγει.
