theological_decisions:
- issue: Scope of πάντας in relation to salvation theology
  chosen_reading: all people
  alternative_readings:
  - all things
  - all without distinction
  - all without exception
  rationale: The Greek object is masculine plural, naturally referring to people rather
    than impersonal creation. The verse itself states the universal scope of Jesus'
    drawing activity without resolving later theological debates about whether this
    means every individual without exception or all kinds of people without distinction.
    The translation preserves the text's breadth while not importing a denominational
    conclusion.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Johannine double meaning of ὑψωθῶ
  chosen_reading: lifted up
  alternative_readings:
  - exalted
  rationale: John uses 'lifted up' to hold together crucifixion and exaltation. Rendering
    only 'exalted' would collapse the tension; rendering 'lifted up' preserves both
    the physical and theological dimensions.
  doctrine_reference: 'Translation philosophy #3'
