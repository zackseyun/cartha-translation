id: JHN.12.32
reference: John 12:32
source:
  edition: SBLGNT
  text: κἀγὼ ⸀ἐὰν ὑψωθῶ ἐκ τῆς γῆς, πάντας ἑλκύσω πρὸς ἐμαυτόν.
translation:
  text: And I, when I am lifted up from the earth, will draw all people to myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if I am lifted up.' The Greek uses a conditional form, but in context
      it refers to the impending certainty of Jesus' death.
    reason: alternative_reading
  - marker: b
    text: '''Lifted up'' can also carry the sense ''exalted,'' preserving John''s
      double meaning of crucifixion and glorification.'
    reason: lexical_alternative
  - marker: c
    text: Or simply 'all.' The Greek likely means all people, not necessarily making
      explicit how this relates to later theological debates about the extent of salvation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - And as for me
  - I also
  lexicon: BDAG
  rationale: 'The crasis joins καί + ἐγώ. In context it carries a mildly emphatic,
    connective force: ''And I.'' This preserves both the discourse connection and
    the personal emphasis without sounding unnatural.'
- source_word: ἐὰν
  chosen: when
  alternatives:
  - if
  lexicon: BDAG
  rationale: Although ἐάν with the subjunctive can be rendered 'if,' here Jesus speaks
    of an event presented as impending and certain within John's narrative. English
    'when' best conveys the force in idiomatic context without denying the conditional
    form.
- source_word: ὑψωθῶ
  chosen: am lifted up
  alternatives:
  - am exalted
  - am raised up
  lexicon: BDAG
  rationale: 'ὑψόω in John carries deliberate double meaning: physical lifting up
    on the cross and exaltation/glorification. ''Lifted up'' preserves that Johannine
    ambiguity better than ''exalted'' or ''raised up.'''
- source_word: ἐκ τῆς γῆς
  chosen: from the earth
  alternatives:
  - from the land
  - from the ground
  lexicon: BDAG
  rationale: γῆ here most naturally means 'earth/ground' in the sense of being lifted
    up from the earth in crucifixion, not specifically 'land.' 'From the earth' is
    the most natural and traditional English rendering and fits the explanatory note
    in the following verse.
- source_word: πάντας
  chosen: all people
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The masculine plural accusative can function generically. Rendering it
    as 'all people' makes explicit the human object in natural English and avoids
    an ambiguous bare 'all' that could be misconstrued as all things. This is gender-accurate
    to the representative sense rather than artificially masculine.
- source_word: ἑλκύσω
  chosen: will draw
  alternatives:
  - will attract
  - will pull
  lexicon: BDAG
  rationale: ἕλκω can denote drawing/pulling, sometimes with strong force. In Johannine
    theological context, 'draw' is the established and semantically appropriate rendering,
    preserving both attraction and efficacious movement without over-specifying the
    mechanism.
- source_word: πρὸς ἐμαυτόν
  chosen: to myself
  alternatives:
  - to me
  lexicon: BDAG
  rationale: The reflexive pronoun ἐμαυτόν is stronger than a simple object pronoun.
    'To myself' preserves the reflexive emphasis and matches natural English.
