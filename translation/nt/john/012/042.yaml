theological_decisions:
- issue: Nature of the rulers' response to Jesus in light of Johannine theology
  chosen_reading: Render ἐπίστευσαν straightforwardly as 'believed' without weakening
    it to 'professed belief' or strengthening it to 'were truly saved.'
  alternative_readings:
  - many professed faith superficially
  - many came to genuine saving faith
  rationale: The verse states that many among the rulers believed in Jesus, while
    also noting their failure to confess him openly. The translation should preserve
    this tension rather than resolve the theological status of their faith beyond
    what the text explicitly says.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
