id: JHN.12.42
reference: John 12:42
source:
  edition: SBLGNT
  text: ὅμως μέντοι καὶ ἐκ τῶν ἀρχόντων πολλοὶ ἐπίστευσαν εἰς αὐτόν, ἀλλὰ διὰ τοὺς
    Φαρισαίους οὐχ ὡμολόγουν ἵνα μὴ ἀποσυνάγωγοι γένωνται,
translation:
  text: Nevertheless, even among the rulers many believed in him, but because of the
    Pharisees they were not confessing it, so that they might not become excluded
    from the synagogue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be put out of the synagogue' or 'be expelled from the synagogue.' The
      Greek denotes exclusion from synagogue community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμως μέντοι
  chosen: Nevertheless
  alternatives:
  - Yet
  - However
  - Even so
  lexicon: BDAG
  rationale: The paired particles intensify concession/contrast. 'Nevertheless' captures
    the adversative force more naturally in English than a more wooden two-word rendering.
- source_word: καὶ ἐκ τῶν ἀρχόντων πολλοὶ
  chosen: even among the rulers many
  alternatives:
  - also many from among the rulers
  - many even of the authorities
  lexicon: BDAG
  rationale: ἐκ with the genitive marks source/group membership, and ἄρχοντες here
    refers to leading authorities rather than generic 'princes.' 'Rulers' is concise
    and idiomatic in Johannine context.
- source_word: ἐπίστευσαν εἰς αὐτόν
  chosen: believed in him
  alternatives:
  - believed into him
  - put faith in him
  lexicon: BDAG
  rationale: John regularly uses πιστεύω εἰς for personal trust directed toward Jesus.
    'Believed in him' is standard, accurate English and preserves the relational force
    without awkward literalism.
- source_word: διὰ τοὺς Φαρισαίους
  chosen: because of the Pharisees
  alternatives:
  - for fear of the Pharisees
  - on account of the Pharisees
  lexicon: BDAG
  rationale: διά with the accusative indicates cause. The fear element is implied
    by context but not explicit in this phrase, so 'because of' is the more textually
    restrained rendering.
- source_word: οὐχ ὡμολόγουν
  chosen: they were not confessing it
  alternatives:
  - they were not acknowledging him openly
  - they were not declaring it
  lexicon: BDAG
  rationale: The imperfect suggests ongoing refusal or habitual non-confession. Since
    the object is implicit from context, 'it' makes the English complete without over-specifying
    beyond the Greek.
- source_word: ἵνα μὴ
  chosen: so that they might not
  alternatives:
  - lest
  - in order that they would not
  lexicon: BDAG
  rationale: This expresses purpose aimed at avoiding a consequence. 'So that they
    might not' is clear modern English and preserves the purposive nuance.
- source_word: ἀποσυνάγωγοι γένωνται
  chosen: become excluded from the synagogue
  alternatives:
  - be put out of the synagogue
  - be expelled from the synagogue
  lexicon: BDAG
  rationale: ἀποσυνάγωγος denotes exclusion from synagogue membership/participation.
    'Become excluded from the synagogue' preserves the resultative sense of γένωνται
    and avoids importing a more formal juridical process than the term itself requires,
    while still conveying social-religious exclusion.
