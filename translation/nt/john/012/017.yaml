id: JHN.12.17
reference: John 12:17
source:
  edition: SBLGNT
  text: ἐμαρτύρει οὖν ὁ ὄχλος ὁ ὢν μετ’ αὐτοῦ ὅτε τὸν Λάζαρον ἐφώνησεν ἐκ τοῦ μνημείου
    καὶ ἤγειρεν αὐτὸν ἐκ νεκρῶν.
translation:
  text: So the crowd that had been with him when he called Lazarus out of the tomb
    and raised him from the dead was bearing witness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was testifying'; the Greek verb can denote giving testimony or bearing
      witness, a recurring theme in John.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρει
  chosen: was bearing witness
  alternatives:
  - was testifying
  - kept bearing witness
  - testified
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action in the narrative
    context, so an English progressive best reflects the aspect. 'Bearing witness'
    preserves Johannine usage of μαρτυρέω better than the more generic 'testified.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical connection to the preceding context. 'So' is
    natural modern English and preserves the inferential flow without sounding overly
    formal.
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος in John commonly refers to a crowd of people. 'Crowd' is clear,
    idiomatic modern English.
- source_word: ὁ ὢν μετ’ αὐτοῦ
  chosen: that had been with him
  alternatives:
  - which was with him
  - that was with him
  lexicon: BDAG
  rationale: The articular participle identifies the specific crowd in view. 'Had
    been with him' reads naturally in English and situates their presence at the earlier
    event now being recalled.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the event that the crowd witnessed.
- source_word: ἐφώνησεν
  chosen: he called
  alternatives:
  - he cried out to
  - he summoned
  lexicon: BDAG
  rationale: φωνέω here refers to Jesus calling Lazarus. 'Called' is the most direct
    and natural rendering; 'cried out to' would add emphasis not explicit in this
    verb alone.
- source_word: ἐκ τοῦ μνημείου
  chosen: out of the tomb
  alternatives:
  - from the tomb
  - out of the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context is a burial place. 'Out of the tomb' fits the
    motion implied with ἐκ and is standard, clear English.
- source_word: ἤγειρεν
  chosen: raised
  alternatives:
  - awakened
  - brought up
  lexicon: BDAG
  rationale: ἐγείρω in resurrection contexts is appropriately rendered 'raised.' This
    preserves the resurrection sense without paraphrase.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering in resurrection contexts. The
    more literal 'out from among the dead' is possible but less natural in English.
