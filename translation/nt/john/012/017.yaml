theological_decisions:
- issue: Rendering the resurrection statement about Lazarus
  chosen_reading: raised him from the dead
  alternative_readings:
  - brought him back from among the dead
  rationale: The Greek plainly states that Jesus raised Lazarus from the dead. The
    translation preserves the miracle claim without softening it or importing additional
    doctrinal explanation.
