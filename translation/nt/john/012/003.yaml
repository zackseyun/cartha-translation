id: JHN.12.3
reference: John 12:3
source:
  edition: SBLGNT
  text: ἡ οὖν ⸀Μαριὰμ λαβοῦσα λίτραν μύρου νάρδου πιστικῆς πολυτίμου ἤλειψεν τοὺς
    πόδας τοῦ Ἰησοῦ καὶ ἐξέμαξεν ταῖς θριξὶν αὐτῆς τοὺς πόδας αὐτοῦ· ἡ δὲ οἰκία ἐπληρώθη
    ἐκ τῆς ὀσμῆς τοῦ μύρου.
translation:
  text: Then Mary took a litra of costly pure nard perfume, anointed Jesus's feet,
    and wiped his feet with her hair. And the house was filled with the fragrance
    of the perfume.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A litra was a Roman unit of weight, roughly twelve ounces or about a third
      of a kilogram.
    reason: cultural_note
  - marker: b
    text: Or 'genuine nard'; the adjective translated 'pure' (πιστικῆς) is lexically
      debated.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional English: ''spikenard.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: Then
  alternatives:
  - So
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding scene. 'Then'
    is natural English in narrative and preserves the connective force without sounding
    overly formal.
- source_word: λαβοῦσα
  chosen: took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: Aorist participle preceding the main verbs; English narrative style naturally
    renders it with a finite verb coordinated into the sequence rather than a more
    wooden 'having taken.'
- source_word: λίτραν
  chosen: a litra
  alternatives:
  - a pound
  - about twelve ounces
  lexicon: BDAG
  rationale: Rendered by transliteration to preserve the ancient unit rather than
    replacing it with an imprecise modern equivalent. This keeps source-language specificity
    while remaining readable; quantity can be clarified in a footnote.
- source_word: μύρου
  chosen: perfume
  alternatives:
  - ointment
  - fragrant oil
  lexicon: BDAG
  rationale: μύρον refers to perfumed ointment/oil used for anointing. 'Perfume' is
    the clearest modern English term here, especially with the later mention of fragrance.
- source_word: νάρδου
  chosen: nard
  alternatives:
  - spikenard
  lexicon: BDAG
  rationale: '''Nard'' is concise modern English for the aromatic substance; ''spikenard''
    is traditional but less common. The source specifies the substance, so it is retained.'
- source_word: πιστικῆς
  chosen: pure
  alternatives:
  - genuine
  - liquid
  - of pistic nard
  lexicon: BDAG
  rationale: 'πιστικός is debated. ''Pure'' best fits the common sense in context:
    an expensive, genuine quality of nard. Because the term is contested lexically,
    alternatives are preserved in a footnote rather than hidden.'
- source_word: πολυτίμου
  chosen: costly
  alternatives:
  - very expensive
  - precious
  lexicon: BDAG
  rationale: Conveys high monetary value in idiomatic modern English. 'Costly' is
    concise and fits the narrative emphasis on the perfume's worth.
- source_word: ἤλειψεν
  chosen: anointed
  alternatives:
  - rubbed
  - smeared
  lexicon: BDAG
  rationale: ἀλείφω in this context refers to ceremonial/personal application of perfumed
    oil. 'Anointed' preserves both the physical act and its dignified connotations
    without overstating sacramental theology.
- source_word: τοὺς πόδας τοῦ Ἰησοῦ
  chosen: Jesus's feet
  alternatives:
  - the feet of Jesus
  lexicon: BDAG
  rationale: Possessive form is natural English and preserves the object of the action
    clearly.
- source_word: ἐξέμαξεν
  chosen: wiped
  alternatives:
  - dried
  - wiped off
  lexicon: BDAG
  rationale: The verb denotes wiping/drying by hand or cloth; here with hair as instrument.
    'Wiped' is the most direct rendering.
- source_word: ταῖς θριξὶν αὐτῆς
  chosen: with her hair
  alternatives:
  - with the hair of her head
  lexicon: BDAG
  rationale: Simple, natural English that preserves the instrumental dative.
- source_word: ἐπληρώθη
  chosen: was filled
  alternatives:
  - filled up
  lexicon: BDAG
  rationale: Passive verb naturally rendered as 'was filled'; it conveys the spreading
    effect of the fragrance through the house.
- source_word: ὀσμῆς
  chosen: fragrance
  alternatives:
  - smell
  - aroma
  lexicon: BDAG
  rationale: '''Fragrance'' fits the positive context of expensive perfume better
    than the more neutral ''smell.'''
- source_word: ἡ οἰκία
  chosen: the house
  alternatives:
  - the home
  lexicon: BDAG
  rationale: Straightforward rendering of the physical setting.
