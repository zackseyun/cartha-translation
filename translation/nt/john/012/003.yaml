theological_decisions:
- issue: Potential overreading of anointing language
  chosen_reading: Rendered ἤλειψεν as 'anointed' in its narrative sense without importing
    sacramental or coronation theology.
  alternative_readings:
  - Rendered more minimally as 'rubbed' or 'applied perfume to'
  rationale: The context clearly involves an act of anointing with perfume, but the
    translation should not force a theological interpretation beyond what the text
    states. 'Anointed' is lexically appropriate and preserves possible symbolic resonance
    while remaining text-bound.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
