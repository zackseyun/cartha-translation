id: JHN.12.26
reference: John 12:26
source:
  edition: SBLGNT
  text: ἐὰν ἐμοί ⸂τις διακονῇ⸃ ἐμοὶ ἀκολουθείτω, καὶ ὅπου εἰμὶ ἐγὼ ἐκεῖ καὶ ὁ διάκονος
    ὁ ἐμὸς ἔσται· ⸀ἐάν τις ἐμοὶ διακονῇ τιμήσει αὐτὸν ὁ πατήρ.
translation:
  text: If anyone serves me, let him follow me; and where I am, there my servant will
    be also. If anyone serves me, the Father will honor him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has a generic masculine singular construction: ''If anyone serves
      me ... the Father will honor him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονῇ
  chosen: serves
  alternatives:
  - ministers to
  lexicon: BDAG
  rationale: The verb διακονέω here denotes rendering service to Jesus. 'Serves' is
    natural modern English and matches the relational sense without sounding overly
    formal. 'Ministers to' is possible but can sound ecclesiastical and narrower than
    the Greek.
- source_word: ἀκολουθείτω
  chosen: let him follow
  alternatives:
  - he must follow
  - let him keep following
  lexicon: BDAG
  rationale: The present imperative calls for ongoing discipleship. 'Let him follow'
    preserves the imperative force in idiomatic English without over-specifying aspect.
    'He must follow' is stronger than necessary; 'keep following' makes the durative
    nuance more explicit but is less natural here.
- source_word: διάκονος
  chosen: servant
  alternatives:
  - minister
  - deacon
  lexicon: BDAG
  rationale: Although cognate with διακονέω, διάκονος here refers generally to one
    who serves Jesus, not to the later church office of 'deacon.' 'Servant' is the
    clearest contextual rendering. 'Minister' is possible but can imply office or
    clergy; 'deacon' would be misleading.
- source_word: ὅπου εἰμὶ ἐγὼ
  chosen: where I am
  alternatives:
  - where I myself am
  lexicon: BDAG
  rationale: The explicit ἐγώ adds emphasis, but English usually conveys this naturally
    without a marked reflexive. 'Where I am' is idiomatic; the emphasis is sufficiently
    carried by word order and context.
- source_word: ἐκεῖ καὶ
  chosen: there ... also
  alternatives:
  - there too
  lexicon: BDAG
  rationale: This preserves both the locative adverb and the additive καί. 'There
    ... also' is slightly more formal but mirrors the Greek structure well.
- source_word: τιμήσει
  chosen: will honor
  alternatives:
  - will value
  - will show honor to
  lexicon: BDAG
  rationale: τιμάω here means to honor or bestow honor. 'Will honor' is concise, natural,
    and preserves the future promise. 'Will show honor to' is more explicit but less
    elegant.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek reads simply 'the Father,' not 'my Father.' Retaining the article
    without adding 'my' avoids importing a possessive not present in the text while
    still reflecting Johannine usage.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any man
  lexicon: BDAG
  rationale: The indefinite pronoun is grammatically masculine but generic in force.
    'Anyone' communicates the inclusive sense in natural English without implying
    male-only reference.
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is grammatically masculine singular and refers back to the
    generic τις. Per the project's gender-accurate philosophy, 'him' preserves the
    source form and representative force better than flattening to 'that person.'
