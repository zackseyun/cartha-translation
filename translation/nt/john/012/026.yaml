theological_decisions:
- issue: Generic masculine reference in conditional statements
  chosen_reading: Use 'anyone' for τις but retain 'him' for the subsequent masculine
    pronouns.
  alternative_readings:
  - 'Use fully gender-neutral English throughout: ''If anyone serves me, they should
    follow me ... the Father will honor them.'''
  rationale: The Greek uses a generic indefinite with masculine singular agreement.
    Following the project's gender-accurate policy, the translation preserves the
    representative masculine where it appears while still rendering the indefinite
    naturally as 'anyone.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Implication of reward for service
  chosen_reading: Render the promise straightforwardly as 'the Father will honor him'
    without expanding its nature.
  alternative_readings:
  - Interpret the honor specifically as heavenly reward or eschatological glorification
    in the main text
  rationale: The verse promises divine honor to Jesus' servant but does not specify
    the exact form here. The translation preserves the theological breadth of the
    Greek rather than narrowing it to one doctrinal scheme.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
