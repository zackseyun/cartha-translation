theological_decisions:
- issue: Referent of the implied object in the divine reply
  chosen_reading: Supply 'it' to refer back to 'your name'
  alternative_readings:
  - 'Leave the object implicit: ''I have glorified, and I will glorify again'''
  rationale: Greek can leave the object unstated because it is recoverable from context,
    but English normally requires it. Supplying 'it' makes explicit that the Father
    speaks of glorifying his own name, not introducing a new object or idea.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering δοξάζω in a theologically loaded Johannine context
  chosen_reading: glorify
  alternative_readings:
  - honor
  - show glory to
  rationale: John regularly uses glory language in relation to the Father and the
    Son. 'Glorify' preserves this theological network and avoids reducing the statement
    to mere honor or reputation management.
  doctrine_reference: Translation philosophy §5
