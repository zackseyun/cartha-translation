id: JHN.12.28
reference: John 12:28
source:
  edition: SBLGNT
  text: πάτερ, δόξασόν σου τὸ ὄνομα. ἦλθεν οὖν φωνὴ ἐκ τοῦ οὐρανοῦ· Καὶ ἐδόξασα καὶ
    πάλιν δοξάσω.
translation:
  text: 'Father, glorify your name. Then a voice came from heaven: “I have glorified
    it, and I will glorify it again.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “I glorified it, and I will glorify it again.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάτερ
  chosen: Father
  alternatives:
  - My Father
  lexicon: BDAG
  rationale: Vocative of direct address to God. 'Father' is the plain and natural
    English equivalent; the possessive 'my' is not present in the Greek and should
    not be supplied.
- source_word: δόξασόν
  chosen: glorify
  alternatives:
  - honor
  - magnify
  lexicon: BDAG
  rationale: Aorist active imperative, second singular, from δοξάζω. 'Glorify' best
    preserves the Johannine theological sense of manifesting divine glory, whereas
    'honor' is weaker and 'magnify' is less idiomatic here.
- source_word: σου τὸ ὄνομα
  chosen: your name
  alternatives:
  - the name that is yours
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers not merely to a label but to God's
    revealed character and reputation. 'Your name' is the natural English rendering
    and preserves the biblical-theological weight of 'name' language without paraphrase.
- source_word: ἦλθεν οὖν
  chosen: Then ... came
  alternatives:
  - So ... came
  - Therefore ... came
  lexicon: BDAG
  rationale: ἦλθεν is aorist indicative of ἔρχομαι, used here of the arrival of a
    voice. οὖν marks narrative progression/inference; 'Then' is smoother modern English
    than 'therefore' and fits the discourse flow.
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - a sound
  lexicon: BDAG
  rationale: φωνή can mean 'sound' or 'voice,' but the following direct speech shows
    that an articulate 'voice' is intended.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: '''From heaven'' is the standard and contextually appropriate rendering,
    indicating divine origin. ''Sky'' would flatten the theological sense in Johannine
    usage.'
- source_word: Καὶ ἐδόξασα καὶ πάλιν δοξάσω
  chosen: I have glorified it, and I will glorify it again
  alternatives:
  - I glorified it, and I will glorify it again
  lexicon: BDAG
  rationale: 'The first verb is aorist active indicative, formally ''I glorified,''
    but in English the perfect ''I have glorified'' better conveys a completed act
    with present relevance in this divine response. The object ''it'' is supplied
    in English from the immediately preceding ''your name'' and is required for natural
    style. πάλιν is best attached to the future verb: ''again.'''
