id: JHN.12.9
reference: John 12:9
source:
  edition: SBLGNT
  text: Ἔγνω ⸀οὖν ὄχλος πολὺς ἐκ τῶν Ἰουδαίων ὅτι ἐκεῖ ἐστιν, καὶ ἦλθον οὐ διὰ τὸν
    Ἰησοῦν μόνον, ἀλλ’ ἵνα καὶ τὸν Λάζαρον ἴδωσιν ὃν ἤγειρεν ἐκ νεκρῶν.
translation:
  text: So a large crowd of the Jews learned that he was there, and they came not
    only because of Jesus, but also so that they might see Lazarus, whom he had raised
    from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from among the Judeans." The Greek term can refer either to Jewish people
      generally or, in some contexts in John, more specifically to Judeans.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔγνω
  chosen: learned
  alternatives:
  - came to know
  - found out
  - knew
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes coming to know or learning information,
    not merely possessing knowledge. 'Learned' is natural English and fits the narrative
    discovery sense.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence/inference from the preceding context. 'So'
    is readable modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὄχλος πολὺς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - many people
  lexicon: BDAG
  rationale: The phrase denotes a sizable multitude. 'A large crowd' is idiomatic
    and preserves both the singular collective noun and the adjective's emphasis.
- source_word: ἐκ τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from among the Jews
  - from the Judeans
  lexicon: BDAG
  rationale: The phrase identifies the crowd as drawn from the Ἰουδαῖοι. In John this
    term can mean Judeans or Jewish people depending on context. Here the broader
    festival/public setting supports 'the Jews' as a people-group designation, while
    'of the Jews' reflects ἐκ. The alternative 'from among the Jews' is possible but
    less concise.
- source_word: ὅτι ἐκεῖ ἐστιν
  chosen: that he was there
  alternatives:
  - that he is there
  lexicon: BDAG
  rationale: Although ἐστιν is present in Greek, English narrative style commonly
    backshifts to 'was' after a past reporting verb. The implied subject is Jesus
    from context. This is an optimal-equivalence adjustment for natural English.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  lexicon: BDAG
  rationale: Standard narrative motion verb; 'came' matches the deictic perspective
    of the scene.
- source_word: οὐ διὰ τὸν Ἰησοῦν μόνον
  chosen: not only because of Jesus
  alternatives:
  - not only on account of Jesus
  - not only for Jesus' sake
  lexicon: BDAG
  rationale: διά with the accusative here expresses reason or motive. 'Because of
    Jesus' is clear, idiomatic, and preserves the causal sense.
- source_word: ἀλλ’ ἵνα καὶ
  chosen: but also so that
  alternatives:
  - but also in order that
  - but also that
  lexicon: BDAG
  rationale: This construction contrasts motives and introduces purpose. 'But also
    so that' preserves both the adversative and purposive force in natural English.
- source_word: ἴδωσιν
  chosen: they might see
  alternatives:
  - they may see
  - they could see
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses purpose. 'Might see' is a standard
    English rendering for this purposive nuance in past narrative.
- source_word: Λάζαρον
  chosen: Lazarus
  lexicon: BDAG
  rationale: Personal name transliterated according to the project's policy to transliterate
    names.
- source_word: ὃν ἤγειρεν ἐκ νεκρῶν
  chosen: whom he had raised from the dead
  alternatives:
  - whom he raised from the dead
  lexicon: BDAG
  rationale: ἐγείρω here refers to restoring Lazarus to life. English past perfect
    ('had raised') clarifies that this action preceded the crowd's arrival. 'From
    the dead' is the standard rendering of ἐκ νεκρῶν in this context.
