theological_decisions:
- issue: Rendering of Ἰουδαίων in Johannine context
  chosen_reading: of the Jews
  alternative_readings:
  - from among the Judeans
  rationale: John's use of Ἰουδαῖοι can be contextually sensitive and sometimes geographically
    focused. In this verse the phrase modifies the crowd as a subset of the Jewish
    populace rather than functioning as a polemical label. 'Of the Jews' preserves
    the traditional ethnic-religious sense without importing anti-Jewish overtones,
    while the geographic alternative remains possible but less clearly demanded by
    the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
