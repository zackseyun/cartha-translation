theological_decisions:
- issue: Gendered familial expression in υἱοὶ φωτός
  chosen_reading: sons of light
  alternative_readings:
  - children of light
  rationale: Following the doctrine's gender-accurate principle, the masculine noun υἱοί is retained as 'sons' rather than neutralized. Because the phrase is idiomatic and representative, the inclusive sense can be noted in a footnote without flattening the source form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Johannine πιστεύω expression
  chosen_reading: believe in the light
  alternative_readings:
  - trust in the light
  - put your faith in the light
  rationale: The verse is not one of the specifically contested 'pistis Christou' constructions, so no doctrinally loaded ambiguity must be preserved. 'Believe in' is the most direct and idiomatic rendering of πιστεύω εἰς in John and preserves the theological call to faith without interpretive embellishment.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve alternatives where contested'
revisions:
- timestamp: '2026-04-21T12:26:22Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/012/036.json
  category: awkward_english
  tier: 1
  from: and after departing he hid himself from them
  to: and he departed and hid from them
  rationale: The current rendering, 'after departing he hid,' is grammatically correct but slightly stilted. The use of 'after' with the '-ing' participle is a very literal way to express the temporal priority of the Greek aorist participle (ἀπελθὼν). A more common and natural English idiom for this Greek construction (participle + main verb) is to use two coordinated finite verbs, as in 'he departed and hid.' This is more concise and improves the narrative flow without losing any meaning.
