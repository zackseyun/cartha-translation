id: JHN.12.36
reference: John 12:36
source:
  edition: SBLGNT
  text: ⸀ὡς τὸ φῶς ἔχετε, πιστεύετε εἰς τὸ φῶς, ἵνα υἱοὶ φωτὸς γένησθε. Ταῦτα ⸀ἐλάλησεν Ἰησοῦς, καὶ ἀπελθὼν ἐκρύβη ἀπ’ αὐτῶν.
translation:
  text: While you have the light, believe in the light, so that you may become sons of light. Jesus spoke these things, and he departed and hid from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of light.' The Greek reads 'sons of light,' an idiom for people characterized by light.
    reason: lexical_alternative
  - marker: b
    text: Or 'and after departing he hid himself from them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὡς
  chosen: While
  alternatives:
  - As long as
  - When
  lexicon: BDAG
  rationale: 'In this construction with the present indicative (''ὡς ... ἔχετε''), the sense is temporal: ''while/as long as you have.'' ''While'' is idiomatic modern English and preserves the urgency without overextending to a more interpretive ''as long as.'''
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Definite article retained. In Johannine context 'the light' carries both literal and christological/theological resonance; the translation preserves that established motif without paraphrase.
- source_word: πιστεύετε εἰς τὸ φῶς
  chosen: believe in the light
  alternatives:
  - put your faith in the light
  - trust in the light
  lexicon: BDAG
  rationale: For πιστεύω the project default under πίστις is 'faith'; here the verbal form is best rendered 'believe.' The preposition εἰς is naturally expressed in English as 'in.' 'Believe in' preserves Johannine diction and avoids over-interpretive expansion.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is natural modern English and adequately preserves the clause's telic force.
- source_word: υἱοὶ φωτός
  chosen: sons of light
  alternatives:
  - children of light
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural υἱοί. Per doctrine, gender-accurate renderings are preferred over gender-neutral when the source uses masculine forms with representative force. 'Sons of light' also preserves the idiomatic Semitic/Johannine sense of those characterized by light. The more inclusive 'children of light' is preserved in a footnote as a possible idiomatic alternative.
- source_word: γένησθε
  chosen: may become
  alternatives:
  - may be
  - may come to be
  lexicon: BDAG
  rationale: Aorist middle subjunctive of γίνομαι here denotes becoming, not merely being. 'May become' preserves the ingressive nuance tied to the purpose clause.
- source_word: Ταῦτα ἐλάλησεν
  chosen: Jesus spoke these things
  alternatives:
  - Jesus said these things
  lexicon: BDAG
  rationale: λαλέω often means 'speak' rather than the more content-focused 'say.' 'Spoke these things' is slightly more formal but remains natural and reflects the Greek wording closely.
- source_word: ἀπελθὼν
  chosen: after departing
  alternatives:
  - having gone away
  - departing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates prior action. 'After departing' makes the temporal sequence explicit in smooth English.
- source_word: ἐκρύβη ἀπ’ αὐτῶν
  chosen: he hid himself from them
  alternatives:
  - he was hidden from them
  - he withdrew from them
  lexicon: BDAG
  rationale: Although formally passive, κρύπτω in this intransitive/passive form can function with middle-like sense in context. 'He hid himself from them' best fits the narrative action and avoids implying merely that someone else concealed him.
