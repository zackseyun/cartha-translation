theological_decisions:
- issue: Meaning of Ἰουδαίων in Johannine context
  chosen_reading: Rendered as 'the Jews' in the main text, referring here to many
    people within the Jewish population rather than making it a blanket ethnic condemnation.
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: John uses Ἰουδαῖοι with varying referents. In this verse, the syntax
    'many of the Jews' points to a subset of a larger group, not to all Jews universally,
    and the immediate context concerns people responding to Lazarus's resurrection.
    The translation preserves the Greek wording in the text while documenting the
    narrower geographical reading 'Judeans' as possible.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Force of πιστεύω εἰς
  chosen_reading: Rendered as 'were believing in Jesus' rather than a stronger doctrinal
    paraphrase such as 'were becoming disciples' or 'were being saved.'
  alternative_readings:
  - were putting their faith in Jesus
  - were trusting in Jesus
  rationale: The verse states belief directed toward Jesus but does not itself specify
    the full theological implications of that belief. The translation therefore preserves
    the text's wording without importing later doctrinal conclusions.
  doctrine_reference: 'Affirmations: do not import doctrinal claims the text does
    not make; Contested terms: πίστις → faith'
