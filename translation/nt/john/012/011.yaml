  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/012/011.json
  category: awkward_english
  tier: 1
  from: because many of the Jews were going away because of him
  to: because many of the Jews were going away on account of him
  rationale: The repetition of 'because' ('ὅτι' and 'δι’ αὐτὸν') in close proximity
    creates a slightly awkward construction in English. While grammatically correct,
    using 'on account of him' for 'δι’ αὐτὸν' (which is listed as an alternative in
    the lexical decisions) would improve the flow and readability without altering
    the meaning or theological nuance. The initial 'because' introduces the reason
    for the chief priests' actions in the previous verse, while 'on account of him'
    clarifies the reason for the Jews' actions.
