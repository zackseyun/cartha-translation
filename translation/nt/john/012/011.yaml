id: JHN.12.11
reference: John 12:11
source:
  edition: SBLGNT
  text: ὅτι πολλοὶ δι’ αὐτὸν ὑπῆγον τῶν Ἰουδαίων καὶ ἐπίστευον εἰς τὸν Ἰησοῦν.
translation:
  text: because many of the Jews were going away because of him and were believing
    in Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many of the Judeans.' In John, 'the Jews' can sometimes refer more specifically
      to Judeans or to Jewish authorities, depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'were departing' or 'were leaving.' The Greek verb suggests ongoing movement
      away, likely from the stance or influence of the authorities opposing Jesus.
    reason: lexical_alternative
  - marker: c
    text: Or 'were putting their faith in Jesus' or 'were trusting in Jesus.'
    reason: lexical_alternative
  - marker: d
    text: Or 'because many of the Jews were going away because of him'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason the chief priests wanted to kill Lazarus (v. 10).
    'Because' is clearer in modern English than 'for' while preserving the causal
    force.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural and sufficiently
    precise rendering.
- source_word: δι’ αὐτὸν
  chosen: because of him
  alternatives:
  - on account of him
  - through him
  lexicon: BDAG
  rationale: 'With διά + accusative, the sense is causal here: Lazarus was the reason
    many were responding this way. ''Because of him'' is idiomatic and clear.'
- source_word: ὑπῆγον
  chosen: were going away
  alternatives:
  - were departing
  - were leaving
  lexicon: BDAG
  rationale: Imperfect of ὑπάγω conveys ongoing or repeated action. In context, it
    refers to people withdrawing from the position or company of the Judean authorities/opponents,
    not merely physical travel. 'Were going away' preserves the verbal image without
    over-interpreting it as formal apostasy.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from among the Jews
  - of the Judeans
  lexicon: BDAG
  rationale: 'The genitive is best taken as a whole-partitive relation with πολλοὶ:
    ''many of the Jews.'' In John''s Gospel, Ἰουδαῖοι can mean Judeans or the Jewish
    authorities in some contexts, but here the phrase most naturally denotes many
    people from the Jewish population in Jerusalem who were being influenced by Lazarus''s
    raising. ''Of the Jews'' keeps the Greek form while avoiding an overly narrow
    interpretive decision. The possible nuance ''Judeans'' is preserved in a footnote.'
- source_word: ἐπίστευον εἰς τὸν Ἰησοῦν
  chosen: were believing in Jesus
  alternatives:
  - were putting their faith in Jesus
  - were trusting in Jesus
  lexicon: BDAG
  rationale: Imperfect aspect again suggests ongoing/repeated response. The construction
    πιστεύω εἰς commonly denotes personal belief directed toward Jesus. Following
    the project's default for πίστις/πιστεύω cognates, 'believing' / 'faith' language
    is preferred in the main text, while 'trusting' can be noted as a lexical alternative
    if needed.
