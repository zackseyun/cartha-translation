id: JHN.12.21
reference: John 12:21
source:
  edition: SBLGNT
  text: οὗτοι οὖν προσῆλθον Φιλίππῳ τῷ ἀπὸ Βηθσαϊδὰ τῆς Γαλιλαίας, καὶ ἠρώτων αὐτὸν
    λέγοντες· Κύριε, θέλομεν τὸν Ἰησοῦν ἰδεῖν.
translation:
  text: So these came to Philip, who was from Bethsaida in Galilee, and were asking
    him, saying, “Lord, we want to see Jesus.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, we want to see Jesus.” The Greek vocative κύριε can be a respectful
      form of address to a person as well as “Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  chosen: these
  alternatives:
  - they
  - these men
  lexicon: BDAG
  rationale: Demonstrative plural referring back to the Greeks mentioned in the previous
    verse. 'These' preserves the discourse connection more closely than the simple
    pronoun 'they.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: προσῆλθον
  chosen: came to
  alternatives:
  - approached
  - went to
  lexicon: BDAG
  rationale: Aorist of προσέρχομαι, commonly 'come/go to, approach.' 'Came to' is
    idiomatic and readable in narrative context.
- source_word: Φιλίππῳ
  chosen: Philip
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Φίλιππος in dative
    form.
- source_word: τῷ ἀπὸ Βηθσαϊδὰ τῆς Γαλιλαίας
  chosen: who was from Bethsaida in Galilee
  alternatives:
  - the one from Bethsaida of Galilee
  - from Bethsaida of Galilee
  lexicon: BDAG
  rationale: The article with prepositional phrase identifies Philip. Rendering as
    a relative clause is natural English. 'In Galilee' is smoother than the more wooden
    'of Galilee' while preserving the geographic sense.
- source_word: ἠρώτων
  chosen: were asking
  alternatives:
  - asked
  - kept asking
  - requested
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or attempted action. 'Were asking' preserves
    that aspect better than simple past 'asked.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of their request. 'Saying'
    closely reflects the Greek construction and works naturally in English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, the default rendering is 'Lord,' with
    alternatives preserved in a footnote where relevant. In this context it can function
    as a respectful address to Philip, but 'Lord' follows the project's default for
    κύριος and keeps the lexical transparency.
- source_word: θέλομεν
  chosen: we want
  alternatives:
  - we wish
  - we desire
  lexicon: BDAG
  rationale: θέλω expresses desire/intention. 'We want' is straightforward modern
    English and fits the directness of the request.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Direct object with article; standard English does not require the article
    before a personal name here.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to meet
  - to speak with
  lexicon: BDAG
  rationale: Aorist infinitive of ὁράω, literally 'to see.' While context may imply
    an audience or meeting, the translation should not paraphrase beyond the source
    text.
