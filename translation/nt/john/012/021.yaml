theological_decisions:
- issue: Rendering of κύριος in direct address to Philip
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The project doctrine lists κύριος with default rendering 'Lord.' In this
    verse the address is likely a polite form to Philip rather than an explicit christological
    confession, so 'Sir' is a plausible contextual alternative; it is preserved in
    a footnote rather than adopted in the main text to maintain consistency and auditability.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
