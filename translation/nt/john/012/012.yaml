id: JHN.12.12
reference: John 12:12
source:
  edition: SBLGNT
  text: Τῇ ἐπαύριον ⸀ὁ ὄχλος πολὺς ὁ ἐλθὼν εἰς τὴν ἑορτήν, ἀκούσαντες ὅτι ἔρχεται
    ⸁ὁ Ἰησοῦς εἰς Ἱεροσόλυμα,
translation:
  text: The next day, the large crowd that had come to the feast, when they heard
    that Jesus was coming to Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'festival' for 'feast' (ἑορτή).
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses a historical present: ''Jesus is coming to Jerusalem.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  chosen: The next day
  alternatives:
  - On the next day
  - The following day
  lexicon: BDAG
  rationale: Idiomatic temporal dative/adverbial expression best rendered as a natural
    English time marker. 'The next day' preserves the narrative sequence without unnecessary
    stiffness.
- source_word: ὁ ὄχλος πολὺς
  chosen: the large crowd
  alternatives:
  - the great crowd
  - the big crowd
  - the multitude
  lexicon: BDAG
  rationale: ὄχλος denotes a crowd/multitude; πολὺς here intensifies size. 'Large
    crowd' is clear modern English and avoids the slightly archaic 'multitude' while
    preserving the sense of a sizable public gathering.
- source_word: ὁ ἐλθὼν εἰς τὴν ἑορτήν
  chosen: that had come to the feast
  alternatives:
  - that had come to the festival
  - which had come to the feast
  lexicon: BDAG
  rationale: The articular participle functions attributively, modifying 'crowd.'
    English relative clause style is the most natural equivalent. 'Had come' reflects
    the participle's prior action relative to the main narrative moment. ἑορτή is
    rendered 'feast' here, fitting Johannine festival context and common biblical
    usage.
- source_word: ἀκούσαντες
  chosen: when they heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Although formally an aorist participle, it is nominative plural and shifts
    from the grammatically singular collective noun to the people within the crowd.
    'When they heard' captures the participial temporal force and makes the number
    shift natural in English.
- source_word: ὅτι ἔρχεται
  chosen: that Jesus was coming
  alternatives:
  - that Jesus is coming
  - that Jesus was on his way
  lexicon: BDAG
  rationale: The historical present ἔρχεται is commonly rendered with an English past-progressive
    in narrative for readability. 'Was coming' preserves the sense within past narration
    better than a wooden present.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: 'Personal name transliterated according to the project''s stated policy:
    translate titles, transliterate names.'
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: With verbs of motion, εἰς commonly means movement toward/into a place.
    'To Jerusalem' is the most idiomatic English rendering here and fits the narrative
    context of approach to the city.
