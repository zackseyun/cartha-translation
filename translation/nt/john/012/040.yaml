id: JHN.12.40
reference: John 12:40
source:
  edition: SBLGNT
  text: Τετύφλωκεν αὐτῶν τοὺς ὀφθαλμοὺς καὶ ⸀ἐπώρωσεν αὐτῶν τὴν καρδίαν, ἵνα μὴ ἴδωσιν
    τοῖς ὀφθαλμοῖς καὶ νοήσωσιν τῇ καρδίᾳ καὶ ⸀στραφῶσιν, καὶ ⸀ἰάσομαι αὐτούς.
translation:
  text: He has blinded their eyes and hardened their heart, so that they may not see
    with their eyes and understand with their heart and turn, and I would heal them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be converted' for 'turn.'
    reason: lexical_alternative
  - marker: b
    text: Some translations read 'I will heal them'; the Greek form is future, but
      'I would heal them' fits the quoted purpose/result construction in English.
    reason: lexical_alternative
  - marker: c
    text: This line echoes Isaiah 6:10.
    reason: cross_reference
lexical_decisions:
- source_word: Τετύφλωκεν
  chosen: has blinded
  alternatives:
  - blinded
  lexicon: BDAG
  rationale: Perfect tense conveys a present state resulting from a completed action;
    'has blinded' preserves that force better than simple past.
- source_word: ἐπώρωσεν
  chosen: hardened
  alternatives:
  - made callous
  - dulled
  lexicon: BDAG
  rationale: πωρόω commonly denotes hardening or making insensitive. 'Hardened' is
    the most natural English rendering and preserves the prophetic/judicial sense
    echoed from Isaiah 6.
- source_word: καρδίαν / καρδίᾳ
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: BDAG
  rationale: Though καρδία can include understanding, 'heart' preserves the biblical
    anthropology of the source text; the cognitive nuance is carried by 'understand.'
- source_word: ἵνα μὴ
  chosen: so that they may not
  alternatives:
  - lest
  - in order that not
  lexicon: BDAG
  rationale: This construction expresses purpose/result in the citation. 'So that
    they may not' is readable modern English and preserves the force without archaic
    'lest.'
- source_word: ἴδωσιν τοῖς ὀφθαλμοῖς
  chosen: see with their eyes
  alternatives:
  - perceive with their eyes
  lexicon: BDAG
  rationale: A straightforward rendering preserves the concrete imagery and parallelism
    with 'understand with their heart.'
- source_word: νοήσωσιν
  chosen: understand
  alternatives:
  - perceive
  - comprehend
  lexicon: BDAG
  rationale: νοέω here refers to mental grasp or comprehension. 'Understand' is idiomatic
    and fits the Isaiah citation.
- source_word: στραφῶσιν
  chosen: turn
  alternatives:
  - turn back
  - be converted
  lexicon: BDAG
  rationale: Passive aorist can be rendered intransitively in English as 'turn.' 'Be
    converted' is more interpretive and ecclesiastically loaded; 'turn' preserves
    the source's ambiguity and prophetic idiom.
- source_word: ἰάσομαι
  chosen: I would heal
  alternatives:
  - I will heal
  lexicon: BDAG
  rationale: Within the ἵνα-clause sequence echoing Isaiah, English idiom is best
    served by 'would heal' after 'so that they may not... and turn.' This preserves
    the contingent sense in the quoted judgment context while still reflecting the
    future form.
- source_word: αὐτῶν τὴν καρδίαν
  chosen: their heart
  alternatives:
  - their hearts
  lexicon: NA28/SBLGNT
  rationale: The Greek has singular 'heart,' likely collective, as in the Isaiah citation.
    Retaining singular preserves the source form and corporate sense.
