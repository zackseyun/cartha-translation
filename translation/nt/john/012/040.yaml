theological_decisions:
- issue: Divine agency in blinding and hardening
  chosen_reading: 'Retain explicit divine subject: ''He has blinded... and hardened...'''
  alternative_readings:
  - Impersonal/passive renderings that soften divine agency
  rationale: The Greek text explicitly attributes the action to a singular subject
    in the Isaiah citation. Per doctrine, the translation must preserve theological
    tension rather than soften a difficult claim about judicial hardening.
  doctrine_reference: Translation philosophy §3
- issue: Conversion language for στραφῶσιν
  chosen_reading: Render as 'turn' in the main text
  alternative_readings:
  - be converted
  rationale: The verse concerns repentance/return, but the Greek verb itself is broader.
    'Turn' preserves the text's wording without importing a narrower doctrinal formulation;
    the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
