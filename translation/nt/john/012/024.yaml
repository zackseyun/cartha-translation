id: JHN.12.24
reference: John 12:24
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ἐὰν μὴ ὁ κόκκος τοῦ σίτου πεσὼν εἰς τὴν γῆν ἀποθάνῃ,
    αὐτὸς μόνος μένει· ἐὰν δὲ ἀποθάνῃ, πολὺν καρπὸν φέρει.
translation:
  text: Truly, truly, I say to you, unless the grain of wheat falls into the ground
    and dies, it remains by itself; but if it dies, it bears much fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it remains alone.'
    reason: lexical_alternative
  - marker: b
    text: The image refers to a grain that must die in the ground in order to become
      fruitful; in context, Jesus applies this pattern to his own death and to those
      who follow him.
    reason: cross_reference
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most assuredly
  lexicon: BDAG
  rationale: The doubled ἀμήν is a solemn discourse marker in John. 'Truly, truly'
    preserves both the repetition and the emphatic force in natural modern English
    better than leaving it untranslated as 'Amen, amen.'
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the direct address and Johannine
    formula. 'I tell you' is possible, but 'I say to you' stays slightly closer to
    the Greek while remaining readable.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: This conditional idiom is naturally rendered 'unless' in English.
- source_word: ὁ κόκκος τοῦ σίτου
  chosen: the grain of wheat
  alternatives:
  - the kernel of wheat
  - the seed of wheat
  lexicon: BDAG
  rationale: κόκκος denotes a grain/seed. 'Grain of wheat' is idiomatic and fits the
    agricultural image. 'Kernel' is too specific; 'seed of wheat' is possible but
    less natural in English.
- source_word: πεσὼν εἰς τὴν γῆν
  chosen: falls into the ground
  alternatives:
  - having fallen into the earth
  - falls to the ground
  lexicon: BDAG
  rationale: The participle πεσών is adverbial, preceding the main verb ἀποθάνῃ. Rendering
    it with a finite verb in English ('falls') produces natural style while preserving
    the sequence. γῆ here is best rendered 'ground' in the agricultural context rather
    than 'earth'.
- source_word: ἀποθάνῃ
  chosen: dies
  alternatives:
  - should die
  lexicon: BDAG
  rationale: 'Aorist subjunctive in the conditional clause is naturally rendered with
    the simple present in English conditional style: ''unless ... dies'' / ''if it
    dies.'''
- source_word: αὐτὸς μόνος μένει
  chosen: it remains by itself
  alternatives:
  - it remains alone
  - it stays alone
  lexicon: BDAG
  rationale: αὐτός is intensive here and μόνος means 'alone/by itself.' 'Remains by
    itself' captures the sense that the grain stays solitary and unproductive. This
    avoids suggesting emotional loneliness while preserving the image.
- source_word: ἐὰν δὲ ἀποθάνῃ
  chosen: but if it dies
  alternatives:
  - but if it should die
  lexicon: BDAG
  rationale: δέ marks contrast with the previous clause; 'but' communicates this clearly.
- source_word: πολὺν καρπὸν φέρει
  chosen: it bears much fruit
  alternatives:
  - it produces much fruit
  - it bears a great harvest
  lexicon: BDAG
  rationale: φέρει καρπόν is a standard idiom meaning 'bear/produce fruit.' 'Bears
    much fruit' preserves the metaphor and resonates with Johannine usage. 'Harvest'
    would over-interpret καρπός.
