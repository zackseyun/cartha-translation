theological_decisions:
- issue: Metaphorical agricultural image with implicit christological and discipleship
    significance
  chosen_reading: Retain the literal agricultural metaphor in the main text without
    making its theological application explicit.
  alternative_readings:
  - Interpretively expand the verse to make explicit that Jesus refers to his own
    death and resulting life for many.
  rationale: The context strongly suggests Jesus speaks of his own death and its fruitfulness,
    with implications for discipleship in the following verses. However, the verse
    itself states the image rather than its full interpretation. In keeping with optimal
    equivalence and the instruction not to import doctrinal claims the text does not
    make explicitly, the translation preserves the metaphor and leaves interpretation
    to context.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
