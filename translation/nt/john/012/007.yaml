theological_decisions:
- issue: Interpretation of Jesus' statement about the anointing in relation to his
    death
  chosen_reading: Render the clause as Jesus directing that the perfume be kept for
    the day of his burial, preserving the forward-looking connection to his impending
    death.
  alternative_readings:
  - Render as 'She has kept it for the day of my burial'
  - Render as 'Let her keep it until the day of my burial'
  rationale: The Greek clause is syntactically difficult and has been understood in
    more than one way. The chosen rendering follows the most straightforward force
    of Ἄφες... ἵνα... τηρήσῃ while preserving Jesus' reference to his coming burial.
    Because the ambiguity is genuine, alternatives are preserved in footnotes rather
    than excluded.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
