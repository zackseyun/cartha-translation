id: JHN.12.7
reference: John 12:7
source:
  edition: SBLGNT
  text: εἶπεν οὖν ὁ Ἰησοῦς· Ἄφες αὐτήν, ⸀ἵνα εἰς τὴν ἡμέραν τοῦ ἐνταφιασμοῦ μου ⸀τηρήσῃ
    αὐτό·
translation:
  text: So Jesus said, “Leave her alone, so that she may keep it for the day of my
    burial.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Leave her alone; she has kept it for the day of my burial.' Some understand
      the clause as describing what she has already done rather than what she may
      yet do.
    reason: alternative_reading
  - marker: b
    text: Or, 'Leave her alone, so that she may keep it until the day of my burial.'
      The Greek construction can also be taken with a more explicit temporal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation. 'So' is natural modern English
    and preserves the inferential flow without sounding overly formal.
- source_word: Ἄφες αὐτήν
  chosen: Leave her alone
  alternatives:
  - Let her be
  - Permit her
  lexicon: BDAG
  rationale: The aorist imperative of ἀφίημι here is idiomatic in context as a command
    to stop interfering with the woman. 'Leave her alone' best captures the force
    in clear modern English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose or intended result. 'So that' preserves the clause
    relationship while remaining readable.
- source_word: εἰς τὴν ἡμέραν
  chosen: for the day
  alternatives:
  - until the day
  - for the day of
  lexicon: BDAG
  rationale: With τηρέω and the object αὐτό, εἰς here points toward the future occasion
    in view. 'For the day' is a natural rendering that avoids overcommitting to a
    stricter temporal sense like 'until' in the main text.
- source_word: ἐνταφιασμοῦ
  chosen: burial
  alternatives:
  - entombment
  - preparation for burial
  lexicon: BDAG
  rationale: Refers to burial/entombment. 'Burial' is the clearest and most idiomatic
    English equivalent; 'entombment' is more technical than needed.
- source_word: τηρήσῃ
  chosen: may keep
  alternatives:
  - may preserve
  - may save
  - has kept
  lexicon: BDAG
  rationale: The aorist subjunctive after ἵνα is rendered as a purpose clause. 'Keep'
    fits τηρέω well and matches the sense of reserving the perfume for a specific
    occasion. The textual/syntactical difficulty of the clause is preserved by noting
    alternatives in a footnote rather than smoothing it into a paraphrase.
- source_word: αὐτό
  chosen: it
  alternatives:
  - this
  - the perfume
  - the ointment
  lexicon: BDAG
  rationale: The neuter pronoun refers to the perfume/ointment. 'It' preserves the
    Greek pronoun without adding an explanatory noun not present in the text.
