id: JHN.12.25
reference: John 12:25
source:
  edition: SBLGNT
  text: ὁ φιλῶν τὴν ψυχὴν αὐτοῦ ⸀ἀπολλύει αὐτήν, καὶ ὁ μισῶν τὴν ψυχὴν αὐτοῦ ἐν τῷ
    κόσμῳ τούτῳ εἰς ζωὴν αἰώνιον φυλάξει αὐτήν.
translation:
  text: The one who loves his life loses it, and the one who hates his life in this
    world will keep it for eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul'; Greek ψυχή can mean 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Hates his life'' is a deliberate paradox about rejecting attachment to
      one''s life in the present world-order; compare Luke 14:26 for similar idiom.
      It does not commend self-hatred.'
    reason: cross_reference
lexical_decisions:
- source_word: ὁ φιλῶν
  chosen: the one who loves
  alternatives:
  - whoever loves
  - the person loving
  lexicon: BDAG
  rationale: Articular present participle used substantivally; 'the one who loves'
    preserves the generic singular force and the ongoing aspect without sounding wooden.
- source_word: ψυχὴν
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: BDAG
  rationale: In this Johannine context ψυχή refers to one's life/self as something
    that can be lost or preserved, not primarily the immaterial soul. 'Life' best
    fits the parallel with losing and keeping, while 'soul' is preserved as an alternative
    because of the term's broader semantic range.
- source_word: ἀπολλύει
  chosen: loses
  alternatives:
  - destroys
  - ruins
  - perishes
  lexicon: BDAG
  rationale: Present active indicative here expresses the result of loving one's life;
    'loses' fits the object 'life' idiomatically in English and matches the contrast
    with 'will keep.' 'Destroys' would sound too active and harsh in English for this
    context.
- source_word: ὁ μισῶν
  chosen: the one who hates
  alternatives:
  - whoever hates
  - the person hating
  lexicon: BDAG
  rationale: Substantival participle parallel to ὁ φιλῶν. 'Hates' should be retained
    rather than softened to 'loves less,' since the Greek verb is strong and the paradox
    is deliberate; the idiomatic sense is clarified by the phrase 'in this world.'
- source_word: ἐν τῷ κόσμῳ τούτῳ
  chosen: in this world
  alternatives:
  - in this age
  - within this world
  lexicon: BDAG
  rationale: κόσμος in John often denotes the present world-order in contrast to eternal
    realities. 'In this world' is the most natural rendering and helps qualify the
    sense in which one 'hates' his life.
- source_word: φυλάξει
  chosen: will keep
  alternatives:
  - will preserve
  - will guard
  lexicon: BDAG
  rationale: Future active indicative. 'Will keep' is concise, idiomatic, and preserves
    the verbal contrast with 'loses.' 'Preserve' is possible but less natural in this
    antithetical saying.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: for eternal life
  alternatives:
  - for everlasting life
  - unto eternal life
  lexicon: BDAG
  rationale: εἰς here expresses goal or result. 'For eternal life' communicates that
    the life is kept with a view to or into eternal life. 'Unto eternal life' is more
    formal but less natural in modern English.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - one's
  - their own
  lexicon: BDAG
  rationale: The Greek singular masculine pronoun matches the generic singular construction.
    Per translation philosophy, gender-accurate rendering is preferred over flattening
    to plural or singular 'their.'
