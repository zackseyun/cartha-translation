theological_decisions:
- issue: Meaning of 'hate his life'
  chosen_reading: Retain the stark wording 'hates his life' as a call to renounce
    self-preservation in the present world-order, not as a command toward self-loathing
    or denial of life's goodness.
  alternative_readings:
  - loves his life less
  - cares less for his life
  rationale: The Greek uses μισέω, and the translation should preserve the rhetorical
    force rather than resolve the paradox in the main text. The qualifying phrase
    'in this world' signals the contrast between present-life attachment and eternal
    life. Softer interpretive renderings are better preserved in a footnote than imported
    into the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it; §6, Readable modern English
- issue: Rendering of ψυχή
  chosen_reading: Translate ψυχή as 'life' in both clauses.
  alternative_readings:
  - soul
  - self
  rationale: This avoids importing a dualistic anthropology not demanded by the verse
    and fits the immediate contrast of losing versus keeping. The broader semantic
    range is acknowledged in a footnote.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
