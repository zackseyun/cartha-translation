id: JHN.14.31
reference: John 14:31
source:
  edition: SBLGNT
  text: ἀλλ’ ἵνα γνῷ ὁ κόσμος ὅτι ἀγαπῶ τὸν πατέρα, καὶ καθὼς ⸀ἐνετείλατο μοι ὁ πατὴρ
    οὕτως ποιῶ. Ἐγείρεσθε, ἄγωμεν ἐντεῦθεν.
translation:
  text: But so that the world may know that I love the Father, I do just as the Father
    has commanded me. Rise, let us go from here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'just as the Father commanded me, so I do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Retains the adversative force linking this clause to the preceding statement.
    'But' is the most natural English connector here.
- source_word: ἵνα γνῷ
  chosen: so that ... may know
  alternatives:
  - in order that ... may know
  - that ... may know
  lexicon: BDAG
  rationale: The conjunction ἵνα with aorist subjunctive expresses purpose. 'So that
    ... may know' is idiomatic English and preserves the purposive sense.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the people of the world
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the world in its human, often alienated,
    corporate sense. 'The world' preserves Johannine diction and theological resonance.
- source_word: ἀγαπῶ
  chosen: I love
  alternatives:
  - I am loving
  lexicon: BDAG
  rationale: Present indicative of ἀγαπάω is best rendered with the simple present
    in English. This also aligns with the project's default rendering of ἀγάπη cognates
    as 'love'.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the article with πατήρ, not an explicit possessive pronoun.
    'The Father' preserves the title as given and matches Johannine style.
- source_word: καθὼς ἐνετείλατο μοι ὁ πατὴρ
  chosen: just as the Father has commanded me
  alternatives:
  - just as the Father commanded me
  - as the Father instructed me
  lexicon: BDAG
  rationale: καθώς introduces correspondence ('just as'). ἐντέλλομαι carries the sense
    of giving a charge or command; 'commanded' best preserves that force. The perfect
    English 'has commanded' fits the present-result nuance naturally in context, though
    the Greek is aorist.
- source_word: οὕτως ποιῶ
  chosen: I do just as
  alternatives:
  - so I do
  - thus I act
  lexicon: BDAG
  rationale: 'οὕτως pairs with καθώς to express exact correspondence: ''just as ...
    so ...''. Rendering the whole clause as ''I do just as...'' is natural English
    while preserving the structure.'
- source_word: Ἐγείρεσθε
  chosen: Rise
  alternatives:
  - Get up
  - Stand up
  lexicon: BDAG
  rationale: Imperative plural calling the disciples to get up. 'Rise' is concise,
    dignified, and natural in context.
- source_word: ἄγωμεν
  chosen: let us go
  alternatives:
  - we should go
  - let us be going
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive is well represented by 'let
    us go'.
- source_word: ἐντεῦθεν
  chosen: from here
  alternatives:
  - away from here
  lexicon: BDAG
  rationale: Adverb of place indicating departure from the present location. 'From
    here' is the most direct rendering.
