theological_decisions:
- issue: Relational title πατήρ in Johannine Christology
  chosen_reading: the Father
  alternative_readings:
  - my Father
  rationale: The verse presents Jesus' love for and obedience to the Father without
    adding a possessive not present in the Greek. This preserves the text's wording
    and its theological emphasis on the Father-Son relationship without interpretive
    expansion.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
- issue: Force of ἐντέλλομαι in describing the Father's relation to the Son
  chosen_reading: commanded
  alternative_readings:
  - instructed
  - directed
  rationale: The Greek verb denotes a command/charge. Rendering it strongly as 'commanded'
    preserves the text's language of obedience while remaining within orthodox Christology
    and not diminishing the Son's full deity; the translation should not soften the
    lexical force for doctrinal reasons.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
