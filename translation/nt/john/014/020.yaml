theological_decisions:
- issue: Johannine indwelling language (ἐν ... ἐν ... ἐν)
  chosen_reading: 'Preserve the repeated preposition ''in'' throughout: ''I am in
    my Father, and you are in me, and I am in you.'''
  alternative_readings:
  - I am one with my Father, and you are united to me, and I am united to you
  - I am in union with my Father, and you in me, and I in you
  rationale: The verse expresses layered relational and theological realities central
    to John's Gospel. Rendering ἐν as 'in' preserves the text's metaphorical and theological
    tension rather than collapsing it into a single interpretive category such as
    ontological identity or merely relational union. This aligns with the translation
    philosophy to preserve theological tension where the source text is rich and potentially
    multivalent.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, ''Preserve theological
    tension rather than resolve it.'''
- issue: Relation of Jesus to the Father
  chosen_reading: Translate straightforwardly as 'I am in my Father' without expanding
    or narrowing the claim.
  alternative_readings:
  - I and my Father are one in essence
  - I am with my Father
  rationale: The wording should neither dilute the high Christological force of the
    statement nor import later creedal formulations directly into the verse. The chosen
    rendering is fully compatible with Nicene orthodoxy while remaining textually
    disciplined.
  doctrine_reference: 'DOCTRINE.md: Affirmations (Nicene Creed; Chalcedon) and translation
    philosophy on not importing doctrinal claims the text does not make.'
