id: JHN.14.20
reference: John 14:20
source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ἡμέρᾳ ⸂γνώσεσθε ὑμεῖς⸃ ὅτι ἐγὼ ἐν τῷ πατρί μου καὶ ὑμεῖς ἐν ἐμοὶ
    κἀγὼ ἐν ὑμῖν.
translation:
  text: On that day you will know that I am in my Father, and you are in me, and I
    am in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less idiomatically, 'In that day.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'in' language is preserved literally to reflect John's theme
      of mutual indwelling; alternatively, one might paraphrase 'in union with,' but
      that is more interpretive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: On that day
  alternatives:
  - In that day
  lexicon: BDAG
  rationale: The prepositional phrase is temporal. 'On that day' is idiomatic modern
    English while preserving the demonstrative specificity of ἐκείνῃ.
- source_word: γνώσεσθε
  chosen: you will know
  alternatives:
  - you will come to know
  - you will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω here points to future realization/knowledge.
    'You will know' is the most natural and sufficiently broad rendering; 'come to
    know' slightly overemphasizes process, which the context does not require.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English normally conveys this
    without an added reflexive. The emphasis is adequately retained by word order
    and direct address.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what the disciples will know, not a causal
    clause.
- source_word: ἐγὼ ἐν τῷ πατρί μου
  chosen: I am in my Father
  alternatives:
  - I am in union with my Father
  lexicon: BDAG
  rationale: The repeated ἐν construction is central to Johannine mutual indwelling
    language. 'In' should be preserved rather than interpreted as 'in union with'
    in the main text, which would resolve the metaphor too explicitly.
- source_word: πατρί μου
  chosen: my Father
  alternatives:
  - the Father of me
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the possessive construction, preserving
    the filial relationship central to Johannine Christology.
- source_word: καὶ ὑμεῖς ἐν ἐμοὶ
  chosen: and you are in me
  alternatives:
  - and you are in union with me
  lexicon: BDAG
  rationale: Supplies 'are' in English for a verbless clause. Retains the same 'in'
    language as the Greek for consistency and to preserve theological tension.
- source_word: κἀγὼ ἐν ὑμῖν
  chosen: and I am in you
  alternatives:
  - and I am in union with you
  lexicon: BDAG
  rationale: κἀγώ is 'and I.' As in the prior clause, 'in' is preserved to reflect
    the reciprocal indwelling language without interpretive expansion.
