id: JHN.14.29
reference: John 14:29
source:
  edition: SBLGNT
  text: καὶ νῦν εἴρηκα ὑμῖν πρὶν γενέσθαι, ἵνα ὅταν γένηται πιστεύσητε.
translation:
  text: And now I have told you before it happens, so that when it happens you may
    believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before it comes to pass.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when it comes to pass.'
    reason: lexical_alternative
  - marker: c
    text: The verb can also carry the sense 'trust,' but 'believe' is the standard
      Johannine rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴρηκα
  chosen: I have told
  alternatives:
  - I have said
  - I told
  lexicon: BDAG
  rationale: Perfect tense of λέγω naturally conveys a present state resulting from
    prior speech ('I have told/said'). 'Told' fits the dative ὑμῖν smoothly in English
    and is more idiomatic here than 'said to you,' while preserving the completed
    prior disclosure.
- source_word: πρὶν γενέσθαι
  chosen: before it happens
  alternatives:
  - before it comes to pass
  - before it takes place
  - before it comes about
  lexicon: BDAG
  rationale: πρίν with the aorist infinitive γενέσθαι means 'before [it] happens/comes
    to be.' Supplying 'it' is required in English because the event is implicit from
    context. 'Happens' is clear modern English and matches the repeated γίνομαι later
    in the verse.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural English and preserves the purposive
    force without sounding overly formal.
- source_word: ὅταν γένηται
  chosen: when it happens
  alternatives:
  - when it comes to pass
  - when it takes place
  lexicon: BDAG
  rationale: 'ὅταν with the subjunctive marks a future contingency: ''when it happens.''
    Using the same English verb as in πρὶν γενέσθαι preserves the repetition of γίνομαι
    across the verse.'
- source_word: πιστεύσητε
  chosen: you may believe
  alternatives:
  - you may trust
  - you may have faith
  lexicon: BDAG
  rationale: πιστεύω commonly means 'believe' in John, often with a strong sense of
    trust. The default family rendering for πίστις-related terms is 'faith,' but for
    the verb πιστεύω in Johannine usage, 'believe' is the most idiomatic and contextually
    established English equivalent. The subjunctive after ἵνα is well represented
    by 'may believe'.
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: BDAG
  rationale: Retains the connective καί and temporal adverb νῦν. 'And now' preserves
    discourse continuity with the preceding context better than dropping the conjunction.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The indirect object is naturally absorbed into English verbal phrasing
    as 'I have told you.' This is a syntactic rather than semantic omission.
