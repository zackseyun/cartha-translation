theological_decisions:
- issue: Force of πιστεύσητε in context
  chosen_reading: you may believe
  alternative_readings:
  - you may continue believing
  - you may trust
  rationale: In Johannine context, Jesus' predictive speech aims at eliciting or strengthening
    belief when the event occurs. The Greek verb itself does not explicitly mark either
    initial faith or perseverance here, so the translation preserves the broader 'believe'
    rather than narrowing to a doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
