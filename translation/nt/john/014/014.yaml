id: JHN.14.14
reference: John 14:14
source:
  edition: SBLGNT
  text: ἐάν τι αἰτήσητέ ⸀με ἐν τῷ ὀνόματί μου ⸀ἐγὼ ποιήσω.
translation:
  text: If you ask me anything in my name, I will do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'If you ask anything in my name, I will do it,' omitting
      'me.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐάν
  chosen: If
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause. 'If' is the most natural English rendering
    in this context.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  - any thing
  lexicon: BDAG
  rationale: Indefinite pronoun in the accusative neuter singular after a conditional
    clause; 'anything' best conveys the open-ended scope idiomatically in English.
- source_word: αἰτήσητέ
  chosen: you ask
  alternatives:
  - you request
  - you ask for
  lexicon: BDAG
  rationale: Aorist active subjunctive, second person plural, governed by ἐάν. In
    English, a present-tense verb in the conditional clause is the most natural equivalent.
    'Ask' preserves the prayer/request sense without over-specifying.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: The direct object pronoun is present in the SBLGNT text and should be
    translated explicitly rather than omitted. This yields 'ask me,' which is the
    plain sense of the reading adopted here.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - as representing me
  lexicon: BDAG
  rationale: Standard Johannine expression indicating prayer/request made in relation
    to Jesus' name, authority, and person. 'In my name' is both accurate and idiomatic;
    fuller interpretive expansions are better left out of the main text.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is somewhat emphatic in Greek. English can preserve
    this adequately with the stated subject 'I' without adding extra emphasis such
    as 'I myself,' which would risk overtranslation.
- source_word: ποιήσω
  chosen: will do it
  alternatives:
  - will do
  - will accomplish it
  lexicon: BDAG
  rationale: Future active indicative, first person singular. English commonly supplies
    'it' for naturalness when the object is the previously mentioned request ('anything').
    'Will do it' clearly conveys Jesus' promised action.
