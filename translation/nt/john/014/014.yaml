theological_decisions:
- issue: Presence of με ('me') in John 14:14 and its implication that Jesus is directly
    addressed in the request
  chosen_reading: Translate the verse with 'ask me' in the main text
  alternative_readings:
  - If you ask anything in my name, I will do it
  rationale: The provided source text (SBLGNT) includes με, and the translation should
    follow the given Greek rather than harmonize to a variant lacking the pronoun.
    Because this affects whether the request is explicitly directed to Jesus, the
    alternative reading is preserved in a footnote as a textual variant rather than
    suppressed. This does not import a doctrinal claim beyond the text, but it does
    transparently reflect the christological significance of the attested reading.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    theological tension rather than resolve it)
