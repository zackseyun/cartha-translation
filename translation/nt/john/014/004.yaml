theological_decisions:
- issue: Clause order and syntactic relation of 'where I am going' to 'the way'
  chosen_reading: And you know the way to where I am going.
  alternative_readings:
  - And where I am going, you know the way.
  - And you know where I am going and the way.
  rationale: The Greek most naturally states that the disciples know the way with
    reference to the destination Jesus is going. Rendering it 'the way to where I
    am going' communicates this clearly in modern English. The alternative 'where
    I am going, you know the way' is more formally close, but less natural in English.
    The reading 'you know where I am going and the way' reflects a different textual
    form known from the Byzantine/TR tradition rather than the SBLGNT text provided,
    so it is not adopted in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it.'
