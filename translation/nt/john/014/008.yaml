id: JHN.14.8
reference: John 14:8
source:
  edition: SBLGNT
  text: Λέγει αὐτῷ Φίλιππος· Κύριε, δεῖξον ἡμῖν τὸν πατέρα, καὶ ἀρκεῖ ἡμῖν.
translation:
  text: Philip said to him, “Lord, show us the Father, and that is enough for us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, show us the Father, and it is enough for us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English narrative normally renders this as simple past, especially in dialogue
    introduction. This is a standard optimal-equivalence adjustment that preserves
    sense without woodenness.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech; 'to him' is
    the natural English rendering.
- source_word: Φίλιππος
  chosen: Philip
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. In John, address to Jesus commonly carries more than
    mere politeness, and DOCTRINE.md specifies 'Lord' as the default rendering for
    κύριος. 'Sir' is possible in some contexts but is too weak here.
- source_word: δεῖξον
  chosen: show
  alternatives:
  - reveal
  - let us see
  lexicon: BDAG
  rationale: Aorist imperative of δείκνυμι, a direct request/command to make someone
    or something visible or known. 'Show' is the most natural and sufficiently direct
    English equivalent.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Dative plural pronoun governed by the imperative; 'show us' is idiomatic
    English.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine context this refers specifically to God as Jesus' Father,
    so capitalization in English appropriately signals titular/divine reference without
    adding meaning not present in the Greek.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking Philip's request with its expected
    result. 'And' preserves the straightforward structure.
- source_word: ἀρκεῖ
  chosen: is enough
  alternatives:
  - suffices
  - will satisfy
  lexicon: BDAG
  rationale: Present indicative of ἀρκέω meaning 'to be sufficient, enough.' 'Is enough'
    is clear modern English; 'will satisfy' is interpretive and less formally tied
    to the lexical sense.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - us
  lexicon: BDAG
  rationale: 'The dative with ἀρκεῖ can be rendered ''for us'' to make the English
    idiomatic and explicit: ''that is enough for us.'''
