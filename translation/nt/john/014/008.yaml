theological_decisions:
- issue: Rendering κύριος as address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The translation follows the project's default rendering of κύριος as
    'Lord.' In this Johannine setting, Philip addresses Jesus within a context of
    revelation of the Father, so 'Lord' best preserves both respect and the Gospel's
    christological weight without overinterpreting beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
