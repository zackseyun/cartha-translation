theological_decisions:
- issue: Potential theological nuance of ὑπάγεις in Johannine context
  chosen_reading: Rendered neutrally as 'where you are going'
  alternative_readings:
  - where you are going away
  - where you are departing
  rationale: Jesus' destination has theological significance in John, but Thomas's
    statement itself expresses ignorance of destination rather than explicating ascension
    or return to the Father. A neutral rendering preserves the narrative tension without
    importing later interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
