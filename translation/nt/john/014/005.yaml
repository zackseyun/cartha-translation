id: JHN.14.5
reference: John 14:5
source:
  edition: SBLGNT
  text: λέγει αὐτῷ Θωμᾶς· Κύριε, οὐκ οἴδαμεν ποῦ ὑπάγεις· ⸀πῶς ⸂δυνάμεθα τὴν ὁδὸν
    εἰδέναι⸃;
translation:
  text: Thomas said to him, “Lord, we do not know where you are going. How can we
    know the way?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How are we able to know the way?”
    reason: lexical_alternative
  - marker: b
    text: The Greek verb for “know” is used twice in this verse, once in “we do not
      know” and again in “know the way.”
    reason: cross_reference
lexical_decisions:
- source_word: λέγει αὐτῷ Θωμᾶς
  chosen: Thomas said to him
  alternatives:
  - Thomas says to him
  lexicon: BDAG
  rationale: The historical present λέγει is commonly rendered with English past tense
    in narrative for natural readability, while preserving the discourse function.
    Θωμᾶς is transliterated as the personal name Thomas.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  - Sir
  lexicon: BDAG
  rationale: Following the doctrine's default for κύριος, the vocative is rendered
    'Lord.' In Johannine context this address can carry respect and discipleship recognition;
    'Lord' best preserves both without flattening it to merely polite address.
- source_word: οὐκ οἴδαμεν
  chosen: we do not know
  alternatives:
  - we do not understand
  lexicon: BDAG
  rationale: οἶδα here denotes knowledge rather than comprehension alone. Present
    English 'do not know' is the most direct equivalent.
- source_word: ποῦ ὑπάγεις
  chosen: where you are going
  alternatives:
  - where you are departing to
  - where you are going away
  lexicon: BDAG
  rationale: ὑπάγω in John often has the sense of going away/departing, sometimes
    with theological depth regarding Jesus' return to the Father. Here 'where you
    are going' is natural English and leaves the fuller Johannine resonance intact
    without overtranslating.
- source_word: πῶς
  chosen: How
  alternatives:
  - How then
  lexicon: BDAG
  rationale: The interrogative adverb introduces the logical difficulty Thomas raises.
    Simple 'How' is sufficient; no connective is explicit in the Greek.
- source_word: δυνάμεθα
  chosen: can we
  alternatives:
  - are we able to
  lexicon: BDAG
  rationale: δύναμαι expresses ability. 'Can we' is idiomatic modern English and accurately
    conveys the modal force.
- source_word: τὴν ὁδὸν
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: BDAG
  rationale: ὁδός can mean road/path/way. 'The way' is the most natural rendering
    and preserves the thematic link to Jesus' statement in the following verse without
    importing it here.
- source_word: εἰδέναι
  chosen: know
  alternatives:
  - recognize
  lexicon: BDAG
  rationale: 'The infinitive complements δυνάμεθα: ''How can we know...?'' Repeating
    ''know'' mirrors the Greek wordplay with οἴδαμεν / εἰδέναι and preserves Thomas''s
    logic.'
