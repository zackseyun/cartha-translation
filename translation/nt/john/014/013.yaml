id: JHN.14.13
reference: John 14:13
source:
  edition: SBLGNT
  text: καὶ ὅ τι ἂν αἰτήσητε ἐν τῷ ὀνόματί μου τοῦτο ποιήσω, ἵνα δοξασθῇ ὁ πατὴρ ἐν
    τῷ υἱῷ·
translation:
  text: And whatever you ask in my name, this I will do, so that the Father may be
    glorified in the Son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the Son.' The Greek says 'in the Son,' which may express the
      sphere or means by which the Father is glorified.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅ τι ἂν
  chosen: whatever
  alternatives:
  - anything that
  - whatever thing
  lexicon: BDAG
  rationale: 'The relative-indefinite construction with ἄν expresses indefiniteness
    and breadth: ''whatever'' is natural English and preserves the open-ended scope
    better than a more wooden ''whatsoever'' or ''anything that.'''
- source_word: αἰτήσητε
  chosen: you ask
  alternatives:
  - you request
  lexicon: BDAG
  rationale: αἰτέω commonly means 'ask' or 'request.' 'Ask' is the standard, idiomatic
    rendering in prayer contexts and fits the second person plural form without unnecessary
    formality.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - under my authority
  lexicon: BDAG
  rationale: This is a standard Johannine expression. 'In my name' preserves the phrase's
    theological and relational depth, including agency, representation, and alignment
    with Jesus, without collapsing it into a single interpretive paraphrase such as
    'by my authority.'
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek and is best retained. 'This I
    will do' preserves the emphasis and fronting more closely than smoothing it away.
- source_word: ποιήσω
  chosen: I will do
  alternatives:
  - I will do it
  - I will accomplish
  lexicon: BDAG
  rationale: ποιέω here is broad and straightforward. 'I will do' is both natural
    and close to the Greek; adding 'it' is possible in English but not necessary,
    and 'accomplish' is more interpretive.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' communicates purpose clearly in contemporary
    English while remaining close to the Greek.
- source_word: δοξασθῇ
  chosen: may be glorified
  alternatives:
  - may be honored
  - may receive glory
  lexicon: BDAG
  rationale: The aorist passive subjunctive of δοξάζω is well rendered 'may be glorified.'
    This preserves the biblical glory language and avoids flattening it into the weaker
    'honored.'
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text reads simply 'the Father,' not 'my Father.' The article
    should be preserved, especially in Johannine usage where 'the Father' functions
    as a distinctive divine designation.
- source_word: ἐν τῷ υἱῷ
  chosen: in the Son
  alternatives:
  - through the Son
  - in the Son's person
  lexicon: BDAG
  rationale: ἐν is best left as 'in' rather than resolved to 'through.' The phrase
    likely expresses the sphere or means in which the Father's glorification is manifested,
    and preserving 'in the Son' maintains the theological tension rather than narrowing
    the sense.
