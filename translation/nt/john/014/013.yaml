theological_decisions:
- issue: Meaning of asking 'in my name'
  chosen_reading: Retained as 'in my name' without paraphrastic expansion.
  alternative_readings:
  - by my authority
  - in union with me
  - in accordance with my character and will
  rationale: The phrase carries layered theological significance in Johannine context.
    Rendering it literally preserves that richness and avoids importing a single doctrinal
    explanation into the main text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Force of 'ἐν τῷ υἱῷ'
  chosen_reading: Rendered 'in the Son.'
  alternative_readings:
  - through the Son
  rationale: The preposition ἐν can be interpreted in several related ways here. Because
    the Greek does not require a single narrowed sense, the main text preserves the
    more literal wording, while the alternative is noted in a footnote.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
