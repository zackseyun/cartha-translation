theological_decisions:
- issue: Rendering of παράκλητος in a Trinitarian context
  chosen_reading: Advocate
  alternative_readings:
  - Helper
  - Counselor
  - Comforter
  rationale: Because Jesus promises 'another παράκλητος,' the term should remain personal
    and weighty without collapsing into a merely functional helper-role. 'Advocate'
    preserves personhood and representative action while fitting historic orthodox
    Trinitarian reading, yet it does not overdefine the Spirit's work beyond the text.
    Alternative traditional renderings are preserved in a footnote due to the term's
    longstanding interpretive significance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
