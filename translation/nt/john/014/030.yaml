id: JHN.14.30
reference: John 14:30
source:
  edition: SBLGNT
  text: οὐκέτι πολλὰ λαλήσω μεθ’ ὑμῶν, ἔρχεται γὰρ ὁ τοῦ κόσμου ἄρχων· καὶ ἐν ἐμοὶ
    οὐκ ἔχει οὐδέν,
translation:
  text: I will no longer speak much with you, for the ruler of the world is coming.
    And he has nothing in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the ruler of this world.' Some English versions add 'this' in line
      with similar Johannine expressions, but the Greek here reads simply 'of the
      world.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he has no claim on me' or 'he has no hold over me.' The Greek is literally,
      'he has nothing in me.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  - no more
  lexicon: BDAG
  rationale: Temporal adverb indicating cessation from this point onward; 'no longer'
    is natural modern English.
- source_word: πολλὰ
  chosen: much
  alternatives:
  - many things
  - much more
  lexicon: BDAG
  rationale: Neuter plural used adverbially with λαλήσω, meaning 'much' rather than
    a countable 'many things.'
- source_word: λαλήσω
  chosen: I will speak
  alternatives:
  - I will talk
  - I will say
  lexicon: BDAG
  rationale: Future active indicative of λαλέω; 'speak' preserves the verbal sense
    without becoming too colloquial.
- source_word: μεθ’ ὑμῶν
  chosen: with you
  alternatives:
  - among you
  lexicon: BDAG
  rationale: 'μετά with genitive commonly means association, here direct conversation
    with the disciples: ''with you.'''
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on his way
  lexicon: BDAG
  rationale: Present middle/passive indicative with futuristic force; English progressive
    best captures the imminent approach.
- source_word: ὁ τοῦ κόσμου ἄρχων
  chosen: the ruler of the world
  alternatives:
  - the ruler of this world
  - the prince of the world
  lexicon: BDAG
  rationale: ἄρχων is best rendered 'ruler.' Although many English versions supply
    'this' from Johannine idiom elsewhere, it is absent here, so 'of the world' follows
    the Greek more closely. 'Prince' is traditional but less transparent in modern
    English.
- source_word: κόσμου
  chosen: world
  alternatives:
  - this world
  - world order
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the world in its fallen order; 'world'
    is the standard and sufficiently broad rendering here.
- source_word: ἐν ἐμοὶ
  chosen: in me
  alternatives:
  - against me
  - on me
  lexicon: BDAG
  rationale: The prepositional phrase is terse and idiomatic. A literal 'in me' preserves
    the Greek wording and leaves the implied sense to context.
- source_word: οὐκ ἔχει οὐδέν
  chosen: he has nothing
  alternatives:
  - he has no claim
  - he has no hold
  - he has nothing at all
  lexicon: BDAG
  rationale: Literal rendering preserves the compact Greek expression. The phrase
    likely implies no rightful claim, leverage, or ground in Jesus, but those are
    interpretive expansions better preserved in a footnote rather than the main text.
