theological_decisions:
- issue: Identity and force of 'the ruler of the world'
  chosen_reading: A reference to Satan, expressed by the translated title 'the ruler
    of the world' without importing the identification into the main text.
  alternative_readings:
  - a more general personification of worldly evil powers
  rationale: In Johannine context this title refers to the evil spiritual ruler opposed
    to Jesus, commonly understood as Satan. The translation keeps the title itself
    in the text rather than substituting 'Satan,' preserving what the Greek explicitly
    says while allowing the theological referent to remain inferential.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Meaning of 'he has nothing in me'
  chosen_reading: Retain the literal expression rather than interpretively specifying
    'no claim on me' or 'no hold over me.'
  alternative_readings:
  - he has no claim on me
  - he has no hold over me
  - he has no power over me
  rationale: The Greek is concise and somewhat idiomatic. A literal rendering preserves
    the theological point that the coming ruler finds no foothold, claim, or shared
    ground in Jesus, without narrowing the sense to one interpretive option.
  doctrine_reference: Translation philosophy 3
