id: JHN.14.6
reference: John 14:6
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ⸀ὁ Ἰησοῦς· Ἐγώ εἰμι ἡ ὁδὸς καὶ ἡ ἀλήθεια καὶ ἡ ζωή· οὐδεὶς ἔρχεται
    πρὸς τὸν πατέρα εἰ μὴ δι’ ἐμοῦ.
translation:
  text: Jesus said to him, “I am the way, and the truth, and the life. No one comes
    to the Father except through me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Jesus says to him.' Greek uses a historical present
      here.
    reason: lexical_alternative
  - marker: b
    text: Or 'No one comes to the Father unless through me.'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), standard readable
    English normally shifts this narrative present to the simple past, preserving
    sense without awkwardness.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of Jesus' speech; rendered
    straightforwardly as 'to him.'
- source_word: Ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: Direct rendering of the emphatic first-person expression. The explicit
    pronoun adds emphasis in Greek, but English naturally conveys this with 'I am'
    in this context without adding italics or extra wording.
- source_word: ἡ ὁδός
  chosen: the way
  alternatives:
  - the path
  lexicon: BDAG
  rationale: ὁδός can mean road, way, or path. 'The way' is the most natural and established
    rendering here, fitting both literal and metaphorical senses of access to the
    Father.
- source_word: ἡ ἀλήθεια
  chosen: the truth
  alternatives:
  - the reality
  lexicon: BDAG
  rationale: ἀλήθεια commonly means 'truth.' While broader nuances such as 'reality'
    can be present in Johannine usage, 'the truth' best matches the lexical core and
    English idiom.
- source_word: ἡ ζωή
  chosen: the life
  lexicon: BDAG
  rationale: ζωή in John often carries rich theological weight, including life in
    its fullest and eternal sense, but the lexical form is simply 'life'; the translation
    preserves that breadth without interpretive expansion.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Indefinite negative pronoun best rendered 'no one' in formal but natural
    English.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - is coming
  lexicon: BDAG
  rationale: Present/middle form here expresses a general, timeless reality rather
    than progressive action; 'comes' is the natural English equivalent.
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to the father
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward. 'Father' is
    capitalized in English to reflect its use as a divine personal title for God in
    this context.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: 'The combination functions idiomatically as an exceptive expression:
    ''except'' or ''except by.'' ''Except'' is smoother in English here than a more
    literal ''if not.'''
- source_word: δι’ ἐμοῦ
  chosen: through me
  alternatives:
  - by me
  - by means of me
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes means or agency. 'Through me'
    is the most natural English rendering and preserves the mediatorial force of the
    phrase.
