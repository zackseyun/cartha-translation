theological_decisions:
- issue: Exclusivity of access to the Father through Jesus
  chosen_reading: Retained the direct exclusive statement 'No one comes to the Father
    except through me' without softening or paraphrasing.
  alternative_readings:
  - No one comes to the Father unless by me
  - No one comes to the Father except by means of me
  rationale: The Greek is unambiguous in expressing exclusive access to the Father
    through Jesus. Historic Christian orthodoxy affirms this claim, and the translation
    should neither dilute nor overextend it beyond the verse's wording.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Rendering of the Johannine predicate sequence
  chosen_reading: 'Translated all three predicates with repeated articles: ''the way,
    and the truth, and the life.'''
  alternative_readings:
  - the way, the truth, and the life
  rationale: The Greek repeats the article with each noun, marking each predicate
    distinctly. Including 'and' before each element preserves the rhetorical weight
    and triadic structure while remaining natural English.
  doctrine_reference: Translation philosophy §§1, 6
