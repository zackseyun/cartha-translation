theological_decisions:
- issue: Nature of the peace Jesus gives
  chosen_reading: Render simply as 'Peace'/'my peace' without expanding it into reconciliation,
    inner calm, or eschatological shalom in the main text.
  alternative_readings:
  - peace as inward tranquility
  - peace as covenantal/eschatological wholeness
  - peace as reconciliation with God
  rationale: The verse itself does not narrowly define the peace; preserving the broader
    term maintains the theological richness and tension rather than resolving it into
    one doctrinally loaded nuance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
