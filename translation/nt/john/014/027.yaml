id: JHN.14.27
reference: John 14:27
source:
  edition: SBLGNT
  text: εἰρήνην ἀφίημι ὑμῖν, εἰρήνην τὴν ἐμὴν δίδωμι ὑμῖν· οὐ καθὼς ὁ κόσμος δίδωσιν
    ἐγὼ δίδωμι ὑμῖν. μὴ ταρασσέσθω ὑμῶν ἡ καρδία μηδὲ δειλιάτω.
translation:
  text: Peace I leave with you; my peace I give to you. I do not give to you as the
    world gives. Do not let your heart be troubled, nor let it be fearful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor let it be afraid' or 'nor let it lose courage.' The Greek verb carries
      the sense of becoming fearful or timid.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνην
  chosen: Peace
  alternatives:
  - wholeness
  - well-being
  lexicon: BDAG
  rationale: Standard gloss is 'peace.' In Johannine context it carries more than
    absence of conflict, but 'peace' best preserves the lexical form and theological
    breadth without over-specifying the nuance.
- source_word: ἀφίημι
  chosen: I leave
  alternatives:
  - I leave behind
  - I bequeath
  lexicon: BDAG
  rationale: Present indicative with object 'peace' naturally yields 'I leave.' 'Bequeath'
    captures testamentary nuance but is too interpretive for the main text.
- source_word: τὴν ἐμὴν
  chosen: my
  alternatives:
  - the peace that is mine
  - my own
  lexicon: BDAG
  rationale: The possessive is emphatic in Greek, distinguishing Jesus' peace from
    worldly peace. English 'my peace' preserves this naturally; stronger expansions
    are possible but unnecessary in the main text.
- source_word: δίδωμι
  chosen: I give
  alternatives:
  - I am giving
  - I grant
  lexicon: BDAG
  rationale: Simple present 'I give' is the most natural English equivalent and preserves
    the repeated verbal contrast with the world's giving.
- source_word: οὐ καθὼς ὁ κόσμος δίδωσιν
  chosen: I do not give to you as the world gives
  alternatives:
  - not as the world gives do I give to you
  - I give to you, but not in the way the world gives
  lexicon: BDAG
  rationale: This keeps the comparison explicit and preserves the emphatic contrast
    between Jesus' giving and the world's giving. Slightly reordered for natural English
    while retaining the force of the Greek.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world order
  - human society
  lexicon: BDAG
  rationale: In John, κόσμος often denotes the fallen human order in opposition to
    God, but 'the world' is the established and sufficiently broad rendering that
    preserves Johannine resonance without interpretive narrowing.
- source_word: μὴ ταρασσέσθω
  chosen: Do not let ... be troubled
  alternatives:
  - Let ... not be troubled
  - Do not let ... be distressed
  lexicon: BDAG
  rationale: The present passive imperative is well represented by 'Do not let ...
    be troubled.' This also echoes the same wording in John 14:1, preserving intrachapter
    consistency.
- source_word: ὑμῶν ἡ καρδία
  chosen: your heart
  alternatives:
  - your hearts
  lexicon: BDAG
  rationale: The Greek has singular 'the heart' with plural possessive, a collective
    singular. English can render either 'your heart' or 'your hearts'; singular better
    reflects the Greek form and the idiomatic sense of the disciples considered together.
- source_word: μηδὲ δειλιάτω
  chosen: nor let it be fearful
  alternatives:
  - nor let it be afraid
  - nor let it lose courage
  - nor let it be cowardly
  lexicon: BDAG
  rationale: δειλιάω conveys fear or loss of courage. 'Be fearful' preserves the lexical
    distinction from ταράσσω ('be troubled') better than repeating 'afraid,' while
    avoiding the overly harsh moral sense of 'cowardly'.
