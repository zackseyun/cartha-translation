id: JHN.14.9
reference: John 14:9
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· ⸂Τοσούτῳ χρόνῳ⸃ μεθ’ ὑμῶν εἰμι καὶ οὐκ ἔγνωκάς με, Φίλιππε;
    ὁ ἑωρακὼς ἐμὲ ἑώρακεν τὸν πατέρα· ⸀πῶς σὺ λέγεις· Δεῖξον ἡμῖν τὸν πατέρα;
translation:
  text: Jesus said to him, “Have I been with you for so long, and you still have not
    known me, Philip? The one who has seen me has seen the Father. How can you say,
    ‘Show us the Father’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for such a long time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοσούτῳ χρόνῳ
  chosen: for so long
  alternatives:
  - for such a long time
  - all this time
  lexicon: BDAG
  rationale: Dative of extent/duration with τοσοῦτος + χρόνος idiomatically expresses
    a long span of time. 'For so long' is natural modern English and preserves the
    rhetorical force.
- source_word: μεθ’ ὑμῶν εἰμι
  chosen: have I been with you
  alternatives:
  - am I with you
  lexicon: BDAG
  rationale: Although εἰμι is present, English idiom in a duration question prefers
    the present perfect ('have I been') to convey ongoing presence up to the present.
- source_word: οὐκ ἔγνωκάς με
  chosen: you still have not known me
  alternatives:
  - you have not known me
  - you do not know me
  lexicon: BDAG
  rationale: Perfect of γινώσκω indicates a state resulting from prior opportunity
    to know. 'Have not known' preserves the perfect better than simple present; 'still'
    brings out the rebuking force in context without adding new content.
- source_word: Φίλιππε
  chosen: Philip
  rationale: Standard transliteration of the vocative proper name into English.
- source_word: ὁ ἑωρακὼς ἐμὲ
  chosen: The one who has seen me
  alternatives:
  - Whoever has seen me
  - He who has seen me
  lexicon: BDAG
  rationale: Articular perfect participle is rendered as a substantival expression.
    'The one who' is clear, gender-accurate to the representative force, and avoids
    archaic diction.
- source_word: ἑώρακεν τὸν πατέρα
  chosen: has seen the Father
  alternatives:
  - has seen my Father
  lexicon: BDAG
  rationale: The Greek reads 'the Father,' not 'my Father.' Retaining the article
    preserves Johannine theological diction and the directness of Jesus' claim.
- source_word: πῶς σὺ λέγεις
  chosen: How can you say
  alternatives:
  - How do you say
  - Why do you say
  lexicon: BDAG
  rationale: πῶς here is rhetorical, expressing incredulity. 'How can you say' best
    captures the force in idiomatic English.
- source_word: Δεῖξον ἡμῖν τὸν πατέρα
  chosen: Show us the Father
  alternatives:
  - Reveal to us the Father
  lexicon: BDAG
  rationale: Aorist imperative of δείκνυμι is naturally rendered 'Show.' This preserves
    the direct request Philip had made in the preceding verse and repeated here by
    Jesus.
