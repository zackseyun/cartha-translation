theological_decisions:
- issue: Relation of seeing Jesus to seeing the Father
  chosen_reading: Rendered the statement straightforwardly as 'The one who has seen
    me has seen the Father' without interpretive expansion.
  alternative_readings:
  - A weaker representational sense such as 'has seen what the Father is like'
  - An expanded ontological paraphrase explicitly stating later creedal categories
  rationale: The verse makes a strong Christological claim that must be preserved,
    but the translation should not dilute it into mere resemblance nor import extra-theological
    wording beyond the Greek. This aligns with preserving the text's force while not
    adding doctrinal explanation absent from the verse itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Chalcedon (451 AD); Translation
    philosophy §3 preserve theological tension rather than resolve it'
