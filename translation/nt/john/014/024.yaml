id: JHN.14.24
reference: John 14:24
source:
  edition: SBLGNT
  text: ὁ μὴ ἀγαπῶν με τοὺς λόγους μου οὐ τηρεῖ· καὶ ὁ λόγος ὃν ἀκούετε οὐκ ἔστιν ἐμὸς ἀλλὰ τοῦ πέμψαντός με πατρός.
translation:
  text: The one who does not love me does not keep my words. And the word that you hear is not mine, but belongs to the Father who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message that you hear is not mine, but is from the Father who sent me.'
    reason: lexical_alternative
  - marker: b
    text: Or "but the Father's who sent me".
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ μὴ ἀγαπῶν
  chosen: The one who does not love
  alternatives:
  - Whoever does not love
  - The person not loving
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring generically to a person characterized by not loving Jesus. 'The one who does not love' preserves the Greek structure and ongoing sense without sounding wooden. 'Love' follows the project's default for ἀγαπάω/ἀγάπη cognates.
- source_word: ἀγαπῶν
  chosen: love
  alternatives:
  - care for
  lexicon: BDAG
  rationale: The verb is the cognate of ἀγάπη and should be rendered consistently as 'love' per project philosophy and contested-terms guidance.
- source_word: τοὺς λόγους μου
  chosen: my words
  alternatives:
  - my sayings
  - what I say
  lexicon: BDAG
  rationale: Plural λόγους is best preserved as 'words,' matching the plural and maintaining the connection between love and obedience to Jesus' spoken teaching. 'Sayings' is possible but less natural here; 'what I say' is more dynamic and loses the lexical form.
- source_word: τηρεῖ
  chosen: keep
  alternatives:
  - obey
  - guard
  lexicon: BDAG
  rationale: τηρέω in Johannine usage often carries the sense of keeping/observing Jesus' word or commandments. 'Keep' preserves both obedience and faithful observance without narrowing the sense to mere rule-following. 'Obey' is interpretive; 'guard' is too literal in English here.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: Singular λόγος here likely refers collectively to Jesus' teaching as a unified word/message. 'The word' preserves Johannine diction and allows readers to hear the thematic resonance with the Gospel's broader use of λόγος. 'Message' is possible but flattens that resonance.
- source_word: ὃν ἀκούετε
  chosen: that you hear
  alternatives:
  - which you are hearing
  - that you hear from me
  lexicon: BDAG
  rationale: Present tense ἀκούετε is naturally rendered 'you hear.' Adding 'from me' would be interpretive, since it is implied by context but not explicit in the relative clause.
- source_word: οὐκ ἔστιν ἐμὸς
  chosen: is not mine
  alternatives:
  - does not belong to me
  - is not from me
  lexicon: BDAG
  rationale: The predicate adjective ἐμός is most directly rendered 'mine.' In context it conveys source/ownership, but 'is not mine' preserves the Greek wording while allowing the following contrast to clarify origin.
- source_word: ἀλλὰ τοῦ πέμψαντός με πατρός
  chosen: but the Father's who sent me
  alternatives:
  - but belongs to the Father who sent me
  - but is from the Father who sent me
  lexicon: BDAG
  rationale: The genitive construction identifies the word as belonging to/sourceing from the Father, further specified by the participle 'who sent me.' Rendering πατρός explicitly as 'the Father's' makes the implied possessive parallel to 'not mine' and keeps the sentence compact and natural.
- source_word: πέμψαντός
  chosen: who sent
  alternatives:
  - who has sent
  lexicon: BDAG
  rationale: The aorist participle is well represented by the simple past 'who sent' in English. This is the standard Johannine designation of the Father in relation to the Son.
