id: JHN.14.12
reference: John 14:12
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ὁ πιστεύων εἰς ἐμὲ τὰ ἔργα ἃ ἐγὼ ποιῶ κἀκεῖνος ποιήσει,
    καὶ μείζονα τούτων ποιήσει, ὅτι ἐγὼ πρὸς τὸν ⸀πατέρα πορεύομαι·
translation:
  text: Truly, truly, I say to you, the one who believes in me will also do the works
    that I do; and he will do greater than these, because I am going to the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greater works than these.' The Greek can supply 'works' from the previous
      clause.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the one who believes ... he' uses a grammatically masculine
      representative singular in Greek, referring generically to any believer.
    reason: cultural_note
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most assuredly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula in natural English without paraphrasing
    away its solemn force. 'Truly, truly' is more transparent than leaving 'Amen'
    untranslated in the main text.
- source_word: ὁ πιστεύων εἰς ἐμέ
  chosen: the one who believes in me
  alternatives:
  - whoever believes in me
  - the one trusting in me
  lexicon: BDAG
  rationale: The articular present participle is rendered substantivally as a representative
    singular. 'Believes in me' is the standard and natural rendering for πιστεύω εἰς
    in Johannine usage.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  lexicon: BDAG
  rationale: '''Works'' preserves Johannine theological vocabulary and links this
    saying to Jesus'' signs and deeds throughout the Gospel.'
- source_word: ἃ ἐγὼ ποιῶ
  chosen: that I do
  alternatives:
  - which I am doing
  lexicon: BDAG
  rationale: Simple present best matches the Greek present here in idiomatic English
    and avoids overemphasizing progressive aspect.
- source_word: κἀκεῖνος
  chosen: will also
  alternatives:
  - that one also
  - he too
  lexicon: BDAG
  rationale: The compound form adds emphasis ('that one also'). In English, the emphasis
    is naturally carried by 'also' with the subject understood from the prior phrase.
- source_word: ποιήσει
  chosen: will do
  alternatives:
  - will perform
  lexicon: BDAG
  rationale: Keeps verbal consistency with ποιῶ earlier in the verse and preserves
    the straightforward future sense.
- source_word: καὶ μείζονα τούτων ποιήσει
  chosen: and he will do greater than these
  alternatives:
  - and he will do greater works than these
  - and he will do these things in greater measure
  lexicon: BDAG
  rationale: The adjective μείζονα is neuter plural and can imply 'greater things/works.'
    Because 'works' is already explicit in the previous clause, English can render
    elliptically as 'greater than these' while preserving the comparison. The fuller
    alternative 'greater works than these' is viable and worth preserving in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the greater works, not merely an explanatory
    continuation. 'Because' makes the causal force clear.
- source_word: πρὸς τὸν πατέρα πορεύομαι
  chosen: I am going to the Father
  alternatives:
  - I am going to my Father
  - I go to the Father
  lexicon: BDAG
  rationale: The present middle is naturally rendered as a near-future present in
    context. The Greek text reads 'the Father,' not 'my Father,' so the article is
    preserved.
- source_word: he
  chosen: he
  alternatives:
  - that person
  lexicon: English style / Greek grammar
  rationale: The Greek representative singular is grammatically masculine (ὁ πιστεύων
    ... κἀκεῖνος). Per doctrine, gender-accurate rendering is preferred over flattening
    to gender-neutral language, while the representative force can be noted in a footnote.
