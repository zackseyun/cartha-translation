theological_decisions:
- issue: Meaning of 'greater than these'
  chosen_reading: 'The text is left broad: the believer will do works greater than
    Jesus'' works in some sense, grounded in Jesus'' going to the Father.'
  alternative_readings:
  - greater in extent because of the post-resurrection mission
  - greater in redemptive-historical significance rather than greater in power
  - greater works through the Spirit-enabled ministry of the church
  rationale: The verse itself does not specify the exact sense of 'greater,' only
    that it is connected to Jesus' going to the Father. To preserve theological tension,
    the translation avoids importing an interpretive qualifier such as 'greater works'
    in a narrowly defined sense beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
