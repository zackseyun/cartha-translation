id: JHN.14.1
reference: John 14:1
source:
  edition: SBLGNT
  text: Μὴ ταρασσέσθω ὑμῶν ἡ καρδία· πιστεύετε εἰς τὸν θεόν, καὶ εἰς ἐμὲ πιστεύετε.
translation:
  text: Do not let your heart be troubled. Believe in God; believe also in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You believe in God; believe also in me.' The Greek form πιστεύετε can
      be either indicative ('you believe') or imperative ('believe').
    reason: alternative_reading
  - marker: b
    text: Or, 'Trust in God; trust also in me.' The verb can carry the sense of trust
      as well as belief.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ ταρασσέσθω
  chosen: Do not let ... be troubled
  alternatives:
  - Do not be troubled
  - Let ... not be troubled
  - Do not let ... be distressed
  lexicon: BDAG
  rationale: The present passive imperative with μή is naturally rendered as a prohibition.
    Including 'let' reflects the third-person imperative ('let your heart not be troubled')
    while smoothing into idiomatic English. 'Troubled' preserves the semantic range
    of ταράσσω here without overinterpreting it as mere anxiety or fear.
- source_word: ὑμῶν ἡ καρδία
  chosen: your heart
  alternatives:
  - your hearts
  lexicon: BDAG
  rationale: The Greek has singular ἡ καρδία with plural ὑμῶν, a collective singular
    common in Greek. English can render this idiomatically as singular 'your heart'
    to preserve the collective sense addressed to the group, though 'your hearts'
    is also possible.
- source_word: πιστεύετε
  chosen: Believe
  alternatives:
  - Trust
  - Have faith
  lexicon: BDAG
  rationale: πιστεύω can mean believe, trust, or have faith. 'Believe' is chosen for
    the main text because it is the most direct and traditional rendering here, while
    still allowing the relational sense signaled by εἰς. 'Trust' is a viable contextual
    alternative and is preserved in a footnote because the form may be heard as exhortative.
- source_word: εἰς τὸν θεόν
  chosen: in God
  alternatives:
  - into God
  lexicon: BDAG
  rationale: With πιστεύω, εἰς is idiomatically rendered 'in,' expressing directed
    trust/belief toward God. 'Into' would be overly literal and unnatural in English.
- source_word: καὶ εἰς ἐμὲ πιστεύετε
  chosen: believe also in me
  alternatives:
  - and believe in me
  - also trust in me
  lexicon: BDAG
  rationale: Placing 'also' in English captures καί's additive force and highlights
    the parallel between belief in God and belief in Jesus. Repeating 'believe' preserves
    the Greek repetition rather than collapsing the clause.
