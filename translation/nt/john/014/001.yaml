theological_decisions:
- issue: Indicative vs imperative force of the two instances of πιστεύετε
  chosen_reading: 'Both rendered as imperatives: ''Believe in God; believe also in
    me.'''
  alternative_readings:
  - You believe in God; believe also in me.
  - Believe in God; you also believe in me.
  - You believe in God, and you believe in me.
  rationale: The present active indicative and imperative second plural forms are
    identical in spelling, creating genuine ambiguity. In context, Jesus is consoling
    and exhorting his disciples, and the opening prohibition naturally pairs with
    two imperatives. This reading also preserves the rhetorical parallelism without
    importing a stronger doctrinal claim than the text states. Because the ambiguity
    is real, the indicative alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
