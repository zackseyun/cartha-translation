theological_decisions:
- issue: Whether τηρήσετε should be rendered as a command ('keep') or as a future
    statement ('you will keep')
  chosen_reading: 'future statement: ''you will keep'''
  alternative_readings:
  - 'imperatival sense: ''keep my commandments'''
  rationale: 'The Greek form is future indicative, not imperative. While some interpreters
    understand the clause as functionally exhortative, the translation should preserve
    the grammatical form and the theological tension: love for Jesus is presented
    as issuing in keeping his commandments, without flattening the statement into
    a direct command.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
