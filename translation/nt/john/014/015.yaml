id: JHN.14.15
reference: John 14:15
source:
  edition: SBLGNT
  text: Ἐὰν ἀγαπᾶτέ με, τὰς ἐντολὰς τὰς ἐμὰς ⸀τηρήσετε·
translation:
  text: If you love me, you will keep my commandments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will obey my commands.' The verb can mean keep, observe, guard,
      or obey; 'keep' preserves the broader sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause. 'If' is the most natural English rendering
    here; 'whenever' would overstate iterative force not required by the context.
- source_word: ἀγαπᾶτέ
  chosen: you love
  alternatives:
  - you are loving
  lexicon: BDAG
  rationale: Present active subjunctive, second person plural, after ἐάν. English
    idiom normally renders this simply as 'you love' rather than the more wooden 'you
    are loving.' This also preserves the lexical connection to ἀγάπη as 'love,' in
    line with the project's default rendering.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforward accusative
    singular rendering.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: ἐντολή commonly means 'commandment' or 'command.' 'Commandments' preserves
    the weight and recognizable Johannine usage, while remaining natural English.
    'Commands' is possible but slightly lighter in tone.
- source_word: τὰς ἐμὰς
  chosen: my
  alternatives:
  - the commandments that are mine
  - my own
  lexicon: BDAG
  rationale: The article + possessive construction is idiomatically rendered 'my.'
    The emphatic force of ἐμὰς is adequately conveyed by English possessive placement
    without awkward expansion.
- source_word: τηρήσετε
  chosen: you will keep
  alternatives:
  - you will obey
  - keep
  lexicon: BDAG
  rationale: Future active indicative, second person plural. 'Keep' is preferred because
    τηρέω in Johannine usage includes guarding, observing, and holding fast, not merely
    bare obedience. 'Obey' is interpretive and narrower. The future is retained as
    'will keep' rather than recast as an imperative.
