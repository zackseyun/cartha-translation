theological_decisions:
- issue: Rendering of the Holy Spirit with personal language
  chosen_reading: Use personal reference ('whom,' 'he') for the Spirit
  alternative_readings:
  - Use impersonal reference based on neuter πνεῦμα ('which,' 'it')
  rationale: The verse itself combines neuter πνεῦμα with masculine παράκλητος and
    the emphatic demonstrative ἐκεῖνος, signaling personal agency. Rendering with
    personal English pronouns reflects the syntax and avoids implying impersonal force.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    #1 and #3'
- issue: Translation of παράκλητος
  chosen_reading: Advocate
  alternative_readings:
  - Helper
  - Counselor
  - Comforter
  rationale: The title is theologically significant and semantically rich. 'Advocate'
    best captures the representative and active role of the Spirit in context, while
    alternatives are preserved in a footnote rather than flattened into one narrower
    nuance.
  doctrine_reference: 'Translation philosophy #1, #5'
