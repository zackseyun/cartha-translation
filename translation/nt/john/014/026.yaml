id: JHN.14.26
reference: John 14:26
source:
  edition: SBLGNT
  text: ὁ δὲ παράκλητος, τὸ πνεῦμα τὸ ἅγιον ὃ πέμψει ὁ πατὴρ ἐν τῷ ὀνόματί μου, ἐκεῖνος
    ὑμᾶς διδάξει πάντα καὶ ὑπομνήσει ὑμᾶς πάντα ἃ εἶπον ⸀ὑμῖν.
translation:
  text: But the Advocate, the Holy Spirit, whom the Father will send in my name, he
    will teach you all things and remind you of all that I said to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Helper,'' ''Counselor,'' or ''Comforter'' for ''Advocate'' (Greek:
      paraklētos).'
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλητος
  chosen: Advocate
  alternatives:
  - Helper
  - Counselor
  - Comforter
  lexicon: BDAG
  rationale: The term carries legal/representative and supportive nuances. 'Advocate'
    best preserves its personal, active role without reducing it merely to emotional
    comfort or generic assistance. Because no single English word captures the full
    range, major alternatives are preserved in a footnote.
- source_word: πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the title; 'Spirit' accurately reflects
    πνεῦμα and avoids archaic English.
- source_word: ὃ πέμψει
  chosen: whom ... will send
  alternatives:
  - which ... will send
  lexicon: BDAG
  rationale: Although πνεῦμα is grammatically neuter, English personal reference is
    appropriate here because the referent is the personal Holy Spirit. 'Whom' reflects
    the personal object of sending.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on my behalf
  - with my authority
  lexicon: BDAG
  rationale: The idiom is well established in English and preserves the semantic range
    of agency, representation, and authority without over-specifying one nuance.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  - the same one
  lexicon: BDAG
  rationale: The demonstrative is emphatic and masculine, drawing attention back to
    the παράκλητος despite the neuter πνεῦμα. 'He' is the most natural English rendering
    and preserves the personal force better than an impersonal pronoun.
- source_word: διδάξει
  chosen: will teach
  alternatives:
  - will instruct
  lexicon: BDAG
  rationale: '''Teach'' is the direct and natural rendering of διδάσκω in this context.'
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: '''All things'' stays closer to the Greek wording and preserves the breadth
    of the promise without sounding overly colloquial.'
- source_word: ὑπομνήσει
  chosen: remind
  alternatives:
  - bring to your remembrance
  - cause you to remember
  lexicon: BDAG
  rationale: '''Remind'' is concise, natural English and accurately conveys the causative
    sense of ὑπομιμνῄσκω.'
- source_word: πάντα ἃ εἶπον ὑμῖν
  chosen: all that I said to you
  alternatives:
  - everything I told you
  lexicon: BDAG
  rationale: This rendering preserves the relative construction and the directness
    of Jesus' speech while remaining readable modern English.
