theological_decisions:
- issue: Mutual indwelling of the Son and the Father
  chosen_reading: Retain the literal relational language 'I am in the Father and the
    Father is in me.'
  alternative_readings:
  - I and the Father are one
  - I am one with the Father and the Father is one with me
  rationale: The verse expresses profound unity and mutual indwelling between Jesus
    and the Father. In keeping with orthodox Christology affirmed in the Nicene Creed,
    the translation must not weaken this claim; however, it should also not replace
    John's actual wording with a doctrinal paraphrase. The literal phrasing preserves
    both the text and its theological weight.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Translation philosophy #3'
- issue: Ground of belief from the works
  chosen_reading: Translate the second clause as belief on account of the works themselves.
  alternative_readings:
  - believe me because of the works
  - believe in me because of the works
  rationale: The Greek second πιστεύετε lacks an explicit object. English can leave
    it absolute ('believe'), with the basis supplied by 'because of the works themselves.'
    This preserves the Greek's terseness and avoids importing an object not stated,
    while still conveying that the works function as testimony to Jesus's claim.
  doctrine_reference: 'Translation philosophy #1 and #3'
