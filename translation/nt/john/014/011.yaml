id: JHN.14.11
reference: John 14:11
source:
  edition: SBLGNT
  text: πιστεύετέ μοι ὅτι ἐγὼ ἐν τῷ πατρὶ καὶ ὁ πατὴρ ἐν ἐμοί· εἰ δὲ μή, διὰ τὰ ἔργα
    αὐτὰ ⸀πιστεύετε.
translation:
  text: Believe me that I am in the Father and the Father is in me; but if not, believe
    because of the works themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'believe on account of the works themselves.' The final 'believe' has
      no explicit object in Greek; the sense is that the works themselves are sufficient
      grounds for belief.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύετέ
  chosen: Believe me
  alternatives:
  - Trust me
  lexicon: BDAG
  rationale: Imperative of πιστεύω with dative μοι naturally means 'believe me' or
    'believe what I say.' 'Believe me' is the most direct and idiomatic rendering
    here, preserving the personal appeal without overinterpreting it as broader existential
    trust.
- source_word: μοι
  chosen: me
  alternatives:
  - what I say
  lexicon: BDAG
  rationale: Dative pronoun dependent on πιστεύετέ. Rendering it simply as 'me' keeps
    the Greek structure. Expanding to 'what I say' would be interpretive.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what is to be believed, not the reason for
    believing. 'That' best reflects the declarative content clause.
- source_word: ἐν τῷ πατρὶ ... ἐν ἐμοί
  chosen: in the Father ... in me
  alternatives:
  - one with the Father ... one with me
  - in union with the Father ... in union with me
  lexicon: BDAG
  rationale: The repeated ἐν expresses mutual indwelling. 'In' preserves the Johannine
    wording and theological depth without collapsing it into a paraphrase such as
    'one with,' which is interpretive.
- source_word: εἰ δὲ μή
  chosen: but if not
  alternatives:
  - otherwise
  - if you do not
  lexicon: BDAG
  rationale: This idiom marks an alternative basis for belief if the prior appeal
    is not accepted. 'But if not' preserves the contrast and conditional force.
- source_word: διὰ
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: BDAG
  rationale: With the accusative here, διά indicates reason or basis. 'Because of'
    is natural modern English and fits the logic of believing on the basis of the
    works.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  lexicon: BDAG
  rationale: In John, ἔργα often refers to Jesus's works/signifying actions that testify
    to his identity and mission. 'Works' is the standard and sufficiently broad rendering.
- source_word: αὐτὰ
  chosen: themselves
  alternatives:
  - alone
  lexicon: BDAG
  rationale: The intensive use of αὐτά emphasizes the works as sufficient testimony
    in themselves. 'Themselves' captures this emphasis better than 'alone,' which
    could suggest exclusivity beyond the Greek.
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - keep believing
  lexicon: BDAG
  rationale: Present imperative can carry ongoing force, but in English the simple
    imperative 'believe' is the clearest default. Adding 'keep' would over-specify
    aspect here.
