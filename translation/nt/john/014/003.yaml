theological_decisions:
- issue: Nature of Jesus' promised return in πάλιν ἔρχομαι
  chosen_reading: Rendered as a future-oriented promise, 'I am coming again,' without
    specifying the precise mode or timing of the return.
  alternative_readings:
  - a reference to the post-resurrection appearances
  - a reference to the coming of the Spirit
  - a reference to the final/parousia return
  rationale: The verse clearly promises renewed presence and reception of the disciples
    to Jesus himself, but the translation should not resolve the broader interpretive
    debate about whether the saying telescopes multiple comings or points specifically
    to the final return. The wording preserves the text's promise without importing
    a narrower doctrinal scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
