id: JHN.14.3
reference: John 14:3
source:
  edition: SBLGNT
  text: καὶ ἐὰν πορευθῶ ⸀καὶ ἑτοιμάσω ⸂τόπον ὑμῖν⸃, πάλιν ἔρχομαι καὶ παραλήμψομαι
    ὑμᾶς πρὸς ἐμαυτόν, ἵνα ὅπου εἰμὶ ἐγὼ καὶ ὑμεῖς ἦτε.
translation:
  text: And if I go and prepare a place for you, I am coming again and will take you
    to myself, so that where I am, you also may be.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will come again.' The Greek uses a present-form verb ('I am coming')
      with future sense.
    reason: lexical_alternative
  - marker: b
    text: Interpretations differ on whether 'I am coming again' refers specifically
      to Jesus' final return, his resurrection appearances, the coming of the Spirit,
      or a layered promise encompassing more than one of these.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν πορευθῶ
  chosen: if I go
  alternatives:
  - if I depart
  lexicon: BDAG
  rationale: 'The aorist subjunctive with ἐάν introduces a future contingency: ''if
    I go.'' ''Go'' is the plain sense of πορεύομαι here and fits the immediate context
    of Jesus'' departure; ''depart'' is interpretive and slightly more idiomatic but
    less direct.'
- source_word: ἑτοιμάσω τόπον ὑμῖν
  chosen: prepare a place for you
  alternatives:
  - make ready a place for you
  lexicon: BDAG
  rationale: ἑτοιμάζω means 'prepare, make ready.' τόπος is straightforwardly 'place.'
    The phrase is retained in familiar but accurate English without expanding what
    the 'place' entails.
- source_word: πάλιν ἔρχομαι
  chosen: I am coming again
  alternatives:
  - I will come again
  - I come again
  lexicon: BDAG
  rationale: The present middle/passive form ἔρχομαι can function futuristically.
    Rendering it as 'I am coming again' preserves the present-form vividness while
    still communicating future reference in context. 'I will come again' is possible
    but smooths over the Greek tense choice.
- source_word: παραλήμψομαι ὑμᾶς πρὸς ἐμαυτόν
  chosen: will take you to myself
  alternatives:
  - will receive you to myself
  - will take you along with me
  lexicon: BDAG
  rationale: παραλαμβάνω here conveys taking someone into one's own presence. 'Take
    you to myself' is natural modern English and preserves the relational force of
    πρὸς ἐμαυτόν. 'Receive' is traditional but less transparent in contemporary usage.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' is idiomatic modern English and preserves
    the purposive sense without sounding overly formal.
- source_word: ὅπου εἰμὶ ἐγὼ
  chosen: where I am
  alternatives:
  - where I myself am
  lexicon: BDAG
  rationale: The explicit ἐγώ adds emphasis, but English normally does not require
    a separate pronoun here. The emphasis is sufficiently carried by the clause in
    context; adding 'myself' would sound marked and potentially over-interpretive.
- source_word: καὶ ὑμεῖς ἦτε
  chosen: you also may be
  alternatives:
  - you also will be
  - you may be there also
  lexicon: BDAG
  rationale: The present subjunctive ἦτε after ἵνα is best rendered with English 'may
    be' in a purpose clause. 'Will be' would turn the purpose nuance into a simple
    future statement. 'Also' reflects καί and keeps the parallel with Jesus' presence.
