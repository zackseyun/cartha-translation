theological_decisions:
- issue: Meaning of 'the Father is greater than I' in relation to Nicene and Chalcedonian
    orthodoxy
  chosen_reading: Retain the literal comparative 'greater than I' without interpretive
    qualification in the main text.
  alternative_readings:
  - the Father is greater than me in role or status
  - the Father is greater than me with respect to Jesus' incarnate state
  rationale: The Greek states the comparison plainly and should not be softened or
    expanded in translation. In keeping with the doctrine statement, the translation
    preserves the textual tension rather than resolving a theological debate in the
    main text. Orthodoxy is maintained not by altering the wording but by refusing
    to import anti-Nicene or pro-Nicene explanatory glosses into the verse itself.
  doctrine_reference: 'Affirmations (Nicene Creed; Chalcedon); Translation philosophy
    #3 Preserve theological tension rather than resolve it.'
