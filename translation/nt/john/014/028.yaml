id: JHN.14.28
reference: John 14:28
source:
  edition: SBLGNT
  text: ἠκούσατε ὅτι ἐγὼ εἶπον ὑμῖν· Ὑπάγω καὶ ἔρχομαι πρὸς ὑμᾶς. εἰ ἠγαπᾶτέ με ἐχάρητε
    ἄν, ⸀ὅτι πορεύομαι πρὸς τὸν πατέρα, ὅτι ὁ ⸀πατὴρ μείζων μού ἐστιν.
translation:
  text: You heard that I said to you, ‘I am going away, and I am coming to you.’ If
    you loved me, you would have rejoiced that I am going to the Father, because the
    Father is greater than I.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you would rejoice that I am going to the Father.' The Greek form may
      be rendered more generally, but 'would have rejoiced' best fits the contrary-to-fact
      condition in context.
    reason: lexical_alternative
  - marker: b
    text: '''The Father is greater than I'' is translated as written without adding
      an interpretive qualifier such as ''in role'' or ''in status.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἠκούσατε
  chosen: You heard
  alternatives:
  - You have heard
  lexicon: BDAG
  rationale: Aorist indicative naturally refers to a completed hearing of Jesus' prior
    statement. Simple past is idiomatic in English here, though present-perfect is
    possible.
- source_word: ὅτι
  chosen: that
  alternatives:
  - quotation marker with no English equivalent
  lexicon: BDAG
  rationale: Introduces the content of what they heard; standard English 'that' best
    preserves the syntax.
- source_word: Ὑπάγω
  chosen: I am going away
  alternatives:
  - I go away
  - I am departing
  lexicon: BDAG
  rationale: Present tense with imminent/futuristic force in context. 'Going away'
    is natural English and preserves the movement away from the disciples.
- source_word: ἔρχομαι πρὸς ὑμᾶς
  chosen: I am coming to you
  alternatives:
  - I come to you
  - I will come to you
  lexicon: BDAG
  rationale: Present middle used with future-oriented sense. 'I am coming to you'
    preserves the vividness of the Greek while remaining idiomatic.
- source_word: εἰ ἠγαπᾶτέ με
  chosen: If you loved me
  alternatives:
  - If you were loving me
  lexicon: BDAG
  rationale: Imperfect in a present contrary-to-fact condition is best rendered with
    English past form 'if you loved me,' matching the following apodosis with 'would
    have rejoiced'.
- source_word: ἐχάρητε ἄν
  chosen: you would have rejoiced
  alternatives:
  - you would rejoice
  lexicon: BDAG
  rationale: Aorist indicative with ἄν in the apodosis of a contrary-to-fact condition
    points to the response that would have occurred. 'Would have rejoiced' best captures
    the unreal condition in idiomatic English.
- source_word: πορεύομαι πρὸς τὸν πατέρα
  chosen: I am going to the Father
  alternatives:
  - I am departing to the Father
  - I go to the Father
  lexicon: BDAG
  rationale: πορεύομαι emphasizes going/journeying. 'Going to the Father' is clear,
    natural, and preserves the relational destination. 'The Father' is retained as
    a title.
- source_word: πατέρα / πατὴρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the article with 'Father' rather than an explicit possessive
    in both instances. 'The Father' preserves the wording and Johannine titular force.
- source_word: μείζων
  chosen: greater
  alternatives:
  - greater in rank
  - greater than
  lexicon: BDAG
  rationale: Comparative of μέγας. 'Greater' is the direct lexical equivalent; explanatory
    expansions such as 'in rank' would import interpretation into the main text.
- source_word: μού
  chosen: than I
  alternatives:
  - than me
  lexicon: BDAG
  rationale: After a comparative, English literary style commonly uses 'than I.' This
    preserves the formal tone without changing meaning.
