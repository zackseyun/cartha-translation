id: JHN.14.10
reference: John 14:10
source:
  edition: SBLGNT
  text: οὐ πιστεύεις ὅτι ἐγὼ ἐν τῷ πατρὶ καὶ ὁ πατὴρ ἐν ἐμοί ἐστιν; τὰ ῥήματα ἃ ἐγὼ
    ⸀λέγω ὑμῖν ἀπ’ ἐμαυτοῦ οὐ λαλῶ, ὁ δὲ ⸀πατὴρ ἐν ἐμοὶ ⸀μένων ποιεῖ τὰ ἔργα ⸀αὐτοῦ.
translation:
  text: Do you not believe that I am in the Father and the Father is in me? The words
    that I say to you I do not speak from myself, but the Father who remains in me
    does his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on my own.' The phrase 'from myself' can express speaking on one's own
      initiative or authority.
    reason: lexical_alternative
  - marker: b
    text: Or 'abides in me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύεις
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: Standard Johannine usage favors 'believe.' 'Trust' is possible in English,
    but 'believe' better preserves the verbal link with the Gospel's recurring πιστεύω
    theme.
- source_word: ἐν τῷ πατρὶ ... ἐν ἐμοί
  chosen: in the Father ... in me
  alternatives:
  - one with the Father ... one with me
  lexicon: BDAG
  rationale: Rendered literally as 'in' to preserve the mutual indwelling language
    of the Greek and avoid importing a more interpretive paraphrase such as 'one with,'
    even though the context is strongly christological.
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - things
  lexicon: BDAG
  rationale: '''Words'' is the most natural and direct rendering here. ''Sayings''
    is possible but sounds more stylized than the context requires.'
- source_word: λέγω
  chosen: say
  alternatives:
  - speak
  - tell
  lexicon: BDAG
  rationale: Used for the content-bearing act of saying; this also allows λαλῶ later
    in the clause to be distinguished as 'speak,' reflecting the Greek variation without
    overpressing it.
- source_word: ἀπ’ ἐμαυτοῦ
  chosen: from myself
  alternatives:
  - on my own
  - from my own authority
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the source expression and leaves
    its nuance broad enough to include both source and initiative. 'On my own' is
    idiomatic but slightly more interpretive.
- source_word: λαλῶ
  chosen: speak
  alternatives:
  - say
  lexicon: BDAG
  rationale: Rendered 'speak' to preserve some distinction from λέγω ('say') in the
    previous phrase, while still sounding natural in English.
- source_word: μένων
  chosen: who remains
  alternatives:
  - who abides
  - staying
  lexicon: BDAG
  rationale: '''Remains'' is clear modern English and preserves the durative force
    of μένω. ''Abides'' is traditional in John but more archaic for the stated translation
    philosophy.'
- source_word: ποιεῖ
  chosen: does
  alternatives:
  - performs
  - works
  lexicon: BDAG
  rationale: '''Does'' is the most natural rendering with ''his works'' as object.
    ''Performs'' is possible but more formal than needed.'
- source_word: τὰ ἔργα αὐτοῦ
  chosen: his works
  alternatives:
  - the works
  - his deeds
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is present in the SBLGNT text and is therefore represented.
    'Works' preserves Johannine theological vocabulary better than 'deeds.'
