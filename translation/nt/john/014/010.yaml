theological_decisions:
- issue: Mutual indwelling of the Father and the Son
  chosen_reading: Retain the literal relational language 'I am in the Father and the
    Father is in me' without paraphrastic expansion.
  alternative_readings:
  - I and the Father are one
  - I live in union with the Father and the Father lives in union with me
  rationale: The verse contributes to high christology, but the translation should
    preserve the exact wording of this text rather than harmonize with other Johannine
    formulations or import later doctrinal terminology. This maintains fidelity while
    remaining fully compatible with Nicene orthodoxy.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 Preserve theological tension rather than resolve it'
- issue: Agency in Jesus' speech and works
  chosen_reading: Translate 'I do not speak from myself' and 'the Father who remains
    in me does his works' in a way that preserves distinction of persons without implying
    separation of essence or denial of the Son's full deity.
  alternative_readings:
  - I do not speak on my own authority
  - the Father dwelling in me is doing the works
  rationale: The wording should reflect the text's emphasis on the Son's unity with
    and dependence upon the Father in mission, while avoiding formulations that could
    suggest merely creaturely agency. The literal rendering best preserves the theological
    balance present in the Greek.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Definition of Chalcedon (451 AD)'
