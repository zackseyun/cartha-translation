theological_decisions:
- issue: Sense of the disciples' 'seeing' Jesus
  chosen_reading: Render as simple 'see' without specifying whether this refers to
    resurrection appearances, spiritual perception through faith, or eschatological
    life.
  alternative_readings:
  - physical seeing in post-resurrection appearances
  - spiritual perception of the risen Jesus
  - a layered reference including both present and future dimensions
  rationale: The verse likely carries more than one resonance in Johannine theology.
    The translation should preserve that tension rather than resolve it beyond what
    the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'you will live'
  chosen_reading: Translate broadly as 'you also will live' without narrowing it to
    physical survival, resurrection only, or spiritual life only.
  alternative_readings:
  - you will have resurrection life
  - you will continue living spiritually
  - you will share in eternal life in union with Jesus
  rationale: The Greek future of ζάω is theologically rich and may encompass present
    participation in life and future resurrection life. A broad rendering best preserves
    the text's scope.
  doctrine_reference: Preserve theological tension rather than resolve it.
