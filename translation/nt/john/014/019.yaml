id: JHN.14.19
reference: John 14:19
source:
  edition: SBLGNT
  text: ἔτι μικρὸν καὶ ὁ κόσμος με οὐκέτι θεωρεῖ, ὑμεῖς δὲ θεωρεῖτέ με, ὅτι ἐγὼ ζῶ
    καὶ ὑμεῖς ⸀ζήσετε.
translation:
  text: A little while longer, and the world will no longer see me, but you will see
    me. Because I live, you also will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold/observe me' for both instances of 'see'; the Greek verb can imply
      more than a mere glance.
    reason: lexical_alternative
  - marker: b
    text: '''You also will live'' may refer to the disciples'' share in Jesus'' resurrection
      life, spiritual life in union with him, or both.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτι μικρὸν
  chosen: A little while longer
  alternatives:
  - Yet a little while
  - A little while still
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning a short remaining time. 'A little
    while longer' preserves the forward-looking sense in natural English.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world-system
  - the people of the world
  lexicon: BDAG
  rationale: Standard Johannine usage often denotes humanity in alienation from Jesus/God.
    'The world' preserves the established term without over-interpreting it in the
    main text.
- source_word: θεωρεῖ / θεωρεῖτέ
  chosen: will no longer see / will see
  alternatives:
  - behold
  - observe
  - see clearly
  lexicon: BDAG
  rationale: Though θεωρέω can suggest sustained or perceptive seeing, 'see' is the
    most natural English equivalent here and works in both clauses. Future English
    is supplied because the temporal frame set by ἔτι μικρὸν and οὐκέτι points to
    an imminent change.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  - no more
  lexicon: BDAG
  rationale: Best concise rendering of cessation from a point soon to arrive.
- source_word: δὲ
  chosen: but
  alternatives:
  - yet
  - however
  lexicon: BDAG
  rationale: Marks contrast between the world's relation to Jesus and the disciples'
    relation to him.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here it most naturally introduces the ground for the disciples'' continued
    life: Jesus'' own life. ''Because'' makes the causal force explicit in clear English.'
- source_word: ἐγὼ ζῶ
  chosen: I live
  alternatives:
  - I am alive
  lexicon: BDAG
  rationale: Present tense retained. 'I live' is concise and preserves the theological
    weight of Jesus' living reality without paraphrase.
- source_word: ζήσετε
  chosen: you also will live
  alternatives:
  - you will live too
  - you will come to life
  lexicon: BDAG
  rationale: Future tense should be explicit. 'Also' reflects καί and highlights the
    connection between Jesus' life and the disciples' life.
