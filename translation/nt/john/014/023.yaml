theological_decisions:
- issue: Divine plural subject in 'we will come ... and make our dwelling'
  chosen_reading: The plural refers to Jesus and the Father jointly acting in divine
    indwelling presence.
  alternative_readings:
  - The plural could be flattened stylistically to avoid emphasis on distinct persons,
    but this would obscure the Greek.
  rationale: The Greek first person plural verbs ἐλευσόμεθα and ποιησόμεθα explicitly
    present Jesus and the Father as jointly coming and dwelling with the believer.
    The translation preserves both the unity of action and distinction of persons
    without adding doctrinal explanation beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
- issue: Rendering generic masculine references
  chosen_reading: Use 'anyone' for τις, but retain singular 'he/him' for the consequent
    clauses.
  alternative_readings:
  - Use fully gender-neutral 'they/them' throughout
  rationale: 'This follows the stated gender-accurate philosophy: the Greek uses a
    generic singular construction. ''Anyone'' communicates representative scope naturally,
    while ''he/him'' preserves the singular agreement and source-text form.'
  doctrine_reference: Translation philosophy §4
