id: JHN.14.23
reference: John 14:23
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Ἐάν τις ἀγαπᾷ με τὸν λόγον μου τηρήσει, καὶ
    ὁ πατήρ μου ἀγαπήσει αὐτόν, καὶ πρὸς αὐτὸν ἐλευσόμεθα καὶ μονὴν παρ’ αὐτῷ ⸀ποιησόμεθα.
translation:
  text: Jesus answered and said to him, “If anyone loves me, he will keep my word,
    and my Father will love him, and we will come to him and make our dwelling with
    him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my teaching' or 'what I say' for 'my word.'
    reason: lexical_alternative
  - marker: b
    text: Or 'make a dwelling place with him' or 'make our home with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' fits idiomatic English and
    preserves the formal reply sense.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Common complement to 'answered' in Johannine narrative; 'answered and
    said' preserves the Greek's two-verb formulation without unnecessary paraphrase.
- source_word: Ἐάν τις
  chosen: If anyone
  alternatives:
  - If someone
  lexicon: BDAG
  rationale: Indefinite conditional with generic force. 'Anyone' is natural English
    and preserves the open, representative scope.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has love for
  lexicon: BDAG
  rationale: Cognate with the noun ἀγάπη, whose default rendering is 'love' per doctrine.
    Verb rendered consistently as 'loves'.
- source_word: τὸν λόγον μου
  chosen: my word
  alternatives:
  - my teaching
  - what I say
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' message/word. 'My word' preserves Johannine
    diction and allows the theological resonance of Jesus' spoken revelation. Alternatives
    are possible but less formally aligned.
- source_word: τηρήσει
  chosen: will keep
  alternatives:
  - will obey
  - will observe
  lexicon: BDAG
  rationale: τηρέω in John often carries the sense of keeping/guarding Jesus' word
    or commandments. 'Keep' preserves the broader semantic range, including obedience
    without reducing it to mere rule-following.
- source_word: ὁ πατήρ μου
  chosen: my Father
  lexicon: BDAG
  rationale: Standard Johannine designation. Capitalized 'Father' as a divine title
    in reference to God.
- source_word: ἀγαπήσει
  chosen: will love
  alternatives:
  - will show love to
  lexicon: BDAG
  rationale: Future of ἀγαπάω; rendered consistently with the earlier verb as 'love'.
- source_word: πρὸς αὐτὸν ἐλευσόμεθα
  chosen: we will come to him
  alternatives:
  - we will go to him
  lexicon: BDAG
  rationale: ἔρχομαι with πρός naturally means movement toward a person. 'Come to
    him' is idiomatic and preserves the personal relational movement.
- source_word: μονὴν
  chosen: our dwelling
  alternatives:
  - a dwelling place
  - home
  - abode
  lexicon: BDAG
  rationale: μονή denotes a dwelling place or abiding place. 'Our dwelling' brings
    out the implied possessive relationship from the plural verb and fits the context
    of divine indwelling, while remaining natural English.
- source_word: παρ’ αὐτῷ
  chosen: with him
  alternatives:
  - beside him
  - in his presence
  lexicon: BDAG
  rationale: παρά with dative can mean 'with, in the company of.' 'With him' is the
    most natural rendering in this context of relational presence.
- source_word: ποιησόμεθα
  chosen: make
  alternatives:
  - establish
  - create
  lexicon: BDAG
  rationale: ποιέω here idiomatically means 'make' in the expression 'make a dwelling.'
    This is standard and clear English.
