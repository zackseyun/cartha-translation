id: JHN.14.25
reference: John 14:25
source:
  edition: SBLGNT
  text: Ταῦτα λελάληκα ὑμῖν παρ’ ὑμῖν μένων·
translation:
  text: I have spoken these things to you while remaining with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while staying with you' or 'while I am with you.' The Greek uses the
      participle of 'remain,' a recurring Johannine term.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring to the preceding teachings; 'these
    things' preserves the plural form and Johannine style better than the smoother
    singular 'this'.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I spoke
  lexicon: BDAG
  rationale: Perfect active indicative of λαλέω. 'I have spoken' preserves the perfect
    aspect, presenting Jesus' words as spoken with continuing relevance. 'Said' is
    possible but 'spoken' better matches λαλέω.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to you all
  lexicon: BDAG
  rationale: Dative plural pronoun addressed to the disciples. Standard English 'to
    you' is natural; the plural force is clear from context without adding 'all' in
    the main text.
- source_word: παρ’ ὑμῖν
  chosen: with you
  alternatives:
  - among you
  - beside you
  - in your presence
  lexicon: BDAG
  rationale: παρά with the dative commonly conveys proximity or presence. In this
    context, Jesus refers to his continued bodily presence with the disciples, and
    'with you' is the most natural English rendering.
- source_word: μένων
  chosen: while remaining
  alternatives:
  - while staying
  - as I remain
  - while I am with you
  lexicon: BDAG
  rationale: Present active participle of μένω, a significant Johannine verb. 'Remaining'
    preserves the lexical connection to John's recurring theme of abiding/remain language
    better than the more idiomatic but less transparent 'staying.' The participial
    sense is conveyed with 'while remaining'.
