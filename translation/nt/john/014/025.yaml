theological_decisions:
- issue: Rendering Johannine μένω language in a way that preserves thematic continuity
  chosen_reading: while remaining with you
  alternative_readings:
  - while staying with you
  - while I am with you
  rationale: John frequently uses μένω with theological weight ('remain/abide'). Although
    this verse can be rendered idiomatically as 'while I am staying with you,' preserving
    'remaining' keeps the lexical link visible without becoming unnatural. This does
    not import extra doctrine, but it does retain Johannine thematic texture.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented
    exception)'
