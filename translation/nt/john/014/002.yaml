id: JHN.14.2
reference: John 14:2
source:
  edition: SBLGNT
  text: ἐν τῇ οἰκίᾳ τοῦ πατρός μου μοναὶ πολλαί εἰσιν· εἰ δὲ μή, εἶπον ἂν ὑμῖν ⸀ὅτι
    πορεύομαι ἑτοιμάσαι τόπον ὑμῖν·
translation:
  text: In my Father's house there are many dwelling places. If it were not so, would
    I have told you that I am going to prepare a place for you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'many rooms.' The Greek word can mean places to stay or dwell; 'dwelling
      places' is broader and preserves the connection to the theme of abiding in this
      chapter.
    reason: lexical_alternative
  - marker: b
    text: Or, 'If it were not so, I would have told you, because I am going to prepare
      a place for you.' The Greek clause can also be taken as a statement rather than
      a rhetorical question.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκίᾳ
  chosen: house
  alternatives:
  - household
  - home
  lexicon: BDAG
  rationale: οἰκία most naturally denotes a house/home here. 'House' preserves the
    concrete image and the traditional Johannine expression 'my Father's house' without
    over-interpreting it as 'household.'
- source_word: πατρός μου
  chosen: my Father's
  alternatives:
  - of my Father
  lexicon: BDAG
  rationale: The genitive is rendered idiomatically in English as 'my Father's.' Capitalizing
    'Father' reflects its referent to God in Jesus' speech, not an added doctrinal
    claim.
- source_word: μοναὶ πολλαί
  chosen: many dwelling places
  alternatives:
  - many rooms
  - many abiding places
  - many residences
  lexicon: BDAG
  rationale: μονή denotes a dwelling place or place of staying/abiding. 'Dwelling
    places' preserves the lexical connection with the Johannine theme of abiding (cf.
    John 14:23) better than the traditional but narrower 'rooms,' which may suggest
    subdivisions within a building more specifically than the Greek requires.
- source_word: εἰ δὲ μή
  chosen: If it were not so
  alternatives:
  - If not
  - Otherwise
  lexicon: BDAG
  rationale: This conditional idiom is best rendered as a complete English clause.
    'If it were not so' captures the implied condition naturally and clearly.
- source_word: εἶπον ἂν ὑμῖν
  chosen: would I have told you
  alternatives:
  - I would have told you
  - would I tell you
  lexicon: BDAG
  rationale: The aorist with ἄν in this conditional context is well represented by
    the English conditional perfect. The interrogative force is carried forward with
    the following ὅτι-clause as a question, yielding a natural reading in context.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what would have been told. 'That'
    is the most straightforward rendering, though the punctuation of the whole clause
    is debated.
- source_word: πορεύομαι
  chosen: I am going
  alternatives:
  - I go
  - I am departing
  lexicon: BDAG
  rationale: 'The present middle is naturally rendered as a present-progressive/futuristic
    present in English: ''I am going.'' This preserves the immediacy of Jesus'' statement.'
- source_word: ἑτοιμάσαι
  chosen: to prepare
  alternatives:
  - to make ready
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To prepare' is the standard, clear
    rendering.
- source_word: τόπον
  chosen: a place
  alternatives:
  - room
  - space
  lexicon: BDAG
  rationale: τόπος is broad and should not be narrowed to 'room.' 'A place' matches
    the Greek and coheres with 'dwelling places' earlier in the verse.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - for all of you
  lexicon: BDAG
  rationale: The dative here is best rendered as benefactive, 'for you.' English 'you'
    leaves the plural implicit; adding 'all' would be interpretive and unnecessary
    in the main text.
