theological_decisions:
- issue: Rendering μονή in relation to eschatological imagery
  chosen_reading: many dwelling places
  alternative_readings:
  - many rooms
  - many mansions
  rationale: The verse does not require the more traditional 'mansions,' which overstates
    the lexical sense in modern English, nor the narrower 'rooms,' which may imply
    architectural subdivisions not explicit in μονή. 'Dwelling places' preserves the
    image without importing later devotional associations.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Punctuation and force of the second clause
  chosen_reading: 'rendered as a rhetorical question: ''If it were not so, would I
    have told you that I am going to prepare a place for you?'''
  alternative_readings:
  - 'rendered as a statement: ''If it were not so, I would have told you; for I am
    going to prepare a place for you.'''
  rationale: The Greek wording and manuscript punctuation tradition permit more than
    one construal, especially around ὅτι. The rhetorical-question reading is common
    and fits the flow well, but the alternative is worth preserving because the source
    text itself lacked original punctuation and the clause division is genuinely debated.
  doctrine_reference: Translation philosophy §3
