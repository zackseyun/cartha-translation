id: JHN.14.17
reference: John 14:17
source:
  edition: SBLGNT
  text: τὸ πνεῦμα τῆς ἀληθείας, ὃ ὁ κόσμος οὐ δύναται λαβεῖν, ὅτι οὐ θεωρεῖ αὐτὸ οὐδὲ
    ⸀γινώσκει· ⸀ὑμεῖς γινώσκετε αὐτό, ὅτι παρ’ ὑμῖν μένει καὶ ἐν ὑμῖν ⸀ἔσται.
translation:
  text: the Spirit of truth, whom the world is not able to receive, because it neither
    sees him nor knows him. You know him, because he remains with you and will be
    in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which the world cannot receive ... because it neither sees it nor knows
      it.' Greek uses neuter grammar with 'Spirit' (πνεῦμα), though the referent is
      personal.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be among you.' The Greek can be read corporately, though 'in you'
      best preserves the contrast with 'with you.'
    reason: alternative_reading
lexical_decisions:
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Capitalized as 'Spirit' because in Johannine context this refers to the
    Holy Spirit, not an impersonal spirit or disposition. This reflects the personal
    referent developed in the immediate context.
- source_word: τῆς ἀληθείας
  chosen: of truth
  alternatives:
  - 'true'
  - who is truth
  lexicon: BDAG
  rationale: Rendered as a genitival phrase 'of truth,' preserving the Greek construction
    and the established Johannine expression 'the Spirit of truth' rather than paraphrasing.
- source_word: ὃ
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: Although πνεῦμα is grammatically neuter, English idiom for a personal
    referent favors 'whom.' This also aligns with the verse's treatment of the Spirit
    as personal.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world-system
  - humanity
  lexicon: BDAG
  rationale: '''The world'' is the standard Johannine term and preserves the theological
    breadth of κόσμος here without over-interpreting it as either all humanity or
    specifically the rebellious world-order.'
- source_word: οὐ δύναται λαβεῖν
  chosen: is not able to receive
  alternatives:
  - cannot receive
  - is unable to accept
  lexicon: BDAG
  rationale: This preserves both the modal force of δύναται and the lexical sense
    of λαβεῖν as 'receive.' 'Is not able to receive' is slightly more formal than
    'cannot' and keeps the emphasis on incapacity.
- source_word: θεωρεῖ
  chosen: sees
  alternatives:
  - beholds
  - perceives
  lexicon: BDAG
  rationale: Rendered 'sees' for natural modern English while preserving the sensory/cognitive
    overlap of the Greek. 'Beholds' is too archaic; 'perceives' would over-interpret.
- source_word: γινώσκει / γινώσκετε
  chosen: knows / know
  alternatives:
  - recognizes / recognize
  - comes to know / know
  lexicon: BDAG
  rationale: Using 'know' preserves the lexical continuity between the world's lack
    and the disciples' possession of knowledge. 'Recognize' is possible in context
    but less direct.
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - but you
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can convey this
    adequately by sentence position and stress without requiring an added 'but'; the
    contrast is already clear from context.
- source_word: παρ’ ὑμῖν μένει
  chosen: he remains with you
  alternatives:
  - he abides with you
  - he stays beside you
  lexicon: BDAG
  rationale: μένει is rendered 'remains' to preserve Johannine verbal consistency
    with μένω while keeping readable modern English. παρά with the dative is expressed
    naturally as 'with you.'
- source_word: ἐν ὑμῖν ἔσται
  chosen: will be in you
  alternatives:
  - will be among you
  lexicon: BDAG
  rationale: The preposition ἐν most naturally means 'in.' 'Among you' is possible
    when the pronoun is plural, but here the contrast with 'with you' favors an inward/personal
    indwelling sense, so 'in you' best preserves the theological and lexical distinction.
