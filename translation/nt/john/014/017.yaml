theological_decisions:
- issue: Personal reference to the Holy Spirit despite neuter grammatical forms
  chosen_reading: Use personal English pronouns ('whom,' 'him,' 'he') for the Spirit
  alternative_readings:
  - use impersonal/grammatical neuter forms such as 'which' and 'it'
  rationale: The verse refers to the Holy Spirit as a personal divine agent. While
    Greek πνεῦμα is neuter, English personal pronouns better reflect the referent
    in context and avoid implying impersonality. This fits historic orthodox Trinitarian
    doctrine without importing claims beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Meaning of the Spirit's relation to believers in 'with you' and 'in you'
  chosen_reading: Preserve both locative distinctions as 'with you' and 'in you'
  alternative_readings:
  - flatten both to a general presence such as 'with you' or 'among you'
  rationale: The Greek uses two distinct prepositional expressions, παρά and ἐν. The
    translation preserves the tension and progression in the text rather than resolving
    it into a single idea of presence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
