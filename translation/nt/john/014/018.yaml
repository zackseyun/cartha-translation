theological_decisions:
- issue: Referent and timing of 'I am coming to you'
  chosen_reading: Render the clause without specifying whether Jesus refers to his
    post-resurrection appearances, the coming of the Spirit, or his eschatological
    return.
  alternative_readings:
  - a reference to Jesus' resurrection appearances
  - a reference to Jesus' coming in/through the Holy Spirit
  - a reference to Jesus' final return
  rationale: The immediate context includes promises about the Spirit, yet the wording
    also naturally resonates with Jesus' personal return to the disciples. The translation
    preserves the text's theological breadth rather than resolving the ambiguity in
    the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
