id: JHN.14.18
reference: John 14:18
source:
  edition: SBLGNT
  text: Οὐκ ἀφήσω ὑμᾶς ὀρφανούς, ἔρχομαι πρὸς ὑμᾶς.
translation:
  text: I will not leave you as orphans; I am coming to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not leave you orphaned.' The Greek image is of being left as
      children without parental care.
    reason: lexical_alternative
  - marker: b
    text: '''I am coming to you'' may refer to Jesus'' coming after the resurrection,
      his coming through the Holy Spirit, or his future return; the Greek wording
      itself does not force a single referent.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφήσω
  chosen: will leave
  alternatives:
  - will abandon
  - will forsake
  lexicon: BDAG
  rationale: Future active indicative of ἀφίημι here carries the sense of leaving
    behind rather than forgiving or permitting. 'Leave' is the most natural English
    equivalent in this context and pairs well with the predicate 'as orphans.'
- source_word: ὀρφανούς
  chosen: as orphans
  alternatives:
  - orphaned
  - bereaved
  - fatherless
  lexicon: BDAG
  rationale: ὀρφανός literally denotes one deprived of parents, and by extension left
    bereft or without care. 'As orphans' preserves the concrete familial image and
    avoids over-interpreting it as merely emotional abandonment. The predicate accusative
    after ἀφήσω is best represented with 'leave you as orphans' rather than the less
    idiomatic 'leave you orphaned,' though that remains a viable alternative.
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  - I will come
  lexicon: BDAG
  rationale: Present middle/passive deponent indicative is used here with a near-future
    or vivid force. 'I am coming' preserves the present-form immediacy of the Greek
    better than flattening it to a simple future, while still sounding natural in
    English.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - toward you
  lexicon: BDAG
  rationale: πρός with the accusative commonly indicates movement toward a person.
    In idiomatic English with a verb of coming, 'to you' is the natural rendering.
- source_word: Οὐκ
  chosen: not
  alternatives:
  - certainly not
  lexicon: BDAG
  rationale: Standard negation of the future verb. English expresses this naturally
    as 'will not.'
