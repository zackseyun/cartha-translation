id: JHN.14.22
reference: John 14:22
source:
  edition: SBLGNT
  text: λέγει αὐτῷ Ἰούδας, οὐχ ὁ Ἰσκαριώτης· Κύριε, ⸀τί γέγονεν ὅτι ἡμῖν μέλλεις ἐμφανίζειν
    σεαυτὸν καὶ οὐχὶ τῷ κόσμῳ;
translation:
  text: Judas (not Iscariot) said to him, “Lord, what has happened that you are going
    to reveal yourself to us and not to the world?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “make yourself known to us.”
    reason: lexical_alternative
  - marker: b
    text: Or “manifest yourself.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek present can be rendered as a historical present ('says'),
    idiomatic modern English normally uses the simple past in narrative. This preserves
    the sense without awkwardness.
- source_word: Ἰούδας, οὐχ ὁ Ἰσκαριώτης
  chosen: Judas (not Iscariot)
  alternatives:
  - Judas, not Iscariot
  - Jude, not Iscariot
  lexicon: BDAG
  rationale: The appositional clarification distinguishes this Judas from Judas Iscariot.
    'Judas' is the standard transliteration of Ἰούδας in this context; 'Jude' is possible
    in English tradition but less transparent here because the contrast with Iscariot
    is explicit.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord' as the default title.
    In direct address to Jesus, this preserves both respect and the title's theological
    weight.
- source_word: τί γέγονεν
  chosen: what has happened
  alternatives:
  - what has come about
  - how is it
  lexicon: BDAG
  rationale: The perfect of γίνομαι points to a state resulting from something that
    has occurred. 'What has happened' is natural English and preserves the sense of
    changed circumstance behind Judas's question.
- source_word: ὅτι
  chosen: that
  alternatives:
  - that this is why
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content/explanation of the question: what has
    happened such that Jesus intends to reveal himself to the disciples and not the
    world. ''That'' works smoothly in English after ''what has happened''.'
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - to us disciples
  lexicon: BDAG
  rationale: The dative marks the recipients of the self-revelation. The pronoun is
    left simple and unexpanded, since the referent is clear from context.
- source_word: μέλλεις
  chosen: you are going to
  alternatives:
  - you intend to
  - you are about to
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys intention or imminence. 'You are
    going to' is natural modern English and preserves the forward-looking force without
    overstating immediacy.
- source_word: ἐμφανίζειν σεαυτόν
  chosen: reveal yourself
  alternatives:
  - manifest yourself
  - make yourself known
  lexicon: BDAG
  rationale: The verb means to make visible, known, or manifest. 'Reveal yourself'
    is clear, modern, and preserves the reflexive force. 'Manifest yourself' is more
    traditional but less natural for contemporary readers.
- source_word: κόσμῳ
  chosen: the world
  alternatives:
  - the people of the world
  lexicon: BDAG
  rationale: κόσμος in Johannine usage commonly denotes the world in its human order,
    often in estrangement from God. 'The world' preserves John's theological vocabulary
    and avoids interpretive expansion.
