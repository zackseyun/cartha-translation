theological_decisions:
- issue: Johannine use of κόσμος
  chosen_reading: the world
  alternative_readings:
  - humanity in general
  - the unbelieving world order
  rationale: The term carries theological depth in John, but this verse does not require
    the translation to resolve all nuances. Retaining 'the world' preserves the tension
    and lets the broader context supply the shade of meaning.
  doctrine_reference: Preserve theological tension rather than resolve it.
