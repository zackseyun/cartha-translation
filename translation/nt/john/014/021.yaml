id: JHN.14.21
reference: John 14:21
source:
  edition: SBLGNT
  text: ὁ ἔχων τὰς ἐντολάς μου καὶ τηρῶν αὐτὰς ἐκεῖνός ἐστιν ὁ ἀγαπῶν με· ὁ δὲ ἀγαπῶν
    με ἀγαπηθήσεται ὑπὸ τοῦ πατρός μου, κἀγὼ ἀγαπήσω αὐτὸν καὶ ἐμφανίσω αὐτῷ ἐμαυτόν.
translation:
  text: The one who has my commandments and keeps them is the one who loves me. And
    the one who loves me will be loved by my Father, and I will love him and will
    reveal myself to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The person who has my commandments and keeps them … I will love that
      person and reveal myself to that person.' The Greek uses masculine singular
      forms with representative force.
    reason: lexical_alternative
  - marker: b
    text: Or 'will show myself to him.' The Greek verb can mean to make oneself known
      or visible; here it likely emphasizes personal self-disclosure.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - Whoever has
  - The person who has
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a representative individual. 'The one who has' preserves the Greek structure
    and generic force without over-paraphrasing.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  - instructions
  lexicon: BDAG
  rationale: ἐντολή commonly means 'commandment' or 'command.' 'Commandments' preserves
    the authoritative force of Jesus's words and aligns with Johannine usage, while
    remaining natural English.
- source_word: τηρῶν
  chosen: keeps
  alternatives:
  - obeys
  - observes
  - guards
  lexicon: BDAG
  rationale: τηρέω in John often carries the sense of keeping, observing, or holding
    fast to a word/command. 'Keeps' is both idiomatic and slightly broader than 'obeys,'
    preserving the Johannine nuance of faithful observance.
- source_word: ἐκεῖνός ἐστιν ὁ ἀγαπῶν με
  chosen: is the one who loves me
  alternatives:
  - that one is the one who loves me
  - is the one loving me
  lexicon: BDAG
  rationale: 'The demonstrative ἐκεῖνος adds emphasis: the one characterized by having
    and keeping Jesus''s commandments is precisely the one who loves him. The chosen
    rendering preserves the emphatic identification in natural English.'
- source_word: ἀγαπῶν / ἀγαπηθήσεται / ἀγαπήσω
  chosen: loves / will be loved / will love
  alternatives:
  - cares for / will be loved / will care for
  lexicon: BDAG
  rationale: The verse intentionally repeats the ἀγαπάω word-group. Per translation
    philosophy, lexical cognates should be kept where possible. 'Love' preserves both
    the lexical repetition and theological weight.
- source_word: ὁ δὲ ἀγαπῶν με
  chosen: And the one who loves me
  alternatives:
  - But the one who loves me
  - Now the one who loves me
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And'
    fits the flow in English while preserving the progression of thought.
- source_word: ἀγαπηθήσεται ὑπὸ τοῦ πατρός μου
  chosen: will be loved by my Father
  alternatives:
  - will be loved by my Father himself
  lexicon: BDAG
  rationale: Future passive straightforwardly indicates the Father's love toward the
    one loving Jesus. 'My Father' preserves the filial language central to Johannine
    theology.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - I also
  - and I myself
  lexicon: BDAG
  rationale: κἀγώ = καὶ ἐγώ, adding Jesus's corresponding action to the Father's.
    'And I' is the most natural rendering; the additive force is retained by the conjunction.
- source_word: ἐμφανίσω
  chosen: will reveal
  alternatives:
  - will make known
  - will show
  lexicon: BDAG
  rationale: ἐμφανίζω means to make visible, disclose, or reveal. 'Will reveal' best
    captures the personal self-disclosure of Jesus in this context without implying
    merely physical sight.
- source_word: ἐμαυτόν
  chosen: myself
  alternatives:
  - my own self
  lexicon: BDAG
  rationale: The reflexive pronoun emphasizes that Jesus himself, not merely information
    about him, is what is disclosed.
- source_word: αὐτὸν / αὐτῷ
  chosen: him / to him
  alternatives:
  - that person / to that person
  lexicon: BDAG
  rationale: The Greek uses masculine singular pronouns tied to the substantival participles.
    Per doctrine, gender-accurate rendering is preferred where the grammar carries
    representative force. 'Him' preserves the source form; an inclusive alternative
    is worth noting in a footnote.
