theological_decisions:
- issue: Relationship between love and obedience
  chosen_reading: Rendered the syntax so that keeping Jesus's commandments identifies
    the one who loves him, without adding causal or meritorious language.
  alternative_readings:
  - Obedience proves love
  - Obedience earns divine love
  rationale: 'The Greek states an identifying relationship: the one having and keeping
    the commandments is the one loving Jesus. The verse then states that such a person
    will be loved by the Father and by Jesus. The translation avoids importing a doctrinal
    claim that divine love is merited, while preserving the text''s close connection
    between love and obedience.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Nature of Jesus's self-revelation
  chosen_reading: Translated ἐμφανίσω as 'will reveal myself to him' rather than a
    more physical 'show myself.'
  alternative_readings:
  - will show myself to him
  rationale: The context in John 14 concerns post-departure relational presence and
    self-disclosure, not necessarily a visible appearance. 'Reveal' preserves the
    broader semantic range and avoids narrowing the meaning beyond the text.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Generic masculine representation
  chosen_reading: Used 'him' in the main text with a footnote preserving the representative
    sense.
  alternative_readings:
  - them
  - that person
  rationale: The Greek is grammatically masculine singular and representative. Per
    doctrine, gender-accurate rendering is preferred over flattening to plural or
    neutral forms, while inclusivity can be clarified in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
