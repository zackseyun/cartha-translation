id: JHN.14.7
reference: John 14:7
source:
  edition: SBLGNT
  text: εἰ ⸀ἐγνώκειτέ με, καὶ τὸν πατέρα μου ⸂ἂν ᾔδειτε⸃· ⸀ἀπ’ ἄρτι γινώσκετε αὐτὸν
    καὶ ἑωράκατε ⸀αὐτόν.
translation:
  text: If you had known me, you would have known my Father also. From now on you
    do know him and have seen him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read the first clause in a form that can be translated
      more simply, 'If you know me, you will know my Father also.' The printed Greek
      text supports 'If you had known me, you would have known my Father also.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐγνώκειτέ
  chosen: had known
  alternatives:
  - knew
  - had come to know
  lexicon: BDAG
  rationale: Pluperfect of γινώσκω in the conditional clause is best represented by
    English pluperfect, marking a prior state unrealized or incompletely realized
    in relation to the following statement. 'Known' preserves relational knowledge
    rather than mere cognition.
- source_word: ᾔδειτε
  chosen: would have known
  alternatives:
  - would know
  - would have understood
  lexicon: BDAG
  rationale: 'Pluperfect of οἶδα with ἄν in the apodosis is naturally rendered as
    a contrary-to-fact result in English: ''would have known.'' Using ''known'' also
    preserves the Johannine overlap yet distinction between γινώσκω and οἶδα without
    overinterpreting it as ''understood.'''
- source_word: πατέρα μου
  chosen: my Father
  alternatives:
  - the Father who is mine
  lexicon: BDAG
  rationale: Standard and natural rendering of the possessive phrase, preserving the
    filial and theological force of Jesus' unique relation to the Father.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'In the first clause, καί has an adjunctive sense: knowing Jesus entails
    knowing the Father also. ''Also'' makes that implication clear in idiomatic English.'
- source_word: ἀπ’ ἄρτι
  chosen: From now on
  alternatives:
  - from this moment
  - already now
  lexicon: BDAG
  rationale: This idiom marks a transition point in the discourse. 'From now on' is
    idiomatic and preserves the temporal force without forcing a more technical nuance.
- source_word: γινώσκετε
  chosen: do know
  alternatives:
  - know
  - are knowing
  lexicon: BDAG
  rationale: Present tense is rendered with emphatic 'do know' to reflect the discourse
    contrast with the preceding conditional and to fit the force of ἀπ’ ἄρτι. This
    avoids flattening the shift from hypothetical past to present reality.
- source_word: ἑωράκατε
  chosen: have seen
  alternatives:
  - saw
  - have looked upon
  lexicon: BDAG
  rationale: Perfect of ὁράω is best rendered 'have seen,' expressing a completed
    action with abiding significance. This is important in Johannine theology, where
    seeing Jesus bears revelatory weight.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to the Father in both occurrences, and 'him' preserves
    the personal referent without interpretive expansion.
