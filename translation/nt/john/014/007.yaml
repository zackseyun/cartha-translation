theological_decisions:
- issue: Relationship between knowing/seeing Jesus and knowing/seeing the Father
  chosen_reading: The verse is translated straightforwardly so that Jesus' words affirm
    that knowledge of and encounter with Jesus reveal the Father, without adding explanatory
    doctrinal language.
  alternative_readings:
  - A softer reading that treats 'seeing' as merely metaphorical understanding
  - A more explicit doctrinal paraphrase stating ontological identity
  rationale: Historic orthodoxy affirms the full deity of the Son and his unity with
    the Father, but the translation should not import later creedal wording into the
    verse. The wording preserves the text's strong revelatory claim and theological
    tension as stated.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Force of the first conditional clause
  chosen_reading: 'Rendered as a past contrary-to-fact or reproachful condition: ''If
    you had known me, you would have known my Father also.'''
  alternative_readings:
  - 'A simpler condition: ''If you know me, you will know my Father also'''
  - A textual harmonization toward a less confrontational reading
  rationale: The Greek pluperfects with ἄν strongly support the chosen English construction.
    This preserves the rhetorical rebuke present in context while allowing the second
    sentence to announce a new stage of recognition.
  doctrine_reference: Translation philosophy §1
