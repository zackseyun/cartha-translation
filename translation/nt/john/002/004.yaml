theological_decisions:
- issue: Tone and force of Jesus' address to his mother
  chosen_reading: A respectful but distancing response, not an insult
  alternative_readings:
  - A harsh rebuke
  - A warmly affectionate address
  rationale: The idiom 'Τί ἐμοὶ καὶ σοί' creates relational or situational distance,
    and 'γύναι' is a normal form of address that can be respectful in context. The
    translation preserves the tension without making Jesus sound either rude or sentimental.
    This aligns with the philosophy of preserving theological and interpretive tension
    rather than resolving it beyond what the Greek warrants.
  doctrine_reference: Translation philosophy §3
- issue: Meaning of 'my hour' in Johannine theology
  chosen_reading: Jesus refers to his divinely appointed hour, with broader theological
    resonance beyond the immediate situation
  alternative_readings:
  - Only the moment for performing this sign
  - A general statement about timing with no Johannine theological weight
  rationale: Within John, 'hour' regularly carries thematic significance tied to Jesus'
    mission and glorification. The translation keeps the literal phrase so readers
    can perceive that resonance without overdefining it in the main text.
  doctrine_reference: Translation philosophy §1, §3
