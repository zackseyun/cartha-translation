id: JHN.2.4
reference: John 2:4
source:
  edition: SBLGNT
  text: ⸀καὶ λέγει αὐτῇ ὁ Ἰησοῦς· Τί ἐμοὶ καὶ σοί, γύναι; οὔπω ἥκει ἡ ὥρα μου.
translation:
  text: And Jesus said to her, “What does that have to do with me and with you, woman?
    My hour has not yet come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What is that to me and to you?”—an idiom expressing
      distance of concern, not necessarily hostility.
    reason: lexical_alternative
  - marker: b
    text: “Woman” was a normal respectful form of address in that setting, though
      it can sound abrupt in English.
    reason: cultural_note
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally uses the simple past here. This is a standard optimal-equivalence
    adjustment that preserves the discourse function without sounding unnatural.
- source_word: Τί ἐμοὶ καὶ σοί
  chosen: What does that have to do with me and with you
  alternatives:
  - What is that to me and to you
  - What have I to do with you
  - What is there between me and you
  lexicon: BDAG
  rationale: This is an idiomatic Semitic/Greek expression signaling distance, difference
    of concern, or mild rebuke rather than a literal question about possession or
    relationship. The chosen rendering preserves the idiomatic force in clear modern
    English without overstating hostility.
- source_word: γύναι
  chosen: woman
  alternatives:
  - dear woman
  - madam
  lexicon: BDAG
  rationale: The vocative literally means 'woman.' In this context it is not necessarily
    rude, but adding 'dear' imports warmth not explicit in the Greek, while 'madam'
    sounds too formal and culturally displaced. The literal rendering is retained,
    with a footnote to clarify tone.
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not now
  lexicon: BDAG
  rationale: The adverb marks that the relevant time has not arrived up to this point.
    'Not yet' is the most direct and idiomatic rendering.
- source_word: ἥκει
  chosen: has come
  alternatives:
  - has arrived
  - is here
  lexicon: BDAG
  rationale: The verb denotes arrival or presence. 'Has come' is idiomatic with 'hour'
    in English and matches Johannine usage well.
- source_word: ἡ ὥρα μου
  chosen: my hour
  alternatives:
  - my time
  lexicon: BDAG
  rationale: John uses 'hour' as a theologically loaded term for the divinely appointed
    moment of Jesus' self-disclosure, suffering, death, resurrection, and glorification.
    'Hour' preserves this Johannine motif better than the more generic 'time'.
