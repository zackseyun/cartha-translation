id: JHN.2.14
reference: John 2:14
source:
  edition: SBLGNT
  text: καὶ εὗρεν ἐν τῷ ἱερῷ τοὺς πωλοῦντας βόας καὶ πρόβατα καὶ περιστερὰς καὶ τοὺς
    κερματιστὰς καθημένους,
translation:
  text: And he found in the temple those selling oxen and sheep and doves, and the
    money changers sitting there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'in the temple' uses ἱερόν, referring to the temple complex or precincts,
      not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν
  chosen: found
  alternatives:
  - saw
  - came upon
  lexicon: BDAG
  rationale: Aorist of εὑρίσκω most naturally means 'found' here, describing what
    Jesus encountered upon entering. 'Saw' is possible in context but is less direct
    to the lexical sense.
- source_word: ἱερῷ
  chosen: temple
  alternatives:
  - temple courts
  - temple precincts
  - sanctuary
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (which would more specifically be ναός). 'Temple' is the standard readable rendering;
    the broader sense is preserved by context and clarified in a footnote.
- source_word: πωλοῦντας
  chosen: those selling
  alternatives:
  - those who were selling
  - the ones selling
  lexicon: BDAG
  rationale: The present participle denotes ongoing activity. 'Those selling' is concise,
    natural English that preserves the substantival participle.
- source_word: βόας
  chosen: oxen
  alternatives:
  - cattle
  - bulls
  lexicon: BDAG
  rationale: βοῦς can denote cattle broadly, but 'oxen' is a traditional and precise
    plural that fits sacrificial-animal context without over-specifying sex as 'bulls'
    would.
- source_word: πρόβατα
  chosen: sheep
  alternatives:
  - small livestock
  lexicon: BDAG
  rationale: In this context πρόβατα is best rendered 'sheep.' While the term can
    cover small livestock more broadly, 'sheep' is the normal and clearest English
    equivalent here.
- source_word: περιστερὰς
  chosen: doves
  alternatives:
  - pigeons
  lexicon: BDAG
  rationale: περιστερά can refer to dove/pigeon. 'Doves' is the more common biblical-English
    rendering in sacrificial contexts and is readily understood.
- source_word: κερματιστὰς
  chosen: money changers
  alternatives:
  - coin dealers
  - money exchangers
  lexicon: BDAG
  rationale: κερματιστής refers to one who exchanges coins/currency. 'Money changers'
    is the established and accurate English expression.
- source_word: καθημένους
  chosen: sitting there
  alternatives:
  - seated
  - sitting
  lexicon: BDAG
  rationale: The participle describes their posture/station at their tables. 'Sitting
    there' makes the scene vivid in natural English and slightly brings out their
    settled presence in the temple area.
