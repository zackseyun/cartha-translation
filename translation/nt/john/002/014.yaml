theological_decisions:
- issue: Scope of ἱερόν in relation to the Jerusalem temple
  chosen_reading: Rendered as 'temple' in the main text, with the understanding that
    the Greek denotes the temple precincts/courts rather than the inner sanctuary.
  alternative_readings:
  - temple courts
  - temple precincts
  - sanctuary
  rationale: This is not a doctrinally contested term in the excerpt, but it affects
    historical and interpretive clarity. The narrative setting of animal sellers and
    money changers strongly indicates the broader temple complex. Main-text 'temple'
    remains idiomatic; a footnote preserves the more specific spatial nuance.
  doctrine_reference: Translation philosophy §1, §6
