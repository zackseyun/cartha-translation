theological_decisions:
- issue: Rendering Jesus’ designation of the temple as 'my Father’s house'
  chosen_reading: 'Retain the explicit filial claim without softening: ''my Father’s
    house.'''
  alternative_readings:
  - our Father’s house
  - God’s house
  rationale: The Greek explicitly uses the singular possessive μου with πατρός, expressing
    Jesus' unique filial relationship and authority in context. The translation should
    preserve this christological force without expanding it beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy §1 original-language primacy over translation
    tradition.'
