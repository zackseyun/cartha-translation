id: JHN.2.16
reference: John 2:16
source:
  edition: SBLGNT
  text: καὶ τοῖς τὰς περιστερὰς πωλοῦσιν εἶπεν· Ἄρατε ταῦτα ἐντεῦθεν, μὴ ποιεῖτε τὸν
    οἶκον τοῦ πατρός μου οἶκον ἐμπορίου.
translation:
  text: And he said to those selling the doves, “Take these things away from here;
    do not make my Father’s house a house of trade.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a marketplace.” The Greek more literally reads “a house of trade,” preserving
      the repetition of “house” in the sentence.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιστερὰς
  chosen: doves
  alternatives:
  - pigeons
  lexicon: BDAG
  rationale: The term denotes the birds sold for sacrifice. 'Doves' is the standard
    and more natural English rendering in this temple context, though 'pigeons' is
    a possible zoological equivalent.
- source_word: πωλοῦσιν
  chosen: selling
  alternatives:
  - offering for sale
  lexicon: BDAG
  rationale: The present participle identifies the group by their ongoing commercial
    activity. 'Selling' is concise and natural while preserving the participial force.
- source_word: Ἄρατε
  chosen: Take
  alternatives:
  - Remove
  - Carry away
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive action. 'Take' in the idiom
    'take ... away' is natural English and preserves the command's force.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these
  lexicon: BDAG
  rationale: The demonstrative is neuter plural and likely refers to the goods/cages
    associated with the sellers. 'These things' makes the object explicit in idiomatic
    English without over-specifying.
- source_word: ἐντεῦθεν
  chosen: away from here
  alternatives:
  - from here
  - out of here
  lexicon: BDAG
  rationale: The adverb marks removal from the present place. 'Away from here' fits
    the motion implied by ἄρατε and sounds natural in English.
- source_word: μὴ ποιεῖτε
  chosen: do not make
  alternatives:
  - stop making
  - do not turn
  lexicon: BDAG
  rationale: With μή plus present imperative, the sense is a prohibition. 'Do not
    make' is the most direct rendering. 'Do not turn' is interpretive and less formally
    tied to ποιέω.
- source_word: οἶκον τοῦ πατρός μου
  chosen: my Father’s house
  alternatives:
  - the house of my Father
  lexicon: BDAG
  rationale: This preserves both the familial claim and the temple reference. The
    possessive form is natural English and retains the christologically significant
    relationship expressed in the Greek.
- source_word: οἶκον ἐμπορίου
  chosen: a house of trade
  alternatives:
  - a marketplace
  - a house of merchandise
  - a market house
  lexicon: BDAG
  rationale: ἐμπόριον denotes trade or commerce. 'A house of trade' preserves the
    repeated οἶκος/house wording in Greek ('house ... house'), which would be lost
    with the smoother 'marketplace.' This better reflects the rhetorical contrast
    in Jesus' statement.
