id: JHN.2.23
reference: John 2:23
source:
  edition: SBLGNT
  text: Ὡς δὲ ἦν ἐν τοῖς Ἱεροσολύμοις ἐν τῷ πάσχα ἐν τῇ ἑορτῇ, πολλοὶ ἐπίστευσαν εἰς
    τὸ ὄνομα αὐτοῦ, θεωροῦντες αὐτοῦ τὰ σημεῖα ἃ ἐποίει·
translation:
  text: Now when he was in Jerusalem at the Passover, during the feast, many believed
    in his name as they were seeing the signs that he was doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'believed in him.' Literally, 'believed in his name,' a Johannine expression
      emphasizing trust directed toward his revealed identity.
    reason: lexical_alternative
  - marker: b
    text: '''Signs'' is John''s characteristic term for works that point beyond themselves
      to who Jesus is; some translations render it ''miraculous signs.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: Now when
  alternatives:
  - while
  - as
  - and when
  lexicon: BDAG
  rationale: Introduces a new scene with mild continuity. 'Now when' gives natural
    English narrative flow without losing the temporal force of ὡς plus δέ.
- source_word: ἦν ἐν τοῖς Ἱεροσολύμοις
  chosen: he was in Jerusalem
  alternatives:
  - he was at Jerusalem
  lexicon: BDAG
  rationale: Standard locative expression. 'In Jerusalem' is idiomatic modern English.
- source_word: ἐν τῷ πάσχα
  chosen: at the Passover
  alternatives:
  - during Passover
  - at Passover time
  lexicon: BDAG
  rationale: πάσχα refers to the Passover festival period here. 'At the Passover'
    is concise and natural.
- source_word: ἐν τῇ ἑορτῇ
  chosen: during the feast
  alternatives:
  - at the feast
  - during the festival
  lexicon: BDAG
  rationale: Retains the appositional/expansive reference to the festival setting.
    'During the feast' reads naturally while preserving the repeated ἐν-phrasing.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Simple quantitative term; 'many' is sufficient without adding 'people,'
    which is implied.
- source_word: ἐπίστευσαν εἰς τὸ ὄνομα αὐτοῦ
  chosen: believed in his name
  alternatives:
  - believed into his name
  - put their faith in his name
  - believed in him
  lexicon: BDAG
  rationale: John's idiom πιστεύω εἰς plus 'the name' is preserved rather than flattened
    to merely 'believed in him.' 'Believed in his name' keeps the Johannine formulation
    and its association with trust directed toward his revealed identity.
- source_word: θεωροῦντες
  chosen: as they were seeing
  alternatives:
  - seeing
  - observing
  - beholding
  lexicon: BDAG
  rationale: Present participle indicates contemporaneous ongoing observation. 'As
    they were seeing' captures the durative sense better than a simple English participle,
    though still readable.
- source_word: τὰ σημεῖα
  chosen: the signs
  alternatives:
  - the miraculous signs
  - the sign-miracles
  lexicon: BDAG
  rationale: In John, σημεῖα is a theologically loaded term pointing beyond mere wonders.
    'Signs' preserves Johannine vocabulary without interpretive expansion.
- source_word: ἃ ἐποίει
  chosen: that he was doing
  alternatives:
  - which he was doing
  - that he did
  lexicon: BDAG
  rationale: Imperfect ἐποίει suggests ongoing action in past time. 'Was doing' preserves
    the aspect better than simple past 'did'.
