theological_decisions:
- issue: Nature of the belief described by ἐπίστευσαν εἰς τὸ ὄνομα αὐτοῦ in Johannine
    context
  chosen_reading: Render straightforwardly as 'many believed in his name' without
    weakening it in translation, while allowing the following context (v. 24) to qualify
    the adequacy of that belief.
  alternative_readings:
  - many put initial or superficial faith in him
  - many professed belief because of the miracles
  rationale: The Greek states that many believed in his name; the translator should
    not preemptively downgrade the belief in this verse itself. John's narrative immediately
    adds nuance in the next verse, so the translation preserves the textual tension
    rather than resolving it doctrinally.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
