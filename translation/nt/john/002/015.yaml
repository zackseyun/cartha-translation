theological_decisions:
- issue: Scope and force of Jesus' action in the temple
  chosen_reading: The translation states that Jesus drove 'them all' out of the temple
    courts, with the following phrase explicitly including the sheep and cattle, without
    specifying that he used the whip on people.
  alternative_readings:
  - He drove all the people and animals out
  - He drove only the animals out
  rationale: The Greek syntax includes πάντας followed by sheep and cattle, but does
    not explicitly say the whip was used on humans. The rendering preserves the breadth
    of the expulsion while avoiding an interpretive overstatement about the instrument's
    use.
  doctrine_reference: Preserve theological tension rather than resolve it.
