id: JHN.2.15
reference: John 2:15
source:
  edition: SBLGNT
  text: καὶ ποιήσας φραγέλλιον ἐκ σχοινίων πάντας ἐξέβαλεν ἐκ τοῦ ἱεροῦ τά τε πρόβατα
    καὶ τοὺς βόας, καὶ τῶν κολλυβιστῶν ἐξέχεεν ⸂τὰ κέρματα⸃ καὶ τὰς τραπέζας ⸀ἀνέστρεψεν,
translation:
  text: And after making a whip out of cords, he drove them all out of the temple
    courts, including both the sheep and the cattle; and he poured out the coins of
    the money changers and overturned the tables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or courts, not specifically the
      inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or 'both the sheep and the oxen.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'them all,' then specifies 'both the sheep and the cattle';
      the wording does not explicitly state that the whip was used on people.
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσας
  chosen: after making
  alternatives:
  - having made
  - making
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After making' communicates sequence clearly in modern English.
- source_word: φραγέλλιον
  chosen: a whip
  alternatives:
  - a scourge
  - a lash
  lexicon: BDAG
  rationale: Refers to a whip-like instrument. 'Whip' is the clearest contemporary
    English term; 'scourge' is more traditional but less natural for modern readers.
- source_word: ἐκ σχοινίων
  chosen: out of cords
  alternatives:
  - from ropes
  - of cords
  lexicon: BDAG
  rationale: σχοινίον denotes cord/rope made of rush or similar material. 'Out of
    cords' is idiomatic and preserves the material sense.
- source_word: πάντας
  chosen: them all
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: Masculine accusative plural could be taken broadly of those involved
    in the scene, but the following apposition-like specification includes animals.
    'Them all' preserves the comprehensive force without forcing a narrower referent
    than the Greek.
- source_word: ἐξέβαλεν
  chosen: he drove ... out
  alternatives:
  - he cast ... out
  - he expelled
  lexicon: BDAG
  rationale: ἐκβάλλω here denotes forceful removal. 'Drove out' fits the physical
    action and is natural English.
- source_word: τοῦ ἱεροῦ
  chosen: the temple courts
  alternatives:
  - the temple
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple courts' makes this distinction clear for English readers.
- source_word: τά τε πρόβατα καὶ τοὺς βόας
  chosen: including both the sheep and the cattle
  alternatives:
  - both the sheep and the oxen
  - the sheep as well as the cattle
  lexicon: BDAG
  rationale: The construction specifies that the animals were among those driven out.
    βοῦς can be 'oxen' or more broadly 'cattle'; 'cattle' is more accessible modern
    English while remaining accurate.
- source_word: κολλυβιστῶν
  chosen: the money changers
  alternatives:
  - the coin dealers
  - the bankers
  lexicon: BDAG
  rationale: Standard term for those exchanging currency in the temple setting. 'Money
    changers' is accurate and widely understood.
- source_word: ἐξέχεεν τὰ κέρματα
  chosen: he poured out the coins
  alternatives:
  - he scattered the coins
  - he spilled the coins
  lexicon: BDAG
  rationale: ἐκχέω literally means 'pour out.' Since κέρματα are small coins, the
    image is of dumping them out; 'poured out' preserves the verbal force better than
    the more interpretive 'scattered.'
- source_word: κέρματα
  chosen: the coins
  alternatives:
  - the small coins
  - the change
  lexicon: BDAG
  rationale: κέρμα refers to coinage, often small change. 'Coins' is sufficiently
    precise without becoming colloquial.
- source_word: ἀνέστρεψεν
  chosen: overturned
  alternatives:
  - turned over
  - upended
  lexicon: BDAG
  rationale: In context the verb means to upset or overturn the tables. 'Overturned'
    is concise and standard in English Bible style while remaining natural.
