theological_decisions:
- issue: Rendering of μεθυσθῶσιν in a miracle context involving wine and intoxication
  chosen_reading: Retain the plain sense 'when they have become drunk'
  alternative_readings:
  - when they have drunk freely
  - when they have had enough to drink
  rationale: The Greek verb μεθύω ordinarily denotes becoming drunk. The translation
    should not mute the statement for doctrinal or ethical reasons; the speaker's
    social observation is reported, not endorsed. This preserves the text's realism
    without importing approval of drunkenness.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
