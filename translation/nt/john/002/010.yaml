id: JHN.2.10
reference: John 2:10
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ· Πᾶς ἄνθρωπος πρῶτον τὸν καλὸν οἶνον τίθησιν, καὶ ὅταν ⸀μεθυσθῶσιν
    τὸν ἐλάσσω· σὺ τετήρηκας τὸν καλὸν οἶνον ἕως ἄρτι.
translation:
  text: And he said to him, “Every man sets out the good wine first, and when they
    have become drunk, then the inferior. But you have kept the good wine until now.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they are drunk' or 'when they have drunk freely.' The Greek verb
      commonly means 'become drunk'; some translations soften the expression to emphasize
      reduced discernment rather than explicit intoxication.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Every man' uses a generic singular expression meaning people generally,
      not males only.
    reason: cultural_note
lexical_decisions:
- source_word: λέγει αὐτῷ
  chosen: he said to him
  alternatives:
  - he says to him
  lexicon: BDAG
  rationale: Greek present λέγει is a historical present. English normally renders
    this idiomatically as past narrative tense, 'said,' while preserving the direct-speech
    force.
- source_word: Πᾶς ἄνθρωπος
  chosen: Every man
  alternatives:
  - Everyone
  - Every person
  lexicon: BDAG
  rationale: The singular generic construction means 'every person/man.' Per the translation
    philosophy's gender-accurate principle, 'Every man' preserves the representative
    generic masculine form without implying only males are in view.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - at first
  lexicon: BDAG
  rationale: Adverbial accusative indicating sequence; 'first' is the most direct
    and natural rendering.
- source_word: τὸν καλὸν οἶνον
  chosen: the good wine
  alternatives:
  - the fine wine
  - the better wine
  lexicon: BDAG
  rationale: καλός here denotes quality. 'Good wine' is straightforward and preserves
    the contrast with the later inferior wine without overinterpreting as luxury terminology.
- source_word: τίθησιν
  chosen: sets out
  alternatives:
  - serves
  - puts out
  lexicon: BDAG
  rationale: τίθημι literally means 'put/place,' but in banquet context 'sets out'
    naturally conveys presenting wine for guests while staying close to the Greek.
- source_word: ὅταν μεθυσθῶσιν
  chosen: when they have become drunk
  alternatives:
  - when they are drunk
  - when they have had too much to drink
  lexicon: BDAG
  rationale: μεθύω in the passive can mean 'become drunk/intoxicated.' The Greek states
    drunkenness plainly; the translation should not soften it into mere diminished
    taste. 'Have become drunk' reflects the aorist subjunctive after ὅταν.
- source_word: τὸν ἐλάσσω
  chosen: the inferior
  alternatives:
  - the lesser
  - the poorer wine
  - the cheaper wine
  lexicon: BDAG
  rationale: ἐλάσσων is comparative, 'lesser/inferior.' Since 'wine' is implied from
    context, English can supply a substantival adjective. 'Inferior' best captures
    quality contrast rather than quantity.
- source_word: τετήρηκας
  chosen: you have kept
  alternatives:
  - you have reserved
  - you have saved
  lexicon: BDAG
  rationale: 'Perfect tense indicates an action with present result: the good wine
    has been kept until this point. ''Kept'' is the most direct rendering and preserves
    the verbal connection.'
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - until this moment
  - until the present time
  lexicon: BDAG
  rationale: This idiom points to the present point in the narrative. 'Until now'
    is natural and precise.
