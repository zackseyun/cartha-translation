id: JHN.2.9
reference: John 2:9
source:
  edition: SBLGNT
  text: ὡς δὲ ἐγεύσατο ὁ ἀρχιτρίκλινος τὸ ὕδωρ οἶνον γεγενημένον, καὶ οὐκ ᾔδει πόθεν
    ἐστίν, οἱ δὲ διάκονοι ᾔδεισαν οἱ ἠντληκότες τὸ ὕδωρ, φωνεῖ τὸν νυμφίον ὁ ἀρχιτρίκλινος
translation:
  text: Now when the master of the feast tasted the water that had become wine, and
    did not know where it came from (though the servants who had drawn the water knew),
    the master of the feast calls the bridegroom
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'headwaiter' for 'master of the feast.' The Greek term refers to the
      one overseeing the banquet.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the water having become wine'; alternatively, 'the water turned into
      wine.'
    reason: lexical_alternative
  - marker: c
    text: 'John uses a historical present here: ''calls,'' though English often renders
      it ''called.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιτρίκλινος
  chosen: master of the feast
  alternatives:
  - headwaiter
  - master of ceremonies
  lexicon: BDAG
  rationale: The term refers to the person overseeing the banquet arrangements. 'Master
    of the feast' is clear, idiomatic, and preserves the social role better than the
    narrower 'headwaiter' or the more interpretive 'master of ceremonies'.
- source_word: ἐγεύσατο
  chosen: tasted
  alternatives:
  - sampled
  lexicon: BDAG
  rationale: The aorist middle of γεύομαι here denotes tasting or sampling. 'Tasted'
    is the most direct and natural rendering in context.
- source_word: τὸ ὕδωρ οἶνον γεγενημένον
  chosen: the water that had become wine
  alternatives:
  - the water made wine
  - the water turned into wine
  lexicon: BDAG
  rationale: The perfect participle γεγενημένον indicates a completed change of state
    with present result. 'That had become wine' preserves the transformation without
    adding interpretive vividness beyond the Greek. 'Turned into wine' is acceptable
    but slightly more idiomatic than the source wording.
- source_word: οὐκ ᾔδει πόθεν ἐστίν
  chosen: did not know where it came from
  alternatives:
  - did not know where it was from
  - did not know its source
  lexicon: BDAG
  rationale: πόθεν asks about origin/source. In English, 'where it came from' is the
    most natural expression and accurately conveys the sense.
- source_word: διάκονοι
  chosen: servants
  alternatives:
  - attendants
  - deacons
  lexicon: BDAG
  rationale: In this narrative setting the word refers to household or banquet servants,
    not the later church office. 'Servants' best fits the immediate context.
- source_word: ἠντληκότες
  chosen: had drawn
  alternatives:
  - had drawn out
  lexicon: BDAG
  rationale: The participle refers to drawing water, likely from the jars or source.
    'Had drawn' is sufficient and idiomatic; 'out' is possible but not required in
    English.
- source_word: φωνεῖ
  chosen: calls
  alternatives:
  - called
  - summons
  lexicon: BDAG
  rationale: The present tense is the historical present, common in Johannine narrative.
    Rendering it as 'calls' preserves the vividness of the Greek; 'called' would smooth
    it into standard English past narration but lose that feature.
- source_word: νυμφίον
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: BDAG
  rationale: '''Bridegroom'' is the standard and slightly more formal equivalent,
    fitting the wedding context and preserving the lexical connection often important
    in biblical usage.'
- source_word: ὡς δὲ
  chosen: Now when
  alternatives:
  - And when
  - But when
  lexicon: BDAG
  rationale: This combination introduces the next event in the narrative. 'Now when'
    gives a natural transition in English without overstating contrast.
