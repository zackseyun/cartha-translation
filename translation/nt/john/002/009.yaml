theological_decisions:
- issue: Narrative description of the miracle
  chosen_reading: 'Translate the clause straightforwardly as an actual transformation:
    ''the water that had become wine.'''
  alternative_readings:
  - A more paraphrastic rendering such as 'the water turned into wine'
  rationale: The Greek explicitly states that the water had become wine. No doctrinal
    embellishment is needed, but neither should the wording be weakened into mere
    appearance or perception.
  doctrine_reference: Translation philosophy §1, §3
