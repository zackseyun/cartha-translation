id: JHN.2.24
reference: John 2:24
source:
  edition: SBLGNT
  text: αὐτὸς ⸀δὲ Ἰησοῦς οὐκ ἐπίστευεν ⸀αὑτὸν αὐτοῖς διὰ τὸ αὐτὸν γινώσκειν πάντας
translation:
  text: But Jesus himself was not entrusting himself to them, because he knew all
    people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek uses the same verb as in the previous verse: many ''believed
      in'' Jesus, but Jesus did not ''entrust himself to'' them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς δὲ Ἰησοῦς
  chosen: But Jesus himself
  alternatives:
  - But Jesus
  - Now Jesus himself
  lexicon: BDAG
  rationale: αὐτός is emphatic in nominative position, so 'himself' is retained to
    reflect the contrast with those who 'believed' in him in the previous verse. δέ
    is rendered 'But' to mark the adversative turn.
- source_word: ἐπίστευεν
  chosen: was not entrusting
  alternatives:
  - did not entrust
  - was not believing
  lexicon: BDAG
  rationale: πιστεύω here takes a personal object plus dative ('himself to them'),
    which idiomatically means 'entrust' rather than 'believe.' The imperfect is represented
    with 'was not entrusting' to preserve the ongoing/dispositional sense, though
    English could also use the simple past.
- source_word: αὑτὸν αὐτοῖς
  chosen: himself to them
  alternatives:
  - himself to those people
  lexicon: BDAG
  rationale: The reflexive pronoun with the dative object expresses personal self-commitment
    or self-entrustment. 'Himself to them' preserves the Greek structure and the wordplay
    with πιστεύω in the previous context.
- source_word: διὰ τὸ
  chosen: because
  alternatives:
  - for
  - on account of
  lexicon: BDAG
  rationale: διά with the articular infinitive gives a causal sense. 'Because' is
    the most natural modern English rendering.
- source_word: αὐτὸν γινώσκειν
  chosen: he knew
  alternatives:
  - he was knowing
  lexicon: BDAG
  rationale: The infinitival clause after διὰ τὸ is rendered idiomatically in English
    as a finite clause. γινώσκω here denotes personal knowledge/understanding.
- source_word: πάντας
  chosen: all people
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: The masculine plural in context refers to people generally. 'All people'
    makes the object explicit in English and prepares for the following verse's focus
    on what is in a person.
