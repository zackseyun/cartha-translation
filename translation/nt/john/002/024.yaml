theological_decisions:
- issue: Rendering πιστεύω consistently across vv. 23–24
  chosen_reading: Use 'believed' in v. 23 and 'entrusting' in v. 24, while preserving
    the lexical connection in documentation.
  alternative_readings:
  - Use 'believe' in both verses more woodenly
  - Use 'trust' in v. 24
  rationale: 'The same Greek verb creates deliberate wordplay: many ''believed in''
    Jesus, but Jesus did not ''entrust himself to'' them. English cannot preserve
    both the idiom and the lexical repetition perfectly. ''Entrusting'' best conveys
    the sense here while the rationale documents the connection.'
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms, or documented
    exception)'
- issue: Scope of πάντας
  chosen_reading: Translate generally as 'all people' without narrowing to a specific
    subgroup.
  alternative_readings:
  - all men
  - everyone
  rationale: The text states Jesus' comprehensive knowledge of humanity in context,
    without requiring a stronger doctrinal formulation than the verse itself makes.
    'All people' is gender-accurate and natural English.
  doctrine_reference: 'Translation philosophy #4 (gender-accurate over gender-neutral)'
