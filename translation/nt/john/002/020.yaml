theological_decisions:
- issue: Potential anti-Jewish misunderstanding of οἱ Ἰουδαῖοι in John
  chosen_reading: Retain 'the Jews' in the main text
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation follows the Greek wording directly and avoids narrowing
    the referent beyond what the verse itself states. Because Johannine usage can
    be heard too broadly in English, the issue is documented rather than resolved
    interpretively in the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relation of ἐγερεῖς to resurrection imagery
  chosen_reading: Translate as 'raise it up'
  alternative_readings:
  - rebuild
  rationale: 'This preserves John''s theological irony: the speakers think of the
    physical temple, while the evangelist will interpret Jesus'' words in relation
    to his body and resurrection. The translation should preserve that tension rather
    than resolve it prematurely.'
  doctrine_reference: Translation philosophy §3
