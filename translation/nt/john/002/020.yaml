id: JHN.2.20
reference: John 2:20
source:
  edition: SBLGNT
  text: εἶπαν οὖν οἱ Ἰουδαῖοι· Τεσσεράκοντα καὶ ἓξ ἔτεσιν οἰκοδομήθη ὁ ναὸς οὗτος,
    καὶ σὺ ἐν τρισὶν ἡμέραις ἐγερεῖς αὐτόν;
translation:
  text: So the Jews said, “This temple was built in forty-six years, and will you
    raise it up in three days?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Greek says 'the Jews,' a term John uses in varied
      ways depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'rebuild it.' The Greek verb can be understood by the speakers in a construction
      sense, but 'raise it up' preserves the wording that John later connects to Jesus'
      resurrection.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential or consequential transition from Jesus' previous
    statement. 'So' is natural modern English and preserves the discourse connection
    without sounding overly formal.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish leaders
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' In John this term can be
    contextually complex, but here the immediate speakers are the Judean Jewish interlocutors
    in the temple setting. 'The Jews' preserves the source wording; narrower interpretive
    renderings such as 'the Jewish leaders' would import specificity not explicit
    in this verse.
- source_word: Τεσσεράκοντα καὶ ἓξ ἔτεσιν
  chosen: in forty-six years
  alternatives:
  - for forty-six years
  - forty-six years ago
  lexicon: BDAG
  rationale: 'The dative of time is best rendered as duration/time within which: ''in
    forty-six years.'' This matches the sense of the building process having taken
    that span. ''For forty-six years'' is possible but can suggest merely elapsed
    time rather than construction duration.'
- source_word: οἰκοδομήθη
  chosen: was built
  alternatives:
  - has been under construction
  - was being built
  lexicon: BDAG
  rationale: Aorist passive indicative gives a summary statement about the construction.
    'Was built' is the most straightforward English rendering. Given the historical
    context, the sense may imply an extended building project, but the simple passive
    best reflects the Greek form without overinterpreting.
- source_word: ὁ ναὸς οὗτος
  chosen: this temple
  alternatives:
  - this sanctuary
  - this shrine
  lexicon: BDAG
  rationale: ναός refers specifically to the temple/sanctuary rather than the broader
    temple complex. However, in idiomatic English and in this context, 'this temple'
    is the clearest rendering. 'Sanctuary' is more precise but less natural here and
    may sound overly technical.
- source_word: καὶ σὺ
  chosen: and will you
  alternatives:
  - and you will
  - yet you will
  lexicon: BDAG
  rationale: 'The pronoun σὺ is emphatic in the rhetorical question. English captures
    this naturally by fronting the auxiliary in the question: ''and will you...?''
    This preserves the incredulous tone.'
- source_word: ἐν τρισὶν ἡμέραις
  chosen: in three days
  alternatives:
  - within three days
  lexicon: BDAG
  rationale: Standard temporal expression. 'In three days' is idiomatic and preserves
    the wording that anticipates the resurrection context in the following verse.
- source_word: ἐγερεῖς
  chosen: raise it up
  alternatives:
  - raise
  - rebuild
  lexicon: BDAG
  rationale: ἐγείρω commonly means 'raise up,' including resurrection contexts. 'Raise
    it up' preserves the verbal link to resurrection language that John explains in
    v. 21, whereas 'rebuild' would flatten that connection and overinterpret the hearers'
    misunderstanding.
- source_word: αὐτόν
  chosen: it
  lexicon: BDAG
  rationale: Refers back to ναός, grammatically masculine in Greek but naturally rendered
    with the English neuter pronoun for an inanimate object.
