theological_decisions:
- issue: Referent of ἀδελφοί in relation to Jesus' family
  chosen_reading: Rendered as 'brothers' in the main text.
  alternative_readings:
  - brothers and sisters
  - siblings
  - close relatives/kinsmen
  rationale: The Greek term is masculine plural and most directly means 'brothers.'
    Because this term is discussed in relation to later doctrinal debates about Mary's
    perpetual virginity, the translation preserves the lexical form of the Greek rather
    than resolving the broader theological question. A footnote preserves the wider
    kinship possibility without altering the main text.
  doctrine_reference: Affirmations; Translation philosophy §§3–4
