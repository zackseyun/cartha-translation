id: JHN.2.12
reference: John 2:12
source:
  edition: SBLGNT
  text: Μετὰ τοῦτο κατέβη εἰς Καφαρναοὺμ αὐτὸς καὶ ἡ μήτηρ αὐτοῦ καὶ οἱ ⸀ἀδελφοὶ καὶ
    οἱ μαθηταὶ αὐτοῦ, καὶ ἐκεῖ ἔμειναν οὐ πολλὰς ἡμέρας.
translation:
  text: After this he went down to Capernaum, he and his mother and his brothers and
    his disciples, and they stayed there not many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his relatives' or 'his kinsmen'; the Greek word can refer to brothers
      in the narrower sense or, in some contexts, to a wider family relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ τοῦτο
  chosen: After this
  alternatives:
  - Afterward
  - After these things
  lexicon: BDAG
  rationale: A standard temporal transition. 'After this' is natural modern English
    and preserves the singular demonstrative force without unnecessary stiffness.
- source_word: κατέβη
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: BDAG
  rationale: The verb literally means 'went down/came down.' 'Went down' fits the
    narrative movement from Cana to Capernaum and preserves the geographical/topographical
    sense better than the more formal 'descended.'
- source_word: εἰς Καφαρναοὺμ
  chosen: to Capernaum
  alternatives:
  - into Capernaum
  lexicon: BDAG
  rationale: With a destination city, English idiom prefers 'to Capernaum.' The place
    name is transliterated per translation philosophy.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and helps introduce the accompanying
    group. English requires 'he' here; adding 'himself' would overemphasize the pronoun
    beyond what the context demands.
- source_word: ἡ μήτηρ αὐτοῦ
  chosen: his mother
  alternatives:
  - his mother Mary
  lexicon: BDAG
  rationale: The Greek says simply 'his mother.' Supplying 'Mary' would import information
    not present in the verse.
- source_word: οἱ ἀδελφοὶ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in this context most naturally
    refers to male siblings/kin. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral expansion. The broader kinship sense is preserved as an alternative
    in a footnote because the referent is historically and theologically discussed.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - his followers
  lexicon: BDAG
  rationale: μαθηταί is a key Gospel term and is best rendered consistently as 'disciples,'
    preserving both learner and follower connotations.
- source_word: ἐκεῖ ἔμειναν
  chosen: they stayed there
  alternatives:
  - they remained there
  - they stayed there
  lexicon: BDAG
  rationale: The plural verb shows that the group stayed there. 'Stayed there' is
    natural modern English; 'remained there' is more formal but not necessary.
- source_word: οὐ πολλὰς ἡμέρας
  chosen: not many days
  alternatives:
  - for only a few days
  - not for many days
  lexicon: BDAG
  rationale: This preserves the litotes-like Greek expression closely. 'For only a
    few days' is a smoother paraphrase, but 'not many days' better reflects the source
    wording.
