id: JHN.2.8
reference: John 2:8
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ἀντλήσατε νῦν καὶ φέρετε τῷ ἀρχιτρικλίνῳ· ⸂οἱ δὲ⸃ ἤνεγκαν.
translation:
  text: And he said to them, “Draw some out now and take it to the master of the feast.”
    So they took it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the headwaiter” or “the steward.” The Greek term refers to the person
      in charge of the banquet.
    reason: lexical_alternative
  - marker: b
    text: Or, “And they brought it.” The Greek verb can be rendered either way depending
      on English perspective.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Greek present is often used as a historical present in narrative. English
    simple past is the most natural rendering here while preserving the narrative
    sense.
- source_word: Ἀντλήσατε
  chosen: Draw some out
  alternatives:
  - Draw out
  - Dip out
  lexicon: BDAG
  rationale: The aorist imperative calls for an action of drawing liquid. 'Draw some
    out' makes explicit the implied object from context without over-paraphrasing
    and fits idiomatic English.
- source_word: νῦν
  chosen: now
  alternatives:
  - at this time
  lexicon: BDAG
  rationale: A straightforward temporal adverb; 'now' preserves the immediacy of Jesus'
    command.
- source_word: φέρετε
  chosen: take
  alternatives:
  - bring
  - carry
  lexicon: BDAG
  rationale: In this context of moving the drawn liquid to another person, 'take'
    is more idiomatic in English from the servants' perspective than 'bring,' though
    either is possible.
- source_word: ἀρχιτρικλίνῳ
  chosen: the master of the feast
  alternatives:
  - the headwaiter
  - the master of ceremonies
  - the steward
  lexicon: BDAG
  rationale: The term denotes the person overseeing the banquet arrangements. 'Master
    of the feast' is clear, dignified, and contextually accurate without unnecessary
    technicality.
- source_word: οἱ δὲ ἤνεγκαν
  chosen: So they took it
  alternatives:
  - And they brought it
  - But they took it
  lexicon: BDAG
  rationale: δέ here is lightly connective, and ἤνεγκαν is the aorist of φέρω. 'So
    they took it' reads naturally in English and reflects their obedience to the command.
    'It' is supplied because English requires an object and the referent is clear
    from context.
