id: JHN.2.2
reference: John 2:2
source:
  edition: SBLGNT
  text: ἐκλήθη δὲ καὶ ὁ Ἰησοῦς καὶ οἱ μαθηταὶ αὐτοῦ εἰς τὸν γάμον.
translation:
  text: Jesus also was invited to the wedding, along with his disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Jesus also was invited, and his disciples, to the wedding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκλήθη
  chosen: was invited
  alternatives:
  - was called
  lexicon: BDAG
  rationale: Passive of καλέω in the context of attendance at a social event naturally
    means 'was invited' rather than the more general 'was called.' This best matches
    idiomatic English and the event context.
- source_word: δὲ
  chosen: also
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective, but here the sense is adequately carried in
    English by folding it into 'also,' since καὶ immediately follows and the clause
    adds Jesus to those already mentioned as invited.
- source_word: καὶ
  chosen: also / along with
  alternatives:
  - and
  - even
  lexicon: BDAG
  rationale: The first καὶ works with the connective force to indicate addition ('also');
    the second coordinates Jesus with his disciples, rendered idiomatically as 'along
    with his disciples' rather than repeating 'and' in a wooden way.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - his students
  - his followers
  lexicon: BDAG
  rationale: μαθηταί in the Gospels is conventionally and accurately rendered 'disciples,'
    preserving both the learner relationship and the emerging group identity around
    Jesus. The possessive αὐτοῦ is naturally rendered 'his.'
- source_word: εἰς τὸν γάμον
  chosen: to the wedding
  alternatives:
  - to the marriage feast
  - to the wedding feast
  lexicon: BDAG
  rationale: γάμος here refers to the wedding celebration/event. 'Wedding' is clear
    modern English and sufficiently captures the sense without adding 'feast,' which
    is not explicit in this verse.
