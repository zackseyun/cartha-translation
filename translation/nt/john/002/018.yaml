theological_decisions:
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Retain the literal rendering 'the Jews' in the main text
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: Although in Johannine usage the phrase often refers to Judean authorities
    or a representative group rather than the Jewish people universally, this verse
    alone does not explicitly narrow the referent. Following original-language primacy,
    the translation preserves the literal wording and notes the contextual alternative
    rather than importing a restrictive interpretation into the main text.
  doctrine_reference: Translation philosophy §1, §3
