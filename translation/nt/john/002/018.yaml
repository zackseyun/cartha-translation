id: JHN.2.18
reference: John 2:18
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν οὖν οἱ Ἰουδαῖοι καὶ εἶπαν αὐτῷ· Τί σημεῖον δεικνύεις ἡμῖν, ὅτι
    ταῦτα ποιεῖς;
translation:
  text: So the Jews answered and said to him, “What sign do you show us, since you
    are doing these things?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jewish leaders' or 'the Judeans'; in John, 'the Jews' can refer
      more narrowly to a representative group, especially the Judean authorities,
      depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - responded
  - replied
  lexicon: BDAG
  rationale: Standard narrative use of ἀποκρίνομαι introducing a spoken response.
    'Answered' is idiomatic and preserves the formal dialogue structure.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from Jesus' temple action in the
    previous verse. 'So' is natural modern English and retains the inferential flow
    without sounding overly formal.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' In John this phrase can
    be contextually narrowed, but here the text itself does not explicitly specify
    leaders or Judeans. To avoid importing an interpretive restriction not stated
    in the Greek, the main text keeps 'the Jews.'
- source_word: εἶπαν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with indirect object. 'Said to him'
    preserves the direct-speech introduction.
- source_word: Τί σημεῖον
  chosen: What sign
  alternatives:
  - What miracle
  - What proof
  lexicon: BDAG
  rationale: σημεῖον in John regularly carries the sense of a sign that authenticates
    and points beyond itself. 'Sign' preserves Johannine terminology better than 'miracle'
    or 'proof.'
- source_word: δεικνύεις
  chosen: do you show
  alternatives:
  - do you display
  - can you show
  lexicon: BDAG
  rationale: Present tense is naturally rendered in English as 'do you show.' This
    keeps the direct challenge for visible authentication.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Simple dative indirect object.
- source_word: ὅτι
  chosen: since
  alternatives:
  - that
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the grounds for their demand: they ask for a sign
    on the basis that Jesus is doing these things. ''Since'' expresses that causal
    nuance more clearly in English than a bare ''that.'''
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring to Jesus' temple actions. 'These things'
    is the most direct and transparent rendering.
- source_word: ποιεῖς
  chosen: you are doing
  alternatives:
  - you do
  lexicon: BDAG
  rationale: The present tense can be represented progressively in English to reflect
    the ongoing/immediate action in context.
