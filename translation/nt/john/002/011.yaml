id: JHN.2.11
reference: John 2:11
source:
  edition: SBLGNT
  text: ταύτην ⸀ἐποίησεν ἀρχὴν τῶν σημείων ὁ Ἰησοῦς ἐν Κανὰ τῆς Γαλιλαίας καὶ ἐφανέρωσεν
    τὴν δόξαν αὐτοῦ, καὶ ἐπίστευσαν εἰς αὐτὸν οἱ μαθηταὶ αὐτοῦ.
translation:
  text: Jesus did this as the beginning of his signs in Cana of Galilee, and revealed
    his glory, and his disciples believed in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the first of his signs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην
  chosen: this
  alternatives:
  - this miracle
  - this sign
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to the act just narrated; rendered simply
    as 'this' to avoid importing 'miracle' or 'sign' where the Greek uses only the
    pronoun.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - performed
  - made
  lexicon: BDAG
  rationale: ποιέω is broad ('do, make'). 'Did' preserves the simplicity of the Greek
    and works naturally with the preceding demonstrative; 'performed' would add interpretive
    coloring.
- source_word: ἀρχὴν τῶν σημείων
  chosen: the beginning of his signs
  alternatives:
  - the first of his signs
  - this, the first of his signs
  lexicon: BDAG
  rationale: ἀρχή can mean 'beginning' or 'first.' Here it marks the inaugural character
    of the sign at Cana. 'Beginning of his signs' stays close to the Greek while conveying
    that this was the initial sign in a series. 'His' is supplied in English from
    context, since the signs are those done by Jesus.
- source_word: σημείων
  chosen: signs
  alternatives:
  - miracles
  lexicon: BDAG
  rationale: σημεῖον in John is theologically important and points beyond the act
    to its revelatory significance. 'Signs' preserves Johannine usage better than
    'miracles.'
- source_word: ἐν Κανὰ τῆς Γαλιλαίας
  chosen: in Cana of Galilee
  alternatives:
  - at Cana in Galilee
  lexicon: BDAG
  rationale: Standard geographic rendering. 'Of Galilee' closely reflects the genitive
    construction and distinguishes this Cana from other locations.
- source_word: ἐφανέρωσεν
  chosen: revealed
  alternatives:
  - made known
  - manifested
  lexicon: BDAG
  rationale: φανερόω means to make visible or known. 'Revealed' is clear modern English
    and preserves the theological sense of disclosure.
- source_word: τὴν δόξαν αὐτοῦ
  chosen: his glory
  alternatives:
  - his splendor
  lexicon: BDAG
  rationale: δόξα is a key theological term; 'glory' is the standard and best fit
    in Johannine context, referring to the visible disclosure of Jesus' divine majesty
    and honor.
- source_word: ἐπίστευσαν εἰς αὐτόν
  chosen: believed in him
  alternatives:
  - believed into him
  - put their faith in him
  lexicon: BDAG
  rationale: πιστεύω with εἰς is a characteristic Johannine construction expressing
    personal trust directed toward Jesus. 'Believed in him' is idiomatic English and
    preserves the relational force without awkwardness.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Natural English rendering of the noun phrase; no significant ambiguity
    is lost.
