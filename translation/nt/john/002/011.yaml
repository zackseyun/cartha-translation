theological_decisions:
- issue: Johannine σημεῖον terminology
  chosen_reading: Rendered σημεῖα as 'signs' rather than 'miracles.'
  alternative_readings:
  - miracles
  rationale: In John, these acts function not merely as displays of power but as revelatory
    signs that disclose Jesus' identity and glory. 'Signs' preserves that theological
    dimension without over-interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
- issue: Force of ἀρχὴν τῶν σημείων
  chosen_reading: Rendered as 'the beginning of his signs' rather than the more idiomatic
    'the first of his signs.'
  alternative_readings:
  - the first of his signs
  rationale: The Greek uses ἀρχή ('beginning'), and preserving that wording reflects
    the source text more directly while still communicating that this sign inaugurates
    a series. The alternative is viable and worth preserving in a footnote because
    many English readers will hear it more naturally.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
