theological_decisions:
- issue: Rendering Ἰουδαῖοι in John
  chosen_reading: of the Jews
  alternative_readings:
  - of the Judeans
  rationale: This verse refers to Passover as the Jewish feast, not to a narrower
    regional or polemical group. Therefore 'of the Jews' is the most straightforward
    rendering here, while preserving 'of the Judeans' in a footnote acknowledges the
    broader Johannine translation question without importing it into this context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it where ambiguity is genuine.'
