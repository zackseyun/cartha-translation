id: JHN.2.13
reference: John 2:13
source:
  edition: SBLGNT
  text: Καὶ ἐγγὺς ἦν τὸ πάσχα τῶν Ἰουδαίων, καὶ ἀνέβη εἰς Ἱεροσόλυμα ὁ Ἰησοῦς.
translation:
  text: Now the Passover of the Jews was near, and Jesus went up to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Passover of the Judeans.' In John, Ἰουδαῖοι can in some contexts
      mean 'Judeans' rather than 'Jews,' but here it most naturally identifies the
      Jewish festival.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγὺς
  chosen: was near
  alternatives:
  - was at hand
  - was approaching
  lexicon: BDAG
  rationale: The adverb indicates temporal nearness here. 'Was near' is natural modern
    English and preserves the simple temporal sense without archaic coloring.
- source_word: πάσχα
  chosen: Passover
  lexicon: BDAG
  rationale: Standard rendering for the Jewish festival; this is the plain sense in
    context.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: John frequently uses Ἰουδαῖοι in ways that can mean either 'Jews' or
    'Judeans' depending on context. Here the phrase modifies Passover as a widely
    recognized Jewish feast, so 'of the Jews' best fits the festival designation.
    The alternative is preserved in a footnote because the term is contextually sensitive
    in John.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - went up to attend
  - ascended
  lexicon: BDAG
  rationale: The verb literally means 'went up' and is idiomatic for travel to Jerusalem,
    reflecting both elevation and conventional pilgrimage language. 'Went up' preserves
    that nuance better than the flatter 'went.'
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the city name.
- source_word: Καὶ
  chosen: Now
  alternatives:
  - And
  lexicon: BDAG
  rationale: The initial conjunction marks narrative continuation. 'Now' is a natural
    discourse marker in English narrative, while the second καί is rendered 'and'
    to connect the clauses smoothly.
