id: JHN.2.6
reference: John 2:6
source:
  edition: SBLGNT
  text: ἦσαν δὲ ἐκεῖ ⸂λίθιναι ὑδρίαι⸃ ἓξ ⸂κατὰ τὸν καθαρισμὸν τῶν Ἰουδαίων κείμεναι⸃,
    χωροῦσαι ἀνὰ μετρητὰς δύο ἢ τρεῖς.
translation:
  text: Now there were six stone water jars standing there, in accordance with the
    Jewish rites of purification, each holding two or three measures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the purification custom of the Jews'; the phrase refers to ritual
      cleansing practices.
    reason: lexical_alternative
  - marker: b
    text: A 'measure' (Greek metretēs) was an ancient liquid measure, roughly equivalent
      to 8–9 gallons or 35–40 liters.
    reason: cultural_note
lexical_decisions:
- source_word: λίθιναι ὑδρίαι
  chosen: stone water jars
  alternatives:
  - stone jars
  - stone waterpots
  lexicon: BDAG
  rationale: λίθιναι modifies ὑδρίαι and denotes the material ('stone'). ὑδρία refers
    to a water jar/container. 'Water jars' is natural modern English and preserves
    the vessel type better than the archaic 'waterpots'.
- source_word: ἦσαν δὲ ἐκεῖ
  chosen: Now there were ... standing there
  alternatives:
  - And there were ... there
  - Now ... were there
  lexicon: BDAG
  rationale: δέ is lightly connective; 'Now' gives natural narrative progression.
    ἐκεῖ is retained with 'there.' Because κείμεναι further describes their placement,
    'standing there' captures both existence and situatedness in idiomatic English.
- source_word: ἓξ
  chosen: six
  lexicon: BDAG
  rationale: Straightforward cardinal numeral.
- source_word: κατὰ τὸν καθαρισμὸν τῶν Ἰουδαίων
  chosen: in accordance with the Jewish rites of purification
  alternatives:
  - for the Jewish purification
  - according to the purification custom of the Jews
  - for Jewish ceremonial washing
  lexicon: BDAG
  rationale: κατά here expresses conformity/purpose relative to customary use. καθαρισμός
    denotes purification/cleansing, here in a ritual context. 'Rites of purification'
    communicates the ceremonial sense without over-paraphrasing. 'Jewish' renders
    τῶν Ἰουδαίων adjectivally in natural English.
- source_word: κείμεναι
  chosen: standing
  alternatives:
  - set there
  - placed there
  - lying there
  lexicon: BDAG
  rationale: κεῖμαι often means 'be placed' or 'be set.' For upright jars, 'standing'
    is idiomatic English and fits the scene better than the overly literal 'lying'.
- source_word: χωροῦσαι
  chosen: each holding
  alternatives:
  - containing
  - having capacity for
  lexicon: BDAG
  rationale: χωρέω here refers to capacity. 'Holding' is clear modern English; 'each'
    is supplied distributively because the plural participle with ἀνά indicates capacity
    per jar.
- source_word: ἀνὰ μετρητὰς δύο ἢ τρεῖς
  chosen: two or three measures
  alternatives:
  - twenty or thirty gallons
  - two or three metretes
  lexicon: BDAG
  rationale: μετρητής is an ancient liquid measure. To avoid importing a precise modern
    equivalent into the main text, 'measures' preserves the source unit generically.
    The distributive ἀνά is reflected by 'each.' A more specific modern approximation
    is worth preserving in a footnote.
