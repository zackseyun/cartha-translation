theological_decisions:
- issue: Reference to τῶν Ἰουδαίων in Johannine narrative
  chosen_reading: the Jewish rites of purification
  alternative_readings:
  - the purification rites of the Judeans
  rationale: Ἰουδαῖος can mean 'Jewish' or 'Judean' depending on context. Here the
    phrase refers to recognized ritual purification customs rather than regional identity,
    so 'Jewish' best conveys the cultural-religious sense without importing polemical
    overtones.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it only where genuine ambiguity is central.'
