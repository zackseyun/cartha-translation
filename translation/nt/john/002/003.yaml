theological_decisions:
- issue: Historical present in Johannine narrative
  chosen_reading: Preserve the present tense with 'says'
  alternative_readings:
  - Convert to past tense 'said' for smoother English narrative
  rationale: This is primarily a translational rather than doctrinal decision, but
    preserving the historical present better reflects the Greek discourse texture
    without creating theological distortion.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referent of the implicit plural subject in 'They have no wine'
  chosen_reading: Leave the subject implicit in context as 'they' rather than specifying
    'the hosts'
  alternative_readings:
  - the wedding hosts have no wine
  - the wedding party has no wine
  rationale: The Greek leaves the referent unstated. Supplying only 'they' preserves
    the narrative ambiguity and avoids importing detail the text does not explicitly
    state.
  doctrine_reference: Translation philosophy §3
