id: JHN.2.3
reference: John 2:3
source:
  edition: SBLGNT
  text: καὶ ὑστερήσαντος οἴνου λέγει ἡ μήτηρ τοῦ Ἰησοῦ πρὸς αὐτόν· Οἶνον οὐκ ἔχουσιν.
translation:
  text: And when the wine ran out, the mother of Jesus says to him, “They have no
    wine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when wine was lacking.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek uses the historical present: ''says.'' Some translations render it
      ''said.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑστερήσαντος οἴνου
  chosen: when the wine ran out
  alternatives:
  - when the wine was lacking
  - after the wine failed
  lexicon: BDAG
  rationale: The genitive absolute with aorist participle marks a circumstantial event
    prior to the main verb. Idiomatic English expresses the shortage naturally as
    'when the wine ran out,' which preserves the sense of deficiency without awkward
    literalism.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Greek narrative often uses the historical present. Rendering it as 'says'
    preserves John's vivid present-tense narration. English can bear the historical
    present here without sounding unnatural.
- source_word: μήτηρ τοῦ Ἰησοῦ
  chosen: the mother of Jesus
  alternatives:
  - Jesus' mother
  lexicon: BDAG
  rationale: This closely follows the Greek wording and preserves John's characteristic
    way of referring to her in this context.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: With λέγει already carrying the speech action, πρὸς αὐτόν is naturally
    rendered 'to him' as the indirect object of speaking.
- source_word: Οἶνον οὐκ ἔχουσιν
  chosen: They have no wine
  alternatives:
  - They do not have wine
  - There is no wine for them
  lexicon: BDAG
  rationale: The plural verb has an implicit subject from context, best rendered 'they,'
    referring to the wedding hosts or wedding party. 'Have no wine' is natural English
    and preserves the directness of Mary's statement.
- source_word: οἶνος
  chosen: wine
  lexicon: BDAG
  rationale: The ordinary meaning is fermented wine; no contextual reason exists to
    weaken or paraphrase the term.
