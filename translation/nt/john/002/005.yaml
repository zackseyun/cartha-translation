theological_decisions:
- issue: Referent of the implied subject in 'whatever he tells you'
  chosen_reading: The subject is rendered as 'he,' referring to Jesus, without expanding
    to 'Jesus' in the main text.
  alternative_readings:
  - Whatever Jesus tells you, do it.
  rationale: The Greek leaves the subject implicit but context makes Jesus the referent.
    Retaining 'he' mirrors the Greek's economy and avoids unnecessary interpretive
    expansion while remaining clear in context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
