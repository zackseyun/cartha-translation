id: JHN.2.5
reference: John 2:5
source:
  edition: SBLGNT
  text: λέγει ἡ μήτηρ αὐτοῦ τοῖς διακόνοις· ⸂Ὅ τι⸃ ἂν λέγῃ ὑμῖν ποιήσατε.
translation:
  text: His mother said to the servants, “Whatever he tells you, do it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Whatever he may say to you, do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ αὐτοῦ
  chosen: his mother
  alternatives:
  - the mother of him
  lexicon: BDAG
  rationale: Natural English rendering of the genitive construction while preserving
    the familial identification central to the narrative.
- source_word: διακόνοις
  chosen: servants
  alternatives:
  - attendants
  - servers
  - deacons
  lexicon: BDAG
  rationale: In this wedding context, διάκονος refers to those serving at the feast,
    not the later church office 'deacon.' 'Servants' is idiomatic and contextually
    precise; 'servers' is possible but less natural in narrative English.
- source_word: Ὅ τι ἂν
  chosen: Whatever
  alternatives:
  - Whatsoever
  - Whatever thing
  lexicon: BDAG
  rationale: 'This indefinite relative construction with ἄν expresses open-ended contingency:
    ''whatever'' best captures the sense in clear modern English.'
- source_word: λέγῃ ὑμῖν
  chosen: he tells you
  alternatives:
  - he says to you
  - he may say to you
  lexicon: BDAG
  rationale: The present subjunctive after ἄν conveys an indefinite future sense.
    'He tells you' is idiomatic English in this construction; 'may say' is more formally
    literal but less natural.
- source_word: ποιήσατε
  chosen: do it
  alternatives:
  - do
  - carry it out
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive obedience. 'Do it' supplies
    the implied object from 'whatever he tells you' and reads naturally in English.
