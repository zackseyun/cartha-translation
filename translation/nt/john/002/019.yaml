id: JHN.2.19
reference: John 2:19
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτοῖς· Λύσατε τὸν ναὸν τοῦτον καὶ ἐν τρισὶν ἡμέραις
    ἐγερῶ αὐτόν.
translation:
  text: Jesus answered and said to them, “Destroy this temple, and in three days I
    will raise it up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “tear down this temple … I will rebuild it.” The Greek verb translated
      “raise … up” can be heard in context with resurrection overtones; John later
      explains that Jesus was speaking about the temple of his body (2:21).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι; 'answered' fits the idiom
    ἀπεκρίθη ... καὶ εἶπεν without unnecessary expansion.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Paired with ἀπεκρίθη in a common Semitic-influenced Greek expression;
    rendering both verbs as 'answered and said' preserves the source structure naturally
    in English.
- source_word: Λύσατε
  chosen: Destroy
  alternatives:
  - tear down
  - loose
  - dismantle
  lexicon: BDAG
  rationale: Aorist imperative plural of λύω here refers to the destruction/demolition
    of the temple, not merely 'loosing.' 'Destroy' best matches the context and the
    later misunderstanding in the passage.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple proper. 'Temple' is the most natural
    English rendering here and matches the narrative setting, while the specific referent
    is clarified by context and v.21.
- source_word: τοῦτον
  chosen: this
  alternatives:
  - this very
  lexicon: BDAG
  rationale: Demonstrative retained straightforwardly; it preserves the immediacy
    of Jesus' statement.
- source_word: ἐν τρισὶν ἡμέραις
  chosen: in three days
  alternatives:
  - within three days
  lexicon: BDAG
  rationale: Conventional and accurate temporal expression; 'in three days' preserves
    the Greek prepositional phrase without over-interpreting the exact temporal nuance.
- source_word: ἐγερῶ
  chosen: I will raise ... up
  alternatives:
  - I will raise
  - I will rebuild
  lexicon: BDAG
  rationale: Future of ἐγείρω commonly means 'raise up.' Including 'up' is idiomatic
    in English and preserves the resonance with resurrection language, while avoiding
    the interpretive narrowing of 'rebuild.'
- source_word: αὐτόν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The immediate grammatical antecedent is ναόν, a masculine noun in Greek
    but an inanimate object in English, so 'it' is required idiomatic English. The
    deeper referent to Jesus' body is preserved by context rather than by forcing
    an unidiomatic pronoun.
