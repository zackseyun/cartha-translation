theological_decisions:
- issue: Whether to render the saying in a way that explicitly identifies the temple
    as Jesus' body
  chosen_reading: Keep 'this temple' in the main text without interpretive expansion.
  alternative_readings:
  - Destroy this sanctuary of mine
  - Destroy this temple—meaning my body
  rationale: The verse itself presents Jesus' saying in deliberately enigmatic form,
    with the explanation supplied later in John 2:21. Preserving the ambiguity maintains
    the narrative and theological tension rather than resolving it prematurely.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Whether ἐγερῶ should be rendered with resurrection language or architectural
    language
  chosen_reading: Render as 'I will raise it up.'
  alternative_readings:
  - I will rebuild it
  rationale: Given the Johannine context and later explanation, ἐγείρω intentionally
    carries resurrection resonance. 'Raise it up' preserves that theological weight
    while still making sense against the temple metaphor.
  doctrine_reference: Translation philosophy §1 and §3
