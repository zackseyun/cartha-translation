theological_decisions:
- issue: Scope of Jesus' knowledge in relation to humanity
  chosen_reading: Render the statement straightforwardly as describing Jesus' direct
    knowledge of what is in man, without narrowing it to mere social insight or expanding
    it with doctrinal explanation.
  alternative_readings:
  - what was in each person individually
  - human nature in general
  rationale: The Greek singular ἀνθρώπου/ἀνθρώπῳ can carry representative force and
    may include both individual and general reference. The translation preserves that
    breadth rather than resolving it. This also fits the stated principle of preserving
    theological tension where the text is broad.
  doctrine_reference: Translation philosophy §3; §4
