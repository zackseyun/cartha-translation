theological_decisions:
- issue: Use of the future verb in the Psalm citation as applied to Jesus
  chosen_reading: Retain the future-oriented wording 'will consume me'
  alternative_readings:
  - has consumed me
  rationale: The Greek text here reads καταφάγεταί με, a future form, even though
    the underlying Psalm in some traditions is often rendered with a past sense ('has
    consumed me'). The translation should follow the Greek text of John as written,
    preserving John's wording and theological application without harmonizing it to
    another textual tradition.
  doctrine_reference: Translation philosophy §1, §3
