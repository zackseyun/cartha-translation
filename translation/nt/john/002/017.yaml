id: JHN.2.17
reference: John 2:17
source:
  edition: SBLGNT
  text: ⸀ἐμνήσθησαν οἱ μαθηταὶ αὐτοῦ ὅτι γεγραμμένον ἐστίν· Ὁ ζῆλος τοῦ οἴκου σου
    καταφάγεταί με.
translation:
  text: His disciples remembered that it is written, “Zeal for your house will consume
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has consumed me,” reflecting the wording of Psalm 69:9 in some textual
      traditions; John’s Greek here reads “will consume me.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμνήσθησαν
  chosen: remembered
  alternatives:
  - recalled
  - were reminded
  lexicon: BDAG
  rationale: Aorist passive/deponent form of μιμνῄσκομαι is naturally rendered 'remembered.'
    'Recalled' is possible, but 'remembered' is more idiomatic and direct in modern
    English.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: Standard NT rendering for μαθητής; 'learners' is too weak and non-idiomatic
    in this context.
- source_word: γεγραμμένον ἐστίν
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: This formula introduces Scripture citation. English idiom strongly favors
    'it is written,' which preserves the perfect sense and scriptural register without
    sounding wooden.
- source_word: ζῆλος
  chosen: Zeal
  alternatives:
  - ardor
  - jealous concern
  lexicon: BDAG
  rationale: In the citation from Psalm 69:9, ζῆλος denotes intense devotion or fervor.
    'Zeal' best preserves both the emotional intensity and the traditional scriptural
    resonance. 'Jealous concern' is possible in some contexts but is less natural
    here.
- source_word: οἴκου
  chosen: house
  alternatives:
  - temple
  - household
  lexicon: BDAG
  rationale: The quoted Scripture says 'house,' and retaining that wording preserves
    the OT allusion. Although in context it refers to God's temple, translating as
    'temple' would obscure the citation's wording.
- source_word: καταφάγεταί
  chosen: will consume
  alternatives:
  - will devour
  - will eat up
  lexicon: BDAG
  rationale: Future middle of κατεσθίω is idiomatically rendered 'will consume' in
    English. 'Devour' is vivid but slightly overstated in contemporary usage; 'eat
    up' is too colloquial for the scriptural citation.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to the speaker in the Psalm citation,
    applied here to Jesus.
