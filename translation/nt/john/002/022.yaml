id: JHN.2.22
reference: John 2:22
source:
  edition: SBLGNT
  text: ὅτε οὖν ἠγέρθη ἐκ νεκρῶν, ἐμνήσθησαν οἱ μαθηταὶ αὐτοῦ ὅτι τοῦτο ἔλεγεν, καὶ
    ἐπίστευσαν τῇ γραφῇ καὶ τῷ λόγῳ ⸀ὃν εἶπεν ὁ Ἰησοῦς.
translation:
  text: So when he was raised from the dead, his disciples remembered that he had
    been saying this, and they believed the Scripture and the word that Jesus had
    spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he rose from the dead.' The Greek verb is passive ('was raised'), which
      is preserved in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or, 'that he was saying this' or 'that he said this.' The imperfect verb
      may suggest repeated or ongoing prior speech.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the statement' for 'the word.' The Greek term can refer to a spoken
      word, statement, or message.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  chosen: So when
  alternatives:
  - When therefore
  - Therefore when
  lexicon: BDAG
  rationale: ὅτε introduces the temporal clause ('when'), while οὖν marks narrative
    inference/continuation. 'So when' preserves both the temporal sense and the connective
    force in natural English.
- source_word: ἠγέρθη
  chosen: he was raised
  alternatives:
  - he rose
  - he was awakened
  lexicon: BDAG
  rationale: The passive form naturally supports 'was raised.' In resurrection contexts,
    ἐγείρω commonly denotes being raised from death. This wording preserves the Greek
    voice and avoids flattening the nuance into an intransitive 'rose.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: This is the standard idiomatic resurrection expression. 'From the dead'
    is clear, natural, and faithful to the Greek plural construction.
- source_word: ἐμνήσθησαν
  chosen: remembered
  alternatives:
  - were reminded
  - recalled
  lexicon: BDAG
  rationale: Aorist middle/passive here conveys coming to remembrance. 'Remembered'
    is the most natural English rendering in context.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the possessive construction.
- source_word: ὅτι τοῦτο ἔλεγεν
  chosen: that he had been saying this
  alternatives:
  - that he said this
  - that he was saying this
  lexicon: BDAG
  rationale: The imperfect ἔλεγεν suggests repeated or ongoing speech in prior time.
    English past perfect progressive ('had been saying') best conveys that this referred
    back to Jesus' earlier statement in the narrative.
- source_word: ἐπίστευσαν
  chosen: they believed
  alternatives:
  - they put faith in
  - they trusted
  lexicon: BDAG
  rationale: Default rendering of πιστεύω here is 'believed.' The object is dative
    ('the Scripture and the word'), so 'believed' fits naturally without importing
    a more interpretive nuance.
- source_word: τῇ γραφῇ
  chosen: the Scripture
  alternatives:
  - the writing
  - the Scriptures
  lexicon: BDAG
  rationale: γραφή in the singular commonly refers to Scripture as authoritative sacred
    writing. Singular 'the Scripture' best matches the Greek form and Johannine usage.
- source_word: τῷ λόγῳ
  chosen: the word
  alternatives:
  - the statement
  - the message
  lexicon: BDAG
  rationale: λόγος here refers specifically to Jesus' spoken saying just mentioned.
    'Word' preserves the lexical connection while remaining idiomatic; 'statement'
    is possible but less resonant with Johannine diction.
- source_word: ὃν εἶπεν ὁ Ἰησοῦς
  chosen: that Jesus had spoken
  alternatives:
  - which Jesus said
  - that Jesus said
  lexicon: BDAG
  rationale: This relative clause modifies λόγῳ. 'Had spoken' fits the retrospective
    narrative perspective and reads smoothly in English while preserving the sense
    of Jesus' prior utterance.
