theological_decisions:
- issue: Rendering the resurrection verb in passive voice
  chosen_reading: he was raised from the dead
  alternative_readings:
  - he rose from the dead
  rationale: The Greek form is passive, and preserving that voice avoids obscuring
    the text's wording. This does not deny that other passages speak of Jesus rising;
    here the translation follows the grammatical form actually present.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering πιστεύω with dative objects
  chosen_reading: they believed the Scripture and the word
  alternative_readings:
  - they put faith in the Scripture and the word
  - they trusted the Scripture and the word
  rationale: The text speaks of the disciples' believing what Scripture and Jesus'
    word said. 'Believed' is the least interpretively loaded rendering and preserves
    the theological tension of faith responding to revelation without expanding the
    wording.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
