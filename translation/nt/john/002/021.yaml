id: JHN.2.21
reference: John 2:21
source:
  edition: SBLGNT
  text: ἐκεῖνος δὲ ἔλεγεν περὶ τοῦ ναοῦ τοῦ σώματος αὐτοῦ.
translation:
  text: But he was speaking about the temple of his body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary of his body'; the Greek word here is naos, which often refers
      more specifically to the inner temple than to the entire temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  - that man
  lexicon: BDAG
  rationale: In context, the demonstrative refers back to Jesus and functions naturally
    in English as the pronoun 'he.' A more literal 'that one' would be awkward and
    unnecessarily emphatic here.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the misunderstanding in the previous verse.
    'But' best signals that contrast in natural English.
- source_word: ἔλεγεν
  chosen: was speaking
  alternatives:
  - was saying
  - meant
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or descriptive past action. 'Was speaking'
    preserves the verbal aspect and fits the explanatory comment. 'Meant' is interpretive
    and less formally tied to λέγω.
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  - with reference to
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' 'About'
    is the clearest modern English choice.
- source_word: ναοῦ
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός refers specifically to the temple sanctuary rather than the broader
    temple complex. 'Temple' is the standard and most readable rendering here, while
    the more precise nuance can be preserved in a footnote.
- source_word: σώματος
  chosen: body
  lexicon: BDAG
  rationale: The genitive construction 'the temple of his body' is best preserved
    directly. 'Body' is the plain and theologically important term in context.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The possessive genitive identifies the body as Jesus's own body; 'his'
    is the straightforward English equivalent.
