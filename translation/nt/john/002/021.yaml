theological_decisions:
- issue: Metaphorical identification of Jesus's body with the temple
  chosen_reading: Retain the metaphor directly as 'the temple of his body' without
    interpretive expansion.
  alternative_readings:
  - the sanctuary of his body
  - his body as the temple
  rationale: The verse presents John's explanatory identification without needing
    doctrinal paraphrase. Rendering it directly preserves the Christological significance
    while avoiding added interpretation. This aligns with orthodox Christology and
    the translation philosophy of preserving the text's theological tension and wording
    where possible.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
