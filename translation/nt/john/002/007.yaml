id: JHN.2.7
reference: John 2:7
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὁ Ἰησοῦς· Γεμίσατε τὰς ὑδρίας ὕδατος· καὶ ἐγέμισαν αὐτὰς ἕως
    ἄνω.
translation:
  text: Jesus said to them, “Fill the water jars with water.” And they filled them
    up to the top.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to the brim.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally uses the past tense here. This preserves the sense without
    awkwardness.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun indicating the indirect object of Jesus' speech.
- source_word: Γεμίσατε
  chosen: Fill
  alternatives:
  - Fill up
  lexicon: BDAG
  rationale: Aorist active imperative plural gives a direct command. 'Fill' is the
    natural imperative in English; the sense of completeness is reinforced later by
    'up to the top.'
- source_word: ὑδρίας
  chosen: water jars
  alternatives:
  - jars
  - stone water jars
  lexicon: BDAG
  rationale: ὑδρία denotes a water jar or water pot. 'Water jars' is clear modern
    English and matches the function of the vessels in context. 'Stone' is not repeated
    in this verse, so it is not supplied here.
- source_word: ὕδατος
  chosen: with water
  alternatives:
  - full of water
  lexicon: BDAG
  rationale: The genitive after γεμίζω expresses the content with which the jars are
    to be filled. English idiom renders this naturally as 'with water.'
- source_word: ἐγέμισαν
  chosen: they filled
  alternatives:
  - they filled up
  lexicon: BDAG
  rationale: Aorist active indicative plural narrates the servants' completed obedience.
    'They filled' is straightforward and sufficient, with fullness clarified by the
    following phrase.
- source_word: ἕως ἄνω
  chosen: up to the top
  alternatives:
  - to the brim
  - all the way up
  lexicon: BDAG
  rationale: The phrase means to the upper point, indicating complete filling. 'Up
    to the top' is transparent modern English. 'To the brim' is also possible, but
    'top' avoids implying a specific vessel shape while preserving the sense.
