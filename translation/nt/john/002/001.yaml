id: JHN.2.1
reference: John 2:1
source:
  edition: SBLGNT
  text: Καὶ τῇ ⸂ἡμέρᾳ τῇ τρίτῃ⸃ γάμος ἐγένετο ἐν Κανὰ τῆς Γαλιλαίας, καὶ ἦν ἡ μήτηρ
    τοῦ Ἰησοῦ ἐκεῖ·
translation:
  text: And on the third day there was a wedding in Cana of Galilee, and Jesus's mother
    was there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wedding feast.' The Greek term can refer to the wedding celebration
      as well as the marriage event.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mother of Jesus was there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective; retained as 'And' to preserve Johannine narrative
    flow without adding interpretive nuance.
- source_word: τῇ ἡμέρᾳ τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on the third day afterward
  - the next-but-one day
  lexicon: BDAG
  rationale: Dative of time rendered idiomatically in English as 'on the third day.'
    The article-adjective construction marks a specific temporal reference in the
    narrative sequence.
- source_word: γάμος
  chosen: a wedding
  alternatives:
  - a marriage feast
  - a wedding feast
  lexicon: BDAG
  rationale: γάμος can denote either marriage or wedding celebration; in this narrative
    setting the event in Cana is the wedding occasion/feast. 'A wedding' is natural
    modern English and sufficiently broad.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - took place
  - happened
  - came about
  lexicon: BDAG
  rationale: γίνομαι here introduces an event. 'There was' is idiomatic with 'wedding'
    in English and matches the simple narrative style better than the more formal
    'took place.'
- source_word: ἐν Κανὰ τῆς Γαλιλαίας
  chosen: in Cana of Galilee
  alternatives:
  - in Cana in Galilee
  lexicon: BDAG
  rationale: Name transliterated per translation philosophy. 'Of Galilee' closely
    reflects the genitive construction while remaining natural English.
- source_word: ἦν
  chosen: was
  alternatives:
  - was present
  lexicon: BDAG
  rationale: Imperfect of εἰμί gives background information. Simple 'was' preserves
    the understated narrative tone; 'was present' is interpretive expansion.
- source_word: ἡ μήτηρ τοῦ Ἰησοῦ
  chosen: Jesus's mother
  alternatives:
  - the mother of Jesus
  lexicon: BDAG
  rationale: Both are accurate. 'Jesus's mother' is slightly more natural in contemporary
    English while preserving the genitival relationship.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - present there
  lexicon: BDAG
  rationale: Simple locative adverb; rendered directly without expansion.
