theological_decisions:
- issue: Narrative temporal marker 'the third day'
  chosen_reading: Retained as a chronological notice without importing symbolic resurrection
    overtones into the translation.
  alternative_readings:
  - A symbolically charged allusion to later resurrection themes
  rationale: While readers may perceive Johannine symbolism, the phrase in this verse
    functions plainly as a time reference. The translation should preserve the wording
    without embedding theological interpretation in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
