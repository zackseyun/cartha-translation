id: JHN.11.29
reference: John 11:29
source:
  edition: SBLGNT
  text: ἐκείνη ⸀δὲ ὡς ἤκουσεν ⸀ἠγέρθη ταχὺ καὶ ⸀ἤρχετο πρὸς αὐτόν·
translation:
  text: And when she heard it, she got up quickly and went to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that one, when she heard, rose quickly and was going
      toward him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη
  chosen: she
  alternatives:
  - that woman
  - that one
  lexicon: BDAG
  rationale: The demonstrative refers back to Mary in the immediate context. English
    naturally uses the pronoun 'she' rather than the more wooden 'that one' or 'that
    woman.' The referent remains clear from context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'And' is natural English and preserves the flow.
- source_word: ὡς
  chosen: when
  alternatives:
  - as soon as
  - after
  lexicon: BDAG
  rationale: In this temporal construction with the aorist verb, ὡς introduces the
    time at which the action occurred. 'When' is the most natural rendering; 'as soon
    as' is possible but slightly stronger than the Greek requires.
- source_word: ἤκουσεν
  chosen: heard it
  alternatives:
  - heard
  - learned
  lexicon: BDAG
  rationale: The verb means 'heard.' English idiom benefits from supplying the object
    as 'it,' referring to the message just reported in the previous verse. 'Learned'
    is too interpretive.
- source_word: ἠγέρθη
  chosen: got up
  alternatives:
  - rose
  - was raised up
  lexicon: BDAG
  rationale: Although formally passive, ἐγείρω in this intransitive context means
    'got up/rose.' 'Got up' is idiomatic modern English; 'was raised up' would wrongly
    suggest an external agent is in view.
- source_word: ταχὺ
  chosen: quickly
  alternatives:
  - at once
  - swiftly
  lexicon: BDAG
  rationale: The adverb indicates promptness. 'Quickly' is clear and natural; 'at
    once' is possible but slightly more interpretive.
- source_word: ἤρχετο
  chosen: went
  alternatives:
  - came
  - was going
  lexicon: BDAG
  rationale: The imperfect portrays movement in progress, but English narrative commonly
    renders this naturally as 'went' in sequence. 'Was going' is possible but sounds
    awkward here. 'Came' would shift the deictic perspective toward the narrator rather
    than Mary moving toward Jesus.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with the accusative here marks movement toward a person, and in
    context the destination is effectively reached. 'To him' is idiomatic and fits
    the narrative better than the more literal 'toward him'.
