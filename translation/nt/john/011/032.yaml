id: JHN.11.32
reference: John 11:32
source:
  edition: SBLGNT
  text: ἡ οὖν ⸀Μαριὰμ ὡς ἦλθεν ὅπου ⸀ἦν Ἰησοῦς ἰδοῦσα αὐτὸν ἔπεσεν αὐτοῦ ⸀πρὸς τοὺς
    πόδας, λέγουσα αὐτῷ· Κύριε, εἰ ἦς ὧδε οὐκ ἄν ⸂μου ἀπέθανεν⸃ ὁ ἀδελφός.
translation:
  text: So when Mary came where Jesus was, and saw him, she fell at his feet, saying
    to him, “Lord, if you had been here, my brother would not have died.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Sir." The Greek κύριε can be a respectful form of address, but here
      it is rendered "Lord" in keeping with the project's default for κύριος and the
      Gospel's portrayal of Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Then
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the previous context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὡς
  chosen: when
  alternatives:
  - as
  - once
  lexicon: BDAG
  rationale: In this temporal construction with the aorist verb ἦλθεν, it introduces
    the circumstance of Mary's arrival. 'When' is the clearest idiomatic rendering.
- source_word: ὅπου ἦν Ἰησοῦς
  chosen: where Jesus was
  alternatives:
  - to the place where Jesus was
  lexicon: BDAG
  rationale: A straightforward locative clause. 'Where Jesus was' preserves the Greek
    sense cleanly without unnecessary expansion.
- source_word: ἰδοῦσα αὐτόν
  chosen: and saw him
  alternatives:
  - upon seeing him
  - when she saw him
  lexicon: BDAG
  rationale: The participle is contemporaneous/circumstantial. Rendering it with a
    finite verb joined by 'and' gives natural English while preserving the sequence
    of actions.
- source_word: ἔπεσεν αὐτοῦ πρὸς τοὺς πόδας
  chosen: she fell at his feet
  alternatives:
  - she fell down at his feet
  - she fell toward his feet
  lexicon: BDAG
  rationale: This idiom expresses prostration or collapse before someone. 'At his
    feet' is the standard and natural English equivalent for πρὸς τοὺς πόδας here.
- source_word: λέγουσα αὐτῷ
  chosen: saying to him
  alternatives:
  - saying
  - and said to him
  lexicon: BDAG
  rationale: The present participle introduces her speech. 'Saying to him' preserves
    the participial linkage and direct address.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In John's Gospel the address
    to Jesus can carry respect and more than mere politeness; 'Lord' preserves that
    theological and narrative weight better than 'Sir'.
- source_word: εἰ ἦς ὧδε
  chosen: if you had been here
  alternatives:
  - if you were here
  lexicon: BDAG
  rationale: Although the Greek uses imperfect ἦς, the condition is contrary to fact
    in past time, and idiomatic English expresses this with the pluperfect-like 'had
    been here.'
- source_word: οὐκ ἄν ... ἀπέθανεν
  chosen: would not have died
  alternatives:
  - would not die
  lexicon: BDAG
  rationale: 'The combination of οὐκ ἄν with the aorist in this contrary-to-fact condition
    is best rendered as an unreal past result: ''would not have died.'''
- source_word: μου ὁ ἀδελφός
  chosen: my brother
  alternatives:
  - the brother of me
  lexicon: BDAG
  rationale: The genitive pronoun μου is possessive. English naturally expresses this
    as 'my brother.'
