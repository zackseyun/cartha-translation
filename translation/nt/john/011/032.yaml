theological_decisions:
- issue: Rendering κύριος in Mary's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The project's default rendering for κύριος is 'Lord.' In this context,
    retaining 'Lord' avoids flattening the address into mere politeness and aligns
    with Johannine usage without overstating a fully developed confession in the wording
    itself.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
