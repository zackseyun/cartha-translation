id: JHN.11.56
reference: John 11:56
source:
  edition: SBLGNT
  text: ἐζήτουν οὖν τὸν Ἰησοῦν καὶ ἔλεγον μετ’ ἀλλήλων ἐν τῷ ἱερῷ ἑστηκότες· Τί δοκεῖ
    ὑμῖν; ὅτι οὐ μὴ ἔλθῃ εἰς τὴν ἑορτήν;
translation:
  text: So they were looking for Jesus and saying to one another as they stood in
    the temple courts, “What do you think? That he certainly will not come to the
    feast?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or, “he will by no means come to the feast.” The Greek uses an emphatic
      negation (οὐ μὴ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  chosen: were looking for
  alternatives:
  - were seeking
  - were searching for
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action. 'Looking for' is natural
    modern English and fits the narrative context of people trying to locate Jesus.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding context. 'So'
    is idiomatic and readable in modern English.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect again suggests repeated or ongoing speech among the crowd;
    'were saying' preserves that aspect better than simple past.
- source_word: μετ’ ἀλλήλων
  chosen: to one another
  alternatives:
  - among themselves
  - with one another
  lexicon: BDAG
  rationale: Conveys reciprocal conversation within the group. 'To one another' fits
    the speech verb smoothly in English.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple courts
  alternatives:
  - in the temple
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple courts' communicates this distinction clearly for English readers.
- source_word: ἑστηκότες
  chosen: as they stood
  alternatives:
  - standing
  - while standing there
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι describes their standing position/state.
    'As they stood' is natural in English and links their location to their conversation.
- source_word: Τί δοκεῖ ὑμῖν;
  chosen: What do you think?
  alternatives:
  - What does it seem to you?
  - What is your opinion?
  lexicon: BDAG
  rationale: Idiomatic question asking for opinion. 'What do you think?' best captures
    the force in contemporary English.
- source_word: ὅτι
  chosen: That
  alternatives:
  - Do you think that
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of their opinion/question. Retaining 'That' preserves
    the Greek structure after 'What do you think?'
- source_word: οὐ μὴ ἔλθῃ
  chosen: he certainly will not come
  alternatives:
  - he will surely not come
  - he will by no means come
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Certainly
    will not come' preserves the strong force in readable English without archaic
    phrasing.
- source_word: εἰς τὴν ἑορτήν
  chosen: to the feast
  alternatives:
  - to the festival
  lexicon: BDAG
  rationale: ἑορτή in John commonly refers to a Jewish festival feast; 'feast' is
    concise and traditional, while still understandable. 'Festival' is possible but
    slightly less tied to the Passover setting.
