theological_decisions:
- issue: Emotional description of Jesus
  chosen_reading: Jesus wept
  alternative_readings:
  - Jesus shed tears
  rationale: The verse presents Jesus' genuine human emotional expression in simple
    narrative form. The translation preserves this directly without minimizing it
    or expanding it into a stronger lament than the Greek states. This aligns with
    Chalcedonian orthodoxy by reflecting the text's portrayal of Christ's true humanity
    without importing additional doctrinal explanation into the main text.
  doctrine_reference: Definition of Chalcedon (451 AD)
