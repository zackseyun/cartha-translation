id: JHN.11.35
reference: John 11:35
source:
  edition: SBLGNT
  text: ἐδάκρυσεν ὁ Ἰησοῦς.
translation:
  text: Jesus wept.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus shed tears.' The Greek verb specifically denotes shedding tears
      and is distinct from the louder wailing described elsewhere in the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδάκρυσεν
  chosen: wept
  alternatives:
  - shed tears
  - began to weep
  lexicon: BDAG
  rationale: Aorist active indicative, 3rd singular of δακρύω, denoting the act of
    shedding tears. 'Wept' is the most natural and concise English equivalent and
    preserves the force of the verb without overinterpreting aspect. 'Shed tears'
    is possible but less idiomatic; 'began to weep' imports an ingressive nuance not
    required by the form alone.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name with article functioning as the subject. Standard English
    omits the article before personal names, so 'Jesus' is the natural translation.
