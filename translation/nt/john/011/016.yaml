id: JHN.11.16
reference: John 11:16
source:
  edition: SBLGNT
  text: εἶπεν οὖν Θωμᾶς ὁ λεγόμενος Δίδυμος τοῖς συμμαθηταῖς· Ἄγωμεν καὶ ἡμεῖς ἵνα
    ἀποθάνωμεν μετ’ αὐτοῦ.
translation:
  text: So Thomas, called Twin, said to his fellow disciples, “Let us also go, so
    that we may die with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek Didymus; that is, Twin.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: Θωμᾶς
  chosen: Thomas
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy to transliterate names.
- source_word: ὁ λεγόμενος Δίδυμος
  chosen: called Twin
  alternatives:
  - called Didymus
  - who was called the Twin
  lexicon: BDAG
  rationale: Δίδυμος means 'twin.' The philosophy prefers translating meaningful appellations
    rather than preserving opaque traditional forms. 'Called Twin' is concise and
    natural while retaining the explanatory force of the participial phrase.
- source_word: τοῖς συμμαθηταῖς
  chosen: to his fellow disciples
  alternatives:
  - to the fellow disciples
  - to his fellow students
  lexicon: BDAG
  rationale: συμμαθηταῖς denotes those who are co-disciples/companions in learning.
    'Fellow disciples' best fits Johannine context and idiomatic English. 'His' is
    supplied naturally in English because the referent is Thomas speaking to the group
    of disciples with whom he is associated.
- source_word: Ἄγωμεν
  chosen: Let us ... go
  alternatives:
  - Let us depart
  - Let us come
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive. 'Let us go' is the most idiomatic
    rendering in context, expressing Thomas's exhortation to accompany Jesus.
- source_word: καὶ ἡμεῖς
  chosen: also
  alternatives:
  - we also
  - even we
  lexicon: BDAG
  rationale: The combination emphasizes inclusion of Thomas and the others with Jesus.
    English can express this naturally with 'also'; the subject 'we' is already embedded
    in 'Let us go.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces the intended or expected result/purpose. 'So that' preserves
    the Greek connection clearly and reads naturally.
- source_word: ἀποθάνωμεν
  chosen: we may die
  alternatives:
  - we might die
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα. 'We may die' is a straightforward English
    equivalent that preserves the gravity of Thomas's statement without overinterpreting
    whether it is resignation, courage, or irony.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: Simple accompaniment. 'With him' is the natural English rendering and
    leaves the referent plainly as Jesus from context.
