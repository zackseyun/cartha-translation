theological_decisions:
- issue: Relation of faith to seeing God's glory
  chosen_reading: Render the statement straightforwardly as a conditional promise
    without expanding its theological implications.
  alternative_readings:
  - Interpret as a general principle about faith and miracles
  - Interpret as a specific promise limited to the raising of Lazarus
  rationale: The verse itself presents Jesus' words as a direct conditional statement
    to Martha. The translation should preserve that wording without resolving broader
    theological debates about faith, miracles, or the scope of the promise.
  doctrine_reference: Preserve theological tension rather than resolve it.
