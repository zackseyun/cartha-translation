id: JHN.11.40
reference: John 11:40
source:
  edition: SBLGNT
  text: λέγει αὐτῇ ὁ Ἰησοῦς· Οὐκ εἶπόν σοι ὅτι ἐὰν πιστεύσῃς ⸀ὄψῃ τὴν δόξαν τοῦ θεοῦ;
translation:
  text: Jesus said to her, “Did I not tell you that if you believe, you will see the
    glory of God?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English in narrative normally renders this as simple past, 'said,' under optimal
    equivalence.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative indirect object referring to Martha in context; 'to her' is the
    natural English rendering.
- source_word: Οὐκ εἶπόν σοι
  chosen: Did I not tell you
  alternatives:
  - Did I not say to you
  - Have I not told you
  lexicon: BDAG
  rationale: The Greek is a rhetorical question expecting affirmation. 'Tell' is slightly
    more natural than 'say to' in English while preserving the direct personal address.
    A simple past fits the aorist well in context.
- source_word: ἐὰν πιστεύσῃς
  chosen: if you believe
  alternatives:
  - if you have faith
  - if you trust
  lexicon: BDAG
  rationale: πιστεύω is best rendered here as 'believe.' This preserves the verbal
    connection to Johannine usage and avoids importing a narrower doctrinal nuance.
    'Trust' is possible but less standard here.
- source_word: ὄψῃ
  chosen: you will see
  alternatives:
  - you shall see
  lexicon: BDAG
  rationale: Future middle of ὁράω is naturally rendered 'you will see.' 'Shall' is
    possible but less natural in contemporary English.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: BDAG
  rationale: '''Glory'' is the established and most theologically appropriate rendering
    of δόξα in Johannine context, preserving the connection to divine self-revelation.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is straightforwardly possessive or descriptive. 'Of God'
    preserves the formal weight and matches common biblical style better than the
    more colloquial 'God's' here.
