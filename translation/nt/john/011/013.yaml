id: JHN.11.13
reference: John 11:13
source:
  edition: SBLGNT
  text: εἰρήκει δὲ ὁ Ἰησοῦς περὶ τοῦ θανάτου αὐτοῦ. ἐκεῖνοι δὲ ἔδοξαν ὅτι περὶ τῆς
    κοιμήσεως τοῦ ὕπνου λέγει.
translation:
  text: Now Jesus had spoken about his death, but they thought that he was speaking
    about the sleep of ordinary rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'about the sleep of sleep,' that is, about literal sleep
      rather than death.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήκει
  chosen: had spoken
  alternatives:
  - had said
  - was speaking
  lexicon: BDAG
  rationale: Pluperfect form indicates prior speech relative to the disciples' misunderstanding.
    'Had spoken' is natural English and preserves the temporal sense better than a
    simple past.
- source_word: δὲ
  chosen: Now / but
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: The first δέ is lightly transitional, rendered 'Now' in English for discourse
    flow; the second marks contrast with the disciples' misunderstanding, rendered
    'but'.
- source_word: περὶ τοῦ θανάτου αὐτοῦ
  chosen: about his death
  alternatives:
  - concerning his death
  lexicon: BDAG
  rationale: περί with the genitive here means 'about/concerning.' 'About his death'
    is idiomatic modern English and accurately conveys that Jesus meant Lazarus's
    death.
- source_word: ἐκεῖνοι
  chosen: they
  alternatives:
  - those men
  - those ones
  lexicon: BDAG
  rationale: The demonstrative refers to the disciples already in view. English normally
    uses the pronoun 'they' rather than a more wooden demonstrative.
- source_word: ἔδοξαν
  chosen: thought
  alternatives:
  - supposed
  - assumed
  - seemed
  lexicon: BDAG
  rationale: In context δοκέω expresses the disciples' mistaken impression. 'Thought'
    is the clearest natural rendering.
- source_word: κοιμήσεως
  chosen: sleep
  alternatives:
  - sleeping
  - rest
  lexicon: BDAG
  rationale: The noun denotes sleep. 'Sleep' preserves the lexical link with Jesus's
    figurative use in the surrounding context.
- source_word: τοῦ ὕπνου
  chosen: of ordinary rest
  alternatives:
  - of sleep
  - of slumber
  lexicon: BDAG
  rationale: The genitive further specifies literal sleep, contrasting with death
    as metaphorical 'sleep.' Rendering it 'ordinary rest' brings out the disciples'
    misunderstanding in clear English without losing the contrast.
- source_word: λέγει
  chosen: was speaking
  alternatives:
  - speaks
  - was saying
  lexicon: BDAG
  rationale: Although formally present, the verb functions as a historical present.
    'Was speaking' fits smooth English after 'they thought that' and reflects ongoing
    reference.
