theological_decisions:
- issue: Whether to render Jesus's reference to death in a way that implies a doctrine
    of soul sleep
  chosen_reading: Translate plainly as 'his death' while preserving the disciples'
    misunderstanding as literal sleep without doctrinal expansion.
  alternative_readings:
  - Translate more literally as 'about the sleep of sleep'
  - Use wording that could suggest an intermediate-state doctrine
  rationale: The verse contrasts Jesus's figurative use of sleep for death with the
    disciples' assumption of literal sleep. The translation should preserve that narrative
    misunderstanding without importing a theological claim about the state of the
    dead.
  doctrine_reference: Preserve theological tension rather than resolve it.
