theological_decisions:
- issue: Whether to render κεκοίμηται as the interpretive 'has died' or preserve the
    metaphor of sleep
  chosen_reading: Preserve the metaphor in the main text as 'has fallen asleep'
  alternative_readings:
  - has died
  rationale: Jesus intentionally speaks metaphorically here, and the disciples misunderstand
    him in the next verse. Preserving 'sleep' maintains the narrative tension and
    theological nuance of death as sleep without importing the clarification too early.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
