id: JHN.11.11
reference: John 11:11
source:
  edition: SBLGNT
  text: ταῦτα εἶπεν, καὶ μετὰ τοῦτο λέγει αὐτοῖς· Λάζαρος ὁ φίλος ἡμῶν κεκοίμηται,
    ἀλλὰ πορεύομαι ἵνα ἐξυπνίσω αὐτόν.
translation:
  text: After saying these things, he said to them, “Lazarus our friend has fallen
    asleep, but I am going so that I may wake him up.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “has died.” Jesus uses sleep figuratively for death
      here; the disciples initially misunderstand him in the following verses.
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring back to the preceding discourse; 'these
    things' preserves the Greek number and Johannine narrative style better than the
    smoother singular 'this'.
- source_word: εἶπεν
  chosen: saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered together with ταῦτα in the participial English clause 'After
    saying these things' to produce natural English while preserving the prior completed
    speech act indicated by the aorist.
- source_word: μετὰ τοῦτο
  chosen: After
  alternatives:
  - After this
  - Then
  lexicon: BDAG
  rationale: The phrase marks sequence. In combination with the preceding clause,
    'After saying these things' is idiomatic English and preserves the temporal transition.
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly shifts this to simple past. This preserves readability without loss of
    meaning.
- source_word: Λάζαρος
  chosen: Lazarus
  lexicon: BDAG
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
- source_word: ὁ φίλος ἡμῶν
  chosen: our friend
  alternatives:
  - the friend of ours
  - the one we love as a friend
  lexicon: BDAG
  rationale: The articular noun with possessive pronoun is most naturally rendered
    'our friend.' This preserves the relational emphasis without awkward literalism.
- source_word: κεκοίμηται
  chosen: has fallen asleep
  alternatives:
  - has gone to sleep
  - is asleep
  - has died
  lexicon: BDAG
  rationale: The perfect middle/passive of κοιμάομαι here uses 'sleep' as a metaphor
    for death, clarified in the following verse. 'Has fallen asleep' preserves the
    metaphor in the main text rather than prematurely interpreting it as 'has died.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Simple adversative conjunction contrasting Lazarus's state with Jesus's
    intended action.
- source_word: πορεύομαι
  chosen: I am going
  alternatives:
  - I go
  - I am on my way
  lexicon: BDAG
  rationale: Present middle indicative here expresses imminent purposeful movement.
    'I am going' is natural English and retains the present sense.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - to
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' preserves the purposive force more explicitly
    than the more compressed English infinitive alone.
- source_word: ἐξυπνίσω
  chosen: I may wake him up
  alternatives:
  - I may awaken him
  - I may rouse him
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expressing intended result/purpose. 'Wake
    him up' is clear, idiomatic modern English and preserves the sleep metaphor.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Lazarus.
