theological_decisions:
- issue: Sense of ὑπὲρ in relation to Jesus' death
  chosen_reading: Rendered broadly as 'for the people' in the main text
  alternative_readings:
  - on behalf of the people
  - in place of the people
  rationale: The immediate speaker, Caiaphas, is expressing political expediency,
    while the evangelist later presents his words as unwittingly prophetic (11:51).
    A broad rendering preserves both the immediate political sense and the deeper
    sacrificial/substitutionary resonance without forcing one theological nuance into
    the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
