id: JHN.11.12
reference: John 11:12
source:
  edition: SBLGNT
  text: εἶπαν οὖν οἱ μαθηταὶ ⸀αὐτῷ· Κύριε, εἰ κεκοίμηται σωθήσεται.
translation:
  text: So the disciples said to him, “Lord, if he has fallen asleep, he will recover.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'if he has gone to sleep.' Jesus had spoken of Lazarus's
      death figuratively as sleep, but the disciples understood him to mean ordinary
      sleep.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek verb can also be rendered ''he will be saved,'' but here it refers
      to recovery from illness: ''he will recover'' or ''he will get well.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative inference/result from Jesus' prior statement; 'So' is
    natural modern English and preserves the logical connection without sounding overly
    formal.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article is present and the referent is clear from context. 'The disciples'
    is sufficient and avoids adding 'his' where Greek does not explicitly include
    it.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun refers to Jesus, but the Greek uses a pronoun, so 'to him'
    best matches the source while remaining clear in context.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this Johannine context
    the disciples address Jesus respectfully, and 'Lord' preserves both the lexical
    value and the Gospel's christological resonance better than 'Sir' or 'Master'.
- source_word: εἰ
  chosen: if
  alternatives:
  - since
  lexicon: BDAG
  rationale: Introduces a straightforward conditional based on the disciples' misunderstanding
    of Jesus' figurative language. 'If' is the plain sense.
- source_word: κεκοίμηται
  chosen: has fallen asleep
  alternatives:
  - is sleeping
  - has gone to sleep
  lexicon: BDAG
  rationale: The perfect middle/passive of κοιμάομαι can mean 'sleep' literally or
    function as a euphemism for death. Here the disciples misunderstand Jesus literally,
    so the main text should reflect ordinary sleep language. 'Has fallen asleep' captures
    the perfect aspect/state resulting from the action and sounds natural in English.
- source_word: σωθήσεται
  chosen: he will recover
  alternatives:
  - he will be saved
  - he will get well
  - he will be healed
  lexicon: BDAG
  rationale: Although σῴζω often means 'save,' in illness contexts it commonly means
    recovery or restoration to health. Given the disciples' assumption that Lazarus
    is merely sleeping, 'he will recover' best conveys their meaning in idiomatic
    English without importing soteriological overtones absent here.
