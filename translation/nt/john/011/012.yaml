theological_decisions:
- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrine table sets κύριος to 'Lord' as the default. In John's Gospel
    this also preserves the layered possibility of respectful address and christological
    significance without overstating the verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to preserve the possible double sense of κεκοίμηται as sleep/death
    in the main text
  chosen_reading: Translate as ordinary sleep language in the main text
  alternative_readings:
  - Translate more ambiguously as 'has gone to rest'
  rationale: The narrative point is the disciples' misunderstanding of Jesus' figurative
    statement about Lazarus's death. Rendering the term as ordinary sleep in the main
    text preserves that misunderstanding for the reader, which the following verses
    then clarify.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
