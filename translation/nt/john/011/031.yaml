theological_decisions:
- issue: Meaning of Ἰουδαῖοι in Johannine narrative
  chosen_reading: Rendered as 'the Jews' in this verse, referring to the Jewish mourners
    present with Mary.
  alternative_readings:
  - the Judeans
  rationale: John's use of Ἰουδαῖοι is context-sensitive. Here the referent is the
    group with Mary in the house, not necessarily an ethnically comprehensive or polemical
    label. 'The Jews' remains the most direct rendering of the Greek, while the geographic
    nuance 'the Judeans' is preserved as an alternative because it is sometimes argued
    in Johannine contexts.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
