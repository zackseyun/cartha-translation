id: JHN.11.31
reference: John 11:31
source:
  edition: SBLGNT
  text: οἱ οὖν Ἰουδαῖοι οἱ ὄντες μετ’ αὐτῆς ἐν τῇ οἰκίᾳ καὶ παραμυθούμενοι αὐτήν,
    ἰδόντες τὴν ⸀Μαριὰμ ὅτι ταχέως ἀνέστη καὶ ἐξῆλθεν, ἠκολούθησαν αὐτῇ ⸀δόξαντες
    ὅτι ὑπάγει εἰς τὸ μνημεῖον ἵνα κλαύσῃ ἐκεῖ.
translation:
  text: So the Jews who were with her in the house and comforting her, when they saw
    that Mary got up quickly and went out, followed her, thinking that she was going
    to the tomb to weep there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' In John, Ἰουδαῖοι can sometimes refer more narrowly to
      people from Judea or to the Judean leadership, but here it refers to the group
      mourning with Mary.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὖν Ἰουδαῖοι
  chosen: So the Jews
  alternatives:
  - Then the Jews
  - Therefore the Jews
  - So the Judeans
  lexicon: BDAG
  rationale: οὖν is rendered with a natural connective, here 'So,' to show narrative
    progression. Ἰουδαῖοι in John can mean either 'Jews' or 'Judeans'; in this context
    it refers to the Jewish mourners present with Mary rather than a strictly geographic
    subset, so 'the Jews' is retained as the more natural contextual rendering, while
    preserving 'the Judeans' as an alternative.
- source_word: οἱ ὄντες μετ’ αὐτῆς ἐν τῇ οἰκίᾳ
  chosen: who were with her in the house
  alternatives:
  - who were with her at the house
  lexicon: BDAG
  rationale: The participial phrase identifies which Jews are in view. 'In the house'
    is the straightforward sense of ἐν τῇ οἰκίᾳ and fits the mourning setting.
- source_word: παραμυθούμενοι αὐτήν
  chosen: comforting her
  alternatives:
  - consoling her
  lexicon: BDAG
  rationale: παραμυθέομαι denotes speaking comfort or consolation. 'Comforting' is
    idiomatic modern English and suits the funeral context.
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing
  lexicon: BDAG
  rationale: 'The aorist participle is rendered temporally in smooth English: ''when
    they saw.'' This preserves the sequence of events.'
- source_word: ταχέως ἀνέστη καὶ ἐξῆλθεν
  chosen: got up quickly and went out
  alternatives:
  - rose quickly and went out
  - stood up quickly and went out
  lexicon: BDAG
  rationale: ἀνίστημι here refers to standing up/rising from a seated position, not
    resurrection. 'Got up quickly' is natural English; ἐξῆλθεν is simply 'went out.'
- source_word: ἠκολούθησαν αὐτῇ
  chosen: followed her
  alternatives:
  - went after her
  lexicon: BDAG
  rationale: ἀκολουθέω is the standard verb 'follow.' No special discipleship nuance
    is demanded here; it is physical following.
- source_word: δόξαντες
  chosen: thinking
  alternatives:
  - supposing
  - assuming
  lexicon: BDAG
  rationale: δοκέω in participial form here expresses their assumption or inference.
    'Thinking' is clear and idiomatic.
- source_word: ὑπάγει
  chosen: she was going
  alternatives:
  - she was leaving for
  - she was going away to
  lexicon: BDAG
  rationale: Although present tense in Greek, in indirect discourse after a past main
    verb English naturally uses 'was going.' This preserves the sense without woodenness.
- source_word: εἰς τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - to the grave
  lexicon: BDAG
  rationale: μνημεῖον is best rendered 'tomb' in the Johannine burial context, rather
    than the broader 'grave.'
- source_word: ἵνα κλαύσῃ ἐκεῖ
  chosen: to weep there
  alternatives:
  - so that she might weep there
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. In natural English after
    a verb of motion, 'to weep there' communicates the purpose clearly without over-formalizing.
