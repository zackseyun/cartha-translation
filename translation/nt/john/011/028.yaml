theological_decisions:
- issue: Rendering of Jesus' title διδάσκαλος
  chosen_reading: The Teacher
  alternative_readings:
  - the Master
  rationale: The title is not one of the doctrine excerpt's specially contested christological
    terms, so it is translated according to its ordinary lexical sense. This preserves
    the narrative's respectful but non-dogmatically expanded designation of Jesus.
  doctrine_reference: Translation philosophy §§1, 2, 6
- issue: Nuance of λάθρᾳ
  chosen_reading: privately
  alternative_readings:
  - secretly
  rationale: The verse describes a discreet communication, likely because of the surrounding
    mourners, without requiring an implication of deception or fear. 'Privately' preserves
    the scene without importing extra motive.
  doctrine_reference: Translation philosophy §§1, 6
