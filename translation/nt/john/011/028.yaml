id: JHN.11.28
reference: John 11:28
source:
  edition: SBLGNT
  text: Καὶ ⸀τοῦτο εἰποῦσα ἀπῆλθεν καὶ ἐφώνησεν ⸀Μαριὰμ τὴν ἀδελφὴν αὐτῆς λάθρᾳ εἰποῦσα·
    Ὁ διδάσκαλος πάρεστιν καὶ φωνεῖ σε.
translation:
  text: And after saying this, she went away and called Mary her sister privately,
    saying, “The Teacher is here and is calling for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “secretly.” The Greek adverb can denote speaking out of public hearing.
    reason: lexical_alternative
  - marker: b
    text: 'Or “The Master is here.” Greek: “The Teacher.”'
    reason: lexical_alternative
  - marker: c
    text: Or “calls you” / “is calling you.” The Greek present tense may be rendered
      more literally, but here likely means that he is asking for your presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο εἰποῦσα
  chosen: after saying this
  alternatives:
  - having said this
  - when she had said this
  lexicon: BDAG
  rationale: Aorist participle with τοῦτο is rendered temporally in natural English.
    'After saying this' preserves the sequence without sounding wooden.
- source_word: ἀπῆλθεν
  chosen: she went away
  alternatives:
  - she departed
  - she went off
  lexicon: BDAG
  rationale: The verb denotes departure from the present location. 'Went away' is
    idiomatic modern English and fits the narrative flow.
- source_word: ἐφώνησεν Μαριὰμ
  chosen: called Mary
  alternatives:
  - summoned Mary
  - called to Mary
  lexicon: BDAG
  rationale: φωνέω here means to call or summon someone. 'Called Mary' is the most
    natural rendering in context.
- source_word: τὴν ἀδελφὴν αὐτῆς
  chosen: her sister
  alternatives:
  - the sister of her
  - her own sister
  lexicon: BDAG
  rationale: Appositional phrase identifying Mary. 'Her sister' is the straightforward
    English equivalent.
- source_word: λάθρᾳ
  chosen: privately
  alternatives:
  - secretly
  - in private
  lexicon: BDAG
  rationale: The adverb indicates that Martha spoke out of public hearing. 'Privately'
    is clear modern English; 'secretly' could overstate clandestine intent.
- source_word: εἰποῦσα
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Participle of attendant speech introducing direct discourse; 'saying'
    preserves the Greek structure smoothly.
- source_word: Ὁ διδάσκαλος
  chosen: The Teacher
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: διδάσκαλος literally means 'teacher.' In this Johannine context it functions
    as a respectful title for Jesus. 'The Teacher' preserves the lexical sense better
    than 'Master,' which could import authority nuances not explicit here.
- source_word: πάρεστιν
  chosen: is here
  alternatives:
  - is present
  - has come
  lexicon: BDAG
  rationale: The verb means 'is present' or 'is here.' 'Is here' is concise and natural
    in direct speech.
- source_word: φωνεῖ σε
  chosen: is calling for you
  alternatives:
  - calls you
  - is calling you
  lexicon: BDAG
  rationale: Present tense suggests ongoing action. In English, 'is calling for you'
    best conveys that Jesus is asking for Mary's presence, not merely uttering her
    name.
