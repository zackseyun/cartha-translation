theological_decisions:
- issue: Potential symbolic force of 'light' in Johannine context
  chosen_reading: Retain the ordinary image in the main text without making the metaphor
    explicit
  alternative_readings:
  - Interpret 'the light of this world' more explicitly as a reference to Jesus or
    divine guidance
  rationale: John often uses 'light' with theological depth, but this verse's immediate
    wording works as a proverb-like statement within Jesus's speech. The translation
    preserves the lexical wording and allows the theological resonance to remain implicit
    rather than importing an interpretive gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine reference in τις ... βλέπει
  chosen_reading: Use 'anyone ... he'
  alternative_readings:
  - anyone ... they
  rationale: The Greek uses an indefinite singular with grammatically masculine forms.
    Per the project's gender-accurate policy, the representative singular is preserved
    with 'he' rather than neutralizing the form.
  doctrine_reference: Gender-accurate over gender-neutral.
