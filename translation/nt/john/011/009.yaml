id: JHN.11.9
reference: John 11:9
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Οὐχὶ δώδεκα ⸂ὧραί εἰσιν⸃ τῆς ἡμέρας; ἐάν τις περιπατῇ ἐν
    τῇ ἡμέρᾳ, οὐ προσκόπτει, ὅτι τὸ φῶς τοῦ κόσμου τούτου βλέπει·
translation:
  text: Jesus answered, “Are there not twelve hours in the day? If anyone walks in
    the day, he does not stumble, because he sees the light of this world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twelve hours of the day.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the light of this world' may carry broader Johannine resonance
      about divine illumination, though the wording here is left untranslated as stated.
    reason: cross_reference
  - marker: c
    text: Greek has the representative singular 'anyone ... he.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the conventional and
    natural English rendering without adding nuance not present in the Greek.
- source_word: Οὐχὶ
  chosen: Are there not
  alternatives:
  - Are there not indeed
  - Is it not the case that
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. 'Are there not'
    preserves the rhetorical force more naturally than a flat negative particle.
- source_word: δώδεκα ὧραί εἰσιν τῆς ἡμέρας
  chosen: twelve hours in the day
  alternatives:
  - twelve hours of the day
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the genitive construction. 'In
    the day' is more natural in English while preserving the sense of the daylight
    period being divided into twelve hours.
- source_word: ἐάν τις περιπατῇ
  chosen: If anyone walks
  alternatives:
  - If someone walks
  lexicon: BDAG
  rationale: Conditional clause with τις in a generic sense. 'Anyone' communicates
    the indefinite representative force clearly in modern English.
- source_word: ἐν τῇ ἡμέρᾳ
  chosen: in the day
  alternatives:
  - during the day
  - in daylight
  lexicon: BDAG
  rationale: Kept relatively formal to preserve the parallel with the first clause
    and the metaphorical resonance in context, while remaining readable.
- source_word: προσκόπτει
  chosen: stumble
  alternatives:
  - trip
  - stumble against
  lexicon: BDAG
  rationale: '''Stumble'' preserves both the literal image and the broader metaphorical
    potential in Johannine context better than the more colloquial ''trip''.'
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Basic lexical sense; also preserves Johannine thematic resonance without
    overinterpreting it christologically in the translation itself.
- source_word: τοῦ κόσμου τούτου
  chosen: of this world
  alternatives:
  - of this present world
  lexicon: BDAG
  rationale: Natural rendering of the genitive phrase. 'This world' is sufficiently
    literal and preserves the immediate demonstrative force.
- source_word: βλέπει
  chosen: he sees
  alternatives:
  - he can see
  - he looks at
  lexicon: BDAG
  rationale: The present indicative most directly means 'sees.' Adding 'can' would
    slightly interpret the resultative sense; the simpler rendering keeps closer to
    the Greek.
