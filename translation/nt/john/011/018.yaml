id: JHN.11.18
reference: John 11:18
source:
  edition: SBLGNT
  text: ἦν δὲ ⸀ἡ Βηθανία ἐγγὺς τῶν Ἱεροσολύμων ὡς ἀπὸ σταδίων δεκαπέντε.
translation:
  text: Now Bethany was near Jerusalem, about fifteen stadia away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: About two miles, or roughly three kilometers.
    reason: cultural_note
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective here, advancing the narrative rather than marking
    strong contrast. 'Now' gives natural English discourse flow without overstating
    contrast.
- source_word: Βηθανία
  chosen: Bethany
  rationale: Proper place name; transliterated according to standard English convention,
    in keeping with the policy to transliterate names.
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - close to
  lexicon: BDAG
  rationale: ἐγγύς denotes spatial nearness. 'Near' is the most natural and concise
    English equivalent here.
- source_word: Ἱεροσολύμων
  chosen: Jerusalem
  rationale: Standard English rendering of the place name Ἱεροσόλυμα.
- source_word: ὡς
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: With a measure expression, ὡς marks approximation. 'About' is idiomatic
    and preserves the non-exact sense.
- source_word: ἀπὸ σταδίων δεκαπέντε
  chosen: fifteen stadia away
  alternatives:
  - about two miles away
  - fifteen stadia from it
  lexicon: BDAG
  rationale: στάδιον is an ancient unit of distance. Retaining 'stadia' preserves
    the source-culture measure more formally, while 'away' brings out the spatial
    sense implied by ἀπό. A modern equivalent is worth preserving in a footnote rather
    than replacing the source unit in the main text.
