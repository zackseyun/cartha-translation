theological_decisions:
- issue: Rendering οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: This verse does not present a doctrinally contested term from the provided
    table, but Johannine usage can be historically sensitive. The immediate referent
    is the Jewish onlookers present at the scene, not an abstract ethnic condemnation.
    The main text keeps the source wording for transparency, while an alternative
    is preserved in a footnote because 'the Judeans' is sometimes argued on contextual
    grounds.
  doctrine_reference: Translation philosophy §1, §5
