id: JHN.11.36
reference: John 11:36
source:
  edition: SBLGNT
  text: ἔλεγον οὖν οἱ Ἰουδαῖοι· Ἴδε πῶς ἐφίλει αὐτόν.
translation:
  text: So the Jews were saying, “See how he loved him!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans,” if taken as a more regionally specific reference to the
      Jewish onlookers present there.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect indicative conveys ongoing or repeated speech in the scene;
    'were saying' preserves that aspect better than simple past 'said.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference or narrative continuation from Jesus' weeping in the
    previous verse. 'So' is natural modern English and preserves the connective force
    without sounding overly formal.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish people there
  lexicon: BDAG
  rationale: The Greek expression is the standard Johannine designation. In this immediate
    context it refers to the Jewish mourners/observers present, but the text itself
    says 'the Jews.' Retaining 'the Jews' follows the source wording; alternatives
    can clarify the local/social reference but are more interpretive.
- source_word: Ἴδε
  chosen: See
  alternatives:
  - Look
  lexicon: BDAG
  rationale: An imperative of attention. 'See' fits idiomatic English in quoted speech
    and pairs naturally with the following clause.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - how much
  lexicon: BDAG
  rationale: Introduces the manner or degree of Jesus' affection. 'How' preserves
    the ambiguity of manner/intensity without over-specifying.
- source_word: ἐφίλει
  chosen: loved
  alternatives:
  - was loving
  - was fond of
  - cared for
  lexicon: BDAG
  rationale: φιλέω here denotes personal affection. 'Loved' is the most natural and
    weighty English rendering in context. 'Was fond of' is too weak, while 'cared
    for' is less direct. The imperfect aspect is not naturally carried over in English
    after 'See how...'.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative masculine singular pronoun referring to Lazarus.
