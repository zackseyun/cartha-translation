theological_decisions:
- issue: Rendering of Ἰουδαίων in Johannine context
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: This verse is not polemical but descriptive of mourners visiting Martha
    and Mary. The broader ethnic-religious sense 'Jews' best fits the immediate context,
    while acknowledging the ongoing scholarly debate over whether John sometimes means
    'Judeans.' The alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it where ambiguity
    is genuine.'
