id: JHN.11.19
reference: John 11:19
source:
  edition: SBLGNT
  text: ⸂πολλοὶ δὲ⸃ ἐκ τῶν Ἰουδαίων ἐληλύθεισαν πρὸς ⸀τὴν Μάρθαν καὶ ⸀Μαριὰμ ἵνα παραμυθήσωνται
    αὐτὰς περὶ τοῦ ⸀ἀδελφοῦ.
translation:
  text: Now many of the Jews had come to Martha and Mary to comfort them about their
    brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many from among the Judeans had come to Martha and Mary.' The Greek
      term can denote Jews generally or, in some contexts in John, Judeans more specifically.
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ δὲ
  chosen: Now many
  alternatives:
  - And many
  - But many
  lexicon: BDAG
  rationale: πολλοί means 'many.' δέ is a mild connective that can be rendered variously
    depending on discourse flow; 'Now' gives natural English continuity without overstating
    contrast.
- source_word: ἐκ τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from among the Jews
  - of the Judeans
  lexicon: BDAG
  rationale: 'The phrase is partitive: ''many from among the Jews.'' In John, Ἰουδαῖοι
    can mean Judeans, Jewish leaders, or Jews more broadly depending on context. Here
    it most naturally refers to Jewish people who had come to console the sisters,
    not specifically hostile authorities. ''Of the Jews'' preserves the traditional
    and broad ethnic-religious sense, while ''Judeans'' is preserved as an alternative
    because of Johannine usage debates.'
- source_word: ἐληλύθεισαν
  chosen: had come
  alternatives:
  - had arrived
  lexicon: BDAG
  rationale: 'Pluperfect of ἔρχομαι indicates prior action relative to the narrative
    setting: they had already come.'
- source_word: πρὸς τὴν Μάρθαν καὶ Μαριὰμ
  chosen: to Martha and Mary
  alternatives:
  - to Martha and Mariam
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward/visit to persons.
    Standard English transliterations 'Martha' and 'Mary' are used for readability;
    Μαριάμ can be transliterated more strictly as 'Mariam,' but 'Mary' is standard
    in English Bible usage for this figure.
- source_word: ἵνα παραμυθήσωνται αὐτὰς
  chosen: to comfort them
  alternatives:
  - so that they might console them
  - to console them
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. παραμυθέομαι means to comfort,
    console, encourage in grief. 'To comfort them' is idiomatic and fits the mourning
    context.
- source_word: περὶ τοῦ ἀδελφοῦ
  chosen: about their brother
  alternatives:
  - concerning their brother
  lexicon: BDAG
  rationale: περί with the genitive here means 'about/concerning.' Although the Greek
    has singular 'the brother,' English naturally supplies 'their brother' because
    Martha and Mary are the referents of αὐτάς and the context identifies Lazarus
    as brother to both.
