theological_decisions:
- issue: Rendering πιστεύω/πίστις language in a Johannine salvation-faith context
  chosen_reading: believed in him
  alternative_readings:
  - put their faith in him
  - trusted in him
  rationale: DOCTRINE.md gives 'faith' as the default for πίστις and calls for preserving
    tension only where the construction is genuinely contested. Here the verb πιστεύω
    with εἰς αὐτόν in John is not a major contested construction like pistis Christou;
    'believed in him' best preserves the Greek idiom without importing extra doctrinal
    nuance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις), and Translation
    philosophy #3'
