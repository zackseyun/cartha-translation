id: JHN.11.45
reference: John 11:45
source:
  edition: SBLGNT
  text: Πολλοὶ οὖν ἐκ τῶν Ἰουδαίων, οἱ ἐλθόντες πρὸς τὴν ⸀Μαριὰμ καὶ θεασάμενοι ⸀ἃ
    ⸀ἐποίησεν, ἐπίστευσαν εἰς αὐτόν·
translation:
  text: Therefore many of the Jews who had come to Mary and had seen what he had done
    believed in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the Jews'; in some Johannine contexts, 'Judeans' is also
      argued as a possible rendering of Ἰουδαῖοι.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: A straightforward quantitative adjective. 'Many' is the natural English
    equivalent and preserves the indefinite but substantial number indicated by the
    Greek.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks an inferential or consequential connection to the preceding narrative,
    especially the raising of Lazarus. 'Therefore' preserves that logical link more
    clearly than the looser 'then'.
- source_word: ἐκ τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from among the Jews
  - of the Judeans
  lexicon: BDAG
  rationale: 'The phrase is partitive: ''many out of the Jews.'' ''Of the Jews'' is
    concise and idiomatic in English while preserving the partitive sense. ''Judeans''
    is possible in John in some contexts, but here the reference is to the group identified
    conventionally in the narrative as Ἰουδαῖοι, and ''Jews'' remains the most natural
    rendering.'
- source_word: οἱ ἐλθόντες πρὸς τὴν Μαριὰμ
  chosen: who had come to Mary
  alternatives:
  - who had come to be with Mary
  - who had come to Mary’s place
  lexicon: BDAG
  rationale: The article with participle functions attributively, identifying which
    Jews are in view. The pluperfect-like English 'had come' fits the aorist participle
    in relation to the main verb and reads naturally.
- source_word: θεασάμενοι
  chosen: had seen
  alternatives:
  - having seen
  - observed
  - looked at
  lexicon: BDAG
  rationale: θεάομαι often carries the sense of seeing attentively or beholding. In
    this narrative context, 'had seen' is idiomatic and sufficient, while the fuller
    nuance of observation is not lost.
- source_word: ἃ ἐποίησεν
  chosen: what he had done
  alternatives:
  - the things that he did
  lexicon: BDAG
  rationale: The neuter plural relative pronoun with ποιέω is naturally rendered idiomatically
    as 'what he had done.' This avoids wooden English while preserving the reference
    to Jesus' action.
- source_word: ἐπίστευσαν εἰς αὐτόν
  chosen: believed in him
  alternatives:
  - put their faith in him
  - believed into him
  lexicon: BDAG
  rationale: In Johannine usage, πιστεύω εἰς commonly expresses personal trust directed
    toward Jesus. 'Believed in him' is the standard, clear English rendering. 'Put
    their faith in him' is interpretive and more expansive; 'believed into him' is
    overly literal and unnatural.
