id: JHN.11.41
reference: John 11:41
source:
  edition: SBLGNT
  text: ἦραν οὖν τὸν ⸀λίθον. ὁ δὲ Ἰησοῦς ἦρεν τοὺς ὀφθαλμοὺς ἄνω καὶ εἶπεν· Πάτερ,
    εὐχαριστῶ σοι ὅτι ἤκουσάς μου,
translation:
  text: So they took away the stone. And Jesus lifted his eyes upward and said, “Father,
    I thank you that you have heard me,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “raised his eyes” or more idiomatically “looked up.”
    reason: lexical_alternative
  - marker: b
    text: Or “that you heard me.” The Greek aorist can be rendered more literally
      this way; “have heard me” reflects the completed action with present relevance
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  chosen: took away
  alternatives:
  - removed
  - lifted
  lexicon: BDAG
  rationale: From αἴρω, here in the context of moving the stone from the tomb entrance.
    'Took away' is idiomatic and fits the object 'the stone' better than the more
    literal 'lifted,' which could mislead in English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from the preceding command. 'So' is natural
    modern English and preserves the inferential flow without sounding overly formal.
- source_word: λίθον
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: Standard rendering for λίθος in this burial context; 'stone' is the natural
    term for the tomb-covering object.
- source_word: ἦρεν τοὺς ὀφθαλμοὺς ἄνω
  chosen: lifted his eyes upward
  alternatives:
  - raised his eyes
  - looked up
  lexicon: BDAG
  rationale: This is a conventional expression for directing one's gaze heavenward
    in prayer. 'Lifted his eyes upward' preserves the imagery of the Greek more fully
    than the smoother but less explicit 'looked up.'
- source_word: δὲ
  chosen: And
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild narrative transition rather than a strong
    contrast. 'And' is the most natural English connective in context.
- source_word: Πάτερ
  chosen: Father
  alternatives:
  - O Father
  lexicon: BDAG
  rationale: Vocative address in prayer. 'Father' is direct and natural contemporary
    English without adding archaic vocative coloring.
- source_word: εὐχαριστῶ σοι
  chosen: I thank you
  alternatives:
  - I give thanks to you
  lexicon: BDAG
  rationale: Straightforward present-tense expression of thanksgiving. 'I thank you'
    is concise, natural, and semantically complete.
- source_word: ὅτι ἤκουσάς μου
  chosen: that you have heard me
  alternatives:
  - that you heard me
  - that you listened to me
  lexicon: BDAG
  rationale: Although ἤκουσάς is aorist, English present perfect naturally conveys
    a completed action with present relevance in prayer discourse. 'Heard me' is preferable
    to 'listened to me' because in this context it implies favorable hearing of prayer.
