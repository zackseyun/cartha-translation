theological_decisions:
- issue: Rendering Jesus' address to God in prayer
  chosen_reading: Father
  alternative_readings:
  - O Father
  rationale: The verse presents Jesus praying to the Father without requiring expansion
    or liturgical stylization. The simple vocative preserves both the intimacy and
    reverence of the Greek while avoiding archaic English.
  doctrine_reference: Affirmations; Translation philosophy 6
- issue: Implication of ἤκουσάς μου in prayer context
  chosen_reading: you have heard me
  alternative_readings:
  - you heard me
  rationale: The wording preserves the text's claim that the Father has heard Jesus'
    prayer, without importing a broader doctrinal explanation about intra-Trinitarian
    relations or guaranteed answers to prayer beyond what the verse states.
  doctrine_reference: Translation philosophy 1, 3
