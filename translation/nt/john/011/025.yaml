id: JHN.11.25
reference: John 11:25
source:
  edition: SBLGNT
  text: εἶπεν αὐτῇ ὁ Ἰησοῦς· Ἐγώ εἰμι ἡ ἀνάστασις καὶ ἡ ζωή· ὁ πιστεύων εἰς ἐμὲ κἂν
    ἀποθάνῃ ζήσεται,
translation:
  text: Jesus said to her, “I am the resurrection and the life. The one who believes
    in me, even if he dies, will live,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Whoever believes in me, even if they die, will live.” The Greek is singular
      masculine (“the one who believes … even if he dies”) used representatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in straightforward narrative
    speech introduction.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative feminine singular pronoun indicates the indirect object, referring
    to Martha in context.
- source_word: Ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: The emphatic pronoun plus copula is preserved directly. In John this
    wording can carry revelatory weight, so the simple, formal rendering should be
    retained.
- source_word: ἡ ἀνάστασις
  chosen: the resurrection
  alternatives:
  - the raising up
  lexicon: BDAG
  rationale: 'ἀνάστασις in this context refers to resurrection from the dead, not
    merely rising in a general sense. The article is retained: Jesus identifies himself
    not merely as one who causes resurrection but as ''the resurrection.'''
- source_word: ἡ ζωή
  chosen: the life
  alternatives:
  - life
  lexicon: BDAG
  rationale: The article is represented because the Greek presents a definite, emphatic
    identification parallel to 'the resurrection.' 'The life' preserves the Johannine
    theological force better than an anarthrous English paraphrase.
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - whoever believes
  - the believer
  lexicon: BDAG
  rationale: The substantival present participle denotes a general class characterized
    by believing. 'The one who believes' preserves the singular and ongoing verbal
    aspect better than 'the believer,' while remaining natural English.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: Although πιστεύω + εἰς is literally 'believe into,' idiomatic English
    is 'believe in.' This preserves the relational trust sense without awkwardness.
- source_word: κἂν
  chosen: even if
  alternatives:
  - though
  lexicon: BDAG
  rationale: κἄν introduces a concessive condition here. 'Even if' clearly conveys
    the force with the following subjunctive.
- source_word: ἀποθάνῃ
  chosen: he dies
  alternatives:
  - he should die
  - he may die
  lexicon: BDAG
  rationale: 'Aorist subjunctive after κἄν is best rendered in idiomatic English as
    a simple conditional event: ''even if he dies.'''
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - will come to life
  - will live again
  lexicon: BDAG
  rationale: Future middle of ζάω here promises life beyond death. 'Will live' is
    broad enough to preserve both resurrection and enduring life without over-specifying
    'again,' which the Greek does not explicitly state.
