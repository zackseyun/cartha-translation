theological_decisions:
- issue: Representative masculine in ὁ πιστεύων with following singular verbs
  chosen_reading: The one who believes in me, even if he dies, will live
  alternative_readings:
  - Whoever believes in me, even if they die, will live
  rationale: Per the translation philosophy's gender-accurate principle, the singular
    masculine form is retained in a representative sense rather than neutralized to
    plural or singular 'they.' A footnote preserves the inclusive sense for English
    readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Scope of Jesus' self-identification in Ἐγώ εἰμι ἡ ἀνάστασις καὶ ἡ ζωή
  chosen_reading: I am the resurrection and the life
  rationale: The translation preserves the direct predicative claim without paraphrasing
    it into a merely functional statement such as 'I give resurrection and life.'
    This maintains the Christological force of the Greek while not expanding beyond
    the text.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §3
