theological_decisions:
- issue: Rendering κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this narrative address to Jesus, 'Lord' preserves the term's normal Johannine
    force while not requiring a stronger doctrinal claim than the text itself makes.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Potential semantic distinction between φιλέω and ἀγαπάω
  chosen_reading: love
  alternative_readings:
  - care for
  - be fond of
  rationale: The verse uses φιλέω, which can suggest affection or friendship, but
    the translation should not impose a rigid theological distinction from ἀγαπάω
    unless context demands it. 'Love' preserves the text's emotional force without
    overinterpreting Johannine word choice.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather
    than resolve it
