id: JHN.11.3
reference: John 11:3
source:
  edition: SBLGNT
  text: ἀπέστειλαν οὖν αἱ ἀδελφαὶ πρὸς αὐτὸν λέγουσαι· Κύριε, ἴδε ὃν φιλεῖς ἀσθενεῖ.
translation:
  text: So the sisters sent word to him, saying, “Lord, look, the one you love is
    sick.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “See” or “Behold.”
    reason: lexical_alternative
  - marker: b
    text: The Greek verb here is φιλέω, often associated with affection or friendship;
      alternatively, “the one you are fond of.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλαν
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: BDAG
  rationale: The verb means 'sent,' but in this context with πρὸς αὐτὸν and the following
    quoted message, idiomatic English is 'sent word to him,' making explicit that
    a message was sent rather than implying the sisters themselves traveled.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: ἀδελφαὶ
  chosen: the sisters
  alternatives:
  - his sisters
  - the sisters (Mary and Martha)
  lexicon: BDAG
  rationale: The plural noun with article refers to Mary and Martha in context. 'The
    sisters' is sufficiently explicit and avoids adding 'his' where the Greek does
    not state it directly.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from context. 'To him' follows the Greek
    directly; naming Jesus here would be interpretive expansion.
- source_word: λέγουσαι
  chosen: saying
  alternatives:
  - with the message
  - and said
  lexicon: BDAG
  rationale: The present participle introduces the content of the message. 'Saying'
    is a straightforward English participial equivalent.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: In Johannine context addressed to Jesus, κύριος is best rendered 'Lord.'
    This matches the project's default rendering for κύριος and preserves both respect
    and possible christological weight without overstating the term.
- source_word: ἴδε
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἴδε is an attention-getting imperative. 'Look' is natural contemporary
    English; 'behold' is archaic, and 'see' is possible but less idiomatic in direct
    address here.
- source_word: ὃν φιλεῖς
  chosen: the one you love
  alternatives:
  - he whom you love
  - your dear friend
  lexicon: BDAG
  rationale: This relative clause is naturally rendered in contemporary English as
    'the one you love.' φιλέω here denotes personal affection/love; 'your dear friend'
    interprets beyond the lexical content.
- source_word: φιλεῖς
  chosen: love
  alternatives:
  - care for
  - are fond of
  lexicon: BDAG
  rationale: φιλέω can denote affection, friendship, or love. 'Love' is the clearest
    and most direct rendering in this context, while preserving the distinction that
    John uses φιλέω here rather than ἀγαπάω without forcing an exaggerated semantic
    contrast.
- source_word: ἀσθενεῖ
  chosen: is sick
  alternatives:
  - is ill
  - is weak
  lexicon: BDAG
  rationale: In context of Lazarus's condition, ἀσθενέω refers to illness. 'Is sick'
    is the most natural modern rendering; 'is weak' would be too vague.
