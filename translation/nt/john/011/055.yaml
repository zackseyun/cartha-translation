theological_decisions:
- issue: Nature of purification before Passover
  chosen_reading: Render ἁγνίσωσιν ἑαυτούς as 'to purify themselves' without specifying
    a later doctrinal or moral category.
  alternative_readings:
  - to cleanse themselves ceremonially
  - to consecrate themselves
  rationale: In context the reference is to Jewish ritual preparation for Passover
    pilgrimage, not to Christian sacramental or inward moral purification as such.
    The translation should preserve the historical-Jewish setting without importing
    later theological categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
