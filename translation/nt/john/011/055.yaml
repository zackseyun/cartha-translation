id: JHN.11.55
reference: John 11:55
source:
  edition: SBLGNT
  text: Ἦν δὲ ἐγγὺς τὸ πάσχα τῶν Ἰουδαίων, καὶ ἀνέβησαν πολλοὶ εἰς Ἱεροσόλυμα ἐκ τῆς
    χώρας πρὸ τοῦ πάσχα ἵνα ἁγνίσωσιν ἑαυτούς.
translation:
  text: Now the Passover of the Jews was near, and many went up to Jerusalem from
    the countryside before the Passover to purify themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jewish Passover.' The Greek more literally reads 'the Passover of
      the Jews,' a recurring expression in John.
    reason: lexical_alternative
  - marker: b
    text: That is, to undergo ritual purification in preparation for the Passover.
    reason: cultural_note
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - Now ... was
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Now' gives natural English discourse flow without
    overstating contrast.
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - at hand
  - close
  lexicon: BDAG
  rationale: Standard temporal sense here; 'near' is clear modern English and fits
    the narrative setting.
- source_word: τὸ πάσχα τῶν Ἰουδαίων
  chosen: the Passover of the Jews
  alternatives:
  - the Jewish Passover
  lexicon: BDAG
  rationale: A more formally transparent rendering preserves John's repeated expression
    and avoids smoothing away the genitive construction. 'Passover' is the established
    rendering of πάσχα.
- source_word: ἀνέβησαν
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: BDAG
  rationale: The verb commonly reflects travel up to Jerusalem, both geographically
    and conventionally for pilgrimage. 'Went up' preserves this nuance better than
    simply 'went'.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally; 'many' is sufficient and natural
    in English.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: With a city name, English idiom prefers 'to Jerusalem'; this preserves
    the directional force of εἰς.
- source_word: ἐκ τῆς χώρας
  chosen: from the countryside
  alternatives:
  - from the country
  - from the region
  - from the rural districts
  lexicon: BDAG
  rationale: χώρα here refers to the surrounding country/rural area as distinct from
    the city. 'Countryside' is natural modern English and captures the contrast.
- source_word: πρὸ τοῦ πάσχα
  chosen: before the Passover
  alternatives:
  - prior to the Passover
  lexicon: BDAG
  rationale: A straightforward temporal phrase; 'before' is the clearest idiomatic
    rendering.
- source_word: ἵνα ἁγνίσωσιν ἑαυτούς
  chosen: to purify themselves
  alternatives:
  - so that they might purify themselves
  - to cleanse themselves ceremonially
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'To purify themselves' is
    concise and preserves the ritual sense of ἁγνίζω without overexplaining in the
    main text.
