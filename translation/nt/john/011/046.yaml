theological_decisions:
- issue: Narrative portrayal of the report to the Pharisees
  chosen_reading: Neutral reporting language without importing motive
  alternative_readings:
  - reported on Jesus
  - informed against Jesus
  - betrayed Jesus
  rationale: The Greek states only that some went to the Pharisees and told them what
    Jesus had done. It does not explicitly state hostile intent in this verse, even
    if the broader context may imply it. The translation therefore preserves the narrative
    fact without adding accusatory interpretation.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; never import doctrinal claims the text does not make.'
