id: JHN.11.46
reference: John 11:46
source:
  edition: SBLGNT
  text: τινὲς δὲ ἐξ αὐτῶν ἀπῆλθον πρὸς τοὺς Φαρισαίους καὶ εἶπαν αὐτοῖς ἃ ⸀ἐποίησεν
    Ἰησοῦς.
translation:
  text: But some of them went away to the Pharisees and told them what Jesus had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported to them what Jesus did.' The Greek does not explicitly state
      the motive of those who went to the Pharisees.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to a subset of the larger group from the
    previous context. 'Some' is the most natural modern English equivalent.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the preceding response of others who believed. 'But'
    best preserves the adversative force in context.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: Expresses that these individuals came out from the larger group just
    mentioned. 'Of them' is concise and idiomatic; the sense of subset is retained.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι, indicating departure from the scene. 'Went away'
    preserves the sense of leaving more clearly than simple 'went,' while remaining
    natural English.
- source_word: πρὸς τοὺς Φαρισαίους
  chosen: to the Pharisees
  alternatives:
  - to the Pharisee party
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward persons. 'The Pharisees'
    is the standard and accurate rendering of the group name Φαρισαῖοι.
- source_word: εἶπαν αὐτοῖς
  chosen: told them
  alternatives:
  - said to them
  - reported to them
  lexicon: BDAG
  rationale: λέγω plus indirect object can be rendered woodenly as 'said to them,'
    but in English 'told them' better conveys the reporting action in this narrative
    context without adding content.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - that which
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring to the deeds Jesus performed.
    English idiom naturally compresses this to 'what'.
- source_word: ἐποίησεν
  chosen: had done
  alternatives:
  - did
  lexicon: BDAG
  rationale: Aorist verb referring to Jesus' completed action prior to their report.
    English past perfect ('had done') clarifies the sequence of events relative to
    'told'.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς, in keeping
    with the translation philosophy of transliterating names.
