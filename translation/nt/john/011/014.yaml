theological_decisions:
- issue: Nature of Jesus' statement about Lazarus' condition
  chosen_reading: A direct statement of Lazarus' physical death, clarifying the earlier
    metaphor of sleep.
  rationale: The verse itself resolves the prior figurative language by using ἀπέθανεν
    explicitly. The translation should therefore be unambiguous and not preserve the
    metaphor in the main text here.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    source itself resolves the ambiguity.
