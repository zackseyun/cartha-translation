id: JHN.11.14
reference: John 11:14
source:
  edition: SBLGNT
  text: τότε οὖν εἶπεν αὐτοῖς ὁ Ἰησοῦς παρρησίᾳ· Λάζαρος ἀπέθανεν,
translation:
  text: So then Jesus told them plainly, “Lazarus has died.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Then Jesus said to them openly, ‘Lazarus died.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: So then
  alternatives:
  - Then
  lexicon: BDAG
  rationale: τότε marks temporal/sequential progression. In combination with οὖν,
    an English connective that reflects both sequence and inference is appropriate.
- source_word: οὖν
  chosen: So then
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν adds inferential or transitional force. Rendering τότε οὖν together
    as 'So then' avoids wooden duplication while preserving the discourse movement.
- source_word: εἶπεν αὐτοῖς
  chosen: told them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: λέγω with an indirect object can be rendered either 'said to' or 'told.'
    'Told them' is natural modern English and preserves the communicative act without
    adding content.
- source_word: παρρησίᾳ
  chosen: plainly
  alternatives:
  - openly
  - frankly
  - clearly
  lexicon: BDAG
  rationale: παρρησίᾳ here contrasts with earlier indirect speech about sleep and
    indicates speaking openly and unambiguously. 'Plainly' best fits the immediate
    context of clarification.
- source_word: Λάζαρος
  chosen: Lazarus
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: ἀπέθανεν
  chosen: has died
  alternatives:
  - died
  - is dead
  lexicon: BDAG
  rationale: The aorist states the event of death. English present perfect 'has died'
    communicates the completed event with present relevance in idiomatic English;
    'died' would also be possible, but 'has died' fits the scene's immediacy.
