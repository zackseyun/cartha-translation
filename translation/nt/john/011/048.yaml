theological_decisions:
- issue: Referent of 'our place' (τόπον)
  chosen_reading: Kept as 'place' without specifying 'temple' in the main text
  alternative_readings:
  - temple
  - position/status
  rationale: The speakers likely fear Roman action against the temple and/or their
    institutional standing, but the Greek term itself is broader. To preserve the
    text's ambiguity rather than resolve it interpretively, the main text retains
    'place,' with the more specific possibility noted in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
