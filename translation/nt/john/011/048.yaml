id: JHN.11.48
reference: John 11:48
source:
  edition: SBLGNT
  text: ἐὰν ἀφῶμεν αὐτὸν οὕτως, πάντες πιστεύσουσιν εἰς αὐτόν, καὶ ἐλεύσονται οἱ Ῥωμαῖοι
    καὶ ἀροῦσιν ἡμῶν καὶ τὸν τόπον καὶ τὸ ἔθνος.
translation:
  text: If we let him go on like this, everyone will believe in him, and the Romans
    will come and take away both our place and our nation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our temple'; the Greek says 'our place,' which may refer specifically
      to the temple or more broadly to their place or standing.
    reason: alternative_reading
  - marker: b
    text: Or 'our people' for 'our nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφῶμεν
  chosen: let him go on
  alternatives:
  - leave him alone
  - let him continue
  lexicon: BDAG
  rationale: 'From ἀφίημι, here in a permissive sense: ''allow'' or ''let.'' ''Go
    on'' brings out the ongoing situation implied by οὕτως in natural English without
    adding content beyond the context.'
- source_word: οὕτως
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Idiomatic English equivalent of οὕτως in this context. 'Like this' is
    more natural than 'thus' while preserving the demonstrative force.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: Although formally masculine plural, the sense is inclusive and general.
    'Everyone' communicates the intended breadth in natural English.
- source_word: πιστεύσουσιν εἰς αὐτόν
  chosen: will believe in him
  alternatives:
  - will put faith in him
  - will trust in him
  lexicon: BDAG
  rationale: Standard Johannine construction πιστεύω εἰς + accusative commonly means
    'believe in.' This is not one of the contested πίστις noun cases; 'believe in
    him' best reflects the verbal construction and established Johannine usage.
- source_word: ἐλεύσονται οἱ Ῥωμαῖοι
  chosen: the Romans will come
  alternatives:
  - the Romans will arrive
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι with explicit subject Ῥωμαῖοι. 'Will come' is
    the straightforward rendering.
- source_word: ἀροῦσιν
  chosen: take away
  alternatives:
  - remove
  - destroy
  lexicon: BDAG
  rationale: From αἴρω, here meaning to take away/remove. 'Destroy' is interpretive
    and stronger than the lexical core, though it may be implied by context; therefore
    'take away' is preferred in the main text.
- source_word: τόπον
  chosen: place
  alternatives:
  - temple
  - position
  lexicon: BDAG
  rationale: τόπος literally means 'place.' In context it may refer specifically to
    the temple precincts or more broadly to their place/standing, but the Greek leaves
    it somewhat open. 'Place' preserves that ambiguity best.
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  lexicon: BDAG
  rationale: ἔθνος can mean nation or people-group. 'Nation' fits the political fear
    expressed here and pairs naturally with 'place.' The alternative 'people' is worth
    preserving in a footnote because the referent is the Jewish people.
- source_word: ἡμῶν ... καὶ τὸν τόπον καὶ τὸ ἔθνος
  chosen: both our place and our nation
  alternatives:
  - our place and nation
  - both the place and the nation from us
  lexicon: BDAG
  rationale: The genitive ἡμῶν governs both objects after ἀροῦσιν. Adding 'both' reflects
    the correlative force of repeated καί in idiomatic English and clarifies that
    both objects belong with 'our'.
