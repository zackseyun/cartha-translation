id: JHN.11.33
reference: John 11:33
source:
  edition: SBLGNT
  text: Ἰησοῦς οὖν ὡς εἶδεν αὐτὴν κλαίουσαν καὶ τοὺς συνελθόντας αὐτῇ Ἰουδαίους κλαίοντας
    ἐνεβριμήσατο τῷ πνεύματι καὶ ἐτάραξεν ἑαυτόν,
translation:
  text: Therefore, when Jesus saw her weeping, and the Jews who had come with her
    weeping, he was deeply moved in his spirit and troubled himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' Here the term refers to the Jewish mourners who had come
      with Mary, not to the Jewish people as a whole.
    reason: lexical_alternative
  - marker: b
    text: The verb can also carry the sense 'was indignant' or 'was deeply stirred,'
      expressing strong inner agitation.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the preceding scene. 'Therefore'
    preserves the connective force more clearly than a bare 'then,' while remaining
    natural English.
- source_word: ὡς εἶδεν
  chosen: when ... saw
  alternatives:
  - as ... saw
  - when ... noticed
  lexicon: BDAG
  rationale: Here ὡς with the aorist functions temporally. 'When ... saw' is idiomatic
    and preserves the sequence without overinterpreting.
- source_word: κλαίουσαν / κλαίοντας
  chosen: weeping
  alternatives:
  - crying
  - wailing
  lexicon: BDAG
  rationale: κλαίω denotes audible weeping/crying. 'Weeping' fits the solemn tone
    and works for both Mary and the accompanying Jews without overstating to ritualized
    'wailing,' though that nuance may be present contextually.
- source_word: συνελθόντας αὐτῇ
  chosen: who had come with her
  alternatives:
  - who had accompanied her
  - who had gathered around her
  lexicon: BDAG
  rationale: The participle from συνέρχομαι here refers to those who came together
    with Mary. 'Who had come with her' is clear and natural in context.
- source_word: Ἰουδαίους
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish people there
  lexicon: BDAG
  rationale: In John, Ἰουδαῖοι can mean Judeans, Jewish leaders, or Jews more broadly
    depending on context. Here it refers to the Jewish mourners present with Mary,
    not to all Jewish people universally. 'The Jews' is retained as the direct lexical
    rendering, with a footnote to prevent misunderstanding.
- source_word: ἐνεβριμήσατο
  chosen: was deeply moved
  alternatives:
  - was indignant
  - was deeply stirred
  - was angered
  lexicon: BDAG
  rationale: ἐμβριμάομαι can convey strong emotional agitation, including sternness
    or indignation. In this context the exact object of Jesus' emotion is debated.
    'Was deeply moved' preserves the intensity without forcing a specific interpretation
    such as anger; the stronger alternatives are preserved in a footnote.
- source_word: τῷ πνεύματι
  chosen: in his spirit
  alternatives:
  - in spirit
  - in his inner being
  lexicon: BDAG
  rationale: The dative likely indicates the sphere in which the emotional disturbance
    occurred. 'In his spirit' is both literal and natural, and it preserves the personal
    reference signaled by context.
- source_word: ἐτάραξεν ἑαυτόν
  chosen: troubled himself
  alternatives:
  - became troubled
  - disturbed himself
  lexicon: BDAG
  rationale: The reflexive expression is explicit in Greek and should be represented.
    'Troubled himself' preserves the wording, even if slightly marked in English,
    and avoids flattening the reflexive into a mere passive emotional state.
