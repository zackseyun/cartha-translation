theological_decisions:
- issue: Emotional description of Jesus in ἐνεβριμήσατο
  chosen_reading: Render the verb in a way that preserves strong emotion without specifying
    whether the emotion is grief, indignation, or anger.
  alternative_readings:
  - he was indignant
  - he was angered
  - he was deeply stirred
  rationale: The verse presents Jesus as profoundly affected, but interpreters differ
    on whether the verb points primarily to indignation, stern agitation, or deep
    emotional movement. To preserve theological and interpretive tension rather than
    resolve it beyond the Greek, the main text uses 'was deeply moved' and preserves
    sharper alternatives in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
