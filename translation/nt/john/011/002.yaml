id: JHN.11.2
reference: John 11:2
source:
  edition: SBLGNT
  text: ἦν δὲ ⸀Μαριὰμ ἡ ἀλείψασα τὸν κύριον μύρῳ καὶ ἐκμάξασα τοὺς πόδας αὐτοῦ ταῖς
    θριξὶν αὐτῆς, ἧς ὁ ἀδελφὸς Λάζαρος ἠσθένει.
translation:
  text: Now it was Mary who had anointed the Lord with perfume and wiped his feet
    with her hair, whose brother Lazarus was sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with ointment' or 'with fragrant oil'; the Greek term refers to perfumed
      oil/ointment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now it was
  alternatives:
  - Now there was
  - And it was
  lexicon: BDAG
  rationale: Uses a natural English discourse transition for δέ and preserves the
    identificational force of ἦν with the predicate construction introducing Mary.
- source_word: Μαριὰμ
  chosen: Mary
  rationale: Personal name is transliterated by standard English convention, per translation
    philosophy.
- source_word: ἡ ἀλείψασα
  chosen: who had anointed
  alternatives:
  - the one who anointed
  - who anointed
  lexicon: BDAG
  rationale: The article plus aorist participle identifies Mary descriptively. English
    relative clause is the most natural equivalent. Pluperfect-like 'had anointed'
    fits the narrative reference to an event identified from the reader's perspective
    as prior to the main clause's situation.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; default rendering
    is 'Lord.' In John's narrative this is an honorific title for Jesus and should
    be translated, not transliterated.
- source_word: μύρῳ
  chosen: with perfume
  alternatives:
  - with ointment
  - with fragrant oil
  lexicon: BDAG
  rationale: μύρον denotes perfumed ointment/oil. 'Perfume' is clear modern English
    and fits the anointing context without archaic tone.
- source_word: καὶ ἐκμάξασα
  chosen: and wiped
  alternatives:
  - and dried off
  lexicon: BDAG
  rationale: ἐκμάσσω means to wipe off/wipe dry. 'Wiped' is the straightforward rendering
    here.
- source_word: τοὺς πόδας αὐτοῦ
  chosen: his feet
  lexicon: BDAG
  rationale: Direct object plus possessive is rendered idiomatically in English.
- source_word: ταῖς θριξὶν αὐτῆς
  chosen: with her hair
  alternatives:
  - with the hair of her head
  lexicon: BDAG
  rationale: θρίξ means hair. The dative is instrumental, naturally rendered with
    'with.'
- source_word: ἧς ὁ ἀδελφὸς Λάζαρος
  chosen: whose brother Lazarus
  alternatives:
  - the one whose brother was Lazarus
  lexicon: BDAG
  rationale: The genitive relative pronoun links Mary to Lazarus. English possessive
    relative clause is the clearest equivalent.
- source_word: ἠσθένει
  chosen: was sick
  alternatives:
  - was ill
  - was weak
  lexicon: BDAG
  rationale: ἀσθενέω in this context refers to physical illness. 'Was sick' is natural
    and precise in context.
