id: JHN.11.22
reference: John 11:22
source:
  edition: SBLGNT
  text: ⸀καὶ νῦν οἶδα ὅτι ὅσα ἂν αἰτήσῃ τὸν θεὸν δώσει σοι ὁ θεός.
translation:
  text: But even now I know that whatever you ask from God, God will give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And now I know.' The Greek conjunction can be rendered simply 'and,'
      but in context it also carries a contrastive turn after Martha's statement about
      Lazarus's death.
    reason: lexical_alternative
  - marker: b
    text: Greek, 'whatever you ask God.' English often expresses this idiom as 'ask
      from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  chosen: But even now
  alternatives:
  - And now
  - Even now
  lexicon: BDAG
  rationale: καί with νῦν here is discourse-connective and adversative/concessive
    in context after Martha's statement about Lazarus's death; 'But even now' captures
    the turn from loss to continuing confidence better than a bare 'And now,' while
    preserving the temporal force of νῦν.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I have known
  - I am sure
  lexicon: BDAG
  rationale: οἶδα is the standard perfect-form with present sense, best rendered simply
    as 'I know.' 'Am sure' is interpretive and weaker in lexical transparency.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content clause straightforwardly; English idiom retains
    'that' naturally here.
- source_word: ὅσα ἂν
  chosen: whatever
  alternatives:
  - whatever things
  - all that
  lexicon: BDAG
  rationale: 'The relative pronoun with ἄν expresses indefiniteness/generality: ''whatever''
    is idiomatic English and preserves the open-ended scope.'
- source_word: αἰτήσῃ
  chosen: you ask
  alternatives:
  - you might ask
  - you request
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ἄν in an indefinite relative clause is best
    rendered with simple present in English: ''whatever you ask.'' ''Request'' is
    possible but less natural in this prayer context.'
- source_word: τὸν θεὸν
  chosen: from God
  alternatives:
  - God
  - of God
  lexicon: BDAG
  rationale: Although θεόν is the direct object of αἰτέω in Greek, idiomatic English
    with 'ask' in this sense normally uses 'ask from God' or 'ask God for.' 'From
    God' preserves the sense without adding an unexpressed object.
- source_word: δώσει σοι ὁ θεός
  chosen: God will give you
  alternatives:
  - God will grant you
  - God will give to you
  lexicon: BDAG
  rationale: Future active with explicit subject ὁ θεός is naturally 'God will give
    you.' 'Grant' is possible in prayer contexts, but 'give' is more direct and closer
    to δίδωμι.
- source_word: θεός / ὁ θεός
  chosen: God ... God
  alternatives:
  - the Father ... God
  lexicon: BDAG
  rationale: Both occurrences are θεός, with the second marked as subject by the article.
    English normally omits the article before 'God.' No expansion to 'the Father'
    is warranted by the text.
