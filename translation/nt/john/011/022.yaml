theological_decisions:
- issue: Martha's statement about Jesus asking God and God giving to him could be
    over-read as a denial of Jesus' divinity.
  chosen_reading: 'Retain the plain wording of Martha''s confession without doctrinal
    expansion: ''whatever you ask from God, God will give you.'''
  alternative_readings:
  - Paraphrasing to avoid apparent subordination
  - Expanding 'God' to 'the Father'
  rationale: The verse reports Martha's speech and should be translated as stated,
    preserving Johannine narrative tension. Historic orthodoxy affirmed in DOCTRINE.md
    does not permit importing anti-Trinitarian implications, but neither does it permit
    smoothing away language of the Son's relation to the Father when the text presents
    it.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
