theological_decisions:
- issue: Emotional force of ἐμβριμώμενος in relation to Jesus
  chosen_reading: Jesus is portrayed as intensely emotionally stirred, rendered without
    narrowing the emotion to either sorrow alone or indignation alone in the main
    text.
  alternative_readings:
  - Jesus was indignant within himself
  - Jesus was deeply troubled within himself
  rationale: The verse presents a strong emotional response from Jesus, but the precise
    nuance of ἐμβριμάομαι here is debated. To preserve theological and interpretive
    tension rather than resolve it too sharply, the main text uses 'deeply moved within
    himself' and preserves stronger alternatives in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
