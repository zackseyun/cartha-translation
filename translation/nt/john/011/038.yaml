id: JHN.11.38
reference: John 11:38
source:
  edition: SBLGNT
  text: Ἰησοῦς οὖν πάλιν ἐμβριμώμενος ἐν ἑαυτῷ ἔρχεται εἰς τὸ μνημεῖον· ἦν δὲ σπήλαιον,
    καὶ λίθος ἐπέκειτο ἐπ’ αὐτῷ.
translation:
  text: Jesus, then, again deeply moved within himself, came to the tomb. Now it was
    a cave, and a stone was lying against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'indignant within himself' or 'greatly disturbed within himself'; the
      Greek verb is unusually strong and may suggest more than sorrow alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the preceding scene. 'Then'
    is natural English and preserves the connective force without sounding overly
    formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: Signals repetition of Jesus' emotional response from the earlier context.
    'Again' is the most direct and idiomatic rendering.
- source_word: ἐμβριμώμενος ἐν ἑαυτῷ
  chosen: deeply moved within himself
  alternatives:
  - greatly disturbed within himself
  - indignant within himself
  - snorting with emotion within himself
  lexicon: BDAG
  rationale: The participle ἐμβριμώμενος is strong and can denote deep emotional agitation,
    even indignation. In this context, a rendering should preserve intensity without
    over-specifying the exact emotional valence beyond what the immediate verse makes
    explicit. 'Deeply moved within himself' is readable and faithful, while the stronger
    possibilities are preserved in a footnote because the term is interpretively contested
    in Johannine usage.
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  - was coming
  lexicon: BDAG
  rationale: Although formally present tense (historical present), English narrative
    style commonly renders it as simple past. 'Came' communicates the event naturally
    in modern English.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - burial place
  lexicon: BDAG
  rationale: Refers to a burial tomb rather than merely a grave. 'Tomb' fits the following
    description of a cave with a stone.
- source_word: σπήλαιον
  chosen: cave
  alternatives:
  - cavern
  lexicon: BDAG
  rationale: The noun straightforwardly denotes a cave. 'Cave' is the plain modern
    equivalent.
- source_word: λίθος
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: Standard rendering for λίθος; in tomb contexts it refers to the stone
    used to close the entrance.
- source_word: ἐπέκειτο ἐπ’ αὐτῷ
  chosen: was lying against it
  alternatives:
  - lay upon it
  - was placed over it
  - was set against it
  lexicon: BDAG
  rationale: The imperfect middle/passive of ἐπίκειμαι describes the stone as positioned
    upon/against the tomb entrance. Since the tomb is identified as a cave, 'against
    it' best conveys the practical sense in English of a blocking stone at the entrance,
    without implying a flat horizontal placement.
