id: JHN.11.20
reference: John 11:20
source:
  edition: SBLGNT
  text: ἡ οὖν Μάρθα ὡς ἤκουσεν ὅτι Ἰησοῦς ἔρχεται ὑπήντησεν αὐτῷ· ⸀Μαρία δὲ ἐν τῷ
    οἴκῳ ἐκαθέζετο.
translation:
  text: So when Martha heard that Jesus was coming, she went to meet him; but Mary
    was sitting in the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus is coming.' The Greek uses a present tense verb in the reported
      clause, which can be rendered more formally as a vivid present.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the previous context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὡς
  chosen: when
  alternatives:
  - as soon as
  - as
  lexicon: BDAG
  rationale: Here ὡς introduces a temporal clause. 'When' is the clearest idiomatic
    rendering; 'as soon as' would overstate immediacy beyond what the conjunction
    itself requires.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - learned
  lexicon: BDAG
  rationale: The aorist of ἀκούω straightforwardly means 'heard.' 'Learned' is possible
    in context but is less direct than the Greek.
- source_word: ἔρχεται
  chosen: was coming
  alternatives:
  - is coming
  - was on his way
  lexicon: BDAG
  rationale: The present tense in reported speech has an in-progress sense in context.
    'Was coming' fits natural English narrative style while preserving the sense that
    Jesus was approaching. 'Is coming' is more formally close but less idiomatic in
    English past narration.
- source_word: ὑπήντησεν
  chosen: went to meet
  alternatives:
  - met
  - went out to meet
  lexicon: BDAG
  rationale: ὑπαντάω commonly means to go to meet someone. 'Went to meet' preserves
    the directional nuance better than the flatter 'met.' 'Went out to meet' is possible,
    but 'out' is not explicit in the Greek and need not be supplied.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here sets Mary in contrast with Martha's action. 'But' best conveys
    the mild adversative force in English.
- source_word: ἐν τῷ οἴκῳ
  chosen: in the house
  alternatives:
  - at home
  - in the home
  lexicon: BDAG
  rationale: A direct and natural rendering of the prepositional phrase. 'At home'
    is idiomatic but less formally tied to the concrete noun οἶκος.
- source_word: ἐκαθέζετο
  chosen: was sitting
  alternatives:
  - remained seated
  - stayed seated
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing state/action in past time. 'Was
    sitting' preserves the progressive aspect without adding interpretive emphasis.
    'Remained seated' would make the contrast more explicit than the Greek itself
    does.
- source_word: Μάρθα / Μαρία / Ἰησοῦς
  chosen: Martha / Mary / Jesus
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the translation philosophy.
