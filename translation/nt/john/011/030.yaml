id: JHN.11.30
reference: John 11:30
source:
  edition: SBLGNT
  text: οὔπω δὲ ἐληλύθει ὁ Ἰησοῦς εἰς τὴν κώμην, ἀλλ’ ἦν ⸀ἔτι ἐν τῷ τόπῳ ὅπου ὑπήντησεν
    αὐτῷ ἡ Μάρθα.
translation:
  text: Now Jesus had not yet come into the village, but was still in the place where
    Martha had met him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'where Martha had gone out to meet him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not yet at that time
  lexicon: BDAG
  rationale: οὔπω straightforwardly denotes that an event has not occurred up to this
    point. 'Not yet' is the natural English equivalent.
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition rather than strong contrast.
    'Now' fits idiomatic English narrative flow while preserving the discourse shift.
- source_word: ἐληλύθει
  chosen: had ... come
  alternatives:
  - had arrived
  - had entered
  lexicon: BDAG
  rationale: 'Pluperfect of ἔρχομαι indicates prior state relative to the surrounding
    narrative: Jesus had not yet come/arrived. ''Had come'' preserves the verbal idea
    without overinterpreting.'
- source_word: κώμην
  chosen: village
  alternatives:
  - town
  lexicon: BDAG
  rationale: κώμη commonly refers to a village or small settlement. 'Village' best
    reflects the likely scale and is a standard rendering.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: ἀλλά introduces contrast between not yet entering the village and remaining
    elsewhere. 'But' is the normal English equivalent.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: ἔτι here emphasizes continued presence in the same location. 'Still'
    is the clearest idiomatic rendering in English.
- source_word: τόπῳ
  chosen: place
  alternatives:
  - spot
  - location
  lexicon: BDAG
  rationale: τόπος is a general term for place/location. 'Place' is appropriately
    simple and natural.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in which place
  lexicon: BDAG
  rationale: ὅπου introduces the relative clause of location. 'Where' is the direct
    and idiomatic rendering.
- source_word: ὑπήντησεν
  chosen: had met
  alternatives:
  - went out to meet
  - encountered
  lexicon: BDAG
  rationale: ὑπαντάω can mean 'meet' or 'go to meet.' In this context Martha has already
    come out to Jesus (v. 20), but the verse simply identifies the location of that
    meeting. 'Had met' is concise and natural; the more explicit nuance is preserved
    in a footnote.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative with ὑπαντάω can be rendered naturally in English as the object
    'him' after 'met.'
- source_word: Μάρθα
  chosen: Martha
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Μάρθα.
