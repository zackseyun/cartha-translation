theological_decisions:
- issue: Rendering of κύριος as address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrinal guidance specifies κύριος → 'Lord' as the default. In this
    context the term functions as direct address to Jesus and may carry more than
    mere politeness; 'Lord' preserves that possible theological weight without overstating
    it.
