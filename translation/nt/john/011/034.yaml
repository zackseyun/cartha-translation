id: JHN.11.34
reference: John 11:34
source:
  edition: SBLGNT
  text: καὶ εἶπεν· Ποῦ τεθείκατε αὐτόν; λέγουσιν αὐτῷ· Κύριε, ἔρχου καὶ ἴδε.
translation:
  text: And he said, “Where have you laid him?” They said to him, “Lord, come and
    see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, come and see.” The Greek κύριε can function as a respectful address,
      but “Lord” is retained as the default rendering.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he asked
  lexicon: BDAG
  rationale: λέγω is the standard verb of speaking. Although the content is a question,
    English can naturally retain 'said' rather than interpretively shifting to 'asked.'
- source_word: Ποῦ
  chosen: Where
  lexicon: BDAG
  rationale: Direct interrogative adverb indicating location.
- source_word: τεθείκατε
  chosen: have you laid
  alternatives:
  - have you put
  - have you placed
  lexicon: BDAG
  rationale: Perfect active of τίθημι, here referring to the completed act of placing
    Lazarus' body. 'Laid' fits burial context better than the more generic 'put' or
    'placed' while preserving the perfect sense in idiomatic English.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Masculine singular pronoun referring to Lazarus.
- source_word: λέγουσιν
  chosen: They said
  alternatives:
  - They say
  lexicon: BDAG
  rationale: Historical present in Greek. English normally shifts to simple past in
    narrative for readability.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In John's narrative this address
    to Jesus can bear respectful and christological resonance; 'Lord' preserves both
    better than 'Sir.'
- source_word: ἔρχου
  chosen: come
  lexicon: BDAG
  rationale: Present middle imperative of ἔρχομαι, straightforwardly rendered as an
    invitation/command.
- source_word: ἴδε
  chosen: see
  alternatives:
  - look
  lexicon: BDAG
  rationale: Aorist imperative of ὁράω. 'See' is the most natural paired imperative
    with 'come' in English and reflects the common Johannine expression 'come and
    see.'
