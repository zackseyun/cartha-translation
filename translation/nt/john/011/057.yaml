id: JHN.11.57
reference: John 11:57
source:
  edition: SBLGNT
  text: δεδώκεισαν ⸀δὲ οἱ ἀρχιερεῖς καὶ οἱ Φαρισαῖοι ⸀ἐντολὰς ἵνα ἐάν τις γνῷ ποῦ
    ἐστιν μηνύσῃ, ὅπως πιάσωσιν αὐτόν.
translation:
  text: Now the chief priests and the Pharisees had given orders that if anyone knew
    where he was, he should report it, so that they might seize him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'where he is.' The Greek has a present tense ('is'),
      but English often shifts to 'was' after a past reporting verb.
    reason: lexical_alternative
  - marker: b
    text: '''Seize'' could also be rendered ''arrest'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδώκεισαν
  chosen: had given
  alternatives:
  - had issued
  - had ordered
  lexicon: BDAG
  rationale: Pluperfect of δίδωμι indicates prior completed action relative to the
    narrative moment. 'Had given' preserves the verbal aspect naturally in English.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative development rather than strong contrast. 'Now'
    is idiomatic English for a scene-setting transition.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple/Johannine usage refers to the leading
    priestly authorities, conventionally rendered 'chief priests,' not multiple acting
    high priests.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name; names are transliterated
    by project philosophy.
- source_word: ἐντολὰς
  chosen: orders
  alternatives:
  - commands
  - instructions
  lexicon: BDAG
  rationale: In this legal/administrative context, 'orders' best conveys authoritative
    directives issued by the leaders. 'Commands' is possible but slightly stiffer;
    'instructions' can sound too mild.
- source_word: ἵνα ἐάν τις γνῷ
  chosen: that if anyone knew
  alternatives:
  - that if anyone should know
  - so that if anyone knew
  lexicon: BDAG
  rationale: This construction introduces the content of the orders with a conditional
    element. 'That if anyone knew' is clear modern English and preserves the dependence
    on the prior verb.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any person
  lexicon: BDAG
  rationale: Indefinite singular in a general condition; 'anyone' is the most natural
    generic rendering in English.
- source_word: γνῷ
  chosen: knew
  alternatives:
  - found out
  - came to know
  lexicon: BDAG
  rationale: Aorist subjunctive of γινώσκω here refers simply to knowing/discovering
    the information. 'Knew' is concise and idiomatic in the conditional clause.
- source_word: ποῦ ἐστιν
  chosen: where he was
  alternatives:
  - where he is
  lexicon: BDAG
  rationale: Although ἐστιν is present, English commonly backshifts tense in indirect
    discourse after a past main verb. 'Where he was' reads naturally while preserving
    the sense. The more literal 'where he is' is viable and preserved in a footnote.
- source_word: μηνύσῃ
  chosen: should report it
  alternatives:
  - should inform them
  - should disclose it
  lexicon: BDAG
  rationale: μηνύω means to make known, report, or inform, often to authorities. 'Report
    it' fits the official context and implies informing the authorities without over-specifying
    the object.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    purposive force.
- source_word: πιάσωσιν
  chosen: might seize
  alternatives:
  - might arrest
  - might take hold of
  lexicon: BDAG
  rationale: πιάζω often means seize/capture. 'Seize' preserves the broader force
    without importing the more formal legal nuance of 'arrest,' though arrest is contextually
    related.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronoun rendering.
