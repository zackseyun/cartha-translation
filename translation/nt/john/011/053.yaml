theological_decisions:
- issue: Nature of the leaders' intent toward Jesus
  chosen_reading: Render the statement as a settled plan to kill Jesus, without softening
    it into mere discussion.
  alternative_readings:
  - they discussed killing him
  - they considered putting him to death
  rationale: The Greek presents a decisive conspiratorial turn after the preceding
    deliberation. The translation should preserve the gravity of the hostile intent
    without importing legal or theological interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
