id: JHN.11.53
reference: John 11:53
source:
  edition: SBLGNT
  text: ἀπ’ ἐκείνης οὖν τῆς ἡμέρας ⸀ἐβουλεύσαντο ἵνα ἀποκτείνωσιν αὐτόν.
translation:
  text: So from that day on they planned to kill him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπ’ ἐκείνης ... τῆς ἡμέρας
  chosen: from that day on
  alternatives:
  - from that day
  - from that time onward
  lexicon: BDAG
  rationale: The preposition ἀπό with the genitive phrase 'that day' marks the starting
    point of an ongoing state of affairs. 'From that day on' brings out the idiomatic
    force in natural English better than the more wooden 'from that day' while remaining
    faithful to the temporal sense.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν signals inference or narrative consequence from the preceding council
    scene. 'So' is concise, natural modern English and preserves the connective force
    without sounding overly formal.
- source_word: ἐβουλεύσαντο
  chosen: they planned
  alternatives:
  - they resolved
  - they took counsel
  - they decided
  lexicon: BDAG
  rationale: βουλεύομαι here denotes deliberation leading to a settled plan. 'They
    planned' captures the conspiratorial deliberative sense in readable English. 'Took
    counsel' is too archaic, while 'decided' can underplay the plotting nuance.
- source_word: ἵνα ἀποκτείνωσιν
  chosen: to kill
  alternatives:
  - that they might kill
  - in order to kill
  - to put to death
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose/content following the
    deliberative verb. In English, an infinitive after 'planned' is the most natural
    equivalent. 'Kill' is the plain sense of ἀποκτείνω; 'put to death' is possible
    but slightly more formal and can imply judicial process not explicit here.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus from the immediate context and is naturally
    rendered 'him' in English; supplying the name in the main text is unnecessary
    since the Greek uses a pronoun.
