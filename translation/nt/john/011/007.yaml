id: JHN.11.7
reference: John 11:7
source:
  edition: SBLGNT
  text: ἔπειτα μετὰ τοῦτο λέγει τοῖς μαθηταῖς· Ἄγωμεν εἰς τὴν Ἰουδαίαν πάλιν.
translation:
  text: Then after this he says to the disciples, “Let us go into Judea again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to Judea again.” The Greek preposition can be rendered either “into”
      or “to” in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  chosen: Then
  alternatives:
  - Afterward
  - Next
  lexicon: BDAG
  rationale: Marks narrative sequence. 'Then' is natural modern English and preserves
    the temporal progression without overtranslating.
- source_word: μετὰ τοῦτο
  chosen: after this
  alternatives:
  - after these things
  - afterward
  lexicon: BDAG
  rationale: The phrase is literally 'after this/these things.' 'After this' is idiomatic
    and keeps the temporal reference. 'After these things' is more formal but less
    natural here.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  - he tells
  lexicon: BDAG
  rationale: John frequently uses the historical present. Rendering it as 'he says'
    preserves the Greek aspect and Johannine narrative vividness better than smoothing
    to the English past tense.
- source_word: τοῖς μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The dative indirect object is straightforward. 'His' is implied by context
    but not explicit in the Greek, so it is omitted for closer adherence to the source.
- source_word: Ἄγωμεν
  chosen: Let us go
  alternatives:
  - We should go
  - Come, let us go
  lexicon: BDAG
  rationale: First person plural hortatory subjunctive. 'Let us go' is the standard
    and clear English equivalent, preserving the invitational force without adding
    emphasis not present in the Greek.
- source_word: εἰς τὴν Ἰουδαίαν
  chosen: into Judea
  alternatives:
  - to Judea
  lexicon: BDAG
  rationale: εἰς commonly indicates movement into. 'Into Judea' preserves the directional
    nuance slightly more closely than 'to Judea,' though both are possible in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Signals return to a previously visited region. 'Again' is the most direct
    and natural rendering.
