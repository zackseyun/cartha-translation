theological_decisions:
- issue: Historical present in Johannine narrative
  chosen_reading: Preserve the present tense with 'he says'
  alternative_readings:
  - 'Smooth to English narrative past: ''he said'''
  rationale: This is primarily a translational rather than doctrinal decision, but
    preserving the historical present better reflects John's style and does not create
    theological distortion.
  doctrine_reference: Translation philosophy §1, §6
