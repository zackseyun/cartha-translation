theological_decisions:
- issue: Meaning of Caiaphas's statement as prophecy
  chosen_reading: The verse states that Caiaphas's words were prophetic because of
    his office as high priest, without specifying a full theory of inspiration or
    moral approval.
  alternative_readings:
  - Caiaphas consciously prophesied under divine inspiration
  - John is speaking only ironically, not describing real prophecy
  rationale: The text explicitly says 'he prophesied,' so the translation preserves
    genuine prophetic force. At the same time, it does not add claims about Caiaphas's
    inner awareness or righteousness beyond what John states.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Force of ὑπὲρ in relation to Jesus's death
  chosen_reading: Rendered broadly as 'for the nation,' allowing benefactive/representative
    sense without narrowing it to a specific atonement formula in the main text.
  alternative_readings:
  - on behalf of the nation
  - instead of the nation
  rationale: The Greek preposition can bear a range of senses in sacrificial and representative
    contexts. The main text should preserve the theological weight without forcing
    a more technical substitutionary reading than this verse alone requires.
  doctrine_reference: Translation philosophy §3
