id: JHN.11.51
reference: John 11:51
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἀφ’ ἑαυτοῦ οὐκ εἶπεν, ἀλλὰ ἀρχιερεὺς ὢν τοῦ ἐνιαυτοῦ ἐκείνου ἐπροφήτευσεν
    ὅτι ἔμελλεν Ἰησοῦς ἀποθνῄσκειν ὑπὲρ τοῦ ἔθνους,
translation:
  text: Now he did not say this from himself, but being high priest that year, he
    prophesied that Jesus was about to die for the nation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on his own' for 'from himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'was going to die' or 'was destined to die.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on behalf of the nation.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο δὲ
  chosen: Now ... this
  alternatives:
  - But ... this
  - And ... this
  lexicon: BDAG
  rationale: δέ is rendered with a mild connective suited to English narrative flow.
    'Now' preserves the discourse transition without overstating contrast.
- source_word: ἀφ’ ἑαυτοῦ
  chosen: from himself
  alternatives:
  - on his own
  - from his own initiative
  lexicon: BDAG
  rationale: The phrase indicates source/origin of the statement. 'From himself' stays
    close to the Greek while clearly conveying that the saying did not arise merely
    from Caiaphas's own initiative.
- source_word: οὐκ εἶπεν
  chosen: did not say
  alternatives:
  - did not speak
  - did not state
  lexicon: BDAG
  rationale: λέγω here is the ordinary verb of speaking; 'say' is the most natural
    and direct English equivalent.
- source_word: ἀλλὰ ἀρχιερεὺς ὢν
  chosen: but being high priest
  alternatives:
  - but since he was high priest
  - but as high priest
  lexicon: BDAG
  rationale: The participial construction is rendered with 'being' to preserve the
    Greek syntax and causal/background sense without overinterpreting it.
- source_word: τοῦ ἐνιαυτοῦ ἐκείνου
  chosen: that year
  alternatives:
  - of that year
  - in that year
  lexicon: BDAG
  rationale: This genitive phrase idiomatically identifies the specific year of office.
    'That year' is standard, natural English and reflects Johannine wording.
- source_word: ἐπροφήτευσεν
  chosen: he prophesied
  alternatives:
  - he spoke prophetically
  - he uttered a prophecy
  lexicon: BDAG
  rationale: The verb explicitly denotes prophetic speech. 'He prophesied' preserves
    the theological force that God used his office to speak truly beyond his own intent.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of the prophecy in a straightforward way.
- source_word: ἔμελλεν ... ἀποθνῄσκειν
  chosen: was about to die
  alternatives:
  - was going to die
  - was destined to die
  lexicon: BDAG
  rationale: μέλλω with infinitive often indicates imminence or impending event. 'Was
    about to die' preserves the forward-looking sense without importing a stronger
    notion of fate than the Greek itself states.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: ὑπέρ here carries representative/benefactive force. 'For' is idiomatic
    and leaves the precise theological nuance broad enough for John's context; 'on
    behalf of' is preserved as an alternative.
- source_word: τοῦ ἔθνους
  chosen: the nation
  alternatives:
  - the people
  lexicon: BDAG
  rationale: ἔθνος in this context refers specifically to the Jewish nation, not 'Gentiles'
    or nations generally. 'The nation' best matches the singular and the immediate
    context of Israel's leadership.
