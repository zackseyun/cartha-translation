theological_decisions:
- issue: Referent and force of 'the light is not in him'
  chosen_reading: Retain the inward wording 'in him' without reducing it to merely
    external light availability.
  alternative_readings:
  - '''the light is not with him'' as a purely situational statement about lacking
    illumination'
  rationale: The Greek preposition ἐν naturally means 'in.' In Johannine usage, light/darkness
    language often carries theological depth. Preserving 'in him' maintains that tension
    rather than resolving it into either a purely literal or fully spiritualized reading.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
