id: JHN.11.10
reference: John 11:10
source:
  edition: SBLGNT
  text: ἐὰν δέ τις περιπατῇ ἐν τῇ νυκτί, προσκόπτει, ὅτι τὸ φῶς οὐκ ἔστιν ἐν αὐτῷ.
translation:
  text: But if anyone walks in the night, he stumbles, because the light is not in
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the light is not with him.' The Greek more literally says 'in him,'
      which may suggest more than the absence of external light.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν δέ
  chosen: But if
  alternatives:
  - But whenever
  - Now if
  lexicon: BDAG
  rationale: Renders the conditional particle ἐὰν with δέ as a simple contrastive
    transition and condition. 'But if' preserves the contrast with the previous verse
    without overcomplicating the syntax.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' is natural modern English
    and preserves the open, representative sense.
- source_word: περιπατῇ
  chosen: walks
  alternatives:
  - is walking
  - lives
  lexicon: BDAG
  rationale: The verb literally means 'walk' and in Johannine context can carry metaphorical
    force. 'Walks' preserves both the literal image and the moral/spiritual resonance
    without paraphrasing to 'lives'.
- source_word: ἐν τῇ νυκτί
  chosen: in the night
  alternatives:
  - at night
  - in darkness
  lexicon: BDAG
  rationale: A formally close rendering of the prepositional phrase. 'In the night'
    preserves the imagery and avoids prematurely interpreting νύξ as abstract 'darkness,'
    though that implication is present contextually.
- source_word: προσκόπτει
  chosen: stumbles
  alternatives:
  - trips
  - strikes against
  lexicon: BDAG
  rationale: '''Stumbles'' is the standard and contextually fitting rendering, preserving
    both physical and metaphorical senses. ''Trips'' is too narrow and colloquial;
    ''strikes against'' is too wooden here.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for stumbling. 'Because' is clear modern English
    and preserves the causal force.
- source_word: τὸ φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: The article is retained in English because the phrase refers to a definite
    conceptual reality in the discourse, not merely light in general.
- source_word: οὐκ ἔστιν ἐν αὐτῷ
  chosen: is not in him
  alternatives:
  - is not within him
  - is not with him
  lexicon: BDAG
  rationale: The Greek explicitly says 'in him,' not merely 'with him.' This preserves
    the Johannine wording and leaves intact the possible deeper theological sense
    of inward illumination, while still making sense in the immediate metaphor.
