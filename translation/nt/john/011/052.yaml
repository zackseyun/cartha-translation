theological_decisions:
- issue: Identity of 'the children of God'
  chosen_reading: A forward-looking reference to God's people beyond the Jewish nation,
    gathered through Jesus' death, without specifying a narrower denominational system.
  alternative_readings:
  - Diaspora Jews only
  - elect believers from Jews and Gentiles
  rationale: The verse contrasts 'the nation' with a wider group of God's children
    who are scattered. The translation preserves that breadth and does not resolve
    the precise scope beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
