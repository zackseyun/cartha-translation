id: JHN.11.52
reference: John 11:52
source:
  edition: SBLGNT
  text: καὶ οὐχ ὑπὲρ τοῦ ἔθνους μόνον, ἀλλ’ ἵνα καὶ τὰ τέκνα τοῦ θεοῦ τὰ διεσκορπισμένα
    συναγάγῃ εἰς ἕν.
translation:
  text: and not for the nation only, but also so that he might gather into one the
    scattered children of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not only for the nation, but also in order to gather into one the scattered
      children of God.'
    reason: lexical_alternative
  - marker: b
    text: '''The nation'' refers in context to the Jewish nation.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔθνους
  chosen: nation
  alternatives:
  - people
  lexicon: BDAG
  rationale: In John's immediate context this refers specifically to the Jewish nation,
    not nations in general. 'Nation' best preserves the singular corporate sense without
    overparaphrasing.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the clause's purposive force.
- source_word: τέκνα τοῦ θεοῦ
  chosen: children of God
  alternatives:
  - sons of God
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically male 'sons.' This
    matches the Greek and avoids importing a narrower filial nuance.
- source_word: διεσκορπισμένα
  chosen: the scattered
  alternatives:
  - those who had been scattered
  - the dispersed
  lexicon: BDAG
  rationale: Perfect/passive participle functioning adjectivally. 'The scattered'
    is concise and preserves the state of dispersion.
- source_word: συναγάγῃ
  chosen: he might gather
  alternatives:
  - he may gather
  - he should gather together
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα. 'He might gather' fits the purpose clause
    in idiomatic English. 'Together' is implicit in the verb and context, so not required
    in the main text.
- source_word: εἰς ἕν
  chosen: into one
  alternatives:
  - into one body
  - into unity
  - as one
  lexicon: BDAG
  rationale: The Greek is compact and does not explicitly specify 'body.' 'Into one'
    preserves the text's deliberate brevity and theological breadth.
- source_word: καὶ οὐχ ὑπὲρ τοῦ ἔθνους μόνον, ἀλλ’
  chosen: and not for the nation only, but also
  alternatives:
  - and not only for the nation, but also
  lexicon: BDAG
  rationale: This continues the thought from the previous verse about Jesus dying
    on behalf of others. 'For' is sufficiently natural here for ὑπέρ in context, while
    the contrastive structure is preserved.
