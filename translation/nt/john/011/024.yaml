id: JHN.11.24
reference: John 11:24
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ⸀ἡ Μάρθα· Οἶδα ὅτι ἀναστήσεται ἐν τῇ ἀναστάσει ἐν τῇ ἐσχάτῃ ἡμέρᾳ.
translation:
  text: Martha said to him, “I know that he will rise again in the resurrection on
    the last day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “at the resurrection on the last day.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English narrative normally renders this as simple past, especially in dialogue
    framing. This preserves the narrative sense without unnecessary stiffness.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech; 'to him' is
    the natural English equivalent.
- source_word: Μάρθα
  chosen: Martha
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy for names.
- source_word: Οἶδα
  chosen: I know
  alternatives:
  - I am certain
  - I understand
  lexicon: BDAG
  rationale: The verb denotes knowledge or certainty. 'I know' is the most direct
    and natural rendering and preserves Martha's confident assertion.
- source_word: ἀναστήσεται
  chosen: he will rise again
  alternatives:
  - he will rise
  - he will be raised
  lexicon: BDAG
  rationale: Future middle of ἀνίστημι in resurrection context naturally means 'will
    rise.' 'Rise again' is retained because it is idiomatic in English resurrection
    language and reflects restoration to life. Passive 'be raised' would shift the
    verbal perspective from the Greek form.
- source_word: ἐν τῇ ἀναστάσει
  chosen: in the resurrection
  alternatives:
  - at the resurrection
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is rendered more formally as 'in,'
    preserving the Greek construction. In English this denotes the time/sphere of
    the eschatological resurrection. 'At the resurrection' is possible but less closely
    aligned to the wording.
- source_word: ἐν τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - in the last day
  lexicon: BDAG
  rationale: Although Greek again uses ἐν, idiomatic English for a day expression
    is 'on the last day.' This preserves the temporal reference while using natural
    English.
- source_word: ἐσχάτῃ
  chosen: last
  alternatives:
  - final
  lexicon: BDAG
  rationale: In this eschatological phrase, 'last' is the standard and clearest rendering.
    'Final' is possible but less idiomatic in this Johannine expression.
