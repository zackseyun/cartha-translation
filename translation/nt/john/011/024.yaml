theological_decisions:
- issue: Eschatological resurrection reference
  chosen_reading: 'Martha refers to a future bodily resurrection at the end of the
    age: ''the resurrection on the last day.'''
  alternative_readings:
  - A more generalized hope of life after death
  rationale: The double use of resurrection language (ἀναστήσεται ... ἐν τῇ ἀναστάσει)
    together with 'the last day' points specifically to the eschatological resurrection
    hope, not merely a vague statement about postmortem existence. The translation
    preserves this specificity without importing extra doctrinal detail beyond the
    text.
  doctrine_reference: Affirmations; Translation philosophy §3
