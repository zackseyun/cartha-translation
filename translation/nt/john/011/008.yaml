theological_decisions:
- issue: Referent of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation follows the lexical default of Ἰουδαῖοι as 'Jews' unless
    the context clearly narrows the referent. Because Johannine usage can be heard
    ethnically in English in ways that obscure the likely local/oppositional sense,
    an alternative is preserved in a footnote rather than resolved interpretively
    in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
