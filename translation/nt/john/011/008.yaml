id: JHN.11.8
reference: John 11:8
source:
  edition: SBLGNT
  text: λέγουσιν αὐτῷ οἱ μαθηταί· Ῥαββί, νῦν ἐζήτουν σε λιθάσαι οἱ Ἰουδαῖοι, καὶ πάλιν
    ὑπάγεις ἐκεῖ;
translation:
  text: The disciples said to him, “Rabbi, just now the Jews were seeking to stone
    you, and are you going there again?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans” or, contextually, “the Jewish leaders.” John often uses
      “the Jews” for Jesus’ opponents in Judea rather than for the Jewish people as
      a whole.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγουσιν
  chosen: said
  alternatives:
  - say
  lexicon: BDAG
  rationale: Historical present in Greek is naturally rendered as simple past in contemporary
    English narrative.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: The Greek uses a transliterated Semitic address/title. Retaining 'Rabbi'
    preserves the disciples' form of address and Johannine style better than flattening
    it to 'Teacher'.
- source_word: νῦν
  chosen: just now
  alternatives:
  - now
  - recently
  lexicon: BDAG
  rationale: In context the adverb points to the recentness of the threat rather than
    merely the present moment; 'just now' captures that force idiomatically.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were trying
  - sought
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or attempted action in past time. 'Were
    seeking' preserves the verbal aspect without overinterpreting.
- source_word: λιθάσαι
  chosen: to stone
  alternatives:
  - to stone to death
  lexicon: BDAG
  rationale: The infinitive denotes stoning; 'to stone' is the direct lexical equivalent.
    'To death' is implied by context but not explicit in the Greek, so it is not added
    to the main text.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish leaders
  lexicon: BDAG
  rationale: Ἰουδαῖοι most directly means 'Jews.' In John it can refer more narrowly
    to Judean authorities in some contexts, but this verse does not explicitly specify
    leaders, so the main text keeps the standard rendering while preserving the contextual
    alternative in a footnote for auditability.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense; 'again' is the most natural and direct rendering.
- source_word: ὑπάγεις
  chosen: are you going
  alternatives:
  - are you departing
  - are you going away
  lexicon: BDAG
  rationale: Here ὑπάγω refers to going to a place just mentioned ('there'), so 'are
    you going' is the clearest idiomatic English rendering.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Simple locative adverb referring back to Judea/the place of danger.
