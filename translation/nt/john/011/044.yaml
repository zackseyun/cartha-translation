id: JHN.11.44
reference: John 11:44
source:
  edition: SBLGNT
  text: ⸀ἐξῆλθεν ὁ τεθνηκὼς δεδεμένος τοὺς πόδας καὶ τὰς χεῖρας κειρίαις, καὶ ἡ ὄψις
    αὐτοῦ σουδαρίῳ περιεδέδετο. λέγει ⸂αὐτοῖς ὁ Ἰησοῦς⸃· Λύσατε αὐτὸν καὶ ἄφετε ⸀αὐτὸν
    ὑπάγειν.
translation:
  text: The man who had died came out, his feet and hands bound with burial cloths,
    and his face wrapped with a cloth. Jesus says to them, “Unbind him and let him
    go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the dead man came out.” The Greek literally identifies him as “the one
      who had died.”
    reason: lexical_alternative
  - marker: b
    text: Or “with strips of cloth” for the wrappings used in burial.
    reason: lexical_alternative
  - marker: c
    text: Greek “Jesus says,” using a historical present; many translations render
      “said.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι denotes movement out from the tomb. 'Came out' is
    natural modern English and fits the deictic perspective of the narrative better
    than the archaic 'came forth.'
- source_word: ὁ τεθνηκώς
  chosen: the man who had died
  alternatives:
  - the dead man
  - the one who had died
  lexicon: BDAG
  rationale: Perfect active participle of θνῄσκω identifies Lazarus as the one who
    had been dead. 'The man who had died' is idiomatic and preserves the completed
    prior state without sounding wooden. It also avoids implying he remains dead at
    this moment.
- source_word: δεδεμένος
  chosen: bound
  alternatives:
  - tied
  - wrapped
  lexicon: BDAG
  rationale: Perfect passive participle of δέω indicates a state of being bound. 'Bound'
    best captures the restraint implied; 'wrapped' would blur the distinction between
    this verb and the later wrapping of the face.
- source_word: τοὺς πόδας καὶ τὰς χεῖρας
  chosen: his feet and hands
  alternatives:
  - the feet and the hands
  lexicon: BDAG
  rationale: Though the Greek uses articles, English naturally supplies the possessive
    in context. This makes clear these are Lazarus's own limbs while remaining faithful
    to the sense.
- source_word: κειρίαις
  chosen: with burial cloths
  alternatives:
  - with strips of cloth
  - with grave clothes
  lexicon: BDAG
  rationale: κειρία refers to cloth wrappings used in burial. 'Burial cloths' is clear,
    modern, and specific; 'grave clothes' is traditional but less precise, while 'strips
    of cloth' may understate the funerary context.
- source_word: ἡ ὄψις αὐτοῦ
  chosen: his face
  alternatives:
  - his appearance
  - his countenance
  lexicon: BDAG
  rationale: Here ὄψις refers concretely to the face/visible front rather than abstract
    appearance. 'His face' best fits the physical description of being wrapped.
- source_word: σουδαρίῳ
  chosen: with a cloth
  alternatives:
  - with a face cloth
  - with a handkerchief
  lexicon: BDAG
  rationale: σουδάριον denotes a cloth used around the face/head in burial contexts.
    'Cloth' is concise and natural in context; 'face cloth' is possible but slightly
    more interpretive. 'Handkerchief' would sound misleadingly modern in this scene.
- source_word: περιεδέδετο
  chosen: wrapped
  alternatives:
  - bound around
  - tied around
  lexicon: BDAG
  rationale: Pluperfect/passive form of περιδέω indicates that his face had been wrapped
    around with the cloth and remained so. 'Wrapped' is idiomatic and matches the
    physical image.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The Greek uses the historical present. Rendering it as 'says' preserves
    Johannine vividness. English can bear the shift here without confusion.
- source_word: Λύσατε
  chosen: Unbind
  alternatives:
  - Loose
  - Untie
  lexicon: BDAG
  rationale: Aorist imperative of λύω calls for releasing Lazarus from his wrappings.
    'Unbind' is clear modern English and corresponds well to the earlier 'bound.'
- source_word: ἄφετε αὐτὸν ὑπάγειν
  chosen: let him go
  alternatives:
  - allow him to go
  - let him leave
  lexicon: BDAG
  rationale: ἄφετε plus infinitive means to permit/release someone to go. 'Let him
    go' is the most natural English equivalent and may also subtly echo the release
    implied by the previous command.
