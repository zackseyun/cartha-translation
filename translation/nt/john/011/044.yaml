theological_decisions:
- issue: Rendering of Lazarus after resurrection
  chosen_reading: the man who had died
  alternative_readings:
  - the dead man
  rationale: The Greek perfect participle refers to Lazarus as the one who had been
    dead, but the narrative context shows he is now alive. The chosen rendering preserves
    the prior death without implying a present ontological state of death.
  doctrine_reference: Preserve theological tension rather than resolve it; avoid importing
    doctrinal claims the text does not make.
