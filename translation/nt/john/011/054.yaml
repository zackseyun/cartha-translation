theological_decisions:
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: among the Jews
  alternative_readings:
  - among the Judeans
  rationale: The term in John is context-sensitive and can carry ethnic, regional,
    or leadership-related nuance. This verse describes Jesus' public presence in relation
    to the Jewish population in the area rather than making a theological claim about
    all Jews. The main text keeps the familiar rendering while a footnote preserves
    the regional alternative to avoid overreading or flattening Johannine nuance.
  doctrine_reference: Translation philosophy §3, §5
