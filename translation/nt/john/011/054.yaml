id: JHN.11.54
reference: John 11:54
source:
  edition: SBLGNT
  text: ⸂Ὁ οὖν Ἰησοῦς⸃ οὐκέτι παρρησίᾳ περιεπάτει ἐν τοῖς Ἰουδαίοις, ἀλλὰ ἀπῆλθεν
    ἐκεῖθεν εἰς τὴν χώραν ἐγγὺς τῆς ἐρήμου, εἰς Ἐφραὶμ λεγομένην πόλιν, κἀκεῖ ⸀ἔμεινεν
    μετὰ τῶν ⸀μαθητῶν.
translation:
  text: So Jesus no longer walked openly among the Jews, but departed from there to
    the region near the wilderness, to a city called Ephraim, and stayed there with
    the disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Judeans.' In John, 'the Jews' can sometimes refer more specifically
      to people in Judea or to the Judean authorities, depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative consequence from the preceding plot against Jesus; 'So'
    is natural modern English and preserves the inferential force without sounding
    overly formal.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Standard temporal negation indicating cessation of a prior pattern.
- source_word: παρρησίᾳ
  chosen: openly
  alternatives:
  - publicly
  - with boldness
  lexicon: BDAG
  rationale: In this context the sense is public openness rather than inward courage;
    'openly' fits the narrative statement that Jesus ceased moving about in public
    view.
- source_word: περιεπάτει
  chosen: walked
  alternatives:
  - went about
  - moved about
  lexicon: BDAG
  rationale: Literally 'was walking around,' but in Johannine narrative this idiom
    refers to one's public movement or activity. 'Walked' keeps the verbal image while
    remaining idiomatic in English when paired with 'openly among the Jews.'
- source_word: ἐν τοῖς Ἰουδαίοις
  chosen: among the Jews
  alternatives:
  - among the Judeans
  lexicon: BDAG
  rationale: John's Ἰουδαῖοι can denote Judeans, Jewish authorities, or the Jewish
    people depending on context. Here the phrase is geographic-social ('among the
    Jews') rather than specifically the leadership. The traditional and broadly intelligible
    'the Jews' is retained, while the regional nuance is preserved in a footnote because
    'Judeans' is also plausible in Johannine usage.
- source_word: ἀπῆλθεν ἐκεῖθεν
  chosen: departed from there
  alternatives:
  - went away from there
  - left there
  lexicon: BDAG
  rationale: Aorist narrative movement away from the prior location; 'departed from
    there' is concise and suitably formal without being stiff.
- source_word: χώραν
  chosen: region
  alternatives:
  - country
  - district
  - countryside
  lexicon: BDAG
  rationale: Refers to an area or territory rather than a modern nation-state; 'region'
    is clear modern English.
- source_word: ἐγγὺς τῆς ἐρήμου
  chosen: near the wilderness
  alternatives:
  - near the desert
  lexicon: BDAG
  rationale: ἔρημος here denotes a sparsely inhabited wilderness area. 'Wilderness'
    better matches biblical geographic usage than 'desert' in English.
- source_word: εἰς Ἐφραὶμ λεγομένην πόλιν
  chosen: to a city called Ephraim
  alternatives:
  - to the town called Ephraim
  lexicon: BDAG
  rationale: πόλις can mean city or town; 'city' is the direct lexical equivalent
    and works naturally here. 'Called Ephraim' straightforwardly renders λεγομένην.
- source_word: κἀκεῖ ἔμεινεν
  chosen: and stayed there
  alternatives:
  - and remained there
  lexicon: BDAG
  rationale: μένω often means remain/abide, but in travel narrative 'stayed there'
    is the most idiomatic English rendering.
- source_word: μετὰ τῶν μαθητῶν
  chosen: with the disciples
  alternatives:
  - with his disciples
  lexicon: BDAG
  rationale: The possessive 'his' is implied by context but absent in Greek. 'The
    disciples' is sufficiently clear and more formally aligned with the source.
