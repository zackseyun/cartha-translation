theological_decisions:
- issue: Rendering κύριος in Martha's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The project's default for κύριος is 'Lord.' In this narrative context
    Martha's address to Jesus coheres with Johannine usage that often carries more
    than mere social politeness. The translation preserves that weight without overstating
    a full confessional claim in the verse itself.
