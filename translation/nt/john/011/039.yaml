id: JHN.11.39
reference: John 11:39
source:
  edition: SBLGNT
  text: λέγει ὁ Ἰησοῦς· Ἄρατε τὸν λίθον. λέγει αὐτῷ ἡ ἀδελφὴ τοῦ ⸀τετελευτηκότος Μάρθα·
    Κύριε, ἤδη ὄζει, τεταρταῖος γάρ ἐστιν.
translation:
  text: Jesus said, “Take away the stone.” Martha, the sister of the dead man, said
    to him, “Lord, by now he smells, for he has been dead four days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one who had died.”
    reason: lexical_alternative
  - marker: b
    text: Or “he stinks”; Greek has a verb meaning “to emit an odor.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “for he is a fourth-day man,” that is, he has been dead four
      days.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄρατε
  chosen: Take away
  alternatives:
  - Lift
  - Remove
  lexicon: BDAG
  rationale: Aorist imperative plural of αἴρω here commands those present to move
    the stone. 'Take away' is idiomatic modern English and fits the object 'the stone'
    better than the more wooden 'lift.'
- source_word: λίθον
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: In tomb contexts λίθος commonly refers to the stone covering the entrance.
    'Stone' is the standard and sufficiently clear rendering.
- source_word: τοῦ τετελευτηκότος
  chosen: the dead man
  alternatives:
  - the one who had died
  - the deceased
  lexicon: BDAG
  rationale: Perfect active participle of τελευτάω denotes one who has died, with
    resulting state. 'The dead man' is concise, natural English and preserves the
    referent without awkwardness. 'The one who had died' is possible but less idiomatic
    here.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In John's Gospel Martha addresses
    Jesus with respect and recognition beyond mere politeness, so 'Lord' is preferable
    to 'Sir.'
- source_word: ἤδη
  chosen: by now
  alternatives:
  - already
  - now
  lexicon: BDAG
  rationale: ἤδη marks that the condition is already present at this point. 'By now'
    conveys the temporal force naturally in English in this context.
- source_word: ὄζει
  chosen: he smells
  alternatives:
  - there is a stench
  - he stinks
  lexicon: BDAG
  rationale: The verb ὄζω means to emit an odor, here clearly unpleasant because of
    death. 'He smells' is natural and readable modern English; 'he stinks' is stronger
    and more colloquial, while 'there is a stench' shifts from the personal subject
    expressed in Greek.
- source_word: τεταρταῖος
  chosen: he has been dead four days
  alternatives:
  - it is the fourth day
  - he is four days dead
  lexicon: BDAG
  rationale: The adjective means 'four days [dead/in the tomb].' English requires
    expansion for clarity. 'He has been dead four days' communicates the idiomatic
    sense without archaic phrasing.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives Martha's explanation for her objection. 'For' preserves the
    connective relation succinctly and naturally in dialogue.
