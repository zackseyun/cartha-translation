id: JHN.11.4
reference: John 11:4
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὁ Ἰησοῦς εἶπεν· Αὕτη ἡ ἀσθένεια οὐκ ἔστιν πρὸς θάνατον ἀλλ’ ὑπὲρ
    τῆς δόξης τοῦ θεοῦ ἵνα δοξασθῇ ὁ υἱὸς τοῦ θεοῦ δι’ αὐτῆς.
translation:
  text: But when Jesus heard it, he said, “This sickness is not unto death, but for
    the glory of God, so that the Son of God may be glorified through it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “does not lead to death.” The Greek expression can denote that death
      is not the final outcome or purpose of the sickness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when Jesus heard it
  alternatives:
  - after Jesus heard
  - having heard
  lexicon: BDAG
  rationale: Aorist participle with δέ introducing the circumstance for Jesus' statement.
    'When ... heard' is natural English and preserves the temporal sense. 'It' is
    supplied from context (the report about Lazarus' illness).
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild development/contrast in the narrative. 'But' fits the flow
    after the message has been delivered and introduces Jesus' response.
- source_word: ἀσθένεια
  chosen: sickness
  alternatives:
  - illness
  - disease
  lexicon: BDAG
  rationale: Refers to Lazarus's condition. 'Sickness' is clear, idiomatic, and suitably
    broad without sounding overly clinical.
- source_word: οὐκ ἔστιν πρὸς θάνατον
  chosen: is not unto death
  alternatives:
  - is not for death
  - does not lead to death
  lexicon: BDAG
  rationale: πρὸς with accusative here expresses end or result. 'Unto death' preserves
    the idiom and leaves intact the Johannine nuance that death is not the ultimate
    end or purpose of this sickness, even though Lazarus will in fact die.
- source_word: ὑπὲρ τῆς δόξης τοῦ θεοῦ
  chosen: for the glory of God
  alternatives:
  - for God's glory
  - on behalf of the glory of God
  lexicon: BDAG
  rationale: ὑπέρ here conveys purpose/benefit. 'For the glory of God' is both accurate
    and natural, preserving the theological weight of δόξα.
- source_word: ἵνα δοξασθῇ
  chosen: so that ... may be glorified
  alternatives:
  - in order that ... may be glorified
  - that ... might be glorified
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and the aorist passive subjunctive δοξασθῇ is
    best rendered with an English purpose clause. 'May be glorified' preserves the
    passive voice.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Standard and precise rendering of the christological title; it should
    be translated, not transliterated, per project philosophy.
- source_word: δι’ αὐτῆς
  chosen: through it
  alternatives:
  - through this
  - by means of it
  lexicon: BDAG
  rationale: διά with genitive indicates means or instrument. The pronoun refers back
    to the sickness, so 'through it' is concise and clear.
