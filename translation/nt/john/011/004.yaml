theological_decisions:
- issue: Meaning of 'not unto death' in light of Lazarus's actual death later in the
    narrative
  chosen_reading: The phrase is rendered to indicate that death is not the ultimate
    end or purpose of the sickness, not that Lazarus will never die in the course
    of the episode.
  alternative_readings:
  - A flat prediction that Lazarus would not die
  - An idiomatic statement meaning only 'not terminal'
  rationale: The narrative context shows Lazarus does die temporarily (11:14), so
    the translation should preserve the teleological force of πρὸς rather than force
    a contradiction. 'Unto death' keeps the tension without over-interpreting.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relationship between 'the glory of God' and 'the Son of God may be glorified'
  chosen_reading: Both clauses are retained distinctly, showing that the sickness
    serves God's glory and specifically the glorification of the Son through it.
  alternative_readings:
  - Collapsing both into a single generalized statement about divine glory
  rationale: The Greek presents both God's glory and the Son's glorification in purposeful
    relation. Keeping both explicit preserves the verse's high christology without
    adding doctrinal explanation beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
