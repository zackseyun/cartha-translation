id: JHN.11.27
reference: John 11:27
source:
  edition: SBLGNT
  text: λέγει αὐτῷ· Ναί, κύριε· ἐγὼ πεπίστευκα ὅτι σὺ εἶ ὁ χριστὸς ὁ υἱὸς τοῦ θεοῦ
    ὁ εἰς τὸν κόσμον ἐρχόμενος.
translation:
  text: She said to him, “Yes, Lord; I have believed that you are the Messiah, the
    Son of God, the one coming into the world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title is Χριστός (Christos), rendered here as
      “Messiah” to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or “who is coming into the world.” The Greek participial expression can
      be rendered more explicitly with a relative clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ
  chosen: She said to him
  alternatives:
  - She says to him
  lexicon: BDAG
  rationale: Although the Greek uses the historical present λέγει ('says'), natural
    English narrative style normally renders it as a simple past. The subject is supplied
    from context as Martha.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  lexicon: BDAG
  rationale: A straightforward affirmative response fits the dialogue context best.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this Johannine confession
    context, the address carries more than mere politeness and fits reverential recognition
    of Jesus.
- source_word: πεπίστευκα
  chosen: I have believed
  alternatives:
  - I have come to believe
  - I believe
  lexicon: BDAG
  rationale: The perfect tense indicates a settled conviction formed in the past with
    continuing force in the present. 'I have believed' preserves that aspect better
    than a simple present, while remaining readable.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of Martha's belief rather than a causal clause.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine default, Χριστός as a title is translated 'Messiah' to preserve
    its meaning and Jewish messianic context.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: This is the standard and most precise rendering of the christological
    title, preserving both definiteness and theological weight.
- source_word: ὁ εἰς τὸν κόσμον ἐρχόμενος
  chosen: the one coming into the world
  alternatives:
  - who is coming into the world
  - the one who comes into the world
  lexicon: BDAG
  rationale: The articular present participle functions substantivally and characterizes
    Jesus as the expected one entering the world. 'The one coming into the world'
    preserves the Greek structure and its messianic resonance.
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the world of human existence/order into
    which the Son comes; 'world' is the natural and consistent rendering.
