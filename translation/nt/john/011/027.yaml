theological_decisions:
- issue: Rendering Χριστός in a confessional title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse presents a formal confession of Jesus' identity. Following
    the doctrine's contested-terms guidance, the title is translated 'Messiah' rather
    than transliterated 'Christ' to preserve the Hebraic and royal-redemptive sense
    of the term.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of κύριε in Martha's address
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The immediate context is a confession of Jesus as Messiah and Son of
    God, so 'Lord' best preserves the likely reverential and theological force without
    overstating beyond the text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Aspect of πεπίστευκα
  chosen_reading: I have believed
  alternative_readings:
  - I believe
  - I have come to believe
  rationale: The perfect tense suggests an abiding state of belief grounded in prior
    conviction. The chosen rendering preserves that durative-resultative force without
    paraphrase.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — original-language primacy;
    preserve source meaning'
