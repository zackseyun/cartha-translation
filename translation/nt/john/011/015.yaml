theological_decisions:
- issue: Force of πιστεύσητε in Johannine context
  chosen_reading: believe
  alternative_readings:
  - come to believe
  rationale: 'The verse states Jesus'' purpose in allowing the situation to unfold:
    that the disciples would believe. The aorist subjunctive may carry an ingressive
    nuance, but the text does not require a stronger doctrinal claim about prior unbelief.
    The simpler ''believe'' preserves the theological tension without over-interpreting
    their prior state.'
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις → faith
    (related verb πιστεύω rendered as believe)'
