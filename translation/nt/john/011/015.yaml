id: JHN.11.15
reference: John 11:15
source:
  edition: SBLGNT
  text: καὶ χαίρω δι’ ὑμᾶς, ἵνα πιστεύσητε, ὅτι οὐκ ἤμην ἐκεῖ· ἀλλὰ ἄγωμεν πρὸς αὐτόν.
translation:
  text: And I am glad for your sake that I was not there, so that you may believe.
    But let us go to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you may come to believe.' The Greek aorist subjunctive may emphasize
      coming into belief, though 'believe' is kept in the main text as the broader
      and less interpretively loaded rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρω
  chosen: I am glad
  alternatives:
  - I rejoice
  lexicon: BDAG
  rationale: Present indicative first singular. 'I am glad' gives natural modern English
    while preserving the positive affective sense. 'I rejoice' is more formal/literal
    but can sound stilted here.
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - because of you
  - on account of you
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or benefit. In context
    Jesus is not glad because of the disciples as a cause in a bare sense, but glad
    with reference to their benefit, which 'for your sake' captures idiomatically.
- source_word: ἵνα πιστεύσητε
  chosen: so that you may believe
  alternatives:
  - so that you may come to believe
  lexicon: BDAG
  rationale: ἵνα with aorist subjunctive expresses purpose. πιστεύω is rendered with
    the default 'believe' rather than 'have faith' for natural Johannine style. The
    aorist could suggest ingressive force ('come to believe'), but the broader Gospel
    usage supports the simpler 'believe' in the main text.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what Jesus is glad about: namely,
    ''that I was not there.'' Rendering it as ''that'' best fits the syntax. A causal
    ''because'' is possible in some contexts but less likely here.'
- source_word: οὐκ ἤμην ἐκεῖ
  chosen: I was not there
  alternatives:
  - I was not present there
  lexicon: BDAG
  rationale: Straightforward past imperfect of εἰμί with adverb ἐκεῖ. 'I was not there'
    is clear and idiomatic; 'present' adds a nuance not required by the Greek.
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - nevertheless
  lexicon: BDAG
  rationale: Marks a contrast and transition from explanation to action. 'But' is
    the most natural English connective here.
- source_word: ἄγωμεν
  chosen: let us go
  alternatives:
  - we should go
  - let us be going
  lexicon: BDAG
  rationale: First person plural present subjunctive used hortatorily. 'Let us go'
    is the standard and natural rendering. 'Let us be going' is possible but unnecessarily
    marked.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person. 'To him'
    is idiomatic English and contextually sufficient.
