theological_decisions:
- issue: Force of the imperfect verb ἠγάπα in relation to Jesus' affection
  chosen_reading: A simple statement of Jesus' continuing love for Martha, her sister,
    and Lazarus
  alternative_readings:
  - An ingressive nuance ('came to love')
  - A more emphatic progressive nuance ('was loving')
  rationale: The imperfect most naturally portrays an ongoing state in past time.
    The verse states Jesus' love without importing further doctrinal or emotional
    claims beyond the text.
  doctrine_reference: Translation philosophy §§3, 6
