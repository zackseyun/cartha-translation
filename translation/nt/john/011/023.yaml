theological_decisions:
- issue: Resurrection wording
  chosen_reading: will rise again
  alternative_readings:
  - will rise
  - will be raised
  rationale: The verse states Jesus' assurance of the brother's future rising without
    specifying here the timing distinction between immediate restoration and final
    resurrection. 'Will rise again' preserves the resurrection sense without importing
    a fuller doctrinal explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
