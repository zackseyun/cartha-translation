id: JHN.11.23
reference: John 11:23
source:
  edition: SBLGNT
  text: λέγει αὐτῇ ὁ Ἰησοῦς· Ἀναστήσεται ὁ ἀδελφός σου.
translation:
  text: Jesus says to her, “Your brother will rise again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Your brother will rise.” The Greek verb can be rendered simply “will
      rise”; “again” makes the resurrection sense explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says' to reflect the Greek present
    tense in Johannine narrative. English often shifts to past tense for smoothness,
    but preserving the present is natural enough here and retains the vividness of
    the source.
- source_word: αὐτῇ
  chosen: to her
  alternatives:
  - her
  lexicon: BDAG
  rationale: The dative pronoun is expressed idiomatically in English as 'to her'
    after 'says,' making the indirect object explicit and natural.
- source_word: Ἀναστήσεται
  chosen: will rise again
  alternatives:
  - will rise
  - will be raised
  lexicon: BDAG
  rationale: Future middle of ἀνίστημι in this context refers to rising from the dead.
    'Will rise again' is idiomatic English in resurrection contexts and matches the
    immediate context of Lazarus's death. 'Will be raised' would shift the voice nuance
    and foreground divine agency more explicitly than the Greek form here does.
- source_word: ὁ ἀδελφός σου
  chosen: your brother
  alternatives:
  - your brother of yours
  lexicon: BDAG
  rationale: Standard possessive rendering of the noun phrase. 'Brother' is the plain
    lexical sense and contextually refers to Martha's male sibling, Lazarus; no inclusive
    rendering is appropriate.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated per translation philosophy. The article
    is not separately represented in English because proper names normally do not
    take an article in translation.
