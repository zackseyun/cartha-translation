id: JHN.11.17
reference: John 11:17
source:
  edition: SBLGNT
  text: Ἐλθὼν οὖν ὁ Ἰησοῦς εὗρεν αὐτὸν τέσσαρας ⸂ἤδη ἡμέρας⸃ ἔχοντα ἐν τῷ μνημείῳ.
translation:
  text: So when Jesus arrived, he found that Lazarus had already been in the tomb
    four days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλθὼν
  chosen: when Jesus arrived
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: The aorist participle of ἔρχομαι is temporally related to the main verb
    εὗρεν. In natural English narrative, 'when ... arrived' conveys the participial
    action preceding the finding without sounding wooden. 'Arrived' is contextually
    smoother than the more literal 'came'.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  - now
  lexicon: BDAG
  rationale: οὖν here functions as a narrative connective, linking this event to the
    preceding context. 'So' preserves the discourse flow in readable modern English
    better than the more inferential-sounding 'therefore'.
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he discovered
  lexicon: BDAG
  rationale: A straightforward rendering of εὑρίσκω in narrative context. 'Found'
    is idiomatic and sufficiently formal.
- source_word: αὐτὸν
  chosen: that Lazarus
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun refers to Lazarus from the immediate context. English can
    use 'him,' but making the referent explicit avoids ambiguity and reflects the
    sense clearly without adding new information.
- source_word: τέσσαρας ἤδη ἡμέρας ἔχοντα
  chosen: had already been in the tomb four days
  alternatives:
  - had already spent four days in the tomb
  - having already been there four days
  - already had four days
  lexicon: BDAG
  rationale: The construction literally means 'having already four days' and idiomatically
    indicates duration since burial. English requires an idiomatic expression of elapsed
    time; 'had already been in the tomb four days' best captures the sense while staying
    close to the Greek. The adverb ἤδη is preserved as 'already'.
- source_word: μνημείῳ
  chosen: the tomb
  alternatives:
  - the grave
  - the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context denotes a burial place or tomb. 'Tomb' is the
    most precise and contextually appropriate rendering, especially in Johannine resurrection
    narrative.
