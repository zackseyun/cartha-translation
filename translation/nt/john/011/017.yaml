theological_decisions:
- issue: Supplying the referent of αὐτόν
  chosen_reading: 'Explicitly name Lazarus in English: ''he found that Lazarus had
    already been in the tomb four days.'''
  alternative_readings:
  - 'Retain the pronoun: ''he found him already four days in the tomb.'''
  rationale: This is not a doctrinally contested issue but a translation clarity decision.
    The Greek pronoun is clear from context, and explicit naming in English avoids
    possible ambiguity while preserving the verse's meaning.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
