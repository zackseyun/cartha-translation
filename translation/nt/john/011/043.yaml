id: JHN.11.43
reference: John 11:43
source:
  edition: SBLGNT
  text: καὶ ταῦτα εἰπὼν φωνῇ μεγάλῃ ἐκραύγασεν· Λάζαρε, δεῦρο ἔξω.
translation:
  text: And after saying these things, he cried out with a loud voice, “Lazarus, come
    out!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “Lazarus, come forth!”
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural accusative neuter demonstrative, naturally rendered 'these things.'
    English can compress to 'this,' but the plural is retained for closer correspondence.
- source_word: εἰπὼν
  chosen: after saying
  alternatives:
  - having said
  - when he had said
  lexicon: BDAG
  rationale: Aorist participle of λέγω indicating action prior to the main verb. 'After
    saying' gives clear temporal sequence in natural English while preserving the
    participial sense.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - with a great voice
  lexicon: BDAG
  rationale: Dative of manner/instrument with adjective μέγας. 'With a loud voice'
    is idiomatic modern English and preserves the emphasis on volume.
- source_word: ἐκραύγασεν
  chosen: he cried out
  alternatives:
  - he shouted
  - he called out
  lexicon: BDAG
  rationale: κραυγάζω denotes a loud cry or shout. 'Cried out' best preserves the
    force without sounding overly colloquial; the loudness is reinforced by the preceding
    phrase.
- source_word: Λάζαρε
  chosen: Lazarus
  lexicon: BDAG
  rationale: Vocative singular of the proper name Λάζαρος. Per translation philosophy,
    personal names are transliterated by standard English convention.
- source_word: δεῦρο ἔξω
  chosen: come out
  alternatives:
  - come here, outside
  - come forth
  lexicon: BDAG
  rationale: δεῦρο is an adverb functioning imperativally ('come here/come'), and
    ἔξω means 'outside/out.' Together they form a forceful summons for Lazarus to
    emerge. 'Come out' is clear, natural modern English; 'come forth' is traditional
    but archaic.
