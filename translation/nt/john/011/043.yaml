theological_decisions:
- issue: Rendering the miracle command without importing traditional archaism
  chosen_reading: come out
  alternative_readings:
  - come forth
  rationale: The verse contains no doctrinally contested term, but the command is
    famous in traditional English. Following the stated philosophy of readable modern
    English, 'come out' preserves the plain sense of δεῦρο ἔξω without archaic diction.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
