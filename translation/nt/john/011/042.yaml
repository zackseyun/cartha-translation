theological_decisions:
- issue: Force of Jesus' statement about the Father's hearing
  chosen_reading: The verse states that the Father always hears Jesus, and that Jesus
    spoke aloud publicly for the crowd's benefit.
  alternative_readings:
  - The statement could be taken as emphasizing answered prayer in general rather
    than the unique Father-Son relationship.
  rationale: The immediate context is Jesus' prayer before raising Lazarus. The wording
    should preserve both the intimacy of Father-Son communion and the stated evangelistic
    purpose, without importing later doctrinal formulations beyond the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Purpose of the public prayer
  chosen_reading: Jesus' spoken prayer is presented as intended to lead the surrounding
    crowd to believe that the Father sent him.
  alternative_readings:
  - The purpose could be construed more narrowly as confirming this specific miracle
    rather than Jesus' broader mission.
  rationale: The explicit ἵνα-clause centers on belief 'that you sent me,' which in
    Johannine context points to Jesus' divine mission. The translation keeps this
    wording and does not narrow or expand it beyond the Greek.
  doctrine_reference: Translation philosophy §3
