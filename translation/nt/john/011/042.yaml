id: JHN.11.42
reference: John 11:42
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ᾔδειν ὅτι πάντοτέ μου ἀκούεις· ἀλλὰ διὰ τὸν ὄχλον τὸν περιεστῶτα εἶπον,
    ἵνα πιστεύσωσιν ὅτι σύ με ἀπέστειλας.
translation:
  text: But I knew that you always hear me. Yet I said this because of the crowd standing
    around, so that they may believe that you sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of the crowd standing around.'
    reason: lexical_alternative
  - marker: b
    text: The Greek explicitly says 'that you sent me,' with emphasis on 'you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδειν
  chosen: I knew
  alternatives:
  - I had known
  - I was knowing
  lexicon: BDAG
  rationale: From οἶδα, functioning as a past tense of 'know.' 'I knew' is the most
    natural English rendering here and fits the prayer context without forcing an
    English pluperfect.
- source_word: πάντοτέ
  chosen: always
  alternatives:
  - at all times
  lexicon: BDAG
  rationale: Standard adverbial sense; 'always' is clear, natural, and sufficiently
    formal.
- source_word: μου ἀκούεις
  chosen: you always hear me
  alternatives:
  - you listen to me
  - you heed me
  lexicon: BDAG
  rationale: ἀκούω with genitive can mean hear/listen to. In this context of prayer
    to the Father, 'hear me' is the established and contextually appropriate sense,
    implying receptive hearing without over-paraphrasing.
- source_word: ἀλλὰ
  chosen: Yet
  alternatives:
  - but
  - however
  lexicon: BDAG
  rationale: Marks contrast between Jesus' prior knowledge and his public utterance
    for the crowd's sake. 'Yet' gives a smooth English contrast while preserving the
    adversative force.
- source_word: διὰ τὸν ὄχλον
  chosen: because of the crowd
  alternatives:
  - for the sake of the crowd
  - on account of the crowd
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or cause. 'Because
    of the crowd' is the most direct rendering; the following purpose clause explains
    the intended effect on them.
- source_word: τὸν περιεστῶτα
  chosen: standing around
  alternatives:
  - standing nearby
  - standing here around me
  lexicon: BDAG
  rationale: Perfect active participle of περιΐστημι, describing the crowd as present
    around Jesus. 'Standing around' preserves the spatial sense without awkwardness.
- source_word: εἶπον
  chosen: I said this
  alternatives:
  - I spoke
  - I said
  lexicon: BDAG
  rationale: Aorist of λέγω. 'I said this' makes explicit in English that Jesus refers
    to the prayer he has just spoken, a natural and minimal contextual completion.
- source_word: ἵνα πιστεύσωσιν
  chosen: so that they may believe
  alternatives:
  - so that they might believe
  - in order that they may believe
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose. 'So that they may believe' is
    natural modern English and preserves the purposive force.
- source_word: ὅτι σύ με ἀπέστειλας
  chosen: that you sent me
  alternatives:
  - that it is you who sent me
  - that you have sent me
  lexicon: BDAG
  rationale: Aorist ἀπέστειλας is best rendered 'sent.' The explicit pronoun σύ adds
    emphasis, but English can convey the sense without overloading the clause. The
    mission theme in John is preserved by 'sent me'.
