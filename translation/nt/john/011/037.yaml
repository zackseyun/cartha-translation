theological_decisions:
- issue: Tone of the speakers' question
  chosen_reading: Render as a skeptical rhetorical question about Jesus' ability to
    prevent Lazarus's death
  alternative_readings:
  - Render more neutrally as a simple question
  rationale: The Greek rhetorical form with Οὐκ ἐδύνατο implies an expectation that
    he could have acted. The translation preserves the implied criticism without adding
    explicit accusation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
