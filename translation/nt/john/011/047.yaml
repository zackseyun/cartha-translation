theological_decisions:
- issue: Rendering σημεῖα in Johannine context
  chosen_reading: signs
  alternative_readings:
  - miracles
  - miraculous signs
  rationale: John regularly uses σημεῖα to present Jesus's works as revelatory acts
    pointing beyond themselves. 'Signs' preserves that theological nuance without
    adding explanatory wording to the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase.'
- issue: Rendering συνέδριον
  chosen_reading: the council
  alternative_readings:
  - the Sanhedrin
  rationale: The Greek noun is translated rather than replaced with a later or more
    technical label in the main text. Because the referent is likely the Jerusalem
    ruling council, the traditional identification is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate meaning
    in readable modern English.'
