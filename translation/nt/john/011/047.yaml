id: JHN.11.47
reference: John 11:47
source:
  edition: SBLGNT
  text: συνήγαγον οὖν οἱ ἀρχιερεῖς καὶ οἱ Φαρισαῖοι συνέδριον, καὶ ἔλεγον· Τί ποιοῦμεν
    ὅτι οὗτος ὁ ἄνθρωπος πολλὰ ⸂ποιεῖ σημεῖα⸃;
translation:
  text: So the chief priests and the Pharisees gathered the council and were saying,
    “What are we doing? For this man is doing many signs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Sanhedrin,” the Jewish ruling council.
    reason: alternative_reading
lexical_decisions:
- source_word: συνήγαγον
  chosen: gathered
  alternatives:
  - assembled
  - convened
  lexicon: BDAG
  rationale: Aorist active indicative of συνάγω. 'Gathered' is natural English and
    fits taking συνέδριον as the object. 'Convened' is possible but slightly more
    interpretive.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical consequence from the preceding sign of Lazarus's
    raising. 'So' is idiomatic modern English without overstating formal inference.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not multiple holders of the high-priestly office in the strictest sense.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Established transliteration for the Jewish group; names are transliterated
    per philosophy.
- source_word: συνέδριον
  chosen: the council
  alternatives:
  - the Sanhedrin
  - a council
  lexicon: BDAG
  rationale: The term can denote the Jewish ruling council. 'The council' translates
    the noun rather than importing the more technical traditional label 'Sanhedrin'
    into the main text; the institutional sense is still clear in context.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect active indicative suggests ongoing or iterative speech. 'Were
    saying' preserves that aspect more transparently than simple past 'said.'
- source_word: Τί ποιοῦμεν
  chosen: What are we doing?
  alternatives:
  - What should we do?
  - What are we to do?
  lexicon: BDAG
  rationale: The Greek is present indicative, not an explicit deliberative subjunctive.
    'What are we doing?' preserves the form and conveys alarm/inadequacy. The idiomatic
    deliberative sense is preserved by context.
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - since
  lexicon: BDAG
  rationale: Introduces the reason for their question. 'For' is concise and natural
    in direct speech.
- source_word: οὗτος ὁ ἄνθρωπος
  chosen: this man
  alternatives:
  - this person
  lexicon: BDAG
  rationale: Gender-accurate and contextually appropriate. The speakers refer dismissively
    to Jesus as a man; 'this man' preserves that tone.
- source_word: πολλὰ ποιεῖ σημεῖα
  chosen: is doing many signs
  alternatives:
  - does many signs
  - performs many signs
  - is doing many miraculous signs
  lexicon: BDAG
  rationale: Present tense is preserved with 'is doing.' σημεῖα in John is theologically
    important; 'signs' is preferred over 'miracles' because it preserves Johannine
    emphasis on acts that signify Jesus's identity. 'Miraculous signs' is interpretive
    and redundant.
