id: JHN.11.1
reference: John 11:1
source:
  edition: SBLGNT
  text: Ἦν δέ τις ἀσθενῶν, Λάζαρος ἀπὸ Βηθανίας ἐκ τῆς κώμης Μαρίας καὶ Μάρθας τῆς
    ἀδελφῆς αὐτῆς.
translation:
  text: Now a certain man was sick, Lazarus from Bethany, from the village of Mary
    and her sister Martha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Now there was someone sick, Lazarus of Bethany, from the village of
      Mary and Martha her sister.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δέ
  chosen: Now ... was
  alternatives:
  - And ... was
  - Now there was
  lexicon: BDAG
  rationale: δέ is a mild connective that advances the narrative. 'Now' captures the
    transition naturally in English without overemphasizing contrast. Ἦν is rendered
    with 'was' as the main finite verb.
- source_word: τις
  chosen: a certain man
  alternatives:
  - someone
  - a certain one
  lexicon: BDAG
  rationale: τις introduces an indefinite but specific individual. 'A certain man'
    preserves the narrative specificity better than the more generic 'someone.' 'Man'
    is appropriate because the referent is Lazarus, a male individual.
- source_word: ἀσθενῶν
  chosen: was sick
  alternatives:
  - was ill
  - was weak
  lexicon: BDAG
  rationale: The present participle ἀσθενῶν denotes being sick/ill in this context,
    not merely weak. Rendering the participle with the English predicate 'was sick'
    is idiomatic and preserves the sense.
- source_word: Λάζαρος
  chosen: Lazarus
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: ἀπὸ Βηθανίας
  chosen: from Bethany
  alternatives:
  - of Bethany
  lexicon: BDAG
  rationale: ἀπό normally indicates source/origin, so 'from Bethany' is the most direct
    rendering.
- source_word: ἐκ τῆς κώμης
  chosen: from the village
  alternatives:
  - out of the village
  - from the town
  lexicon: BDAG
  rationale: κώμη refers to a village or small settlement rather than a larger city.
    'Village' is the clearest modern equivalent. ἐκ is also naturally rendered 'from'
    here.
- source_word: Μαρίας καὶ Μάρθας
  chosen: of Mary and her sister Martha
  alternatives:
  - of Mary and Martha
  lexicon: BDAG
  rationale: The genitives depend on 'village,' identifying Bethany as the village
    associated with Mary and Martha. English idiom benefits from making the sibling
    relationship explicit in connection with the following apposition.
- source_word: τῆς ἀδελφῆς αὐτῆς
  chosen: her sister
  alternatives:
  - the sister of her
  - whose sister was Martha
  lexicon: BDAG
  rationale: The phrase most naturally identifies Martha as Mary's sister. 'Her sister'
    is idiomatic English and preserves the referential force of αὐτῆς.
