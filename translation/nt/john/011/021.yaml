- issue: Rendering of κύριος as Martha's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The translation follows the project's default rendering for κύριος as
    'Lord.' This preserves both respectful address and possible christological resonance
    without overstating the verse's theology.
