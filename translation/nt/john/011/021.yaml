id: JHN.11.21
reference: John 11:21
source:
  edition: SBLGNT
  text: εἶπεν οὖν ⸀ἡ Μάρθα πρὸς ⸀τὸν Ἰησοῦν· Κύριε, εἰ ἦς ὧδε ⸂οὐκ ἂν ἀπέθανεν ὁ ἀδελφός
    μου⸃·
translation:
  text: So Martha said to Jesus, “Lord, if you had been here, my brother would not
    have died.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sir'; the Greek κύριε can function as a respectful form of address,
      but 'Lord' is the project's default rendering and also preserves possible theological
      weight in John's Gospel.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν marks narrative continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: λέγω in this narrative context is best rendered 'said' as the standard
    speech verb in English.
- source_word: πρὸς τὸν Ἰησοῦν
  chosen: to Jesus
  alternatives:
  - to Jesus directly
  - to Jesus, saying
  lexicon: BDAG
  rationale: πρός with the accusative after a speech verb indicates the addressee.
    'To Jesus' is the natural and sufficiently precise rendering.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Following the doctrine's contested-terms guidance, κύριος is rendered
    'Lord.' In John's Gospel this address can carry respectful and potentially theological
    weight; 'Lord' preserves that range better than 'Sir'.
- source_word: εἰ ἦς ὧδε
  chosen: if you had been here
  alternatives:
  - if you were here
  - if you had been in this place
  lexicon: BDAG
  rationale: The imperfect ἦς in this contrary-to-fact condition is most naturally
    rendered in English with the pluperfect-like 'had been.' ὧδε means 'here/in this
    place'; 'here' is idiomatic.
- source_word: οὐκ ἂν ἀπέθανεν
  chosen: would not have died
  alternatives:
  - would certainly not have died
  lexicon: BDAG
  rationale: οὐκ + ἄν + aorist indicative expresses the apodosis of a contrary-to-fact
    condition. 'Would not have died' accurately conveys the unreal past result.
- source_word: ὁ ἀδελφός μου
  chosen: my brother
  alternatives:
  - my brother of mine
  lexicon: BDAG
  rationale: ἀδελφός here refers to Martha's male sibling Lazarus, not a fellow believer.
    'My brother' is the direct and contextually correct rendering.
