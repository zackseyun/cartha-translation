theological_decisions:
- issue: Rendering John's temporal note about Caiaphas's office
  chosen_reading: who was high priest that year
  alternative_readings:
  - being high priest of that year
  rationale: The phrase is translated straightforwardly as a historical descriptor
    without importing any theological explanation about the high priesthood or John's
    narrative irony. This preserves the text's wording and leaves broader interpretive
    significance to context.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
