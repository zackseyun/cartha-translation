id: JHN.11.49
reference: John 11:49
source:
  edition: SBLGNT
  text: εἷς δέ τις ἐξ αὐτῶν Καϊάφας, ἀρχιερεὺς ὢν τοῦ ἐνιαυτοῦ ἐκείνου, εἶπεν αὐτοῖς·
    Ὑμεῖς οὐκ οἴδατε οὐδέν,
translation:
  text: But one of them, Caiaphas, who was high priest that year, said to them, “You
    know nothing at all.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “You do not know anything.” The Greek expression is an
      emphatic rebuke, literally using a double negative.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δέ τις ἐξ αὐτῶν
  chosen: But one of them
  alternatives:
  - Now one of them
  - But a certain one of them
  lexicon: BDAG
  rationale: 'εἷς ... τις together idiomatically introduce an individual from the
    group: ''one of them'' or ''a certain one of them.'' English normally does not
    require both elements to be separately represented. δέ is rendered ''But'' to
    mark mild contrast/transition with the preceding discussion.'
- source_word: Καϊάφας
  chosen: Caiaphas
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, following the
    translation philosophy to transliterate names rather than translate them.
- source_word: ἀρχιερεὺς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: The standard and most precise rendering for ἀρχιερεύς in this context
    is 'high priest.' 'Chief priest' would blur the distinction between the singular
    officeholder and the broader priestly leadership.
- source_word: ὢν τοῦ ἐνιαυτοῦ ἐκείνου
  chosen: who was high priest that year
  alternatives:
  - being high priest of that year
  - who was high priest in that year
  lexicon: BDAG
  rationale: The participial phrase modifies Caiaphas. τοῦ ἐνιαυτοῦ ἐκείνου is most
    naturally rendered idiomatically as 'that year' rather than the more wooden 'of
    that year.' 'Who was' gives natural English while preserving the descriptive force
    of ὢν.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: λέγω with dative indirect object is straightforwardly 'said to them.'
    'Told them' is possible but slightly more interpretive.
- source_word: Ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can convey this
    adequately by position and tone without requiring an expanded form, though the
    emphatic force informs the punctuation and overall phrasing.
- source_word: οὐκ οἴδατε οὐδέν
  chosen: know nothing at all
  alternatives:
  - do not know anything
  - know nothing
  lexicon: BDAG
  rationale: The double-negative construction is idiomatic Greek intensification,
    not a logical double negation. 'Know nothing at all' preserves the emphatic rebuke
    in natural English better than the flatter 'do not know anything.'
