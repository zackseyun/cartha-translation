id: JHN.11.26
reference: John 11:26
source:
  edition: SBLGNT
  text: καὶ πᾶς ὁ ζῶν καὶ πιστεύων εἰς ἐμὲ οὐ μὴ ἀποθάνῃ εἰς τὸν αἰῶνα· πιστεύεις
    τοῦτο;
translation:
  text: And everyone who lives and believes in me will certainly never die forever.
    Do you believe this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will certainly never die eternally' / 'will certainly never die spiritually.'
      The Greek states the promise emphatically without explicitly specifying the
      mode of death here.
    reason: alternative_reading
  - marker: b
    text: Literally 'unto the age,' an idiom meaning 'forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ ζῶν
  chosen: everyone who lives
  alternatives:
  - everyone living
  - everyone who is alive
  lexicon: BDAG
  rationale: 'The articular participle with πᾶς functions substantivally and generically:
    ''everyone who lives.'' ''Everyone'' captures the universal/generic force naturally
    in English.'
- source_word: πιστεύων εἰς ἐμέ
  chosen: believes in me
  alternatives:
  - trusts in me
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly denotes personal belief/trust directed toward
    someone. Per doctrine defaults, 'believes' is retained in the main text; 'trusts'
    is a viable lexical alternative but not necessary in the main line here.
- source_word: οὐ μὴ ἀποθάνῃ
  chosen: will certainly never die
  alternatives:
  - will never die
  - shall certainly not die
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    never die' preserves the strong force better than a bare 'will never die,' while
    remaining idiomatic modern English.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - unto the age
  - ever
  lexicon: BDAG
  rationale: This idiom intensifies the negation and is commonly rendered 'forever.'
    It communicates the temporal force clearly in modern English. A more literal 'unto
    the age' would be obscure.
- source_word: πιστεύεις τοῦτο;
  chosen: Do you believe this?
  alternatives:
  - Do you believe that?
  lexicon: BDAG
  rationale: τοῦτο points to Jesus' immediately preceding claim(s). 'This' is the
    most direct and natural deictic rendering in English.
