theological_decisions:
- issue: Meaning of Jesus' promise that the believer 'will certainly never die forever'
  chosen_reading: The statement is rendered to preserve the paradox between physical
    death and ultimate/spiritual death, without collapsing it into an interpretive
    paraphrase.
  alternative_readings:
  - will never die spiritually
  - will never die eternally
  rationale: In context (especially the preceding verse), Jesus speaks in a way that
    distinguishes physical death from the death over which he grants victory. The
    Greek itself states simply and emphatically that the one living and believing
    in him 'will certainly never die forever.' The translation preserves that tension
    rather than resolving it into a doctrinal gloss.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
