theological_decisions:
- issue: Whether Jesus' statement 'You know me, and you know where I am from' should
    be rendered straightforwardly or with explicit irony/scorn
  chosen_reading: Rendered straightforwardly in the main text without added markers
    of irony
  alternative_readings:
  - 'Rendered as a rhetorical question: ''You know me, and you know where I am from?'''
  - Rendered with ironic qualification in translation
  rationale: The Greek form is declarative, though context may imply irony or challenge.
    To preserve theological and rhetorical tension rather than resolve it, the main
    text keeps the declarative wording and leaves the interpretive force to context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of Jesus' origin in 'where I am from' and 'I have not come from myself'
  chosen_reading: Kept broad enough to include both apparent human origin and deeper
    divine mission
  alternative_readings:
  - Purely geographical origin
  - Explicitly heavenly origin
  rationale: John's Gospel often layers meanings regarding Jesus' origin. The translation
    avoids narrowing the phrase to merely earthly geography or explicitly inserting
    heavenly origin where the Greek does not state it in this clause.
  doctrine_reference: Translation philosophy §1 and §3.
- issue: Referent of 'the one who sent me'
  chosen_reading: Left as 'the one who sent me' without explicitly adding 'the Father'
  alternative_readings:
  - the Father who sent me
  rationale: The immediate Greek uses a relational description rather than the explicit
    title 'the Father.' Since the text itself does not name the referent here, the
    translation preserves the wording while allowing Johannine context to inform the
    reader.
  doctrine_reference: 'Translation philosophy §1: Original-language primacy over translation
    tradition.'
