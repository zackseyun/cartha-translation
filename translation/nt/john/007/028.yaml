id: JHN.7.28
reference: John 7:28
source:
  edition: SBLGNT
  text: ἔκραξεν οὖν ἐν τῷ ἱερῷ διδάσκων ὁ Ἰησοῦς καὶ λέγων· Κἀμὲ οἴδατε καὶ οἴδατε
    πόθεν εἰμί· καὶ ἀπ’ ἐμαυτοῦ οὐκ ἐλήλυθα, ἀλλ’ ἔστιν ἀληθινὸς ὁ πέμψας με, ὃν ὑμεῖς
    οὐκ οἴδατε·
translation:
  text: So Jesus cried out in the temple, teaching and saying, “You know me, and you
    know where I am from. And I have not come from myself, but the one who sent me
    is true, whom you do not know.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You know me, and you know where I come from.' The statement may be
      heard as ironic or challenging in context, but the Greek is formally declarative.
    reason: alternative_reading
  - marker: b
    text: '''From myself'' can also be rendered ''on my own,'' expressing that Jesus
      did not come on his own initiative.'
    reason: lexical_alternative
  - marker: c
    text: '''True'' may also carry the sense ''genuine'' or ''real'' in John''s usage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξεν
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: BDAG
  rationale: Conveys a loud, public utterance appropriate to the temple setting. 'Cried
    out' is idiomatic in English and preserves the force without implying distress.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is natural English; the broader sense can be preserved in a footnote
    if needed, but here the standard rendering is sufficient.
- source_word: διδάσκων ... καὶ λέγων
  chosen: teaching and saying
  alternatives:
  - as he was teaching, saying
  - while teaching, he said
  lexicon: BDAG
  rationale: Keeps both participles explicit, reflecting the ongoing public teaching
    context and the manner in which Jesus spoke.
- source_word: Κἀμὲ
  chosen: You know me
  alternatives:
  - You know even me
  - Me—you know
  lexicon: BDAG
  rationale: The crasis adds emphasis ('me also/even me'), but idiomatic English expresses
    the sense adequately with fronted direct address in the clause. Overly literal
    renderings sound unnatural.
- source_word: οἴδατε ... οἴδατε
  chosen: you know ... you know
  alternatives:
  - you know ... and know
  - you are acquainted with ... and know
  lexicon: BDAG
  rationale: The repetition is retained because it is rhetorically significant in
    John's style and sharpens the irony of Jesus' statement.
- source_word: πόθεν εἰμί
  chosen: where I am from
  alternatives:
  - where I come from
  - from where I am
  lexicon: BDAG
  rationale: Natural English for πόθεν with εἰμί in this context. It preserves the
    question of origin without overinterpreting whether the reference is merely geographical
    or deeper.
- source_word: ἀπ’ ἐμαυτοῦ
  chosen: from myself
  alternatives:
  - on my own
  - of myself
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the source metaphor and the Johannine
    theme of Jesus not acting independently. 'On my own' is possible but slightly
    more interpretive.
- source_word: οὐκ ἐλήλυθα
  chosen: I have not come
  alternatives:
  - I did not come
  lexicon: BDAG
  rationale: The perfect is best represented by 'have come,' which fits Johannine
    emphasis on Jesus' present mission as the result of his coming.
- source_word: ἀληθινὸς
  chosen: 'true'
  alternatives:
  - genuine
  - real
  - truthful
  lexicon: BDAG
  rationale: In John, ἀληθινός often carries the sense of what is real or genuine
    in the fullest sense. Here 'true' is concise and traditional, while allowing both
    reliability and genuineness to resonate.
- source_word: ὁ πέμψας με
  chosen: the one who sent me
  alternatives:
  - he who sent me
  - my sender
  lexicon: BDAG
  rationale: This is clear, natural English and preserves the personal agency of the
    Father without importing explanatory language.
- source_word: ὃν ὑμεῖς οὐκ οἴδατε
  chosen: whom you do not know
  alternatives:
  - him you do not know
  lexicon: BDAG
  rationale: Retains the direct accusation and the personal object of knowledge. 'Do
    not know' is preferable to 'have not known' in idiomatic English here.
