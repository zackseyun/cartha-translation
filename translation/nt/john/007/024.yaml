theological_decisions:
- issue: Rendering δίκαιος/δικαίαν in an ethical-judicial context
  chosen_reading: righteous
  alternative_readings:
  - just
  rationale: Although 'just judgment' is possible and idiomatic, 'righteous judgment'
    better preserves the moral and theological texture of the Greek adjective δίκαιος
    without narrowing it to procedural fairness alone. This does not import later
    doctrinal categories; it reflects the lexical range in context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
