  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: In this context Χριστός functions as a messianic title, not a name-like
    designation. The project's default is 'Messiah' where context supports a title
    sense, preserving the Hebraic and theological context of the question.
