id: JHN.7.36
reference: John 7:36
source:
  edition: SBLGNT
  text: τίς ἐστιν ⸂ὁ λόγος οὗτος⸃ ὃν εἶπε· Ζητήσετέ με καὶ οὐχ ⸀εὑρήσετε, καὶ ὅπου
    εἰμὶ ἐγὼ ὑμεῖς οὐ δύνασθε ἐλθεῖν;
translation:
  text: What is this statement that he said, ‘You will seek me and will not find me,
    and where I am, you are not able to come’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What is this word/saying that he said?' The Greek λόγος can mean 'word,'
      'statement,' 'message,' or 'saying' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Some translations render this 'Where I am going, you cannot come,' but the
      Greek text here says 'Where I am,' preserving a deliberate tension in John's
      wording.
    reason: alternative_reading
  - marker: c
    text: Or '‘You will seek me and will not find me,’ and, ‘Where I am, you are not
      able to come’?”'.
    reason: previous_rendering
lexical_decisions:
- source_word: λόγος
  chosen: statement
  alternatives:
  - word
  - message
  - saying
  lexicon: BDAG
  rationale: In this context λόγος refers to the content of what Jesus said rather
    than a single lexical 'word' or a broader theological 'message.' 'Statement' is
    natural modern English and fits the crowd's question about the meaning of his
    utterance.
- source_word: τίς ἐστιν ὁ λόγος οὗτος
  chosen: What is this statement
  alternatives:
  - What is this word
  - What does this statement mean
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the interrogative structure.
    'What is this statement' reflects the Greek wording more directly than the interpretive
    paraphrase 'What does this mean,' while still sounding natural enough in English.
- source_word: Ζητήσετέ με
  chosen: You will seek me
  alternatives:
  - You will look for me
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'look for.' 'Seek' preserves the verbal
    link with Johannine usage and carries slightly more weight than the more casual
    'look for.'
- source_word: οὐχ εὑρήσετε
  chosen: will not find me
  alternatives:
  - will certainly not find me
  lexicon: BDAG
  rationale: A straightforward future negation is best here. English requires repeating
    'me' for clarity, though it is implied from the previous clause.
- source_word: ὅπου εἰμὶ ἐγὼ
  chosen: Where I am
  alternatives:
  - Where I am going
  - Where I am, I myself
  lexicon: BDAG
  rationale: The Greek says 'where I am,' not 'where I am going.' Since the text itself
    uses present εἰμί, the translation preserves that wording and its Johannine theological
    tension rather than resolving it interpretively.
- source_word: οὐ δύνασθε ἐλθεῖν
  chosen: you are not able to come
  alternatives:
  - you cannot come
  lexicon: BDAG
  rationale: This more explicit rendering reflects δύνασθε ('are able') and preserves
    the sense of inability. 'Cannot come' is idiomatic, but 'are not able to come'
    better exposes the underlying Greek for auditability while remaining understandable.
- source_word: εἶπε
  chosen: that he said
  alternatives:
  - that he spoke
  lexicon: BDAG
  rationale: λέγω in aorist here is naturally rendered 'said.' The clause introduces
    the quoted material and is best kept simple.
