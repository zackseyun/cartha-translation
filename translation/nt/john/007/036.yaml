theological_decisions:
- issue: Present tense in Jesus' saying ('Where I am')
  chosen_reading: Retain the present tense 'Where I am' rather than interpretively
    shifting to 'where I am going.'
  alternative_readings:
  - Where I am going
  rationale: The Greek text uses present εἰμί, and in John this can carry theological
    depth regarding Jesus' origin, identity, and relation to the Father. Preserving
    the present maintains the text's tension rather than resolving it into a merely
    spatial future destination.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
revisions:
- timestamp: '2026-04-21T12:24:03Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/007/036.json
  category: awkward_english
  tier: 1
  from: ‘You will seek me and will not find me,’ and, ‘Where I am, you are not able
    to come’?”
  to: ‘You will seek me and will not find me, and where I am, you are not able to
    come’?”
  rationale: The Greek presents a single, continuous saying (λόγος) from Jesus, with
    its two clauses joined by 'καί' (and). The current draft breaks this into two
    separate quotations joined by an external 'and,', which is awkward and misrepresents
    the structure of the original saying. Combining them into a single quotation with
    the 'and' inside the quote marks more accurately reflects the Greek and improves
    the English flow.
