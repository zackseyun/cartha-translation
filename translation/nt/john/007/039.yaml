id: JHN.7.39
reference: John 7:39
source:
  edition: SBLGNT
  text: τοῦτο δὲ εἶπεν περὶ τοῦ πνεύματος ⸀οὗ ἔμελλον λαμβάνειν οἱ ⸀πιστεύσαντες εἰς αὐτόν· οὔπω γὰρ ἦν ⸀πνεῦμα, ὅτι Ἰησοῦς ⸀οὐδέπω ἐδοξάσθη.
translation:
  text: Now he said this about the Spirit, whom those who had believed in him were about to receive; for the Spirit had not yet been given, because Jesus had not yet been glorified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'for the Spirit had not yet been given.' The Greek reads simply, 'for the Spirit was not yet,' linking this to Jesus not yet being glorified.
    reason: alternative_reading
  - marker: b
    text: Or 'for the Spirit was not yet'.
    reason: previous_rendering
lexical_decisions:
- source_word: πνεύματος / πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  - Holy Spirit
  lexicon: BDAG
  rationale: In context Jesus is speaking of the divine Spirit to be received by believers, so capitalized 'Spirit' is warranted. The anarthrous clause οὔπω γὰρ ἦν πνεῦμα is rendered consistently with the same referent rather than weakening it to an impersonal 'spirit.' 'Holy Spirit' is interpretively true in context but adds ἅγιον, which is not present in the Greek.
- source_word: οὗ
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: The relative pronoun refers back to τοῦ πνεύματος. English idiom with a personal referent for the divine Spirit favors 'whom,' which also reflects the personal agency implied in Johannine theology without adding content beyond the referent.
- source_word: ἔμελλον λαμβάνειν
  chosen: were about to receive
  alternatives:
  - were going to receive
  - were destined to receive
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly indicates imminence or future intention. 'Were about to receive' preserves the prospective force more closely than a simple future, while fitting the narrative perspective before glorification/Pentecost.
- source_word: πιστεύσαντες εἰς αὐτόν
  chosen: those who had believed in him
  alternatives:
  - those who believed in him
  - those who put faith in him
  lexicon: BDAG
  rationale: 'The aorist participle is rendered with English pluperfect-like force in relation to the prospective receiving: those who had come to believe were the ones about to receive. ''Believed in him'' is the standard Johannine construction for πιστεύω εἰς and is clearer and more natural than ''put faith in him.'''
- source_word: οὔπω γὰρ ἦν πνεῦμα
  chosen: for the Spirit was not yet
  alternatives:
  - for there was not yet Spirit
  - for the Spirit was not yet present
  - for the Spirit had not yet been given
  lexicon: BDAG
  rationale: This difficult clause is translated closely, preserving the Greek's terseness and theological tension. 'Had not yet been given' is a common interpretive expansion, but 'given' is not in the Greek and would resolve the tension the text leaves implicit. 'The Spirit was not yet' is awkward but auditable and best reflects the wording.
- source_word: οὐδέπω
  chosen: had not yet
  alternatives:
  - not yet
  lexicon: BDAG
  rationale: With the aorist passive ἐδοξάσθη in English, 'had not yet been glorified' gives the natural temporal relation to the prior clause.
- source_word: ἐδοξάσθη
  chosen: been glorified
  alternatives:
  - been exalted
  - entered into glory
  lexicon: BDAG
  rationale: δοξάζω in John regularly carries the theme of Jesus' glorification through death, resurrection, and exaltation. 'Been glorified' preserves the established Johannine term without narrowing it to only one aspect.
