id: JHN.7.23
reference: John 7:23
source:
  edition: SBLGNT
  text: εἰ περιτομὴν ⸀λαμβάνει ἄνθρωπος ἐν σαββάτῳ ἵνα μὴ λυθῇ ὁ νόμος Μωϋσέως, ἐμοὶ
    χολᾶτε ὅτι ὅλον ἄνθρωπον ὑγιῆ ἐποίησα ἐν σαββάτῳ;
translation:
  text: If a man receives circumcision on the Sabbath so that the law of Moses may
    not be broken, are you angry with me because I made a whole man well on the Sabbath?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is circumcised' for 'receives circumcision.' The Greek idiom is literally
      'receives circumcision.'
    reason: lexical_alternative
  - marker: b
    text: Or 'may not be set aside' or 'may not be annulled' for 'may not be broken.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'a whole man well' highlights Jesus' contrast between circumcising
      one part of the body and restoring the entire man.
    reason: cross_reference
lexical_decisions:
- source_word: περιτομὴν λαμβάνει
  chosen: receives circumcision
  alternatives:
  - is circumcised
  - undergoes circumcision
  lexicon: BDAG
  rationale: A natural English rendering of the idiom 'receive circumcision.' It preserves
    the passive sense implied by the expression without over-paraphrasing. 'Is circumcised'
    is possible, but 'receives circumcision' stays closer to the Greek wording.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular and here refers to a male
    specifically, since circumcision is in view. This is not merely generic humanity,
    so 'a man' is the most accurate gender-accurate rendering.
- source_word: ἐν σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: Idiomatic English for the dative temporal expression. In Johannine narrative
    this refers to Sabbath observance as an institution, and English conventionally
    renders this 'on the Sabbath.'
- source_word: ἵνα μὴ λυθῇ ὁ νόμος Μωϋσέως
  chosen: so that the law of Moses may not be broken
  alternatives:
  - so that the law of Moses may not be set aside
  - so that the law of Moses may not be annulled
  lexicon: BDAG
  rationale: λύω can mean loosen, break, set aside, or nullify. In legal context,
    'broken' is the clearest and most idiomatic English expression, while still conveying
    violation of the law.
- source_word: χολᾶτε
  chosen: are you angry with me
  alternatives:
  - are you furious with me
  - are you resentful toward me
  lexicon: BDAG
  rationale: The verb denotes anger or indignation. 'Are you angry with me' is direct,
    natural English and fits Jesus' rhetorical question without overstating the intensity.
- source_word: ὅλον ἄνθρωπον
  chosen: a whole man
  alternatives:
  - an entire man
  - the whole man
  lexicon: BDAG
  rationale: Jesus contrasts circumcising one part of the body with making the entire
    person well. 'A whole man' preserves that contrast better than simply 'a man'
    or 'the whole person,' and retains the masculine reference appropriate to the
    healed individual.
- source_word: ὑγιῆ ἐποίησα
  chosen: I made ... well
  alternatives:
  - I made ... healthy
  - I healed
  lexicon: BDAG
  rationale: The construction literally means 'made healthy/well.' 'I made a whole
    man well' preserves both the verbal form and the rhetorical contrast with partial
    bodily treatment. 'I healed' is smoother but loses the explicit wording and interplay
    with ὅλον.
