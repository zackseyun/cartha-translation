theological_decisions:
- issue: Meaning of Jesus' comparison between circumcision and healing on the Sabbath
  chosen_reading: Jesus argues from accepted Sabbath circumcision to the greater legitimacy
    of restoring an entire man to wholeness on the Sabbath.
  alternative_readings:
  - Jesus contrasts ritual law with compassionate action in a more general sense.
  rationale: The verse's rhetoric depends on the accepted practice of circumcision
    on the Sabbath to avoid violating Mosaic law, then argues a fortiori for the propriety
    of making an entire man well. The translation preserves this logic without importing
    later doctrinal polemic against the law.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
