theological_decisions:
- issue: Meaning of Jesus' 'time' in Johannine context
  chosen_reading: Rendered as 'My time' without expanding to 'hour' or explicitly
    theological language in the main text.
  alternative_readings:
  - My appointed time
  - My hour
  rationale: In John, Jesus' timing often carries theological significance related
    to his mission and glorification, but this verse uses καιρός, not ὥρα. The translation
    preserves the wording of the Greek without importing fuller Johannine theology
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
