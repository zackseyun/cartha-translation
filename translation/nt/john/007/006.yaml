id: JHN.7.6
reference: John 7:6
source:
  edition: SBLGNT
  text: λέγει οὖν αὐτοῖς ὁ Ἰησοῦς· Ὁ καιρὸς ὁ ἐμὸς οὔπω πάρεστιν, ὁ δὲ καιρὸς ὁ ὑμέτερος
    πάντοτέ ἐστιν ἕτοιμος.
translation:
  text: So Jesus said to them, “My time has not yet come, but your time is always
    ready.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “My appointed time has not yet arrived.” The Greek word can mean a fitting
      or appointed time, not merely time in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential or narrative continuation. 'So' is natural modern
    English and preserves the connection without sounding overly formal.
- source_word: λέγει ... ὁ Ἰησοῦς
  chosen: Jesus said
  alternatives:
  - Jesus says
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative
    style normally renders it as simple past. This preserves readability while conveying
    the narrative action.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Standard dative indirect object; no contextual reason to specify further
    in the verse itself.
- source_word: καιρός
  chosen: time
  alternatives:
  - appointed time
  - season
  - opportune time
  lexicon: BDAG
  rationale: καιρός here denotes a fitting or appointed time rather than mere chronological
    time. 'Time' is concise and idiomatic in English, while the contrast with 'always
    ready' still suggests suitability/opportunity. The more explicit 'appointed time'
    is possible but slightly over-interprets the phrase in the main text.
- source_word: ὁ καιρὸς ὁ ἐμός
  chosen: My time
  alternatives:
  - My appointed time
  lexicon: BDAG
  rationale: Keeps the emphatic possessive structure in natural English. Capitalization
    is not warranted; the phrase refers to Jesus' proper or appointed moment in context.
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not now
  lexicon: BDAG
  rationale: Directly expresses that the relevant time has not arrived up to the present
    moment.
- source_word: πάρεστιν
  chosen: has not yet come
  alternatives:
  - is not yet here
  - is not yet present
  lexicon: BDAG
  rationale: πάρεστιν literally means 'is present/has arrived.' 'Has not yet come'
    is idiomatic English and fits temporal language naturally.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Signals contrast between Jesus' time and theirs; 'but' best captures
    the adversative force in context.
- source_word: ὁ καιρὸς ὁ ὑμέτερος
  chosen: your time
  alternatives:
  - your appointed time
  lexicon: BDAG
  rationale: Mirrors the first clause and preserves the contrast between Jesus and
    his brothers.
- source_word: πάντοτέ
  chosen: always
  lexicon: BDAG
  rationale: Straightforward adverb meaning 'at all times.'
- source_word: ἕτοιμος
  chosen: ready
  alternatives:
  - prepared
  - available
  - opportune
  lexicon: BDAG
  rationale: ἕτοιμος means 'ready/prepared.' 'Ready' is the most natural English rendering
    and works well with καιρός in this contrastive statement.
