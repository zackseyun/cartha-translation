id: JHN.7.10
reference: John 7:10
source:
  edition: SBLGNT
  text: Ὡς δὲ ἀνέβησαν οἱ ἀδελφοὶ αὐτοῦ ⸂εἰς τὴν ἑορτήν, τότε καὶ αὐτὸς ἀνέβη⸃, οὐ
    φανερῶς ἀλλὰ ὡς ἐν κρυπτῷ.
translation:
  text: But when his brothers had gone up to the feast, then he also went up, not
    openly but as if in secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but in secret.' The Greek expression is literally 'but as if in secret,'
      which may soften the statement slightly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: But when
  alternatives:
  - Now when
  - And when
  lexicon: BDAG
  rationale: Ὡς with the aorist verb introduces a temporal clause ('when'), while
    δέ marks a mild transition/contrast. 'But when' preserves both the temporal sense
    and the narrative contrast with the preceding context, where Jesus had said he
    was not going up in the same manner as his brothers.
- source_word: ἀνέβησαν ... ἀνέβη
  chosen: had gone up ... went up
  alternatives:
  - went up ... went up
  - had gone ... went
  lexicon: BDAG
  rationale: ἀναβαίνω literally means 'go up,' appropriate here both geographically
    (going up to Jerusalem) and idiomatically for pilgrimage. The first aorist is
    rendered past perfect in English ('had gone up') to clarify sequence after the
    temporal clause; the second remains simple past. Retaining 'up' preserves the
    source wording better than flattening to 'went'.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί here refers specifically to Jesus' male siblings in the immediate
    narrative context (cf. preceding verses), not a mixed-gender group or generic
    kin. 'His brothers' is therefore gender-accurate and contextually precise.
- source_word: εἰς τὴν ἑορτήν
  chosen: to the feast
  alternatives:
  - to the festival
  lexicon: BDAG
  rationale: ἑορτή denotes a festival/feast, specifically the Feast of Tabernacles
    in context. 'Feast' is concise and natural in English, while still fitting the
    Jewish pilgrimage setting. The article is retained.
- source_word: τότε καὶ αὐτὸς
  chosen: then he also
  alternatives:
  - then he too
  - at that time he also
  lexicon: BDAG
  rationale: τότε marks subsequent time ('then'), and καὶ αὐτός adds that Jesus likewise
    went. 'Then he also' preserves the sequence and the additive emphasis without
    overemphasis.
- source_word: οὐ φανερῶς
  chosen: not openly
  alternatives:
  - not publicly
  - not in the open
  lexicon: BDAG
  rationale: φανερῶς means openly, publicly, plainly. 'Not openly' is the most direct
    lexical equivalent and pairs well with the following contrast.
- source_word: ἀλλὰ ὡς ἐν κρυπτῷ
  chosen: but as if in secret
  alternatives:
  - but in secret
  - but privately
  lexicon: BDAG
  rationale: The combination ὡς ἐν κρυπτῷ is slightly qualified; ὡς can mean 'as,
    as if,' softening the expression rather than stating baldly 'in secret.' Rendering
    it 'as if in secret' preserves that nuance better than the smoother but less precise
    'in secret.'
