theological_decisions:
- issue: Relation of Jesus' action here to his earlier statement about not going up
    to the feast
  chosen_reading: Translate the verse straightforwardly without harmonizing; Jesus
    went up later and not openly.
  alternative_readings:
  - Imply that he had changed his mind
  - Translate in a way that resolves the tension with 7:8 by paraphrase
  rationale: The Greek simply narrates that after his brothers went up, Jesus also
    went up, but not openly. The translation preserves the narrative tension rather
    than importing an interpretive resolution, in keeping with the doctrine's instruction
    to preserve theological tension where the text itself does not explain it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
