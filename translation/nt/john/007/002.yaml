id: JHN.7.2
reference: John 7:2
source:
  edition: SBLGNT
  text: ἦν δὲ ἐγγὺς ἡ ἑορτὴ τῶν Ἰουδαίων ἡ σκηνοπηγία.
translation:
  text: Now the Jewish feast, the Feast of Tabernacles, was near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Feast of Booths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as a mild discourse connector in natural English. 'Now' signals
    narrative transition without overstating contrast; 'and' is possible but less
    idiomatic here.
- source_word: ἐγγὺς
  chosen: was near
  alternatives:
  - was close
  - was at hand
  lexicon: BDAG
  rationale: Conveys temporal proximity in clear modern English. 'At hand' is more
    traditional but less natural for the target register.
- source_word: ἑορτὴ
  chosen: feast
  alternatives:
  - festival
  lexicon: BDAG
  rationale: Both are possible; 'feast' preserves the established sense of a religious
    festal observance and fits the appositional naming that follows.
- source_word: τῶν Ἰουδαίων
  chosen: Jewish
  alternatives:
  - of the Jews
  lexicon: BDAG
  rationale: The genitive is adjectival in sense here, identifying the feast as belonging
    to the Jewish people. 'Jewish' is more natural English than the more wooden 'of
    the Jews' and avoids unnecessary awkwardness while preserving meaning.
- source_word: σκηνοπηγία
  chosen: the Feast of Tabernacles
  alternatives:
  - the Festival of Booths
  - the Feast of Booths
  lexicon: BDAG
  rationale: This term denotes the autumn pilgrimage feast associated with temporary
    shelters/booths. 'Feast of Tabernacles' is the most recognizable English rendering;
    'Booths' is more etymologically transparent and is preserved in a footnote.
