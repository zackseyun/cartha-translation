theological_decisions:
- issue: Rendering of Ἰουδαίων in a festival designation
  chosen_reading: Jewish
  alternative_readings:
  - of the Jews
  rationale: In this context the phrase identifies the feast as a Jewish festival,
    not making a polemical statement about 'the Jews.' The adjectival rendering is
    contextually precise and idiomatic.
  doctrine_reference: Translation philosophy §1, §6
- issue: Naming σκηνοπηγία
  chosen_reading: the Feast of Tabernacles
  alternative_readings:
  - the Festival of Booths
  - the Feast of Booths
  rationale: The main text uses the familiar conventional name for readability, while
    preserving the more literal 'Booths' alternative in a footnote for transparency
    and auditability.
  doctrine_reference: Translation philosophy §1, §6
