id: JHN.7.20
reference: John 7:20
source:
  edition: SBLGNT
  text: ἀπεκρίθη ὁ ⸀ὄχλος· Δαιμόνιον ἔχεις· τίς σε ζητεῖ ἀποκτεῖναι;
translation:
  text: The crowd answered, “You have a demon. Who is seeking to kill you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You are demon-possessed.” Literally, “You have a demon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for response in dialogue; 'answered' is natural
    and sufficiently formal.
- source_word: ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or mass of people. 'The crowd' is clear
    modern English and fits the Johannine scene better than the more archaic 'multitude'.
- source_word: Δαιμόνιον ἔχεις
  chosen: You have a demon
  alternatives:
  - You are demon-possessed
  - You have an unclean spirit
  lexicon: BDAG
  rationale: The Greek is literally 'you have a demon.' This preserves the source
    wording without importing the more interpretive idiom 'demon-possessed.' 'Unclean
    spirit' is not the term used here.
- source_word: τίς
  chosen: Who
  alternatives:
  - No one
  lexicon: BDAG
  rationale: An interrogative pronoun is explicit in the Greek. The crowd responds
    with a rhetorical question rather than a direct denial, so 'Who' should be retained.
- source_word: ζητεῖ
  chosen: is seeking
  alternatives:
  - seeks
  - is trying
  lexicon: BDAG
  rationale: Present tense can be rendered simply or progressively. 'Is seeking' captures
    the ongoing sense and pairs naturally with the infinitive that follows.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to murder
  lexicon: BDAG
  rationale: The infinitive means 'to kill/put to death.' 'To kill' is the most direct
    and idiomatic rendering here; 'murder' would add a legal-moral nuance not explicit
    in the verb itself.
