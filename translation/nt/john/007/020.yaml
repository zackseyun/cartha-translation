theological_decisions:
- issue: Rendering of δαιμόνιον in an accusation against Jesus
  chosen_reading: Translate literally as 'demon' in the idiom 'You have a demon.'
  alternative_readings:
  - You are demon-possessed
  rationale: The text reports the crowd's hostile accusation without endorsing it.
    A literal rendering preserves the Greek expression and avoids adding interpretive
    language beyond what the source states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
