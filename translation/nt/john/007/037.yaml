id: JHN.7.37
reference: John 7:37
source:
  edition: SBLGNT
  text: Ἐν δὲ τῇ ἐσχάτῃ ἡμέρᾳ τῇ μεγάλῃ τῆς ἑορτῆς εἱστήκει ὁ Ἰησοῦς, καὶ ἔκραξεν
    λέγων· Ἐάν τις διψᾷ ἐρχέσθω πρός με καὶ πινέτω.
translation:
  text: Now on the last day, the great day of the feast, Jesus stood and cried out,
    saying, “If anyone is thirsty, let him come to me and drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in English, 'let that person come to me and drink.'
      The Greek uses a grammatically singular generic expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ
  chosen: Now on
  alternatives:
  - And on
  - 'On'
  lexicon: BDAG
  rationale: Ἐν with the dative marks time ('on/in'), and δέ is a mild connective.
    'Now on' gives natural English discourse flow without overstating contrast.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: the last day
  alternatives:
  - the final day
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'Last day' is idiomatic and preserves
    the festival setting without importing eschatological overtones beyond the context.
- source_word: τῇ μεγάλῃ τῆς ἑορτῆς
  chosen: the great day of the feast
  alternatives:
  - the great day of the festival
  - the feast's great day
  lexicon: BDAG
  rationale: μέγας here functions attributively with ἡμέρᾳ, and ἑορτή is best rendered
    'feast' in Johannine festival contexts. 'Great day' preserves the emphatic description
    rather than flattening it to merely 'important'.
- source_word: εἱστήκει
  chosen: stood
  alternatives:
  - was standing
  - had taken his stand
  lexicon: BDAG
  rationale: The pluperfect/intransitive form of ἵστημι can denote a standing posture.
    In English narrative, 'stood' is the most natural concise rendering, while still
    conveying Jesus' public stance.
- source_word: ἔκραξεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: κράζω denotes a loud public utterance. 'Cried out' preserves the solemn,
    emphatic force better than the more colloquial 'shouted'.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the cry. 'Saying' keeps the
    Greek structure naturally in English.
- source_word: Ἐάν τις διψᾷ
  chosen: If anyone is thirsty
  alternatives:
  - If anyone thirsts
  lexicon: BDAG
  rationale: τις is indefinite and generic; 'anyone' communicates this clearly. The
    present verb διψάω can be rendered idiomatically as 'is thirsty,' which is more
    natural modern English than 'thirsts' while preserving the metaphorical openness
    of the invitation.
- source_word: ἐρχέσθω πρός με
  chosen: let him come to me
  alternatives:
  - let that person come to me
  - he must come to me
  lexicon: BDAG
  rationale: The present imperative gives an invitation/command. Because τις is grammatically
    singular and generic, 'let him come' is gender-accurate to the source per project
    philosophy; a more inclusive alternative is preserved in a footnote.
- source_word: καὶ πινέτω
  chosen: and drink
  alternatives:
  - and let him drink
  lexicon: BDAG
  rationale: A second imperative coordinated with the first. English idiom commonly
    omits the repeated 'let him' after 'come to me,' and 'and drink' preserves the
    force cleanly.
