theological_decisions:
- issue: Metaphorical force of thirst and drinking
  chosen_reading: Retain the imagery literally as 'thirsty' and 'drink' without explicating
    it as believing or receiving the Spirit in the main text.
  alternative_readings:
  - Interpretive renderings such as 'If anyone longs for life, let him come to me
    and receive'
  rationale: The immediate verse uses vivid invitation imagery that John develops
    in the surrounding context. Preserving the metaphor maintains the theological
    tension and avoids importing explanatory interpretation into the translation itself.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Generic masculine after τις
  chosen_reading: Use 'let him come' in the main text.
  alternative_readings:
  - let them come
  - let that person come
  rationale: The Greek construction is grammatically singular and generic. Per project
    policy, gender-accurate rendering is preferred over gender-neutral smoothing,
    while an inclusive alternative may be noted in a footnote where helpful.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
