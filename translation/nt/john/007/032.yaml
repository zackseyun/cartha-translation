id: JHN.7.32
reference: John 7:32
source:
  edition: SBLGNT
  text: Ἤκουσαν οἱ Φαρισαῖοι τοῦ ὄχλου γογγύζοντος περὶ αὐτοῦ ταῦτα, καὶ ἀπέστειλαν
    ⸂οἱ ἀρχιερεῖς καὶ οἱ Φαρισαῖοι ὑπηρέτας⸃ ἵνα πιάσωσιν αὐτόν.
translation:
  text: The Pharisees heard the crowd muttering these things about him, and the chief
    priests and the Pharisees sent officers to seize him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grumbling' or 'murmuring.' The Greek suggests subdued, discontented
      talk.
    reason: lexical_alternative
  - marker: b
    text: Or 'temple police' or 'guards' for 'officers.' The Greek refers to official
      attendants sent by the Jewish authorities.
    reason: lexical_alternative
  - marker: c
    text: Or 'to arrest him.' The Greek more literally says 'to seize him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσαν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω here denotes receiving report/information,
    not the more durative sense 'were listening.' 'Heard' is the natural English equivalent.
- source_word: γογγύζοντος
  chosen: muttering
  alternatives:
  - grumbling
  - murmuring
  lexicon: BDAG
  rationale: The participle γογγύζω conveys low, discontented or hushed talk. 'Muttering'
    fits the immediate context of subdued discussion in the crowd better than the
    more overtly negative 'grumbling,' while preserving the under-the-breath nuance.
- source_word: τοῦ ὄχλου
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος in John commonly refers to the gathered crowd. 'Crowd' is clear
    modern English and avoids archaic 'multitude.'
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: Standard sense of περί with genitive. 'About him' is idiomatic and accurate.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The neuter plural points to the content of the crowd's remarks. 'These
    things' preserves the plural demonstrative more closely than smoothing to singular
    'this.'
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: The aorist of ἀποστέλλω is straightforwardly rendered 'sent.' 'Dispatched'
    is possible but less natural here.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the leading priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple/Johannine usage refers to the chief-priestly
    leadership, not multiple holders of the singular high-priest office. 'Chief priests'
    is the standard and historically accurate rendering.
- source_word: ὑπηρέτας
  chosen: officers
  alternatives:
  - temple police
  - guards
  - servants
  lexicon: BDAG
  rationale: In Johannine context, ὑπηρέται are official attendants/enforcers under
    Jewish authorities. 'Officers' is concise and accurate; 'temple police' is interpretive
    but worth preserving in a footnote.
- source_word: ἵνα πιάσωσιν αὐτόν
  chosen: to seize him
  alternatives:
  - so that they might arrest him
  - to arrest him
  lexicon: BDAG
  rationale: ἵνα with aorist subjunctive expresses purpose. πιάζω means to seize/capture;
    'seize him' preserves the physical apprehension sense without over-specifying
    legal procedure, though 'arrest him' is a plausible contextual alternative.
