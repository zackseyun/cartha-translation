theological_decisions:
- issue: Institutional identity of ὑπηρέτας
  chosen_reading: official officers under the authority of the chief priests and Pharisees
  alternative_readings:
  - servants
  - temple police
  rationale: The verse concerns an official attempt to apprehend Jesus. Rendering
    ὑπηρέτας as 'officers' preserves that institutional force without importing more
    specificity than the Greek itself states. This is a historical-context decision
    rather than a doctrinally loaded one.
