id: JHN.7.35
reference: John 7:35
source:
  edition: SBLGNT
  text: εἶπον οὖν οἱ Ἰουδαῖοι πρὸς ἑαυτούς· Ποῦ οὗτος μέλλει πορεύεσθαι ὅτι ἡμεῖς
    οὐχ εὑρήσομεν αὐτόν; μὴ εἰς τὴν διασπορὰν τῶν Ἑλλήνων μέλλει πορεύεσθαι καὶ διδάσκειν
    τοὺς Ἕλληνας;
translation:
  text: So the Jews said to one another, “Where is this man about to go, that we will
    not find him? He is not about to go to the dispersion among the Greeks and teach
    the Greeks, is he?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans.” The Greek term can denote Jews generally or, in some contexts,
      people from Judea.
    reason: lexical_alternative
  - marker: b
    text: “The dispersion among the Greeks” refers to Jewish people scattered among
      Greek-speaking populations, not to a dispersion made up of Greeks.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish leaders
  lexicon: BDAG
  rationale: In John, Ἰουδαῖοι often refers to the Jewish people in a localized or
    oppositional sense depending on context. Here the immediate narrative presents
    a group reacting among themselves, and the conventional contextual rendering 'the
    Jews' best matches the Greek form while avoiding importing 'leaders,' which the
    text does not state. 'Judeans' is possible lexically but less likely here because
    the contrast in the verse is not regional but ethnic/corporate.
- source_word: πρὸς ἑαυτούς
  chosen: to one another
  alternatives:
  - among themselves
  - to themselves
  lexicon: BDAG
  rationale: 'The reciprocal sense is clear in context: they are speaking within their
    own group. ''To one another'' is natural English and preserves the interpersonal
    force.'
- source_word: Ποῦ οὗτος
  chosen: Where is this man
  alternatives:
  - Where is he
  - Where is this one
  lexicon: BDAG
  rationale: οὗτος used of Jesus by opponents can sound dismissive or distancing.
    'This man' captures that tone better than the flatter 'he' while remaining idiomatic.
- source_word: μέλλει πορεύεσθαι
  chosen: is about to go
  alternatives:
  - intends to go
  - is going to go
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys imminence or intention. Here the
    speakers speculate about Jesus' next movement; 'is about to go' preserves the
    prospective force without overinterpreting motive.
- source_word: ὅτι ἡμεῖς οὐχ εὑρήσομεν αὐτόν
  chosen: that we will not find him
  alternatives:
  - so that we will not find him
  - that we will not be able to find him
  lexicon: BDAG
  rationale: The clause explains the result envisioned by the speakers. 'That we will
    not find him' is a straightforward rendering of the future verb without adding
    ability language not explicit in the Greek.
- source_word: μὴ
  chosen: is he?
  alternatives:
  - surely not
  - can it be that
  lexicon: BDAG
  rationale: μή introduces a question expecting a negative answer. In English, a tag
    question ('is he?') naturally conveys that expectation while preserving the rhetorical
    force.
- source_word: διασπορὰν τῶν Ἑλλήνων
  chosen: the dispersion among the Greeks
  alternatives:
  - the Dispersion of the Greeks
  - the Jewish Dispersion among the Greeks
  lexicon: BDAG
  rationale: 'διασπορά in Jewish usage commonly refers to Jews scattered among the
    nations. The genitive τῶν Ἑλλήνων is best taken as a genitive of location/association:
    the dispersion located among Greeks, not a dispersion consisting of Greeks. Because
    ''Dispersion'' may be opaque to modern readers, the lower-case ''dispersion among
    the Greeks'' keeps the sense while remaining readable.'
- source_word: Ἕλληνες / Ἕλληνας
  chosen: Greeks
  alternatives:
  - Gentiles
  - Greek-speaking people
  lexicon: BDAG
  rationale: The lexical meaning is 'Greeks.' In some contexts it can broaden toward
    Gentiles, but here the repeated term likely refers to Greeks in the ordinary ethnic-cultural
    sense, especially in contrast with the Jewish dispersion among them.
- source_word: καὶ διδάσκειν τοὺς Ἕλληνας
  chosen: and teach the Greeks
  alternatives:
  - and teach Greek people
  - and teach the Gentiles
  lexicon: BDAG
  rationale: A direct and natural rendering of the infinitive phrase. 'Teach the Greeks'
    preserves the irony of the speakers' speculation without broadening the object
    beyond the Greek text.
