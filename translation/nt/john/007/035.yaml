theological_decisions:
- issue: Rendering Ἰουδαῖοι in Johannine narrative
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: This verse does not require a regional rendering, and 'the Jews' remains
    the most transparent lexical equivalent. Because John can use the term in ways
    that modern readers may misunderstand, the alternative is preserved in a footnote
    for auditability, but the main text does not narrow the reference beyond what
    the Greek states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
