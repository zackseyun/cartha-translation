id: JHN.7.19
reference: John 7:19
source:
  edition: SBLGNT
  text: Οὐ Μωϋσῆς ⸀δέδωκεν ὑμῖν τὸν νόμον; καὶ οὐδεὶς ἐξ ὑμῶν ποιεῖ τὸν νόμον. τί
    με ζητεῖτε ἀποκτεῖναι;
translation:
  text: Did not Moses give you the law? Yet none of you keeps the law. Why are you
    seeking to kill me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Has not Moses given you the law?' The Greek perfect can be rendered
      either way in English.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does the law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ ... δέδωκεν
  chosen: Did not ... give
  alternatives:
  - Has not ... given
  lexicon: BDAG
  rationale: 'The οὐ at the head of the question marks it as expecting an affirmative
    answer: ''Did not ...?'' The perfect δέδωκεν can be rendered ''has given,'' but
    in idiomatic English with Moses as historical subject, ''did ... give'' is more
    natural while preserving the rhetorical force.'
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic law given to Israel. Lowercase 'law'
    is chosen for readable modern English, while the article preserves specificity.
    Capitalized 'Law' is possible to signal the Torah more explicitly, but the referent
    is clear from context.
- source_word: καὶ
  chosen: Yet
  alternatives:
  - And
  - but
  lexicon: BDAG
  rationale: 'Although καί commonly means ''and,'' here the discourse force is adversative/contrastive:
    Moses gave the law, yet none of them does it. ''Yet'' brings out the implied contrast
    in natural English without overstating it.'
- source_word: οὐδεὶς ἐξ ὑμῶν
  chosen: none of you
  alternatives:
  - not one of you
  lexicon: BDAG
  rationale: This is the most natural English equivalent and preserves the emphatic
    total negation.
- source_word: ποιεῖ τὸν νόμον
  chosen: keeps the law
  alternatives:
  - does the law
  - practices the law
  lexicon: BDAG
  rationale: ποιέω literally means 'do,' but with νόμος in this context idiomatic
    English is 'keep the law,' meaning to observe or obey it. 'Does the law' is more
    formally literal but unnatural in contemporary English.
- source_word: τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: 'τί with a verb of seeking plus infinitive is idiomatically causal here:
    ''Why are you seeking...?'' This is standard and natural English.'
- source_word: ζητεῖτε ἀποκτεῖναι
  chosen: are you seeking to kill
  alternatives:
  - do you seek to kill
  - are you trying to kill
  lexicon: BDAG
  rationale: The present tense ζητεῖτε conveys ongoing intent or attempt. 'Are you
    seeking to kill' preserves the verbal nuance and matches Johannine usage. 'Trying
    to kill' is possible but slightly more interpretive.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  lexicon: BDAG
  rationale: The infinitive means 'to kill' or 'put to death.' 'Kill' is the plain,
    direct equivalent and best fits the immediacy of the accusation.
