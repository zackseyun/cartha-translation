theological_decisions:
- issue: Reference of 'the law'
  chosen_reading: Mosaic law given through Moses
  alternative_readings:
  - law in a more general moral sense
  rationale: Because Jesus explicitly names Moses as the giver, νόμος here is best
    understood as the Mosaic law/Torah rather than law in an abstract sense. The translation
    preserves this without adding explanatory wording beyond the text.
