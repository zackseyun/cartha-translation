id: JHN.7.51
reference: John 7:51
source:
  edition: SBLGNT
  text: Μὴ ὁ νόμος ἡμῶν κρίνει τὸν ἄνθρωπον ἐὰν μὴ ἀκούσῃ ⸂πρῶτον παρ’ αὐτοῦ⸃ καὶ
    γνῷ τί ποιεῖ;
translation:
  text: Our law does not judge a man unless it first hears from him and knows what
    he is doing, does it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person.' The Greek says 'a man' as a representative singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'hear him first.' The Greek more literally says 'hear first from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  chosen: does it?
  alternatives:
  - surely ... not
  - it does not ... does it?
  lexicon: BDAG
  rationale: μή at the head of the question marks it as expecting a negative answer.
    In English, a negative statement followed by the tag 'does it?' best conveys the
    rhetorical force.
- source_word: νόμος
  chosen: law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish legal standard or legal tradition appealed
    to by Nicodemus. 'Law' is the most natural rendering. Capitalized 'the Law' is
    possible, but the possessive 'our' already specifies the community's law, and
    lowercase avoids over-specifying the referent as the Pentateuch alone.
- source_word: κρίνει
  chosen: judge
  alternatives:
  - condemn
  - pass judgment on
  lexicon: BDAG
  rationale: κρίνω broadly means to judge or render a decision. 'Judge' preserves
    the legal setting without importing the stronger sense 'condemn,' which the context
    does not require.
- source_word: τὸν ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - the man
  lexicon: BDAG
  rationale: ἄνθρωπον is singular and here generic. Per the translation philosophy's
    gender-accurate principle, 'a man' preserves the representative singular form.
    'A person' is more gender-neutral but less source-near. 'The man' would suggest
    a specific individual not indicated by the generic construction.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: The combination introduces a necessary negative condition. 'Unless' is
    idiomatic modern English and accurately captures the force.
- source_word: ἀκούσῃ πρῶτον παρ’ αὐτοῦ
  chosen: it first hears from him
  alternatives:
  - it first hears him
  - it first hears from his own mouth
  lexicon: BDAG
  rationale: ἀκούω with παρά + genitive naturally means hearing from someone, i.e.,
    receiving testimony directly from him. Including 'first' reflects πρῶτον and preserves
    the procedural sequence.
- source_word: γνῷ
  chosen: knows
  alternatives:
  - learns
  - finds out
  lexicon: BDAG
  rationale: γινώσκω here denotes coming to know the facts of the case. 'Knows' is
    concise and works well with the legal context; 'learns' or 'finds out' are possible
    but less direct.
- source_word: τί ποιεῖ
  chosen: what he is doing
  alternatives:
  - what he does
  - what he has done
  lexicon: BDAG
  rationale: The present tense ποιεῖ is best represented as 'is doing' in English
    to preserve the ongoing or current-action sense. 'What he does' is possible but
    more general; 'what he has done' would shift the tense.
