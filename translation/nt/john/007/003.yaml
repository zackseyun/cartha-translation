theological_decisions:
- issue: Reference of 'his brothers'
  chosen_reading: Jesus' biological brothers/family members are in view as the narrative
    speakers.
  alternative_readings:
  - A broader group of relatives or kin
  rationale: The immediate narrative context in John 7:3–5 concerns Jesus' brothers
    speaking skeptically to him. The translation keeps the familial term straightforward
    without importing later doctrinal conclusions beyond the text.
  doctrine_reference: 'Affirmations: historic ecumenical orthodoxy; preserve what
    the text states without importing extra doctrinal claims.'
