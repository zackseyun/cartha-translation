id: JHN.7.3
reference: John 7:3
source:
  edition: SBLGNT
  text: εἶπον οὖν πρὸς αὐτὸν οἱ ἀδελφοὶ αὐτοῦ· Μετάβηθι ἐντεῦθεν καὶ ὕπαγε εἰς τὴν
    Ἰουδαίαν, ἵνα καὶ οἱ μαθηταί σου ⸀θεωρήσουσιν ⸂σοῦ τὰ ἔργα⸃ ἃ ποιεῖς·
translation:
  text: So his brothers said to him, “Leave here and go to Judea, so that your disciples
    also may see the works you are doing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will see” or “observe.” The Greek verb can emphasize watching or beholding,
      and the future form in this purpose clause may be rendered in slightly different
      ways in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Rendered as a natural discourse connector in English. 'So' preserves
    the inferential/sequential force without sounding overly formal.
- source_word: ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in context refers to
    Jesus' male family members. Per gender-accurate policy, 'his brothers' best matches
    the source rather than a gender-neutral expansion.
- source_word: Μετάβηθι ἐντεῦθεν
  chosen: Leave here
  alternatives:
  - Depart from here
  - Move on from here
  lexicon: BDAG
  rationale: The aorist imperative with ἐντεῦθεν calls for a direct command to depart
    from the present location. 'Leave here' is clear modern English and preserves
    the force.
- source_word: ὕπαγε εἰς τὴν Ἰουδαίαν
  chosen: go to Judea
  alternatives:
  - go away to Judea
  - travel to Judea
  lexicon: BDAG
  rationale: ὕπαγε is a common imperative of movement. 'Go to Judea' is the most natural
    and sufficiently precise rendering.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the Judean region
  lexicon: BDAG
  rationale: Standard geographic rendering of the region name Ἰουδαία.
- source_word: ἵνα καὶ
  chosen: so that ... also
  alternatives:
  - in order that ... too
  - so that even
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and καὶ modifies the following subject/object
    with the sense 'also.' The English structure 'so that your disciples also...'
    preserves both elements idiomatically.
- source_word: οἱ μαθηταί σου
  chosen: your disciples
  alternatives:
  - your followers
  lexicon: BDAG
  rationale: μαθηταί is consistently rendered 'disciples' in Johannine context to
    preserve the teacher-disciple relationship.
- source_word: θεωρήσουσιν
  chosen: may see
  alternatives:
  - will see
  - may observe
  - may behold
  lexicon: BDAG
  rationale: Though formally future indicative, in a purpose clause after ἵνα it functions
    with intended/resultative force. 'May see' is idiomatic English for the purpose
    nuance while retaining the perceptual sense of θεωρέω.
- source_word: σοῦ τὰ ἔργα ἃ ποιεῖς
  chosen: the works you are doing
  alternatives:
  - your works that you do
  - the deeds you are doing
  lexicon: BDAG
  rationale: The genitive pronoun σοῦ is possessive ('your works'), but English more
    naturally expresses this as 'the works you are doing.' 'Works' is preferred over
    'deeds' in John because ἔργα often carries thematic significance for Jesus' signs/actions.
