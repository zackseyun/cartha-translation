theological_decisions:
- issue: Identification of 'the one who sent me'
  chosen_reading: Retain the relational expression 'the one who sent me' rather than
    making the referent explicit in the main text.
  alternative_readings:
  - to the Father who sent me
  rationale: In Johannine context the referent is the Father, but the Greek states
    it indirectly. Preserving the expression avoids importing explanatory material
    while maintaining orthodox coherence with the passage's context.
  doctrine_reference: Translation philosophy §1, §3
