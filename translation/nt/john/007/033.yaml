id: JHN.7.33
reference: John 7:33
source:
  edition: SBLGNT
  text: εἶπεν οὖν ὁ Ἰησοῦς· Ἔτι ⸂χρόνον μικρὸν⸃ μεθ’ ὑμῶν εἰμι καὶ ὑπάγω πρὸς τὸν
    πέμψαντά με.
translation:
  text: So Jesus said, “I am with you a little while longer, and then I am going to
    the one who sent me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for a little time still.”
    reason: lexical_alternative
  - marker: b
    text: “The one who sent me” refers to the Father in John’s broader context.
    reason: cross_reference
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: Ἔτι χρόνον μικρόν
  chosen: a little while longer
  alternatives:
  - for a little time still
  - yet a short time
  lexicon: BDAG
  rationale: The phrase combines ἔτι ('still/yet') with χρόνον μικρόν ('a short time').
    'A little while longer' captures both duration and the sense of remaining time
    in idiomatic English.
- source_word: μεθ’ ὑμῶν εἰμι
  chosen: I am with you
  alternatives:
  - I remain with you
  lexicon: BDAG
  rationale: A straightforward present-tense statement of Jesus' continued presence
    with his hearers. 'I am with you' is the plain sense and keeps the immediacy of
    the Greek.
- source_word: καὶ ὑπάγω
  chosen: and then I am going
  alternatives:
  - and I am going
  - and I go away
  - and I depart
  lexicon: BDAG
  rationale: Ὑπάγω in John often carries the sense of departure, often with theological
    weight toward Jesus' return to the Father. 'I am going' preserves the verbal simplicity;
    adding 'then' makes the temporal sequence explicit in natural English from the
    context of 'a little while longer' without overstating the Greek.
- source_word: πρὸς τὸν πέμψαντά με
  chosen: to the one who sent me
  alternatives:
  - to him who sent me
  - to my sender
  lexicon: BDAG
  rationale: 'The articular participle πέμψαντά functions substantivally: ''the one
    who sent me.'' This preserves the relational and theological force without importing
    an explicit identification beyond the text.'
