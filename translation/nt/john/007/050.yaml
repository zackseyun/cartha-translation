theological_decisions:
- issue: Referent of αὐτόν in 'the one who had come to him earlier'
  chosen_reading: The pronoun refers to Jesus.
  alternative_readings:
  - The pronoun could be left more formally ambiguous as 'him' without explicit identification
    in translation notes.
  rationale: Within John's narrative, Nicodemus is previously identified as the one
    who came to Jesus by night (John 3:1–2). The English text retains 'him' as in
    Greek, while the rationale documents the referent from context rather than importing
    new wording into the verse.
