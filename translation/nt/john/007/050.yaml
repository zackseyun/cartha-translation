id: JHN.7.50
reference: John 7:50
source:
  edition: SBLGNT
  text: λέγει Νικόδημος πρὸς αὐτούς, ὁ ⸀ἐλθὼν πρὸς αὐτὸν ⸀πρότερον, εἷς ὢν ἐξ αὐτῶν·
translation:
  text: Nicodemus said to them—the one who had come to him earlier, being one of them—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who had come to him before.' The pronoun 'him' refers to Jesus in the
      broader context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style is more natural with the simple past here. This preserves the discourse
    function without sounding awkward.
- source_word: Νικόδημος
  chosen: Nicodemus
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to these men
  lexicon: BDAG
  rationale: The preposition πρός with accusative after a speech verb commonly indicates
    the addressee, best rendered 'to them.' The pronoun refers to the group under
    discussion in context.
- source_word: ὁ ἐλθὼν πρὸς αὐτὸν πρότερον
  chosen: the one who had come to him earlier
  alternatives:
  - who had come to him before
  - the one who came to him earlier
  lexicon: BDAG
  rationale: The article plus participle functions substantivally, identifying Nicodemus
    appositionally. 'Had come' reflects the prior action relative to the main verb
    in idiomatic English. πρότερον is rendered 'earlier' to sound natural while preserving
    temporal priority. The pronoun αὐτόν most naturally refers to Jesus from the broader
    Johannine context (cf. John 3:1–2).
- source_word: εἷς ὢν ἐξ αὐτῶν
  chosen: being one of them
  alternatives:
  - who was one of them
  - since he was one of them
  lexicon: BDAG
  rationale: This participial phrase gives identifying background information about
    Nicodemus as a member of their group. 'Being one of them' preserves the participial
    force without over-interpreting it as causal.
