  from: Surely the Messiah does not come from Galilee, does he?
  to: The Messiah doesn’t come from Galilee, does he?
  rationale: The current rendering uses two separate English devices (the introductory
    'Surely' and the tag question 'does he?') to capture the rhetorical force of 'Μὴ
    γὰρ'. While not incorrect, this combination is slightly verbose and feels constructed.
    A more natural and idiomatic English rendering that carries the same force of
    a question expecting a negative answer is the simple tag question, 'The Messiah
    doesn’t come from Galilee, does he?' This alternative is more concise while fully
    capturing the incredulous tone of the speakers.
