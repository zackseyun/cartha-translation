id: JHN.7.41
reference: John 7:41
source:
  edition: SBLGNT
  text: ἄλλοι ἔλεγον· Οὗτός ἐστιν ὁ χριστός· ⸂οἱ δὲ⸃ ἔλεγον· Μὴ γὰρ ἐκ τῆς Γαλιλαίας
    ὁ χριστὸς ἔρχεται;
translation:
  text: Others were saying, “This is the Messiah.” But others were saying, “Surely
    the Messiah does not come from Galilee, does he?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλοι
  chosen: Others
  alternatives:
  - Some others
  lexicon: BDAG
  rationale: Plural substantive adjective indicating another group within the crowd.
    'Others' is natural English and preserves the contrast with the following group.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing/repeated speech in the crowd, better
    reflected by 'were saying' than simple past 'said'.
- source_word: Οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  lexicon: BDAG
  rationale: Natural demonstrative identification in English; 'This one is' is more
    wooden without adding meaning.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ'
    to preserve the Hebraic messianic sense. The article marks it as the expected/anointed
    figure.
- source_word: οἱ δὲ
  chosen: But others
  alternatives:
  - But they
  - And others
  lexicon: BDAG
  rationale: The supplied plural article with δέ introduces a contrasting group. 'But
    others' makes the contrast explicit and idiomatic in English.
- source_word: Μὴ γὰρ
  chosen: Surely ... does ... ?
  alternatives:
  - Does ... really ... ?
  - Is it not the case that ... ?
  lexicon: BDAG
  rationale: μή introducing a question expects a negative answer; English 'Surely
    ... does ... ?' captures the rhetorical force. γάρ adds inferential/emphatic force,
    reflected idiomatically rather than with a separate word.
- source_word: ἐκ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: BDAG
  rationale: ἐκ with place of origin/source is naturally rendered 'from' in contemporary
    English.
- source_word: ἔρχεται
  chosen: does come
  alternatives:
  - comes
  - is coming
  lexicon: BDAG
  rationale: Present tense in a general expectation statement. In English interrogative
    form, 'does come' is required to support the rhetorical question structure; semantically
    it conveys 'comes'.
