theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this verse Χριστός functions as a messianic title under dispute among
    the crowd, not as a name-like designation. Following the doctrine's contested
    terms guidance, 'Messiah' is preferred in the main text, while 'Christ' is preserved
    as an alternative.
