id: JHN.7.31
reference: John 7:31
source:
  edition: SBLGNT
  text: ⸂ἐκ τοῦ ὄχλου δὲ πολλοὶ⸃ ἐπίστευσαν εἰς αὐτόν, καὶ ⸀ἔλεγον· Ὁ χριστὸς ὅταν
    ἔλθῃ ⸀μὴ πλείονα ⸀σημεῖα ποιήσει ὧν οὗτος ἐποίησεν;
translation:
  text: But many from the crowd believed in him, and they were saying, “When the Messiah
    comes, he will not do more signs than this man has done, will he?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it is used as a title in a Jewish messianic context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τοῦ ὄχλου
  chosen: from the crowd
  alternatives:
  - out of the crowd
  - among the crowd
  lexicon: BDAG
  rationale: The phrase marks a subset drawn from the larger crowd. 'From the crowd'
    is natural English and preserves the partitive sense without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Here δέ marks mild contrast with the surrounding unbelief and dispute.
    'But' best signals that contrast in context.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The adjective functions substantivally. 'Many' is concise and idiomatic
    in English.
- source_word: ἐπίστευσαν εἰς αὐτόν
  chosen: believed in him
  alternatives:
  - put their faith in him
  - believed into him
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly expresses personal belief directed toward someone.
    'Believed in him' is standard, accurate English; 'put their faith in him' is possible
    but slightly more interpretive.
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or repeated speech. 'They were saying'
    preserves that aspect in readable English.
- source_word: Ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title is rendered ''Messiah'' rather than
    ''Christ'' to preserve the Jewish messianic context. The article is retained:
    ''the Messiah.'''
- source_word: ὅταν ἔλθῃ
  chosen: When the Messiah comes
  alternatives:
  - whenever the Messiah comes
  - if the Messiah comes
  lexicon: BDAG
  rationale: ὅταν with the aorist subjunctive expresses an indefinite future contingency,
    naturally rendered 'when ... comes' in this rhetorical question.
- source_word: μὴ ... ποιήσει
  chosen: he will not do ... will he?
  alternatives:
  - surely he will not do ...?
  - he will not do ...?
  lexicon: BDAG
  rationale: μή in a question expects a negative answer rhetorically, but in this
    context the force is effectively, 'Surely the Messiah will not do more signs than
    this one has done.' Rendering with the English tag 'will he?' preserves the rhetorical
    expectation without overstatement.
- source_word: πλείονα σημεῖα
  chosen: more signs
  alternatives:
  - greater signs
  - more miraculous signs
  lexicon: BDAG
  rationale: πλείονα is comparative of quantity, not necessarily quality, so 'more
    signs' is preferable to 'greater signs.' 'Miraculous signs' is explanatory but
    adds a nuance not explicit in the Greek.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miracles
  lexicon: BDAG
  rationale: In John, σημεῖα carries theological weight beyond mere miracle by pointing
    to revelatory acts. 'Signs' preserves Johannine terminology.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this person
  lexicon: BDAG
  rationale: The demonstrative refers to Jesus in a somewhat colloquial public manner.
    'This man' is idiomatic and fits the crowd's speech better than the more wooden
    'this one.'
- source_word: ἐποίησεν
  chosen: has done
  alternatives:
  - did
  lexicon: BDAG
  rationale: 'Although the Greek is aorist, English present perfect fits the comparison
    with expected future signs and sounds natural in this discourse context: the signs
    Jesus has already performed remain in view.'
