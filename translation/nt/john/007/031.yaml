theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is clearly titular here ('the Messiah when he comes'), not functioning
    as a name. Following the doctrine's contested-terms guidance, the main text uses
    'Messiah' and preserves 'Christ' as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of the rhetorical question with μή
  chosen_reading: A question expecting the answer 'no,' expressing that the crowd
    sees Jesus' signs as messianically sufficient or unsurpassable
  alternative_readings:
  - A more neutral future question without rhetorical expectation
  rationale: The Greek particle μή in this interrogative normally signals an expected
    negative answer. The translation preserves that force with 'will he?' rather than
    flattening it into a neutral question.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
