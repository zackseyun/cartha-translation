theological_decisions:
- issue: Reference of 'the fathers' in the parenthetical clarification
  chosen_reading: The phrase refers to the patriarchal ancestors, indicating that
    circumcision predates the Mosaic law.
  alternative_readings:
  - A broader reference to Israel's forefathers generally
  rationale: 'Jesus'' point is historical and legal: circumcision''s origin lies prior
    to Moses, so performing it on the Sabbath is already accepted within Jewish practice.
    The translation preserves this without expanding the claim beyond the text.'
  doctrine_reference: Translation philosophy §§1, 3, 4
