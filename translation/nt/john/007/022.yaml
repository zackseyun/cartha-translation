id: JHN.7.22
reference: John 7:22
source:
  edition: SBLGNT
  text: διὰ τοῦτο Μωϋσῆς δέδωκεν ὑμῖν τὴν περιτομήν— οὐχ ὅτι ἐκ τοῦ Μωϋσέως ἐστὶν
    ἀλλ’ ἐκ τῶν πατέρων— καὶ ἐν σαββάτῳ περιτέμνετε ἄνθρωπον.
translation:
  text: For this reason Moses has given you circumcision—not that it is from Moses,
    but from the fathers—and on the Sabbath you circumcise a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not because it is from Moses, but from the fathers.' The parenthetical
      clause explains that circumcision did not originate with Moses but with the
      patriarchs.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - Therefore
  lexicon: BDAG
  rationale: Idiomatic causal connector introducing Jesus' explanation. 'For this
    reason' preserves the explanatory force better than a bare 'therefore' in modern
    English.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names.
- source_word: δέδωκεν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: 'Perfect tense is retained with ''has given'' to reflect a past act with
    present standing result: the institution remains in force for Jesus'' hearers.
    English simple past is possible, but the perfect better represents the Greek aspect
    here.'
- source_word: τὴν περιτομήν
  chosen: circumcision
  lexicon: BDAG
  rationale: Direct rendering of the noun referring to the covenantal practice/institution,
    not merely the act in abstraction.
- source_word: οὐχ ὅτι ἐκ τοῦ Μωϋσέως ἐστὶν ἀλλ’ ἐκ τῶν πατέρων
  chosen: not that it is from Moses, but from the fathers
  alternatives:
  - not because it is from Moses, but from the fathers
  - though it is not from Moses but from the fathers
  lexicon: BDAG
  rationale: The clause is parenthetical and clarifies historical origin. 'From' renders
    ἐκ naturally here as source/origin. 'The fathers' preserves the idiomatic reference
    to the patriarchal ancestors rather than general 'ancestors,' in keeping with
    the Greek wording and biblical register.
- source_word: ἐν σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: Anarthrous dative with temporal sense is idiomatically rendered 'on the
    Sabbath.' This fits the general principle under discussion rather than a single
    indefinite Sabbath.
- source_word: περιτέμνετε
  chosen: you circumcise
  alternatives:
  - you perform circumcision on
  - you circumcise routinely
  lexicon: BDAG
  rationale: 'Present indicative second plural is rendered straightforwardly. The
    present suits customary practice: Jesus addresses what they do as a matter of
    accepted observance.'
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: Gender-accurate policy favors 'man' where the Greek is masculine singular
    and the immediate referent in circumcision is specifically male. 'Person' would
    blur the concrete male reference required by the practice.
