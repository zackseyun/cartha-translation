theological_decisions:
- issue: Identity implied by 'the Prophet'
  chosen_reading: Render as a title-like expression, 'the Prophet,' without collapsing
    it into an explicit identification with the Messiah in the main text.
  alternative_readings:
  - the prophet as a generic prophetic figure
  - the Prophet as effectively synonymous with the Messiah
  rationale: The crowd's statement reflects Jewish expectation and may allude to the
    prophet like Moses, but the verse itself does not explicitly define the title
    beyond the expression used. Preserving 'the Prophet' maintains the text's theological
    tension without importing a fuller interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
