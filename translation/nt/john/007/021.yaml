theological_decisions:
- issue: Johannine significance of ἔργον
  chosen_reading: work
  alternative_readings:
  - deed
  rationale: The verse likely alludes to Jesus' healing on the Sabbath (cf. John 5),
    and John's Gospel often uses 'work' for Jesus' actions in a theologically charged
    way. Rendering ἔργον as 'work' preserves that intertextual and theological resonance
    without importing extra interpretation into the main text.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
