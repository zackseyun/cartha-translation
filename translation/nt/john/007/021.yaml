id: JHN.7.21
reference: John 7:21
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτοῖς· Ἓν ἔργον ἐποίησα καὶ πάντες θαυμάζετε.
translation:
  text: Jesus answered and said to them, “I did one work, and you all marvel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “deed.” The Greek word can mean either, but “work” preserves John's recurring
      use of the term for Jesus' actions.
    reason: lexical_alternative
  - marker: b
    text: Likely referring back to Jesus' healing of the lame man on the Sabbath in
      John 5:1–18.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' preserves the common
    Johannine idiom without unnecessary expansion.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: The paired expression ἀπεκρίθη ... καὶ εἶπεν is a common Semitic-influenced
    narrative formula. Rendering both verbs as 'answered and said' preserves the source
    structure and emphasis better than collapsing them into a single English verb.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to them.'
- source_word: Ἓν
  chosen: one
  alternatives:
  - a single
  lexicon: BDAG
  rationale: 'Retains the emphatic numeral: Jesus highlights a single deed as the
    cause of their reaction.'
- source_word: ἔργον
  chosen: work
  alternatives:
  - deed
  lexicon: BDAG
  rationale: In John, ἔργον often carries theological weight for Jesus' deeds/works.
    'Work' preserves Johannine resonance better than 'deed,' while remaining natural
    English.
- source_word: ἐποίησα
  chosen: I did
  alternatives:
  - I performed
  lexicon: BDAG
  rationale: Simple past active is best represented by 'I did.' 'Performed' is possible
    but sounds more formal than the Greek requires.
- source_word: πάντες
  chosen: you all
  alternatives:
  - all of you
  - everyone
  lexicon: BDAG
  rationale: Although literally 'all,' in direct address with the following second-person
    plural verb it refers to the whole group being addressed. 'You all' makes the
    plural explicit in natural English.
- source_word: θαυμάζετε
  chosen: marvel
  alternatives:
  - are amazed
  - wonder
  lexicon: BDAG
  rationale: 'Present tense is preserved as a vivid present: ''you all marvel.'' ''Marvel''
    captures the sense of astonishment and possible perplexity without over-interpreting
    it as purely positive amazement.'
