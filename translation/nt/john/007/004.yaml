id: JHN.7.4
reference: John 7:4
source:
  edition: SBLGNT
  text: οὐδεὶς γάρ ⸂τι ἐν κρυπτῷ⸃ ποιεῖ καὶ ζητεῖ αὐτὸς ἐν παρρησίᾳ εἶναι· εἰ ταῦτα
    ποιεῖς, φανέρωσον σεαυτὸν τῷ κόσμῳ.
translation:
  text: For no one does anything in secret while seeking to be in public view. If
    you do these things, show yourself to the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be openly known' / 'to be public.' The Greek expression emphasizes
      public openness or visibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard indefinite negative pronoun; 'no one' is clear, natural modern
    English and fits the generalized statement.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - after all
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this statement to the previous
    verse. 'For' is concise and natural here.
- source_word: τι ἐν κρυπτῷ ποιεῖ
  chosen: does anything in secret
  alternatives:
  - does something in secret
  - acts secretly
  lexicon: BDAG
  rationale: The enclitic τι is an indefinite object, best represented by 'anything.'
    ἐν κρυπτῷ is idiomatic for hiddenness/secrecy. 'Does anything in secret' preserves
    both the object and the idiom without over-paraphrase.
- source_word: ζητεῖ
  chosen: seeking
  alternatives:
  - wants
  - tries
  lexicon: BDAG
  rationale: Rendered as a participial idea in English ('while seeking') to make the
    Greek coordination natural in English while preserving the sense of intentional
    pursuit.
- source_word: αὐτὸς
  chosen: while seeking
  alternatives:
  - and yet seeks himself
  - while he himself seeks
  lexicon: BDAG
  rationale: The pronoun adds emphasis to the subject. English does not require an
    explicit reflexive/emphatic pronoun here; the contrast is adequately conveyed
    by the clause structure. The emphasis is represented implicitly rather than woodenly.
- source_word: ἐν παρρησίᾳ εἶναι
  chosen: to be in public view
  alternatives:
  - to be openly known
  - to be public
  - to be openly
  lexicon: BDAG
  rationale: παρρησία can denote openness/publicity/frankness. In this context, the
    brothers are speaking about public visibility rather than bold speech, so 'to
    be in public view' best fits the immediate sense.
- source_word: εἰ ταῦτα ποιεῖς
  chosen: If you do these things
  alternatives:
  - If you are doing these things
  lexicon: BDAG
  rationale: Simple present condition in Greek; English simple present is the most
    natural rendering here.
- source_word: φανέρωσον σεαυτὸν
  chosen: show yourself
  alternatives:
  - make yourself known
  - reveal yourself
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive public self-disclosure. 'Show
    yourself' is direct, idiomatic, and fits the taunting tone of the speakers.
- source_word: τῷ κόσμῳ
  chosen: to the world
  alternatives:
  - to the public
  lexicon: BDAG
  rationale: κόσμος in John often carries more than merely 'the public'; 'the world'
    preserves Johannine diction and possible thematic resonance without importing
    extra theology into this verse.
