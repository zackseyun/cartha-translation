theological_decisions:
- issue: Meaning of κόσμος in Johannine context
  chosen_reading: the world
  alternative_readings:
  - the public
  rationale: Although the immediate context concerns public visibility, John's recurring
    use of κόσμος is theologically and literarily significant. Rendering it 'the world'
    preserves that resonance while still making sense in context.
