theological_decisions:
- issue: Rhetorical force of the negative question
  chosen_reading: Render as a rhetorical question expecting a negative answer without
    converting it into an explicit denial.
  alternative_readings:
  - Surely none of the rulers or Pharisees has believed in him.
  rationale: The Greek μή τις signals that the speakers expect the answer 'no,' but
    the text is still phrased as a question. Preserving that form maintains the narrative
    tone and the speakers' dismissive rhetoric without adding more than the Greek
    states.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
