id: JHN.7.48
reference: John 7:48
source:
  edition: SBLGNT
  text: μή τις ἐκ τῶν ἀρχόντων ἐπίστευσεν εἰς αὐτὸν ἢ ἐκ τῶν Φαρισαίων;
translation:
  text: Has any one of the rulers or of the Pharisees believed in him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: a question framed with μή expects the answer ''no.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τις
  chosen: Has any one
  alternatives:
  - Has anyone
  - Surely no one has
  lexicon: BDAG
  rationale: In this interrogative construction, μή introduces a question expecting
    a negative answer. Rendering it as 'Has any one' preserves the rhetorical question
    form in natural English without over-paraphrasing the implied 'no.' 'Surely no
    one has' makes the implication too explicit for the main text.
- source_word: ἐκ τῶν ἀρχόντων
  chosen: of the rulers
  alternatives:
  - from the rulers
  - of the authorities
  - of the leaders
  lexicon: BDAG
  rationale: ἄρχοντες here refers to recognized Jewish ruling authorities. 'Rulers'
    is concise and traditional while still understandable. 'Authorities' is possible
    but slightly more interpretive; 'leaders' is broader and less formal than the
    likely social-political sense.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - put faith
  - trusted
  lexicon: BDAG
  rationale: Aorist ἐπίστευσεν is best rendered with the simple English past 'believed'
    in this rhetorical question. This matches normal Johannine usage and keeps consistency
    with the default rendering of πιστεύω/πίστις language.
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: John frequently uses πιστεύω εἰς with the sense 'believe in.' Although
    more literally 'into him,' idiomatic English requires 'in him.' 'On him' is archaic
    in this context.
- source_word: ἢ
  chosen: or
  alternatives:
  - or even
  lexicon: BDAG
  rationale: Simple coordination is sufficient. The rhetorical force comes from the
    whole question, so 'or' is preferable to the more interpretive 'or even.'
- source_word: ἐκ τῶν Φαρισαίων
  chosen: of the Pharisees
  alternatives:
  - from the Pharisees
  lexicon: BDAG
  rationale: Parallel with 'of the rulers' preserves the Greek structure and the sense
    of membership within a group. 'Pharisees' is a standard transliteration of the
    group name.
