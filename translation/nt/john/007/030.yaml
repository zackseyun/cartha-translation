theological_decisions:
- issue: Meaning of 'his hour' in Johannine context
  chosen_reading: Retain the literal expression 'his hour' in the main text without
    expanding it.
  alternative_readings:
  - his time had not yet come
  - the appointed time for his death had not yet come
  rationale: The phrase carries theological depth in John and points to God's sovereign
    timing in Jesus' mission, but the verse itself does not explicitly define the
    hour as only death or arrest. Preserving the expression maintains the text's theological
    tension rather than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
