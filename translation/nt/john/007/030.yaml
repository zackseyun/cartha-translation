id: JHN.7.30
reference: John 7:30
source:
  edition: SBLGNT
  text: ἐζήτουν οὖν αὐτὸν πιάσαι, καὶ οὐδεὶς ἐπέβαλεν ἐπ’ αὐτὸν τὴν χεῖρα, ὅτι οὔπω
    ἐληλύθει ἡ ὥρα αὐτοῦ.
translation:
  text: So they were seeking to seize him, yet no one laid a hand on him, because
    his hour had not yet come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were trying to arrest him.' The Greek verb can mean 'to seize,'
      and in context this likely implies arrest.
    reason: lexical_alternative
  - marker: b
    text: '''His hour'' is a recurring expression in John for the divinely appointed
      time in Jesus'' mission, especially his suffering, death, resurrection, and
      glorification.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐζήτουν
  chosen: they were seeking
  alternatives:
  - they were trying
  - they sought
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing or repeated attempt, best reflected by
    'were seeking' rather than a simple past. 'Trying' is possible but slightly more
    interpretive.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding discussion. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: πιάσαι
  chosen: to seize
  alternatives:
  - to arrest
  - to take
  lexicon: BDAG
  rationale: The verb commonly means to seize or grasp. 'Arrest' is contextually plausible,
    but 'seize' stays closer to the lexical sense and avoids importing a more formal
    legal nuance not explicit in the verb itself.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard, clear rendering of the indefinite negative pronoun.
- source_word: ἐπέβαλεν ἐπ’ αὐτὸν τὴν χεῖρα
  chosen: laid a hand on him
  alternatives:
  - put his hand on him
  - laid hands on him
  lexicon: BDAG
  rationale: This is an idiomatic expression for taking hold of someone. 'Laid a hand
    on him' is idiomatic English and preserves the singular 'hand' of the Greek better
    than 'laid hands on him.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason no one acted. 'Because' is clearer in contemporary
    English than 'for'.
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not as yet
  lexicon: BDAG
  rationale: Straightforward temporal negation.
- source_word: ἐληλύθει
  chosen: had come
  alternatives:
  - had arrived
  lexicon: BDAG
  rationale: Pluperfect of ἔρχομαι indicates that the decisive time had not yet arrived
    by that point. 'Had come' is the most natural English equivalent.
- source_word: ἡ ὥρα αὐτοῦ
  chosen: his hour
  alternatives:
  - his time
  - the appointed hour for him
  lexicon: BDAG
  rationale: In John, 'hour' is a loaded narrative-theological term referring to the
    divinely appointed time of Jesus' glorification through suffering, death, and
    exaltation. Retaining 'hour' preserves Johannine terminology and intertextual
    consistency better than flattening it to 'time'.
