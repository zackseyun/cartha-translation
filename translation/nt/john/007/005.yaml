id: JHN.7.5
reference: John 7:5
source:
  edition: SBLGNT
  text: οὐδὲ γὰρ οἱ ἀδελφοὶ αὐτοῦ ἐπίστευον εἰς αὐτόν.
translation:
  text: For not even his brothers were believing in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For not even his brothers believed in him.' The Greek imperfect verb
      can be rendered as a simple past ('believed') or as ongoing past action ('were
      believing').
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor
  - not ... either
  lexicon: BDAG
  rationale: οὐδὲ here intensifies the statement rather than simply coordinating it;
    'not even' best captures the emphatic sense in natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γὰρ gives the explanatory ground for the preceding context. 'For' preserves
    the discourse connection with minimal interpretive expansion.
- source_word: ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in this context refers
    specifically to Jesus' male siblings/kin as presented in the narrative. Per the
    gender-accurate policy, 'brothers' is preferred over gender-neutral renderings.
- source_word: ἐπίστευον
  chosen: were believing
  alternatives:
  - believed
  - were trusting
  lexicon: BDAG
  rationale: The imperfect tense presents ongoing or characteristic past action. 'Were
    believing' preserves that aspect more transparently than the simple past 'believed,'
    while remaining understandable in context.
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: With πιστεύω, εἰς commonly expresses personal trust directed toward someone.
    'In him' is the standard and clearest English rendering here.
