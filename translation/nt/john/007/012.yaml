theological_decisions:
- issue: Characterization of Jesus by the crowd
  chosen_reading: Rendered the divided public opinion without softening either positive
    or negative assessment.
  rationale: The verse reports conflicting human judgments about Jesus, not the narrator's
    endorsement of either claim. The translation preserves that tension by reporting
    both statements directly and neutrally.
  doctrine_reference: Preserve theological tension rather than resolve it.
