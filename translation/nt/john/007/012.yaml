id: JHN.7.12
reference: John 7:12
source:
  edition: SBLGNT
  text: καὶ γογγυσμὸς ⸂περὶ αὐτοῦ ἦν πολὺς⸃ ἐν τοῖς ὄχλοις· οἱ μὲν ἔλεγον ὅτι Ἀγαθός
    ἐστιν, ἄλλοι ⸀δὲ ἔλεγον· Οὔ, ἀλλὰ πλανᾷ τὸν ὄχλον.
translation:
  text: And there was much murmuring about him among the crowds. Some were saying,
    “He is a good man.” Others were saying, “No, on the contrary, he is misleading
    the crowd.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “grumbling” or “whispering” about him.
    reason: lexical_alternative
  - marker: b
    text: Or “he deceives the crowd” or “he leads the crowd astray.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γογγυσμός
  chosen: murmuring
  alternatives:
  - grumbling
  - whispering
  - discussion
  lexicon: BDAG
  rationale: The noun denotes low-voiced complaint or muttering rather than open public
    debate. 'Murmuring' preserves the subdued, unofficial character of the talk about
    Jesus during the feast. 'Grumbling' is possible, but can sound more like complaint
    than divided whispering; 'discussion' is too neutral.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'About him'
    is idiomatic modern English and preserves the referential sense without adding
    interpretation.
- source_word: πολύς
  chosen: much
  alternatives:
  - a great deal of
  - considerable
  lexicon: BDAG
  rationale: Used predicatively with γογγυσμός, it intensifies the extent of the murmuring.
    'Much' is concise and natural in English.
- source_word: ἐν τοῖς ὄχλοις
  chosen: among the crowds
  alternatives:
  - in the crowds
  - among the people
  lexicon: BDAG
  rationale: ὄχλοι in John often refers to the gathered masses rather than a single
    unified group. 'Among the crowds' reflects the plural and the dispersed setting
    better than 'in the crowds,' while avoiding the overgeneralized 'people.'
- source_word: οἱ μὲν ... ἄλλοι δὲ
  chosen: Some ... Others ...
  alternatives:
  - On the one hand ... on the other hand ...
  - Some people ... but others ...
  lexicon: BDAG
  rationale: This pair marks contrasting groups within the crowds. 'Some ... Others
    ...' is the clearest natural English equivalent.
- source_word: Ἀγαθός
  chosen: a good man
  alternatives:
  - good
  - upright
  - virtuous
  lexicon: BDAG
  rationale: Although the Greek predicate adjective is simply 'good,' English idiom
    in this context normally supplies 'man' to express the judgment being made about
    Jesus' character. This is not an added doctrinal claim but an idiomatic completion
    of the implied personal predicate.
- source_word: Οὔ, ἀλλὰ
  chosen: No, on the contrary,
  alternatives:
  - No, rather,
  - No; instead,
  lexicon: BDAG
  rationale: The combination gives a direct denial followed by correction. 'On the
    contrary' captures the emphatic rebuttal more clearly than a bare 'rather,' while
    remaining natural.
- source_word: πλανᾷ
  chosen: is misleading
  alternatives:
  - deceives
  - leads astray
  lexicon: BDAG
  rationale: πλανάω can mean to deceive or lead astray. 'Is misleading' communicates
    the present active sense in accessible modern English without over-specifying
    whether the emphasis is intentional deceit or resulting error. Because 'deceives'
    is a strong viable alternative, it is preserved in a footnote.
- source_word: τὸν ὄχλον
  chosen: the crowd
  alternatives:
  - the people
  - the multitude
  lexicon: BDAG
  rationale: Singular ὄχλος here likely refers collectively to the mass of people.
    'The crowd' is the most natural collective rendering in context and maintains
    lexical connection with ὄχλοις earlier, though English shifts from plural to singular
    because the Greek does so.
