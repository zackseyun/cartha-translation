theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this verse Χριστός functions as the expected messianic title rather
    than a name-like designation. Following the doctrine's contested-terms guidance,
    'Messiah' preserves the Jewish and eschatological context of the crowd's statement.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Nature of the crowd's claim about the Messiah's origin
  chosen_reading: Translate their statement straightforwardly without endorsing it
  alternative_readings:
  - Interpretively expand to 'no one knows where the Messiah will come from'
  rationale: The verse reports a popular expectation or misunderstanding in the crowd,
    not the narrator's doctrinal assertion. The translation preserves the statement
    as spoken, without importing explanatory theology into the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
