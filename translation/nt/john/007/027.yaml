id: JHN.7.27
reference: John 7:27
source:
  edition: SBLGNT
  text: ἀλλὰ τοῦτον οἴδαμεν πόθεν ἐστίν· ὁ δὲ χριστὸς ὅταν ἔρχηται οὐδεὶς γινώσκει
    πόθεν ἐστίν.
translation:
  text: But we know where this man is from; yet when the Messiah comes, no one knows
    where he is from.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'But we know where this one comes from; but when the Christ comes, no
      one knows where he comes from.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast with the preceding discussion; 'But' is natural and sufficiently
    direct in English.
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - this person
  lexicon: BDAG
  rationale: The demonstrative refers to Jesus personally. 'This man' captures the
    slightly pointed, concrete reference better than the more wooden 'this one.'
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we are acquainted with
  - we understand
  lexicon: BDAG
  rationale: Straightforward rendering of οἶδα as knowledge possessed by the speakers.
- source_word: πόθεν ἐστίν
  chosen: where this man is from / where he is from
  alternatives:
  - where he comes from
  - his origin
  lexicon: BDAG
  rationale: πόθεν asks about source or origin. 'Where ... is from' is idiomatic modern
    English and preserves the repeated wording across both clauses.
- source_word: ὁ δὲ χριστός
  chosen: yet when the Messiah comes
  alternatives:
  - but the Christ, when he comes
  - but when the Anointed One comes
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is rendered 'Messiah' rather than 'Christ.'
    δέ is carried by 'yet' to maintain the contrast. The article marks the expected
    messianic figure, not a proper name.
- source_word: ὅταν ἔρχηται
  chosen: when the Messiah comes
  alternatives:
  - whenever the Messiah comes
  lexicon: BDAG
  rationale: ὅταν with the subjunctive expresses an indefinite future contingency.
    In English, 'when ... comes' best fits the expected sense here without awkwardness.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Natural modern English for the universal negation.
- source_word: γινώσκει
  chosen: knows
  alternatives:
  - recognizes
  - is aware
  lexicon: BDAG
  rationale: Maintains the lexical distinction from οἴδαμεν only as far as English
    allows; both verbs concern knowledge here, and 'knows' is the clearest rendering.
