theological_decisions:
- issue: Referent of 'the Jews' (τῶν Ἰουδαίων) in Johannine narrative
  chosen_reading: Retain 'the Jews' in the main text, with a footnote noting that
    in John this often refers more specifically to the Judean Jewish authorities or
    leadership.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: This is not a doctrinally contested term in the provided table, but it
    is theologically and historically sensitive. Rendering it directly preserves the
    Greek wording and avoids importing an interpretive narrowing into the main text.
    A footnote documents the likely contextual sense so the translation remains transparent
    and does not encourage anachronistic or anti-Jewish misreading.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension), §6 (readable modern English)
