id: JHN.7.13
reference: John 7:13
source:
  edition: SBLGNT
  text: οὐδεὶς μέντοι παρρησίᾳ ἐλάλει περὶ αὐτοῦ διὰ τὸν φόβον τῶν Ἰουδαίων.
translation:
  text: Yet no one was speaking openly about him because of fear of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more specifically in this context, 'the Jewish leaders' or 'the Judean
      authorities.' In John, 'the Jews' can refer to the Jewish people generally or,
      in some passages, to the Jerusalem-based authorities opposed to Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Indefinite negative pronoun referring to the crowd in a comprehensive
    way. 'No one' is standard, clear English and fits the singular verb.
- source_word: μέντοι
  chosen: Yet
  alternatives:
  - however
  - nevertheless
  lexicon: BDAG
  rationale: Marks a mild adversative contrast with the preceding discussion about
    differing opinions. 'Yet' is concise and natural in modern English.
- source_word: παρρησίᾳ
  chosen: openly
  alternatives:
  - publicly
  - plainly
  - with boldness
  lexicon: BDAG
  rationale: The noun denotes openness, frankness, or bold/public speech. In this
    context the emphasis is on speaking without concealment in public view, so the
    adverbial English 'openly' best captures the sense.
- source_word: ἐλάλει
  chosen: was speaking
  alternatives:
  - spoke
  - was talking
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or customary action in the festival
    setting. 'Was speaking' preserves the imperfective aspect better than simple past
    'spoke.'
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of περί with the genitive. 'About him' is
    natural modern English.
- source_word: διὰ τὸν φόβον
  chosen: because of fear
  alternatives:
  - for fear of
  - because they feared
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or cause. 'Because of fear'
    keeps the nominal construction of the Greek without over-paraphrasing.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι in John can denote Judeans, Jewish authorities, or Jews more
    broadly depending on context. Here the phrase refers to the socially powerful
    group whose hostility created fear, likely the Judean/Jewish authorities in Jerusalem.
    The main text retains the traditional and formally direct 'the Jews' because that
    is the lexical form present, while a footnote preserves the contextual alternative
    to avoid flattening Johannine usage.
