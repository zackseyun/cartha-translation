id: JHN.7.25
reference: John 7:25
source:
  edition: SBLGNT
  text: Ἔλεγον οὖν τινες ἐκ τῶν Ἱεροσολυμιτῶν· Οὐχ οὗτός ἐστιν ὃν ζητοῦσιν ἀποκτεῖναι;
translation:
  text: So some of the people of Jerusalem were saying, “Is this not the man they
    are seeking to kill?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from among the Jerusalemites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔλεγον
  chosen: were saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in the scene; 'were
    saying' better reflects the aspect than simple past 'said.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset. 'Some' is concise
    and idiomatic; 'people' is supplied in English by context and clarified by the
    following phrase.
- source_word: ἐκ τῶν Ἱεροσολυμιτῶν
  chosen: of the people of Jerusalem
  alternatives:
  - from the Jerusalemites
  - from among the inhabitants of Jerusalem
  lexicon: BDAG
  rationale: Ἱεροσολυμίτης means an inhabitant of Jerusalem. 'Jerusalemites' is accurate
    but less natural for many readers; 'the people of Jerusalem' communicates the
    sense clearly in readable modern English.
- source_word: Οὐχ
  chosen: Is ... not
  alternatives:
  - Isn't
  lexicon: BDAG
  rationale: Introduces a question expecting an affirmative answer. Rendering with
    'Is ... not' preserves the rhetorical force in a slightly more formal but clear
    way.
- source_word: οὗτός
  chosen: this
  alternatives:
  - this man
  - he
  lexicon: BDAG
  rationale: Demonstrative pronoun pointing to Jesus. In English, 'this' naturally
    pairs with the supplied predicate noun 'the man' to make the sentence idiomatic.
- source_word: ὃν
  chosen: they
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Relative pronoun functions as the object of 'seeking to kill.' English
    idiom prefers restructuring to 'the man they are seeking to kill' rather than
    the more formal 'whom they are seeking to kill.'
- source_word: ζητοῦσιν
  chosen: are seeking
  alternatives:
  - seek
  - are trying
  lexicon: BDAG
  rationale: Present tense conveys current ongoing intent. 'Are seeking' preserves
    the verbal aspect and leaves the object infinitive construction intact.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  lexicon: BDAG
  rationale: The infinitive means to kill. 'To kill' is the plain lexical sense and
    best fits the immediate hostile context without adding judicial nuance that 'put
    to death' might suggest.
