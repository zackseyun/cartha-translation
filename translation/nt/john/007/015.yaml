id: JHN.7.15
reference: John 7:15
source:
  edition: SBLGNT
  text: ⸂ἐθαύμαζον οὖν⸃ οἱ Ἰουδαῖοι λέγοντες· Πῶς οὗτος γράμματα οἶδεν μὴ μεμαθηκώς;
translation:
  text: So the Jews were marveling, saying, “How does this man know letters without
    having studied?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How does this man have such learning?” Greek “know letters.”
    reason: lexical_alternative
  - marker: b
    text: In John, “the Jews” here refers contextually to Jesus’ Jewish interlocutors/opponents
      in Jerusalem, likely including Judean authorities, not to the Jewish people
      as a whole.
    reason: cultural_note
lexical_decisions:
- source_word: ἐθαύμαζον
  chosen: were marveling
  alternatives:
  - were amazed
  - were astonished
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive reaction, so 'were marveling'
    preserves the durative sense better than a simple past. 'Marvel' also fits the
    tone of surprised wonder.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is the standard Johannine wording and is most directly
    rendered 'the Jews.' In context it refers to the Jewish interlocutors/opponents
    in Jerusalem rather than all Jewish people universally, but the translation keeps
    the lexical form of the Greek rather than narrowing it interpretively in the main
    text.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Participial construction introducing direct speech is idiomatically rendered
    'saying.' The connective sense is adequately carried in English without adding
    extra weight.
- source_word: Πῶς
  chosen: How
  alternatives:
  - how is it that
  lexicon: BDAG
  rationale: Direct interrogative asking by what means or in what way. Simple 'How'
    is both accurate and natural.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: Though literally 'this one,' English idiom in this context is 'this man.'
    It preserves the somewhat distancing tone without becoming overly colloquial or
    pejorative.
- source_word: γράμματα
  chosen: letters
  alternatives:
  - learning
  - the Scriptures
  - literature
  lexicon: BDAG
  rationale: γράμματα literally means 'letters' and by extension literacy/learning.
    Here the point is recognized learning or scholarly knowledge. 'Know letters' preserves
    the Greek idiom transparently, while the footnote preserves the idiomatic sense
    'learning.'
- source_word: οἶδεν
  chosen: know
  alternatives:
  - has knowledge of
  - understands
  lexicon: BDAG
  rationale: Present English 'know' best matches the stative force of οἶδα in this
    context and keeps the question concise.
- source_word: μὴ μεμαθηκώς
  chosen: without having studied
  alternatives:
  - though he has not been taught
  - without being educated
  lexicon: BDAG
  rationale: Perfect participle from μανθάνω indicates lacking the expected process/result
    of formal learning. 'Without having studied' communicates the sense that he has
    not received recognized instruction, especially rabbinic training, without over-specifying
    the institution.
