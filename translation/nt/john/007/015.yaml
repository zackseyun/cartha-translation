theological_decisions:
- issue: Referent and translation of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: To follow original-language primacy and avoid importing a narrower interpretive
    gloss into the main text, the standard lexical rendering 'the Jews' is retained.
    Because modern readers may misread this as an ethnic generalization, a footnote
    clarifies the contextual referent as the Judean/Jewish authorities or interlocutors
    in Jerusalem, not the Jewish people as a whole.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
