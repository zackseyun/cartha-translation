id: JHN.7.46
reference: John 7:46
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν οἱ ὑπηρέται· Οὐδέποτε ⸂ἐλάλησεν οὕτως⸃ ⸀ἄνθρωπος.
translation:
  text: The officers answered, “Never has a man spoken like this.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Never has anyone spoken like this.” The Greek reads “a man,” using a
      masculine singular form with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent from ἀποκρίνομαι commonly means 'answered'
    or 'replied.' 'Answered' is the most natural narrative English and fits the dialog
    context.
- source_word: οἱ ὑπηρέται
  chosen: the officers
  alternatives:
  - the attendants
  - the temple police
  - the servants
  lexicon: BDAG
  rationale: In Johannine context these are the officials sent by the chief priests
    and Pharisees to seize Jesus (7:32, 45), so 'officers' best captures their function.
    'Servants' would be too generic, and 'temple police' is interpretive though contextually
    plausible.
- source_word: Οὐδέποτε
  chosen: Never
  alternatives:
  - Never before
  - At no time
  lexicon: BDAG
  rationale: The adverb expresses absolute negation over time. 'Never' is concise
    and idiomatic in English.
- source_word: ἐλάλησεν
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Although the Greek is aorist, English idiom after 'never' commonly uses
    the present perfect ('has spoken') to express experience up to the present. This
    is an optimal-equivalence adjustment for natural English while preserving the
    force of the statement.
- source_word: οὕτως
  chosen: like this
  alternatives:
  - so
  - in this way
  lexicon: BDAG
  rationale: οὕτως indicates manner. 'Like this' is natural contemporary English and
    conveys the sense of speaking in such a manner. 'So' is possible but slightly
    less explicit.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - any man
  - anyone
  - a human being
  lexicon: BDAG
  rationale: The singular masculine noun here is best rendered 'a man.' This follows
    the project's gender-accurate principle and preserves the representative force
    of the Greek without flattening it to a gender-neutral abstraction. 'Any man'
    is interpretive; 'anyone' loses the source-form's masculine singular.
