theological_decisions:
- issue: Gendered generic force of ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - anyone
  - a human being
  rationale: The Greek uses grammatically masculine singular ἄνθρωπος in a representative
    sense. Per doctrine, gender-accurate renderings are preferred over gender-neutral
    ones unless context clearly demands otherwise. Here 'a man' preserves the source
    wording while still functioning generically in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
