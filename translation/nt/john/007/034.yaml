theological_decisions:
- issue: Nature of the statement 'where I am, you are not able to come'
  chosen_reading: Render as a statement of inability without specifying whether the
    inability is moral, spiritual, judicial, or temporary.
  alternative_readings:
  - you cannot come (more idiomatic, but less explicit about ability)
  - you may not come (would suggest prohibition and is rejected)
  rationale: The Greek uses δύνασθε, indicating inability rather than permission.
    The verse does not itself define the theological reason for that inability, so
    the translation preserves the tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
