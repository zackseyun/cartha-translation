id: JHN.7.34
reference: John 7:34
source:
  edition: SBLGNT
  text: ζητήσετέ με καὶ οὐχ ⸀εὑρήσετε, καὶ ὅπου εἰμὶ ἐγὼ ὑμεῖς οὐ δύνασθε ἐλθεῖν.
translation:
  text: You will look for me and will not find me, and where I am, you are not able
    to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''You will seek me.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or: ''you cannot come.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήσετέ
  chosen: you will look for
  alternatives:
  - you will seek
  lexicon: BDAG
  rationale: Future active indicative, second person plural. 'Look for' is natural
    modern English and fits the context of attempting to locate Jesus. 'Seek' is possible
    and traditional, but in English can sound more spiritually elevated than the immediate
    context requires.
- source_word: με
  chosen: me
  rationale: Direct object pronoun referring to Jesus.
- source_word: οὐχ εὑρήσετε
  chosen: will not find
  alternatives:
  - will by no means find
  lexicon: BDAG
  rationale: Straightforward negated future indicative. The simple English future
    best matches the Greek without adding emphatic force beyond the text.
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: Locative adverb introducing the clause of location. 'Where' is idiomatic
    and sufficiently precise.
- source_word: εἰμὶ ἐγώ
  chosen: I am
  alternatives:
  - I am there
  lexicon: BDAG
  rationale: The explicit pronoun ἐγώ adds emphasis, but English normally conveys
    this adequately with standard word order here. Adding 'there' would overtranslate,
    since no explicit adverb is present.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  rationale: Second person plural subject. The explicit pronoun gives contrast with
    ἐγώ, but English can preserve the contrast through clause structure without an
    added reflexive.
- source_word: οὐ δύνασθε ἐλθεῖν
  chosen: you are not able to come
  alternatives:
  - you cannot come
  lexicon: BDAG
  rationale: This rendering preserves the verbal idea of ability in δύνασθε more transparently
    than the contracted English 'cannot.' It also avoids implying mere prohibition;
    the sense is inability.
