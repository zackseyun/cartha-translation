id: JHN.7.45
reference: John 7:45
source:
  edition: SBLGNT
  text: Ἦλθον οὖν οἱ ὑπηρέται πρὸς τοὺς ἀρχιερεῖς καὶ Φαρισαίους, καὶ εἶπον αὐτοῖς
    ἐκεῖνοι· Διὰ τί οὐκ ἠγάγετε αὐτόν;
translation:
  text: So the officers came to the chief priests and Pharisees, and those men said
    to them, “Why did you not bring him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they said to them.” The Greek explicitly uses a demonstrative (“those
      men”), likely for emphasis, referring to the chief priests and Pharisees.
    reason: lexical_alternative
  - marker: b
    text: Or “Why did you not lead him here?” The verb can mean “lead” or “bring”;
      here “bring” best fits the context of officers sent to arrest Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative consequence/inference from the preceding scene. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὑπηρέται
  chosen: officers
  alternatives:
  - temple guards
  - servants
  lexicon: BDAG
  rationale: In Johannine context these are officials sent by the authorities to seize
    Jesus, not generic household servants. 'Officers' is concise and fits the arresting
    function; 'temple guards' is possible but slightly more interpretive.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard plural rendering for the leading priestly authorities. 'High
    priests' is less idiomatic in English for this collective group.
- source_word: Φαρισαίους
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name.
- source_word: ἐκεῖνοι
  chosen: those men
  alternatives:
  - they
  - those ones
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek and points back to the chief priests
    and Pharisees as the speakers. Rendering it as 'those men' preserves the marked
    subject better than a bare 'they,' though English still reads naturally.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Idiomatic interrogative equivalent in English.
- source_word: ἠγάγετε
  chosen: did you not bring
  alternatives:
  - have you not brought
  - did you not lead
  lexicon: BDAG
  rationale: Aorist indicative in a direct question is best rendered as simple past
    in English. 'Bring' fits the expected act of taking Jesus into custody better
    than the more literal but less idiomatic 'lead.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus, naturally rendered 'him'.
