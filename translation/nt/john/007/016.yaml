theological_decisions:
- issue: Relation of Jesus' teaching to the Father/sender
  chosen_reading: 'The verse is rendered to preserve both distinction of persons and
    unity of mission/source: Jesus denies independent origination of the teaching,
    not his authority or divinity.'
  alternative_readings:
  - A merely human teacher disclaiming ownership of a message
  - A rendering that overstates metaphysical separation between Jesus and the one
    who sent him
  rationale: The Greek states that the teaching is 'not mine but [that] of the one
    who sent me.' In Johannine context, this expresses derivation from and obedience
    to the Father without denying orthodox Christology. The translation keeps the
    source/possession contrast and avoids importing doctrinal reductionism in either
    direction.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy §3 Preserve theological tension rather than resolve
    it.'
