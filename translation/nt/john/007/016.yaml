id: JHN.7.16
reference: John 7:16
source:
  edition: SBLGNT
  text: ἀπεκρίθη οὖν αὐτοῖς ⸀ὁ Ἰησοῦς καὶ εἶπεν· Ἡ ἐμὴ διδαχὴ οὐκ ἔστιν ἐμὴ ἀλλὰ τοῦ
    πέμψαντός με·
translation:
  text: So Jesus answered them, “My teaching is not mine, but his who sent me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “but belongs to the one who sent me,” highlighting source and possession
      in the Greek genitive expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding to prior speech or questioning.
    'Answered' is the most natural and direct English equivalent here.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks discourse continuity/inference. 'So' preserves the connective force
    in readable modern English without sounding overly formal.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English as 'them'
    after 'answered'; 'answered them' is idiomatic.
- source_word: καὶ εἶπεν
  chosen: answered them, “
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Although the Greek has both 'answered' and 'said,' English commonly compresses
    this into a single smooth reporting formula. The speech introduction is still
    fully represented by the quotation that follows, so no meaning is lost.
- source_word: διδαχή
  chosen: teaching
  alternatives:
  - doctrine
  - instruction
  lexicon: BDAG
  rationale: '''Teaching'' is the clearest modern English rendering. ''Doctrine''
    is possible but sounds more technical and ecclesiastical than the context requires.'
- source_word: Ἡ ἐμὴ διδαχὴ
  chosen: My teaching
  alternatives:
  - The teaching that is mine
  lexicon: BDAG
  rationale: The possessive adjective ἐμὴ is naturally rendered with the English possessive
    'my.' This preserves the emphasis without awkwardness.
- source_word: οὐκ ἔστιν ἐμὴ
  chosen: is not mine
  alternatives:
  - does not belong to me
  - is not my own
  lexicon: BDAG
  rationale: A straightforward rendering of possession/source. 'Is not mine' preserves
    the concise contrast of the Greek.
- source_word: ἀλλὰ τοῦ πέμψαντός με
  chosen: but his who sent me
  alternatives:
  - but belongs to the one who sent me
  - but is from the one who sent me
  lexicon: BDAG
  rationale: The genitive construction contrasts with 'mine' and implies possession/source.
    'His who sent me' keeps the parallel compactly in English, while making explicit
    the implied possessive. The participle πέμψαντός is best rendered as 'who sent
    me.'
- source_word: πέμψαντός
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: πέμπω commonly means 'send.' 'Commissioned' adds nuance not required
    by the text.
