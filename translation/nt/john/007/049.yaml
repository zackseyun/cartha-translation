id: JHN.7.49
reference: John 7:49
source:
  edition: SBLGNT
  text: ἀλλὰ ὁ ὄχλος οὗτος ὁ μὴ γινώσκων τὸν νόμον ⸀ἐπάρατοί εἰσιν.
translation:
  text: But this crowd, which does not know the law, is accursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under a curse.'
    reason: lexical_alternative
  - marker: b
    text: '''The law'' refers to the Jewish law/Torah.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction contrasting the crowd with the authorities' perspective
    in the preceding context. 'But' is the most natural English rendering here.
- source_word: ὁ ὄχλος οὗτος
  chosen: this crowd
  alternatives:
  - this multitude
  - this mob
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a crowd or multitude. 'Crowd' is natural modern
    English and avoids the overly negative nuance of 'mob,' which the Greek itself
    does not require.
- source_word: ὁ μὴ γινώσκων
  chosen: which does not know
  alternatives:
  - that does not know
  - not knowing
  lexicon: BDAG
  rationale: The articular present participle functions attributively, describing
    'this crowd.' 'Which does not know' preserves the ongoing/state sense without
    awkwardness.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish law/Torah in the mouths of the Pharisees.
    Lowercase 'law' keeps the English readable, while the referent remains clear from
    context. An uppercase 'Law' is a viable alternative emphasizing the Mosaic/Torah
    sense.
- source_word: ἐπάρατοί
  chosen: accursed
  alternatives:
  - under a curse
  - cursed
  lexicon: BDAG
  rationale: ἐπάρατος means accursed or under a curse. 'Accursed' preserves the forceful,
    condemnatory tone of the Greek and fits the predicate adjective construction well
    in concise English.
- source_word: εἰσιν
  chosen: is
  alternatives:
  - are
  lexicon: BDAG
  rationale: Although εἰσιν is plural ('are'), English idiom commonly treats 'crowd'
    as a collective singular. Rendering the clause as 'this crowd ... is accursed'
    produces natural English while preserving the sense. The plural form is reflected
    conceptually in the collective reference.
