theological_decisions:
- issue: Whether to preserve the speakers' hostile judgment as a theological assertion
    of the narrator
  chosen_reading: Translate the statement straightforwardly as the Pharisees' denunciation
    without softening or endorsing it.
  alternative_readings:
  - Paraphrasing to distance the narrator from the claim, e.g., 'they say this crowd
    is accursed'
  rationale: The Greek presents direct speech from Jesus' opponents. The translation
    should preserve their harsh theological judgment without importing narrator approval
    or adding distancing language not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
