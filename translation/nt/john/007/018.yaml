theological_decisions:
- issue: Meaning of Jesus' contrast between speaking 'from himself' and seeking the
    sender's glory
  chosen_reading: The verse contrasts self-derived, self-glorifying speech with speech
    aligned to the honor of the one who sent him, without importing later doctrinal
    categories beyond the text.
  alternative_readings:
  - '''from himself'' as specifically ''on his own authority'''
  - a broader contrast between false teachers and Jesus alone
  rationale: The immediate context concerns the source and aim of teaching. The translation
    preserves the wording of mission and honor without overinterpreting it into a
    technical statement beyond what the Greek states.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering ἀδικία
  chosen_reading: unrighteousness
  alternative_readings:
  - injustice
  - wrongdoing
  rationale: Because the verse speaks of the moral integrity of the one sent by God,
    'unrighteousness' better preserves the theological and ethical breadth of the
    term than a narrower social or forensic gloss.
  doctrine_reference: Translation philosophy §§1, 5
