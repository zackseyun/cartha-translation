id: JHN.7.18
reference: John 7:18
source:
  edition: SBLGNT
  text: ὁ ἀφ’ ἑαυτοῦ λαλῶν τὴν δόξαν τὴν ἰδίαν ζητεῖ· ὁ δὲ ζητῶν τὴν δόξαν τοῦ πέμψαντος
    αὐτὸν οὗτος ἀληθής ἐστιν καὶ ἀδικία ἐν αὐτῷ οὐκ ἔστιν.
translation:
  text: The one who speaks from himself seeks his own glory; but the one who seeks
    the glory of the one who sent him, this one is true, and there is no unrighteousness
    in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on his own' or 'from his own authority' for 'from himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'truthful' for 'true.'
    reason: lexical_alternative
  - marker: c
    text: Or 'injustice' or 'wrongdoing' for 'unrighteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφ’ ἑαυτοῦ
  chosen: from himself
  alternatives:
  - on his own
  - from his own authority
  lexicon: BDAG
  rationale: The phrase literally means 'from himself' and contrasts with being sent
    by another. 'From himself' preserves the source wording and the Johannine contrast,
    while alternatives make the implied sense more explicit.
- source_word: λαλῶν
  chosen: speaks
  alternatives:
  - talks
  - is speaking
  lexicon: BDAG
  rationale: A present participle functioning substantivally; 'speaks' is natural
    English and preserves the general verbal sense without overemphasizing aspect.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - reputation
  lexicon: BDAG
  rationale: '''Glory'' is the standard rendering in Johannine usage and preserves
    the theological resonance of δόξα, especially in relation to divine honor.'
- source_word: τὴν ἰδίαν
  chosen: his own
  alternatives:
  - his personal
  - his particular
  lexicon: BDAG
  rationale: ἴδιος marks what belongs to oneself. 'His own' is idiomatic and keeps
    the contrast with the glory of the sender.
- source_word: ζητεῖ
  chosen: seeks
  alternatives:
  - is seeking
  - aims at
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek.' This keeps the repeated verbal parallel
    with the second clause.
- source_word: τοῦ πέμψαντος αὐτὸν
  chosen: of the one who sent him
  alternatives:
  - of him who sent him
  - of his sender
  lexicon: BDAG
  rationale: The articular participle is best rendered as 'the one who sent him.'
    This is clear, natural, and preserves the personal agency central to the verse.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: οὗτος is somewhat emphatic here. 'This one' preserves the demonstrative
    emphasis better than a simple 'he,' while still reading naturally enough in English.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: In context the term describes the reliability and integrity of the speaker.
    'True' is concise and preserves Johannine diction; 'truthful' is possible but
    narrower.
- source_word: ἀδικία
  chosen: unrighteousness
  alternatives:
  - injustice
  - wrongdoing
  lexicon: BDAG
  rationale: ἀδικία can denote injustice or unrighteousness. 'Unrighteousness' best
    preserves the moral and theological dimension of the claim, not merely social
    injustice or isolated misconduct.
- source_word: ἐν αὐτῷ οὐκ ἔστιν
  chosen: there is no unrighteousness in him
  alternatives:
  - no unrighteousness is in him
  - there is nothing unjust in him
  lexicon: BDAG
  rationale: This renders the existential construction naturally in English while
    preserving the internal moral characterization expressed by ἐν αὐτῷ.
