id: JHN.7.44
reference: John 7:44
source:
  edition: SBLGNT
  text: τινὲς δὲ ἤθελον ἐξ αὐτῶν πιάσαι αὐτόν, ἀλλ’ οὐδεὶς ⸀ἐπέβαλεν ἐπ’ αὐτὸν τὰς
    χεῖρας.
translation:
  text: But some of them wanted to seize him, yet no one laid hands on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to arrest him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of the crowd. 'Some'
    is natural modern English and preserves the indefiniteness.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding reactions in the crowd. 'But' best
    conveys the adversative force in context.
- source_word: ἤθελον
  chosen: wanted
  alternatives:
  - were wanting
  - wished
  lexicon: BDAG
  rationale: Imperfect of θέλω indicates ongoing or attempted desire in past time.
    'Wanted' is idiomatic English and adequately conveys their intention without overtranslating
    aspect.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: Refers to a subset emerging from the larger group. 'Of them' is concise
    and natural; the sense 'from among them' is preserved contextually.
- source_word: πιάσαι
  chosen: to seize
  alternatives:
  - to arrest
  - to capture
  lexicon: BDAG
  rationale: πιάζω commonly means to seize or grasp, and in Johannine context can
    imply arrest. 'Seize' preserves the more literal wording while allowing the arrest
    nuance to remain implicit.
- source_word: ἀλλ’
  chosen: yet
  alternatives:
  - but
  lexicon: BDAG
  rationale: Introduces a strong contrast between intent and outcome. 'Yet' reads
    smoothly after the first clause and highlights the thwarted action.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Standard formal-negative rendering in clear modern English.
- source_word: ἐπέβαλεν ἐπ’ αὐτὸν τὰς χεῖρας
  chosen: laid hands on him
  alternatives:
  - put hands on him
  lexicon: BDAG
  rationale: This is an idiomatic Greek expression for physically laying hold of someone,
    often with hostile or arresting intent. 'Laid hands on him' is a well-established
    and still understandable English equivalent that preserves the idiom's force.
