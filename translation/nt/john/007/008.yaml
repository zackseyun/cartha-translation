theological_decisions:
- issue: Textual variant in Jesus' statement about going to the feast
  chosen_reading: 'Follow the SBLGNT reading οὐκ (''not'') in the main text: ''I am
    not going up to this feast.'''
  alternative_readings:
  - 'οὔπω (''not yet''): ''I am not yet going up to this feast.'''
  rationale: The base text provided is SBLGNT with οὐκ, so the translation follows
    that reading in the main text. Because this variant is theologically and interpretively
    significant—affecting whether Jesus' later going to the feast appears contradictory—the
    alternative οὔπω is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve alternatives in footnotes where significant.'
