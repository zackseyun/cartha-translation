id: JHN.7.8
reference: John 7:8
source:
  edition: SBLGNT
  text: ὑμεῖς ἀνάβητε εἰς τὴν ⸀ἑορτήν· ἐγὼ ⸀οὐκ ἀναβαίνω εἰς τὴν ἑορτὴν ταύτην, ὅτι
    ὁ ⸂ἐμὸς καιρὸς⸃ οὔπω πεπλήρωται.
translation:
  text: You go up to the feast. I am not going up to this feast, because my time has
    not yet been fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'I am not yet going up to this feast.'
    reason: textual_variant
  - marker: b
    text: Or 'my appointed time has not yet been fulfilled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάβητε
  chosen: go up
  alternatives:
  - go
  lexicon: BDAG
  rationale: Retains the directional nuance of ἀναβαίνω, which in pilgrimage context
    refers to going up to Jerusalem/the festival, while remaining natural English.
- source_word: ἑορτή
  chosen: feast
  alternatives:
  - festival
  lexicon: BDAG
  rationale: '''Feast'' is a natural rendering in Johannine festival contexts and
    preserves the religious-festal sense better than the broader ''festival.'''
- source_word: οὐκ ἀναβαίνω
  chosen: I am not going up
  alternatives:
  - I do not go up
  - I am not yet going up
  lexicon: BDAG
  rationale: The present tense is rendered as a present-progressive/near-future English
    form appropriate to the immediate context. The reading here is οὐκ, not οὔπω;
    therefore 'not yet' should not be placed in the main text, though it is preserved
    in a footnote because of the well-known textual variant.
- source_word: ταύτην
  chosen: this
  alternatives:
  - the present
  lexicon: BDAG
  rationale: Straightforward demonstrative reference to the specific feast under discussion.
- source_word: καιρός
  chosen: time
  alternatives:
  - appointed time
  - season
  - opportune time
  lexicon: BDAG
  rationale: '''Time'' is the most natural concise rendering here, while still allowing
    the Johannine sense of divinely appointed timing. The more interpretive ''appointed
    time'' is possible but not required in the main text.'
- source_word: πεπλήρωται
  chosen: has not yet been fulfilled
  alternatives:
  - has not yet come to fullness
  - has not yet fully come
  - has not yet arrived
  lexicon: BDAG
  rationale: The perfect passive of πληρόω is rendered with 'has ... been fulfilled'
    to preserve the completion/fullness nuance of the verb rather than flattening
    it to mere arrival. This also fits Johannine themes of divinely determined timing.
