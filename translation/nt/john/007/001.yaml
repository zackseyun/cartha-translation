theological_decisions:
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Retain the literal rendering 'the Jews' in the main text, with a
    clarifying footnote that in this context John refers to the Judean Jewish opposition,
    especially authorities, not to all Jewish people without distinction.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: This preserves the source wording while avoiding a misleading reading
    that could suggest a blanket ethnic condemnation. The translation philosophy prioritizes
    original-language primacy and preserving lexical form where possible, while footnoting
    contextual nuance rather than rewriting the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
