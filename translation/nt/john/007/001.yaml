id: JHN.7.1
reference: John 7:1
source:
  edition: SBLGNT
  text: Καὶ ⸂μετὰ ταῦτα περιεπάτει ὁ Ἰησοῦς⸃ ἐν τῇ Γαλιλαίᾳ, οὐ γὰρ ἤθελεν ἐν τῇ Ἰουδαίᾳ
    περιπατεῖν, ὅτι ἐζήτουν αὐτὸν οἱ Ἰουδαῖοι ἀποκτεῖναι.
translation:
  text: And after these things Jesus was walking in Galilee, for he did not want to
    walk in Judea, because the Jews were seeking to kill him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' or 'the Jewish leaders.' In John, 'the Jews' often refers
      more specifically to the Judean Jewish authorities or opposition in the narrative
      context, not to the Jewish people as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after this
  - afterward
  lexicon: BDAG
  rationale: A transparent temporal transition. 'After these things' preserves the
    plural demonstrative and Johannine narrative linkage more closely than the smoother
    'afterward.'
- source_word: περιεπάτει
  chosen: was walking
  alternatives:
  - was going about
  - was staying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing activity. 'Was walking' keeps the lexical
    link with περιπατεῖν later in the verse and preserves the narrative sense of moving
    about in a region. 'Was going about' is possible but less formally transparent.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - throughout Galilee
  lexicon: BDAG
  rationale: Standard locative rendering. 'In Galilee' is sufficiently natural and
    does not over-interpret the scope of Jesus's movement.
- source_word: οὐ γὰρ ἤθελεν
  chosen: for he did not want
  alternatives:
  - for he was not willing
  - because he did not wish
  lexicon: BDAG
  rationale: '''For'' preserves γάρ as explanatory. ''Did not want'' is readable modern
    English for ἤθελεν without implying inability; ''was not willing'' is more formal
    but stiffer.'
- source_word: ἐν τῇ Ἰουδαίᾳ περιπατεῖν
  chosen: to walk in Judea
  alternatives:
  - to go about in Judea
  - to travel in Judea
  lexicon: BDAG
  rationale: Using 'walk' again preserves the repeated περιπατέω in the verse. Although
    idiomatic English might prefer 'travel' or 'go about,' retaining the repetition
    reflects John's wording and keeps the explanation tightly linked.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Jesus's avoidance of Judea. 'Because' is the
    clearest modern English causal connector here.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were trying
  - were looking for
  lexicon: BDAG
  rationale: The imperfect conveys ongoing hostile intent. 'Were seeking' preserves
    the lexical sense of ζητέω and leaves the infinitive ἀποκτεῖναι to specify the
    purpose.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews,' and John frequently uses
    it as a narrative designation for the Judean Jewish authorities or opposition
    group rather than the Jewish people indiscriminately. The main text keeps the
    formal rendering, while a footnote preserves the contextual clarification to avoid
    anachronistic ethnic misreading.
- source_word: ἀποκτεῖναι
  chosen: to kill him
  alternatives:
  - to put him to death
  lexicon: BDAG
  rationale: Direct and natural rendering of the infinitive with object. 'To put him
    to death' is possible but slightly more interpretive and formal.
