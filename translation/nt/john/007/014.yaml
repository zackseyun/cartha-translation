theological_decisions:
- issue: Reference of ἱερόν
  chosen_reading: the temple refers to the temple complex/courts, not specifically
    the inner sanctuary
  alternative_readings:
  - the temple (less specific in English)
  rationale: This is a lexical-cultural distinction rather than a doctrinal dispute,
    but it affects how readers imagine the scene. The chosen main text keeps standard
    English while documenting the broader precinct sense of ἱερόν.
