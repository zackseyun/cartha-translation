id: JHN.7.14
reference: John 7:14
source:
  edition: SBLGNT
  text: Ἤδη δὲ τῆς ἑορτῆς μεσούσης ⸀ἀνέβη Ἰησοῦς εἰς τὸ ἱερὸν καὶ ἐδίδασκεν.
translation:
  text: Now when the feast was already half over, Jesus went up into the temple and
    began teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about the middle of the feast.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the temple' here uses ἱερόν, referring to the temple complex or courts,
      not specifically the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'was teaching.' The Greek imperfect may emphasize ongoing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤδη
  chosen: already
  alternatives:
  - by this time
  lexicon: BDAG
  rationale: Marks that the action occurs at a point already reached in the feast;
    'already' is the most natural concise equivalent.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δώ marks a mild narrative transition here rather than strong contrast;
    'Now' fits idiomatic English discourse flow.
- source_word: τῆς ἑορτῆς μεσούσης
  chosen: when the feast was already half over
  alternatives:
  - when the feast was in the middle
  - about the middle of the feast
  lexicon: BDAG
  rationale: The genitive absolute expresses temporal circumstance. μεσούσης indicates
    the feast being at its midpoint or in progress toward the middle. 'was already
    half over' gives clear modern English while preserving the temporal sense.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - went
  - came up
  lexicon: BDAG
  rationale: ἀναβαίνω commonly means 'go up'; in Johannine context it can reflect
    ascent to Jerusalem/temple precincts. 'Went up' preserves the directional nuance.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard English transliteration of the personal name Ἰησοῦς.
- source_word: εἰς τὸ ἱερὸν
  chosen: into the temple
  alternatives:
  - into the temple courts
  - into the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple' is the standard rendering; 'into' reflects εἰς. Because English readers
    may hear 'temple' as the whole complex, the simpler rendering is acceptable, with
    the more precise sense preserved as an alternative.
- source_word: ἐδίδασκεν
  chosen: began teaching
  alternatives:
  - was teaching
  - taught
  lexicon: BDAG
  rationale: The imperfect portrays ongoing action in past time. In this narrative
    sequence, English often renders the ingressive or progressive force naturally
    as 'began teaching.' This avoids flattening the imperfect to a simple past while
    remaining readable.
