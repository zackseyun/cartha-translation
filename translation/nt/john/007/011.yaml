id: JHN.7.11
reference: John 7:11
source:
  edition: SBLGNT
  text: οἱ οὖν Ἰουδαῖοι ἐζήτουν αὐτὸν ἐν τῇ ἑορτῇ καὶ ἔλεγον· Ποῦ ἐστιν ἐκεῖνος;
translation:
  text: So the Jews were looking for him at the feast and saying, “Where is that man?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans,” possibly referring more specifically to the Judean Jewish
      authorities in John’s narrative context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Judeans
  - the Jewish leaders
  lexicon: BDAG
  rationale: The term can denote Jews generally, Judeans, or specifically Jewish authorities
    depending on context. In John's Gospel it often refers to the Judean/Jewish authorities,
    but here the text itself does not explicitly narrow the referent beyond 'the Jews.'
    To avoid importing an interpretive restriction not stated in the verse, the main
    text keeps the conventional and lexically straightforward 'the Jews,' while preserving
    a contextual alternative in a footnote.
- source_word: ἐζήτουν
  chosen: were looking for
  alternatives:
  - were seeking
  - were trying to find
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing/repeated action during the feast. 'Were
    looking for' conveys the progressive aspect in idiomatic English better than the
    more formal 'were seeking'.
- source_word: ἐν τῇ ἑορτῇ
  chosen: at the feast
  alternatives:
  - during the festival
  - at the festival
  lexicon: BDAG
  rationale: ἑορτή here refers to the feast/festival already identified in context.
    'At the feast' is concise and natural, and 'at' works idiomatically for presence
    within the event timeframe.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - kept saying
  - said
  lexicon: BDAG
  rationale: The imperfect again suggests repeated or ongoing speech. 'Were saying'
    preserves that aspect without overinterpreting frequency.
- source_word: ἐκεῖνος
  chosen: that man
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: The demonstrative carries a distancing nuance stronger than a simple
    pronoun. 'That man' captures the dismissive or detached force in natural English
    better than bare 'he,' while remaining clear.
