theological_decisions:
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: Render as 'the Jews' in the main text, without narrowing to leaders
    or Judeans
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: This verse does not itself specify a narrower subgroup, and the translation
    philosophy forbids importing claims the text does not make. Because John's usage
    can be contextually charged, an alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
