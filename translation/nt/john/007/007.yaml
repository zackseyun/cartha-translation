theological_decisions:
- issue: Referent and theological force of 'the world' in Johannine context
  chosen_reading: Retain 'the world' without interpretive expansion
  alternative_readings:
  - the world-system
  - humanity in rebellion against God
  rationale: John often uses κόσμος with layered meaning. The verse presents the world
    as morally opposed to Jesus because he exposes its evil works. The translation
    preserves that tension without resolving the term into a narrower theological
    paraphrase in the main text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
