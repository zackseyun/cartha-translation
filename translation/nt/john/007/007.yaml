id: JHN.7.7
reference: John 7:7
source:
  edition: SBLGNT
  text: οὐ δύναται ὁ κόσμος μισεῖν ὑμᾶς, ἐμὲ δὲ μισεῖ, ὅτι ἐγὼ μαρτυρῶ περὶ αὐτοῦ
    ὅτι τὰ ἔργα αὐτοῦ πονηρά ἐστιν.
translation:
  text: The world is not able to hate you, but it hates me, because I testify about
    it that its works are evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cannot hate you.'
    reason: lexical_alternative
  - marker: b
    text: '''The world'' in John often refers to the human order in opposition to
      God, not to the created universe as such.'
    reason: cultural_note
  - marker: c
    text: Or 'I bear witness about it.'
    reason: lexical_alternative
  - marker: d
    text: Or 'its deeds are evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύναται
  chosen: is not able
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: Rendered with a slightly more formal expression to preserve the verbal
    idea of ability/inability in δύναμαι rather than collapsing it immediately into
    an idiomatic English contraction. 'Cannot' would also be natural English, but
    'is not able' keeps the force transparent.
- source_word: ὁ κόσμος
  chosen: the world
  alternatives:
  - the world-system
  - the people of the world
  lexicon: BDAG
  rationale: In Johannine usage κόσμος often refers to the human world in organized
    opposition to God. 'The world' is the standard and sufficiently transparent rendering;
    more interpretive expansions would over-specify the sense in the main text.
- source_word: μισεῖν / μισεῖ
  chosen: hate / hates
  alternatives:
  - detest
  - be hostile to
  lexicon: BDAG
  rationale: The repeated verb μισέω is rendered consistently as 'hate' to preserve
    the starkness of the Greek and the rhetorical contrast between 'you' and 'me.'
    Softer renderings weaken the force.
- source_word: ἐμὲ δὲ
  chosen: but it hates me
  alternatives:
  - yet it hates me
  - but me it hates
  lexicon: BDAG
  rationale: δέ marks contrast. English word order is adjusted for readability while
    preserving the emphatic contrast between the brothers and Jesus.
- source_word: μαρτυρῶ
  chosen: I testify
  alternatives:
  - I bear witness
  - I witness
  lexicon: BDAG
  rationale: '''Testify'' is clear modern English and preserves the forensic/witness
    nuance of μαρτυρέω. ''Bear witness'' is possible but slightly more traditional
    in tone.'
- source_word: περὶ αὐτοῦ
  chosen: about it
  alternatives:
  - concerning it
  - about him
  lexicon: BDAG
  rationale: The antecedent is κόσμος, a grammatically masculine noun but conceptually
    impersonal here, so English idiom favors 'it.' 'About him' would misleadingly
    personalize the referent.
- source_word: τὰ ἔργα αὐτοῦ
  chosen: its works
  alternatives:
  - what it does
  - its deeds
  lexicon: BDAG
  rationale: ἔργα is rendered 'works' to stay close to the Greek and to preserve Johannine
    moral/theological resonance. 'Deeds' is also viable; 'what it does' is too paraphrastic.
- source_word: πονηρά
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: πονηρός here carries moral evil, not mere inferiority or unpleasantness.
    'Evil' is the most direct and theologically weighty equivalent.
