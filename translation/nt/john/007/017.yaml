theological_decisions:
- issue: Referent of αὐτοῦ in 'his will'
  chosen_reading: The pronoun refers to God, but the translation preserves the pronoun
    rather than making the referent explicit in the main text.
  alternative_readings:
  - The pronoun could be made explicit as 'God's will' for clarity.
  rationale: The immediate context concerns whether Jesus' teaching is from God, so
    the referent is contextually clear. Preserving 'his' avoids unnecessary interpretive
    expansion while maintaining readability.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ἀπ’ ἐμαυτοῦ
  chosen_reading: Rendered 'from myself' in the main text, preserving the language
    of source rather than expanding to 'on my own authority.'
  alternative_readings:
  - on my own
  - on my own authority
  rationale: The Greek directly expresses source/origin. The theological implication
    of independent authority is present, but the translation should not over-specify
    beyond the wording of the text. An explanatory alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
