id: JHN.7.17
reference: John 7:17
source:
  edition: SBLGNT
  text: ἐάν τις θέλῃ τὸ θέλημα αὐτοῦ ποιεῖν, γνώσεται περὶ τῆς διδαχῆς πότερον ἐκ
    τοῦ θεοῦ ἐστιν ἢ ἐγὼ ἀπ’ ἐμαυτοῦ λαλῶ.
translation:
  text: If anyone wants to do his will, he will know about the teaching, whether it
    is from God or whether I am speaking from myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on my own' or 'on my own authority.' The Greek literally says 'from
      myself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις θέλῃ
  chosen: If anyone wants
  alternatives:
  - If anyone is willing
  - If anyone desires
  lexicon: BDAG
  rationale: The construction ἐάν + subjunctive introduces a general condition. θέλω
    can denote desire or willingness. 'Wants' is natural modern English and preserves
    the volitional sense without overformal stiffness.
- source_word: τὸ θέλημα αὐτοῦ
  chosen: his will
  alternatives:
  - God's will
  lexicon: BDAG
  rationale: The pronoun most naturally refers to God in context, but the Greek uses
    the pronoun rather than repeating θεοῦ. 'His will' preserves the textual form
    while allowing the contextual referent to remain clear.
- source_word: ποιεῖν
  chosen: to do
  alternatives:
  - to carry out
  - to practice
  lexicon: BDAG
  rationale: ποιέω with θέλημα is idiomatically 'do [someone's] will.' 'To do' is
    the most direct and idiomatic rendering.
- source_word: γνώσεται
  chosen: he will know
  alternatives:
  - he will come to know
  - he will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω here indicates resulting knowledge or discernment.
    'He will know' is concise and natural; 'come to know' is possible but slightly
    more process-oriented than the context requires.
- source_word: περὶ τῆς διδαχῆς
  chosen: about the teaching
  alternatives:
  - concerning the teaching
  - about this teaching
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' διδαχή
    is 'teaching.' The article is retained as 'the teaching,' referring to Jesus'
    teaching under discussion.
- source_word: πότερον ... ἢ
  chosen: whether ... or whether
  alternatives:
  - whether ... or
  - if ... or
  lexicon: BDAG
  rationale: This correlative structure sets up two alternatives. Repeating 'whether'
    in English makes the contrast explicit and readable.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  - comes from God
  lexicon: BDAG
  rationale: ἐκ marks source or origin. 'From God' is the most direct rendering. Supplying
    'comes' would be interpretive since ἐστιν is simply 'is.'
- source_word: ἀπ’ ἐμαυτοῦ
  chosen: from myself
  alternatives:
  - on my own
  - from my own authority
  lexicon: BDAG
  rationale: The phrase literally means 'from myself,' indicating self-originated
    speech. 'From myself' preserves the source imagery and leaves the fuller implication
    ('on my own authority') available in a footnote.
- source_word: λαλῶ
  chosen: I am speaking
  alternatives:
  - I speak
  lexicon: BDAG
  rationale: English present progressive can naturally render the Greek present in
    this discourse context. 'I am speaking' fits the immediate question about the
    source of Jesus' teaching.
