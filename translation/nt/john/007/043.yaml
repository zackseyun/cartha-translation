id: JHN.7.43
reference: John 7:43
source:
  edition: SBLGNT
  text: σχίσμα οὖν ⸂ἐγένετο ἐν τῷ ὄχλῳ⸃ δι’ αὐτόν.
translation:
  text: So there was a division in the crowd because of him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σχίσμα
  chosen: division
  alternatives:
  - split
  - dissension
  lexicon: BDAG
  rationale: The noun denotes a split or division among people. 'Division' is natural
    modern English and preserves the social fracture implied in context better than
    the more literal but less idiomatic 'schism'.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks an inference or result from the preceding discussion. 'So'
    gives a readable connective in modern English without overstating formal logical
    force.
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - arose
  - came about
  - occurred
  lexicon: BDAG
  rationale: With σχίσμα as subject, γίνομαι here functions idiomatically to indicate
    that a state/event came into being. 'There was' is the most natural English rendering
    in this construction.
- source_word: ἐν τῷ ὄχλῳ
  chosen: in the crowd
  alternatives:
  - among the crowd
  - among the people
  lexicon: BDAG
  rationale: ὄχλος in John commonly refers to the gathered crowd or multitude. 'In
    the crowd' is concise and idiomatic; 'among the crowd' is possible but less natural
    in English.
- source_word: δι’ αὐτόν
  chosen: because of him
  alternatives:
  - on account of him
  - over him
  lexicon: BDAG
  rationale: διά with the accusative indicates cause here. 'Because of him' is the
    clearest and most direct rendering; 'over him' is possible in idiomatic English
    but less explicit.
