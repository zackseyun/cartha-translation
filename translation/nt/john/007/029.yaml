id: JHN.7.29
reference: John 7:29
source:
  edition: SBLGNT
  text: ἐγὼ οἶδα αὐτόν, ὅτι παρ’ αὐτοῦ εἰμι κἀκεῖνός με ἀπέστειλεν.
translation:
  text: I know him, because I am from him, and he sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "that I am from him." The Greek conjunction can be taken as introducing
      content ('that') or reason ('because'); the context favors a causal sense.
    reason: lexical_alternative
  - marker: b
    text: Or "I came from him" or "I am from his presence." The Greek phrase can express
      source or origin more specifically than simple English "from him" may convey.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit subject pronoun is retained for the emphatic first-person claim,
    though English does not mark the emphasis separately beyond normal word order.
- source_word: οἶδα
  chosen: know
  alternatives:
  - have known
  lexicon: BDAG
  rationale: οἶδα commonly functions as a present-state verb meaning 'know.' Simple
    present best fits idiomatic English and the immediate contrast with others' lack
    of true knowledge in context.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Personal pronoun refers to the Father in context; 'him' preserves the
    personal object without importing explanatory wording into the main text.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason Jesus knows him, not merely indirect discourse.
    'Because' makes the causal force clear in English.
- source_word: παρ’ αὐτοῦ
  chosen: from him
  alternatives:
  - from beside him
  - from his presence
  lexicon: BDAG
  rationale: παρά with genitive can denote source/origin. 'From him' is the most natural
    English rendering and preserves the Johannine idea of Jesus' origin/source without
    over-specifying metaphysics in the translation itself.
- source_word: εἰμι
  chosen: I am
  alternatives:
  - I have come
  lexicon: BDAG
  rationale: The present tense copula should be retained rather than expanded to 'have
    come.' 'I am from him' preserves the Greek wording and the theological weight
    of origin/relationship.
- source_word: κἀκεῖνός
  chosen: and he
  alternatives:
  - and that one
  lexicon: BDAG
  rationale: Contraction of καί + ἐκεῖνος. In English, 'and he' is the natural rendering;
    'that one' would sound wooden and unnecessarily marked here.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun of ἀπέστειλεν; straightforwardly rendered 'me.'
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - has sent
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this context. 'Sent'
    preserves the Johannine mission theme without forcing an English perfect.
