theological_decisions:
- issue: Meaning of Jesus' relation to the Father in παρ’ αὐτοῦ εἰμι
  chosen_reading: Render as 'I am from him' to express source/origin while preserving
    the text's theological depth without interpretive expansion.
  alternative_readings:
  - I came from him
  - I am with him
  - I am from his presence
  rationale: The phrase speaks to Jesus' unique relation and origin with respect to
    the Father. Given the doctrinal instruction to preserve theological tension rather
    than resolve it, the translation avoids paraphrases that narrow the sense to mere
    mission ('I came from him') or mere location ('I am with him').
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene/Chalcedonian
    bounds)
