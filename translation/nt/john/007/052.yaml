id: JHN.7.52
reference: John 7:52
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν καὶ εἶπαν αὐτῷ· Μὴ καὶ σὺ ἐκ τῆς Γαλιλαίας εἶ; ἐραύνησον καὶ ἴδε
    ὅτι ⸂ἐκ τῆς Γαλιλαίας προφήτης⸃ οὐκ ⸀ἐγείρεται.
translation:
  text: They answered and said to him, “Are you also from Galilee? Search and see
    that no prophet arises from Galilee.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Surely you are not also from Galilee, are you?” The Greek question
      is framed to expect a negative answer.
    reason: lexical_alternative
  - marker: b
    text: Some translate, “no prophet is raised up from Galilee,” preserving a possible
      nuance that God raises up prophets.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν καὶ εἶπαν
  chosen: They answered and said
  alternatives:
  - They replied
  - They answered
  lexicon: BDAG
  rationale: The paired verbs are somewhat redundant in English but reflect a common
    Johannine narrative formula. Retaining both preserves the emphatic narrative cadence
    without sounding overly wooden.
- source_word: Μὴ καὶ σὺ ... εἶ;
  chosen: Are you also ... ?
  alternatives:
  - Surely you are not also ... ?
  - You are not also ... , are you?
  lexicon: BDAG
  rationale: μή with a question often expects a negative answer. The chosen rendering
    keeps the rhetorical force in natural English without overloading the line with
    English particles. The stronger expectation of a negative answer is implicit in
    context.
- source_word: ἐκ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - out of Galilee
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ with a place of origin.
- source_word: ἐραύνησον
  chosen: Search
  alternatives:
  - Examine
  - Investigate
  lexicon: BDAG
  rationale: The imperative calls for active inquiry. 'Search' is concise, idiomatic,
    and fits the polemical challenge being issued.
- source_word: ἴδε
  chosen: see
  alternatives:
  - look
  - find out
  lexicon: BDAG
  rationale: In the imperative sequence 'Search and see,' 'see' works idiomatically
    in English and preserves the directness of the Greek.
- source_word: προφήτης
  chosen: prophet
  alternatives:
  - the prophet
  lexicon: BDAG
  rationale: 'The anarthrous noun is best rendered indefinitely here: the claim being
    made is that no prophet arises from Galilee, not specifically a particular eschatological
    figure.'
- source_word: οὐκ ἐγείρεται
  chosen: arises
  alternatives:
  - is raised up
  - comes
  lexicon: BDAG
  rationale: ἐγείρεται here refers to the emergence or appearance of a prophet. 'Arises'
    preserves the verbal imagery and is more natural in English than the more wooden
    'is raised up,' while still allowing the possible nuance of being raised up by
    God.
