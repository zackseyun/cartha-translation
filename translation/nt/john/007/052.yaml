theological_decisions:
- issue: Rhetorical force of the negative question
  chosen_reading: Render as a natural English question ('Are you also from Galilee?')
    rather than an explicitly tagged negative-expectation question.
  alternative_readings:
  - Surely you are not also from Galilee, are you?
  rationale: The Greek μή signals that the speakers expect a negative answer and are
    speaking dismissively to Nicodemus. English can convey this through context and
    tone without requiring a more cumbersome form in the main text. The sharper alternative
    is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (preserve tension/ambiguity
    where relevant)'
