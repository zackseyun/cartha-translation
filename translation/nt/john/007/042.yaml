id: JHN.7.42
reference: John 7:42
source:
  edition: SBLGNT
  text: ⸀οὐχ ἡ γραφὴ εἶπεν ὅτι ἐκ τοῦ σπέρματος Δαυίδ, καὶ ἀπὸ Βηθλέεμ τῆς κώμης ὅπου
    ἦν Δαυίδ, ⸂ἔρχεται ὁ χριστός⸃;
translation:
  text: Has not the Scripture said that the Messiah comes from the offspring of David
    and from Bethlehem, the village where David was?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title is ὁ χριστός.
    reason: alternative_reading
lexical_decisions:
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - the scripture
  - the writing
  lexicon: BDAG
  rationale: In Johannine usage, ἡ γραφή commonly refers to the authoritative sacred
    writings. Singular 'the Scripture' is idiomatic in English for a cited scriptural
    witness.
- source_word: εἶπεν
  chosen: has ... said
  alternatives:
  - said
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect in this rhetorical
    question because the statement of Scripture remains presently authoritative and
    idiomatic English commonly says 'Scripture has said.'
- source_word: ἐκ τοῦ σπέρματος Δαυίδ
  chosen: from the offspring of David
  alternatives:
  - from the seed of David
  - from David's descendants
  - from the line of David
  lexicon: BDAG
  rationale: σπέρμα here denotes lineage/descendance, not literal seed. 'Offspring'
    preserves the genealogical sense while remaining natural English. 'Seed' is more
    formal but less idiomatic here.
- source_word: ἀπὸ Βηθλέεμ
  chosen: from Bethlehem
  alternatives:
  - out of Bethlehem
  lexicon: BDAG
  rationale: ἀπό marks origin/source. 'From Bethlehem' is the most natural English
    rendering and fits the messianic expectation being cited.
- source_word: τῆς κώμης
  chosen: the village
  alternatives:
  - the town
  lexicon: BDAG
  rationale: κώμη denotes a village or small settlement. 'Village' is more lexically
    precise than 'town' and reflects the Greek distinction.
- source_word: ὅπου ἦν Δαυίδ
  chosen: where David was
  alternatives:
  - where David came from
  - where David lived
  lexicon: BDAG
  rationale: The Greek is simply 'where David was.' More interpretive expansions such
    as 'came from' or 'lived' go beyond the wording. The concise rendering preserves
    the source's simplicity.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - is to come
  - comes forth
  lexicon: BDAG
  rationale: Present tense in a scriptural/generalizing statement is best rendered
    'comes.' It expresses the expected origin of the Messiah rather than a future
    event alone.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine guidelines, Χριστός as a title is translated 'Messiah' rather
    than transliterated 'Christ,' especially in this Jewish messianic-context discussion.
