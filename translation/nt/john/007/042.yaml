  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: In this context the term functions as the Jewish royal-deliverer title
    under debate, not as a name-like designation. Translating it preserves the messianic
    sense and follows the project's contested-terms guidance.
