id: JHN.7.47
reference: John 7:47
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν οὖν αὐτοῖς οἱ Φαρισαῖοι· Μὴ καὶ ὑμεῖς πεπλάνησθε;
translation:
  text: So the Pharisees answered them, “Have you also been led astray?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Have you also been deceived?” The verb can mean being misled or deceived;
      “led astray” preserves the sense of being drawn into error.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding in dialogue. 'Answered' is the
    most natural and common English equivalent in Johannine discourse.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential or consequential step in the exchange. 'So' gives
    natural modern English while preserving the discourse connection better than a
    more formal 'therefore' in dialogue.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English after 'answered'
    without requiring an explicit preposition in the main text.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration for the Jewish group designation; with the article
    preserved as a class reference.
- source_word: Μὴ καὶ ὑμεῖς
  chosen: Have you also
  alternatives:
  - Surely you have not also
  - You have not also, have you
  lexicon: BDAG
  rationale: μή introducing a question expects a negative answer, and καί with ὑμεῖς
    adds 'also/even you.' English idiom is best captured by 'Have you also...?' while
    allowing the rhetorical force to be felt without becoming wooden.
- source_word: πεπλάνησθε
  chosen: been led astray
  alternatives:
  - been deceived
  - gone astray
  lexicon: BDAG
  rationale: Perfect passive/middle of πλανάω here most naturally conveys being misled
    into error. 'Been led astray' preserves both the passive sense and the moral/intellectual
    nuance better than the flatter 'been deceived.'
