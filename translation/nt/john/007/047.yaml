theological_decisions:
- issue: Rhetorical force of the μή-question
  chosen_reading: Render as a rhetorical question expecting a negative answer without
    overtranslating the expectation into the main text.
  alternative_readings:
  - Surely you have not also been deceived?
  rationale: The Greek μή signals that the speakers expect 'no.' English can preserve
    this through tone and syntax without inserting 'surely' into the main text. This
    avoids paraphrase while retaining the Pharisees' scornful rhetorical force.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
