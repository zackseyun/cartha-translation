id: JHN.4.30
reference: John 4:30
source:
  edition: SBLGNT
  text: ἐξῆλθον ἐκ τῆς πόλεως καὶ ἤρχοντο πρὸς αὐτόν.
translation:
  text: They went out of the city and were coming to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They came out of the city and were on their way to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - came out
  - left
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι denotes departure from an enclosed or defined place.
    'Went out' is natural English and preserves the directional force without overinterpreting
    aspect.
- source_word: ἐκ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With 'went out,' English idiom prefers 'out of.' This preserves the sense
    of movement from within the city.
- source_word: τῆς πόλεως
  chosen: the city
  alternatives:
  - the town
  lexicon: BDAG
  rationale: πόλις can mean either 'city' or 'town' depending on scale, but 'city'
    is the standard and sufficiently broad rendering. The article is retained.
- source_word: ἤρχοντο
  chosen: were coming
  alternatives:
  - came
  - were going
  lexicon: BDAG
  rationale: Imperfect middle/passive-form deponent of ἔρχομαι here conveys ongoing
    action in past time. 'Were coming' preserves the imperfective sense better than
    simple 'came.' 'Were going' would be possible from the narrator's perspective
    but 'to him' in English is more naturally paired with 'coming.'
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with the accusative indicates movement toward a person. 'To him'
    is idiomatic and contextually implies approach to Jesus; 'toward him' is more
    wooden and slightly less definite.
