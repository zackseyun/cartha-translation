id: JHN.4.41
reference: John 4:41
source:
  edition: SBLGNT
  text: καὶ πολλῷ πλείους ἐπίστευσαν διὰ τὸν λόγον αὐτοῦ,
translation:
  text: And many more believed because of his word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'far more believed.' The Greek uses an intensified comparative expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of his message.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλῷ πλείους
  chosen: many more
  alternatives:
  - far more
  - many others
  lexicon: BDAG
  rationale: The dative πολλῷ intensifies the comparative πλείους, yielding the sense
    'many more' or 'far more.' 'Many more' is natural modern English and preserves
    the comparative increase from the previous verse without sounding wooden.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to believe
  - put their faith
  lexicon: BDAG
  rationale: Aorist active indicative of πιστεύω is most straightforwardly rendered
    'believed.' 'Came to believe' slightly over-interprets ingressiveness, and 'put
    their faith' is more expansive than the Greek here.
- source_word: διὰ
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: BDAG
  rationale: 'With the accusative τὸν λόγον, διά commonly expresses cause or reason.
    ''Because of'' best fits the context: their belief resulted from what he said.'
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  - teaching
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' spoken word/message. 'Word' preserves Johannine
    diction and allows the reader to hear the thematic resonance of λόγος in this
    Gospel, while still making sense in context.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The pronoun refers to Jesus in the immediate context; 'his' is the direct
    and unambiguous English equivalent.
