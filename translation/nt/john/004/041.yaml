theological_decisions:
- issue: Rendering πιστεύω in a salvation-context narrative
  chosen_reading: believed
  alternative_readings:
  - came to faith
  - put their faith in him
  rationale: The Greek text states simply that many more 'believed' because of his
    word. Since no explicit object follows in this verse, the translation avoids importing
    a fuller doctrinal formulation than the text itself states, while allowing the
    Johannine context to supply that Jesus is the one believed.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
