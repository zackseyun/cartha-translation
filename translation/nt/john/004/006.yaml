theological_decisions:
- issue: Time reference in 'the sixth hour'
  chosen_reading: Retain the literal expression 'about the sixth hour' in the main
    text.
  alternative_readings:
  - about noon
  - about 6 p.m. under a Roman reckoning hypothesis
  rationale: The phrase has interpretive significance in Johannine chronology, and
    the Greek itself does not specify the modern clock equivalent. Preserving the
    literal wording maintains the textual tension rather than resolving a debated
    issue in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
