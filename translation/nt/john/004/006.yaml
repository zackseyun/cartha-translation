id: JHN.4.6
reference: John 4:6
source:
  edition: SBLGNT
  text: ἦν δὲ ἐκεῖ πηγὴ τοῦ Ἰακώβ. ὁ οὖν Ἰησοῦς κεκοπιακὼς ἐκ τῆς ὁδοιπορίας ἐκαθέζετο
    οὕτως ἐπὶ τῇ πηγῇ· ὥρα ἦν ⸀ὡς ἕκτη.
translation:
  text: Now Jacob’s well was there. So Jesus, wearied from the journey, was sitting
    there by the well. It was about the sixth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spring'; Greek πηγή can denote a spring or a well.
    reason: lexical_alternative
  - marker: b
    text: Or 'was sitting thus,' possibly implying 'just as he was' or 'in this way.'
    reason: lexical_alternative
  - marker: c
    text: That is, approximately noon if counted by Jewish daylight hours.
    reason: alternative_reading
lexical_decisions:
- source_word: πηγή
  chosen: well
  alternatives:
  - spring
  lexicon: BDAG
  rationale: Although πηγή often denotes a spring or fountain, in this context the
    established site associated with drawing water and the later narrative usage support
    'well' as the most natural English rendering. The possessive phrase 'Jacob’s well'
    is also idiomatic in English. The alternative 'spring' is worth preserving because
    the Greek term can carry that sense.
- source_word: κεκοπιακὼς
  chosen: wearied
  alternatives:
  - tired
  - fatigued
  lexicon: BDAG
  rationale: The perfect participle of κοπιάω conveys a state resulting from exertion.
    'Wearied' preserves both the physical exhaustion and the slightly elevated narrative
    tone without sounding archaic.
- source_word: ἐκ τῆς ὁδοιπορίας
  chosen: from the journey
  alternatives:
  - from traveling
  - from his journey
  lexicon: BDAG
  rationale: This phrase expresses the source/cause of Jesus' weariness. 'From the
    journey' is concise and natural, while preserving the causal force of ἐκ.
- source_word: ἐκαθέζετο
  chosen: was sitting
  alternatives:
  - sat
  - was seated
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing or descriptive past action.
    'Was sitting' better reflects the imperfect aspect than the simple 'sat'.
- source_word: οὕτως
  chosen: there
  alternatives:
  - thus
  - just as he was
  lexicon: BDAG
  rationale: In context οὕτως likely has an adverbial sense describing Jesus' condition
    or manner of sitting. English often leaves this implicit or renders it idiomatically.
    'There' smooths the sentence in conjunction with the preceding context, while
    the more literal possibilities are preserved in a footnote because the term is
    somewhat difficult and debated in nuance.
- source_word: ἐπὶ τῇ πηγῇ
  chosen: by the well
  alternatives:
  - at the well
  - on the well
  lexicon: BDAG
  rationale: With ἐπί and the dative, the sense here is locative. 'By the well' is
    the most natural English expression for someone resting beside it.
- source_word: ὥρα ἦν ὡς ἕκτη
  chosen: It was about the sixth hour
  alternatives:
  - It was about noon
  - It was about the sixth hour of the day
  lexicon: BDAG
  rationale: Retaining 'the sixth hour' preserves the source expression and avoids
    prematurely resolving the Johannine time-reckoning debate. 'About' reflects ὡς.
    A footnote preserves the common interpretive equivalent 'about noon'.
- source_word: δὲ / οὖν
  chosen: Now / So
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: These discourse particles mark narrative progression. 'Now' and 'So'
    give readable English transitions without overtranslating the particles.
