theological_decisions:
- issue: Rendering of κύριος as a form of address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' In John, forms of address
    to Jesus can carry layered meaning, and the translation should preserve that possibility
    rather than flatten it to mere politeness. An alternative is preserved in a footnote
    because the immediate discourse context could support 'Sir.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy §3'
