id: JHN.4.49
reference: John 4:49
source:
  edition: SBLGNT
  text: λέγει πρὸς αὐτὸν ὁ βασιλικός· Κύριε, κατάβηθι πρὶν ἀποθανεῖν τὸ παιδίον μου.
translation:
  text: The royal official said to him, “Lord, come down before my child dies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek word is κύριε, a respectful address that can also mean
      “Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ βασιλικός
  chosen: the royal official
  alternatives:
  - the king's officer
  - the court official
  - the nobleman
  lexicon: BDAG
  rationale: βασιλικός here functions substantivally for a person connected with the
    king or royal court. 'Royal official' is clear modern English and avoids the potentially
    misleading social-class nuance of 'nobleman' while preserving the court connection.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines, whose default rendering
    is 'Lord.' In this narrative context it can also function as a respectful address
    like 'sir,' but the house style prefers 'Lord,' and the Gospel context allows
    the fuller resonance without overstating the speaker's theology.
- source_word: κατάβηθι
  chosen: come down
  alternatives:
  - go down
  - come
  lexicon: BDAG
  rationale: The aorist imperative of καταβαίνω literally means 'go/come down.' Because
    the speaker addresses Jesus and urges movement toward Capernaum from Cana, English
    idiom favors 'come down.' Retaining 'down' preserves the geographical/topographical
    sense present in the Greek.
- source_word: πρὶν ἀποθανεῖν
  chosen: before ... dies
  alternatives:
  - before ... should die
  - before the death of
  lexicon: BDAG
  rationale: 'πρίν with the infinitive expresses prior time: ''before dying/before
    he dies.'' Smooth English requires an explicit subject from context, yielding
    ''before my child dies.'''
- source_word: τὸ παιδίον μου
  chosen: my child
  alternatives:
  - my little boy
  - my son
  lexicon: BDAG
  rationale: παιδίον denotes a child or young child. 'My child' preserves the lexical
    sense without over-specifying gender. Although the broader context may imply a
    son, this verse itself uses παιδίον rather than υἱός, so 'child' best reflects
    the Greek.
- source_word: λέγει πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: The Greek historical present λέγει is commonly rendered with an English
    past tense in narrative for natural readability. 'Said to him' preserves the speech-introduction
    function without awkwardness.
