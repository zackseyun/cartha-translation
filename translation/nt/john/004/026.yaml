theological_decisions:
- issue: Whether to make the messianic identification explicit in the main text
  chosen_reading: Retain the Greek's concise 'I am' rather than expanding to 'I am
    he' or 'I, the Messiah, am he.'
  alternative_readings:
  - I am he
  - I who speak to you am he
  rationale: The immediate context (4:25) makes clear that Jesus is identifying himself
    as the awaited Messiah, but the supplied predicate is not explicit in the Greek
    of this verse. Keeping 'I am' preserves the source wording and avoids importing
    more than the text states, while a footnote can preserve the idiomatic English
    alternative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
