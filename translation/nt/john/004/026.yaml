id: JHN.4.26
reference: John 4:26
source:
  edition: SBLGNT
  text: λέγει αὐτῇ ὁ Ἰησοῦς· Ἐγώ εἰμι, ὁ λαλῶν σοι.
translation:
  text: Jesus said to her, “I am—the one speaking to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am he, the one speaking to you.” The Greek reads simply, “I am, the
      one speaking to you,” with the implied identification supplied from the context
      of the Messiah in the previous verse.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek present can be rendered as a historical present ('says'),
    standard readable English normally shifts it to past narrative tense ('said').
    This preserves the narrative function without sounding unnatural.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative indirect object naturally rendered 'to her.'
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  - I am he
  lexicon: BDAG
  rationale: The Greek is explicitly 'I am.' In context Jesus identifies himself as
    the expected Messiah mentioned in the previous verse, so 'I am he' is interpretively
    possible, but 'he' is not present in the Greek. 'I am' best preserves both the
    immediate identification and the wording's potential theological resonance.
- source_word: ὁ λαλῶν σοι
  chosen: the one speaking to you
  alternatives:
  - the one who is speaking to you
  - the one talking with you
  lexicon: BDAG
  rationale: The articular present participle is naturally rendered as a substantival
    expression, 'the one speaking to you.' 'Speaking' is slightly more formal and
    closer to λαλέω than 'talking.'
