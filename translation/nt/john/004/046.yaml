theological_decisions:
- issue: Rendering βασιλικός without importing historical certainty about Herod Antipas's
    court
  chosen_reading: royal official
  alternative_readings:
  - nobleman
  - king's officer
  rationale: The verse identifies the man by royal association but does not specify
    rank or exact office. 'Royal official' preserves the connection to a ruler without
    overstating the historical detail or social status.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
