id: JHN.4.46
reference: John 4:46
source:
  edition: SBLGNT
  text: Ἦλθεν οὖν ⸀πάλιν εἰς τὴν Κανὰ τῆς Γαλιλαίας, ὅπου ἐποίησεν τὸ ὕδωρ οἶνον.
    καὶ ἦν τις βασιλικὸς οὗ ὁ υἱὸς ἠσθένει ἐν Καφαρναούμ.
translation:
  text: So he came again to Cana of Galilee, where he had made the water wine. And
    there was a certain royal official whose son was sick in Capernaum.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'where he turned the water into wine.' The Greek
      reads more literally, 'where he had made the water wine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nobleman' or 'king's officer.' The Greek βασιλικός denotes someone attached
      to a royal court or in royal service.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Straightforward adverb indicating repeated return; 'again' is the most
    natural and direct rendering.
- source_word: Κανὰ τῆς Γαλιλαίας
  chosen: Cana of Galilee
  alternatives:
  - Cana in Galilee
  lexicon: BDAG
  rationale: Standard transliteration of the place name with a genitive of region.
    'Of Galilee' closely reflects the Greek while remaining idiomatic.
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: Simple locative relative adverb linking this visit to the earlier sign
    at Cana.
- source_word: ἐποίησεν τὸ ὕδωρ οἶνον
  chosen: he had made the water wine
  alternatives:
  - he made the water wine
  - he turned the water into wine
  lexicon: BDAG
  rationale: The Greek says literally 'made the water wine.' The pluperfect 'had made'
    fits the prior event relative to the current narrative moment. 'Turned ... into
    wine' is interpretive and smoother, but the chosen rendering stays closer to the
    source wording while remaining clear.
- source_word: βασιλικός
  chosen: royal official
  alternatives:
  - king's officer
  - court official
  - nobleman
  lexicon: BDAG
  rationale: The term denotes one connected with a king or royal court. 'Royal official'
    is clear modern English and avoids the potentially misleading social-class emphasis
    of 'nobleman.'
- source_word: τις
  chosen: a certain
  alternatives:
  - a
  - someone
  lexicon: BDAG
  rationale: Indefinite pronoun introducing a particular but unnamed person. 'A certain'
    preserves the Greek nuance better than a bare 'a.'
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: The Greek specifically identifies the sick person as a son, so gender-accurate
    rendering is required.
- source_word: ἠσθένει
  chosen: was sick
  alternatives:
  - was ill
  - was weak
  lexicon: BDAG
  rationale: In context the verb refers to physical illness. 'Was sick' is natural,
    concise, and contextually precise.
- source_word: Καφαρναούμ
  chosen: Capernaum
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
