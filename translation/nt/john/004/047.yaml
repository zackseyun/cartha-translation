id: JHN.4.47
reference: John 4:47
source:
  edition: SBLGNT
  text: οὗτος ἀκούσας ὅτι Ἰησοῦς ἥκει ἐκ τῆς Ἰουδαίας εἰς τὴν Γαλιλαίαν ἀπῆλθεν πρὸς
    αὐτὸν καὶ ⸀ἠρώτα ἵνα καταβῇ καὶ ἰάσηται αὐτοῦ τὸν υἱόν, ἤμελλεν γὰρ ἀποθνῄσκειν.
translation:
  text: When this man heard that Jesus had come from Judea into Galilee, he went to
    him and kept asking him to come down and heal his son, for he was about to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was asking.' The Greek imperfect may indicate continued or repeated
      action; 'kept asking' brings out that nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Come down'' reflects the change in elevation between locations in Galilee.'
    reason: cultural_note
lexical_decisions:
- source_word: οὗτος
  chosen: this man
  alternatives:
  - he
  - this one
  lexicon: BDAG
  rationale: Although literally 'this one,' in English narrative style 'this man'
    naturally refers back to the royal official of the previous verse and preserves
    the demonstrative force better than a bare pronoun.
- source_word: ἀκούσας
  chosen: heard
  alternatives:
  - having heard
  - when he heard
  lexicon: BDAG
  rationale: The aorist participle is rendered temporally in smooth English. 'When
    ... heard' captures the participial relationship to the main verb without sounding
    wooden.
- source_word: ἥκει
  chosen: had come
  alternatives:
  - had arrived
  - was present
  lexicon: BDAG
  rationale: ἥκω commonly conveys arrival/presence resulting from coming. 'Had come'
    fits the reported news and reads naturally with the movement from Judea into Galilee.
- source_word: ἐκ τῆς Ἰουδαίας εἰς τὴν Γαλιλαίαν
  chosen: from Judea into Galilee
  alternatives:
  - out of Judea to Galilee
  lexicon: BDAG
  rationale: 'This preserves both directional prepositions: source (''from'') and
    destination (''into''). ''Into'' reflects εἰς more precisely than a simple ''to''
    while remaining idiomatic.'
- source_word: ἀπῆλθεν πρὸς αὐτόν
  chosen: he went to him
  alternatives:
  - he departed to him
  - he came to him
  lexicon: BDAG
  rationale: ἀπέρχομαι here denotes going from one place to another; with πρὸς αὐτόν,
    'went to him' is the most natural English rendering.
- source_word: ἠρώτα
  chosen: kept asking
  alternatives:
  - asked
  - was asking
  - begged
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or repeated action. 'Kept asking' preserves
    that aspect better than simple 'asked.' 'Begged' may overinterpret the emotional
    force beyond the lexical value of ἐρωτάω.
- source_word: ἵνα καταβῇ
  chosen: to come down
  alternatives:
  - that he should come down
  lexicon: BDAG
  rationale: After a verb of asking, English commonly uses an infinitive construction.
    'Come down' preserves the topographical sense of καταβαίνω, likely from Cana down
    to Capernaum.
- source_word: ἰάσηται
  chosen: heal
  alternatives:
  - cure
  - make well
  lexicon: BDAG
  rationale: ἰάομαι commonly means 'heal' in physical healing contexts. 'Heal' is
    standard, clear, and preserves the miracle context without colloquial flattening.
- source_word: αὐτοῦ τὸν υἱόν
  chosen: his son
  alternatives:
  - the son of him
  lexicon: BDAG
  rationale: Standard English possessive rendering of the genitive plus accusative
    construction.
- source_word: ἤμελλεν γὰρ ἀποθνῄσκειν
  chosen: for he was about to die
  alternatives:
  - for he was going to die
  - for he was at the point of death
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates imminence. 'Was about to die' best captures
    the urgent sense. 'At the point of death' is interpretive and more idiomatic than
    literal.
