theological_decisions:
- issue: Referent of 'he was about to die'
  chosen_reading: The clause refers to the son, not Jesus or the official.
  rationale: The nearest and contextually obvious referent is 'his son.' This is a
    grammatical and contextual decision, not a doctrinally contested one, but it is
    important for auditability.
