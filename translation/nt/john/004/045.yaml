id: JHN.4.45
reference: John 4:45
source:
  edition: SBLGNT
  text: ὅτε οὖν ἦλθεν εἰς τὴν Γαλιλαίαν, ἐδέξαντο αὐτὸν οἱ Γαλιλαῖοι, πάντα ἑωρακότες
    ⸀ὅσα ἐποίησεν ἐν Ἱεροσολύμοις ἐν τῇ ἑορτῇ, καὶ αὐτοὶ γὰρ ἦλθον εἰς τὴν ἑορτήν.
translation:
  text: So when he came into Galilee, the Galileans welcomed him, having seen all
    that he had done in Jerusalem at the feast, for they too had gone to the feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received him.' The Greek verb can denote receiving or welcoming; here
      the context suggests a favorable reception.
    reason: lexical_alternative
  - marker: b
    text: Or 'festival.' The Greek ἑορτή refers to a religious feast; John likely
      has the Jerusalem pilgrimage feast in view from the surrounding context.
    reason: cultural_note
lexical_decisions:
- source_word: ὅτε οὖν
  chosen: So when
  alternatives:
  - Therefore when
  - When then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference; 'So when' gives natural English
    while preserving the connective force better than a bare 'when'.
- source_word: ἦλθεν εἰς τὴν Γαλιλαίαν
  chosen: he came into Galilee
  alternatives:
  - he came to Galilee
  - he arrived in Galilee
  lexicon: BDAG
  rationale: ἔρχομαι with εἰς naturally means movement into a region. 'Came into'
    preserves the directional sense without sounding wooden.
- source_word: ἐδέξαντο αὐτὸν
  chosen: welcomed him
  alternatives:
  - received him
  - accepted him
  lexicon: BDAG
  rationale: δέχομαι here denotes favorable reception, not mere physical receipt.
    'Welcomed' best captures the positive social sense in idiomatic English.
- source_word: οἱ Γαλιλαῖοι
  chosen: the Galileans
  alternatives:
  - the people of Galilee
  lexicon: BDAG
  rationale: A straightforward ethnogeographic designation; 'the Galileans' is concise
    and natural.
- source_word: πάντα ἑωρακότες ὅσα
  chosen: having seen all that
  alternatives:
  - because they had seen everything that
  - after seeing all that
  lexicon: BDAG
  rationale: The perfect participle ἑωρακότες gives prior completed perception with
    present relevance. 'Having seen all that' preserves the participial linkage and
    causal background without over-interpreting.
- source_word: ἐποίησεν
  chosen: he had done
  alternatives:
  - he did
  lexicon: BDAG
  rationale: English past perfect fits the temporal relation to their welcoming and
    prior seeing at the feast.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard rendering of the locative phrase.
- source_word: ἐν τῇ ἑορτῇ
  chosen: at the feast
  alternatives:
  - during the feast
  - at the festival
  lexicon: BDAG
  rationale: ἑορτή is a festal occasion; in Johannine context 'the feast' is idiomatic
    and sufficiently specific, while 'at' naturally renders the temporal-locative
    force.
- source_word: καὶ αὐτοὶ γὰρ
  chosen: for they too
  alternatives:
  - for they themselves also
  - because they too
  lexicon: BDAG
  rationale: γάρ gives explanation, and αὐτοὶ adds emphasis/inclusion. 'For they too'
    preserves both the explanatory and inclusive force in smooth English.
- source_word: ἦλθον εἰς τὴν ἑορτήν
  chosen: had gone to the feast
  alternatives:
  - went to the feast
  - had come to the feast
  lexicon: BDAG
  rationale: The aorist refers to their prior attendance in Jerusalem; English past
    perfect clarifies the sequence. 'Gone' is more idiomatic from the narrator's perspective
    than 'come' here.
