id: JHN.4.24
reference: John 4:24
source:
  edition: SBLGNT
  text: πνεῦμα ὁ θεός, καὶ τοὺς προσκυνοῦντας αὐτὸν ἐν πνεύματι καὶ ἀληθείᾳ δεῖ προσκυνεῖν.
translation:
  text: God is spirit, and those who worship him must worship in spirit and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the Spirit and truth.' The Greek can be understood more specifically,
      but the wording here preserves the broader sense of the phrase.
    reason: alternative_reading
  - marker: b
    text: '''God is spirit'' expresses God''s nature; it does not mean merely that
      God is one spirit-being among others.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  chosen: spirit
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: Anarthrous predicate nominative before ὁ θεός; the sense is qualitative
    ('God is spirit') rather than identifying God as 'a spirit.' Lowercase 'spirit'
    best conveys nature/quality in English without implying the Holy Spirit specifically.
    'Spirit' is preserved as an alternative because some English traditions capitalize
    it to stress divine nature.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός here, with the article marking the subject
    in the clause ('God is spirit'). English idiom omits the article with the proper
    divine reference.
- source_word: προσκυνοῦντας
  chosen: those who worship
  alternatives:
  - the ones worshiping
  lexicon: BDAG
  rationale: The present participle with article functions substantivally, referring
    to worshipers as a class. 'Those who worship' is natural modern English and preserves
    the ongoing/general force.
- source_word: ἐν πνεύματι
  chosen: in spirit
  alternatives:
  - in the Spirit
  - in spirit
  lexicon: BDAG
  rationale: The prepositional phrase is rendered straightforwardly. Because πνεύματι
    lacks the article and is paired with ἀληθείᾳ, the phrase most naturally means
    worship characterized by spiritual reality rather than explicitly 'in the Holy
    Spirit.' The capitalization alternative is preserved in a footnote because the
    phrase is interpretively significant.
- source_word: ἀληθείᾳ
  chosen: truth
  alternatives:
  - truthfulness
  - reality
  lexicon: BDAG
  rationale: '''Truth'' is the standard and most contextually fitting rendering, especially
    in Johannine usage where ἀλήθεια carries both factual and revelatory force. Alternatives
    are possible but less idiomatic here.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. 'Must' is concise, natural, and
    preserves the force of required worship.
- source_word: προσκυνεῖν
  chosen: worship
  alternatives:
  - bow down in worship
  lexicon: BDAG
  rationale: Infinitive complement to δεῖ. 'Worship' is the standard contextual rendering;
    the more literal bodily nuance 'bow down' is present in the verb's history but
    not primary in this context.
