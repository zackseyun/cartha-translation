theological_decisions:
- issue: Meaning of 'God is spirit'
  chosen_reading: A qualitative statement about God's nature, not 'God is a spirit'
    as one being among other spirits.
  alternative_readings:
  - God is a spirit
  rationale: The Greek word order and absence of the article with πνεῦμα favor a qualitative
    predicate. This avoids suggesting that God belongs merely to a class of spiritual
    beings while preserving the text's affirmation about God's nature.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §1 original-language primacy and §3 preserve theological tension rather than resolve
    it beyond the text.'
- issue: Meaning of 'in spirit and truth'
  chosen_reading: Worship must be characterized by spiritual reality and truth, without
    specifying more than the text states about the Holy Spirit.
  alternative_readings:
  - in the Spirit and in truth
  - with sincerity and truth
  rationale: The anarthrous πνεύματι and ἀληθείᾳ support a rendering that preserves
    the phrase's breadth. The translation avoids narrowing it either to explicit reference
    to the Holy Spirit alone or to mere inward sincerity.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather
    than resolve it.
