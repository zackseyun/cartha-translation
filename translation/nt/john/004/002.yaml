id: JHN.4.2
reference: John 4:2
source:
  edition: SBLGNT
  text: καίτοιγε Ἰησοῦς αὐτὸς οὐκ ἐβάπτιζεν ἀλλ’ οἱ μαθηταὶ αὐτοῦ—
translation:
  text: although Jesus himself was not baptizing, but his disciples were—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus himself did not baptize, but his disciples did.' The Greek verb
      is imperfect, which may suggest ongoing or customary action.
    reason: lexical_alternative
lexical_decisions:
- source_word: καίτοιγε
  chosen: although
  alternatives:
  - and yet
  - though indeed
  - although indeed
  lexicon: BDAG
  rationale: This conjunction introduces a concessive clarification to the previous
    statement. 'Although' gives clear modern English and captures the adversative-concessive
    force without sounding wooden.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard transliteration of the personal name, following the philosophy
    of transliterating names rather than translating them.
- source_word: αὐτὸς
  chosen: himself
  alternatives:
  - personally
  - he himself
  lexicon: BDAG
  rationale: The pronoun is emphatic in apposition to 'Jesus.' 'Himself' preserves
    the emphasis that Jesus personally was not the one performing the baptisms.
- source_word: οὐκ ἐβάπτιζεν
  chosen: was not baptizing
  alternatives:
  - did not baptize
  - was not performing baptisms
  lexicon: BDAG
  rationale: The imperfect verb suggests ongoing or customary action in context. 'Was
    not baptizing' preserves that aspect more transparently than the simple past 'did
    not baptize,' while remaining natural English.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: BDAG
  rationale: Marks the contrast between Jesus and his disciples. 'But' is the most
    natural English adversative here.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples were
  alternatives:
  - his disciples did
  - his disciples were baptizing
  lexicon: BDAG
  rationale: The Greek omits the repeated verb after 'but,' and English naturally
    supplies it from the previous clause. 'His disciples were' preserves the ellipsis
    while making the contrast intelligible. The supplied verbal idea is clearly 'baptizing'
    from context.
