theological_decisions:
- issue: Clarification of who performed baptisms in Jesus' ministry
  chosen_reading: The verse states that Jesus himself did not personally administer
    baptisms; his disciples did.
  alternative_readings:
  - The verse could be rendered more simply as 'Jesus did not baptize, but his disciples
    did,' without preserving the imperfect nuance.
  rationale: This is not a doctrinally contested term but a narratival clarification.
    The translation preserves the emphatic distinction and the imperfect aspect without
    importing any theological explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
