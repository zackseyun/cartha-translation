id: JHN.4.43
reference: John 4:43
source:
  edition: SBLGNT
  text: Μετὰ δὲ τὰς δύο ἡμέρας ἐξῆλθεν ⸀ἐκεῖθεν εἰς τὴν Γαλιλαίαν·
translation:
  text: After the two days, he departed from there for Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to Galilee.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰς δύο ἡμέρας
  chosen: After the two days
  alternatives:
  - After the two days had passed
  - And after two days
  lexicon: BDAG
  rationale: μετά with the accusative expresses temporal sequence, 'after.' The article
    with 'two days' is naturally rendered in English as 'the two days,' referring
    back to the two-day stay just mentioned. δέ is left untranslated as a mild connective,
    since English style does not require an explicit 'and/but' here.
- source_word: ἐξῆλθεν
  chosen: he departed
  alternatives:
  - he went out
  - he left
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, literally 'went out.' In travel narrative English,
    'departed' best captures movement away from the prior location without sounding
    wooden. 'Went out' is more literal but less idiomatic here.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Adverb of place indicating departure from the previously mentioned location
    (Samaria/Sychar context). 'From there' is the most natural and sufficiently precise
    rendering.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: for Galilee
  alternatives:
  - to Galilee
  - into Galilee
  lexicon: BDAG
  rationale: εἰς marks movement toward a destination. 'For Galilee' is idiomatic with
    'departed' in English; 'to Galilee' would also be fully acceptable. 'Into Galilee'
    is possible but unnecessarily spatially marked in this context.
