id: JHN.4.5
reference: John 4:5
source:
  edition: SBLGNT
  text: ἔρχεται οὖν εἰς πόλιν τῆς Σαμαρείας λεγομένην Συχὰρ πλησίον τοῦ χωρίου ὃ ἔδωκεν
    Ἰακὼβ ⸀τῷ Ἰωσὴφ τῷ υἱῷ αὐτοῦ·
translation:
  text: So he came to a town of Samaria called Sychar, near the piece of land that
    Jacob had given to Joseph his son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “city of Samaria.” The Greek word πόλις can refer to either a city or
      a town, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “field.” The Greek χωρίον can denote a field, property, or piece of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: he came
  alternatives:
  - he comes
  - he arrived
  lexicon: BDAG
  rationale: Greek present is a historical present in narrative; English simple past
    is the most natural rendering while preserving the event sequence.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the prior context. 'So' is
    natural modern English and preserves the connective force without sounding overly
    formal.
- source_word: πόλιν
  chosen: town
  alternatives:
  - city
  lexicon: BDAG
  rationale: πόλις can mean city or town; 'town' fits readable modern English and
    the likely scale of Sychar without overstating size.
- source_word: τῆς Σαμαρείας
  chosen: of Samaria
  alternatives:
  - in Samaria
  lexicon: BDAG
  rationale: The genitive most directly modifies 'town' as belonging to/located in
    the region of Samaria. 'Of Samaria' is a close and natural rendering.
- source_word: λεγομένην Συχὰρ
  chosen: called Sychar
  alternatives:
  - named Sychar
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the participial expression identifying
    the town by name.
- source_word: πλησίον
  chosen: near
  alternatives:
  - close to
  lexicon: BDAG
  rationale: Simple spatial preposition; 'near' is concise and natural.
- source_word: χωρίου
  chosen: piece of land
  alternatives:
  - field
  - property
  - parcel of ground
  lexicon: BDAG
  rationale: χωρίον denotes a tract or piece of land. 'Piece of land' avoids implying
    only cultivated farmland ('field') while remaining clear.
- source_word: ὃ ἔδωκεν Ἰακὼβ
  chosen: that Jacob had given
  alternatives:
  - which Jacob gave
  lexicon: BDAG
  rationale: English past perfect fits the relative clause's backgrounding function
    in relation to the main narrative event.
- source_word: τῷ Ἰωσὴφ τῷ υἱῷ αὐτοῦ
  chosen: to Joseph his son
  alternatives:
  - to Joseph, his son
  - to his son Joseph
  lexicon: BDAG
  rationale: This preserves the dative recipient and appositional identification in
    smooth English. 'Joseph his son' keeps the Greek order's emphasis on Joseph while
    remaining idiomatic.
