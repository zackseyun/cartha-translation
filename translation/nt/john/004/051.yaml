theological_decisions:
- issue: Reference of παῖς in the healing narrative
  chosen_reading: his child
  alternative_readings:
  - his son
  - his servant
  rationale: The verse uses παῖς, a semantically broad term. Given the broader context
    of John 4, many English versions harmonize to 'son,' but this verse itself does
    not require that narrower gloss. 'Child' preserves the lexical breadth and avoids
    importing more specificity than the word itself demands, while a footnote preserves
    the common alternative.
  doctrine_reference: Translation philosophy §§1, 3, 5
