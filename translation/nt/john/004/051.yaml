id: JHN.4.51
reference: John 4:51
source:
  edition: SBLGNT
  text: ἤδη δὲ αὐτοῦ καταβαίνοντος οἱ δοῦλοι αὐτοῦ ⸀ὑπήντησαν ⸀αὐτῷ λέγοντες ὅτι ὁ
    παῖς ⸀αὐτοῦ ζῇ.
translation:
  text: And while he was already going down, his slaves met him, saying that his child
    was alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his son'; Greek pais can mean 'child,' 'boy,' or in some contexts 'servant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: already
  alternatives:
  - by this time
  - now already
  lexicon: BDAG
  rationale: Marks that the action is already in progress before the meeting occurs;
    'already' is the most natural concise English equivalent.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Functions as a mild connective advancing the narrative. 'And' fits smooth
    English narrative flow without overstating contrast.
- source_word: καταβαίνοντος
  chosen: was already going down
  alternatives:
  - was going down
  - was descending
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous ongoing
    action. 'Going down' is idiomatic for travel from Cana toward Capernaum; 'descending'
    is more wooden.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    Here these are household dependents under the official's authority; 'slaves' preserves
    the bonded social reality better than the softened 'servants,' while not carrying
    special theological salience.
- source_word: ὑπήντησαν
  chosen: met
  alternatives:
  - went to meet
  - encountered
  lexicon: BDAG
  rationale: The verb denotes meeting someone, often by going out to meet them. 'Met'
    is the clearest natural English rendering in this narrative context.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - reporting
  lexicon: BDAG
  rationale: Present participle expresses attendant action accompanying the meeting.
    'Saying' preserves the participial linkage without unnecessary expansion.
- source_word: παῖς
  chosen: child
  alternatives:
  - boy
  - servant
  - son
  lexicon: BDAG
  rationale: παῖς can mean child, boy, servant, or in some contexts son. In this immediate
    context, the official's dependent who was healed has been referred to with language
    that can overlap between 'son' and 'child'; 'child' preserves the familial sense
    without over-specifying age or forcing 'son' where this verse itself uses παῖς
    rather than υἱός.
- source_word: ζῇ
  chosen: was alive
  alternatives:
  - lives
  - was living
  - had recovered
  lexicon: BDAG
  rationale: Although present tense formally means 'lives/is alive,' in English reported
    speech after a past narrative frame is naturally rendered 'was alive.' This preserves
    the sense that the child had recovered from the brink of death without adding
    interpretive wording like 'had recovered'.
