theological_decisions:
- issue: Rendering κύριος in the Samaritan woman's address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' In this early stage of the
    conversation the woman may simply be using a respectful form of address, so 'Sir'
    is contextually plausible; however, the project's stated default is maintained
    in the main text and the alternative is preserved in a footnote to avoid overstating
    her theological recognition while keeping consistency.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering ὕδωρ τὸ ζῶν in a way that preserves Johannine double meaning
  chosen_reading: the living water
  alternative_readings:
  - running water
  rationale: The Greek expression can mean fresh/running water in ordinary usage,
    which fits the woman's literal misunderstanding, but John's narrative also uses
    it with deeper theological significance in Jesus' speech. 'The living water' best
    preserves that tension in the main text, with 'running water' footnoted as the
    literal/idiomatic alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
