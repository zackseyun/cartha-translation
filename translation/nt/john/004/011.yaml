id: JHN.4.11
reference: John 4:11
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ⸂ἡ γυνή⸃· Κύριε, οὔτε ἄντλημα ἔχεις καὶ τὸ φρέαρ ἐστὶν βαθύ· πόθεν
    οὖν ἔχεις τὸ ὕδωρ τὸ ζῶν;
translation:
  text: The woman said to him, “Lord, you have neither a bucket, and the well is deep.
    So where do you get the living water?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek κύριε is a respectful form of address and can mean either
      “Lord” or “Sir” depending on context.
    reason: alternative_reading
  - marker: b
    text: Or “running water,” that is, fresh flowing water as opposed to stagnant
      water. The wording also preserves the deeper sense intended in Jesus’ statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style is more natural with the simple past 'said' here. This preserves the discourse
    function without sounding wooden.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: In context this refers to the Samaritan woman at the well, not 'wife.'
    The article is naturally retained in English as 'the woman.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: The project default for κύριος is 'Lord.' In this dialogue the term can
    function as a respectful address akin to 'sir,' but the default rendering is retained
    for consistency, while the contextual alternative is preserved in a footnote.
- source_word: οὔτε
  chosen: neither
  alternatives:
  - not
  lexicon: BDAG
  rationale: οὔτε introduces the first part of a correlative negation. English 'neither'
    captures the force when followed by the second observation about the well.
- source_word: ἄντλημα
  chosen: bucket
  alternatives:
  - drawing vessel
  - pail
  lexicon: BDAG
  rationale: The noun refers to an implement for drawing water. 'Bucket' is clear,
    natural modern English and fits the scene better than the more technical 'drawing
    vessel.'
- source_word: τὸ φρέαρ
  chosen: the well
  alternatives:
  - the cistern
  - the pit
  lexicon: BDAG
  rationale: In this context φρέαρ refers to the well from which water is drawn. 'Well'
    is the standard and contextually precise rendering.
- source_word: βαθύ
  chosen: deep
  alternatives:
  - very deep
  lexicon: BDAG
  rationale: The adjective simply states the well's depth. 'Deep' is sufficient; adding
    'very' would overtranslate.
- source_word: πόθεν οὖν
  chosen: So where
  alternatives:
  - From where then
  - Where then
  lexicon: BDAG
  rationale: πόθεν asks about source or origin, and οὖν marks inference. 'So where'
    gives idiomatic English while preserving the logical connection.
- source_word: τὸ ὕδωρ τὸ ζῶν
  chosen: the living water
  alternatives:
  - living water
  - running water
  lexicon: BDAG
  rationale: The phrase can denote fresh/running water idiomatically, but in Johannine
    context it also carries Jesus' metaphorical meaning. 'The living water' preserves
    both the literal expression and the theological resonance. The more narrowly idiomatic
    alternative 'running water' is preserved in a footnote.
