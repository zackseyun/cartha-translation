id: JHN.4.48
reference: John 4:48
source:
  edition: SBLGNT
  text: εἶπεν οὖν ὁ Ἰησοῦς πρὸς αὐτόν· Ἐὰν μὴ σημεῖα καὶ τέρατα ἴδητε, οὐ μὴ πιστεύσητε.
translation:
  text: So Jesus said to him, “Unless you see signs and wonders, you will certainly
    not believe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The verbs 'see' and 'believe' are plural in Greek, so Jesus' words likely
      extend beyond the official himself to a wider group.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding exchange. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - to this man
  lexicon: BDAG
  rationale: Standard directional use of πρός with accusative in speech introduction.
    'To him' is the most direct and natural rendering.
- source_word: Ἐὰν μὴ
  chosen: Unless
  alternatives:
  - If ... not
  lexicon: BDAG
  rationale: This compactly renders the conditional negation in idiomatic English
    while preserving the force of the condition.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  lexicon: BDAG
  rationale: In John, σημεῖον is a theologically loaded term pointing beyond the act
    to its significance. 'Signs' preserves Johannine usage better than a more interpretive
    'miracles.'
- source_word: τέρατα
  chosen: wonders
  alternatives:
  - portents
  lexicon: BDAG
  rationale: The common pair σημεῖα καὶ τέρατα is conventionally rendered 'signs and
    wonders.' 'Wonders' communicates extraordinary phenomena accessibly in modern
    English.
- source_word: ἴδητε
  chosen: you see
  alternatives:
  - you may see
  - you should see
  lexicon: BDAG
  rationale: Aorist subjunctive in the conditional clause is best rendered with simple
    present English after 'unless.' The plural form is preserved as 'you' plural in
    context, even though English does not mark number.
- source_word: οὐ μὴ πιστεύσητε
  chosen: you will certainly not believe
  alternatives:
  - you will never believe
  - you certainly will not believe
  lexicon: BDAG
  rationale: οὐ μὴ with aorist subjunctive is a strong negation. 'Will certainly not
    believe' preserves the emphatic force without over-idiomatizing. 'Believe' is
    preferred over 'have faith,' matching normal Johannine usage and the default rendering
    of πιστις cognates.
- source_word: πιστεύσητε
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: πιστεύω in John regularly carries the sense of believing/trusting, often
    with theological depth. 'Believe' is the standard and least interpretively loaded
    English equivalent here.
