theological_decisions:
- issue: Number and scope of the addressee
  chosen_reading: Render the direct address as singular in the introduction ('to him')
    but preserve the plural force in Jesus' statement with English 'you,' understood
    contextually as plural.
  alternative_readings:
  - Treat the whole saying as addressed only to the official in an individual sense
  - Make the plural explicit with an expanded rendering such as 'you people'
  rationale: The narrative frame addresses one man, but ἴδητε and πιστεύσητε are plural,
    suggesting Jesus' words extend beyond the individual to a broader audience or
    mindset. Standard English 'you' can preserve this without adding interpretive
    wording to the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
