id: JHN.4.44
reference: John 4:44
source:
  edition: SBLGNT
  text: αὐτὸς ⸀γὰρ Ἰησοῦς ἐμαρτύρησεν ὅτι προφήτης ἐν τῇ ἰδίᾳ πατρίδι τιμὴν οὐκ ἔχει.
translation:
  text: For Jesus himself testified that a prophet has no honor in his own homeland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his own country' or 'in his own native place.' The Greek πατρίς can
      refer to one's homeland or home region.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanatory statement connecting this verse to the
    surrounding narrative. 'For' preserves the discourse function in natural English
    better than omitting it.
- source_word: αὐτὸς ... Ἰησοῦς
  chosen: Jesus himself
  alternatives:
  - Jesus
  - he himself, Jesus
  lexicon: BDAG
  rationale: The pronoun αὐτός is emphatic in apposition with Ἰησοῦς. 'Jesus himself'
    preserves the emphasis without awkwardness.
- source_word: ἐμαρτύρησεν
  chosen: testified
  alternatives:
  - bore witness
  - declared
  lexicon: BDAG
  rationale: μαρτυρέω commonly means 'testify' or 'bear witness.' 'Testified' keeps
    the witness-language that is important in John while remaining readable modern
    English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of Jesus' testimony; standard English complementizer
    'that' is appropriate.
- source_word: προφήτης
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: BDAG
  rationale: 'The anarthrous singular is naturally rendered indefinitely in English:
    ''a prophet.'' This expresses the proverbial character of the saying.'
- source_word: ἐν τῇ ἰδίᾳ πατρίδι
  chosen: in his own homeland
  alternatives:
  - in his own country
  - in his own native place
  - in his own fatherland
  lexicon: BDAG
  rationale: πατρίς denotes one's native place or homeland. 'Homeland' is natural
    modern English and preserves the sense of one's own home region. ἰδίᾳ is reflected
    by 'own,' and the possessive 'his' is supplied idiomatically in English from the
    subject and the proverbial sense.
- source_word: τιμὴν οὐκ ἔχει
  chosen: has no honor
  alternatives:
  - is not honored
  - receives no honor
  lexicon: BDAG
  rationale: The Greek literally says 'does not have honor.' 'Has no honor' is a close
    and idiomatic rendering that preserves the noun τιμή ('honor') rather than converting
    it to a verb.
