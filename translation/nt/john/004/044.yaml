theological_decisions:
- issue: Referent and scope of 'his own homeland' in Johannine context
  chosen_reading: Translate the proverb straightforwardly without resolving whether
    'his own homeland' refers specifically to Judea, Galilee, or Nazareth in this
    narrative context.
  alternative_readings:
  - Judea
  - Galilee
  - Nazareth/home region generally
  rationale: The verse itself presents a general proverb and does not explicitly identify
    the geographical referent. To preserve interpretive tension, the translation keeps
    the broader wording 'his own homeland' and avoids importing a harmonizing explanation
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
