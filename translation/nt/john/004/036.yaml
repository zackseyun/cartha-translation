theological_decisions:
- issue: Whether to make the present-tense force explicit at the start of the verse
  chosen_reading: Included 'Already' in the main text
  alternative_readings:
  - Omit 'Already' and begin 'The one who reaps receives wages...'
  rationale: Although no separate adverb for 'already' appears in the Greek of this
    clause, the immediate discourse context (vv. 35–38) stresses the surprising present
    reality of the harvest. Adding 'Already' is a modest discourse-level clarification
    consistent with optimal equivalence, not a doctrinal expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
