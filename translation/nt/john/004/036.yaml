id: JHN.4.36
reference: John 4:36
source:
  edition: SBLGNT
  text: ⸀ὁ θερίζων μισθὸν λαμβάνει καὶ συνάγει καρπὸν εἰς ζωὴν αἰώνιον, ⸀ἵνα ὁ σπείρων
    ὁμοῦ χαίρῃ καὶ ὁ θερίζων.
translation:
  text: Already the one who reaps is receiving wages and gathering fruit for eternal
    life, so that the one who sows and the one who reaps may rejoice together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reward' instead of 'wages.' The Greek term can denote either earned
      pay or recompense.
    reason: lexical_alternative
  - marker: b
    text: Or 'unto eternal life.' The phrase can express goal or result.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θερίζων
  chosen: the one who reaps
  alternatives:
  - the reaper
  - he who reaps
  lexicon: BDAG
  rationale: Articular present participle used substantivally. 'The one who reaps'
    is natural modern English and preserves the ongoing verbal sense better than the
    more nominal 'the reaper.'
- source_word: μισθὸν
  chosen: wages
  alternatives:
  - reward
  - pay
  lexicon: BDAG
  rationale: μισθός can mean wages/pay or reward. In this harvest metaphor, 'wages'
    keeps the concrete labor imagery while still allowing theological resonance. Singular
    in Greek is idiomatically rendered by the English mass/plural form 'wages.'
- source_word: λαμβάνει
  chosen: is receiving
  alternatives:
  - receives
  lexicon: BDAG
  rationale: Present indicative suggests current action. 'Is receiving' brings out
    the immediacy, especially with the discourse context where Jesus emphasizes that
    the harvest is already underway.
- source_word: συνάγει
  chosen: gathering
  alternatives:
  - gathers
  - collects
  lexicon: BDAG
  rationale: Present indicative coordinated with λαμβάνει. Rendered as a participial
    English form after 'is receiving' for smoothness while preserving contemporaneous
    action.
- source_word: καρπὸν
  chosen: fruit
  alternatives:
  - produce
  - harvest
  lexicon: BDAG
  rationale: '''Fruit'' is the standard gloss and preserves the metaphorical breadth
    of the term. ''Harvest'' would risk collapsing the distinction between reaping
    and what is gathered.'
- source_word: εἰς ζωὴν αἰώνιον
  chosen: for eternal life
  alternatives:
  - unto eternal life
  - into eternal life
  lexicon: BDAG
  rationale: εἰς here expresses goal/result. 'For eternal life' is idiomatic English
    and preserves the sense that the gathered fruit is oriented toward or results
    in eternal life.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: Introduces purpose, likely with a result nuance in context. 'So that'
    preserves the connection without over-specifying the nuance.
- source_word: ὁ σπείρων
  chosen: the one who sows
  alternatives:
  - the sower
  - he who sows
  lexicon: BDAG
  rationale: Matches the substantival participle construction of ὁ θερίζων and keeps
    parallelism clear.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - at the same time
  - as one
  lexicon: BDAG
  rationale: The adverb emphasizes shared joy. 'Together' is concise and idiomatic.
- source_word: χαίρῃ
  chosen: may rejoice
  alternatives:
  - might rejoice
  - may be glad
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is well represented by 'may rejoice,' preserving
    the purpose clause and the positive celebratory sense.
