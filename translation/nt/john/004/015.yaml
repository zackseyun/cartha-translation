theological_decisions:
- issue: Rendering of κύριος in the Samaritan woman's address
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The term can denote polite address or carry deeper resonance in Johannine
    context. Following the project's contested-terms policy, the default rendering
    'Lord' is used in the main text, while the alternative 'Sir' is preserved in a
    footnote because the immediate narrative level may reflect respectful address
    rather than explicit confession.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; preserve tension
    rather than resolve it'
