id: JHN.4.15
reference: John 4:15
source:
  edition: SBLGNT
  text: λέγει πρὸς αὐτὸν ἡ γυνή· Κύριε, δός μοι τοῦτο τὸ ὕδωρ, ἵνα μὴ διψῶ μηδὲ ⸀διέρχωμαι
    ἐνθάδε ἀντλεῖν.
translation:
  text: The woman said to him, “Lord, give me this water, so that I may not be thirsty
    or come here to draw water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, give me this water …”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style more naturally uses the simple past here. This is a standard optimal-equivalence
    adjustment that preserves discourse function without woodenness.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the wife
  - the woman
  lexicon: BDAG
  rationale: In this context the referent is the Samaritan woman, so 'the woman' is
    the natural and contextually correct rendering, not 'wife'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this dialogue it can also
    function as a respectful address akin to 'sir,' but 'Lord' preserves lexical consistency
    and the possible layered significance in John's Gospel.
- source_word: δός μοι
  chosen: give me
  alternatives:
  - grant me
  lexicon: BDAG
  rationale: The aorist imperative of δίδωμι is straightforwardly rendered 'give,'
    and 'give me' is idiomatic and direct in English.
- source_word: τοῦτο τὸ ὕδωρ
  chosen: this water
  alternatives:
  - this living water
  lexicon: BDAG
  rationale: The Greek here says simply 'this water.' Although the broader context
    concerns 'living water,' that adjective is not repeated in this verse and should
    not be imported into the translation.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - in order that ... not
  lexicon: BDAG
  rationale: This conjunction introduces purpose/result. 'So that' is natural modern
    English and preserves the intended sense.
- source_word: διψῶ
  chosen: I may not be thirsty
  alternatives:
  - I may not thirst
  - I will not thirst
  lexicon: BDAG
  rationale: The present subjunctive after ἵνα is best represented here as 'may not
    be thirsty' in natural English. 'May not thirst' is more formal but less idiomatic;
    'will not thirst' would overstate the mood.
- source_word: μηδὲ
  chosen: or
  alternatives:
  - nor
  lexicon: BDAG
  rationale: '''Or'' is the most natural coordinator in contemporary English after
    a negative purpose clause, while still conveying the additive negative force.'
- source_word: διέρχωμαι
  chosen: come
  alternatives:
  - go through
  - keep coming
  - make my way
  lexicon: BDAG
  rationale: In this context, with ἐνθάδε ('here') and the infinitive 'to draw,' the
    verb refers to coming to this place. 'Come here' captures the practical sense
    better than a more wooden 'go through' or 'pass by.' The present subjunctive may
    imply repeated action, but English need not make that explicit.
- source_word: ἐνθάδε
  chosen: here
  alternatives:
  - to this place
  - in this place
  lexicon: BDAG
  rationale: The adverb is deictic and is naturally rendered 'here' in direct speech.
- source_word: ἀντλεῖν
  chosen: to draw water
  alternatives:
  - to draw
  - to haul water
  lexicon: BDAG
  rationale: Although the object is implicit in Greek, English idiom benefits from
    supplying 'water' for clarity. This is not an addition of new content but an explicit
    rendering of what the verb conventionally implies in context.
