theological_decisions:
- issue: Force of the rhetorical question introduced by μή
  chosen_reading: A rhetorical question expecting the answer 'no'
  alternative_readings:
  - An explicit negation such as 'You are not greater than our father Jacob, are you?'
  rationale: The Greek μή with a question signals that the speaker expects a negative
    answer. Rendering it as an English rhetorical question preserves both the semantics
    and the tone of the Samaritan woman's challenge without over-paraphrasing.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it; optimal equivalence
