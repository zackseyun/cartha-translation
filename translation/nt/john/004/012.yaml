id: JHN.4.12
reference: John 4:12
source:
  edition: SBLGNT
  text: μὴ σὺ μείζων εἶ τοῦ πατρὸς ἡμῶν Ἰακώβ, ὃς ἔδωκεν ἡμῖν τὸ φρέαρ καὶ αὐτὸς ἐξ
    αὐτοῦ ἔπιεν καὶ οἱ υἱοὶ αὐτοῦ καὶ τὰ θρέμματα αὐτοῦ;
translation:
  text: Are you greater than our father Jacob, who gave us the well and drank from
    it himself, as did his sons and his livestock?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'Surely you are not greater than our father Jacob,
      are you?' The Greek question with μή expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ σὺ
  chosen: Are you
  alternatives:
  - Surely you are not
  - You are not
  lexicon: BDAG
  rationale: μή introducing a question expects a negative answer; in idiomatic English
    this is best conveyed by a rhetorical question rather than a flat negation. The
    emphatic σὺ is naturally carried by the English word order and context.
- source_word: μείζων
  chosen: greater than
  alternatives:
  - bigger than
  - superior to
  lexicon: BDAG
  rationale: Comparative of μέγας here concerns status or greatness, not physical
    size. 'Greater than' is the most natural and contextually appropriate rendering
    in English.
- source_word: τοῦ πατρὸς ἡμῶν Ἰακώβ
  chosen: our father Jacob
  alternatives:
  - Jacob our father
  lexicon: BDAG
  rationale: This preserves the genitival construction and the Samaritan woman's appeal
    to ancestral heritage. 'Our father Jacob' is standard, natural English and reflects
    the honorific familial language.
- source_word: ἔδωκεν ἡμῖν
  chosen: gave us
  alternatives:
  - has given us
  - gave to us
  lexicon: BDAG
  rationale: The aorist is best rendered as simple past in this narrative setting.
    'Gave us' is concise and natural.
- source_word: τὸ φρέαρ
  chosen: the well
  alternatives:
  - the cistern
  - the spring
  lexicon: BDAG
  rationale: φρέαρ commonly denotes a well or pit. In this context of Jacob's well,
    'well' is the established and contextually correct term. 'Spring' would more naturally
    reflect πηγή.
- source_word: καὶ αὐτὸς
  chosen: and drank from it himself
  alternatives:
  - and he himself drank from it
  - and even he drank from it
  lexicon: BDAG
  rationale: αὐτός is emphatic. English expresses this emphasis naturally with 'himself'
    after the verb phrase.
- source_word: ἐξ αὐτοῦ
  chosen: from it
  alternatives:
  - out of it
  lexicon: BDAG
  rationale: The pronoun refers back to the well. 'From it' is idiomatic English for
    drinking from a well.
- source_word: ἔπιεν
  chosen: drank
  alternatives:
  - used to drink
  lexicon: BDAG
  rationale: Aorist indicative in narrative is best rendered as simple past. The verse
    recounts Jacob's use of the well as a historical fact.
- source_word: οἱ υἱοὶ αὐτοῦ
  chosen: his sons
  alternatives:
  - his children
  lexicon: BDAG
  rationale: υἱοί is specifically masculine plural, not a generic term here. Per the
    gender-accurate principle, 'sons' should be retained.
- source_word: τὰ θρέμματα αὐτοῦ
  chosen: his livestock
  alternatives:
  - his cattle
  - his animals
  - his herds
  lexicon: BDAG
  rationale: θρέμματα refers to domesticated animals or livestock. 'Livestock' is
    clear modern English and broad enough to cover the term without narrowing it to
    cattle alone.
