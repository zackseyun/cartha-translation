id: JHN.4.37
reference: John 4:37
source:
  edition: SBLGNT
  text: ἐν γὰρ τούτῳ ὁ λόγος ⸀ἐστὶν ἀληθινὸς ὅτι Ἄλλος ἐστὶν ὁ σπείρων καὶ ἄλλος ὁ
    θερίζων·
translation:
  text: 'For in this the saying is true: one is the one sowing, and another the one
    reaping.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word is true' or 'the proverb is true.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sower ... the reaper.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one is the one sowing, and another the one reaping.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: in this
  alternatives:
  - in this matter
  - herein
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the demonstrative reference
    to the present situation Jesus is describing. 'In this matter' is possible, but
    'in this' is concise and natural enough in context.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation or grounding for the previous statement. 'For' best
    preserves the connective force without overinterpreting.
- source_word: ὁ λόγος
  chosen: the saying
  alternatives:
  - the word
  - the statement
  - the proverb
  lexicon: BDAG
  rationale: Here λόγος refers not to a theological 'Word' title but to a recognized
    statement or maxim, as shown by the following content clause. 'The saying' communicates
    this idiomatic sense better than the more ambiguous 'word.' 'Proverb' is possible
    but slightly more specific than the Greek requires.
- source_word: ἀληθινός
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: In context it describes the validity of the saying. 'True' is the most
    natural English equivalent.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the saying. In English, a colon after 'is true'
    smoothly introduces the quoted maxim while preserving the sense of ὅτι.
- source_word: ἄλλος ... καὶ ἄλλος
  chosen: one ... and another
  alternatives:
  - one person ... and another person
  - someone else ... and someone else
  lexicon: BDAG
  rationale: Preserves the contrast between two distinct parties. 'One ... and another'
    is concise and idiomatic.
- source_word: ὁ σπείρων
  chosen: the one sowing
  alternatives:
  - the sower
  - the one who sows
  lexicon: BDAG
  rationale: The substantival present participle is rendered transparently. 'The sower'
    is smoother English, but 'the one sowing' better mirrors the verbal aspect and
    parallelism with 'the one reaping.'
- source_word: ὁ θερίζων
  chosen: the one reaping
  alternatives:
  - the reaper
  - the one who reaps
  lexicon: BDAG
  rationale: As with ὁ σπείρων, the substantival participle is preserved with a transparent
    rendering. This keeps the formal balance of the Greek contrast.
