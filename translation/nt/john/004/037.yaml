theological_decisions:
- issue: Nature of the agricultural statement
  chosen_reading: Render as a general true saying without specifying allegorical referents
    in the translation itself.
  alternative_readings:
  - Interpret the sower as the prophets/John the Baptist/Jesus and the reaper as the
    disciples within the translation
  rationale: The verse presents a maxim whose specific application is supplied by
    context, but the Greek itself does not identify the parties here. To preserve
    theological tension and avoid importing interpretation into the text, the translation
    leaves the saying general.
  doctrine_reference: Preserve theological tension rather than resolve it.
