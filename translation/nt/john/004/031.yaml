id: JHN.4.31
reference: John 4:31
source:
  edition: SBLGNT
  text: ⸀Ἐν τῷ μεταξὺ ἠρώτων αὐτὸν οἱ μαθηταὶ λέγοντες· Ῥαββί, φάγε.
translation:
  text: Meanwhile, the disciples were urging him, saying, “Rabbi, eat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In the meantime.”
    reason: lexical_alternative
  - marker: b
    text: The verb can also be rendered “were asking” or “kept asking”; here it carries
      the sense of urging Jesus to eat.
    reason: lexical_alternative
  - marker: c
    text: “Rabbi” is a Jewish title of address, also meaning “Teacher.”
    reason: cultural_note
lexical_decisions:
- source_word: Ἐν τῷ μεταξὺ
  chosen: Meanwhile
  alternatives:
  - In the meantime
  - Meanwhile, during this interval
  lexicon: BDAG
  rationale: The idiom denotes the intervening time between the woman's departure
    and the subsequent conversation. 'Meanwhile' is natural modern English and accurately
    captures the temporal sense without over-literal awkwardness.
- source_word: ἠρώτων
  chosen: were urging
  alternatives:
  - were asking
  - kept asking
  - were requesting
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. In context, the disciples
    are pressing Jesus to eat, so 'were urging' better conveys the force than the
    flatter 'were asking,' while still remaining within the semantic range of ἐρωτάω.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; standard English object pronoun
    is straightforward.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article with μαθηταί identifies the known group in context. 'The
    disciples' is sufficient in English because the referent is clear from the narrative.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: The participle introduces the content of their appeal. 'Saying' is a
    natural participial rendering in English and preserves the connection to the main
    verb.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a form of address used for Jesus. Following the translation philosophy
    to transliterate names and preserve meaningful titles where appropriate, 'Rabbi'
    is retained as the familiar Jewish address in John's Gospel rather than flattened
    to 'Teacher.'
- source_word: φάγε
  chosen: eat
  alternatives:
  - have something to eat
  lexicon: BDAG
  rationale: Aorist imperative singular from ἐσθίω, a direct command/request. 'Eat'
    is the most direct and formally accurate rendering; the expanded alternative is
    interpretive and unnecessary in the main text.
