theological_decisions:
- issue: Whether to make the contrast between Samaritan and Jewish worship explicit
    beyond the Greek wording
  chosen_reading: Kept the contrast implicit in 'Our fathers ... and you say ...'
  alternative_readings:
  - Expanded paraphrase such as 'Our Samaritan fathers ... but you Jews say ...'
  rationale: The Greek text itself marks the contrast through pronouns and context,
    not by explicitly naming Samaritans or Jews in this verse. Expanding the identities
    in the main text would import contextual information not stated here.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: How to render the impersonal necessity in προσκυνεῖν δεῖ
  chosen_reading: Rendered as 'where one must worship'
  alternative_readings:
  - '''where people must worship'''
  - '''where it is necessary to worship'''
  rationale: The construction expresses a general claim about the proper place of
    worship, not a command to a specific individual. 'One must worship' preserves
    the impersonal and normative force without awkwardness.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
