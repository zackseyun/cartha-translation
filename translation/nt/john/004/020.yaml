id: JHN.4.20
reference: John 4:20
source:
  edition: SBLGNT
  text: οἱ πατέρες ἡμῶν ἐν τῷ ὄρει τούτῳ προσεκύνησαν· καὶ ὑμεῖς λέγετε ὅτι ἐν Ἱεροσολύμοις
    ἐστὶν ὁ τόπος ὅπου ⸂προσκυνεῖν δεῖ⸃.
translation:
  text: Our fathers worshiped on this mountain, and you say that in Jerusalem is the
    place where one must worship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Our ancestors worshiped on this mountain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'where it is necessary to worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες ἡμῶν
  chosen: Our fathers
  alternatives:
  - Our ancestors
  lexicon: BDAG
  rationale: Rendered literally as 'our fathers' to preserve the speaker's idiom and
    communal lineage claim. 'Ancestors' is possible in smoother English, but 'fathers'
    better reflects the Greek wording and the representative, historical sense.
- source_word: ἐν τῷ ὄρει τούτῳ
  chosen: on this mountain
  alternatives:
  - in this mountain
  - at this mountain
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' idiomatic English with a mountain in a
    worship-location context is 'on this mountain.' This preserves the locative sense
    without awkwardness.
- source_word: προσεκύνησαν
  chosen: worshiped
  alternatives:
  - bowed down in worship
  lexicon: BDAG
  rationale: προσκυνέω can denote prostration or reverential worship. In this context
    of proper place of worship, 'worshiped' best captures the religious sense in natural
    English.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you people
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and contrastive with 'our fathers.'
    English naturally conveys the contrast with 'and you say' without adding emphasis
    that would sound overly sharp.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Standard modern English uses 'in Jerusalem.' The plural form of the Greek
    place name does not require a plural rendering in English.
- source_word: ὁ τόπος
  chosen: the place
  alternatives:
  - the proper place
  lexicon: BDAG
  rationale: A straightforward rendering preserves the noun's definiteness. 'Proper
    place' would make explicit an implication of exclusivity, but that is sufficiently
    conveyed by the larger clause and need not be imported into the noun itself.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in which
  lexicon: BDAG
  rationale: Rendered with the natural English relative adverb introducing the location
    clause.
- source_word: προσκυνεῖν δεῖ
  chosen: one must worship
  alternatives:
  - it is necessary to worship
  - people ought to worship
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. 'One must worship' communicates
    the general, impersonal force of the infinitive construction in clear English.
    It avoids sounding either too wooden ('it is necessary') or too weak ('ought').
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: The conjunction is formally coordinative. While the discourse is contrastive,
    English can preserve that contrast adequately with 'and you say' without changing
    καὶ to the more interpretive 'but'.
