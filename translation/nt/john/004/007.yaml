theological_decisions:
- issue: Reference of 'Samaria'
  chosen_reading: The phrase identifies the woman as coming from Samaria/the Samaritan
    locale, without importing broader ethnic or theological claims into the translation
    line itself.
  alternative_readings:
  - from the city of Samaria
  - a Samaritan woman
  rationale: The Greek text says 'a woman from Samaria,' not explicitly 'a Samaritan
    woman' in this verse. The translation preserves the wording of the source and
    leaves ethnic/religious implications to the wider context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve what the text says without importing additional claims.'
