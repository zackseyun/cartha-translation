id: JHN.4.7
reference: John 4:7
source:
  edition: SBLGNT
  text: Ἔρχεται γυνὴ ἐκ τῆς Σαμαρείας ἀντλῆσαι ὕδωρ. λέγει αὐτῇ ὁ Ἰησοῦς· Δός μοι
    πεῖν·
translation:
  text: A woman from Samaria came to draw water. Jesus said to her, “Give me a drink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “comes … says”; the Greek uses historical presents in
      the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔρχεται
  chosen: came
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Greek present is commonly used as a historical present in narrative.
    English simple past is more natural and preserves the narrative sense without
    awkwardness.
- source_word: γυνὴ
  chosen: a woman
  alternatives:
  - a wife
  lexicon: BDAG
  rationale: In this context the noun refers to an unidentified female person, not
    specifically a wife. The indefinite English expression matches the anarthrous
    Greek in context.
- source_word: ἐκ τῆς Σαμαρείας
  chosen: from Samaria
  alternatives:
  - out of Samaria
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ with place of origin/source. 'Samaria'
    here is best taken as the region or locale from which the woman comes.
- source_word: ἀντλῆσαι ὕδωρ
  chosen: to draw water
  alternatives:
  - to draw up water
  - to fetch water
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'Draw water' is the most direct and
    idiomatic English equivalent for obtaining water from a well.
- source_word: λέγει αὐτῇ
  chosen: said to her
  alternatives:
  - says to her
  lexicon: BDAG
  rationale: Like ἔρχεται, λέγει is a historical present in narrative. English past
    tense reads naturally while preserving the discourse sequence.
- source_word: Δός μοι πεῖν
  chosen: Give me a drink
  alternatives:
  - Give me to drink
  - Let me drink
  lexicon: BDAG
  rationale: The aorist imperative with infinitive is a concise request for something
    to drink. 'Give me a drink' is natural modern English and accurately conveys the
    sense. 'Give me to drink' is more literal but less idiomatic.
