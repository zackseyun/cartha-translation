id: JHN.4.16
reference: John 4:16
source:
  edition: SBLGNT
  text: Λέγει ⸀αὐτῇ· Ὕπαγε φώνησον ⸂τὸν ἄνδρα σου⸃ καὶ ἐλθὲ ἐνθάδε.
translation:
  text: He said to her, “Go, call your husband, and come here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He says to her'—the Greek uses a historical present, a common narrative
      feature rendered in English as past tense for natural style.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  chosen: He said
  alternatives:
  - He says
  lexicon: BDAG
  rationale: 'Greek present tense in narrative often functions as a historical present.
    English normally renders this naturally as past tense in narrative: ''He said.'''
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative pronoun marking the indirect object of speech; straightforwardly
    rendered 'to her.'
- source_word: Ὕπαγε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: Imperative of ὑπάγω here introduces an instruction to depart and perform
    the next action. 'Go' is the most natural concise English equivalent in context.
- source_word: φώνησον
  chosen: call
  alternatives:
  - summon
  - fetch
  lexicon: BDAG
  rationale: Aorist imperative of φωνέω, here meaning to call or summon someone. 'Call'
    is idiomatic and fits the immediate context better than the more formal 'summon.'
- source_word: τὸν ἄνδρα σου
  chosen: your husband
  alternatives:
  - your man
  lexicon: BDAG
  rationale: ἀνήρ can mean either 'man' or 'husband' depending on context. With the
    possessive 'your' and in this domestic setting, 'your husband' is the clear contextual
    sense.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two imperatives.
- source_word: ἐλθὲ
  chosen: come
  alternatives:
  - come back
  lexicon: BDAG
  rationale: Aorist imperative of ἔρχομαι. 'Come' is the direct equivalent; 'come
    back' is possible by implication but adds nuance not explicit in the Greek.
- source_word: ἐνθάδε
  chosen: here
  alternatives:
  - to this place
  lexicon: BDAG
  rationale: Adverb of place meaning 'here' or 'in this place.' 'Here' is natural
    modern English and sufficiently precise.
