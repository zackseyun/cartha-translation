id: JHN.4.21
reference: John 4:21
source:
  edition: SBLGNT
  text: λέγει αὐτῇ ὁ Ἰησοῦς· ⸂Πίστευέ μοι, γύναι⸃, ὅτι ἔρχεται ὥρα ὅτε οὔτε ἐν τῷ
    ὄρει τούτῳ οὔτε ἐν Ἱεροσολύμοις προσκυνήσετε τῷ πατρί.
translation:
  text: Jesus said to her, “Believe me, woman, an hour is coming when neither on this
    mountain nor in Jerusalem will you worship the Father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Trust me.' The Greek verb can carry the sense of believing what someone
      says or trusting the person.
    reason: lexical_alternative
  - marker: b
    text: '''Woman'' was a respectful form of address in this context, not a rude
      one.'
    reason: cultural_note
  - marker: c
    text: Or 'the hour is coming.' Although the noun lacks the article here, John
      often uses 'hour' as a thematic term for a decisive time in God's plan.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστευέ μοι
  chosen: Believe me
  alternatives:
  - Trust me
  lexicon: BDAG
  rationale: The present active imperative with dative pronoun is a direct appeal
    for credence in Jesus' statement. 'Believe me' is the most natural English equivalent
    and preserves the verbal link with πιστεύω elsewhere in John. 'Trust me' is possible
    but slightly shifts toward relational reliance rather than accepting the truth
    of what follows.
- source_word: γύναι
  chosen: woman
  alternatives:
  - madam
  - dear woman
  lexicon: BDAG
  rationale: The vocative γύναι is literally 'woman.' In Johannine usage it is respectful,
    not rude, but English readers may mishear it. 'Woman' best preserves the source
    wording; softer expansions such as 'madam' or 'dear woman' add nuance not explicit
    in the Greek.
- source_word: ἔρχεται ὥρα
  chosen: an hour is coming
  alternatives:
  - the hour is coming
  - a time is coming
  lexicon: BDAG
  rationale: This Johannine idiom often signals an eschatological or salvation-historical
    turning point. Because ὥρα lacks the article here, 'an hour is coming' reflects
    the Greek form more closely than 'the hour is coming,' while still sounding natural.
    'A time is coming' is interpretive and less precise than the recurring Johannine
    'hour' motif.
- source_word: ἐν τῷ ὄρει τούτῳ
  chosen: on this mountain
  alternatives:
  - in this mountain
  - at this mountain
  lexicon: BDAG
  rationale: Although ἐν is literally 'in,' with topographical locations English idiom
    normally uses 'on.' This refers to the Samaritan sacred mountain under discussion,
    so 'on this mountain' is the clearest natural rendering.
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: The plural form Ἱεροσολύμοις is the standard Greek place-name for Jerusalem.
    English idiom takes the singular city name with 'in Jerusalem.'
- source_word: προσκυνήσετε
  chosen: will you worship
  alternatives:
  - you will worship
  - will you bow down to
  lexicon: BDAG
  rationale: 'Future active indicative, second person plural. In English, fronting
    the auxiliary after the paired negatives yields a natural sentence: ''when neither
    ... nor ... will you worship.'' ''Worship'' is the established contextual sense
    in John 4, while ''bow down to'' is more wooden and too narrow for the broader
    religious act in view.'
- source_word: τῷ πατρί
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine context this refers specifically to God as Father, so capitalization
    in English appropriately signals the personal divine title without altering meaning.
- source_word: οὔτε ... οὔτε
  chosen: neither ... nor
  alternatives:
  - not ... and not
  lexicon: BDAG
  rationale: This correlative construction is best rendered by the standard English
    pair 'neither ... nor,' preserving the contrast between Samaritan and Jerusalem-centered
    worship locations.
