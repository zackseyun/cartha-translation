theological_decisions:
- issue: Tone of Jesus' address γύναι
  chosen_reading: Rendered literally as 'woman' without softening additions
  alternative_readings:
  - madam
  - dear woman
  rationale: The verse does not portray disrespect; the literal rendering preserves
    the wording while avoiding interpretive embellishment. Any concern about tone
    is better handled in a footnote than by altering the main text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Johannine ὥρα motif
  chosen_reading: Retained 'hour' rather than generalized 'time'
  alternative_readings:
  - time
  rationale: Keeping 'hour' preserves John's thematic language and theological tension
    about the coming shift in worship, without overexplaining the referent in the
    translation itself.
  doctrine_reference: Translation philosophy §3, §5
