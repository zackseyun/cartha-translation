id: JHN.4.3
reference: John 4:3
source:
  edition: SBLGNT
  text: ἀφῆκεν τὴν Ἰουδαίαν καὶ ἀπῆλθεν ⸀πάλιν εἰς τὴν Γαλιλαίαν.
translation:
  text: he left Judea and went back to Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again to Galilee.' The Greek adverb πάλιν can be rendered 'again,' but
      here it likely carries the sense of returning, hence 'back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφῆκεν
  chosen: left
  alternatives:
  - departed from
  - went away from
  lexicon: BDAG
  rationale: Aorist of ἀφίημι here means to leave a place behind. 'Left' is the most
    natural modern English equivalent and fits the direct object 'Judea'.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the region of Judea
  - Judah
  lexicon: BDAG
  rationale: Standard transliteration for the geographic region in the Gospel context.
    'Judea' is the conventional and accurate English form here.
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes movement from one place to another. In idiomatic
    English, 'went' best conveys the action without unnecessary stiffness.
- source_word: πάλιν
  chosen: back
  alternatives:
  - again
  lexicon: BDAG
  rationale: In this travel context, πάλιν most naturally indicates return rather
    than mere repetition. 'Back' communicates that Jesus is returning to Galilee,
    which fits the narrative flow better than the more wooden 'again'.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: to Galilee
  alternatives:
  - into Galilee
  lexicon: BDAG
  rationale: εἰς marks movement toward a destination. 'To Galilee' is standard, natural
    English for travel to a region.
