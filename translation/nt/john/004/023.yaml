id: JHN.4.23
reference: John 4:23
source:
  edition: SBLGNT
  text: ἀλλὰ ἔρχεται ὥρα καὶ νῦν ἐστιν, ὅτε οἱ ἀληθινοὶ προσκυνηταὶ προσκυνήσουσιν
    τῷ πατρὶ ἐν πνεύματι καὶ ἀληθείᾳ, καὶ γὰρ ὁ πατὴρ τοιούτους ζητεῖ τοὺς προσκυνοῦντας
    αὐτόν·
translation:
  text: But an hour is coming, and is now here, when the true worshipers will worship
    the Father in spirit and truth; for the Father is indeed seeking such people to
    worship him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit'; the Greek can denote worship empowered by the Holy Spirit,
      worship in the human spirit, or worship characterized by spiritual reality.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a contrast with the preceding discussion about worship tied to
    location; 'But' is the most natural concise English adversative here.
- source_word: ἔρχεται ὥρα
  chosen: an hour is coming
  alternatives:
  - the hour is coming
  - a time is coming
  lexicon: BDAG
  rationale: The Greek lacks the article before ὥρα, so 'an hour' is formally closer,
    while still idiomatic. 'Hour' is retained rather than 'time' to preserve Johannine
    diction and eschatological nuance.
- source_word: καὶ νῦν ἐστιν
  chosen: and is now here
  alternatives:
  - and now is
  - and now exists
  lexicon: BDAG
  rationale: This keeps the realized-present force of the clause in natural English.
    'Is now here' communicates that the anticipated hour has already begun.
- source_word: ὅτε
  chosen: when
  alternatives:
  - that
  - in which
  lexicon: BDAG
  rationale: Temporal conjunction introducing the content of the coming hour.
- source_word: οἱ ἀληθινοὶ προσκυνηταὶ
  chosen: the true worshipers
  alternatives:
  - the genuine worshipers
  - the real worshipers
  lexicon: BDAG
  rationale: ἀληθινοί in John often carries the sense of what is genuine or ultimate.
    'True worshipers' is both idiomatic and faithful to Johannine usage.
- source_word: προσκυνήσουσιν
  chosen: will worship
  alternatives:
  - shall worship
  - will bow down in worship
  lexicon: BDAG
  rationale: Future indicative is best represented by 'will worship.' Expanded renderings
    like 'bow down' are possible but unnecessarily interpretive in this context.
- source_word: τῷ πατρὶ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Capitalized as a divine title referring to God in Johannine context.
- source_word: ἐν πνεύματι
  chosen: in spirit
  alternatives:
  - in the Spirit
  - spiritually
  lexicon: BDAG
  rationale: The anarthrous πνεύματι is left as 'spirit' rather than 'the Spirit'
    to preserve the Greek's ambiguity and avoid over-resolving whether the reference
    is to the human spirit, the Holy Spirit, or the sphere/quality of spiritual worship.
    A footnote preserves the alternative.
- source_word: καὶ ἀληθείᾳ
  chosen: and truth
  alternatives:
  - and in truth
  - truly
  lexicon: BDAG
  rationale: With ἐν governing both nouns, English can naturally render the pair as
    'in spirit and truth.' 'Truth' is retained as a noun rather than adverbial 'truly'
    to preserve the conceptual weight of Johannine ἀλήθεια.
- source_word: καὶ γὰρ
  chosen: for ... indeed
  alternatives:
  - for
  - because indeed
  lexicon: BDAG
  rationale: γάρ gives the reason, while καί adds emphasis. English does not mirror
    both particles neatly, so 'for ... indeed' captures both explanation and emphasis.
- source_word: τοιούτους
  chosen: such people
  alternatives:
  - such ones
  - such worshipers
  lexicon: BDAG
  rationale: The demonstrative adjective refers to people of this kind. 'Such people'
    is natural modern English and avoids adding a noun not explicit in the Greek,
    though the following participle clarifies they are worshipers.
- source_word: ζητεῖ
  chosen: is indeed seeking
  alternatives:
  - seeks
  - is seeking
  lexicon: BDAG
  rationale: Present tense is rendered progressively to fit the immediate context
    of the hour that 'now is'; 'indeed' reflects the emphatic force contributed by
    καὶ γάρ.
- source_word: τοὺς προσκυνοῦντας αὐτόν
  chosen: to worship him
  alternatives:
  - those who worship him
  - as those worshiping him
  lexicon: BDAG
  rationale: The participial phrase is rendered with an English infinitival complement
    after 'seeking such people,' producing natural English while preserving the sense
    that these are the ones who worship him.
