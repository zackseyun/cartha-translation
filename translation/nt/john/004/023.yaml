theological_decisions:
- issue: Meaning of ἐν πνεύματι
  chosen_reading: Rendered 'in spirit' without specifying 'the Spirit' in the main
    text.
  alternative_readings:
  - in the Spirit
  - spiritually
  rationale: The Greek is anarthrous and can be read in more than one theologically
    significant way. In keeping with the translation philosophy, the main text preserves
    the ambiguity rather than resolving it toward either an explicitly pneumatological
    or merely inward reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Scope of 'true worshipers'
  chosen_reading: Rendered as 'the true worshipers' in a qualitative sense of genuine/real
    worshipers.
  alternative_readings:
  - the real worshipers
  - the genuine worshipers
  rationale: This avoids importing a sectarian distinction while preserving John's
    contrast between merely location-bound worship and worship that accords with God's
    reality and revelation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
