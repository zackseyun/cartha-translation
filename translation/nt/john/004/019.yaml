id: JHN.4.19
reference: John 4:19
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ἡ γυνή· Κύριε, θεωρῶ ὅτι προφήτης εἶ σύ.
translation:
  text: The woman said to him, “Lord, I see that you are a prophet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek κύριε can be a respectful form of address as well as
      “Lord.”
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English commonly renders this narrative present as simple past ('said'). This
    preserves the discourse flow without unnecessary stiffness.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative pronoun indicating the indirect object of speech.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the wife
  - the woman
  lexicon: BDAG
  rationale: In Johannine narrative this refers to the Samaritan woman, not 'wife.'
    'The woman' is the natural contextual rendering.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Following the project's default rendering for κύριος, the vocative is
    translated 'Lord.' In this context it can also function as a respectful address
    akin to 'sir,' but the stated default is to render κύριος as 'Lord' and preserve
    alternatives in a footnote where worthwhile.
- source_word: θεωρῶ
  chosen: I see
  alternatives:
  - I perceive
  - I observe
  lexicon: BDAG
  rationale: θεωρέω here expresses perceptive recognition based on what Jesus has
    just revealed. 'I see' is natural modern English and adequately conveys discernment
    without sounding overly formal.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of her perception in a straightforward declarative
    clause.
- source_word: προφήτης
  chosen: a prophet
  lexicon: BDAG
  rationale: 'Anarthrous predicate nominative best rendered indefinitely in English:
    she recognizes Jesus as a prophet, not yet explicitly as ''the Prophet'' of Deut
    18.'
- source_word: σύ
  chosen: you
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis in Greek; English naturally includes 'you'
    as the subject complement of 'are' without requiring extra stress marking.
