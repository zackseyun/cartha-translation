theological_decisions:
- issue: Rendering of κύριος as a form of address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  rationale: The immediate context allows a respectful address that may not yet express
    full christological confession. However, the project's contested-terms guidance
    sets κύριος to 'Lord' by default. The alternative 'Sir' is preserved in a footnote
    to maintain auditability and interpretive tension.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; preserve alternatives
    in footnotes where ambiguity is contextually relevant.'
