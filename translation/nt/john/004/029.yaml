id: JHN.4.29
reference: John 4:29
source:
  edition: SBLGNT
  text: Δεῦτε ἴδετε ἄνθρωπον ὃς εἶπέ μοι πάντα ⸀ὅσα ἐποίησα· μήτι οὗτός ἐστιν ὁ χριστός;
translation:
  text: Come, see a man who told me everything I have done. Could this be the Messiah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Can this be the Christ?'
    reason: alternative_reading
lexical_decisions:
- source_word: Δεῦτε
  chosen: Come
  alternatives:
  - Come here
  - Come on
  lexicon: BDAG
  rationale: Idiomatic summons to others; 'Come' is natural modern English and preserves
    the invitational force.
- source_word: ἴδετε
  chosen: see
  alternatives:
  - look at
  - behold
  lexicon: BDAG
  rationale: 'Paired with Δεῦτε as a direct invitation: ''Come, see ...'' is clear
    and idiomatic. ''Behold'' is too archaic for the stated philosophy.'
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The Greek is singular masculine and refers to Jesus as an individual
    male person. Per gender-accurate policy, 'a man' best matches the source.
- source_word: ὃς εἶπέ μοι
  chosen: who told me
  alternatives:
  - who said to me
  lexicon: BDAG
  rationale: λέγω with indirect object here is naturally rendered 'told me' in English,
    especially with the following content clause.
- source_word: πάντα ὅσα
  chosen: everything
  alternatives:
  - all the things that
  - everything that
  lexicon: BDAG
  rationale: The combination intensifies comprehensiveness. 'Everything' captures
    the sense cleanly in English; the fuller form is represented in the clause 'everything
    I have done.'
- source_word: ἐποίησα
  chosen: I have done
  alternatives:
  - I did
  lexicon: BDAG
  rationale: 'Greek aorist here refers to her past actions, but in English present
    perfect sounds more natural in this testimonial context and matches common idiom:
    ''everything I have done.'''
- source_word: μήτι
  chosen: Could this be
  alternatives:
  - This is not ... is it?
  - Can this be
  lexicon: BDAG
  rationale: μήτι often introduces a question expecting a negative answer or expressing
    hesitation. In context, the woman is inviting consideration rather than making
    a flat assertion. 'Could this be ...?' preserves the tentative, probing force
    better than a rigidly negative English tag question.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine guidelines, Χριστός as a title is translated 'Messiah' rather
    than transliterated 'Christ,' preserving the Jewish messianic context of the passage.
