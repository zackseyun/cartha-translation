theological_decisions:
- issue: Potential implication that Jesus personally baptized people
  chosen_reading: Retain the surface wording of 4:1 without importing the clarification
    of 4:2 into the main text.
  alternative_readings:
  - Translate in a way that anticipates 4:2, e.g., 'Jesus was making more disciples,
    and his group was baptizing...'
  rationale: The immediate verse states that Jesus was making and baptizing more disciples
    than John. Because 4:2 immediately clarifies that Jesus himself did not baptize,
    the translation should preserve the wording here and allow the next verse to supply
    the qualification rather than harmonizing prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
