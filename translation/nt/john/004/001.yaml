id: JHN.4.1
reference: John 4:1
source:
  edition: SBLGNT
  text: Ὡς οὖν ἔγνω ὁ ⸀Ἰησοῦς ὅτι ἤκουσαν οἱ Φαρισαῖοι ὅτι Ἰησοῦς πλείονας μαθητὰς
    ποιεῖ καὶ βαπτίζει ἢ Ἰωάννης—
translation:
  text: Therefore, when Jesus knew that the Pharisees had heard that Jesus was making
    and baptizing more disciples than John—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus was making more disciples and baptizing more than John.' The Greek
      can be read with the comparison applying to the combined activity rather than
      only to 'disciples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς οὖν
  chosen: Therefore, when
  alternatives:
  - So when
  - Now when
  lexicon: BDAG
  rationale: Ὡς introduces a temporal clause ('when'), while οὖν marks inference or
    narrative progression ('therefore/so'). 'Therefore, when' preserves both functions
    in readable English.
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - learned
  - came to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω here most naturally means Jesus became aware/knew.
    'Knew' is concise and idiomatic; 'learned' is possible but less direct.
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name; definite article retained.
- source_word: ἤκουσαν
  chosen: had heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: 'English past perfect clarifies the sequence: Jesus knew that the Pharisees
    had already heard the report.'
- source_word: πλείονας μαθητὰς
  chosen: more disciples
  alternatives:
  - a greater number of disciples
  lexicon: BDAG
  rationale: Comparative adjective plus noun is naturally rendered 'more disciples.'
- source_word: ποιεῖ
  chosen: was making
  alternatives:
  - was gaining
  - was producing
  lexicon: BDAG
  rationale: ποιέω with μαθητάς in this context means 'make disciples.' Rendering
    it as 'was making' stays close to the Greek while remaining clear, especially
    since the next verse qualifies Jesus' personal role in baptizing.
- source_word: βαπτίζει
  chosen: baptizing
  alternatives:
  - immersing
  lexicon: BDAG
  rationale: '''Baptizing'' is the standard and clearest rendering of βαπτίζω in NT
    narrative.'
- source_word: ἢ Ἰωάννης
  chosen: than John
  alternatives:
  - than John was
  lexicon: BDAG
  rationale: Comparative construction after πλείονας naturally extends over the coordinated
    verbs; concise English omits the repeated verb phrase.
