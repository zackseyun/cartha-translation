theological_decisions:
- issue: Time reckoning for 'the seventh hour'
  chosen_reading: Retain the literal expression 'the seventh hour' in the main text
    without converting it to a modern equivalent.
  alternative_readings:
  - approximately 1 p.m. if counted by Jewish daylight reckoning
  - approximately 7 p.m. if counted by Roman civil reckoning
  rationale: The verse itself does not specify which system of timekeeping is intended,
    and interpreters differ in Johannine chronology. Preserving the literal wording
    maintains the textual ambiguity rather than resolving it beyond what the Greek
    states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
