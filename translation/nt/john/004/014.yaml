theological_decisions:
- issue: Meaning of the promise 'will never thirst forever'
  chosen_reading: Retain the metaphor of thirst as Jesus' promise of enduring spiritual
    satisfaction through the life he gives, without specifying a later doctrinal system
    in the wording.
  alternative_readings:
  - Interpret as absolute impossibility of any future spiritual longing
  - Interpret as primarily eschatological satisfaction only
  rationale: The verse uses metaphorical water language in context, but the translation
    should preserve the image rather than resolve all theological implications. The
    wording keeps both present and enduring dimensions without importing a sectarian
    reading about perseverance or sacramental mechanism.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of representative masculine language
  chosen_reading: Use 'him' in the main text.
  alternative_readings:
  - Use singular 'them' for generic reference
  rationale: The Greek uses masculine singular forms generically. Per the translation
    philosophy, gender-accurate rendering is preferred over gender-neutral smoothing,
    while the generic force can be noted in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
