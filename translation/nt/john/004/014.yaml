id: JHN.4.14
reference: John 4:14
source:
  edition: SBLGNT
  text: ὃς δ’ ἂν πίῃ ἐκ τοῦ ὕδατος οὗ ἐγὼ δώσω αὐτῷ, οὐ μὴ ⸀διψήσει εἰς τὸν αἰῶνα,
    ἀλλὰ τὸ ὕδωρ ὃ δώσω αὐτῷ γενήσεται ἐν αὐτῷ πηγὴ ὕδατος ἁλλομένου εἰς ζωὴν αἰώνιον.
translation:
  text: But whoever drinks from the water that I will give him will never thirst forever;
    rather, the water that I will give him will become in him a spring of water welling
    up to eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''will certainly not thirst forever''; the expression is an emphatic
      negation (οὐ μὴ ... εἰς τὸν αἰῶνα).'
    reason: lexical_alternative
  - marker: b
    text: Or 'springing up' or 'leaping up' to eternal life.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'him' generically, referring to any person who drinks of
      the water Jesus gives.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς δ’ ἂν πίῃ
  chosen: whoever drinks
  alternatives:
  - whoever may drink
  - anyone who drinks
  lexicon: BDAG
  rationale: The relative pronoun with ἄν and aorist subjunctive expresses an indefinite
    general condition. 'Whoever drinks' is idiomatic English and preserves the open,
    general force without awkwardness.
- source_word: ἐκ τοῦ ὕδατος
  chosen: from the water
  alternatives:
  - of the water
  lexicon: BDAG
  rationale: ἐκ is best rendered 'from' here, indicating source. This keeps the concrete
    imagery of drinking from a given water source.
- source_word: οὗ ἐγὼ δώσω αὐτῷ
  chosen: that I will give him
  alternatives:
  - which I will give him
  lexicon: BDAG
  rationale: A natural restrictive relative clause in English. 'That' is more readable
    than 'which' in modern style while preserving the future promise.
- source_word: οὐ μὴ διψήσει
  chosen: will never thirst
  alternatives:
  - will certainly not thirst
  - shall by no means thirst
  lexicon: BDAG
  rationale: οὐ μή with the future is an emphatic negation. 'Will never thirst' captures
    the force in clear modern English without archaic phrasing.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - ever
  lexicon: BDAG
  rationale: This idiom means 'forever' or 'ever.' Here 'forever' is concise and idiomatic.
    Because English 'never' can already imply permanence, retaining 'forever' makes
    the Greek emphasis explicit, even if slightly emphatic in English.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  lexicon: BDAG
  rationale: The conjunction marks a strong contrast between merely not thirsting
    and the positive internal transformation that follows. 'Rather' brings out that
    adversative-developmental force well.
- source_word: γενήσεται ἐν αὐτῷ
  chosen: will become in him
  alternatives:
  - will become within him
  - will be in him
  lexicon: BDAG
  rationale: γίνομαι indicates becoming, not merely being. 'In him' preserves the
    internal location of the life-giving source; 'within him' is possible but slightly
    more interpretive.
- source_word: πηγὴ ὕδατος
  chosen: a spring of water
  alternatives:
  - a fountain of water
  - a wellspring of water
  lexicon: BDAG
  rationale: πηγή denotes a spring or fountain, a source of flowing water. 'Spring'
    is natural modern English and fits the imagery of an internal source better than
    'well,' which would suggest a different image.
- source_word: ἁλλομένου
  chosen: welling up
  alternatives:
  - springing up
  - leaping up
  lexicon: BDAG
  rationale: The participle conveys vigorous movement of water. 'Welling up' is idiomatic
    and readable, while still suggesting active upward motion. 'Leaping up' is more
    literal but less natural in contemporary English for water imagery.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: to eternal life
  alternatives:
  - into eternal life
  - for eternal life
  lexicon: BDAG
  rationale: εἰς here expresses goal or result. 'To eternal life' preserves the directional/resultative
    sense in smooth English and avoids over-interpretation.
- source_word: αὐτῷ / αὐτῷ
  chosen: him / him
  alternatives:
  - them / them
  - the person / that person
  lexicon: BDAG
  rationale: The Greek singular masculine is retained as gender-accurate representative
    language in keeping with the stated philosophy. It functions generically, but
    the translation preserves the source form rather than neutralizing it.
