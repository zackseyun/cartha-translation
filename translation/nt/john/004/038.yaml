id: JHN.4.38
reference: John 4:38
source:
  edition: SBLGNT
  text: ἐγὼ ἀπέστειλα ὑμᾶς θερίζειν ὃ οὐχ ὑμεῖς κεκοπιάκατε· ἄλλοι κεκοπιάκασιν, καὶ
    ὑμεῖς εἰς τὸν κόπον αὐτῶν εἰσεληλύθατε.
translation:
  text: I sent you to reap what you have not labored for; others have labored, and
    you have entered into their labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to harvest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have entered into the fruit of their labor' or 'you have shared
      in their work.' The Greek more literally says 'you have entered into their labor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλα
  chosen: sent
  alternatives:
  - have sent
  - commissioned
  lexicon: BDAG
  rationale: 'Aorist active indicative naturally renders as simple past in this discourse
    context: Jesus refers to a completed commissioning of the disciples. ''Sent''
    preserves the missional force without overexpanding to ''commissioned.'''
- source_word: θερίζειν
  chosen: to reap
  alternatives:
  - to harvest
  lexicon: BDAG
  rationale: The infinitive continues the agricultural metaphor already active in
    the context. 'Reap' is the more direct equivalent and preserves the metaphorical
    contrast with prior labor.
- source_word: ὃ
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Neuter relative pronoun functioning substantivally; 'what' is idiomatic
    modern English and accurately captures the object of reaping.
- source_word: κεκοπιάκατε
  chosen: have not labored for
  alternatives:
  - have not toiled over
  - have not worked for
  lexicon: BDAG
  rationale: Perfect tense indicates a state resulting from prior effort, but in English
    the idiomatic expression here is 'have not labored for.' Adding 'for' clarifies
    the relation to the harvest/reaping object in English.
- source_word: ἄλλοι
  chosen: others
  alternatives:
  - other people
  lexicon: BDAG
  rationale: Simple plural substantive adjective; 'others' is concise and natural.
- source_word: κεκοπιάκασιν
  chosen: have labored
  alternatives:
  - have toiled
  - have worked hard
  lexicon: BDAG
  rationale: Perfect tense again highlights completed prior labor with continuing
    relevance. 'Have labored' preserves lexical consistency with the previous occurrence
    of κοπιάω.
- source_word: εἰς τὸν κόπον αὐτῶν εἰσεληλύθατε
  chosen: you have entered into their labor
  alternatives:
  - you have entered into the fruit of their labor
  - you have shared in their work
  lexicon: BDAG
  rationale: The Greek explicitly says 'into their labor/toil,' not merely its results.
    'Entered into their labor' preserves the metaphor and the perfect tense's present-result
    nuance. More interpretive alternatives were avoided in the main text.
- source_word: ἐγὼ ... ὑμεῖς
  chosen: I ... you
  lexicon: Greek grammar
  rationale: The explicit pronouns are somewhat emphatic in Greek. English preserves
    this sufficiently by retaining the pronouns in normal position without adding
    italics or extra emphasis.
- source_word: κόπον
  chosen: labor
  alternatives:
  - toil
  - work
  lexicon: BDAG
  rationale: '''Labor'' matches the cognate verb κοπιάω used twice in the verse and
    preserves the thematic linkage better than ''work.'''
