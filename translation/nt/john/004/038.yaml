theological_decisions:
- issue: Nature of the harvest metaphor
  chosen_reading: Retained the agricultural metaphor without specifying whether 'others'
    are prophets, John the Baptist, Jesus himself, or earlier witnesses.
  alternative_readings:
  - '''Others'' refers specifically to the prophets'
  - '''Others'' refers to John the Baptist'
  - '''Others'' includes Jesus'' own work'
  rationale: The verse itself leaves the referent broad. In keeping with the translation
    philosophy, the wording preserves the metaphor and ambiguity rather than importing
    a narrower interpretive identification.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
