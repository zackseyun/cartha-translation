theological_decisions:
- issue: Rendering of πιστεύω in a context of response to Jesus' spoken promise
  chosen_reading: believed
  alternative_readings:
  - trusted
  rationale: The verse describes the man's response to Jesus' word without requiring
    a stronger doctrinal distinction between saving faith and mere confidence. 'Believed'
    aligns with the project's default rendering for the πιστ- word group while allowing
    the narrative tension of Johannine faith to remain unresolved.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (πίστις → faith; alternatives
    faithfulness, trust), and ''Preserve theological tension rather than resolve it.'''
