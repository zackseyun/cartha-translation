id: JHN.4.50
reference: John 4:50
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· Πορεύου· ὁ υἱός σου ζῇ. ⸀ἐπίστευσεν ὁ ἄνθρωπος τῷ λόγῳ
    ⸀ὃν εἶπεν αὐτῷ ὁ Ἰησοῦς καὶ ἐπορεύετο.
translation:
  text: Jesus said to him, “Go; your son lives.” The man believed the word that Jesus
    spoke to him and went on his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trusted the word that Jesus spoke to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Be on your way
  - Depart
  lexicon: BDAG
  rationale: A present middle imperative of πορεύομαι functioning as a straightforward
    command to leave and return. 'Go' is the most natural concise English equivalent
    and fits the narrative pace.
- source_word: ὁ υἱός σου
  chosen: your son
  alternatives:
  - your child
  lexicon: BDAG
  rationale: υἱός specifically means 'son,' not the more general 'child.' Gender-accurate
    rendering is required by the source.
- source_word: ζῇ
  chosen: lives
  alternatives:
  - is alive
  - will live
  lexicon: BDAG
  rationale: Present indicative naturally renders as 'lives' or 'is alive.' 'Lives'
    preserves the compact force of Jesus' declaration. In context it conveys that
    the boy is alive/recovered, not merely that he will live in the future.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - trusted
  lexicon: BDAG
  rationale: πιστεύω here takes the dative τῷ λόγῳ and means to believe/trust what
    was said. Following the project's default for πίστις/πιστεύω cognates, 'believed'
    is preferred in the main text; 'trusted' is a viable contextual alternative but
    not necessary in the main line.
- source_word: ὁ ἄνθρωπος
  chosen: The man
  alternatives:
  - the official
  - the man himself
  lexicon: BDAG
  rationale: The Greek explicitly says 'the man.' Although the broader context identifies
    him as a royal official, this verse uses the more general ἄνθρωπος, so the translation
    should preserve that wording rather than import the earlier designation.
- source_word: τῷ λόγῳ
  chosen: the word
  alternatives:
  - the message
  - what he said
  lexicon: BDAG
  rationale: λόγος here refers to the spoken statement of Jesus. 'The word' is a natural
    and sufficiently transparent rendering, while the following relative clause clarifies
    its content.
- source_word: ὃν εἶπεν αὐτῷ ὁ Ἰησοῦς
  chosen: that Jesus spoke to him
  alternatives:
  - that Jesus said to him
  - which Jesus told him
  lexicon: BDAG
  rationale: This relative clause modifies 'the word' and is best rendered explicitly
    in idiomatic English. 'Spoke to him' preserves the verbal connection with λόγος
    without sounding wooden.
- source_word: ἐπορεύετο
  chosen: went on his way
  alternatives:
  - went
  - departed
  lexicon: BDAG
  rationale: Imperfect middle indicates the man proceeded/continued on his journey
    after believing. 'Went on his way' captures the narrative movement better than
    the bare 'went' and avoids overinterpreting the imperfect as durative beyond what
    English can naturally express.
