id: JHN.4.9
reference: John 4:9
source:
  edition: SBLGNT
  text: λέγει οὖν αὐτῷ ἡ γυνὴ ἡ Σαμαρῖτις· Πῶς σὺ Ἰουδαῖος ὢν παρ’ ἐμοῦ πεῖν αἰτεῖς
    ⸂γυναικὸς Σαμαρίτιδος οὔσης⸃; οὐ γὰρ συγχρῶνται Ἰουδαῖοι Σαμαρίταις.
translation:
  text: So the Samaritan woman said to him, “How is it that you, being a Jew, ask
    for a drink from me, a Samaritan woman?” (For Jews do not associate with Samaritans.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “For Jews have no dealings with Samaritans,” possibly with the more
      specific sense that they did not use items in common, such as drinking vessels.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  chosen: So ... said
  alternatives:
  - Therefore ... said
  - Then ... said
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding wooden.
- source_word: ἡ γυνὴ ἡ Σαμαρῖτις
  chosen: the Samaritan woman
  alternatives:
  - the woman, the Samaritan
  - the Samaritan woman
  lexicon: BDAG
  rationale: The repeated article identifies her specifically. English idiom naturally
    compresses this to 'the Samaritan woman' while preserving both her gender and
    ethnic identity.
- source_word: Πῶς
  chosen: How is it that
  alternatives:
  - How
  - Why
  lexicon: BDAG
  rationale: Introduces astonishment at the social impropriety. 'How is it that' better
    captures the incredulous nuance than a bare 'How' in contemporary English.
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In John this term can mean either ethnic-religious 'Jew' or regional
    'Judean' depending on context. Here the contrast is with 'Samaritan' in terms
    of communal identity and customary relations, so 'Jew' is the best rendering.
- source_word: ὢν
  chosen: being
  alternatives:
  - since you are
  - though you are
  lexicon: BDAG
  rationale: The participle gives attendant circumstance/background. 'Being' preserves
    the Greek structure without over-interpreting the precise logical relation.
- source_word: παρ’ ἐμοῦ πεῖν αἰτεῖς
  chosen: ask for a drink from me
  alternatives:
  - ask me for a drink
  - request to drink from me
  lexicon: BDAG
  rationale: The infinitive πεῖν with αἰτεῖς expresses requesting something to drink.
    'Ask for a drink from me' is idiomatic and keeps the emphasis on the surprising
    request directed to her.
- source_word: γυναικὸς Σαμαρίτιδος οὔσης
  chosen: from me, a Samaritan woman
  alternatives:
  - from a Samaritan woman
  - since I am a Samaritan woman
  lexicon: BDAG
  rationale: The genitive absolute gives the woman's self-description as the basis
    of her surprise. Rendering it appositionally after 'me' is natural English and
    preserves both first-person reference and ethnic/gender identification.
- source_word: συγχρῶνται
  chosen: associate with
  alternatives:
  - use together with
  - have dealings with
  - share things with
  lexicon: BDAG
  rationale: The verb can denote association or use in common. In this context it
    explains the social barrier between Jews and Samaritans broadly. 'Associate with'
    is clear and sufficiently broad; a footnote preserves the more specific alternative
    nuance.
- source_word: οὐ γὰρ συγχρῶνται Ἰουδαῖοι Σαμαρίταις
  chosen: For Jews do not associate with Samaritans
  alternatives:
  - For Jews have no dealings with Samaritans
  - For Jews do not use things in common with Samaritans
  lexicon: BDAG
  rationale: This parenthetical explanation is rendered as a full explanatory sentence
    in parentheses, matching common English style and preserving John's explanatory
    aside.
