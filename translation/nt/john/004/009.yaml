theological_decisions:
- issue: Meaning of Ἰουδαῖος in Johannine usage
  chosen_reading: Jew
  alternative_readings:
  - Judean
  rationale: The verse contrasts Jews and Samaritans as social-religious communities,
    not merely residents of Judea versus Samaria. 'Jew' best reflects the communal
    and customary distinction in view.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Scope of συγχρῶνται
  chosen_reading: general social association
  alternative_readings:
  - specifically sharing utensils or using things in common
  rationale: The immediate context concerns Jesus asking to drink from her vessel,
    so a narrower sense is possible. However, the explanatory clause most naturally
    states the broader social estrangement between the groups. The narrower possibility
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
