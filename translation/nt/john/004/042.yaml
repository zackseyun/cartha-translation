id: JHN.4.42
reference: John 4:42
source:
  edition: SBLGNT
  text: τῇ τε γυναικὶ ἔλεγον ὅτι Οὐκέτι διὰ τὴν σὴν λαλιὰν πιστεύομεν· αὐτοὶ γὰρ ἀκηκόαμεν,
    καὶ οἴδαμεν ὅτι οὗτός ἐστιν ἀληθῶς ὁ σωτὴρ τοῦ ⸀κόσμου.
translation:
  text: And they were saying to the woman, “We no longer believe because of what you
    said, for we ourselves have heard, and we know that this one truly is the Savior
    of the world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'because of your speech.' The Greek refers to the woman's
      spoken testimony.
    reason: lexical_alternative
  - marker: b
    text: Some translations render 'this man' or simply 'he' for 'this one.' The Greek
      demonstrative is more emphatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε γυναικὶ
  chosen: to the woman
  alternatives:
  - to the woman also
  - both to the woman
  lexicon: BDAG
  rationale: Dative indirect object with τε adding mild connective force. English
    normally does not require an explicit rendering of τε here, so 'to the woman'
    is the most natural while preserving the addressee.
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Imperfect indicates ongoing/repeated speech in past time. 'They were
    saying' preserves the aspect better than simple past, though English could idiomatically
    compress it to 'they said'.
- source_word: Οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating cessation of a prior basis for
    belief.
- source_word: διὰ τὴν σὴν λαλιὰν
  chosen: because of what you said
  alternatives:
  - because of your speech
  - because of your word
  lexicon: BDAG
  rationale: διά with accusative expresses reason/basis. λαλιά refers to manner/content
    of speaking; 'what you said' is more natural modern English than 'your speech'
    while still accurately reflecting the woman's testimony.
- source_word: πιστεύομεν
  chosen: we believe
  alternatives:
  - we are believing
  lexicon: BDAG
  rationale: Present indicative expresses current belief. English simple present is
    the natural equivalent.
- source_word: αὐτοὶ
  chosen: we ourselves
  alternatives:
  - we ourselves indeed
  - we ourselves personally
  lexicon: BDAG
  rationale: Intensive use of the pronoun emphasizes their direct experience in contrast
    to secondhand report.
- source_word: ἀκηκόαμεν
  chosen: have heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: 'Perfect tense highlights completed action with present result: they
    have heard him and remain affected by it. English present perfect captures this
    well.'
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we have come to know
  lexicon: BDAG
  rationale: Though formally perfect in form, οἶδα functions as a present stative
    verb meaning 'know.' 'We know' is the standard rendering.
- source_word: οὗτός
  chosen: this one
  alternatives:
  - this man
  - he
  lexicon: BDAG
  rationale: Demonstrative points emphatically to Jesus. 'This one' preserves the
    force more closely than a simple pronoun, though it remains idiomatic enough in
    English in this confessional context.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - indeed
  - really
  lexicon: BDAG
  rationale: Adverb intensifies the truth of the confession. 'Truly' preserves the
    solemn tone better than 'really.'
- source_word: ὁ σωτὴρ
  chosen: the Savior
  alternatives:
  - the deliverer
  lexicon: BDAG
  rationale: Established lexical sense in Johannine and broader NT usage, with theological
    weight retained in accessible English.
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - of the whole world
  lexicon: BDAG
  rationale: κόσμος here denotes the world in its human/universal scope. 'Of the world'
    is the direct and sufficient rendering without adding 'whole,' which is interpretive.
