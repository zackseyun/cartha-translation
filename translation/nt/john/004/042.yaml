theological_decisions:
- issue: Scope and force of the Samaritan confession
  chosen_reading: Rendered the confession straightforwardly as 'this one truly is
    the Savior of the world' without narrowing 'world' to a subgroup or expanding
    it into a doctrinal statement beyond the text.
  alternative_readings:
  - '''the Savior of all people'''
  - '''the Savior of the elect from the world'''
  rationale: The verse presents a broad christological confession. Per the translation
    philosophy, the wording preserves the text's universal scope and theological tension
    without importing later doctrinal qualifiers.
  doctrine_reference: Preserve theological tension rather than resolve it.
