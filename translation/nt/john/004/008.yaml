id: JHN.4.8
reference: John 4:8
source:
  edition: SBLGNT
  text: οἱ γὰρ μαθηταὶ αὐτοῦ ἀπεληλύθεισαν εἰς τὴν πόλιν, ἵνα τροφὰς ἀγοράσωσιν.
translation:
  text: For his disciples had gone away into the city to buy food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the city'; πόλις can be rendered 'city' or, contextually, 'town.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to buy provisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding narrative statement;
    'For' preserves the connective force in natural English.
- source_word: μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive rendering of the noun phrase; 'disciples' is the
    established and accurate gloss for μαθηταί in Johannine narrative.
- source_word: ἀπεληλύθεισαν
  chosen: had gone away
  alternatives:
  - had departed
  - had gone off
  lexicon: BDAG
  rationale: Pluperfect of ἀπέρχομαι indicates prior action relative to the main scene;
    'had gone away' captures both the anterior aspect and the sense of departure.
- source_word: εἰς τὴν πόλιν
  chosen: into the city
  alternatives:
  - to the city
  - into town
  lexicon: BDAG
  rationale: εἰς with accusative marks movement toward/into a place. 'Into the city'
    is a close rendering; 'town' is possible in context but 'city' more directly reflects
    πόλις.
- source_word: ἵνα
  chosen: to
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces purpose. English infinitive 'to' expresses purpose
    idiomatically without loss of meaning.
- source_word: τροφὰς
  chosen: food
  alternatives:
  - provisions
  - foods
  lexicon: BDAG
  rationale: τροφάς refers to food/provisions. Singular mass noun 'food' is the most
    natural English equivalent in this context.
- source_word: ἀγοράσωσιν
  chosen: buy
  alternatives:
  - purchase
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended action; 'buy' is the
    plain modern English equivalent.
