id: JHN.4.53
reference: John 4:53
source:
  edition: SBLGNT
  text: ἔγνω οὖν ὁ πατὴρ ⸀ὅτι ἐκείνῃ τῇ ὥρᾳ ἐν ᾗ εἶπεν αὐτῷ ὁ ⸀Ἰησοῦς· Ὁ υἱός σου
    ζῇ, καὶ ἐπίστευσεν αὐτὸς καὶ ἡ οἰκία αὐτοῦ ὅλη.
translation:
  text: So the father knew that it was at that hour when Jesus said to him, “Your
    son lives,” and he himself believed, and his whole household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Your son is alive.”
    reason: lexical_alternative
  - marker: b
    text: The verb “believed” may refer either to believing Jesus' word specifically
      or to coming to faith in Jesus more fully; the Greek leaves the scope implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  chosen: knew
  alternatives:
  - realized
  - came to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes the father's recognition of the correspondence
    between the reported hour and Jesus' word. 'Knew' is natural English and preserves
    the cognitive force without overinterpreting the process.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference from the servants' report in the previous verse. 'So'
    is idiomatic modern English and preserves the logical connection.
- source_word: πατὴρ
  chosen: the father
  alternatives:
  - the boy's father
  - the official
  lexicon: BDAG
  rationale: The immediate context has shifted from the official designation to the
    familial role highlighted by the healing report. 'The father' follows the Greek
    directly and fits the narrative emphasis.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what he knew, not a causal clause. 'That' best
    reflects the syntax.
- source_word: ἐκείνῃ τῇ ὥρᾳ
  chosen: at that hour
  alternatives:
  - in that hour
  - at that very hour
  lexicon: BDAG
  rationale: Temporal dative phrase indicating the specific time. 'At that hour' is
    clear and sufficiently precise; 'very' would add emphasis not explicit in the
    Greek.
- source_word: ἐν ᾗ
  chosen: when
  alternatives:
  - in which
  lexicon: BDAG
  rationale: Though formally 'in which,' idiomatic English temporal relative usage
    is 'when.' This preserves meaning while avoiding stiffness.
- source_word: εἶπεν αὐτῷ ὁ Ἰησοῦς
  chosen: Jesus said to him
  alternatives:
  - Jesus told him
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object. 'Said to him' is slightly
    more formal and closer to the Greek than 'told him.'
- source_word: Ὁ υἱός σου ζῇ
  chosen: Your son lives
  alternatives:
  - Your son is alive
  - Your son will live
  lexicon: BDAG
  rationale: Present tense ζῇ is best rendered as a present-state declaration. 'Lives'
    is concise and mirrors the Greek; 'is alive' is possible but less direct. Future
    sense is not warranted here.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - put his faith
  - trusted
  lexicon: BDAG
  rationale: Default rendering for πιστεύω in line with the project's contested-terms
    guidance for πίστις cognates. In Johannine context this likely denotes faith in
    Jesus, but the verb itself is simply 'believed.'
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he too
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for basic English grammar and therefore
    likely emphatic. 'He himself' preserves that emphasis, distinguishing his personal
    belief from the household's response.
- source_word: ἡ οἰκία αὐτοῦ ὅλη
  chosen: his whole household
  alternatives:
  - his entire house
  - all his household
  lexicon: BDAG
  rationale: οἰκία here refers to the household, not the physical building. 'His whole
    household' is natural English and preserves ὅλη as modifying the entire domestic
    group.
