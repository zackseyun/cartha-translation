theological_decisions:
- issue: Sense of the father's believing
  chosen_reading: The text states that the father believed, with the implication in
    context that his faith is directed toward Jesus and his word, without specifying
    more than the Greek says.
  alternative_readings:
  - He believed Jesus' specific healing word only
  - He came to fuller saving faith in Jesus at this moment
  rationale: John often uses πιστεύω with theological depth, but this verse does not
    explicitly define the full extent of the father's faith. The translation therefore
    retains the simple 'believed' and does not import a more developed doctrinal conclusion
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
