id: JHN.4.17
reference: John 4:17
source:
  edition: SBLGNT
  text: ἀπεκρίθη ἡ γυνὴ καὶ εἶπεν ⸀αὐτῷ· Οὐκ ἔχω ἄνδρα. λέγει αὐτῇ ὁ Ἰησοῦς· Καλῶς
    εἶπας ὅτι Ἄνδρα οὐκ ἔχω·
translation:
  text: 'The woman answered and said to him, “I do not have a husband.” Jesus said
    to her, “You have spoken well: ‘I do not have a husband.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I have no husband.”
    reason: lexical_alternative
  - marker: b
    text: The Greek word ἀνήρ can mean either “man” or “husband”; here the context
      indicates “husband.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι commonly means 'answered'
    or 'replied.' 'Answered' fits standard English narrative style and pairs naturally
    with the following speech.
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: In this context γυνή refers to the Samaritan woman as a female person,
    not specifically as a wife. 'Woman' is the natural contextual sense.
- source_word: καὶ εἶπεν
  chosen: and said
  alternatives:
  - and spoke
  lexicon: BDAG
  rationale: This is the ordinary narrative speech formula. Retaining both verbs ('answered
    and said') reflects the Greek without sounding overly wooden.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech; straightforwardly
    rendered 'to him.'
- source_word: Οὐκ ἔχω ἄνδρα
  chosen: I do not have a husband
  alternatives:
  - I have no husband
  - I do not have a man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband.' In this immediate context, Jesus is
    speaking about her marital history (v. 18), so 'husband' is the contextually specific
    and natural English rendering. 'I do not have a husband' is slightly more contemporary
    than 'I have no husband' while preserving the sense.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    commonly renders it as simple past for readability. This is a standard optimal-equivalence
    adjustment.
- source_word: Καλῶς
  chosen: well
  alternatives:
  - rightly
  - correctly
  lexicon: BDAG
  rationale: The adverb commends the truthfulness/appropriateness of her statement.
    'Well' preserves the idiomatic force in natural English; 'rightly' is possible
    but less natural here.
- source_word: εἶπας
  chosen: you have spoken
  alternatives:
  - you said
  - you spoke
  lexicon: BDAG
  rationale: Using 'you have spoken well' gives a natural English equivalent to Καλῶς
    εἶπας and preserves the evaluative force of Jesus' response. It also avoids awkward
    repetition of 'said' immediately after 'Jesus said to her.'
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what she said. In English, a colon
    before the quotation is smoother than repeating 'that' before a direct citation,
    while preserving the sense.
- source_word: Ἄνδρα οὐκ ἔχω
  chosen: I do not have a husband
  alternatives:
  - I have no husband
  lexicon: BDAG
  rationale: The repeated clause is preserved in translation to reflect Jesus' quotation
    of her words. 'Husband' remains contextually required by the surrounding discussion.
