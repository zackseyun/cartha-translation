theological_decisions:
- issue: Sense of ἀνήρ in the woman's statement
  chosen_reading: husband
  alternative_readings:
  - man
  rationale: The broader context concerns the woman's marital situation, confirmed
    explicitly in the following verse. Rendering ἀνήρ as 'husband' communicates the
    intended sense without importing extra theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; gender-accurate
    over gender-neutral'
