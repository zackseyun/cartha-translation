id: JHN.4.27
reference: John 4:27
source:
  edition: SBLGNT
  text: Καὶ ἐπὶ τούτῳ ἦλθαν οἱ μαθηταὶ αὐτοῦ, καὶ ⸀ἐθαύμαζον ὅτι μετὰ γυναικὸς ἐλάλει·
    οὐδεὶς μέντοι εἶπεν· Τί ζητεῖς; ἢ τί λαλεῖς μετ’ αὐτῆς;
translation:
  text: And at this point his disciples came, and they were amazed that he was speaking
    with a woman. Yet no one said, “What are you seeking?” or, “Why are you speaking
    with her?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What do you want?” for “What are you seeking?”
    reason: lexical_alternative
  - marker: b
    text: Literally, “What are you speaking with her?” The sense is, “Why are you
      speaking with her?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τούτῳ
  chosen: at this point
  alternatives:
  - at this
  - upon this
  - just then
  lexicon: BDAG
  rationale: Idiomatic temporal use meaning 'at this moment/at this point' rather
    than a spatial sense. 'At this point' is natural modern English and preserves
    the narrative timing.
- source_word: ἐθαύμαζον
  chosen: they were amazed
  alternatives:
  - they marveled
  - they were astonished
  lexicon: BDAG
  rationale: Imperfect verb conveys ongoing/reactional surprise. 'They were amazed'
    is readable modern English; 'marveled' is possible but slightly more traditional
    in tone.
- source_word: μετὰ γυναικὸς
  chosen: with a woman
  alternatives:
  - with the woman
  - with a wife/woman
  lexicon: BDAG
  rationale: 'Anarthrous γυνή here is best rendered indefinitely: the disciples were
    surprised that he was speaking with a woman. ''Wife'' is lexically possible for
    γυνή in some contexts, but context clearly indicates an unspecified woman, namely
    the Samaritan woman.'
- source_word: ἐλάλει
  chosen: he was speaking
  alternatives:
  - he was talking
  - he spoke
  lexicon: BDAG
  rationale: Imperfect aspect suggests ongoing conversation. 'Speaking' preserves
    the verbal connection with the later λαλεῖς and is slightly more formal than 'talking'
    without sounding archaic.
- source_word: μέντοι
  chosen: yet
  alternatives:
  - however
  - nevertheless
  lexicon: BDAG
  rationale: 'Marks a concessive contrast: despite their amazement, no one voiced
    the question. ''Yet'' is concise and natural.'
- source_word: Τί ζητεῖς;
  chosen: What are you seeking?
  alternatives:
  - What do you want?
  - What are you looking for?
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek' or 'look for.' The direct object is unstated,
    so 'What are you seeking?' stays close to the Greek while remaining understandable.
    A more idiomatic alternative is preserved in a footnote because the sense may
    be 'What do you want [from her]?'.
- source_word: τί λαλεῖς μετ’ αὐτῆς;
  chosen: Why are you speaking with her?
  alternatives:
  - What are you saying to her?
  - Why are you talking with her?
  lexicon: BDAG
  rationale: Although τί can be rendered 'what,' in this context paired with the first
    question and with μετά + genitive ('with her'), the sense is naturally 'Why are
    you speaking with her?' in English. This reflects the pragmatic force of the disciples'
    unspoken question rather than woodenly reproducing an awkward English form.
