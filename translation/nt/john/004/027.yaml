theological_decisions:
- issue: Social implication of Jesus speaking with a woman
  chosen_reading: Render the disciples' reaction as surprise without importing an
    explicit moral or ethnic explanation into the main text.
  alternative_readings:
  - Expand to mention Jewish/Samaritan or male/female social taboo in the verse itself
  rationale: The Greek states only that they were amazed he was speaking with a woman.
    The social background is real, but the verse itself does not specify the reason
    in detail, so the translation preserves the text's restraint.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; optimal equivalence preserves the source''s plain sense.'
