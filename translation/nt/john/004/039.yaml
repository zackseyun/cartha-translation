id: JHN.4.39
reference: John 4:39
source:
  edition: SBLGNT
  text: Ἐκ δὲ τῆς πόλεως ἐκείνης πολλοὶ ἐπίστευσαν εἰς αὐτὸν τῶν Σαμαριτῶν διὰ τὸν
    λόγον τῆς γυναικὸς μαρτυρούσης ὅτι Εἶπέν μοι πάντα ⸀ἃ ἐποίησα.
translation:
  text: And many of the Samaritans from that town believed in him because of the word
    of the woman who was testifying, “He told me everything I did.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “because of the woman’s message.” The Greek word λόγος can mean “word,”
      “message,” or “report.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκ δὲ τῆς πόλεως ἐκείνης
  chosen: And ... from that town
  alternatives:
  - Now from that city
  - And from that town
  lexicon: BDAG
  rationale: ἐκ marks source/origin, πόλις can be rendered 'city' or 'town.' 'Town'
    fits natural modern English for the Samaritan settlement without changing sense.
    δέ is carried as a mild connective with 'And' rather than omitted.
- source_word: πολλοὶ ... τῶν Σαμαριτῶν
  chosen: many of the Samaritans
  alternatives:
  - many Samaritans
  - many from among the Samaritans
  lexicon: BDAG
  rationale: 'The genitive construction is partitive: many from among the Samaritans.
    ''Many of the Samaritans'' preserves that force in idiomatic English.'
- source_word: ἐπίστευσαν εἰς αὐτόν
  chosen: believed in him
  alternatives:
  - believed him
  - put their faith in him
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly expresses personal trust/belief directed toward
    someone. 'Believed in him' is the standard and accurate rendering here; 'put their
    faith in him' is possible but more expansive than needed.
- source_word: διὰ τὸν λόγον
  chosen: because of the word
  alternatives:
  - because of the message
  - on account of the statement
  lexicon: BDAG
  rationale: διά with the accusative indicates reason/cause. λόγος can mean 'word,'
    'message,' or 'report.' 'Word' preserves Johannine diction and leaves the semantic
    range open, while still being understandable.
- source_word: τῆς γυναικός
  chosen: the woman
  alternatives:
  - the woman there
  lexicon: BDAG
  rationale: γυνή here refers specifically to the Samaritan woman already introduced
    in context. 'The woman' is sufficient and natural.
- source_word: μαρτυρούσης
  chosen: who was testifying
  alternatives:
  - who testified
  - bearing witness
  lexicon: BDAG
  rationale: The present participle portrays her as giving testimony/witness. 'Who
    was testifying' preserves the participial, ongoing nuance better than a simple
    past, while remaining readable. 'Bearing witness' is also valid but slightly less
    natural in contemporary English.
- source_word: ὅτι
  chosen: “He told me ...”
  alternatives:
  - that he told me ...
  lexicon: BDAG
  rationale: ὅτι introduces the content of her testimony. Direct quotation in English
    is clear and vivid, matching the narrative style.
- source_word: Εἶπέν μοι
  chosen: He told me
  alternatives:
  - He said to me
  lexicon: BDAG
  rationale: λέγω with indirect object can be rendered 'said to me' or idiomatically
    'told me.' Because the content follows directly and English prefers 'told me'
    in this construction, it is chosen.
- source_word: πάντα ἃ ἐποίησα
  chosen: everything I did
  alternatives:
  - all that I did
  - everything I have done
  lexicon: BDAG
  rationale: 'πάντα ἃ is comprehensively rendered ''everything that.'' The aorist
    ἐποίησα is naturally translated as simple past in this narrative recollection:
    ''I did,'' not necessarily English present perfect. ''Everything I did'' is concise
    and faithful.'
