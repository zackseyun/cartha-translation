theological_decisions:
- issue: Nature of πιστεύω expression in Johannine usage
  chosen_reading: believed in him
  alternative_readings:
  - put their faith in him
  rationale: The verse reports genuine belief directed toward Jesus without specifying
    a later doctrinal category beyond the text. The rendering preserves the relational
    force of πιστεύω εἰς while avoiding interpretive expansion.
  doctrine_reference: Translation philosophy §§1, 3
