theological_decisions:
- issue: Metaphorical sense of Jesus' 'food'
  chosen_reading: Retain the literal lexical term 'food' in the main text without
    explicating the metaphor.
  alternative_readings:
  - I have nourishment to eat that you do not know about
  rationale: The immediate context shows Jesus speaking metaphorically about doing
    the Father's will, but this verse itself intentionally preserves the disciples'
    misunderstanding. The translation should not resolve the metaphor prematurely
    by replacing 'food' with an interpretive gloss.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
