id: JHN.4.32
reference: John 4:32
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Ἐγὼ βρῶσιν ἔχω φαγεῖν ἣν ὑμεῖς οὐκ οἴδατε.
translation:
  text: But he said to them, “I have food to eat that you do not know about.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have something to eat that you do not know.' Jesus is speaking metaphorically,
      as the following context makes clear.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast or development in the narrative. 'But' fits the
    disciples' misunderstanding and Jesus' corrective response better than a simple
    connective 'And.'
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; 'said to them' is straightforward
    and preserves the narrative style.
- source_word: Ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but English can naturally
    carry this emphasis by position without requiring 'I myself,' which would sound
    overstated here.
- source_word: βρῶσιν
  chosen: food
  alternatives:
  - something to eat
  - nourishment
  lexicon: BDAG
  rationale: βρῶσις here denotes food rather than the act of eating. 'Food' is the
    most natural and direct English equivalent in context.
- source_word: ἔχω φαγεῖν
  chosen: have food to eat
  alternatives:
  - have something to eat
  - have eating
  lexicon: BDAG
  rationale: The construction expresses possession of food for eating. 'Have food
    to eat' is idiomatic English and preserves the sense without paraphrasing.
- source_word: ἣν
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'food.' 'That' is more natural than
    'which' in contemporary English restrictive clauses.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis/contrast in Greek. English can convey
    the contrast adequately with normal word order; an intensified 'you yourselves'
    is possible but unnecessary in the main text.
- source_word: οὐκ οἴδατε
  chosen: do not know about
  alternatives:
  - do not know
  - are not aware of
  lexicon: BDAG
  rationale: Because the object is 'food,' idiomatic English prefers 'know about'
    rather than the less natural 'know' with a direct object. This preserves the sense
    that the disciples are unaware of this food's nature or existence.
