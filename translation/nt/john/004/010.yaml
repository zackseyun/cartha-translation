id: JHN.4.10
reference: John 4:10
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῇ· Εἰ ᾔδεις τὴν δωρεὰν τοῦ θεοῦ καὶ τίς ἐστιν
    ὁ λέγων σοι· Δός μοι πεῖν, σὺ ἂν ᾔτησας αὐτὸν καὶ ἔδωκεν ἄν σοι ὕδωρ ζῶν.
translation:
  text: Jesus answered and said to her, “If you knew the gift of God, and who it is
    who is saying to you, ‘Give me a drink,’ you would have asked him, and he would
    have given you living water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'running water' or 'fresh water'; the phrase can refer to flowing water,
      but 'living water' preserves the double meaning Jesus intends here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding; 'answered' fits Johannine style
    and pairs naturally with the following speech formula.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Common speech verb; retaining both 'answered and said' reflects the Greek
    doublet without awkward paraphrase.
- source_word: δωρεὰν
  chosen: gift
  alternatives:
  - free gift
  lexicon: BDAG
  rationale: The noun denotes a gift freely given. 'Gift' is the natural English equivalent;
    'free gift' would be redundant in this context.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: The genitive is most straightforwardly rendered 'of God.' While 'from
    God' captures source, the Greek wording is preserved more closely by 'of God.'
- source_word: τίς ἐστιν ὁ λέγων σοι
  chosen: who it is who is saying to you
  alternatives:
  - who is the one saying to you
  - who it is that says to you
  lexicon: BDAG
  rationale: This preserves the emphatic identification in the Greek while remaining
    readable English. The progressive 'is saying' reflects the present participle
    λέγων.
- source_word: Δός μοι πεῖν
  chosen: Give me a drink
  alternatives:
  - Give me to drink
  - Give me something to drink
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the aorist imperative plus infinitive.
    'Give me to drink' is overly wooden; 'something to drink' adds a word not explicit
    in Greek.
- source_word: ᾔτησας
  chosen: you would have asked
  alternatives:
  - you would ask
  - you would have requested
  lexicon: BDAG
  rationale: With εἰ plus imperfect/pluperfect-like form and ἄν in the apodosis, the
    sense is contrary-to-fact. English conditional past perfect communicates this
    well.
- source_word: ἔδωκεν ἄν
  chosen: he would have given
  alternatives:
  - he would give
  lexicon: BDAG
  rationale: 'The apodosis with ἄν is best rendered as a contrary-to-fact result in
    English: ''would have given.'''
- source_word: ὕδωρ ζῶν
  chosen: living water
  alternatives:
  - running water
  - fresh water
  lexicon: BDAG
  rationale: '''Living water'' is the established and contextually important expression
    in John, carrying both literal and theological resonance. The more idiomatic sense
    ''running water'' is worth preserving in a footnote because the phrase can denote
    flowing water in ordinary usage.'
