theological_decisions:
- issue: Rendering ὕδωρ ζῶν with both literal and symbolic force
  chosen_reading: living water
  alternative_readings:
  - running water
  - fresh water
  rationale: In context Jesus speaks in a way that intentionally invites misunderstanding
    at the physical level while pointing to a deeper spiritual reality. 'Living water'
    preserves that theological tension better than collapsing the phrase into the
    merely physical sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
