theological_decisions:
- issue: Rendering of τοῖς ἀνθρώποις with respect to gender
  chosen_reading: to the people
  alternative_readings:
  - to the men
  rationale: The noun ἄνθρωποι often has a generic human sense. Although the following
    context may involve male townspeople, this verse alone does not require a male-specific
    rendering. This follows the project's gender-accurate principle by avoiding an
    unnecessary masculine restriction where the source intent can be representative
    or general.
