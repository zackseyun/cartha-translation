id: JHN.4.28
reference: John 4:28
source:
  edition: SBLGNT
  text: ἀφῆκεν οὖν τὴν ὑδρίαν αὐτῆς ἡ γυνὴ καὶ ἀπῆλθεν εἰς τὴν πόλιν καὶ λέγει τοῖς
    ἀνθρώποις·
translation:
  text: So the woman left her water jar and went into the town and says to the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the men." The Greek can refer either to people generally or, in context,
      to men specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφῆκεν
  chosen: left
  alternatives:
  - left behind
  - abandoned
  lexicon: BDAG
  rationale: Aorist of ἀφίημι here most naturally means 'left' in the sense of leaving
    an object behind. 'Abandoned' overstates the action, while 'left behind' is possible
    but less natural in English narrative.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative consequence or transition. 'So' gives a natural English
    connective that preserves the inferential flow without sounding overly formal
    like 'therefore.'
- source_word: ὑδρίαν
  chosen: water jar
  alternatives:
  - water pot
  - jar
  lexicon: BDAG
  rationale: ὑδρία refers to a vessel for carrying water. 'Water jar' is clear, natural,
    and specific; 'water pot' is less idiomatic in contemporary English.
- source_word: αὐτῆς
  chosen: her
  lexicon: BDAG
  rationale: The genitive possessive is straightforwardly rendered by the English
    possessive determiner 'her.'
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  - the female
  lexicon: BDAG
  rationale: In Johannine narrative this refers to the Samaritan woman already introduced.
    'The woman' is the natural contextual rendering; 'wife' is not indicated by context.
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: The aorist of ἀπέρχομαι denotes departure/movement. 'Went' is idiomatic
    and sufficient here; 'departed' is more formal than the narrative requires.
- source_word: εἰς τὴν πόλιν
  chosen: into the town
  alternatives:
  - into the city
  - to the town
  lexicon: BDAG
  rationale: πόλις can mean either 'city' or 'town' depending on scale. In this local
    narrative setting, 'town' is more natural in English. 'Into' preserves εἰς as
    movement into the inhabited place.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - tells
  lexicon: BDAG
  rationale: The present tense is a historical present, common in narrative. Rendering
    it as 'says' preserves John's vivid style better than flattening it to 'said.'
- source_word: τοῖς ἀνθρώποις
  chosen: to the people
  alternatives:
  - to the men
  - to the townspeople
  lexicon: BDAG
  rationale: ἄνθρωποι can mean people/humans generally, though in some contexts it
    may refer specifically to men. Here the broader sense is preferable in the absence
    of explicit male restriction in the immediate verse. 'Townspeople' is interpretive
    because πόλις is not repeated in this phrase.
