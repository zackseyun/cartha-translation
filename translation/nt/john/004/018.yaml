id: JHN.4.18
reference: John 4:18
source:
  edition: SBLGNT
  text: πέντε γὰρ ἄνδρας ἔσχες, καὶ νῦν ὃν ἔχεις οὐκ ἔστιν σου ἀνήρ· τοῦτο ἀληθὲς
    εἴρηκας.
translation:
  text: For you have had five husbands, and the man you now have is not your husband.
    What you have said is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For you have had five men, and the one you now have
      is not your man/husband.' The Greek word ἀνήρ can mean 'man' or 'husband'; here
      the context favors 'husband.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέντε
  chosen: five
  lexicon: BDAG
  rationale: Straightforward cardinal numeral modifying ἄνδρας.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Here γάρ gives the reason Jesus can say she has spoken truly; 'for' preserves
    the explanatory force better than a looser connective.
- source_word: ἄνδρας
  chosen: husbands
  alternatives:
  - men
  lexicon: BDAG
  rationale: Although ἀνήρ can mean either 'man' or 'husband,' the relational context
    and the later contrast with 'not your husband' make 'husbands' the natural sense
    here.
- source_word: ἔσχες
  chosen: you have had
  alternatives:
  - you had
  lexicon: BDAG
  rationale: The aorist refers to her prior marital history. English present perfect
    idiomatically conveys past experience with present relevance in this context.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Simple temporal adverb marking her current situation.
- source_word: ὃν
  chosen: the man ... you now have
  alternatives:
  - he whom ... you have
  lexicon: BDAG
  rationale: The relative pronoun is rendered idiomatically in English by supplying
    'the man' from context, since English does not naturally say 'the one whom you
    have' in this relational sense.
- source_word: ἔχεις
  chosen: you now have
  alternatives:
  - you are with
  lexicon: BDAG
  rationale: ἔχω here denotes relational possession/association. 'Have' is literal
    and idiomatic enough in context, especially with the supplied 'the man.'
- source_word: οὐκ ἔστιν σου ἀνήρ
  chosen: is not your husband
  alternatives:
  - is not a husband to you
  - is not your man
  lexicon: BDAG
  rationale: The genitive pronoun σου with ἀνήρ expresses marital relation. 'Is not
    your husband' is the clearest natural English rendering and preserves the contrast
    with the previous 'husbands.'
- source_word: τοῦτο ἀληθὲς
  chosen: What you have said is true
  alternatives:
  - This is true
  - You have said this truthfully
  lexicon: BDAG
  rationale: The demonstrative plus predicate adjective refers back to her statement.
    In English, expanding to 'What you have said is true' makes the referent explicit
    and reads naturally.
- source_word: εἴρηκας
  chosen: you have said
  alternatives:
  - you said
  - you have spoken
  lexicon: BDAG
  rationale: Perfect tense of λέγω highlights the completed utterance with present
    relevance. 'You have said' preserves that force better than simple past.
