theological_decisions:
- issue: Sense of ἀνήρ in both occurrences
  chosen_reading: Render the first occurrence as 'husbands' and the second as 'husband.'
  alternative_readings:
  - Render both as 'men/man' more literally
  rationale: The immediate context is Jesus' disclosure of the woman's marital history
    and present non-marital relationship. Translating ἀνήρ as 'husband' in this verse
    communicates the relational meaning intended by the Greek rather than flattening
    it to generic 'man.' This is a lexical-contextual decision, not an importation
    of extra doctrinal content.
  doctrine_reference: Translation philosophy §1, §5
