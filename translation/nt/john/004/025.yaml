theological_decisions:
- issue: Rendering of χριστός in the explanatory phrase ὁ λεγόμενος χριστός
  chosen_reading: Retain 'Christ' in the parenthetical explanation while rendering
    Μεσσίας as 'Messiah' in the main clause.
  alternative_readings:
  - Render both terms as 'Messiah' and lose the explanatory distinction
  - Render χριστός also as 'Messiah' with a footnote noting 'Christ'
  rationale: The doctrine file sets the default rendering of Χριστός as 'Messiah'
    where it functions as a title, but this verse uniquely contains both Μεσσίας and
    χριστός, with the latter serving as an explanatory gloss for Greek readers. Preserving
    'Christ' in the parenthesis makes the explanatory relationship visible in English
    and reflects common recognition of the term, while the main clause still follows
    the project's messianic-title preference. This does not import a separate theological
    claim; it preserves the source-text's bilingual explanatory structure.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
