id: JHN.4.25
reference: John 4:25
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ἡ γυνή· Οἶδα ὅτι Μεσσίας ἔρχεται, ὁ λεγόμενος χριστός· ὅταν ἔλθῃ
    ἐκεῖνος, ἀναγγελεῖ ἡμῖν ⸀ἅπαντα.
translation:
  text: The woman said to him, “I know that Messiah is coming” (the one called Christ).
    “When he comes, he will tell us everything.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Messiah, the one called Christ.'' John explains the Semitic title
      Μεσσίας with the Greek title χριστός. Elsewhere in this translation, χριστός
      as a title is normally rendered ''Messiah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, idiomatic modern English
    narrative normally renders it as a simple past here.
- source_word: γυνή
  chosen: the woman
  alternatives:
  - the wife
  - the woman
  lexicon: BDAG
  rationale: In context this refers to the Samaritan woman, so 'the woman' is the
    natural and contextually specific rendering.
- source_word: Οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: '''I know'' is the direct and natural rendering of οἶδα in this context.'
- source_word: Μεσσίας
  chosen: Messiah
  alternatives:
  - Messias
  lexicon: BDAG
  rationale: This is a transliterated Semitic title. Per translation philosophy, titles
    are translated to preserve meaning where possible, and the contested-terms table
    specifies Χριστός as 'Messiah' where title. Here 'Messiah' preserves the Jewish/Samaritan
    messianic context.
- source_word: ἔρχεται
  chosen: is coming
  alternatives:
  - comes
  - is on his way
  lexicon: BDAG
  rationale: The present tense here has a futuristic sense. 'Is coming' preserves
    the immediacy of the Greek better than a simple future.
- source_word: ὁ λεγόμενος χριστός
  chosen: the one called Christ
  alternatives:
  - who is called Christ
  - which means Anointed One
  - the one called Messiah
  lexicon: BDAG
  rationale: The Greek apposition explains Μεσσίας for Greek readers by giving χριστός.
    To preserve both the source-text explanation and the project's default rendering
    of Χριστός as 'Messiah' where title, the main text keeps 'Messiah' for Μεσσίας
    and preserves 'Christ' in the explanatory parenthesis as a lexical note. This
    reflects the Greek's bilingual explanatory function without collapsing the two
    terms into one English word.
- source_word: ὅταν ἔλθῃ
  chosen: When he comes
  alternatives:
  - Whenever he comes
  - When that one comes
  lexicon: BDAG
  rationale: This construction expresses a future contingency. 'When he comes' is
    natural English and captures the sense.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  - that man
  lexicon: BDAG
  rationale: The demonstrative adds emphasis, but in English an explicit 'he' is the
    most natural rendering in this sentence. The stronger alternative 'that one' is
    possible but sounds stilted here.
- source_word: ἀναγγελεῖ
  chosen: he will tell
  alternatives:
  - he will announce
  - he will declare
  - he will report
  lexicon: BDAG
  rationale: In context the sense is that the Messiah will make matters known or explain
    them. 'Tell' is clear, natural, and fits the object 'everything' well.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: English idiom allows the indirect object without a preposition here.
- source_word: ἅπαντα
  chosen: everything
  alternatives:
  - all things
  - all things to us
  lexicon: BDAG
  rationale: '''Everything'' is idiomatic modern English and accurately conveys the
    comprehensive force of ἅπαντα.'
