theological_decisions:
- issue: Whether to interpret the harvest saying primarily literally or spiritually
    in the main text
  chosen_reading: Preserve the agricultural imagery without making the spiritual referent
    explicit in translation.
  alternative_readings:
  - Translate interpretively as 'people are ready to be gathered' or similar
  rationale: In context Jesus is speaking metaphorically about the readiness of people
    for mission, but the Greek wording remains in harvest imagery. Per translation
    philosophy, the main text should preserve the metaphor and not import the interpretation
    into the wording.
  doctrine_reference: Translation philosophy items 1, 3, and 6
