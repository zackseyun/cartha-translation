id: JHN.4.35
reference: John 4:35
source:
  edition: SBLGNT
  text: οὐχ ὑμεῖς λέγετε ὅτι Ἔτι τετράμηνός ἐστιν καὶ ὁ θερισμὸς ἔρχεται; ἰδοὺ λέγω
    ὑμῖν, ἐπάρατε τοὺς ὀφθαλμοὺς ὑμῶν καὶ θεάσασθε τὰς χώρας ὅτι λευκαί εἰσιν πρὸς
    θερισμόν· ἤδη
translation:
  text: 'Do you not say, ‘There are still four months, and then the harvest comes’?
    Look, I tell you: lift up your eyes and see the fields, that they are white for
    harvest already.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are ripe for harvest.' The Greek says 'white,' preserving the visual
      harvest image while implying readiness.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὑμεῖς λέγετε
  chosen: Do you not say
  alternatives:
  - Do you not yourselves say
  - Do you not say
  lexicon: BDAG
  rationale: Renders the negative question naturally in English while preserving the
    emphatic ὑμεῖς implicitly. Adding 'yourselves' would overstate the emphasis in
    English, so the simpler form is preferred.
- source_word: Ἔτι τετράμηνός ἐστιν
  chosen: There are still four months
  alternatives:
  - It is still four months
  - Four months are still left
  lexicon: BDAG
  rationale: Idiomatic English requires an existential construction. The sense is
    a remaining interval before harvest, not a literal predication about 'four-month'
    as an adjective.
- source_word: ὁ θερισμὸς ἔρχεται
  chosen: the harvest comes
  alternatives:
  - the harvest is coming
  - the harvest arrives
  lexicon: BDAG
  rationale: Present tense retained with a natural English equivalent. 'Comes' preserves
    the proverbial immediacy better than the more progressive 'is coming.'
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A discourse marker drawing attention. 'Look' is readable modern English
    and preserves the force without archaic tone.
- source_word: ἐπάρατε τοὺς ὀφθαλμοὺς ὑμῶν
  chosen: lift up your eyes
  alternatives:
  - raise your eyes
  - look up
  lexicon: BDAG
  rationale: Keeps the vivid idiom of the Greek rather than flattening it to merely
    'look up.'
- source_word: θεάσασθε
  chosen: see
  alternatives:
  - behold
  - look at
  lexicon: BDAG
  rationale: The verb calls for intentional observation. 'See' works well after 'lift
    up your eyes' and avoids awkward repetition with 'look.' 'Behold' is too archaic
    for the stated philosophy.
- source_word: τὰς χώρας
  chosen: the fields
  alternatives:
  - the countryside
  - the lands
  lexicon: BDAG
  rationale: In harvest context, χώρας most naturally refers to cultivated fields
    rather than regions or countryside in general.
- source_word: λευκαί εἰσιν
  chosen: they are white
  alternatives:
  - they are ripe
  - they are shining white
  lexicon: BDAG
  rationale: Retains the image in the Greek rather than interpreting it directly as
    'ripe.' The metaphor likely implies ripeness, but the text says 'white,' so the
    imagery is preserved in the main text.
- source_word: πρὸς θερισμόν
  chosen: for harvest
  alternatives:
  - for reaping
  - ready for harvest
  lexicon: BDAG
  rationale: A concise rendering that preserves the harvest metaphor. 'Ready for harvest'
    is interpretive and overlaps with the force of λευκαί plus the final ἤδη.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - even now
  lexicon: BDAG
  rationale: 'Placed at the end in English to preserve the climactic force: the fields
    are already in harvest condition now, in contrast to the proverb about waiting
    four months.'
