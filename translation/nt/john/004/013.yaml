id: JHN.4.13
reference: John 4:13
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῇ· Πᾶς ὁ πίνων ἐκ τοῦ ὕδατος τούτου διψήσει πάλιν·
translation:
  text: Jesus answered and said to her, “Everyone who drinks from this water will
    be thirsty again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'will thirst again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' fits idiomatic English
    and preserves the formal correspondence with the Greek aorist.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Common rendering of λέγω in narrative. Keeping both 'answered and said'
    reflects the Greek's two-verb formulation rather than collapsing it.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative indirect object referring to the Samaritan woman; explicit in
    English for clarity and fidelity.
- source_word: Πᾶς ὁ πίνων
  chosen: Everyone who drinks
  alternatives:
  - Whoever drinks
  - Everyone drinking
  lexicon: BDAG
  rationale: The articular present participle has a generic, customary force. 'Everyone
    who drinks' is natural modern English and preserves the universal scope better
    than a more wooden participial rendering.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: '''From'' is the most natural English preposition here for drinking from
    a source.'
- source_word: τοῦ ὕδατος τούτου
  chosen: this water
  alternatives:
  - the water of this place
  - this particular water
  lexicon: BDAG
  rationale: Direct reference to the physical water under discussion. 'This water'
    is the plain sense and preserves the demonstrative force of τούτου.
- source_word: διψήσει
  chosen: will be thirsty
  alternatives:
  - will thirst
  lexicon: BDAG
  rationale: Future of διψάω can be rendered either verbally or with the predicate
    adjective in English. 'Will be thirsty' is more natural contemporary English while
    preserving the meaning.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Simple adverb indicating repetition; 'again' is the clearest and most
    idiomatic choice.
