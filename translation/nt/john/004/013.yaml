theological_decisions:
- issue: Retention of the double speech formula ἀπεκρίθη ... καὶ εἶπεν
  chosen_reading: 'Render both verbs: ''answered and said'''
  alternative_readings:
  - Compress to 'answered' or 'said' alone
  rationale: The Greek explicitly uses both verbs in a common Johannine narrative
    formula. Retaining both avoids unnecessary smoothing and preserves source-text
    texture without altering meaning.
  doctrine_reference: Translation philosophy §1, §5
- issue: Generic masculine construction Πᾶς ὁ πίνων
  chosen_reading: Use inclusive 'Everyone who drinks'
  alternative_readings:
  - Every man who drinks
  - Whoever drinks
  rationale: Although grammatically masculine, the expression is generic rather than
    male-specific. 'Everyone' accurately reflects the source's representative force
    in line with gender-accurate translation principles.
  doctrine_reference: Translation philosophy §4
