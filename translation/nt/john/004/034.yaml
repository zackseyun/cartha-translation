theological_decisions:
- issue: Reference of 'him who sent me'
  chosen_reading: An implicit reference to the Father/God, left as 'him who sent me'
    in the text.
  alternative_readings:
  - Explicitly interpret as 'the Father who sent me'
  rationale: The context in John clearly points to the Father, but the Greek itself
    uses an implicit personal reference. The translation preserves the wording without
    importing an explicit title not present in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
