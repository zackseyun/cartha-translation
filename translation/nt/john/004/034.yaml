id: JHN.4.34
reference: John 4:34
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὁ Ἰησοῦς· Ἐμὸν βρῶμά ἐστιν ἵνα ⸀ποιήσω τὸ θέλημα τοῦ πέμψαντός
    με καὶ τελειώσω αὐτοῦ τὸ ἔργον.
translation:
  text: Jesus said to them, “My food is to do the will of him who sent me and to complete
    his work.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'finish his work.'
    reason: lexical_alternative
  - marker: b
    text: '''Him who sent me'' refers contextually to the Father, though the Greek
      does not state the title explicitly here.'
    reason: cross_reference
lexical_decisions:
- source_word: βρῶμά
  chosen: food
  alternatives:
  - nourishment
  lexicon: BDAG
  rationale: βρῶμα ordinarily means 'food.' Retaining the concrete metaphor preserves
    the force of Jesus' statement in context, where the disciples have been speaking
    about literal eating.
- source_word: Ἐμὸν βρῶμά ἐστιν
  chosen: My food is
  alternatives:
  - What nourishes me is
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the metaphor rather than unpacking
    it dynamically. English idiom allows 'My food is to…' naturally enough.
- source_word: ἵνα ποιήσω
  chosen: is to do
  alternatives:
  - is that I do
  - is for me to do
  lexicon: BDAG
  rationale: 'Here ἵνα with the subjunctive expresses content/purpose in a way that
    idiomatic English renders well with an infinitive after ''is'': ''is to do.''
    This avoids awkward literalism while preserving the sense.'
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - what ... wants
  lexicon: BDAG
  rationale: '''The will'' is the standard and precise rendering for θέλημα, especially
    in theological contexts concerning obedience to God.'
- source_word: τοῦ πέμψαντός με
  chosen: of him who sent me
  alternatives:
  - of the one who sent me
  lexicon: BDAG
  rationale: The articular participle is best rendered with a personal relative clause.
    'Him who sent me' is concise, natural, and preserves the personal reference without
    over-specifying.
- source_word: τελειώσω
  chosen: complete
  alternatives:
  - finish
  - bring to completion
  lexicon: BDAG
  rationale: τελειόω can mean to complete or bring to its intended end. 'Complete'
    preserves both the idea of finishing and the nuance of fulfillment better than
    the simpler 'finish.'
- source_word: ἔργον
  chosen: work
  alternatives:
  - task
  - deed
  lexicon: BDAG
  rationale: '''Work'' is the most natural and contextually fitting rendering for
    ἔργον here, referring to the mission entrusted by the Father.'
- source_word: λέγει αὐτοῖς ὁ Ἰησοῦς
  chosen: Jesus said to them
  alternatives:
  - Jesus says to them
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), standard English
    narrative style usually renders it as simple past. This is an optimal-equivalence
    choice for readability.
