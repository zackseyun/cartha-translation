theological_decisions:
- issue: Meaning of 'salvation is from the Jews'
  chosen_reading: A statement of salvation's historical source and covenantal mediation
    through the Jewish people, not an ethnic superiority claim.
  alternative_readings:
  - A narrower reference to the Messiah's Jewish origin
  - A broader claim about the priority of Jewish revelation and worship
  rationale: 'The clause grounds the preceding contrast in salvation history: God''s
    saving revelation and Messiah arise from the Jewish people. The translation keeps
    the source-language wording without importing polemical or supersessionist claims
    beyond the text.'
  doctrine_reference: Translation philosophy §1, §3
