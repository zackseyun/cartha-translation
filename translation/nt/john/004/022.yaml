id: JHN.4.22
reference: John 4:22
source:
  edition: SBLGNT
  text: ὑμεῖς προσκυνεῖτε ὃ οὐκ οἴδατε, ἡμεῖς προσκυνοῦμεν ὃ οἴδαμεν, ὅτι ἡ σωτηρία
    ἐκ τῶν Ἰουδαίων ἐστίν·
translation:
  text: You worship what you do not know; we worship what we know, because salvation
    is from the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jewish people'; elsewhere in John, 'Judeans' may fit some contexts,
      but here the contrast is with Samaritans in matters of worship and salvation
      history.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκυνεῖτε / προσκυνοῦμεν
  chosen: worship
  alternatives:
  - bow down to
  - pay homage to
  lexicon: BDAG
  rationale: In Johannine context the verb refers to religious worship, not merely
    physical prostration or civic homage. 'Worship' is the natural English equivalent
    and preserves the contrast between Samaritan and Jewish worship.
- source_word: ὃ
  chosen: what
  alternatives:
  - him whom
  - the one whom
  lexicon: BDAG
  rationale: The neuter relative pronoun is idiomatically rendered 'what' in English
    here, referring to the object of worship in a general sense. Rendering it more
    personally as 'him whom' would over-specify the Greek and sound unnatural in English.
- source_word: οἴδατε / οἴδαμεν
  chosen: know
  alternatives:
  - understand
  - are acquainted with
  lexicon: BDAG
  rationale: The verb denotes knowledge here, especially knowledge of the object of
    worship. 'Know' is both direct and idiomatic, and it preserves the sharp contrast
    in Jesus' statement.
- source_word: σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Salvation'' is the standard and contextually appropriate rendering.
    In this Johannine setting it points beyond mere temporal rescue to God''s saving
    work as historically mediated through the Jewish people.'
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  - comes from
  lexicon: BDAG
  rationale: The preposition marks source or origin. 'From' is concise and preserves
    the statement that salvation has its historical source in the Jews. 'Comes from'
    is interpretive and slightly more expansive than the Greek.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Jewish people
  - the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι in John can mean Judeans in some contexts, but here the contrast
    is between Samaritan and Jewish worship traditions, and the reference is to the
    Jewish people as the historical covenant community through whom salvation comes.
    'The Jews' is the most direct rendering, while 'the Jewish people' is a possible
    explanatory alternative.
