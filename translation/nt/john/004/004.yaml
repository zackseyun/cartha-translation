id: JHN.4.4
reference: John 4:4
source:
  edition: SBLGNT
  text: ἔδει δὲ αὐτὸν διέρχεσθαι διὰ τῆς Σαμαρείας.
translation:
  text: Now he had to pass through Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "it was necessary for him to go through Samaria." The Greek states necessity
      without specifying its exact basis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  chosen: had to
  alternatives:
  - it was necessary
  - was obliged to
  - must
  lexicon: BDAG
  rationale: The imperfect of δέω expresses necessity in past narrative. 'Had to'
    is natural modern English and preserves the sense of necessity better than the
    more wooden 'it was necessary.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Now'
    gives a light connective in readable English without overstating adversative force.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: 'Although αὐτόν is formally accusative as the subject of the infinitive
    construction, idiomatic English renders the clause with a finite verb and nominative
    subject: ''he had to pass.'''
- source_word: διέρχεσθαι
  chosen: pass through
  alternatives:
  - go through
  - travel through
  lexicon: BDAG
  rationale: διέρχομαι with διά commonly means to go or pass through a region. 'Pass
    through' is concise and fits the geographic sense.
- source_word: διὰ τῆς Σαμαρείας
  chosen: through Samaria
  alternatives:
  - through the region of Samaria
  - by way of Samaria
  lexicon: BDAG
  rationale: διά with the genitive indicates movement through a place. 'Samaria' is
    sufficiently clear in English; adding 'region of' is possible but unnecessary
    in the main text.
