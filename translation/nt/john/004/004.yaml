theological_decisions:
- issue: Force of necessity in ἔδει
  chosen_reading: Expressed as real necessity ('had to') without specifying whether
    the necessity was merely geographic, socially unexpected, or divinely purposed.
  alternative_readings:
  - purely geographic convenience
  - divine necessity tied to Jesus' mission
  rationale: The Greek states necessity but does not explicitly explain its basis
    in this verse alone. The translation preserves that tension rather than resolving
    it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
