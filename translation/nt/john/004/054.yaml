id: JHN.4.54
reference: John 4:54
source:
  edition: SBLGNT
  text: τοῦτο ⸀δὲ πάλιν δεύτερον σημεῖον ἐποίησεν ὁ Ἰησοῦς ἐλθὼν ἐκ τῆς Ἰουδαίας εἰς
    τὴν Γαλιλαίαν.
translation:
  text: This again was the second sign Jesus did after coming from Judea into Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "miracle." John commonly uses "sign" to emphasize the act's meaning as
      well as its power.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring back to the healing just narrated; simple deictic
    'This' is natural English.
- source_word: δὲ
  chosen: again
  alternatives:
  - now
  - and
  - but
  lexicon: BDAG
  rationale: δέ is mildly connective, but with πάλιν the sense is best carried idiomatically
    in English by folding the connective into 'again' rather than adding a wooden
    'and/but'.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition/sequence; 'again' is the most natural concise rendering.
- source_word: δεύτερον
  chosen: the second
  alternatives:
  - second
  lexicon: BDAG
  rationale: 'Ordinal modifying ''sign''; English idiom prefers the article here:
    ''the second sign''.'
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miracle
  lexicon: BDAG
  rationale: In John, σημεῖον carries evidential/theological force beyond mere wonder;
    'sign' preserves Johannine usage better than 'miracle'.
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - performed
  - made
  lexicon: BDAG
  rationale: ποιέω here is a common verb with σημεῖον; 'did' is idiomatic and avoids
    overformal 'performed' while preserving the action.
- source_word: ἐλθὼν
  chosen: after coming
  alternatives:
  - when he came
  - having come
  lexicon: BDAG
  rationale: Aorist participle is most naturally rendered with temporal force in context;
    'after coming' clearly links Jesus' arrival in Galilee with the sign.
- source_word: ἐκ τῆς Ἰουδαίας
  chosen: from Judea
  alternatives:
  - out of Judea
  lexicon: BDAG
  rationale: Standard spatial sense of ἐκ; 'from Judea' is natural English.
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς formally means 'into'; 'into Galilee' preserves the directional movement,
    though 'to Galilee' would also be acceptable English.
