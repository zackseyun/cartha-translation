theological_decisions:
- issue: Johannine σημεῖον terminology
  chosen_reading: sign
  alternative_readings:
  - miracle
  rationale: The verse numbers Jesus' works as signs, a key Johannine category pointing
    beyond the act itself to its revelatory significance. Rendering as 'sign' preserves
    that theological-literary function without importing extra interpretation.
  doctrine_reference: Translation philosophy §1, §5
