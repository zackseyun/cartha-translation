theological_decisions:
- issue: Rendering the persecutors' self-understanding in cultic language
  chosen_reading: offering service to God
  alternative_readings:
  - offering worship to God
  - rendering sacred service to God
  rationale: The Greek presents the killers as believing their act is a legitimate
    act of devotion. The translation preserves that shocking irony without softening
    it or importing approval. 'Service' keeps the cultic nuance of λατρεία while remaining
    readable.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender in πᾶς ὁ ἀποκτείνας
  chosen_reading: everyone who kills you ... he is offering
  alternative_readings:
  - whoever kills you will think they are offering
  rationale: The source is grammatically masculine singular with representative force.
    Per the gender-accurate policy, the translation retains a singular masculine pronoun
    rather than flattening to gender-neutral plural, while the noun 'everyone' already
    signals generic scope.
  doctrine_reference: Translation philosophy §4
