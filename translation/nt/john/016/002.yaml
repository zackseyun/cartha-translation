id: JHN.16.2
reference: John 16:2
source:
  edition: SBLGNT
  text: ἀποσυναγώγους ποιήσουσιν ὑμᾶς· ἀλλ’ ἔρχεται ὥρα ἵνα πᾶς ὁ ἀποκτείνας ὑμᾶς
    δόξῃ λατρείαν προσφέρειν τῷ θεῷ.
translation:
  text: They will make you outcasts from the synagogues; indeed, an hour is coming
    when everyone who kills you will think he is offering service to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put you out of the synagogue' or 'exclude you from the synagogues.'
    reason: lexical_alternative
  - marker: b
    text: Or 'offering worship to God' or 'rendering religious service to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποσυναγώγους
  chosen: outcasts from the synagogues
  alternatives:
  - put out of the synagogue
  - excluded from the synagogue(s)
  lexicon: BDAG
  rationale: The adjective denotes being expelled from or excluded from synagogue
    community. 'Outcasts from the synagogues' communicates both exclusion and social-religious
    disgrace in natural English. The plural 'synagogues' reflects the form and avoids
    implying a single institution.
- source_word: ποιήσουσιν ὑμᾶς
  chosen: they will make you
  alternatives:
  - they will cause you to be
  - they will make you become
  lexicon: BDAG
  rationale: ποιέω with a predicate adjective here means 'make' or 'cause to be.'
    'They will make you' is idiomatic and preserves the causative force.
- source_word: ἀλλ’
  chosen: indeed
  alternatives:
  - but
  - rather
  - yet
  lexicon: BDAG
  rationale: Here ἀλλά introduces a stronger, escalating contrast after the first
    clause. 'Indeed' fits the discourse move in English better than a bare 'but,'
    signaling intensification rather than simple opposition.
- source_word: ἔρχεται ὥρα
  chosen: an hour is coming
  alternatives:
  - the hour is coming
  - a time is coming
  lexicon: BDAG
  rationale: This Johannine idiom is often rendered 'an hour is coming.' The anarthrous
    ὥρα does not require 'the hour' here, and 'hour' preserves the source idiom better
    than the more interpretive 'time.'
- source_word: ἵνα
  chosen: when
  alternatives:
  - that
  - so that
  lexicon: BDAG
  rationale: After 'an hour is coming,' ἵνα introduces the content/result of that
    coming hour. In idiomatic English, 'when' best conveys the temporal sense without
    woodenly preserving the conjunction.
- source_word: πᾶς ὁ ἀποκτείνας ὑμᾶς
  chosen: everyone who kills you
  alternatives:
  - whoever kills you
  - everyone killing you
  lexicon: BDAG
  rationale: The substantival participial construction is naturally rendered as a
    generic personal expression. 'Everyone who kills you' is clear and preserves the
    universal force of πᾶς.
- source_word: δόξῃ
  chosen: will think
  alternatives:
  - will suppose
  - will imagine
  - will seem to himself
  lexicon: BDAG
  rationale: δοκέω here expresses subjective belief or supposition. 'Will think' is
    the most natural modern English equivalent.
- source_word: λατρείαν
  chosen: service
  alternatives:
  - worship
  - religious service
  lexicon: BDAG
  rationale: λατρεία refers to cultic or religious service rendered to God. 'Service'
    is concise and natural, while the object 'to God' preserves the religious sense.
    'Worship' is possible but slightly narrower and more affective than the term itself.
- source_word: προσφέρειν
  chosen: offering
  alternatives:
  - rendering
  - presenting
  lexicon: BDAG
  rationale: With λατρείαν, προσφέρειν carries the sense of presenting or offering
    something to God. 'Offering service' is an established and natural English collocation
    that preserves the sacrificial/religious nuance.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: The dative is best rendered straightforwardly as 'to God,' preserving
    the direction of the supposed religious act.
