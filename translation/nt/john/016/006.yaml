theological_decisions:
- issue: Collective singular 'heart' versus distributive plural 'hearts'
  chosen_reading: your heart
  alternative_readings:
  - your hearts
  rationale: This is not a doctrinally contested issue but affects nuance. The Greek
    construction uses a plural possessive with singular καρδίαν, which can present
    the group as sharing one inward emotional condition. Retaining the singular in
    English preserves that collective force while remaining idiomatic.
