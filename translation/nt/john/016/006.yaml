id: JHN.16.6
reference: John 16:6
source:
  edition: SBLGNT
  text: ἀλλ’ ὅτι ταῦτα λελάληκα ὑμῖν ἡ λύπη πεπλήρωκεν ὑμῶν τὴν καρδίαν.
translation:
  text: But because I have spoken these things to you, sorrow has filled your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your hearts.' The Greek reads singular 'heart' with a plural 'your,'
      a construction that may express the group's shared inner sorrow.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Adversative conjunction marking contrast with the previous statement.
    'But' is the most natural and sufficiently strong English connector here.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the disciples' sorrow, not merely
    content. 'Because' best captures the causal force in context.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative referring to the matters Jesus has just spoken.
    'These things' preserves the plural and Johannine style.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  lexicon: BDAG
  rationale: Perfect active indicative of λαλέω. The perfect highlights a completed
    act with present effect; 'I have spoken' preserves that aspect better than a simple
    past. 'Spoken' also reflects λαλέω naturally, though 'said' is possible.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to all of you
  lexicon: BDAG
  rationale: Dative plural indirect object. Standard English 'to you' is sufficient;
    plurality is clear from context and need not be made explicit in the main text.
- source_word: ἡ λύπη
  chosen: sorrow
  alternatives:
  - grief
  - sadness
  lexicon: BDAG
  rationale: λύπη denotes deep distress or grief. 'Sorrow' is weighty, idiomatic,
    and fits the solemn tone. 'Grief' is possible, but 'sorrow' works better with
    the idiom that follows.
- source_word: πεπλήρωκεν
  chosen: has filled
  alternatives:
  - has overwhelmed
  - fills
  lexicon: BDAG
  rationale: Perfect active indicative of πληρόω, literally 'has filled.' The perfect
    is retained in English. More interpretive options like 'has overwhelmed' go beyond
    the lexical sense.
- source_word: ὑμῶν τὴν καρδίαν
  chosen: your heart
  alternatives:
  - your hearts
  lexicon: BDAG
  rationale: The Greek has plural possessive with singular noun, a common construction
    that can denote the inward center of each addressed person collectively. English
    idiom can render this either 'your heart' or 'your hearts.' 'Your heart' preserves
    the singular object and the collective address without awkwardness.
