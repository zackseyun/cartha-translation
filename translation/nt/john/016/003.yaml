id: JHN.16.3
reference: John 16:3
source:
  edition: SBLGNT
  text: καὶ ταῦτα ποιήσουσιν ὅτι οὐκ ἔγνωσαν τὸν πατέρα οὐδὲ ἐμέ.
translation:
  text: And they will do these things because they have not known the Father or me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not know the Father or me,' or 'they have not come to know
      the Father or me.' The Greek verb can be rendered in more than one natural English
      way here.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and also
  - so
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding context;
    simple coordination is sufficient.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: BDAG
  rationale: Neuter plural demonstrative naturally refers back to the hostile actions
    just mentioned in the prior context; 'these things' preserves the plural and backward
    reference.
- source_word: ποιήσουσιν
  chosen: they will do
  alternatives:
  - they will make
  - they will carry out
  lexicon: BDAG
  rationale: Future active indicative of ποιέω. 'Do' is the most natural English equivalent
    here and fits the object 'these things.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the future actions, not merely content,
    so 'because' best conveys the causal force.
- source_word: οὐκ ἔγνωσαν
  chosen: they have not known
  alternatives:
  - they did not know
  - they have not come to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω can be rendered simply as past, but in English 'have
    not known' captures the present relevance of their failure to know God and Christ.
    'Come to know' is possible, but 'known' is more direct and idiomatic here.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine usage this is a titular reference to God in relation to
    the Son, so capitalization appropriately signals the personal divine title in
    English.
- source_word: οὐδὲ ἐμέ
  chosen: or me
  alternatives:
  - nor me
  lexicon: BDAG
  rationale: οὐδέ coordinates a second negated object. After 'have not known,' English
    reads most naturally as 'the Father or me,' while preserving the sense 'neither
    ... nor.'
