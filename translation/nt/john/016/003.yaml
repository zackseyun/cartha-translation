theological_decisions:
- issue: Rendering Johannine knowledge language regarding God and Jesus
  chosen_reading: they have not known the Father or me
  alternative_readings:
  - they did not know the Father or me
  - they have not come to know the Father or me
  rationale: The verse grounds persecution in relational ignorance of both the Father
    and Jesus. The translation preserves that theological claim without expanding
    it into a fuller doctrinal explanation. 'Known' retains the Johannine emphasis
    on relational knowledge rather than mere awareness.
  doctrine_reference: Translation philosophy §§1, 3, 6
