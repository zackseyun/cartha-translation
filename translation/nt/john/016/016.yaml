theological_decisions:
- issue: Whether to distinguish θεωρέω and ὁράω with different English verbs to suggest
    different modes of seeing
  chosen_reading: Render both with 'see' in the main text
  alternative_readings:
  - '''you no longer behold me ... you will see me'''
  - '''you no longer see me ... you will behold me'''
  rationale: The verse juxtaposes two common Greek verbs for seeing, but in Johannine
    usage their semantic overlap is substantial. Forcing a sharp theological distinction
    in English could imply more than the text warrants. Preserving the temporal contrast
    is more important than artificially differentiating the verbs.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
