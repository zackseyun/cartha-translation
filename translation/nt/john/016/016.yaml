id: JHN.16.16
reference: John 16:16
source:
  edition: SBLGNT
  text: Μικρὸν καὶ ⸀οὐκέτι θεωρεῖτέ με, καὶ πάλιν μικρὸν καὶ ὄψεσθέ ⸀με.
translation:
  text: A little while, and you no longer see me; and again a little while, and you
    will see me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two different verbs for ''see'' here: θεωρέω in the first clause
      and ὁράω in the second. The distinction may suggest nuance, but both are rendered
      ''see'' because the contrast in this verse is primarily temporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μικρὸν
  chosen: A little while
  alternatives:
  - A little time
  - A short time
  - Soon
  lexicon: BDAG
  rationale: The neuter singular adjective is used adverbially/idiomatically to denote
    a short span of time. 'A little while' is natural English and preserves the temporal
    brevity without over-paraphrasing.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  - no more
  lexicon: BDAG
  rationale: '''No longer'' is the standard idiomatic rendering for cessation from
    this point onward and fits the discourse smoothly.'
- source_word: θεωρεῖτέ
  chosen: see
  alternatives:
  - behold
  - observe
  - look at
  lexicon: BDAG
  rationale: Although θεωρέω can carry the nuance of observing or beholding, in this
    context the contrast with ὄψεσθε is not strong enough in English to justify awkward
    differentiation. 'See' is clear, idiomatic, and preserves the basic sense.
- source_word: πάλιν
  chosen: again
  alternatives:
  - then again
  - afterward
  lexicon: BDAG
  rationale: πάλιν marks a subsequent repetition/reversal in time. 'Again' is concise
    and preserves the sequence.
- source_word: ὄψεσθέ
  chosen: you will see
  alternatives:
  - you will behold
  - you will perceive
  lexicon: BDAG
  rationale: Future middle of ὁράω here naturally means future sight/seeing. Rendering
    it also as 'see' keeps the parallelism with θεωρεῖτέ and avoids importing a distinction
    the verse itself does not explicitly foreground.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforwardly rendered
    'me' in both clauses.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  - yet
  lexicon: BDAG
  rationale: The repeated καὶ structures the saying in balanced clauses. 'And' best
    preserves the formal parallelism and rhythm of the Greek.
