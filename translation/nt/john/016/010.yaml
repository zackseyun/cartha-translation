id: JHN.16.10
reference: John 16:10
source:
  edition: SBLGNT
  text: περὶ δικαιοσύνης δέ, ὅτι πρὸς τὸν ⸀πατέρα ὑπάγω καὶ οὐκέτι θεωρεῖτέ με·
translation:
  text: and concerning righteousness, because I am going to the Father and you no
    longer see me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek word can denote both righteousness and justice;
      here 'righteousness' is used in the main text because the context centers on
      Jesus' vindication in going to the Father.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - with regard to
  lexicon: BDAG
  rationale: In this sequence with repeated περὶ clauses (vv. 9–11), 'concerning'
    preserves the discourse structure and formal linkage better than the more casual
    'about.'
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: The doctrine guide lists δικαιοσύνη with default rendering 'righteousness,'
    while preserving 'justice' in a footnote where appropriate. In John 16:10 the
    sense is moral/right-standing vindication bound to Jesus' return to the Father,
    so 'righteousness' best fits the immediate context.
- source_word: δέ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks continuation to the next item in a list rather than strong
    contrast. 'And' gives natural English while preserving the additive progression
    from the prior verse.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: In this explanatory construction, ὅτι introduces the reason the Spirit
    will convict concerning righteousness. 'Because' makes the causal force explicit
    in idiomatic English.
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to my Father
  - to the Father
  lexicon: BDAG
  rationale: πρός with motion verb ὑπάγω is naturally rendered 'to.' The Greek text
    has 'the Father,' not 'my Father,' so the translation preserves the explicit wording
    while retaining the relational title.
- source_word: ὑπάγω
  chosen: am going
  alternatives:
  - go
  - am departing
  lexicon: BDAG
  rationale: The present tense here has futuristic force in context. 'Am going' is
    natural English and preserves the immediacy of Jesus' departure without overinterpreting
    it as merely 'departing.'
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  lexicon: BDAG
  rationale: '''No longer'' is the standard, clear rendering for cessation from this
    point onward.'
- source_word: θεωρεῖτέ
  chosen: see
  alternatives:
  - behold
  - observe
  lexicon: BDAG
  rationale: Though θεωρέω can carry the nuance of beholding or observing, in this
    context the straightforward sense is that the disciples will no longer visually
    perceive Jesus. 'See' is clear modern English without unnecessary archaism.
