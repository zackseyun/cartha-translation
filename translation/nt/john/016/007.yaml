id: JHN.16.7
reference: John 16:7
source:
  edition: SBLGNT
  text: ἀλλ’ ἐγὼ τὴν ἀλήθειαν λέγω ὑμῖν, συμφέρει ὑμῖν ἵνα ἐγὼ ἀπέλθω. ἐὰν ⸀γὰρ μὴ
    ἀπέλθω, ὁ παράκλητος ⸂οὐ μὴ ἔλθῃ⸃ πρὸς ὑμᾶς· ἐὰν δὲ πορευθῶ, πέμψω αὐτὸν πρὸς
    ὑμᾶς.
translation:
  text: 'But I am telling you the truth: it is better for you that I go away. For
    if I do not go away, the Advocate will certainly not come to you; but if I go,
    I will send him to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Helper,' 'Counselor,' 'Comforter'; Greek 'Paraclete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - Nevertheless
  lexicon: BDAG
  rationale: Marks contrast with the disciples' sorrow in the preceding context; 'But'
    is the most natural concise English adversative here.
- source_word: τὴν ἀλήθειαν λέγω ὑμῖν
  chosen: I am telling you the truth
  alternatives:
  - I tell you the truth
  - I speak the truth to you
  lexicon: BDAG
  rationale: Preserves the idiom of solemn truthful assertion. Progressive English
    ('am telling') fits natural modern style without changing meaning.
- source_word: συμφέρει ὑμῖν
  chosen: it is better for you
  alternatives:
  - it is to your advantage
  - it is beneficial for you
  lexicon: BDAG
  rationale: The verb conveys benefit or advantage. 'It is better for you' is idiomatic
    and readable, while still expressing comparative benefit in context.
- source_word: ἵνα ἐγὼ ἀπέλθω
  chosen: that I go away
  alternatives:
  - that I depart
  - that I leave
  lexicon: BDAG
  rationale: After συμφέρει, ἵνα with the subjunctive expresses the content/result
    of what is advantageous. 'Go away' is natural English and matches the repeated
    ἀπέλθω in the next clause.
- source_word: ἐὰν γὰρ μὴ ἀπέλθω
  chosen: For if I do not go away
  alternatives:
  - For unless I go away
  - For if I do not depart
  lexicon: BDAG
  rationale: Retains the conditional structure and verbal repetition from the prior
    clause. 'For' renders γάρ as explanatory.
- source_word: ὁ παράκλητος
  chosen: the Advocate
  alternatives:
  - the Helper
  - the Counselor
  - the Comforter
  - the Paraclete
  lexicon: BDAG
  rationale: παράκλητος is a theologically significant Johannine title with a range
    including advocate, helper, and counselor. 'Advocate' best preserves the personal
    and representative sense without mere transliteration, and is established in John
    14–16 and 1 John 2:1 contexts. Alternatives are preserved in a footnote because
    the semantic range is broader than any single English gloss.
- source_word: οὐ μὴ ἔλθῃ
  chosen: will certainly not come
  alternatives:
  - will by no means come
  - will never come
  lexicon: BDAG
  rationale: οὐ μὴ with the subjunctive is emphatic negation. 'Will certainly not
    come' communicates the force in clear modern English without archaic phrasing.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - to be with you
  - to you all
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward the disciples. 'To
    you' is the straightforward rendering.
- source_word: ἐὰν δὲ πορευθῶ
  chosen: but if I go
  alternatives:
  - but if I depart
  - but if I journey away
  lexicon: BDAG
  rationale: δέ marks contrast with the previous condition. Although πορεύομαι can
    be more literally 'go/journey,' in this context 'go' is the most natural English
    and avoids awkward overtranslation.
- source_word: πέμψω αὐτὸν
  chosen: I will send him
  alternatives:
  - I will send him forth
  lexicon: BDAG
  rationale: πέμπω is the ordinary verb 'send.' The masculine pronoun αὐτόν should
    be represented as 'him' because the Greek refers personally to the παράκλητος,
    not impersonally to a force.
