theological_decisions:
- issue: Rendering of παράκλητος in Johannine discourse
  chosen_reading: Advocate
  alternative_readings:
  - Helper
  - Counselor
  - Comforter
  - Paraclete
  rationale: The term denotes a personal agent who comes on Jesus' behalf. 'Advocate'
    best captures the representative/intercessory dimension while remaining readable
    modern English. Because no single English word exhausts the semantic range, alternatives
    are preserved in a footnote rather than flattened or transliterated without explanation.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6; preserve meaning
    from source text and document significant variance.'
- issue: Personal reference to the Holy Spirit/Paraclete
  chosen_reading: him
  alternative_readings:
  - it
  rationale: The Greek uses masculine grammatical forms with παράκλητος and presents
    the Paraclete as a personal sender-sent figure in Johannine theology. Rendering
    αὐτόν as 'him' reflects the source text's personal reference and avoids depersonalizing
    the referent.
  doctrine_reference: 'DOCTRINE.md: historic ecumenical orthodoxy affirmed; translation
    should not import doctrine beyond the text, but should reflect the text''s personal
    language accurately.'
