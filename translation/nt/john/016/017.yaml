theological_decisions:
- issue: Reference of Jesus' departure and return in the quoted saying
  chosen_reading: The translation preserves the disciples' uncertainty without specifying
    whether Jesus refers to his death/resurrection, ascension, post-resurrection appearances,
    or the coming of the Spirit.
  alternative_readings:
  - death and resurrection
  - ascension and spiritual presence
  - post-resurrection appearances
  rationale: The verse itself presents the disciples' confusion and does not resolve
    the referent. Per translation philosophy, theological tension should be preserved
    rather than interpreted in the main text.
  doctrine_reference: Translation philosophy §3
