id: JHN.16.17
reference: John 16:17
source:
  edition: SBLGNT
  text: εἶπαν οὖν ἐκ τῶν μαθητῶν αὐτοῦ πρὸς ἀλλήλους· Τί ἐστιν τοῦτο ὃ λέγει ἡμῖν·
    Μικρὸν καὶ οὐ θεωρεῖτέ με, καὶ πάλιν μικρὸν καὶ ὄψεσθέ με; καί· ⸀Ὅτι ὑπάγω πρὸς
    τὸν πατέρα;
translation:
  text: 'So some of his disciples said to one another, “What is this that he is telling
    us: ‘A little while, and you will not see me, and again a little while, and you
    will see me’? And, ‘Because I am going to the Father’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “That I am going to the Father.” The Greek conjunction can be understood
      either as introducing quoted content or with a causal sense (“because”).
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential/narrative continuation from the preceding saying.
    'So' is natural modern English and preserves the discourse flow without sounding
    overly formal.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: some of his disciples
  alternatives:
  - from among his disciples
  - some from his disciples
  lexicon: BDAG
  rationale: The partitive ἐκ indicates a subset of the disciples rather than the
    whole group. 'Some of his disciples' is idiomatic and preserves that nuance.
- source_word: πρὸς ἀλλήλους
  chosen: to one another
  alternatives:
  - among themselves
  - to each other
  lexicon: BDAG
  rationale: Reciprocal expression indicating mutual conversation. 'To one another'
    is a clear, standard rendering.
- source_word: Τί ἐστιν τοῦτο ὃ λέγει ἡμῖν
  chosen: What is this that he is telling us
  alternatives:
  - What does this mean that he is saying to us
  - What is this he says to us
  lexicon: BDAG
  rationale: Keeps the disciples' puzzled question close to the Greek structure. 'Is
    telling us' reflects the present λέγει in natural English.
- source_word: Μικρὸν
  chosen: A little while
  alternatives:
  - A little
  - A short time
  lexicon: BDAG
  rationale: Although literally 'a little,' in Johannine usage here it is temporal.
    'A little while' makes the implied time reference explicit in idiomatic English.
- source_word: θεωρεῖτέ
  chosen: see
  alternatives:
  - behold
  - observe
  lexicon: BDAG
  rationale: θεωρέω can mean 'see/watch/observe.' In this context, a simple visual/perceptual
    sense is intended. 'See' is natural and fits the parallel with ὄψεσθέ.
- source_word: ὄψεσθέ
  chosen: you will see
  alternatives:
  - you will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω. Rendering both θεωρεῖτε and ὄψεσθέ with 'see'
    preserves the rhetorical repetition in English, even though the Greek verbs differ.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense; 'again' is the most direct and idiomatic choice.
- source_word: Ὅτι ὑπάγω πρὸς τὸν πατέρα
  chosen: Because I am going to the Father
  alternatives:
  - That I am going to the Father
  lexicon: BDAG
  rationale: ὅτι here introduces another element of Jesus' saying that puzzles the
    disciples. In context, 'Because I am going to the Father' best reflects the content
    as previously spoken in v. 16 and preserves the causal force commonly carried
    by ὅτι. The alternative 'That I am going to the Father' is possible and worth
    preserving in a footnote because English can construe this clause either as quoted
    content or as causal explanation.
- source_word: πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text reads 'the Father,' not 'my Father.' The article should
    be preserved rather than harmonized to more explicit Johannine phrasing elsewhere.
