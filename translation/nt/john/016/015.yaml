theological_decisions:
- issue: Relation of the Father's possessions to the Son
  chosen_reading: Everything that the Father has is mine
  alternative_readings:
  - Everything the Father has belongs to me
  rationale: The verse makes a strong claim about the Son's possession of all that
    belongs to the Father. The translation preserves this high Christological force
    without adding later doctrinal terminology not present in the text. This aligns
    with Nicene orthodoxy while remaining text-driven.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Spirit's reception from the Son
  chosen_reading: he takes from what is mine
  alternative_readings:
  - he receives from what is mine
  rationale: The Greek allows either 'takes' or 'receives.' To preserve theological
    tension and avoid over-resolving the nuance of the Spirit's relation to the Son,
    the main text uses 'takes' while the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
