id: JHN.16.15
reference: John 16:15
source:
  edition: SBLGNT
  text: πάντα ὅσα ἔχει ὁ πατὴρ ἐμά ἐστιν· διὰ τοῦτο εἶπον ὅτι ἐκ τοῦ ἐμοῦ λαμβάνει
    καὶ ἀναγγελεῖ ὑμῖν.
translation:
  text: Everything that the Father has is mine. That is why I said that he takes from
    what is mine and will declare it to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "receives from what is mine."
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  chosen: Everything that
  alternatives:
  - All that
  - All things that
  lexicon: BDAG
  rationale: The combination πάντα ὅσα is an emphatic comprehensive expression meaning
    'everything/all that whatever.' 'Everything that' is natural modern English and
    preserves the totalizing force without sounding wooden.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Standard present-tense rendering of ἔχω. 'Has' is idiomatic and sufficient;
    'possesses' would overformalize the clause.
- source_word: ὁ πατήρ
  chosen: the Father
  lexicon: BDAG
  rationale: In Johannine context this is a titular reference to God as Father. Capitalization
    in English signals the personal/title usage rather than an indefinite familial
    reference.
- source_word: ἐμά
  chosen: is mine
  alternatives:
  - belongs to me
  - is my own
  lexicon: BDAG
  rationale: The predicate adjective/neuter plural functions possessively. 'Is mine'
    is the most direct and idiomatic equivalent, preserving the strong claim of shared
    possession.
- source_word: διὰ τοῦτο
  chosen: That is why
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: This discourse connective introduces explanation. 'That is why' is clear
    modern English and preserves the inferential force.
- source_word: εἶπον
  chosen: I said
  alternatives:
  - I have said
  lexicon: BDAG
  rationale: Aorist is best rendered as simple past here in English discourse. No
    contextual need for an English perfect.
- source_word: ἐκ τοῦ ἐμοῦ
  chosen: from what is mine
  alternatives:
  - from mine
  - from my own
  lexicon: BDAG
  rationale: The genitive with article and possessive adjective is somewhat elliptical
    in Greek. 'From what is mine' makes the ellipsis explicit in natural English while
    preserving the sense that what the Spirit receives belongs to the Son.
- source_word: λαμβάνει
  chosen: takes
  alternatives:
  - receives
  lexicon: BDAG
  rationale: λαμβάνω can mean either 'take' or 'receive.' In this context, with ἐκ
    plus source and in parallel with the Spirit's reception from the Son, 'takes'
    fits the flow of many English renderings while not implying seizure. The alternative
    'receives' is worth preserving because it can better highlight receptive dependence
    rather than appropriation.
- source_word: ἀναγγελεῖ
  chosen: will declare
  alternatives:
  - will announce
  - will disclose
  - will make known
  lexicon: BDAG
  rationale: Future tense should be preserved. 'Declare' captures the solemn revelatory
    sense of ἀναγγέλλω in Johannine discourse better than the more generic 'tell.'
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Straightforward dative indirect object addressed to the disciples.
