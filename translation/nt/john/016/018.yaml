id: JHN.16.18
reference: John 16:18
source:
  edition: SBLGNT
  text: ἔλεγον οὖν· ⸂Τί ἐστιν τοῦτο⸃ ὃ ⸀λέγει μικρόν; οὐκ οἴδαμεν τί λαλεῖ.
translation:
  text: So they were saying, “What is this that he says, ‘A little while’? We do not
    know what he is talking about.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “what he is saying.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech, not merely a single
    utterance. 'They were saying' preserves that aspect in natural English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference or continuation from the prior statement. 'So' is
    natural modern English and preserves the discourse connection without sounding
    overly formal.
- source_word: Τί ἐστιν τοῦτο
  chosen: What is this
  alternatives:
  - What does this mean
  - What is this thing
  lexicon: BDAG
  rationale: A direct, literal rendering of the question. 'What does this mean' is
    interpretive; 'What is this' better reflects the Greek wording and their puzzlement.
- source_word: ὃ λέγει μικρόν
  chosen: that he says, ‘A little while’
  alternatives:
  - that he means by 'a little while'
  - 'that he is saying: ''a little while'''
  lexicon: BDAG
  rationale: The relative clause refers to the expression Jesus used. Rendering it
    with direct quotation preserves the form of the disciples' question and the prominence
    of μικρόν as the puzzling phrase.
- source_word: μικρόν
  chosen: A little while
  alternatives:
  - a little
  - a short time
  lexicon: BDAG
  rationale: In Johannine context the adjective is used adverbially/elliptically for
    a short span of time. 'A little while' is idiomatic English and matches the repeated
    phrase in the surrounding context.
- source_word: οὐκ οἴδαμεν
  chosen: We do not know
  alternatives:
  - we don't know
  lexicon: BDAG
  rationale: A straightforward rendering of the negated perfect-with-present-sense
    verb οἶδα. The full form suits the register of the passage.
- source_word: τί λαλεῖ
  chosen: what he is talking about
  alternatives:
  - what he is saying
  - what he means
  lexicon: BDAG
  rationale: λαλέω here refers to what Jesus is speaking about. 'What he is talking
    about' communicates the sense clearly in modern English. 'What he is saying' is
    possible but would sound repetitive after the earlier λέγει; 'what he means' moves
    further toward interpretation.
