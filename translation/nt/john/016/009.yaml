theological_decisions:
- issue: Nature of the sin identified in the verse
  chosen_reading: The verse specifies unbelief in Jesus as the decisive instance or
    expression of 'sin' in this context.
  alternative_readings:
  - The verse refers more generally to human sinfulness, with unbelief as one example.
  rationale: The explanatory clause introduced by ὅτι directly grounds 'concerning
    sin' in the fact that 'they do not believe in me.' The translation should preserve
    that textual linkage without expanding it into a broader doctrinal formulation
    not stated here.
  doctrine_reference: Preserve theological tension rather than resolve it.
