id: JHN.16.9
reference: John 16:9
source:
  edition: SBLGNT
  text: περὶ ἁμαρτίας μέν, ὅτι οὐ πιστεύουσιν εἰς ἐμέ·
translation:
  text: concerning sin, because they do not believe in me;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that they do not believe in me.' The Greek conjunction can be rendered
      either way, but 'because' better reflects the explanatory force in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - with regard to
  lexicon: BDAG
  rationale: In this discourse structure, περί with the genitive introduces the topic
    about which the Spirit will convict. 'Concerning' is slightly more formal and
    fits the parallel structure with the following verses ('concerning righteousness...
    concerning judgment').
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - sinfulness
  lexicon: BDAG
  rationale: The singular abstract noun is best rendered 'sin,' preserving the category
    rather than specifying individual sins. This matches the explanatory clause that
    follows.
- source_word: μέν
  chosen: —
  alternatives:
  - indeed
  - on the one hand
  lexicon: BDAG
  rationale: μέν marks the first item in a series, paired implicitly with later elements
    in vv. 10–11. English normally does not require an explicit equivalent here; the
    discourse function is preserved by the punctuation and repeated 'concerning' structure
    across the passage.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι gives the reason or explanatory ground for the preceding ''concerning
    sin'': the sin in view is that they do not believe in Jesus. ''Because'' communicates
    this causal force more clearly than the more ambiguous ''that'' in contemporary
    English.'
- source_word: οὐ πιστεύουσιν
  chosen: they do not believe
  alternatives:
  - they are not believing
  - they do not have faith
  lexicon: BDAG
  rationale: Present active indicative plural states the ongoing reality of unbelief.
    'Believe' is the standard and most natural rendering for πιστεύω here.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: πιστεύω εἰς is the Johannine construction for personal trust directed
    toward Jesus. English idiom requires 'believe in me,' which preserves the relational
    and trust-oriented sense without awkward literalism.
