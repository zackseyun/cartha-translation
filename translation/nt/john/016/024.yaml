theological_decisions:
- issue: Meaning of prayer 'in my name'
  chosen_reading: Retain the literal phrase 'in my name' without interpretive expansion.
  alternative_readings:
  - on my behalf
  - under my authority
  - in union with me
  rationale: The phrase is theologically rich and broader than any single explanatory
    gloss. Preserving the literal wording maintains the text's theological tension
    and avoids importing a narrower doctrinal interpretation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
