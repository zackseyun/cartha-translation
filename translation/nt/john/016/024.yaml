id: JHN.16.24
reference: John 16:24
source:
  edition: SBLGNT
  text: ἕως ἄρτι οὐκ ᾐτήσατε οὐδὲν ἐν τῷ ὀνόματί μου· αἰτεῖτε καὶ λήμψεσθε, ἵνα ἡ
    χαρὰ ὑμῶν ᾖ πεπληρωμένη.
translation:
  text: Until now you have asked for nothing in my name. Ask, and you will receive,
    so that your joy may be made full.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Keep asking, and you will receive.' The present imperative Ask may imply
      ongoing or repeated action in context.
    reason: lexical_alternative
  - marker: b
    text: '''In my name'' can denote prayer made in relation to Jesus'' person, authority,
      and mission; the translation keeps the literal phrase rather than narrowing
      it to one explanation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so that your joy may be complete.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἄρτι
  chosen: Until now
  alternatives:
  - Up to now
  - Until this moment
  lexicon: BDAG
  rationale: The idiom marks the time up to the present moment. 'Until now' is natural
    modern English and preserves the temporal force without sounding wooden.
- source_word: ᾐτήσατε
  chosen: have asked for
  alternatives:
  - asked
  - requested
  lexicon: BDAG
  rationale: αἰτέω commonly means 'ask for, request,' often from one in a position
    to grant. 'Have asked for' reflects the aorist in idiomatic English within the
    'until now' construction and distinguishes the object requested from merely speaking
    a question.
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - anything
  lexicon: BDAG
  rationale: With the negation οὐκ, οὐδὲν yields the sense 'nothing/not anything.'
    'Nothing' is concise and idiomatic here.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on my behalf
  - under my authority
  lexicon: BDAG
  rationale: This is standard Johannine language for petition made in relation to
    Jesus' person and authority. The literal rendering 'in my name' is both transparent
    and theologically important; interpretive expansions are better left out of the
    main text.
- source_word: αἰτεῖτε
  chosen: Ask
  alternatives:
  - Keep asking
  - Request
  lexicon: BDAG
  rationale: The present imperative can carry iterative or general force. English
    imperative 'Ask' preserves the command naturally without over-specifying aspect;
    the possibility of ongoing sense is noted as an alternative.
- source_word: λήμψεσθε
  chosen: you will receive
  alternatives:
  - you will get
  lexicon: BDAG
  rationale: Future middle of λαμβάνω here is deponent in sense. 'Receive' fits prayer
    context better than the more colloquial 'get' and preserves the expected response
    to asking.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result. 'So that' is clear modern English and
    preserves the telic nuance without stiffness.
- source_word: ἡ χαρὰ ὑμῶν
  chosen: your joy
  alternatives:
  - the joy of you
  lexicon: BDAG
  rationale: Straightforward possessive construction; 'your joy' is the natural English
    equivalent.
- source_word: ᾖ πεπληρωμένη
  chosen: may be made full
  alternatives:
  - may be full
  - may be fulfilled
  - may be complete
  lexicon: BDAG
  rationale: The periphrastic perfect passive/substantival expression conveys a state
    of fullness brought about. 'May be made full' preserves both the resultant state
    and the passive nuance better than the flatter 'may be full.' 'May be complete'
    is possible but loses the fullness imagery common in Johannine diction.
