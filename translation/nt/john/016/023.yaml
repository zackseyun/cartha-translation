id: JHN.16.23
reference: John 16:23
source:
  edition: SBLGNT
  text: καὶ ἐν ἐκείνῃ τῇ ἡμέρᾳ ἐμὲ οὐκ ἐρωτήσετε οὐδέν· ἀμὴν ἀμὴν λέγω ὑμῖν, ⸂ἄν τι⸃
    αἰτήσητε τὸν πατέρα ⸂δώσει ὑμῖν ἐν τῷ ὀνόματί μου⸃.
translation:
  text: And in that day you will ask me nothing. Truly, truly, I say to you, if you
    ask the Father for anything in my name, he will give it to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Greek uses two different verbs for ''ask'' in this verse: first ἐρωτάω
      (''ask/question'') with reference to Jesus, then αἰτέω (''ask/request'') with
      reference to the Father.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'you will not ask me anything.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: in that day
  alternatives:
  - on that day
  lexicon: BDAG
  rationale: A standard temporal expression. 'In that day' preserves Johannine phrasing
    and eschatological resonance better than the slightly flatter 'on that day.'
- source_word: ἐρωτήσετε
  chosen: you will ask
  alternatives:
  - you will question
  - you will inquire of
  lexicon: BDAG
  rationale: 'The future of ἐρωτάω here is best rendered ''ask,'' but distinguished
    in rationale from αἰτέω later in the verse: ἐρωτάω often carries the sense of
    asking a person/questioning, while αἰτέω more specifically denotes requesting
    or petitioning. English cannot fully preserve the distinction in the main text
    without awkwardness, so it is documented and partially clarified by the object
    ''me'' and the following clause.'
- source_word: ἐμὲ οὐκ ἐρωτήσετε οὐδέν
  chosen: you will ask me nothing
  alternatives:
  - you will question me no longer
  - you will not ask me anything
  lexicon: BDAG
  rationale: This keeps the direct object 'me' explicit and preserves the absolute
    negation with οὐδέν. 'Ask me nothing' is concise and close to the Greek; 'question
    me no longer' is interpretive and may over-specify the sense.
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: '''Truly, truly'' is clear modern English and preserves the emphatic
    repetition characteristic of John''s Gospel without leaving the untranslated Hebrew
    loanword in the main text.'
- source_word: ἄν τι αἰτήσητε
  chosen: if you ask ... for anything
  alternatives:
  - whatever you ask
  - if you should ask anything
  lexicon: BDAG
  rationale: The construction expresses an indefinite/conditional request. 'If you
    ask ... for anything' is natural English and preserves the open-ended scope of
    τι with ἄν. 'Whatever you ask' is possible but can sound more absolute than the
    Greek syntax requires in English.
- source_word: αἰτήσητε
  chosen: ask
  alternatives:
  - request
  - petition
  lexicon: BDAG
  rationale: 'Rendered ''ask'' for natural English, but this verb differs from ἐρωτάω
    earlier: here the sense is petitionary asking directed to the Father. ''Request''
    is semantically precise but less idiomatic in this context.'
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text reads simply 'the Father,' not 'my Father.' The definite
    article with πατήρ in Johannine context naturally refers to the Father, and the
    translation should not import an additional possessive absent from the text.
- source_word: δώσει ὑμῖν
  chosen: he will give it to you
  alternatives:
  - he will give to you
  - he will give you what you ask
  lexicon: BDAG
  rationale: English idiom normally supplies an object, here implied from the request
    ('it'). This makes the sentence readable without materially expanding the sense.
    'He will give you what you ask' is more explicit but adds wording not directly
    present.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - in union with my name
  lexicon: BDAG
  rationale: This is the standard and theologically important Johannine expression.
    'In my name' preserves the source wording and its covenantal/representative force
    without over-interpreting the precise mechanism.
