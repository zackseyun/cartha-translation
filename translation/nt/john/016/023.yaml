theological_decisions:
- issue: Distinction between asking Jesus (ἐρωτάω) and asking the Father (αἰτέω)
  chosen_reading: The main text preserves both as 'ask' in idiomatic English while
    documenting the lexical distinction in the notes.
  alternative_readings:
  - Render the first clause as 'you will question me no longer' and the second as
    'if you request from the Father'
  rationale: The verse contrasts two kinds of asking, but forcing a sharper English
    distinction in the main text risks awkwardness or over-interpretation. The chosen
    rendering preserves readability while leaving the lexical nuance auditable.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception); §6 (readable modern English)
- issue: Scope of the promise about prayer 'in my name'
  chosen_reading: Translate the statement straightforwardly without adding doctrinal
    qualifiers in the main text.
  alternative_readings:
  - Paraphrase to limit the promise to requests aligned with Jesus' will
  rationale: While broader Johannine context informs interpretation, this verse itself
    states the promise directly. The translation should not import theological conditions
    not explicit in the wording here.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
