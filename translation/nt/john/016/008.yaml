theological_decisions:
- issue: Referent and force of ἐκεῖνος
  chosen_reading: The demonstrative refers to the Spirit/Paraclete and is rendered with preserved emphasis ('that one').
  alternative_readings:
  - A simple pronoun 'he' with the emphasis left implicit
  rationale: The immediate context identifies the coming figure as the Paraclete. Rendering the demonstrative emphatically reflects the Greek without importing additional doctrinal claims beyond the discourse context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table sets 'righteousness' as the default for δικαιοσύνη, while preserving 'justice' in a footnote where appropriate. In this Johannine context, 'righteousness' better matches the following explanation about Jesus going to the Father.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
revisions:
- timestamp: '2026-04-21T12:28:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/016/008.json
  category: awkward_english
  tier: 1
  from: And when he comes, that one
  to: And when that one comes, he
  rationale: The current rendering separates the temporal clause from the emphatic subject in a slightly awkward way, using an implied 'he' in the first clause and 'that one' in the second. While the intent to preserve the emphasis of ἐκεῖνος is correct, a more idiomatic English structure would be 'And when that one comes, he will convict...'. This places the emphatic subject within the temporal clause, creating a smoother flow while still giving it prominence.
