id: JHN.16.8
reference: John 16:8
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ἐκεῖνος ἐλέγξει τὸν κόσμον περὶ ἁμαρτίας καὶ περὶ δικαιοσύνης καὶ περὶ κρίσεως·
translation:
  text: And when that one comes, he will convict the world concerning sin and concerning righteousness and concerning judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he'; Greek has the emphatic demonstrative 'that one,' referring to the coming Paraclete.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: alternative_reading
  - marker: c
    text: Or 'And when he comes, that one'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλθὼν
  chosen: when he comes
  alternatives:
  - having come
  - after he comes
  lexicon: BDAG
  rationale: Aorist participle of attendant circumstance/temporal force. In idiomatic English, 'when he comes' best conveys the temporal sense without woodenness.
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - that one there
  lexicon: BDAG
  rationale: The demonstrative is emphatic in Greek. The main translation preserves some of that emphasis with 'that one' rather than reducing it to a bare pronoun, while still reading naturally enough in context. It refers back to the Paraclete in the immediate context.
- source_word: ἐλέγξει
  chosen: will convict
  alternatives:
  - will expose
  - will prove wrong
  - will reprove
  lexicon: BDAG
  rationale: ἐλέγχω here carries the sense of exposing guilt or showing someone to be in the wrong. 'Convict' best captures the moral-forensic force in relation to 'the world' and the following triad of sin, righteousness, and judgment.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the world-system
  - the people of the world
  lexicon: BDAG
  rationale: κόσμος in Johannine usage often denotes humanity in rebellion against God, but the standard rendering 'the world' preserves the breadth and theological resonance without over-interpreting.
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - with regard to
  lexicon: BDAG
  rationale: Repeated three times for rhetorical parallelism. 'Concerning' preserves the formal structure and explanatory force better than the looser 'about'.
- source_word: ἁμαρτίας
  chosen: sin
  lexicon: BDAG
  rationale: Standard rendering for ἁμαρτία. Singular is retained, matching the Greek and allowing the following verse to specify the particular sense.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per the doctrine table, the default rendering of δικαιοσύνη is 'righteousness,' with 'justice' preserved as an alternative where relevant. In John 16:8, 'righteousness' better fits the immediate Christological context developed in v. 10.
- source_word: κρίσεως
  chosen: judgment
  alternatives:
  - condemnation
  lexicon: BDAG
  rationale: κρίσις denotes judgment here in a forensic sense. 'Judgment' is broad enough to preserve the term's legal and eschatological force without narrowing it prematurely to the result of judgment.
