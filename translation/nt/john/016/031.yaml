id: JHN.16.31
reference: John 16:31
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτοῖς Ἰησοῦς· Ἄρτι πιστεύετε;
translation:
  text: Jesus answered them, “Do you now believe?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Now you believe.' The Greek may be read as a statement, though the
      context favors a rhetorical question.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - responded
  - replied
  lexicon: BDAG
  rationale: Standard narrative aorist of ἀποκρίνομαι; 'answered' is the most natural
    and conventional English rendering in dialogue contexts without adding nuance
    beyond the Greek.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Dative plural pronoun marking the indirect object of Jesus' response.
    English idiom normally incorporates this as 'answered them' rather than the more
    wooden 'answered to them.'
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Proper name transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: Ἄρτι
  chosen: now
  alternatives:
  - at this moment
  - just now
  lexicon: BDAG
  rationale: ἄρτι denotes present immediacy ('now,' 'at this moment'). 'Now' is concise,
    idiomatic, and preserves the temporal force in Jesus' pointed question.
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - have faith
  - are believing
  lexicon: BDAG
  rationale: Present active indicative, second plural, from πιστεύω. In Johannine
    usage 'believe' is the standard and most transparent rendering. 'Have faith' is
    possible but less direct here. The present indicative is best rendered simply
    in English in this rhetorical question.
