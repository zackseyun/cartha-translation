theological_decisions:
- issue: Force of the question Ἄρτι πιστεύετε;
  chosen_reading: 'Render as a straightforward rhetorical question: ''Do you now believe?'''
  alternative_readings:
  - '''Now you believe.'''
  - '''At last you believe?'''
  rationale: The Greek form can be heard either as a question or, less likely, as
    an ironic statement depending on punctuation and discourse context. Given the
    immediate following verse ('Behold, an hour is coming... you will be scattered'),
    the interrogative reading best preserves the tension and likely irony without
    overinterpreting it. English question form also matches the common editorial understanding
    of the clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
