theological_decisions:
- issue: Meaning of κόσμος in Johannine context
  chosen_reading: Rendered consistently as 'world' in both occurrences, allowing context
    to convey the hostile human order opposed to God without paraphrastic expansion.
  alternative_readings:
  - world system
  - this fallen world
  rationale: The verse contrasts peace 'in me' with tribulation 'in the world' and
    climaxes with Jesus' victory over 'the world.' A more interpretive rendering could
    narrow or overdefine John's polyvalent use of κόσμος. Preserving 'world' maintains
    theological tension and Johannine consistency.
  doctrine_reference: Translation philosophy §3, §5
- issue: Force of Jesus' perfect-tense statements
  chosen_reading: 'Both perfects are rendered with English present perfects: ''I have
    spoken'' and ''I have overcome.'''
  alternative_readings:
  - 'simple past: ''I spoke'' / ''I overcame'''
  rationale: The Greek perfects emphasize completed actions with continuing significance.
    Preserving this aspect is important both literarily and theologically, especially
    in Jesus' declaration of victory before the cross's completion in narrative time.
  doctrine_reference: Translation philosophy §1, §5
