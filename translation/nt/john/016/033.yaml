id: JHN.16.33
reference: John 16:33
source:
  edition: SBLGNT
  text: ταῦτα λελάληκα ὑμῖν ἵνα ἐν ἐμοὶ εἰρήνην ἔχητε· ἐν τῷ κόσμῳ θλῖψιν ἔχετε, ἀλλὰ
    θαρσεῖτε, ἐγὼ νενίκηκα τὸν κόσμον.
translation:
  text: I have spoken these things to you so that in me you may have peace. In the
    world you have tribulation, but take courage; I have overcome the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take heart.'
    reason: lexical_alternative
  - marker: b
    text: '''Tribulation'' may also be rendered ''trouble,'' ''affliction,'' or ''distress.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative, naturally rendered 'these things,' referring back
    to Jesus' preceding discourse rather than a singular summary statement.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I have told
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with present relevance. 'Have
    spoken' preserves both the verbal aspect and the connection to the discourse just
    completed. 'Spoken' also reflects λαλέω more directly than the more generic 'said.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is clear modern English and preserves the
    purposive force without sounding overly formal.
- source_word: ἐν ἐμοὶ
  chosen: in me
  alternatives:
  - in union with me
  - through me
  lexicon: BDAG
  rationale: The prepositional phrase is theologically significant and should be preserved
    literally. 'In me' maintains Johannine union language without interpretive expansion.
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering that fits both the immediate context of reassurance
    and the broader Johannine sense of wholeness and settled well-being in relation
    to Jesus.
- source_word: ἔχητε
  chosen: you may have
  alternatives:
  - you might have
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα is well represented by 'may have,' expressing
    intended ongoing possession of peace.
- source_word: ἐν τῷ κόσμῳ
  chosen: In the world
  alternatives:
  - In this world
  lexicon: BDAG
  rationale: κόσμος in John often denotes the human world-order in alienation from
    God. 'In the world' preserves the Greek wording and Johannine resonance without
    adding 'this,' which is interpretive.
- source_word: θλῖψιν
  chosen: tribulation
  alternatives:
  - trouble
  - affliction
  - distress
  lexicon: BDAG
  rationale: θλῖψις denotes pressure, affliction, or distress. 'Tribulation' preserves
    the weight of the term and its biblical resonance better than the lighter 'trouble,'
    while remaining understandable in context.
- source_word: ἔχετε
  chosen: you have
  alternatives:
  - you are having
  - you will have
  lexicon: BDAG
  rationale: Present indicative is best rendered straightforwardly as 'you have.'
    While the sense may be gnomic or ongoing, English simple present captures this
    adequately.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Simple adversative contrast between present distress and Jesus' exhortation/victory.
- source_word: θαρσεῖτε
  chosen: take courage
  alternatives:
  - be courageous
  - take heart
  lexicon: BDAG
  rationale: Imperative calling for confidence in the face of distress. 'Take courage'
    is clear modern English and avoids the slightly idiomatic or tradition-bound feel
    of 'take heart,' while preserving the exhortational force.
- source_word: νενίκηκα
  chosen: I have overcome
  alternatives:
  - I have conquered
  - I have been victorious over
  lexicon: BDAG
  rationale: Perfect tense again signals completed victory with abiding effect. 'Overcome'
    is idiomatic, faithful, and avoids the harsher military overtones of 'conquered'
    while still conveying decisive triumph.
- source_word: τὸν κόσμον
  chosen: the world
  alternatives:
  - the world order
  lexicon: BDAG
  rationale: Retains the key Johannine term κόσμος consistently. Although it can imply
    the fallen world-system opposed to God, the plain rendering 'the world' best preserves
    the text and lets context carry the fuller sense.
