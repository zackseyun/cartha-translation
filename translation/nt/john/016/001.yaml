theological_decisions:
- issue: Rendering of σκανδαλισθῆτε in discipleship/persecution context
  chosen_reading: fall away
  alternative_readings:
  - stumble
  - be caused to stumble
  - take offense
  rationale: The verse states Jesus' purpose in warning the disciples beforehand.
    Given the immediate context of persecution and expulsion (16:2), a rendering that
    communicates spiritual defection or collapse is stronger than a merely emotional
    'take offense.' To preserve the lexical image and interpretive openness, alternatives
    are retained in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
