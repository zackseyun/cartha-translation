id: JHN.16.1
reference: John 16:1
source:
  edition: SBLGNT
  text: Ταῦτα λελάληκα ὑμῖν ἵνα μὴ σκανδαλισθῆτε.
translation:
  text: I have spoken these things to you so that you may not fall away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stumble,' 'be caused to stumble,' or 'take offense.' The Greek verb
      can denote being tripped up into unbelief or defection.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to Jesus' preceding words;
    'these things' preserves the plural and Johannine discourse style better than
    the more compressed 'this'.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I told
  lexicon: BDAG
  rationale: Perfect active indicative of λαλέω. 'I have spoken' preserves the perfect
    aspect/resultative force and matches the discourse register; 'said' is possible
    but slightly less formal.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to all of you
  lexicon: BDAG
  rationale: Dative second person plural indirect object. Standard English 'to you'
    is sufficient; plurality is clear from context though not explicitly marked in
    English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    the purposive sense.
- source_word: μὴ
  chosen: not
  lexicon: BDAG
  rationale: Standard negation with the subjunctive in a purpose clause.
- source_word: σκανδαλισθῆτε
  chosen: fall away
  alternatives:
  - stumble
  - be caused to stumble
  - take offense
  lexicon: BDAG
  rationale: Aorist passive subjunctive of σκανδαλίζω. In this context of warning
    disciples about coming persecution, the sense is not mere momentary offense but
    being tripped up into apostasy or loss of faith. 'Fall away' best conveys the
    practical force in idiomatic English, while preserving the warning's seriousness.
