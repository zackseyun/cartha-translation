theological_decisions:
- issue: Rendering of ἄνθρωπος in a generic sense
  chosen_reading: a human being
  alternative_readings:
  - a man
  - a person
  rationale: The noun is grammatically masculine but semantically generic in this
    context. Following the doctrine's gender-accurate principle, the translation avoids
    implying a specifically male child while preserving the reference to human life.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
