id: JHN.16.21
reference: John 16:21
source:
  edition: SBLGNT
  text: ἡ γυνὴ ὅταν τίκτῃ λύπην ἔχει, ὅτι ἦλθεν ἡ ὥρα αὐτῆς· ὅταν δὲ γεννήσῃ τὸ παιδίον,
    οὐκέτι μνημονεύει τῆς θλίψεως διὰ τὴν χαρὰν ὅτι ἐγεννήθη ἄνθρωπος εἰς τὸν κόσμον.
translation:
  text: When a woman is giving birth, she has sorrow because her hour has come; but
    when she has given birth to the child, she no longer remembers the distress because
    of the joy that a human being has been born into the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man has been born into the world.' The Greek ἄνθρωπος can mean 'man'
      or more generally 'human being'; here it is generic, not specifically male.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: In this generic illustration about childbirth, 'woman' fits the plain
    sense better than 'wife.'
- source_word: ὅταν τίκτῃ
  chosen: when a woman is giving birth
  alternatives:
  - when she is in labor
  - when she bears
  lexicon: BDAG
  rationale: The present subjunctive with ὅταν expresses a general, contemporaneous
    situation. 'Is giving birth' preserves the ongoing process better than the more
    idiomatic but slightly interpretive 'is in labor.'
- source_word: λύπην ἔχει
  chosen: has sorrow
  alternatives:
  - has pain
  - is sorrowful
  lexicon: BDAG
  rationale: λύπη commonly denotes sorrow, grief, or distress rather than physical
    pain alone. 'Has sorrow' preserves the emotional dimension that matches the surrounding
    context of grief turning to joy.
- source_word: ἡ ὥρα αὐτῆς
  chosen: her hour
  alternatives:
  - her time
  lexicon: BDAG
  rationale: '''Hour'' is retained because John often uses ὥρα with thematic weight.
    Here it naturally refers to the appointed time of childbirth while preserving
    Johannine resonance.'
- source_word: γεννήσῃ τὸ παιδίον
  chosen: has given birth to the child
  alternatives:
  - gives birth to the child
  - delivers the child
  - bears the child
  lexicon: BDAG
  rationale: The aorist subjunctive after ὅταν points to the completed event. 'Has
    given birth to' captures that completion in natural English. παιδίον is rendered
    'child' as the ordinary sense.
- source_word: οὐκέτι μνημονεύει
  chosen: she no longer remembers
  alternatives:
  - she no longer thinks about
  - she no longer keeps in mind
  lexicon: BDAG
  rationale: A straightforward rendering of μνημονεύω. 'Remembers' is natural and
    sufficiently literal.
- source_word: τῆς θλίψεως
  chosen: the distress
  alternatives:
  - the affliction
  - the anguish
  - the tribulation
  lexicon: BDAG
  rationale: In this childbirth context, θλῖψις refers to the severe trouble/anguish
    of the ordeal. 'Distress' is idiomatic and avoids importing the more technical
    eschatological sense sometimes carried by 'tribulation.'
- source_word: διὰ τὴν χαράν
  chosen: because of the joy
  alternatives:
  - for joy
  - on account of the joy
  lexicon: BDAG
  rationale: διά with the accusative expresses cause. 'Because of the joy' is clear
    modern English.
- source_word: ὅτι ἐγεννήθη
  chosen: that ... has been born
  alternatives:
  - because ... was born
  lexicon: BDAG
  rationale: Here ὅτι is best taken as introducing the content/ground of the joy.
    'That ... has been born' reads naturally in English and preserves the explanatory
    force.
- source_word: ἄνθρωπος
  chosen: a human being
  alternatives:
  - a man
  - a person
  lexicon: BDAG
  rationale: ἄνθρωπος here is generic, referring to a new human life rather than a
    male child specifically. Per the gender-accurate philosophy, 'a human being' best
    matches the source intent without unnecessary male marking.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - into the world order
  lexicon: BDAG
  rationale: κόσμος here refers to the world into which the child is born, not a more
    developed theological sense requiring expansion.
