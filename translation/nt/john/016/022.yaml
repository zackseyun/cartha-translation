id: JHN.16.22
reference: John 16:22
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς οὖν ⸂νῦν μὲν λύπην⸃ ἔχετε· πάλιν δὲ ὄψομαι ὑμᾶς, καὶ χαρήσεται ὑμῶν
    ἡ καρδία, καὶ τὴν χαρὰν ὑμῶν οὐδεὶς ⸀αἴρει ἀφ’ ὑμῶν.
translation:
  text: So you also now have sorrow; but I will see you again, and your heart will
    rejoice, and no one takes your joy from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will see me again.' The Greek here more literally reads, 'I will
      see you again,' which may emphasize Jesus' initiative in returning to his disciples.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference/application from the childbirth analogy in the preceding
    context. 'So' is natural English and preserves the discourse connection without
    sounding wooden.
- source_word: νῦν μὲν λύπην ἔχετε
  chosen: now have sorrow
  alternatives:
  - now indeed have grief
  - for the present you have sorrow
  lexicon: BDAG
  rationale: λύπη denotes sorrow/grief/distress. 'Sorrow' fits the emotional tone
    and pairs well with the coming joy. The μέν is lightly represented by the contrastive
    structure completed by 'but' later rather than translated with an awkward 'indeed'.
- source_word: πάλιν δὲ
  chosen: but ... again
  alternatives:
  - and then again
  - yet again
  lexicon: BDAG
  rationale: The δέ sets the contrast with present sorrow, while πάλιν indicates renewed
    encounter. English idiom is best served by distributing the sense as 'but ...
    again.'
- source_word: ὄψομαι ὑμᾶς
  chosen: I will see you
  alternatives:
  - you will see me
  - I will appear to you
  lexicon: BDAG
  rationale: The Greek explicitly has first-person subject ('I will see') with 'you'
    as object. This should be preserved rather than assimilated to the nearby wording
    of 16:16 or to a more expected English formulation. It also subtly emphasizes
    Jesus' initiative in the reunion.
- source_word: χαρήσεται ὑμῶν ἡ καρδία
  chosen: your heart will rejoice
  alternatives:
  - your heart will be glad
  - your heart will have joy
  lexicon: BDAG
  rationale: Although formally 'the heart of you will rejoice,' idiomatic English
    is 'your heart will rejoice.' 'Rejoice' preserves the verbal force of χαρήσεται
    better than the stative 'be glad.'
- source_word: τὴν χαρὰν ὑμῶν
  chosen: your joy
  alternatives:
  - the joy you have
  lexicon: BDAG
  rationale: Straightforward possessive rendering of the noun phrase, maintaining
    lexical connection with χαρήσεται/χαρά.
- source_word: οὐδεὶς αἴρει ἀφ’ ὑμῶν
  chosen: no one takes ... from you
  alternatives:
  - no one will take ... from you
  - no one removes ... from you
  lexicon: BDAG
  rationale: 'αἴρει is present tense in the Greek. English can render this as a vivid
    present/general truth: ''no one takes.'' A future rendering is possible from context,
    but the present better preserves the form while still making good sense.'
