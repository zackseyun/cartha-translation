theological_decisions:
- issue: Subject and emphasis of the future reunion
  chosen_reading: I will see you again
  alternative_readings:
  - you will see me again
  rationale: The Greek text unambiguously reads first-person subject with second-person
    object. Retaining this avoids harmonizing to nearby passages and preserves the
    theological nuance that the risen Jesus actively comes to his disciples.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition) and §3 (preserve tension rather than resolve it)
