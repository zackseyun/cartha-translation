theological_decisions:
- issue: Rendering of ὥρα in Johannine context
  chosen_reading: An hour is coming
  alternative_readings:
  - A time is coming
  - The hour is coming
  rationale: John often uses ὥρα with theological weight. Here the translation preserves
    that resonance while avoiding over-specification not demanded by the anarthrous
    Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of παρρησίᾳ contrasted with ἐν παροιμίαις
  chosen_reading: plainly
  alternative_readings:
  - openly
  - with frankness
  rationale: The verse contrasts indirect/figurative speech with direct disclosure.
    Translating παρρησίᾳ as 'plainly' preserves the textual tension without importing
    a separate emphasis on public boldness.
  doctrine_reference: Translation philosophy §3, §6
