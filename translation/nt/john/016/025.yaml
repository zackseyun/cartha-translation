id: JHN.16.25
reference: John 16:25
source:
  edition: SBLGNT
  text: Ταῦτα ἐν παροιμίαις λελάληκα ὑμῖν· ⸀ἔρχεται ὥρα ὅτε οὐκέτι ἐν παροιμίαις λαλήσω
    ὑμῖν ἀλλὰ παρρησίᾳ περὶ τοῦ πατρὸς ⸀ἀπαγγελῶ ὑμῖν.
translation:
  text: I have spoken these things to you in figures of speech. An hour is coming
    when I will no longer speak to you in figures of speech, but will tell you plainly
    about the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parables' or 'veiled sayings'; the Greek word here refers to figurative
      or indirect speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'A time is coming.' John often uses 'hour' with theological significance.
    reason: lexical_alternative
  - marker: c
    text: Or 'openly' or 'with frankness'; here the sense is direct, non-figurative
      speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροιμίαις
  chosen: figures of speech
  alternatives:
  - parables
  - sayings
  - veiled language
  lexicon: BDAG
  rationale: In Johannine usage, παροιμία refers to figurative or indirect speech
    rather than the Synoptic-style parable proper. 'Figures of speech' communicates
    non-literal, somewhat veiled discourse in natural modern English without importing
    the more technical 'parable'.
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I have told
  lexicon: BDAG
  rationale: The perfect tense indicates completed speech with present relevance.
    'I have spoken' preserves both the verbal aspect and the connection with the repeated
    λαλέω later in the verse.
- source_word: ἔρχεται ὥρα
  chosen: An hour is coming
  alternatives:
  - The hour is coming
  - A time is coming
  lexicon: BDAG
  rationale: Although idiomatically this can mean 'a time is coming,' retaining 'hour'
    preserves Johannine diction and theological resonance while remaining understandable
    in English. The anarthrous construction supports 'an hour' rather than 'the hour'
    here.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  - no more
  lexicon: BDAG
  rationale: '''No longer'' is the most natural and precise modern English equivalent
    in this contrastive future statement.'
- source_word: λαλήσω
  chosen: I will speak
  alternatives:
  - I will say
  lexicon: BDAG
  rationale: Maintains lexical consistency with λελάληκα and preserves the speech-act
    emphasis of λαλέω.
- source_word: παρρησίᾳ
  chosen: plainly
  alternatives:
  - openly
  - with boldness
  - with frankness
  lexicon: BDAG
  rationale: Here the contrast is with figurative speech, so the sense is openness/clarity
    rather than courage. 'Plainly' best captures direct, unambiguous communication
    in context.
- source_word: ἀπαγγελῶ
  chosen: will tell
  alternatives:
  - will announce
  - will report
  - will declare
  lexicon: BDAG
  rationale: In context Jesus contrasts indirect speech with direct disclosure. 'Will
    tell' is natural English and fits the object clause 'about the Father' better
    than the more formal 'announce' or 'report.'
- source_word: περὶ τοῦ πατρὸς
  chosen: about the Father
  alternatives:
  - concerning the Father
  lexicon: BDAG
  rationale: '''About the Father'' is clear, natural English and preserves the relational
    and theological significance of πατήρ in Johannine context without unnecessary
    formalism.'
