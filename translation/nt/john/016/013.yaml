theological_decisions:
- issue: Pronoun reference for the Spirit
  chosen_reading: Use personal masculine pronouns ('he') for the Spirit
  alternative_readings:
  - Use 'it' to agree with the grammatical gender of πνεῦμα
  - Avoid pronouns by repeating 'the Spirit'
  rationale: The Greek text itself uses ἐκεῖνος ('that one/he'), a masculine demonstrative, in apposition to τὸ πνεῦμα. Rendering with 'he' reflects the source text's personal reference and avoids depersonalizing the Spirit.
  doctrine_reference: Affirmations (Nicene orthodoxy); Translation philosophy §1 original-language primacy
- issue: Rendering of ἐν τῇ ἀληθείᾳ πάσῃ
  chosen_reading: Translate as 'into all the truth' in the main text
  alternative_readings:
  - '''in all the truth'''
  rationale: The preposition ἐν is formally 'in,' but with ὁδηγέω the idiomatic English expression is 'guide into.' This does not add doctrine but conveys the directional sense of the guiding metaphor. The more formal alternative is preserved in a footnote because it is a meaningful translational option.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve tension rather than over-resolve'
revisions:
- timestamp: '2026-04-21T12:31:01Z'
  adjudicator: auto_apply_tier1
