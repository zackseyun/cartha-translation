  category: awkward_english
  tier: 1
  from: But when he comes, the Spirit of truth, he will guide you
  to: But when he, the Spirit of truth, comes, he will guide you
  rationale: The current word order, which follows the Greek structure closely, results in an awkward English construction. The appositive ('the Spirit of truth') is separated from its antecedent ('he') by the verb 'comes', and the pronoun 'he' is then repeated before the main verb 'will guide'. This can be slightly confusing for the reader. Rephrasing to 'But when he, the Spirit of truth, comes...' clarifies the appositional relationship and improves sentence flow without losing the emphasis on 'he' (ἐκεῖνος).
