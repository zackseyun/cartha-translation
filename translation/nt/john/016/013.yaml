id: JHN.16.13
reference: John 16:13
source:
  edition: SBLGNT
  text: ὅταν δὲ ἔλθῃ ἐκεῖνος, τὸ πνεῦμα τῆς ἀληθείας, ὁδηγήσει ὑμᾶς ⸂ἐν τῇ ἀληθείᾳ πάσῃ⸃, οὐ γὰρ λαλήσει ἀφ’ ἑαυτοῦ, ἀλλ’ ὅσα ⸀ἀκούσει λαλήσει, καὶ τὰ ἐρχόμενα ἀναγγελεῖ ὑμῖν.
translation:
  text: But when he, the Spirit of truth, comes, he will guide you into all the truth. For he will not speak from himself, but whatever he hears he will speak, and he will declare to you the things that are coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in all the truth.' The Greek reads 'in all the truth,' but English idiom with 'guide' commonly uses 'into.'
    reason: alternative_reading
  - marker: b
    text: Or 'he will not speak on his own.' Literally, 'he will not speak from himself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the things to come' / 'what is to come.'
    reason: lexical_alternative
  - marker: d
    text: Or 'But when he comes, the Spirit of truth, he will guide you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὅταν δὲ
  chosen: But when
  alternatives:
  - And when
  - When
  lexicon: BDAG
  rationale: ὅταν introduces a temporal clause with contingency ('when/whenever'), and δέ is best carried here as a mild contrastive/continuative 'but' linking with the prior context.
- source_word: ἔλθῃ ἐκεῖνος
  chosen: he comes
  alternatives:
  - that one comes
  - he has come
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν is naturally rendered in English as a present/future-oriented 'when he comes.' ἐκεῖνος is masculine despite the neuter πνεῦμα, reflecting personal reference; 'he' preserves the Greek discourse pattern better than 'it'.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  chosen: the Spirit of truth
  alternatives:
  - the spirit of truth
  - the Spirit who is truth
  lexicon: BDAG
  rationale: The phrase is a Johannine designation/title. Capitalized 'Spirit' reflects personal reference to the Holy Spirit in context. The genitive is best kept formally as 'of truth,' not paraphrased.
- source_word: ὁδηγήσει
  chosen: will guide
  alternatives:
  - will lead
  - will conduct
  lexicon: BDAG
  rationale: ὁδηγέω commonly means to guide/lead on a way. 'Guide' fits the metaphorical sense of directing disciples into truth and is idiomatic in English.
- source_word: ἐν τῇ ἀληθείᾳ πάσῃ
  chosen: into all the truth
  alternatives:
  - in all the truth
  - into all truth
  lexicon: BDAG
  rationale: Although ἐν commonly means 'in,' with ὁδηγέω the sense can be directional/resultative, and English idiom strongly favors 'guide ... into.' πάσῃ modifies ἀληθείᾳ as 'all the truth' rather than a distributive 'every truth.' The article supports a definite sense.
- source_word: οὐ γὰρ λαλήσει ἀφ’ ἑαυτοῦ
  chosen: For he will not speak from himself
  alternatives:
  - for he will not speak on his own
  - for he will not speak from his own authority
  lexicon: BDAG
  rationale: ἀφ’ ἑαυτοῦ is literally 'from himself.' This preserves the source wording and the relation of dependence within the passage. 'On his own' is a valid idiomatic alternative preserved in a footnote.
- source_word: ἀλλ’ ὅσα ἀκούσει λαλήσει
  chosen: but whatever he hears he will speak
  alternatives:
  - but he will speak whatever he hears
  - but whatever he has heard he will speak
  lexicon: BDAG
  rationale: The correlative contrast with the previous clause is maintained. Future ἀκούσει is rendered straightforwardly as 'he hears' in English sequence with future force in context; the clause emphasizes reception before proclamation.
- source_word: τὰ ἐρχόμενα
  chosen: the things that are coming
  alternatives:
  - the coming things
  - what is to come
  - the things to come
  lexicon: BDAG
  rationale: The present participle with article denotes forthcoming realities/events. 'The things that are coming' is transparent and natural, while 'what is to come' is a smoother but slightly more interpretive alternative.
- source_word: ἀναγγελεῖ ὑμῖν
  chosen: he will declare to you
  alternatives:
  - he will announce to you
  - he will report to you
  - he will make known to you
  lexicon: BDAG
  rationale: ἀναγγέλλω means to report, announce, or make known. 'Declare' preserves the solemn revelatory tone without becoming archaic.
