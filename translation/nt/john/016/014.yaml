theological_decisions:
- issue: Rendering the Spirit's relation to Jesus in 'ἐκ τοῦ ἐμοῦ λήμψεται'
  chosen_reading: from what is mine
  alternative_readings:
  - from me he will receive
  - he will receive from what belongs to me
  rationale: The phrase should not be narrowed into a technical doctrinal statement
    beyond the text. The chosen rendering preserves the broad Johannine sense that
    the Spirit communicates what belongs to the Son, without importing later theological
    formulations into the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
