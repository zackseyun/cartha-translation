id: JHN.16.14
reference: John 16:14
source:
  edition: SBLGNT
  text: ἐκεῖνος ἐμὲ δοξάσει, ὅτι ἐκ τοῦ ἐμοῦ λήμψεται καὶ ἀναγγελεῖ ὑμῖν.
translation:
  text: He will glorify me, because he will take from what is mine and declare it
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will receive from what is mine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - That one
  - That one himself
  lexicon: BDAG
  rationale: Refers back to the Paraclete/Spirit in the immediate context. English
    naturally uses the personal pronoun here. The demonstrative force is not strong
    enough in context to require 'that one' in the main text.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Straightforward accusative first-person pronoun as the object of 'will
    glorify.'
- source_word: δοξάσει
  chosen: will glorify
  alternatives:
  - will honor
  - will bring glory to
  lexicon: BDAG
  rationale: '''Glorify'' best preserves the theological weight of δοξάζω in Johannine
    usage, where revelation of Jesus'' divine significance is in view, not mere human
    honor.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason the Spirit will glorify Jesus. 'Because'
    makes the causal sense explicit in clear modern English.
- source_word: ἐκ τοῦ ἐμοῦ
  chosen: from what is mine
  alternatives:
  - from mine
  - from my own
  - from what belongs to me
  lexicon: BDAG
  rationale: 'The neuter article with possessive adjective is idiomatic: literally
    ''from the mine.'' ''From what is mine'' is natural English and preserves the
    sense of drawing from what belongs to Jesus without over-specifying whether this
    is teaching, authority, or revelation.'
- source_word: λήμψεται
  chosen: will take
  alternatives:
  - will receive
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive.' 'Take' fits well with the following
    'from what is mine' and preserves the active verbal connection. The middle form
    does not require a distinct English reflexive nuance here.
- source_word: ἀναγγελεῖ
  chosen: declare it
  alternatives:
  - announce it
  - report it
  - make it known
  lexicon: BDAG
  rationale: ἀναγγέλλω means to report or make known. 'Declare it' is suitably weighty
    and readable, and the supplied 'it' is required in English because the Greek object
    is implicit from the preceding phrase.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to you all
  lexicon: BDAG
  rationale: Dative second-person plural addressed to the disciples. Standard English
    'to you' is sufficient; plurality is clear from context though not marked in the
    main text.
