theological_decisions:
- issue: Identity and force of 'the ruler of this world'
  chosen_reading: Retain the expression without naming Satan explicitly in the main
    text.
  alternative_readings:
  - Interpretively render as 'Satan, the ruler of this world'
  rationale: The Johannine phrase is widely understood to refer to Satan (cf. John
    12:31; 14:30), but the verse itself uses the title rather than the proper name.
    To avoid importing more than the text states, the translation preserves the title
    in the main text while allowing the identification to be noted by cross-reference.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Nuance of κέκριται
  chosen_reading: Translate as 'has been judged' rather than 'has been condemned.'
  alternative_readings:
  - has been condemned
  - stands condemned
  rationale: The text states divine judgment on the ruler of this world; 'judged'
    preserves the lexical range of κρίνω without narrowing it to condemnation alone,
    though condemnation is an implied result in context.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; optimal equivalence.'
