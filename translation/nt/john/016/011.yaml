id: JHN.16.11
reference: John 16:11
source:
  edition: SBLGNT
  text: περὶ δὲ κρίσεως, ὅτι ὁ ἄρχων τοῦ κόσμου τούτου κέκριται.
translation:
  text: and concerning judgment, because the ruler of this world has been judged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prince of this world.'
    reason: lexical_alternative
  - marker: b
    text: Likely referring to Satan; compare John 12:31 and 14:30.
    reason: cross_reference
  - marker: c
    text: Or 'stands judged.' The Greek perfect tense emphasizes a completed judgment
      with continuing effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ κρίσεως
  chosen: and concerning judgment
  alternatives:
  - and about judgment
  - and in regard to judgment
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic ('concerning/about'). δέ
    here is connective, best carried by 'and.' κρίσις is rendered 'judgment,' the
    most direct and contextually fitting gloss in this sequence ('sin... righteousness...
    judgment').
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: In this explanatory clause, ὅτι gives the reason why the Spirit convicts
    concerning judgment. 'Because' makes the causal force explicit in natural English.
- source_word: ὁ ἄρχων
  chosen: the ruler
  alternatives:
  - the prince
  lexicon: BDAG
  rationale: ἄρχων denotes one who rules or exercises authority. 'Ruler' is clearer
    modern English than the traditional 'prince' and avoids implying royal sonship
    rather than authority.
- source_word: τοῦ κόσμου τούτου
  chosen: of this world
  alternatives:
  - of this age
  lexicon: BDAG
  rationale: κόσμος in John commonly refers to the world-order in rebellion against
    God. 'World' is the standard Johannine rendering and fits the immediate phrase
    exactly.
- source_word: κέκριται
  chosen: has been judged
  alternatives:
  - stands judged
  - has been condemned
  lexicon: BDAG
  rationale: 'κέκριται is perfect passive indicative of κρίνω. ''Has been judged''
    preserves both the passive voice and the perfect aspect/resultative force: the
    judgment has occurred and its effect stands. ''Condemned'' is interpretive and
    slightly narrower than the Greek.'
