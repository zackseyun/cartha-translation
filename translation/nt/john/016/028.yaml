theological_decisions:
- issue: Relation of Jesus to the Father in 'came out from the Father'
  chosen_reading: Render the clause straightforwardly as a claim of origin from the
    Father without expanding it into doctrinal paraphrase.
  alternative_readings:
  - Translate more weakly as merely 'came from God'
  - Translate more explicitly as preexistence/incarnation language beyond the wording
  rationale: The verse itself presents Jesus' origin from the Father and his return
    to the Father. In line with orthodox Christology, the translation should preserve
    this high christological claim, but it should not import explanatory doctrinal
    language beyond the Greek wording.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
