id: JHN.16.28
reference: John 16:28
source:
  edition: SBLGNT
  text: ἐξῆλθον ⸀ἐκ τοῦ πατρὸς καὶ ἐλήλυθα εἰς τὸν κόσμον· πάλιν ἀφίημι τὸν κόσμον
    καὶ πορεύομαι πρὸς τὸν πατέρα.
translation:
  text: I came out from the Father and have come into the world. Again, I am leaving
    the world and going to the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I came forth from the Father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι. 'Came out' preserves the movement from the Father
    while sounding natural in English. 'Came forth' is possible but more archaic;
    'went out' weakens the speaker-oriented perspective.
- source_word: ἐκ τοῦ πατρὸς
  chosen: from the Father
  alternatives:
  - out from the Father
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the Father' is idiomatic and preserves
    the theological claim of origin; the preceding 'came out' already carries the
    fuller force of emergence.
- source_word: ἐλήλυθα
  chosen: have come
  alternatives:
  - came
  lexicon: BDAG
  rationale: 'Perfect of ἔρχομαι. ''Have come'' preserves the perfect aspect: Jesus''
    coming into the world is a completed action with present relevance.'
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - to the world
  lexicon: BDAG
  rationale: εἰς normally indicates movement into. 'Into the world' best reflects
    entry/incarnation language in Johannine usage.
- source_word: πάλιν
  chosen: Again
  alternatives:
  - and again
  - once more
  lexicon: BDAG
  rationale: Placed at the start of the second clause to mirror Greek emphasis and
    signal the next movement in sequence.
- source_word: ἀφίημι
  chosen: I am leaving
  alternatives:
  - I leave
  - I am departing from
  lexicon: BDAG
  rationale: Present tense used for imminent action. 'I am leaving' communicates the
    present/imminent sense more naturally than the bare English present 'I leave.'
- source_word: τὸν κόσμον
  chosen: the world
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the human world/order into which the
    Son came. 'The world' is the standard and contextually sufficient rendering here.
- source_word: πορεύομαι
  chosen: going
  alternatives:
  - I am going
  - departing
  lexicon: BDAG
  rationale: Present middle/passive deponent. 'Going' after 'I am leaving' yields
    smooth English while preserving the sense of movement toward the Father.
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to the presence of the Father
  - toward the Father
  lexicon: BDAG
  rationale: πρός with accusative indicates direction toward. 'To the Father' is concise
    and idiomatic; 'toward' is less natural, and 'to the presence of' adds interpretive
    material not explicit in the text.
