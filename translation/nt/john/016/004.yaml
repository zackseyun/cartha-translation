theological_decisions:
- issue: Referent of αὐτῶν in 'their hour' and again after μνημονεύητε
  chosen_reading: Rendered the first αὐτῶν as part of 'their hour' and understood
    the second αὐτῶν as resumptive/object-related, expressed idiomatically in English
    as 'that I told you them' simplified to natural English sense.
  alternative_readings:
  - Some manuscripts/readings vary in the placement or presence of αὐτῶν, yielding
    translations closer to 'when their hour comes, you may remember them' or simply
    'you may remember that I told you.'
  rationale: The SBLGNT text includes both occurrences. English cannot reproduce both
    pronouns woodenly without awkwardness. The main text preserves the first explicitly
    and conveys the second through the remembered content. A footnote preserves the
    more literal alternative.
  doctrine_reference: Translation philosophy §3, preserve theological/interpretive
    tension rather than resolve it silently.
