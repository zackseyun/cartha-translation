id: JHN.16.4
reference: John 16:4
source:
  edition: SBLGNT
  text: ἀλλὰ ταῦτα λελάληκα ὑμῖν ἵνα ὅταν ἔλθῃ ἡ ὥρα ⸀αὐτῶν μνημονεύητε ⸁αὐτῶν ὅτι
    ἐγὼ εἶπον ὑμῖν. Ταῦτα δὲ ὑμῖν ἐξ ἀρχῆς οὐκ εἶπον, ὅτι μεθ’ ὑμῶν ἤμην.
translation:
  text: But I have spoken these things to you so that when their hour comes, you may
    remember that I told you them. But I did not tell you these things from the beginning,
    because I was with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when their hour comes, you may remember them, that
      I told you.' The Greek includes two occurrences of 'them/their' (αὐτῶν), which
      are difficult to represent smoothly in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: λελάληκα
  chosen: I have spoken
  alternatives:
  - I have said
  - I have told
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with continuing relevance; 'have
    spoken' preserves both the verbal aspect and the connection to Jesus' prior discourse.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: Plural demonstrative refers back to the warnings Jesus has just given;
    'these things' is natural and sufficiently formal.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose; 'so that' is idiomatic modern English while preserving
    the purposive force.
- source_word: ὅταν ἔλθῃ ἡ ὥρα αὐτῶν
  chosen: when their hour comes
  alternatives:
  - when their time comes
  - when the hour of them comes
  lexicon: BDAG
  rationale: ὅταν with aorist subjunctive marks a future contingency. ὥρα in John
    often carries the sense of an appointed time. The genitive αὐτῶν most naturally
    refers to the hostile events/persons just mentioned; 'their hour' preserves the
    Greek wording without over-interpreting.
- source_word: μνημονεύητε
  chosen: you may remember
  alternatives:
  - you may recall
  - you may keep in mind
  lexicon: BDAG
  rationale: Present subjunctive after ἵνα expresses intended result; 'remember' is
    the standard and clearest rendering.
- source_word: ὅτι ἐγὼ εἶπον ὑμῖν
  chosen: that I told you
  alternatives:
  - that I said to you
  - that I spoke to you
  lexicon: BDAG
  rationale: After 'remember,' English idiom prefers 'that I told you.' This preserves
    the content clause introduced by ὅτι.
- source_word: Ταῦτα δὲ ὑμῖν ἐξ ἀρχῆς οὐκ εἶπον
  chosen: But I did not tell you these things from the beginning
  alternatives:
  - Now I did not say these things to you from the beginning
  - But I did not speak these things to you at first
  lexicon: BDAG
  rationale: ἐξ ἀρχῆς is best rendered 'from the beginning.' 'Tell' fits the communicative
    context and reads naturally in English.
- source_word: μεθ’ ὑμῶν ἤμην
  chosen: I was with you
  alternatives:
  - I was among you
  lexicon: BDAG
  rationale: Straightforward locative-relational expression; 'with you' is the most
    direct rendering.
