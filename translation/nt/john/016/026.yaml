id: JHN.16.26
reference: John 16:26
source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ἡμέρᾳ ἐν τῷ ὀνόματί μου αἰτήσεσθε, καὶ οὐ λέγω ὑμῖν ὅτι ἐγὼ ἐρωτήσω
    τὸν πατέρα περὶ ὑμῶν·
translation:
  text: On that day you will ask in my name, and I am not saying to you that I will
    ask the Father concerning you;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In that day.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek uses two different verbs for ''ask'' in this verse: αἰτέω for
      the disciples'' asking and ἐρωτάω for Jesus'' asking of the Father.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for you' / 'on your behalf.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: On that day
  alternatives:
  - In that day
  lexicon: BDAG
  rationale: The prepositional phrase is temporal. 'On that day' is idiomatic modern
    English while preserving the demonstrative emphasis of ἐκείνῃ.
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - under my name
  - by my authority
  lexicon: BDAG
  rationale: This is standard Johannine idiom for prayer made in relation to Jesus'
    person and authority. 'In my name' preserves the theological and intertextual
    force without over-interpreting it.
- source_word: αἰτήσεσθε
  chosen: you will ask
  alternatives:
  - you will request
  lexicon: BDAG
  rationale: Future middle indicative, second plural. 'Ask' is the natural English
    equivalent in prayer/request contexts and fits the Johannine distinction from
    ἐρωτάω later in the verse.
- source_word: οὐ λέγω ὑμῖν
  chosen: I am not saying to you
  alternatives:
  - I do not say to you
  - I am not telling you
  lexicon: BDAG
  rationale: Present tense retained with a natural English progressive nuance. This
    avoids sounding stilted while preserving the immediacy of Jesus' statement.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what Jesus is not saying, not a causal
    clause.
- source_word: ἐρωτήσω
  chosen: I will ask
  alternatives:
  - I will request
  - I will petition
  lexicon: BDAG
  rationale: Future active indicative of ἐρωτάω. Rendering it also as 'ask' preserves
    the close lexical relation while English context still allows the distinction
    from αἰτέω to be discussed in notes rather than forced into awkward wording.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text has the article with πατέρα, not an explicit possessive.
    'The Father' is the direct and theologically important Johannine form.
- source_word: περὶ ὑμῶν
  chosen: concerning you
  alternatives:
  - for you
  - about you
  - on your behalf
  lexicon: BDAG
  rationale: περί with genitive can mean 'concerning' or, in context, imply intercession
    on behalf of someone. 'Concerning you' stays closest to the Greek while allowing
    the intercessory sense to remain implicit rather than expanded.
