theological_decisions:
- issue: Whether Jesus denies any future intercessory role or only declines to frame
    disciples' access to the Father as dependent on his asking in this context
  chosen_reading: The translation preserves the wording without implying that Jesus
    never intercedes, rendering the clause straightforwardly as a statement about
    what he is not saying here.
  alternative_readings:
  - A stronger paraphrase suggesting Jesus will not intercede for them at all
  - A more interpretive rendering emphasizing direct access to the Father apart from
    any mediation
  rationale: The immediate context stresses the disciples' direct asking of the Father
    in Jesus' name, but other Johannine and NT texts speak of Jesus' ongoing advocacy/intercession.
    A minimally interpretive rendering preserves the tension rather than resolving
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
