theological_decisions:
- issue: Identity of 'the one who sent me'
  chosen_reading: Render generically as 'the one who sent me' without explicitly adding
    'the Father.'
  alternative_readings:
  - to the Father who sent me
  rationale: The immediate Greek uses an articular participle and does not explicitly
    name the Father. Since the referent is clear in Johannine theology but unstated
    in this clause, the translation preserves the wording of the source rather than
    importing an explicit doctrinal identification into the main text.
  doctrine_reference: Translation philosophy §1, §3
