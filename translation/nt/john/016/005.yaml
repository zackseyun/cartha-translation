id: JHN.16.5
reference: John 16:5
source:
  edition: SBLGNT
  text: νῦν δὲ ὑπάγω πρὸς τὸν πέμψαντά με καὶ οὐδεὶς ἐξ ὑμῶν ἐρωτᾷ με· Ποῦ ὑπάγεις;
translation:
  text: But now I am going to the one who sent me, and none of you asks me, ‘Where
    are you going?’
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - And now
  - Now, however
  lexicon: BDAG
  rationale: Retains the discourse contrast marked by δέ while sounding natural in
    English. 'But now' reflects a transition from the previous discussion to Jesus'
    present statement.
- source_word: ὑπάγω
  chosen: I am going
  alternatives:
  - I go
  - I am departing
  lexicon: BDAG
  rationale: Present tense with movement sense in Johannine context is best rendered
    as a progressive/futuristic present in English. 'I am going' is natural and preserves
    the directional sense without overinterpreting it as merely 'departing'.
- source_word: πρὸς τὸν πέμψαντά με
  chosen: to the one who sent me
  alternatives:
  - to him who sent me
  - to my sender
  lexicon: BDAG
  rationale: The articular participle is rendered idiomatically as 'the one who sent
    me.' This preserves the personal reference and the relational emphasis without
    unnecessarily specifying 'Father,' which the Greek does not state explicitly here.
- source_word: πέμψαντά
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: '''Sent'' is the standard and contextually appropriate rendering for
    πέμπω in John, where mission language is prominent. ''Commissioned'' is possible
    but too interpretive for this verse.'
- source_word: οὐδεὶς ἐξ ὑμῶν
  chosen: none of you
  alternatives:
  - no one among you
  lexicon: BDAG
  rationale: This is a direct and natural rendering of the partitive expression, preserving
    the emphatic negation.
- source_word: ἐρωτᾷ με
  chosen: asks me
  alternatives:
  - questions me
  lexicon: BDAG
  rationale: In this context ἐρωτάω means to ask a question, not to request in a more
    formal sense. 'Asks me' is the clearest modern English equivalent.
- source_word: Ποῦ ὑπάγεις;
  chosen: Where are you going?
  alternatives:
  - Where do you go?
  - Where are you departing to?
  lexicon: BDAG
  rationale: Uses natural English for the direct question and matches the movement
    sense of ὑπάγω. The progressive form fits idiomatic English better than a simple
    present here.
