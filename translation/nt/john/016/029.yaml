theological_decisions:
- issue: Meaning of παρρησία in contrast with παροιμία
  chosen_reading: Jesus is being described as speaking openly/plainly rather than
    in figurative or indirect language.
  alternative_readings:
  - Jesus is speaking boldly/frankly
  rationale: The immediate contrast in the verse is between ἐν παρρησίᾳ and παροιμίαν
    οὐδεμίαν, which favors openness/plainness of expression over the broader notion
    of courage or boldness. This is a lexical-contextual decision, not a doctrinal
    one, and it preserves the discourse contrast without importing extra theological
    claims.
  doctrine_reference: Translation philosophy §1, §3, §6
