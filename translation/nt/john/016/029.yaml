id: JHN.16.29
reference: John 16:29
source:
  edition: SBLGNT
  text: ⸀Λέγουσιν οἱ μαθηταὶ αὐτοῦ· Ἴδε νῦν ⸀ἐν παρρησίᾳ λαλεῖς, καὶ παροιμίαν οὐδεμίαν
    λέγεις.
translation:
  text: His disciples said, “Look, now you are speaking openly and are not using any
    figure of speech.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “plainly.” The Greek expression can mean speaking openly, plainly, or
      with frankness.
    reason: lexical_alternative
  - marker: b
    text: Or “proverb,” “parable,” or “veiled saying.” Here it refers to figurative
      or indirect speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγουσιν
  chosen: said
  alternatives:
  - are saying
  - say
  lexicon: BDAG
  rationale: Rendered as simple past narrative English ('said') rather than a historical
    present ('say/are saying') for natural modern style while preserving the discourse
    function.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: His disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the possessive phrase, preserving the
    referent and relationship.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: An attention-getting interjection. 'Look' is natural modern English;
    'Behold' is too archaic, and 'See' is possible but less idiomatic here.
- source_word: νῦν
  chosen: now
  alternatives:
  - at this point
  lexicon: BDAG
  rationale: Direct temporal adverb marking the disciples' perception of a change
    in Jesus' manner of speaking.
- source_word: ἐν παρρησίᾳ
  chosen: openly
  alternatives:
  - plainly
  - with boldness
  - with frankness
  lexicon: BDAG
  rationale: In Johannine context, παρρησία contrasts with indirect or figurative
    speech and denotes open/plain speech. 'Openly' captures the adverbial force well.
    'Plainly' is a close alternative worth preserving.
- source_word: λαλεῖς
  chosen: are speaking
  alternatives:
  - speak
  lexicon: BDAG
  rationale: 'Present tense rendered progressively in English to match the immediate
    discourse situation: the disciples comment on Jesus'' current manner of speaking.'
- source_word: παροιμίαν
  chosen: figure of speech
  alternatives:
  - proverb
  - parable
  - veiled saying
  lexicon: BDAG
  rationale: In John, παροιμία often refers to figurative or indirect speech rather
    than a compact wisdom proverb. 'Figure of speech' best fits the contrast with
    speaking openly.
- source_word: οὐδεμίαν
  chosen: any
  alternatives:
  - 'no'
  lexicon: BDAG
  rationale: With the singular object in English, 'not using any figure of speech'
    is the most natural equivalent of the emphatic negation.
- source_word: λέγεις
  chosen: are not using
  alternatives:
  - are saying
  - speak
  lexicon: BDAG
  rationale: Although λέγω is literally 'say,' English idiom with 'figure of speech'
    prefers 'use.' This preserves the sense without wooden phrasing such as 'say no
    figure of speech.'
