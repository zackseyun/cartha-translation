theological_decisions:
- issue: Johannine use of κόσμος
  chosen_reading: Rendered as 'the world' without interpretive expansion.
  alternative_readings:
  - the unbelieving world
  - the world-system
  rationale: The term in John often carries a negative moral sense, but the verse
    itself does not explicitly define it beyond the contrasting group that rejoices
    at the disciples' sorrow. To preserve theological tension and avoid importing
    commentary into the text, the main text keeps the broader Johannine term 'the
    world.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
