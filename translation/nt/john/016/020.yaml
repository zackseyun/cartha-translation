id: JHN.16.20
reference: John 16:20
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι κλαύσετε καὶ θρηνήσετε ὑμεῖς, ὁ δὲ κόσμος χαρήσεται·
    ⸀ὑμεῖς λυπηθήσεσθε, ἀλλ’ ἡ λύπη ὑμῶν εἰς χαρὰν γενήσεται.
translation:
  text: Truly, truly, I say to you, you will weep and mourn, but the world will rejoice;
    you will be grieved, but your grief will become joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your sorrow will turn into joy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most certainly
  lexicon: BDAG
  rationale: Retains the solemn emphatic repetition in a natural but still transparent
    English form. 'Amen, amen' is more formally literal but less idiomatic in running
    English; 'Truly, truly' preserves the discourse force without paraphrase.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close rendering of the Greek wording that preserves the direct address
    formula. 'I tell you' is idiomatic, but 'I say to you' better reflects the repeated
    Johannine expression.
- source_word: κλαύσετε
  chosen: you will weep
  alternatives:
  - you will cry
  lexicon: BDAG
  rationale: '''Weep'' better conveys audible sorrow and matches the elevated but
    readable tone of the verse.'
- source_word: θρηνήσετε
  chosen: mourn
  alternatives:
  - lament
  lexicon: BDAG
  rationale: Distinguishes this verb from κλαύσετε rather than flattening both into
    near-synonyms. 'Mourn' communicates grief expression clearly; 'lament' is possible
    but slightly less natural for contemporary readers.
- source_word: ὁ δὲ κόσμος
  chosen: but the world
  alternatives:
  - while the world
  lexicon: BDAG
  rationale: κόσμος here refers to the world in its collective human order opposed
    to Jesus and his disciples, a standard Johannine usage. 'But the world' preserves
    the contrast marked by δέ without overexplaining.
- source_word: χαρήσεται
  chosen: will rejoice
  alternatives:
  - will be glad
  lexicon: BDAG
  rationale: '''Rejoice'' matches the stronger emotional contrast with the disciples''
    sorrow and anticipates the later noun χαρά (''joy'').'
- source_word: λυπηθήσεσθε
  chosen: you will be grieved
  alternatives:
  - you will be sorrowful
  - you will be distressed
  lexicon: BDAG
  rationale: The passive/future form is well represented by 'be grieved.' This keeps
    a verbal distinction from the noun λύπη later in the clause while remaining natural
    English.
- source_word: ἡ λύπη ὑμῶν
  chosen: your grief
  alternatives:
  - your sorrow
  lexicon: BDAG
  rationale: Chosen for consistency with 'be grieved' in the preceding clause and
    to preserve the lexical connection between λυπηθήσεσθε and λύπη. 'Sorrow' is also
    valid but would weaken that connection in English.
- source_word: εἰς χαρὰν γενήσεται
  chosen: will become joy
  alternatives:
  - will turn into joy
  - will become rejoicing
  lexicon: BDAG
  rationale: Represents the movement expressed by εἰς plus γενήσεται straightforwardly.
    'Will become joy' is slightly more formal than 'turn into joy' and keeps closer
    to the Greek construction.
