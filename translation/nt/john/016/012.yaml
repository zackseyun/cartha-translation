id: JHN.16.12
reference: John 16:12
source:
  edition: SBLGNT
  text: Ἔτι πολλὰ ἔχω ⸂ὑμῖν λέγειν⸃, ἀλλ’ οὐ δύνασθε βαστάζειν ἄρτι·
translation:
  text: I still have many things to say to you, but you are not able to bear them
    now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you cannot bear it now' or 'you cannot endure them now.' The Greek verb
      can suggest carrying, bearing, or enduring.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι
  chosen: still
  alternatives:
  - yet
  - more
  lexicon: BDAG
  rationale: 'Conveys continuation from the present moment: Jesus has additional teaching
    remaining. ''Still'' is natural modern English and fits the discourse flow better
    than the slightly more formal ''yet''.'
- source_word: πολλὰ
  chosen: many things
  alternatives:
  - much
  - many
  lexicon: BDAG
  rationale: The neuter plural adjective functions substantivally, so 'many things'
    makes the implied object explicit in idiomatic English.
- source_word: ἔχω
  chosen: have
  alternatives:
  - possess
  lexicon: BDAG
  rationale: In the idiom ἔχω + infinitive, it expresses having something remaining
    or pending to do/say. 'Have' preserves the Greek structure naturally in English.
- source_word: ὑμῖν λέγειν
  chosen: to say to you
  alternatives:
  - to tell you
  - to speak to you
  lexicon: BDAG
  rationale: λέγειν is broad ('say/speak'), and with dative ὑμῖν the most direct rendering
    is 'to say to you.' 'Tell you' is possible but slightly more interpretive.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - however
  lexicon: BDAG
  rationale: Standard adversative conjunction; 'but' is the most straightforward and
    readable rendering.
- source_word: οὐ δύνασθε
  chosen: you are not able
  alternatives:
  - you cannot
  lexicon: BDAG
  rationale: This preserves the explicit sense of ability in δύνασθε. 'Cannot' is
    idiomatic, but 'are not able' more transparently reflects the Greek verbal idea.
- source_word: βαστάζειν
  chosen: to bear them
  alternatives:
  - to carry them
  - to endure them
  - to handle them
  lexicon: BDAG
  rationale: In context, βαστάζειν refers metaphorically to carrying or bearing the
    weight of further revelation. 'Bear them' is idiomatic English and preserves the
    metaphorical load-bearing sense better than the flatter 'handle'.
- source_word: ἄρτι
  chosen: now
  alternatives:
  - at present
  - right now
  lexicon: BDAG
  rationale: Marks the present time in contrast with what will follow in subsequent
    verses. 'Now' is concise and natural.
