theological_decisions:
- issue: Meaning of βαστάζειν in relation to the disciples' present incapacity
  chosen_reading: The disciples are presently unable to bear the weight of further
    teaching/revelation.
  alternative_readings:
  - The disciples are not able to understand it fully now
  - The disciples are not able to endure hearing it now
  rationale: The verb βαστάζω can denote bearing, carrying, or enduring. In this context,
    the image likely includes both cognitive and spiritual capacity without reducing
    it to mere intellectual comprehension. 'Bear them' preserves that theological
    tension rather than resolving it into only 'understand' or only 'endure.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
