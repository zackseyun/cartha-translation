id: JHN.16.32
reference: John 16:32
source:
  edition: SBLGNT
  text: ἰδοὺ ἔρχεται ὥρα ⸀καὶ ἐλήλυθεν ἵνα σκορπισθῆτε ἕκαστος εἰς τὰ ἴδια κἀμὲ μόνον
    ἀφῆτε· καὶ οὐκ εἰμὶ μόνος, ὅτι ὁ πατὴρ μετ’ ἐμοῦ ἐστιν.
translation:
  text: Behold, an hour is coming, and has come, when you will be scattered, each
    to his own, and will leave me alone. Yet I am not alone, because the Father is
    with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each to his own home/place/things.' The Greek is broader than a specific
      location and can refer generally to what belongs to each one.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the discourse-marking force of the particle and the solemn, attention-directing
    tone. Though 'Look' is more colloquial, 'Behold' better fits the gravity of Jesus'
    announcement without becoming archaic in this context.
- source_word: ἔρχεται ὥρα καὶ ἐλήλυθεν
  chosen: an hour is coming, and has come
  alternatives:
  - the hour is coming, and indeed has come
  - an hour is coming, and now has come
  lexicon: BDAG
  rationale: 'Preserves the present-plus-perfect tension in the Greek: the decisive
    moment is both imminent and, in some sense, already arrived. ''An hour'' follows
    the anarthrous Greek; the phrase is idiomatic in John and refers to a decisive
    time rather than a sixty-minute period.'
- source_word: ἵνα
  chosen: when
  alternatives:
  - so that
  - that
  lexicon: BDAG
  rationale: Although ἵνα often marks purpose, here after 'an hour is coming, and
    has come' it functions idiomatically to introduce the content/result of that hour.
    'When' gives natural English while preserving the temporal sense.
- source_word: σκορπισθῆτε
  chosen: you will be scattered
  alternatives:
  - you may be scattered
  - you will be dispersed
  lexicon: BDAG
  rationale: The passive conveys the disciples' being driven apart. 'Will be scattered'
    is the most natural rendering in context and reflects the expected event rather
    than mere possibility.
- source_word: ἕκαστος εἰς τὰ ἴδια
  chosen: each to his own
  alternatives:
  - each to his own home
  - each to his own things
  - each to his own place
  lexicon: BDAG
  rationale: τὰ ἴδια is broader than 'home' and can mean one's own sphere, possessions,
    or concerns. 'To his own' preserves the Greek's compactness and ambiguity without
    over-specifying. The masculine singular 'his' reflects the gender-accurate representative
    force of ἕκαστος.
- source_word: κἀμὲ μόνον ἀφῆτε
  chosen: and will leave me alone
  alternatives:
  - and leave me alone
  - and abandon me alone
  lexicon: BDAG
  rationale: κἀμέ means 'and me,' and ἀφῆτε here means to leave behind. 'Will leave
    me alone' fits the future sense implied by the clause and preserves the emotional
    force without overstating it as 'abandon,' though abandonment is contextually
    near.
- source_word: καὶ οὐκ εἰμὶ μόνος
  chosen: Yet I am not alone
  alternatives:
  - And I am not alone
  - but I am not alone
  lexicon: BDAG
  rationale: καί here is rendered with mild adversative force in English because the
    clause contrasts the disciples' leaving with the Father's presence. 'Yet' communicates
    the contrast naturally.
- source_word: ὅτι ὁ πατὴρ μετ’ ἐμοῦ ἐστιν
  chosen: because the Father is with me
  alternatives:
  - for the Father is with me
  lexicon: BDAG
  rationale: ὅτι gives the reason Jesus is not alone. 'The Father' preserves the definite,
    relational title central to Johannine theology, and 'is with me' straightforwardly
    renders μετ’ ἐμοῦ ἐστιν.
