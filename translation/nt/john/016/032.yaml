theological_decisions:
- issue: Rendering of ἕκαστος with masculine representative force
  chosen_reading: each to his own
  alternative_readings:
  - each to their own
  - each to his own home
  rationale: Following the project's gender-accurate policy, the grammatically masculine
    singular is represented with singular 'his' rather than a gender-neutral pluralizing
    paraphrase. This preserves the source form and distributive emphasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relation between the disciples' abandonment and the Father's presence
  chosen_reading: Yet I am not alone, because the Father is with me
  alternative_readings:
  - And I am not alone, for the Father is with me
  rationale: The translation preserves the theological tension of Jesus truly being
    left by the disciples while not being utterly alone because of the Father's presence.
    It does not import later doctrinal conclusions beyond the verse itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
