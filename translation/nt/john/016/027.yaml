id: JHN.16.27
reference: John 16:27
source:
  edition: SBLGNT
  text: αὐτὸς γὰρ ὁ πατὴρ φιλεῖ ὑμᾶς, ὅτι ὑμεῖς ἐμὲ πεφιλήκατε καὶ πεπιστεύκατε ὅτι
    ἐγὼ παρὰ τοῦ ⸀θεοῦ ἐξῆλθον.
translation:
  text: For the Father himself loves you, because you have loved me and have believed
    that I came from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "I came forth from God"; the Greek can also suggest coming from God's
      presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  chosen: himself
  alternatives:
  - himself personally
  - himself
  lexicon: BDAG
  rationale: Used as an intensive with ὁ πατήρ, emphasizing that the Father personally
    loves the disciples. 'Himself' preserves the emphatic force without awkwardness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    is a natural explanatory connector in English and preserves discourse flow.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine usage this is a title for God in relation to the Son and
    believers. Capitalized as a divine title in English.
- source_word: φιλεῖ
  chosen: loves
  alternatives:
  - has affection for
  - is fond of
  lexicon: BDAG
  rationale: φιλέω here denotes personal love/affection. 'Loves' is the most natural
    and theologically appropriate English rendering. A more wooden 'is fond of' would
    understate the relational depth in context.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct object referring to the disciples collectively.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: The first ὅτι gives the reason the Father loves them. 'Because' makes
    the causal sense explicit in modern English.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis. English can carry the sense adequately
    with 'you' in this context; adding 'yourselves' would sound unnatural and overstate
    the emphasis.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Direct object of πεφιλήκατε, referring to Jesus.
- source_word: πεφιλήκατε
  chosen: have loved
  alternatives:
  - have had love for
  - have been loving
  lexicon: BDAG
  rationale: Perfect tense indicates a settled prior action with present relevance.
    'Have loved' preserves both the lexical link with φιλεῖ and the aspect better
    than simple past 'loved'.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: 'Coordinates the two grounds named by Jesus: loving him and believing
    his origin.'
- source_word: πεπιστεύκατε
  chosen: have believed
  alternatives:
  - have come to believe
  - have trusted
  lexicon: BDAG
  rationale: Perfect tense again suggests an abiding state resulting from prior belief.
    'Have believed' is the default rendering for πιστεύω and aligns with the project's
    default handling of the pistis word group. 'Trusted' is possible but less direct
    here because the clause object is propositional ('that I came from God').
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: The second ὅτι introduces the content of belief, not a cause. 'That'
    is the standard English complementizer here.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the presence of God
  - from beside God
  lexicon: BDAG
  rationale: παρά with the genitive can denote source or origin, often with nuance
    of being from someone's presence. 'From God' is the clearest idiomatic rendering
    here; the fuller spatial nuance is worth preserving in a footnote.
- source_word: ἐξῆλθον
  chosen: I came
  alternatives:
  - I came forth
  - I went out
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι here refers to Jesus' coming forth from God, likely
    his mission/origin rather than merely physical departure. 'I came' is idiomatic
    modern English; 'came forth' is more traditional but less natural.
