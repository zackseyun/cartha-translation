theological_decisions:
- issue: Christological force of 'I came from God'
  chosen_reading: Render as mission/origin language without expanding it into a doctrinal
    paraphrase.
  alternative_readings:
  - I came forth from God
  - I came out from the presence of God
  rationale: The verse affirms Jesus' origin and mission in relation to God, consistent
    with Johannine Christology and historic orthodoxy, but the translation should
    not import explanatory doctrinal formulas beyond the Greek. 'I came from God'
    preserves the statement's force while leaving its full theological implications
    to context.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
