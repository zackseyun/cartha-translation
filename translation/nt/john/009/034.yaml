id: JHN.9.34
reference: John 9:34
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν καὶ εἶπαν αὐτῷ· Ἐν ἁμαρτίαις σὺ ἐγεννήθης ὅλος, καὶ σὺ διδάσκεις ἡμᾶς; καὶ ἐξέβαλον αὐτὸν ἔξω.
translation:
  text: They answered and said to him, “You were born wholly in sins, and are you teaching us?” And they threw him out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You were born completely in sin.” The Greek is literally plural, “in sins,” preserving the force of the accusers’ insult.
    reason: lexical_alternative
  - marker: b
    text: Or “they cast him out.” This may refer to expelling him from their presence, and in context may also imply exclusion from the synagogue community.
    reason: alternative_reading
  - marker: c
    text: Or 'entirely in sins'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπεκρίθησαν καὶ εἶπαν
  chosen: They answered and said
  alternatives:
  - They answered
  - They replied and said
  lexicon: BDAG
  rationale: Retains the Johannine double-verb formulation rather than collapsing it entirely, while still sounding natural in English. This preserves the emphatic narrative style of the Greek.
- source_word: Ἐν ἁμαρτίαις
  chosen: in sins
  alternatives:
  - in sin
  - a sinner
  lexicon: BDAG
  rationale: The plural dative is preserved as 'in sins' rather than singular 'in sin.' This reflects the speakers' accusatory wording and avoids softening their claim into a generalized moral condition.
- source_word: ἐγεννήθης ὅλος
  chosen: were born entirely
  alternatives:
  - were completely born
  - were born wholly
  - were born altogether
  lexicon: BDAG
  rationale: ὅλος intensifies the statement about his condition from birth. 'Entirely' communicates the force idiomatically in English without awkwardness.
- source_word: καὶ σὺ διδάσκεις ἡμᾶς;
  chosen: and are you teaching us?
  alternatives:
  - and you are teaching us?
  - and do you teach us?
  lexicon: BDAG
  rationale: The present tense with explicit σὺ is rendered as an indignant rhetorical question. 'Are you teaching us?' captures the confrontational tone and the emphatic pronoun.
- source_word: ἐξέβαλον αὐτὸν ἔξω
  chosen: they threw him out
  alternatives:
  - they cast him out
  - they drove him out
  lexicon: BDAG
  rationale: This is a natural modern rendering of the idiom. 'Cast him out' is possible and somewhat more formal, but 'threw him out' better conveys the hostile expulsion in readable contemporary English.
