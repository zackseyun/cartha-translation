theological_decisions:
- issue: Meaning of the accusation 'born in sins' in context of congenital blindness
  chosen_reading: The line is rendered as the speakers' hostile accusation that the man was born wholly marked by sins, without specifying whether they mean his own sin, inherited sin, or sin associated with his condition.
  alternative_readings:
  - You were born in sin
  - You were born a complete sinner
  - You were born under the guilt of your parents' sins
  rationale: The Greek itself records the insult but does not explicitly resolve the underlying theology of suffering and sin. The translation preserves that ambiguity rather than importing a doctrinal explanation not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:35:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/009/034.json
  category: awkward_english
  tier: 1
  from: entirely in sins
  to: wholly in sins
  rationale: The Greek ὅλος (wholly, completely) modifies the state of being 'in sins' from birth. While 'entirely' is a valid translation of ὅλος, its placement and combination with 'in sins' can sound slightly less natural than 'wholly in sins' or 'completely in sins.' These alternatives more smoothly convey the idea that his *entire being* or *condition* from birth was characterized by sins, rather than potentially suggesting the *act of being born* was entire.
