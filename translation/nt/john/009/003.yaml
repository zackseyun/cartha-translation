id: JHN.9.3
reference: John 9:3
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Οὔτε οὗτος ἥμαρτεν οὔτε οἱ γονεῖς αὐτοῦ, ἀλλ’ ἵνα φανερωθῇ τὰ ἔργα τοῦ θεοῦ ἐν αὐτῷ.
translation:
  text: Jesus answered, “Neither did this man sin, nor his parents, but this happened so that the works of God might be revealed in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'but so that the works of God might be revealed in him.' The supplied words 'this happened' make the Greek construction natural in English.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'through him' for 'in him'; the Greek reads 'in him,' which may denote the sphere or means by which God's works are displayed.
    reason: lexical_alternative
  - marker: c
    text: Or 'Neither this man sinned'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; 'answered' is idiomatic and preserves the discourse function.
- source_word: Οὔτε ... οὔτε
  chosen: Neither ... nor
  alternatives:
  - not ... and not
  lexicon: BDAG
  rationale: This correlative construction is best represented by the natural English pair 'neither ... nor,' preserving the emphatic denial of both options.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: In context Jesus is speaking about the man born blind; 'this man' makes the referent explicit and natural in English without adding new information.
- source_word: ἥμαρτεν
  chosen: sinned
  alternatives:
  - committed sin
  lexicon: BDAG
  rationale: Simple aorist of ἁμαρτάνω; 'sinned' is the direct and idiomatic English equivalent.
- source_word: γονεῖς
  chosen: parents
  alternatives:
  - father and mother
  lexicon: BDAG
  rationale: γονεῖς naturally denotes 'parents'; this is concise and accurate.
- source_word: ἀλλ’ ἵνα
  chosen: but this happened so that
  alternatives:
  - but in order that
  - but so that
  lexicon: BDAG
  rationale: The Greek shifts from negating presumed causes to expressing divine purpose/result. Because English would sound abrupt with only 'but so that,' supplying 'this happened' makes the clause intelligible and reflects the implied circumstance under discussion, while staying close to the sense.
- source_word: φανερωθῇ
  chosen: might be revealed
  alternatives:
  - might be made manifest
  - might be shown
  lexicon: BDAG
  rationale: Passive subjunctive after ἵνα is well rendered 'might be revealed'; this preserves both the passive voice and the sense of disclosure.
- source_word: τὰ ἔργα τοῦ θεοῦ
  chosen: the works of God
  alternatives:
  - God's works
  - the deeds of God
  lexicon: BDAG
  rationale: A transparent and natural rendering that preserves the genitival construction and Johannine theological diction.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - through him
  - on him
  lexicon: BDAG
  rationale: ἐν with the dative is most directly 'in him.' While context may suggest manifestation through the man, the more literal 'in him' preserves the Greek wording and the theological tension without over-interpreting.
