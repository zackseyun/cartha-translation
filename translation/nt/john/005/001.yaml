theological_decisions:
- issue: Referent of Ἰουδαίων in Johannine usage
  chosen_reading: Rendered as 'the Jews' in this verse
  alternative_readings:
  - the Judeans
  rationale: In John, Ἰουδαῖος can at times mean either 'Jew' or 'Judean' depending
    on context. Here it modifies 'feast' and refers to a Jewish festal observance
    rather than a regional identity, so 'the Jews' best matches the sense without
    importing later polemical overtones.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity only where the source is genuinely ambiguous'
