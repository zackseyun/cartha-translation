id: JHN.5.1
reference: John 5:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ⸀ἦν ἑορτὴ τῶν Ἰουδαίων, καὶ ⸀ἀνέβη Ἰησοῦς εἰς Ἱεροσόλυμα.
translation:
  text: After these things, there was a feast of the Jews, and Jesus went up to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a festival of the Jews.'
    reason: lexical_alternative
  - marker: b
    text: '''The Jews'' here refers to the Jewish people in connection with one of
      their festal observances; some contexts in John may also support ''Judeans''
      for Ἰουδαῖοι.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A relatively formal rendering preserves John's transitional phrase without
    over-smoothing it. 'After these things' reflects the plural demonstrative ταῦτα
    and keeps the narrative linkage explicit.
- source_word: ἦν
  chosen: there was
  alternatives:
  - it was
  lexicon: BDAG
  rationale: Using existential 'there was' is more natural in English with ἑορτὴ as
    the introduced event, while still accurately reflecting the imperfect of εἰμί.
- source_word: ἑορτὴ
  chosen: a feast
  alternatives:
  - a festival
  lexicon: BDAG
  rationale: ἑορτή denotes a festal occasion or religious festival. 'Feast' is concise
    and traditional, while still understandable in modern English. 'Festival' is possible,
    but 'feast' better preserves the Jewish festal sense in this context.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Jewish people
  - of the Judeans
  lexicon: BDAG
  rationale: The genitive most naturally identifies the feast as one belonging to
    or observed by the Jews. 'Of the Jews' is the most direct rendering. 'Judeans'
    is possible in some Johannine contexts, but here the reference is to a Jewish
    feast rather than specifically to residents of Judea.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: BDAG
  rationale: ἀναβαίνω commonly means 'go up,' especially for travel to Jerusalem,
    reflecting both elevation and conventional pilgrimage language. 'Went up' preserves
    this nuance better than the flatter 'went' and avoids the overly elevated English
    'ascended' in a travel context.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
