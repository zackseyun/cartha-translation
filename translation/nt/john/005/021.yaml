id: JHN.5.21
reference: John 5:21
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ὁ πατὴρ ἐγείρει τοὺς νεκροὺς καὶ ζῳοποιεῖ, οὕτως καὶ ὁ υἱὸς οὓς
    θέλει ζῳοποιεῖ.
translation:
  text: For just as the Father raises the dead and gives them life, so also the Son
    gives life to whom he wishes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'makes alive' for both occurrences of 'gives life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to whom he wills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Renders the comparative-consecutive force naturally in English while
    preserving γάρ as explanatory ('for') and ὥσπερ as the opening comparison ('just
    as').
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Capitalized as a divine title in context, referring specifically to God
    the Father in Johannine discourse.
- source_word: ἐγείρει
  chosen: raises
  alternatives:
  - awakens
  - raises up
  lexicon: BDAG
  rationale: Standard rendering in resurrection contexts; here it refers to the Father's
    action toward the dead.
- source_word: τοὺς νεκρούς
  chosen: the dead
  alternatives:
  - dead people
  - the dead ones
  lexicon: BDAG
  rationale: Idiomatic English for the substantival adjective, preserving the collective
    reference without unnecessary expansion.
- source_word: ζῳοποιεῖ
  chosen: gives them life
  alternatives:
  - makes alive
  - gives life
  lexicon: BDAG
  rationale: For the first occurrence, 'gives them life' makes explicit the object
    implied from 'the dead' and communicates the verb clearly in modern English. It
    preserves the sense of imparting life, not merely reviving.
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - so too
  - in the same way also
  lexicon: BDAG
  rationale: Carries the corresponding comparison forward and preserves the emphatic
    parallel between Father and Son.
- source_word: ὁ υἱὸς
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: Capitalized as a divine christological title in context, matching Johannine
    usage and the Father-Son parallel.
- source_word: οὓς θέλει
  chosen: to whom he wishes
  alternatives:
  - whom he wills
  - whom he wants
  - whomever he desires
  lexicon: BDAG
  rationale: Represents the relative pronoun plus θέλω with natural modern English.
    'Wishes' preserves volitional force without sounding archaic ('wills') or overly
    casual ('wants').
- source_word: ζῳοποιεῖ
  chosen: gives life
  alternatives:
  - makes alive
  lexicon: BDAG
  rationale: Repeated with a closely matching English gloss for consistency. Here
    no explicit object is needed because 'to whom he wishes' already supplies it.
