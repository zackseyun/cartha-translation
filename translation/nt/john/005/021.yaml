theological_decisions:
- issue: Father-Son parallel in giving life
  chosen_reading: The verse is rendered to preserve the explicit parallel that the
    Son gives life in the same way the Father does, without weakening the christological
    force.
  alternative_readings:
  - Render more loosely to avoid strong ontological implications
  rationale: The Greek sets a deliberate analogy between the Father's life-giving
    action and the Son's. In keeping with historic orthodoxy and the text's plain
    sense, the translation preserves this high christological claim without adding
    explanatory theology beyond the verse itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy: Preserve theological tension rather than resolve
    it.'
- issue: θέλει and divine volition
  chosen_reading: Rendered as 'wishes' rather than 'wills' in the main text.
  alternative_readings:
  - wills
  - wants
  rationale: '''Wishes'' communicates genuine volition in readable modern English
    while avoiding both archaic diction (''wills'') and an overly casual tone (''wants'').
    This does not diminish the authority of the Son''s action; it is a stylistic choice
    for accessibility.'
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic
    or academic.'
