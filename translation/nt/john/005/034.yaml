theological_decisions:
- issue: Meaning of 'you may be saved' in context
  chosen_reading: Retain the broad salvific wording without narrowing it to physical
    rescue or to a specific doctrinal model of salvation.
  alternative_readings:
  - you may be delivered
  - you may come to salvation
  rationale: σῴζω in John commonly carries the sense of salvation in the fullest theological
    sense, but the translation should not over-specify how that salvation is construed
    beyond the text itself. 'Be saved' preserves the canonical and theological weight
    while avoiding denominational narrowing.
  doctrine_reference: Affirmations; Translation philosophy §3
