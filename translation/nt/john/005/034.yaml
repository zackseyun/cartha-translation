id: JHN.5.34
reference: John 5:34
source:
  edition: SBLGNT
  text: ἐγὼ δὲ οὐ παρὰ ἀνθρώπου τὴν μαρτυρίαν λαμβάνω, ἀλλὰ ταῦτα λέγω ἵνα ὑμεῖς σωθῆτε.
translation:
  text: But I do not receive testimony from man; rather, I say these things so that
    you may be saved.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρὰ ἀνθρώπου
  chosen: from man
  alternatives:
  - from a man
  - from human beings
  - from people
  lexicon: BDAG
  rationale: παρά with the genitive indicates source ('from'). The singular ἀνθρώπου
    is retained as 'man' to reflect the Greek form and the contrast with merely human
    testimony in context. 'From a man' is possible but sounds overly specific in English;
    'from human beings/people' smooths to a plural not present in the text.
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: μαρτυρία commonly denotes testimony or witness. 'Testimony' fits well
    with λαμβάνω ('receive') in English and preserves the juridical/evidentiary nuance
    of the surrounding passage. 'Witness' is possible, but in English it more naturally
    refers to the person than the content.
- source_word: λαμβάνω
  chosen: receive
  alternatives:
  - accept
  lexicon: BDAG
  rationale: The present tense is rendered straightforwardly as 'receive.' 'Accept'
    is possible, but 'receive testimony' is a more direct equivalent and preserves
    the idiom of the Greek.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The neuter plural demonstrative is best represented by 'these things.'
    English 'this' would be smoother but would flatten the plural form.
- source_word: λέγω
  chosen: I say
  alternatives:
  - I am saying
  - I speak
  lexicon: BDAG
  rationale: A simple present best matches the Greek present indicative. 'I speak'
    is less natural with a direct object like ταῦτα; 'I am saying' is unnecessarily
    progressive here.
- source_word: ἵνα ὑμεῖς σωθῆτε
  chosen: so that you may be saved
  alternatives:
  - that you may be saved
  - so that you might be saved
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and the aorist passive subjunctive σωθῆτε is
    naturally rendered 'may be saved.' 'So that' makes the purposive force explicit.
    The passive preserves the verbal form without importing a more interpretive paraphrase
    such as 'find salvation'.
- source_word: δὲ ... ἀλλὰ
  chosen: But ... rather
  alternatives:
  - Yet ... but
  - Now ... but
  lexicon: BDAG
  rationale: 'The contrastive structure is important: Jesus denies dependence on human
    testimony and then states his purpose in speaking. ''But ... rather'' captures
    the adversative progression clearly in modern English.'
