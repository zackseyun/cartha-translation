theological_decisions:
- issue: Referent of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: Following original-language primacy, the translation keeps the literal
    wording unless the immediate context clearly requires a narrower sense. Because
    this verse itself does not explicitly identify the speakers as leaders or as Judeans
    in a geographic sense, the main text retains 'the Jews,' while acknowledging narrower
    contextual possibilities in a footnote for auditability and to avoid over-resolving
    a debated Johannine usage.
  doctrine_reference: Translation philosophy §§1, 3, 5
