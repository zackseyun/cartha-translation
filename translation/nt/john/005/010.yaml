id: JHN.5.10
reference: John 5:10
source:
  edition: SBLGNT
  text: ἔλεγον οὖν οἱ Ἰουδαῖοι τῷ τεθεραπευμένῳ· Σάββατόν ἐστιν, ⸀καὶ οὐκ ἔξεστίν
    σοι ἆραι τὸν ⸀κράβαττον.
translation:
  text: So the Jews were saying to the man who had been healed, “It is the Sabbath,
    and it is not lawful for you to carry your mat.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Jewish leaders” or “the Judeans,” depending on how John
      is using the term here.
    reason: alternative_reading
  - marker: b
    text: Or “pick up” or “take up your mat.”
    reason: lexical_alternative
  - marker: c
    text: The term rendered “mat” refers to a portable sleeping pad or pallet, not
      necessarily a full bed.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in past time; 'were
    saying' preserves that aspect in natural English better than simple past.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the prior event. 'So' is
    natural modern English and preserves the connective force without sounding overly
    formal.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' Although in Johannine context
    it can at times refer more specifically to Judean authorities, this verse does
    not itself specify leaders, so the literal rendering is retained rather than narrowing
    the reference beyond the text.
- source_word: τῷ τεθεραπευμένῳ
  chosen: to the man who had been healed
  alternatives:
  - to the one who had been healed
  - to the healed man
  lexicon: BDAG
  rationale: The perfect passive participle denotes a completed healing with present
    result. Adding 'man' makes the English idiomatic and reflects the known male referent
    from context without changing the sense.
- source_word: Σάββατόν ἐστιν
  chosen: It is the Sabbath
  alternatives:
  - It is a Sabbath day
  - It is Sabbath
  lexicon: BDAG
  rationale: Idiomatic English for the temporal assertion. The anarthrous Greek does
    not require an indefinite sense here.
- source_word: οὐκ ἔξεστίν σοι
  chosen: it is not lawful for you
  alternatives:
  - it is not permitted for you
  - you are not allowed
  lexicon: BDAG
  rationale: ἔξεστιν commonly expresses what is permitted or lawful. 'Lawful' fits
    the dispute over Sabbath observance and preserves the legal-religious nuance.
- source_word: ἆραι
  chosen: to carry
  alternatives:
  - to pick up
  - to take up
  lexicon: BDAG
  rationale: Although αἴρω can mean 'take up' or 'pick up,' in this context the objection
    concerns transporting the item on the Sabbath. 'Carry' best captures the practical
    force of the accusation in English.
- source_word: κράβαττον
  chosen: mat
  alternatives:
  - bed
  - pallet
  - cot
  lexicon: BDAG
  rationale: Refers to a poor person's sleeping pad or portable bed. 'Mat' is clear
    modern English and avoids suggesting a full bedframe while preserving portability
    central to the scene.
