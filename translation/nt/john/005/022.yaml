theological_decisions:
- issue: Relationship between the Father's judging and the Son's judging
  chosen_reading: 'Render the statement straightforwardly without softening the apparent
    tension: the Father judges no one, but has given all judgment to the Son.'
  alternative_readings:
  - Interpret 'judges no one' as 'judges no one independently of the Son'
  - Interpret 'all judgment' as only eschatological final judgment
  rationale: The translation preserves the text's direct claim and does not import
    harmonizing qualifiers not present in the Greek. This aligns with the doctrine's
    instruction to preserve theological tension rather than resolve it beyond what
    the text states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Christological title 'the Son'
  chosen_reading: Retain 'the Son' as a title rather than paraphrasing it.
  alternative_readings:
  - his son
  rationale: In context this title contributes to Johannine high Christology and the
    Father-Son relationship. Retaining the title reflects the source text and remains
    within historic orthodox Christology without adding doctrinal explanation.
  doctrine_reference: 'DOCTRINE.md: Affirmations; Translate titles'
