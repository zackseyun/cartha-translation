id: JHN.5.22
reference: John 5:22
source:
  edition: SBLGNT
  text: οὐδὲ γὰρ ὁ πατὴρ κρίνει οὐδένα, ἀλλὰ τὴν κρίσιν πᾶσαν δέδωκεν τῷ υἱῷ,
translation:
  text: For the Father judges no one, but has given all judgment to the Son,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐδὲ γὰρ
  chosen: For
  alternatives:
  - Indeed, ... not even
  - For neither
  lexicon: BDAG
  rationale: The combination introduces an explanatory statement continuing the prior
    context. In idiomatic English, 'For' best captures γάρ's explanatory force without
    awkwardly reproducing οὐδέ as a separate discourse particle.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine context this is a titular reference to God as Father in
    relation to the Son, so capitalization appropriately signals the personal divine
    title in English.
- source_word: κρίνει
  chosen: judges
  alternatives:
  - is judging
  - condemns
  - passes judgment on
  lexicon: BDAG
  rationale: Present indicative here states a general reality. 'Judges' preserves
    the verbal link with κρίσιν later in the verse and avoids narrowing the sense
    to condemnation alone.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - no person
  - nobody
  lexicon: BDAG
  rationale: '''No one'' is the most natural modern English equivalent and accurately
    conveys the comprehensive negation.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between the Father's not judging anyone and his
    giving judgment to the Son. 'But' is the clearest natural connector.
- source_word: τὴν κρίσιν πᾶσαν
  chosen: all judgment
  alternatives:
  - the whole judgment
  - all authority to judge
  lexicon: BDAG
  rationale: κρίσις here refers to the act/function of judging, not merely a verdict.
    'All judgment' preserves both the noun and the comprehensiveness of πᾶσαν without
    over-interpreting as 'authority,' though that idea is contextually related.
- source_word: δέδωκεν
  chosen: has given
  alternatives:
  - gave
  - has entrusted
  lexicon: BDAG
  rationale: The perfect tense indicates a completed act with abiding result. 'Has
    given' best preserves that aspect in English better than simple past 'gave.' 'Entrusted'
    is interpretive and less direct.
- source_word: τῷ υἱῷ
  chosen: to the Son
  alternatives:
  - to his Son
  lexicon: BDAG
  rationale: The Greek has the article with 'Son' and does not explicitly include
    a possessive pronoun. In Johannine usage 'the Son' is a weighty christological
    title and should be preserved as such.
