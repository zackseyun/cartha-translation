id: JHN.5.5
reference: John 5:5
source:
  edition: SBLGNT
  text: ἦν δέ τις ἄνθρωπος ἐκεῖ ⸀τριάκοντα ὀκτὼ ἔτη ἔχων ἐν τῇ ἀσθενείᾳ ⸀αὐτοῦ·
translation:
  text: Now there was a man there who had been in his sickness for thirty-eight years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his weakness' or 'in his illness.' The Greek ἀσθένεια can refer broadly
      to physical weakness or sickness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δέ
  chosen: Now there was
  alternatives:
  - And there was
  - But there was
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'Now there was' gives natural English narrative
    flow while preserving the introduction of a new figure.
- source_word: τις ἄνθρωπος
  chosen: a man
  alternatives:
  - a certain man
  - someone
  lexicon: BDAG
  rationale: τις with ἄνθρωπος introduces an indefinite individual. 'A man' is natural
    English and preserves the masculine singular reference without adding the slightly
    archaic 'a certain man.'
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: The adverb locates the man at the pool scene just described. 'There'
    is the straightforward contextual rendering.
- source_word: τριάκοντα ὀκτὼ ἔτη
  chosen: thirty-eight years
  alternatives:
  - thirty and eight years
  lexicon: BDAG
  rationale: This is the standard idiomatic English rendering of the numeral phrase.
- source_word: ἔχων
  chosen: who had been
  alternatives:
  - having
  - who had
  lexicon: BDAG
  rationale: The present participle with the accusative of extent of time and following
    prepositional phrase describes the man's continuing condition up to that point.
    English idiom requires a finite verbal expression; 'who had been' best conveys
    the durative sense in context.
- source_word: ἐν τῇ ἀσθενείᾳ αὐτοῦ
  chosen: in his sickness
  alternatives:
  - in his weakness
  - in his illness
  - an invalid
  lexicon: BDAG
  rationale: ἀσθένεια can denote weakness, sickness, or illness. Here the phrase specifies
    the condition in which he had remained for thirty-eight years. 'In his sickness'
    stays close to the Greek prepositional construction and avoids over-specifying
    the exact malady. 'An invalid' is interpretive and better reflects broader contextual
    inference than the wording of this verse alone.
