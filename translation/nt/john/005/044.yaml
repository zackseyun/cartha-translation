id: JHN.5.44
reference: John 5:44
source:
  edition: SBLGNT
  text: πῶς δύνασθε ὑμεῖς πιστεῦσαι, δόξαν παρ’ ἀλλήλων λαμβάνοντες, καὶ τὴν δόξαν
    τὴν παρὰ τοῦ μόνου θεοῦ οὐ ζητεῖτε;
translation:
  text: How are you able to believe, receiving glory from one another and not seeking
    the glory that is from the only God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'honor' for both occurrences of 'glory' (Greek δόξα).
    reason: lexical_alternative
  - marker: b
    text: Or 'How can you believe...?'
    reason: lexical_alternative
  - marker: c
    text: Or 'the one and only God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - How can
  lexicon: BDAG
  rationale: Introduces a rhetorical question about possibility or manner. 'How' preserves
    the Greek form and leaves the rhetorical force to context; 'How can' is a possible
    idiomatic expansion but slightly more interpretive.
- source_word: δύνασθε
  chosen: are ... able
  alternatives:
  - can
  lexicon: BDAG
  rationale: The verb denotes ability or capability. 'Are able' preserves the explicit
    sense of capacity more transparently than the compressed English modal 'can,'
    which is possible but less formally aligned.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and adds emphasis. English can carry
    this without an awkward intensifier; the emphasis is sufficiently conveyed by
    word order and the rhetorical question. 'You yourselves' would overstate the emphasis
    in modern English.
- source_word: πιστεῦσαι
  chosen: to believe
  alternatives:
  - believe
  lexicon: BDAG
  rationale: 'Aorist infinitive after δύνασθε is naturally rendered as complementary
    infinitive in English: ''are able to believe.'' The default rendering ''believe''
    fits the Johannine context of faith/trust without importing a more specific doctrinal
    nuance.'
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - praise
  lexicon: BDAG
  rationale: In Johannine usage δόξα can denote honor, reputation, or glory. 'Glory'
    preserves the lexical connection between human approval and divine glory in the
    same verse, even if 'honor' is idiomatically attractive. Keeping 'glory' in both
    instances highlights the contrast intended by the Greek.
- source_word: παρ’ ἀλλήλων
  chosen: from one another
  alternatives:
  - from each other
  lexicon: BDAG
  rationale: The phrase indicates reciprocal human source. 'From one another' is a
    natural and slightly more formal rendering that matches the reciprocal sense clearly.
- source_word: λαμβάνοντες
  chosen: receiving
  alternatives:
  - accepting
  lexicon: BDAG
  rationale: The participle describes their ongoing posture of taking in human glory.
    'Receiving' is the broad, direct gloss; 'accepting' is possible but adds a nuance
    of approval not explicit in the verb itself.
- source_word: καὶ ... οὐ ζητεῖτε
  chosen: and not seeking
  alternatives:
  - while you do not seek
  - and you do not seek
  lexicon: BDAG
  rationale: This coordinates with the participial construction and the finite verb
    to describe a contrasting pattern. 'And not seeking' preserves the close connection
    to the preceding participle while remaining readable. A fully finite rendering
    is possible but less reflective of the Greek flow.
- source_word: τὴν δόξαν τὴν παρὰ τοῦ μόνου θεοῦ
  chosen: the glory that is from the only God
  alternatives:
  - the honor that comes from the only God
  - the glory from the one and only God
  lexicon: BDAG
  rationale: The repeated article plus prepositional phrase is naturally rendered
    with a relative clause in English. 'The only God' is the most direct rendering
    of τοῦ μόνου θεοῦ. 'One and only God' is idiomatic but slightly more expansive
    than the Greek.
- source_word: μόνου θεοῦ
  chosen: the only God
  alternatives:
  - the one and only God
  lexicon: BDAG
  rationale: μόνος marks exclusivity. 'The only God' is concise and direct, preserving
    the monotheistic force without embellishment.
