theological_decisions:
- issue: Rendering πιστεῦσαι in Johannine context
  chosen_reading: believe
  alternative_readings:
  - trust
  rationale: The Greek verb πιστεύω can in context carry the sense of trust, but 'believe'
    remains the standard and sufficiently broad rendering here, especially since the
    verse concerns inability to come to genuine faith because of seeking human glory.
    This follows the project's default handling of the pistis word-group without importing
    a narrower doctrinal reading.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις default English ''faith'';
    preserve tension rather than resolve it'
- issue: Rendering δόξα consistently in both clauses
  chosen_reading: glory
  alternative_readings:
  - honor
  rationale: The verse contrasts humanly sourced δόξα with divinely sourced δόξα.
    Using 'glory' in both places preserves the lexical repetition and theological
    contrast in the Greek. 'Honor' is a viable contextual gloss, but varying the English
    term would obscure the deliberate parallelism.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
- issue: Rendering τοῦ μόνου θεοῦ
  chosen_reading: the only God
  alternative_readings:
  - the one and only God
  rationale: The phrase straightforwardly affirms God's uniqueness in a Jewish monotheistic
    frame. The translation preserves that force without expanding it into a more interpretive
    idiom. No christological or anti-christological inference beyond the text is imported.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not
    make'
