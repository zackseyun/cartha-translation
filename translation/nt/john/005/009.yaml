id: JHN.5.9
reference: John 5:9
source:
  edition: SBLGNT
  text: καὶ εὐθέως ἐγένετο ὑγιὴς ὁ ἄνθρωπος καὶ ἦρε τὸν κράβαττον αὐτοῦ καὶ περιεπάτει.
    Ἦν δὲ σάββατον ἐν ἐκείνῃ τῇ ἡμέρᾳ.
translation:
  text: And immediately the man became well, and he picked up his mat and began to
    walk. Now that day was a Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took up his bed.' The Greek κράβαττον refers to a simple mat, pallet,
      or sleeping pad rather than necessarily a full bed.
    reason: lexical_alternative
  - marker: b
    text: Or 'was walking.' The Greek imperfect can emphasize continued action; here
      it may also be understood as the beginning of his walking after being healed.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Sabbath.' The Greek reads literally 'it was Sabbath on that day.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Conveys the instantaneous nature of the healing in clear modern English.
    'Immediately' is slightly more formal and fits Johannine narrative style well.
- source_word: ἐγένετο ὑγιὴς
  chosen: became well
  alternatives:
  - became healthy
  - was made well
  - became whole
  lexicon: BDAG
  rationale: The construction literally means 'became healthy/well.' 'Became well'
    is natural English and preserves the transition effected by the healing. 'Was
    made well' would make the passive agency more explicit than the Greek here.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: Gender-accurate rendering of the masculine singular noun referring to
    the specific male individual in the narrative.
- source_word: ἦρε
  chosen: picked up
  alternatives:
  - took up
  - lifted
  lexicon: BDAG
  rationale: Aorist of αἴρω here refers to taking up/carrying the mat. 'Picked up'
    is idiomatic modern English; 'took up' is also possible and traditional, but 'picked
    up' is slightly clearer for contemporary readers.
- source_word: κράβαττον
  chosen: mat
  alternatives:
  - bed
  - pallet
  - stretcher
  lexicon: BDAG
  rationale: Refers to a simple sleeping pad or portable bedroll rather than a full
    bed. 'Mat' best communicates the likely object in accessible English. Traditional
    'bed' can mislead modern readers into imagining a larger piece of furniture.
- source_word: περιεπάτει
  chosen: began to walk
  alternatives:
  - was walking
  - walked about
  lexicon: BDAG
  rationale: The imperfect verb can denote the onset or continued action. In this
    healing context, 'began to walk' naturally highlights the restored ability without
    overtranslating the aspect. 'Was walking' is possible but less idiomatic in English
    narrative here.
- source_word: Ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: BDAG
  rationale: δέ here marks a narrative transition or explanatory note rather than
    strong contrast. 'Now' captures the discourse shift smoothly in English.
- source_word: σάββατον
  chosen: a Sabbath
  alternatives:
  - the Sabbath
  - Sabbath
  lexicon: BDAG
  rationale: Anarthrous σάββατον is naturally rendered 'a Sabbath' in this context,
    identifying the day as a Sabbath without requiring the English definite article.
    This also preserves the narrative note that sets up the ensuing controversy.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: that day
  alternatives:
  - on that day
  - in that day
  lexicon: BDAG
  rationale: Idiomatic English compresses the prepositional phrase to 'that day.'
    'On that day' is also accurate, but the shorter form reads more naturally after
    'was a Sabbath.'
