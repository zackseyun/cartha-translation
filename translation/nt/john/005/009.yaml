theological_decisions:
- issue: Rendering of σάββατον in a narrative setting
  chosen_reading: a Sabbath
  alternative_readings:
  - the Sabbath
  rationale: The Greek lacks the article, and the phrase functions as a temporal note
    rather than a title requiring capitalization with the definite article. Capitalizing
    'Sabbath' preserves the Jewish holy-day reference without importing additional
    theological nuance.
  doctrine_reference: Translation philosophy §1, §6
