id: JHN.5.32
reference: John 5:32
source:
  edition: SBLGNT
  text: ἄλλος ἐστὶν ὁ μαρτυρῶν περὶ ἐμοῦ, καὶ οἶδα ὅτι ἀληθής ἐστιν ἡ μαρτυρία ἣν
    μαρτυρεῖ περὶ ἐμοῦ.
translation:
  text: There is another who testifies about me, and I know that the testimony he
    testifies about me is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who bears witness about me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος
  chosen: another
  alternatives:
  - someone else
  - one more
  lexicon: BDAG
  rationale: ἄλλος denotes another of the same kind or an additional person. 'Another'
    is the most direct and natural rendering here, preserving the contrast with Jesus'
    own testimony in the surrounding context.
- source_word: ὁ μαρτυρῶν
  chosen: who testifies
  alternatives:
  - who bears witness
  - the one testifying
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: ''the one
    who testifies.'' ''Who testifies'' gives smooth modern English while preserving
    the ongoing verbal sense. ''Bears witness'' is possible but less natural for many
    modern readers.'
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  - regarding me
  lexicon: BDAG
  rationale: περί with the genitive here indicates reference or subject matter. 'About
    me' is idiomatic and accurate in contemporary English.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: οἶδα is the standard verb for knowing. 'I know' is both direct and contextually
    appropriate.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - valid
  lexicon: BDAG
  rationale: ἀληθής can describe something as true, genuine, or reliable. Here it
    predicates the quality of the testimony. 'True' is the most straightforward rendering
    and avoids over-interpretation.
- source_word: ἡ μαρτυρία
  chosen: the testimony
  alternatives:
  - the witness
  lexicon: BDAG
  rationale: μαρτυρία refers to testimony or witness borne. 'Testimony' fits the juridical
    flavor of the passage and pairs naturally with the verb μαρτυρεῖ.
- source_word: ἣν μαρτυρεῖ
  chosen: he testifies
  alternatives:
  - he bears
  - he gives
  lexicon: BDAG
  rationale: 'The clause is somewhat redundant in Greek (''the testimony which he
    testifies''), a Johannine style. In English, retaining some of that repetition
    preserves the source texture, but the relative pronoun is absorbed into smoother
    English: ''the testimony he testifies.'' This keeps the lexical link between noun
    and verb visible without becoming unintelligible.'
