theological_decisions:
- issue: Identity of 'another' (ἄλλος)
  chosen_reading: Rendered generically as 'another' without specifying the referent
    in the translation.
  alternative_readings:
  - John the Baptist
  - the Father
  - another witness in the legal sense
  rationale: The verse itself does not explicitly identify the referent, even though
    the broader context informs interpretation. To avoid importing an interpretive
    conclusion into the translation, the English preserves the text's own level of
    specificity.
  doctrine_reference: Preserve theological tension rather than resolve it.
