theological_decisions:
- issue: Meaning of κρίσις in this salvation context
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  rationale: The verse promises exemption from adverse eschatological judgment, but
    the noun itself is broader than explicit condemnation. Rendering it 'judgment'
    preserves the theological tension and lets the following clause clarify the salvific
    outcome.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the present and perfect verbs in relation to salvation
  chosen_reading: present possession of eternal life and completed passage from death
    to life
  alternative_readings:
  - purely future possession of life
  - only future acquittal at judgment
  rationale: The Greek uses present ἔχει and perfect μεταβέβηκεν, indicating a present
    reality and an accomplished transition with ongoing effect. The translation preserves
    these verbal aspects without importing a denominational system.
  doctrine_reference: Within historic orthodoxy without advocating a denominational
    distinctive unless the Greek unambiguously supports it.
