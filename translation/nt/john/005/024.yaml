id: JHN.5.24
reference: John 5:24
source:
  edition: SBLGNT
  text: Ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι ὁ τὸν λόγον μου ἀκούων καὶ πιστεύων τῷ πέμψαντί με
    ἔχει ζωὴν αἰώνιον, καὶ εἰς κρίσιν οὐκ ἔρχεται ἀλλὰ μεταβέβηκεν ἐκ τοῦ θανάτου
    εἰς τὴν ζωήν.
translation:
  text: Truly, truly, I say to you, whoever hears my word and believes him who sent
    me has eternal life, and does not come into judgment, but has passed from death
    into life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not come into condemnation.' The Greek κρίσις can mean 'judgment'
      generally or, in context, an adverse judgment.
    reason: lexical_alternative
  - marker: b
    text: 'The Greek perfect verb indicates a completed transition with continuing
      result: ''has passed over'' or ''has crossed over'' from death into life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled introductory formula while expressing its
    force in natural English. 'Truly, truly' is clear and preserves the solemnity
    better for modern readers than leaving 'Amen' untranslated.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the direct speech formula.
    'I tell you' is possible, but 'I say to you' stays slightly closer to the Greek
    without sounding unnatural.
- source_word: ὁ ... ἀκούων καὶ πιστεύων
  chosen: whoever hears ... and believes
  alternatives:
  - the one who hears ... and believes
  - he who hears ... and believes
  lexicon: BDAG
  rationale: The articular present participles denote a general, characteristic person.
    'Whoever' communicates the generic force idiomatically in English without introducing
    unnecessary masculine wording.
- source_word: τὸν λόγον μου
  chosen: my word
  alternatives:
  - my message
  - what I say
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' spoken message/word. 'My word' preserves
    the Johannine resonance and is sufficiently clear in context.
- source_word: πιστεύων τῷ πέμψαντί με
  chosen: believes him who sent me
  alternatives:
  - believes in him who sent me
  - trusts him who sent me
  lexicon: BDAG
  rationale: πιστεύω with the dative commonly means to believe or trust someone. 'Believes
    him who sent me' reflects the construction more directly than 'believes in,' while
    still being natural English. 'Trusts' is a viable nuance but 'believes' maintains
    lexical consistency with the default rendering of πιστεύω/πίστις language.
- source_word: ἔχει ζωὴν αἰώνιον
  chosen: has eternal life
  alternatives:
  - has age-lasting life
  lexicon: BDAG
  rationale: The present tense ἔχει indicates a present possession, and 'eternal life'
    is the established and contextually accurate rendering of ζωὴ αἰώνιος in John.
- source_word: εἰς κρίσιν οὐκ ἔρχεται
  chosen: does not come into judgment
  alternatives:
  - does not come into condemnation
  - does not come to judgment
  lexicon: BDAG
  rationale: κρίσις can denote judgment in a general or adverse sense. 'Judgment'
    is the broader and more textually restrained rendering; 'condemnation' may over-specify
    the result. 'Into judgment' preserves the force of εἰς.
- source_word: μεταβέβηκεν
  chosen: has passed
  alternatives:
  - has crossed over
  - has transferred
  lexicon: BDAG
  rationale: The perfect tense indicates a completed transition with abiding result.
    'Has passed' is idiomatic and preserves that completed movement without overtranslation.
- source_word: ἐκ τοῦ θανάτου εἰς τὴν ζωήν
  chosen: from death into life
  alternatives:
  - out of death into life
  lexicon: BDAG
  rationale: Preserves the stark Johannine contrast and the directional force of the
    prepositions. 'Into life' is slightly more vivid and closer to εἰς than simply
    'to life'.
