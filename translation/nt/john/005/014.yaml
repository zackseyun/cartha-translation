id: JHN.5.14
reference: John 5:14
source:
  edition: SBLGNT
  text: μετὰ ταῦτα εὑρίσκει αὐτὸν ὁ Ἰησοῦς ἐν τῷ ἱερῷ καὶ εἶπεν αὐτῷ· Ἴδε ὑγιὴς γέγονας·
    μηκέτι ἁμάρτανε, ἵνα μὴ χεῖρόν ⸂σοί τι⸃ γένηται.
translation:
  text: After these things Jesus found him in the temple and said to him, “See, you
    have become well. Sin no more, so that something worse may not happen to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “After these things.”
    reason: lexical_alternative
  - marker: b
    text: Greek “you have become well,” emphasizing the man's restored condition as
      the result of what has happened.
    reason: lexical_alternative
  - marker: c
    text: The warning does not explicitly state whether the earlier illness was caused
      by a specific sin, nor whether the “worse” outcome is temporal suffering, final
      judgment, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Later
  lexicon: BDAG
  rationale: Retains the plural demonstrative and Johannine narrative sequencing more
    closely than the smoother English 'After this.' 'After these things' is slightly
    more formal but still natural enough and preserves the source structure.
- source_word: εὑρίσκει
  chosen: found
  alternatives:
  - finds
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, standard English narrative
    style usually renders it as a past tense. This preserves readability while conveying
    the same event sequence.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple' is the standard concise rendering; 'temple courts' is possible but slightly
    more interpretive than the Greek requires.
- source_word: Ἴδε
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: BDAG
  rationale: '''See'' preserves the attention-getting force without archaic tone.
    ''Behold'' is too archaic for the stated translation philosophy; ''Look'' is possible
    but slightly more colloquial.'
- source_word: ὑγιὴς γέγονας
  chosen: you have become well
  alternatives:
  - you are well
  - you have been made well
  - you are healthy now
  lexicon: BDAG
  rationale: The perfect γέγονας highlights a resulting state from a completed change.
    'You have become well' preserves both the transition and present result better
    than the flatter 'you are well.'
- source_word: μηκέτι
  chosen: no more
  alternatives:
  - no longer
  - not anymore
  lexicon: BDAG
  rationale: Pairs naturally with the imperative and preserves the sense of ceasing
    an action from this point onward.
- source_word: ἁμάρτανε
  chosen: Sin
  alternatives:
  - keep sinning
  lexicon: BDAG
  rationale: Present imperative with μηκέτι can imply cessation of an ongoing or characteristic
    action. English idiom is best served by 'Sin no more,' which is concise and traditional
    without overstating aspect. 'Keep sinning' would over-interpret the aspect.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - lest
  - in order that ... not
  lexicon: BDAG
  rationale: Expresses purpose or intended result in clear modern English. 'Lest'
    is accurate but archaic.
- source_word: χεῖρόν
  chosen: worse
  alternatives:
  - something worse
  - a worse thing
  lexicon: BDAG
  rationale: Comparative adjective meaning 'worse.' In English it needs support from
    the following indefinite pronoun to form a natural clause.
- source_word: σοί τι
  chosen: something ... to you
  alternatives:
  - anything ... to you
  - a worse thing for you
  lexicon: BDAG
  rationale: The enclitic τι supplies the indefinite sense, yielding 'something worse.'
    The dative σοί is naturally rendered 'to you' with γένηται in this context.
- source_word: γένηται
  chosen: may not happen
  alternatives:
  - may not come about
  - may not occur
  - may not befall
  lexicon: BDAG
  rationale: Aorist middle subjunctive after ἵνα μὴ expresses a potential event. 'May
    not happen' is clear modern English; 'befall' is possible but more literary.
