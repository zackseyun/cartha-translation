theological_decisions:
- issue: Whether υἱὸς ἀνθρώπου should be rendered as a christological title or as
    a generic expression of humanity
  chosen_reading: Rendered as the title 'the Son of Man.'
  alternative_readings:
  - because he is a son of man
  - because he is human
  rationale: In John's Gospel, this expression is a recognized self-designation of
    Jesus with strong apocalyptic and messianic resonance. Rendering it generically
    would flatten the title and obscure the likely allusion to Daniel 7 and the Son's
    authority in the surrounding context. At the same time, the rationale for judgment
    authority may include his relation to humanity; this nuance is preserved in a
    footnote rather than replacing the title in the main text.
  doctrine_reference: 'Affirmations (Nicene/Chalcedonian bounds); Translation philosophy
    #3 and #4'
