id: JHN.5.27
reference: John 5:27
source:
  edition: SBLGNT
  text: καὶ ἐξουσίαν ἔδωκεν ⸀αὐτῷ κρίσιν ποιεῖν, ὅτι υἱὸς ἀνθρώπου ἐστίν.
translation:
  text: And he gave him authority to execute judgment, because he is the Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "because he is a son of man," that is, because he shares human nature.
      The main text preserves the likely title usage in John.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right
  - power
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes delegated authority or rightful jurisdiction,
    not merely raw power. In this context of the Father granting the Son judicial
    prerogative, 'authority' best captures the legal-governing sense.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - granted
  lexicon: BDAG
  rationale: The aorist of δίδωμι is straightforwardly 'gave.' 'Granted' is possible
    in context, but 'gave' preserves the direct verbal force while remaining natural
    English.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun referring to the Son in context; 'him' is the natural
    English object of 'gave.'
- source_word: κρίσιν ποιεῖν
  chosen: to execute judgment
  alternatives:
  - to judge
  - to carry out judgment
  lexicon: BDAG
  rationale: The idiom literally means 'to do/make judgment,' but in context it refers
    to carrying out judicial judgment. 'Execute judgment' preserves the formal judicial
    sense better than the flatter 'judge' while remaining idiomatic English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the grant of authority, not merely
    content. 'Because' best reflects the causal force in context.
- source_word: υἱὸς ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - a son of man
  lexicon: BDAG
  rationale: Although the Greek lacks the article before υἱός here, in Johannine context
    this functions as Jesus' established title, echoing Danielic and Gospel usage.
    English idiom and intertextual recognition strongly favor 'the Son of Man' rather
    than the indefinite 'a son of man.' This also preserves the title as a meaningful
    christological designation rather than reducing it to a generic human reference.
- source_word: ἐστίν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula; no contextual reason to expand or paraphrase.
