theological_decisions:
- issue: Whether to soften the Christological force of the clause about equality with
    God
  chosen_reading: Retained 'making himself equal with God' in the main text
  alternative_readings:
  - making himself equal to God
  - claiming equality with God
  rationale: The verse presents the Jews' reason for seeking to kill Jesus and explicitly
    states that his calling God his own Father entailed, in their understanding and
    in John's narration, equality with God. In keeping with Nicene orthodoxy and the
    translation philosophy, the rendering must not dilute the text's high Christology,
    while also not importing later doctrinal terminology not present in the verse.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language)'
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Kept 'the Jews' in the main text with contextual clarification in
    a footnote
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The source text says οἱ Ἰουδαῖοι. Replacing it in the main text with
    a narrower interpretive gloss would go beyond the lexical data. A footnote preserves
    the likely contextual nuance without obscuring the wording of the Greek.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
