id: JHN.5.18
reference: John 5:18
source:
  edition: SBLGNT
  text: διὰ τοῦτο οὖν μᾶλλον ἐζήτουν αὐτὸν οἱ Ἰουδαῖοι ἀποκτεῖναι ὅτι οὐ μόνον ἔλυε
    τὸ σάββατον, ἀλλὰ καὶ πατέρα ἴδιον ἔλεγε τὸν θεόν, ἴσον ἑαυτὸν ποιῶν τῷ θεῷ.
translation:
  text: For this reason, therefore, the Jews were seeking all the more to kill him,
    because he was not only breaking the Sabbath, but was also calling God his own
    Father, making himself equal with God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: In John, 'the Jews' often refers more specifically to Jesus' Judean opponents
      or certain Jewish authorities in context, not to every Jewish person without
      distinction.
    reason: cultural_note
  - marker: b
    text: Or 'making himself equal to God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο οὖν
  chosen: For this reason, therefore
  alternatives:
  - Therefore
  - For this reason
  lexicon: BDAG
  rationale: Retains both inferential particles rather than collapsing them, since
    John uses them cumulatively to intensify the logical connection with the preceding
    context.
- source_word: μᾶλλον
  chosen: all the more
  alternatives:
  - even more
  - more
  lexicon: BDAG
  rationale: Captures the comparative intensification of the Jews' intent in idiomatic
    modern English.
- source_word: ἐζήτουν ... ἀποκτεῖναι
  chosen: were seeking ... to kill
  alternatives:
  - were trying ... to kill
  - were seeking ... to put to death
  lexicon: BDAG
  rationale: The imperfect ἐζήτουν is best represented as ongoing or repeated action
    ('were seeking'). 'Kill' is more natural English than 'put to death' here while
    preserving the force of ἀποκτεῖναι.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek text reads 'the Jews' straightforwardly. Although in Johannine
    context the reference may often be to Judean authorities or opponents rather than
    the Jewish people as a whole, the translation preserves the lexical form of the
    source text and notes the contextual nuance in a footnote rather than narrowing
    the referent in the main text.
- source_word: ἔλυε τὸ σάββατον
  chosen: was ... breaking the Sabbath
  alternatives:
  - was loosening the Sabbath
  - was violating the Sabbath
  lexicon: BDAG
  rationale: λύω here is idiomatic for setting aside or violating Sabbath norms. 'Breaking
    the Sabbath' is the clearest natural rendering and reflects the accusation as
    narrated from the opponents' perspective.
- source_word: πατέρα ἴδιον ἔλεγε τὸν θεόν
  chosen: was ... calling God his own Father
  alternatives:
  - was saying that God was his own Father
  - was calling God Father in a unique sense
  lexicon: BDAG
  rationale: This preserves the verbal idea of ἔλεγε and the emphatic force of ἴδιον
    ('his own'), which signals a distinctive filial claim beyond a generic reference
    to God as Father.
- source_word: ἴσον ἑαυτὸν ποιῶν τῷ θεῷ
  chosen: making himself equal with God
  alternatives:
  - making himself equal to God
  - presenting himself as equal with God
  lexicon: BDAG
  rationale: This is the standard and precise sense of the participial clause. 'Equal
    with God' is idiomatic and preserves the accusatory inference drawn by the narrator
    concerning Jesus' claim.
