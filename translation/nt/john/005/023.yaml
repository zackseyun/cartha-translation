theological_decisions:
- issue: Force of the comparison between honoring the Son and honoring the Father
  chosen_reading: Rendered καθὼς as 'just as,' preserving the text's strong equivalence
    of honor without weakening it to mere similarity.
  alternative_readings:
  - Rendered as simple 'as'
  rationale: Given the doctrinal commitment to Nicene orthodoxy and the text's own
    wording, the translation should not soften the claim. At the same time, it should
    not import later creedal terminology into the verse. 'Just as' accurately reflects
    the Greek comparison and preserves the theological weight already present in the
    text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy #3'
- issue: Capitalization of 'Son' and 'Father'
  chosen_reading: Capitalized both as divine/personal titles in context.
  alternative_readings:
  - Lowercase 'son' and 'father'
  rationale: The Greek manuscripts themselves do not mark capitalization, so this
    is an English editorial decision. In this Johannine context the referents are
    clearly Jesus and God the Father; capitalization aids readers without adding doctrinal
    content beyond the discourse itself.
  doctrine_reference: 'Translation philosophy #6'
