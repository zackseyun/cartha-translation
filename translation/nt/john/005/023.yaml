id: JHN.5.23
reference: John 5:23
source:
  edition: SBLGNT
  text: ἵνα πάντες τιμῶσι τὸν υἱὸν καθὼς τιμῶσι τὸν πατέρα. ὁ μὴ τιμῶν τὸν υἱὸν οὐ
    τιμᾷ τὸν πατέρα τὸν πέμψαντα αὐτόν.
translation:
  text: so that all may honor the Son just as they honor the Father. The one who does
    not honor the Son does not honor the Father who sent him.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force without sounding overly formal.
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  - all people
  lexicon: BDAG
  rationale: The nominative plural means 'all' or 'all people.' 'All' is concise and
    idiomatic here, with the following verb making the sense clear.
- source_word: τιμῶσι / τιμῶν / τιμᾷ
  chosen: honor
  alternatives:
  - give honor to
  - esteem
  lexicon: BDAG
  rationale: τιμάω consistently denotes honoring or showing due regard. 'Honor' is
    the most direct and theologically weighty English equivalent, and it preserves
    the repeated verbal parallel across the verse.
- source_word: τὸν υἱὸν
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: In Johannine context this is a christological title, not a generic filial
    reference. Capitalizing 'Son' signals titular usage in English without adding
    content beyond the context.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: καθώς marks comparison. 'Just as' best conveys the strong correspondence
    between the honor due the Son and the honor due the Father.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: As with 'the Son,' this is a divine title in context. Capitalization
    reflects English convention for the personal designation of God in this discourse.
- source_word: ὁ μὴ τιμῶν
  chosen: the one who does not honor
  alternatives:
  - whoever does not honor
  - the person not honoring
  lexicon: BDAG
  rationale: The articular participle is rendered as a generic substantive. 'The one
    who does not honor' is both accurate and readable, preserving the gnomic force.
- source_word: τὸν πέμψαντα αὐτόν
  chosen: who sent him
  alternatives:
  - the one who sent him
  lexicon: BDAG
  rationale: The participial phrase modifies 'the Father.' English relative clause
    style is smoother than a second appositional noun phrase here, while preserving
    the Father's identity as the sender of the Son.
- source_word: πέμψαντα
  chosen: sent
  alternatives:
  - commissioned
  lexicon: BDAG
  rationale: πέμπω commonly means 'send.' 'Commissioned' would over-specify the nuance;
    'sent' is the plain sense and fits Johannine usage.
