id: JHN.5.30
reference: John 5:30
source:
  edition: SBLGNT
  text: Οὐ δύναμαι ἐγὼ ποιεῖν ἀπ’ ἐμαυτοῦ οὐδέν· καθὼς ἀκούω κρίνω, καὶ ἡ κρίσις ἡ
    ἐμὴ δικαία ἐστίν, ὅτι οὐ ζητῶ τὸ θέλημα τὸ ἐμὸν ἀλλὰ τὸ θέλημα τοῦ πέμψαντός ⸀με.
translation:
  text: I am not able to do anything from myself. Just as I hear, I judge, and my
    judgment is just, because I do not seek my own will, but the will of the one who
    sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I can do nothing on my own.' The Greek phrase can emphasize acting independently;
      here it is rendered 'from myself' to preserve the sense of source as well as
      independence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ δύναμαι ἐγὼ
  chosen: I am not able
  alternatives:
  - I can do
  - I am unable
  lexicon: BDAG
  rationale: Retains the explicit negated ability of δύναμαι with the emphatic ἐγώ.
    'I am not able' is slightly more formally transparent than 'I can do,' while remaining
    natural English.
- source_word: ποιεῖν ἀπ’ ἐμαυτοῦ οὐδέν
  chosen: to do anything from myself
  alternatives:
  - to do nothing on my own
  - to do anything by myself
  lexicon: BDAG
  rationale: ἀπ’ ἐμαυτοῦ indicates source/origin ('from myself'), not merely solitary
    action. This wording preserves the Johannine emphasis that the Son does not act
    independently from the Father. 'Anything' is idiomatic English for οὐδέν under
    negation.
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks correspondence between hearing and judging,
    preserving the comparative force.'
- source_word: ἀκούω
  chosen: I hear
  alternatives:
  - I listen
  - I am hearing
  lexicon: BDAG
  rationale: Simple present best reflects the Greek present and keeps the statement
    general and ongoing.
- source_word: κρίνω
  chosen: I judge
  alternatives:
  - I decide
  - I pass judgment
  lexicon: BDAG
  rationale: κρίνω is a key Johannine judicial term; 'judge' preserves lexical continuity
    with κρίσις later in the verse better than 'decide'.
- source_word: ἡ κρίσις ἡ ἐμὴ
  chosen: my judgment
  alternatives:
  - the judgment that is mine
  - my decision
  lexicon: BDAG
  rationale: Natural English rendering of the articular phrase while preserving the
    judicial sense and relation to κρίνω.
- source_word: δικαία
  chosen: just
  alternatives:
  - righteous
  - right
  lexicon: BDAG
  rationale: In context of judicial κρίσις, 'just' is the most contextually fitting
    English equivalent. 'Righteous' is possible but sounds less natural with 'judgment'
    in contemporary English.
- source_word: ζητῶ
  chosen: I seek
  alternatives:
  - I pursue
  - I aim for
  lexicon: BDAG
  rationale: ζητέω here expresses volitional aim. 'Seek' is both accurate and idiomatic,
    and preserves the verbal connection to desire/aim without overinterpreting.
- source_word: τὸ θέλημα τὸ ἐμὸν
  chosen: my own will
  alternatives:
  - my will
  - what I want
  lexicon: BDAG
  rationale: The possessive is emphatic in Greek; 'my own will' reflects that emphasis
    better than simply 'my will.' 'What I want' is too interpretive.
- source_word: τοῦ πέμψαντός με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: This participial expression is a common Johannine way of referring to
    the Father. 'The one who sent me' is clear, literal enough, and avoids importing
    'Father' where the Greek uses a relational description.
