theological_decisions:
- issue: Relation of the Son's action to the Father in ἀπ’ ἐμαυτοῦ
  chosen_reading: Rendered as 'from myself' to express non-independent action/source
    rather than inability in an absolute or ontological sense.
  alternative_readings:
  - on my own
  - by myself
  rationale: The verse speaks of the Son's perfect unity with and dependence on the
    Father in judgment, not a denial of the Son's deity or competence. The wording
    preserves the text's theological tension in line with Nicene and Chalcedonian
    orthodoxy without adding explanatory glosses to the main text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy #3'
- issue: δικαία with κρίσις
  chosen_reading: Rendered as 'just' rather than 'righteous.'
  alternative_readings:
  - righteous
  rationale: In a judicial context, 'just' best communicates the fairness and correctness
    of Jesus' judgment. This is a contextual lexical choice, not a denial of moral
    righteousness.
  doctrine_reference: 'Translation philosophy #5'
