id: JHN.5.26
reference: John 5:26
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ὁ πατὴρ ἔχει ζωὴν ἐν ἑαυτῷ, οὕτως ⸂καὶ τῷ υἱῷ ἔδωκεν⸃ ζωὴν ἔχειν
    ἐν ἑαυτῷ·
translation:
  text: For just as the Father has life in himself, so he also granted the Son to
    have life in himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave the Son to have life in himself.' The Greek verb is the ordinary
      word for 'gave'; 'granted' is used in the main text for natural English and
      to reflect bestowed prerogative.
    reason: lexical_alternative
  - marker: b
    text: '''Life in himself'' may be understood as life intrinsic to one''s own being;
      the translation preserves the Greek wording rather than using the theological
      shorthand ''self-existent life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Combines the explanatory γάρ with the comparative ὥσπερ in natural English
    while preserving the logical connection to the preceding context.
- source_word: ὁ πατὴρ
  chosen: the Father
  lexicon: BDAG
  rationale: Definite title referring to God as Father in Johannine usage; capitalization
    reflects titular/divine reference in English.
- source_word: ἔχει ζωὴν
  chosen: has life
  alternatives:
  - has life in himself
  - possesses life
  lexicon: BDAG
  rationale: A straightforward rendering of ἔχει + object. 'Has life' preserves the
    present-tense assertion without overexpansion.
- source_word: ζωὴν ἐν ἑαυτῷ
  chosen: life in himself
  alternatives:
  - life within himself
  - self-existent life
  lexicon: BDAG
  rationale: Keeps the prepositional phrase explicit. 'Self-existent life' captures
    an interpretive implication but goes beyond the wording, so it is avoided in the
    main text.
- source_word: οὕτως καὶ
  chosen: so he also
  alternatives:
  - so also
  - in the same way also
  lexicon: BDAG
  rationale: Represents the correlative structure ὥσπερ... οὕτως and preserves καί
    as 'also' in readable English.
- source_word: τῷ υἱῷ
  chosen: the Son
  lexicon: BDAG
  rationale: Dative indirect object after ἔδωκεν. Capitalization reflects the christological
    title in context.
- source_word: ἔδωκεν
  chosen: granted
  alternatives:
  - gave
  - has given
  lexicon: BDAG
  rationale: Aorist active indicative is best rendered as a simple past here. 'Granted'
    communicates bestowed prerogative in idiomatic English while avoiding the possible
    flatness of 'gave.'
- source_word: ζωὴν ἔχειν
  chosen: to have life
  alternatives:
  - life to have
  - to possess life
  lexicon: BDAG
  rationale: Natural English rendering of the complementary infinitive construction
    after ἔδωκεν.
- source_word: ἐν ἑαυτῷ
  chosen: in himself
  alternatives:
  - within himself
  lexicon: BDAG
  rationale: Maintains the repeated phrase exactly for consistency and to preserve
    the parallelism between Father and Son.
