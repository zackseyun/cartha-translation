theological_decisions:
- issue: Whether to make the verse explicitly teach 'self-existence' or 'aseity' in
    the main text
  chosen_reading: Retain the wording 'life in himself' without importing a technical
    theological term.
  alternative_readings:
  - self-existent life
  - aseity
  rationale: The verse strongly supports the idea of life intrinsic to the Father
    and, by grant, to the Son, but the Greek phrase itself is ἐν ἑαυτῷ. Preserving
    the biblical wording maintains theological weight without replacing it with later
    doctrinal shorthand.
  doctrine_reference: Preserve theological tension rather than resolve it; Nicene
    orthodoxy affirmed without importing claims beyond the text.
- issue: How to render ἔδωκεν in relation to the Father-Son relationship
  chosen_reading: Translate as 'granted' in a way that preserves the text's language
    of giving without diminishing the Son's full divinity.
  alternative_readings:
  - gave
  rationale: The text explicitly says the Father gave/granted the Son to have life
    in himself. The translation should neither soften this language nor add explanatory
    theology into the main text. Historic orthodoxy is preserved by translating the
    verse as written and allowing the broader Johannine context and creedally affirmed
    doctrine to stand.
  doctrine_reference: Nicene Creed (381 AD, including homoousios language); Preserve
    theological tension rather than resolve it.
