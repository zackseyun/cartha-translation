theological_decisions:
- issue: Forensic force of Jesus' statement about accusation
  chosen_reading: The verse is rendered with legal language ('accuse') rather than
    stronger judicial language such as 'condemn.'
  alternative_readings:
  - I will condemn you before the Father
  rationale: The Greek κατηγορέω denotes accusation or bringing charges, not the final
    act of condemnation. This preserves the text's legal imagery without importing
    a stronger doctrinal claim than the verse itself makes.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
- issue: Referent of hope placed in Moses
  chosen_reading: The text states that the audience has put hope 'in' Moses.
  alternative_readings:
  - in the law of Moses
  - in Moses' writings
  rationale: While the broader context connects Moses with his writings, the Greek
    names Moses directly. The translation preserves that wording and leaves the fuller
    interpretive implication to context rather than embedding it in the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
