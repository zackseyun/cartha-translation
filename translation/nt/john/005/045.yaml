id: JHN.5.45
reference: John 5:45
source:
  edition: SBLGNT
  text: μὴ δοκεῖτε ὅτι ἐγὼ κατηγορήσω ὑμῶν πρὸς τὸν πατέρα· ἔστιν ὁ κατηγορῶν ὑμῶν
    Μωϋσῆς, εἰς ὃν ὑμεῖς ἠλπίκατε.
translation:
  text: 'Do not think that I will accuse you before the Father; there is one who accuses
    you: Moses, in whom you have put your hope.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not suppose that I will bring charges against you before the Father.'
    reason: lexical_alternative
  - marker: b
    text: That is, Moses—the one in whom they placed their confidence, especially
      as the mediator and witness of the law—will stand as their accuser.
    reason: cross_reference
lexical_decisions:
- source_word: μὴ δοκεῖτε
  chosen: Do not think
  alternatives:
  - Do not suppose
  - Do not imagine
  lexicon: BDAG
  rationale: 'μή with the present imperative δοκεῖτε naturally gives a prohibition:
    ''do not think/suppose.'' ''Think'' is the clearest modern English and preserves
    the directness of Jesus'' warning.'
- source_word: κατηγορήσω
  chosen: I will accuse
  alternatives:
  - I will bring charges against
  - I will condemn
  lexicon: BDAG
  rationale: κατηγορέω means to accuse or bring charges. 'Accuse' best matches the
    legal/forensic sense here without overtranslating to 'condemn,' which would go
    beyond the lexical value.
- source_word: πρὸς τὸν πατέρα
  chosen: before the Father
  alternatives:
  - to the Father
  - in the presence of the Father
  lexicon: BDAG
  rationale: With a verb of accusation, πρός plus accusative can indicate direction
    toward a person, but in English the idiom 'accuse before' captures the courtroom-like
    setting more naturally than 'accuse to.' 'The Father' preserves the Johannine
    title.
- source_word: ἔστιν ὁ κατηγορῶν ὑμῶν
  chosen: there is one who accuses you
  alternatives:
  - the one accusing you is
  - there is an accuser of you
  lexicon: BDAG
  rationale: This construction introduces another accuser in contrast to Jesus. 'There
    is one who accuses you' is natural English and preserves the present participle's
    ongoing force.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: εἰς ὃν
  chosen: in whom
  alternatives:
  - on whom
  - in whose writings
  lexicon: BDAG
  rationale: ἐλπίζω with εἰς commonly expresses placing hope in someone. 'In whom'
    is the most direct rendering, even though the sense likely includes confidence
    in Moses as covenant mediator and in what he wrote. 'In whose writings' would
    be interpretive expansion beyond the Greek.
- source_word: ἠλπίκατε
  chosen: you have put your hope
  alternatives:
  - you have hoped
  - you have set your hope
  lexicon: BDAG
  rationale: The perfect tense indicates a settled or continuing stance. 'Have put
    your hope' communicates both the act and its abiding result more clearly than
    the flatter 'have hoped.'
