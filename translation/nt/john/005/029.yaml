id: JHN.5.29
reference: John 5:29
source:
  edition: SBLGNT
  text: καὶ ἐκπορεύσονται οἱ τὰ ἀγαθὰ ποιήσαντες εἰς ἀνάστασιν ζωῆς, οἱ ⸀δὲ τὰ φαῦλα
    πράξαντες εἰς ἀνάστασιν κρίσεως.
translation:
  text: and will come out—those who have done good to the resurrection of life, but
    those who have practiced evil to the resurrection of judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the resurrection of condemnation' for 'the resurrection of judgment.'
      The Greek says 'judgment,' which is broader; 'condemnation' reflects an interpretive
      narrowing found in some translations.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπορεύσονται
  chosen: will come out
  alternatives:
  - will go out
  - will come forth
  lexicon: BDAG
  rationale: In context of the dead hearing the Son's voice and emerging from tombs
    (v. 28–29), English idiom favors 'come out.' 'Come forth' is traditional but less
    natural in modern English; 'go out' is less fitting from the narrator's perspective.
- source_word: τὰ ἀγαθὰ
  chosen: good
  alternatives:
  - good things
  - what is good
  lexicon: BDAG
  rationale: 'The article + adjective functions substantivally/objectively with ποιήσαντες:
    ''done good.'' This is concise, idiomatic English and preserves the moral quality
    without over-specifying acts.'
- source_word: ποιήσαντες
  chosen: have done
  alternatives:
  - did
  - have practiced
  lexicon: BDAG
  rationale: Aorist participle describing completed deeds viewed as a whole. 'Have
    done' fits natural English in this eschatological summary and pairs well with
    the contrasting clause.
- source_word: ἀνάστασιν ζωῆς
  chosen: the resurrection of life
  alternatives:
  - a resurrection of life
  - resurrection to life
  lexicon: BDAG
  rationale: The anarthrous construction is qualitative, but in English 'the resurrection
    of life' best preserves the parallelism with the following phrase and the formal
    force of the genitive. 'Resurrection to life' is possible but slightly more interpretive.
- source_word: φαῦλα
  chosen: evil
  alternatives:
  - worthless things
  - bad things
  - base things
  lexicon: BDAG
  rationale: φαῦλος can denote what is morally bad, paltry, or worthless. In this
    judgment context, 'evil' best conveys the moral sense without sounding trivial,
    whereas 'bad things' is too weak and 'worthless things' underplays culpability.
- source_word: πράξαντες
  chosen: have practiced
  alternatives:
  - have done
  - committed
  lexicon: BDAG
  rationale: Using 'have practiced' distinguishes πράσσω from the earlier ποιέω and
    can suggest a pattern of conduct rather than isolated acts. This preserves a lexical
    distinction present in the Greek while remaining natural English.
- source_word: ἀνάστασιν κρίσεως
  chosen: the resurrection of judgment
  alternatives:
  - the resurrection of condemnation
  - a resurrection of judgment
  lexicon: BDAG
  rationale: κρίσις most basically means 'judgment.' Although some English traditions
    use 'damnation' or 'condemnation,' the Greek term itself is broader and should
    not be narrowed beyond the text. 'Judgment' preserves the theological tension
    and allows the context to define its severity.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - while
  lexicon: BDAG
  rationale: Here δέ marks contrast between the two groups and their destinies; 'but'
    makes that contrast explicit in clear English.
