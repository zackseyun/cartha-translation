id: JHN.5.20
reference: John 5:20
source:
  edition: SBLGNT
  text: ὁ γὰρ πατὴρ φιλεῖ τὸν υἱὸν καὶ πάντα δείκνυσιν αὐτῷ ἃ αὐτὸς ποιεῖ, καὶ μείζονα
    τούτων δείξει αὐτῷ ἔργα, ἵνα ὑμεῖς θαυμάζητε.
translation:
  text: For the Father loves the Son and shows him everything that he himself is doing;
    and he will show him greater works than these, so that you may marvel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you will marvel.' The Greek ἵνα with the subjunctive can express
      purpose and, in context, may also imply the resulting astonishment of Jesus'
      hearers.
    reason: alternative_reading
lexical_decisions:
- source_word: φιλεῖ
  chosen: loves
  alternatives:
  - is fond of
  - has affection for
  lexicon: BDAG
  rationale: Rendered as 'loves' for clear, natural English. Although φιλέω can emphasize
    affection or personal love, in Johannine usage it can overlap with ἀγαπάω; 'loves'
    best preserves the relational force without artificially weakening it.
- source_word: δείκνυσιν
  chosen: shows
  alternatives:
  - reveals
  - discloses
  lexicon: BDAG
  rationale: '''Shows'' is the most direct equivalent and preserves the concrete verbal
    link with the later future δείξει. ''Reveals'' is possible but slightly more interpretive.'
- source_word: πάντα
  chosen: everything
  alternatives:
  - all things
  lexicon: BDAG
  rationale: '''Everything'' is idiomatic modern English and accurately conveys the
    comprehensive scope of πάντα.'
- source_word: ἃ αὐτὸς ποιεῖ
  chosen: that he himself is doing
  alternatives:
  - that he does
  - what he himself does
  lexicon: BDAG
  rationale: 'The present tense ποιεῖ is kept with progressive force (''is doing'')
    to reflect ongoing divine action. αὐτός is represented by ''himself'' for emphasis:
    the Father shows the Son the things the Father himself does.'
- source_word: μείζονα τούτων ... ἔργα
  chosen: greater works than these
  alternatives:
  - works greater than these
  - greater deeds than these
  lexicon: BDAG
  rationale: '''Works'' is preferred in John because ἔργα often carries theological
    significance for Jesus'' deeds/signs. The comparative construction is rendered
    naturally as ''greater works than these.'''
- source_word: δείξει
  chosen: will show
  alternatives:
  - will reveal
  - will make known
  lexicon: BDAG
  rationale: Maintains lexical consistency with δείκνυσιν earlier in the verse and
    preserves the future tense.
- source_word: ἵνα ὑμεῖς θαυμάζητε
  chosen: so that you may marvel
  alternatives:
  - so that you may be amazed
  - so that you may wonder
  lexicon: BDAG
  rationale: '''Marvel'' preserves the elevated but still readable tone of θαυμάζω
    and fits the Johannine context of astonishment before Jesus'' works. ''You may''
    reflects the subjunctive after ἵνα without over-specifying purpose versus result.'
