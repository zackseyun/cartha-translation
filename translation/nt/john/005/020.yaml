theological_decisions:
- issue: Nature of the Father's love for the Son expressed by φιλέω rather than ἀγαπάω
  chosen_reading: Translate simply as 'loves' without implying a lesser or merely
    human affection.
  alternative_readings:
  - Translate with a more specific nuance such as 'has affection for'
  rationale: The verse speaks of the intimate relation between Father and Son. In
    John, φιλέω and ἀγαπάω can overlap, and rendering φιλέω with a diminished sense
    could import a theological distinction the text does not require. 'Loves' preserves
    orthodox Christological weight without overreading lexical nuance.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Referent and force of ἵνα ὑμεῖς θαυμάζητε
  chosen_reading: 'Render as purpose/result clause addressed to Jesus'' hearers: ''so
    that you may marvel.'''
  alternative_readings:
  - '''so that you will marvel'''
  rationale: The present subjunctive naturally supports 'may marvel.' This preserves
    the Greek syntax without forcing a stronger predictive sense. The plural 'you'
    refers to the audience, not to the Son.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
