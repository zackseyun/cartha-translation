id: JHN.5.43
reference: John 5:43
source:
  edition: SBLGNT
  text: ἐγὼ ἐλήλυθα ἐν τῷ ὀνόματι τοῦ πατρός μου καὶ οὐ λαμβάνετέ με· ἐὰν ἄλλος ἔλθῃ
    ἐν τῷ ὀνόματι τῷ ἰδίῳ, ἐκεῖνον λήμψεσθε.
translation:
  text: I have come in my Father's name, and you do not receive me. If another comes
    in his own name, you will receive him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with my Father's authority.' The Greek idiom 'in the name' can denote
      representation or authority as well as the name itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'on his own authority.' The phrase 'in his own name' contrasts sharply
      with Jesus' coming 'in my Father's name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλήλυθα
  chosen: have come
  alternatives:
  - came
  - am come
  lexicon: BDAG
  rationale: Perfect tense of ἔρχομαι conveys a present state resulting from prior
    coming; 'have come' best preserves that force in natural English.
- source_word: ἐν τῷ ὀνόματι τοῦ πατρός μου
  chosen: in my Father's name
  alternatives:
  - on behalf of my Father
  - with my Father's authority
  lexicon: BDAG
  rationale: The idiom 'in the name' can imply representation and authority, but the
    more literal rendering is clear and preserves the theological resonance without
    over-interpreting.
- source_word: λαμβάνετέ με
  chosen: you do not receive me
  alternatives:
  - you do not accept me
  - you do not welcome me
  lexicon: BDAG
  rationale: λαμβάνω here refers to receiving or accepting Jesus rather than physically
    taking him. 'Receive' preserves Johannine diction and allows both welcome and
    acceptance nuances.
- source_word: ἄλλος
  chosen: another
  alternatives:
  - someone else
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the contrast with Jesus without
    adding interpretive specificity.
- source_word: ἐν τῷ ὀνόματι τῷ ἰδίῳ
  chosen: in his own name
  alternatives:
  - on his own authority
  - in a name of his own
  lexicon: BDAG
  rationale: The phrase contrasts with 'in my Father's name.' 'In his own name' keeps
    the parallel structure and leaves the implications of self-authorization intact.
- source_word: ἐκεῖνον λήμψεσθε
  chosen: you will receive him
  alternatives:
  - you will accept that one
  - you will welcome him
  lexicon: BDAG
  rationale: Future middle of λαμβάνω is naturally rendered 'you will receive.' Repeating
    'receive' maintains the rhetorical contrast with the earlier clause.
- source_word: πατρός μου
  chosen: my Father's
  alternatives:
  - the Father who is mine
  lexicon: BDAG
  rationale: The possessive expression is idiomatic and in Johannine context refers
    to Jesus' Father; capitalizing 'Father' reflects titular/divine reference in English
    without altering the Greek sense.
