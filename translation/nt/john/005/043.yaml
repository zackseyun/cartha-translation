theological_decisions:
- issue: Whether to make explicit that 'my Father' refers to God the Father
  chosen_reading: Capitalize 'Father' in 'my Father's name' while keeping the translation
    otherwise literal.
  alternative_readings:
  - leave 'father' lowercase
  rationale: In Johannine context Jesus' reference is clearly to God, and English
    capitalization helps readers recognize the divine referent without adding content
    not present in the Greek.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Whether to interpret 'in my Father's name' and 'in his own name' as authority-language
    in the main text
  chosen_reading: Retain the idiom 'in ... name' in both clauses.
  alternative_readings:
  - '''with my Father''s authority'' / ''on his own authority'''
  rationale: The Greek idiom does carry authority and representation, but rendering
    it more explicitly would narrow the semantic range and reduce the deliberate parallelism
    of the verse. Preserving the idiom maintains theological tension and literary
    contrast.
  doctrine_reference: Translation philosophy §3
