theological_decisions:
- issue: Nature of Jesus' knowledge in γνοὺς
  chosen_reading: Render simply as narrative knowledge without specifying whether
    it was supernatural or naturally acquired.
  alternative_readings:
  - Jesus knew supernaturally
  - Jesus learned by ordinary observation or report
  rationale: The verse states that Jesus knew the man had been in this condition a
    long time, but it does not explain the means of that knowledge. The translation
    should preserve that textual restraint and not import a doctrinal conclusion beyond
    the wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
