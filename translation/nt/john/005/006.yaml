id: JHN.5.6
reference: John 5:6
source:
  edition: SBLGNT
  text: τοῦτον ἰδὼν ὁ Ἰησοῦς κατακείμενον, καὶ γνοὺς ὅτι πολὺν ἤδη χρόνον ἔχει, λέγει
    αὐτῷ· Θέλεις ὑγιὴς γενέσθαι;
translation:
  text: When Jesus saw this man lying there, and knew that he had already been there
    a long time, he said to him, “Do you want to become well?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that he had already had this condition a long time.”
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: The demonstrative points to the specific invalid man in context. 'This
    man' makes the referent explicit and natural in English, avoiding the overly bare
    'this one.'
- source_word: ἰδὼν
  chosen: saw
  alternatives:
  - having seen
  - noticed
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in English it is best rendered
    with a temporal clause, 'When Jesus saw…,' preserving the sequence without wooden
    participial style.
- source_word: κατακείμενον
  chosen: lying there
  alternatives:
  - lying down
  - laid there
  - reclining
  lexicon: BDAG
  rationale: The participle describes the man's prostrate condition at the pool. 'Lying
    there' is idiomatic and captures both posture and location implied by the scene.
- source_word: γνοὺς
  chosen: knew
  alternatives:
  - having known
  - learning
  - realizing
  lexicon: BDAG
  rationale: Aorist participle coordinated with ἰδών. 'Knew' in the temporal clause
    structure communicates Jesus' awareness straightforwardly; 'learning' would suggest
    acquisition of information, which the text does not specify.
- source_word: πολὺν ἤδη χρόνον ἔχει
  chosen: he had already been there a long time
  alternatives:
  - he had already had this condition a long time
  - he had already been ill a long time
  lexicon: BDAG
  rationale: Literally, 'he has already [for] a long time.' In context, this idiom
    refers to the duration of the man's condition/situation. 'Been there a long time'
    fits the narrative setting at the pool and reflects common Johannine English style,
    while acknowledging that the duration is of his infirm state in that place.
- source_word: λέγει αὐτῷ
  chosen: he said to him
  alternatives:
  - he says to him
  lexicon: BDAG
  rationale: Although λέγει is present (historical present), English narrative commonly
    shifts this to simple past for natural readability. The historical present nuance
    is not crucial enough here to preserve awkwardly.
- source_word: Θέλεις
  chosen: Do you want
  alternatives:
  - Do you wish
  - Are you willing
  lexicon: BDAG
  rationale: θέλω expresses desire or willingness. 'Do you want' is the clearest modern
    English rendering and fits the directness of Jesus' question.
- source_word: ὑγιὴς
  chosen: well
  alternatives:
  - healthy
  - whole
  - sound
  lexicon: BDAG
  rationale: The adjective means healthy/sound. 'Well' is idiomatic in English for
    recovery from illness or disability and fits the healing context better than the
    more clinical 'healthy.'
- source_word: γενέσθαι
  chosen: to become
  alternatives:
  - to be made
  - to be
  lexicon: BDAG
  rationale: The infinitive of γίνομαι emphasizes coming into a new state. 'Become
    well' preserves that ingressive sense better than simply 'be well.'
