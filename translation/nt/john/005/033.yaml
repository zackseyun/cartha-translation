theological_decisions:
- issue: Johannine use of 'the truth'
  chosen_reading: the truth
  alternative_readings:
  - truth
  rationale: The article is present in Greek and may carry Johannine theological weight,
    not merely an abstract quality. Rendering it as 'the truth' preserves both grammatical
    form and possible theological resonance without importing a more specific doctrinal
    claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
