id: JHN.5.33
reference: John 5:33
source:
  edition: SBLGNT
  text: ὑμεῖς ἀπεστάλκατε πρὸς Ἰωάννην, καὶ μεμαρτύρηκε τῇ ἀληθείᾳ·
translation:
  text: You sent to John, and he has testified to the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "has borne witness to the truth."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis because the verb already marks second
    person. English can convey this naturally with simple 'You' in context; 'you yourselves'
    would overstate the emphasis here.
- source_word: ἀπεστάλκατε
  chosen: sent
  alternatives:
  - have sent
  - dispatched
  lexicon: BDAG
  rationale: 'Aorist is best rendered here as simple past in idiomatic English: ''You
    sent to John.'' ''Have sent'' is possible but less natural in this narrative-referential
    context. ''Dispatched'' is too formal.'
- source_word: πρὸς Ἰωάννην
  chosen: to John
  alternatives:
  - to John the Baptist
  - toward John
  lexicon: BDAG
  rationale: πρός with a personal object here indicates direction toward a person,
    idiomatically 'to John.' The referent is John the Baptist in context, but the
    Greek names him simply 'John,' so the translation does the same.
- source_word: μεμαρτύρηκε
  chosen: has testified
  alternatives:
  - has borne witness
  - testified
  lexicon: BDAG
  rationale: The perfect tense suggests a past testimony with abiding relevance, which
    English 'has testified' captures well. 'Has borne witness' is more traditional
    and also valid, but 'testified' is clearer in modern English while preserving
    forensic/witness language.
- source_word: τῇ ἀληθείᾳ
  chosen: to the truth
  alternatives:
  - concerning the truth
  - for the truth
  lexicon: BDAG
  rationale: The dative after μαρτυρέω is commonly rendered 'testify to.' 'The truth'
    is the most direct rendering of ἀλήθεια here, preserving Johannine theological
    resonance without overexpansion.
