id: JHN.5.13
reference: John 5:13
source:
  edition: SBLGNT
  text: ὁ δὲ ἰαθεὶς οὐκ ᾔδει τίς ἐστιν, ὁ γὰρ Ἰησοῦς ἐξένευσεν ὄχλου ὄντος ἐν τῷ τόπῳ.
translation:
  text: But the man who had been healed did not know who he was, for Jesus had slipped
    away, since there was a crowd in the place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had withdrawn' or 'had slipped out.' The Greek verb suggests that Jesus
      departed unobtrusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰαθεὶς
  chosen: the man who had been healed
  alternatives:
  - the one who had been healed
  - the healed man
  lexicon: BDAG
  rationale: Aorist passive participle functioning substantivally with the article.
    'Had been healed' preserves the passive sense and prior action relative to the
    main verb. 'The man' is supplied naturally in English from the masculine singular
    form without overtranslating.
- source_word: οὐκ ᾔδει
  chosen: did not know
  alternatives:
  - was not aware
  lexicon: BDAG
  rationale: Standard rendering of οἶδα in context. 'Did not know' is the plain and
    idiomatic English equivalent.
- source_word: τίς ἐστιν
  chosen: who he was
  alternatives:
  - who it was
  lexicon: BDAG
  rationale: The clause refers to Jesus personally. 'Who he was' is natural English
    in indirect discourse and preserves the personal reference.
- source_word: ἐξένευσεν
  chosen: had slipped away
  alternatives:
  - withdrew
  - went away
  - slipped out
  lexicon: BDAG
  rationale: ἐκνεύω here conveys withdrawing unobtrusively or slipping away from notice.
    'Had slipped away' captures both the aorist action prior to the explanatory clause
    and the nuance of quiet departure better than the flatter 'went away.'
- source_word: ὄχλου ὄντος
  chosen: since there was a crowd
  alternatives:
  - because a crowd was present
  - with a crowd being there
  lexicon: BDAG
  rationale: Genitive absolute expressing attendant circumstance or reason. 'Since
    there was a crowd' is idiomatic and preserves the explanatory force without woodenly
    reproducing the participial structure.
- source_word: ἐν τῷ τόπῳ
  chosen: in the place
  alternatives:
  - in that place
  - there
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'In the place' stays close to the
    Greek while remaining readable; 'there' would be smoother but less explicit.
