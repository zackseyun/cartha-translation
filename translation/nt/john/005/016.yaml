theological_decisions:
- issue: Referent and translation of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: Following original-language primacy, the main text keeps the direct lexical
    rendering 'the Jews' rather than resolving the referent interpretively. Because
    John's usage can denote a more specific hostile group in context, an explanatory
    footnote is added so the translation does not encourage an anachronistic or totalizing
    reading against all Jewish people.
  doctrine_reference: Translation philosophy §§1, 3, 5
