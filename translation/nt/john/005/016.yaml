id: JHN.5.16
reference: John 5:16
source:
  edition: SBLGNT
  text: καὶ διὰ τοῦτο ἐδίωκον ⸂οἱ Ἰουδαῖοι τὸν Ἰησοῦν⸃ ὅτι ταῦτα ἐποίει ἐν σαββάτῳ.
translation:
  text: And because of this the Jews were persecuting Jesus, because he was doing
    these things on the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' or, contextually, 'the Jewish leaders.' In John, this term
      often refers to a particular group opposing Jesus, not to every Jewish person
      without distinction.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: because of this
  alternatives:
  - for this reason
  - therefore
  lexicon: BDAG
  rationale: The prepositional phrase points back to the preceding event as the cause.
    'Because of this' preserves the causal force more transparently than the more
    inferential 'therefore.'
- source_word: ἐδίωκον
  chosen: were persecuting
  alternatives:
  - were pursuing
  - were harassing
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. In Johannine context,
    διώκω commonly carries hostile opposition rather than mere physical pursuit. 'Were
    persecuting' best captures sustained antagonism without importing the later explicit
    intent to kill from v. 18.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is the standard plural ethnoreligious designation.
    It should not be paraphrased beyond the text into 'leaders' here, since that narrows
    the referent without explicit lexical warrant. 'Judeans' is possible in some Johannine
    contexts, but here the conflict is framed around Sabbath practice and the conventional
    rendering 'the Jews' remains the most direct. A footnote preserves the contextual
    nuance to avoid overgeneralization.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this kind of thing
  - such things
  lexicon: BDAG
  rationale: The plural demonstrative refers to the actions just narrated. 'These
    things' is a natural and sufficiently formal rendering that preserves the plural
    reference.
- source_word: ἐποίει
  chosen: was doing
  alternatives:
  - did
  - kept doing
  lexicon: BDAG
  rationale: The imperfect aspect is best represented with progressive force in English.
    'Was doing' keeps the focus on the action as ongoing in relation to the accusation.
- source_word: ἐν σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: Although the anarthrous singular can sometimes be rendered 'on a Sabbath,'
    English idiom and the narrative setting favor 'on the Sabbath' as the natural
    way to express Sabbath time.
