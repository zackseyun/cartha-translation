theological_decisions:
- issue: Metaphorical distinction between John and Jesus in Johannine light imagery
  chosen_reading: John is rendered as 'the lamp,' not 'the light,' preserving his
    subordinate, derivative witness.
  alternative_readings:
  - He was the light
  rationale: 'The Greek uses λύχνος rather than φῶς. In John''s Gospel this distinction
    matters theologically: John bears witness to the light but is not himself the
    ultimate light. The translation preserves that tension without importing extra
    explanation into the main text.'
  doctrine_reference: Translation philosophy §§1, 3, 5
