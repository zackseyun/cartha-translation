id: JHN.5.35
reference: John 5:35
source:
  edition: SBLGNT
  text: ἐκεῖνος ἦν ὁ λύχνος ὁ καιόμενος καὶ φαίνων, ὑμεῖς δὲ ἠθελήσατε ἀγαλλιαθῆναι
    πρὸς ὥραν ἐν τῷ φωτὶ αὐτοῦ·
translation:
  text: He was the lamp that was burning and shining, and you were willing to rejoice
    for a time in his light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a while.' The phrase means only for a limited time, not necessarily
      a literal hour.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - lampstand
  - light
  lexicon: BDAG
  rationale: λύχνος denotes a portable lamp, not light in the abstract. 'Lamp' preserves
    the distinction between John as a derivative source of illumination and Jesus
    as the light itself in Johannine context.
- source_word: καιόμενος
  chosen: was burning
  alternatives:
  - burning
  - kindled
  lexicon: BDAG
  rationale: The present participle describes an ongoing state. 'Was burning' fits
    the periphrastic English description of the lamp's active function and pairs naturally
    with 'shining.'
- source_word: φαίνων
  chosen: shining
  alternatives:
  - giving light
  - appearing
  lexicon: BDAG
  rationale: In this context the participle refers to emitting light, not merely appearing.
    'Shining' is concise and idiomatic alongside 'burning.'
- source_word: ἠθελήσατε
  chosen: you were willing
  alternatives:
  - you wanted
  - you chose
  lexicon: BDAG
  rationale: The aorist indicates their volitional response. 'Were willing' preserves
    the nuance of readiness or inclination without overstating sustained desire.
- source_word: ἀγαλλιαθῆναι
  chosen: to rejoice
  alternatives:
  - to exult
  - to delight greatly
  lexicon: BDAG
  rationale: The verb conveys strong joy or exultation. 'Rejoice' is natural modern
    English and sufficiently weighty; 'exult' is possible but less accessible.
- source_word: πρὸς ὥραν
  chosen: for a time
  alternatives:
  - for an hour
  - for a while
  lexicon: BDAG
  rationale: The idiom means a limited period, not a literal sixty minutes. 'For a
    time' preserves the temporary nature of their response.
- source_word: ἐν τῷ φωτὶ αὐτοῦ
  chosen: in his light
  alternatives:
  - by his light
  lexicon: BDAG
  rationale: The prepositional phrase is most naturally rendered 'in his light,' preserving
    the metaphor of basking within or in relation to John's illumination/testimony.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - That man
  - That one
  lexicon: BDAG
  rationale: The demonstrative refers emphatically to John the Baptist, but standard
    English can carry the reference with 'He' in context without awkwardness.
