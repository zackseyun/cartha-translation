id: JHN.5.31
reference: John 5:31
source:
  edition: SBLGNT
  text: Ἐὰν ἐγὼ μαρτυρῶ περὶ ἐμαυτοῦ, ἡ μαρτυρία μου οὐκ ἔστιν ἀληθής·
translation:
  text: If I testify about myself, my testimony is not true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my testimony is not valid,' reflecting the legal setting of witness
      testimony.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - Whenever
  - If ever
  lexicon: BDAG
  rationale: Introduces a conditional clause. Simple 'If' best fits the immediate
    argument without adding iterative nuance.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun is retained in English because it is present in the
    Greek and gives mild emphasis to Jesus as the subject.
- source_word: μαρτυρῶ
  chosen: testify
  alternatives:
  - bear witness
  - give testimony
  lexicon: BDAG
  rationale: '''Testify'' is natural modern English and preserves the forensic/witness
    sense of μαρτυρέω. ''Bear witness'' is possible but slightly more traditional
    in tone.'
- source_word: περὶ ἐμαυτοῦ
  chosen: about myself
  alternatives:
  - concerning myself
  - on my own behalf
  lexicon: BDAG
  rationale: περί with the genitive here means 'about/concerning.' 'About myself'
    is the most straightforward rendering. 'On my own behalf' would tilt toward an
    interpretive legal nuance not demanded by the phrase alone.
- source_word: ἡ μαρτυρία μου
  chosen: my testimony
  alternatives:
  - my witness
  lexicon: BDAG
  rationale: Cognate with μαρτυρῶ and keeps the legal-evidentiary sense. 'Testimony'
    reads more naturally than 'witness' in this clause in contemporary English.
- source_word: οὐκ ἔστιν ἀληθής
  chosen: is not true
  alternatives:
  - is not valid
  - is not trustworthy
  lexicon: BDAG
  rationale: ἀληθής can denote truthfulness or validity. 'Is not true' is the most
    direct lexical rendering and preserves the tension with John 8:14 without over-interpreting
    it as merely legal admissibility. The context may imply invalidity under witness
    standards, but that is better preserved as an alternative rather than made primary
    in the text.
