theological_decisions:
- issue: Meaning of Jesus' statement that his testimony is 'not true'
  chosen_reading: Render the clause straightforwardly as 'my testimony is not true'
    without softening it to purely legal language.
  alternative_readings:
  - my testimony is not valid
  - my testimony is not admissible
  rationale: The Greek says ἀληθής ('true'), and the translation should preserve the
    wording rather than resolve the interpretive tension by importing a narrower juridical
    sense. In context, Jesus is speaking within Jewish witness conventions, so 'valid'
    is a plausible interpretive alternative, but the main text should retain the lexical
    force of the Greek and let the broader discourse clarify the sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
