id: JHN.5.36
reference: John 5:36
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἔχω τὴν μαρτυρίαν ⸀μείζω τοῦ Ἰωάννου, τὰ γὰρ ἔργα ἃ ⸀δέδωκέν μοι ὁ
    πατὴρ ἵνα τελειώσω αὐτά, αὐτὰ τὰ ἔργα ⸀ἃ ποιῶ, μαρτυρεῖ περὶ ἐμοῦ ὅτι ὁ πατήρ
    με ἀπέσταλκεν,
translation:
  text: But I have testimony greater than John's, for the works that the Father has
    given me to complete—these very works that I am doing—testify about me that the
    Father has sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'witness greater than John's.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Both 'testimony' and 'witness' are possible in Johannine usage. 'Testimony'
    fits the object of ἔχω ('I have') naturally in English and preserves the evidentiary
    sense in the context of validating Jesus' identity.
- source_word: μείζω
  chosen: greater
  alternatives:
  - more important
  - superior
  lexicon: BDAG
  rationale: The comparative adjective indicates superiority in degree. 'Greater'
    is the most direct and idiomatic rendering in this comparison with John's testimony.
- source_word: τοῦ Ἰωάννου
  chosen: than John's
  alternatives:
  - than John
  - than the testimony of John
  lexicon: BDAG
  rationale: The genitive is elliptical, referring to John's testimony rather than
    merely John himself. 'Than John's' preserves the ellipsis naturally in English
    without over-expanding the text.
- source_word: ἔργα
  chosen: works
  alternatives:
  - deeds
  - actions
  lexicon: BDAG
  rationale: In John, ἔργα often refers to Jesus' divinely given deeds/signs with
    theological weight. 'Works' preserves that Johannine resonance better than the
    more generic 'actions' or 'deeds'.
- source_word: δέδωκέν μοι
  chosen: has given me
  alternatives:
  - gave me
  lexicon: BDAG
  rationale: The perfect tense suggests a completed act with ongoing result. 'Has
    given me' best reflects that aspect in English.
- source_word: ὁ πατήρ
  chosen: the Father
  lexicon: BDAG
  rationale: In Johannine context this is a christologically significant title for
    God in relation to Jesus. 'The Father' is the standard and accurate rendering.
- source_word: ἵνα τελειώσω αὐτά
  chosen: to complete
  alternatives:
  - that I might complete them
  - to finish them
  lexicon: BDAG
  rationale: ἵνα with the subjunctive here expresses purpose. 'To complete' is concise
    and natural, while preserving the sense of bringing the assigned works to their
    intended completion. 'Finish' is possible but slightly less weighty in this theological
    context.
- source_word: αὐτὰ τὰ ἔργα
  chosen: these very works
  alternatives:
  - the works themselves
  - those same works
  lexicon: BDAG
  rationale: The repeated αὐτά is emphatic. 'These very works' captures the emphasis
    and points back to the works just mentioned.
- source_word: ἃ ποιῶ
  chosen: that I am doing
  alternatives:
  - which I do
  - that I do
  lexicon: BDAG
  rationale: The present tense here is naturally rendered as progressive in English,
    highlighting Jesus' ongoing activity.
- source_word: μαρτυρεῖ περὶ ἐμοῦ
  chosen: testify about me
  alternatives:
  - bear witness about me
  - testify concerning me
  lexicon: BDAG
  rationale: '''Testify about me'' is clear modern English and preserves the legal/evidentiary
    nuance of μαρτυρέω with περί.'
- source_word: ἀπέσταλκεν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: 'The perfect tense again suggests abiding significance: the Father''s
    sending of the Son remains in force. ''Has sent'' reflects this better than a
    simple past.'
