theological_decisions:
- issue: Nature of the witness validating Jesus
  chosen_reading: Jesus claims that the Father's assigned works provide testimony
    greater than John's and confirm that the Father has sent him.
  alternative_readings:
  - The works are merely miracles proving authority without broader revelatory significance.
  rationale: The verse itself grounds the superior testimony in the works given by
    the Father and explicitly states their witness 'that the Father has sent me.'
    The translation preserves this claim without narrowing ἔργα to miracles alone,
    since in John the term can include the totality of Jesus' divinely commissioned
    activity.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Rendering of ὁ πατήρ in relation to Jesus
  chosen_reading: the Father
  alternative_readings:
  - God
  - my Father
  rationale: The Greek has the titular expression ὁ πατήρ, not an explicit possessive
    here. Rendering it as 'the Father' preserves the text's christological relation
    without adding wording not present.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
