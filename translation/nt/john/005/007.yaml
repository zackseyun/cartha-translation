id: JHN.5.7
reference: John 5:7
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτῷ ὁ ἀσθενῶν· Κύριε, ἄνθρωπον οὐκ ἔχω ἵνα ὅταν ταραχθῇ τὸ ὕδωρ
    βάλῃ με εἰς τὴν κολυμβήθραν· ἐν ᾧ δὲ ἔρχομαι ἐγὼ ἄλλος πρὸ ἐμοῦ καταβαίνει.
translation:
  text: The sick man answered him, “Lord, I have no one to put me into the pool when
    the water is stirred up; but while I am coming, another goes down before me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir.” The Greek word is κύριε, commonly rendered “Lord,” but in direct
      address it can also function as a respectful “sir.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἀσθενῶν
  chosen: the sick man
  alternatives:
  - the invalid
  - the one who was sick
  - the weak man
  lexicon: BDAG
  rationale: The present participle functions substantivally, referring to the man
    characterized by illness. 'The sick man' is natural modern English and preserves
    the personal reference without importing a clinical label. 'Invalid' is possible
    but sounds dated or potentially misleading in contemporary English.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In this narrative
    address it could idiomatically mean 'sir,' but 'Lord' preserves the lexical value
    and remains natural in direct address. This does not by itself assert a full christological
    confession from the speaker.
- source_word: ἄνθρωπον
  chosen: no one
  alternatives:
  - no man
  - no person
  lexicon: BDAG
  rationale: Although ἄνθρωπος is singular and masculine in form, here it refers generically
    to any human helper. 'No one' best conveys the idiomatic sense in contemporary
    English while matching the source intent rather than forcing an unnecessarily
    gendered English expression.
- source_word: ταραχθῇ τὸ ὕδωρ
  chosen: the water is stirred up
  alternatives:
  - the water is disturbed
  - the water is agitated
  lexicon: BDAG
  rationale: The passive aorist subjunctive of ταράσσω here refers to the troubling
    or agitation of the water. 'Stirred up' is idiomatic and concrete, fitting the
    pool context better than the more abstract 'disturbed.'
- source_word: βάλῃ με εἰς τὴν κολυμβήθραν
  chosen: put me into the pool
  alternatives:
  - throw me into the pool
  - place me into the pool
  lexicon: BDAG
  rationale: βάλλω can be more forceful ('throw'), but in this healing context English
    'put' better reflects the intended assistance without suggesting violence. κολυμβήθρα
    is 'pool' rather than a more technical or archaic term.
- source_word: ἐν ᾧ δὲ ἔρχομαι ἐγώ
  chosen: but while I am coming
  alternatives:
  - but while I am on my way
  - and while I am going
  lexicon: BDAG
  rationale: 'The expression is temporal: during the time in which he is making his
    way. ''While I am coming'' stays close to the Greek and communicates his ongoing
    attempt to reach the water. The adversative δέ is represented by ''but.'''
- source_word: ἄλλος πρὸ ἐμοῦ καταβαίνει
  chosen: another goes down before me
  alternatives:
  - someone else goes down ahead of me
  - another steps down before me
  lexicon: BDAG
  rationale: καταβαίνει is literally 'goes down,' appropriate because one descends
    into the pool. 'Before me' preserves both temporal priority and the sense of being
    ahead of him.
