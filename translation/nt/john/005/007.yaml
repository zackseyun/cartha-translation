theological_decisions:
- issue: Force of Κύριε in address to Jesus
  chosen_reading: Rendered as 'Lord' in keeping with the default rendering of κύριος,
    without implying that the speaker necessarily expresses full theological recognition
    of Jesus' identity.
  alternative_readings:
  - Sir
  rationale: The term can function as a respectful address in narrative dialogue.
    The translation keeps the lexical consistency required by doctrine while avoiding
    over-interpretation in commentary.
