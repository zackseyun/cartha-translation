id: JHN.5.46
reference: John 5:46
source:
  edition: SBLGNT
  text: εἰ γὰρ ἐπιστεύετε Μωϋσεῖ, ἐπιστεύετε ἂν ἐμοί, περὶ γὰρ ἐμοῦ ἐκεῖνος ἔγραψεν.
translation:
  text: For if you believed Moses, you would believe me, for he wrote about me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you would trust me.' The same Greek verb is used in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'for that one wrote concerning me,' with 'that one' reflecting the emphatic
      demonstrative 'ἐκεῖνος.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For if indeed
  lexicon: BDAG
  rationale: γάρ links this statement to the preceding argument, so 'for' is retained
    rather than omitted. εἰ introduces the condition.
- source_word: ἐπιστεύετε
  chosen: you believed
  alternatives:
  - you were believing
  - you trusted
  lexicon: BDAG
  rationale: Imperfect indicative in the protasis is best rendered with simple past
    in idiomatic English. 'Believed' preserves the verbal link with the following
    ἐπιστεύετε; 'trusted' is possible but less consistent here.
- source_word: Μωϋσεῖ
  chosen: Moses
  lexicon: BDAG
  rationale: Dative after πιστεύω indicates the person believed. Standard transliteration
    of the proper name is used.
- source_word: ἐπιστεύετε ἂν ἐμοί
  chosen: you would believe me
  alternatives:
  - you would believe in me
  - you would trust me
  lexicon: BDAG
  rationale: The combination of imperfect with ἄν expresses the apodosis of a contrary-to-fact
    condition, hence 'would believe.' With the dative ἐμοί, 'believe me' is the most
    direct rendering; 'believe in me' would overtranslate by importing the preposition
    εἰς, which is not present.
- source_word: περὶ γὰρ ἐμοῦ
  chosen: for ... about me
  alternatives:
  - for ... concerning me
  - for ... of me
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'about' or 'concerning.' 'About
    me' is natural modern English and preserves the referential force.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  lexicon: BDAG
  rationale: Though demonstrative in form, in this context it refers back emphatically
    to Moses. English 'he' is the natural rendering; the emphatic force is sufficiently
    carried by context.
- source_word: ἔγραψεν
  chosen: wrote
  alternatives:
  - has written
  lexicon: BDAG
  rationale: Aorist indicative is most naturally rendered as simple past here. English
    present perfect is possible in some contexts but is not required by the Greek.
