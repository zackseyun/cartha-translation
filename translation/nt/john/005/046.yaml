theological_decisions:
- issue: Nature of Moses' witness to Jesus
  chosen_reading: for he wrote about me
  alternative_readings:
  - for he wrote concerning me
  rationale: The verse asserts that Moses' writings bear witness to Jesus without
    specifying a single passage or requiring an exhaustive christological hermeneutic
    in the translation itself. The wording should preserve the claim without expanding
    it doctrinally beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
