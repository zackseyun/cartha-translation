theological_decisions:
- issue: Nature of Jesus' command in a healing context
  chosen_reading: Render the three imperatives straightforwardly as direct physical
    commands without adding interpretive language about healing or miracle.
  alternative_readings:
  - Expanded renderings such as 'Stand up and be healed'
  rationale: The Greek text itself gives commands to rise, lift the mat, and walk.
    The healing implication is contextually obvious but not lexically stated in this
    verse, so the translation should not import it.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve the text''s own wording.'
