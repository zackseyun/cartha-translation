id: JHN.5.8
reference: John 5:8
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· ⸀Ἔγειρε ἆρον τὸν κράβαττόν σου καὶ περιπάτει.
translation:
  text: Jesus says to him, “Get up, pick up your mat, and walk.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “take up your bed.” The Greek term refers to a simple sleeping mat or
      pallet, not necessarily a full bed.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says' to reflect the Greek present
    tense, a common Johannine narrative feature. English could smooth this to 'said,'
    but preserving the present better reflects the source without sounding unnatural.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative indirect object; no contextual reason to expand or alter.
- source_word: Ἔγειρε
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: Imperative of ἐγείρω here calls for immediate rising from his invalid
    state. 'Get up' is natural modern English and preserves the force of the command
    better than the more formal 'Rise.' 'Stand up' is possible but slightly narrower
    than the broader sense of getting up.
- source_word: ἆρον
  chosen: pick up
  alternatives:
  - take up
  - carry
  lexicon: BDAG
  rationale: Imperative of αἴρω means to lift or take up. 'Pick up' is clear, idiomatic
    modern English. 'Take up' is traditional and viable, but 'pick up' better matches
    contemporary usage while preserving the physical action.
- source_word: κράβαττόν
  chosen: mat
  alternatives:
  - bed
  - pallet
  - cot
  lexicon: BDAG
  rationale: κράβαττος refers to a simple sleeping pad or pallet rather than a substantial
    bed. 'Mat' best conveys a light portable sleeping surface, fitting the command
    to carry it. 'Bed' is traditional but can mislead modern readers toward a heavier
    piece of furniture.
- source_word: περιπάτει
  chosen: walk
  alternatives:
  - be walking
  - go on walking
  lexicon: BDAG
  rationale: Imperative of περιπατέω here denotes walking physically. 'Walk' is the
    most natural English imperative. More durative renderings such as 'go on walking'
    over-specify aspect beyond what is needed in English.
