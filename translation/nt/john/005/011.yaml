theological_decisions:
- issue: Potential theological nuance of the healing description
  chosen_reading: made me well
  alternative_readings:
  - made me whole
  rationale: The verse reports physical healing in context. 'Made me whole' could
    be read with broader spiritual implications not demanded by the immediate Greek.
    The translation preserves the concrete healing claim without importing additional
    doctrinal meaning.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
