id: JHN.5.11
reference: John 5:11
source:
  edition: SBLGNT
  text: ⸂ὃς δὲ⸃ ἀπεκρίθη αὐτοῖς· Ὁ ποιήσας με ὑγιῆ ἐκεῖνός μοι εἶπεν Ἆρον τὸν κράβαττόν
    σου καὶ περιπάτει.
translation:
  text: But he answered them, “The one who made me well—that one said to me, ‘Pick
    up your mat and walk.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take up your mat and walk.”
    reason: lexical_alternative
  - marker: b
    text: Or “bed”; the Greek refers to a simple sleeping mat or pallet.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the most direct and common
    rendering in Johannine dialogue.
- source_word: Ὁ ποιήσας με ὑγιῆ
  chosen: The one who made me well
  alternatives:
  - He who made me well
  - The man who made me healthy
  lexicon: BDAG
  rationale: The articular participle is naturally rendered as 'the one who...'. ποιέω
    with ὑγιής here means to cause to be well/healthy. 'Made me well' is idiomatic
    modern English and fits the healing context better than the more clinical 'made
    me healthy.'
- source_word: ὑγιῆ
  chosen: well
  alternatives:
  - healthy
  - whole
  lexicon: BDAG
  rationale: In a healing narrative, 'well' is the most natural English predicate
    complement. 'Whole' can carry theological overtones not explicit here.
- source_word: ἐκεῖνός
  chosen: that one
  alternatives:
  - he
  - that man
  lexicon: BDAG
  rationale: The pronoun is emphatic in Greek. The English text preserves this emphasis
    with 'that one' set off by a dash, rather than flattening it to a simple 'he.'
- source_word: Ἆρον
  chosen: Pick up
  alternatives:
  - Take up
  - Lift
  lexicon: BDAG
  rationale: Aorist imperative of αἴρω here calls for a concrete action. 'Pick up'
    is clear modern English; 'take up' is traditional and viable but slightly less
    natural for many readers.
- source_word: κράβαττόν
  chosen: mat
  alternatives:
  - bed
  - pallet
  - stretcher
  lexicon: BDAG
  rationale: κράβαττος refers to a simple sleeping pad or mat, not necessarily a full
    bed. 'Mat' best reflects the likely object in accessible modern English. 'Bed'
    is traditional but can mislead modern readers toward a larger piece of furniture.
- source_word: περιπάτει
  chosen: walk
  alternatives:
  - keep walking
  - go on walking
  lexicon: BDAG
  rationale: Present imperative can suggest continued action, but in this healing
    command idiomatic English uses 'walk.' More explicitly progressive renderings
    are possible but sound less natural and are not required by the context.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or continuation. 'But' fits the adversative
    sense in response to the accusation.
