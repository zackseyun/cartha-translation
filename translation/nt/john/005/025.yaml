theological_decisions:
- issue: Referent of 'the dead' in Johannine context
  chosen_reading: Rendered simply as 'the dead' without interpretive expansion, preserving
    the text's tension between present spiritual vivification and future bodily resurrection.
  alternative_readings:
  - spiritually dead persons
  - the physically dead
  rationale: The immediate phrase 'and now is' suggests a present dimension, while
    the broader context of John 5 also includes bodily resurrection. The translation
    should not collapse this tension into only one doctrinally loaded interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological title 'the Son of God'
  chosen_reading: Retained as 'the Son of God' in the main text.
  rationale: This directly reflects the Greek and coheres with historic orthodox Christology
    without importing additional explanatory wording beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Chalcedon (451 AD)'
