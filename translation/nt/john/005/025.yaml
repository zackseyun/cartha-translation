id: JHN.5.25
reference: John 5:25
source:
  edition: SBLGNT
  text: Ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι ἔρχεται ὥρα καὶ νῦν ἐστιν ὅτε οἱ νεκροὶ ⸀ἀκούσουσιν
    τῆς φωνῆς τοῦ υἱοῦ τοῦ θεοῦ καὶ οἱ ἀκούσαντες ⸀ζήσουσιν.
translation:
  text: Truly, truly, I say to you that an hour is coming, and now is, when the dead
    will hear the voice of the Son of God, and those who hear will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Amen, amen, I say to you.'
    reason: lexical_alternative
  - marker: b
    text: '''Hour'' can also be understood more broadly as ''time,'' but the Greek
      specifically says ''hour.'''
    reason: lexical_alternative
  - marker: c
    text: '''The dead'' may include a present spiritual sense here (''and now is'')
      while also anticipating bodily resurrection in the surrounding context.'
    reason: cross_reference
  - marker: d
    text: Or 'those who have heard will live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most certainly
  lexicon: BDAG
  rationale: Retains the solemn emphatic repetition while using natural English. 'Amen,
    amen' is more formally transparent but less immediately clear to many readers;
    'truly, truly' is established and readable.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the direct address and Johannine
    cadence. 'I tell you' is possible but slightly more idiomatic.
- source_word: ἔρχεται ὥρα
  chosen: an hour is coming
  alternatives:
  - the hour is coming
  - a time is coming
  lexicon: BDAG
  rationale: The anarthrous ὥρα is best rendered 'an hour' here. 'Hour' is preserved
    rather than generalized to 'time' because it is a significant Johannine term with
    eschatological weight.
- source_word: καὶ νῦν ἐστιν
  chosen: and now is
  alternatives:
  - and is now here
  - and now exists
  lexicon: BDAG
  rationale: Keeps the compressed Greek expression and preserves the realized-and-future
    tension of the saying. 'Is now here' is smoother but slightly more interpretive.
- source_word: οἱ νεκροὶ
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: Standard and natural rendering of the substantival adjective, preserving
    both possible physical and spiritual resonance without narrowing the referent.
- source_word: ἀκούσουσιν τῆς φωνῆς
  chosen: will hear the voice
  alternatives:
  - will hear the sound
  - will listen to the voice
  lexicon: BDAG
  rationale: φωνή here is best rendered 'voice' in a personal context, and ἀκούω with
    the genitive is naturally 'hear' rather than the more responsive 'listen to.'
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  chosen: of the Son of God
  alternatives:
  - of God's Son
  lexicon: BDAG
  rationale: Preserves the full christological title in its traditional and transparent
    form.
- source_word: οἱ ἀκούσαντες
  chosen: those who hear
  alternatives:
  - those who have heard
  - the ones who hear
  lexicon: BDAG
  rationale: Although the participle is aorist ('having heard'), English often renders
    such participles more naturally with a present sense in a future-oriented condition-result
    statement. This avoids awkwardness while preserving the sense that hearing the
    Son's voice is the condition for life.
- source_word: ζήσουσιν
  chosen: will live
  alternatives:
  - will come to life
  lexicon: BDAG
  rationale: The verb ζάω means 'live'; 'will come to life' would foreground resurrection
    more explicitly than the Greek itself requires in this verse, where both spiritual
    enlivening and resurrection resonance may be present.
