id: JHN.5.2
reference: John 5:2
source:
  edition: SBLGNT
  text: ἔστιν δὲ ἐν τοῖς Ἱεροσολύμοις ἐπὶ τῇ προβατικῇ κολυμβήθρα ἡ ἐπιλεγομένη Ἑβραϊστὶ
    ⸀Βηθεσδά, πέντε στοὰς ἔχουσα·
translation:
  text: Now there is in Jerusalem, by the Sheep Gate, a pool called Bethesda in Hebrew,
    having five porticoes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Aramaic'; John's expression 'in Hebrew' often refers to the local
      Semitic language of Judea rather than classical Hebrew strictly speaking.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'Bethzatha' or 'Bethsaida' instead of 'Bethesda.'
    reason: textual_variant
  - marker: c
    text: The Greek likely refers to the area of the Sheep Gate (compare Nehemiah
      3:1; 12:39), with 'Gate' understood though not explicitly stated here.
    reason: cross_reference
lexical_decisions:
- source_word: ἔστιν δὲ
  chosen: Now there is
  alternatives:
  - Now there was
  - And there is
  lexicon: BDAG
  rationale: Present tense ἔστιν is best retained as 'there is.' δέ is lightly connective;
    'Now' gives natural discourse transition without overstating contrast.
- source_word: ἐν τοῖς Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - in Jerusalem city
  lexicon: BDAG
  rationale: Although Ἱεροσόλυμα is morphologically plural, standard English idiom
    uses the singular place name 'Jerusalem.'
- source_word: ἐπὶ τῇ προβατικῇ
  chosen: by the Sheep Gate
  alternatives:
  - at the Sheep Pool
  - by the sheep market
  - near the sheep gate
  lexicon: BDAG
  rationale: The phrase is elliptical. προβατική can mean 'sheep-place' and likely
    refers to the Sheep Gate/area known from Jerusalem topography. Because κολυμβήθρα
    follows as the subject ('a pool'), rendering ἐπὶ τῇ προβατικῇ as 'by the Sheep
    Gate' avoids the awkward and less likely sense 'a pool at the pool.' The supplied
    noun 'Gate' is interpretive but widely judged contextually appropriate.
- source_word: κολυμβήθρα
  chosen: a pool
  alternatives:
  - a reservoir
  - a bathing pool
  lexicon: BDAG
  rationale: Standard term for a pool; 'pool' is the clearest natural English equivalent.
- source_word: ἡ ἐπιλεγομένη
  chosen: called
  alternatives:
  - which is called
  - named
  lexicon: BDAG
  rationale: The participle introduces the pool's name. 'Called' is concise and natural
    in English while preserving the sense.
- source_word: Ἑβραϊστὶ
  chosen: in Hebrew
  alternatives:
  - in Aramaic
  - in the Hebrew language
  lexicon: BDAG
  rationale: John's Ἑβραϊστί conventionally refers to the local Semitic language,
    often Aramaic, but the text says 'Hebrew.' Per source-language primacy, the main
    text keeps 'in Hebrew,' while the likely linguistic nuance is preserved in a footnote.
- source_word: Βηθεσδά
  chosen: Bethesda
  alternatives:
  - Bethzatha
  - Bethsaida
  lexicon: NA28/SBLGNT textual tradition
  rationale: Given the provided SBLGNT source text reads Βηθεσδά, the translation
    follows it as 'Bethesda.' Other well-known textual forms are preserved in a footnote
    as variants.
- source_word: πέντε στοὰς ἔχουσα
  chosen: having five porticoes
  alternatives:
  - with five colonnades
  - having five covered walkways
  lexicon: BDAG
  rationale: στοά denotes a covered colonnade/portico. 'Porticoes' is accurate and
    readable; 'having' preserves the participial construction.
