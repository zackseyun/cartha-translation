id: JHN.5.47
reference: John 5:47
source:
  edition: SBLGNT
  text: εἰ δὲ τοῖς ἐκείνου γράμμασιν οὐ πιστεύετε, πῶς τοῖς ἐμοῖς ῥήμασιν πιστεύσετε;
translation:
  text: But if you do not believe his writings, how will you believe my words?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his letters.' The Greek word can denote letters or writings; here it
      refers to what Moses wrote.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - If, however
  - But if indeed
  lexicon: BDAG
  rationale: Renders the conditional particle εἰ with δέ as a contrastive transition
    from the previous argument. 'But if' is natural English and preserves the adversative
    force.
- source_word: τοῖς ἐκείνου γράμμασιν
  chosen: his writings
  alternatives:
  - that one's writings
  - his Scriptures
  - his letters
  lexicon: BDAG
  rationale: γράμμα can mean 'writing' or 'letter'; here, in context of Moses (preceding
    verses), it refers to what he wrote, not private correspondence. 'Writings' is
    clearer and more idiomatic than 'letters' and avoids over-specifying as 'Scriptures,'
    though that is contextually implied.
- source_word: οὐ πιστεύετε
  chosen: you do not believe
  alternatives:
  - you are not believing
  - you do not trust
  lexicon: BDAG
  rationale: πιστεύω with the dative here is best rendered 'believe' in the sense
    of accepting as true/credible. Present tense is conveyed with simple English present.
- source_word: πῶς
  chosen: how will
  alternatives:
  - how can
  - in what way will
  lexicon: BDAG
  rationale: πῶς asks how belief in Jesus' words could follow from disbelief in Moses'
    writings. 'How will' preserves the future orientation created by πιστεύσετε better
    than the more interpretive 'how can.'
- source_word: τοῖς ἐμοῖς ῥήμασιν
  chosen: my words
  alternatives:
  - my sayings
  - my statements
  lexicon: BDAG
  rationale: ῥῆμα often denotes spoken words or utterances. 'My words' is natural
    English and preserves the contrast with Moses' 'writings' without sounding overly
    technical.
- source_word: πιστεύσετε
  chosen: you believe
  alternatives:
  - you trust
  - you come to believe
  lexicon: BDAG
  rationale: Future indicative is expressed in English by 'will you believe' in the
    full clause. The same English gloss as the earlier πιστεύετε preserves lexical
    consistency for πιστεύω in this verse.
