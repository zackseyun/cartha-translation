theological_decisions:
- issue: Referent of 'his' / 'that one' (ἐκείνου)
  chosen_reading: '''his'' refers to Moses in the immediate context'
  alternative_readings:
  - a more generic antecedent
  rationale: The preceding context (John 5:45–46) explicitly names Moses as the one
    in whom the hearers have set hope and the one who wrote about Jesus. The pronoun
    is therefore translated simply as 'his' rather than repeating 'Moses' in the main
    text, preserving the Greek's cohesion while keeping the referent clear from context.
- issue: Nature of belief language
  chosen_reading: Translate πιστεύω consistently as 'believe' rather than 'trust'
    in this verse
  alternative_readings:
  - translate as 'trust'
  rationale: Although πιστεύω can overlap with 'trust,' this context emphasizes accepting
    the testimony of Moses' writings and Jesus' words as true. 'Believe' best fits
    both clauses and preserves the rhetorical parallel.
  doctrine_reference: 'Contested terms: πίστις default English ''faith''; related
    verb here rendered consistently with belief/faith language.'
