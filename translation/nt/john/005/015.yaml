theological_decisions:
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Retain 'the Jews' in the main text and note the contextual possibility
    of 'the Jewish leaders' or 'the Judeans' in a footnote.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation philosophy prioritizes original-language primacy and
    avoids importing interpretive narrowing into the main text unless the wording
    unambiguously requires it. Because Ἰουδαίοις can carry contextual nuance in John,
    the alternatives are preserved in a footnote rather than resolved in the main
    text.
  doctrine_reference: Translation philosophy items 1 and 3
