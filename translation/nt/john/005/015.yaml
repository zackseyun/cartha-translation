id: JHN.5.15
reference: John 5:15
source:
  edition: SBLGNT
  text: ἀπῆλθεν ὁ ἄνθρωπος καὶ ⸀ἀνήγγειλεν τοῖς Ἰουδαίοις ὅτι Ἰησοῦς ἐστιν ὁ ποιήσας
    αὐτὸν ὑγιῆ.
translation:
  text: The man went away and reported to the Jews that Jesus was the one who had
    made him well.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Jewish leaders' or 'to the Judeans,' depending on how John's
      use of 'the Jews' is understood in context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - went off
  - departed
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι indicates departure from the scene. 'Went away' is
    natural modern English and preserves the movement without sounding overly formal
    like 'departed.'
- source_word: ὁ ἄνθρωπος
  chosen: The man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: The singular masculine noun refers to the healed male individual in context.
    'The man' is gender-accurate and matches the narrative reference.
- source_word: ἀνήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  - informed
  lexicon: BDAG
  rationale: ἀναγγέλλω can mean to report, announce, or make known. 'Reported' fits
    the context of conveying information to the Jewish authorities without overstating
    publicity implied by 'announced.'
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Jewish leaders
  - to the Judeans
  lexicon: BDAG
  rationale: The Greek text says 'to the Jews.' In John's Gospel this often refers
    contextually to Judean authorities, but the lexical form here is Ἰουδαίοις, so
    the main text preserves the source wording rather than narrowing it interpretively.
    Contextual alternatives are worth preserving in a footnote.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Standard declarative conjunction introducing the content of the report.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name, transliterated according to standard English convention.
- source_word: ἐστιν
  chosen: was
  alternatives:
  - is
  lexicon: BDAG
  rationale: Although the Greek has present tense ('is'), English idiom in indirect
    discourse after a past reporting verb commonly backshifts to 'was.' This preserves
    natural readability while keeping the sense unchanged. The present could be retained
    more formally, but 'was' is better optimal equivalence here.
- source_word: ὁ ποιήσας
  chosen: the one who had made
  alternatives:
  - the one who made
  - the one who healed
  lexicon: BDAG
  rationale: The articular aorist participle identifies Jesus as the agent of the
    prior action. 'The one who had made' reflects the antecedent action relative to
    the reporting. 'Healed' captures the sense but is less literal than ποιέω plus
    predicate adjective.
- source_word: αὐτὸν ὑγιῆ
  chosen: him well
  alternatives:
  - him healthy
  - him whole
  lexicon: BDAG
  rationale: ὑγιής denotes soundness or health. The idiom 'made him well' is natural
    English and matches the healing context better than the stiffer 'made him healthy.'
    'Whole' is possible but can import broader connotations not explicit here.
