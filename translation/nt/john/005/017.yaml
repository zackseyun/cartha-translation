theological_decisions:
- issue: Relation of Jesus' work to the Father's work on the Sabbath
  chosen_reading: 'Render the statement straightforwardly without softening the parallel:
    ''My Father is working until now, and I also am working.'''
  alternative_readings:
  - My Father works until now, and I work
  - My Father has been working until now, and I have been working
  rationale: The Greek presents a deliberate parallel between the Father's ongoing
    activity and Jesus' own. The translation should preserve this theological force
    without adding interpretive explanation about Sabbath, divine prerogative, or
    equality claims beyond what the verse itself states.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
