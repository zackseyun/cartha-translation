id: JHN.5.17
reference: John 5:17
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἀπεκρίνατο αὐτοῖς· Ὁ πατήρ μου ἕως ἄρτι ἐργάζεται κἀγὼ ἐργάζομαι.
translation:
  text: But he answered them, “My Father is working until now, and I also am working.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “My Father works until now, and I work.” The Greek present tense can
      be rendered as either simple present or progressive in English; the progressive
      was chosen to highlight ongoing action.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding accusation;
    'But' best captures Jesus' responsive contrast in natural English.
- source_word: ἀπεκρίνατο αὐτοῖς
  chosen: he answered them
  alternatives:
  - he replied to them
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the middle deponent verb with dative
    indirect object; concise and natural.
- source_word: Ὁ πατήρ μου
  chosen: My Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: Capitalized 'Father' when used by Jesus as a divine title/reference,
    preserving the personal and theological force of the expression.
- source_word: ἕως ἄρτι
  chosen: until now
  alternatives:
  - until this moment
  - even now
  lexicon: BDAG
  rationale: The phrase denotes continuance up to the present point. 'Until now' is
    the most direct and idiomatic equivalent.
- source_word: ἐργάζεται
  chosen: is working
  alternatives:
  - works
  - has been working
  lexicon: BDAG
  rationale: Present tense here naturally conveys ongoing activity. English progressive
    best reflects the durative sense in context, especially paired with Jesus' own
    present-tense statement.
- source_word: κἀγὼ
  chosen: and I also
  alternatives:
  - and I
  - I too
  lexicon: BDAG
  rationale: κἀγώ explicitly adds Jesus alongside the Father's activity. 'And I also'
    preserves the additive emphasis clearly.
- source_word: ἐργάζομαι
  chosen: am working
  alternatives:
  - work
  - am at work
  lexicon: BDAG
  rationale: Matching the Father's ongoing action, the present tense is best rendered
    progressively to show continuous activity rather than a simple gnomic statement.
