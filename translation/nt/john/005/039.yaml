theological_decisions:
- issue: Mood of Ἐραυνᾶτε
  chosen_reading: 'indicative: ''You search the Scriptures'''
  alternative_readings:
  - 'imperative: ''Search the Scriptures'''
  rationale: The Greek form permits either reading. The immediate context favors the
    indicative because Jesus is describing his opponents' present approach to Scripture
    and exposing its inadequacy apart from coming to him (cf. the following verses).
    To preserve the interpretive tension rather than erase it, the imperative alternative
    is retained in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
