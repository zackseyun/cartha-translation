id: JHN.5.39
reference: John 5:39
source:
  edition: SBLGNT
  text: Ἐραυνᾶτε τὰς γραφάς, ὅτι ὑμεῖς δοκεῖτε ἐν αὐταῖς ζωὴν αἰώνιον ἔχειν· καὶ ἐκεῖναί
    εἰσιν αἱ μαρτυροῦσαι περὶ ἐμοῦ·
translation:
  text: You search the Scriptures because you think that in them you have eternal
    life; and these are the ones that testify about me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Search the Scriptures,' taking Ἐραυνᾶτε as an imperative rather than
      an indicative.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐραυνᾶτε
  chosen: You search
  alternatives:
  - Search
  - Examine
  lexicon: BDAG
  rationale: 'The form can be read either as indicative (''you search'') or imperative
    (''search!''). In context, the following ὅτι-clause naturally explains their present
    practice, and the verse fits Jesus'' critique: they search the Scriptures yet
    miss the one to whom they point. The imperative sense is preserved in a footnote
    as a viable alternative.'
- source_word: τὰς γραφάς
  chosen: the Scriptures
  alternatives:
  - the writings
  lexicon: BDAG
  rationale: γραφή in Johannine usage refers to the sacred writings of Israel, so
    'the Scriptures' is the natural English equivalent rather than the more generic
    'writings'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι is best taken causally, giving the reason for their searching:
    they think they have eternal life in the Scriptures. ''Because'' makes the logic
    clear in English.'
- source_word: δοκεῖτε
  chosen: you think
  alternatives:
  - you suppose
  - you imagine
  lexicon: BDAG
  rationale: δοκέω here denotes their belief or assumption. 'You think' is natural
    modern English and preserves the mildly critical tone without overtranslating.
- source_word: ἐν αὐταῖς
  chosen: in them
  alternatives:
  - by them
  lexicon: BDAG
  rationale: The preposition ἐν is rendered straightforwardly as 'in,' referring to
    the Scriptures as the location in which they believe eternal life is found.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  lexicon: BDAG
  rationale: This is the standard Johannine expression and should be rendered consistently
    as 'eternal life.'
- source_word: ἐκεῖναί
  chosen: these
  alternatives:
  - those Scriptures
  - these very Scriptures
  lexicon: BDAG
  rationale: The demonstrative is emphatic and feminine plural, referring back to
    the Scriptures. 'These' is concise; the emphasis is carried in English by the
    following phrase 'the ones that testify about me.'
- source_word: αἱ μαρτυροῦσαι
  chosen: the ones that testify
  alternatives:
  - the ones bearing witness
  - the ones witnessing
  lexicon: BDAG
  rationale: μαρτυρέω is a key Johannine verb. 'Testify' is clear, contemporary, and
    preserves the legal-witness nuance better than the less idiomatic 'bear witness'
    in this sentence.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: περί with the genitive here means 'about' or 'concerning.' 'About me'
    is the most natural modern English rendering.
