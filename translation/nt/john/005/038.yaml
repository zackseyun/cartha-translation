id: JHN.5.38
reference: John 5:38
source:
  edition: SBLGNT
  text: καὶ τὸν λόγον αὐτοῦ οὐκ ἔχετε ⸂ἐν ὑμῖν μένοντα⸃, ὅτι ὃν ἀπέστειλεν ἐκεῖνος
    τούτῳ ὑμεῖς οὐ πιστεύετε.
translation:
  text: And you do not have his word remaining in you, because you do not believe
    the one whom he sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abiding in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος here most naturally refers to God's spoken/revealed word rather
    than a generic matter. 'Word' preserves Johannine diction and possible resonance
    with the Gospel's broader use of λόγος, while 'message' is a viable but less textually
    transparent alternative.
- source_word: ἔχετε
  chosen: have
  alternatives:
  - hold
  - possess
  lexicon: BDAG
  rationale: 'A straightforward present-tense rendering fits the syntax: they do not
    presently have God''s word abiding in them. ''Have'' is idiomatic and sufficiently
    literal.'
- source_word: ἐν ὑμῖν μένοντα
  chosen: remaining in you
  alternatives:
  - abiding in you
  - staying in you
  lexicon: BDAG
  rationale: The participle μένοντα modifies λόγον and conveys continuing presence.
    'Remaining' is clear modern English and preserves the durative force of μένω.
    'Abiding' is a strong Johannine alternative, but can sound more traditional or
    ecclesiastical; it is preserved in a footnote as a lexical alternative.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason they do not have his word remaining in
    them. 'Because' best captures the causal sense in context.
- source_word: ὃν ... ἀπέστειλεν ἐκεῖνος
  chosen: the one whom he sent
  alternatives:
  - him whom that one sent
  - the one that he sent
  lexicon: BDAG
  rationale: The relative clause refers to Jesus as the one sent by the Father. 'The
    one whom he sent' is natural English and preserves the personal force of the Greek
    without awkward literalism.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  lexicon: BDAG
  rationale: In context ἐκεῖνος refers to the Father. English normally uses 'he' rather
    than the more wooden 'that one.' The referent remains clear from the preceding
    context.
- source_word: τούτῳ
  chosen: the one whom he sent
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: 'τούτῳ is fronted for emphasis and refers to Jesus. Rather than a bare
    ''this one,'' the English repeats the referent within the clause for clarity and
    naturalness: ''the one whom he sent.'''
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: πιστεύω with a dative object here is well rendered 'believe' or 'believe
    in/believe.' 'Believe' is the most direct and standard rendering in John. 'Trust'
    is possible but would introduce a slightly more interpretive nuance.
