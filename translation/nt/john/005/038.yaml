theological_decisions:
- issue: Relation between God's word remaining in the hearers and their unbelief toward
    the sent one
  chosen_reading: The verse states that their failure to believe Jesus, the one sent
    by the Father, demonstrates that they do not have the Father's word remaining
    in them.
  alternative_readings:
  - The verse could be read as saying they do not retain or heed Scripture internally,
    rather than making a broader statement about regeneration or indwelling.
  rationale: The translation preserves the text's causal logic without importing a
    specific denominational doctrine about perseverance, regeneration, or illumination.
    'Remaining in you' keeps the Johannine theological tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
