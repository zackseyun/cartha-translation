id: JHN.5.3
reference: John 5:3
source:
  edition: SBLGNT
  text: ἐν ταύταις κατέκειτο ⸀πλῆθος τῶν ἀσθενούντων, τυφλῶν, χωλῶν, ⸀ξηρῶν.
translation:
  text: In these lay a multitude of the sick, blind, lame, and paralyzed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'withered.' The Greek literally means 'dry' or 'withered,' likely referring
      to withered or shriveled limbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταύταις
  chosen: In these
  alternatives:
  - In them
  - In these porticoes
  lexicon: BDAG
  rationale: A literal locative rendering preserves the feminine plural demonstrative's
    reference to the surrounding structures mentioned in the previous verse. 'In these'
    is concise and lets the antecedent be supplied by context; 'In these porticoes'
    would be more explicit but adds a noun not present here.
- source_word: κατέκειτο
  chosen: lay
  alternatives:
  - was lying
  - were lying
  lexicon: BDAG
  rationale: The imperfect middle/passive form of κατάκειμαι denotes being laid out
    or lying down. English idiom with a collective singular subject ('a multitude')
    is best captured by singular 'lay.' 'Was lying' is possible but less natural in
    narrative style; 'were lying' would shift agreement from the singular collective
    noun to the individuals.
- source_word: πλῆθος
  chosen: a multitude
  alternatives:
  - a great number
  - a crowd
  lexicon: BDAG
  rationale: πλῆθος denotes a large number or multitude. 'A multitude' preserves the
    collective sense and the elevated but still readable register. 'Crowd' could imply
    mobility or social gathering rather than a mass of invalids lying there.
- source_word: τῶν ἀσθενούντων
  chosen: of the sick
  alternatives:
  - of those who were ill
  - of the weak
  lexicon: BDAG
  rationale: The participle from ἀσθενέω refers here to those who are ill or infirm.
    'The sick' is natural English and fits the list that follows. 'The weak' is too
    broad and may suggest moral or general weakness rather than bodily illness.
- source_word: τυφλῶν
  chosen: blind
  alternatives:
  - the blind
  lexicon: BDAG
  rationale: 'As part of a genitive plural series dependent on ''of the sick,'' the
    adjective is rendered in concise predicate-list form: ''blind, lame, and paralyzed.''
    This avoids awkward repetition while preserving the categories named.'
- source_word: χωλῶν
  chosen: lame
  alternatives:
  - crippled
  lexicon: BDAG
  rationale: χωλός commonly means lame or disabled in walking. 'Lame' is the most
    direct and traditional equivalent here. 'Crippled' can sound harsher in contemporary
    English and is less precise.
- source_word: ξηρῶν
  chosen: paralyzed
  alternatives:
  - withered
  - disabled
  lexicon: BDAG
  rationale: Literally ξηρός means 'dry' or 'withered,' but in bodily contexts it
    refers to withered or shriveled limbs and thus functional paralysis or severe
    impairment. 'Paralyzed' communicates the likely sense in natural English for a
    list of invalid conditions, while 'withered' is preserved as an alternative because
    it is more formally literal.
