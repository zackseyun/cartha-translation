id: JHN.5.12
reference: John 5:12
source:
  edition: SBLGNT
  text: ἠρώτησαν ⸀οὖν αὐτόν· Τίς ἐστιν ὁ ἄνθρωπος ὁ εἰπών σοι· ⸀Ἆρον καὶ περιπάτει;
translation:
  text: So they asked him, “Who is the man who said to you, ‘Pick it up and walk’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Take up and walk.'' The object (''it'') is implied from the previous
      context, referring to the mat or bedroll the man had been lying on.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησαν
  chosen: they asked
  alternatives:
  - they questioned
  - they inquired of
  lexicon: BDAG
  rationale: Aorist active indicative, third plural of ἐρωτάω. 'Asked' is the most
    natural modern English rendering and fits the narrative context without overstating
    hostility.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the previous verse. 'So' is
    idiomatic modern English and preserves the inferential flow better than the more
    formal 'therefore.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to the healed man; straightforward accusative
    singular masculine rendering.
- source_word: Τίς ἐστιν
  chosen: Who is
  alternatives:
  - Who is it that is
  lexicon: BDAG
  rationale: Direct interrogative construction; concise English best matches the Greek
    question.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual, not humanity in general.
    Per gender-accurate policy, 'the man' is the appropriate rendering.
- source_word: ὁ εἰπών
  chosen: who said
  alternatives:
  - the one who said
  - who told
  lexicon: BDAG
  rationale: Articular aorist participle functioning attributively, identifying the
    man by his prior speech. 'Who said' is clear and sufficiently literal.
- source_word: σοι
  chosen: to you
  lexicon: BDAG
  rationale: Dative singular second person pronoun; standard indirect-object rendering.
- source_word: Ἆρον
  chosen: Pick it up
  alternatives:
  - Take up
  - Lift up
  lexicon: BDAG
  rationale: Aorist active imperative of αἴρω. In context the implied object is the
    mat/bed mentioned in the surrounding narrative. English normally requires the
    object to be supplied for clarity; 'Pick it up' is natural and contextually precise.
- source_word: καὶ περιπάτει
  chosen: and walk
  alternatives:
  - and keep walking
  - and go on walking
  lexicon: BDAG
  rationale: Present active imperative of περιπατέω after an aorist imperative. The
    present imperative may suggest ongoing action, but in this healing command idiomatic
    English is simply 'and walk.' More expansive renderings risk overinterpreting
    aspect.
