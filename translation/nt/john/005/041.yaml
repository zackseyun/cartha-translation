id: JHN.5.41
reference: John 5:41
source:
  edition: SBLGNT
  text: δόξαν παρὰ ἀνθρώπων οὐ λαμβάνω,
translation:
  text: I do not receive glory from men,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'honor' or 'praise' for 'glory.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'from men'; the term can also mean 'from people' or 'from human beings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δόξαν
  chosen: glory
  alternatives:
  - honor
  - praise
  lexicon: BDAG
  rationale: δόξα here refers to honor, praise, or esteem given by others. 'Glory'
    preserves the Johannine lexical connection with broader themes of glory in this
    Gospel, while still naturally conveying human acclaim in context.
- source_word: παρὰ ἀνθρώπων
  chosen: from men
  alternatives:
  - from people
  - from human beings
  lexicon: BDAG
  rationale: The construction παρά + genitive indicates source ('from'). ἀνθρώπων
    is grammatically masculine plural and can be generic for human beings, but 'from
    men' preserves the source's gendered form in keeping with the project's gender-accurate
    policy. The sense is human approval as opposed to divine approval.
- source_word: οὐ λαμβάνω
  chosen: I do not receive
  alternatives:
  - I do not accept
  - I am not receiving
  lexicon: BDAG
  rationale: λαμβάνω commonly means 'receive' or 'accept.' 'Receive' is the more direct
    rendering and fits the contrast with human glory as something not taken from human
    sources. Present tense is rendered as a simple present in idiomatic English.
