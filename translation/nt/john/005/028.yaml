theological_decisions:
- issue: Resurrection language implied by those 'in the tombs' hearing his voice
  chosen_reading: Retain the concrete burial image 'tombs' without importing an explicit
    doctrinal explanation into the verse.
  alternative_readings:
  - Use 'graves' as a more idiomatic English expression
  rationale: The verse points toward bodily resurrection, but the translation should
    preserve the text's own wording rather than expand it. 'Tombs' keeps the concrete
    image and aligns with Johannine diction.
  doctrine_reference: Preserve theological tension rather than resolve it.
