id: JHN.5.28
reference: John 5:28
source:
  edition: SBLGNT
  text: μὴ θαυμάζετε τοῦτο, ὅτι ἔρχεται ὥρα ἐν ᾗ πάντες οἱ ἐν τοῖς μνημείοις ⸀ἀκούσουσιν
    τῆς φωνῆς αὐτοῦ
translation:
  text: Do not marvel at this, because an hour is coming in which all who are in the
    tombs will hear his voice
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'graves.' The Greek μνημεῖα can refer to burial places generally; 'tombs'
      was chosen to preserve the concrete image.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ θαυμάζετε
  chosen: Do not marvel
  alternatives:
  - Do not be amazed
  - Do not wonder
  lexicon: BDAG
  rationale: Present imperative with μή gives a prohibition. 'Marvel' preserves the
    elevated tone and semantic force of θαυμάζω without sounding archaic in this context;
    'be amazed' is possible but slightly flatter.
- source_word: τοῦτο
  chosen: this
  lexicon: BDAG
  rationale: Straightforward demonstrative object referring to the preceding claim;
    rendered literally as 'this'.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for the prohibition. 'Because' makes the causal
    sense clear in modern English.
- source_word: ἔρχεται ὥρα
  chosen: an hour is coming
  alternatives:
  - the hour is coming
  - a time is coming
  lexicon: BDAG
  rationale: The anarthrous ὥρα is naturally rendered 'an hour' here. 'Hour' is retained
    rather than 'time' because Johannine usage often carries theological weight with
    ὥρα, and the literal term is still clear in English.
- source_word: ἐν ᾗ
  chosen: in which
  alternatives:
  - when
  lexicon: BDAG
  rationale: A formally transparent rendering of the relative construction. 'When'
    would be smoother, but 'in which' better reflects the Greek structure while remaining
    readable.
- source_word: πάντες οἱ ἐν τοῖς μνημείοις
  chosen: all who are in the tombs
  alternatives:
  - all who are in the graves
  - all those in the memorial tombs
  lexicon: BDAG
  rationale: 'πάντες with the article functions substantivally: ''all who are...''.
    μνημεῖον can mean tomb/grave/monument; ''tombs'' best fits the burial context
    and avoids the potentially broader or less concrete sense of ''graves.'''
- source_word: ἀκούσουσιν
  chosen: will hear
  alternatives:
  - will listen to
  lexicon: BDAG
  rationale: Future active indicative; 'will hear' is the normal and contextually
    appropriate rendering of ἀκούω here.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - the sound of his voice
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' in personal speech contexts. The genitive
    after ἀκούω is idiomatic and does not require expansion beyond 'his voice.'
