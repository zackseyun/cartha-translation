theological_decisions:
- issue: Whether to render ζωὴν as 'life' or 'eternal life' in Johannine context
  chosen_reading: life
  alternative_readings:
  - eternal life
  rationale: John frequently uses ζωή with salvific depth, but this verse does not
    explicitly include αἰώνιος ('eternal'). To avoid importing a doctrinally true
    but lexically unstated qualifier, the main text keeps 'life.' The theological
    resonance remains available through context rather than expansion.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
- issue: Whether 'come to me' should be interpreted in the main text as a metaphor
    for believing
  chosen_reading: come to me
  alternative_readings:
  - believe in me
  - come to me in faith
  rationale: In John's Gospel, coming to Jesus is closely related to believing, but
    the source text uses the concrete verb 'come.' Preserving that wording maintains
    Johannine imagery and avoids collapsing metaphor into interpretation in the main
    text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; optimal equivalence.'
