id: JHN.5.40
reference: John 5:40
source:
  edition: SBLGNT
  text: καὶ οὐ θέλετε ἐλθεῖν πρός με ἵνα ζωὴν ἔχητε.
translation:
  text: Yet you are not willing to come to me so that you may have life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you do not want to come to me so that you may have life.' The Greek
      conjunction can be rendered simply 'and,' and θέλετε can be translated 'want.'
    reason: lexical_alternative
  - marker: b
    text: In John, 'life' often carries the fuller sense of life from God, that is,
      eternal life, though the word 'eternal' is not stated here.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  chosen: Yet
  alternatives:
  - and
  lexicon: BDAG
  rationale: Although καί commonly means 'and,' in this context it carries an adversative
    force following Jesus' indictment of his hearers. 'Yet' brings out the contrast
    naturally in English without overstating it.
- source_word: οὐ θέλετε
  chosen: you are not willing
  alternatives:
  - you do not want
  - you refuse
  lexicon: BDAG
  rationale: θέλω denotes willing, wanting, or desiring. 'You are not willing' preserves
    the volitional emphasis of the present indicative and avoids the stronger interpretive
    force of 'refuse,' while being more pointed than a bare 'do not want.'
- source_word: ἐλθεῖν πρός με
  chosen: to come to me
  alternatives:
  - to come toward me
  lexicon: BDAG
  rationale: The infinitive ἐλθεῖν with πρός + accusative is idiomatically 'to come
    to' someone. In Johannine usage, 'come to me' carries relational and faith-oriented
    force, but the translation should preserve the concrete verbal expression rather
    than paraphrase it as 'believe in me.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα introduces purpose here. 'So that' is clear modern English and preserves
    the purposive sense without sounding wooden.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: ζωή is straightforwardly 'life.' In John's Gospel it often carries the
    fuller sense of life from God, even eternal life, but the Greek here does not
    explicitly add 'eternal,' so the translation should not import it into the main
    text.
- source_word: ἔχητε
  chosen: you may have
  alternatives:
  - you might have
  lexicon: BDAG
  rationale: The present subjunctive after ἵνα is well represented by 'may have' in
    English. This preserves the purpose/result nuance without implying uncertainty
    beyond the Greek construction.
