id: JHN.21.16
reference: John 21:16
source:
  edition: SBLGNT
  text: λέγει αὐτῷ πάλιν δεύτερον· Σίμων ⸀Ἰωάννου, ἀγαπᾷς με; λέγει αὐτῷ· Ναί, κύριε,
    σὺ οἶδας ὅτι φιλῶ σε. λέγει αὐτῷ· Ποίμαινε τὰ πρόβατά μου.
translation:
  text: He said to him again a second time, “Simon, son of John, do you love me?”
    He said to him, “Yes, Lord; you know that I love you.” He said to him, “Shepherd
    my sheep.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek uses two different verbs for ''love'' in this exchange: Jesus asks
      with agapaō, and Peter replies with phileō. Many interpreters see a distinction;
      others see stylistic variation. The main text renders both as ''love'' to avoid
      overstating the difference.'
    reason: lexical_alternative
  - marker: b
    text: Or 'again, a second time'.
    reason: previous_rendering
lexical_decisions:
- source_word: πάλιν δεύτερον
  chosen: again, a second time
  alternatives:
  - again
  - for the second time
  lexicon: BDAG
  rationale: The combination of πάλιν and δεύτερον explicitly marks repetition. Rendering
    both elements preserves the Greek emphasis rather than collapsing them into a
    single adverb.
- source_word: Σίμων Ἰωάννου
  chosen: Simon, son of John
  alternatives:
  - Simon John’s son
  - Simon, son of Jonah
  lexicon: BDAG
  rationale: The genitive Ἰωάννου is naturally rendered as a patronymic, 'son of John.'
    'Son of Jonah' reflects a different traditional form from Matt 16:17, not this
    Greek reading.
- source_word: ἀγαπᾷς
  chosen: do you love
  alternatives:
  - do you have love for
  lexicon: BDAG
  rationale: ἀγαπάω is best rendered with the ordinary English verb 'love.' This keeps
    the lexical connection with Peter’s reply while avoiding overinterpretation of
    a supposed sharp distinction between ἀγαπάω and φιλέω in this context.
- source_word: με
  chosen: me
  rationale: Direct object pronoun retained straightforwardly.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  - Yes indeed
  lexicon: BDAG
  rationale: A simple affirmative best matches the discourse tone.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Johannine context
    Peter addresses Jesus with reverential recognition, so 'Lord' is preferable to
    the merely polite 'sir.'
- source_word: σὺ οἶδας
  chosen: you know
  alternatives:
  - you yourself know
  - you know well
  lexicon: BDAG
  rationale: The explicit pronoun adds mild emphasis, but standard English can convey
    this naturally without overloading the line. The sense is preserved in 'you know.'
- source_word: ὅτι φιλῶ σε
  chosen: that I love you
  alternatives:
  - that I am fond of you
  - that I have affection for you
  lexicon: BDAG
  rationale: φιλέω here is also best rendered 'love' in idiomatic English. Rendering
    it differently from ἀγαπάω in the main text would imply a lexical contrast stronger
    than the context clearly demands; the variation is better noted in a footnote.
- source_word: Ποίμαινε
  chosen: Shepherd
  alternatives:
  - Tend
  - Pasture
  lexicon: BDAG
  rationale: ποιμαίνω denotes the activity of a shepherd—guiding, caring for, and
    overseeing the flock. 'Shepherd' preserves the pastoral metaphor more fully than
    the narrower 'feed' or the vaguer 'tend.'
- source_word: τὰ πρόβατά μου
  chosen: my sheep
  alternatives:
  - my flock
  lexicon: BDAG
  rationale: πρόβατα literally means sheep. 'My sheep' preserves the concrete pastoral
    image and the possessive relation to Jesus.
