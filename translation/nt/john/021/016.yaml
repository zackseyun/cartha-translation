theological_decisions:
- issue: Whether to distinguish ἀγαπάω and φιλέω with different English verbs
  chosen_reading: Render both with 'love' in the main text, while preserving the lexical
    variation in a footnote.
  alternative_readings:
  - Render ἀγαπάω as 'love' and φιλέω as 'be fond of'
  - Render ἀγαπάω as 'love deeply' and φιλέω as 'love'
  rationale: The passage contains a real verb variation, but many interpreters judge
    the two verbs to overlap substantially in Johannine usage. Forcing a strong distinction
    into the main text risks importing a theological or psychological nuance the verse
    itself does not unambiguously require. Preserving the variation in a footnote
    maintains transparency without overtranslation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
