theological_decisions:
- issue: Relationship between obedience and remaining in Jesus' love
  chosen_reading: Render the statement straightforwardly as a conditional relation
    without importing a doctrinal explanation of merit or loss of salvation.
  alternative_readings:
  - Obedience as meriting divine love
  - Obedience as merely evidential with no real conditional force
  rationale: The Greek presents a real condition and comparison with Jesus' own obedience,
    but it does not explicitly resolve broader theological debates about perseverance,
    assurance, or merit. The translation therefore preserves the text's tension rather
    than systematizing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ἀγάπη
  chosen_reading: love
  alternative_readings:
  - charity
  rationale: The doctrinal guidance specifies 'love' as the default rendering for
    ἀγάπη. This also preserves the lexical connection across the verse.
  doctrine_reference: 'Contested terms table: ἀγάπη → love'
