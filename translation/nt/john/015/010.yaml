id: JHN.15.10
reference: John 15:10
source:
  edition: SBLGNT
  text: ἐὰν τὰς ἐντολάς μου τηρήσητε, μενεῖτε ἐν τῇ ἀγάπῃ μου, καθὼς ἐγὼ ⸂τὰς ἐντολὰς
    τοῦ πατρός μου⸃ τετήρηκα καὶ μένω αὐτοῦ ἐν τῇ ἀγάπῃ.
translation:
  text: If you keep my commandments, you will remain in my love, just as I have kept
    my Father's commandments and remain in his love.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν
  chosen: If
  alternatives:
  - If ever
  - Whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. 'If' is the natural
    English rendering here and preserves the condition without adding iterative nuance.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  - instructions
  lexicon: BDAG
  rationale: ἐντολή commonly denotes an authoritative command or charge. 'Commandments'
    preserves the moral-authoritative force and matches Johannine usage, while remaining
    natural in English.
- source_word: τηρήσητε
  chosen: keep
  alternatives:
  - obey
  - observe
  lexicon: BDAG
  rationale: τηρέω in Johannine contexts often means to keep, guard, or observe commandments.
    'Keep' is both idiomatic and slightly broader than 'obey,' preserving the covenantal
    sense of faithful observance.
- source_word: μενεῖτε
  chosen: will remain
  alternatives:
  - will abide
  - will stay
  lexicon: BDAG
  rationale: μένω is a key Johannine term. 'Remain' is preferred over the more traditional
    'abide' because it is clearer in modern English while still preserving the relational-continuance
    sense.
- source_word: ἐν τῇ ἀγάπῃ μου
  chosen: in my love
  alternatives:
  - within my love
  lexicon: BDAG
  rationale: ἀγάπη is rendered by the doctrinal default 'love.' The prepositional
    phrase is kept literally as 'in my love' to preserve the Johannine imagery of
    relational sphere rather than paraphrasing it.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Marks comparison between the disciples' keeping/remain relationship and
    Jesus' own pattern. 'Just as' clearly signals exemplary correspondence.
- source_word: τετήρηκα
  chosen: have kept
  alternatives:
  - have observed
  - have obeyed
  lexicon: BDAG
  rationale: Perfect tense indicates a completed action with continuing relevance.
    'Have kept' preserves both the lexical link with τηρήσητε and the aspectual force
    better than a simple past.
- source_word: τοῦ πατρός μου
  chosen: my Father's
  alternatives:
  - of my Father
  lexicon: BDAG
  rationale: The genitive is naturally rendered in English as a possessive. Capitalizing
    'Father' reflects its use as a divine title in context.
- source_word: μένω
  chosen: remain
  alternatives:
  - abide
  - stay
  lexicon: BDAG
  rationale: Maintains consistency with the earlier μενεῖτε and preserves John's repeated
    thematic vocabulary.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - that one's
  lexicon: BDAG
  rationale: Refers back to 'my Father.' Rendering as 'his' is the natural English
    pronoun choice and avoids awkward repetition while keeping the referent clear.
- source_word: ἐν τῇ ἀγάπῃ
  chosen: in his love
  alternatives:
  - in the Father's love
  lexicon: BDAG
  rationale: Literal rendering preserves the parallel structure with 'in my love.'
    The pronoun is sufficiently clear from the immediate antecedent.
