theological_decisions:
- issue: Meaning of αἴρει in the first clause
  chosen_reading: he removes
  alternative_readings:
  - he takes away
  - he lifts up
  rationale: 'The immediate literary context contrasts two actions of the vinedresser:
    unfruitful branches are dealt with negatively, while fruitful branches are pruned
    for greater fruitfulness. ''Removes'' best preserves that contrast without importing
    a denominational reading about apostasy or perseverance. Because ''lifts up''
    is a live interpretive proposal in some traditions, it is preserved in a footnote
    rather than adopted in the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it
