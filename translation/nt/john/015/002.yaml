id: JHN.15.2
reference: John 15:2
source:
  edition: SBLGNT
  text: πᾶν κλῆμα ἐν ἐμοὶ μὴ φέρον καρπὸν αἴρει αὐτό, καὶ πᾶν τὸ καρπὸν φέρον καθαίρει
    αὐτὸ ἵνα ⸂καρπὸν πλείονα⸃ φέρῃ.
translation:
  text: Every branch in me that does not bear fruit, he removes; and every branch
    that bears fruit, he prunes it so that it may bear more fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes away'; some understand αἴρει here as 'lifts up.'
    reason: alternative_reading
  - marker: b
    text: The verb translated 'prunes' can also mean 'cleanses'; the wording fits
      the vineyard image and anticipates the language of being 'clean' in the next
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κλῆμα
  chosen: Every branch
  alternatives:
  - Each branch
  lexicon: BDAG
  rationale: πᾶν with the singular noun has a distributive sense. 'Every branch' is
    natural English and preserves the individualizing force.
- source_word: ἐν ἐμοὶ
  chosen: in me
  alternatives:
  - connected to me
  - remaining in me
  lexicon: BDAG
  rationale: A direct rendering best preserves the Johannine theological language
    of union/relationship without importing interpretive expansion from the broader
    context.
- source_word: μὴ φέρον καρπὸν
  chosen: that does not bear fruit
  alternatives:
  - not bearing fruit
  lexicon: BDAG
  rationale: The participial phrase is rendered as a relative clause for clear English
    while retaining the ongoing verbal idea of producing fruit.
- source_word: αἴρει
  chosen: removes
  alternatives:
  - takes away
  - lifts up
  lexicon: BDAG
  rationale: αἴρω can mean 'take away/remove' or in some contexts 'lift up.' In this
    pruning/vine imagery paired with καθαίρει ('prunes/cleans'), 'removes' best fits
    the contrast between unfruitful branches being taken away and fruitful ones being
    pruned. The alternative 'lifts up' is preserved in a footnote because it is a
    known interpretive option.
- source_word: καρπός
  chosen: fruit
  lexicon: BDAG
  rationale: Standard rendering in viticultural metaphor and Johannine usage; no contextual
    pressure suggests a different gloss.
- source_word: καθαίρει
  chosen: prunes
  alternatives:
  - cleanses
  - cleans
  lexicon: BDAG
  rationale: In the vine/branch agricultural context, 'prunes' communicates the intended
    horticultural action in idiomatic English, while still resonating with the verb's
    cleansing sense. The lexical connection to καθαροί in the next verse is real,
    but 'prunes' is the clearest main-text rendering here.
- source_word: ἵνα καρπὸν πλείονα φέρῃ
  chosen: so that it may bear more fruit
  alternatives:
  - in order that it may bear greater fruit
  lexicon: BDAG
  rationale: ἵνα introduces purpose; 'so that' is natural. πλείονα is comparative,
    and 'more fruit' is the most idiomatic equivalent.
- source_word: αὐτό / αὐτὸ
  chosen: it
  lexicon: BDAG
  rationale: The pronoun refers back to the neuter noun κλῆμα ('branch'). English
    requires 'it.'
- source_word: καὶ πᾶν τὸ καρπὸν φέρον
  chosen: and every branch that bears fruit
  alternatives:
  - and every fruit-bearing branch
  lexicon: BDAG
  rationale: Supplying 'branch' in English is necessary because the Greek article
    plus participle refers back to κλῆμα from the first clause. This avoids awkwardness
    while preserving the parallel structure.
