theological_decisions:
- issue: Rendering δοῦλος in a discipleship/status contrast
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse contrasts subordinate ignorance with relational disclosure.
    'Slaves' better preserves the social asymmetry and bonded status than 'servants,'
    in line with the doctrine's context-dependent guidance for δοῦλος.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
- issue: Rendering κύριος in a non-divine household analogy
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: The default for κύριος is 'Lord,' but here the referent is not a christological
    or divine title; it is the superior in a master-slave relationship. 'Master' communicates
    the analogy accurately without importing titular overtones.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος; Translation philosophy
    §5
- issue: Aspect of εἴρηκα and ἐγνώρισα
  chosen_reading: I have called ... I have made known
  alternative_readings:
  - I call ... I made known
  - I called ... I made known
  rationale: Using English present perfect preserves the Greek perfect/resultative
    force in εἴρηκα and aligns the second clause with the present relevance of Jesus'
    disclosure. This avoids flattening the discourse into simple past while remaining
    readable.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
