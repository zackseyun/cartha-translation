id: JHN.15.15
reference: John 15:15
source:
  edition: SBLGNT
  text: οὐκέτι ⸂λέγω ὑμᾶς⸃ δούλους, ὅτι ὁ δοῦλος οὐκ οἶδεν τί ποιεῖ αὐτοῦ ὁ κύριος·
    ὑμᾶς δὲ εἴρηκα φίλους, ὅτι πάντα ἃ ἤκουσα παρὰ τοῦ πατρός μου ἐγνώρισα ὑμῖν.
translation:
  text: I no longer call you slaves, because the slave does not know what his master
    is doing. But I have called you friends, because I have made known to you everything
    that I heard from my Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants.' The Greek doulos can denote a servant or
      a slave; here 'slaves' is used because the contrast emphasizes subordination
      over friendship.
    reason: lexical_alternative
  - marker: b
    text: Greek 'lord'; here rendered 'master' because the context is a household/status
      analogy rather than a divine or messianic title.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  lexicon: BDAG
  rationale: Standard temporal negation indicating a change from a previous state;
    'no longer' is natural modern English and preserves the force.
- source_word: λέγω ὑμᾶς
  chosen: I call you
  alternatives:
  - I say that you are
  - I name you
  lexicon: BDAG
  rationale: With a double-accusative-like construction and predicate accusative,
    λέγω here functions idiomatically as 'call' or 'designate,' not merely 'say.'
    Present tense is preserved in the first clause.
- source_word: δούλους / δοῦλος
  chosen: slaves / the slave
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    Here the contrast with 'friends' and 'master' highlights status and subordination,
    so 'slave' better preserves the bonded relationship than 'servant.'
- source_word: οἶδεν τί ποιεῖ
  chosen: does not know what ... is doing
  alternatives:
  - does not understand what ... does
  lexicon: BDAG
  rationale: οἶδα denotes knowledge; τί ποιεῖ is best rendered as an ongoing action
    in context, 'what his master is doing,' which reads naturally in English and reflects
    the present tense.
- source_word: αὐτοῦ ὁ κύριος
  chosen: his master
  alternatives:
  - his lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, in this household/master-slave
    analogy the relational sense 'master' is contextually required. This is a documented
    contextual exception to the default rendering.
- source_word: εἴρηκα
  chosen: I have called
  alternatives:
  - I have said to be
  - I called
  lexicon: BDAG
  rationale: 'Perfect tense indicates a present state resulting from a prior declaration:
    Jesus has designated them as friends, and that designation stands. English present
    perfect captures this well.'
- source_word: φίλους
  chosen: friends
  alternatives:
  - companions
  lexicon: BDAG
  rationale: The ordinary and contextually fitting sense is 'friends,' preserving
    the contrast with 'slaves' and the intimacy implied by shared knowledge.
- source_word: πάντα ἃ
  chosen: everything that
  alternatives:
  - all that
  - all the things that
  lexicon: BDAG
  rationale: A natural rendering of the neuter plural relative construction; 'everything
    that' is idiomatic and comprehensive.
- source_word: ἤκουσα παρὰ τοῦ πατρός μου
  chosen: I heard from my Father
  alternatives:
  - I received from my Father
  lexicon: BDAG
  rationale: ἀκούω normally means 'hear.' παρά with the genitive indicates source,
    so 'from my Father' is straightforward. 'Heard' should not be weakened to 'received'
    without necessity.
- source_word: ἐγνώρισα ὑμῖν
  chosen: I have made known to you
  alternatives:
  - I revealed to you
  - I made it known to you
  lexicon: BDAG
  rationale: γνωρίζω means to make known or disclose. English present perfect fits
    the discourse parallel with εἴρηκα and conveys completed action with abiding significance.
