theological_decisions:
- issue: Whether ἁμαρτίαν οὐκ εἴχοσαν should be rendered as absolute sinlessness or as lack of culpability in relation to rejecting Jesus' revelation
  chosen_reading: Rendered literally as 'they would not have sin,' preserving the Johannine expression without expanding it to 'would not be guilty' in the main text.
  alternative_readings:
  - they would not be guilty of sin
  - they would not be accountable for this sin
  rationale: The immediate context concerns responsibility for rejecting Jesus after his coming and speaking. However, the Greek says 'have sin,' and the translation should preserve that wording rather than resolve the theological nuance in the main text. The contextual sense of culpability is real, but it is better left implicit or noted in documentation than imported into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:35:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/015/022.json
  category: awkward_english
  tier: 1
  from: concerning their sin
  to: for their sin
  rationale: While 'concerning' is a technically correct translation of 'περὶ' + genitive, the standard English idiom is 'to have an excuse for' something. The rendering 'they have no excuse for their sin' is more natural and fluid in English, conveying the same meaning as 'concerning' but with better idiomatic force. The current rendering is slightly stilted.
