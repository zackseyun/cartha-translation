id: JHN.15.22
reference: John 15:22
source:
  edition: SBLGNT
  text: εἰ μὴ ἦλθον καὶ ἐλάλησα αὐτοῖς, ἁμαρτίαν οὐκ ⸀εἴχοσαν· νῦν δὲ πρόφασιν οὐκ ἔχουσιν περὶ τῆς ἁμαρτίας αὐτῶν.
translation:
  text: If I had not come and spoken to them, they would not have sin; but now they have no excuse for their sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they would not be guilty of sin' or 'they would not have guilt.' The Greek more literally says, 'they would not have sin.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they have no pretext' for their sin.
    reason: lexical_alternative
  - marker: c
    text: Or 'concerning their sin'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰ μὴ
  chosen: If ... not
  alternatives:
  - Unless
  lexicon: BDAG
  rationale: Introduces a contrary-to-fact condition. 'If I had not ...' is the most natural English way to reflect the Greek protasis with the following past verbs.
- source_word: ἦλθον
  chosen: had come
  alternatives:
  - came
  lexicon: BDAG
  rationale: Aorist in a past contrary-to-fact condition is best rendered with English pluperfect ('had come') to match the sense of an unreal past condition.
- source_word: ἐλάλησα
  chosen: spoken
  alternatives:
  - spoken to
  - talked to
  lexicon: BDAG
  rationale: With αὐτοῖς, the sense is 'spoken to them.' 'Spoken' keeps the verbal parallel with 'had come' in idiomatic English while preserving the content of Jesus' address.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object after λαλέω, naturally rendered 'to them.'
- source_word: ἁμαρτίαν
  chosen: sin
  alternatives:
  - guilt
  lexicon: BDAG
  rationale: The standard sense is 'sin.' Although some English versions use 'guilt' or imply culpability, the Greek noun is ἁμαρτία, and 'sin' preserves the Johannine wording and theological weight without over-interpreting.
- source_word: οὐκ εἴχοσαν
  chosen: would not have
  alternatives:
  - did not have
  - would not be guilty of
  lexicon: BDAG
  rationale: Imperfect in the apodosis of a contrary-to-fact condition is well represented by English 'would not have.' This avoids flattening the conditional force. 'Would not be guilty of' is interpretive and goes beyond the lexical form.
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - but as it is now
  - now however
  lexicon: BDAG
  rationale: Marks the sharp contrast between the hypothetical past and the present reality.
- source_word: πρόφασιν
  chosen: excuse
  alternatives:
  - pretext
  - cloak
  lexicon: BDAG
  rationale: In context the word denotes a ground of excuse or pretext. 'Excuse' is the clearest modern English rendering. 'Pretext' is possible but less idiomatic here; 'cloak' reflects older English tradition but is not the lexical sense in contemporary usage.
- source_word: οὐκ ἔχουσιν
  chosen: they have no
  alternatives:
  - they do not have
  lexicon: BDAG
  rationale: Simple present statement of current condition; 'have no' is idiomatic and concise.
- source_word: περὶ τῆς ἁμαρτίας αὐτῶν
  chosen: concerning their sin
  alternatives:
  - for their sin
  - about their sin
  lexicon: BDAG
  rationale: περί with the genitive commonly means 'concerning/about.' 'Concerning their sin' is slightly more formal but preserves the prepositional nuance without collapsing it into a more interpretive causal 'for.'
