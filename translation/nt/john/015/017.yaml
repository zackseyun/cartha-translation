id: JHN.15.17
reference: John 15:17
source:
  edition: SBLGNT
  text: ταῦτα ἐντέλλομαι ὑμῖν ἵνα ἀγαπᾶτε ἀλλήλους.
translation:
  text: These things I command you, so that you may love one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''I command you these things: love one another.'' The Greek ἵνα-clause
      can be understood as expressing purpose or near-content.'
    reason: alternative_reading
  - marker: b
    text: Or 'I am commanding you these things'.
    reason: previous_rendering
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Neuter plural demonstrative, naturally rendered 'these things.' Although
    English can sometimes compress to 'this,' the plural better reflects the Greek
    and likely points back to the preceding instructions.
- source_word: ἐντέλλομαι
  chosen: I am commanding
  alternatives:
  - I command
  - I instruct
  lexicon: BDAG
  rationale: Present middle/passive-form deponent verb meaning 'command, give orders,
    instruct.' 'I am commanding' preserves the present aspect and direct force. 'I
    command' is possible, but the progressive English form better reflects the immediate
    discourse setting without becoming awkward.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative second person plural. In English, the indirect object is naturally
    expressed simply as 'you' after 'commanding,' though 'to you' is semantically
    possible.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose or intended result. 'So that' is clear, idiomatic
    modern English and preserves the purposive sense better than a bare 'that'.
- source_word: ἀγαπᾶτε
  chosen: may love
  alternatives:
  - love
  - keep loving
  lexicon: BDAG
  rationale: Present active subjunctive plural of ἀγαπάω. Because it follows ἵνα,
    'may love' is a natural English rendering of the subjunctive in a purpose clause.
    The lexical choice 'love' follows the project's default rendering for ἀγάπη cognates.
    'Keep loving' would over-specify iterative force not explicit in the form.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Reciprocal pronoun meaning mutual action among the group. 'One another'
    is the standard, slightly weightier English rendering in this Johannine context.
