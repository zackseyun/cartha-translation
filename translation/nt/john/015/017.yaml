theological_decisions:
- issue: Relationship between the command and the purpose clause
  chosen_reading: The verse is rendered to show that Jesus gives these commands with
    the purpose that the disciples love one another.
  alternative_readings:
  - 'The clause could be taken more loosely as content: ''I command you this: love
    one another.'''
  rationale: The Greek syntax with ἵνα most naturally expresses purpose/result ('so
    that'), though in Johannine style it can approach epexegetical content. Rendering
    it as purpose preserves the Greek form without collapsing it into a simpler English
    imperative.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T12:31:01Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/015/017.json
  category: awkward_english
  tier: 1
  from: I am commanding you these things
  to: I am giving you these commands
  rationale: The current rendering follows the Greek word order in a way that is unidiomatic
    in English. The verb 'to command' does not typically take both a person and a
    thing as direct objects in this structure ('command you things'). This phrasing
    is grammatically questionable and may cause a reader to stumble. A more natural
    and clear rendering that maintains the sense of the Greek phrase (ἐντέλλομαι ὑμῖν
    ταῦτα) is 'I am giving you these commands.'
