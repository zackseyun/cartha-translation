id: JHN.15.6
reference: John 15:6
source:
  edition: SBLGNT
  text: ἐὰν μή τις ⸀μένῃ ἐν ἐμοί, ἐβλήθη ἔξω ὡς τὸ κλῆμα καὶ ἐξηράνθη, καὶ συνάγουσιν
    αὐτὰ καὶ εἰς τὸ πῦρ βάλλουσιν καὶ καίεται.
translation:
  text: If anyone does not remain in me, he is thrown out like the branch and dries
    up; and they gather them and throw them into the fire, and it burns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abide in me.' The Greek verb can also be rendered 'abide,' a traditional
      translation of a key Johannine term meaning to remain or continue.
    reason: lexical_alternative
  - marker: b
    text: The image warns of exclusion and burning, but the verse itself does not
      specify whether this describes loss of genuine discipleship or exposure of false
      attachment.
    reason: alternative_reading
lexical_decisions:
- source_word: μένῃ
  chosen: remain
  alternatives:
  - abide
  - stay
  lexicon: BDAG
  rationale: μένω is a key Johannine term denoting continued relational persistence.
    'Remain' is clear modern English and preserves the ongoing sense without the archaic
    feel of 'abide.'
- source_word: ἐν ἐμοί
  chosen: in me
  lexicon: BDAG
  rationale: The prepositional phrase is retained literally to preserve the relational
    and theological force of union/continuance with Jesus, rather than paraphrasing
    as 'with me' or 'connected to me.'
- source_word: ἐβλήθη ἔξω
  chosen: is thrown out
  alternatives:
  - is cast out
  - was thrown out
  lexicon: BDAG
  rationale: The aorist passive is rendered with an English present in this conditional
    image for naturalness in a general condition, while preserving the passive sense.
    'Thrown out' is idiomatic and concrete.
- source_word: ὡς τὸ κλῆμα
  chosen: like the branch
  alternatives:
  - as the branch
  lexicon: BDAG
  rationale: κλῆμα refers to a vine branch/shoot in the immediate metaphor. 'The branch'
    preserves the singular image tied to the preceding discourse about branches in
    the vine.
- source_word: ἐξηράνθη
  chosen: dries up
  alternatives:
  - withers
  - has dried up
  lexicon: BDAG
  rationale: The verb denotes becoming dry or withered. 'Dries up' fits the branch
    metaphor naturally and avoids importing a more interpretive tone. 'Withers' is
    possible but slightly less literal to the drying imagery.
- source_word: συνάγουσιν
  chosen: they gather
  alternatives:
  - people gather
  - they collect
  lexicon: BDAG
  rationale: The Greek uses an indefinite third-person plural. English commonly mirrors
    this with 'they gather,' preserving the unspecified agents.
- source_word: αὐτὰ
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is plural neuter, referring generically to such branches.
    English 'them' best reflects the plural sense, even though the prior illustrative
    noun is singular.
- source_word: εἰς τὸ πῦρ βάλλουσιν
  chosen: throw them into the fire
  alternatives:
  - cast them into the fire
  lexicon: BDAG
  rationale: A straightforward rendering of the verbal phrase. 'Throw' is natural
    modern English; 'cast' is more traditional but less contemporary.
- source_word: καίεται
  chosen: it burns
  alternatives:
  - they are burned
  - it is burned up
  lexicon: BDAG
  rationale: The verb is singular passive/present and most naturally refers back to
    the branch as a representative singular image. Rendering 'it burns' preserves
    the Greek singular better than smoothing to a plural. The passive form in Greek
    can function intransitively in English as 'burns.'
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite τις in this conditional statement is best rendered generically
    as 'anyone,' which is natural and inclusive in English without obscuring the singular
    force.
