theological_decisions:
- issue: Whether to render the warning in a way that resolves debates about apostasy,
    perseverance, or merely apparent discipleship
  chosen_reading: A direct metaphorical warning without interpretive expansion
  alternative_readings:
  - A warning about true believers falling away
  - A warning about nominal disciples never truly united to Jesus
  rationale: The verse uses branch imagery and judgment language but does not itself
    settle later doctrinal debates about the precise status of the person described.
    Per translation philosophy, the wording preserves the warning's force without
    importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
