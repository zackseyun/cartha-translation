id: JHN.15.18
reference: John 15:18
source:
  edition: SBLGNT
  text: Εἰ ὁ κόσμος ὑμᾶς μισεῖ, γινώσκετε ὅτι ἐμὲ πρῶτον ⸀ὑμῶν μεμίσηκεν.
translation:
  text: If the world hates you, know that it has hated me before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it hated me first, before you.' The Greek uses 'first' with 'you' to
      express temporal priority.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world-system
  - the world order
  lexicon: BDAG
  rationale: In Johannine usage κόσμος often denotes the human world in organized
    opposition to God, but 'the world' is the most natural and sufficiently broad
    English rendering. More interpretive options like 'world-system' over-specify
    the sense in the main text.
- source_word: μισεῖ
  chosen: hates
  alternatives:
  - is hating
  lexicon: BDAG
  rationale: 'Present active indicative here is best rendered with simple present
    English: ''hates.'' This preserves the gnomic/general force without awkward progressive
    aspect.'
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - you know
  - understand
  - recognize
  lexicon: BDAG
  rationale: 'Although morphologically it can be indicative or imperative in form,
    in context it functions naturally as an imperative/exhortation: ''know.'' This
    fits the discourse flow after the conditional clause better than a bare indicative
    ''you know.'''
- source_word: πρῶτον
  chosen: before
  alternatives:
  - first
  lexicon: BDAG
  rationale: With the genitive ὑμῶν, πρῶτον idiomatically means 'before you' rather
    than the more wooden 'first of you.' 'Before' communicates the temporal priority
    clearly in natural English.
- source_word: μεμίσηκεν
  chosen: has hated
  alternatives:
  - hated
  lexicon: BDAG
  rationale: The perfect tense indicates a completed action with abiding relevance.
    'Has hated' preserves that force better than a simple past 'hated.'
- source_word: ἐμὲ ... ὑμῶν
  chosen: me before you
  alternatives:
  - me first, before you
  lexicon: BDAG
  rationale: This preserves the emphatic placement of ἐμέ while keeping idiomatic
    English. Adding 'first' in the main text is possible, but 'before you' already
    conveys the intended temporal comparison.
