theological_decisions:
- issue: Sense of κόσμος in Johannine theology
  chosen_reading: Retain 'the world' in the main text without expanding it to an explicitly
    theological paraphrase.
  alternative_readings:
  - the world-system
  - humanity in rebellion against God
  rationale: The verse speaks of opposition to Jesus and his disciples, and John's
    Gospel often uses κόσμος with negative theological coloring. However, the text
    itself does not require an interpretive expansion in translation. Preserving 'the
    world' maintains the theological tension without over-resolving it.
  doctrine_reference: Translation philosophy §3, §6
