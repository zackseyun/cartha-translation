theological_decisions:
- issue: Rendering of δοῦλος in a non-metaphorical status comparison
  chosen_reading: slave
  alternative_readings:
  - servant
  - bondservant
  rationale: The doctrine excerpt specifies context-dependent rendering for δοῦλος,
    using 'slave' where bonded nature is salient. Here the proverb depends on the
    asymmetry between a δοῦλος and his κύριος, so 'slave ... master' best preserves
    the social relation and rhetorical force.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Rendering of κύριος in relation to δοῦλος
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: Although κύριος normally defaults to 'Lord,' the immediate slave/master
    pairing requires an English term that expresses social ownership/authority rather
    than a christological title. This is a contextual exception documented for clarity
    and accuracy.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation
    philosophy §5'
