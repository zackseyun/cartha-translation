id: JHN.15.20
reference: John 15:20
source:
  edition: SBLGNT
  text: μνημονεύετε τοῦ λόγου οὗ ἐγὼ εἶπον ὑμῖν· Οὐκ ἔστιν δοῦλος μείζων τοῦ κυρίου
    αὐτοῦ· εἰ ἐμὲ ἐδίωξαν, καὶ ὑμᾶς διώξουσιν· εἰ τὸν λόγον μου ἐτήρησαν, καὶ τὸν
    ὑμέτερον τηρήσουσιν.
translation:
  text: 'Remember the word that I said to you: ‘A slave is not greater than his master.’
    If they persecuted me, they will also persecute you; if they kept my word, they
    will also keep yours.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''servant'': Greek δοῦλος can mean either ''slave'' or ''servant'' depending
      on context; here ''slave'' is used because the contrast with ''master'' emphasizes
      subordinate status.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''obeyed'': ''kept my word'' in John can include both receiving Jesus''
      message and living in obedience to it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημονεύετε
  chosen: Remember
  alternatives:
  - Keep in mind
  - Recall
  lexicon: BDAG
  rationale: Present active imperative, calling for ongoing recollection. 'Remember'
    is natural English and preserves the imperative force without paraphrase.
- source_word: λόγου
  chosen: word
  alternatives:
  - statement
  - message
  lexicon: BDAG
  rationale: In Johannine usage λόγος can mean message or saying; here the singular
    with relative clause points to the specific saying Jesus previously spoke, so
    'word' preserves the wording while remaining idiomatic.
- source_word: οὗ ἐγὼ εἶπον ὑμῖν
  chosen: that I said to you
  alternatives:
  - which I spoke to you
  - that I told you
  lexicon: BDAG
  rationale: A straightforward relative clause referring back to 'word.' 'Said to
    you' is clear modern English and avoids unnecessary stiffness.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine, δοῦλος is rendered 'servant / slave' context-dependently.
    In this aphorism contrasting status under a κύριος, the hierarchical and owned/bonded
    relation is salient, so 'slave' best preserves the force.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - superior
  lexicon: BDAG
  rationale: Comparative of greatness/status. 'Greater' is the standard and sufficiently
    broad rendering, preserving the comparison without over-interpreting it as only
    rank or worth.
- source_word: κυρίου
  chosen: master
  alternatives:
  - lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here it refers to the
    slave's human superior in a proverb-like saying. 'Master' best fits the slave/master
    relationship and avoids confusion with the divine title.
- source_word: ἐδίωξαν / διώξουσιν
  chosen: persecuted / will also persecute
  alternatives:
  - pursued
  - harassed
  lexicon: BDAG
  rationale: In this context of hostility toward Jesus and his disciples, διώκω clearly
    carries the sense of persecution rather than neutral pursuit.
- source_word: ἐτήρησαν / τηρήσουσιν
  chosen: kept / will also keep
  alternatives:
  - obeyed / will also obey
  - observed / will also observe
  lexicon: BDAG
  rationale: τηρέω can mean keep, observe, obey, or guard. In John it often refers
    to keeping Jesus' word in the sense of receiving and obeying it. 'Keep' preserves
    the Johannine verbal link and allows both hearing and obedient response.
- source_word: τὸν λόγον μου ... τὸν ὑμέτερον
  chosen: my word ... yours
  alternatives:
  - my message ... yours
  lexicon: BDAG
  rationale: Maintains lexical consistency with the earlier λόγος in the verse and
    preserves the parallel between Jesus' word and the disciples' derivative proclamation.
