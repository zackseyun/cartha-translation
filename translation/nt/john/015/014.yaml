id: JHN.15.14
reference: John 15:14
source:
  edition: SBLGNT
  text: ὑμεῖς φίλοι μού ἐστε ἐὰν ποιῆτε ⸀ἃ ἐγὼ ἐντέλλομαι ὑμῖν.
translation:
  text: You are my friends if you do what I command you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'You are my friends if you do the things that I command
      you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun placed first for emphasis. English normally
    does not preserve the emphasis overtly, so 'You' is sufficient in the main text;
    the emphatic force is carried by word order and context.
- source_word: φίλοι
  chosen: friends
  alternatives:
  - companions
  lexicon: BDAG
  rationale: The nominative plural of φίλος here denotes relational closeness. 'Friends'
    is the natural and standard English equivalent and fits the Johannine context
    of intimate relationship with Jesus.
- source_word: μού
  chosen: my
  alternatives:
  - of me
  lexicon: BDAG
  rationale: Genitive pronoun expressing possession or relationship. English idiom
    requires the possessive adjective 'my' rather than a more literal 'of me.'
- source_word: ἐστε
  chosen: are
  lexicon: BDAG
  rationale: Present indicative of 'to be.' Rendered straightforwardly as 'are.'
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive. 'If' best captures
    the condition in idiomatic English.
- source_word: ποιῆτε
  chosen: you do
  alternatives:
  - you keep doing
  - you carry out
  lexicon: BDAG
  rationale: Present subjunctive of ποιέω in a conditional clause. 'Do' is the most
    natural rendering here for carrying out commands. 'Keep doing' would overstate
    durative force in English, though ongoing obedience is contextually implied.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring to the content of Jesus' commands.
    English idiom prefers 'what' over the more formal 'the things that.'
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: Explicit subject pronoun adds emphasis in Greek. English retains it simply
    as 'I'; adding 'myself' would sound overly marked here.
- source_word: ἐντέλλομαι
  chosen: command
  alternatives:
  - instruct
  - order
  lexicon: BDAG
  rationale: The verb denotes giving an authoritative charge or command. 'Command'
    best preserves the authority of Jesus' speech without softening it to mere instruction.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative plural indirect object. In English, 'what I command you' is idiomatic
    and concise; 'what I command to you' is unidiomatic, while 'what I command you
    to do' would add words not present in the Greek.
