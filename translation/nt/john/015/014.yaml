theological_decisions:
- issue: Nature of the conditional clause relating friendship to obedience
  chosen_reading: 'Rendered as a straightforward condition: ''You are my friends if
    you do what I command you.'''
  alternative_readings:
  - '''You are my friends when you do what I command you'''
  rationale: The Greek ἐὰν with the subjunctive most naturally expresses condition
    rather than mere temporal occurrence. The translation preserves the text's stated
    linkage between friendship and obedience without importing a broader doctrinal
    system about merit or perseverance.
  doctrine_reference: Preserve theological tension rather than resolve it.
