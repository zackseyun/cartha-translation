id: JHN.15.7
reference: John 15:7
source:
  edition: SBLGNT
  text: ἐὰν μείνητε ἐν ἐμοὶ καὶ τὰ ῥήματά μου ἐν ὑμῖν μείνῃ, ὃ ἐὰν θέλητε ⸀αἰτήσασθε
    καὶ γενήσεται ὑμῖν·
translation:
  text: If you remain in me and my words remain in you, ask whatever you want, and
    it will be done for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abide in me ... my words abide in you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whatever you wish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μείνητε / μείνῃ (μένω)
  chosen: remain / remain
  alternatives:
  - abide
  - stay
  lexicon: BDAG
  rationale: μένω is a key Johannine term denoting continuing relational presence
    or persistence. 'Remain' preserves the durative sense in clear modern English
    better than the more traditional but less current 'abide.' Using the same English
    gloss for both occurrences preserves the repetition in Greek.
- source_word: ἐν ἐμοὶ
  chosen: in me
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve the union/relationship
    language central to John's theology, rather than weakening it to 'with me' or
    paraphrasing it.
- source_word: τὰ ῥήματά μου
  chosen: my words
  alternatives:
  - what I have said to you
  - my sayings
  lexicon: BDAG
  rationale: ῥήματα refers to spoken words/sayings. 'My words' is the most direct
    and natural rendering and preserves the lexical link to Jesus' utterances without
    over-paraphrase.
- source_word: ὃ ἐὰν θέλητε
  chosen: whatever you want
  alternatives:
  - whatever you wish
  - whatever you desire
  lexicon: BDAG
  rationale: This construction expresses an open, indefinite object of desire. 'Whatever
    you want' is idiomatic modern English and accurately reflects the breadth of the
    Greek without adding conditions not stated here.
- source_word: αἰτήσασθε
  chosen: ask
  alternatives:
  - request
  lexicon: BDAG
  rationale: The aorist middle imperative calls for petition. 'Ask' is the standard
    and most natural rendering in prayer/request contexts; 'request' is possible but
    less direct and less idiomatic here.
- source_word: γενήσεται ὑμῖν
  chosen: it will be done for you
  alternatives:
  - it will happen for you
  - it will come to be for you
  lexicon: BDAG
  rationale: γίνομαι here conveys coming about or happening. In context of answered
    petition, 'it will be done for you' is idiomatic English that captures the resultative
    force better than the wooden 'it will happen for you.'
