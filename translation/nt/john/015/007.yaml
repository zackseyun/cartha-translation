theological_decisions:
- issue: Condition and promise structure in Jesus' statement about prayer
  chosen_reading: 'The verse is rendered with the explicit condition intact: the promise
    about asking is framed by remaining in Jesus and his words remaining in the disciples.'
  alternative_readings:
  - A freer rendering that makes the promise sound unconditional
  rationale: The Greek syntax places the asking promise under a clear ἐὰν conditional
    clause. The translation preserves this theological tension and does not universalize
    the promise beyond the stated condition.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
