theological_decisions:
- issue: Metaphorical identification in Jesus' 'I am' saying
  chosen_reading: Retain the metaphor straightforwardly as 'I am the true vine' without
    expanding its symbolism in translation.
  alternative_readings:
  - I am the real vine
  rationale: The verse presents one of John's metaphorical 'I am' sayings. The translation
    should preserve the image and theological resonance without paraphrastic explanation.
    'True' also aligns with Johannine theological vocabulary about ultimate reality
    fulfilled in Jesus.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of γεωργός in relation to the Father
  chosen_reading: Use 'gardener' in the main text and preserve 'vinedresser' in a
    footnote.
  alternative_readings:
  - vinedresser
  - farmer
  - cultivator
  rationale: This balances readability and source fidelity. Because the image is specifically
    a vine, 'vinedresser' is a meaningful alternative, but 'gardener' communicates
    clearly to modern readers without importing doctrinal interpretation.
  doctrine_reference: Translation philosophy §§5, 6
