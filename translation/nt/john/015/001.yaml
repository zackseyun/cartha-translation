id: JHN.15.1
reference: John 15:1
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι ἡ ἄμπελος ἡ ἀληθινή, καὶ ὁ πατήρ μου ὁ γεωργός ἐστιν·
translation:
  text: I am the true vine, and my Father is the gardener.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vinedresser.' The Greek γεωργός refers to one who cultivates the land;
      in the context of a vine, 'vinedresser' is a more specific rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I myself am
  lexicon: BDAG
  rationale: Standard rendering of the emphatic first-person pronoun with the copula.
    English can preserve the force adequately with 'I am' in Johannine style without
    adding an overly heavy reflexive emphasis in the main text.
- source_word: ἄμπελος
  chosen: vine
  alternatives:
  - grapevine
  lexicon: BDAG
  rationale: '''Vine'' is the natural and established English equivalent in this metaphorical
    context. ''Grapevine'' is more explicit but less idiomatic and unnecessarily narrows
    the image in the main text.'
- source_word: ἀληθινή
  chosen: 'true'
  alternatives:
  - real
  - genuine
  lexicon: BDAG
  rationale: In Johannine usage, ἀληθινός often carries the sense of what is ultimate,
    genuine, or corresponding fully to God's reality. 'True' best preserves both the
    traditional resonance and the theological depth without over-interpreting.
- source_word: πατήρ μου
  chosen: my Father
  alternatives:
  - my father
  lexicon: BDAG
  rationale: Capitalized 'Father' is appropriate in English when referring to God
    in direct theological relation to Jesus, preserving the personal and titular force
    of the expression.
- source_word: γεωργός
  chosen: gardener
  alternatives:
  - vinedresser
  - farmer
  - cultivator
  lexicon: BDAG
  rationale: γεωργός denotes one who works/cultivates the land. In the immediate vine
    metaphor, 'gardener' is clear, natural modern English and fits optimal equivalence.
    'Vinedresser' is more specialized and formally precise, but less accessible; it
    is worth preserving in a footnote as a lexical alternative.
