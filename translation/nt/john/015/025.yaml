id: JHN.15.25
reference: John 15:25
source:
  edition: SBLGNT
  text: ἀλλ’ ἵνα πληρωθῇ ὁ λόγος ὁ ⸂ἐν τῷ νόμῳ αὐτῶν γεγραμμένος⸃ ὅτι Ἐμίσησάν με
    δωρεάν.
translation:
  text: 'But this happened so that the word written in their Law might be fulfilled:
    ‘They hated me without cause.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'But so that the word written in their Law might be fulfilled.'
      The Greek leaves the main clause elliptical, and English often supplies 'this
      happened' from the context.
    reason: lexical_alternative
  - marker: b
    text: '''Their Law'' uses ''Law'' in the broader Jewish sense of the Scriptures;
      the quotation is from the Psalms (cf. Ps 35:19; 69:4).'
    reason: cross_reference
  - marker: c
    text: Or 'for no reason.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - But this happened
  - Rather
  lexicon: BDAG
  rationale: Adversative conjunction linking this verse to the preceding statement.
    'But' preserves the contrast succinctly; the supplied 'this happened' is implied
    in English by the clause that follows.
- source_word: ἵνα πληρωθῇ
  chosen: so that ... might be fulfilled
  alternatives:
  - in order that ... might be fulfilled
  - so that ... would be fulfilled
  lexicon: BDAG
  rationale: The conjunction ἵνα with aorist passive subjunctive expresses purpose/result.
    'So that ... might be fulfilled' is idiomatic English and preserves the fulfillment
    motif common in John without overstating determinism beyond the syntax.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the saying
  - the statement
  lexicon: BDAG
  rationale: λόγος here refers to a specific scriptural utterance rather than the
    broader theological sense of 'Word' in Johannine prologue usage. 'The word' is
    natural and fits citation formula language.
- source_word: ἐν τῷ νόμῳ αὐτῶν γεγραμμένος
  chosen: written in their Law
  alternatives:
  - that is written in their law
  - recorded in their Law
  lexicon: BDAG
  rationale: γεγραμμένος is a perfect passive participle, indicating what stands written.
    'Written in their Law' is concise and natural. 'Law' is capitalized because in
    Johannine usage νόμος can refer broadly to the Jewish Scriptures, not merely legal
    material; 'their' reflects Jesus' rhetorical distancing, not denial of the Scriptures'
    divine authority.
- source_word: νόμῳ
  chosen: Law
  alternatives:
  - law
  - Scripture
  lexicon: BDAG
  rationale: Though the quotation comes from the Psalms, John can use νόμος broadly
    for the Jewish Scriptures. 'Law' preserves the Greek term while allowing the broader
    canonical reference to be understood from context.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - your
  - theirs
  lexicon: BDAG
  rationale: The genitive pronoun is straightforwardly 'their.' It should be retained
    because it reflects Jesus' rhetorical stance toward those opposing him.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of the scriptural word. In English, a colon smoothly
    introduces the quotation while preserving the sense of ὅτι.
- source_word: Ἐμίσησάν με
  chosen: They hated me
  alternatives:
  - They have hated me
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this citation context.
    'They hated me' matches the quoted Psalm wording and reads naturally.
- source_word: δωρεάν
  chosen: without cause
  alternatives:
  - for no reason
  - gratuitously
  lexicon: BDAG
  rationale: δωρεάν here means 'without cause' or 'for no reason.' 'Without cause'
    preserves the judicial/moral nuance of undeserved hatred and matches established
    English biblical idiom without sounding archaic.
