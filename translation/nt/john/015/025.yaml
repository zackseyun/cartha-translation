theological_decisions:
- issue: Meaning of 'their Law' in a quotation from the Psalms
  chosen_reading: Render νόμος as 'Law' while understanding it as a broader reference
    to the Jewish Scriptures, here including the Psalms.
  alternative_readings:
  - Render as 'Scripture' to make the broader reference explicit
  - Render as 'law' in lowercase as a generic designation
  rationale: The Greek explicitly says νόμος, so the main text should preserve 'Law'
    rather than interpretively replacing it with 'Scripture.' At the same time, the
    translation notes should recognize Johannine usage in which 'Law' can encompass
    more than the Pentateuch. This preserves source-language form while avoiding a
    misleadingly narrow interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Supplying an implied subject in English
  chosen_reading: 'Add ''this happened'' for natural English: ''But this happened
    so that...'''
  alternative_readings:
  - Leave the clause more formally as 'But so that the word... might be fulfilled'
  rationale: The Greek is elliptical after ἀλλ’ and depends on the preceding context.
    Supplying 'this happened' makes the sentence intelligible in contemporary English
    without adding new theological content. This is an optimal-equivalence adjustment
    rather than a doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic'
