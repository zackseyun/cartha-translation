id: JHN.15.19
reference: John 15:19
source:
  edition: SBLGNT
  text: εἰ ἐκ τοῦ κόσμου ἦτε, ὁ κόσμος ἂν τὸ ἴδιον ἐφίλει· ὅτι δὲ ἐκ τοῦ κόσμου οὐκ
    ἐστέ, ἀλλ’ ἐγὼ ἐξελεξάμην ὑμᾶς ἐκ τοῦ κόσμου, διὰ τοῦτο μισεῖ ὑμᾶς ὁ κόσμος.
translation:
  text: If you were from the world, the world would love its own. But because you
    are not from the world, but I chose you out of the world, for this reason the
    world hates you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the world' for 'from the world' (ἐκ τοῦ κόσμου); the Greek preposition
      can express source or belonging. The main text keeps the repeated preposition
      visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ κόσμου
  chosen: from the world
  alternatives:
  - of the world
  - belonging to the world
  lexicon: BDAG
  rationale: The preposition ἐκ is most directly 'from/out of.' In Johannine usage,
    'from the world' preserves both source/belonging nuance without overinterpreting.
    'Of the world' is idiomatic in English tradition, but 'from' better reflects the
    Greek repeated three times in the verse.
- source_word: κόσμος
  chosen: world
  alternatives:
  - world-system
  lexicon: BDAG
  rationale: κόσμος in John often refers to the human order in rebellion against God.
    'World' is the standard rendering and preserves the theological breadth; 'world-system'
    would be interpretive and too narrow for the main text.
- source_word: ἂν ... ἐφίλει
  chosen: would love
  alternatives:
  - would be loving
  lexicon: BDAG
  rationale: The combination of ἄν with the imperfect here expresses a contrary-to-fact
    result in past unreality. English 'would love' communicates the conditional force
    naturally.
- source_word: τὸ ἴδιον
  chosen: its own
  alternatives:
  - what is its own
  - its own people
  lexicon: BDAG
  rationale: The neuter singular with article functions idiomatically for what belongs
    to oneself/one's own. 'Its own' is concise and natural. 'Its own people' is possible
    by sense, but adds specificity not explicit in the Greek.
- source_word: φιλέω
  chosen: love
  alternatives:
  - have affection for
  - be fond of
  lexicon: BDAG
  rationale: Although φιλέω can emphasize affection or friendship, in this context
    'love' is the clearest natural English equivalent and preserves the contrast with
    μισέω ('hate').
- source_word: ὅτι δὲ
  chosen: But because
  alternatives:
  - but since
  - however, because
  lexicon: BDAG
  rationale: This combination introduces the explanatory contrast to the unreal condition.
    'But because' captures both the adversative δέ and the causal ὅτι in readable
    English.
- source_word: ἐξελεξάμην
  chosen: I chose
  alternatives:
  - I selected
  - I chose for myself
  lexicon: BDAG
  rationale: The aorist middle of ἐκλέγομαι means 'choose/select.' 'I chose' is the
    most natural rendering. The middle voice may carry personal involvement, but 'for
    myself' would overstate what English must make explicit here.
- source_word: ἐκ τοῦ κόσμου
  chosen: out of the world
  alternatives:
  - from the world
  lexicon: BDAG
  rationale: Here 'out of the world' is used with ἐξελεξάμην to make the separation/removal
    nuance more explicit in English while still reflecting ἐκ. This is a documented
    contextual variation from the earlier 'from the world.'
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - because of this
  - therefore
  lexicon: BDAG
  rationale: '''For this reason'' preserves the explicit causal phrase without flattening
    it into a mere connective like ''therefore.'''
- source_word: μισεῖ
  chosen: hates
  alternatives:
  - is hating
  - detests
  lexicon: BDAG
  rationale: Present tense with ongoing force is best rendered by simple English present
    here. 'Hates' preserves the stark opposition without softening.
