theological_decisions:
- issue: Meaning of 'the world' in Johannine context
  chosen_reading: Retain 'world' in the main text without interpretive expansion.
  alternative_readings:
  - the world-system
  - human society opposed to God
  rationale: The verse contrasts Jesus' disciples with 'the world' as a moral-spiritual
    sphere opposed to him. Translating simply as 'world' preserves John's theological
    category without importing a narrower doctrinal explanation into the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Implication of divine/electing choice in ἐξελεξάμην
  chosen_reading: Translate straightforwardly as 'I chose you out of the world' without
    importing a denominational doctrine of election.
  alternative_readings:
  - Render with stronger theological freight tied to predestination systems
  rationale: The verse clearly states Jesus' choosing of the disciples, but does not
    itself require resolution of later debates between Christian traditions. The translation
    preserves the statement while avoiding doctrinal over-specification.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
