theological_decisions:
- issue: Johannine mutual-indwelling language
  chosen_reading: Retain 'remains in me, and I in him' with the preposition 'in' rather
    than weakening to 'with.'
  alternative_readings:
  - remains with me, and I with him
  rationale: The verse expresses reciprocal union between Jesus and the disciple.
    Preserving 'in' best reflects the Greek and maintains the theological tension
    and depth of Johannine indwelling language without overexplaining it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Generic masculine pronoun αὐτῷ
  chosen_reading: Render as 'him' in the main text.
  alternative_readings:
  - them
  - that person
  rationale: The Greek is grammatically masculine singular with representative force.
    Per the doctrine's gender-accurate principle, the translation keeps the masculine
    form rather than flattening it into a gender-neutral plural or paraphrase. Inclusivity
    concerns can be noted in a footnote.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
