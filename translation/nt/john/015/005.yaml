id: JHN.15.5
reference: John 15:5
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ἡ ἄμπελος, ὑμεῖς τὰ κλήματα. ὁ μένων ἐν ἐμοὶ κἀγὼ ἐν αὐτῷ οὗτος φέρει
    καρπὸν πολύν, ὅτι χωρὶς ἐμοῦ οὐ δύνασθε ποιεῖν οὐδέν.
translation:
  text: I am the vine; you are the branches. The one who remains in me, and I in him,
    bears much fruit, because apart from me you are not able to do anything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abides in me.' The Greek verb can also be rendered 'abide,' especially
      in John, to emphasize ongoing relational continuance.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in him' uses a masculine singular form with representative force;
      the statement applies generally to any disciple who remains in Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμπελος
  chosen: vine
  alternatives:
  - grapevine
  lexicon: BDAG
  rationale: The standard sense is 'vine,' and in this metaphorical context it is
    the natural, idiomatic English equivalent. 'Grapevine' is more specific but unnecessarily
    explicit since the image is already conventional and clear in context.
- source_word: κλήματα
  chosen: branches
  alternatives:
  - vine-branches
  - shoots
  lexicon: BDAG
  rationale: In viticultural context κλῆμα refers to a branch/shoot of a vine. 'Branches'
    is the most natural English rendering and preserves the metaphor without overtechnical
    wording.
- source_word: ὁ μένων
  chosen: the one who remains
  alternatives:
  - whoever remains
  - the one abiding
  lexicon: BDAG
  rationale: μένω in Johannine usage often carries the sense of continuing, remaining,
    or abiding in relational union. 'Remains' is chosen for readable modern English
    while preserving the durative relational sense. 'Abiding' is traditional but less
    natural for many modern readers.
- source_word: ἐν ἐμοὶ ... ἐν αὐτῷ
  chosen: in me ... in him
  alternatives:
  - with me ... with him
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in' to preserve the strong mutual-indwelling
    language of the Greek. Rendering it as 'with' would weaken the theological and
    relational force of the expression.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - I also
  lexicon: BDAG
  rationale: 'The crasis means ''and I.'' This preserves the reciprocal structure:
    the disciple remains in Jesus, and Jesus in that person.'
- source_word: φέρει
  chosen: bears
  alternatives:
  - produces
  lexicon: BDAG
  rationale: Within the vine metaphor, 'bears' is the natural collocation with 'fruit'
    and preserves the imagery better than the more generic 'produces.'
- source_word: καρπὸν πολύν
  chosen: much fruit
  alternatives:
  - a lot of fruit
  - abundant fruit
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering and fits both the agricultural
    metaphor and Johannine style. 'Abundant fruit' is possible but slightly more interpretive.
- source_word: χωρὶς ἐμοῦ
  chosen: apart from me
  alternatives:
  - without me
  lexicon: BDAG
  rationale: χωρίς can mean 'without' or 'apart from.' 'Apart from me' better conveys
    separation from Christ rather than mere lack of assistance, and it is well established
    in English without being archaic.
- source_word: οὐ δύνασθε
  chosen: you are not able
  alternatives:
  - you cannot
  lexicon: BDAG
  rationale: The phrase explicitly expresses inability. 'You are not able' is slightly
    more formal and transparent to the Greek δύναμαι, though still natural English.
    It avoids any ambiguity between prohibition and incapacity.
- source_word: ποιεῖν οὐδέν
  chosen: to do anything
  alternatives:
  - to do nothing
  lexicon: BDAG
  rationale: The Greek construction with οὐ and οὐδέν yields the sense 'do nothing
    / do anything' under negation. In idiomatic English after 'not able,' 'to do anything'
    is the clearest rendering and avoids an awkward double negative.
