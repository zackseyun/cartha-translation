id: JHN.15.3
reference: John 15:3
source:
  edition: SBLGNT
  text: ἤδη ὑμεῖς καθαροί ἐστε διὰ τὸν λόγον ὃν λελάληκα ὑμῖν·
translation:
  text: Already you are clean because of the word that I have spoken to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the word that I have spoken to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  chosen: Already
  alternatives:
  - Already now
  - By now
  lexicon: BDAG
  rationale: Marks a present state already in effect, contrasting with the pruning/cleansing
    imagery in the surrounding context. 'Already' is concise and natural English.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis. English can convey this without
    an awkward reflexive; the emphasis is sufficiently preserved by word order with
    'Already you are clean.'
- source_word: καθαροί
  chosen: clean
  alternatives:
  - pure
  lexicon: BDAG
  rationale: In the immediate vine/pruning context, 'clean' preserves the verbal and
    thematic link with cleansing/pruning language better than the more abstract 'pure'.
- source_word: διὰ τὸν λόγον
  chosen: because of the word
  alternatives:
  - through the word
  - on account of the word
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or cause here. 'Because
    of' best reflects the causal sense in this context, indicating the means by which
    Jesus' disciples are already clean.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  - teaching
  lexicon: BDAG
  rationale: '''Word'' is the most direct rendering and preserves Johannine diction.
    ''Message'' is possible but slightly more interpretive.'
- source_word: ὃν λελάληκα
  chosen: that I have spoken
  alternatives:
  - which I have spoken
  - that I spoke
  lexicon: BDAG
  rationale: The perfect tense λελάληκα suggests a past speaking with abiding result;
    'have spoken' preserves that better than simple past. 'That' is idiomatic for
    the relative clause in English.
- source_word: λαλέω
  chosen: spoken
  alternatives:
  - said
  lexicon: BDAG
  rationale: '''Spoken'' matches the verbal idea of utterance and pairs naturally
    with ''word.'' ''Said'' is possible but less formally aligned with the Greek wording.'
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to you all
  lexicon: BDAG
  rationale: Dative indirect object is straightforwardly rendered 'to you.' The plural
    is clear from context without adding 'all' in the main text.
