theological_decisions:
- issue: Nature of the disciples' cleanness
  chosen_reading: Render the statement as present spiritual/moral cleanness without
    importing a technical doctrinal category such as justification or sacramental
    cleansing.
  alternative_readings:
  - A specifically sacramental cleansing
  - A forensic declaration of justification
  rationale: The immediate context uses vine and pruning imagery, and Jesus grounds
    their cleanness in his spoken word. The translation should preserve the metaphor
    and theological openness of the text rather than narrowing it to a later doctrinal
    formulation.
  doctrine_reference: Preserve theological tension rather than resolve it.
