theological_decisions:
- issue: Nature of 'my joy' in Johannine context
  chosen_reading: Rendered as 'my joy' without interpretive expansion, allowing both
    the sense of Jesus' own joy shared with believers and joy derived from union with
    him.
  alternative_readings:
  - the joy I give
  - joy about me
  rationale: The Greek simply says 'my joy.' Expanding it to 'the joy I give' or similar
    would import interpretation beyond the text. The translation preserves the theological
    richness without narrowing it.
  doctrine_reference: Preserve theological tension rather than resolve it.
