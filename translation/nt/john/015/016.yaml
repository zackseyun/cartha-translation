theological_decisions:
- issue: Potential doctrinal overreading of ἐξελεξάμην in relation to election
  chosen_reading: Rendered as 'I chose you' in the immediate discipleship/mission
    context without importing a technical doctrine of election into the translation.
  alternative_readings:
  - Rendered with 'elected' to foreground theological election
  rationale: The verse certainly includes divine initiative, but the translation should
    not force a later systematic-theological category into the main text where the
    Greek itself simply says 'chose.' This preserves theological tension and allows
    readers to interpret within broader context.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Meaning of ἔθηκα ὑμᾶς
  chosen_reading: Understood as appointment/commissioning to mission and fruit-bearing.
  alternative_readings:
  - Understood more literally as 'I set you'
  - Understood as ordination to office
  rationale: 'In context, Jesus speaks of assigning the disciples to a purpose: going,
    bearing fruit, and praying in his name. ''Appointed'' communicates this clearly
    without narrowing the statement to ecclesial office alone.'
  doctrine_reference: Translation philosophy items 1 and 6
- issue: Force of the final ἵνα clause
  chosen_reading: 'Translated as a purpose/result clause: ''so that whatever you ask
    the Father in my name, he may give you.'''
  alternative_readings:
  - 'Taken as a direct promise with stronger future force: ''he will give you'''
  rationale: The Greek syntax links the prayer promise to the disciples' appointment
    and fruit-bearing through ἵνα. Rendering it with 'may give' preserves the subordinate
    purpose/result nuance and avoids flattening the syntax into an unconditional standalone
    formula.
  doctrine_reference: Translation philosophy items 1 and 3
