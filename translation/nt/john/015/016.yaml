id: JHN.15.16
reference: John 15:16
source:
  edition: SBLGNT
  text: οὐχ ὑμεῖς με ἐξελέξασθε, ἀλλ’ ἐγὼ ἐξελεξάμην ὑμᾶς, καὶ ἔθηκα ὑμᾶς ἵνα ὑμεῖς
    ὑπάγητε καὶ καρπὸν φέρητε καὶ ὁ καρπὸς ὑμῶν μένῃ, ἵνα ὅ τι ἂν αἰτήσητε τὸν πατέρα
    ἐν τῷ ὀνόματί μου δῷ ὑμῖν.
translation:
  text: You did not choose me, but I chose you and appointed you so that you should
    go and bear fruit, and that your fruit should remain, so that whatever you ask
    the Father in my name, he may give you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'selected you'; the verb can also be rendered 'elected,' but 'chose'
      best fits the immediate context without importing later theological terminology
      into the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'abide.' John frequently uses this verb for continuing relationally or
      enduring over time; here 'remain' is used for readable modern English.
    reason: lexical_alternative
  - marker: c
    text: The Greek reads 'the Father,' not 'my Father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελέξασθε / ἐξελεξάμην
  chosen: choose / chose
  alternatives:
  - select / selected
  - elect / elected
  lexicon: BDAG
  rationale: The verb ἐκλέγομαι means to choose or select. 'Choose' is the most natural
    modern English equivalent and preserves the relational contrast in the verse without
    importing later theological terminology such as 'elect' into the main text.
- source_word: ἔθηκα
  chosen: appointed
  alternatives:
  - set
  - placed
  lexicon: BDAG
  rationale: τίθημι is literally 'put' or 'set,' but in this context of assigning
    the disciples to a purpose, 'appointed' best conveys purposeful commissioning
    in readable English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - that
  - in order that
  lexicon: BDAG
  rationale: The conjunction introduces purpose clauses twice in the verse. 'So that'
    communicates purpose clearly in contemporary English while preserving the syntax's
    forward movement.
- source_word: ὑπάγητε
  chosen: go
  alternatives:
  - go forth
  - depart
  lexicon: BDAG
  rationale: ὑπάγω can mean go, depart, or go away. Here it likely carries the sense
    of going out in mission or activity. 'Go' is sufficiently broad and idiomatic;
    'go forth' is possible but sounds archaic.
- source_word: καρπὸν φέρητε
  chosen: bear fruit
  alternatives:
  - produce fruit
  lexicon: BDAG
  rationale: This is a standard Johannine metaphor. 'Bear fruit' preserves the metaphor
    and aligns with natural English usage in this literary context.
- source_word: μένῃ
  chosen: remain
  alternatives:
  - abide
  - last
  - endure
  lexicon: BDAG
  rationale: μένω is a key Johannine term often rendered 'remain' or 'abide.' 'Remain'
    is preferred for accessible modern English and maintains lexical consistency with
    Johannine usage without archaic overtones.
- source_word: ὅ τι ἂν αἰτήσητε
  chosen: whatever you ask
  alternatives:
  - whatever you might ask
  - whatever you request
  lexicon: BDAG
  rationale: 'The relative expression with ἄν conveys an indefinite breadth: ''whatever.''
    ''Ask'' fits αἰτέω well in prayer contexts and is more natural than ''request''
    here.'
- source_word: ἐν τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - in union with me
  lexicon: BDAG
  rationale: This is the standard and semantically appropriate rendering. It preserves
    the theological and relational force of prayer offered in Jesus's name without
    over-interpreting the phrase.
- source_word: δῷ
  chosen: he may give
  alternatives:
  - he will give
  - he might give
  lexicon: BDAG
  rationale: The aorist subjunctive under ἵνα is purpose/result-oriented. 'May give'
    best reflects the subordinate construction in English without overstating it as
    a simple future.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text reads 'the Father,' not 'my Father.' The translation preserves
    the article as given while still reflecting Johannine usage.
