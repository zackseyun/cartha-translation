  from: someone lay down his life for his friends
  to: a person lay down their life for their friends
  rationale: The Greek indefinite pronoun 'τις' is gender-neutral. The traditional rendering using a generic 'his' can be perceived as awkward or non-inclusive in contemporary English. Using the singular 'they' with 'a person' is a common and natural solution in modern usage that accurately reflects the generic nature of the Greek subject without introducing a gender limitation not present in the source text.
