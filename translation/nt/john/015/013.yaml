theological_decisions:
- issue: Sense of ψυχή in a self-sacrificial saying
  chosen_reading: Rendered as 'life' rather than 'soul.'
  alternative_readings:
  - '''soul'''
  rationale: The verse speaks of concrete self-sacrifice unto death for others, so 'life' reflects the contextual sense without importing a body-soul dichotomy the text is not emphasizing.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of ὑπέρ in relation to sacrificial love
  chosen_reading: Rendered simply as 'for' in the main text.
  alternative_readings:
  - '''on behalf of'''
  - '''in place of'''
  rationale: The preposition can carry representational or benefactive force, and in Johannine theology may resonate with sacrificial substitution. The translation preserves the wording without over-specifying a doctrinal nuance not lexically required in this verse alone.
  doctrine_reference: Translation philosophy §3
