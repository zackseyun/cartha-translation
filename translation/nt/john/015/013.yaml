id: JHN.15.13
reference: John 15:13
source:
  edition: SBLGNT
  text: μείζονα ταύτης ἀγάπην οὐδεὶς ἔχει, ἵνα τις τὴν ψυχὴν αὐτοῦ θῇ ὑπὲρ τῶν φίλων αὐτοῦ.
translation:
  text: 'No one has greater love than this: that a person lay down their life for their friends.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that one lay down his life for his friends.' The Greek uses an indefinite singular subject.
    reason: lexical_alternative
  - marker: b
    text: '''Life'' translates Greek psychē, which can also mean ''soul'' or ''self''; here the sense is one''s life given up in death.'
    reason: lexical_alternative
  - marker: c
    text: '''For'' translates Greek hyper, which can also be rendered ''on behalf of'' or ''for the sake of.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'someone lay down his life for his friends'.
    reason: previous_rendering
lexical_decisions:
- source_word: μείζονα
  chosen: greater
  alternatives:
  - more
  lexicon: BDAG
  rationale: Comparative of μέγας; 'greater' is the natural English comparative in this construction ('greater love').
- source_word: ταύτης
  chosen: than this
  alternatives:
  - than these things
  - than this kind of love
  lexicon: BDAG
  rationale: Genitive of comparison with the demonstrative; in idiomatic English the phrase is best rendered 'than this,' pointing forward to the defining clause.
- source_word: ἀγάπην
  chosen: love
  lexicon: BDAG
  rationale: Default rendering per doctrine table; standard sense here is self-giving love.
- source_word: οὐδεὶς ἔχει
  chosen: No one has
  alternatives:
  - No one possesses
  lexicon: BDAG
  rationale: Straightforward negated existential/possessive expression; 'has' is natural modern English.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - namely that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content that defines what 'this' love is, not primarily purpose. 'That' communicates the epexegetical/result-like force in readable English.
- source_word: τις
  chosen: someone
  alternatives:
  - one
  - a person
  lexicon: BDAG
  rationale: Indefinite subject in a general statement. 'Someone' is idiomatic and preserves the generic force without awkwardness.
- source_word: τὴν ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: In this context ψυχή refers to earthly life laid down in death, not merely the immaterial soul. 'Life' best matches Johannine usage here.
- source_word: θῇ
  chosen: lay down
  alternatives:
  - give
  - set down
  lexicon: BDAG
  rationale: τίθημι with ψυχήν in Johannine context is the established idiom 'lay down [one's] life,' especially in sacrificial/self-giving contexts.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: ὑπέρ here denotes benefactive representation/substitutionary benefit. 'For' is concise and natural, while the fuller nuance can be noted theologically.
- source_word: τῶν φίλων αὐτοῦ
  chosen: his friends
  alternatives:
  - the ones dear to him
  lexicon: BDAG
  rationale: φίλος means 'friend'; the possessive is retained directly.
