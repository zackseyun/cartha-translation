id: JHN.15.21
reference: John 15:21
source:
  edition: SBLGNT
  text: ἀλλὰ ταῦτα πάντα ποιήσουσιν ⸂εἰς ὑμᾶς⸃ διὰ τὸ ὄνομά μου, ὅτι οὐκ οἴδασιν τὸν
    πέμψαντά με.
translation:
  text: But they will do all these things to you because of my name, because they
    do not know the one who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against you.' The Greek phrase can denote actions directed toward the
      disciples in a hostile sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks strong contrast with the preceding statement; 'But' is natural
    and sufficiently forceful in English.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all these things here
  - all this
  lexicon: BDAG
  rationale: The combination of demonstrative plus πᾶς is best represented explicitly
    as 'all these things,' preserving both the demonstrative force and the totality.
- source_word: ποιήσουσιν
  chosen: they will do
  alternatives:
  - they will do/make
  - they will treat
  lexicon: BDAG
  rationale: Future active indicative is straightforwardly rendered 'they will do.'
    Although English may idiomatically expand to 'treat you this way,' the Greek verb
    itself is broader, so the object phrase supplies the sense.
- source_word: εἰς ὑμᾶς
  chosen: to you
  alternatives:
  - against you
  - toward you
  lexicon: BDAG
  rationale: In this context εἰς with persons after ποιέω conveys action directed
    at the disciples. 'To you' is idiomatic and broad enough to cover hostile acts
    without over-specifying. 'Against you' is interpretive and stronger than the Greek
    requires.
- source_word: διὰ τὸ ὄνομά μου
  chosen: because of my name
  alternatives:
  - on account of my name
  - for my name's sake
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or cause. 'Because of my name'
    is clear modern English and preserves the biblical significance of 'name' as representing
    Jesus' person, identity, and claimed authority.
- source_word: ὄνομά
  chosen: name
  alternatives:
  - reputation
  lexicon: BDAG
  rationale: Retains the theological and relational weight of the Greek rather than
    reducing it to mere 'reputation.' In Johannine usage, 'name' carries representative
    significance.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the persecution. 'Because' is clearer
    for contemporary readers than 'for' in this causal sense.
- source_word: οὐκ οἴδασιν
  chosen: they do not know
  alternatives:
  - they have not known
  - they are not acquainted with
  lexicon: BDAG
  rationale: οἶδα in Johannine usage often denotes relational knowledge, not mere
    information. 'Do not know' preserves both simplicity and theological depth.
- source_word: τὸν πέμψαντά με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The articular participle is naturally rendered as a substantive phrase.
    'The one who sent me' is idiomatic, clear, and preserves the personal reference
    to the Father without importing the title explicitly into the text.
