theological_decisions:
- issue: Referent of 'the one who sent me'
  chosen_reading: An implicit reference to the Father is preserved as 'the one who
    sent me' rather than made explicit as 'the Father who sent me.'
  alternative_readings:
  - the Father who sent me
  rationale: The context in John makes the referent clear, but the Greek itself uses
    an articular participle rather than the noun 'Father.' Preserving the wording
    avoids adding an explicit title not present in the text while maintaining orthodox
    Johannine theology of the Son's mission.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
