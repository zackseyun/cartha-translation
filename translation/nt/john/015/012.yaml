theological_decisions:
- issue: Rendering of ἀγαπάω/ἀγάπη language
  chosen_reading: love
  alternative_readings:
  - charity
  rationale: The doctrine excerpt specifies 'love' as the default rendering for ἀγάπη
    and its cognates. Using the cognate 'love' here preserves lexical continuity within
    the passage and avoids archaic English.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: Force of Jesus' command
  chosen_reading: 'This is my command: that you love one another just as I have loved
    you.'
  alternative_readings:
  - This is my commandment, that you love one another as I loved you.
  rationale: The translation preserves the imperative authority of Jesus' words without
    importing additional doctrinal nuance. 'Just as I have loved you' keeps the text's
    ethical and christological patterning intact while remaining readable modern English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; readable
    modern English'
