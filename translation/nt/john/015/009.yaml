theological_decisions:
- issue: Rendering of ἀγάπη
  chosen_reading: love
  alternative_readings:
  - charity
  rationale: The doctrine excerpt specifies 'love' as the default rendering for ἀγάπη.
    'Charity' is archaic and unsuitable here.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: Aspectual force of the two aorist verbs ἠγάπησέν / ἠγάπησα
  chosen_reading: English present perfect ('has loved' / 'have loved')
  alternative_readings:
  - simple past ('loved' / 'loved')
  rationale: This is not a doctrinally contested issue, but it affects theological
    nuance. The present perfect in English better conveys that the Father's love for
    the Son and the Son's love for the disciples are not merely past events but continuing
    realities within the discourse. This preserves the text's relational force without
    overstating Greek aspect.
