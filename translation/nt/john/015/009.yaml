id: JHN.15.9
reference: John 15:9
source:
  edition: SBLGNT
  text: καθὼς ἠγάπησέν με ὁ πατήρ, κἀγὼ ⸂ὑμᾶς ἠγάπησα⸃, μείνατε ἐν τῇ ἀγάπῃ τῇ ἐμῇ.
translation:
  text: Just as the Father has loved me, I also have loved you; remain in my love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Just as the Father loved me, I also loved you; remain in my love.''
      The Greek uses aorist verbs, which can be rendered with a simple past; the main
      text uses the English perfect to reflect continuing relevance in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  - In the same way as
  lexicon: BDAG
  rationale: Introduces comparison between the Father's love for Jesus and Jesus'
    love for the disciples. 'Just as' preserves the comparative force in natural English.
- source_word: ἠγάπησέν
  chosen: has loved
  alternatives:
  - loved
  lexicon: BDAG
  rationale: Although the Greek aorist is formally past, in English 'has loved' can
    better convey a past action with abiding relevance in this discourse context.
    It also matches the present imperative that follows by highlighting continuing
    significance.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine usage this is a titular reference to God as Jesus' Father;
    capitalization reflects reverential/title usage in English without adding content.
- source_word: κἀγὼ
  chosen: I also
  alternatives:
  - and I
  - so I
  lexicon: BDAG
  rationale: 'Captures both the connective and emphatic force: ''and I'' plus the
    comparative correspondence with the prior clause.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object, naturally rendered 'you' in English; plurality
    is understood from context.
- source_word: ἠγάπησα
  chosen: have loved
  alternatives:
  - loved
  lexicon: BDAG
  rationale: Matches the first verb for consistency and conveys Jesus' completed yet
    abiding love for the disciples in context.
- source_word: μείνατε
  chosen: remain
  alternatives:
  - abide
  - stay
  lexicon: BDAG
  rationale: Aorist imperative of μένω. 'Remain' is clear modern English and preserves
    the Johannine theme without the archaic feel of 'abide.' 'Stay' is possible but
    lighter in theological resonance.
- source_word: ἐν τῇ ἀγάπῃ τῇ ἐμῇ
  chosen: in my love
  alternatives:
  - in the love that is mine
  - in my affection
  lexicon: BDAG
  rationale: Uses the default rendering 'love' for ἀγάπη per doctrine guidance. The
    possessive adjective ἐμῇ is naturally expressed as 'my love' in English.
