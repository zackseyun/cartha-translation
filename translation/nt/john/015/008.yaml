theological_decisions:
- issue: Whether γένησθε should be softened to 'prove to be' rather than translated
    directly as 'become'
  chosen_reading: become my disciples
  alternative_readings:
  - prove to be my disciples
  - show yourselves to be my disciples
  rationale: The Greek verb γίνομαι most directly means 'become.' Rendering it 'prove
    to be' is interpretive and often motivated by theological concerns about whether
    the disciples are already disciples in an absolute sense. Following the stated
    philosophy of preserving theological tension rather than resolving it, the main
    text keeps the direct lexical sense, while an alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
