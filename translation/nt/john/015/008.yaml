id: JHN.15.8
reference: John 15:8
source:
  edition: SBLGNT
  text: ἐν τούτῳ ἐδοξάσθη ὁ πατήρ μου ἵνα καρπὸν πολὺν φέρητε καὶ ⸀γένησθε ἐμοὶ μαθηταί.
translation:
  text: 'In this my Father is glorified: that you bear much fruit and become my disciples.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By this my Father is glorified.' The Greek phrase can also be read instrumentally.
    reason: lexical_alternative
  - marker: b
    text: Or 'prove to be my disciples' / 'show yourselves to be my disciples.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: In this
  alternatives:
  - By this
  - In this way
  lexicon: BDAG
  rationale: The phrase can be rendered instrumentally ('by this') or demonstratively/manner-wise
    ('in this,' 'in this way'). Here it points forward to the content introduced by
    ἵνα, so 'In this' preserves the Greek structure while remaining natural in English.
- source_word: ἐδοξάσθη
  chosen: is glorified
  alternatives:
  - was glorified
  - has been glorified
  lexicon: BDAG
  rationale: Although the form is aorist passive, in Johannine style the aorist can
    function effectively as a gnomic or proleptic statement tied to the following
    clause. English present 'is glorified' best conveys the ongoing reality expressed
    in context without awkwardness. The more formally literal 'was glorified' is possible
    but sounds misleading in English here.
- source_word: ὁ πατήρ μου
  chosen: my Father
  alternatives:
  - my father
  lexicon: BDAG
  rationale: Capitalized 'Father' reflects its use as a divine title for God in Johannine
    discourse, while preserving the possessive relationship expressed by μου.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - when
  lexicon: BDAG
  rationale: Here ἵνα introduces the content or result associated with 'In this my
    Father is glorified.' 'That' is concise and natural in English. 'So that' is also
    possible, but 'that' better fits the explanatory force in this context.
- source_word: καρπὸν πολὺν
  chosen: much fruit
  alternatives:
  - a lot of fruit
  - abundant fruit
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the accusative object with
    adjective. 'Much fruit' preserves the metaphor and avoids over-paraphrase.
- source_word: φέρητε
  chosen: you bear
  alternatives:
  - you may bear
  - you keep bearing
  lexicon: BDAG
  rationale: The present subjunctive under ἵνα conveys the intended action. English
    simple present after 'that' communicates this well. 'May bear' is more wooden;
    'keep bearing' adds iterative nuance not explicit in the verb itself.
- source_word: γένησθε
  chosen: become
  alternatives:
  - prove to be
  - are shown to be
  lexicon: BDAG
  rationale: γίνομαι normally means 'become' or 'come to be.' In this context some
    translations render it 'prove to be' to smooth the theology of discipleship, but
    'become' is the more direct lexical equivalent and preserves the Greek wording
    without importing a doctrinal resolution.
- source_word: ἐμοὶ μαθηταί
  chosen: my disciples
  alternatives:
  - disciples for me
  - disciples to me
  lexicon: BDAG
  rationale: The dative ἐμοί is idiomatically possessive/relational here. 'My disciples'
    is the natural English rendering and best reflects allegiance to Jesus.
