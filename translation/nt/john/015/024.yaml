id: JHN.15.24
reference: John 15:24
source:
  edition: SBLGNT
  text: εἰ τὰ ἔργα μὴ ἐποίησα ἐν αὐτοῖς ἃ οὐδεὶς ἄλλος ⸀ἐποίησεν, ἁμαρτίαν οὐκ ⸀εἴχοσαν·
    νῦν δὲ καὶ ἑωράκασιν καὶ μεμισήκασιν καὶ ἐμὲ καὶ τὸν πατέρα μου.
translation:
  text: If I had not done among them the works that no one else did, they would not
    have sin; but now they have both seen and hated both me and my Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they would not be guilty of sin.' The Greek more literally says 'they
      would not have sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - these works
  - the deeds
  lexicon: BDAG
  rationale: ἔργα commonly means works/deeds. 'Works' preserves Johannine usage, where
    Jesus' works function as evidential acts revealing his identity and mission.
- source_word: ἐποίησα ἐν αὐτοῖς
  chosen: I had done among them
  alternatives:
  - I did among them
  - I had done in their midst
  lexicon: BDAG
  rationale: The aorist in this contrary-to-fact condition is naturally rendered in
    English with pluperfect sense ('had done'). ἐν αὐτοῖς here is best taken locatively/socially
    as 'among them,' referring to Jesus' activity in their presence rather than 'in
    them.'
- source_word: ἃ οὐδεὶς ἄλλος ἐποίησεν
  chosen: that no one else did
  alternatives:
  - which no other person did
  - that no one else has done
  lexicon: BDAG
  rationale: This relative clause highlights the uniqueness of Jesus' works. 'No one
    else did' is concise, natural English and preserves the force of οὐδεὶς ἄλλος.
- source_word: ἁμαρτίαν οὐκ εἴχοσαν
  chosen: they would not have sin
  alternatives:
  - they would not be guilty of sin
  - they would not have been accountable for sin
  lexicon: BDAG
  rationale: A literal rendering best preserves the Johannine idiom 'have sin' without
    over-interpreting it as merely subjective guilt or abstract accountability. The
    phrase conveys culpability in light of revelation, but the text itself says 'have
    sin.'
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - but as it is
  - yet now
  lexicon: BDAG
  rationale: This marks the contrast between the hypothetical condition and the present
    reality. 'But now' is straightforward and idiomatic.
- source_word: καὶ ἑωράκασιν
  chosen: they have both seen
  alternatives:
  - they have seen
  - they have indeed seen
  lexicon: BDAG
  rationale: The perfect denotes a completed act with present significance. The first
    καί contributes to the correlative emphasis later completed by the second 'both
    ... and ...' structure.
- source_word: μεμισήκασιν
  chosen: hated
  alternatives:
  - have hated
  lexicon: BDAG
  rationale: The perfect can be rendered simply in English after 'have both seen and
    hated,' preserving the completed-yet-enduring force without awkwardness.
- source_word: καὶ ἐμὲ καὶ τὸν πατέρα μου
  chosen: both me and my Father
  alternatives:
  - me and my Father
  - both me and the Father who sent me
  lexicon: BDAG
  rationale: The repeated καί creates an emphatic correlative pairing. 'Both me and
    my Father' preserves that emphasis without adding interpretive material.
