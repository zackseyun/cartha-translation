theological_decisions:
- issue: Meaning of 'they would not have sin' in relation to culpability
  chosen_reading: Retain the Johannine expression 'have sin' rather than interpretively
    expanding it to 'be guilty' or 'be accountable.'
  alternative_readings:
  - they would not be guilty of sin
  - they would not be accountable for sin
  rationale: The verse teaches increased culpability in response to Jesus' unique
    revelatory works, but the translation should preserve the text's own wording and
    theological tension rather than resolve it into a narrower doctrinal formula.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
