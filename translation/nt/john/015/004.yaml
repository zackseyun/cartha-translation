id: JHN.15.4
reference: John 15:4
source:
  edition: SBLGNT
  text: μείνατε ἐν ἐμοί, κἀγὼ ἐν ὑμῖν. καθὼς τὸ κλῆμα οὐ δύναται καρπὸν φέρειν ἀφ’
    ἑαυτοῦ ἐὰν μὴ ⸀μένῃ ἐν τῇ ἀμπέλῳ, οὕτως οὐδὲ ὑμεῖς ἐὰν μὴ ἐν ἐμοὶ ⸀μένητε.
translation:
  text: Remain in me, and I in you. Just as the branch is not able to bear fruit by
    itself unless it remains in the vine, so neither are you unless you remain in
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Abide in me, and I in you.' The verb μένω can also be rendered 'abide,'
      a traditional English rendering that emphasizes ongoing dwelling or continuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: μείνατε
  chosen: Remain
  alternatives:
  - Abide
  - Stay
  lexicon: BDAG
  rationale: Aorist imperative of μένω calling for continued relational persistence.
    'Remain' is clear modern English and preserves the metaphorical sense without
    the archaic tone of 'abide.'
- source_word: ἐν ἐμοί
  chosen: in me
  alternatives:
  - with me
  lexicon: BDAG
  rationale: The preposition ἐν is best preserved as 'in' because the verse emphasizes
    union/participation rather than mere proximity or companionship.
- source_word: κἀγὼ ἐν ὑμῖν
  chosen: and I in you
  alternatives:
  - and I will remain in you
  lexicon: BDAG
  rationale: The Greek is elliptical, lacking an explicit verb; English can mirror
    this compactly. Supplying 'will remain' would over-interpret the ellipsis. The
    phrase expresses reciprocal indwelling.
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  lexicon: BDAG
  rationale: '''Just as'' clearly marks the comparison introducing the vine-branch
    analogy.'
- source_word: τὸ κλῆμα
  chosen: the branch
  lexicon: BDAG
  rationale: Standard and contextually precise rendering within the vine metaphor.
- source_word: οὐ δύναται
  chosen: is not able
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: This preserves the explicit sense of ability/inability in δύναμαι. 'Cannot'
    is possible, but 'is not able' keeps the lexical force more transparently.
- source_word: καρπὸν φέρειν
  chosen: to bear fruit
  alternatives:
  - to produce fruit
  lexicon: BDAG
  rationale: Established idiom that accurately reflects the agricultural metaphor
    and Johannine usage.
- source_word: ἀφ’ ἑαυτοῦ
  chosen: by itself
  alternatives:
  - from itself
  - on its own
  lexicon: BDAG
  rationale: Idiomatic English for independent action/source; 'by itself' fits the
    branch metaphor naturally.
- source_word: ἐὰν μὴ μένῃ
  chosen: unless it remains
  alternatives:
  - if it does not remain
  - unless it abides
  lexicon: BDAG
  rationale: Best English conditional rendering, maintaining consistency with μένω
    as 'remain.'
- source_word: ἐν τῇ ἀμπέλῳ
  chosen: in the vine
  alternatives:
  - attached to the vine
  lexicon: BDAG
  rationale: Literal rendering preserves the metaphor without adding explanatory wording
    not present in the Greek.
- source_word: οὕτως οὐδὲ ὑμεῖς
  chosen: so neither are you
  alternatives:
  - so neither can you
  - so neither do you
  lexicon: BDAG
  rationale: This carries over the implied verbal idea from the prior clause into
    idiomatic English. 'Are you' works with the supplied infinitival sense that follows
    ('able to bear fruit'), while avoiding excessive repetition.
- source_word: ἐὰν μὴ ἐν ἐμοὶ μένητε
  chosen: unless you remain in me
  alternatives:
  - unless you abide in me
  lexicon: BDAG
  rationale: Maintains the repeated key term μένω consistently and preserves the central
    theological image of union with Jesus.
