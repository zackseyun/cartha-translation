theological_decisions:
- issue: Rendering μένω in a discipleship/union context
  chosen_reading: remain
  alternative_readings:
  - abide
  rationale: The verse centers on ongoing relational union between Jesus and his disciples.
    'Remain' is more natural contemporary English while still preserving the theological
    weight of perseverance and mutual indwelling. 'Abide' is preserved as a lexical
    alternative because of its strong history in English Bible tradition.
  doctrine_reference: Translation philosophy §§5–6
- issue: Elliptical reciprocal clause κἀγὼ ἐν ὑμῖν
  chosen_reading: and I in you
  alternative_readings:
  - and I will remain in you
  rationale: The Greek leaves the verb unstated. Preserving the ellipsis avoids importing
    a more explicit promise formulation than the text states, while still communicating
    reciprocal indwelling consistent with Johannine theology.
  doctrine_reference: Translation philosophy §§1, 3
