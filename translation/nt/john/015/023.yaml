theological_decisions:
- issue: Capitalization of 'Father' in reference to God
  chosen_reading: my Father
  alternative_readings:
  - my father
  rationale: In John's Gospel, Jesus' reference to 'my Father' is a theological title
    denoting his unique relation to God. Capitalization helps English readers recognize
    the referent without altering the meaning.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), within historic ecumenical
    orthodoxy; translation should not flatten christological significance where the
    text is clear.'
