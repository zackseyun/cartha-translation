id: JHN.15.23
reference: John 15:23
source:
  edition: SBLGNT
  text: ὁ ἐμὲ μισῶν καὶ τὸν πατέρα μου μισεῖ.
translation:
  text: The one who hates me also hates my Father.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ... μισῶν
  chosen: The one who hates
  alternatives:
  - Whoever hates
  - He who hates
  - The one hating
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by the action. 'The one who hates' is natural modern
    English and preserves the generic singular force better than the more wooden 'the
    one hating.'
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun; straightforwardly rendered 'me.' The emphatic
    form in Greek is adequately carried by normal English word order in this concise
    saying.
- source_word: μισῶν / μισεῖ
  chosen: hates
  alternatives:
  - is hating
  lexicon: BDAG
  rationale: μισέω means 'to hate, detest.' English simple present best conveys the
    gnomic/general present here. Using 'hates' for both participle and finite verb
    preserves the lexical repetition in Greek.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'While καί commonly means ''and,'' in this context it links the second
    clause with an implicative force: hatred of Jesus entails hatred of the Father
    as well. ''Also'' makes that force explicit in idiomatic English without adding
    content beyond the Greek connection.'
- source_word: τὸν πατέρα μου
  chosen: my Father
  alternatives:
  - the Father of me
  - my father
  lexicon: BDAG
  rationale: πατήρ with μου is naturally 'my Father.' Capitalizing 'Father' reflects
    its use here as a reverential relational title for God in Johannine usage, not
    merely a biological or generic paternal reference.
