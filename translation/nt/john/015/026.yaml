theological_decisions:
- issue: Rendering παράκλητος in a Trinitarian context
  chosen_reading: Advocate
  alternative_readings:
  - Helper
  - Counselor
  - Comforter
  - Paraclete
  rationale: The term is semantically rich and no single English word captures every
    nuance. 'Advocate' best preserves the personal, representative, and witness-related
    role emphasized in the immediate context ('he will testify about me') while avoiding
    untranslated ecclesiastical jargon in the main text.
  doctrine_reference: Translation philosophy §§2, 6
- issue: Personal reference to the Holy Spirit
  chosen_reading: who proceeds ... he will testify
  alternative_readings:
  - which proceeds ... it will testify
  rationale: Although πνεῦμα is grammatically neuter, the verse also uses masculine
    ἐκεῖνος for the Spirit/Advocate. Rendering with personal English pronouns preserves
    the text's personal presentation of the Spirit and avoids misleading impersonal
    English.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering ἐκπορεύεται
  chosen_reading: proceeds from the Father
  alternative_readings:
  - comes from the Father
  - goes out from the Father
  rationale: Because this verb has theological significance in later Trinitarian formulation,
    a more formally transparent rendering is preferable. 'Proceeds' preserves the
    lexical specificity of the Greek without importing later doctrinal elaboration
    beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
