id: JHN.15.26
reference: John 15:26
source:
  edition: SBLGNT
  text: ⸀Ὅταν ἔλθῃ ὁ παράκλητος ὃν ἐγὼ πέμψω ὑμῖν παρὰ τοῦ πατρός, τὸ πνεῦμα τῆς ἀληθείας
    ὃ παρὰ τοῦ πατρὸς ἐκπορεύεται, ἐκεῖνος μαρτυρήσει περὶ ἐμοῦ·
translation:
  text: When the Advocate comes, whom I will send to you from the Father—the Spirit
    of truth, who proceeds from the Father—he will testify about me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Helper,' 'Counselor,' 'Comforter,' or transliterated 'Paraclete' for
      Greek παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: Or 'will bear witness about me.'
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'proceeds from the Father,' a wording later significant in
      Trinitarian theology.
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with ἄν and the subjunctive ('when/whenever').
    In this context, 'When' fits the expected future event in Jesus' discourse better
    than the more iterative 'Whenever'.
- source_word: ἔλθῃ
  chosen: comes
  alternatives:
  - has come
  - should come
  lexicon: BDAG
  rationale: 'Aorist subjunctive after ὅταν commonly refers to a future event. English
    idiom prefers present tense in a temporal clause: ''When ... comes.'''
- source_word: ὁ παράκλητος
  chosen: the Advocate
  alternatives:
  - the Helper
  - the Counselor
  - the Comforter
  - the Paraclete
  lexicon: BDAG
  rationale: παράκλητος carries the sense of one called alongside to help, represent,
    or intercede. 'Advocate' preserves the personal and representative force without
    mere transliteration, and fits Johannine usage well.
- source_word: ὃν ἐγὼ πέμψω ὑμῖν
  chosen: whom I will send to you
  alternatives:
  - whom I shall send you
  - whom I will send for you
  lexicon: BDAG
  rationale: πέμψω is straightforward future active, with ὑμῖν as indirect object.
    'To you' is the natural English rendering.
- source_word: παρὰ τοῦ πατρός
  chosen: from the Father
  alternatives:
  - from beside the Father
  - from the Father's presence
  lexicon: BDAG
  rationale: παρά with genitive commonly means 'from' or 'from the side/presence of.'
    'From the Father' is concise and natural while preserving source meaning.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  chosen: the Spirit of truth
  alternatives:
  - the truthful Spirit
  - the Spirit who is truth
  lexicon: BDAG
  rationale: A genitive construction functioning as a descriptive/title expression
    in Johannine style. 'Spirit of truth' is the established and accurate rendering.
- source_word: ὃ παρὰ τοῦ πατρὸς ἐκπορεύεται
  chosen: who proceeds from the Father
  alternatives:
  - which proceeds from the Father
  - who comes forth from the Father
  lexicon: BDAG
  rationale: Although πνεῦμα is grammatically neuter and takes neuter relative ὃ,
    English personal reference is appropriate because the Spirit is presented personally
    in context and is resumed by masculine ἐκεῖνος. ἐκπορεύεται is best rendered 'proceeds,'
    preserving the specific verbal nuance rather than flattening it to 'comes'.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  - that one himself
  lexicon: BDAG
  rationale: The demonstrative is emphatic and masculine, referring back to the παράκλητος/Spirit
    as a person. English 'he' is the natural personal rendering.
- source_word: μαρτυρήσει
  chosen: will testify
  alternatives:
  - will bear witness
  lexicon: BDAG
  rationale: Both are valid. 'Will testify' is more accessible modern English while
    retaining forensic/witness connotations.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  - regarding me
  lexicon: BDAG
  rationale: περί with genitive here means 'about/concerning.' 'About me' is clear,
    natural, and faithful.
