theological_decisions:
- issue: Scope of 'from the beginning'
  chosen_reading: Refers contextually to the disciples' presence with Jesus from the
    beginning of his public ministry/discipleship, not a metaphysical beginning.
  alternative_readings:
  - An absolute 'from the beginning' in a broader theological sense
  rationale: The immediate context concerns the disciples' qualification as witnesses
    because of their historical companionship with Jesus. The translation leaves the
    phrase as 'from the beginning' without importing a more specific doctrinal claim
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
