id: JHN.15.27
reference: John 15:27
source:
  edition: SBLGNT
  text: καὶ ὑμεῖς δὲ μαρτυρεῖτε, ὅτι ἀπ’ ἀρχῆς μετ’ ἐμοῦ ἐστε.
translation:
  text: And you also testify, because you have been with me from the beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear witness.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'you are'; rendered 'you have been' in English to express a continuing
      state from the beginning until now.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Standard connective linking this statement to the previous verse; retained
    as simple coordination.
- source_word: ὑμεῖς δὲ
  chosen: you also
  alternatives:
  - you too
  - and you
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic, and δέ adds mild contrast/continuation.
    'You also' captures the emphasis that the disciples, along with the Paraclete
    in the prior verse, bear witness.
- source_word: μαρτυρεῖτε
  chosen: testify
  alternatives:
  - bear witness
  - witness
  lexicon: BDAG
  rationale: Present active indicative, second plural. 'Testify' is natural modern
    English and preserves the forensic/witness sense of μαρτυρέω. 'Bear witness' is
    a close alternative and worth preserving in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally introduces the reason the disciples testify:
    because they have been with Jesus from the beginning. ''That'' is possible, but
    in English it is less clear and can sound awkward after ''testify.'''
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: Idiomatic rendering of the prepositional phrase. In Johannine usage this
    commonly refers to the beginning of Jesus' ministry/relationship with the disciples
    in context, not an abstract absolute beginning.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - in my company
  lexicon: BDAG
  rationale: Straightforward rendering of μετά with the genitive, expressing association.
- source_word: ἐστε
  chosen: you have been
  alternatives:
  - you are
  lexicon: BDAG
  rationale: Although formally present tense ('you are'), English idiom with 'from
    the beginning' normally requires a present perfect to express continuing state
    from past to present. This is an optimal-equivalence adjustment for naturalness
    while preserving the durative sense.
