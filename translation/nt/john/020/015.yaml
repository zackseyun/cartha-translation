theological_decisions:
- issue: Rendering of κύριε in Mary's address before recognizing the risen Jesus
  chosen_reading: Sir
  alternative_readings:
  - Lord
  rationale: The doctrine default for κύριος is 'Lord,' but context governs. Since
    Mary assumes she is speaking to the gardener, the polite-address sense is more
    likely than a christological confession. The alternative is preserved in a footnote
    for auditability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord) and Translation
    philosophy #5 (documented exception)'
