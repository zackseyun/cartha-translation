id: JHN.20.15
reference: John 20:15
source:
  edition: SBLGNT
  text: λέγει ⸀αὐτῇ Ἰησοῦς· Γύναι, τί κλαίεις; τίνα ζητεῖς; ἐκείνη δοκοῦσα ὅτι ὁ κηπουρός
    ἐστιν λέγει αὐτῷ· Κύριε, εἰ σὺ ἐβάστασας αὐτόν, εἰπέ μοι ποῦ ἔθηκας αὐτόν, κἀγὼ
    αὐτὸν ἀρῶ.
translation:
  text: Jesus says to her, “Woman, why are you weeping? Whom are you seeking?” She,
    supposing that he was the gardener, says to him, “Sir, if you carried him away,
    tell me where you put him, and I will take him away.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Lord'' (κύριε); here likely used in the sense of a respectful
      ''Sir,'' since Mary thinks she is speaking to the gardener.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γύναι
  chosen: Woman
  alternatives:
  - Madam
  - Dear woman
  lexicon: BDAG
  rationale: Vocative of γυνή used as a respectful form of address, not derogatory.
    'Woman' preserves the directness and Johannine repetition of Jesus' address while
    remaining faithful to the Greek; softer expansions like 'dear woman' add nuance
    not explicit in the text.
- source_word: τί κλαίεις
  chosen: why are you weeping
  alternatives:
  - why are you crying
  lexicon: BDAG
  rationale: κλαίω commonly denotes weeping/crying. 'Weeping' better preserves the
    solemn tone of the scene than the more colloquial 'crying.' τί here is idiomatic
    for reason, hence 'why.'
- source_word: τίνα ζητεῖς
  chosen: Whom are you seeking
  alternatives:
  - Who are you looking for
  lexicon: BDAG
  rationale: ζητέω means seek/look for. 'Seeking' preserves the verbal link with Johannine
    usage and is slightly more formal; 'whom' reflects the personal direct object
    τίνα.
- source_word: δοκοῦσα
  chosen: supposing
  alternatives:
  - thinking
  - assuming
  lexicon: BDAG
  rationale: The participle indicates Mary's mistaken inference. 'Supposing' is concise
    and fits the narrative flow without overstating certainty.
- source_word: ὁ κηπουρός
  chosen: the gardener
  alternatives:
  - the groundskeeper
  lexicon: BDAG
  rationale: κηπουρός straightforwardly denotes a gardener. 'Groundskeeper' is more
    interpretive and less direct.
- source_word: Κύριε
  chosen: Sir
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Although κύριος defaults to 'Lord' as a title, here Mary does not yet
    recognize Jesus and addresses the presumed gardener politely. 'Sir' best reflects
    the situational sense of respectful address; 'Lord' is preserved as an alternative
    because the Greek form is the same word.
- source_word: ἐβάστασας αὐτόν
  chosen: you carried him away
  alternatives:
  - you took him away
  - you bore him away
  lexicon: BDAG
  rationale: βαστάζω can mean carry, bear, or take up. In context of moving a body,
    'carried him away' is natural English and preserves the physical sense.
- source_word: ποῦ ἔθηκας αὐτόν
  chosen: where you put him
  alternatives:
  - where you laid him
  - where you placed him
  lexicon: BDAG
  rationale: τίθημι means put/place/lay. 'Put' is idiomatic modern English; 'laid'
    is possible and slightly more traditional, but not required by the context.
- source_word: κἀγὼ αὐτὸν ἀρῶ
  chosen: and I will take him away
  alternatives:
  - and I will carry him off
  - and I will remove him
  lexicon: BDAG
  rationale: αἴρω often means take up, carry, remove. 'Take him away' is natural in
    English and matches Mary's intent to retrieve the body. The future tense is preserved
    with 'will'.
