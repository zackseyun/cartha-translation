theological_decisions:
- issue: Rhetorical force of Jesus' first clause
  chosen_reading: 'Rendered as a question: ''Because you have seen me, you have believed?'''
  alternative_readings:
  - 'Rendered as a statement: ''Because you have seen me, you have believed.'''
  rationale: The punctuation in modern editions reflects an interrogative reading,
    and the context supports a gentle rebuke or contrast between Thomas's sight-based
    belief and the blessedness of later believers who do not see. Since ancient manuscripts
    lacked modern punctuation, the statement reading remains possible and is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it
