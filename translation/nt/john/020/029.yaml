id: JHN.20.29
reference: John 20:29
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· Ὅτι ἑώρακάς με πεπίστευκας; μακάριοι οἱ μὴ ἰδόντες καὶ
    πιστεύσαντες.
translation:
  text: Jesus said to him, “Because you have seen me, you have believed? Blessed are
    those who have not seen and yet have believed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Because you have seen me, you have believed.' The Greek can be read
      as either a question or a statement.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense ('says'), narrative present in Greek
    is commonly rendered with English past tense for natural narrative flow. αὐτῷ
    is retained as 'to him,' referring to Thomas.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - Have you believed because
  - That
  lexicon: BDAG
  rationale: 'Ὅτι can introduce either a causal clause (''because'') or content. Here
    it most naturally introduces the reason connected to Thomas''s believing: ''Because
    you have seen me, you have believed?'' This preserves the rhetorical force without
    over-paraphrasing.'
- source_word: ἑώρακάς
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: BDAG
  rationale: Perfect tense is best represented by English present perfect, highlighting
    the completed act with present relevance.
- source_word: πεπίστευκας
  chosen: you have believed
  alternatives:
  - you believe
  lexicon: BDAG
  rationale: The perfect tense is preserved with 'have believed,' matching the Greek
    aspect and linking Thomas's present state of belief to the prior seeing.
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: '''Blessed'' is the standard and most theologically weighty rendering
    for μακάριοι in beatitude-like sayings. ''Happy'' is too weak and subjective in
    this context.'
- source_word: οἱ μὴ ἰδόντες
  chosen: those who have not seen
  alternatives:
  - the ones not having seen
  - those who did not see
  lexicon: BDAG
  rationale: The substantival participle is naturally rendered as 'those who have
    not seen.' The perfect-like English phrasing fits the aorist participle in relation
    to the following believing.
- source_word: καὶ πιστεύσαντες
  chosen: and yet have believed
  alternatives:
  - and have believed
  lexicon: BDAG
  rationale: The Greek simply has 'and having believed,' but English idiom often supplies
    'yet' to bring out the contrast implied by 'not seen ... and believed.' This is
    a modest dynamic adjustment consistent with optimal equivalence and does not add
    a new idea beyond the evident contrast.
