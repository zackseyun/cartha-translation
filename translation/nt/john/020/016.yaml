theological_decisions:
- issue: Rendering of Ἑβραϊστί in Johannine narrative
  chosen_reading: in Hebrew
  alternative_readings:
  - in Aramaic
  rationale: To honor original-language primacy, the main text follows the Greek wording
    'in Hebrew.' Because many interpreters understand John's term to denote Aramaic,
    that alternative is preserved in a footnote rather than resolved silently.
  doctrine_reference: Translation philosophy §1, §3
