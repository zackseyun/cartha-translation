id: JHN.20.16
reference: John 20:16
source:
  edition: SBLGNT
  text: λέγει ⸀αὐτῇ Ἰησοῦς· ⸀Μαριάμ. στραφεῖσα ἐκείνη λέγει αὐτῷ ⸀Ἑβραϊστί· Ραββουνι
    (ὃ λέγεται Διδάσκαλε).
translation:
  text: Jesus says to her, “Mary.” Turning, she says to him in Hebrew, “Rabboni!”
    (which means, “Teacher”).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Aramaic.” John’s “in Hebrew” can refer more broadly to the Semitic
      speech of Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Rendered as the historical present 'says,' preserving John's vivid narrative
    style rather than smoothing to the English past tense.
- source_word: αὐτῇ
  chosen: to her
  lexicon: BDAG
  rationale: Dative pronoun naturally expressed in English with the preposition 'to.'
- source_word: Μαριάμ
  chosen: Mary
  alternatives:
  - Mariam
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name; more idiomatic
    than the more literal 'Mariam' in this context.
- source_word: στραφεῖσα
  chosen: Turning
  alternatives:
  - Having turned
  - After turning
  lexicon: BDAG
  rationale: Aorist participle rendered with a concise English participle that preserves
    the sequence of action without sounding wooden.
- source_word: ἐκείνη
  chosen: she
  alternatives:
  - that woman
  - that one
  lexicon: BDAG
  rationale: Though demonstrative in form, in context it functions naturally as the
    subject pronoun and is best rendered idiomatically as 'she.'
- source_word: Ἑβραϊστί
  chosen: in Hebrew
  alternatives:
  - in Aramaic
  lexicon: BDAG
  rationale: The Greek adverb literally says 'in Hebrew.' In John's usage this can
    refer to the Semitic vernacular of Judea, likely Aramaic, but the translation
    follows the Greek wording in the main text and preserves the interpretive alternative
    in a footnote.
- source_word: Ραββουνι
  chosen: Rabboni
  alternatives:
  - my teacher
  - my master
  lexicon: BDAG
  rationale: Kept as a transliteration because the Gospel itself immediately glosses
    it. This preserves the emotional and cultural force of Mary's address while allowing
    the inspired explanation to interpret it.
- source_word: ὃ λέγεται Διδάσκαλε
  chosen: which means, “Teacher”
  alternatives:
  - which is translated, 'Teacher'
  - which means, 'Master'
  lexicon: BDAG
  rationale: λέγεται here introduces a gloss; 'which means' is natural modern English.
    Διδάσκαλε is best rendered 'Teacher,' the standard sense of the vocative, and
    avoids overstating authority with 'Master.'
