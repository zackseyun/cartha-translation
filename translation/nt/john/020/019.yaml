theological_decisions:
- issue: Referent of τῶν Ἰουδαίων in John
  chosen_reading: Render as 'the Jews' in the main text, with contextual alternative
    in a footnote.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation should not narrow the referent beyond what the Greek
    explicitly states. Because John's usage can be contextually specific and modern
    readers may misconstrue the phrase ethnically, a footnote preserves likely contextual
    alternatives without rewriting the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
