id: JHN.20.19
reference: John 20:19
source:
  edition: SBLGNT
  text: Οὔσης οὖν ὀψίας τῇ ἡμέρᾳ ἐκείνῃ τῇ ⸀μιᾷ σαββάτων, καὶ τῶν θυρῶν κεκλεισμένων
    ὅπου ἦσαν οἱ ⸀μαθηταὶ διὰ τὸν φόβον τῶν Ἰουδαίων, ἦλθεν ὁ Ἰησοῦς καὶ ἔστη εἰς
    τὸ μέσον, καὶ λέγει αὐτοῖς· Εἰρήνη ὑμῖν.
translation:
  text: So when it was evening on that day, the first day of the week, and the doors
    had been locked where the disciples were because of fear of the Jews, Jesus came
    and stood in the midst of them and said to them, “Peace to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “the Jewish leaders” or “the Judeans,” depending on how Ἰουδαῖοι
      is understood in context.
    reason: alternative_reading
  - marker: b
    text: Or “Peace be with you.” The Greek reads literally, “Peace to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὔσης ... ὀψίας
  chosen: when it was evening
  alternatives:
  - when evening had come
  - being evening
  lexicon: BDAG
  rationale: Genitive absolute marking temporal setting; idiomatic English temporal
    clause best captures the construction without woodenness.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  - now
  lexicon: BDAG
  rationale: Carries mild discourse continuity/inference from the preceding narrative;
    'So' is natural English and preserves connection.
- source_word: τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - that day
  lexicon: BDAG
  rationale: Dative of time rendered explicitly with 'on' for clear English temporal
    reference.
- source_word: τῇ μιᾷ σαββάτων
  chosen: the first day of the week
  alternatives:
  - the first of the week
  - the first day after the Sabbath
  lexicon: BDAG
  rationale: Idiomatic Johannine expression meaning Sunday/first day of the week;
    this is standard and clear English.
- source_word: τῶν θυρῶν κεκλεισμένων
  chosen: the doors had been locked
  alternatives:
  - the doors were shut
  - the doors were closed
  lexicon: BDAG
  rationale: Perfect passive participle indicates a resultant state from prior action.
    'Locked' better reflects the security context than merely 'closed' or 'shut'.
- source_word: ὅπου ἦσαν οἱ μαθηταὶ
  chosen: where the disciples were
  alternatives:
  - where the disciples were staying
  - where the disciples were gathered
  lexicon: BDAG
  rationale: The Greek states location simply; added notions like 'staying' or 'gathered'
    go beyond the text.
- source_word: μαθηταὶ
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: Standard rendering preserving the relational and instructional sense
    of μαθητής.
- source_word: διὰ τὸν φόβον
  chosen: because of fear
  alternatives:
  - for fear
  - because they were afraid
  lexicon: BDAG
  rationale: διά with accusative expresses cause; 'because of fear' is transparent
    and close to the Greek structure.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek term is Ἰουδαίων. In John it can denote Judeans, Jewish authorities,
    or Jews more broadly depending on context. Here the immediate context is fear
    of hostile Jewish opposition in Jerusalem, likely especially the leadership, but
    the text itself does not specify 'leaders.' Main text keeps the lexical form 'the
    Jews,' with a footnote preserving the contextual alternative to avoid over-specification
    while aiding readers.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Basic narrative aorist of ἔρχομαι; 'came' is the natural English equivalent.
- source_word: ἔστη εἰς τὸ μέσον
  chosen: stood in the midst of them
  alternatives:
  - stood among them
  - stood in their midst
  lexicon: BDAG
  rationale: Literally 'stood into the middle.' 'In the midst of them' preserves the
    vivid spatial sense; 'of them' is supplied from context for natural English.
- source_word: λέγει αὐτοῖς
  chosen: said to them
  alternatives:
  - says to them
  lexicon: BDAG
  rationale: Historical present λέγει is commonly smoothed into English past tense
    in narrative for readability under optimal equivalence.
- source_word: Εἰρήνη ὑμῖν
  chosen: Peace to you
  alternatives:
  - Peace be with you
  - Peace to all of you
  lexicon: BDAG
  rationale: The Greek is literally 'Peace to you.' This preserves the Semitic-style
    greeting without importing the fuller liturgical expansion 'be with you,' though
    that is a familiar idiomatic alternative.
