id: JHN.20.3
reference: John 20:3
source:
  edition: SBLGNT
  text: ἐξῆλθεν οὖν ὁ Πέτρος καὶ ὁ ἄλλος μαθητής, καὶ ἤρχοντο εἰς τὸ μνημεῖον.
translation:
  text: So Peter and the other disciple went out, and they were going to the tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they went to the tomb.' The Greek imperfect verb can be rendered more
      simply, but 'they were going' preserves the ongoing action more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - went forth
  - set out
  - left
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι denotes departure from a place. 'Went out' is the
    most natural modern English equivalent and preserves the directional force without
    archaic tone.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative consequence/inference from the previous verse. 'So'
    fits readable modern English and preserves the connective force better here than
    the more formal 'therefore.'
- source_word: ὁ Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: ὁ ἄλλος μαθητής
  chosen: the other disciple
  alternatives:
  - the other student
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Gospel narrative. ἄλλος
    distinguishes this disciple from Peter as 'the other' one already known in context.
- source_word: ἤρχοντο
  chosen: they were going
  alternatives:
  - they went
  - they were coming
  lexicon: BDAG
  rationale: Imperfect middle/passive form of ἔρχομαι here carries progressive past
    action. 'They were going' preserves the imperfective aspect better than simple
    'they went.' 'They were coming' is possible lexically, but from the narrator's
    standpoint in English 'going' better matches movement toward the tomb.
- source_word: εἰς τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - into the tomb
  - to the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context is the burial tomb of Jesus. With ἤρχοντο, εἰς
    can be rendered idiomatically as 'to' in English for motion toward a destination;
    'into' would overstate entry, which occurs in subsequent verses.
