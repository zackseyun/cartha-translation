id: JHN.20.4
reference: John 20:4
source:
  edition: SBLGNT
  text: ἔτρεχον δὲ οἱ δύο ὁμοῦ· καὶ ὁ ἄλλος μαθητὴς προέδραμεν τάχιον τοῦ Πέτρου καὶ
    ἦλθεν πρῶτος εἰς τὸ μνημεῖον,
translation:
  text: The two were running together, but the other disciple ran ahead faster than
    Peter and came first to the tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outran Peter.' The Greek verb literally means 'ran ahead,' and the comparison
      is expressed by 'faster than Peter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτρεχον
  chosen: were running
  alternatives:
  - ran
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time; 'were running'
    preserves the progressive sense better than simple 'ran'.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative. Here 'but' fits the shift from both
    running together to one outpacing the other.
- source_word: οἱ δύο
  chosen: the two
  alternatives:
  - both of them
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the explicit nominal expression
    in Greek.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - at the same time
  lexicon: BDAG
  rationale: The adverb denotes joint action; 'together' is the most natural concise
    English equivalent.
- source_word: ὁ ἄλλος μαθητής
  chosen: the other disciple
  alternatives:
  - the other student/follower
  lexicon: BDAG
  rationale: μαθητής is regularly rendered 'disciple' in Gospel narrative. ἄλλος distinguishes
    this disciple from Peter within the immediate context.
- source_word: προέδραμεν
  chosen: ran ahead
  alternatives:
  - outran
  - ran on before
  lexicon: BDAG
  rationale: The compound verb means to run ahead/in advance. 'Ran ahead' preserves
    the verbal imagery without overcompressing it.
- source_word: τάχιον τοῦ Πέτρου
  chosen: faster than Peter
  alternatives:
  - more quickly than Peter
  - ahead of Peter
  lexicon: BDAG
  rationale: τάχιον is a comparative adverb/adjectival form functioning adverbially.
    'Faster than Peter' is idiomatic English and captures the comparison explicitly.
- source_word: ἦλθεν πρῶτος
  chosen: came first
  alternatives:
  - arrived first
  - came before him
  lexicon: BDAG
  rationale: The combination expresses arrival in first place. 'Came first' is close
    to the Greek wording; 'arrived first' would also be acceptable but is slightly
    more interpretive.
- source_word: εἰς τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - into the tomb
  - to the grave
  lexicon: BDAG
  rationale: μνημεῖον here refers to Jesus's burial place, best rendered 'tomb.' Although
    εἰς often means 'into,' the following verse clarifies that the disciple had reached
    the tomb but had not yet entered, so 'to the tomb' best reflects the narrative
    sequence.
