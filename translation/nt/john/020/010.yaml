id: JHN.20.10
reference: John 20:10
source:
  edition: SBLGNT
  text: ἀπῆλθον οὖν πάλιν πρὸς ⸀αὑτοὺς οἱ μαθηταί.
translation:
  text: So the disciples went away again to their own homes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to themselves' or 'to their own place.' The Greek expression
      likely means they returned to where they were staying.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went off
  - departed
  - went
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι denotes departure from the scene. 'Went away' is
    natural modern English and preserves the sense of leaving more clearly than the
    bare 'went.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative inference or continuation. 'So' fits readable modern
    English while preserving the connective force without sounding overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - back
  - once more
  lexicon: BDAG
  rationale: πάλιν indicates return or repetition. 'Again' is the most direct rendering
    and works smoothly with the motion verb.
- source_word: πρὸς ἑαυτούς
  chosen: to their own homes
  alternatives:
  - to themselves
  - to their own place
  - to their own people
  lexicon: BDAG
  rationale: The idiom πρὸς ἑαυτούς here does not mean merely 'to themselves' in a
    reflexive sense, but 'back to where they belonged' or 'to their own place/home.'
    In context, after visiting the tomb, the disciples return home. 'To their own
    homes' makes the idiomatic sense explicit in natural English.
- source_word: οἱ μαθηταί
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: μαθηταί is the standard narrative designation for Jesus' disciples. 'The
    disciples' is both accurate and idiomatic.
