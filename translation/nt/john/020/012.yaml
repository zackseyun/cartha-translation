theological_decisions:
- issue: Nature of ἀγγέλους in resurrection context
  chosen_reading: heavenly angels
  alternative_readings:
  - messengers
  rationale: Although ἄγγελος can mean 'messenger,' the immediate context of the empty
    tomb and white attire strongly indicates angelic beings. This is a lexical-contextual
    decision, not an imported doctrinal claim.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition'
- issue: Temporal force of ἔκειτο
  chosen_reading: prior location of Jesus' body expressed with past perfect
  alternative_readings:
  - 'simple past: ''was lying there'''
  rationale: The narrative context after the resurrection discovery favors expressing
    that the body had previously lain there. This preserves the scene's temporal logic
    without adding theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
