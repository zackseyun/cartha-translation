id: JHN.20.12
reference: John 20:12
source:
  edition: SBLGNT
  text: καὶ θεωρεῖ δύο ἀγγέλους ἐν λευκοῖς καθεζομένους, ἕνα πρὸς τῇ κεφαλῇ καὶ ἕνα
    πρὸς τοῖς ποσίν, ὅπου ἔκειτο τὸ σῶμα τοῦ Ἰησοῦ.
translation:
  text: and she sees two angels in white sitting there, one at the head and one at
    the feet, where the body of Jesus had been lying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wearing white' or 'in white clothing.' The Greek is literally 'in white.'
    reason: lexical_alternative
  - marker: b
    text: Or 'where the body of Jesus was lying.' The Greek imperfect can be rendered
      more simply, but 'had been lying' clarifies the prior state in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  chosen: she sees
  alternatives:
  - she observes
  - she notices
  - she beholds
  lexicon: BDAG
  rationale: Present tense in narrative is naturally rendered in English as vivid
    present. Since the subject from context is Mary Magdalene, English requires the
    explicit pronoun. 'Sees' is the most natural rendering here; 'beholds' is too
    elevated, and 'observes' is too clinical.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this resurrection-tomb context, the referent is clearly heavenly beings,
    so 'angels' is preferable to the more general 'messengers'.
- source_word: ἐν λευκοῖς
  chosen: in white
  alternatives:
  - in white clothing
  - wearing white
  lexicon: BDAG
  rationale: The Greek is concise and idiomatic, literally 'in white.' English can
    preserve that compactness while still being clear. The phrase implies white garments
    without needing to over-specify.
- source_word: καθεζομένους
  chosen: sitting there
  alternatives:
  - seated
  - sitting
  lexicon: BDAG
  rationale: The participle describes the angels' posture. 'Sitting there' reads naturally
    in English and fits the scene. 'Seated' is possible but slightly more formal.
    'There' is supplied for natural English scene-setting, not as an added detail
    beyond the context.
- source_word: ἕνα πρὸς τῇ κεφαλῇ καὶ ἕνα πρὸς τοῖς ποσίν
  chosen: one at the head and one at the feet
  alternatives:
  - one near the head and one near the feet
  - one by the head and one by the feet
  lexicon: BDAG
  rationale: πρός with the dative here indicates position in proximity. 'At' is idiomatic
    and sufficiently precise in English. 'Head' and 'feet' refer to the two ends of
    the place where the body had lain.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in the place where
  lexicon: BDAG
  rationale: Simple relative adverb best matches the Greek without unnecessary expansion.
- source_word: ἔκειτο
  chosen: had been lying
  alternatives:
  - was lying
  - had lain
  lexicon: BDAG
  rationale: Imperfect middle/passive of κεῖμαι denotes a prior state of being laid/lying
    there. In English, past perfect best conveys that this location was where Jesus'
    body had previously been before the moment of observation. 'Had been lying' is
    more natural for modern readers than 'had lain.'
- source_word: σῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: '''Body'' is the standard and appropriately reverent rendering. ''Corpse''
    is lexically possible in some contexts but too stark here and not required by
    the Greek.'
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - Jesus'
  lexicon: BDAG
  rationale: Rendered with an of-genitive in the explanation, though the main translation
    uses the natural English possessive sense within the clause. The personal name
    is transliterated per project philosophy.
