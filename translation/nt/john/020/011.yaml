id: JHN.20.11
reference: John 20:11
source:
  edition: SBLGNT
  text: Μαρία δὲ εἱστήκει πρὸς ⸂τῷ μνημείῳ ἔξω κλαίουσα⸃. ὡς οὖν ἔκλαιεν παρέκυψεν
    εἰς τὸ μνημεῖον,
translation:
  text: But Mary was standing outside the tomb, weeping. So, as she was weeping, she
    bent over to look into the tomb,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stooped and looked into the tomb.' The Greek verb includes the idea
      of bending down in order to look.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild narrative contrast/transition from the preceding scene;
    'But' preserves the shift to Mary more clearly than simple 'And.'
- source_word: εἱστήκει
  chosen: was standing
  alternatives:
  - stood
  lexicon: BDAG
  rationale: Pluperfect/imperfective force of ἵστημι here conveys a continuing state;
    'was standing' better reflects her ongoing posture than the simple past 'stood.'
- source_word: πρὸς τῷ μνημείῳ ἔξω
  chosen: outside the tomb
  alternatives:
  - at the tomb outside
  - near the tomb outside
  lexicon: BDAG
  rationale: This phrase locates Mary outside in relation to the tomb. Idiomatic English
    is best served by 'outside the tomb,' which preserves the spatial contrast with
    her later looking into it.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - sepulcher
  lexicon: BDAG
  rationale: In this resurrection context, μνημεῖον refers to a burial tomb rather
    than a generic grave. 'Tomb' is both accurate and natural modern English.
- source_word: κλαίουσα
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: The participle describes Mary's ongoing action while standing there.
    'Weeping' better conveys sustained grief than the more general 'crying.'
- source_word: ὡς οὖν
  chosen: So, as
  alternatives:
  - Then, when
  - Therefore, as
  lexicon: BDAG
  rationale: This combination advances the narrative and links the next action with
    her ongoing weeping. 'So, as' is natural English that preserves the sequence without
    overstating logical causation.
- source_word: ἔκλαιεν
  chosen: was weeping
  alternatives:
  - wept
  - was crying
  lexicon: BDAG
  rationale: The imperfect indicates continued action. 'Was weeping' matches the aspect
    and echoes the participle κλαίουσα for stylistic continuity.
- source_word: παρέκυψεν
  chosen: bent over to look
  alternatives:
  - stooped and looked
  - peered
  lexicon: BDAG
  rationale: The verb means to bend/stoop in order to look into something. 'Bent over
    to look' makes the physical motion explicit and fits the tomb setting.
- source_word: εἰς τὸ μνημεῖον
  chosen: into the tomb
  alternatives:
  - inside the tomb
  lexicon: BDAG
  rationale: εἰς marks direction toward the interior. 'Into the tomb' is the most
    direct rendering and pairs naturally with παρέκυψεν.
