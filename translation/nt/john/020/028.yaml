id: JHN.20.28
reference: John 20:28
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη Θωμᾶς καὶ εἶπεν αὐτῷ· Ὁ κύριός μου καὶ ὁ θεός μου.
translation:
  text: Thomas answered and said to him, “My Lord and my God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'Thomas answered and said, “My Lord and my God,”' as an
      exclamation; however, the Greek says he spoke 'to him,' supporting direct address
      to Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative use of ἀποκρίνομαι meaning 'answer/reply.' 'Answered'
    preserves the idiomatic Greek construction without unnecessary expansion.
- source_word: Θωμᾶς
  chosen: Thomas
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - said to Jesus
  - said
  lexicon: BDAG
  rationale: λέγω with dative αὐτῷ is naturally rendered 'said to him.' The explicit
    object 'Jesus' is not supplied in the Greek, so 'him' is preferred.
- source_word: Ὁ κύριός μου
  chosen: My Lord
  alternatives:
  - My master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' Here it functions as a direct christological address, and 'Lord' best
    preserves both reverence and theological weight.
- source_word: ὁ θεός μου
  chosen: my God
  alternatives:
  - God of me
  lexicon: BDAG
  rationale: θεός is straightforwardly 'God.' The possessive μου is retained as 'my,'
    preserving the personal confession. English capitalization reflects direct address
    to God in context.
- source_word: καὶ
  chosen: and
  rationale: The conjunction links the two titles in a coordinated confession; simple
    'and' preserves the structure.
