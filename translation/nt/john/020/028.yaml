theological_decisions:
- issue: Whether Thomas's words are rendered as a direct confession addressed to Jesus
    or softened into an exclamation not addressed to him
  chosen_reading: 'Direct confession to Jesus: ''My Lord and my God!'''
  alternative_readings:
  - An exclamatory utterance to God not directly identifying Jesus
  rationale: The Greek explicitly says Thomas 'said to him' (αὐτῷ), and the following
    nominative-with-article forms function as vocative address in Koine. The translation
    therefore preserves the plain sense that Thomas addresses Jesus with the titles
    'Lord' and 'God,' without softening the christological force.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD); Translation philosophy: Original-language primacy over translation tradition,
    Preserve theological tension rather than resolve it'
