id: JHN.20.6
reference: John 20:6
source:
  edition: SBLGNT
  text: ἔρχεται οὖν ⸀καὶ Σίμων Πέτρος ἀκολουθῶν αὐτῷ, καὶ εἰσῆλθεν εἰς τὸ μνημεῖον·
    καὶ θεωρεῖ τὰ ὀθόνια κείμενα,
translation:
  text: Then Simon Peter also came, following him, and entered into the tomb; and
    he sees the linen cloths lying there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has a historical present in both 'comes' and 'sees'; English renders
      the first as past for smoother narrative flow while retaining the second as
      present for vividness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('comes'), English narrative
    style more naturally renders it as a past tense here. This preserves the event
    sequence without sounding awkward in modern English.
- source_word: οὖν
  chosen: Then
  alternatives:
  - So
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative progression and inference from the previous verse. 'Then'
    fits the immediate storyline smoothly in English.
- source_word: καὶ Σίμων Πέτρος
  chosen: Simon Peter also
  alternatives:
  - and Simon Peter
  - Simon Peter too
  lexicon: BDAG
  rationale: The καὶ here has an additive sense in context, indicating that Simon
    Peter, in addition to the other disciple, arrived. 'Also' brings out that force
    clearly.
- source_word: ἀκολουθῶν αὐτῷ
  chosen: following him
  alternatives:
  - as he followed him
  - behind him
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main action and indicates
    manner/circumstance. 'Following him' is the most direct and natural rendering.
- source_word: εἰσῆλθεν εἰς τὸ μνημεῖον
  chosen: entered into the tomb
  alternatives:
  - went into the tomb
  - entered the tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context is the burial tomb. 'Entered into' preserves
    the motion explicitly conveyed by εἰς, though still in readable English.
- source_word: θεωρεῖ
  chosen: he sees
  alternatives:
  - he observes
  - he looks at
  lexicon: BDAG
  rationale: The Greek again shifts to a vivid present. Retaining the present here
    reproduces the narrative vividness better than flattening everything to past tense.
    'Sees' is simpler and more natural than 'observes' while still fitting the context.
- source_word: τὰ ὀθόνια
  chosen: the linen cloths
  alternatives:
  - the burial cloths
  - the linen wrappings
  lexicon: BDAG
  rationale: ὀθόνια refers to linen cloths associated with burial. 'Linen cloths'
    is a transparent lexical rendering; 'burial cloths' is interpretive, though contextually
    plausible.
- source_word: κείμενα
  chosen: lying there
  alternatives:
  - lying
  - laid there
  lexicon: BDAG
  rationale: The participle describes the cloths as being laid/lying in place. 'Lying
    there' communicates both their position and the scene's visual detail in natural
    English.
