id: JHN.20.5
reference: John 20:5
source:
  edition: SBLGNT
  text: καὶ παρακύψας βλέπει κείμενα τὰ ὀθόνια, οὐ μέντοι εἰσῆλθεν.
translation:
  text: And stooping to look in, he sees the linen cloths lying there, yet he did
    not go in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he sees the linen cloths lying'; the Greek participle may be taken closely
      with 'linen cloths' without explicitly supplying 'there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακύψας
  chosen: stooping to look in
  alternatives:
  - bending over
  - peering in
  - looking in
  lexicon: BDAG
  rationale: Aorist participle describing the beloved disciple's physical action at
    the tomb entrance. 'Stooping to look in' captures both the bodily motion and the
    visual orientation better than a bare 'looking.'
- source_word: βλέπει
  chosen: he sees
  alternatives:
  - he saw
  - he notices
  lexicon: BDAG
  rationale: Present tense is retained as a historical present, a common Johannine
    narrative feature. Rendering it as 'he sees' preserves the vividness of the Greek
    better than smoothing to past tense.
- source_word: κείμενα
  chosen: lying there
  alternatives:
  - lying
  - laid there
  lexicon: BDAG
  rationale: Participle of κεῖμαι indicates the linen cloths were in a lying/placed
    position. 'Lying there' is natural English and conveys their visible placement
    in the tomb.
- source_word: τὰ ὀθόνια
  chosen: the linen cloths
  alternatives:
  - the burial cloths
  - the linen wrappings
  lexicon: BDAG
  rationale: ὀθόνια refers to linen cloths associated with burial. 'Linen cloths'
    is the most direct rendering; the burial context is already clear from the narrative,
    so an expanded gloss is unnecessary in the main text.
- source_word: οὐ μέντοι
  chosen: yet
  alternatives:
  - however not
  - nevertheless not
  - but not
  lexicon: BDAG
  rationale: μέντοι adds a mild adversative nuance after the observation. 'Yet' gives
    concise, natural English that preserves the contrast between seeing and not entering.
- source_word: εἰσῆλθεν
  chosen: he did not go in
  alternatives:
  - he did not enter
  - he did not go inside
  lexicon: BDAG
  rationale: Aorist verb of entering. 'Go in' is idiomatic modern English and fits
    the tomb setting well; 'enter' would also be acceptable but is slightly less natural
    here.
