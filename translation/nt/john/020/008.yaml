id: JHN.20.8
reference: John 20:8
source:
  edition: SBLGNT
  text: τότε οὖν εἰσῆλθεν καὶ ὁ ἄλλος μαθητὴς ὁ ἐλθὼν πρῶτος εἰς τὸ μνημεῖον, καὶ
    εἶδεν καὶ ἐπίστευσεν·
translation:
  text: Then the other disciple, who had arrived at the tomb first, also went in,
    and he saw and believed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'entered.'
    reason: lexical_alternative
  - marker: b
    text: The Greek simply says 'believed' without stating explicitly what he believed;
      interpreters differ on whether this means he believed the resurrection, believed
      the evidence before him, or believed the earlier report.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε οὖν
  chosen: Then
  alternatives:
  - So then
  - Therefore then
  lexicon: BDAG
  rationale: The combination marks narrative sequence with mild inferential force.
    In English, 'Then' naturally carries the progression without sounding wooden;
    the fuller inferential nuance is not strong enough here to require 'therefore.'
- source_word: εἰσῆλθεν
  chosen: went in
  alternatives:
  - entered
  lexicon: BDAG
  rationale: The aorist verb means 'entered/went in.' 'Went in' is slightly more natural
    in contemporary narrative English while preserving the concrete motion.
- source_word: ὁ ἄλλος μαθητής
  chosen: the other disciple
  alternatives:
  - the other student
  - the other follower
  lexicon: BDAG
  rationale: Standard Johannine designation. 'Disciple' is the established and accurate
    rendering for μαθητής in this context.
- source_word: ὁ ἐλθὼν πρῶτος εἰς τὸ μνημεῖον
  chosen: who had arrived at the tomb first
  alternatives:
  - who came first to the tomb
  - the one who had come first to the tomb
  lexicon: BDAG
  rationale: The participial phrase identifies the disciple as the one who reached
    the tomb before Peter. 'Had arrived' smooths the participle into natural English
    and reflects prior action relative to the main verb.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: In the resurrection narrative, μνημεῖον refers specifically to the burial
    place. 'Tomb' is the most precise and natural choice.
- source_word: καὶ εἶδεν
  chosen: and he saw
  alternatives:
  - and saw
  - and looked
  lexicon: BDAG
  rationale: The explicit subject is supplied in English for clarity after the relative
    clause. 'Saw' is the direct lexical equivalent of εἶδεν.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - came to believe
  - believed it
  lexicon: BDAG
  rationale: πιστεύω here is rendered with the simple 'believed,' preserving the Greek's
    brevity and leaving the object implicit as in the source text.
