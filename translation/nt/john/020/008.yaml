theological_decisions:
- issue: What the disciple believed
  chosen_reading: Render the verb absolutely as 'believed' without specifying the
    content.
  alternative_readings:
  - believed that Jesus had risen
  - believed Mary's report
  - came to faith
  rationale: The Greek leaves the object unstated. Supplying a specific content would
    resolve an interpretive question the text itself leaves open, especially in light
    of the following verse. Preserving the bare 'believed' maintains the narrative
    and theological tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
