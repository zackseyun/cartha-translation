theological_decisions:
- issue: Johannine use of σημεῖα
  chosen_reading: Rendered as 'signs' rather than 'miracles.'
  alternative_readings:
  - miracles
  rationale: This preserves the Gospel's theological emphasis that Jesus' works signify
    and reveal his identity and mission, without reducing them to displays of power
    alone.
  doctrine_reference: Translation philosophy §1, §5
