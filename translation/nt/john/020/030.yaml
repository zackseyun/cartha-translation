id: JHN.20.30
reference: John 20:30
source:
  edition: SBLGNT
  text: Πολλὰ μὲν οὖν καὶ ἄλλα σημεῖα ἐποίησεν ὁ Ἰησοῦς ἐνώπιον τῶν ⸀μαθητῶν, ἃ οὐκ
    ἔστιν γεγραμμένα ἐν τῷ βιβλίῳ τούτῳ·
translation:
  text: Now Jesus did many other signs in the presence of the disciples, which are
    not written in this book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'miracles'; Greek 'signs,' emphasizing acts that point beyond themselves
      to who Jesus is.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλὰ μὲν οὖν καὶ ἄλλα
  chosen: many other
  alternatives:
  - many indeed also other
  - many other things
  lexicon: BDAG
  rationale: 'Taken together these words intensify and continue the narrative: John
    is drawing an inference or conclusion (''οὖν'') while marking this statement as
    the first half of a μέν...δέ style contrast completed in v. 31. English idiom
    does not require each particle to be separately represented, so ''many other''
    with initial ''Now'' best captures the sense without wooden redundancy.'
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miracles
  - attesting signs
  lexicon: BDAG
  rationale: In John, σημεῖα is a theologically loaded term referring to miraculous
    acts as signs that reveal Jesus' identity, not merely wonders. 'Signs' preserves
    Johannine usage better than 'miracles.'
- source_word: ἐποίησεν
  chosen: did
  alternatives:
  - performed
  - worked
  - made
  lexicon: BDAG
  rationale: Aorist active indicative of ποιέω here is naturally rendered 'did.' 'Performed'
    is possible but slightly more formal; 'did' is idiomatic and sufficiently precise
    in context.
- source_word: ἐνώπιον
  chosen: in the presence of
  alternatives:
  - before
  - in front of
  lexicon: BDAG
  rationale: This preposition indicates that the signs were done before the disciples
    as witnesses. 'In the presence of' is clear modern English and slightly fuller
    than simply 'before.'
- source_word: τῶν μαθητῶν
  chosen: the disciples
  alternatives:
  - his disciples
  - the learners
  lexicon: BDAG
  rationale: The article is present, but no possessive pronoun appears in Greek. 'The
    disciples' is therefore preferred over 'his disciples,' though the referent is
    clearly Jesus' disciples from context.
- source_word: ἃ οὐκ ἔστιν γεγραμμένα
  chosen: which are not written
  alternatives:
  - which have not been written
  - which are not recorded
  lexicon: BDAG
  rationale: The periphrastic perfect/passive sense of γεγραμμένα emphasizes the state
    of not being inscribed in the book. 'Are not written' is a natural English rendering
    that preserves the passive and the present relevance. 'Recorded' is interpretive
    and less formally tied to γράφω.
- source_word: ἐν τῷ βιβλίῳ τούτῳ
  chosen: in this book
  alternatives:
  - in this scroll
  - in this document
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll or book/document, but 'book' is the standard
    and most natural English rendering here for the written Gospel as a literary work.
    'Scroll' would be historically specific but potentially distracting for modern
    readers.
