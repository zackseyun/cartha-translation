theological_decisions:
- issue: Rendering the historical present ἔρχεται in a resurrection appearance narrative
  chosen_reading: Preserve the present as 'comes'
  alternative_readings:
  - Normalize to past tense 'came'
  rationale: Keeping the historical present reflects the Greek narrative style and
    does not create doctrinal difficulty. It preserves the immediacy of the resurrection
    appearance without adding interpretive content.
  doctrine_reference: Translation philosophy §1, §6
- issue: How to render τῶν θυρῶν κεκλεισμένων without over-interpreting the mode of
    Jesus' appearance
  chosen_reading: Render as 'though the doors had been shut'
  alternative_readings:
  - '''with the doors shut'''
  - '''when the doors were shut'''
  rationale: The verse states that the doors were shut and that Jesus came and stood
    in the midst; it does not explicitly explain the mechanics of his entry. The chosen
    wording preserves the narrative tension and the extraordinary character of the
    event while avoiding speculative elaboration.
  doctrine_reference: Translation philosophy §1, §3
