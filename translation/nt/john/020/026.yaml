id: JHN.20.26
reference: John 20:26
source:
  edition: SBLGNT
  text: Καὶ μεθ’ ἡμέρας ὀκτὼ πάλιν ἦσαν ἔσω οἱ μαθηταὶ αὐτοῦ καὶ Θωμᾶς μετ’ αὐτῶν.
    ἔρχεται ὁ Ἰησοῦς τῶν θυρῶν κεκλεισμένων, καὶ ἔστη εἰς τὸ μέσον καὶ εἶπεν· Εἰρήνη
    ὑμῖν.
translation:
  text: And after eight days, his disciples were inside again, and Thomas was with
    them. Jesus comes, though the doors had been shut, and stood in the midst and
    said, “Peace to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''after eight days,'' an idiom that likely refers to the following
      week by inclusive counting.'
    reason: cultural_note
  - marker: b
    text: Or 'with the doors shut' or 'when the doors were shut.' The Greek does not
      explicitly describe how Jesus entered.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''Peace be with you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἡμέρας ὀκτὼ
  chosen: after eight days
  alternatives:
  - eight days later
  - after eight days had passed
  lexicon: BDAG
  rationale: A natural but still formally close rendering of the idiom. In Johannine
    context this refers to the next week by inclusive counting, but the Greek expression
    itself is best translated directly rather than interpreted in the main text.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of the prior gathering and is naturally rendered 'again'
    in modern English.
- source_word: ἦσαν ἔσω
  chosen: were inside
  alternatives:
  - were indoors
  - were within
  lexicon: BDAG
  rationale: ἔσω denotes being inside/inward. 'Were inside' is idiomatic and preserves
    the spatial sense without unnecessary archaism.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit in the Greek and should be retained.
- source_word: Θωμᾶς
  chosen: Thomas
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  lexicon: BDAG
  rationale: The present-tense historical present is common in narrative Greek. Rendering
    it as 'comes' preserves Johannine vividness; English can sustain the shift here.
- source_word: τῶν θυρῶν κεκλεισμένων
  chosen: though the doors had been shut
  alternatives:
  - with the doors shut
  - when the doors were shut
  - the doors being shut
  lexicon: BDAG
  rationale: Genitive absolute construction. 'Though the doors had been shut' captures
    the concessive force often inferred from the context and keeps the perfect participle's
    resultant state ('had been shut'). It avoids overstating the manner of Jesus'
    entry while preserving the narrative tension.
- source_word: ἔστη
  chosen: stood
  alternatives:
  - took his stand
  lexicon: BDAG
  rationale: Simple narrative aorist of ἵστημι intransitively; 'stood' is the clear
    and natural rendering.
- source_word: εἰς τὸ μέσον
  chosen: in the midst
  alternatives:
  - in the middle
  - among them
  lexicon: BDAG
  rationale: Literally 'into the middle.' 'In the midst' preserves the central spatial
    image and echoes the solemnity of the scene better than the flatter 'in the middle.'
    'Among them' is interpretive and less spatially precise.
- source_word: Εἰρήνη ὑμῖν
  chosen: Peace to you
  alternatives:
  - Peace be with you
  - Peace to all of you
  lexicon: BDAG
  rationale: A direct rendering of the Greek greeting. 'Peace be with you' is traditional
    and contextually valid, but 'Peace to you' is closer to the wording here and avoids
    importing an explicit verb not present in the Greek.
