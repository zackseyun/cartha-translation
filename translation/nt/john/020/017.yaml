id: JHN.20.17
reference: John 20:17
source:
  edition: SBLGNT
  text: λέγει ⸀αὐτῇ Ἰησοῦς· Μή μου ἅπτου, οὔπω γὰρ ἀναβέβηκα πρὸς τὸν ⸀πατέρα· πορεύου
    δὲ πρὸς τοὺς ἀδελφούς μου καὶ εἰπὲ αὐτοῖς· Ἀναβαίνω πρὸς τὸν πατέρα μου καὶ πατέρα
    ὑμῶν καὶ θεόν μου καὶ θεὸν ὑμῶν.
translation:
  text: Jesus said to her, “Do not cling to me, for I have not yet ascended to the
    Father. But go to my brothers and tell them, ‘I am ascending to my Father and
    your Father, and my God and your God.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not touch me” or “Do not hold on to me.” The Greek likely refers
      to clinging or continuing to hold him rather than merely making contact.
    reason: lexical_alternative
  - marker: b
    text: “Brothers” renders the masculine plural Greek term; here it refers to Jesus’
      disciples and may include a broader representative group.
    reason: cultural_note
lexical_decisions:
- source_word: ἅπτου
  chosen: cling to
  alternatives:
  - touch
  - hold on to
  lexicon: BDAG
  rationale: The present middle imperative with μή commonly carries the sense of stopping
    an action in progress or forbidding continued action. In this context, 'cling
    to' better captures sustained physical holding than the overly bare 'touch,' while
    remaining natural English and avoiding over-interpretation.
- source_word: οὔπω γὰρ ἀναβέβηκα
  chosen: for I have not yet ascended
  alternatives:
  - for I have not yet gone up
  lexicon: BDAG
  rationale: ἀναβαίνω in Johannine context regularly carries the theological sense
    of ascending to the Father. 'Ascended' preserves that established usage and the
    perfect tense force ('have not yet ascended').
- source_word: πρὸς τὸν πατέρα
  chosen: to the Father
  alternatives:
  - to my Father
  lexicon: BDAG
  rationale: The Greek here has the article with πατέρα, not the possessive pronoun.
    Rendering 'the Father' preserves the wording of this clause, while the following
    direct speech explicitly distinguishes 'my Father and your Father.'
- source_word: πορεύου
  chosen: go
  alternatives:
  - be on your way
  - travel
  lexicon: BDAG
  rationale: A straightforward imperative of movement; 'go' is the most natural and
    sufficiently precise rendering in context.
- source_word: ἀδελφούς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the grammatically masculine
    plural is retained as 'brothers.' In context it refers to Jesus' disciples, likely
    including a representative group broader than males alone, so an inclusivity note
    is appropriate in a footnote rather than altering the main text.
- source_word: εἰπὲ αὐτοῖς
  chosen: tell them
  alternatives:
  - say to them
  lexicon: BDAG
  rationale: Idiomatic English prefers 'tell them' in this reporting-command construction,
    while preserving the force of the aorist imperative.
- source_word: Ἀναβαίνω
  chosen: I am ascending
  alternatives:
  - I ascend
  - I am going up
  lexicon: BDAG
  rationale: 'The present tense here is naturally rendered as progressive/futuristic
    in English: Jesus is speaking of his imminent ascent. ''I am ascending'' preserves
    the vividness and forward movement of the Greek.'
- source_word: πατέρα μου καὶ πατέρα ὑμῶν
  chosen: my Father and your Father
  alternatives:
  - the Father of me and the Father of you
  lexicon: BDAG
  rationale: 'This preserves the deliberate parallelism and distinction in relationship:
    Jesus does not collapse his sonship into that of the disciples, but names both
    relations side by side.'
- source_word: θεόν μου καὶ θεὸν ὑμῶν
  chosen: my God and your God
  lexicon: BDAG
  rationale: A direct, formally close rendering that preserves the parallel structure
    with 'my Father and your Father' and avoids doctrinally motivated paraphrase.
