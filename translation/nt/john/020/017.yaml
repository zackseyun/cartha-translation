theological_decisions:
- issue: Meaning of Μή μου ἅπτου
  chosen_reading: A prohibition against continued holding/clinging rather than a ban
    on any physical contact whatsoever.
  alternative_readings:
  - Do not touch me
  rationale: The Greek wording and aspect favor an ongoing-action nuance. This avoids
    implying that any contact with the risen Jesus was intrinsically forbidden, especially
    in light of later resurrection appearances, while staying within what the text
    itself warrants.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it) and §6 (readable modern English).
- issue: Rendering of πατέρα in the first clause
  chosen_reading: the Father
  alternative_readings:
  - my Father
  rationale: The source text lacks μου in the first clause. Retaining 'the Father'
    respects original-language primacy and allows the subsequent quotation to supply
    the explicit relational distinction.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition).
- issue: Christological implication of 'my God and your God'
  chosen_reading: Translate the phrase directly without doctrinal softening.
  alternative_readings:
  - Paraphrastic renderings that mute the force of 'my God'
  rationale: Historic orthodoxy affirmed in the doctrine statement must not override
    the wording of the verse. The text should stand as written, with its full theological
    weight and Johannine context, rather than being adjusted to preempt misunderstanding.
  doctrine_reference: Affirmations (Nicene/Chalcedonian orthodoxy) together with the
    prohibition against importing doctrinal claims the text does not make.
