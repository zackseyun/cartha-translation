theological_decisions:
- issue: Relation between the Father's sending of Jesus and Jesus' sending of the
    disciples
  chosen_reading: 'Rendered the comparison without expanding it into an ontological
    or sacramental statement: ''As the Father has sent me, even so I am sending you.'''
  alternative_readings:
  - As the Father has sent me, I also send you
  - Just as the Father sent me, so I send you
  rationale: The verse establishes an analogy of mission and commission, but the translation
    should not import additional doctrinal conclusions about exact equivalence of
    authority, mode, or office beyond what the Greek states. The wording preserves
    the theological weight while avoiding interpretive overreach.
  doctrine_reference: Preserve theological tension rather than resolve it.
