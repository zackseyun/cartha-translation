id: JHN.20.21
reference: John 20:21
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτοῖς ⸂ὁ Ἰησοῦς⸃ πάλιν· Εἰρήνη ὑμῖν· καθὼς ἀπέσταλκέν με ὁ πατήρ,
    κἀγὼ πέμπω ὑμᾶς.
translation:
  text: So Jesus said to them again, “Peace to you. As the Father has sent me, even
    so I am sending you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “Peace be with you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding scene. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Indicates repetition of Jesus' greeting from the previous verse. 'Again'
    is the most direct and idiomatic rendering.
- source_word: Εἰρήνη ὑμῖν
  chosen: Peace to you
  alternatives:
  - Peace be with you
  lexicon: BDAG
  rationale: A literal rendering of the dative expression that preserves the Semitic-style
    greeting. 'Peace be with you' is traditional and contextually valid, but the Greek
    here is verbless; 'Peace to you' keeps the concise form of the source while remaining
    clear in English.
- source_word: καθὼς
  chosen: As
  alternatives:
  - Just as
  - In the same way as
  lexicon: BDAG
  rationale: Introduces the comparison between the Father's sending of Jesus and Jesus'
    sending of the disciples. 'As' is concise and sufficient; the following 'even
    so' carries the comparative force in natural English.
- source_word: ἀπέσταλκέν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Perfect tense in Greek indicates a completed action with ongoing relevance.
    'Has sent' best reflects that aspect in English better than a simple past.
- source_word: πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text has the articular noun 'the Father,' not an explicit possessive.
    Retaining 'the Father' preserves Johannine theological diction and the source
    wording.
- source_word: κἀγὼ
  chosen: even so I
  alternatives:
  - I also
  - so I too
  lexicon: BDAG
  rationale: The crasis combines 'and I' with emphatic force in this comparative construction.
    'Even so I' naturally mirrors the preceding 'As' and highlights the correspondence
    between the two sendings.
- source_word: πέμπω
  chosen: am sending
  alternatives:
  - send
  lexicon: BDAG
  rationale: Although present tense can be rendered simply 'send,' the progressive
    'am sending' fits the immediate commissioning context and conveys the present
    action vividly in English.
