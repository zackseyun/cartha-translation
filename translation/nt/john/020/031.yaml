theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions here as a title identifying Jesus' messianic identity.
    Per doctrine, title use should be translated rather than transliterated.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Textual and aspectual question in πιστεύητε
  chosen_reading: you may believe
  alternative_readings:
  - you may continue believing
  rationale: The printed SBLGNT text reads πιστεύητε (present subjunctive), which
    can suggest ongoing belief, while a well-known variant πιστεύσητε (aorist subjunctive)
    more naturally suggests coming to believe. To preserve theological tension and
    avoid overstating aspect, the main text uses the broader 'believe,' with the continuative
    nuance and textual issue preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
