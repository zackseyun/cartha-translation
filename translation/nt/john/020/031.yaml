id: JHN.20.31
reference: John 20:31
source:
  edition: SBLGNT
  text: ταῦτα δὲ γέγραπται ἵνα ⸀πιστεύητε ὅτι Ἰησοῦς ἐστιν ὁ χριστὸς ὁ υἱὸς τοῦ θεοῦ,
    καὶ ἵνα πιστεύοντες ζωὴν ἔχητε ἐν τῷ ὀνόματι αὐτοῦ.
translation:
  text: But these have been written so that you may believe that Jesus is the Messiah,
    the Son of God, and so that by believing you may have life in his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'so that you may come to believe' (aorist), while
      others support 'so that you may continue believing' (present). The main text
      renders the clause broadly as 'so that you may believe.'
    reason: textual_variant
  - marker: b
    text: Or 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve
      its meaning as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  chosen: these
  alternatives:
  - these things
  lexicon: BDAG
  rationale: Refers to the signs and written material just mentioned. 'These' is natural
    modern English and sufficiently definite without adding 'things.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast or transition from the preceding material. 'But'
    best captures the discourse turn here.
- source_word: γέγραπται
  chosen: have been written
  alternatives:
  - are written
  - were written
  lexicon: BDAG
  rationale: Perfect passive indicates a completed act with continuing result. 'Have
    been written' preserves that force better than the simple present 'are written.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is clear, idiomatic, and preserves the
    purposive sense.
- source_word: πιστεύητε
  chosen: you may believe
  alternatives:
  - you may continue believing
  lexicon: BDAG
  rationale: The present subjunctive can be understood as either ingressive or continuative
    in this textual form. The main text uses the broad English 'believe' without over-specifying
    aspect; the continuative alternative is preserved in a footnote because of the
    well-known textual variation between πιστεύητε and πιστεύσητε.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of belief in a straightforward way.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' rather than
    transliterated 'Christ,' preserving the title's meaning and Jewish messianic context.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Standard and precise rendering of the christological title; it should
    be preserved without dilution.
- source_word: καὶ ἵνα
  chosen: and so that
  alternatives:
  - and that
  lexicon: BDAG
  rationale: Signals a second coordinated purpose clause. 'And so that' keeps the
    parallel structure explicit in English.
- source_word: πιστεύοντες
  chosen: by believing
  alternatives:
  - believing
  - as you believe
  lexicon: BDAG
  rationale: The participle is best rendered adverbially, expressing means or attendant
    circumstance relative to 'may have.' 'By believing' clearly conveys the connection
    without importing extra theology.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: Unqualified 'life' is the natural rendering; in Johannine context it
    carries theological depth without needing expansion to 'eternal life' here, since
    that adjective is not present in the Greek.
- source_word: ἔχητε
  chosen: you may have
  alternatives:
  - you may possess
  lexicon: BDAG
  rationale: Simple and accurate rendering of the subjunctive in the purpose clause.
- source_word: ἐν τῷ ὀνόματι αὐτοῦ
  chosen: in his name
  alternatives:
  - by his name
  lexicon: BDAG
  rationale: A conventional biblical expression denoting life found in relation to,
    and grounded in, Jesus' revealed person and authority. 'In his name' preserves
    the idiom without over-interpretation.
