id: JHN.20.18
reference: John 20:18
source:
  edition: SBLGNT
  text: ἔρχεται ⸀Μαριὰμ ἡ Μαγδαληνὴ ⸀ἀγγέλλουσα τοῖς μαθηταῖς ὅτι ⸀Ἑώρακα τὸν κύριον
    καὶ ταῦτα εἶπεν αὐτῇ.
translation:
  text: Mary Magdalene came announcing to the disciples, “I have seen the Lord,” and
    that he had said these things to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Mary Magdalene came to the disciples and said, “I have seen the Lord,”
      and he said these things to her.' The final clause may be taken either as part
      of Mary's report or as the narrator's comment.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχεται
  chosen: came
  alternatives:
  - comes
  - went
  lexicon: BDAG
  rationale: Greek present is a historical present; English simple past is the most
    natural way to convey the narrative event. 'Came' fits the deictic movement toward
    the disciples better than 'went.'
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mariam the Magdalene
  - Mary the Magdalene
  rationale: Personal name is transliterated by standard English convention. The epithet
    is rendered in the familiar form 'Magdalene' rather than expanded.
- source_word: ἀγγέλλουσα
  chosen: announcing
  alternatives:
  - reporting
  - telling
  - bringing word
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and carries the
    sense of delivering a message. 'Announcing' preserves the verbal force without
    over-paraphrasing.
- source_word: τοῖς μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to the learners
  - to his disciples
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and accurate rendering of μαθηταῖς. ''His''
    is not explicit in the Greek and is therefore omitted.'
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse/content. In English, quotation marks naturally
    render the content clause here.
- source_word: Ἑώρακα
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: Perfect tense indicates a completed act with present relevance; English
    present perfect best preserves this force.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' In Johannine resurrection context
    this functions as a title of Jesus and should retain its theological weight.
- source_word: καὶ ταῦτα εἶπεν αὐτῇ
  chosen: and that he had said these things to her
  alternatives:
  - and he said these things to her
  - and told her these things
  lexicon: BDAG
  rationale: 'The Greek can be understood as continuing the content of Mary''s report:
    she announces both that she has seen the Lord and that he said these things to
    her. English past perfect clarifies the prior action relative to her announcement.
    ''These things'' preserves ταῦτα more formally than ''this.'''
