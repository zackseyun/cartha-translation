theological_decisions:
- issue: Rendering κύριος in resurrection context
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The title refers to Jesus and carries recognized christological significance.
    Following the doctrine's contested-terms guidance, 'Lord' is the default rendering
    and best matches NT usage without diminishing the title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relation of καὶ ταῦτα εἶπεν αὐτῇ to Mary's report
  chosen_reading: 'Included as part of what Mary announced: ''and that he had said
    these things to her'''
  alternative_readings:
  - 'A separate narrator comment: ''and he said these things to her'''
  rationale: The Greek lacks an explicit second ὅτι, but the clause naturally continues
    the content of ἀγγέλλουσα. English past perfect helps distinguish Jesus' prior
    speech from Mary's present report while preserving the syntax's sense.
