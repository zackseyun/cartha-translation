id: JHN.20.23
reference: John 20:23
source:
  edition: SBLGNT
  text: ἄν τινων ἀφῆτε τὰς ἁμαρτίας ⸀ἀφέωνται αὐτοῖς· ἄν τινων κρατῆτε κεκράτηνται.
translation:
  text: If you forgive the sins of any, the sins have been forgiven them; if you retain them, they have been retained.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'If you forgive anyone's sins, they are forgiven; if you retain them, they are retained.' The Greek uses perfect passives in both clauses, which may emphasize a completed action with continuing result.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have been forgiven them'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἄν τινων
  chosen: If ... of any
  alternatives:
  - If you forgive anyone's sins
  - Whomever ...
  lexicon: BDAG
  rationale: The construction ἄν with the subjunctive introduces an indefinite conditional clause. Rendering it with 'If ... of any' preserves both the conditional force and the indefinite object without over-paraphrasing.
- source_word: ἀφῆτε
  chosen: you forgive
  alternatives:
  - you release
  - you remit
  lexicon: BDAG
  rationale: ἀφίημι in the context of sins commonly means 'forgive.' 'Remit' is traditional but less natural in modern English; 'release' is too broad here.
- source_word: τὰς ἁμαρτίας
  chosen: the sins
  alternatives:
  - sins
  lexicon: BDAG
  rationale: The article is retained naturally in English as 'the sins' in this construction, matching the Greek object while remaining idiomatic.
- source_word: ἀφέωνται
  chosen: they have been forgiven
  alternatives:
  - they are forgiven
  - they stand forgiven
  lexicon: BDAG
  rationale: The perfect passive indicates a completed action with abiding result. 'Have been forgiven' best reflects the Greek tense-aspect without forcing a more interpretive paraphrase.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative pronoun refers to the persons whose sins are in view. English can express this idiomatically as 'forgiven them'; the fuller 'forgiven to them' is awkward.
- source_word: κρατῆτε
  chosen: you retain
  alternatives:
  - you hold fast
  - you hold
  - you keep
  lexicon: BDAG
  rationale: κρατέω here contrasts with forgiving sins and thus means to retain or hold them. 'Retain' is the clearest idiomatic antonym in this context.
- source_word: κεκράτηνται
  chosen: they have been retained
  alternatives:
  - they are retained
  - they stand retained
  lexicon: BDAG
  rationale: The perfect passive again suggests a completed state with continuing effect. Matching the first clause with 'have been retained' preserves the parallelism and aspect.
