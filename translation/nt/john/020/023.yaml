theological_decisions:
- issue: Whether the verse should be rendered in a way that implies the disciples themselves independently effect forgiveness, or that their action corresponds to a prior/divine reality.
  chosen_reading: 'The translation preserves the Greek''s perfect-passive/resultative wording without adding interpretive qualifiers: ''they have been forgiven'' / ''they have been retained.'''
  alternative_readings:
  - Render more dynamically as 'they are forgiven' / 'they are not forgiven'
  - Render more interpretively as 'God has forgiven them' / 'God has retained them'
  rationale: The Greek text does not explicitly name God as the agent, though the passive naturally invites that inference. To avoid importing a denominationally loaded interpretation while preserving the theological tension, the English keeps the passive and perfect aspect. This allows the text to speak with its own ambiguity regarding the relation between apostolic action and divine forgiveness.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T03:35:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/020/023.json
  category: awkward_english
  tier: 1
  from: they have been forgiven them
  to: the sins have been forgiven them
  rationale: In the clause 'If you forgive the sins of any, they have been forgiven them,' the pronoun 'they' refers to 'the sins.' While grammatically permissible, the construction 'they (the sins) have been forgiven them (the people)' can be slightly ambiguous or clunky for the modern English reader. Replacing the pronoun 'they' with 'the sins' would improve clarity by explicitly stating the subject, while still maintaining the perfect passive aspect and the drafter's preference for 'them' over 'to them' for the dative.
