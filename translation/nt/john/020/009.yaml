theological_decisions:
- issue: Resurrection expression and agency
  chosen_reading: that he had to rise from the dead
  alternative_readings:
  - that he had to be raised from the dead
  rationale: The Greek uses the active infinitive ἀναστῆναι, so the main text should
    reflect active wording. A passive alternative is theologically orthodox and appears
    elsewhere in the New Testament, but this verse's wording is best preserved as
    written. This maintains the text's expression without forcing a broader doctrinal
    synthesis into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
