id: JHN.20.9
reference: John 20:9
source:
  edition: SBLGNT
  text: οὐδέπω γὰρ ᾔδεισαν τὴν γραφὴν ὅτι δεῖ αὐτὸν ἐκ νεκρῶν ἀναστῆναι.
translation:
  text: For they did not yet understand the Scripture, that he had to rise from the
    dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that he had to be raised from the dead.' The Greek here uses an active
      verb, 'to rise.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδέπω
  chosen: not yet
  alternatives:
  - not yet still
  lexicon: BDAG
  rationale: Conveys the temporal sense that their understanding had not occurred
    up to this point.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks an explanatory connection to the previous statement; 'For' preserves
    the discourse flow naturally in English.
- source_word: ᾔδεισαν
  chosen: understand
  alternatives:
  - know
  - had known
  lexicon: BDAG
  rationale: Although from οἶδα ('know'), in context with 'the Scripture' and the
    content clause it refers to grasping its meaning rather than mere awareness of
    its existence. 'Understand' best communicates the intended sense in idiomatic
    English.
- source_word: τὴν γραφὴν
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  - the Scriptures
  lexicon: BDAG
  rationale: The singular γραφή commonly refers to Scripture as authoritative sacred
    writing. Singular is retained because the Greek is singular, while still allowing
    that a specific scriptural testimony or the scriptural witness generally is in
    view.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of what they did not yet understand from Scripture.
- source_word: δεῖ
  chosen: had to
  alternatives:
  - must
  - it was necessary for
  lexicon: BDAG
  rationale: Expresses divine necessity. 'Had to' fits the past narrative frame in
    English while preserving the force of necessity.
- source_word: αὐτὸν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: 'Rendered as the subject of the infinitive clause in natural English:
    ''that he had to rise.'''
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language. The plural νεκρῶν
    literally means 'dead ones/dead people,' but 'from the dead' is the established
    and accurate English equivalent.
- source_word: ἀναστῆναι
  chosen: to rise
  alternatives:
  - to be raised
  - to arise
  lexicon: BDAG
  rationale: The active infinitive of ἀνίστημι here is best rendered 'to rise.' This
    preserves the Greek wording without importing a passive form, while remaining
    fully compatible with Johannine resurrection theology.
