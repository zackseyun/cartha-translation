theological_decisions:
- issue: Rendering Δίδυμος
  chosen_reading: Translate as 'Twin' rather than retain the traditional form 'Didymus.'
  alternative_readings:
  - Didymus
  rationale: This is not a christological or doctrinally contested term. The translation
    philosophy prefers preserving source meaning where tradition has often left a
    Greek form untranslated. Since Δίδυμος is a meaningful epithet, translating it
    improves transparency and readability.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names.'
