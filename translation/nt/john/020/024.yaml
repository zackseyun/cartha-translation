id: JHN.20.24
reference: John 20:24
source:
  edition: SBLGNT
  text: Θωμᾶς δὲ εἷς ἐκ τῶν δώδεκα, ὁ λεγόμενος Δίδυμος, οὐκ ἦν μετ’ αὐτῶν ὅτε ⸀ἦλθεν
    Ἰησοῦς.
translation:
  text: Now Thomas, one of the Twelve, the one called Twin, was not with them when
    Jesus came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Didymus.'' The name means ''Twin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: Here δέ marks a mild narrative transition rather than strong contrast.
    'Now' gives natural English discourse flow while preserving the shift in focus
    to Thomas.
- source_word: εἷς ἐκ τῶν δώδεκα
  chosen: one of the Twelve
  alternatives:
  - one of the twelve disciples
  lexicon: BDAG
  rationale: This is the standard idiomatic expression identifying Thomas as a member
    of the apostolic group. Capitalizing 'Twelve' reflects its function as a recognized
    designation, not merely a numeral.
- source_word: ὁ λεγόμενος Δίδυμος
  chosen: the one called Twin
  alternatives:
  - called Didymus
  - who was called Twin
  lexicon: BDAG
  rationale: Δίδυμος means 'twin.' Per translation philosophy, names are transliterated,
    but this is an explanatory epithet with lexical meaning, so translating it preserves
    the sense better than the traditional transliteration 'Didymus.' 'The one called'
    closely reflects the participial construction.
- source_word: οὐκ ἦν μετ’ αὐτῶν
  chosen: was not with them
  alternatives:
  - was not among them
  lexicon: BDAG
  rationale: A straightforward rendering of the imperfect of εἰμί with μετά + genitive,
    expressing Thomas's absence from the group at that time.
- source_word: ὅτε ἦλθεν Ἰησοῦς
  chosen: when Jesus came
  alternatives:
  - when Jesus arrived
  lexicon: BDAG
  rationale: ἔρχομαι is most naturally rendered 'came' here. 'Arrived' is possible
    but slightly more interpretive and less direct. The clause refers to Jesus' coming
    to the gathered disciples after the resurrection.
