theological_decisions:
- issue: Narrative identification of the risen Jesus
  chosen_reading: that it was Jesus
  alternative_readings:
  - that she did not recognize Jesus
  rationale: The verse states Mary's lack of knowledge of the person's identity without
    specifying the cause. The translation preserves the narrative fact without importing
    a fuller explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
