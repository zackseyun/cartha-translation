id: JHN.20.14
reference: John 20:14
source:
  edition: SBLGNT
  text: ⸀ταῦτα εἰποῦσα ἐστράφη εἰς τὰ ὀπίσω, καὶ θεωρεῖ τὸν Ἰησοῦν ἑστῶτα, καὶ οὐκ
    ᾔδει ὅτι Ἰησοῦς ἐστιν.
translation:
  text: After saying these things, she turned around and saw Jesus standing there,
    and she did not know that it was Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she did not recognize that it was Jesus.' The Greek says literally,
      'she did not know that it is Jesus,' expressing lack of recognition of his identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative accusative; 'these things' preserves the Greek number
    and common Johannine narrative style better than the more compressed English 'this'.
- source_word: εἰποῦσα
  chosen: after saying
  alternatives:
  - having said
  - when she had said
  lexicon: BDAG
  rationale: Aorist participle feminine singular modifying Mary; rendered temporally
    in natural English as 'after saying' to show action prior to the main verb without
    sounding wooden.
- source_word: ἐστράφη εἰς τὰ ὀπίσω
  chosen: she turned around
  alternatives:
  - she turned back
  - she turned to the rear
  lexicon: BDAG
  rationale: The idiom means turning to what is behind her. 'Turned around' is idiomatic
    modern English and accurately conveys the motion.
- source_word: θεωρεῖ
  chosen: saw
  alternatives:
  - beheld
  - noticed
  - looked at
  lexicon: BDAG
  rationale: Historical present in narrative. English commonly shifts such presents
    to past tense for smooth narration. 'Saw' fits the context better than the more
    marked 'beheld,' while still reflecting actual perception.
- source_word: ἑστῶτα
  chosen: standing there
  alternatives:
  - standing
  - standing nearby
  lexicon: BDAG
  rationale: Perfect active participle of ἵστημι describing Jesus' standing posture.
    'Standing there' makes the scene natural in English and captures the stative sense
    in context.
- source_word: οὐκ ᾔδει
  chosen: she did not know
  alternatives:
  - she did not realize
  - she did not recognize
  lexicon: BDAG
  rationale: The verb οἶδα fundamentally denotes knowing. 'Did not know' stays closer
    to the Greek; 'did not recognize' is interpretive and better left as an alternative
    since the next clause explains the content of her lack of knowledge.
- source_word: ὅτι Ἰησοῦς ἐστιν
  chosen: that it was Jesus
  alternatives:
  - that Jesus was the one
  - that he was Jesus
  lexicon: BDAG
  rationale: English normally supplies 'it was' in this identification clause. This
    preserves the sense that she did not understand the person's identity.
