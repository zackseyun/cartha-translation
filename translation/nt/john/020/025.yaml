id: JHN.20.25
reference: John 20:25
source:
  edition: SBLGNT
  text: ἔλεγον οὖν αὐτῷ οἱ ἄλλοι μαθηταί· Ἑωράκαμεν τὸν κύριον. ὁ δὲ εἶπεν αὐτοῖς·
    Ἐὰν μὴ ἴδω ἐν ταῖς χερσὶν αὐτοῦ τὸν τύπον τῶν ἥλων καὶ βάλω τὸν δάκτυλόν μου εἰς
    τὸν τύπον τῶν ἥλων καὶ βάλω ⸂μου τὴν χεῖρα⸃ εἰς τὴν πλευρὰν αὐτοῦ, οὐ μὴ πιστεύσω.
translation:
  text: So the other disciples were telling him, “We have seen the Lord.” But he said
    to them, “Unless I see in his hands the mark of the nails, and put my finger into
    the mark of the nails, and put my hand into his side, I will certainly not believe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will never believe.” The Greek uses an emphatic negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were telling
  alternatives:
  - said
  - kept telling
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in past time; 'were
    telling' captures the iterative/imperfective force better than simple 'said'.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: οἱ ἄλλοι μαθηταί
  chosen: the other disciples
  alternatives:
  - the rest of the disciples
  lexicon: BDAG
  rationale: Straightforward rendering of article + adjective + noun. 'Other disciples'
    fits the immediate contrast with Thomas.
- source_word: Ἑωράκαμεν
  chosen: We have seen
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Perfect tense conveys a completed event with present relevance; 'have
    seen' preserves that force better than simple past.
- source_word: κύριον
  chosen: the Lord
  alternatives: []
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In context
    it refers to the risen Jesus and functions as a christological title, not merely
    'master'.
- source_word: Ἐὰν μὴ ἴδω
  chosen: Unless I see
  alternatives:
  - if I do not see
  lexicon: BDAG
  rationale: Standard conditional expression in idiomatic English. 'Unless' cleanly
    conveys the negative condition.
- source_word: ἐν ταῖς χερσὶν αὐτοῦ
  chosen: in his hands
  alternatives:
  - on his hands
  lexicon: BDAG
  rationale: The preposition ἐν is literally 'in'; with wounds/marks in body parts,
    'in his hands' is acceptable and closely follows the Greek.
- source_word: τύπον
  chosen: the mark
  alternatives:
  - the imprint
  - the print
  lexicon: BDAG
  rationale: τύπος here denotes the visible result/impression left by the nails. 'Mark'
    is clear modern English and avoids archaic 'print' while preserving concreteness.
- source_word: ἥλων
  chosen: of the nails
  alternatives:
  - from the nails
  lexicon: BDAG
  rationale: Genitive is naturally rendered 'of the nails' in English with 'mark.'
    This preserves the relation without overinterpreting.
- source_word: βάλω
  chosen: put
  alternatives:
  - place
  - cast
  lexicon: BDAG
  rationale: In this bodily context, 'put' is the most natural English equivalent;
    'cast' would be misleadingly literal.
- source_word: τὸν δάκτυλόν μου εἰς
  chosen: my finger into
  alternatives:
  - my finger in
  lexicon: BDAG
  rationale: εἰς expresses movement into; 'into' preserves the vividness of Thomas's
    demand.
- source_word: μου τὴν χεῖρα
  chosen: my hand
  alternatives: []
  lexicon: BDAG
  rationale: Possessive pronoun with noun is explicit in the Greek and should be retained.
- source_word: τὴν πλευρὰν αὐτοῦ
  chosen: his side
  alternatives:
  - his flank
  lexicon: BDAG
  rationale: Standard anatomical rendering in Johannine context, echoing the spear
    wound of John 19:34 without using unnatural English.
- source_word: οὐ μὴ πιστεύσω
  chosen: I will certainly not believe
  alternatives:
  - I will never believe
  - I certainly will not believe
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not believe' preserves the strong force without importing the potentially absolute
    temporal nuance of 'never'.
