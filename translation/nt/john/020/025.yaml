theological_decisions:
- issue: Force of Thomas's refusal in οὐ μὴ πιστεύσω
  chosen_reading: 'Rendered as emphatic refusal: ''I will certainly not believe'''
  alternative_readings:
  - I will never believe
  rationale: The Greek expresses strong emphatic negation, but the translation avoids
    overstating it as an absolute timeless 'never' when the context is a conditional
    refusal pending evidence. This preserves the text's rhetorical force without adding
    psychological finality beyond the Greek condition.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English.
