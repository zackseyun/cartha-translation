theological_decisions:
- issue: Rendering of κύριος for Jesus
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The verse refers to Jesus after his death and in the disciples' speech.
    Following the project's contested-terms guidance, κύριος is rendered 'Lord' as
    the standard christological title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Speaker's use of first person plural οἴδαμεν
  chosen_reading: we do not know
  alternative_readings:
  - I do not know
  rationale: The plural is retained to preserve the text as written and not resolve
    historical or harmonization questions by singularizing Mary's statement. This
    preserves textual tension rather than smoothing it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
