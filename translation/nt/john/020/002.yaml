id: JHN.20.2
reference: John 20:2
source:
  edition: SBLGNT
  text: τρέχει οὖν καὶ ἔρχεται πρὸς Σίμωνα Πέτρον καὶ πρὸς τὸν ἄλλον μαθητὴν ὃν ἐφίλει
    ὁ Ἰησοῦς, καὶ λέγει αὐτοῖς· Ἦραν τὸν κύριον ἐκ τοῦ μνημείου, καὶ οὐκ οἴδαμεν ποῦ
    ἔθηκαν αὐτόν.
translation:
  text: So she runs and comes to Simon Peter and to the other disciple, whom Jesus
    loved, and says to them, “They have taken the Lord out of the tomb, and we do
    not know where they have laid him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the other disciple, whom Jesus loved.'' The verb here is from
      φιλέω, which can emphasize affection; alternatively, ''whom Jesus was fond of.'''
    reason: lexical_alternative
  - marker: b
    text: Mary says, 'we do not know,' preserving the Greek first person plural. Some
      readers understand this as including other women with her; the text itself does
      not explain the plural here.
    reason: alternative_reading
lexical_decisions:
- source_word: τρέχει
  chosen: runs
  alternatives:
  - ran
  - is running
  lexicon: BDAG
  rationale: Present-tense historical narrative in John is naturally rendered with
    vivid present in English here; 'runs' preserves the narrative immediacy better
    than flattening to past tense.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from the previous verse. 'So' is natural
    modern English and preserves the inferential flow without sounding overly formal.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - went
  - comes up
  lexicon: BDAG
  rationale: Another historical present. 'Comes' matches the Greek form and keeps
    the scene vivid.
- source_word: πρὸς Σίμωνα Πέτρον
  chosen: to Simon Peter
  alternatives:
  - toward Simon Peter
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person; idiomatic
    English is simply 'to Simon Peter.'
- source_word: τὸν ἄλλον μαθητήν
  chosen: the other disciple
  alternatives:
  - the other follower
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Gospel contexts; 'other'
    reflects ἄλλον in contrast with Peter.
- source_word: ὃν ἐφίλει ὁ Ἰησοῦς
  chosen: whom Jesus loved
  alternatives:
  - whom Jesus was loving
  - whom Jesus was fond of
  lexicon: BDAG
  rationale: φιλέω can denote affection/love. In Johannine usage here, 'loved' is
    the most natural and established English rendering; 'was fond of' is too weak,
    and the imperfect is not best brought out with an English progressive in this
    relative clause.
- source_word: λέγει αὐτοῖς
  chosen: says to them
  alternatives:
  - tells them
  - said to them
  lexicon: BDAG
  rationale: Historical present again; 'says to them' preserves the Greek tense and
    directness.
- source_word: Ἦραν
  chosen: They have taken
  alternatives:
  - They took
  - They removed
  lexicon: BDAG
  rationale: 'Aorist in direct speech can be rendered as English present perfect to
    express a completed action with present relevance: the body is now missing. This
    is idiomatic and fits Mary''s alarm.'
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος follows the doctrinal default 'Lord.' In this resurrection context
    it functions as a reverential title for Jesus, not merely 'sir' or 'master'.
- source_word: ἐκ τοῦ μνημείου
  chosen: out of the tomb
  alternatives:
  - from the tomb
  - out of the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context is a burial tomb. 'Out of the tomb' best matches
    ἐκ and the physical sense.
- source_word: οὐκ οἴδαμεν
  chosen: we do not know
  alternatives:
  - I do not know
  lexicon: BDAG
  rationale: The Greek is explicitly first person plural. The plural should be preserved
    rather than harmonized to a singular based on Mary's individual speech.
- source_word: ποῦ ἔθηκαν αὐτόν
  chosen: where they have laid him
  alternatives:
  - where they put him
  - where they placed him
  lexicon: BDAG
  rationale: τίθημι here means to place/lay. 'Laid him' is natural in burial context
    and pairs well with 'taken ... out of the tomb.' Present perfect maintains the
    continuing uncertainty about his present location.
