theological_decisions:
- issue: Narrative tense in resurrection account
  chosen_reading: Retain the historical present ('comes,' 'sees') in English
  alternative_readings:
  - Convert all verbs to simple past for smoother English
  rationale: The historical present is a meaningful feature of the Greek narrative
    style here and can be preserved naturally in English without obscuring sense.
    This keeps the immediacy of the resurrection-morning account without adding theological
    interpretation.
  doctrine_reference: Translation philosophy §1, §6
