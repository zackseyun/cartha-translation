id: JHN.20.1
reference: John 20:1
source:
  edition: SBLGNT
  text: Τῇ δὲ μιᾷ τῶν σαββάτων Μαρία ἡ Μαγδαληνὴ ἔρχεται πρωῒ σκοτίας ἔτι οὔσης εἰς
    τὸ μνημεῖον, καὶ βλέπει τὸν λίθον ἠρμένον ἐκ τοῦ μνημείου.
translation:
  text: Now on the first day of the week, Mary Magdalene comes to the tomb early,
    while it was still dark, and sees that the stone had been taken away from the
    tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on one of the Sabbaths,' an idiom meaning 'on the first day
      of the week.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ μιᾷ τῶν σαββάτων
  chosen: Now on the first day of the week
  alternatives:
  - On the first day after the Sabbath
  - On the first day of the Sabbaths
  lexicon: BDAG
  rationale: This idiom literally reads 'on one of the Sabbaths' but in Koine usage
    refers to the first day of the week. 'Now' gives a natural discourse rendering
    for δέ without overstating contrast.
- source_word: Μαρία ἡ Μαγδαληνὴ
  chosen: Mary Magdalene
  alternatives:
  - Mary the Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name and epithet; this
    follows the philosophy of transliterating names rather than translating them.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - went
  - is coming
  lexicon: BDAG
  rationale: The Greek present is retained as a historical present for narrative vividness.
    English 'comes' is natural and reflects the aspect better than flattening to a
    simple past.
- source_word: πρωῒ
  chosen: early
  alternatives:
  - early in the morning
  - at dawn
  lexicon: BDAG
  rationale: The adverb indicates an early hour. 'Early' is concise and lets the following
    temporal clause specify that it was still dark, avoiding an over-interpretive
    'at dawn'.
- source_word: σκοτίας ἔτι οὔσης
  chosen: while it was still dark
  alternatives:
  - while darkness still remained
  - when it was still dark
  lexicon: BDAG
  rationale: This genitive absolute is best rendered as a temporal clause in natural
    English. 'While it was still dark' preserves the ongoing circumstance.
- source_word: εἰς τὸ μνημεῖον
  chosen: to the tomb
  alternatives:
  - to the grave
  - to the memorial tomb
  lexicon: BDAG
  rationale: μνημεῖον in this context refers to the burial tomb. 'Tomb' is the standard
    and clearest rendering.
- source_word: βλέπει
  chosen: sees
  alternatives:
  - noticed
  - beholds
  lexicon: BDAG
  rationale: A straightforward present-tense rendering matches the historical present
    and keeps the narrative immediate.
- source_word: τὸν λίθον ἠρμένον
  chosen: that the stone had been taken away
  alternatives:
  - the stone removed
  - the stone having been lifted away
  lexicon: BDAG
  rationale: The perfect passive participle ἠρμένον indicates a completed action with
    resulting state. English past perfect captures that the stone was already removed
    when Mary arrived.
- source_word: ἐκ τοῦ μνημείου
  chosen: from the tomb
  alternatives:
  - out of the tomb entrance
  lexicon: BDAG
  rationale: The preposition ἐκ marks movement away from the tomb. 'From the tomb'
    is idiomatic and sufficient without adding 'entrance,' which is implied but not
    explicit.
