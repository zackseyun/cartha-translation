id: JHN.20.27
reference: John 20:27
source:
  edition: SBLGNT
  text: εἶτα λέγει τῷ Θωμᾷ· Φέρε τὸν δάκτυλόν σου ὧδε καὶ ἴδε τὰς χεῖράς μου, καὶ
    φέρε τὴν χεῖρά σου καὶ βάλε εἰς τὴν πλευράν μου, καὶ μὴ γίνου ἄπιστος ἀλλὰ πιστός.
translation:
  text: Then he said to Thomas, “Bring your finger here and see my hands, and bring
    your hand and put it into my side, and do not become unbelieving, but believing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be faithless, but faithful.' The Greek adjectives can carry either
      sense, but in this context the contrast centers on Thomas's belief in the risen
      Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - After that
  - Next
  lexicon: BDAG
  rationale: Marks sequence in the narrative. 'Then' is natural modern English and
    preserves the temporal progression.
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    normally renders it as a simple past. This is an optimal-equivalence adjustment
    for readability.
- source_word: Φέρε
  chosen: Bring
  alternatives:
  - Reach
  - Take
  lexicon: BDAG
  rationale: φέρω literally means 'bring/carry.' Here Jesus invites Thomas to move
    his finger/hand toward Jesus' wounds. 'Bring' preserves the verbal repetition
    in both imperatives better than the more interpretive 'reach.'
- source_word: δάκτυλόν σου ὧδε
  chosen: your finger here
  alternatives:
  - your finger to this place
  - your finger here
  lexicon: BDAG
  rationale: A direct, natural rendering of the object plus adverb. 'Here' preserves
    the deictic force of ὧδε.
- source_word: ἴδε
  chosen: see
  alternatives:
  - look at
  - behold
  lexicon: BDAG
  rationale: The aorist imperative can mean 'see/look.' 'See' is concise and idiomatic
    with 'my hands.' 'Behold' is too archaic for the stated philosophy.
- source_word: τὰς χεῖράς μου
  chosen: my hands
  lexicon: BDAG
  rationale: Straightforward rendering. Plural retained.
- source_word: βάλε εἰς τὴν πλευράν μου
  chosen: put it into my side
  alternatives:
  - place it into my side
  - put it in my side
  lexicon: BDAG
  rationale: βάλε is a forceful imperative ('put/place'), and εἰς naturally takes
    'into.' 'Side' is the standard rendering of πλευρά here, referring to the pierced
    side of Jesus.
- source_word: μὴ γίνου
  chosen: do not become
  alternatives:
  - do not be
  - stop being
  lexicon: BDAG
  rationale: 'γίνου from γίνομαι is inceptive/process-oriented: ''become'' better
    reflects the verb than a static ''be.'' ''Stop being'' would overstate an aspectual
    nuance not explicit in the form.'
- source_word: ἄπιστος
  chosen: unbelieving
  alternatives:
  - faithless
  - without faith
  - disbelieving
  lexicon: BDAG
  rationale: In this context the contrast is with πιστός and concerns response to
    the risen Jesus. 'Unbelieving' communicates the sense clearly in modern English
    without importing broader covenantal overtones that 'faithless' may carry.
- source_word: πιστός
  chosen: believing
  alternatives:
  - faithful
  - full of faith
  lexicon: BDAG
  rationale: Given the immediate contrast with ἄπιστος in the context of Thomas's
    doubt, 'believing' best fits the sense. 'Faithful' is possible lexically but would
    shift the focus from belief in the resurrection appearance to general fidelity.
