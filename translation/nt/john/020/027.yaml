theological_decisions:
- issue: Rendering the contrast ἄπιστος / πιστός in Jesus' exhortation to Thomas
  chosen_reading: unbelieving / believing
  alternative_readings:
  - faithless / faithful
  rationale: The immediate narrative concerns Thomas's refusal to believe the testimony
    about Jesus' resurrection unless he sees and touches. Therefore the semantic field
    of belief is primary here. This preserves the text's focus on faith in the risen
    Jesus without importing a broader moral category unless the context warrants it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table for πίστις emphasizes ''faith'' as default, supporting
    a belief-oriented rendering in this context.'
