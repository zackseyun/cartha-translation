theological_decisions:
- issue: Whether the arrangement of the burial cloth implies a theological claim beyond
    the narrative description
  chosen_reading: Render the verse as an observational description of the cloth's
    separate, orderly placement without importing symbolic or apologetic conclusions
    into the main text.
  alternative_readings:
  - The folded cloth symbolizes intentionality or resurrection orderliness
  - The arrangement proves a specific reconstruction of the resurrection event
  rationale: The Greek text describes the location and condition of the face cloth
    but does not explicitly state symbolic meaning. To preserve theological restraint
    and avoid importing later inferences, the translation remains descriptive.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
