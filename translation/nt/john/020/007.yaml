id: JHN.20.7
reference: John 20:7
source:
  edition: SBLGNT
  text: καὶ τὸ σουδάριον, ὃ ἦν ἐπὶ τῆς κεφαλῆς αὐτοῦ, οὐ μετὰ τῶν ὀθονίων κείμενον
    ἀλλὰ χωρὶς ἐντετυλιγμένον εἰς ἕνα τόπον·
translation:
  text: and the face cloth, which had been on his head, was not lying with the linen
    cloths but folded up separately in one place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrapped up' or 'rolled up' for 'folded up' (ἐντετυλιγμένον).
    reason: lexical_alternative
lexical_decisions:
- source_word: σουδάριον
  chosen: face cloth
  alternatives:
  - head cloth
  - burial cloth
  - handkerchief
  lexicon: BDAG
  rationale: In this burial context, the term refers to the cloth associated with
    Jesus' head/face. 'Face cloth' is clearer and more idiomatic in modern English
    than 'napkin' or 'handkerchief,' while fitting the explanatory relative clause
    'which had been on his head.'
- source_word: ἐπὶ τῆς κεφαλῆς αὐτοῦ
  chosen: on his head
  alternatives:
  - around his head
  - over his head
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase. 'On his head'
    preserves the Greek wording without over-specifying the exact manner of placement.
- source_word: ὀθονίων
  chosen: linen cloths
  alternatives:
  - linen wrappings
  - burial cloths
  lexicon: BDAG
  rationale: The plural refers to the linen cloths/wrappings in the tomb. 'Linen cloths'
    is transparent and keeps the lexical link to the burial linens without adding
    interpretive detail.
- source_word: κείμενον
  chosen: lying
  alternatives:
  - placed
  - lying there
  lexicon: BDAG
  rationale: The participle from κεῖμαι commonly denotes something lying or being
    laid in a place. 'Lying' is natural English and preserves the physical description.
- source_word: χωρὶς
  chosen: separately
  alternatives:
  - apart
  - by itself
  lexicon: BDAG
  rationale: The adverb marks spatial separation from the linen cloths. 'Separately'
    reads smoothly in English while preserving the contrast introduced by ἀλλά.
- source_word: ἐντετυλιγμένον
  chosen: folded up
  alternatives:
  - wrapped up
  - rolled up
  lexicon: BDAG
  rationale: The perfect passive participle indicates the cloth was in a wrapped/folded
    state. 'Folded up' best conveys the orderly arrangement in idiomatic English,
    though 'wrapped up' is lexically possible and preserved in a footnote.
- source_word: εἰς ἕνα τόπον
  chosen: in one place
  alternatives:
  - in a place
  - in its own place
  lexicon: BDAG
  rationale: This phrase indicates a distinct location. 'In one place' is a close,
    natural rendering that preserves the sense of a specific spot without over-interpretation.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple connective continuing the narrative description from the previous
    verse.
