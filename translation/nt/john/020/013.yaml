theological_decisions:
- issue: Rendering of κύριος in Mary's speech
  chosen_reading: my Lord
  alternative_readings:
  - my master
  rationale: The translation follows the project's default rendering of κύριος as
    'Lord.' In John's Gospel, this title can carry both respectful and christological
    force; the translation preserves that theological openness rather than reducing
    it to a merely social title.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Tone of Γύναι
  chosen_reading: Woman
  alternative_readings:
  - Dear woman
  - Ma’am
  rationale: The Greek is respectful but not sentimentalized. Rendering it simply
    as 'Woman' preserves the source wording and avoids importing emotional nuance
    not explicit in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition; readable modern English'
