id: JHN.20.13
reference: John 20:13
source:
  edition: SBLGNT
  text: καὶ λέγουσιν αὐτῇ ἐκεῖνοι· Γύναι, τί κλαίεις; λέγει αὐτοῖς ὅτι Ἦραν τὸν κύριόν
    μου, καὶ οὐκ οἶδα ποῦ ἔθηκαν αὐτόν.
translation:
  text: And they said to her, “Woman, why are you weeping?” She said to them, “They
    have taken away my Lord, and I do not know where they have put him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what are you weeping for?' The Greek literally uses 'what,' but the
      sense in English is 'why.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my master.' Greek kyrios is rendered 'Lord' by default in this translation;
      the term can also function as a respectful title depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: Γύναι
  chosen: Woman
  alternatives:
  - Dear woman
  - Ma’am
  lexicon: BDAG
  rationale: Vocative of γυνή used as a respectful form of address, not rude in this
    context. 'Woman' preserves the directness and Johannine consistency (cf. similar
    address elsewhere in John) better than more interpretive expansions.
- source_word: τί
  chosen: why
  alternatives:
  - what
  lexicon: BDAG
  rationale: Although τί is formally 'what,' in the idiom τί κλαίεις the natural English
    sense is 'why are you weeping?' This reflects the interrogative force in idiomatic
    English rather than a wooden rendering.
- source_word: κλαίεις
  chosen: are you weeping
  alternatives:
  - are you crying
  lexicon: BDAG
  rationale: Present tense conveys ongoing action. 'Weeping' is slightly more elevated
    and fits the solemn context better than 'crying,' while remaining natural modern
    English.
- source_word: Ἦραν
  chosen: have taken away
  alternatives:
  - took away
  - have taken
  lexicon: BDAG
  rationale: Aorist in Greek here refers to a completed past action, but English present
    perfect is idiomatic in reporting a recent event with present relevance. 'Taken
    away' also fits the context of removal from the tomb.
- source_word: κύριόν
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this context Mary
    refers to Jesus with reverence and personal devotion; 'Lord' preserves both Johannine
    usage and theological resonance better than 'master'.
- source_word: οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: Retains readable but slightly more formal narrative style appropriate
    to Scripture. The perfect-form verb οἶδα functions as a present-state verb, naturally
    rendered 'I know/do not know.'
- source_word: ποῦ ἔθηκαν αὐτόν
  chosen: where they have put him
  alternatives:
  - where they laid him
  - where they placed him
  lexicon: BDAG
  rationale: τίθημι here means 'put/place.' 'Put him' is the most natural modern English.
    Present perfect ('have put') matches the recent-action-with-current-result sense
    in English narrative.
- source_word: ἐκεῖνοι
  chosen: they
  alternatives:
  - those men
  - those ones
  lexicon: BDAG
  rationale: The demonstrative points back to the two angels, but English normally
    uses 'they' rather than an overly explicit demonstrative here. The referent remains
    clear from context.
