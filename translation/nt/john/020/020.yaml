id: JHN.20.20
reference: John 20:20
source:
  edition: SBLGNT
  text: καὶ τοῦτο εἰπὼν ⸀ἔδειξεν τὰς χεῖρας καὶ τὴν πλευρὰν ⸀αὐτοῖς. ἐχάρησαν οὖν
    οἱ μαθηταὶ ἰδόντες τὸν κύριον.
translation:
  text: And after saying this, he showed them his hands and his side. Then the disciples
    rejoiced when they saw the Lord.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦτο εἰπὼν
  chosen: after saying this
  alternatives:
  - having said this
  - when he had said this
  lexicon: BDAG
  rationale: The aorist participle with τοῦτο is naturally rendered as a prior action
    relative to the main verb. 'After saying this' is idiomatic modern English while
    preserving the temporal sequence.
- source_word: ἔδειξεν
  chosen: showed
  alternatives:
  - displayed
  - pointed out
  lexicon: BDAG
  rationale: δείκνυμι here means to show or present for sight. 'Showed' is the most
    natural and direct English equivalent in context.
- source_word: τὰς χεῖρας
  chosen: his hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: Although the Greek has the article rather than an explicit possessive,
    English idiom normally supplies the possessive in this context, especially since
    the hands are Jesus' own and are being shown as identifying marks.
- source_word: τὴν πλευράν
  chosen: his side
  alternatives:
  - the side
  - his flank
  lexicon: BDAG
  rationale: πλευρά commonly means 'side.' 'His side' is idiomatic and likely evokes
    the wound mentioned earlier in the chapter without overtranslating.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative indirect object is naturally incorporated into the English
    verb phrase as 'showed them.'
- source_word: ἐχάρησαν
  chosen: rejoiced
  alternatives:
  - were glad
  - became joyful
  lexicon: BDAG
  rationale: χαίρω can mean 'rejoice' or 'be glad.' 'Rejoiced' preserves the stronger
    verbal force and aligns with the fulfillment of Jesus' promise in John 16:22,
    while remaining natural English.
- source_word: οὖν
  chosen: Then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks a logical/resultative progression. 'Then' communicates the
    narrative consequence smoothly in English without sounding overly formal.
- source_word: οἱ μαθηταί
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: μαθηταί is the standard Gospel term for Jesus' disciples. 'The disciples'
    is the established and accurate rendering.
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - having seen
  - on seeing
  lexicon: BDAG
  rationale: The aorist participle is best rendered here with a temporal clause in
    English. 'When they saw' clearly expresses the occasion for their rejoicing.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines, whose default rendering
    is 'Lord.' In Johannine context this is both the disciples' recognition of Jesus
    and a christological title, so 'the Lord' is appropriate.
