theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: Per DOCTRINE.md, κύριος defaults to 'Lord.' In this resurrection appearance
    context, the term functions as a christological title and not merely a polite
    address, so 'the Lord' best preserves Johannine usage and theological weight.
