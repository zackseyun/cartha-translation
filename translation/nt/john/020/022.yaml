theological_decisions:
- issue: Whether πνεῦμα ἅγιον should be rendered as an impersonal 'holy spirit' or
    the personal divine 'Holy Spirit'
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Holy Spirit
  - holy spirit
  rationale: Within John's Gospel and broader NT usage, πνεῦμα ἅγιον here most naturally
    denotes the Holy Spirit. Rendering it as lowercase 'holy spirit' could suggest
    an indefinite or merely qualitative force not warranted by the context. The translation
    preserves orthodox Trinitarian reading without adding content beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Narrative tense of historical present λέγει
  chosen_reading: said to them
  alternative_readings:
  - says to them
  rationale: This is a stylistic translation decision rather than a doctrinal one,
    but it affects how the narrative is perceived. Smoothing the historical present
    into English past tense improves readability and follows optimal equivalence without
    theological loss.
  doctrine_reference: Translation philosophy §6
