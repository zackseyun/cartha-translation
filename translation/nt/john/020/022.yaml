id: JHN.20.22
reference: John 20:22
source:
  edition: SBLGNT
  text: καὶ τοῦτο εἰπὼν ἐνεφύσησεν καὶ λέγει αὐτοῖς· Λάβετε πνεῦμα ἅγιον·
translation:
  text: And after saying this, he breathed on them and said to them, “Receive the
    Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he breathed into them.' The verb also recalls creation and new-creation
      imagery in Genesis 2:7 and Ezekiel 37.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο εἰπὼν
  chosen: after saying this
  alternatives:
  - having said this
  - when he had said this
  lexicon: BDAG
  rationale: The aorist participle with τοῦτο is naturally rendered as a prior action
    relative to the main verb. 'After saying this' is idiomatic modern English while
    preserving the temporal sequence.
- source_word: ἐνεφύσησεν
  chosen: breathed on them
  alternatives:
  - breathed into them
  - blew on them
  lexicon: BDAG
  rationale: The verb means 'to breathe on/upon' and echoes LXX creation/new-creation
    language (e.g., Gen 2:7; Ezek 37), but the translation should not over-specify
    the allusion in the main text. 'Breathed on them' is the most natural rendering
    in context.
- source_word: λέγει αὐτοῖς
  chosen: said to them
  alternatives:
  - says to them
  lexicon: BDAG
  rationale: Although λέγει is present (historical present), English style commonly
    smooths this to past narrative tense. This preserves sense without awkwardness;
    the historical-present nuance is not usually carried over in modern English translation
    unless stylistically important.
- source_word: Λάβετε
  chosen: Receive
  alternatives:
  - Take
  - Accept
  lexicon: BDAG
  rationale: The aorist imperative of λαμβάνω here is best rendered 'Receive,' the
    established and contextually fitting imperative for reception of the Spirit. 'Take'
    is possible lexically but sounds less natural and may imply self-initiation.
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: In Johannine context this refers to the divine Spirit, not a generic
    holy spirit. English idiom normally includes the article in this construction
    after 'receive.' Capitalization reflects personal/divine reference. The Greek
    lacks the article, but anarthrous πνεῦμα ἅγιον can still denote the Holy Spirit.
