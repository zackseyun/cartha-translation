id: JHN.3.24
reference: John 3:24
source:
  edition: SBLGNT
  text: οὔπω γὰρ ἦν βεβλημένος εἰς τὴν φυλακὴν ⸀ὁ Ἰωάννης.
translation:
  text: For John had not yet been thrown into prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, John the Baptist.
    reason: cross_reference
lexical_decisions:
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not yet at that time
  lexicon: BDAG
  rationale: The adverb marks that the action had not occurred up to the narrative
    point in view. 'Not yet' is the natural concise English equivalent.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: Here γάρ gives explanatory background for the surrounding narrative.
    'For' preserves the explanatory force without overinterpreting the connection.
- source_word: ἦν βεβλημένος
  chosen: had ... been thrown
  alternatives:
  - was ... cast
  - had ... been put
  lexicon: BDAG
  rationale: This periphrastic pluperfect/passive construction indicates a completed
    action prior to the reference point. English pluperfect passive ('had been thrown')
    best captures the temporal sense. 'Thrown' reflects the force of βάλλω more vividly
    than the weaker 'put,' while remaining idiomatic in the prison context.
- source_word: εἰς τὴν φυλακήν
  chosen: into prison
  alternatives:
  - into the prison
  - into custody
  lexicon: BDAG
  rationale: 'φυλακή here refers to imprisonment/prison rather than merely ''guard''
    or ''watch.'' English idiom normally omits the article: ''into prison.'' This
    preserves the directional force of εἰς while sounding natural.'
- source_word: ὁ Ἰωάννης
  chosen: John
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The Greek names him simply as 'John' with the article, functioning as
    the subject. The broader context identifies him, so adding 'the Baptist' would
    import information not explicit in this verse.
