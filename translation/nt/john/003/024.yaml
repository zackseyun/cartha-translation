theological_decisions:
- issue: Identification of Ἰωάννης
  chosen_reading: John
  alternative_readings:
  - John the Baptist
  rationale: The verse refers to John the Baptist in context, but the Greek text itself
    says only 'John.' To avoid adding interpretive material into the main text, the
    translation keeps the simple name.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants.'
