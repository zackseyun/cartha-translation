id: JHN.3.35
reference: John 3:35
source:
  edition: SBLGNT
  text: ὁ πατὴρ ἀγαπᾷ τὸν υἱόν, καὶ πάντα δέδωκεν ἐν τῇ χειρὶ αὐτοῦ.
translation:
  text: The Father loves the Son and has given all things into his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his hand.' The Greek expression is literally 'in his hand,' an idiom
      for entrusting authority or possession.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πατὴρ
  chosen: The Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: Rendered with capitalization because in Johannine context this is a personal
    divine title referring to God as the Father in relation to the Son, not merely
    a generic paternal reference.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - is loving
  lexicon: BDAG
  rationale: Present indicative expresses a current, ongoing reality. English simple
    present best conveys the durative force naturally. This also aligns with the default
    rendering of the ἀγαπάω/ἀγάπη word group as 'love.'
- source_word: τὸν υἱόν
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: Capitalized as a christological title in context, referring specifically
    to Jesus in his filial relation to the Father.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: Neuter plural is best represented explicitly as 'all things,' preserving
    the breadth of what has been given without reducing it to a vague abstraction.
- source_word: δέδωκεν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: Perfect indicative denotes a completed act with abiding result. 'Has
    given' preserves that aspect better than simple past 'gave,' especially in a theological
    context of enduring authority entrusted to the Son.
- source_word: ἐν τῇ χειρὶ αὐτοῦ
  chosen: into his hand
  alternatives:
  - in his hand
  lexicon: BDAG
  rationale: Although ἐν with 'hand' is literally 'in his hand,' the idiom with δίδωμι
    in this construction is naturally rendered in English as 'into his hand,' conveying
    entrustment, authority, and possession. This is a contextual idiomatic rendering
    rather than a paraphrase.
