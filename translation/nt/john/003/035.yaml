theological_decisions:
- issue: Relation of the Father and the Son
  chosen_reading: Retained the personal and relational titles 'Father' and 'Son' without
    reduction or paraphrase.
  alternative_readings:
  - generic familial language without capitalization
  rationale: The verse presents a distinctly christological relationship central to
    Johannine theology. Capitalization in English helps signal titular usage while
    avoiding doctrinal expansion beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Scope and permanence of what is given to the Son
  chosen_reading: Rendered δέδωκεν as 'has given' and πάντα as 'all things' to preserve
    both comprehensive scope and ongoing result.
  alternative_readings:
  - '''gave everything'''
  rationale: This avoids flattening the perfect tense and preserves the text's strong
    claim about the Son's entrusted authority, without importing later doctrinal formulations
    not stated in the verse.
  doctrine_reference: Translation philosophy §1, §3, §5
