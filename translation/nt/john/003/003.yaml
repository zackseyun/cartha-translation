theological_decisions:
- issue: Meaning of ἄνωθεν in Jesus' statement
  chosen_reading: from above
  alternative_readings:
  - again
  - anew
  rationale: The adverb is genuinely ambiguous, and John's Gospel often uses language
    with layered meaning. The immediate Johannine context (especially 3:31; also the
    heavenly origin theme) favors 'from above' in the main text, while Nicodemus's
    misunderstanding in v. 4 shows that 'again' is also heard in the conversation.
    Following the translation philosophy to preserve theological tension rather than
    flatten it, the alternative is retained in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
