id: JHN.3.3
reference: John 3:3
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Ἀμὴν ἀμὴν λέγω σοι, ἐὰν μή τις γεννηθῇ ἄνωθεν,
    οὐ δύναται ἰδεῖν τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: Jesus answered and said to him, “Truly, truly, I say to you, unless someone
    is born from above,[a] he is not able to see the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: '[a]'
    text: Or 'again.' The Greek adverb can mean both 'from above' and 'again'; the
      dialogue in the following verse turns on this double meaning.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding; 'answered' is the most direct
    and common rendering in Johannine dialogue.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Natural English pairing with 'answered'; preserves the two-verb Greek
    construction without unnecessary expansion.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula in understandable modern English.
    'Amen, amen' is more formally transparent but less immediately clear to many readers.
- source_word: ἐὰν μή τις
  chosen: unless someone
  alternatives:
  - unless anyone
  - unless a person
  lexicon: BDAG
  rationale: Conveys the indefinite/generic force naturally in English without over-specifying
    gender.
- source_word: γεννηθῇ
  chosen: is born
  alternatives:
  - is begotten
  - is born again
  lexicon: BDAG
  rationale: The passive of γεννάω here is best rendered 'is born.' 'Begotten' is
    unnatural in this context, and 'born again' imports an interpretation of ἄνωθεν
    rather than translating the verb itself.
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - again
  - anew
  lexicon: BDAG
  rationale: In John, ἄνωθεν commonly carries the sense 'from above,' and the immediate
    context develops a heavenly/earthly contrast. Because the term can also mean 'again,'
    that alternative is preserved in a footnote rather than resolved out of view.
- source_word: οὐ δύναται
  chosen: is not able to
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: A slightly more formal rendering that closely reflects the Greek expression
    of inability. 'Cannot' is possible but less transparent for auditability.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to perceive
  - to experience
  lexicon: BDAG
  rationale: '''See'' is the direct lexical equivalent and preserves Johannine ambiguity
    between literal sight and perceptive participation.'
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering of βασιλεία that preserves both realm
    and reign connotations without narrowing the sense.
