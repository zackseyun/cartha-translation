id: JHN.3.21
reference: John 3:21
source:
  edition: SBLGNT
  text: ὁ δὲ ποιῶν τὴν ἀλήθειαν ἔρχεται πρὸς τὸ φῶς, ἵνα φανερωθῇ αὐτοῦ τὰ ἔργα ὅτι
    ἐν θεῷ ἐστιν εἰργασμένα.
translation:
  text: But the one who does the truth comes to the light, so that his works may be
    revealed, that they have been done in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'practices the truth' or 'does what is true.' The Greek expression is
      literally 'does the truth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because they have been done in God.' The conjunction can be taken as
      introducing either the content of what is revealed or the reason for it.
    reason: alternative_reading
  - marker: c
    text: '''In God'' may also be understood as ''by God'' or ''through God,'' but
      the Greek wording is left more open.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ποιῶν
  chosen: But the one who does
  alternatives:
  - But whoever does
  - But he who practices
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a person characterized by this action. 'The one who does' preserves the Greek
    structure and ongoing characteristic sense. 'But' reflects δέ as a mild contrast
    with the previous verse.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  alternatives:
  - what is true
  - truth
  lexicon: BDAG
  rationale: The phrase ποιεῖν τὴν ἀλήθειαν is idiomatic but should be kept transparently
    as 'does the truth' rather than paraphrased away. In Johannine usage, 'truth'
    carries moral and revelatory force, not merely factual correctness.
- source_word: ἔρχεται πρὸς τὸ φῶς
  chosen: comes to the light
  alternatives:
  - comes into the light
  - comes toward the light
  lexicon: BDAG
  rationale: πρὸς with motion naturally gives 'to/toward.' 'Comes to the light' is
    idiomatic English and preserves the metaphor of approaching divine revelation.
    'Into the light' is possible interpretively, but 'to' stays closer to the preposition.
- source_word: ἵνα φανερωθῇ
  chosen: so that ... may be revealed
  alternatives:
  - in order that ... may be made visible
  - so that ... may be shown
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and the aorist passive subjunctive φανερωθῇ is
    well rendered 'may be revealed.' This preserves both the purpose nuance and the
    passive voice.
- source_word: αὐτοῦ τὰ ἔργα
  chosen: his works
  alternatives:
  - his deeds
  - the works he has done
  lexicon: BDAG
  rationale: ἔργα in John commonly denotes deeds/works. 'Works' preserves the lexical
    connection and avoids overinterpreting moral valence, which the context itself
    supplies.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  - namely that
  lexicon: BDAG
  rationale: 'Here ὅτι most naturally introduces the content of what is revealed:
    namely, that his works have been done in God. ''Because'' is possible, but ''that''
    better fits the flow after ''may be revealed'' and avoids collapsing content into
    cause.'
- source_word: ἐν θεῷ
  chosen: in God
  alternatives:
  - by God
  - through God
  - in union with God
  lexicon: BDAG
  rationale: ἐν with the dative is retained as 'in God' rather than interpreted instrumentally.
    This preserves the Johannine theological expression and avoids importing a narrower
    doctrinal explanation. The phrase indicates that the works are wrought in relation
    to God, under his sphere or agency, while leaving the precise nuance open.
- source_word: ἐστιν εἰργασμένα
  chosen: have been done
  alternatives:
  - have been worked
  - have been accomplished
  lexicon: BDAG
  rationale: The periphrastic perfect passive emphasizes a completed state with abiding
    significance. 'Have been done' is natural English and preserves the passive/resultative
    sense better than a simple past.
