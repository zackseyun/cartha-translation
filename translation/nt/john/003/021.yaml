theological_decisions:
- issue: Meaning of the idiom ποιῶν τὴν ἀλήθειαν
  chosen_reading: Rendered literally as 'does the truth' rather than interpretive
    paraphrase.
  alternative_readings:
  - practices the truth
  - lives by the truth
  - does what is true
  rationale: 'The idiom is unusual in English, but preserving it maintains Johannine
    theological texture: truth is not merely believed but enacted. A more dynamic
    paraphrase would narrow the semantic range and reduce auditability.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Nuance of ἐν θεῷ
  chosen_reading: Rendered as 'in God' in the main text, without specifying instrumentality
    or mystical union.
  alternative_readings:
  - by God
  - through God
  - in union with God
  rationale: The phrase is theologically rich and somewhat open-ended. Translating
    it more explicitly would resolve ambiguity the Greek leaves intact. 'In God' preserves
    the tension between divine agency, sphere, and relationship.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
