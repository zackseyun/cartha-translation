theological_decisions:
- issue: Meaning of σάρξ in the first clause
  chosen_reading: flesh as human/natural sphere rather than explicitly 'sinful nature'
  alternative_readings:
  - sinful nature
  rationale: Although σάρξ can carry an ethical sense in some contexts, here Jesus
    is contrasting natural birth with birth from the Spirit. Rendering it 'sinful
    nature' would import a narrower theological interpretation than the immediate
    context requires. This preserves the text's tension and aligns with the doctrine
    note on context-dependent rendering of σάρξ.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; Translation philosophy
    #3'
- issue: Referent of πνεῦμα in the second clause predicate
  chosen_reading: lowercase 'spirit' in 'is spirit'
  alternative_readings:
  - is Spirit
  - is spiritual
  rationale: 'The source text lacks the article in the predicate nominative, which
    naturally suggests a qualitative sense: what is born from the Spirit is of a spiritual
    kind. Lowercase ''spirit'' preserves that qualitative force without collapsing
    the distinction between the Holy Spirit as source and the resulting nature of
    the one born. ''Spiritual'' is interpretive and less formally tied to the Greek
    noun.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
