id: JHN.3.6
reference: John 3:6
source:
  edition: SBLGNT
  text: τὸ γεγεννημένον ἐκ τῆς σαρκὸς σάρξ ἐστιν, καὶ τὸ γεγεννημένον ἐκ τοῦ πνεύματος
    πνεῦμά ἐστιν.
translation:
  text: What is born of the flesh is flesh, and what is born of the Spirit is spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What is born of the flesh is human nature'; the Greek word 'flesh'
      can, in some contexts, carry the sense of fallen or sinful human nature, but
      here the contrast is primarily with birth from the Spirit.
    reason: lexical_alternative
  - marker: b
    text: Or, 'what is born of the Spirit is spiritual.' The Greek reads 'is spirit,'
      preserving a qualitative contrast with 'flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ γεγεννημένον
  chosen: what is born
  alternatives:
  - the one having been born
  - that which has been born
  lexicon: BDAG
  rationale: The neuter singular article with perfect passive participle is generic
    rather than referring to a specific person. 'What is born' gives natural English
    while preserving the gnomic, categorical force of the construction.
- source_word: ἐκ
  chosen: of
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: In this birth/origin context, 'of' is idiomatic in English ('born of')
    and conveys source/origin without awkwardness. 'From' is possible but less natural
    here.
- source_word: σάρξ / σαρκὸς
  chosen: flesh
  alternatives:
  - human nature
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' when literal and 'sinful
    nature' when metaphorical. Here the contrast is between natural human birth and
    birth from the Spirit, so 'flesh' best preserves the Johannine wording and theological
    tension without over-interpreting it as specifically moral depravity.
- source_word: πνεύματος / πνεῦμά
  chosen: Spirit / spirit
  alternatives:
  - wind
  - spirit
  lexicon: BDAG
  rationale: The first occurrence with the article in this immediate context refers
    to the Holy Spirit, so it is capitalized as 'Spirit.' The predicate nominative
    describes the nature/result of that birth, and 'spirit' in lowercase best preserves
    the Greek anarthrous form and the qualitative contrast with 'flesh' without forcing
    a more interpretive rendering such as 'spiritual.'
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula retained to preserve the aphoristic, definitional structure
    of the verse.
