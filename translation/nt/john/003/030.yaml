theological_decisions:
- issue: Nature of the necessity expressed by δεῖ
  chosen_reading: A statement of divinely fitting and necessary ordering in salvation
    history, rendered simply as 'must' without over-specifying the kind of necessity.
  alternative_readings:
  - Mere pragmatic necessity
  - Explicit divine decree
  rationale: The verse presents John's acknowledgment that Jesus' prominence must
    rise while his own must wane. The Greek δεῖ often carries a sense of divine necessity,
    but the text does not explicitly define the mechanism. Rendering it as 'must'
    preserves the theological weight without importing a more detailed doctrinal claim
    than the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
