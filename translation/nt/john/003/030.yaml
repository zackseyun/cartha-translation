id: JHN.3.30
reference: John 3:30
source:
  edition: SBLGNT
  text: ἐκεῖνον δεῖ αὐξάνειν, ἐμὲ δὲ ἐλαττοῦσθαι.
translation:
  text: He must increase, but I must decrease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'That one must increase, but I must become less.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνον
  chosen: He
  alternatives:
  - That one
  - That man
  - Him
  lexicon: BDAG
  rationale: 'The accusative demonstrative functions as the subject of the infinitive
    with δεῖ. In idiomatic English, a nominative pronoun is required: ''He.'' Capitalization
    reflects the referent Jesus in context, not a distinct lexical feature of the
    Greek. ''That one'' is more wooden and less natural here.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is fitting
  lexicon: BDAG
  rationale: δεῖ expresses necessity or inevitability. 'Must' is concise, natural,
    and preserves the force of necessity better than the more impersonal 'it is necessary'
    in this English sentence.
- source_word: αὐξάνειν
  chosen: increase
  alternatives:
  - grow
  - become greater
  lexicon: BDAG
  rationale: The present infinitive denotes ongoing increase. 'Increase' preserves
    the broad sense without specifying numerical growth only; it can include prominence
    and influence, fitting the context of John the Baptist's statement about Jesus.
- source_word: ἐμὲ
  chosen: I
  alternatives:
  - me
  lexicon: BDAG
  rationale: As with ἐκεῖνον, the accusative pronoun is the logical subject of the
    infinitive and must be rendered as nominative English 'I' in idiomatic translation.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - while
  lexicon: BDAG
  rationale: δὲ marks contrast here between Jesus' increase and John's decrease. 'But'
    best conveys the adversative force in natural English.
- source_word: ἐλαττοῦσθαι
  chosen: decrease
  alternatives:
  - become less
  - diminish
  lexicon: BDAG
  rationale: The present middle/passive infinitive here conveys becoming less or diminishing.
    'Decrease' matches the parallelism with 'increase' and preserves the concise,
    proverbial force of the Greek.
