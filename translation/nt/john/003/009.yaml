id: JHN.3.9
reference: John 3:9
source:
  edition: SBLGNT
  text: ἀπεκρίθη Νικόδημος καὶ εἶπεν αὐτῷ· Πῶς δύναται ταῦτα γενέσθαι;
translation:
  text: Nicodemus answered and said to him, “How can these things happen?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How can these things be?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι commonly functions as 'answered'
    in dialogue narrative. 'Answered' preserves the conventional discourse function
    without unnecessary expansion.
- source_word: Νικόδημος
  chosen: Nicodemus
  rationale: Personal name is transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - said to Jesus
  - told him
  lexicon: BDAG
  rationale: The Greek explicitly has 'said to him'; retaining the pronoun reflects
    the text as given without importing the explicit name 'Jesus.' 'Told him' is less
    direct and slightly more interpretive.
- source_word: Πῶς
  chosen: How
  lexicon: BDAG
  rationale: Standard interrogative adverb meaning 'how,' introducing Nicodemus's
    question about manner or possibility.
- source_word: δύναται
  chosen: can
  alternatives:
  - is able to
  lexicon: BDAG
  rationale: Present middle/passive deponent of δύναμαι expresses ability/possibility.
    'Can' is natural modern English and adequately conveys the modal force.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - such things
  lexicon: BDAG
  rationale: Neuter plural demonstrative points back to the matters Jesus has just
    described. 'These things' preserves the plural and discourse linkage better than
    singular 'this.'
- source_word: γενέσθαι
  chosen: happen
  alternatives:
  - be
  - come to be
  - take place
  lexicon: BDAG
  rationale: Aorist infinitive of γίνομαι here concerns how the realities Jesus described
    can occur. 'Happen' is idiomatic in English for this construction ('How can these
    things happen?') while still reflecting the eventive sense. 'Come to be' is more
    literal but less natural; 'be' is too flat.
