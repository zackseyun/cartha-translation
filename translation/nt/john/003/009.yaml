theological_decisions:
- issue: Rendering Nicodemus's question about the new birth and heavenly realities
  chosen_reading: How can these things happen?
  alternative_readings:
  - How can these things be?
  - How can these things come to be?
  rationale: The verse itself contains no doctrinally contested term, but γίνομαι
    here can be rendered more formally as 'be' or 'come to be.' 'Happen' best balances
    natural English with the sense of occurrence or coming about, without resolving
    the broader theological mystery Jesus has presented.
  doctrine_reference: Translation philosophy §3, §6
