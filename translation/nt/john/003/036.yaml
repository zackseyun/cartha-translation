id: JHN.3.36
reference: John 3:36
source:
  edition: SBLGNT
  text: ὁ πιστεύων εἰς τὸν υἱὸν ἔχει ζωὴν αἰώνιον· ὁ δὲ ἀπειθῶν τῷ υἱῷ οὐκ ὄψεται
    ζωήν, ἀλλ’ ἡ ὀργὴ τοῦ θεοῦ μένει ἐπ’ αὐτόν.
translation:
  text: The one who believes in the Son has eternal life; but the one who disobeys
    the Son will not see life, but the wrath of God remains on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who refuses to believe the Son.' The Greek verb can carry the
      sense of refusing belief as well as disobeying.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - whoever believes
  - the believing one
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally; rendered as
    a generic singular personal expression. 'Believes' preserves the verbal force
    better than a nominalized form.
- source_word: εἰς τὸν υἱόν
  chosen: in the Son
  alternatives:
  - into the Son
  - on the Son
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly expresses personal trust directed toward someone.
    'In the Son' is standard, natural English and preserves the relational sense.
- source_word: τὸν υἱόν / τῷ υἱῷ
  chosen: the Son
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: The Greek has the title with the article, not an explicit possessive.
    'The Son' preserves Johannine christological title usage without adding words.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Present indicative denotes present possession, not merely future expectation.
    'Has' is direct and idiomatic.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: Established and accurate rendering in Johannine usage. 'Life of the age'
    is overly wooden in English; 'eternal life' captures both duration and eschatological
    quality in context.
- source_word: ὁ δὲ ἀπειθῶν
  chosen: the one who disobeys
  alternatives:
  - the one who refuses to believe
  - the one who is disobedient
  - the one who rejects
  lexicon: BDAG
  rationale: ἀπειθέω can denote disobedience and, in some contexts, refusal to believe.
    Here the contrast with πιστεύων suggests unbelief is in view, but the lexical
    sense includes disobedience to the Son. Main text keeps the stronger, broader
    sense 'disobeys'; an alternative is preserved in a footnote.
- source_word: οὐκ ὄψεται ζωήν
  chosen: will not see life
  alternatives:
  - will never experience life
  - will not have life
  lexicon: BDAG
  rationale: Future middle of ὁράω is idiomatically 'see' in Greek; retaining 'see
    life' preserves the Johannine expression and avoids flattening it into mere possession
    language.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  chosen: the wrath of God
  alternatives:
  - God's wrath
  lexicon: BDAG
  rationale: A transparent genitival construction. 'Wrath' is the standard lexical
    equivalent and should not be softened, since the text states divine judgment plainly.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine verb often rendered 'remain' or 'abide.' 'Remains'
    is clear modern English and preserves the continuing state.
- source_word: ἐπ’ αὐτόν
  chosen: on him
  alternatives:
  - upon him
  - over him
  lexicon: BDAG
  rationale: ἐπί with accusative here indicates the wrath resting upon the person.
    'On him' is the most natural concise rendering. The masculine singular reflects
    the Greek generic singular; it is not restricted to males.
