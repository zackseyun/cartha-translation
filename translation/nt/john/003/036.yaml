theological_decisions:
- issue: Meaning of ἀπειθῶν in contrast with πιστεύων
  chosen_reading: Rendered as 'the one who disobeys' in the main text, with 'refuses
    to believe' preserved in a footnote.
  alternative_readings:
  - the one who refuses to believe
  - the unbelieving one
  rationale: The verse contrasts believing with ἀπειθέω, and Johannine theology closely
    links unbelief and disobedience. To avoid collapsing the term into mere cognitive
    unbelief, the main text preserves the broader lexical force 'disobeys,' while
    the footnote records the interpretive alternative 'refuses to believe.' This preserves
    theological tension rather than resolving it too narrowly.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; document contested interpretive choices.'
- issue: Temporal force of eternal life and wrath
  chosen_reading: Present possession of eternal life and present continuance of God's
    wrath are both retained.
  alternative_readings:
  - future-only eternal life
  - future-only wrath
  rationale: Both ἔχει and μένει are present indicatives. The verse presents realized
    and ongoing states in the present, even while 'will not see life' points forward.
    The translation preserves this tension without harmonizing it into a purely future
    scheme.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological
    tension rather than resolve it.'
