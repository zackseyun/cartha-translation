id: JHN.3.25
reference: John 3:25
source:
  edition: SBLGNT
  text: Ἐγένετο οὖν ζήτησις ἐκ τῶν μαθητῶν Ἰωάννου μετὰ Ἰουδαίου περὶ καθαρισμοῦ.
translation:
  text: Then a dispute arose between John's disciples and a Jew about purification.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about cleansing' or 'about ceremonial purification.' The Greek term
      can refer generally to cleansing, and in this context likely carries ritual
      overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: arose
  alternatives:
  - happened
  - came about
  - there was
  lexicon: BDAG
  rationale: γίνομαι here introduces the occurrence of an event. 'Arose' is idiomatic
    English for the emergence of a dispute and is more natural than the wooden 'there
    was,' while still preserving the narrative sense of something coming into being.
- source_word: οὖν
  chosen: Then
  alternatives:
  - therefore
  - so
  - now
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. In this context it functions
    smoothly as a transitional particle in the story, so 'Then' best captures the
    flow without overstating logical force.
- source_word: ζήτησις
  chosen: dispute
  alternatives:
  - discussion
  - debate
  - argument
  - questioning
  lexicon: BDAG
  rationale: ζήτησις can denote discussion or controversy. Given the context of tension
    between groups over ritual matters, 'dispute' better reflects a contentious exchange
    than the milder 'discussion.'
- source_word: ἐκ τῶν μαθητῶν Ἰωάννου
  chosen: between John's disciples
  alternatives:
  - from John's disciples
  - among John's disciples
  lexicon: BDAG
  rationale: Literally the phrase begins 'from the disciples of John,' but in this
    construction with ζήτησις and the following μετὰ phrase, the sense is that the
    dispute involved John's disciples on one side. English idiom requires 'between
    John's disciples and…' rather than a more literal but awkward 'from.'
- source_word: μετὰ Ἰουδαίου
  chosen: and a Jew
  alternatives:
  - with a Jew
  - and a Jewish man
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' In idiomatic English after 'between,'
    this becomes 'and.' Ἰουδαίου is singular, so 'a Jew' preserves the number and
    the likely reference to an individual interlocutor rather than Jews generally.
- source_word: περὶ καθαρισμοῦ
  chosen: about purification
  alternatives:
  - about cleansing
  - concerning ceremonial purification
  lexicon: BDAG
  rationale: καθαρισμός refers to cleansing/purification, often in a ritual or religious
    sense in Johannine context. 'Purification' preserves that broader and likely ritual
    nuance without over-specifying with 'ceremonial' in the main text.
