theological_decisions:
- issue: Whether καθαρισμός should be rendered in explicitly ritual terms
  chosen_reading: purification
  alternative_readings:
  - cleansing
  - ceremonial purification
  rationale: The immediate Johannine context (cf. nearby references to Jewish purification
    practices) suggests ritual/religious cleansing is in view, but the verse itself
    does not explicitly define the exact scope of the dispute. 'Purification' preserves
    the likely ritual sense without importing more detail than the text states.
  doctrine_reference: Translation philosophy §§1, 3, 6
