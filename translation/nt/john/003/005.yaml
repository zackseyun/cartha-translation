theological_decisions:
- issue: Meaning of πνεύματος in the phrase ἐξ ὕδατος καὶ πνεύματος
  chosen_reading: Spirit, referring to the Holy Spirit
  alternative_readings:
  - spirit, referring to a human/spiritual principle
  rationale: Within John's context and the broader biblical background, the phrase
    most naturally points to birth effected by water and the Holy Spirit. Capitalization
    in English signals this likely referent. At the same time, because the Greek noun
    is anarthrous and interpretation is discussed, the lower-case alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Referent of 'water and Spirit'
  chosen_reading: A unified expression for the cleansing and renewing birth required
    for entry into God's kingdom
  alternative_readings:
  - water as physical birth and Spirit as spiritual birth
  - water as Christian baptism specifically
  rationale: The translation itself stays close to the Greek and does not encode a
    denominationally specific sacramental reading. The wording 'of water and Spirit'
    preserves the text's imagery without deciding between all interpretive models
    in the main text.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Greek unambiguously supports one reading over another
