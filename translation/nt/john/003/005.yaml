id: JHN.3.5
reference: John 3:5
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη Ἰησοῦς· Ἀμὴν ἀμὴν λέγω σοι, ἐὰν μή τις γεννηθῇ ἐξ ὕδατος καὶ πνεύματος,
    οὐ δύναται εἰσελθεῖν εἰς τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: Jesus answered, “Truly, truly, I say to you, unless someone is born of water
    and Spirit, he is not able to enter the kingdom of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'water and spirit.' The Greek can be read with a lower-case 'spirit,'
      though 'Spirit' is likely here.
    reason: alternative_reading
  - marker: b
    text: '''Of water and Spirit'' has been understood in different ways, including
      as imagery of cleansing and renewal, as a reference to physical birth and spiritual
      birth, or as a reference to baptism. The translation preserves the Greek wording
      without deciding the interpretive question in the main text.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; 'answered'
    is idiomatic and preserves the responsive force.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Keeps the emphatic doubled formula while using natural English. 'Amen,
    amen' is more formal/transliterated, but 'Truly, truly' better communicates sense
    to modern readers.
- source_word: λέγω σοι
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the directness and solemnity
    of the Greek formula.
- source_word: ἐὰν μή τις
  chosen: unless someone
  alternatives:
  - unless anyone
  - unless a man
  lexicon: BDAG
  rationale: Conveys the indefinite generic force without importing male specificity.
    'Someone' is natural English for the representative singular.
- source_word: γεννηθῇ
  chosen: is born
  alternatives:
  - is begotten
  - is born again
  - is born from above
  lexicon: BDAG
  rationale: The verb γεννάω here means 'be born/be begotten.' In this verse the adverb/anōthen
    from v.3 is absent, so 'again' or 'from above' should not be imported into v.5.
    'Is born' preserves the passive and the immediate wording of the verse.
- source_word: ἐξ ὕδατος
  chosen: of water
  alternatives:
  - from water
  lexicon: BDAG
  rationale: English idiom with 'born' commonly takes 'of'; this preserves the genitival/prepositional
    relation naturally.
- source_word: καὶ πνεύματος
  chosen: and Spirit
  alternatives:
  - and the Spirit
  - and spirit
  lexicon: BDAG
  rationale: Rendered as 'Spirit' with capitalization to reflect the likely reference
    to the Holy Spirit in Johannine and broader biblical context, especially given
    the allusion many see to cleansing-and-Spirit renewal themes (e.g., Ezek 36).
    The Greek lacks the article, so 'the Spirit' is possible but not required; 'Spirit'
    is concise and natural.
- source_word: οὐ δύναται
  chosen: is not able
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: A slightly more formal rendering that preserves the explicit language
    of ability/inability in δύναμαι. 'Cannot' is idiomatic but less transparent to
    the underlying wording.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go into
  lexicon: BDAG
  rationale: Standard rendering for εἰσέρχομαι in this context.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering that preserves both the concrete and
    dynamic dimensions of βασιλεία without over-interpreting toward either 'realm'
    or 'reign' alone.
