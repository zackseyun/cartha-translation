theological_decisions:
- issue: First person plural pronouns ('we ... our')
  chosen_reading: Retained as 'we' and 'our' without interpretive narrowing.
  alternative_readings:
  - Jesus referring to himself and his disciples
  - Jesus using a rhetorical plural
  - Jesus speaking of heavenly/divine witness more broadly
  rationale: The Greek plainly uses first person plural forms, but the referent is
    interpretively debated. To preserve the text's theological tension, the translation
    keeps the plural in the main text and avoids resolving who exactly is included.
  doctrine_reference: Preserve theological tension rather than resolve it.
