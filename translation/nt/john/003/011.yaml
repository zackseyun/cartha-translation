id: JHN.3.11
reference: John 3:11
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω σοι ὅτι ὃ οἴδαμεν λαλοῦμεν καὶ ὃ ἑωράκαμεν μαρτυροῦμεν, καὶ
    τὴν μαρτυρίαν ἡμῶν οὐ λαμβάνετε.
translation:
  text: Truly, truly, I tell you, we speak what we know and testify to what we have
    seen, yet you do not receive our testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Amen, amen, I say to you.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'we' and 'our' are left untranslated interpretively; the exact
      group Jesus includes is debated.
    reason: alternative_reading
  - marker: c
    text: Or 'you do not accept our testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula while expressing its force in natural
    English. 'Truly, truly' is transparent and recognizable, avoiding an untranslated
    Hebrew loanword in the main text.
- source_word: λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A natural English rendering of the present speech formula. 'I tell you'
    preserves direct address and solemn assertion without sounding wooden.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of Jesus's statement rather than a causal clause
    in this context.
- source_word: ὃ οἴδαμεν
  chosen: what we know
  alternatives:
  - that which we know
  lexicon: BDAG
  rationale: The neuter relative pronoun is best rendered idiomatically as 'what.'
    This preserves the object of knowledge without over-literal English.
- source_word: λαλοῦμεν
  chosen: we speak
  alternatives:
  - we are speaking
  lexicon: BDAG
  rationale: Simple present fits the gnomic/declarative force here. 'Speak' is slightly
    more direct and idiomatic than a progressive form.
- source_word: ὃ ἑωράκαμεν
  chosen: what we have seen
  alternatives:
  - that which we have seen
  - what we saw
  lexicon: BDAG
  rationale: The perfect tense suggests a past seeing with abiding relevance; English
    present perfect captures this better than simple past.
- source_word: μαρτυροῦμεν
  chosen: testify to
  alternatives:
  - bear witness to
  - testify
  lexicon: BDAG
  rationale: '''Testify to'' clearly conveys witness-bearing in contemporary English.
    ''Bear witness'' is possible but more traditional and less natural for the target
    style.'
- source_word: τὴν μαρτυρίαν ἡμῶν
  chosen: our testimony
  alternatives:
  - our witness
  lexicon: BDAG
  rationale: Maintains lexical connection with μαρτυροῦμεν while using a natural English
    noun. 'Testimony' carries the evidentiary and revelatory sense well in Johannine
    context.
- source_word: οὐ λαμβάνετε
  chosen: you do not receive
  alternatives:
  - you do not accept
  lexicon: BDAG
  rationale: '''Receive'' is a key Johannine term and should be preserved where possible
    for consistency. It conveys more than mere intellectual assent, including refusal
    to welcome or accept the witness.'
- source_word: καὶ ... καὶ
  chosen: and ... yet
  alternatives:
  - and ... and
  - but
  lexicon: BDAG
  rationale: The final καί is formally 'and,' but in context it marks a contrast between
    Jesus's truthful witness and the hearers' refusal. Rendering it as 'yet' communicates
    the discourse force in idiomatic English while staying within optimal equivalence.
