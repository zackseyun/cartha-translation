id: JHN.3.32
reference: John 3:32
source:
  edition: SBLGNT
  text: ⸀ὃ ἑώρακεν καὶ ἤκουσεν τοῦτο μαρτυρεῖ, καὶ τὴν μαρτυρίαν αὐτοῦ οὐδεὶς λαμβάνει.
translation:
  text: What he has seen and heard, this he testifies to, and no one receives his
    testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bears witness to.'
    reason: lexical_alternative
  - marker: b
    text: '''No one receives his testimony'' is a stark generalization; the next verse
      speaks of the one who does receive it.'
    reason: cross_reference
lexical_decisions:
- source_word: ὃ
  chosen: What
  alternatives:
  - That which
  - Whatsoever
  lexicon: BDAG
  rationale: Neuter singular relative pronoun referring to the content of what has
    been seen and heard, not a personal antecedent. 'What' is natural English and
    preserves the content-focused sense.
- source_word: ἑώρακεν
  chosen: he has seen
  alternatives:
  - he saw
  lexicon: BDAG
  rationale: Perfect tense suggests a completed act with continuing relevance; 'has
    seen' better reflects the Greek perfect than simple past.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - has heard
  lexicon: BDAG
  rationale: Aorist paired with the preceding perfect. In English, 'has seen and heard'
    is possible, but rendering the second as simple 'heard' keeps the aspectual distinction
    lightly visible while remaining idiomatic in coordination.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - that
  - these things
  lexicon: BDAG
  rationale: 'Demonstrative points back to the content just mentioned: ''this'' =
    this very thing/content. Singular ''this'' matches the Greek and works idiomatically
    with the resumptive structure.'
- source_word: μαρτυρεῖ
  chosen: he testifies to
  alternatives:
  - he bears witness to
  - he witnesses to
  lexicon: BDAG
  rationale: The Johannine verb often carries legal-witness overtones. 'Testifies
    to' is clear modern English and preserves the sense of giving witness. The added
    preposition 'to' is required by English idiom with an object of content.
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Cognate with μαρτυρεῖ; 'testimony' preserves the forensic/witness nuance
    and maintains lexical coherence in the clause.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: Standard, clear rendering of the universal negation in idiomatic modern
    English.
- source_word: λαμβάνει
  chosen: receives
  alternatives:
  - accepts
  lexicon: BDAG
  rationale: John frequently uses λαμβάνω in the sense of receiving/accepting revelation
    or witness. 'Receives' is the more literal and thematically Johannine choice;
    'accepts' is interpretive and therefore left as an alternative.
