theological_decisions:
- issue: Scope of the universal negation 'no one receives his testimony'
  chosen_reading: Retain the rhetorical/general statement 'no one receives' without
    softening it.
  alternative_readings:
  - Very few receive his testimony
  - No one at all receives his testimony in an absolute sense
  rationale: The Greek states the universal negation starkly. In Johannine style this
    can function rhetorically/generalizing rather than as a mathematically absolute
    claim, especially in light of the next verse speaking of one who has received
    his testimony. The translation should preserve the tension rather than resolve
    it by paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
