theological_decisions:
- issue: Rendering the generic masculine ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Greek uses a grammatically masculine singular with generic force.
    Following the project's gender-accurate policy, the translation retains 'man'
    rather than neutralizing the expression, while understanding it representatively
    rather than exclusively male.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Whether to import 'again' language from John 3:3 into γεννηθῆναι here
  chosen_reading: be born ... a second time
  alternative_readings:
  - be born again
  rationale: This verse contains δεύτερον ('a second time'), which expresses Nicodemus's
    literal interpretation. The translation avoids importing the debated nuance of
    ἄνωθεν from the previous verse into γεννηθῆναι here, preserving the narrative
    tension rather than resolving it.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
