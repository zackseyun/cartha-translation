id: JHN.3.4
reference: John 3:4
source:
  edition: SBLGNT
  text: λέγει πρὸς αὐτὸν ⸀ὁ Νικόδημος· Πῶς δύναται ἄνθρωπος γεννηθῆναι γέρων ὤν; μὴ
    δύναται εἰς τὴν κοιλίαν τῆς μητρὸς αὐτοῦ δεύτερον εἰσελθεῖν καὶ γεννηθῆναι;
translation:
  text: Nicodemus said to him, “How can a man be born when he is old? He cannot enter
    his mother’s womb a second time and be born, can he?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'How can someone be born when they are old?' The Greek says 'a man,'
      using a masculine singular form generically.
    reason: lexical_alternative
  - marker: b
    text: Greek 'a second time'; Nicodemus understands Jesus' words in a literal sense.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει πρὸς αὐτὸν
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense ('says'), John frequently uses the historical
    present in narrative. Rendering it as simple past in English is more natural and
    preserves the narrative function without awkwardness.
- source_word: Νικόδημος
  chosen: Nicodemus
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: Πῶς δύναται
  chosen: How can
  alternatives:
  - How is ... able to
  lexicon: BDAG
  rationale: This is the natural English equivalent for a question of possibility;
    'can' adequately conveys δύναται.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The noun is singular and generic. Per the gender-accurate policy, 'a
    man' best matches the source's representative masculine usage in this context.
- source_word: γεννηθῆναι
  chosen: be born
  alternatives:
  - be begotten
  - be born again
  lexicon: BDAG
  rationale: The passive infinitive of γεννάω here refers to birth. 'Be born' is the
    plain sense. 'Be born again' would import wording from the previous verse's interpretive
    context rather than this clause alone.
- source_word: γέρων ὤν
  chosen: when he is old
  alternatives:
  - being old
  - while he is old
  lexicon: BDAG
  rationale: This participial construction is rendered idiomatically in English as
    a temporal-circumstantial clause.
- source_word: μὴ δύναται
  chosen: He cannot ... can he?
  alternatives:
  - Surely he cannot
  lexicon: BDAG
  rationale: μή introduces a question expecting a negative answer. English commonly
    conveys this with a negative statement plus tag question, preserving Nicodemus's
    incredulity.
- source_word: κοιλίαν
  chosen: womb
  alternatives:
  - belly
  - uterus
  lexicon: BDAG
  rationale: In context with 'mother,' κοιλία clearly refers to the womb rather than
    the abdomen generally. 'Womb' is the natural and precise English term.
- source_word: δεύτερον
  chosen: a second time
  alternatives:
  - again
  lexicon: BDAG
  rationale: δεύτερον explicitly means 'a second time.' This wording preserves Nicodemus's
    literal misunderstanding more clearly than the broader English 'again.'
- source_word: εἰσελθεῖν καὶ γεννηθῆναι
  chosen: enter ... and be born
  alternatives:
  - go in ... and be born
  lexicon: BDAG
  rationale: The paired infinitives are kept explicit in English to preserve the vividness
    and logic of Nicodemus's question.
