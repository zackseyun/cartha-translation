theological_decisions:
- issue: Rendering βαπτίζω
  chosen_reading: baptizing / being baptized
  alternative_readings:
  - immersing / being immersed
  rationale: The Greek verb can denote immersion-related washing, but in New Testament
    contexts it functions as a recognized religious term. Using 'baptize' preserves
    lexical continuity and avoids importing a denominational conclusion about mode
    into the main text; the more explicit alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: do not advocate a denominational distinctive
    unless the Greek unambiguously supports one reading over another.'
