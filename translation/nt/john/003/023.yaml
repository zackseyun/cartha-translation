id: JHN.3.23
reference: John 3:23
source:
  edition: SBLGNT
  text: ἦν δὲ καὶ ⸀ὁ Ἰωάννης βαπτίζων ἐν Αἰνὼν ἐγγὺς τοῦ Σαλείμ, ὅτι ὕδατα πολλὰ ἦν
    ἐκεῖ, καὶ παρεγίνοντο καὶ ἐβαπτίζοντο·
translation:
  text: Now John also was baptizing at Aenon near Salim, because there was plenty
    of water there, and people were coming and being baptized.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because much water was there'; literally, 'because many waters were
      there.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'baptizing' can also be rendered 'immersing,' but 'baptizing'
      is retained here as the established term and does not by itself settle the question
      of mode.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ καὶ
  chosen: Now ... also was
  alternatives:
  - And ... also was
  - Now ... too was
  lexicon: BDAG
  rationale: δέ is rendered with a mild discourse transition ('Now') rather than a
    strong adversative; καί adds that John, in addition to Jesus' activity in the
    context, was also baptizing.
- source_word: ὁ Ἰωάννης
  chosen: John
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The article with the proper name is natural in Greek and not normally
    represented in English. 'John' is sufficient in context without adding an interpretive
    identifier not present in the Greek.
- source_word: βαπτίζων
  chosen: was baptizing
  alternatives:
  - was immersing
  lexicon: BDAG
  rationale: The present participle with ἦν forms a periphrastic imperfect, indicating
    ongoing action in past time. 'Baptizing' preserves the established transliterated
    Christian term without overcommitting to one mode in the main text.
- source_word: ἐν Αἰνὼν
  chosen: at Aenon
  alternatives:
  - in Aenon
  lexicon: BDAG
  rationale: For a place name indicating location, English idiom prefers 'at' here.
    The name is transliterated, following the policy to transliterate personal and
    place names.
- source_word: ἐγγὺς τοῦ Σαλείμ
  chosen: near Salim
  alternatives:
  - close to Salim
  lexicon: BDAG
  rationale: ἐγγύς with the genitive denotes proximity. 'Near' is the most natural
    concise rendering.
- source_word: ὅτι ὕδατα πολλὰ ἦν ἐκεῖ
  chosen: because there was plenty of water there
  alternatives:
  - because many waters were there
  - because there was much water there
  lexicon: BDAG
  rationale: ὅτι is causal here. Although the Greek is literally 'many waters,' idiomatic
    English expresses the sense as 'plenty of water' or 'much water.' 'Plenty of water'
    communicates the practical reason for baptizing there in readable modern English.
- source_word: παρεγίνοντο
  chosen: were coming
  alternatives:
  - were arriving
  - kept coming
  lexicon: BDAG
  rationale: The imperfect middle indicates repeated or ongoing arrival. 'Were coming'
    captures the durative sense without overtranslation.
- source_word: ἐβαπτίζοντο
  chosen: being baptized
  alternatives:
  - were being baptized
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing/repeated reception of baptism.
    'Being baptized' after 'were coming' yields smooth English while preserving the
    passive sense.
