id: JHN.3.20
reference: John 3:20
source:
  edition: SBLGNT
  text: πᾶς γὰρ ὁ φαῦλα πράσσων μισεῖ τὸ φῶς καὶ οὐκ ἔρχεται πρὸς τὸ φῶς, ἵνα μὴ ἐλεγχθῇ
    τὰ ἔργα αὐτοῦ·
translation:
  text: For everyone who practices evil hates the light and does not come to the light,
    lest his works be exposed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be reproved' or 'be convicted'; the Greek verb can carry the sense of
      exposing wrongdoing, showing guilt, or bringing something to light.
    reason: lexical_alternative
  - marker: b
    text: Greek 'his works' uses a singular masculine form generically for any person
      who practices evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς γὰρ ὁ
  chosen: For everyone who
  alternatives:
  - For whoever
  - For every one who
  lexicon: BDAG
  rationale: πᾶς with the articular participle forms a generic substantive expression,
    referring to every person characterized by the following action. 'For' preserves
    γάρ as explanatory, linking back to the previous statement.
- source_word: φαῦλα
  chosen: evil
  alternatives:
  - worthless things
  - base things
  - bad things
  lexicon: BDAG
  rationale: φαῦλος here has a moral sense in Johannine contrast with 'the light.'
    'Evil' best captures the ethical force in natural English, stronger and more contextually
    fitting than merely 'bad' or 'worthless'.
- source_word: πράσσων
  chosen: practices
  alternatives:
  - does
  - commits
  lexicon: BDAG
  rationale: The present participle denotes characteristic or ongoing conduct. 'Practices'
    conveys habitual action better than the flatter 'does' and avoids the narrower
    legal nuance of 'commits.'
- source_word: μισεῖ
  chosen: hates
  alternatives:
  - detests
  lexicon: BDAG
  rationale: A straightforward rendering of μισέω. 'Hates' preserves the strong volitional
    and moral opposition in the verse.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: In John, 'the light' is a loaded theological metaphor tied to revelation,
    truth, and ultimately the self-disclosure of God in the Son. The literal-metaphorical
    expression should be preserved, not paraphrased.
- source_word: οὐκ ἔρχεται πρὸς τὸ φῶς
  chosen: does not come to the light
  alternatives:
  - does not go to the light
  - does not approach the light
  lexicon: BDAG
  rationale: This preserves Johannine imagery and verbal simplicity. 'Come to the
    light' is idiomatic in English and maintains the metaphorical movement toward
    revelation.
- source_word: ἵνα μὴ
  chosen: lest
  alternatives:
  - so that ... not
  - in order that ... not
  lexicon: BDAG
  rationale: Here ἵνα with μή expresses negative purpose or intended avoidance. 'Lest'
    is concise and natural, preserving the sense of avoidance without awkwardness.
- source_word: ἐλεγχθῇ
  chosen: be exposed
  alternatives:
  - be reproved
  - be convicted
  - be shown to be wrong
  lexicon: BDAG
  rationale: ἐλέγχω can mean expose, convict, or reprove. In this context of light
    revealing deeds, 'be exposed' best fits the imagery and the passive sense of deeds
    being brought into the open.
- source_word: τὰ ἔργα αὐτοῦ
  chosen: his works
  alternatives:
  - his deeds
  - what he does
  lexicon: BDAG
  rationale: ἔργα commonly means deeds/works. 'Works' preserves lexical continuity
    with Johannine usage, while 'his' reflects the singular generic construction in
    Greek. This follows the project's gender-accurate policy for representative masculine
    forms.
