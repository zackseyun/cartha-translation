theological_decisions:
- issue: Representative masculine pronoun in a generic statement
  chosen_reading: his works
  alternative_readings:
  - their works
  rationale: The Greek uses a singular masculine generic construction (ὁ ... πράσσων
    ... αὐτοῦ). Per the translation philosophy's gender-accurate guideline, the English
    retains the singular masculine representative form rather than flattening it to
    plural.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Meaning of ἐλεγχθῇ in relation to the light
  chosen_reading: be exposed
  alternative_readings:
  - be reproved
  - be convicted
  rationale: The verse emphasizes avoidance of revelation by the light rather than
    formal condemnation alone. 'Be exposed' preserves the theological tension of moral
    disclosure without importing a narrower judicial sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
