id: JHN.3.1
reference: John 3:1
source:
  edition: SBLGNT
  text: Ἦν δὲ ἄνθρωπος ἐκ τῶν Φαρισαίων, Νικόδημος ὄνομα αὐτῷ, ἄρχων τῶν Ἰουδαίων·
translation:
  text: Now there was a man from the Pharisees named Nicodemus, a ruler of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a ruler of the Judeans.' The Greek term can refer to Jews generally
      or, in some contexts, more specifically to Judeans/Jewish authorities.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: BDAG
  rationale: δέ is a mild connective that advances the narrative. 'Now' captures the
    discourse transition in natural English better than a bare 'and,' while preserving
    the introductory force of ἦν.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: The noun is singular masculine and refers to a specific male individual,
    so 'a man' is the gender-accurate rendering required by context.
- source_word: ἐκ τῶν Φαρισαίων
  chosen: from the Pharisees
  alternatives:
  - of the Pharisees
  - among the Pharisees
  lexicon: BDAG
  rationale: ἐκ with the genitive here indicates origin or association from within
    the group. 'From the Pharisees' is idiomatic and preserves that Nicodemus belonged
    to that party.
- source_word: Νικόδημος ὄνομα αὐτῷ
  chosen: named Nicodemus
  alternatives:
  - his name was Nicodemus
  - Nicodemus was his name
  lexicon: BDAG
  rationale: This is a standard Semitic/Greek naming expression. 'Named Nicodemus'
    is concise, natural English that preserves the sense without awkward literalism.
- source_word: ἄρχων
  chosen: a ruler
  alternatives:
  - a leader
  - an official
  lexicon: BDAG
  rationale: ἄρχων denotes one who holds a position of authority. 'Ruler' is the most
    direct and traditional equivalent here, fitting the likely reference to a member
    of the Jewish ruling council.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Jewish people
  - of the Judeans
  lexicon: BDAG
  rationale: In John, Ἰουδαῖοι can mean 'Judeans,' 'Jewish authorities,' or 'Jews'
    depending on context. Here it modifies ἄρχων and most naturally refers to Jewish
    leadership rather than geographic Judeans specifically. 'Of the Jews' is the most
    straightforward rendering, while the narrower nuance is preserved in a footnote.
