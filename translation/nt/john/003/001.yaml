theological_decisions:
- issue: Rendering of Ἰουδαίων in Johannine context
  chosen_reading: of the Jews
  alternative_readings:
  - of the Judeans
  rationale: The term Ἰουδαῖοι in John can carry ethnic, religious, or regional nuance.
    In this verse, because Nicodemus is introduced as a Pharisee and a recognized
    authority within Jewish leadership, 'of the Jews' best reflects the broad communal-religious
    sense without importing a narrower geographic meaning. The alternative 'of the
    Judeans' is preserved in a footnote because Johannine usage is debated and the
    translation philosophy calls for preserving genuine tension where relevant.
  doctrine_reference: Translation philosophy §3; §4
