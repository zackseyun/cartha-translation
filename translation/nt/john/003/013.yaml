theological_decisions:
- issue: Christological force of 'the Son of Man'
  chosen_reading: Render as the recognized title 'the Son of Man' without paraphrasing.
  alternative_readings:
  - the Human One
  rationale: The phrase carries both idiomatic and apocalyptic/title significance
    in Johannine context. Preserving the traditional title maintains the text's theological
    and intertextual tension rather than resolving it into a purely generic expression.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
- issue: Temporal/aspectual implication of ascent/descent language
  chosen_reading: Use 'has ascended' and 'descended' to preserve the verse's claim
    about heavenly origin and unique access without expanding it interpretively.
  alternative_readings:
  - has gone up ... came down
  rationale: The verse makes a strong christological claim about the Son of Man's
    heavenly origin and authority. The translation should preserve that claim while
    avoiding doctrinal elaboration beyond the Greek wording.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
