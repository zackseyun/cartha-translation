id: JHN.3.13
reference: John 3:13
source:
  edition: SBLGNT
  text: καὶ οὐδεὶς ἀναβέβηκεν εἰς τὸν οὐρανὸν εἰ μὴ ὁ ἐκ τοῦ οὐρανοῦ καταβάς, ὁ υἱὸς
    τοῦ ⸀ἀνθρώπου.
translation:
  text: And no one has ascended into heaven except the one who descended from heaven—the
    Son of Man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who came down from heaven.'
    reason: lexical_alternative
  - marker: b
    text: '''The Son of Man'' is Jesus'' characteristic self-designation and echoes
      Daniel 7:13–14.'
    reason: cross_reference
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no man
  lexicon: BDAG
  rationale: Indefinite negative pronoun best rendered idiomatically as 'no one.'
    'No man' would sound archaic and could misleadingly narrow the scope.
- source_word: ἀναβέβηκεν
  chosen: has ascended
  alternatives:
  - has gone up
  - ascended
  lexicon: BDAG
  rationale: Perfect tense indicates a completed action with present relevance. 'Has
    ascended' preserves both the verbal aspect and the elevated register appropriate
    to the heavenward movement.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - to heaven
  lexicon: BDAG
  rationale: εἰς naturally conveys movement into. 'Into heaven' is slightly more precise
    than 'to heaven' and fits the ascent/descent contrast in the verse.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - if not
  - unless
  lexicon: BDAG
  rationale: In this exclusionary construction, 'except' is the most natural English
    equivalent. 'Unless' can work, but 'except' more directly marks the sole exception
    to the preceding negation.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβάς
  chosen: the one who descended from heaven
  alternatives:
  - he who came down from heaven
  - the one who came down out of heaven
  lexicon: BDAG
  rationale: The articular participial phrase functions substantivally. 'The one who
    descended from heaven' preserves the participial force and the lexical parallel
    with 'ascended.' 'Came down' is possible but slightly less formally parallel.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  - the son of man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels and should
    be translated consistently as the title 'the Son of Man.' 'The Human One' is interpretive
    and loses the intertextual resonance with Daniel 7 and Gospel usage.
