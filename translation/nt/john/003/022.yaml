id: JHN.3.22
reference: John 3:22
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἦλθεν ὁ Ἰησοῦς καὶ οἱ μαθηταὶ αὐτοῦ εἰς τὴν Ἰουδαίαν γῆν, καὶ ἐκεῖ
    διέτριβεν μετ’ αὐτῶν καὶ ἐβάπτιζεν.
translation:
  text: After these things, Jesus and his disciples went into the Judean countryside,
    and there he was spending time with them and baptizing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: John 4:2 later clarifies that Jesus himself was not baptizing, but his disciples
      were.
    reason: cross_reference
  - marker: b
    text: Or 'into the land of Judea' or simply 'into Judea.'
    reason: lexical_alternative
  - marker: c
    text: Or 'was staying there with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A fairly formal temporal transition that preserves John's narrative sequencing.
    'After these things' reflects the plural demonstrative and avoids over-smoothing,
    though idiomatic alternatives are possible.
- source_word: ἦλθεν
  chosen: went
  alternatives:
  - came
  lexicon: BDAG
  rationale: Although the verb is literally 'came,' English narrative style commonly
    uses 'went' with an explicit destination ('into the Judean countryside'). This
    better matches the movement from the prior setting without obscuring the aorist
    event.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard, natural English rendering of the possessive construction.
- source_word: εἰς τὴν Ἰουδαίαν γῆν
  chosen: into the Judean countryside
  alternatives:
  - into the land of Judea
  - into Judea
  lexicon: BDAG
  rationale: γῆ can mean 'land,' 'region,' or 'country.' Here 'Judean countryside'
    captures movement from Jerusalem into the broader rural region of Judea and avoids
    the potentially stilted 'land of Judea.' 'Judean' reflects the adjectival Ἰουδαίαν.
- source_word: διέτριβεν
  chosen: was spending time
  alternatives:
  - was staying
  - was remaining there
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. διατρίβω here conveys spending
    some time or staying in a place. 'Was spending time' preserves the durative sense
    and fits the accompanying phrase 'with them.'
- source_word: μετ’ αὐτῶν
  chosen: with them
  lexicon: BDAG
  rationale: Straightforward rendering of the prepositional phrase, referring to his
    disciples.
- source_word: ἐβάπτιζεν
  chosen: baptizing
  alternatives:
  - immersing
  lexicon: BDAG
  rationale: '''Baptizing'' is the standard English rendering of βαπτίζω and best
    preserves the recognized religious act without importing a sectarian mode. The
    imperfect is represented with the periphrastic ''was ... baptizing'' across the
    clause.'
