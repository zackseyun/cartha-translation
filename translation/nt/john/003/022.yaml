theological_decisions:
- issue: Subject of 'baptizing' in relation to John 4:2
  chosen_reading: Retain the grammatical sense that Jesus was baptizing in this verse,
    while recognizing the later clarification that Jesus himself did not personally
    baptize but his disciples did.
  alternative_readings:
  - Translate impersonally or reframe the subject to the disciples in the main text
  rationale: The singular verb naturally takes Jesus as the grammatical subject in
    this sentence. John 4:2 provides a narrative clarification rather than requiring
    alteration of 3:22. The translation therefore preserves the wording of this verse
    and notes the clarification in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
