theological_decisions:
- issue: Rendering the repeated πνεῦμα in a verse built on double meaning
  chosen_reading: Translate the first occurrence as 'wind' and the final occurrence
    as 'Spirit.'
  alternative_readings:
  - Translate both occurrences as 'Spirit'
  - Translate both occurrences as 'wind'
  - Translate the first as 'Spirit' with a footnote 'or wind'
  rationale: The Greek intentionally exploits the semantic range of πνεῦμα. In context,
    the opening image is the wind's blowing and audible sound, while the closing clause
    concerns birth from the Holy Spirit. English cannot preserve the same ambiguity
    in a single repeated word, so the main text must differentiate the senses. A footnote
    preserves the lexical wordplay rather than collapsing it.
  doctrine_reference: Translation philosophy §§1, 3, 5
