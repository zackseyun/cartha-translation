id: JHN.3.8
reference: John 3:8
source:
  edition: SBLGNT
  text: τὸ πνεῦμα ὅπου θέλει πνεῖ, καὶ τὴν φωνὴν αὐτοῦ ἀκούεις, ἀλλ’ οὐκ οἶδας πόθεν
    ἔρχεται καὶ ποῦ ὑπάγει· οὕτως ἐστὶν πᾶς ὁ γεγεννημένος ἐκ τοῦ πνεύματος.
translation:
  text: The wind blows where it wishes, and you hear its sound, but you do not know
    where it comes from and where it goes. So it is with everyone who has been born
    of the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek pneuma can mean either 'wind' or 'spirit.' Jesus uses the same word
      in both halves of the verse, creating a wordplay that English cannot fully reproduce.
    reason: lexical_alternative
  - marker: b
    text: Or 'voice' for 'sound'; the Greek word can mean either, but here it refers
      to the audible effect of the wind.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα (v. 8a)
  chosen: wind
  alternatives:
  - Spirit
  lexicon: BDAG
  rationale: In the first clause, πνεῦμα is paired with πνεῖ ('blows') and with hearing
    its φωνή, which strongly favors the concrete sense 'wind.' This preserves Jesus'
    wordplay with πνεῦμα later in the verse, where the final occurrence clearly means
    'Spirit.' Rendering the first as 'wind' and the last as 'Spirit' best communicates
    the Greek sense in natural English while preserving the analogy.
- source_word: ὅπου θέλει
  chosen: where it wishes
  alternatives:
  - where it wills
  - where it wants
  lexicon: BDAG
  rationale: θέλει denotes volition. 'Wishes' is idiomatic modern English and preserves
    the personified force of the Greek without sounding archaic like 'wills.'
- source_word: πνεῖ
  chosen: blows
  alternatives:
  - breathes
  lexicon: BDAG
  rationale: With πνεῦμα in the sense 'wind,' πνεῖ is most naturally rendered 'blows.'
    'Breathes' would obscure the meteorological image.
- source_word: φωνήν
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: BDAG
  rationale: φωνή can mean 'sound' or 'voice.' Since the referent in the first half
    is wind, 'sound' is the most natural English rendering. 'Voice' is possible and
    preserves the lexical overlap, but in English it would misleadingly personify
    the wind more strongly than the Greek requires.
- source_word: οὐκ οἶδας πόθεν ἔρχεται καὶ ποῦ ὑπάγει
  chosen: you do not know where it comes from and where it goes
  alternatives:
  - you do not know from where it comes and where it is going
  lexicon: BDAG
  rationale: This is a straightforward rendering of the paired adverbs πόθεν/ποῦ and
    verbs ἔρχεται/ὑπάγει. 'Comes from' and 'goes' are natural English equivalents.
- source_word: οὕτως ἐστίν
  chosen: So it is with
  alternatives:
  - Thus is
  - In this way is
  lexicon: BDAG
  rationale: This idiomatic English expression captures the comparative force introducing
    the application of the analogy.
- source_word: πᾶς ὁ γεγεννημένος
  chosen: everyone who has been born
  alternatives:
  - everyone born
  - everyone who is born
  lexicon: BDAG
  rationale: The construction is substantival and generic. 'Everyone who has been
    born' reflects the perfect participle γεγεννημένος, conveying a present state
    resulting from prior birth. It also avoids an unnecessarily masculine English
    form while matching the generic force of πᾶς ὁ.
- source_word: ἐκ τοῦ πνεύματος (v. 8b)
  chosen: of the Spirit
  alternatives:
  - from the Spirit
  lexicon: BDAG
  rationale: Here πνεύματος clearly refers to the Holy Spirit in the new-birth context
    of John 3. 'Of the Spirit' is idiomatic in English and preserves the genitival/prepositional
    relation of ἐκ as source or origin.
