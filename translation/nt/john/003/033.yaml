id: JHN.3.33
reference: John 3:33
source:
  edition: SBLGNT
  text: ὁ λαβὼν αὐτοῦ τὴν μαρτυρίαν ἐσφράγισεν ὅτι ὁ θεὸς ἀληθής ἐστιν.
translation:
  text: Whoever has received his testimony has certified that God is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, "has set his seal to" that God is true.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαβὼν
  chosen: Whoever has received
  alternatives:
  - The one who received
  - He who receives
  lexicon: BDAG
  rationale: The article with aorist participle functions substantivally, referring
    generically to any person who receives. 'Whoever has received' gives natural English
    while preserving the completed aspect relative to the main verb.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - this one's
  - his own
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the immediate antecedent in context,
    namely the one from heaven/Son whose witness is being discussed. English 'his'
    is the straightforward possessive rendering.
- source_word: μαρτυρίαν
  chosen: testimony
  alternatives:
  - witness
  - testimony/witness
  lexicon: BDAG
  rationale: μαρτυρία commonly denotes testimony or witness. 'Testimony' fits the
    object received and the Johannine legal-witness motif, while remaining idiomatic
    in English.
- source_word: ἐσφράγισεν
  chosen: has certified
  alternatives:
  - has set his seal to
  - has confirmed
  lexicon: BDAG
  rationale: Literally the verb means 'seal' or 'set a seal on,' here metaphorically
    indicating formal confirmation or attestation. 'Has certified' communicates the
    metaphor's force in clear modern English. The more literal idiom is preserved
    in a footnote.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what is certified, not a causal clause.
    'That' is the standard and clearest rendering.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - God himself
  lexicon: BDAG
  rationale: The nominative subject with article is definite and straightforwardly
    rendered 'God.' No expansion is warranted.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: In this context the sense is that God is truthful/reliable in his witness.
    'True' is concise, idiomatic, and preserves the broader Johannine resonance of
    truth.
