theological_decisions:
- issue: Metaphorical force of sealing language
  chosen_reading: Render ἐσφράγισεν as 'has certified' in the main text
  alternative_readings:
  - has set his seal to
  - has confirmed
  rationale: The verse speaks of accepting Jesus' testimony as an attestation to God's
    truthfulness. A modern rendering should communicate the metaphor's meaning without
    obscuring it. The literal sealing idiom is important enough to preserve in a footnote.
  doctrine_reference: Translation philosophy §6; §5 documented exception/consistency
