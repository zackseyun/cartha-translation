id: JHN.3.29
reference: John 3:29
source:
  edition: SBLGNT
  text: ὁ ἔχων τὴν νύμφην νυμφίος ἐστίν· ὁ δὲ φίλος τοῦ νυμφίου ὁ ἑστηκὼς καὶ ἀκούων
    αὐτοῦ, χαρᾷ χαίρει διὰ τὴν φωνὴν τοῦ νυμφίου. αὕτη οὖν ἡ χαρὰ ἡ ἐμὴ πεπλήρωται.
translation:
  text: The one who has the bride is the bridegroom. But the friend of the bridegroom,
    who stands and hears him, rejoices greatly because of the bridegroom’s voice.
    Therefore this joy of mine has been made complete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bridegroom’s friend'; culturally, this role may resemble a 'best
      man,' but the Greek expression is literally 'friend of the bridegroom.'
    reason: cultural_note
  - marker: b
    text: Or 'rejoices with joy'—a more literal rendering of the emphatic Greek expression.
    reason: lexical_alternative
  - marker: c
    text: Or 'has been fulfilled.' The Greek can denote being brought to fullness
      or completion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  chosen: The one who has
  alternatives:
  - He who has
  - The man who has
  lexicon: BDAG
  rationale: Articular present participle functioning substantivally; 'the one who
    has' is natural modern English and preserves the generic singular force without
    over-specifying gender beyond the metaphorical male role already supplied by context.
- source_word: νύμφην
  chosen: the bride
  alternatives:
  - wife
  - bride-wife
  lexicon: BDAG
  rationale: In the wedding metaphor, νύμφη is best rendered 'bride,' matching the
    immediate contrast with 'bridegroom.' 'Wife' would weaken the nuptial imagery.
- source_word: νυμφίος
  chosen: the bridegroom
  alternatives:
  - groom
  lexicon: BDAG
  rationale: '''Bridegroom'' preserves the formal wedding imagery and matches the
    repeated noun in the verse. ''Groom'' is possible but slightly less explicit.'
- source_word: φίλος τοῦ νυμφίου
  chosen: the friend of the bridegroom
  alternatives:
  - the bridegroom's friend
  - the best man
  lexicon: BDAG
  rationale: A formally transparent rendering is preferred. Although culturally this
    may approximate a 'best man,' the Greek says 'friend,' so the cultural inference
    is better left to a footnote rather than imported into the main text.
- source_word: ὁ ἑστηκὼς
  chosen: who stands
  alternatives:
  - who has stood
  - standing there
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι conveys a standing/attendant posture with
    present relevance. 'Who stands' is idiomatic and preserves the scene without awkwardness.
- source_word: καὶ ἀκούων αὐτοῦ
  chosen: and hears him
  alternatives:
  - and listens to him
  - and hears his voice
  lexicon: BDAG
  rationale: ἀκούω with genitive pronoun naturally means 'hear him.' Since 'voice'
    appears explicitly later in the clause, adding it here would be redundant and
    less precise.
- source_word: χαρᾷ χαίρει
  chosen: rejoices greatly
  alternatives:
  - rejoices with joy
  - joyfully rejoices
  - rejoices
  lexicon: BDAG
  rationale: The dative noun with cognate verb intensifies the expression. 'Rejoices
    greatly' conveys the emphatic force in natural English better than the wooden
    'rejoices with joy,' while preserving the strong emotional emphasis.
- source_word: διὰ τὴν φωνὴν τοῦ νυμφίου
  chosen: because of the bridegroom’s voice
  alternatives:
  - at the sound of the bridegroom's voice
  - because he hears the bridegroom's voice
  lexicon: BDAG
  rationale: διά with the accusative expresses reason/cause. 'Because of the bridegroom's
    voice' is close to the Greek; 'at the sound of' is a good idiomatic alternative
    preserved in a footnote-worthy lexical note.
- source_word: αὕτη οὖν
  chosen: Therefore this
  alternatives:
  - So this
  - Thus this
  lexicon: BDAG
  rationale: οὖν marks inference/result. 'Therefore' preserves the logical connection
    from the wedding analogy to John's own joy.
- source_word: ἡ χαρὰ ἡ ἐμὴ
  chosen: this joy of mine
  alternatives:
  - my joy
  - this my joy
  lexicon: BDAG
  rationale: The possessive with repeated article is slightly emphatic. 'This joy
    of mine' preserves both the demonstrative and the personal emphasis more fully
    than simply 'my joy.'
- source_word: πεπλήρωται
  chosen: has been made complete
  alternatives:
  - has been fulfilled
  - is complete
  - has reached fullness
  lexicon: BDAG
  rationale: Perfect passive indicates a completed state. In this context of joy reaching
    its intended fullness, 'has been made complete' best captures the resultative
    sense without implying predictive fulfillment.
