theological_decisions:
- issue: Wedding imagery and John the Baptist's self-positioning
  chosen_reading: The verse is rendered to preserve the metaphor of Jesus as bridegroom
    and John as the bridegroom's friend without importing later ecclesiological conclusions
    into the wording.
  alternative_readings:
  - Rendering φίλος τοῦ νυμφίου as 'best man' to foreground cultural role
  - Expanding 'bride' to explicitly identify God's people or the church
  rationale: The text itself uses metaphorical wedding language but does not explicitly
    define the bride here. The translation preserves the imagery and leaves theological
    inferences to interpretation rather than embedding them in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
