id: JHN.3.14
reference: John 3:14
source:
  edition: SBLGNT
  text: καὶ καθὼς Μωϋσῆς ὕψωσεν τὸν ὄφιν ἐν τῇ ἐρήμῳ, οὕτως ὑψωθῆναι δεῖ τὸν υἱὸν
    τοῦ ἀνθρώπου,
translation:
  text: And just as Moses lifted up the serpent in the wilderness, so the Son of Man
    must be lifted up,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be exalted.' The Greek verb can refer both to being physically lifted
      up and to being exalted; John likely intends both senses here.
    reason: lexical_alternative
  - marker: b
    text: See Numbers 21:8–9 for the account of Moses lifting up the serpent in the
      wilderness.
    reason: cross_reference
lexical_decisions:
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - just as indeed
  lexicon: BDAG
  rationale: Introduces a comparison between Moses' action and what must happen to
    the Son of Man. 'Just as' clearly signals the typological parallel in natural
    English.
- source_word: ὕψωσεν
  chosen: lifted up
  alternatives:
  - raised up
  - exalted
  lexicon: BDAG
  rationale: In the Numbers allusion, the verb refers concretely to elevating the
    serpent on a pole. 'Lifted up' preserves the physical sense and also anticipates
    Johannine double meaning with exaltation.
- source_word: ὄφιν
  chosen: serpent
  alternatives:
  - snake
  lexicon: BDAG
  rationale: '''Serpent'' better matches biblical register and the likely allusion
    to Numbers 21, while remaining clear to modern readers.'
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: '''Wilderness'' is the standard biblical rendering and best fits the
    Israel-in-the-wilderness setting of the allusion.'
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Marks the corresponding element in the comparison. 'So' is concise and
    idiomatic in English in the correlative 'just as ... so ...' construction.
- source_word: ὑψωθῆναι
  chosen: be lifted up
  alternatives:
  - be raised up
  - be exalted
  lexicon: BDAG
  rationale: The passive infinitive after δεῖ expresses what must happen to the Son
    of Man. 'Be lifted up' preserves John's intentional ambiguity between physical
    elevation on the cross and exaltation; alternatives are worth preserving in a
    footnote.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is necessary for
  lexicon: BDAG
  rationale: Conveys divine necessity, not mere prediction or possibility. 'Must'
    is the most natural and forceful English equivalent.
- source_word: υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' self-designation with strong Danielic and Johannine resonance.
    'The Son of Man' preserves the established title and its theological depth better
    than more interpretive alternatives.
