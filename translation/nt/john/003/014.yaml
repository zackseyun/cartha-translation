theological_decisions:
- issue: Johannine double meaning of ὑψόω
  chosen_reading: Render both occurrences with 'lifted up' in the main text.
  alternative_readings:
  - raised up
  - exalted
  rationale: The verse intentionally links the physical lifting of the serpent with
    the Son of Man's being lifted up, while also allowing the theological sense of
    exaltation. Using 'lifted up' preserves this tension rather than collapsing it
    into either crucifixion alone or exaltation alone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
