theological_decisions:
- issue: Relationship between 'from above' and 'from heaven' in the verse
  chosen_reading: Render ἄνωθεν as 'from above' and later ἐκ τοῦ οὐρανοῦ as 'from
    heaven,' preserving the rhetorical parallel without collapsing the expressions
    into identical English.
  alternative_readings:
  - Render both as 'from heaven' for explicit consistency
  rationale: The verse uses two related but distinct expressions. Translating ἄνωθεν
    as 'from above' preserves Johannine diction and allows the second clause to sharpen
    the meaning with 'from heaven.' This maintains theological emphasis on Jesus'
    heavenly origin and supremacy without over-interpreting the first term.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of the repeated earthly language
  chosen_reading: Preserve the repetition 'from the earth ... from the earth ... from
    the earth' rather than smoothing it into a single descriptive phrase.
  alternative_readings:
  - Condense to 'the earthly one is earthly and speaks in an earthly way'
  rationale: The Greek repetition is rhetorically significant, underscoring the contrast
    between earthly and heavenly origin. Preserving that tension avoids importing
    a more polished but less transparent interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 5
