id: JHN.3.31
reference: John 3:31
source:
  edition: SBLGNT
  text: Ὁ ἄνωθεν ἐρχόμενος ἐπάνω πάντων ἐστίν. ὁ ὢν ἐκ τῆς γῆς ἐκ τῆς γῆς ἐστιν καὶ
    ἐκ τῆς γῆς λαλεῖ· ὁ ἐκ τοῦ οὐρανοῦ ἐρχόμενος ἐπάνω πάντων ἐστίν·
translation:
  text: The one who comes from above is above all. The one who is from the earth is
    from the earth and speaks from the earth. The one who comes from heaven is above
    all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from heaven' for 'from above' in the first clause; the Greek ἄνωθεν
      denotes origin from above and is clarified by the later phrase 'from heaven.'
    reason: lexical_alternative
  - marker: b
    text: Or 'speaks of the earth.' The Greek more literally repeats 'from the earth,'
      which may indicate source, sphere, or subject matter.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - from heaven
  - again
  lexicon: BDAG
  rationale: In John, ἄνωθεν can mean 'from above' or 'again' (notably 3:3, 3:7),
    but here with ἐρχόμενος it denotes origin rather than repetition. 'From above'
    preserves the vertical/origin contrast with 'from the earth' and anticipates the
    synonymous clause 'from heaven' later in the verse.
- source_word: ἐρχόμενος
  chosen: who comes
  alternatives:
  - coming
  lexicon: BDAG
  rationale: The present participle functions substantivally with the article. 'Who
    comes' is natural English and preserves the ongoing/descriptive force without
    awkwardness.
- source_word: ἐπάνω πάντων
  chosen: above all
  alternatives:
  - over all
  - above everyone
  lexicon: BDAG
  rationale: The phrase expresses supremacy/exaltation. 'Above all' is concise and
    idiomatic, preserving both spatial metaphor and rank. 'Over all' is possible,
    but 'above all' better matches the repeated contrastive structure of the verse.
- source_word: ὁ ὢν ἐκ τῆς γῆς
  chosen: the one who is from the earth
  alternatives:
  - the one who is of the earth
  - the earthly one
  lexicon: BDAG
  rationale: This renders the articular participial construction and keeps the emphasis
    on origin/source. 'Of the earth' is possible, but 'from the earth' aligns with
    the repeated ἐκ phrases and the contrast with heavenly origin.
- source_word: γῆ
  chosen: earth
  alternatives:
  - land
  - ground
  lexicon: BDAG
  rationale: Here γῆ contrasts with heaven/celestial origin, so 'earth' is the appropriate
    cosmic counterpart rather than 'land' or 'ground'.
- source_word: ἐκ τῆς γῆς ἐστιν
  chosen: is from the earth
  alternatives:
  - is of the earth
  lexicon: BDAG
  rationale: The repeated phrase is retained rather than smoothed away, because the
    Greek emphasizes earthly origin and nature. 'From the earth' keeps the verbal
    repetition audible in English.
- source_word: ἐκ τῆς γῆς λαλεῖ
  chosen: speaks from the earth
  alternatives:
  - speaks of the earth
  - speaks from an earthly perspective
  lexicon: BDAG
  rationale: 'A more literal rendering preserves the repeated ἐκ and leaves the precise
    nuance open: his speech arises from earthly origin/sphere. More interpretive options
    like ''from an earthly perspective'' explain rather than translate.'
- source_word: οὐρανός
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In Johannine theological context this refers to the divine/heavenly realm,
    not the physical sky, so 'heaven' is required.
