id: JHN.3.27
reference: John 3:27
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰωάννης καὶ εἶπεν· Οὐ δύναται ἄνθρωπος λαμβάνειν ⸂οὐδὲ ἓν⸃ ἐὰν μὴ
    ᾖ δεδομένον αὐτῷ ἐκ τοῦ οὐρανοῦ.
translation:
  text: John answered and said, “A man is not able to receive even one thing unless
    it has been given to him from heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a person.” The Greek says “a man” (ἄνθρωπος) with a generic, representative
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding. 'Answered' preserves the common
    Johannine style and pairs naturally with the following speech introduction.
- source_word: Ἰωάννης
  chosen: John
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: καὶ εἶπεν
  chosen: and said
  alternatives:
  - and said in response
  - and spoke
  lexicon: BDAG
  rationale: The doublet 'answered and said' reflects a common Semitic/Greek narrative
    formula. It is retained rather than reduced to a single English verb so the source
    structure remains visible.
- source_word: Οὐ δύναται
  chosen: is not able
  alternatives:
  - cannot
  lexicon: BDAG
  rationale: A slightly more formal rendering that preserves the explicit sense of
    ability/inability in δύναμαι. 'Cannot' is idiomatic, but 'is not able' keeps the
    lexical force transparent.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  - a human being
  lexicon: BDAG
  rationale: The noun is singular and generic. Per the gender-accurate philosophy,
    'a man' preserves the representative generic force of the Greek rather than neutralizing
    it. The sense is general, not restricted to males.
- source_word: λαμβάνειν
  chosen: to receive
  alternatives:
  - to take
  lexicon: BDAG
  rationale: In this context the sense is receiving what is granted rather than seizing
    or taking. 'Receive' fits the passive-gift logic of the clause that follows.
- source_word: οὐδὲ ἓν
  chosen: even one thing
  alternatives:
  - anything at all
  - not even one thing
  lexicon: BDAG
  rationale: This expression intensifies the negation. 'Even one thing' preserves
    the emphatic minimality of the Greek while remaining natural English.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - except if
  lexicon: BDAG
  rationale: Standard conditional idiom in English for the Greek exceptive condition.
- source_word: ᾖ δεδομένον
  chosen: it has been given
  alternatives:
  - it is given
  - it should have been given
  lexicon: BDAG
  rationale: Periphrastic perfect passive conveys a state resulting from prior giving.
    'Has been given' best reflects the completed action with present relevance.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to that person
  lexicon: BDAG
  rationale: Dative indirect object rendered straightforwardly. 'Him' matches the
    singular generic 'a man' in the main clause.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  - from God
  lexicon: BDAG
  rationale: In Johannine usage 'heaven' commonly functions as a reverent way of speaking
    of divine source. The translation keeps the literal expression rather than interpreting
    it directly as 'from God.'
