theological_decisions:
- issue: Scope of divine source in John's statement
  chosen_reading: The verse states that any received thing comes only if it has been
    given from heaven, without specifying a full doctrine of determinism or denying
    human agency.
  alternative_readings:
  - A stronger deterministic reading about all human attainments
  - A narrower reading limited only to ministry roles or spiritual authority in the
    immediate context
  rationale: The immediate context concerns John the Baptist's ministry and Jesus'
    rising prominence, so the saying clearly applies to status and role. Yet the wording
    is broad enough to retain the general principle of divine gift. The translation
    preserves that breadth without importing a sectarian theological system.
  doctrine_reference: Preserve theological tension rather than resolve it.
