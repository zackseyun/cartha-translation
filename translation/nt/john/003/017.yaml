theological_decisions:
- issue: Meaning of κρίνῃ in contrast with σωθῇ
  chosen_reading: judge
  alternative_readings:
  - condemn
  rationale: Although many English versions render κρίνῃ here as 'condemn,' the Greek
    verb itself is broader ('judge'). In context, the verse contrasts the Son's mission
    not with every form of judgment in an absolute sense, but with a mission aimed
    at judging the world, over against one aimed at its salvation. Rendering 'judge'
    preserves the lexical meaning and avoids importing a narrower doctrinal conclusion
    into the text. The common interpretive alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
