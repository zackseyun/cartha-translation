id: JHN.3.17
reference: John 3:17
source:
  edition: SBLGNT
  text: οὐ γὰρ ἀπέστειλεν ὁ θεὸς τὸν ⸀υἱὸν εἰς τὸν κόσμον ἵνα κρίνῃ τὸν κόσμον, ἀλλ’
    ἵνα σωθῇ ὁ κόσμος δι’ αὐτοῦ.
translation:
  text: For God did not send the Son into the world so that he might judge the world,
    but so that the world might be saved through him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that he might condemn the world.' The Greek verb can be rendered
      more narrowly in context, but its basic sense is 'judge.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - Indeed ... not
  - Because ... not
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking this verse to the preceding statement;
    'For' preserves the discourse connection naturally in English, while οὐ straightforwardly
    negates the verb.
- source_word: ἀπέστειλεν
  chosen: did not send
  alternatives:
  - did not commission
  - did not dispatch
  lexicon: BDAG
  rationale: ἀποστέλλω commonly means 'send'; this is the natural English equivalent
    and preserves the Johannine theme of the Father sending the Son without over-specifying
    mission nuance.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Definite article with θεός is idiomatically rendered simply 'God' in
    English.
- source_word: τὸν υἱὸν
  chosen: the Son
  alternatives:
  - his Son
  lexicon: BDAG
  rationale: The Greek has 'the Son,' not an explicit possessive. 'The Son' preserves
    the titular force and Johannine style, while the filial relation to God remains
    clear from context.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - to the world
  lexicon: BDAG
  rationale: εἰς with accusative here conveys movement into the sphere of the world;
    'into the world' is the most direct and idiomatic rendering.
- source_word: ἵνα κρίνῃ τὸν κόσμον
  chosen: so that he might judge the world
  alternatives:
  - in order that he might judge the world
  - to condemn the world
  lexicon: BDAG
  rationale: κρίνω has a broader sense of 'judge' rather than only 'condemn.' Since
    the same discourse later distinguishes judgment and condemnation, 'judge' better
    preserves the lexical range and theological nuance. 'Might' reflects the subjunctive
    after ἵνα.
- source_word: ἀλλ’ ἵνα
  chosen: but so that
  alternatives:
  - but in order that
  lexicon: BDAG
  rationale: This marks strong contrast of purpose. 'But so that' is clear modern
    English and preserves the parallel structure with the first ἵνα clause.
- source_word: σωθῇ
  chosen: might be saved
  alternatives:
  - may be saved
  - might be delivered
  lexicon: BDAG
  rationale: Passive aorist subjunctive of σῴζω is best rendered 'might be saved.'
    'Saved' preserves the theological breadth of rescue/salvation central to Johannine
    usage better than the narrower 'delivered.'
- source_word: ὁ κόσμος
  chosen: the world
  lexicon: BDAG
  rationale: κόσμος is consistently rendered 'world' here, preserving the repeated
    term across the verse and the broader Johannine sense of humanity/the created
    order in rebellion, without narrowing it in translation.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  - through his agency
  lexicon: BDAG
  rationale: διά with genitive commonly denotes means or agency; 'through him' is
    idiomatic and preserves the mediatorial sense without over-interpretation.
