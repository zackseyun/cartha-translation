id: JHN.3.7
reference: John 3:7
source:
  edition: SBLGNT
  text: μὴ θαυμάσῃς ὅτι εἶπόν σοι Δεῖ ὑμᾶς γεννηθῆναι ἄνωθεν.
translation:
  text: Do not be amazed that I told you, ‘You must be born from above.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'born again.' The Greek ἄνωθεν can mean 'from above' or 'again/anew.'
    reason: alternative_reading
  - marker: b
    text: The first 'you' is singular ('I told you'), but 'you must be born' is plural
      in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ θαυμάσῃς
  chosen: Do not be amazed
  alternatives:
  - Do not marvel
  - Do not be astonished
  lexicon: BDAG
  rationale: μή with the aorist subjunctive functions as a prohibition. 'Be amazed'
    is natural modern English and preserves the force of θαυμάζω without archaic tone
    ('marvel').
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Here ὅτι introduces the content of what Jesus said, not the cause of
    the amazement, so 'that' best fits the syntax and sense.
- source_word: εἶπόν σοι
  chosen: I told you
  alternatives:
  - I said to you
  lexicon: BDAG
  rationale: λέγω with indirect object σοι can be rendered formally as 'said to you,'
    but 'told you' is idiomatic English and still accurately conveys direct address.
- source_word: Δεῖ
  chosen: must
  alternatives:
  - it is necessary
  lexicon: BDAG
  rationale: Δεῖ expresses necessity or obligation. 'Must' is concise, natural, and
    preserves the strength of the statement.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: The Greek is plural, contrasting with the earlier singular σοι. Standard
    English 'you' can represent the plural in the main text, but the plural nuance
    is significant in context and should be preserved in a footnote.
- source_word: γεννηθῆναι
  chosen: be born
  alternatives:
  - be begotten
  lexicon: BDAG
  rationale: γεννάω in this Johannine context is conventionally and contextually rendered
    'be born.' 'Begotten' would sound unnatural here and could misdirect the sense
    in English.
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - again
  - anew
  lexicon: BDAG
  rationale: ἄνωθεν can mean either 'from above' or 'again/anew.' In John, the adverb
    often carries the sense 'from above,' and this preserves the theological emphasis
    on heavenly origin. Because the ambiguity is genuine and important in the Nicodemus
    discourse, the alternative 'again' is preserved in a footnote rather than erased.
