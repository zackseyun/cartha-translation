theological_decisions:
- issue: Meaning of ἄνωθεν in the new birth saying
  chosen_reading: from above
  alternative_readings:
  - again
  - anew
  rationale: The term is intentionally multivalent in John 3, but the broader Johannine
    usage and the theological emphasis on birth originating from God support 'from
    above' in the main text. In keeping with the translation philosophy, the alternative
    is preserved in a footnote rather than resolved without trace.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
