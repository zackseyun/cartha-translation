theological_decisions:
- issue: Rendering of Χριστός as title
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this context John the Baptist denies being the anointed expected figure;
    the term functions as a title, not a name-like designation. The doctrinal guidance
    specifies 'Messiah' where title is in view, while preserving 'Christ' as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of John's commission in Ἀπεσταλμένος εἰμὶ
  chosen_reading: I have been sent ahead of him
  alternative_readings:
  - I am sent before him
  - I was sent before him
  rationale: The wording should preserve John's subordinate, preparatory role without
    importing more than the Greek states. 'I have been sent ahead of him' reflects
    the completed commissioning with ongoing relevance and the preparatory relation
    to the Messiah.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not import doctrinal claims the text does not make'
