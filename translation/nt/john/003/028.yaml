id: JHN.3.28
reference: John 3:28
source:
  edition: SBLGNT
  text: αὐτοὶ ὑμεῖς ⸀μοι μαρτυρεῖτε ὅτι ⸀εἶπον· Οὐκ εἰμὶ ἐγὼ ὁ χριστός, ἀλλ’ ὅτι Ἀπεσταλμένος
    εἰμὶ ἔμπροσθεν ἐκείνου.
translation:
  text: You yourselves bear me witness that I said, ‘I am not the Messiah, but I have
    been sent ahead of him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.'
    reason: alternative_reading
  - marker: b
    text: Or, 'I am sent before him' or 'I was sent before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ ὑμεῖς
  chosen: You yourselves
  alternatives:
  - You yourselves indeed
  - You yourselves
  lexicon: BDAG
  rationale: The combination is emphatic, highlighting the hearers themselves as witnesses.
    'You yourselves' preserves the emphasis naturally in English without adding unnecessary
    particles.
- source_word: μοι
  chosen: me
  alternatives:
  - for me
  - to me
  lexicon: BDAG
  rationale: 'With μαρτυρεῖτε, the dative most naturally indicates the person to whom
    testimony is borne: ''bear me witness'' / ''testify for me.'' ''Me'' is concise
    and idiomatic in the construction chosen.'
- source_word: μαρτυρεῖτε
  chosen: bear ... witness
  alternatives:
  - testify
  - are witnesses
  lexicon: BDAG
  rationale: '''Bear witness'' preserves the Johannine legal-testimonial nuance better
    than the flatter ''testify,'' while remaining understandable in modern English.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of their witness in straightforward reported speech.
- source_word: εἶπον
  chosen: I said
  alternatives:
  - I have said
  lexicon: BDAG
  rationale: The aorist is best rendered as a simple past here, referring to John's
    prior explicit statement.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός as a title is translated 'Messiah' rather
    than transliterated 'Christ,' preserving the title's meaning in context.
- source_word: ἀλλ’ ὅτι
  chosen: but
  alternatives:
  - but rather that
  lexicon: BDAG
  rationale: 'The contrast is between two content clauses: not being the Messiah,
    but being sent before him. English can express this naturally with ''but'' without
    repeating ''that'' in the main text.'
- source_word: Ἀπεσταλμένος εἰμὶ
  chosen: I have been sent
  alternatives:
  - I am sent
  - I was sent
  lexicon: BDAG
  rationale: The periphrastic perfect/passive-like construction presents John's commissioned
    status as a present reality resulting from prior sending. 'I have been sent' best
    captures that force in natural English.
- source_word: ἔμπροσθεν ἐκείνου
  chosen: ahead of him
  alternatives:
  - before him
  - in front of him
  lexicon: BDAG
  rationale: '''Ahead of him'' communicates priority/preparatory mission clearly in
    modern English. ''Before him'' is possible but can sound ambiguous between temporal
    and honorific senses; here the idea is being sent in advance of the one to come.'
