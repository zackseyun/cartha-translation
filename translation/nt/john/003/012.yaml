theological_decisions:
- issue: Meaning of the contrast between 'earthly things' and 'heavenly things'
  chosen_reading: Render the contrast straightforwardly without specifying whether
    'earthly things' means earthly analogies or matters occurring on earth, and without
    defining 'heavenly things' beyond the text.
  alternative_readings:
  - '''earthly things'' as illustrations drawn from earthly experience'
  - '''earthly things'' as truths concerning events on earth'
  - '''heavenly things'' as deeper divine mysteries'
  rationale: The verse contrasts two categories of revelation, but the text itself
    does not force a narrower interpretive explanation. Preserving the broad wording
    maintains the theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
