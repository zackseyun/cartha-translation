id: JHN.3.12
reference: John 3:12
source:
  edition: SBLGNT
  text: εἰ τὰ ἐπίγεια εἶπον ὑμῖν καὶ οὐ πιστεύετε, πῶς ἐὰν εἴπω ὑμῖν τὰ ἐπουράνια
    πιστεύσετε;
translation:
  text: If I told you about earthly things and you do not believe, how will you believe
    if I tell you about heavenly things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'things on earth' for 'earthly things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'things in heaven' for 'heavenly things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἐπίγεια
  chosen: earthly things
  alternatives:
  - things on earth
  - earthly matters
  lexicon: BDAG
  rationale: The neuter plural adjective functions substantivally. 'Earthly things'
    is the most natural English equivalent and preserves the contrast with τὰ ἐπουράνια.
    'Things on earth' is possible but less idiomatic here.
- source_word: εἶπον
  chosen: I told
  alternatives:
  - I said
  - I spoke
  lexicon: BDAG
  rationale: Aorist indicative of λέγω referring to Jesus' prior speech. 'I told'
    fits the indirect-object construction with ὑμῖν and reads naturally in English.
- source_word: πιστεύετε
  chosen: you do not believe
  alternatives:
  - you are not believing
  - you do not trust
  lexicon: BDAG
  rationale: 'Present indicative with οὐ is best rendered as a present-state/general
    response: ''you do not believe.'' Although πιστεύω can include trust, ''believe''
    is the standard rendering here and matches the immediate Johannine usage.'
- source_word: πῶς
  chosen: how will you believe
  alternatives:
  - how can you believe
  - how would you believe
  lexicon: BDAG
  rationale: Introduces a rhetorical question about the likelihood of belief. With
    the future πιστεύσετε in the main clause, 'how will you believe' preserves the
    Greek form better than the more interpretive 'how can you believe.'
- source_word: ἐὰν εἴπω
  chosen: if I tell
  alternatives:
  - if I should tell
  - if I speak
  lexicon: BDAG
  rationale: ἐὰν with the aorist subjunctive marks a future more vivid condition.
    In idiomatic English, 'if I tell' communicates the sense clearly without awkwardness.
- source_word: τὰ ἐπουράνια
  chosen: heavenly things
  alternatives:
  - things in heaven
  - heavenly matters
  lexicon: BDAG
  rationale: The neuter plural adjective is substantival and contrasts directly with
    τὰ ἐπίγεια. 'Heavenly things' preserves both the lexical contrast and the broader
    Johannine sense of realities belonging to heaven.
