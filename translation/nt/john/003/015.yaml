theological_decisions:
- issue: Rendering the Johannine belief expression with ἐν αὐτῷ
  chosen_reading: in him
  alternative_readings:
  - into him
  rationale: The text reads ἐν αὐτῷ, so the main text should not import the more common
    Johannine construction εἰς αὐτόν. This preserves original-language primacy over
    translation tradition. No doctrinal claim is altered; the decision is grammatical
    and lexical.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of πᾶς ὁ πιστεύων
  chosen_reading: everyone who believes
  alternative_readings:
  - whoever believes
  rationale: The phrase is generic and inclusive in scope. 'Everyone' communicates
    this clearly in modern English without obscuring the singular participial construction.
    This is not a gender-neutralizing move against the source, since the expression
    is already generic rather than male-specific.
  doctrine_reference: Translation philosophy §4
