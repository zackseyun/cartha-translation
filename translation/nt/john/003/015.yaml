id: JHN.3.15
reference: John 3:15
source:
  edition: SBLGNT
  text: ἵνα πᾶς ὁ πιστεύων ⸂ἐν αὐτῷ⸃ ἔχῃ ζωὴν αἰώνιον.
translation:
  text: so that everyone who believes in him may have eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "whoever believes."
    reason: lexical_alternative
  - marker: b
    text: Some translations render this phrase "into him," but the Greek here reads
      "in him" (ἐν αὐτῷ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result in relation to the preceding statement. 'So
    that' is natural modern English and preserves the clause's purposive force without
    sounding wooden.
- source_word: πᾶς ὁ πιστεύων
  chosen: everyone who believes
  alternatives:
  - whoever believes
  - every one believing
  lexicon: BDAG
  rationale: 'The articular present participle functions substantivally: ''everyone/the
    one who believes.'' ''Everyone who believes'' is clear, idiomatic, and preserves
    the generic scope. The present participle is rendered with an English present
    form rather than an explicitly progressive expression.'
- source_word: πιστεύων
  chosen: believes
  alternatives:
  - has faith
  - trusts
  lexicon: BDAG
  rationale: For πιστεύω in Johannine usage, 'believes' is the standard and most transparent
    rendering. It aligns with the project's default handling of the pistis word-group
    as 'faith' in the main text while avoiding unnecessary paraphrase.
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - into him
  lexicon: BDAG
  rationale: The Greek preposition is ἐν, not εἰς, so the translation should preserve
    the actual wording as 'in him.' Although Johannine belief expressions often use
    εἰς and English tradition frequently has 'in him' in either case, here 'in him'
    directly reflects the source text.
- source_word: ἔχῃ
  chosen: may have
  alternatives:
  - might have
  - have
  lexicon: BDAG
  rationale: Present subjunctive under ἵνα is well represented by 'may have' in English,
    preserving the purpose nuance without implying uncertainty beyond the Greek construction.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: '''Eternal life'' is the established and accurate rendering in Johannine
    context, conveying both unending life and the eschatological quality associated
    with αἰώνιος. ''Life of the age'' is too wooden for main text, though conceptually
    related.'
