theological_decisions:
- issue: Rendering σημεῖα in Johannine context
  chosen_reading: signs
  alternative_readings:
  - miracles
  rationale: John's Gospel uses σημεῖα with theological weight as acts that signify
    Jesus' identity and mission. 'Signs' preserves that tension without denying their
    miraculous character.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to normalize the shift from second person to third person in Nicodemus's
    speech
  chosen_reading: retain 'unless God is with him'
  alternative_readings:
  - unless God is with you
  rationale: The Greek text shifts from direct address ('you') to third person ('him').
    Preserving the shift keeps the source-text texture and avoids smoothing away a
    potentially meaningful rhetorical formality.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether ἀπὸ θεοῦ ἐλήλυθας implies formal commissioning
  chosen_reading: you have come from God
  alternative_readings:
  - you have been sent from God
  rationale: The verse states origin from God, not explicitly mission by the verb
    'send.' The translation should not import a stronger doctrinal claim than the
    wording itself makes, even though Johannine theology elsewhere includes sending
    language.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
