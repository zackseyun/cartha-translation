id: JHN.3.2
reference: John 3:2
source:
  edition: SBLGNT
  text: οὗτος ἦλθεν πρὸς αὐτὸν νυκτὸς καὶ εἶπεν αὐτῷ· Ῥαββί, οἴδαμεν ὅτι ἀπὸ θεοῦ
    ἐλήλυθας διδάσκαλος· οὐδεὶς γὰρ ⸂δύναται ταῦτα τὰ σημεῖα⸃ ποιεῖν ἃ σὺ ποιεῖς,
    ἐὰν μὴ ᾖ ὁ θεὸς μετ’ αὐτοῦ.
translation:
  text: This man came to him by night and said to him, “Rabbi, we know that you have
    come from God as a teacher, for no one is able to do these signs that you do unless
    God is with him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at night.” The phrase may also carry thematic resonance in John, where
      night/darkness can have symbolic force.
    reason: lexical_alternative
  - marker: b
    text: Or “these miraculous signs.” Greek σημεῖα is rendered “signs” in John to
      preserve their function as acts that point beyond themselves.
    reason: lexical_alternative
  - marker: c
    text: 'Greek: “unless God is with him,” retaining the third-person wording of
      Nicodemus’s statement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: This man
  alternatives:
  - He
  - This one
  lexicon: BDAG
  rationale: In context οὗτος refers back to Nicodemus, a male individual just introduced
    in v.1. 'This man' preserves the demonstrative force more naturally than bare
    'he' while remaining idiomatic English.
- source_word: ἦλθεν πρὸς αὐτὸν
  chosen: came to him
  alternatives:
  - went to him
  lexicon: BDAG
  rationale: Standard motion expression; 'came to him' is the natural English rendering
    in narrative context.
- source_word: νυκτός
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: The genitive of time is idiomatically rendered 'by night' or 'at night.'
    'By night' is slightly more literary and preserves Johannine thematic resonance
    with darkness/night without overtranslating.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: The vocative title is retained by transliteration because it is a Jewish
    form of address used directly in the Greek text; translating it here would flatten
    the historical setting. Its meaning is transparent enough in context, and John
    regularly preserves such Semitic forms.
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - I know
  lexicon: BDAG
  rationale: The first person plural should be preserved. It may be a representative
    plural, but the text says 'we know,' likely speaking for a wider group or class.
- source_word: ἀπὸ θεοῦ ἐλήλυθας
  chosen: you have come from God
  alternatives:
  - you are from God
  - you have come as one sent from God
  lexicon: BDAG
  rationale: The perfect of ἔρχομαι emphasizes a completed coming with present relevance.
    'You have come from God' preserves both source and result without importing the
    stronger notion 'sent' where ἀποστέλλω is not used.
- source_word: διδάσκαλος
  chosen: as a teacher
  alternatives:
  - a teacher
  - teacher
  lexicon: BDAG
  rationale: Predicate nominative after ἐλήλυθας. 'As a teacher' makes explicit the
    role in idiomatic English while preserving the sense that Nicodemus recognizes
    Jesus' status/function as teacher.
- source_word: οὐδεὶς γὰρ δύναται
  chosen: for no one is able
  alternatives:
  - for no one can
  lexicon: BDAG
  rationale: '''Is able'' more directly reflects δύναται, though ''can'' would also
    be acceptable. This keeps the statement slightly more formal and explicit.'
- source_word: ταῦτα τὰ σημεῖα
  chosen: these signs
  alternatives:
  - these miraculous signs
  - these attesting signs
  lexicon: BDAG
  rationale: σημεῖα in John carries the sense of signs that point beyond themselves.
    'Signs' preserves Johannine terminology better than interpretive expansions like
    'miracles,' though the miraculous dimension is implied.
- source_word: ποιεῖν ἃ σὺ ποιεῖς
  chosen: to do these signs that you do
  alternatives:
  - to perform these signs that you perform
  lexicon: BDAG
  rationale: Maintains the repeated ποιέω with simple English 'do,' preserving the
    verbal repetition present in Greek.
- source_word: ἐὰν μὴ ᾖ ὁ θεὸς μετ’ αὐτοῦ
  chosen: unless God is with him
  alternatives:
  - unless God were with him
  lexicon: BDAG
  rationale: The conditional clause with present subjunctive is naturally rendered
    'unless God is with him.' Retaining third-person 'him' reflects the Greek αὐτοῦ;
    shifting to 'you' would smooth the English but obscure the text's wording, where
    Nicodemus speaks in a more formal or indirect way.
