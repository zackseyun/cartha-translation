id: JHN.3.26
reference: John 3:26
source:
  edition: SBLGNT
  text: καὶ ἦλθον πρὸς τὸν Ἰωάννην καὶ εἶπαν αὐτῷ· Ῥαββί, ὃς ἦν μετὰ σοῦ πέραν τοῦ
    Ἰορδάνου, ᾧ σὺ μεμαρτύρηκας, ἴδε οὗτος βαπτίζει καὶ πάντες ἔρχονται πρὸς αὐτόν.
translation:
  text: And they came to John and said to him, “Rabbi, the one who was with you beyond
    the Jordan, to whom you have borne witness—look, this one is baptizing, and everyone
    is going to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “about whom you testified.” The Greek dative construction can be rendered
      either way in English.
    reason: lexical_alternative
  - marker: b
    text: Or “he is baptizing.” Greek οὗτος more explicitly says “this one,” which
      may convey the speakers’ pointed emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον πρὸς τὸν Ἰωάννην
  chosen: they came to John
  alternatives:
  - they went to John
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come/go' depending on viewpoint. In English narrative,
    'came to John' is the natural rendering for approaching him.
- source_word: εἶπαν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  lexicon: BDAG
  rationale: λέγω here introduces direct speech; 'said to him' is the standard and
    sufficiently formal rendering.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: The vocative title is retained by transliteration, which is conventional
    in John and preserves the Jewish setting; 'Teacher' is a possible gloss but less
    textually transparent here.
- source_word: ὃς ἦν μετὰ σοῦ πέραν τοῦ Ἰορδάνου
  chosen: the one who was with you beyond the Jordan
  alternatives:
  - he who was with you across the Jordan
  lexicon: BDAG
  rationale: ὃς is rendered idiomatically as 'the one who.' πέραν τοῦ Ἰορδάνου is
    naturally 'beyond the Jordan,' preserving the geographical expression without
    over-paraphrase.
- source_word: ᾧ σὺ μεμαρτύρηκας
  chosen: to whom you have borne witness
  alternatives:
  - about whom you testified
  - for whom you have testified
  lexicon: BDAG
  rationale: μαρτυρέω in Johannine usage often carries the sense of bearing witness/testifying.
    The perfect μεμαρτύρηκας is represented with English present perfect, indicating
    prior testimony with present relevance. The dative relative pronoun is best rendered
    'to whom' in a formally close translation, though English idiom could also support
    'about whom.'
- source_word: ἴδε
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἴδε is an attention-getting particle/interjection. 'Look' is readable
    modern English and preserves the force without archaic tone; 'behold' is too archaic
    for the stated philosophy.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: οὗτος is somewhat pointed/deictic here, likely reflecting the speakers'
    emphasis or irritation. 'This one' preserves that demonstrative force better than
    the flatter 'he.'
- source_word: βαπτίζει
  chosen: is baptizing
  alternatives:
  - baptizes
  lexicon: BDAG
  rationale: The present tense is rendered progressively in context to reflect ongoing
    activity being reported.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all people
  - everyone
  lexicon: BDAG
  rationale: πάντες here is a rhetorical generalization, not necessarily a mathematically
    exhaustive statement. 'Everyone' is idiomatic English and captures the complaint's
    force.
- source_word: ἔρχονται πρὸς αὐτόν
  chosen: is going to him
  alternatives:
  - are coming to him
  lexicon: BDAG
  rationale: With πάντες as a collective singular sense in English ('everyone'), the
    verb is rendered singular for natural English agreement. 'Going to him' fits the
    reported movement from the speakers' perspective; 'coming to him' is possible
    but less idiomatic after 'everyone' in this complaint context.
