theological_decisions:
- issue: Rendering Johannine witness language
  chosen_reading: borne witness
  alternative_readings:
  - testified
  rationale: John frequently uses μαρτυρέω with theological weight tied to testimony/witness.
    'Borne witness' preserves that motif more clearly than the more generic 'testified,'
    while remaining understandable in modern English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
