theological_decisions:
- issue: Force of Jesus' address to Nicodemus as ὁ διδάσκαλος τοῦ Ἰσραήλ
  chosen_reading: Render as 'the teacher of Israel' with definite force preserved
  alternative_readings:
  - '''a teacher of Israel'''
  rationale: The definite article suggests not merely that Nicodemus is one teacher
    among many, but that he is a recognized teacher within Israel. Preserving the
    definiteness maintains the rhetorical sharpness of Jesus' rebuke without importing
    extra doctrinal claims.
  doctrine_reference: Translation philosophy §5 (consistency/documented exception)
    and §6 (readable modern English)
