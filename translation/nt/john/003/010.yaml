id: JHN.3.10
reference: John 3:10
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Σὺ εἶ ὁ διδάσκαλος τοῦ Ἰσραὴλ καὶ ταῦτα οὐ
    γινώσκεις;
translation:
  text: Jesus answered and said to him, “You are the teacher of Israel, and you do
    not know these things?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a teacher of Israel.' The Greek has 'the teacher,' which likely gives
      the address a pointed, rhetorical force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering of ἀποκρίνομαι in dialogue. 'Answered' fits
    idiomatic English and preserves the formal response setting.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: λέγω is most naturally rendered 'said' here. Keeping both 'answered and
    said' reflects the Greek's two-verb narrative formula without unnecessary paraphrase.
- source_word: Σὺ
  chosen: You
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can preserve this
    naturally by retaining 'You' at the front of the clause.
- source_word: ὁ διδάσκαλος
  chosen: the teacher
  alternatives:
  - a teacher
  - the master teacher
  lexicon: BDAG
  rationale: 'The article is significant. ''The teacher'' best reflects the likely
    force: Nicodemus is addressed as a recognized teacher of Israel, likely with a
    mildly ironic or pointed emphasis. ''A teacher'' would weaken the Greek definiteness.'
- source_word: τοῦ Ἰσραήλ
  chosen: of Israel
  alternatives:
  - in Israel
  lexicon: BDAG
  rationale: The genitive is best rendered 'of Israel,' indicating representative
    standing among God's people rather than merely geographic location. 'In Israel'
    is possible but less precise.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these matters
  lexicon: BDAG
  rationale: A straightforward rendering of the neuter plural demonstrative, referring
    back to Jesus' teaching in the immediate context. 'These things' preserves the
    breadth of reference.
- source_word: γινώσκεις
  chosen: know
  alternatives:
  - understand
  - recognize
  lexicon: BDAG
  rationale: γινώσκω commonly means 'know,' though in context it carries the sense
    of grasping or understanding. 'Know' is preferred for lexical transparency; the
    context supplies the nuance of understanding.
