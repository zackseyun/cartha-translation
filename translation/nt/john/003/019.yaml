id: JHN.3.19
reference: John 3:19
source:
  edition: SBLGNT
  text: αὕτη δέ ἐστιν ἡ κρίσις ὅτι τὸ φῶς ἐλήλυθεν εἰς τὸν κόσμον καὶ ἠγάπησαν οἱ
    ἄνθρωποι μᾶλλον τὸ σκότος ἢ τὸ φῶς, ἦν γὰρ ⸂αὐτῶν πονηρὰ⸃ τὰ ἔργα.
translation:
  text: 'And this is the judgment: that the light has come into the world, and men
    loved the darkness rather than the light, because their works were evil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'people'; Greek 'men' here refers to humanity generally, not males only.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - condemnation
  - verdict
  lexicon: BDAG
  rationale: In Johannine context, κρίσις can denote judgment in the sense of decisive
    evaluation resulting in condemnation, but here it introduces the content or basis
    of judgment. 'Judgment' preserves the broader sense without prematurely narrowing
    to the outcome alone.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Retained as 'the light' to preserve John's established metaphor, likely
    referring to the revelatory coming of the Son without over-explicating the symbol
    in translation.
- source_word: ἐλήλυθεν
  chosen: has come
  alternatives:
  - came
  lexicon: BDAG
  rationale: The perfect tense is best represented by 'has come,' highlighting the
    abiding result of the light's arrival in the world.
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: Standard Johannine usage; 'world' preserves both the created order and
    humanity-in-rebellion nuance without interpretive expansion.
- source_word: ἠγάπησαν
  chosen: loved
  alternatives:
  - preferred
  lexicon: BDAG
  rationale: The aorist of ἀγαπάω is rendered 'loved' to preserve the lexical connection
    with ἀγάπη and the moral force of human attachment to darkness. 'Preferred' captures
    μᾶλλον but weakens the verb itself.
- source_word: οἱ ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - humanity
  lexicon: BDAG
  rationale: Rendered 'men' because ἄνθρωποι here is grammatically masculine with
    representative force, and the project prefers gender-accurate rendering over flattening
    to gender-neutral language where the source uses masculine generically. The sense
    is humanity in general, not males only.
- source_word: μᾶλλον ... ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: '''Rather than'' is idiomatic modern English and accurately conveys comparative
    preference.'
- source_word: τὸ σκότος
  chosen: the darkness
  lexicon: BDAG
  rationale: Kept as 'the darkness' to match the symbolic contrast with 'the light'
    in Johannine theology.
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: '''Evil'' best conveys the moral quality of the works. ''Bad'' is too
    weak; ''wicked'' is stronger but less natural in contemporary English.'
- source_word: τὰ ἔργα
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' preserves the lexical correspondence with Johannine usage
    and keeps the phrase concise. ''Deeds'' is possible and idiomatic, but ''works''
    better reflects the Greek term directly.'
