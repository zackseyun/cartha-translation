theological_decisions:
- issue: Referent of 'the light'
  chosen_reading: Retained the metaphor 'the light' without making the referent explicit
    in the main text.
  alternative_readings:
  - '''the Light'' as an explicit christological title'
  - '''Jesus'' as an interpretive substitution'
  rationale: The context strongly identifies the light with the Son's revelatory coming,
    but the Greek text itself uses the metaphor. Preserving the metaphor maintains
    Johannine theological texture and avoids importing an explanatory gloss into the
    translation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Generic force of οἱ ἄνθρωποι
  chosen_reading: Rendered as 'men' with generic representative force.
  alternative_readings:
  - people
  - human beings
  rationale: The project's doctrine specifies gender-accurate over gender-neutral
    rendering where the source uses grammatically masculine forms with representative
    force. A footnote preserves the inclusive sense for modern readers.
  doctrine_reference: Translation philosophy §4
