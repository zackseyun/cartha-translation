theological_decisions:
- issue: Subject of δίδωσιν ('gives')
  chosen_reading: 'The implied subject is God: ''for he gives the Spirit without measure.'''
  alternative_readings:
  - The sent one (the Son) gives the Spirit without measure.
  rationale: The nearest explicit subject in the clause sequence and the broader flow
    favor God as the giver of the Spirit to the one he sent, explaining why the sent
    one speaks God's words. This also aligns with the immediate context in v.35, where
    the Father gives all things into the Son's hand. However, because the Greek subject
    is implicit and some interpreters take the Son as the giver, the alternative is
    preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
