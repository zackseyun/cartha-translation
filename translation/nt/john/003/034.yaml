id: JHN.3.34
reference: John 3:34
source:
  edition: SBLGNT
  text: ὃν γὰρ ἀπέστειλεν ὁ θεὸς τὰ ῥήματα τοῦ θεοῦ λαλεῖ, οὐ γὰρ ἐκ μέτρου ⸀δίδωσιν
    τὸ πνεῦμα.
translation:
  text: For the one whom God sent speaks the words of God, for he gives the Spirit
    without measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for he gives the Spirit without measure,' with 'he' understood as the
      one whom God sent.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  chosen: the one whom
  alternatives:
  - he whom
  - whom
  lexicon: BDAG
  rationale: The relative pronoun is accusative masculine singular and refers generally
    to the person sent by God. 'The one whom' is natural English and preserves the
    substantival force better than a bare 'whom.'
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - has sent
  - commissioned
  lexicon: BDAG
  rationale: Aorist indicative is best rendered simply as past 'sent' in this context.
    'Commissioned' is possible but less direct than the common Johannine sending language.
- source_word: τὰ ῥήματα τοῦ θεοῦ
  chosen: the words of God
  alternatives:
  - God's words
  - the sayings of God
  lexicon: BDAG
  rationale: ῥήματα is plural and denotes spoken words/utterances. 'The words of God'
    preserves the formal genitive and Johannine diction.
- source_word: λαλεῖ
  chosen: speaks
  alternatives:
  - utters
  - says
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak.' 'Utters' is too stiff, and 'says' would
    underrepresent the verbal aspect of ongoing speaking.
- source_word: ἐκ μέτρου
  chosen: without measure
  alternatives:
  - by measure
  - sparingly
  - in limited measure
  lexicon: BDAG
  rationale: The idiom with negation conveys not giving in a measured or limited way.
    'Without measure' is concise, idiomatic English that preserves the metaphor.
- source_word: δίδωσιν
  chosen: gives
  alternatives:
  - grants
  - bestows
  lexicon: BDAG
  rationale: Present indicative fits the gnomic/present statement. 'Gives' is the
    most direct rendering.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Johannine context this most naturally refers to the Holy Spirit, not
    a generic spirit or disposition. Capitalization in English signals this referent,
    though Greek manuscripts themselves do not mark case distinction.
