id: JHN.3.16
reference: John 3:16
source:
  edition: SBLGNT
  text: Οὕτως γὰρ ἠγάπησεν ὁ θεὸς τὸν κόσμον ὥστε τὸν ⸀υἱὸν τὸν μονογενῆ ἔδωκεν, ἵνα
    πᾶς ὁ πιστεύων εἰς αὐτὸν μὴ ἀπόληται ἀλλὰ ἔχῃ ζωὴν αἰώνιον.
translation:
  text: 'For God loved the world in this way: he gave his one and only Son, so that
    everyone who believes in him should not perish but have eternal life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, traditionally, ''For God so loved the world.'' The Greek can be understood
      as emphasizing the manner of God''s love: ''For God loved the world in this
      way.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''his only begotten Son''; also possible: ''his unique Son.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Οὕτως
  chosen: in this way
  alternatives:
  - so
  - thus
  - so much
  lexicon: BDAG
  rationale: In Johannine usage here, οὕτως most naturally points to manner ('in this
    way') rather than primarily degree ('so much'). This avoids importing an intensifying
    sense not required by the Greek while still fitting the following ὥστε clause
    that explains how God loved the world.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory/grounding force connecting this verse to the
    preceding context.
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - has loved
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as a simple past in English here.
    The cognate with ἀγάπη is preserved with the standard rendering 'love' per doctrine
    guidance.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject with article; English does not require
    the article.
- source_word: τὸν κόσμον
  chosen: the world
  alternatives:
  - the created world
  - humanity
  lexicon: BDAG
  rationale: κόσμος in John commonly carries the sense of the world in its human,
    fallen, and comprehensive scope. 'The world' preserves the breadth of the Greek
    better than narrowing it to 'humanity' alone.
- source_word: ὥστε
  chosen: ': he gave'
  alternatives:
  - so that he gave
  - with the result that he gave
  lexicon: BDAG
  rationale: Here ὥστε introduces the actual expression/result of God's love. In idiomatic
    English, a colon after 'in this way' clearly introduces the content/result without
    awkwardness.
- source_word: τὸν υἱὸν τὸν μονογενῆ
  chosen: his one and only Son
  alternatives:
  - his only Son
  - his unique Son
  - his only begotten Son
  lexicon: BDAG
  rationale: μονογενής in Johannine Christological usage denotes uniqueness/one-of-a-kind
    sonship rather than physical begetting as such. 'One and only Son' is clear modern
    English and preserves the filial relationship. 'Only begotten' is preserved in
    a footnote because of its theological and historical significance.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - gave over
  lexicon: BDAG
  rationale: The verb is broad and should remain broad here, encompassing the Son's
    mission and self-giving without over-specifying incarnation or crucifixion in
    the translation itself.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose with natural modern English.
- source_word: πᾶς ὁ πιστεύων
  chosen: everyone who believes
  alternatives:
  - whoever believes
  - every one believing
  lexicon: BDAG
  rationale: This construction is substantival and generic. 'Everyone who believes'
    is natural English and preserves the ongoing/generic force of the present participle
    without awkward literalism.
- source_word: εἰς αὐτὸν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: πιστεύω εἰς is idiomatically rendered 'believe in.' More literal alternatives
    are not natural in English.
- source_word: μὴ ἀπόληται
  chosen: should not perish
  alternatives:
  - may not perish
  - would not be destroyed
  lexicon: BDAG
  rationale: Aorist middle subjunctive under ἵνα expresses intended result/purpose.
    'Should not perish' fits the register and preserves the gravity of ἀπόλλυμι without
    overdefining the mode of perishing.
- source_word: ἀλλὰ ἔχῃ
  chosen: but have
  alternatives:
  - but may have
  lexicon: BDAG
  rationale: Balances the preceding subjunctive clause in smooth English.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age to come
  lexicon: BDAG
  rationale: Standard and accurate rendering in John. 'Eternal life' preserves both
    duration and the qualitative theological sense established in Johannine usage.
