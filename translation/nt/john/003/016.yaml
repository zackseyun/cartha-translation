theological_decisions:
- issue: Sense of Οὕτως
  chosen_reading: manner ('in this way') rather than degree ('so much')
  alternative_readings:
  - degree/intensity ('so much')
  rationale: The immediate syntax with ὥστε and the giving of the Son explains the
    manner in which God loved the world. This preserves the text's emphasis on the
    concrete act of giving rather than making the verse primarily a statement about
    the amount of love.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of μονογενής in reference to the Son
  chosen_reading: '''one and only Son'' in the main text'
  alternative_readings:
  - '''only Son'''
  - '''unique Son'''
  - '''only begotten Son'''
  rationale: Within orthodox Christology, μονογενής should not be rendered in a way
    that obscures the Son's unique relation to the Father, but the translation should
    also reflect current lexical evidence that the term emphasizes uniqueness. Because
    'only begotten' is historically important and doctrinally sensitive, it is preserved
    in a footnote rather than placed in the main text.
  doctrine_reference: Affirmations (Nicene Creed; Chalcedon), Translation philosophy
    §3, §6
- issue: Scope of πᾶς ὁ πιστεύων
  chosen_reading: '''everyone who believes'''
  alternative_readings:
  - '''whoever believes'''
  rationale: The phrase is inclusive and generic without resolving later theological
    debates about election, extent of atonement, or human response. The translation
    preserves the universal offer language of the verse without importing a denominational
    framework.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives;
    Translation philosophy §3
