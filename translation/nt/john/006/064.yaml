theological_decisions:
- issue: Rendering πιστεύω in a context of disciples' response to Jesus
  chosen_reading: believe
  alternative_readings:
  - trust
  rationale: The verb πιστεύω can overlap with 'trust,' but in Johannine usage 'believe'
    is the established and sufficiently broad rendering, preserving both cognitive
    and relational dimensions without narrowing the sense. This is not the contested
    noun πίστις entry, but the semantic field is related.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις'
- issue: Rendering παραδίδωμι with reference to Judas
  chosen_reading: betray
  alternative_readings:
  - hand over
  rationale: Although παραδίδωμι can be rendered more literally as 'hand over,' the
    immediate narrative context identifies Judas' act as treacherous delivery of Jesus.
    'Betray' reflects normal English understanding of the event while preserving the
    theological and narrative weight. The more literal alternative is preserved in
    a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
