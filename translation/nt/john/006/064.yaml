id: JHN.6.64
reference: John 6:64
source:
  edition: SBLGNT
  text: ἀλλὰ εἰσὶν ἐξ ὑμῶν τινες οἳ οὐ πιστεύουσιν. ᾔδει γὰρ ἐξ ἀρχῆς ὁ Ἰησοῦς τίνες
    εἰσὶν οἱ μὴ πιστεύοντες καὶ τίς ἐστιν ὁ παραδώσων αὐτόν.
translation:
  text: But there are some among you who do not believe. For Jesus knew from the beginning
    who the ones not believing were, and who it was who would betray him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'who would hand him over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Yet
  lexicon: BDAG
  rationale: Marks a contrast with the preceding statement; 'But' is the most natural
    English adversative here.
- source_word: ἐξ ὑμῶν
  chosen: among you
  alternatives:
  - from you
  - out of you
  lexicon: BDAG
  rationale: Idiomatic English for membership within the group addressed; more natural
    than the overly literal 'from you' while preserving the sense that these persons
    are within Jesus' audience.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of the audience.
- source_word: οἳ οὐ πιστεύουσιν
  chosen: who do not believe
  alternatives:
  - who are not believing
  lexicon: BDAG
  rationale: Present tense indicates ongoing unbelief; English simple present conveys
    this naturally.
- source_word: ᾔδει
  chosen: knew
  alternatives:
  - had known
  lexicon: BDAG
  rationale: Imperfect/pluperfect-form of οἶδα commonly functions as a past-state
    verb meaning 'knew'; simple past is the clearest English rendering here.
- source_word: ἐξ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: Standard idiomatic rendering preserving temporal force without over-specifying
    what 'beginning' refers to.
- source_word: οἱ μὴ πιστεύοντες
  chosen: the ones not believing
  alternatives:
  - those who did not believe
  - the unbelieving ones
  lexicon: BDAG
  rationale: Substantival present participle identifies a class characterized by unbelief.
    Rendered in a way that preserves the ongoing aspect while remaining readable in
    the full sentence.
- source_word: παραδώσων
  chosen: would betray
  alternatives:
  - was going to hand over
  - would hand him over
  lexicon: BDAG
  rationale: In Johannine context, παραδίδωμι referring to Judas conventionally and
    contextually means betrayal, not merely neutral handing over. 'Would betray' communicates
    the relational treachery implicit in context.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus.
