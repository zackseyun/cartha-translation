id: JHN.6.51
reference: John 6:51
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ὁ ἄρτος ὁ ζῶν ὁ ἐκ τοῦ οὐρανοῦ καταβάς· ἐάν τις φάγῃ ἐκ τούτου τοῦ
    ἄρτου ⸀ζήσει εἰς τὸν αἰῶνα, καὶ ὁ ἄρτος δὲ ὃν ἐγὼ δώσω ἡ σάρξ μού ⸀ἐστιν ὑπὲρ
    τῆς τοῦ κόσμου ζωῆς.
translation:
  text: I am the living bread that came down from heaven. If anyone eats from this
    bread, he will live forever. And the bread that I will give for the life of the
    world is my flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eats of this bread.' The Greek preposition can be rendered more literally
      this way, but 'eats from this bread' is more natural in current English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will live into the age.' The expression means enduringly or forever.
    reason: lexical_alternative
  - marker: c
    text: Greek 'flesh,' not 'body.' The wording is intentionally concrete.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἄρτος ὁ ζῶν
  chosen: the living bread
  alternatives:
  - the bread that lives
  - the bread of life
  lexicon: BDAG
  rationale: The attributive participle ζῶν is best rendered adjectivally as 'living.'
    'Bread of life' would import wording from nearby context rather than translate
    this phrase directly.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβάς
  chosen: that came down from heaven
  alternatives:
  - having come down from heaven
  - who came down from heaven
  lexicon: BDAG
  rationale: The aorist participle καταβάς refers to a completed descent and is naturally
    rendered in English with a relative clause. 'Came down' is idiomatic and preserves
    the incarnational claim without overformal stiffness.
- source_word: ἐάν τις φάγῃ ἐκ τούτου τοῦ ἄρτου
  chosen: If anyone eats from this bread
  alternatives:
  - If anyone eats of this bread
  - If anyone should eat from this bread
  lexicon: BDAG
  rationale: ἐάν with aorist subjunctive gives a general condition. 'Anyone' captures
    τις generically. 'Eats from' reflects ἐκ while remaining natural English; 'eats
    of' is more traditional but less current.
- source_word: ζήσει εἰς τὸν αἰῶνα
  chosen: he will live forever
  alternatives:
  - he will live into the age
  - he will live for the age
  - he will live for ever
  lexicon: BDAG
  rationale: The idiom εἰς τὸν αἰῶνα in Johannine usage means enduringly/forever.
    'Live forever' is the clearest modern equivalent and preserves the eschatological
    force.
- source_word: ὁ ἄρτος δὲ ὃν ἐγὼ δώσω
  chosen: And the bread that I will give
  alternatives:
  - Now the bread that I will give
  - And the bread which I will give
  lexicon: BDAG
  rationale: δέ here marks development rather than strong contrast; 'And' is smooth
    and sufficient. The future δώσω points to a forthcoming self-giving.
- source_word: ἡ σάρξ μού ἐστιν
  chosen: is my flesh
  alternatives:
  - is my body
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, σάρξ in literal contexts
    is rendered 'flesh.' Here the term is concrete and intentionally provocative in
    context; 'body' would soften and interpret rather than translate.
- source_word: ὑπὲρ τῆς τοῦ κόσμου ζωῆς
  chosen: for the life of the world
  alternatives:
  - on behalf of the life of the world
  - for the world's life
  lexicon: BDAG
  rationale: ὑπέρ here expresses benefactive purpose/on behalf of. 'For the life of
    the world' is idiomatic and preserves the universal scope of κόσμος without overstating
    a doctrinal conclusion beyond the text.
- source_word: κόσμος
  chosen: world
  alternatives:
  - humanity
  lexicon: BDAG
  rationale: κόσμος is consistently rendered 'world' in John unless context clearly
    narrows it. Here 'world' preserves Johannine resonance and avoids interpretive
    reduction.
- source_word: τις ... ζήσει
  chosen: anyone ... he will live
  alternatives:
  - anyone ... they will live
  lexicon: Louw-Nida
  rationale: The Greek uses an indefinite singular with singular verb. Following the
    project's gender-accurate policy, the representative singular is retained as 'he,'
    while the sense remains generic rather than male-exclusive.
