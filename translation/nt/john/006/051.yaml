theological_decisions:
- issue: Meaning of σάρξ in Jesus' self-description
  chosen_reading: literal 'flesh' in the main text
  alternative_readings:
  - '''body'' as a sacramental or interpretive rendering'
  rationale: The doctrine guidelines specify σάρξ as 'flesh' in literal contexts and
    'sinful nature' only in metaphorical ones. In John 6:51 the word is concrete and
    tied to Jesus' self-giving; rendering it 'body' would resolve interpretive questions
    and mute the lexical force of the Greek.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Scope of 'the world'
  chosen_reading: retain 'world' without narrowing
  alternative_readings:
  - humanity
  - the elect
  rationale: The verse states that Jesus gives his flesh 'for the life of the world.'
    The translation preserves the text's broad wording and does not import a narrower
    doctrinal system. This follows the instruction to preserve theological tension
    rather than resolve it beyond what the Greek states.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Affirmations
- issue: Christological force of 'came down from heaven'
  chosen_reading: translate straightforwardly as a real descent from heaven
  alternative_readings:
  - metaphorical divine commissioning
  rationale: In Johannine context this language bears strong incarnational significance.
    The translation preserves that claim directly without dilution, consistent with
    historic orthodoxy while remaining a plain rendering of the Greek.
  doctrine_reference: DOCTRINE.md Affirmations (Nicene, Chalcedonian bounds)
