id: JHN.6.18
reference: John 6:18
source:
  edition: SBLGNT
  text: ἥ τε θάλασσα ἀνέμου μεγάλου πνέοντος ⸀διεγείρετο.
translation:
  text: And the sea was being stirred up because a strong wind was blowing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sea was being agitated' or 'the sea was rising.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥ τε θάλασσα
  chosen: And the sea
  alternatives:
  - Now the sea
  - and the sea
  lexicon: BDAG
  rationale: θάλασσα straightforwardly means 'sea.' In John 6 the body of water is
    the Sea of Galilee, but the Greek uses the common noun rather than a proper geographic
    label, so 'the sea' is retained. τε is lightly connective; in natural English
    this is best represented by 'And' rather than left untranslated.
- source_word: ἀνέμου μεγάλου
  chosen: a strong wind
  alternatives:
  - a great wind
  - a violent wind
  lexicon: BDAG
  rationale: ἄνεμος is 'wind.' μέγας literally means 'great,' but with weather phenomena
    idiomatic English commonly uses 'strong.' 'Violent' is possible interpretively,
    but 'strong' stays closer to the lexical sense without overstating intensity.
- source_word: πνέοντος
  chosen: was blowing
  alternatives:
  - blowing
  lexicon: BDAG
  rationale: The present active participle modifies ἀνέμου and gives the circumstance
    causing the sea's condition. Rendering it with an English finite verb in a causal
    clause ('because ... was blowing') communicates the participial relation naturally
    while preserving the ongoing aspect.
- source_word: διεγείρετο
  chosen: was being stirred up
  alternatives:
  - was being agitated
  - was rising
  - was being tossed
  lexicon: BDAG
  rationale: The imperfect passive indicates an ongoing process affecting the sea.
    'Was being stirred up' preserves both the passive sense and the progressive aspect.
    'Agitated' is possible but less vivid; 'rising' is too narrow; 'tossed' imports
    wave imagery not explicit in the verb itself.
