theological_decisions:
- issue: Christological title in John 6:69
  chosen_reading: the Holy One of God
  alternative_readings:
  - the Holy One from God
  - the Christ, the Son of the living God
  rationale: The SBLGNT text reads ὁ ἅγιος τοῦ θεοῦ. This should be translated directly
    as a title without harmonizing to Matthew 16:16 or later Byzantine expansions.
    'Of God' preserves the genitival relationship without over-interpreting it as
    merely source ('from God').
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
