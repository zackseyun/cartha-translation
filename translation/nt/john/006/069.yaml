id: JHN.6.69
reference: John 6:69
source:
  edition: SBLGNT
  text: καὶ ἡμεῖς πεπιστεύκαμεν καὶ ἐγνώκαμεν ὅτι σὺ εἶ ὁ ⸀ἅγιος τοῦ ⸀θεοῦ.
translation:
  text: And we have believed and have come to know that you are the Holy One of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'the Messiah, the Son of the living God.'
    reason: textual_variant
  - marker: b
    text: Or 'the Holy One from God.' The Greek genitive can express relation or source.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can preserve this
    sufficiently with 'we' in sentence-initial position without the heavier 'we ourselves,'
    which would sound overstated here.
- source_word: πεπιστεύκαμεν
  chosen: have believed
  alternatives:
  - have come to believe
  - believe
  lexicon: BDAG
  rationale: Perfect tense indicates a settled state resulting from prior belief.
    'Have believed' preserves both the completed action and its continuing force better
    than simple present 'believe.' 'Have come to believe' is possible but adds an
    ingressive nuance not explicit in the form itself.
- source_word: ἐγνώκαμεν
  chosen: have come to know
  alternatives:
  - have known
  - know
  lexicon: BDAG
  rationale: The perfect of γινώσκω often carries present-result force. 'Have come
    to know' communicates both acquisition and present possession of knowledge in
    idiomatic English better than the less natural 'have known' in this context.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of belief and knowledge, so 'that' is the straightforward
    complementizer.
- source_word: ὁ ἅγιος
  chosen: the Holy One
  alternatives:
  - the Holy One
  - the consecrated one
  - the saintly one
  lexicon: BDAG
  rationale: As a christological title, ἅγιος here denotes one uniquely set apart
    by God. 'The Holy One' is the established and most semantically fitting rendering
    in English; alternatives either weaken the title or sound unnatural.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - belonging to God
  lexicon: BDAG
  rationale: The genitive can suggest source, relation, or belonging. 'Of God' preserves
    the Greek form and leaves the relational nuance appropriately broad, fitting a
    title with theological depth.
