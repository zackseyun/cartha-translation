theological_decisions:
- issue: Rendering παραδιδόναι in reference to Judas
  chosen_reading: betray him
  alternative_readings:
  - hand him over
  rationale: The verb παραδίδωμι can be rendered more literally as 'hand over,' but
    in this context Judas's act is morally and narratively characterized as betrayal.
    This is a lexical-contextual decision, not an added doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
