theological_decisions:
- issue: Force of πιστεύω with dative σοι
  chosen_reading: believe you
  alternative_readings:
  - believe in you
  - trust you
  rationale: The Greek construction uses the dative pronoun rather than εἰς + accusative.
    To avoid importing a different Johannine expression, the translation keeps the
    more direct sense 'believe you,' while preserving possible English alternatives
    in a footnote.
