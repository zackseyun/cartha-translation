id: JHN.6.30
reference: John 6:30
source:
  edition: SBLGNT
  text: εἶπον οὖν αὐτῷ· Τί οὖν ποιεῖς σὺ σημεῖον, ἵνα ἴδωμεν καὶ πιστεύσωμέν σοι;
    τί ἐργάζῃ;
translation:
  text: So they said to him, “Then what sign are you doing, so that we may see and
    believe you? What work are you performing?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “believe in you” or “trust you.” The Greek more literally says “believe
      you,” using the dative pronoun rather than the more common Johannine expression
      “believe in.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπον οὖν αὐτῷ
  chosen: So they said to him
  alternatives:
  - Therefore they said to him
  - Then they said to him
  lexicon: BDAG
  rationale: οὖν here is inferential/sequential. 'So' gives natural modern English
    while preserving the discourse connection.
- source_word: Τί οὖν
  chosen: Then what
  alternatives:
  - What then
  - What, then
  lexicon: BDAG
  rationale: The repeated οὖν is retained to reflect the crowd's pressing response.
    'Then what' is idiomatic and keeps the rhetorical force.
- source_word: ποιεῖς σὺ σημεῖον
  chosen: are you doing ... sign
  alternatives:
  - do you do ... sign
  - are you doing as a sign
  lexicon: BDAG
  rationale: ποιεῖς is present tense and σημεῖον is the key Johannine term for a miraculous
    sign. Rendering with progressive English ('are you doing') fits the immediate
    challenge being posed to Jesus.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miraculous sign
  lexicon: BDAG
  rationale: In John, σημεῖον is a theologically loaded term for a sign that points
    beyond itself. 'Sign' preserves Johannine diction better than the more interpretive
    'miraculous sign.'
- source_word: ἵνα ἴδωμεν καὶ πιστεύσωμέν σοι
  chosen: so that we may see and believe you
  alternatives:
  - so that we may see and believe in you
  - that we may see and trust you
  lexicon: BDAG
  rationale: ἵνα with subjunctives expresses purpose/result. πιστεύω with the dative
    σοι is most naturally 'believe you' (believe what you say / believe your claim),
    not the more common Johannine 'believe in you,' which would normally use εἰς.
    This distinction should be preserved.
- source_word: πιστεύσωμέν
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις-family terms are normally rendered with
    'faith/believe' in the main text unless context strongly demands otherwise. 'Believe'
    is the most direct verbal equivalent here.
- source_word: τί ἐργάζῃ
  chosen: What work are you performing?
  alternatives:
  - What are you working?
  - What are you doing?
  lexicon: BDAG
  rationale: ἐργάζομαι emphasizes working/performing rather than the broader ποιέω.
    'Performing' differentiates it from the earlier 'doing' and preserves the rhetorical
    parallel with a slightly more specific nuance.
