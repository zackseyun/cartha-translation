id: JHN.6.65
reference: John 6:65
source:
  edition: SBLGNT
  text: καὶ ἔλεγεν· Διὰ τοῦτο εἴρηκα ὑμῖν ὅτι οὐδεὶς δύναται ἐλθεῖν πρός με ἐὰν μὴ
    ᾖ δεδομένον αὐτῷ ἐκ τοῦ ⸀πατρός.
translation:
  text: And he was saying, “For this reason I have told you that no one is able to
    come to me unless it has been given to him from the Father.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “unless it has been granted to him from the Father.”
    reason: lexical_alternative
  - marker: b
    text: The Greek says “to him,” using a masculine singular form with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  chosen: he was saying
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the discourse
    setting; 'was saying' preserves that aspect better than simple past, while remaining
    natural English.
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Because of this
  - This is why
  lexicon: BDAG
  rationale: This idiom points back to the preceding discussion and introduces an
    explanation. 'For this reason' is a clear, moderately formal rendering that preserves
    the connective force.
- source_word: εἴρηκα
  chosen: I have told
  alternatives:
  - I said
  - I have said
  lexicon: BDAG
  rationale: Perfect tense indicates a prior statement with present relevance. 'I
    have told' fits the direct address to the disciples and sounds more natural in
    English than 'I have said' while preserving the force.
- source_word: οὐδεὶς δύναται
  chosen: no one is able
  alternatives:
  - no one can
  lexicon: BDAG
  rationale: The phrase expresses inability, not mere permission. 'Is able' makes
    the semantic force explicit, though 'can' would also be acceptable.
- source_word: ἐλθεῖν πρός με
  chosen: to come to me
  alternatives:
  - to come toward me
  lexicon: BDAG
  rationale: Standard idiomatic rendering in Johannine context, where 'come to me'
    carries relational and faith-oriented force without needing expansion in translation.
- source_word: ἐὰν μὴ ᾖ δεδομένον
  chosen: unless it has been given
  alternatives:
  - unless it is granted
  - unless it has been granted
  lexicon: BDAG
  rationale: Periphrastic construction with passive participle from δίδωμι conveys
    a granted/given condition. 'Given' is closer to the lexical base; 'granted' is
    interpretive but possible. The passive is preserved without specifying the implied
    giver beyond the following phrase.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to that person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular but generic in reference.
    Following the project's gender-accurate policy, 'him' preserves the source form;
    an inclusive alternative is possible but not adopted in the main text.
- source_word: ἐκ τοῦ πατρός
  chosen: from the Father
  alternatives:
  - by the Father
  lexicon: BDAG
  rationale: ἐκ normally denotes source/origin. 'From the Father' preserves the preposition's
    sense better than the more agentive 'by the Father.' The articular πατρός in Johannine
    context refers to the Father, i.e., God the Father.
