theological_decisions:
- issue: Divine enabling and human ability in coming to Jesus
  chosen_reading: Translate the statement straightforwardly as inability apart from
    what has been given from the Father, without importing a denominational explanation
    of how divine giving and human response relate.
  alternative_readings:
  - Reformed reading emphasizing effectual divine granting
  - Arminian/Wesleyan reading emphasizing prevenient enabling
  rationale: The Greek clearly states a necessary condition for coming to Jesus but
    does not itself resolve later theological debates about the nature or extent of
    that giving. The translation preserves the text's tension rather than systematizing
    it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine αὐτῷ
  chosen_reading: Retain 'to him' in the main text.
  alternative_readings:
  - to that person
  - to them
  rationale: The source uses grammatically masculine singular with generic force.
    Per project policy, the main text should be gender-accurate to the source rather
    than flattened into gender-neutral English; inclusivity can be noted in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
