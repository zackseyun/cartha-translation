id: JHN.6.22
reference: John 6:22
source:
  edition: SBLGNT
  text: Τῇ ἐπαύριον ὁ ὄχλος ὁ ἑστηκὼς πέραν τῆς θαλάσσης ⸀εἶδον ὅτι πλοιάριον ἄλλο
    οὐκ ἦν ἐκεῖ εἰ μὴ ⸀ἕν, καὶ ὅτι οὐ συνεισῆλθεν τοῖς μαθηταῖς αὐτοῦ ὁ Ἰησοῦς εἰς
    τὸ ⸀πλοῖον ἀλλὰ μόνοι οἱ μαθηταὶ αὐτοῦ ἀπῆλθον·
translation:
  text: On the next day, the crowd that had been standing on the other side of the
    sea saw that no other small boat had been there except one, and that Jesus had
    not gone with his disciples into the boat, but that his disciples had gone away
    alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'boat' for 'small boat' (πλοιάριον); the Greek uses a diminutive form
      here.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts and editions vary between 'small boat' (πλοιάριον) and
      'boat' (πλοῖον) in this verse; the translation reflects the wording of the printed
      Greek text in each clause.
    reason: textual_variant
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  chosen: On the next day
  alternatives:
  - The next day
  - On the following day
  lexicon: BDAG
  rationale: Idiomatic temporal dative/adverbial expression introducing the next day's
    events. 'On the next day' is natural English and preserves the temporal transition.
- source_word: ὁ ὄχλος ὁ ἑστηκὼς
  chosen: the crowd that had been standing
  alternatives:
  - the crowd standing
  - the crowd that was standing
  lexicon: BDAG
  rationale: The perfect participle ἑστηκώς conveys a resultant/state nuance ('having
    stood,' thus 'being stationed/remaining'). 'Had been standing' captures the prior
    state relative to the main verb without sounding wooden.
- source_word: πέραν τῆς θαλάσσης
  chosen: on the other side of the sea
  alternatives:
  - across the sea
  - beyond the sea
  lexicon: BDAG
  rationale: πέραν with the genitive indicates location on the far side. 'On the other
    side of the sea' is clear and fits Johannine geography.
- source_word: εἶδον
  chosen: saw
  alternatives:
  - noticed
  - realized
  lexicon: BDAG
  rationale: Although the plural form can create a grammatical difficulty with singular
    ὄχλος, the sense is straightforward perception. 'Saw' preserves the lexical value
    and lets the following ὅτι-clauses explain what they perceived.
- source_word: πλοιάριον
  chosen: small boat
  alternatives:
  - boat
  - little boat
  lexicon: BDAG
  rationale: πλοιάριον is a diminutive form, so 'small boat' preserves the nuance
    better than simply 'boat.'
- source_word: ἄλλο οὐκ ἦν ἐκεῖ εἰ μὴ ἕν
  chosen: no other small boat had been there except one
  alternatives:
  - there had been no other boat there except one
  - no other small boat was there except one
  lexicon: BDAG
  rationale: 'This construction emphasizes exclusivity: there was not another boat
    present except one. The pluperfect-like English ''had been there'' fits the retrospective
    observation in context.'
- source_word: συνεισῆλθεν
  chosen: had not gone with
  alternatives:
  - did not enter with
  - had not boarded with
  lexicon: BDAG
  rationale: The compound verb literally means 'went in with/entered with.' In context
    of boarding a boat, 'had not gone with' is idiomatic and avoids awkward English
    while preserving the sense of accompanying the disciples into the boat.
- source_word: εἰς τὸ πλοῖον
  chosen: into the boat
  alternatives:
  - into the small boat
  - into the vessel
  lexicon: BDAG
  rationale: Here the manuscript reads πλοῖον rather than πλοιάριον. 'Boat' is the
    natural English equivalent; using 'the boat' maintains readability while reflecting
    the article.
- source_word: μόνοι
  chosen: alone
  alternatives:
  - by themselves
  - without him
  lexicon: BDAG
  rationale: μόνοι highlights that the disciples departed without Jesus. 'Alone' is
    concise and preserves the exclusion.
- source_word: ἀπῆλθον
  chosen: had gone away
  alternatives:
  - left
  - departed
  lexicon: BDAG
  rationale: ἀπέρχομαι means 'go away/depart.' 'Had gone away' fits the explanatory,
    retrospective force of the clause in context.
