theological_decisions:
- issue: Rendering of σκανδαλίζει in a context of potential rejection of Jesus' teaching
  chosen_reading: Does this offend you?
  alternative_readings:
  - Does this cause you to stumble?
  rationale: The Greek permits both emotional offense and the stronger idea of being
    tripped into unbelief or defection. The main text uses the more natural contemporary
    English 'offend' in keeping with optimal equivalence, while the footnote preserves
    the metaphorically richer alternative so the translation does not flatten the
    theological tension.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
