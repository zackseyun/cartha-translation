id: JHN.6.61
reference: John 6:61
source:
  edition: SBLGNT
  text: εἰδὼς δὲ ὁ Ἰησοῦς ἐν ἑαυτῷ ὅτι γογγύζουσιν περὶ τούτου οἱ μαθηταὶ αὐτοῦ εἶπεν
    αὐτοῖς· Τοῦτο ὑμᾶς σκανδαλίζει;
translation:
  text: But Jesus, knowing in himself that his disciples were grumbling about this,
    said to them, “Does this offend you?"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Does this cause you to stumble?”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - aware
  - having known
  lexicon: BDAG
  rationale: A participial form from οἶδα/ὁράω used with ὁ Ἰησοῦς; 'knowing' preserves
    the contemporaneous participial sense naturally in English without overcomplicating
    the syntax.
- source_word: ἐν ἑαυτῷ
  chosen: in himself
  alternatives:
  - within himself
  - in himself internally
  lexicon: BDAG
  rationale: The phrase indicates Jesus' internal knowledge rather than knowledge
    gained from outward report. 'In himself' is a transparent, fairly literal rendering
    that preserves this nuance.
- source_word: γογγύζουσιν
  chosen: were grumbling
  alternatives:
  - are grumbling
  - were murmuring
  - were complaining
  lexicon: BDAG
  rationale: The verb denotes muttering or grumbling in dissatisfaction. 'Were grumbling'
    fits the narrative past context in idiomatic English and preserves the negative,
    subdued complaint better than 'complaining.' 'Murmuring' is possible but less
    natural in contemporary English.
- source_word: περὶ τούτου
  chosen: about this
  alternatives:
  - concerning this
  - about it
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase referring back
    to Jesus' preceding hard saying. 'About this' is natural and sufficiently precise.
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard idiomatic rendering. In context this refers to the broader group
    of disciples, not only the Twelve, and 'his disciples' preserves that without
    interpretive expansion.
- source_word: Τοῦτο
  chosen: this
  alternatives:
  - this teaching
  - this matter
  lexicon: BDAG
  rationale: The demonstrative is left concise in Greek. Rendering simply as 'this'
    avoids adding an explanatory noun not present in the text, while still pointing
    to the immediately preceding discourse.
- source_word: σκανδαλίζει
  chosen: offend
  alternatives:
  - cause to stumble
  - shock
  - trip up
  lexicon: BDAG
  rationale: The verb can mean to cause offense or to cause someone to stumble/fall
    away. In this immediate question, 'offend' is concise and idiomatic, while a footnote
    preserves the fuller metaphorical alternative 'cause to stumble,' which is theologically
    and lexically important in Johannine/NT usage.
