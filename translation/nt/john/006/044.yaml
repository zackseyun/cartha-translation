id: JHN.6.44
reference: John 6:44
source:
  edition: SBLGNT
  text: οὐδεὶς δύναται ἐλθεῖν πρός ⸀με ἐὰν μὴ ὁ πατὴρ ὁ πέμψας με ἑλκύσῃ αὐτόν, κἀγὼ
    ἀναστήσω αὐτὸν ἐν τῇ ἐσχάτῃ ἡμέρᾳ.
translation:
  text: No one is able to come to me unless the Father who sent me draws him, and
    I will raise him up on the last day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drags him' or 'pulls him.' The Greek verb can carry a stronger sense
      of drawing or pulling; 'draws' is used in the main text to preserve the wording
      without forcing a particular theological explanation of how the Father brings
      a person to the Son.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'him' with representative force; the statement applies generally,
      not only to males.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: No one
  alternatives:
  - No person
  - Nobody
  lexicon: BDAG
  rationale: Indefinite negative subject is best rendered idiomatically as 'No one'
    in natural English while preserving the universal negation.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  lexicon: BDAG
  rationale: Rendered as 'is able' to preserve the explicit sense of ability/power
    rather than the slightly looser English modal 'can.' This keeps the statement's
    force about inability.
- source_word: ἐλθεῖν πρός με
  chosen: to come to me
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering of motion toward Jesus;
    preserves the relational and salvific force of 'come' in Johannine usage without
    overinterpreting it.
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: This conditional construction is naturally expressed in English as 'unless.'
- source_word: ὁ πατὴρ ὁ πέμψας με
  chosen: the Father who sent me
  alternatives:
  - the Father, the one who sent me
  lexicon: BDAG
  rationale: The articular participle ὁ πέμψας is smoothly rendered as a relative
    clause in English. 'The Father' preserves the personal designation used by Jesus.
- source_word: ἑλκύσῃ
  chosen: draws
  alternatives:
  - drags
  - pulls
  lexicon: BDAG
  rationale: '''Draws'' is the best optimal-equivalence rendering here: it preserves
    the verb''s movement-causing force without importing a more physically harsh image
    (''drags'') into a context of coming to Jesus. Because the term is theologically
    contested, the stronger alternative is preserved in a footnote rather than resolved
    away.'
- source_word: αὐτόν
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The Greek pronoun is grammatically masculine singular. Per the gender-accurate
    policy, 'him' is retained in the main text as representative/generic rather than
    neutralized.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: The crasis joins καί + ἐγώ. 'And I' preserves the emphatic subject adequately
    in English without overemphasis.
- source_word: ἀναστήσω
  chosen: will raise ... up
  alternatives:
  - will resurrect
  lexicon: BDAG
  rationale: In Johannine resurrection contexts, 'raise up' is the established and
    accurate rendering, preserving both literal resurrection sense and verbal linkage
    within the discourse.
- source_word: ἐν τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - at the last day
  lexicon: BDAG
  rationale: Idiomatic English prefers 'on the last day.' This preserves the eschatological
    reference without archaic phrasing.
