theological_decisions:
- issue: Meaning of ἑλκύσῃ in a soteriologically contested context
  chosen_reading: draws
  alternative_readings:
  - drags
  - pulls
  rationale: The verb can denote forceful drawing or pulling in some contexts, but
    in John 6:44 a neutral-to-strong 'draws' best preserves the lexical range without
    importing a denominational conclusion about the mechanics of grace. This follows
    the doctrine principle of preserving theological tension rather than resolving
    it beyond what the Greek unambiguously states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Rendering masculine αὐτόν generically
  chosen_reading: him
  alternative_readings:
  - that person
  rationale: The Greek uses a masculine singular pronoun with representative force.
    Per the translation policy, the main text should remain gender-accurate rather
    than flattening to a neutral paraphrase; inclusivity concerns can be addressed
    in a footnote if needed.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
