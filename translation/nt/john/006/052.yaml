theological_decisions:
- issue: Rendering of σάρξ in a theologically charged Eucharistic/literal context
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The doctrine table specifies σάρξ as 'flesh' when literal and 'sinful
    nature' when metaphorical. In this verse the crowd reacts to Jesus' words in concrete,
    physical terms, so 'flesh' best preserves the lexical form and the theological
    tension of the passage without importing a sacramental interpretation into the
    translation.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ *sarx* → ''flesh'' (literal)
    / ''sinful nature'' (metaphorical)'
- issue: Potential narrowing of οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation follows the explicit Greek wording rather than resolving
    the debated referent in the main text. Because John's usage can be heard broadly
    by modern readers, an alternative is preserved in a footnote for transparency
    without altering the text beyond what the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
