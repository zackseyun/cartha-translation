id: JHN.6.52
reference: John 6:52
source:
  edition: SBLGNT
  text: Ἐμάχοντο οὖν πρὸς ἀλλήλους οἱ Ἰουδαῖοι λέγοντες· Πῶς δύναται οὗτος ἡμῖν δοῦναι
    τὴν σάρκα ⸀αὐτοῦ φαγεῖν;
translation:
  text: So the Jews were arguing among themselves, saying, “How can this man give
    us his flesh to eat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' or, contextually, 'the Jewish leaders.' The Greek reads
      simply 'the Jews.'
    reason: alternative_reading
  - marker: b
    text: Or 'his body.' The Greek word is 'flesh' (σάρξ), retained here to preserve
      the concrete wording and tension of the passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐμάχοντο
  chosen: were arguing
  alternatives:
  - were fighting
  - were disputing
  - were quarreling
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing contention. 'Were arguing' captures
    sustained verbal conflict in readable English without overstating it as physical
    fighting.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative development from the preceding discourse. 'So' is natural
    modern English and preserves the inferential/sequential force.
- source_word: πρὸς ἀλλήλους
  chosen: among themselves
  alternatives:
  - with one another
  - against one another
  lexicon: BDAG
  rationale: Idiomatic rendering of reciprocal conflict. 'Among themselves' fits English
    style with 'arguing' and conveys internal dispute within the group.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek explicitly says 'the Jews.' While in John the referent can
    be more specific contextually, this verse does not lexically narrow the term,
    so the direct rendering is retained.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - and saying
  lexicon: BDAG
  rationale: Participle introducing the content of their dispute; 'saying' is the
    straightforward discourse marker.
- source_word: Πῶς δύναται
  chosen: How can
  alternatives:
  - How is ... able to
  - How could
  lexicon: BDAG
  rationale: Natural English rendering of the question about possibility/ability.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: Demonstrative used with a dismissive or distancing tone in context. 'This
    man' preserves that force better than the bare 'he'.
- source_word: ἡμῖν
  chosen: us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: Indirect object of 'give'; English idiom omits the preposition.
- source_word: δοῦναι
  chosen: give
  alternatives:
  - grant
  - provide
  lexicon: BDAG
  rationale: Basic sense of δίδωμι; no contextual reason to heighten or soften it.
- source_word: τὴν σάρκα αὐτοῦ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' in literal contexts. Here the
    hearers understand Jesus' statement in concrete terms, so 'flesh' should be preserved
    rather than interpreted as 'body'.
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - for eating
  lexicon: BDAG
  rationale: Complementary infinitive after 'give us'; 'to eat' is the direct and
    idiomatic rendering.
