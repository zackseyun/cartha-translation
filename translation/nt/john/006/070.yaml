theological_decisions:
- issue: Whether διάβολός should be rendered as identification with Satan or as a
    qualitative description
  chosen_reading: a devil
  alternative_readings:
  - the devil
  - a slanderer
  rationale: Because διάβολος lacks the article here, the sense is qualitative rather
    than a direct identification with Satan. Rendering it 'a devil' preserves the
    force of Jesus' statement without making Judas ontologically identical with Satan.
    'A slanderer' captures part of the lexical sense but weakens the theological and
    rhetorical weight of the Johannine expression.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
