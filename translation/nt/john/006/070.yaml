id: JHN.6.70
reference: John 6:70
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς· Οὐκ ἐγὼ ὑμᾶς τοὺς δώδεκα ἐξελεξάμην; καὶ ἐξ ὑμῶν
    εἷς διάβολός ἐστιν.
translation:
  text: Jesus answered them, “Did I not choose you, the Twelve? Yet one of you is
    a devil.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a slanderer.” The Greek word can denote a false accuser or, in many
      contexts, the Devil. Here the wording is qualitative rather than a direct identification
      with Satan.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for response; 'answered' is the most natural
    and common English equivalent in Johannine dialogue.
- source_word: Οὐκ ἐγὼ ... ἐξελεξάμην;
  chosen: Did I not choose
  alternatives:
  - Have I not chosen
  lexicon: BDAG
  rationale: The aorist middle with οὐκ in a question expects an affirmative answer.
    English idiom is best captured by 'Did I not choose,' preserving the rhetorical
    force without overtranslating aspect.
- source_word: ὑμᾶς τοὺς δώδεκα
  chosen: you, the Twelve
  alternatives:
  - you twelve
  - you, the twelve
  lexicon: BDAG
  rationale: The article with δώδεκα points to the recognized group of disciples/apostles.
    Capitalizing 'the Twelve' reflects its function as a group designation in context.
- source_word: καὶ
  chosen: Yet
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: 'Though καὶ is formally ''and,'' the discourse sense here is mildly adversative/contrastive:
    despite Jesus'' choosing the Twelve, one is opposed. ''Yet'' conveys the contrast
    naturally in English.'
- source_word: ἐξ ὑμῶν
  chosen: of you
  alternatives:
  - from among you
  lexicon: BDAG
  rationale: Both are possible, but 'one of you' is the most idiomatic English rendering
    and adequately represents the partitive sense.
- source_word: διάβολός
  chosen: a devil
  alternatives:
  - a slanderer
  - the devil
  lexicon: BDAG
  rationale: The anarthrous predicate noun does not identify the person as Satan himself
    ('the devil') but characterizes him as devil-like, i.e., an adversarial accuser.
    'A devil' preserves the sharpness of the Greek and the traditional Johannine wording
    better than the softened 'a slanderer.'
