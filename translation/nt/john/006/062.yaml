id: JHN.6.62
reference: John 6:62
source:
  edition: SBLGNT
  text: ἐὰν οὖν θεωρῆτε τὸν υἱὸν τοῦ ἀνθρώπου ἀναβαίνοντα ὅπου ἦν τὸ πρότερον;
translation:
  text: Then what if you were to see the Son of Man ascending to where he was before?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then if you were to see the Son of Man ascending where he was before.'
      The Greek is a rhetorical conditional question.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Then what if
  alternatives:
  - Therefore if
  - Then if
  lexicon: BDAG
  rationale: The combination introduces a rhetorical conditional question flowing
    from the previous offense taken at Jesus' words. 'Then what if' captures both
    οὖν's inferential force and ἐὰν's conditional sense in idiomatic English.
- source_word: θεωρῆτε
  chosen: you were to see
  alternatives:
  - you see
  - you behold
  - you observe
  lexicon: BDAG
  rationale: θεωρέω often carries the sense of seeing attentively or beholding. In
    this conditional construction, 'were to see' is natural English and preserves
    the prospective force without sounding wooden.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels and should
    be preserved as the recognized title rather than paraphrased. It also retains
    the Danielic and messianic resonance present in the Greek.
- source_word: ἀναβαίνοντα
  chosen: ascending
  alternatives:
  - going up
  - rising
  lexicon: BDAG
  rationale: The participle denotes upward movement. 'Ascending' preserves the elevated
    and possibly heavenly sense better than the more ordinary 'going up.'
- source_word: ὅπου ἦν τὸ πρότερον
  chosen: to where he was before
  alternatives:
  - where he was formerly
  - where he was previously
  lexicon: BDAG
  rationale: This phrase points to a prior state or location. 'To where he was before'
    is clear, natural English and preserves the temporal priority implied by τὸ πρότερον.
