theological_decisions:
- issue: Whether the verse should explicitly interpret Jesus' ascent as a claim of
    preexistence and heavenly origin
  chosen_reading: Retain the wording 'to where he was before' without adding interpretive
    expansion.
  alternative_readings:
  - to heaven, where he was before
  - back to the Father, where he was before
  rationale: The Greek strongly implies prior existence and ascent, but the verse
    itself does not explicitly name heaven or the Father. In keeping with optimal
    equivalence and the instruction not to import doctrinal claims beyond the text,
    the translation preserves the statement as given while allowing its Christological
    force to stand.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
