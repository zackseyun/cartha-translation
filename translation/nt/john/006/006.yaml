id: JHN.6.6
reference: John 6:6
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἔλεγεν πειράζων αὐτόν, αὐτὸς γὰρ ᾔδει τί ἔμελλεν ποιεῖν.
translation:
  text: But he was saying this to test him, for he himself knew what he was about
    to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to try him'; the verb can also mean 'to tempt,' but here the sense is
      to test or prove him.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  lexicon: BDAG
  rationale: Demonstrative accusative singular referring to Jesus' preceding statement/question;
    straightforwardly rendered 'this.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best captures the explanatory
    contrast with the prior question, while remaining natural in English.
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or in-progress speech in narrative.
    'Was saying' preserves the aspect better than simple 'said,' though English style
    remains natural.
- source_word: πειράζων
  chosen: to test
  alternatives:
  - testing
  - to try
  - to tempt
  lexicon: BDAG
  rationale: The participle explains purpose/circumstance. In this context Jesus is
    proving or testing Philip, not enticing him to sin, so 'to test' is preferable
    to 'to tempt.' Rendering it with an English infinitive communicates the participle's
    adverbial force smoothly.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object of πειράζων, referring to Philip in the immediate context.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. 'He himself' preserves the emphasis
    that Jesus already knew his intended action.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the explanation for why Jesus spoke this way. 'For' is
    concise and fits the narrative register.
- source_word: ᾔδει
  chosen: knew
  alternatives:
  - had known
  lexicon: BDAG
  rationale: Pluperfect-form with imperfect meaning from οἶδα; in Koine it commonly
    functions as a simple past stative, so 'knew' is the most natural English rendering.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: Interrogative/indefinite neuter introducing the content of Jesus' knowledge;
    idiomatic English is 'what.'
- source_word: ἔμελλεν ποιεῖν
  chosen: was about to do
  alternatives:
  - intended to do
  - was going to do
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates impending or intended action. 'Was about
    to do' preserves the forward-looking sense without overinterpreting whether the
    emphasis is on imminence or intention alone.
