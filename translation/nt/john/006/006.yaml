theological_decisions:
- issue: Meaning of πειράζων in relation to Jesus' action toward Philip
  chosen_reading: Rendered as 'to test' rather than 'to tempt.'
  alternative_readings:
  - to tempt
  rationale: Given the immediate context, Jesus is probing Philip's understanding
    and faith, not soliciting evil. This preserves the narrative sense and avoids
    implying moral enticement where the Greek can denote testing/proving.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    according to the source text's plain sense in context.
- issue: Emphasis on Jesus' foreknowledge
  chosen_reading: Retained emphatic 'he himself knew.'
  alternative_readings:
  - he knew
  rationale: The explicit pronoun αὐτὸς adds emphasis and supports the verse's portrayal
    of Jesus' intentionality and prior knowledge. The translation preserves that emphasis
    without expanding into doctrinal paraphrase.
  doctrine_reference: Original-language primacy over translation tradition; do not
    import doctrinal claims beyond the text.
