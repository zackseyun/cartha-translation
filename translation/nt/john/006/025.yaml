id: JHN.6.25
reference: John 6:25
source:
  edition: SBLGNT
  text: Καὶ εὑρόντες αὐτὸν πέραν τῆς θαλάσσης εἶπον αὐτῷ· Ῥαββί, πότε ὧδε γέγονας;
translation:
  text: And when they found him on the other side of the sea, they said to him, “Rabbi,
    when did you get here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “when have you come here?” The Greek perfect verb can be rendered more
      formally that way, but the idiomatic sense in context is arrival: “when did
      you get here?”'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρόντες
  chosen: when they found
  alternatives:
  - having found
  - after finding
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is rendered with a temporal
    sense in natural English. 'When they found' preserves the sequence without sounding
    wooden.
- source_word: πέραν τῆς θαλάσσης
  chosen: on the other side of the sea
  alternatives:
  - beyond the sea
  - across the sea
  lexicon: BDAG
  rationale: πέραν with the genitive indicates location across/beyond. In context,
    'on the other side of the sea' is idiomatic and clear, preserving the geographical
    contrast from the previous narrative.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: This is a transliterated form used as a direct address. Retaining 'Rabbi'
    preserves the Jewish setting and the specific honorific; 'Teacher' is interpretive
    and better left implicit or footnoted elsewhere if needed.
- source_word: πότε
  chosen: when
  alternatives:
  - at what time
  lexicon: BDAG
  rationale: Standard temporal interrogative; 'when' is the natural English equivalent.
- source_word: ὧδε
  chosen: here
  alternatives:
  - to this place
  lexicon: BDAG
  rationale: Adverb of place meaning 'here' or 'to this place.' 'Here' is concise
    and idiomatic in the question.
- source_word: γέγονας
  chosen: did you get
  alternatives:
  - have you come
  - have you become
  lexicon: BDAG
  rationale: Perfect of γίνομαι here functions idiomatically for arrival/presence
    in a place. English commonly expresses this as 'did you get here?' which best
    matches the sense in context. 'Have you come here?' is possible but less natural;
    'have you become' is not contextually viable.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: Simple connective linking the event to the preceding narrative. 'And'
    preserves the narrative flow without adding interpretive force.
- source_word: εἶπον αὐτῷ
  chosen: they said to him
  alternatives:
  - they asked him
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say.' Although the content is a question,
    'said to him' stays closer to the Greek than the more interpretive 'asked him.'
