theological_decisions:
- issue: Meaning of 'the work of God' (τοῦ θεοῦ genitive)
  chosen_reading: Retain the ambiguous phrase 'the work of God' in the main text.
  alternative_readings:
  - the work God requires
  - the work God does
  rationale: The Greek genitive can be heard as objective or subjective. In context,
    Jesus answers a question about what people must do, which supports 'the work God
    requires'; yet his answer centers on believing in the one God sent, which also
    resists a merely works-based framing and may imply God's own operative work. Per
    translation philosophy, the ambiguity is preserved rather than doctrinally resolved.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering πιστεύητε / πιστεύω language
  chosen_reading: Translate as 'believe in.'
  alternative_readings:
  - trust in
  rationale: The project default for the pistis word-group is 'faith,' with alternatives
    footnoted where contested. Here the verbal form πιστεύω with εἰς is not a major
    doctrinally contested construction like pistis Christou, so 'believe in' is retained
    as the clearest and most standard rendering, while acknowledging 'trust in' as
    a lexical nuance.
  doctrine_reference: 'Contested terms table: πίστις default English ''faith''; alternatives
    include ''trust''.'
