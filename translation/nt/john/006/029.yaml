id: JHN.6.29
reference: John 6:29
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀ὁ Ἰησοῦς καὶ εἶπεν αὐτοῖς· Τοῦτό ἐστιν τὸ ἔργον τοῦ θεοῦ ἵνα ⸀πιστεύητε
    εἰς ὃν ἀπέστειλεν ἐκεῖνος.
translation:
  text: 'Jesus answered and said to them, “This is the work of God: that you believe
    in the one whom he has sent.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the work God requires” or “the work God does.” The Greek phrase “the
      work of God” can be understood in more than one way, and the wording here preserves
      that ambiguity.
    reason: alternative_reading
  - marker: b
    text: Or “trust in the one whom he has sent.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; concise and
    natural in English.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Common complement to 'answered' in Johannine narrative; preserves the
    two-verb Greek construction without awkwardness.
- source_word: Τοῦτό ἐστιν
  chosen: This is
  alternatives:
  - This is what
  lexicon: BDAG
  rationale: Directly reflects the demonstrative plus copula construction and keeps
    the statement emphatic.
- source_word: τὸ ἔργον τοῦ θεοῦ
  chosen: the work of God
  alternatives:
  - God's work
  - the work God requires
  lexicon: BDAG
  rationale: A formally close rendering that preserves the genitive's ambiguity. In
    context it may mean either the work that belongs to God or the work God requires/produces;
    the main text keeps the Greek tension rather than resolving it.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/result clause naturally in English after 'This
    is the work of God,' while remaining close to the Greek.
- source_word: πιστεύητε
  chosen: you believe
  alternatives:
  - you may believe
  - you keep believing
  - you trust
  lexicon: BDAG
  rationale: Default rendering of πιστεύω is 'believe.' The present subjunctive here
    is best represented idiomatically as 'you believe' rather than a more wooden 'you
    may believe.' 'Trust' is a legitimate nuance but 'believe' better matches the
    project's default handling of the pistis word-group unless context strongly demands
    otherwise.
- source_word: εἰς ὃν
  chosen: in the one whom
  alternatives:
  - into the one whom
  - in him whom
  lexicon: BDAG
  rationale: πιστεύω εἰς in John regularly carries the sense 'believe in.' Rendering
    ὃν as 'the one whom' preserves the personal object and avoids overtranslation.
- source_word: ἀπέστειλεν
  chosen: he has sent
  alternatives:
  - he sent
  lexicon: BDAG
  rationale: Although the Greek is aorist, English present perfect is idiomatic here
    because the sending has abiding relevance in the discourse about Jesus' mission.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  lexicon: BDAG
  rationale: Refers to God and is naturally rendered by the pronoun 'he' in English.
    A more literal 'that one' would sound unnatural and add emphasis not required
    in English.
