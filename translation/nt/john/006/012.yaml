theological_decisions:
- issue: Potential theological overreading of ἀπόληται in a sign context
  chosen_reading: Rendered as 'lost' in its immediate material sense, without importing
    a soteriological meaning into this verse.
  alternative_readings:
  - '''wasted'' as a purely practical paraphrase'
  - '''perish'' with possible theological resonance'
  rationale: In context Jesus is speaking about gathering leftover food after the
    feeding. Although John elsewhere uses ἀπόλλυμι in theological contexts, here the
    immediate referent is the remaining pieces. The translation preserves the lexical
    wording 'lost' and allows readers to notice possible Johannine resonance without
    making it explicit in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
