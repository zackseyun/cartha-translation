id: JHN.6.12
reference: John 6:12
source:
  edition: SBLGNT
  text: ὡς δὲ ἐνεπλήσθησαν λέγει τοῖς μαθηταῖς αὐτοῦ· Συναγάγετε τὰ περισσεύσαντα
    κλάσματα, ἵνα μή τι ἀπόληται.
translation:
  text: And when they were filled, he says to his disciples, “Gather up the leftover
    broken pieces, so that nothing may be lost.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were satisfied' or 'they had eaten their fill.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek has the historical present: ''he says.'' Some translations smooth
      this to ''he said.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'fragments.'
    reason: lexical_alternative
  - marker: d
    text: Or 'so that nothing may be wasted.' The Greek more literally says 'so that
      nothing may be lost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: And when
  alternatives:
  - Now when
  - When then
  lexicon: BDAG
  rationale: Renders the temporal force of ὡς with the mild connective δέ in natural
    English. 'And when' preserves the narrative flow without overtranslating δέ.
- source_word: ἐνεπλήσθησαν
  chosen: they were filled
  alternatives:
  - they were satisfied
  - they had eaten their fill
  lexicon: BDAG
  rationale: The passive of ἐμπίμπλημι means to be filled or satisfied with food.
    'They were filled' stays closer to the Greek while still making sense in context;
    'satisfied' is possible but slightly more interpretive.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is retained as a historical present, a common Johannine
    narrative feature. English can naturally preserve this with 'he says,' though
    'he said' is a smoother idiomatic alternative.
- source_word: μαθηταῖς
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for
    μαθηταί in the Gospels; ''followers'' is too weak and less specific.'
- source_word: Συναγάγετε
  chosen: Gather up
  alternatives:
  - Collect
  - Gather together
  lexicon: BDAG
  rationale: The aorist imperative calls for a direct command. 'Gather up' is idiomatic
    in context and fits the action of collecting food fragments.
- source_word: τὰ περισσεύσαντα
  chosen: the leftover
  alternatives:
  - what remains
  - the remaining
  lexicon: BDAG
  rationale: The participle from περισσεύω refers to what is left over in excess after
    the meal. 'The leftover' is concise and natural in English.
- source_word: κλάσματα
  chosen: broken pieces
  alternatives:
  - fragments
  - pieces
  lexicon: BDAG
  rationale: κλάσματα refers to pieces broken from the bread. 'Broken pieces' preserves
    the connection to the bread being broken, while 'fragments' is also viable and
    traditional.
- source_word: ἵνα μή τι ἀπόληται
  chosen: so that nothing may be lost
  alternatives:
  - so that none of it may perish
  - so that nothing may be wasted
  lexicon: BDAG
  rationale: ἀπόλλυμι here most naturally means 'be lost' rather than the stronger
    'perish.' 'Nothing' reflects the neuter indefinite τι in context, referring to
    the leftover pieces. 'Wasted' captures the practical sense but is more interpretive
    than the Greek wording.
