id: JHN.6.11
reference: John 6:11
source:
  edition: SBLGNT
  text: ἔλαβεν ⸀οὖν τοὺς ἄρτους ὁ Ἰησοῦς καὶ εὐχαριστήσας ⸀διέδωκεν τοῖς ἀνακειμένοις,
    ὁμοίως καὶ ἐκ τῶν ὀψαρίων ὅσον ἤθελον.
translation:
  text: So Jesus took the loaves, and after giving thanks he distributed them to those
    who were reclining; likewise also from the fish, as much as they wanted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who were seated.' The Greek more literally says 'to those who
      were reclining,' the customary posture for a meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the small fish.' The Greek term can refer to fish eaten with bread,
      possibly small fish.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative/logical progression. 'So' is natural modern English
    and preserves the connective force without sounding overly formal like 'therefore'
    or overly flat like 'then'.
- source_word: ἄρτους
  chosen: loaves
  alternatives:
  - bread
  lexicon: BDAG
  rationale: ἄρτος can mean bread generally, but in this feeding context the plural
    naturally refers to individual loaves. 'Loaves' is more precise and idiomatic
    here.
- source_word: εὐχαριστήσας
  chosen: after giving thanks
  alternatives:
  - having given thanks
  - after thanking God
  lexicon: BDAG
  rationale: The aorist participle is best represented as antecedent action to the
    main verb. 'After giving thanks' is clear modern English and avoids adding an
    explicit object ('God') not stated in the Greek.
- source_word: διέδωκεν
  chosen: distributed them
  alternatives:
  - gave out
  - distributed
  lexicon: BDAG
  rationale: διαδίδωμι here conveys distribution among the crowd, not merely a simple
    giving. 'Distributed them' captures the distributive sense and supplies the implied
    object from 'the loaves' in natural English.
- source_word: τοῖς ἀνακειμένοις
  chosen: to those who were reclining
  alternatives:
  - to those who were seated
  - to those reclining
  lexicon: BDAG
  rationale: ἀνάκειμαι commonly refers to reclining for a meal. Although many English
    versions use 'seated' for readability, 'reclining' better reflects the Greek and
    the meal setting.
- source_word: ὁμοίως καὶ
  chosen: likewise also
  alternatives:
  - likewise
  - and likewise
  - in the same way also
  lexicon: BDAG
  rationale: The combination adds emphatic parallelism between the loaves and the
    fish. 'Likewise also' preserves both elements, though somewhat compactly.
- source_word: ἐκ τῶν ὀψαρίων
  chosen: from the fish
  alternatives:
  - from the small fish
  - from the fish as well
  lexicon: BDAG
  rationale: ὀψάριον often refers to fish eaten as a relish or small fish. 'Fish'
    is the most natural English rendering here; 'small fish' is possible but too specific
    for the main text.
- source_word: ὅσον ἤθελον
  chosen: as much as they wanted
  alternatives:
  - as much as they wished
  - as much as they desired
  lexicon: BDAG
  rationale: The phrase expresses unrestricted quantity according to the crowd's desire.
    'Wanted' is natural, clear, and faithful to θέλω in this context.
