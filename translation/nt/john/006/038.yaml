theological_decisions:
- issue: Relation of Jesus' descent from heaven to Christology
  chosen_reading: 'Render the statement straightforwardly as a claim of heavenly origin:
    ''I have come down from heaven.'''
  alternative_readings:
  - A merely metaphorical statement of divine commission
  rationale: The verse itself presents Jesus' origin in heavenly terms and should
    not be weakened into mere mission language. This aligns with Johannine context
    and historic orthodox Christology while not adding explanatory doctrinal language
    beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
- issue: Rendering θέλημα in relation to the Father and the Son
  chosen_reading: Use 'will' in both instances and preserve the contrast without explaining
    it away.
  alternative_readings:
  - Translate more dynamically as 'what I want' / 'what he wants'
  rationale: The verse expresses a real distinction of willing between the Son and
    the one who sent him at the level of mission and obedience. 'Will' preserves the
    theological weight and the text's symmetry without importing later technical categories
    or diminishing the distinction.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
