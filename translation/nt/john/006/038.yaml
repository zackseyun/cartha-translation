id: JHN.6.38
reference: John 6:38
source:
  edition: SBLGNT
  text: ὅτι καταβέβηκα ⸀ἀπὸ τοῦ οὐρανοῦ οὐχ ἵνα ποιῶ τὸ θέλημα τὸ ἐμὸν ἀλλὰ τὸ θέλημα
    τοῦ πέμψαντός με·
translation:
  text: For I have come down from heaven, not to do my own will, but the will of the
    one who sent me.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces the explanation for the preceding statement,
    so 'For' reads naturally in English while preserving the causal force. 'Because'
    is possible but slightly heavier stylistically.
- source_word: καταβέβηκα
  chosen: I have come down
  alternatives:
  - I have descended
  - I came down
  lexicon: BDAG
  rationale: The perfect form conveys a completed action with present relevance. 'I
    have come down' preserves that force in idiomatic English better than the more
    formal 'I have descended.' 'I came down' is possible but weakens the perfect aspect.
- source_word: ἀπὸ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the prepositional phrase.
    'From heaven' preserves both the spatial imagery and Johannine theological resonance.
- source_word: οὐχ ἵνα
  chosen: not to
  alternatives:
  - not in order to
  - not that
  lexicon: BDAG
  rationale: The combination expresses purpose. 'Not to' is concise, natural English
    that preserves the purposive sense without sounding wooden.
- source_word: ποιῶ
  chosen: do
  alternatives:
  - carry out
  - perform
  lexicon: BDAG
  rationale: '''Do'' is the most direct equivalent and fits the repeated θέλημα construction
    naturally in English. More expansive options add nuance not required by the Greek.'
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - what ... wants
  - desire
  lexicon: BDAG
  rationale: θέλημα is best rendered 'will' here, preserving both the personal and
    theological sense of intention/purpose. Dynamic alternatives flatten the formal
    parallelism of the verse.
- source_word: τὸ ἐμὸν
  chosen: my own
  alternatives:
  - my
  lexicon: BDAG
  rationale: The possessive adjective is emphatic. 'My own' brings out the contrast
    with the Father's will more clearly than a bare 'my' in English.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: The adversative contrast is straightforward. 'But' preserves the simple
    and forceful opposition between two purposes.
- source_word: τοῦ πέμψαντός με
  chosen: of the one who sent me
  alternatives:
  - of him who sent me
  - of my sender
  lexicon: BDAG
  rationale: The articular participle is most naturally rendered with a personal expression
    in English. 'The one who sent me' is clear, accurate, and preserves the relational
    emphasis without prematurely specifying beyond the Greek expression itself.
