id: JHN.6.57
reference: John 6:57
source:
  edition: SBLGNT
  text: καθὼς ἀπέστειλέν με ὁ ζῶν πατὴρ κἀγὼ ζῶ διὰ τὸν πατέρα, καὶ ὁ τρώγων με κἀκεῖνος
    ⸀ζήσει δι’ ἐμέ.
translation:
  text: Just as the living Father sent me, and I live because of the Father, so also
    the one who feeds on me will live because of me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who eats me.' The Greek verb is vivid and concrete, literally
      referring to eating/chewing.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the Father' and 'through me.' The Greek preposition can be understood
      in a causal or instrumental sense; here the main text uses the causal sense
      to preserve the Father-Son / Son-believer parallel.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς
  chosen: Just as
  alternatives:
  - As
  - Just as ... so also
  lexicon: BDAG
  rationale: Introduces a comparison. 'Just as' clearly signals the analogy that governs
    the whole sentence; the corresponding 'so also' is supplied in English for natural
    balance, though not separately expressed by a δεύτερον καθώς.
- source_word: ὁ ζῶν πατὴρ
  chosen: the living Father
  alternatives:
  - the Father who lives
  - the life-giving Father
  lexicon: BDAG
  rationale: The participle ζῶν is attributive with πατήρ. 'The living Father' is
    the most direct rendering and preserves the Johannine emphasis on divine life.
    'Life-giving Father' would overinterpret the participle's force here.
- source_word: ἀπέστειλέν
  chosen: sent
  alternatives:
  - has sent
  - commissioned
  lexicon: BDAG
  rationale: Aorist indicative is best rendered simply as past 'sent' in this comparative
    statement. 'Commissioned' is too specific and less natural in context.
- source_word: ζῶ
  chosen: I live
  alternatives:
  - I am alive
  lexicon: BDAG
  rationale: Present tense should remain verbal and active. 'I live' preserves the
    ongoing relation being described.
- source_word: διὰ τὸν πατέρα
  chosen: because of the Father
  alternatives:
  - through the Father
  - on account of the Father
  lexicon: BDAG
  rationale: With διά + accusative, the phrase most naturally expresses cause or basis
    here. 'Because of the Father' best fits the parallel with δι’ ἐμέ later in the
    verse and avoids implying merely instrumental agency.
- source_word: ὁ τρώγων με
  chosen: the one who feeds on me
  alternatives:
  - the one who eats me
  - whoever feeds on me
  - the one who consumes me
  lexicon: BDAG
  rationale: τρώγω is a vivid verb for eating/chewing. 'Feeds on me' preserves the
    concrete force better than the flatter 'eats me' while remaining idiomatic in
    English. 'Whoever' is possible, but 'the one who' more closely reflects the substantival
    participle.
- source_word: κἀκεῖνος
  chosen: so also ... he
  alternatives:
  - that one also
  - he too
  lexicon: BDAG
  rationale: 'The pronoun is emphatic: ''that one also / he too.'' In idiomatic English,
    its force is represented by ''so also'' plus the subject in the clause, rather
    than a wooden repetition.'
- source_word: ζήσει
  chosen: will live
  alternatives:
  - will have life
  lexicon: BDAG
  rationale: Future indicative should be preserved straightforwardly. 'Will live'
    keeps the verbal parallel with 'I live' and the life motif of the verse.
- source_word: δι’ ἐμέ
  chosen: because of me
  alternatives:
  - through me
  - on account of me
  lexicon: BDAG
  rationale: 'As with διὰ τὸν πατέρα, διά + accusative most naturally conveys cause
    or basis. Rendering both phrases consistently highlights the analogy: the Son
    lives because of the Father; the eater lives because of the Son.'
