theological_decisions:
- issue: Meaning of Jesus' life relation to the Father in διὰ τὸν πατέρα
  chosen_reading: Rendered causally as 'I live because of the Father' without implying
    ontological inferiority or denying the Son's full deity.
  alternative_readings:
  - I live through the Father
  - I live on account of the Father
  rationale: The verse describes relational dependence within the mission/economy
    and the analogy of life shared from Father to Son to believer. The translation
    preserves the text's wording without importing subordinationist conclusions, in
    keeping with Nicene and Chalcedonian orthodoxy while not overexplaining the verse.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
- issue: Eucharistic versus broader metaphorical force of ὁ τρώγων με
  chosen_reading: Translated concretely as 'the one who feeds on me' while leaving
    sacramental and faith-union interpretations open.
  alternative_readings:
  - the one who eats me
  - whoever partakes of me
  rationale: John 6 is interpreted differently across Christian traditions. A concrete
    eating verb should be preserved, but the translation should not force either a
    narrowly sacramental or a purely metaphorical reading beyond what the Greek itself
    states.
  doctrine_reference: Preserve theological tension rather than resolve it
