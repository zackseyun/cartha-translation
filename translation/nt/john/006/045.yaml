id: JHN.6.45
reference: John 6:45
source:
  edition: SBLGNT
  text: ἔστιν γεγραμμένον ἐν τοῖς προφήταις· Καὶ ἔσονται πάντες διδακτοὶ θεοῦ· ⸀πᾶς
    ὁ ⸀ἀκούσας παρὰ τοῦ πατρὸς καὶ μαθὼν ἔρχεται πρὸς ⸀ἐμέ.
translation:
  text: It is written in the Prophets, ‘And they will all be taught by God.’ Everyone
    who has heard from the Father and has learned comes to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will all be God-taught.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστιν γεγραμμένον
  chosen: It is written
  alternatives:
  - It stands written
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the periphrastic perfect, conveying a
    written text with abiding authority without sounding archaic.
- source_word: ἐν τοῖς προφήταις
  chosen: in the Prophets
  alternatives:
  - in the prophetic writings
  - in the prophets
  lexicon: BDAG
  rationale: Capitalized 'the Prophets' reflects the likely reference to the recognized
    scriptural prophetic corpus rather than merely prophets as persons; this fits
    Jesus' citation formula.
- source_word: ἔσονται πάντες διδακτοὶ θεοῦ
  chosen: they will all be taught by God
  alternatives:
  - they will all be God-taught
  - they will all be taught of God
  lexicon: BDAG
  rationale: Natural English that preserves the future passive sense and the genitive
    θεοῦ as the agent/source of instruction. 'By God' is clearer in contemporary English
    than the more literal but dated 'of God.'
- source_word: πᾶς ὁ
  chosen: Everyone who
  alternatives:
  - Every one who
  - Whoever
  lexicon: BDAG
  rationale: Conveys the substantival singular with generic force in clear modern
    English.
- source_word: ἀκούσας
  chosen: has heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: Rendered with English present perfect to reflect the aorist participle's
    prior action relative to the main verb while sounding natural in sequence with
    'has learned.'
- source_word: παρὰ τοῦ πατρὸς
  chosen: from the Father
  alternatives:
  - from beside the Father
  - from the Father himself
  lexicon: BDAG
  rationale: παρά with genitive commonly indicates source/origin here. 'The Father'
    preserves Johannine usage and the personal relational sense.
- source_word: μαθὼν
  chosen: has learned
  alternatives:
  - learned
  lexicon: BDAG
  rationale: Coordinates with 'has heard' as prior completed action leading to the
    present result expressed by 'comes.'
- source_word: ἔρχεται πρὸς ἐμέ
  chosen: comes to me
  alternatives:
  - comes toward me
  lexicon: BDAG
  rationale: Standard rendering preserving the present tense and personal movement/approach
    to Jesus.
