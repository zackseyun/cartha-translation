theological_decisions:
- issue: Relationship between divine teaching and coming to Jesus
  chosen_reading: 'The translation preserves the text''s sequence without importing
    a denominational explanation: those who have heard from the Father and learned
    come to Jesus.'
  alternative_readings:
  - A stronger deterministic reading
  - A more synergistic reading emphasizing human response
  rationale: The verse is theologically significant in debates over divine drawing
    and human response, but the Greek itself states the relationship without explaining
    its metaphysical mechanics. Per doctrine, the translation preserves the tension
    rather than resolving it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
- issue: Identity of 'the Father' and Jesus' authority
  chosen_reading: The translation keeps 'the Father' and 'me' in direct relation,
    preserving the Johannine claim that true learning from the Father leads to Jesus.
  rationale: This reflects the text's Christological force without expanding beyond
    what the verse explicitly says.
  doctrine_reference: 'DOCTRINE.md: historic ecumenical orthodoxy; do not import claims
    the text does not make.'
