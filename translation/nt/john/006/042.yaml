theological_decisions:
- issue: Rendering the crowd's objection to Jesus' heavenly origin claim
  chosen_reading: Retain the literal claim 'I have come down from heaven' without
    softening it into metaphor or explanatory paraphrase.
  alternative_readings:
  - I came from heaven
  - I have descended from heaven
  rationale: The verse presents the crowd's scandal at Jesus' claim of heavenly origin.
    In keeping with historic orthodoxy and the instruction not to import or reduce
    doctrinal claims, the translation preserves the straightforward wording of preexistence/incarnation
    language as stated in the text itself.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 Preserve theological tension rather than resolve it'
