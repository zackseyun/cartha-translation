id: JHN.6.42
reference: John 6:42
source:
  edition: SBLGNT
  text: καὶ ἔλεγον· ⸀Οὐχ οὗτός ἐστιν Ἰησοῦς ὁ υἱὸς Ἰωσήφ, οὗ ἡμεῖς οἴδαμεν τὸν πατέρα
    καὶ τὴν μητέρα; πῶς ⸀νῦν ⸀λέγει ὅτι Ἐκ τοῦ οὐρανοῦ καταβέβηκα;
translation:
  text: And they were saying, “Is this not Jesus, the son of Joseph, whose father
    and mother we know? How does he now say, ‘I have come down from heaven’?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech, so 'were saying'
    better preserves the aspect than simple past 'said.'
- source_word: Οὐχ οὗτός ἐστιν
  chosen: Is this not
  alternatives:
  - Is not this
  - Isn't this
  lexicon: BDAG
  rationale: Renders the negative interrogative naturally in modern English while
    preserving the rhetorical force of a question expecting agreement.
- source_word: ὁ υἱὸς Ἰωσήφ
  chosen: the son of Joseph
  alternatives:
  - Joseph's son
  lexicon: BDAG
  rationale: A direct and transparent rendering of the titular/genitival construction;
    it also preserves the crowd's emphasis on Jesus' known human family background.
- source_word: οὗ ἡμεῖς οἴδαμεν τὸν πατέρα καὶ τὴν μητέρα
  chosen: whose father and mother we know
  alternatives:
  - whose father and mother we have known
  - of whom we know the father and the mother
  lexicon: BDAG
  rationale: Uses idiomatic English while preserving the relative clause and the emphasis
    on their claimed familiarity with Jesus' parentage.
- source_word: πῶς νῦν λέγει
  chosen: How does he now say
  alternatives:
  - How can he now say
  - Why does he now say
  lexicon: BDAG
  rationale: πῶς is most basically 'how,' and λέγει is present tense. 'Does he now
    say' preserves the direct challenge without adding the modal nuance of 'can' unless
    context requires it.
- source_word: Ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: Standard and natural rendering of ἐκ + genitive here, expressing origin/source.
- source_word: καταβέβηκα
  chosen: I have come down
  alternatives:
  - I have descended
  - I came down
  lexicon: BDAG
  rationale: The perfect tense conveys a completed descent with present relevance.
    'I have come down' is idiomatic English and fits Johannine style better than the
    more formal 'I have descended.'
