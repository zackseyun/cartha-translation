id: JHN.6.1
reference: John 6:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἀπῆλθεν ὁ Ἰησοῦς πέραν τῆς θαλάσσης τῆς Γαλιλαίας τῆς Τιβεριάδος.
translation:
  text: After these things, Jesus went away to the other side of the Sea of Galilee,
    that is, of Tiberias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'After these things, Jesus departed beyond the Sea of
      Galilee, of Tiberias.'
    reason: lexical_alternative
  - marker: b
    text: The 'Sea of Galilee' was also known as the 'Sea of Tiberias.' John includes
      both names to identify the same body of water.
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A relatively formal rendering preserves John's transitional phrasing
    and plural demonstrative. 'After this' is smoother English and common in translations,
    but the Greek is plural ('these things').
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: The aorist of ἀπέρχομαι commonly means 'go away' or 'depart.' 'Went away'
    preserves the directional nuance better than the flatter 'went,' while remaining
    natural English.
- source_word: πέραν
  chosen: to the other side of
  alternatives:
  - across
  - beyond
  lexicon: BDAG
  rationale: In context of crossing a body of water, πέραν idiomatically means movement
    to the far side. 'To the other side of' is the clearest natural English equivalent.
- source_word: θάλασσης
  chosen: Sea
  alternatives:
  - lake
  lexicon: BDAG
  rationale: Although the body of water is geographically a lake, the Greek term is
    θάλασσα, and 'Sea' is the established and contextually appropriate rendering in
    the Gospel tradition.
- source_word: τῆς Γαλιλαίας
  chosen: of Galilee
  alternatives:
  - the Galilean Sea
  lexicon: BDAG
  rationale: This genitive identifies the sea by region. 'Sea of Galilee' is the standard
    natural English construction.
- source_word: τῆς Τιβεριάδος
  chosen: that is, of Tiberias
  alternatives:
  - which is the Sea of Tiberias
  - of Tiberias
  lexicon: BDAG
  rationale: John appends a second identifying genitive to the same sea. Rendering
    it appositionally with 'that is' makes explicit in English that both names refer
    to the same body of water, avoiding the awkward piling up of genitives while preserving
    the sense.
