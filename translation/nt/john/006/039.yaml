theological_decisions:
- issue: Whether to render the collective object personally ('all whom') or as the
    Greek collective neuter ('all that').
  chosen_reading: all that he has given me ... raise it up
  alternative_readings:
  - all whom he has given me ... raise them up
  rationale: The Greek uses neuter singular forms (πᾶν, ὃ, αὐτό), which are naturally
    rendered as a collective singular. This preserves the source wording and avoids
    importing a more individualized formulation than the text states, while still
    allowing the referent to be persons in context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
