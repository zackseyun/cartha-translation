id: JHN.6.39
reference: John 6:39
source:
  edition: SBLGNT
  text: τοῦτο δέ ἐστιν τὸ θέλημα τοῦ πέμψαντός ⸀με ἵνα πᾶν ὃ δέδωκέν μοι μὴ ἀπολέσω
    ἐξ αὐτοῦ ἀλλὰ ἀναστήσω ⸀αὐτὸ τῇ ἐσχάτῃ ἡμέρᾳ.
translation:
  text: 'And this is the will of the one who sent me: that I should lose none of all
    that he has given me, but should raise it up on the last day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more personally, 'all whom he has given me ... raise them up.' The Greek
      uses a collective singular expression, literally 'all that ... it.'
    reason: alternative_reading
lexical_decisions:
- source_word: θέλημα
  chosen: will
  alternatives:
  - desire
  - purpose
  lexicon: BDAG
  rationale: '''Will'' is the standard and most natural rendering here for God''s
    intention or purpose, fitting Johannine usage without over-interpreting it as
    either mere wish or decretive plan.'
- source_word: τοῦ πέμψαντός με
  chosen: the one who sent me
  alternatives:
  - him who sent me
  - my sender
  lexicon: BDAG
  rationale: The substantival participle is best rendered explicitly as 'the one who
    sent me,' preserving the relational and verbal force of πέμπω while remaining
    natural English.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/purpose of the Father's will. 'That'
    reads naturally in English after 'this is the will,' while still preserving the
    purposive nuance.
- source_word: πᾶν ὃ δέδωκέν μοι
  chosen: all that he has given me
  alternatives:
  - everything that he has given me
  - all whom he has given me
  lexicon: BDAG
  rationale: The neuter singular πᾶν with relative ὃ is most directly 'all that.'
    This preserves the Greek form and its collective sense. 'All whom' would prematurely
    personalize the expression; the following singular αὐτό likewise supports a collective
    singular rendering.
- source_word: δέδωκέν
  chosen: has given
  alternatives:
  - has entrusted
  - gave
  lexicon: BDAG
  rationale: The perfect tense indicates a completed act with continuing result. 'Has
    given' preserves that force better than simple past 'gave.'
- source_word: μὴ ἀπολέσω
  chosen: I should lose none
  alternatives:
  - I should not destroy any of it
  - I should not lose any of it
  lexicon: BDAG
  rationale: In this context ἀπόλλυμι refers to losing rather than destroying. English
    idiom requires making the negated object explicit; 'lose none' captures the sense
    cleanly while matching the collective object.
- source_word: ἐξ αὐτοῦ
  chosen: of all that he has given me
  alternatives:
  - from it
  - out of it
  lexicon: BDAG
  rationale: Literally 'from/out of it,' referring back to the collective gift. In
    idiomatic English, this is best absorbed into 'lose none of all that he has given
    me' rather than rendered woodenly.
- source_word: ἀναστήσω αὐτὸ
  chosen: should raise it up
  alternatives:
  - should resurrect it
  - should raise him up
  lexicon: BDAG
  rationale: ἀνίστημι here refers to eschatological raising. 'Raise it up' preserves
    the singular neuter pronoun αὐτό corresponding to the collective singular antecedent.
    'Resurrect' is possible but less idiomatic in this context.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - at the last day
  - on the final day
  lexicon: BDAG
  rationale: '''On the last day'' is the most natural modern English rendering and
    preserves the eschatological reference familiar in John.'
