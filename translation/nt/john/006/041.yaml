id: JHN.6.41
reference: John 6:41
source:
  edition: SBLGNT
  text: Ἐγόγγυζον οὖν οἱ Ἰουδαῖοι περὶ αὐτοῦ ὅτι εἶπεν· Ἐγώ εἰμι ὁ ἄρτος ὁ καταβὰς
    ἐκ τοῦ οὐρανοῦ,
translation:
  text: So the Jews were grumbling about him because he said, “I am the bread that
    came down from heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans” or, in some contexts, “the Jewish leaders.” John’s phrase
      “the Jews” can refer to a particular group opposing Jesus rather than to the
      Jewish people as a whole.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγόγγυζον
  chosen: were grumbling
  alternatives:
  - were murmuring
  - began grumbling
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action in past time. 'Were
    grumbling' captures both the durative aspect and the negative, under-the-breath
    complaint sense of γογγύζω, echoing wilderness grumbling language without sounding
    archaic.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the previous statement. 'So'
    is natural modern English and preserves the inferential flow without overstating
    formal logic.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is the standard Johannine wording. In this verse
    the text does not explicitly narrow the referent to leaders, and 'Judeans' would
    import a geographic nuance not demanded by the immediate context. 'The Jews' is
    retained as the most direct rendering of the Greek, while recognizing that in
    John the phrase can refer to a particular Jewish group in opposition to Jesus
    rather than the Jewish people universally.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  - against him
  lexicon: BDAG
  rationale: περί with genitive commonly means 'about/concerning.' 'About him' is
    the most natural English expression here. 'Against him' would overinterpret hostility
    beyond the preposition's basic sense.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for their grumbling rather than merely
    reported content. 'Because' makes the causal relationship explicit in idiomatic
    English.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he had said
  lexicon: BDAG
  rationale: Aorist indicative is naturally rendered as simple past in English. 'He
    said' fits the narrative sequence; pluperfect is possible in English style but
    not required by the Greek.
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  lexicon: BDAG
  rationale: This is the straightforward copular self-identification in the bread
    discourse. 'I am' preserves the Greek wording and the emphatic first-person expression
    without adding interpretive expansion.
- source_word: ὁ ἄρτος
  chosen: the bread
  alternatives:
  - bread
  lexicon: BDAG
  rationale: The article is significant in the predicate nominative construction,
    identifying Jesus specifically as 'the bread,' not merely bread in a general sense.
- source_word: ὁ καταβὰς
  chosen: that came down
  alternatives:
  - having come down
  - who came down
  lexicon: BDAG
  rationale: The articular aorist participle modifies 'bread.' English relative style
    is the clearest equivalent. 'That came down' is idiomatic and preserves the completed
    descent implied by the aorist participle.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ + genitive with οὐρανός in this theological
    context. 'From heaven' is natural and preserves the source/origin emphasis.
