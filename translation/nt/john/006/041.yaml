theological_decisions:
- issue: Referent and translation of οἱ Ἰουδαῖοι in John
  chosen_reading: Rendered as 'the Jews' in the main text
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: 'The translation follows the Greek wording directly and avoids narrowing
    the referent beyond what this verse explicitly states. Because Johannine usage
    can be heard too broadly in English, the rationale is documented here: the phrase
    often denotes a particular Jewish group opposing Jesus in context, not an undifferentiated
    statement about all Jewish people. This preserves the text''s wording without
    importing anti-Jewish generalization.'
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §6
    (readable modern English)
