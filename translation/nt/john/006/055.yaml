id: JHN.6.55
reference: John 6:55
source:
  edition: SBLGNT
  text: ἡ γὰρ σάρξ μου ⸀ἀληθής ἐστι βρῶσις, καὶ τὸ αἷμά μου ⸁ἀληθής ἐστι πόσις.
translation:
  text: For my flesh is true food, and my blood is true drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "real food" and "real drink."
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Rendered as "For" to preserve the explanatory connection to the preceding
    statement in natural English while retaining the discourse force of γάρ.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: The doctrine table gives σάρξ the default rendering "flesh" when literal.
    In this context Jesus speaks of his flesh and blood in parallel, so a literal
    rendering is preferred over interpretive alternatives such as "body."
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - real
  - genuine
  lexicon: BDAG
  rationale: Rendered "true" to preserve the adjective's direct force and its contrastive/theological
    weight in Johannine usage. "Real" is possible and idiomatic, but "true" better
    reflects the Greek and avoids over-interpreting the nuance.
- source_word: βρῶσις
  chosen: food
  alternatives:
  - eating
  - meat
  lexicon: BDAG
  rationale: Although βρῶσις can denote the act of eating or that which is eaten,
    here the predicate with "true" and the parallel with πόσις favors the sense "food."
    "Meat" is too narrow and traditional rather than source-driven.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Rendered literally as "blood" in keeping with the Greek and the flesh/blood
    parallelism. No contextual warrant exists to soften or paraphrase the term.
- source_word: πόσις
  chosen: drink
  alternatives:
  - drinking
  - beverage
  lexicon: BDAG
  rationale: Rendered "drink" as the natural counterpart to "food" in English. While
    πόσις can denote the act of drinking, the predicate construction here points to
    what is drunk.
