theological_decisions:
- issue: Whether to render ἀληθής as "true" or the more interpretive "real" in a sacramental
    context
  chosen_reading: 'true'
  alternative_readings:
  - real
  rationale: The verse has been central in Eucharistic debates, but the translation
    should not resolve theological disputes by choosing a more interpretive English
    term. "True" preserves the Johannine wording and leaves doctrinal implications
    to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
