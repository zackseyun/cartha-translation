id: JHN.6.19
reference: John 6:19
source:
  edition: SBLGNT
  text: ἐληλακότες οὖν ὡς σταδίους εἴκοσι πέντε ἢ τριάκοντα θεωροῦσιν τὸν Ἰησοῦν περιπατοῦντα
    ἐπὶ τῆς θαλάσσης καὶ ἐγγὺς τοῦ πλοίου γινόμενον, καὶ ἐφοβήθησαν.
translation:
  text: So when they had rowed about twenty-five or thirty stadia, they saw Jesus
    walking on the sea and coming near the boat, and they were afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; twenty-five or thirty stadia
      is roughly three to four miles (about five to six kilometers).
    reason: cultural_note
  - marker: b
    text: Or 'walking on the water.' The Greek literally says 'walking on the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐληλακότες
  chosen: had rowed
  alternatives:
  - had gone
  - had driven
  lexicon: BDAG
  rationale: 'From ἐλαύνω, in nautical context it refers to propelling a boat, hence
    ''rowed'' is more precise than the broader ''gone'' or the wooden ''driven.''
    The perfect participle is naturally rendered with prior action relative to the
    main verb: ''when they had rowed.'''
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the preceding situation. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ὡς
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: With a measure expression, ὡς indicates approximation. 'About' is the
    clearest idiomatic rendering.
- source_word: σταδίους εἴκοσι πέντε ἢ τριάκοντα
  chosen: twenty-five or thirty stadia
  alternatives:
  - about three or four miles
  - twenty-five or thirty furlongs
  lexicon: BDAG
  rationale: The Greek preserves the ancient unit στάδιος; retaining 'stadia' is more
    transparent to the source text than converting directly to modern miles. A modern
    equivalent is suitable for a footnote rather than the main text.
- source_word: θεωροῦσιν
  chosen: they saw
  alternatives:
  - they observed
  - they beheld
  lexicon: BDAG
  rationale: Though θεωρέω can imply attentive seeing, in this narrative context 'they
    saw' is the most natural English rendering and adequately conveys perception without
    archaic tone.
- source_word: περιπατοῦντα ἐπὶ τῆς θαλάσσης
  chosen: walking on the sea
  alternatives:
  - walking upon the sea
  - walking on the water
  lexicon: BDAG
  rationale: The Greek says 'sea' (θάλασσα), not 'water.' 'Walking on the sea' preserves
    the wording and the startling force of the event.
- source_word: ἐγγὺς τοῦ πλοίου γινόμενον
  chosen: coming near the boat
  alternatives:
  - drawing near to the boat
  - being near the boat
  lexicon: BDAG
  rationale: γίνομαι with ἐγγύς expresses movement into nearness. 'Coming near' captures
    the progressive approach better than the static 'being near.'
- source_word: πλοίου
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον in this Galilean fishing context is better rendered 'boat' than
    the larger-sounding 'ship.'
- source_word: ἐφοβήθησαν
  chosen: they were afraid
  alternatives:
  - they became afraid
  - they were frightened
  lexicon: BDAG
  rationale: Aorist passive/deponent φοβέομαι here denotes their fearful reaction.
    'They were afraid' is idiomatic and faithful.
