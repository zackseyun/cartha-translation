theological_decisions:
- issue: Rendering the miracle description without softening its literal force
  chosen_reading: walking on the sea
  alternative_readings:
  - walking by the sea
  - walking on the water
  rationale: 'The preposition ἐπί with the genitive here is best taken in the sense
    presented by the narrative tradition: Jesus is walking on the sea itself. ''By
    the sea'' does not fit the immediate context of the disciples being far from shore,
    and ''on the water'' is interpretive rather than the text''s wording. This preserves
    the text''s plain sense without adding doctrinal commentary.'
  doctrine_reference: Translation philosophy §§1, 3
