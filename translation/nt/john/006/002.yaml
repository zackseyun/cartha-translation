theological_decisions:
- issue: Johannine σημεῖα terminology
  chosen_reading: signs
  alternative_readings:
  - miracles
  - miraculous signs
  rationale: John regularly uses σημεῖα to emphasize the revelatory meaning of Jesus's
    works, not merely their supernatural character. Rendering it as 'signs' preserves
    that theological nuance without importing extra wording into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
