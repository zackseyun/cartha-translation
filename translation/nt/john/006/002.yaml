id: JHN.6.2
reference: John 6:2
source:
  edition: SBLGNT
  text: ⸂ἠκολούθει δὲ⸃ αὐτῷ ὄχλος πολύς, ὅτι ⸀ἐθεώρουν τὰ σημεῖα ἃ ἐποίει ἐπὶ τῶν
    ἀσθενούντων.
translation:
  text: And a large crowd was following him, because they were seeing the signs that
    he was doing for those who were sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'miracles' or 'miraculous signs'; John’s word 'signs' emphasizes what
      these works reveal about Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  - kept following
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing past action; 'was following' preserves
    the progressive sense in natural English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - So
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' is the most natural English connector.
- source_word: ὄχλος πολύς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a large multitude
  lexicon: BDAG
  rationale: This phrase denotes a sizable mass of people. 'Large crowd' is clear
    modern English and preserves the quantitative emphasis of πολύς.
- source_word: ἐθεώρουν
  chosen: were seeing
  alternatives:
  - saw
  - were observing
  - were watching
  lexicon: BDAG
  rationale: The imperfect again suggests repeated or ongoing perception. 'Were seeing'
    keeps the aspect and reflects θεωρέω as attentive observation, though more idiomatic
    alternatives are possible.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  - miracles
  lexicon: BDAG
  rationale: In John, σημεῖα is a theologically loaded term pointing beyond the act
    itself to its revelatory significance. 'Signs' preserves Johannine usage better
    than 'miracles.'
- source_word: ἐποίει
  chosen: was doing
  alternatives:
  - did
  - was performing
  lexicon: BDAG
  rationale: The imperfect portrays ongoing activity. 'Was doing' is a straightforward
    rendering that matches the Greek aspect without overinterpreting.
- source_word: ἐπὶ τῶν ἀσθενούντων
  chosen: for those who were sick
  alternatives:
  - on those who were sick
  - among the sick
  - for the sick
  lexicon: BDAG
  rationale: With ἐπί plus genitive after a verb of action, the sense is the signs
    performed in relation to sick people. 'For those who were sick' communicates the
    beneficiary/object relation naturally in English better than the more wooden 'on.'
- source_word: ἀσθενούντων
  chosen: those who were sick
  alternatives:
  - the sick
  - the weak
  - the infirm
  lexicon: BDAG
  rationale: The participle from ἀσθενέω here refers to physical illness in context.
    'Those who were sick' is explicit and natural.
