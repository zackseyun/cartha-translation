- issue: Reference to Israel's wilderness generation
  chosen_reading: Your fathers
  alternative_readings:
  - Your ancestors
  rationale: The verse invokes the exodus generation without adding interpretive weight
    beyond the text. 'Fathers' preserves the historical and rhetorical force of Jesus'
