id: JHN.6.49
reference: John 6:49
source:
  edition: SBLGNT
  text: οἱ πατέρες ὑμῶν ἔφαγον ⸂ἐν τῇ ἐρήμῳ τὸ μάννα⸃ καὶ ἀπέθανον·
translation:
  text: Your fathers ate the manna in the wilderness, and they died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your ancestors.' The Greek literally says 'your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες ὑμῶν
  chosen: Your fathers
  alternatives:
  - Your ancestors
  lexicon: BDAG
  rationale: πατέρες literally means 'fathers.' In this discourse Jesus addresses
    his hearers in relation to Israel's forebears in the wilderness generation. 'Fathers'
    preserves the Greek form and the representative ancestral sense; 'ancestors' is
    possible but less formally aligned. This follows the gender-accurate principle
    rather than neutralizing the term.
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - ate of
  lexicon: BDAG
  rationale: Aorist indicative of ἐσθίω, straightforwardly 'ate.' English does not
    require an explicit perfective nuance here.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος in this biblical context commonly refers to the wilderness of
    Israel's exodus tradition. 'Wilderness' better matches scriptural usage and intertextual
    resonance than 'desert,' while remaining natural English.
- source_word: τὸ μάννα
  chosen: the manna
  alternatives:
  - manna
  lexicon: BDAG
  rationale: The article is present in Greek, and 'the manna' is idiomatic in English
    in this specific salvation-historical reference, pointing to the known bread from
    heaven in the wilderness narrative.
- source_word: ἀπέθανον
  chosen: they died
  alternatives:
  - and died
  lexicon: BDAG
  rationale: Aorist indicative of ἀποθνῄσκω, denoting actual death. Rendering with
    explicit subject 'they' produces clear, natural English and preserves the contrast
    with the life-giving bread in context.
