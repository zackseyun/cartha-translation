id: JHN.6.26
reference: John 6:26
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς καὶ εἶπεν· Ἀμὴν ἀμὴν λέγω ὑμῖν, ζητεῖτέ με οὐχ ὅτι
    εἴδετε σημεῖα ἀλλ’ ὅτι ἐφάγετε ἐκ τῶν ἄρτων καὶ ἐχορτάσθητε·
translation:
  text: Jesus answered them, “Truly, truly, I say to you, you are seeking me not because
    you saw signs, but because you ate from the loaves and were filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you seek me ... because you ate the bread and were satisfied.' The Greek
      more literally says 'from the loaves' and uses a verb meaning 'were filled'
      or 'were satisfied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative use of ἀποκρίνομαι in dialogue is best rendered 'answered.'
    'Replied' is possible but less idiomatic here.
- source_word: καὶ εἶπεν
  chosen: '[included in quotation introduction as part of ''answered them'']'
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Greek commonly uses a doubled speech introduction ('answered and said').
    In natural English, 'answered them' sufficiently introduces the quotation without
    awkward redundancy. The speech act is still fully represented by the following
    direct quotation.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: John's characteristic doubled ἀμήν is traditionally and accurately rendered
    'Truly, truly' in readable English. 'Amen, amen' is more formal/transliterated
    but less transparent for contemporary readers.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the solemnity of the Johannine
    formula and pairs well with 'Truly, truly.'
- source_word: ζητεῖτέ με
  chosen: you are seeking me
  alternatives:
  - you seek me
  - you are looking for me
  lexicon: BDAG
  rationale: Present tense here conveys ongoing action; English progressive captures
    the immediate sense of their current pursuit. 'Looking for me' is possible but
    slightly weaker than the repeated Johannine theme of 'seeking'.
- source_word: οὐχ ὅτι ... ἀλλ’ ὅτι
  chosen: not because ... but because
  alternatives:
  - not that ... but that
  lexicon: BDAG
  rationale: This construction expresses contrast of motive or reason. 'Because' is
    the clearest idiomatic English equivalent.
- source_word: εἴδετε
  chosen: you saw
  alternatives:
  - you perceived
  lexicon: BDAG
  rationale: The aorist of ὁράω here refers straightforwardly to seeing the miraculous
    events. 'Perceived' would overinterpret by implying spiritual understanding, which
    the verse denies.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  - miracles
  lexicon: BDAG
  rationale: In John, σημεῖον is a theologically loaded term meaning 'sign,' not merely
    'miracle.' Retaining 'signs' preserves Johannine vocabulary and theological nuance.
- source_word: ἐφάγετε ἐκ τῶν ἄρτων
  chosen: you ate from the loaves
  alternatives:
  - you ate the bread
  - you ate from the bread
  lexicon: BDAG
  rationale: ἄρτων is plural, referring back to the multiplied loaves. 'From the loaves'
    reflects both the plural and the partitive force of ἐκ.
- source_word: ἐχορτάσθητε
  chosen: were filled
  alternatives:
  - were satisfied
  - had your fill
  lexicon: BDAG
  rationale: The passive verb denotes being fed to fullness. 'Were filled' is concise,
    natural, and preserves the connection to the feeding context; 'were satisfied'
    is possible but slightly more interpretive.
