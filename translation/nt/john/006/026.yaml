theological_decisions:
- issue: Meaning of σημεῖα in Johannine context
  chosen_reading: Rendered as 'signs' rather than 'miracles.'
  alternative_readings:
  - miracles
  - miraculous signs
  rationale: John regularly uses σημεῖα to present Jesus' works as revelatory acts
    pointing beyond themselves. 'Signs' preserves that theological dimension without
    importing an explanatory adjective into the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Englishing the doubled introductory formula
  chosen_reading: Natural English compresses 'answered and said' while preserving
    the solemn direct speech.
  alternative_readings:
  - Jesus answered them and said
  rationale: This is a stylistic decision, not a doctrinal one, but it avoids wooden
    English while keeping the source meaning intact under optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
