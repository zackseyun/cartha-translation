id: JHN.6.33
reference: John 6:33
source:
  edition: SBLGNT
  text: ὁ γὰρ ἄρτος τοῦ θεοῦ ἐστιν ὁ καταβαίνων ἐκ τοῦ οὐρανοῦ καὶ ζωὴν διδοὺς τῷ
    κόσμῳ.
translation:
  text: For the bread of God is the one who comes down from heaven and gives life
    to the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that which comes down from heaven and gives life to the world.' The
      Greek wording can be taken more impersonally, but the masculine participles
      favor a personal referent.
    reason: alternative_reading
lexical_decisions:
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - loaf
  - food
  lexicon: BDAG
  rationale: The primary sense is literal 'bread,' and in this discourse the metaphor
    depends on retaining that concrete term rather than generalizing to 'food.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  - God's
  lexicon: BDAG
  rationale: The genitive can suggest source or possession, but 'of God' preserves
    the Greek form and allows the context to unfold whether this means bread belonging
    to God or bread given by God.
- source_word: ὁ καταβαίνων
  chosen: the one who comes down
  alternatives:
  - that which comes down
  - the one descending
  lexicon: BDAG
  rationale: The articular present participle is masculine singular and personal in
    form. Rendering it as 'the one who comes down' preserves the personal reference
    that anticipates Jesus' self-identification, rather than the more impersonal 'that
    which comes down.' 'Comes down' is more natural English than 'descending' while
    keeping the present participial force.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ + genitive here; 'from heaven' is
    natural and preserves the source/origin emphasis.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: The noun is central to Johannine theology and should remain the simple,
    weighty 'life' rather than an expanded paraphrase.
- source_word: διδοὺς
  chosen: gives
  alternatives:
  - giving
  - bestows
  lexicon: BDAG
  rationale: The participle is coordinated with 'comes down' and describes characteristic
    action. English finite 'gives' reads naturally in apposition to 'the one who comes
    down' while preserving the ongoing sense.
- source_word: τῷ κόσμῳ
  chosen: to the world
  alternatives:
  - to humanity
  - to the cosmos
  lexicon: BDAG
  rationale: In John, κόσμος often denotes the world of humanity in its created and
    fallen order. 'World' preserves the established Johannine term and its theological
    breadth better than narrowing it to 'humanity.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: This conjunction grounds the previous statement. 'For' preserves the
    explanatory connection in a concise, readable way.
