theological_decisions:
- issue: Personal vs. impersonal reference in 'the bread of God ... is ὁ καταβαίνων
    ... καὶ ζωὴν διδοὺς'
  chosen_reading: 'Use personal language: ''the one who comes down from heaven and
    gives life to the world.'''
  alternative_readings:
  - '''that which comes down from heaven and gives life to the world'''
  rationale: Although 'bread' is a neuter noun conceptually, the Greek uses masculine
    singular articular participles, naturally pointing to a personal referent. In
    Johannine context this anticipates Jesus himself as the bread from heaven. The
    translation preserves that personal force without adding doctrinal explanation
    beyond the grammar and context.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Scope of κόσμος
  chosen_reading: Retain 'world' rather than specifying a narrower theological category.
  alternative_readings:
  - humanity
  - all people
  rationale: The verse states the breadth of the life-giving mission without resolving
    later theological debates about extent or application. 'World' preserves the text's
    own wording and theological tension.
  doctrine_reference: 'Translation philosophy #3'
