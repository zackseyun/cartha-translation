id: JHN.6.58
reference: John 6:58
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ὁ ἄρτος ὁ ⸀ἐξ οὐρανοῦ καταβάς, οὐ καθὼς ἔφαγον οἱ ⸀πατέρες καὶ
    ἀπέθανον· ὁ τρώγων τοῦτον τὸν ἄρτον ⸀ζήσει εἰς τὸν αἰῶνα.
translation:
  text: This is the bread that came down from heaven, not as the fathers ate and died;
    the one who eats this bread will live forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestors.' Greek 'the fathers' likely refers to Israel's forefathers
      who ate the manna.
    reason: lexical_alternative
  - marker: b
    text: Literally 'will live into the age,' an idiom meaning enduring life forever.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός ἐστιν
  chosen: This is
  alternatives:
  - This one is
  lexicon: BDAG
  rationale: Natural English demonstrative-copula rendering; 'This one is' is more
    wooden and less idiomatic here.
- source_word: ὁ ἄρτος
  chosen: the bread
  lexicon: BDAG
  rationale: Direct rendering of the nominative phrase; the article is retained because
    the discourse identifies a specific bread already developed in context.
- source_word: ὁ ἐξ οὐρανοῦ καταβάς
  chosen: that came down from heaven
  alternatives:
  - having come down from heaven
  - who came down from heaven
  lexicon: BDAG
  rationale: The aorist participle καταβάς is rendered with a relative clause for
    clear English. 'That' fits the antecedent 'bread' better than 'who.' 'From heaven'
    preserves the source prepositional phrase ἐξ οὐρανοῦ.
- source_word: οὐ καθὼς
  chosen: not as
  alternatives:
  - not like
  lexicon: BDAG
  rationale: Keeps the comparative force concise and close to the Greek structure.
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - did eat
  lexicon: BDAG
  rationale: Simple past best matches the aorist in idiomatic English.
- source_word: οἱ πατέρες
  chosen: the fathers
  alternatives:
  - the ancestors
  lexicon: BDAG
  rationale: Gender-accurate rendering preserves the masculine plural and likely allusion
    to Israel's forefathers in the wilderness. 'Ancestors' is possible but less textually
    specific; inclusivity concern is preserved in a footnote.
- source_word: ἀπέθανον
  chosen: died
  alternatives:
  - have died
  lexicon: BDAG
  rationale: Simple past aligns with the narrative comparison and the aorist form.
- source_word: ὁ τρώγων
  chosen: the one who eats
  alternatives:
  - whoever eats
  - the one chewing/feeding on
  lexicon: BDAG
  rationale: Substantival present participle is well represented by 'the one who eats.'
    'Whoever eats' is also possible. Although τρώγω can carry a more graphic sense
    ('chew/gnaw'), 'eats' is the most natural English equivalent here while preserving
    the ongoing/generic force.
- source_word: τοῦτον τὸν ἄρτον
  chosen: this bread
  alternatives:
  - this loaf
  lexicon: BDAG
  rationale: Straightforward demonstrative + noun rendering; 'loaf' is too specific
    for the discourse context.
- source_word: ζήσει εἰς τὸν αἰῶνα
  chosen: will live forever
  alternatives:
  - will live for the age
  - will live into the age
  lexicon: BDAG
  rationale: Idiomatic rendering of the Johannine expression εἰς τὸν αἰῶνα. 'Forever'
    best communicates enduring, unending life in natural English.
