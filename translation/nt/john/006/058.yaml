theological_decisions:
- issue: Reference of 'the fathers' in the wilderness-bread comparison
  chosen_reading: Retained as 'the fathers' rather than broadening to 'ancestors.'
  alternative_readings:
  - the ancestors
  rationale: The Greek is explicitly masculine plural and likely evokes Israel's forefathers
    who ate the manna. Per doctrine, gender-accurate translation is preferred over
    flattening to a neutral collective, though an alternative is worth preserving
    for readers who understand the referent corporately.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Force of τρώγων in Eucharistic/life discourse
  chosen_reading: Rendered neutrally as 'the one who eats' without importing a sacramental
    interpretation.
  alternative_readings:
  - the one who feeds on
  - the one who partakes of
  rationale: The verse speaks in the established bread-of-life discourse and the translation
    should not resolve debated theological readings (strictly sacramental vs. metaphorical-faith
    reading) beyond the lexical sense of the verb. 'Eats' preserves the text's wording
    and theological tension.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 3
