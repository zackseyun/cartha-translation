id: JHN.6.35
reference: John 6:35
source:
  edition: SBLGNT
  text: ⸀Εἶπεν αὐτοῖς ὁ Ἰησοῦς· Ἐγώ εἰμι ὁ ἄρτος τῆς ζωῆς· ὁ ἐρχόμενος πρὸς ἐμὲ οὐ
    μὴ πεινάσῃ, καὶ ὁ πιστεύων εἰς ⸀ἐμὲ οὐ μὴ ⸀διψήσει πώποτε.
translation:
  text: Jesus said to them, “I am the bread of life; the one who comes to me will
    never hunger, and the one who believes in me will never thirst again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will by no means ever thirst.' The Greek uses an emphatic negation
      with 'ever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - told
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in narrative introduction.
    'Told' would over-specify an object/complement not present.
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I myself am
  lexicon: BDAG
  rationale: Standard rendering of the emphatic pronoun plus copula. The explicit
    Ἐγώ adds emphasis, but English can preserve this adequately with normal word order
    in this solemn self-identification formula.
- source_word: ὁ ἄρτος τῆς ζωῆς
  chosen: the bread of life
  alternatives:
  - the life-giving bread
  lexicon: BDAG
  rationale: A close, idiomatic rendering that preserves the genitival expression
    and its metaphorical force. 'Life-giving bread' is interpretive and less formally
    transparent.
- source_word: ὁ ἐρχόμενος πρὸς ἐμέ
  chosen: the one who comes to me
  alternatives:
  - whoever comes to me
  - the person coming to me
  lexicon: BDAG
  rationale: The substantival present participle is well represented by 'the one who...'.
    This preserves the ongoing/generic force without unnecessary paraphrase. 'Whoever'
    is possible but slightly more dynamic.
- source_word: οὐ μὴ πεινάσῃ
  chosen: will never hunger
  alternatives:
  - shall certainly not hunger
  - will by no means hunger
  lexicon: BDAG
  rationale: οὐ μή with the verb gives strong negation. 'Will never hunger' conveys
    the emphatic future denial in natural modern English better than more wooden alternatives.
- source_word: ὁ πιστεύων εἰς ἐμέ
  chosen: the one who believes in me
  alternatives:
  - the one who trusts in me
  lexicon: BDAG
  rationale: For πιστεύω with εἰς, 'believes in' is the standard and most transparent
    rendering in Johannine usage. 'Trusts in' captures an aspect of the sense but
    would reduce consistency with the project's default handling of pistis-family
    terms.
- source_word: οὐ μὴ διψήσει πώποτε
  chosen: will never thirst again
  alternatives:
  - will never ever thirst
  - will by no means ever thirst
  lexicon: BDAG
  rationale: The combination of οὐ μή and πώποτε intensifies the negation. 'Will never
    thirst again' is idiomatic English that communicates enduring satisfaction. Because
    πώποτε can mean 'ever,' an alternative is worth preserving in a footnote.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Simple dative indirect object after 'said.'
- source_word: πρὸς ἐμέ
  chosen: to me
  alternatives:
  - toward me
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward Jesus; 'to me' is
    the natural English equivalent in this idiom.
- source_word: εἰς ἐμέ
  chosen: in me
  alternatives:
  - into me
  lexicon: BDAG
  rationale: With πιστεύω, εἰς is idiomatically rendered 'in' in English, preserving
    the relational sense of entrusting oneself to Jesus.
