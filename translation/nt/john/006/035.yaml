theological_decisions:
- issue: Rendering πιστεύων εἰς ἐμέ
  chosen_reading: the one who believes in me
  alternative_readings:
  - the one who trusts in me
  rationale: The project default for pistis-language is 'faith,' with alternatives
    preserved where context makes them meaningful. In Johannine idiom, 'believes in'
    is the most established and source-transparent rendering, while 'trusts in' is
    a legitimate nuance preserved as a lexical alternative rather than elevated to
    the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy items 3 and 5'
- issue: Force of Jesus' self-identification Ἐγώ εἰμι
  chosen_reading: I am
  alternative_readings:
  - I myself am
  rationale: The translation preserves the direct self-identification without importing
    additional theological explanation. The wording allows the resonance of Johannine
    'I am' sayings to stand without over-interpretation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
