theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    Here the referent is Jesus, and 'Lord' preserves both the narrative identification
    and the christological resonance without over-interpreting the phrase.
