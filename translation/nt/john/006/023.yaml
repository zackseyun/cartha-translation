id: JHN.6.23
reference: John 6:23
source:
  edition: SBLGNT
  text: ⸀ἀλλὰ ἦλθεν ⸀πλοιάρια ἐκ Τιβεριάδος ἐγγὺς τοῦ τόπου ὅπου ἔφαγον τὸν ἄρτον
    εὐχαριστήσαντος τοῦ κυρίου.
translation:
  text: But boats came from Tiberias near the place where they had eaten the bread
    after the Lord had given thanks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'small boats came from Tiberias.' The Greek πλοιάρια
      is a diminutive form.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - However
  - Yet
  lexicon: BDAG
  rationale: Adversative conjunction marking a contrast with the previous situation;
    'But' is natural and sufficiently direct in context.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι here narrates arrival; 'came' is the most straightforward
    English rendering.
- source_word: πλοιάρια
  chosen: boats
  alternatives:
  - small boats
  - boats
  lexicon: BDAG
  rationale: Diminutive noun can mean small boats, but in ordinary English 'boats'
    is the most readable rendering unless the smallness is contextually important.
    The diminutive nuance is not central here.
- source_word: ἐκ Τιβεριάδος
  chosen: from Tiberias
  alternatives:
  - out of Tiberias
  lexicon: BDAG
  rationale: Standard spatial expression indicating origin.
- source_word: ἐγγὺς τοῦ τόπου
  chosen: near the place
  alternatives:
  - close to the place
  lexicon: BDAG
  rationale: Natural rendering of the prepositional phrase indicating proximity.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in which place
  lexicon: BDAG
  rationale: Idiomatic English relative adverb.
- source_word: ἔφαγον τὸν ἄρτον
  chosen: they had eaten the bread
  alternatives:
  - they ate the bread
  lexicon: BDAG
  rationale: English past perfect fits the narrative sequence, referring back to the
    earlier feeding event. The article with ἄρτον points to the specific bread previously
    mentioned.
- source_word: εὐχαριστήσαντος
  chosen: after ... had given thanks
  alternatives:
  - when ... had given thanks
  - having given thanks
  lexicon: BDAG
  rationale: Aorist participle in the genitive absolute-like construction is best
    represented as prior action relative to the eating; 'after ... had given thanks'
    makes the temporal relationship clear in natural English.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per project doctrine for this title. In Johannine
    context this refers to Jesus and carries honorific weight beyond 'master'.
