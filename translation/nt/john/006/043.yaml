id: JHN.6.43
reference: John 6:43
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτοῖς· Μὴ γογγύζετε μετ’ ἀλλήλων.
translation:
  text: Jesus answered and said to them, “Do not grumble among yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with one another.”
    reason: lexical_alternative
  - marker: b
    text: The verb translated “grumble” can also be rendered “murmur” or “complain,”
      but “grumble” best preserves the term’s biblical resonance here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι commonly means 'answered'
    or 'replied.' 'Answered' preserves the standard discourse function and pairs naturally
    with the following εἶπεν.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: λέγω in this narrative formula is most naturally rendered 'said.' Keeping
    both verbs ('answered and said') reflects the Greek idiom without awkwardness
    in English.
- source_word: Μὴ γογγύζετε
  chosen: Do not grumble
  alternatives:
  - Stop grumbling
  - Do not murmur
  - Do not complain
  lexicon: BDAG
  rationale: Present imperative with μή can prohibit an action in progress or more
    generally forbid it. 'Do not grumble' preserves the lexical sense of γογγύζω and
    avoids overcommitting to the ingressive nuance of 'stop grumbling.' 'Grumble'
    also echoes biblical wilderness-language better than the flatter 'complain.'
- source_word: μετ’ ἀλλήλων
  chosen: among yourselves
  alternatives:
  - with one another
  - among one another
  lexicon: BDAG
  rationale: The phrase denotes mutual action within the group. 'Among yourselves'
    is idiomatic modern English and fits the context of internal murmuring within
    the crowd.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard English transliteration of the personal name Ἰησοῦς, following
    the translation policy to transliterate names.
