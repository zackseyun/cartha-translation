id: JHN.6.3
reference: John 6:3
source:
  edition: SBLGNT
  text: ἀνῆλθεν δὲ εἰς τὸ ⸀ὄρος Ἰησοῦς, καὶ ἐκεῖ ἐκάθητο μετὰ τῶν μαθητῶν αὐτοῦ.
translation:
  text: Then Jesus went up on the mountain, and there he sat with his disciples.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνῆλθεν
  chosen: went up
  alternatives:
  - went up into
  - ascended
  lexicon: BDAG
  rationale: Aorist of ἀνέρχομαι commonly means 'go up' in narrative movement. 'Ascended'
    is too elevated in English for this ordinary geographical action; 'went up' is
    natural and accurate.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    conveys the forward movement of the story in readable English.
- source_word: εἰς τὸ ὄρος
  chosen: on the mountain
  alternatives:
  - into the mountain
  - to the mountain
  - into the hill country
  lexicon: BDAG
  rationale: With ἀνῆλθεν, εἰς τὸ ὄρος idiomatically describes going up onto the mountain/hillside.
    'On the mountain' is idiomatic English and fits the scene better than the overly
    literal 'into the mountain.' The article is retained as 'the mountain,' reflecting
    a specific elevation in the setting, though not necessarily a named mountain.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Simple locative adverb; 'there' is the natural English equivalent.
- source_word: ἐκάθητο
  chosen: sat
  alternatives:
  - was sitting
  - seated himself
  lexicon: BDAG
  rationale: Imperfect middle/passive of κάθημαι can denote being seated or sitting.
    In English narrative, 'sat' communicates the action/state naturally without awkwardness.
    The imperfect nuance is sufficiently carried by the scene-setting context.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  chosen: with his disciples
  alternatives:
  - with the disciples of him
  - with his learners
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' μαθητής is best rendered 'disciple'
    in Gospel contexts because it preserves the teacher-follower relationship better
    than the flatter 'learner' or 'student.'
