id: JHN.6.40
reference: John 6:40
source:
  edition: SBLGNT
  text: τοῦτο ⸀γάρ ἐστιν τὸ θέλημα τοῦ ⸂πατρός μου⸃ ἵνα πᾶς ὁ θεωρῶν τὸν υἱὸν καὶ
    πιστεύων εἰς αὐτὸν ἔχῃ ζωὴν αἰώνιον, καὶ ἀναστήσω αὐτὸν ⸀ἐγὼ τῇ ἐσχάτῃ ἡμέρᾳ.
translation:
  text: 'For this is the will of my Father: that everyone who sees the Son and believes
    in him may have eternal life, and I myself will raise him up on the last day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who beholds the Son and believes in him.' The verb can carry
      the sense of attentive seeing, not merely physical sight.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''and I will raise him up.'' The Greek explicitly includes ''I,'' adding
      emphasis: ''I myself will raise him up.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο γάρ ἐστιν
  chosen: For this is
  alternatives:
  - Because this is
  - Indeed this is
  lexicon: BDAG
  rationale: γάρ is rendered with the natural connective 'For' to preserve the explanatory
    force linking this verse to the preceding statement. 'This is' straightforwardly
    represents τοῦτο ἐστιν.
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - the desire
  - the intention
  lexicon: BDAG
  rationale: θέλημα commonly denotes will or what one intends/wants. 'Will' is the
    standard and most theologically transparent rendering here.
- source_word: τοῦ πατρός μου
  chosen: of my Father
  alternatives:
  - of my father
  lexicon: BDAG
  rationale: The possessive phrase is rendered directly. 'Father' is capitalized as
    a reverential/title use for God in context, while preserving the filial relationship
    expressed by Jesus.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/purpose of the Father's will. 'That'
    is idiomatic in English after 'the will ... is' while still preserving the clause's
    purposive/resultative force.
- source_word: πᾶς ὁ θεωρῶν
  chosen: everyone who sees
  alternatives:
  - everyone who beholds
  - everyone seeing
  lexicon: BDAG
  rationale: 'The articular present participle has a generic force: ''everyone who
    sees.'' θεωρέω can mean ''see, observe, behold''; ''sees'' is clear modern English
    and avoids archaic tone while preserving the ongoing/generic sense.'
- source_word: τὸν υἱὸν
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: In Johannine context this is a christological title, so 'the Son' appropriately
    preserves the title and theological weight.
- source_word: καὶ πιστεύων εἰς αὐτὸν
  chosen: and believes in him
  alternatives:
  - and trusts in him
  - and has faith in him
  lexicon: BDAG
  rationale: πιστεύω with εἰς commonly expresses personal belief/trust directed toward
    someone. 'Believes in him' is the most idiomatic and established rendering here;
    'trusts in him' is a viable nuance but less directly tied to Johannine usage.
- source_word: ἔχῃ
  chosen: may have
  alternatives:
  - should have
  - has
  lexicon: BDAG
  rationale: The present subjunctive under ἵνα is well represented by 'may have' in
    English, preserving the clause structure without overstating it as an indicative.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age to come
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and contextually appropriate rendering
    in John, preserving both duration and qualitative theological resonance.'
- source_word: καὶ ἀναστήσω αὐτὸν ἐγὼ
  chosen: and I myself will raise him up
  alternatives:
  - and I will raise him up
  - and I will resurrect him
  lexicon: BDAG
  rationale: ἀναστήσω here refers to eschatological raising. 'Raise him up' matches
    Johannine diction. The explicit ἐγώ adds emphasis, captured by 'I myself' rather
    than omitted.
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - at the last day
  - on the final day
  lexicon: BDAG
  rationale: This dative temporal phrase is idiomatically rendered 'on the last day.'
    'At the last day' is traditional but less natural in contemporary English.
