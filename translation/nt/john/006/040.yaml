theological_decisions:
- issue: Scope and condition in πᾶς ὁ θεωρῶν ... καὶ πιστεύων
  chosen_reading: that everyone who sees the Son and believes in him may have eternal
    life
  alternative_readings:
  - that whoever looks on the Son and believes in him has eternal life
  rationale: The verse presents the Father's will in terms of those characterized
    by seeing and believing. The translation preserves the participial, generic formulation
    without importing a denominational framework about election or free will. 'May
    have' reflects the ἵνα + subjunctive structure rather than flattening it into
    a simple indicative, while the broader Johannine context still clearly conveys
    the promise of life to believers.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Emphasis of ἐγώ in καὶ ἀναστήσω αὐτὸν ἐγὼ
  chosen_reading: and I myself will raise him up
  alternative_readings:
  - and I will raise him up
  rationale: Including 'I myself' preserves the emphatic pronoun without adding doctrinal
    content beyond the text. It highlights Jesus' personal agency in the resurrection
    promise, which is explicit in the Greek.
  doctrine_reference: Original-language primacy over translation tradition.
