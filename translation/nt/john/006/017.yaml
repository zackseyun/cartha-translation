theological_decisions:
- issue: Narrative aspect and temporal sequence
  chosen_reading: 'The verse is rendered to preserve the sequence: they got into the boat, were crossing toward Capernaum, darkness had already come, and Jesus had not yet come to them.'
  alternative_readings:
  - Render ἤρχοντο as simple past 'they went'
  - Render ἐγεγόνει as stative 'it was already dark'
  rationale: This is not a major doctrinal crux, but preserving the Greek aspect helps maintain the narrative tension leading into Jesus' approach on the water in the following verses. No theological claim beyond the text is imported.
  doctrine_reference: Translation philosophy §1, §3, §6
