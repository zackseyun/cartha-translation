id: JHN.6.17
reference: John 6:17
source:
  edition: SBLGNT
  text: καὶ ἐμβάντες ⸀εἰς πλοῖον ἤρχοντο πέραν τῆς θαλάσσης εἰς Καφαρναούμ. καὶ σκοτία ἤδη ἐγεγόνει καὶ ⸀οὔπω ἐληλύθει πρὸς αὐτοὺς ὁ Ἰησοῦς,
translation:
  text: They got into a boat and were heading across the sea to Capernaum. And it had already become dark, and Jesus had not yet come to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the other side of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'darkness had already fallen.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and after getting into a boat, they were going'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐμβάντες εἰς πλοῖον
  chosen: after getting into a boat
  alternatives:
  - having boarded a boat
  - after entering the boat
  lexicon: BDAG
  rationale: The aorist participle ἐμβάντες is naturally rendered as prior action relative to the main verb. 'Getting into' is idiomatic modern English and preserves the sequence. πλοῖον is rendered 'boat' rather than 'ship' because the setting is the Sea of Galilee and the vessel is not implied to be large.
- source_word: ἤρχοντο
  chosen: they were going across
  alternatives:
  - they set out
  - they were heading
  lexicon: BDAG
  rationale: Although the morphology table lists lemma ἄρχω, the form here reflects ἔρχομαι in the imperfect, conveying ongoing movement. 'They were going' preserves the imperfective aspect better than a simple past such as 'they went' or the ingressive 'they set out.'
- source_word: πέραν τῆς θαλάσσης
  chosen: across the sea
  alternatives:
  - to the other side of the sea
  lexicon: BDAG
  rationale: πέραν with the genitive indicates movement across or to the far side. 'Across the sea' is concise and natural, while still conveying the crossing. 'Sea' is retained rather than 'lake' because θάλασσα is the source term and John consistently uses that designation.
- source_word: εἰς Καφαρναούμ
  chosen: to Capernaum
  lexicon: BDAG
  rationale: Standard transliteration of the place name, following the translation philosophy to transliterate names.
- source_word: σκοτία ἤδη ἐγεγόνει
  chosen: it had already become dark
  alternatives:
  - darkness had already fallen
  - it was already dark
  lexicon: BDAG
  rationale: The pluperfect ἐγεγόνει indicates a state resulting from prior change. 'It had already become dark' preserves that nuance more closely than the flatter 'it was already dark,' while remaining readable. σκοτία is rendered idiomatically with impersonal 'it' in English.
- source_word: οὔπω ἐληλύθει πρὸς αὐτοὺς
  chosen: had not yet come to them
  alternatives:
  - had not yet joined them
  - had not yet come to be with them
  lexicon: BDAG
  rationale: The pluperfect ἐληλύθει with οὔπω indicates that by that point Jesus still had not arrived in their presence. 'Come to them' is the most direct rendering of πρὸς αὐτούς and avoids over-interpretation.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
