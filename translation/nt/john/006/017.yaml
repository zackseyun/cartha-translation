  from: and after getting into a boat, they were going
  to: They got into a boat and were heading
  rationale: The rendering of the aorist participle 'ἐμβάντες' with 'after getting into' is grammatically correct but slightly cumbersome in English. A more fluid and common way to handle this construction is to resolve the participle into a finite verb in a coordinate clause. This avoids the slightly stilted 'after + gerund' structure while maintaining the sequence of events and the imperfective aspect of the main verb.
