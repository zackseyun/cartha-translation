id: JHN.6.4
reference: John 6:4
source:
  edition: SBLGNT
  text: ἦν δὲ ἐγγὺς τὸ πάσχα, ἡ ἑορτὴ τῶν Ἰουδαίων.
translation:
  text: Now the Passover, the feast of the Jews, was near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the feast of the Judeans.' The Greek term can denote either Jews generally
      or Judeans in particular, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ is a mild connective marking narrative progression. 'Now' gives natural
    English scene-setting without overstating contrast.
- source_word: ἐγγὺς
  chosen: was near
  alternatives:
  - was close
  - was at hand
  lexicon: BDAG
  rationale: ἐγγύς here functions predicatively with ἦν to indicate temporal nearness.
    'Was near' is clear, idiomatic, and suitably formal.
- source_word: πάσχα
  chosen: Passover
  lexicon: BDAG
  rationale: πάσχα refers to the Jewish Passover festival. 'Passover' is the standard
    and precise English equivalent.
- source_word: ἑορτὴ
  chosen: feast
  alternatives:
  - festival
  lexicon: BDAG
  rationale: ἑορτή denotes a festal celebration. 'Feast' preserves the traditional
    and cultic sense, while remaining natural English.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖος can mean either 'Jew' or 'Judean' depending on context. Here,
    because Passover is a people-wide religious feast rather than a merely regional
    Judean observance, 'of the Jews' best fits the referent. The appositional phrase
    likely clarifies the feast for readers and reflects Johannine usage without requiring
    a narrower geographic sense.
