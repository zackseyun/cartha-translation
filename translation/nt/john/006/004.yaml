theological_decisions:
- issue: Rendering Ἰουδαίων in Johannine narration
  chosen_reading: of the Jews
  alternative_readings:
  - of the Judeans
  rationale: John's use of Ἰουδαῖοι is context-sensitive and can at times denote Judean
    authorities or inhabitants of Judea. In this verse, however, the reference is
    to Passover as the national/religious feast associated with the Jewish people
    broadly, so 'of the Jews' is the more natural and historically accurate rendering.
    This avoids importing later anti-Jewish connotations while preserving the plain
    sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity only where the source is genuinely ambiguous in context.'
