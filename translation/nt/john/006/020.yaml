theological_decisions:
- issue: Whether Ἐγώ εἰμι should be rendered as a simple self-identification or as
    the more literal 'I am' with possible theological overtones
  chosen_reading: 'Main text: ''It is I'''
  alternative_readings:
  - I am
  - I am he
  rationale: In context, Jesus is reassuring the disciples by identifying himself.
    Rendering the phrase as 'It is I' best conveys the immediate narrative function
    in clear English. At the same time, because John's Gospel can invest ἐγώ εἰμι
    language with deeper resonance, the more literal alternative is preserved in a
    footnote rather than suppressed or forced into the main text. This preserves theological
    tension rather than resolving it beyond what the verse itself requires.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3 (Preserve theological
    tension rather than resolve it)
