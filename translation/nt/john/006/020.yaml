id: JHN.6.20
reference: John 6:20
source:
  edition: SBLGNT
  text: ὁ δὲ λέγει αὐτοῖς· Ἐγώ εἰμι, μὴ φοβεῖσθε.
translation:
  text: But he said to them, “It is I; do not be afraid.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I am.' In John, this expression can function as simple
      self-identification and may also echo broader theological themes.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - And he
  - Then he
  lexicon: BDAG
  rationale: δέ is a mild connective marking development or contrast. 'But' preserves
    the discourse shift naturally in English without over-translating. The article
    ὁ functions pronominally here, referring to Jesus, so 'he' is the natural English
    rendering.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative
    style commonly shifts this to simple past for readability. This is a standard
    optimal-equivalence adjustment that preserves sense rather than Greek aspectual
    form.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The pronoun is dative plural and does not explicitly repeat 'disciples'
    in this verse. 'To them' translates the Greek directly while allowing the context
    to identify the referent.
- source_word: Ἐγώ εἰμι
  chosen: It is I
  alternatives:
  - I am
  - I am he
  lexicon: BDAG
  rationale: In this immediate narrative context, Jesus is identifying himself to
    the frightened disciples. 'It is I' communicates the idiomatic force in natural
    English. Because ἐγώ εἰμι can also be heard more starkly as 'I am,' that alternative
    is preserved in a footnote due to possible theological resonance in Johannine
    usage.
- source_word: μὴ φοβεῖσθε
  chosen: do not be afraid
  alternatives:
  - do not fear
  - stop being afraid
  lexicon: BDAG
  rationale: The present middle/passive imperative with μή is a standard prohibition.
    'Do not be afraid' is idiomatic modern English and fits the immediate context
    of fear during the storm. 'Do not fear' is more formal but less natural here.
