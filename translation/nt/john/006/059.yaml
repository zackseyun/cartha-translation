id: JHN.6.59
reference: John 6:59
source:
  edition: SBLGNT
  text: ταῦτα εἶπεν ἐν συναγωγῇ διδάσκων ἐν Καφαρναούμ.
translation:
  text: He said these things while teaching in the synagogue in Capernaum.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The neuter plural demonstrative naturally refers back to the preceding
    discourse as a set of sayings or matters. 'These things' preserves the plural
    better than the more idiomatic but less precise 'this.'
- source_word: εἶπεν
  chosen: He said
  alternatives:
  - Jesus said
  - he spoke
  lexicon: BDAG
  rationale: The aorist of λέγω is most directly rendered 'said.' The subject is implicit
    in Greek and contextually Jesus, but English can preserve the Greek's implicit
    subject with 'He' without adding the name.
- source_word: ἐν συναγωγῇ
  chosen: in the synagogue
  alternatives:
  - in a synagogue
  - at the synagogue
  lexicon: BDAG
  rationale: Although Greek lacks an article here, anarthrous ἐν plus a singular noun
    can still be definite in context. Given the local setting in Capernaum, 'the synagogue'
    is the most natural English rendering.
- source_word: διδάσκων
  chosen: while teaching
  alternatives:
  - teaching
  - as he was teaching
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is best
    expressed adverbially in English. 'While teaching' clearly conveys the ongoing
    action accompanying his speaking.
- source_word: ἐν Καφαρναούμ
  chosen: in Capernaum
  alternatives:
  - at Capernaum
  lexicon: BDAG
  rationale: Καφαρναούμ is a place name and should be transliterated per project philosophy.
    'In Capernaum' is the standard and natural locative rendering.
