id: JHN.6.47
reference: John 6:47
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ὁ ⸀πιστεύων ἔχει ζωὴν αἰώνιον.
translation:
  text: Truly, truly, I say to you, the one who believes has eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "whoever believes." The Greek has an articular present participle, literally
      "the one believing."
    reason: lexical_alternative
  - marker: b
    text: Or "everlasting life"; more literally, "life age-lasting / of the age."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most assuredly
  lexicon: BDAG
  rationale: The doubled ἀμήν is a solemn discourse marker in John introducing an
    emphatic declaration. 'Truly, truly' preserves both the repetition and the force
    in natural English better than leaving it untranslated as 'Amen, amen.'
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering of the present indicative plus dative pronoun.
    'I say to you' is slightly more formal and preserves the Johannine cadence after
    the doubled ἀμήν.
- source_word: ὁ πιστεύων
  chosen: the one who believes
  alternatives:
  - whoever believes
  - the believing one
  lexicon: BDAG
  rationale: The articular present participle denotes a person characterized by believing.
    'The one who believes' preserves the substantival participle and the present aspect
    without over-paraphrasing. 'Whoever believes' is possible but slightly more idiomatic/dynamic.
- source_word: πιστεύων
  chosen: believes
  alternatives:
  - has faith
  - trusts
  lexicon: BDAG
  rationale: From πιστεύω, the standard Johannine verb for believing. 'Believes' is
    the most direct rendering. Although the contested-terms table addresses πίστις
    rather than πιστεύω, related alternatives such as 'trusts' are possible; here
    'believes' best matches Johannine usage and established semantic range without
    importing extra nuance.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present indicative. 'Has' preserves the present-tense assertion
    that eternal life is a present possession, not merely future.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - everlasting life
  - life of the age
  lexicon: BDAG
  rationale: This is the standard and natural rendering in John. 'Eternal life' communicates
    both the durative and qualitative theological sense of αἰώνιος in Johannine context
    better than the more wooden 'life of the age,' while remaining faithful to the
    source.
