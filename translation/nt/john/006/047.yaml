theological_decisions:
- issue: Present possession of eternal life
  chosen_reading: has eternal life
  alternative_readings:
  - will have eternal life
  rationale: The Greek present tense ἔχει should be preserved. Rendering it as future
    would flatten John's realized eschatology and go beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
