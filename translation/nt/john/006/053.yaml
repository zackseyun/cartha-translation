theological_decisions:
- issue: Whether to render the eating/drinking language literally or interpretively
    in light of sacramental or metaphorical debates
  chosen_reading: Retain the literal wording 'eat the flesh ... and drink his blood'
    without interpretive expansion
  alternative_readings:
  - Use more interpretive language such as 'partake of' or 'receive'
  - Translate with explicitly Eucharistic wording such as 'eat the body'
  rationale: The verse's wording is intentionally concrete and provocative. The translation
    should preserve the theological tension rather than resolve whether the saying
    is primarily sacramental, metaphorical, or both. Using 'flesh' and 'blood' avoids
    importing a denominational reading while remaining faithful to the Greek.
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
- issue: Whether to expand 'life' to 'eternal life' based on Johannine context
  chosen_reading: Keep 'life' in the main text
  alternative_readings:
  - '''eternal life'''
  rationale: Although John's Gospel often speaks of eternal life, this verse uses
    ζωὴν without αἰώνιον. Expanding the phrase would add interpretive content not
    explicit in the source.
  doctrine_reference: Translation philosophy §1 and §3
