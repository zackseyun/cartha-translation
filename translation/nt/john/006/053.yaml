id: JHN.6.53
reference: John 6:53
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτοῖς ὁ Ἰησοῦς· Ἀμὴν ἀμὴν λέγω ὑμῖν, ἐὰν μὴ φάγητε τὴν σάρκα τοῦ
    υἱοῦ τοῦ ἀνθρώπου καὶ πίητε αὐτοῦ τὸ αἷμα, οὐκ ἔχετε ζωὴν ἐν ἑαυτοῖς.
translation:
  text: So Jesus said to them, “Truly, truly, I say to you, unless you eat the flesh
    of the Son of Man and drink his blood, you do not have life in yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'body' for 'flesh'; Greek has 'flesh' (σάρξ), which preserves the concrete
      force of the saying.
    reason: lexical_alternative
  - marker: b
    text: The verse says simply 'life,' not 'eternal life,' though the wider context
      in John often connects this life with eternal life.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential or consequential transition from the preceding discourse.
    'So' is natural modern English and preserves the connection without sounding overly
    formal.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Truly
  lexicon: BDAG
  rationale: This Johannine doubled formula introduces a solemn, emphatic declaration.
    'Truly, truly' communicates the force in readable English better than leaving
    it untranslated as 'Amen, amen.'
- source_word: ἐὰν μὴ
  chosen: unless
  alternatives:
  - if not
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the conditional construction in English.
- source_word: φάγητε
  chosen: eat
  alternatives:
  - consume
  lexicon: BDAG
  rationale: Aorist subjunctive of ἐσθίω in a conditional clause; 'eat' is the plain
    literal sense and should be preserved here.
- source_word: σάρκα
  chosen: flesh
  alternatives:
  - body
  lexicon: BDAG
  rationale: Per doctrine guidance, σάρξ is rendered 'flesh' in literal contexts.
    Here the term is concrete and deliberately vivid; 'body' would soften the lexical
    force and import later sacramental phrasing not present in the Greek.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: of the Son of Man
  alternatives:
  - of the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation and should be preserved in
    its traditional, source-near form. It carries Danielic and messianic resonance
    that 'Human One' may clarify for some readers but does not match the project's
    likely consistency preference as well.
- source_word: πίητε
  chosen: drink
  alternatives: []
  lexicon: BDAG
  rationale: Literal sense of πίνω; the vivid parallel with 'eat' should be maintained.
- source_word: αἷμα
  chosen: blood
  alternatives: []
  lexicon: BDAG
  rationale: Literal rendering preserves the stark imagery and theological weight
    of the saying.
- source_word: ζωὴν
  chosen: life
  alternatives:
  - eternal life
  lexicon: BDAG
  rationale: The Greek says simply 'life,' not 'eternal life,' though the broader
    Johannine context informs its quality. The translation should not import the adjective
    absent from this verse.
- source_word: ἐν ἑαυτοῖς
  chosen: in yourselves
  alternatives:
  - within yourselves
  lexicon: BDAG
  rationale: A direct rendering of the prepositional phrase. 'In yourselves' preserves
    the Greek wording and the idea that such life is not possessed inherently apart
    from the Son.
