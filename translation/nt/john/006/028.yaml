id: JHN.6.28
reference: John 6:28
source:
  edition: SBLGNT
  text: εἶπον οὖν πρὸς αὐτόν· Τί ποιῶμεν ἵνα ἐργαζώμεθα τὰ ἔργα τοῦ θεοῦ;
translation:
  text: Then they said to him, “What must we do so that we may work the works of God?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What should we do so that we may do the works of God?” The Greek can
      also be understood as “the works God requires.”
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον
  chosen: they said
  alternatives:
  - they told
  lexicon: BDAG
  rationale: Aorist of λέγω is naturally rendered as simple past narrative speech,
    'they said.' 'Told' would over-specify the speech act.
- source_word: οὖν
  chosen: Then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks discourse continuity/inference. 'Then' fits the narrative flow
    in clear modern English without overstating logical force.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: 'With a verb of speaking, πρός + accusative idiomatically indicates address:
    ''to him.'''
- source_word: Τί
  chosen: What
  alternatives:
  - Why
  lexicon: BDAG
  rationale: 'Interrogative neuter singular here asks for the required action: ''What?''
    not ''Why?'''
- source_word: ποιῶμεν
  chosen: must we do
  alternatives:
  - should we do
  - are we to do
  lexicon: BDAG
  rationale: The present subjunctive in deliberative question form asks what action
    is required. 'Must we do' brings out the practical force in idiomatic English;
    'should we do' is possible but slightly weaker.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' is natural modern English and preserves
    the purposive sense.
- source_word: ἐργαζώμεθα
  chosen: we may work
  alternatives:
  - we may be working
  - we may do
  lexicon: BDAG
  rationale: ἐργάζομαι means 'work, accomplish, carry out.' Rendering it as 'work'
    preserves the verbal connection with ἔργα in the next phrase.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  - the tasks
  lexicon: BDAG
  rationale: ἔργα is best rendered 'works' here to preserve the lexical repetition
    with ἐργαζώμεθα and the theological resonance of 'works' in Johannine context.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - that God requires
  - belonging to God
  lexicon: BDAG
  rationale: The genitive is left formally open as 'of God,' preserving the ambiguity
    between works belonging to God, works from God, or works God requires. This avoids
    importing an interpretive resolution not explicit in the Greek.
