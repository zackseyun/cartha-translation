theological_decisions:
- issue: Meaning of the genitive in 'τὰ ἔργα τοῦ θεοῦ'
  chosen_reading: Retain the literal phrase 'the works of God' in the main text without
    resolving whether it means works God requires or works that belong to/come from
    God.
  alternative_readings:
  - the works God requires
  - the works that belong to God
  - the works God does
  rationale: The Greek genitive is semantically open, and the immediate context (especially
    v. 29) plays on that ambiguity. Preserving the tension aligns with the translation
    philosophy not to resolve genuine ambiguity beyond what the text warrants.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
