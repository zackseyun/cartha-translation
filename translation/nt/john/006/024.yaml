id: JHN.6.24
reference: John 6:24
source:
  edition: SBLGNT
  text: ὅτε οὖν εἶδεν ὁ ὄχλος ὅτι Ἰησοῦς οὐκ ἔστιν ἐκεῖ οὐδὲ οἱ μαθηταὶ αὐτοῦ, ἐνέβησαν
    αὐτοὶ εἰς τὰ ⸀πλοιάρια καὶ ἦλθον εἰς Καφαρναοὺμ ζητοῦντες τὸν Ἰησοῦν.
translation:
  text: So when the crowd saw that Jesus was not there, nor his disciples, they themselves
    got into the boats and came to Capernaum, looking for Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the small boats' or 'the little boats'; the Greek uses a diminutive
      form for 'boats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  chosen: So when
  alternatives:
  - When therefore
  - Therefore when
  lexicon: BDAG
  rationale: Renders the temporal conjunction ὅτε with the inferential/continuative
    οὖν in natural modern English. 'So when' preserves both sequence and narrative
    connection without sounding wooden.
- source_word: ὁ ὄχλος
  chosen: the crowd
  alternatives:
  - the multitude
  - the people
  lexicon: BDAG
  rationale: ὄχλος commonly denotes a gathered crowd. 'The crowd' is clear, idiomatic,
    and fits the narrative setting better than the more archaic 'multitude.'
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - realized
  - noticed
  lexicon: BDAG
  rationale: Although singular in form with a collective subject, the verb straightforwardly
    means 'saw.' English naturally uses the singular collective subject 'the crowd
    saw.' 'Realized' would over-interpret the cognitive nuance.
- source_word: οὐκ ἔστιν ἐκεῖ
  chosen: was not there
  alternatives:
  - is not there
  lexicon: BDAG
  rationale: Greek uses the present ἔστιν in vivid narrative after a past-frame verb.
    English idiom prefers backshifting to 'was not there' in this context.
- source_word: οὐδὲ οἱ μαθηταὶ αὐτοῦ
  chosen: nor his disciples
  alternatives:
  - and neither were his disciples
  lexicon: BDAG
  rationale: Compactly preserves the negative coordination with Jesus' absence. 'Nor
    his disciples' is natural after 'Jesus was not there.'
- source_word: ἐνέβησαν
  chosen: got into
  alternatives:
  - boarded
  - went into
  lexicon: BDAG
  rationale: ἐμβαίνω means to go into or board a vessel. 'Got into' is natural modern
    English and appropriately concrete.
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  - they too
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'They themselves' preserves the emphasis that
    the crowd, in response, personally boarded the boats.
- source_word: τὰ πλοιάρια
  chosen: the boats
  alternatives:
  - the small boats
  - the little boats
  lexicon: BDAG
  rationale: πλοιάριον is a diminutive ('small boat'), but in many contexts the diminutive
    force is not prominent in English. 'The boats' is smoother in the main text; the
    more specific alternative is worth preserving in a footnote.
- source_word: ἦλθον εἰς Καφαρναούμ
  chosen: came to Capernaum
  alternatives:
  - went to Capernaum
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come,' though English may also say 'went' depending
    on viewpoint. 'Came to Capernaum' follows the Greek lexical value closely and
    remains idiomatic in narrative.
- source_word: ζητοῦντες τὸν Ἰησοῦν
  chosen: looking for Jesus
  alternatives:
  - seeking Jesus
  lexicon: BDAG
  rationale: ζητέω here denotes searching for or trying to find. 'Looking for Jesus'
    is accessible modern English; 'seeking' is possible but can sound more formal
    or spiritually loaded than the immediate narrative requires.
