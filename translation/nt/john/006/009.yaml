id: JHN.6.9
reference: John 6:9
source:
  edition: SBLGNT
  text: Ἔστιν ⸀παιδάριον ὧδε ⸀ὃς ἔχει πέντε ἄρτους κριθίνους καὶ δύο ὀψάρια· ἀλλὰ
    ταῦτα τί ἐστιν εἰς τοσούτους;
translation:
  text: There is a boy here who has five barley loaves and two fish, but what are
    these for so many?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what do these amount to for so many?'
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδάριον
  chosen: boy
  alternatives:
  - little boy
  - lad
  - young boy
  lexicon: BDAG
  rationale: The term denotes a child or young lad. 'Boy' is natural modern English
    and fits the context better than the dated 'lad' or the more interpretive 'little
    boy.'
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A straightforward locative adverb; 'here' is the natural concise rendering.
- source_word: ὃς ἔχει
  chosen: who has
  alternatives:
  - that has
  lexicon: BDAG
  rationale: The relative clause identifies the boy by what he possesses. 'Who has'
    is idiomatic for a personal referent in English.
- source_word: ἄρτους κριθίνους
  chosen: barley loaves
  alternatives:
  - barley bread loaves
  - loaves of barley bread
  lexicon: BDAG
  rationale: ἄρτους are loaves/bread, and κριθίνους specifies barley. 'Barley loaves'
    is concise, accurate, and idiomatic.
- source_word: ὀψάρια
  chosen: fish
  alternatives:
  - small fish
  - relishes
  lexicon: BDAG
  rationale: In this context the word refers to fish eaten with bread. 'Fish' is the
    clearest natural rendering; 'small fish' may be possible but over-specifies, and
    'relishes' would be obscure in English.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - however
  - yet
  lexicon: BDAG
  rationale: Marks contrast between the available food and the size of the crowd.
    'But' best preserves the directness of the statement.
- source_word: ταῦτα τί ἐστιν
  chosen: what are these
  alternatives:
  - what is this
  - what do these amount to
  lexicon: BDAG
  rationale: 'The neuter plural subject with singular verb is normal Greek usage.
    English idiom requires plural agreement: ''what are these.'' The sense is evaluative,
    but the more literal wording preserves the rhetorical force.'
- source_word: εἰς τοσούτους
  chosen: for so many
  alternatives:
  - among so many
  - for so great a crowd
  lexicon: BDAG
  rationale: εἰς here expresses relation or adequacy with respect to the large number
    of people present. 'For so many' is idiomatic and captures the sense of insufficiency.
