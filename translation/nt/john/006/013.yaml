id: JHN.6.13
reference: John 6:13
source:
  edition: SBLGNT
  text: συνήγαγον οὖν, καὶ ἐγέμισαν δώδεκα κοφίνους κλασμάτων ἐκ τῶν πέντε ἄρτων τῶν
    κριθίνων ἃ ⸀ἐπερίσσευσαν τοῖς βεβρωκόσιν.
translation:
  text: So they gathered them, and filled twelve baskets with pieces from the five
    barley loaves that were left over by those who had eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fragments' for 'pieces' (κλασμάτων).
    reason: lexical_alternative
  - marker: b
    text: Literally, 'which overflowed/abounded for those who had eaten'; the sense
      is that these were the portions left over after the meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγον
  chosen: they gathered them
  alternatives:
  - they collected
  - they gathered
  lexicon: BDAG
  rationale: Aorist active indicative, referring to the disciples' action of collecting
    the leftovers. 'Gathered them' makes explicit the implied object from the context
    and matches the narrative flow.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from Jesus' prior command in v. 12. 'So'
    is natural modern English and preserves the inferential force without sounding
    overly formal.
- source_word: ἐγέμισαν
  chosen: filled
  alternatives:
  - they filled
  lexicon: BDAG
  rationale: Straightforward rendering of the aorist verb. The subject is already
    clear from context, so English can omit the repeated pronoun.
- source_word: κοφίνους
  chosen: baskets
  alternatives:
  - hand-baskets
  lexicon: BDAG
  rationale: The noun denotes baskets; 'baskets' is the standard clear rendering.
    A more specific gloss such as 'hand-baskets' is possible but unnecessarily specific
    in the main text.
- source_word: κλασμάτων
  chosen: pieces
  alternatives:
  - fragments
  - broken pieces
  lexicon: BDAG
  rationale: Refers to broken pieces of bread remaining after the meal. 'Pieces' is
    readable modern English; 'fragments' is possible but slightly less natural here.
- source_word: ἐκ τῶν πέντε ἄρτων τῶν κριθίνων
  chosen: from the five barley loaves
  alternatives:
  - from the five barley breads
  lexicon: BDAG
  rationale: ἄρτοι in this feeding context are loaves of bread; κριθίνων specifies
    barley. 'From the five barley loaves' preserves the source structure and links
    the leftovers to the original provision.
- source_word: ἃ ἐπερίσσευσαν
  chosen: that were left over
  alternatives:
  - which remained over
  - which were in excess
  lexicon: BDAG
  rationale: The relative clause describes the surplus remaining after the crowd ate.
    English idiom prefers passive-style wording here, even though the Greek verb is
    active, because the sense is not that the loaves actively overflowed but that
    portions remained.
- source_word: τοῖς βεβρωκόσιν
  chosen: by those who had eaten
  alternatives:
  - after the people had eaten
  - for those who had eaten
  lexicon: BDAG
  rationale: Perfect active participle of βιβρώσκω, 'to eat,' referring to the eaters.
    'By those who had eaten' captures the relation of the leftovers to the diners.
    It avoids over-specifying 'people' while remaining natural.
