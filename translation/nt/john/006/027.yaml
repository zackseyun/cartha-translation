id: JHN.6.27
reference: John 6:27
source:
  edition: SBLGNT
  text: ἐργάζεσθε μὴ τὴν βρῶσιν τὴν ἀπολλυμένην ἀλλὰ τὴν βρῶσιν τὴν μένουσαν εἰς ζωὴν
    αἰώνιον, ἣν ὁ υἱὸς τοῦ ἀνθρώπου ὑμῖν δώσει, τοῦτον γὰρ ὁ πατὴρ ἐσφράγισεν ὁ θεός.
translation:
  text: Work not for the food that perishes, but for the food that remains for eternal
    life, which the Son of Man will give to you; for God the Father has set his seal
    on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that endures for eternal life.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'has sealed'; the expression conveys authorization or authentication.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐργάζεσθε
  chosen: Work
  alternatives:
  - Labor
  - Work for
  lexicon: BDAG
  rationale: Present middle/deponent imperative, second plural. 'Work' preserves the
    command force in natural English. The object and contrast that follow make the
    sense 'work for' clear without overloading the verb itself.
- source_word: μὴ ... ἀλλὰ
  chosen: not ... but
  alternatives:
  - do not ... but rather
  lexicon: BDAG
  rationale: Preserves the contrastive prohibition/construction straightforwardly
    and idiomatically.
- source_word: βρῶσιν
  chosen: food
  alternatives:
  - nourishment
  - that which is eaten
  lexicon: BDAG
  rationale: In context βρῶσις refers to food rather than the act of eating. 'Food'
    is the most natural and accurate rendering in English.
- source_word: ἀπολλυμένην
  chosen: that perishes
  alternatives:
  - that is perishing
  - that spoils
  lexicon: BDAG
  rationale: Present participle describing food subject to decay. 'That perishes'
    is concise and preserves the broader sense of passing away, while 'spoils' is
    possible but narrower and more colloquial.
- source_word: μένουσαν
  chosen: that remains
  alternatives:
  - that endures
  - that abides
  lexicon: BDAG
  rationale: μένω commonly means remain/abide. 'Remains' gives clear modern English
    and keeps the verbal contrast with 'perishes.' 'Abides' is possible but more traditional
    than natural here.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: for eternal life
  alternatives:
  - unto eternal life
  - leading to eternal life
  lexicon: BDAG
  rationale: εἰς here expresses goal/result. 'For eternal life' is idiomatic and preserves
    the teleological sense without sounding archaic.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard translation of the self-designation/title, preserving both the
    Greek wording and its Danielic/theological resonance.
- source_word: ὑμῖν δώσει
  chosen: will give to you
  alternatives:
  - will give you
  lexicon: BDAG
  rationale: Future indicative with dative indirect object. 'Will give to you' slightly
    preserves the explicit dative, though still natural English.
- source_word: τοῦτον
  chosen: him
  alternatives:
  - this one
  lexicon: BDAG
  rationale: The demonstrative refers to the Son of Man. English idiom prefers the
    pronoun 'him' here rather than the wooden 'this one.'
- source_word: ἐσφράγισεν
  chosen: has set his seal on
  alternatives:
  - sealed
  - authenticated
  - certified
  lexicon: BDAG
  rationale: σφραγίζω can mean seal, mark, certify, authenticate. 'Has set his seal
    on' preserves the metaphor while making its sense intelligible in modern English.
- source_word: ὁ πατὴρ ... ὁ θεός
  chosen: God the Father
  alternatives:
  - the Father, God
  - the Father himself, God
  lexicon: BDAG
  rationale: The appositional construction identifies the Father as God. 'God the
    Father' is natural English and preserves the full referential force without implying
    anything beyond the text.
