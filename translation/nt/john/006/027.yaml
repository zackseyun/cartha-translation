theological_decisions:
- issue: Rendering the apposition ὁ πατὴρ ... ὁ θεός
  chosen_reading: for God the Father has set his seal on him
  alternative_readings:
  - for the Father, God, has set his seal on him
  rationale: The Greek apposition explicitly identifies the Father as God. Rendering
    it 'God the Father' is idiomatic English and consistent with historic orthodoxy
    without importing extra doctrinal formulation beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §6'
- issue: Meaning of ἐσφράγισεν in relation to the Son of Man
  chosen_reading: has set his seal on him
  alternative_readings:
  - has authenticated him
  - has marked him with his seal
  rationale: The metaphor should be preserved where possible rather than reduced to
    a purely interpretive gloss. The phrase communicates divine authorization/authentication
    while retaining the image present in the Greek.
  doctrine_reference: Translation philosophy §1, §6
