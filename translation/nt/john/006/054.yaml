theological_decisions:
- issue: Whether to render the eating/drinking language literally or interpretively
    in sacramental or metaphorical terms
  chosen_reading: Literal eating/drinking language retained without interpretive expansion
  alternative_readings:
  - Interpret as explicitly eucharistic in the main text
  - Interpret as a metaphor for believing in the main text
  rationale: The Greek text itself uses concrete terms ('flesh,' 'blood,' 'eats,'
    'drinks'). To preserve theological tension and avoid importing a denominational
    reading, the translation keeps the literal wording and leaves sacramental or metaphorical
    interpretation to readers and notes rather than the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of αὐτόν
  chosen_reading: him
  alternative_readings:
  - that person
  - them
  rationale: The Greek pronoun is masculine singular and refers to the singular substantival
    participle. Following the project's gender-accurate policy, the translation keeps
    the masculine singular rather than flattening it into gender-neutral English.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
