id: JHN.6.54
reference: John 6:54
source:
  edition: SBLGNT
  text: ὁ τρώγων μου τὴν σάρκα καὶ πίνων μου τὸ αἷμα ἔχει ζωὴν αἰώνιον, κἀγὼ ἀναστήσω
    αὐτὸν τῇ ἐσχάτῃ ἡμέρᾳ.
translation:
  text: The one who eats my flesh and drinks my blood has eternal life, and I will
    raise him up on the last day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feeds on' or more vividly 'chews.' The Greek verb τρώγω is more concrete
      than a generic word for eating.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''I will raise him up.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρώγων
  chosen: The one who eats
  alternatives:
  - Whoever eats
  - The one feeding on
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, describing
    a person characterized by the action. 'The one who eats' preserves the singular,
    personal force and the ongoing aspect better than a bare finite verb. 'Whoever
    eats' is possible but slightly less formally tied to the Greek structure.
- source_word: τρώγων
  chosen: eats
  alternatives:
  - feeds on
  - chews
  lexicon: BDAG
  rationale: τρώγω can carry the concrete sense of eating/gnawing/chewing. In this
    context, 'eats' is the clearest natural English rendering and preserves the literal
    force without becoming overly graphic. The more vivid alternatives are worth preserving
    in a footnote because some readers see rhetorical significance in the verb choice.
- source_word: μου τὴν σάρκα
  chosen: my flesh
  lexicon: BDAG
  rationale: σάρξ is rendered 'flesh' per the project's default for literal contexts.
    Here the reference is concrete rather than metaphorical, so 'flesh' is required
    rather than 'body' or 'sinful nature.'
- source_word: καὶ πίνων μου τὸ αἷμα
  chosen: and drinks my blood
  lexicon: BDAG
  rationale: The coordinated present participle matches τρώγων and is best rendered
    with a parallel English present-tense expression. 'Blood' should remain literal
    and unsoftened.
- source_word: ἔχει
  chosen: has
  alternatives:
  - possesses
  lexicon: BDAG
  rationale: Simple present 'has' best reflects the Greek present indicative and the
    Johannine emphasis on present possession of eternal life.
- source_word: ζωὴν αἰώνιον
  chosen: eternal life
  alternatives:
  - life of the age
  lexicon: BDAG
  rationale: '''Eternal life'' is the standard and contextually accurate Johannine
    rendering. While αἰώνιος can be understood in age-related terms, ''eternal life''
    best communicates both duration and eschatological quality in idiomatic English.'
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and I myself
  lexicon: BDAG
  rationale: The crasis joins καὶ ἐγώ. 'And I' preserves the emphatic subject without
    overtranslating. English can convey the emphasis adequately from position and
    context.
- source_word: ἀναστήσω
  chosen: will raise
  alternatives:
  - will raise up
  lexicon: BDAG
  rationale: The verb means to raise up, especially in resurrection contexts. 'Will
    raise' is concise and natural; 'up' is not strictly necessary in English, though
    traditional. Because 'raise up' is familiar in this context, it is preserved as
    an alternative.
- source_word: αὐτὸν
  chosen: him up
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is grammatically masculine singular and refers back to the
    singular participial subject. Per the project's gender-accurate policy, 'him'
    is retained rather than neutralizing to 'them' or 'that person.' The English includes
    'up' with the pronoun to reflect the natural phrasal verb 'raise up.'
- source_word: τῇ ἐσχάτῃ ἡμέρᾳ
  chosen: on the last day
  alternatives:
  - at the last day
  lexicon: BDAG
  rationale: This is a standard eschatological expression in John. 'On the last day'
    is idiomatic modern English; 'at the last day' is traditional but less natural
    today.
