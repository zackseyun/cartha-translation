theological_decisions:
- issue: Force of Κύριε in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse presents Peter addressing Jesus with κύριος. Following the
    project's default for κύριος, 'Lord' preserves both the respectful address and
    the christological resonance without overstating beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
