id: JHN.6.68
reference: John 6:68
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη αὐτῷ Σίμων Πέτρος· Κύριε, πρὸς τίνα ἀπελευσόμεθα; ῥήματα ζωῆς αἰωνίου
    ἔχεις,
translation:
  text: Simon Peter answered him, “Lord, to whom will we go? You have words of eternal
    life,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Master.” The Greek title can function as a respectful form of address,
      but “Lord” is the project's default rendering for κύριος and fits Johannine
      usage here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding in dialogue. 'Answered' is the
    most natural and common English equivalent here.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun referring to Jesus; straightforwardly rendered 'him' in
    English.
- source_word: Σίμων Πέτρος
  chosen: Simon Peter
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per DOCTRINE.md contested terms, the default rendering
    is 'Lord.' 'Master' is possible in some contexts, but here 'Lord' best matches
    Johannine usage and preserves the title's theological weight.
- source_word: πρὸς τίνα
  chosen: to whom
  alternatives:
  - to who
  lexicon: BDAG
  rationale: 'Idiomatic combination with a verb of going: ''to whom'' is the natural
    English rendering, preserving the personal object of Peter''s question.'
- source_word: ἀπελευσόμεθα
  chosen: will we go
  alternatives:
  - shall we go
  - will we depart
  lexicon: BDAG
  rationale: Future middle of ἀπέρχομαι. 'Will we go' is clear modern English and
    fits the rhetorical question. 'Depart' is too formal and can sound spatially detached
    from the personal force of πρὸς τίνα.
- source_word: ῥήματα
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: BDAG
  rationale: ῥῆμα often denotes spoken words or sayings. 'Words' is the most natural
    English here and avoids unnecessary stiffness while preserving the plural.
- source_word: ζωῆς αἰωνίου
  chosen: of eternal life
  alternatives:
  - of everlasting life
  lexicon: BDAG
  rationale: Genitive construction qualifying 'words.' 'Eternal life' is the standard
    and contextually important Johannine expression; 'everlasting life' is possible
    but less consistent with common Johannine rendering.
- source_word: ἔχεις
  chosen: you have
  alternatives:
  - you possess
  lexicon: BDAG
  rationale: Simple present of possession. 'You have' is direct and idiomatic.
