id: JHN.6.10
reference: John 6:10
source:
  edition: SBLGNT
  text: ⸀εἶπεν ὁ Ἰησοῦς· Ποιήσατε τοὺς ἀνθρώπους ἀναπεσεῖν. ἦν δὲ χόρτος πολὺς ἐν
    τῷ τόπῳ. ἀνέπεσαν οὖν οἱ ἄνδρες τὸν ἀριθμὸν ⸀ὡς πεντακισχίλιοι.
translation:
  text: Jesus said, “Have the people sit down.” Now there was plenty of grass in the
    place. So the men sat down, about five thousand in number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek first says 'the people' (ἀνθρώπους), then later 'the men' (ἄνδρες),
      indicating that the count of about five thousand refers specifically to the
      men.
    reason: lexical_alternative
  - marker: b
    text: Or 'recline.' The Greek verb can refer to reclining for a meal, but here
      'sit down' is used for natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ποιήσατε
  chosen: Have
  alternatives:
  - Make
  - Cause
  lexicon: BDAG
  rationale: 'The aorist imperative of ποιέω with complementary infinitive ἀναπεσεῖν
    is idiomatic causation: ''have/make [them] sit down.'' ''Have'' is natural modern
    English and preserves the directive force without awkwardness.'
- source_word: τοὺς ἀνθρώπους
  chosen: the people
  alternatives:
  - the men
  - the persons
  lexicon: BDAG
  rationale: ἄνθρωπος here refers broadly to the crowd, not specifically males. 'The
    people' best reflects the inclusive sense in context, especially since ἄνδρες
    later specifies the counted males.
- source_word: ἀναπεσεῖν / ἀνέπεσαν
  chosen: sit down / sat down
  alternatives:
  - recline
  - lie down
  lexicon: BDAG
  rationale: ἀναπίπτω can mean 'recline' at a meal, but in this outdoor feeding context
    'sit down' is the most natural English equivalent while still fitting the action
    described. 'Recline' is possible but sounds overly formal or culturally specific
    in contemporary English.
- source_word: χόρτος πολὺς
  chosen: plenty of grass
  alternatives:
  - much grass
  - abundant grass
  lexicon: BDAG
  rationale: χόρτος denotes grass here, and πολὺς indicates abundance. 'Plenty of
    grass' is idiomatic modern English and conveys the narrative detail clearly.
- source_word: ἐν τῷ τόπῳ
  chosen: in the place
  alternatives:
  - in that place
  - there
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'In the place' preserves the article
    and avoids adding emphasis not explicit in the Greek.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - the males
  lexicon: BDAG
  rationale: ἀνήρ specifically denotes adult males/men. This should be distinguished
    from the earlier inclusive ἀνθρώπους. Rendering it 'the men' preserves the gender-specific
    counting note found in the Greek.
- source_word: τὸν ἀριθμὸν ὡς πεντακισχίλιοι
  chosen: about five thousand in number
  alternatives:
  - numbering about five thousand
  - approximately five thousand
  lexicon: BDAG
  rationale: ὡς marks approximation, and τὸν ἀριθμόν clarifies the numerical count.
    'About five thousand in number' preserves both the approximation and the explicit
    counting language in readable English.
