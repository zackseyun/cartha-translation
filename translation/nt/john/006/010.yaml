theological_decisions:
- issue: Gender-specific counting in the feeding narrative
  chosen_reading: Differentiate ἀνθρώπους as inclusive 'people' and ἄνδρες as 'men'
    in the count.
  alternative_readings:
  - Render both terms generically as 'people' or 'persons'
  rationale: The Greek intentionally shifts from a general term for the crowd to a
    male-specific term for the numbered group. Preserving that distinction follows
    the gender-accurate principle and avoids flattening a meaningful lexical contrast.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
