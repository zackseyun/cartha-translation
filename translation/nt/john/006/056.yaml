id: JHN.6.56
reference: John 6:56
source:
  edition: SBLGNT
  text: ὁ τρώγων μου τὴν σάρκα καὶ πίνων μου τὸ αἷμα ἐν ἐμοὶ μένει κἀγὼ ἐν αὐτῷ.
translation:
  text: The one who eats my flesh and drinks my blood remains in me, and I in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feeds on' / 'chews'; the Greek verb is more vivid than a generic word
      for eating.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''abides in me, and I in him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρώγων
  chosen: The one who eats
  alternatives:
  - Whoever eats
  - The one feeding on
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by this action. 'The one who eats' preserves the singular
    and ongoing force without sounding awkward. 'Whoever eats' is possible but slightly
    more generalized. 'Feeding on' reflects the vividness of τρώγω but is less natural
    here.
- source_word: τρώγων
  chosen: eats
  alternatives:
  - chews
  - feeds on
  lexicon: BDAG
  rationale: τρώγω is more graphic than the more common ἐσθίω, often meaning 'eat'
    or 'gnaw/chew.' In clear modern English, 'eats' best fits the verse while avoiding
    over-interpretation. The more vivid alternatives are worth preserving in a footnote
    because some readers see rhetorical significance in the verb choice.
- source_word: μου τὴν σάρκα
  chosen: my flesh
  lexicon: BDAG
  rationale: σάρξ is rendered 'flesh' in keeping with the doctrine guideline for literal
    contexts. Here it refers concretely to Jesus' flesh in the discourse's sacrificial
    and incarnational imagery, not metaphorically to 'sinful nature.'
- source_word: καὶ πίνων μου τὸ αἷμα
  chosen: and drinks my blood
  lexicon: BDAG
  rationale: The coordinated present participle parallels τρώγων and is best rendered
    straightforwardly. 'Blood' should remain literal to preserve the shocking sacrificial
    imagery of the Greek.
- source_word: ἐν ἐμοὶ μένει
  chosen: remains in me
  alternatives:
  - abides in me
  - stays in me
  lexicon: BDAG
  rationale: μένω is a key Johannine verb often rendered 'remain' or 'abide.' 'Remains'
    is chosen for readable modern English while preserving Johannine relational permanence.
    'Abides' is traditional and theologically resonant but less natural for many modern
    readers.
- source_word: κἀγὼ ἐν αὐτῷ
  chosen: and I in him
  alternatives:
  - and I remain in him
  lexicon: BDAG
  rationale: κἀγώ means 'and I also / and I.' The Greek omits a repeated verb, so
    English can naturally supply the elliptical parallel simply as 'and I in him.'
    Adding 'remain' would make the sense explicit but is not necessary and slightly
    over-translates the ellipsis.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - that person
  lexicon: BDAG
  rationale: The pronoun is grammatically masculine singular, referring back to the
    substantival participle. Per the doctrine guideline, gender-accurate language
    is preferred where it matches the source. 'That person' is possible for English
    inclusivity but would move away from the Greek form.
