theological_decisions:
- issue: Eucharistic/sacramental versus metaphorical interpretation of eating flesh
    and drinking blood
  chosen_reading: Retain the literal wording of the Greek without interpretive expansion.
  alternative_readings:
  - Explicitly sacramental wording
  - Explicitly metaphorical wording referring to believing
  rationale: The verse's theological interpretation is contested across Christian
    traditions, but the Greek itself states the imagery without resolving the debate
    here. To preserve theological tension, the translation keeps the concrete language
    'eats my flesh and drinks my blood' and does not import denominational explanation
    into the main text.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
- issue: Johannine mutual indwelling language
  chosen_reading: Translate μένει as relational permanence ('remains') rather than
    a mystical paraphrase.
  alternative_readings:
  - abides
  - is united with
  rationale: The verse expresses mutual indwelling between Jesus and the believer.
    'Remains' preserves the Johannine concept without narrowing it to one theological
    system or paraphrasing it as a later doctrinal formula.
  doctrine_reference: Translation philosophy §1 Original-language primacy; §6 Readable
    modern English.
