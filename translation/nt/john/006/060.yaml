id: JHN.6.60
reference: John 6:60
source:
  edition: SBLGNT
  text: Πολλοὶ οὖν ἀκούσαντες ἐκ τῶν μαθητῶν αὐτοῦ εἶπαν· Σκληρός ἐστιν ⸂ὁ λόγος οὗτος⸃·
    τίς δύναται αὐτοῦ ἀκούειν;
translation:
  text: Therefore many of his disciples, when they heard it, said, “This word is hard;
    who can listen to it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “This saying is hard”; λόγος here can also mean “saying,” “message,”
      or “teaching.”
    reason: lexical_alternative
  - marker: b
    text: Or “who can hear it?” The Greek verb can mean hear, listen to, or heed/accept,
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Quantifier referring to a substantial number within the group of disciples;
    'many' is the natural concise rendering.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference or development from the preceding discourse. 'Therefore'
    preserves the connective force more clearly than the looser 'then.'
- source_word: ἀκούσαντες
  chosen: when they heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context. English idiom is smoother
    with 'when they heard it'; 'it' is supplied from context, referring to Jesus'
    teaching.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: of his disciples
  alternatives:
  - from among his disciples
  lexicon: BDAG
  rationale: The construction indicates that those speaking came from within the larger
    body of his disciples. 'Of his disciples' is idiomatic and preserves that sense
    without overloading the line.
- source_word: Σκληρός
  chosen: hard
  alternatives:
  - harsh
  - difficult
  - offensive
  lexicon: BDAG
  rationale: In this context the complaint is that Jesus' saying is difficult to accept/endure,
    not merely intellectually complex. 'Hard' preserves the ambiguity of severity
    and difficulty better than narrower alternatives.
- source_word: ὁ λόγος οὗτος
  chosen: this word
  alternatives:
  - this saying
  - this message
  - this teaching
  lexicon: BDAG
  rationale: λόγος here refers to the utterance/teaching just heard. 'Word' is formally
    closer and still understandable, while preserving the possibility that the complaint
    concerns the discourse itself rather than a summarized doctrine.
- source_word: τίς δύναται
  chosen: who can
  alternatives:
  - who is able to
  lexicon: BDAG
  rationale: Standard rendering of the question of ability; concise modern English
    fits the tone.
- source_word: αὐτοῦ ἀκούειν
  chosen: listen to it
  alternatives:
  - hear it
  - accept it
  lexicon: BDAG
  rationale: ἀκούω can mean hear, listen, or heed. Here the complaint is not about
    audibility but about enduring/receiving the teaching. 'Listen to it' preserves
    the verbal link to 'heard' while implying receptivity without overinterpreting
    as full 'accept.'
