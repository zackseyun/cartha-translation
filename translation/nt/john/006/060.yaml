theological_decisions:
- issue: Sense of the disciples' objection to Jesus' discourse
  chosen_reading: The statement expresses that Jesus' teaching is difficult or severe
    to receive, without specifying whether the difficulty is intellectual, moral,
    or offensive.
  alternative_readings:
  - The saying is merely intellectually difficult.
  - The saying is morally offensive or intolerable.
  rationale: The adjective σκληρός can cover hardness in the sense of severity, difficulty,
    or offensiveness. The translation preserves this tension with 'hard' rather than
    resolving it into a narrower interpretive category.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
