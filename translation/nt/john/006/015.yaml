id: JHN.6.15
reference: John 6:15
source:
  edition: SBLGNT
  text: Ἰησοῦς οὖν γνοὺς ὅτι μέλλουσιν ἔρχεσθαι καὶ ἁρπάζειν αὐτὸν ἵνα ⸀ποιήσωσιν
    βασιλέα ἀνεχώρησεν ⸀πάλιν εἰς τὸ ὄρος αὐτὸς μόνος.
translation:
  text: So Jesus, knowing that they were about to come and seize him in order to make
    him king, withdrew again to the mountain by himself alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take him by force in order to make him king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the preceding event; 'So'
    is natural modern English and preserves the connective force without sounding
    wooden.
- source_word: γνοὺς
  chosen: knowing
  alternatives:
  - perceiving
  - becoming aware
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω here gives the circumstance for Jesus' action.
    'Knowing' is the most direct and idiomatic rendering.
- source_word: μέλλουσιν ἔρχεσθαι
  chosen: were about to come
  alternatives:
  - intended to come
  - were going to come
  lexicon: BDAG
  rationale: μέλλω with infinitive commonly indicates imminence. 'Were about to come'
    best captures the impending action in context.
- source_word: ἁρπάζειν
  chosen: seize
  alternatives:
  - take by force
  - snatch
  lexicon: BDAG
  rationale: The verb carries the sense of taking suddenly or forcefully. 'Seize'
    is concise and preserves the coercive nuance; 'take by force' is interpretive
    but worth preserving in a footnote.
- source_word: ἵνα ποιήσωσιν βασιλέα
  chosen: in order to make him king
  alternatives:
  - to make him king
  - so that they might make him king
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose. 'In order to make him king' clearly
    conveys intended purpose in natural English.
- source_word: ἀνεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - retreated
  lexicon: BDAG
  rationale: ἀναχωρέω often means to withdraw from a place or situation. 'Withdrew'
    fits both the physical movement and the avoidance implied by the context.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb indicates repeated movement away/return to solitude. 'Again'
    is the standard, unobtrusive rendering.
- source_word: εἰς τὸ ὄρος
  chosen: to the mountain
  alternatives:
  - into the hill country
  - to the hill
  lexicon: BDAG
  rationale: The phrase is literally 'to the mountain.' In Johannine context it likely
    refers to the nearby high ground already mentioned; retaining 'mountain' stays
    closer to the Greek without over-specifying.
- source_word: αὐτὸς μόνος
  chosen: by himself alone
  alternatives:
  - alone
  - by himself
  lexicon: BDAG
  rationale: The combination is emphatic. 'By himself alone' preserves the doubled
    emphasis better than a single English term, though it is slightly fuller.
