theological_decisions:
- issue: Nature of the crowd's intended action toward Jesus' kingship
  chosen_reading: 'Render the action as coercive political enthronement: ''seize him
    in order to make him king.'''
  alternative_readings:
  - take him to make him king
  - come and make him king
  rationale: The presence of ἁρπάζειν indicates force, not merely invitation. The
    translation should not soften the crowd's attempt or import a positive coronation
    scene absent from the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
