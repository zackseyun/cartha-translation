theological_decisions:
- issue: Rendering the citation about manna without importing Johannine interpretation
    into the crowd's words
  chosen_reading: Translate the statement as a historical/scriptural claim about God
    giving bread from heaven, without capitalizing or expanding it to imply the fuller
    christological meaning developed later in the discourse.
  alternative_readings:
  - Use interpretive capitalization or wording that anticipates Jesus as the true
    bread
  rationale: In context, the speakers are citing Scripture about the wilderness manna.
    The translation should preserve their wording and allow the Gospel's later theological
    development to emerge from the narrative rather than be inserted here.
  doctrine_reference: Translation philosophy §1, §3
