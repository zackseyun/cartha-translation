id: JHN.6.31
reference: John 6:31
source:
  edition: SBLGNT
  text: οἱ πατέρες ἡμῶν τὸ μάννα ἔφαγον ἐν τῇ ἐρήμῳ, καθώς ἐστιν γεγραμμένον· Ἄρτον
    ἐκ τοῦ οὐρανοῦ ἔδωκεν αὐτοῖς φαγεῖν.
translation:
  text: 'Our fathers ate the manna in the wilderness, just as it is written: ‘He gave
    them bread from heaven to eat.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Our ancestors.” The Greek literally says “our fathers.”
    reason: lexical_alternative
  - marker: b
    text: “In the wilderness” may also be rendered “in the desert.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες ἡμῶν
  chosen: Our fathers
  alternatives:
  - Our ancestors
  lexicon: BDAG
  rationale: πατέρες literally means 'fathers.' Given the speakers' appeal to Israel's
    forebears, 'our fathers' preserves the idiom and the masculine form of the Greek,
    in keeping with the gender-accurate policy. 'Our ancestors' is possible but less
    formally aligned to the source.
- source_word: τὸ μάννα
  chosen: the manna
  lexicon: BDAG
  rationale: μάννα is the established transliteration for the wilderness food and
    is the natural English equivalent. The article is retained in English because
    it refers to the known, specific provision from the Exodus tradition.
- source_word: ἔφαγον
  chosen: ate
  alternatives:
  - ate of
  lexicon: BDAG
  rationale: Aorist indicative of ἐσθίω is straightforwardly rendered 'ate.' No English
    auxiliary is needed in this narrative citation.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος can mean 'desert' or 'wilderness.' In biblical-exodus context,
    'wilderness' is the more idiomatic and intertextually resonant English rendering.
- source_word: καθώς ἐστιν γεγραμμένον
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: This formula introduces a scriptural citation. 'Just as it is written'
    preserves καθώς with a natural English connective and reflects the perfect passive
    sense of γεγραμμένον as a standing written testimony.
- source_word: Ἄρτον
  chosen: bread
  alternatives:
  - loaf bread
  lexicon: BDAG
  rationale: ἄρτος commonly means 'bread' and here refers generically to food provided
    by God, not a single loaf. English omits the initial capitalization found in the
    Greek citation formatting.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: ἐκ is naturally rendered 'from' in English. 'Heaven' preserves the biblical
    idiom and the theological resonance of divine origin.
- source_word: ἔδωκεν αὐτοῖς φαγεῖν
  chosen: He gave them ... to eat
  alternatives:
  - He gave them food to eat
  lexicon: BDAG
  rationale: The construction with δίδωμι + dative + infinitive is well represented
    by 'gave them ... to eat.' Keeping the infinitive structure preserves the wording
    of the citation more closely than a paraphrase.
