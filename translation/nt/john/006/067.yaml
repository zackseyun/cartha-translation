theological_decisions:
- issue: Force of Jesus' question introduced by μή
  chosen_reading: A negative-question form that implies expectation of 'no' without
    making it an absolute assertion
  alternative_readings:
  - 'A more neutral question: ''Do you also want to go away?'''
  rationale: The Greek μή in questions typically signals that the speaker expects
    a negative response. The translation preserves that discourse nuance in English
    ('You do not want ... do you?') while avoiding overstatement beyond the grammar.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
