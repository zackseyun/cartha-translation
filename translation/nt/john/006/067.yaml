id: JHN.6.67
reference: John 6:67
source:
  edition: SBLGNT
  text: εἶπεν οὖν ὁ Ἰησοῦς τοῖς δώδεκα· Μὴ καὶ ὑμεῖς θέλετε ὑπάγειν;
translation:
  text: So Jesus said to the Twelve, “You do not want to go away too, do you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do you also want to leave?” The Greek question uses μή, which often
      expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the departure of many disciples
    in the preceding context. 'So' is natural modern English and preserves the inferential
    flow without sounding overly formal.
- source_word: τοῖς δώδεκα
  chosen: to the Twelve
  alternatives:
  - to the twelve disciples
  lexicon: BDAG
  rationale: The expression functions as a recognized designation for Jesus' inner
    group. 'The Twelve' preserves the titular force and is concise.
- source_word: Μὴ καὶ ὑμεῖς
  chosen: You do not want to ... too, do you?
  alternatives:
  - Do you also not want to ...?
  - Surely you do not want to ... too?
  lexicon: BDAG
  rationale: μή introducing a question commonly expects a negative answer. Rendering
    it as an English negative question best conveys the Greek nuance without woodenly
    reproducing word order. 'Too' reflects καί and the emphatic ὑμεῖς in light of
    others leaving.
- source_word: θέλετε
  chosen: want
  alternatives:
  - wish
  - intend
  - are willing
  lexicon: BDAG
  rationale: In this context θέλω expresses desire or willingness. 'Want' is the most
    natural contemporary equivalent and fits the direct question.
- source_word: ὑπάγειν
  chosen: to go away
  alternatives:
  - to leave
  - to depart
  lexicon: BDAG
  rationale: Given the immediate context of disciples withdrawing, 'go away' captures
    movement away from Jesus while preserving the verbal sense. 'Leave' is possible
    but slightly more interpretive as leaving Jesus specifically.
