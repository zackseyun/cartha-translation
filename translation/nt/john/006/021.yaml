id: JHN.6.21
reference: John 6:21
source:
  edition: SBLGNT
  text: ἤθελον οὖν λαβεῖν αὐτὸν εἰς τὸ πλοῖον, καὶ εὐθέως ⸂ἐγένετο τὸ πλοῖον⸃ ἐπὶ
    τῆς γῆς εἰς ἣν ὑπῆγον.
translation:
  text: So they were willing to take him into the boat, and immediately the boat was
    at the land to which they were going.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immediately the boat arrived at the shore to which they were going.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤθελον
  chosen: they were willing
  alternatives:
  - they wanted
  - they desired
  lexicon: BDAG
  rationale: The imperfect of θέλω here most naturally conveys disposition or readiness
    rather than a mere punctiliar wish. 'Were willing' fits the narrative flow after
    their fear subsides and avoids overstating emotional desire.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks inference or narrative consequence from the preceding context.
    'So' is natural modern English and preserves the connection without sounding overly
    formal.
- source_word: λαβεῖν αὐτὸν εἰς τὸ πλοῖον
  chosen: to take him into the boat
  alternatives:
  - to receive him into the boat
  - to take him aboard the boat
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive.' In this concrete setting of bringing
    Jesus aboard, 'take him into the boat' is clear and idiomatic while staying close
    to the Greek.
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: In the Sea of Galilee context, 'boat' is the natural English equivalent;
    'ship' would sound too large and archaic for the scene.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: εὐθέως signals immediacy. 'Immediately' preserves the abruptness and
    possible miraculous force of the transition.
- source_word: ἐγένετο τὸ πλοῖον ἐπὶ τῆς γῆς
  chosen: the boat was at the land
  alternatives:
  - the boat came to the land
  - the boat arrived at the shore
  - the boat was on the land
  lexicon: BDAG
  rationale: γίνομαι with a locative expression can denote coming to be at a place.
    'Was at the land' stays close to the Greek wording and leaves intact the suddenness
    of the event. 'On the land' could misleadingly suggest the boat was physically
    beached; 'arrived at the shore' is interpretive but worth preserving in a footnote.
- source_word: γῆς
  chosen: land
  alternatives:
  - shore
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or region. Here it refers to the destination
    landfall. 'Land' is formally closer, while 'shore' is a plausible contextual alternative
    preserved in a footnote.
- source_word: εἰς ἣν ὑπῆγον
  chosen: to which they were going
  alternatives:
  - where they were going
  - for which they were heading
  lexicon: BDAG
  rationale: ὑπάγω here denotes movement toward a destination. 'To which they were
    going' closely reflects the relative construction and the imperfect aspect of
    ongoing travel.
