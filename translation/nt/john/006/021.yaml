theological_decisions:
- issue: Whether to render the second clause in a way that explains or softens the
    apparent miraculous immediacy
  chosen_reading: Retain the straightforward wording 'immediately the boat was at
    the land' without explanatory expansion.
  alternative_readings:
  - immediately the boat arrived at the shore
  - soon the boat reached the land
  rationale: The Greek presents the event tersely and with marked immediacy. Per the
    translation philosophy, the translation should preserve the narrative tension
    rather than reduce it by paraphrase or by explaining away the suddenness.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
