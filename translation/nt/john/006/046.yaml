theological_decisions:
- issue: Relation of the Son to God in παρὰ τοῦ θεοῦ
  chosen_reading: from God
  alternative_readings:
  - from the presence of God
  - with God
  rationale: The phrase should preserve the text's claim of unique divine origin/commission
    without over-specifying metaphysical nuance in the main text. Given Johannine
    theology and orthodox Christology, the verse supports the Son's unique relation
    to the Father, but the translation should not import more than the phrase itself
    states. A footnote preserves the stronger spatial/personal nuance as an alternative.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
