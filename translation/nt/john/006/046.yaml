id: JHN.6.46
reference: John 6:46
source:
  edition: SBLGNT
  text: οὐχ ὅτι τὸν πατέρα ⸂ἑώρακέν τις⸃ εἰ μὴ ὁ ὢν παρὰ τοῦ θεοῦ, οὗτος ἑώρακεν τὸν
    πατέρα.
translation:
  text: Not that anyone has seen the Father, except the one who is from God; he has
    seen the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the presence of God' or 'with God.' The Greek phrase can carry
      a nuance of personal proximity as well as source.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι
  chosen: Not that
  alternatives:
  - It is not that
  - Not because
  lexicon: BDAG
  rationale: Introduces a clarification or qualification of the previous statement,
    not a causal clause. 'Not that' is idiomatic modern English and preserves the
    corrective force.
- source_word: τὸν πατέρα
  chosen: the Father
  lexicon: BDAG
  rationale: Standard Johannine usage for God as Father. Capitalized to reflect titular/divine
    reference in English without adding meaning beyond the Greek.
- source_word: ἑώρακέν τις
  chosen: anyone has seen
  alternatives:
  - someone has seen
  - any person has seen
  lexicon: BDAG
  rationale: The perfect of ὁράω conveys completed action with present relevance;
    English present perfect matches well. τις in this negated context is best rendered
    'anyone'.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  - if not
  lexicon: BDAG
  rationale: Here εἰ μὴ marks an exception, not a condition. 'Except' is the clearest
    English rendering.
- source_word: ὁ ὢν
  chosen: the one who is
  alternatives:
  - the one being
  - he who is
  lexicon: BDAG
  rationale: The substantival present participle identifies a person by ongoing relation
    or status. 'The one who is' is natural and preserves the participial force better
    than a simple pronoun.
- source_word: παρὰ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the presence of God
  - beside God
  - with God
  lexicon: BDAG
  rationale: παρά with the genitive can denote source or origin. In this context,
    'from God' best fits Johannine idiom and readable English. A more spatial nuance
    ('from the presence of God') is possible but too interpretively specific for the
    main text.
- source_word: οὗτος
  chosen: he
  alternatives:
  - this one
  lexicon: BDAG
  rationale: οὗτος points back emphatically to the previously identified person. English
    normally uses 'he' here; the emphasis is sufficiently carried by the sentence
    structure, while 'this one' would sound stilted.
- source_word: ἑώρακεν
  chosen: has seen
  alternatives:
  - saw
  lexicon: BDAG
  rationale: Again the Greek perfect is best represented by the English present perfect,
    emphasizing abiding significance.
