id: JHN.6.66
reference: John 6:66
source:
  edition: SBLGNT
  text: Ἐκ τούτου πολλοὶ ⸀ἐκ ⸂τῶν μαθητῶν αὐτοῦ ἀπῆλθον⸃ εἰς τὰ ὀπίσω καὶ οὐκέτι μετ’
    αὐτοῦ περιεπάτουν.
translation:
  text: From that time many of his disciples went back and no longer walked with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because of this, many of his disciples went away'; the Greek opening
      can be taken causally, though in context 'From that time' better reflects the
      turning-point sense.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐκ τούτου
  chosen: From that time
  alternatives:
  - From this
  - Because of this
  - After this
  lexicon: BDAG
  rationale: In Johannine usage, ἐκ τούτου here is best taken temporally in context
    ('from then on/from that time') rather than strictly causal ('because of this').
    The following actions describe a decisive turning point after Jesus' hard saying.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural modern English
    equivalent.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: of his disciples
  alternatives:
  - from among his disciples
  lexicon: BDAG
  rationale: The partitive ἐκ indicates that those leaving were drawn from the larger
    group of his disciples. 'Of his disciples' is concise and idiomatic while preserving
    the partitive sense.
- source_word: ἀπῆλθον
  chosen: went back
  alternatives:
  - went away
  - withdrew
  - departed
  lexicon: BDAG
  rationale: Combined with εἰς τὰ ὀπίσω, the verb conveys withdrawal/backtracking
    rather than mere departure. 'Went back' captures the sense in natural English.
- source_word: εἰς τὰ ὀπίσω
  chosen: back
  alternatives:
  - to what was behind
  - backward
  lexicon: BDAG
  rationale: This idiom means 'back' or 'away to former things.' Rendering it with
    ἀπῆλθον as 'went back' reflects the Greek idiom without awkward literalism.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any longer
  - no more
  lexicon: BDAG
  rationale: This adverb marks cessation from that point onward; 'no longer' is the
    clearest idiomatic equivalent.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - in company with him
  lexicon: BDAG
  rationale: Simple accompaniment; 'with him' is direct and sufficient.
- source_word: περιεπάτουν
  chosen: walked
  alternatives:
  - kept walking
  - lived
  - followed
  lexicon: BDAG
  rationale: John often uses περιπατέω literally and metaphorically. Here, in combination
    with 'with him,' it denotes ongoing association and following. 'Walked with him'
    preserves the metaphor and avoids over-interpreting it as merely 'followed' or
    'lived'.
