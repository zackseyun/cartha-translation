theological_decisions:
- issue: Whether μαθηταί here should be rendered in a way that implies the Twelve
    or only true believers
  chosen_reading: disciples
  alternative_readings:
  - followers
  rationale: The text states that many from among Jesus' disciples withdrew; it does
    not identify them with the Twelve nor make a doctrinal distinction between superficial
    and genuine disciples in the translation itself. 'Disciples' preserves the narrative
    category without importing later theological conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
