id: JHN.6.48
reference: John 6:48
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ὁ ἄρτος τῆς ζωῆς·
translation:
  text: I am the bread of life.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγώ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: Rendered as the first-person pronoun 'I.' In combination with εἰμι, it
    gives the explicit subject of the clause. English normally does not require extra
    emphasis here, so 'I' is sufficient, while the possible emphatic force is carried
    naturally by the full clause.
- source_word: εἰμι
  chosen: am
  alternatives:
  - exist as
  lexicon: BDAG
  rationale: Standard present indicative of 'to be,' rendered 'am.' In this predicate
    nominative construction, 'am' is the natural English copula.
- source_word: ὁ ἄρτος
  chosen: the bread
  alternatives:
  - the loaf
  - bread
  lexicon: BDAG
  rationale: Rendered with the article as 'the bread' to preserve the definite, identifying
    force of the Greek. 'Loaf' is too concrete and less idiomatic here; anarthrous
    'bread' would weaken the exclusivity and identification in Jesus's saying.
- source_word: τῆς ζωῆς
  chosen: of life
  alternatives:
  - that gives life
  - for life
  lexicon: BDAG
  rationale: Translated formally as 'of life,' preserving the genitival relationship
    and the established Johannine expression. Dynamic alternatives such as 'that gives
    life' capture an interpretive implication but go beyond the compact wording of
    the Greek.
