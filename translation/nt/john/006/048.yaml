theological_decisions:
- issue: Force of the 'I am' saying in Johannine Christology
  chosen_reading: Translate straightforwardly as 'I am' without expanding it into
    a more explicit theological paraphrase.
  alternative_readings:
  - I myself am
  - I am he
  rationale: The Greek here is not an absolute ἐγώ εἰμι construction but a predicate
    statement ('I am the bread of life'). The translation should preserve the strong
    self-identification of Jesus without importing wording not present in the text.
    This maintains orthodox Christological weight while avoiding overtranslation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
