theological_decisions:
- issue: Temporal contrast between Moses' giving and the Father's giving
  chosen_reading: Render δέδωκεν as 'has not given' and δίδωσιν as 'gives' to preserve
    the contrast between the manna associated with Moses and the Father's present
    gift in Jesus' discourse.
  alternative_readings:
  - 'Render both as simple past/present without emphasizing aspect: ''did not give
    ... gives'''
  rationale: 'The verse contrasts not merely two agents but two kinds of bread and
    two temporal horizons: the wilderness manna tradition versus the Father''s present,
    climactic provision. Preserving the Greek aspectual distinction supports the discourse
    without importing extra doctrinal claims.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of 'true bread'
  chosen_reading: Retain 'true bread' in the main text rather than interpretively
    expanding to 'the real bread' or 'the ultimate bread.'
  alternative_readings:
  - the real bread
  - the genuine bread
  rationale: John frequently uses ἀληθινός for the ultimate reality to which earlier
    signs point. 'True bread' preserves that theological tension and allows the reader
    to connect this verse with the broader Johannine pattern without flattening it
    into paraphrase.
  doctrine_reference: Translation philosophy §3, §6
