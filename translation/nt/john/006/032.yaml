id: JHN.6.32
reference: John 6:32
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτοῖς ὁ Ἰησοῦς· Ἀμὴν ἀμὴν λέγω ὑμῖν, οὐ Μωϋσῆς ⸀δέδωκεν ὑμῖν τὸν
    ἄρτον ἐκ τοῦ οὐρανοῦ, ἀλλ’ ὁ πατήρ μου δίδωσιν ὑμῖν τὸν ἄρτον ἐκ τοῦ οὐρανοῦ τὸν
    ἀληθινόν·
translation:
  text: So Jesus said to them, “Truly, truly, I say to you, Moses has not given you
    the bread from heaven, but my Father gives you the true bread from heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it was not Moses who gave you the bread from heaven.' The Greek places
      the negation before 'Moses,' making the contrast in agency especially prominent.
    reason: lexical_alternative
  - marker: b
    text: '''True bread'' can also mean ''real'' or ''genuine'' bread—the ultimate
      bread from heaven, not merely the earlier manna as a sign.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference from the preceding exchange. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: This Johannine doubled formula introduces a solemn, emphatic declaration.
    'Truly, truly' is clear modern English and preserves the repetition rather than
    collapsing it.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A transparent rendering of the Greek idiom that fits the solemn introductory
    formula and keeps close to the source wording.
- source_word: οὐ Μωϋσῆς δέδωκεν ὑμῖν
  chosen: Moses has not given you
  alternatives:
  - Moses did not give you
  - it was not Moses who gave you
  lexicon: BDAG
  rationale: The perfect δέδωκεν is rendered with English present perfect ('has not
    given') to preserve the relevance of the past act to the present discussion. The
    negation before 'Moses' naturally carries a contrastive sense, but English can
    express that adequately without adding italics or extra wording in the main text.
- source_word: τὸν ἄρτον ἐκ τοῦ οὐρανοῦ
  chosen: the bread from heaven
  alternatives:
  - the bread out of heaven
  lexicon: BDAG
  rationale: Standard and natural rendering of the articular phrase. 'From heaven'
    is idiomatic for ἐκ τοῦ οὐρανοῦ and preserves the source imagery.
- source_word: ἀλλ’ ὁ πατήρ μου δίδωσιν ὑμῖν
  chosen: but my Father gives you
  alternatives:
  - but my Father is giving you
  lexicon: BDAG
  rationale: 'The present tense δίδωσιν is significant in contrast to the earlier
    perfect: Jesus speaks of the Father''s present giving. English simple present
    communicates this well in a gnomic/presently operative sense.'
- source_word: ὁ πατήρ μου
  chosen: my Father
  alternatives:
  - the Father of me
  lexicon: BDAG
  rationale: Natural English possessive rendering. In Johannine context this preserves
    Jesus' distinctive filial claim without over-expanding it.
- source_word: τὸν ἀληθινόν
  chosen: the true
  alternatives:
  - the real
  - the genuine
  lexicon: BDAG
  rationale: ἀληθινός in John often carries the sense of what is ultimate, genuine,
    or eschatologically real in contrast to a prior type or shadow. 'True' preserves
    this theological resonance better than 'real' while remaining readable.
