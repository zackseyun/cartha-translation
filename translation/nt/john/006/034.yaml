id: JHN.6.34
reference: John 6:34
source:
  edition: SBLGNT
  text: εἶπον οὖν πρὸς αὐτόν· Κύριε, πάντοτε δὸς ἡμῖν τὸν ἄρτον τοῦτον.
translation:
  text: So they said to him, “Lord, always give us this bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Sir, always give us this bread.” The Greek title can function as a respectful
      form of address as well as 'Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον
  chosen: they said
  alternatives:
  - they told
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'they said' in narrative dialogue.
    'Told' would over-specify the speech act.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks inference or continuation from the preceding discussion. 'So'
    is natural modern English and preserves the discourse connection without sounding
    overly formal.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With a verb of speaking, πρός + accusative idiomatically indicates the
    addressee, best rendered 'to him'.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Following the project's default for κύριος, the vocative is rendered
    'Lord.' In Johannine context the term can carry respectful address and potentially
    deeper significance; 'Lord' preserves that range better than the flatter 'Sir.'
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  - at all times
  lexicon: BDAG
  rationale: πάντοτε straightforwardly means 'always.' This fits the speakers' request
    for ongoing provision.
- source_word: δὸς
  chosen: give
  alternatives:
  - grant
  lexicon: BDAG
  rationale: 'Aorist imperative of δίδωμι is a direct request: ''give.'' ''Grant''
    is possible but sounds more elevated than the Greek requires.'
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Dative indirect object after δίδωμι is naturally rendered 'us.'
- source_word: τὸν ἄρτον τοῦτον
  chosen: this bread
  alternatives:
  - this loaf
  - that bread
  lexicon: BDAG
  rationale: ἄρτος is 'bread,' and τοῦτον points to the bread just discussed. 'This
    bread' preserves the demonstrative force and the thematic link to the preceding
    context.
