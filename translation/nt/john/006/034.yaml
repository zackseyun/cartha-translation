- issue: Rendering of κύριος in direct address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Sir
  - Master
  rationale: The doctrine file specifies 'Lord' as the default rendering for κύριος.
    In this context the crowd's understanding may not yet be fully christological,
    but 'Lord' appropriately preserves the Greek title's semantic openness without
    reducing it to mere politeness.
