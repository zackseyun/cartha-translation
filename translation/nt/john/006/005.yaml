id: JHN.6.5
reference: John 6:5
source:
  edition: SBLGNT
  text: ἐπάρας οὖν ⸂τοὺς ὀφθαλμοὺς ὁ Ἰησοῦς⸃ καὶ θεασάμενος ὅτι πολὺς ὄχλος ἔρχεται
    πρὸς αὐτὸν λέγει ⸀πρὸς Φίλιππον· Πόθεν ⸀ἀγοράσωμεν ἄρτους ἵνα φάγωσιν οὗτοι;
translation:
  text: So Jesus, lifting up his eyes and seeing that a large crowd was coming toward
    him, said to Philip, “Where are we to buy bread so that these may eat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great crowd.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'From where shall we buy bread...?'
    reason: lexical_alternative
  - marker: c
    text: Or 'loaves.' The Greek word can refer to bread generally or to individual
      loaves.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάρας
  chosen: lifting up
  alternatives:
  - raising
  lexicon: BDAG
  rationale: Aorist participle of ἐπαίρω used idiomatically with 'eyes'; 'lifting
    up' preserves the Greek expression naturally in English without over-paraphrasing.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force better than omitting it.
- source_word: τοὺς ὀφθαλμοὺς
  chosen: his eyes
  alternatives:
  - the eyes
  lexicon: BDAG
  rationale: English idiom requires the possessive with body parts here; the Greek
    article functions naturally this way in context.
- source_word: θεασάμενος
  chosen: seeing
  alternatives:
  - looking at
  - noticing
  - beholding
  lexicon: BDAG
  rationale: The participle indicates perceptive observation. 'Seeing' is concise
    and fits the narrative flow; 'beholding' is too elevated, and 'noticing' is slightly
    weaker than the Greek.
- source_word: πολὺς ὄχλος
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a big crowd
  lexicon: BDAG
  rationale: '''Large crowd'' is clear modern English. ''Great crowd'' is possible
    but can sound archaic or imply greatness rather than size.'
- source_word: ἔρχεται πρὸς αὐτόν
  chosen: was coming toward him
  alternatives:
  - comes to him
  - was coming to him
  lexicon: BDAG
  rationale: Present tense in narrative can be rendered as an English progressive
    for naturalness. 'Toward him' captures πρός with directional force.
- source_word: λέγει πρὸς Φίλιππον
  chosen: said to Philip
  alternatives:
  - says to Philip
  lexicon: BDAG
  rationale: Historical present λέγει is commonly rendered with English past tense
    in narrative for readability. 'Said to' preserves the addressee relation of πρός.
- source_word: Πόθεν
  chosen: Where are we to
  alternatives:
  - From where shall we
  - Where will we
  lexicon: BDAG
  rationale: Πόθεν is literally 'from where,' but idiomatic English in this context
    is 'Where are we to...?' which preserves the practical sense of source/provision.
- source_word: ἀγοράσωμεν
  chosen: buy
  alternatives:
  - purchase
  lexicon: BDAG
  rationale: Simple commercial verb; 'buy' is the most natural modern equivalent.
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  - bread loaves
  lexicon: BDAG
  rationale: ἄρτος can mean bread or a loaf. Here the collective sense 'bread' reads
    naturally in English, while the broader context of feeding remains clear.
- source_word: ἵνα φάγωσιν
  chosen: so that these may eat
  alternatives:
  - so that these people may eat
  - that these may eat
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'May eat' preserves the subjunctive nuance without
    sounding wooden.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these people
  - this crowd
  lexicon: BDAG
  rationale: The demonstrative is left relatively literal as 'these,' preserving the
    immediacy of Jesus' reference to the people present. English allows this naturally
    in direct speech.
