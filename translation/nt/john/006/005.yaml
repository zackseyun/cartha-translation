theological_decisions:
- issue: Rendering of historical presents and participles in narrative
  chosen_reading: Converted λέγει to English past ('said') while retaining participial
    sequence ('lifting up... and seeing')
  alternative_readings:
  - 'More formally: ''Jesus therefore lifted up his eyes and saw... and says to Philip'''
  rationale: This is a stylistic translation decision rather than a doctrinal one.
    Optimal equivalence favors natural English narrative while preserving the sequence
    and force of the Greek actions.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
