id: JHN.6.16
reference: John 6:16
source:
  edition: SBLGNT
  text: Ὡς δὲ ὀψία ἐγένετο κατέβησαν οἱ μαθηταὶ αὐτοῦ ἐπὶ τὴν θάλασσαν,
translation:
  text: Now when evening came, his disciples went down to the sea,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the lake.' The body of water is the Sea of Galilee, which is technically
      a lake, but the Greek text says 'sea' (θάλασσα).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: Now when
  alternatives:
  - And when
  - When
  lexicon: BDAG
  rationale: The combination introduces a temporal transition. 'Now when' preserves
    both the connective force of δέ and the temporal sense of ὡς in readable English.
- source_word: ὀψία ἐγένετο
  chosen: evening came
  alternatives:
  - it became evening
  - evening had come
  lexicon: BDAG
  rationale: This idiom means the onset of evening. 'Evening came' is natural modern
    English while remaining close to the Greek expression.
- source_word: κατέβησαν
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: BDAG
  rationale: The verb καταβαίνω denotes downward movement. 'Went down' fits the narrative
    perspective and idiomatic English better than the more formal 'descended.'
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples of him
  lexicon: BDAG
  rationale: Standard possessive rendering. The article-noun-possessive construction
    is naturally expressed in English as 'his disciples.'
- source_word: ἐπὶ τὴν θάλασσαν
  chosen: to the sea
  alternatives:
  - to the lake
  - toward the sea
  lexicon: BDAG
  rationale: With ἐπί plus the accusative after a motion verb, the phrase indicates
    movement toward or to the body of water. 'To the sea' is the most direct rendering
    of θάλασσα. Although the Sea of Galilee is a lake, the Greek word here is 'sea,'
    and original-language primacy favors preserving that wording.
