id: JHN.6.50
reference: John 6:50
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ὁ ἄρτος ὁ ἐκ τοῦ οὐρανοῦ καταβαίνων ἵνα τις ἐξ αὐτοῦ φάγῃ καὶ
    μὴ ἀποθάνῃ·
translation:
  text: This is the bread that comes down from heaven, so that anyone may eat from
    it and not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the bread coming down from heaven.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'not die' is left broad in the main text; interpreters variously
      understand it as freedom from ultimate death, spiritual death, or eschatological
      destruction in context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτός
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring to the bread Jesus is identifying; simple 'This'
    is natural English and preserves the immediacy of the Greek.
- source_word: ἄρτος
  chosen: bread
  alternatives:
  - loaf
  - food
  lexicon: BDAG
  rationale: Standard sense is 'bread.' In John 6 the term carries both literal and
    metaphorical force, but the lexical item itself should remain 'bread' rather than
    be paraphrased.
- source_word: ὁ ἐκ τοῦ οὐρανοῦ καταβαίνων
  chosen: that comes down from heaven
  alternatives:
  - coming down from heaven
  - descending from heaven
  lexicon: BDAG
  rationale: The present participle καταβαίνων is rendered with a relative clause
    for natural English. 'Comes down' preserves the vivid present aspect better than
    the more static 'descended.'
- source_word: οὐρανός
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: In Johannine context this refers to the divine heavenly realm, not the
    physical sky.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose/result. 'So that' is idiomatic modern English while
    preserving the clause's force.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: Indefinite pronoun with generic force. 'Anyone' communicates the open,
    representative sense without awkwardness.
- source_word: ἐξ αὐτοῦ
  chosen: from it
  alternatives:
  - of it
  lexicon: BDAG
  rationale: The preposition ἐκ/ἐξ with φάγῃ is naturally rendered 'eat from it' in
    contemporary English. 'Eat of it' is possible but more archaic.
- source_word: φάγῃ
  chosen: may eat
  alternatives:
  - might eat
  - eats
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα; 'may eat' fits the purpose clause and keeps
    the statement general rather than iterative.
- source_word: μὴ ἀποθάνῃ
  chosen: and not die
  alternatives:
  - and may not die
  - and not perish
  lexicon: BDAG
  rationale: ἀποθνῄσκω means 'die.' 'Perish' would import a stronger interpretive
    nuance not demanded by the verb here. The simple negated verb preserves the text's
    wording and theological tension.
