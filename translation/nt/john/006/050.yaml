theological_decisions:
- issue: Nature of the death in 'not die'
  chosen_reading: Retain the plain expression 'not die' without specifying physical
    or spiritual death.
  alternative_readings:
  - not die spiritually
  - not perish eternally
  rationale: In the Bread of Life discourse, Jesus contrasts ordinary bread and the
    life he gives, but this verse itself does not explicitly narrow the sense of death.
    Preserving the broader wording maintains Johannine theological depth without importing
    a denominationally sharpened interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
