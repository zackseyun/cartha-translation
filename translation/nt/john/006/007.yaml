id: JHN.6.7
reference: John 6:7
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτῷ Φίλιππος· Διακοσίων δηναρίων ἄρτοι οὐκ ἀρκοῦσιν αὐτοῖς ἵνα
    ⸀ἕκαστος βραχύ ⸀τι λάβῃ.
translation:
  text: Philip answered him, “Two hundred denarii worth of bread is not enough for
    them, so that each one may receive a little.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A denarius was a standard daily wage for a laborer or soldier.
    reason: cultural_note
  - marker: b
    text: Or “loaves”; the Greek word can refer to bread or bread loaves in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the conventional and
    natural rendering in context.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative pronoun indicating the person addressed; rendered simply as 'him'
    in idiomatic English.
- source_word: Φίλιππος
  chosen: Philip
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: Διακοσίων δηναρίων
  chosen: Two hundred denarii worth of
  alternatives:
  - two hundred denarii of
  - bread worth two hundred denarii
  - two hundred silver coins' worth of
  lexicon: BDAG
  rationale: The genitive phrase expresses value/cost. Keeping 'denarii' preserves
    the historical monetary unit rather than flattening it into a modern currency.
    'Worth of' makes the sense explicit in natural English.
- source_word: ἄρτοι
  chosen: bread
  alternatives:
  - loaves
  lexicon: BDAG
  rationale: Although plural, ἄρτοι can denote bread/loaves generally. 'Bread' works
    idiomatically in English with the cost phrase; 'loaves' is possible but slightly
    more specific than necessary here.
- source_word: οὐκ ἀρκοῦσιν
  chosen: is not enough
  alternatives:
  - are not sufficient
  - would not be enough
  lexicon: BDAG
  rationale: The verb means 'to be sufficient, be enough.' Because the English subject
    is the mass noun phrase 'bread,' singular 'is' is most natural. Present tense
    is retained.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Dative of advantage/disadvantage; 'for them' is the most natural English
    expression with 'enough.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause relationship.
- source_word: ἕκαστος
  chosen: each one
  alternatives:
  - each
  - everyone
  lexicon: BDAG
  rationale: Singular distributive force is explicit in Greek. 'Each one' preserves
    that force clearly.
- source_word: βραχύ τι
  chosen: a little
  alternatives:
  - a small amount
  - a tiny bit
  - a little something
  lexicon: BDAG
  rationale: Idiomatic expression meaning a small amount. 'A little' is concise and
    natural without adding colloquial color.
- source_word: λάβῃ
  chosen: may receive
  alternatives:
  - may take
  - might get
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive.' In this feeding context, 'receive'
    better reflects distribution to the crowd rather than self-initiated taking.
