theological_decisions:
- issue: Referent of πνεῦμα in the first clause
  chosen_reading: the Spirit refers to the Holy Spirit
  alternative_readings:
  - the spirit as a general spiritual principle
  - the human spirit
  rationale: Within John's Gospel, life-giving agency is strongly associated with
    the Spirit, and the articular construction supports a definite referent. The translation
    reflects this likely sense while avoiding added doctrinal explanation beyond the
    text.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Meaning of σὰρξ in contrast with Spirit
  chosen_reading: flesh retained as an intentionally broad term
  alternative_readings:
  - sinful nature
  - mere human effort
  - physical flesh/body
  rationale: The verse should preserve the theological tension rather than collapse
    it into one doctrinally loaded interpretation. 'Flesh' allows the reader to hear
    the contrast as stated by Jesus without importing a specific anthropological system.
  doctrine_reference: 'Contested terms table for σάρξ; Translation philosophy #3'
- issue: Predicate force of πνεῦμά ἐστιν in the final clause
  chosen_reading: 'qualitative: Jesus'' words are spirit and life'
  alternative_readings:
  - 'identificational: Jesus'' words are the Spirit and the life'
  - 'interpretive: Jesus'' words are spiritual and life-giving'
  rationale: The anarthrous predicate favors a qualitative sense. The translation
    keeps the terse Greek expression while avoiding over-interpretation.
  doctrine_reference: 'Translation philosophy #1 and #3'
