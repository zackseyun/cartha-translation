theological_decisions:
- issue: Identification of 'the Prophet'
  chosen_reading: Render as 'the Prophet' without explicitly identifying him in the
    translation text.
  alternative_readings:
  - the prophet like Moses
  - a prophet
  rationale: The crowd's confession likely alludes to the expected prophet of Deuteronomy
    18, but the Greek text itself states only 'the Prophet.' The translation preserves
    the title and leaves fuller identification to context rather than importing interpretation
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
