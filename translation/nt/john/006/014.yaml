id: JHN.6.14
reference: John 6:14
source:
  edition: SBLGNT
  text: οἱ οὖν ἄνθρωποι ἰδόντες ⸂ὃ ἐποίησεν σημεῖον⸃ ⸀ἔλεγον ὅτι Οὗτός ἐστιν ἀληθῶς
    ὁ προφήτης ὁ ἐρχόμενος εἰς τὸν κόσμον.
translation:
  text: So when the people saw the sign that he had done, they were saying, “This
    truly is the Prophet who is coming into the world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the miracle that he had done'; John regularly uses 'sign' (σημεῖον)
      to emphasize the revelatory meaning of Jesus's works, not only their miraculous
      character.
    reason: lexical_alternative
  - marker: b
    text: '''The Prophet'' likely refers to the expected prophet like Moses (Deut
      18:15–18).'
    reason: cross_reference
lexical_decisions:
- source_word: οἱ οὖν ἄνθρωποι
  chosen: So when the people
  alternatives:
  - Therefore the men
  - Then the people
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to the crowd in a generic human sense, not specifically
    males, so 'people' best reflects the referent in natural English. οὖν is carried
    by 'So' to mark narrative inference/development.
- source_word: ἰδόντες
  chosen: saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered with a finite English
    verb in this narrative context. 'Saw' preserves the perceptual force without awkwardness.
- source_word: ὃ ἐποίησεν σημεῖον
  chosen: the sign that he had done
  alternatives:
  - what sign he had done
  - the miracle that he had performed
  lexicon: BDAG
  rationale: σημεῖον in John is theologically significant and should be rendered 'sign,'
    not flattened to 'miracle.' The relative construction is represented idiomatically
    as 'the sign that he had done.' The pluperfect-like English 'had done' fits the
    participial sequence from the crowd's perspective.
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or repeated speech; 'they were saying'
    preserves that aspect better than simple past.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - indeed
  - certainly
  lexicon: BDAG
  rationale: ἀληθῶς emphasizes genuine recognition; 'truly' is concise and natural.
- source_word: ὁ προφήτης
  chosen: the Prophet
  alternatives:
  - the prophet
  lexicon: BDAG
  rationale: The article and Johannine context indicate a recognized eschatological
    figure, likely echoing Deuteronomy 18:15–18. Capitalizing 'Prophet' helps signal
    title-like usage in English.
- source_word: ὁ ἐρχόμενος εἰς τὸν κόσμον
  chosen: who is coming into the world
  alternatives:
  - who comes into the world
  - who was to come into the world
  lexicon: BDAG
  rationale: The present participle with article functions substantivally/descriptively.
    'Who is coming into the world' preserves the present-form expression and Johannine
    idiom without overinterpreting temporality.
