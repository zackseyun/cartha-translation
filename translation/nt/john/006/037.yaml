id: JHN.6.37
reference: John 6:37
source:
  edition: SBLGNT
  text: πᾶν ὃ δίδωσίν μοι ὁ πατὴρ πρὸς ἐμὲ ἥξει, καὶ τὸν ἐρχόμενον πρός ⸀με οὐ μὴ
    ἐκβάλω ἔξω,
translation:
  text: Everything that the Father gives me will come to me, and the one who comes
    to me I will certainly not cast out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All that the Father gives me will come to me.' The Greek uses a neuter
      singular collective expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never cast out' or 'I will by no means cast out.' The Greek expression
      is an emphatic negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ὃ
  chosen: Everything that
  alternatives:
  - All that
  - Everyone whom
  lexicon: BDAG
  rationale: The neuter singular construction πᾶν ὃ is most naturally rendered as
    a collective, 'everything that' or 'all that.' 'All that' is idiomatic and traditional,
    but 'everything that' makes the neuter force clearer in English. 'Everyone whom'
    would interpret the collective as personal, which is possible in context but less
    formally aligned with the Greek neuter.
- source_word: δίδωσίν μοι
  chosen: gives me
  alternatives:
  - is giving me
  - has given me
  lexicon: BDAG
  rationale: The present indicative δίδωσιν is rendered with a simple present, preserving
    the verbal aspect without overinterpreting whether the giving is ongoing or viewed
    as a completed gift.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the article with πατήρ, not an explicit possessive pronoun.
    'The Father' preserves Johannine usage and avoids adding 'my,' though the relationship
    is implicit in context.
- source_word: πρὸς ἐμὲ ἥξει
  chosen: will come to me
  alternatives:
  - will arrive to me
  lexicon: BDAG
  rationale: ἥκω commonly means 'come' or 'arrive.' 'Will come to me' is idiomatic
    English and fits Johannine theological usage of coming to Jesus.
- source_word: τὸν ἐρχόμενον πρός με
  chosen: the one who comes to me
  alternatives:
  - whoever comes to me
  - the one coming to me
  lexicon: BDAG
  rationale: The articular present participle is well represented by 'the one who
    comes to me.' 'Whoever comes to me' is smoother English and captures the generic
    force, but the chosen rendering stays closer to the Greek form while remaining
    natural.
- source_word: οὐ μὴ ἐκβάλω ἔξω
  chosen: I will certainly not cast out
  alternatives:
  - I will never cast out
  - I will by no means cast out
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'I will certainly
    not cast out' conveys the force in clear modern English. 'I will never cast out'
    is also strong and idiomatic; 'by no means' is more formal but less natural for
    the target audience. ἔξω reinforces the expulsion idea already present in ἐκβάλω,
    and English idiom usually absorbs that force into 'cast out' without requiring
    an added 'outside.'
