theological_decisions:
- issue: Collective neuter πᾶν ὃ in relation to divine giving and human coming
  chosen_reading: Rendered as the collective 'Everything that the Father gives me'
    rather than the personalizing 'Everyone the Father gives me.'
  alternative_readings:
  - All that the Father gives me
  - Everyone whom the Father gives me
  rationale: The Greek uses a neuter singular collective expression, and the translation
    preserves that grammatical form rather than resolving the theological discussion
    about whether the emphasis is on a group viewed corporately or on individual persons.
    This maintains the text's wording without importing a denominationally charged
    interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of Jesus' promise in οὐ μὴ ἐκβάλω ἔξω
  chosen_reading: 'Rendered as an emphatic assurance: ''I will certainly not cast
    out.'''
  alternative_readings:
  - I will never cast out
  - I will by no means cast out
  rationale: The verse strongly affirms Jesus' reception of the one who comes to him.
    The translation preserves the emphatic negation without expanding it into later
    doctrinal formulations about perseverance or apostasy that the verse itself does
    not explicitly state.
  doctrine_reference: Within historic orthodoxy, do not advocate a denominational
    distinctive unless the Greek unambiguously supports it.
