id: JHN.6.8
reference: John 6:8
source:
  edition: SBLGNT
  text: λέγει αὐτῷ εἷς ἐκ τῶν μαθητῶν αὐτοῦ, Ἀνδρέας ὁ ἀδελφὸς Σίμωνος Πέτρου·
translation:
  text: One of his disciples, Andrew, Simon Peter’s brother, said to him,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), idiomatic modern
    English commonly renders this narrative present as simple past ('said'). This
    preserves the narrative sense without sounding unnatural.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative pronoun indicating the indirect object of speech; rendered straightforwardly
    as 'to him.' In context, the referent is Jesus.
- source_word: εἷς ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: One of his disciples
  alternatives:
  - One from among his disciples
  lexicon: BDAG
  rationale: This is the natural English rendering of the partitive construction εἷς
    ἐκ + genitive plural. 'One of his disciples' is both accurate and idiomatic.
- source_word: μαθητῶν
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually appropriate rendering
    for μαθηταί in the Gospels, preserving the relational and instructional sense
    better than the more wooden ''learners.'''
- source_word: Ἀνδρέας
  chosen: Andrew
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: ὁ ἀδελφὸς Σίμωνος Πέτρου
  chosen: Simon Peter’s brother
  alternatives:
  - the brother of Simon Peter
  lexicon: BDAG
  rationale: The genitive construction identifies Andrew appositionally as the brother
    of Simon Peter. 'Simon Peter’s brother' is concise, natural English and preserves
    the familial identification.
- source_word: Σίμωνος Πέτρου
  chosen: Simon Peter
  alternatives:
  - Simon, called Peter
  rationale: The paired proper names function together as the familiar designation
    'Simon Peter.' Rendering them together reflects standard English usage and the
    likely force of the Greek identification.
