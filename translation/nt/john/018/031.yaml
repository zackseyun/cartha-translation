theological_decisions:
- issue: Referent and translation of οἱ Ἰουδαῖοι in John
  chosen_reading: Rendered in the main text as 'The Jews' with a clarifying footnote
    noting that in this context it refers specifically to the Jewish authorities or
    accusers speaking with Pilate, not to the Jewish people as a whole.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: This preserves the Greek wording while avoiding an anti-Jewish misreading
    in English. The immediate narrative context narrows the referent to the group
    present before Pilate.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity/tension where present; readable modern English'
