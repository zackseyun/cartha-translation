id: JHN.18.33
reference: John 18:33
source:
  edition: SBLGNT
  text: Εἰσῆλθεν οὖν ⸂πάλιν εἰς τὸ πραιτώριον⸃ ὁ Πιλᾶτος καὶ ἐφώνησεν τὸν Ἰησοῦν καὶ
    εἶπεν αὐτῷ· Σὺ εἶ ὁ βασιλεὺς τῶν Ἰουδαίων;
translation:
  text: So Pilate went back into the governor’s headquarters and called Jesus and
    said to him, “Are you the King of the Jews?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the praetorium,” the Roman governor’s official residence or headquarters.
    reason: lexical_alternative
  - marker: b
    text: Or “of the Judeans.” The Greek term can refer either to Jews generally or,
      in some contexts, to people of Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰσῆλθεν
  chosen: went back into
  alternatives:
  - entered
  - went in again
  lexicon: BDAG
  rationale: The aorist of εἰσέρχομαι means 'entered/went in.' Because πάλιν immediately
    follows, English idiom is best captured by 'went back into,' which naturally conveys
    re-entry without awkwardness.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. In this context 'So' is natural
    modern English and preserves the connective force without sounding overly formal.
- source_word: πάλιν
  chosen: back
  alternatives:
  - again
  lexicon: BDAG
  rationale: πάλιν indicates repetition or return. With motion into a place, 'back'
    is the most idiomatic rendering in English; 'again into' is wooden.
- source_word: πραιτώριον
  chosen: the governor’s headquarters
  alternatives:
  - the praetorium
  - the governor's residence
  lexicon: BDAG
  rationale: πραιτώριον refers to the Roman governor's official residence/headquarters.
    'Praetorium' is traditional but opaque for modern readers; 'governor’s headquarters'
    communicates the sense accessibly while retaining the official setting.
- source_word: ἐφώνησεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: φωνέω here means to call for or summon someone. 'Called' is simple and
    natural; 'summoned' is possible but slightly more formal and stronger than necessary.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - asked him
  lexicon: BDAG
  rationale: λέγω is broadly 'say/speak.' Although the content is a question, the
    Greek verb itself is not the more specific 'ask,' so 'said to him' better reflects
    the source while allowing the quotation to carry the interrogative force.
- source_word: Σὺ εἶ
  chosen: Are you
  alternatives:
  - You are ... ?
  lexicon: BDAG
  rationale: The explicit pronoun σύ adds emphasis. English normally conveys this
    in the interrogative word order 'Are you ... ?' without needing an italicized
    or otherwise marked 'you.'
- source_word: ὁ βασιλεὺς
  chosen: the King
  alternatives:
  - king
  lexicon: BDAG
  rationale: 'The article is present and the phrase functions as a title/identification:
    ''the King.'' Capitalization reflects titular use in direct address/questioning,
    not a doctrinal embellishment.'
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι can mean 'Jews' or 'Judeans' depending on context. In the passion
    narrative, the charge concerns the recognized ethnoreligious-political group as
    represented in Roman terms, and the established sense 'King of the Jews' best
    fits the accusation and wider Johannine usage. The geographical nuance 'Judeans'
    is possible but less likely here.
