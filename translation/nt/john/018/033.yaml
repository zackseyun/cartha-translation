theological_decisions:
- issue: Rendering Ἰουδαίων in the royal title
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: This verse presents the Roman political charge against Jesus. 'King of
    the Jews' is the historically and contextually fitting expression in the trial
    narrative and aligns with the accusation as understood by Pilate. The alternative
    'Judeans' is lexically possible and worth preserving in a footnote because John
    can use Ἰουδαῖοι with varying nuance.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; document context-dependent variance.'
