id: JHN.18.12
reference: John 18:12
source:
  edition: SBLGNT
  text: Ἡ οὖν σπεῖρα καὶ ὁ χιλίαρχος καὶ οἱ ὑπηρέται τῶν Ἰουδαίων συνέλαβον τὸν Ἰησοῦν
    καὶ ἔδησαν αὐτὸν
translation:
  text: So the cohort, the commander, and the officers of the Jews seized Jesus and
    bound him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jewish leaders' or 'the Judeans,' depending on context; John often
      uses 'the Jews' in a more specific sense than the entire Jewish people.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Then
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding scene. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: σπεῖρα
  chosen: cohort
  alternatives:
  - Roman cohort
  - band of soldiers
  - detachment
  lexicon: BDAG
  rationale: The term commonly denotes a military cohort. 'Cohort' preserves the specific
    military sense better than the vaguer 'band.' 'Roman cohort' is interpretive;
    the Roman association is likely in context but not explicit in the noun itself,
    so it is left untranslated in the main text.
- source_word: χιλίαρχος
  chosen: commander
  alternatives:
  - tribune
  - military commander
  - chiliarch
  lexicon: BDAG
  rationale: Refers to the officer over the cohort. 'Commander' is clear modern English;
    'tribune' is historically precise but less accessible, while 'chiliarch' is too
    transliterated for the translation philosophy.
- source_word: ὑπηρέται
  chosen: officers
  alternatives:
  - servants
  - guards
  - temple police
  lexicon: BDAG
  rationale: In Johannine context this term often refers to official attendants or
    arresting personnel rather than domestic servants. 'Officers' captures their institutional
    role without over-specifying beyond the text. 'Temple police' is plausible but
    more interpretive.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Jewish leaders
  - of the Judeans
  lexicon: BDAG
  rationale: A formally transparent rendering of the genitive phrase. In John, 'the
    Jews' can at times refer more narrowly to Judean authorities, but this verse does
    not itself specify leaders, so the more literal rendering is retained rather than
    importing an interpretive narrowing.
- source_word: συνέλαβον
  chosen: seized
  alternatives:
  - arrested
  - took hold of
  lexicon: BDAG
  rationale: The verb means to seize or take into custody. 'Seized' preserves the
    physical force of the action and avoids importing a more procedural legal nuance
    than the Greek requires, though 'arrested' is contextually possible.
- source_word: ἔδησαν
  chosen: bound
  alternatives:
  - tied up
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb meaning to bind. 'Bound'
    is both accurate and suitably dignified in narrative style.
