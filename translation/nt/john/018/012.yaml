theological_decisions:
- issue: Referent and nuance of τῶν Ἰουδαίων in John
  chosen_reading: Rendered literally as 'of the Jews' in the main text.
  alternative_readings:
  - of the Jewish leaders
  - of the Judeans
  rationale: The translation preserves the Greek wording rather than resolving the
    broader Johannine debate in the main text. Because the phrase can be heard too
    broadly in English, an alternative is preserved in a footnote to aid readers without
    rewriting the text interpretively.
  doctrine_reference: Translation philosophy §§1, 3, 5
