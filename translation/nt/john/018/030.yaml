theological_decisions:
- issue: Tone and force of the accusers' claim about Jesus
  chosen_reading: Render as a general accusation of moral wrongdoing ('doing evil')
    without specifying a formal legal charge.
  alternative_readings:
  - Render more juridically as 'a criminal' or 'an evildoer'
  rationale: The Greek phrase κακὸν ποιῶν is broader than a technical legal designation.
    Translating it as 'doing evil' preserves the accusers' evasive, generalized allegation
    and avoids importing a more precise charge than the text states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing doctrinal claims.'
