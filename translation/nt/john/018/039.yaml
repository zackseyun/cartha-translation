theological_decisions:
- issue: Rendering Ἰουδαίων in the title τὸν βασιλέα τῶν Ἰουδαίων
  chosen_reading: the King of the Jews
  alternative_readings:
  - the King of the Judeans
  rationale: In John's passion narrative this phrase functions as the recognized royal/messianic
    accusation/title attached to Jesus. Rendering it "Jews" preserves the established
    narrative and historical sense in this title formula, while avoiding an unnecessary
    narrowing to regional identity. Because this term can be debated in John, the
    alternative is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
