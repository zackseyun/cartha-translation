id: JHN.18.39
reference: John 18:39
source:
  edition: SBLGNT
  text: ἔστιν δὲ συνήθεια ὑμῖν ἵνα ἕνα ⸂ἀπολύσω ὑμῖν⸃ ἐν τῷ πάσχα· βούλεσθε οὖν ⸄ἀπολύσω
    ὑμῖν⸅ τὸν βασιλέα τῶν Ἰουδαίων;
translation:
  text: But you have a custom that I release one man for you at the Passover. So do
    you want me to release to you the King of the Jews?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the King of the Judeans." The Greek term can denote either Jews or Judeans
      depending on context; here it appears in the fixed title used in the passion
      narrative.
    reason: alternative_reading
lexical_decisions:
- source_word: συνήθεια
  chosen: custom
  alternatives:
  - practice
  - habit
  lexicon: BDAG
  rationale: '"Custom" best conveys an established social practice in this judicial/festival
    setting without sounding overly individualistic like "habit."'
- source_word: ἵνα ἕνα ἀπολύσω ὑμῖν
  chosen: that I release one man for you
  alternatives:
  - that I release one for you
  - that I set one free for you
  lexicon: BDAG
  rationale: The clause expresses the content of the custom. "Release" fits the legal
    context of freeing a prisoner. "One man" makes explicit the personal referent
    of ἕνα in natural English, though the Greek simply says "one."
- source_word: ἀπολύω
  chosen: release
  alternatives:
  - set free
  - free
  lexicon: BDAG
  rationale: In this context of a governor releasing a prisoner, "release" is the
    most precise and natural legal rendering, and it preserves consistency across
    both occurrences in the verse.
- source_word: ἐν τῷ πάσχα
  chosen: at the Passover
  alternatives:
  - during the Passover
  - at Passover
  lexicon: BDAG
  rationale: '"At the Passover" is idiomatic English for a festival-time custom and
    preserves the temporal force of ἐν in context.'
- source_word: βούλεσθε οὖν
  chosen: So do you want
  alternatives:
  - Therefore, do you want
  - Do you wish, then
  lexicon: BDAG
  rationale: '"So" naturally conveys οὖν as an inferential transition in contemporary
    English, and "do you want" is a readable rendering of βούλεσθε without sounding
    archaic.'
- source_word: τὸν βασιλέα τῶν Ἰουδαίων
  chosen: the King of the Jews
  alternatives:
  - the king of the Jews
  lexicon: BDAG
  rationale: Capitalizing "King" treats the phrase as a formal title in the narrative
    setting. "Jews" is retained as the plain sense of Ἰουδαίων here, since the phrase
    is the established charge/title used in the passion narrative, not a generic regional
    label such as "Judeans."
