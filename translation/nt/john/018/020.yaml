theological_decisions:
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: Rendered as 'the Jews' in the main text, referring here to the Jewish
    people in their public worshiping/gathering context rather than specifically the
    Judean authorities.
  alternative_readings:
  - the Judeans
  - the Jewish people
  rationale: John's use of Ἰουδαῖοι is context-sensitive and can be misunderstood
    in English. In this verse the setting of synagogue and temple points to a broad
    communal reference, not a polemical narrowing. The direct rendering is retained
    while documenting alternatives for transparency and to avoid importing anti-Jewish
    implications not demanded by the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
