id: JHN.18.20
reference: John 18:20
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτῷ Ἰησοῦς· Ἐγὼ παρρησίᾳ ⸀λελάληκα τῷ κόσμῳ· ἐγὼ πάντοτε ἐδίδαξα
    ἐν συναγωγῇ καὶ ἐν τῷ ἱερῷ, ὅπου ⸀πάντες οἱ Ἰουδαῖοι συνέρχονται, καὶ ἐν κρυπτῷ
    ἐλάλησα οὐδέν·
translation:
  text: Jesus answered him, “I have spoken openly to the world. I always taught in
    the synagogue and in the temple, where all the Jews gather, and I said nothing
    in secret.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple courts' or 'in the temple precincts'; the Greek ἱερόν
      refers to the temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the Jewish people' or, in some contexts in John, 'all the Judeans.'
      The Greek Ἰουδαῖοι is context-sensitive.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησίᾳ
  chosen: openly
  alternatives:
  - plainly
  - publicly
  - with boldness
  lexicon: BDAG
  rationale: In this context the contrast is with ἐν κρυπτῷ ('in secret'), so 'openly'
    best captures public, unconcealed speech without overemphasizing courage ('with
    boldness').
- source_word: λελάληκα
  chosen: have spoken
  alternatives:
  - have said
  lexicon: BDAG
  rationale: The perfect tense suggests a present relevance to Jesus' prior public
    speech; 'have spoken' preserves that better than a simple past.
- source_word: τῷ κόσμῳ
  chosen: to the world
  alternatives:
  - to the public
  - to everyone
  lexicon: BDAG
  rationale: John frequently uses κόσμος with theological breadth, and here it naturally
    means the public sphere broadly. 'To the world' preserves Johannine diction better
    than flattening it to 'the public.'
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: A straightforward temporal adverb; 'always' is natural modern English
    and preserves the force of habitual public teaching.
- source_word: ἐδίδαξα
  chosen: taught
  alternatives:
  - was teaching
  lexicon: BDAG
  rationale: The aorist is well represented by simple past in English here.
- source_word: ἐν συναγωγῇ
  chosen: in the synagogue
  alternatives:
  - in synagogues
  lexicon: BDAG
  rationale: Although the singular may be generic, the Greek is singular and English
    can naturally use 'the synagogue' generically for the setting of Jewish public
    instruction.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'Temple'
    is the standard concise rendering; the broader sense can be preserved in a footnote.
- source_word: πάντες οἱ Ἰουδαῖοι
  chosen: all the Jews
  alternatives:
  - all the Judeans
  - all the Jewish people
  lexicon: BDAG
  rationale: Ἰουδαῖοι in John can denote Judeans, Jewish authorities, or the Jewish
    people depending on context. Here, because the reference is to synagogue and temple
    gathering, the broader ethnic-religious sense fits best. 'All the Jews' is retained
    as the most direct rendering, with 'Jewish people' preserved as an alternative
    for clarity.
- source_word: συνέρχονται
  chosen: gather
  alternatives:
  - come together
  - assemble
  lexicon: BDAG
  rationale: '''Gather'' is natural modern English and accurately conveys communal
    assembling.'
- source_word: ἐν κρυπτῷ
  chosen: in secret
  alternatives:
  - secretly
  - in private
  lexicon: BDAG
  rationale: This directly contrasts with παρρησίᾳ. 'In secret' preserves the prepositional
    phrase and the public/hidden contrast.
- source_word: ἐλάλησα οὐδέν
  chosen: I said nothing
  alternatives:
  - I spoke nothing
  lexicon: BDAG
  rationale: Idiomatic English prefers 'said nothing.' It preserves the emphatic negation
    without awkwardness.
- source_word: ἀπεκρίθη αὐτῷ
  chosen: answered him
  alternatives:
  - replied to him
  lexicon: BDAG
  rationale: Standard narrative rendering; concise and natural.
