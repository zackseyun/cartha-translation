id: JHN.18.19
reference: John 18:19
source:
  edition: SBLGNT
  text: Ὁ οὖν ἀρχιερεὺς ἠρώτησεν τὸν Ἰησοῦν περὶ τῶν μαθητῶν αὐτοῦ καὶ περὶ τῆς διδαχῆς
    αὐτοῦ.
translation:
  text: So the high priest questioned Jesus about his disciples and about his teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'asked Jesus.' The Greek verb can be rendered either 'asked' or 'questioned';
      'questioned' was chosen to reflect the formal hearing context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the preceding events. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for the Jewish high priestly office. Although the
    historical referent in context is Annas, the Greek title is singular and definite,
    so it is translated as the office title rather than replaced with a personal name.
- source_word: ἠρώτησεν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: The verb means 'asked' or 'questioned.' In this judicial setting, 'questioned'
    better reflects formal inquiry without overstating the force as 'interrogated.'
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: BDAG
  rationale: Used twice with the genitive to indicate the subject matter of the questioning.
    'About' is the clearest natural English equivalent in readable modern style.
- source_word: μαθητῶν
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθητής
    in the Gospels, preserving the teacher-disciple relationship more precisely than
    ''followers.'''
- source_word: διδαχῆς
  chosen: teaching
  alternatives:
  - doctrine
  - instruction
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural and accessible rendering here. ''Doctrine''
    would sound more technical and potentially import later systematic connotations
    not required by the context.'
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The possessive pronoun refers to Jesus in both occurrences, yielding
    'his disciples' and 'his teaching' in straightforward English.
