theological_decisions:
- issue: Rendering the office title ἀρχιερεύς in context where the narrative setting
    involves Annas rather than the acting Roman-recognized high priest Caiaphas
  chosen_reading: Translate the Greek title directly as 'the high priest'
  alternative_readings:
  - Annas the high priest
  - the chief priest
  rationale: The translation follows the Greek wording rather than harmonizing the
    historical detail in the main text. This preserves the evangelist's narrative
    presentation and avoids importing explanatory material into the translation itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition'
