id: JHN.18.40
reference: John 18:40
source:
  edition: SBLGNT
  text: ἐκραύγασαν οὖν ⸀πάλιν λέγοντες· Μὴ τοῦτον ἀλλὰ τὸν Βαραββᾶν. ἦν δὲ ὁ Βαραββᾶς
    λῃστής.
translation:
  text: So they shouted again, saying, “Not this man, but Barabbas!” Now Barabbas
    was a robber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bandit”; the Greek term can refer to a robber, brigand, or violent insurgent
      in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκραύγασαν
  chosen: they shouted
  alternatives:
  - they cried out
  - they yelled
  lexicon: BDAG
  rationale: κραυγάζω denotes a loud cry or shout. 'Shouted' is natural modern English
    and preserves the force without sounding overly colloquial.
- source_word: οὖν
  chosen: So
  alternatives:
  - Then
  - Therefore
  lexicon: BDAG
  rationale: οὖν marks inference or continuation from the prior exchange. 'So' gives
    a natural discourse connection in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν straightforwardly indicates repetition; 'again' is the most direct
    rendering.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - crying out
  - calling out
  lexicon: BDAG
  rationale: Although somewhat redundant in English after 'shouted,' the participle
    is present in the Greek and is retained with 'saying' to preserve the structure
    without paraphrase.
- source_word: Μὴ τοῦτον ἀλλὰ τὸν Βαραββᾶν
  chosen: Not this man, but Barabbas
  alternatives:
  - Not him, but Barabbas
  lexicon: BDAG
  rationale: The elliptical Greek is naturally rendered in English with supplied contrast.
    'This man' preserves the demonstrative force of τοῦτον more clearly than the less
    specific 'him.'
- source_word: Βαραββᾶν / Βαραββᾶς
  chosen: Barabbas
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: BDAG
  rationale: δέ here introduces explanatory background information. 'Now' is a natural
    English discourse marker for this parenthetical clarification.
- source_word: λῃστής
  chosen: robber
  alternatives:
  - bandit
  - insurrectionist
  lexicon: BDAG
  rationale: λῃστής commonly denotes a robber or bandit. 'Robber' is the most transparent
    lexical equivalent here. Because the term can in some contexts refer to a brigand
    or revolutionary figure, that nuance is preserved in a footnote rather than imported
    into the main text.
