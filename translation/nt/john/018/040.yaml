theological_decisions:
- issue: Nuance of λῃστής in describing Barabbas
  chosen_reading: robber
  alternative_readings:
  - bandit
  - insurrectionist
  rationale: The verse itself identifies Barabbas with λῃστής, a term whose core sense
    is 'robber' or 'bandit.' Some contexts in first-century Judea allow a broader
    sense involving violent rebel activity, but John 18:40 alone does not require
    that fuller historical inference. To avoid importing claims beyond the text while
    preserving the lexical range, the main text uses 'robber' and a footnote notes
    the alternative nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
