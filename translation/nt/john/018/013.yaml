id: JHN.18.13
reference: John 18:13
source:
  edition: SBLGNT
  text: καὶ ⸀ἤγαγον πρὸς Ἅνναν πρῶτον· ἦν γὰρ πενθερὸς τοῦ Καϊάφα, ὃς ἦν ἀρχιερεὺς
    τοῦ ἐνιαυτοῦ ἐκείνου·
translation:
  text: And they led him first to Annas, for he was the father-in-law of Caiaphas,
    who was high priest that year.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤγαγον
  chosen: they led him
  alternatives:
  - they brought him
  lexicon: BDAG
  rationale: The verb ἄγω commonly means 'lead' or 'bring.' In this arrest-and-transfer
    context, 'led him' best reflects movement under custody and fits Johannine narrative
    style. The object 'him' is implicit from context and required in natural English.
- source_word: πρὸς Ἅνναν
  chosen: to Annas
  alternatives:
  - before Annas
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward a person. 'To
    Annas' is the most direct and natural rendering.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - at first
  lexicon: BDAG
  rationale: πρῶτον functions adverbially, indicating sequence. 'First' clearly conveys
    that Annas was the initial destination before subsequent proceedings.
- source_word: πενθερὸς
  chosen: father-in-law
  alternatives:
  - relative by marriage
  lexicon: BDAG
  rationale: πενθερός specifically denotes a wife's father. 'Father-in-law' is precise
    and idiomatic.
- source_word: ἀρχιερεὺς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς is the standard term for the Jewish high priestly office. 'High
    priest' is the established and accurate English equivalent.
- source_word: τοῦ ἐνιαυτοῦ ἐκείνου
  chosen: that year
  alternatives:
  - in that year
  - of that year
  lexicon: BDAG
  rationale: The genitive phrase modifies 'high priest' and is idiomatically rendered
    'that year.' This preserves John's temporal marker without awkward literalism.
- source_word: Ἅνναν
  chosen: Annas
  lexicon: standard transliteration practice
  rationale: Personal names are transliterated rather than translated, per project
    philosophy.
- source_word: Καϊάφα
  chosen: Caiaphas
  lexicon: standard transliteration practice
  rationale: Personal names are transliterated rather than translated, per project
    philosophy.
