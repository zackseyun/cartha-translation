theological_decisions:
- issue: Reference of 'who was high priest that year'
  chosen_reading: The relative clause modifies Caiaphas, not Annas.
  alternative_readings:
  - The clause could be misunderstood in English as referring to Annas if phrased
    poorly.
  rationale: In the Greek, ὃς is masculine singular and most naturally refers to the
    nearest antecedent, Καϊάφα. The English wording is structured to preserve that
    reference clearly.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    syntax is not genuinely ambiguous in Greek, but English must avoid introducing
    ambiguity.
