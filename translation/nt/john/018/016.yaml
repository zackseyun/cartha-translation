id: JHN.18.16
reference: John 18:16
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος εἱστήκει πρὸς τῇ θύρᾳ ἔξω. ἐξῆλθεν οὖν ὁ μαθητὴς ὁ ἄλλος ⸀ὁ γνωστὸς
    ⸂τοῦ ἀρχιερέως⸃ καὶ εἶπεν τῇ θυρωρῷ καὶ εἰσήγαγεν τὸν Πέτρον.
translation:
  text: But Peter was standing outside at the door. So the other disciple, who was
    known to the high priest, went out and spoke to the doorkeeper and brought Peter
    in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an acquaintance of the high priest' for 'known to the high priest.'
      The Greek leaves the exact closeness of the relationship unspecified.
    reason: lexical_alternative
  - marker: b
    text: Or 'gatekeeper' for 'doorkeeper.' The Greek term refers to the person stationed
      at the entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἱστήκει
  chosen: was standing
  alternatives:
  - stood
  - had been standing
  lexicon: BDAG
  rationale: Pluperfect/imperfective force of ἵστημι here describes Peter's continuing
    position. 'Was standing' conveys ongoing state in natural English better than
    the stiffer 'stood,' while avoiding over-precision with 'had been standing.'
- source_word: πρὸς τῇ θύρᾳ ἔξω
  chosen: outside at the door
  alternatives:
  - at the door outside
  - outside by the gate
  lexicon: BDAG
  rationale: The phrase combines location near the entrance with the adverb ἔξω. 'Outside
    at the door' preserves both elements clearly. 'Gate' is possible in context of
    a courtyard entrance, but θύρα is more basically 'door,' so that is retained.
- source_word: ὁ μαθητὴς ὁ ἄλλος
  chosen: the other disciple
  alternatives:
  - the other student
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Gospel narrative; 'student'
    is too flat and misses the relational and religious sense.
- source_word: ὁ γνωστὸς τοῦ ἀρχιερέως
  chosen: who was known to the high priest
  alternatives:
  - who was an acquaintance of the high priest
  - the one known to the high priest
  lexicon: BDAG
  rationale: γνωστός can mean 'known' or 'acquainted.' The passive-like English 'known
    to the high priest' is the most direct rendering and leaves the exact nature of
    the relationship unspecified, as in the Greek.
- source_word: ἀρχιερεύς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard and contextually precise rendering for the Jewish high priestly
    office.
- source_word: θυρωρῷ
  chosen: doorkeeper
  alternatives:
  - gatekeeper
  - servant girl at the door
  lexicon: BDAG
  rationale: θυρωρός denotes the person keeping the door. 'Doorkeeper' is gender-neutral
    in English but accurately reflects the role term here; the feminine article marks
    the person as female, but that detail is made explicit in the next verse rather
    than required here. 'Gatekeeper' is possible but less directly tied to θύρα.
- source_word: εἶπεν τῇ θυρωρῷ
  chosen: spoke to the doorkeeper
  alternatives:
  - said to the doorkeeper
  lexicon: BDAG
  rationale: λέγω can be 'say' or 'speak.' Since no direct speech content is quoted,
    'spoke to' is smoother idiomatic English.
- source_word: εἰσήγαγεν τὸν Πέτρον
  chosen: brought Peter in
  alternatives:
  - led Peter in
  - brought in Peter
  lexicon: BDAG
  rationale: εἰσάγω means to bring or lead in. 'Brought Peter in' is natural English
    and fits the narrative action without implying more guidance than the text states.
