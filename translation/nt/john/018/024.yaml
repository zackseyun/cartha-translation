id: JHN.18.24
reference: John 18:24
source:
  edition: SBLGNT
  text: ἀπέστειλεν ⸀οὖν αὐτὸν ὁ Ἅννας δεδεμένον πρὸς Καϊάφαν τὸν ἀρχιερέα.
translation:
  text: So Annas sent him bound to Caiaphas the high priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, in context, 'Now Annas had sent him bound to Caiaphas the high priest,'
      if taken as a parenthetical note explaining the earlier proceedings.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Aorist active indicative of ἀποστέλλω, here in straightforward narrative
    prose. 'Sent' is the natural modern English equivalent; 'dispatched' is possible
    but less idiomatic.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative/logical progression. 'So' preserves the connective
    force in readable modern English without sounding overly formal like 'therefore.'
- source_word: δεδεμένον
  chosen: bound
  alternatives:
  - still bound
  - tied
  lexicon: BDAG
  rationale: Perfect passive participle of δέω, modifying 'him' and indicating his
    bound condition at the time of sending. 'Bound' is concise and standard; 'still
    bound' makes the continuing state explicit but adds emphasis not required by the
    Greek.
- source_word: πρὸς
  chosen: to
  alternatives:
  - to the presence of
  - before
  lexicon: BDAG
  rationale: With motion verb ἀποστέλλω and accusative Καϊάφαν, πρός indicates movement
    toward a person. 'To' is the most natural English rendering here.
- source_word: Καϊάφαν
  chosen: Caiaphas
  rationale: Standard English transliteration of the personal name Καϊάφας in the
    accusative form.
- source_word: τὸν ἀρχιερέα
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς in Johannine passion narrative refers to the Jewish high priestly
    office. 'High priest' is the established and accurate rendering; 'chief priest'
    would suggest a broader priestly group rather than the individual office-holder.
- source_word: ὁ Ἅννας
  chosen: Annas
  rationale: Subject identified by article plus proper name. Standard English transliteration
    is 'Annas.'
