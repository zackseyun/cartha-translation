theological_decisions:
- issue: Narrative sequence in relation to the surrounding context
  chosen_reading: 'Translate the verse as a simple past action: Annas sent Jesus bound
    to Caiaphas.'
  alternative_readings:
  - Treat the verse as a parenthetical flashback explaining an earlier transfer
  rationale: The Greek form is aorist indicative and naturally reads as a narrative
    event. While interpreters debate how John 18:24 relates to the surrounding sequence,
    the translation should not import a harmonizing solution into the main text. A
    footnote preserves the contextual alternative without altering the plain sense
    of the clause.
  doctrine_reference: Preserve theological tension rather than resolve it.
