id: JHN.18.11
reference: John 18:11
source:
  edition: SBLGNT
  text: εἶπεν οὖν ὁ Ἰησοῦς τῷ Πέτρῳ· Βάλε τὴν ⸀μάχαιραν εἰς τὴν θήκην· τὸ ποτήριον
    ὃ δέδωκέν μοι ὁ πατὴρ οὐ μὴ πίω αὐτό;
translation:
  text: So Jesus said to Peter, “Put the sword into its sheath. Shall I not drink
    the cup that the Father has given me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scabbard' for 'sheath.'
    reason: lexical_alternative
  - marker: b
    text: The 'cup' is a biblical metaphor for the suffering or destiny appointed
      by God; compare John 18:11 with the prayer in Gethsemane (e.g., Matt 26:39;
      Mark 14:36; Luke 22:42).
    reason: cross_reference
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: Βάλε
  chosen: Put
  alternatives:
  - Throw
  - Place
  lexicon: BDAG
  rationale: The aorist imperative of βάλλω here idiomatically means to put or place
    back into something. 'Put' is the most natural English command in this context.
- source_word: μάχαιραν
  chosen: sword
  alternatives:
  - dagger
  - short sword
  lexicon: BDAG
  rationale: μάχαιρα denotes a bladed weapon; 'sword' is the standard and clearest
    rendering in this arrest scene. More specific options like 'dagger' are possible
    but too narrow for the context.
- source_word: θήκην
  chosen: sheath
  alternatives:
  - scabbard
  lexicon: BDAG
  rationale: '''Sheath'' is accurate and more readable in contemporary English than
    ''scabbard,'' while preserving the concrete image.'
- source_word: ποτήριον
  chosen: cup
  lexicon: BDAG
  rationale: Retains the metaphorical expression used in the Greek and in broader
    biblical usage for an allotted suffering or destiny. The metaphor should be preserved
    rather than paraphrased.
- source_word: δέδωκέν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: The perfect tense indicates a completed act with present relevance. 'Has
    given' preserves that nuance better than the simple past 'gave.'
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek text has the articular noun without the possessive pronoun.
    'The Father' preserves John's idiom and theological weight without adding 'my,'
    which is not explicit here.
- source_word: οὐ μὴ πίω αὐτό;
  chosen: Shall I not drink it?
  alternatives:
  - Should I not drink it?
  - Am I not to drink it?
  lexicon: BDAG
  rationale: 'οὐ μὴ with the aorist subjunctive in a rhetorical question strongly
    expects an affirmative sense in context: Jesus must indeed drink the cup. ''Shall
    I not drink it?'' is idiomatic English that preserves the rhetorical force.'
