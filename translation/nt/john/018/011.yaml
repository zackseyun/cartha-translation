theological_decisions:
- issue: Meaning of 'the cup'
  chosen_reading: Retain 'cup' as a metaphor for the suffering and mission appointed
    by the Father, without paraphrasing it as wrath, death, or crucifixion in the
    main text.
  alternative_readings:
  - the suffering appointed for Jesus
  - the destiny the Father assigned
  - the cup of divine wrath
  rationale: The immediate and broader biblical context supports a metaphor of appointed
    suffering, but the verse itself does not explicitly define the cup with a narrower
    doctrinal label. Preserving the metaphor maintains theological tension and avoids
    importing more specificity than the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Relation of Jesus to the Father in 'the Father has given me'
  chosen_reading: Translate straightforwardly as filial obedience to the Father without
    diminishing Jesus' dignity or adding doctrinal explanation.
  alternative_readings:
  - my Father has assigned me this
  - the Father has handed this to me
  rationale: The verse presents the Son's willing submission to the Father's will.
    A plain rendering best reflects the text and remains fully compatible with Nicene
    and Chalcedonian orthodoxy without overexplaining.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon'
