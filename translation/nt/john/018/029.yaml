id: JHN.18.29
reference: John 18:29
source:
  edition: SBLGNT
  text: ἐξῆλθεν οὖν ὁ Πιλᾶτος ⸀ἔξω πρὸς αὐτοὺς καὶ ⸀φησίν· Τίνα κατηγορίαν φέρετε
    ⸀κατὰ τοῦ ἀνθρώπου τούτου;
translation:
  text: So Pilate went outside to them and said, “What accusation do you bring against
    this man?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went outside
  alternatives:
  - went out
  - came out
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι denotes movement out from an interior space. In this
    context, with the added adverb ἔξω and the setting of Pilate leaving the praetorium
    to meet the accusers, 'went outside' is natural modern English and preserves the
    spatial sense.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is idiomatic in contemporary
    narrative English and preserves the connective force without sounding overly formal.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - out
  lexicon: BDAG
  rationale: The adverb reinforces the outward movement already present in ἐξῆλθεν.
    Rendering it within 'went outside' avoids awkward redundancy such as 'went out
    outside' while still representing the word's contribution.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward persons for encounter.
    'To them' is the most natural English expression in this context.
- source_word: φησίν
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly shifts such forms to the simple past. 'Said' fits the surrounding past-tense
    narration and avoids unnecessary stiffness.
- source_word: Τίνα κατηγορίαν
  chosen: What accusation
  alternatives:
  - What charge
  - What case
  lexicon: BDAG
  rationale: κατηγορία refers to an accusation or legal charge. 'Accusation' preserves
    the forensic sense clearly; 'charge' is possible, but 'accusation' more directly
    reflects the noun's semantic range.
- source_word: φέρετε
  chosen: do you bring
  alternatives:
  - are you bringing
  - do you present
  lexicon: BDAG
  rationale: φέρω in legal contexts can mean to bring or present a charge. 'Do you
    bring' is idiomatic with 'accusation' in English and preserves the active legal
    sense.
- source_word: κατὰ
  chosen: against
  alternatives:
  - concerning
  - with reference to
  lexicon: BDAG
  rationale: κατά with the genitive in judicial contexts means 'against.' This is
    the standard and contextually precise rendering.
- source_word: τοῦ ἀνθρώπου τούτου
  chosen: this man
  alternatives:
  - this person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to an individual male human being, not humanity
    in general. Per the project's gender-accurate principle, 'this man' is the correct
    rendering.
