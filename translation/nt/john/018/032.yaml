  category: awkward_english
  tier: 1
  from: which he had spoken to indicate
  to: which he had spoken, indicating
  rationale: 'The Greek uses a circumstantial participle (σημαίνων) modifying the verb ''spoke''. While rendering this as an infinitive of purpose (''to indicate'') is not incorrect, it creates a slightly awkward English phrase (''spoken to indicate by what...''). Using an English participle (''indicating'') more closely mirrors the Greek syntax and results in a more fluid reading: ''...which he had spoken, indicating by what kind of death...'''
