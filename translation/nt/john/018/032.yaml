theological_decisions:
- issue: Fulfillment language in relation to Jesus' prior prediction
  chosen_reading: 'Retain explicit fulfillment wording: ''the word of Jesus would be fulfilled.'''
  alternative_readings:
  - '''what Jesus had said would come true'''
  rationale: The Greek uses standard fulfillment language (πληρωθῇ) that carries theological weight in John, linking events to Jesus' authoritative foretelling. A looser rendering would be understandable but would weaken this motif.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of μέλλω in relation to Jesus' death
  chosen_reading: Render as imminent future ('was about to die') rather than stronger predestinarian language.
  alternative_readings:
  - '''was destined to die'''
  - '''was going to die'''
  rationale: The text states that Jesus had indicated the kind of death he was going to undergo; it does not itself require a stronger doctrinal claim about destiny in this clause. This preserves theological tension without overreading.
  doctrine_reference: Translation philosophy §3
revisions:
- timestamp: '2026-04-21T12:31:01Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
