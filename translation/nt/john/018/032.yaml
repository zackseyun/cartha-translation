id: JHN.18.32
reference: John 18:32
source:
  edition: SBLGNT
  text: ἵνα ὁ λόγος τοῦ Ἰησοῦ πληρωθῇ ὃν εἶπεν σημαίνων ποίῳ θανάτῳ ἤμελλεν ἀποθνῄσκειν.
translation:
  text: so that the word of Jesus would be fulfilled, which he had spoken, indicating by what kind of death he was about to die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the saying of Jesus.'
    reason: lexical_alternative
  - marker: b
    text: That is, Jesus had indicated the manner of his death, likely alluding to crucifixion (compare John 12:32–33).
    reason: cross_reference
  - marker: c
    text: Or 'which he had spoken to indicate'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the clause's teleological force without sounding wooden.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the saying
  - what was said
  lexicon: BDAG
  rationale: In Johannine usage λόγος here refers to a spoken utterance or statement of Jesus, not the titular 'Word' of John 1:1. 'The word' is sufficiently literal and idiomatic in this fulfillment formula.
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - that Jesus spoke
  lexicon: BDAG
  rationale: Genitive is retained straightforwardly. The following relative clause further specifies that this was the word Jesus spoke.
- source_word: πληρωθῇ
  chosen: would be fulfilled
  alternatives:
  - might be fulfilled
  - would come true
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα is well represented by 'would be fulfilled' in English narrative sequence. 'Fulfilled' preserves the biblical fulfillment idiom better than the flatter 'come true.'
- source_word: ὃν εἶπεν
  chosen: which he had spoken
  alternatives:
  - which he said
  - that he had said
  lexicon: BDAG
  rationale: The relative clause refers back to 'the word.' Pluperfect-like English ('had spoken') fits the prior saying relative to the present narrative moment.
- source_word: σημαίνων
  chosen: to indicate
  alternatives:
  - signifying
  - showing
  lexicon: BDAG
  rationale: 'The participle explains the manner/purpose of Jesus'' prior speech: it pointed ahead to the nature of his death. ''To indicate'' is clear modern English and preserves the semantic force without archaic tone.'
- source_word: ποίῳ θανάτῳ
  chosen: by what kind of death
  alternatives:
  - by what death
  - what sort of death
  lexicon: BDAG
  rationale: ποίῳ asks about the kind or manner, not merely the fact, of death. 'By what kind of death' preserves the instrumental nuance and points to the mode of execution.
- source_word: ἤμελλεν
  chosen: he was about to
  alternatives:
  - he was going to
  - he was destined to
  lexicon: BDAG
  rationale: μέλλω commonly conveys imminence or future intention. 'Was about to' is a natural rendering here and avoids importing stronger determinism than the verb itself requires.
- source_word: ἀποθνῄσκειν
  chosen: die
  alternatives:
  - meet death
  lexicon: BDAG
  rationale: Simple infinitive of dying; 'die' is the direct and unembellished equivalent.
