theological_decisions:
- issue: Rendering of ἐγώ εἰμι in Johannine context
  chosen_reading: I am he
  alternative_readings:
  - I am
  rationale: In immediate context Jesus is answering the arresting party's identification
    question, so 'I am he' best communicates the plain sense in readable English.
    Because John's Gospel also uses absolute ἐγώ εἰμι expressions with possible theological
    resonance, the shorter 'I am' is preserved in a footnote rather than resolved
    away.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
