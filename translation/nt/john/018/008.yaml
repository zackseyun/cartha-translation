id: JHN.18.8
reference: John 18:8
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Εἶπον ὑμῖν ὅτι ἐγώ εἰμι· εἰ οὖν ἐμὲ ζητεῖτε, ἄφετε τούτους
    ὑπάγειν·
translation:
  text: Jesus answered, “I told you that I am he. So if you are seeking me, let these
    men go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “I am.” The Greek does not supply “he”; English often adds it
      for clarity in identification contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; 'answered'
    is idiomatic and slightly more formal than 'replied' without changing sense.
- source_word: Εἶπον
  chosen: I told
  alternatives:
  - I said
  lexicon: BDAG
  rationale: Aorist of λέγω can be rendered 'said' or 'told.' With indirect object
    ὑμῖν and reference to prior statement, 'I told you' is natural English and preserves
    the force of reminding them of what he had already stated.
- source_word: ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - I am the one
  lexicon: BDAG
  rationale: In this arrest-scene context the expression identifies Jesus as the person
    sought. English normally supplies the predicate ('he') for clarity. The alternative
    bare 'I am' is important because John may preserve an echo of the absolute ἐγώ
    εἰμι usage; that nuance is preserved in a footnote rather than left obscure in
    the main text.
- source_word: ζητεῖτε
  chosen: are seeking
  alternatives:
  - seek
  - are looking for
  lexicon: BDAG
  rationale: 'Present tense here is naturally rendered with progressive aspect in
    English in this immediate encounter: ''if you are seeking me.'' ''Looking for''
    is possible but slightly less direct.'
- source_word: ἄφετε
  chosen: let
  alternatives:
  - allow
  - release
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίημι here means to permit or let go. 'Let' is
    concise and idiomatic in English. 'Release' would over-specify a custodial sense
    not explicit in the verb itself.
- source_word: τούτους
  chosen: these men
  alternatives:
  - these
  - these ones
  lexicon: BDAG
  rationale: The demonstrative refers to Jesus' companions. English can say 'these,'
    but 'these men' makes the referent explicit and natural without adding interpretive
    content beyond the evident context.
- source_word: ὑπάγειν
  chosen: go
  alternatives:
  - go away
  - depart
  lexicon: BDAG
  rationale: Infinitive after ἄφετε expresses permitted departure. 'Go' is the most
    natural concise rendering; 'go away' or 'depart' are possible but less idiomatic
    here.
