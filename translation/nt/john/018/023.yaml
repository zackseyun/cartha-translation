id: JHN.18.23
reference: John 18:23
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτῷ Ἰησοῦς· Εἰ κακῶς ἐλάλησα, μαρτύρησον περὶ τοῦ κακοῦ· εἰ δὲ
    καλῶς, τί με δέρεις;
translation:
  text: Jesus answered him, “If I spoke wrongly, testify about the wrong; but if rightly,
    why do you strike me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bear witness concerning the evil” or “testify about what was wrong.”
    reason: lexical_alternative
  - marker: b
    text: Or “why do you hit me?” The Greek verb can refer broadly to striking, and
      in some contexts to beating.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb. 'Answered' is the most natural and
    common rendering in John and preserves the formal exchange.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object of Jesus' reply. English
    idiom allows either 'answered him' or 'answered to him'; 'answered him' is standard.
- source_word: Εἰ
  chosen: If
  alternatives:
  - Suppose that
  lexicon: BDAG
  rationale: Introduces a conditional clause. A straightforward 'if' best preserves
    the structure of Jesus' argument.
- source_word: κακῶς
  chosen: wrongly
  alternatives:
  - evil
  - badly
  - incorrectly
  lexicon: BDAG
  rationale: The adverb can denote speaking in a bad, wrong, or improper way. 'Wrongly'
    fits the forensic setting and pairs well with 'rightly' in the second clause.
- source_word: ἐλάλησα
  chosen: I spoke
  alternatives:
  - I have spoken
  - I said
  lexicon: BDAG
  rationale: Aorist indicative of λαλέω, referring to Jesus' prior speech. 'I spoke'
    is a simple and accurate English past tense.
- source_word: μαρτύρησον
  chosen: testify
  alternatives:
  - bear witness
  - give testimony
  lexicon: BDAG
  rationale: Imperative in a judicial context. 'Testify' is concise, modern, and preserves
    the legal nuance of witness-bearing.
- source_word: περὶ τοῦ κακοῦ
  chosen: about the wrong
  alternatives:
  - concerning the evil
  - about what was wrong
  - about the wrongdoing
  lexicon: BDAG
  rationale: The phrase points to the alleged wrong in Jesus' speech. 'About the wrong'
    keeps the nominal force of τοῦ κακοῦ without over-specifying moral evil or criminal
    wrongdoing.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - however
  lexicon: BDAG
  rationale: Marks contrast between the two conditional branches. 'But' is the clearest
    English equivalent here.
- source_word: καλῶς
  chosen: rightly
  alternatives:
  - well
  - correctly
  lexicon: BDAG
  rationale: Chosen to mirror 'wrongly' and preserve the antithesis κακῶς/καλῶς. 'Well'
    in English can sound stylistic rather than morally or factually proper.
- source_word: τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Although literally 'what?', in this idiom with the verb it functions
    adverbially as 'why?' English should reflect the idiomatic sense.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus.
- source_word: δέρεις
  chosen: do you strike
  alternatives:
  - are you beating
  - do you hit
  - do you slap
  lexicon: BDAG
  rationale: δέρω can mean strike, beat, or flog. In this immediate context of a single
    blow from an officer, 'strike' is broad and accurate without overcommitting to
    'slap' or the more severe 'beat'.
