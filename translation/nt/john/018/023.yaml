theological_decisions:
- issue: Nature of Jesus' response to unlawful violence
  chosen_reading: Rendered as a legal-moral challenge without importing additional
    theological commentary.
  alternative_readings:
  - A more confrontational paraphrase emphasizing injustice
  - A softer rendering minimizing the forensic tone
  rationale: The verse presents Jesus appealing to proper testimony and exposing unjust
    treatment. The translation preserves the judicial logic of the Greek rather than
    expanding it into doctrinal or ethical commentary not explicit in the text.
  doctrine_reference: Translation philosophy items 1, 3, and 6
