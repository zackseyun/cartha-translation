id: JHN.18.2
reference: John 18:2
source:
  edition: SBLGNT
  text: ᾔδει δὲ καὶ Ἰούδας ὁ παραδιδοὺς αὐτὸν τὸν τόπον, ὅτι πολλάκις ⸀συνήχθη Ἰησοῦς
    ἐκεῖ μετὰ τῶν μαθητῶν αὐτοῦ.
translation:
  text: Now Judas, who was betraying him, also knew the place, because Jesus had often
    gathered there with his disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who was handing him over.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'because Jesus had often met there with his disciples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  chosen: knew
  alternatives:
  - had known
  - was acquainted with
  lexicon: BDAG
  rationale: οἶδα commonly conveys knowledge or awareness. 'Knew' is the natural English
    equivalent here, indicating Judas's familiarity with the location.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ marks a mild development in the narrative. 'Now' works well in readable
    English to signal transition without implying strong contrast.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: καί here adds Judas to the set of those aware of the place. 'Also' preserves
    the additive force clearly.
- source_word: ὁ παραδιδοὺς αὐτὸν
  chosen: who was betraying him
  alternatives:
  - who was handing him over
  - his betrayer
  lexicon: BDAG
  rationale: The present participle identifies Judas in his ongoing role in the narrative.
    'Who was betraying him' preserves the verbal force and Johannine framing. 'Handing
    him over' is more literal but less idiomatic in English here.
- source_word: τὸν τόπον
  chosen: the place
  alternatives:
  - that place
  - the location
  lexicon: BDAG
  rationale: τόπος straightforwardly means 'place' or 'location.' 'The place' is sufficiently
    natural and reflects the article in context, referring to the known meeting spot.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason Judas knew the place. 'Because' makes
    the causal sense explicit in English.
- source_word: πολλάκις
  chosen: often
  alternatives:
  - many times
  - frequently
  lexicon: BDAG
  rationale: πολλάκις denotes repeated occurrence. 'Often' is concise, natural, and
    accurate.
- source_word: συνήχθη
  chosen: had often gathered
  alternatives:
  - had often met
  - often assembled
  lexicon: BDAG
  rationale: The passive form of συνάγω can function intransitively in context ('gather/meet
    together'). 'Had often gathered' preserves the gathering language more closely
    than 'met,' while remaining natural English. The pluperfect English form fits
    the explanatory background sense relative to the narrative.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  chosen: with his disciples
  alternatives:
  - together with his disciples
  lexicon: BDAG
  rationale: μετά with the genitive means association, 'with.' μαθηταί is best rendered
    'disciples' in the Gospel context, preserving the teacher-disciple relationship.
