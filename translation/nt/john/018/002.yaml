theological_decisions:
- issue: Rendering παραδιδοὺς in reference to Judas
  chosen_reading: betraying
  alternative_readings:
  - handing over
  rationale: In the passion narrative, παραδίδωμι with Judas conventionally and contextually
    denotes betrayal, not a neutral transfer. 'Betraying' communicates the moral and
    narrative force recognized in context without adding extra doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sense of συνήχθη
  chosen_reading: Jesus had often gathered there with his disciples
  alternative_readings:
  - Jesus had often met there with his disciples
  - Jesus was often gathered there with his disciples
  rationale: The Greek passive can be rendered with an intransitive sense in idiomatic
    English. 'Had often gathered there' preserves the lexical connection to gathering
    while avoiding awkward English. This does not imply a theological nuance beyond
    repeated fellowship/meeting.
  doctrine_reference: Translation philosophy §5, §6
