id: JHN.18.15
reference: John 18:15
source:
  edition: SBLGNT
  text: Ἠκολούθει δὲ τῷ Ἰησοῦ Σίμων Πέτρος ⸀καὶ ἄλλος μαθητής. ὁ δὲ μαθητὴς ἐκεῖνος
    ἦν γνωστὸς τῷ ἀρχιερεῖ καὶ συνεισῆλθεν τῷ Ἰησοῦ εἰς τὴν αὐλὴν τοῦ ἀρχιερέως,
translation:
  text: Now Simon Peter was following Jesus, and so was another disciple. That disciple
    was known to the high priest, and he went in with Jesus into the courtyard of
    the high priest,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Now Simon Peter was following Jesus, and another disciple.'
      The Greek leaves the shared action of the second disciple implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in the narrative, so 'was following'
    better preserves the aspect than a simple past 'followed.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: Used here as a mild connective advancing the narrative. 'Now' gives natural
    English discourse flow without overstating contrast.
- source_word: καὶ ἄλλος μαθητής
  chosen: and so was another disciple
  alternatives:
  - and another disciple
  - and also another disciple
  lexicon: BDAG
  rationale: The Greek coordinates Simon Peter with 'another disciple' as also following
    Jesus. 'And so was another disciple' makes the shared action explicit in idiomatic
    English.
- source_word: μαθητής
  chosen: disciple
  alternatives:
  - follower
  lexicon: BDAG
  rationale: '''Disciple'' is the standard and contextually precise rendering in John
    for a committed learner/follower of Jesus.'
- source_word: ἐκεῖνος
  chosen: that
  alternatives:
  - the one
  - this
  lexicon: BDAG
  rationale: Demonstrative points back to the previously mentioned 'other disciple.'
    'That disciple' is natural and preserves the anaphoric force.
- source_word: γνωστὸς
  chosen: known
  alternatives:
  - acquainted
  - well known
  lexicon: BDAG
  rationale: The adjective indicates that the disciple was known to the high priest.
    'Known' is the most direct rendering; 'well known' would overstate the degree
    of familiarity.
- source_word: ἀρχιερεῖ / ἀρχιερέως
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in this context; singular is maintained
    in both occurrences.
- source_word: συνεισῆλθεν
  chosen: went in with
  alternatives:
  - entered with
  - went along with
  lexicon: BDAG
  rationale: The compound verb conveys entering together with Jesus. 'Went in with'
    is natural modern English and preserves the associative force of σύν.
- source_word: αὐλήν
  chosen: courtyard
  alternatives:
  - court
  - palace courtyard
  lexicon: BDAG
  rationale: Refers to the enclosed court area of the high priest's residence. 'Courtyard'
    is clearer for modern readers than 'court' and avoids overtranslation to 'palace
    courtyard'.
