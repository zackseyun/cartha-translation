id: JHN.18.36
reference: John 18:36
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Ἡ βασιλεία ἡ ἐμὴ οὐκ ἔστιν ἐκ τοῦ κόσμου τούτου· εἰ ἐκ τοῦ
    κόσμου τούτου ἦν ἡ βασιλεία ἡ ἐμή, οἱ ὑπηρέται ⸂οἱ ἐμοὶ ἠγωνίζοντο ἄν⸃, ἵνα μὴ
    παραδοθῶ τοῖς Ἰουδαίοις· νῦν δὲ ἡ βασιλεία ἡ ἐμὴ οὐκ ἔστιν ἐντεῦθεν.
translation:
  text: Jesus answered, “My kingdom is not from this world. If my kingdom were from
    this world, my servants would be fighting so that I might not be handed over to
    the Jews. But as it is, my kingdom is not from here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Judeans,” possibly referring more specifically here to the Judean
      authorities.
    reason: alternative_reading
lexical_decisions:
- source_word: βασιλεία
  chosen: kingdom
  alternatives:
  - reign
  - rule
  lexicon: BDAG
  rationale: '"Kingdom" is the most natural and established rendering here, and in
    this context it can encompass both realm and royal rule. "Reign" or "rule" are
    possible, but the repeated predicate construction in John reads most idiomatically
    in English with "kingdom."'
- source_word: ἐκ τοῦ κόσμου τούτου
  chosen: from this world
  alternatives:
  - of this world
  - out of this world
  lexicon: BDAG
  rationale: ἐκ marks source/origin more directly than simple association. "From this
    world" better preserves Jesus' point about the origin or source of his kingdom
    than the traditional "of this world," while remaining natural English.
- source_word: κόσμος
  chosen: world
  alternatives:
  - world order
  lexicon: BDAG
  rationale: In Johannine usage κόσμος often carries the sense of the world in its
    present human order opposed to God, but "world" is the clearest direct rendering.
    The fuller nuance is conveyed by context without expanding the translation.
- source_word: ὑπηρέται
  chosen: servants
  alternatives:
  - officers
  - attendants
  - subordinates
  lexicon: BDAG
  rationale: ὑπηρέται refers to those who serve under authority. Here "servants" fits
    the royal context created by "kingdom" and avoids over-specifying an official
    police role. "Officers" would sound too institutional in this saying of Jesus.
- source_word: ἠγωνίζοντο ἄν
  chosen: would be fighting
  alternatives:
  - would fight
  - would be struggling
  lexicon: BDAG
  rationale: The imperfect with ἄν in this contrary-to-fact condition suggests ongoing
    action in the hypothetical scenario. "Would be fighting" captures that aspect
    better than the simpler "would fight."
- source_word: ἵνα μὴ παραδοθῶ
  chosen: so that I might not be handed over
  alternatives:
  - so that I would not be handed over
  - so that I might not be delivered up
  lexicon: BDAG
  rationale: The clause expresses purpose. "Handed over" is clear modern English and
    preserves the judicial/betrayal nuance of παραδίδωμι better than the more archaic
    "delivered up."
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Judeans
  lexicon: BDAG
  rationale: In John, Ἰουδαῖοι can mean either Jews generally or Judean authorities
    depending on context. Here the immediate narrative setting involves the Jewish
    leadership to whom Jesus is being handed over, but the Greek term itself is "the
    Jews." To avoid over-narrowing the text, the main rendering keeps "the Jews,"
    while a footnote preserves "the Judeans" as a contextual alternative.
- source_word: νῦν δὲ
  chosen: But as it is
  alternatives:
  - but now
  - but in fact
  lexicon: BDAG
  rationale: This idiom marks the actual state of affairs in contrast to the hypothetical
    condition just stated. "But as it is" communicates that contrast more clearly
    in contemporary English than a bare "but now."
- source_word: ἐντεῦθεν
  chosen: from here
  alternatives:
  - from this place
  - from this realm
  lexicon: BDAG
  rationale: ἐντεῦθεν is a deictic adverb meaning "from here/from this place." Rendering
    it "from here" preserves the shift from ἐκ τοῦ κόσμου τούτου to a concluding adverbial
    expression without flattening the wording into exact repetition.
