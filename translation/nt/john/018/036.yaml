theological_decisions:
- issue: Nature of Jesus' kingdom in relation to the world
  chosen_reading: Rendered source/origin language as "not from this world" rather
    than a paraphrase such as "not part of this world."
  alternative_readings:
  - not of this world
  - not part of this world
  rationale: The verse speaks primarily about the source and character of Jesus' kingdom,
    not denying its presence in the world but denying that it derives from the world's
    order. This preserves theological tension rather than resolving it into withdrawal
    from earthly reality.
  doctrine_reference: Translation philosophy §3
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: Main text keeps "the Jews" with contextual alternative in a footnote.
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The Greek term is lexically "Jews," but in John it can function in a
    narrower contextual sense. To avoid both anachronistic ethnic flattening and over-interpretive
    narrowing, the main text stays close to the Greek and the footnote preserves the
    contextual alternative.
  doctrine_reference: Translation philosophy §3
