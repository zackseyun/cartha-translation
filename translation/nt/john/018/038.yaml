id: JHN.18.38
reference: John 18:38
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Πιλᾶτος· Τί ἐστιν ἀλήθεια; Καὶ τοῦτο εἰπὼν πάλιν ἐξῆλθεν πρὸς
    τοὺς Ἰουδαίους, καὶ λέγει αὐτοῖς· Ἐγὼ οὐδεμίαν ⸂εὑρίσκω ἐν αὐτῷ αἰτίαν⸃·
translation:
  text: Pilate said to him, “What is truth?” After saying this, he went out again
    to the Jews and said to them, “I find no grounds for accusation against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Jewish leaders.” In John, “the Jews” can sometimes refer more
      specifically to the Judean authorities or the representative group opposing
      Jesus in the immediate context.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτῷ ὁ Πιλᾶτος
  chosen: Pilate said to him
  alternatives:
  - Pilate says to him
  lexicon: BDAG
  rationale: The Greek present λέγει is a historical present. English normally renders
    this naturally as past narrative tense, 'said,' while preserving the discourse
    flow.
- source_word: Τί ἐστιν ἀλήθεια;
  chosen: What is truth?
  alternatives:
  - What is the truth?
  lexicon: BDAG
  rationale: ἀλήθεια lacks the article, so 'truth' is the most direct rendering. 'The
    truth' would over-specify what the Greek leaves more general or philosophical.
- source_word: Καὶ τοῦτο εἰπὼν
  chosen: After saying this
  alternatives:
  - And having said this
  - When he had said this
  lexicon: BDAG
  rationale: The aorist participle εἰπών is most naturally rendered in English with
    a temporal participial clause. 'After saying this' is clear, idiomatic, and preserves
    the sequence.
- source_word: πάλιν ἐξῆλθεν
  chosen: he went out again
  alternatives:
  - he went out once more
  - he went out back again
  lexicon: BDAG
  rationale: πάλιν modifies the action as repeated; 'again' is the straightforward
    equivalent. ἐξῆλθεν is simple movement out from the interior setting.
- source_word: πρὸς τοὺς Ἰουδαίους
  chosen: to the Jews
  alternatives:
  - to the Jewish leaders
  - to the Judeans
  lexicon: BDAG
  rationale: The Greek text reads τοὺς Ἰουδαίους. In John's Gospel this term can denote
    Judeans or the Jewish authorities depending on context, but here it refers to
    the group outside before Pilate. The main text keeps the lexical form 'the Jews'
    for transparency to the source, while a footnote preserves the contextual alternative
    'the Jewish leaders' to avoid implying all Jewish people without distinction.
- source_word: καὶ λέγει αὐτοῖς
  chosen: and said to them
  alternatives:
  - and says to them
  lexicon: BDAG
  rationale: Again, historical present λέγει is rendered as English past tense for
    natural narrative style.
- source_word: Ἐγὼ οὐδεμίαν εὑρίσκω ἐν αὐτῷ αἰτίαν
  chosen: I find no grounds for accusation against him
  alternatives:
  - I find no case against him
  - I find no fault in him
  - I find no basis for a charge against him
  lexicon: BDAG
  rationale: αἰτία in judicial context means cause, charge, or grounds for accusation
    rather than a vague moral 'fault.' 'Grounds for accusation' best captures the
    forensic setting. ἐν αὐτῷ is rendered idiomatically as 'against him' in English
    legal usage.
