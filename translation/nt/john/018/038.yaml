theological_decisions:
- issue: Referent and translation of Ἰουδαίοις in John's passion narrative
  chosen_reading: Main text retains 'the Jews' with a clarifying footnote preserving
    'the Jewish leaders' as a contextual alternative.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation philosophy prioritizes original-language primacy, so
    the lexical form is preserved in the main text. At the same time, because John's
    use of Ἰουδαῖοι can be contextually narrower than the entire Jewish people, a
    footnote is warranted to preserve interpretive tension and avoid importing an
    overbroad ethnic sense where the narrative likely points to the authorities or
    representative accusers present.
  doctrine_reference: Translation philosophy §§1, 3
