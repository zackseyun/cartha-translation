theological_decisions:
- issue: Rendering Ναζωραῖος as an epithet for Jesus
  chosen_reading: the Nazarene
  alternative_readings:
  - of Nazareth
  - the Nazorean
  rationale: This is primarily a lexical and historical designation, not a doctrinal
    title. 'The Nazarene' best preserves the Greek expression without importing additional
    interpretive claims. Because 'of Nazareth' is common in English tradition and
    may be understood similarly, it is preserved as an alternative in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
