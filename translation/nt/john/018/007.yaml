id: JHN.18.7
reference: John 18:7
source:
  edition: SBLGNT
  text: πάλιν οὖν ⸂ἐπηρώτησεν αὐτούς⸃· Τίνα ζητεῖτε; οἱ δὲ εἶπαν· Ἰησοῦν τὸν Ναζωραῖον.
translation:
  text: So he asked them again, “Whom are you seeking?” And they said, “Jesus the
    Nazarene.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus of Nazareth”; Greek “Jesus the Nazarene.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Adverb indicating repetition; 'again' is the most natural concise English
    rendering in narrative context.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Connective drawing an inference or continuation from the preceding exchange.
    'So' fits readable modern English while preserving the discourse flow better than
    the more formal 'therefore'.
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐπερωτάω, here denoting a direct question. 'Asked'
    is idiomatic and sufficient; 'questioned' could sound more adversarial than the
    context requires.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring to the arresting party; straightforward
    accusative plural rendering.
- source_word: Τίνα
  chosen: Whom
  alternatives:
  - Who
  lexicon: BDAG
  rationale: Accusative interrogative pronoun functioning as the object of 'seeking.'
    'Whom' most precisely reflects the Greek case function, though 'who' would be
    acceptable in less formal English.
- source_word: ζητεῖτε
  chosen: are you seeking
  alternatives:
  - are you looking for
  lexicon: BDAG
  rationale: Present indicative conveys the action they are presently undertaking.
    'Seeking' preserves the verbal link with Johannine usage and is slightly weightier
    than 'looking for' without becoming unnatural.
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - But they said
  - Then they said
  lexicon: BDAG
  rationale: δέ here marks simple narrative progression or mild contrast. 'And they
    said' is smooth English and fits the back-and-forth dialogue.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς, following
    the translation principle to transliterate names.
- source_word: τὸν Ναζωραῖον
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: Ναζωραῖος is an adjectival/nominal designation. 'The Nazarene' preserves
    the Greek form and functions naturally as an identifying epithet in English. 'Of
    Nazareth' is interpretive and less formally aligned to the source wording; 'Nazorean'
    is more transliterative but less idiomatic.
