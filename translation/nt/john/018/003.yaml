id: JHN.18.3
reference: John 18:3
source:
  edition: SBLGNT
  text: ὁ οὖν Ἰούδας λαβὼν τὴν σπεῖραν καὶ ἐκ τῶν ἀρχιερέων καὶ ⸂ἐκ τῶν⸃ Φαρισαίων
    ὑπηρέτας ἔρχεται ἐκεῖ μετὰ φανῶν καὶ λαμπάδων καὶ ὅπλων.
translation:
  text: So Judas, having taken the cohort and officers from the chief priests and
    from the Pharisees, comes there with lanterns and torches and weapons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'detachment' or 'band of soldiers' for 'cohort' (σπεῖρα). The Greek term
      can refer to a military unit without requiring that the entire unit was present.
    reason: lexical_alternative
  - marker: b
    text: Or 'guards' or 'temple police' for 'officers' (ὑπηρέτας). The term refers
      to official attendants serving the Jewish authorities.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Then
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative continuation/inference from the previous context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: λαβὼν
  chosen: having taken
  alternatives:
  - having received
  - taking
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, indicating prior action. 'Having
    taken' preserves the participial sequence more clearly than a simple finite verb.
- source_word: σπεῖραν
  chosen: cohort
  alternatives:
  - Roman cohort
  - band of soldiers
  - detachment
  lexicon: BDAG
  rationale: σπεῖρα commonly denotes a cohort, especially a Roman military unit or
    detachment. 'Cohort' keeps the historical specificity without overcommitting to
    full numerical strength; 'band' is too vague.
- source_word: ὑπηρέτας
  chosen: officers
  alternatives:
  - guards
  - temple police
  - servants
  lexicon: BDAG
  rationale: In Johannine usage this term often refers to official attendants/guards
    serving the Jewish authorities. 'Officers' is concise and broad enough to include
    temple police-like function without importing more than the text states.
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the leading priestly authorities,
    not multiple holders of the singular office at once in a simplistic sense.
- source_word: Φαρισαίων
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - went
  - arrives
  lexicon: BDAG
  rationale: Greek present in narrative is naturally rendered as historical present
    in English here. 'Comes' preserves John's vivid style better than shifting to
    past tense.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Simple locative adverb referring to the place already identified in context.
- source_word: φανῶν
  chosen: lanterns
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: φανός refers to a portable light, often a lantern. Rendering it distinctly
    from λαμπάδων helps preserve the paired terms.
- source_word: λαμπάδων
  chosen: torches
  alternatives:
  - lamps
  lexicon: BDAG
  rationale: λαμπάς commonly denotes a torch. Using 'torches' alongside 'lanterns'
    reflects the lexical distinction in the Greek.
- source_word: ὅπλων
  chosen: weapons
  alternatives:
  - arms
  lexicon: BDAG
  rationale: General term for implements of armed force. 'Weapons' is clear modern
    English.
