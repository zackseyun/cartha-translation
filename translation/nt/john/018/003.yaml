theological_decisions:
- issue: Identity and composition of the arresting party
  chosen_reading: Translate σπεῖρα as 'cohort' and ὑπηρέτας as 'officers,' indicating
    a mixed group involving military and Jewish-authority personnel without specifying
    exact numbers.
  alternative_readings:
  - Translate more generally as 'band of soldiers and guards'
  - Translate σπεῖρα as 'detachment'
  rationale: The verse presents Judas as accompanied by both a σπεῖρα and officers
    from the chief priests and Pharisees. The translation should preserve that dual-source
    composition without overstating whether the full Roman cohort was present.
