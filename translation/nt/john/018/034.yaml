theological_decisions:
- issue: Force of Jesus' question to Pilate
  chosen_reading: Render as a question about the source of Pilate's claim—whether
    it originates with Pilate himself or from others—without importing a fuller theological
    explanation into the translation.
  alternative_readings:
  - Render more interpretively as 'Do you ask this on your own initiative...?'
  rationale: The Greek focuses on the origin of Pilate's statement, not yet on Pilate's
    motives in a broader theological sense. The translation preserves that tension
    and avoids over-interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
