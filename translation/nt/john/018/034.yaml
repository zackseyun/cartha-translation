id: JHN.18.34
reference: John 18:34
source:
  edition: SBLGNT
  text: ⸀ἀπεκρίθη Ἰησοῦς· ⸂Ἀπὸ σεαυτοῦ⸃ σὺ τοῦτο λέγεις ἢ ἄλλοι ⸂εἶπόν σοι⸃ περὶ ἐμοῦ;
translation:
  text: Jesus answered, “Are you saying this from yourself, or did others tell you
    about me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on your own.” The Greek literally says “from yourself,” asking whether
      Pilate’s statement originates with him personally.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for responding to a question. 'Answered' is the
    most natural and common English rendering in Gospel dialogue.
- source_word: Ἀπὸ σεαυτοῦ
  chosen: from yourself
  alternatives:
  - on your own
  - of yourself
  lexicon: BDAG
  rationale: 'The preposition ἀπό with the reflexive pronoun indicates source or origin:
    whether the statement arises from Pilate himself. ''From yourself'' preserves
    the source-oriented sense more closely than the more idiomatic ''on your own,''
    while remaining understandable in English.'
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis in Greek. English naturally carries the
    subject in the verb, but retaining 'you' reflects the emphasis without awkwardness.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: Refers to Pilate's preceding question. Simple 'this' is idiomatic and
    sufficiently precise.
- source_word: λέγεις
  chosen: are saying
  alternatives:
  - say
  lexicon: BDAG
  rationale: 'Greek present tense in direct discourse can be rendered as English progressive
    for natural speech: ''Are you saying...?'' This fits the immediate conversational
    setting better than the stiffer ''Do you say...'''
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Standard disjunctive conjunction introducing the alternative possibility.
- source_word: ἄλλοι
  chosen: others
  alternatives:
  - other people
  lexicon: BDAG
  rationale: Indefinite plural referring to people besides Pilate. 'Others' is concise
    and natural.
- source_word: εἶπόν σοι
  chosen: did others tell you
  alternatives:
  - have others told you
  - did others speak to you
  lexicon: BDAG
  rationale: Aorist is well represented by simple past in this context. The verb λέγω
    here means to tell or say to someone. 'Tell you' is the most idiomatic English
    expression.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: περί with genitive commonly means 'about' or 'concerning.' 'About me'
    is clear modern English.
