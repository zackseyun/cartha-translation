theological_decisions:
- issue: Nuance of Jesus' reply to Pilate ('Σὺ λέγεις ὅτι βασιλεύς εἰμι')
  chosen_reading: A qualified affirmation rendered transparently as 'You say that
    I am a king'
  alternative_readings:
  - 'An emphatic affirmation: ''You say rightly that I am a king'''
  - 'A more distancing reply: ''That is your word, not mine'''
  rationale: The Greek permits a range of nuance, but the text does not explicitly
    supply either a strong endorsement or a denial. Following the doctrine's principle
    of preserving theological tension rather than resolving ambiguity, the main text
    keeps the wording close to the Greek and preserves stronger interpretive options
    in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Implication of Jesus' mission language ('I have been born' / 'I have come
    into the world')
  chosen_reading: Retain both clauses distinctly without collapsing them into a single
    paraphrase
  alternative_readings:
  - Paraphrasing as a single mission statement
  rationale: John's wording distinguishes Jesus' birth and his coming into the world,
    which may carry incarnational significance. The translation preserves both clauses
    without adding doctrinal explanation beyond the text.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 1, 3
