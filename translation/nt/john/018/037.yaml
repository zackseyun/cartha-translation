id: JHN.18.37
reference: John 18:37
source:
  edition: SBLGNT
  text: εἶπεν οὖν αὐτῷ ὁ Πιλᾶτος· Οὐκοῦν βασιλεὺς εἶ σύ; ἀπεκρίθη ⸀ὁ Ἰησοῦς· Σὺ λέγεις
    ὅτι βασιλεύς ⸀εἰμι. ἐγὼ εἰς τοῦτο γεγέννημαι καὶ εἰς τοῦτο ἐλήλυθα εἰς τὸν κόσμον
    ἵνα μαρτυρήσω τῇ ἀληθείᾳ· πᾶς ὁ ὢν ἐκ τῆς ἀληθείας ἀκούει μου τῆς φωνῆς.
translation:
  text: 'Then Pilate said to him, “So then, are you a king?” Jesus answered, “You
    say that I am a king. For this I have been born, and for this I have come into
    the world: that I should bear witness to the truth. Everyone who is of the truth
    listens to my voice.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''You say so: I am a king,'' or ''You say rightly that I am a king.''
      The Greek wording is concise and can be heard as a qualified affirmation.'
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐκοῦν
  chosen: So then
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Captures the inferential force of Pilate's response to the preceding
    exchange. 'So then' preserves the sense of drawing a conclusion without sounding
    overly wooden.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  - royal one
  lexicon: BDAG
  rationale: The standard and contextually appropriate rendering for βασιλεύς in a
    Roman interrogation about kingship. It preserves the political and messianic overtones
    without paraphrase.
- source_word: Σὺ λέγεις ὅτι βασιλεύς εἰμι
  chosen: You say that I am a king
  alternatives:
  - You say so, because I am a king
  - 'You say it: I am a king'
  - You say that I am king
  lexicon: BDAG
  rationale: This phrase is somewhat elliptical and can function as a qualified affirmation.
    'You say that I am a king' preserves the Greek wording closely while leaving the
    nuance intact, rather than over-resolving it into either a blunt affirmation or
    a distancing denial.
- source_word: γεγέννημαι
  chosen: I have been born
  alternatives:
  - I was born
  - I have been begotten
  lexicon: BDAG
  rationale: The perfect tense is best represented by 'I have been born,' which preserves
    the present relevance of Jesus' birth. 'Begotten' would import theological associations
    not demanded by this context.
- source_word: ἐλήλυθα εἰς τὸν κόσμον
  chosen: I have come into the world
  alternatives:
  - I came into the world
  lexicon: BDAG
  rationale: The perfect ἐλήλυθα is retained with 'have come,' which in Johannine
    usage can carry both mission and origin significance. 'World' is the standard
    rendering of κόσμος here.
- source_word: μαρτυρήσω
  chosen: I should bear witness
  alternatives:
  - I may testify
  - I might testify
  - I would testify
  lexicon: BDAG
  rationale: With ἵνα plus aorist subjunctive, 'that I should bear witness' preserves
    purpose while sounding natural in English. 'Bear witness' also keeps Johannine
    legal-testimonial language more clearly than the flatter 'testify'.
- source_word: τῇ ἀληθείᾳ
  chosen: to the truth
  alternatives:
  - for the truth
  - about the truth
  lexicon: BDAG
  rationale: The dative after μαρτυρέω is naturally rendered 'bear witness to.' 'The
    truth' preserves John's theological use of ἀλήθεια as more than mere factual correctness.
- source_word: πᾶς ὁ ὢν ἐκ τῆς ἀληθείας
  chosen: Everyone who is of the truth
  alternatives:
  - Everyone who is from the truth
  - Everyone who belongs to the truth
  lexicon: BDAG
  rationale: '''Of the truth'' is slightly idiomatic in English but preserves the
    Johannine relational/source language of ἐκ. ''Belongs to the truth'' is interpretive;
    ''from the truth'' is possible but less natural here.'
- source_word: ἀκούει μου τῆς φωνῆς
  chosen: listens to my voice
  alternatives:
  - hears my voice
  lexicon: BDAG
  rationale: While ἀκούω often means 'hear,' in this context of responsive allegiance
    'listens to' better conveys active reception. 'My voice' is retained literally,
    preserving Johannine resonance with the shepherd imagery elsewhere.
