id: JHN.18.28
reference: John 18:28
source:
  edition: SBLGNT
  text: Ἄγουσιν οὖν τὸν Ἰησοῦν ἀπὸ τοῦ Καϊάφα εἰς τὸ πραιτώριον· ἦν δὲ πρωΐ· καὶ αὐτοὶ
    οὐκ εἰσῆλθον εἰς τὸ πραιτώριον, ἵνα μὴ μιανθῶσιν ⸀ἀλλὰ φάγωσιν τὸ πάσχα.
translation:
  text: So they led Jesus from Caiaphas into the governor’s headquarters. Now it was
    early morning. They themselves did not enter the headquarters, so that they would
    not be defiled, but could eat the Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Praetorium,' the Roman governor’s official residence and judicial
      headquarters.
    reason: lexical_alternative
  - marker: b
    text: '''Be defiled'' refers to becoming ceremonially unclean.'
    reason: cultural_note
  - marker: c
    text: '''Eat the Passover'' may refer specifically to the Passover meal or more
      broadly to festival meals/observances during Passover.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄγουσιν
  chosen: they led
  alternatives:
  - they bring
  - they took
  lexicon: BDAG
  rationale: Historical present is naturally rendered as simple past in English narrative
    for readability. 'Led' fits the custodial movement of Jesus better than the more
    wooden 'bring' in this context.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: πραιτώριον
  chosen: the governor’s headquarters
  alternatives:
  - the Praetorium
  - the governor's residence
  lexicon: BDAG
  rationale: Refers to the Roman governor's official residence/judicial headquarters.
    Translating rather than transliterating best serves readability and meaning. 'Headquarters'
    captures the administrative/judicial sense better than a bare transliteration.
- source_word: πρωΐ
  chosen: early morning
  alternatives:
  - morning
  - at dawn
  lexicon: BDAG
  rationale: The adverb indicates the early part of the day. 'Early morning' is clear
    and idiomatic without overstating the exact time as 'dawn' might.
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  - they on their part
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'They themselves' preserves the contrast between
    those delivering Jesus and their own refusal to enter.
- source_word: εἰσῆλθον
  chosen: did not enter
  alternatives:
  - did not go in
  - did not go into
  lexicon: BDAG
  rationale: Aorist narrative verb rendered straightforwardly. 'Enter' is slightly
    more formal and fits the repeated reference to the headquarters.
- source_word: μιανθῶσιν
  chosen: would not be defiled
  alternatives:
  - would not be made unclean
  - would not be polluted
  lexicon: BDAG
  rationale: The verb denotes ritual defilement/uncleanness. 'Defiled' is concise
    and preserves the ceremonial-religious sense; 'made unclean' is a viable alternative
    but less idiomatic here.
- source_word: φάγωσιν τὸ πάσχα
  chosen: could eat the Passover
  alternatives:
  - might eat the Passover
  - could eat the Passover meal
  lexicon: BDAG
  rationale: The purpose clause expresses intended result/ability relative to ritual
    purity. 'Eat the Passover' is the standard idiom and leaves open whether the reference
    is to the meal proper or associated festival eating, a debated issue better noted
    in a footnote than resolved in translation.
- source_word: Καϊάφα
  chosen: Caiaphas
  rationale: Personal name is transliterated by standard convention per project philosophy.
- source_word: Ἰησοῦν
  chosen: Jesus
  rationale: Personal name is transliterated by standard convention per project philosophy.
