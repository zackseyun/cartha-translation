theological_decisions:
- issue: Meaning of 'eat the Passover' in relation to Johannine chronology
  chosen_reading: Retain the literal phrase 'eat the Passover' without specifying
    whether it refers narrowly to the Passover meal or more broadly to festival observances/meals.
  alternative_readings:
  - eat the Passover meal
  - eat the festival offerings
  rationale: The phrase is lexically straightforward, but its precise referent is
    debated in discussions of Passion chronology. The translation preserves the source
    wording and theological tension rather than resolving the harmonization question
    in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
