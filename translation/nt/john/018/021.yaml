id: JHN.18.21
reference: John 18:21
source:
  edition: SBLGNT
  text: τί με ⸂ἐρωτᾷς; ἐρώτησον⸃ τοὺς ἀκηκοότας τί ἐλάλησα αὐτοῖς· ἴδε οὗτοι οἴδασιν
    ἃ εἶπον ἐγώ.
translation:
  text: Why do you question me? Question those who have heard what I said to them.
    Look, these know what I said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why are you asking me? Ask those who heard what I said to them.' The
      Greek verb can be rendered more neutrally as 'ask,' but 'question' better reflects
      the hearing's judicial setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί με ἐρωτᾷς
  chosen: Why do you question me?
  alternatives:
  - Why are you asking me?
  - Why do you ask me?
  lexicon: BDAG
  rationale: 'τί with the present indicative ἐρωτᾷς forms a direct challenge: ''Why
    do you question/ask me?'' ''Question'' fits the judicial setting before the high
    priest better than the more neutral ''ask,'' while still remaining natural English.'
- source_word: ἐρώτησον
  chosen: Question
  alternatives:
  - Ask
  - Examine
  lexicon: BDAG
  rationale: The aorist imperative calls for a direct action. 'Question' preserves
    the forensic tone and creates a deliberate parallel with the previous ἐρωτᾷς.
    'Examine' would overtranslate; 'ask' is possible but weaker in this context.
- source_word: τοὺς ἀκηκοότας
  chosen: those who have heard
  alternatives:
  - the ones who heard
  - those who heard me
  lexicon: BDAG
  rationale: The perfect active participle of ἀκούω highlights persons in the state
    of having heard Jesus' teaching. 'Those who have heard' preserves that aspect
    better than a simple past. 'Me' is not explicit here and is better left implicit
    because the following clause specifies the content heard.
- source_word: τί ἐλάλησα αὐτοῖς
  chosen: what I said to them
  alternatives:
  - what I spoke to them
  - what I told them
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak/say.' 'What I said to them' is idiomatic
    modern English and accurately conveys the content clause. 'Spoke' is more formal
    but less natural here; 'told' may imply instruction more strongly than the Greek
    requires.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: ἴδε is an attention-getting particle/interjection. 'Look' is clear modern
    English. 'Behold' is too archaic for the stated philosophy, while 'See' is possible
    but less idiomatic in this discourse setting.
- source_word: οὗτοι οἴδασιν
  chosen: these know
  alternatives:
  - they know
  - these men know
  lexicon: BDAG
  rationale: 'οὗτοι is demonstrative and emphatic: ''these [people] know.'' Retaining
    ''these'' preserves the deictic force, likely pointing to those present or to
    the class just mentioned. ''These men'' adds gender not explicit in the form,
    though the referents are likely male in context.'
- source_word: ἃ εἶπον ἐγώ
  chosen: what I said
  alternatives:
  - the things that I said
  - what I spoke
  lexicon: BDAG
  rationale: ἃ introduces the content known by the hearers. English naturally renders
    this as 'what I said.' The explicit ἐγώ adds emphasis, but English can convey
    the sense without an awkward 'I myself' here; the emphasis is sufficiently carried
    by the overall structure and repeated first-person reference.
