theological_decisions:
- issue: Forensic tone of Jesus' reply before the high priest
  chosen_reading: Use 'question' rather than the more neutral 'ask' for ἐρωτάω in
    both occurrences.
  alternative_readings:
  - Use 'ask' in both occurrences
  rationale: This is not a doctrinal dispute but a contextual decision affecting how
    Jesus' response is heard. The setting is an official inquiry, and the Greek supports
    a stronger interrogative nuance. The choice avoids paraphrase while preserving
    the confrontational legal context.
  doctrine_reference: Translation philosophy §1, §6
