id: JHN.18.4
reference: John 18:4
source:
  edition: SBLGNT
  text: Ἰησοῦς ⸀οὖν εἰδὼς πάντα τὰ ἐρχόμενα ἐπ’ αὐτὸν ⸂ἐξῆλθεν, καὶ λέγει⸃ αὐτοῖς·
    Τίνα ζητεῖτε;
translation:
  text: Jesus therefore, knowing all the things coming upon him, went out and said
    to them, “Whom are you seeking?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all that was about to come upon him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks narrative/logical continuation. 'Therefore' preserves the inferential
    force more clearly than a bare 'then,' while remaining natural in English.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - having known
  - being aware of
  lexicon: BDAG
  rationale: Aorist participle describing Jesus' prior/full awareness. 'Knowing' is
    idiomatic and preserves the sense without overcomplicating the English.
- source_word: πάντα τὰ ἐρχόμενα ἐπ’ αὐτόν
  chosen: all the things coming upon him
  alternatives:
  - all that was about to come upon him
  - everything that was coming upon him
  lexicon: BDAG
  rationale: Retains the comprehensiveness of πάντα and the participial force of ἐρχόμενα.
    'Coming upon him' preserves the impending hostile events without specifying more
    than the Greek states. 'All the things' is slightly more formal but reflects the
    article plus participle construction.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - came out
  - stepped out
  lexicon: BDAG
  rationale: Standard rendering of ἐξέρχομαι. 'Went out' is straightforward and avoids
    adding dramatic nuance not explicit in the Greek.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly smooths this to past tense. This is an optimal-equivalence adjustment
    for readable modern English.
- source_word: Τίνα
  chosen: Whom
  alternatives:
  - Who
  lexicon: BDAG
  rationale: Accusative singular of τίς functioning as the object of 'seeking.' 'Whom'
    most precisely reflects the Greek syntax, though 'who' would be acceptable in
    less formal English.
- source_word: ζητεῖτε
  chosen: are you seeking
  alternatives:
  - do you seek
  - are you looking for
  lexicon: BDAG
  rationale: Present tense is well represented by English progressive here. 'Seeking'
    preserves the slightly weightier tone of ζητέω better than the more colloquial
    'looking for.'
