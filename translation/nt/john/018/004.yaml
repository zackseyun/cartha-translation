theological_decisions:
- issue: Jesus' foreknowledge in the narrative
  chosen_reading: The translation preserves that Jesus knew in advance all that was
    coming upon him, without expanding this into an explicit doctrinal statement beyond
    the verse.
  alternative_readings:
  - A more interpretive rendering could emphasize exhaustive foreknowledge more explicitly.
  rationale: The verse plainly presents Jesus as fully aware of the events about to
    befall him. The wording should preserve that theological weight while avoiding
    imported systematic-theology language not stated in the text.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
