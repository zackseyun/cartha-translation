theological_decisions:
- issue: Force of the negative question introduced by μή
  chosen_reading: 'Render as a question expecting a negative answer: ''You are not
    also ... , are you?'''
  alternative_readings:
  - '''Surely you are not also ... ?'''
  - A flatter question without signaling expected answer
  rationale: This is a grammatical/discourse decision rather than a doctrinal one,
    but it affects how Peter's denial is framed. The chosen rendering preserves the
    Greek expectation of a negative reply without overstating tone.
  doctrine_reference: Translation philosophy §1, §6
- issue: Social status nuance of παιδίσκη
  chosen_reading: Use 'servant girl' in the main text
  alternative_readings:
  - '''slave girl'''
  rationale: The term can denote a female servant/slave. In this narrative context,
    the role and age/gender are foregrounded more than legal status. Following optimal
    equivalence and the doctrine's note on bonded-language, 'servant girl' is preferred
    here while preserving 'slave girl' as a lexical alternative.
  doctrine_reference: 'Translation philosophy §1, §5; Contested terms: δοῦλος'
