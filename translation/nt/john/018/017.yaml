id: JHN.18.17
reference: John 18:17
source:
  edition: SBLGNT
  text: λέγει οὖν ⸂τῷ Πέτρῳ ἡ παιδίσκη ἡ θυρωρός⸃· Μὴ καὶ σὺ ἐκ τῶν μαθητῶν εἶ τοῦ
    ἀνθρώπου τούτου; λέγει ἐκεῖνος· Οὐκ εἰμί.
translation:
  text: So the servant girl who kept the door said to Peter, “You are not also one
    of this man's disciples, are you?” He said, “I am not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slave girl who was the doorkeeper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative progression/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: παιδίσκη
  chosen: servant girl
  alternatives:
  - slave girl
  - girl
  lexicon: BDAG
  rationale: Refers to a young female servant. 'Servant girl' is idiomatic and fits
    the scene; 'slave girl' is possible lexically, but the bonded status is not the
    focus here, unlike passages where δοῦλος-language is theologically salient.
- source_word: θυρωρός
  chosen: who kept the door
  alternatives:
  - doorkeeper
  - gatekeeper
  lexicon: BDAG
  rationale: The noun identifies her role as the one attending the entrance. Rendering
    it as a relative clause gives clear, natural English while preserving the function.
- source_word: Μὴ καὶ σὺ
  chosen: You are not also
  alternatives:
  - Surely you are not also
  - Are you not also
  lexicon: BDAG
  rationale: μή with a question often expects a negative answer. The English wording
    'You are not also ... , are you?' captures that expectation naturally.
- source_word: ἐκ τῶν μαθητῶν
  chosen: one of ... disciples
  alternatives:
  - from among the disciples
  lexicon: BDAG
  rationale: Idiomatic English for membership in a group; preserves the partitive
    sense of ἐκ.
- source_word: τοῦ ἀνθρώπου τούτου
  chosen: this man's
  alternatives:
  - of this man
  - this fellow's
  lexicon: BDAG
  rationale: ἄνθρωπος here is the ordinary term 'man,' not a title. 'This man's disciples'
    is concise, natural, and preserves the somewhat distancing tone of τούτου.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - That one
  - That man
  lexicon: BDAG
  rationale: In context this refers back to Peter. English normally uses 'he' rather
    than the more wooden 'that one.'
- source_word: Οὐκ εἰμί
  chosen: I am not
  alternatives:
  - 'No'
  - I am not one
  lexicon: BDAG
  rationale: A direct, terse denial matching the Greek's brevity. 'I am not' preserves
    the elliptical force without adding words not present in the text.
