id: JHN.18.27
reference: John 18:27
source:
  edition: SBLGNT
  text: πάλιν οὖν ⸀ἠρνήσατο Πέτρος· καὶ εὐθέως ἀλέκτωρ ἐφώνησεν.
translation:
  text: Then Peter denied it again, and immediately a rooster crowed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Peter denied again'; the Greek does not state the object explicitly,
      but the context supplies it from the preceding question.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Adverb indicating repetition; 'again' is the most natural concise English
    rendering in context of Peter's repeated denials.
- source_word: οὖν
  chosen: Then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Inferential/sequential particle linking this denial to the preceding
    exchange. 'Then' conveys narrative progression smoothly in English without overstating
    logical force.
- source_word: ἠρνήσατο
  chosen: denied it
  alternatives:
  - denied
  - disowned
  lexicon: BDAG
  rationale: Aorist middle of ἀρνέομαι, here referring back to the accusation/question
    just posed. English idiom commonly supplies the object as 'it' to make the denial
    explicit; this reflects the contextual object rather than adding new content.
    'Disowned' is possible but too interpretive here.
- source_word: Πέτρος
  chosen: Peter
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  lexicon: BDAG
  rationale: Simple coordinating conjunction joining Peter's denial with the immediately
    following event.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Marks the temporal immediacy of the rooster's crow after the denial.
    'Immediately' preserves the narrative force and echoes common NT usage.
- source_word: ἀλέκτωρ
  chosen: rooster
  alternatives:
  - cock
  lexicon: BDAG
  rationale: Refers to the male chicken. 'Rooster' is clear modern English; 'cock'
    is traditional but less suitable in contemporary usage.
- source_word: ἐφώνησεν
  chosen: crowed
  alternatives:
  - called out
  - sounded
  lexicon: BDAG
  rationale: Although the verb is broadly 'made a sound/called,' with ἀλέκτωρ as subject
    the idiomatic English verb is 'crowed.' This is a contextually appropriate rendering
    rather than a paraphrase.
