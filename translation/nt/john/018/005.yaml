theological_decisions:
- issue: Rendering of Ἐγώ εἰμι in a Johannine context with possible theological resonance
  chosen_reading: I am he
  alternative_readings:
  - I am
  rationale: In context, the phrase answers the identification request and naturally
    means 'I am he.' To avoid importing a stronger theological claim into the main
    text than the immediate dialogue requires, the contextual English is used. At
    the same time, because John's Gospel can invest ἐγώ εἰμι language with deeper
    resonance, the literal alternative 'I am' is preserved in a footnote to maintain
    transparency and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
