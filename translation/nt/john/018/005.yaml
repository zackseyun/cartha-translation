id: JHN.18.5
reference: John 18:5
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν αὐτῷ· Ἰησοῦν τὸν Ναζωραῖον. λέγει ⸀αὐτοῖς· Ἐγώ εἰμι. εἱστήκει
    δὲ καὶ Ἰούδας ὁ παραδιδοὺς αὐτὸν μετ’ αὐτῶν.
translation:
  text: They answered him, “Jesus the Nazarene.” He said to them, “I am he.” Now Judas,
    who was betraying him, was also standing with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “I am.” The Greek can function as a simple self-identification
      here, while also potentially echoing the broader Johannine use of “I am.”
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: They answered
  alternatives:
  - They replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent of ἀποκρίνομαι commonly means 'answer/reply.'
    'Answered' is straightforward and idiomatic in narrative English.
- source_word: Ἰησοῦν τὸν Ναζωραῖον
  chosen: Jesus the Nazarene
  alternatives:
  - Jesus of Nazareth
  - Jesus the Nazorean
  lexicon: BDAG
  rationale: Ναζωραῖος is an epithet meaning 'Nazarene/Nazorean.' 'Jesus the Nazarene'
    closely reflects the Greek form with the article and functions naturally in English.
    'Of Nazareth' is possible but interprets the epithet more dynamically.
- source_word: λέγει αὐτοῖς
  chosen: He said to them
  alternatives:
  - He says to them
  lexicon: BDAG
  rationale: Although λέγει is present (historical present), English narrative commonly
    renders it as simple past for readability under optimal equivalence.
- source_word: Ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - It is I
  lexicon: BDAG
  rationale: The Greek expression is literally 'I am.' In this immediate dialogue,
    the implied predicate is supplied from the question of identity, making 'I am
    he' the clearest English rendering. Because the absolute form may also echo weightier
    Johannine usage, the more literal 'I am' is preserved in a footnote rather than
    made the main text.
- source_word: εἱστήκει
  chosen: was standing
  alternatives:
  - stood
  - had been standing
  lexicon: BDAG
  rationale: Pluperfect/intransitive stative form of ἵστημι conveys a standing state
    already in progress. 'Was standing' communicates the ongoing posture naturally
    in English.
- source_word: δὲ καὶ
  chosen: Now ... also
  alternatives:
  - And ... also
  - Moreover ... too
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition, while καί adds Judas to the scene.
    'Now' plus 'also' captures both discourse movement and addition without overtranslating.
- source_word: ὁ παραδιδοὺς αὐτὸν
  chosen: who was betraying him
  alternatives:
  - who was handing him over
  - his betrayer
  lexicon: BDAG
  rationale: παραδίδωμι can mean 'hand over' or 'betray.' In the Judas context, 'betraying'
    is the established and contextually salient sense. The participle is rendered
    as a relative clause for natural English.
- source_word: μετ’ αὐτῶν
  chosen: with them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: μετά with genitive means 'with.' 'With them' is the direct and natural
    rendering.
