theological_decisions:
- issue: Rendering of δοῦλος
  chosen_reading: slave
  alternative_readings:
  - servant
  rationale: Per DOCTRINE.md, δοῦλος is rendered 'servant / slave' context-dependently,
    with 'slave' preferred where bonded status is salient. In 'the high priest’s slave,'
    the ownership relation is explicit enough to justify 'slave' in the main text
    while preserving 'servant' as an alternative.
