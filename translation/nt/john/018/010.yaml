id: JHN.18.10
reference: John 18:10
source:
  edition: SBLGNT
  text: Σίμων οὖν Πέτρος ἔχων μάχαιραν εἵλκυσεν αὐτὴν καὶ ἔπαισεν τὸν τοῦ ἀρχιερέως
    δοῦλον καὶ ἀπέκοψεν αὐτοῦ τὸ ⸀ὠτάριον τὸ δεξιόν. ἦν δὲ ὄνομα τῷ δούλῳ Μάλχος.
translation:
  text: Then Simon Peter, having a sword, drew it and struck the high priest’s slave
    and cut off his right ear. Now the slave’s name was Malchus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the high priest’s servant.” The Greek word is doulos, which can mean
      either “slave” or “servant” depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  chosen: Then
  alternatives:
  - So
  - Therefore
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the preceding scene. 'Then'
    is natural modern English in narrative and preserves the connective force without
    sounding overly logical.
- source_word: ἔχων μάχαιραν
  chosen: having a sword
  alternatives:
  - with a sword
  - having a dagger
  lexicon: BDAG
  rationale: The participle ἔχων is retained as 'having' to reflect the Greek structure.
    μάχαιρα can denote a sword or short sword/dagger; 'sword' is the broad, standard
    rendering and fits readable modern English.
- source_word: εἵλκυσεν αὐτὴν
  chosen: drew it
  alternatives:
  - pulled it out
  lexicon: BDAG
  rationale: In context of a weapon, 'drew it' is the idiomatic English equivalent
    of 'pulled it' and accurately conveys unsheathing the sword.
- source_word: ἔπαισεν
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: BDAG
  rationale: '''Struck'' is clear, dignified, and natural. ''Smote'' is archaic; ''hit''
    is too flat for the narrative tone.'
- source_word: τὸν τοῦ ἀρχιερέως δοῦλον
  chosen: the high priest’s slave
  alternatives:
  - the high priest’s servant
  lexicon: BDAG
  rationale: δοῦλος is rendered 'slave' here in keeping with the project's contested-terms
    guidance and because the possessive relationship to the high priest indicates
    bonded status more than mere hired service. English can naturally front the genitive
    as 'the high priest’s slave.'
- source_word: ἀπέκοψεν
  chosen: cut off
  alternatives:
  - severed
  lexicon: BDAG
  rationale: The verb denotes removal by cutting. 'Cut off' is the most direct and
    idiomatic rendering.
- source_word: ὠτάριον
  chosen: ear
  alternatives:
  - little ear
  - earlobe
  lexicon: BDAG
  rationale: The diminutive form can mean 'ear' without requiring an English diminutive.
    'Earlobe' is too specific; 'little ear' is unnatural. 'Ear' best reflects normal
    usage.
- source_word: τὸ δεξιόν
  chosen: right
  lexicon: BDAG
  rationale: The adjective specifies which ear was cut off; 'right' is straightforward.
- source_word: ἦν δὲ ὄνομα τῷ δούλῳ Μάλχος
  chosen: Now the slave’s name was Malchus
  alternatives:
  - And the slave’s name was Malchus
  - Now the name of the slave was Malchus
  lexicon: BDAG
  rationale: 'This clause introduces identifying information. ''Now'' renders δέ smoothly
    in English narrative. The dative construction is idiomatically expressed as possession:
    ''the slave’s name was Malchus.'' ''Malchus'' is a standard transliteration of
    the personal name.'
