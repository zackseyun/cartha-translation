id: JHN.18.6
reference: John 18:6
source:
  edition: SBLGNT
  text: ὡς οὖν εἶπεν ⸀αὐτοῖς· Ἐγώ εἰμι, ἀπῆλθον εἰς τὰ ὀπίσω καὶ ἔπεσαν χαμαί.
translation:
  text: So when he said to them, “I am he,” they drew back and fell to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “I am.” The Greek expression may also echo the distinctive
      ‘I am’ sayings in John.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς οὖν
  chosen: So when
  alternatives:
  - Therefore when
  - When then
  lexicon: BDAG
  rationale: Combines the inferential οὖν with temporal ὡς in natural English. 'So
    when' preserves both the narrative connection and the temporal sense without sounding
    wooden.
- source_word: εἶπεν αὐτοῖς
  chosen: he said to them
  alternatives:
  - he told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object αὐτοῖς. 'Said to them'
    is more direct and formally aligned than 'told them.'
- source_word: Ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - It is I
  lexicon: BDAG
  rationale: In this arrest-scene context the expression functions as self-identification
    in answer to whom they seek, so 'I am he' communicates the idiomatic sense in
    clear English. The more literal 'I am' is theologically significant and worth
    preserving in a footnote because of possible resonance with absolute ἐγώ εἰμι
    usage in John.
- source_word: ἀπῆλθον εἰς τὰ ὀπίσω
  chosen: they drew back
  alternatives:
  - they went backward
  - they went back
  lexicon: BDAG
  rationale: ἀπέρχομαι with εἰς τὰ ὀπίσω denotes movement backward. 'Drew back' is
    idiomatic modern English and captures the sudden recoil implied by the scene better
    than the stiffer 'went backward.'
- source_word: ἔπεσαν χαμαί
  chosen: fell to the ground
  alternatives:
  - fell down
  - fell on the ground
  lexicon: BDAG
  rationale: χαμαί means 'to the ground/on the ground.' 'Fell to the ground' is natural
    English and preserves the physical force of the action.
