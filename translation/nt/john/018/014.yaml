id: JHN.18.14
reference: John 18:14
source:
  edition: SBLGNT
  text: ἦν δὲ Καϊάφας ὁ συμβουλεύσας τοῖς Ἰουδαίοις ὅτι συμφέρει ἕνα ἄνθρωπον ⸀ἀποθανεῖν
    ὑπὲρ τοῦ λαοῦ.
translation:
  text: Now Caiaphas was the one who had advised the Jews that it was better for one
    man to die for the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Jewish leaders" or "the Judeans," depending on how John's use of
      "the Jews" is understood in context.
    reason: alternative_reading
  - marker: b
    text: Or "on behalf of the people"; the phrase may also carry representative or
      sacrificial overtones in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: BDAG
  rationale: δέ here functions as a mild connective/resumptive particle in narrative.
    'Now' gives natural English discourse flow without overstating contrast.
- source_word: Καϊάφας
  chosen: Caiaphas
  lexicon: BDAG
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: ὁ συμβουλεύσας
  chosen: the one who had advised
  alternatives:
  - who had counseled
  - who had given counsel
  lexicon: BDAG
  rationale: The articular aorist participle identifies Caiaphas by a prior action.
    'The one who had advised' captures the attributive force and the prior-time reference
    relative to the main verb.
- source_word: τοῖς Ἰουδαίοις
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek says 'the Jews' without an explicit narrowing term. In John
    this expression can be contextually nuanced, but here the direct object of Caiaphas's
    counsel in 11:50 is represented by the text's own wording. Alternatives are possible
    interpretive clarifications, but the main text preserves the Greek expression.
- source_word: ὅτι συμφέρει
  chosen: that it was better
  alternatives:
  - that it was advantageous
  - that it was expedient
  lexicon: BDAG
  rationale: συμφέρει denotes benefit/advantage. 'It was better' is idiomatic modern
    English and fits the deliberative political context without archaic stiffness.
- source_word: ἕνα ἄνθρωπον
  chosen: one man
  alternatives:
  - a single man
  - one person
  lexicon: BDAG
  rationale: The masculine singular is explicit. 'One man' preserves both the numeral
    and the gendered reference to Jesus, in line with gender-accurate translation.
- source_word: ἀποθανεῖν
  chosen: to die
  lexicon: BDAG
  rationale: Straightforward infinitive complement after συμφέρει; no expansion beyond
    the source is needed.
- source_word: ὑπὲρ τοῦ λαοῦ
  chosen: for the people
  alternatives:
  - on behalf of the people
  - for the sake of the people
  lexicon: BDAG
  rationale: ὑπέρ here indicates representation/benefit. 'For the people' is concise
    and natural, while still allowing the sacrificial/substitutionary resonance present
    in John's narrative context.
- source_word: λαοῦ
  chosen: the people
  alternatives:
  - the nation
  lexicon: BDAG
  rationale: λαός commonly means 'people.' Although John 11:50 includes 'the nation'
    (ἔθνος) in the larger saying, this verse specifically has λαός, so 'the people'
    is the more exact rendering here.
