theological_decisions:
- issue: Potential atonement/substitution nuance in ὑπὲρ τοῦ λαοῦ
  chosen_reading: for the people
  alternative_readings:
  - on behalf of the people
  - in place of the people
  rationale: The preposition ὑπέρ can carry benefactive or representative force and,
    in context, may echo sacrificial/substitutionary themes. The verse itself reports
    Caiaphas's political counsel, so the translation preserves the wording without
    importing a more explicit doctrinal formulation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of τοῖς Ἰουδαίοις in Johannine usage
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The source text uses Ἰουδαίοις without qualification. Because the term's
    referent in John can be debated, the main text keeps the formal rendering while
    a footnote preserves interpretive alternatives.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where genuine.
