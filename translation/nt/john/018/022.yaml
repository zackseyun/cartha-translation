id: JHN.18.22
reference: John 18:22
source:
  edition: SBLGNT
  text: ταῦτα δὲ αὐτοῦ εἰπόντος εἷς ⸂παρεστηκὼς τῶν ὑπηρετῶν⸃ ἔδωκεν ῥάπισμα τῷ Ἰησοῦ
    εἰπών· Οὕτως ἀποκρίνῃ τῷ ἀρχιερεῖ;
translation:
  text: And when he had said these things, one of the officers standing by struck
    Jesus with his hand, saying, “Is this how you answer the high priest?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “gave Jesus a slap”; the Greek expression denotes a blow with the hand
      and may refer to a slap or similar strike.
    reason: lexical_alternative
  - marker: b
    text: “Officers” translates a term that can also mean attendants or servants;
      in this context it likely refers to official temple personnel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative accusative; 'these things' preserves the Greek number
    and refers back to Jesus' preceding words more naturally than the singular 'this.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: A mild connective; 'And' gives natural narrative continuity in English
    without overstating contrast.
- source_word: αὐτοῦ εἰπόντος
  chosen: when he had said
  alternatives:
  - after he said
  - as he said
  lexicon: BDAG
  rationale: Genitive absolute with aorist participle is well represented by a temporal
    clause. 'When he had said' captures antecedent action in smooth English.
- source_word: εἷς παρεστηκὼς τῶν ὑπηρετῶν
  chosen: one of the officers standing by
  alternatives:
  - one of the servants standing there
  - one of the temple police standing by
  - one of the attendants standing by
  lexicon: BDAG
  rationale: ὑπηρέτης in Johannine passion context refers to official attendants/officers,
    likely temple police rather than domestic servants. The perfect participle παρεστηκώς
    conveys being present/standing by. 'Officers' is concise and contextually appropriate.
- source_word: ἔδωκεν ῥάπισμα
  chosen: struck ... with his hand
  alternatives:
  - gave ... a slap
  - slapped
  lexicon: BDAG
  rationale: The idiom literally means 'gave a blow/slap.' 'Struck ... with his hand'
    preserves the concrete action without sounding colloquial; it also leaves open
    whether the blow was a slap or backhanded strike.
- source_word: τῷ Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Indirect object in Greek becomes the direct object of the English verb
    'struck' in idiomatic translation.
- source_word: εἰπών
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Attendant participle introducing direct speech; 'saying' is a straightforward
    equivalent.
- source_word: Οὕτως
  chosen: Is this how
  alternatives:
  - So
  - In this way
  lexicon: BDAG
  rationale: In the rebuke, οὕτως points to manner. 'Is this how' is idiomatic English
    that preserves the interrogative force and tone.
- source_word: ἀποκρίνῃ
  chosen: you answer
  alternatives:
  - you reply to
  - you speak to
  lexicon: BDAG
  rationale: Middle/passive-form deponent verb meaning 'answer, reply.' 'Answer' is
    the most direct and natural rendering here.
- source_word: τῷ ἀρχιερεῖ
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering of ἀρχιερεύς in this context; 'high priest' is both
    accurate and conventional.
