theological_decisions:
- issue: Identification of ὑπηρετῶν
  chosen_reading: official officers/attendants, likely temple police
  alternative_readings:
  - servants
  - attendants
  rationale: The term can denote various subordinates, but in the Johannine trial
    setting it most naturally refers to official personnel attached to the high priestly
    establishment. This is a contextual lexical decision, not a doctrinally loaded
    one.
