id: JHN.18.18
reference: John 18:18
source:
  edition: SBLGNT
  text: εἱστήκεισαν δὲ οἱ δοῦλοι καὶ οἱ ὑπηρέται ἀνθρακιὰν πεποιηκότες, ὅτι ψῦχος
    ἦν, καὶ ἐθερμαίνοντο· ἦν δὲ ⸂καὶ ὁ Πέτρος μετ’ αὐτῶν⸃ ἑστὼς καὶ θερμαινόμενος.
translation:
  text: Now the slaves and the officers were standing there, having made a charcoal
    fire because it was cold, and they were warming themselves. Peter also was standing
    with them and warming himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' for δοῦλοι; here 'slaves' is used to preserve the likely bonded
      status of the household personnel.
    reason: lexical_alternative
  - marker: b
    text: Or 'guards' for ὑπηρέται; the term refers to official attendants, likely
      connected with the temple or high priestly establishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The term δοῦλος can mean servant or slave depending on context. Here
    it refers to household personnel attached to the high priestly setting; 'slaves'
    better preserves the bonded social status and follows the project's default to
    use 'slave' where the bonded nature is salient.
- source_word: ὑπηρέται
  chosen: officers
  alternatives:
  - servants
  - guards
  lexicon: BDAG
  rationale: In Johannine usage ὑπηρέται often refers to temple or official attendants
    with enforcement duties. 'Officers' captures their institutional role better than
    the broader 'servants,' while 'guards' is possible but slightly more specific
    than the Greek requires.
- source_word: ἀνθρακιὰν
  chosen: a charcoal fire
  alternatives:
  - a charcoal brazier
  - a coal fire
  lexicon: BDAG
  rationale: ἀνθρακιά denotes a charcoal fire. 'Charcoal fire' is natural modern English
    and preserves the concrete detail, which is narratively significant in John.
- source_word: πεποιηκότες
  chosen: having made
  alternatives:
  - after making
  - having built
  lexicon: BDAG
  rationale: The perfect active participle indicates a completed action with present
    result. 'Having made' reflects the participial relation without overtranslating
    aspect.
- source_word: ὅτι ψῦχος ἦν
  chosen: because it was cold
  alternatives:
  - for it was cold
  - since it was cold
  lexicon: BDAG
  rationale: ὅτι here gives the reason for the fire and warming. 'Because it was cold'
    is clear, idiomatic, and preserves the causal force.
- source_word: ἐθερμαίνοντο
  chosen: they were warming themselves
  alternatives:
  - they were keeping warm
  - they were warming themselves by the fire
  lexicon: BDAG
  rationale: The imperfect middle/passive form conveys ongoing action. 'They were
    warming themselves' preserves the reflexive sense and durative aspect.
- source_word: ἦν δὲ καὶ ὁ Πέτρος μετ’ αὐτῶν
  chosen: Peter also was standing with them
  alternatives:
  - and Peter too was with them
  - now Peter also was there with them
  lexicon: BDAG
  rationale: The clause places Peter among the group. Rendering καί as 'also' preserves
    the additive emphasis, and 'with them' keeps the relational detail explicit.
- source_word: ἑστὼς
  chosen: was standing
  alternatives:
  - standing
  - had been standing
  lexicon: BDAG
  rationale: The participle from ἵστημι in this context describes Peter's posture/state.
    Combined with ἦν, English past progressive ('was standing') best conveys the periphrastic
    construction.
- source_word: θερμαινόμενος
  chosen: warming himself
  alternatives:
  - keeping warm
  - warming himself by the fire
  lexicon: BDAG
  rationale: The present participle parallels the earlier imperfect and describes
    Peter's ongoing action. 'Warming himself' is the most direct rendering.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ is mildly connective here. 'Now' gives smooth English scene-setting
    without implying strong contrast.
