theological_decisions:
- issue: Rendering of Ἰουδαῖος in John
  chosen_reading: Jew
  alternative_readings:
  - Judean
  rationale: John's use of Ἰουδαῖος can be context-sensitive, sometimes denoting Judean
    authorities and sometimes the Jewish people more broadly. In this verse Pilate's
    rhetorical question and the following reference to 'your own nation' favor the
    broader ethnic/national sense rather than a narrowly regional one. This avoids
    anachronistic overcorrection while remaining source-sensitive.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity only where the source is genuinely ambiguous'
