id: JHN.18.35
reference: John 18:35
source:
  edition: SBLGNT
  text: ἀπεκρίθη ὁ Πιλᾶτος· Μήτι ἐγὼ Ἰουδαῖός εἰμι; τὸ ἔθνος τὸ σὸν καὶ οἱ ἀρχιερεῖς
    παρέδωκάν σε ἐμοί· τί ἐποίησας;
translation:
  text: Pilate answered, “I am not a Jew, am I? Your own nation and the chief priests
    handed you over to me. What have you done?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Judean.” The Greek term can denote either an ethnic/religious identity
      (“Jew”) or a regional identity (“Judean”), depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for response; 'answered' is the most natural
    and common English equivalent in Johannine dialogue.
- source_word: Μήτι
  chosen: I am not ... am I?
  alternatives:
  - Surely I am not ...?
  - Am I perhaps ...?
  lexicon: BDAG
  rationale: 'μήτι introduces a question expecting a negative answer. English conveys
    this best with a negative question plus tag: ''I am not ... am I?'' rather than
    a flat ''Am I a Jew?'' which would lose the rhetorical force.'
- source_word: Ἰουδαῖός
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In this context Pilate contrasts himself ethnically/nationally with Jesus
    and Jesus' accusers. 'Jew' is the standard and most intelligible rendering here.
    'Judean' is possible in some Johannine contexts, but here the broader ethnic-political
    sense fits better, especially alongside 'your own nation.'
- source_word: τὸ ἔθνος τὸ σὸν
  chosen: your own nation
  alternatives:
  - your nation
  - your people
  lexicon: BDAG
  rationale: ἔθνος can mean nation, people, or Gentiles depending on context. Here
    it refers to the Jewish nation/people as a collective. 'Your own nation' brings
    out the possessive emphasis of τὸ σὸν and Pilate's distancing tone.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: The conventional and accurate rendering for the Jerusalem priestly leadership
    in the plural is 'chief priests.' 'High priests' is less idiomatic in English
    for this group.
- source_word: παρέδωκάν
  chosen: handed ... over
  alternatives:
  - delivered
  - turned ... over
  - betrayed
  lexicon: BDAG
  rationale: παραδίδωμι in passion contexts often carries the sense of handing someone
    over to authorities. 'Handed you over to me' is clear, idiomatic, and preserves
    the judicial nuance without importing the more morally loaded 'betrayed' here.
- source_word: τί ἐποίησας
  chosen: What have you done?
  alternatives:
  - What did you do?
  lexicon: BDAG
  rationale: The aorist here can be rendered as a simple past, but in English direct
    questioning about a present judicial situation is naturally expressed as 'What
    have you done?' which preserves the relevance of the completed action to the present
    inquiry.
