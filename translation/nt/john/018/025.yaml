theological_decisions:
- issue: Nature of Peter's denial
  chosen_reading: Render the statement as a straightforward denial of being one of
    Jesus' disciples without expanding it into a broader doctrinal denial.
  alternative_readings:
  - Translate more expansively as 'I am not one of them'
  rationale: The Greek is concise and elliptical, echoing the question's wording.
    The translation preserves the narrative force without adding interpretive detail
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3
