id: JHN.18.25
reference: John 18:25
source:
  edition: SBLGNT
  text: Ἦν δὲ Σίμων Πέτρος ἑστὼς καὶ θερμαινόμενος. εἶπον οὖν αὐτῷ· Μὴ καὶ σὺ ἐκ τῶν
    μαθητῶν αὐτοῦ εἶ; ⸀ἠρνήσατο ἐκεῖνος καὶ εἶπεν· Οὐκ εἰμί.
translation:
  text: Now Simon Peter was standing and warming himself. So they said to him, “You
    are not also one of his disciples, are you?” He denied it and said, “I am not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Surely you are not also one of his disciples?” The Greek question with
      μή expects a negative answer.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦν δὲ
  chosen: Now ... was
  alternatives:
  - And ... was
  - But ... was
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Now'
    gives natural English discourse flow without overstating contrast.
- source_word: ἑστὼς
  chosen: standing
  alternatives:
  - standing there
  lexicon: BDAG
  rationale: Perfect participle of ἵστημι describes Peter's continuing posture. 'Standing'
    is the plain sense; 'there' is implied by context and not necessary in the main
    text.
- source_word: θερμαινόμενος
  chosen: warming himself
  alternatives:
  - keeping himself warm
  - warming himself by the fire
  lexicon: BDAG
  rationale: The middle/passive participle indicates Peter was warming himself. 'By
    the fire' is contextually inferable from the surrounding scene but not explicit
    in this verse, so it is not added.
- source_word: εἶπον οὖν αὐτῷ
  chosen: So they said to him
  alternatives:
  - Therefore they said to him
  - Then they said to him
  lexicon: BDAG
  rationale: οὖν marks narrative consequence/inference. 'So' is idiomatic modern English
    and preserves the connection.
- source_word: Μὴ καὶ σὺ ... εἶ;
  chosen: You are not also ... are you?
  alternatives:
  - Surely you are not also ... ?
  - You are not one of ... too, are you?
  lexicon: BDAG
  rationale: μή in a question normally expects a negative answer. The English tag
    question 'are you?' preserves that expectation naturally. καὶ σὺ is represented
    by 'also'.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  chosen: one of his disciples
  alternatives:
  - from among his disciples
  lexicon: BDAG
  rationale: ἐκ with the genitive expresses membership within a group. 'One of his
    disciples' is the natural English equivalent.
- source_word: ἠρνήσατο
  chosen: He denied it
  alternatives:
  - He denied
  - He denied him
  lexicon: BDAG
  rationale: The verb means 'deny/refuse to acknowledge.' English commonly supplies
    an object here. 'It' captures the denial of the accusation/question without importing
    the fuller theological statement from nearby verses.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - That one
  - That man
  lexicon: BDAG
  rationale: ἐκεῖνος adds slight emphasis, but in English a simple pronoun is most
    natural here. The emphasis is not strong enough to require a marked rendering.
- source_word: Οὐκ εἰμί
  chosen: I am not
  alternatives:
  - No, I am not
  lexicon: BDAG
  rationale: This is the direct, terse denial. Adding 'No' would be interpretive since
    the Greek simply has 'I am not.'
