theological_decisions:
- issue: Nature of fulfillment language
  chosen_reading: Render πληρωθῇ as fulfillment of Jesus' prior spoken word without
    importing a formal prophecy formula beyond the text.
  alternative_readings:
  - Render more loosely as 'came true'
  rationale: John uses fulfillment language not only for Scripture but also for Jesus'
    own words. 'Might be fulfilled' preserves the theological weight of divine purpose
    and narrative realization without overstating the category.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of ἀπώλεσα in relation to the disciples
  chosen_reading: Translate as 'I lost not one' in the sense of preserving those entrusted
    to Jesus.
  alternative_readings:
  - I destroyed none of them
  - I let none of them perish
  rationale: The context is Jesus' protection of his disciples during arrest, echoing
    John 17:12. 'Lost' preserves the Johannine wording and theological tension around
    preservation without importing a narrower doctrinal system.
  doctrine_reference: Affirmations; Translation philosophy §3
