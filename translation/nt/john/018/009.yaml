id: JHN.18.9
reference: John 18:9
source:
  edition: SBLGNT
  text: ἵνα πληρωθῇ ὁ λόγος ὃν εἶπεν ὅτι Οὓς δέδωκάς μοι οὐκ ἀπώλεσα ἐξ αὐτῶν οὐδένα.
translation:
  text: 'so that the word that he had spoken might be fulfilled: “Of those whom you
    have given me, I lost not one.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “none of them” or “not one of them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's telic force without sounding wooden.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - might be completed
  - might come to pass
  lexicon: BDAG
  rationale: Passive subjunctive after ἵνα. 'Fulfilled' is the standard and contextually
    fitting rendering for the realization of a spoken word in Johannine usage.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the saying
  - the statement
  lexicon: BDAG
  rationale: Here λόγος refers to a specific utterance Jesus previously spoke, not
    the broader theological sense of 'Word' as a title. 'The word' is idiomatic and
    preserves Johannine diction.
- source_word: ὃν εἶπεν
  chosen: that he had spoken
  alternatives:
  - which he said
  - that he said
  lexicon: BDAG
  rationale: English past perfect smooths the relation to the main event and reflects
    that the saying preceded the arrest scene. 'Spoken' is slightly more natural with
    'word' than repeating 'said'.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the spoken word. A colon in English cleanly
    signals direct quotation while preserving the content relationship.
- source_word: Οὓς δέδωκάς μοι
  chosen: Of those whom you have given me
  alternatives:
  - Those whom you have given me
  - The ones you have given me
  lexicon: BDAG
  rationale: Fronting with 'Of those' prepares for the partitive phrase ἐξ αὐτῶν later
    and yields idiomatic English. The perfect δέδωκάς is retained as 'have given,'
    emphasizing the abiding result of the Father's giving.
- source_word: ἀπώλεσα
  chosen: I lost
  alternatives:
  - I destroyed
  - I let perish
  lexicon: BDAG
  rationale: In this context of preserving the disciples, the sense is not active
    destruction but loss/perishing under one's care. 'I lost' best matches the immediate
    context and Jesus' prior statement in John 17:12.
- source_word: ἐξ αὐτῶν οὐδένα
  chosen: not one
  alternatives:
  - none of them
  - not one of them
  lexicon: BDAG
  rationale: 'The Greek is emphatic: ''not even one from among them.'' ''Not one''
    is concise and forceful English; the partitive sense is already represented by
    ''Of those whom you have given me.'''
