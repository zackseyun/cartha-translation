id: JHN.18.26
reference: John 18:26
source:
  edition: SBLGNT
  text: λέγει εἷς ἐκ τῶν δούλων τοῦ ἀρχιερέως, συγγενὴς ὢν οὗ ἀπέκοψεν Πέτρος τὸ ὠτίον·
    Οὐκ ἐγώ σε εἶδον ἐν τῷ κήπῳ μετ’ αὐτοῦ;
translation:
  text: One of the high priest’s slaves, a relative of the man whose ear Peter had
    cut off, said, “Didn’t I see you in the garden with him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “servants.” The Greek word is douloi, which can mean either “servants”
      or “slaves” depending on context; here “slaves” was chosen to preserve the bonded
      status implied by the term.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλων
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave depending on context. Here it refers
    to household personnel belonging to the high priest. In keeping with the project’s
    guidance, 'slave' is preferred where the bonded status is in view; 'one of the
    high priest’s slaves' reflects the genitive construction and social reality better
    than the softer 'servants'.
- source_word: ἀρχιερέως
  chosen: high priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in Johannine passion context; it denotes
    the chief priestly office, not merely a leading priest.
- source_word: συγγενὴς ὢν
  chosen: a relative
  alternatives:
  - being a relative
  - a kinsman
  lexicon: BDAG
  rationale: The participial phrase identifies the speaker as related to the injured
    man. 'A relative' is natural modern English and preserves the familial connection
    without archaic tone.
- source_word: οὗ
  chosen: of the man whose
  alternatives:
  - whose
  lexicon: BDAG
  rationale: 'The genitive relative pronoun refers to the person to whom the ear belonged.
    English idiom requires making the referent explicit: ''the man whose ear...''.'
- source_word: ἀπέκοψεν
  chosen: had cut off
  alternatives:
  - cut off
  lexicon: BDAG
  rationale: The aorist refers to the prior event in relation to the present speech.
    English past perfect smoothly marks that prior action in narrative context.
- source_word: ὠτίον
  chosen: ear
  lexicon: BDAG
  rationale: Direct and standard rendering of the diminutive noun for ear; English
    does not normally preserve the diminutive nuance here.
- source_word: Οὐκ ἐγώ σε εἶδον
  chosen: Didn’t I see you
  alternatives:
  - Did I not see you
  - Wasn’t it I who saw you
  lexicon: BDAG
  rationale: οὐκ with the emphatic ἐγώ introduces a question expecting a positive
    answer. 'Didn’t I see you' captures the rhetorical force in natural English; the
    emphasis on 'I' is sufficiently conveyed by context without awkward overtranslation.
- source_word: ἐν τῷ κήπῳ
  chosen: in the garden
  alternatives:
  - in the orchard
  lexicon: BDAG
  rationale: κήπος commonly means garden. In this passion setting it refers to the
    garden area where Jesus was arrested.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  lexicon: BDAG
  rationale: Straightforward rendering; αὐτοῦ refers to Jesus in context.
