theological_decisions:
- issue: Rendering δοῦλος in a non-metaphorical household context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: Following the translation philosophy, δοῦλος should not be softened by
    tradition where bonded status is part of the plain sense. In this narrative setting
    the term denotes actual household slaves of the high priest, not generic attendants.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος
