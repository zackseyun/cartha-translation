- issue: Reference of αὐτόν in the identifying clause
  chosen_reading: '''him'' refers to Jesus'
  rationale: In Johannine narrative context, this clearly recalls Nicodemus's earlier
    visit to Jesus in John 3:1–2. No theological tension is introduced; the translation
    preserves the narrative identification.
