id: JHN.19.39
reference: John 19:39
source:
  edition: SBLGNT
  text: ἦλθεν δὲ καὶ Νικόδημος, ὁ ἐλθὼν πρὸς ⸀αὐτὸν νυκτὸς τὸ πρῶτον, φέρων ⸀μίγμα
    σμύρνης καὶ ἀλόης ὡς λίτρας ἑκατόν.
translation:
  text: Nicodemus also came—the one who had first come to him at night—bringing a
    mixture of myrrh and aloes, about a hundred litras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A litra was a Roman pound, roughly 327 grams; 'about a hundred litras' is
      approximately 32–33 kilograms (around 72 pounds).
    reason: cultural_note
  - marker: b
    text: Or 'who had earlier come to him by night,' recalling John 3:1–2.
    reason: cross_reference
lexical_decisions:
- source_word: ἦλθεν δὲ καὶ
  chosen: also came
  alternatives:
  - and came also
  - now also came
  lexicon: BDAG
  rationale: δέ is lightly connective and καί adds Nicodemus to the burial participants
    already mentioned. 'Also came' is natural English and preserves the additive force
    without overtranslating δέ.
- source_word: Νικόδημος
  chosen: Nicodemus
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ὁ ἐλθὼν πρὸς αὐτὸν νυκτὸς τὸ πρῶτον
  chosen: the one who had first come to him at night
  alternatives:
  - who had earlier come to him by night
  - who had come to him the first time at night
  lexicon: BDAG
  rationale: The article plus participle functions appositionally to identify Nicodemus.
    νυκτός is idiomatic for 'at night'/'by night.' τὸ πρῶτον here most naturally means
    'formerly/earlier/at first,' pointing back to John 3. 'Had first come to him at
    night' preserves both the temporal reference and the narrative callback.
- source_word: φέρων
  chosen: bringing
  alternatives:
  - carrying
  lexicon: BDAG
  rationale: Present participle gives attendant circumstance describing Nicodemus
    as he came. 'Bringing' is idiomatic in English and fits the burial context.
- source_word: μίγμα σμύρνης καὶ ἀλόης
  chosen: a mixture of myrrh and aloes
  alternatives:
  - a mixture of myrrh and aloe
  - a blend of myrrh and aloes
  lexicon: BDAG
  rationale: μίγμα is straightforwardly 'mixture' or 'blend.' σμύρνη is 'myrrh.' ἀλόη
    in this context refers to aromatic aloe/aloes used in burial preparation, not
    the modern houseplant sense; plural 'aloes' is conventional and clear in this
    collocation.
- source_word: ὡς
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: With a quantity, ὡς marks approximation. 'About' is the most natural
    modern English rendering.
- source_word: λίτρας ἑκατόν
  chosen: a hundred litras
  alternatives:
  - about a hundred pounds
  - a hundred Roman pounds
  lexicon: BDAG
  rationale: λίτρα is a Roman pound measure. Rendering it as 'litras' preserves the
    ancient unit transparently and avoids implying an exact modern equivalent; the
    approximate sense can be clarified in a footnote. This balances formal transparency
    with readability.
