id: JHN.19.1
reference: John 19:1
source:
  edition: SBLGNT
  text: Τότε οὖν ἔλαβεν ὁ Πιλᾶτος τὸν Ἰησοῦν καὶ ἐμαστίγωσεν.
translation:
  text: Then Pilate took Jesus and flogged him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly with delegated agency, 'Then Pilate took Jesus and had
      him flogged.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal adverb marking the next event in the narrative sequence. 'Then'
    is the most natural concise English equivalent.
- source_word: οὖν
  chosen: — (implicit in English flow)
  alternatives:
  - therefore
  - so
  - then
  lexicon: BDAG
  rationale: οὖν marks logical/narrative progression, but in English the combination
    'Then ...' adequately carries the discourse movement. Rendering both Τότε and
    οὖν explicitly as 'Then therefore' or 'Then so' would be unnatural. Its force
    is absorbed into the sentence flow.
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - took hold of
  - had ... taken
  - seized
  lexicon: BDAG
  rationale: Aorist active indicative of λαμβάνω. 'Took' is the plain lexical sense
    and fits the narrative. 'Had ... taken' would overinterpret agency; 'seized' is
    too forceful for the verb alone in this context.
- source_word: ὁ Πιλᾶτος
  chosen: Pilate
  alternatives:
  - Pontius Pilate
  lexicon: BDAG
  rationale: Standard transliteration of the personal name. The article is not represented
    in English. 'Pilate' is sufficient because the referent is already established
    in context.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name in the accusative as the
    direct object.
- source_word: ἐμαστίγωσεν
  chosen: flogged him
  alternatives:
  - scourged him
  - whipped him
  lexicon: BDAG
  rationale: μαστιγόω refers to beating with a whip/scourge. 'Flogged' is clear modern
    English and preserves the severity better than the more generic 'whipped,' while
    avoiding the archaic tone of 'scourged.' The object pronoun 'him' is supplied
    naturally in English from the explicit object 'Jesus' earlier in the clause.
