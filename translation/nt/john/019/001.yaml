theological_decisions:
- issue: Agency implied by ἔλαβεν ... ἐμαστίγωσεν in relation to Roman procedure
  chosen_reading: Translate with Pilate as the grammatical subject of both verbs without
    specifying whether he personally performed or officially ordered the flogging.
  alternative_readings:
  - Pilate had Jesus taken and flogged
  - Pilate took Jesus and had him flogged
  rationale: The Greek presents Pilate as the subject of both aorist verbs. English
    can preserve that surface structure without forcing a decision about direct versus
    delegated action. This avoids importing historical reconstruction into the translation
    while remaining natural.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
