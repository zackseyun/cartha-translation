id: JHN.19.5
reference: John 19:5
source:
  edition: SBLGNT
  text: ἐξῆλθεν οὖν ὁ Ἰησοῦς ἔξω, φορῶν τὸν ἀκάνθινον στέφανον καὶ τὸ πορφυροῦν ἱμάτιον.
    καὶ λέγει αὐτοῖς· ⸀Ἰδοὺ ὁ ἄνθρωπος.
translation:
  text: So Jesus came out, wearing the crown of thorns and the purple robe. And he
    says to them, “Behold, the man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Look, the man.” The Greek Ἰδοὺ is an attention-getting expression that
      can be rendered “Behold,” “Look,” or “See.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: came out
  alternatives:
  - went out
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι denotes movement outward. 'Came out' fits the narrative
    viewpoint from Pilate presenting Jesus to the crowd; 'went out' is possible but
    less natural in English here.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence/continuation. 'So' gives a natural English
    connective without sounding overly formal.
- source_word: ἔξω
  chosen: out
  alternatives:
  - outside
  lexicon: BDAG
  rationale: Used adverbially with ἐξῆλθεν for emphasis. English idiom naturally expresses
    the sense as 'came out'; 'outside' would be more wooden.
- source_word: φορῶν
  chosen: wearing
  alternatives:
  - bearing
  - having on
  lexicon: BDAG
  rationale: Present participle of φορέω commonly means to wear or have on one's person.
    'Wearing' is the clearest idiomatic rendering for the crown and robe.
- source_word: ἀκάνθινον στέφανον
  chosen: the crown of thorns
  alternatives:
  - the thorny crown
  - the thorn crown
  lexicon: BDAG
  rationale: Standard and accurate rendering of the adjective-noun phrase; it denotes
    a crown made of thorns, not merely associated with them.
- source_word: πορφυροῦν ἱμάτιον
  chosen: the purple robe
  alternatives:
  - the purple garment
  - the purple cloak
  lexicon: BDAG
  rationale: ἱμάτιον is a general outer garment; in this mocking royal context, 'robe'
    best conveys the function and appearance without over-specifying beyond the text.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Present tense in narrative is a historical present. Rendering it as 'he
    says' preserves Johannine vividness; 'he said' is possible smoother English but
    loses the discourse effect.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: A deictic attention-getter. 'Behold' preserves the solemn, public force
    of Pilate's presentation and matches the gravity of the scene better than the
    more casual 'Look' or 'See'.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the human being
  - this man
  lexicon: BDAG
  rationale: ἄνθρωπος here is singular with the article, referring specifically to
    Jesus as a man presented before the crowd. 'The man' is the most direct rendering
    and preserves the famous phrasing without importing broader anthropological claims
    into the main text.
