theological_decisions:
- issue: Rendering of ὁ ἄνθρωπος in Pilate's declaration
  chosen_reading: the man
  alternative_readings:
  - the human being
  rationale: The phrase refers concretely to Jesus and should remain gender-accurate
    per translation philosophy. While some readers hear broader representative-humanity
    overtones, the text itself presents a specific individual before the crowd; any
    wider resonance should not replace the plain sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral) and §3 (Preserve theological tension rather than resolve it)
