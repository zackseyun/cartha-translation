theological_decisions:
- issue: Judicial wording for Pilate's declaration of Jesus' innocence
  chosen_reading: I find no case against him
  alternative_readings:
  - I find no fault in him
  - I find no charge against him
  rationale: The verse presents Pilate's legal assessment, not a broader theological
    statement in itself. Rendering αἰτία with judicial force preserves the narrative's
    courtroom context while still conveying Jesus' innocence. No doctrinally loaded
    term from the contested-terms table is involved, so the decision is primarily
    lexical with theological implications left implicit in the narrative.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
