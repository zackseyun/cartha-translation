id: JHN.19.4
reference: John 19:4
source:
  edition: SBLGNT
  text: ⸂καὶ ἐξῆλθεν⸃ πάλιν ἔξω ὁ Πιλᾶτος καὶ λέγει αὐτοῖς· Ἴδε ἄγω ὑμῖν αὐτὸν ἔξω,
    ἵνα γνῶτε ὅτι ⸂οὐδεμίαν αἰτίαν εὑρίσκω ἐν αὐτῷ⸃.
translation:
  text: Then Pilate went outside again and said to them, “Look, I am bringing him
    out to you so that you may know that I find no case against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “I find no fault in him.” The Greek expression can be rendered more
      traditionally this way, but here it likely carries a specifically judicial sense:
      Pilate finds no valid charge or case against Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ... ἔξω
  chosen: went outside
  alternatives:
  - went out
  - came out
  lexicon: BDAG
  rationale: The verb ἐξέρχομαι with the adverb ἔξω is naturally rendered as movement
    to the outside. 'Went outside' is idiomatic English and preserves the spatial
    sense without awkward redundancy.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν marks repetition; 'again' is the most natural concise rendering
    in context.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    normally shifts this to a simple past. This is a standard optimal-equivalence
    adjustment for readability.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: Ἴδε is a demonstrative attention-getter. 'Look' is clear modern English;
    'behold' is too archaic, while 'see' is slightly less natural in direct speech
    here.
- source_word: ἄγω ... αὐτὸν ἔξω
  chosen: I am bringing him out
  alternatives:
  - I bring him out
  - I am leading him out
  lexicon: BDAG
  rationale: ἄγω commonly means 'lead' or 'bring.' Here Pilate presents Jesus to the
    crowd, so 'bringing him out' fits the scene and sounds natural. The progressive
    English form reflects the immediate action.
- source_word: ἵνα γνῶτε
  chosen: so that you may know
  alternatives:
  - that you may know
  - so that you can know
  lexicon: BDAG
  rationale: ἵνα introduces purpose, and γνῶτε is an aorist subjunctive of γινώσκω.
    'So that you may know' preserves the purposive force clearly.
- source_word: οὐδεμίαν αἰτίαν
  chosen: no case against
  alternatives:
  - no charge against
  - no basis for accusation against
  - no fault in
  lexicon: BDAG
  rationale: αἰτία in judicial context refers to a legal charge, case, or grounds
    for accusation. 'No case against him' communicates the forensic sense more precisely
    in contemporary English than the traditional but broader 'no fault in him.'
- source_word: εὑρίσκω ἐν αὐτῷ
  chosen: I find ... against him
  alternatives:
  - I find in him
  - I find with him
  lexicon: BDAG
  rationale: The idiom εὑρίσκω ἐν αὐτῷ with αἰτίαν means to find grounds or a case
    in/against someone. English requires an idiomatic judicial expression; 'find no
    case against him' best conveys the sense.
