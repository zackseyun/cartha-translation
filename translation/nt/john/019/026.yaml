id: JHN.19.26
reference: John 19:26
source:
  edition: SBLGNT
  text: Ἰησοῦς οὖν ἰδὼν τὴν μητέρα καὶ τὸν μαθητὴν παρεστῶτα ὃν ἠγάπα λέγει τῇ ⸀μητρί·
    Γύναι, ⸀ἴδε ὁ υἱός σου·
translation:
  text: So when Jesus saw his mother and the disciple whom he loved standing there,
    he says to his mother, “Woman, behold, your son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Dear woman' or 'Madam.' The Greek address is respectful, not rude, though
      a literal English 'Woman' can sound harsher to modern readers.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the preceding scene. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: 'The aorist participle is rendered with a temporal sense in smooth English:
    ''when Jesus saw.'' This preserves the sequence without awkward literalism.'
- source_word: μητέρα
  chosen: mother
  alternatives:
  - his mother
  lexicon: BDAG
  rationale: The first occurrence is translated in context as 'his mother' in English
    because the referent is Jesus' mother, though the Greek has the article rather
    than an explicit possessive. English idiom normally supplies the possessive here.
- source_word: μαθητὴν
  chosen: the disciple
  alternatives:
  - disciple
  lexicon: BDAG
  rationale: 'The article is retained: this is a specific disciple already identifiable
    in Johannine narrative context.'
- source_word: παρεστῶτα
  chosen: standing there
  alternatives:
  - standing by
  - standing nearby
  - present
  lexicon: BDAG
  rationale: Conveys the perfective/resultative sense of being present beside them
    in the scene. 'Standing there' is idiomatic and visually clear.
- source_word: ὃν ἠγάπα
  chosen: whom he loved
  alternatives:
  - whom Jesus loved
  lexicon: BDAG
  rationale: The relative clause identifies the disciple by Jesus' love for him. 'He'
    is sufficient because Jesus is the clear subject of the sentence; this avoids
    unnecessary repetition while preserving meaning.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present. Rendering it as 'he says' preserves
    Johannine vividness; English can naturally carry the historical present in narrative.
- source_word: Γύναι
  chosen: Woman
  alternatives:
  - Dear woman
  - Madam
  lexicon: BDAG
  rationale: Vocative γύναι is respectful but not intimate. 'Woman' is the most direct
    rendering and preserves the wording used elsewhere in John. Because modern English
    readers may hear it as harsh, a footnote preserves the nuance.
- source_word: ἴδε
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: As a deictic imperative introducing a solemn declaration, 'behold' preserves
    the gravity and literary force better than the flatter 'look' or 'see.'
- source_word: ὁ υἱός σου
  chosen: your son
  alternatives:
  - here is your son
  - behold your son
  lexicon: BDAG
  rationale: The predicate expression identifies the beloved disciple in filial relation
    to Mary. In English direct address, 'behold, your son' naturally conveys the force
    of the Greek.
