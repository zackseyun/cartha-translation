theological_decisions:
- issue: Tone of Jesus' address to Mary in Γύναι
  chosen_reading: Retain the direct rendering 'Woman' in the main text, with a footnote
    explaining that it is respectful rather than rude.
  alternative_readings:
  - Dear woman
  - Madam
  rationale: The Greek does not itself encode disrespect; translating more interpretively
    as 'Dear woman' softens the wording beyond the lexical form. Preserving 'Woman'
    keeps the source-text wording while the footnote prevents a misleading modern
    misreading.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English without flattening theological weight.'
