theological_decisions:
- issue: Nature of Pilate's claimed ἐξουσία
  chosen_reading: Render ἐξουσία as 'authority' without endorsing the legitimacy or
    absoluteness of Pilate's claim.
  alternative_readings:
  - power
  - right
  rationale: The verse reports Pilate's assertion, not the narrator's theological
    validation of autonomous Roman sovereignty. 'Authority' reflects the lexical sense
    while leaving intact the tension that Jesus will address in the following verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
