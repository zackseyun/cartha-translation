id: JHN.19.10
reference: John 19:10
source:
  edition: SBLGNT
  text: λέγει οὖν αὐτῷ ὁ Πιλᾶτος· Ἐμοὶ οὐ λαλεῖς; οὐκ οἶδας ὅτι ἐξουσίαν ἔχω ⸂ἀπολῦσαί
    σε καὶ ἐξουσίαν ἔχω σταυρῶσαί⸃ σε;
translation:
  text: So Pilate said to him, “Will you not speak to me? Do you not know that I have
    authority to release you, and I have authority to crucify you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'power' instead of 'authority'; Greek exousia can denote authority, right,
      or power. 'Authority' is preferred here because Pilate is speaking in a legal-governing
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  chosen: So ... said
  alternatives:
  - Then ... said
  - Therefore ... said
  lexicon: BDAG
  rationale: οὖν here is a connective advancing the narrative. 'So' is natural modern
    English and preserves the inferential/sequential force without sounding wooden.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative indirect object; no reason to compress or omit it.
- source_word: Πιλᾶτος
  chosen: Pilate
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: Ἐμοὶ
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: The fronted dative is emphatic. English captures this adequately with
    'to me' in the question, preserving Pilate's offended emphasis better than a bare
    'me'.
- source_word: οὐ λαλεῖς
  chosen: Will you not speak
  alternatives:
  - Are you not speaking
  - You do not speak
  lexicon: BDAG
  rationale: Present indicative in a rhetorical question functions naturally in English
    as 'Will you not speak...?' This preserves the rebuking tone better than a flat
    declarative rendering.
- source_word: οὐκ οἶδας
  chosen: Do you not know
  alternatives:
  - Do you not realize
  lexicon: BDAG
  rationale: οἶδα commonly means 'know.' 'Realize' is possible dynamically, but 'know'
    is closer and sufficiently clear.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of what Pilate claims Jesus should know.
- source_word: ἐξουσίαν ἔχω
  chosen: I have authority
  alternatives:
  - I have power
  - I have the right
  lexicon: BDAG
  rationale: ἐξουσία denotes authority/right more than mere raw power. 'Authority'
    best fits the legal-governing context of Pilate's claim.
- source_word: ἀπολῦσαί σε
  chosen: to release you
  alternatives:
  - to set you free
  - to let you go
  lexicon: BDAG
  rationale: ἀπολύω in judicial context means release. 'Release you' is both accurate
    and idiomatic, and avoids overinterpreting as acquittal.
- source_word: καὶ ἐξουσίαν ἔχω σταυρῶσαί σε
  chosen: and I have authority to crucify you
  alternatives:
  - and authority to crucify you
  lexicon: BDAG
  rationale: The repeated ἐξουσίαν ἔχω is retained in English rather than elided,
    because the Greek repetition is rhetorically emphatic and contrasts the two possible
    outcomes.
- source_word: σταυρῶσαί σε
  chosen: to crucify you
  alternatives:
  - to have you crucified
  lexicon: BDAG
  rationale: The infinitive directly states the act. Although Pilate's authority is
    juridical and mediated through Roman procedure, 'to crucify you' is the plain
    lexical sense and should not be weakened unless context requires it.
