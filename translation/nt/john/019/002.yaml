id: JHN.19.2
reference: John 19:2
source:
  edition: SBLGNT
  text: καὶ οἱ στρατιῶται πλέξαντες στέφανον ἐξ ἀκανθῶν ἐπέθηκαν αὐτοῦ τῇ κεφαλῇ,
    καὶ ἱμάτιον πορφυροῦν περιέβαλον αὐτόν,
translation:
  text: And the soldiers, after weaving a crown out of thorns, put it on his head
    and clothed him in a purple robe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having woven a crown of thorns, they placed it on his head and put a
      purple garment on him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατιῶται
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: Standard rendering for Roman military personnel; 'soldiers' is the natural
    and precise English equivalent in this narrative context.
- source_word: πλέξαντες
  chosen: after weaving
  alternatives:
  - having woven
  - twisting together
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered as antecedent
    action in English. 'After weaving' is readable modern English while preserving
    the sequence.
- source_word: στέφανον
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: BDAG
  rationale: In this mock-royal context, 'crown' best conveys the object’s symbolic
    function. 'Wreath' would understate the royal parody.
- source_word: ἐξ ἀκανθῶν
  chosen: out of thorns
  alternatives:
  - from thorns
  - of thorns
  lexicon: BDAG
  rationale: '''Out of thorns'' clearly expresses material/source in idiomatic English
    and preserves the concrete image.'
- source_word: ἐπέθηκαν αὐτοῦ τῇ κεφαλῇ
  chosen: put it on his head
  alternatives:
  - placed it on his head
  lexicon: BDAG
  rationale: The Greek idiom literally uses a genitive pronoun with dative 'head';
    idiomatic English requires the object 'it' and the phrase 'on his head.' 'Put'
    is slightly more natural than 'placed' here.
- source_word: ἱμάτιον
  chosen: robe
  alternatives:
  - garment
  - cloak
  lexicon: BDAG
  rationale: In context of mock investiture, 'robe' best communicates an outer garment
    used to parody royal status. 'Garment' is too generic; 'cloak' is possible but
    less evocative in contemporary English.
- source_word: πορφυροῦν
  chosen: purple
  alternatives:
  - purple-colored
  - purple-red
  lexicon: BDAG
  rationale: Direct color adjective; 'purple' is the standard rendering and preserves
    the royal connotations without overexplaining.
- source_word: περιέβαλον αὐτόν
  chosen: clothed him in
  alternatives:
  - put on him
  - draped him in
  lexicon: BDAG
  rationale: περιβάλλω with a garment can mean to clothe or wrap. 'Clothed him in'
    is idiomatic and fits the mocking ceremonial action better than the more wooden
    'put on him'.
