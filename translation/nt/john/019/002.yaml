theological_decisions:
- issue: Mock-royal imagery in the soldiers' actions
  chosen_reading: Render the clothing and crown language straightforwardly without
    adding interpretive explanation.
  alternative_readings:
  - Use more interpretive wording such as 'mocked him with a royal crown and robe'
  rationale: The verse itself narrates the actions; the mockery is evident from context
    and lexical choices ('crown,' 'purple robe') without importing explanatory language
    not explicit in the Greek.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve the source''s plain sense.'
