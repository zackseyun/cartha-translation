theological_decisions:
- issue: Rendering of τοῖς Ἰουδαίοις
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: In John, Ἰουδαῖοι can denote either Judeans or Jewish authorities in
    some contexts, but here it refers to a burial custom shared by the Jewish people
    more broadly. 'The Jews' best matches the cultural-religious sense without importing
    polemical force.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source sense over tradition where needed.'
