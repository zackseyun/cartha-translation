id: JHN.19.40
reference: John 19:40
source:
  edition: SBLGNT
  text: ἔλαβον οὖν τὸ σῶμα τοῦ Ἰησοῦ καὶ ἔδησαν ⸀αὐτὸ ὀθονίοις μετὰ τῶν ἀρωμάτων,
    καθὼς ἔθος ἐστὶν τοῖς Ἰουδαίοις ἐνταφιάζειν.
translation:
  text: So they took Jesus’s body and bound it in linen cloths with the spices, just
    as is the burial custom among the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Judeans,' if taken geographically rather than ethnically/religiously;
      here the context favors a reference to Jewish burial practice in general.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλαβον
  chosen: they took
  alternatives:
  - they received
  lexicon: BDAG
  rationale: λαμβάνω here refers to physically taking possession of the body for burial
    preparation. 'Took' is the natural English equivalent in this narrative context.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative consequence from the previous verse. 'So' is idiomatic
    modern English and preserves the connective force without sounding overly formal.
- source_word: σῶμα
  chosen: body
  alternatives:
  - corpse
  lexicon: BDAG
  rationale: σῶμα straightforwardly means 'body.' 'Corpse' would be more explicit
    about death but is harsher than the Greek requires and less natural in this reverent
    narrative setting.
- source_word: ἔδησαν
  chosen: bound
  alternatives:
  - wrapped
  - tied
  lexicon: BDAG
  rationale: δέω means to bind or tie. 'Bound' preserves the verbal idea more precisely
    than 'wrapped,' while still fitting burial preparation. The following dative phrase
    explains the material used.
- source_word: ὀθονίοις
  chosen: in linen cloths
  alternatives:
  - with linen cloths
  - in burial cloths
  lexicon: BDAG
  rationale: ὀθόνια refers to linen cloths used in burial. 'In linen cloths' fits
    English idiom with 'bound' and preserves the material reference. 'Burial cloths'
    is interpretive; 'linen cloths' stays closer to the Greek.
- source_word: ἀρώματα
  chosen: the spices
  alternatives:
  - aromatics
  - fragrant spices
  lexicon: BDAG
  rationale: ἄρωμα denotes aromatic substances used in burial. 'Spices' is standard,
    clear English in this context and avoids unnecessary technicality.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: BDAG
  rationale: καθώς introduces comparison to customary practice. 'Just as' clearly
    conveys conformity to established custom.
- source_word: ἔθος ἐστὶν
  chosen: is the burial custom
  alternatives:
  - is the custom
  - is customary
  lexicon: BDAG
  rationale: ἔθος means custom or habitual practice. Adding 'burial' in English makes
    explicit what is implied by the infinitive ἐνταφιάζειν and yields natural phrasing
    without distorting the sense.
- source_word: τοῖς Ἰουδαίοις
  chosen: among the Jews
  alternatives:
  - for the Jews
  - of the Jews
  - among the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοις can mean Jews or Judeans depending on context. Here the reference
    is to ethnic/religious burial practice rather than specifically residents of Judea,
    so 'the Jews' is best. 'Among' idiomatically renders the dative with ἔθος in English.
- source_word: ἐνταφιάζειν
  chosen: burial
  alternatives:
  - to bury
  - to prepare for burial
  - to entomb
  lexicon: BDAG
  rationale: The infinitive means to prepare/bury in a funerary sense. In English,
    converting it to the noun phrase 'burial custom' produces a natural sentence while
    preserving the semantic content. The action described is burial preparation rather
    than the interment alone.
