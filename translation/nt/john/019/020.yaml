theological_decisions:
- issue: Rendering Ἑβραϊστί in Johannine usage
  chosen_reading: Hebrew in the main text
  alternative_readings:
  - Aramaic
  rationale: The Greek says 'Hebrew,' and the translation philosophy prioritizes original-language
    primacy. Because Johannine usage may reflect the local Semitic language commonly
    spoken, 'Aramaic' is preserved in a footnote rather than substituted into the
    main text.
  doctrine_reference: Translation philosophy §1, §3
