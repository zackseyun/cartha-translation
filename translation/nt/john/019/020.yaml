id: JHN.19.20
reference: John 19:20
source:
  edition: SBLGNT
  text: τοῦτον οὖν τὸν τίτλον πολλοὶ ἀνέγνωσαν τῶν Ἰουδαίων, ὅτι ἐγγὺς ἦν ὁ τόπος
    τῆς πόλεως ὅπου ἐσταυρώθη ὁ Ἰησοῦς· καὶ ἦν γεγραμμένον Ἑβραϊστί, ⸂Ῥωμαϊστί, Ἑλληνιστί⸃.
translation:
  text: Therefore many of the Jews read this inscription, because the place where
    Jesus was crucified was near the city; and it was written in Hebrew, in Latin,
    and in Greek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'in Aramaic'; John uses 'Hebrew' for the local Semitic language.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίτλον
  chosen: inscription
  alternatives:
  - title
  - notice
  - placard
  lexicon: BDAG
  rationale: In this crucifixion context, τίτλος refers to the written notice affixed
    above Jesus. 'Inscription' is natural modern English and more precise than the
    overly literal 'title.'
- source_word: πολλοὶ ... τῶν Ἰουδαίων
  chosen: many of the Jews
  alternatives:
  - many Jews
  - many of the Jewish people
  lexicon: BDAG
  rationale: This preserves the partitive sense of the genitive construction while
    avoiding an overgeneralized ethnic statement. In John, οἱ/τῶν Ἰουδαίων can be
    contextually complex; here the phrase simply identifies many Jewish readers present
    in or near Jerusalem.
- source_word: ἀνέγνωσαν
  chosen: read
  alternatives:
  - read aloud
  - came to know by reading
  lexicon: BDAG
  rationale: The aorist indicates the simple action of reading the posted text. No
    explicit marker requires 'read aloud,' so the straightforward 'read' is best.
- source_word: ἐγγὺς ἦν ὁ τόπος τῆς πόλεως
  chosen: the place ... was near the city
  alternatives:
  - the place ... was close to the city
  - the place ... was near the city gate
  lexicon: BDAG
  rationale: This follows the plain sense without adding details not in the Greek.
    'Near the city' is idiomatic and accurate.
- source_word: ὅπου ἐσταυρώθη ὁ Ἰησοῦς
  chosen: where Jesus was crucified
  alternatives:
  - where they crucified Jesus
  lexicon: BDAG
  rationale: The passive ἐσταυρώθη is naturally rendered 'was crucified.' English
    does not require an explicit agent here.
- source_word: γεγραμμένον
  chosen: it was written
  alternatives:
  - it had been written
  - it stood written
  lexicon: BDAG
  rationale: The periphrastic construction with the perfect participle conveys the
    state of the inscription as written. 'It was written' is standard, clear English
    that preserves the resultative sense sufficiently in context.
- source_word: Ἑβραϊστί
  chosen: in Hebrew
  alternatives:
  - in Aramaic
  - in the Hebrew language
  lexicon: BDAG
  rationale: John regularly uses 'Hebrew' language terminology in a conventional first-century
    sense that may refer to the local Semitic vernacular, likely Aramaic. The main
    text keeps the Greek's wording as 'Hebrew,' while the alternative is worth preserving
    in a footnote.
- source_word: Ῥωμαϊστί
  chosen: in Latin
  alternatives:
  - in Roman
  lexicon: BDAG
  rationale: Although the adverb literally means 'in Roman,' the idiomatic referent
    is the Latin language. 'In Latin' communicates the intended meaning clearly in
    English.
- source_word: Ἑλληνιστί
  chosen: in Greek
  alternatives:
  - in the Greek language
  lexicon: BDAG
  rationale: Standard and direct rendering of the language adverb.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks a logical/narrative connection to the previous verse. 'Therefore'
    preserves that connection with slightly more explicit force than 'so' or 'then.'
