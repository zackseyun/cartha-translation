id: JHN.19.8
reference: John 19:8
source:
  edition: SBLGNT
  text: Ὅτε οὖν ἤκουσεν ὁ Πιλᾶτος τοῦτον τὸν λόγον, μᾶλλον ἐφοβήθη,
translation:
  text: When Pilate heard this statement, he became even more afraid,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὅτε
  chosen: When
  alternatives:
  - Now when
  - After
  lexicon: BDAG
  rationale: Temporal conjunction introducing the circumstance for Pilate's reaction.
    'When' is the natural modern English equivalent.
- source_word: οὖν
  chosen: —
  alternatives:
  - therefore
  - so
  - then
  lexicon: BDAG
  rationale: The inferential/connective force is lightly carried by English word order
    and context. Explicitly rendering it would be possible ('therefore/so'), but omission
    yields more natural English without loss of sense.
- source_word: ἤκουσεν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist of ἀκούω here denotes receiving/reporting information. 'Heard'
    fits the narrative context and standard English idiom.
- source_word: ὁ Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Proper name with article in Greek; standard English omits the article
    before personal names.
- source_word: τοῦτον τὸν λόγον
  chosen: this statement
  alternatives:
  - this word
  - this saying
  - this report
  lexicon: BDAG
  rationale: λόγος in this context refers to the content just spoken ('he made himself
    the Son of God,' v. 7), not a single lexical 'word.' 'Statement' best conveys
    a specific reported claim in natural English.
- source_word: μᾶλλον
  chosen: even more
  alternatives:
  - more
  - all the more
  lexicon: BDAG
  rationale: Comparative adverb intensifying Pilate's fear relative to his prior state.
    'Even more' clearly expresses the escalation.
- source_word: ἐφοβήθη
  chosen: became afraid
  alternatives:
  - was afraid
  - grew fearful
  lexicon: BDAG
  rationale: Aorist passive/deponent of φοβέομαι here is ingressive in sense, marking
    entry into or increase of fear. 'Became afraid' captures the eventive nuance;
    with μᾶλλον, 'became even more afraid' expresses the heightened reaction idiomatically.
