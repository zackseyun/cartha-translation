theological_decisions:
- issue: Nature of Pilate's fear
  chosen_reading: Render the verb in a straightforward psychological sense without
    specifying whether the fear is political, superstitious, or theological.
  alternative_readings:
  - He was more alarmed politically
  - He was more afraid because of possible divine implications
  rationale: The Greek states only that Pilate's fear increased after hearing the
    claim. The translation should preserve that narrative tension and not resolve
    the motive beyond what the text says.
  doctrine_reference: Preserve theological tension rather than resolve it.
