id: JHN.19.7
reference: John 19:7
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν αὐτῷ οἱ Ἰουδαῖοι· Ἡμεῖς νόμον ἔχομεν, καὶ κατὰ τὸν ⸀νόμον ὀφείλει
    ἀποθανεῖν, ὅτι ⸂υἱὸν θεοῦ ἑαυτὸν⸃ ἐποίησεν.
translation:
  text: The Jews answered him, “We have a law, and according to that law he ought
    to die, because he made himself the Son of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “according to the law.” The Greek repeats “law,” with the second occurrence
      referring back to the first.
    reason: lexical_alternative
  - marker: b
    text: Or, “because he made himself God’s Son.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the conventional and
    natural rendering in context.
- source_word: οἱ Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: John regularly uses οἱ Ἰουδαῖοι as a group designation. 'The Jews' is
    the most direct rendering of the Greek here. Alternatives can be contextually
    defensible in John, but this verse itself does not narrowly specify leaders only,
    so the formal group term is retained.
- source_word: νόμον ἔχομεν
  chosen: We have a law
  alternatives:
  - We have the law
  lexicon: BDAG
  rationale: The first νόμον lacks the article, so 'a law' best reflects the Greek
    form and idiom, indicating an appeal to legal basis rather than necessarily naming
    Torah as a title.
- source_word: κατὰ τὸν νόμον
  chosen: according to that law
  alternatives:
  - according to the law
  - by that law
  lexicon: BDAG
  rationale: The second νόμον is articular and refers back to the law just mentioned.
    'That law' preserves the anaphoric force in natural English better than repeating
    simply 'the law.'
- source_word: ὀφείλει ἀποθανεῖν
  chosen: he ought to die
  alternatives:
  - he must die
  - he is obligated to die
  lexicon: BDAG
  rationale: ὀφείλω expresses obligation. 'Ought to die' preserves the juridical claim
    without overstating it as absolute necessity; 'must die' is possible but slightly
    stronger in English tone.
- source_word: υἱὸν θεοῦ
  chosen: the Son of God
  alternatives:
  - a son of God
  - God's Son
  lexicon: BDAG
  rationale: Although the Greek lacks the article before υἱόν, the construction in
    this accusative complement after ἑαυτὸν ἐποίησεν is qualitative/titular. In Johannine
    context, the charge concerns Jesus' claim to unique divine sonship, so 'the Son
    of God' best conveys the intended sense.
- source_word: ἑαυτὸν ἐποίησεν
  chosen: he made himself
  alternatives:
  - he claimed himself to be
  - he presented himself as
  lexicon: BDAG
  rationale: A fairly literal rendering of the idiom. In English, 'made himself' naturally
    introduces the predicate complement ('the Son of God') and preserves the accusers'
    formulation without interpretive expansion.
