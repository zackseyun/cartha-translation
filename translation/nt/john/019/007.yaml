theological_decisions:
- issue: Rendering of υἱὸν θεοῦ in a hostile accusation against Jesus
  chosen_reading: the Son of God
  alternative_readings:
  - a son of God
  - God's Son
  rationale: Within the bounds of orthodox Christology, the translation must not flatten
    the Johannine force of the accusation into an indefinite category. The accusers'
    claim in context is that Jesus has claimed a uniquely divine filial status, not
    merely that he is one son among others. 'The Son of God' preserves that force
    while still reporting the opponents' accusation rather than adding doctrinal commentary.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 preserve theological tension rather than resolve it'
