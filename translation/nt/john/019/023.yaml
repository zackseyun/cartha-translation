theological_decisions:
- issue: Potential symbolic overreading of Jesus' seamless tunic
  chosen_reading: Translate descriptively without importing symbolic or sacramental
    significance into the main text.
  alternative_readings:
  - A symbolic allusion to priestly garments
  - An ecclesiological symbol of church unity
  rationale: The verse itself describes the garment's construction and the soldiers'
    actions. Possible theological symbolism may be discussed elsewhere, but should
    not be embedded in the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
