id: JHN.19.23
reference: John 19:23
source:
  edition: SBLGNT
  text: οἱ οὖν στρατιῶται ὅτε ἐσταύρωσαν τὸν Ἰησοῦν ἔλαβον τὰ ἱμάτια αὐτοῦ καὶ ἐποίησαν
    τέσσαρα μέρη, ἑκάστῳ στρατιώτῃ μέρος, καὶ τὸν χιτῶνα. ἦν δὲ ὁ χιτὼν ἄραφος, ἐκ
    τῶν ἄνωθεν ὑφαντὸς δι’ ὅλου·
translation:
  text: So when the soldiers had crucified Jesus, they took his outer garments and
    made four parts, a part for each soldier, and also the tunic. But the tunic was
    seamless, woven from the top throughout.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his garments'; the Greek term can refer broadly to clothing, but here
      likely means the outer garments in contrast with the tunic mentioned separately.
    reason: lexical_alternative
  - marker: b
    text: Or 'from above.' In this context the phrase most likely refers to the tunic
      being woven from the top of the garment downward.
    reason: lexical_alternative
  - marker: c
    text: Or 'woven in one piece through the whole garment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὖν στρατιῶται
  chosen: So when the soldiers
  alternatives:
  - Then the soldiers
  - Therefore the soldiers
  lexicon: BDAG
  rationale: οὖν is a connective advancing the narrative; 'So' gives natural English
    flow without overstating logical inference. στρατιῶται is straightforwardly 'soldiers'.
- source_word: ὅτε ἐσταύρωσαν
  chosen: when ... had crucified
  alternatives:
  - when ... crucified
  - after ... crucified
  lexicon: BDAG
  rationale: Aorist with ὅτε marks the event as prior to the following actions; English
    past perfect clarifies sequence idiomatically.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name per translation philosophy.
- source_word: ἔλαβον τὰ ἱμάτια αὐτοῦ
  chosen: they took his outer garments
  alternatives:
  - they took his clothes
  - they took his garments
  lexicon: BDAG
  rationale: ἱμάτια commonly refers to garments/clothing, often outer garments in
    contrast with χιτών in the same verse. 'Outer garments' preserves the distinction
    from the tunic.
- source_word: ἐποίησαν τέσσαρα μέρη
  chosen: and made four parts
  alternatives:
  - and divided them into four parts
  - and made four shares
  lexicon: BDAG
  rationale: Literal sense is 'made four parts.' This keeps close to the Greek while
    remaining natural.
- source_word: ἑκάστῳ στρατιώτῃ μέρος
  chosen: a part for each soldier
  alternatives:
  - one part for each soldier
  - a share for each soldier
  lexicon: BDAG
  rationale: This dative phrase explains the fourfold division. 'A part for each soldier'
    is clear and closely reflects μέρος.
- source_word: καὶ τὸν χιτῶνα
  chosen: and also the tunic
  alternatives:
  - and the tunic
  - and the inner garment
  lexicon: BDAG
  rationale: χιτών denotes the garment worn next to the body, often rendered 'tunic.'
    Adding 'also' reflects the additive force as the tunic is mentioned separately
    from the outer garments.
- source_word: ἦν δὲ ὁ χιτὼν ἄραφος
  chosen: But the tunic was seamless
  alternatives:
  - Now the tunic was seamless
  - and the tunic was without seam
  lexicon: BDAG
  rationale: δέ introduces a slight contrast/explanation; 'But' works naturally in
    English. ἄραφος means 'without seam,' idiomatically 'seamless'.
- source_word: ἐκ τῶν ἄνωθεν
  chosen: from the top
  alternatives:
  - from above
  - from the upper part
  lexicon: BDAG
  rationale: In this clothing context ἄνωθεν refers to the upper part/top of the garment
    rather than the theological sense 'from above.' 'From the top' best fits the immediate
    context.
- source_word: ὑφαντὸς δι’ ὅλου
  chosen: woven ... throughout
  alternatives:
  - woven in one piece
  - woven all through
  lexicon: BDAG
  rationale: ὑφαντός means 'woven'; δι’ ὅλου indicates through the whole extent. 'Throughout'
    preserves the idea that the tunic was woven as a continuous whole.
