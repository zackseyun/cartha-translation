id: JHN.19.29
reference: John 19:29
source:
  edition: SBLGNT
  text: ⸀σκεῦος ἔκειτο ὄξους μεστόν· ⸂σπόγγον οὖν μεστὸν τοῦ⸃ ὄξους ⸀ὑσσώπῳ περιθέντες
    προσήνεγκαν αὐτοῦ τῷ στόματι.
translation:
  text: A container full of sour wine was lying there; so they put a sponge full of
    the sour wine on hyssop and brought it to his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vinegar.' The Greek term can denote sour wine or vinegar; here it likely
      refers to the sour wine drink available to soldiers.
    reason: lexical_alternative
  - marker: b
    text: Or 'on a hyssop branch' or 'with hyssop.' The Greek simply says 'on/with
      hyssop,' and the exact picture is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεῦος
  chosen: container
  alternatives:
  - vessel
  - jar
  lexicon: BDAG
  rationale: A general term for an object/container; 'container' is natural modern
    English and avoids over-specifying the type of vessel.
- source_word: ἔκειτο
  chosen: was lying there
  alternatives:
  - was set there
  - was placed there
  lexicon: BDAG
  rationale: Imperfect middle/passive of κεῖμαι indicates something situated or lying
    in a place; 'was lying there' preserves the stative scene-setting force.
- source_word: ὄξους
  chosen: sour wine
  alternatives:
  - vinegar
  - wine vinegar
  lexicon: BDAG
  rationale: ὄξος in this context refers to the cheap sour wine/drink used by soldiers,
    not merely culinary vinegar. 'Sour wine' is more historically precise and more
    intelligible as a drink offered to Jesus.
- source_word: μεστόν
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: Natural English rendering of the adjective indicating fullness; repeated
    consistently for both the container and the sponge.
- source_word: σπόγγον
  chosen: a sponge
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: οὖν
  chosen: so
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence; 'so' is concise and natural in English narrative.
- source_word: ὑσσώπῳ
  chosen: on hyssop
  alternatives:
  - on a hyssop branch
  - with hyssop
  lexicon: BDAG
  rationale: The dative likely expresses means or attachment. 'On hyssop' stays close
    to the Greek while remaining readable. Because the exact sense is debated and
    'branch' is not explicit in the Greek, the more literal wording is preferred in
    the main text.
- source_word: περιθέντες
  chosen: put
  alternatives:
  - placing
  - having put
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    English idiom often compresses this into 'put' before the finite verb.
- source_word: προσήνεγκαν
  chosen: brought
  alternatives:
  - offered
  - held up
  lexicon: BDAG
  rationale: The verb means to bring/present. 'Brought' fits the physical action toward
    Jesus' mouth without adding interpretive nuance.
- source_word: αὐτοῦ τῷ στόματι
  chosen: to his mouth
  alternatives:
  - to Jesus' mouth
  lexicon: BDAG
  rationale: Standard dative construction after the verb of bringing; 'his mouth'
    is the natural pronominal rendering in context.
