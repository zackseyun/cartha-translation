theological_decisions:
- issue: Historical/cultic resonance of ὑσσώπῳ
  chosen_reading: Retain 'hyssop' in the main text without expanding its symbolism.
  alternative_readings:
  - Render more interpretively as 'a hyssop branch'
  - Downplay the term as merely a stalk/reed
  rationale: John's wording may evoke Passover/purification associations, but the
    verse itself does not explicitly state the symbolism. Preserving 'hyssop' keeps
    the lexical and possible theological resonance without importing an interpretation
    into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
