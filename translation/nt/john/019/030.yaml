id: JHN.19.30
reference: John 19:30
source:
  edition: SBLGNT
  text: ὅτε οὖν ἔλαβεν τὸ ὄξος ὁ Ἰησοῦς εἶπεν· Τετέλεσται, καὶ κλίνας τὴν κεφαλὴν
    παρέδωκεν τὸ πνεῦμα.
translation:
  text: So when Jesus had received the sour wine, he said, “It is finished,” and bowing
    his head, he gave up his spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the vinegar” or “the wine vinegar.” The Greek ὄξος refers to sour wine.
    reason: lexical_alternative
  - marker: b
    text: Or “It has been accomplished” or “It has been completed.”
    reason: lexical_alternative
  - marker: c
    text: Or “he breathed his last.” The Greek more literally says, “he gave up his
      spirit.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε οὖν
  chosen: So when
  alternatives:
  - When therefore
  - Therefore when
  lexicon: BDAG
  rationale: Combines the temporal conjunction ὅτε ('when') with the inferential/discourse
    particle οὖν. 'So when' preserves both the narrative flow and natural modern English
    better than the more wooden 'when therefore.'
- source_word: ἔλαβεν
  chosen: had received
  alternatives:
  - received
  - took
  lexicon: BDAG
  rationale: Aorist of λαμβάνω can mean 'received' or 'took.' In context of being
    offered vinegar/sour wine on a sponge, 'received' is idiomatic and fits the sequence
    naturally. English past perfect smooths the temporal relation before his saying.
- source_word: τὸ ὄξος
  chosen: the sour wine
  alternatives:
  - the vinegar
  - the wine vinegar
  lexicon: BDAG
  rationale: ὄξος denotes sour wine/wine vinegar, a common cheap drink. 'Sour wine'
    is more natural and less misleading to modern readers than 'vinegar,' while still
    reflecting the lexical sense.
- source_word: Τετέλεσται
  chosen: It is finished
  alternatives:
  - It has been accomplished
  - It has been completed
  lexicon: BDAG
  rationale: Perfect passive/mediopassive indicative of τελέω conveys completed action
    with abiding result. 'It is finished' is the established and accurate rendering,
    preserving both finality and fulfillment without over-interpreting the object
    of completion.
- source_word: κλίνας τὴν κεφαλήν
  chosen: bowing his head
  alternatives:
  - having bowed his head
  - inclining his head
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb. 'Bowing his head' is natural
    English and preserves the participial action without unnecessary stiffness.
- source_word: παρέδωκεν
  chosen: gave up
  alternatives:
  - handed over
  - delivered
  lexicon: BDAG
  rationale: παραδίδωμι often means 'hand over/deliver,' but in this idiom with τὸ
    πνεῦμα it refers to yielding up life/spirit in death. 'Gave up' is the clearest
    idiomatic English equivalent here.
- source_word: τὸ πνεῦμα
  chosen: his spirit
  alternatives:
  - the spirit
  - his breath
  lexicon: BDAG
  rationale: 'Although the Greek has the article (''the spirit''), English idiom in
    this death formula normally uses the possessive: ''his spirit.'' ''Breath'' is
    possible in some contexts, but here ''spirit'' better preserves the theological
    and lexical weight of πνεῦμα.'
