theological_decisions:
- issue: Whether παρέδωκεν τὸ πνεῦμα should be rendered as a mere idiom for dying
    or in a way that preserves the personal/spiritual dimension of Jesus' death.
  chosen_reading: he gave up his spirit
  alternative_readings:
  - he died
  - he breathed his last
  rationale: The Greek expression is more specific than a bare statement of death.
    Rendering it 'he gave up his spirit' preserves the wording's gravity and its resonance
    with Johannine presentation of Jesus' death as a voluntary act, without importing
    later doctrinal elaboration beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
