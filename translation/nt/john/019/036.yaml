theological_decisions:
- issue: Rendering the scriptural citation in idiomatic English while preserving its
    allusion to Exodus 12:46 / Numbers 9:12 / Psalm 34:20
  chosen_reading: Not one of his bones will be broken
  alternative_readings:
  - A bone of him will not be broken
  - Not a bone of him shall be broken
  rationale: The Greek citation is singular ('bone') but functions collectively. 'Not
    one of his bones' is idiomatic English that preserves the fulfillment motif and
    the OT allusion without archaic phrasing. This does not add content beyond the
    collective sense already present in the citation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
