id: JHN.19.36
reference: John 19:36
source:
  edition: SBLGNT
  text: ἐγένετο γὰρ ταῦτα ἵνα ἡ γραφὴ πληρωθῇ· Ὀστοῦν οὐ συντριβήσεται ⸀αὐτοῦ.
translation:
  text: 'For these things happened so that the Scripture might be fulfilled: “Not
    one of his bones will be broken.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “A bone of him will not be broken.” The singular “bone” is rendered
      idiomatically in English as “Not one of his bones will be broken.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: happened
  alternatives:
  - came to pass
  - took place
  - occurred
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι here introduces the events just narrated. 'Happened'
    is natural modern English and preserves the eventive sense without archaic tone.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory grounding for the previous statement. 'For' best
    preserves the connective force in a concise literary register.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these events
  lexicon: BDAG
  rationale: Neuter plural demonstrative refers to the preceding events. 'These things'
    is formally close and idiomatic enough in English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result tied to divine fulfillment. 'So that' is clear
    modern English and preserves the telic nuance.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  lexicon: BDAG
  rationale: γραφή in Johannine usage commonly refers to sacred Scripture. Singular
    with article is well rendered 'the Scripture,' preserving the canonical sense.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - might come to fulfillment
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα expresses intended fulfillment.
    'Might be fulfilled' preserves both the passive and the purpose construction in
    standard English Bible style.
- source_word: Ὀστοῦν
  chosen: bone
  alternatives:
  - a bone
  lexicon: BDAG
  rationale: Singular noun used in a scriptural citation with collective force. English
    idiom prefers plural in the full clause ('his bones') to communicate the sense
    naturally.
- source_word: οὐ συντριβήσεται
  chosen: will be broken
  alternatives:
  - will not be crushed
  - will not be shattered
  lexicon: BDAG
  rationale: Future passive of συντρίβω in this citation refers to bones not being
    broken. 'Broken' matches the contextual sense and established scriptural allusion
    better than more literal but less fitting alternatives like 'crushed.'
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: Genitive pronoun naturally becomes possessive 'his' in English.
