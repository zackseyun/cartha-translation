id: JHN.19.33
reference: John 19:33
source:
  edition: SBLGNT
  text: ἐπὶ δὲ τὸν Ἰησοῦν ἐλθόντες, ὡς εἶδον ⸂ἤδη αὐτὸν⸃ τεθνηκότα, οὐ κατέαξαν αὐτοῦ
    τὰ σκέλη,
translation:
  text: But when they came to Jesus, seeing that he was already dead, they did not
    break his legs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'John later connects this action to Scripture: ''Not one of his bones will
      be broken'' (John 19:36; cf. Exod 12:46; Num 9:12; Ps 34:20).'
    reason: cross_reference
  - marker: b
    text: Or 'when they saw that he had already died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ δὲ τὸν Ἰησοῦν ἐλθόντες
  chosen: But when they came to Jesus
  alternatives:
  - But coming to Jesus
  - But after they came to Jesus
  lexicon: BDAG
  rationale: The participial construction with δέ is naturally rendered as a temporal
    clause in English. 'But' reflects δέ's mild contrast with the prior action toward
    the others, and 'came to Jesus' preserves the motion toward him.
- source_word: ὡς εἶδον
  chosen: seeing that
  alternatives:
  - when they saw
  - after they saw
  lexicon: BDAG
  rationale: ὡς with the aorist here introduces the circumstance on which the following
    action was based. 'Seeing that' captures both perception and causal force in smooth
    English, without over-paraphrasing.
- source_word: ἤδη
  chosen: already
  alternatives:
  - by this time
  - now already
  lexicon: BDAG
  rationale: ἤδη marks that Jesus' death had already occurred by the time they arrived.
    'Already' is the most direct and natural equivalent.
- source_word: τεθνηκότα
  chosen: dead
  alternatives:
  - having died
  - that he had died
  lexicon: BDAG
  rationale: The perfect active participle of θνῄσκω emphasizes the resulting state.
    In idiomatic English, 'dead' best conveys that state, while the finite clause
    'he was already dead' preserves the sense clearly.
- source_word: οὐ κατέαξαν
  chosen: they did not break
  alternatives:
  - they did not shatter
  - they did not smash
  lexicon: BDAG
  rationale: κατάγνυμι in this context refers to breaking bones/limbs. 'Break' is
    the standard, precise English rendering and fits the crucifixion context.
- source_word: τὰ σκέλη
  chosen: his legs
  alternatives:
  - his leg bones
  lexicon: BDAG
  rationale: σκέλη refers to the legs. Although the act would involve breaking the
    bones of the legs, the natural English expression is 'break his legs,' which accurately
    reflects the idiom without unnecessary anatomical expansion.
