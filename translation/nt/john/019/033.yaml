theological_decisions:
- issue: Potential allusion to Scripture fulfillment through the unbroken legs of
    Jesus
  chosen_reading: The main text remains a straightforward narrative statement without
    importing fulfillment language into this verse.
  alternative_readings:
  - Translate with wording that foregrounds bones rather than legs to anticipate 19:36
  rationale: John 19:36 explicitly states the fulfillment connection. This verse itself
    narrates the soldiers' action and should not be expanded to make the theological
    implication explicit before the text does so. 'Legs' remains the natural rendering
    here, while the canonical/theological link can be preserved in a cross-reference
    footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
