theological_decisions:
- issue: Subject of ἐκάθισεν
  chosen_reading: Pilate sat down on the judgment seat
  alternative_readings:
  - Pilate seated Jesus on the judgment seat
  rationale: The Greek form can be read transitively or intransitively, and some interpreters
    take Jesus as the one seated. However, the immediate judicial context and the
    most common syntactic reading favor Pilate as the subject who takes his place
    on the tribunal to pronounce judgment. The alternative is preserved in a footnote
    because the ambiguity is real and interpretively significant.
  doctrine_reference: Preserve theological tension rather than resolve it.
