id: JHN.19.13
reference: John 19:13
source:
  edition: SBLGNT
  text: Ὁ οὖν Πιλᾶτος ἀκούσας ⸂τῶν λόγων τούτων⸃ ἤγαγεν ἔξω τὸν Ἰησοῦν, καὶ ἐκάθισεν
    ⸀ἐπὶ βήματος εἰς τόπον λεγόμενον Λιθόστρωτον, Ἑβραϊστὶ δὲ Γαββαθα.
translation:
  text: So when Pilate heard these words, he brought Jesus outside and sat down on
    the judgment seat at a place called the Stone Pavement, and in Hebrew, Gabbatha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and seated him on the judgment seat.' The Greek verb can be understood
      transitively, though the more likely sense here is that Pilate himself sat on
      the judgment seat.
    reason: alternative_reading
  - marker: b
    text: '''In Hebrew'' likely refers to the local Semitic language, probably Aramaic,
      as elsewhere in John.'
    reason: cultural_note
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the preceding exchange; 'So'
    is natural modern English and preserves the connection.
- source_word: ἀκούσας τῶν λόγων τούτων
  chosen: when Pilate heard these words
  alternatives:
  - when Pilate heard these things
  - after Pilate heard these statements
  lexicon: BDAG
  rationale: The aorist participle is best rendered temporally in English. λόγοι here
    refers to the spoken statements just uttered; 'these words' is idiomatic and sufficiently
    close.
- source_word: ἤγαγεν ἔξω τὸν Ἰησοῦν
  chosen: he brought Jesus outside
  alternatives:
  - he led Jesus out
  - he brought Jesus out
  lexicon: BDAG
  rationale: ἄγω plus ἔξω indicates movement outward. 'Brought ... outside' is clear
    modern English; 'led ... out' is possible but slightly more specific than required.
- source_word: ἐκάθισεν ἐπὶ βήματος
  chosen: sat down on the judgment seat
  alternatives:
  - sat on the tribunal
  - seated him on the judgment seat
  lexicon: BDAG
  rationale: βῆμα in this context is the official judicial seat/platform, not merely
    a step. The subject is most naturally Pilate, so active intransitive 'sat down'
    is preferred. 'Judgment seat' conveys the legal setting better than the less familiar
    'tribunal.'
- source_word: εἰς τόπον λεγόμενον Λιθόστρωτον
  chosen: at a place called the Stone Pavement
  alternatives:
  - to a place called Lithostrotos
  - at the place called Stone Pavement
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' with verbs of motion plus subsequent
    seating the resulting location is naturally rendered 'at.' Λιθόστρωτον is translated
    rather than transliterated because it is a place designation with transparent
    meaning in Greek; 'the Stone Pavement' is idiomatic.
- source_word: Ἑβραϊστὶ δὲ Γαββαθα
  chosen: and in Hebrew, Gabbatha
  alternatives:
  - but in Hebrew, Gabbatha
  - that is, in Aramaic, Gabbatha
  lexicon: BDAG
  rationale: Ἑβραϊστί in John conventionally refers to the Semitic local language,
    often Aramaic, but the text says 'in Hebrew,' so the main text preserves that
    wording. δέ here is lightly connective, well rendered 'and.' 'Gabbatha' is transliterated
    as a proper place name.
