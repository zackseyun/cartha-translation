id: JHN.19.25
reference: John 19:25
source:
  edition: SBLGNT
  text: Εἱστήκεισαν δὲ παρὰ τῷ σταυρῷ τοῦ Ἰησοῦ ἡ μήτηρ αὐτοῦ καὶ ἡ ἀδελφὴ τῆς μητρὸς
    αὐτοῦ, Μαρία ἡ τοῦ Κλωπᾶ καὶ Μαρία ἡ Μαγδαληνή.
translation:
  text: Now standing by the cross of Jesus were his mother, and his mother's sister,
    Mary the wife of Clopas, and Mary Magdalene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mary of Clopas'; the Greek does not explicitly state the relationship,
      though 'wife of Clopas' is a common interpretation.
    reason: lexical_alternative
  - marker: b
    text: The Greek may also be read as naming three women rather than four, if 'his
      mother's sister' is taken to be the same person as 'Mary of Clopas.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εἱστήκεισαν
  chosen: were standing
  alternatives:
  - stood
  lexicon: BDAG
  rationale: Pluperfect form of ἵστημι used with imperfective force in Koine, describing
    a continuing posture/state. 'Were standing' brings out the durative sense more
    clearly than simple 'stood.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - But
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative transition rather than strong contrast. 'Now'
    is natural modern English for a scene shift.
- source_word: παρὰ τῷ σταυρῷ
  chosen: by the cross
  alternatives:
  - near the cross
  - beside the cross
  lexicon: BDAG
  rationale: παρά with the dative indicates proximity. 'By the cross' is concise and
    idiomatic while preserving the spatial sense.
- source_word: τοῦ Ἰησοῦ
  chosen: of Jesus
  alternatives:
  - where Jesus was crucified
  lexicon: BDAG
  rationale: The genitive directly modifies 'cross'; the translation keeps the simple
    possessive relation expressed in Greek without expansion.
- source_word: ἡ μήτηρ αὐτοῦ
  chosen: his mother
  lexicon: BDAG
  rationale: Straightforward rendering of the noun phrase.
- source_word: ἡ ἀδελφὴ τῆς μητρὸς αὐτοῦ
  chosen: his mother's sister
  alternatives:
  - the sister of his mother
  lexicon: BDAG
  rationale: Natural English rendering of the genitive construction.
- source_word: Μαρία ἡ τοῦ Κλωπᾶ
  chosen: Mary the wife of Clopas
  alternatives:
  - Mary of Clopas
  - Mary, wife of Clopas
  lexicon: BDAG
  rationale: The article + genitive construction most naturally identifies Mary by
    relation to Clopas, commonly understood as marital in this context. 'Wife of Clopas'
    makes the relationship explicit for English readers, while an alternative is preserved
    in a footnote because the Greek itself does not state 'wife' overtly.
- source_word: Μαρία ἡ Μαγδαληνή
  chosen: Mary Magdalene
  alternatives:
  - Mary the Magdalene
  lexicon: BDAG
  rationale: Standard English transliteration of the epithet identifying Mary from
    Magdala; idiomatic and widely recognized.
