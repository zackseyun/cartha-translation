theological_decisions:
- issue: Identification and counting of the women at the cross
  chosen_reading: 'The verse is rendered as listing four women: Jesus'' mother, his
    mother''s sister, Mary the wife of Clopas, and Mary Magdalene.'
  alternative_readings:
  - The verse may be read as listing three women, with 'his mother's sister' appositional
    to 'Mary the wife of Clopas'.
  rationale: The Greek punctuation in modern editions favors four coordinated nominatives,
    but the syntax is compact enough that some interpreters take 'his mother's sister'
    and 'Mary of Clopas' as the same person. The translation follows the more straightforward
    four-person reading while preserving the alternative in a footnote rather than
    resolving the ambiguity dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
