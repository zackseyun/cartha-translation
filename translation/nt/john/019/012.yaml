id: JHN.19.12
reference: John 19:12
source:
  edition: SBLGNT
  text: ἐκ τούτου ⸂ὁ Πιλᾶτος ἐζήτει⸃ ἀπολῦσαι αὐτόν· οἱ δὲ Ἰουδαῖοι ⸀ἐκραύγασαν λέγοντες·
    Ἐὰν τοῦτον ἀπολύσῃς, οὐκ εἶ φίλος τοῦ Καίσαρος· πᾶς ὁ βασιλέα ἑαυτὸν ποιῶν ἀντιλέγει
    τῷ Καίσαρι.
translation:
  text: From then on Pilate was seeking to release him. But the Jews shouted, saying,
    “If you release this man, you are not Caesar’s friend. Everyone who makes himself
    a king speaks against Caesar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Because of this Pilate kept trying to release him.” The Greek phrase
      ἐκ τούτου can be understood temporally (“from then on”) or causally (“because
      of this”).
    reason: lexical_alternative
  - marker: b
    text: In John, “the Jews” often refers more specifically to the Judean authorities
      or to particular Jewish opponents in the narrative context, not necessarily
      to the Jewish people as a whole.
    reason: cultural_note
  - marker: c
    text: Or, “opposes Caesar” or “sets himself against Caesar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τούτου
  chosen: From then on
  alternatives:
  - From this point
  - Because of this
  lexicon: BDAG
  rationale: In Johannine narrative context, the phrase functions temporally, marking
    what followed from the preceding exchange, rather than primarily expressing cause.
    'From then on' is idiomatic modern English and preserves the narrative progression.
- source_word: ἐζήτει
  chosen: was seeking
  alternatives:
  - kept trying
  - tried
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated attempt. 'Was seeking' preserves
    the durative force more transparently than the simple past 'tried,' while remaining
    readable.
- source_word: ἀπολῦσαι / ἀπολύσῃς
  chosen: to release / release
  alternatives:
  - to set free / set free
  - to let go / let go
  lexicon: BDAG
  rationale: ἀπολύω here refers to official release from custody. 'Release' fits the
    judicial setting better than the more colloquial 'let go' and is slightly more
    precise than 'set free.'
- source_word: οἱ δὲ Ἰουδαῖοι
  chosen: But the Jews
  alternatives:
  - But the Jewish leaders
  - But the Judeans
  lexicon: BDAG
  rationale: The Greek text reads simply 'the Jews,' and the translation should not
    narrow the referent beyond the wording of the source. In John's Gospel the expression
    often refers to the Judean authorities or hostile Jewish interlocutors in context,
    but that interpretive narrowing is better handled in annotation than in the main
    text.
- source_word: ἐκραύγασαν λέγοντες
  chosen: shouted, saying
  alternatives:
  - cried out, saying
  - shouted
  lexicon: BDAG
  rationale: κραυγάζω denotes loud public outcry. 'Shouted' is natural modern English;
    retaining 'saying' reflects the participial construction and preserves the force
    of direct speech introduction.
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: In this hostile speech, 'this man' conveys the demonstrative force naturally
    in English and reflects the dismissive tone better than the bare pronoun 'him.'
- source_word: φίλος τοῦ Καίσαρος
  chosen: Caesar’s friend
  alternatives:
  - a friend of Caesar
  lexicon: BDAG
  rationale: The genitive is naturally rendered possessively in English. 'Caesar’s
    friend' is concise and preserves the political accusation, possibly echoing an
    honorific or loyalty claim without overtranslating it.
- source_word: πᾶς ὁ βασιλέα ἑαυτὸν ποιῶν
  chosen: Everyone who makes himself a king
  alternatives:
  - Everyone who claims to be a king
  - Anyone who makes himself king
  lexicon: BDAG
  rationale: The participial phrase is literally 'everyone making himself king.' 'Makes
    himself a king' is close to the Greek and idiomatic in English. 'Claims to be
    a king' is interpretive and slightly weaker than the source wording.
- source_word: ἀντιλέγει τῷ Καίσαρι
  chosen: speaks against Caesar
  alternatives:
  - opposes Caesar
  - sets himself against Caesar
  lexicon: BDAG
  rationale: ἀντιλέγω can mean speak against, contradict, or oppose. In this legal-political
    threat, 'speaks against Caesar' preserves the verbal sense of the Greek while
    still implying opposition. 'Opposes Caesar' is possible but less formally aligned
    with the lexical form.
