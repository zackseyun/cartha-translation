theological_decisions:
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Retain the source-level wording 'the Jews' in the main text, without
    substituting 'Jewish leaders' or 'Judeans.'
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation philosophy prioritizes original-language primacy and
    warns against importing interpretive narrowing into the text. Because the Greek
    says οἱ Ἰουδαῖοι, the main text preserves that wording, while a footnote can clarify
    likely contextual reference to avoid misunderstanding.
  doctrine_reference: Translation philosophy §1, §5
