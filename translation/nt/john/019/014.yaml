id: JHN.19.14
reference: John 19:14
source:
  edition: SBLGNT
  text: ἦν δὲ παρασκευὴ τοῦ πάσχα, ὥρα ⸂ἦν ὡς⸃ ἕκτη. καὶ λέγει τοῖς Ἰουδαίοις· Ἴδε
    ὁ βασιλεὺς ὑμῶν.
translation:
  text: Now it was the day of preparation for the Passover; it was about the sixth
    hour. And he says to the Jews, “Behold, your king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly in modern terms, 'about noon,' depending on how the hour is
      reckoned.
    reason: cultural_note
  - marker: b
    text: '''The Jews'' may in context refer more specifically to the Judean authorities
      or Jewish leaders.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρασκευὴ
  chosen: day of preparation
  alternatives:
  - Preparation
  - preparation day
  lexicon: BDAG
  rationale: In this context παρασκευή refers to the day of preparation before a feast/Sabbath.
    Expanding to 'day of preparation' makes the temporal sense clear in natural English
    while staying close to the Greek.
- source_word: τοῦ πάσχα
  chosen: for the Passover
  alternatives:
  - of the Passover
  - Passover
  lexicon: BDAG
  rationale: The genitive is rendered idiomatically in English as 'for the Passover,'
    indicating the preparation was in relation to Passover. 'Of the Passover' is more
    literal but less natural.
- source_word: ὥρα ἦν ὡς ἕκτη
  chosen: it was about the sixth hour
  alternatives:
  - it was about noon
  - the hour was about the sixth
  lexicon: BDAG
  rationale: This preserves the Greek expression and its approximate marker ὡς ('about').
    'Sixth hour' retains the source-culture time expression; 'about noon' is a possible
    interpretive equivalent but is left to a footnote because ancient hour reckoning
    is debated.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: John frequently uses the historical present. Rendering it as 'he says'
    preserves the vividness of the Greek rather than flattening it to a simple past.
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Jewish leaders
  - to the Judeans
  lexicon: BDAG
  rationale: The Greek term is simply 'the Jews.' Although in Johannine context it
    can sometimes refer more narrowly to Judean authorities, this verse does not explicitly
    narrow the referent, so the direct rendering is retained.
- source_word: Ἴδε
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Ἴδε is a demonstrative exclamation drawing attention. 'Behold' preserves
    the solemn, public force of Pilate's presentation better than the more casual
    'Look' or 'See.'
- source_word: ὁ βασιλεὺς ὑμῶν
  chosen: your king
  alternatives:
  - the king of you
  lexicon: BDAG
  rationale: The phrase is rendered idiomatically in English. The possessive 'your'
    preserves the irony and political sting of Pilate's declaration.
