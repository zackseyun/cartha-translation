theological_decisions:
- issue: Reference of 'the Jews' in John's Gospel
  chosen_reading: Retain 'the Jews' in the main text
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The source text reads τοῖς Ἰουδαίοις. To avoid importing an interpretive
    narrowing not explicit in the verse, the translation keeps the direct rendering
    while preserving narrower contextual possibilities in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Ancient time notation 'the sixth hour'
  chosen_reading: Preserve the source-oriented expression in the main text
  alternative_readings:
  - about noon
  rationale: The verse uses ancient hour reckoning and includes the approximating
    particle ὡς. Keeping 'the sixth hour' preserves the textual form and avoids over-resolving
    chronological debates; a modern-time equivalent is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
