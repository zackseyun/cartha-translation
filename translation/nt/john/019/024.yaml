theological_decisions:
- issue: Relationship between the soldiers' action and scriptural fulfillment in ἵνα
    ἡ γραφὴ πληρωθῇ
  chosen_reading: Render the clause straightforwardly as a fulfillment statement without
    importing a stronger deterministic explanation.
  alternative_readings:
  - Render more woodenly as 'in order that the Scripture might be fulfilled'
  - 'Treat ἵνα here as result: ''with the result that the Scripture was fulfilled'''
  rationale: John frequently uses ἵνα in fulfillment formulas. The translation preserves
    the text's claim that the event fulfills Scripture while not over-specifying the
    philosophical mechanics of divine intention and human action.
  doctrine_reference: Preserve theological tension rather than resolve it.
