id: JHN.19.24
reference: John 19:24
source:
  edition: SBLGNT
  text: εἶπαν οὖν πρὸς ἀλλήλους· Μὴ σχίσωμεν αὐτόν, ἀλλὰ λάχωμεν περὶ αὐτοῦ τίνος
    ἔσται· ἵνα ἡ γραφὴ πληρωθῇ ⸂ἡ λέγουσα⸃· Διεμερίσαντο τὰ ἱμάτιά μου ἑαυτοῖς καὶ
    ἐπὶ τὸν ἱματισμόν μου ἔβαλον κλῆρον. Οἱ μὲν οὖν στρατιῶται ταῦτα ἐποίησαν.
translation:
  text: So they said to one another, “Let us not tear it, but cast lots for it to
    decide whose it will be,” so that the Scripture might be fulfilled that says,
    “They divided my garments among themselves, and for my clothing they cast a lot.”
    So the soldiers did these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'draw lots for it.'
    reason: lexical_alternative
  - marker: b
    text: Quoted from Psalm 22:18.
    reason: cross_reference
lexical_decisions:
- source_word: σχίσωμεν
  chosen: tear
  alternatives:
  - rip
  - split
  lexicon: BDAG
  rationale: The verb means to tear or split. 'Tear' is natural modern English for
    cloth and fits the immediate context of dividing a garment.
- source_word: αὐτόν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: Although grammatically masculine, the pronoun refers to the tunic/garment
    in context, so English requires the neuter 'it'.
- source_word: λάχωμεν
  chosen: cast lots
  alternatives:
  - draw lots
  lexicon: BDAG
  rationale: The idiom refers to determining possession by lot. 'Cast lots' is the
    standard and clearest English rendering, especially since the quotation below
    uses the same imagery.
- source_word: περὶ αὐτοῦ τίνος ἔσται
  chosen: for it to decide whose it will be
  alternatives:
  - concerning it, whose it shall be
  - for it, whose it will be
  lexicon: BDAG
  rationale: 'This phrase expresses the purpose/result of the lot: determining ownership.
    The chosen rendering makes the sense explicit in idiomatic English without adding
    content beyond the Greek.'
- source_word: ἵνα ἡ γραφὴ πληρωθῇ
  chosen: so that the Scripture might be fulfilled
  alternatives:
  - in order that the Scripture might be fulfilled
  - that the Scripture might be fulfilled
  lexicon: BDAG
  rationale: This is John's common fulfillment formula. 'So that' preserves the conjunction
    while avoiding overly wooden English; 'might be fulfilled' reflects the aorist
    passive subjunctive.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  lexicon: BDAG
  rationale: In Johannine usage this refers to sacred Scripture, not merely any writing.
- source_word: ἡ λέγουσα
  chosen: that says
  alternatives:
  - which says
  - the one saying
  lexicon: BDAG
  rationale: This participle introduces the cited text. 'That says' is idiomatic and
    preserves the function of the Greek.
- source_word: Διεμερίσαντο
  chosen: They divided
  alternatives:
  - They distributed
  - They apportioned
  lexicon: BDAG
  rationale: The verb in the Psalm quotation denotes dividing/distributing items among
    persons. 'Divided' matches both the source sense and familiar citation form.
- source_word: ἱμάτιά
  chosen: garments
  alternatives:
  - clothes
  - outer garments
  lexicon: BDAG
  rationale: ἱμάτια commonly refers to garments/clothes, often outer garments. 'Garments'
    preserves a slightly elevated but still readable register suitable for the quotation.
- source_word: ἑαυτοῖς
  chosen: among themselves
  alternatives:
  - for themselves
  lexicon: BDAG
  rationale: The reflexive dative here indicates distribution among the soldiers.
    'Among themselves' best captures the distributive sense in English.
- source_word: ἱματισμόν
  chosen: clothing
  alternatives:
  - garment
  - robe
  lexicon: BDAG
  rationale: A different clothing term is used from ἱμάτια. Rendering it as 'clothing'
    preserves some lexical distinction while remaining natural in the Psalm citation.
- source_word: ἔβαλον κλῆρον
  chosen: they cast a lot
  alternatives:
  - they threw a lot
  - they cast lots
  lexicon: BDAG
  rationale: The singular κλῆρον is best represented by 'a lot' in the quotation,
    while the narrative idiom above is naturally 'cast lots.' This documents the contextual
    variation.
- source_word: Οἱ μὲν οὖν στρατιῶται ταῦτα ἐποίησαν
  chosen: So the soldiers did these things
  alternatives:
  - Therefore the soldiers did these things
  - The soldiers, then, did these things
  lexicon: BDAG
  rationale: μέν οὖν here functions as a narrative resumptive/confirming transition.
    'So' gives smooth English while retaining the sense that the soldiers indeed carried
    out these actions.
