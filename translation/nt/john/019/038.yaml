theological_decisions:
- issue: Referent and translation of τῶν Ἰουδαίων in John's Gospel
  chosen_reading: Render as 'the Jews' in the main text, with a clarifying footnote
    about the likely reference to the Judean/Jewish authorities opposed to Jesus.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The source text explicitly has 'the Jews,' and the translation philosophy
    prioritizes original-language primacy and preserving tension rather than resolving
    interpretive complexity in the main text. Because this expression can be misunderstood
    in English, a footnote clarifies the contextual force without replacing the Greek
    wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
