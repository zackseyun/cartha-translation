id: JHN.19.38
reference: John 19:38
source:
  edition: SBLGNT
  text: Μετὰ ⸀δὲ ταῦτα ἠρώτησεν τὸν Πιλᾶτον Ἰωσὴφ ⸀ἀπὸ Ἁριμαθαίας, ὢν μαθητὴς τοῦ
    Ἰησοῦ κεκρυμμένος δὲ διὰ τὸν φόβον τῶν Ἰουδαίων, ἵνα ἄρῃ τὸ σῶμα τοῦ Ἰησοῦ· καὶ
    ἐπέτρεψεν ὁ Πιλᾶτος. ἦλθεν οὖν καὶ ἦρεν τὸ σῶμα ⸀αὐτοῦ.
translation:
  text: After these things, Joseph from Arimathea, being a disciple of Jesus but having
    kept it hidden because of fear of the Jews, asked Pilate that he might take away
    the body of Jesus. And Pilate gave permission. So he came and took away his body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'the Judean/Jewish authorities'—John often
      uses 'the Jews' for those opposing Jesus, not for the Jewish people without
      distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A fairly formal temporal transition that preserves John's sequencing.
    'After these things' reflects the plural ταῦτα more closely than the smoother
    'After this.'
- source_word: ἠρώτησεν
  chosen: asked
  alternatives:
  - requested
  lexicon: BDAG
  rationale: Standard sense in context of making a request to Pilate. 'Asked' is natural
    English and sufficiently formal.
- source_word: ἀπὸ Ἁριμαθαίας
  chosen: from Arimathea
  alternatives:
  - of Arimathea
  lexicon: BDAG
  rationale: ἀπό naturally indicates origin/place association, so 'from Arimathea'
    is more directly tied to the Greek than the traditional 'of Arimathea,' though
    both are acceptable in English.
- source_word: ὢν μαθητὴς τοῦ Ἰησοῦ
  chosen: being a disciple of Jesus
  alternatives:
  - who was a disciple of Jesus
  lexicon: BDAG
  rationale: Preserves the participial construction while remaining readable. 'Disciple'
    is the standard rendering of μαθητής.
- source_word: κεκρυμμένος
  chosen: having kept it hidden
  alternatives:
  - secretly
  - having been hidden
  lexicon: BDAG
  rationale: The perfect passive participle literally means 'having been hidden,'
    but in context it refers to his discipleship being concealed. 'Having kept it
    hidden' makes the implied object explicit for intelligibility without substantial
    paraphrase. 'Secretly' is too compressed and loses the perfect nuance.
- source_word: διὰ τὸν φόβον τῶν Ἰουδαίων
  chosen: because of fear of the Jews
  alternatives:
  - for fear of the Jews
  - because he feared the Jews
  lexicon: BDAG
  rationale: A close rendering of the prepositional phrase. 'For fear of the Jews'
    is idiomatic and traditional, but 'because of fear of the Jews' more transparently
    reflects the Greek structure.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: John's Ἰουδαῖοι is contextually complex. Here the Greek says 'the Jews,'
    and that should be preserved in the main text rather than narrowed interpretively.
    Because modern readers may misconstrue this as an ethnic slur, an explanatory
    footnote preserves the likely contextual sense of the Judean/Jewish authorities
    hostile to Jesus.
- source_word: ἵνα ἄρῃ
  chosen: that he might take away
  alternatives:
  - that he might remove
  - to take away
  lexicon: BDAG
  rationale: This purpose clause is well represented by 'that he might take away.'
    αἴρω here means remove/carry off the body for burial. 'Take away' is transparent
    and matches the later aorist ἦρεν.
- source_word: τὸ σῶμα τοῦ Ἰησοῦ
  chosen: the body of Jesus
  alternatives:
  - Jesus' body
  lexicon: BDAG
  rationale: A formally close rendering that preserves the genitive construction.
- source_word: ἐπέτρεψεν
  chosen: gave permission
  alternatives:
  - allowed
  - granted it
  lexicon: BDAG
  rationale: This verb denotes granting permission. 'Gave permission' is clear and
    idiomatic.
- source_word: ἦλθεν οὖν καὶ ἦρεν
  chosen: So he came and took away
  alternatives:
  - Then he came and removed
  - Therefore he came and took
  lexicon: BDAG
  rationale: οὖν is inferential/sequential; 'So' is natural modern English. Repeating
    'took away' maintains lexical consistency with αἴρω earlier in the verse.
- source_word: τὸ σῶμα αὐτοῦ
  chosen: his body
  alternatives:
  - the body
  lexicon: BDAG
  rationale: The pronoun αὐτοῦ is present in the Greek and should be represented.
    'His body' is natural English and avoids unnecessary repetition of the name.
