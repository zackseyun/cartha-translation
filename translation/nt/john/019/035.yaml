theological_decisions:
- issue: Referent of the emphatic pronouns in the verse
  chosen_reading: The verse is rendered without resolving whether the narrator refers
    to himself in the third person or to another eyewitness, while preserving the
    emphatic wording.
  alternative_readings:
  - The beloved disciple/narrator is speaking self-referentially in the third person
  - A distinct eyewitness is being referenced
  rationale: The Greek does not explicitly identify the witness. The translation keeps
    the third-person forms ('the one who has seen,' 'that one') and does not import
    a specific identification into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of πιστεύητε
  chosen_reading: may believe
  alternative_readings:
  - may continue believing
  rationale: The present subjunctive can in some contexts suggest ongoing belief,
    but here the broader Johannine usage allows either ingressive or durative nuance.
    The main text uses the unmarked 'may believe' and preserves the possible ongoing
    nuance in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
