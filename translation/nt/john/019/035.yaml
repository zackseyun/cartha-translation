id: JHN.19.35
reference: John 19:35
source:
  edition: SBLGNT
  text: καὶ ὁ ἑωρακὼς μεμαρτύρηκεν, καὶ ἀληθινὴ ⸂αὐτοῦ ἐστιν⸃ ἡ μαρτυρία, καὶ ἐκεῖνος
    οἶδεν ὅτι ἀληθῆ λέγει, ἵνα ⸀καὶ ὑμεῖς ⸀πιστεύητε.
translation:
  text: And the one who has seen has testified, and his testimony is true, and that
    one knows that he is telling the truth, so that you also may believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that you too may continue believing.' The present subjunctive may
      carry an ongoing nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἑωρακὼς
  chosen: the one who has seen
  alternatives:
  - he who saw
  - the eyewitness
  lexicon: BDAG
  rationale: The perfect participle of ὁράω emphasizes a completed act with abiding
    relevance. 'The one who has seen' preserves the substantival participle and the
    eyewitness force without over-paraphrasing to 'eyewitness' in the main text.
- source_word: μεμαρτύρηκεν
  chosen: has testified
  alternatives:
  - has borne witness
  - has given testimony
  lexicon: BDAG
  rationale: The perfect tense is retained with 'has testified,' conveying completed
    testimony with continuing validity. 'Testified' is clear modern English; 'borne
    witness' is a viable more formal alternative.
- source_word: ἀληθινὴ ... ἡ μαρτυρία
  chosen: his testimony is true
  alternatives:
  - his witness is true
  - his testimony is genuine
  lexicon: BDAG
  rationale: ἀληθινή here describes the reliability/truthfulness of the testimony.
    'True' is the most direct rendering. μαρτυρία is rendered 'testimony' for consistency
    with the verbal 'has testified' and natural English style.
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - that man
  lexicon: BDAG
  rationale: ἐκεῖνος is more emphatic than a simple pronoun. Rendering it as 'that
    one' preserves the demonstrative force, even though in English it sounds slightly
    marked; this reflects the Greek emphasis and likely self-referential solemnity.
- source_word: οἶδεν
  chosen: knows
  alternatives:
  - is aware
  - has known
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect, it functions as a present with stative
    force. 'Knows' is the standard idiomatic rendering.
- source_word: ἀληθῆ λέγει
  chosen: he is telling the truth
  alternatives:
  - he speaks true things
  - he says what is true
  lexicon: BDAG
  rationale: The neuter plural adjective ἀληθῆ with λέγει idiomatically means speaking
    truthfully or saying true things. 'He is telling the truth' is natural English
    and captures the sense without awkward literalism.
- source_word: ἵνα καὶ ὑμεῖς πιστεύητε
  chosen: so that you also may believe
  alternatives:
  - so that you too may believe
  - in order that you also may believe
  lexicon: BDAG
  rationale: ἵνα with the present subjunctive expresses purpose. 'So that' is natural
    and sufficiently formal. καί with ὑμεῖς is preserved as 'also,' indicating inclusion
    of the readers among believers.
