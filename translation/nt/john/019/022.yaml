theological_decisions:
- issue: Force of the repeated perfect γέγραφα γέγραφα
  chosen_reading: 'Render as emphatic finality: ''What I have written, I have written.'''
  alternative_readings:
  - '''What I wrote, I wrote.'''
  rationale: The verse expresses Pilate's firm refusal to alter the inscription. Using
    the English present perfect preserves both the Greek perfect aspect and the rhetorical
    force of settled finality without adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §5, §6
