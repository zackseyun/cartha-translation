id: JHN.19.22
reference: John 19:22
source:
  edition: SBLGNT
  text: ἀπεκρίθη ὁ Πιλᾶτος· Ὃ γέγραφα γέγραφα.
translation:
  text: Pilate answered, “What I have written, I have written.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What I wrote, I wrote.” The Greek uses the perfect tense twice, which
      can stress the enduring finality of what Pilate has written.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι commonly means 'answered'
    or 'replied.' 'Answered' is the standard and natural English rendering in narrative
    dialogue.
- source_word: ὁ Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Proper name with article used in Greek narrative style; standard English
    omits the article and transliterates the name.
- source_word: Ὃ
  chosen: What
  alternatives:
  - That which
  - Whatsoever
  lexicon: BDAG
  rationale: 'Neuter singular relative pronoun functioning substantivally: ''what/that
    which.'' ''What'' is idiomatic modern English and preserves the sense without
    unnecessary stiffness.'
- source_word: γέγραφα
  chosen: I have written
  alternatives:
  - I wrote
  - I have inscribed
  lexicon: BDAG
  rationale: Perfect active indicative of γράφω. The perfect emphasizes the completed
    act with abiding result, which English present perfect captures better than simple
    past here. Repeating the same English phrase preserves the emphatic repetition
    of the Greek.
