theological_decisions:
- issue: Relation between Jesus' knowledge, the completion of all things, and the
    fulfillment of Scripture
  chosen_reading: The verse states that Jesus knew all things had already been completed,
    and then he spoke in order that the Scripture might be fulfilled.
  alternative_readings:
  - The clause may be read as Jesus knowing this and speaking with the result that
    Scripture was fulfilled, without specifying a broader theological system.
  rationale: The translation preserves the syntax and theological tension of the Greek
    without importing a more developed doctrinal explanation about divine foreknowledge
    or predestination. It also preserves the distinction between τετέλεσται ('had
    been completed') and τελειωθῇ ('might be fulfilled/completed').
  doctrine_reference: Preserve theological tension rather than resolve it.
