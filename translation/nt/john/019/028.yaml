id: JHN.19.28
reference: John 19:28
source:
  edition: SBLGNT
  text: Μετὰ τοῦτο ⸀εἰδὼς ὁ Ἰησοῦς ὅτι ⸂ἤδη πάντα⸃ τετέλεσται ἵνα τελειωθῇ ἡ γραφὴ
    λέγει· Διψῶ.
translation:
  text: After this, Jesus, knowing that all things had already been completed, so
    that the Scripture might be fulfilled, said, “I am thirsty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “I thirst.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ τοῦτο
  chosen: After this
  alternatives:
  - Afterward
  - After these things
  lexicon: BDAG
  rationale: A natural temporal transition in English. 'After this' preserves the
    singular demonstrative τοῦτο and fits Johannine narrative style without sounding
    wooden.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - being aware
  - having known
  lexicon: BDAG
  rationale: The participle is best rendered as a contemporaneous circumstantial participle
    modifying Jesus. 'Knowing' is concise and natural.
- source_word: ἤδη πάντα τετέλεσται
  chosen: all things had already been completed
  alternatives:
  - everything had already been finished
  - all was already accomplished
  lexicon: BDAG
  rationale: τετέλεσται is perfect, indicating a completed state. 'Had already been
    completed' conveys prior completion relative to the following speech. 'All things'
    reflects πάντα explicitly, though idiomatic English could also use 'everything.'
- source_word: ἵνα τελειωθῇ
  chosen: so that ... might be fulfilled
  alternatives:
  - in order that ... might be completed
  - so that ... might be brought to completion
  lexicon: BDAG
  rationale: Although τελειωθῇ is cognate with τετέλεσται and literally relates to
    completion, with ἡ γραφή as subject the idiomatic and contextually appropriate
    English is 'be fulfilled,' matching scriptural-fulfillment usage while preserving
    the purpose/result nuance of ἵνα.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - the scripture
  - the writing
  lexicon: BDAG
  rationale: γραφή in John commonly refers to sacred Scripture. Capitalizing 'Scripture'
    signals this recognized referent in English.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Greek historical present is commonly rendered with an English past tense
    in narrative for natural readability. This is a documented, context-driven exception
    to formal tense matching.
- source_word: Διψῶ
  chosen: I am thirsty
  alternatives:
  - I thirst
  lexicon: BDAG
  rationale: The present indicative expresses Jesus' thirst. 'I am thirsty' is clear
    modern English and fits the project's readability aims. 'I thirst' is more formal/traditional
    and worth preserving in a footnote.
