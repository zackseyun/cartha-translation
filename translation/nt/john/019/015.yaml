id: JHN.19.15
reference: John 19:15
source:
  edition: SBLGNT
  text: ⸂ἐκραύγασαν οὖν ἐκεῖνοι⸃· Ἆρον ἆρον, σταύρωσον αὐτόν. λέγει αὐτοῖς ὁ Πιλᾶτος·
    Τὸν βασιλέα ὑμῶν σταυρώσω; ἀπεκρίθησαν οἱ ἀρχιερεῖς· Οὐκ ἔχομεν βασιλέα εἰ μὴ
    Καίσαρα.
translation:
  text: So they cried out, “Away with him, away with him! Crucify him!” Pilate said
    to them, “Shall I crucify your king?” The chief priests answered, “We have no
    king except Caesar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “We have no king but Caesar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκραύγασαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they screamed
  lexicon: BDAG
  rationale: κραυγάζω denotes a loud outcry or shout. 'Cried out' preserves the intensity
    without over-specifying emotional tone.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: οὖν marks narrative consequence or progression here. 'So' is natural
    modern English and preserves the inferential flow.
- source_word: ἐκεῖνοι
  chosen: they
  alternatives:
  - those men
  - those people
  lexicon: BDAG
  rationale: The demonstrative adds emphasis ('those ones'), but in idiomatic English
    the subject pronoun sufficiently carries the sense in this narrative context.
- source_word: Ἆρον ἆρον
  chosen: Away with him, away with him
  alternatives:
  - Take him away, take him away
  - Remove him, remove him
  lexicon: BDAG
  rationale: The repeated aorist imperative of αἴρω here is an idiomatic cry for removal.
    'Away with him' is the most natural and forceful English equivalent in this judicial
    setting; the object 'him' is supplied from context and made explicit for clarity.
- source_word: σταύρωσον αὐτόν
  chosen: Crucify him
  alternatives:
  - Impale him
  lexicon: BDAG
  rationale: σταυρόω in the Roman execution context is best rendered 'crucify.' This
    is the standard and historically appropriate gloss.
- source_word: λέγει αὐτοῖς ὁ Πιλᾶτος
  chosen: Pilate said to them
  alternatives:
  - Pilate says to them
  lexicon: BDAG
  rationale: λέγει is a historical present, common in narrative. English normally
    shifts this to simple past for readability while preserving the discourse function.
- source_word: Τὸν βασιλέα ὑμῶν
  chosen: your king
  alternatives:
  - the king of you
  lexicon: BDAG
  rationale: The accusative object with possessive pronoun is naturally rendered 'your
    king.' The wording preserves Pilate's pointed irony and challenge.
- source_word: σταυρώσω
  chosen: Shall I crucify
  alternatives:
  - Am I to crucify
  - Should I crucify
  lexicon: BDAG
  rationale: The deliberative subjunctive is well represented by 'Shall I crucify...?'
    in English, preserving the rhetorical force of Pilate's question.
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is straightforward and idiomatic.
- source_word: οἱ ἀρχιερεῖς
  chosen: The chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: ἀρχιερεῖς in the plural refers to the leading priestly authorities, conventionally
    and accurately rendered 'chief priests.'
- source_word: Οὐκ ἔχομεν βασιλέα εἰ μὴ Καίσαρα
  chosen: We have no king except Caesar
  alternatives:
  - We have no king but Caesar
  lexicon: BDAG
  rationale: 'εἰ μὴ expresses exception: ''except.'' ''Except Caesar'' is slightly
    more transparent in modern English, while preserving the exclusivity of the claim.'
