theological_decisions:
- issue: Rendering the chief priests' declaration of political allegiance
  chosen_reading: We have no king except Caesar
  alternative_readings:
  - We have no king but Caesar
  rationale: The verse presents a stark rejection of any rival kingship in the immediate
    narrative context. The translation preserves the force of the statement without
    importing broader theological conclusions beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
