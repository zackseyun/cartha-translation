id: JHN.19.41
reference: John 19:41
source:
  edition: SBLGNT
  text: ἦν δὲ ἐν τῷ τόπῳ ὅπου ἐσταυρώθη κῆπος, καὶ ἐν τῷ κήπῳ μνημεῖον καινόν, ἐν
    ᾧ οὐδέπω οὐδεὶς ⸂ἦν τεθειμένος⸃·
translation:
  text: Now in the place where he was crucified there was a garden, and in the garden
    a new tomb, in which no one had yet been laid.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered as 'Now' to mark a mild narrative transition in natural English
    without overstating contrast.
- source_word: τόπῳ
  chosen: place
  alternatives:
  - location
  - spot
  lexicon: BDAG
  rationale: '''Place'' is the straightforward and idiomatic rendering for τόπος in
    this narrative setting.'
- source_word: ὅπου ἐσταυρώθη
  chosen: where he was crucified
  alternatives:
  - where they crucified him
  lexicon: BDAG
  rationale: The passive ἐσταυρώθη is most naturally rendered 'he was crucified.'
    English can supply the pronoun from context. 'Where they crucified him' is possible
    as a dynamic equivalent but is less formally aligned with the Greek passive.
- source_word: κῆπος
  chosen: garden
  alternatives:
  - orchard
  lexicon: BDAG
  rationale: κῆπος ordinarily denotes a garden. 'Orchard' is too specific here.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - burial tomb
  lexicon: BDAG
  rationale: In Johannine burial context, μνημεῖον is best rendered 'tomb,' not merely
    'grave,' since the setting is a burial place into which a body may be laid.
- source_word: καινόν
  chosen: new
  alternatives:
  - fresh
  - unused
  lexicon: BDAG
  rationale: The adjective means 'new.' The following clause explains the practical
    sense that it was unused, so that nuance should not be imported into the adjective
    itself.
- source_word: ἐν ᾧ
  chosen: in which
  alternatives:
  - wherein
  - where
  lexicon: BDAG
  rationale: A clear and natural rendering of the relative phrase referring back to
    the tomb.
- source_word: οὐδέπω
  chosen: yet
  alternatives:
  - not yet
  - up to this point
  lexicon: BDAG
  rationale: Combined with οὐδείς and the verbal phrase, 'had yet been laid' gives
    idiomatic English while preserving the temporal force.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: '''No one'' is the most natural formal-modern English equivalent.'
- source_word: ἦν τεθειμένος
  chosen: had been laid
  alternatives:
  - had been placed
  - was lying
  lexicon: BDAG
  rationale: 'The periphrastic pluperfect conveys a prior completed state: no one
    had yet been laid there. ''Laid'' fits burial context better than the more generic
    ''placed.'''
