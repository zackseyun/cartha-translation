theological_decisions:
- issue: Burial-context wording for μνημεῖον and τεθειμένος
  chosen_reading: tomb ... had yet been laid
  alternative_readings:
  - grave ... had yet been placed
  rationale: The verse is descriptive rather than doctrinal, but burial terminology
    should reflect the concrete setting of Jesus' entombment without adding theological
    interpretation. 'Tomb' and 'laid' preserve the narrative's funerary context accurately
    and naturally.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Voice of ἐσταυρώθη
  chosen_reading: he was crucified
  alternative_readings:
  - they crucified him
  rationale: Using the passive preserves the Greek form and avoids adding an explicit
    human subject not stated in this clause. This keeps the translation close to the
    source while remaining idiomatic.
  doctrine_reference: Translation philosophy §1
