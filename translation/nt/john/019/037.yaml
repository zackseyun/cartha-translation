id: JHN.19.37
reference: John 19:37
source:
  edition: SBLGNT
  text: καὶ πάλιν ἑτέρα γραφὴ λέγει· Ὄψονται εἰς ὃν ἐξεκέντησαν.
translation:
  text: And again another Scripture says, “They will look on the one whom they pierced.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “They will look to him whom they pierced.” The Greek construction can
      be rendered either with 'on' or 'to,' and the wording echoes Zechariah 12:10.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: again
  alternatives:
  - in turn
  - further
  lexicon: BDAG
  rationale: Adverb marking an additional scriptural citation; 'again' is the natural
    English connective here.
- source_word: ἑτέρα γραφή
  chosen: another Scripture
  alternatives:
  - another passage of Scripture
  - a different Scripture
  lexicon: BDAG
  rationale: γραφή in Johannine usage commonly refers to Scripture. ἑτέρα here introduces
    an additional scriptural witness; 'another Scripture' is concise and idiomatic.
- source_word: λέγει
  chosen: says
  alternatives:
  - reads
  - declares
  lexicon: BDAG
  rationale: Present tense is conventionally used for scriptural citation in English
    as in Greek; 'says' preserves the vivid citation formula.
- source_word: Ὄψονται
  chosen: they will look on
  alternatives:
  - they will see
  - they will gaze on
  lexicon: BDAG
  rationale: Future middle of ὁράω here in citation context points to directed looking
    rather than mere visual perception. 'Look on' fits the following εἰς and echoes
    the prophetic source without becoming archaic.
- source_word: εἰς ὃν
  chosen: on the one whom
  alternatives:
  - to him whom
  - upon the one whom
  lexicon: BDAG
  rationale: Although εἰς often means 'into/to,' in this idiom after a verb of seeing
    it conveys direction toward a person. 'On the one whom' is idiomatic English and
    preserves the personal object.
- source_word: ἐξεκέντησαν
  chosen: they pierced
  alternatives:
  - they stabbed
  - they transfixed
  lexicon: BDAG
  rationale: Aorist active referring to the act of piercing. 'Pierced' is the standard
    and clearest rendering, matching both the immediate crucifixion context and the
    prophetic allusion.
