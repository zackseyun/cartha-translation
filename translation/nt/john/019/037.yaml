theological_decisions:
- issue: Rendering the Zechariah allusion in a way that preserves Johannine Christological
    force without importing extra wording from the Hebrew or LXX source
  chosen_reading: They will look on the one whom they pierced
  alternative_readings:
  - They will look on him whom they pierced
  - They will look to the one whom they pierced
  rationale: John's Greek wording should govern the translation of this verse itself.
    'The one whom' makes the relative clause explicit and natural in English while
    preserving the identification of the pierced one with Jesus in context. It avoids
    importing a more explicit divine first-person formulation from Zechariah 12:10
    into John's wording, while still leaving the theological implication intact.
  doctrine_reference: Translation philosophy §§1, 3
