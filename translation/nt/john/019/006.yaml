id: JHN.19.6
reference: John 19:6
source:
  edition: SBLGNT
  text: ὅτε οὖν εἶδον αὐτὸν οἱ ἀρχιερεῖς καὶ οἱ ὑπηρέται ἐκραύγασαν λέγοντες· Σταύρωσον
    ⸀σταύρωσον. λέγει αὐτοῖς ὁ Πιλᾶτος· Λάβετε αὐτὸν ὑμεῖς καὶ σταυρώσατε, ἐγὼ γὰρ
    οὐχ εὑρίσκω ἐν αὐτῷ αἰτίαν.
translation:
  text: So when the chief priests and the officers saw him, they cried out, saying,
    “Crucify him! Crucify him!” Pilate said to them, “You take him and crucify him,
    for I find no charge against him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Take him yourselves and crucify him.” The Greek explicitly includes
      “you,” adding emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, “I find no fault in him.” The Greek term can mean a legal charge or
      basis for accusation; here the judicial sense is primary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε οὖν
  chosen: So when
  alternatives:
  - Therefore when
  - When then
  lexicon: BDAG
  rationale: Combines temporal ὅτε ('when') with inferential/continuative οὖν in natural
    English. 'So when' preserves both the narrative flow and the causal progression
    without sounding wooden.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard rendering for the plural referring to the Jerusalem priestly
    leadership, not a single high priest. 'Chief priests' is both accurate and idiomatic.
- source_word: ὑπηρέται
  chosen: officers
  alternatives:
  - temple servants
  - guards
  lexicon: BDAG
  rationale: In Johannine context this commonly refers to subordinate officials attached
    to the Jewish authorities. 'Officers' preserves the institutional sense without
    over-specifying 'temple' where the verse itself does not.
- source_word: ἐκραύγασαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they screamed
  lexicon: BDAG
  rationale: Conveys a loud public outcry. 'Cried out' is strong and natural, and
    fits the judicial mob setting.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: A participle of attendant manner introducing the content of the cry.
    'Saying' keeps close to the Greek while remaining readable.
- source_word: Σταύρωσον σταύρωσον
  chosen: Crucify him! Crucify him!
  alternatives:
  - Crucify! Crucify!
  lexicon: BDAG
  rationale: English normally supplies the object for clarity, since the Greek imperative's
    object is contextually obvious from αὐτόν earlier in the clause. Repetition is
    preserved for rhetorical force.
- source_word: Λάβετε αὐτὸν ὑμεῖς
  chosen: You take him
  alternatives:
  - Take him yourselves
  - You yourselves take him
  lexicon: BDAG
  rationale: The explicit ὑμεῖς is emphatic. 'You take him' preserves that emphasis
    in concise modern English; the sense of contrast with Pilate is maintained. An
    alternative with 'yourselves' is viable and preserved in a footnote.
- source_word: σταυρώσατε
  chosen: crucify him
  alternatives:
  - put him on a cross
  lexicon: BDAG
  rationale: Direct rendering of the aorist imperative. 'Crucify him' is the established
    and precise English equivalent.
- source_word: αἰτίαν
  chosen: charge
  alternatives:
  - case
  - grounds for accusation
  - fault
  lexicon: BDAG
  rationale: In this legal setting αἰτία refers to a charge or basis for accusation.
    'Charge' best fits Pilate's judicial declaration. 'Fault' is traditional but less
    specifically forensic.
