theological_decisions:
- issue: Pilate's declaration of Jesus' innocence
  chosen_reading: I find no charge against him
  alternative_readings:
  - I find no fault in him
  rationale: The verse presents a legal assessment, not a broader theological statement.
    Rendering αἰτία as 'charge' preserves the forensic nuance and avoids importing
    later doctrinal formulations while still reflecting Jesus' innocence in the immediate
    judicial context.
  doctrine_reference: Translation philosophy §§1, 3, 6
