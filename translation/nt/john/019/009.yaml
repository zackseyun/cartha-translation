- issue: Referent of the implied subject
  chosen_reading: Render the implied subject as 'he,' with context indicating Pilate.
  alternative_readings:
  - Explicitly supply 'Pilate' in the main text
  rationale: The Greek leaves the subject implicit, but the narrative context clearly
    identifies Pilate. Using 'he' follows the source text more closely while remaining
    clear in context.
