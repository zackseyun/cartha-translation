id: JHN.19.9
reference: John 19:9
source:
  edition: SBLGNT
  text: καὶ εἰσῆλθεν εἰς τὸ πραιτώριον πάλιν καὶ λέγει τῷ Ἰησοῦ· Πόθεν εἶ σύ; ὁ δὲ
    Ἰησοῦς ἀπόκρισιν οὐκ ἔδωκεν αὐτῷ.
translation:
  text: And he went into the governor’s headquarters again and said to Jesus, “Where
    are you from?” But Jesus gave him no answer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'praetorium,' the Roman governor’s official residence or headquarters.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: went into
  alternatives:
  - entered
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι denotes movement into a place. 'Went into' is natural
    modern English; 'entered' is possible but slightly more formal.
- source_word: πραιτώριον
  chosen: governor’s headquarters
  alternatives:
  - praetorium
  - governor’s residence
  - palace
  lexicon: BDAG
  rationale: πραιτώριον refers to the Roman governor’s official residence/headquarters.
    'Governor’s headquarters' communicates the function clearly in modern English
    without relying on the less transparent loanword 'praetorium.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb marks repeated action; 'again' is the most straightforward
    rendering.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    commonly shifts this to simple past for readability. This preserves sense without
    awkwardness.
- source_word: Πόθεν
  chosen: Where ... from
  alternatives:
  - From where
  lexicon: BDAG
  rationale: Πόθεν asks about origin or source. 'Where are you from?' is idiomatic
    English and preserves the question of origin.
- source_word: ἀπόκρισιν
  chosen: answer
  alternatives:
  - reply
  - response
  lexicon: BDAG
  rationale: 'ἀπόκρισις means an answer or reply. ''Answer'' fits the idiom with ἔδωκεν
    (''gave'') in English: ''gave him no answer.'''
- source_word: οὐκ ἔδωκεν αὐτῷ
  chosen: gave him no answer
  alternatives:
  - did not answer him
  - gave no reply to him
  lexicon: BDAG
  rationale: The Greek is literally 'did not give him an answer.' 'Gave him no answer'
    preserves the verbal imagery while remaining natural English.
- source_word: καὶ ... καὶ ... δὲ
  chosen: And ... and ... But
  alternatives:
  - And ... and ... and
  - Then ... and ... but
  lexicon: BDAG
  rationale: The conjunctions structure the narrative flow. Rendering δέ as 'But'
    highlights the contrast between Pilate’s question and Jesus’ silence, which is
    contextually appropriate.
