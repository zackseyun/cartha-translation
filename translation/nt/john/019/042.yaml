id: JHN.19.42
reference: John 19:42
source:
  edition: SBLGNT
  text: ἐκεῖ οὖν διὰ τὴν παρασκευὴν τῶν Ἰουδαίων, ὅτι ἐγγὺς ἦν τὸ μνημεῖον, ἔθηκαν
    τὸν Ἰησοῦν.
translation:
  text: So there, because of the Jews’ day of preparation, since the tomb was nearby,
    they laid Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the Jewish day of preparation' or 'because it was the Preparation
      of the Jews.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Locative adverb indicating the place of burial. 'There' is natural English
    and preserves the spatial reference without expansion.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the preceding context. 'So'
    is concise, natural modern English that preserves the connective force better
    than omitting it.
- source_word: διὰ τὴν παρασκευὴν
  chosen: because of ... day of preparation
  alternatives:
  - on account of ... Preparation
  - because it was the Preparation
  lexicon: BDAG
  rationale: διά with the accusative expresses reason or cause. παρασκευή can function
    as a technical term for the day of preparation before a Sabbath or feast. Rendering
    it 'day of preparation' makes the sense clear to modern readers while preserving
    the historical term.
- source_word: τῶν Ἰουδαίων
  chosen: the Jews’
  alternatives:
  - of the Jews
  - Jewish
  lexicon: BDAG
  rationale: Genitive modifying 'day of preparation.' The possessive form is idiomatic
    English. 'Jewish' is possible, but 'the Jews’ day of preparation' more closely
    reflects the Greek construction and avoids over-interpreting whether John means
    ethnic, religious, or customary association.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - for
  lexicon: BDAG
  rationale: Introduces the explanatory reason for choosing that tomb. 'Since' reads
    smoothly in English and preserves the causal nuance.
- source_word: ἐγγὺς
  chosen: nearby
  alternatives:
  - near
  - close
  lexicon: BDAG
  rationale: Adverb describing the tomb's proximity. 'Nearby' is idiomatic with 'was'
    in English.
- source_word: μνημεῖον
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: In this burial context, 'tomb' is the clearest and most standard rendering
    for a burial place cut or prepared for interment. 'Grave' is less precise for
    the Johannine setting.
- source_word: ἔθηκαν
  chosen: they laid
  alternatives:
  - they placed
  - they put
  lexicon: BDAG
  rationale: Aorist active of τίθημι here refers to placing Jesus' body in the tomb.
    'Laid' fits burial context better than the more generic 'put' or 'placed'.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Direct object of the verb. Standard transliteration of the personal name
    per project philosophy.
