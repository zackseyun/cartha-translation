theological_decisions:
- issue: Rendering παρασκευή in a Passion context
  chosen_reading: day of preparation
  alternative_readings:
  - Preparation
  rationale: The Greek term can function almost as a fixed calendrical label, and
    some translations capitalize it. The chosen rendering explains the term for modern
    readers without requiring prior familiarity, while not importing a more specific
    doctrinal or calendrical claim than the text itself states.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Rendering τῶν Ἰουδαίων in Johannine narrative
  chosen_reading: the Jews’ day of preparation
  alternative_readings:
  - the Jewish day of preparation
  - the Preparation of the Jews
  rationale: This keeps the Greek wording visible and avoids softening or sharpening
    John's expression beyond the text. It refers here to the Jewish preparatory day
    in context, not to a theological judgment about Jewish people.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
