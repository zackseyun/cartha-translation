id: JHN.19.31
reference: John 19:31
source:
  edition: SBLGNT
  text: Οἱ οὖν Ἰουδαῖοι, ⸂ἐπεὶ παρασκευὴ ἦν, ἵνα μὴ μείνῃ ἐπὶ τοῦ σταυροῦ τὰ σώματα
    ἐν τῷ σαββάτῳ⸃, ἦν γὰρ μεγάλη ἡ ἡμέρα ἐκείνου τοῦ σαββάτου, ἠρώτησαν τὸν Πιλᾶτον
    ἵνα κατεαγῶσιν αὐτῶν τὰ σκέλη καὶ ἀρθῶσιν.
translation:
  text: Therefore the Jews, because it was the day of preparation, asked Pilate that
    the bodies might not remain on the cross on the Sabbath—for that Sabbath day was
    a great one—and that their legs might be broken and they might be taken away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Preparation Day.' The term refers to the day of preparation before the
      Sabbath.
    reason: lexical_alternative
  - marker: b
    text: Or 'for that Sabbath was a high day,' meaning an especially significant
      Sabbath.
    reason: alternative_reading
  - marker: c
    text: '''The Jews'' could in Johannine context sometimes refer more specifically
      to the Judean authorities or leaders.'
    reason: alternative_reading
  - marker: d
    text: Or 'and removed' or 'and taken down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ οὖν Ἰουδαῖοι
  chosen: Therefore the Jews
  alternatives:
  - So the Jews
  - Then the Jewish leaders
  lexicon: BDAG
  rationale: οὖν is inferential/sequential, here naturally rendered 'therefore.' Ἰουδαῖοι
    in John can mean Judeans or Jewish authorities in some contexts, but here the
    broader group acting in relation to Pilate is adequately represented by the conventional
    'the Jews.' 'Jewish leaders' would be more interpretive than the text states.
- source_word: ἐπεὶ παρασκευὴ ἦν
  chosen: because it was the day of preparation
  alternatives:
  - since it was Preparation
  - because it was Preparation Day
  lexicon: BDAG
  rationale: παρασκευή refers to the day of preparation before the Sabbath. Rendering
    with 'the day of preparation' makes the sense clear in modern English while staying
    close to the Greek. Capitalized 'Preparation' is possible but less transparent
    for general readers.
- source_word: ἵνα μὴ μείνῃ ... τὰ σώματα
  chosen: that the bodies might not remain
  alternatives:
  - so that the bodies would not stay
  - in order that the bodies might not remain
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'Might not remain' preserves
    the purposive nuance without sounding wooden.
- source_word: ἐπὶ τοῦ σταυροῦ
  chosen: on the cross
  alternatives:
  - upon the cross
  lexicon: BDAG
  rationale: Standard locative sense of ἐπί with the genitive in this context. 'On
    the cross' is idiomatic and accurate.
- source_word: ἐν τῷ σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - during the Sabbath
  lexicon: BDAG
  rationale: Temporal ἐν is naturally rendered 'on' in English for a day reference.
- source_word: ἦν γὰρ μεγάλη ἡ ἡμέρα ἐκείνου τοῦ σαββάτου
  chosen: for that Sabbath day was a great one
  alternatives:
  - for that Sabbath was a high day
  - for the day of that Sabbath was important
  lexicon: BDAG
  rationale: μεγάλη literally means 'great.' Traditional 'high day' is interpretive
    and ecclesiastical; 'great one' preserves the source wording while conveying that
    this Sabbath had special significance. The explanatory force is retained by the
    dash in English style.
- source_word: ἠρώτησαν τὸν Πιλᾶτον
  chosen: asked Pilate
  alternatives:
  - requested of Pilate
  - asked Pilate for permission
  lexicon: BDAG
  rationale: ἠρώτησαν here means to ask/request. 'Asked Pilate' is concise and sufficient;
    'for permission' is implied by context but not explicit.
- source_word: ἵνα κατεαγῶσιν αὐτῶν τὰ σκέλη
  chosen: that their legs might be broken
  alternatives:
  - that the legs of them might be broken
  lexicon: BDAG
  rationale: κατάγνυμι means to break, here specifically the legs of the crucified.
    Passive rendering reflects the Greek passive subjunctive.
- source_word: καὶ ἀρθῶσιν
  chosen: and they might be taken away
  alternatives:
  - and removed
  - and taken down
  lexicon: BDAG
  rationale: αἴρω can mean lift, take away, remove. In this crucifixion context, the
    sense is removal of the bodies from the cross. 'Taken away' is broad and natural;
    'taken down' is possible but slightly more specific than the verb itself.
