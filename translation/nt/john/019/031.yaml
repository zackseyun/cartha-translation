theological_decisions:
- issue: Meaning of μεγάλη for the Sabbath
  chosen_reading: Rendered literally as 'a great one' rather than the traditional
    'a high day.'
  alternative_readings:
  - a high day
  - an especially important Sabbath
  rationale: The verse explains the urgency by noting the special significance of
    that Sabbath. A literal rendering avoids importing later ecclesiastical phrasing
    while still allowing readers to infer heightened importance. This is a lexical-contextual
    decision, not a doctrinal one.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Readable modern English, not archaic or academic.'
- issue: Referent of Ἰουδαῖοι in John
  chosen_reading: Rendered as 'the Jews' in the main text.
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: John's use of Ἰουδαῖοι varies by context. Here the text itself does not
    explicitly narrow the referent to leaders only, so the less interpretive rendering
    is kept in the main text. An alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
