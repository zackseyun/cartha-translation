theological_decisions:
- issue: Nature of the relationship established between the disciple and Jesus' mother
  chosen_reading: Render the statement straightforwardly as a new filial relationship
    and practical care without importing later doctrinal claims about Mary or ecclesial
    symbolism.
  alternative_readings:
  - A primarily symbolic designation of Mary as mother of all disciples
  - A reading focused exclusively on legal guardianship
  rationale: The verse plainly presents Jesus entrusting his mother to the disciple
    and the disciple receiving her into his own home. The translation should preserve
    that direct sense without resolving broader theological interpretations not explicit
    in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
