id: JHN.19.27
reference: John 19:27
source:
  edition: SBLGNT
  text: εἶτα λέγει τῷ μαθητῇ· ⸀Ἴδε ἡ μήτηρ σου. καὶ ἀπ’ ἐκείνης τῆς ὥρας ἔλαβεν ὁ
    μαθητὴς αὐτὴν εἰς τὰ ἴδια.
translation:
  text: Then he said to the disciple, “Look, your mother.” And from that hour the
    disciple took her into his own home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, your mother.”
    reason: lexical_alternative
  - marker: b
    text: Greek “into his own [things],” that is, into his own home or household.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  chosen: Then
  alternatives:
  - After that
  lexicon: BDAG
  rationale: Marks the next step in the narrative sequence. 'Then' is concise and
    natural in English while preserving the temporal progression.
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, English narrative style
    more naturally renders it as a past tense here. This is a standard optimal-equivalence
    adjustment that preserves discourse function rather than Greek tense-form.
- source_word: τῷ μαθητῇ
  chosen: to the disciple
  alternatives:
  - to his disciple
  lexicon: BDAG
  rationale: The Greek has the article with 'disciple' and does not explicitly include
    'his.' In Johannine context this refers to the disciple Jesus loved, but the text
    here simply says 'the disciple,' so that wording is preserved.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: An imperative drawing attention. 'Look' preserves the force in readable
    modern English better than the archaic 'Behold,' while 'See' can sound less direct
    in this vocative-like setting.
- source_word: ἡ μήτηρ σου
  chosen: your mother
  alternatives:
  - your mother!
  lexicon: BDAG
  rationale: 'A verbless exclamation identifying a new relational reality: ''your
    mother.'' English idiom does not require an explicit copula. The possessive is
    retained directly.'
- source_word: ἀπ’ ἐκείνης τῆς ὥρας
  chosen: from that hour
  alternatives:
  - from that time
  - from that moment
  lexicon: BDAG
  rationale: A fairly literal rendering of the temporal expression. 'Hour' preserves
    Johannine diction and the source wording, while still being understandable in
    English.
- source_word: ἔλαβεν
  chosen: took
  alternatives:
  - received
  lexicon: BDAG
  rationale: λαμβάνω can mean 'take' or 'receive.' In this context of taking Mary
    into his care/household, 'took' better fits the following phrase and the concrete
    action.
- source_word: αὐτὴν
  chosen: her
  lexicon: BDAG
  rationale: Direct object referring to Jesus' mother; straightforward pronominal
    rendering.
- source_word: εἰς τὰ ἴδια
  chosen: into his own home
  alternatives:
  - to his own things
  - into his own household
  - to his own home
  lexicon: BDAG
  rationale: The idiom literally means 'into his own [things/possessions/domain]'
    and in context refers to taking her into his own household or home. 'Into his
    own home' communicates the sense clearly in modern English without flattening
    the personal responsibility implied.
