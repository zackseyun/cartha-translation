id: JHN.19.11
reference: John 19:11
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀αὐτῷ Ἰησοῦς· Οὐκ εἶχες ἐξουσίαν ⸂κατ’ ἐμοῦ οὐδεμίαν⸃ εἰ μὴ ἦν ⸂δεδομένον
    σοι⸃ ἄνωθεν· διὰ τοῦτο ὁ ⸀παραδούς μέ σοι μείζονα ἁμαρτίαν ἔχει.
translation:
  text: Jesus answered him, “You would have no authority over me at all unless it
    had been given to you from above. Therefore the one who handed me over to you
    has the greater sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from heaven." The Greek says "from above," which in John often points
      to a divine source.
    reason: lexical_alternative
  - marker: b
    text: The one who handed Jesus over is not explicitly identified here; interpreters
      variously understand this as Judas, Caiaphas, or the Jewish leadership more
      broadly.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: '"Authority" best fits Pilate’s delegated governing jurisdiction in context.
    "Power" can sound merely forceful, while "right" is too narrow.'
- source_word: κατ’ ἐμοῦ οὐδεμίαν
  chosen: over me at all
  alternatives:
  - against me in no way
  - no authority against me
  lexicon: BDAG
  rationale: With ἐξουσία and κατά + genitive in this judicial setting, idiomatic
    English is "authority over me." "At all" conveys the emphatic οὐδεμίαν.
- source_word: δεδομένον σοι
  chosen: had been given to you
  alternatives:
  - were given to you
  - was granted to you
  lexicon: BDAG
  rationale: The periphrastic sense is naturally rendered as a past perfect in English,
    indicating prior divine granting relative to Pilate’s present authority.
- source_word: ἄνωθεν
  chosen: from above
  alternatives:
  - from heaven
  - from the top
  - again
  lexicon: BDAG
  rationale: In Johannine usage ἄνωθεν commonly carries the sense "from above," and
    here refers to divine source. "From heaven" is interpretively stronger; "again"
    is not suitable in this context.
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: BDAG
  rationale: '"Therefore" gives a natural inferential connection in English while
    preserving the causal-logical force of the phrase.'
- source_word: ὁ παραδούς
  chosen: the one who handed me over
  alternatives:
  - the one who delivered me over
  - my betrayer
  lexicon: BDAG
  rationale: '"Handed me over" is the standard contextual sense of παραδίδωμι in passion
    narratives and avoids prematurely narrowing the referent to Judas alone with "my
    betrayer."'
- source_word: μείζονα ἁμαρτίαν
  chosen: the greater sin
  alternatives:
  - a greater sin
  lexicon: BDAG
  rationale: The comparative adjective with anarthrous noun is well represented by
    the idiomatic English definite expression "the greater sin," comparing degrees
    of culpability between parties in context.
