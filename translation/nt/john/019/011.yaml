theological_decisions:
- issue: Source of Pilate’s authority implied by ἄνωθεν
  chosen_reading: Pilate’s authority is presented as given by God/from above, without
    specifying a full doctrine of political legitimacy beyond this case.
  alternative_readings:
  - from heaven
  - from above in a more general sense
  rationale: The verse clearly grounds Pilate’s authority in a higher divine source,
    but the translation avoids expanding this into a broader political theology not
    explicitly stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of ὁ παραδούς μέ σοι
  chosen_reading: Rendered generically as "the one who handed me over to you" without
    identifying the referent in the main text.
  alternative_readings:
  - Judas
  - Caiaphas
  - the Jewish leadership collectively
  rationale: The Greek does not explicitly name the referent here. A generic rendering
    preserves the ambiguity rather than resolving a debated identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
