theological_decisions:
- issue: Rendering of the Semitic language reference Ἑβραϊστί
  chosen_reading: in Hebrew
  alternative_readings:
  - in Aramaic
  rationale: The Greek text explicitly says 'in Hebrew,' so the main text preserves
    that wording. Because John's usage may refer more broadly to the local Semitic
    vernacular, often understood as Aramaic, the alternative is preserved in a footnote
    rather than replacing the source-language form.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
