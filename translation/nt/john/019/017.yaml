id: JHN.19.17
reference: John 19:17
source:
  edition: SBLGNT
  text: καὶ βαστάζων ⸂αὑτῷ τὸν σταυρὸν⸃ ἐξῆλθεν εἰς ⸀τὸν λεγόμενον Κρανίου Τόπον,
    ⸀ὃ λέγεται Ἑβραϊστὶ Γολγοθα,
translation:
  text: And carrying his own cross, he went out to the place called Skull Place, which
    in Hebrew is called Golgotha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'in Aramaic.' John's term 'in Hebrew' can refer to the local
      Semitic language of Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαστάζων
  chosen: carrying
  alternatives:
  - bearing
  lexicon: BDAG
  rationale: The participle denotes physically carrying or bearing. 'Carrying' is
    more natural modern English while preserving the concrete action.
- source_word: αὑτῷ τὸν σταυρόν
  chosen: his own cross
  alternatives:
  - the cross for himself
  - his cross
  lexicon: BDAG
  rationale: 'The reflexive dative with the object naturally conveys possession/emphasis:
    Jesus was carrying the cross himself. ''His own cross'' captures the reflexive
    force idiomatically without overexplaining.'
- source_word: σταυρός
  chosen: cross
  alternatives:
  - crossbeam
  lexicon: BDAG
  rationale: The standard sense in the passion context is 'cross.' While some argue
    for 'crossbeam' historically, the Greek term itself here does not require that
    narrower rendering, and 'cross' is the clearest established equivalent.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he went forth
  lexicon: BDAG
  rationale: The aorist verb means to go out. 'Went out' is accurate and readable
    modern English.
- source_word: τὸν λεγόμενον Κρανίου Τόπον
  chosen: the place called Skull Place
  alternatives:
  - the place called Place of a Skull
  - the so-called Skull Place
  lexicon: BDAG
  rationale: The Greek literally means 'the place called Place of a Skull' or 'Skull
    Place.' 'Skull Place' preserves the lexical sense of κρανίον ('skull') and τόπος
    ('place') in natural English. It avoids importing the traditional phrasing where
    the Greek expression is more straightforwardly appositional.
- source_word: Κρανίου
  chosen: Skull
  alternatives:
  - a skull
  - the skull
  lexicon: BDAG
  rationale: The genitive singular functions attributively in the place-name expression.
    English place-name style is best represented by the bare attributive 'Skull' rather
    than a more cumbersome genitival phrase.
- source_word: ὃ λέγεται
  chosen: which is called
  alternatives:
  - which is said
  - which is named
  lexicon: BDAG
  rationale: A standard passive naming formula; 'which is called' is the most direct
    equivalent.
- source_word: Ἑβραϊστί
  chosen: in Hebrew
  alternatives:
  - in Aramaic
  lexicon: BDAG
  rationale: John's adverb conventionally means 'in Hebrew' in the text, though in
    first-century usage it may refer to the local Semitic language, likely Aramaic.
    The main text follows the Greek wording; the linguistic nuance is preserved in
    a footnote.
- source_word: Γολγοθα
  chosen: Golgotha
  lexicon: BDAG
  rationale: This is a proper place-name and should be transliterated per the translation
    philosophy.
