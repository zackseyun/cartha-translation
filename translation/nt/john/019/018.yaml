theological_decisions:
- issue: Whether to make explicit that Jesus was positioned between the two others
  chosen_reading: Rendered the spatial arrangement as 'one on this side and one on
    that side, and Jesus in the middle.'
  alternative_readings:
  - '''with Jesus between them'''
  - '''and Jesus between them'''
  rationale: The Greek explicitly states opposite-side placement and then Jesus as
    central. The chosen rendering preserves the vivid arrangement without collapsing
    it into the more interpretive 'between them,' though that is a legitimate inference.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
