id: JHN.19.18
reference: John 19:18
source:
  edition: SBLGNT
  text: ὅπου αὐτὸν ἐσταύρωσαν, καὶ μετ’ αὐτοῦ ἄλλους δύο ἐντεῦθεν καὶ ἐντεῦθεν, μέσον
    δὲ τὸν Ἰησοῦν.
translation:
  text: where they crucified him, and with him two others, one on this side and one
    on that side, and Jesus in the middle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more compactly, 'on either side, with Jesus between them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: A straightforward locative relative adverb. 'Where' is the most natural
    and sufficiently precise English rendering.
- source_word: ἐσταύρωσαν
  chosen: they crucified
  alternatives:
  - they impaled on a cross
  - they nailed to a cross
  lexicon: BDAG
  rationale: σταυρόω in Johannine passion context refers to crucifixion. 'They crucified'
    is the standard, accurate rendering without over-specifying the mechanics.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment. 'With him' is concise and
    natural.
- source_word: ἄλλους δύο
  chosen: two others
  alternatives:
  - two other men
  lexicon: BDAG
  rationale: ἄλλους δύο means 'two others.' The Greek does not explicitly state 'men'
    here, though the referents are male in context; the translation avoids adding
    an explicit noun not present in the text.
- source_word: ἐντεῦθεν καὶ ἐντεῦθεν
  chosen: one on this side and one on that side
  alternatives:
  - on either side
  - one here and one there
  lexicon: BDAG
  rationale: The paired adverbs indicate placement on opposite sides. 'One on this
    side and one on that side' preserves the distributive sense more explicitly than
    the compressed 'on either side.'
- source_word: μέσον
  chosen: in the middle
  alternatives:
  - between them
  - in the center
  lexicon: BDAG
  rationale: μέσον here functions adverbially/accusatively to indicate central position.
    'In the middle' is idiomatic and preserves the spatial image. 'Between them' is
    interpretive, though contextually implied.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. English
    often leaves it untranslated, but 'and' helps the sentence flow while preserving
    the coordination.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  alternatives:
  - and Jesus
  lexicon: BDAG
  rationale: The accusative marks Jesus as the one positioned centrally. In English,
    'and Jesus in the middle' naturally conveys the sense without needing a more wooden
    structure.
