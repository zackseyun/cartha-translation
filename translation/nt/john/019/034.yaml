id: JHN.19.34
reference: John 19:34
source:
  edition: SBLGNT
  text: ἀλλ’ εἷς τῶν στρατιωτῶν λόγχῃ αὐτοῦ τὴν πλευρὰν ἔνυξεν, καὶ ⸂ἐξῆλθεν εὐθὺς⸃
    αἷμα καὶ ὕδωρ.
translation:
  text: But one of the soldiers pierced his side with a spear, and immediately blood
    and water came out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a lance.'
    reason: lexical_alternative
  - marker: b
    text: Some interpreters understand 'blood and water' symbolically or sacramentally;
      others take it as a physical description. The Greek text itself does not explain
      the significance here.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement that Jesus' legs were not
    broken; 'But' is natural and sufficiently adversative in English.
- source_word: εἷς τῶν στρατιωτῶν
  chosen: one of the soldiers
  alternatives:
  - a soldier
  lexicon: BDAG
  rationale: The partitive construction is explicit in Greek and is best preserved
    rather than flattened to the indefinite singular.
- source_word: λόγχῃ
  chosen: with a spear
  alternatives:
  - with a lance
  lexicon: BDAG
  rationale: Refers to a spear/lance used by a soldier. 'Spear' is the clearest modern
    English term.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - Jesus'
  lexicon: BDAG
  rationale: The pronoun naturally refers to Jesus from context. Retaining 'his' follows
    the Greek wording without unnecessary explicitation.
- source_word: τὴν πλευρὰν
  chosen: side
  alternatives:
  - flank
  - rib area
  lexicon: BDAG
  rationale: πλευρά commonly means 'side.' 'Side' is idiomatic in English and avoids
    over-specification beyond the Greek.
- source_word: ἔνυξεν
  chosen: pierced
  alternatives:
  - stabbed
  - thrust into
  lexicon: BDAG
  rationale: The verb denotes piercing/pricking with a pointed instrument. 'Pierced'
    is both accurate and dignified in this narrative context.
- source_word: καὶ ⸂ἐξῆλθεν εὐθὺς⸃
  chosen: and immediately ... came out
  alternatives:
  - and at once ... came out
  - and ... came out immediately
  lexicon: BDAG
  rationale: Preserves both the sequential καί and the temporal force of εὐθύς. English
    places 'immediately' before the compound subject for natural flow.
- source_word: αἷμα καὶ ὕδωρ
  chosen: blood and water
  lexicon: BDAG
  rationale: A straightforward literal rendering is best. The unusual expression should
    be preserved without interpretive expansion.
