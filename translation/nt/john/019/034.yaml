theological_decisions:
- issue: Whether to interpret 'blood and water' sacramentally or medically in the
    main text
  chosen_reading: Retain the literal phrase 'blood and water' without explanatory
    interpretation.
  alternative_readings:
  - A sacramental allusion (e.g., Eucharist and baptism)
  - A physiological description of the wound's effects
  rationale: The verse states the phenomenon but does not itself explain its significance.
    In keeping with the translation philosophy, the rendering preserves the textual
    wording and theological tension rather than importing a specific interpretive
    tradition into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
