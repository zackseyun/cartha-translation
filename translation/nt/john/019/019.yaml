id: JHN.19.19
reference: John 19:19
source:
  edition: SBLGNT
  text: ἔγραψεν δὲ καὶ τίτλον ὁ Πιλᾶτος καὶ ἔθηκεν ἐπὶ τοῦ σταυροῦ· ἦν δὲ γεγραμμένον·
    Ἰησοῦς ὁ Ναζωραῖος ὁ βασιλεὺς τῶν Ἰουδαίων.
translation:
  text: 'Pilate also wrote an inscription and put it on the cross. It was written:
    “Jesus the Nazarene, the King of the Jews.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the King of the Judeans.” The Greek term can refer either to Jews more
      broadly or to Judeans in particular, depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: τίτλον
  chosen: inscription
  alternatives:
  - title
  - placard
  - notice
  lexicon: BDAG
  rationale: In this crucifixion context, τίτλος refers to the written notice affixed
    above the condemned person. 'Inscription' is natural modern English and fits the
    following clause 'It was written,' while 'title' is too opaque in contemporary
    usage.
- source_word: ἔθηκεν ἐπὶ τοῦ σταυροῦ
  chosen: put it on the cross
  alternatives:
  - placed it on the cross
  - put it above the cross
  lexicon: BDAG
  rationale: The Greek explicitly says 'on the cross.' Some English traditions use
    'over the cross' or 'above the cross' from contextual inference, but the source
    text here is best represented directly as 'on the cross.'
- source_word: γεγραμμένον
  chosen: It was written
  alternatives:
  - It had been written
  - The writing was
  lexicon: BDAG
  rationale: The periphrastic construction ἦν ... γεγραμμένον naturally yields 'it
    was written.' This preserves the stative/resultative sense without sounding wooden.
- source_word: Ναζωραῖος
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: The Greek uses the adjectival/nominal form Ναζωραῖος, not an explicit
    genitive construction 'from Nazareth.' 'The Nazarene' preserves the form and functions
    well as an identifying epithet. 'The Nazorean' is more formally precise but less
    idiomatic in modern English.
- source_word: βασιλεὺς τῶν Ἰουδαίων
  chosen: the King of the Jews
  alternatives:
  - king of the Judeans
  lexicon: BDAG
  rationale: Although Ἰουδαίων can denote Judeans in some contexts, 'King of the Jews'
    is the established and contextually appropriate sense in the passion narrative,
    referring to the Jewish people as represented in the charge against Jesus. This
    also matches the political-religious force of the inscription.
- source_word: δὲ καὶ
  chosen: also
  alternatives:
  - and
  - now also
  lexicon: BDAG
  rationale: The combination marks continuation with addition. Rendering it as 'also'
    communicates the additive force smoothly in English without overtranslating the
    connective particles.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς.
- source_word: Πιλᾶτος
  chosen: Pilate
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Πιλᾶτος.
- source_word: σταυροῦ
  chosen: cross
  alternatives:
  - stake
  lexicon: BDAG
  rationale: '''Cross'' is the standard and contextually appropriate rendering of
    σταυρός in the Gospel passion narratives.'
