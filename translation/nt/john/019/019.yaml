theological_decisions:
- issue: Rendering of Ἰουδαίων in the inscription
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: This verse reports the formal wording of the charge placed on Jesus in
    the passion narrative. Here the phrase functions as a public royal designation,
    and 'the Jews' best reflects the conventional and likely intended sense in this
    setting. The alternative 'the Judeans' is lexically possible and is preserved
    in a footnote for transparency.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather
    than resolve it
