id: JHN.19.32
reference: John 19:32
source:
  edition: SBLGNT
  text: ἦλθον οὖν οἱ στρατιῶται, καὶ τοῦ μὲν πρώτου κατέαξαν τὰ σκέλη καὶ τοῦ ἄλλου
    τοῦ συσταυρωθέντος αὐτῷ·
translation:
  text: So the soldiers came and broke the legs of the first man, and of the other
    who had been crucified with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the first' and 'the other.' English supplies 'man'
      for clarity.
    reason: lexical_alternative
  - marker: b
    text: Or 'and of the other who had been crucified with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the previous verse. 'So'
    is natural modern English and preserves the consequential flow without sounding
    overly formal.
- source_word: στρατιῶται
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: Standard rendering for Roman military personnel in context; clear and
    idiomatic.
- source_word: τοῦ μὲν πρώτου
  chosen: the first man
  alternatives:
  - the first
  - the first one
  lexicon: BDAG
  rationale: The genitive phrase refers to the first of the two men crucified alongside
    Jesus. English commonly supplies 'man' for clarity, since the referent is personal
    and implicit in Greek.
- source_word: κατέαξαν
  chosen: broke
  alternatives:
  - shattered
  lexicon: BDAG
  rationale: The verb means to break, here specifically the legs. 'Broke' is the straightforward
    and idiomatic rendering in this execution context.
- source_word: τὰ σκέλη
  chosen: the legs
  alternatives:
  - his legs
  lexicon: BDAG
  rationale: Literal rendering of the plural noun. English can leave possession implicit
    because the genitive construction already identifies whose legs are meant.
- source_word: τοῦ ἄλλου
  chosen: the other
  alternatives:
  - the other man
  lexicon: BDAG
  rationale: Refers to the second of the two crucified with Jesus. 'The other' is
    sufficiently clear in context and mirrors the Greek economy.
- source_word: συσταυρωθέντος αὐτῷ
  chosen: who had been crucified with him
  alternatives:
  - who was crucified with him
  - his fellow-crucified
  lexicon: BDAG
  rationale: The participle is adjectival, identifying the other man by his having
    been crucified together with Jesus. The pluperfect-like English 'had been crucified'
    fits the prior action relative to the soldiers' arrival; 'with him' naturally
    refers to Jesus from context.
