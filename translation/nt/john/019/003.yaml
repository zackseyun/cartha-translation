id: JHN.19.3
reference: John 19:3
source:
  edition: SBLGNT
  text: καὶ ⸂ἤρχοντο πρὸς αὐτὸν καὶ⸃ ἔλεγον· Χαῖρε, ὁ βασιλεὺς τῶν Ἰουδαίων· καὶ ἐδίδοσαν
    αὐτῷ ῥαπίσματα.
translation:
  text: And they came up to him and said, “Hail, King of the Jews!” And they were
    striking him with their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they kept coming up to him and saying,” reflecting the Greek imperfect
      verbs.
    reason: lexical_alternative
  - marker: b
    text: Or “they gave him slaps” / “they slapped him.” The Greek expression is literally
      “they were giving him blows.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρχοντο πρὸς αὐτὸν
  chosen: they came up to him
  alternatives:
  - they came to him
  - they kept coming up to him
  lexicon: BDAG
  rationale: Imperfect middle indicates repeated or progressive approach in the mockery
    scene. 'Came up to him' is natural English that preserves the movement toward
    Jesus better than a flatter 'came to him.'
- source_word: ἔλεγον
  chosen: said
  alternatives:
  - were saying
  - kept saying
  lexicon: BDAG
  rationale: The imperfect likely conveys repeated taunting, but English dialogue
    commonly uses simple past. The iterative force is sufficiently carried by the
    surrounding narrative and can be noted through the overall scene without making
    the line wooden.
- source_word: Χαῖρε
  chosen: Hail
  alternatives:
  - Greetings
  - Rejoice
  lexicon: BDAG
  rationale: In this mocking royal acclamation context, 'Hail' best captures the formal
    salute and its sarcastic force. 'Greetings' is too neutral, and 'Rejoice' is too
    literal for this idiom.
- source_word: ὁ βασιλεὺς τῶν Ἰουδαίων
  chosen: King of the Jews
  lexicon: BDAG
  rationale: This is the standard sense of the title in the passion narrative and
    should be rendered directly without softening its political and messianic irony.
- source_word: ἐδίδοσαν αὐτῷ ῥαπίσματα
  chosen: they were striking him with their hands
  alternatives:
  - they gave him slaps
  - they struck him
  - they slapped him
  lexicon: BDAG
  rationale: ῥαπίσματα refers to blows/slaps, often with the hand. The construction
    with δίδωμι is idiomatic ('give blows'). 'Were striking him with their hands'
    preserves the imperfect's ongoing/repeated sense and avoids the possible over-specificity
    of 'slapped,' while still conveying physical abuse.
