theological_decisions:
- issue: Tone of the soldiers' address to Jesus
  chosen_reading: Render the greeting as mocking royal homage rather than sincere
    salutation.
  alternative_readings:
  - A neutral 'Greetings, King of the Jews'
  rationale: The immediate passion context makes the address derisive. 'Hail' communicates
    both the royal formality and the mockery without adding interpretation beyond
    what the narrative implies.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning in context'
