id: JHN.8.34
reference: John 8:34
source:
  edition: SBLGNT
  text: Ἀπεκρίθη αὐτοῖς ὁ Ἰησοῦς· Ἀμὴν ἀμὴν λέγω ὑμῖν ὅτι πᾶς ὁ ποιῶν τὴν ἁμαρτίαν
    δοῦλός ἐστιν τῆς ἁμαρτίας·
translation:
  text: Jesus answered them, “Truly, truly, I say to you, everyone who practices sin
    is a slave of sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who does sin.' The Greek participle can be rendered more literally,
      but 'practices sin' better conveys the ongoing or characteristic sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant of sin.' The Greek word δοῦλος can mean 'servant' or 'slave';
      here 'slave' is used because the sense of bondage is central to Jesus' point.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue. 'Answered'
    is idiomatic and preserves the responsive force without unnecessary expansion.
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Truly
  lexicon: BDAG
  rationale: The doubled ἀμήν is a distinctive Johannine solemn formula. 'Truly, truly'
    communicates emphatic certainty in natural English while preserving the repetition.
    'Amen, amen' is more formal but less immediately transparent for many readers.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close but natural rendering of the present formula λέγω ὑμῖν. 'I say
    to you' preserves the formal, solemn tone of Jesus' declaration.
- source_word: πᾶς ὁ ποιῶν
  chosen: everyone who practices
  alternatives:
  - everyone who does
  - everyone doing
  lexicon: BDAG
  rationale: The articular present participle expresses a characteristic or ongoing
    pattern rather than a single act. 'Practices' better conveys habitual action in
    English than the flatter 'does'.
- source_word: τὴν ἁμαρτίαν
  chosen: sin
  alternatives:
  - the sin
  lexicon: BDAG
  rationale: Although the Greek has the article, English idiom normally omits it here.
    The sense is not one specific sin but sin as a category or practice.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance on δοῦλος, 'slave' is preferred where bonded
    status is theologically salient. Here the point is bondage to sin, so 'slave'
    best preserves the force of the metaphor.
- source_word: τῆς ἁμαρτίας
  chosen: of sin
  alternatives:
  - to sin
  lexicon: BDAG
  rationale: 'The genitive is rendered straightforwardly as possession/belonging:
    one who is under sin''s mastery. ''Of sin'' is both literal and idiomatic in this
    metaphorical construction.'
