theological_decisions:
- issue: Nature of the statement about sin
  chosen_reading: 'Render the present participle and predicate as describing ongoing
    bondage: ''everyone who practices sin is a slave of sin.'''
  alternative_readings:
  - everyone who commits sin is the servant of sin
  rationale: The Greek present participle ποιῶν naturally suggests characteristic
    practice rather than a single isolated act. This preserves the text's moral and
    theological force without overstating it into a systematic doctrinal formula about
    every individual act. The slavery metaphor is retained strongly through 'slave.'
  doctrine_reference: Translation philosophy §§1, 3, 5; Contested terms table on δοῦλος
