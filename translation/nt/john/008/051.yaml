id: JHN.8.51
reference: John 8:51
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω ὑμῖν, ἐάν τις τὸν ⸂ἐμὸν λόγον⸃ τηρήσῃ, θάνατον οὐ μὴ θεωρήσῃ
    εἰς τὸν αἰῶνα.
translation:
  text: Truly, truly, I say to you, if anyone keeps my word, he will certainly never
    see death forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will certainly never experience death.' The Greek literally says
      'see death,' an idiom that may denote experiencing death.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'forever' renders the Greek idiom εἰς τὸν αἰῶνα, used here with
      strong negation to mean 'never ever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most certainly
  lexicon: BDAG
  rationale: Retains the solemn emphatic repetition characteristic of Jesus' speech
    in John while using natural English. 'Truly, truly' preserves both form and force
    better than a single adverb.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the direct address and Johannine
    cadence. 'I tell you' is possible but slightly more idiomatic than the Greek wording.
- source_word: ἐάν τις
  chosen: if anyone
  alternatives:
  - if someone
  lexicon: BDAG
  rationale: Conveys the indefinite conditional sense naturally in English without
    restricting the reference.
- source_word: τὸν ἐμὸν λόγον
  chosen: my word
  alternatives:
  - my message
  - what I say
  lexicon: BDAG
  rationale: λόγος here refers to Jesus' spoken teaching or message. 'My word' preserves
    the Johannine resonance of λόγος and avoids over-paraphrase, though 'message'
    is a viable contextual alternative.
- source_word: τηρήσῃ
  chosen: keeps
  alternatives:
  - obeys
  - guards
  lexicon: BDAG
  rationale: τηρέω commonly means keep, observe, or preserve. 'Keeps' best preserves
    the lexical breadth, including both holding fast to and obeying Jesus' word, without
    narrowing the sense to mere obedience.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: The direct object is simply 'death.' No interpretive expansion such as
    'eternal death' is warranted in the main text.
- source_word: οὐ μὴ θεωρήσῃ
  chosen: he will certainly never see
  alternatives:
  - he will never ever see
  - he will by no means see
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is a strong negation. 'Will certainly
    never see' communicates the emphatic denial in clear modern English. θεωρέω is
    rendered 'see' rather than 'experience' to stay close to the Greek while allowing
    the idiomatic sense in context.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - ever
  lexicon: BDAG
  rationale: 'This idiom intensifies the negation: ''forever'' or ''ever.'' Here ''forever''
    makes the force explicit in contemporary English, though the phrase functions
    idiomatically with the negation.'
