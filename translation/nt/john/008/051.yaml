theological_decisions:
- issue: Meaning of 'see death'
  chosen_reading: retain the idiom 'see death' without explicating it as physical
    death alone or eternal death alone
  alternative_readings:
  - experience death
  - see eternal death
  - taste death
  rationale: The phrase is theologically weighty and contextually may point beyond
    mere physical death, but the Greek itself uses the idiom 'see death.' To preserve
    theological tension rather than resolve it, the main text keeps the idiom and
    avoids importing a narrower doctrinal interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Generic masculine implication from τις with singular verb
  chosen_reading: use 'anyone' with subsequent 'he'
  alternative_readings:
  - use singular 'they' throughout
  rationale: The Greek construction is grammatically singular and representative.
    In keeping with the gender-accurate policy, 'anyone' captures the inclusive scope
    while 'he' reflects the singular grammatical form rather than flattening it into
    plural or fully gender-neutral language.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
