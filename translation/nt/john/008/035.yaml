theological_decisions:
- issue: Potential christological resonance of 'the son' in context
  chosen_reading: Retained the generic yet pointed expression 'the son' without capitalizing
    it.
  alternative_readings:
  - the Son
  rationale: In the immediate discourse, the phrase functions proverbially about household
    status while also preparing for Jesus' application in the next verse. Lowercase
    preserves the Greek form and the theological tension without prematurely resolving
    it into an explicit christological title in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
