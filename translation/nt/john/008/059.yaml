theological_decisions:
- issue: Nature of Jesus' escape
  chosen_reading: Translate the text as Jesus hiding himself and leaving, without
    adding miraculous details.
  alternative_readings:
  - Jesus passed through the midst of them miraculously
  - Jesus became invisible
  rationale: The SBLGNT text here states only that Jesus hid himself and went out
    of the temple. Some later manuscript traditions expand the scene, but those details
    are not present in the given text and should not be imported into the translation.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
