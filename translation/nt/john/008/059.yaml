id: JHN.8.59
reference: John 8:59
source:
  edition: SBLGNT
  text: ἦραν οὖν λίθους ἵνα βάλωσιν ἐπ’ αὐτόν· Ἰησοῦς δὲ ἐκρύβη καὶ ἐξῆλθεν ἐκ τοῦ
    ⸀ἱεροῦ.
translation:
  text: So they picked up stones to throw at him, but Jesus hid himself and went out
    of the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more precisely, 'out of the temple precincts/courts'; the Greek word
      here is ἱερόν, referring to the temple complex rather than the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  chosen: picked up
  alternatives:
  - took up
  - lifted up
  lexicon: BDAG
  rationale: From αἴρω, here in the idiom of taking stones in hand for an intended
    act. 'Picked up' is natural modern English and fits the hostile action better
    than the more wooden 'lifted up.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inference/result from the preceding statement. 'So' is concise,
    natural, and preserves the logical connection without sounding overly formal.
- source_word: λίθους
  chosen: stones
  alternatives:
  - rocks
  lexicon: BDAG
  rationale: Standard rendering of λίθος in this context of attempted stoning. 'Stones'
    preserves the judicial/violent connotation familiar in biblical contexts.
- source_word: ἵνα βάλωσιν ἐπ’ αὐτόν
  chosen: to throw at him
  alternatives:
  - so that they might throw at him
  - in order to throw at him
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. English idiom prefers the
    infinitive here. 'Throw at him' accurately reflects βάλλω with ἐπί in this hostile
    context.
- source_word: ἐκρύβη
  chosen: hid himself
  alternatives:
  - was hidden
  - concealed himself
  lexicon: BDAG
  rationale: Although morphologically passive, the verb can function in a middle-like
    sense here. 'Hid himself' is the most natural contextual rendering and avoids
    implying an unnamed external agent hid Jesus.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: BDAG
  rationale: A straightforward rendering of ἐξέρχομαι. 'Went out' pairs naturally
    with the following ἐκ phrase and preserves the physical movement.
- source_word: ἐκ τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - from the temple precincts
  - out of the temple courts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple' is acceptable in the main text for readability, while the more
    precise sense is preserved in a footnote.
