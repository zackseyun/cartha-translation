id: JHN.8.19
reference: John 8:19
source:
  edition: SBLGNT
  text: ἔλεγον οὖν αὐτῷ· Ποῦ ἐστιν ὁ πατήρ σου; ἀπεκρίθη Ἰησοῦς· Οὔτε ἐμὲ οἴδατε οὔτε
    τὸν πατέρα μου· εἰ ἐμὲ ᾔδειτε, καὶ τὸν πατέρα μου ⸂ἂν ᾔδειτε⸃.
translation:
  text: So they were saying to him, “Where is your Father?” Jesus answered, “You know
    neither me nor my Father. If you knew me, you would know my Father also.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “If you had known me, you would have known my Father
      also.” The Greek condition can be rendered to emphasize contrary-to-fact force.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech. 'They were saying'
    preserves that aspect in natural English better than a simple past, while 'kept
    saying' may overstate repetition.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference. 'So' is natural modern English
    and preserves the connective force without sounding overly formal.
- source_word: Ποῦ ἐστιν ὁ πατήρ σου;
  chosen: Where is your Father?
  alternatives:
  - Where is your father?
  lexicon: BDAG
  rationale: In Johannine context, Jesus' reference to 'my Father' points to God,
    so capitalizing 'Father' in English helps signal titular/divine reference rather
    than merely biological paternity. The wording itself remains direct and literal.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the most straightforward
    and idiomatic rendering.
- source_word: Οὔτε ἐμὲ οἴδατε οὔτε τὸν πατέρα μου
  chosen: You know neither me nor my Father
  alternatives:
  - You know neither me nor my Father at all
  - You know neither me nor my Father
  lexicon: BDAG
  rationale: οὔτε...οὔτε is best rendered 'neither...nor.' οἶδα in John often carries
    relational recognition as well as knowledge, but 'know' remains the most transparent
    and sufficiently broad English equivalent.
- source_word: οἶδατε / ᾔδειτε
  chosen: know / knew
  alternatives:
  - recognize / recognized
  - understand / understood
  lexicon: BDAG
  rationale: The verb οἶδα can denote knowledge, recognition, or understanding. 'Know'
    best preserves the lexical continuity across present and conditional clauses and
    fits Johannine theology of knowing Jesus and the Father without interpretive narrowing.
- source_word: εἰ ἐμὲ ᾔδειτε, καὶ τὸν πατέρα μου ἂν ᾔδειτε
  chosen: If you knew me, you would know my Father also
  alternatives:
  - If you had known me, you would have known my Father also
  - If you knew me, you would also know my Father
  lexicon: BDAG
  rationale: 'The condition with imperfect ᾔδειτε and ἄν naturally conveys a present
    contrary-to-fact sense in English: ''If you knew me, you would know...'' This
    avoids importing a past-time nuance that ''had known'' might suggest. ''Also''
    reflects καί and is placed naturally at the end.'
- source_word: πατήρ / πατέρα μου
  chosen: Father / my Father
  alternatives:
  - father / my father
  lexicon: BDAG
  rationale: Because Jesus is speaking of God as his Father, capitalization in English
    appropriately signals the referent without altering the lexical meaning.
