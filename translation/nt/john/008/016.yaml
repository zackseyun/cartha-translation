theological_decisions:
- issue: Relation of Jesus' judgment to the Father's witness
  chosen_reading: The verse presents Jesus' judgment as true because it is not exercised
    independently of the Father who sent him.
  alternative_readings:
  - The verse could be read more narrowly as a legal-witness claim only, without broader
    theological implications.
  rationale: The wording explicitly grounds the truth of Jesus' judgment in his non-isolation
    and in the Father's involvement. The translation preserves this claim without
    expanding it into later doctrinal formulations, while remaining fully compatible
    with orthodox Christology.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
