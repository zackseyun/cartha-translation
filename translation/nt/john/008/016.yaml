id: JHN.8.16
reference: John 8:16
source:
  edition: SBLGNT
  text: καὶ ἐὰν κρίνω δὲ ἐγώ, ἡ κρίσις ἡ ἐμὴ ⸀ἀληθινή ἐστιν, ὅτι μόνος οὐκ εἰμί, ἀλλ’
    ἐγὼ καὶ ὁ πέμψας με πατήρ.
translation:
  text: But even if I do judge, my judgment is true, because I am not alone, but I
    and the Father who sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''if I judge'' or ''if I should judge.'' The Greek conditional expression
      can be rendered more formally, but here it likely carries a concessive sense:
      ''even if I do judge.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν κρίνω
  chosen: even if I do judge
  alternatives:
  - if I judge
  - if I should judge
  lexicon: BDAG
  rationale: ἐὰν with the present subjunctive κρίνω presents a conditional possibility.
    'Even if I do judge' captures the concessive force in context, since the preceding
    discourse has emphasized that Jesus is not presently judging in the way his opponents
    assume, yet his judgment would still be valid.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks contrast or development. 'But' best reflects the adversative
    turn from the previous statement.
- source_word: ἡ κρίσις ἡ ἐμὴ
  chosen: my judgment
  alternatives:
  - the judgment that is mine
  - my decision
  lexicon: BDAG
  rationale: The article + noun + possessive adjective construction is naturally rendered
    'my judgment.' 'Decision' is possible but 'judgment' better preserves the forensic
    nuance of κρίσις in Johannine usage.
- source_word: ἀληθινή
  chosen: 'true'
  alternatives:
  - valid
  - genuine
  lexicon: BDAG
  rationale: ἀληθινή can mean true, genuine, or real. Here 'true' preserves the Johannine
    theological resonance and allows the statement to include both truthfulness and
    validity.
- source_word: μόνος οὐκ εἰμί
  chosen: I am not alone
  alternatives:
  - I am not by myself
  lexicon: BDAG
  rationale: This is the most natural English rendering and preserves the relational
    point that Jesus' witness/judgment is not solitary.
- source_word: ἀλλ’ ἐγὼ καὶ ὁ πέμψας με πατήρ
  chosen: but I and the Father who sent me
  alternatives:
  - but I and the Father, the one who sent me
  - but rather I and my sending Father
  lexicon: BDAG
  rationale: The construction places Jesus together with the Father as joint witnesses.
    Rendering πέμψας with the relative clause 'who sent me' is idiomatic and preserves
    the participle's identifying function. Including 'the Father' rather than simply
    'Father' is warranted by the article and standard English style.
