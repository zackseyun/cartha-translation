theological_decisions:
- issue: Referent of 'the Father'
  chosen_reading: Jesus was speaking about God the Father.
  alternative_readings:
  - Jesus was speaking about a human father figure
  rationale: The immediate Johannine context repeatedly uses 'the Father' as Jesus'
    designation for God. Rendering with capital 'Father' reflects contextual identification
    rather than importing later doctrinal content.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: English rendering of γινώσκω in context
  chosen_reading: Render as 'understand' rather than the more literal 'know.'
  alternative_readings:
  - know
  - recognize
  rationale: This preserves the sense that the audience failed to grasp Jesus' referent,
    not merely lacked prior information. It is an optimal-equivalence choice grounded
    in context, not a theological reinterpretation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; #1 original-language
    primacy; #6 readable modern English'
