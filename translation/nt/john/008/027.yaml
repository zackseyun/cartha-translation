id: JHN.8.27
reference: John 8:27
source:
  edition: SBLGNT
  text: οὐκ ἔγνωσαν ὅτι τὸν πατέρα αὐτοῖς ἔλεγεν.
translation:
  text: They did not understand that he was speaking to them about the Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They did not know that he was speaking to them about the Father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔγνωσαν
  chosen: They did not understand
  alternatives:
  - They did not know
  - They did not recognize
  lexicon: BDAG
  rationale: Although γινώσκω often means 'know,' in this context it refers to failure
    to grasp Jesus' meaning. 'Understand' best conveys the sense in natural English
    while preserving the cognitive force of the aorist statement.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what they failed to understand. Standard content-clause
    rendering is appropriate.
- source_word: τὸν πατέρα
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine context this refers specifically to God as Jesus' Father,
    so capitalization signals titular/divine reference in English without adding content
    beyond the Greek.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: The dative with λέγω is naturally rendered 'to them' in English.
- source_word: ἔλεγεν
  chosen: was speaking
  alternatives:
  - was saying
  - spoke
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or progressive action. 'Was speaking'
    captures the imperfective aspect better than simple 'spoke'; 'was saying' is possible
    but less natural in this context.
