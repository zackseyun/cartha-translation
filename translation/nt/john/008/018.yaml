theological_decisions:
- issue: Reference of 'the Father' in Johannine context
  chosen_reading: Render simply as 'the Father' and preserve the relational and theological
    claim without expansion.
  alternative_readings:
  - my Father
  - God the Father
  rationale: The Greek text says ὁ ... πατήρ, 'the Father,' identifying the second
    witness as the Father who sent Jesus. The translation should preserve the text's
    claim without adding explanatory doctrinal wording not present in the verse. This
    remains fully consistent with historic orthodox Christology while avoiding interpretive
    expansion.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Witness language and legal/testimonial force
  chosen_reading: Use 'testifies' consistently for μαρτυρέω language.
  alternative_readings:
  - bears witness
  rationale: The verse participates in John's courtroom-like witness motif. 'Testifies'
    communicates that force in readable modern English while preserving the repeated
    lexical connection across the clause.
  doctrine_reference: Translation philosophy 5 and 6
