id: JHN.8.18
reference: John 8:18
source:
  edition: SBLGNT
  text: ἐγώ εἰμι ὁ μαρτυρῶν περὶ ἐμαυτοῦ καὶ μαρτυρεῖ περὶ ἐμοῦ ὁ πέμψας με πατήρ.
translation:
  text: I am the one who testifies about myself, and the Father who sent me testifies
    about me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bears witness about myself ... bears witness about me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρῶν
  chosen: the one who testifies
  alternatives:
  - bearing witness
  - witnessing
  lexicon: BDAG
  rationale: 'The present participle with article functions substantivally: ''the
    one testifying.'' ''Testifies'' is clear modern English and preserves the legal/witness
    sense of μαρτυρέω without sounding archaic.'
- source_word: περὶ ἐμαυτοῦ
  chosen: about myself
  alternatives:
  - concerning myself
  - on my own behalf
  lexicon: BDAG
  rationale: περί with the genitive here most naturally means 'about/concerning.'
    'About myself' is idiomatic and keeps the reflexive force of ἐμαυτοῦ. 'On my own
    behalf' would overinterpret the legal nuance.
- source_word: μαρτυρεῖ
  chosen: testifies
  alternatives:
  - bears witness
  - witnesses
  lexicon: BDAG
  rationale: Using the same English gloss as for μαρτυρῶν preserves consistency of
    key terms within the verse and reflects the repeated legal-testimonial language.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: As above, περί with the genitive is best rendered 'about/concerning.'
    'About me' is the most natural contemporary English equivalent.
- source_word: ὁ πέμψας με πατήρ
  chosen: the Father who sent me
  alternatives:
  - the Father, the one who sent me
  - my Father who sent me
  lexicon: BDAG
  rationale: 'The articular aorist participle modifies πατήρ: literally, ''the Father
    who sent me.'' ''My Father'' is not explicit in the Greek here and would import
    wording from nearby contexts. The aorist participle is naturally rendered with
    the relative clause ''who sent me.'''
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  lexicon: BDAG
  rationale: This is the straightforward copular expression introducing the subject.
    In this verse it does not require an emphatic or absolute rendering beyond 'I
    am,' since the predicate follows explicitly.
