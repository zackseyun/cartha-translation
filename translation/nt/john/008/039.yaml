theological_decisions:
- issue: Nature of sonship to Abraham in Jesus' reply
  chosen_reading: Rendered relational descent language literally without importing
    a doctrine of spiritual vs. physical descent beyond what the immediate contrast
    of claim and deeds states.
  alternative_readings:
  - Interpret as denying physical descent entirely
  - Interpret as only affirming spiritual sonship
  rationale: The verse itself contrasts their claim 'Abraham is our father' with their
    failure to do Abraham's works. The translation preserves that tension without
    resolving it into a fuller theological system not explicit in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
