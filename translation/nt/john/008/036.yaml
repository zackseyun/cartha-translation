id: JHN.8.36
reference: John 8:36
source:
  edition: SBLGNT
  text: ἐὰν οὖν ὁ υἱὸς ὑμᾶς ἐλευθερώσῃ, ὄντως ἐλεύθεροι ἔσεσθε.
translation:
  text: Therefore, if the Son sets you free, you will be truly free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'really free' or 'free indeed.' The Greek adverb emphasizes that this
      freedom is genuine and complete.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  chosen: Therefore, if
  alternatives:
  - So if
  - If then
  lexicon: BDAG
  rationale: ἐὰν introduces a conditional clause ('if'), while οὖν marks inference
    or conclusion. 'Therefore, if' preserves both the logical connection to the preceding
    argument and natural English flow.
- source_word: ὁ υἱὸς
  chosen: the Son
  alternatives:
  - the son
  lexicon: BDAG
  rationale: With the article and Johannine context, ὁ υἱός functions as a christological
    title referring specifically to Jesus. Capitalizing 'Son' reflects title usage
    in English without adding content beyond the context.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: Second person plural in Greek, but standard English 'you' can represent
    either singular or plural. 'You all' would make the plurality explicit but is
    less neutral in register.
- source_word: ἐλευθερώσῃ
  chosen: sets free
  alternatives:
  - frees
  - liberates
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐὰν in a future-more-vivid condition. 'Sets
    free' is idiomatic and preserves the verbal action clearly. 'Liberates' is possible
    but less natural in this discourse context.
- source_word: ὄντως
  chosen: truly
  alternatives:
  - really
  - indeed
  - actually
  lexicon: BDAG
  rationale: ὄντως intensifies the reality or genuineness of the freedom. 'Truly'
    is concise, natural, and preserves the emphatic force.
- source_word: ἐλεύθεροι
  chosen: free
  alternatives:
  - freed
  lexicon: BDAG
  rationale: Predicate adjective describing the resulting state, not merely the act.
    'Free' is the most direct rendering and matches the lexical connection with ἐλευθερόω.
- source_word: ἔσεσθε
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: BDAG
  rationale: Future middle indicative of εἰμί. 'You will be' is standard modern English
    and avoids archaic tone while preserving futurity.
