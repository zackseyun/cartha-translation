theological_decisions:
- issue: Identity of 'the Son'
  chosen_reading: A christological title referring to Jesus uniquely as the Son
  alternative_readings:
  - a generic son
  rationale: In Johannine context, 'the Son' is not an indefinite or generic reference
    but part of Jesus' self-revelation and argument about authority, household status,
    and true freedom. The translation preserves this by rendering it as the title
    'the Son.'
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), including the homoousios
    language'
- issue: Nature of the freedom described
  chosen_reading: Freedom in the fullest or genuine sense, without narrowing it to
    merely political, social, or inward categories in translation
  alternative_readings:
  - spiritual freedom only
  - social freedom only
  rationale: The immediate context concerns slavery to sin, but the verse itself states
    the result broadly. 'Truly free' preserves the theological weight and scope of
    the statement without over-specifying beyond the text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
