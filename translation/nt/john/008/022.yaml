id: JHN.8.22
reference: John 8:22
source:
  edition: SBLGNT
  text: ἔλεγον οὖν οἱ Ἰουδαῖοι· Μήτι ἀποκτενεῖ ἑαυτὸν ὅτι λέγει· Ὅπου ἐγὼ ὑπάγω ὑμεῖς
    οὐ δύνασθε ἐλθεῖν;
translation:
  text: So the Jews were saying, “Surely he will not kill himself, since he says,
    ‘Where I am going, you cannot come’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, in Johannine context, “the Judeans” or “the Jewish leaders,”
      depending on how broadly John intends the reference here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated speech in the narrative;
    'were saying' preserves that aspect in natural English.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative inference/continuation from the previous statement; 'So'
    is natural modern English and preserves the discourse connection.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally 'the Jews.' In John this can refer
    contextually to Judean authorities or opponents, but the text here does not explicitly
    narrow the referent, so the literal rendering is retained rather than importing
    an interpretive limitation.
- source_word: Μήτι
  chosen: Surely ... not
  alternatives:
  - Can it be that ... ?
  - He will not ... , will he?
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. 'Surely he will
    not' captures the skeptical, negative-expectation force idiomatically.
- source_word: ἀποκτενεῖ ἑαυτόν
  chosen: kill himself
  alternatives:
  - slay himself
  lexicon: BDAG
  rationale: Direct reflexive sense of the verb phrase; 'kill himself' is clear, current
    English without archaic coloring.
- source_word: ὅτι
  chosen: since
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the reason for their speculation: they infer this
    from what he says. ''Since'' expresses that explanatory force smoothly in English.'
- source_word: λέγει
  chosen: he says
  alternatives:
  - he is saying
  - he said
  lexicon: BDAG
  rationale: Present tense is retained as a vivid present within the quotation frame;
    'he says' matches the Greek form and Johannine style.
- source_word: Ὅπου ἐγὼ ὑπάγω
  chosen: Where I am going
  alternatives:
  - Where I go
  - Where I am going away
  lexicon: BDAG
  rationale: ὑπάγω commonly means 'go' or 'go away/depart.' 'Where I am going' is
    idiomatic and preserves the movement without over-specifying 'away' in the main
    text.
- source_word: οὐ δύνασθε ἐλθεῖν
  chosen: you cannot come
  alternatives:
  - you are not able to come
  lexicon: BDAG
  rationale: Natural rendering of inability; concise and faithful to the modal force
    of δύνασθε with infinitive.
