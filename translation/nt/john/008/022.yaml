theological_decisions:
- issue: Referent of 'the Jews' in John's Gospel
  chosen_reading: Retain the literal rendering 'the Jews' in the main text
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The phrase οἱ Ἰουδαῖοι is lexically 'the Jews.' Although in Johannine
    context it can denote specific Judean opponents or authorities, narrowing it here
    would interpret beyond what this verse itself states. A footnote preserves the
    contextual alternative to aid readers and avoid over-reading ethnicity as such.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
