id: JHN.8.45
reference: John 8:45
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ὅτι τὴν ἀλήθειαν λέγω, οὐ πιστεύετέ μοι.
translation:
  text: But because I tell the truth, you do not believe me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''But I, because I speak the truth, do not believe me''
      / ''But because I say the truth, you do not believe me.'' The Greek conjunction
      can be rendered more literally as ''that,'' but the sense here is best understood
      as causal: ''because.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit subject pronoun retained in English to preserve the emphatic
    contrast with the audience implied by the following second-person verb.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Here δέ marks contrast with the preceding context; 'But' best preserves
    the adversative force in natural English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'In this construction, ὅτι is best taken causally: they do not believe
    him because he tells the truth. Rendering it as ''that'' is possible more formally,
    but ''because'' better conveys the logic of the sentence in English.'
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering of ἀλήθεια. The article
    is preserved naturally in English.
- source_word: λέγω
  chosen: I tell
  alternatives:
  - I speak
  - I say
  lexicon: BDAG
  rationale: Present tense is rendered with simple present. 'Tell' fits the object
    'the truth' idiomatically in English better than 'say' or 'speak'.
- source_word: οὐ πιστεύετέ μοι
  chosen: you do not believe me
  alternatives:
  - you do not trust me
  - you do not believe what I say
  lexicon: BDAG
  rationale: πιστεύω with the dative commonly means 'believe' or 'trust' someone.
    'Believe me' is the most direct and idiomatic rendering here, preserving both
    the personal object and the forensic force of rejecting Jesus' truthful testimony.
