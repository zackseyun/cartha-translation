theological_decisions:
- issue: Sense of ὅτι in relation to Jesus' truthful speech and the audience's unbelief
  chosen_reading: 'causal: ''because I tell the truth'''
  alternative_readings:
  - 'declarative/formal: ''that I tell the truth'''
  rationale: 'The immediate discourse contrast favors a causal sense: unlike the devil,
    Jesus speaks truth, and precisely for that reason his opponents reject him. This
    is a syntactic and discourse decision rather than a doctrinal one, and it preserves
    the sharp irony of the passage without importing additional theology.'
  doctrine_reference: Translation philosophy §1, §3
