theological_decisions:
- issue: Nature of the inability in 'you are not able to hear my word'
  chosen_reading: Render the statement straightforwardly as inability without importing
    a doctrinal explanation.
  alternative_readings:
  - Interpret as moral unwillingness
  - Interpret as judicial hardening
  - Interpret as spiritual incapacity
  rationale: The verse states inability, but does not itself specify the full theological
    mechanism. The translation preserves the tension and avoids resolving debates
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
