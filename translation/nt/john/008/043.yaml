id: JHN.8.43
reference: John 8:43
source:
  edition: SBLGNT
  text: διὰ τί τὴν λαλιὰν τὴν ἐμὴν οὐ γινώσκετε; ὅτι οὐ δύνασθε ἀκούειν τὸν λόγον
    τὸν ἐμόν.
translation:
  text: Why do you not understand my way of speaking? Because you are not able to
    hear my word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my speech' or 'my language.' The Greek term refers to Jesus's manner
      of speaking, distinguished here from 'my word' in the next clause.
    reason: lexical_alternative
  - marker: b
    text: Or 'you cannot hear my word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλιὰν
  chosen: way of speaking
  alternatives:
  - speech
  - language
  - talk
  lexicon: BDAG
  rationale: λαλιά often refers to manner of speech or speech-pattern rather than
    the content itself. 'Way of speaking' preserves the distinction from λόγος later
    in the verse, where content/message is in view.
- source_word: γινώσκετε
  chosen: understand
  alternatives:
  - know
  - recognize
  lexicon: BDAG
  rationale: In this context γινώσκω concerns comprehension of Jesus's speech, not
    mere acquaintance. 'Understand' fits idiomatic English and the immediate question.
- source_word: ἀκούειν
  chosen: hear
  alternatives:
  - listen to
  - accept
  lexicon: BDAG
  rationale: ἀκούω fundamentally means 'hear.' While the context may imply receptivity,
    the main text should preserve the lexical sense and let the theological implication
    remain implicit.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  - teaching
  lexicon: BDAG
  rationale: λόγος here likely refers to Jesus's spoken word/message. 'Word' is retained
    as a theologically resonant and sufficiently natural rendering, while also preserving
    the distinction from λαλιά.
- source_word: οὐ δύνασθε
  chosen: you are not able
  alternatives:
  - you cannot
  lexicon: BDAG
  rationale: The expression denotes inability, not mere unwillingness. 'Are not able'
    makes the force explicit, though in natural English it remains readable.
- source_word: ὅτι
  chosen: Because
  alternatives:
  - For
  - That is because
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the preceding question. 'Because'
    is the clearest modern English connector.
- source_word: τὴν ἐμὴν / τὸν ἐμόν
  chosen: my
  alternatives:
  - mine
  lexicon: BDAG
  rationale: The possessive adjectives are naturally rendered as attributive 'my'
    in English. This keeps the parallelism between 'my way of speaking' and 'my word'
    without awkwardness.
