id: JHN.8.47
reference: John 8:47
source:
  edition: SBLGNT
  text: ὁ ὢν ἐκ τοῦ θεοῦ τὰ ῥήματα τοῦ θεοῦ ἀκούει· διὰ τοῦτο ὑμεῖς οὐκ ἀκούετε ὅτι
    ἐκ τοῦ θεοῦ οὐκ ἐστέ.
translation:
  text: 'The one who is from God hears the words of God. For this reason you do not
    hear: because you are not from God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you do not hear that you are not from God.' The Greek conjunction ὅτι
      can also be read as 'that,' but the causal sense 'because' fits the context
      better.
    reason: alternative_reading
  - marker: b
    text: '''From God'' can also be rendered ''of God.'' The Greek expression emphasizes
      source or origin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὢν
  chosen: the one who is
  alternatives:
  - whoever is
  - the person who is
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a class of person. 'The one who is' preserves the singular representative force
    without over-paraphrasing.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  - out of God
  lexicon: BDAG
  rationale: ἐκ here denotes source/origin rather than mere possession. 'From God'
    is idiomatic English and preserves the Johannine contrast between those whose
    origin is in God and those who are not.
- source_word: τὰ ῥήματα τοῦ θεοῦ
  chosen: the words of God
  alternatives:
  - God's words
  - the sayings of God
  lexicon: BDAG
  rationale: ῥήματα is best rendered 'words' here, keeping the plural concrete sense.
    'Sayings' is possible but less natural in modern English. The genitive is retained
    as 'of God' for clarity and gravity.
- source_word: ἀκούει / ἀκούετε
  chosen: hears / hear
  alternatives:
  - listens to
  - obeys
  lexicon: BDAG
  rationale: ἀκούω can imply both hearing and heeding in context, but the primary
    lexical sense is 'hear.' Rendering it as 'hear' preserves the verbal repetition
    in the verse and avoids importing 'obey' into the main text beyond what the Greek
    explicitly states.
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: This phrase introduces the explanation/result. 'For this reason' is clear
    modern English and preserves the inferential force without sounding overly formal.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek for emphasis. English can convey this
    adequately with normal 'you' in context; adding 'yourselves' would overstate the
    emphasis.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι is best taken as causal rather than declarative: they do not
    hear because they are not from God. This yields the clearest sense in context
    and matches common Johannine usage.'
- source_word: ἐκ τοῦ θεοῦ οὐκ ἐστέ
  chosen: you are not from God
  alternatives:
  - you are not of God
  lexicon: BDAG
  rationale: Again ἐκ indicates source/origin. 'From God' is more transparent in contemporary
    English than 'of God' while preserving the theological contrast.
