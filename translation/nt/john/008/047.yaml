theological_decisions:
- issue: Meaning of being 'from God' in Johannine context
  chosen_reading: Retain the source/origin language 'from God' without specifying
    a later systematic category such as election, regeneration, or covenant membership
    alone.
  alternative_readings:
  - belonging to God
  - born of God in a narrower salvific sense
  rationale: The verse contrasts those whose origin/allegiance is in God with Jesus'
    opponents. The translation preserves the Johannine wording and theological tension
    rather than resolving it into a specific doctrinal system not explicitly stated
    in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἀκούω
  chosen_reading: Translate as 'hear' rather than 'obey' in the main text.
  alternative_readings:
  - heed
  - obey
  rationale: In context, genuine hearing likely includes receptive response, but the
    Greek verb itself is 'hear.' Using 'obey' would interpret the implication rather
    than translate the lexical form.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
