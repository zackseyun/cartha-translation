theological_decisions:
- issue: Nature of Jesus' self-testimony
  chosen_reading: Rendered Jesus' claim as the truthfulness of his testimony grounded
    in his unique knowledge of his origin and destination, without importing later
    doctrinal formulation into the wording.
  alternative_readings:
  - A more narrowly forensic rendering emphasizing legal validity
  - A more explicitly metaphysical rendering emphasizing heavenly origin
  rationale: The verse itself states that Jesus' testimony is true because he knows
    where he came from and where he is going. The translation preserves that claim
    plainly, allowing the broader Johannine theology and orthodox Christology to emerge
    from context rather than being inserted into this verse.
  doctrine_reference: Affirmations; Translation philosophy §3
