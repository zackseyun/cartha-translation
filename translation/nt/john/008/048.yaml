theological_decisions:
- issue: Referent and translation of οἱ Ἰουδαῖοι in John
  chosen_reading: The Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: To avoid importing a harmonizing or mitigating interpretation into the
    text, the main rendering follows the Greek directly. Because this term can be
    misunderstood in English as a blanket statement about all Jewish people, an explanatory
    footnote preserves the contextual nuance that John often uses the term for a particular
    opposing group in the narrative rather than every Jewish person without exception.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
