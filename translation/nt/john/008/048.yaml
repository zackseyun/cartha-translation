id: JHN.8.48
reference: John 8:48
source:
  edition: SBLGNT
  text: ⸀Ἀπεκρίθησαν οἱ Ἰουδαῖοι καὶ εἶπαν αὐτῷ· Οὐ καλῶς λέγομεν ἡμεῖς ὅτι Σαμαρίτης
    εἶ σὺ καὶ δαιμόνιον ἔχεις;
translation:
  text: The Jews answered and said to him, “Are we not right in saying that you are
    a Samaritan and have a demon?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Judeans” or “the Jewish leaders” in some contexts; in John, “the
      Jews” often refers to a particular group opposing Jesus, not to every Jewish
      person without exception.
    reason: alternative_reading
  - marker: b
    text: Or “Do we not say rightly…?”
    reason: lexical_alternative
  - marker: c
    text: Literally, “have a demon”; some translations render this more interpretively
      as “are demon-possessed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent commonly means 'answered' or 'replied.'
    'Answered' fits the narrative style and pairs naturally with the following speech
    verb.
- source_word: οἱ Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is simply 'the Jews.' Although in John the referent
    can at times be more specific than the entire Jewish people, this verse does not
    lexically specify 'leaders.' 'Judeans' is possible in some Johannine contexts,
    but here the established narrative opposition is best left as 'the Jews,' without
    importing a narrower interpretation into the main text.
- source_word: εἶπαν αὐτῷ
  chosen: said to him
  alternatives:
  - said to him in reply
  lexicon: BDAG
  rationale: Straightforward narrative continuation after 'answered.' Retaining both
    verbs reflects the Greek's somewhat redundant but natural storytelling style.
- source_word: Οὐ καλῶς λέγομεν ἡμεῖς
  chosen: Are we not right in saying
  alternatives:
  - Do we not say rightly
  - Are we not speaking correctly when we say
  lexicon: BDAG
  rationale: The negative particle with the present indicative in this rhetorical
    question expects an affirmative answer. καλῶς here means 'rightly/correctly/well.'
    'Are we not right in saying' is idiomatic modern English that preserves the rhetorical
    force.
- source_word: Σαμαρίτης
  chosen: a Samaritan
  lexicon: BDAG
  rationale: Direct ethnic/religious designation used here as an insult. The indefinite
    article is natural in English predication.
- source_word: δαιμόνιον ἔχεις
  chosen: have a demon
  alternatives:
  - are demon-possessed
  - have an unclean spirit
  lexicon: BDAG
  rationale: Literally 'have a demon.' This is more transparent to the Greek than
    the more interpretive 'are demon-possessed.' 'Unclean spirit' would not match
    the actual noun used here.
