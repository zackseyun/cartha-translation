id: JHN.8.53
reference: John 8:53
source:
  edition: SBLGNT
  text: μὴ σὺ μείζων εἶ τοῦ πατρὸς ἡμῶν Ἀβραάμ, ὅστις ἀπέθανεν; καὶ οἱ προφῆται ἀπέθανον·
    τίνα ⸀σεαυτὸν ποιεῖς;
translation:
  text: Surely you are not greater than our father Abraham, who died? The prophets
    also died. Who do you make yourself out to be?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Are you not greater than our father Abraham...?' The
      Greek question is framed to expect a negative answer.
    reason: lexical_alternative
  - marker: b
    text: Or 'Who do you make yourself?' The expression means 'Who do you make yourself
      out to be?' or 'Who are you claiming to be?'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ σὺ
  chosen: Surely you are not
  alternatives:
  - Are you not
  - You are not, are you
  - You are surely not
  lexicon: BDAG
  rationale: μή with the pronoun σύ introduces a question expecting a negative answer.
    'Surely you are not' captures the rhetorical force in natural English better than
    a flat 'Are you not' while preserving the confrontational tone.
- source_word: μείζων
  chosen: greater
  alternatives:
  - more important
  - superior
  lexicon: BDAG
  rationale: Comparative of μέγας; 'greater' is the standard and sufficiently broad
    rendering, preserving both status and significance without over-interpreting.
- source_word: τοῦ πατρὸς ἡμῶν Ἀβραάμ
  chosen: than our father Abraham
  alternatives:
  - than Abraham our father
  lexicon: BDAG
  rationale: The genitive after the comparative is rendered with English 'than.' 'Our
    father Abraham' preserves the Jewish ancestral claim and the honorific force of
    πατήρ in context.
- source_word: ὅστις ἀπέθανεν
  chosen: who died
  alternatives:
  - who has died
  - who is dead
  lexicon: BDAG
  rationale: Aorist indicative points to the historical fact of Abraham's death. 'Who
    died' is the most direct rendering; 'has died' would shift toward English present
    relevance, which is not necessary here.
- source_word: καὶ οἱ προφῆται ἀπέθανον
  chosen: The prophets also died
  alternatives:
  - and the prophets died too
  - the prophets also have died
  lexicon: BDAG
  rationale: 'καί here adds a parallel example. Fronting ''The prophets'' gives clear
    English style while preserving the argument: Abraham died, and so did the prophets.'
- source_word: τίνα σεαυτὸν ποιεῖς
  chosen: Who do you make yourself out to be?
  alternatives:
  - Who do you make yourself
  - Whom do you make yourself to be
  - Who are you claiming to be
  lexicon: BDAG
  rationale: This idiom means to present or claim oneself as someone. 'Make yourself
    out to be' is idiomatic modern English that preserves the accusatory nuance better
    than a wooden literal rendering.
