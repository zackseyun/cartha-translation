theological_decisions:
- issue: Rhetorical challenge to Jesus' status relative to Abraham and the prophets
  chosen_reading: Render the speakers' question as a hostile rhetorical denial without
    softening its force.
  alternative_readings:
  - 'A more neutral question: ''Are you greater than our father Abraham?'''
  rationale: The Greek μή signals an expected negative answer, and the verse functions
    as a challenge to Jesus' implied authority and identity. The translation should
    preserve the tension without importing a doctrinal resolution into the wording
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
