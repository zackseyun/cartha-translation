theological_decisions:
- issue: Rendering the absolute/elliptical ἐγώ εἰμι
  chosen_reading: I am he
  alternative_readings:
  - I am
  - I am the one
  rationale: The phrase is grammatically elliptical and theologically weighty in John.
    To avoid over-resolving the expression into an explicit divine-name claim while
    still producing natural English, the main text uses 'I am he.' Because the bare
    'I am' may preserve Johannine ambiguity and possible allusion more directly, it
    is retained in a footnote for transparency.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ὑψώσητε in Johannine context
  chosen_reading: lift up
  alternative_readings:
  - crucify
  - exalt
  rationale: The verb likely evokes both Jesus's being lifted up on the cross and
    his exaltation. The translation preserves this double sense rather than collapsing
    it into a single interpretive meaning.
  doctrine_reference: Preserve theological tension rather than resolve it.
