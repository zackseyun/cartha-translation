id: JHN.8.28
reference: John 8:28
source:
  edition: SBLGNT
  text: εἶπεν ⸀οὖν ὁ Ἰησοῦς· Ὅταν ὑψώσητε τὸν υἱὸν τοῦ ἀνθρώπου, τότε γνώσεσθε ὅτι
    ἐγώ εἰμι, καὶ ἀπ’ ἐμαυτοῦ ποιῶ οὐδέν, ἀλλὰ καθὼς ἐδίδαξέν με ὁ ⸀πατὴρ ταῦτα λαλῶ.
translation:
  text: So Jesus said, “When you lift up the Son of Man, then you will know that I
    am he, and that I do nothing from myself, but just as the Father taught me, I
    speak these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “I am.” The Greek is simply “I am” (ἐγώ εἰμι), without an expressed
      predicate.'
    reason: alternative_reading
  - marker: b
    text: “Lift up” can refer both to being raised up physically and, in John’s usage,
      to exaltation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference from the preceding exchange. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a future contingency with the subjunctive. In this context
    it points to a specific future event rather than repeated action, so 'When' is
    preferable.
- source_word: ὑψώσητε
  chosen: lift up
  alternatives:
  - raise up
  - exalt
  lexicon: BDAG
  rationale: 'In John this verb carries a deliberate double sense: physical lifting
    up on the cross and exaltation. ''Lift up'' best preserves that Johannine ambiguity
    without prematurely interpreting it as only crucifixion or only exaltation.'
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard rendering of the self-designation, preserving both its idiomatic
    force and its intertextual resonance with Danielic and Gospel usage.
- source_word: γνώσεσθε
  chosen: you will know
  alternatives:
  - you will come to know
  - you will recognize
  lexicon: BDAG
  rationale: Future middle of γινώσκω here indicates future realization/recognition.
    'You will know' is concise and idiomatic; the fuller nuance of coming to recognition
    is contextually carried by the clause.
- source_word: ἐγώ εἰμι
  chosen: I am he
  alternatives:
  - I am
  - I am the one
  lexicon: BDAG
  rationale: The Greek lacks an explicit predicate, creating a solemn and potentially
    allusive expression. In English, 'I am he' communicates the elliptical sense naturally
    while preserving the weight of the statement. The more literal 'I am' is preserved
    in a footnote because of its theological significance and possible echo of divine
    self-identification.
- source_word: ἀπ’ ἐμαυτοῦ
  chosen: from myself
  alternatives:
  - on my own
  - from my own initiative
  lexicon: BDAG
  rationale: The phrase denotes source/origin and, by implication, independent initiative.
    'From myself' stays closer to the Greek while remaining understandable in context.
- source_word: ποιῶ οὐδέν
  chosen: I do nothing
  alternatives:
  - I am doing nothing
  lexicon: BDAG
  rationale: Simple present with οὐδέν is best rendered as a general present statement
    of Jesus's dependence on the Father.
- source_word: καθὼς ἐδίδαξέν με ὁ πατήρ
  chosen: just as the Father taught me
  alternatives:
  - as the Father taught me
  - just as my Father taught me
  lexicon: BDAG
  rationale: καθώς marks correspondence; 'just as' preserves that comparative force.
    The article with πατήρ is naturally rendered 'the Father' in Johannine context.
- source_word: ταῦτα λαλῶ
  chosen: I speak these things
  alternatives:
  - I say these things
  - I speak in this way
  lexicon: BDAG
  rationale: λαλέω often emphasizes speaking/uttering rather than the content-focused
    λέγω. 'I speak these things' preserves the demonstrative ταῦτα and remains readable,
    though slightly formal.
