theological_decisions:
- issue: Force of Jesus' self-identification in Ἐγώ εἰμι
  chosen_reading: Render simply as 'I am' within the predicate statement 'I am the
    light of the world' without importing an explicit allusion to the divine name
    into the translation.
  alternative_readings:
  - Translate with heightened emphasis to signal a possible theological echo of absolute
    'I am' sayings
  rationale: In this verse the phrase is grammatically linked to a predicate nominative
    ('the light of the world'), so the translation should reflect the plain syntax
    while allowing readers to perceive any broader Johannine theological resonance
    without the translator overstating it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'the light of life'
  chosen_reading: Retain the literal phrase 'the light of life' rather than interpretively
    expanding it.
  alternative_readings:
  - '''the light that gives life'''
  - '''the life-giving light'''
  rationale: The genitive relationship is theologically rich and somewhat open-ended.
    A literal rendering preserves the text's ambiguity and avoids narrowing the meaning
    to one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
