id: JHN.8.12
reference: John 8:12
source:
  edition: SBLGNT
  text: Πάλιν οὖν αὐτοῖς ⸂ἐλάλησεν ὁ Ἰησοῦς⸃ λέγων· Ἐγώ εἰμι τὸ φῶς τοῦ κόσμου· ὁ
    ἀκολουθῶν ⸀ἐμοὶ οὐ μὴ περιπατήσῃ ἐν τῇ σκοτίᾳ, ἀλλ’ ἕξει τὸ φῶς τῆς ζωῆς.
translation:
  text: So Jesus spoke to them again, saying, “I am the light of the world. The one
    who follows me will certainly not walk in the darkness, but will have the light
    of life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will never walk in darkness.' The Greek uses a strong negation (οὐ
      μὴ).
    reason: lexical_alternative
  - marker: b
    text: '''The light of life'' may also be understood as ''the light that gives
      life.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Adverb marking repeated speech; 'again' is the most natural and direct
    English equivalent.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Connective indicating continuation/inference in discourse. 'So' preserves
    the flow in readable modern English without overstating logical force.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' rather than the more content-focused 'say.'
    'Spoke' also works well with the participle λέγων introducing the quoted content.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Participle introducing direct discourse; 'saying' is a natural formal
    equivalent and avoids unnecessary expansion.
- source_word: Ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: Straightforward copular expression. The emphatic pronoun is naturally
    represented in English by the explicit 'I am'; no added emphasis beyond the Greek
    is necessary.
- source_word: τὸ φῶς τοῦ κόσμου
  chosen: the light of the world
  lexicon: BDAG
  rationale: Standard and precise rendering of the predicate nominative with genitive.
    'World' for κόσμος fits Johannine usage here as the human world/order in need
    of divine illumination.
- source_word: ὁ ἀκολουθῶν ἐμοὶ
  chosen: The one who follows me
  alternatives:
  - Whoever follows me
  - The person following me
  lexicon: BDAG
  rationale: Articular participle functioning substantivally. 'The one who follows
    me' preserves the singular representative force without flattening it into a plural.
- source_word: οὐ μὴ περιπατήσῃ
  chosen: will certainly not walk
  alternatives:
  - will never walk
  - shall by no means walk
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is a strong negation. 'Will certainly
    not' conveys the emphatic denial in clear modern English without archaic phrasing.
- source_word: ἐν τῇ σκοτίᾳ
  chosen: in the darkness
  alternatives:
  - in darkness
  lexicon: BDAG
  rationale: The article is present in Greek; 'the darkness' preserves the definite,
    almost realm-like sense common in John.
- source_word: ἕξει
  chosen: will have
  alternatives:
  - will possess
  lexicon: BDAG
  rationale: Simple future of ἔχω; 'will have' is idiomatic and sufficient.
- source_word: τὸ φῶς τῆς ζωῆς
  chosen: the light of life
  alternatives:
  - the light that gives life
  - life's light
  lexicon: BDAG
  rationale: Formal rendering preserves the compact genitival expression and its theological
    richness. The genitive may be understood as source/quality/apposition, and the
    more literal English best preserves that tension.
