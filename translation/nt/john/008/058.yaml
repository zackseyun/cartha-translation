theological_decisions:
- issue: Rendering of ἐγὼ εἰμί in a christologically charged context
  chosen_reading: I am
  alternative_readings:
  - I have been
  - I existed
  rationale: Within historic orthodox Christology, the translation should preserve
    rather than mute the strong self-referential wording. The Greek is present tense
    and unusually absolute in form here. Rendering it 'I am' allows the text's possible
    resonance with divine self-identification to remain visible without over-explaining
    it in the main text. Smoother English alternatives risk resolving the theological
    tension by reducing the force to mere preexistence.
  doctrine_reference: Affirmations; Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
