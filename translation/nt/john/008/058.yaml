id: JHN.8.58
reference: John 8:58
source:
  edition: SBLGNT
  text: εἶπεν ⸀αὐτοῖς Ἰησοῦς· Ἀμὴν ἀμὴν λέγω ὑμῖν, πρὶν Ἀβραὰμ γενέσθαι ἐγὼ εἰμί.
translation:
  text: Jesus said to them, “Truly, truly, I say to you, before Abraham came to be,
    I am.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''before Abraham was born.'' The Greek verb is broader: ''came to be''
      or ''came into existence.'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'I have been.' The Greek reads 'I am,' preserving the present-tense
      form and its possible theological resonance.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Truly, truly indeed
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula while expressing it in natural English.
    'Amen, amen' is more formal and traditional, but 'Truly, truly' better communicates
    the force for modern readers without paraphrasing.
- source_word: λέγω ὑμῖν
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close rendering of the Greek that preserves the solemn direct-address
    formula. 'I tell you' is possible, but 'I say to you' better reflects the repeated
    Johannine idiom.
- source_word: πρὶν
  chosen: before
  alternatives:
  - prior to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the infinitival clause.
- source_word: γενέσθαι
  chosen: came to be
  alternatives:
  - was born
  - came into existence
  - became
  lexicon: BDAG
  rationale: The aorist infinitive of γίνομαι is broader than physical birth and contrasts
    with ἐγὼ εἰμί. 'Came to be' preserves the verbal contrast and avoids narrowing
    the sense to birth alone. 'Came into existence' is possible but slightly more
    interpretive and less idiomatic.
- source_word: ἐγὼ εἰμί
  chosen: I am
  alternatives:
  - I have been
  - I existed
  lexicon: BDAG
  rationale: The Greek present is most directly rendered 'I am.' This preserves both
    the grammar and the stark absolute force of the expression in context. Alternatives
    such as 'I have been' smooth the English but weaken the present-tense form and
    obscure the theological resonance.
- source_word: εἶπεν αὐτοῖς Ἰησοῦς
  chosen: Jesus said to them
  alternatives:
  - Jesus told them
  lexicon: BDAG
  rationale: Straightforward narrative introduction; 'said to them' is the most direct
    equivalent of the Greek wording.
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation policy to transliterate names.
