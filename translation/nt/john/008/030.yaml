theological_decisions:
- issue: Rendering πιστεύω εἰς αὐτόν in Johannine usage
  chosen_reading: believed in him
  alternative_readings:
  - believed him
  - put their faith in him
  rationale: The preposition εἰς with πιστεύω in John normally conveys directed trust
    toward a person, not merely believing what he says. 'Believed in him' preserves
    that theological and relational force without over-paraphrasing.
