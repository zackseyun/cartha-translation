id: JHN.8.30
reference: John 8:30
source:
  edition: SBLGNT
  text: ταῦτα αὐτοῦ λαλοῦντος πολλοὶ ἐπίστευσαν εἰς αὐτόν.
translation:
  text: As he was saying these things, many believed in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he was speaking these things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'put their faith in him.'
    reason: alternative_reading
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative accusative neuter, referring to the content of Jesus's
    preceding speech. 'These things' preserves the plural form and discourse linkage
    better than the more compressed 'this.'
- source_word: αὐτοῦ λαλοῦντος
  chosen: as he was saying
  alternatives:
  - while he was speaking
  - as he was speaking
  lexicon: BDAG
  rationale: Genitive absolute with present participle indicates contemporaneous action.
    'As he was saying' is natural English and keeps the sense that their believing
    occurred during his ongoing speech. 'Saying' fits λαλέω in this context of articulated
    discourse, though 'speaking' is also possible.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: 'The adjective functions substantivally: ''many.'' Adding ''people''
    is interpretive and unnecessary in English.'
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to believe
  - put their faith
  lexicon: BDAG
  rationale: 'Aorist indicative marks the event simply as a whole: ''believed.'' This
    follows the default rendering of πιστεύω/πίστις with the faith-belief word group.
    ''Came to believe'' is possible but slightly more interpretive regarding ingressiveness.'
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: John regularly uses πιστεύω + εἰς to express personal trust directed
    toward Jesus. In idiomatic English, 'believed in him' best conveys this construction.
    More literal options like 'into him' are unnatural, and 'on him' is archaic in
    contemporary English.
