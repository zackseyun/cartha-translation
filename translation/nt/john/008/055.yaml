id: JHN.8.55
reference: John 8:55
source:
  edition: SBLGNT
  text: καὶ οὐκ ἐγνώκατε αὐτόν, ἐγὼ δὲ οἶδα αὐτόν· κἂν εἴπω ὅτι οὐκ οἶδα αὐτόν, ἔσομαι
    ὅμοιος ⸀ὑμῖν ψεύστης· ἀλλὰ οἶδα αὐτὸν καὶ τὸν λόγον αὐτοῦ τηρῶ.
translation:
  text: Yet you have not known him, but I know him. If I were to say that I do not
    know him, I would be a liar like you. But I do know him, and I keep his word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you do not know him.' The Greek verb ἐγνώκατε is perfect in form, which
      may be rendered to emphasize their continuing lack of true knowledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'If I say.' The Greek construction is hypothetical; 'If I were to say'
      brings out the sense in natural English.
    reason: lexical_alternative
  - marker: c
    text: '''Keep'' may also be rendered ''obey'' or ''observe''; in John, the verb
      often carries the sense of faithfully keeping or guarding God''s word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώκατε
  chosen: have not known
  alternatives:
  - do not know
  - have not come to know
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior lack of
    true knowledge; 'have not known' preserves the force better than a simple present,
    while remaining natural English.
- source_word: οἶδα
  chosen: know
  alternatives:
  - have known
  lexicon: BDAG
  rationale: Though formally perfect in form, οἶδα functions as a present stative
    verb meaning 'know.' Rendering it as present English is standard and best reflects
    the sense.
- source_word: κἂν εἴπω
  chosen: If I were to say
  alternatives:
  - even if I say
  - if I say
  lexicon: BDAG
  rationale: In this context the construction introduces a hypothetical contrary-to-fact
    style statement. 'If I were to say' conveys the rhetorical force more clearly
    in idiomatic English than the more wooden 'if I say.'
- source_word: ἔσομαι
  chosen: I would be
  alternatives:
  - I will be
  lexicon: BDAG
  rationale: Although future in form, in this conditional context English naturally
    uses 'would be' to express the result of the hypothetical statement.
- source_word: ὅμοιος ὑμῖν
  chosen: like you
  alternatives:
  - similar to you
  - like you all
  lexicon: BDAG
  rationale: This is the straightforward comparative sense. 'Like you' is natural
    and preserves the direct confrontation addressed to Jesus's opponents.
- source_word: ψεύστης
  chosen: a liar
  alternatives:
  - 'false'
  - one who lies
  lexicon: BDAG
  rationale: The noun denotes a liar, not merely someone mistaken. The singular predicate
    in English is best rendered 'a liar.'
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between the hypothetical falsehood and the actual
    truth Jesus states.
- source_word: τὸν λόγον αὐτοῦ
  chosen: his word
  alternatives:
  - his message
  - what he says
  lexicon: BDAG
  rationale: λόγος here can mean word/message. 'His word' preserves the Johannine
    diction and allows both speech and revealed message to remain in view.
- source_word: τηρῶ
  chosen: I keep
  alternatives:
  - I obey
  - I observe
  - I guard
  lexicon: BDAG
  rationale: τηρέω includes the sense of keeping, observing, and guarding. 'Keep'
    is preferred in Johannine contexts because it preserves the broader covenantal
    and relational nuance without reducing it to mere rule-obedience.
- source_word: καὶ ... δὲ
  chosen: Yet ... but
  alternatives:
  - and ... but
  - and ... yet
  lexicon: BDAG
  rationale: The discourse particles mark contrast. Rendering the opening καὶ as 'Yet'
    captures the adversative flow in English better than a simple 'and'.
