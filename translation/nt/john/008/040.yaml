id: JHN.8.40
reference: John 8:40
source:
  edition: SBLGNT
  text: νῦν δὲ ζητεῖτέ με ἀποκτεῖναι, ἄνθρωπον ὃς τὴν ἀλήθειαν ὑμῖν λελάληκα ἣν ἤκουσα
    παρὰ τοῦ θεοῦ· τοῦτο Ἀβραὰμ οὐκ ἐποίησεν.
translation:
  text: But now you are seeking to kill me, a man who has told you the truth that
    I heard from God. Abraham did not do this.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - Now, however
  - But as it is
  lexicon: BDAG
  rationale: Preserves the adversative force of δέ and the temporal contrast of νῦν
    in natural English.
- source_word: ζητεῖτέ με ἀποκτεῖναι
  chosen: you are seeking to kill me
  alternatives:
  - you seek to kill me
  - you are trying to kill me
  lexicon: BDAG
  rationale: ζητέω with infinitive can mean seek/try to do something. 'Are seeking
    to kill' preserves the present tense and the intentional pursuit without over-interpreting.
- source_word: ἀποκτεῖναι
  chosen: to kill
  alternatives:
  - to put to death
  - to murder
  lexicon: BDAG
  rationale: '''Kill'' is the most direct lexical equivalent. ''Murder'' would add
    a moral/legal nuance not explicit in the verb itself; ''put to death'' sounds
    more formal and institutional than the context requires.'
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - a human being
  lexicon: BDAG
  rationale: Gender-accurate and contextually appropriate. Jesus refers to himself
    as ἄνθρωπον in the singular masculine; 'a man' is the natural rendering and preserves
    the incarnational force without flattening it to a generic 'human being'.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: Retains the article and Johannine emphasis on truth as definite content
    spoken by Jesus.
- source_word: ὑμῖν λελάληκα
  chosen: has told you
  alternatives:
  - has spoken to you
  - have told you
  lexicon: BDAG
  rationale: The perfect λελάληκα denotes completed speech with present relevance.
    English idiom prefers 'has told you' here with the relative clause introduced
    by 'who.'
- source_word: λελάληκα
  chosen: has told
  alternatives:
  - have spoken
  - have said
  lexicon: BDAG
  rationale: Although first person singular in Greek, English relative-clause idiom
    shifts naturally to 'who has told you' after 'a man.' This preserves sense and
    aspect more smoothly than 'a man who I have told you...'.
- source_word: ἣν ἤκουσα παρὰ τοῦ θεοῦ
  chosen: that I heard from God
  alternatives:
  - which I heard from God
  - that I heard from the presence of God
  lexicon: BDAG
  rationale: παρά with genitive commonly means 'from' in the sense of source/origin.
    'From God' is clear and natural; 'from the presence of God' would over-specify.
- source_word: τοῦ θεοῦ
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English normally omits the article with 'God' in this construction. The
    referent is definite without needing 'the God'.
- source_word: τοῦτο Ἀβραὰμ οὐκ ἐποίησεν
  chosen: Abraham did not do this
  alternatives:
  - This Abraham did not do
  - Abraham did not act this way
  lexicon: BDAG
  rationale: Natural English while preserving the emphatic contrast with Abraham's
    conduct. 'Did not act this way' is interpretive; 'did not do this' stays closer
    to the Greek.
