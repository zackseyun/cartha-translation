theological_decisions:
- issue: Rendering ἄνθρωπον in Jesus' self-description
  chosen_reading: a man
  alternative_readings:
  - a human being
  rationale: The verse explicitly presents Jesus as speaking of himself as ἄνθρωπον.
    Rendering it 'a man' preserves the plain lexical sense and aligns with the doctrine's
    gender-accurate principle, while remaining fully compatible with orthodox Christology
    by not diminishing his divinity or obscuring his humanity.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §4
- issue: Source of Jesus' message in παρὰ τοῦ θεοῦ
  chosen_reading: from God
  alternative_readings:
  - from the Father
  rationale: The Greek text says τοῦ θεοῦ, not 'the Father.' The translation should
    not import a more specific theological title than the verse itself uses, even
    though Johannine theology elsewhere closely relates the two.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
