theological_decisions:
- issue: Nature of the freedom in 'the truth will set you free'
  chosen_reading: Render the statement without specifying political, psychological,
    or specifically spiritual freedom in the main text.
  alternative_readings:
  - the truth will make you spiritually free
  - the truth will liberate you from sin
  rationale: Although the broader Johannine context develops freedom in relation to
    sin (especially the following verses), this verse itself states the promise more
    tersely. The translation preserves that theological breadth and lets the immediate
    context interpret it rather than importing an explanatory gloss into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
