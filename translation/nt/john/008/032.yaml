id: JHN.8.32
reference: John 8:32
source:
  edition: SBLGNT
  text: καὶ γνώσεσθε τὴν ἀλήθειαν, καὶ ἡ ἀλήθεια ἐλευθερώσει ὑμᾶς.
translation:
  text: and you will know the truth, and the truth will set you free.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will come to know the truth.'
    reason: lexical_alternative
  - marker: b
    text: The freedom here is left unspecified in the wording of the verse itself;
      the surrounding context connects it with freedom from sin.
    reason: cross_reference
lexical_decisions:
- source_word: γνώσεσθε
  chosen: you will know
  alternatives:
  - you will come to know
  - you will understand
  lexicon: BDAG
  rationale: Future middle indicative of γινώσκω. 'Know' is the most direct and natural
    rendering. 'Come to know' brings out the ingressive nuance possible in context,
    but the simpler 'will know' preserves both readability and the Greek's straightforward
    future sense without over-interpreting.
- source_word: ἀλήθειαν / ἀλήθεια
  chosen: the truth
  alternatives:
  - truth
  - what is true
  lexicon: BDAG
  rationale: The article is present both times in Greek, so 'the truth' is retained
    in both clauses. This preserves the specificity and rhetorical repetition of the
    source text.
- source_word: ἐλευθερώσει
  chosen: will set ... free
  alternatives:
  - will free
  - will liberate
  lexicon: BDAG
  rationale: Future active indicative of ἐλευθερόω. 'Set free' is idiomatic modern
    English and preserves the causative force better than the less natural bare 'free'
    while avoiding the potentially politicized or overstated tone of 'liberate'.
- source_word: ὑμᾶς
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: Second person plural object. Standard English 'you' is natural; the plural
    sense is recoverable from context, and 'you all' would add emphasis not explicit
    in the Greek.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - then ... and
  - and ... then
  lexicon: BDAG
  rationale: Both conjunctions are retained to mirror the coordinate structure of
    the Greek. This preserves the verse's cadence and logical progression without
    paraphrasing.
