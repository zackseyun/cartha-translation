id: JHN.8.46
reference: John 8:46
source:
  edition: SBLGNT
  text: τίς ἐξ ὑμῶν ἐλέγχει με περὶ ἁμαρτίας; ⸀εἰ ἀλήθειαν λέγω, διὰ τί ὑμεῖς οὐ πιστεύετέ
    μοι;
translation:
  text: Which one of you convicts me concerning sin? If I speak the truth, why do
    you not believe me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who among you proves me guilty of sin?'
    reason: lexical_alternative
  - marker: b
    text: Or 'why do you not trust me?' The Greek can carry both the sense of believing
      a speaker and trusting him.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς ἐξ ὑμῶν
  chosen: Which one of you
  alternatives:
  - Who among you
  - Which of you
  lexicon: BDAG
  rationale: τίς with ἐξ ὑμῶν is an interrogative expression meaning 'who from among
    you.' 'Which one of you' preserves the direct challenge to Jesus' hearers in natural
    English.
- source_word: ἐλέγχει
  chosen: convicts
  alternatives:
  - proves guilty
  - exposes
  - shows to be wrong
  lexicon: BDAG
  rationale: ἐλέγχω can mean to expose, reprove, or prove guilty. In this forensic-sounding
    challenge, 'convicts' best captures the sense of establishing a charge against
    Jesus, while remaining idiomatic.
- source_word: περὶ ἁμαρτίας
  chosen: concerning sin
  alternatives:
  - of sin
  - regarding sin
  lexicon: BDAG
  rationale: περί with the genitive here indicates reference or relation. 'Concerning
    sin' is clear modern English and preserves the broad scope of the accusation rather
    than narrowing it to a specific offense.
- source_word: εἰ ἀλήθειαν λέγω
  chosen: If I speak the truth
  alternatives:
  - If I am telling the truth
  - Since I speak the truth
  lexicon: BDAG
  rationale: The conditional εἰ is retained as 'if,' reflecting the Greek form without
    forcing an interpretive shift to 'since,' even though the rhetorical context assumes
    the truth of Jesus' speech. 'Speak the truth' is a natural rendering of ἀλήθειαν
    λέγω.
- source_word: διὰ τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: διὰ τί is a standard interrogative asking reason. 'Why' is the most natural
    and accurate English equivalent.
- source_word: πιστεύετέ μοι
  chosen: do you not believe me
  alternatives:
  - do you not believe what I say
  - do you not trust me
  lexicon: BDAG
  rationale: πιστεύω with the dative can mean believe someone, trust someone, or believe
    what someone says. Here 'believe me' best preserves the Greek construction and
    leaves intact the relational and testimonial dimensions of the verb.
