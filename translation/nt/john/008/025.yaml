id: JHN.8.25
reference: John 8:25
source:
  edition: SBLGNT
  text: ἔλεγον οὖν αὐτῷ· Σὺ τίς εἶ; ⸀εἶπεν αὐτοῖς ὁ Ἰησοῦς· Τὴν ἀρχὴν ⸂ὅ τι⸃ καὶ λαλῶ
    ὑμῖν;
translation:
  text: So they were saying to him, “Who are you?” Jesus said to them, “Just what
    I have been telling you from the beginning.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What I have been telling you from the beginning.” The Greek clause
      is difficult and may also be understood in other ways.
    reason: alternative_reading
  - marker: b
    text: 'Some interpreters understand Jesus'' reply more sharply: “Why do I speak
      to you at all?”'
    reason: alternative_reading
  - marker: c
    text: Or, less likely, “Essentially, what I am saying to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they kept saying
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated questioning; 'were saying'
    preserves that aspect without overtranslating.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference in natural English. 'So' is readable
    modern English and fits the narrative flow.
- source_word: Σὺ τίς εἶ;
  chosen: Who are you?
  alternatives:
  - You—who are you?
  lexicon: BDAG
  rationale: Standard English interrogative best conveys the direct question. The
    emphatic pronoun Σὺ is naturally absorbed into English word order rather than
    made awkwardly explicit.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - answered
  - told
  lexicon: BDAG
  rationale: λέγω is the ordinary verb of speaking here. Although contextually responsive,
    'answered' would add interpretive force not explicit in the verb.
- source_word: Τὴν ἀρχὴν
  chosen: from the beginning
  alternatives:
  - at the beginning
  - altogether
  - essentially
  lexicon: BDAG
  rationale: 'This phrase in John 8:25 is famously difficult. The rendering ''from
    the beginning'' takes ἀρχή in its common temporal sense and yields coherent discourse:
    Jesus is what he has been saying all along. This avoids more obscure adverbial
    renderings while staying close to the Greek.'
- source_word: ὅ τι
  chosen: what
  alternatives:
  - that which
  - because
  lexicon: BDAG
  rationale: Taken as an indefinite relative expression introducing the content of
    what Jesus has been saying. 'What' gives idiomatic English and fits the sense
    of self-identification through prior speech.
- source_word: καὶ λαλῶ ὑμῖν
  chosen: I have been telling you
  alternatives:
  - I am also speaking to you
  - I tell you
  lexicon: BDAG
  rationale: Present λαλῶ in context refers to Jesus' ongoing address to them. English
    present perfect progressive naturally conveys the continuing force in relation
    to 'from the beginning.' 'Telling' is more idiomatic than wooden 'speaking' for
    contentful discourse.
