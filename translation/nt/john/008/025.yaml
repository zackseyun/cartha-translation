theological_decisions:
- issue: Interpretation of the difficult clause Τὴν ἀρχὴν ὅ τι καὶ λαλῶ ὑμῖν
  chosen_reading: Jesus replies that he is just what he has been telling them from
    the beginning.
  alternative_readings:
  - Why do I speak to you at all?
  - What I have told you from the beginning
  - Essentially what I am saying to you
  rationale: The Greek is syntactically compressed and has several ancient and modern
    interpretations. The chosen reading best preserves the connection between Jesus'
    identity and his prior testimony without importing a dismissive tone. It also
    aligns with the immediate context of their question 'Who are you?' and Jesus'
    repeated self-disclosure in the chapter. Because the ambiguity is genuine, major
    alternatives are preserved in footnotes rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
