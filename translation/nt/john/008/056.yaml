theological_decisions:
- issue: Meaning of 'my day' in Jesus' statement about Abraham
  chosen_reading: Retain the literal phrase 'my day' without specifying whether it
    refers to Jesus' incarnation, messianic fulfillment, crucifixion/resurrection,
    or eschatological day.
  alternative_readings:
  - Jesus' earthly ministry
  - the messianic age
  - the day of Christ's final revelation
  rationale: The Greek phrase is theologically rich but not narrowly defined in the
    verse itself. In keeping with the translation philosophy, the rendering preserves
    the text's tension rather than resolving the interpretive question in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of ἵνα in Abraham's rejoicing
  chosen_reading: 'Render as forward-looking expectation: ''that he would see.'''
  alternative_readings:
  - 'purpose: ''in order that he might see'''
  - 'complement/content: ''to see'''
  rationale: The clause can be understood in more than one closely related way, but
    the context favors Abraham's joyful anticipation of seeing Jesus' day. The chosen
    English is idiomatic and preserves that anticipation without over-specifying the
    mechanism.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    where genuine.'
