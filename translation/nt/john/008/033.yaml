theological_decisions:
- issue: Rendering δουλεύω in a context of freedom versus bondage
  chosen_reading: enslaved
  alternative_readings:
  - served
  - been in bondage
  rationale: The immediate context centers on slavery and freedom (vv. 34–36). Using
    'enslaved' preserves the social and theological force of bondage more clearly
    than the weaker 'served.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy §1'
- issue: Rendering Σπέρμα Ἀβραάμ
  chosen_reading: Abraham’s offspring
  alternative_readings:
  - Abraham’s seed
  - Abraham’s descendants
  rationale: The phrase denotes physical lineage claim without importing Pauline theological
    nuances. 'Offspring' is both accurate and readable, preserving the collective
    singular force.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §6'
