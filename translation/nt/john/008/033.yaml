id: JHN.8.33
reference: John 8:33
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν ⸂πρὸς αὐτόν⸃· Σπέρμα Ἀβραάμ ἐσμεν καὶ οὐδενὶ δεδουλεύκαμεν πώποτε·
    πῶς σὺ λέγεις ὅτι Ἐλεύθεροι γενήσεσθε;
translation:
  text: They answered him, “We are Abraham’s offspring and have never been enslaved
    to anyone. How can you say, ‘You will become free’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Abraham’s seed.” The Greek uses a singular collective expression for
      physical descent.
    reason: lexical_alternative
  - marker: b
    text: Or “have never served anyone.” The verb can mean serve, but in this context
      the sense of bondage/slavery is more prominent.
    reason: lexical_alternative
  - marker: c
    text: Or “You will be free.” The Greek more literally says “you will become free.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν πρὸς αὐτόν
  chosen: They answered him
  alternatives:
  - They answered to him
  - They replied to him
  lexicon: BDAG
  rationale: Idiomatic English normally uses 'answered him' rather than the more wooden
    'answered to him.' The sense is direct response addressed to Jesus.
- source_word: Σπέρμα Ἀβραάμ
  chosen: Abraham’s offspring
  alternatives:
  - Abraham’s seed
  - descendants of Abraham
  lexicon: BDAG
  rationale: σπέρμα is singular collective here. 'Offspring' preserves the collective
    sense in natural English better than the archaic-sounding 'seed,' while staying
    closer to the Greek than the more interpretive 'descendants.'
- source_word: οὐδενὶ
  chosen: to anyone
  alternatives:
  - to no one
  lexicon: BDAG
  rationale: With the negated verb, English idiom prefers 'have never been enslaved
    to anyone.' This preserves the dative complement without awkward double-negation.
- source_word: δεδουλεύκαμεν
  chosen: have been enslaved
  alternatives:
  - have served
  - have been slaves
  lexicon: BDAG
  rationale: From δουλεύω, the bonded sense is salient in this freedom/slavery context,
    aligning with the project's guidance to use 'slave/slavery' language where the
    bonded nature matters. 'Have been enslaved' fits the perfect tense and the rhetorical
    contrast with becoming free.
- source_word: πώποτε
  chosen: never
  alternatives:
  - ever at any time
  lexicon: BDAG
  rationale: Concise natural rendering of the adverb in a negated clause.
- source_word: πῶς σὺ λέγεις
  chosen: How can you say
  alternatives:
  - How do you say
  - How is it that you say
  lexicon: BDAG
  rationale: Captures the incredulous force of the question in idiomatic English.
    The explicit σὺ adds emphasis, which English can convey by tone rather than a
    separate 'you' emphasis.
- source_word: Ἐλεύθεροι γενήσεσθε
  chosen: You will become free
  alternatives:
  - You will be free
  - You will become liberated
  lexicon: BDAG
  rationale: γενήσεσθε is future middle of γίνομαι, 'become' rather than simply stative
    'be.' 'Free' is the natural rendering of ἐλεύθεροι in this context. 'Become free'
    preserves the transition implied by γίνομαι.
