theological_decisions:
- issue: Meaning of Jesus' contrast between 'from below/from above' and 'this world'
  chosen_reading: The translation preserves the language of origin/source and realm
    without expanding it into a full doctrinal paraphrase.
  alternative_readings:
  - A stronger interpretive rendering could make the contrast explicitly moral or
    heavenly-vs-earthly.
  rationale: The verse presents a sharp Johannine contrast between Jesus and his opponents,
    but the translation should not resolve the imagery into a narrower doctrinal statement
    than the Greek itself states. 'From below/from above' and 'from this world' preserve
    the theological tension and Christological distinction.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
