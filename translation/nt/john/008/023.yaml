id: JHN.8.23
reference: John 8:23
source:
  edition: SBLGNT
  text: καὶ ⸀ἔλεγεν αὐτοῖς· Ὑμεῖς ἐκ τῶν κάτω ἐστέ, ἐγὼ ἐκ τῶν ἄνω εἰμί· ὑμεῖς ἐκ
    ⸂τούτου τοῦ κόσμου⸃ ἐστέ, ἐγὼ οὐκ εἰμὶ ἐκ τοῦ κόσμου τούτου.
translation:
  text: And he was saying to them, “You are from below; I am from above. You are from
    this world; I am not from this world.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are of what is below … I am of what is above.”
    reason: lexical_alternative
  - marker: b
    text: In John, “world” often refers not merely to the physical earth but to the
      human order in alienation from God.
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense (3IAI) suggests ongoing or repeated speech in context;
    'was saying' preserves that aspect more closely than simple past 'said,' while
    remaining natural English.
- source_word: Ὑμεῖς / ἐγὼ
  chosen: You / I
  lexicon: BDAG
  rationale: The explicit pronouns are retained because the Greek includes them for
    emphasis, sharpening the contrast between Jesus and his hearers.
- source_word: ἐκ τῶν κάτω
  chosen: from below
  alternatives:
  - of what is below
  - from the lower realm
  lexicon: BDAG
  rationale: The idiom contrasts spatially and theologically with ἐκ τῶν ἄνω. 'From
    below' is concise, natural, and preserves the vertical contrast without over-interpreting
    the metaphor.
- source_word: ἐκ τῶν ἄνω
  chosen: from above
  alternatives:
  - of what is above
  - from the upper realm
  lexicon: BDAG
  rationale: This matches the antithesis with 'from below' and preserves Johannine
    vertical imagery. 'From above' is also a familiar Johannine expression without
    importing extra explanation.
- source_word: κόσμος
  chosen: world
  alternatives:
  - world order
  - age
  lexicon: BDAG
  rationale: In John, κόσμος commonly denotes the world in its human, fallen order
    opposed to God. 'World' is the standard and sufficiently broad rendering here;
    'age' would be too interpretive and less accurate.
- source_word: τούτου τοῦ κόσμου / τοῦ κόσμου τούτου
  chosen: this world
  alternatives:
  - the world here
  - this present world
  lexicon: BDAG
  rationale: Both Greek word orders are rendered naturally as 'this world' in English.
    The demonstrative is important and is preserved to mark the sphere to which Jesus'
    hearers belong and from which he is distinct.
- source_word: οὐκ εἰμὶ ἐκ τοῦ κόσμου τούτου
  chosen: I am not from this world
  alternatives:
  - I do not belong to this world
  lexicon: BDAG
  rationale: '''Am not from'' preserves the repeated ἐκ construction and keeps the
    origin/source emphasis. ''Do not belong'' captures implication but shifts from
    source to affiliation.'
