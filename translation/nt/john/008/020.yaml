theological_decisions:
- issue: Johannine use of 'his hour'
  chosen_reading: Retain the literal expression 'his hour' in the main text.
  alternative_readings:
  - his appointed hour
  - his time
  rationale: The phrase carries theological significance in John, pointing to the
    divinely appointed moment of Jesus' passion and glorification. Preserving the
    literal wording maintains the Gospel's thematic tension and avoids reducing the
    phrase to a merely chronological note.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
