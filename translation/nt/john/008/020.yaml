id: JHN.8.20
reference: John 8:20
source:
  edition: SBLGNT
  text: ταῦτα τὰ ῥήματα ⸀ἐλάλησεν ἐν τῷ γαζοφυλακίῳ διδάσκων ἐν τῷ ἱερῷ· καὶ οὐδεὶς
    ἐπίασεν αὐτόν, ὅτι οὔπω ἐληλύθει ἡ ὥρα αὐτοῦ.
translation:
  text: He spoke these words in the treasury while teaching in the temple, and no
    one seized him, because his hour had not yet come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple courts'; the Greek term refers to the temple complex rather
      than the inner sanctuary alone.
    reason: lexical_alternative
  - marker: b
    text: '''His hour'' in John refers to the appointed time of Jesus'' climactic
      suffering and glorification; alternatively, ''his appointed hour.'''
    reason: cross_reference
lexical_decisions:
- source_word: ταῦτα τὰ ῥήματα
  chosen: these words
  alternatives:
  - these sayings
  - these things
  lexicon: BDAG
  rationale: ῥήματα commonly refers to spoken words or sayings. 'These words' is natural
    English and preserves the reference to the immediately preceding speech without
    overinterpreting it.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: λαλέω emphasizes speaking or uttering. 'Spoke' fits the narrative style
    and pairs naturally with 'these words.'
- source_word: ἐν τῷ γαζοφυλακίῳ
  chosen: in the treasury
  alternatives:
  - in the treasury area
  - in the offering box area
  lexicon: BDAG
  rationale: γαζοφυλάκιον denotes the treasury, likely the temple treasury area rather
    than a single chest. 'In the treasury' is the standard concise rendering and best
    fits the locative phrase.
- source_word: διδάσκων
  chosen: while teaching
  alternatives:
  - teaching
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb. 'While
    teaching' makes the temporal overlap explicit in idiomatic English.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex, not specifically the sanctuary proper.
    'Temple' is acceptable in English, with the broader sense understood; a more expansive
    alternative is possible but not necessary in the main text.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: '''No one'' is the clearest standard English equivalent.'
- source_word: ἐπίασεν
  chosen: seized
  alternatives:
  - arrested
  - laid hold of
  lexicon: BDAG
  rationale: πιάζω means to seize or take hold of. 'Seized' preserves the physical
    and hostile sense without importing the more formal legal nuance of 'arrested,'
    though arrest is contextually implied.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason no one seized him. 'Because' is clearer
    in modern English than 'for.'
- source_word: οὔπω ἐληλύθει
  chosen: had not yet come
  alternatives:
  - had not yet arrived
  lexicon: BDAG
  rationale: The pluperfect of ἔρχομαι indicates that the appointed time had not yet
    arrived at that point. 'Had not yet come' is idiomatic and preserves Johannine
    phrasing.
- source_word: ἡ ὥρα αὐτοῦ
  chosen: his hour
  alternatives:
  - his appointed hour
  - his time
  lexicon: BDAG
  rationale: In John, 'hour' is a theologically loaded term referring to the divinely
    appointed time of Jesus' climactic glorification through death, resurrection,
    and exaltation. The literal 'his hour' preserves this Johannine motif without
    flattening it to the more generic 'his time.'
