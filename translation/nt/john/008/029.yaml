id: JHN.8.29
reference: John 8:29
source:
  edition: SBLGNT
  text: καὶ ὁ πέμψας με μετ’ ἐμοῦ ἐστιν· οὐκ ἀφῆκέν με ⸀μόνον, ὅτι ἐγὼ τὰ ἀρεστὰ αὐτῷ
    ποιῶ πάντοτε.
translation:
  text: And the one who sent me is with me. He has not left me alone, because I always
    do what is pleasing to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he did not leave me alone.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the things pleasing to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμψας
  chosen: the one who sent
  alternatives:
  - he who sent
  - the one having sent
  lexicon: BDAG
  rationale: The articular aorist participle functions substantivally, referring to
    the Father. 'The one who sent' is natural modern English and preserves the participial
    force without unnecessary stiffness.
- source_word: μετ’ ἐμοῦ ἐστιν
  chosen: is with me
  alternatives:
  - is alongside me
  lexicon: BDAG
  rationale: μετά with the genitive commonly means 'with, in company with.' 'Is with
    me' is the idiomatic and contextually appropriate rendering, expressing ongoing
    presence.
- source_word: οὐκ ἀφῆκέν με μόνον
  chosen: He has not left me alone
  alternatives:
  - he did not leave me alone
  - he has not abandoned me by myself
  lexicon: BDAG
  rationale: ἀφῆκεν is aorist, but in English the present relevance of the Father's
    continuing non-abandonment is well conveyed by the present perfect. μόνον is predicate-like
    with με, yielding 'alone.' 'Left me alone' is clearer and more idiomatic than
    a more wooden rendering.
- source_word: μόνον
  chosen: alone
  alternatives:
  - by myself
  lexicon: BDAG
  rationale: 'Although formally an adjective, in this construction it functions adverbially/predicatively
    with the object pronoun: ''leave me alone.'' This is standard English and best
    reflects the sense.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason the Father has not left him alone. 'Because'
    makes the causal force explicit in contemporary English.
- source_word: τὰ ἀρεστὰ αὐτῷ
  chosen: what is pleasing to him
  alternatives:
  - the things pleasing to him
  - what pleases him
  lexicon: BDAG
  rationale: The neuter plural substantive phrase literally means 'the pleasing things
    to him.' 'What is pleasing to him' preserves the evaluative nuance of ἀρεστός
    while reading naturally.
- source_word: ποιῶ πάντοτε
  chosen: I always do
  alternatives:
  - I do always
  lexicon: BDAG
  rationale: ποιῶ is present tense, expressing customary action; πάντοτε intensifies
    the constancy. 'I always do' is the most natural English order and preserves the
    durative/habitual sense.
