theological_decisions:
- issue: Reference of 'the one who sent me'
  chosen_reading: A reference to the Father, kept as the relational expression in
    the text rather than replacing it with 'the Father.'
  alternative_readings:
  - Explicitly supplying 'the Father who sent me'
  rationale: The context in John makes the referent clear, but the Greek itself uses
    the relational phrase. Retaining it preserves Johannine style and avoids adding
    words not present in the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Aspect of ἀφῆκεν in English
  chosen_reading: 'Rendered with English present perfect: ''has not left me alone.'''
  alternative_readings:
  - 'Rendered with simple past: ''did not leave me alone'''
  rationale: Although the Greek aorist is formally past, the statement emphasizes
    the Father's continuing presence with Jesus. The present perfect communicates
    that ongoing relevance in idiomatic English without altering the core meaning.
  doctrine_reference: Translation philosophy §6
