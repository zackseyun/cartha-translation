id: JHN.8.24
reference: John 8:24
source:
  edition: SBLGNT
  text: εἶπον οὖν ὑμῖν ὅτι ἀποθανεῖσθε ἐν ταῖς ἁμαρτίαις ὑμῶν· ἐὰν γὰρ μὴ πιστεύσητε
    ὅτι ἐγώ εἰμι, ἀποθανεῖσθε ἐν ταῖς ἁμαρτίαις ὑμῶν.
translation:
  text: So I told you that you will die in your sins. For unless you believe that
    I am he, you will die in your sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that I am.' The Greek does not state an explicit predicate
      after 'I am,' and the wording may carry deeper resonance in John's Gospel.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπον οὖν
  chosen: So I told
  alternatives:
  - Therefore I said
  - So I said
  lexicon: BDAG
  rationale: οὖν is inferential/discourse-linking; 'So' gives natural English cohesion.
    The aorist εἶπον is rendered with simple past 'told/said.' 'Told' fits the dative
    ὑμῖν smoothly in English without changing meaning.
- source_word: ἀποθανεῖσθε
  chosen: you will die
  alternatives:
  - you will die off
  - you will perish
  lexicon: BDAG
  rationale: Future middle of ἀποθνῄσκω is best rendered straightforwardly as 'you
    will die.' 'Perish' would add interpretive weight not explicit in the verb itself.
- source_word: ἐν ταῖς ἁμαρτίαις ὑμῶν
  chosen: in your sins
  alternatives:
  - in your sin
  - with your sins
  lexicon: BDAG
  rationale: 'The plural ἁμαρτίαις should be preserved as ''sins.'' The preposition
    ἐν here expresses sphere/state: dying while remaining in one''s sins. ''In your
    sins'' is the established and semantically accurate rendering.'
- source_word: ἐὰν γὰρ μὴ
  chosen: For unless
  alternatives:
  - for if not
  - because unless
  lexicon: BDAG
  rationale: This combination introduces the ground for the prior statement with a
    negative condition. 'For unless' captures both γάρ and ἐὰν μή in idiomatic English.
- source_word: πιστεύσητε
  chosen: you believe
  alternatives:
  - you trust
  - you have faith
  lexicon: BDAG
  rationale: πιστεύω commonly means 'believe' in Johannine usage, often with strong
    trust/reliance overtones. Main text uses the standard English gloss 'believe';
    'trust' is a viable nuance but not necessary in the main line.
- source_word: ὅτι ἐγώ εἰμι
  chosen: that I am he
  alternatives:
  - that I am
  - that I am the one
  lexicon: BDAG
  rationale: The Greek lacks an explicit predicate after ἐγώ εἰμι. In context, English
    often requires a supplied predicate, and 'I am he' is a natural idiomatic completion
    indicating identity. Because the absolute 'I am' may also be heard here, that
    alternative is preserved in a footnote rather than resolved away.
