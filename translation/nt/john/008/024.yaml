theological_decisions:
- issue: Rendering the Johannine expression ἐγώ εἰμι without an explicit predicate
  chosen_reading: that I am he
  alternative_readings:
  - that I am
  rationale: The phrase can be read either as an idiomatic self-identification ('I
    am he') or as a more absolute expression with possible resonance of divine self-revelation.
    To preserve theological tension rather than over-resolve it, the main text uses
    idiomatic English while the more literal alternative is preserved in a footnote.
    This avoids flattening the Greek while still producing readable modern English.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
