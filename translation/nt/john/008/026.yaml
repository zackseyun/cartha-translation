theological_decisions:
- issue: Referent of 'the one who sent me'
  chosen_reading: An implicit reference to the Father is preserved without making
    the referent explicit in the translation.
  alternative_readings:
  - But the Father who sent me is true
  rationale: The context in John makes the referent clear, but the Greek uses the
    participial expression rather than naming 'the Father' here. The translation preserves
    the source wording and avoids importing an explicit noun not present in the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of κρίνειν
  chosen_reading: Rendered broadly as 'to judge' rather than 'to condemn.'
  alternative_readings:
  - to condemn
  - to pass sentence on
  rationale: Given the immediate context and the semantic range of κρίνω, the verse
    states Jesus has grounds to speak and judge concerning his hearers, without requiring
    the narrower doctrinal claim of explicit condemnation in this clause.
  doctrine_reference: Translation philosophy §3
