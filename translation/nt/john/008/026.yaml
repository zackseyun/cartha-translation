id: JHN.8.26
reference: John 8:26
source:
  edition: SBLGNT
  text: πολλὰ ἔχω περὶ ὑμῶν λαλεῖν καὶ κρίνειν· ἀλλ’ ὁ πέμψας με ἀληθής ἐστιν, κἀγὼ
    ἃ ἤκουσα παρ’ αὐτοῦ ταῦτα ⸀λαλῶ εἰς τὸν κόσμον.
translation:
  text: I have many things to say and to judge concerning you. But the one who sent
    me is true, and what I heard from him—these things I speak to the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what I heard from him, this I speak to the world.' The Greek explicitly
      repeats the demonstrative 'these things' for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ
  chosen: many things
  alternatives:
  - much
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally; 'many things' is idiomatic
    in English and preserves the plurality better than the less natural 'much' in
    this construction.
- source_word: περὶ ὑμῶν
  chosen: concerning you
  alternatives:
  - about you
  - regarding you
  lexicon: BDAG
  rationale: περί with the genitive here marks reference/topic. 'Concerning you' is
    slightly more formal and fits the judicial tone of the verse.
- source_word: λαλεῖν
  chosen: to say
  alternatives:
  - to speak
  lexicon: BDAG
  rationale: In the first infinitive pair, 'to say' reads more naturally in English
    alongside 'to judge,' while still representing λαλέω as verbal utterance. The
    second occurrence is rendered 'speak' for stylistic clarity; this variance is
    contextually documented.
- source_word: κρίνειν
  chosen: to judge
  alternatives:
  - to condemn
  - to pass judgment on
  lexicon: BDAG
  rationale: κρίνω can range from judging/discerning to condemning. Here 'to judge'
    preserves the broader sense without importing the narrower idea of condemnation,
    which the context does not require explicitly.
- source_word: ὁ πέμψας με
  chosen: the one who sent me
  alternatives:
  - he who sent me
  - my sender
  lexicon: BDAG
  rationale: Articular participle is best rendered as a substantive phrase in natural
    English. This preserves the personal reference to the Father without overformal
    archaism.
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  - reliable
  lexicon: BDAG
  rationale: In Johannine usage, ἀληθής often carries the sense of being true/genuine.
    'True' is concise and preserves the theological resonance without over-specifying
    whether the emphasis is on veracity or genuineness.
- source_word: ἃ ἤκουσα παρ’ αὐτοῦ
  chosen: what I heard from him
  alternatives:
  - the things that I heard from him
  lexicon: BDAG
  rationale: The relative clause refers to the content received from the sender. 'What
    I heard from him' is idiomatic and accurately conveys the accusative neuter plural
    relative pronoun as content.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek and resumes the prior relative
    clause. Retaining 'these things' preserves the emphasis and discourse linkage,
    even though English might omit it for smoothness.
- source_word: λαλῶ
  chosen: I speak
  alternatives:
  - I say
  - I tell
  lexicon: BDAG
  rationale: For the main finite verb, 'I speak' preserves the ongoing present and
    matches the public proclamation sense directed outward to the world.
- source_word: εἰς τὸν κόσμον
  chosen: to the world
  alternatives:
  - into the world
  - for the world
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with verbs of speaking it can indicate
    direction toward an audience. 'To the world' is the most natural English rendering
    and fits Johannine usage of κόσμος as the world of humanity in opposition/unbelief.
