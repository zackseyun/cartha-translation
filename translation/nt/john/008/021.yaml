id: JHN.8.21
reference: John 8:21
source:
  edition: SBLGNT
  text: Εἶπεν οὖν πάλιν ⸀αὐτοῖς· Ἐγὼ ὑπάγω καὶ ζητήσετέ με, καὶ ἐν τῇ ἁμαρτίᾳ ὑμῶν
    ἀποθανεῖσθε· ὅπου ἐγὼ ὑπάγω ὑμεῖς οὐ δύνασθε ἐλθεῖν.
translation:
  text: So he said to them again, “I am going away, and you will seek me, and you
    will die in your sin. Where I am going, you are not able to come.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will look for me.' The verb can denote searching for someone, and
      in John it may also carry a deeper spiritual sense.
    reason: lexical_alternative
  - marker: b
    text: 'Greek singular: ''in your sin.'' Some translations render ''in your sins,''
      but the singular likely emphasizes a continuing condition rather than individual
      acts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you cannot come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference from the preceding exchange. 'So'
    is natural modern English and preserves the connective force without sounding
    wooden.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Straightforward adverb of repetition; 'again' is the most natural equivalent.
- source_word: Ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but English naturally conveys
    this with normal subject placement here; no extra typographic emphasis was added
    to avoid overstating it.
- source_word: ὑπάγω
  chosen: am going away
  alternatives:
  - am going
  - am departing
  lexicon: BDAG
  rationale: In Johannine usage, ὑπάγω often carries the sense of departure, especially
    Jesus' going away from his hearers and ultimately to the Father. 'Am going away'
    preserves both the present tense and the sense of departure better than the bare
    'go.'
- source_word: ζητήσετέ με
  chosen: you will seek me
  alternatives:
  - you will look for me
  lexicon: BDAG
  rationale: 'ζητέω can mean seek/look for. ''Seek'' preserves the gravity and possible
    double sense in John: literal searching and deeper spiritual failure to find him.'
- source_word: ἐν τῇ ἁμαρτίᾳ ὑμῶν
  chosen: in your sin
  alternatives:
  - in your sins
  - with your sin
  lexicon: BDAG
  rationale: The Greek is singular ('sin'), and the singular should be preserved unless
    context compels otherwise. Here it likely denotes the state or condition of sin,
    not a list of acts. 'In your sin' reflects the preposition ἐν and the singular
    noun.
- source_word: ἀποθανεῖσθε
  chosen: you will die
  lexicon: BDAG
  rationale: Future middle form with deponent force; simple future 'you will die'
    is the natural English rendering.
- source_word: ὅπου ἐγὼ ὑπάγω
  chosen: Where I am going
  alternatives:
  - Where I go
  - Where I am going away
  lexicon: BDAG
  rationale: Retains the present tense and the repeated ὑπάγω. 'Where I am going'
    is idiomatic and keeps the ongoing/departure nuance without overloading the clause.
- source_word: οὐ δύνασθε ἐλθεῖν
  chosen: you are not able to come
  alternatives:
  - you cannot come
  lexicon: BDAG
  rationale: A slightly more formal rendering preserves the explicit δύνασθε ('are
    able') rather than collapsing it entirely into 'cannot.' This keeps the statement's
    force of incapacity/exclusion.
