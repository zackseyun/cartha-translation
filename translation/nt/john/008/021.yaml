theological_decisions:
- issue: Singular ἁμαρτίᾳ versus a more idiomatic plural rendering
  chosen_reading: Rendered as 'in your sin' in the main text
  alternative_readings:
  - in your sins
  rationale: The Greek text has singular ἁμαρτίᾳ, and preserving the singular avoids
    importing a different nuance. In Johannine context this can denote the hearers'
    continuing state of unbelief and alienation from God rather than merely multiple
    sinful acts. The translation preserves that tension without making the interpretation
    explicit in the main text.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Force of Jesus' departure in ὑπάγω
  chosen_reading: Rendered as 'I am going away'
  alternative_readings:
  - I am going
  - I am departing
  rationale: In John, Jesus' 'going' often points beyond mere movement to his departure
    through death, resurrection, and return to the Father. 'Going away' preserves
    the immediate sense without over-interpreting the destination in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension'
