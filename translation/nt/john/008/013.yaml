id: JHN.8.13
reference: John 8:13
source:
  edition: SBLGNT
  text: εἶπον οὖν αὐτῷ οἱ Φαρισαῖοι· Σὺ περὶ σεαυτοῦ μαρτυρεῖς· ἡ μαρτυρία σου οὐκ
    ἔστιν ἀληθής.
translation:
  text: So the Pharisees said to him, “You are testifying about yourself; your testimony
    is not true.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your testimony is not valid.' The Greek says 'not true,' which may also
      carry the sense of legal validity in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks narrative/logical continuation from the preceding discourse. 'So'
    is natural modern English and preserves the inferential flow without sounding
    overly formal.
- source_word: εἶπον ... οἱ Φαρισαῖοι
  chosen: the Pharisees said
  alternatives:
  - the Pharisees said therefore
  - the Pharisees then said
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in the aorist. English places the
    subject before the verb for natural style while preserving the sense.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and should remain a pronoun in translation;
    supplying 'Jesus' would be interpretive rather than necessary.
- source_word: Σὺ
  chosen: You
  alternatives:
  - You yourself
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can convey this adequately
    by retaining 'You' at the front of the clause without adding extra emphasis not
    demanded by the context.
- source_word: περὶ σεαυτοῦ
  chosen: about yourself
  alternatives:
  - concerning yourself
  - on your own behalf
  lexicon: BDAG
  rationale: The phrase indicates the subject matter of the testimony. 'About yourself'
    is the most straightforward and idiomatic rendering here.
- source_word: μαρτυρεῖς
  chosen: are testifying
  alternatives:
  - testify
  - bear witness
  lexicon: BDAG
  rationale: Present tense is represented with an English progressive for natural
    speech in direct discourse. 'Testifying' is clearer for modern readers than the
    more traditional 'bear witness,' while preserving the legal-evidentiary sense.
- source_word: ἡ μαρτυρία σου
  chosen: your testimony
  alternatives:
  - your witness
  lexicon: BDAG
  rationale: Maintains lexical consistency with μαρτυρεῖς and preserves the juridical
    sense of attestation.
- source_word: οὐκ ἔστιν ἀληθής
  chosen: is not true
  alternatives:
  - is not valid
  - is not trustworthy
  lexicon: BDAG
  rationale: ἀληθής can denote truthfulness or validity in this dispute context. 'True'
    is the most direct lexical equivalent and leaves the precise nuance open, preserving
    the tension of the accusation.
