theological_decisions:
- issue: Meaning of the Pharisees' objection to self-testimony
  chosen_reading: The accusation is rendered as 'your testimony is not true,' preserving
    the wording of truthfulness without narrowing it to legal inadmissibility alone.
  alternative_readings:
  - your testimony is not valid
  - your testimony is not admissible
  rationale: In context the dispute has legal overtones, but the Greek adjective ἀληθής
    is broader than a strictly technical legal term. Rendering it 'true' preserves
    both the legal and truth-claim dimensions without importing a narrower interpretive
    conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
