id: JHN.8.57
reference: John 8:57
source:
  edition: SBLGNT
  text: εἶπον οὖν οἱ Ἰουδαῖοι πρὸς αὐτόν· Πεντήκοντα ἔτη οὔπω ἔχεις καὶ Ἀβραὰμ ἑώρακας;
translation:
  text: So the Jews said to him, “You are not yet fifty years old, and you have seen
    Abraham?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans' or 'the Jewish leaders,' depending on how broadly John
      intends οἱ Ἰουδαῖοι in context.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The phrase is the standard narrative designation in John. 'The Jews'
    is the most direct rendering of the Greek. 'The Judeans' is possible in some Johannine
    contexts, and 'the Jewish leaders' is interpretive, but here the text itself does
    not specify leaders only, so the more literal rendering is retained.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks an inferential or consequential transition from the preceding statement.
    'So' is natural modern English and preserves the discourse connection without
    sounding overly formal.
- source_word: πεντήκοντα ἔτη οὔπω ἔχεις
  chosen: You are not yet fifty years old
  alternatives:
  - You do not yet have fifty years
  - You are not yet fifty years old
  lexicon: BDAG
  rationale: The Greek idiom literally uses 'have' with years/age. English normally
    expresses this as 'be ... years old.' This is an idiomatic translation rather
    than a woodenly literal one.
- source_word: ἑώρακας
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: BDAG
  rationale: Perfect active indicative of ὁράω. The English present perfect best reflects
    the Greek perfect's resultant-state nuance and matches the implied absurdity in
    the speakers' response to Jesus' claim about Abraham.
- source_word: καὶ
  chosen: and
  alternatives:
  - yet
  lexicon: BDAG
  rationale: The conjunction is straightforwardly additive in Greek. English can preserve
    the rhetorical force with 'and' in this incredulous question.
- source_word: Ἀβραὰμ
  chosen: Abraham
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, in keeping with
    the translation philosophy of transliterating names.
