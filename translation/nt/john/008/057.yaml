theological_decisions:
- issue: Rendering οἱ Ἰουδαῖοι in John
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: This term in John can be contextually sensitive and has interpretive
    implications. Here the Greek text itself gives the broad designation without narrowing
    it to authorities alone. To avoid importing a narrower referent not explicit in
    the text, the main text keeps 'the Jews,' while preserving alternatives in a footnote
    for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
