id: JHN.8.42
reference: John 8:42
source:
  edition: SBLGNT
  text: ⸀εἶπεν αὐτοῖς ὁ Ἰησοῦς· Εἰ ὁ θεὸς πατὴρ ὑμῶν ἦν ἠγαπᾶτε ἂν ἐμέ, ἐγὼ γὰρ ἐκ
    τοῦ θεοῦ ἐξῆλθον καὶ ἥκω· οὐδὲ γὰρ ἀπ’ ἐμαυτοῦ ἐλήλυθα, ἀλλ’ ἐκεῖνός με ἀπέστειλεν.
translation:
  text: Jesus said to them, “If God were your Father, you would love me, because I
    came from God and am here. For I have not come from myself, but he sent me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “because I proceeded from God and have come.”
    reason: lexical_alternative
  - marker: b
    text: Or, “For I have not come on my own.” The Greek can emphasize either source
      (“from myself”) or independent initiative.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ ... ἦν ... ἠγαπᾶτε ἂν
  chosen: If God were your Father, you would love me
  alternatives:
  - If God was your Father, you would love me
  lexicon: BDAG
  rationale: The combination of εἰ with imperfect ἦν and imperfect ἠγαπᾶτε plus ἄν
    expresses a contrary-to-fact condition. English subjunctive-style 'were' and modal
    'would love' best convey the unreal condition.
- source_word: θεὸς πατὴρ ὑμῶν
  chosen: God were your Father
  alternatives:
  - God was your father
  lexicon: BDAG
  rationale: Anarthrous/appositional structure is naturally rendered 'God ... your
    Father.' 'Father' is capitalized because it functions as a divine relational title
    here, not merely a generic noun.
- source_word: ἠγαπᾶτε
  chosen: would love
  alternatives:
  - would be loving
  lexicon: BDAG
  rationale: ἀγαπάω is rendered with the default 'love' per doctrine. The imperfect
    in this conditional is best represented idiomatically as 'would love' rather than
    a progressive form.
- source_word: ἐγὼ γὰρ
  chosen: because I
  alternatives:
  - for I
  lexicon: BDAG
  rationale: γάρ here gives the reason for why they would love him if God were truly
    their Father. 'Because' makes the causal force clear in contemporary English,
    while preserving the logic of the argument.
- source_word: ἐκ τοῦ θεοῦ ἐξῆλθον
  chosen: I came from God
  alternatives:
  - I proceeded from God
  - I went out from God
  lexicon: BDAG
  rationale: ἐξέρχομαι with ἐκ marks origin/source. 'Came from God' is natural English
    and preserves the claim of divine origin without importing later technical theological
    vocabulary into the main text.
- source_word: καὶ ἥκω
  chosen: and am here
  alternatives:
  - and have come
  - and I am present
  lexicon: BDAG
  rationale: ἥκω commonly denotes arrival with present result/state. 'Am here' captures
    the present force in idiomatic English better than the less natural 'have come'
    in this sequence.
- source_word: οὐδὲ γὰρ ἀπ’ ἐμαυτοῦ ἐλήλυθα
  chosen: For I have not come from myself
  alternatives:
  - For I have not come on my own
  - For I did not come from myself
  lexicon: BDAG
  rationale: ἀπ’ ἐμαυτοῦ denies self-origin or self-initiative. 'From myself' keeps
    the source-oriented language parallel to the previous clause; the perfect ἐλήλυθα
    is rendered with English present perfect.
- source_word: ἀλλ’ ἐκεῖνός με ἀπέστειλεν
  chosen: but he sent me
  alternatives:
  - but that one sent me
  lexicon: BDAG
  rationale: ἐκεῖνος is emphatic, referring to God. English normally uses 'he' rather
    than 'that one' here. 'Sent' preserves the mission language of ἀποστέλλω without
    overformalizing.
