theological_decisions:
- issue: Rendering Jesus' origin language without over-specifying later doctrinal
    categories
  chosen_reading: I came from God and am here
  alternative_readings:
  - I proceeded from God and have come
  rationale: The verse strongly affirms Jesus' divine origin and mission, consistent
    with orthodox Christology, but the translation avoids importing later creedal
    terminology into the main text where the Greek itself uses ordinary verbs of coming
    and being present. A more formal alternative is preserved in a footnote for auditability.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Meaning of ἀπ’ ἐμαυτοῦ
  chosen_reading: not come from myself
  alternative_readings:
  - not come on my own
  rationale: The phrase can denote both source and independent initiative. The chosen
    rendering preserves the source-language parallelism with 'from God,' while the
    alternative idiomatic sense is preserved in a footnote because it may help readers
    grasp the implied meaning of non-self-authorization.
  doctrine_reference: Translation philosophy §§1, 3, 5
