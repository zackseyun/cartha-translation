id: JHN.8.38
reference: John 8:38
source:
  edition: SBLGNT
  text: ⸂ἃ ἐγὼ⸃ ἑώρακα παρὰ τῷ ⸀πατρὶ λαλῶ· καὶ ὑμεῖς οὖν ⸂ἃ ἠκούσατε⸃ παρὰ ⸂τοῦ πατρὸς⸃
    ποιεῖτε.
translation:
  text: I speak of what I have seen with the Father, and you, then, do what you have
    heard from your father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I speak the things that I have seen with the Father,
      and you therefore do the things that you heard from the father.' The second
      'father' is left less explicit here, though the wider context clarifies the
      referent (see v. 44).
    reason: alternative_reading
lexical_decisions:
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun functioning idiomatically as an object
    clause. English 'what' is more natural than the more formal 'the things that'
    while preserving the referential sense.
- source_word: ἑώρακα
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: BDAG
  rationale: Perfect tense indicates a past perception with continuing relevance;
    English present perfect best reflects this aspect.
- source_word: παρὰ τῷ πατρὶ
  chosen: with the Father
  alternatives:
  - from the Father
  - in the Father's presence
  lexicon: BDAG
  rationale: παρά with the dative commonly conveys proximity or presence ('with, in
    the presence of'). Here it fits the contrast with Jesus' unique relationship to
    the Father better than a simple source sense.
- source_word: λαλῶ
  chosen: I speak of
  alternatives:
  - I speak
  - I am speaking
  lexicon: BDAG
  rationale: The verb means 'speak,' but in English 'I speak of what I have seen'
    idiomatically links the relative clause to the content of speech. This avoids
    awkwardness while not adding meaning beyond the context.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks an inferential or resumptive connection. 'Then' preserves the discourse
    flow without overstating formal logical force.
- source_word: ἠκούσατε
  chosen: you have heard
  alternatives:
  - you heard
  lexicon: BDAG
  rationale: Aorist can be rendered as simple past, but present perfect in English
    works well in parallel with 'I have seen' and highlights what has shaped their
    present action.
- source_word: παρὰ τοῦ πατρὸς
  chosen: from your father
  alternatives:
  - from the father
  lexicon: BDAG
  rationale: παρά with the genitive normally indicates source ('from'). Although the
    Greek text lacks an explicit possessive pronoun, the immediate context in John
    8 contrasts Jesus' Father with his opponents' father, so English idiom and contextual
    clarity favor 'your father.' This makes explicit what is strongly implied by the
    discourse rather than introducing a new idea.
- source_word: ποιεῖτε
  chosen: do
  alternatives:
  - are doing
  - practice
  lexicon: BDAG
  rationale: Present tense here denotes their characteristic action. 'Do' is concise
    and natural; the durative nuance is sufficiently conveyed by context.
- source_word: πατήρ / πατρὸς
  chosen: Father / father
  alternatives: []
  lexicon: BDAG
  rationale: Capitalized 'Father' in the first instance signals reference to God in
    relation to Jesus; lowercase 'father' in the second instance preserves the contextual
    contrast without prematurely specifying identity in the main text.
