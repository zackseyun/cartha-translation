theological_decisions:
- issue: Whether to identify the second 'father' explicitly as the devil in the main
    text
  chosen_reading: Retain the more implicit 'your father' rather than 'the devil' or
    'your father the devil.'
  alternative_readings:
  - from the father
  - from the devil
  rationale: In the immediate discourse, Jesus will explicitly identify their father
    as the devil in v. 44, but v. 38 itself leaves the referent less explicit. Preserving
    'your father' maintains the narrative and rhetorical progression rather than importing
    the later clarification into this verse. At the same time, English requires some
    clarification because the Greek article alone can sound unnatural if rendered
    woodenly as 'the father.'
  doctrine_reference: Preserve theological tension rather than resolve it.
