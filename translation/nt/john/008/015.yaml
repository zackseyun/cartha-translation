theological_decisions:
- issue: Meaning of σάρξ in the phrase κατὰ τὴν σάρκα
  chosen_reading: Rendered as 'flesh' in the main text, allowing the phrase to denote
    judgment by merely human, worldly, or outward criteria without collapsing it into
    a technical doctrine of 'sinful nature.'
  alternative_readings:
  - by human standards
  - according to outward appearance
  rationale: The doctrine guidance specifies 'flesh' for literal uses and 'sinful
    nature' for metaphorical uses, documented per verse. In John 8:15 the phrase is
    idiomatic and likely refers to human or superficial standards of judgment. Retaining
    'flesh' preserves the source-language texture and theological tension rather than
    resolving the phrase into a single interpretive paraphrase.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table
    for σάρξ'
