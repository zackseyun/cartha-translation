id: JHN.8.15
reference: John 8:15
source:
  edition: SBLGNT
  text: ὑμεῖς κατὰ τὴν σάρκα κρίνετε, ἐγὼ οὐ κρίνω οὐδένα.
translation:
  text: You judge according to the flesh; I judge no one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by human standards' or 'according to outward appearance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: Second-person plural pronoun is explicit and somewhat emphatic in Greek.
    English 'You' captures the subject naturally; the stronger emphasis is not required
    in the main text but is reflected by word order.
- source_word: κατὰ τὴν σάρκα
  chosen: according to the flesh
  alternatives:
  - by human standards
  - according to outward appearance
  lexicon: BDAG
  rationale: The phrase is idiomatic. Because σάρξ is a contested term with default
    rendering 'flesh' when literal and 'sinful nature' when metaphorical, 'according
    to the flesh' best preserves the Johannine wording and theological tension without
    over-interpreting it as merely 'sinful nature.' The alternatives express likely
    sense in context but are more interpretive, so they are preserved in a footnote
    rather than adopted in the main text.
- source_word: κρίνετε
  chosen: judge
  alternatives:
  - pass judgment
  lexicon: BDAG
  rationale: Present active indicative, second person plural. 'Judge' is the most
    direct and natural rendering. 'Pass judgment' is possible but less concise and
    not necessary here.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: Explicit first-person pronoun creates contrast with ὑμεῖς. English 'I'
    adequately carries the contrast in this antithetical sentence; stronger emphasis
    is possible but not required.
- source_word: οὐ κρίνω οὐδένα
  chosen: I judge no one
  alternatives:
  - I do not judge anyone
  lexicon: BDAG
  rationale: The negation with οὐδένα is naturally rendered 'no one.' This preserves
    the force and brevity of the Greek. 'I do not judge anyone' is equivalent in sense
    but slightly less direct.
