id: JHN.8.50
reference: John 8:50
source:
  edition: SBLGNT
  text: ἐγὼ δὲ οὐ ζητῶ τὴν δόξαν μου· ἔστιν ὁ ζητῶν καὶ κρίνων.
translation:
  text: But I do not seek my own glory; there is One who seeks it and judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there is the one who seeks and judges.' The implied
      object of 'seeks' is Jesus' glory from the previous clause.
    reason: lexical_alternative
  - marker: b
    text: The unnamed 'One' is commonly understood from context to refer to the Father,
      though the Greek does not state this explicitly here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun retained in English for emphasis, matching the contrastive
    force of the clause in context.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ marks contrast with the preceding accusations and Jesus' denial
    of self-seeking; 'But' best conveys that adversative sense.
- source_word: οὐ ζητῶ
  chosen: do not seek
  alternatives:
  - am not seeking
  - do not pursue
  lexicon: BDAG
  rationale: Present indicative with οὐ is naturally rendered as a simple present
    in English. 'Seek' preserves the lexical connection with the participle ζητῶν
    later in the verse.
- source_word: τὴν δόξαν μου
  chosen: my own glory
  alternatives:
  - my glory
  - honor for myself
  lexicon: BDAG
  rationale: δόξα here refers to honor or glory due to a person. 'My own glory' makes
    explicit that Jesus is denying self-glorification, a nuance natural in English
    though possessively implicit in μου.
- source_word: ἔστιν
  chosen: there is
  alternatives:
  - he is
  lexicon: BDAG
  rationale: Existential 'there is' is the most natural way to introduce the unnamed
    subject in English before the articular participles. It preserves the Greek's
    deliberate indefiniteness while implying a known referent from context.
- source_word: ὁ ζητῶν
  chosen: One who seeks it
  alternatives:
  - the one seeking
  - one who seeks
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'One who seeks it'
    is idiomatic English. 'It' is supplied because the object 'my glory' is understood
    from the previous clause and is required for natural English.
- source_word: καὶ κρίνων
  chosen: and judges
  alternatives:
  - and is judging
  lexicon: BDAG
  rationale: Present participle coordinated with ζητῶν; rendered with a finite verb
    in English for smoothness while preserving the ongoing verbal sense. 'Judges'
    fits the forensic context of John 8.
