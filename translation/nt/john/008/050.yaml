theological_decisions:
- issue: Identity of the unnamed subject who seeks and judges
  chosen_reading: The translation leaves the subject implicit as 'One,' without explicitly
    identifying him as the Father in the main text.
  alternative_readings:
  - There is the Father who seeks it and judges
  - There is one who seeks and judges
  rationale: In context, the referent is widely understood to be the Father, especially
    in Johannine theology, but the Greek text itself leaves the subject unnamed. To
    avoid importing an explicit identification not stated in the verse, the main text
    preserves the textual restraint while allowing readers to infer the referent from
    context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
