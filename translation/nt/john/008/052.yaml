theological_decisions:
- issue: Meaning of Jesus' promise about death
  chosen_reading: Retain the literal expression 'taste death' without resolving whether the reference is primarily to physical death, spiritual death, or eschatological death.
  alternative_readings:
  - physical death
  - spiritual death
  - eternal death / final death
  rationale: The opponents in context take Jesus' words in a straightforward sense and object that Abraham and the prophets died. John's Gospel often operates with layered meaning, so the translation should preserve the phrase rather than interpret it doctrinally in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T03:35:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/john/008/052.json
  category: awkward_english
  tier: 1
  from: he will certainly never taste death forever
  to: he will certainly never taste death, ever
  rationale: The Greek phrase οὐ μὴ ... εἰς τὸν αἰῶνα emphasizes that the *act of tasting death* will *never occur, for all time*. The current English 'taste death forever' could be misconstrued as 'taste *eternal death*' or 'taste death *for an eternal duration*,' rather than 'never taste death *at any point in eternity*.' Rephrasing to 'he will certainly never taste death, ever' or 'he will certainly never taste death throughout eternity' clarifies that the negation extends throughout eternity, aligning with the drafter's own stated intent in the rationale ('the sense is that he will never taste death at all').
