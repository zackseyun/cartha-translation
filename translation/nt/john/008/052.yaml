id: JHN.8.52
reference: John 8:52
source:
  edition: SBLGNT
  text: ⸀εἶπον αὐτῷ οἱ Ἰουδαῖοι· Νῦν ἐγνώκαμεν ὅτι δαιμόνιον ἔχεις. Ἀβραὰμ ἀπέθανεν καὶ οἱ προφῆται, καὶ σὺ λέγεις· Ἐάν τις τὸν λόγον μου τηρήσῃ, οὐ μὴ γεύσηται θανάτου εἰς τὸν αἰῶνα·
translation:
  text: The Jews said to him, “Now we know that you have a demon. Abraham died, and the prophets also, yet you say, ‘If anyone keeps my word, he will certainly never taste death, ever.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you are demon-possessed.” The Greek is literally, “you have a demon.”
    reason: lexical_alternative
  - marker: b
    text: “Will certainly never taste death forever” is an emphatic Greek expression meaning “will never ever taste death.”
    reason: lexical_alternative
  - marker: c
    text: Or 'he will certainly never taste death forever'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἱ Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: Standard rendering in John for the group opposing Jesus here. 'Judeans' is possible geographically/ethnically, and 'Jewish leaders' is interpretive; the text itself says 'the Jews,' so the more direct rendering is retained.
- source_word: Νῦν ἐγνώκαμεν
  chosen: Now we know
  alternatives:
  - Now we have come to know
  lexicon: BDAG
  rationale: The perfect of γινώσκω conveys a present state resulting from realization. 'Now we know' is idiomatic English and preserves the force without awkwardness.
- source_word: δαιμόνιον ἔχεις
  chosen: you have a demon
  alternatives:
  - you are demon-possessed
  lexicon: BDAG
  rationale: More formally reflects the Greek expression 'have a demon.' 'Are demon-possessed' is a common interpretive equivalent, but the source wording is preserved in the main text.
- source_word: Ἀβραὰμ ἀπέθανεν
  chosen: Abraham died
  alternatives:
  - Abraham has died
  lexicon: BDAG
  rationale: Aorist rendered as simple past in natural English.
- source_word: οἱ προφῆται
  chosen: the prophets also
  alternatives:
  - the prophets
  lexicon: BDAG
  rationale: The added 'also' brings out the coordination with Abraham expressed by καί in context.
- source_word: καὶ σὺ λέγεις
  chosen: yet you say
  alternatives:
  - and you say
  - but you say
  lexicon: BDAG
  rationale: The conjunction here carries adversative force in context, highlighting the contrast between the death of Abraham and the prophets and Jesus' claim.
- source_word: Ἐάν τις
  chosen: If anyone
  alternatives:
  - If someone
  lexicon: BDAG
  rationale: Natural indefinite conditional in English; preserves the generic scope.
- source_word: τὸν λόγον μου τηρήσῃ
  chosen: keeps my word
  alternatives:
  - keeps my message
  - obeys my word
  lexicon: BDAG
  rationale: '''Word'' preserves λόγος and matches Johannine diction; ''keeps'' reflects τηρέω as guard/keep/observe without narrowing it merely to obedience.'
- source_word: οὐ μὴ γεύσηται
  chosen: he will certainly never taste
  alternatives:
  - he will never taste
  - he will certainly not experience
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is emphatically negative; 'certainly never' captures the strong denial. 'Taste' is retained rather than interpreted as 'experience' because the metaphor is transparent in English.
- source_word: θανάτου
  chosen: death
  lexicon: BDAG
  rationale: Direct rendering of the genitive after γεύομαι.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - ever
  lexicon: BDAG
  rationale: Idiomatic rendering of the Johannine expression meaning 'forever' or 'ever.' Because English placement can sound awkward, it is retained at the end to preserve the Greek emphasis, though the sense is that he will never taste death at all.
