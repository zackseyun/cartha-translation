theological_decisions:
- issue: Relation between physical descent from Abraham and true alignment with Abraham
  chosen_reading: Render σπέρμα Ἀβραάμ in a plainly genealogical sense ('Abraham’s
    offspring') without importing the later distinction of spiritual children into
    this verse.
  alternative_readings:
  - Abraham’s children
  rationale: In context Jesus acknowledges their physical lineage while challenging
    their response to him. 'Offspring' keeps the statement factual and avoids prematurely
    resolving the theological contrast developed in the surrounding verses.
  doctrine_reference: Preserve theological tension rather than resolve it.
