id: JHN.8.37
reference: John 8:37
source:
  edition: SBLGNT
  text: οἶδα ὅτι σπέρμα Ἀβραάμ ἐστε· ἀλλὰ ζητεῖτέ με ἀποκτεῖναι, ὅτι ὁ λόγος ὁ ἐμὸς
    οὐ χωρεῖ ἐν ὑμῖν.
translation:
  text: I know that you are Abraham’s offspring; but you are seeking to kill me, because
    my word has no place in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Abraham’s seed' or 'descendants of Abraham.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my word finds no room in you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπέρμα Ἀβραάμ
  chosen: Abraham’s offspring
  alternatives:
  - Abraham’s seed
  - descendants of Abraham
  lexicon: BDAG
  rationale: σπέρμα is singular collective here, referring to physical descent. 'Offspring'
    preserves the collective sense in natural English better than the more wooden
    'seed,' while avoiding the slightly more interpretive plural 'descendants.'
- source_word: ζητεῖτέ με ἀποκτεῖναι
  chosen: you are seeking to kill me
  alternatives:
  - you seek to kill me
  - you are trying to kill me
  lexicon: BDAG
  rationale: ζητέω with infinitive can mean seek, attempt, or desire to do something.
    'Are seeking to kill me' reflects the present tense and preserves the verbal force
    without overinterpreting motive. 'Trying' is possible but slightly more interpretive.
- source_word: ὁ λόγος ὁ ἐμὸς
  chosen: my word
  alternatives:
  - my message
  - what I say
  lexicon: BDAG
  rationale: λόγος can mean word, message, or speech. 'My word' is the most direct
    rendering and preserves Johannine diction, where λόγος often carries layered significance.
    'Message' is possible but flattens the lexical connection.
- source_word: οὐ χωρεῖ ἐν ὑμῖν
  chosen: has no place in you
  alternatives:
  - finds no room in you
  - does not make progress among you
  - has no hold in you
  lexicon: BDAG
  rationale: χωρέω can denote making room for, receiving, or advancing. In this context
    Jesus explains their hostility by their non-reception of his word. 'Has no place
    in you' is idiomatic English that preserves the metaphor of lack of inward receptivity
    without narrowing the sense too much.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - yet
  - instead
  lexicon: BDAG
  rationale: The conjunction marks a strong contrast between physical descent from
    Abraham and their hostile response to Jesus. 'But' is the clearest natural rendering.
- source_word: οἶδα ὅτι
  chosen: I know that
  alternatives:
  - I know
  lexicon: BDAG
  rationale: A straightforward rendering of the introductory clause; retaining 'that'
    reflects the explicit content clause in Greek and reads naturally in English.
