id: JHN.8.41
reference: John 8:41
source:
  edition: SBLGNT
  text: ὑμεῖς ποιεῖτε τὰ ἔργα τοῦ πατρὸς ὑμῶν. ⸀εἶπαν αὐτῷ· Ἡμεῖς ἐκ πορνείας ⸂οὐ
    γεγεννήμεθα⸃· ἕνα πατέρα ἔχομεν τὸν θεόν.
translation:
  text: You are doing the works of your father.” They said to him, “We were not born
    from sexual immorality; we have one Father—God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We are not illegitimate children.' The Greek literally says, 'We were
      not born from sexual immorality.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖτε
  chosen: are doing
  alternatives:
  - do
  lexicon: BDAG
  rationale: Present indicative conveys ongoing action; English progressive brings
    out the immediate, active force in Jesus' accusation more naturally in context.
- source_word: τὰ ἔργα
  chosen: the works
  alternatives:
  - the deeds
  lexicon: BDAG
  rationale: ἔργα commonly means 'works/deeds.' 'Works' preserves the verbal link
    with ποιεῖτε and echoes Johannine usage.
- source_word: τοῦ πατρὸς ὑμῶν
  chosen: of your father
  alternatives:
  - of your ancestor
  - of your parent
  lexicon: BDAG
  rationale: πατήρ here is relational and metaphorical, referring to spiritual lineage
    or source. 'Father' preserves both the literal wording and the theological tension
    of the passage.
- source_word: ἐκ πορνείας
  chosen: from sexual immorality
  alternatives:
  - of fornication
  - from illicit sexual union
  lexicon: BDAG
  rationale: πορνεία broadly denotes sexual immorality. In this idiom with γεννάω,
    it refers to illegitimate birth. 'From sexual immorality' is clear modern English
    while staying close to the Greek.
- source_word: οὐ γεγεννήμεθα
  chosen: we were not born
  alternatives:
  - we have not been born
  lexicon: BDAG
  rationale: Perfect passive can be rendered idiomatically in English as a simple
    past in this birth expression. 'Were not born' is the natural equivalent.
- source_word: ἕνα πατέρα ἔχομεν
  chosen: we have one Father
  alternatives:
  - we have one father
  lexicon: BDAG
  rationale: The anarthrous ἕνα stresses uniqueness. Capitalizing 'Father' in direct
    apposition to 'God' reflects the referent without changing the sense.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - namely, God
  lexicon: BDAG
  rationale: Appositional accusative identifies the one Father as God. An em dash
    in English conveys the apposition naturally.
