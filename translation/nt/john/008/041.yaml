theological_decisions:
- issue: Whether the speakers' denial of being born 'from sexual immorality' should
    be made more explicit as a claim to legitimate ancestry
  chosen_reading: Retain the literal statement 'We were not born from sexual immorality'
    in the main text
  alternative_readings:
  - We are not illegitimate children
  - We were not born of fornication
  rationale: The Greek idiom likely implies a denial of illegitimacy, possibly with
    a polemical edge, but the text itself states the claim in terms of birth 'from
    πορνεία.' Preserving the literal wording avoids over-interpreting while allowing
    readers to sense the accusation and response.
  doctrine_reference: Preserve theological tension rather than resolve it.
