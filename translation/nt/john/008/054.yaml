id: JHN.8.54
reference: John 8:54
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Ἐὰν ἐγὼ ⸀δοξάσω ἐμαυτόν, ἡ δόξα μου οὐδέν ἐστιν· ἔστιν ὁ
    πατήρ μου ὁ δοξάζων με, ὃν ὑμεῖς λέγετε ὅτι θεὸς ⸀ἡμῶν ἐστιν,
translation:
  text: Jesus answered, “If I glorify myself, my glory is nothing. My Father is the
    one who glorifies me, he whom you say is our God,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read “your God” instead of “our God.”
    reason: textual_variant
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue; 'answered'
    is idiomatic and sufficiently formal.
- source_word: δοξάσω
  chosen: glorify
  alternatives:
  - honor
  lexicon: BDAG
  rationale: δοξάζω in Johannine usage carries the weight of giving glory, not merely
    showing respect. 'Glorify' preserves the theological resonance of the Gospel's
    glory theme.
- source_word: ἡ δόξα μου οὐδέν ἐστιν
  chosen: my glory is nothing
  alternatives:
  - my glory counts for nothing
  - my glory is worth nothing
  lexicon: BDAG
  rationale: A relatively formal rendering of the clause. 'Is nothing' closely reflects
    οὐδέν ἐστιν while remaining natural English.
- source_word: ὁ πατήρ μου
  chosen: My Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: Capitalized in English to reflect its use by Jesus as a personal divine
    designation in context, while not altering the underlying lexical sense.
- source_word: ὁ δοξάζων με
  chosen: is the one who glorifies me
  alternatives:
  - glorifies me
  - the one glorifying me
  lexicon: BDAG
  rationale: The articular present participle is rendered with an English relative
    construction to preserve the ongoing/descriptive force and readability.
- source_word: ὃν ὑμεῖς λέγετε ὅτι θεὸς ἡμῶν ἐστιν
  chosen: he whom you say is our God
  alternatives:
  - the one you say is our God
  - whom you say is our God
  lexicon: BDAG
  rationale: This preserves the relative-clause structure and the direct force of
    Jesus' address to his opponents. 'Our God' follows the SBLGNT reading ἡμῶν.
- source_word: θεὸς
  chosen: God
  alternatives:
  - god
  lexicon: BDAG
  rationale: In this context the referent is the God of Israel, so English capitalization
    is appropriate.
- source_word: ἡμῶν
  chosen: our
  alternatives:
  - your
  lexicon: NA28/SBLGNT textual tradition
  rationale: The SBLGNT text reads ἡμῶν ('our'). Because some manuscripts read ὑμῶν
    ('your'), the alternative is preserved in a textual footnote.
