theological_decisions:
- issue: Pronoun in 'θεὸς ἡμῶν/ὑμῶν ἐστιν'
  chosen_reading: our God
  alternative_readings:
  - your God
  rationale: Following the provided SBLGNT base text, the main text uses 'our God.'
    Because 'your God' is a meaningful textual variant with interpretive significance
    in this dispute context, it is preserved in a footnote rather than silently ignored.
  doctrine_reference: Translation philosophy §1, §3
