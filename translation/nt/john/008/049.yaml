theological_decisions:
- issue: Reference of 'my Father'
  chosen_reading: Jesus refers to God as his Father in a distinctive Johannine sense;
    rendered 'my Father' with capitalized 'Father'.
  alternative_readings:
  - generic familial 'my father'
  rationale: The immediate context in John consistently uses 'Father' as a divine
    title for God in Jesus' speech. Capitalization reflects this contextual identification
    without altering the wording.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §6'
- issue: Meaning of 'have a demon'
  chosen_reading: Retain the literal idiom 'have a demon' in the main text.
  alternative_readings:
  - '''am demon-possessed'''
  rationale: The Greek wording is direct and should be preserved where understandable
    in English. The alternative expresses the likely sense but is more interpretive
    than the source wording.
  doctrine_reference: Translation philosophy §1, §3
