id: JHN.8.49
reference: John 8:49
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς· Ἐγὼ δαιμόνιον οὐκ ἔχω, ἀλλὰ τιμῶ τὸν πατέρα μου, καὶ ὑμεῖς
    ἀτιμάζετέ με.
translation:
  text: Jesus answered, “I do not have a demon, but I honor my Father, and you dishonor
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “I am not possessed by a demon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the most natural and
    common English rendering in Johannine dialogue.
- source_word: δαιμόνιον
  chosen: a demon
  alternatives:
  - a demon spirit
  - a demonized condition
  lexicon: BDAG
  rationale: The accusative singular with ἔχω idiomatically means 'have a demon,'
    i.e., be under demonic influence/possession. 'A demon' preserves the direct lexical
    sense without paraphrasing.
- source_word: οὐκ ἔχω
  chosen: do not have
  alternatives:
  - do not possess
  - am not possessed by
  lexicon: BDAG
  rationale: A formally close rendering that preserves the Greek idiom. 'Am not possessed
    by a demon' is interpretive and therefore kept as an alternative rather than the
    main text.
- source_word: τιμῶ
  chosen: honor
  alternatives:
  - glorify
  - show honor to
  lexicon: BDAG
  rationale: τιμάω commonly means 'honor' or 'value highly.' 'Honor' is the clearest
    direct equivalent here and fits the contrast with ἀτιμάζω.
- source_word: τὸν πατέρα μου
  chosen: my Father
  alternatives:
  - my father
  lexicon: BDAG
  rationale: In Johannine context Jesus' reference to 'my Father' is a significant
    theological designation for God. Capitalizing 'Father' in English signals titular/divine
    reference without adding content beyond context.
- source_word: ἀτιμάζετέ
  chosen: dishonor
  alternatives:
  - treat with contempt
  - insult
  lexicon: BDAG
  rationale: Chosen to preserve the lexical contrast with τιμῶ ('honor'). 'Insult'
    is possible but narrows the sense; 'dishonor' better matches the reciprocal honor-shame
    language.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun retained straightforwardly.
- source_word: Ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but English can convey this
    adequately in the clause without an overly marked 'I myself.'
