theological_decisions:
- issue: Rhetorical force of 'your law'
  chosen_reading: Retain 'your law' as Jesus' direct address to his opponents, without
    softening it to 'the law' or harmonizing it with broader Johannine theology.
  alternative_readings:
  - the law
  - your own law
  rationale: The Greek explicitly includes the second-person possessive. Preserving
    it maintains the rhetorical tension of the discourse without importing a theological
    claim that Jesus rejects the law itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering ἀνθρώπων in a legal maxim
  chosen_reading: Translate as 'men' in the main text.
  alternative_readings:
  - people
  - persons
  rationale: The project prefers gender-accurate renderings over flattening masculine
    forms into gender-neutral English when the source uses masculine wording with
    representative force. Because English readers may hear 'men' as male-exclusive,
    the broader legal sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §4
