id: JHN.8.17
reference: John 8:17
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ νόμῳ δὲ τῷ ὑμετέρῳ γέγραπται ὅτι δύο ἀνθρώπων ἡ μαρτυρία ἀληθής
    ἐστιν.
translation:
  text: And even in your law it is written that the testimony of two men is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the testimony of two people is true.' The Greek says 'two men,' a conventional
      legal expression for human witnesses.
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμῳ
  chosen: law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish legal/scriptural corpus Jesus appeals
    to. Lowercase 'law' fits the immediate polemical phrase 'your law' and avoids
    implying only the Pentateuch as a formal title, while still preserving the scriptural-legal
    sense.
- source_word: ὑμετέρῳ
  chosen: your
  alternatives:
  - your own
  lexicon: BDAG
  rationale: The possessive adjective is rendered simply as 'your' to preserve Jesus'
    rhetorical distancing from his interlocutors' appeal to the law. Adding 'own'
    would sharpen the tone beyond what the Greek explicitly requires.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: The perfect passive formula is a standard scriptural citation marker.
    'It is written' is idiomatic, accurate, and preserves the enduring authority implied
    by the perfect tense.
- source_word: δύο ἀνθρώπων
  chosen: two men
  alternatives:
  - two people
  - two human beings
  lexicon: BDAG
  rationale: ἄνθρωπος can mean 'human being' generically, but in this legal maxim
    the phrase naturally refers to two human witnesses. Per the project's gender-accurate
    principle, 'men' is retained because it matches the Greek form and traditional
    legal phrasing without materially changing the sense.
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: μαρτυρία denotes witness/testimony. 'Testimony' fits the juridical context
    and works smoothly with the genitive phrase 'of two men.'
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - valid
  - trustworthy
  lexicon: BDAG
  rationale: ἀληθής literally means 'true.' In context it carries legal validity,
    but 'true' preserves the wording of the Greek while allowing the legal implication
    to remain implicit.
- source_word: καὶ ... δὲ
  chosen: And even
  alternatives:
  - And also
  - Now even
  lexicon: BDAG
  rationale: The combination of καί and δέ adds connective and mildly emphatic force.
    'And even' captures the flow and emphasis in natural English.
