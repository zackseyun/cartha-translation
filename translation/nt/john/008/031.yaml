id: JHN.8.31
reference: John 8:31
source:
  edition: SBLGNT
  text: Ἔλεγεν οὖν ὁ Ἰησοῦς πρὸς τοὺς πεπιστευκότας αὐτῷ Ἰουδαίους· Ἐὰν ὑμεῖς μείνητε
    ἐν τῷ λόγῳ τῷ ἐμῷ, ἀληθῶς μαθηταί μού ἐστε,
translation:
  text: So Jesus was saying to the Jews who had believed him, “If you remain in my
    word, you are truly my disciples,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to the Jews who had believed in him.” The Greek says literally “who
      had believed him.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔλεγεν
  chosen: was saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive past speech; 'was saying'
    preserves the aspect better than simple 'said'.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks discourse continuation/inference in natural modern English without
    overstating logical force.
- source_word: πρὸς τοὺς πεπιστευκότας αὐτῷ Ἰουδαίους
  chosen: to the Jews who had believed him
  alternatives:
  - to the Jews who had believed in him
  - to the believing Jews
  lexicon: BDAG
  rationale: The perfect participle πεπιστευκότας is rendered 'had believed' to reflect
    prior resulting action. The dative αὐτῷ is kept as 'him' rather than expanded
    to 'in him,' since the Greek here does not include εἰς and source-language primacy
    favors the more direct rendering. 'Who had believed him' is clearer and more precise
    than the compressed 'believing Jews'.
- source_word: Ἐὰν
  chosen: If
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the subjunctive; 'if' is the standard
    and clearest rendering.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis, but standard English can carry
    the sense without adding awkward stress; the emphasis is sufficiently conveyed
    by word order and context.
- source_word: μείνητε
  chosen: remain
  alternatives:
  - abide
  - continue
  lexicon: BDAG
  rationale: μένω in Johannine usage often carries the sense of continuing/remaining.
    'Remain' is readable modern English and preserves the relational and persevering
    nuance better than the more archaic 'abide'.
- source_word: ἐν τῷ λόγῳ τῷ ἐμῷ
  chosen: in my word
  alternatives:
  - in my teaching
  - in what I say
  lexicon: BDAG
  rationale: λόγος here likely refers to Jesus' message/teaching, but 'word' preserves
    Johannine diction and theological resonance while remaining understandable. The
    possessive is naturally rendered 'my word'.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - really
  - indeed
  lexicon: BDAG
  rationale: Conveys genuineness/authenticity in a concise way fitting the contrastive
    force of the statement.
- source_word: μαθηταί μού ἐστε
  chosen: you are truly my disciples
  alternatives:
  - you are really my disciples
  lexicon: BDAG
  rationale: μαθηταί is best rendered 'disciples' in Gospel context. English word
    order places 'truly' before 'my disciples' for natural style while preserving
    the predicate sense.
