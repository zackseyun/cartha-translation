theological_decisions:
- issue: Rendering πιστεύω with dative αὐτῷ
  chosen_reading: who had believed him
  alternative_readings:
  - who had believed in him
  rationale: The Greek construction here uses the dative pronoun rather than an explicit
    preposition such as εἰς. To avoid importing a fuller theological formulation than
    the text states, the main text keeps the more direct 'believed him.' Because English
    readers may expect 'believed in him' in Johannine contexts, that alternative is
    preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §3 (Preserve theological tension rather than resolve it)
