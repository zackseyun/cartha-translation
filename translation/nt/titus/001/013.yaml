id: TIT.1.13
reference: Titus 1:13
source:
  edition: SBLGNT
  text: ἡ μαρτυρία αὕτη ἐστὶν ἀληθής. δι’ ἣν αἰτίαν ἔλεγχε αὐτοὺς ἀποτόμως, ἵνα ὑγιαίνωσιν
    ἐν τῇ πίστει,
translation:
  text: This testimony is true. For this reason, rebuke them sharply, so that they
    may be sound in the faith,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "sound in faith." The Greek phrase can refer either to being healthy
      in their faith or to being sound in the Christian faith as a body of belief.
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  - statement
  lexicon: BDAG
  rationale: '"Testimony" best fits the sense of a reported witness or assertion about
    the Cretans in the preceding citation. It preserves the evidentiary nuance better
    than the more generic "statement."'
- source_word: ἀληθής
  chosen: 'true'
  alternatives:
  - truthful
  lexicon: BDAG
  rationale: Predicate adjective describing the testimony as corresponding to reality.
    "True" is the most natural and direct English rendering here.
- source_word: δι’ ἣν αἰτίαν
  chosen: For this reason
  alternatives:
  - because of this
  - for which cause
  lexicon: BDAG
  rationale: This idiom introduces the inference from the preceding statement. "For
    this reason" is clear modern English and preserves the causal force without archaic
    wording.
- source_word: ἔλεγχε
  chosen: rebuke
  alternatives:
  - reprove
  - expose
  - correct
  lexicon: BDAG
  rationale: The present imperative calls Titus to confront error directly. "Rebuke"
    captures the corrective and confrontational force better than the softer "correct."
- source_word: ἀποτόμως
  chosen: sharply
  alternatives:
  - severely
  - sternly
  lexicon: BDAG
  rationale: The adverb indicates abruptness or severity in manner. "Sharply" is idiomatic
    and preserves the force without overstating it as punitive.
- source_word: ὑγιαίνωσιν
  chosen: may be sound
  alternatives:
  - may be healthy
  - may be spiritually healthy
  lexicon: BDAG
  rationale: The verb literally relates to health, but in the Pastorals often carries
    the figurative sense of being doctrinally or spiritually sound. "May be sound"
    preserves the metaphor while fitting the context of faith and teaching.
- source_word: πίστει
  chosen: the faith
  alternatives:
  - faith
  lexicon: BDAG
  rationale: With the article, the phrase can naturally denote the Christian faith
    as the sphere/content in which they are to be sound, not merely subjective believing.
    Because πίστις is a contested term in the project, the alternative "faith" is
    preserved in a footnote. Here "the faith" best suits the Pastorals' concern for
    sound doctrine.
