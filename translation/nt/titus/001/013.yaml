theological_decisions:
- issue: Meaning of ἐν τῇ πίστει
  chosen_reading: the faith
  alternative_readings:
  - faith
  rationale: In the Pastoral Epistles, πίστις with the article often points to the
    Christian faith in its doctrinal content or recognized body of belief. This fits
    the immediate concern with false teachers and the goal of restoring doctrinal
    soundness. Per project guidance on contested πίστις, the alternative is preserved
    in a footnote rather than erased.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
