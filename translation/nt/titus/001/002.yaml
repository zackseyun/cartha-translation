theological_decisions:
- issue: Temporal phrase πρὸ χρόνων αἰωνίων and divine promise
  chosen_reading: The verse states that God's promise of eternal life precedes the
    ages, rendered as 'before the ages began,' without specifying the metaphysical
    mechanics of to whom the promise was made.
  alternative_readings:
  - before time began
  - before eternal ages
  - from all eternity
  rationale: The Greek clearly places the promise before the ages, but interpreters
    differ on whether this means an intra-Trinitarian promise, a decree, or simply
    God's pretemporal purpose. The translation preserves the temporal claim without
    resolving the theological question beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Description of God as ἀψευδής
  chosen_reading: Render as 'the God who does not lie' rather than a stronger doctrinal
    paraphrase such as 'the God who cannot lie.'
  alternative_readings:
  - the God who cannot lie
  - the truthful God
  rationale: Historic orthodoxy affirms God's truthfulness, but the translation should
    not intensify the wording beyond what the adjective directly states. The chosen
    rendering is faithful to the Greek while remaining theologically sound.
  doctrine_reference: Do not import doctrinal claims the text does not make.
