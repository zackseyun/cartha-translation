id: TIT.1.2
reference: Titus 1:2
source:
  edition: SBLGNT
  text: ἐπ’ ἐλπίδι ζωῆς αἰωνίου, ἣν ἐπηγγείλατο ὁ ἀψευδὴς θεὸς πρὸ χρόνων αἰωνίων
translation:
  text: in the hope of eternal life, which the God who does not lie promised before
    the ages began
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'before time began.' The Greek literally speaks of 'before eternal/age-long
      times.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἐλπίδι
  chosen: in the hope
  alternatives:
  - on the basis of hope
  - with a view to hope
  lexicon: BDAG
  rationale: The preposition ἐπί with the dative can express basis, circumstance,
    or sphere. In this epistolary context, 'in the hope' is idiomatic English and
    preserves the sense that Paul's apostleship/ministry operates in relation to the
    hope described, without over-specifying causation.
- source_word: ζωῆς αἰωνίου
  chosen: of eternal life
  alternatives:
  - of everlasting life
  lexicon: BDAG
  rationale: The genitive is naturally rendered as the content/object of hope. 'Eternal
    life' is the standard and clear rendering of ζωή αἰώνιος in the NT, preserving
    both duration and theological resonance.
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: The feminine singular relative pronoun most naturally refers back to
    'eternal life' rather than to 'hope.' 'Which' provides a smooth English connection
    to the following clause.
- source_word: ἐπηγγείλατο
  chosen: promised
  alternatives:
  - made a promise of
  - pledged
  lexicon: BDAG
  rationale: The aorist middle of ἐπαγγέλλομαι is well represented by 'promised.'
    English does not normally preserve the middle nuance here, and 'promised' is both
    accurate and natural.
- source_word: ὁ ἀψευδὴς θεὸς
  chosen: the God who does not lie
  alternatives:
  - the truthful God
  - the unlying God
  - the God incapable of lying
  lexicon: BDAG
  rationale: ἀψευδής means 'not lying, truthful.' Rendering it as a relative clause
    avoids awkward English ('unlying') and preserves the moral attribute stated in
    the text. 'Incapable of lying' is interpretively stronger than the adjective itself,
    so it is not preferred in the main text.
- source_word: πρὸ χρόνων αἰωνίων
  chosen: before the ages began
  alternatives:
  - before eternal times
  - before times long ago
  - before time began
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers to a time before the ages/world-order
    as experienced in history. 'Before the ages began' is more formally tethered to
    χρόνων αἰωνίων than 'before time began,' which is smoother but more interpretive.
    It preserves the pretemporal force without importing later metaphysical precision.
