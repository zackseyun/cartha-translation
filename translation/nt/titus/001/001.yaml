theological_decisions:
- issue: Rendering of ἐκλεκτῶν θεοῦ
  chosen_reading: God’s chosen ones
  alternative_readings:
  - God's elect
  rationale: The Greek clearly speaks of divine election/chosenness, but the translation
    avoids importing a narrower denominational system beyond the text itself. 'Chosen
    ones' preserves the meaning while remaining accessible.
  doctrine_reference: Affirmations; Translation philosophy items 5 and 6
- issue: Relation expressed by κατὰ πίστιν ... καὶ ἐπίγνωσιν
  chosen_reading: Paul's apostleship is oriented toward/for the faith of God's chosen
    ones and the knowledge of the truth
  alternative_readings:
  - according to the faith...
  - in accordance with the faith...
  rationale: The syntax is compressed and somewhat flexible. The chosen rendering
    reflects the likely missional orientation of Paul's office without overstating
    a technical theological scheme.
  doctrine_reference: Translation philosophy item 3
