id: TIT.1.1
reference: Titus 1:1
source:
  edition: SBLGNT
  text: Παῦλος δοῦλος θεοῦ, ἀπόστολος δὲ Ἰησοῦ Χριστοῦ κατὰ πίστιν ἐκλεκτῶν θεοῦ καὶ
    ἐπίγνωσιν ἀληθείας τῆς κατ’ εὐσέβειαν
translation:
  text: Paul, a slave of God and an apostle of Jesus Messiah, for the faith of God’s
    chosen ones and the knowledge of the truth that accords with godliness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God’s elect.'
    reason: lexical_alternative
  - marker: b
    text: Or 'full knowledge of the truth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the truth which leads to godliness.'
    reason: alternative_reading
lexical_decisions:
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per doctrine guidance, δοῦλος should be rendered 'slave' where the bonded
    nature is theologically salient. In Paul's self-designation, the term emphasizes
    total belonging and commissioned status under God more strongly than the softer
    'servant.'
- source_word: θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: 'Straight genitive of possession/relationship modifying δοῦλος: Paul
    belongs to God.'
- source_word: ἀπόστολος
  chosen: apostle
  alternatives:
  - messenger
  - envoy
  lexicon: BDAG
  rationale: '''Apostle'' is the established and precise term for Paul''s commissioned
    office; alternatives are possible semantically but too weak for this epistolary
    and ecclesial context.'
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ marks mild connective progression rather than contrast. English
    'and' reads naturally in appositional self-identification.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Following doctrine guidance, Χριστός is translated as 'Messiah' where
    it functions as a title. In this opening identification, the titular sense remains
    clear rather than merely name-like.
- source_word: κατὰ
  chosen: for
  alternatives:
  - according to
  - in accordance with
  - with reference to
  lexicon: BDAG
  rationale: The preposition here introduces the purpose/reference of Paul's apostleship.
    'For' captures the directional sense in idiomatic English without over-literal
    awkwardness.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    it most naturally denotes the believing response associated with God's elect,
    though broader nuances such as trust are possible.
- source_word: ἐκλεκτῶν θεοῦ
  chosen: God’s chosen ones
  alternatives:
  - God's elect
  - the chosen of God
  lexicon: BDAG
  rationale: The phrase denotes those chosen by God. 'Chosen ones' is more accessible
    modern English than 'elect' while preserving the theological force of divine choosing.
- source_word: ἐπίγνωσιν
  chosen: knowledge
  alternatives:
  - full knowledge
  - recognition
  lexicon: BDAG
  rationale: ἐπίγνωσις can intensify γνῶσις, but in many contexts 'knowledge' is sufficient
    and more natural. 'Full knowledge' may overstate the nuance in English, so the
    stronger possibility is preserved in a footnote.
- source_word: ἀληθείας
  chosen: the truth
  alternatives:
  - truth
  lexicon: BDAG
  rationale: The article is naturally represented in English as 'the truth,' referring
    to the content of the gospel/Christian truth rather than truth in the abstract.
- source_word: τῆς κατ’ εὐσέβειαν
  chosen: that accords with godliness
  alternatives:
  - which leads to godliness
  - according to godliness
  lexicon: BDAG
  rationale: The phrase modifies 'the truth' and indicates its relation to godliness.
    'Accords with' preserves the κατά relation without forcing a narrower causal reading
    such as 'leads to,' though that is a plausible interpretive alternative.
- source_word: εὐσέβειαν
  chosen: godliness
  alternatives:
  - piety
  - devotion
  lexicon: BDAG
  rationale: '''Godliness'' is the most natural and established rendering in the Pastorals,
    conveying reverent life shaped by relation to God.'
