theological_decisions:
- issue: Reference of 'the teaching' and 'the trustworthy word'
  chosen_reading: These refer to the recognized apostolic Christian teaching entrusted
    to church leaders, not merely the elder's private opinion or rhetorical skill.
  alternative_readings:
  - a more general reference to sound moral instruction
  rationale: The article with διδαχή and the phrase πιστοῦ λόγου in the Pastoral Epistles
    point to a stable body of Christian teaching. The translation preserves this without
    importing later technical dogmatic categories into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of ἐλέγχειν in relation to opponents
  chosen_reading: The elder is qualified to confront and correct doctrinal opposition,
    rendered 'rebuke,' while preserving 'refute' as an alternative nuance.
  alternative_readings:
  - refute
  - reprove
  rationale: The verse presents both positive instruction and negative correction.
    'Rebuke' keeps the pastoral-corrective force, but because the context includes
    answering contradiction, 'refute' is preserved in a footnote.
  doctrine_reference: Translation philosophy §§3, 6
