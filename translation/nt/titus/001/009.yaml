id: TIT.1.9
reference: Titus 1:9
source:
  edition: SBLGNT
  text: ἀντεχόμενον τοῦ κατὰ τὴν διδαχὴν πιστοῦ λόγου, ἵνα δυνατὸς ᾖ καὶ παρακαλεῖν
    ἐν τῇ διδασκαλίᾳ τῇ ὑγιαινούσῃ καὶ τοὺς ἀντιλέγοντας ἐλέγχειν.
translation:
  text: holding firmly to the trustworthy word in accordance with the teaching, so
    that he may be able both to exhort by sound teaching and to rebuke those who contradict
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holding fast to the faithful word according to the teaching.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to refute those who contradict.' The Greek verb can carry the sense
      of exposing or proving someone wrong as well as rebuking.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντεχόμενον
  chosen: holding firmly to
  alternatives:
  - holding fast to
  - clinging to
  - devoted to
  lexicon: BDAG
  rationale: The participle describes steadfast adherence. 'Holding firmly to' preserves
    the active, tenacious sense in natural English and fits the elder qualification
    context.
- source_word: πιστοῦ λόγου
  chosen: the trustworthy word
  alternatives:
  - the faithful word
  - the reliable message
  lexicon: BDAG
  rationale: πιστός here most naturally means reliable/trustworthy rather than 'believing.'
    'Word' is retained for λόγος, while 'trustworthy' communicates the quality of
    the apostolic message clearly.
- source_word: κατὰ τὴν διδαχήν
  chosen: in accordance with the teaching
  alternatives:
  - according to the teaching
  - consistent with the teaching
  lexicon: BDAG
  rationale: κατά with the accusative indicates conformity or accordance. The article
    suggests recognized apostolic teaching, so 'the teaching' is preferable to an
    indefinite rendering.
- source_word: παρακαλεῖν
  chosen: to exhort
  alternatives:
  - to encourage
  - to urge
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, exhort, or urge depending on context. In
    a pastoral qualification paired with rebuking opponents, 'exhort' best captures
    authoritative positive instruction without flattening it to mere comfort.
- source_word: ἐν τῇ διδασκαλίᾳ τῇ ὑγιαινούσῃ
  chosen: by sound teaching
  alternatives:
  - in sound doctrine
  - with healthy teaching
  lexicon: BDAG
  rationale: ὑγιαίνω metaphorically means sound/healthy. 'Sound teaching' is clear
    modern English and avoids overly technical ecclesiastical jargon while preserving
    the metaphorical sense.
- source_word: ἀντιλέγοντας
  chosen: those who contradict it
  alternatives:
  - those who oppose
  - those who speak against
  lexicon: BDAG
  rationale: 'The participle refers to people speaking against the apostolic message.
    ''Contradict it'' makes explicit the object implied by context: the trustworthy
    word / sound teaching.'
- source_word: ἐλέγχειν
  chosen: to rebuke
  alternatives:
  - to refute
  - to reprove
  - to expose
  lexicon: BDAG
  rationale: ἐλέγχω can include exposing error and correcting. In this context of
    confronting opponents, 'rebuke' captures the corrective force, though 'refute'
    is also possible; the footnote preserves that nuance.
- source_word: δυνατὸς ᾖ
  chosen: he may be able
  alternatives:
  - he may be competent
  - he may be capable
  lexicon: BDAG
  rationale: This expresses capability/potential purpose after ἵνα. 'May be able'
    is idiomatic and preserves the purpose clause naturally.
