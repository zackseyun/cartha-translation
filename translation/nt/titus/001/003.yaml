theological_decisions:
- issue: Referent of the implied subject in ἐφανέρωσεν and possessive nuance in καιροῖς
    ἰδίοις
  chosen_reading: The subject is God, yielding 'in his own times he revealed.'
  alternative_readings:
  - An impersonal rendering such as 'at the proper time it was revealed'
  rationale: The preceding context speaks of God, who does not lie, promising before
    the ages and then manifesting that promise. Keeping God as the personal subject
    preserves the flow of thought and the possessive force of ἰδίοις.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of the relative pronoun ὃ
  chosen_reading: It refers to 'the proclamation' rather than directly to 'his word.'
  alternative_readings:
  - It refers to 'his word,' yielding 'his word ... which I was entrusted with'
  rationale: The nearest suitable antecedent is κήρυγμα, and the idiom ἐπιστεύθην
    naturally takes the entrusted content. The English wording still keeps close connection
    between God's word and the proclamation through which it is made known.
  doctrine_reference: Translation philosophy §3
