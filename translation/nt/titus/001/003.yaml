id: TIT.1.3
reference: Titus 1:3
source:
  edition: SBLGNT
  text: ἐφανέρωσεν δὲ καιροῖς ἰδίοις, τὸν λόγον αὐτοῦ ἐν κηρύγματι ὃ ἐπιστεύθην ἐγὼ
    κατ’ ἐπιταγὴν τοῦ σωτῆρος ἡμῶν θεοῦ,
translation:
  text: but in his own times he revealed his word through the proclamation with which
    I was entrusted, according to the command of God our Savior,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the proper times.' The Greek literally says 'in his own times,' likely
      referring to God's appointed times.
    reason: lexical_alternative
  - marker: b
    text: Or 'through preaching.' The term can refer either to the act of proclamation
      or to the proclaimed message.
    reason: lexical_alternative
  - marker: c
    text: 'The relative clause may also be understood with ''his word'': ''his word
      ... which I was entrusted with.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐφανέρωσεν
  chosen: he revealed
  alternatives:
  - he made known
  - he manifested
  lexicon: BDAG
  rationale: Aorist active indicative with God as the implied subject from the preceding
    context. 'Revealed' is natural modern English and preserves the sense of making
    previously hidden truth openly known.
- source_word: καιροῖς ἰδίοις
  chosen: in his own times
  alternatives:
  - at the proper times
  - in its own seasons
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for divinely appointed times. 'His own
    times' preserves the possessive force of ἰδίοις and coheres with the implied divine
    subject; 'proper times' is possible but loses that possessive nuance.
- source_word: τὸν λόγον αὐτοῦ
  chosen: his word
  alternatives:
  - his message
  - the word from him
  lexicon: BDAG
  rationale: λόγος here refers to God's communicated message, likely the gospel promise
    mentioned in the context. 'His word' keeps the lexical connection to λόγος while
    remaining readable.
- source_word: ἐν κηρύγματι
  chosen: through the proclamation
  alternatives:
  - in preaching
  - through preaching
  lexicon: BDAG
  rationale: κήρυγμα can denote either the act of proclamation or the proclaimed message.
    'Through the proclamation' captures the instrumental sense of ἐν here and avoids
    narrowing it merely to the activity of preaching while still sounding natural.
- source_word: ὃ
  chosen: with which
  alternatives:
  - which
  - that
  lexicon: BDAG
  rationale: 'The relative pronoun is neuter singular and most naturally refers to
    κήρυγμα rather than λόγον in the immediate syntax. Rendering it with the preposition
    in English (''with which'') reflects the passive verb ἐπιστεύθην idiomatically:
    Paul was entrusted with the proclamation.'
- source_word: ἐπιστεύθην
  chosen: I was entrusted
  alternatives:
  - I was entrusted with
  - it was committed to me
  lexicon: BDAG
  rationale: Aorist passive of πιστεύω in this construction means to entrust something
    to someone, not 'I believed.' The passive is best rendered explicitly as a stewardship
    entrusted to Paul.
- source_word: κατ’ ἐπιταγὴν
  chosen: according to the command
  alternatives:
  - by the command
  - in accordance with the command
  lexicon: BDAG
  rationale: κατά with the accusative here expresses conformity to or basis in an
    authoritative directive. 'According to the command' is both accurate and idiomatic.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  chosen: of God our Savior
  alternatives:
  - of our Savior God
  - of God, our Savior
  lexicon: BDAG
  rationale: The genitive phrase is most naturally rendered appositionally as 'God
    our Savior,' a common Pastoral Epistles expression. This preserves the title without
    awkward English word order.
