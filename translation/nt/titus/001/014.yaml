id: TIT.1.14
reference: Titus 1:14
source:
  edition: SBLGNT
  text: μὴ προσέχοντες Ἰουδαϊκοῖς μύθοις καὶ ἐντολαῖς ἀνθρώπων ἀποστρεφομένων τὴν
    ἀλήθειαν.
translation:
  text: not paying attention to Jewish myths and commandments of people who turn away
    from the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not devoting themselves to Jewish myths and human commands from people
      who turn away from the truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ προσέχοντες
  chosen: not paying attention to
  alternatives:
  - not devoting themselves to
  - not giving heed to
  lexicon: BDAG
  rationale: The present participle continues the sense of the preceding exhortation
    (what Titus is to insist on), describing what the hearers are not to do. 'Paying
    attention to' is natural modern English and preserves the idea of directing one's
    mind toward something.
- source_word: Ἰουδαϊκοῖς μύθοις
  chosen: Jewish myths
  alternatives:
  - Jewish fables
  - Judaic myths
  lexicon: BDAG
  rationale: μῦθος refers to fabricated stories or legends; 'myths' is the clearest
    contemporary rendering. Ἰουδαϊκοῖς is adjectival, identifying these myths as Jewish
    in character or origin.
- source_word: ἐντολαῖς ἀνθρώπων
  chosen: commandments of people
  alternatives:
  - human commands
  - commandments of men
  lexicon: BDAG
  rationale: ἐντολαῖς means commands/commandments. ἀνθρώπων is plural genitive, literally
    'of humans/people.' 'Commandments of people' stays close to the Greek while avoiding
    the potentially misleading male-specific sense of 'men' in modern English. This
    is not a generic-anthropology formula but a contrast between merely human directives
    and divine truth.
- source_word: ἀποστρεφομένων
  chosen: who turn away from
  alternatives:
  - who reject
  - who are turning away from
  lexicon: BDAG
  rationale: The participle is genitive plural and most naturally modifies ἀνθρώπων
    ('people'). 'Turn away from' preserves the verbal imagery of apostasy or rejection
    better than the more interpretive 'reject.'
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  lexicon: BDAG
  rationale: Standard rendering of ἀλήθεια. In the Pastoral Epistles it often carries
    the sense of the truth of the gospel, but the translation should not over-specify
    beyond the text.
