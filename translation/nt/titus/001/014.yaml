theological_decisions:
- issue: Referent of the genitive participle ἀποστρεφομένων
  chosen_reading: The participle modifies 'people,' yielding 'commandments of people
    who turn away from the truth.'
  alternative_readings:
  - The participle could be taken more loosely with both 'myths' and 'commandments'
    as things associated with those turning from the truth.
  rationale: 'The nearest and most natural grammatical connection is with ἀνθρώπων
    in the same genitive plural. This also yields coherent sense: the false teaching
    consists in human commandments issued by those who have turned from the truth.'
  doctrine_reference: Preserve theological tension rather than resolve it; choose
    the most natural reading without importing extra doctrinal claims.
