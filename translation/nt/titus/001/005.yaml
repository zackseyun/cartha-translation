id: TIT.1.5
reference: Titus 1:5
source:
  edition: SBLGNT
  text: Τούτου χάριν ⸀ἀπέλιπόν σε ἐν Κρήτῃ ἵνα τὰ λείποντα ἐπιδιορθώσῃ, καὶ καταστήσῃς
    κατὰ πόλιν πρεσβυτέρους, ὡς ἐγώ σοι διεταξάμην,
translation:
  text: For this reason I left you in Crete, so that you might set in order what remained
    and appoint elders in every city, as I directed you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what was lacking.'
    reason: lexical_alternative
  - marker: b
    text: Or 'city by city.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as I commanded you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτου χάριν
  chosen: For this reason
  alternatives:
  - For this cause
  - Because of this
  lexicon: BDAG
  rationale: Idiomatic causal expression; 'For this reason' is natural modern English
    and preserves the explanatory force of the genitive + χάριν construction.
- source_word: ἀπέλιπόν
  chosen: I left
  alternatives:
  - I left behind
  lexicon: BDAG
  rationale: Aorist indicative of ἀπολείπω here refers to Paul's leaving Titus in
    Crete. 'I left' is the clearest English rendering; 'left behind' is possible but
    can sound overly emphatic in English.
- source_word: ἐν Κρήτῃ
  chosen: in Crete
  lexicon: BDAG
  rationale: Straightforward locative phrase with the island name transliterated by
    standard English convention.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is readable modern English and preserves
    the telic sense.
- source_word: τὰ λείποντα
  chosen: what remained
  alternatives:
  - what was lacking
  - the things that were left unfinished
  lexicon: BDAG
  rationale: The participial phrase refers to matters still incomplete. 'What remained'
    is concise and natural; 'what was lacking' is also possible and is preserved in
    a footnote because it highlights deficiency rather than incompletion.
- source_word: ἐπιδιορθώσῃ
  chosen: set in order
  alternatives:
  - put in order
  - set right further
  lexicon: BDAG
  rationale: The verb conveys correcting or arranging what is still unfinished. 'Set
    in order' captures both organizational and corrective nuance without sounding
    technical.
- source_word: καταστήσῃς
  chosen: appoint
  alternatives:
  - establish
  - put in charge
  lexicon: BDAG
  rationale: In this ecclesial context the verb means to appoint or install persons
    into a role. 'Appoint' is the most idiomatic and precise English choice.
- source_word: κατὰ πόλιν
  chosen: in every city
  alternatives:
  - city by city
  - in each town
  lexicon: BDAG
  rationale: The distributive κατά + singular noun indicates a city-by-city distribution.
    'In every city' communicates the distributive sense clearly in English.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  - presbyters
  lexicon: BDAG
  rationale: In this context the term denotes church leaders, not merely older males.
    'Elders' is the standard and clearest ecclesial rendering; 'presbyters' is more
    technical and less accessible.
- source_word: ὡς ἐγώ σοι διεταξάμην
  chosen: as I directed you
  alternatives:
  - as I commanded you
  - as I instructed you
  lexicon: BDAG
  rationale: διατάσσω can carry the sense of command or instruction. 'Directed' preserves
    apostolic authority while fitting natural English; 'commanded' may sound stronger
    than the context requires, and 'instructed' slightly softer.
