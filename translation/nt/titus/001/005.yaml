theological_decisions:
- issue: Ecclesial office terminology in πρεσβυτέρους
  chosen_reading: Render as 'elders' without importing later denominational structures.
  alternative_readings:
  - presbyters
  - older men
  rationale: The verse concerns recognized church leadership, but the translation
    should not prejudge later debates about church polity. 'Elders' reflects the lexical
    sense and immediate context while remaining broadly ecumenical.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Force of διεταξάμην
  chosen_reading: Use 'directed' rather than the stronger 'commanded' in the main
    text.
  alternative_readings:
  - commanded
  - instructed
  rationale: The Greek can bear authoritative instruction. 'Directed' preserves Paul's
    authority to Titus without overstating the tone beyond what the immediate wording
    requires.
  doctrine_reference: Translation philosophy §§1, 6
