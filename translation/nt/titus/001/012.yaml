theological_decisions:
- issue: Rendering an ethnic stereotype quoted by Paul
  chosen_reading: Translate the quotation directly as a cited saying without softening
    its negative language
  alternative_readings:
  - Paraphrase to reduce the harshness of the stereotype
  rationale: The verse explicitly presents a quotation attributed to 'their own prophet.'
    Faithful translation should preserve that Paul is citing a harsh proverbial assessment,
    not endorsing a timeless doctrinal anthropology about all Cretans beyond the rhetorical
    context. The wording is kept direct because the Greek is direct.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
