id: TIT.1.12
reference: Titus 1:12
source:
  edition: SBLGNT
  text: εἶπέν τις ἐξ αὐτῶν, ἴδιος αὐτῶν προφήτης, Κρῆτες ἀεὶ ψεῦσται, κακὰ θηρία,
    γαστέρες ἀργαί·
translation:
  text: One of them, their own prophet, said, “Cretans are always liars, evil beasts,
    lazy gluttons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “lazy bellies.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τις
  chosen: One of them ... said
  alternatives:
  - Someone said
  lexicon: BDAG
  rationale: τις is an indefinite pronoun, 'someone' or 'a certain one.' In context,
    with ἐξ αὐτῶν following, 'one of them' is the most natural English rendering and
    preserves the partitive sense.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: ἐκ/ἐξ with the genitive marks source or membership within a group. 'Of
    them' is concise and idiomatic here; 'from among them' is possible but heavier.
- source_word: ἴδιος αὐτῶν προφήτης
  chosen: their own prophet
  alternatives:
  - a prophet of their own
  - one of their own prophets
  lexicon: BDAG
  rationale: ἴδιος emphasizes belonging or being one's own. The phrase identifies
    the speaker as a prophet belonging to the Cretans themselves. 'Their own prophet'
    is the clearest modern English equivalent.
- source_word: Κρῆτες
  chosen: Cretans
  lexicon: BDAG
  rationale: Ethnic designation referring to the people of Crete; standard English
    demonym is 'Cretans.'
- source_word: ἀεὶ
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: ἀεί means 'always' or 'continually.' 'Always' is the most direct and
    idiomatic rendering in this proverbial quotation.
- source_word: ψεῦσται
  chosen: liars
  alternatives:
  - deceivers
  lexicon: BDAG
  rationale: ψεύστης denotes a liar, one who speaks falsehood. 'Liars' is the straightforward
    lexical equivalent and fits the proverbial triad.
- source_word: κακὰ θηρία
  chosen: evil beasts
  alternatives:
  - vicious animals
  - dangerous beasts
  lexicon: BDAG
  rationale: θηρία literally means wild animals/beasts, used here metaphorically as
    an insult. 'Evil beasts' preserves both the literal imagery and the moral force
    of κακά better than a more interpretive paraphrase.
- source_word: γαστέρες ἀργαί
  chosen: lazy gluttons
  alternatives:
  - lazy bellies
  - idle stomachs
  lexicon: BDAG
  rationale: Literally 'idle/lazy bellies.' In English, 'lazy bellies' is awkward
    and opaque. 'Lazy gluttons' captures the idiomatic sense of people devoted to
    consumption while avoiding labor, preserving the insult's force in readable modern
    English.
