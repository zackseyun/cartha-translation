id: TIT.1.11
reference: Titus 1:11
source:
  edition: SBLGNT
  text: οὓς δεῖ ἐπιστομίζειν, οἵτινες ὅλους οἴκους ἀνατρέπουσιν διδάσκοντες ἃ μὴ δεῖ
    αἰσχροῦ κέρδους χάριν.
translation:
  text: They must be silenced, since they are upsetting whole households by teaching
    what they ought not for the sake of shameful gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'have their mouths stopped.'
    reason: lexical_alternative
  - marker: b
    text: '''Whole households'' likely refers to family units and dependents within
      a home, not merely physical houses.'
    reason: cultural_note
  - marker: c
    text: Or 'for sordid gain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὓς
  chosen: They
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Refers back to the false teachers of the previous verse. English requires
    an explicit subject in the new sentence; 'they' is natural while preserving the
    antecedent relation implied by the relative pronoun.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is required
  lexicon: BDAG
  rationale: Conveys necessity/obligation with direct force suitable to the pastoral
    instruction.
- source_word: ἐπιστομίζειν
  chosen: be silenced
  alternatives:
  - be stopped
  - have their mouths stopped
  - be muzzled
  lexicon: BDAG
  rationale: The verb is literally 'to stop the mouth,' but idiomatic English here
    is 'be silenced.' This preserves the force of restraining their teaching without
    awkward literalism.
- source_word: οἵτινες
  chosen: since they are
  alternatives:
  - who are
  - for they are
  lexicon: BDAG
  rationale: The qualitative relative pronoun introduces the reason these people must
    be silenced. 'Since they are' brings out the explanatory force in natural English.
- source_word: ὅλους οἴκους
  chosen: whole households
  alternatives:
  - entire houses
  - whole families
  lexicon: BDAG
  rationale: οἶκος often denotes a household unit rather than merely a building. 'Whole
    households' best fits the social setting and the effect of false teaching on family
    units.
- source_word: ἀνατρέπουσιν
  chosen: are upsetting
  alternatives:
  - are overturning
  - are ruining
  - are subverting
  lexicon: BDAG
  rationale: The verb can mean overturning or causing ruin/disruption. 'Are upsetting'
    communicates serious destabilization of households in accessible modern English
    without overstating to total destruction.
- source_word: διδάσκοντες
  chosen: by teaching
  alternatives:
  - teaching
  - while teaching
  lexicon: BDAG
  rationale: 'The participle expresses means or attendant circumstance: they upset
    households by means of their teaching.'
- source_word: ἃ μὴ δεῖ
  chosen: what they ought not
  alternatives:
  - what is not necessary
  - things they should not
  lexicon: BDAG
  rationale: Idiomatic expression for improper content of teaching. 'What they ought
    not' preserves the moral impropriety implied by δεῖ with μή.
- source_word: αἰσχροῦ κέρδους χάριν
  chosen: for the sake of shameful gain
  alternatives:
  - for shameful profit
  - for sordid gain
  lexicon: BDAG
  rationale: The phrase denotes motivation by disgraceful financial advantage. 'Shameful
    gain' is transparent modern English and preserves the ethical condemnation. 'Sordid
    gain' is traditional but less natural for contemporary readers.
