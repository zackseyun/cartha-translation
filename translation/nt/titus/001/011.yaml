theological_decisions:
- issue: Nature of the command against false teachers
  chosen_reading: They must be silenced
  alternative_readings:
  - Their mouths must be stopped
  rationale: The Greek idiom is forceful but concerns stopping their harmful teaching,
    not specifying a particular civil or physical punishment. The chosen rendering
    preserves the imperative force without importing methods not stated in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
