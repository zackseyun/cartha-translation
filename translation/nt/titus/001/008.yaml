theological_decisions:
- issue: Distinguishing adjacent virtues σώφρονα and ἐγκρατῆ
  chosen_reading: Render σώφρονα as 'self-controlled' and ἐγκρατῆ as 'disciplined'
  alternative_readings:
  - Render both with overlapping terms such as 'sensible' and 'self-controlled'
  - Render ἐγκρατῆ as 'temperate'
  rationale: The Greek uses two related but distinct virtues. To preserve the ethical
    texture of the list, the translation avoids collapsing them into the same English
    term. This follows the project's consistency principle while documenting the contextual
    distinction.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
