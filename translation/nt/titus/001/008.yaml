id: TIT.1.8
reference: Titus 1:8
source:
  edition: SBLGNT
  text: ἀλλὰ φιλόξενον, φιλάγαθον, σώφρονα, δίκαιον, ὅσιον, ἐγκρατῆ,
translation:
  text: but hospitable, loving what is good, self-controlled, upright, holy, and disciplined,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lover of good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'just' or 'righteous' for 'upright.'
    reason: lexical_alternative
  - marker: c
    text: Or 'devout' for 'holy.'
    reason: lexical_alternative
  - marker: d
    text: 'The Greek uses two related virtues here: one meaning sound-minded or self-controlled
      (σώφρονα), and another meaning exercising mastery over oneself (ἐγκρατῆ).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction contrasting the negative traits in the previous
    verse with the required positive traits here. 'But' is the most natural concise
    English rendering in this vice/virtue contrast.
- source_word: φιλόξενον
  chosen: hospitable
  alternatives:
  - loving strangers
  - given to hospitality
  lexicon: BDAG
  rationale: The adjective denotes being welcoming to guests/strangers. 'Hospitable'
    is idiomatic modern English and preserves the ethical sense without awkward literalism.
- source_word: φιλάγαθον
  chosen: loving what is good
  alternatives:
  - a lover of good
  - loving the good
  lexicon: BDAG
  rationale: The compound adjective literally means 'loving good' or 'loving what
    is good.' 'Loving what is good' is clear modern English and preserves the object
    of affection rather than reducing it to a vague moral label.
- source_word: σώφρονα
  chosen: self-controlled
  alternatives:
  - sensible
  - prudent
  - temperate
  lexicon: BDAG
  rationale: The term carries the sense of sound-mindedness, moderation, and mastery
    over oneself. 'Self-controlled' best fits the virtue list and is readily understandable
    in contemporary English.
- source_word: δίκαιον
  chosen: upright
  alternatives:
  - just
  - righteous
  lexicon: BDAG
  rationale: In this character list, the adjective describes moral rectitude in conduct.
    'Upright' communicates ethical integrity in natural English. 'Just' can sound
    narrowly judicial, and 'righteous' may sound more overtly theological than the
    immediate context requires.
- source_word: ὅσιον
  chosen: holy
  alternatives:
  - devout
  - pious
  lexicon: BDAG
  rationale: The word denotes piety/devotion consistent with what is sacred. 'Holy'
    is the most direct and weighty rendering, while still fitting a list of elder
    qualifications. Alternatives are possible but narrower in English nuance.
- source_word: ἐγκρατῆ
  chosen: disciplined
  alternatives:
  - self-controlled
  - temperate
  - master of himself
  lexicon: BDAG
  rationale: This term emphasizes mastery over desires and impulses. Because σώφρονα
    has already been rendered 'self-controlled,' 'disciplined' preserves the distinction
    between the two adjacent virtues while still reflecting the semantic field of
    self-mastery.
