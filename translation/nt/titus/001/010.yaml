theological_decisions:
- issue: Referent of 'those of the circumcision'
  chosen_reading: Rendered transparently as 'those of the circumcision' without specifying
    'Jews' or 'circumcision party' in the main text.
  alternative_readings:
  - those of the circumcision party
  - those from the Jewish group
  rationale: The phrase likely points to Jewish or Judaizing opponents, but the Greek
    expression itself is more compact and less explicit than those interpretive expansions.
    Preserving the source wording avoids importing a narrower historical identification
    than the text states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
