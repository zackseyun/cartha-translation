theological_decisions:
- issue: Relation between verbal profession and practical denial
  chosen_reading: The verse states that people may verbally profess knowledge of God
    while their actions functionally deny him.
  alternative_readings:
  - The denial could be taken as denial of God's truth in general rather than denial
    of God himself.
  rationale: The explicit object is 'God' in the first clause, and the second clause
    naturally carries that object forward. The translation preserves the ethical-theological
    tension without expanding it into a broader doctrinal statement not explicit in
    the text.
  doctrine_reference: Translation philosophy §3
