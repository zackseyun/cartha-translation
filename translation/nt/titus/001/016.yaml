id: TIT.1.16
reference: Titus 1:16
source:
  edition: SBLGNT
  text: θεὸν ὁμολογοῦσιν εἰδέναι, τοῖς δὲ ἔργοις ἀρνοῦνται, βδελυκτοὶ ὄντες καὶ ἀπειθεῖς
    καὶ πρὸς πᾶν ἔργον ἀγαθὸν ἀδόκιμοι.
translation:
  text: They profess to know God, but by their works they deny him, being detestable
    and disobedient and unfit for every good work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They claim to know God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by their deeds they deny him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'abominable.'
    reason: lexical_alternative
  - marker: d
    text: Or 'disqualified for every good work.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ὁμολογοῦσιν εἰδέναι; standard rendering as the one they
    claim to know.
- source_word: ὁμολογοῦσιν
  chosen: profess
  alternatives:
  - confess
  - claim
  - acknowledge
  lexicon: BDAG
  rationale: In this context of verbal claim contrasted with actual conduct, 'profess'
    best captures an outward declaration without implying sincerity.
- source_word: εἰδέναι
  chosen: to know
  lexicon: BDAG
  rationale: Infinitive complement to ὁμολογοῦσιν; straightforwardly denotes claimed
    knowledge of God.
- source_word: τοῖς δὲ ἔργοις
  chosen: by their works
  alternatives:
  - by their deeds
  - in their works
  lexicon: BDAG
  rationale: Dative of means/instrument or respect; 'by their works' naturally expresses
    that their actions function as the evidence by which they deny God.
- source_word: ἀρνοῦνται
  chosen: they deny him
  alternatives:
  - they disown him
  - they reject him
  lexicon: BDAG
  rationale: Strong contrast with professed knowledge; 'deny him' is the most direct
    and idiomatic English rendering. 'Him' is supplied from the object 'God' in the
    first clause.
- source_word: βδελυκτοὶ
  chosen: detestable
  alternatives:
  - abominable
  - disgusting
  lexicon: BDAG
  rationale: Describes moral repulsiveness. 'Detestable' preserves the severity without
    sounding archaic like 'abominable.'
- source_word: ὄντες
  chosen: being
  alternatives:
  - as they are
  lexicon: BDAG
  rationale: Participial link introducing the descriptive predicates that characterize
    these people.
- source_word: ἀπειθεῖς
  chosen: disobedient
  alternatives:
  - rebellious
  - unpersuadable
  lexicon: BDAG
  rationale: In pastoral and ethical contexts, the term commonly carries the sense
    of refusing obedience rather than merely being unconvinced.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν
  chosen: for every good work
  alternatives:
  - for any good work
  - toward every good work
  lexicon: BDAG
  rationale: πρός with accusative here expresses relation or fitness; 'for every good
    work' is idiomatic with the following adjective ἀδόκιμοι.
- source_word: ἀδόκιμοι
  chosen: unfit
  alternatives:
  - unqualified
  - worthless
  - disqualified
  lexicon: BDAG
  rationale: Conveys failure to meet the standard for usefulness in good works. 'Unfit'
    is clear modern English and suits the ethical context better than the more technical
    'disqualified.'
