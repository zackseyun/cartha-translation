theological_decisions:
- issue: Scope of purity language
  chosen_reading: Rendered καθαρός as 'pure' throughout to preserve both ritual and
    moral dimensions without restricting the saying to ceremonial cleanness alone.
  alternative_readings:
  - Rendered as 'clean' throughout, emphasizing ceremonial categories
  rationale: The immediate context in Titus 1 includes disputes tied to purity concerns
    and Jewish regulations, but Paul's statement extends beyond merely food laws to
    the condition of the person perceiving things. 'Pure' best preserves that theological
    breadth.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English.'
