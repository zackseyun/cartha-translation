id: TIT.1.15
reference: Titus 1:15
source:
  edition: SBLGNT
  text: ⸀πάντα καθαρὰ τοῖς καθαροῖς· τοῖς δὲ μεμιαμμένοις καὶ ἀπίστοις οὐδὲν καθαρόν,
    ἀλλὰ μεμίανται αὐτῶν καὶ ὁ νοῦς καὶ ἡ συνείδησις.
translation:
  text: All things are pure to the pure; but to those who are defiled and unbelieving,
    nothing is pure. Instead, both their mind and their conscience are defiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clean' throughout the verse; the Greek term can carry both ritual and
      moral overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: All things
  alternatives:
  - Everything
  lexicon: BDAG
  rationale: Neuter plural used comprehensively. 'All things' preserves the broad
    scope and echoes the aphoristic structure of the clause better than the slightly
    more idiomatic 'everything.'
- source_word: καθαρά / καθαρόν / καθαροῖς
  chosen: pure / the pure
  alternatives:
  - clean
  lexicon: BDAG
  rationale: καθαρός can mean ritually or morally clean/pure. In this context, where
    false teachers are concerned with purity regulations, 'pure' preserves both ritual
    and moral resonance better than 'clean.' 'The pure' is a natural substantival
    rendering of the dative plural adjective.
- source_word: τοῖς δὲ μεμιαμμένοις
  chosen: to those who are defiled
  alternatives:
  - to the polluted
  - to those who have been defiled
  lexicon: BDAG
  rationale: Perfect participle of μιαίνω indicates a defiled state resulting from
    prior corruption. 'Those who are defiled' gives good English while retaining the
    stative force.
- source_word: ἀπίστοις
  chosen: unbelieving
  alternatives:
  - faithless
  - without faith
  lexicon: BDAG
  rationale: In this context the contrast is with genuine belief, not primarily covenantal
    fidelity, so 'unbelieving' is the clearest rendering.
- source_word: οὐδὲν καθαρόν
  chosen: nothing is pure
  alternatives:
  - nothing is clean
  lexicon: BDAG
  rationale: This mirrors the first clause and preserves the predicate structure.
    'Pure' maintains the same semantic field as καθαρά above.
- source_word: ἀλλὰ
  chosen: Instead
  alternatives:
  - but
  - rather
  lexicon: BDAG
  rationale: 'Marks a strong contrast explaining the real issue: not external things,
    but the inner person. ''Instead'' makes the adversative-explanatory force clear
    in modern English.'
- source_word: μεμίανται
  chosen: are defiled
  alternatives:
  - have been defiled
  - are polluted
  lexicon: BDAG
  rationale: Perfect passive/passive-like form again emphasizes resulting state. 'Are
    defiled' is concise and idiomatic while preserving the connection with the participle
    μεμιαμμένοις.
- source_word: νοῦς
  chosen: mind
  alternatives:
  - understanding
  lexicon: BDAG
  rationale: '''Mind'' is the standard and most natural rendering here for the faculty
    of thought/perception.'
- source_word: συνείδησις
  chosen: conscience
  alternatives:
  - moral consciousness
  lexicon: BDAG
  rationale: Standard rendering in Pauline usage, referring to the moral self-awareness/judging
    faculty.
- source_word: καὶ ... καὶ
  chosen: both ... and
  alternatives:
  - and ... and
  lexicon: Greek grammar
  rationale: The paired καὶ highlights that both faculties are affected. 'Both ...
    and' brings out the emphasis naturally in English.
