id: TIT.1.6
reference: Titus 1:6
source:
  edition: SBLGNT
  text: εἴ τίς ἐστιν ἀνέγκλητος, μιᾶς γυναικὸς ἀνήρ, τέκνα ἔχων πιστά, μὴ ἐν κατηγορίᾳ
    ἀσωτίας ἢ ἀνυπότακτα.
translation:
  text: if anyone is above reproach, the husband of one wife, having faithful children
    not under an accusation of debauchery or insubordinate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having believing children.' The Greek πιστά can mean 'faithful' or 'believing.'
    reason: alternative_reading
  - marker: b
    text: Or 'a one-woman man.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wild living' for 'debauchery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέγκλητος
  chosen: above reproach
  alternatives:
  - blameless
  - not open to accusation
  lexicon: BDAG
  rationale: Conveys the sense of being not chargeable or not open to legitimate accusation.
    'Above reproach' is idiomatic modern English and fits qualification language better
    than the potentially misleadingly absolute 'blameless.'
- source_word: μιᾶς γυναικὸς ἀνήρ
  chosen: the husband of one wife
  alternatives:
  - a one-woman man
  lexicon: BDAG
  rationale: A formally transparent rendering of the idiom that preserves the Greek
    wording and leaves interpretive questions open. 'A one-woman man' is more interpretive
    and idiomatic but less transparent. The phrase is grammatically male-specific
    and should remain so per gender-accurate policy.
- source_word: τέκνα
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: Standard, natural rendering for τέκνα in a household qualification context.
- source_word: πιστά
  chosen: faithful
  alternatives:
  - believing
  lexicon: BDAG
  rationale: πιστός can mean either 'faithful/trustworthy' or 'believing.' Because
    the phrase is genuinely debated in this context, the main text uses 'faithful'
    as the broader and less restrictive rendering, while preserving 'believing' in
    a footnote.
- source_word: κατηγορίᾳ
  chosen: under an accusation
  alternatives:
  - in a charge
  - accused
  lexicon: BDAG
  rationale: The prepositional phrase ἐν κατηγορίᾳ is most naturally expressed in
    English as being under or subject to an accusation. This preserves the forensic
    nuance better than simply 'wild' or 'debauched' without the accusation language.
- source_word: ἀσωτίας
  chosen: debauchery
  alternatives:
  - dissipation
  - recklessness
  - wild living
  lexicon: BDAG
  rationale: Captures the sense of wasteful, morally unrestrained conduct. 'Debauchery'
    is concise and serious, though a footnote preserves the more idiomatic 'wild living'
    option.
- source_word: ἀνυπότακτα
  chosen: insubordinate
  alternatives:
  - rebellious
  - undisciplined
  lexicon: BDAG
  rationale: Preserves the idea of refusing submission or proper order. 'Rebellious'
    is possible, but 'insubordinate' better matches the household/authority context.
