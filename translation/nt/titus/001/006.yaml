theological_decisions:
- issue: Meaning of πιστά in τέκνα ἔχων πιστά
  chosen_reading: faithful children
  alternative_readings:
  - believing children
  rationale: The adjective πιστά is genuinely ambiguous here between moral reliability/faithfulness
    and Christian belief. To preserve theological tension rather than resolve it,
    the main text uses the broader 'faithful' and the alternative 'believing' is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; Contested terms table
    for πίστις/πιστός family
- issue: Force of μιᾶς γυναικὸς ἀνήρ
  chosen_reading: the husband of one wife
  alternative_readings:
  - a one-woman man
  rationale: The Greek is an idiomatic qualification phrase with debated implications
    (marital status, sexual fidelity, remarriage questions). A transparent rendering
    best avoids importing denominational conclusions not explicit in the text.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §§1, 3, 4
