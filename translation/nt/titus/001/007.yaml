id: TIT.1.7
reference: Titus 1:7
source:
  edition: SBLGNT
  text: δεῖ γὰρ τὸν ἐπίσκοπον ἀνέγκλητον εἶναι ὡς θεοῦ οἰκονόμον, μὴ αὐθάδη, μὴ ὀργίλον,
    μὴ πάροινον, μὴ πλήκτην, μὴ αἰσχροκερδῆ,
translation:
  text: 'For an overseer must be above reproach as God''s steward: not self-willed,
    not quick-tempered, not given to wine, not violent, not greedy for shameful gain,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bishop.' The Greek term denotes one who oversees; 'overseer' avoids
      importing later church-office connotations that may attach to 'bishop.'
    reason: alternative_reading
  - marker: b
    text: Or 'greedy for dishonest gain.' The Greek emphasizes profit sought in a
      morally disgraceful way.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - ought
  lexicon: BDAG
  rationale: Conveys necessity/obligation plainly in idiomatic English; stronger and
    more direct than 'ought.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse in a natural
    formal way.
- source_word: ἐπίσκοπον
  chosen: overseer
  alternatives:
  - bishop
  - guardian
  lexicon: BDAG
  rationale: Translates the office term by meaning rather than later ecclesiastical
    title. 'Bishop' may import later church-structure associations not required by
    the Greek.
- source_word: ἀνέγκλητον
  chosen: above reproach
  alternatives:
  - blameless
  - irreproachable
  lexicon: BDAG
  rationale: A clear modern rendering that communicates being not open to valid accusation;
    more idiomatic than 'irreproachable' and less potentially absolute-sounding than
    'blameless.'
- source_word: ὡς θεοῦ οἰκονόμον
  chosen: as God's steward
  alternatives:
  - as a steward of God
  - as God's household manager
  lexicon: BDAG
  rationale: Expresses role/function succinctly. The genitive is possessive, and 'steward'
    preserves the management/accountability sense without over-specifying household
    imagery in the main text.
- source_word: αὐθάδη
  chosen: self-willed
  alternatives:
  - arrogant
  - stubborn
  - self-pleasing
  lexicon: BDAG
  rationale: Captures the sense of being arrogantly self-pleasing or obstinately determined
    by one's own will. 'Arrogant' is possible but narrows the nuance.
- source_word: ὀργίλον
  chosen: quick-tempered
  alternatives:
  - prone to anger
  - irascible
  lexicon: BDAG
  rationale: Natural modern English that conveys a disposition toward anger rather
    than a single act of anger.
- source_word: πάροινον
  chosen: given to wine
  alternatives:
  - drunkard
  - addicted to wine
  - overindulging in wine
  lexicon: BDAG
  rationale: Preserves the adjectival sense of being characterized by wine-related
    excess without overstating it as 'drunkard.'
- source_word: πλήκτην
  chosen: violent
  alternatives:
  - a striker
  - pugnacious
  lexicon: BDAG
  rationale: Communicates the behavioral sense clearly in contemporary English. 'A
    striker' is more literal but unnatural; 'pugnacious' is less accessible.
- source_word: αἰσχροκερδῆ
  chosen: greedy for shameful gain
  alternatives:
  - greedy for dishonest gain
  - fond of sordid profit
  lexicon: BDAG
  rationale: Preserves both the greed element and the morally disgraceful character
    of the gain. 'Dishonest gain' is possible, but the Greek can be broader than strictly
    illegal dishonesty.
