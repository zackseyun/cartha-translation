theological_decisions:
- issue: Rendering of ἐπίσκοπος in an ecclesial office context
  chosen_reading: overseer
  alternative_readings:
  - bishop
  rationale: The translation philosophy prioritizes original-language sense over later
    translation tradition. 'Overseer' reflects the lexical meaning without importing
    later denominational or hierarchical structures that the verse itself does not
    specify.
  doctrine_reference: Translation philosophy §1, §6
