theological_decisions:
- issue: Nature of 'genealogies' and 'quarrels about the law'
  chosen_reading: Translate the terms generically without specifying a particular
    Jewish, Gnostic, or heretical system in the main text.
  alternative_readings:
  - Interpret 'genealogies' as specifically Jewish pedigree debates
  - Interpret the phrase as proto-Gnostic mythic speculations
  rationale: The verse itself names the practices but does not define them with enough
    precision to justify importing a specific historical reconstruction into the translation.
    Preserving the broader wording maintains transparency and avoids doctrinal or
    historical overreach.
  doctrine_reference: Translation philosophy items 1 and 3
