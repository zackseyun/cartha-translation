theological_decisions:
- issue: Scope of οἱ ἡμέτεροι
  chosen_reading: A reference to members of the Christian community associated with
    Paul/Titus ('our people').
  alternative_readings:
  - our own men
  - our own people in contrast to outsiders
  rationale: The phrase is relational and communal, not a doctrinally loaded category.
    'Our people' avoids unnecessary gender restriction while reflecting the likely
    mixed community in view.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
