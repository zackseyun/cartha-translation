id: TIT.3.14
reference: Titus 3:14
source:
  edition: SBLGNT
  text: μανθανέτωσαν δὲ καὶ οἱ ἡμέτεροι καλῶν ἔργων προΐστασθαι εἰς τὰς ἀναγκαίας
    χρείας, ἵνα μὴ ὦσιν ἄκαρποι.
translation:
  text: And let our people also learn to devote themselves to good works for necessary
    needs, so that they may not be unfruitful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our own' or 'our own people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'learn to engage in good works' or 'learn to take the lead in good works.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for urgent needs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μανθανέτωσαν
  chosen: let ... learn
  alternatives:
  - must learn
  - should learn
  lexicon: BDAG
  rationale: Third-person present active imperative plural of μανθάνω; rendered with
    English jussive 'let ... learn' to preserve the exhortational force without overstrengthening
    it.
- source_word: οἱ ἡμέτεροι
  chosen: our people
  alternatives:
  - our own
  - our own people
  lexicon: BDAG
  rationale: Literally 'ours'; in context this refers to those belonging to Paul's/Christian
    community. 'Our people' is natural modern English and captures the communal reference
    better than the bare 'our own.'
- source_word: καλῶν ἔργων
  chosen: good works
  alternatives:
  - good deeds
  lexicon: BDAG
  rationale: Standard and transparent rendering of the genitive phrase. 'Good works'
    also preserves the repeated emphasis in Titus on morally beneficial action.
- source_word: προΐστασθαι
  chosen: to devote themselves to
  alternatives:
  - to engage in
  - to take the lead in
  - to practice
  lexicon: BDAG
  rationale: The verb can mean lead, manage, care for, or devote oneself to. In Titus
    3:8 and 3:14, with καλῶν ἔργων, the sense is not ecclesial leadership but active
    engagement/commitment in good works. 'Devote themselves to' best captures sustained,
    intentional practice in idiomatic English.
- source_word: εἰς τὰς ἀναγκαίας χρείας
  chosen: for necessary needs
  alternatives:
  - for urgent needs
  - for essential needs
  - for necessary uses
  lexicon: BDAG
  rationale: χρεία means need/necessity; ἀναγκαίας intensifies as necessary or pressing.
    'For necessary needs' preserves the concrete purpose of good works directed toward
    meeting real needs. 'Urgent needs' is possible, but 'necessary' stays closer to
    the adjective used.
- source_word: ἵνα μὴ ὦσιν ἄκαρποι
  chosen: so that they may not be unfruitful
  alternatives:
  - so that they may not be barren
  - so that they may not be ineffective
  lexicon: BDAG
  rationale: Purpose clause with ἵνα + subjunctive. ἄκαρποι is literally 'without
    fruit'; 'unfruitful' preserves the metaphor and its moral/spiritual resonance
    better than more interpretive alternatives like 'ineffective.'
