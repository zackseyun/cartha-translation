theological_decisions:
- issue: Scope of submission to civil structures
  chosen_reading: The verse is rendered as a general exhortation to civic submission
    and obedience without implying absolute obedience in every conceivable circumstance.
  alternative_readings:
  - A stronger reading that implies unconditional obedience to governing authorities
  rationale: The paired terms ἀρχαῖς and ἐξουσίαις in context point to civil rulers
    and authorities. The translation preserves the exhortation plainly while avoiding
    interpretive expansion beyond the text itself.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
