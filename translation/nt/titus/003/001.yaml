id: TIT.3.1
reference: Titus 3:1
source:
  edition: SBLGNT
  text: Ὑπομίμνῃσκε αὐτοὺς ⸀ἀρχαῖς ἐξουσίαις ὑποτάσσεσθαι πειθαρχεῖν, πρὸς πᾶν ἔργον
    ἀγαθὸν ἑτοίμους εἶναι,
translation:
  text: Remind them to be subject to rulers and authorities, to be obedient, to be
    ready for every good work,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to submit to rulers and authorities, to obey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπομίμνῃσκε
  chosen: Remind
  alternatives:
  - Keep reminding
  - Remind continually
  lexicon: BDAG
  rationale: Present active imperative, second singular, calling Titus to ongoing
    instruction. 'Remind' is natural English; the iterative force of the present imperative
    is implicit and could be expanded as 'keep reminding,' but that is not required
    in the main text.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative plural pronoun referring to the Cretan believers addressed
    through Titus. 'Them' is the straightforward English equivalent.
- source_word: ἀρχαῖς
  chosen: rulers
  alternatives:
  - principalities
  - governing authorities
  - leaders
  lexicon: BDAG
  rationale: In this civic context, ἀρχαί refers to ruling powers or magistrates rather
    than cosmic powers. 'Rulers' captures the personal aspect of governing leadership.
- source_word: ἐξουσίαις
  chosen: authorities
  alternatives:
  - powers
  - authorities in power
  lexicon: BDAG
  rationale: Paired with ἀρχαῖς, this term denotes authorities or governing powers.
    Rendering the pair as 'rulers and authorities' preserves the twofold expression
    without collapsing it into a single term.
- source_word: ὑποτάσσεσθαι
  chosen: to be subject to
  alternatives:
  - to submit to
  - to be submissive to
  lexicon: BDAG
  rationale: The present middle/passive infinitive expresses ordered subordination.
    'Be subject to' is slightly more formal and fits civic relationships without implying
    unqualified servility.
- source_word: πειθαρχεῖν
  chosen: to be obedient
  alternatives:
  - to obey
  lexicon: BDAG
  rationale: The verb means to obey authority, often with the nuance of compliance
    with those in rule. 'To be obedient' reads smoothly in the infinitive chain after
    'to be subject to'; 'to obey' is possible but slightly more abrupt in English.
- source_word: πρὸς πᾶν ἔργον ἀγαθὸν
  chosen: for every good work
  alternatives:
  - for every good deed
  - for every good thing to be done
  lexicon: BDAG
  rationale: πρός with the accusative here expresses readiness or orientation toward
    something. 'For every good work' is a standard and clear rendering that preserves
    the ethical emphasis of ἔργον ἀγαθόν.
- source_word: ἑτοίμους εἶναι
  chosen: to be ready
  alternatives:
  - to be prepared
  lexicon: BDAG
  rationale: 'This infinitive phrase completes the exhortation: believers are to be
    in a state of readiness. ''Ready'' is concise and idiomatic; ''prepared'' is possible
    but slightly less direct.'
