id: TIT.3.12
reference: Titus 3:12
source:
  edition: SBLGNT
  text: Ὅταν πέμψω Ἀρτεμᾶν πρὸς σὲ ἢ Τυχικόν, σπούδασον ἐλθεῖν πρός με εἰς Νικόπολιν,
    ἐκεῖ γὰρ κέκρικα παραχειμάσαι.
translation:
  text: When I send Artemas or Tychicus to you, make every effort to come to me at
    Nicopolis, for I have decided to spend the winter there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be diligent to come to me' or 'do your best to come to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have resolved to winter there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: When
  alternatives:
  - Whenever
  lexicon: BDAG
  rationale: Introduces a future contingency with the subjunctive ('when/whenever
    I send'). In this epistolary context, 'When' is the most natural English rendering
    for a specific anticipated event rather than a general repeated action.
- source_word: πέμψω
  chosen: I send
  alternatives:
  - I have sent
  - I may send
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν commonly refers to a future event. English
    present 'I send' after 'when' idiomatically conveys future contingency better
    than a wooden 'I may send'.
- source_word: Ἀρτεμᾶν
  chosen: Artemas
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: ἢ
  chosen: or
  lexicon: BDAG
  rationale: Simple disjunctive conjunction indicating one of two possible delegates.
- source_word: Τυχικόν
  chosen: Tychicus
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: σπούδασον
  chosen: make every effort
  alternatives:
  - be diligent
  - do your best
  - hurry
  lexicon: BDAG
  rationale: The imperative calls for earnestness and prompt intentionality. 'Make
    every effort' captures the force without reducing it merely to speed ('hurry')
    or sounding overly formal ('be diligent').
- source_word: ἐλθεῖν
  chosen: to come
  alternatives:
  - to go
  lexicon: BDAG
  rationale: Infinitive complement to σπούδασον. Because the motion is toward the
    speaker ('to me'), English idiom requires 'come,' not 'go.'
- source_word: πρός με
  chosen: to me
  alternatives:
  - with me
  lexicon: BDAG
  rationale: Directional phrase indicating movement toward Paul, not accompaniment.
- source_word: εἰς Νικόπολιν
  chosen: at Nicopolis
  alternatives:
  - to Nicopolis
  - in Nicopolis
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' in English with 'come to me' the
    destination is most naturally expressed as 'at Nicopolis' to avoid awkward double
    'to' constructions while preserving the sense that Paul is there.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Locative adverb referring back to Nicopolis.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for the preceding request. 'For' preserves the
    connective force in a natural literary register.
- source_word: κέκρικα
  chosen: I have decided
  alternatives:
  - I have resolved
  - I have determined
  - I judged
  lexicon: BDAG
  rationale: Perfect active indicative of κρίνω here expresses a settled decision
    with present relevance. 'I have decided' is clear modern English and fits the
    context better than the more wooden 'I judged.'
- source_word: παραχειμάσαι
  chosen: to spend the winter
  alternatives:
  - to winter
  - to stay for the winter
  lexicon: BDAG
  rationale: The infinitive means to pass or spend the winter somewhere. 'To spend
    the winter' is idiomatic and accessible while preserving the temporal sense.
