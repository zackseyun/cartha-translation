- issue: Rendering generic ἀνθρώπους
  chosen_reading: all people
  alternative_readings:
  - all men
  - everyone
  rationale: The noun is grammatically masculine but semantically generic for human
    beings. Per the translation philosophy's gender-accurate principle, English should
    reflect the source's intent rather than preserve a misleading male-specific sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
