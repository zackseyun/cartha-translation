id: TIT.3.2
reference: Titus 3:2
source:
  edition: SBLGNT
  text: μηδένα βλασφημεῖν, ἀμάχους εἶναι, ἐπιεικεῖς, πᾶσαν ἐνδεικνυμένους πραΰτητα
    πρὸς πάντας ἀνθρώπους.
translation:
  text: to slander no one, to be non-contentious, gentle, showing all meekness toward
    all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to speak evil of no one.' The verb can denote abusive speech more broadly
      than formal slander.
    reason: lexical_alternative
  - marker: b
    text: Or 'peaceable' for 'non-contentious.'
    reason: lexical_alternative
  - marker: c
    text: Or 'showing all gentleness toward all people.' The noun πραΰτης can also
      be rendered 'gentleness,' but 'meekness' was chosen here to distinguish it from
      ἐπιεικεῖς ('gentle') earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδένα
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: Accusative singular of μηδείς functions as the object of βλασφημεῖν.
    'No one' is the most natural modern English rendering and preserves the universal
    scope.
- source_word: βλασφημεῖν
  chosen: to slander
  alternatives:
  - to speak evil of
  - to revile
  - to blaspheme
  lexicon: BDAG
  rationale: In this interpersonal ethical context with μηδένα as object, the sense
    is speaking abusively against people rather than blaspheming God. 'Slander' is
    concise and idiomatic, though broader alternatives are possible.
- source_word: ἀμάχους
  chosen: non-contentious
  alternatives:
  - peaceable
  - not quarrelsome
  - unfighting
  lexicon: BDAG
  rationale: The adjective denotes being unwilling to fight or quarrel. 'Non-contentious'
    preserves the negative form and ethical nuance without sounding archaic; 'peaceable'
    is possible but slightly more interpretive.
- source_word: εἶναι
  chosen: to be
  lexicon: BDAG
  rationale: Infinitive continuing the series of conduct instructions dependent on
    the previous verse's governing verb. Rendered straightforwardly in English.
- source_word: ἐπιεικεῖς
  chosen: gentle
  alternatives:
  - considerate
  - forbearing
  - gracious
  lexicon: BDAG
  rationale: ἐπιεικής often carries the sense of gentleness, reasonableness, or yieldingness.
    'Gentle' is the clearest accessible rendering in modern English, though it does
    not exhaust the semantic range.
- source_word: πᾶσαν
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: Modifies πραΰτητα and intensifies the comprehensiveness of the quality
    displayed. 'All' is idiomatic with an abstract noun in English.
- source_word: ἐνδεικνυμένους
  chosen: showing
  alternatives:
  - demonstrating
  - displaying
  lexicon: BDAG
  rationale: Present middle participle describing the manner of conduct. 'Showing'
    is natural English and fits the ethical exhortation.
- source_word: πραΰτητα
  chosen: meekness
  alternatives:
  - gentleness
  - humility
  - courtesy
  lexicon: BDAG
  rationale: πραΰτης denotes humble gentleness or meekness. 'Meekness' preserves the
    distinct lexical value from ἐπιεικεῖς ('gentle') in the same verse, even though
    it is somewhat less common in contemporary English.
- source_word: πρὸς πάντας ἀνθρώπους
  chosen: toward all people
  alternatives:
  - toward all men
  - to everyone
  lexicon: BDAG
  rationale: πρός with the accusative here expresses orientation toward others. ἄνθρωποι
    is generic for human beings, so 'people' accurately conveys the referent in natural
    English while preserving the universal scope.
