id: TIT.3.15
reference: Titus 3:15
source:
  edition: SBLGNT
  text: Ἀσπάζονταί σε οἱ μετ’ ἐμοῦ πάντες. ἄσπασαι τοὺς φιλοῦντας ἡμᾶς ἐν πίστει.
    ἡ χάρις μετὰ πάντων ⸀ὑμῶν.
translation:
  text: All who are with me greet you. Greet those who love us in faith. Grace be
    with all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the faith'; alternatively, 'in faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζονταί
  chosen: greet
  alternatives:
  - send greetings to
  - greet warmly
  lexicon: BDAG
  rationale: Standard epistolary sense of ἀσπάζομαι in greetings/closings. 'Greet'
    is natural modern English and preserves the direct interpersonal force without
    unnecessary expansion.
- source_word: οἱ μετ’ ἐμοῦ πάντες
  chosen: All who are with me
  alternatives:
  - All those with me
  - Everyone with me
  lexicon: BDAG
  rationale: This phrase refers collectively to Paul's companions. 'All who are with
    me' preserves the explicit πάντες ('all') and the relational phrase μετά + genitive.
- source_word: ἄσπασαι
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Imperative of ἀσπάζομαι in an epistolary closing. 'Greet' is concise
    and idiomatic.
- source_word: φιλοῦντας
  chosen: love
  alternatives:
  - are fond of
  - care for
  lexicon: BDAG
  rationale: φιλέω here denotes personal affection/attachment. 'Love' is the most
    straightforward English equivalent and fits the relational tone of the closing.
- source_word: ἐν πίστει
  chosen: in faith
  alternatives:
  - in the faith
  - in faithfulness
  lexicon: BDAG
  rationale: 'πίστις defaults to ''faith'' per doctrine guidance. Here ἐν πίστει most
    naturally qualifies the sphere/shared basis of the love between believers: ''in
    faith.'' ''In the faith'' is possible but adds the article concept not present
    in Greek; ''in faithfulness'' is less likely in this closing formula but worth
    preserving as a lexical alternative.'
- source_word: ἡ χάρις
  chosen: Grace
  alternatives:
  - The grace
  lexicon: BDAG
  rationale: Conventional Pauline benediction. English idiom omits the article while
    preserving the theological sense of divine grace.
- source_word: μετὰ πάντων ὑμῶν
  chosen: be with all of you
  alternatives:
  - be with you all
  - be with all of you all
  lexicon: BDAG
  rationale: The verb is implied in the benediction. 'Be with all of you' makes the
    blessing explicit in natural English and preserves πάντων ('all').
