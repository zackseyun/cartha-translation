  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - the faith
  rationale: DOCTRINE.md sets πίστις default as 'faith,' with alternatives preserved
    where context is genuinely open. In this closing greeting, 'in faith' best captures
    shared Christian faith as the sphere of affection without over-specifying doctrinal
    content. Alternatives are preserved in a footnote for auditability.
