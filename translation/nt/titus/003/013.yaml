id: TIT.3.13
reference: Titus 3:13
source:
  edition: SBLGNT
  text: ζηνᾶν τὸν νομικὸν καὶ ⸀Ἀπολλῶν σπουδαίως πρόπεμψον, ἵνα μηδὲν αὐτοῖς λείπῃ.
translation:
  text: Diligently send Zenas the lawyer and Apollos on their way, so that they may
    lack nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'help Zenas the lawyer and Apollos on their journey diligently.' The
      verb can imply providing practical support for travel, not merely sending them
      away.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηνᾶν
  chosen: Zenas
  rationale: Proper name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: τὸν νομικὸν
  chosen: the lawyer
  alternatives:
  - the legal expert
  - the expert in the law
  lexicon: BDAG
  rationale: νομικός can denote one skilled in law. Here, attached appositionally
    to Zenas, 'the lawyer' is the most natural concise English rendering. 'Expert
    in the law' is possible, but in this context likely functions as a professional
    designation rather than a technical theological title.
- source_word: Ἀπολλῶν
  chosen: Apollos
  rationale: Proper name transliterated by standard convention.
- source_word: σπουδαίως
  chosen: diligently
  alternatives:
  - earnestly
  - carefully
  - with haste
  lexicon: BDAG
  rationale: The adverb conveys earnestness and serious attention. 'Diligently' fits
    the imperative force and modifies Paul's instruction about providing for their
    journey without overstating speed alone.
- source_word: πρόπεμψον
  chosen: send ... on their way
  alternatives:
  - help ... on their journey
  - escort and provide for
  lexicon: BDAG
  rationale: In epistolary and travel contexts, προπέμπω commonly means to assist
    travelers by sending them on with needed support, not merely to dismiss them.
    'Send ... on their way' is idiomatic English that preserves this travel-assistance
    sense.
- source_word: ἵνα μηδὲν αὐτοῖς λείπῃ
  chosen: so that they may lack nothing
  alternatives:
  - so that nothing may be lacking to them
  - so that they may have everything they need
  lexicon: BDAG
  rationale: 'This clause expresses purpose: Titus is to provide support so that Zenas
    and Apollos are not deficient in needed provisions. ''They may lack nothing''
    is natural English and preserves the broad scope of the Greek.'
