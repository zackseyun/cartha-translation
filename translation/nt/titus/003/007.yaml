id: TIT.3.7
reference: Titus 3:7
source:
  edition: SBLGNT
  text: ἵνα δικαιωθέντες τῇ ἐκείνου χάριτι κληρονόμοι ⸀γενηθῶμεν κατ’ ἐλπίδα ζωῆς
    αἰωνίου.
translation:
  text: so that, having been justified by his grace, we might become heirs according
    to the hope of eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in hope of eternal life.'
    reason: lexical_alternative
  - marker: b
    text: '''Justified'' may also be rendered ''declared righteous.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the clause's purposive force.
- source_word: δικαιωθέντες
  chosen: having been justified
  alternatives:
  - having been declared righteous
  - being justified
  lexicon: BDAG
  rationale: Aorist passive participle of δικαιόω. 'Having been justified' preserves
    the passive voice and antecedent action relative to the main verb. 'Declared righteous'
    is interpretive and less idiomatic here.
- source_word: τῇ ἐκείνου χάριτι
  chosen: by his grace
  alternatives:
  - by that one's grace
  - by the grace of him
  lexicon: BDAG
  rationale: Instrumental dative with χάρις. 'His' naturally renders ἐκείνου in context,
    referring back to God/Savior in the preceding context. 'By his grace' is idiomatic
    and faithful.
- source_word: κληρονόμοι
  chosen: heirs
  alternatives:
  - inheritors
  lexicon: BDAG
  rationale: Standard rendering for κληρονόμοι in Pauline contexts, preserving covenantal/inheritance
    imagery.
- source_word: γενηθῶμεν
  chosen: we might become
  alternatives:
  - we might be made
  - we might be
  lexicon: BDAG
  rationale: Aorist subjunctive of γίνομαι after ἵνα. 'Become' best reflects entry
    into a status. 'Be made' could imply an external causation more explicitly than
    the Greek states.
- source_word: κατ’ ἐλπίδα
  chosen: according to the hope
  alternatives:
  - in hope
  - on the basis of hope
  lexicon: BDAG
  rationale: κατά with accusative here is somewhat idiomatic. 'According to the hope'
    preserves the preposition and links the inheritance to eschatological expectation.
    'In hope' is possible but less formally transparent.
- source_word: ζωῆς αἰωνίου
  chosen: of eternal life
  alternatives:
  - of everlasting life
  lexicon: BDAG
  rationale: Genitive phrase specifying the content/object of hope. 'Eternal life'
    is the standard and most recognizable rendering of ζωὴ αἰώνιος.
