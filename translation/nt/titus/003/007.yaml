theological_decisions:
- issue: Meaning of δικαιωθέντες in a Pauline soteriological context
  chosen_reading: justified
  alternative_readings:
  - declared righteous
  rationale: The verse speaks in established Pauline salvation language. 'Justified'
    preserves the theological and lexical connection to δικαιόω without narrowing
    the mechanism beyond what the text states. The alternative is semantically close
    but more explanatory than translational.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
- issue: Referent of ἐκείνου ('his')
  chosen_reading: his = God, in the immediate salvation context
  alternative_readings:
  - his = Jesus Christ, via the nearest antecedent in the broader context
  rationale: The pronoun points back within the immediately preceding description
    of divine saving action. English 'his' preserves the ambiguity level reasonably
    well without forcing a more explicit identification than the Greek here requires.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
