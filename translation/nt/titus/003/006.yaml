id: TIT.3.6
reference: Titus 3:6
source:
  edition: SBLGNT
  text: οὗ ἐξέχεεν ἐφ’ ἡμᾶς πλουσίως διὰ Ἰησοῦ Χριστοῦ τοῦ σωτῆρος ἡμῶν,
translation:
  text: whom he poured out on us richly through Jesus Messiah our Savior,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which he poured out on us richly,' if the relative pronoun is rendered
      less personally; the antecedent is the Holy Spirit in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός is treated
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗ
  chosen: whom
  alternatives:
  - which
  lexicon: BDAG
  rationale: Genitive singular neuter/masculine relative pronoun referring back to
    the Holy Spirit in v. 5. In English, because the antecedent is personal, 'whom'
    is more natural and theologically fitting than 'which.'
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - shed
  - lavished
  lexicon: BDAG
  rationale: Aorist active indicative of ἐκχέω, commonly used for pouring out, including
    of the Spirit. 'Poured out' is the plain lexical sense and avoids the archaic
    English of 'shed' in this context.
- source_word: ἐφ’ ἡμᾶς
  chosen: on us
  alternatives:
  - upon us
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys direction toward or onto. 'On us' is
    idiomatic modern English; 'upon us' is possible but less natural.
- source_word: πλουσίως
  chosen: richly
  alternatives:
  - abundantly
  - generously
  lexicon: BDAG
  rationale: The adverb denotes abundance or richness. 'Richly' preserves the lexical
    connection to wealth/richness while remaining natural in English.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive, διά commonly marks means or agency. 'Through' is the
    standard concise rendering here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a fixed name-like form. Here the phrase is still transparently
    titular in apposition with 'our Savior,' so 'Jesus Messiah' best preserves meaning.
- source_word: τοῦ σωτῆρος ἡμῶν
  chosen: our Savior
  alternatives:
  - the Savior of us
  lexicon: BDAG
  rationale: σωτήρ is a title meaning 'Savior.' The genitive pronoun is naturally
    rendered as the possessive 'our.' This preserves the christological title without
    awkward literalism.
