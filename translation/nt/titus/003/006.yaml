theological_decisions:
- issue: Referent of the relative pronoun οὗ
  chosen_reading: The pronoun refers to the Holy Spirit mentioned in Titus 3:5, so
    the verse speaks of God pouring out the Spirit on believers.
  alternative_readings:
  - A less personal English rendering such as 'which' could be used if treated more
    abstractly.
  rationale: The immediate antecedent in v. 5 is the Holy Spirit, and the Spirit is
    personal in Pauline usage. Rendering with 'whom' reflects the antecedent and avoids
    depersonalizing the Spirit.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Rendering Χριστοῦ as 'Messiah' rather than 'Christ'
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The doctrine excerpt directs that Christological titles be translated
    to preserve meaning where context supports it. Here Χριστός functions as a title
    alongside 'our Savior,' so 'Messiah' is preferred while preserving the traditional
    form in a footnote.
  doctrine_reference: 'Translation philosophy #2; Contested terms table for Χριστός'
