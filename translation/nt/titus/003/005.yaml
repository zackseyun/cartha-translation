id: TIT.3.5
reference: Titus 3:5
source:
  edition: SBLGNT
  text: οὐκ ἐξ ἔργων τῶν ἐν δικαιοσύνῃ ⸀ἃ ἐποιήσαμεν ἡμεῖς ἀλλὰ κατὰ ⸂τὸ αὐτοῦ ἔλεος⸃
    ἔσωσεν ἡμᾶς διὰ λουτροῦ παλιγγενεσίας καὶ ἀνακαινώσεως πνεύματος ἁγίου,
translation:
  text: not from works done in righteousness, which we ourselves did, but according
    to his mercy he saved us, through the washing of regeneration and renewal by the
    Holy Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'works done in justice.' The Greek word can mean 'righteousness' or 'justice';
      in Pauline usage the main text keeps 'righteousness.'
    reason: alternative_reading
  - marker: b
    text: '''Washing'' may refer to baptism, cleansing imagery, or both; the Greek
      itself does not require the translator to make that interpretive choice explicit
      in the main text.'
    reason: lexical_alternative
  - marker: c
    text: Or 'renewal of the Holy Spirit.' The Greek construction allows slightly
      different ways of relating 'Holy Spirit' to 'renewal.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἐξ ἔργων
  chosen: not from works
  alternatives:
  - not by works
  - not out of works
  lexicon: BDAG
  rationale: ἐκ with the genitive marks source/basis. 'Not from works' preserves the
    contrast with 'according to his mercy' and avoids overinterpreting the preposition
    while remaining natural English.
- source_word: τῶν ἐν δικαιοσύνῃ
  chosen: done in righteousness
  alternatives:
  - done in righteous deeds
  - done in justice
  lexicon: BDAG
  rationale: The article plus prepositional phrase modifies 'works'; supplying 'done'
    makes the Greek idiom intelligible in English. δικαιοσύνη is rendered 'righteousness'
    per default Pauline usage, while 'justice' is preserved as an alternative because
    the term can carry that sense.
- source_word: ἃ ἐποιήσαμεν ἡμεῖς
  chosen: which we ourselves did
  alternatives:
  - which we did
  - that we ourselves performed
  lexicon: BDAG
  rationale: The explicit pronoun ἡμεῖς is emphatic, so 'we ourselves' preserves the
    stress that these are humanly performed works.
- source_word: κατὰ τὸ αὐτοῦ ἔλεος
  chosen: according to his mercy
  alternatives:
  - because of his mercy
  - in keeping with his mercy
  lexicon: BDAG
  rationale: κατά here expresses standard or basis. 'According to his mercy' closely
    reflects the Greek and preserves the contrast with works as the ground of salvation.
- source_word: ἔσωσεν ἡμᾶς
  chosen: he saved us
  alternatives:
  - he rescued us
  lexicon: BDAG
  rationale: σῴζω in this soteriological context is best rendered 'saved,' the standard
    theological term, without importing a narrower or broader sense than the context
    warrants.
- source_word: διὰ λουτροῦ
  chosen: through the washing
  alternatives:
  - through the bath
  - through the washing bath
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrumentality. λουτρόν denotes
    a washing/bath; 'washing' is the most natural English rendering here and leaves
    open the precise sacramental or metaphorical nuance rather than resolving it in
    translation.
- source_word: παλιγγενεσίας
  chosen: of regeneration
  alternatives:
  - of rebirth
  - of new birth
  lexicon: BDAG
  rationale: παλιγγενεσία carries the sense of rebirth/regeneration. 'Regeneration'
    preserves the theological weight and traditional precision of the term; more idiomatic
    alternatives are possible but slightly narrower or more interpretive.
- source_word: καὶ ἀνακαινώσεως
  chosen: and renewal
  alternatives:
  - and renewing
  lexicon: BDAG
  rationale: The noun ἀνακαίνωσις is best rendered as the coordinate noun 'renewal,'
    matching the parallel genitive structure with 'regeneration.'
- source_word: πνεύματος ἁγίου
  chosen: by the Holy Spirit
  alternatives:
  - of the Holy Spirit
  lexicon: BDAG
  rationale: The genitive may be taken as subjective/source-related with 'renewal'
    ('renewal by the Holy Spirit') or as a simple attributive relation. In English,
    'by the Holy Spirit' best conveys agency/source for the renewal while remaining
    readable. It is attached to 'renewal' rather than forced to govern both nouns
    equally.
