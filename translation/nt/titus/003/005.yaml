theological_decisions:
- issue: Meaning of δικαιοσύνη in a Pauline context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: DOCTRINE.md lists δικαιοσύνη with default rendering 'righteousness' while
    preserving 'justice' in footnotes for Pauline passages. Here the phrase refers
    to works characterized by righteousness rather than works as a means of justification,
    so 'righteousness' fits best in the main text while the alternative is preserved.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Force of διὰ λουτροῦ παλιγγενεσίας καὶ ἀνακαινώσεως πνεύματος ἁγίου
  chosen_reading: 'instrumental/means language without specifying sacramental mechanism:
    ''through the washing of regeneration and renewal by the Holy Spirit'''
  alternative_readings:
  - explicitly baptismal rendering such as 'through baptismal washing of rebirth'
  - more metaphorical rendering such as 'through the cleansing of rebirth and renewal'
  rationale: The verse has long-standing theological debate over whether λουτρόν directly
    denotes baptism, metaphorical cleansing, or both. To preserve theological tension
    rather than resolve it, the translation keeps the lexical wording 'washing' and
    'regeneration' without inserting 'baptism' into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Relation of 'Holy Spirit' to the preceding genitives
  chosen_reading: 'attach agency most directly to ''renewal'' in English: ''renewal
    by the Holy Spirit'''
  alternative_readings:
  - '''washing of regeneration and renewal of the Holy Spirit'''
  - '''washing of regeneration and renewal from the Holy Spirit'''
  rationale: The Greek genitive πνεύματος ἁγίου most naturally modifies ἀνακαινώσεως
    immediately preceding, though some take it with both nouns. English 'by the Holy
    Spirit' communicates the likely sense without foreclosing all syntactical discussion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
