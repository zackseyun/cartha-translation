theological_decisions:
- issue: Relation of faith and works in the exhortation
  chosen_reading: 'Rendered the clause as an ethical result of prior belief: ''those
    who have believed God may be careful to devote themselves to good works.'''
  alternative_readings:
  - Rendered more weakly as general encouragement toward good deeds
  - Rendered more strongly as meritorious works
  rationale: The Greek presents good works as the intended outworking of those who
    have already believed, not as the basis of salvation. The translation preserves
    that sequence without importing a denominational framework.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Object of πιστεύω with dative θεῷ
  chosen_reading: Main text keeps the direct sense 'believed God.'
  alternative_readings:
  - believed in God
  - trusted God
  rationale: The Greek dative naturally supports 'believed God,' emphasizing taking
    God at his word. Because English idiom often prefers 'believed in God' or 'trusted
    God,' those are preserved as alternatives rather than replacing the more source-near
    rendering.
  doctrine_reference: Translation philosophy §1, §3
