theological_decisions:
- issue: Nuance of bondage in δουλεύοντες with non-personal masters ('desires and
    pleasures')
  chosen_reading: enslaved to various desires and pleasures
  alternative_readings:
  - serving various desires and pleasures
  rationale: The verse depicts pre-conversion moral bondage. Rendering δουλεύοντες
    as 'enslaved' preserves the strong force of slave-language without importing a
    doctrinal system beyond the text. This aligns with the project's guidance to use
    stronger bonded language where context makes it salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    on δοῦλος
