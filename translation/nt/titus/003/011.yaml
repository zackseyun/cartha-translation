id: TIT.3.11
reference: Titus 3:11
source:
  edition: SBLGNT
  text: εἰδὼς ὅτι ἐξέστραπται ὁ τοιοῦτος καὶ ἁμαρτάνει, ὢν αὐτοκατάκριτος.
translation:
  text: knowing that such a man is warped and is sinning, being self-condemned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has turned aside' or 'is perverted' for 'is warped.' The Greek perfect
      verb indicates a state resulting from prior deviation.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''such a person.'' The Greek expression is masculine singular: ''such
      a man.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'condemned by himself.' The adjective means condemned by his own actions
      or testimony against himself.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - since you know
  - because he knows
  lexicon: BDAG
  rationale: A participle from οἶδα/ὁράω used circumstantially. 'Knowing' preserves
    the participial connection to the prior imperative context without over-specifying
    whether it is causal or concessive. The implied subject is the one carrying out
    the instruction of the previous verse.
- source_word: ἐξέστραπται
  chosen: is warped
  alternatives:
  - has turned aside
  - is perverted
  - has gone astray
  lexicon: BDAG
  rationale: Perfect passive/middle of ἐκστρέφομαι indicates a settled state resulting
    from prior deviation. 'Is warped' communicates moral distortion in present state,
    fitting the perfect better than a simple eventive gloss. 'Perverted' is possible
    but can sound overly specialized in modern English; 'has turned aside' is more
    literal but less idiomatic here.
- source_word: ὁ τοιοῦτος
  chosen: such a man
  alternatives:
  - such a person
  - that sort of man
  lexicon: BDAG
  rationale: Masculine singular expression referring back to the divisive person in
    context. Per gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person,' while 'such a man' is natural English.
- source_word: ἁμαρτάνει
  chosen: is sinning
  alternatives:
  - sins
  - continues in sin
  lexicon: BDAG
  rationale: Present tense suggests ongoing action. 'Is sinning' preserves the progressive
    force without adding interpretive weight beyond the Greek. 'Continues in sin'
    is interpretive expansion.
- source_word: ὢν
  chosen: being
  alternatives:
  - since he is
  - while he is
  lexicon: BDAG
  rationale: The participle links the final predicate to the preceding description.
    'Being' keeps the syntax compact and close to the Greek, leaving the exact nuance
    implicit.
- source_word: αὐτοκατάκριτος
  chosen: self-condemned
  alternatives:
  - self-condemning
  - condemned by himself
  lexicon: BDAG
  rationale: The adjective denotes one condemned by his own actions or by his own
    judgment against himself. 'Self-condemned' is concise, idiomatic, and preserves
    the reflexive force without implying a formal judicial sentence.
