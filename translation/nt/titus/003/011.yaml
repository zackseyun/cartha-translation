theological_decisions:
- issue: Gendered reference in ὁ τοιοῦτος
  chosen_reading: such a man
  alternative_readings:
  - such a person
  rationale: The Greek is grammatically masculine singular and refers to the factious
    individual in the immediate context. Following the project's gender-accurate policy,
    the masculine form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of αὐτοκατάκριτος
  chosen_reading: self-condemned
  alternative_readings:
  - condemned by himself
  - self-condemning
  rationale: The text states that the person's own condition and conduct render him
    condemned; it does not require importing a fuller doctrine of final judgment.
    'Self-condemned' preserves the theological weight while avoiding overstatement.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
