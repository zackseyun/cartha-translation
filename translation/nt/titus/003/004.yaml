theological_decisions:
- issue: Referent of 'God our Savior'
  chosen_reading: The phrase refers to God the Father in this verse, with the saving
    manifestation described in connection with his kindness and love, while the broader
    context distinguishes Jesus Christ in verse 6.
  alternative_readings:
  - The phrase could be read more generally as a divine title without pressing a person-specific
    distinction in this verse alone.
  rationale: The Pastorals frequently use 'God our Savior' as a title for the Father,
    while also applying 'Savior' to Jesus Christ. The translation preserves the wording
    without collapsing the persons or obscuring the title's theological weight.
  doctrine_reference: 'Affirmations: Nicene Creed; preserve theological tension rather
    than resolve it'
