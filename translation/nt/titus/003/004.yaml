id: TIT.3.4
reference: Titus 3:4
source:
  edition: SBLGNT
  text: ὅτε δὲ ἡ χρηστότης καὶ ἡ φιλανθρωπία ἐπεφάνη τοῦ σωτῆρος ἡμῶν θεοῦ,
translation:
  text: But when the kindness and love for humanity of God our Savior appeared,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love of mankind'; the Greek term denotes benevolence or love toward
      human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - when
  - but when
  - and when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause ('when'), and δέ adds mild connective
    contrast or progression. 'But when' best reflects the discourse shift from the
    prior description of human sinfulness to God's saving intervention.
- source_word: χρηστότης
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: χρηστότης commonly denotes kindness, goodness, or benevolence in a relational
    sense. 'Kindness' is the most natural modern English rendering and pairs well
    with φιλανθρωπία without flattening either term into a synonym.
- source_word: φιλανθρωπία
  chosen: love for humanity
  alternatives:
  - lovingkindness toward people
  - humanity
  - love of mankind
  lexicon: BDAG
  rationale: φιλανθρωπία refers to benevolence or love toward human beings. 'Love
    for humanity' preserves the lexical sense more transparently than the traditional
    but broader 'love' or the archaic 'love of mankind.' It also avoids importing
    modern technical meanings into 'humanity' as a standalone noun.
- source_word: ἐπεφάνη
  chosen: appeared
  alternatives:
  - was revealed
  - shone forth
  - became manifest
  lexicon: BDAG
  rationale: The aorist passive/intransitive form here conveys manifestation or appearing.
    'Appeared' is concise, idiomatic, and preserves the epiphanic sense without overinterpreting
    the mode of revelation.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  chosen: of God our Savior
  alternatives:
  - of our Savior God
  - of God, our Savior
  lexicon: BDAG
  rationale: The genitive phrase modifies both preceding nouns ('the kindness and
    love for humanity of God our Savior'). 'God our Savior' is the most natural English
    order and preserves the appositional/title force of the Greek. A comma is unnecessary
    in English because the title is restrictive and conventional in the Pastorals.
