id: TIT.3.10
reference: Titus 3:10
source:
  edition: SBLGNT
  text: αἱρετικὸν ἄνθρωπον μετὰ μίαν καὶ δευτέραν νουθεσίαν παραιτοῦ,
translation:
  text: Reject a divisive man after a first and second warning,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'factious' or, in traditional renderings, 'heretical man.' The Greek
      term likely refers to a person who creates sectarian division.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱρετικὸν
  chosen: divisive
  alternatives:
  - factious
  - heretical
  lexicon: BDAG
  rationale: In Koine usage αἱρετικός refers to a person who promotes factions or
    sectarian division rather than primarily someone holding formal doctrinal heresy
    in the later ecclesiastical sense. 'Divisive' communicates the relational and
    communal effect in clear modern English. 'Heretical' is preserved as an alternative
    because of historical translation tradition, but it risks importing later technical
    theology not explicit in the term here.
- source_word: ἄνθρωπον
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and refers to an individual
    human. Following the project's gender-accurate principle, 'man' best matches the
    source form and sense. 'Person' is possible in English but would flatten the masculine
    form present in the Greek.
- source_word: μετὰ μίαν καὶ δευτέραν νουθεσίαν
  chosen: after a first and second warning
  alternatives:
  - after one and a second admonition
  - after a first and second instruction
  lexicon: BDAG
  rationale: 'The phrase marks sequence: only after repeated prior correction should
    the action be taken. νουθεσία carries the sense of admonition or warning aimed
    at correction. ''Warning'' is more natural contemporary English than ''admonition''
    while preserving the corrective force.'
- source_word: παραιτοῦ
  chosen: Reject
  alternatives:
  - have nothing to do with
  - avoid
  - refuse
  lexicon: BDAG
  rationale: The middle imperative calls for declining association with or refusing
    such a person. 'Reject' captures the decisive disciplinary action in concise English.
    'Have nothing to do with' is interpretive expansion; 'avoid' can sound too weak.
