theological_decisions:
- issue: Whether αἱρετικὸν should be rendered with later doctrinal language ('heretical')
    or with its likely first-century sense of causing factions
  chosen_reading: divisive
  alternative_readings:
  - heretical
  - factious
  rationale: The verse addresses church discipline toward a person who persists after
    repeated correction. Rendering αἱρετικὸν as 'divisive' preserves the probable
    semantic range in this context and avoids importing later technical categories
    of heresy beyond what the text itself states.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
