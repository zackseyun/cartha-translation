theological_decisions:
- issue: Whether 'our great God and Savior, Jesus Messiah' refers to one person (Jesus)
    or two persons (the Father and Jesus)
  chosen_reading: 'One person: Jesus Messiah is identified as ''our great God and
    Savior.'''
  alternative_readings:
  - 'Two persons: ''the great God'' and ''our Savior Jesus Messiah'''
  rationale: The Greek construction has a single article governing two singular personal
    nouns ('τοῦ μεγάλου θεοῦ καὶ σωτῆρος ἡμῶν') followed by 'Jesus Messiah,' which
    most naturally identifies one referent. This reading also fits the immediate context
    of Christ's appearing. The translation therefore renders the phrase as a unified
    christological designation while preserving the alternative in a footnote for
    auditability.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy
    §3 Preserve theological tension rather than resolve it'
