id: TIT.2.13
reference: Titus 2:13
source:
  edition: SBLGNT
  text: προσδεχόμενοι τὴν μακαρίαν ἐλπίδα καὶ ἐπιφάνειαν τῆς δόξης τοῦ μεγάλου θεοῦ
    καὶ σωτῆρος ἡμῶν ⸂Ἰησοῦ Χριστοῦ⸃,
translation:
  text: as we await the blessed hope and the appearing of the glory of our great God
    and Savior, Jesus the Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'the glory of the great God and of our Savior Jesus Messiah,'
      taking 'God' and 'Savior' as two distinct referents rather than a single title
      for Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: προσδεχόμενοι
  chosen: as we await
  alternatives:
  - awaiting
  - looking for
  - expecting
  lexicon: BDAG
  rationale: The participle continues the sense from the previous verse and denotes
    eager expectation. 'As we await' gives natural English while preserving the durative
    participial force better than a bare noun phrase.
- source_word: μακαρίαν
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: BDAG
  rationale: '''Blessed'' is the established and contextually fitting rendering for
    eschatological hope; ''happy'' or ''fortunate'' would sound trivial in this theological
    context.'
- source_word: ἐλπίδα
  chosen: hope
  lexicon: BDAG
  rationale: Standard rendering; in context it refers to the future object of Christian
    expectation, not mere wishfulness.
- source_word: ἐπιφάνειαν
  chosen: appearing
  alternatives:
  - manifestation
  - epiphany
  lexicon: BDAG
  rationale: '''Appearing'' is clear modern English and preserves the eschatological
    sense of visible manifestation. ''Epiphany'' is too traditional/jargon-heavy for
    the main text.'
- source_word: δόξης
  chosen: glory
  lexicon: BDAG
  rationale: A direct and standard rendering. The genitive is retained in the phrase
    'appearing of the glory,' preserving the Greek structure without over-paraphrasing.
- source_word: μεγάλου
  chosen: great
  lexicon: BDAG
  rationale: Straightforward adjectival rendering modifying 'God'.
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering. In this construction it is part of the christological
    title phrase.
- source_word: σωτῆρος
  chosen: Savior
  alternatives:
  - Deliverer
  lexicon: BDAG
  rationale: '''Savior'' is the established and contextually appropriate rendering
    in Pauline usage; ''Deliverer'' is possible but less idiomatic here.'
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per project philosophy, Χριστός is translated as 'Messiah' where it functions
    as a title rather than left as the traditional transliteration 'Christ.' Here
    the phrase remains appositional/title-like, so 'Jesus Messiah' best preserves
    meaning.
