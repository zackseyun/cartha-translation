id: TIT.2.4
reference: Titus 2:4
source:
  edition: SBLGNT
  text: ἵνα ⸀σωφρονίζωσι τὰς νέας φιλάνδρους εἶναι, φιλοτέκνους,
translation:
  text: so that they may train the younger women to be loving toward their husbands
    and loving toward their children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encourage' or 'teach to be self-controlled'; the verb carries the sense
      of training or advising toward sound-minded conduct.
    reason: lexical_alternative
  - marker: b
    text: Or 'the young women'; Greek literally 'the younger [women],' in contrast
      with the older women in the surrounding context.
    reason: lexical_alternative
  - marker: c
    text: Or 'loving their husbands' and 'loving their children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force.
- source_word: σωφρονίζωσι
  chosen: they may train
  alternatives:
  - they may encourage
  - they may instruct in self-control
  - they may teach to be sensible
  lexicon: BDAG
  rationale: The verb can mean to bring someone to their senses, advise, or train
    toward sound-minded behavior. In context, older women are to shape the conduct
    of younger women. 'Train' captures formative instruction better than a merely
    cognitive 'teach,' while 'may' reflects the subjunctive.
- source_word: τὰς νέας
  chosen: the younger women
  alternatives:
  - the young women
  - the younger wives
  lexicon: BDAG
  rationale: The feminine plural adjective with article refers to younger women in
    contrast to older women in the surrounding context. 'Younger women' preserves
    the comparative/relational sense better than simply 'young women.' 'Younger wives'
    is too narrow, since the noun 'women' is implied rather than explicitly 'wives,'
    though the following descriptors assume marriage and children as the addressed
    situation.
- source_word: φιλάνδρους
  chosen: loving toward their husbands
  alternatives:
  - loving their husbands
  - devoted to their husbands
  lexicon: BDAG
  rationale: This adjective denotes affection for one's husband. 'Loving toward their
    husbands' makes the adjectival force explicit in idiomatic English and avoids
    sounding like a command merely to feel affection; it describes a disposition/character
    trait.
- source_word: εἶναι
  chosen: to be
  lexicon: BDAG
  rationale: 'Complements the preceding verb and adjectives: the younger women are
    to be trained ''to be'' such persons.'
- source_word: φιλοτέκνους
  chosen: loving toward their children
  alternatives:
  - loving their children
  - devoted to their children
  lexicon: BDAG
  rationale: This adjective denotes affection for one's children. Rendering it in
    parallel with φιλάνδρους preserves the rhetorical balance of the Greek pair.
