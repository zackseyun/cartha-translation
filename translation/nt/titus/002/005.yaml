id: TIT.2.5
reference: Titus 2:5
source:
  edition: SBLGNT
  text: σώφρονας, ἁγνάς, ⸀οἰκουργούς, ἀγαθάς, ὑποτασσομένας τοῖς ἰδίοις ἀνδράσιν,
    ἵνα μὴ ὁ λόγος τοῦ θεοῦ βλασφημῆται.
translation:
  text: self-controlled, pure, working at home, kind, being subject to their own husbands,
    so that the word of God may not be slandered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'busy at home' or 'keepers at home.' The Greek term is rare and refers
      to engagement in household work.
    reason: lexical_alternative
  - marker: b
    text: Or 'submitting to their own husbands.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may not be reviled' or more literally 'blasphemed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σώφρονας
  chosen: self-controlled
  alternatives:
  - sensible
  - temperate
  lexicon: BDAG
  rationale: The adjective denotes soundness of mind expressed in prudent self-mastery.
    'Self-controlled' is clear modern English and fits the virtue-list context better
    than the somewhat narrower 'temperate' or the more cognitive 'sensible'.
- source_word: ἁγνάς
  chosen: pure
  alternatives:
  - chaste
  - morally pure
  lexicon: BDAG
  rationale: The term conveys purity, especially moral purity. 'Pure' is the most
    natural broad rendering in contemporary English; 'chaste' is possible but sounds
    narrower and more archaic.
- source_word: οἰκουργούς
  chosen: working at home
  alternatives:
  - busy at home
  - keepers at home
  - domestic
  lexicon: BDAG
  rationale: This rare adjective combines the ideas of house and work, describing
    engagement in household responsibilities. 'Working at home' preserves the labor
    sense better than the traditional 'keepers at home' and avoids implying mere confinement.
    'Busy at home' is also possible but slightly more interpretive.
- source_word: ἀγαθάς
  chosen: kind
  alternatives:
  - good
  - good-hearted
  lexicon: BDAG
  rationale: In a virtue list addressed to conduct, 'kind' brings out the relational
    and ethical quality naturally in English. 'Good' is more literal but too broad
    and flat in this context.
- source_word: ὑποτασσομένας
  chosen: being subject to
  alternatives:
  - submitting to
  - subjecting themselves to
  lexicon: BDAG
  rationale: The participle denotes ordered subordination. 'Being subject to' is a
    relatively formal rendering that stays close to the Greek without importing extra
    nuance. 'Submitting to' is possible, but 'being subject to' better reflects the
    adjectival/participial list structure here.
- source_word: τοῖς ἰδίοις ἀνδράσιν
  chosen: to their own husbands
  alternatives:
  - to their own men
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; with 'their own' in a household-code
    context, 'husbands' is clearly intended. 'Own' is retained because it is explicit
    in the Greek and limits the scope to the marital relationship.
- source_word: ἵνα μὴ
  chosen: so that ... not
  alternatives:
  - in order that ... not
  lexicon: BDAG
  rationale: This introduces purpose. 'So that ... not' is idiomatic English while
    preserving the telic force.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: The phrase can denote God's message broadly; 'the word of God' is the
    most direct and established rendering and fits the concern for the gospel's public
    reputation.
- source_word: βλασφημῆται
  chosen: may not be slandered
  alternatives:
  - may not be reviled
  - may not be blasphemed
  - may not be spoken against
  lexicon: BDAG
  rationale: The verb means to speak in a defamatory or irreverent way. Since the
    object here is 'the word of God,' 'slandered' communicates public defamation clearly
    in modern English. 'Blasphemed' is more literal but in English often suggests
    only direct irreverence toward God rather than reproach brought on the gospel
    message.
