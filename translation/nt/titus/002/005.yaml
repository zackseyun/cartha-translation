theological_decisions:
- issue: Rendering the household-duty term οἰκουργούς without overstating domestic
    restriction
  chosen_reading: working at home
  alternative_readings:
  - busy at home
  - keepers at home
  rationale: The verse instructs younger women in household responsibility within
    the immediate social setting, but the rare Greek term emphasizes productive domestic
    work rather than explicit seclusion. 'Working at home' preserves the lexical sense
    while avoiding an interpretive expansion that would make the text say more than
    it does about confinement.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing doctrinal claims the text does not make.'
- issue: Rendering ὑποτασσομένας in a way that preserves the text's relational ordering
    without denominational overlay
  chosen_reading: being subject to their own husbands
  alternative_readings:
  - submitting to their own husbands
  rationale: The Greek participle states a form of ordered subordination in marriage.
    The translation should preserve that claim but not import a fuller complementarian
    or egalitarian system beyond the verse itself. Retaining 'their own husbands'
    also keeps the scope limited to the marital relationship.
  doctrine_reference: 'Affirmations and translation philosophy: do not advocate a
    denominational distinctive unless the Greek unambiguously supports one reading
    over another.'
