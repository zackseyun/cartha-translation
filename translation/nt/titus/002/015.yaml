theological_decisions:
- issue: Force of Titus's ministerial standing in 'μετὰ πάσης ἐπιταγῆς'
  chosen_reading: Paul instructs Titus to act with full delegated authority in teaching,
    exhorting, and rebuking.
  alternative_readings:
  - Paul tells Titus merely to speak in a commanding tone
  - Paul refers only to the authority of the message, not Titus's role
  rationale: The phrase naturally modifies the imperatives and indicates the full
    weight with which Titus is to carry out these tasks. The translation 'with all
    authority' preserves that force without overstating it into autonomous personal
    power; the authority is ministerial and contextually derived from apostolic instruction.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
