id: TIT.2.15
reference: Titus 2:15
source:
  edition: SBLGNT
  text: Ταῦτα λάλει καὶ παρακάλει καὶ ἔλεγχε μετὰ πάσης ἐπιταγῆς· μηδείς σου περιφρονείτω.
translation:
  text: Speak these things, and exhort and rebuke with all authority. Let no one disregard
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let no one despise you' / 'Let no one look down on you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  chosen: these things
  alternatives:
  - these teachings
  - these matters
  lexicon: BDAG
  rationale: Demonstrative neuter plural referring back to the preceding instructions
    in the chapter. 'These things' preserves the broad referential force without over-specifying
    the content.
- source_word: λάλει
  chosen: speak
  alternatives:
  - say
  - teach
  lexicon: BDAG
  rationale: Present active imperative calls for ongoing verbal communication. 'Speak'
    is the most direct rendering of λαλέω here and avoids collapsing it into the more
    specific 'teach,' since the verse already summarizes multiple ministerial actions.
- source_word: παρακάλει
  chosen: exhort
  alternatives:
  - encourage
  - urge
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, urge, or exhort. In this pastoral context,
    'exhort' best preserves the directive and moral force alongside 'speak' and 'rebuke'.
- source_word: ἔλεγχε
  chosen: rebuke
  alternatives:
  - reprove
  - correct
  - convict
  lexicon: BDAG
  rationale: ἐλέγχω here denotes exposing wrong and correcting it. 'Rebuke' fits the
    imperative pastoral setting and is idiomatic in English, while still carrying
    corrective force.
- source_word: μετὰ πάσης ἐπιταγῆς
  chosen: with all authority
  alternatives:
  - with every command
  - with full authority
  - with all commanding force
  lexicon: BDAG
  rationale: ἐπιταγή can denote command, order, or authority. In this construction,
    the sense is not merely issuing commands but doing so with the full weight of
    delegated authority. 'With all authority' is natural English and captures the
    force of πάσης intensifying ἐπιταγῆς.
- source_word: μηδείς
  chosen: no one
  alternatives:
  - nobody
  - let no person
  lexicon: BDAG
  rationale: Indefinite negative subject in a prohibition. 'No one' is the standard
    clear English equivalent.
- source_word: σου
  chosen: you
  alternatives:
  - your person
  - you personally
  lexicon: BDAG
  rationale: Genitive pronoun dependent on περιφρονείτω, indicating the person being
    looked down on. English idiom expresses this simply as the object 'you'.
- source_word: περιφρονείτω
  chosen: disregard
  alternatives:
  - despise
  - look down on
  - treat with contempt
  lexicon: BDAG
  rationale: περιφρονέω means to think little of, despise, or disregard. 'Disregard'
    communicates the prohibition against dismissing Titus's ministry or authority
    without sounding archaic; the stronger alternative 'despise' is preserved in a
    footnote because it remains a viable lexical option.
