theological_decisions:
- issue: Scope of the first person plural in περὶ ἡμῶν
  chosen_reading: Rendered simply as 'about us' without narrowing the referent.
  alternative_readings:
  - about you
  - about us Christians
  - about our teaching
  rationale: Some English versions assimilate the pronoun to the immediate addressee
    or expand it to the Christian community. The Greek reads first person plural,
    and preserving that avoids importing a narrower or broader ecclesial claim than
    the text states.
  doctrine_reference: Translation philosophy §1, §3, §5
