theological_decisions:
- issue: Rendering δουλόω imagery in an ethical exhortation about wine
  chosen_reading: Retain bondage language with 'enslaved to much wine'
  alternative_readings:
  - addicted to much wine
  rationale: The verse uses slavery imagery to describe domination by wine. Following
    the translation philosophy's preference to preserve bonded/slave language where
    salient, 'enslaved' better reflects the Greek than the more interpretive 'addicted,'
    while remaining natural English.
