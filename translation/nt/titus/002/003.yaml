id: TIT.2.3
reference: Titus 2:3
source:
  edition: SBLGNT
  text: Πρεσβύτιδας ὡσαύτως ἐν καταστήματι ἱεροπρεπεῖς, μὴ διαβόλους ⸀μηδὲ οἴνῳ πολλῷ
    δεδουλωμένας, καλοδιδασκάλους,
translation:
  text: Older women likewise are to be reverent in behavior, not slanderers nor enslaved
    to much wine, teachers of what is good,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not false accusers' or 'not malicious gossips.' The Greek word here
      is related to the term often rendered 'devil,' but in this context it means
      slanderous people.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor addicted to much wine.' The Greek more literally says 'having been
      enslaved to much wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρεσβύτιδας
  chosen: Older women
  alternatives:
  - elder women
  - aged women
  lexicon: BDAG
  rationale: Accusative plural of πρεσβῦτις refers specifically to women advanced
    in age, parallel to the 'older men' of the preceding context. 'Older women' is
    natural modern English and preserves the age-specific reference without sounding
    archaic.
- source_word: ὡσαύτως
  chosen: likewise
  alternatives:
  - similarly
  - in the same way
  lexicon: BDAG
  rationale: Signals correspondence with the preceding exhortation. 'Likewise' is
    concise and preserves the discourse linkage.
- source_word: ἐν καταστήματι
  chosen: in behavior
  alternatives:
  - in demeanor
  - in conduct
  lexicon: BDAG
  rationale: The phrase refers to outward bearing or deportment. 'Behavior' is clear
    modern English and fits the ethical context better than the more wooden 'demeanor'
    or 'bearing'.
- source_word: ἱεροπρεπεῖς
  chosen: reverent
  alternatives:
  - befitting holiness
  - holy in demeanor
  lexicon: BDAG
  rationale: The adjective denotes what is fitting for the sacred or appropriate to
    holiness. 'Reverent' captures the sense idiomatically in English when paired with
    'in behavior.'
- source_word: μὴ διαβόλους
  chosen: not slanderers
  alternatives:
  - not malicious gossips
  - not false accusers
  lexicon: BDAG
  rationale: διάβολος here is adjectival/substantival in an ethical list, meaning
    slanderous persons rather than a reference to the devil. 'Slanderers' is the most
    direct and least interpretively expanded rendering.
- source_word: μηδὲ οἴνῳ πολλῷ δεδουλωμένας
  chosen: nor enslaved to much wine
  alternatives:
  - nor addicted to much wine
  - nor enslaved by much wine
  lexicon: BDAG
  rationale: The perfect passive participle of δουλόω literally means 'having been
    enslaved.' In keeping with the project's guidance on δοῦλος-word language, 'enslaved'
    preserves the bondage imagery better than the traditional but weaker 'addicted.'
    'To much wine' reflects the dative construction naturally in English.
- source_word: καλοδιδασκάλους
  chosen: teachers of what is good
  alternatives:
  - teaching what is good
  - good teachers
  lexicon: BDAG
  rationale: This rare adjective describes those who teach what is good. 'Teachers
    of what is good' makes the compound's sense explicit and avoids the ambiguity
    of 'good teachers,' which could describe teaching skill rather than content.
