id: TIT.2.10
reference: Titus 2:10
source:
  edition: SBLGNT
  text: μὴ νοσφιζομένους, ἀλλὰ ⸂πᾶσαν πίστιν⸃ ἐνδεικνυμένους ἀγαθήν, ἵνα τὴν διδασκαλίαν
    ⸀τὴν τοῦ σωτῆρος ἡμῶν θεοῦ κοσμῶσιν ἐν πᾶσιν.
translation:
  text: not stealing, but showing all good faith, so that in everything they may adorn
    the teaching of God our Savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'showing complete faithfulness' or 'demonstrating full trustworthiness.'
      The Greek uses pistis, often rendered 'faith,' but here it likely carries the
      ethical sense of fidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: νοσφιζομένους
  chosen: stealing
  alternatives:
  - pilfering
  - misappropriating
  - embezzling
  lexicon: BDAG
  rationale: In this household-slave context, the verb refers to taking for oneself
    what belongs to another. 'Stealing' is clear modern English; 'pilfering' is possible
    but less natural, and 'embezzling' is too specific.
- source_word: πᾶσαν πίστιν ἐνδεικνυμένους ἀγαθήν
  chosen: showing all good faith
  alternatives:
  - showing complete fidelity
  - demonstrating all good faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine, but here the contextual sense
    is reliability/fidelity in conduct. 'Showing all good faith' preserves the Greek
    wording while allowing the ethical sense to come through. The adjective ἀγαθήν
    qualifies the quality of the faith as good/genuine, and πᾶσαν intensifies it as
    comprehensive.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - faithfulness
  - fidelity
  - trustworthiness
  lexicon: BDAG
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith' in the main text, with alternatives
    preserved where context may suggest them. In this verse the sense leans toward
    fidelity/trustworthiness, so that alternative is preserved in a footnote.
- source_word: κοσμῶσιν
  chosen: may adorn
  alternatives:
  - may make attractive
  - may bring honor to
  lexicon: BDAG
  rationale: The verb literally conveys adorning or beautifying. 'Adorn' preserves
    the metaphor and is still understandable in modern English.
- source_word: διδασκαλίαν
  chosen: the teaching
  alternatives:
  - the doctrine
  - the instruction
  lexicon: BDAG
  rationale: '''Teaching'' is more accessible modern English than ''doctrine'' while
    accurately representing διδασκαλία.'
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  chosen: of God our Savior
  alternatives:
  - of our Savior God
  - of our saving God
  lexicon: BDAG
  rationale: The genitive phrase is most naturally rendered 'of God our Savior' in
    English. This preserves the common Pastoral Epistles title without importing a
    christological claim not explicit in this verse.
- source_word: ἐν πᾶσιν
  chosen: in everything
  alternatives:
  - in all things
  - in every way
  lexicon: BDAG
  rationale: '''In everything'' is natural modern English and captures the broad scope
    of conduct intended by the dative plural phrase.'
