theological_decisions:
- issue: Rendering πίστις in an ethical context
  chosen_reading: Main text keeps 'faith' in the phrase 'all good faith'
  alternative_readings:
  - faithfulness
  - fidelity
  - trustworthiness
  rationale: The doctrine file sets 'faith' as the default rendering for πίστις and
    instructs that alternatives be preserved in a footnote where contested. Because
    this context strongly suggests reliability toward masters, the alternative ethical
    sense is footnoted rather than moved into the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
- issue: Referent of 'God our Savior'
  chosen_reading: Rendered as 'God our Savior' without collapsing it into an explicit
    reference to Christ
  alternative_readings:
  - understanding the phrase within the broader Pastorals' soteriological language
    that also applies 'Savior' to Christ
  rationale: Historic orthodoxy is affirmed, but the translation should not import
    doctrinal claims beyond what this clause explicitly states. The verse itself speaks
    of 'God our Savior'; that wording is preserved straightforwardly.
  doctrine_reference: 'DOCTRINE.md: Affirmations; Translation philosophy #1 and #3'
