id: TIT.2.1
reference: Titus 2:1
source:
  edition: SBLGNT
  text: Σὺ δὲ λάλει ἃ πρέπει τῇ ὑγιαινούσῃ διδασκαλίᾳ.
translation:
  text: But as for you, speak the things that are fitting for sound teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound doctrine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and adds contrastive emphasis with δέ.
    English normally does not require an explicit emphatic form here, so 'you' is
    retained within the phrase 'as for you' to convey the contrast without overtranslation.
- source_word: δὲ
  chosen: But as for
  alternatives:
  - but
  - however
  - as for
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding false teachers. Rendering it with
    the combined phrase 'But as for' captures both adversative force and the topical
    contrast signaled by the explicit pronoun Σὺ.
- source_word: λάλει
  chosen: speak
  alternatives:
  - say
  - teach
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' or 'say.' 'Speak' is broad enough to preserve
    the verbal command without narrowing it to formal instruction alone, while still
    fitting the pastoral context.
- source_word: ἃ
  chosen: the things that
  alternatives:
  - what
  - the things which
  lexicon: BDAG
  rationale: The neuter plural relative pronoun introduces the content Titus is to
    speak. 'The things that' is natural English and preserves the plural sense better
    than the more compressed 'what.'
- source_word: πρέπει
  chosen: are fitting for
  alternatives:
  - are proper for
  - accord with
  - befit
  lexicon: BDAG
  rationale: πρέπω here denotes what is appropriate or suitable. 'Are fitting for'
    preserves the idea of propriety while sounding natural in modern English. 'Accord
    with' is possible, but 'fitting for' better reflects the semantic domain of suitability.
- source_word: ὑγιαινούσῃ
  chosen: sound
  alternatives:
  - healthy
  - wholesome
  lexicon: BDAG
  rationale: Used metaphorically with teaching, ὑγιαίνω denotes doctrinal soundness
    or health. 'Sound' is the established and still clear English equivalent in this
    idiom; 'healthy teaching' is possible but less idiomatic in English church discourse.
- source_word: διδασκαλίᾳ
  chosen: teaching
  alternatives:
  - doctrine
  - instruction
  lexicon: BDAG
  rationale: διδασκαλία can mean the act or content of teaching. 'Teaching' is preferred
    over 'doctrine' because it is more accessible modern English while still preserving
    the sense of authoritative instruction/content.
