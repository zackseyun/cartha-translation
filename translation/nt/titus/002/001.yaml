theological_decisions:
- issue: Rendering the phrase τῇ ὑγιαινούσῃ διδασκαλίᾳ
  chosen_reading: sound teaching
  alternative_readings:
  - sound doctrine
  - healthy teaching
  rationale: The phrase refers to doctrinally healthy apostolic instruction. 'Sound
    teaching' preserves the metaphor and theological force without relying on more
    technical ecclesiastical jargon. This does not reduce the doctrinal content; it
    expresses it in accessible English consistent with the project's philosophy.
  doctrine_reference: Translation philosophy §6; §5
