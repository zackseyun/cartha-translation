theological_decisions:
- issue: Force of ὑπὲρ ἡμῶν in Christ's self-giving
  chosen_reading: Rendered broadly as 'for us'
  alternative_readings:
  - on behalf of us
  - in our place
  rationale: The preposition can support benefactive and, in some contexts, substitutionary
    nuance. The translation preserves the text's redemptive significance without narrowing
    it to a single atonement formulation not explicitly spelled out by the verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Covenantal nuance of λαὸν περιούσιον
  chosen_reading: Rendered 'a people for his own possession'
  alternative_readings:
  - a special people
  - a treasured people
  rationale: This wording preserves the strong covenant-possession sense and likely
    echoes OT language about God's treasured people, while avoiding overly paraphrastic
    expansion.
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
