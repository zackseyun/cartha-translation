id: TIT.2.14
reference: Titus 2:14
source:
  edition: SBLGNT
  text: ὃς ἔδωκεν ἑαυτὸν ὑπὲρ ἡμῶν ἵνα λυτρώσηται ἡμᾶς ἀπὸ πάσης ἀνομίας καὶ καθαρίσῃ
    ἑαυτῷ λαὸν περιούσιον, ζηλωτὴν καλῶν ἔργων.
translation:
  text: who gave himself for us, so that he might redeem us from all lawlessness and
    purify for himself a people for his own possession, zealous for good works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a treasured people' or 'a special people.' The Greek 'a people for his
      own possession' preserves the covenantal sense of a people specially belonging
      to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν ἑαυτὸν
  chosen: gave himself
  alternatives:
  - gave up himself
  - gave himself up
  lexicon: BDAG
  rationale: The idiom denotes voluntary self-giving. 'Gave himself' is natural English
    and preserves the reflexive force without adding interpretive weight beyond the
    Greek.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on behalf of us
  - for our sake
  lexicon: BDAG
  rationale: ὑπέρ here most naturally expresses benefactive/substitutionary self-giving.
    'For us' is concise and preserves the theological breadth without over-specifying
    the atonement model in translation.
- source_word: ἵνα λυτρώσηται
  chosen: so that he might redeem
  alternatives:
  - so that he might ransom
  - so that he might set free
  lexicon: BDAG
  rationale: λυτρόομαι carries the sense of release by payment or deliverance. 'Redeem'
    best preserves the redemptive-theological resonance in accessible English.
- source_word: ἀπὸ πάσης ἀνομίας
  chosen: from all lawlessness
  alternatives:
  - from every lawless deed
  - from all wickedness
  lexicon: BDAG
  rationale: ἀνομία is more specifically 'lawlessness' than the broader 'wickedness.'
    The singular with πάσης is well represented by 'all lawlessness,' conveying the
    totality of what he redeems from.
- source_word: καθαρίσῃ
  chosen: purify
  alternatives:
  - cleanse
  lexicon: BDAG
  rationale: καθαρίζω can mean cleanse/purify. 'Purify' fits the moral-covenantal
    context of forming a holy people, while remaining readable.
- source_word: ἑαυτῷ
  chosen: for himself
  alternatives:
  - to himself
  lexicon: BDAG
  rationale: The dative indicates advantage or possession. 'For himself' clearly conveys
    that the purified people belong to him.
- source_word: λαὸν περιούσιον
  chosen: a people for his own possession
  alternatives:
  - a treasured people
  - a people of his own
  - a special people
  lexicon: BDAG
  rationale: περιούσιος echoes covenant language from the Greek Old Testament for
    a specially possessed people. 'A people for his own possession' preserves that
    covenantal nuance more transparently than the vaguer 'special people.'
- source_word: ζηλωτὴν καλῶν ἔργων
  chosen: zealous for good works
  alternatives:
  - eager for good deeds
  - devoted to good works
  lexicon: BDAG
  rationale: ζηλωτής here describes eager commitment. 'Zealous for good works' is
    both close to the Greek and idiomatic, and it preserves the ethical emphasis of
    the passage.
