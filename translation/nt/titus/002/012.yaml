theological_decisions:
- issue: Ethical triad σωφρόνως καὶ δικαίως καὶ εὐσεβῶς
  chosen_reading: rendered as 'self-controlled and righteous and godly lives'
  alternative_readings:
  - '''sensibly and justly and godly'''
  - '''with self-control and righteousness and godliness'''
  rationale: The Greek uses three adverbs modifying 'live.' In English, a strictly
    formal sequence of adverbs ('self-controlledly') is awkward. The translation preserves
    the threefold ethical pattern by expressing them as qualities of the life believers
    are to live. This is an optimal-equivalence adjustment for readability without
    loss of meaning.
  doctrine_reference: Translation philosophy §6; §5
