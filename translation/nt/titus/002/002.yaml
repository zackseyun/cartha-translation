id: TIT.2.2
reference: Titus 2:2
source:
  edition: SBLGNT
  text: πρεσβύτας νηφαλίους εἶναι, σεμνούς, σώφρονας, ὑγιαίνοντας τῇ πίστει, τῇ ἀγάπῃ,
    τῇ ὑπομονῇ.
translation:
  text: Older men are to be temperate, dignified, self-controlled, sound in faith,
    in love, and in steadfastness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound in faithfulness.' The Greek πίστις can mean either 'faith' or
      'faithfulness' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: πρεσβύτας
  chosen: older men
  alternatives:
  - elder men
  - aged men
  lexicon: BDAG
  rationale: Accusative plural of πρεσβύτης in a household-instruction context refers
    to men advanced in age rather than the church office of elders. 'Older men' is
    natural modern English and preserves the gendered reference.
- source_word: νηφαλίους
  chosen: temperate
  alternatives:
  - sober
  - clear-headed
  lexicon: BDAG
  rationale: The adjective can denote sobriety and by extension self-restraint. 'Temperate'
    captures the broader ethical sense without limiting it only to abstinence from
    wine, while remaining concise in a virtue list.
- source_word: σεμνούς
  chosen: dignified
  alternatives:
  - worthy of respect
  - serious
  lexicon: BDAG
  rationale: The term denotes a seriousness or nobility that invites respect. 'Dignified'
    is idiomatic and avoids the potentially misleading English 'serious' as merely
    somber.
- source_word: σώφρονας
  chosen: self-controlled
  alternatives:
  - sensible
  - prudent
  lexicon: BDAG
  rationale: A key ethical term in Titus, conveying disciplined judgment and mastery
    of oneself. 'Self-controlled' is the clearest modern rendering and fits the virtue
    sequence.
- source_word: ὑγιαίνοντας
  chosen: sound
  alternatives:
  - healthy
  - healthy-minded
  lexicon: BDAG
  rationale: Literally 'being healthy/sound.' In the Pastorals it often carries a
    figurative sense of doctrinal or moral soundness. Here, with datives naming core
    Christian virtues, 'sound' preserves the metaphor naturally in English.
- source_word: τῇ πίστει
  chosen: in faith
  alternatives:
  - in the faith
  - in faithfulness
  - in trust
  lexicon: BDAG
  rationale: Following the project's default for πίστις, the main text uses 'faith.'
    The article is rendered idiomatically without 'the' because English virtue lists
    normally omit it here. Since πίστις can also mean 'faithfulness,' that alternative
    is preserved in a footnote.
- source_word: τῇ ἀγάπῃ
  chosen: in love
  alternatives: []
  lexicon: BDAG
  rationale: The project's default rendering for ἀγάπη is 'love.' The dative is governed
    by the participle and rendered with 'in' for smooth English parallelism.
- source_word: τῇ ὑπομονῇ
  chosen: in steadfastness
  alternatives:
  - in endurance
  - in perseverance
  lexicon: BDAG
  rationale: Ὑπομονή denotes patient endurance under difficulty. 'Steadfastness' communicates
    enduring constancy and pairs well with 'faith' and 'love' in a virtue triad.
- source_word: εἶναι
  chosen: are to be
  alternatives:
  - to be
  lexicon: BDAG
  rationale: The infinitive depends on the implied exhortation from the previous verse.
    'Are to be' makes the instructional force explicit in natural English.
