theological_decisions:
- issue: Meaning of πίστις in a virtue list
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith' in the main text, while preserving
    alternatives in a footnote where context allows more than one nuance. In this
    triad ('faith, love, steadfastness'), either trust/belief or faithfulness is possible,
    but the project default governs the main rendering.
