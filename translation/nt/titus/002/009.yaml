theological_decisions:
- issue: Rendering δοῦλος in a household-code context
  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: The verse addresses persons in actual subordination to δεσπόταις. Following
    the doctrine guideline for δοῦλος, the bonded nature is salient here, so 'slaves'
    is preferred over the softer 'servants.' This reflects the social reality of the
    text without endorsing the institution.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος = servant / slave (context-dependent);
    use ''slave'' where the bonded nature is salient'
