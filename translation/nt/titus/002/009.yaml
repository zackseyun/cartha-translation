id: TIT.2.9
reference: Titus 2:9
source:
  edition: SBLGNT
  text: Δούλους ἰδίοις δεσπόταις ὑποτάσσεσθαι ἐν πᾶσιν, εὐαρέστους εἶναι, μὴ ἀντιλέγοντας,
translation:
  text: Slaves are to submit to their own masters in everything, to be pleasing, not
    argumentative,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants'; Greek doulous can denote those in service,
      but here the bonded status is likely in view.
    reason: alternative_reading
  - marker: b
    text: Or 'not talking back' or 'not contradicting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δούλους
  chosen: Slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave, but here it refers to persons under
    the authority of δεσπόταις ('masters'). In keeping with the project's guidance,
    'slaves' best preserves the bonded social reality rather than softening it to
    'servants.'
- source_word: ἰδίοις δεσπόταις
  chosen: their own masters
  alternatives:
  - their own owners
  - their own lords
  lexicon: BDAG
  rationale: δεσπότης denotes one who exercises ownership/absolute authority; in this
    household-code context 'masters' is the most natural English rendering. ἰδίοις
    is retained as 'their own' to reflect the possessive specificity of the relationship.
- source_word: ὑποτάσσεσθαι
  chosen: are to submit
  alternatives:
  - to be subject
  - to subordinate themselves
  lexicon: BDAG
  rationale: The present middle/passive infinitive expresses the expected posture
    of ordered subordination. 'Are to submit' communicates the paraenetic force in
    natural English without over-literal awkwardness.
- source_word: ἐν πᾶσιν
  chosen: in everything
  alternatives:
  - in all things
  - in every respect
  lexicon: BDAG
  rationale: A broad comprehensive phrase modifying the submission; 'in everything'
    is idiomatic modern English and preserves the scope of πᾶσιν.
- source_word: εὐαρέστους εἶναι
  chosen: to be pleasing
  alternatives:
  - to be well-pleasing
  - to be acceptable
  lexicon: BDAG
  rationale: εὐάρεστος means pleasing or acceptable. 'To be pleasing' is clear contemporary
    English and fits the infinitival series of expected conduct.
- source_word: μὴ ἀντιλέγοντας
  chosen: not argumentative
  alternatives:
  - not talking back
  - not contradicting
  - not opposing
  lexicon: BDAG
  rationale: ἀντιλέγω can mean speak against, contradict, or oppose. In this social
    setting it likely refers to verbal resistance or backtalk. 'Not argumentative'
    captures the behavioral sense in concise modern English, though 'not talking back'
    is a viable more colloquial alternative.
