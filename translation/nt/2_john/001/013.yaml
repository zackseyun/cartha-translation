theological_decisions:
- issue: Whether ἐκλεκτῆς should be rendered as the adjective 'chosen' or the traditional/theologically
    freighted 'elect'
  chosen_reading: chosen
  alternative_readings:
  - elect
  rationale: The adjective is semantically straightforward. 'Chosen' communicates
    the meaning in readable modern English and aligns with the project's preference
    for accessibility without flattening theological weight. Because 'elect' is a
    traditional rendering and may be heard with theological overtones, it is preserved
    in a footnote rather than used in the main text.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather
    than resolve it where ambiguity matters
- issue: Whether 'your sister' refers literally to a woman or metaphorically to a
    sister congregation
  chosen_reading: Retain the literal familial wording in the main text without interpretive
    expansion
  alternative_readings:
  - your sister congregation
  - the church personified as your sister
  rationale: The Greek text itself uses kinship language and does not explicitly identify
    the referent as a congregation here. To avoid importing an interpretive conclusion
    into the translation, the main text preserves the source wording. The likely ecclesial
    sense can be noted in a footnote.
  doctrine_reference: Translation philosophy §1; §3
