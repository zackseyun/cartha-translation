id: 2JN.1.13
reference: 2 John 1:13
source:
  edition: SBLGNT
  text: Ἀσπάζεταί σε τὰ τέκνα τῆς ἀδελφῆς σου τῆς ⸀ἐκλεκτῆς.
translation:
  text: The children of your chosen sister greet you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elect sister.' The Greek adjective can be rendered 'chosen' or, more
      traditionally, 'elect.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'your chosen sister' may refer either to a literal sister or,
      more likely in the letter's personified language, to a sister congregation.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀσπάζεταί
  chosen: greet
  alternatives:
  - send greetings to
  - gives greetings to
  lexicon: BDAG
  rationale: The verb ἀσπάζομαι commonly means to greet or send greetings. In epistolary
    closing formulae, idiomatic English prefers 'greet you' or 'send greetings to
    you.' 'Greet you' is concise and natural while preserving the direct personal
    address.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Second person singular accusative object of the greeting verb; rendered
    straightforwardly as 'you.'
- source_word: τὰ τέκνα
  chosen: The children
  alternatives:
  - The sons and daughters
  - The offspring
  lexicon: BDAG
  rationale: τέκνα is a broad kinship term meaning children, not specifically sons.
    'The children' is the most natural and accurate English rendering.
- source_word: τῆς ἀδελφῆς σου
  chosen: of your ... sister
  alternatives:
  - of your sister
  lexicon: BDAG
  rationale: Genitive construction identifying whose children these are. ἀδελφή is
    literally 'sister.' Given the likely personified-church context in 2 John, the
    translation still preserves the familial metaphor/literal wording rather than
    interpreting it in the main text.
- source_word: τῆς ἐκλεκτῆς
  chosen: chosen
  alternatives:
  - elect
  lexicon: BDAG
  rationale: ἐκλεκτός means chosen/elect. 'Chosen' is preferred in the main text because
    it is clear, contemporary English and avoids unnecessary ecclesiastical jargon,
    while still preserving the semantic force. The alternative 'elect' is worth preserving
    because of its familiarity in translation tradition and possible titular force
    in this letter.
