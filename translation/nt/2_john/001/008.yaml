id: 2JN.1.8
reference: 2 John 1:8
source:
  edition: SBLGNT
  text: βλέπετε ἑαυτούς, ἵνα μὴ ⸀ἀπολέσητε ἃ ⸀εἰργασάμεθα, ἀλλὰ μισθὸν πλήρη ⸀ἀπολάβητε.
translation:
  text: Watch yourselves, so that you may not lose what we have worked for, but may
    receive a full reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'what you have worked for' instead of 'what we have
      worked for.'
    reason: textual_variant
lexical_decisions:
- source_word: βλέπετε
  chosen: Watch
  alternatives:
  - Look to
  - Be on guard
  lexicon: BDAG
  rationale: Present imperative plural calls for ongoing vigilance. 'Watch' is concise,
    natural English that preserves the warning force better than the more wooden 'look
    to' while avoiding over-interpretive expansion.
- source_word: ἑαυτούς
  chosen: yourselves
  alternatives:
  - ourselves
  lexicon: BDAG
  rationale: 'Reflexive pronoun in the accusative plural naturally pairs with the
    imperative: ''watch yourselves.'' This follows the direct sense of the Greek and
    keeps the warning addressed to the readers.'
- source_word: ἵνα μὴ ἀπολέσητε
  chosen: so that you may not lose
  alternatives:
  - lest you lose
  - so that you may not destroy
  lexicon: BDAG
  rationale: With ἵνα + aorist subjunctive, the clause expresses purpose/result to
    be avoided. For ἀπόλλυμι in this context, 'lose' fits the idiom of forfeiting
    what has been gained, whereas 'destroy' would sound too strong and misleading
    in English.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  lexicon: BDAG
  rationale: Neuter plural relative pronoun referring to the results of prior labor.
    'What' gives idiomatic English without loss of meaning.
- source_word: εἰργασάμεθα
  chosen: we have worked for
  alternatives:
  - we worked for
  - we accomplished
  - you have worked for
  lexicon: BDAG
  rationale: The perfect/middle form points to labor with abiding result. 'We have
    worked for' preserves the manuscript reading reflected in the provided Greek text
    and communicates completed labor whose fruit remains in view. 'Worked for' fits
    the following reward language.
- source_word: μισθὸν
  chosen: reward
  alternatives:
  - wages
  - pay
  lexicon: BDAG
  rationale: μισθός can denote wages or reward; in this exhortational and spiritual
    context, 'reward' is the most natural and least misleading English choice.
- source_word: πλήρη
  chosen: full
  alternatives:
  - complete
  - in full
  lexicon: BDAG
  rationale: πλήρης modifies μισθόν and emphasizes completeness. 'Full reward' is
    idiomatic English and preserves the sense without awkwardness.
- source_word: ἀπολάβητε
  chosen: may receive
  alternatives:
  - may obtain
  - may receive back
  lexicon: BDAG
  rationale: Aorist subjunctive parallel to ἀπολέσητε. 'Receive' is clear and idiomatic.
    Although ἀπολαμβάνω can sometimes suggest receiving back, that nuance is not explicit
    enough here to force 'receive back' into the main text.
