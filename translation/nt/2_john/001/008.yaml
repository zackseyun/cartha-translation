theological_decisions:
- issue: Subject of εἰργασάμεθα
  chosen_reading: we have worked for
  alternative_readings:
  - you have worked for
  rationale: The supplied SBLGNT text reads first person plural εἰργασάμεθα. This
    yields the sense that the readers are warned not to lose what the apostolic workers
    have labored for among them. A well-known variant reads second person plural ('you
    have worked for'), which shifts the focus to the readers' own labor. Because the
    base text provided is first person, that reading is retained in the main text
    and the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension where ambiguity is genuine)
