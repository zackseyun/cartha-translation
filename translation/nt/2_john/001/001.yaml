id: 2JN.1.1
reference: 2 John 1:1
source:
  edition: SBLGNT
  text: Ὁ πρεσβύτερος ἐκλεκτῇ κυρίᾳ καὶ τοῖς τέκνοις αὐτῆς, οὓς ἐγὼ ἀγαπῶ ἐν ἀληθείᾳ,
    καὶ οὐκ ἐγὼ μόνος ἀλλὰ καὶ πάντες οἱ ἐγνωκότες τὴν ἀλήθειαν,
translation:
  text: The elder, to the chosen lady and her children, whom I love in truth—and not
    I alone, but also all who have come to know the truth—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'to the elect lady'; some understand 'lady' metaphorically as
      a local church, and some take 'Kyria' as a personal name.
    reason: alternative_reading
  - marker: b
    text: Or 'truly'; the phrase may also carry the Johannine sense 'in the truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ πρεσβύτερος
  chosen: The elder
  alternatives:
  - The presbyter
  - The old man
  lexicon: BDAG
  rationale: As a self-designation in the letter opening, πρεσβύτερος most naturally
    functions as a title or office-like descriptor rather than merely an age reference.
    'The elder' is idiomatic modern English and preserves the ambiguity between age,
    status, and recognized leadership better than 'presbyter,' which is more technical
    and ecclesiastically loaded.
- source_word: ἐκλεκτῇ
  chosen: chosen
  alternatives:
  - elect
  lexicon: BDAG
  rationale: '''Chosen'' is the natural modern English equivalent of ἐκλεκτός. ''Elect''
    is possible and traditional, but sounds more theological and less natural in contemporary
    English. The adjective may describe either a literal woman or metaphorically a
    church personified as a lady; ''chosen'' preserves either reading.'
- source_word: κυρίᾳ
  chosen: lady
  alternatives:
  - mistress
  - Lady (as a proper name)
  lexicon: BDAG
  rationale: κυρία ordinarily means 'lady' or 'mistress.' 'Lady' is the best idiomatic
    rendering in this epistolary address. Because some interpreters take Κυρία as
    a proper name ('Kyria'), that alternative is preserved in a footnote rather than
    adopted in the main text, since the common noun sense is the plain lexical value.
- source_word: τοῖς τέκνοις αὐτῆς
  chosen: her children
  alternatives:
  - her sons
  - its children
  lexicon: BDAG
  rationale: τέκνα denotes children generally, not specifically sons. 'Her children'
    fits the surface grammar if the addressee is an individual woman; it also works
    naturally if the phrase is metaphorical for members of a congregation. 'Its children'
    would prematurely resolve the metaphorical-church interpretation and is therefore
    avoided in the main text.
- source_word: οὓς
  chosen: whom
  alternatives:
  - which
  lexicon: BDAG
  rationale: The masculine plural relative pronoun creates a mismatch with the feminine
    singular 'lady' plus neuter plural 'children.' In context it most naturally refers
    to the children, or to the addressee group as persons. English 'whom' preserves
    the personal reference without forcing a more explicit restructuring.
- source_word: ἀγαπῶ
  chosen: love
  alternatives:
  - dearly love
  lexicon: BDAG
  rationale: ἀγαπάω is best rendered with the standard gloss 'love,' consistent with
    the project's treatment of ἀγάπη cognates. No intensifying adverb is warranted
    by the Greek.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - in the truth
  lexicon: BDAG
  rationale: The phrase can mean either sincerity ('truly') or sphere/standard ('in
    the truth'), and Johannine usage often carries theological resonance with 'the
    truth.' 'In truth' preserves both the adverbial sense and the Johannine theological
    nuance without over-interpreting.
- source_word: οὐκ ἐγὼ μόνος ἀλλὰ καὶ πάντες
  chosen: and not I alone, but also all
  alternatives:
  - and not only I, but also all
  lexicon: BDAG
  rationale: This rendering follows the Greek emphasis naturally in English while
    preserving the contrast between the writer and the wider community of believers.
- source_word: οἱ ἐγνωκότες
  chosen: who have come to know
  alternatives:
  - who know
  - who have known
  lexicon: BDAG
  rationale: The perfect participle of γινώσκω indicates a present state resulting
    from prior coming-to-know. 'Have come to know' captures that aspect better than
    the flatter 'know,' while remaining readable.
- source_word: τὴν ἀλήθειαν
  chosen: the truth
  lexicon: BDAG
  rationale: In Johannine literature, ἀλήθεια often bears both ordinary and theological
    force. 'The truth' preserves that resonance and matches the repeated term in the
    verse.
