theological_decisions:
- issue: Identity of ἐκλεκτῇ κυρίᾳ
  chosen_reading: Rendered as a literal-seeming address, 'the chosen lady,' while
    leaving open the possibility that it metaphorically refers to a local church.
  alternative_readings:
  - a specific Christian woman and her children
  - a personification of a congregation and its members
  - '''Kyria'' as a proper personal name'
  rationale: The Greek permits either an individual woman or a church personified
    as a lady. The translation should preserve this ambiguity rather than resolve
    it. The common noun sense of κυρία is retained in the main text, with the proper-name
    possibility preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Sense of ἐν ἀληθείᾳ
  chosen_reading: Rendered 'in truth' to preserve both sincerity and Johannine theological
    resonance.
  alternative_readings:
  - truly
  - in the truth
  rationale: John's usage of 'truth' often carries layered meaning. A more interpretive
    rendering like 'truly' would lose the theological echo, while 'in the truth' may
    over-specify the article absent in Greek. 'In truth' best preserves the tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
