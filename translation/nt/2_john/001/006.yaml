id: 2JN.1.6
reference: 2 John 1:6
source:
  edition: SBLGNT
  text: καὶ αὕτη ἐστὶν ἡ ἀγάπη, ἵνα περιπατῶμεν κατὰ τὰς ἐντολὰς αὐτοῦ· αὕτη ⸂ἡ ἐντολή
    ἐστιν⸃, καθὼς ἠκούσατε ἀπ’ ἀρχῆς, ἵνα ἐν αὐτῇ περιπατῆτε.
translation:
  text: 'And this is love: that we walk according to his commandments. This is the
    commandment, just as you heard from the beginning, that you should walk in it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that you should walk in love'; the pronoun 'it' may refer to 'love'
      rather than to 'the commandment.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the natural
    modern English equivalent and preserves the lexical link with the surrounding
    Johannine usage.
- source_word: ἵνα περιπατῶμεν
  chosen: that we walk
  alternatives:
  - so that we may walk
  - that we should walk
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/explanation of what love is in practice.
    'That we walk' is idiomatic and sufficiently formal, preserving the purpose/result
    nuance without overtranslating.
- source_word: περιπατέω
  chosen: walk
  alternatives:
  - live
  - conduct our lives
  lexicon: BDAG
  rationale: Johannine ethical metaphor is best preserved as 'walk' rather than flattened
    to 'live.' This keeps the repeated verbal imagery in both clauses.
- source_word: κατὰ τὰς ἐντολὰς αὐτοῦ
  chosen: according to his commandments
  alternatives:
  - in accordance with his commands
  - by his commandments
  lexicon: BDAG
  rationale: κατά with the accusative here conveys conformity or accordance. 'According
    to his commandments' is clear, natural, and preserves the plural ἐντολάς.
- source_word: ἐντολάς
  chosen: commandments
  alternatives:
  - commands
  lexicon: BDAG
  rationale: Rendered 'commandments' to preserve the lexical connection with the singular
    ἐντολή later in the verse and with Johannine diction.
- source_word: αὕτη ἡ ἐντολή ἐστιν
  chosen: This is the commandment
  alternatives:
  - This is his commandment
  - This is the command
  lexicon: BDAG
  rationale: The Greek lacks an explicit possessive in this clause, so the more literal
    'the commandment' is preferred. It also preserves the shift from plural 'commandments'
    to singular 'commandment,' which is rhetorically significant in context.
- source_word: καθὼς ἠκούσατε ἀπ’ ἀρχῆς
  chosen: just as you heard from the beginning
  alternatives:
  - as you have heard from the beginning
  - just as you heard from the start
  lexicon: BDAG
  rationale: Aorist ἠκούσατε is naturally rendered 'heard.' 'From the beginning' reflects
    Johannine idiom and should be preserved rather than paraphrased.
- source_word: ἵνα ἐν αὐτῇ περιπατῆτε
  chosen: that you should walk in it
  alternatives:
  - so that you may walk in it
  - that you walk in it
  lexicon: BDAG
  rationale: The feminine pronoun αὐτῇ most naturally refers back to the singular
    ἐντολή. 'Walk in it' preserves the metaphor and the prepositional phrase ἐν αὐτῇ
    without interpretive expansion.
