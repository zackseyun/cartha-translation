theological_decisions:
- issue: Referent of αὐτῇ in the final clause
  chosen_reading: Refers to the singular 'commandment' immediately preceding
  alternative_readings:
  - Refers more broadly to 'love' in the first clause
  rationale: The nearest grammatical antecedent is the feminine singular ἐντολή, and
    the sentence structure presents the commandment as what was heard from the beginning,
    in which the readers are to walk. Because 'love' is also feminine singular and
    conceptually linked, the alternative is worth preserving in a footnote rather
    than being resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
