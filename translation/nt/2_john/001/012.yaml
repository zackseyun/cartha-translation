theological_decisions:
- issue: Pronoun variant affecting whose joy is in view
  chosen_reading: your joy
  alternative_readings:
  - our joy
  rationale: The base text provided (SBLGNT) reads ὑμῶν, and the translation follows
    that reading in the main text. Because the variant has interpretive significance
    and is reflected in some translation traditions, the alternative is preserved
    in a footnote rather than silently excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
