id: 2JN.1.12
reference: 2 John 1:12
source:
  edition: SBLGNT
  text: Πολλὰ ἔχων ὑμῖν γράφειν οὐκ ἐβουλήθην διὰ χάρτου καὶ μέλανος, ἀλλὰ ἐλπίζω
    ⸀γενέσθαι πρὸς ὑμᾶς καὶ στόμα πρὸς στόμα λαλῆσαι, ἵνα ἡ χαρὰ ⸀ὑμῶν ⸂πεπληρωμένη
    ᾖ⸃.
translation:
  text: Though I have many things to write to you, I did not want to do so by paper
    and ink. Instead, I hope to come to you and speak face to face, so that your joy
    may be made complete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'our joy' instead of 'your joy.'
    reason: textual_variant
lexical_decisions:
- source_word: Πολλὰ ἔχων
  chosen: Though I have many things
  alternatives:
  - Having many things
  - Although I have much
  lexicon: BDAG
  rationale: The participial construction introduces a concessive circumstance in
    natural English. 'Many things' preserves the plural neuter Πολλά better than the
    more idiomatic but less formally precise 'much.'
- source_word: ὑμῖν γράφειν
  chosen: to write to you
  alternatives:
  - to write you
  lexicon: BDAG
  rationale: Standard English expression for the infinitive phrase; preserves the
    dative recipient sense of ὑμῖν.
- source_word: οὐκ ἐβουλήθην
  chosen: I did not want
  alternatives:
  - I was not willing
  - I did not wish
  lexicon: BDAG
  rationale: βούλομαι expresses volition or desire. 'Did not want' is clear modern
    English and fits the epistolary tone without sounding overly stiff.
- source_word: διὰ χάρτου καὶ μέλανος
  chosen: by paper and ink
  alternatives:
  - with paper and ink
  - by means of paper and ink
  lexicon: BDAG
  rationale: διά with the genitive indicates means/instrument. 'Paper and ink' is
    the plain sense; 'paper' is preferable to archaic 'papyrus' here for readability.
- source_word: ἀλλὰ ἐλπίζω γενέσθαι πρὸς ὑμᾶς
  chosen: Instead, I hope to come to you
  alternatives:
  - But I hope to be with you
  - But I hope to visit you
  lexicon: BDAG
  rationale: γενέσθαι πρὸς ὑμᾶς is idiomatic for coming/becoming present with someone.
    'Come to you' is a natural rendering that preserves the directional force of πρός.
- source_word: στόμα πρὸς στόμα
  chosen: face to face
  alternatives:
  - mouth to mouth
  lexicon: BDAG
  rationale: The idiom denotes direct personal conversation. 'Face to face' communicates
    the sense in contemporary English; a more literal 'mouth to mouth' would be misleading
    in modern usage.
- source_word: λαλῆσαι
  chosen: speak
  alternatives:
  - talk
  lexicon: BDAG
  rationale: λαλέω here refers to personal verbal communication. 'Speak' is slightly
    more formal and suits the tone of the letter.
- source_word: ἵνα ἡ χαρὰ ὑμῶν πεπληρωμένη ᾖ
  chosen: so that your joy may be made complete
  alternatives:
  - so that your joy may be full
  - so that our joy may be made complete
  lexicon: BDAG
  rationale: The purpose clause is preserved with 'so that.' πεπληρωμένη ᾖ conveys
    a resulting state of fullness/completion; 'made complete' reflects the perfect
    participle plus subjunctive well. The SBLGNT reads ὑμῶν ('your'), though some
    witnesses read ἡμῶν ('our'), which is preserved in a footnote.
