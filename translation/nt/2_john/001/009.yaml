theological_decisions:
- issue: Sense of προάγων in this textual form
  chosen_reading: Rendered as 'goes on ahead' rather than an explicitly condemnatory
    paraphrase such as 'goes too far' or the variant-based 'transgresses.'
  alternative_readings:
  - runs ahead
  - goes too far
  - transgresses
  rationale: The SBLGNT text reads προάγων, not παραβαίνων. The chosen rendering preserves
    the metaphor of moving beyond the bounds of true teaching without importing a
    stronger interpretive gloss into the main text. Because the context is polemical,
    an explanatory alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Meaning of 'the teaching of the Messiah'
  chosen_reading: Kept the genitive compact as 'the teaching of the Messiah' rather
    than resolving it to either 'the Messiah's teaching' or 'teaching about the Messiah.'
  alternative_readings:
  - the Messiah's teaching
  - teaching about the Messiah
  rationale: The Greek genitive permits more than one nuance, and Johannine theology
    can support both the content concerning the Son and the teaching that comes from
    him. The translation preserves this tension rather than resolving it.
  doctrine_reference: Translation philosophy §3
- issue: Christological title Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where it functions
    as a title. Here the genitive follows an article-noun construction and is best
    understood as titular rather than name-like.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
