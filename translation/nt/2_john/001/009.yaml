id: 2JN.1.9
reference: 2 John 1:9
source:
  edition: SBLGNT
  text: πᾶς ὁ ⸀προάγων καὶ μὴ μένων ἐν τῇ διδαχῇ τοῦ Χριστοῦ θεὸν οὐκ ἔχει· ὁ μένων
    ἐν τῇ ⸀διδαχῇ, οὗτος καὶ τὸν πατέρα καὶ τὸν υἱὸν ἔχει.
translation:
  text: Everyone who goes on ahead and does not remain in the teaching of the Messiah
    does not have God. The one who remains in the teaching, this one has both the
    Father and the Son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goes too far' or 'runs ahead'; some manuscripts read 'transgresses'
      instead of 'goes on ahead.'
    reason: textual_variant
  - marker: b
    text: The phrase 'the teaching of the Messiah' may mean either 'the Messiah's
      teaching' or 'teaching about the Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ προάγων
  chosen: Everyone who goes on ahead
  alternatives:
  - Everyone who runs ahead
  - Anyone who goes too far
  - Everyone who transgresses
  lexicon: BDAG
  rationale: πᾶς with the articular participle gives a generic substantive sense,
    'everyone who...'. προάγων literally means 'going ahead' or 'going before.' Here
    it likely carries the negative sense of advancing beyond apostolic teaching. 'Goes
    on ahead' preserves the metaphor without over-interpreting it as either 'runs
    ahead' or the later textual variant sense 'transgresses.'
- source_word: μὴ μένων
  chosen: does not remain
  alternatives:
  - does not abide
  - does not continue
  lexicon: BDAG
  rationale: μένω is a key Johannine verb meaning remain/abide/stay. 'Remain' is modern
    and readable while preserving Johannine continuity better than 'continue' and
    avoiding the slightly archaic feel of 'abide.'
- source_word: ἐν τῇ διδαχῇ
  chosen: in the teaching
  alternatives:
  - in the doctrine
  - in the teaching [of Christ/Messiah]
  lexicon: BDAG
  rationale: διδαχή is best rendered 'teaching' in accessible modern English. 'Doctrine'
    is possible but more ecclesiastical. The repeated phrase is kept consistent in
    both clauses.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  - about the Messiah
  lexicon: BDAG
  rationale: Per project policy, Χριστός as a title is rendered 'Messiah' rather than
    'Christ.' The genitive could be construed as subjective or objective ('the Messiah's
    teaching' or 'teaching about the Messiah'); 'of the Messiah' preserves the Greek
    compactly without forcing one interpretation in the main text.
- source_word: θεὸν οὐκ ἔχει
  chosen: does not have God
  alternatives:
  - does not possess God
  - does not have fellowship with God
  lexicon: BDAG
  rationale: ἔχει with θεόν is rendered straightforwardly as 'has God.' Expanding
    to 'has fellowship with God' interprets the idiom beyond the wording. The stark
    Johannine formulation is preserved.
- source_word: ὁ μένων ἐν τῇ διδαχῇ
  chosen: The one who remains in the teaching
  alternatives:
  - Whoever remains in the teaching
  - The one abiding in the teaching
  lexicon: BDAG
  rationale: The articular participle is rendered substantivally. Repeating 'remains
    in the teaching' preserves the parallelism with the first clause.
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - that person
  lexicon: BDAG
  rationale: οὗτος is emphatic. Rendering it as 'this one' preserves the emphasis
    better than simply 'he,' while remaining natural enough in English in this solemn
    context.
- source_word: καὶ τὸν πατέρα καὶ τὸν υἱὸν ἔχει
  chosen: has both the Father and the Son
  alternatives:
  - has the Father and the Son also
  - has even the Father and the Son
  lexicon: BDAG
  rationale: The correlative καὶ...καὶ is naturally rendered 'both...and.' Retaining
    the personal titles 'the Father' and 'the Son' preserves the verse's explicit
    binitarian confession.
