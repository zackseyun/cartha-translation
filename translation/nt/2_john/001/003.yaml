id: 2JN.1.3
reference: 2 John 1:3
source:
  edition: SBLGNT
  text: ἔσται μεθ’ ἡμῶν χάρις ἔλεος εἰρήνη παρὰ θεοῦ πατρός, καὶ ⸀παρὰ Ἰησοῦ Χριστοῦ
    τοῦ υἱοῦ τοῦ πατρός, ἐν ἀληθείᾳ καὶ ἀγάπῃ.
translation:
  text: Grace, mercy, and peace will be with us from God the Father and from Jesus
    Messiah, the Father's Son, in truth and love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Jesus Christ.' The Greek title Χριστός can be transliterated 'Christ';
      here it is rendered 'Messiah' to preserve its title sense.
    reason: alternative_reading
  - marker: b
    text: Or 'the Son of the Father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  chosen: will be
  alternatives:
  - is
  - may be
  lexicon: BDAG
  rationale: Future indicative of εἰμί is best rendered straightforwardly as 'will
    be.' Some translations use 'be' in a benedictory sense, but the form is indicative
    rather than optative/imperative.
- source_word: μεθ’ ἡμῶν
  chosen: with us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: μετά with the genitive commonly means 'with.' 'With us' fits the epistolary
    blessing context better than 'among us.'
- source_word: χάρις ἔλεος εἰρήνη
  chosen: Grace, mercy, and peace
  lexicon: BDAG
  rationale: These three nominatives function as the subjects of ἔσται in a standard
    epistolary blessing formula. The traditional sequence is retained because it reflects
    the Greek directly and is natural English.
- source_word: παρὰ θεοῦ πατρός
  chosen: from God the Father
  alternatives:
  - from God, the Father
  - from God our Father
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, so 'from' is appropriate. No
    possessive 'our' appears in the Greek, so it is not supplied.
- source_word: παρὰ Ἰησοῦ Χριστοῦ
  chosen: from Jesus Messiah
  alternatives:
  - from Jesus Christ
  lexicon: BDAG
  rationale: παρά again indicates source. Χριστοῦ is a christological title; per project
    policy, titles are translated where context supports, so 'Messiah' is preferred
    over the traditional transliteration 'Christ.'
- source_word: τοῦ υἱοῦ τοῦ πατρός
  chosen: the Father's Son
  alternatives:
  - the Son of the Father
  lexicon: BDAG
  rationale: Both are accurate. 'The Father's Son' is chosen for readable modern English
    while preserving the definite relational force of the Greek. It also keeps the
    close apposition to Jesus Messiah explicit.
- source_word: ἐν ἀληθείᾳ καὶ ἀγάπῃ
  chosen: in truth and love
  alternatives:
  - with truth and love
  - in the truth and love
  lexicon: BDAG
  rationale: ἐν with the dative is naturally rendered 'in.' The anarthrous nouns are
    qualitative, so 'truth and love' without articles is appropriate. ἀγάπῃ follows
    the project's default rendering 'love.'
