theological_decisions:
- issue: Rendering Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Χριστός is functioning as a title attached to Jesus. Per doctrine and
    translation philosophy, christological titles are translated rather than merely
    transliterated where context supports it. The traditional 'Christ' is preserved
    as an alternative.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Relation of 'the Father's Son' to Jesus
  chosen_reading: Appositional identification of Jesus Messiah as the Father's Son
  alternative_readings:
  - A looser descriptive phrase after Jesus Christ
  rationale: The genitival phrase most naturally stands in apposition to Jesus Messiah,
    explicitly identifying him as the Son of the Father. This preserves the verse's
    high christological force without adding doctrinal language beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Nicene/Chalcedonian bounds affirmed'
