theological_decisions:
- issue: Referent of κυρία
  chosen_reading: Translate literally as 'lady' without identifying the addressee
    as either a specific woman or a church.
  alternative_readings:
  - Treat 'lady' as a symbolic reference to a local church
  - Treat 'lady' as the proper name Kyria
  rationale: The Greek permits multiple interpretations, but the lexical form itself
    is simply 'lady.' A transparent translation should preserve that ambiguity rather
    than resolve it in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
