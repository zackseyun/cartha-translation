id: 2JN.1.5
reference: 2 John 1:5
source:
  edition: SBLGNT
  text: καὶ νῦν ἐρωτῶ σε, κυρία, οὐχ ὡς ἐντολὴν ⸂καινὴν γράφων σοι⸃ ἀλλὰ ἣν εἴχομεν
    ἀπ’ ἀρχῆς, ἵνα ἀγαπῶμεν ἀλλήλους.
translation:
  text: 'And now I ask you, lady, not as though I were writing to you a new commandment,
    but the one we have had from the beginning: that we love one another.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, 'to the church' if 'lady' is understood figuratively; alternatively,
      some take Kyria as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρωτῶ
  chosen: I ask
  alternatives:
  - I request
  - I urge
  lexicon: BDAG
  rationale: ἐρωτάω commonly means to ask or request. 'I ask' is natural modern English
    and preserves the epistolary tone without overstating the force as 'urge.'
- source_word: κυρία
  chosen: lady
  alternatives:
  - elect lady
  - mistress
  lexicon: BDAG
  rationale: κυρία is the vocative singular of 'lady/mistress.' In this verse the
    adjective ἐκλεκτῇ is absent, so 'lady' is the plain lexical rendering. It leaves
    open the broader interpretive question of whether the addressee is an individual
    woman or personified church, without importing that conclusion into the translation.
- source_word: ἐντολὴν καινὴν
  chosen: a new commandment
  alternatives:
  - a fresh commandment
  lexicon: BDAG
  rationale: Standard rendering of the noun-adjective phrase. 'New commandment' also
    preserves the intertextual echo with Johannine usage elsewhere.
- source_word: γράφων σοι
  chosen: I were writing to you
  alternatives:
  - writing to you
  lexicon: BDAG
  rationale: 'The participle γράφων is best smoothed into English with an implied
    finite verb after ''as though'': ''as though I were writing to you.'' This preserves
    the comparative construction οὐχ ὡς ... ἀλλά in idiomatic English.'
- source_word: ἣν εἴχομεν
  chosen: the one we have had
  alternatives:
  - which we had
  - the commandment we have had
  lexicon: BDAG
  rationale: Although εἴχομεν is imperfect ('we were having/had'), English idiom favors
    present perfect here to express continuing possession from the past into the present,
    especially with ἀπ’ ἀρχῆς.
- source_word: ἀπ’ ἀρχῆς
  chosen: from the beginning
  alternatives:
  - from the start
  lexicon: BDAG
  rationale: This is the standard Johannine expression and should be preserved consistently
    as 'from the beginning' for literary and theological continuity.
- source_word: ἵνα ἀγαπῶμεν ἀλλήλους
  chosen: that we love one another
  alternatives:
  - that we should love one another
  lexicon: BDAG
  rationale: ἀγαπάω is rendered by the default 'love' per doctrine. The subjunctive
    after ἵνα can be represented either as purpose/content ('that we love') or with
    'should'; the simpler form is more natural in modern English while retaining the
    hortatory sense.
