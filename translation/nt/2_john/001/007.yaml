theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The verse centers on christological confession, so Χριστός functions
    as a title. This follows the doctrine default to translate the title where context
    supports it.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of ἐρχόμενον ἐν σαρκί
  chosen_reading: as coming in the flesh
  alternative_readings:
  - having come in the flesh
  rationale: The Greek uses a present participle modifying Jesus Messiah. Rendering
    it with a present/progressive form preserves the Greek expression and the ongoing
    confessional formula without collapsing it into a mere past reference. The wording
    still affirms the true incarnation in line with historic orthodoxy, without importing
    a more specific doctrinal formula than the text states.
  doctrine_reference: 'DOCTRINE.md Affirmations: Chalcedon; Translation philosophy
    §3 preserve theological tension'
- issue: Meaning of σάρξ
  chosen_reading: flesh (literal embodied humanity)
  alternative_readings:
  - sinful nature
  rationale: In this christological context, σάρξ refers to real human embodiment,
    not moral corruption. The translation must preserve the incarnation claim and
    avoid suggesting that Jesus came in a sinful nature.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → flesh (literal) / sinful
    nature (metaphorical), context-dependent'
