id: 2JN.1.7
reference: 2 John 1:7
source:
  edition: SBLGNT
  text: ὅτι πολλοὶ πλάνοι ⸀ἐξῆλθον εἰς τὸν κόσμον, οἱ μὴ ὁμολογοῦντες Ἰησοῦν Χριστὸν
    ἐρχόμενον ἐν σαρκί· οὗτός ἐστιν ὁ πλάνος καὶ ὁ ἀντίχριστος.
translation:
  text: For many deceivers have gone out into the world—those not confessing Jesus
    Messiah as coming in the flesh. This one is the deceiver and the antichrist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      the verse emphasizes the content of the confession about Jesus' messianic identity.
    reason: alternative_reading
  - marker: b
    text: Or 'having come in the flesh.' The Greek reads 'coming in the flesh,' a
      wording that emphasizes the confession of Jesus Messiah's real embodied humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context this introduces the reason for the preceding exhortation,
    so 'For' best captures the explanatory force in natural English.
- source_word: πολλοὶ πλάνοι
  chosen: many deceivers
  alternatives:
  - many impostors
  - many wanderers
  lexicon: BDAG
  rationale: πλάνος here denotes persons who mislead others, not merely those who
    are themselves mistaken. 'Deceivers' best fits Johannine polemical usage and the
    following singular reprise 'the deceiver'.
- source_word: ἐξῆλθον εἰς τὸν κόσμον
  chosen: have gone out into the world
  alternatives:
  - have gone out into the world system
  - have gone forth into the world
  lexicon: BDAG
  rationale: The aorist is rendered idiomatically in English as a present-result statement.
    'Into the world' preserves the missionary/public spread sense without overinterpreting
    κόσμος as 'world system'.
- source_word: οἱ μὴ ὁμολογοῦντες
  chosen: those not confessing
  alternatives:
  - those who do not acknowledge
  - those who do not confess
  lexicon: BDAG
  rationale: The articular participle is substantival, hence 'those.' 'Confessing'
    preserves the verbal and public sense of ὁμολογέω better than the weaker 'acknowledging'.
- source_word: Ἰησοῦν Χριστόν
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like element. Here the christological confession is
    foregrounded, so the titular sense is strong.
- source_word: ἐρχόμενον
  chosen: as coming
  alternatives:
  - coming
  - having come
  lexicon: BDAG
  rationale: The present participle is preserved with an English progressive form.
    'As coming' makes clear its relation to the confession formula. 'Having come'
    is a common interpretive rendering, but it shifts the aspect toward a completed
    past event more than the Greek form itself requires.
- source_word: ἐν σαρκί
  chosen: in the flesh
  alternatives:
  - in flesh
  - as truly human
  lexicon: BDAG
  rationale: This is the standard and theologically important Johannine expression
    affirming real embodied humanity. 'In the flesh' preserves the wording and avoids
    paraphrase. It does not mean 'sinful nature' here, since σάρξ is literal/embodied
    per context and doctrine guidance.
- source_word: οὗτός ἐστιν
  chosen: This one is
  alternatives:
  - This is
  - Such a one is
  lexicon: BDAG
  rationale: The singular demonstrative after a plural description likely individualizes
    the type or any such person. 'This one is' preserves the singular force more clearly
    than a bare 'This is'.
- source_word: ὁ πλάνος
  chosen: the deceiver
  alternatives:
  - the false teacher
  lexicon: BDAG
  rationale: Maintains lexical consistency with earlier πλάνοι and preserves the article's
    identifying force.
- source_word: ὁ ἀντίχριστος
  chosen: the antichrist
  alternatives:
  - the anti-Messiah
  lexicon: BDAG
  rationale: '''Antichrist'' is the established and accurate rendering of ἀντίχριστος
    in Johannine literature. Although etymologically ''anti-Messiah'' is possible,
    English usage and intertextual recognition strongly favor ''antichrist''.'
