id: 2JN.1.11
reference: 2 John 1:11
source:
  edition: SBLGNT
  text: ὁ ⸂λέγων γὰρ⸃ αὐτῷ χαίρειν κοινωνεῖ τοῖς ἔργοις αὐτοῦ τοῖς πονηροῖς.
translation:
  text: For the one who says to him, “Greetings,” shares in his evil works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “hail.” The Greek χαίρειν is a conventional greeting formula; in this
      context it carries the sense of extending welcome or approval, not merely exchanging
      pleasantries.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  chosen: the one who says
  alternatives:
  - whoever says
  - the person who says
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    generically to any person doing this action. 'The one who says' preserves the
    Greek structure and generic force without over-paraphrase.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the previous prohibition in v. 10. 'For' is
    the most natural concise connective here and preserves the explanatory force.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to such a one
  - to that person
  lexicon: BDAG
  rationale: The dative pronoun refers back to the person described in the previous
    verse. 'To him' is a straightforward rendering of the Greek pronoun; the broader
    referent is supplied by context rather than expanded in the verse itself.
- source_word: χαίρειν
  chosen: “Greetings”
  alternatives:
  - rejoice
  - hail
  - welcome
  lexicon: BDAG
  rationale: As an infinitive after λέγων, χαίρειν functions idiomatically as a greeting
    formula. 'Greetings' captures the conventional salutation sense better than the
    overly literal 'rejoice.' 'Welcome' is interpretive and stronger than the lexical
    value, though contextually related.
- source_word: κοινωνεῖ
  chosen: shares in
  alternatives:
  - participates in
  - has fellowship with
  lexicon: BDAG
  rationale: κοινωνέω here takes the dative and indicates participation or sharing
    in something. 'Shares in' is clear modern English and preserves the moral implication
    of complicity without importing a narrower ecclesial sense of 'fellowship.'
- source_word: τοῖς ἔργοις αὐτοῦ τοῖς πονηροῖς
  chosen: his evil works
  alternatives:
  - his wicked deeds
  - his evil deeds
  lexicon: BDAG
  rationale: 'The dative phrase is the object of participation: the person''s works
    characterized as πονηρά. ''Works'' keeps closer lexical continuity with ἔργα,
    while ''evil'' is the standard rendering of πονηρός in this moral sense.'
