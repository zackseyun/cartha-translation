theological_decisions:
- issue: Whether the greeting implies mere politeness or active endorsement/complicity
  chosen_reading: The verse teaches that offering this greeting in the context of
    receiving and supporting false teachers entails sharing in their evil works.
  alternative_readings:
  - The verse forbids any polite greeting whatsoever in all contexts.
  rationale: The lexical data support that χαίρειν is a greeting formula, but the
    force of κοινωνεῖ and the immediate context of receiving such a person into one's
    house (v. 10) indicate complicity in mission/support, not a blanket ban on all
    civil speech. The translation keeps the wording of the verse while avoiding interpretive
    expansion in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
