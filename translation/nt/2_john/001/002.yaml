theological_decisions:
- issue: Johannine theological sense of 'truth'
  chosen_reading: Retain the simple term 'truth' without specifying whether it refers
    to the gospel message, Christ himself, or the Spirit-shaped reality of God's revelation.
  alternative_readings:
  - the gospel truth
  - the true teaching
  rationale: The immediate context supports a rich Johannine sense, but the Greek
    noun itself is not explicitly narrowed. Preserving the broader term maintains
    the theological depth and ambiguity of the source rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
