id: 2JN.1.2
reference: 2 John 1:2
source:
  edition: SBLGNT
  text: διὰ τὴν ἀλήθειαν τὴν μένουσαν ἐν ἡμῖν, καὶ μεθ’ ἡμῶν ἔσται εἰς τὸν αἰῶνα·
translation:
  text: because of the truth that remains in us and will be with us forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that abides in us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: BDAG
  rationale: With the accusative, διά commonly expresses reason or cause. In context
    it explains the basis for the love mentioned in v. 1, so 'because of' is the most
    natural modern English rendering.
- source_word: ἀλήθειαν
  chosen: truth
  lexicon: BDAG
  rationale: ἀλήθεια is straightforwardly 'truth.' In Johannine usage it can carry
    rich theological weight, but the noun itself should remain simply 'truth' rather
    than being expanded interpretively.
- source_word: τὴν μένουσαν
  chosen: that remains
  alternatives:
  - that abides
  - that dwells
  lexicon: BDAG
  rationale: The present participle of μένω denotes continuing presence or persistence.
    'Remains' is clear modern English and preserves the durative sense without sounding
    archaic like 'abides,' though 'abides' is a viable alternative.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: ἐν with the dative most naturally means 'in us' here, referring to the
    indwelling or internal presence of the truth among the Christian community and
    its members. 'Among us' is possible but less direct given Johannine idiom.
- source_word: καὶ μεθ’ ἡμῶν ἔσται
  chosen: and will be with us
  alternatives:
  - and will remain with us
  lexicon: BDAG
  rationale: μετά with the genitive means 'with,' and ἔσται is the future of 'to be.'
    English idiom prefers 'will be with us.' Adding 'remain' would over-translate,
    since the durative idea is already conveyed by the prior participle.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for ever
  - unto the age
  lexicon: BDAG
  rationale: This idiom means enduring perpetually. 'Forever' is the clearest natural
    English equivalent. A more literal 'unto the age' would be obscure, and 'for ever'
    differs only orthographically.
