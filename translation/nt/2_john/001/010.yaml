id: 2JN.1.10
reference: 2 John 1:10
source:
  edition: SBLGNT
  text: εἴ τις ἔρχεται πρὸς ὑμᾶς καὶ ταύτην τὴν διδαχὴν οὐ φέρει, μὴ λαμβάνετε αὐτὸν
    εἰς οἰκίαν καὶ χαίρειν αὐτῷ μὴ λέγετε·
translation:
  text: If anyone comes to you and does not bring this teaching, do not receive him
    into your house, and do not say a greeting to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'do not greet him.' The Greek literally says, 'do
      not say a greeting to him.'
    reason: lexical_alternative
  - marker: b
    text: In context, the warning concerns one who comes without 'this teaching,'
      likely an itinerant teacher whose message departs from the apostolic confession
      described in the surrounding verses.
    reason: cross_reference
lexical_decisions:
- source_word: εἴ τις
  chosen: If anyone
  alternatives:
  - If someone
  lexicon: BDAG
  rationale: Indefinite conditional expression introducing a general case. 'Anyone'
    is natural modern English and preserves the open, generic force.
- source_word: ἔρχεται πρὸς ὑμᾶς
  chosen: comes to you
  alternatives:
  - comes among you
  - comes to visit you
  lexicon: BDAG
  rationale: Straightforward motion toward the recipients. 'Comes to you' is the most
    direct rendering; broader ecclesial implications are possible from context, but
    should not be imported into the wording.
- source_word: ταύτην τὴν διδαχήν
  chosen: this teaching
  alternatives:
  - this doctrine
  - this instruction
  lexicon: BDAG
  rationale: διδαχή can mean teaching/doctrine/instruction. 'Teaching' is clear, modern,
    and preserves the content-focused sense without sounding overly technical. The
    demonstrative 'this' is retained.
- source_word: οὐ φέρει
  chosen: does not bring
  alternatives:
  - does not carry
  - does not present
  lexicon: BDAG
  rationale: φέρω here idiomatically means to bring or bear a teaching. 'Does not
    bring' is both literal and idiomatic in English, matching the Greek closely.
- source_word: μὴ λαμβάνετε αὐτὸν
  chosen: do not receive him
  alternatives:
  - do not welcome him
  - do not accept him
  lexicon: BDAG
  rationale: λαμβάνω can mean receive, welcome, or accept. 'Receive' preserves the
    verbal link to hospitality without over-interpreting whether the emphasis is social
    welcome or material hosting; the house phrase that follows clarifies the practical
    sense.
- source_word: εἰς οἰκίαν
  chosen: into your house
  alternatives:
  - into the house
  - into your home
  lexicon: BDAG
  rationale: οἰκία means house/home. 'Your house' makes explicit the implied possessive
    from the addressees and fits the hospitality context. 'House' is slightly more
    formal and concrete than 'home,' matching the Greek noun.
- source_word: χαίρειν αὐτῷ μὴ λέγετε
  chosen: do not say a greeting to him
  alternatives:
  - do not greet him
  - do not say 'Greetings' to him
  lexicon: BDAG
  rationale: Literally, 'do not say greeting to him.' The infinitive χαίρειν functions
    as the content of the greeting. Rendering it as 'say a greeting' preserves the
    lexical shape better than the more idiomatic 'greet him,' while remaining understandable.
