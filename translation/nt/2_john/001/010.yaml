theological_decisions:
- issue: Scope of the prohibition regarding false teachers
  chosen_reading: The verse forbids receiving and greeting a person who comes without
    this teaching, in the context of endorsing or extending hospitality to a teacher,
    without expanding the wording into a universal ban on all contact.
  alternative_readings:
  - A total prohibition on any social interaction
  - A restriction only on hosting such a person as a teacher in the church assembly
  rationale: The immediate context concerns itinerant teachers and doctrinal fidelity.
    The translation keeps the concrete language of house and greeting without importing
    a narrower or broader doctrinal application into the main text. This preserves
    interpretive tension rather than resolving it beyond the Greek wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of αὐτόν
  chosen_reading: him
  alternative_readings:
  - them
  rationale: The Greek singular masculine pronoun is retained as 'him' in keeping
    with the gender-accurate policy. Although the referent is generic, the source
    text is singular masculine, and the English should reflect that rather than neutralizing
    it.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
