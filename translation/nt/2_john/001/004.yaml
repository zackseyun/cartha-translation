theological_decisions:
- issue: Referent of 'the Father'
  chosen_reading: Retain 'the Father' without expansion
  alternative_readings:
  - from God the Father
  rationale: The text itself says 'the Father.' Because Johannine usage commonly uses
    this title for God, the translation should preserve the title rather than interpretively
    expand it.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
- issue: Scope of 'your children'
  chosen_reading: 'Render as a subset: ''some of your children'''
  alternative_readings:
  - your children
  rationale: The partitive ἐκ indicates that the author found some, not explicitly
    all, of the addressee's children walking in the truth. This preserves the textual
    nuance and avoids overstating the claim.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition.'
