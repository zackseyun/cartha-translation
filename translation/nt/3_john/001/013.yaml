id: 3JN.1.13
reference: 3 John 1:13
source:
  edition: SBLGNT
  text: Πολλὰ εἶχον ⸂γράψαι σοι⸃, ἀλλ’ οὐ θέλω διὰ μέλανος καὶ καλάμου σοι ⸀γράφειν·
translation:
  text: I had many things to write to you, but I do not want to write to you with
    ink and pen;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'with ink and reed pen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πολλὰ
  chosen: many things
  alternatives:
  - much
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally; 'many things' is the natural
    English equivalent and preserves the plural sense better than the more idiomatic
    but less explicit 'much'.
- source_word: εἶχον
  chosen: I had
  alternatives:
  - I have
  lexicon: BDAG
  rationale: 'Imperfect indicative of ἔχω here idiomatically introduces intended but
    unwritten content: ''I had many things to write.'' This preserves the past-frame
    of the Greek better than smoothing to present tense.'
- source_word: γράψαι
  chosen: to write
  alternatives:
  - to have written
  lexicon: BDAG
  rationale: Aorist infinitive after εἶχον expresses contemplated action. English
    simple infinitive 'to write' is the clearest equivalent here.
- source_word: σοι
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: Dative pronoun marking indirect object; 'to you' is explicit and natural
    in English.
- source_word: ἀλλ’ οὐ θέλω
  chosen: but I do not want
  alternatives:
  - but I am not willing
  - but I do not wish
  lexicon: BDAG
  rationale: θέλω commonly conveys desire/will. 'Do not want' is readable modern English
    and fits the epistolary tone without sounding overly formal.
- source_word: διὰ μέλανος καὶ καλάμου
  chosen: with ink and pen
  alternatives:
  - by means of ink and pen
  - with ink and reed pen
  lexicon: BDAG
  rationale: διά with genitive expresses means/instrument. μέλαν refers to ink; κάλαμος
    is literally a reed, but in writing context 'pen' communicates the function naturally.
    'Reed pen' is possible but unnecessarily technical in the main text.
- source_word: γράφειν
  chosen: to write
  alternatives:
  - to keep writing
  lexicon: BDAG
  rationale: Present infinitive may emphasize the process of writing, especially in
    contrast with hoped-for face-to-face speech in the next verse, but standard English
    'to write' adequately conveys the sense here without overtranslating aspect.
