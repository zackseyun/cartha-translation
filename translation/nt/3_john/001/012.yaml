id: 3JN.1.12
reference: 3 John 1:12
source:
  edition: SBLGNT
  text: Δημητρίῳ μεμαρτύρηται ὑπὸ πάντων καὶ ὑπὸ αὐτῆς τῆς ἀληθείας· καὶ ἡμεῖς δὲ
    μαρτυροῦμεν, καὶ ⸀οἶδας ὅτι ἡ μαρτυρία ἡμῶν ἀληθής ἐστιν.
translation:
  text: Demetrius has received a good testimony from everyone, and from the truth
    itself. We also testify, and you know that our testimony is true.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'has been testified to by everyone.' The Greek uses a perfect passive
      of 'testify/bear witness,' indicating an established commendation.
    reason: lexical_alternative
  - marker: b
    text: '''The truth itself'' may mean that Demetrius''s life is in accord with
      the truth, or more broadly that the gospel/truth bears witness in his favor.'
    reason: alternative_reading
lexical_decisions:
- source_word: Δημητρίῳ
  chosen: Demetrius
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: μεμαρτύρηται
  chosen: has received a good testimony
  alternatives:
  - has been testified to
  - is well spoken of
  - has received testimony
  lexicon: BDAG
  rationale: Perfect passive indicates an existing commendation/resulting state. English
    idiom is smoother with 'has received a good testimony' than a more wooden passive.
    'Good' is implied by the commendatory context, though not lexically explicit;
    it clarifies that the testimony is favorable.
- source_word: ὑπὸ πάντων
  chosen: from everyone
  alternatives:
  - by all
  - from all people
  lexicon: BDAG
  rationale: ὑπό with genitive marks agency/source in the passive construction. 'From
    everyone' is natural modern English and preserves the universal scope.
- source_word: ὑπὸ αὐτῆς τῆς ἀληθείας
  chosen: from the truth itself
  alternatives:
  - by the truth itself
  - from truth itself
  lexicon: BDAG
  rationale: The intensive force of αὐτῆς is preserved with 'itself.' 'The truth'
    is retained rather than paraphrased as 'reality' or 'the gospel,' since Johannine
    usage often personifies or absolutizes truth and the phrase likely means that
    Demetrius's life accords with the truth.
- source_word: καὶ ἡμεῖς δὲ μαρτυροῦμεν
  chosen: We also testify
  alternatives:
  - And we also bear witness
  - But we too testify
  lexicon: BDAG
  rationale: μαρτυρέω is rendered with the cognate 'testify' for consistency with
    nearby μαρτυρία. δέ here is mildly connective/adversative; 'also' captures the
    additive force in readable English without overtranslating.
- source_word: οἶδας
  chosen: you know
  alternatives:
  - you have known
  - know
  lexicon: BDAG
  rationale: Although formally perfect in form, οἶδα functions as a present-state
    verb in Koine; 'you know' is the standard sense.
- source_word: ἡ μαρτυρία ἡμῶν
  chosen: our testimony
  alternatives:
  - the testimony of us
  - our witness
  lexicon: BDAG
  rationale: Cognate consistency with μαρτυρέω favors 'testimony' here rather than
    'witness.'
- source_word: ἀληθής ἐστιν
  chosen: is true
  alternatives:
  - is truthful
  - is reliable
  lexicon: BDAG
  rationale: Simple predicate adjective best rendered directly. 'True' preserves the
    lexical connection with ἀλήθεια earlier in the verse.
