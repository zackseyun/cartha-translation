theological_decisions:
- issue: Meaning of 'the truth itself' in Johannine idiom
  chosen_reading: Retain the phrase literally as 'the truth itself' rather than interpretively
    narrowing it to 'the gospel' or 'his conduct in accord with the truth.'
  alternative_readings:
  - the gospel itself
  - his life itself bears witness
  rationale: The phrase is theologically and literarily rich in Johannine usage. Preserving
    'truth' maintains the text's theological texture and avoids importing a narrower
    doctrinal interpretation than the Greek requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
