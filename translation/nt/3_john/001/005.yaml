id: 3JN.1.5
reference: 3 John 1:5
source:
  edition: SBLGNT
  text: Ἀγαπητέ, πιστὸν ποιεῖς ὃ ἐὰν ἐργάσῃ εἰς τοὺς ἀδελφοὺς καὶ ⸀τοῦτο ξένους,
translation:
  text: Beloved, you are acting faithfully in whatever you do for the brothers, especially
    when they are strangers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Beloved, you do a faithful thing in whatever you work for the brothers—and
      this for strangers.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' translates the masculine plural ἀδελφοὺς. In context it refers
      to fellow believers, though the group may have included women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητέ
  chosen: Beloved
  alternatives:
  - Dear friend
  - Dear one
  lexicon: BDAG
  rationale: Vocative singular of ἀγαπητός used as an affectionate address. 'Beloved'
    preserves the warmth and epistolary tone more closely than the more interpretive
    'dear friend.'
- source_word: πιστὸν ποιεῖς
  chosen: you are acting faithfully
  alternatives:
  - you do a faithful thing
  - you are doing what is faithful
  lexicon: BDAG
  rationale: The idiom πιστὸν ποιεῖς literally means 'you do a faithful thing,' but
    in natural English this is best expressed as 'you are acting faithfully.' This
    preserves the commendation of Gaius's reliability/fidelity without wooden phrasing.
- source_word: ὃ ἐὰν ἐργάσῃ
  chosen: in whatever you do
  alternatives:
  - whatever you may do
  - whatever work you do
  lexicon: BDAG
  rationale: 'The relative pronoun with ἐάν and subjunctive gives an indefinite sense:
    ''whatever you do.'' ''Work'' is possible from ἐργάζομαι, but here the broader
    ''do'' fits the idiom and context of practical support.'
- source_word: εἰς τοὺς ἀδελφοὺς
  chosen: for the brothers
  alternatives:
  - for the brothers and sisters
  - toward the brothers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In this context it refers to fellow
    believers/Christian brothers. 'For' conveys benefactive εἰς idiomatically in English.
- source_word: καὶ τοῦτο ξένους
  chosen: especially when they are strangers
  alternatives:
  - and this though they are strangers
  - and that to strangers
  - namely, strangers
  lexicon: BDAG
  rationale: 'The phrase intensifies the commendation: Gaius shows hospitality not
    only to fellow believers but to those unknown to him. ''Especially when they are
    strangers'' communicates the force naturally. A more literal rendering (''and
    this to strangers'') is possible but less clear in contemporary English.'
- source_word: ξένους
  chosen: strangers
  alternatives:
  - foreigners
  - unknown people
  lexicon: BDAG
  rationale: ξένος here refers to persons unknown to the host, not necessarily ethnically
    foreign. 'Strangers' best fits the hospitality context of 3 John.
