id: 3JN.1.2
reference: 3 John 1:2
source:
  edition: SBLGNT
  text: Ἀγαπητέ, περὶ πάντων εὔχομαί σε εὐοδοῦσθαι καὶ ὑγιαίνειν, καθὼς εὐοδοῦταί
    σου ἡ ψυχή.
translation:
  text: Beloved, concerning all things I pray that you may prosper and be healthy,
    just as your soul prospers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in every way'; traditionally, 'above all.' The Greek more naturally
      expresses scope than priority.
    reason: alternative_reading
  - marker: b
    text: Or 'be in good health.'
    reason: lexical_alternative
  - marker: c
    text: Or 'your inner self prospers' or 'it goes well with your soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητέ
  chosen: Beloved
  alternatives:
  - Dear friend
  - Dear one
  lexicon: BDAG
  rationale: Vocative singular of ἀγαπητός used as an affectionate address. 'Beloved'
    preserves the lexical connection to ἀγάπη ('love') better than the more idiomatic
    but less transparent 'dear friend.'
- source_word: περὶ πάντων
  chosen: concerning all things
  alternatives:
  - in every way
  - above all
  lexicon: BDAG
  rationale: The phrase most naturally means 'with respect to all things' or 'concerning
    all things.' This avoids the traditional but less likely idiomatic rendering 'above
    all,' which can suggest priority rather than scope.
- source_word: εὔχομαί
  chosen: I pray
  alternatives:
  - I ask
  - I wish
  lexicon: BDAG
  rationale: In epistolary context εὔχομαι commonly expresses prayer/wish. 'I pray'
    best reflects the religious nuance without overcomplicating the sentence.
- source_word: σε εὐοδοῦσθαι
  chosen: that you may prosper
  alternatives:
  - that things may go well for you
  - that you may succeed
  lexicon: BDAG
  rationale: εὐοδόομαι literally conveys having a good journey/path, and by extension
    prospering or faring well. 'May prosper' is concise and idiomatic while preserving
    the positive sense of well-being/success.
- source_word: ὑγιαίνειν
  chosen: be healthy
  alternatives:
  - be in good health
  - be sound
  lexicon: BDAG
  rationale: The verb refers to physical health here in parallel with prospering.
    'Be healthy' is natural modern English; 'be in good health' is also possible but
    slightly more formal.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - even as
  - to the degree that
  lexicon: BDAG
  rationale: καθώς introduces comparison. 'Just as' clearly marks the analogy between
    the addressee's outward well-being and inward well-being.
- source_word: εὐοδοῦταί σου ἡ ψυχή
  chosen: your soul prospers
  alternatives:
  - your soul is prospering
  - it goes well with your soul
  lexicon: BDAG
  rationale: The present tense indicates ongoing prosperity/well-being of the ψυχή.
    'Your soul prospers' is smooth English and retains the lexical echo with the earlier
    εὐοδοῦσθαι.
- source_word: ψυχή
  chosen: soul
  alternatives:
  - life
  - inner self
  lexicon: BDAG
  rationale: ψυχή can denote life, self, or soul depending on context. Here, contrasted
    with physical health and external prosperity, 'soul' best captures the person's
    inner spiritual life without importing a technical anthropology beyond the text.
