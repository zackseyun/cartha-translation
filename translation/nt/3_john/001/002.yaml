theological_decisions:
- issue: Meaning of περὶ πάντων in the opening wish
  chosen_reading: concerning all things / in all respects, not 'above all'
  alternative_readings:
  - above all
  rationale: The Greek phrase is better read as expressing scope ('with respect to
    all things') rather than rank ('above all'). This avoids making John's wish sound
    like a supreme priority statement when the syntax more naturally introduces the
    areas in which he prays for Gaius's well-being.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
- issue: Sense of ψυχή
  chosen_reading: soul
  alternative_readings:
  - life
  - inner self
  rationale: The verse contrasts material/physical well-being with the state of the
    ψυχή. 'Soul' preserves that contrast in standard English while not forcing a detailed
    doctrinal claim about the constitution of the human person.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
