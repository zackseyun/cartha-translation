id: 3JN.1.14
reference: 3 John 1:14
source:
  edition: SBLGNT
  text: ἐλπίζω δὲ εὐθέως ⸂σε ἰδεῖν⸃, καὶ στόμα πρὸς στόμα λαλήσομεν.
translation:
  text: But I hope to see you soon, and we will speak face to face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'mouth to mouth.' The expression means direct personal conversation,
      that is, 'face to face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίζω
  chosen: I hope
  alternatives:
  - I expect
  - I trust
  lexicon: BDAG
  rationale: Present indicative naturally expresses the writer's personal expectation
    or hope. 'I hope' is the most idiomatic and contextually fitting English rendering
    in epistolary closing language.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition from the previous statement about
    writing. 'But' preserves that turn in thought better than omitting it, while remaining
    natural in English.
- source_word: εὐθέως
  chosen: soon
  alternatives:
  - immediately
  - at once
  lexicon: BDAG
  rationale: Although εὐθέως can mean 'immediately' or 'at once,' in this travel-and-visit
    context it idiomatically conveys nearness in time rather than instantaneous action.
    'Soon' best fits natural English and the epistolary setting.
- source_word: σε ἰδεῖν
  chosen: to see you
  alternatives:
  - to visit you
  lexicon: BDAG
  rationale: The infinitive construction after ἐλπίζω is straightforwardly 'to see
    you.' 'Visit you' is interpretive; 'see you' stays closer to the Greek while still
    implying personal presence.
- source_word: στόμα πρὸς στόμα
  chosen: face to face
  alternatives:
  - mouth to mouth
  lexicon: BDAG
  rationale: The Greek idiom is literally 'mouth to mouth,' but in context it denotes
    direct personal conversation. 'Face to face' is the established and natural English
    equivalent for the idiom, avoiding an overly literal rendering that could mislead
    modern readers.
- source_word: λαλήσομεν
  chosen: we will speak
  alternatives:
  - we will talk
  lexicon: BDAG
  rationale: Future indicative indicates the anticipated conversation. 'Speak' is
    slightly more formal and fits the tone of the letter better than 'talk,' while
    remaining accessible.
