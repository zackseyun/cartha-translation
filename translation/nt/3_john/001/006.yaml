id: 3JN.1.6
reference: 3 John 1:6
source:
  edition: SBLGNT
  text: οἳ ἐμαρτύρησάν σου τῇ ἀγάπῃ ἐνώπιον ἐκκλησίας, οὓς καλῶς ποιήσεις προπέμψας
    ἀξίως τοῦ θεοῦ·
translation:
  text: They have testified before the church about your love. You will do well to
    send them on their way in a manner worthy of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'help them on their journey'; the Greek verb can imply sending travelers
      onward with practical support.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρησάν
  chosen: have testified
  alternatives:
  - testified
  - borne witness
  lexicon: BDAG
  rationale: Aorist indicative reports a completed act, but in English present perfect
    naturally conveys a past action with present relevance in the letter context.
    'Testified' preserves the forensic/reporting sense of μαρτυρέω; 'borne witness'
    is possible but less natural here.
- source_word: σου τῇ ἀγάπῃ
  chosen: about your love
  alternatives:
  - to your love
  - of your love
  lexicon: BDAG
  rationale: The dative with μαρτυρέω can indicate the content or reference of the
    testimony. 'About your love' is idiomatic English and clearly communicates that
    the brothers reported Gaius's love. 'Love' follows the doctrinal default for ἀγάπη.
- source_word: ἐνώπιον ἐκκλησίας
  chosen: before the church
  alternatives:
  - in the presence of the church
  - before the assembly
  lexicon: BDAG
  rationale: ἐνώπιον denotes presence before others. 'Before the church' is concise
    and natural. ἐκκλησία is rendered 'church' rather than 'assembly' because in this
    Johannine epistolary setting it refers to the gathered Christian community.
- source_word: οὓς
  chosen: them
  alternatives:
  - whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to the traveling brothers. English style
    favors 'them' after restructuring the sentence rather than a more wooden 'whom.'
- source_word: καλῶς ποιήσεις
  chosen: you will do well
  alternatives:
  - you will do a good thing
  - you do well
  lexicon: BDAG
  rationale: This is a common idiomatic expression of commendation/exhortation. Future
    indicative here has imperatival or polite exhortatory force; 'you will do well'
    preserves both the form and the sense better than a flat imperative.
- source_word: προπέμψας
  chosen: to send them on their way
  alternatives:
  - after sending them on their way
  - to help them on their journey
  lexicon: BDAG
  rationale: προπέμπω often means to assist travelers by sending them onward, sometimes
    with material support. 'Send them on their way' is the clearest main-text rendering;
    the fuller nuance of support is worth preserving in a footnote.
- source_word: ἀξίως τοῦ θεοῦ
  chosen: in a manner worthy of God
  alternatives:
  - worthily of God
  - in a way worthy of God
  lexicon: BDAG
  rationale: ἀξίως expresses manner. 'In a manner worthy of God' is idiomatic modern
    English and preserves the theological weight of conduct measured by God's honor.
