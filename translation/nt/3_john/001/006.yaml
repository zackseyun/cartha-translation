theological_decisions:
- issue: Nuance of προπέμπω in Christian hospitality
  chosen_reading: Rendered as 'send them on their way' in the main text, with the
    practical-support nuance preserved in a footnote.
  alternative_readings:
  - help them on their journey
  - send them on their way with support
  rationale: The verse commends more than mere dismissal; in early Christian usage
    the term often implies furnishing aid for onward travel. The main text keeps readable
    English without over-specifying material support, while the footnote preserves
    the fuller hospitality nuance.
  doctrine_reference: Translation philosophy §3, §6
