theological_decisions:
- issue: Sense of Diotrephes's opposition
  chosen_reading: The translation leaves ἐπιδέχεται broad as 'receive us' rather than
    specifying only hospitality or only recognition of authority.
  alternative_readings:
  - does not welcome us
  - does not acknowledge our authority
  rationale: The verse criticizes Diotrephes without requiring the translator to resolve
    whether the primary issue is personal reception, hospitality, or acceptance of
    apostolic representatives/authority. Preserving the broader wording maintains
    the text's tension and avoids importing a narrower ecclesiological claim than
    the Greek states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
