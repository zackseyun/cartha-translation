id: 3JN.1.9
reference: 3 John 1:9
source:
  edition: SBLGNT
  text: Ἔγραψά ⸀τι τῇ ἐκκλησίᾳ· ἀλλ’ ὁ φιλοπρωτεύων αὐτῶν Διοτρέφης οὐκ ἐπιδέχεται
    ἡμᾶς.
translation:
  text: I wrote something to the church, but Diotrephes, who loves to be first among
    them, does not receive us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I wrote a brief note to the church.' The Greek text has an indefinite
      expression ('I wrote something'), and some manuscripts expand the wording.
    reason: textual_variant
  - marker: b
    text: Or 'does not welcome us' or 'does not acknowledge us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔγραψά
  chosen: I wrote
  alternatives:
  - I have written
  lexicon: BDAG
  rationale: Aorist indicative is most naturally rendered as a simple past in English.
    'I have written' is possible in epistolary context, but the straightforward past
    best reflects the form here.
- source_word: τι
  chosen: something
  alternatives:
  - a brief note
  - to some extent
  lexicon: BDAG
  rationale: The neuter indefinite pronoun most naturally means 'something' here.
    The textual form is difficult and has prompted expansions in some traditions,
    but in the SBLGNT reading the most transparent rendering is indefinite rather
    than supplying an object not explicit in the text.
- source_word: τῇ ἐκκλησίᾳ
  chosen: to the church
  alternatives:
  - to the congregation
  lexicon: BDAG
  rationale: ἐκκλησία in Johannine usage refers to the local Christian assembly/church.
    'Church' is the standard and most recognizable rendering in modern English.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - however
  lexicon: BDAG
  rationale: Marks a strong contrast between the writer's action and Diotrephes's
    response. 'But' is natural and sufficiently forceful.
- source_word: ὁ φιλοπρωτεύων
  chosen: who loves to be first
  alternatives:
  - who likes to put himself first
  - who loves preeminence
  lexicon: BDAG
  rationale: The participle denotes one who is fond of being first or having preeminence.
    'Who loves to be first' is clear modern English and preserves the moral force
    without archaic ecclesiastical wording.
- source_word: αὐτῶν
  chosen: among them
  alternatives:
  - over them
  - of them
  lexicon: BDAG
  rationale: The genitive with φιλοπρωτεύων indicates the sphere/group within which
    he seeks first place. 'Among them' best captures that relational sense without
    over-interpreting formal authority.
- source_word: Διοτρέφης
  chosen: Diotrephes
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: οὐκ ἐπιδέχεται ἡμᾶς
  chosen: does not receive us
  alternatives:
  - does not welcome us
  - does not acknowledge us
  lexicon: BDAG
  rationale: ἐπιδέχομαι can mean receive, welcome, or accept. 'Receive us' preserves
    the breadth of the Greek, which may include both hospitality and acceptance of
    apostolic authority. 'Welcome us' is plausible but slightly narrows the sense.
