theological_decisions:
- issue: Referent of 'the Name'
  chosen_reading: A reverential reference to Jesus/the Lord, left implicit in the
    main text as 'the Name.'
  alternative_readings:
  - An explicit rendering such as 'the name of Christ' or 'his name'
  rationale: The text itself uses the reverential shorthand 'the Name' without naming
    Jesus directly. Preserving that wording maintains the source's theological resonance
    and avoids adding specificity not stated in the verse, while the context of Christian
    mission makes the referent clear.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of ἐθνικῶν
  chosen_reading: '''Gentiles'' in the main text.'
  alternative_readings:
  - '''pagans'''
  - '''unbelievers'''
  rationale: The term can function as a religious outsider label, but translating
    it as 'Gentiles' best reflects the lexical form and preserves the historical Jewish-Christian
    framing. An alternative is worth preserving because some readers may understand
    the sense primarily as 'pagans' or 'unbelievers' in context.
  doctrine_reference: Translation philosophy §§1, 5
