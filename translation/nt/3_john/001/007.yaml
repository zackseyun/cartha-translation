id: 3JN.1.7
reference: 3 John 1:7
source:
  edition: SBLGNT
  text: ὑπὲρ γὰρ τοῦ ὀνόματος ἐξῆλθον μηδὲν λαμβάνοντες ἀπὸ τῶν ⸀ἐθνικῶν.
translation:
  text: For they went out for the sake of the Name, taking nothing from the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from pagans' or 'from unbelievers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  chosen: for the sake of
  alternatives:
  - for
  - on behalf of
  lexicon: BDAG
  rationale: In this idiom with a genitive object ('the Name'), ὑπέρ expresses purpose
    or cause rather than substitution. 'For the sake of' makes the missionary motive
    explicit in natural English.
- source_word: τοῦ ὀνόματος
  chosen: the Name
  alternatives:
  - his name
  - the name of Christ
  - the name
  lexicon: BDAG
  rationale: 'The Greek is anarthrous only in English sense but definite in form:
    literally ''the Name.'' In early Christian usage this reverential shorthand refers
    to Jesus/the Lord without restating the referent. Retaining ''the Name'' preserves
    the idiomatic and theological force without importing an explicit noun absent
    from the text.'
- source_word: ἐξῆλθον
  chosen: went out
  alternatives:
  - set out
  - went forth
  lexicon: BDAG
  rationale: Aorist active indicative, straightforwardly rendered 'went out.' This
    fits the likely sense of departing on missionary travel and avoids archaic 'went
    forth.'
- source_word: μηδὲν λαμβάνοντες
  chosen: taking nothing
  alternatives:
  - accepting nothing
  - receiving nothing
  lexicon: BDAG
  rationale: The participial phrase describes their manner of going out. 'Taking nothing'
    is concise and natural; 'receiving' is possible, but 'taking' better matches the
    active participle while still conveying financial/material support.
- source_word: ἀπὸ τῶν ἐθνικῶν
  chosen: from the Gentiles
  alternatives:
  - from pagans
  - from unbelievers
  - from the nations
  lexicon: BDAG
  rationale: ἐθνικός here denotes non-Christians from among the nations, conventionally
    'Gentiles.' 'Pagans' is interpretive and potentially narrower; 'unbelievers' loses
    the ethnic-religious coloring of the Greek. 'Gentiles' best preserves the lexical
    link and likely first-century Jewish-Christian perspective.
