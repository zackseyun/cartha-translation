id: 3JN.1.15
reference: 3 John 1:15
source:
  edition: SBLGNT
  text: Εἰρήνη σοι. ἀσπάζονταί σε οἱ φίλοι. ἀσπάζου τοὺς φίλους κατ’ ὄνομα.
translation:
  text: Peace to you. The friends greet you. Greet the friends by name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Peace be with you.' The Greek is literally 'Peace to you,' a concise
      epistolary blessing.
    reason: lexical_alternative
  - marker: b
    text: Or 'Greet the friends individually' or 'one by one.' The Greek says 'by
      name,' emphasizing personal greeting.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰρήνη
  chosen: Peace
  alternatives:
  - Peace be with you
  lexicon: BDAG
  rationale: A nominative used idiomatically as an epistolary benediction. 'Peace'
    is the most direct and natural rendering; 'Peace be with you' makes the implied
    verbal sense explicit but adds words not present in Greek.
- source_word: σοι
  chosen: to you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: Dative pronoun marking the recipient of the blessing. 'To you' preserves
    the concise epistolary form; 'with you' is possible in English benediction style
    but is less formally tied to the Greek dative here.
- source_word: ἀσπάζονταί
  chosen: greet
  alternatives:
  - send greetings to
  - welcome
  lexicon: BDAG
  rationale: Standard epistolary verb for conveying greetings. 'Greet' is concise
    and idiomatic; 'send greetings to' is slightly more expansive but not necessary.
- source_word: οἱ φίλοι
  chosen: the friends
  alternatives:
  - our friends
  - the brothers
  lexicon: BDAG
  rationale: The Greek explicitly has 'the friends.' Rendering it this way preserves
    the distinct wording of the text rather than assimilating it to more common epistolary
    terms like 'brothers.' 'Our friends' adds a possessive not present in the Greek.
- source_word: ἀσπάζου
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Present middle imperative, singular, matching the epistolary instruction.
    'Greet' is the most direct equivalent and keeps the parallel with the previous
    clause.
- source_word: τοὺς φίλους
  chosen: the friends
  alternatives:
  - the brothers
  - our friends
  lexicon: BDAG
  rationale: Same lexical item as earlier in the verse and should be rendered consistently.
    The article is retained in English for naturalness and correspondence.
- source_word: κατ’ ὄνομα
  chosen: by name
  alternatives:
  - individually
  - one by one
  lexicon: BDAG
  rationale: Idiomatic expression meaning individually or personally. 'By name' is
    the closest formal equivalent and preserves the personal force of the phrase;
    'individually' is interpretive but less vivid.
