id: 3JN.1.10
reference: 3 John 1:10
source:
  edition: SBLGNT
  text: διὰ τοῦτο, ἐὰν ἔλθω, ὑπομνήσω αὐτοῦ τὰ ἔργα ἃ ποιεῖ, λόγοις πονηροῖς φλυαρῶν
    ἡμᾶς, καὶ μὴ ἀρκούμενος ἐπὶ τούτοις οὔτε αὐτὸς ἐπιδέχεται τοὺς ἀδελφοὺς καὶ τοὺς
    βουλομένους κωλύει καὶ ἐκ τῆς ἐκκλησίας ἐκβάλλει.
translation:
  text: For this reason, if I come, I will call attention to the works he is doing—maliciously
    babbling against us with evil words—and not content with these things, he himself
    does not receive the brothers, and he hinders those who want to do so and throws
    them out of the church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'welcome the brothers.' The Greek verb can mean receive or welcome, especially
      in the sense of hospitality.
    reason: lexical_alternative
  - marker: b
    text: '''The brothers'' likely refers to traveling Christian brothers/missionaries;
      some translations broaden this to ''brothers and sisters'' or ''believers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'expels them from the church.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: Natural causal-consequential connector in modern English; preserves the
    explicit inferential force without sounding overly formal.
- source_word: ἐὰν ἔλθω
  chosen: if I come
  alternatives:
  - if I arrive
  lexicon: BDAG
  rationale: Simple future-more-vivid condition. 'Come' matches epistolary perspective
    and standard English usage.
- source_word: ὑπομνήσω
  chosen: I will call attention to
  alternatives:
  - I will remind
  - I will bring to mind
  - I will mention
  lexicon: BDAG
  rationale: In context John is not merely reminding the recipients privately but
    publicly bringing Diotrephes's conduct to notice/accountability. 'Call attention
    to' captures the forensic-exposing nuance better than the more neutral 'remind'.
- source_word: αὐτοῦ τὰ ἔργα ἃ ποιεῖ
  chosen: the works he is doing
  alternatives:
  - what he is doing
  - his deeds
  lexicon: BDAG
  rationale: Retains the concrete plural 'works/deeds' while remaining readable. The
    present tense 'is doing' reflects ongoing behavior.
- source_word: λόγοις πονηροῖς
  chosen: with evil words
  alternatives:
  - with wicked words
  - with malicious words
  lexicon: BDAG
  rationale: '''Evil words'' is a direct rendering of the dative phrase; the malicious
    sense is reinforced by the participle and reflected in the main clause wording.'
- source_word: φλυαρῶν ἡμᾶς
  chosen: maliciously babbling against us
  alternatives:
  - gossiping nonsense against us
  - uttering nonsense against us
  - prating against us
  lexicon: BDAG
  rationale: φλυαρέω denotes foolish or empty talk; in context it is hostile slander.
    'Babbling' preserves the sense of empty talk, while 'against us' reflects the
    adversative target. 'Maliciously' makes explicit the hostile force supplied by
    context and πονηροῖς.
- source_word: μὴ ἀρκούμενος ἐπὶ τούτοις
  chosen: not content with these things
  alternatives:
  - not satisfied with this
  - not stopping there
  lexicon: BDAG
  rationale: Idiomatic English for the participial construction, preserving the sense
    that his misconduct extends beyond slander.
- source_word: οὔτε αὐτὸς ἐπιδέχεται τοὺς ἀδελφούς
  chosen: he himself does not receive the brothers
  alternatives:
  - he himself does not welcome the brothers
  - he refuses to receive the brothers
  lexicon: BDAG
  rationale: ἐπιδέχομαι here means to receive/welcome, especially by offering hospitality.
    'Receive' is slightly more formal and broad; 'brothers' follows the gender-accurate
    policy and the likely Christian familial sense.
- source_word: τοὺς ἀδελφούς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the fellow believers
  lexicon: BDAG
  rationale: Masculine plural in context likely refers specifically to traveling Christian
    brothers/missionaries rather than a generic mixed congregation. Per doctrine,
    gender-accurate rendering is preferred over neutralization.
- source_word: τοὺς βουλομένους
  chosen: those who want to do so
  alternatives:
  - those who are willing
  - those who intend to receive them
  lexicon: BDAG
  rationale: The object 'to receive the brothers' is implied from the previous clause.
    'Want to do so' is natural English and preserves the volitional force of βούλομαι.
- source_word: κωλύει
  chosen: he hinders
  alternatives:
  - he forbids
  - he prevents
  lexicon: BDAG
  rationale: κωλύω can mean hinder, prevent, or forbid. 'Hinders' keeps the broad
    obstruction sense without over-specifying the mechanism.
- source_word: ἐκ τῆς ἐκκλησίας ἐκβάλλει
  chosen: throws them out of the church
  alternatives:
  - expels them from the church
  - casts them out of the assembly
  lexicon: BDAG
  rationale: Forceful present-tense action of exclusion from the local Christian assembly.
    'Throws them out' is vivid and readable; 'church' is the natural rendering of
    ἐκκλησία here.
