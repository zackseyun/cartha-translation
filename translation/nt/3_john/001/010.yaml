theological_decisions:
- issue: Rendering ἀδελφοί in a context of church hospitality
  chosen_reading: the brothers
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: The immediate context in 3 John concerns traveling Christian workers,
    making a male-specific or at least male-marked reference plausible. Following
    the doctrine's gender-accurate principle, the masculine form is retained rather
    than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
