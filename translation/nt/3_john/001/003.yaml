theological_decisions:
- issue: Meaning of 'truth' in Johannine ethical context
  chosen_reading: Rendered as 'truth' in both occurrences, preserving the Johannine
    theological-ethical category without reducing it to mere sincerity or doctrine
    alone.
  alternative_readings:
  - faithfulness
  - the truth that is in you
  rationale: The verse links confessed truth and lived conduct. Translating ἀλήθεια
    consistently as 'truth' preserves this theological tension and avoids over-resolving
    whether John emphasizes doctrinal fidelity, moral integrity, or both.
  doctrine_reference: Translation philosophy §3, §5
