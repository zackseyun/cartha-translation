id: 3JN.1.3
reference: 3 John 1:3
source:
  edition: SBLGNT
  text: ἐχάρην γὰρ λίαν ἐρχομένων ἀδελφῶν καὶ μαρτυρούντων σου τῇ ἀληθείᾳ, καθὼς σὺ
    ἐν ἀληθείᾳ περιπατεῖς.
translation:
  text: For I rejoiced greatly when brothers came and testified to your truth, just
    as you are walking in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' referring to fellow believers; the Greek says
      'brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they testified about your faithfulness to the truth.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐχάρην
  chosen: I rejoiced
  alternatives:
  - I was glad
  - I rejoiced
  lexicon: BDAG
  rationale: Aorist passive/deponent form of χαίρω functions with active sense. 'I
    rejoiced' preserves the verbal force and fits the epistolary report better than
    the flatter 'I was glad.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this statement to the previous
    verse. 'For' is natural and sufficiently formal.
- source_word: λίαν
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: Conveys strong degree in idiomatic modern English without sounding archaic.
    Paired with 'rejoiced,' 'greatly' reads naturally.
- source_word: ἐρχομένων ἀδελφῶν
  chosen: when brothers came
  alternatives:
  - as brothers were coming
  - at the coming of brothers
  - when fellow believers came
  lexicon: BDAG
  rationale: The genitive participial construction is temporal/circumstantial. 'When
    brothers came' expresses the sense clearly. 'Brothers' is retained rather than
    neutralized, in keeping with the gender-accurate policy and common early Christian
    familial usage.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: Although the referent may include Christian coworkers generally, the
    Greek is grammatically masculine plural and the translation philosophy prefers
    gender-accurate renderings. A footnote preserves the inclusive sense possibility.
- source_word: μαρτυρούντων
  chosen: testified
  alternatives:
  - bearing witness
  - reported
  lexicon: BDAG
  rationale: '''Testified'' preserves the witness language of μαρτυρέω while remaining
    readable. ''Reported'' is possible but weakens the formal witness nuance.'
- source_word: σου τῇ ἀληθείᾳ
  chosen: to your truth
  alternatives:
  - about your truth
  - to the truth that is in you
  - concerning your faithfulness to the truth
  lexicon: BDAG
  rationale: The dative with μαρτυρέω can indicate the content/object testified to.
    'Your truth' is a concise rendering that reflects the possessive σου with ἀληθείᾳ,
    likely meaning Gaius's relation to the truth rather than a private truth of his
    own. The fuller interpretive alternative is preserved in a footnote.
- source_word: ἀληθείᾳ
  chosen: truth
  alternatives:
  - faithfulness
  - reality
  lexicon: BDAG
  rationale: In Johannine usage, ἀλήθεια commonly carries theological and ethical
    weight as 'truth.' 'Faithfulness' captures an aspect of lived truth here but is
    too interpretive for the main text.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - inasmuch as
  lexicon: BDAG
  rationale: Marks correspondence between the testimony and Gaius's conduct. 'Just
    as' makes the comparison explicit.
- source_word: ἐν ἀληθείᾳ περιπατεῖς
  chosen: you are walking in truth
  alternatives:
  - you walk in truth
  - you are living in the truth
  lexicon: BDAG
  rationale: περιπατέω is a common ethical metaphor for conduct. 'Walking in truth'
    preserves the metaphor and Johannine style; the progressive English form reflects
    the present tense naturally.
