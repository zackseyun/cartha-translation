id: 3JN.1.8
reference: 3 John 1:8
source:
  edition: SBLGNT
  text: ἡμεῖς οὖν ὀφείλομεν ⸀ὑπολαμβάνειν τοὺς τοιούτους, ἵνα συνεργοὶ γινώμεθα τῇ
    ἀληθείᾳ.
translation:
  text: Therefore, we ought to receive such people, so that we may become fellow workers
    for the truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the truth' or 'in the truth.' The Greek dative can be understood
      in more than one way; the main text takes the sense as support for the cause
      of the truth.
    reason: alternative_reading
  - marker: b
    text: The verb translated 'receive' can also carry the sense of welcoming and
      materially supporting such traveling workers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: Explicit pronoun retained for emphasis and natural English subject expression.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the previous verse; 'Therefore' best preserves
    the logical connection.
- source_word: ὀφείλομεν
  chosen: ought to
  alternatives:
  - are obligated to
  - must
  lexicon: BDAG
  rationale: Conveys moral obligation without overstating the force as an absolute
    command; fits Johannine paraenesis.
- source_word: ὑπολαμβάνειν
  chosen: receive
  alternatives:
  - support
  - welcome
  - take up
  lexicon: BDAG
  rationale: In this context of aiding traveling believers, the verb carries the sense
    of receiving or supporting hospitably. 'Receive' is broad enough to include hospitality
    and material support while remaining close to the Greek.
- source_word: τοὺς τοιούτους
  chosen: such people
  alternatives:
  - such men
  - people like these
  lexicon: BDAG
  rationale: Refers to persons of the kind just described, namely faithful traveling
    workers. 'Such people' is natural English and avoids an unnecessarily male-specific
    rendering where the referent is a class characterized by role, though the immediate
    historical referents are male missionaries.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose in clear modern English.
- source_word: συνεργοὶ
  chosen: fellow workers
  alternatives:
  - co-workers
  - partners
  lexicon: BDAG
  rationale: Preserves the collaborative ministry sense. 'Fellow workers' is transparent
    and slightly more formal than 'co-workers,' fitting the epistolary tone.
- source_word: γινώμεθα
  chosen: we may become
  alternatives:
  - we may be
  - we may prove to be
  lexicon: BDAG
  rationale: The verb γίνομαι commonly denotes becoming or coming to be. 'Become'
    preserves the nuance that by supporting them, believers come to share in the work.
- source_word: τῇ ἀληθείᾳ
  chosen: for the truth
  alternatives:
  - with the truth
  - in the truth
  lexicon: BDAG
  rationale: 'The dative here is best taken as advantage or reference: fellow workers
    for the cause of the truth, not merely co-workers with one another. ''For the
    truth'' communicates mission-oriented participation in the gospel''s advance.'
