theological_decisions:
- issue: Sense of τῇ ἀληθείᾳ in relation to συνεργοὶ
  chosen_reading: '''for the truth'' meaning participation in and support of the gospel
    mission'
  alternative_readings:
  - '''with the truth'' as if the truth were personified or the sphere of cooperation'
  - '''in the truth'' as a locative sense'
  rationale: The immediate context concerns materially supporting itinerant workers
    who went out for the sake of the Name. The verse explains that such support makes
    believers co-laborers in the truth's work. Rendering the dative as 'for the truth'
    best captures this ministry-purpose sense without importing a more developed theological
    abstraction.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it; ambiguity documented here and alternative preserved in footnote.
