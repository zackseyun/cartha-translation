id: 3JN.1.1
reference: 3 John 1:1
source:
  edition: SBLGNT
  text: Ὁ πρεσβύτερος Γαΐῳ τῷ ἀγαπητῷ, ὃν ἐγὼ ἀγαπῶ ἐν ἀληθείᾳ.
translation:
  text: The elder to beloved Gaius, whom I love in truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truly'; alternatively, 'in the truth.' The Greek phrase may express
      sincere love, love grounded in the truth of the gospel, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ πρεσβύτερος
  chosen: The elder
  alternatives:
  - The presbyter
  - The old man
  lexicon: BDAG
  rationale: With the article and adjective used substantivally, this functions as
    the self-designation of the sender. 'The elder' is the natural English equivalent
    and preserves the likely office/status nuance without importing a more technical
    ecclesiastical term like 'presbyter.' 'Old man' is lexically possible in some
    contexts but does not fit the epistolary self-identification as well here.
- source_word: Γαΐῳ
  chosen: Gaius
  alternatives:
  - Gaios
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy. 'Gaius' is the established English form.
- source_word: τῷ ἀγαπητῷ
  chosen: beloved
  alternatives:
  - dear
  - loved
  lexicon: BDAG
  rationale: The adjective ἀγαπητός here is an affectionate designation for the recipient.
    'Beloved' preserves the lexical connection to ἀγαπάω later in the verse and carries
    the warmth of the address better than the flatter 'dear.'
- source_word: ὃν
  chosen: whom
  alternatives:
  - who
  lexicon: Greek grammar
  rationale: The relative pronoun is accusative singular masculine, functioning as
    the object of ἀγαπῶ. 'Whom' reflects that role in formal written English.
- source_word: ἐγὼ
  chosen: I
  lexicon: Greek grammar
  rationale: The explicit pronoun adds mild emphasis in Greek. English can preserve
    this adequately with the normal subject pronoun without needing typographic emphasis.
- source_word: ἀγαπῶ
  chosen: love
  alternatives:
  - truly love
  lexicon: BDAG
  rationale: The verb means 'love.' Because the verse already contains ἀληθείᾳ, adding
    'truly' to the verb would blur the distinction between the verb and the following
    prepositional phrase.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truly
  - in the truth
  lexicon: BDAG
  rationale: The phrase can denote sincerity ('truly') or sphere/standard ('in truth').
    'In truth' preserves the Greek wording and the Johannine resonance of ἀλήθεια,
    while leaving open both sincerity and theological overtones. 'In the truth' is
    possible, especially in Johannine usage, but the anarthrous noun here is better
    represented without the article in English.
