theological_decisions:
- issue: Nuance of Johannine ἀλήθεια in the closing phrase
  chosen_reading: Rendered ἐν ἀληθείᾳ as 'in truth' rather than interpreting it more
    explicitly as either mere sincerity ('truly') or a technical reference to Christian
    truth ('in the truth').
  alternative_readings:
  - truly
  - in the truth
  rationale: The Johannine writings often invest 'truth' with theological depth, but
    this verse does not require the translator to resolve whether the phrase emphasizes
    sincerity, conformity to the gospel, or both. Following the doctrine of preserving
    theological tension, the main text keeps the broader phrase 'in truth,' and alternatives
    are preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
