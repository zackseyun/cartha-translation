id: 3JN.1.4
reference: 3 John 1:4
source:
  edition: SBLGNT
  text: μειζοτέραν τούτων οὐκ ἔχω ⸀χαράν, ἵνα ἀκούω τὰ ἐμὰ τέκνα ἐν ⸀τῇ ἀληθείᾳ περιπατοῦντα.
translation:
  text: 'I have no greater joy than this: to hear that my children are walking in
    the truth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'I do not have a joy greater than these things.'
    reason: lexical_alternative
  - marker: b
    text: '''My children'' likely refers to John''s spiritual children—believers under
      his pastoral care.'
    reason: cultural_note
lexical_decisions:
- source_word: μειζοτέραν
  chosen: greater
  alternatives:
  - more
  - greater than
  lexicon: BDAG
  rationale: Comparative adjective modifying χαράν; 'greater' is the natural English
    comparative in the idiom 'no greater joy.'
- source_word: τούτων
  chosen: than this
  alternatives:
  - than these things
  - than these
  lexicon: BDAG
  rationale: Genitive of comparison after the comparative μειζοτέραν. In idiomatic
    English, singular 'than this' best captures the sense of the following content
    clause, though a more literal plural is possible.
- source_word: χαράν
  chosen: joy
  alternatives:
  - gladness
  lexicon: BDAG
  rationale: Standard rendering of χαρά; 'joy' is idiomatic and preserves the emotional
    and theological weight.
- source_word: ἵνα ἀκούω
  chosen: to hear that
  alternatives:
  - that I hear
  - when I hear
  lexicon: BDAG
  rationale: Here ἵνα introduces the content/result that constitutes the joy rather
    than a strict purpose clause. 'To hear that' gives natural English while preserving
    the sense.
- source_word: τὰ ἐμὰ τέκνα
  chosen: my children
  alternatives:
  - my childen of mine
  - my dear children
  lexicon: BDAG
  rationale: τέκνα is literally 'children.' In Johannine usage it can denote spiritual
    children, but the translation should not over-interpret in the main text. 'My
    children' preserves the metaphor and relational tone.
- source_word: ἐν τῇ ἀληθείᾳ
  chosen: in the truth
  alternatives:
  - in truth
  - according to the truth
  lexicon: BDAG
  rationale: The article favors the more definite expression 'the truth.' In Johannine
    literature this can denote both truthful conduct and life shaped by the revealed
    truth; the wording preserves that theological breadth.
- source_word: περιπατοῦντα
  chosen: are walking
  alternatives:
  - are living
  - are conducting themselves
  lexicon: BDAG
  rationale: Johannine ethical metaphor for manner of life. 'Are walking' preserves
    the metaphor and common biblical idiom; more interpretive alternatives are possible
    but less transparent.
