theological_decisions:
- issue: Whether τέκνα refers to literal offspring or spiritual children
  chosen_reading: Retain the literal expression 'my children' without specifying biological
    or spiritual in the main text.
  alternative_readings:
  - my spiritual children
  - my converts
  rationale: The immediate context in 3 John strongly suggests spiritual children,
    but the Greek itself uses the familial term τέκνα. Preserving the metaphor avoids
    importing a narrower interpretation into the translation while allowing readers
    to infer the relational sense from context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of ἐν τῇ ἀληθείᾳ
  chosen_reading: Render as 'in the truth' rather than resolving to merely ethical
    sincerity or doctrinal correctness.
  alternative_readings:
  - truthfully
  - according to the true teaching
  rationale: Johannine usage often holds together doctrinal and ethical dimensions
    of 'truth.' The translation preserves this theological tension rather than collapsing
    it into one aspect.
  doctrine_reference: Translation philosophy §3
