theological_decisions:
- issue: Meaning of Johannine formula relating moral conduct to divine relationship
  chosen_reading: The verse states that doing good shows one is 'from God,' while
    doing evil shows one 'has not seen God,' without flattening these into a denominational
    doctrine of regeneration or perfectionism.
  alternative_readings:
  - The one doing good has been regenerated by God
  - The one doing evil proves total absence of any prior relationship with God in
    a systematic-theological sense
  rationale: The Greek presents moral-spiritual diagnostics in Johannine idiom. The
    translation preserves the text's own categories ('from God,' 'has not seen God')
    rather than importing later doctrinal formulations or softening the warning.
  doctrine_reference: Preserve theological tension rather than resolve it.
