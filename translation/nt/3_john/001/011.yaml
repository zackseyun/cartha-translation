id: 3JN.1.11
reference: 3 John 1:11
source:
  edition: SBLGNT
  text: Ἀγαπητέ, μὴ μιμοῦ τὸ κακὸν ἀλλὰ τὸ ἀγαθόν. ὁ ἀγαθοποιῶν ἐκ τοῦ θεοῦ ἐστιν·
    ὁ κακοποιῶν οὐχ ἑώρακεν τὸν θεόν.
translation:
  text: Beloved, do not imitate what is evil, but what is good. The one who does good
    is from God; the one who does evil has not seen God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one doing good ... the one doing evil'; the Greek participles can
      emphasize ongoing practice or characteristic conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητέ
  chosen: Beloved
  alternatives:
  - Dear friend
  - Dear one
  lexicon: BDAG
  rationale: Vocative singular of ἀγαπητός used as an affectionate address. 'Beloved'
    preserves the warmth and recurring Johannine style more closely than the flatter
    'dear friend.'
- source_word: μὴ μιμοῦ
  chosen: do not imitate
  alternatives:
  - do not follow
  - do not copy
  lexicon: BDAG
  rationale: Present middle imperative with μή gives a prohibition. 'Imitate' is the
    direct lexical equivalent of μιμέομαι and preserves the moral-example emphasis.
- source_word: τὸ κακὸν
  chosen: what is evil
  alternatives:
  - evil
  - the evil thing
  lexicon: BDAG
  rationale: Articular neuter adjective functioning substantivally. 'What is evil'
    is natural English and preserves the generic moral category rather than a single
    act.
- source_word: τὸ ἀγαθόν
  chosen: what is good
  alternatives:
  - good
  - the good thing
  lexicon: BDAG
  rationale: Articular neuter adjective functioning substantivally in contrast with
    τὸ κακόν. 'What is good' mirrors the generic ethical contrast in idiomatic English.
- source_word: ὁ ἀγαθοποιῶν
  chosen: The one who does good
  alternatives:
  - Whoever does good
  - The one doing good
  lexicon: BDAG
  rationale: Present active participle used substantivally. 'The one who does good'
    preserves the individualized, proverbial force and keeps the verbal sense of ongoing
    practice.
- source_word: ἐκ τοῦ θεοῦ ἐστιν
  chosen: is from God
  alternatives:
  - is of God
  - comes from God
  lexicon: BDAG
  rationale: Johannine expression indicating origin/source or belonging. 'From God'
    is the most natural modern English while preserving the source-oriented force
    of ἐκ.
- source_word: ὁ κακοποιῶν
  chosen: the one who does evil
  alternatives:
  - whoever does evil
  - the one doing evil
  lexicon: BDAG
  rationale: Present active participle parallel to ὁ ἀγαθοποιῶν. 'Does evil' is idiomatic
    and preserves the contrast of habitual moral practice.
- source_word: οὐχ ἑώρακεν τὸν θεόν
  chosen: has not seen God
  alternatives:
  - has never seen God
  - does not know God
  lexicon: BDAG
  rationale: Perfect active of ὁράω. 'Has not seen God' keeps the experiential/perfect
    force and preserves Johannine theological language; 'does not know God' would
    interpret beyond the explicit wording, though it is conceptually related in Johannine
    thought.
