id: ACT.10.38
reference: Acts 10:38
source:
  edition: SBLGNT
  text: Ἰησοῦν τὸν ἀπὸ Ναζαρέθ, ὡς ἔχρισεν αὐτὸν ὁ θεὸς πνεύματι ἁγίῳ καὶ δυνάμει, ὃς διῆλθεν εὐεργετῶν καὶ ἰώμενος πάντας τοὺς καταδυναστευομένους ὑπὸ τοῦ διαβόλου, ὅτι ὁ θεὸς ἦν μετ’ αὐτοῦ·
translation:
  text: 'Jesus of Nazareth: how God anointed him with the Holy Spirit and with power; he went about doing good and healing all who were oppressed by the devil, because God was with him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus of Nazareth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for God was with him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Jesus from Nazareth—how God anointed him with the Holy Spirit and with power—who went about doing good and healing all who were oppressed by the devil, because God was with him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰησοῦν τὸν ἀπὸ Ναζαρέθ
  chosen: Jesus from Nazareth
  alternatives:
  - Jesus the one from Nazareth
  - Jesus of Nazareth
  lexicon: BDAG
  rationale: The phrase identifies Jesus by origin. 'From Nazareth' is a transparent rendering of ἀπό, while 'of Nazareth' is idiomatic English and traditional. 'From Nazareth' stays slightly closer to the Greek without sounding unnatural.
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - as
  lexicon: BDAG
  rationale: 'In this compressed accusative-and-infinitive-like report structure after the preceding context, ὡς introduces the content about Jesus: ''how God anointed him.'' ''How'' communicates explanatory narration better than a flat ''that'' and avoids the comparative sense of ''as''.'
- source_word: ἔχρισεν
  chosen: anointed
  alternatives:
  - appointed
  - consecrated
  lexicon: BDAG
  rationale: χρίω literally means 'anoint.' This preserves the messianic and Spirit-endowment resonance of the verb without importing the title 'Messiah' into the verse where Χριστός does not occur.
- source_word: πνεύματι ἁγίῳ
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: The dative phrase refers to the divine person, not merely a quality or disposition. Including the article in English is idiomatic and reflects standard personal reference.
- source_word: καὶ δυνάμει
  chosen: and with power
  alternatives:
  - and power
  - and with miraculous power
  lexicon: BDAG
  rationale: The repeated instrumental sense is brought out in English with 'with.' 'Power' is broad enough to include divine empowerment without narrowing it to miracles alone.
- source_word: διῆλθεν
  chosen: went about
  alternatives:
  - went through
  - traveled around
  lexicon: BDAG
  rationale: The idiom here describes Jesus' itinerant activity. 'Went about' is natural English and captures repeated movement from place to place.
- source_word: εὐεργετῶν
  chosen: doing good
  alternatives:
  - benefiting others
  - doing what is good
  lexicon: BDAG
  rationale: The participle denotes beneficent action. 'Doing good' is concise, idiomatic, and preserves the broad moral and practical sense.
- source_word: ἰώμενος
  chosen: healing
  alternatives:
  - curing
  - restoring
  lexicon: BDAG
  rationale: The middle participle commonly refers to healing. 'Healing' is the most direct and natural rendering in this context.
- source_word: πάντας τοὺς καταδυναστευομένους
  chosen: all who were oppressed
  alternatives:
  - all those being oppressed
  - everyone who was tyrannized
  lexicon: BDAG
  rationale: The participle conveys those under harsh domination. 'Oppressed' is clear modern English and fits both physical and spiritual affliction in context.
- source_word: ὑπὸ τοῦ διαβόλου
  chosen: by the devil
  alternatives:
  - by the slanderer
  lexicon: BDAG
  rationale: διάβολος here is the personal evil being, not merely a descriptive label. 'The devil' is the standard and clearest rendering.
- source_word: ὅτι ὁ θεὸς ἦν μετ’ αὐτοῦ
  chosen: because God was with him
  alternatives:
  - for God was with him
  - since God was with him
  lexicon: BDAG
  rationale: ὅτι gives the reason or ground for Jesus' effective ministry. 'Because' makes the causal force explicit in contemporary English.
