  from: Jesus from Nazareth—how God anointed him with the Holy Spirit and with power—who went about doing good and healing all who were oppressed by the devil, because God was with him.
  to: 'Jesus of Nazareth: how God anointed him with the Holy Spirit and with power; he went about doing good and healing all who were oppressed by the devil, because God was with him.'
  rationale: The current rendering uses em-dashes to create a parenthetical clause, which is syntactically awkward and separates the relative pronoun 'who' from its antecedent 'Jesus' in a confusing way. The Greek structure, with an object followed by a 'ὡς' clause and a 'ὃς' clause, is better represented in English by using a colon to introduce the explanation and a semicolon to connect the two main descriptive clauses. Rendering the relative pronoun 'ὃς' as the personal pronoun 'he' is a standard and effective technique for improving clarity and flow in such cases. Using the more idiomatic 'of Nazareth' (already in a footnote) also enhances the naturalness of the English.
