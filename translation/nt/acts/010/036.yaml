id: ACT.10.36
reference: Acts 10:36
source:
  edition: SBLGNT
  text: τὸν λόγον ⸀ὃν ἀπέστειλεν τοῖς υἱοῖς Ἰσραὴλ εὐαγγελιζόμενος εἰρήνην διὰ Ἰησοῦ
    Χριστοῦ· οὗτός ἐστιν πάντων κύριος.
translation:
  text: the message that he sent to the sons of Israel, proclaiming peace through
    Jesus the Messiah—this one is Lord of all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the word that he sent to the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus the Messiah' here because Χριστός
      functions as a title.
    reason: alternative_reading
  - marker: c
    text: 'Or, ''he is Lord of all.'' The Greek has an emphatic demonstrative: ''this
      one is Lord of all.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον
  chosen: message
  alternatives:
  - word
  lexicon: BDAG
  rationale: In this context λόγος refers to the content of what God sent to Israel,
    not a single spoken word. 'Message' is more natural English while preserving the
    sense of a communicated proclamation.
- source_word: ὃν ἀπέστειλεν
  chosen: that he sent
  alternatives:
  - which he sent
  lexicon: BDAG
  rationale: A straightforward relative clause. 'That he sent' is idiomatic modern
    English and preserves the referential link to 'message.' The implied subject is
    God from the larger sentence context.
- source_word: τοῖς υἱοῖς Ἰσραήλ
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the people of Israel
  lexicon: BDAG
  rationale: The Greek is explicitly 'sons,' and the translation philosophy prefers
    gender-accurate renderings rather than flattening to a neutral collective unless
    context demands it. The phrase is a conventional designation for Israel and remains
    understandable in English.
- source_word: εὐαγγελιζόμενος
  chosen: proclaiming
  alternatives:
  - preaching good news of
  - announcing good news of
  lexicon: BDAG
  rationale: The participle carries the sense of announcing good news. 'Proclaiming'
    fits smooth English in apposition to the sending of the message, while the good-news
    nuance is carried by the content 'peace through Jesus the Messiah.'
- source_word: εἰρήνην
  chosen: peace
  lexicon: BDAG
  rationale: Standard rendering. It includes reconciliation and well-being in biblical
    usage, but 'peace' is the proper direct equivalent here.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus the Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here the phrase identifies Jesus as the messianic agent through whom
    peace is proclaimed, so the titular sense is strong.
- source_word: οὗτός
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: The demonstrative is emphatic. 'This one' preserves the force better
    than a simple pronoun, though it is slightly marked in English; the markedness
    reflects the Greek emphasis.
- source_word: πάντων κύριος
  chosen: Lord of all
  alternatives:
  - Lord over all
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the doctrinal default. 'Of all' is the
    most direct rendering of the genitive πάντων and communicates universal lordship.
