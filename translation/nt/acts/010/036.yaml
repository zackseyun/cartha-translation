theological_decisions:
- issue: Rendering Χριστοῦ in Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the stated default for Χριστός, the title is translated rather
    than transliterated when the titular sense is active. In Peter's speech to a Jewish/God-fearing
    audience, the messianic sense is especially relevant.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Rendering κύριος in πάντων κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal default for κύριος is 'Lord.' In this christological statement,
    'Lord' best preserves both authority and the theological weight of Jesus' universal
    lordship without reducing it to merely social mastery.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
- issue: Preserving the force of οὗτός ἐστιν πάντων κύριος
  chosen_reading: this one is Lord of all
  alternative_readings:
  - he is Lord of all
  rationale: The Greek demonstrative adds emphasis to Jesus himself as the referent.
    Retaining that emphasis avoids flattening the christological assertion while not
    adding doctrinal content beyond the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
