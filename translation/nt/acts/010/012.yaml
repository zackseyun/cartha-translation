id: ACT.10.12
reference: Acts 10:12
source:
  edition: SBLGNT
  text: ἐν ᾧ ὑπῆρχεν πάντα τὰ τετράποδα ⸂καὶ ἑρπετὰ τῆς γῆς καὶ⸃ πετεινὰ τοῦ οὐρανοῦ.
translation:
  text: In it were all the four-footed animals and reptiles of the earth, and birds
    of the sky.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which.'
    reason: lexical_alternative
  - marker: b
    text: Or 'creeping things of the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'birds of heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: In it
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative pronoun refers back to the sheet/container seen in Peter's
    vision. 'In it' is more natural modern English than the more formal 'in which'
    while preserving the locative sense.
- source_word: ὑπῆρχεν
  chosen: were
  alternatives:
  - there were
  - contained
  lexicon: BDAG
  rationale: The imperfect of ὑπάρχω here denotes existence/presence within the vessel.
    'Were' is the most straightforward English rendering. 'Contained' is interpretive
    and slightly stronger than the Greek.
- source_word: πάντα
  chosen: all
  alternatives:
  - every kind of
  lexicon: BDAG
  rationale: πάντα modifies the listed animal categories comprehensively. 'All' preserves
    the broad scope without adding the interpretive nuance 'every kind of,' though
    that idea may be contextually implied.
- source_word: τὰ τετράποδα
  chosen: the four-footed animals
  alternatives:
  - four-footed creatures
  - quadrupeds
  lexicon: BDAG
  rationale: τετράποδα refers to animals with four feet. 'Four-footed animals' is
    clear, natural English and avoids the technical feel of 'quadrupeds.' The article
    is retained in idiomatic English as part of the noun phrase.
- source_word: ἑρπετὰ τῆς γῆς
  chosen: reptiles of the earth
  alternatives:
  - creeping things of the earth
  - ground creatures
  lexicon: BDAG
  rationale: ἑρπετά can denote creeping things broadly, but 'reptiles' is a concise
    and common rendering in English Bible tradition. 'Of the earth' preserves the
    genitive and echoes the classification language of land creatures.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: birds of the sky
  alternatives:
  - birds of heaven
  - flying creatures of the sky
  lexicon: BDAG
  rationale: πετεινά denotes birds/flying creatures; in this list 'birds' is the most
    natural and sufficiently precise rendering. τοῦ οὐρανοῦ is rendered 'of the sky'
    in contemporary English, though 'of heaven' is a more literal alternative.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates the listed groups. Standard English list
    syntax with repeated 'and' best reflects the Greek structure without overformalizing
    it.
