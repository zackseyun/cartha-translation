theological_decisions:
- issue: Purity-language rendering in Peter's vision
  chosen_reading: Retain 'common' rather than replacing it with 'unclean' in the main
    text.
  alternative_readings:
  - you must not call unclean
  - do not treat as impure
  rationale: The verse contrasts κοινόω with καθαρίζω. Rendering κοινόω as 'common'
    preserves the specific purity-category language and avoids flattening the distinction
    between 'common' and 'unclean' that is important in the vision's logic. More interpretive
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
