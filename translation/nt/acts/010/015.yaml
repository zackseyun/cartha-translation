id: ACT.10.15
reference: Acts 10:15
source:
  edition: SBLGNT
  text: καὶ φωνὴ πάλιν ἐκ δευτέρου πρὸς αὐτόν· Ἃ ὁ θεὸς ἐκαθάρισεν σὺ μὴ κοίνου.
translation:
  text: 'And a voice came to him again a second time: “What God has made clean, you
    must not call common.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you must not call unclean” or “do not treat as impure.”
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - the voice
  lexicon: BDAG
  rationale: Anarthrous noun naturally rendered indefinitely in English here; the
    focus is on the repeated heavenly utterance rather than identifying the speaker
    by title.
- source_word: πάλιν ἐκ δευτέρου
  chosen: again a second time
  alternatives:
  - again
  - for the second time
  - a second time
  lexicon: BDAG
  rationale: The combination is somewhat emphatic and redundant in Greek; rendering
    both elements preserves the repetition without awkwardness.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: Idiomatic English for speech directed at Peter.
- source_word: Ἃ
  chosen: What
  alternatives:
  - The things that
  - Those things which
  lexicon: BDAG
  rationale: Neuter plural relative pronoun used in a generalizing sense; 'What' is
    natural English and captures the object set collectively.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: English normally omits the article with 'God' when referring to the one
    true God.
- source_word: ἐκαθάρισεν
  chosen: has made clean
  alternatives:
  - has cleansed
  - made clean
  lexicon: BDAG
  rationale: Aorist indicative refers to God's decisive act; English present perfect
    fits the force in this direct saying and reads naturally. 'Made clean' is more
    accessible than 'cleansed' while preserving ritual-purity resonance.
- source_word: σὺ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek; English can carry the command
    naturally with 'you' without overemphasis.
- source_word: μὴ κοίνου
  chosen: must not call common
  alternatives:
  - must not make common
  - do not treat as unclean
  - must not profane
  lexicon: BDAG
  rationale: κοινόω in purity contexts means to make or regard as common/defiled.
    'Call common' best reflects the semantic contrast with God's cleansing and Peter's
    evaluative stance. 'Unclean' is interpretive and overlaps more directly with ἀκάθαρτος
    than κοινός.
