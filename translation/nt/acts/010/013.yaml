id: ACT.10.13
reference: Acts 10:13
source:
  edition: SBLGNT
  text: καὶ ἐγένετο φωνὴ πρὸς αὐτόν· Ἀναστάς, Πέτρε, θῦσον καὶ φάγε.
translation:
  text: 'And a voice came to him: “Get up, Peter; kill and eat.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sacrifice and eat.” The verb translated “kill” can also mean “sacrifice,”
      but here it most likely refers to slaughtering an animal for food in the context
      of the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - there came
  - occurred
  - was
  lexicon: BDAG
  rationale: With φωνὴ as the subject, γίνομαι idiomatically introduces the arrival
    or occurrence of a voice/message. 'Came' is natural modern English and preserves
    the eventive sense better than the wooden 'there was' or 'it happened'.
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - a sound
  lexicon: BDAG
  rationale: In this revelatory context, φωνή refers to an articulate voice rather
    than a mere sound. The anarthrous noun is well rendered 'a voice.'
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: With speech, πρός + accusative commonly indicates direction toward a
    person in the sense of address. 'To him' is idiomatic English.
- source_word: Ἀναστάς
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: The aorist participle from ἀνίστημι functions imperativally in sequence
    with the following commands. 'Get up' is clear, natural modern English and fits
    the immediate command context.
- source_word: Πέτρε
  chosen: Peter
  lexicon: BDAG
  rationale: Vocative of the proper name Πέτρος; standard English transliteration
    is 'Peter,' in keeping with the philosophy of transliterating names.
- source_word: θῦσον
  chosen: kill
  alternatives:
  - slaughter
  - sacrifice
  lexicon: BDAG
  rationale: Although θύω can mean 'sacrifice,' in this vision context the command
    concerns preparing animals for food, as shown by the paired imperative 'and eat.'
    'Kill' best conveys the practical sense without importing cultic overtones into
    the main text. The sacrificial nuance is worth preserving in a footnote.
- source_word: φάγε
  chosen: eat
  alternatives:
  - have something to eat
  lexicon: BDAG
  rationale: Direct imperative from ἐσθίω; 'eat' is the straightforward and sufficiently
    natural rendering.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: The initial καί continues the narrative sequence. 'And' preserves the
    Greek connective without unnecessary interpretive expansion.
