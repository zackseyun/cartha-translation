theological_decisions:
- issue: Whether θῦσον should be rendered with sacrificial language
  chosen_reading: Rendered as 'kill' in the main text
  alternative_readings:
  - sacrifice
  - slaughter
  rationale: The immediate context is Peter's vision about animals and eating, not
    an instruction to perform a cultic sacrifice. Rendering θῦσον as 'sacrifice' in
    the main text could over-theologize the scene. Because the verb can carry sacrificial
    associations, that alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it where ambiguity is genuine.'
