theological_decisions:
- issue: Relation of Jewish boundary language to divine revelation
  chosen_reading: Render Peter's statement as describing what was regarded as unlawful
    for a Jewish man, while preserving God's correction that no person is to be called
    common or unclean.
  alternative_readings:
  - Render ἀθέμιτον more weakly as merely socially improper
  - Render Peter's conclusion in a way that erases the purity-language categories
  rationale: 'The verse reports Peter''s understanding of Jewish separation practices
    and then explicitly reframes his understanding through God''s revelation. The
    translation should neither soften the first clause into mere etiquette nor overstate
    it beyond the text. It should also preserve the human application of the vision:
    ''no person.'''
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
