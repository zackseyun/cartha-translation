id: ACT.10.28
reference: Acts 10:28
source:
  edition: SBLGNT
  text: ἔφη τε πρὸς αὐτούς· Ὑμεῖς ἐπίστασθε ὡς ἀθέμιτόν ἐστιν ἀνδρὶ Ἰουδαίῳ κολλᾶσθαι
    ἢ προσέρχεσθαι ἀλλοφύλῳ· κἀμοὶ ὁ θεὸς ἔδειξεν μηδένα κοινὸν ἢ ἀκάθαρτον λέγειν
    ἄνθρωπον·
translation:
  text: And he said to them, “You yourselves know how unlawful it is for a Jewish
    man to associate with or visit a foreigner; but God has shown me to call no person
    common or unclean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a Gentile” for “a foreigner” (ἀλλοφύλῳ), literally someone of another
      people.
    reason: lexical_alternative
  - marker: b
    text: “Common” translates κοινόν, a term distinct from “unclean” (ἀκάθαρτον);
      the pair preserves Jewish purity-language categories.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη τε
  chosen: And he said
  alternatives:
  - So he said
  - Then he said
  lexicon: BDAG
  rationale: A simple narrative introduction. τέ is lightly connective; 'And' preserves
    the flow without overinterpreting sequence.
- source_word: Ὑμεῖς ἐπίστασθε
  chosen: You yourselves know
  alternatives:
  - You know
  - You are aware
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, so 'yourselves' preserves that stress
    better than a bare 'you know'.
- source_word: ὡς ἀθέμιτόν ἐστιν
  chosen: how unlawful it is
  alternatives:
  - how forbidden it is
  - how improper it is
  lexicon: BDAG
  rationale: ἀθέμιτος denotes what is not permitted or contrary to accepted law/custom.
    'Unlawful' best captures the force here without reducing it to mere social impropriety.
- source_word: ἀνδρὶ Ἰουδαίῳ
  chosen: for a Jewish man
  alternatives:
  - for a Jew
  - for a Jewish male
  lexicon: BDAG
  rationale: The Greek is singular and explicitly masculine. 'Jewish man' preserves
    both the singular representative force and the gendered form, in keeping with
    the gender-accurate policy.
- source_word: κολλᾶσθαι
  chosen: to associate with
  alternatives:
  - to join oneself to
  - to keep company with
  lexicon: BDAG
  rationale: The verb literally suggests joining or attaching oneself, but in this
    social context 'associate with' communicates the relational sense naturally in
    English.
- source_word: ἢ προσέρχεσθαι
  chosen: or visit
  alternatives:
  - or approach
  - or go to
  lexicon: BDAG
  rationale: In context, the issue is entering or coming to a non-Jew's company/household.
    'Visit' expresses the practical sense more idiomatically than the more wooden
    'approach'.
- source_word: ἀλλοφύλῳ
  chosen: a foreigner
  alternatives:
  - someone of another nation
  - a Gentile
  lexicon: BDAG
  rationale: ἀλλόφυλος literally means one of another people/tribe. 'Foreigner' is
    concise and natural; 'Gentile' is possible but more interpretive and less directly
    lexical here.
- source_word: κἀμοὶ
  chosen: but ... me
  alternatives:
  - and to me
  - yet to me
  lexicon: BDAG
  rationale: The crasis means 'and to me,' but in English the clause contrast is best
    conveyed with 'but God has shown me,' marking the shift from common knowledge
    to Peter's divine correction.
- source_word: ὁ θεὸς ἔδειξεν
  chosen: God has shown me
  alternatives:
  - God showed me
  lexicon: BDAG
  rationale: English present perfect works well to express the abiding significance
    of the divine revelation for Peter's present action, though the Greek aorist itself
    is simple past.
- source_word: μηδένα ... ἄνθρωπον
  chosen: no person
  alternatives:
  - no man
  - no human being
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a human being generally, not specifically a male.
    'No person' preserves the inclusive sense in idiomatic English while remaining
    faithful to the referent.
- source_word: κοινὸν
  chosen: common
  alternatives:
  - defiled
  - profane
  lexicon: BDAG
  rationale: κοινός in Jewish purity contexts can mean common in the sense of ritually
    ordinary/profaned. 'Common' preserves the lexical distinction from ἀκάθαρτος rather
    than collapsing both into 'unclean.'
- source_word: ἢ ἀκάθαρτον
  chosen: or unclean
  alternatives:
  - or impure
  lexicon: BDAG
  rationale: ἀκάθαρτος is the standard purity term 'unclean.' Keeping 'common or unclean'
    preserves the paired categories in the Greek.
- source_word: λέγειν
  chosen: to call
  alternatives:
  - to say is
  - to describe as
  lexicon: BDAG
  rationale: 'Here λέγειν takes a double-accusative-like sense in context: to designate
    or call someone something. ''To call'' is the most natural English rendering.'
