id: ACT.10.11
reference: Acts 10:11
source:
  edition: SBLGNT
  text: καὶ θεωρεῖ τὸν οὐρανὸν ἀνεῳγμένον καὶ ⸀καταβαῖνον σκεῦός τι ὡς ὀθόνην μεγάλην
    τέσσαρσιν ⸀ἀρχαῖς καθιέμενον ἐπὶ τῆς γῆς,
translation:
  text: and he sees heaven opened, and something descending like a large sheet, being
    lowered by its four corners to the earth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sky opened.' The Greek οὐρανός can mean either 'sky' or 'heaven';
      here 'heaven' is chosen because the context is visionary and revelatory.
    reason: lexical_alternative
  - marker: b
    text: Or 'some object' or 'a vessel.' The Greek σκεῦός τι is intentionally indefinite.
    reason: lexical_alternative
  - marker: c
    text: Or 'being let down by its four ends.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖ
  chosen: he sees
  alternatives:
  - he observes
  - he beholds
  lexicon: BDAG
  rationale: Present-tense narrative verb rendered with vivid English present, matching
    Luke's style. 'Sees' is the most natural modern equivalent; 'beholds' is too archaic,
    and 'observes' is less immediate.
- source_word: οὐρανὸν ἀνεῳγμένον
  chosen: heaven opened
  alternatives:
  - the sky opened
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven.' In this visionary context, with a
    revelatory descent from above, 'heaven' better preserves the theological and narrative
    force than the merely meteorological 'sky.' The participle ἀνεῳγμένον is rendered
    adjectivally as 'opened.'
- source_word: καταβαῖνον
  chosen: descending
  alternatives:
  - coming down
  lexicon: BDAG
  rationale: Present participle describing the motion of the object. 'Descending'
    is slightly more formal but concise and fits the visionary register; 'coming down'
    is possible but less compact.
- source_word: σκεῦός τι
  chosen: something
  alternatives:
  - some object
  - a vessel
  - a container
  lexicon: BDAG
  rationale: σκεῦος is broad ('object, vessel, container, implement'). Because the
    following comparison 'like a large sheet' clarifies appearance rather than function,
    an overly specific term like 'vessel' or 'container' would mislead. 'Something'
    preserves the indefiniteness of σκεῦός τι in idiomatic English.
- source_word: ὡς ὀθόνην μεγάλην
  chosen: like a large sheet
  alternatives:
  - like a great sheet
  - like a large linen cloth
  lexicon: BDAG
  rationale: ὀθόνη denotes a sheet or sail-cloth/linen cloth. 'Large sheet' is clear
    modern English and preserves the simile introduced by ὡς. 'Great sheet' is traditional
    but less natural today; 'linen cloth' may over-specify the material.
- source_word: τέσσαρσιν ἀρχαῖς
  chosen: by its four corners
  alternatives:
  - by four corners
  - by its four ends
  lexicon: BDAG
  rationale: ἀρχή here refers to extremities/ends. In the context of a sheet-like
    object, 'corners' is the most natural English expression. 'Its' is supplied for
    idiomatic English, referring back to the sheet-like object.
- source_word: καθιέμενον
  chosen: being lowered
  alternatives:
  - being let down
  - being lowered down
  lexicon: BDAG
  rationale: Passive participle of καθίημι, describing the object's movement downward.
    'Being lowered' is natural modern English; 'being let down' is also possible and
    traditional, but slightly less precise in contemporary usage.
- source_word: ἐπὶ τῆς γῆς
  chosen: to the earth
  alternatives:
  - to the ground
  - upon the earth
  lexicon: BDAG
  rationale: With a verb of downward motion, ἐπί can indicate movement toward/upon.
    'To the earth' preserves the broader sense and echoes the elevated register of
    the vision. 'To the ground' is possible but more mundane and local.
