theological_decisions:
- issue: Rendering οὐρανός in a visionary context
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: The scene is a divine vision, and the opened realm from which the object
    descends is best rendered 'heaven' rather than 'sky.' This preserves the revelatory
    dimension without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy) and §6
    (Readable modern English)
