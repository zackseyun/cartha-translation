id: ACT.10.40
reference: Acts 10:40
source:
  edition: SBLGNT
  text: τοῦτον ὁ θεὸς ἤγειρεν ⸀τῇ τρίτῃ ἡμέρᾳ καὶ ἔδωκεν αὐτὸν ἐμφανῆ γενέσθαι,
translation:
  text: God raised this one on the third day and granted him to become visible,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'him' or 'this man' for 'this one'; the Greek demonstrative is emphatic.
    reason: lexical_alternative
  - marker: b
    text: Or 'gave him to appear' or 'made him manifest.' The Greek says literally
      'gave him to become visible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  chosen: this one
  alternatives:
  - him
  - this man
  lexicon: BDAG
  rationale: Fronted demonstrative gives emphasis to the specific person just mentioned
    (Jesus). 'This one' preserves the demonstrative force more clearly than a simple
    pronoun, while remaining natural enough in English.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject with article; English does not require
    the article here.
- source_word: ἤγειρεν
  chosen: raised
  alternatives:
  - raised up
  lexicon: BDAG
  rationale: In resurrection context, ἐγείρω is best rendered 'raise.' 'Raised' is
    idiomatic and theologically precise without adding interpretive material.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after
  - the third day
  lexicon: BDAG
  rationale: Dative of time is naturally rendered 'on the third day.' This preserves
    the temporal expression without over-specifying the reckoning.
- source_word: ἔδωκεν
  chosen: granted
  alternatives:
  - gave
  - caused
  lexicon: BDAG
  rationale: With complementary infinitive construction, δίδωμι here conveys granting
    or allowing something to happen. 'Granted' is more idiomatic in English than the
    wooden 'gave him to become visible' and avoids overstating causation.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; standard pronoun rendering.
- source_word: ἐμφανῆ
  chosen: visible
  alternatives:
  - manifest
  - plain to see
  - openly seen
  lexicon: BDAG
  rationale: ἐμφανής means visible, manifest, evident. 'Visible' fits the infinitival
    construction smoothly in English and preserves the idea that the risen Jesus was
    made perceptible/seen.
- source_word: γενέσθαι
  chosen: to become
  alternatives:
  - to be
  - to appear
  lexicon: BDAG
  rationale: γίνομαι fundamentally means 'become' or 'come to be.' Retaining 'to become'
    keeps the verbal nuance rather than collapsing it into a stative 'to be.'
