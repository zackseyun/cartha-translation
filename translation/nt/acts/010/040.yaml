theological_decisions:
- issue: Resurrection wording
  chosen_reading: God raised this one on the third day
  alternative_readings:
  - God raised him up on the third day
  rationale: The Greek explicitly states divine action in Jesus's resurrection. The
    translation preserves that claim directly without embellishment. 'This one' retains
    the demonstrative emphasis from the source text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Visibility after resurrection
  chosen_reading: granted him to become visible
  alternative_readings:
  - caused him to appear
  - made him manifest
  rationale: The text does not merely say that Jesus rose, but that God gave/granted
    him to become manifest. This wording preserves the distinction between resurrection
    and post-resurrection appearing, without importing later doctrinal formulations
    beyond the verse itself.
  doctrine_reference: 'Translation philosophy #1 and #3'
