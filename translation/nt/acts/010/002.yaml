id: ACT.10.2
reference: Acts 10:2
source:
  edition: SBLGNT
  text: εὐσεβὴς καὶ φοβούμενος τὸν θεὸν σὺν παντὶ τῷ οἴκῳ αὐτοῦ, ⸀ποιῶν ἐλεημοσύνας
    πολλὰς τῷ λαῷ καὶ δεόμενος τοῦ θεοῦ διὰ παντός,
translation:
  text: devout and fearing God with all his household, doing many acts of charity
    for the people and praying to God continually,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God-fearing.' The phrase may also function as a recognizable description
      for a Gentile who worshiped the God of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'many alms.' The Greek term often refers specifically to charitable gifts
      for the needy.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσεβὴς
  chosen: devout
  alternatives:
  - pious
  - godly
  lexicon: BDAG
  rationale: Describes reverence expressed in religious life. 'Devout' is natural
    modern English and fits Luke-Acts usage without sounding archaic like 'pious'
    can.
- source_word: φοβούμενος τὸν θεὸν
  chosen: fearing God
  alternatives:
  - God-fearing
  - revering God
  lexicon: BDAG
  rationale: A participial expression commonly used for reverence toward God. 'Fearing
    God' preserves the verbal form and biblical idiom better than flattening it to
    merely 'revering God.' 'God-fearing' is possible but less directly tied to the
    Greek syntax here.
- source_word: σὺν παντὶ τῷ οἴκῳ αὐτοῦ
  chosen: with all his household
  alternatives:
  - together with his whole household
  - with all his house
  lexicon: BDAG
  rationale: οἶκος here refers to the household, not merely the physical house. 'With
    all his household' is concise and idiomatic, preserving the social unit in view.
- source_word: ποιῶν
  chosen: doing
  alternatives:
  - giving
  - performing
  lexicon: BDAG
  rationale: The present participle is retained with 'doing' to mirror the descriptive
    string of participles in Greek. Although English could say 'giving,' the object
    ἐλεημοσύνας already carries the charitable sense.
- source_word: ἐλεημοσύνας πολλὰς
  chosen: many acts of charity
  alternatives:
  - many alms
  - many charitable deeds
  lexicon: BDAG
  rationale: ἐλεημοσύνη often refers to almsgiving. 'Acts of charity' communicates
    the sense clearly in modern English without the less familiar ecclesiastical term
    'alms,' while preserving plurality and abundance with 'many.'
- source_word: τῷ λαῷ
  chosen: for the people
  alternatives:
  - to the people
  lexicon: BDAG
  rationale: The dative here marks the beneficiaries of his charitable giving. 'For
    the people' expresses that beneficiary sense more naturally in English than 'to
    the people,' though both are possible.
- source_word: δεόμενος τοῦ θεοῦ
  chosen: praying to God
  alternatives:
  - imploring God
  - petitioning God
  lexicon: BDAG
  rationale: δέομαι can mean to ask, implore, or pray. In this context of Cornelius's
    piety, 'praying to God' is the clearest and most natural rendering.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - constantly
  - at all times
  lexicon: BDAG
  rationale: This idiom denotes ongoing regularity. 'Continually' is idiomatic and
    suitably weighty without overstating an unbroken action.
