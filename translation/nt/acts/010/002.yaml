theological_decisions:
- issue: Rendering the God-fear terminology for Cornelius
  chosen_reading: fearing God
  alternative_readings:
  - God-fearing
  - revering God
  rationale: The phrase likely carries both ordinary reverence and the recognizable
    Second Temple/Jewish synagogue-associated description of a Gentile who worships
    Israel's God. The main text preserves the literal verbal expression without overtechnical
    labeling, allowing the historical nuance to remain available without importing
    more specificity than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
