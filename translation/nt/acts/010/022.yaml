id: ACT.10.22
reference: Acts 10:22
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Κορνήλιος ἑκατοντάρχης, ἀνὴρ δίκαιος καὶ φοβούμενος τὸν θεὸν
    μαρτυρούμενός τε ὑπὸ ὅλου τοῦ ἔθνους τῶν Ἰουδαίων, ἐχρηματίσθη ὑπὸ ἀγγέλου ἁγίου
    μεταπέμψασθαί σε εἰς τὸν οἶκον αὐτοῦ καὶ ἀκοῦσαι ῥήματα παρὰ σοῦ.
translation:
  text: They said, “Cornelius, a centurion, a righteous man and one who fears God,
    and who is well spoken of by the whole nation of the Jews, was divinely instructed
    by a holy angel to summon you to his house and to hear words from you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by all the Jewish people.” The Greek says “by the whole nation of the
      Jews,” where “nation” refers to a people-group, not necessarily a modern political
      state.
    reason: lexical_alternative
  - marker: b
    text: Or “was warned” or “received a divine message.” The Greek verb indicates
      a divine communication.
    reason: lexical_alternative
  - marker: c
    text: Or “to summon you.”
    reason: lexical_alternative
  - marker: d
    text: Or “to hear a message from you.” Literally, “to hear words from you.”
    reason: lexical_alternative
  - marker: e
    text: Or 'to send for you to come to his house'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - commander of a hundred
  lexicon: BDAG
  rationale: Standard historical term for a Roman officer over roughly one hundred
    soldiers; established and precise in English.
- source_word: ἀνὴρ δίκαιος
  chosen: a righteous man
  alternatives:
  - a just man
  - an upright man
  lexicon: BDAG
  rationale: δίκαιος commonly means righteous/just. 'Righteous' best preserves the
    moral-religious sense in this Jewish-Christian context, while ἀνήρ is naturally
    'man' here, referring specifically to Cornelius.
- source_word: φοβούμενος τὸν θεόν
  chosen: one who fears God
  alternatives:
  - God-fearing
  - devout toward God
  lexicon: BDAG
  rationale: This phrase can function almost as a recognized description of a Gentile
    reverer of Israel's God. 'One who fears God' preserves the verbal force and the
    biblical idiom without over-paraphrasing.
- source_word: μαρτυρούμενος
  chosen: who is well spoken of
  alternatives:
  - well attested
  - having a good reputation
  - commended
  lexicon: BDAG
  rationale: The passive participle indicates receiving favorable testimony. 'Well
    spoken of' is idiomatic modern English and fits the social-reputational sense
    in context.
- source_word: ὑπὸ ὅλου τοῦ ἔθνους τῶν Ἰουδαίων
  chosen: by the whole nation of the Jews
  alternatives:
  - by all the Jewish people
  - by the whole people of the Jews
  lexicon: BDAG
  rationale: ἔθνος here refers to a people-group rather than a modern nation-state.
    'Nation of the Jews' is a fairly formal rendering that stays close to the Greek
    while remaining understandable.
- source_word: ἐχρηματίσθη
  chosen: was divinely instructed
  alternatives:
  - was warned
  - was directed
  - received a divine message
  lexicon: BDAG
  rationale: In this context χρηματίζω refers to receiving a divine communication.
    'Divinely instructed' captures the passive and the heavenly source without narrowing
    it merely to warning.
- source_word: ἀγγέλου ἁγίου
  chosen: by a holy angel
  alternatives:
  - by an angel
  - by a sacred angel
  lexicon: BDAG
  rationale: The adjective ἁγίου is present and should be represented. 'Holy angel'
    is natural English and preserves the explicit characterization.
- source_word: μεταπέμψασθαί σε
  chosen: to send for you to come
  alternatives:
  - to summon you
  - to send for you
  lexicon: BDAG
  rationale: μεταπέμπομαι means to send for or summon. Because English 'send for you'
    can leave the purpose implicit, 'to come' is supplied from the context of coming
    to his house and makes the infinitive sequence read naturally.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  chosen: to his house
  alternatives:
  - into his house
  - to his home
  lexicon: BDAG
  rationale: With μεταπέμψασθαί, the destination is naturally rendered 'to his house.'
    'House' preserves the concrete sense of οἶκος.
- source_word: ἀκοῦσαι ῥήματα παρὰ σοῦ
  chosen: to hear words from you
  alternatives:
  - to hear what you have to say
  - to hear a message from you
  lexicon: BDAG
  rationale: ῥήματα is literally 'words' or 'sayings.' 'To hear words from you' stays
    close to the Greek and avoids over-specifying the content as a formal sermon or
    message.
