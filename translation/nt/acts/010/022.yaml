theological_decisions:
- issue: Rendering Cornelius's piety without importing later doctrinal categories
  chosen_reading: a righteous man and one who fears God
  alternative_readings:
  - a devout man
  - a just and God-fearing man
  rationale: The verse describes Cornelius in Jewish moral-religious terms but does
    not define his covenantal status or salvation. The translation preserves the text's
    commendation without adding theological conclusions beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it.
