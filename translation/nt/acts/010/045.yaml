id: ACT.10.45
reference: Acts 10:45
source:
  edition: SBLGNT
  text: καὶ ἐξέστησαν οἱ ἐκ περιτομῆς πιστοὶ ⸀ὅσοι συνῆλθαν τῷ Πέτρῳ, ὅτι καὶ ἐπὶ
    τὰ ἔθνη ἡ δωρεὰ τοῦ ⸂ἁγίου πνεύματος⸃ ἐκκέχυται·
translation:
  text: And the believers from the circumcision who had come with Peter were astonished,
    because the gift of the Holy Spirit had been poured out even on the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the circumcised believers.' Literally, 'the believers from the circumcision.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''also on the Gentiles''; the Greek can express addition, but here likely
      carries the sense of surprise: ''even on the Gentiles.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'has been poured out.' The Greek perfect highlights a completed action
      with continuing result.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέστησαν
  chosen: were astonished
  alternatives:
  - were amazed
  - were beside themselves
  lexicon: BDAG
  rationale: The aorist of ἐξίστημι here expresses strong amazement or astonishment.
    'Were astonished' is natural modern English and preserves the force without sounding
    idiomatic to the point of obscurity ('were beside themselves').
- source_word: οἱ ἐκ περιτομῆς πιστοὶ
  chosen: the believers from the circumcision
  alternatives:
  - the circumcised believers
  - the believers of the circumcision
  lexicon: BDAG
  rationale: Literally 'the faithful/believers from the circumcision.' This refers
    to Jewish believers as a group identified by circumcision. 'From the circumcision'
    preserves the Greek construction and its group identity nuance better than flattening
    it to merely 'circumcised believers,' while remaining understandable.
- source_word: ὅσοι συνῆλθαν τῷ Πέτρῳ
  chosen: who had come with Peter
  alternatives:
  - as many as had accompanied Peter
  - who came together with Peter
  lexicon: BDAG
  rationale: The clause specifies which believers are in view. 'Had come with Peter'
    is idiomatic English for the aorist συνῆλθαν with dative, preserving accompaniment
    without awkward literalism.
- source_word: καὶ ἐπὶ τὰ ἔθνη
  chosen: even on the Gentiles
  alternatives:
  - also on the Gentiles
  - even on the nations
  lexicon: BDAG
  rationale: ἔθνη in Acts commonly refers to non-Jews, so 'Gentiles' is the contextually
    accurate rendering. καὶ here has an emphatic/additive sense; 'even' best conveys
    the surprise highlighted by the verse.
- source_word: ἡ δωρεὰ
  chosen: the gift
  alternatives:
  - the free gift
  lexicon: BDAG
  rationale: δωρεά denotes a gift freely given. 'The gift' is the standard, clear
    rendering; the freeness is already inherent and need not be made explicit in English
    here.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: of the Holy Spirit
  alternatives:
  - of the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the genitive phrase. 'Holy Spirit'
    is clear modern English and fits ecumenical Christian usage.
- source_word: ἐκκέχυται
  chosen: had been poured out
  alternatives:
  - has been poured out
  - was poured out
  lexicon: BDAG
  rationale: The perfect passive indicates a completed action with present/resulting
    significance. In English narrative style after 'were astonished, because,' the
    pluperfect 'had been poured out' reads naturally while still conveying that the
    outpouring had occurred and its effects were evident. 'Has been poured out' is
    also possible but slightly less smooth in this narrative context.
