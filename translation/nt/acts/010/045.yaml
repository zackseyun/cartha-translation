theological_decisions:
- issue: Rendering of ἔθνη in a salvation-historical context
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In Acts 10 the contrast is between Jewish believers and non-Jews receiving
    the Spirit. 'Gentiles' communicates the intended referent more precisely than
    the broader 'nations.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    plain sense in context.'
- issue: Aspect of ἐκκέχυται
  chosen_reading: had been poured out
  alternative_readings:
  - has been poured out
  rationale: The Greek perfect emphasizes the accomplished outpouring and its continuing
    result. English narrative idiom favors 'had been poured out' in relation to the
    observers' astonishment, without denying the ongoing effect.
  doctrine_reference: 'Translation philosophy: optimal equivalence.'
