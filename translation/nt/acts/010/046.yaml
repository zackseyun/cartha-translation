id: ACT.10.46
reference: Acts 10:46
source:
  edition: SBLGNT
  text: ἤκουον γὰρ αὐτῶν λαλούντων γλώσσαις καὶ μεγαλυνόντων τὸν θεόν. τότε ⸀ἀπεκρίθη
    Πέτρος·
translation:
  text: 'For they were hearing them speaking in tongues and magnifying God. Then Peter
    answered:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in languages." The Greek word can refer to tongues or languages; the
      phrase here is left broad rather than resolving the nature of the speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουον
  chosen: they were hearing
  alternatives:
  - they heard
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or durative action; 'were hearing'
    preserves the aspect better than simple past 'heard,' though English may also
    smooth it idiomatically.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the explanatory ground for the preceding statement; 'for' is
    a natural and sufficiently formal connective here.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - those people
  - the Gentiles
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and refers to the people just mentioned;
    'them' preserves the anaphoric reference without importing an interpretive noun
    into the text.
- source_word: λαλούντων
  chosen: speaking
  alternatives:
  - talking
  lexicon: BDAG
  rationale: Present participle coordinated with μεγαλυνόντων; 'speaking' is the standard
    rendering for λαλέω and fits the construction 'hearing them speaking...'.
- source_word: γλώσσαις
  chosen: in tongues
  alternatives:
  - in languages
  lexicon: BDAG
  rationale: γλῶσσα can mean either 'tongue' or 'language.' In Acts, the phrase λαλεῖν
    γλώσσαις is a recognized expression. 'In tongues' preserves the established idiom
    and the text's ambiguity about whether the emphasis is ecstatic speech, known
    languages, or both; the lexical alternative is preserved in a footnote.
- source_word: μεγαλυνόντων
  chosen: magnifying
  alternatives:
  - extolling
  - praising
  lexicon: BDAG
  rationale: μεγαλύνω means to make great, magnify, extol. 'Magnifying' closely follows
    the Greek and preserves the verbal link to biblical praise language without over-paraphrasing.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of μεγαλυνόντων; standard rendering.
- source_word: τότε
  chosen: Then
  alternatives:
  - at that point
  lexicon: BDAG
  rationale: τότε marks the next event in sequence; 'Then' is concise and natural.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - responded
  - said
  lexicon: BDAG
  rationale: ἀποκρίνομαι commonly means 'answer' or 'respond.' 'Answered' is the more
    direct lexical equivalent, even though no explicit prior question is stated.
- source_word: Πέτρος
  chosen: Peter
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Πέτρος.
