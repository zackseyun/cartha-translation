theological_decisions:
- issue: Rendering of γλώσσαις in a Pentecostal/charismatic context
  chosen_reading: in tongues
  alternative_readings:
  - in languages
  rationale: The phrase is lexically capable of meaning 'languages,' but in Acts it
    functions as a recognizable expression tied to Spirit-enabled speech. To avoid
    prematurely resolving a debated theological interpretation while still preserving
    the idiom of the Greek, the main text uses 'in tongues' and the alternative is
    preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
