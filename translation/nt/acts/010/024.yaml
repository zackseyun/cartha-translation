id: ACT.10.24
reference: Acts 10:24
source:
  edition: SBLGNT
  text: ⸂τῇ δὲ⸃ ἐπαύριον ⸀εἰσῆλθεν εἰς τὴν Καισάρειαν. ὁ δὲ Κορνήλιος ἦν προσδοκῶν
    αὐτοὺς συγκαλεσάμενος τοὺς συγγενεῖς αὐτοῦ καὶ τοὺς ἀναγκαίους φίλους.
translation:
  text: On the next day he entered Caesarea. Now Cornelius was expecting them and
    had called together his relatives and close friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek has the singular verb 'he entered' but later the plural pronoun 'them,'
      likely focusing on Peter as the principal figure while including his companions
      in Cornelius's expectation.
    reason: textual_variant
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  chosen: On the next day
  alternatives:
  - The next day
  - On the following day
  lexicon: BDAG
  rationale: Idiomatic temporal expression with the article plus ἐπαύριον meaning
    'on the next/following day.' 'On the next day' is natural English and preserves
    the narrative sequence marked by δέ without overtranslating it.
- source_word: εἰσῆλθεν
  chosen: he entered
  alternatives:
  - he went into
  - they entered
  lexicon: BDAG
  rationale: Aorist active indicative singular of εἰσέρχομαι, straightforwardly 'he
    entered' or 'he went into.' Singular is retained because the verb is singular
    in the SBLGNT text. Although the object pronoun later is plural ('them'), the
    main clause here is singular, likely focusing on Peter as the principal actor.
- source_word: Καισάρειαν
  chosen: Caesarea
  alternatives:
  - Cesarea
  rationale: Standard English transliteration of the place name Καισάρεια.
- source_word: ὁ δὲ Κορνήλιος
  chosen: Now Cornelius
  alternatives:
  - And Cornelius
  - But Cornelius
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition. 'Now Cornelius' is idiomatic
    English that signals the shift of focus without implying strong contrast.
- source_word: ἦν προσδοκῶν
  chosen: was expecting
  alternatives:
  - was waiting for
  - was looking forward to
  lexicon: BDAG
  rationale: Periphrastic imperfect expressing ongoing expectation. 'Was expecting'
    captures both the progressive aspect and the anticipatory sense of προσδοκάω better
    than the flatter 'was waiting for.'
- source_word: αὐτούς
  chosen: them
  alternatives:
  - him
  lexicon: BDAG
  rationale: The Greek pronoun is explicitly plural accusative. The translation preserves
    the plural, likely referring to Peter and those accompanying him, even though
    the preceding verb is singular.
- source_word: συγκαλεσάμενος
  chosen: had called together
  alternatives:
  - having summoned together
  - after calling together
  - having invited
  lexicon: BDAG
  rationale: Aorist middle participle antecedent to the main imperfect, indicating
    action completed prior to or attendant with Cornelius's waiting. 'Had called together'
    communicates the prior action smoothly in English narrative style.
- source_word: τοὺς συγγενεῖς αὐτοῦ
  chosen: his relatives
  alternatives:
  - his kinsmen
  - his family members
  lexicon: BDAG
  rationale: συγγενεῖς denotes relatives/kinsmen. 'His relatives' is clear modern
    English without archaic tone.
- source_word: τοὺς ἀναγκαίους φίλους
  chosen: close friends
  alternatives:
  - intimate friends
  - necessary friends
  - special friends
  lexicon: BDAG
  rationale: ἀναγκαῖος with φίλος idiomatically refers to close, intimate, or trusted
    friends, not 'necessary' in a literal sense. 'Close friends' is the most natural
    and accurate modern rendering.
