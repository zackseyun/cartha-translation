theological_decisions:
- issue: Peter's response to reverential prostration
  chosen_reading: The verse is rendered to show Peter rejecting an act implying undue
    honor, grounding the refusal in his shared humanity.
  alternative_readings:
  - The statement could be taken more minimally as simple humility without broader
    theological implication.
  rationale: The wording 'Stand up; I too am a man' preserves the text's plain sense
    without importing a developed doctrine of worship. It clearly contrasts Peter's
    humanity with any treatment that would elevate him beyond that.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
