id: ACT.10.26
reference: Acts 10:26
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος ⸂ἤγειρεν αὐτὸν⸃ λέγων· Ἀνάστηθι· καὶ ἐγὼ αὐτὸς ἄνθρωπός εἰμι.
translation:
  text: But Peter raised him up, saying, “Stand up; I too am a man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lifted him up” or “helped him up.”
    reason: lexical_alternative
  - marker: b
    text: Or “Rise” or “Get up.”
    reason: lexical_alternative
  - marker: c
    text: Or “I myself also am a man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγειρεν αὐτὸν
  chosen: raised him up
  alternatives:
  - lifted him up
  - helped him up
  lexicon: BDAG
  rationale: ἐγείρω commonly means to raise up. In this context Peter physically brings
    Cornelius up from his prostration. 'Raised him up' preserves the verbal force
    without overinterpreting the manner.
- source_word: Ἀνάστηθι
  chosen: Stand up
  alternatives:
  - Get up
  - Rise
  lexicon: BDAG
  rationale: The aorist imperative of ἀνίστημι is a direct command to get to one's
    feet. 'Stand up' is natural modern English and fits the immediate physical context
    of Cornelius having fallen before Peter.
- source_word: καὶ ἐγὼ αὐτὸς
  chosen: I too
  alternatives:
  - I myself also
  - I also myself
  lexicon: BDAG
  rationale: 'The combination gives emphatic inclusion: Peter, for his part, is also
    merely human. ''I too'' captures the emphasis idiomatically; the reflexive force
    of αὐτός is absorbed into natural English emphasis.'
- source_word: ἄνθρωπός εἰμι
  chosen: am a man
  alternatives:
  - am human
  - am only a man
  lexicon: BDAG
  rationale: ἄνθρωπος here contrasts Peter with one worthy of reverential prostration.
    'A man' is the most direct rendering and matches the singular self-reference.
    'Human' is possible but less natural in this speech context; 'only a man' adds
    'only,' which is interpretive and not explicit in the Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast with Cornelius's act of falling at Peter's feet
    in the previous verse. 'But' best signals Peter's corrective response.
