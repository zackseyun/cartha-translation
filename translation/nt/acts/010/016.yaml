id: ACT.10.16
reference: Acts 10:16
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἐγένετο ἐπὶ τρίς, καὶ ⸀εὐθὺς ἀνελήμφθη τὸ σκεῦος εἰς τὸν οὐρανόν.
translation:
  text: This happened three times, and immediately the vessel was taken up into heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sheet'; Greek 'the vessel' or 'container,' but the broader context
      identifies it as a sheet-like object.
    reason: lexical_alternative
  - marker: b
    text: Or 'into the sky'; the Greek word can mean either 'sky' or 'heaven,' though
      'heaven' best fits the vision context here.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο
  chosen: This
  alternatives:
  - This thing
  - This event
  lexicon: BDAG
  rationale: Neuter demonstrative referring back to the repeated vision sequence;
    simple 'This' is natural English and preserves the anaphoric force.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective. It is not naturally represented by a separate
    English word in this sentence without sounding wooden, so it is absorbed into
    the flow.
- source_word: ἐγένετο
  chosen: happened
  alternatives:
  - took place
  - came about
  lexicon: BDAG
  rationale: A common eventive use of γίνομαι. 'Happened' is idiomatic modern English
    and fits the narrative register.
- source_word: ἐπὶ τρίς
  chosen: three times
  alternatives:
  - thrice
  - on three occasions
  lexicon: BDAG
  rationale: Idiomatic expression meaning repetition three times. 'Three times' is
    clear modern English; 'thrice' is archaic.
- source_word: εὐθὺς
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Conveys promptness and preserves Luke's narrative sense of sudden transition.
    'Immediately' is slightly more formal and suits the style.
- source_word: ἀνελήμφθη
  chosen: was taken up
  alternatives:
  - was lifted up
  - was taken away
  lexicon: BDAG
  rationale: Aorist passive of ἀναλαμβάνω, here describing the sheet/container being
    taken upward. 'Was taken up' best matches both the passive form and the directional
    context.
- source_word: τὸ σκεῦος
  chosen: the vessel
  alternatives:
  - the container
  - the sheet
  lexicon: BDAG
  rationale: σκεῦος broadly means vessel/container/object. In this vision context
    it refers to the object descending from heaven. 'Vessel' preserves the Greek's
    broader term without over-specifying; 'sheet' reflects the wider context (10:11)
    but is not the word used here, so it is preserved as an alternative rather than
    adopted in the main text.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - into the sky
  - to heaven
  lexicon: BDAG
  rationale: In Acts and this vision context, οὐρανός here refers to heaven rather
    than merely the sky. 'Into heaven' matches εἰς and the narrative's vertical movement.
