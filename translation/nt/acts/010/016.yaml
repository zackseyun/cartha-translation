theological_decisions:
- issue: Referent of οὐρανός in Peter's vision
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: Although οὐρανός can denote 'sky,' the immediate context is a revelatory
    vision involving descent from and return to the divine realm. Rendering 'heaven'
    preserves the theological setting without adding interpretation beyond the narrative.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it beyond the text'
