id: ACT.10.37
reference: Acts 10:37
source:
  edition: SBLGNT
  text: ὑμεῖς οἴδατε τὸ γενόμενον ῥῆμα καθ’ ὅλης τῆς Ἰουδαίας, ⸀ἀρξάμενος ἀπὸ τῆς
    Γαλιλαίας μετὰ τὸ βάπτισμα ὃ ἐκήρυξεν Ἰωάννης,
translation:
  text: You yourselves know the matter that took place throughout all Judea, beginning
    from Galilee after the baptism that John proclaimed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word/message that spread throughout all Judea.' The Greek ῥῆμα can
      mean 'word,' 'message,' or 'matter.'
    reason: lexical_alternative
  - marker: b
    text: The Greek participle 'beginning' is syntactically awkward but clearly marks
      the starting point of the matter in Galilee.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You yourselves
  alternatives:
  - You
  - You know yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for the verb but adds emphasis; 'you
    yourselves' preserves that emphatic force in natural English.
- source_word: οἴδατε
  chosen: know
  alternatives:
  - have known
  - are aware of
  lexicon: BDAG
  rationale: Although οἶδα is formally perfect, it commonly functions with present
    sense. 'Know' is the most natural English equivalent here.
- source_word: τὸ γενόμενον ῥῆμα
  chosen: the matter that took place
  alternatives:
  - the word that happened
  - the event that happened
  - the thing that took place
  lexicon: BDAG
  rationale: ῥῆμα can mean 'word,' 'matter,' or 'thing'; with γενόμενον and the following
    geographical spread, the sense is not merely a spoken word but the reported event/message
    complex. 'The matter that took place' preserves both the eventive force of γενόμενον
    and the broader semantic range of ῥῆμα.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας
  chosen: throughout all Judea
  alternatives:
  - throughout the whole of Judea
  - through all Judea
  lexicon: BDAG
  rationale: κατά with the genitive here expresses extension over a region. 'Throughout
    all Judea' is idiomatic and preserves the comprehensiveness of ὅλης.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - the Jewish land
  lexicon: BDAG
  rationale: As a geographic term in Acts, 'Judea' is the standard transliteration
    and best fits the context.
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - having begun
  - which began
  lexicon: BDAG
  rationale: The participle is somewhat syntactically loose, likely referring to the
    preceding matter/event. 'Beginning' gives smooth English while preserving the
    temporal force without over-specifying the grammar.
- source_word: ἀπὸ τῆς Γαλιλαίας
  chosen: from Galilee
  alternatives:
  - in Galilee
  lexicon: BDAG
  rationale: ἀπό marks point of origin. 'From Galilee' preserves the sense that the
    matter started there.
- source_word: μετὰ τὸ βάπτισμα
  chosen: after the baptism
  alternatives:
  - following the baptism
  lexicon: BDAG
  rationale: μετά with the accusative is temporal here. 'After the baptism' is straightforward
    and natural.
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - immersion
  lexicon: BDAG
  rationale: '''Baptism'' is the established and contextually clear rendering; ''immersion''
    would be more interpretive and less idiomatic in this narrative setting.'
- source_word: ὃ ἐκήρυξεν Ἰωάννης
  chosen: that John proclaimed
  alternatives:
  - which John preached
  - that John announced
  lexicon: BDAG
  rationale: κηρύσσω is proclamation language. 'Proclaimed' is slightly broader and
    less pulpit-specific than 'preached,' while still preserving heraldic force.
- source_word: Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
