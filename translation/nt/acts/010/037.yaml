theological_decisions:
- issue: Sense of ῥῆμα in Peter's summary
  chosen_reading: Rendered as 'matter' rather than 'word' to encompass the public
    events/message concerning Jesus.
  alternative_readings:
  - '''word'''
  - '''message'''
  rationale: The verse refers to something known throughout Judea and then locates
    its beginning in Galilee after John's baptism. In context, Peter is summarizing
    the widely known course of events concerning Jesus, not merely a single utterance.
    This is a lexical-contextual decision, not a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referent of ἀρξάμενος
  chosen_reading: 'Taken with the preceding ''matter'' as a neuter sense construction
    in English: ''the matter ... beginning from Galilee.'''
  alternative_readings:
  - Taken adverbially with an implied 'it began'
  - Textually adjusted by some interpreters to agree more explicitly with ῥῆμα
  rationale: The masculine participle is syntactically awkward with the neuter antecedent,
    but the sense is clear in context. The English smooths the construction without
    importing content not present in the Greek.
  doctrine_reference: Translation philosophy §6
