theological_decisions:
- issue: Rendering God's character statement without importing later doctrinal nuance
  chosen_reading: God is not one who shows partiality
  alternative_readings:
  - God is no respecter of persons
  - God does not show favoritism
  rationale: The verse states God's impartiality in receiving people from every nation
    who fear him and do what is right. The translation should preserve that claim
    without narrowing it to a specific later theological system or flattening the
    personal noun into an abstract slogan. The chosen wording is faithful and clear.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
