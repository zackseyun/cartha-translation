id: ACT.10.34
reference: Acts 10:34
source:
  edition: SBLGNT
  text: Ἀνοίξας δὲ Πέτρος τὸ στόμα εἶπεν· Ἐπ’ ἀληθείας καταλαμβάνομαι ὅτι οὐκ ἔστιν
    προσωπολήμπτης ὁ θεός,
translation:
  text: Then Peter opened his mouth and said, “Truly I understand that God is not
    one who shows partiality,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'In truth I comprehend' or 'Of a truth I perceive.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'is not a respecter of persons,' an idiom meaning that God does
      not show favoritism or partiality.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνοίξας ... τὸ στόμα
  chosen: opened his mouth
  alternatives:
  - began to speak
  lexicon: BDAG
  rationale: This is a common idiomatic expression introducing a solemn or formal
    statement. Retaining 'opened his mouth' preserves the Greek wording and rhetorical
    weight without becoming unnatural in English.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' fits the flow in modern English
    better than a bare 'and' while preserving the connective sense.
- source_word: Ἐπ’ ἀληθείας
  chosen: Truly
  alternatives:
  - In truth
  - Certainly
  - Of a truth
  lexicon: BDAG
  rationale: The phrase signals genuine realization or affirmation. 'Truly' is concise,
    natural modern English and preserves the force of Peter's declaration.
- source_word: καταλαμβάνομαι
  chosen: I understand
  alternatives:
  - I comprehend
  - I grasp
  - I now realize
  lexicon: BDAG
  rationale: In context Peter is expressing a dawning recognition of God's impartiality.
    'I understand' communicates this clearly in idiomatic English. 'I now realize'
    is possible, but 'now' is not explicit in the Greek and is therefore left implicit.
- source_word: προσωπολήμπτης
  chosen: one who shows partiality
  alternatives:
  - partial
  - a respecter of persons
  - one who is biased
  lexicon: BDAG
  rationale: The noun denotes one who shows favoritism or partiality. 'One who shows
    partiality' is clear, accurate, and avoids the archaic idiom 'respecter of persons'
    while preserving the personal sense of the noun better than the adjective 'partial'
    alone.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The predicate construction in Greek is best
    expressed in English as 'God is not one who shows partiality.'
