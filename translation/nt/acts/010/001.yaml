id: ACT.10.1
reference: Acts 10:1
source:
  edition: SBLGNT
  text: Ἀνὴρ δέ ⸀τις ἐν Καισαρείᾳ ὀνόματι Κορνήλιος, ἑκατοντάρχης ἐκ σπείρης τῆς καλουμένης
    Ἰταλικῆς,
translation:
  text: Now there was a man in Caesarea named Cornelius, a centurion from the cohort
    called the Italian Cohort,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a certain man in Caesarea.' The Greek uses an indefinite expression
      introducing a new character.
    reason: lexical_alternative
  - marker: b
    text: A 'cohort' was a Roman military unit. 'Italian Cohort' likely refers to
      a unit associated with Italy or composed of Italian soldiers.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀνὴρ
  chosen: a man
  alternatives:
  - a certain man
  - a male person
  lexicon: BDAG
  rationale: ἀνήρ refers to an adult male person. In this narrative introduction,
    'a man' is natural English and preserves the masculine singular reference without
    unnecessary stiffness.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here functions as a mild narrative transition rather than a strong
    adversative. 'Now' signals a new scene in readable English better than 'But,'
    while preserving discourse movement.
- source_word: τις
  chosen: there was
  alternatives:
  - a certain
  - someone
  lexicon: BDAG
  rationale: τις marks an indefinite introduction of a new character. In idiomatic
    English, the indefiniteness is well conveyed by 'there was a man' rather than
    the more wooden 'a certain man.' The indefiniteness is preserved without awkwardness.
- source_word: ἐν Καισαρείᾳ
  chosen: in Caesarea
  lexicon: BDAG
  rationale: Straightforward locative phrase. 'Caesarea' is the standard English transliteration
    of the place name.
- source_word: ὀνόματι Κορνήλιος
  chosen: named Cornelius
  alternatives:
  - by name Cornelius
  - whose name was Cornelius
  lexicon: BDAG
  rationale: The dative ὀνόματι with a personal name is idiomatically rendered 'named
    Cornelius' in English. 'Cornelius' is transliterated as a personal name in keeping
    with the translation philosophy.
- source_word: ἑκατοντάρχης
  chosen: a centurion
  alternatives:
  - a commander of a hundred soldiers
  lexicon: BDAG
  rationale: '''Centurion'' is the standard and precise historical term for a Roman
    military officer of this rank. It is sufficiently familiar in English and preferable
    to an explanatory paraphrase in the main text.'
- source_word: ἐκ σπείρης
  chosen: from the cohort
  alternatives:
  - of the cohort
  - from the regiment
  lexicon: BDAG
  rationale: σπεῖρα denotes a Roman military unit, commonly rendered 'cohort.' 'From
    the cohort' reflects ἐκ naturally and avoids over-paraphrasing. 'Regiment' is
    less precise historically.
- source_word: τῆς καλουμένης Ἰταλικῆς
  chosen: called the Italian Cohort
  alternatives:
  - called Italian
  - known as the Italian Cohort
  lexicon: BDAG
  rationale: The participle καλουμένης is naturally rendered 'called.' Supplying 'Cohort'
    after 'Italian' makes explicit in English what the Greek adjective modifies and
    yields a clear military designation.
