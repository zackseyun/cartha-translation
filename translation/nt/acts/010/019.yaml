id: ACT.10.19
reference: Acts 10:19
source:
  edition: SBLGNT
  text: τοῦ δὲ Πέτρου διενθυμουμένου περὶ τοῦ ὁράματος εἶπεν ⸂αὐτῷ τὸ πνεῦμα⸃· Ἰδοὺ
    ⸀ἄνδρες ⸀ζητοῦντές σε·
translation:
  text: While Peter was still pondering the vision, the Spirit said to him, “Look,
    men are seeking you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are looking for you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: διενθυμουμένου
  chosen: was still pondering
  alternatives:
  - was reflecting on
  - was thinking deeply about
  - was considering
  lexicon: BDAG
  rationale: The participle denotes sustained inward reflection. 'Pondering' captures
    deliberate mental processing in natural English; 'still' brings out the ongoing
    aspect in context as Peter remains occupied with the vision.
- source_word: περὶ τοῦ ὁράματος
  chosen: the vision
  alternatives:
  - about the vision
  lexicon: BDAG
  rationale: English idiom prefers 'pondering the vision' rather than repeating 'about.'
    The object remains explicit and preserves the content of Peter's reflection.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  - the spirit
  lexicon: BDAG
  rationale: In Acts, τὸ πνεῦμα in this narrative context refers to the divine Spirit
    directing Peter. 'The Spirit' is sufficiently explicit while staying close to
    the Greek, which does not include ἅγιον here.
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  - spoke to him
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω with indirect object. 'Said to him'
    is formally close and idiomatic.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English better than the archaic 'Behold.'
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - some men
  - male visitors
  lexicon: BDAG
  rationale: ἀνήρ here refers specifically to adult males, not generic people. 'Men'
    is gender-accurate and matches the narrative, in keeping with the project's policy.
- source_word: ζητοῦντές σε
  chosen: are seeking you
  alternatives:
  - are looking for you
  lexicon: BDAG
  rationale: ζητέω can mean either 'seek' or 'look for.' 'Seeking you' is slightly
    more literal and fits the solemn narrative tone, while remaining natural English.
