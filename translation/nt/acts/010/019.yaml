theological_decisions:
- issue: Referent of τὸ πνεῦμα
  chosen_reading: the Spirit refers to the Holy Spirit speaking to Peter
  alternative_readings:
  - the spirit as a non-specific spiritual prompting
  rationale: Within Acts 10, the speaker is the divine Spirit guiding the mission
    to the Gentiles. Rendering as 'the Spirit' preserves the narrative's theological
    claim without adding 'Holy' where the Greek does not.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Gender rendering of ἄνδρες
  chosen_reading: men
  alternative_readings:
  - people
  - visitors
  rationale: The Greek specifically uses ἀνήρ, adult male persons, not an inclusive
    generic term. The translation therefore keeps the masculine reference rather than
    neutralizing it.
  doctrine_reference: Translation philosophy §4
