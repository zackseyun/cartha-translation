id: ACT.10.30
reference: Acts 10:30
source:
  edition: SBLGNT
  text: Καὶ ὁ Κορνήλιος ἔφη· Ἀπὸ τετάρτης ἡμέρας μέχρι ταύτης τῆς ὥρας ⸀ἤμην τὴν ⸀ἐνάτην
    προσευχόμενος ἐν τῷ οἴκῳ μου, καὶ ἰδοὺ ἀνὴρ ἔστη ἐνώπιόν μου ἐν ἐσθῆτι λαμπρᾷ
translation:
  text: And Cornelius said, “Four days ago, up to this hour, I was praying at the
    ninth hour in my house, and behold, a man stood before me in bright clothing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about three in the afternoon.
    reason: cultural_note
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  lexicon: BDAG
  rationale: Aorist narrative speech introducer is most naturally rendered 'said'
    in English.
- source_word: Ἀπὸ τετάρτης ἡμέρας μέχρι ταύτης τῆς ὥρας
  chosen: Four days ago, up to this hour
  alternatives:
  - From the fourth day until this hour
  - Four days ago at this hour
  lexicon: BDAG
  rationale: This idiom marks elapsed time from four days prior to the present hour.
    'Four days ago, up to this hour' preserves both the temporal distance and the
    reference to the same hour more clearly than a wooden rendering.
- source_word: ἤμην ... προσευχόμενος
  chosen: I was praying
  alternatives:
  - I had been praying
  lexicon: BDAG
  rationale: Periphrastic imperfect conveys ongoing action in past time. 'I was praying'
    is natural English and fits the narrative setting.
- source_word: τὴν ἐνάτην
  chosen: at the ninth hour
  alternatives:
  - at the ninth hour of the day
  - at three in the afternoon
  lexicon: BDAG
  rationale: The accusative of time is rendered with 'at.' 'Ninth hour' preserves
    the source-culture time expression; a modern-clock equivalent is useful but better
    placed in a footnote.
- source_word: ἐν τῷ οἴκῳ μου
  chosen: in my house
  alternatives:
  - at my house
  - in my home
  lexicon: BDAG
  rationale: '''House'' is the straightforward rendering of οἶκος here and fits the
    physical-location sense.'
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: The particle marks vividness and suddenness in the report. 'Behold' preserves
    that discourse function without over-paraphrasing.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a male person
  lexicon: BDAG
  rationale: The noun is grammatically and semantically male-specific here, referring
    to the angelic figure as appearing in male human form. 'A man' is the natural
    English equivalent.
- source_word: ἔστη ἐνώπιόν μου
  chosen: stood before me
  alternatives:
  - appeared before me
  - stood in front of me
  lexicon: BDAG
  rationale: ἵστημι in the aorist with ἐνώπιον denotes taking a position before someone.
    'Stood before me' is both literal and idiomatic.
- source_word: ἐν ἐσθῆτι λαμπρᾷ
  chosen: in bright clothing
  alternatives:
  - in shining clothing
  - in radiant apparel
  lexicon: BDAG
  rationale: ἐσθής refers to clothing/garment, and λαμπρός denotes brightness or splendor.
    'Bright clothing' is clear modern English while retaining the visual force.
