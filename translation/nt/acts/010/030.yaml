theological_decisions:
- issue: Rendering the time expression τὴν ἐνάτην
  chosen_reading: at the ninth hour
  alternative_readings:
  - at three in the afternoon
  rationale: Following optimal equivalence and original-language primacy, the translation
    preserves the Jewish/Roman time designation in the main text rather than converting
    it into a modern clock time. The modern equivalent is preserved in a footnote
    for readability.
  doctrine_reference: Translation philosophy §§1, 6
