id: ACT.10.25
reference: Acts 10:25
source:
  edition: SBLGNT
  text: ὡς δὲ ἐγένετο τοῦ εἰσελθεῖν τὸν Πέτρον, συναντήσας αὐτῷ ὁ Κορνήλιος πεσὼν
    ἐπὶ τοὺς πόδας προσεκύνησεν.
translation:
  text: And when Peter entered, Cornelius met him and fell at his feet and paid him
    homage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped him.' The Greek verb can mean either worship or an act of
      prostration/homage, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ ἐγένετο τοῦ εἰσελθεῖν
  chosen: And when ... entered
  alternatives:
  - Now as ... entered
  - When it happened that ... entered
  lexicon: BDAG
  rationale: The idiom ὡς δὲ ἐγένετο τοῦ + infinitive introduces the circumstance
    in a natural narrative way. 'And when' preserves the temporal force and δέ's connective
    function without woodenly reproducing the Greek idiom.
- source_word: εἰσελθεῖν τὸν Πέτρον
  chosen: Peter entered
  alternatives:
  - Peter came in
  - Peter was entering
  lexicon: BDAG
  rationale: The aorist infinitive εἰσελθεῖν is best rendered as a simple event, 'entered.'
    Using Peter as the subject in English is smoother than a more literal infinitival
    construction.
- source_word: συναντήσας αὐτῷ
  chosen: met him
  alternatives:
  - went to meet him
  - having met him
  lexicon: BDAG
  rationale: The participle denotes Cornelius's action of meeting Peter. 'Met him'
    is concise, natural English and adequately reflects the encounter without overemphasizing
    the participial form.
- source_word: πεσὼν ἐπὶ τοὺς πόδας
  chosen: fell at his feet
  alternatives:
  - fell upon his feet
  - fell down at his feet
  lexicon: BDAG
  rationale: This idiom expresses a posture of abasement before Peter. 'Fell at his
    feet' is idiomatic English and preserves the physical gesture.
- source_word: προσεκύνησεν
  chosen: paid him homage
  alternatives:
  - worshiped him
  - bowed down to him
  lexicon: BDAG
  rationale: προσκυνέω can denote worship or an act of prostration/homage depending
    on the object and context. Since the next verse has Peter reject the act on the
    grounds that he too is a man, 'paid him homage' best preserves the gesture of
    reverence without implying that Peter rightly received divine worship. The stronger
    alternative 'worshiped him' is preserved in a footnote because it is a viable
    lexical rendering.
