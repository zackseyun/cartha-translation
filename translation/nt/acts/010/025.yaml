theological_decisions:
- issue: Rendering of προσκυνέω toward Peter
  chosen_reading: paid him homage
  alternative_readings:
  - worshiped him
  - bowed down to him
  rationale: The term can cover a range from prostration/homage to worship. In this
    context, where Cornelius addresses Peter with excessive reverence and Peter immediately
    refuses it (v. 26), the translation should preserve the act's seriousness without
    importing the conclusion that Peter was being presented as a proper recipient
    of divine worship. This follows the translation philosophy of preserving lexical
    sense while avoiding doctrinal overstatement not required by the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
