id: ACT.10.21
reference: Acts 10:21
source:
  edition: SBLGNT
  text: καταβὰς δὲ Πέτρος πρὸς τοὺς ἄνδρας εἶπεν· Ἰδοὺ ἐγώ εἰμι ὃν ζητεῖτε· τίς ἡ
    αἰτία δι’ ἣν πάρεστε;
translation:
  text: So Peter went down to the men and said, “Look, I am the one you are looking
    for. For what reason are you here?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What is the reason for which you are present?”
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβὰς
  chosen: went down
  alternatives:
  - came down
  - having gone down
  lexicon: BDAG
  rationale: Aorist participle of καταβαίνω, referring to Peter descending from the
    rooftop/upper area to the visitors below. 'Went down' is natural English and preserves
    the directional sense without over-literal participial awkwardness.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So'
    gives smooth English continuity in context.
- source_word: πρὸς τοὺς ἄνδρας
  chosen: to the men
  alternatives:
  - toward the men
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward/address to the men.
    'To the men' is idiomatic in English and fits the following speech.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the force
    in readable modern English better than archaic 'behold.'
- source_word: ἐγώ εἰμι ὃν ζητεῖτε
  chosen: I am the one you are looking for
  alternatives:
  - I am he whom you seek
  - I am the one you seek
  lexicon: BDAG
  rationale: This clause identifies Peter as the person sought. 'The one you are looking
    for' is natural modern English and accurately reflects the relative clause.
- source_word: τίς ἡ αἰτία
  chosen: For what reason
  alternatives:
  - What is the reason
  - Why
  lexicon: BDAG
  rationale: αἰτία means cause, reason, or basis. 'For what reason' preserves the
    explicit noun and avoids flattening the phrase to a bare 'why,' while still sounding
    natural.
- source_word: δι’ ἣν πάρεστε
  chosen: are you here
  alternatives:
  - have you come
  - are you present
  lexicon: BDAG
  rationale: πάρεστε (from πάρειμι) literally means 'you are present/have arrived.'
    In this context, 'are you here' best captures the present-state nuance in idiomatic
    English. The prepositional phrase δι’ ἣν is incorporated into the preceding 'For
    what reason.'
