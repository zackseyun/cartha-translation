id: ACT.10.3
reference: Acts 10:3
source:
  edition: SBLGNT
  text: εἶδεν ἐν ὁράματι φανερῶς ὡσεὶ ⸀περὶ ὥραν ἐνάτην τῆς ἡμέρας ἄγγελον τοῦ θεοῦ
    εἰσελθόντα πρὸς αὐτὸν καὶ εἰπόντα αὐτῷ· Κορνήλιε.
translation:
  text: He saw clearly in a vision, about the ninth hour of the day, an angel of God
    coming in to him and saying to him, “Cornelius.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about three in the afternoon by modern reckoning.
    reason: cultural_note
  - marker: b
    text: Or 'plainly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: He saw
  alternatives:
  - he perceived
  - he saw
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω, straightforward narrative past. 'He saw' is
    the natural English rendering and preserves the concrete visionary experience.
- source_word: ἐν ὁράματι
  chosen: in a vision
  alternatives:
  - in a trance-vision
  lexicon: BDAG
  rationale: ὅραμα denotes a vision or supernatural sight. 'In a vision' is idiomatic
    and sufficiently formal without overinterpreting the mode.
- source_word: φανερῶς
  chosen: clearly
  alternatives:
  - plainly
  - openly
  lexicon: BDAG
  rationale: The adverb emphasizes that the vision was distinct and unmistakable.
    'Clearly' is natural modern English and captures the force well.
- source_word: ὡσεὶ περὶ ὥραν ἐνάτην τῆς ἡμέρας
  chosen: about the ninth hour of the day
  alternatives:
  - about three in the afternoon
  - at about the ninth hour
  lexicon: BDAG
  rationale: The Greek preserves Jewish-style hour reckoning. Main text keeps 'ninth
    hour' for source transparency; 'about' reflects ὡσεὶ/περὶ. The modern equivalent
    is worth preserving in a footnote.
- source_word: ἄγγελον τοῦ θεοῦ
  chosen: an angel of God
  alternatives:
  - a messenger of God
  lexicon: BDAG
  rationale: In this narrative context ἄγγελος clearly refers to a heavenly being,
    not a human messenger. 'Angel of God' is the standard and contextually precise
    rendering.
- source_word: εἰσελθόντα πρὸς αὐτὸν
  chosen: coming in to him
  alternatives:
  - entering to him
  - coming to him
  lexicon: BDAG
  rationale: The participle εἰσελθόντα literally indicates entering in. 'Coming in
    to him' preserves the movement into Cornelius's presence while remaining readable
    English.
- source_word: καὶ εἰπόντα αὐτῷ
  chosen: and saying to him
  alternatives:
  - and said to him
  lexicon: BDAG
  rationale: The Greek uses a second aorist participle coordinated with the first.
    'And saying to him' better reflects the participial sequence than converting it
    into a finite verb, while still reading naturally.
- source_word: Κορνήλιε
  chosen: Cornelius
  lexicon: BDAG
  rationale: Vocative of the proper name Κορνήλιος. Standard English transliteration
    is 'Cornelius.' English does not normally distinguish the vocative form morphologically.
