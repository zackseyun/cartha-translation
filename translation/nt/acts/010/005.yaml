id: ACT.10.5
reference: Acts 10:5
source:
  edition: SBLGNT
  text: καὶ νῦν πέμψον ⸂ἄνδρας εἰς Ἰόππην⸃ καὶ μετάπεμψαι Σίμωνά ⸂τινα ὃς ἐπικαλεῖται
    Πέτρος⸃·
translation:
  text: And now send men to Joppa and summon a certain Simon who is called Peter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send for a man named Simon, who is known as Peter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψον
  chosen: send
  alternatives:
  - dispatch
  lexicon: BDAG
  rationale: Aorist active imperative, second singular. 'Send' is the natural and
    direct English imperative; 'dispatch' is possible but less idiomatic in modern
    English.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - some men
  - messengers
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man/men' rather than the more generic 'people.'
    Since the Greek explicitly uses the masculine plural and likely refers to male
    emissaries, 'men' is gender-accurate per translation philosophy. 'Messengers'
    is interpretive and not stated explicitly here.
- source_word: εἰς Ἰόππην
  chosen: to Joppa
  alternatives:
  - into Joppa
  lexicon: BDAG
  rationale: Standard directional use of εἰς with a place name. 'To Joppa' is idiomatic
    English.
- source_word: μετάπεμψαι
  chosen: summon
  alternatives:
  - send for
  - have ... brought
  lexicon: BDAG
  rationale: Middle imperative meaning to send for someone, with the nuance of requesting
    their presence. 'Summon' is concise and fits the imperative force, while 'send
    for' is a viable alternative. 'Have brought' overstates compulsion.
- source_word: Σίμωνά τινα
  chosen: a certain Simon
  alternatives:
  - someone named Simon
  - Simon, a certain man
  lexicon: BDAG
  rationale: τινα here introduces an identifiable but as-yet unspecified person. 'A
    certain Simon' preserves the Greek idiom and narrative feel better than more paraphrastic
    alternatives.
- source_word: ὃς ἐπικαλεῖται Πέτρος
  chosen: who is called Peter
  alternatives:
  - who is known as Peter
  - who is surnamed Peter
  lexicon: BDAG
  rationale: Passive/middle present indicates the name by which Simon is called. 'Who
    is called Peter' is straightforward and traditional without being archaic. 'Known
    as' is acceptable but slightly looser; 'surnamed' is dated.
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - Now then
  - So now
  lexicon: BDAG
  rationale: Retains the connective καὶ and temporal/discourse marker νῦν. 'And now'
    preserves the flow from the preceding speech better than dropping the conjunction.
