id: ACT.10.42
reference: Acts 10:42
source:
  edition: SBLGNT
  text: καὶ παρήγγειλεν ἡμῖν κηρύξαι τῷ λαῷ καὶ διαμαρτύρασθαι ὅτι ⸀οὗτός ἐστιν ὁ
    ὡρισμένος ὑπὸ τοῦ θεοῦ κριτὴς ζώντων καὶ νεκρῶν.
translation:
  text: And he commanded us to proclaim to the people and to testify solemnly that
    this is the one appointed by God as judge of the living and the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one ordained by God as judge of the living and the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλεν
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: BDAG
  rationale: The verb denotes giving an authoritative charge. 'Commanded' preserves
    the force better than the softer 'instructed' while remaining natural English.
- source_word: κηρύξαι
  chosen: to proclaim
  alternatives:
  - to preach
  - to announce
  lexicon: BDAG
  rationale: κηρύσσω often refers to public proclamation. 'Proclaim' captures the
    heraldic sense without importing narrower modern associations of a sermon that
    'preach' may carry.
- source_word: τῷ λαῷ
  chosen: to the people
  alternatives:
  - to the people of Israel
  - to the people
  lexicon: BDAG
  rationale: λαός here is articular and contextually refers to the people addressed
    in Peter's Jewish setting, but the verse itself does not explicitly say 'Israel.'
    'The people' is the most textually restrained rendering.
- source_word: διαμαρτύρασθαι
  chosen: to testify solemnly
  alternatives:
  - to bear solemn witness
  - to testify
  lexicon: BDAG
  rationale: The middle infinitive carries the sense of earnest, solemn testimony.
    'Testify solemnly' preserves both the witness element and the heightened seriousness.
- source_word: οὗτός
  chosen: this
  alternatives:
  - this one
  - he
  lexicon: BDAG
  rationale: The demonstrative points emphatically to Jesus. 'This' is concise and
    natural in English; the following predicate clarifies the referent.
- source_word: ὁ ὡρισμένος
  chosen: the one appointed
  alternatives:
  - the one designated
  - the one ordained
  lexicon: BDAG
  rationale: The perfect passive participle of ὁρίζω indicates one who has been appointed
    or designated with continuing status. 'Appointed' is clear modern English and
    avoids the potentially over-theologized or archaic feel of 'ordained.'
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - by God
  lexicon: BDAG
  rationale: Standard agency construction with passive participle; 'by God' is direct
    and unambiguous.
- source_word: κριτὴς
  chosen: judge
  alternatives:
  - the judge
  lexicon: BDAG
  rationale: Predicate nominative after 'is.' English idiom prefers 'appointed by
    God as judge' rather than a more wooden 'is the appointed by God judge.'
- source_word: ζώντων καὶ νεκρῶν
  chosen: of the living and the dead
  alternatives:
  - of living and dead people
  lexicon: BDAG
  rationale: This is a well-established and accurate rendering of the genitive pair,
    preserving the solemn scope of Christ's judicial authority over all humanity.
