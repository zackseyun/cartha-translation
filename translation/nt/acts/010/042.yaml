theological_decisions:
- issue: Force of Jesus' divine appointment to judgment
  chosen_reading: appointed by God as judge of the living and the dead
  alternative_readings:
  - ordained by God to be judge of the living and the dead
  rationale: The verse explicitly states that God appointed Jesus as universal judge.
    The translation preserves this claim without expanding it into later doctrinal
    formulations, while remaining fully consistent with orthodox Christology.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
