id: ACT.10.29
reference: Acts 10:29
source:
  edition: SBLGNT
  text: διὸ καὶ ἀναντιρρήτως ἦλθον μεταπεμφθείς πυνθάνομαι οὖν τίνι λόγῳ μετεπέμψασθέ
    με.
translation:
  text: Therefore I came without objection when I was sent for. So I ask, for what
    reason did you send for me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without hesitation.' The Greek more literally means 'without objection'
      or 'without disputing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'why did you send for me?' Literally, 'for what reason did you send for
      me?'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore indeed
  lexicon: BDAG
  rationale: Marks an inference from the preceding explanation; 'Therefore' is natural
    English and preserves the logical connection.
- source_word: καὶ
  chosen: —
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: Here καί adds slight emphasis after διό, but explicit rendering ('also')
    is awkward in English. Its force is absorbed into the sentence flow rather than
    translated woodenly.
- source_word: ἀναντιρρήτως
  chosen: without objection
  alternatives:
  - without hesitation
  - without raising any objection
  - without dispute
  lexicon: BDAG
  rationale: The adverb denotes acting without speaking against or disputing. 'Without
    objection' best preserves the lexical sense of not resisting or protesting, closer
    to the Greek than the smoother but less precise 'without hesitation'.
- source_word: ἦλθον
  chosen: I came
  alternatives:
  - I went
  - I arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is straightforwardly 'I came.' 'Arrived' is possible
    but less direct.
- source_word: μεταπεμφθείς
  chosen: when I was sent for
  alternatives:
  - after being summoned
  - having been sent for
  lexicon: BDAG
  rationale: Aorist passive participle of μεταπέμπομαι means to send for or summon.
    'When I was sent for' gives clear idiomatic English while preserving the passive
    relationship to the main verb.
- source_word: πυνθάνομαι
  chosen: I ask
  alternatives:
  - I inquire
  - I ask then
  lexicon: BDAG
  rationale: The verb means to ask or inquire. 'I ask' is natural modern English;
    the nuance of inquiry is retained by the following indirect question.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Signals a conclusion or transition to the question. 'So' is readable
    modern English and fits the discourse flow.
- source_word: τίνι λόγῳ
  chosen: for what reason
  alternatives:
  - why
  - for what purpose
  - on what grounds
  lexicon: BDAG
  rationale: Literally 'for what reason/word.' 'For what reason' preserves the formal
    sense better than the more compressed 'why,' while remaining idiomatic.
- source_word: μετεπέμψασθέ με
  chosen: did you send for me
  alternatives:
  - did you summon me
  - did you send me an invitation
  lexicon: BDAG
  rationale: The middle verb means 'send for, summon.' 'Send for me' matches the same
    lexical root used earlier in the verse and preserves internal consistency.
