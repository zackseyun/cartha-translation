theological_decisions:
- issue: Nature of ἄγγελος in context
  chosen_reading: Rendered as a heavenly 'angel' rather than the generic 'messenger.'
  alternative_readings:
  - messenger
  rationale: The immediate context in Acts 10 describes Cornelius's vision of a divine
    envoy, so the supernatural sense is not merely traditional but contextually demanded.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
