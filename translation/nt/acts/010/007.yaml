id: ACT.10.7
reference: Acts 10:7
source:
  edition: SBLGNT
  text: ὡς δὲ ἀπῆλθεν ὁ ἄγγελος ὁ λαλῶν ⸀αὐτῷ, φωνήσας δύο τῶν ⸀οἰκετῶν καὶ στρατιώτην
    εὐσεβῆ τῶν προσκαρτερούντων αὐτῷ
translation:
  text: When the angel who was speaking to him had gone away, he called two of his
    household servants and a devout soldier from among those attending him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two of the household slaves.' The Greek οἰκέται refers to members of
      the household in servile service; 'household servants' is used here for natural
      English while preserving the domestic setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: When
  alternatives:
  - And when
  - As soon as
  lexicon: BDAG
  rationale: Introduces the temporal setting of the action. 'When' is natural English
    and preserves the sequence without overtranslating δέ.
- source_word: ἀπῆλθεν
  chosen: had gone away
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: Aorist indicative of ἀπέρχομαι, here best rendered as a completed prior
    action before the main verb 'he called.' 'Had gone away' makes the temporal relation
    clear in English.
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In Acts 10 the referent is a heavenly being in Cornelius's vision, so
    'angel' is the contextually appropriate rendering rather than the more general
    'messenger'.
- source_word: ὁ λαλῶν αὐτῷ
  chosen: who was speaking to him
  alternatives:
  - who spoke to him
  - speaking to him
  lexicon: BDAG
  rationale: The present participle is rendered with an English relative clause to
    identify the angel as the one addressing Cornelius. 'Was speaking' preserves the
    participial, ongoing sense naturally.
- source_word: φωνήσας
  chosen: he called
  alternatives:
  - having summoned
  - summoning
  lexicon: BDAG
  rationale: Aorist participle preceding the implied main action of the next verse.
    Since this verse is syntactically incomplete in English if left too literal, 'he
    called' gives a clear, idiomatic rendering while preserving the action.
- source_word: δύο τῶν οἰκετῶν
  chosen: two of his household servants
  alternatives:
  - two of the household servants
  - two of his domestic servants
  lexicon: BDAG
  rationale: οἰκέτης denotes a household servant/slave attached to a house. Here 'household
    servants' is more precise than generic 'servants' and more natural than 'domestic
    servants.' The possessive 'his' is supplied from context, referring to Cornelius's
    household.
- source_word: στρατιώτην
  chosen: a soldier
  alternatives:
  - one soldier
  lexicon: BDAG
  rationale: Straightforward rendering of the singular accusative noun.
- source_word: εὐσεβῆ
  chosen: devout
  alternatives:
  - pious
  - God-fearing
  lexicon: BDAG
  rationale: εὐσεβής describes reverent devotion. 'Devout' is standard, readable English.
    'God-fearing' would add a more specific nuance not explicit in this adjective
    alone.
- source_word: τῶν προσκαρτερούντων αὐτῷ
  chosen: from among those attending him
  alternatives:
  - from among those serving him continually
  - from among his attendants
  lexicon: BDAG
  rationale: προσκαρτερέω can convey persistence or devoted attendance. Here the genitive
    plural phrase identifies the group from which the soldier came. 'Attending him'
    captures personal service/attendance without awkward literalism; 'from among'
    reflects the partitive genitive.
