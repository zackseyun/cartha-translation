theological_decisions:
- issue: Resurrection wording in ἀναστῆναι αὐτὸν ἐκ νεκρῶν
  chosen_reading: after he rose from the dead
  alternative_readings:
  - after he was raised from the dead
  rationale: The Greek uses ἀναστῆναι with αὐτόν in a construction naturally rendered
    as 'he rose.' This does not deny divine agency in the resurrection elsewhere;
    it simply follows the wording of this verse without importing a different formulation.
    The verse's emphasis is the bodily reality of the risen Jesus, confirmed by shared
    eating and drinking.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
