id: ACT.10.41
reference: Acts 10:41
source:
  edition: SBLGNT
  text: οὐ παντὶ τῷ λαῷ ἀλλὰ μάρτυσι τοῖς προκεχειροτονημένοις ὑπὸ τοῦ θεοῦ, ἡμῖν,
    οἵτινες συνεφάγομεν καὶ συνεπίομεν αὐτῷ μετὰ τὸ ἀναστῆναι αὐτὸν ἐκ νεκρῶν·
translation:
  text: not to all the people, but to witnesses who had been chosen beforehand by
    God—to us, who ate and drank with him after he rose from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who had been appointed beforehand by God.”
    reason: lexical_alternative
  - marker: b
    text: Or, “after he was raised from the dead.” The Greek here is naturally rendered
      “after he rose from the dead,” though the passive expression appears elsewhere
      in the New Testament.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ παντὶ τῷ λαῷ
  chosen: not to all the people
  alternatives:
  - not to the whole people
  - not to all the populace
  lexicon: BDAG
  rationale: παντί with the dative and λαῷ expresses the scope of those to whom Jesus
    appeared. 'All the people' is natural English and preserves the contrast with
    the limited group of witnesses.
- source_word: μάρτυσι
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: μάρτυς in Acts commonly denotes those who bear testimony to what they
    have seen. 'Witnesses' is the standard and clearest rendering here.
- source_word: προκεχειροτονημένοις
  chosen: who had been chosen beforehand
  alternatives:
  - who had been appointed beforehand
  - who had been designated in advance
  lexicon: BDAG
  rationale: The perfect passive participle indicates prior divine selection with
    continuing relevance. 'Chosen beforehand' is concise and idiomatic; 'appointed
    beforehand' is possible and preserved as an alternative.
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  lexicon: BDAG
  rationale: Standard passive agent construction with ὑπό + genitive. No reason to
    expand beyond the explicit wording.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - namely, us
  lexicon: BDAG
  rationale: The dative stands in apposition to 'witnesses,' identifying the apostolic
    group as those witnesses. An em dash in English helps reflect the appositional
    clarification.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - we who
  - who indeed
  lexicon: BDAG
  rationale: οἵτινες introduces a qualitative/descriptive relative clause about the
    witnesses. Simple 'who' reads naturally in English while preserving the sense.
- source_word: συνεφάγομεν καὶ συνεπίομεν αὐτῷ
  chosen: ate and drank with him
  alternatives:
  - shared food and drink with him
  lexicon: BDAG
  rationale: The compound verbs with συν- emphasize shared table fellowship. 'Ate
    and drank with him' is direct, idiomatic, and preserves the concrete bodily nature
    of the post-resurrection encounter.
- source_word: μετὰ τὸ ἀναστῆναι αὐτὸν ἐκ νεκρῶν
  chosen: after he rose from the dead
  alternatives:
  - after his rising from the dead
  - after he was raised from the dead
  lexicon: BDAG
  rationale: 'The articular infinitive with μετά is temporal: ''after.'' ἀναστῆναι
    here is intransitive in sense (''rise''), and ἐκ νεκρῶν is the standard resurrection
    expression. ''Rose from the dead'' is the most natural English rendering, while
    ''was raised'' is a possible theological/lexical alternative but less directly
    aligned with this form.'
