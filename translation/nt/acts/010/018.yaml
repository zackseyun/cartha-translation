id: ACT.10.18
reference: Acts 10:18
source:
  edition: SBLGNT
  text: καὶ φωνήσαντες ⸀ἐπυνθάνοντο εἰ Σίμων ὁ ἐπικαλούμενος Πέτρος ἐνθάδε ξενίζεται.
translation:
  text: And they called out and asked whether Simon, who is called Peter, was staying
    here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'was lodging here' or 'was being hosted here.' The Greek verb carries
      the sense of staying as a guest.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνήσαντες
  chosen: called out
  alternatives:
  - called
  - shouted
  - having called out
  lexicon: BDAG
  rationale: The aorist participle denotes the manner preceding the inquiry. 'Called
    out' captures the sense of raising the voice to those inside the house without
    sounding overly formal. A more wooden 'having called out' is possible but less
    natural in English.
- source_word: ἐπυνθάνοντο
  chosen: asked
  alternatives:
  - inquired
  - were asking
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or attempted inquiry. 'Asked'
    is natural English in sequence with the participle; the durative nuance is light
    in context and can be conveyed by the overall narrative flow. 'Inquired' is slightly
    more formal but possible.
- source_word: εἰ
  chosen: whether
  alternatives:
  - if
  lexicon: BDAG
  rationale: Introduces an indirect question. 'Whether' is the most idiomatic English
    rendering for indirect inquiry here, more precise than 'if'.
- source_word: ἐπικαλούμενος
  chosen: who is called
  alternatives:
  - who was called
  - also called
  - surnamed
  lexicon: BDAG
  rationale: The participle identifies Simon by the name by which he is known. 'Who
    is called Peter' is straightforward and preserves the present/passive sense. 'Also
    called' is idiomatic but slightly more interpretive.
- source_word: ἐνθάδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: The adverb simply indicates location. 'Here' is the natural modern English
    equivalent.
- source_word: ξενίζεται
  chosen: was staying
  alternatives:
  - was lodging
  - was being hosted as a guest
  lexicon: BDAG
  rationale: The verb refers to being hosted or lodged as a guest. 'Was staying' is
    clear modern English; 'was lodging' is more formal and slightly narrower. The
    passive-like hospitality nuance is noted by the alternatives.
- source_word: Σίμων ὁ ἐπικαλούμενος Πέτρος
  chosen: Simon, who is called Peter
  alternatives:
  - Simon, also called Peter
  lexicon: BDAG
  rationale: This appositional identification is best rendered with a relative clause
    in English for clarity and naturalness while preserving both names.
