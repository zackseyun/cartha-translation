id: ACT.10.4
reference: Acts 10:4
source:
  edition: SBLGNT
  text: ὁ δὲ ἀτενίσας αὐτῷ καὶ ἔμφοβος γενόμενος εἶπεν· Τί ἐστιν, κύριε; εἶπεν δὲ
    αὐτῷ· Αἱ προσευχαί σου καὶ αἱ ἐλεημοσύναι σου ἀνέβησαν εἰς μνημόσυνον ⸀ἔμπροσθεν
    τοῦ θεοῦ·
translation:
  text: But he stared at him, and becoming afraid, said, “What is it, Lord?” And he
    said to him, “Your prayers and your acts of mercy have gone up as a memorial before
    God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “alms” for “acts of mercy.” The Greek term refers especially to charitable
      giving to the needy.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίσας
  chosen: stared at
  alternatives:
  - looked intently at
  - fixed his gaze on
  lexicon: BDAG
  rationale: The participle denotes a fixed, intent look. 'Stared at' is vivid and
    natural in modern English, while still conveying the intensity of the gaze.
- source_word: ἔμφοβος γενόμενος
  chosen: becoming afraid
  alternatives:
  - being terrified
  - becoming frightened
  lexicon: BDAG
  rationale: This construction expresses entering a state of fear. 'Becoming afraid'
    preserves the ingressive sense of γενόμενος without overstating the emotion as
    'terrified.'
- source_word: Τί ἐστιν
  chosen: What is it
  alternatives:
  - What is it?
  - What does this mean?
  lexicon: BDAG
  rationale: In context Cornelius is asking the heavenly messenger what the matter
    is or what is being requested. 'What is it' is the most direct and idiomatic rendering.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here Cornelius addresses a heavenly
    messenger respectfully; 'Lord' preserves the lexical form and the elevated register,
    while 'sir' would flatten the tone. The term is not necessarily a confession about
    Jesus, but the standard rendering remains appropriate.
- source_word: προσευχαί
  chosen: prayers
  lexicon: BDAG
  rationale: Standard rendering for προσευχαί; no contextual pressure suggests variation.
- source_word: ἐλεημοσύναι
  chosen: acts of mercy
  alternatives:
  - alms
  - charitable gifts
  lexicon: BDAG
  rationale: The term refers to merciful giving to the needy. 'Acts of mercy' is accessible
    modern English and preserves the mercy component better than the more traditional
    but less transparent 'alms.'
- source_word: ἀνέβησαν
  chosen: have gone up
  alternatives:
  - have ascended
  - went up
  lexicon: BDAG
  rationale: The verb evokes upward movement in sacrificial or prayer imagery. 'Have
    gone up' is natural English and preserves the metaphor without sounding archaic.
- source_word: εἰς μνημόσυνον
  chosen: as a memorial
  alternatives:
  - for a memorial
  - as a remembrance offering
  lexicon: BDAG
  rationale: The phrase indicates that Cornelius's prayers and merciful deeds have
    come before God in a memorial sense, echoing sacrificial language. 'As a memorial'
    is clear and sufficiently formal; 'remembrance offering' would import cultic specificity
    beyond the text.
- source_word: ἔμπροσθεν τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: A straightforward prepositional phrase indicating God's presence or sight.
    'Before God' is concise and idiomatic.
