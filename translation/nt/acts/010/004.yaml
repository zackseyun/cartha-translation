theological_decisions:
- issue: Force of κύριε in Cornelius's address to the heavenly figure
  chosen_reading: Rendered as 'Lord' as a respectful address to a heavenly messenger,
    without implying a full christological confession.
  alternative_readings:
  - sir
  - master
  rationale: The doctrine file sets κύριος to 'Lord' as the default rendering. In
    this narrative context the word functions as reverential address, but translating
    it 'Lord' preserves lexical consistency and the elevated setting while avoiding
    unnecessary doctrinal import in the rationale rather than the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
