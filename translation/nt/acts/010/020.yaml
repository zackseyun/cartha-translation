id: ACT.10.20
reference: Acts 10:20
source:
  edition: SBLGNT
  text: ἀλλὰ ἀναστὰς κατάβηθι καὶ πορεύου σὺν αὐτοῖς μηδὲν διακρινόμενος, ⸀ὅτι ἐγὼ
    ἀπέσταλκα αὐτούς.
translation:
  text: But get up, go down, and go with them, doubting nothing, because I have sent
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'making no distinction'; the Greek participle can mean either not doubting/hesitating
      or not making a distinction, and the latter may echo the chapter's Jew-Gentile
      theme.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Marks a contrast with Peter's prior uncertainty and redirects him to
    action; 'But' is the most natural concise English adversative here.
- source_word: ἀναστὰς
  chosen: get up
  alternatives:
  - rise
  - stand up
  lexicon: BDAG
  rationale: Aorist participle functioning imperativally in sequence with the following
    commands. 'Get up' is idiomatic modern English and preserves the call to immediate
    action.
- source_word: κατάβηθι
  chosen: go down
  alternatives:
  - come down
  lexicon: BDAG
  rationale: The verb literally means 'go down.' Since the speaker is not spatially
    located below Peter in a way that requires English 'come down,' 'go down' better
    preserves the Greek motion from Peter's rooftop location.
- source_word: πορεύου
  chosen: go
  alternatives:
  - travel
  - be on your way
  lexicon: BDAG
  rationale: Common movement verb in imperative form. 'Go' is simple and natural,
    and in combination with 'with them' conveys accompanying travel without overtranslation.
- source_word: σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - together with them
  lexicon: BDAG
  rationale: Straightforward accompaniment; 'with them' is sufficient in English without
    unnecessary expansion.
- source_word: μηδὲν διακρινόμενος
  chosen: doubting nothing
  alternatives:
  - without hesitation
  - making no distinction
  - without misgivings
  lexicon: BDAG
  rationale: διακρίνω can mean 'doubt, hesitate' or 'distinguish/discriminate.' In
    this immediate context of Peter's uncertainty about the vision and the arriving
    Gentile messengers, the participle most naturally means not wavering or hesitating.
    'Doubting nothing' preserves the lexical connection to doubt while remaining readable.
    Because 'making no distinction' is contextually plausible in Acts 10's Jew-Gentile
    setting, that alternative is preserved in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason Peter should comply. 'Because' makes the causal
    force explicit in natural English.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun adds emphasis in Greek; English naturally includes 'I'
    in the clause, adequately conveying the subject and some emphasis through position.
- source_word: ἀπέσταλκα
  chosen: have sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: 'Perfect tense indicates a completed action with present relevance: the
    men stand there as those whom God has sent. English present perfect best reflects
    this nuance.'
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring to the messengers; standard English pronoun.
