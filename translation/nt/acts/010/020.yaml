theological_decisions:
- issue: Meaning of μηδὲν διακρινόμενος in relation to Gentile inclusion
  chosen_reading: Rendered as 'doubting nothing' in the main text, emphasizing Peter's
    need not to hesitate.
  alternative_readings:
  - making no distinction
  - without hesitation
  - without misgivings
  rationale: The immediate narrative context includes Peter's perplexity over the
    vision and the Spirit's directive to accompany the men. The broader chapter also
    develops the theme of not distinguishing between Jew and Gentile. To preserve
    theological tension rather than collapse the ambiguity, the main text follows
    the more immediate sense of hesitation/doubt, while the alternative 'making no
    distinction' is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
