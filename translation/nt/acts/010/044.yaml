id: ACT.10.44
reference: Acts 10:44
source:
  edition: SBLGNT
  text: Ἔτι λαλοῦντος τοῦ Πέτρου τὰ ῥήματα ταῦτα ἐπέπεσε τὸ πνεῦμα τὸ ἅγιον ἐπὶ πάντας
    τοὺς ἀκούοντας τὸν λόγον.
translation:
  text: While Peter was still speaking these words, the Holy Spirit fell upon all
    those hearing the message.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Holy Spirit came upon all who heard the word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: 'With the genitive absolute λαλοῦντος τοῦ Πέτρου, ἔτι marks ongoing action
    at the moment of the main verb: Peter was ''still'' speaking when the Spirit came.'
- source_word: λαλοῦντος τοῦ Πέτρου
  chosen: While Peter was still speaking
  alternatives:
  - As Peter was still speaking
  - Peter still speaking
  lexicon: BDAG
  rationale: This is a genitive absolute with present participle, best rendered as
    a temporal circumstantial clause in natural English. 'While' preserves simultaneity
    with ἐπέπεσε.
- source_word: τὰ ῥήματα ταῦτα
  chosen: these words
  alternatives:
  - these things
  - these statements
  lexicon: BDAG
  rationale: ῥήματα commonly refers to spoken words/sayings. 'These words' is the
    most direct and idiomatic rendering in this discourse context.
- source_word: ἐπέπεσε
  chosen: fell upon
  alternatives:
  - came upon
  - fell on
  lexicon: BDAG
  rationale: ἐπιπίπτω literally means 'fall upon.' In Acts this verb is used for the
    Holy Spirit coming upon people; 'fell upon' preserves the vividness and intertextual
    consistency of Luke's wording better than the smoother 'came upon'.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard modern English rendering of the articular phrase. 'Holy Spirit'
    is clear, contemporary, and theologically precise.
- source_word: ἐπὶ πάντας
  chosen: upon all
  alternatives:
  - on all
  - upon everyone
  lexicon: BDAG
  rationale: ἐπί with accusative after ἐπέπεσε is naturally 'upon.' πάντας is masculine
    plural because it refers to the people present; 'all' is concise and idiomatic.
- source_word: τοὺς ἀκούοντας
  chosen: those hearing
  alternatives:
  - those who were listening to
  - those listening to
  lexicon: BDAG
  rationale: Present participle denotes those in the act of hearing at that moment.
    'Those hearing' is slightly more formal but preserves the immediacy of the participle
    without overexpansion.
- source_word: τὸν λόγον
  chosen: the message
  alternatives:
  - the word
  - the word spoken
  lexicon: BDAG
  rationale: In this proclamation context, λόγος refers to the preached message rather
    than a single lexical 'word.' 'The message' communicates the sense clearly in
    modern English while avoiding possible misunderstanding.
