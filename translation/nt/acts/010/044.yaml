theological_decisions:
- issue: Rendering of the Spirit's action in ἐπέπεσε
  chosen_reading: the Holy Spirit fell upon all those hearing the message
  alternative_readings:
  - the Holy Spirit came upon all who heard the word
  rationale: The translation preserves Luke's concrete wording without importing a
    denominational interpretation of Spirit baptism beyond what the text states. 'Fell
    upon' reflects the Greek verb directly and maintains the narrative force.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering λόγος in proclamation context
  chosen_reading: the message
  alternative_readings:
  - the word
  rationale: This choice aims for readable modern English while preserving the referent
    as Peter's proclaimed gospel message. It does not diminish theological weight
    but clarifies sense for contemporary readers.
  doctrine_reference: Translation philosophy §§1, 6
