id: ACT.10.6
reference: Acts 10:6
source:
  edition: SBLGNT
  text: οὗτος ξενίζεται παρά τινι Σίμωνι βυρσεῖ, ᾧ ἐστιν οἰκία παρὰ θάλασσαν.
translation:
  text: He is lodging with a certain Simon, a tanner, whose house is by the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "He is staying with a certain Simon, a tanner."
    reason: lexical_alternative
lexical_decisions:
- source_word: ξενίζεται
  chosen: is lodging
  alternatives:
  - is staying
  - is being hosted
  lexicon: BDAG
  rationale: The present passive/middle of ξενίζω here denotes being received as a
    guest or staying with someone. 'Is lodging' is natural modern English and preserves
    the hosted-stay sense better than the flatter 'is staying.'
- source_word: παρά τινι
  chosen: with a certain
  alternatives:
  - with someone named
  - at the house of a certain
  lexicon: BDAG
  rationale: παρά with the dative indicates association/location with a person, and
    τις is indefinite. 'With a certain' preserves the indefiniteness without overexpanding
    the Greek.
- source_word: Σίμωνι
  chosen: Simon
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: βυρσεῖ
  chosen: a tanner
  alternatives:
  - a leatherworker
  lexicon: BDAG
  rationale: βυρσεύς specifically denotes a tanner, one who processes hides. 'Tanner'
    is more precise than the broader 'leatherworker.'
- source_word: ᾧ ἐστιν οἰκία
  chosen: whose house is
  alternatives:
  - who has a house
  - and his house is
  lexicon: BDAG
  rationale: The relative pronoun with ἐστιν οἰκία idiomatically identifies Simon
    as the one whose house is in the stated location. 'Whose house is' is concise
    and natural.
- source_word: παρὰ θάλασσαν
  chosen: by the sea
  alternatives:
  - beside the sea
  - near the sea
  lexicon: BDAG
  rationale: παρά with the accusative here expresses proximity. 'By the sea' is idiomatic
    English and accurately conveys location.
- source_word: οὗτος
  chosen: He
  alternatives:
  - This man
  - This one
  lexicon: BDAG
  rationale: In context οὗτος refers back to Peter. English normally uses the pronoun
    'He' rather than the more wooden 'This man' or 'This one.'
