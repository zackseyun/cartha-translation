id: ACT.10.9
reference: Acts 10:9
source:
  edition: SBLGNT
  text: Τῇ δὲ ἐπαύριον ὁδοιπορούντων ἐκείνων καὶ τῇ πόλει ἐγγιζόντων ἀνέβη Πέτρος
    ἐπὶ τὸ δῶμα προσεύξασθαι περὶ ὥραν ἕκτην.
translation:
  text: Now on the next day, while those men were traveling and drawing near to the
    city, Peter went up on the housetop to pray, about the sixth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about noon by Jewish daytime reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  chosen: Now on the next day
  alternatives:
  - And on the next day
  - The next day
  lexicon: BDAG
  rationale: The dative article with ἐπαύριον forms a temporal expression, 'on the
    next day.' δέ is rendered with a light connective ('Now') to preserve narrative
    flow without overstating contrast.
- source_word: ὁδοιπορούντων ἐκείνων
  chosen: while those men were traveling
  alternatives:
  - as they were on their way
  - while those ones were traveling
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. ἐκείνων refers back
    to Cornelius's messengers; 'those men' makes the referent natural in English while
    preserving specificity. 'Traveling' reflects ὁδοιπορέω straightforwardly.
- source_word: τῇ πόλει ἐγγιζόντων
  chosen: and drawing near to the city
  alternatives:
  - and approaching the city
  - and coming near the city
  lexicon: BDAG
  rationale: Second participle within the same genitive absolute. 'Drawing near' preserves
    the verbal nuance of ἐγγίζω and reads naturally with the city as destination.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - ascended
  - went up onto
  lexicon: BDAG
  rationale: Simple aorist narrative verb. 'Went up' is idiomatic and fits the movement
    to an upper flat roof without sounding overly formal.
- source_word: ἐπὶ τὸ δῶμα
  chosen: on the housetop
  alternatives:
  - onto the roof
  - upon the roof
  lexicon: BDAG
  rationale: δῶμα here refers to the flat roof area of a house used as accessible
    space. 'Housetop' is a conventional but still understandable rendering; it preserves
    the architectural sense better than a generic 'roof' alone.
- source_word: προσεύξασθαι
  chosen: to pray
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: Aorist middle infinitive of purpose after ἀνέβη. 'To pray' is the natural
    English purpose construction.
- source_word: περὶ ὥραν ἕκτην
  chosen: about the sixth hour
  alternatives:
  - around noon
  - about noon
  lexicon: BDAG
  rationale: Literally 'about the sixth hour.' The main text preserves the source
    culture's time expression; the approximate force of περί is retained with 'about.'
    Since the sixth hour is roughly noon by Jewish daytime reckoning, that explanatory
    sense is better preserved in a footnote rather than replacing the expression in
    the text.
