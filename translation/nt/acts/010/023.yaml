id: ACT.10.23
reference: Acts 10:23
source:
  edition: SBLGNT
  text: εἰσκαλεσάμενος οὖν αὐτοὺς ἐξένισεν. Τῇ δὲ ἐπαύριον ⸀ἀναστὰς ἐξῆλθεν σὺν αὐτοῖς,
    καί τινες τῶν ἀδελφῶν τῶν ἀπὸ Ἰόππης συνῆλθον αὐτῷ.
translation:
  text: So he invited them in and gave them lodging. The next day he got up and went
    out with them, and some of the brothers from Joppa went with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "hosted them" or "received them as guests"; the Greek specifically refers
      to extending hospitality by lodging them.
    reason: lexical_alternative
  - marker: b
    text: '"Brothers" translates the masculine plural ἀδελφῶν; in early Christian
      usage this can sometimes include fellow believers more broadly, that is, "brothers
      and sisters."'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσκαλεσάμενος
  chosen: invited ... in
  alternatives:
  - called in
  - welcomed in
  lexicon: BDAG
  rationale: The middle participle indicates Peter had them enter his lodging. 'Invited
    them in' is natural English and preserves the hospitable action better than the
    more wooden 'called in.'
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from the preceding exchange. 'So' is idiomatic
    in modern English narrative without overstating logical force.
- source_word: ἐξένισεν
  chosen: gave them lodging
  alternatives:
  - hosted them
  - received them as guests
  lexicon: BDAG
  rationale: The verb ξενίζω here refers specifically to extending hospitality by
    lodging guests. 'Gave them lodging' makes the concrete action explicit and avoids
    the possible ambiguity of 'hosted.'
- source_word: Τῇ δὲ ἐπαύριον
  chosen: The next day
  alternatives:
  - on the next day
  - the following day
  lexicon: BDAG
  rationale: Standard temporal idiom. 'The next day' is clear, natural, and faithful
    to the narrative sequence.
- source_word: ἀναστὰς
  chosen: got up
  alternatives:
  - arose
  - set out
  lexicon: BDAG
  rationale: The participle literally means 'having arisen.' 'Got up' preserves the
    simple movement without importing more than the Greek states. 'Set out' would
    overlap too much with ἐξῆλθεν.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: BDAG
  rationale: A straightforward rendering of ἐξέρχομαι. 'Went out' keeps the concrete
    motion and works well with the participle preceding it.
- source_word: σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - together with them
  lexicon: BDAG
  rationale: Simple accompaniment; no need for a more formal expansion.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural in narrative; 'some' is the natural English equivalent.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate rendering is preferred. In Acts this term
    can denote fellow believers, but the Greek form is masculine plural and the immediate
    referents here are naturally rendered 'brothers.' Inclusive alternatives are possible
    interpretively but should not replace the source form in the main text.
- source_word: τῶν ἀπὸ Ἰόππης
  chosen: from Joppa
  alternatives:
  - who were from Joppa
  lexicon: BDAG
  rationale: The prepositional phrase identifies the brothers by origin. The shorter
    English phrasing is sufficient and natural.
- source_word: συνῆλθον αὐτῷ
  chosen: went with him
  alternatives:
  - accompanied him
  - joined him
  lexicon: BDAG
  rationale: In context συνέρχομαι conveys accompanying Peter on the journey. 'Went
    with him' is clear and idiomatic. 'Joined him' is possible but slightly less explicit
    about travel accompaniment.
