theological_decisions:
- issue: Rendering of ἀδελφῶν in a potentially mixed-group ecclesial context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is retained in the main text rather than neutralized. Because ἀδελφοί can function
    representatively in early Christian usage, an inclusive interpretive alternative
    is worth preserving in a footnote rather than moving into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
