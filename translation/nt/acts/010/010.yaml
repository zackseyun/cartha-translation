id: ACT.10.10
reference: Acts 10:10
source:
  edition: SBLGNT
  text: ἐγένετο δὲ πρόσπεινος καὶ ἤθελεν γεύσασθαι· παρασκευαζόντων δὲ ⸀αὐτῶν ⸀ἐγένετο
    ἐπ’ αὐτὸν ἔκστασις,
translation:
  text: He became very hungry and wanted to eat; but while they were preparing it,
    a trance came over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanted to taste something'; the Greek verb can literally mean 'to taste,'
      but here it refers to eating.
    reason: lexical_alternative
  - marker: b
    text: Or 'an ecstasy came over him'; the Greek term denotes an altered state associated
      here with visionary revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: He became
  alternatives:
  - he was
  - it happened that he became
  lexicon: BDAG
  rationale: The aorist middle of γίνομαι here introduces a change of state. 'He became'
    is natural English and preserves the ingressive sense better than a simple stative
    rendering.
- source_word: πρόσπεινος
  chosen: very hungry
  alternatives:
  - hungry
  - famished
  lexicon: BDAG
  rationale: The adjective means very hungry or ravenous, stronger than merely 'hungry.'
    'Very hungry' preserves the intensifying force without sounding overly colloquial.
- source_word: ἤθελεν
  chosen: wanted
  alternatives:
  - desired
  - wished
  lexicon: BDAG
  rationale: '''Wanted'' is the most natural modern English equivalent for θέλω in
    this context and fits the straightforward narrative style.'
- source_word: γεύσασθαι
  chosen: to eat
  alternatives:
  - to taste
  - to take food
  lexicon: BDAG
  rationale: Although γεύομαι literally means 'taste,' in context it idiomatically
    refers to eating food. 'To eat' communicates the intended sense clearly in modern
    English.
- source_word: παρασκευαζόντων
  chosen: while they were preparing it
  alternatives:
  - while they were making preparations
  - while they were preparing food
  lexicon: BDAG
  rationale: The genitive absolute marks contemporaneous action. The implied object
    is the meal/food, supplied in English as 'it' for readability without over-specifying
    beyond the context.
- source_word: ἐγένετο ἐπ’ αὐτὸν
  chosen: came over him
  alternatives:
  - came upon him
  - fell upon him
  lexicon: BDAG
  rationale: This construction expresses the onset of an experience affecting Peter.
    'Came over him' is idiomatic English and suits the experiential nature of the
    following noun.
- source_word: ἔκστασις
  chosen: a trance
  alternatives:
  - ecstasy
  - amazement
  - astonishment
  lexicon: BDAG
  rationale: In Acts this term refers to an altered state associated with visionary
    experience, not merely emotional astonishment. 'A trance' best fits the narrative
    context and standard usage in this passage.
