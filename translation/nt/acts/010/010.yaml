theological_decisions:
- issue: Nature of Peter's visionary state denoted by ἔκστασις
  chosen_reading: a trance
  alternative_readings:
  - ecstasy
  - amazement
  rationale: The context immediately introduces a revelatory vision, so the term is
    best rendered as a trance-like state rather than a mere emotional reaction. This
    reflects the narrative function without importing later mystical terminology.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
