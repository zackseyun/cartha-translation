id: ACT.10.31
reference: Acts 10:31
source:
  edition: SBLGNT
  text: καὶ φησί· Κορνήλιε, εἰσηκούσθη σου ἡ προσευχὴ καὶ αἱ ἐλεημοσύναι σου ἐμνήσθησαν
    ἐνώπιον τοῦ θεοῦ.
translation:
  text: And he said, ‘Cornelius, your prayer has been heard, and your acts of charity
    have been remembered before God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your alms” or “your charitable gifts.” The Greek term refers to merciful
      giving or deeds for those in need.
    reason: lexical_alternative
lexical_decisions:
- source_word: φησί
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('he says'), idiomatic
    modern English normally renders this narrative present as a simple past in this
    context.
- source_word: Κορνήλιε
  chosen: Cornelius
  rationale: Personal names are transliterated by standard English convention.
- source_word: εἰσηκούσθη
  chosen: has been heard
  alternatives:
  - was heard
  lexicon: BDAG
  rationale: The aorist passive indicates that the prayer received a hearing. 'Has
    been heard' is natural English that also conveys present relevance in the angel's
    report.
- source_word: προσευχὴ
  chosen: prayer
  alternatives:
  - petition
  lexicon: BDAG
  rationale: Standard rendering for προσευχή; singular is preserved as in the Greek.
- source_word: ἐλεημοσύναι
  chosen: acts of charity
  alternatives:
  - alms
  - merciful deeds
  - charitable gifts
  lexicon: BDAG
  rationale: ἐλεημοσύναι refers to deeds or gifts of mercy toward the needy. 'Acts
    of charity' communicates the sense in readable modern English better than the
    more traditional but less common 'alms,' while preserving the concrete ethical
    dimension.
- source_word: ἐμνήσθησαν
  chosen: have been remembered
  alternatives:
  - were remembered
  - have come into remembrance
  lexicon: BDAG
  rationale: Passive aorist plural. 'Have been remembered' is clear modern English
    and preserves the divine acknowledgment implied by the passive.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: A standard idiomatic rendering of ἐνώπιον with the genitive, expressing
    God's presence and evaluative regard without unnecessary expansion.
