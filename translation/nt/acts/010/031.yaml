theological_decisions:
- issue: Meaning of Cornelius's charitable actions
  chosen_reading: Rendered ἐλεημοσύναι as 'acts of charity' rather than the traditional
    'alms.'
  alternative_readings:
  - alms
  - charitable gifts
  rationale: The verse commends concrete merciful giving/deeds before God, but does
    not specify a doctrine of merit. 'Acts of charity' preserves the ethical sense
    in accessible English without importing theological conclusions beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Divine remembrance language
  chosen_reading: Retained 'have been remembered before God' as covenantal/relational
    language rather than paraphrasing to 'God has noticed.'
  alternative_readings:
  - God has noticed
  - God has taken note
  rationale: The biblical idiom of remembrance carries theological weight and should
    be preserved where understandable. This keeps the text's gravity without overstating
    a mechanism of salvation or merit.
  doctrine_reference: Translation philosophy §§1, 3, 6
