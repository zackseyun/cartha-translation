theological_decisions:
- issue: Purity terminology distinction between κοινόν and ἀκάθαρτον
  chosen_reading: Render both terms distinctly as 'common and unclean'
  alternative_readings:
  - Render as 'impure or unclean'
  - Collapse to a single idea such as 'defiled'
  rationale: The Greek uses two coordinated adjectives, likely reflecting related
    but not identical purity categories. Preserving both avoids importing an interpretive
    simplification and maintains the Jewish purity framework behind Peter's statement.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
