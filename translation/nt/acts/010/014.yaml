id: ACT.10.14
reference: Acts 10:14
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος εἶπεν· Μηδαμῶς, κύριε, ὅτι οὐδέποτε ἔφαγον πᾶν κοινὸν ⸀καὶ ἀκάθαρτον.
translation:
  text: But Peter said, “By no means, Lord, because I have never eaten anything common
    and unclean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anything defiled and unclean.' The Greek distinguishes κοινόν ('common')
      from ἀκάθαρτον ('unclean'), so the main text preserves both terms separately.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδαμῶς
  chosen: By no means
  alternatives:
  - Certainly not
  - Not at all
  lexicon: BDAG
  rationale: Strong idiomatic negation; 'By no means' preserves Peter's emphatic refusal
    in natural modern English without sounding archaic.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  - sir
  lexicon: BDAG
  rationale: DOCTRINE.md lists κύριος default as 'Lord.' In this address to Jesus/heavenly
    speaker, 'Lord' best preserves both reverence and likely theological weight.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Introduces the reason for Peter's refusal; 'because' is the clearest
    English connector here.
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - not ever
  lexicon: BDAG
  rationale: Standard rendering conveying absolute negation over Peter's past practice.
- source_word: ἔφαγον
  chosen: I have never eaten
  alternatives:
  - I never ate
  - I have not eaten
  lexicon: BDAG
  rationale: Greek aorist in this idiom summarizes life experience up to the present;
    English present perfect best communicates 'never in my life have I eaten.'
- source_word: πᾶν
  chosen: anything
  alternatives:
  - anything that is
  - any
  lexicon: BDAG
  rationale: With neuter singular adjectives functioning substantivally, English idiom
    is better expressed as 'anything common and unclean' rather than the wooden 'everything
    common and unclean.'
- source_word: κοινόν
  chosen: common
  alternatives:
  - defiled
  - profane
  - ceremonially common
  lexicon: BDAG
  rationale: '''Common'' is the direct lexical sense and preserves the distinction
    from ἀκάθαρτον. Although less immediately transparent to modern readers, it is
    important not to collapse the two terms into one concept.'
- source_word: ἀκάθαρτον
  chosen: unclean
  alternatives:
  - impure
  lexicon: BDAG
  rationale: Standard rendering in Jewish purity contexts; paired with 'common' to
    preserve the source's twofold description.
