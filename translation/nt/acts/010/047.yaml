  category: awkward_english
  tier: 1
  from: can he?
  to: can they?
  rationale: The tag question 'can he?' is grammatically mismatched with the indefinite pronoun 'no one.' In contemporary English, 'they' is the standard pronoun in this context. Using 'can they?' would be more natural and correct. Alternatively, the tag question could be omitted entirely, as 'Surely no one...' already captures the rhetorical force of the Greek 'Μήτι'.
