theological_decisions:
- issue: Relation of Spirit reception to water baptism
  chosen_reading: The verse is translated to state that these people have already received the Holy Spirit, and on that basis Peter argues that water baptism should not be withheld.
  alternative_readings:
  - A rendering that obscures the temporal priority of Spirit reception to baptism
  rationale: 'The Greek sequence and argument are straightforward: reception of the Holy Spirit precedes and warrants water baptism in this narrative. The translation preserves that narrative-theological tension without importing a denominational sacramental framework.'
  doctrine_reference: Preserve theological tension rather than resolve it.
