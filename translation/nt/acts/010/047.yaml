id: ACT.10.47
reference: Acts 10:47
source:
  edition: SBLGNT
  text: Μήτι τὸ ὕδωρ ⸂δύναται κωλῦσαί⸃ τις τοῦ μὴ βαπτισθῆναι τούτους οἵτινες τὸ πνεῦμα τὸ ἅγιον ἔλαβον ⸀ὡς καὶ ἡμεῖς;
translation:
  text: Surely no one can withhold the water for baptizing these people, who have received the Holy Spirit just as we have, can they?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forbid the water' or 'prevent these people from being baptized.'
    reason: lexical_alternative
  - marker: b
    text: Or 'can he?'.
    reason: previous_rendering
lexical_decisions:
- source_word: Μήτι
  chosen: Surely ... can he?
  alternatives:
  - Surely not
  - Can it be that
  lexicon: BDAG
  rationale: Μήτι introduces a question expecting a negative answer. In English, this is best conveyed by a rhetorical question framed to expect 'no.' The tag question 'can he?' helps preserve the rhetorical force.
- source_word: τὸ ὕδωρ
  chosen: the water
  alternatives:
  - water
  lexicon: BDAG
  rationale: The article is retained because the Greek has a definite expression. In context it refers to the water used for baptism, not water in general.
- source_word: δύναται κωλῦσαί τις
  chosen: no one can withhold
  alternatives:
  - can anyone forbid
  - can anyone prevent
  lexicon: BDAG
  rationale: The construction means 'is anyone able to hinder/forbid.' 'Withhold' fits the object 'the water' naturally in English while preserving the sense that baptismal water should not be denied to them.
- source_word: τοῦ μὴ βαπτισθῆναι
  chosen: for baptizing
  alternatives:
  - from being baptized
  - so that they should not be baptized
  lexicon: BDAG
  rationale: 'This articular infinitive with μή expresses prevention of an action: withholding the water so that these people are not baptized. English idiom is smoother with ''for baptizing,'' while the sense remains that the water is not to be withheld from their baptism.'
- source_word: τούτους
  chosen: these people
  alternatives:
  - these men
  - these ones
  lexicon: BDAG
  rationale: Although grammatically masculine, the referent is a group of persons. 'These people' is natural English and reflects the representative sense without implying only males beyond what the context requires.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - since they
  - seeing that they
  lexicon: BDAG
  rationale: The relative pronoun identifies the people by the fact that they received the Spirit. 'Who' preserves the syntax; the causal nuance is implicit in context.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard modern rendering of the title; it preserves the personal and theological sense of the phrase in readable English.
- source_word: ἔλαβον
  chosen: have received
  alternatives:
  - received
  lexicon: BDAG
  rationale: The Greek aorist is rendered with English present perfect because the reception of the Spirit is a completed event with present relevance in the argument for baptism.
- source_word: ὡς καὶ ἡμεῖς
  chosen: just as we have
  alternatives:
  - even as we also did
  - as also we did
  lexicon: BDAG
  rationale: This comparison explicitly places their reception of the Spirit alongside that of the Jewish believers. 'Just as we have' is idiomatic and preserves the comparison.
