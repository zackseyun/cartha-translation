theological_decisions:
- issue: Scope and condition of forgiveness
  chosen_reading: The verse states that forgiveness of sins is received through Jesus'
    name by everyone who believes in him.
  alternative_readings:
  - The verse could be paraphrased more strongly in doctrinal terms, but such expansions
    are avoided.
  rationale: The translation preserves the text's stated relationship between Jesus,
    faith, and forgiveness without importing denominational formulations about the
    mechanics of salvation beyond what the Greek explicitly says.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Generic masculine participle
  chosen_reading: everyone who believes
  alternative_readings:
  - every man who believes
  rationale: The Greek masculine singular participle is representative/generic, not
    male-exclusive. Rendering it as 'everyone' is gender-accurate to the source's
    intent and natural in English.
  doctrine_reference: Translation philosophy §4
