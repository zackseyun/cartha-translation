id: ACT.10.43
reference: Acts 10:43
source:
  edition: SBLGNT
  text: τούτῳ πάντες οἱ προφῆται μαρτυροῦσιν, ἄφεσιν ἁμαρτιῶν λαβεῖν διὰ τοῦ ὀνόματος
    αὐτοῦ πάντα τὸν πιστεύοντα εἰς αὐτόν.
translation:
  text: All the prophets testify about him that everyone who believes in him receives
    forgiveness of sins through his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear witness concerning him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  chosen: about him
  alternatives:
  - to him
  - concerning him
  lexicon: BDAG
  rationale: Dative demonstrative linked with μαρτυροῦσιν is idiomatically rendered
    in English as testimony 'about' or 'concerning' someone rather than the more wooden
    'to him.' Contextually Peter is saying the prophets bear witness concerning Jesus.
- source_word: πάντες οἱ προφῆται
  chosen: All the prophets
  alternatives:
  - all the Prophets
  lexicon: BDAG
  rationale: Straightforward universal reference to the prophetic witness. Lowercase
    'prophets' fits English style for persons rather than a formal title for a corpus,
    though the sense includes the prophetic Scriptures.
- source_word: μαρτυροῦσιν
  chosen: testify
  alternatives:
  - bear witness
  - give testimony
  lexicon: BDAG
  rationale: '''Testify'' is clear modern English and preserves the evidentiary force
    of the verb without sounding overly formal.'
- source_word: ἄφεσιν ἁμαρτιῶν
  chosen: forgiveness of sins
  alternatives:
  - release from sins
  - remission of sins
  lexicon: BDAG
  rationale: Standard and natural rendering for the established NT expression. 'Forgiveness'
    best communicates the relational and judicial sense in accessible English.
- source_word: λαβεῖν
  chosen: receives
  alternatives:
  - may receive
  - is to receive
  - to receive
  lexicon: BDAG
  rationale: 'The infinitive depends on the content of prophetic testimony: that the
    believer receives forgiveness. English finite verb style is smoother and accurately
    conveys the result stated by the infinitive construction. Present tense fits the
    gnomic/general statement.'
- source_word: διὰ τοῦ ὀνόματος αὐτοῦ
  chosen: through his name
  alternatives:
  - by his name
  - through the authority of his name
  lexicon: BDAG
  rationale: Retains the biblical idiom 'through his name,' which in context denotes
    mediation/agency grounded in Jesus' person and authority. Expanding to 'authority'
    would interpret more than translate.
- source_word: πάντα τὸν πιστεύοντα
  chosen: everyone who believes
  alternatives:
  - every one believing
  - everyone believing
  lexicon: BDAG
  rationale: The masculine singular participial phrase is generic and distributive.
    'Everyone who believes' is natural English and preserves the universal scope without
    awkward literalism.
- source_word: εἰς αὐτόν
  chosen: in him
  alternatives:
  - into him
  - on him
  lexicon: BDAG
  rationale: With πιστεύω, εἰς commonly expresses personal trust directed toward someone.
    'Believe in him' is the standard idiomatic English equivalent.
