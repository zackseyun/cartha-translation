theological_decisions:
- issue: Rendering ξύλου in a crucifixion context
  chosen_reading: on a tree
  alternative_readings:
  - on a cross
  - on wood
  rationale: The Greek uses ξύλον rather than σταυρός. Rendering it 'tree' preserves
    the lexical choice and likely allusion to Deuteronomy 21:23, while still allowing
    readers to understand the crucifixion context. Using 'cross' would resolve an
    interpretive/theological association more explicitly than the source wording does.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
