id: ACT.10.39
reference: Acts 10:39
source:
  edition: SBLGNT
  text: καὶ ⸀ἡμεῖς μάρτυρες πάντων ὧν ἐποίησεν ἔν τε τῇ χώρᾳ τῶν Ἰουδαίων ⸀καὶ Ἰερουσαλήμ·
    ὃν καὶ ἀνεῖλαν κρεμάσαντες ἐπὶ ξύλου.
translation:
  text: And we are witnesses of all that he did both in the country of the Jews and
    in Jerusalem. They also put him to death by hanging him on a tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on wood' or, interpretively, 'on a cross.' The Greek says 'tree,' likely
      echoing Deuteronomy 21:23.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυρες
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: '''Witnesses'' is the standard and natural rendering for μάρτυρες in
    legal/testimonial contexts and fits Peter''s claim of apostolic eyewitness testimony.'
- source_word: πάντων ὧν ἐποίησεν
  chosen: of all that he did
  alternatives:
  - of everything that he did
  - of all the things he did
  lexicon: BDAG
  rationale: This preserves the comprehensive force of πάντων with the relative clause
    while keeping idiomatic English.
- source_word: ἔν τε τῇ χώρᾳ τῶν Ἰουδαίων
  chosen: in the country of the Jews
  alternatives:
  - in the land of the Jews
  - in the region of Judea
  lexicon: BDAG
  rationale: χώρα denotes country/region/territory. 'Country of the Jews' closely
    reflects the genitive τῶν Ἰουδαίων without over-specifying it as the Roman province
    Judea. 'Land of the Jews' is possible, but 'country' is slightly more natural
    here.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖος can mean either 'Jew' or 'Judean' depending on context. Here
    the phrase contrasts a broader territory with Jerusalem, and in Acts this often
    refers ethnically/religiously to the Jewish people. 'The Jews' is retained as
    the more straightforward reading, while the regional nuance is preserved by rendering
    χώρα as 'country.'
- source_word: καὶ Ἰερουσαλήμ
  chosen: and in Jerusalem
  alternatives:
  - and Jerusalem
  lexicon: BDAG
  rationale: 'Although the preposition is not repeated in Greek, English idiom normally
    supplies it for clarity: ''both in the country of the Jews and in Jerusalem.'''
- source_word: ἀνεῖλαν
  chosen: put him to death
  alternatives:
  - killed him
  - did away with him
  lexicon: BDAG
  rationale: ἀναιρέω here means to kill or do away with. 'Put him to death' is slightly
    more formal and fits the judicial-execution context without becoming archaic.
- source_word: κρεμάσαντες
  chosen: by hanging him
  alternatives:
  - having hanged him
  - after hanging him
  lexicon: BDAG
  rationale: 'The aorist participle is rendered instrumentally/means-oriented in English:
    they put him to death by hanging him. This communicates the participle''s relation
    to the main verb naturally.'
- source_word: ἐπὶ ξύλου
  chosen: on a tree
  alternatives:
  - on wood
  - on a wooden beam
  - on a cross
  lexicon: BDAG
  rationale: ξύλον literally means 'wood' or 'tree' and in this idiom evokes Deuteronomy's
    curse language as well as crucifixion. Per source-language primacy, 'tree' is
    preferred over the interpretive gloss 'cross,' with the crucifixion sense preserved
    by context.
