theological_decisions:
- issue: Referent of 'the Lord' (τοῦ κυρίου)
  chosen_reading: Rendered simply as 'the Lord' without specifying 'Jesus' in the
    main text.
  alternative_readings:
  - '''God'' if taken as a reference to the immediately preceding ''before God'''
  - explicitly 'the Lord Jesus' by interpretive expansion
  rationale: The Greek text reads only 'the Lord.' In Acts 10's narrative context,
    Peter has been directed by the risen Jesus, so 'the Lord' likely refers to Jesus;
    however, the translation should not import the explicit name where the text does
    not. Retaining 'the Lord' preserves the source wording and theological nuance.
  doctrine_reference: 'Contested terms: κύριος → Lord; Preserve theological tension
    rather than resolve it'
