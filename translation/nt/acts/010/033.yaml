id: ACT.10.33
reference: Acts 10:33
source:
  edition: SBLGNT
  text: ἐξαυτῆς οὖν ἔπεμψα πρὸς σέ, σύ τε καλῶς ἐποίησας παραγενόμενος. νῦν οὖν πάντες
    ἡμεῖς ἐνώπιον τοῦ θεοῦ πάρεσμεν ἀκοῦσαι πάντα τὰ προστεταγμένα σοι ὑπὸ τοῦ ⸀κυρίου.
translation:
  text: So I sent for you at once, and you did well to come. Now then, we are all
    here before God to hear everything that has been commanded to you by the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immediately' or 'without delay.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Lord.' In context this likely refers to Jesus, though some understand
      it more generally as God.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξαυτῆς
  chosen: at once
  alternatives:
  - immediately
  - without delay
  - forthwith
  lexicon: BDAG
  rationale: The adverbial expression means 'immediately' or 'at once.' 'At once'
    is natural modern English and preserves the promptness of Cornelius's action.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Here οὖν marks inference/continuation in discourse. 'So' is idiomatic
    and readable in English at the start of the sentence.
- source_word: ἔπεμψα πρὸς σέ
  chosen: I sent for you
  alternatives:
  - I sent to you
  - I sent word to you
  lexicon: BDAG
  rationale: Although literally 'I sent to you,' the idiom in context means Cornelius
    dispatched messengers to summon Peter. 'I sent for you' best captures the sense
    in natural English without over-paraphrasing.
- source_word: σύ τε
  chosen: and you
  alternatives:
  - and as for you
  - you also
  lexicon: BDAG
  rationale: The combination adds Peter's corresponding action to Cornelius's sending.
    'And you' preserves the connective force simply.
- source_word: καλῶς ἐποίησας
  chosen: you did well
  alternatives:
  - you did a good thing
  - you were right
  lexicon: BDAG
  rationale: This is a common idiom of approval. 'You did well' is concise, natural,
    and close to the Greek.
- source_word: παραγενόμενος
  chosen: to come
  alternatives:
  - by coming
  - in coming here
  - to be present
  lexicon: BDAG
  rationale: The participle is attendant to ἐποίησας and refers to Peter's arrival.
    English infinitive style ('did well to come') is the most natural equivalent.
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - now therefore
  - so now
  lexicon: BDAG
  rationale: The pair marks a transition to the purpose of the gathering. 'Now then'
    conveys the discourse shift smoothly.
- source_word: πάντες ἡμεῖς
  chosen: we are all
  alternatives:
  - all of us are
  - we all are
  lexicon: BDAG
  rationale: The emphatic subject includes the gathered household and companions.
    'We are all' is natural English and preserves the collective emphasis.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the presence of God
  lexicon: BDAG
  rationale: The phrase denotes conscious standing in God's presence. 'Before God'
    is concise and retains the solemn theological sense.
- source_word: πάρεσμεν
  chosen: are here
  alternatives:
  - are present
  lexicon: BDAG
  rationale: The verb means to be present. 'Are here' is more idiomatic in contemporary
    English while preserving the sense.
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To hear' is the straightforward rendering.
- source_word: πάντα τὰ προστεταγμένα
  chosen: everything that has been commanded
  alternatives:
  - all the things that have been ordered
  - everything appointed
  lexicon: BDAG
  rationale: The perfect passive participle from προστάσσω refers to instructions
    authoritatively given. 'Everything that has been commanded' preserves both totality
    and authoritative force.
- source_word: σοι
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative marks Peter as the recipient of the command. 'To you' is the
    clearest rendering.
- source_word: ὑπὸ τοῦ κυρίου
  chosen: by the Lord
  alternatives:
  - by the Master
  lexicon: BDAG
  rationale: Per the doctrine's contested-terms guidance, κύριος is rendered 'Lord.'
    In context this most naturally refers to the Lord Jesus as the one who commissioned
    Peter, though the wording itself is left as the title used in the Greek.
