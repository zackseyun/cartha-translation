id: ACT.10.8
reference: Acts 10:8
source:
  edition: SBLGNT
  text: καὶ ἐξηγησάμενος ⸂ἅπαντα αὐτοῖς⸃ ἀπέστειλεν αὐτοὺς εἰς τὴν Ἰόππην.
translation:
  text: And after explaining everything to them, he sent them to Joppa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξηγησάμενος
  chosen: after explaining
  alternatives:
  - after relating
  - after recounting
  - after telling
  lexicon: BDAG
  rationale: The aorist middle participle of ἐξηγέομαι here introduces action prior
    to the main verb ἀπέστειλεν. 'After explaining' captures both the participial
    temporal force and the sense of setting matters out in detail. 'Explaining' is
    more natural in modern English than the more formal 'relating' or 'recounting,'
    while still preserving the idea that Cornelius gave them a full account.
- source_word: ἅπαντα
  chosen: everything
  alternatives:
  - all things
  - the whole matter
  lexicon: BDAG
  rationale: ἅπας in the neuter plural commonly means 'everything' or 'all things.'
    'Everything' is idiomatic modern English and adequately reflects the comprehensiveness
    of Cornelius's report.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object of ἐξηγησάμενος. 'To them'
    is the straightforward rendering.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: ἀποστέλλω means 'to send' or 'dispatch.' 'He sent' is the standard and
    clearest rendering here. 'Dispatched' is possible but sounds overly formal and
    can imply urgency not explicit in the Greek.
- source_word: εἰς τὴν Ἰόππην
  chosen: to Joppa
  alternatives:
  - into Joppa
  lexicon: BDAG
  rationale: εἰς with a place name normally indicates movement toward a destination.
    In English, 'to Joppa' is the natural equivalent. The place name is transliterated
    in keeping with the translation philosophy for personal and place names.
