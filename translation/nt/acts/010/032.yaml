id: ACT.10.32
reference: Acts 10:32
source:
  edition: SBLGNT
  text: πέμψον οὖν εἰς Ἰόππην καὶ μετακάλεσαι Σίμωνα ὃς ἐπικαλεῖται Πέτρος· οὗτος
    ξενίζεται ἐν οἰκίᾳ Σίμωνος βυρσέως παρὰ ⸀θάλασσαν.
translation:
  text: Therefore send to Joppa and summon Simon, who is called Peter. He is staying
    in the house of Simon, a tanner, by the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send for Simon' instead of 'summon Simon'; the Greek verb means to have
      someone called to oneself.
    reason: lexical_alternative
  - marker: b
    text: Or 'is lodging' for 'is staying'; the Greek indicates that Peter is being
      hosted as a guest.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψον
  chosen: send
  alternatives:
  - dispatch
  lexicon: BDAG
  rationale: Aorist imperative calling for a direct action. 'Send' is the natural,
    concise English equivalent and fits the context of sending messengers.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference or continuation from the preceding revelation. 'Therefore'
    preserves the logical connection more explicitly than 'then'.
- source_word: εἰς Ἰόππην
  chosen: to Joppa
  alternatives:
  - into Joppa
  lexicon: BDAG
  rationale: Standard directional use of εἰς with a place name. 'To Joppa' is idiomatic
    English.
- source_word: μετακάλεσαι
  chosen: summon
  alternatives:
  - call for
  - send for
  lexicon: BDAG
  rationale: Middle imperative meaning to have someone called or brought. 'Summon'
    is concise and preserves the directive force; 'send for' is possible but less
    direct in English style here.
- source_word: Σίμωνα ὃς ἐπικαλεῖται Πέτρος
  chosen: Simon, who is called Peter
  alternatives:
  - Simon, who is also called Peter
  - Simon, surnamed Peter
  lexicon: BDAG
  rationale: ἐπικαλεῖται here identifies the alternate name by which Simon is known.
    'Who is called Peter' is straightforward and close to the Greek without importing
    extra nuance.
- source_word: οὗτος
  chosen: He
  alternatives:
  - This man
  lexicon: BDAG
  rationale: Demonstrative referring back to Simon Peter. English normally uses the
    pronoun 'He' rather than 'This man' in this context for natural readability.
- source_word: ξενίζεται
  chosen: is staying
  alternatives:
  - is lodging
  - is being hosted
  lexicon: BDAG
  rationale: The passive/middle sense here indicates receiving hospitality as a guest.
    'Is staying' is natural modern English; 'is lodging' is more formal and 'is being
    hosted' is more explicit but less idiomatic.
- source_word: ἐν οἰκίᾳ Σίμωνος βυρσέως
  chosen: in the house of Simon, a tanner
  alternatives:
  - with Simon the tanner
  - in Simon the tanner's house
  lexicon: BDAG
  rationale: οἰκία is literally 'house,' and βυρσεύς identifies Simon's trade. The
    appositional 'Simon, a tanner' preserves both the name and occupation clearly.
- source_word: παρὰ θάλασσαν
  chosen: by the sea
  alternatives:
  - beside the sea
  - by the seaside
  lexicon: BDAG
  rationale: παρά with the accusative here indicates location alongside. 'By the sea'
    is idiomatic and concise.
