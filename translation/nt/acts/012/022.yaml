theological_decisions:
- issue: Whether θεοῦ should be rendered 'of God' or 'of a god'
  chosen_reading: of a god
  alternative_readings:
  - of God
  rationale: The context is a pagan crowd flattering Herod with divine honors, and
    the Greek lacks the article. Translating 'of God' could misleadingly suggest the
    crowd identified Herod's voice with the one true God. 'Of a god' better preserves
    the historical and religious setting without importing monotheistic specificity
    the text does not state.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
