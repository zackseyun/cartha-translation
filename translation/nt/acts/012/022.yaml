id: ACT.12.22
reference: Acts 12:22
source:
  edition: SBLGNT
  text: ὁ δὲ δῆμος ἐπεφώνει· ⸂Θεοῦ φωνὴ⸃ καὶ οὐκ ἀνθρώπου.
translation:
  text: And the crowd kept shouting, “The voice of a god, and not of a man!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The voice of God, and not of a man!” The Greek can be read this way,
      but in context the sense is more likely “of a god,” reflecting pagan acclamation
      of Herod.
    reason: alternative_reading
lexical_decisions:
- source_word: δῆμος
  chosen: the crowd
  alternatives:
  - the people
  - the populace
  lexicon: BDAG
  rationale: δῆμος refers to the assembled populace or public rather than a formal
    political body here. 'The crowd' is natural modern English and fits the scene
    of public acclamation.
- source_word: ἐπεφώνει
  chosen: kept shouting
  alternatives:
  - shouted out
  - cried out
  - were acclaiming
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action. 'Kept shouting'
    captures the iterative/imperfective force better than a simple past such as 'shouted.'
- source_word: Θεοῦ
  chosen: of a god
  alternatives:
  - of God
  - divine
  lexicon: BDAG
  rationale: The anarthrous genitive θεοῦ in this exclamatory setting most naturally
    means 'of a god' rather than specifically 'of God.' In the pagan setting of Herod
    receiving divine honors, the crowd is attributing deity generically, not making
    a confession about the God of Israel. Rendering it 'divine' would smooth over
    the noun-based expression and weaken the direct contrast with 'man.'
- source_word: φωνὴ
  chosen: the voice
  alternatives:
  - a voice
  - sound
  lexicon: BDAG
  rationale: The Greek phrase is verbless and exclamatory. 'The voice of a god' is
    idiomatic enough in English and preserves the nominal force of φωνή. 'Sound' is
    possible but less direct.
- source_word: ἀνθρώπου
  chosen: of a man
  alternatives:
  - of man
  - human
  lexicon: BDAG
  rationale: The singular genitive contrasts directly with 'of a god.' 'Of a man'
    preserves the individual contrast in the acclamation. 'Human' would be more interpretive
    and less formally aligned.
