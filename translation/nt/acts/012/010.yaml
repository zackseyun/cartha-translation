id: ACT.12.10
reference: Acts 12:10
source:
  edition: SBLGNT
  text: διελθόντες δὲ πρώτην φυλακὴν καὶ δευτέραν ἦλθαν ἐπὶ τὴν πύλην τὴν σιδηρᾶν
    τὴν φέρουσαν εἰς τὴν πόλιν, ἥτις αὐτομάτη ἠνοίγη αὐτοῖς, καὶ ἐξελθόντες προῆλθον
    ῥύμην μίαν, καὶ εὐθέως ἀπέστη ὁ ἄγγελος ἀπ’ αὐτοῦ.
translation:
  text: After they had passed the first guard and the second, they came to the iron
    gate leading into the city, which opened to them by itself; and after they went
    out, they went along one street, and immediately the angel departed from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "opened to them of its own accord."
    reason: lexical_alternative
  - marker: b
    text: '"One street" likely means they went the distance of a single street before
      the angel left him.'
    reason: cultural_note
lexical_decisions:
- source_word: διελθόντες
  chosen: After they had passed
  alternatives:
  - having passed
  - when they had gone through
  lexicon: BDAG
  rationale: Aorist participle indicating action prior to the main verb. 'After they
    had passed' gives clear temporal sequence in natural English while preserving
    the participial force.
- source_word: φυλακήν
  chosen: guard
  alternatives:
  - guard post
  - watch
  - prison guard
  lexicon: BDAG
  rationale: In this context the singular with ordinal adjectives ('first' and 'second')
    most naturally refers to guard stations/posts rather than abstract imprisonment.
    'Guard' is concise and idiomatic.
- source_word: ἦλθαν ἐπὶ
  chosen: they came to
  alternatives:
  - they came upon
  - they arrived at
  lexicon: BDAG
  rationale: Standard narrative movement expression. 'Came to' is natural modern English
    and accurately reflects arrival at the gate.
- source_word: πύλην τὴν σιδηρᾶν
  chosen: the iron gate
  alternatives:
  - the gate of iron
  lexicon: BDAG
  rationale: Attributive adjective is best rendered in normal English order. 'Iron
    gate' preserves the material emphasis without archaism.
- source_word: τὴν φέρουσαν εἰς τὴν πόλιν
  chosen: leading into the city
  alternatives:
  - that led into the city
  - bearing toward the city
  lexicon: BDAG
  rationale: The participle φέρουσαν idiomatically describes where the gate gives
    access. 'Leading into the city' is the clearest English equivalent.
- source_word: ἥτις
  chosen: which
  alternatives:
  - and it
  - that
  lexicon: BDAG
  rationale: The relative pronoun introduces a descriptive clause about the gate.
    'Which' preserves the connection smoothly.
- source_word: αὐτομάτη
  chosen: by itself
  alternatives:
  - automatically
  - of its own accord
  lexicon: BDAG
  rationale: '''By itself'' is natural, accessible English and conveys the miraculous
    self-opening without sounding mechanical in a modern technological sense. ''Automatically''
    could mislead; ''of its own accord'' is more formal and is preserved in a footnote.'
- source_word: ἠνοίγη αὐτοῖς
  chosen: opened to them
  alternatives:
  - was opened for them
  - opened for them
  lexicon: BDAG
  rationale: Passive verb with dative advantage. 'Opened to them' is idiomatic and
    keeps the focus on the gate's action.
- source_word: ἐξελθόντες
  chosen: after they went out
  alternatives:
  - having gone out
  - when they had gone out
  lexicon: BDAG
  rationale: Aorist participle marking the next completed action in sequence. The
    English temporal clause keeps the narrative flow clear.
- source_word: προῆλθον
  chosen: they went along
  alternatives:
  - they went on
  - they proceeded
  lexicon: BDAG
  rationale: The verb indicates moving forward from the gate. 'Went along' fits the
    following object 'one street' better than the more formal 'proceeded'.
- source_word: ῥύμην μίαν
  chosen: one street
  alternatives:
  - one lane
  - a single street
  lexicon: BDAG
  rationale: 'ῥύμη refers to a street or lane. ''One street'' is a straightforward
    rendering of the accusative extent/distance idea: they went as far as one street.'
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Common Lucan adverb of prompt sequence. 'Immediately' is accurate and
    suitably neutral in register.
- source_word: ἀπέστη
  chosen: departed
  alternatives:
  - left
  - withdrew
  lexicon: BDAG
  rationale: The verb means to depart or withdraw. 'Departed' preserves the narrative
    solemnity better than the plainer 'left'.
- source_word: ὁ ἄγγελος
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In Acts this clearly refers to a heavenly angelic being, not a human
    messenger, so 'angel' is the appropriate established gloss.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - away from him
  lexicon: BDAG
  rationale: Refers back to Peter individually after the plural movement clauses.
    'From him' is direct and sufficient.
