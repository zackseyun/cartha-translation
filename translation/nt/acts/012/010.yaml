theological_decisions:
- issue: Nature of the gate's opening
  chosen_reading: which opened to them by itself
  alternative_readings:
  - which opened to them of its own accord
  - which automatically opened for them
  rationale: The text presents a miraculous event without explanatory embellishment.
    The rendering preserves the supernatural occurrence while avoiding modern mechanistic
    connotations that 'automatically' may suggest.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of φυλακή
  chosen_reading: first guard and the second
  alternative_readings:
  - first prison and second
  - first watch and second
  rationale: The narrative context is Peter's escape through successive security points.
    Rendering φυλακή here as guard stations best reflects the plain sense and avoids
    an implausible image of passing through multiple prisons.
  doctrine_reference: Translation philosophy §1, §6
