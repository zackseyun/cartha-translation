id: ACT.12.18
reference: Acts 12:18
source:
  edition: SBLGNT
  text: Γενομένης δὲ ἡμέρας ἦν τάραχος οὐκ ὀλίγος ἐν τοῖς στρατιώταις, τί ἄρα ὁ Πέτρος
    ἐγένετο.
translation:
  text: Now when day came, there was no small disturbance among the soldiers over
    what had become of Peter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there was not a little commotion among the soldiers as to what had
      happened to Peter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένης δὲ ἡμέρας
  chosen: Now when day came
  alternatives:
  - When it became day
  - At daybreak
  - When morning came
  lexicon: BDAG
  rationale: Genitive absolute with δέ marking transition. 'When day came' is natural
    modern English and preserves the temporal force without over-literal awkwardness.
- source_word: τάραχος οὐκ ὀλίγος
  chosen: no small disturbance
  alternatives:
  - not a little commotion
  - considerable disturbance
  - great disturbance
  lexicon: BDAG
  rationale: The litotes οὐκ ὀλίγος is a marked idiom meaning a significant degree.
    'No small disturbance' preserves the rhetorical flavor and is still readable;
    smoother alternatives are possible but lose the idiomatic emphasis.
- source_word: ἐν τοῖς στρατιώταις
  chosen: among the soldiers
  alternatives:
  - among the guards
  - with the soldiers
  lexicon: BDAG
  rationale: στρατιώταις straightforwardly means 'soldiers.' 'Among' best fits ἐν
    here as indicating the group within which the disturbance occurred. 'Guards' is
    interpretive from context, but the lexical form is broader.
- source_word: τί ἄρα
  chosen: over what
  alternatives:
  - about what
  - as to what then
  - what indeed
  lexicon: BDAG
  rationale: τί ἄρα introduces an indirect question with a nuance of inference or
    puzzlement ('what then...?'). In idiomatic English after 'disturbance,' 'over
    what...' captures the sense naturally.
- source_word: ὁ Πέτρος
  chosen: Peter
  rationale: Personal name transliterated by standard convention per translation philosophy.
- source_word: ἐγένετο
  chosen: had become
  alternatives:
  - had happened to
  - had become of
  - became
  lexicon: BDAG
  rationale: In the idiom τί ... ἐγένετο with a person, the sense is 'what became
    of' or 'what happened to.' The English clause 'what had become of Peter' best
    reflects the Greek idiom in context.
