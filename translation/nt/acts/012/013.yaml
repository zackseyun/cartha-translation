id: ACT.12.13
reference: Acts 12:13
source:
  edition: SBLGNT
  text: κρούσαντος δὲ ⸀αὐτοῦ τὴν θύραν τοῦ πυλῶνος προσῆλθε παιδίσκη ὑπακοῦσαι ὀνόματι
    Ῥόδη,
translation:
  text: When he knocked at the door of the gateway, a servant girl named Rhoda came
    to answer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slave girl.' The Greek παιδίσκη can denote a female household servant
      or slave; here 'servant girl' is chosen because the narrative emphasizes her
      role in the household rather than her legal status.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρούσαντος δὲ αὐτοῦ
  chosen: When he knocked
  alternatives:
  - And when he knocked
  - After he knocked
  lexicon: BDAG
  rationale: The aorist participle with δέ introduces the next action in narrative
    sequence. 'When he knocked' is natural English and preserves the temporal force
    without over-literal awkwardness.
- source_word: θύραν τοῦ πυλῶνος
  chosen: the door of the gateway
  alternatives:
  - the gate door
  - the outer gate
  - the entrance gate
  lexicon: BDAG
  rationale: θύρα is 'door' and πυλών refers to a gatehouse/gateway/outer entrance.
    The genitive construction suggests the door belonging to the gateway rather than
    a simple city gate. 'Door of the gateway' preserves both nouns and the likely
    setting of an outer entrance.
- source_word: προσῆλθε
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: προσέρχομαι literally means 'come/approach toward.' In this domestic
    narrative context, 'came' is idiomatic English; the following infinitive 'to answer'
    supplies the purpose.
- source_word: παιδίσκη
  chosen: servant girl
  alternatives:
  - maidservant
  - slave girl
  - young servant woman
  lexicon: BDAG
  rationale: παιδίσκη denotes a young female servant/slave. 'Servant girl' is clear
    modern English and fits the household setting. 'Slave girl' is possible lexically,
    but the bonded status is not the narrative focus here, so the less marked rendering
    is preferred while preserving the alternative in a footnote.
- source_word: ὑπακοῦσαι
  chosen: to answer
  alternatives:
  - to listen
  - to respond
  lexicon: BDAG
  rationale: Although ὑπακούω can mean 'listen' or 'obey,' in this context of someone
    at the door it idiomatically means to respond to the knock, i.e., 'answer.' This
    best reflects the situational sense in English.
- source_word: ὀνόματι Ῥόδη
  chosen: named Rhoda
  alternatives:
  - by the name Rhoda
  lexicon: BDAG
  rationale: The dative ὀνόματι introduces the person's name. 'Named Rhoda' is standard,
    concise English. 'Rhoda' is transliterated as a personal name in keeping with
    the translation philosophy.
