theological_decisions:
- issue: Nature of the angelic action
  chosen_reading: through the angel
  alternative_readings:
  - by the angel
  rationale: The wording preserves the Greek preposition διά with genitive as mediated
    agency, without making a theological claim beyond the text about the angel's independent
    power or role.
  doctrine_reference: Translation philosophy §1, §3
