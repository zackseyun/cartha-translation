id: ACT.12.9
reference: Acts 12:9
source:
  edition: SBLGNT
  text: καὶ ἐξελθὼν ⸀ἠκολούθει, καὶ οὐκ ᾔδει ὅτι ἀληθές ἐστιν τὸ γινόμενον διὰ τοῦ
    ἀγγέλου, ἐδόκει δὲ ὅραμα βλέπειν.
translation:
  text: And he went out and followed, and he did not know that what was happening
    through the angel was real, but thought he was seeing a vision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the angel.' The Greek can express agency; 'through the angel' was
      chosen to preserve the mediated nuance of διά with the genitive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  chosen: he went out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle preceding the main imperfect verb, naturally rendered
    in English as a finite verb coordinated with the following action. 'Went out'
    preserves the movement without over-formal participial English.
- source_word: ἠκολούθει
  chosen: followed
  alternatives:
  - was following
  lexicon: BDAG
  rationale: Imperfect indicates ongoing action, but in English narrative 'followed'
    reads naturally while still conveying the sequence. The context already implies
    continued movement behind the angel.
- source_word: οὐκ ᾔδει
  chosen: he did not know
  alternatives:
  - he was not aware
  lexicon: BDAG
  rationale: οἶδα commonly expresses knowledge or awareness. 'Did not know' is the
    most direct and transparent rendering.
- source_word: ἀληθές
  chosen: real
  alternatives:
  - 'true'
  - genuine
  lexicon: BDAG
  rationale: Here the contrast is with a visionary experience, so 'real' communicates
    experiential actuality better than the more abstract 'true.'
- source_word: τὸ γινόμενον
  chosen: what was happening
  alternatives:
  - what was taking place
  - the thing being done
  lexicon: BDAG
  rationale: The articular participle refers to the event in progress. 'What was happening'
    is idiomatic and preserves the ongoing sense.
- source_word: διὰ τοῦ ἀγγέλου
  chosen: through the angel
  alternatives:
  - by the angel
  lexicon: BDAG
  rationale: διά with the genitive commonly marks agency or instrumentality. 'Through
    the angel' preserves the mediated sense and avoids overstating independent agency.
- source_word: ἐδόκει
  chosen: thought
  alternatives:
  - supposed
  - seemed to himself
  lexicon: BDAG
  rationale: In context the verb expresses Peter's perception or assumption. 'Thought'
    is concise, natural, and fits the following infinitive clause.
- source_word: ὅραμα
  chosen: a vision
  alternatives:
  - a supernatural vision
  lexicon: BDAG
  rationale: Standard rendering for revelatory or dreamlike sight. The simple 'vision'
    is sufficient and matches NT usage.
- source_word: βλέπειν
  chosen: was seeing
  alternatives:
  - to see
  lexicon: BDAG
  rationale: With ἐδόκει, the infinitive expresses what Peter believed he was experiencing.
    'Was seeing' makes the perception vivid and natural in English.
