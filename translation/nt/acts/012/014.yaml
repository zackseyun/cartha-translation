id: ACT.12.14
reference: Acts 12:14
source:
  edition: SBLGNT
  text: καὶ ἐπιγνοῦσα τὴν φωνὴν τοῦ Πέτρου ἀπὸ τῆς χαρᾶς οὐκ ἤνοιξεν τὸν πυλῶνα, εἰσδραμοῦσα
    δὲ ἀπήγγειλεν ἑστάναι τὸν Πέτρον πρὸ τοῦ πυλῶνος.
translation:
  text: And when she recognized Peter’s voice, because of her joy she did not open
    the gate, but ran in and reported that Peter was standing at the gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gateway' or 'outer door' for 'gate' (πυλών), referring to the entrance
      from the street into the property.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'reported Peter to be standing before the gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοῦσα
  chosen: recognized
  alternatives:
  - identified
  - recognized clearly
  lexicon: BDAG
  rationale: Aorist participle from ἐπιγινώσκω conveys recognition upon hearing. 'Recognized'
    is natural English and preserves the sense better than a more wooden 'having recognized.'
- source_word: φωνὴν
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: In context of hearing Peter speak from outside, 'voice' is the most specific
    and natural rendering.
- source_word: ἀπὸ τῆς χαρᾶς
  chosen: because of her joy
  alternatives:
  - from joy
  - out of joy
  lexicon: BDAG
  rationale: The prepositional phrase expresses cause. 'Because of her joy' communicates
    the causal sense clearly in modern English.
- source_word: ἤνοιξεν
  chosen: did not open
  alternatives:
  - did not unlock
  lexicon: BDAG
  rationale: ἀνοίγω means 'open.' There is no warrant to specify 'unlock' in the main
    text.
- source_word: πυλῶνα / πυλῶνος
  chosen: gate
  alternatives:
  - gateway
  - outer door
  lexicon: BDAG
  rationale: πυλών commonly refers to a gate or gateway, especially an outer entrance.
    'Gate' is concise and fits the domestic setting better than the less natural repetition
    of 'gateway.'
- source_word: εἰσδραμοῦσα
  chosen: ran in
  alternatives:
  - rushed inside
  - ran inside
  lexicon: BDAG
  rationale: The participle denotes quick movement inward. 'Ran in' is vivid, idiomatic,
    and preserves the narrative pace.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: ἀπαγγέλλω often means to report or announce. 'Reported' fits the narrative
    register without sounding overly formal.
- source_word: ἑστάναι
  chosen: was standing
  alternatives:
  - stood
  - was there
  lexicon: BDAG
  rationale: Perfect infinitive of ἵστημι conveys a stative sense. 'Was standing'
    best reflects the ongoing state rather than a simple past event.
- source_word: πρὸ τοῦ πυλῶνος
  chosen: at the gate
  alternatives:
  - before the gate
  - in front of the gate
  lexicon: BDAG
  rationale: πρό with the genitive means 'before/in front of.' In idiomatic English
    for this setting, 'at the gate' communicates location naturally while preserving
    the sense.
