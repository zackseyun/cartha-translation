id: ACT.12.7
reference: Acts 12:7
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἄγγελος κυρίου ἐπέστη, καὶ φῶς ἔλαμψεν ἐν τῷ οἰκήματι· πατάξας δὲ
    τὴν πλευρὰν τοῦ Πέτρου ἤγειρεν αὐτὸν λέγων· Ἀνάστα ἐν τάχει· καὶ ἐξέπεσαν αὐτοῦ
    αἱ ἁλύσεις ἐκ τῶν χειρῶν.
translation:
  text: And behold, an angel of the Lord stood near, and a light shone in the cell.
    Striking Peter on the side, he woke him, saying, “Get up quickly.” And his chains
    fell off from his hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stood by” or “appeared suddenly.” The Greek verb can emphasize sudden
      presence as well as standing near.
    reason: lexical_alternative
  - marker: b
    text: Or “room” or “chamber”; the Greek term is more general, but “cell” fits
      the prison setting in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retains the vivid, attention-directing force of the discourse marker
    without flattening it into mere narrative transition. Though somewhat elevated,
    it remains readable and reflects Luke's style.
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the Lord's angel
  lexicon: BDAG
  rationale: Standard and natural rendering of the genitive construction; preserves
    the sense of a messenger belonging to/sent by the Lord. 'Lord' follows the doctrine
    default for κύριος.
- source_word: ἐπέστη
  chosen: stood near
  alternatives:
  - appeared
  - came upon
  - stood by
  lexicon: BDAG
  rationale: The verb often conveys sudden presence or standing by someone. 'Stood
    near' captures physical proximity in the prison scene better than the more generic
    'appeared,' while remaining idiomatic.
- source_word: φῶς ἔλαμψεν
  chosen: a light shone
  alternatives:
  - light flashed
  - a light shined
  lexicon: BDAG
  rationale: A straightforward rendering of noun plus verb. 'Shone' is standard modern
    English and avoids the less preferred 'shined' in this intransitive sense.
- source_word: ἐν τῷ οἰκήματι
  chosen: in the cell
  alternatives:
  - in the room
  - in the dwelling
  - in the chamber
  lexicon: BDAG
  rationale: In this prison context, 'cell' best conveys the specific setting. A more
    literal 'room' or 'dwelling' would undertranslate the narrative situation.
- source_word: πατάξας
  chosen: striking
  alternatives:
  - struck
  - tapping
  - nudging
  lexicon: BDAG
  rationale: The participle denotes a physical blow/touch. 'Striking' preserves the
    stronger lexical force better than 'nudging,' while fitting the context of waking
    a sleeping prisoner.
- source_word: τὴν πλευρὰν
  chosen: on the side
  alternatives:
  - the side
  - in the side
  - on his side
  lexicon: BDAG
  rationale: Idiomatic English with the verb 'strike' prefers 'on the side.' The possessive
    is implied by context from 'Peter' and need not be repeated.
- source_word: ἤγειρεν αὐτὸν
  chosen: he woke him
  alternatives:
  - he raised him
  - he roused him
  lexicon: BDAG
  rationale: Although ἐγείρω can mean 'raise up,' here the immediate context is waking
    Peter from sleep. 'Woke him' communicates the situational sense clearly.
- source_word: Ἀνάστα
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: Natural imperative English for the aorist command. 'Rise' is possible
    but slightly more formal; 'Get up' is clearer in contemporary English.
- source_word: ἐν τάχει
  chosen: quickly
  alternatives:
  - at once
  - without delay
  - in haste
  lexicon: BDAG
  rationale: Concise and idiomatic rendering of the adverbial phrase. 'Quickly' fits
    the urgency without sounding archaic.
- source_word: ἐξέπεσαν ... αἱ ἁλύσεις
  chosen: his chains fell off
  alternatives:
  - the chains dropped off him
  - his chains came off
  lexicon: BDAG
  rationale: Captures the sudden release implied by the verb and keeps the sentence
    natural in English.
- source_word: ἐκ τῶν χειρῶν
  chosen: from his hands
  alternatives:
  - off his hands
  - from his wrists
  lexicon: BDAG
  rationale: A formally close rendering of χείρ. 'Wrists' may fit the physical image
    but is more interpretive than the Greek wording.
