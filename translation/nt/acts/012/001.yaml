theological_decisions:
- issue: Rendering ἐκκλησία
  chosen_reading: church
  alternative_readings:
  - assembly
  - congregation
  rationale: In Acts this term commonly refers to the Christian community. 'Church'
    is the standard and contextually appropriate rendering, while 'assembly' would
    be more formally transparent but less specific in contemporary English.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; consistency of key terms, or documented exception.'
