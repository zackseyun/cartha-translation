id: ACT.12.1
reference: Acts 12:1
source:
  edition: SBLGNT
  text: Κατ’ ἐκεῖνον δὲ τὸν καιρὸν ἐπέβαλεν Ἡρῴδης ὁ βασιλεὺς τὰς χεῖρας κακῶσαί τινας
    τῶν ἀπὸ τῆς ἐκκλησίας.
translation:
  text: Now about that time Herod the king laid hands on some from the church to mistreat
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At that time' or 'Around that time.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'laid hands on.' The expression denotes hostile action against
      some in the church.
    reason: lexical_alternative
  - marker: c
    text: Or 'to harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατ’ ἐκεῖνον δὲ τὸν καιρόν
  chosen: Now about that time
  alternatives:
  - At that time
  - Around that time
  lexicon: BDAG
  rationale: κατά with the accusative time expression idiomatically means 'about/around'
    a time; δέ is rendered with a light transitional 'Now' to mark narrative development
    without overtranslating.
- source_word: ἐπέβαλεν ... τὰς χεῖρας
  chosen: laid hands on
  alternatives:
  - stretched out his hands against
  - arrested
  lexicon: BDAG
  rationale: The expression is idiomatic. Literally it is 'laid the hands,' but in
    context it denotes hostile action against persons. 'Laid hands on' preserves the
    idiom and leaves room for the following infinitive to specify the harmful intent.
    'Arrested' is too narrow here because the infinitive κακῶσαί indicates broader
    mistreatment.
- source_word: Ἡρῴδης ὁ βασιλεύς
  chosen: Herod the king
  alternatives:
  - King Herod
  lexicon: BDAG
  rationale: Both are natural in English. 'Herod the king' follows the Greek appositional
    order more closely while remaining readable.
- source_word: κακῶσαί
  chosen: to mistreat
  alternatives:
  - to harm
  - to persecute
  lexicon: BDAG
  rationale: κακόω here means to cause harm or ill-treatment. 'Mistreat' captures
    the personal hostile action without importing the more technical or broader religious
    sense of 'persecute,' which the verb itself does not require.
- source_word: τινας τῶν ἀπὸ τῆς ἐκκλησίας
  chosen: some from the church
  alternatives:
  - some of those from the church
  - some belonging to the church
  lexicon: BDAG
  rationale: The phrase identifies certain people associated with the Christian assembly.
    'From the church' is concise and natural; 'of those from the church' is more literal
    but less idiomatic in English.
