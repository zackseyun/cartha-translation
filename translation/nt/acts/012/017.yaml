id: ACT.12.17
reference: Acts 12:17
source:
  edition: SBLGNT
  text: κατασείσας δὲ αὐτοῖς τῇ χειρὶ σιγᾶν διηγήσατο αὐτοῖς πῶς ὁ κύριος αὐτὸν ἐξήγαγεν
    ἐκ τῆς φυλακῆς, εἶπέν ⸀τε· Ἀπαγγείλατε Ἰακώβῳ καὶ τοῖς ἀδελφοῖς ταῦτα. καὶ ἐξελθὼν
    ἐπορεύθη εἰς ἕτερον τόπον.
translation:
  text: But motioning to them with his hand to be silent, he explained to them how
    the Lord had brought him out of the prison. And he said, “Report these things
    to James and to the brothers.” Then he departed and went to another place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'the brothers,' which may
      refer to the wider community of believers depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατασείσας
  chosen: motioning
  alternatives:
  - gesturing
  - beckoning
  - signaling
  lexicon: BDAG
  rationale: The participle describes a hand gesture intended to quiet the group.
    'Motioning' is natural modern English and preserves the physical action without
    over-specifying the exact gesture.
- source_word: τῇ χειρὶ σιγᾶν
  chosen: with his hand to be silent
  alternatives:
  - with his hand for them to keep quiet
  - with his hand for silence
  lexicon: BDAG
  rationale: The dative plus infinitive expresses the content/purpose of the gesture.
    Rendering it as 'with his hand to be silent' keeps the structure close to the
    Greek while remaining idiomatic in context when combined with 'motioning.'
- source_word: διηγήσατο
  chosen: he explained
  alternatives:
  - he related
  - he recounted
  - he told in detail
  lexicon: BDAG
  rationale: The verb conveys a narrated explanation or detailed account. 'Explained'
    fits the context of Peter recounting what happened and reads more naturally than
    the more formal 'related.'
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  - that
  lexicon: BDAG
  rationale: 'Introduces the content of Peter''s explanation in a straightforward
    way: ''how the Lord had brought him out.'''
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' The article
    is retained in English because it is natural here and identifies the Lord as the
    acting subject.
- source_word: ἐξήγαγεν
  chosen: had brought ... out
  alternatives:
  - brought ... out
  - led ... out
  lexicon: BDAG
  rationale: The verb means to lead or bring out. 'Had brought him out' fits the narrative
    sequence after Peter's escape and clearly conveys deliverance from confinement.
- source_word: φυλακή
  chosen: the prison
  alternatives:
  - prison
  - jail
  lexicon: BDAG
  rationale: In Acts this term commonly refers to imprisonment or a prison facility.
    'Prison' is more neutral and slightly more formal than 'jail,' fitting the narrative
    tone.
- source_word: Ἀπαγγείλατε
  chosen: Report
  alternatives:
  - Tell
  - Announce
  - Inform
  lexicon: BDAG
  rationale: The imperative calls for passing on a message. 'Report' preserves the
    sense of conveying important information without sounding overly formal.
- source_word: Ἰακώβῳ
  chosen: James
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰάκωβος/Ἰακώβ in
    New Testament usage.
- source_word: τοῖς ἀδελφοῖς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the fellow believers
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the grammatically masculine
    plural is rendered 'brothers' rather than flattened to a gender-neutral term.
    In context it likely refers to the believing community or its male representatives;
    the more inclusive sense is worth preserving in a footnote rather than in the
    main text.
- source_word: ἐξελθὼν ἐπορεύθη
  chosen: he departed and went
  alternatives:
  - he went out and went
  - he left and went away
  lexicon: BDAG
  rationale: The two verbs together mark departure from the current location and movement
    elsewhere. 'He departed and went' preserves both actions without awkward repetition.
- source_word: εἰς ἕτερον τόπον
  chosen: to another place
  alternatives:
  - to a different place
  - to another location
  lexicon: BDAG
  rationale: ἕτερον indicates another/different place. 'Another place' is simple,
    natural, and sufficiently indefinite, matching the Greek's lack of specificity.
