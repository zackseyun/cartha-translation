theological_decisions:
- issue: Referent and rendering of κύριος
  chosen_reading: Rendered as 'the Lord,' referring to the divine agent who delivered
    Peter.
  alternative_readings:
  - the Lord (Jesus) specifically
  - God more generally
  rationale: The text itself uses κύριος without further specification. In Acts this
    title can refer to the risen Jesus, though divine agency language can also overlap
    with God more broadly. The translation preserves the text's wording and does not
    resolve the referent beyond 'the Lord.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → ''Lord''); preserve
    theological tension rather than resolve it.'
