theological_decisions:
- issue: Meaning of 'his angel'
  chosen_reading: Rendered straightforwardly as 'his angel' without interpretive expansion.
  alternative_readings:
  - his guardian angel
  - his representative angel
  - his ghost/spirit
  rationale: The Greek text simply says 'his angel' and does not explain the underlying
    belief. To preserve theological tension and avoid importing a specific Second
    Temple or later doctrinal framework, the translation leaves the phrase literal.
    Possible interpretations are preserved in a footnote rather than resolved in the
    main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
