id: ACT.12.15
reference: Acts 12:15
source:
  edition: SBLGNT
  text: οἱ δὲ πρὸς αὐτὴν εἶπαν· Μαίνῃ. ἡ δὲ διϊσχυρίζετο οὕτως ἔχειν. οἱ δὲ ἔλεγον·
    Ὁ ἄγγελός ⸂ἐστιν αὐτοῦ⸃.
translation:
  text: But they said to her, “You are out of your mind.” But she kept insisting that
    it was so. And they kept saying, “It is his angel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'his guardian angel,' 'his representative angel,' or according
      to some interpreters, 'his spirit/ghost.' The Greek simply says 'his angel.'
    reason: alternative_reading
lexical_decisions:
- source_word: Μαίνῃ
  chosen: You are out of your mind
  alternatives:
  - You are mad
  - You are insane
  lexicon: BDAG
  rationale: Second-person singular present middle/passive indicative of μαίνομαι,
    an idiomatic accusation of madness. 'Out of your mind' is natural modern English
    and preserves the force without sounding archaic ('mad') or overly clinical ('insane').
- source_word: διϊσχυρίζετο
  chosen: she kept insisting
  alternatives:
  - she strongly affirmed
  - she kept asserting
  lexicon: BDAG
  rationale: The imperfect middle indicates continued or repeated insistence. 'Kept
    insisting' captures both the durative aspect and the emphatic force.
- source_word: οὕτως ἔχειν
  chosen: that it was so
  alternatives:
  - that this was the case
  - that it was true
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'that things were this way / that this was
    the case.' 'That it was so' is concise and natural while preserving the sense
    of her claim.
- source_word: ἔλεγον
  chosen: they kept saying
  alternatives:
  - they were saying
  - they said
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or continued speech. 'Kept saying'
    reflects the ongoing nature better than simple past.
- source_word: ἄγγελός
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this context the speakers likely refer to a supernatural being associated
    with Peter, not an ordinary human messenger. 'Angel' is the standard and contextually
    appropriate rendering.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - of him
  lexicon: BDAG
  rationale: Genitive pronoun naturally rendered by the English possessive 'his' in
    the phrase 'his angel.'
