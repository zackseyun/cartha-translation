id: ACT.12.2
reference: Acts 12:2
source:
  edition: SBLGNT
  text: ἀνεῖλεν δὲ Ἰάκωβον τὸν ἀδελφὸν Ἰωάννου μαχαίρῃ.
translation:
  text: And he killed James, the brother of John, with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put to death' or 'executed.' The Greek simply states that he caused
      James's death; the broader context may suggest an official execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεῖλεν
  chosen: killed
  alternatives:
  - put to death
  - executed
  lexicon: BDAG
  rationale: ἀναιρέω here denotes causing death. 'Killed' is the clearest natural
    English rendering; 'put to death' or 'executed' are possible, but the verse itself
    does not explicitly foreground legal process, only the act of killing.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ is a connective advancing the narrative. 'And' preserves the simple
    flow without implying stronger contrast than the Greek requires.
- source_word: Ἰάκωβον
  chosen: James
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: τὸν ἀδελφὸν Ἰωάννου
  chosen: the brother of John
  alternatives:
  - John's brother
  lexicon: BDAG
  rationale: This appositional phrase identifies which James is meant. 'The brother
    of John' closely follows the Greek structure and is fully natural in English.
- source_word: μαχαίρῃ
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: BDAG
  rationale: μάχαιρα refers to a sword or short sword. The dative is instrumental
    here. 'With the sword' is idiomatic and preserves the concrete image; 'by the
    sword' is also possible but slightly more interpretive as a manner formula.
