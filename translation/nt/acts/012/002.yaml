theological_decisions:
- issue: Nature of Herod's action
  chosen_reading: Rendered as a straightforward act of killing without specifying
    judicial execution in the main text.
  alternative_readings:
  - Rendered as 'executed James' to emphasize likely state-sponsored killing
  rationale: The Greek verb ἀνεῖλεν states that James was killed, and μάχαιρῃ specifies
    the means. While the broader context suggests official persecution, the verse
    itself does not require the more specific term 'executed.' This preserves the
    text's wording without importing additional legal nuance.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
