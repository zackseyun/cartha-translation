theological_decisions:
- issue: Rendering Ἰουδαίοις in Acts
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation follows the plain lexical sense here because the text
    itself does not explicitly restrict the referent geographically or to leadership.
    This avoids importing a narrower interpretation while allowing readers to infer
    the hostile group from context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering τῶν ἀζύμων
  chosen_reading: Unleavened Bread
  alternative_readings:
  - Passover
  rationale: The Greek specifically names the days of Unleavened Bread, not Passover
    as such. The more precise festal term is retained in the main text to honor original-language
    primacy and avoid collapsing related but distinct observances.
  doctrine_reference: Translation philosophy §1, §6
