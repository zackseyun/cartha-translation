id: ACT.12.3
reference: Acts 12:3
source:
  edition: SBLGNT
  text: ⸂ἰδὼν δὲ⸃ ὅτι ἀρεστόν ἐστιν τοῖς Ἰουδαίοις προσέθετο συλλαβεῖν καὶ Πέτρον
    (ἦσαν ⸀δὲ ἡμέραι τῶν ἀζύμων),
translation:
  text: And when he saw that it was pleasing to the Jews, he proceeded to arrest Peter
    also. (Now these were the days of Unleavened Bread.)
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Judeans" or, by contextual narrowing, "the Jewish leaders." The
      Greek term can bear these senses in some contexts, but here the text simply
      says "the Jews."
    reason: lexical_alternative
  - marker: b
    text: That is, the festival period following Passover, marked by the eating of
      unleavened bread.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδὼν δὲ
  chosen: And when he saw
  alternatives:
  - And seeing
  - Then when he saw
  - And having seen
  lexicon: BDAG
  rationale: The aorist participle ἰδών is most naturally temporal-circumstantial
    here, introducing Herod's perception prior to his next action. 'And when he saw'
    gives clear modern English while preserving the sequence signaled by δέ.
- source_word: ἀρεστόν ἐστιν
  chosen: it was pleasing
  alternatives:
  - it was acceptable
  - it was gratifying
  - it pleased
  lexicon: BDAG
  rationale: ἀρεστόν denotes something pleasing or acceptable. 'It was pleasing' is
    idiomatic and preserves the impersonal construction with ἐστιν.
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Jewish leaders
  - to the Judeans
  lexicon: BDAG
  rationale: The Greek explicitly says 'to the Jews.' Although context may especially
    involve Judean/Jewish opposition in Jerusalem, the text does not narrow the referent
    to leaders, so the broader ethnic-religious term is retained.
- source_word: προσέθετο
  chosen: he proceeded
  alternatives:
  - he added
  - he went on
  - he continued
  lexicon: BDAG
  rationale: προστίθημι with an infinitive can mean 'to proceed' or 'to go on' to
    do something. 'He proceeded' captures the idiom in natural English without woodenly
    rendering 'he added'.
- source_word: συλλαβεῖν
  chosen: to arrest
  alternatives:
  - to seize
  - to take into custody
  lexicon: BDAG
  rationale: In this narrative and legal context, συλλαμβάνω refers to apprehending
    a person. 'Arrest' is the clearest modern equivalent.
- source_word: καὶ Πέτρον
  chosen: Peter also
  alternatives:
  - also Peter
  - Peter too
  lexicon: BDAG
  rationale: καί here adds Peter to James as another target. 'Peter also' is natural
    English and preserves the additive force.
- source_word: ἦσαν δὲ ἡμέραι τῶν ἀζύμων
  chosen: Now these were the days of Unleavened Bread
  alternatives:
  - Now it was the days of Unleavened Bread
  - Now those were the days of Unleavened Bread
  - Now it was during the Festival of Unleavened Bread
  lexicon: BDAG
  rationale: The parenthetical note gives temporal setting. 'The days of Unleavened
    Bread' is a close rendering of the Greek phrase and preserves the Jewish festal
    terminology rather than replacing it with an interpretive paraphrase.
