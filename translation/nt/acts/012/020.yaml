  from: from the king’s country
  to: from the king’s domain
  rationale: The repetition in 'their country was fed from the king’s country' is slightly awkward in English. The Greek uses a substantival adjective (τῆς βασιλικῆς), implying 'the royal [territory]'. Using a synonym like 'domain' or 'territory' avoids the clunky repetition while accurately conveying the meaning.
