id: ACT.12.20
reference: Acts 12:20
source:
  edition: SBLGNT
  text: Ἦν ⸀δὲ θυμομαχῶν Τυρίοις καὶ Σιδωνίοις· ὁμοθυμαδὸν δὲ παρῆσαν πρὸς αὐτόν, καὶ πείσαντες Βλάστον τὸν ἐπὶ τοῦ κοιτῶνος τοῦ βασιλέως ᾐτοῦντο εἰρήνην διὰ τὸ τρέφεσθαι αὐτῶν τὴν χώραν ἀπὸ τῆς βασιλικῆς.
translation:
  text: Now he was very angry with the Tyrians and Sidonians. But they came to him with one accord, and after persuading Blastus, the king’s chamberlain, they were asking for peace, because their country was fed from the king’s domain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was hostile toward the Tyrians and Sidonians.' The Greek θυμομαχῶν expresses intense anger or hostility.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the one over the king’s bedchamber,' likely a court official with access to the king’s private quarters.
    reason: cultural_note
  - marker: c
    text: Or 'because their region received its food supply from the king’s domain.'
    reason: lexical_alternative
  - marker: d
    text: Or 'from the king’s country'.
    reason: previous_rendering
lexical_decisions:
- source_word: θυμομαχῶν
  chosen: was very angry with
  alternatives:
  - was hostile toward
  - was contending angrily with
  lexicon: BDAG
  rationale: The participle literally conveys fighting in anger or being in a state of violent hostility. 'Was very angry with' is idiomatic modern English and captures the hostile disposition without over-literal awkwardness.
- source_word: Τυρίοις καὶ Σιδωνίοις
  chosen: the Tyrians and Sidonians
  alternatives:
  - the people of Tyre and Sidon
  lexicon: BDAG
  rationale: These are standard ethnics referring to the inhabitants of Tyre and Sidon. The transliterated ethnic forms are concise and natural in English.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - unanimously
  lexicon: BDAG
  rationale: Luke frequently uses this adverb for united purpose. 'With one accord' preserves the sense of shared intent more fully than merely 'together,' while remaining recognizable English.
- source_word: παρῆσαν πρὸς αὐτόν
  chosen: came to him
  alternatives:
  - presented themselves to him
  - approached him
  lexicon: BDAG
  rationale: The phrase indicates appearing before or coming to someone. 'Came to him' is clear and sufficiently formal for the context.
- source_word: πείσαντες
  chosen: after persuading
  alternatives:
  - having won over
  - having convinced
  lexicon: BDAG
  rationale: The aorist participle denotes prior action relative to the main verb. 'After persuading' makes that sequence explicit in natural English.
- source_word: Βλάστον
  chosen: Blastus
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: τὸν ἐπὶ τοῦ κοιτῶνος τοῦ βασιλέως
  chosen: the king’s chamberlain
  alternatives:
  - the one over the king's bedroom
  - the king's personal attendant
  lexicon: BDAG
  rationale: The expression refers to an official connected with the king's bedchamber/private quarters. 'Chamberlain' is a conventional and concise rendering for such a court official, though the underlying image is tied to the royal bedroom.
- source_word: ᾐτοῦντο εἰρήνην
  chosen: they were asking for peace
  alternatives:
  - they were requesting peace
  - they were seeking peace
  lexicon: BDAG
  rationale: The imperfect suggests ongoing or attempted petition. 'Were asking for peace' preserves the verbal aspect and the diplomatic sense.
- source_word: διὰ τὸ τρέφεσθαι
  chosen: because ... was fed
  alternatives:
  - because ... received food
  - because ... was supplied
  lexicon: BDAG
  rationale: The articular infinitive with διά gives the reason. The passive infinitive of τρέφω here refers to being nourished/supplied with food.
- source_word: αὐτῶν τὴν χώραν
  chosen: their country
  alternatives:
  - their region
  - their land
  lexicon: BDAG
  rationale: χώρα can mean region, territory, or country. 'Country' fits the geopolitical context of Tyre and Sidon depending on royal supply.
- source_word: ἀπὸ τῆς βασιλικῆς
  chosen: from the king’s country
  alternatives:
  - from the king's domain
  - from the royal territory
  lexicon: BDAG
  rationale: The adjective βασιλικός here stands substantivally, referring to what belongs to the king, likely his territory/domain. 'From the king's country' keeps the parallel with χώρα and makes the economic dependence explicit.
