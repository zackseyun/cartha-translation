id: ACT.12.23
reference: Acts 12:23
source:
  edition: SBLGNT
  text: παραχρῆμα δὲ ἐπάταξεν αὐτὸν ἄγγελος κυρίου ἀνθ’ ὧν οὐκ ἔδωκεν ⸀τὴν δόξαν τῷ
    θεῷ, καὶ γενόμενος σκωληκόβρωτος ἐξέψυξεν.
translation:
  text: Immediately an angel of the Lord struck him, because he did not give the glory
    to God, and becoming worm-eaten, he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not give God the glory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'eaten by worms.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he breathed his last.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  chosen: Immediately
  alternatives:
  - At once
  - Instantly
  lexicon: BDAG
  rationale: The adverb denotes something happening without delay. 'Immediately' is
    natural modern English and preserves the suddenness of the judgment.
- source_word: ἐπάταξεν
  chosen: struck
  alternatives:
  - smote
  - struck down
  lexicon: BDAG
  rationale: The verb means to strike or smite. 'Struck' is the clearest contemporary
    rendering. 'Struck down' would over-specify the result, since the death is stated
    later by ἐξέψυξεν.
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The noun lacks the article in Greek, so the indefinite rendering is preferred
    here. κύριος is translated 'Lord' per the project's default for the title.
- source_word: ἀνθ’ ὧν
  chosen: because
  alternatives:
  - for this reason
  - in return for which
  lexicon: BDAG
  rationale: This idiom introduces the reason for the judgment. 'Because' communicates
    the causal force clearly in idiomatic English.
- source_word: ἔδωκεν τὴν δόξαν τῷ θεῷ
  chosen: did not give the glory to God
  alternatives:
  - did not give glory to God
  - did not give God the glory
  lexicon: BDAG
  rationale: The phrase refers to ascribing honor rightly due to God. 'The glory'
    reflects the Greek article and preserves the sense of the honor that should have
    been attributed to God.
- source_word: γενόμενος
  chosen: becoming
  alternatives:
  - and he became
  - after he became
  lexicon: BDAG
  rationale: The aorist participle is rendered with a participial form to preserve
    the Greek sequence without forcing a more interpretive temporal nuance than necessary.
- source_word: σκωληκόβρωτος
  chosen: worm-eaten
  alternatives:
  - eaten by worms
  - consumed by worms
  lexicon: BDAG
  rationale: The adjective literally means eaten by worms. 'Worm-eaten' is concise
    and vivid, preserving the graphic force of the Greek.
- source_word: ἐξέψυξεν
  chosen: he died
  alternatives:
  - he breathed his last
  - he expired
  lexicon: BDAG
  rationale: The verb idiomatically means to expire or die. 'He died' is the most
    natural modern English rendering; 'breathed his last' is possible but more literary
    than needed here.
