theological_decisions:
- issue: Nature of the judgment described
  chosen_reading: The verse presents Herod's death as an act of divine judgment mediated
    by an angel, without adding further doctrinal explanation.
  alternative_readings:
  - A purely natural death described in religious language
  - An immediate death at the moment of the angelic strike
  rationale: The text explicitly attributes the striking to 'an angel of the Lord'
    and gives the reason as Herod's failure to give glory to God. At the same time,
    the participial construction with 'becoming worm-eaten' followed by 'he died'
    should not be flattened into an over-precise medical or temporal reconstruction
    beyond what Luke states.
  doctrine_reference: Affirmations; Translation philosophy §3
