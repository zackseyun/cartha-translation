id: ACT.12.16
reference: Acts 12:16
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος ἐπέμενεν κρούων· ἀνοίξαντες δὲ εἶδαν αὐτὸν καὶ ἐξέστησαν.
translation:
  text: But Peter kept on knocking, and when they opened the door, they saw him and
    were astonished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continued knocking' or 'persisted in knocking.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'having opened, they saw him and were astonished.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέμενεν
  chosen: kept on
  alternatives:
  - continued
  - persisted
  lexicon: BDAG
  rationale: The imperfect of ἐπιμένω conveys ongoing or repeated action. 'Kept on'
    expresses the durative force naturally in English without sounding overly formal.
- source_word: κρούων
  chosen: knocking
  alternatives:
  - beating
  - striking
  lexicon: BDAG
  rationale: κρούω in this context refers to knocking at a door. The participle is
    contemporaneous with ἐπέμενεν, so 'kept on knocking' captures the combined sense
    idiomatically.
- source_word: ἀνοίξαντες
  chosen: when they opened the door
  alternatives:
  - after opening
  - having opened
  lexicon: BDAG
  rationale: The aorist participle is best rendered temporally here in smooth English.
    'When they opened the door' makes the sequence clear. 'The door' is supplied in
    English from context, since the knocking implies a door or gate.
- source_word: εἶδαν
  chosen: they saw him
  alternatives:
  - they caught sight of him
  lexicon: BDAG
  rationale: A straightforward rendering of ὁράω in narrative context; no stronger
    or more interpretive gloss is needed.
- source_word: ἐξέστησαν
  chosen: were astonished
  alternatives:
  - were amazed
  - were beside themselves
  lexicon: BDAG
  rationale: ἐξίστημι here denotes strong amazement or astonishment. 'Were astonished'
    is clear modern English and preserves the intensity without becoming idiomatic
    to the point of obscurity.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: The first δέ marks contrast with the preceding situation, so 'But' fits
    the discourse flow. The second δέ is absorbed into English syntax rather than
    translated separately, which is normal in idiomatic English narrative.
- source_word: Πέτρος
  chosen: Peter
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
