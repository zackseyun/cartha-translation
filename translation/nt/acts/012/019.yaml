id: ACT.12.19
reference: Acts 12:19
source:
  edition: SBLGNT
  text: Ἡρῴδης δὲ ἐπιζητήσας αὐτὸν καὶ μὴ εὑρὼν ἀνακρίνας τοὺς φύλακας ἐκέλευσεν ἀπαχθῆναι,
    καὶ κατελθὼν ἀπὸ τῆς Ἰουδαίας ⸀εἰς Καισάρειαν διέτριβεν.
translation:
  text: But Herod, after searching for him and not finding him, examined the guards
    and ordered them to be led away to execution. Then he went down from Judea to
    Caesarea and stayed there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'ordered them to be led away.' In context, this likely means
      they were taken away for execution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιζητήσας
  chosen: after searching for
  alternatives:
  - having searched for
  - after looking for
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    'Searching for' conveys an active, deliberate attempt to locate Peter without
    overstating intensity.
- source_word: μὴ εὑρὼν
  chosen: not finding
  alternatives:
  - when he did not find
  - and not having found
  lexicon: BDAG
  rationale: Aorist participle with negation, coordinated with the previous participle.
    'Not finding' is natural English and preserves the sequence of failed search before
    the interrogation.
- source_word: ἀνακρίνας
  chosen: examined
  alternatives:
  - interrogated
  - questioned
  lexicon: BDAG
  rationale: The verb can mean to examine or interrogate in a judicial sense. 'Examined'
    is broad enough to include official inquiry, while the context of guards under
    suspicion implies formal questioning.
- source_word: φύλακας
  chosen: guards
  alternatives:
  - sentries
  - guard soldiers
  lexicon: BDAG
  rationale: Refers to those assigned to keep Peter. 'Guards' is the clearest modern
    English equivalent.
- source_word: ἐκέλευσεν ἀπαχθῆναι
  chosen: ordered them to be led away to execution
  alternatives:
  - ordered them to be put to death
  - ordered them to be taken away
  lexicon: BDAG
  rationale: The infinitive ἀπαχθῆναι literally means 'to be led away' or 'taken away,'
    but in this context of failed prison guards under Herod it is an idiom for execution.
    The fuller rendering makes explicit the likely sense for modern readers while
    preserving the underlying motion idea.
- source_word: κατελθὼν
  chosen: he went down
  alternatives:
  - having gone down
  - he departed down
  lexicon: BDAG
  rationale: Standard travel idiom from inland/higher Judea to coastal Caesarea. 'Went
    down' preserves the geographical language of the Greek.
- source_word: Ἰουδαίας
  chosen: Judea
  alternatives:
  - the Judean region
  lexicon: BDAG
  rationale: Standard geographical rendering.
- source_word: Καισάρειαν
  chosen: Caesarea
  alternatives:
  - Caesarea Maritima
  lexicon: BDAG
  rationale: Conventional English transliteration of the place name.
- source_word: διέτριβεν
  chosen: stayed there
  alternatives:
  - spent some time there
  - was staying there
  lexicon: BDAG
  rationale: Imperfect verb indicating continued residence or spending time. 'Stayed
    there' is concise, natural, and reflects durative aspect in context.
