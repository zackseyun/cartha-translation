theological_decisions:
- issue: Whether to leave ἀπαχθῆναι as the more literal 'be led away' or make explicit
    the implied penalty
  chosen_reading: ordered them to be led away to execution
  alternative_readings:
  - ordered them to be led away
  - ordered them to be put to death
  rationale: The text does not explicitly use a common verb for killing, but in this
    narrative and historical context Herod's order concerning guards who lost a prisoner
    strongly implies execution. Optimal equivalence favors making the idiomatic force
    clear while preserving the underlying wording in a footnote.
  doctrine_reference: Translation philosophy §1, §6
