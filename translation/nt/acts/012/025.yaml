id: ACT.12.25
reference: Acts 12:25
source:
  edition: SBLGNT
  text: Βαρναβᾶς δὲ καὶ Σαῦλος ὑπέστρεψαν, ⸀εἰς Ἰερουσαλὴμ πληρώσαντες τὴν διακονίαν,
    ⸀συμπαραλαβόντες Ἰωάννην τὸν ἐπικληθέντα Μᾶρκον.
translation:
  text: But Barnabas and Saul returned to Jerusalem after completing the ministry,
    taking along John, who was called Mark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'from Jerusalem' instead of 'to Jerusalem.'
    reason: textual_variant
lexical_decisions:
- source_word: ὑπέστρεψαν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: The aorist of ὑποστρέφω commonly means 'return' or 'go back.' 'Returned'
    is the most natural concise English rendering.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - to/from Jerusalem
  lexicon: BDAG
  rationale: The preposition εἰς normally means 'to/into,' so the direct rendering
    is 'to Jerusalem.' This follows the given Greek text, even though some manuscripts
    read ἐξ Ἰερουσαλήμ ('from Jerusalem') and the broader narrative context has prompted
    that alternative.
- source_word: πληρώσαντες τὴν διακονίαν
  chosen: after completing the ministry
  alternatives:
  - having fulfilled the service
  - after finishing their mission
  lexicon: BDAG
  rationale: πληρόω here means to complete or fulfill, and διακονία denotes service/ministry.
    'After completing the ministry' captures the participial action in smooth English
    while preserving the sense of assigned service rather than a vague task.
- source_word: διακονίαν
  chosen: the ministry
  alternatives:
  - the service
  - the relief mission
  lexicon: BDAG
  rationale: διακονία can mean service, ministry, or support work. In Acts 11:29–30
    the context is the delivery of relief, but the Greek here uses the broader term.
    'Ministry' preserves the lexical form while remaining natural; the more specific
    'relief mission' would import contextual interpretation into the main text.
- source_word: συμπαραλαβόντες
  chosen: taking along
  alternatives:
  - bringing with them
  - taking with them
  lexicon: BDAG
  rationale: The participle indicates accompanying someone by taking him along. 'Taking
    along' is idiomatic and preserves the attendant action.
- source_word: ἐπικληθέντα Μᾶρκον
  chosen: who was called Mark
  alternatives:
  - also called Mark
  - surnamed Mark
  lexicon: BDAG
  rationale: ἐπικαλέω in the passive can mean 'to be called/named.' 'Who was called
    Mark' is a transparent rendering. 'Also called Mark' is possible, but the Greek
    does not explicitly include 'also.'
