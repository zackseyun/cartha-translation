- issue: Textual variant in the destination/source phrase
  chosen_reading: to Jerusalem
  alternative_readings:
  - from Jerusalem
  rationale: The SBLGNT text provided reads εἰς Ἰερουσαλήμ ('to Jerusalem'), so the
    draft follows the source text directly. Because the variant ἐξ Ἰερουσαλήμ ('from
    Jerusalem') is well known and affects the sense of the verse, it is preserved
    in a footnote for auditability.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §3 (Preserve theological tension rather than resolve it) applied analogously
    to a meaningful textual alternative.
