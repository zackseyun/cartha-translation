theological_decisions:
- issue: Rendering of πάσχα
  chosen_reading: Passover
  alternative_readings:
  - Easter
  rationale: The Greek term πάσχα denotes Passover. In keeping with original-language
    primacy over translation tradition, the main text uses 'Passover.' The traditional
    English rendering 'Easter' in some older versions is preserved only as an alternative
    note because it does not reflect the plain lexical sense here.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
