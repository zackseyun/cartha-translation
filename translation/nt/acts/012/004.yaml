id: ACT.12.4
reference: Acts 12:4
source:
  edition: SBLGNT
  text: ὃν καὶ πιάσας ἔθετο εἰς φυλακήν, παραδοὺς τέσσαρσιν τετραδίοις στρατιωτῶν
    φυλάσσειν αὐτόν, βουλόμενος μετὰ τὸ πάσχα ἀναγαγεῖν αὐτὸν τῷ λαῷ.
translation:
  text: After arresting him, he put him in prison, handing him over to four squads
    of soldiers to guard him, intending to bring him out to the people after the Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'four tetrads of soldiers,' that is, four groups of four soldiers.
    reason: lexical_alternative
  - marker: b
    text: Greek πάσχα means 'Passover'; some older English versions render it 'Easter'
      here.
    reason: alternative_reading
lexical_decisions:
- source_word: πιάσας
  chosen: after arresting
  alternatives:
  - having seized
  - after seizing
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'after arresting' gives natural
    English sequence while preserving the force of taking Peter into custody.
- source_word: ἔθετο εἰς φυλακήν
  chosen: he put him in prison
  alternatives:
  - he placed him in prison
  - he put him in jail
  lexicon: BDAG
  rationale: Idiomatic expression for imprisonment. 'Prison' is slightly more formal
    and fits narrative register better than 'jail.'
- source_word: παραδοὺς
  chosen: handing him over
  alternatives:
  - delivering him over
  - entrusting him
  lexicon: BDAG
  rationale: The participle indicates transfer into others' custody. 'Handing him
    over' is clear modern English and preserves the custodial sense.
- source_word: τέσσαρσιν τετραδίοις στρατιωτῶν
  chosen: to four squads of soldiers
  alternatives:
  - to four groups of four soldiers
  - to four quaternions of soldiers
  lexicon: BDAG
  rationale: τετράδιον denotes a group of four; the full phrase refers to four such
    groups. 'Four squads of soldiers' is readable, while the exact composition is
    preserved in a footnote.
- source_word: φυλάσσειν αὐτόν
  chosen: to guard him
  alternatives:
  - to keep watch over him
  - to keep him under guard
  lexicon: BDAG
  rationale: Infinitive of purpose after παραδοὺς; 'to guard him' is concise and accurate.
- source_word: βουλόμενος
  chosen: intending
  alternatives:
  - planning
  - wanting
  lexicon: BDAG
  rationale: Conveys deliberate purpose without overstating emotional desire. 'Intending'
    fits Herod's settled plan in context.
- source_word: μετὰ τὸ πάσχα
  chosen: after the Passover
  alternatives:
  - after Passover
  - after the festival of Passover
  lexicon: BDAG
  rationale: πάσχα here refers to the Jewish Passover period. 'Passover' is the standard
    and source-faithful rendering; not 'Easter,' which reflects later translation
    tradition rather than the Greek term's plain sense.
- source_word: ἀναγαγεῖν αὐτὸν τῷ λαῷ
  chosen: to bring him out to the people
  alternatives:
  - to bring him before the people
  - to lead him up to the people
  lexicon: BDAG
  rationale: ἀνάγω in this judicial/public setting means to bring someone out or forward
    for public presentation. 'To the people' preserves the dative and avoids over-specifying
    a formal trial not explicit in the text.
- source_word: λαῷ
  chosen: the people
  alternatives:
  - the populace
  - the assembly
  lexicon: BDAG
  rationale: In Acts this commonly refers to the people as a public body. 'The people'
    is natural and sufficiently broad.
