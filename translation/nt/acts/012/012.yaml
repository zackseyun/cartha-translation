id: ACT.12.12
reference: Acts 12:12
source:
  edition: SBLGNT
  text: Συνιδών τε ἦλθεν ἐπὶ τὴν οἰκίαν ⸀τῆς Μαρίας τῆς μητρὸς Ἰωάννου τοῦ ἐπικαλουμένου
    Μάρκου, οὗ ἦσαν ἱκανοὶ συνηθροισμένοι καὶ προσευχόμενοι.
translation:
  text: And when he realized this, he went to the house of Mary, the mother of John
    who was called Mark, where many had gathered together and were praying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who was also called Mark." The Greek identifies John by an additional
      name without requiring the adverb "also."
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνιδών
  chosen: when he realized this
  alternatives:
  - when he understood
  - when he became aware of it
  - having considered it
  lexicon: BDAG
  rationale: The aorist participle from συνοράω here refers to Peter's coming to full
    awareness of his situation after the angel's departure (v. 11 context). 'When
    he realized this' is natural English and captures the ingressive sense better
    than a more wooden 'having understood.' The object 'this' is supplied from context
    and is idiomatic in English.
- source_word: τε
  chosen: And
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: τέ is a mild connective. English often does not require a separate particle,
    but 'And' preserves the narrative linkage without overtranslating.
- source_word: ἦλθεν ἐπὶ τὴν οἰκίαν
  chosen: he went to the house
  alternatives:
  - he came to the house
  - he went to the home
  lexicon: BDAG
  rationale: ἔρχομαι with ἐπί + accusative here indicates movement toward a place.
    'Went to the house' fits the narrative viewpoint in English better than 'came
    to the house,' which can imply deictic proximity to the reader.
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: οἰκία can mean house or household, but here the physical location is
    primary because Peter travels there and people are assembled there. 'House' is
    the clearest base rendering.
- source_word: τῆς Μαρίας
  chosen: of Mary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Μαρία as 'Mary' follows
    the translation philosophy of transliterating names.
- source_word: τῆς μητρὸς Ἰωάννου
  chosen: the mother of John
  lexicon: BDAG
  rationale: A straightforward genitival relationship. Retained explicitly to identify
    which Mary is meant.
- source_word: τοῦ ἐπικαλουμένου Μάρκου
  chosen: who was called Mark
  alternatives:
  - who was also called Mark
  - who was surnamed Mark
  lexicon: BDAG
  rationale: The present passive participle ἐπικαλουμένου identifies John by an additional
    name. 'Who was called Mark' is clear and idiomatic. 'Also called' is possible,
    but the Greek does not require the adverb 'also,' so the simpler rendering is
    preferred in the main text.
- source_word: οὗ
  chosen: where
  alternatives:
  - at whose house
  lexicon: BDAG
  rationale: The relative adverb refers to the location, Mary's house. 'Where' is
    concise and natural English.
- source_word: ἱκανοὶ
  chosen: many
  alternatives:
  - quite a few
  - a considerable number
  lexicon: BDAG
  rationale: ἱκανός in the plural can denote a substantial number. 'Many' is idiomatic
    and sufficiently reflects the sense without sounding cumbersome.
- source_word: συνηθροισμένοι
  chosen: had gathered together
  alternatives:
  - were assembled
  - had assembled
  lexicon: BDAG
  rationale: The periphrastic construction with ἦσαν + perfect participle conveys
    a state resulting from prior gathering. 'Had gathered together' reflects that
    resultant state in smooth English, while preserving the communal sense of συναθροίζω.
- source_word: καὶ προσευχόμενοι
  chosen: and were praying
  alternatives:
  - and praying
  lexicon: BDAG
  rationale: The participle describes the activity accompanying their gathered state.
    'Were praying' makes the ongoing action explicit in natural English.
