id: ACT.12.24
reference: Acts 12:24
source:
  edition: SBLGNT
  text: Ὁ δὲ λόγος τοῦ ⸀θεοῦ ηὔξανεν καὶ ἐπληθύνετο.
translation:
  text: But the word of God continued to grow and multiply.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's message continued to grow and multiply.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: Rendered as 'word' to preserve the common Lukan expression 'the word
    of God' and its broad sense of God's proclaimed message. 'Message' is possible
    in context, but 'word' better maintains intertextual consistency and familiar
    biblical idiom without obscuring meaning.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Translated straightforwardly as a possessive genitive, indicating the
    word/message that belongs to or comes from God.
- source_word: ηὔξανεν
  chosen: continued to grow
  alternatives:
  - grew
  - was growing
  lexicon: BDAG
  rationale: The imperfect tense conveys ongoing or progressive action. 'Continued
    to grow' brings out that durative sense more clearly than the simple past 'grew'
    while remaining natural English.
- source_word: ἐπληθύνετο
  chosen: multiply
  alternatives:
  - increase
  - be multiplied
  lexicon: BDAG
  rationale: Rendered 'multiply' to preserve the distinct force from the preceding
    verb rather than flattening both into generic growth. In context this refers to
    the expanding spread and effect of the word of God. Combined with 'continued to
    grow,' the English expresses the paired progression idiomatically.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Rendered 'But' to mark the narrative contrast with the preceding account
    of Herod's death. This best reflects the adversative transition in context.
