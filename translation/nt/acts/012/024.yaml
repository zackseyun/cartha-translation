theological_decisions:
- issue: Whether 'the word of God' should be rendered more dynamically as 'God's message'
  chosen_reading: the word of God
  alternative_readings:
  - God's message
  rationale: The phrase is not theologically contested, but retaining 'word of God'
    preserves Luke's repeated formulation and avoids narrowing λόγος to mere content
    apart from its recognized scriptural and proclamatory resonance.
  doctrine_reference: Translation philosophy §1, §5
