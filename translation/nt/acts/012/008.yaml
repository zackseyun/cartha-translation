id: ACT.12.8
reference: Acts 12:8
source:
  edition: SBLGNT
  text: εἶπεν ⸀δὲ ὁ ἄγγελος πρὸς αὐτόν· ⸀Ζῶσαι καὶ ὑπόδησαι τὰ σανδάλιά σου· ἐποίησεν
    δὲ οὕτως. καὶ λέγει αὐτῷ· Περιβαλοῦ τὸ ἱμάτιόν σου καὶ ἀκολούθει μοι.
translation:
  text: And the angel said to him, “Tie on your belt and put on your sandals.” And
    he did so. And he says to him, “Wrap your cloak around yourself and follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Gird yourself.” The Greek command refers to fastening one's belt for
      readiness.
    reason: lexical_alternative
  - marker: b
    text: Greek “he says,” a historical present used for vivid narration.
    reason: lexical_alternative
  - marker: c
    text: Or “Throw your cloak around yourself.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In Acts narrative, the referent is a heavenly being who has just appeared
    in the prison, so 'angel' is the natural contextual rendering rather than the
    more general 'messenger'.
- source_word: Ζῶσαι
  chosen: Tie on your belt
  alternatives:
  - Gird yourself
  - Belt yourself
  lexicon: BDAG
  rationale: The aorist middle imperative of ζώννυμι refers to fastening one's belt
    or girding oneself. 'Tie on your belt' communicates the concrete action in clear
    modern English better than the archaic 'gird yourself,' while preserving the command's
    specificity.
- source_word: ὑπόδησαι τὰ σανδάλιά σου
  chosen: put on your sandals
  alternatives:
  - bind on your sandals
  - shoe yourself with your sandals
  lexicon: BDAG
  rationale: This imperative calls for putting footwear on. 'Put on your sandals'
    is idiomatic modern English and accurately reflects the object σανδάλια.
- source_word: ἐποίησεν δὲ οὕτως
  chosen: And he did so
  alternatives:
  - And he did thus
  - And he did it
  lexicon: BDAG
  rationale: οὕτως summarizes Peter's obedience to the preceding commands. 'And he
    did so' is the most natural concise English equivalent.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek shifts from aorist εἶπεν to present λέγει, a common historical
    present in narrative. Rendering it as 'he says' preserves the aspectual vividness
    and the Greek's discourse texture.
- source_word: Περιβαλοῦ τὸ ἱμάτιόν σου
  chosen: Wrap your cloak around yourself
  alternatives:
  - Put on your garment
  - Throw your cloak around yourself
  lexicon: BDAG
  rationale: ἱμάτιον here denotes an outer garment or cloak, not merely generic 'clothes.'
    Περιβαλοῦ suggests putting it around oneself. 'Wrap your cloak around yourself'
    captures both the garment type and the action.
- source_word: ἀκολούθει μοι
  chosen: follow me
  alternatives:
  - come with me
  lexicon: BDAG
  rationale: ἀκολουθέω regularly means 'follow.' 'Come with me' would weaken the verbal
    link to the common NT motif of following, even though here it is a literal movement
    command.
