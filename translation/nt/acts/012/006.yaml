id: ACT.12.6
reference: Acts 12:6
source:
  edition: SBLGNT
  text: Ὅτε δὲ ἤμελλεν ⸂προαγαγεῖν αὐτὸν⸃ ὁ Ἡρῴδης, τῇ νυκτὶ ἐκείνῃ ἦν ὁ Πέτρος κοιμώμενος
    μεταξὺ δύο στρατιωτῶν δεδεμένος ἁλύσεσιν δυσίν, φύλακές τε πρὸ τῆς θύρας ἐτήρουν
    τὴν φυλακήν.
translation:
  text: Now when Herod was about to bring him out, on that very night Peter was sleeping
    between two soldiers, bound with two chains, and guards before the door were keeping
    watch over the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring him forward.' The Greek verb can refer to leading someone out
      for public appearance or trial.
    reason: lexical_alternative
  - marker: b
    text: Or 'were guarding the prison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤμελλεν
  chosen: was about to
  alternatives:
  - intended to
  - was going to
  lexicon: BDAG
  rationale: μέλλω commonly indicates imminence or impending action. 'Was about to'
    best captures the sense that Herod's action was imminent.
- source_word: προαγαγεῖν αὐτόν
  chosen: bring him out
  alternatives:
  - bring him forward
  - lead him out
  lexicon: BDAG
  rationale: προάγω here refers to bringing Peter out from custody for public proceedings.
    'Bring him out' is natural English and fits the prison context better than the
    more wooden 'bring him forward,' while preserving the movement implied by the
    verb.
- source_word: τῇ νυκτὶ ἐκείνῃ
  chosen: on that very night
  alternatives:
  - that night
  - on that night
  lexicon: BDAG
  rationale: The demonstrative ἐκείνῃ adds specificity and emphasis. 'On that very
    night' reflects the marked reference and heightens the narrative tension.
- source_word: κοιμώμενος
  chosen: was sleeping
  alternatives:
  - was asleep
  lexicon: BDAG
  rationale: The participle denotes the ongoing state/action of sleep. 'Was sleeping'
    preserves the verbal aspect more clearly than the stative 'was asleep.'
- source_word: μεταξὺ δύο στρατιωτῶν
  chosen: between two soldiers
  alternatives:
  - in the midst of two soldiers
  lexicon: BDAG
  rationale: A straightforward spatial expression. 'Between two soldiers' is idiomatic
    and precise.
- source_word: δεδεμένος
  chosen: bound
  alternatives:
  - chained
  - having been bound
  lexicon: BDAG
  rationale: The perfect passive participle indicates Peter's existing restrained
    condition. 'Bound' is concise and allows the following dative phrase 'with two
    chains' to specify the means.
- source_word: ἁλύσεσιν δυσίν
  chosen: with two chains
  alternatives:
  - by two chains
  lexicon: BDAG
  rationale: ἅλυσις means chain, often for imprisonment. 'With two chains' naturally
    expresses instrument/means in English.
- source_word: φύλακές
  chosen: guards
  alternatives:
  - watchmen
  - sentries
  lexicon: BDAG
  rationale: In this prison setting, 'guards' is the clearest modern equivalent.
- source_word: πρὸ τῆς θύρας
  chosen: before the door
  alternatives:
  - at the door
  - in front of the door
  lexicon: BDAG
  rationale: πρό with the genitive means 'before/in front of.' 'Before the door' is
    slightly more formal but preserves the spatial wording; the phrase remains clear
    in context.
- source_word: ἐτήρουν τὴν φυλακήν
  chosen: were keeping watch over the prison
  alternatives:
  - were guarding the prison
  - were keeping the prison under guard
  lexicon: BDAG
  rationale: τηρέω can mean keep, guard, watch over. Since φύλακες already supplies
    'guards,' rendering the verb as 'were keeping watch over' avoids awkward repetition
    while preserving the guarding sense. φυλακή here refers to the prison/jail rather
    than merely the act of guarding.
