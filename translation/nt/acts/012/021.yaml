id: ACT.12.21
reference: Acts 12:21
source:
  edition: SBLGNT
  text: τακτῇ δὲ ἡμέρᾳ ὁ Ἡρῴδης ἐνδυσάμενος ἐσθῆτα βασιλικὴν ⸀καὶ καθίσας ἐπὶ τοῦ
    βήματος ἐδημηγόρει πρὸς αὐτούς·
translation:
  text: Now on an appointed day, Herod, having put on royal clothing and having sat
    down on the tribunal seat, was delivering a public address to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'royal robes.' The Greek term can refer generally to splendid attire.
    reason: lexical_alternative
  - marker: b
    text: Or 'judgment seat' or 'platform' for 'tribunal seat.' The Greek βῆμα often
      denotes an official seat or raised dais.
    reason: lexical_alternative
lexical_decisions:
- source_word: τακτῇ ... ἡμέρᾳ
  chosen: on an appointed day
  alternatives:
  - on a set day
  - on the appointed day
  lexicon: BDAG
  rationale: τακτός with ἡμέρα denotes a fixed or appointed day. 'Appointed' is natural
    English and preserves the sense of a formally designated occasion.
- source_word: ἐνδυσάμενος
  chosen: having put on
  alternatives:
  - having dressed himself in
  - having clothed himself with
  lexicon: BDAG
  rationale: The aorist middle participle indicates Herod's action of dressing himself.
    'Having put on' is concise and idiomatic while preserving the participial sequence.
- source_word: ἐσθῆτα βασιλικὴν
  chosen: royal clothing
  alternatives:
  - royal robes
  - royal apparel
  lexicon: BDAG
  rationale: ἐσθής can refer broadly to clothing or attire, not necessarily multiple
    robes. 'Royal clothing' preserves the singular collective sense without over-specifying,
    while still conveying regal dress.
- source_word: καθίσας
  chosen: having sat down
  alternatives:
  - having taken his seat
  - sitting down
  lexicon: BDAG
  rationale: The aorist participle marks the next action in sequence. 'Having sat
    down' keeps the formal progression of the narrative.
- source_word: ἐπὶ τοῦ βήματος
  chosen: on the tribunal seat
  alternatives:
  - on the judgment seat
  - on the platform
  lexicon: BDAG
  rationale: βῆμα can denote an official seat or tribunal dais. Here the setting is
    a formal public appearance by a ruler; 'tribunal seat' preserves the official/judicial
    nuance better than the vaguer 'platform,' while avoiding importing a full legal
    proceeding.
- source_word: ἐδημηγόρει
  chosen: was delivering a public address
  alternatives:
  - was making a speech
  - was addressing the people publicly
  - was speaking publicly
  lexicon: BDAG
  rationale: δημηγορέω specifically refers to speaking before a public assembly. The
    imperfect suggests ongoing action, so 'was delivering a public address' captures
    both the public character and the progressive aspect.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - before them
  lexicon: BDAG
  rationale: πρός with accusative here indicates direction toward the audience. 'To
    them' is the most straightforward rendering.
