- issue: Rendering ἐκκλησία
  chosen_reading: church
  alternative_readings:
  - assembly
  - congregation
  rationale: The term denotes the Christian community praying for Peter. 'Church'
    is the most contextually fitting English rendering and does not force a denominational
    reading; alternatives are possible but less idiomatic in Acts narrative.
