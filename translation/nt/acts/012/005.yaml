id: ACT.12.5
reference: Acts 12:5
source:
  edition: SBLGNT
  text: ὁ μὲν οὖν Πέτρος ἐτηρεῖτο ἐν τῇ φυλακῇ· προσευχὴ δὲ ἦν ⸀ἐκτενῶς γινομένη ὑπὸ
    τῆς ἐκκλησίας πρὸς τὸν θεὸν ⸀περὶ αὐτοῦ.
translation:
  text: So Peter was being kept in the prison, but earnest prayer was being made to
    God by the church for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fervently' for 'earnest'; the Greek adverb can emphasize intensity or
      persistence in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτηρεῖτο
  chosen: was being kept
  alternatives:
  - was being guarded
  - was kept under guard
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing action. 'Was being kept' preserves
    the passive and the durative sense without over-specifying the manner, while still
    fitting the prison context.
- source_word: φυλακῇ
  chosen: the prison
  alternatives:
  - prison
  - jail
  lexicon: BDAG
  rationale: With the article, the phrase naturally refers to the place of confinement.
    'Prison' is more standard and slightly more formal than 'jail' in this narrative
    setting.
- source_word: προσευχὴ ... ἦν ... γινομένη
  chosen: prayer was being made
  alternatives:
  - prayer was happening
  - prayer was offered
  lexicon: BDAG
  rationale: The periphrastic construction with ἦν + participle conveys ongoing action.
    'Was being made' preserves the verbal force of γινομένη and the continuous aspect
    better than a simple 'was offered,' though the latter is idiomatic.
- source_word: ἐκτενῶς
  chosen: earnest
  alternatives:
  - fervently
  - constantly
  - intently
  lexicon: BDAG
  rationale: The adverb denotes intensity or persistence. 'Earnest' communicates sincere
    intensity in natural English. 'Fervently' is also possible and is preserved in
    a footnote as a lexical alternative.
- source_word: ὑπὸ τῆς ἐκκλησίας
  chosen: by the church
  alternatives:
  - by the assembly
  - by the congregation
  lexicon: BDAG
  rationale: In Acts, ἐκκλησία commonly refers to the gathered Christian community.
    'Church' is the established and contextually accurate rendering here, without
    importing later institutional meanings.
- source_word: πρὸς τὸν θεὸν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: πρός with a personal object here indicates direction of prayer. 'To God'
    is the natural English equivalent in prayer language.
- source_word: περὶ αὐτοῦ
  chosen: for him
  alternatives:
  - concerning him
  - about him
  - on his behalf
  lexicon: BDAG
  rationale: In the context of intercessory prayer, περί with the genitive is best
    rendered 'for him.' 'On his behalf' is slightly more explicit but less natural
    in the flow of the sentence.
- source_word: μὲν οὖν ... δὲ
  chosen: So ... but ...
  alternatives:
  - therefore ... and ...
  - on the one hand ... but on the other
  lexicon: BDAG
  rationale: The particles mark a mild contrast and narrative progression. 'So ...
    but ...' captures the discourse flow in readable English without woodenly reproducing
    the particle pair.
