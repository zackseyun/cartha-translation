id: ACT.27.37
reference: Acts 27:37
source:
  edition: SBLGNT
  text: ἤμεθα δὲ ⸂αἱ πᾶσαι ψυχαὶ ἐν τῷ πλοίῳ⸃ ⸀διακόσιαι ἑβδομήκοντα ἕξ.
translation:
  text: Now there were 276 persons in the ship in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we were, in all, 276 souls in the ship.' Here 'souls' means 'persons'
      or 'people,' not specifically immaterial souls.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤμεθα
  chosen: there were
  alternatives:
  - we were
  lexicon: BDAG
  rationale: Although the verb is first person plural ('we were'), idiomatic English
    with a following numerical total is better expressed as existential 'there were.'
    This preserves the sense without awkwardness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective or transition rather than strong
    contrast. 'Now' gives a natural narrative transition in English.
- source_word: αἱ πᾶσαι ψυχαὶ
  chosen: persons
  alternatives:
  - souls
  - people
  lexicon: BDAG
  rationale: ψυχαί in this context is an idiom for persons/lives aboard the vessel,
    not a statement about immaterial souls. 'Persons' is clear, natural, and avoids
    misleading theological overtones. 'In all' helps reflect πᾶσαι.
- source_word: ἐν τῷ πλοίῳ
  chosen: in the ship
  alternatives:
  - on the ship
  - in the vessel
  lexicon: BDAG
  rationale: πλοῖον is a ship/vessel. 'In the ship' closely follows the Greek prepositional
    phrase and is acceptable English in this context.
- source_word: διακόσιαι ἑβδομήκοντα ἕξ
  chosen: '276'
  alternatives:
  - two hundred seventy-six
  - two hundred and seventy-six
  lexicon: BDAG
  rationale: The numeral is rendered as a standard English number for readability
    while preserving the exact count.
