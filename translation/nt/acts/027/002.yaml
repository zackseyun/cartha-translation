id: ACT.27.2
reference: Acts 27:2
source:
  edition: SBLGNT
  text: ἐπιβάντες δὲ πλοίῳ Ἀδραμυττηνῷ ⸀μέλλοντι πλεῖν ⸀εἰς τοὺς κατὰ τὴν Ἀσίαν τόπους
    ἀνήχθημεν ὄντος σὺν ἡμῖν Ἀριστάρχου Μακεδόνος Θεσσαλονικέως·
translation:
  text: So we boarded an Adramyttian ship that was about to sail to the places along
    Asia, and put out to sea, with Aristarchus, a Macedonian from Thessalonica, being
    with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern
      continent.
    reason: cultural_note
  - marker: b
    text: Or "to the ports along the coast of Asia."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιβάντες
  chosen: boarded
  alternatives:
  - went aboard
  - embarked on
  lexicon: BDAG
  rationale: Aorist participle of ἐπιβαίνω in nautical context means going aboard
    a vessel. 'Boarded' is concise, natural English and preserves the sequence before
    the main verb.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So'
    gives smooth English connection to the prior verse without overstating contrast.
- source_word: πλοίῳ Ἀδραμυττηνῷ
  chosen: an Adramyttian ship
  alternatives:
  - a ship of Adramyttium
  lexicon: BDAG
  rationale: The adjective Ἀδραμυττηνῷ identifies the ship by its home port/origin.
    'Adramyttian ship' is idiomatic and concise while preserving the proper-name adjective.
- source_word: μέλλοντι πλεῖν
  chosen: that was about to sail
  alternatives:
  - intending to sail
  - being about to sail
  lexicon: BDAG
  rationale: μέλλω + infinitive commonly indicates imminence or intended future action.
    'Was about to sail' fits the immediate travel context and reads naturally in English.
- source_word: εἰς τοὺς κατὰ τὴν Ἀσίαν τόπους
  chosen: to the places along Asia
  alternatives:
  - to the ports along the coast of Asia
  - to the places in Asia
  lexicon: BDAG
  rationale: κατὰ with the accusative here has distributive/geographical force, referring
    to locations along the province/coast of Asia. 'Places along Asia' stays close
    to the Greek without importing 'ports,' though ports are implied by the sailing
    context.
- source_word: Ἀσίαν
  chosen: Asia
  alternatives:
  - the province of Asia
  lexicon: BDAG
  rationale: In Acts this refers to the Roman province in western Asia Minor, not
    the modern continent. The main text keeps the familiar proper name; a footnote
    clarifies the historical reference.
- source_word: ἀνήχθημεν
  chosen: put out to sea
  alternatives:
  - set sail
  - we were put out
  - we put to sea
  lexicon: BDAG
  rationale: ἀνάγω in passive form is a standard nautical expression for putting out
    from harbor. 'Put out to sea' is idiomatic and captures the maritime sense more
    precisely than a generic 'departed.'
- source_word: ὄντος σὺν ἡμῖν
  chosen: with Aristarchus ... being with us
  alternatives:
  - and Aristarchus was with us
  - accompanied by Aristarchus
  lexicon: BDAG
  rationale: The genitive absolute adds accompanying circumstance. The chosen rendering
    preserves that supplementary information while remaining readable; English requires
    some smoothing.
- source_word: Ἀριστάρχου
  chosen: Aristarchus
  rationale: Personal name transliterated per translation philosophy.
- source_word: Μακεδόνος
  chosen: a Macedonian
  alternatives:
  - of Macedonia
  lexicon: BDAG
  rationale: The noun identifies Aristarchus ethnically/regionally. 'A Macedonian'
    is the most natural English apposition.
- source_word: Θεσσαλονικέως
  chosen: from Thessalonica
  alternatives:
  - a Thessalonian
  lexicon: BDAG
  rationale: This further specifies Aristarchus's city. 'From Thessalonica' is clear
    modern English and avoids stacking two demonyms awkwardly ('a Macedonian, a Thessalonian').
