id: ACT.27.4
reference: Acts 27:4
source:
  edition: SBLGNT
  text: κἀκεῖθεν ἀναχθέντες ὑπεπλεύσαμεν τὴν Κύπρον διὰ τὸ τοὺς ἀνέμους εἶναι ἐναντίους,
translation:
  text: And from there, after putting out to sea, we sailed under the lee of Cyprus,
    because the winds were against us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we sailed along the sheltered side of Cyprus.' The Greek verb is a nautical
      term for sailing on the lee side of an island.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - and from thereupon
  - and thence
  lexicon: BDAG
  rationale: Conveys the connective καί plus adverb ἐκεῖθεν naturally in modern English.
    'And from there' preserves the narrative flow without archaic diction.
- source_word: ἀναχθέντες
  chosen: after putting out to sea
  alternatives:
  - having set sail
  - after weighing anchor
  lexicon: BDAG
  rationale: Aorist passive participle of ἀνάγω in nautical usage means to put out
    to sea or set sail. 'After putting out to sea' captures the participial, prior
    action in readable English. 'Weighing anchor' is possible but more specific than
    the Greek requires.
- source_word: ὑπεπλεύσαμεν
  chosen: we sailed under the lee of
  alternatives:
  - we sailed along the sheltered side of
  - we sailed under
  lexicon: BDAG
  rationale: In this nautical context, ὑποπλέω refers to sailing on the sheltered
    side of an island, not merely 'under' in a literal spatial sense. 'Under the lee
    of' is the most precise maritime English equivalent.
- source_word: τὴν Κύπρον
  chosen: Cyprus
  lexicon: BDAG
  rationale: Standard English transliteration of the island name Κύπρος.
- source_word: διὰ τὸ ... εἶναι
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses reason. 'Because' is the
    clearest natural rendering in English.
- source_word: τοὺς ἀνέμους
  chosen: the winds
  lexicon: BDAG
  rationale: Direct and standard rendering of ἄνεμος in the plural.
- source_word: ἐναντίους
  chosen: were against us
  alternatives:
  - were contrary
  - were opposing
  lexicon: BDAG
  rationale: Although the pronoun 'us' is not explicit, English idiom commonly supplies
    the implied object in this sailing context. 'Contrary' is more formal but less
    natural; 'against us' clearly communicates adverse winds.
