theological_decisions:
- issue: Meaning of σωτηρία in context
  chosen_reading: physical preservation/survival rather than spiritual salvation
  alternative_readings:
  - salvation
  rationale: The immediate context is Paul's assurance during a storm at sea that
    all aboard will survive. Rendering σωτηρία as 'salvation' in the main text could
    misleadingly suggest soteriological content not intended by the narrative. The
    translation preserves the contextual physical sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it only where ambiguity
    is genuine.'
