id: ACT.27.34
reference: Acts 27:34
source:
  edition: SBLGNT
  text: διὸ παρακαλῶ ὑμᾶς ⸀μεταλαβεῖν τροφῆς, τοῦτο γὰρ πρὸς τῆς ὑμετέρας σωτηρίας
    ὑπάρχει· οὐδενὸς γὰρ ὑμῶν θρὶξ ⸀ἀπὸ τῆς κεφαλῆς ⸀ἀπολεῖται.
translation:
  text: Therefore I urge you to take some food, for this is for your preservation;
    for not a hair from the head of any of you will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for this is for your salvation.' Here the Greek word can mean 'salvation,'
      'deliverance,' or 'preservation'; in this context it refers to physical survival.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: Marks an inference from the preceding situation and exhortation; 'Therefore'
    is natural English and preserves the logical connection.
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I encourage
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: In this context Paul is strongly encouraging the passengers to act. 'I
    urge' conveys earnest appeal without sounding overly formal.
- source_word: μεταλαβεῖν τροφῆς
  chosen: to take some food
  alternatives:
  - to eat
  - to partake of food
  lexicon: BDAG
  rationale: The idiom means to take nourishment/food. 'Take some food' is idiomatic
    modern English and preserves the concrete sense better than the more formal 'partake
    of food.'
- source_word: τοῦτο γὰρ πρὸς τῆς ὑμετέρας σωτηρίας ὑπάρχει
  chosen: for this is for your preservation
  alternatives:
  - for this is for your salvation
  - for this is necessary for your survival
  - for this serves your safety
  lexicon: BDAG
  rationale: σωτηρία can mean salvation, deliverance, preservation, or safety depending
    on context. Here the setting is physical danger at sea, so a physical sense is
    required. 'Preservation' keeps the semantic link to rescue/deliverance without
    importing soteriological meaning. πρὸς + genitive here expresses purpose/benefit.
- source_word: σωτηρίας
  chosen: preservation
  alternatives:
  - salvation
  - survival
  - safety
  lexicon: BDAG
  rationale: Because the verse concerns surviving the shipwreck, the term refers to
    bodily preservation rather than eternal salvation. 'Preservation' is slightly
    more formal than 'survival' and fits Luke's style while remaining clear.
- source_word: οὐδενὸς γὰρ ὑμῶν
  chosen: of any of you
  alternatives:
  - of none of you
  - among you
  lexicon: BDAG
  rationale: The genitive construction is naturally rendered 'of any of you' in English,
    preserving the distributive force.
- source_word: θρὶξ ἀπὸ τῆς κεφαλῆς
  chosen: not a hair from the head
  alternatives:
  - not a hair of the head
  - not one hair from the head
  lexicon: BDAG
  rationale: This is a known idiom for complete bodily safety. 'From the head' reflects
    ἀπό more directly than simply 'of his head' while remaining idiomatic.
- source_word: ἀπολεῖται
  chosen: will perish
  alternatives:
  - will be lost
  - will fall
  - will be destroyed
  lexicon: BDAG
  rationale: Future middle of ἀπόλλυμι here means 'be lost/perish.' 'Will perish'
    works idiomatically with 'hair' in English and preserves the emphatic assurance
    that no harm will come to them.
