id: ACT.27.17
reference: Acts 27:17
source:
  edition: SBLGNT
  text: ἣν ἄραντες βοηθείαις ἐχρῶντο ὑποζωννύντες τὸ πλοῖον· φοβούμενοί τε μὴ εἰς
    τὴν Σύρτιν ἐκπέσωσιν, χαλάσαντες τὸ σκεῦος, οὕτως ἐφέροντο.
translation:
  text: After hoisting it up, they used supporting cables to undergird the ship; and
    fearing that they might run aground on the Syrtis, they lowered the gear and so
    were driven along.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'frapping cables'; the Greek literally speaks of using 'supports' to
      undergird the ship.
    reason: lexical_alternative
  - marker: b
    text: The Syrtis was a notorious area of shoals or sandbanks off the North African
      coast.
    reason: cultural_note
  - marker: c
    text: Or 'they lowered the tackle' or 'they lowered the sea anchor'; the Greek
      says 'the gear/equipment,' and the exact nautical reference is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  chosen: it
  alternatives:
  - which
  lexicon: BDAG
  rationale: Refers back to the skiff/boat from the previous verse. English idiom
    prefers the resumptive pronoun 'it' rather than 'which' at the start of a new
    sentence.
- source_word: ἄραντες
  chosen: After hoisting ... up
  alternatives:
  - having lifted
  - after lifting
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    'Hoisting ... up' fits the nautical context of bringing the small boat aboard.
- source_word: βοηθείαις
  chosen: supporting cables
  alternatives:
  - helps
  - supports
  - frapping cables
  lexicon: BDAG
  rationale: Literally 'helps' or 'supports,' but in this maritime context it refers
    to technical means used to reinforce the hull. 'Supporting cables' conveys the
    sense in accessible modern English without overcommitting to a highly technical
    term in the main text.
- source_word: ἐχρῶντο
  chosen: they used
  alternatives:
  - they made use of
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or customary use in the situation;
    simple English 'they used' communicates the action naturally.
- source_word: ὑποζωννύντες τὸ πλοῖον
  chosen: to undergird the ship
  alternatives:
  - undergirding the ship
  - to brace the ship underneath
  lexicon: BDAG
  rationale: Technical nautical expression for passing cables around the hull to strengthen
    it. 'Undergird' preserves the specific image while remaining understandable.
- source_word: φοβούμενοί τε
  chosen: and fearing
  alternatives:
  - and because they feared
  - for they were afraid
  lexicon: BDAG
  rationale: Present participle with τε links this clause to the preceding action.
    'And fearing' preserves the participial flow.
- source_word: μὴ εἰς τὴν Σύρτιν ἐκπέσωσιν
  chosen: that they might run aground on the Syrtis
  alternatives:
  - that they might be driven onto the Syrtis
  - that they might fall into the Syrtis
  lexicon: BDAG
  rationale: The phrase refers to danger from the Syrtis shoals/sandbanks off North
    Africa. 'Run aground on the Syrtis' communicates the maritime hazard clearly in
    English.
- source_word: Σύρτιν
  chosen: the Syrtis
  alternatives:
  - the Syrtis shoals
  - the Syrtis sandbanks
  lexicon: BDAG
  rationale: A proper geographic name is best transliterated in the main text per
    philosophy; explanatory alternatives are suitable for a footnote.
- source_word: χαλάσαντες τὸ σκεῦος
  chosen: they lowered the gear
  alternatives:
  - they lowered the equipment
  - they lowered the tackle
  - they lowered the sea anchor
  lexicon: BDAG
  rationale: σκεῦος is broad ('gear, equipment, apparatus'). In this nautical context
    it likely refers to ship's gear lowered to reduce speed/drift, but the exact item
    is debated. 'Gear' preserves the generality of the Greek while fitting the context.
- source_word: οὕτως ἐφέροντο
  chosen: and so were driven along
  alternatives:
  - and thus they were borne along
  - and in this way they drifted
  lexicon: BDAG
  rationale: Imperfect passive conveys continued movement under external force, likely
    wind-driven. 'Were driven along' is vivid, natural, and contextually precise.
