theological_decisions:
- issue: Possible Eucharistic resonance in the sequence 'taking bread ... gave thanks
    ... breaking ... began to eat'
  chosen_reading: Render the actions in ordinary narrative terms without sacramental
    interpretation in the main text.
  alternative_readings:
  - A translation could heighten liturgical resonance by wording it more like traditional
    Lord's Supper language.
  rationale: The wording echoes familiar meal actions and may remind readers of Eucharistic
    scenes, but the verse itself narrates Paul's public meal on the ship and does
    not explicitly identify the act as the Lord's Supper. To avoid importing doctrinal
    claims the text does not make, the translation remains narratively plain.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
