id: ACT.27.10
reference: Acts 27:10
source:
  edition: SBLGNT
  text: λέγων αὐτοῖς· Ἄνδρες, θεωρῶ ὅτι μετὰ ὕβρεως καὶ πολλῆς ζημίας οὐ μόνον τοῦ
    φορτίου καὶ τοῦ πλοίου ἀλλὰ καὶ τῶν ψυχῶν ἡμῶν μέλλειν ἔσεσθαι τὸν πλοῦν.
translation:
  text: saying to them, “Men, I perceive that the voyage is about to be with disaster
    and great loss, not only of the cargo and the ship, but also of our lives.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with injury and much damage.” The Greek phrase can emphasize violent
      hardship or damage accompanying the voyage.
    reason: lexical_alternative
  - marker: b
    text: Or “our souls,” but here the sense is plainly “our lives” in the context
      of possible shipwreck and death.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων αὐτοῖς
  chosen: saying to them
  alternatives:
  - telling them
  lexicon: BDAG
  rationale: A straightforward participial introduction; 'saying to them' preserves
    the narrative flow and the present participle's attendant circumstance sense without
    unnecessary expansion.
- source_word: Ἄνδρες
  chosen: Men
  alternatives:
  - Sirs
  lexicon: BDAG
  rationale: Vocative plural of ἀνήρ. 'Men' is the more direct, gender-accurate rendering
    and fits the address to the ship's company. 'Sirs' is possible idiomatically,
    but the translation philosophy prefers matching the source's gendered form where
    intended.
- source_word: θεωρῶ
  chosen: I perceive
  alternatives:
  - I see
  - I consider
  lexicon: BDAG
  rationale: '''I perceive'' conveys informed judgment or discernment rather than
    mere visual sight, fitting Paul''s warning based on observation and assessment.'
- source_word: μετὰ ὕβρεως καὶ πολλῆς ζημίας
  chosen: with disaster and great loss
  alternatives:
  - with injury and much damage
  - with violence and great loss
  lexicon: BDAG
  rationale: μετά with the genitive here expresses attendant circumstance/result for
    the voyage. ὕβρις in this maritime context points to violent mistreatment/disaster
    rather than moral 'insolence'; ζημία denotes loss/damage. 'Disaster and great
    loss' is natural English and captures the severity.
- source_word: οὐ μόνον τοῦ φορτίου καὶ τοῦ πλοίου ἀλλὰ καὶ
  chosen: not only of the cargo and the ship, but also
  alternatives:
  - not only to the cargo and the ship, but also
  lexicon: BDAG
  rationale: The genitives depend on the implied sense of loss/damage. Rendering with
    'of' makes explicit that the loss concerns these items. 'Cargo' is the natural
    gloss for φορτίον in a shipping context.
- source_word: τῶν ψυχῶν ἡμῶν
  chosen: our lives
  alternatives:
  - our souls
  - us ourselves
  lexicon: BDAG
  rationale: In this danger-at-sea context, ψυχή refers to physical life rather than
    the immaterial soul. 'Our lives' best communicates the threatened loss of life
    in idiomatic English.
- source_word: μέλλειν ἔσεσθαι
  chosen: is about to be
  alternatives:
  - will be
  - is going to be
  lexicon: BDAG
  rationale: The complementary infinitives express imminence or expectation. 'Is about
    to be' preserves the force of μέλλω more clearly than a simple future.
- source_word: τὸν πλοῦν
  chosen: the voyage
  alternatives:
  - the sailing
  - the journey by sea
  lexicon: BDAG
  rationale: πλοῦς denotes the sea voyage itself. 'Voyage' is concise, natural, and
    contextually precise.
