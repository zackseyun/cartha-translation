id: ACT.27.31
reference: Acts 27:31
source:
  edition: SBLGNT
  text: εἶπεν ὁ Παῦλος τῷ ἑκατοντάρχῃ καὶ τοῖς στρατιώταις· Ἐὰν μὴ οὗτοι μείνωσιν
    ἐν τῷ πλοίῳ, ὑμεῖς σωθῆναι οὐ δύνασθε.
translation:
  text: Paul said to the centurion and the soldiers, “Unless these men remain in the
    ship, you cannot be saved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be rescued.” The Greek says “be saved,” here referring to physical survival.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχῃ
  chosen: centurion
  alternatives:
  - commander of a hundred
  lexicon: BDAG
  rationale: Standard rendering for the Roman military rank; concise and familiar
    in English.
- source_word: οὗτοι
  chosen: these men
  alternatives:
  - these
  - these ones
  lexicon: BDAG
  rationale: The demonstrative refers specifically to the sailors attempting to leave
    the vessel. Adding 'men' makes the referent clear in natural English without changing
    the sense.
- source_word: μείνωσιν
  chosen: remain
  alternatives:
  - stay
  - continue
  lexicon: BDAG
  rationale: μένω commonly means 'remain' or 'stay.' 'Remain' fits the conditional
    warning and preserves a slightly more formal tone appropriate to the narrative.
- source_word: πλοίῳ
  chosen: ship
  alternatives:
  - boat
  - vessel
  lexicon: BDAG
  rationale: In this voyage narrative, πλοῖον refers to the larger seagoing craft.
    'Ship' is the most natural and specific English rendering here.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be rescued
  - be delivered safely
  lexicon: BDAG
  rationale: σῴζω can mean rescue from physical danger or salvation in a theological
    sense. In this immediate context of shipwreck, the sense is physical preservation.
    'Be saved' preserves the Greek wording and allows the narrative force to stand,
    while the context makes clear that physical rescue is meant.
- source_word: οὐ δύνασθε
  chosen: you cannot
  alternatives:
  - you are not able to
  - it is impossible for you to
  lexicon: BDAG
  rationale: Natural English equivalent of the verb of ability with negation; direct
    and clear.
