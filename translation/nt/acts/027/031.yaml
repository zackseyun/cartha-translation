theological_decisions:
- issue: Whether σωθῆναι should be rendered with explicitly physical language or with
    the broader term 'be saved.'
  chosen_reading: be saved
  alternative_readings:
  - be rescued
  - be brought safely through
  rationale: The context clearly concerns physical survival in the storm, not eternal
    salvation. However, the Greek verb is the ordinary verb 'to save,' and translating
    it as 'be saved' preserves lexical transparency while allowing context to define
    the kind of saving in view. This avoids unnecessary paraphrase beyond what the
    source text warrants.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without importing doctrinal claims.'
