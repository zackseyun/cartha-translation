id: ACT.27.39
reference: Acts 27:39
source:
  edition: SBLGNT
  text: Ὅτε δὲ ἡμέρα ἐγένετο, τὴν γῆν οὐκ ἐπεγίνωσκον, κόλπον δέ τινα κατενόουν ἔχοντα
    αἰγιαλὸν εἰς ὃν ⸀ἐβουλεύοντο εἰ ⸀δύναιντο ⸀ἐξῶσαι τὸ πλοῖον.
translation:
  text: Now when day came, they did not recognize the land, but they noticed a certain
    bay with a beach, into which they planned, if they could, to run the ship ashore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to beach the ship.' The Greek verb refers to driving or forcing the
      vessel onto shore.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε δὲ ἡμέρα ἐγένετο
  chosen: Now when day came
  alternatives:
  - When it became day
  - When daylight came
  lexicon: BDAG
  rationale: A natural English temporal clause that preserves the Greek sense of the
    arrival of daylight. 'Now' reflects δέ as a mild narrative transition.
- source_word: τὴν γῆν οὐκ ἐπεγίνωσκον
  chosen: they did not recognize the land
  alternatives:
  - they did not recognize the coast
  - they could not identify the land
  lexicon: BDAG
  rationale: ἐπιγινώσκω here means to recognize or identify. γῆ can mean land in a
    broad sense; 'land' is the most direct rendering, while context implies coastline
    or locality.
- source_word: κόλπον δέ τινα
  chosen: but they noticed a certain bay
  alternatives:
  - but they observed a certain inlet
  - but they saw a certain gulf
  lexicon: BDAG
  rationale: κόλπος in this nautical context refers to a bay or inlet. 'A certain
    bay' preserves the indefiniteness of τινα and is idiomatic English.
- source_word: κατενόουν
  chosen: they noticed
  alternatives:
  - they observed
  - they perceived
  lexicon: BDAG
  rationale: κατανοέω conveys attentive noticing or observing. 'Noticed' is readable
    modern English and fits the narrative flow.
- source_word: ἔχοντα αἰγιαλὸν
  chosen: with a beach
  alternatives:
  - having a shore
  - with a sandy shore
  lexicon: BDAG
  rationale: αἰγιαλός denotes shore/beach, often the seashore. 'Beach' is concrete
    and suits the shipwreck setting; 'sandy' would over-specify what the Greek does
    not explicitly state.
- source_word: εἰς ὃν
  chosen: into which
  alternatives:
  - toward which
  - where
  lexicon: BDAG
  rationale: The relative phrase points to the bay as the intended destination. 'Into
    which' preserves the directional force of εἰς.
- source_word: ἐβουλεύοντο
  chosen: they planned
  alternatives:
  - they decided
  - they resolved
  lexicon: BDAG
  rationale: βουλεύομαι can mean to deliberate, decide, or plan. In context, the crew
    formed an intention regarding the ship's course; 'planned' captures that well.
- source_word: εἰ δύναιντο
  chosen: if they could
  alternatives:
  - if possible
  - if they were able
  lexicon: BDAG
  rationale: The optative with εἰ expresses contingency or possibility. 'If they could'
    is concise and natural.
- source_word: ἐξῶσαι τὸ πλοῖον
  chosen: to run the ship ashore
  alternatives:
  - to beach the ship
  - to drive the ship onto shore
  lexicon: BDAG
  rationale: ἐξωθέω literally involves thrusting or driving out; in nautical context
    it refers to forcing a vessel onto shore. 'Run the ship ashore' is an established
    English maritime expression that accurately conveys the action without awkwardness.
