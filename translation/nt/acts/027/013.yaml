id: ACT.27.13
reference: Acts 27:13
source:
  edition: SBLGNT
  text: Ὑποπνεύσαντος δὲ νότου δόξαντες τῆς προθέσεως κεκρατηκέναι ἄραντες ἆσσον παρελέγοντο
    τὴν Κρήτην.
translation:
  text: And when a south wind began to blow gently, thinking that they had obtained
    their purpose, they weighed anchor and sailed along Crete, close inshore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'supposing that they had secured their plan.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'having lifted [anchor].' The nautical sense is 'weighed anchor.'
    reason: lexical_alternative
  - marker: c
    text: Or 'coasted along Crete, nearer the shore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑποπνεύσαντος
  chosen: began to blow gently
  alternatives:
  - blew softly
  - sprang up lightly
  lexicon: BDAG
  rationale: The participle from ὑποπνέω denotes a light or gentle blowing of wind.
    'Began to blow gently' captures both the ingressive sense in context and the mildness
    of the wind in natural English.
- source_word: νότου
  chosen: a south wind
  alternatives:
  - the south wind
  - a southerly wind
  lexicon: BDAG
  rationale: νότος refers to the south wind. The anarthrous genitive in the genitive
    absolute is naturally rendered idiomatically in English as 'a south wind.'
- source_word: δόξαντες
  chosen: thinking
  alternatives:
  - supposing
  - assuming
  lexicon: BDAG
  rationale: δοκέω here expresses subjective judgment rather than appearance. 'Thinking'
    is straightforward modern English and fits the narrative flow.
- source_word: τῆς προθέσεως
  chosen: their purpose
  alternatives:
  - their plan
  - their intention
  lexicon: BDAG
  rationale: πρόθεσις here refers to the sailors' intended course or objective, not
    a theological 'purpose.' 'Their purpose' preserves the lexical sense while remaining
    idiomatic; the possessive is implied by context.
- source_word: κεκρατηκέναι
  chosen: had obtained
  alternatives:
  - had secured
  - had gained control of
  lexicon: BDAG
  rationale: κρατέω can mean to seize, gain control of, or attain. In the idiom δοκέω
    + genitive + infinitive, the sense is that they thought they had achieved or secured
    their objective. 'Had obtained' is concise and idiomatic.
- source_word: ἄραντες
  chosen: they weighed anchor
  alternatives:
  - having set sail
  - having lifted anchor
  lexicon: BDAG
  rationale: Although αἴρω literally means 'lift,' in nautical context it refers to
    lifting anchor in preparation for departure. 'They weighed anchor' is the standard
    English nautical equivalent and best reflects the implied object.
- source_word: ἆσσον
  chosen: close inshore
  alternatives:
  - closer
  - nearer the shore
  lexicon: BDAG
  rationale: ἆσσον is a comparative adverb meaning 'nearer' or 'closer.' In context
    with coastal sailing, 'close inshore' makes explicit the navigational sense without
    overtranslating.
- source_word: παρελέγοντο
  chosen: sailed along
  alternatives:
  - coasted along
  - sailed past
  lexicon: BDAG
  rationale: παραλέγομαι in nautical usage means to sail along the coast. 'Sailed
    along' is clear and natural; 'coasted along' is possible but can sound colloquial
    in modern English.
- source_word: τὴν Κρήτην
  chosen: Crete
  alternatives:
  - the coast of Crete
  lexicon: BDAG
  rationale: The object is literally 'Crete,' but with παραλέγομαι the sense is movement
    along the island's coast. English can retain 'Crete' without adding 'coast,' since
    the verb already supplies the coastal sense.
