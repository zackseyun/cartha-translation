id: ACT.27.40
reference: Acts 27:40
source:
  edition: SBLGNT
  text: καὶ τὰς ἀγκύρας περιελόντες εἴων εἰς τὴν θάλασσαν, ἅμα ἀνέντες τὰς ζευκτηρίας
    τῶν πηδαλίων, καὶ ἐπάραντες τὸν ἀρτέμωνα τῇ πνεούσῃ κατεῖχον εἰς τὸν αἰγιαλόν.
translation:
  text: And after casting off the anchors, they left them in the sea; at the same
    time loosening the ropes of the rudders, and hoisting the foresail to the wind,
    they made for the beach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bands/fastenings of the rudders'; the Greek term is a rare nautical
      word for what secured the steering apparatus.
    reason: lexical_alternative
  - marker: b
    text: Or 'the topsail' or 'the sail at the bow'; the exact reference of the Greek
      nautical term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιελόντες
  chosen: after casting off
  alternatives:
  - after removing
  - after cutting loose
  lexicon: BDAG
  rationale: Aorist participle indicating prior action. In nautical context with anchors,
    the sense is releasing/casting off rather than merely 'taking away.' 'Casting
    off' is idiomatic and fits the shipboard action.
- source_word: ἀγκύρας
  chosen: the anchors
  lexicon: BDAG
  rationale: Straightforward nautical noun in the accusative plural.
- source_word: εἴων εἰς τὴν θάλασσαν
  chosen: they left them in the sea
  alternatives:
  - they let them go into the sea
  - they abandoned them to the sea
  lexicon: BDAG
  rationale: ἐάω means let go/leave. Here the object is the anchors just cast off.
    'Left them in the sea' is natural English and preserves the sense that the anchors
    were abandoned.
- source_word: ἅμα
  chosen: at the same time
  alternatives:
  - simultaneously
  - together
  lexicon: BDAG
  rationale: Marks concurrent action with the surrounding participles.
- source_word: ἀνέντες
  chosen: loosening
  alternatives:
  - releasing
  - letting loose
  lexicon: BDAG
  rationale: Aorist participle from ἀνίημι, here of releasing what had been secured.
    'Loosening' reads naturally with ropes/bands.
- source_word: ζευκτηρίας
  chosen: the ropes
  alternatives:
  - the bands
  - the fastenings
  lexicon: BDAG
  rationale: A rare nautical term for the ties/fastenings connecting or securing the
    rudders. 'Ropes' is a clear modern rendering; the more technical 'bands/fastenings'
    is possible but less immediately intelligible.
- source_word: τῶν πηδαλίων
  chosen: of the rudders
  alternatives:
  - of the steering oars
  lexicon: BDAG
  rationale: Refers to the ship's steering apparatus. 'Rudders' is the standard rendering
    in Acts 27 and suits the likely twin steering paddles/oars of ancient ships.
- source_word: ἐπάραντες
  chosen: hoisting
  alternatives:
  - raising
  - setting
  lexicon: BDAG
  rationale: Aorist participle meaning to raise up. In sailing context, 'hoisting'
    is the most idiomatic English choice.
- source_word: ἀρτέμωνα
  chosen: the foresail
  alternatives:
  - the sail at the bow
  - the topsail
  lexicon: BDAG
  rationale: A technical nautical term of debated exact reference. 'Foresail' is a
    common and plausible rendering that communicates a forward sail used to beach
    the vessel. Because the precise sail is uncertain, alternatives are preserved
    in a footnote.
- source_word: τῇ πνεούσῃ
  chosen: to the wind
  alternatives:
  - to the blowing wind
  - to the breeze
  lexicon: BDAG
  rationale: Dative feminine singular participle from πνέω, with an implied noun such
    as 'wind' understood from context. 'To the wind' is concise and idiomatic in sailing
    English.
- source_word: κατεῖχον εἰς τὸν αἰγιαλόν
  chosen: they made for the beach
  alternatives:
  - they held course for the shore
  - they were heading toward the beach
  lexicon: BDAG
  rationale: κατέχω here carries the nautical sense of steering/holding a course toward
    a destination. αἰγιαλός is specifically a beach or shoreline. 'Made for the beach'
    is natural English and preserves the purposeful movement.
