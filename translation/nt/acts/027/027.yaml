id: ACT.27.27
reference: Acts 27:27
source:
  edition: SBLGNT
  text: Ὡς δὲ τεσσαρεσκαιδεκάτη νὺξ ἐγένετο διαφερομένων ἡμῶν ἐν τῷ Ἀδρίᾳ, κατὰ μέσον
    τῆς νυκτὸς ὑπενόουν οἱ ναῦται προσάγειν τινὰ αὐτοῖς χώραν.
translation:
  text: When the fourteenth night had come, as we were being driven along in the Adriatic
    Sea, about midnight the sailors began to suspect that some land was approaching
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as we were being carried along in Adria.' The ancient term 'Adria'
      could refer more broadly to the central Mediterranean waters in this region,
      not only the modern Adriatic Sea.
    reason: cultural_note
  - marker: b
    text: Literally, 'the sailors were suspecting that some land was approaching them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεσσαρεσκαιδεκάτη νὺξ
  chosen: the fourteenth night
  alternatives:
  - the fourteenth night came
  - the fourteenth night had come
  lexicon: BDAG
  rationale: The adjective-noun phrase denotes the arrival of the fourteenth night
    in the sequence of the storm. English idiom is best preserved with 'the fourteenth
    night,' while the verbal sense is carried by 'had come.'
- source_word: ἐγένετο
  chosen: had come
  alternatives:
  - came
  - arrived
  lexicon: BDAG
  rationale: γίνομαι here functions idiomatically with a time expression ('night')
    to indicate that the time had arrived. 'Had come' is natural English and preserves
    the temporal force.
- source_word: διαφερομένων ἡμῶν
  chosen: as we were being driven along
  alternatives:
  - as we were being carried along
  - as we were drifting
  lexicon: BDAG
  rationale: The present passive participle indicates ongoing movement not under the
    travelers' control. In the storm context, 'being driven along' best conveys passive,
    wind-driven motion more clearly than the weaker 'drifting.'
- source_word: ἐν τῷ Ἀδρίᾳ
  chosen: in the Adriatic Sea
  alternatives:
  - in the Adriatic
  - in the Sea of Adria
  lexicon: BDAG
  rationale: Ἀδρίας in ancient usage refers more broadly to the Adriatic region/sea
    area, not strictly the modern Adriatic only. 'Adriatic Sea' is the clearest modern
    geographic rendering, while retaining the conventional identification.
- source_word: κατὰ μέσον τῆς νυκτός
  chosen: about midnight
  alternatives:
  - at midnight
  - in the middle of the night
  lexicon: BDAG
  rationale: The phrase literally means 'about the middle of the night.' 'About midnight'
    is concise and idiomatic, while preserving the approximate temporal sense better
    than the more exact-sounding 'at midnight.'
- source_word: ὑπενόουν
  chosen: began to suspect
  alternatives:
  - suspected
  - sensed
  - thought
  lexicon: BDAG
  rationale: The imperfect suggests an inceptive or progressive nuance as the sailors
    were coming to a conclusion. 'Began to suspect' captures both the imperfect aspect
    and the tentative nature of ὑπονοέω.
- source_word: οἱ ναῦται
  chosen: the sailors
  alternatives:
  - the seamen
  - the mariners
  lexicon: BDAG
  rationale: '''Sailors'' is the most natural modern English equivalent and fits the
    readability goal without loss of meaning.'
- source_word: προσάγειν
  chosen: was approaching
  alternatives:
  - they were nearing
  - was drawing near
  lexicon: BDAG
  rationale: With χώραν as subject in indirect discourse after ὑπενόουν, the sense
    is that land was coming near to them, i.e., they were nearing land. Rendering
    it as 'was approaching' preserves the Greek construction more transparently than
    recasting the sailors as subject.
- source_word: τινὰ ... χώραν
  chosen: some land
  alternatives:
  - a certain landmass
  - land of some kind
  - land
  lexicon: BDAG
  rationale: 'τινά marks indefiniteness: they sensed land nearby but did not know
    what land. ''Some land'' preserves that uncertainty better than simply ''land.'''
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  - near them
  lexicon: BDAG
  rationale: The dative is retained in the clause 'land was approaching them.' This
    keeps the Greek perspective rather than fully restructuring to 'they were approaching
    land.'
