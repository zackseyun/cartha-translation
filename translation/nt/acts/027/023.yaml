theological_decisions:
- issue: Rendering οὗ εἰμι
  chosen_reading: to whom I belong
  alternative_readings:
  - whose I am
  rationale: The phrase expresses Paul's belonging to God. The chosen rendering communicates
    possession and allegiance in natural English without importing a stronger doctrinal
    claim than the Greek itself states.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering λατρεύω
  chosen_reading: worship
  alternative_readings:
  - serve
  rationale: Because λατρεύω in relation to God commonly denotes religious service,
    'worship' better preserves the theological force here. The alternative 'serve'
    is viable and worth preserving in a footnote because English readers may hear
    'worship' as narrower than the Greek.
  doctrine_reference: Translation philosophy §§1, 5, 6
