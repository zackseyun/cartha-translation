id: ACT.27.6
reference: Acts 27:6
source:
  edition: SBLGNT
  text: κἀκεῖ εὑρὼν ὁ ⸀ἑκατοντάρχης πλοῖον Ἀλεξανδρῖνον πλέον εἰς τὴν Ἰταλίαν ἐνεβίβασεν
    ἡμᾶς εἰς αὐτό.
translation:
  text: There the centurion found an Alexandrian ship sailing for Italy, and he put
    us on board it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And there the centurion found an Alexandrian ship bound for Italy and
      put us on board it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖ
  chosen: There
  alternatives:
  - And there
  lexicon: BDAG
  rationale: The compound means 'and there' or 'there also.' English narrative style
    can naturally absorb the connective without loss, so 'There' keeps the sense while
    reading smoothly.
- source_word: εὑρὼν
  chosen: found
  alternatives:
  - having found
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in English, a finite verb
    is more natural in sequence. 'Found' preserves the action without overly wooden
    participial phrasing.
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: '''Centurion'' is the standard and precise rendering for the Roman military
    rank, and it is widely understood in English Bible usage.'
- source_word: πλοῖον Ἀλεξανδρῖνον
  chosen: an Alexandrian ship
  alternatives:
  - a ship from Alexandria
  lexicon: BDAG
  rationale: The adjective identifies the ship as Alexandrian, likely by origin or
    registry. 'Alexandrian ship' is concise and idiomatic, while preserving the geographical
    designation.
- source_word: πλέον εἰς τὴν Ἰταλίαν
  chosen: sailing for Italy
  alternatives:
  - going to Italy
  - bound for Italy
  lexicon: BDAG
  rationale: The present participle plus destination indicates the ship's course or
    intended destination. 'Sailing for Italy' is natural maritime English and closely
    reflects the Greek.
- source_word: ἐνεβίβασεν ἡμᾶς εἰς αὐτό
  chosen: he put us on board it
  alternatives:
  - he embarked us on it
  - he put us into it
  lexicon: BDAG
  rationale: The verb means to cause someone to board or embark. 'Put us on board
    it' is clear, idiomatic, and preserves the causative sense better than the more
    technical 'embarked us.'
