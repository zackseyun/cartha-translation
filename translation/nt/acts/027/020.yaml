id: ACT.27.20
reference: Acts 27:20
source:
  edition: SBLGNT
  text: μήτε δὲ ἡλίου μήτε ἄστρων ἐπιφαινόντων ἐπὶ πλείονας ἡμέρας, χειμῶνός τε οὐκ
    ὀλίγου ἐπικειμένου, λοιπὸν περιῃρεῖτο ⸂ἐλπὶς πᾶσα⸃ τοῦ σῴζεσθαι ἡμᾶς.
translation:
  text: And when neither sun nor stars appeared for many days, and no small storm
    was pressing on us, from then on all hope of our being saved was gradually taken
    away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being rescued.' The Greek verb can mean 'to save' or 'to rescue'; here
      it refers to physical deliverance from the storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιφαινόντων
  chosen: appeared
  alternatives:
  - shone
  - became visible
  lexicon: BDAG
  rationale: The participle refers to heavenly bodies becoming visible/giving light.
    'Appeared' is natural English and fits the navigational context without overstating
    the luminous aspect.
- source_word: ἐπὶ πλείονας ἡμέρας
  chosen: for many days
  alternatives:
  - for several days
  - over many days
  lexicon: BDAG
  rationale: The idiom indicates duration over a span of days. 'For many days' is
    idiomatic and preserves the sense of an extended period.
- source_word: χειμῶνός
  chosen: storm
  alternatives:
  - tempest
  - bad weather
  lexicon: BDAG
  rationale: In this maritime context, the term denotes stormy weather rather than
    winter as a season. 'Storm' is the clearest contextual rendering.
- source_word: οὐκ ὀλίγου
  chosen: no small
  alternatives:
  - not a little
  - severe
  lexicon: BDAG
  rationale: This is a litotes. Retaining 'no small' preserves Luke's idiom and emphasis
    while remaining understandable in modern English.
- source_word: ἐπικειμένου
  chosen: was pressing on us
  alternatives:
  - was lying upon us
  - was bearing down on us
  lexicon: BDAG
  rationale: The participle conveys something impending or pressing heavily upon them.
    'Was pressing on us' captures the sustained oppressive force of the storm.
- source_word: λοιπὸν
  chosen: from then on
  alternatives:
  - finally
  - for the rest
  lexicon: BDAG
  rationale: Here the adverb marks the resulting stage of the situation rather than
    merely a conclusion in discourse. 'From then on' best conveys the temporal transition.
- source_word: περιῃρεῖτο
  chosen: was gradually taken away
  alternatives:
  - was removed
  - was being stripped away
  lexicon: BDAG
  rationale: The imperfect passive indicates an ongoing process, not a single moment.
    'Was gradually taken away' reflects the progressive loss of hope.
- source_word: ἐλπὶς πᾶσα
  chosen: all hope
  alternatives:
  - every hope
  lexicon: BDAG
  rationale: The phrase is idiomatically rendered 'all hope' in English and preserves
    the totality of their despair.
- source_word: τοῦ σῴζεσθαι ἡμᾶς
  chosen: of our being saved
  alternatives:
  - that we would be saved
  - of us being rescued
  lexicon: BDAG
  rationale: The articular infinitive expresses the content of the hope. 'Of our being
    saved' is natural and leaves the term broad enough to include physical deliverance
    without importing soteriological overtones.
