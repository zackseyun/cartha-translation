theological_decisions:
- issue: Meaning of σῴζεσθαι in narrative maritime context
  chosen_reading: physical rescue/preservation from death at sea, rendered 'being
    saved'
  alternative_readings:
  - being rescued
  rationale: In Acts 27 the context is shipwreck and survival, so the verb refers
    to physical deliverance rather than spiritual salvation. The English 'being saved'
    preserves lexical continuity with σῴζω while context makes the sense clear.
  doctrine_reference: Translation philosophy §1, §5
