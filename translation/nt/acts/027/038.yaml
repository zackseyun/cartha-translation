id: ACT.27.38
reference: Acts 27:38
source:
  edition: SBLGNT
  text: κορεσθέντες ⸀δὲ τροφῆς ἐκούφιζον τὸ πλοῖον ἐκβαλλόμενοι τὸν σῖτον εἰς τὴν
    θάλασσαν.
translation:
  text: And after they had eaten enough, they began to lighten the ship by throwing
    the wheat into the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they were satisfied with food' or 'having been filled with food.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they were lightening the ship' or simply 'they lightened the ship';
      the Greek imperfect may emphasize the process or the beginning of the action.
    reason: lexical_alternative
  - marker: c
    text: Or 'the grain.' The Greek word can be broader, but here likely refers specifically
      to wheat.
    reason: lexical_alternative
lexical_decisions:
- source_word: κορεσθέντες
  chosen: after they had eaten enough
  alternatives:
  - when they were satisfied with food
  - having been filled
  lexicon: BDAG
  rationale: Aorist passive participle from κορέννυμι conveys being filled or satisfied,
    here specifically by eating. In natural English within the narrative, 'after they
    had eaten enough' captures the temporal force and the sense of being sufficiently
    nourished without sounding wooden.
- source_word: τροφῆς
  chosen: had eaten enough
  alternatives:
  - with food
  - of food
  lexicon: BDAG
  rationale: Genitive with κορεσθέντες specifies what they were filled with. Rather
    than a literal but awkward 'filled with food,' the idea is incorporated into the
    idiomatic English rendering 'had eaten enough.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is a natural English equivalent in this context.
- source_word: ἐκούφιζον
  chosen: they began to lighten
  alternatives:
  - they were lightening
  - they lightened
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing or inceptive action in the narrative.
    'They began to lighten' reflects the imperfect well in English and fits the subsequent
    participle explaining how they did so.
- source_word: τὸ πλοῖον
  chosen: the ship
  alternatives:
  - the vessel
  - the boat
  lexicon: BDAG
  rationale: πλοῖον is the standard term for a ship or boat; in this voyage context
    'ship' is the most fitting and idiomatic choice.
- source_word: ἐκβαλλόμενοι
  chosen: by throwing
  alternatives:
  - throwing out
  - casting out
  lexicon: BDAG
  rationale: 'Present middle/passive participle here is best taken with active sense
    in context, expressing means: they lightened the ship by throwing cargo overboard.
    ''By throwing'' makes the instrumental nuance explicit in smooth English.'
- source_word: τὸν σῖτον
  chosen: the wheat
  alternatives:
  - the grain
  - the cargo of grain
  lexicon: BDAG
  rationale: σῖτος commonly means 'wheat' and Acts 27 has already identified the Alexandrian
    ship as carrying grain. 'Wheat' is the more specific lexical value and should
    be preserved unless context requires a broader term.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the water
  lexicon: BDAG
  rationale: Straightforward directional phrase. 'Into the sea' is both literal and
    natural in the maritime setting.
