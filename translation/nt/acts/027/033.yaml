id: ACT.27.33
reference: Acts 27:33
source:
  edition: SBLGNT
  text: Ἄχρι δὲ οὗ ⸂ἡμέρα ἤμελλεν⸃ γίνεσθαι παρεκάλει ὁ Παῦλος ἅπαντας μεταλαβεῖν
    τροφῆς λέγων· Τεσσαρεσκαιδεκάτην σήμερον ἡμέραν προσδοκῶντες ἄσιτοι διατελεῖτε,
    μηθὲν προσλαβόμενοι·
translation:
  text: Until the day was about to dawn, Paul kept urging them all to take some food,
    saying, “Today is the fourteenth day that you have continued in suspense without
    eating, having taken nothing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “waiting anxiously”; the Greek participle can denote expectation, and
      in this storm context likely carries the sense of anxious suspense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄχρι δὲ οὗ
  chosen: Until
  alternatives:
  - Up to the time when
  - Before
  lexicon: BDAG
  rationale: 'The phrase introduces a temporal limit: Paul continued speaking/urging
    up to the point when day was about to come. ''Until'' is natural English and preserves
    the temporal force.'
- source_word: ἡμέρα ἤμελλεν γίνεσθαι
  chosen: the day was about to dawn
  alternatives:
  - day was about to come
  - it was about to become day
  lexicon: BDAG
  rationale: Literally, 'day was about to become.' In idiomatic English, 'was about
    to dawn' best conveys the imminent arrival of daylight without awkwardness.
- source_word: παρεκάλει
  chosen: kept urging
  alternatives:
  - was urging
  - encouraged
  - exhorted
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Kept urging' captures
    the durative force better than a simple past. 'Encouraged' is possible but weaker
    than the context of pressing them to eat.
- source_word: ἅπαντας
  chosen: them all
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: Refers to all those on board. 'Them all' is idiomatic in English and
    preserves the comprehensiveness.
- source_word: μεταλαβεῖν τροφῆς
  chosen: to take some food
  alternatives:
  - to eat
  - to partake of food
  lexicon: BDAG
  rationale: The expression means to take nourishment/food. 'Take some food' is slightly
    more formal than simply 'eat' and reflects the partitive sense of the genitive
    τροφῆς.
- source_word: Τεσσαρεσκαιδεκάτην σήμερον ἡμέραν
  chosen: Today is the fourteenth day
  alternatives:
  - For fourteen days now
  - This is the fourteenth day today
  lexicon: BDAG
  rationale: This reproduces the Greek emphasis on the present day being the fourteenth.
    It is clear modern English while staying close to the source structure.
- source_word: προσδοκῶντες
  chosen: in suspense
  alternatives:
  - waiting
  - expecting
  - anxiously waiting
  lexicon: BDAG
  rationale: In this storm context, the sense is not neutral waiting but anxious expectation.
    'In suspense' captures the unsettled, apprehensive state implied by the narrative.
- source_word: ἄσιτοι
  chosen: without eating
  alternatives:
  - fasting
  - without food
  lexicon: BDAG
  rationale: The adjective means not having eaten. 'Fasting' could imply a voluntary
    religious fast, which is not the point here. 'Without eating' is clearer and contextually
    accurate.
- source_word: διατελεῖτε
  chosen: you have continued
  alternatives:
  - you continue
  - you have gone on
  lexicon: BDAG
  rationale: The verb conveys continuing in a state over a period. English present
    perfect ('have continued') fits the sense of an action extending up to the present
    moment.
- source_word: μηθὲν προσλαβόμενοι
  chosen: having taken nothing
  alternatives:
  - taking nothing
  - having eaten nothing
  lexicon: BDAG
  rationale: 'This participial phrase explains their condition: they have taken nothing
    for themselves. ''Having taken nothing'' stays close to the Greek while naturally
    implying no food has been consumed.'
