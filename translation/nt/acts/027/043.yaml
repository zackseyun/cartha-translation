id: ACT.27.43
reference: Acts 27:43
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀ἑκατοντάρχης βουλόμενος διασῶσαι τὸν Παῦλον ἐκώλυσεν αὐτοὺς τοῦ βουλήματος,
    ἐκέλευσέν τε τοὺς δυναμένους κολυμβᾶν ἀπορίψαντας πρώτους ἐπὶ τὴν γῆν ἐξιέναι,
translation:
  text: But the centurion, wanting to save Paul, kept them from their plan, and ordered
    those who were able to swim to jump overboard first and make for the land,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prevented them from carrying out their purpose.' The phrase refers to
      the soldiers' intention mentioned in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'having thrown themselves off first to go out onto the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - commander of a hundred
  lexicon: BDAG
  rationale: Standard military title for a Roman officer; 'centurion' is the established
    and accurate English equivalent, more natural than a glossed paraphrase.
- source_word: βουλόμενος
  chosen: wanting
  alternatives:
  - wishing
  - intending
  - desiring
  lexicon: BDAG
  rationale: The participle expresses the centurion's intention or desire. 'Wanting'
    is concise, natural English and fits the narrative flow without overstating resolve.
- source_word: διασῶσαι
  chosen: to save
  alternatives:
  - to bring safely through
  - to rescue
  lexicon: BDAG
  rationale: In this context the verb means preserving Paul alive through danger.
    'To save' is idiomatic and clear; 'rescue' is possible, but 'save' better matches
    the broad sense of preserving life.
- source_word: ἐκώλυσεν αὐτοὺς τοῦ βουλήματος
  chosen: kept them from their plan
  alternatives:
  - prevented them from carrying out their purpose
  - stopped them from their intention
  lexicon: BDAG
  rationale: The construction means preventing them from carrying out what they intended.
    'Their plan' communicates the genitive τοῦ βουλήματος naturally in English and
    refers to the soldiers' plan to kill the prisoners in the previous verse.
- source_word: ἐκέλευσέν τε
  chosen: and ordered
  alternatives:
  - and commanded
  - and gave orders
  lexicon: BDAG
  rationale: κελεύω commonly means to order or command. 'Ordered' is strong but idiomatic
    modern English.
- source_word: τοὺς δυναμένους κολυμβᾶν
  chosen: those who were able to swim
  alternatives:
  - those able to swim
  - the ones who could swim
  lexicon: BDAG
  rationale: This participial phrase identifies a subgroup among those on board. The
    chosen rendering is clear and natural.
- source_word: ἀπορίψαντας
  chosen: to jump overboard
  alternatives:
  - after throwing themselves off
  - having cast themselves into the sea
  lexicon: BDAG
  rationale: Literally the participle means 'having thrown themselves off,' here from
    the ship into the water. 'Jump overboard' captures the intended action in natural
    English without unnecessary awkwardness.
- source_word: πρώτους
  chosen: first
  alternatives:
  - as the first group
  - before the others
  lexicon: BDAG
  rationale: 'The adverbial force marks sequence: swimmers were to go ahead of the
    rest.'
- source_word: ἐπὶ τὴν γῆν ἐξιέναι
  chosen: make for the land
  alternatives:
  - go out onto the land
  - reach the shore
  lexicon: BDAG
  rationale: The phrase means to proceed to land from the sea. 'Make for the land'
    preserves the directional sense and suits the maritime setting; 'reach the shore'
    is interpretive but close.
