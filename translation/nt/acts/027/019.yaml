id: ACT.27.19
reference: Acts 27:19
source:
  edition: SBLGNT
  text: καὶ τῇ τρίτῃ αὐτόχειρες τὴν σκευὴν τοῦ πλοίου ⸀ἔρριψαν.
translation:
  text: And on the third day they threw the ship’s gear overboard with their own hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they themselves threw out the ship’s equipment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τρίτῃ
  chosen: on the third day
  alternatives:
  - on the third
  lexicon: BDAG
  rationale: The dative with ordinal here is a temporal expression. In English, 'on
    the third day' makes the implied temporal sense explicit and natural.
- source_word: αὐτόχειρες
  chosen: with their own hands
  alternatives:
  - themselves
  - personally
  lexicon: BDAG
  rationale: The adjective literally denotes acting 'with one's own hands.' Rendering
    it idiomatically as 'with their own hands' preserves the emphasis that the people
    aboard personally carried out the action, stronger than the bare 'themselves.'
- source_word: σκευή
  chosen: gear
  alternatives:
  - equipment
  - tackle
  - furnishings
  lexicon: BDAG
  rationale: In this nautical context, σκευή refers to the ship's equipment or gear
    rather than generic 'furnishings.' 'Gear' is concise, natural modern English,
    and fits the maritime setting better than the more technical 'tackle' or broader
    'equipment.'
- source_word: τοῦ πλοίου
  chosen: the ship’s
  alternatives:
  - of the ship
  lexicon: BDAG
  rationale: The genitive is naturally rendered as an English possessive here.
- source_word: ἔρριψαν
  chosen: they threw ... overboard
  alternatives:
  - they threw out
  - they cast out
  lexicon: BDAG
  rationale: The verb means 'throw' or 'cast.' In context, the direction is from the
    ship into the sea, so 'overboard' rightly makes explicit what is contextually
    inherent and is standard idiomatic English in a maritime narrative.
