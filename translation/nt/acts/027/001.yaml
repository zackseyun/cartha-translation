id: ACT.27.1
reference: Acts 27:1
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐκρίθη τοῦ ἀποπλεῖν ἡμᾶς εἰς τὴν Ἰταλίαν, παρεδίδουν τόν τε Παῦλον καί
    τινας ἑτέρους δεσμώτας ἑκατοντάρχῃ ὀνόματι Ἰουλίῳ σπείρης Σεβαστῆς.
translation:
  text: Now when it was decided that we should sail for Italy, they handed over both
    Paul and some other prisoners to a centurion named Julius, of the Imperial Cohort.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of the Augustan Cohort”; possibly “of the Sebaste cohort.” The Greek
      Σεβαστῆς reflects a title associated with Augustus/the emperor, but the exact
      historical unit is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκρίθη
  chosen: it was decided
  alternatives:
  - it was determined
  - it was resolved
  lexicon: BDAG
  rationale: Aorist passive of κρίνω here functions impersonally for an official decision.
    'It was decided' is natural modern English and preserves the passive/administrative
    sense without overformal stiffness.
- source_word: τοῦ ἀποπλεῖν ἡμᾶς
  chosen: that we should sail
  alternatives:
  - for us to set sail
  - that we should depart by sea
  lexicon: BDAG
  rationale: The articular infinitive with genitive expresses the content of the decision.
    'Sail' captures the maritime specificity of ἀποπλεῖν better than the more general
    'depart.' Retaining 'we' reflects Luke's first-person narration.
- source_word: παρεδίδουν
  chosen: they handed over
  alternatives:
  - they delivered
  - they transferred
  lexicon: BDAG
  rationale: Imperfect active portrays the action in narrative sequence; English simple
    past is idiomatic here. 'Handed over' conveys formal transfer of custody more
    clearly than 'delivered' in contemporary English.
- source_word: τόν τε Παῦλον καί τινας ἑτέρους δεσμώτας
  chosen: both Paul and some other prisoners
  alternatives:
  - Paul and certain other prisoners
  - Paul as well as some other prisoners
  lexicon: BDAG
  rationale: The τε...καί pairing is well represented by 'both...and.' δεσμώτας means
    prisoners/detainees; 'prisoners' is the clearest standard rendering.
- source_word: ἑκατοντάρχῃ
  chosen: to a centurion
  alternatives:
  - to the centurion
  lexicon: BDAG
  rationale: The dative marks the recipient of the transfer. Since the centurion is
    introduced here rather than previously identified, the indefinite English article
    is appropriate.
- source_word: ὀνόματι Ἰουλίῳ
  chosen: named Julius
  alternatives:
  - by the name Julius
  lexicon: BDAG
  rationale: This is the natural English equivalent of the naming formula and preserves
    the introduction of the personal name.
- source_word: σπείρης Σεβαστῆς
  chosen: of the Imperial Cohort
  alternatives:
  - of the Augustan Cohort
  - of the Sebaste cohort
  lexicon: BDAG
  rationale: Σεβαστῆς is the Greek equivalent of 'Augustan/Augustanus,' but in English
    'Imperial' best communicates the sense to modern readers. Because the exact historical
    designation is debated, the more literal alternatives are preserved in a footnote.
