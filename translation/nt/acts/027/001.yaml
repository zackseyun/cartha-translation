theological_decisions:
- issue: Rendering of σπείρης Σεβαστῆς, a historically debated military designation
    rather than a theological term
  chosen_reading: of the Imperial Cohort
  alternative_readings:
  - of the Augustan Cohort
  - of the Sebaste cohort
  rationale: This is not doctrinally weighty, but it is a significant interpretive
    choice. 'Imperial Cohort' communicates the likely sense of a unit associated with
    the emperor while remaining readable. More formally literal renderings are preserved
    in a footnote because the exact referent is uncertain.
  doctrine_reference: Translation philosophy §1, §6
