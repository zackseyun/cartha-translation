id: ACT.27.41
reference: Acts 27:41
source:
  edition: SBLGNT
  text: περιπεσόντες δὲ εἰς τόπον διθάλασσον ⸀ἐπέκειλαν τὴν ναῦν, καὶ ἡ μὲν πρῷρα
    ἐρείσασα ἔμεινεν ἀσάλευτος, ἡ δὲ πρύμνα ἐλύετο ὑπὸ τῆς ⸀βίας.
translation:
  text: But falling into a place where two seas met, they ran the ship aground; and
    the bow, having stuck fast, remained immovable, but the stern was being broken
    up by the force of the waves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a place between two seas.' The Greek expression is rare and may refer
      to a channel, sandbar, or meeting point of two bodies or currents of water.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιπεσόντες
  chosen: falling into
  alternatives:
  - running into
  - striking
  lexicon: BDAG
  rationale: Aorist participle of περιπίπτω here introduces the circumstance of the
    ship's encounter with the location. 'Falling into' is a natural English equivalent
    that preserves the sudden, adverse sense without overinterpreting the nautical
    action.
- source_word: τόπον διθάλασσον
  chosen: a place where two seas met
  alternatives:
  - a place between two seas
  - a sandbar between two currents
  - a place washed by two seas
  lexicon: BDAG
  rationale: διθάλασσος is rare and denotes something related to two seas or two bodies/currents
    of water. 'A place where two seas met' preserves the literal imagery while remaining
    intelligible. More specific renderings like 'sandbar' are interpretive and not
    explicit in the Greek, though the context may imply such a feature.
- source_word: ἐπέκειλαν τὴν ναῦν
  chosen: they ran the ship aground
  alternatives:
  - they beached the ship
  - they drove the ship onto shore
  lexicon: BDAG
  rationale: ἐπικέλλω is a nautical term for running a vessel aground or beaching
    it. 'Ran the ship aground' is idiomatic modern English and accurately reflects
    the action.
- source_word: πρῷρα
  chosen: the bow
  alternatives:
  - the prow
  - the front of the ship
  lexicon: BDAG
  rationale: Standard nautical term for the front of the ship. 'Bow' is more common
    in modern English than 'prow' while remaining precise.
- source_word: ἐρείσασα
  chosen: having stuck fast
  alternatives:
  - having lodged firmly
  - having grounded itself
  - having been fixed
  lexicon: BDAG
  rationale: From ἐρείδω, 'to fix, set firmly, press against.' In context the bow
    has become firmly embedded after grounding. 'Having stuck fast' conveys the resultant
    condition clearly in natural English.
- source_word: ἔμεινεν ἀσάλευτος
  chosen: remained immovable
  alternatives:
  - stayed unshaken
  - remained fixed
  lexicon: BDAG
  rationale: The combination expresses that the bow stayed in place and could not
    be moved. 'Immovable' is concise and fits the physical scene.
- source_word: πρύμνα
  chosen: the stern
  alternatives:
  - the rear of the ship
  lexicon: BDAG
  rationale: Standard nautical term for the back of the ship.
- source_word: ἐλύετο
  chosen: was being broken up
  alternatives:
  - was being torn apart
  - was coming apart
  - was being destroyed
  lexicon: BDAG
  rationale: Imperfect passive of λύω here describes the stern progressively coming
    apart under repeated impact. 'Was being broken up' captures the ongoing process
    and physical disintegration.
- source_word: ὑπὸ τῆς βίας
  chosen: by the force of the waves
  alternatives:
  - by the force
  - by the violence
  lexicon: BDAG
  rationale: βία means force or violence. In this maritime context, the force is that
    of the sea/waves. Supplying 'of the waves' makes the implicit agent explicit for
    English clarity without materially altering the sense.
