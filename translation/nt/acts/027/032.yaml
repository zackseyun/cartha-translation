id: ACT.27.32
reference: Acts 27:32
source:
  edition: SBLGNT
  text: τότε ⸂ἀπέκοψαν οἱ στρατιῶται⸃ τὰ σχοινία τῆς σκάφης καὶ εἴασαν αὐτὴν ἐκπεσεῖν.
translation:
  text: Then the soldiers cut away the ropes of the skiff and let it fall away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''boat'' or ''ship''s boat'' for ''skiff'' (Greek: skaphē), referring
      to the smaller vessel attached to the ship.'
    reason: lexical_alternative
  - marker: b
    text: The verb can also be understood in context as 'drift away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal-sequential adverb marking the next action in the narrative.
    'Then' is the most natural concise English equivalent.
- source_word: ἀπέκοψαν
  chosen: cut away
  alternatives:
  - cut off
  - cut loose
  lexicon: BDAG
  rationale: Aorist active indicative of ἀποκόπτω, meaning to cut off/sever. 'Cut
    away' fits the object 'ropes' idiomatically in English while preserving the physical
    act of severing.
- source_word: οἱ στρατιῶται
  chosen: the soldiers
  alternatives:
  - the troops
  lexicon: BDAG
  rationale: Straightforward rendering of the nominative subject; 'soldiers' is the
    normal and precise English equivalent.
- source_word: τὰ σχοινία
  chosen: the ropes
  alternatives:
  - the lines
  - the cords
  lexicon: BDAG
  rationale: σχοινία refers to ropes/cordage. 'Ropes' is the clearest modern English
    term in this maritime context.
- source_word: τῆς σκάφης
  chosen: of the skiff
  alternatives:
  - of the boat
  - of the ship's boat
  lexicon: BDAG
  rationale: σκάφη here denotes the smaller boat attached to the ship, not the main
    vessel. 'Skiff' preserves the distinction from the larger ship, though 'boat'
    is a viable alternative.
- source_word: εἴασαν
  chosen: let
  alternatives:
  - allowed
  - left
  lexicon: BDAG
  rationale: Aorist active indicative of ἐάω, 'to allow/let.' 'Let' is concise and
    idiomatic with the infinitive construction that follows.
- source_word: αὐτὴν
  chosen: it
  alternatives:
  - the skiff
  lexicon: BDAG
  rationale: Feminine singular pronoun referring back to σκάφη. English naturally
    uses the neuter pronoun 'it' for the vessel in this context.
- source_word: ἐκπεσεῖν
  chosen: fall away
  alternatives:
  - drift away
  - drop away
  lexicon: BDAG
  rationale: Infinitive of ἐκπίπτω, literally to fall out/off, and in nautical contexts
    to be driven or drift away. 'Fall away' preserves the verbal imagery and avoids
    over-specifying beyond the Greek, while still fitting the context of the detached
    boat.
