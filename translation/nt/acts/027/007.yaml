id: ACT.27.7
reference: Acts 27:7
source:
  edition: SBLGNT
  text: ἐν ἱκαναῖς δὲ ἡμέραις βραδυπλοοῦντες καὶ μόλις γενόμενοι κατὰ τὴν Κνίδον,
    μὴ προσεῶντος ἡμᾶς τοῦ ἀνέμου, ὑπεπλεύσαμεν τὴν Κρήτην κατὰ Σαλμώνην,
translation:
  text: For many days we were sailing slowly, and with difficulty we came opposite
    Cnidus. Since the wind did not allow us to go farther, we sailed under the lee
    of Crete, off Salmone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wind did not permit us' or 'the wind did not allow us to approach.'
      The Greek expression is a genitive absolute explaining why they changed course.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'we sailed under Crete'—that is, under the shelter of the island,
      on its leeward side.
    reason: cultural_note
lexical_decisions:
- source_word: ἐν ἱκαναῖς δὲ ἡμέραις
  chosen: For many days
  alternatives:
  - In many days
  - Over many days
  lexicon: BDAG
  rationale: The idiom ἐν + dative of time here indicates duration over a span, not
    simple location in time. 'For many days' is natural English and preserves the
    sense of prolonged delay.
- source_word: βραδυπλοοῦντες
  chosen: we were sailing slowly
  alternatives:
  - making slow progress
  - sailing with difficulty
  lexicon: BDAG
  rationale: The participle denotes slow sailing/progress by ship. 'We were sailing
    slowly' keeps the maritime image and fits the narrative flow. 'With difficulty'
    is reserved for μόλις in the next phrase to avoid collapsing two distinct expressions.
- source_word: μόλις γενόμενοι κατὰ τὴν Κνίδον
  chosen: with difficulty we came opposite Cnidus
  alternatives:
  - we scarcely arrived off Cnidus
  - we barely reached the vicinity of Cnidus
  lexicon: BDAG
  rationale: μόλις conveys difficulty/scarcely; γενόμενοι with κατά + accusative in
    nautical context indicates coming to or opposite a location. 'Came opposite Cnidus'
    is a clear rendering that preserves the geographic sense without over-paraphrase.
- source_word: μὴ προσεῶντος ἡμᾶς τοῦ ἀνέμου
  chosen: Since the wind did not allow us to go farther
  alternatives:
  - because the wind did not permit us
  - the wind not permitting us to proceed
  lexicon: BDAG
  rationale: This genitive absolute gives the reason for the route change. προσεάω
    here has the sense of allowing approach/progress. 'To go farther' makes explicit
    the implied movement constraint in idiomatic English while staying within the
    context.
- source_word: ὑπεπλεύσαμεν
  chosen: we sailed under the lee of
  alternatives:
  - we sailed below
  - we sailed along the sheltered side of
  lexicon: BDAG
  rationale: In nautical usage ὑποπλέω means to sail under the shelter of the leeward
    side of an island/coast. 'Under the lee of' is the most precise concise English
    maritime equivalent.
- source_word: κατὰ Σαλμώνην
  chosen: off Salmone
  alternatives:
  - past Salmone
  - along Salmone
  lexicon: BDAG
  rationale: κατά with a coastal landmark in this context indicates position along/off
    that point. 'Off Salmone' is idiomatic nautical English and matches the route
    description.
- source_word: Κνίδον / Κρήτην / Σαλμώνην
  chosen: Cnidus / Crete / Salmone
  rationale: Personal and place names are transliterated by standard English conventions
    per project philosophy.
