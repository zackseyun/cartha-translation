id: ACT.27.22
reference: Acts 27:22
source:
  edition: SBLGNT
  text: καὶ τὰ νῦν παραινῶ ὑμᾶς εὐθυμεῖν, ἀποβολὴ γὰρ ψυχῆς οὐδεμία ἔσται ἐξ ὑμῶν
    πλὴν τοῦ πλοίου·
translation:
  text: And now I urge you to take courage, for there will be no loss of life among
    you, except for the ship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'be of good cheer' or 'keep up your courage.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'no loss of life'; ψυχή here refers to physical life, not specifically
      to the soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ νῦν
  chosen: now
  alternatives:
  - as things now stand
  - for the present
  lexicon: BDAG
  rationale: Idiomatic temporal expression introducing Paul's present exhortation.
    'Now' is concise modern English; the article with νῦν functions adverbially rather
    than needing a wooden rendering.
- source_word: παραινῶ
  chosen: I urge
  alternatives:
  - I advise
  - I encourage
  lexicon: BDAG
  rationale: παραινέω conveys exhortation/advice. 'I urge' best captures the forceful
    pastoral appeal in context without sounding overly formal.
- source_word: εὐθυμεῖν
  chosen: to take courage
  alternatives:
  - to be of good cheer
  - to be encouraged
  - to keep up your courage
  lexicon: BDAG
  rationale: The verb denotes being in good spirits or having courage. In a storm-at-sea
    context, 'to take courage' communicates the intended sense in natural modern English
    better than the archaic 'be of good cheer.'
- source_word: ἀποβολὴ
  chosen: loss
  alternatives:
  - destruction
  - casting away
  lexicon: BDAG
  rationale: ἀποβολή here refers to loss rather than literal throwing away. 'Loss'
    fits the predicate construction and the maritime danger context.
- source_word: ψυχῆς
  chosen: life
  alternatives:
  - soul
  - person
  lexicon: BDAG
  rationale: In this context ψυχή refers to physical life, not the immaterial soul.
    'No loss of life' is the clearest idiomatic English equivalent and avoids importing
    a soul/body distinction not intended by the text.
- source_word: οὐδεμία ἔσται
  chosen: there will be no
  alternatives:
  - none will be
  - not one will occur
  lexicon: BDAG
  rationale: Natural English rendering of the future existential statement, preserving
    the emphatic negation.
- source_word: ἐξ ὑμῶν
  chosen: among you
  alternatives:
  - from you
  - of you
  lexicon: BDAG
  rationale: The preposition marks the group from which no life will be lost. 'Among
    you' is idiomatic and contextually clear.
- source_word: πλὴν τοῦ πλοίου
  chosen: except for the ship
  alternatives:
  - except the ship
  - but only of the ship
  lexicon: BDAG
  rationale: πλήν marks an exception. The sense is that the ship will be lost though
    the people will survive. 'Except for the ship' makes the contrast explicit in
    natural English.
