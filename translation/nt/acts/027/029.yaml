id: ACT.27.29
reference: Acts 27:29
source:
  edition: SBLGNT
  text: φοβούμενοί τε ⸂μή που κατὰ⸃ τραχεῖς τόπους ἐκπέσωμεν ἐκ πρύμνης ῥίψαντες ἀγκύρας
    τέσσαρας ηὔχοντο ἡμέραν γενέσθαι.
translation:
  text: And fearing that we might run aground on rocky places, they dropped four anchors
    from the stern and prayed for day to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that we might be driven onto jagged rocks' or 'run aground on rough
      places.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'prayed for day to become'; that is, they longed for daylight
      to arrive.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβούμενοί
  chosen: fearing
  alternatives:
  - being afraid
  - afraid
  lexicon: BDAG
  rationale: A participial form introducing the circumstance/motivation for the following
    actions. 'Fearing' preserves the participial linkage and narrative flow better
    than a finite clause.
- source_word: μή που κατὰ τραχεῖς τόπους ἐκπέσωμεν
  chosen: that we might run aground on rocky places
  alternatives:
  - lest we should fall upon rough places
  - that we might be driven onto jagged rocks
  lexicon: BDAG
  rationale: The idiom expresses apprehension about the ship striking hazardous terrain.
    'Run aground' is idiomatic nautical English for ἐκπίπτω in this context. τραχεῖς
    τόπους is rendered 'rocky places' to communicate dangerous rough coastal/reef
    areas without over-specifying beyond the Greek.
- source_word: ἐκπέσωμεν
  chosen: run aground
  alternatives:
  - fall upon
  - be driven aground
  lexicon: BDAG
  rationale: In maritime context the verb refers to a ship being driven onto land,
    reefs, or shoals. 'Run aground' is the clearest modern equivalent.
- source_word: ἐκ πρύμνης
  chosen: from the stern
  alternatives:
  - from the rear of the ship
  lexicon: BDAG
  rationale: πρύμνα is the stern of a ship. 'Stern' is precise and natural English
    nautical terminology.
- source_word: ῥίψαντες ἀγκύρας τέσσαρας
  chosen: they dropped four anchors
  alternatives:
  - having cast four anchors
  - throwing out four anchors
  lexicon: BDAG
  rationale: The aorist participle denotes action preceding the main verb. 'Dropped
    four anchors' is natural English for casting anchors from a ship, while preserving
    the concrete action.
- source_word: ηὔχοντο
  chosen: prayed
  alternatives:
  - were praying
  - wished
  lexicon: BDAG
  rationale: In this context εὔχομαι most naturally means prayer rather than mere
    wish. The imperfect conveys ongoing or repeated action, but simple past 'prayed'
    is acceptable in smooth English narrative; the object clause supplies the content.
- source_word: ἡμέραν γενέσθαι
  chosen: for day to come
  alternatives:
  - for daylight to come
  - for it to become day
  lexicon: BDAG
  rationale: The infinitival phrase means the coming of day/daylight. 'For day to
    come' is concise and natural; 'daylight' is a viable alternative and is preserved
    in a footnote.
