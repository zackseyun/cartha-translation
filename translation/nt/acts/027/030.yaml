id: ACT.27.30
reference: Acts 27:30
source:
  edition: SBLGNT
  text: τῶν δὲ ναυτῶν ζητούντων φυγεῖν ἐκ τοῦ πλοίου καὶ χαλασάντων τὴν σκάφην εἰς
    τὴν θάλασσαν προφάσει ὡς ἐκ πρῴρης ⸂ἀγκύρας μελλόντων⸃ ἐκτείνειν,
translation:
  text: And when the sailors were seeking to escape from the ship and had lowered
    the skiff into the sea under the pretense of being about to lay out anchors from
    the bow,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had lowered the boat.' The Greek skaphē refers to the ship's small boat.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the prow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ναυτῶν
  chosen: the sailors
  alternatives:
  - the seamen
  lexicon: BDAG
  rationale: Standard, natural rendering for the ship's crew; 'sailors' is clear modern
    English.
- source_word: ζητούντων φυγεῖν
  chosen: were seeking to escape
  alternatives:
  - were trying to flee
  - were attempting to get away
  lexicon: BDAG
  rationale: ζητέω with infinitive conveys attempt/purpose; 'escape' fits the context
    of abandoning ship more idiomatically than the more literal 'flee.'
- source_word: ἐκ τοῦ πλοίου
  chosen: from the ship
  alternatives:
  - out of the ship
  lexicon: BDAG
  rationale: Natural English prepositional rendering; no nuance is lost.
- source_word: χαλασάντων τὴν σκάφην
  chosen: had lowered the skiff
  alternatives:
  - had let down the boat
  - had lowered the lifeboat
  lexicon: BDAG
  rationale: σκάφη here refers to the ship's small boat/tender. 'Skiff' is concise
    and maritime, while avoiding overinterpretation; 'lifeboat' is possible contextually
    but slightly more interpretive.
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - into the water
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the phrase.
- source_word: προφάσει
  chosen: under the pretense
  alternatives:
  - as a pretext
  - with a pretense
  lexicon: BDAG
  rationale: πρόφασις here denotes a false outward reason masking true intent; 'under
    the pretense' is idiomatic and clear.
- source_word: ὡς
  chosen: of being about to
  alternatives:
  - as though they were about to
  - pretending that they were going to
  lexicon: BDAG
  rationale: Here ὡς introduces the claimed intention accompanying the pretense. 'Of
    being about to' fits smoothly after 'under the pretense.'
- source_word: ἐκ πρῴρης
  chosen: from the bow
  alternatives:
  - from the prow
  lexicon: BDAG
  rationale: Both are accurate; 'bow' is more widely understood in modern English
    while preserving nautical specificity.
- source_word: ἀγκύρας
  chosen: anchors
  lexicon: BDAG
  rationale: Straightforward plural rendering.
- source_word: μελλόντων ἐκτείνειν
  chosen: being about to lay out
  alternatives:
  - intending to extend
  - about to let down
  - planning to set out
  lexicon: BDAG
  rationale: μέλλω conveys imminence/intention; ἐκτείνω in this nautical context refers
    to putting out or laying out anchors. 'Lay out' is idiomatic maritime English
    and fits the context better than the overly literal 'extend.'
