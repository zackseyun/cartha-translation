id: ACT.27.24
reference: Acts 27:24
source:
  edition: SBLGNT
  text: λέγων· Μὴ φοβοῦ, Παῦλε· Καίσαρί σε δεῖ παραστῆναι, καὶ ἰδοὺ κεχάρισταί σοι
    ὁ θεὸς πάντας τοὺς πλέοντας μετὰ σοῦ.
translation:
  text: saying, ‘Do not be afraid, Paul. You must stand before Caesar, and look, God
    has granted to you all those sailing with you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fear, Paul.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God has graciously given you all those sailing with you,' highlighting
      the favor implied in the verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: Imperative of φοβέομαι with μή is a prohibition/encouragement. 'Do not
    be afraid' is natural modern English and preserves the force without archaic stiffness.
- source_word: Καίσαρί
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: Καῖσαρ here is the imperial title/name used in Acts for the Roman ruler.
    'Caesar' preserves the historical and legal setting more directly than the interpretive
    'the emperor.'
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary for you to
  - you are destined to
  lexicon: BDAG
  rationale: δεῖ expresses necessity, often with divine implication in Luke-Acts.
    'Must' is concise and preserves both necessity and the likely sense of divine
    purpose without overexplaining.
- source_word: παραστῆναι
  chosen: stand before
  alternatives:
  - appear before
  - present yourself before
  lexicon: BDAG
  rationale: In judicial/governmental context, παραστῆναι means to appear or stand
    before an authority. 'Stand before' is idiomatic, vivid, and close to the Greek.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' preserves the immediacy
    in readable modern English; 'behold' is too archaic for the stated philosophy.
- source_word: κεχάρισταί
  chosen: has granted
  alternatives:
  - has graciously given
  - has given
  lexicon: BDAG
  rationale: Perfect middle of χαρίζομαι conveys giving/granting as a favor or act
    of grace. 'Has granted' fits the context of God sparing lives in response to Paul
    and preserves the benefactive nuance without becoming overly interpretive.
- source_word: σοι
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: The dative is retained explicitly as 'to you' to reflect that the grant
    is made to Paul, namely the lives of those with him.
- source_word: πάντας τοὺς πλέοντας μετὰ σοῦ
  chosen: all those sailing with you
  alternatives:
  - everyone sailing with you
  - all who are traveling by ship with you
  lexicon: BDAG
  rationale: The present participle πλέοντας specifically refers to traveling by sea,
    not generic travel. 'All those sailing with you' preserves that maritime specificity
    and the collective scope of πάντας.
