theological_decisions:
- issue: Implication of divine necessity in δεῖ
  chosen_reading: Rendered as 'must' without making the divine source of necessity
    explicit in the main text.
  alternative_readings:
  - '''it is necessary for you to stand before Caesar'''
  - '''you are destined to stand before Caesar'''
  rationale: In Luke-Acts, δεῖ often signals divine necessity, but the verse itself
    does not overtly state that nuance beyond the angelic message. 'Must' preserves
    the theological weight while avoiding interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
