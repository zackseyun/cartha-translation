id: ACT.27.42
reference: Acts 27:42
source:
  edition: SBLGNT
  text: τῶν δὲ στρατιωτῶν βουλὴ ἐγένετο ἵνα τοὺς δεσμώτας ἀποκτείνωσιν, μή τις ἐκκολυμβήσας
    διαφύγῃ·
translation:
  text: Now the soldiers’ plan was to kill the prisoners, so that no one might swim
    away and escape.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βουλὴ ἐγένετο
  chosen: the soldiers’ plan was
  alternatives:
  - the soldiers formed a plan
  - the soldiers decided
  - the intention of the soldiers came to be
  lexicon: BDAG
  rationale: The construction literally means 'a plan came to be' or 'there came to
    be a plan.' In natural English, 'the soldiers’ plan was' preserves the sense without
    awkwardness. 'Plan' better reflects βουλή here than 'decision' because the clause
    that follows states the intended action.
- source_word: στρατιωτῶν
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: The standard and contextually appropriate rendering is 'soldiers,' referring
    to the military personnel aboard the ship.
- source_word: δεσμώτας
  chosen: prisoners
  alternatives:
  - captives
  lexicon: BDAG
  rationale: In Acts 27 the referents are persons under custody during transport,
    so 'prisoners' is the clearest and most idiomatic rendering.
- source_word: ἀποκτείνωσιν
  chosen: kill
  alternatives:
  - put to death
  - slay
  lexicon: BDAG
  rationale: '''Kill'' is the plain, direct sense and fits readable modern English.
    ''Put to death'' could imply formal execution, which is not explicit here.'
- source_word: μή τις
  chosen: so that no one might
  alternatives:
  - lest anyone
  - for fear that someone might
  lexicon: BDAG
  rationale: This negative purpose construction is best rendered with a natural English
    purpose clause. 'Lest' is accurate but less natural for contemporary readers.
- source_word: ἐκκολυμβήσας
  chosen: swim away
  alternatives:
  - swim out
  - swim off
  lexicon: BDAG
  rationale: The participle denotes swimming away from the wreck/ship toward safety.
    'Swim away' captures the directional force of ἐκ- in idiomatic English.
- source_word: διαφύγῃ
  chosen: escape
  alternatives:
  - get away
  lexicon: BDAG
  rationale: 'A standard rendering that fits the custodial context: the concern is
    that a prisoner might evade custody.'
