theological_decisions:
- issue: Rendering πιστεύω τῷ θεῷ
  chosen_reading: I believe God
  alternative_readings:
  - I trust God
  - I have faith in God
  rationale: The dative construction most directly means believing God, i.e., taking
    God at his word. 'I believe God' preserves the personal and propositional force
    without importing a broader doctrinal nuance beyond the text.
  doctrine_reference: Translation philosophy §1, §3
