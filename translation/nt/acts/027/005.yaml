id: ACT.27.5
reference: Acts 27:5
source:
  edition: SBLGNT
  text: τό τε πέλαγος τὸ κατὰ τὴν Κιλικίαν καὶ Παμφυλίαν διαπλεύσαντες κατήλθομεν
    εἰς Μύρα τῆς Λυκίας.
translation:
  text: After sailing across the open sea along Cilicia and Pamphylia, we came down
    to Myra in Lycia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'off Cilicia and Pamphylia,' indicating a course along the coast of those
      regions.
    reason: lexical_alternative
  - marker: b
    text: Or 'arrived at Myra in Lycia.' The Greek verb literally means 'came down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέλαγος
  chosen: the open sea
  alternatives:
  - the sea
  - the deep
  lexicon: BDAG
  rationale: πέλαγος commonly denotes the open sea rather than sea in a generic sense.
    Rendering it as 'open sea' preserves the maritime specificity without sounding
    unnatural in English.
- source_word: τὸ κατὰ τὴν Κιλικίαν καὶ Παμφυλίαν
  chosen: along Cilicia and Pamphylia
  alternatives:
  - off Cilicia and Pamphylia
  - by way of Cilicia and Pamphylia
  lexicon: BDAG
  rationale: κατά with the accusative in this geographic expression indicates movement
    along or off a coastal region. 'Along Cilicia and Pamphylia' communicates the
    route adjacent to those regions in natural English.
- source_word: διαπλεύσαντες
  chosen: after sailing across
  alternatives:
  - having sailed across
  - crossing
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb and describes completed
    travel before arrival. 'After sailing across' gives clear temporal sequence in
    idiomatic English while preserving the participial force.
- source_word: κατήλθομεν
  chosen: we came down
  alternatives:
  - we arrived
  - we went down
  lexicon: BDAG
  rationale: κατέρχομαι literally means 'go/come down.' In travel narratives it can
    function as a conventional movement verb for arriving at a place, but retaining
    'came down' preserves Luke's directional wording while remaining understandable.
- source_word: Μύρα τῆς Λυκίας
  chosen: Myra in Lycia
  alternatives:
  - Myra of Lycia
  lexicon: BDAG
  rationale: The genitive identifies the regional location of Myra. English idiom
    prefers 'in Lycia' for clarity.
- source_word: τε
  chosen: and (implicit connective)
  alternatives:
  - also
  - both
  lexicon: BDAG
  rationale: τε lightly connects this clause with the preceding narrative. English
    normally does not require an explicit equivalent here, so its connective force
    is absorbed into the sentence flow.
