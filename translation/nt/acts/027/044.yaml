id: ACT.27.44
reference: Acts 27:44
source:
  edition: SBLGNT
  text: καὶ τοὺς λοιποὺς οὓς μὲν ἐπὶ σανίσιν οὓς δὲ ἐπί τινων τῶν ἀπὸ τοῦ πλοίου·
    καὶ οὕτως ἐγένετο πάντας διασωθῆναι ἐπὶ τὴν γῆν.
translation:
  text: and the rest, some on planks and some on pieces from the ship. And so it happened
    that all were brought safely to land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all were saved to land' / 'all escaped safely to shore.' The Greek verb
      here refers to physical deliverance through the shipwreck.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς λοιποὺς
  chosen: the rest
  alternatives:
  - the others
  - the remainder
  lexicon: BDAG
  rationale: λοιπός here refers to the remaining people not already specified in the
    previous verse. 'The rest' is natural English and preserves the sense of the remaining
    group.
- source_word: οὓς μὲν ... οὓς δὲ
  chosen: some ... and some
  alternatives:
  - some ... others
  - some indeed ... others
  lexicon: BDAG
  rationale: The correlative construction divides the remaining people into two groups.
    'Some ... and some' is idiomatic and reflects the Greek contrast without woodenly
    reproducing μέν/δέ.
- source_word: ἐπὶ σανίσιν
  chosen: on planks
  alternatives:
  - on boards
  lexicon: BDAG
  rationale: σανίς denotes a board or plank. 'Planks' fits a shipwreck context well
    and is vivid, while remaining accurate.
- source_word: ἐπί τινων τῶν ἀπὸ τοῦ πλοίου
  chosen: on pieces from the ship
  alternatives:
  - on some things from the ship
  - on fragments of the ship
  lexicon: BDAG
  rationale: The indefinite τινων with the partitive phrase indicates miscellaneous
    objects from the ship. 'Pieces from the ship' is clear modern English and avoids
    over-specifying beyond the Greek.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: οὕτως summarizes the manner just described. 'So' is concise and natural
    in English; the following clause explains the result.
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came about
  - it turned out
  lexicon: BDAG
  rationale: γίνομαι in this idiom introduces the outcome. 'It happened' is a straightforward
    rendering that preserves the narrative style.
- source_word: πάντας διασωθῆναι
  chosen: all were brought safely
  alternatives:
  - all were saved
  - all escaped safely
  lexicon: BDAG
  rationale: διασῴζω here refers to being brought safely through danger, specifically
    surviving the shipwreck. 'Were brought safely' avoids importing soteriological
    overtones that 'saved' may carry in English, while preserving the passive/resultative
    sense.
- source_word: ἐπὶ τὴν γῆν
  chosen: to land
  alternatives:
  - onto the land
  - to shore
  lexicon: BDAG
  rationale: In this maritime context, γῆ means land as opposed to sea. 'To land'
    is idiomatic and contextually precise.
