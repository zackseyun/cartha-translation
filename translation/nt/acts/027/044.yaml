theological_decisions:
- issue: Potential theological overtones of διασωθῆναι
  chosen_reading: 'Rendered in a physical-deliverance sense: ''were brought safely
    to land'''
  alternative_readings:
  - were saved to land
  - escaped safely to shore
  rationale: The context is a shipwreck narrative, so the verb denotes physical rescue
    rather than spiritual salvation. The English wording avoids unnecessary theological
    ambiguity while remaining faithful to the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    meaning without importing doctrinal claims the text does not make.'
