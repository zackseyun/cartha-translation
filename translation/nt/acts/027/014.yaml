id: ACT.27.14
reference: Acts 27:14
source:
  edition: SBLGNT
  text: μετ’ οὐ πολὺ δὲ ἔβαλεν κατ’ αὐτῆς ἄνεμος τυφωνικὸς ὁ καλούμενος ⸀Εὐρακύλων·
translation:
  text: But not long after, a typhoon-like wind called Euraquilo rushed down against
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Euroclydon' instead of 'Euraquilo.'
    reason: textual_variant
  - marker: b
    text: Or 'a violent northeaster'; the name likely refers to a storm wind from
      the northeast, but the Greek text presents it as a proper name.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετ’ οὐ πολὺ
  chosen: not long after
  alternatives:
  - soon after
  - after no long time
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning a short time later. 'Not long after'
    is natural modern English and preserves the sense without wooden literalism.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks development in the narrative with mild contrast or transition.
    'But' fits the sudden adverse turn in events.
- source_word: ἔβαλεν
  chosen: rushed down
  alternatives:
  - struck
  - blew
  - burst forth
  lexicon: BDAG
  rationale: Literally 'threw/cast,' but with wind as subject and κατά + genitive
    the sense is that the wind came violently down upon the ship/island area. 'Rushed
    down' captures the sudden, forceful onset better than the overly generic 'blew.'
- source_word: κατ’ αὐτῆς
  chosen: against it
  alternatives:
  - down from it
  - against her
  lexicon: BDAG
  rationale: The feminine pronoun most naturally refers to the island/ship context;
    in English, 'it' is the clearest non-personified rendering. 'Against it' reflects
    hostile motion directed upon the referent.
- source_word: ἄνεμος
  chosen: wind
  alternatives:
  - gale
  lexicon: BDAG
  rationale: Basic lexical sense is 'wind.' The modifying adjective carries the storm
    intensity, so 'wind' should remain the head term.
- source_word: τυφωνικὸς
  chosen: typhoon-like
  alternatives:
  - hurricane-force
  - violent storm wind
  - tempestuous
  lexicon: BDAG
  rationale: Derived from τύφων and denotes a violent, whirlwind-like storm wind.
    'Typhoon-like' preserves the lexical connection and vividness without over-specifying
    modern meteorological categories.
- source_word: ὁ καλούμενος
  chosen: called
  alternatives:
  - known as
  - named
  lexicon: BDAG
  rationale: Standard participial formula introducing a name/designation. 'Called'
    is concise and natural.
- source_word: Εὐρακύλων
  chosen: Euraquilo
  alternatives:
  - Euroclydon
  - Northeaster
  lexicon: BDAG
  rationale: Per translation philosophy, names are transliterated rather than translated.
    'Euraquilo' reflects the proper-name form in the Greek text. Traditional 'Euroclydon'
    reflects a different textual form, and 'Northeaster' is interpretive rather than
    transliterative.
