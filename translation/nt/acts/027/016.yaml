id: ACT.27.16
reference: Acts 27:16
source:
  edition: SBLGNT
  text: νησίον δέ τι ὑποδραμόντες καλούμενον ⸀Καῦδα ⸂ἰσχύσαμεν μόλις⸃ περικρατεῖς
    γενέσθαι τῆς σκάφης,
translation:
  text: But after running under the shelter of a small island called Cauda, we were
    barely able to secure the ship’s boat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after passing under the lee of a small island called Cauda.' The Greek
      uses nautical language for moving into the island’s shelter from the wind.
    reason: lexical_alternative
lexical_decisions:
- source_word: νησίον ... τι
  chosen: a small island
  alternatives:
  - a certain island
  - an islet
  lexicon: BDAG
  rationale: νησίον is the diminutive form, naturally suggesting 'small island' or
    'islet.' English 'a small island' is more natural and readable than 'a certain
    island' while preserving the diminutive sense.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild narrative transition/contrast. 'But' fits the flow here
    as the narrative shifts to a temporary measure of relief after the storm.
- source_word: ὑποδραμόντες
  chosen: after running under the shelter of
  alternatives:
  - after passing under the lee of
  - after running under
  lexicon: BDAG
  rationale: In nautical context, ὑποτρέχω means to run under the lee/shelter of something.
    'Under the shelter of' makes the maritime sense clear to modern readers without
    excessive technicality.
- source_word: καλούμενον Καῦδα
  chosen: called Cauda
  alternatives:
  - named Cauda
  lexicon: BDAG
  rationale: A straightforward participial expression identifying the island by name.
    'Cauda' follows standard transliteration of the place name in this textual tradition.
- source_word: ἰσχύσαμεν μόλις
  chosen: we were barely able
  alternatives:
  - we scarcely had strength
  - we managed only with difficulty
  lexicon: BDAG
  rationale: The idiom expresses difficulty in accomplishing what follows. 'We were
    barely able' is idiomatic English and preserves the sense of near inability.
- source_word: περικρατεῖς γενέσθαι
  chosen: to secure
  alternatives:
  - to gain control of
  - to get hold of
  lexicon: BDAG
  rationale: The phrase means to become master of or gain control over something.
    In this nautical setting, 'to secure' best conveys taking hold of and stabilizing
    the small boat.
- source_word: τῆς σκάφης
  chosen: the ship’s boat
  alternatives:
  - the skiff
  - the dinghy
  - the boat
  lexicon: BDAG
  rationale: σκάφη here refers to the smaller boat associated with the ship, likely
    being towed. 'The ship’s boat' is clear and slightly more precise than simply
    'the boat,' while avoiding overly colloquial or overly technical choices.
