id: ACT.27.26
reference: Acts 27:26
source:
  edition: SBLGNT
  text: εἰς νῆσον δέ τινα δεῖ ἡμᾶς ἐκπεσεῖν.
translation:
  text: But we must run aground on some island.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be driven ashore on some island.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς
  chosen: 'on'
  alternatives:
  - onto
  - upon
  lexicon: BDAG
  rationale: With ἐκπεσεῖν in this nautical context, the preposition is best represented
    idiomatically in English as part of the phrase 'run aground on' rather than a
    more wooden 'fall out onto.' This preserves the directional sense while yielding
    natural maritime English.
- source_word: νῆσον
  chosen: island
  lexicon: BDAG
  rationale: The noun straightforwardly denotes an island.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or continuation. 'But' fits the immediate discourse,
    expressing the contrast between loss at sea and necessary landfall.
- source_word: τινα
  chosen: some
  alternatives:
  - a certain
  - an unspecified
  lexicon: BDAG
  rationale: The indefinite pronoun indicates an unspecified island. 'Some' is natural
    modern English and preserves the indefiniteness.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary
  - it is necessary for
  lexicon: BDAG
  rationale: The verb expresses necessity. 'Must' is concise, natural, and preserves
    the force of compulsion.
- source_word: ἡμᾶς
  chosen: we
  alternatives:
  - us
  lexicon: BDAG
  rationale: Although accusative in Greek as the subject of the infinitive construction
    after δεῖ, idiomatic English requires the finite-clause subject 'we' with 'must.'
- source_word: ἐκπεσεῖν
  chosen: run aground
  alternatives:
  - be driven ashore
  - be cast ashore
  - fall upon
  lexicon: BDAG
  rationale: In maritime usage ἐκπίπτω can mean to be driven off course or run aground/ashore.
    Here, with εἰς νῆσον, 'run aground' best captures the nautical event in concise
    modern English. 'Be driven ashore' is possible but slightly more interpretive
    regarding agency.
