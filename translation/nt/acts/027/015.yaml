id: ACT.27.15
reference: Acts 27:15
source:
  edition: SBLGNT
  text: συναρπασθέντος δὲ τοῦ πλοίου καὶ μὴ δυναμένου ἀντοφθαλμεῖν τῷ ἀνέμῳ ἐπιδόντες
    ἐφερόμεθα.
translation:
  text: And when the ship was caught up and could not face the wind, we gave way and
    were driven along.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we yielded to it and were carried along.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναρπασθέντος
  chosen: was caught up
  alternatives:
  - was seized
  - was swept away
  lexicon: BDAG
  rationale: The aorist passive participle conveys the ship being suddenly seized
    by external force, here the storm wind. 'Caught up' preserves the passive sense
    and the abruptness without over-specifying the mechanism. 'Swept away' is possible
    but risks implying complete loss of directional control already in this participle,
    which is then developed by the following clauses.
- source_word: πλοίου
  chosen: ship
  alternatives:
  - vessel
  lexicon: BDAG
  rationale: '''Ship'' is the natural modern English equivalent for πλοῖον in this
    narrative context and is more readable than ''vessel.'''
- source_word: μὴ δυναμένου
  chosen: could not
  alternatives:
  - being unable to
  lexicon: BDAG
  rationale: This participial construction expresses inability. Rendering it with
    a finite English verb produces natural English while preserving the sense.
- source_word: ἀντοφθαλμεῖν
  chosen: face
  alternatives:
  - head into
  - look straight at
  - stand against
  lexicon: BDAG
  rationale: The verb literally suggests facing or looking against, idiomatically
    of a ship facing into the wind. 'Face the wind' is concise, natural, and sufficiently
    maritime in context. 'Head into the wind' is more interpretive; 'stand against'
    is less idiomatic in English here.
- source_word: ἀνέμῳ
  chosen: the wind
  alternatives:
  - the gale
  lexicon: BDAG
  rationale: ἄνεμος is simply 'wind.' Although the broader context is stormy, the
    noun itself does not require 'gale' here.
- source_word: ἐπιδόντες
  chosen: we gave way
  alternatives:
  - we yielded
  - we let her drive
  lexicon: BDAG
  rationale: In nautical context this participle means yielding to the force rather
    than continuing resistance. 'We gave way' captures the decision to stop trying
    to hold course. 'We let her drive' is traditional and vivid but less transparent
    to modern readers.
- source_word: ἐφερόμεθα
  chosen: were driven along
  alternatives:
  - were carried along
  - were borne along
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing movement under external force.
    'Were driven along' fits the storm context and pairs well with 'gave way.' 'Carried
    along' is possible but slightly softer than the context suggests.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here marks narrative continuation. 'And' is a simple, natural connective
    in English narrative.
