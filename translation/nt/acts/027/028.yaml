id: ACT.27.28
reference: Acts 27:28
source:
  edition: SBLGNT
  text: καὶ βολίσαντες εὗρον ὀργυιὰς εἴκοσι, βραχὺ δὲ διαστήσαντες καὶ πάλιν βολίσαντες
    εὗρον ὀργυιὰς δεκαπέντε·
translation:
  text: And after taking soundings, they found twenty fathoms; then after going a
    little farther and taking soundings again, they found fifteen fathoms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'having cast the lead'; the Greek refers to measuring
      the sea's depth with a sounding line.
    reason: lexical_alternative
lexical_decisions:
- source_word: βολίσαντες
  chosen: after taking soundings
  alternatives:
  - having cast the lead
  - after sounding
  lexicon: BDAG
  rationale: The participle refers to measuring depth with a sounding line or lead.
    'Taking soundings' is clear modern nautical English and preserves the specific
    action better than the more opaque 'having cast the lead.'
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they discovered
  - it was found to be
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist indicative. In context it reports
    the measured result of the sounding.
- source_word: ὀργυιὰς
  chosen: fathoms
  alternatives:
  - orgyiai
  - measures of about six feet
  lexicon: BDAG
  rationale: This is a nautical unit of length roughly equivalent to a fathom. 'Fathoms'
    is the natural English equivalent in maritime context and avoids an unnecessary
    transliteration.
- source_word: εἴκοσι
  chosen: twenty
  rationale: Direct rendering of the numeral.
- source_word: βραχὺ
  chosen: a little farther
  alternatives:
  - a short distance
  - a little
  lexicon: BDAG
  rationale: Used adverbially here with the following participle to indicate a short
    interval of movement before the next sounding. 'A little farther' makes the implied
    motion explicit in idiomatic English.
- source_word: διαστήσαντες
  chosen: after going
  alternatives:
  - after proceeding
  - after standing apart
  - after putting some distance between
  lexicon: BDAG
  rationale: In this travel context the participle indicates moving on for a short
    distance. 'After going' is idiomatic when paired with 'a little farther'; more
    literal options are less natural in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Simple adverb indicating repetition of the sounding action.
- source_word: δεκαπέντε
  chosen: fifteen
  rationale: Direct rendering of the numeral.
- source_word: καὶ ... δὲ ... καὶ
  chosen: And ... then ... and
  alternatives:
  - And ... but ... and
  lexicon: BDAG
  rationale: The connective sequence is primarily narrative and sequential here, not
    strongly adversative. English smooths this naturally as 'And ... then ... and.'
