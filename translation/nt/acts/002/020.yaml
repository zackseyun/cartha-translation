id: ACT.2.20
reference: Acts 2:20
source:
  edition: SBLGNT
  text: ὁ ἥλιος μεταστραφήσεται εἰς σκότος καὶ ἡ σελήνη εἰς αἷμα πρὶν ⸀ἢ ⸀ἐλθεῖν ἡμέραν
    κυρίου τὴν μεγάλην καὶ ἐπιφανῆ.
translation:
  text: The sun will be turned into darkness, and the moon into blood, before the
    great and glorious day of the Lord comes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'manifest' or 'notable' for 'glorious' (Greek ἐπιφανῆ).
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστραφήσεται
  chosen: will be turned
  alternatives:
  - will be changed
  - will be transformed
  lexicon: BDAG
  rationale: Future passive sense of μεταστρέφω is best conveyed by 'will be turned,'
    preserving the passive transformation imagery without overinterpreting the mechanism.
- source_word: εἰς σκότος
  chosen: into darkness
  alternatives:
  - to darkness
  lexicon: BDAG
  rationale: εἰς with accusative marks result/state; 'into darkness' is natural English
    and preserves the sense of transition.
- source_word: εἰς αἷμα
  chosen: into blood
  alternatives:
  - to blood
  - blood-red
  lexicon: BDAG
  rationale: The Greek is stark and literal. 'Into blood' preserves the prophetic
    imagery better than interpretive paraphrases like 'blood-red.'
- source_word: πρὶν ἢ ἐλθεῖν
  chosen: before ... comes
  alternatives:
  - before ... should come
  - before the coming of
  lexicon: BDAG
  rationale: This construction introduces an event prior to another event. 'Before
    ... comes' is idiomatic modern English and accurately reflects the temporal force.
- source_word: ἡμέραν κυρίου
  chosen: the day of the Lord
  alternatives:
  - the Lord's day
  lexicon: BDAG
  rationale: This is the established prophetic expression for divine intervention/judgment.
    'The day of the Lord' preserves the biblical idiom, whereas 'the Lord's day' could
    be confused with later Christian usage for Sunday.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - LORD
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Although the phrase
    echoes OT 'day of the LORD' language, the Greek here is κύριος, and 'Lord' matches
    the stated translation policy while preserving the allusion.
- source_word: μεγάλην
  chosen: great
  alternatives:
  - mighty
  lexicon: BDAG
  rationale: μέγας straightforwardly means 'great'; this keeps the elevated prophetic
    tone without embellishment.
- source_word: ἐπιφανῆ
  chosen: glorious
  alternatives:
  - manifest
  - splendid
  - notable
  lexicon: BDAG
  rationale: ἐπιφανής can denote something conspicuous, manifest, or splendid. 'Glorious'
    fits the eschatological context and communicates the verse's exalted tone in readable
    English, while alternatives are preserved in a footnote due to the term's semantic
    range.
