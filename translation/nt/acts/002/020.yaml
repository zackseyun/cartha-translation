theological_decisions:
- issue: Rendering the prophetic phrase ἡμέραν κυρίου in a context quoting Joel and
    applied within Peter's sermon
  chosen_reading: the day of the Lord
  alternative_readings:
  - the Lord's day
  rationale: The phrase is a recognized biblical-theological expression for the climactic
    day of divine visitation. Retaining the idiom preserves the OT background and
    avoids importing later ecclesial associations of 'the Lord's day.'
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy: original-language
    primacy over translation tradition'
- issue: Rendering ἐπιφανῆ in an eschatological context
  chosen_reading: glorious
  alternative_readings:
  - manifest
  - notable
  rationale: The adjective can mean visible/conspicuous or splendid. 'Glorious' best
    communicates the verse's elevated eschatological force in natural English, but
    because the semantic range is meaningful, alternatives are preserved in a footnote
    rather than silently excluded.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
