id: ACT.2.11
reference: Acts 2:11
source:
  edition: SBLGNT
  text: Ἰουδαῖοί τε καὶ προσήλυτοι, Κρῆτες καὶ Ἄραβες, ἀκούομεν λαλούντων αὐτῶν ταῖς
    ἡμετέραις γλώσσαις τὰ μεγαλεῖα τοῦ θεοῦ.
translation:
  text: both Jews and proselytes, Cretans and Arabs—we hear them speaking in our own
    languages the mighty works of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tongues.' The Greek word can mean 'tongues' or 'languages'; here the
      context favors recognizable human languages.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖοί
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In Acts 2 this refers to the Jewish people present among the diaspora
    list, not specifically inhabitants of Judea. 'Jews' best matches the ethnoreligious
    sense in context.
- source_word: τε καὶ
  chosen: both ... and
  alternatives:
  - and
  - as well as
  lexicon: BDAG
  rationale: The correlative force of τε καί is naturally conveyed by 'both ... and,'
    preserving the pairing of Jews with proselytes.
- source_word: προσήλυτοι
  chosen: proselytes
  alternatives:
  - converts
  lexicon: BDAG
  rationale: Refers to Gentile converts/adherents to Judaism. 'Proselytes' is the
    established and precise term; 'converts' is possible but less specific to the
    Jewish context.
- source_word: Κρῆτες
  chosen: Cretans
  lexicon: BDAG
  rationale: Standard transliteration for inhabitants of Crete.
- source_word: Ἄραβες
  chosen: Arabs
  alternatives:
  - Arabians
  lexicon: BDAG
  rationale: '''Arabs'' is the natural modern English rendering; ''Arabians'' is more
    traditional but less current.'
- source_word: ἀκούομεν
  chosen: we hear
  alternatives:
  - we are hearing
  lexicon: BDAG
  rationale: Present indicative with immediate experiential force; simple present
    is idiomatic in English.
- source_word: λαλούντων αὐτῶν
  chosen: them speaking
  alternatives:
  - them talking
  - them declaring
  lexicon: BDAG
  rationale: The genitive participle after ἀκούομεν is well represented by an English
    object plus participle. 'Speaking' is broad and fits λαλέω without overinterpreting
    the content.
- source_word: ταῖς ἡμετέραις γλώσσαις
  chosen: in our own languages
  alternatives:
  - in our own tongues
  lexicon: BDAG
  rationale: γλῶσσαι here denotes recognizable human languages in the Pentecost setting.
    'Languages' is clearer for modern readers, while 'our own' preserves ἡμετέραις
    emphatically.
- source_word: τὰ μεγαλεῖα
  chosen: the mighty works
  alternatives:
  - the great things
  - the mighty deeds
  lexicon: BDAG
  rationale: The term denotes great or mighty acts. 'Mighty works' is concise, natural,
    and preserves the sense of notable divine acts without unnecessary expansion.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Standard possessive genitive indicating that the mighty works belong
    to or are performed by God.
