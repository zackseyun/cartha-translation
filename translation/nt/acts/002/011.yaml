theological_decisions:
- issue: Meaning of γλώσσαις in the Pentecost context
  chosen_reading: recognizable human languages
  alternative_readings:
  - ecstatic utterances or tongues in a non-human sense
  rationale: The immediate context emphasizes the multinational crowd hearing in their
    own native languages. Rendering γλώσσαις as 'languages' reflects the narrative's
    plain sense without importing later debates about glossolalia.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
