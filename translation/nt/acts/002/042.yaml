id: ACT.2.42
reference: Acts 2:42
source:
  edition: SBLGNT
  text: ἦσαν δὲ προσκαρτεροῦντες τῇ διδαχῇ τῶν ἀποστόλων καὶ τῇ ⸀κοινωνίᾳ, τῇ κλάσει
    τοῦ ἄρτου καὶ ταῖς προσευχαῖς.
translation:
  text: And they were devoting themselves to the apostles' teaching and the fellowship,
    to the breaking of bread and the prayers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharing,' 'participation,' or 'communion.'
    reason: lexical_alternative
  - marker: b
    text: '''The breaking of bread'' may refer to shared meals generally, though many
      understand it here to include the Lord''s Supper.'
    reason: alternative_reading
  - marker: c
    text: Or 'the set prayers'; the article may suggest recognized times or forms
      of prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δὲ προσκαρτεροῦντες
  chosen: they were devoting themselves
  alternatives:
  - they were continuing steadfastly
  - they were persisting
  - they were continually attending
  lexicon: BDAG
  rationale: The periphrastic imperfect (ἦσαν + present participle) conveys ongoing,
    habitual action in past time. 'Were devoting themselves' captures both the progressive
    aspect and the sense of steadfast commitment in προσκαρτερέω better than a flatter
    'continued.'
- source_word: διδαχῇ
  chosen: teaching
  alternatives:
  - instruction
  - doctrine
  lexicon: BDAG
  rationale: '''Teaching'' is the most natural modern English rendering and fits the
    content and activity implied by διδαχή. ''Doctrine'' is possible but sounds more
    systematized and ecclesiastical than the immediate context requires.'
- source_word: τῶν ἀποστόλων
  chosen: the apostles'
  alternatives:
  - of the apostles
  lexicon: BDAG
  rationale: The genitive is rendered with an English possessive for natural style.
    It likely denotes the teaching given by the apostles rather than merely teaching
    about them.
- source_word: κοινωνίᾳ
  chosen: the fellowship
  alternatives:
  - sharing
  - participation
  - communion
  lexicon: BDAG
  rationale: κοινωνία can denote shared participation and communal life. 'The fellowship'
    preserves the article and the likely sense of a recognizable communal practice
    or reality within the early church. Because 'sharing' and 'communion' are also
    plausible, they are preserved in a footnote.
- source_word: κλάσει τοῦ ἄρτου
  chosen: the breaking of bread
  alternatives:
  - breaking bread
  lexicon: BDAG
  rationale: This is a fairly fixed expression in Luke-Acts. Retaining the article
    mirrors the Greek construction and suggests a recognizable practice. The phrase
    may include ordinary shared meals and/or the Lord's Supper, so a more specific
    sacramental rendering in the main text would overinterpret.
- source_word: προσευχαῖς
  chosen: the prayers
  alternatives:
  - prayers
  lexicon: BDAG
  rationale: The plural with article is best represented as 'the prayers,' which may
    point to recognized times or forms of prayer rather than prayer in a generic sense.
    Omitting the article would lose that specificity.
