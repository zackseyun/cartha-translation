theological_decisions:
- issue: Whether κλάσει τοῦ ἄρτου should be rendered explicitly as the Lord's Supper/Eucharist
  chosen_reading: Rendered more broadly as 'the breaking of bread'
  alternative_readings:
  - the Lord's Supper
  - the Eucharist
  - communal meals including the Lord's Supper
  rationale: The phrase in Luke-Acts can refer to meal fellowship and may in Christian
    context include the memorial meal of Jesus, but the wording here does not unambiguously
    require a technical sacramental translation. To avoid importing a denominationally
    loaded interpretation, the main text preserves the phrase and a footnote notes
    the possible Eucharistic sense.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Whether κοινωνία should be narrowed to financial sharing or sacramental communion
  chosen_reading: Rendered as 'the fellowship' with broader communal sense
  alternative_readings:
  - sharing of possessions
  - communion
  rationale: The immediate list names core communal practices. κοινωνία likely includes
    shared life and participation together, possibly expressed materially and spiritually.
    A narrower rendering would prematurely resolve the term's breadth.
  doctrine_reference: Translation philosophy item 3
