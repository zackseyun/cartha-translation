id: ACT.2.13
reference: Acts 2:13
source:
  edition: SBLGNT
  text: ἕτεροι δὲ ⸀διαχλευάζοντες ἔλεγον ὅτι Γλεύκους μεμεστωμένοι εἰσίν.
translation:
  text: But others, mocking, were saying, “They are filled with sweet wine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “new wine.” The Greek γλεῦκος refers to sweet fresh wine; the traditional
      rendering “new wine” is possible but less precise in contemporary English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  chosen: others
  alternatives:
  - some others
  lexicon: BDAG
  rationale: The adjective functions substantivally, referring to a different group
    within the crowd. 'Others' is the most natural English rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding positive reaction. 'But' best conveys
    the adversative sense in context.
- source_word: διαχλευάζοντες
  chosen: mocking
  alternatives:
  - sneering
  - ridiculing
  - jeering
  lexicon: BDAG
  rationale: The participle denotes derisive mockery. 'Mocking' is clear, idiomatic,
    and preserves the contemptuous tone without overtranslation.
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech. 'Were saying' preserves
    that aspect in natural English.
- source_word: ὅτι
  chosen: “They are...
  alternatives:
  - that they are...
  lexicon: BDAG
  rationale: Introduces direct discourse content. English idiom prefers quotation
    here rather than a subordinate 'that' clause.
- source_word: Γλεύκους
  chosen: sweet wine
  alternatives:
  - new wine
  - fresh wine
  lexicon: BDAG
  rationale: γλεῦκος refers to sweet wine/must, not generic wine. 'Sweet wine' is
    more lexically precise than the traditional 'new wine,' which can suggest mere
    recency rather than sweetness.
- source_word: μεμεστωμένοι
  chosen: filled
  alternatives:
  - full
  - have been filled
  lexicon: BDAG
  rationale: The perfect passive participle describes their alleged state of being
    full of drink. 'Filled' is idiomatic with the genitive construction and works
    naturally with 'are.'
- source_word: εἰσίν
  chosen: are
  lexicon: BDAG
  rationale: Simple present copula completing the periphrastic expression 'are filled.'
