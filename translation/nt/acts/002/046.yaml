theological_decisions:
- issue: Whether 'breaking bread' should be rendered explicitly as the Lord's Supper/Eucharist
  chosen_reading: Retain the broader expression 'breaking bread' within the description
    of shared meals, without making it explicitly sacramental in the main text.
  alternative_readings:
  - Interpret as ordinary table fellowship only
  - Interpret as an explicit reference to the Lord's Supper
  rationale: In Luke-Acts, 'breaking bread' can refer to ordinary meals and can also
    carry Eucharistic resonance. The immediate context includes τροφῆς ('food/meals'),
    which supports ordinary communal eating, but the phrase may intentionally echo
    Christian fellowship practices. To preserve theological tension rather than resolve
    it, the main text keeps the idiom and a footnote notes the possible sacramental
    nuance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
