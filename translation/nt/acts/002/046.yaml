id: ACT.2.46
reference: Acts 2:46
source:
  edition: SBLGNT
  text: καθ’ ἡμέραν τε προσκαρτεροῦντες ὁμοθυμαδὸν ἐν τῷ ἱερῷ, κλῶντές τε κατ’ οἶκον
    ἄρτον, μετελάμβανον τροφῆς ἐν ἀγαλλιάσει καὶ ἀφελότητι καρδίας,
translation:
  text: And day by day, continuing together with one purpose in the temple courts,
    and breaking bread from house to house, they were sharing meals with gladness
    and simplicity of heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple.' The Greek term refers to the temple complex, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: '''Breaking bread'' may refer to ordinary shared meals, though some understand
      it to include the Lord''s Supper.'
    reason: alternative_reading
  - marker: c
    text: Or 'food.'
    reason: lexical_alternative
  - marker: d
    text: Or 'sincerity of heart' or 'generosity of heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  chosen: day by day
  alternatives:
  - every day
  - daily
  lexicon: BDAG
  rationale: Idiomatic distributive expression with κατά + accusative; 'day by day'
    preserves the iterative sense naturally in English.
- source_word: προσκαρτεροῦντες
  chosen: continuing
  alternatives:
  - devoting themselves
  - persisting
  - attending continually
  lexicon: BDAG
  rationale: Present participle conveys ongoing persistence. 'Continuing' fits the
    syntax with the following locative phrase and avoids importing the stronger devotional
    nuance unless context requires it.
- source_word: ὁμοθυμαδόν
  chosen: together with one purpose
  alternatives:
  - with one accord
  - unanimously
  - together
  lexicon: BDAG
  rationale: The term denotes shared purpose/unity. 'With one accord' is traditional
    but dated; 'together with one purpose' preserves both communal and dispositional
    force in readable modern English.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple courts
  alternatives:
  - in the temple
  - at the temple
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple courts' makes that distinction clearer in English.
- source_word: κλῶντές ... ἄρτον
  chosen: breaking bread
  alternatives:
  - breaking the bread
  lexicon: BDAG
  rationale: This is a conventional expression in Luke-Acts that can denote table
    fellowship and may also carry Eucharistic resonance. The anarthrous Greek is well
    represented by 'breaking bread' without over-specifying.
- source_word: κατ’ οἶκον
  chosen: from house to house
  alternatives:
  - at home
  - in homes
  - by household
  lexicon: BDAG
  rationale: The distributive sense of κατά is best captured by 'from house to house,'
    indicating repeated activity in various homes rather than merely 'at home' in
    general.
- source_word: μετελάμβανον τροφῆς
  chosen: they were sharing meals
  alternatives:
  - they partook of food
  - they received food
  - they ate their food
  lexicon: BDAG
  rationale: Imperfect verb plus genitive object indicates ongoing participation in
    food. 'Sharing meals' captures the communal aspect in context better than the
    more wooden 'partook of food,' while staying within the semantic range.
- source_word: τροφῆς
  chosen: meals
  alternatives:
  - food
  lexicon: BDAG
  rationale: τροφῆς is literally 'food,' but in this context of communal eating after
    'breaking bread,' 'meals' is natural English and reflects the eventive sense.
- source_word: ἐν ἀγαλλιάσει
  chosen: with gladness
  alternatives:
  - with exultation
  - with great joy
  lexicon: BDAG
  rationale: The noun denotes exuberant joy. 'Gladness' is concise and idiomatic,
    preserving positive affect without sounding inflated.
- source_word: ἀφελότητι καρδίας
  chosen: simplicity of heart
  alternatives:
  - sincerity of heart
  - generosity of heart
  - humility of heart
  lexicon: BDAG
  rationale: The phrase denotes singleness, openness, or unaffected simplicity. 'Simplicity
    of heart' stays close to the Greek and preserves the semantic breadth better than
    narrowing it to only 'generosity' or 'sincerity'.
