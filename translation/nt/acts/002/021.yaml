id: ACT.2.21
reference: Acts 2:21
source:
  edition: SBLGNT
  text: καὶ ἔσται πᾶς ὃς ⸀ἐὰν ἐπικαλέσηται τὸ ὄνομα κυρίου σωθήσεται.
translation:
  text: And it shall be that everyone who calls on the name of the Lord will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever calls on the name of the Lord.' The phrase echoes Joel 2:32,
      where 'the Lord' refers to YHWH; in Acts, Peter applies the citation within
      his proclamation about Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔσται
  chosen: it shall be
  alternatives:
  - it will be
  - it will happen
  lexicon: BDAG
  rationale: Future middle of εἰμί in an introductory formula. 'It shall be' preserves
    the solemn, scriptural register of the quotation while remaining understandable
    in modern English.
- source_word: πᾶς ὃς ἐὰν
  chosen: everyone who
  alternatives:
  - whoever
  - every one who
  lexicon: BDAG
  rationale: This construction expresses an indefinite universal condition. 'Everyone
    who' is natural English and preserves the universal scope without archaic phrasing.
- source_word: ἐπικαλέσηται
  chosen: calls on
  alternatives:
  - invokes
  - calls upon
  - appeals to
  lexicon: BDAG
  rationale: In this biblical idiom, ἐπικαλέω with 'the name' means to invoke or appeal
    to in worshipful dependence. 'Calls on' is the most idiomatic and widely understood
    rendering in English Bible style.
- source_word: τὸ ὄνομα
  chosen: the name
  lexicon: BDAG
  rationale: Retained literally because 'call on the name' is a fixed biblical expression
    carrying covenantal and worship connotations that would be weakened by paraphrase.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' The article is represented
    in English as 'the Lord' because the phrase is τὸ ὄνομα κυρίου, naturally rendered
    'the name of the Lord.' In context this echoes Joel's reference to YHWH and, in
    Acts' christological setting, contributes to Luke's application of the text.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: Future passive of σῴζω. 'Will be saved' is the standard and contextually
    appropriate rendering, preserving both rescue/deliverance and salvation overtones
    present in the citation and its use in Acts.
