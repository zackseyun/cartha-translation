theological_decisions:
- issue: Referent of 'the Lord' in the Joel citation as used in Acts
  chosen_reading: Render κύριος as 'the Lord' without specifying the referent in the
    main text.
  alternative_readings:
  - YHWH in the original Joel context
  - Jesus in Luke's christological application in Acts
  rationale: The Greek text itself says 'the Lord' and should not be narrowed in translation.
    The verse is a quotation of Joel, where the referent is YHWH, yet Peter's use
    in Acts places the citation within a context centered on Jesus. Preserving 'the
    Lord' maintains the textual wording and theological tension without importing
    an interpretive resolution into the translation.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering 'Lord'.
