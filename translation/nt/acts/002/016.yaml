id: ACT.2.16
reference: Acts 2:16
source:
  edition: SBLGNT
  text: ἀλλὰ τοῦτό ἐστιν τὸ εἰρημένον διὰ τοῦ προφήτου Ἰωήλ·
translation:
  text: 'But this is what was spoken through the prophet Joel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by the prophet Joel." The Greek can express agency, but "through" better
      preserves Joel's role as the prophetic instrument of the message.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Adversative conjunction marking correction of the crowd's misunderstanding
    in the previous context. 'But' is the most natural English discourse marker here.
- source_word: τοῦτό
  chosen: this
  alternatives:
  - this thing
  lexicon: BDAG
  rationale: Neuter demonstrative referring to the present phenomenon. Simple 'this'
    is idiomatic and sufficiently specific in English.
- source_word: ἐστιν
  chosen: is
  alternatives:
  - means
  - constitutes
  lexicon: BDAG
  rationale: Standard copula. A more interpretive rendering such as 'means' would
    go beyond the plain sense.
- source_word: τὸ εἰρημένον
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what has been said
  lexicon: BDAG
  rationale: The article with the perfect passive participle functions substantivally.
    'What was spoken' is natural English and preserves the passive sense without awkwardness.
    Although the perfect participle can suggest a present state resulting from prior
    speech, English idiom here is best served by 'was spoken.'
- source_word: διὰ
  chosen: through
  alternatives:
  - by
  lexicon: BDAG
  rationale: With the genitive and a human intermediary, διά commonly denotes agency
    or instrumentality. 'Through' preserves the prophetic mediation explicitly.
- source_word: τοῦ προφήτου
  chosen: the prophet
  alternatives:
  - the prophet's
  lexicon: BDAG
  rationale: Straightforward genitive object of διά. 'The prophet' preserves Joel's
    recognized role as the mediating speaker of God's word.
- source_word: Ἰωήλ
  chosen: Joel
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, in keeping with
    the philosophy of transliterating names rather than translating them.
