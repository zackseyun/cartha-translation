theological_decisions:
- issue: Prophetic mediation in διὰ τοῦ προφήτου Ἰωήλ
  chosen_reading: through the prophet Joel
  alternative_readings:
  - by the prophet Joel
  rationale: The wording preserves the biblical pattern that God speaks through human
    prophets, without flattening Joel into the ultimate source of the message. This
    reflects the Greek preposition διά with genitive and avoids importing a stronger
    theory of dictation than the text states.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
