theological_decisions:
- issue: Nature of the Pentecost manifestation
  chosen_reading: Render the phenomenon as 'tongues like fire' rather than literal
    fire or merely metaphorical speech.
  alternative_readings:
  - flames of fire
  - languages as of fire
  rationale: The Greek uses simile (ὡσεὶ) and the noun γλῶσσαι, preserving both the
    visible imagery and the connection to speech. The translation should not collapse
    the sign into literal fire nor prematurely interpret it only as spoken languages.
  doctrine_reference: Translation philosophy §1, §3
