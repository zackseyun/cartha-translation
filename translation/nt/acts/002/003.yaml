id: ACT.2.3
reference: Acts 2:3
source:
  edition: SBLGNT
  text: καὶ ὤφθησαν αὐτοῖς διαμεριζόμεναι γλῶσσαι ὡσεὶ πυρός, ⸂καὶ ἐκάθισεν⸃ ἐφ’ ἕνα
    ἕκαστον αὐτῶν,
translation:
  text: And tongues like fire appeared to them, being divided, and it came to rest
    on each one of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dividing tongues as of fire' or 'tongues, as if of fire.' The Greek
      wording highlights both the visible appearance and its distribution among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθησαν
  chosen: appeared
  alternatives:
  - were seen
  - became visible
  lexicon: BDAG
  rationale: 'Aorist passive of ὁράω here functions intransitively: something became
    visible to them. ''Appeared'' is idiomatic English and preserves the event of
    visible manifestation without awkward passivity.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - before them
  lexicon: BDAG
  rationale: Dative pronoun marking those to whom the phenomenon appeared. 'To them'
    is the most direct rendering.
- source_word: διαμεριζόμεναι
  chosen: being divided
  alternatives:
  - dividing
  - distributed
  - separating
  lexicon: BDAG
  rationale: Present middle/passive participle feminine nominative plural modifying
    γλῶσσαι. The sense is that the tongues were distributed or divided among them.
    'Being divided' preserves the participial force and avoids overinterpreting whether
    the emphasis is on process or result.
- source_word: γλῶσσαι
  chosen: tongues
  alternatives:
  - flames
  - languages
  lexicon: BDAG
  rationale: γλῶσσα can mean literal tongue, language, or by imagery a tongue-shaped
    flame. Here the visual context with 'like fire' supports 'tongues' as the primary
    image, while also resonating with the speech/language theme of the passage. 'Flames'
    would flatten the lexical link to the following context.
- source_word: ὡσεὶ πυρός
  chosen: like fire
  alternatives:
  - as if of fire
  - like fiery
  lexicon: BDAG
  rationale: ὡσεὶ marks comparison, not identity. 'Like fire' preserves the simile
    and avoids claiming the phenomenon was literally fire.
- source_word: ἐκάθισεν
  chosen: it came to rest
  alternatives:
  - it sat
  - it settled
  lexicon: BDAG
  rationale: Although singular, the verb likely treats the phenomenon collectively
    or refers to the distributed manifestation as a whole. 'Came to rest' is natural
    English for a visible phenomenon alighting on persons and avoids the overly literal
    'sat' while preserving the imagery of settling.
- source_word: ἐφ’ ἕνα ἕκαστον αὐτῶν
  chosen: on each one of them
  alternatives:
  - upon every one of them
  lexicon: BDAG
  rationale: The phrase emphasizes individual distribution to every person present.
    'On each one of them' is clear, natural, and preserves the distributive force.
