theological_decisions:
- issue: Identity of the subject implied by ἦσαν
  chosen_reading: they were all together in one place
  alternative_readings:
  - all were together in one place
  rationale: The Greek does not restate the subject explicitly; it is supplied from
    the preceding context. 'They' is required for idiomatic English and does not add
    doctrinal content beyond the narrative continuity.
  doctrine_reference: Translation philosophy §6 (readable modern English)
