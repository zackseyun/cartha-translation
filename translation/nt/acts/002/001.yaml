id: ACT.2.1
reference: Acts 2:1
source:
  edition: SBLGNT
  text: Καὶ ἐν τῷ συμπληροῦσθαι τὴν ἡμέραν τῆς πεντηκοστῆς ἦσαν ⸂πάντες ὁμοῦ⸃ ἐπὶ
    τὸ αὐτό,
translation:
  text: And when the day of Pentecost was being fulfilled, they were all together
    in one place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the day of Pentecost had fully come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συμπληροῦσθαι
  chosen: was being fulfilled
  alternatives:
  - had fully come
  - was coming to completion
  lexicon: BDAG
  rationale: The present passive infinitive with ἐν τῷ forms a temporal construction,
    literally 'in the being fulfilled/completed.' 'Was being fulfilled' preserves
    the process nuance better than the traditional but more result-focused 'had fully
    come,' while remaining natural English.
- source_word: πεντηκοστῆς
  chosen: Pentecost
  alternatives:
  - the Feast of Weeks
  lexicon: BDAG
  rationale: Πεντηκοστή is the established Greek name for the Jewish feast occurring
    fifty days after Passover. 'Pentecost' is the natural English equivalent in this
    NT context; 'Feast of Weeks' reflects the Hebrew festival background but is not
    the term used here.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: The adjective indicates the entirety of the group previously in view.
    'All' is concise and sufficient in English; 'all of them' is possible but slightly
    heavier.
- source_word: ὁμοῦ
  chosen: together
  alternatives:
  - in the same place
  lexicon: BDAG
  rationale: Ὁμοῦ denotes togetherness or being in company. 'Together' captures the
    adverb's basic sense clearly.
- source_word: ἐπὶ τὸ αὐτό
  chosen: in one place
  alternatives:
  - at the same place
  - together
  lexicon: BDAG
  rationale: This idiom can mean 'in the same place' or 'together.' Since ὁμοῦ already
    expresses togetherness, rendering ἐπὶ τὸ αὐτό as 'in one place' avoids redundancy
    while preserving the locative nuance.
