theological_decisions:
- issue: Gendered vocative address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - men, brothers
  rationale: The Greek is grammatically masculine and should not be flattened into
    a fully gender-neutral main-text rendering. At the same time, in context the address
    may be representative rather than exclusively male, so the inclusive possibility
    is preserved in a footnote per the translation philosophy's gender-accurate guidance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
