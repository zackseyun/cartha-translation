id: ACT.2.37
reference: Acts 2:37
source:
  edition: SBLGNT
  text: Ἀκούσαντες δὲ κατενύγησαν ⸂τὴν καρδίαν⸃, εἶπόν τε πρὸς τὸν Πέτρον καὶ τοὺς
    λοιποὺς ἀποστόλους· Τί ⸀ποιήσωμεν, ἄνδρες ἀδελφοί;
translation:
  text: Now when they heard this, they were pierced to the heart, and they said to
    Peter and the rest of the apostles, “What should we do, brothers?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “cut to the heart.” The Greek expression describes a sharp inner conviction
      or distress.
    reason: lexical_alternative
  - marker: b
    text: Greek “men, brothers,” a conventional address that may function like “brothers”
      or “brothers and sisters” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - after hearing
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle introducing the response to Peter's preceding speech;
    English idiom naturally supplies 'this' from context. 'When they heard this' is
    clear and preserves the temporal-causal force without over-paraphrase.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ marks discourse progression rather than strong contrast here. 'Now'
    signals a new step in the narrative in readable English.
- source_word: κατενύγησαν τὴν καρδίαν
  chosen: they were pierced to the heart
  alternatives:
  - they were cut to the heart
  - they were deeply distressed in heart
  lexicon: BDAG
  rationale: The verb denotes being sharply affected or pierced emotionally; with
    'the heart' it is an idiom of deep conviction. 'Pierced to the heart' preserves
    the metaphor and reads naturally. 'Cut to the heart' is traditional and viable,
    but 'pierced' better reflects the stabbing nuance of the verb.
- source_word: εἶπόν τε
  chosen: and they said
  alternatives:
  - then they said
  - and they asked
  lexicon: BDAG
  rationale: τε links the next action closely to the previous clause. 'And they said'
    is sufficient and natural; 'asked' would interpret the content rather than translate
    λέγω directly.
- source_word: πρὸς τὸν Πέτρον καὶ τοὺς λοιποὺς ἀποστόλους
  chosen: to Peter and the rest of the apostles
  alternatives:
  - to Peter and the other apostles
  lexicon: BDAG
  rationale: λοιπούς means 'the rest' or 'the others.' 'The rest of the apostles'
    is slightly more explicit and preserves the sense that Peter is distinguished
    from the remaining apostles in the addressees.
- source_word: Τί ποιήσωμεν
  chosen: What should we do
  alternatives:
  - What shall we do
  - What are we to do
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive asks for the proper course of action.
    'Should' communicates deliberation in contemporary English better than the more
    archaic 'shall'.
- source_word: ἄνδρες ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers, men
  - brothers and sisters
  lexicon: BDAG
  rationale: This is a conventional vocative address. Rendering simply 'brothers'
    preserves the familial term ἀδελφοί and avoids awkward duplication if both nouns
    are translated separately. Because the phrase can function as a respectful address
    to a mixed audience, the inclusive nuance is best preserved in a footnote rather
    than expanded in the main text, in keeping with the gender-accurate policy.
