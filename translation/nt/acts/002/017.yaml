id: ACT.2.17
reference: Acts 2:17
source:
  edition: SBLGNT
  text: Καὶ ἔσται ἐν ταῖς ἐσχάταις ἡμέραις, λέγει ὁ θεός, ἐκχεῶ ἀπὸ τοῦ πνεύματός
    μου ἐπὶ πᾶσαν σάρκα, καὶ προφητεύσουσιν οἱ υἱοὶ ὑμῶν καὶ αἱ θυγατέρες ὑμῶν, καὶ
    οἱ νεανίσκοι ὑμῶν ὁράσεις ὄψονται, καὶ οἱ πρεσβύτεροι ὑμῶν ⸀ἐνυπνίοις ἐνυπνιασθήσονται·
translation:
  text: And it will be in the last days, says God, that I will pour out from my Spirit
    on all flesh, and your sons and your daughters will prophesy, and your young men
    will see visions, and your old men will dream dreams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on all people.' The Greek reads 'on all flesh,' preserving the prophetic
      idiom.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'I will pour out of my Spirit'; the Greek
      more literally says 'from my Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἐσχάταις ἡμέραις
  chosen: in the last days
  alternatives:
  - in the final days
  - in the latter days
  lexicon: BDAG
  rationale: Standard temporal idiom; 'last days' is the most natural and established
    English rendering and accurately reflects the eschatological phrase without overinterpreting
    its scope.
- source_word: λέγει ὁ θεός
  chosen: says God
  alternatives:
  - God says
  lexicon: BDAG
  rationale: Retains the present-tense citation formula and keeps the Greek word order's
    prophetic force in readable English.
- source_word: ἐκχεῶ
  chosen: I will pour out
  alternatives:
  - I will pour forth
  lexicon: BDAG
  rationale: Concrete metaphor preserved; 'pour out' is idiomatic and matches prophetic
    usage.
- source_word: ἀπὸ τοῦ πνεύματός μου
  chosen: from my Spirit
  alternatives:
  - of my Spirit
  lexicon: BDAG
  rationale: The Greek uses ἀπό ('from'), not a simple genitive of substance alone.
    'From my Spirit' preserves the preposition and avoids implying division while
    reflecting the source wording more closely than the traditional 'of my Spirit'.
- source_word: ἐπὶ πᾶσαν σάρκα
  chosen: on all flesh
  alternatives:
  - on all people
  - on all humanity
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' in literal contexts. Here the
    phrase is a Semitic/prophetic idiom for humanity broadly, but 'all flesh' preserves
    the source imagery and intertextual resonance with Joel; a more interpretive alternative
    is preserved in a footnote.
- source_word: προφητεύσουσιν
  chosen: will prophesy
  alternatives:
  - will speak prophetically
  lexicon: BDAG
  rationale: Direct and standard rendering of the verb; no need to dilute the prophetic
    terminology.
- source_word: οἱ υἱοὶ ὑμῶν καὶ αἱ θυγατέρες ὑμῶν
  chosen: your sons and your daughters
  alternatives:
  - your sons and daughters
  lexicon: BDAG
  rationale: Keeps the explicit repetition found in Greek and preserves the gendered
    pair, which is significant in the verse's emphasis on broad participation.
- source_word: οἱ νεανίσκοι ὑμῶν
  chosen: your young men
  alternatives:
  - your young people
  lexicon: BDAG
  rationale: Gender-accurate rendering of the masculine plural noun; the text specifically
    contrasts male age groups here, while daughters were already explicitly mentioned.
- source_word: ὁράσεις ὄψονται
  chosen: will see visions
  alternatives:
  - will behold visions
  lexicon: BDAG
  rationale: Natural English that preserves the cognate construction's sense without
    awkward literalism.
- source_word: οἱ πρεσβύτεροι ὑμῶν
  chosen: your old men
  alternatives:
  - your elders
  lexicon: BDAG
  rationale: In this context the contrast is age-based with 'young men,' so 'old men'
    is preferable to 'elders,' which could suggest office or status.
- source_word: ἐνυπνίοις ἐνυπνιασθήσονται
  chosen: will dream dreams
  alternatives:
  - will have dreams in dreams
  - will dream by means of dreams
  lexicon: BDAG
  rationale: This is the natural English equivalent of the cognate expression involving
    dreams; it preserves the meaning and rhetorical parallelism with 'see visions.'
