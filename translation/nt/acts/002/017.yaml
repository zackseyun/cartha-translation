theological_decisions:
- issue: Scope and idiomatic force of 'all flesh'
  chosen_reading: Retain the literal phrase 'all flesh' in the main text while understanding
    it as a broad-humanity idiom in context.
  alternative_readings:
  - all people
  - all humanity
  rationale: This preserves the prophetic wording and theological breadth of the promise
    without flattening the imagery. The phrase signals wide distribution of the Spirit
    across human categories named in the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §§1, 3, 5; Contested terms:
    σάρξ'
- issue: Rendering of πνεῦμα in relation to divine outpouring
  chosen_reading: Translate as 'my Spirit' with capital 'S'.
  alternative_readings:
  - my spirit
  rationale: In this prophetic citation, the referent is God's Spirit, not merely
    an impersonal disposition. Capitalization in English helps communicate the personal
    divine referent without adding content beyond the context.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §6
