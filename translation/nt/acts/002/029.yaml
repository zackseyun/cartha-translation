id: ACT.2.29
reference: Acts 2:29
source:
  edition: SBLGNT
  text: Ἄνδρες ἀδελφοί, ἐξὸν εἰπεῖν μετὰ παρρησίας πρὸς ὑμᾶς περὶ τοῦ πατριάρχου Δαυίδ,
    ὅτι καὶ ἐτελεύτησεν καὶ ἐτάφη, καὶ τὸ μνῆμα αὐτοῦ ἔστιν ἐν ἡμῖν ἄχρι τῆς ἡμέρας
    ταύτης·
translation:
  text: Men, brothers, I may speak to you with boldness about the patriarch David,
    that he both died and was buried, and his tomb is among us to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Brothers'; the Greek literally has 'Men, brothers,' a formal address
      to the assembled fellow Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  chosen: Men, brothers
  alternatives:
  - Brothers
  - Brothers and sisters
  - Men and brothers
  lexicon: BDAG
  rationale: Rendered both vocatives explicitly to preserve the double address and
    the masculine form of the Greek. This follows the gender-accurate principle rather
    than collapsing ἄνδρες and ἀδελφοί into a single English term. 'Men and brothers'
    is possible but less natural in modern English; 'brothers and sisters' would over-interpret
    the masculine vocative.
- source_word: ἐξὸν εἰπεῖν
  chosen: I may speak
  alternatives:
  - it is permitted to say
  - I am permitted to say
  - I can say
  lexicon: BDAG
  rationale: The participial idiom from ἔξεστι conveys permissibility or freedom to
    speak. 'I may speak' preserves that sense in natural English without becoming
    wooden. 'Can say' risks shifting to mere ability rather than authorized frankness.
- source_word: μετὰ παρρησίας
  chosen: with boldness
  alternatives:
  - with confidence
  - plainly
  - freely
  lexicon: BDAG
  rationale: παρρησία here denotes frank, open, confident speech. 'With boldness'
    preserves the rhetorical force and public candor of Peter's address. 'With confidence'
    is possible but slightly weaker; 'plainly' captures frankness but not the courage
    implied.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - before you
  lexicon: BDAG
  rationale: A straightforward relational preposition here; 'to you' is the most natural
    equivalent in context.
- source_word: περὶ τοῦ πατριάρχου Δαυίδ
  chosen: about the patriarch David
  alternatives:
  - concerning the patriarch David
  - about our patriarch David
  lexicon: BDAG
  rationale: περί is rendered 'about.' πατριάρχης is kept as 'patriarch,' the standard
    and accurate title. 'Our patriarch' is not explicit in the Greek and is therefore
    avoided.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely, that
  lexicon: BDAG
  rationale: Introduces the content of what Peter says; simple 'that' is sufficient
    and natural.
- source_word: καὶ ἐτελεύτησεν καὶ ἐτάφη
  chosen: he both died and was buried
  alternatives:
  - he died and was buried
  - he came to his end and was buried
  lexicon: BDAG
  rationale: The correlative force of καί ... καί is represented by 'both ... and.'
    ἐτελεύτησεν means 'died' in this context; a more literal 'came to his end' is
    unnatural in English.
- source_word: τὸ μνῆμα αὐτοῦ
  chosen: his tomb
  alternatives:
  - his grave
  - his monument
  lexicon: BDAG
  rationale: μνῆμα refers to a burial place or tomb. 'Tomb' fits the context better
    than 'grave' because Peter points to a known burial site still present.
- source_word: ἔστιν ἐν ἡμῖν
  chosen: is among us
  alternatives:
  - is with us
  - is in our midst
  - is here with us
  lexicon: BDAG
  rationale: The phrase indicates presence in the community/location of the hearers.
    'Among us' is idiomatic and preserves the communal-local sense better than a strictly
    spatial 'with us.'
- source_word: ἄχρι τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: BDAG
  rationale: An established but still natural English rendering for the temporal idiom,
    preserving the sense that David's tomb remains present at the time of speaking.
