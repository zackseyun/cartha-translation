theological_decisions:
- issue: Rendering the opening vocative in a gender-accurate way
  chosen_reading: Men, brothers
  alternative_readings:
  - Brothers
  - Brothers and sisters
  rationale: The Greek explicitly uses two masculine vocatives, ἄνδρες and ἀδελφοί.
    In keeping with the translation philosophy's gender-accurate principle, both are
    preserved rather than neutralized. Because modern readers may hear 'brothers'
    as excluding women, the alternative inclusive sense is worth noting in a footnote
    without altering the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
