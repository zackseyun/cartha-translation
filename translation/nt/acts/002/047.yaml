id: ACT.2.47
reference: Acts 2:47
source:
  edition: SBLGNT
  text: αἰνοῦντες τὸν θεὸν καὶ ἔχοντες χάριν πρὸς ὅλον τὸν λαόν. ὁ δὲ κύριος προσετίθει
    τοὺς σῳζομένους καθ’ ἡμέραν ⸂ἐπὶ τὸ αὐτό⸃.
translation:
  text: praising God and having favor with all the people. And the Lord was adding
    day by day those who were being saved to their number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''together'' or ''in the same place'' for ''to their number'' (Greek:
      ἐπὶ τὸ αὐτό).'
    reason: alternative_reading
lexical_decisions:
- source_word: αἰνοῦντες
  chosen: praising
  alternatives:
  - giving praise to
  lexicon: BDAG
  rationale: Present participle describing the community’s ongoing activity. 'Praising'
    is natural English and preserves the durative sense without unnecessary expansion.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of αἰνοῦντες; standard rendering.
- source_word: ἔχοντες χάριν πρὸς ὅλον τὸν λαόν
  chosen: having favor with all the people
  alternatives:
  - enjoying the goodwill of all the people
  - having goodwill toward all the people
  lexicon: BDAG
  rationale: The idiom ἔχειν χάριν πρός commonly means to enjoy favor/goodwill in
    relation to someone rather than to show favor toward them. 'Having favor with
    all the people' stays close to the Greek while remaining idiomatic enough. 'All
    the people' preserves λαός with the article and likely refers to the broader populace.
- source_word: ὁ δὲ κύριος
  chosen: And the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the doctrinal default for Kyrios. The connective
    δέ is lightly represented by 'And' to maintain narrative flow.
- source_word: προσετίθει
  chosen: was adding
  alternatives:
  - kept adding
  - added
  lexicon: BDAG
  rationale: Imperfect verb indicates repeated or ongoing action. 'Was adding' preserves
    the imperfect aspect better than simple past 'added.'
- source_word: τοὺς σῳζομένους
  chosen: those who were being saved
  alternatives:
  - those being saved
  - the saved
  lexicon: BDAG
  rationale: Present passive participle is best represented progressively. This preserves
    the verbal/process sense without collapsing it into a static label such as 'the
    saved.'
- source_word: καθ’ ἡμέραν
  chosen: day by day
  alternatives:
  - daily
  lexicon: BDAG
  rationale: Idiomatic rendering that preserves the distributive sense of repeated
    action over successive days.
- source_word: ἐπὶ τὸ αὐτό
  chosen: to their number
  alternatives:
  - together
  - in the same place
  lexicon: BDAG
  rationale: In this context the phrase is text-critically and syntactically difficult.
    Given the flow after προσετίθει ('was adding'), the sense is addition to the existing
    group/community. 'To their number' makes explicit in natural English what is implied
    by the idiom here, while alternatives are preserved in a footnote because the
    phrase can elsewhere mean 'together' or 'in the same place.'
