theological_decisions:
- issue: Aspect and theology of salvation in τοὺς σῳζομένους
  chosen_reading: those who were being saved
  alternative_readings:
  - those being saved
  - those who had been saved
  - the saved
  rationale: The Greek present passive participle naturally presents salvation as
    an ongoing divine action viewed in process. This should be preserved rather than
    flattened into a completed-state expression. The wording does not adjudicate broader
    denominational debates about ordo salutis; it simply reflects the participial
    aspect in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of ἐπὶ τὸ αὐτό
  chosen_reading: to their number
  alternative_readings:
  - together
  - in the same place
  rationale: Because προσετίθει commonly takes a sense of adding to a group, and because
    English requires an explicit complement, 'to their number' best conveys the likely
    sense in context. Since the phrase itself can also mean 'together' or 'in the
    same place,' the alternative is preserved in a footnote rather than silently excluded.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where genuine.
