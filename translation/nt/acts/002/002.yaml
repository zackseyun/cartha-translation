id: ACT.2.2
reference: Acts 2:2
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἄφνω ἐκ τοῦ οὐρανοῦ ἦχος ὥσπερ φερομένης πνοῆς βιαίας καὶ ἐπλήρωσεν
    ὅλον τὸν οἶκον οὗ ἦσαν καθήμενοι,
translation:
  text: And suddenly there came from heaven a sound like that of a violent rushing
    wind, and it filled the whole house where they were sitting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sound like a mighty wind being driven along.' The Greek compares the
      sound to moving, forceful air; it does not explicitly say that an actual wind
      was present.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: there came
  alternatives:
  - there was
  - it happened
  lexicon: BDAG
  rationale: Uses idiomatic English existential/eventive wording that fits the impersonal
    narrative construction ἐγένετο ... ἦχος. 'There came' preserves the sense of an
    occurrence arising, more natural here than the wooden 'it happened' or the flatter
    'there was.'
- source_word: ἄφνω
  chosen: suddenly
  alternatives:
  - all at once
  lexicon: BDAG
  rationale: Standard adverbial rendering conveying abruptness without colloquial
    tone.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: '''Heaven'' is preferred over ''sky'' because in Luke-Acts οὐρανός in
    such contexts commonly carries the sense of the heavenly realm/source, not merely
    atmospheric location. ''From heaven'' also matches the theological force of divine
    origin.'
- source_word: ἦχος
  chosen: a sound
  alternatives:
  - a noise
  - a roar
  lexicon: BDAG
  rationale: '''Sound'' is the broad, semantically accurate choice. ''Noise'' can
    sound pejorative; ''roar'' is too specific and interpretive.'
- source_word: ὥσπερ
  chosen: like that of
  alternatives:
  - like
  - as if of
  lexicon: BDAG
  rationale: 'This wording clearly marks comparison rather than identity: the text
    says it was a sound like a violent wind, not necessarily that an actual wind itself
    was present.'
- source_word: φερομένης
  chosen: rushing
  alternatives:
  - being carried
  - driven
  - blowing
  lexicon: BDAG
  rationale: The participle literally means 'being borne/carried,' but in the collocation
    with πνοή it idiomatically describes movement of air. 'Rushing' captures the force
    and motion in natural English better than the overly literal 'being carried.'
- source_word: πνοῆς
  chosen: wind
  alternatives:
  - breath
  - blast
  lexicon: BDAG
  rationale: πνοή can denote breath, blowing, or wind. Here, with βιαίας and the auditory
    comparison, 'wind' best fits the scene. The verse compares the sound to a powerful
    moving air current, not to human breath.
- source_word: βιαίας
  chosen: violent
  alternatives:
  - mighty
  - forceful
  - strong
  lexicon: BDAG
  rationale: βίαιος denotes force/violence. 'Violent' is the most direct lexical equivalent.
    'Mighty' is traditional but less precise and can sound elevated rather than descriptive.
- source_word: ἐπλήρωσεν
  chosen: it filled
  alternatives:
  - it filled up
  lexicon: BDAG
  rationale: Simple past active rendering preserves the subject as the sound and keeps
    the narrative vivid. 'Filled up' is unnecessarily colloquial.
- source_word: ὅλον τὸν οἶκον
  chosen: the whole house
  alternatives:
  - the entire house
  lexicon: BDAG
  rationale: Natural English equivalent preserving the totality expressed by ὅλον.
- source_word: οὗ ἦσαν καθήμενοι
  chosen: where they were sitting
  alternatives:
  - where they were seated
  lexicon: BDAG
  rationale: Accurately renders the relative clause and imperfect periphrastic sense
    in clear modern English. 'Sitting' is slightly more natural than 'seated' for
    contemporary readers while preserving the scene.
