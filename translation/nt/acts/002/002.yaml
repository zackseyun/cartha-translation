theological_decisions:
- issue: Nature of the phenomenon described by the comparison to wind
  chosen_reading: 'The main text preserves the simile: a sound like that of a violent
    rushing wind.'
  alternative_readings:
  - a literal violent wind filled the house
  rationale: The Greek uses ὥσπερ to mark comparison. The translation avoids collapsing
    the simile into a literal statement about wind, preserving the text's wording
    and theological restraint.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
