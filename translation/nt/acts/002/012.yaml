id: ACT.2.12
reference: Acts 2:12
source:
  edition: SBLGNT
  text: ἐξίσταντο δὲ πάντες καὶ ⸀διηπόρουν, ἄλλος πρὸς ἄλλον λέγοντες· Τί ⸀θέλει τοῦτο
    εἶναι;
translation:
  text: And they all were amazed and perplexed, saying to one another, “What does
    this mean?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What does this want to be?'—an idiom meaning 'What
      does this mean?' or 'What is the significance of this?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  chosen: were amazed
  alternatives:
  - were beside themselves
  - were astounded
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing state of astonishment.
    'Were amazed' is natural modern English and fits the context of reaction to the
    miraculous speech. 'Were beside themselves' is more literal etymologically but
    sounds idiomatic in a potentially misleading way in contemporary English.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'And' best reflects the flow in readable English.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  - everyone
  lexicon: BDAG
  rationale: The explicit subject is supplied naturally in English from context, and
    'they all' preserves the distributive emphasis of πάντες.
- source_word: διηπόρουν
  chosen: were perplexed
  alternatives:
  - were at a loss
  - were greatly puzzled
  lexicon: BDAG
  rationale: The verb conveys puzzlement or uncertainty. 'Were perplexed' pairs well
    with 'were amazed' and preserves the imperfect sense of continuing bewilderment.
- source_word: ἄλλος πρὸς ἄλλον
  chosen: to one another
  alternatives:
  - one to another
  - each to the other
  lexicon: BDAG
  rationale: This reciprocal expression is idiomatically rendered 'to one another'
    in contemporary English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - speaking
  lexicon: BDAG
  rationale: The participle introduces the content of their speech. 'Saying' is the
    most direct and neutral rendering.
- source_word: Τί θέλει τοῦτο εἶναι;
  chosen: What does this mean?
  alternatives:
  - What does this want to be?
  - What is this intended to be?
  lexicon: BDAG
  rationale: The idiom τί θέλει + infinitive asks about the significance or meaning
    of an event. A formally closer rendering would be awkward in English, so 'What
    does this mean?' best captures the sense without over-paraphrasing.
