id: ACT.2.18
reference: Acts 2:18
source:
  edition: SBLGNT
  text: καί γε ἐπὶ τοὺς δούλους μου καὶ ἐπὶ τὰς δούλας μου ἐν ταῖς ἡμέραις ἐκείναις
    ἐκχεῶ ἀπὸ τοῦ πνεύματός μου, καὶ προφητεύσουσιν.
translation:
  text: Even on my male slaves and my female slaves in those days I will pour out
    from my Spirit, and they will prophesy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on my servants ... on my servant women.' The Greek terms can denote
      servants or slaves; here 'slaves' is used to preserve the socially low-status
      emphasis of the passage.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will pour out of my Spirit.' The Greek more literally says 'from my
      Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καί γε
  chosen: Even
  alternatives:
  - And indeed
  - Yes, even
  lexicon: BDAG
  rationale: The combination adds emphasis to the preceding statement. 'Even' captures
    the climactic force in natural English without overtranslating both particles
    separately.
- source_word: ἐπὶ τοὺς δούλους μου
  chosen: on my male slaves
  alternatives:
  - on my servants
  - on my male servants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave; per doctrine, 'slave' is preferred
    where bonded status is salient. Here the paired male/female forms and the social
    reversal in Joel/Acts make the low-status condition prominent. 'Male' is supplied
    to reflect the explicit contrast with δούλας.
- source_word: ἐπὶ τὰς δούλας μου
  chosen: on my female slaves
  alternatives:
  - on my servant women
  - on my female servants
  lexicon: BDAG
  rationale: δούλη is the feminine counterpart to δοῦλος. 'Female slaves' preserves
    the gender distinction present in Greek and matches the social-status emphasis
    of the passage.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A straightforward temporal phrase. 'In those days' is idiomatic and preserves
    the demonstrative emphasis.
- source_word: ἐκχεῶ
  chosen: I will pour out
  alternatives:
  - I will pour forth
  lexicon: BDAG
  rationale: Future active of ἐκχέω. 'Pour out' is the standard and natural rendering,
    preserving the metaphor of abundant divine giving.
- source_word: ἀπὸ τοῦ πνεύματός μου
  chosen: from my Spirit
  alternatives:
  - of my Spirit
  lexicon: BDAG
  rationale: The Greek uses ἀπό ('from'), not a simple genitive alone. 'From my Spirit'
    reflects the preposition directly while preserving the imagery of outpouring.
    'Of my Spirit' is traditional but less formally precise.
- source_word: προφητεύσουσιν
  chosen: they will prophesy
  alternatives:
  - they will speak prophetically
  lexicon: BDAG
  rationale: The future verb directly denotes prophesying. 'They will prophesy' is
    clear, concise, and preserves the biblical term without unnecessary paraphrase.
