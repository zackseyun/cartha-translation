theological_decisions:
- issue: Rendering of δοῦλος/δούλη in a socially marked, Spirit-outpouring context
  chosen_reading: male slaves / female slaves
  alternative_readings:
  - male servants / female servants
  - servants
  rationale: The doctrine file allows 'servant / slave' context-dependently and prefers
    'slave' where bonded nature is salient. In this verse the explicit mention of
    both male and female slaves underscores the surprising breadth of God's gift across
    low social status and gender lines; 'slave' best preserves that force.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation
    philosophy points 1 and 4'
- issue: Rendering of ἀπὸ τοῦ πνεύματός μου
  chosen_reading: from my Spirit
  alternative_readings:
  - of my Spirit
  rationale: This keeps the Greek preposition explicit and preserves the metaphorical
    nuance of an outpouring proceeding from God's Spirit, without making a doctrinal
    claim beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy point 1'
