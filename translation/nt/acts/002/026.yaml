theological_decisions:
- issue: Rendering of σάρξ in a resurrection-context citation
  chosen_reading: my flesh
  alternative_readings:
  - my body
  rationale: The verse quotes Psalm 16 in a context Peter later applies to resurrection.
    The Greek term is literal/anthropological here, not ethical. Following the doctrine
    table, 'flesh' is the default in literal contexts; 'body' is preserved as an alternative
    because some English traditions prefer it for clarity.
  doctrine_reference: 'DOCTRINE.md: Contested terms — σάρξ ''flesh (literal) / sinful
    nature (metaphorical)'''
- issue: Nuance of κατασκηνώσει ἐπ’ ἐλπίδι
  chosen_reading: will dwell in hope
  alternative_readings:
  - will rest in hope
  - will live in hope
  rationale: The phrase should preserve the imagery of secure dwelling rather than
    collapse it into mere emotional hopefulness. 'Will dwell in hope' keeps the metaphor
    and leaves the resurrection implication to the context rather than importing it
    directly into the wording.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
