id: ACT.2.26
reference: Acts 2:26
source:
  edition: SBLGNT
  text: διὰ τοῦτο ηὐφράνθη ⸂ἡ καρδία μου⸃ καὶ ἠγαλλιάσατο ἡ γλῶσσά μου, ἔτι δὲ καὶ
    ἡ σάρξ μου κατασκηνώσει ἐπ’ ἐλπίδι·
translation:
  text: Because of this my heart was glad, and my tongue rejoiced; moreover, even
    my flesh will dwell in hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my body will rest in hope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Because of this
  alternatives:
  - For this reason
  - Therefore
  lexicon: BDAG
  rationale: διά with the accusative τοῦτο expresses cause or basis. 'Because of this'
    preserves the causal force more explicitly than the more inferential 'therefore.'
- source_word: ηὐφράνθη
  chosen: was glad
  alternatives:
  - rejoiced
  - was made glad
  lexicon: BDAG
  rationale: The aorist passive here is idiomatically rendered as an intransitive/state
    expression in English. 'Was glad' is natural and fits the parallelism with the
    following verb.
- source_word: ἡ καρδία μου
  chosen: my heart
  lexicon: BDAG
  rationale: A straightforward rendering of the anthropological term; 'heart' preserves
    the biblical idiom for the inner person without over-interpreting it psychologically.
- source_word: ἠγαλλιάσατο
  chosen: rejoiced
  alternatives:
  - exulted
  - was overjoyed
  lexicon: BDAG
  rationale: The verb denotes exuberant joy. 'Rejoiced' is readable modern English
    and preserves the elevated tone without sounding archaic; 'exulted' is possible
    but less natural for many readers.
- source_word: ἡ γλῶσσά μου
  chosen: my tongue
  alternatives:
  - my mouth
  lexicon: BDAG
  rationale: The Greek says 'tongue,' likely as a poetic expression for vocal praise.
    The more literal rendering is retained rather than smoothing to 'mouth.'
- source_word: ἔτι δὲ καὶ
  chosen: moreover, even
  alternatives:
  - and further
  - indeed also
  - yes, even
  lexicon: BDAG
  rationale: This combination heightens and extends the statement. 'Moreover, even'
    captures both continuation and emphasis in idiomatic English.
- source_word: ἡ σάρξ μου
  chosen: my flesh
  alternatives:
  - my body
  lexicon: BDAG
  rationale: Per project guidance, σάρξ is rendered 'flesh' in literal contexts. Here
    the reference is to embodied existence in a citation about death and hope, not
    to 'sinful nature.' 'Body' is interpretive and less precise.
- source_word: κατασκηνώσει
  chosen: will dwell
  alternatives:
  - will live
  - will rest
  - will tabernacle
  lexicon: BDAG
  rationale: The future verb literally evokes dwelling or encamping. 'Will dwell'
    preserves the imagery and works naturally in English. 'Will rest' is a common
    interpretive rendering but narrows the sense.
- source_word: ἐπ’ ἐλπίδι
  chosen: in hope
  alternatives:
  - upon hope
  - with hope
  - in confident hope
  lexicon: BDAG
  rationale: ἐπί with the dative here conveys basis or sphere. 'In hope' is idiomatic
    and preserves the sense of hopeful security without adding interpretive qualifiers.
