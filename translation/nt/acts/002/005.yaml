id: ACT.2.5
reference: Acts 2:5
source:
  edition: SBLGNT
  text: Ἦσαν δὲ ⸀ἐν Ἰερουσαλὴμ κατοικοῦντες Ἰουδαῖοι, ἄνδρες εὐλαβεῖς ἀπὸ παντὸς ἔθνους
    τῶν ὑπὸ τὸν οὐρανόν·
translation:
  text: Now there were dwelling in Jerusalem Jews, devout men from every nation under
    heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judeans' for 'Jews'; here the context favors the broader ethnic-religious
      sense because they are said to be from every nation under heaven.
    reason: alternative_reading
  - marker: b
    text: The phrase 'under heaven' is a biblical idiom meaning throughout the world.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  chosen: Now there were
  alternatives:
  - And there were
  - Now there were
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Now'
    gives natural English discourse flow without overstating contrast.
- source_word: ἐν Ἰερουσαλὴμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Straightforward locative phrase; standard transliteration for the place
    name.
- source_word: κατοικοῦντες
  chosen: dwelling
  alternatives:
  - living
  - staying
  - residing
  lexicon: BDAG
  rationale: The participle denotes residing or living in a place. 'Dwelling' preserves
    the durative sense and fits the formal narrative style. 'Staying' could imply
    only temporary lodging, which is too weak.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In Acts this term can mean either ethnic-religious Jews or Judeans in
    a regional sense. Here, because they are described as being 'from every nation
    under heaven,' the broader ethnic-religious sense is most natural, not merely
    residents of Judea.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - people
  - males
  lexicon: BDAG
  rationale: ἀνήρ normally means 'man/men' rather than generic 'people.' Following
    the project's gender-accurate principle, 'men' is retained. The phrase likely
    characterizes these Jews as male representatives in the crowd.
- source_word: εὐλαβεῖς
  chosen: devout
  alternatives:
  - pious
  - reverent
  lexicon: BDAG
  rationale: The adjective conveys reverence and careful piety toward God. 'Devout'
    is idiomatic, accessible, and standard in this context.
- source_word: ἀπὸ παντὸς ἔθνους
  chosen: from every nation
  alternatives:
  - from every people
  - from every ethnic group
  lexicon: BDAG
  rationale: ἔθνος here refers to the nations of the world in a geographic-ethnic
    sense. 'Nation' is the most natural English rendering in this Lukan expression.
- source_word: τῶν ὑπὸ τὸν οὐρανόν
  chosen: under heaven
  alternatives:
  - under the sky
  - in the whole world
  lexicon: BDAG
  rationale: This is an idiomatic expression meaning throughout the inhabited world.
    'Under heaven' preserves the biblical idiom while remaining clear in English.
