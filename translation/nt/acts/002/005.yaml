theological_decisions:
- issue: Sense of Ἰουδαῖοι
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: The context describes persons gathered in Jerusalem but originating 'from
    every nation under heaven,' which points to diaspora Jews rather than merely inhabitants
    of Judea. Rendering as 'Jews' avoids an implausibly narrow regional sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gender rendering of ἄνδρες
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The Greek noun is specifically masculine, not the more generic ἄνθρωποι.
    Per the project's gender-accurate principle, the masculine form should be preserved
    rather than neutralized.
  doctrine_reference: Translation philosophy §4
