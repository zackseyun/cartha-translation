id: ACT.2.38
reference: Acts 2:38
source:
  edition: SBLGNT
  text: Πέτρος δὲ ⸂πρὸς αὐτούς· Μετανοήσατε⸃, καὶ βαπτισθήτω ἕκαστος ὑμῶν ⸀ἐπὶ τῷ
    ὀνόματι Ἰησοῦ Χριστοῦ εἰς ἄφεσιν ⸀τῶν ἁμαρτιῶν ⸀ὑμῶν, καὶ λήμψεσθε τὴν δωρεὰν
    τοῦ ἁγίου πνεύματος·
translation:
  text: And Peter said to them, “Repent, and let each of you be baptized in the name
    of Jesus Messiah for the forgiveness of your sins, and you will receive the gift
    of the Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered either 'Messiah'
      or 'Christ'; here 'Messiah' is used to preserve the title's meaning in Peter's
      proclamation.
    reason: alternative_reading
  - marker: b
    text: The phrase 'for the forgiveness of your sins' translates the Greek directly.
      Interpreters differ on how baptism relates to forgiveness here; the translation
      does not resolve that debate beyond the wording of the text.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετανοήσατε
  chosen: Repent
  alternatives:
  - Change your mind
  - Turn back
  lexicon: BDAG
  rationale: Aorist imperative plural calling for decisive repentance. 'Repent' is
    the standard concise rendering and best preserves both the cognitive and moral-volitional
    force without paraphrase.
- source_word: βαπτισθήτω
  chosen: let ... be baptized
  alternatives:
  - be baptized
  lexicon: BDAG
  rationale: Third-person aorist passive imperative singular, coordinated with the
    second-person plural imperative. 'Let each of you be baptized' reflects the distributive
    singular ἕκαστος and preserves the imperative force in natural English.
- source_word: ἕκαστος ὑμῶν
  chosen: each of you
  alternatives:
  - every one of you
  lexicon: BDAG
  rationale: Distributive expression emphasizing individual response within the group.
    'Each of you' is natural modern English and preserves the singular force.
- source_word: ἐπὶ τῷ ὀνόματι
  chosen: in the name of
  alternatives:
  - upon the name of
  - on the basis of the name of
  lexicon: BDAG
  rationale: The prepositional phrase with ἐπί + dative here is idiomatic in baptismal
    context. 'In the name of' is the clearest English equivalent and avoids over-specifying
    whether the nuance is basis, authority, or confession.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like element. In this proclamation context the titular
    sense is still active, so 'Jesus Messiah' preserves the messianic meaning.
- source_word: εἰς ἄφεσιν
  chosen: for the forgiveness
  alternatives:
  - for forgiveness
  - into forgiveness
  - with a view to forgiveness
  lexicon: BDAG
  rationale: ἄφεσις denotes release/forgiveness. 'For the forgiveness' is idiomatic
    and preserves the telic/result-oriented force of εἰς without forcing a narrower
    sacramental or merely symbolic interpretation.
- source_word: τῶν ἁμαρτιῶν ὑμῶν
  chosen: of your sins
  alternatives:
  - of your sin
  lexicon: BDAG
  rationale: Plural in Greek; 'sins' should be retained rather than flattened to singular.
- source_word: λήμψεσθε
  chosen: you will receive
  alternatives:
  - you shall receive
  lexicon: BDAG
  rationale: Future middle indicative, straightforward predictive promise. 'Will receive'
    is readable modern English.
- source_word: δωρεὰν
  chosen: gift
  alternatives:
  - free gift
  lexicon: BDAG
  rationale: The noun already carries the sense of a gift freely given; 'gift' is
    sufficient in English without redundancy.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering for the personal divine Spirit; avoids
    archaic diction while preserving theological weight.
