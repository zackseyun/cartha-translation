theological_decisions:
- issue: Relation of baptism and forgiveness in εἰς ἄφεσιν τῶν ἁμαρτιῶν ὑμῶν
  chosen_reading: Render the phrase transparently as 'for the forgiveness of your
    sins' without adding explanatory wording that would settle denominational debates
    about sacramental efficacy, sequence, or symbolism.
  alternative_readings:
  - '''so that your sins may be forgiven'''
  - '''because of the forgiveness of your sins'''
  rationale: The Greek should be translated directly while preserving theological
    tension. The verse is debated across Christian traditions, but the translation
    should not import a doctrinal resolution the text itself does not explicitly spell
    out.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Rendering Χριστοῦ
  chosen_reading: Translate as 'Messiah' rather than retain 'Christ' in the main text.
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be rendered 'Messiah' where
    it functions as a title. In Acts 2, Peter's proclamation is explicitly messianic
    in context.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ
    where name-like).'
