id: ACT.2.25
reference: Acts 2:25
source:
  edition: SBLGNT
  text: Δαυὶδ γὰρ λέγει εἰς αὐτόν· Προορώμην τὸν κύριον ἐνώπιόν μου διὰ παντός, ὅτι
    ἐκ δεξιῶν μού ἐστιν ἵνα μὴ σαλευθῶ.
translation:
  text: For David says concerning him, ‘I kept seeing the Lord before me continually,
    because he is at my right hand, so that I may not be shaken.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I foresaw the Lord before me always.' The Greek verb can, in some contexts,
      carry the sense 'foresee,' but here the surrounding phrases favor the sense
      of continually keeping the Lord before oneself.
    reason: lexical_alternative
  - marker: b
    text: Peter is quoting Psalm 16:8. In its Hebrew form, the underlying title is
      the divine name rendered in English translations as 'the LORD.'
    reason: cross_reference
lexical_decisions:
- source_word: λέγει εἰς αὐτόν
  chosen: says concerning him
  alternatives:
  - says to him
  - says about him
  lexicon: BDAG
  rationale: In this citation-introduction formula, εἰς with αὐτόν is idiomatic for
    speaking with reference to someone rather than direct address. 'Concerning him'
    best fits the context of Peter saying David speaks about the Messiah.
- source_word: Προορώμην
  chosen: I kept seeing
  alternatives:
  - I foresaw
  - I saw beforehand
  - I saw
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or customary action in the quoted
    Psalm. In context with ἐνώπιόν μου διὰ παντός, the sense is not predictive 'foresaw'
    but continual setting/seeing before oneself. 'I kept seeing' preserves the imperfect
    force in natural English.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' Here the article
    is retained naturally in English within the clause 'the Lord before me.'
- source_word: ἐνώπιόν μου
  chosen: before me
  alternatives:
  - in my presence
  - before my face
  lexicon: BDAG
  rationale: A straightforward spatial-relational rendering that is idiomatic and
    preserves the Psalmic imagery.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The phrase means continuously/constantly. 'Continually' fits the cadence
    of the sentence and reflects the durative sense.
- source_word: ἐκ δεξιῶν μού
  chosen: at my right hand
  alternatives:
  - on my right
  - from my right hand side
  lexicon: BDAG
  rationale: This idiom denotes position at one's right side, often implying support
    and protection. 'At my right hand' is the standard and natural English equivalent.
- source_word: ἵνα μὴ σαλευθῶ
  chosen: so that I may not be shaken
  alternatives:
  - that I may not be shaken
  - so that I will not be shaken
  - lest I be shaken
  lexicon: BDAG
  rationale: The conjunction ἵνα with the aorist passive subjunctive expresses purpose/result.
    'So that I may not be shaken' preserves the Greek construction without overinterpreting
    it as a simple future, while 'shaken' captures the metaphor of being moved from
    stability.
