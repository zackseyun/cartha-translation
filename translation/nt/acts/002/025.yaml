theological_decisions:
- issue: Referent of 'the Lord' in the Psalm citation as used by Peter
  chosen_reading: Retain 'the Lord' without specifying further in the translation
    text
  alternative_readings:
  - the LORD
  - the Messiah
  rationale: In Acts, Peter applies Psalm 16 christologically, but the quoted wording
    itself uses κύριον. The translation should preserve the wording of the citation
    and not replace it with an interpretive identification. 'The LORD' could reflect
    the Hebrew source of the Psalm, but the Greek text here reads κύριον and the project's
    default for κύριος is 'Lord.'
  doctrine_reference: 'Contested terms: κύριος → Lord; Preserve theological tension
    rather than resolve it.'
