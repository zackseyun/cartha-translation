theological_decisions:
- issue: Rendering of Ἄνδρες with gender specificity
  chosen_reading: Men of Judea
  alternative_readings:
  - People of Judea
  - Fellow Jews
  rationale: The Greek vocative ἄνδρες is explicitly masculine, and the translation
    philosophy calls for gender-accurate rendering rather than neutralization. No
    footnote is necessary because the masculine form is part of the source's intent
    in this public address.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
- issue: Whether ἀπεφθέγξατο should imply inspired/prophetic speech in the main text
  chosen_reading: addressed
  alternative_readings:
  - declared
  - spoke out
  rationale: Although the verb can be used for weighty or Spirit-empowered utterance
    in Acts, this verse itself introduces Peter's speech without explicitly stating
    inspiration in the verb alone. 'Addressed' preserves the public-speech function
    without adding theological interpretation beyond the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 and §3'
