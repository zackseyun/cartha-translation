id: ACT.2.14
reference: Acts 2:14
source:
  edition: SBLGNT
  text: Σταθεὶς δὲ ⸀ὁ Πέτρος σὺν τοῖς ἕνδεκα ἐπῆρεν τὴν φωνὴν αὐτοῦ καὶ ἀπεφθέγξατο
    αὐτοῖς· Ἄνδρες Ἰουδαῖοι καὶ οἱ κατοικοῦντες Ἰερουσαλὴμ ⸀πάντες, τοῦτο ὑμῖν γνωστὸν
    ἔστω καὶ ἐνωτίσασθε τὰ ῥήματά μου.
translation:
  text: 'But Peter, standing with the eleven, raised his voice and addressed them:
    “Men of Judea, and all who dwell in Jerusalem, let this be known to you, and listen
    to my words.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “lifted up his voice.”
    reason: lexical_alternative
  - marker: b
    text: Or “give ear to my words.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Σταθεὶς
  chosen: standing
  alternatives:
  - having stood
  - taking his stand
  lexicon: BDAG
  rationale: Aorist participle of ἵστημι used adverbially to set the scene. 'Standing'
    is natural English and preserves the posture/action without overtranslating.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks transition/contrast from the mockers' accusation in the previous
    verse. 'But' best reflects the discourse turn here.
- source_word: σὺν τοῖς ἕνδεκα
  chosen: with the eleven
  alternatives:
  - together with the eleven
  lexicon: BDAG
  rationale: σύν with dative denotes accompaniment. 'With the eleven' is concise and
    clear.
- source_word: ἐπῆρεν τὴν φωνὴν αὐτοῦ
  chosen: raised his voice
  alternatives:
  - lifted up his voice
  lexicon: BDAG
  rationale: Idiomatic expression meaning to speak loudly/publicly. 'Raised his voice'
    preserves the sense in readable modern English; 'lifted up his voice' is more
    traditional but less natural.
- source_word: ἀπεφθέγξατο
  chosen: addressed
  alternatives:
  - declared
  - spoke out
  - uttered forth
  lexicon: BDAG
  rationale: The verb can denote solemn or inspired public speech. 'Addressed' fits
    the direct speech introduction and public setting without importing more theological
    weight than the verse itself states.
- source_word: Ἄνδρες Ἰουδαῖοι
  chosen: Men of Judea
  alternatives:
  - Men, Jews
  - Judean men
  - Men of Judah
  lexicon: BDAG
  rationale: Vocative phrase addressing male hearers identified with Judea/Jewish
    identity. In this Jerusalem setting, 'Men of Judea' is the most natural and geographically
    grounded rendering. It also preserves the masculine vocative ἄνδρες per the gender-accurate
    policy.
- source_word: οἱ κατοικοῦντες Ἰερουσαλήμ πάντες
  chosen: all who dwell in Jerusalem
  alternatives:
  - all you who live in Jerusalem
  - all the residents of Jerusalem
  lexicon: BDAG
  rationale: Present participle κατοικοῦντες denotes those residing in Jerusalem.
    'Dwell' is slightly elevated but still readable and matches the public-address
    tone; πάντες is brought forward as 'all'.
- source_word: τοῦτο ὑμῖν γνωστὸν ἔστω
  chosen: let this be known to you
  alternatives:
  - let this be clear to you
  - know this
  lexicon: BDAG
  rationale: Imperatival ἔστω with predicate adjective γνωστόν expresses a formal
    announcement. 'Let this be known to you' preserves the declarative force better
    than the more compressed 'know this.'
- source_word: ἐνωτίσασθε
  chosen: listen
  alternatives:
  - give ear
  - pay attention
  lexicon: BDAG
  rationale: Aorist middle imperative meaning to hear attentively. 'Listen' is clear
    modern English; the stronger attentiveness is supported by the following object
    'to my words.'
- source_word: τὰ ῥήματά μου
  chosen: my words
  alternatives:
  - what I say
  - my message
  lexicon: BDAG
  rationale: ῥήματα refers to spoken words/sayings. 'My words' is the most direct
    rendering and avoids interpretive expansion to 'message.'
