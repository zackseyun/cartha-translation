id: ACT.2.22
reference: Acts 2:22
source:
  edition: SBLGNT
  text: Ἄνδρες Ἰσραηλῖται, ἀκούσατε τοὺς λόγους τούτους. Ἰησοῦν τὸν Ναζωραῖον, ἄνδρα
    ⸂ἀποδεδειγμένον ἀπὸ τοῦ θεοῦ⸃ εἰς ὑμᾶς δυνάμεσι καὶ τέρασι καὶ σημείοις οἷς ἐποίησεν
    δι’ αὐτοῦ ὁ θεὸς ἐν μέσῳ ὑμῶν, ⸀καθὼς αὐτοὶ οἴδατε,
translation:
  text: 'Men of Israel, hear these words: Jesus the Nazarene, a man attested to you
    by God with miracles and wonders and signs that God did through him in your midst,
    just as you yourselves know—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus of Nazareth' or 'Jesus the Nazorean.' The Greek title Ναζωραῖος
      can be rendered in more than one natural English form.
    reason: lexical_alternative
  - marker: b
    text: Or 'with mighty works and wonders and signs.' The Greek δυνάμεσι can be
      rendered more literally as 'powers' or idiomatically as 'miracles' in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες Ἰσραηλῖται
  chosen: Men of Israel
  alternatives:
  - Men, Israelites
  - Israelite men
  lexicon: BDAG
  rationale: Vocative plural ἄνδρες is explicitly masculine and is paired with the
    ethnic identifier Ἰσραηλῖται. Per gender-accurate philosophy, 'Men of Israel'
    preserves both the direct address and the masculine form better than a neutralized
    'People of Israel.'
- source_word: ἀκούσατε τοὺς λόγους τούτους
  chosen: hear these words
  alternatives:
  - listen to these words
  - hear this message
  lexicon: BDAG
  rationale: ἀκούσατε is an aorist imperative calling for attention. 'Hear these words'
    is idiomatic and close to the Greek. 'Message' would be more interpretive than
    λόγους warrants here.
- source_word: Ἰησοῦν τὸν Ναζωραῖον
  chosen: Jesus the Nazarene
  alternatives:
  - Jesus of Nazareth
  - Jesus the Nazorean
  lexicon: BDAG
  rationale: Ναζωραῖος is a designation tied to Jesus' origin/identity. 'The Nazarene'
    preserves the titular/descriptive force of the Greek better than the smoother
    geographic paraphrase 'of Nazareth,' while remaining natural English.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a male person
  lexicon: BDAG
  rationale: 'The noun plainly means ''man.'' Retaining it is important both lexically
    and christologically: Peter speaks of Jesus'' genuine humanity without denying
    his divinity.'
- source_word: ἀποδεδειγμένον ἀπὸ τοῦ θεοῦ
  chosen: attested to you by God
  alternatives:
  - accredited to you by God
  - approved by God among you
  - demonstrated by God
  lexicon: BDAG
  rationale: ἀποδεδειγμένον conveys being shown, demonstrated, or attested as genuine.
    'Attested' best captures public divine validation without importing later ecclesial
    language. ἀπὸ τοῦ θεοῦ is rendered 'by God' as the source/agent of this attestation.
- source_word: εἰς ὑμᾶς
  chosen: to you
  alternatives:
  - among you
  - before you
  lexicon: BDAG
  rationale: In this construction εἰς ὑμᾶς indicates direction toward the audience
    in the sense of presentation or attestation to them. 'To you' is the most direct
    rendering; 'among you' is better reserved for ἐν μέσῳ ὑμῶν later in the verse.
- source_word: δυνάμεσι καὶ τέρασι καὶ σημείοις
  chosen: with miracles and wonders and signs
  alternatives:
  - by mighty works and wonders and signs
  - with powers and wonders and signs
  lexicon: BDAG
  rationale: The triad is formulaic. δύναμις in this context refers to displays of
    divine power, and 'miracles' communicates that clearly in contemporary English.
    'Powers' is more literal but less clear; 'mighty works' is possible but less parallel
    to the following nouns.
- source_word: οἷς ἐποίησεν δι’ αὐτοῦ ὁ θεὸς
  chosen: that God did through him
  alternatives:
  - which God performed through him
  - with which God worked through him
  lexicon: BDAG
  rationale: The relative pronoun refers to the miracles/wonders/signs. The clause
    explicitly makes God the ultimate actor and Jesus the mediating agent. 'Did through
    him' is simple and faithful.
- source_word: ἐν μέσῳ ὑμῶν
  chosen: in your midst
  alternatives:
  - among you
  - in the middle of you
  lexicon: BDAG
  rationale: This idiom means 'among you' or 'in your midst.' 'In your midst' preserves
    the vividness and avoids repeating 'among you' after εἰς ὑμᾶς.
- source_word: καθὼς αὐτοὶ οἴδατε
  chosen: just as you yourselves know
  alternatives:
  - as you yourselves know
  - just as you know
  lexicon: BDAG
  rationale: αὐτοὶ is emphatic. 'You yourselves' preserves the emphasis, and 'just
    as' reflects καθώς naturally.
