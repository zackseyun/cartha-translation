theological_decisions:
- issue: Christological wording of ἄνδρα
  chosen_reading: Retain 'a man' in the main text
  alternative_readings:
  - a person
  - one
  rationale: The Greek explicitly says ἄνδρα. In context Peter affirms Jesus' true
    humanity and God's public attestation through his works. Rendering it more vaguely
    would mute the text's wording and unnecessarily avoid a statement fully compatible
    with Nicene and Chalcedonian orthodoxy.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon; Translation
    philosophy §4'
- issue: Agency in the miracle clause
  chosen_reading: 'Make God the subject of the works: ''that God did through him'''
  alternative_readings:
  - which he did among you
  - which God performed by him
  rationale: The Greek explicitly names ὁ θεὸς as subject and δι’ αὐτοῦ marks Jesus
    as the mediating agent. This preserves the verse's own presentation of divine
    action without flattening broader NT Christology.
  doctrine_reference: Translation philosophy §1; Preserve theological tension rather
    than resolve it
