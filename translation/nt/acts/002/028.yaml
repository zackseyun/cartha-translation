id: ACT.2.28
reference: Acts 2:28
source:
  edition: SBLGNT
  text: ἐγνώρισάς μοι ὁδοὺς ζωῆς, πληρώσεις με εὐφροσύνης μετὰ τοῦ προσώπου σου.
translation:
  text: You made known to me the paths of life; you will fill me with gladness in
    your presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the ways of life."
    reason: lexical_alternative
  - marker: b
    text: Literally, "with your face"; that is, "in your presence."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώρισάς
  chosen: you made known
  alternatives:
  - you have made known
  - you revealed
  lexicon: BDAG
  rationale: Aorist active indicative, second singular. 'Made known' preserves the
    causative sense of γνωρίζω more directly than the simpler 'knew.' English present
    perfect is possible in citation contexts, but simple past fits the Greek form
    and the quotation style here.
- source_word: μοι
  chosen: to me
  alternatives:
  - me
  lexicon: BDAG
  rationale: Dative pronoun marking the indirect object of ἐγνώρισάς. In English,
    'made known to me' is the most natural explicit rendering, though the pronoun
    can be absorbed idiomatically.
- source_word: ὁδοὺς ζωῆς
  chosen: the paths of life
  alternatives:
  - the ways of life
  - life's paths
  lexicon: BDAG
  rationale: 'ὁδός commonly means ''road, way, path.'' ''Paths'' is idiomatic and
    concrete while preserving the plural. The genitive ζωῆς is best taken attributively
    or epexegetically: paths characterized by or leading to life. ''Ways of life''
    is traditional and possible, but in contemporary English can sound like ''lifestyles,''
    which is misleading here.'
- source_word: πληρώσεις
  chosen: you will fill
  alternatives:
  - you shall fill
  - you will make full
  lexicon: BDAG
  rationale: Future active indicative, second singular. 'You will fill' is the straightforward
    future sense and fits the parallelism of the line.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of πληρώσεις; no special nuance beyond the straightforward
    accusative pronoun.
- source_word: εὐφροσύνης
  chosen: with gladness
  alternatives:
  - with joy
  - with rejoicing
  lexicon: BDAG
  rationale: 'Genitive after πληρόω expressing content: ''fill with.'' εὐφροσύνη denotes
    joy, gladness, festal delight. ''Gladness'' preserves the noun form and suits
    the elevated but readable tone. ''Joy'' is also possible but slightly less specific
    to the cheerful delight conveyed.'
- source_word: μετὰ τοῦ προσώπου σου
  chosen: in your presence
  alternatives:
  - before your face
  - with your face
  lexicon: BDAG
  rationale: Literally 'with your face,' an idiomatic Semitic/Greek expression for
    personal presence. 'In your presence' communicates the sense naturally in English
    without flattening the relational force. A more literal rendering would be awkward
    and potentially obscure.
