theological_decisions:
- issue: Rendering of divine-presence idiom in a Psalm citation applied in Peter's
    speech
  chosen_reading: in your presence
  alternative_readings:
  - before your face
  rationale: The phrase is not a doctrinal crux but carries theological weight because
    it speaks of joy in relation to God's immediate presence. The chosen rendering
    preserves that meaning in clear English while avoiding an overly literal expression
    that would sound unnatural. No doctrinal tension is resolved beyond normal idiomatic
    translation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
