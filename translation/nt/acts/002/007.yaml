theological_decisions:
- issue: Implied social/regional force of 'Galileans'
  chosen_reading: Retained the bare regional term without importing an explanatory
    gloss about accent, education, or status.
  alternative_readings:
  - Galileans from the north
  - uneducated Galileans
  rationale: The verse itself expresses surprise at the speakers' Galilean identity,
    but does not explicitly state why. Adding social explanation would import contextual
    inference into the translation rather than preserve the text's wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
