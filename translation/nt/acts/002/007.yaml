id: ACT.2.7
reference: Acts 2:7
source:
  edition: SBLGNT
  text: ἐξίσταντο ⸀δὲ καὶ ἐθαύμαζον ⸀λέγοντες· ⸀Οὐχ ἰδοὺ ⸀πάντες οὗτοί εἰσιν οἱ λαλοῦντες
    Γαλιλαῖοι;
translation:
  text: And they were astonished and amazed, saying, “Look, are not all these who
    are speaking Galileans?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold” or “See” for “Look.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  chosen: were astonished
  alternatives:
  - were beside themselves
  - were amazed
  lexicon: BDAG
  rationale: Imperfect middle/passive of ἐξίστημι here expresses being astounded or
    beside oneself. 'Were astonished' is natural modern English and preserves the
    force without sounding idiomatic in an opaque way.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural English equivalent in context.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  - even
  lexicon: BDAG
  rationale: 'Coordinates the two imperfect verbs, indicating cumulative reaction:
    they were astonished and amazed.'
- source_word: ἐθαύμαζον
  chosen: were amazed
  alternatives:
  - marveled
  - wondered
  lexicon: BDAG
  rationale: The verb denotes marveling or amazement. 'Were amazed' pairs well with
    the preceding imperfect and keeps the emotional force in clear contemporary English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: Present participle introducing the content of their speech. 'Saying'
    is the standard and sufficiently transparent rendering.
- source_word: Οὐχ
  chosen: are not
  alternatives:
  - is it not that
  - surely ... not
  lexicon: BDAG
  rationale: 'With the following question, οὐχ expects an affirmative answer. In English
    this is best conveyed by a negative question: ''are not all these...?''.'
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: An attention-getting particle. 'Look' is readable modern English and
    avoids archaic 'Behold' while preserving the deictic force.
- source_word: πάντες οὗτοί
  chosen: all these
  alternatives:
  - all these men
  - all of these
  lexicon: BDAG
  rationale: The phrase refers to the whole group under discussion. 'All these' is
    concise and accurate; 'men' is not explicit in the Greek here and is unnecessary.
- source_word: οἱ λαλοῦντες
  chosen: who are speaking
  alternatives:
  - who are talking
  - the ones speaking
  lexicon: BDAG
  rationale: Substantival present participle identifying the speakers. 'Who are speaking'
    is idiomatic and preserves the ongoing verbal action.
- source_word: Γαλιλαῖοι
  chosen: Galileans
  lexicon: BDAG
  rationale: Ethnic/regional designation. 'Galileans' is the straightforward translational
    equivalent and carries the implied surprise of their origin in context.
