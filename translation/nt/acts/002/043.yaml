theological_decisions:
- issue: Nuance of φόβος in response to apostolic signs
  chosen_reading: fear
  alternative_readings:
  - awe
  - reverent awe
  rationale: The verse describes the community's response to divine activity. Rendering
    φόβος as 'fear' preserves the lexical force and allows readers to sense both dread
    and awe without the translation resolving the nuance in one direction.
  doctrine_reference: Preserve theological tension rather than resolve it.
