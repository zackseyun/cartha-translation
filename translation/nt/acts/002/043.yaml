id: ACT.2.43
reference: Acts 2:43
source:
  edition: SBLGNT
  text: ⸀Ἐγίνετο δὲ πάσῃ ψυχῇ φόβος, πολλά ⸀τε τέρατα καὶ σημεῖα διὰ τῶν ἀποστόλων
    ἐγίνετο.
translation:
  text: And fear came upon every soul, and many wonders and signs were being done
    through the apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awe came upon everyone.' The Greek says literally 'fear came upon every
      soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγίνετο ... φόβος
  chosen: fear came
  alternatives:
  - fear was
  - there was fear
  lexicon: BDAG
  rationale: The imperfect of γίνομαι with predicate nominative φόβος is idiomatically
    rendered as something coming or arising. 'Fear came' preserves the inceptive/resultative
    sense in natural English better than the wooden 'fear was.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here marks continuation rather than strong contrast. 'And' gives smooth
    narrative flow in English without overstating contrast.
- source_word: πάσῃ ψυχῇ
  chosen: upon every soul
  alternatives:
  - on everyone
  - upon every person
  lexicon: BDAG
  rationale: Literally 'to every soul.' 'Upon every soul' preserves the Greek expression
    and its solemn tone. Although 'everyone' is idiomatic, 'soul' is transparent and
    natural enough here.
- source_word: φόβος
  chosen: fear
  alternatives:
  - awe
  - reverent fear
  lexicon: BDAG
  rationale: φόβος can denote fear or awe in response to divine activity. 'Fear' is
    the more direct lexical equivalent and preserves the text's tension; interpretive
    expansions like 'reverent fear' are more explanatory than translational.
- source_word: πολλά
  chosen: many
  alternatives:
  - numerous
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural English equivalent.
- source_word: τέρατα
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: BDAG
  rationale: In the common pair τέρατα καὶ σημεῖα, τέρατα emphasizes the astonishing
    character of the acts. 'Wonders' is the established and accurate rendering; 'miracles'
    would blur the distinction from σημεῖα.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  lexicon: BDAG
  rationale: σημεῖα highlights evidential/signifying function. 'Signs' preserves that
    nuance and complements 'wonders' in the paired expression.
- source_word: διὰ τῶν ἀποστόλων
  chosen: through the apostles
  alternatives:
  - by the apostles
  - through the hands of the apostles
  lexicon: BDAG
  rationale: διά with genitive normally indicates agency or instrumentality. 'Through
    the apostles' preserves that God is the implied ultimate actor while the apostles
    are the means.
- source_word: ἐγίνετο
  chosen: were being done
  alternatives:
  - were happening
  - were taking place
  lexicon: BDAG
  rationale: The second imperfect γίνομαι refers to the occurrence of the wonders
    and signs. 'Were being done' makes explicit in idiomatic English what is implied
    by the passive-like event sense in context and matches the instrumental phrase
    'through the apostles.'
