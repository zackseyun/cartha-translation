id: ACT.2.33
reference: Acts 2:33
source:
  edition: SBLGNT
  text: τῇ δεξιᾷ οὖν τοῦ θεοῦ ὑψωθεὶς τήν τε ἐπαγγελίαν τοῦ ⸂πνεύματος τοῦ ἁγίου⸃
    λαβὼν παρὰ τοῦ πατρὸς ἐξέχεεν τοῦτο ⸀ὃ ⸀ὑμεῖς βλέπετε καὶ ἀκούετε.
translation:
  text: Therefore, having been exalted to the right hand of God, and having received
    from the Father the promised Holy Spirit, he has poured out this that you yourselves
    are seeing and hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the right hand of God.' The Greek dative can be understood either
      as location/exaltation ('to the right hand') or instrument ('by the right hand').
    reason: alternative_reading
  - marker: b
    text: Or 'the promise of the Holy Spirit.' The Greek may be read either as the
      Spirit himself being the promised gift or as the promise concerning the Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δεξιᾷ
  chosen: to the right hand
  alternatives:
  - by the right hand
  lexicon: BDAG
  rationale: The dative with ὑψωθείς can be taken locatively/instrumentally. In this
    context, 'to the right hand of God' best fits the exaltation motif and the parallel
    with enthronement language in the surrounding passage. The instrumental alternative
    ('by the right hand of God') is possible and worth preserving in a footnote.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding argument about Jesus' resurrection
    and Davidic prophecy. 'Therefore' preserves the logical force more clearly than
    the lighter 'so' or merely sequential 'then'.
- source_word: ὑψωθεὶς
  chosen: having been exalted
  alternatives:
  - being exalted
  - having been lifted up
  lexicon: BDAG
  rationale: Aorist passive participle referring to Jesus' exaltation by God. 'Exalted'
    captures the theological sense of enthronement better than the more literal but
    potentially ambiguous 'lifted up'.
- source_word: ἐπαγγελίαν
  chosen: the promised
  alternatives:
  - the promise
  lexicon: BDAG
  rationale: The phrase τὴν ἐπαγγελίαν τοῦ πνεύματος τοῦ ἁγίου can mean either 'the
    promise of the Holy Spirit' or, by sense, 'the promised Holy Spirit.' Rendering
    it as 'the promised Holy Spirit' makes clear that what is received and then poured
    out is the Spirit himself, which the following τοῦτο supports.
- source_word: τοῦ πνεύματος τοῦ ἁγίου
  chosen: Holy Spirit
  alternatives:
  - the Holy Spirit
  - the promise of the Holy Spirit
  lexicon: BDAG
  rationale: Standard rendering of the genitive phrase. In combination with ἐπαγγελίαν,
    the translation is expressed idiomatically as 'the promised Holy Spirit' rather
    than the more wooden 'the promise of the Holy Spirit.'
- source_word: λαβὼν παρὰ τοῦ πατρὸς
  chosen: having received from the Father
  alternatives:
  - after receiving from the Father
  lexicon: BDAG
  rationale: Aorist participle indicating antecedent action relative to the main verb.
    'From the Father' preserves παρά with genitive as source.
- source_word: πατρὸς
  chosen: the Father
  alternatives:
  - his Father
  lexicon: BDAG
  rationale: The article supports the titular use 'the Father,' which is idiomatic
    and theologically significant in Luke-Acts.
- source_word: ἐξέχεεν
  chosen: he has poured out
  alternatives:
  - he poured out
  lexicon: BDAG
  rationale: Aorist indicative narrates the completed act whose effects are presently
    evident in what the audience sees and hears. English present perfect communicates
    that present-result nuance naturally in context.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this gift
  - this Spirit
  lexicon: BDAG
  rationale: The demonstrative is left as 'this' to match the Greek's compactness
    and allow the referent to be understood from context as the manifested outpouring
    of the Spirit. Expanding to 'this gift' or 'this Spirit' would interpret beyond
    the explicit wording.
- source_word: ὃ
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: Introduces the object clause referring to what the audience is perceiving.
    'That' is more natural in contemporary English after 'this' than 'which'.
- source_word: ὑμεῖς
  chosen: you yourselves
  alternatives:
  - you
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. 'You yourselves' preserves
    that emphasis without awkwardness.
- source_word: βλέπετε καὶ ἀκούετε
  chosen: are seeing and hearing
  alternatives:
  - see and hear
  lexicon: BDAG
  rationale: Present indicatives describe the crowd's immediate perception of the
    Pentecost phenomena. Progressive English reflects the vivid present context well.
