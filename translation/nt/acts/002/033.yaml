theological_decisions:
- issue: Whether τῇ δεξιᾷ τοῦ θεοῦ means exaltation 'to' God's right hand or exaltation
    'by' God's right hand
  chosen_reading: to the right hand of God
  alternative_readings:
  - by the right hand of God
  rationale: The immediate context emphasizes Jesus' enthronement and fulfillment
    of Psalm 110 in Peter's speech. Rendering the phrase locatively preserves the
    exaltation-to-enthronement sense without denying that divine power is involved.
    The instrumental alternative is preserved in a footnote because the Greek dative
    permits it.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Whether τὴν ἐπαγγελίαν τοῦ πνεύματος τοῦ ἁγίου should be rendered woodenly
    as 'the promise of the Holy Spirit' or idiomatically as 'the promised Holy Spirit'
  chosen_reading: the promised Holy Spirit
  alternative_readings:
  - the promise of the Holy Spirit
  rationale: 'The syntax allows either a promise concerning the Spirit or the Spirit
    as the promised gift. Because the next clause says ''he has poured out this,''
    the referent is best understood as the Spirit given and poured out. The idiomatic
    rendering communicates the sense clearly while preserving orthodox Trinitarian
    distinction: the Son receives from the Father and pours out the Spirit.'
  doctrine_reference: 'Affirmations; Translation philosophy: optimal equivalence'
