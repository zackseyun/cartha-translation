theological_decisions:
- issue: Messianic royal promise to David
  chosen_reading: Retained the dynastic and enthronement language without importing
    'Messiah' into the verse itself.
  alternative_readings:
  - Paraphrasing as 'the Messiah would sit on his throne'
  rationale: In context Peter applies the Davidic oath to Jesus, but this verse itself
    states the oath in terms of David's descendant and throne. The translation preserves
    the wording of the promise and lets the surrounding context make the christological
    application.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
