id: ACT.2.30
reference: Acts 2:30
source:
  edition: SBLGNT
  text: προφήτης οὖν ὑπάρχων, καὶ εἰδὼς ὅτι ὅρκῳ ὤμοσεν αὐτῷ ὁ θεὸς ἐκ καρποῦ τῆς
    ὀσφύος ⸀αὐτοῦ καθίσαι ἐπὶ ⸂τὸν θρόνον⸃ αὐτοῦ,
translation:
  text: Therefore, since he was a prophet and knew that God had sworn to him with
    an oath to seat one from the fruit of his loins on his throne,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one of his descendants.' Literally, 'from the fruit of his loins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προφήτης
  chosen: prophet
  lexicon: BDAG
  rationale: Standard rendering for one who speaks by divine revelation; no contextual
    reason to soften or paraphrase.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks inference from the previous argument about David; 'therefore' best
    preserves the logical connection in English.
- source_word: ὑπάρχων
  chosen: since he was
  alternatives:
  - being
  - as he was
  lexicon: BDAG
  rationale: Participial construction giving circumstance/cause. 'Since he was' is
    natural English and preserves the causal force better than a bare 'being.'
- source_word: εἰδὼς
  chosen: knew
  alternatives:
  - knowing
  lexicon: BDAG
  rationale: Aorist participle coordinated with ὑπάρχων; finite English verb reads
    naturally while preserving the sense.
- source_word: ὅρκῳ ὤμοσεν
  chosen: had sworn to him with an oath
  alternatives:
  - swore to him
  - solemnly swore to him
  lexicon: BDAG
  rationale: The dative noun plus verb intensifies the act of swearing. Rendering
    both elements preserves the emphatic solemnity.
- source_word: ἐκ καρποῦ τῆς ὀσφύος αὐτοῦ
  chosen: one from the fruit of his loins
  alternatives:
  - one of the fruit of his body
  - one of his descendants
  lexicon: BDAG
  rationale: This phrase is an idiom for physical descent. 'Fruit of his loins' preserves
    the concrete imagery and genealogical emphasis of the Greek more closely than
    the flattened 'descendants.'
- source_word: καθίσαι
  chosen: to seat
  alternatives:
  - to cause to sit
  - to set
  lexicon: BDAG
  rationale: 'The aorist infinitive with God as subject is causative: God would seat/install
    the descendant. ''To seat'' preserves that causative nuance better than simply
    ''to sit.'''
- source_word: ἐπὶ τὸν θρόνον αὐτοῦ
  chosen: on his throne
  alternatives:
  - upon his throne
  lexicon: BDAG
  rationale: Standard idiomatic rendering for enthronement language. The final αὐτοῦ
    most naturally refers to David, fitting the promise of a descendant on David's
    throne.
