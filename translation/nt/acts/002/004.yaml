id: ACT.2.4
reference: Acts 2:4
source:
  edition: SBLGNT
  text: καὶ ἐπλήσθησαν ⸀πάντες πνεύματος ἁγίου, καὶ ἤρξαντο λαλεῖν ἑτέραις γλώσσαις
    καθὼς τὸ πνεῦμα ἐδίδου ⸂ἀποφθέγγεσθαι αὐτοῖς⸃.
translation:
  text: And they were all filled with the Holy Spirit and began to speak in other
    tongues, as the Spirit was giving them utterance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'other languages.' The Greek word can mean either 'tongues' or 'languages';
      the following context indicates that the speech was understood as real human
      languages by the hearers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθησαν
  chosen: were filled
  alternatives:
  - were fulfilled
  - were made full
  lexicon: BDAG
  rationale: Aorist passive of πίμπλημι here denotes being filled or endowed. 'Were
    filled' is the standard and most natural English equivalent in this context of
    Spirit-empowerment.
- source_word: πάντες
  chosen: all
  alternatives:
  - every one
  lexicon: BDAG
  rationale: The nominative plural adjective emphasizes the totality of the group
    present. 'All' is concise and accurate.
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article here, English idiom normally uses
    the article in this construction after 'filled with.' In Acts, πνεῦμα ἅγιον/πνεύματος
    ἁγίου regularly refers to the divine Holy Spirit, not an impersonal disposition.
- source_word: ἤρξαντο λαλεῖν
  chosen: began to speak
  alternatives:
  - started speaking
  lexicon: BDAG
  rationale: The ingressive sense of ἄρχομαι with infinitive is well represented by
    'began to speak.' This preserves the narrative onset of the action.
- source_word: ἑτέραις γλώσσαις
  chosen: in other tongues
  alternatives:
  - in other languages
  - with other tongues
  lexicon: BDAG
  rationale: γλῶσσαι can mean either 'tongues' or 'languages.' Because the immediate
    context in Acts 2 goes on to describe recognizable ethnic languages, 'languages'
    is a strong interpretive option; however, 'tongues' preserves the lexical form
    and leaves the narrative development to clarify the nature of the speech. 'Other'
    reflects ἑτέραις, indicating languages/tongues different from their own ordinary
    speech.
- source_word: καθὼς
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: BDAG
  rationale: Here καθώς introduces the manner or measure according to which they spoke.
    'As' is natural and sufficient.
- source_word: ἐδίδου
  chosen: was giving
  alternatives:
  - gave
  - kept giving
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or progressive action. 'Was giving' best
    captures the Spirit's continuing enablement as they spoke.
- source_word: ἀποφθέγγεσθαι
  chosen: utterance
  alternatives:
  - to speak out
  - to declare aloud
  - inspired speech
  lexicon: BDAG
  rationale: The infinitive denotes speaking out or uttering forth, often with solemn
    or public force. Rendering the clause 'was giving them utterance' is idiomatic
    English and preserves the sense of enabled speech without over-interpreting it
    as prophecy alone.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: The dative is naturally expressed in English as the indirect object of
    'was giving.' 'Them' is idiomatic in this construction.
