theological_decisions:
- issue: Whether πνεύματος ἁγίου should be rendered as a personal divine reference
    or a generic 'holy spirit.'
  chosen_reading: the Holy Spirit
  alternative_readings:
  - holy spirit
  rationale: In Acts 2 the referent is clearly the divine Spirit promised by Jesus
    and active as the agent empowering speech in the following clause. Capitalization
    and the definite English form communicate personhood and specificity without importing
    extra doctrine beyond the narrative.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Whether γλώσσαις should be rendered 'tongues' or 'languages.'
  chosen_reading: other tongues
  alternative_readings:
  - other languages
  rationale: The Greek term can denote either tongues or languages. Because Acts 2:6–11
    clarifies that hearers recognized their own languages, 'languages' is interpretively
    attractive. However, the immediate verse itself uses γλῶσσαις, and 'tongues' preserves
    the lexical ambiguity and lets the surrounding context define the phenomenon.
    This follows the principle of preserving tension rather than prematurely resolving
    it.
  doctrine_reference: Translation philosophy §3
