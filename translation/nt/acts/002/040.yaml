id: ACT.2.40
reference: Acts 2:40
source:
  edition: SBLGNT
  text: ἑτέροις τε λόγοις πλείοσιν διεμαρτύρατο, καὶ παρεκάλει ⸀αὐτοὺς λέγων· Σώθητε
    ἀπὸ τῆς γενεᾶς τῆς σκολιᾶς ταύτης.
translation:
  text: And with many other words he solemnly testified and kept urging them, saying,
    “Be saved from this crooked generation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Save yourselves from this crooked generation.” The Greek verb is passive
      (“be saved”), but some translations render it more actively to reflect the hearers’
      needed response.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑτέροις τε λόγοις πλείοσιν
  chosen: with many other words
  alternatives:
  - with many more words
  - with other, more numerous words
  lexicon: BDAG
  rationale: The dative phrase is instrumental/associative, introducing the manner/content
    of Peter's continued speech. 'Many other words' is idiomatic English and preserves
    both ἑτέροις ('other') and πλείοσιν ('more/many').
- source_word: διεμαρτύρατο
  chosen: he solemnly testified
  alternatives:
  - he bore solemn witness
  - he earnestly warned
  lexicon: BDAG
  rationale: διαμαρτύρομαι carries the sense of emphatic or solemn testimony/attestation.
    'Solemnly testified' preserves the formal witness-bearing nuance better than a
    flatter 'testified' while avoiding overinterpretation as mere warning.
- source_word: παρεκάλει
  chosen: kept urging
  alternatives:
  - exhorted
  - appealed to
  - encouraged
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Kept urging' captures
    both the durative aspect and the exhortational force of παρακαλέω in this context
    more naturally than the more formal 'exhorted'.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring to Peter's hearers; standard pronoun rendering.
- source_word: Σώθητε
  chosen: Be saved
  alternatives:
  - Save yourselves
  - Be rescued
  lexicon: BDAG
  rationale: The aorist passive imperative of σῴζω is most naturally rendered 'Be
    saved.' Although in context it functions as a call for the hearers to respond,
    the passive form should be preserved rather than converted to the more reflexive
    'Save yourselves,' which can overstate human agency.
- source_word: ἀπὸ
  chosen: from
  alternatives:
  - away from
  - out of
  lexicon: BDAG
  rationale: Standard separative sense; 'from' is the most natural English equivalent
    here.
- source_word: γενεᾶς
  chosen: generation
  alternatives:
  - people
  - age
  lexicon: BDAG
  rationale: γενεά commonly denotes a generation or contemporaneous people-group.
    'Generation' preserves the lexical form and echoes biblical usage without unnecessary
    paraphrase.
- source_word: σκολιᾶς
  chosen: crooked
  alternatives:
  - perverse
  - twisted
  lexicon: BDAG
  rationale: '''Crooked'' is a direct and vivid rendering of σκολιός, preserving the
    moral metaphor. ''Perverse'' is traditional and possible, but ''crooked'' more
    transparently reflects the underlying image in contemporary English.'
