theological_decisions:
- issue: Voice and agency in Σώθητε
  chosen_reading: Be saved
  alternative_readings:
  - Save yourselves
  rationale: The Greek imperative is passive, and the translation preserves that form
    to avoid importing a stronger statement of autonomous human self-rescue than the
    text makes. At the same time, the imperative still communicates a real summons
    to respond.
  doctrine_reference: Preserve theological tension rather than resolve it.
