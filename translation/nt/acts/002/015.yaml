id: ACT.2.15
reference: Acts 2:15
source:
  edition: SBLGNT
  text: οὐ γὰρ ὡς ὑμεῖς ὑπολαμβάνετε οὗτοι μεθύουσιν, ἔστιν γὰρ ὥρα τρίτη τῆς ἡμέρας,
translation:
  text: For these are not drunk, as you suppose, since it is the third hour of the
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about nine in the morning by Jewish reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - Indeed ... not
  - Because ... not
  lexicon: BDAG
  rationale: γάρ gives explanatory force connecting to the previous verse; 'For' is
    natural English and preserves the argumentative sense. οὐ straightforwardly negates
    the claim.
- source_word: ὡς ὑμεῖς ὑπολαμβάνετε
  chosen: as you suppose
  alternatives:
  - as you assume
  - as you think
  lexicon: BDAG
  rationale: ὑπολαμβάνω here means 'suppose/assume/think.' 'Suppose' fits idiomatic
    modern English and preserves the direct address marked by ὑμεῖς.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these men
  - these people
  lexicon: BDAG
  rationale: The demonstrative refers to the group accused of drunkenness. 'These'
    is the most direct rendering; adding 'men' or 'people' would interpret beyond
    the explicit Greek.
- source_word: μεθύουσιν
  chosen: are drunk
  alternatives:
  - are getting drunk
  - are intoxicated
  lexicon: BDAG
  rationale: The present indicative in context describes the alleged state of intoxication.
    'Are drunk' is the most natural English equivalent here.
- source_word: ἔστιν γὰρ ὥρα τρίτη τῆς ἡμέρας
  chosen: since it is the third hour of the day
  alternatives:
  - for it is the third hour of the day
  - because it is the third hour of the day
  lexicon: BDAG
  rationale: This clause gives the reason Peter rejects the accusation. Retaining
    'third hour of the day' preserves the Jewish time expression rather than converting
    it in the main text to a modern clock time.
- source_word: ὥρα τρίτη
  chosen: the third hour
  alternatives:
  - about nine in the morning
  lexicon: BDAG
  rationale: A formally closer rendering is preferred in the main text, while the
    modern equivalent is useful in a footnote for readability.
