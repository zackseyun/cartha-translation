theological_decisions:
- issue: Resurrection wording
  chosen_reading: God raised up this Jesus
  alternative_readings:
  - God raised this Jesus
  - God caused this Jesus to rise
  rationale: The verse explicitly attributes Jesus' resurrection to God. The translation
    preserves that claim directly without importing further doctrinal explanation.
    'Raised up' communicates resurrection clearly and idiomatically.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
