id: ACT.2.32
reference: Acts 2:32
source:
  edition: SBLGNT
  text: τοῦτον τὸν Ἰησοῦν ἀνέστησεν ὁ θεός, οὗ πάντες ἡμεῖς ἐσμεν μάρτυρες.
translation:
  text: God raised up this Jesus, of whom we all are witnesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God raised this Jesus.' The Greek verb refers here to resurrection.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον τὸν Ἰησοῦν
  chosen: this Jesus
  alternatives:
  - this Jesus here
  - Jesus, this one
  lexicon: BDAG
  rationale: The demonstrative τοῦτον is emphatic and points specifically to Jesus
    just mentioned. 'This Jesus' preserves the deictic force more naturally than smoothing
    to simply 'Jesus.'
- source_word: ἀνέστησεν
  chosen: raised up
  alternatives:
  - raised
  - caused to rise
  lexicon: BDAG
  rationale: In this context ἀνίστημι refers to resurrection. 'Raised up' is idiomatic
    English and preserves the transitive sense with God as subject. 'Raised' is possible,
    but 'raised up' reflects common biblical usage without obscuring meaning.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: The explicit subject is retained plainly as 'God.' No article is needed
    in English.
- source_word: οὗ
  chosen: of whom
  alternatives:
  - to whom
  - for whom
  lexicon: BDAG
  rationale: The genitive relative pronoun naturally yields 'of whom' with μάρτυρες
    in the sense 'witnesses of [someone/something].' This is the most straightforward
    rendering of the Greek construction.
- source_word: πάντες ἡμεῖς
  chosen: we all
  alternatives:
  - all of us
  - all we
  lexicon: BDAG
  rationale: The combination is emphatic. 'We all' preserves the emphasis in natural
    English word order.
- source_word: ἐσμεν μάρτυρες
  chosen: are witnesses
  alternatives:
  - are testifiers
  - bear witness
  lexicon: BDAG
  rationale: μάρτυρες is a noun, not a finite verb, so 'are witnesses' best reflects
    the Greek structure. It denotes those who testify to the resurrection event.
