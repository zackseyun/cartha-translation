id: ACT.2.19
reference: Acts 2:19
source:
  edition: SBLGNT
  text: καὶ δώσω τέρατα ἐν τῷ οὐρανῷ ἄνω καὶ σημεῖα ἐπὶ τῆς γῆς κάτω, αἷμα καὶ πῦρ
    καὶ ἀτμίδα καπνοῦ·
translation:
  text: 'And I will give wonders in the heaven above and signs on the earth below:
    blood and fire and a cloud of smoke.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'vapor of smoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δώσω
  chosen: I will give
  alternatives:
  - I will show
  - I will grant
  lexicon: BDAG
  rationale: The future of δίδωμι is most directly 'I will give.' Although English
    idiom might prefer 'show' in this prophetic context, 'give' preserves the verbal
    force of the Greek and echoes the scriptural register of God appointing or setting
    signs.
- source_word: τέρατα
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: BDAG
  rationale: τέρατα commonly denotes extraordinary phenomena that evoke awe. 'Wonders'
    is the most natural English equivalent here and pairs well with 'signs.' 'Portents'
    is possible, especially in apocalyptic context, but is less common in contemporary
    English; 'miracles' is too narrow because the listed phenomena are cosmic signs,
    not only acts of healing or power.
- source_word: ἐν τῷ οὐρανῷ ἄνω
  chosen: in the heaven above
  alternatives:
  - in heaven above
  - in the sky above
  lexicon: BDAG
  rationale: οὐρανός can mean 'heaven' or 'sky.' In this Joel citation with cosmic
    imagery contrasted with 'earth below,' 'heaven' best preserves the elevated biblical
    register and the vertical pairing. 'In the heaven above' reflects the article
    and the adverb ἄνω without becoming unnatural.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - omens
  - tokens
  lexicon: BDAG
  rationale: σημεῖα is regularly rendered 'signs' in biblical English and denotes
    meaningful indicators rather than merely strange events. This also preserves the
    common pairing τέρατα καὶ σημεῖα as 'wonders and signs.'
- source_word: ἐπὶ τῆς γῆς κάτω
  chosen: on the earth below
  alternatives:
  - upon the earth below
  - on the land below
  lexicon: BDAG
  rationale: γῆ can mean 'earth,' 'land,' or 'ground.' In contrast with 'the heaven
    above,' the global/cosmic sense 'earth' is clearly intended. 'On' is the most
    natural rendering of ἐπί here.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: A straightforward lexical rendering; the term is part of the sequence
    of apocalyptic signs and should remain concrete.
- source_word: πῦρ
  chosen: fire
  lexicon: BDAG
  rationale: A direct rendering preserving the vivid, elemental imagery of the prophecy.
- source_word: ἀτμίδα καπνοῦ
  chosen: a cloud of smoke
  alternatives:
  - vapor of smoke
  - smoke mist
  lexicon: BDAG
  rationale: ἀτμίς denotes vapor, steam, or mist. In English, 'vapor of smoke' is
    formally close but awkward. 'A cloud of smoke' communicates the image naturally
    while preserving the sense of a visible smoky mass. The alternative 'vapor of
    smoke' is worth preserving in a footnote because it is more formally literal.
