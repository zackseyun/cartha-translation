theological_decisions:
- issue: Rendering the cosmic locations in a Joel citation
  chosen_reading: heaven above ... earth below
  alternative_readings:
  - sky above ... land below
  rationale: The verse presents cosmic, apocalyptic signs in a heaven/earth contrast.
    Rendering οὐρανός as 'heaven' and γῆ as 'earth' preserves the prophetic scope
    and avoids narrowing the imagery to merely meteorological or local phenomena.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
