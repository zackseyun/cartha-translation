id: ACT.2.6
reference: Acts 2:6
source:
  edition: SBLGNT
  text: γενομένης δὲ τῆς φωνῆς ταύτης συνῆλθε τὸ πλῆθος καὶ συνεχύθη, ὅτι ⸀ἤκουον
    εἷς ἕκαστος τῇ ἰδίᾳ διαλέκτῳ λαλούντων αὐτῶν·
translation:
  text: And when this sound occurred, the crowd came together and was bewildered,
    because each one was hearing them speaking in his own dialect.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his own language.' The Greek word can refer more broadly to a language,
      though 'dialect' more closely reflects Luke's wording.
    reason: lexical_alternative
  - marker: b
    text: Greek 'each one ... in his own dialect'; many English versions use 'their
      own language' for smoother contemporary style.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης ... τῆς φωνῆς ταύτης
  chosen: when this sound occurred
  alternatives:
  - when this sound happened
  - when this noise came about
  - after this sound occurred
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. φωνή can mean sound,
    noise, or voice; here the referent is the audible phenomenon of Pentecost, so
    'sound' is the most natural English choice without over-specifying.
- source_word: δέ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ functions as a mild connective. 'And' preserves the narrative flow
    in readable English.
- source_word: συνῆλθε
  chosen: came together
  alternatives:
  - assembled
  - gathered together
  lexicon: BDAG
  rationale: συνέρχομαι here describes the crowd's movement into one place. 'Came
    together' is natural and close to the Greek.
- source_word: τὸ πλῆθος
  chosen: the crowd
  alternatives:
  - the multitude
  - the assembled crowd
  lexicon: BDAG
  rationale: πλῆθος denotes a large group of people. 'Crowd' is idiomatic modern English
    and fits the scene better than the more traditional 'multitude.'
- source_word: συνεχύθη
  chosen: was bewildered
  alternatives:
  - was confused
  - was thrown into confusion
  lexicon: BDAG
  rationale: συγχέω in the passive can mean to be confused or disturbed. 'Was bewildered'
    captures the crowd's disorientation in context while sounding natural in English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the crowd's bewilderment.
- source_word: ἤκουον
  chosen: was hearing
  alternatives:
  - heard
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated perception. English often
    smooths this to 'heard,' but 'was hearing' better preserves the aspect here, showing
    the continuing phenomenon.
- source_word: εἷς ἕκαστος
  chosen: each one
  alternatives:
  - every one
  - each person
  lexicon: BDAG
  rationale: 'The distributive force is emphatic: each individual in the crowd experienced
    this personally. ''Each one'' preserves that emphasis.'
- source_word: τῇ ἰδίᾳ διαλέκτῳ
  chosen: in his own dialect
  alternatives:
  - in his own language
  - in their own dialect
  lexicon: BDAG
  rationale: διάλεκτος refers to a language or dialect, often a regional/native speech
    form. 'Dialect' preserves the lexical distinction from broader terms for language
    and matches Luke's wording. The singular distributive construction supports 'his
    own' with 'each one,' though English readers may understand it generically.
- source_word: λαλούντων αὐτῶν
  chosen: them speaking
  alternatives:
  - them talking
  - the apostles speaking
  lexicon: BDAG
  rationale: The genitive participial phrase refers to the speakers already in view.
    'Them speaking' is concise and avoids importing a narrower referent than the text
    states.
