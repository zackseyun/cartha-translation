theological_decisions:
- issue: Gendered distributive expression in English
  chosen_reading: each one was hearing them speaking in his own dialect
  alternative_readings:
  - each one was hearing them speaking in their own dialect
  rationale: The Greek uses singular masculine forms εἷς ἕκαστος with ἰδίᾳ, functioning
    distributively. Per the translation philosophy's gender-accurate principle, the
    draft preserves the singular form rather than flattening it into plural 'their,'
    while recognizing that English may use 'their' idiomatically.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
