theological_decisions:
- issue: Relation of divine sovereignty and human responsibility
  chosen_reading: The verse is rendered to preserve both God's determined plan/foreknowledge
    and the audience's culpability in killing Jesus.
  alternative_readings:
  - A rendering that softens divine determination
  - A rendering that softens human agency by making the lawless men the sole actors
  rationale: 'The Greek explicitly affirms both: Jesus was delivered up according
    to God''s determined plan and foreknowledge, and Peter still addresses his hearers
    with ''you killed.'' The translation preserves this tension rather than resolving
    it toward a particular theological system.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
