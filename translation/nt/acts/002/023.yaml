id: ACT.2.23
reference: Acts 2:23
source:
  edition: SBLGNT
  text: τοῦτον τῇ ὡρισμένῃ βουλῇ καὶ προγνώσει τοῦ θεοῦ ⸀ἔκδοτον διὰ ⸀χειρὸς ἀνόμων
    προσπήξαντες ἀνείλατε,
translation:
  text: this man, delivered up by the determined plan and foreknowledge of God, you
    killed by nailing him to a cross through the hand of lawless men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the hands of lawless men.' The Greek has singular 'hand,' but the
      plural is a common English idiom here.
    reason: lexical_alternative
  - marker: b
    text: Or 'you put to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - this one
  - him
  lexicon: BDAG
  rationale: Accusative demonstrative referring to Jesus in Peter's speech. 'This
    man' is natural English and preserves the deictic force better than the bare 'him'.
- source_word: τῇ ὡρισμένῃ βουλῇ
  chosen: by the determined plan
  alternatives:
  - by the fixed purpose
  - by the appointed counsel
  - by the definite plan
  lexicon: BDAG
  rationale: The dative construction expresses means or basis. ὡρισμένῃ, from ὁρίζω,
    conveys something set, determined, or appointed; βουλή is counsel, purpose, or
    plan. 'Determined plan' is clear modern English and preserves divine intentionality
    without unnecessary archaism.
- source_word: καὶ προγνώσει
  chosen: and foreknowledge
  alternatives:
  - and prior knowledge
  - and prescience
  lexicon: BDAG
  rationale: πρόγνωσις is straightforwardly 'foreknowledge.' Retaining the traditional
    theological term is justified here because it is both accurate and widely understood
    enough in context.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Simple possessive genitive modifying both 'plan' and 'foreknowledge'.
- source_word: ἔκδοτον
  chosen: delivered up
  alternatives:
  - handed over
  - given over
  lexicon: BDAG
  rationale: ἔκδοτον denotes being handed over or delivered. 'Delivered up' fits the
    solemn register and echoes the judicial/passive nuance without over-specifying
    the agent beyond the context.
- source_word: διὰ χειρὸς ἀνόμων
  chosen: through the hand of lawless men
  alternatives:
  - by the hands of lawless men
  - through lawless men
  lexicon: BDAG
  rationale: διά with the genitive indicates agency/instrumentality. Although χείρ
    is singular in Greek, English idiom often prefers 'hands'; however, 'through the
    hand of' preserves the singular form and the mediated-agency sense. ἄνομος is
    best rendered 'lawless,' not merely 'wicked,' because it retains the sense of
    those outside or against God's law.
- source_word: προσπήξαντες
  chosen: by nailing him to a cross
  alternatives:
  - having fastened him
  - having nailed him up
  lexicon: BDAG
  rationale: The participle means to fasten or nail to. In this context of Jesus'
    execution, 'nailing him to a cross' makes explicit the crucifixion setting that
    the verb implies, while remaining faithful to the historical sense.
- source_word: ἀνείλατε
  chosen: you killed
  alternatives:
  - you put to death
  - you did away with
  lexicon: BDAG
  rationale: ἀναιρέω here means to kill or put to death. 'You killed' is direct and
    forceful, matching Peter's accusation. 'Put to death' is possible but slightly
    more formal and less immediate.
