id: ACT.2.44
reference: Acts 2:44
source:
  edition: SBLGNT
  text: πάντες δὲ οἱ ⸀πιστεύοντες ⸂ἦσαν ἐπὶ τὸ αὐτὸ καὶ⸃ εἶχον ἅπαντα κοινά,
translation:
  text: And all the believers were together and had all things in common,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were in the same place.' The Greek expression can denote being together/assembled.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: Rendered as 'all' to preserve the distributive force modifying the substantival
    participle 'the believers.' 'Everyone' is possible, but 'all the believers' more
    closely reflects the Greek structure.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Rendered as 'And' to mark simple narrative continuation without implying
    strong contrast. 'But' would overstate adversative force here.
- source_word: οἱ πιστεύοντες
  chosen: the believers
  alternatives:
  - those who believed
  - those who were believing
  lexicon: BDAG
  rationale: The present participle used substantivally refers to the believing community.
    'The believers' is natural modern English and captures the group identity better
    than the more wooden 'those who were believing.'
- source_word: ἦσαν ἐπὶ τὸ αὐτό
  chosen: were together
  alternatives:
  - were in the same place
  - were together in one place
  lexicon: BDAG
  rationale: This idiom commonly conveys being together/assembled. 'Were together'
    is concise and idiomatic, while preserving the communal sense without over-specifying
    location.
- source_word: εἶχον
  chosen: had
  alternatives:
  - were having
  lexicon: BDAG
  rationale: Imperfect verb rendered with simple past in English for natural narrative
    style; the ongoing customary sense is sufficiently conveyed by context.
- source_word: ἅπαντα κοινά
  chosen: all things in common
  alternatives:
  - everything in common
  - all things shared
  lexicon: BDAG
  rationale: This preserves the familiar and accurate idiom for shared possessions/community
    life. 'Everything in common' is also natural, but 'all things in common' more
    closely mirrors ἅπαντα while remaining readable.
