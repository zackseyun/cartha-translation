theological_decisions:
- issue: Nature of the community's shared life
  chosen_reading: The verse is translated descriptively as reporting that the believers
    shared their possessions in common.
  alternative_readings:
  - The verse prescribes a normative economic system for all Christian communities.
  rationale: The Greek states what the believers were doing, not an explicit command
    or universal rule. The translation therefore remains descriptive and does not
    import a doctrinal or political prescription beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
