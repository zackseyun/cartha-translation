theological_decisions:
- issue: Referent of ὑπ’ αὐτοῦ
  chosen_reading: The pronoun refers to death, not to God or another masculine personal
    referent.
  alternative_readings:
  - by death
  - by him
  rationale: 'The nearest and most coherent antecedent is θανάτου. The clause explains
    why God raised Jesus: death could not continue to hold him. Rendering the pronoun
    as referring to death preserves the text''s theological claim without adding interpretive
    material beyond the syntax.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity where present.
- issue: Sense of ὠδῖνας
  chosen_reading: '''pains'' rather than ''birth pains'' in the main text'
  alternative_readings:
  - birth pains
  - pangs
  rationale: While ὠδίν can denote labor pains, in this verse the idiom is commonly
    understood as the agonies or pangs associated with death's hold, especially in
    light of the immediate statement about being held by death. The more literal labor-pain
    nuance is worth preserving in a footnote because of the word's lexical range and
    possible intertextual resonance.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity in footnotes where genuine.
