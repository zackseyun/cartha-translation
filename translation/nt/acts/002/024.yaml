id: ACT.2.24
reference: Acts 2:24
source:
  edition: SBLGNT
  text: ὃν ὁ θεὸς ἀνέστησεν λύσας τὰς ὠδῖνας τοῦ θανάτου, καθότι οὐκ ἦν δυνατὸν κρατεῖσθαι
    αὐτὸν ὑπ’ αὐτοῦ·
translation:
  text: whom God raised up, having loosed the pains of death, because it was not possible
    for him to be held by it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pangs of death'; the Greek word can also mean 'birth pains,' preserving
      an image of death's grip being broken.
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''by it,'' with the pronoun most naturally referring to death:
      ''to be held by death.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  chosen: whom
  alternatives:
  - him
  lexicon: BDAG
  rationale: Relative pronoun referring back to Jesus in the preceding verse; 'whom'
    preserves the syntactic linkage into the relative clause.
- source_word: ἀνέστησεν
  chosen: raised up
  alternatives:
  - raised
  - resurrected
  lexicon: BDAG
  rationale: Aorist active of ἀνίστημι here refers to God raising Jesus from the dead.
    'Raised up' is idiomatic and preserves the verbal force without importing later
    technical terminology beyond the text.
- source_word: λύσας
  chosen: having loosed
  alternatives:
  - freeing
  - releasing
  - breaking
  lexicon: BDAG
  rationale: Aorist participle attendant to the main verb, expressing means or accompanying
    action. 'Having loosed' keeps the concrete imagery of λύω ('loose, untie, release')
    and avoids over-paraphrase.
- source_word: τὰς ὠδῖνας τοῦ θανάτου
  chosen: the pains of death
  alternatives:
  - the birth pains of death
  - the pangs of death
  lexicon: BDAG
  rationale: ὠδίν can denote birth pains or severe pains/pangs. In this context, the
    established and contextually natural sense is the agonies/pains associated with
    death's hold. 'Pains' is clear modern English; 'birth pains' is possible lexically
    but less likely here unless one foregrounds the allusion to LXX Psalm 18:4/2 Samuel
    22:6 traditions.
- source_word: καθότι
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: BDAG
  rationale: Introduces the reason for God's action. 'Because' is the most natural
    contemporary rendering.
- source_word: οὐκ ἦν δυνατὸν
  chosen: it was not possible
  alternatives:
  - it was impossible
  lexicon: BDAG
  rationale: Impersonal construction. 'It was not possible' closely follows the Greek
    structure and preserves the explanatory tone.
- source_word: κρατεῖσθαι
  chosen: to be held
  alternatives:
  - to be kept in the grip of
  - to be held fast
  lexicon: BDAG
  rationale: Passive infinitive of κρατέω, here conveying being seized or held in
    power. 'To be held' is concise and faithful; stronger expansions would interpret
    the metaphor more than translate it.
- source_word: ὑπ’ αὐτοῦ
  chosen: by it
  alternatives:
  - by death
  - by him
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to θανάτου, yielding 'by it'/'by
    death.' Because English can sound awkward with an impersonal antecedent, a footnote
    preserves the explicit alternative 'by death.'
