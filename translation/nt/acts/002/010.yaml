id: ACT.2.10
reference: Acts 2:10
source:
  edition: SBLGNT
  text: Φρυγίαν τε καὶ Παμφυλίαν, Αἴγυπτον καὶ τὰ μέρη τῆς Λιβύης τῆς κατὰ Κυρήνην,
    καὶ οἱ ἐπιδημοῦντες Ῥωμαῖοι,
translation:
  text: Phrygia and Pamphylia, Egypt and the parts of Libya toward Cyrene, and the
    visiting Romans,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the regions of Libya around Cyrene.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Romans staying here temporarily' or 'Roman visitors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φρυγίαν
  chosen: Phrygia
  lexicon: BDAG
  rationale: Proper regional name; transliterated according to standard English convention.
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The combination links items in a list. English idiom in a geographic
    catalog is best served by simple 'and' rather than the more formal 'both ... and'.
- source_word: Παμφυλίαν
  chosen: Pamphylia
  lexicon: BDAG
  rationale: Proper regional name; transliterated by standard convention.
- source_word: Αἴγυπτον
  chosen: Egypt
  lexicon: BDAG
  rationale: Standard English name for the country.
- source_word: τὰ μέρη
  chosen: the parts
  alternatives:
  - the regions
  - the districts
  lexicon: BDAG
  rationale: μέρη literally means 'parts' or 'regions.' 'The parts' preserves the
    concrete wording of the Greek while remaining understandable in English.
- source_word: τῆς Λιβύης
  chosen: of Libya
  lexicon: BDAG
  rationale: Genitive dependent on 'the parts'; rendered straightforwardly as 'of
    Libya.'
- source_word: τῆς κατὰ Κυρήνην
  chosen: toward Cyrene
  alternatives:
  - around Cyrene
  - near Cyrene
  - belonging to the region of Cyrene
  lexicon: BDAG
  rationale: κατά with a place name here specifies the part of Libya in relation to
    Cyrene. 'Toward Cyrene' is concise and natural, while preserving the directional/regional
    sense without over-specifying political boundaries.
- source_word: οἱ ἐπιδημοῦντες
  chosen: the visiting
  alternatives:
  - the sojourning
  - those staying temporarily
  - the residents from abroad
  lexicon: BDAG
  rationale: The participle denotes people staying in a place temporarily or visiting
    from elsewhere. 'The visiting' fits the Pentecost context of people present in
    Jerusalem without implying permanent residence.
- source_word: Ῥωμαῖοι
  chosen: Romans
  alternatives:
  - Roman visitors
  lexicon: BDAG
  rationale: Ethnic/geographic designation rendered by the standard English plural
    noun. 'Romans' is kept in the main text, with 'visiting' already conveying their
    temporary presence.
