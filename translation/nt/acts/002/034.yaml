id: ACT.2.34
reference: Acts 2:34
source:
  edition: SBLGNT
  text: οὐ γὰρ Δαυὶδ ἀνέβη εἰς τοὺς οὐρανούς, λέγει δὲ αὐτός· Εἶπεν ⸀ὁ κύριος τῷ κυρίῳ
    μου· Κάθου ἐκ δεξιῶν μου,
translation:
  text: For David did not ascend into the heavens, but he himself says, ‘The Lord
    said to my Lord, “Sit at my right hand,”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Psalm 110:1. In the Hebrew text, the first 'Lord' represents the divine
      name YHWH; compare 'The LORD said to my Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβη
  chosen: did not ascend
  alternatives:
  - did not go up
  lexicon: BDAG
  rationale: Aorist of ἀναβαίνω in this context refers to ascending into heaven. 'Ascend'
    preserves the elevated register and intertextual resonance without becoming archaic.
- source_word: τοὺς οὐρανούς
  chosen: the heavens
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: The Greek is plural, as often in biblical idiom. 'The heavens' preserves
    the form of the source and echoes scriptural diction better than flattening to
    singular 'heaven.'
- source_word: λέγει δὲ αὐτός
  chosen: but he himself says
  alternatives:
  - and he himself says
  - but he says
  lexicon: BDAG
  rationale: δέ is rendered 'but' to mark the mild contrast with the preceding clause.
    αὐτός is intensive, so 'he himself' is retained for emphasis. Present tense 'says'
    appropriately introduces the cited Scripture as a living utterance.
- source_word: ὁ κύριος
  chosen: The Lord
  alternatives:
  - the LORD
  lexicon: BDAG
  rationale: κύριος is a contested term with default rendering 'Lord' per doctrine
    guidelines. In this quotation from Psalm 110:1, the underlying Hebrew first term
    is YHWH, but in the Greek source before us both terms are κύριος; the main text
    follows the Greek with 'The Lord,' while the covenant-name background is preserved
    in a footnote.
- source_word: τῷ κυρίῳ μου
  chosen: to my Lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: The second κύριος is also rendered 'Lord' in keeping with the default
    for κύριος and the christological force of Peter's argument. 'Master' is lexically
    possible in some contexts but would understate the Psalm's exalted messianic application
    here.
- source_word: Κάθου
  chosen: Sit
  alternatives:
  - Be seated
  lexicon: BDAG
  rationale: The present middle imperative is idiomatically rendered 'Sit' in English.
    It is concise and preserves the directness of the enthronement command.
- source_word: ἐκ δεξιῶν μου
  chosen: at my right hand
  alternatives:
  - at my right side
  - from my right hand
  lexicon: BDAG
  rationale: This is a standard idiom for the place of highest honor and authority.
    Although ἐκ is literally 'from/out of,' the established idiomatic sense in this
    construction is 'at my right hand,' which best communicates the meaning in natural
    English.
