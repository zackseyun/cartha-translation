theological_decisions:
- issue: Rendering the two occurrences of κύριος in the Psalm 110:1 quotation
  chosen_reading: 'Both are rendered ''Lord'' in the main text: ''The Lord said to
    my Lord.'''
  alternative_readings:
  - '''The LORD said to my Lord'' to reflect the Hebrew divine name in the first occurrence'
  rationale: The Greek source text uses κύριος for both terms, and the doctrine guidelines
    set the default rendering of κύριος as 'Lord.' To preserve original-language primacy,
    the main text follows the Greek wording. Because the quotation alludes to Psalm
    110:1, where the first term represents YHWH in Hebrew, that background is preserved
    in a footnote rather than imported into the main text.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy #1 and
    #3'
