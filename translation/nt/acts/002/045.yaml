theological_decisions:
- issue: Nature of the believers' sharing of goods
  chosen_reading: The verse describes voluntary, ongoing sale and distribution of
    property according to need, without specifying abolition of private ownership
    as a formal doctrine.
  alternative_readings:
  - The verse teaches complete communal ownership as a normative requirement for all
    Christians.
  rationale: The imperfect verbs portray repeated practice, and the nouns refer to
    things being sold and distributed, but the text itself does not explicitly state
    that all private ownership ceased or that this pattern is mandated universally.
    The translation therefore stays descriptive and avoids importing a socioeconomic
    doctrine beyond the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
