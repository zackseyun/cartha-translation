id: ACT.2.45
reference: Acts 2:45
source:
  edition: SBLGNT
  text: καὶ τὰ κτήματα καὶ τὰς ὑπάρξεις ἐπίπρασκον καὶ διεμέριζον αὐτὰ πᾶσιν καθότι
    ἄν τις χρείαν εἶχεν·
translation:
  text: And they were selling their property and possessions and distributing them
    to all, as anyone had need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lands and possessions.' The two Greek terms likely distinguish kinds
      of owned goods, with κτήματα often referring to property holdings and ὑπάρξεις
      to possessions more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτήματα
  chosen: property
  alternatives:
  - lands
  - real estate
  - possessions
  lexicon: BDAG
  rationale: κτήματα commonly denotes acquired property, often landed property or
    holdings. 'Property' is broad enough for the context while still distinguishing
    it from the following term ὑπάρξεις.
- source_word: ὑπάρξεις
  chosen: possessions
  alternatives:
  - belongings
  - goods
  - property
  lexicon: BDAG
  rationale: ὑπάρξεις refers to possessions or goods one owns. Rendering it as 'possessions'
    preserves a distinction from κτήματα and reflects movable belongings more naturally
    in English.
- source_word: ἐπίπρασκον
  chosen: were selling
  alternatives:
  - sold
  lexicon: BDAG
  rationale: The imperfect tense indicates ongoing or repeated action in past time,
    not necessarily a single completed event. 'Were selling' preserves the iterative/imperfective
    sense better than simple 'sold.'
- source_word: διεμέριζον
  chosen: distributing
  alternatives:
  - dividing
  - apportioning
  - sharing out
  lexicon: BDAG
  rationale: διαμερίζω here describes the allocation of proceeds or goods among the
    community. 'Distributing' is idiomatic and fits the charitable context without
    overinterpreting the mechanism.
- source_word: αὐτά
  chosen: them
  alternatives:
  - the proceeds
  - those things
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to the property and possessions,
    or by implication what came from them. 'Them' keeps the Greek's compactness without
    specifying beyond the text.
- source_word: πᾶσιν
  chosen: to all
  alternatives:
  - to everyone
  - among all
  lexicon: BDAG
  rationale: The dative plural indicates the recipients broadly within the community
    context. 'To all' is concise and faithful.
- source_word: καθότι ἄν τις χρείαν εἶχεν
  chosen: as anyone had need
  alternatives:
  - according as anyone had a need
  - to the extent that anyone was having need
  lexicon: BDAG
  rationale: The clause expresses distribution in proportion to individual need. 'As
    anyone had need' is natural English and preserves the conditional-indefinite force
    of ἄν τις.
