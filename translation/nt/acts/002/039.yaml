theological_decisions:
- issue: Scope of 'those who are far off'
  chosen_reading: Rendered broadly as 'all who are far off' without restricting the
    phrase to either diaspora Jews or Gentiles alone.
  alternative_readings:
  - diaspora Jews at a distance
  - Gentiles
  - both geographically and covenantally distant people
  rationale: The phrase can evoke both literal distance and covenantal distance. The
    verse itself does not force a narrower identification, so the translation preserves
    the breadth and leaves interpretation open.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Implication of divine calling in ὅσους ἂν προσκαλέσηται
  chosen_reading: Translated without importing a specific soteriological system.
  alternative_readings:
  - effectual calling in a Reformed sense
  - general invitation/appeal
  rationale: The Greek clearly states that the promise is for those whom the Lord
    our God calls, but it does not here define the mechanics of that calling. The
    wording is kept close to the text and avoids denominational over-specification.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Greek unambiguously supports one reading over another.
