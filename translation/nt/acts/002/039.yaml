id: ACT.2.39
reference: Acts 2:39
source:
  edition: SBLGNT
  text: ὑμῖν γάρ ἐστιν ἡ ἐπαγγελία καὶ τοῖς τέκνοις ὑμῶν καὶ πᾶσι τοῖς εἰς μακρὰν
    ὅσους ἂν προσκαλέσηται κύριος ὁ θεὸς ἡμῶν.
translation:
  text: For the promise is for you and for your children and for all who are far off—as
    many as the Lord our God calls to himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all those far away.' The phrase may refer to those geographically distant,
      those covenantally distant, or both.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone whom the Lord our God calls.' The Greek literally says 'as
      many as the Lord our God may call/calls to himself.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαγγελία
  chosen: the promise
  alternatives:
  - the promised gift
  lexicon: BDAG
  rationale: The noun straightforwardly means 'promise.' Although the immediate context
    concerns the gift of the Holy Spirit (v. 38), the Greek here names the promise
    itself, not the gift, so 'the promise' is the more textually transparent rendering.
- source_word: τέκνοις
  chosen: children
  alternatives:
  - offspring
  lexicon: BDAG
  rationale: τέκνον commonly means 'child' and here refers naturally to the hearers'
    children/descendants. 'Children' is idiomatic and preserves the familial sense
    without over-specifying age.
- source_word: πᾶσι τοῖς εἰς μακράν
  chosen: all who are far off
  alternatives:
  - all those far away
  - all who are distant
  lexicon: BDAG
  rationale: The phrase is idiomatic for those at a distance, whether geographically
    and/or covenantally. 'Far off' preserves the biblical resonance (cf. Isa 57:19;
    Eph 2:13, 17) better than a flatter paraphrase.
- source_word: ὅσους ἂν προσκαλέσηται
  chosen: as many as ... calls to himself
  alternatives:
  - everyone whom ... calls
  - as many as ... may call
  lexicon: BDAG
  rationale: 'ὅσους ἂν with the aorist middle subjunctive expresses an indefinite
    but comprehensive group: ''as many as.'' The middle voice of προσκαλέομαι can
    naturally be represented in English as ''calls to himself,'' making explicit the
    personal summons implied by the Greek without adding a new doctrinal claim.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it refers to God
    in the phrase 'the Lord our God.'
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  lexicon: BDAG
  rationale: This appositional phrase identifies the subject as 'the Lord our God.'
    The possessive is retained directly.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ links this verse to Peter's preceding exhortation and explanation.
    'For' preserves the discourse connection in a natural English way.
