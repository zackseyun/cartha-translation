theological_decisions:
- issue: Rendering of ᾅδης in a resurrection-context citation
  chosen_reading: Hades
  alternative_readings:
  - the realm of the dead
  - Sheol
  - the grave
  rationale: To avoid importing later doctrinal associations of 'hell' and to preserve
    the Greek term's reference to the abode/realm of the dead in this citation of
    Psalm 16. A footnote preserves the Hebrew-background alternative 'Sheol.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Christological identification of τὸν ὅσιόν σου
  chosen_reading: your Holy One
  alternative_readings:
  - your faithful one
  - your devout one
  rationale: Acts 2 explicitly applies the Psalm to Jesus' resurrection. 'Holy One'
    preserves the lexical range and the christological force recognized in the passage
    without adding doctrinal content beyond the text.
  doctrine_reference: 'Affirmations: ecumenical orthodoxy; Translation philosophy:
    optimal equivalence'
