id: ACT.2.27
reference: Acts 2:27
source:
  edition: SBLGNT
  text: ὅτι οὐκ ἐγκαταλείψεις τὴν ψυχήν μου εἰς ⸀ᾅδην, οὐδὲ δώσεις τὸν ὅσιόν σου ἰδεῖν
    διαφθοράν.
translation:
  text: because you will not abandon my soul to Hades, nor will you let your Holy
    One see decay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Sheol,' reflecting the Hebrew text behind this quotation; Greek here
      has 'Hades.'
    reason: alternative_reading
  - marker: b
    text: Or 'your faithful one.'
    reason: lexical_alternative
  - marker: c
    text: That is, bodily decay or decomposition; traditional English often has 'corruption.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαταλείψεις
  chosen: will not abandon
  alternatives:
  - will not forsake
  - will not leave behind
  lexicon: BDAG
  rationale: Future active indicative with the sense of leaving someone in a state
    or place. 'Abandon' is natural modern English and preserves the force better than
    the more archaic 'forsake.'
- source_word: ψυχήν
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: In this citation context, ψυχή can mean 'life' or 'self,' but 'soul'
    preserves the wording of the Psalm citation and the anthropological weight without
    over-paraphrasing. The phrase is not used here to make a technical statement about
    the intermediate state beyond what the text itself says.
- source_word: εἰς ᾅδην
  chosen: to Hades
  alternatives:
  - in Hades
  - to the realm of the dead
  - to Sheol
  lexicon: BDAG
  rationale: ᾅδης is best rendered 'Hades' rather than flattened to 'grave' or generalized
    as 'hell.' The preposition εἰς with abandon naturally yields 'to Hades' in English
    here. 'Sheol' reflects the Hebrew source behind the Psalm and is worth preserving
    in a footnote, but the Greek text here reads ᾅδης.
- source_word: δώσεις
  chosen: will you let
  alternatives:
  - will you give
  - will you allow
  lexicon: BDAG
  rationale: Although literally 'give,' in this idiom with infinitive it means to
    permit or allow. 'Let' is idiomatic and clear in English.
- source_word: τὸν ὅσιόν σου
  chosen: your Holy One
  alternatives:
  - your faithful one
  - your devout one
  - your holy one
  lexicon: BDAG
  rationale: ὅσιος denotes one who is holy/devout/faithful in relation to God. In
    Acts 2, Peter applies the Psalm christologically; 'Holy One' is the established
    and contextually fitting rendering, preserving both lexical meaning and messianic
    resonance. Capitalization reflects referential identification in context, not
    a different lexical meaning.
- source_word: ἰδεῖν διαφθοράν
  chosen: see decay
  alternatives:
  - see corruption
  - undergo decay
  lexicon: BDAG
  rationale: The idiom 'see decay' is a close and readable rendering. 'Corruption'
    is traditional but in modern English can suggest moral corruption rather than
    bodily decomposition. 'Decay' better communicates the physical sense in context.
