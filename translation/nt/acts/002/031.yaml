theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in Peter's scriptural argument about the
    promised anointed one. Following the doctrine's contested-terms guidance, 'Messiah'
    is preferred where context supports the titular sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - the realm of the dead
  - hell
  rationale: Using 'Hades' preserves the Greek term and avoids conflating it with
    final judgment language associated with 'hell.' This maintains theological precision
    in a resurrection context.
- issue: Rendering of σάρξ
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The context is literal and bodily, not ethical or metaphorical. 'Flesh'
    preserves the lexical form and the bodily realism of the resurrection claim.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → flesh (literal) / sinful
    nature (metaphorical)'
