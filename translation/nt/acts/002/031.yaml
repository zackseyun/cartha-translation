id: ACT.2.31
reference: Acts 2:31
source:
  edition: SBLGNT
  text: προϊδὼν ἐλάλησεν περὶ τῆς ἀναστάσεως τοῦ χριστοῦ ὅτι ⸂οὔτε ἐγκατελείφθη⸃ εἰς
    ⸀ᾅδην ⸀οὔτε ἡ σὰρξ αὐτοῦ εἶδεν διαφθοράν.
translation:
  text: 'Foreseeing this, he spoke about the resurrection of the Messiah: that he
    was neither abandoned to Hades, nor did his flesh see decay.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was not left in Hades.' The Greek phrase can be rendered with either
      'to' or 'in' in English; the sense is that he was not abandoned to the realm
      of the dead.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christos'; here rendered 'Messiah' because the title sense is prominent
      in Peter's appeal to Scripture. Traditionally, 'Christ.'
    reason: alternative_reading
  - marker: c
    text: '''Hades'' refers to the realm of the dead, not specifically to the final
      place of judgment.'
    reason: cultural_note
  - marker: d
    text: Or 'see corruption.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προϊδὼν
  chosen: Foreseeing this
  alternatives:
  - Seeing beforehand
  - Having foreseen
  lexicon: BDAG
  rationale: Aorist participle indicating prior perception of what was to come. 'Foreseeing
    this' is natural English and preserves the temporal sense relative to 'he spoke.'
    'This' is supplied from context to make the participle idiomatic in English.
- source_word: ἐλάλησεν
  chosen: he spoke
  alternatives:
  - he said
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak' rather than the more content-focused 'say.'
    'He spoke' fits the formal citation context.
- source_word: περὶ τῆς ἀναστάσεως
  chosen: about the resurrection
  alternatives:
  - concerning the resurrection
  lexicon: BDAG
  rationale: περί with genitive means 'about/concerning.' 'About' is slightly more
    natural in modern English while preserving the sense.
- source_word: τοῦ χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like form. Here it refers to the anointed deliverer anticipated
    in Scripture, so the titular sense is prominent.
- source_word: οὔτε ἐγκατελείφθη
  chosen: he was neither abandoned
  alternatives:
  - he was not left
  - he was neither forsaken
  lexicon: BDAG
  rationale: Passive of ἐγκαταλείπω means 'be abandoned/left behind/forsaken.' 'Abandoned'
    best conveys the force of the verb in this Psalm citation while reading naturally
    with the paired 'neither...nor.'
- source_word: εἰς ᾅδην
  chosen: to Hades
  alternatives:
  - in Hades
  - to the realm of the dead
  lexicon: BDAG
  rationale: ᾅδης refers to Hades/the realm of the dead. 'Hades' preserves the specific
    Greek term and avoids importing later doctrinal associations of 'hell.' The preposition
    εἰς is most directly 'to/into'; with the passive verb in this citation, 'abandoned
    to Hades' is idiomatic and standard.
- source_word: ἡ σὰρξ αὐτοῦ
  chosen: his flesh
  alternatives:
  - his body
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' in literal contexts. Here it refers
    concretely to the Messiah's physical body, not metaphorical sinful nature. 'Flesh'
    preserves the lexical link to the Psalm citation and the bodily emphasis.
- source_word: εἶδεν διαφθοράν
  chosen: did see decay
  alternatives:
  - underwent decay
  - saw corruption
  lexicon: BDAG
  rationale: 'The idiom ''see decay/corruption'' is a literal rendering of εἶδεν διαφθοράν.
    In the negated clause, English requires auxiliary support: ''nor did his flesh
    see decay.'' ''Decay'' is more accessible than ''corruption'' while preserving
    the sense of bodily decomposition.'
