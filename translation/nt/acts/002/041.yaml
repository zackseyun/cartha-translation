theological_decisions:
- issue: Whether to make explicit the object of 'were added' as the church/apostolic
    community
  chosen_reading: Left implicit as 'were added'
  alternative_readings:
  - were added to them
  - were added to the church
  rationale: The Greek does not explicitly state the object in this verse. Context
    suggests addition to the community of believers, but the translation preserves
    the text's wording and avoids importing a fuller ecclesiological statement than
    the verse itself makes.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Anthropological force of ψυχαί
  chosen_reading: Rendered 'souls' in the main text with footnote preserving 'persons/people'
  alternative_readings:
  - persons
  - people
  rationale: The Greek term is ψυχαί, and a transparent rendering is preferred in
    the main text. Because English readers may hear 'souls' as a technical statement
    about immaterial substance, the footnote preserves the common idiomatic sense
    'persons/people' and avoids resolving beyond the context.
  doctrine_reference: Translation philosophy items 1 and 3
