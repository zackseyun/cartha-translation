id: ACT.2.41
reference: Acts 2:41
source:
  edition: SBLGNT
  text: οἱ μὲν ⸀οὖν ἀποδεξάμενοι τὸν λόγον αὐτοῦ ἐβαπτίσθησαν, καὶ προσετέθησαν ⸀ἐν
    τῇ ἡμέρᾳ ἐκείνῃ ψυχαὶ ὡσεὶ τρισχίλιαι.
translation:
  text: So those who received his word were baptized, and about three thousand souls
    were added on that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'persons' or 'people.' The Greek 'souls' is a common way of counting
      human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποδεξάμενοι
  chosen: received
  alternatives:
  - accepted
  - welcomed
  lexicon: BDAG
  rationale: The participle denotes a positive reception of the message. 'Received'
    is idiomatic and sufficiently broad, avoiding the slightly more interpretive 'accepted'
    while preserving the favorable response implied by the verb.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος here refers to Peter's proclaimed message. 'Word' preserves the
    Greek term closely and remains natural in English, especially in Acts. 'Message'
    is possible but less textually transparent.
- source_word: ἐβαπτίσθησαν
  chosen: were baptized
  lexicon: BDAG
  rationale: Passive aorist straightforwardly rendered as 'were baptized.' This preserves
    the eventive sense without importing denominational nuance about mode or efficacy.
- source_word: προσετέθησαν
  chosen: were added
  alternatives:
  - were joined
  - were added to them
  lexicon: BDAG
  rationale: The passive indicates incorporation into the growing community. 'Were
    added' is the standard and most direct rendering. 'To them' is implied by context
    but not explicit in this verse, so it is not supplied in the main text.
- source_word: ψυχαὶ
  chosen: souls
  alternatives:
  - persons
  - people
  lexicon: BDAG
  rationale: ψυχή can denote persons/lives, but 'souls' is a transparent formal rendering
    and idiomatic in counting persons in biblical style. To avoid over-reading an
    anthropological claim, the lexical alternative is preserved in a footnote.
- source_word: ὡσεὶ τρισχίλιαι
  chosen: about three thousand
  alternatives:
  - approximately three thousand
  lexicon: BDAG
  rationale: ὡσεί marks approximation. 'About three thousand' is natural modern English
    and accurately reflects the Greek.
- source_word: οἱ μὲν οὖν
  chosen: So those who
  alternatives:
  - Therefore those who
  - Then those who
  lexicon: BDAG
  rationale: The particle combination marks narrative progression/inference from the
    preceding speech. 'So those who' captures the flow in readable English without
    over-formal stiffness.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: on that day
  alternatives:
  - in that day
  lexicon: BDAG
  rationale: English idiom prefers 'on that day' for a temporal dative with ἐν in
    this context.
