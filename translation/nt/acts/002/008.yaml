id: ACT.2.8
reference: Acts 2:8
source:
  edition: SBLGNT
  text: καὶ πῶς ἡμεῖς ἀκούομεν ἕκαστος τῇ ἰδίᾳ διαλέκτῳ ἡμῶν ἐν ᾗ ἐγεννήθημεν;
translation:
  text: And how is it that each of us hears in our own native language?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in our own dialect, in which we were born.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: how is it that
  alternatives:
  - how
  - how can it be that
  lexicon: BDAG
  rationale: Introduces a question of astonishment. 'How is it that' captures the
    idiomatic force in natural English better than a bare 'how' while remaining close
    to the Greek.
- source_word: ἡμεῖς
  chosen: us
  alternatives:
  - we
  lexicon: BDAG
  rationale: 'Though nominative in Greek, English idiom with ''each of'' requires
    the object form: ''each of us.'' This preserves the emphatic inclusion of the
    speakers.'
- source_word: ἀκούομεν
  chosen: hears
  alternatives:
  - hear
  lexicon: BDAG
  rationale: 'Because ἕκαστος (''each'') is the distributive subject in sense, idiomatic
    English takes singular agreement: ''each of us hears.'' This reflects the Greek
    meaning rather than mechanically reproducing number.'
- source_word: ἕκαστος
  chosen: each of us
  alternatives:
  - each one
  - every one of us
  lexicon: BDAG
  rationale: 'Distributive singular emphasizing individual experience. Combined with
    ἡμεῖς to form natural English: ''each of us.'''
- source_word: τῇ ἰδίᾳ διαλέκτῳ ἡμῶν
  chosen: in our own native language
  alternatives:
  - in our own dialect
  - in our own language
  lexicon: BDAG
  rationale: διάλεκτος can mean 'dialect' or 'language.' In this context, the phrase
    is further defined by 'in which we were born,' so 'native language' best conveys
    the sense for modern readers. 'Own' reflects ἰδίᾳ.
- source_word: διαλέκτῳ
  chosen: language
  alternatives:
  - dialect
  lexicon: BDAG
  rationale: While 'dialect' is a possible gloss, in contemporary English it can sound
    narrower or sociolinguistically technical. 'Language' communicates the point clearly,
    with 'native' preserving the birth-based nuance of the following clause.
- source_word: ἐν ᾗ ἐγεννήθημεν
  chosen: native
  alternatives:
  - in which we were born
  - the language in which we were born
  lexicon: BDAG
  rationale: This relative clause specifies the dialect/language as the one associated
    with birth and upbringing. Rendering the whole phrase as 'native' is a concise
    optimal-equivalence choice that preserves the sense without unnecessary stiffness.
