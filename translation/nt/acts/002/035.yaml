theological_decisions:
- issue: Royal-subjugation imagery in the Psalm 110:1 citation
  chosen_reading: Retain the concrete image 'a footstool for your feet' rather than
    paraphrasing it as total defeat or subjugation.
  alternative_readings:
  - until I completely subdue your enemies under your feet
  rationale: The verse is a direct citation/allusion to Psalm 110:1 and carries messianic
    and enthronement significance. Preserving the metaphor maintains the intertextual
    and theological force without importing a fuller interpretive paraphrase into
    the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
