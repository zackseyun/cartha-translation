id: ACT.2.35
reference: Acts 2:35
source:
  edition: SBLGNT
  text: ἕως ἂν θῶ τοὺς ἐχθρούς σου ὑποπόδιον τῶν ποδῶν σου.
translation:
  text: until I make your enemies a footstool for your feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until I put your enemies as a footstool of your feet.'
    reason: lexical_alternative
  - marker: b
    text: This line echoes Psalm 110:1, a royal/messianic enthronement text.
    reason: cross_reference
lexical_decisions:
- source_word: ἕως ἂν
  chosen: until
  alternatives:
  - until such time as
  - until when
  lexicon: BDAG
  rationale: The combination marks a future point up to which the preceding statement
    remains in force. In idiomatic English, 'until' best captures the temporal force
    without unnecessary expansion.
- source_word: θῶ
  chosen: I make
  alternatives:
  - I place
  - I put
  lexicon: BDAG
  rationale: From τίθημι, literally 'put/place,' but in this idiom with a predicate
    accusative ('make ... a footstool') English 'make' is the most natural and accurate
    rendering.
- source_word: τοὺς ἐχθρούς σου
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: BDAG
  rationale: A straightforward rendering of ἐχθρούς with possessive σου. 'Enemies'
    preserves both the personal and royal-oppositional sense present in the Psalm
    citation.
- source_word: ὑποπόδιον
  chosen: a footstool
  alternatives:
  - a stool for the feet
  lexicon: BDAG
  rationale: This is the standard lexical meaning and preserves the imagery of subjugation
    in the quoted royal psalm.
- source_word: τῶν ποδῶν σου
  chosen: for your feet
  alternatives:
  - of your feet
  - beneath your feet
  lexicon: BDAG
  rationale: The genitive is part of the fixed expression 'footstool of/for your feet.'
    'For your feet' is more natural modern English while retaining the image. 'Beneath
    your feet' is interpretive and therefore left as an alternative rather than the
    main text.
