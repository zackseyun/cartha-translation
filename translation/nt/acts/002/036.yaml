id: ACT.2.36
reference: Acts 2:36
source:
  edition: SBLGNT
  text: ἀσφαλῶς οὖν γινωσκέτω πᾶς οἶκος Ἰσραὴλ ὅτι καὶ κύριον ⸂αὐτὸν καὶ χριστὸν⸃
    ⸂ἐποίησεν ὁ θεός⸃, τοῦτον τὸν Ἰησοῦν ὃν ὑμεῖς ἐσταυρώσατε.
translation:
  text: Therefore let all the house of Israel know for certain that God has made him
    both Lord and Messiah—this Jesus whom you crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos), here rendered 'Messiah'
      to preserve its title sense in Peter's address to Israel.
    reason: alternative_reading
  - marker: b
    text: '''Has made him both Lord and Messiah'' speaks of God''s exaltation and
      public installation of Jesus in these roles, not of a change in his divine nature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσφαλῶς
  chosen: for certain
  alternatives:
  - certainly
  - surely
  - with certainty
  lexicon: BDAG
  rationale: Adverb emphasizing certainty. 'For certain' is natural modern English
    and preserves the force of Peter's emphatic assertion.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding argument about Jesus' resurrection
    and exaltation. 'Therefore' preserves the logical connection clearly.
- source_word: γινωσκέτω
  chosen: let ... know
  alternatives:
  - must know
  - should know
  lexicon: BDAG
  rationale: Third-person present active imperative singular functioning as a collective
    exhortation directed to Israel as a whole. 'Let ... know' best reflects the imperative
    force without over-hardening it into an English modal.
- source_word: πᾶς οἶκος Ἰσραήλ
  chosen: all the house of Israel
  alternatives:
  - the whole house of Israel
  - all Israel
  lexicon: BDAG
  rationale: A stock biblical expression evoking the covenant people corporately.
    'All the house of Israel' preserves the idiom more transparently than flattening
    it to 'all Israel.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the appropriate rendering.
    In this context it carries exalted authority and likely resonates with the preceding
    citation about the Lord, so 'master' is too weak.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine default, Χριστός as a title is rendered 'Messiah' where
    context supports title sense. Here Peter is declaring Jesus' messianic identity
    to Israel, so the titular sense is prominent.
- source_word: ἐποίησεν
  chosen: has made
  alternatives:
  - made
  - appointed
  - constituted
  lexicon: BDAG
  rationale: Aorist verb rendered with English present perfect to fit idiomatic proclamation
    of a completed act with present significance. 'Made' is retained rather than 'appointed'
    or 'constituted' because it is the plain lexical sense, while theological clarification
    is handled separately.
- source_word: τοῦτον τὸν Ἰησοῦν
  chosen: this Jesus
  alternatives:
  - this very Jesus
  - this one, Jesus
  lexicon: BDAG
  rationale: Demonstrative plus name is emphatic and points to the specific historical
    Jesus. 'This Jesus' is concise and preserves the deictic force.
- source_word: ὃν ὑμεῖς ἐσταυρώσατε
  chosen: whom you crucified
  alternatives:
  - whom you put to death by crucifixion
  lexicon: BDAG
  rationale: Direct and idiomatic rendering of the relative clause. It preserves Peter's
    accusatory emphasis on the audience's role in Jesus' crucifixion.
