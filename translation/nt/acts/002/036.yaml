theological_decisions:
- issue: Meaning of 'God has made him both Lord and Messiah' in relation to Christology
  chosen_reading: Rendered the clause straightforwardly as an exaltation/declaration
    statement, not implying that Jesus only became divine or only became Messiah at
    this moment.
  alternative_readings:
  - '''made'' as ''appointed'' or ''constituted'' to avoid misunderstanding'
  - read as implying adoptionism or a change in Jesus' essential nature
  rationale: Within orthodox Christology affirmed in DOCTRINE.md, this verse cannot
    be translated in a way that suggests Jesus came into existence as Lord or Messiah
    in essence at the resurrection/exaltation. The Greek ἐποίησεν is still translated
    honestly as 'has made'; the sense in context is that God publicly installed/exalted
    Jesus in this role and status in salvation history. Avoiding 'made' would mute
    the lexical force, while reading it adoptionistically would import a doctrinal
    claim the text does not require.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt specifies 'Messiah' where Χριστός functions as a
    title. In Peter's address to 'the house of Israel,' the Jewish messianic context
    is explicit, so 'Messiah' best preserves the title's meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
