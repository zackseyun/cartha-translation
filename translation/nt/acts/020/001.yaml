id: ACT.20.1
reference: Acts 20:1
source:
  edition: SBLGNT
  text: Μετὰ δὲ τὸ παύσασθαι τὸν θόρυβον ⸀μεταπεμψάμενος ὁ Παῦλος τοὺς μαθητὰς καὶ
    ⸀παρακαλέσας, ἀσπασάμενος ἐξῆλθεν ⸀πορεύεσθαι ⸀εἰς Μακεδονίαν.
translation:
  text: After the uproar had ceased, Paul sent for the disciples, and after encouraging
    them and saying farewell, he departed to go to Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and greeting them'; the Greek can denote either a greeting or, in a
      departure context, taking leave.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὸ παύσασθαι
  chosen: After ... had ceased
  alternatives:
  - When ... ceased
  - After ... stopped
  lexicon: BDAG
  rationale: The articular infinitive with μετά is naturally temporal, introducing
    what happened after the prior event ended. English past perfect ('had ceased')
    clearly marks prior action.
- source_word: θόρυβον
  chosen: the uproar
  alternatives:
  - the disturbance
  - the commotion
  lexicon: BDAG
  rationale: In context of the Ephesian riot, θόρυβος refers to a public tumult or
    uproar. 'Uproar' best captures the intensity and links naturally to the preceding
    narrative.
- source_word: μεταπεμψάμενος
  chosen: sent for
  alternatives:
  - summoned
  - called for
  lexicon: BDAG
  rationale: The middle participle commonly means to send for someone so they come
    to oneself. 'Sent for' is idiomatic modern English and avoids an overly formal
    tone.
- source_word: τοὺς μαθητὰς
  chosen: the disciples
  alternatives:
  - the disciples there
  - the believers
  lexicon: BDAG
  rationale: μαθηταί in Acts regularly refers to Jesus' followers. 'Disciples' preserves
    Luke's preferred term more precisely than the broader 'believers'.
- source_word: παρακαλέσας
  chosen: after encouraging them
  alternatives:
  - after exhorting them
  - after comforting them
  lexicon: BDAG
  rationale: παρακαλέω can mean exhort, encourage, comfort, depending on context.
    Here, in a farewell setting after turmoil, 'encouraging' best captures supportive
    strengthening without narrowing to either admonition or consolation alone.
- source_word: ἀσπασάμενος
  chosen: and saying farewell
  alternatives:
  - and greeting them
  - and taking leave of them
  lexicon: BDAG
  rationale: ἀσπάζομαι literally means greet, but in departure contexts it carries
    the sense of taking leave. 'Saying farewell' communicates the situational force
    in natural English.
- source_word: ἐξῆλθεν
  chosen: he departed
  alternatives:
  - he went out
  - he left
  lexicon: BDAG
  rationale: Although literally 'went out,' in travel narrative this verb often functions
    as a departure formula. 'Departed' is smoother in English and fits the infinitive
    of purpose that follows.
- source_word: πορεύεσθαι εἰς Μακεδονίαν
  chosen: to go to Macedonia
  alternatives:
  - for Macedonia
  - to travel to Macedonia
  lexicon: BDAG
  rationale: The infinitive expresses intended travel following ἐξῆλθεν. 'To go to
    Macedonia' is straightforward and preserves the destination clearly.
