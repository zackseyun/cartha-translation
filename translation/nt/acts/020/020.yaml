id: ACT.20.20
reference: Acts 20:20
source:
  edition: SBLGNT
  text: ὡς οὐδὲν ὑπεστειλάμην τῶν συμφερόντων τοῦ μὴ ἀναγγεῖλαι ὑμῖν καὶ διδάξαι ὑμᾶς
    δημοσίᾳ καὶ κατ’ οἴκους,
translation:
  text: how I did not shrink back from declaring to you anything that was profitable,
    and from teaching you publicly and from house to house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not hold back from declaring to you anything beneficial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεστειλάμην
  chosen: did not shrink back
  alternatives:
  - did not hold back
  - did not hesitate
  - did not draw back
  lexicon: BDAG
  rationale: ὑποστέλλω in the middle can mean to draw back, hold oneself back, or
    shrink from doing something. 'Did not shrink back' preserves the idiomatic force
    and matches the context of Paul refusing to withhold ministry.
- source_word: τῶν συμφερόντων
  chosen: anything that was profitable
  alternatives:
  - anything beneficial
  - anything advantageous
  - the things that were helpful
  lexicon: BDAG
  rationale: The participle from συμφέρω refers to what is beneficial or advantageous.
    'Profitable' is concise and idiomatic here, referring to what was spiritually
    beneficial to the hearers, not financial profit.
- source_word: τοῦ μὴ ἀναγγεῖλαι
  chosen: from declaring
  alternatives:
  - from announcing
  - so as not to proclaim
  - from reporting
  lexicon: BDAG
  rationale: The articular infinitive with μή after ὑπεστειλάμην expresses the content
    of what Paul did not refrain from doing. In English, 'did not shrink back from
    declaring' communicates the syntax naturally without woodenly reproducing the
    negation.
- source_word: ἀναγγεῖλαι
  chosen: declaring
  alternatives:
  - announcing
  - proclaiming
  lexicon: BDAG
  rationale: ἀναγγέλλω means to report, announce, or make known. 'Declaring' fits
    the solemn public-ministry context and pairs well with the following 'teaching'
    as a distinct but related activity.
- source_word: διδάξαι
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: διδάσκω is straightforwardly 'teach.' The participial English form coordinates
    smoothly with 'declaring' under the governing idea of what Paul did not shrink
    back from doing.
- source_word: δημοσίᾳ
  chosen: publicly
  alternatives:
  - in public
  lexicon: BDAG
  rationale: The adverbial dative indicates open, public settings. 'Publicly' is the
    most natural modern English rendering.
- source_word: κατ’ οἴκους
  chosen: from house to house
  alternatives:
  - in homes
  - house by house
  lexicon: BDAG
  rationale: κατά with the accusative plural here is distributive. 'From house to
    house' preserves the repeated, personal nature of Paul's ministry better than
    the flatter 'in homes'.
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - in what way
  lexicon: BDAG
  rationale: In context, ὡς introduces the content of Paul's reminder in v. 18–20.
    'How' is idiomatic in English and connects naturally to the preceding recollection.
