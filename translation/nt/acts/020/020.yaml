theological_decisions:
- issue: Sense of 'profitable'
  chosen_reading: spiritually beneficial to the hearers
  alternative_readings:
  - generally advantageous
  - beneficial in a broad practical sense
  rationale: The context is Paul's ministry among the Ephesian believers, so the benefit
    is primarily spiritual and pastoral. The translation keeps the broader lexical
    sense 'profitable' rather than narrowing the main text to a doctrinally loaded
    paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing extra doctrinal claims.'
