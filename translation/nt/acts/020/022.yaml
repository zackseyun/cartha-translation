id: ACT.20.22
reference: Acts 20:22
source:
  edition: SBLGNT
  text: καὶ νῦν ἰδοὺ ⸂δεδεμένος ἐγὼ⸃ τῷ πνεύματι πορεύομαι εἰς Ἰερουσαλήμ, τὰ ἐν αὐτῇ
    συναντήσοντά ⸀μοι μὴ εἰδώς,
translation:
  text: And now, behold, bound in the Spirit, I am going to Jerusalem, not knowing
    what will happen to me there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bound in spirit'; the Greek phrase may refer either to Paul's own spirit
      or to the Holy Spirit. It could also be understood as 'compelled by the Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force and solemnity of the particle. Though
    somewhat elevated in English, it remains readable and signals Paul's emphatic
    transition better than omitting it.
- source_word: δεδεμένος
  chosen: bound
  alternatives:
  - constrained
  - compelled
  lexicon: BDAG
  rationale: The perfect passive participle of δέω literally means 'having been bound.'
    'Bound' preserves the metaphor's force and leaves open whether the sense is inward
    constraint or Spirit-directed obligation. Less literal options such as 'compelled'
    interpret the metaphor more strongly than the Greek requires.
- source_word: τῷ πνεύματι
  chosen: in the Spirit
  alternatives:
  - by the Spirit
  - in spirit
  lexicon: BDAG
  rationale: The dative phrase is genuinely ambiguous. Given Acts' frequent reference
    to the Holy Spirit and the likely contextual sense of divine direction, the main
    text uses 'in the Spirit.' This preserves a close rendering without over-specifying
    agency as 'by the Spirit.' The alternative 'in spirit' is preserved in a footnote
    because some interpreters take it as Paul's own spirit rather than the Holy Spirit.
- source_word: πορεύομαι
  chosen: I am going
  alternatives:
  - I go
  - I am on my way
  lexicon: BDAG
  rationale: A present middle/passive indicative with movement sense. 'I am going'
    is natural modern English and reflects the ongoing/imminent action.
- source_word: τὰ ἐν αὐτῇ συναντήσοντά μοι
  chosen: what will happen to me there
  alternatives:
  - the things that will meet me in it
  - what will meet me there
  lexicon: BDAG
  rationale: The Greek is literally 'the things in it that will meet me.' In idiomatic
    English, 'what will happen to me there' best conveys the sense of impending events
    awaiting Paul in Jerusalem. 'There' renders the locative force naturally rather
    than repeating 'in it.'
- source_word: μὴ εἰδώς
  chosen: not knowing
  alternatives:
  - without knowing
  lexicon: BDAG
  rationale: A participial expression modifying Paul. 'Not knowing' is the most direct
    and natural rendering in English.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
