theological_decisions:
- issue: Referent of τῷ πνεύματι
  chosen_reading: the Holy Spirit is the likely referent, rendered as 'in the Spirit'
  alternative_readings:
  - Paul's own spirit, rendered 'in spirit'
  - agency emphasis, rendered 'by the Spirit'
  rationale: Acts commonly uses πνεῦμα for the Holy Spirit, and the immediate context
    (especially the following verses about the Spirit's testimony) supports divine
    direction. However, the dative construction does not force a single interpretation,
    so the translation preserves some ambiguity with 'in the Spirit' and records the
    alternative in a footnote rather than resolving the tension too strongly.
  doctrine_reference: Preserve theological tension rather than resolve it.
