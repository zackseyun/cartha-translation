theological_decisions:
- issue: Meaning of 'innocent of the blood of all'
  chosen_reading: An idiom of freedom from guilt/responsibility for others because
    Paul fully discharged his duty to warn and teach them.
  alternative_readings:
  - A narrower reference to literal complicity in anyone's physical death
  rationale: The phrase strongly echoes biblical bloodguilt/watchman imagery, especially
    Ezekiel, and in Acts 20 the immediate context is Paul's faithful proclamation
    of the whole counsel of God. The translation preserves the idiom without flattening
    it into paraphrase, while the lexical choice 'innocent' signals the guilt-related
    sense.
