id: ACT.20.26
reference: Acts 20:26
source:
  edition: SBLGNT
  text: ⸀διότι μαρτύρομαι ὑμῖν ἐν τῇ σήμερον ἡμέρᾳ ὅτι καθαρός ⸀εἰμι ἀπὸ τοῦ αἵματος
    πάντων,
translation:
  text: Therefore I testify to you on this day that I am innocent of the blood of
    all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "clean from the blood of all"; the Greek idiom refers to being free from
      guilt or responsibility concerning others.
    reason: lexical_alternative
  - marker: b
    text: This wording likely echoes Ezekiel's watchman imagery about bloodguilt (e.g.,
      Ezek 3:18–19; 33:6–9).
    reason: cross_reference
lexical_decisions:
- source_word: διότι
  chosen: Therefore
  alternatives:
  - For this reason
  - because
  lexicon: BDAG
  rationale: In context Paul is drawing an inference from the preceding statement
    about not shrinking back; 'therefore' best captures the discourse connection in
    natural English. 'Because' is possible more formally, but here the clause functions
    inferentially.
- source_word: μαρτύρομαι
  chosen: I testify
  alternatives:
  - I bear witness
  - I declare
  lexicon: BDAG
  rationale: The middle/passive form here carries the sense of solemn personal testimony.
    'I testify' is clear modern English and preserves the juridical/solemn force better
    than the more wooden 'I bear witness'.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - before you
  lexicon: BDAG
  rationale: Simple indirect object is most natural. 'Before you' would over-specify
    a public or forensic nuance not required by the dative alone.
- source_word: ἐν τῇ σήμερον ἡμέρᾳ
  chosen: on this day
  alternatives:
  - today
  - in this very day
  lexicon: BDAG
  rationale: This idiom is semitic/solemn in flavor. 'On this day' preserves the formal
    tone and echoes covenantal/testimonial language better than the flatter 'today,'
    while remaining idiomatic English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely that
  lexicon: BDAG
  rationale: Introduces the content of Paul's testimony. Plain 'that' is sufficient
    and idiomatic.
- source_word: καθαρός
  chosen: innocent
  alternatives:
  - clean
  - free
  lexicon: BDAG
  rationale: Given the following phrase 'of the blood of all,' the adjective carries
    the sense of freedom from guilt or liability. 'Innocent' communicates this moral-legal
    force better than the more literal but less idiomatic 'clean'.
- source_word: εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: Standard copula; retained explicitly in English.
- source_word: ἀπὸ τοῦ αἵματος
  chosen: of the blood
  alternatives:
  - from the blood
  - for the blood
  lexicon: BDAG
  rationale: The expression is idiomatic for bloodguilt or responsibility for another's
    death/destruction, echoing Ezekiel watchman language. English idiom prefers 'innocent
    of the blood' rather than the more literal 'from the blood'.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of everyone
  - of all people
  lexicon: BDAG
  rationale: The genitive plural is broad and contextually refers to all persons under
    Paul's ministry responsibility. 'Of all' is concise and preserves the rhetorical
    force; 'everyone' is possible but slightly more interpretive.
