theological_decisions:
- issue: Whether κλάσας τὸν ἄρτον should be rendered as an explicit reference to the
    Lord's Supper
  chosen_reading: Rendered neutrally as 'broke the bread' without sacramental specification.
  alternative_readings:
  - understood by some as a reference to the Lord's Supper
  - understood by others as an ordinary meal or shared table fellowship
  rationale: The phrase can carry eucharistic associations in Acts, but this verse
    itself does not unambiguously require a technical sacramental reading. Per translation
    philosophy, the rendering preserves the textual wording and theological tension
    rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
