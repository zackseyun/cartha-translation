id: ACT.20.11
reference: Acts 20:11
source:
  edition: SBLGNT
  text: ἀναβὰς δὲ καὶ κλάσας ⸀τὸν ἄρτον καὶ γευσάμενος ἐφ’ ἱκανόν τε ὁμιλήσας ἄχρι
    αὐγῆς, οὕτως ἐξῆλθεν.
translation:
  text: Then he went upstairs, broke the bread, and ate; and after talking for a long
    time, until dawn, he departed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'broke bread.' The Greek expression may refer simply to sharing a meal,
      though some understand it here as including the Lord's Supper.
    reason: alternative_reading
  - marker: b
    text: Or 'tasted' or 'partook of food.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβὰς
  chosen: went upstairs
  alternatives:
  - went up
  - went back upstairs
  lexicon: BDAG
  rationale: Aorist participle of ἀναβαίνω, in this narrative context referring to
    Paul returning to the upper room after going down. 'Went upstairs' is natural
    English and preserves the spatial movement.
- source_word: κλάσας τὸν ἄρτον
  chosen: broke the bread
  alternatives:
  - broke bread
  lexicon: BDAG
  rationale: The Greek has the article τὸν with ἄρτον, so 'the bread' is slightly
    more formally precise than the idiomatic 'broke bread.' This also preserves the
    concrete action without deciding beyond the text whether the phrase is technical
    for a communal meal or the Lord's Supper.
- source_word: γευσάμενος
  chosen: ate
  alternatives:
  - tasted
  - took food
  lexicon: BDAG
  rationale: Although γεύομαι can mean 'taste,' in meal contexts it commonly extends
    to eating/partaking. 'Ate' fits normal English usage here and avoids the misleading
    impression of only a small ceremonial taste, while still matching the context
    of a meal.
- source_word: ἐφ’ ἱκανόν
  chosen: for a long time
  alternatives:
  - for quite a while
  - for a considerable time
  lexicon: BDAG
  rationale: This idiom means for a considerable length of time. 'For a long time'
    is clear, natural, and adequately reflects the duration.
- source_word: ὁμιλήσας
  chosen: after talking
  alternatives:
  - after conversing
  - after speaking
  lexicon: BDAG
  rationale: ὁμιλέω here denotes extended conversation/discourse. 'Talking' is readable
    modern English and suits the prolonged interaction indicated by the context and
    the phrase 'until dawn.'
- source_word: ἄχρι αὐγῆς
  chosen: until dawn
  alternatives:
  - until daybreak
  lexicon: BDAG
  rationale: αὐγή refers to dawn/daybreak. 'Until dawn' is concise and idiomatic.
- source_word: οὕτως ἐξῆλθεν
  chosen: he departed
  alternatives:
  - he went away
  - he left in this way
  lexicon: BDAG
  rationale: οὕτως links the departure to the preceding sequence ('thus/then/in this
    manner'), but in English the sense is sufficiently conveyed by concluding with
    'he departed.' This avoids awkwardness while preserving the narrative outcome.
