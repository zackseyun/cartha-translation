id: ACT.20.14
reference: Acts 20:14
source:
  edition: SBLGNT
  text: ὡς δὲ ⸀συνέβαλλεν ἡμῖν εἰς τὴν Ἆσσον, ἀναλαβόντες αὐτὸν ἤλθομεν εἰς Μιτυλήνην,
translation:
  text: And when he met us at Assos, we took him on board and came to Mitylene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'joined us at Assos' or 'came together with us at Assos.' The Greek verb
      can denote meeting or coming together; here the sense is that Paul rejoined
      the group there.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέβαλλεν
  chosen: met
  alternatives:
  - joined
  - came together with
  - arranged to meet
  lexicon: BDAG
  rationale: In this travel context with ἡμῖν and εἰς τὴν Ἆσσον, the verb most naturally
    means that Paul met up with the party at Assos. A more literal 'came together
    with' is awkward in English, while 'arranged to meet' over-interprets the prior
    plan rather than this verse's event.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Dative plural pronoun indicating the group traveling by ship; rendered
    straightforwardly as 'us' after the English verb 'met.'
- source_word: εἰς τὴν Ἆσσον
  chosen: at Assos
  alternatives:
  - to Assos
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into/to,' with a verb of meeting in English
    the idiomatic rendering is 'at Assos.' This preserves the location of the meeting
    without wooden phrasing.
- source_word: ἀναλαβόντες
  chosen: took him on board
  alternatives:
  - taking him along
  - taking him up
  lexicon: BDAG
  rationale: In nautical travel narrative, the participle indicates receiving Paul
    onto the ship. 'Took him on board' makes the implied maritime setting explicit
    and natural in English; 'taking him up' is too literal and unclear.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Refers to Paul, mentioned in the preceding context; simple pronominal
    rendering is sufficient.
- source_word: ἤλθομεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: English travel narrative often uses 'came' for arrival at a destination,
    and it matches the Greek aorist without adding emphasis. 'Went' is possible but
    less natural with the destination phrase that follows.
- source_word: εἰς Μιτυλήνην
  chosen: to Mitylene
  alternatives:
  - into Mitylene
  lexicon: BDAG
  rationale: Standard directional rendering with a place name; 'to Mitylene' is idiomatic
    English.
