id: ACT.20.21
reference: Acts 20:21
source:
  edition: SBLGNT
  text: διαμαρτυρόμενος Ἰουδαίοις τε καὶ Ἕλλησιν τὴν ⸀εἰς θεὸν μετάνοιαν καὶ ⸀πίστιν
    εἰς τὸν κύριον ἡμῶν ⸀Ἰησοῦν.
translation:
  text: solemnly testifying to both Jews and Greeks about repentance toward God and
    faith in our Lord Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust in our Lord Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαμαρτυρόμενος
  chosen: solemnly testifying
  alternatives:
  - testifying
  - earnestly warning
  - solemnly declaring
  lexicon: BDAG
  rationale: The participle carries the sense of emphatic, solemn witness or testimony.
    'Solemnly testifying' preserves both the testimonial and weighty force better
    than the flatter 'testifying' alone.
- source_word: Ἰουδαίοις τε καὶ Ἕλλησιν
  chosen: to both Jews and Greeks
  alternatives:
  - to Jews as well as Greeks
  - to both Jews and Gentiles
  lexicon: BDAG
  rationale: Ἕλληνες in Acts often denotes Greeks/Greek-speaking non-Jews rather than
    functioning as a fully generalized ethnic term 'Gentiles.' 'Both Jews and Greeks'
    preserves Luke's wording and the paired scope of Paul's witness.
- source_word: μετάνοιαν
  chosen: repentance
  alternatives:
  - a change of mind
  - turning
  lexicon: BDAG
  rationale: '''Repentance'' is the standard and most theologically adequate rendering
    here, capturing the moral-spiritual turning implied by the term without reducing
    it to mere mental reconsideration.'
- source_word: εἰς θεόν
  chosen: toward God
  alternatives:
  - to God
  - before God
  lexicon: BDAG
  rationale: With μετάνοιαν, εἰς marks direction/orientation. 'Toward God' naturally
    conveys repentance directed Godward and pairs well with the following 'faith in'
    construction.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. In
    this construction the object is explicit ('in our Lord Jesus'), so 'faith' is
    the most natural rendering, while 'trust' remains a viable lexical alternative
    preserved in a footnote.
- source_word: εἰς τὸν κύριον ἡμῶν Ἰησοῦν
  chosen: in our Lord Jesus
  alternatives:
  - toward our Lord Jesus
  - in the Lord Jesus who is ours
  lexicon: BDAG
  rationale: With πίστις, εἰς commonly expresses faith directed into or placed in
    someone; idiomatic English is 'faith in.' κύριος is translated 'Lord' per doctrine,
    and Ἰησοῦς is transliterated 'Jesus' as a personal name.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the contested-terms guidance, κύριος defaults to 'Lord.' This preserves
    both the title's christological weight and standard NT usage without importing
    a narrower social sense like 'Master'.
