theological_decisions:
- issue: Rendering of πίστις in a potentially theologically loaded expression
  chosen_reading: faith in our Lord Jesus
  alternative_readings:
  - trust in our Lord Jesus
  rationale: The doctrine file sets 'faith' as the default rendering for πίστις, with
    alternatives preserved where useful. Because the Greek explicitly gives Jesus
    as the object of faith, this is not the pistis-Christou genitive debate; 'faith
    in' is the clearest main-text rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; preserve alternatives
    in footnotes where contested or worth preserving'
