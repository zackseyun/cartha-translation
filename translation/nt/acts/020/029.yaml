theological_decisions:
- issue: Metaphorical force of 'wolves'
  chosen_reading: Retain the metaphor 'fierce wolves' rather than interpret it in
    the main text as false teachers or persecutors.
  alternative_readings:
  - destructive men
  - false teachers
  - oppressors
  rationale: The Greek text itself uses the metaphor and does not explicitly identify
    the wolves in this verse. Preserving the image maintains the rhetorical force
    and avoids importing a narrower interpretation than the text states.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Sense of ἄφιξις in context
  chosen_reading: Translate as 'departure' rather than the more common lexical sense
    'arrival.'
  alternative_readings:
  - arrival
  - coming
  rationale: Although the noun can denote arrival, the discourse context is Paul's
    warning about what will happen once he is no longer present with them. Rendering
    it 'departure' reflects the plain contextual sense rather than a mechanically
    literal gloss.
  doctrine_reference: Translation philosophy item 1
