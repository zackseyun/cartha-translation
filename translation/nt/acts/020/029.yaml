id: ACT.20.29
reference: Acts 20:29
source:
  edition: SBLGNT
  text: ἐγὼ ⸀οἶδα ὅτι εἰσελεύσονται μετὰ τὴν ἄφιξίν μου λύκοι βαρεῖς εἰς ὑμᾶς μὴ φειδόμενοι
    τοῦ ποιμνίου,
translation:
  text: I know that after my departure fierce wolves will come in among you, not sparing
    the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'savage wolves.' The Greek adjective can convey harsh, oppressive, or
      violent severity.
    reason: lexical_alternative
  - marker: b
    text: Literally 'after my coming/arrival'; in context, the sense is 'after my
      departure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  - I am certain
  lexicon: BDAG
  rationale: The verb expresses Paul's confident knowledge, not mere opinion. 'I know'
    is the most direct and natural English equivalent.
- source_word: εἰσελεύσονται
  chosen: will come in
  alternatives:
  - will enter
  - will come
  lexicon: BDAG
  rationale: Future middle of εἰσέρχομαι here conveys entry into the community. 'Will
    come in' is idiomatic and preserves the movement into their midst.
- source_word: μετὰ τὴν ἄφιξίν μου
  chosen: after my departure
  alternatives:
  - after I leave
  - after my leaving
  lexicon: BDAG
  rationale: ἄφιξις can denote arrival or coming, but in this context Paul is speaking
    of his leaving them, as shown by the warning about what will happen once he is
    gone. 'Departure' best captures the contextual sense in natural English.
- source_word: λύκοι βαρεῖς
  chosen: fierce wolves
  alternatives:
  - savage wolves
  - grievous wolves
  - heavy wolves
  lexicon: BDAG
  rationale: The phrase is metaphorical for dangerous false teachers or destructive
    opponents. βαρεῖς literally means 'heavy' but idiomatically conveys severity,
    harshness, or oppressiveness. 'Fierce' communicates the predatory danger in clear
    modern English. 'Savage' is also possible, but 'fierce' is slightly less interpretive
    while still natural.
- source_word: εἰς ὑμᾶς
  chosen: among you
  alternatives:
  - to you
  - into you
  - in among you
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' with the image of wolves entering
    a flock it refers to intrusion into the community. 'Among you' conveys the sense
    clearly in English.
- source_word: μὴ φειδόμενοι
  chosen: not sparing
  alternatives:
  - showing no mercy to
  - not holding back from harming
  lexicon: BDAG
  rationale: The participle describes the wolves' ruthless action toward the flock.
    'Not sparing' is concise, close to the Greek, and preserves the severity without
    over-paraphrase.
- source_word: τοῦ ποιμνίου
  chosen: the flock
  alternatives:
  - the sheepfold
  - the herd
  lexicon: BDAG
  rationale: ποίμνιον is the standard pastoral image for a flock, here metaphorically
    the church under the elders' care. 'The flock' preserves the biblical metaphor
    and fits the wolf imagery.
