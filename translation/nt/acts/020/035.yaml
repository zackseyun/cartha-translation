id: ACT.20.35
reference: Acts 20:35
source:
  edition: SBLGNT
  text: πάντα ὑπέδειξα ὑμῖν ὅτι οὕτως κοπιῶντας δεῖ ἀντιλαμβάνεσθαι τῶν ἀσθενούντων,
    μνημονεύειν τε τῶν λόγων τοῦ κυρίου Ἰησοῦ ὅτι αὐτὸς εἶπεν Μακάριόν ἐστιν μᾶλλον
    διδόναι ἢ λαμβάνειν.
translation:
  text: In everything I showed you that by laboring in this way it is necessary to
    help the weak, and to remember the words of the Lord Jesus, that he himself said,
    ‘It is more blessed to give than to receive.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to support the weak.' The Greek verb can imply sustained assistance,
      not only momentary help.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: In everything
  alternatives:
  - all things
  - in all things
  lexicon: BDAG
  rationale: Taken adverbially with ὑπέδειξα to mean 'in everything' or 'in every
    way,' introducing Paul's comprehensive example rather than a direct object 'all
    things' in isolation.
- source_word: ὑπέδειξα
  chosen: I showed
  alternatives:
  - I demonstrated
  - I set an example
  lexicon: BDAG
  rationale: The verb means to show, demonstrate, or point out by example. 'I showed'
    is concise and natural, while the following clause makes clear that Paul's conduct
    is exemplary.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: Introduces the content of what Paul showed them. 'That' preserves the
    explanatory force without overinterpreting.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - like this
  lexicon: BDAG
  rationale: Refers back to Paul's manner of labor. 'In this way' is idiomatic modern
    English and preserves the demonstrative sense.
- source_word: κοπιῶντας
  chosen: by laboring
  alternatives:
  - working hard
  - toiling
  lexicon: BDAG
  rationale: The participle conveys strenuous effort. 'By laboring' keeps the participial
    connection and avoids flattening the sense to mere employment.
- source_word: δεῖ
  chosen: it is necessary
  alternatives:
  - one must
  - it is fitting
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. 'It is necessary' preserves the
    force without specifying an explicit subject not present in Greek.
- source_word: ἀντιλαμβάνεσθαι
  chosen: to help
  alternatives:
  - to support
  - to come to the aid of
  lexicon: BDAG
  rationale: In this context the verb means to assist or support. 'Help' is clear
    and natural; 'support' is a viable alternative and is preserved in a footnote
    because it may better reflect sustained assistance.
- source_word: τῶν ἀσθενούντων
  chosen: the weak
  alternatives:
  - the weak ones
  - those who are weak
  lexicon: BDAG
  rationale: The participle can denote those who are weak, whether physically, materially,
    or socially vulnerable in context. 'The weak' is idiomatic and broad enough to
    preserve the likely range.
- source_word: μνημονεύειν τε
  chosen: and to remember
  alternatives:
  - and also to keep in mind
  lexicon: BDAG
  rationale: τε links this infinitive with the previous one. 'And to remember' is
    straightforward and preserves the coordination.
- source_word: τῶν λόγων
  chosen: the words
  alternatives:
  - the sayings
  lexicon: BDAG
  rationale: λόγοι here refers to remembered utterances of Jesus. 'Words' is the most
    direct rendering; 'sayings' is possible but slightly more interpretive.
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: the Lord Jesus
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal guidance. The article is naturally
    absorbed in English before the title-name combination.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the emphasis that this
    saying comes from Jesus personally.
- source_word: Μακάριόν ἐστιν
  chosen: It is more blessed
  alternatives:
  - It is happier
  - It is fortunate
  lexicon: BDAG
  rationale: μακάριος denotes blessedness, not mere emotional happiness. 'Blessed'
    preserves the moral and theological weight of the saying.
- source_word: μᾶλλον
  chosen: more
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Used comparatively with the infinitives 'to give' and 'to receive.' 'More'
    is the natural English comparative here.
- source_word: διδόναι
  chosen: to give
  lexicon: BDAG
  rationale: Direct and standard rendering of the infinitive.
- source_word: ἢ λαμβάνειν
  chosen: than to receive
  alternatives:
  - than to take
  lexicon: BDAG
  rationale: λαμβάνειν commonly means 'receive' in this contrastive saying. 'Take'
    is possible but less fitting in the ethical comparison.
