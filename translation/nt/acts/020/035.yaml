theological_decisions:
- issue: Scope of 'the weak'
  chosen_reading: Rendered broadly as 'the weak' without specifying physical weakness,
    poverty, or spiritual weakness.
  alternative_readings:
  - the poor
  - the sick
  - the spiritually weak
  rationale: The Greek participle ἀσθενούντων is semantically broad, and the immediate
    context of labor and giving suggests vulnerable persons generally. Narrowing the
    term would import specificity the text does not require.
  doctrine_reference: Preserve theological tension rather than resolve it.
