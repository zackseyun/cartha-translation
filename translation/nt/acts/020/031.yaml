theological_decisions:
- issue: Pastoral force of νουθετῶν
  chosen_reading: admonishing
  alternative_readings:
  - warning
  - instructing
  rationale: The verse describes Paul's emotionally intense, personal ministry of
    correction and exhortation. 'Admonishing' preserves this pastoral-theological
    nuance better than the narrower 'warning' or the flatter 'instructing.'
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense;
    readable modern English, not flattening theological weight.'
