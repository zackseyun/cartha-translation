id: ACT.20.31
reference: Acts 20:31
source:
  edition: SBLGNT
  text: διὸ γρηγορεῖτε, μνημονεύοντες ὅτι τριετίαν νύκτα καὶ ἡμέραν οὐκ ἐπαυσάμην
    μετὰ δακρύων νουθετῶν ἕνα ἕκαστον.
translation:
  text: Therefore stay alert, remembering that for three years, night and day, I did
    not stop admonishing each one with tears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'warning each one.' The Greek verb can emphasize corrective warning as
      well as instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding warning; 'Therefore'
    is natural and preserves the logical force.
- source_word: γρηγορεῖτε
  chosen: stay alert
  alternatives:
  - keep watch
  - be watchful
  - be awake
  lexicon: BDAG
  rationale: Present imperative calls for ongoing vigilance. 'Stay alert' communicates
    sustained watchfulness in clear modern English without sounding wooden.
- source_word: μνημονεύοντες
  chosen: remembering
  alternatives:
  - keeping in mind
  - remember
  lexicon: BDAG
  rationale: 'Present participle expressing attendant manner or means: they are to
    remain alert by remembering Paul''s example. ''Remembering'' preserves the participial
    connection.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  - because
  lexicon: BDAG
  rationale: Introduces the content of what they are to remember. 'That' is the most
    straightforward rendering.
- source_word: τριετίαν
  chosen: for three years
  alternatives:
  - a period of three years
  - three years
  lexicon: BDAG
  rationale: Accusative of extent of time. 'For three years' makes the temporal duration
    explicit in idiomatic English.
- source_word: νύκτα καὶ ἡμέραν
  chosen: night and day
  alternatives:
  - day and night
  lexicon: BDAG
  rationale: The Greek order is 'night and day,' and preserving it retains the source
    emphasis and idiom of continual activity.
- source_word: οὐκ ἐπαυσάμην
  chosen: I did not stop
  alternatives:
  - I never ceased
  - I did not cease
  lexicon: BDAG
  rationale: Aorist middle with negation conveys that Paul did not let up in this
    activity. 'I did not stop' is idiomatic modern English; 'never ceased' is possible
    but slightly more formal.
- source_word: μετὰ δακρύων
  chosen: with tears
  alternatives:
  - amid tears
  - tearfully
  lexicon: BDAG
  rationale: μετά with genitive expresses accompaniment. 'With tears' is concise and
    preserves the emotional force of Paul's ministry.
- source_word: νουθετῶν
  chosen: admonishing
  alternatives:
  - warning
  - instructing
  - counseling
  lexicon: BDAG
  rationale: νουθετέω includes warning/correction directed to the mind for moral formation.
    'Admonishing' best preserves both the pastoral and corrective sense without reducing
    it to mere information.
- source_word: ἕνα ἕκαστον
  chosen: each one
  alternatives:
  - every one of you
  - each individual
  lexicon: BDAG
  rationale: Distributive expression emphasizing individual attention. 'Each one'
    is concise and faithful; adding 'of you' would slightly over-specify what is implied
    by context rather than stated in the phrase itself.
