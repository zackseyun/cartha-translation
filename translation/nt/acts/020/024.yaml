theological_decisions:
- issue: Sense of ψυχή in Paul's self-description
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse concerns Paul's willingness to face suffering and death in
    order to complete his mission. Rendering ψυχή as 'life' avoids importing a body-soul
    contrast not foregrounded by the context.
- issue: Force of ὡς τελειῶσαι
  chosen_reading: if only I may finish
  alternative_readings:
  - so that I may finish
  - in order to finish
  rationale: The clause expresses Paul's governing aim rather than a strict purpose
    clause alone. This rendering preserves the existential and rhetorical force of
    his statement without adding doctrinal content.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
