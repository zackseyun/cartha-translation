id: ACT.20.24
reference: Acts 20:24
source:
  edition: SBLGNT
  text: ἀλλ’ οὐδενὸς ⸀λόγου ⸀ποιοῦμαι τὴν ⸀ψυχὴν τιμίαν ἐμαυτῷ ὡς ⸀τελειῶσαι τὸν δρόμον
    ⸀μου καὶ τὴν διακονίαν ἣν ἔλαβον παρὰ τοῦ κυρίου Ἰησοῦ, διαμαρτύρασθαι τὸ εὐαγγέλιον
    τῆς χάριτος τοῦ θεοῦ.
translation:
  text: 'But I do not count my life as of any value to myself, if only I may finish
    my course and the ministry that I received from the Lord Jesus: to testify to
    the gospel of the grace of God.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul as precious to myself.' Here 'life' is preferred because the
      context is Paul's willingness to face death in order to complete his mission.
    reason: lexical_alternative
  - marker: b
    text: Or 'finish my race.' The Greek δρόμος is a course or race run to completion.
    reason: lexical_alternative
  - marker: c
    text: Or 'to bear witness' or 'to solemnly testify' to the gospel of God's grace.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδενὸς λόγου ποιοῦμαι
  chosen: I do not count ... as of any value
  alternatives:
  - I make no account of
  - I consider ... of no importance
  - I do not make my life worth anything
  lexicon: BDAG
  rationale: The idiom literally involves 'making [something] of no account/value.'
    'I do not count ... as of any value' is natural English and preserves the evaluative
    sense without over-paraphrase.
- source_word: ψυχήν
  chosen: life
  alternatives:
  - soul
  lexicon: BDAG
  rationale: In this context Paul speaks of preserving or losing his earthly life
    in the face of suffering, not of the immaterial soul as such. 'Life' best fits
    the discourse context and idiomatic English.
- source_word: τιμίαν ἐμαυτῷ
  chosen: as of any value to myself
  alternatives:
  - precious to myself
  - dear to myself
  lexicon: BDAG
  rationale: τιμίαν can mean 'valuable/precious.' The phrase expresses personal valuation.
    'As of any value to myself' captures both the adjective and the dative ἐμαυτῷ
    in clear modern English.
- source_word: ὡς τελειῶσαι
  chosen: if only I may finish
  alternatives:
  - so that I may finish
  - in order to finish
  - as to finish
  lexicon: BDAG
  rationale: The construction is somewhat compressed and expresses Paul's overriding
    aim. 'If only I may finish' conveys the sense of sole concern or purpose in idiomatic
    English better than a wooden infinitival rendering.
- source_word: δρόμον
  chosen: course
  alternatives:
  - race
  - course of life
  lexicon: BDAG
  rationale: The metaphor is athletic or journey-like. 'Course' preserves the metaphor
    while sounding natural in English and avoiding over-specifying 'race,' though
    that remains a viable alternative.
- source_word: διακονίαν
  chosen: ministry
  alternatives:
  - service
  - task
  lexicon: BDAG
  rationale: Here the term refers to Paul's commissioned apostolic service. 'Ministry'
    is the most fitting English equivalent in this context, though 'service' is lexically
    possible.
- source_word: παρὰ τοῦ κυρίου Ἰησοῦ
  chosen: from the Lord Jesus
  alternatives:
  - from Lord Jesus
  lexicon: BDAG
  rationale: παρά with the genitive indicates source/origin. 'From the Lord Jesus'
    is the natural English rendering and preserves κύριος as the title 'Lord' per
    project defaults.
- source_word: διαμαρτύρασθαι
  chosen: to testify
  alternatives:
  - to bear witness
  - to solemnly testify
  lexicon: BDAG
  rationale: The verb carries the sense of bearing witness, often solemnly or earnestly.
    'To testify' is concise and natural; the solemn nuance is present in context even
    if not made explicit in the main text.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' remains clear in modern English and preserves the term''s
    established theological weight. ''Good news'' is possible but slightly flattens
    the recognized Christian proclamation term here.'
- source_word: τῆς χάριτος τοῦ θεοῦ
  chosen: of the grace of God
  alternatives:
  - about God's grace
  lexicon: BDAG
  rationale: The genitive chain is best preserved straightforwardly. 'The gospel of
    the grace of God' can mean the gospel characterized by or concerning God's grace;
    the more formal rendering keeps the Greek structure without forcing a narrower
    interpretation.
