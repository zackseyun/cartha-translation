id: ACT.20.16
reference: Acts 20:16
source:
  edition: SBLGNT
  text: ⸀κεκρίκει γὰρ ὁ Παῦλος παραπλεῦσαι τὴν Ἔφεσον, ὅπως μὴ γένηται αὐτῷ χρονοτριβῆσαι
    ἐν τῇ Ἀσίᾳ, ἔσπευδεν γὰρ εἰ δυνατὸν ⸀εἴη αὐτῷ τὴν ἡμέραν τῆς πεντηκοστῆς γενέσθαι
    εἰς Ἱεροσόλυμα.
translation:
  text: For Paul had decided to sail past Ephesus, so that he might not have to spend
    time in Asia; for he was hurrying to be in Jerusalem, if possible, on the day
    of Pentecost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Asia'' here refers to the Roman province of Asia in western Asia Minor,
      not the modern continent.'
    reason: cultural_note
  - marker: b
    text: Or 'to arrive in Jerusalem on the day of Pentecost.' The Greek expression
      can emphasize either being present there by that day or arriving there then.
    reason: alternative_reading
lexical_decisions:
- source_word: κεκρίκει
  chosen: had decided
  alternatives:
  - had resolved
  - had determined
  lexicon: BDAG
  rationale: Pluperfect sense is best reflected by 'had decided,' indicating a prior
    settled decision before the narrated movement.
- source_word: παραπλεῦσαι
  chosen: to sail past
  alternatives:
  - to sail by
  - to pass by by sea
  lexicon: BDAG
  rationale: The verb specifically denotes passing along or by sea; 'sail past' is
    natural modern English and preserves the maritime sense.
- source_word: ὅπως μὴ γένηται αὐτῷ χρονοτριβῆσαι
  chosen: so that he might not have to spend time
  alternatives:
  - so that it might not happen for him to delay
  - so that he might not be delayed
  lexicon: BDAG
  rationale: This clause is idiomatic. χρονοτριβέω means to spend time or delay; the
    construction with γένηται is rendered naturally as avoiding the necessity/result
    of spending time there. 'Have to spend time' captures the practical sense without
    over-literal awkwardness.
- source_word: ἐν τῇ Ἀσίᾳ
  chosen: in Asia
  alternatives:
  - in the province of Asia
  lexicon: BDAG
  rationale: The referent is the Roman province in Asia Minor, not the modern continent.
    The main text keeps the familiar proper name concise; the provincial sense is
    worth preserving in a footnote.
- source_word: ἔσπευδεν
  chosen: he was hurrying
  alternatives:
  - he was eager
  - he was making haste
  lexicon: BDAG
  rationale: The imperfect portrays ongoing haste. 'He was hurrying' is clear modern
    English and fits the travel context better than the more ambiguous 'was eager.'
- source_word: εἰ δυνατὸν εἴη αὐτῷ
  chosen: if possible
  alternatives:
  - if it were possible for him
  - if he could
  lexicon: BDAG
  rationale: This idiom expresses contingency. 'If possible' is concise and idiomatic,
    while the dative αὐτῷ is naturally absorbed into English expression.
- source_word: τὴν ἡμέραν τῆς πεντηκοστῆς
  chosen: on the day of Pentecost
  alternatives:
  - by the day of Pentecost
  - for the day of Pentecost
  lexicon: BDAG
  rationale: The accusative of time with γενέσθαι εἰς Ἱεροσόλυμα indicates his aim
    to be present in Jerusalem on that festival day. 'On the day of Pentecost' is
    the most straightforward rendering.
- source_word: γενέσθαι εἰς Ἱεροσόλυμα
  chosen: to be in Jerusalem
  alternatives:
  - to arrive in Jerusalem
  - to come to Jerusalem
  lexicon: BDAG
  rationale: Although literally 'to be/come into Jerusalem,' the idiom here focuses
    on being present there by that time. 'To be in Jerusalem' communicates the intended
    result more naturally than a wooden rendering.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: πεντηκοστῆς
  chosen: Pentecost
  alternatives:
  - the Festival of Weeks
  lexicon: BDAG
  rationale: By the NT period πεντηκοστή functions as the established festival name.
    'Pentecost' is standard and recognizable, while the Jewish festal background can
    be noted separately if needed.
