id: ACT.20.33
reference: Acts 20:33
source:
  edition: SBLGNT
  text: ἀργυρίου ἢ χρυσίου ἢ ἱματισμοῦ οὐδενὸς ἐπεθύμησα·
translation:
  text: I coveted no one's silver or gold or clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desired no one's silver or gold or clothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργυρίου
  chosen: silver
  alternatives:
  - money
  lexicon: BDAG
  rationale: The noun literally denotes silver; in context with gold and clothing,
    the list names valuables/possessions rather than abstract wealth alone. 'Silver'
    preserves the concrete parallelism.
- source_word: χρυσίου
  chosen: gold
  lexicon: BDAG
  rationale: A straightforward rendering of the genitive singular noun, coordinated
    with 'silver' and 'clothing' as objects of desire.
- source_word: ἱματισμοῦ
  chosen: clothing
  alternatives:
  - garments
  - apparel
  lexicon: BDAG
  rationale: Refers to clothing/garments. 'Clothing' is natural modern English and
    fits the list of material possessions without sounding archaic.
- source_word: οὐδενὸς
  chosen: no one's
  alternatives:
  - none
  - nothing belonging to anyone
  lexicon: BDAG
  rationale: The genitive singular with the preceding genitives indicates that Paul
    denies coveting any person's possessions. 'No one's' makes the possessive force
    explicit in idiomatic English.
- source_word: ἐπεθύμησα
  chosen: coveted
  alternatives:
  - desired
  - set my heart on
  lexicon: BDAG
  rationale: The aorist of ἐπιθυμέω can mean desire or covet; here, in a moral context
    about material possessions, 'coveted' best captures the negative ethical sense
    and echoes biblical diction without being archaic.
- source_word: ἢ ... ἢ ... ἢ
  chosen: or ... or ... or
  alternatives:
  - nor ... nor ... nor
  lexicon: BDAG
  rationale: The repeated disjunctive conjunction structures the list. In English,
    'silver or gold or clothing' after a negated verb is idiomatic and preserves the
    Greek coordination.
