theological_decisions:
- issue: Moral nuance of ἐπιθυμέω in relation to material possessions
  chosen_reading: Render with the ethically charged 'coveted' rather than the more
    neutral 'desired.'
  alternative_readings:
  - desired no one's silver or gold or clothing
  rationale: The context is Paul's defense of his integrity and freedom from greed.
    The verse concerns wrongful desire for others' possessions, so 'coveted' better
    reflects the likely ethical force without importing extra doctrine.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve the source''s plain sense.'
