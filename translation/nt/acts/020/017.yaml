theological_decisions:
- issue: Meaning of πρεσβυτέρους in ecclesial context
  chosen_reading: church leaders designated as 'elders'
  alternative_readings:
  - older men of the congregation
  - presbyters as a technical transliteration
  rationale: The narrative context concerns Paul's communication with recognized leaders
    from Ephesus, and Acts regularly uses πρεσβύτεροι for leadership figures in the
    churches. Rendering as 'elders' preserves the lexical sense without imposing later
    denominational polity.
  doctrine_reference: Translation philosophy §§1, 5; Affirmations (non-denominational
    within orthodoxy)
