id: ACT.20.17
reference: Acts 20:17
source:
  edition: SBLGNT
  text: Ἀπὸ δὲ τῆς Μιλήτου πέμψας εἰς Ἔφεσον μετεκαλέσατο τοὺς πρεσβυτέρους τῆς ἐκκλησίας.
translation:
  text: Now from Miletus he sent to Ephesus and called for the elders of the church.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent for the elders of the church.' The Greek combines 'sent to Ephesus'
      with 'called for,' indicating that he dispatched a message or messengers requesting
      their presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς Μιλήτου
  chosen: Now from Miletus
  alternatives:
  - And from Miletus
  - From Miletus
  lexicon: BDAG
  rationale: ἀπό with the genitive marks source/location, rendered 'from Miletus.'
    δέ is a mild connective; 'Now' gives natural English discourse flow without overstating
    contrast.
- source_word: πέμψας
  chosen: he sent to
  alternatives:
  - having sent to
  - sending to
  lexicon: BDAG
  rationale: Aorist participle of πέμπω, modifying the main verb. In idiomatic English,
    the participial action is best brought into the main clause sequence as 'he sent
    to,' preserving the sense that he dispatched a message or messengers to Ephesus.
- source_word: εἰς Ἔφεσον
  chosen: to Ephesus
  alternatives:
  - into Ephesus
  lexicon: BDAG
  rationale: εἰς with a city name is naturally rendered 'to Ephesus' in English for
    destination.
- source_word: μετεκαλέσατο
  chosen: called for
  alternatives:
  - summoned
  - sent for
  - called to himself
  lexicon: BDAG
  rationale: The middle voice of μετακαλέομαι conveys summoning or sending for someone.
    'Called for' is clear modern English and fits the context of requesting the Ephesian
    elders to come to him. 'Summoned' is possible but can sound overly formal or coercive.
- source_word: τοὺς πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the older men
  - the presbyters
  lexicon: BDAG
  rationale: In Acts and early church context, πρεσβύτεροι refers to recognized church
    leaders, not merely older males. 'Elders' is the standard and contextually accurate
    rendering.
- source_word: τῆς ἐκκλησίας
  chosen: of the church
  alternatives:
  - of the assembly
  - of the congregation
  lexicon: BDAG
  rationale: ἐκκλησία in Luke-Acts commonly denotes the Christian community/church.
    'Church' is the most natural and contextually established rendering here, without
    importing a denominational structure.
