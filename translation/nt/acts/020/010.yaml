id: ACT.20.10
reference: Acts 20:10
source:
  edition: SBLGNT
  text: καταβὰς δὲ ὁ Παῦλος ἐπέπεσεν αὐτῷ καὶ συμπεριλαβὼν εἶπεν· Μὴ θορυβεῖσθε, ἡ
    γὰρ ψυχὴ αὐτοῦ ἐν αὐτῷ ἐστιν.
translation:
  text: But Paul went down and fell upon him, and embracing him said, “Do not be alarmed,
    for his life is in him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul is in him.' The Greek word ψυχή can mean 'life,' 'self,' or
      'soul'; here 'life' best fits the immediate context of whether he is dead or
      alive.
    reason: lexical_alternative
  - marker: b
    text: Paul's words can be understood either as saying the young man was not dead
      after all, or that his life had been restored; the Greek wording itself does
      not explicitly settle the question.
    reason: alternative_reading
lexical_decisions:
- source_word: καταβὰς
  chosen: went down
  alternatives:
  - came down
  - having gone down
  lexicon: BDAG
  rationale: Aorist participle of καταβαίνω, referring to Paul descending from the
    upper room area. 'Went down' is natural English and preserves the directional
    sense without over-literal participial awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast with the preceding report of the
    young man's fall and apparent death. 'But' appropriately signals Paul's responsive
    action.
- source_word: ἐπέπεσεν αὐτῷ
  chosen: fell upon him
  alternatives:
  - threw himself on him
  - fell on him
  lexicon: BDAG
  rationale: The idiom echoes prophetic/restorative action language (cf. Elijah/Elisha
    patterns) and is best preserved fairly literally. 'Fell upon him' keeps the physical
    action and possible intertextual resonance.
- source_word: συμπεριλαβὼν
  chosen: embracing him
  alternatives:
  - taking him in his arms
  - holding him close
  lexicon: BDAG
  rationale: The participle conveys enfolding or embracing. 'Embracing him' is concise,
    natural, and preserves the bodily, compassionate action.
- source_word: Μὴ θορυβεῖσθε
  chosen: Do not be alarmed
  alternatives:
  - Do not be troubled
  - Do not make an uproar
  - Do not be disturbed
  lexicon: BDAG
  rationale: θορυβέω can denote agitation, disturbance, or tumult. In context Paul
    addresses the gathered believers' distressed commotion after Eutychus's fall.
    'Do not be alarmed' captures both the emotional and situational force in idiomatic
    English.
- source_word: ἡ γὰρ ψυχὴ αὐτοῦ
  chosen: for his life
  alternatives:
  - for his soul
  - for his life-breath
  lexicon: BDAG
  rationale: ψυχή can mean 'life,' 'self,' or 'soul.' Here the immediate issue is
    whether the young man is dead or alive, so 'life' best fits the context and avoids
    importing a more technical anthropological sense than the verse requires.
- source_word: ἐν αὐτῷ ἐστιν
  chosen: is in him
  alternatives:
  - remains in him
  - is still in him
  lexicon: BDAG
  rationale: A straightforward rendering of the clause. 'Is in him' preserves the
    Greek wording and leaves open whether Paul means that life remains present in
    him or has been restored, without over-interpreting.
