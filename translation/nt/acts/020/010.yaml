theological_decisions:
- issue: Meaning of ψυχή in a life/death context
  chosen_reading: Rendered as 'life' rather than 'soul.'
  alternative_readings:
  - '''soul'''
  rationale: The context concerns Eutychus's physical condition after the fall. Translating
    ψυχή as 'life' reflects common Greek usage in such contexts and avoids suggesting
    a doctrinal statement about the separability of the soul that the verse itself
    does not foreground.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether Paul's statement implies Eutychus was never dead or had been restored
    to life
  chosen_reading: 'Main text remains neutral: ''his life is in him.'''
  alternative_readings:
  - Interpretive renderings such as 'he is alive' or 'his life has returned to him'
  rationale: The Greek states that his life is in him, but does not explicitly explain
    whether this means he was not dead after all or that God restored him through
    Paul's action. A more interpretive rendering would resolve an ambiguity the text
    leaves unstated.
  doctrine_reference: Preserve theological tension rather than resolve it.
