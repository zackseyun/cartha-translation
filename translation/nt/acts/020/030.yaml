theological_decisions:
- issue: Nature of the false teachers' speech
  chosen_reading: speaking twisted things
  alternative_readings:
  - speaking perverse things
  - speaking distorted things
  rationale: The verse warns of doctrinal/moral deviation without specifying a precise
    heresy. The translation should preserve the broad warning rather than narrow it
    to one theological category.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering of ἄνδρες
  chosen_reading: men
  alternative_readings:
  - people
  - persons
  rationale: The Greek term is specifically masculine. The translation follows the
    stated gender-accurate policy and does not neutralize the wording.
  doctrine_reference: Gender-accurate over gender-neutral.
