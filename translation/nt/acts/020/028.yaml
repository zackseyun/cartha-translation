theological_decisions:
- issue: Referent and force of τοῦ αἵματος τοῦ ἰδίου
  chosen_reading: '''through the blood of his own'' in the main text'
  alternative_readings:
  - through the blood of his own Son
  - with his own blood
  rationale: This clause is theologically weighty because, with 'church of God,' one traditional rendering yields 'with his own blood,' a strong statement bound up with Christology. However, the Greek wording τοῦ αἵματος τοῦ ἰδίου is terser and can naturally be understood as 'the blood of his own [one],' often taken as 'his own Son.' To avoid importing an interpretive expansion not explicit in the text while preserving orthodox Christology, the main text keeps the ambiguity as 'of his own,' and alternatives are preserved in footnotes.
  doctrine_reference: Preserve theological tension rather than resolve it.
revisions:
- timestamp: '2026-04-21T02:49:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/020/028.json
  category: awkward_english
  tier: 1
  from: of his own
  to: of his own Son
  rationale: The Greek phrase 'τοῦ ἰδίου' is most likely a substantival adjective meaning 'of his own One,' a clear reference to the Son. The current rendering 'of his own' is a formally literal translation, but it is an awkward and unnatural English construction that obscures the meaning. It leaves the reader wondering 'his own what?' rather than conveying the intended referent. For an 'optimal-equivalence' translation, which balances form and meaning, it would be better to render the meaning clearly in the text (as 'of his own Son') and explain the literal Greek in the footnote. The current approach prioritizes formal equivalence to the detriment of clarity.
