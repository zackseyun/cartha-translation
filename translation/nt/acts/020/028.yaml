id: ACT.20.28
reference: Acts 20:28
source:
  edition: SBLGNT
  text: ⸀προσέχετε ἑαυτοῖς καὶ παντὶ τῷ ποιμνίῳ, ἐν ᾧ ὑμᾶς τὸ πνεῦμα τὸ ἅγιον ἔθετο ἐπισκόπους, ποιμαίνειν τὴν ἐκκλησίαν τοῦ ⸀θεοῦ, ἣν περιεποιήσατο διὰ τοῦ ⸂αἵματος τοῦ ἰδίου⸃.
translation:
  text: Pay careful attention to yourselves and to all the flock, among which the Holy Spirit has appointed you overseers, to shepherd the church of God, which he obtained through the blood of his own Son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the church of the Lord' instead of 'the church of God.'
    reason: textual_variant
  - marker: b
    text: Or 'which he obtained through the blood of his own Son'; traditionally, 'which he obtained with his own blood.'
    reason: alternative_reading
  - marker: c
    text: Or 'of his own'.
    reason: previous_rendering
lexical_decisions:
- source_word: προσέχετε
  chosen: Pay careful attention
  alternatives:
  - Keep watch
  - Be on guard
  lexicon: BDAG
  rationale: The present imperative calls for ongoing vigilance. 'Pay careful attention' is natural modern English and captures the reflexive and pastoral force without sounding militarized, though 'keep watch' is possible.
- source_word: παντὶ τῷ ποιμνίῳ
  chosen: all the flock
  alternatives:
  - the whole flock
  lexicon: BDAG
  rationale: ποίμνιον is a collective pastoral metaphor, best preserved as 'flock.' 'All the flock' reflects παντί naturally in English.
- source_word: ἐν ᾧ
  chosen: among which
  alternatives:
  - in which
  lexicon: BDAG
  rationale: With a collective noun like 'flock,' English idiom prefers 'among which' rather than the more wooden 'in which,' while preserving the sense that the overseers are placed within that flock.
- source_word: ἔθετο
  chosen: has appointed
  alternatives:
  - placed
  - made
  lexicon: BDAG
  rationale: τίθημι here means to assign or appoint to a role. 'Has appointed' clearly conveys official placement into office.
- source_word: ἐπισκόπους
  chosen: overseers
  alternatives:
  - bishops
  - guardians
  lexicon: BDAG
  rationale: The lexical sense is supervisory leaders. 'Overseers' translates the title rather than importing later ecclesiastical office connotations associated with 'bishops.'
- source_word: ποιμαίνειν
  chosen: to shepherd
  alternatives:
  - to pastor
  - to tend
  lexicon: BDAG
  rationale: The verbal pastoral metaphor should be retained. 'To shepherd' preserves the imagery better than the more institutional 'to pastor.'
- source_word: ἐκκλησίαν
  chosen: church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: In Acts this term can mean assembly, but here it denotes the gathered people of God in a distinctly Christian sense. 'Church' is the clearest established rendering.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - of the Lord
  lexicon: NA28 textual tradition / BDAG
  rationale: The SBLGNT text reads θεοῦ, and the translation follows the given source text. A notable textual variant reads 'of the Lord' and should be preserved in a footnote.
- source_word: περιεποιήσατο
  chosen: obtained
  alternatives:
  - acquired
  - purchased
  - won for himself
  lexicon: BDAG
  rationale: The middle voice conveys acquiring for oneself. 'Obtained' is natural English and avoids over-specifying commercial imagery, though 'purchased' is a viable theological rendering.
- source_word: διὰ τοῦ αἵματος
  chosen: through the blood
  alternatives:
  - with the blood
  - by the blood
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through the blood' is idiomatic and preserves sacrificial-redemptive force.
- source_word: τοῦ ἰδίου
  chosen: of his own
  alternatives:
  - of his own one
  - of his own Son
  lexicon: BDAG
  rationale: The Greek literally says 'of his own.' Because ἴδιος can function substantivally, some understand an implied 'Son.' The main text preserves the Greek's compactness and ambiguity rather than resolving it interpretively.
