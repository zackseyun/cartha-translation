id: ACT.20.23
reference: Acts 20:23
source:
  edition: SBLGNT
  text: πλὴν ὅτι τὸ πνεῦμα τὸ ἅγιον κατὰ πόλιν διαμαρτύρεταί ⸀μοι λέγον ὅτι δεσμὰ
    ⸂καὶ θλίψεις με⸃ μένουσιν·
translation:
  text: except that the Holy Spirit testifies to me in city after city, saying that
    chains and afflictions await me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from city to city' or 'in every city.' The Greek idiom is distributive,
      indicating repeated testimony in successive cities.
    reason: lexical_alternative
  - marker: b
    text: Or 'bonds and afflictions await me.' 'Chains' translates the concrete image
      of the Greek; 'bonds' is a more traditional rendering.
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts differ slightly in the placement/presence of 'me' with
      'afflictions,' but the sense remains that chains and afflictions are awaiting
      Paul.
    reason: textual_variant
lexical_decisions:
- source_word: πλὴν ὅτι
  chosen: except that
  alternatives:
  - except
  - save that
  - only that
  lexicon: BDAG
  rationale: Introduces the sole qualification to Paul's statement in the previous
    verse. 'Except that' is natural English and preserves the adversative/exceptive
    force better than a bare 'except'.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the definite phrase referring to the
    divine Spirit. 'Holy Ghost' is archaic in modern English.
- source_word: κατὰ πόλιν
  chosen: in city after city
  alternatives:
  - from city to city
  - in every city
  lexicon: BDAG
  rationale: The distributive idiom κατά + singular noun conveys repetition by locality.
    'In city after city' preserves the iterative sense without over-specifying universality,
    while remaining idiomatic.
- source_word: διαμαρτύρεταί μοι
  chosen: testifies to me
  alternatives:
  - solemnly testifies to me
  - warns me
  - bears witness to me
  lexicon: BDAG
  rationale: The verb carries the sense of bearing solemn witness. 'Testifies to me'
    is concise and natural; 'warns me' is too interpretive, since the content is predictive
    rather than merely cautionary.
- source_word: λέγον
  chosen: saying
  alternatives:
  - declaring
  - telling me
  lexicon: BDAG
  rationale: The present participle introduces the content of the Spirit's testimony.
    'Saying' is the most direct and transparent rendering.
- source_word: δεσμὰ
  chosen: chains
  alternatives:
  - bonds
  - imprisonment
  lexicon: BDAG
  rationale: Literally refers to bonds/chains and by extension imprisonment. 'Chains'
    preserves the concrete image and avoids prematurely abstracting to the result.
- source_word: θλίψεις
  chosen: afflictions
  alternatives:
  - tribulations
  - troubles
  - sufferings
  lexicon: BDAG
  rationale: Refers to pressures/distresses. 'Afflictions' is readable modern English
    and retains the gravity of the term better than the vaguer 'troubles'; 'tribulations'
    can sound overly specialized.
- source_word: με
  chosen: me
  lexicon: NA28/SBLGNT textual tradition
  rationale: 'Included with θλίψεις in the printed text: ''chains and afflictions
    await me.'' This yields a smooth and well-supported reading.'
- source_word: μένουσιν
  chosen: await
  alternatives:
  - remain for
  - are waiting for
  - lie ahead for
  lexicon: BDAG
  rationale: In context the verb means that these things are in store for Paul. 'Await'
    is idiomatic English that captures the prospective force.
