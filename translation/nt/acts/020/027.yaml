id: ACT.20.27
reference: Acts 20:27
source:
  edition: SBLGNT
  text: οὐ γὰρ ὑπεστειλάμην τοῦ μὴ ἀναγγεῖλαι ⸂πᾶσαν τὴν βουλὴν τοῦ θεοῦ ὑμῖν⸃.
translation:
  text: For I did not shrink back from declaring to you the whole counsel of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole purpose of God,' 'the whole plan of God,' or 'the whole will
      of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεστειλάμην
  chosen: did not shrink back
  alternatives:
  - did not hesitate
  - did not hold back
  - did not draw back
  lexicon: BDAG
  rationale: The middle of ὑποστέλλω here carries the sense of drawing back or withholding
    oneself from a course of action. 'Shrink back' preserves the metaphor and matches
    the nearby usage in Acts 20:20 ('I did not shrink back from declaring...'), maintaining
    contextual consistency better than the flatter 'hesitate'.
- source_word: τοῦ μὴ ἀναγγεῖλαι
  chosen: from declaring
  alternatives:
  - from announcing
  - from proclaiming
  - so as not to declare
  lexicon: BDAG
  rationale: The articular infinitive with μή after ὑποστέλλω expresses the content/complement
    of what Paul did not shrink back from doing. In idiomatic English, 'from declaring'
    best captures the construction. ἀναγγέλλω means to report, announce, or declare;
    'declaring' fits the solemn teaching context.
- source_word: πᾶσαν
  chosen: the whole
  alternatives:
  - all
  - the full
  lexicon: BDAG
  rationale: With the singular noun βουλήν, πᾶσαν is best rendered distributively/intensively
    as 'the whole' rather than simply 'all,' emphasizing completeness of what Paul
    proclaimed.
- source_word: βουλήν
  chosen: counsel
  alternatives:
  - purpose
  - plan
  - will
  lexicon: BDAG
  rationale: βουλή can denote counsel, purpose, or plan. 'Counsel' is the most established
    and contextually apt rendering here, conveying God's comprehensive saving intention
    and instruction without narrowing the sense to decree alone ('purpose') or desire
    alone ('will').
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: A straightforward genitive indicating that the counsel belongs to or
    proceeds from God.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is best rendered 'to you' with the verb 'declaring,' preserving
    the direct address to the Ephesian elders.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ grounds the previous statement. 'For' preserves the connective force
    in a natural, readable way.
