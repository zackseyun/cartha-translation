theological_decisions:
- issue: Sense of βουλή τοῦ θεοῦ
  chosen_reading: the whole counsel of God
  alternative_readings:
  - the whole purpose of God
  - the whole plan of God
  - the whole will of God
  rationale: The phrase can be heard in ways that emphasize divine decree, saving
    purpose, or moral will. The translation preserves the broader semantic range by
    using 'counsel,' avoiding a denominationally loaded narrowing while still reflecting
    the Greek naturally.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate a denominational distinctive unless the Greek unambiguously supports
    one reading.
