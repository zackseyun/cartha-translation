id: ACT.20.8
reference: Acts 20:8
source:
  edition: SBLGNT
  text: ἦσαν δὲ λαμπάδες ἱκαναὶ ἐν τῷ ὑπερῴῳ οὗ ἦμεν συνηγμένοι·
translation:
  text: Now there were many lamps in the upper room where we were gathered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torches.' The Greek term can refer to portable lights more broadly,
      but in this indoor setting 'lamps' is more likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' gives natural English discourse flow and
    signals a scene-setting transition without implying strong contrast.
- source_word: λαμπάδες
  chosen: lamps
  alternatives:
  - torches
  lexicon: BDAG
  rationale: λαμπάς can denote a lamp or torch. In an indoor upper room setting, 'lamps'
    best fits the likely referent and avoids suggesting handheld outdoor torches.
- source_word: ἱκαναὶ
  chosen: many
  alternatives:
  - enough
  - considerable
  - quite a few
  lexicon: BDAG
  rationale: ἱκανός here qualifies the number of lamps. 'Many' is idiomatic and captures
    the sense of a considerable quantity better than the more wooden 'sufficient'
    or 'enough.'
- source_word: ὑπερῴῳ
  chosen: upper room
  alternatives:
  - upstairs room
  - upper chamber
  lexicon: BDAG
  rationale: ὑπερῷον refers to a room in the upper part of a house. 'Upper room' is
    clear, natural, and established English without sounding archaic.
- source_word: οὗ
  chosen: where
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The relative adverb is most naturally rendered 'where' in English for
    location.
- source_word: συνηγμένοι
  chosen: gathered
  alternatives:
  - assembled
  - met together
  lexicon: BDAG
  rationale: The perfect passive participle of συνάγω describes the group as having
    come together and being assembled. 'Gathered' is concise, natural, and preserves
    the communal sense.
- source_word: ἦσαν ... ἦμεν
  chosen: there were ... we were
  alternatives:
  - there were ... we had been
  lexicon: BDAG
  rationale: Both are imperfect forms of εἰμί. Rendering them with simple past forms
    in English best matches the narrative description without overtranslating aspect.
