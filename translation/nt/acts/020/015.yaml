id: ACT.20.15
reference: Acts 20:15
source:
  edition: SBLGNT
  text: κἀκεῖθεν ἀποπλεύσαντες τῇ ἐπιούσῃ κατηντήσαμεν ⸀ἄντικρυς Χίου, τῇ δὲ ἑτέρᾳ
    παρεβάλομεν εἰς ⸀Σάμον, τῇ ⸀δὲ ἐχομένῃ ἤλθομεν εἰς Μίλητον·
translation:
  text: And from there, after setting sail, on the next day we came opposite Chios;
    on the following day we touched at Samos; and on the day after that we came to
    Miletus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across from Chios' or 'off Chios.' The Greek indicates a position opposite
      the island rather than necessarily landing there.
    reason: lexical_alternative
  - marker: b
    text: Or 'we put in at Samos.' The verb is a nautical term for bringing the ship
      alongside or making a stop.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - and from there
  - from there
  lexicon: BDAG
  rationale: The crasis combines καί + ἐκεῖθεν, so the connective force ('and') and
    the point of departure ('from there') are both represented.
- source_word: ἀποπλεύσαντες
  chosen: after setting sail
  alternatives:
  - having set sail
  - putting out to sea
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as a temporal
    participial clause in English. 'Setting sail' is idiomatic and preserves the nautical
    sense.
- source_word: τῇ ἐπιούσῃ
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  lexicon: BDAG
  rationale: A dative temporal expression meaning 'on the next day.' Including 'on'
    reflects the Greek temporal dative smoothly in English.
- source_word: κατηντήσαμεν
  chosen: we came
  alternatives:
  - we arrived
  - we reached
  lexicon: BDAG
  rationale: In travel narrative this verb denotes arriving at or reaching a destination.
    'Came' is kept because the destination is expressed separately by ἄντικρυς Χίου,
    and it reads naturally in sequence with the later ἤλθομεν.
- source_word: ἄντικρυς Χίου
  chosen: opposite Chios
  alternatives:
  - across from Chios
  - off Chios
  lexicon: BDAG
  rationale: ἄντικρυς indicates a position opposite or across from a place. 'Opposite
    Chios' is a clear, fairly literal rendering for the navigational note.
- source_word: τῇ δὲ ἑτέρᾳ
  chosen: on the following day
  alternatives:
  - and on the next day
  - on the other day
  lexicon: BDAG
  rationale: This idiom marks the next stage in the sequence of days. 'Following day'
    avoids awkward repetition while preserving the chronological progression.
- source_word: παρεβάλομεν εἰς Σάμον
  chosen: we touched at Samos
  alternatives:
  - we put in at Samos
  - we came to Samos
  lexicon: BDAG
  rationale: In nautical context παραβάλλω can mean to put in alongside or touch at
    a port. 'Touched at' is concise and idiomatic for a brief stop.
- source_word: τῇ δὲ ἐχομένῃ
  chosen: on the day after that
  alternatives:
  - on the next day
  - on the following day
  lexicon: BDAG
  rationale: The participial expression means the next in sequence. Because two prior
    day-markers have already occurred, 'on the day after that' best preserves the
    stepwise itinerary without ambiguity.
- source_word: ἤλθομεν εἰς Μίλητον
  chosen: we came to Miletus
  alternatives:
  - we arrived at Miletus
  - we went to Miletus
  lexicon: BDAG
  rationale: A straightforward travel verb with destination marked by εἰς. 'Came to
    Miletus' matches the narrative style and keeps consistency with earlier 'we came.'
- source_word: Χίου / Σάμον / Μίλητον
  chosen: Chios / Samos / Miletus
  lexicon: LSJ
  rationale: These are place names, so per translation philosophy they are transliterated
    by standard English conventions rather than translated.
