theological_decisions:
- issue: Whether νεκρός should be softened to 'apparently dead' or 'as if dead'
  chosen_reading: dead
  alternative_readings:
  - apparently dead
  - as if dead
  rationale: The Greek states ἤρθη νεκρός directly, with no marker of uncertainty.
    The translation should preserve Luke's plain narrative wording and not weaken
    it by importing interpretive caution.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
