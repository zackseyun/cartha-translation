id: ACT.20.9
reference: Acts 20:9
source:
  edition: SBLGNT
  text: ⸀καθεζόμενος δέ τις νεανίας ὀνόματι Εὔτυχος ἐπὶ τῆς θυρίδος, καταφερόμενος
    ὕπνῳ βαθεῖ διαλεγομένου τοῦ Παύλου ἐπὶ πλεῖον, κατενεχθεὶς ἀπὸ τοῦ ὕπνου ἔπεσεν
    ἀπὸ τοῦ τριστέγου κάτω καὶ ἤρθη νεκρός.
translation:
  text: And a certain young man named Eutychus, sitting in the window, was sinking
    into a deep sleep while Paul was speaking at length; and being overcome by sleep,
    he fell down from the third story and was picked up dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was taken up dead.' The Greek verb can mean 'was picked up' or 'was
      taken up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεζόμενος
  chosen: sitting
  alternatives:
  - seated
  lexicon: BDAG
  rationale: Present middle participle describing Eutychus's posture/state. 'Sitting'
    is natural modern English and preserves the ongoing scene-setting force.
- source_word: τις νεανίας
  chosen: a certain young man
  alternatives:
  - a young man
  - a youth
  lexicon: BDAG
  rationale: τις adds indefiniteness ('a certain'), and νεανίας denotes a young male,
    often a youth/young man. 'Young man' is clearer and more natural than 'youth'
    in contemporary English.
- source_word: ὀνόματι Εὔτυχος
  chosen: named Eutychus
  alternatives:
  - by name Eutychus
  lexicon: BDAG
  rationale: Idiomatic rendering of the dative ὀνόματι with a personal name.
- source_word: ἐπὶ τῆς θυρίδος
  chosen: in the window
  alternatives:
  - on the window sill
  - at the window
  lexicon: BDAG
  rationale: θυρίς refers to a window/opening. Given the fall, the sense is that he
    was positioned in the window opening. 'In the window' is idiomatic and fits the
    narrative better than the more wooden 'on the window'.
- source_word: καταφερόμενος ὕπνῳ βαθεῖ
  chosen: was sinking into a deep sleep
  alternatives:
  - was being overcome by deep sleep
  - was growing drowsy with deep sleep
  lexicon: BDAG
  rationale: The participle καταφερόμενος conveys being borne down or overcome; with
    ὕπνῳ βαθεῖ it depicts progressive descent into sleep. 'Was sinking into a deep
    sleep' captures both the process and vividness.
- source_word: διαλεγομένου τοῦ Παύλου ἐπὶ πλεῖον
  chosen: while Paul was speaking at length
  alternatives:
  - while Paul was talking longer
  - as Paul continued speaking for a long time
  lexicon: BDAG
  rationale: Genitive absolute construction. διαλέγομαι here is discourse/speaking
    rather than conversational dialogue in English idiom. ἐπὶ πλεῖον means for a longer
    time / at length. 'Speaking at length' is concise and natural.
- source_word: κατενεχθεὶς ἀπὸ τοῦ ὕπνου
  chosen: being overcome by sleep
  alternatives:
  - being borne down by sleep
  - having been overcome by sleep
  lexicon: BDAG
  rationale: Aorist passive participle of the same verb intensifies the previous progressive
    description into the decisive moment. 'Being overcome by sleep' is idiomatic and
    preserves the causal force.
- source_word: ἔπεσεν ἀπὸ τοῦ τριστέγου κάτω
  chosen: he fell down from the third story
  alternatives:
  - he fell from the third floor to the ground
  - he fell down from the upper story
  lexicon: BDAG
  rationale: τρίστεγον denotes a third-story level. κάτω adds downward motion; in
    English 'fell down from the third story' adequately conveys this without overloading
    the clause.
- source_word: ἤρθη νεκρός
  chosen: was picked up dead
  alternatives:
  - was taken up dead
  - was carried away dead
  lexicon: BDAG
  rationale: αἴρω in passive can mean 'be picked up/taken up.' Traditional 'taken
    up dead' is possible, but 'picked up dead' is more transparent in modern English
    and fits the immediate aftermath of the fall. νεκρός is rendered straightforwardly
    as 'dead,' not merely 'apparently dead,' since the text states the result plainly.
