id: ACT.20.32
reference: Acts 20:32
source:
  edition: SBLGNT
  text: καὶ τὰ νῦν παρατίθεμαι ⸀ὑμᾶς τῷ ⸀θεῷ καὶ τῷ λόγῳ τῆς χάριτος αὐτοῦ, τῷ δυναμένῳ
    ⸀οἰκοδομῆσαι καὶ δοῦναι ⸀τὴν κληρονομίαν ἐν τοῖς ἡγιασμένοις πᾶσιν.
translation:
  text: And now I entrust you to God and to the word of his grace, which is able to
    build you up and to give the inheritance among all those who have been sanctified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who is able,' taking the phrase to refer primarily to God rather than
      to 'the word of his grace.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρατίθεμαι
  chosen: I entrust
  alternatives:
  - I commend
  - I commit
  lexicon: BDAG
  rationale: Middle voice here conveys committing the hearers into the care of another.
    'Entrust' is natural modern English and preserves the sense of placing them in
    God's care better than the more traditional but less current 'commend.'
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Straightforward dative after παρατίθεμαι indicating the one to whom Paul
    entrusts them.
- source_word: τῷ λόγῳ τῆς χάριτος αὐτοῦ
  chosen: to the word of his grace
  alternatives:
  - to his gracious word
  - to the message of his grace
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the genitival structure and the
    theological weight of λόγος. 'Word' can denote the proclaimed message; 'message'
    is possible but less textually transparent.
- source_word: τῷ δυναμένῳ
  chosen: which is able
  alternatives:
  - who is able
  lexicon: BDAG
  rationale: The participle is dative singular and could grammatically modify either
    'God' alone or the coordinated phrase including 'the word of his grace.' The nearest
    antecedent is 'the word,' and the singular after a coordinated dative can treat
    the pair as a unity. Rendering with 'which' reflects the likely immediate referent
    in English while preserving that the empowering source remains God's gracious
    word. The alternative is preserved in a footnote because the ambiguity is genuine.
- source_word: οἰκοδομῆσαι
  chosen: to build you up
  alternatives:
  - to build up
  - to strengthen
  lexicon: BDAG
  rationale: The verb is commonly used metaphorically for spiritual edification. Supplying
    'you' makes explicit the understood object from context and yields idiomatic English
    without over-paraphrase.
- source_word: δοῦναι τὴν κληρονομίαν
  chosen: to give the inheritance
  alternatives:
  - to give you the inheritance
  - to grant the inheritance
  lexicon: BDAG
  rationale: The Greek object is 'the inheritance'; the indirect object is implied
    by context. 'Give the inheritance' is sufficiently literal while remaining clear.
    'Grant' is possible but less direct.
- source_word: κληρονομίαν
  chosen: the inheritance
  alternatives:
  - the heritage
  - the allotted inheritance
  lexicon: BDAG
  rationale: '''Inheritance'' is the standard rendering and preserves biblical-theological
    resonance of the eschatological share given by God.'
- source_word: ἐν τοῖς ἡγιασμένοις πᾶσιν
  chosen: among all those who have been sanctified
  alternatives:
  - among all the saints
  - with all those who have been sanctified
  lexicon: BDAG
  rationale: 'The perfect passive participle of ἁγιάζω is best rendered verbally:
    ''those who have been sanctified.'' This preserves the completed-with-continuing-result
    nuance better than the nominal ''saints,'' though that is a possible contextual
    equivalent. ''Among'' reflects ἐν naturally in this distributive/company sense.'
