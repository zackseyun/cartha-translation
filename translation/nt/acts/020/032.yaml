theological_decisions:
- issue: Referent of τῷ δυναμένῳ ('the one/that which is able')
  chosen_reading: 'The phrase is rendered with reference to ''the word of his grace''
    in the main text: ''which is able.'''
  alternative_readings:
  - 'The participle refers primarily to God: ''who is able''.'
  rationale: The syntax permits either reading, and some interpreters take God as
    the principal referent because God is the personal agent who grants the inheritance.
    However, the immediately preceding noun is 'the word of his grace,' and Scripture
    can speak of the proclaimed word as effective in building up believers. To preserve
    the ambiguity rather than over-resolve it, the main text follows the nearer grammatical
    referent and the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
