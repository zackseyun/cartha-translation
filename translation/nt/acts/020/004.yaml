id: ACT.20.4
reference: Acts 20:4
source:
  edition: SBLGNT
  text: συνείπετο δὲ ⸀αὐτῷ Σώπατρος ⸀Πύρρου Βεροιαῖος, Θεσσαλονικέων δὲ Ἀρίσταρχος
    καὶ Σεκοῦνδος, καὶ Γάϊος Δερβαῖος καὶ Τιμόθεος, Ἀσιανοὶ δὲ Τυχικὸς καὶ Τρόφιμος·
translation:
  text: And Sopater son of Pyrrhus, a Berean, accompanied him; and from the Thessalonians,
    Aristarchus and Secundus; and Gaius of Derbe, and Timothy; and from Asia, Tychicus
    and Trophimus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from among the Thessalonians' for Aristarchus and Secundus.
    reason: lexical_alternative
  - marker: b
    text: That is, from the Roman province of Asia, not the modern continent.
    reason: cultural_note
lexical_decisions:
- source_word: συνείπετο
  chosen: accompanied
  alternatives:
  - was accompanying
  - went with
  lexicon: BDAG
  rationale: The imperfect middle of συνέπομαι indicates accompanying/traveling with
    someone. 'Accompanied' is natural English in a list context, while preserving
    the sense of joining Paul in travel.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: The dative pronoun refers to Paul and is semantically governed by συνέπομαι.
    English expresses this naturally as the object of 'accompanied' rather than a
    separate prepositional phrase.
- source_word: Σώπατρος Πύρρου Βεροιαῖος
  chosen: Sopater son of Pyrrhus, a Berean
  alternatives:
  - Sopater the Berean, son of Pyrrhus
  - Sopater of Berea, son of Pyrrhus
  lexicon: BDAG
  rationale: Πύρρου is a genitive most naturally taken as patronymic, 'son of Pyrrhus.'
    Βεροιαῖος identifies Sopater as a man from Berea; 'a Berean' is concise and idiomatic.
- source_word: Θεσσαλονικέων
  chosen: from the Thessalonians
  alternatives:
  - the Thessalonians
  - of the Thessalonians
  - from Thessalonica
  lexicon: BDAG
  rationale: The genitive plural groups the next two names by origin. 'From the Thessalonians'
    is slightly wooden but preserves the grouping function; in idiomatic English it
    means 'from among the Thessalonians,' i.e., men from Thessalonica.
- source_word: Ἀρίσταρχος καὶ Σεκοῦνδος
  chosen: Aristarchus and Secundus
  lexicon: BDAG
  rationale: These are straightforward personal names, transliterated according to
    standard conventions.
- source_word: Γάϊος Δερβαῖος
  chosen: Gaius of Derbe
  alternatives:
  - Gaius the Derbean
  lexicon: BDAG
  rationale: Δερβαῖος is an ethnic/geographic descriptor. 'Of Derbe' is more natural
    modern English than 'the Derbean' while preserving the place association.
- source_word: Τιμόθεος
  chosen: Timothy
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Ἀσιανοὶ
  chosen: from Asia
  alternatives:
  - Asians
  - men from Asia
  lexicon: BDAG
  rationale: In this context Ἀσιανοὶ refers to people from the Roman province of Asia,
    not the modern continent. 'From Asia' avoids possible misunderstanding in contemporary
    English.
- source_word: Τυχικὸς καὶ Τρόφιμος
  chosen: Tychicus and Trophimus
  lexicon: BDAG
  rationale: These are straightforward personal names, transliterated according to
    standard conventions.
- source_word: δέ ... δέ ... δέ
  chosen: and ... and ... and
  alternatives:
  - now ... and ... and
  lexicon: BDAG
  rationale: The repeated δέ marks successive additions in the list. Rendering with
    repeated 'and' gives smooth English while preserving the additive structure without
    overtranslating discourse particles.
