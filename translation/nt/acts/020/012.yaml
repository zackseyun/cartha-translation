id: ACT.20.12
reference: Acts 20:12
source:
  edition: SBLGNT
  text: ἤγαγον δὲ τὸν παῖδα ζῶντα, καὶ παρεκλήθησαν οὐ μετρίως.
translation:
  text: And they took the boy away alive, and were comforted beyond measure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were comforted not a little,' an idiom meaning they were greatly comforted.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγον
  chosen: took ... away
  alternatives:
  - brought
  - led away
  lexicon: BDAG
  rationale: Aorist of ἄγω commonly means to lead or bring. In this context, after
    the restoration of Eutychus, English idiom favors 'took ... away' for the crowd's
    action in departing with the boy.
- source_word: παῖδα
  chosen: boy
  alternatives:
  - child
  - servant
  - young man
  lexicon: BDAG
  rationale: παῖς can mean child, boy/girl, or servant depending on context. Here
    it refers back to Eutychus, previously called a νεανίας ('young man') in v. 9.
    'Boy' fits the immediate wording naturally without implying servitude.
- source_word: ζῶντα
  chosen: alive
  alternatives:
  - living
  lexicon: BDAG
  rationale: The participle functions predicatively with τὸν παῖδα, indicating the
    state in which they took him away. 'Alive' is the most natural English rendering
    in this resurrection/restoration context.
- source_word: παρεκλήθησαν
  chosen: were comforted
  alternatives:
  - were encouraged
  - were consoled
  lexicon: BDAG
  rationale: παρακαλέω has a broad semantic range including encourage, exhort, comfort,
    and console. Given the preceding apparent death and restoration, 'were comforted'
    best captures the emotional relief of those present.
- source_word: οὐ μετρίως
  chosen: beyond measure
  alternatives:
  - not a little
  - greatly
  - very much
  lexicon: BDAG
  rationale: 'This idiom is a litotes: literally ''not moderately'' or ''not a little,''
    meaning very greatly. ''Beyond measure'' preserves the emphatic force in natural
    English while avoiding a potentially opaque literalism.'
