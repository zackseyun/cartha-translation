id: ACT.20.13
reference: Acts 20:13
source:
  edition: SBLGNT
  text: Ἡμεῖς δὲ ⸀προελθόντες ⸀ἐπὶ τὸ πλοῖον ἀνήχθημεν ἐπὶ τὴν Ἆσσον, ἐκεῖθεν μέλλοντες
    ἀναλαμβάνειν τὸν Παῦλον, οὕτως γὰρ ⸂διατεταγμένος ἦν⸃ μέλλων αὐτὸς πεζεύειν.
translation:
  text: But we, having gone ahead to the ship, set sail for Assos, intending to take
    Paul on board from there, for so he had arranged, since he himself intended to
    go by land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he himself intended to travel on foot.' The Greek verb πεζεύειν
      specifically contrasts land travel with the group's voyage by ship.
    reason: lexical_alternative
  - marker: b
    text: Or 'for so it had been arranged.' The Greek form διατεταγμένος ἦν is formally
      passive, but in context likely refers to Paul's own prior arrangement or instruction.
    reason: alternative_reading
lexical_decisions:
- source_word: προελθόντες
  chosen: having gone ahead
  alternatives:
  - having gone on before
  - going ahead
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb ἀνήχθημεν.
    'Having gone ahead' preserves the temporal sequence and the sense that the narrator's
    party preceded Paul.
- source_word: ἐπὶ τὸ πλοῖον
  chosen: to the ship
  alternatives:
  - aboard the ship
  - onto the ship
  lexicon: BDAG
  rationale: With motion, ἐπί can mean 'onto/aboard,' but English idiom after 'having
    gone ahead' is smoother with 'to the ship.' The following verb 'set sail' makes
    the boarding implication clear without overloading the phrase.
- source_word: ἀνήχθημεν
  chosen: set sail
  alternatives:
  - put out to sea
  - were brought up
  lexicon: BDAG
  rationale: In nautical contexts ἀνάγω commonly means to put to sea or set sail.
    'Set sail' is idiomatic modern English and fits Acts' travel narrative.
- source_word: ἐπὶ τὴν Ἆσσον
  chosen: for Assos
  alternatives:
  - to Assos
  lexicon: BDAG
  rationale: With a verb of sailing, English commonly uses 'for' to indicate destination.
    'Assos' is the standard transliteration of Ἆσσος.
- source_word: μέλλοντες ἀναλαμβάνειν
  chosen: intending to take ... on board
  alternatives:
  - being about to take up
  - planning to pick up
  lexicon: BDAG
  rationale: μέλλω here expresses intention rather than immediate futurity. ἀναλαμβάνω
    in this travel context means to take someone aboard a ship. 'Take ... on board'
    makes the maritime sense explicit.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - there
  lexicon: BDAG
  rationale: The adverb has an ablative sense, indicating the place from which Paul
    would be taken aboard.
- source_word: διατεταγμένος ἦν
  chosen: he had arranged
  alternatives:
  - it had been arranged
  - he had given instructions
  lexicon: BDAG
  rationale: Periphrastic pluperfect/passive of διατάσσω. In context the implied subject
    is Paul, as confirmed by the following participial clause about his own intention.
    'He had arranged' communicates prior planning in natural English. The passive
    form may also suggest 'it had been arranged,' but the personal subject is more
    coherent here.
- source_word: μέλλων αὐτὸς πεζεύειν
  chosen: since he himself intended to go by land
  alternatives:
  - because he himself was going to travel on foot
  - as he himself intended to walk
  lexicon: BDAG
  rationale: πεζεύω means to travel by land/on foot. 'Go by land' is slightly broader
    and idiomatic, while still reflecting the contrast with sea travel. αὐτός is emphatic,
    hence 'he himself.' The participle explains the arrangement, so 'since' fits the
    causal relation.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast between the narrator's party and Paul. 'But'
    preserves that contrast clearly in English.
