id: ACT.20.37
reference: Acts 20:37
source:
  edition: SBLGNT
  text: ἱκανὸς δὲ ⸂κλαυθμὸς ἐγένετο⸃ πάντων, καὶ ἐπιπεσόντες ἐπὶ τὸν τράχηλον τοῦ
    Παύλου κατεφίλουν αὐτόν,
translation:
  text: And there was much weeping among them all, and falling on Paul's neck, they
    were kissing him affectionately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kept kissing him'; the Greek imperfect verb may emphasize repeated or
      prolonged action.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανὸς
  chosen: much
  alternatives:
  - considerable
  - great
  lexicon: BDAG
  rationale: With κλαυθμός it functions idiomatically to indicate abundance or intensity
    rather than sufficiency; 'much' gives natural English while preserving the sense
    of substantial emotion.
- source_word: κλαυθμὸς ἐγένετο
  chosen: there was ... weeping
  alternatives:
  - a weeping arose
  - there was loud crying
  lexicon: BDAG
  rationale: The construction literally means 'weeping came to be,' an idiom best
    rendered in English as 'there was weeping.' 'Weeping' preserves the noun's focus
    on lament rather than merely tears.
- source_word: πάντων
  chosen: among them all
  alternatives:
  - of all
  - by all
  lexicon: BDAG
  rationale: The genitive with the impersonal expression indicates that all present
    participated in the weeping. 'Among them all' communicates collective involvement
    in idiomatic English.
- source_word: ἐπιπεσόντες ἐπὶ τὸν τράχηλον
  chosen: falling on Paul's neck
  alternatives:
  - embracing Paul's neck
  - throwing themselves on Paul's neck
  lexicon: BDAG
  rationale: The participle plus ἐπί + accusative is a vivid physical expression used
    for throwing oneself upon someone in embrace. 'Falling on ... neck' keeps the
    concrete imagery of the Greek; smoother alternatives are possible but less literal.
- source_word: τράχηλον
  chosen: neck
  alternatives:
  - shoulders
  lexicon: BDAG
  rationale: The noun specifically means 'neck.' Although English may prefer 'embraced
    him,' retaining 'neck' preserves the emotional vividness and matches the source
    more closely.
- source_word: κατεφίλουν
  chosen: were kissing him affectionately
  alternatives:
  - kept kissing him
  - kissed him fervently
  lexicon: BDAG
  rationale: The imperfect indicates repeated or continued action, and the compound
    verb can intensify the sense. 'Were kissing him affectionately' conveys both the
    ongoing action and the warmth of farewell.
- source_word: δὲ καὶ
  chosen: And ... and
  alternatives:
  - Now ... and
  lexicon: BDAG
  rationale: δέ here advances the narrative without strong contrast; 'And' is a natural
    connective in English narrative.
- source_word: Παύλου
  chosen: Paul's
  alternatives:
  - of Paul
  rationale: Standard English possessive is the most natural rendering of the genitive
    proper name.
