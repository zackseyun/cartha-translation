id: ACT.20.36
reference: Acts 20:36
source:
  edition: SBLGNT
  text: Καὶ ταῦτα εἰπὼν θεὶς τὰ γόνατα αὐτοῦ σὺν πᾶσιν αὐτοῖς προσηύξατο.
translation:
  text: And after saying these things, he knelt down with them all and prayed.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective introducing the next action in narrative. 'And' preserves
    the simple coordination of the Greek without adding temporal nuance beyond the
    context.
- source_word: ταῦτα εἰπὼν
  chosen: after saying these things
  alternatives:
  - having said these things
  - when he had said these things
  lexicon: BDAG
  rationale: The aorist participle εἰπών is adverbial and antecedent to the main verb.
    'After saying these things' is natural modern English and preserves the temporal
    sequence.
- source_word: θεὶς τὰ γόνατα αὐτοῦ
  chosen: he knelt down
  alternatives:
  - having placed his knees
  - having bent his knees
  - falling to his knees
  lexicon: BDAG
  rationale: Literally 'having placed his knees,' an idiom for kneeling. 'He knelt
    down' conveys the idiomatic sense clearly in English. 'Falling to his knees' would
    overstate the motion, which the Greek does not require.
- source_word: σὺν πᾶσιν αὐτοῖς
  chosen: with them all
  alternatives:
  - with all of them
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With them all' is concise
    and preserves the emphasis of πᾶσιν that the whole group joined him.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: BDAG
  rationale: Aorist middle of προσεύχομαι, the standard verb for praying. 'Prayed'
    is the most direct and natural rendering.
