id: ACT.20.3
reference: Acts 20:3
source:
  edition: SBLGNT
  text: ποιήσας τε μῆνας τρεῖς· γενομένης ⸂ἐπιβουλῆς αὐτῷ⸃ ὑπὸ τῶν Ἰουδαίων μέλλοντι
    ἀνάγεσθαι εἰς τὴν Συρίαν ἐγένετο ⸀γνώμης τοῦ ὑποστρέφειν διὰ Μακεδονίας.
translation:
  text: After spending three months there, when a plot was made against him by the
    Jews as he was about to sail for Syria, he decided to return through Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the Jews'; in Acts this often refers to a particular group opposing
      Paul in context, not to all Jewish people without distinction.
    reason: cultural_note
  - marker: b
    text: Or 'when a plot arose against him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as he was about to set sail for Syria.'
    reason: lexical_alternative
  - marker: d
    text: Or 'he resolved to return by way of Macedonia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας τε μῆνας τρεῖς
  chosen: After spending three months there
  alternatives:
  - having spent three months
  - after he had spent three months
  lexicon: BDAG
  rationale: The aorist participle ποιήσας with a time expression idiomatically means
    'to spend' a period of time. 'After spending' captures the temporal sequence naturally
    in English. 'There' is supplied from context to make the English idiomatic, reflecting
    Paul's stay in Greece from the previous verse.
- source_word: γενομένης ἐπιβουλῆς αὐτῷ
  chosen: when a plot was made against him
  alternatives:
  - when a plot arose against him
  - when there was a plot against him
  lexicon: BDAG
  rationale: The genitive absolute γενομένης ἐπιβουλῆς αὐτῷ is best rendered as a
    temporal-circumstantial clause. ἐπιβουλή denotes a hostile scheme or plot. 'Was
    made against him' preserves the passive-like force of the construction in natural
    English.
- source_word: ὑπὸ τῶν Ἰουδαίων
  chosen: by the Jews
  alternatives:
  - by Jewish opponents
  - by some Jews
  lexicon: BDAG
  rationale: The Greek explicitly says 'by the Jews.' Per translation philosophy,
    the wording should not be softened beyond the source text. In Acts this often
    refers to a particular group opposing Paul rather than all Jewish people universally;
    that contextual nuance can be clarified in a footnote rather than altering the
    main text.
- source_word: μέλλοντι ἀνάγεσθαι
  chosen: as he was about to sail
  alternatives:
  - when he was about to set sail
  - being about to depart by sea
  lexicon: BDAG
  rationale: μέλλω conveys imminence ('be about to'). ἀνάγεσθαι in travel contexts
    commonly means to put out to sea or set sail. 'As he was about to sail' is concise
    and contextually precise.
- source_word: εἰς τὴν Συρίαν
  chosen: for Syria
  alternatives:
  - to Syria
  lexicon: BDAG
  rationale: English idiom with verbs of sailing often prefers 'for Syria,' though
    'to Syria' would also be acceptable. The destination sense of εἰς is preserved.
- source_word: ἐγένετο γνώμης
  chosen: he decided
  alternatives:
  - it became his decision
  - he formed the intention
  lexicon: BDAG
  rationale: This idiom indicates coming to a resolution or decision. 'He decided'
    is the clearest natural English equivalent.
- source_word: τοῦ ὑποστρέφειν
  chosen: to return
  alternatives:
  - to go back
  lexicon: BDAG
  rationale: The articular infinitive expresses the content of the decision. 'Return'
    is slightly more formal and fits travel narrative style.
- source_word: διὰ Μακεδονίας
  chosen: through Macedonia
  alternatives:
  - by way of Macedonia
  lexicon: BDAG
  rationale: διά with the genitive here indicates route. 'Through Macedonia' is straightforward
    and accurate.
