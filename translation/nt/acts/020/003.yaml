theological_decisions:
- issue: Reference of 'the Jews' in a conflict narrative
  chosen_reading: Retain the literal phrase 'the Jews' in the main text, with contextual
    clarification in a footnote that this refers to a particular hostile group in
    context, not the Jewish people as a whole.
  alternative_readings:
  - Jewish opponents
  - some Jews
  rationale: The source text explicitly uses τῶν Ἰουδαίων. Replacing it in the main
    text would mute the wording of the Greek. At the same time, because modern readers
    may overgeneralize the phrase ethnically, a footnote preserves contextual accuracy
    without altering the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; do not import claims the text does not make.'
