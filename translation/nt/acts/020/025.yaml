id: ACT.20.25
reference: Acts 20:25
source:
  edition: SBLGNT
  text: Καὶ νῦν ἰδοὺ ἐγὼ οἶδα ὅτι οὐκέτι ὄψεσθε τὸ πρόσωπόν μου ὑμεῖς πάντες ἐν οἷς
    διῆλθον κηρύσσων τὴν ⸀βασιλείαν.
translation:
  text: And now, look, I know that none of you among whom I went about proclaiming
    the kingdom will see my face again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will no longer see my face.'
    reason: lexical_alternative
  - marker: b
    text: That is, the kingdom of God; the Greek here reads simply 'the kingdom.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered as the discourse marker 'look' to preserve Paul's emphatic attention-getting
    transition in natural modern English. 'Behold' is more formal but less natural
    for the target audience.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am aware
  lexicon: BDAG
  rationale: Standard rendering of οἶδα expressing settled knowledge or certainty.
- source_word: οὐκέτι
  chosen: again
  alternatives:
  - no longer
  - not anymore
  lexicon: BDAG
  rationale: Combined with the future verb and idiomatic English expression 'will
    see my face again' to convey cessation of future seeing. This is smoother than
    a more wooden 'will no longer see.'
- source_word: ὄψεσθε τὸ πρόσωπόν μου
  chosen: will see my face
  alternatives:
  - will see me
  - will see my presence
  lexicon: BDAG
  rationale: Kept the concrete idiom 'see my face' rather than reducing it to 'see
    me,' since the Greek explicitly uses πρόσωπον and the expression carries personal,
    relational force.
- source_word: ὑμεῖς πάντες
  chosen: none of you
  alternatives:
  - you all ... not
  - all of you ... not
  lexicon: BDAG
  rationale: In English, the negated future is most naturally expressed as 'none of
    you ... will.' This preserves the distributive force of ὑμεῖς πάντες under the
    negation.
- source_word: ἐν οἷς
  chosen: among whom
  alternatives:
  - among you among whom
  - in whose midst
  lexicon: BDAG
  rationale: Refers to the group within whose midst Paul carried out his ministry.
    'Among whom' is concise and idiomatic.
- source_word: διῆλθον
  chosen: I went about
  alternatives:
  - I passed through
  - I traveled through
  lexicon: BDAG
  rationale: In this ministry context, διέρχομαι conveys moving about among people/places
    rather than merely passing by. 'Went about' fits the pastoral and itinerant sense.
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - heralding
  lexicon: BDAG
  rationale: '''Proclaiming'' preserves the public-announcement sense of κηρύσσω while
    remaining accessible. ''Preaching'' is possible but can sound more ecclesiastically
    narrowed in English.'
- source_word: βασιλείαν
  chosen: the kingdom
  alternatives:
  - the kingdom of God
  lexicon: BDAG
  rationale: The Greek text here has only 'the kingdom' without an explicit genitive.
    The translation does not add 'of God' to avoid importing words not present, though
    the referent is clear from context.
