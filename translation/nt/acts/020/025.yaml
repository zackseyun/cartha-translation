theological_decisions:
- issue: Whether to expand βασιλείαν to 'the kingdom of God' from contextual parallels
  chosen_reading: the kingdom
  alternative_readings:
  - the kingdom of God
  rationale: Although Acts elsewhere often speaks of 'the kingdom of God,' this verse's
    Greek text reads simply τὴν βασιλείαν. Following original-language primacy, the
    translation keeps the shorter form and does not harmonize to nearby expressions.
  doctrine_reference: Translation philosophy §1, §5
