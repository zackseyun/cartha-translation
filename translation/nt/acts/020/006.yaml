id: ACT.20.6
reference: Acts 20:6
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ ἐξεπλεύσαμεν μετὰ τὰς ἡμέρας τῶν ἀζύμων ἀπὸ Φιλίππων, καὶ ἤλθομεν
    πρὸς αὐτοὺς εἰς τὴν Τρῳάδα ἄχρι ἡμερῶν πέντε, ⸀οὗ διετρίψαμεν ἡμέρας ἑπτά.
translation:
  text: But we sailed away from Philippi after the days of Unleavened Bread, and came
    to them at Troas within five days, where we stayed seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in five days.' The Greek expression marks the journey's duration until
      arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλεύσαμεν
  chosen: sailed away
  alternatives:
  - set sail
  - sailed out
  lexicon: BDAG
  rationale: The verb ἐκπλέω specifically denotes departing by ship. 'Sailed away'
    captures the motion from a point of departure more naturally than the more wooden
    'sailed out.'
- source_word: μετὰ τὰς ἡμέρας τῶν ἀζύμων
  chosen: after the days of Unleavened Bread
  alternatives:
  - after the Feast of Unleavened Bread
  - after the days of the Unleavened Bread
  lexicon: BDAG
  rationale: The Greek is literally 'after the days of unleavened [bread].' 'Unleavened
    Bread' is the standard idiomatic English designation for the Jewish festival period
    and preserves the temporal marker without over-paraphrase.
- source_word: ἀπὸ Φιλίππων
  chosen: from Philippi
  alternatives:
  - out of Philippi
  lexicon: BDAG
  rationale: Although the Greek form is plural in origin, the city name is conventionally
    rendered in English as singular 'Philippi.' 'From' is the normal equivalent for
    ἀπό here.
- source_word: ἤλθομεν πρὸς αὐτοὺς
  chosen: came to them
  alternatives:
  - went to them
  - came to join them
  lexicon: BDAG
  rationale: The aorist of ἔρχομαι with πρὸς + accusative naturally means movement
    toward persons. 'Came to them' is straightforward and avoids adding the interpretive
    nuance 'join,' though that is contextually implied.
- source_word: εἰς τὴν Τρῳάδα
  chosen: at Troas
  alternatives:
  - to Troas
  - into Troas
  lexicon: BDAG
  rationale: Because the clause already includes 'came to them,' English reads more
    naturally with 'at Troas' to express the destination location. This is a mild
    smoothing consistent with optimal equivalence.
- source_word: ἄχρι ἡμερῶν πέντε
  chosen: within five days
  alternatives:
  - in five days
  - after five days
  lexicon: BDAG
  rationale: ἄχρι with a measure of time here indicates the extent of the journey
    until arrival. 'Within five days' communicates that they arrived by the fifth
    day and avoids the ambiguity of English 'after five days.'
- source_word: οὗ
  chosen: where
  alternatives:
  - there
  lexicon: BDAG
  rationale: The relative adverb refers back to Troas. 'Where' is the most natural
    English equivalent in this construction.
- source_word: διετρίψαμεν ἡμέρας ἑπτά
  chosen: we stayed seven days
  alternatives:
  - we spent seven days
  - we remained seven days
  lexicon: BDAG
  rationale: διατρίβω in this travel context means to stay or spend time in a place.
    'Stayed seven days' is idiomatic modern English and preserves the duration.
