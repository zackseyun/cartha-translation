id: ACT.20.38
reference: Acts 20:38
source:
  edition: SBLGNT
  text: ὀδυνώμενοι μάλιστα ἐπὶ τῷ λόγῳ ᾧ εἰρήκει ὅτι οὐκέτι μέλλουσιν τὸ πρόσωπον αὐτοῦ θεωρεῖν. προέπεμπον δὲ αὐτὸν εἰς τὸ πλοῖον.
translation:
  text: grieving especially over the word that he had spoken, that they would no longer see his face. And they were accompanying him to the ship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of what he had said.' The Greek reads more literally, 'over the word which he had spoken.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'see his face no longer,' a personal expression for not seeing him again.
    reason: lexical_alternative
  - marker: c
    text: Or 'were escorting him' or 'were seeing him off.' The verb can imply accompanying someone as an honorific farewell.
    reason: lexical_alternative
  - marker: d
    text: Or 'that they were about to see his face no longer'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὀδυνώμενοι
  chosen: grieving
  alternatives:
  - being distressed
  - being sorrowful
  - being pained
  lexicon: BDAG
  rationale: The participle denotes emotional pain or distress. 'Grieving' is natural English and fits the farewell context without overstating the intensity beyond the Greek.
- source_word: μάλιστα
  chosen: especially
  alternatives:
  - most of all
  - particularly
  lexicon: BDAG
  rationale: Marks the chief cause of their sorrow. 'Especially' is idiomatic and concise.
- source_word: ἐπὶ τῷ λόγῳ
  chosen: over the word
  alternatives:
  - because of what he said
  - over the statement
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the Greek noun λόγος while remaining understandable. The following relative clause explains the content of the 'word.'
- source_word: εἰρήκει
  chosen: he had spoken
  alternatives:
  - he had said
  lexicon: BDAG
  rationale: Pluperfect sense is best represented by 'had spoken'/'had said.' 'Had spoken' pairs well with 'word' and preserves the prior utterance relative to their grief.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not anymore
  - never again
  lexicon: BDAG
  rationale: The adverb means 'no longer.' 'Never again' would be a stronger interpretive rendering than the Greek itself states.
- source_word: μέλλουσιν
  chosen: were about to
  alternatives:
  - were going to
  - would
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys imminence or expected future. 'Were about to' preserves the sense that, from that point, they expected not to see him again.
- source_word: τὸ πρόσωπον αὐτοῦ θεωρεῖν
  chosen: see his face
  alternatives:
  - look upon his face
  - see him
  lexicon: BDAG
  rationale: The Greek explicitly says 'his face,' a vivid personal expression worth preserving rather than flattening to merely 'see him.' θεωρέω here is adequately rendered 'see.'
- source_word: προέπεμπον
  chosen: were accompanying him
  alternatives:
  - were escorting him
  - were seeing him off
  lexicon: BDAG
  rationale: The verb can mean accompany/escort someone on the way, often as a gesture of honor. 'Were accompanying him' is clear and avoids sounding too colloquial, while still fitting the imperfect's ongoing action.
- source_word: εἰς τὸ πλοῖον
  chosen: to the ship
  alternatives:
  - to the boat
  lexicon: BDAG
  rationale: πλοῖον commonly refers to a ship/boat; 'ship' better suits the seafaring context of Acts and traditional usage.
