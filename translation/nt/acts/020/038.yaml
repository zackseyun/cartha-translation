  from: that they were about to see his face no longer
  to: that they would no longer see his face
  rationale: The current phrasing combines 'were about to' (from μέλλω) and 'no longer' (from οὐκέτι) in a way that is slightly clunky in English. While the meaning is discernible, a smoother rendering like 'that they would no longer see his face' more naturally conveys the future-from-the-past perspective without the awkward construction.
