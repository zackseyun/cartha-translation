id: ACT.20.5
reference: Acts 20:5
source:
  edition: SBLGNT
  text: οὗτοι ⸀δὲ ⸀προσελθόντες ἔμενον ἡμᾶς ἐν Τρῳάδι·
translation:
  text: These men went on ahead and were waiting for us in Troas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'These, having gone ahead, were waiting for us in Troas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: These men
  alternatives:
  - These
  - These ones
  lexicon: BDAG
  rationale: Demonstrative pronoun, nominative masculine plural, referring to the
    previously named companions. 'These men' makes the referent explicit in natural
    English while preserving the masculine plural reference.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. In English, an explicit conjunction here is
    not necessary for natural flow, so the connective force is left implicit rather
    than awkwardly rendered.
- source_word: προσελθόντες
  chosen: went on ahead
  alternatives:
  - having gone ahead
  - after going ahead
  - having come/gone before
  lexicon: BDAG
  rationale: Although the lemma is προσέρχομαι, in this textual/contextual usage the
    participle is commonly understood in the travel narrative sense of preceding the
    narrator's party. 'Went on ahead' best captures the participle's action in idiomatic
    English and fits the following clause about waiting in Troas.
- source_word: ἔμενον
  chosen: were waiting for
  alternatives:
  - stayed for
  - remained for
  - waited for
  lexicon: BDAG
  rationale: μένω literally means 'remain/stay,' but with a personal object (ἡμᾶς)
    in this travel context it conveys waiting for someone's arrival. 'Were waiting
    for' expresses the imperfect's ongoing sense and the contextual meaning more clearly
    than a wooden 'remained for us.'
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: First person plural object pronoun; straightforwardly rendered 'us.'
- source_word: ἐν Τρῳάδι
  chosen: in Troas
  alternatives:
  - at Troas
  lexicon: BDAG
  rationale: Standard locative rendering of ἐν with the place name Τρῳάς in the dative.
    'In Troas' is the most natural English expression.
