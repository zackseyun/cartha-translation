id: ACT.20.34
reference: Acts 20:34
source:
  edition: SBLGNT
  text: αὐτοὶ γινώσκετε ὅτι ταῖς χρείαις μου καὶ τοῖς οὖσι μετ’ ἐμοῦ ὑπηρέτησαν αἱ
    χεῖρες αὗται.
translation:
  text: You yourselves know that these hands served my needs and those who were with
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'provided for my needs and for those who were with me.' The Greek verb
      can emphasize practical service resulting in material support.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  chosen: you yourselves
  alternatives:
  - you
  - you yourselves personally
  lexicon: BDAG
  rationale: The nominative pronoun is emphatic alongside the verb; 'you yourselves'
    preserves the emphasis better than simple 'you'.
- source_word: γινώσκετε
  chosen: know
  alternatives:
  - are aware
  - recognize
  lexicon: BDAG
  rationale: Present indicative naturally renders as 'know' here, expressing the audience's
    direct knowledge of Paul's conduct.
- source_word: ταῖς χρείαις μου
  chosen: my needs
  alternatives:
  - my necessities
  - the things I needed
  lexicon: BDAG
  rationale: χρεία refers to practical needs or necessities. 'My needs' is natural
    modern English and fits the context of material support.
- source_word: τοῖς οὖσι μετ’ ἐμοῦ
  chosen: those who were with me
  alternatives:
  - my companions
  - those with me
  lexicon: BDAG
  rationale: The articular participle literally means 'the ones being with me.' 'Those
    who were with me' preserves the referential sense without over-interpreting the
    relationship.
- source_word: ὑπηρέτησαν
  chosen: served
  alternatives:
  - provided for
  - ministered to
  - supplied
  lexicon: BDAG
  rationale: The verb means to render service or assistance. Because the subject is
    'these hands,' English idiom favors 'served' as a vivid metaphor, while the object
    phrase clarifies that the service was toward practical needs. 'Provided for' is
    interpretive and less directly tied to the Greek verb.
- source_word: αἱ χεῖρες αὗται
  chosen: these hands
  alternatives:
  - these very hands
  - my own hands
  lexicon: BDAG
  rationale: The demonstrative construction is emphatic and points to Paul's manual
    labor. 'These hands' is direct and idiomatic; 'my own hands' is implied by context
    but not explicit in the Greek wording.
