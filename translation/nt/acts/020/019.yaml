theological_decisions:
- issue: Potential anti-Jewish misreading of 'the Jews'
  chosen_reading: Retain 'the Jews' as the direct rendering of τῶν Ἰουδαίων, understood
    contextually as the particular Jewish opponents plotting against Paul.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The Greek text explicitly names Ἰουδαίων, and optimal equivalence favors
    preserving that wording. However, the phrase refers to a specific group involved
    in plots against Paul, not to all Jewish people universally. A footnote clarifies
    the contextual limitation without altering the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; do not import claims the text does not make.'
