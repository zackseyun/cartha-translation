id: ACT.20.18
reference: Acts 20:18
source:
  edition: SBLGNT
  text: ὡς δὲ παρεγένοντο πρὸς αὐτὸν εἶπεν αὐτοῖς· Ὑμεῖς ἐπίστασθε ἀπὸ πρώτης ἡμέρας
    ἀφ’ ἧς ἐπέβην εἰς τὴν Ἀσίαν πῶς μεθ’ ὑμῶν τὸν πάντα χρόνον ἐγενόμην,
translation:
  text: When they came to him, he said to them, “You yourselves know how I lived among
    you the whole time from the first day that I set foot in Asia,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Asia here refers to the Roman province of Asia in western Asia Minor, not
      the modern continent.
    reason: cultural_note
  - marker: b
    text: Or “how I was with you the whole time.” The Greek expression can emphasize
      either Paul’s manner of life or his continual presence among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  chosen: came
  alternatives:
  - arrived
  - came together
  lexicon: BDAG
  rationale: In context the Ephesian elders have come to Paul at Miletus. 'Came' is
    natural English for their arrival in his presence; 'arrived' is possible but slightly
    less relational than the phrase πρὸς αὐτόν suggests.
- source_word: πρὸς αὐτόν
  chosen: to him
  alternatives:
  - before him
  - in his presence
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward Paul. 'To him' is
    the most straightforward rendering in idiomatic English.
- source_word: Ὑμεῖς
  chosen: You yourselves
  alternatives:
  - You
  - You indeed
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. 'You yourselves' preserves the emphasis
    better than a simple 'you'.
- source_word: ἐπίστασθε
  chosen: know
  alternatives:
  - understand
  - are well aware
  lexicon: BDAG
  rationale: The verb denotes personal knowledge or acquaintance. 'Know' is the clearest
    and most direct English equivalent here.
- source_word: ἀπὸ πρώτης ἡμέρας
  chosen: from the first day
  alternatives:
  - from the very first day
  - since the first day
  lexicon: BDAG
  rationale: This phrase marks the starting point of Paul's conduct among them. 'From
    the first day' is both accurate and natural.
- source_word: ἀφ’ ἧς ἐπέβην
  chosen: that I set foot
  alternatives:
  - that I came
  - that I entered
  lexicon: BDAG
  rationale: ἐπιβαίνω literally means to step upon or set foot on. In this travel
    context, 'set foot' preserves the vividness of the Greek better than the flatter
    'came'.
- source_word: εἰς τὴν Ἀσίαν
  chosen: in Asia
  alternatives:
  - into Asia
  - in the province of Asia
  lexicon: BDAG
  rationale: English idiom prefers 'set foot in Asia.' The referent is the Roman province
    of Asia, not the modern continent, but the text itself simply says 'Asia'; the
    geographical specificity can be preserved in a footnote rather than expanded in
    the main text.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Introduces the content of what they know, namely the manner of Paul's
    life among them. 'How' is the natural equivalent.
- source_word: μεθ’ ὑμῶν
  chosen: among you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: '''Among you'' best conveys Paul''s life in their midst as a community,
    not merely alongside individuals. ''With you'' is possible but slightly less communal.'
- source_word: τὸν πάντα χρόνον
  chosen: the whole time
  alternatives:
  - all the time
  - the entire time
  lexicon: BDAG
  rationale: This accusative phrase expresses duration. 'The whole time' is idiomatic
    and preserves the sense of continuous duration.
- source_word: ἐγενόμην
  chosen: I lived
  alternatives:
  - I was
  - I conducted myself
  lexicon: BDAG
  rationale: Although γίνομαι often means 'become' or 'be,' in this context it refers
    to Paul's manner of life among them. 'I lived' communicates his conduct clearly
    in natural English; 'I conducted myself' is more formal but less readable.
