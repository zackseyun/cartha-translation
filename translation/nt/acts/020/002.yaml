id: ACT.20.2
reference: Acts 20:2
source:
  edition: SBLGNT
  text: διελθὼν δὲ τὰ μέρη ἐκεῖνα καὶ παρακαλέσας αὐτοὺς λόγῳ πολλῷ ἦλθεν εἰς τὴν
    Ἑλλάδα
translation:
  text: After passing through those regions and encouraging them with many words,
    he came into Greece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at great length' or 'with much exhortation'; the Greek literally says
      'with many words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθὼν
  chosen: After passing through
  alternatives:
  - having gone through
  - after traveling through
  lexicon: BDAG
  rationale: Aorist participle of διέρχομαι, indicating prior action relative to the
    main verb ἦλθεν. 'After passing through' preserves the participial sequence in
    natural English without over-literal awkwardness.
- source_word: τὰ μέρη ἐκεῖνα
  chosen: those regions
  alternatives:
  - those parts
  - those districts
  lexicon: BDAG
  rationale: μέρη literally means 'parts/regions.' 'Those regions' is idiomatic modern
    English and fits the geographical sense in context.
- source_word: παρακαλέσας
  chosen: encouraging
  alternatives:
  - exhorting
  - comforting
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, exhort, or comfort depending on context.
    Here Paul is visiting believers and strengthening them, so 'encouraging' best
    captures the broad pastoral sense without narrowing it to admonition alone.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: The pronoun refers to the believers/disciples in the regions just mentioned.
    'Them' is the straightforward English equivalent.
- source_word: λόγῳ πολλῷ
  chosen: with many words
  alternatives:
  - at great length
  - with much exhortation
  lexicon: BDAG
  rationale: The dative phrase is literally 'with much word/speech.' 'With many words'
    preserves the lexical form of λόγος while remaining understandable. The idiomatic
    sense is extended speech or substantial exhortation; that nuance is preserved
    in a footnote.
- source_word: ἦλθεν εἰς τὴν Ἑλλάδα
  chosen: he came into Greece
  alternatives:
  - he went to Greece
  - he arrived in Greece
  lexicon: BDAG
  rationale: ἔρχομαι commonly means 'come/go' depending on viewpoint. 'He came into
    Greece' follows the Greek wording closely and keeps the movement into a region
    explicit.
- source_word: δὲ
  chosen: After
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. In English, its transitional force is absorbed
    into the temporal participial construction 'After passing through,' which yields
    a natural sentence while preserving discourse flow.
