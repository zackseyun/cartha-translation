id: ACT.3.12
reference: Acts 3:12
source:
  edition: SBLGNT
  text: ἰδὼν δὲ ⸀ὁ Πέτρος ἀπεκρίνατο πρὸς τὸν λαόν· Ἄνδρες Ἰσραηλῖται, τί θαυμάζετε
    ἐπὶ τούτῳ, ἢ ἡμῖν τί ἀτενίζετε ὡς ἰδίᾳ δυνάμει ἢ εὐσεβείᾳ πεποιηκόσιν τοῦ περιπατεῖν
    αὐτόν;
translation:
  text: But when Peter saw it, he answered the people, “Men of Israel, why do you
    marvel at this, or why do you stare at us as though by our own power or godliness
    we had made him walk?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “why are you looking intently at us?” The verb implies a fixed or sustained
      gaze.
    reason: lexical_alternative
  - marker: b
    text: Or “piety” for “godliness.” Peter denies that the man's healing came from
      the apostles' own religious devotion or spiritual quality.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when Peter saw it
  alternatives:
  - seeing this
  - when he saw
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in smooth English:
    Peter''s seeing precedes his response. ''It'' supplies the implied object from
    context, namely the crowd''s reaction to the healed man.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast. 'But' fits the discourse shift from
    the crowd's reaction to Peter's response.
- source_word: ἀπεκρίνατο πρὸς τὸν λαόν
  chosen: he answered the people
  alternatives:
  - he responded to the people
  - he addressed the people
  lexicon: BDAG
  rationale: Though no direct question preceded, ἀποκρίνομαι can introduce a response
    to a situation. 'Answered the people' preserves the Greek idiom while remaining
    natural English.
- source_word: Ἄνδρες Ἰσραηλῖται
  chosen: Men of Israel
  alternatives:
  - Israelite men
  - Men, Israelites
  lexicon: BDAG
  rationale: This is a conventional vocative address. 'Men of Israel' is idiomatic
    and preserves the masculine vocative ἄνδρες in keeping with the gender-accurate
    policy.
- source_word: τί θαυμάζετε ἐπὶ τούτῳ
  chosen: why do you marvel at this
  alternatives:
  - why are you amazed at this
  - why do you wonder at this
  lexicon: BDAG
  rationale: θαυμάζω denotes wonder or amazement. 'Marvel' preserves the elevated
    but still readable tone of Peter's public speech. ἐπὶ τούτῳ is rendered 'at this,'
    referring to the healing event.
- source_word: ἢ ἡμῖν τί ἀτενίζετε
  chosen: or why do you stare at us
  alternatives:
  - or why do you look intently at us
  - or why are you fixing your eyes on us
  lexicon: BDAG
  rationale: ἀτενίζω conveys sustained, intent looking. 'Stare at us' is natural and
    captures the force without sounding overly technical.
- source_word: ὡς
  chosen: as though
  alternatives:
  - as if
  - as
  lexicon: BDAG
  rationale: Introduces the mistaken assumption Peter rejects. 'As though' fits the
    rhetorical correction.
- source_word: ἰδίᾳ δυνάμει
  chosen: by our own power
  alternatives:
  - by private power
  - by power of our own
  lexicon: BDAG
  rationale: ἰδίᾳ stresses what belongs to oneself. 'Our own power' clearly conveys
    that Peter denies personal causal ability.
- source_word: εὐσεβείᾳ
  chosen: godliness
  alternatives:
  - piety
  - devoutness
  lexicon: BDAG
  rationale: εὐσέβεια refers to reverence/devout piety. 'Godliness' is standard, readable
    English and avoids the potentially archaic feel of 'piety,' while preserving the
    religious sense.
- source_word: πεποιηκόσιν
  chosen: we had made
  alternatives:
  - we made
  - we caused
  lexicon: BDAG
  rationale: Perfect active participle with ὡς presents the supposed completed result
    attributed to Peter and John. English pluperfect 'we had made' fits the indirect
    discourse after 'as though' and the prior healing event.
- source_word: τοῦ περιπατεῖν αὐτόν
  chosen: him walk
  alternatives:
  - him to walk
  - him walk about
  lexicon: BDAG
  rationale: 'Articular infinitive expresses result/content of the supposed action:
    causing the man to walk. ''Made him walk'' is idiomatic English for this construction.'
