theological_decisions:
- issue: Whether to render εὐσεβείᾳ in a way that could imply the miracle came from
    apostolic merit
  chosen_reading: godliness
  alternative_readings:
  - piety
  - devoutness
  rationale: Peter explicitly denies that the healing arose from the apostles' own
    spiritual quality. 'Godliness' preserves the religious dimension without suggesting
    a technical doctrine of merit beyond the text. The translation leaves Peter's
    denial intact and does not import later theological categories.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Gendered vocative Ἄνδρες Ἰσραηλῖται
  chosen_reading: Men of Israel
  alternative_readings:
  - People of Israel
  - Israelites
  rationale: The Greek uses a masculine vocative form in a public address. Following
    the gender-accurate policy, the translation preserves the form rather than neutralizing
    it, while understanding that the audience may have included more than males.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
