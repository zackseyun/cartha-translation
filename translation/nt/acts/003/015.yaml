id: ACT.3.15
reference: Acts 3:15
source:
  edition: SBLGNT
  text: τὸν δὲ ἀρχηγὸν τῆς ζωῆς ἀπεκτείνατε, ὃν ὁ θεὸς ἤγειρεν ἐκ νεκρῶν, οὗ ἡμεῖς
    μάρτυρές ἐσμεν.
translation:
  text: and you killed the Author of life, whom God raised from the dead. We are witnesses
    of this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Prince of life,' 'Leader of life,' or 'Founder of life.' The Greek ἀρχηγός
      can carry senses of origin, leadership, or preeminence.
    reason: lexical_alternative
  - marker: b
    text: Or 'of whom we are witnesses.' The Greek may point either to the risen one
      himself or to the fact of his resurrection.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective continuing Peter’s accusation
    from the previous clause. 'And' is natural English and preserves the flow without
    overstating contrast.
- source_word: ἀρχηγὸν
  chosen: Author
  alternatives:
  - Founder
  - Leader
  - Prince
  - Pioneer
  - Originator
  lexicon: BDAG
  rationale: 'ἀρχηγός can denote one who begins, originates, leads, or is preeminent.
    In the phrase ''Author of life,'' the life-giving/originating sense is prominent
    and fits the immediate irony: they killed the one associated with life itself.
    ''Prince of life'' is traditional but less transparent in modern English; ''Leader
    of life'' is awkward. ''Author'' best balances semantic range, readability, and
    theological weight.'
- source_word: τῆς ζωῆς
  chosen: of life
  alternatives:
  - of the life
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly. English idiom omits the article.
    The phrase is kept compact to preserve the title-like force.
- source_word: ἀπεκτείνατε
  chosen: you killed
  alternatives:
  - you put to death
  - you murdered
  lexicon: BDAG
  rationale: The aorist indicative directly states the act. 'You killed' is the plainest
    modern equivalent. 'Put to death' is possible but slightly more formal and less
    direct; 'murdered' adds a legal/moral nuance not explicit in the verb itself.
- source_word: ἤγειρεν ἐκ νεκρῶν
  chosen: raised from the dead
  alternatives:
  - raised from among the dead
  lexicon: BDAG
  rationale: This is the standard and accurate rendering of resurrection language.
    'From the dead' is idiomatic English for ἐκ νεκρῶν and preserves the resurrection
    claim clearly.
- source_word: οὗ
  chosen: of this
  alternatives:
  - of whom
  - to this
  lexicon: BDAG
  rationale: 'The genitive relative pronoun most naturally refers to the preceding
    resurrection event or fact in idiomatic English: ''We are witnesses of this.''
    A more literal ''of whom we are witnesses'' is possible, but in English ''witnesses
    of this'' better conveys the apostolic testimony to his resurrection while remaining
    faithful to the Greek construction.'
- source_word: μάρτυρές ἐσμεν
  chosen: We are witnesses
  alternatives:
  - we are testifiers
  - we testify
  lexicon: BDAG
  rationale: The nominal expression is retained rather than converted to a verb, preserving
    the Greek emphasis on apostolic status and testimony.
