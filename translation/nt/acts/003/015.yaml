theological_decisions:
- issue: Rendering ἀρχηγός in a christological title
  chosen_reading: Author of life
  alternative_readings:
  - Prince of life
  - Leader of life
  - Founder of life
  rationale: The term carries both leadership and origination nuances. In this context,
    'Author of life' best communicates the paradox that the one associated with life
    itself was killed, while remaining within orthodox Christological bounds and not
    importing a narrower political sense such as 'Prince.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
- issue: Referent of οὗ in the witness clause
  chosen_reading: We are witnesses of this
  alternative_readings:
  - of whom we are witnesses
  rationale: The Greek permits a close connection either to the raised person or to
    the resurrection event. English idiom favors making the apostolic witness explicitly
    about the resurrection fact, which is the immediate point of Peter’s proclamation,
    while preserving the sense of the Greek.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
