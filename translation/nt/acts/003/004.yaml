id: ACT.3.4
reference: Acts 3:4
source:
  edition: SBLGNT
  text: ἀτενίσας δὲ Πέτρος εἰς αὐτὸν σὺν τῷ Ἰωάννῃ εἶπεν· Βλέψον εἰς ἡμᾶς.
translation:
  text: And Peter, together with John, fixed his gaze on him and said, “Look at us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “look intently at us.” The Greek uses a verb of directed sight and a
      command for focused attention.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίσας
  chosen: fixed his gaze
  alternatives:
  - looked intently
  - stared
  lexicon: BDAG
  rationale: The aorist participle from ἀτενίζω conveys a focused, intent look rather
    than a mere glance. 'Fixed his gaze' preserves the intensity in natural English
    without sounding overly wooden.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural in English narrative and avoids implying contrast more strongly than
    the Greek warrants.
- source_word: σὺν τῷ Ἰωάννῃ
  chosen: together with John
  alternatives:
  - with John
  lexicon: BDAG
  rationale: σύν with the dative marks accompaniment. 'Together with John' makes explicit
    that Peter's action and speech occur in company with John, matching the Greek
    emphasis slightly more clearly than a bare 'with John.'
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: λέγω in this context is the ordinary verb of speaking. 'Said' is the
    most direct and contextually appropriate rendering.
- source_word: Βλέψον
  chosen: Look
  alternatives:
  - See
  - Direct your gaze
  lexicon: BDAG
  rationale: The aorist imperative calls for a simple direct command. 'Look' is idiomatic
    and fits the immediate context of visual attention.
- source_word: εἰς ἡμᾶς
  chosen: at us
  alternatives:
  - toward us
  - on us
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/toward,' with verbs of looking it is
    idiomatically rendered 'at.' This gives clear modern English while preserving
    the sense of directed attention.
- source_word: εἰς αὐτόν
  chosen: on him
  alternatives:
  - at him
  - toward him
  lexicon: BDAG
  rationale: With ἀτενίζω, εἰς marks the object of concentrated attention. 'On him'
    pairs naturally with 'fixed his gaze' in English and reflects the directed focus
    of the Greek.
