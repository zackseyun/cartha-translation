theological_decisions:
- issue: Quotation of Deuteronomy 18 and messianic identification
  chosen_reading: Retain the wording as a prophetic citation about 'a prophet' without
    explicitly inserting 'Messiah' into the translation.
  alternative_readings:
  - Translate interpretively as 'the Prophet'
  - Make the messianic referent explicit in the main text
  rationale: In Acts, Peter applies this text to Jesus, but the Greek wording here
    still says 'a prophet.' The translation should not import the christological identification
    into the quotation itself beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - fellow Israelites
  rationale: The source is grammatically masculine plural and refers to covenant kin.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing;
    a footnote can preserve the broader representative sense if desired.
  doctrine_reference: Gender-accurate over gender-neutral.
