id: ACT.3.22
reference: Acts 3:22
source:
  edition: SBLGNT
  text: Μωϋσῆς ⸀μὲν εἶπεν ὅτι Προφήτην ὑμῖν ἀναστήσει κύριος ὁ ⸀θεὸς ἐκ τῶν ἀδελφῶν
    ὑμῶν ὡς ἐμέ· αὐτοῦ ἀκούσεσθε κατὰ πάντα ὅσα ἂν λαλήσῃ πρὸς ὑμᾶς.
translation:
  text: Moses indeed said, ‘The Lord God will raise up for you a prophet from among
    your brothers, like me. You shall listen to him in everything he says to you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among your fellow Israelites.' The Greek says 'from among your
      brothers,' using masculine kinship language in a representative covenantal sense.
    reason: lexical_alternative
  - marker: b
    text: Acts quotes Deuteronomy 18:15 with slightly different wording here; notably,
      the Greek text of Acts says 'the Lord God' rather than 'the Lord your God.'
    reason: cross_reference
lexical_decisions:
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: μὲν
  chosen: indeed
  alternatives:
  - for his part
  - on the one hand
  - — (left untranslated)
  lexicon: BDAG
  rationale: μέν marks emphasis or discourse development. 'Indeed' preserves the particle's
    forward-pointing force in readable English without overloading the sentence.
- source_word: εἶπεν ὅτι
  chosen: said, ‘...’
  alternatives:
  - said that
  lexicon: BDAG
  rationale: English direct quotation is natural here and reflects the citation formula
    clearly.
- source_word: Προφήτην
  chosen: a prophet
  lexicon: BDAG
  rationale: Anarthrous accusative is best rendered indefinitely in English here,
    while the allusion to Deut 18 gives it recognized significance.
- source_word: ἀναστήσει
  chosen: will raise up
  alternatives:
  - will appoint
  - will bring forth
  lexicon: BDAG
  rationale: This is the standard rendering in the Deuteronomy allusion and preserves
    the verbal link without importing resurrection language as the primary sense here.
- source_word: κύριος ὁ θεὸς
  chosen: the Lord God
  alternatives:
  - the Lord, God
  - the Lord your God
  lexicon: BDAG
  rationale: κύριος defaults to 'Lord' per doctrine. The Greek here lacks 'your,'
    unlike the Hebrew/LXX form in Deut 18:15, so the translation follows the wording
    of Acts rather than harmonizing to the source quotation.
- source_word: ἐκ τῶν ἀδελφῶν ὑμῶν
  chosen: from among your brothers
  alternatives:
  - from your brothers
  - from among your fellow Israelites
  lexicon: BDAG
  rationale: ἀδελφῶν is rendered 'brothers' in keeping with the gender-accurate policy
    and the covenantal/ethnic setting of the quotation. 'From among' brings out ἐκ
    naturally.
- source_word: ὡς ἐμέ
  chosen: like me
  alternatives:
  - as he raised me up
  lexicon: BDAG
  rationale: 'Standard comparative sense: the coming prophet is like Moses.'
- source_word: αὐτοῦ ἀκούσεσθε
  chosen: You shall listen to him
  alternatives:
  - You will listen to him
  - You shall hear him
  lexicon: BDAG
  rationale: Future middle here carries imperatival/covenantal force in the quotation.
    'Listen to' better captures obedient heed than mere auditory perception.
- source_word: κατὰ πάντα ὅσα ἂν λαλήσῃ πρὸς ὑμᾶς
  chosen: in everything he says to you
  alternatives:
  - according to all that he may speak to you
  - in all things whatever he says to you
  lexicon: BDAG
  rationale: This renders the distributive force of κατὰ πάντα with ὅσα ἂν plus subjunctive
    in clear modern English while preserving comprehensiveness.
