id: ACT.3.6
reference: Acts 3:6
source:
  edition: SBLGNT
  text: εἶπεν δὲ Πέτρος· Ἀργύριον καὶ χρυσίον οὐχ ὑπάρχει μοι, ὃ δὲ ἔχω τοῦτό σοι
    δίδωμι· ἐν τῷ ὀνόματι Ἰησοῦ Χριστοῦ τοῦ Ναζωραίου ⸀περιπάτει.
translation:
  text: 'But Peter said, “Silver and gold I do not have, but what I do have, this
    I give to you: in the name of Jesus Messiah the Nazarene, walk.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus Christ.” The Greek title Χριστός is rendered “Messiah” here to
      preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or “of Nazareth.” Greek τοῦ Ναζωραίου is more literally “the Nazarene.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀργύριον
  chosen: Silver
  alternatives:
  - money
  - silver coin
  lexicon: BDAG
  rationale: Rendered literally as “silver,” paired with χρυσίον as a merism for monetary
    wealth. A more idiomatic “money” is possible, but the Greek names the metals explicitly.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - gold coin
  - wealth
  lexicon: BDAG
  rationale: Rendered literally to preserve the explicit pairing “silver and gold,”
    a conventional expression for material wealth.
- source_word: οὐχ ὑπάρχει μοι
  chosen: I do not have
  alternatives:
  - is not mine
  - is not available to me
  lexicon: BDAG
  rationale: This idiom expresses possession. “I do not have” is natural English and
    accurately reflects the sense without woodenly reproducing the existential construction.
- source_word: ὃ δὲ ἔχω τοῦτό σοι δίδωμι
  chosen: but what I do have, this I give to you
  alternatives:
  - but what I have I give to you
  - but what I do possess, that I give you
  lexicon: BDAG
  rationale: The translation preserves the emphatic contrast with Peter’s lack of
    money and keeps the demonstrative force of τοῦτο with “this,” while remaining
    readable.
- source_word: ἐν τῷ ὀνόματι
  chosen: in the name of
  alternatives:
  - by the authority of
  - on the basis of the name of
  lexicon: BDAG
  rationale: The phrase can imply agency or authority, but “in the name of” best preserves
    the Greek wording and its theological resonance, while English readers can infer
    delegated authority from context.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ is a title here rather than a mere name component. Per doctrine
    guidance, Christological titles are translated where context supports, so “Messiah”
    is preferred.
- source_word: τοῦ Ναζωραίου
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: Ναζωραῖος is most directly rendered “the Nazarene.” “Of Nazareth” is
    interpretive and smoother, but the adjectival/title-like form is better preserved
    here.
- source_word: περιπάτει
  chosen: walk
  alternatives:
  - start walking
  - walk around
  lexicon: BDAG
  rationale: The present imperative here functions as a command to walk. “Walk” is
    concise and idiomatic; “start walking” brings out ingressive force but adds interpretation
    beyond the bare imperative.
