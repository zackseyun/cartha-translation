theological_decisions:
- issue: Rendering of Χριστοῦ in the name formula
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Χριστός be translated as “Messiah”
    where it functions as a title and “Christ” where it is name-like. In this healing
    proclamation, the titular sense remains clear, so “Messiah” is used in the main
    text while the traditional “Christ” is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
