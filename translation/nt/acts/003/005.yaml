id: ACT.3.5
reference: Acts 3:5
source:
  edition: SBLGNT
  text: ὁ δὲ ἐπεῖχεν αὐτοῖς προσδοκῶν τι παρ’ αὐτῶν λαβεῖν.
translation:
  text: So he fixed his attention on them, expecting to receive something from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gave heed to them' / 'looked intently at them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: So he
  alternatives:
  - And he
  - But he
  lexicon: BDAG
  rationale: δέ is a mild connective marking narrative progression/contrast. 'So'
    fits natural English narrative flow here better than a wooden 'and' or stronger
    'but,' while ὁ refers back to the lame man and is represented by 'he'.
- source_word: ἐπεῖχεν
  chosen: fixed his attention on
  alternatives:
  - gave heed to
  - looked intently at
  - held out toward
  lexicon: BDAG
  rationale: In this context ἐπέχω idiomatically means to direct attention toward
    someone, not merely to look or physically hold something out. 'Fixed his attention
    on' captures the sustained attentiveness implied by the imperfect.
- source_word: αὐτοῖς
  chosen: on them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: With ἐπέχω in this sense, English idiom prefers 'on them' after 'fixed
    his attention.' The referent is Peter and John.
- source_word: προσδοκῶν
  chosen: expecting
  alternatives:
  - waiting for
  - anticipating
  lexicon: BDAG
  rationale: The participle gives the manner or accompanying circumstance of his attention.
    'Expecting' best conveys his hopeful anticipation in context.
- source_word: τι
  chosen: something
  alternatives:
  - anything
  lexicon: BDAG
  rationale: The indefinite object is nonspecific but positive in context; he expects
    some gift or alms. 'Something' is the most natural rendering.
- source_word: παρ’ αὐτῶν
  chosen: from them
  alternatives:
  - at their hands
  - from their side
  lexicon: BDAG
  rationale: παρά with the genitive indicates source. 'From them' is clear and idiomatic.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to get
  - to take
  lexicon: BDAG
  rationale: The infinitive expresses what he was expecting. 'Receive' fits the context
    of almsgiving better than the more colloquial 'get' or the potentially misleading
    'take'.
