theological_decisions:
- issue: Scope of ἀποκαταστάσεως πάντων
  chosen_reading: '''the restoration of all things'' retained as a broad eschatological
    phrase without specifying the nature or extent of that restoration'
  alternative_readings:
  - '''the restoration of everything'''
  - read as implying universal salvation
  - read as referring only to Israel's national restoration
  rationale: The Greek phrase is broad and should remain broad. The translation must
    not resolve debated theological questions beyond the text. Rendering πάντων as
    neuter 'all things' preserves the wording while avoiding importing a doctrine
    of universalism or restricting the scope to one eschatological scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of οὐρανὸν δέξασθαι
  chosen_reading: heaven as the grammatical subject that receives Jesus until the
    appointed times
  alternative_readings:
  - 'a more traditional English restructuring: ''whom heaven must receive'' understood
    almost passively'
  rationale: The Greek construction presents heaven as receiving him. This should
    be preserved without altering the sense into a doctrinally loaded statement about
    Christ's absence beyond what the text says.
  doctrine_reference: Original-language primacy over translation tradition.
