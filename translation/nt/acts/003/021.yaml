id: ACT.3.21
reference: Acts 3:21
source:
  edition: SBLGNT
  text: ὃν δεῖ οὐρανὸν μὲν δέξασθαι ἄχρι χρόνων ἀποκαταστάσεως πάντων ὧν ἐλάλησεν
    ὁ θεὸς διὰ ⸀στόματος τῶν ἁγίων ⸂ἀπ’ αἰῶνος αὐτοῦ προφητῶν⸃.
translation:
  text: whom heaven must receive until the times of the restoration of all things
    that God spoke through the mouth of his holy prophets from of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from ancient times.' The phrase does not necessarily mean 'from eternity'
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  chosen: whom
  alternatives:
  - who
  lexicon: BDAG
  rationale: Accusative relative pronoun referring back to Jesus in the previous verse;
    'whom' preserves the object function in formal but still natural English.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary for
  lexicon: BDAG
  rationale: Expresses necessity or divine necessity. 'Must' is concise and preserves
    the force without overexpansion.
- source_word: οὐρανὸν μὲν δέξασθαι
  chosen: heaven must receive
  alternatives:
  - must be received by heaven
  - heaven must welcome
  lexicon: BDAG
  rationale: The infinitive with οὐρανόν as subject-accusative yields 'heaven must
    receive.' This is more faithful to the Greek construction than the traditional
    passive-like English 'whom the heaven must receive,' while remaining idiomatic
    enough. 'Welcome' is too interpretive.
- source_word: ἄχρι χρόνων
  chosen: until the times
  alternatives:
  - until the time
  - until times
  lexicon: BDAG
  rationale: Plural χρόνων is retained as 'times,' indicating an eschatological period
    rather than a single instant.
- source_word: ἀποκαταστάσεως
  chosen: restoration
  alternatives:
  - restoration to order
  - renewal
  lexicon: BDAG
  rationale: '''Restoration'' is the direct lexical equivalent and preserves the term''s
    broad scope without importing a narrower theological system. ''Renewal'' is possible
    but less precise to the noun used.'
- source_word: πάντων
  chosen: of all things
  alternatives:
  - of all
  - of everything
  lexicon: BDAG
  rationale: Neuter plural naturally suggests 'all things' rather than masculine 'all
    people.' This avoids over-specifying universal salvation while preserving the
    breadth of the phrase.
- source_word: ὧν
  chosen: that
  alternatives:
  - which
  - concerning which
  lexicon: BDAG
  rationale: Relative pronoun referring back to the content of 'all things'; 'that'
    is natural English in this restrictive clause.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - declared
  - announced
  lexicon: BDAG
  rationale: Aorist of λαλέω is straightforwardly 'spoke.' More elevated alternatives
    are unnecessary.
- source_word: διὰ στόματος
  chosen: through the mouth of
  alternatives:
  - by the mouth of
  - through
  lexicon: BDAG
  rationale: This is a standard biblical idiom for prophetic agency. Retaining 'mouth'
    preserves the imagery and intertextual resonance.
- source_word: τῶν ἁγίων ... προφητῶν
  chosen: his holy prophets
  alternatives:
  - the holy prophets
  - his prophets, the holy ones
  lexicon: BDAG
  rationale: 'αὐτοῦ most naturally modifies ''prophets'' in the phrase as a whole:
    they are God''s prophets. ''Holy'' is retained as an attributive adjective, not
    flattened.'
- source_word: ἀπ’ αἰῶνος
  chosen: from of old
  alternatives:
  - from ancient times
  - from eternity
  - from the beginning
  lexicon: BDAG
  rationale: In this prophetic context the phrase idiomatically means 'from ancient
    times' or 'from of old,' not necessarily metaphysical eternity. 'From of old'
    preserves biblical register with clarity.
