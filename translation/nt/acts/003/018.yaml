theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term is titular here, not functioning primarily as a name. Following
    the doctrine's contested-terms guidance, 'Messiah' better preserves the Jewish
    messianic context of Peter's speech.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: Force of παθεῖν in relation to prophecy
  chosen_reading: that his Messiah would suffer
  alternative_readings:
  - that his Messiah should suffer
  - his Messiah to suffer
  rationale: This wording conveys the prophetic content without overstating modal
    necessity. It preserves the statement that the prophets announced the Messiah's
    suffering and that God has now fulfilled it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
