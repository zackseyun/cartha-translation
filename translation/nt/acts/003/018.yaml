id: ACT.3.18
reference: Acts 3:18
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς ἃ προκατήγγειλεν διὰ στόματος πάντων τῶν ⸀προφητῶν παθεῖν τὸν χριστὸν
    ⸀αὐτοῦ ἐπλήρωσεν οὕτως.
translation:
  text: 'But God fulfilled in this way what he had announced beforehand through the
    mouth of all the prophets: that his Messiah would suffer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through all the prophets.' The Greek more literally says 'through the
      mouth of all the prophets.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'his Christ'; here rendered 'his Messiah' because Χριστός functions
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the audience's action in the previous verse; 'But'
    best preserves the adversative force in natural English.
- source_word: προκατήγγειλεν
  chosen: had announced beforehand
  alternatives:
  - foretold
  - proclaimed beforehand
  lexicon: BDAG
  rationale: The verb combines prior announcement with declarative force. 'Had announced
    beforehand' preserves both the temporal prefix and the speech-act sense without
    sounding overly archaic.
- source_word: διὰ στόματος πάντων τῶν προφητῶν
  chosen: through the mouth of all the prophets
  alternatives:
  - through all the prophets
  - by the mouth of all the prophets
  lexicon: BDAG
  rationale: Retains the concrete biblical idiom 'through the mouth of' rather than
    flattening it entirely, while remaining intelligible in English. 'All the prophets'
    reflects πάντων.
- source_word: παθεῖν
  chosen: would suffer
  alternatives:
  - to suffer
  - must suffer
  lexicon: BDAG
  rationale: The infinitive depends on what God announced beforehand; in English,
    'that his Messiah would suffer' expresses the content naturally. 'Must suffer'
    would import necessity more explicitly than this form alone states.
- source_word: τὸν χριστὸν αὐτοῦ
  chosen: his Messiah
  alternatives:
  - his Christ
  - his Anointed One
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is rendered ''Messiah'' when functioning as a
    title. The possessive αὐτοῦ is best taken with χριστόν: the Messiah belonging
    to or appointed by God.'
- source_word: ἐπλήρωσεν
  chosen: fulfilled
  alternatives:
  - brought to fulfillment
  - accomplished
  lexicon: BDAG
  rationale: A standard and clear rendering for πληρόω in fulfillment contexts; it
    preserves the scriptural-fulfillment sense without unnecessary expansion.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: 'Placed with ''fulfilled'' to show manner: God fulfilled what he announced
    ''in this way,'' namely through the suffering just described.'
