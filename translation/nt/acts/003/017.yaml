id: ACT.3.17
reference: Acts 3:17
source:
  edition: SBLGNT
  text: Καὶ νῦν, ἀδελφοί, οἶδα ὅτι κατὰ ἄγνοιαν ἐπράξατε, ὥσπερ καὶ οἱ ἄρχοντες ὑμῶν·
translation:
  text: And now, brothers, I know that you acted in ignorance, just as your rulers
    also did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      wider mixed group representatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ νῦν
  chosen: And now
  alternatives:
  - And as for now
  - So now
  lexicon: BDAG
  rationale: Renders the discourse transition naturally in English while preserving
    the connective καί and temporal νῦν. 'And now' keeps the flow from the previous
    accusation into the present appeal.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The vocative plural literally means 'brothers.' Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In Acts, the address can be representative
    of the gathered Israelites, so the literal form is retained rather than expanded
    in the main text.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I understand
  - I am aware
  lexicon: BDAG
  rationale: The verb expresses Peter's assertion of knowledge. 'I know' is the most
    direct and idiomatic equivalent.
- source_word: κατὰ ἄγνοιαν
  chosen: in ignorance
  alternatives:
  - out of ignorance
  - unknowingly
  lexicon: BDAG
  rationale: The prepositional phrase denotes action characterized by ignorance or
    lack of understanding. 'In ignorance' is concise and preserves the moral-epistemic
    nuance without overstating innocence.
- source_word: ἐπράξατε
  chosen: you acted
  alternatives:
  - you did this
  - you committed this
  lexicon: BDAG
  rationale: πράσσω here refers broadly to what they did in relation to Jesus. 'You
    acted' is suitably general and matches the Greek without importing a more specific
    object not stated in this verse.
- source_word: ὥσπερ καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - just as
  lexicon: BDAG
  rationale: 'This combination marks comparison with addition: the people acted in
    ignorance, and their rulers did likewise. English smooths this as ''just as your
    rulers also did.'''
- source_word: οἱ ἄρχοντες ὑμῶν
  chosen: your rulers
  alternatives:
  - your leaders
  - your authorities
  lexicon: BDAG
  rationale: ἄρχοντες refers to governing leaders or authorities. 'Rulers' best fits
    the Jerusalem leadership context and preserves the political-religious authority
    implied.
