theological_decisions:
- issue: Whether Peter's statement about ignorance should be rendered in a way that
    excuses guilt
  chosen_reading: Retain 'acted in ignorance' without softening culpability or implying
    full exoneration.
  alternative_readings:
  - acted unknowingly
  - did it because you did not know
  rationale: The verse acknowledges ignorance as a factor in their action, but the
    broader context still calls for repentance (v. 19). The translation should preserve
    that tension rather than resolve it into either total innocence or heightened
    blame.
  doctrine_reference: Preserve theological tension rather than resolve it.
