id: ACT.3.11
reference: Acts 3:11
source:
  edition: SBLGNT
  text: Κρατοῦντος δὲ ⸀αὐτοῦ τὸν Πέτρον καὶ ⸀τὸν Ἰωάννην συνέδραμεν ⸂πᾶς ὁ λαὸς πρὸς
    αὐτοὺς⸃ ἐπὶ τῇ στοᾷ τῇ καλουμένῃ Σολομῶντος ἔκθαμβοι.
translation:
  text: While he was holding on to Peter and John, all the people, utterly astonished,
    ran together to them at the portico called Solomon’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As he clung to Peter and John.' The Greek verb can emphasize gripping
      tightly or clinging.
    reason: lexical_alternative
  - marker: b
    text: '''Portico'' refers to a covered colonnade in the temple precincts, traditionally
      known as Solomon’s Portico.'
    reason: cultural_note
lexical_decisions:
- source_word: Κρατοῦντος ... αὐτοῦ
  chosen: While he was holding on to
  alternatives:
  - As he clung to
  - While he kept hold of
  lexicon: BDAG
  rationale: The genitive absolute with present participle indicates a contemporaneous
    action. κρατέω here conveys grasping/holding fast. 'Holding on to' is natural
    modern English and preserves the physical attachment of the healed man to Peter
    and John without overinterpreting motive. 'Clung to' is possible, but slightly
    more interpretive/emotive.
- source_word: τὸν Πέτρον καὶ τὸν Ἰωάννην
  chosen: Peter and John
  rationale: Standard transliteration of personal names, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: συνέδραμεν
  chosen: ran together
  alternatives:
  - rushed together
  - came running together
  lexicon: BDAG
  rationale: συντρέχω denotes running together/converging quickly. 'Ran together'
    preserves both the motion and the collective sense with relatively formal transparency.
- source_word: πᾶς ὁ λαὸς
  chosen: all the people
  alternatives:
  - the whole crowd
  - all the crowd
  lexicon: BDAG
  rationale: λαός commonly means 'people' here, likely the gathered temple populace.
    'All the people' reflects the Greek closely and avoids importing a narrower sense
    like 'crowd' unless required.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: πρός with accusative here marks movement toward persons. 'To them' is
    idiomatic in English in this context.
- source_word: ἐπὶ τῇ στοᾷ
  chosen: at the portico
  alternatives:
  - in the colonnade
  - at the porch
  lexicon: BDAG
  rationale: στοά refers to a covered colonnade/portico. 'Portico' is readable modern
    English and fits the temple architectural setting better than the archaic 'porch.'
- source_word: τῇ καλουμένῃ Σολομῶντος
  chosen: called Solomon’s
  alternatives:
  - called Solomon's Portico
  - known as Solomon's Colonnade
  lexicon: BDAG
  rationale: The participle καλουμένῃ means 'called/named.' Because στοᾷ has already
    been rendered as 'portico,' 'called Solomon’s' avoids unnecessary repetition while
    preserving the designation. The possessive reflects the conventional place-name.
- source_word: ἔκθαμβοι
  chosen: utterly astonished
  alternatives:
  - amazed
  - astounded
  lexicon: BDAG
  rationale: ἔκθαμβος expresses strong amazement or astonishment. 'Utterly astonished'
    preserves the intensity better than the flatter 'amazed.' Positioned appositionally
    in Greek, it is rendered adverbially in English for natural style.
