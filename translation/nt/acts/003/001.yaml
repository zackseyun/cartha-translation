id: ACT.3.1
reference: Acts 3:1
source:
  edition: SBLGNT
  text: ⸂Πέτρος δὲ⸃ καὶ Ἰωάννης ἀνέβαινον εἰς τὸ ἱερὸν ἐπὶ τὴν ὥραν τῆς προσευχῆς
    τὴν ἐνάτην,
translation:
  text: Now Peter and John were going up to the temple at the hour of prayer, the
    ninth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, about three in the afternoon by modern reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'Now' gives natural English discourse flow without
    overstating adversative force.
- source_word: ἀνέβαινον
  chosen: were going up
  alternatives:
  - went up
  - were going
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or customary action in past time. 'Were
    going up' preserves the imperfective aspect better than simple 'went up.' 'Up'
    is retained because ἀναβαίνω is the standard idiom for going up to Jerusalem/the
    temple.
- source_word: ἱερὸν
  chosen: the temple
  alternatives:
  - the temple precincts
  - the temple complex
  lexicon: BDAG
  rationale: ἱερόν refers to the temple area/precincts rather than the inner sanctuary
    (ναός). 'The temple' is the standard readable rendering in English; the more precise
    alternatives are possible but unnecessarily cumbersome in the main text.
- source_word: ἐπὶ τὴν ὥραν
  chosen: at the hour
  alternatives:
  - for the hour
  - toward the hour
  lexicon: BDAG
  rationale: With ἐπί and the accusative in this temporal expression, the sense is
    movement in relation to a set time. In idiomatic English, 'at the hour' best conveys
    that they were going there for the appointed time.
- source_word: τῆς προσευχῆς
  chosen: of prayer
  alternatives:
  - for prayer
  lexicon: BDAG
  rationale: The genitive is naturally rendered 'of prayer' in the fixed expression
    'the hour of prayer.' This preserves the formal structure while remaining clear.
- source_word: τὴν ἐνάτην
  chosen: the ninth hour
  alternatives:
  - about three in the afternoon
  - at the ninth hour
  lexicon: BDAG
  rationale: Retaining 'the ninth hour' preserves the Jewish timekeeping framework
    of the text. A modern-time equivalent is useful but better placed in a footnote
    rather than replacing the source-oriented expression in the main text.
