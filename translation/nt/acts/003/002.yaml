id: ACT.3.2
reference: Acts 3:2
source:
  edition: SBLGNT
  text: καί τις ἀνὴρ χωλὸς ἐκ κοιλίας μητρὸς αὐτοῦ ὑπάρχων ἐβαστάζετο, ὃν ἐτίθουν
    καθ’ ἡμέραν πρὸς τὴν θύραν τοῦ ἱεροῦ τὴν λεγομένην Ὡραίαν τοῦ αἰτεῖν ἐλεημοσύνην
    παρὰ τῶν εἰσπορευομένων εἰς τὸ ἱερόν,
translation:
  text: And a certain man, lame from his mother’s womb, was being carried, whom they
    used to place every day at the gate of the temple called Beautiful, to ask for
    alms from those entering into the temple,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary (ναός).
    reason: cultural_note
  - marker: b
    text: Or 'from birth' for 'from his mother’s womb.'
    reason: lexical_alternative
  - marker: c
    text: The gate’s name is literally 'Beautiful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τις ἀνὴρ
  chosen: a certain man
  alternatives:
  - a man
  - a certain male
  lexicon: BDAG
  rationale: τις with ἀνήρ introduces an indefinite but particular individual. 'A
    certain man' preserves the narrative specificity better than the flatter 'a man.'
- source_word: χωλὸς
  chosen: lame
  alternatives:
  - crippled
  - disabled in his feet
  lexicon: BDAG
  rationale: '''Lame'' is the standard, accurate rendering for physical inability
    to walk normally. ''Crippled'' is more dated and potentially harsher in modern
    English.'
- source_word: ἐκ κοιλίας μητρὸς αὐτοῦ
  chosen: from his mother’s womb
  alternatives:
  - from birth
  - from his mother's belly
  lexicon: BDAG
  rationale: This phrase is more literally 'from his mother's womb.' While idiomatically
    it means 'from birth,' the fuller expression is natural in English and preserves
    the source imagery.
- source_word: ὑπάρχων
  chosen: — (implicit in 'lame from his mother’s womb')
  alternatives:
  - being
  - existing as
  lexicon: BDAG
  rationale: The participle functions predicatively with χωλός, describing his condition
    as ongoing from birth. English expresses this naturally by folding it into 'lame
    from his mother’s womb' rather than adding an awkward 'being.'
- source_word: ἐβαστάζετο
  chosen: was being carried
  alternatives:
  - was carried
  - was borne
  lexicon: BDAG
  rationale: The imperfect passive indicates repeated or ongoing action in past time.
    'Was being carried' preserves the imperfective sense better than the simple past
    'was carried.'
- source_word: ἐτίθουν
  chosen: they used to place
  alternatives:
  - they were placing
  - they would put
  lexicon: BDAG
  rationale: The imperfect active plural suggests customary repeated action. 'They
    used to place' communicates habitual past action clearly in modern English.
- source_word: καθ’ ἡμέραν
  chosen: every day
  alternatives:
  - daily
  - day by day
  lexicon: BDAG
  rationale: '''Every day'' is idiomatic, clear modern English and accurately reflects
    the distributive sense.'
- source_word: θύραν τοῦ ἱεροῦ
  chosen: the gate of the temple
  alternatives:
  - the door of the temple precincts
  - the temple gate
  lexicon: BDAG
  rationale: θύρα can mean 'door' or 'gate'; in this public architectural setting
    'gate' is the natural choice. ἱερόν refers to the temple complex/precincts rather
    than the sanctuary proper, but 'temple' is acceptable in running English; the
    distinction is noted in a footnote.
- source_word: τὴν λεγομένην Ὡραίαν
  chosen: called Beautiful
  alternatives:
  - called the Beautiful Gate
  - called Fair
  lexicon: BDAG
  rationale: The adjective Ὡραίαν is functioning as a proper designation. 'Called
    Beautiful' stays close to the Greek wording; English readers can infer it names
    the gate.
- source_word: τοῦ αἰτεῖν
  chosen: to ask for
  alternatives:
  - in order to ask for
  - for the purpose of asking for
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'To ask for' is concise and
    natural while preserving the purposive force.
- source_word: ἐλεημοσύνην
  chosen: alms
  alternatives:
  - charitable gifts
  - mercy-gifts
  lexicon: BDAG
  rationale: '''Alms'' is the established and precise term for money or gifts given
    to the poor. Though somewhat specialized, it remains understandable and best matches
    the historical practice.'
- source_word: παρὰ τῶν εἰσπορευομένων
  chosen: from those entering
  alternatives:
  - from those going in
  - from those coming in
  lexicon: BDAG
  rationale: The present middle participle denotes people in the act of entering.
    'Those entering' is concise and accurate.
- source_word: εἰς τὸ ἱερόν
  chosen: into the temple
  alternatives:
  - into the temple precincts
  lexicon: BDAG
  rationale: Again ἱερόν denotes the temple complex. 'Into the temple' is idiomatic
    in English, with the precinct nuance preserved in a footnote for precision.
