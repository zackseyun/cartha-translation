theological_decisions:
- issue: Rendering παῖς for Jesus
  chosen_reading: servant
  alternative_readings:
  - child
  rationale: Given the Isaianic Servant background and the immediate christological
    context, 'servant' best preserves the likely intertextual force without importing
    biological-sonship language not expressed by παῖς here. This also avoids confusion
    with the distinct filial language used elsewhere for Jesus.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations within Chalcedonian
    orthodoxy without importing claims beyond the text
- issue: English tense/aspect for ἐδόξασεν
  chosen_reading: has glorified
  alternative_readings:
  - glorified
  rationale: The Greek aorist does not itself require an English perfect, but the
    perfect better conveys the present significance of God's act in exalting Jesus
    while remaining faithful to the source. This is a stylistic translation decision,
    not a doctrinal expansion.
  doctrine_reference: Translation philosophy §6
