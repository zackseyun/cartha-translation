id: ACT.3.13
reference: Acts 3:13
source:
  edition: SBLGNT
  text: ὁ θεὸς Ἀβραὰμ καὶ ⸂Ἰσαὰκ καὶ⸃ Ἰακώβ, ὁ θεὸς τῶν πατέρων ἡμῶν, ἐδόξασεν τὸν
    παῖδα αὐτοῦ Ἰησοῦν, ὃν ὑμεῖς ⸀μὲν παρεδώκατε καὶ ⸀ἠρνήσασθε κατὰ πρόσωπον Πιλάτου,
    κρίναντος ἐκείνου ἀπολύειν·
translation:
  text: The God of Abraham and Isaac and Jacob, the God of our fathers, has glorified
    his servant Jesus, whom you handed over and denied before Pilate, when he had
    decided to release him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his child Jesus." The Greek word παῖς can mean either "child" or "servant";
      here "servant" is preferred because of the likely echo of Isaiah's Servant language.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ θεὸς Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  chosen: The God of Abraham and Isaac and Jacob
  alternatives:
  - The God of Abraham, Isaac, and Jacob
  lexicon: BDAG
  rationale: Retains the biblical covenantal formula echoing Exod 3:6/LXX. The repeated
    'and' reflects the Greek closely; the comma-style alternative is natural English
    but slightly less formally transparent.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: the God of our fathers
  alternatives:
  - the God of our ancestors
  lexicon: BDAG
  rationale: Chooses the more literal and biblically resonant 'fathers' for πατέρων,
    preserving the patriarchal/covenantal register of Peter's speech. 'Ancestors'
    is possible but less textually specific.
- source_word: ἐδόξασεν
  chosen: has glorified
  alternatives:
  - glorified
  - has honored
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect for natural discourse
    in this speech context, highlighting the abiding significance of God's action
    in Jesus' exaltation. 'Glorified' preserves the theological weight of δοξάζω better
    than the flatter 'honored'.
- source_word: τὸν παῖδα αὐτοῦ Ἰησοῦν
  chosen: his servant Jesus
  alternatives:
  - his child Jesus
  - his servant-boy Jesus
  lexicon: BDAG
  rationale: παῖς can mean 'child' or 'servant,' but in this Isaianic and early Christian
    context 'servant' best fits the allusion to the Servant of the Lord and avoids
    an English phrasing that could sound immature or biologically filial. This is
    a significant christological and intertextual choice.
- source_word: παρεδώκατε
  chosen: you handed over
  alternatives:
  - you delivered over
  - you betrayed
  lexicon: BDAG
  rationale: '''Handed over'' is the most natural and sufficiently formal rendering
    of παραδίδωμι here. ''Betrayed'' is too interpretive in this context, since the
    direct object is Jesus before authorities rather than a narrower interpersonal
    betrayal scene.'
- source_word: ἠρνήσασθε
  chosen: denied
  alternatives:
  - disowned
  - rejected
  lexicon: BDAG
  rationale: '''Denied'' is the standard and direct rendering of ἀρνέομαι and preserves
    the verbal link with other NT denial language. ''Disowned'' is possible and vivid,
    but ''denied'' is more transparent and familiar.'
- source_word: κατὰ πρόσωπον Πιλάτου
  chosen: before Pilate
  alternatives:
  - in the presence of Pilate
  - to Pilate's face
  lexicon: BDAG
  rationale: The idiom literally means 'before the face of Pilate.' 'Before Pilate'
    communicates the public, face-to-face setting in idiomatic English without awkwardness.
    A more literal rendering would be less natural.
- source_word: κρίναντος ἐκείνου ἀπολύειν
  chosen: when he had decided to release him
  alternatives:
  - though he had decided to release him
  - after he had decided to release him
  lexicon: BDAG
  rationale: The genitive absolute is rendered temporally as 'when he had decided,'
    which fits the narrative flow and English style. The participle κρίναντος conveys
    a judgment/decision; 'release' is the standard sense of ἀπολύειν here in a judicial
    context.
