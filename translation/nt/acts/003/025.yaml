theological_decisions:
- issue: Representative masculine language in υἱοὶ
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural is retained as 'sons' because it reflects covenantal heir language
    in the source. The broader representative sense can be noted in a footnote rather
    than neutralized in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Abrahamic promise wording in σπέρμα
  chosen_reading: offspring
  alternative_readings:
  - seed
  - descendant
  rationale: The verse echoes Genesis covenant language that can bear both collective
    and messianic significance in Christian interpretation. 'Offspring' preserves
    that theological tension without forcing either a singular messianic reading or
    a purely plural ethnic reading.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
