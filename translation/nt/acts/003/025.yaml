id: ACT.3.25
reference: Acts 3:25
source:
  edition: SBLGNT
  text: ὑμεῖς ἐστε ⸀οἱ υἱοὶ τῶν προφητῶν καὶ τῆς διαθήκης ἧς ⸂διέθετο ὁ θεὸς⸃ πρὸς
    τοὺς πατέρας ⸀ὑμῶν, λέγων πρὸς Ἀβραάμ Καὶ ἐν τῷ σπέρματί σου ⸀ἐνευλογηθήσονται
    πᾶσαι αἱ πατριαὶ τῆς γῆς.
translation:
  text: You are the sons of the prophets and of the covenant that God made with your
    fathers, saying to Abraham, ‘And in your offspring all the families of the earth
    will be blessed.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children'; Greek 'sons,' a covenant-heir expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'seed.' The Greek can refer collectively to Abraham's descendants and,
      in biblical-theological context, can also carry a singular representative sense.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  chosen: sons
  alternatives:
  - children
  - descendants
  lexicon: BDAG
  rationale: A literal rendering of the masculine plural noun meaning 'sons.' In this
    Jewish covenantal context it idiomatically denotes heirs/participants, but the
    translation philosophy prefers gender-accurate rendering where the source is masculine
    and representative. The idiomatic force is clear from context without flattening
    to 'children.'
- source_word: προφητῶν
  chosen: of the prophets
  alternatives:
  - belonging to the prophets
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly. 'Sons of the prophets' here
    means those who stand in the line or inheritance of the prophetic promises, not
    literal biological descent from prophets individually.
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  - arrangement
  lexicon: BDAG
  rationale: In biblical and salvation-historical context, διαθήκη is best rendered
    'covenant,' especially with explicit reference to Abraham and the patriarchs.
    'Testament' would be misleading in modern English.
- source_word: διέθετο
  chosen: made
  alternatives:
  - established
  - covenanted
  lexicon: BDAG
  rationale: The middle of διατίθεμαι with διαθήκη commonly means to make or establish
    a covenant. 'Made' is natural modern English and preserves the sense without unnecessary
    archaism.
- source_word: πρὸς τοὺς πατέρας ὑμῶν
  chosen: with your fathers
  alternatives:
  - to your fathers
  lexicon: BDAG
  rationale: Although πρός often means 'to,' with covenant-making idiom in English
    'with your fathers' best conveys the relational sense of establishing a covenant.
    This is a context-driven smoothing consistent with optimal equivalence.
- source_word: λέγων πρὸς Ἀβραάμ
  chosen: saying to Abraham
  alternatives:
  - when he said to Abraham
  lexicon: BDAG
  rationale: The participle λέγων is rendered as an attendant participial clause introducing
    the covenant quotation. 'Saying to Abraham' is concise and preserves the Greek
    structure.
- source_word: σπέρματί
  chosen: offspring
  alternatives:
  - seed
  - descendant
  lexicon: BDAG
  rationale: '''Offspring'' is the best modern English rendering here: it preserves
    the collective sense of σπέρμα and avoids the archaic feel of ''seed.'' Because
    the Abrahamic promise can carry both collective and singular messianic resonances
    in biblical theology, ''offspring'' preserves that tension better than ''descendant''
    or a purely plural rendering.'
- source_word: ἐνευλογηθήσονται
  chosen: will be blessed
  alternatives:
  - will be blessed in
  - will find blessing
  lexicon: BDAG
  rationale: The future passive is rendered directly. The preceding ἐν is retained
    as 'in your offspring,' so the verb itself need not carry the instrumental nuance.
    This preserves the wording of the promise in clear English.
- source_word: πατριαὶ
  chosen: families
  alternatives:
  - clans
  - tribes
  lexicon: BDAG
  rationale: πατριά refers to family groups or clans. 'Families' is the most natural
    English here and matches common rendering of the Abrahamic promise, while remaining
    broad enough for peoples of the earth.
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: In the quotation of the Abrahamic promise, the universal scope favors
    'earth' rather than 'land.' 'Land' would sound too geographically restricted.
