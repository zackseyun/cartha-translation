id: ACT.3.3
reference: Acts 3:3
source:
  edition: SBLGNT
  text: ὃς ἰδὼν Πέτρον καὶ Ἰωάννην μέλλοντας εἰσιέναι εἰς τὸ ἱερὸν ἠρώτα ἐλεημοσύνην
    ⸀λαβεῖν.
translation:
  text: When he saw Peter and John about to go into the temple, he began asking to
    receive alms.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple precincts or complex, not specifically
      the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: he
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to the lame man in the previous verse.
    In English, beginning the sentence with 'When he saw...' is more natural than
    a bare relative clause, while preserving the referent.
- source_word: ἰδὼν
  chosen: When he saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered temporally here: upon seeing
    Peter and John, he asked. ''When he saw'' is idiomatic English and preserves the
    participial relationship without awkwardness.'
- source_word: Πέτρον καὶ Ἰωάννην
  chosen: Peter and John
  rationale: Standard transliteration of personal names, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: μέλλοντας εἰσιέναι
  chosen: about to go into
  alternatives:
  - intending to enter
  - going to enter
  lexicon: BDAG
  rationale: 'μέλλω with infinitive commonly indicates imminence or intention. Here
    the immediate narrative setting favors imminence: they were on the point of entering
    the temple.'
- source_word: εἰς τὸ ἱερὸν
  chosen: into the temple
  alternatives:
  - into the temple precincts
  - into the temple complex
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary
    (ναός). 'Temple' is acceptable in the main text for readability, but the broader
    precinct sense is worth preserving in a footnote.
- source_word: ἠρώτα
  chosen: he began asking
  alternatives:
  - he asked
  - he was asking
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Began asking' captures
    the inceptive/progressive sense in natural English better than a simple past,
    while fitting the scene of soliciting alms.
- source_word: ἐλεημοσύνην
  chosen: alms
  alternatives:
  - charity
  - a charitable gift
  lexicon: BDAG
  rationale: In this context the word denotes a gift to the poor. 'Alms' is concise
    and standard in this narrative setting, though somewhat traditional; it remains
    widely understandable.
- source_word: λαβεῖν
  chosen: to receive
  alternatives:
  - to get
  - for him to receive
  lexicon: BDAG
  rationale: 'The infinitive expresses the content/purpose of his asking: he was asking
    to receive alms. ''To receive'' is more precise and dignified than ''to get''.'
