id: ACT.3.20
reference: Acts 3:20
source:
  edition: SBLGNT
  text: ὅπως ἂν ἔλθωσιν καιροὶ ἀναψύξεως ἀπὸ προσώπου τοῦ κυρίου καὶ ἀποστείλῃ τὸν
    προκεχειρισμένον ὑμῖν χριστὸν Ἰησοῦν,
translation:
  text: so that times of refreshing may come from the presence of the Lord, and that
    he may send the Messiah appointed for you, Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed to you' or 'previously appointed for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπως ἂν
  chosen: so that
  alternatives:
  - in order that
  - so that perhaps
  lexicon: BDAG
  rationale: Introduces purpose/result in connection with the preceding call to repent.
    The combination with ἄν and subjunctives is naturally rendered as a purpose clause
    in English; 'so that' is idiomatic without overstating uncertainty.
- source_word: ἔλθωσιν
  chosen: may come
  alternatives:
  - might come
  - would come
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅπως ἄν is well represented by 'may come' in
    English, preserving the contingent/purpose nuance.
- source_word: καιροὶ
  chosen: times
  alternatives:
  - seasons
  - appointed times
  lexicon: BDAG
  rationale: καιρός often denotes a season or fitting time. 'Times' is clear modern
    English and broad enough to preserve the sense without over-specifying eschatological
    timing.
- source_word: ἀναψύξεως
  chosen: refreshing
  alternatives:
  - relief
  - reviving
  lexicon: BDAG
  rationale: The noun denotes refreshment, relief, or revival. 'Refreshing' preserves
    the metaphor and traditional sense while remaining accessible. 'Reviving' is possible
    but slightly more interpretive.
- source_word: ἀπὸ προσώπου τοῦ κυρίου
  chosen: from the presence of the Lord
  alternatives:
  - from the face of the Lord
  - from the Lord's presence
  lexicon: BDAG
  rationale: πρόσωπον literally means 'face,' but in this idiom 'presence' best conveys
    the sense in natural English. κύριος is rendered 'Lord' per doctrine defaults.
- source_word: ἀποστείλῃ
  chosen: he may send
  alternatives:
  - he might send
  - he would send
  lexicon: BDAG
  rationale: Aorist subjunctive coordinated with the previous purpose clause. 'He
    may send' preserves the syntax and dependence on the preceding exhortation.
- source_word: προκεχειρισμένον
  chosen: appointed
  alternatives:
  - designated
  - chosen beforehand
  lexicon: BDAG
  rationale: The participle conveys prior appointment or designation. 'Appointed'
    is concise and natural. 'Chosen beforehand' is more explicit but heavier than
    the context requires.
- source_word: ὑμῖν
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative can be rendered 'for you' or 'to you.' 'For you' better captures
    the sense of one appointed on behalf of / for the benefit of Peter's audience
    in context.
- source_word: χριστὸν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used here as a title rather than a name-like element, so 'Messiah' follows
    the doctrine default and preserves the Jewish messianic context.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
