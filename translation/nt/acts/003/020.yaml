theological_decisions:
- issue: Whether χριστὸν should be rendered as a title or retained in traditional
    form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this context χριστός functions as the messianic title attached to
    Jesus, not merely as a fixed name. Rendering it 'Messiah' preserves the title's
    meaning and aligns with the translation philosophy to translate titles while transliterating
    names.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos → Messiah
    (where title; Christ where name-like)'''
- issue: Sense of προκεχειρισμένον ὑμῖν
  chosen_reading: appointed for you
  alternative_readings:
  - appointed to you
  - previously appointed for you
  rationale: The participle includes the notion of prior designation, but English
    style does not require making the temporal prefix explicit in the main text. 'Appointed
    for you' preserves the core meaning without overloading the sentence. The alternative
    with 'previously' is lexically defensible and preserved in a footnote.
