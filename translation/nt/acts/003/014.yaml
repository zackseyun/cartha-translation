theological_decisions:
- issue: Christological force of 'the Holy and Righteous One'
  chosen_reading: Treat as a titular description of Jesus with capitalization
  alternative_readings:
  - Read as merely descriptive adjectives without titular force
  rationale: In context Peter is identifying Jesus with exalted, morally and theologically
    weighty descriptors. Capitalization in English helps convey that these are not
    casual adjectives but a recognized way of referring to Jesus, without importing
    extra doctrinal content beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Judicial nuance of χαρισθῆναι
  chosen_reading: Render literally as 'to be granted to you' in the main text
  alternative_readings:
  - Render contextually as 'to be released to you'
  rationale: The context is the release of Barabbas, but the Greek verb itself is
    broader ('grant as a favor'). Optimal equivalence favors the more text-near rendering
    in the main text while preserving the contextual alternative in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition'
