id: ACT.3.14
reference: Acts 3:14
source:
  edition: SBLGNT
  text: ὑμεῖς δὲ τὸν ἅγιον καὶ δίκαιον ἠρνήσασθε καὶ ᾐτήσασθε ἄνδρα φονέα χαρισθῆναι
    ὑμῖν,
translation:
  text: But you denied the Holy and Righteous One, and asked for a man who was a murderer
    to be granted to you,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'to be released to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δὲ
  chosen: But you
  alternatives:
  - But you yourselves
  - Yet you
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding statement, and the explicit pronoun
    ὑμεῖς adds emphasis. 'But you' preserves both the adversative force and the direct
    accusatory emphasis without sounding overstated.
- source_word: τὸν ἅγιον καὶ δίκαιον
  chosen: the Holy and Righteous One
  alternatives:
  - the holy and righteous one
  - the Holy One and the Righteous One
  lexicon: BDAG
  rationale: The article with paired adjectives functions substantivally as a title
    for Jesus. Capitalizing 'Holy' and 'Righteous' signals titular force in English.
    'One' is supplied naturally to complete the substantival sense.
- source_word: ἠρνήσασθε
  chosen: denied
  alternatives:
  - rejected
  - disowned
  lexicon: BDAG
  rationale: ἀρνέομαι commonly means 'deny' or 'disown.' 'Denied' is the most direct
    and traditional rendering here, matching the forensic and relational force of
    repudiating Jesus.
- source_word: ᾐτήσασθε
  chosen: asked for
  alternatives:
  - requested
  - demanded
  lexicon: BDAG
  rationale: αἰτέω means 'ask' or 'request.' 'Asked for' fits the construction with
    the infinitive χαρισθῆναι and keeps the wording natural while preserving the sense
    of petitioning the authority.
- source_word: ἄνδρα φονέα
  chosen: a man who was a murderer
  alternatives:
  - a murderer
  - a murderous man
  lexicon: BDAG
  rationale: Both ἄνδρα and φονέα are present; rendering only 'a murderer' would lose
    the explicit 'man.' 'A man who was a murderer' preserves both nouns in idiomatic
    English and heightens the contrast with 'the Holy and Righteous One.'
- source_word: χαρισθῆναι ὑμῖν
  chosen: to be granted to you
  alternatives:
  - to be released to you
  - to be given to you
  lexicon: BDAG
  rationale: χαρίζομαι here refers to granting or releasing someone as a favor, in
    the judicial context of Pilate's release of Barabbas. 'Granted to you' is formally
    close to the Greek; the more explicit 'released to you' is interpretive but contextually
    accurate, so it is preserved in a footnote.
