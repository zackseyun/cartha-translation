id: ACT.3.19
reference: Acts 3:19
source:
  edition: SBLGNT
  text: μετανοήσατε οὖν καὶ ἐπιστρέψατε ⸀πρὸς τὸ ἐξαλειφθῆναι ὑμῶν τὰς ἁμαρτίας,
translation:
  text: Therefore repent and turn back, so that your sins may be wiped away,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be blotted out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετανοήσατε
  chosen: repent
  alternatives:
  - change your mind
  - turn from your sins
  lexicon: BDAG
  rationale: Aorist active imperative, calling for decisive repentance. 'Repent' best
    preserves the moral and covenantal force without over-paraphrasing. 'Change your
    mind' is too weak in English; 'turn from your sins' overlaps too much with the
    following ἐπιστρέψατε.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument. 'Therefore' clearly conveys
    the logical connection in natural English.
- source_word: ἐπιστρέψατε
  chosen: turn back
  alternatives:
  - turn
  - return
  - be converted
  lexicon: BDAG
  rationale: Aorist active imperative paired with μετανοήσατε. 'Turn back' preserves
    the directional sense of returning to God without importing the more theologically
    loaded and potentially passive-sounding traditional English 'be converted,' which
    does not match the active form here.
- source_word: πρὸς τὸ ἐξαλειφθῆναι
  chosen: so that ... may be wiped away
  alternatives:
  - for the wiping away of
  - unto the blotting out of
  lexicon: BDAG
  rationale: The preposition with articular infinitive expresses purpose/result. 'So
    that ... may be wiped away' is idiomatic modern English and preserves the intended
    sense better than a wooden infinitival construction.
- source_word: ἐξαλειφθῆναι
  chosen: be wiped away
  alternatives:
  - be blotted out
  - be erased
  lexicon: BDAG
  rationale: Passive infinitive of ἐξαλείφω. 'Wiped away' is accessible modern English
    while retaining the image of removal. 'Blotted out' is traditional and vivid,
    but less natural for many readers; preserved in a footnote as a lexical alternative.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: Standard rendering of ἁμαρτία in the plural. 'Sins' is direct and sufficiently
    broad; 'sinful acts' is interpretive and narrower.
