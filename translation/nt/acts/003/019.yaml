theological_decisions:
- issue: Relationship between repentance/turning and forgiveness
  chosen_reading: 'Render the clause as purpose/result without specifying a doctrinal
    mechanism beyond the text: ''so that your sins may be wiped away.'''
  alternative_readings:
  - 'Render more causally: ''for the wiping away of your sins'''
  - Use traditional 'be converted' language that may suggest a more systematized conversion
    concept
  rationale: The verse presents repentance and turning as the commanded response connected
    to the removal of sins, but it does not itself articulate a full ordo salutis.
    The translation preserves that connection without importing denominational formulations.
  doctrine_reference: Preserve theological tension rather than resolve it.
