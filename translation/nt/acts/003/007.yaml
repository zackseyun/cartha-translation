theological_decisions:
- issue: Nature of the healing description
  chosen_reading: Render the clause as a straightforward report of immediate physical
    strengthening without adding interpretive language about miracle mechanics.
  alternative_readings:
  - Expand to 'were healed'
  - Specify divine agency in the clause itself
  rationale: The verse narrates the event concretely through bodily strengthening.
    The translation preserves the text's wording and leaves the miraculous implication
    to the context rather than importing explanatory theology into the sentence.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
