id: ACT.3.7
reference: Acts 3:7
source:
  edition: SBLGNT
  text: καὶ πιάσας αὐτὸν τῆς δεξιᾶς χειρὸς ἤγειρεν ⸀αὐτόν· παραχρῆμα δὲ ἐστερεώθησαν
    ⸂αἱ βάσεις αὐτοῦ⸃ καὶ τὰ ⸀σφυδρά,
translation:
  text: And taking him by the right hand, he raised him up; and immediately his feet
    and ankles were strengthened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ankle bones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιάσας
  chosen: taking
  alternatives:
  - grasping
  - seizing
  - taking hold of
  lexicon: BDAG
  rationale: Aorist participle indicating the manner preceding the main verb. 'Taking'
    is natural modern English and fits the benevolent action here better than the
    harsher 'seizing,' while still reflecting physical contact.
- source_word: τῆς δεξιᾶς χειρός
  chosen: by the right hand
  alternatives:
  - of the right hand
  - his right hand
  lexicon: BDAG
  rationale: The genitive construction after πιάσας is idiomatically rendered in English
    as 'by the right hand.' The possessive 'his' is not explicit for 'right hand'
    in Greek, so it is left implicit.
- source_word: ἤγειρεν αὐτόν
  chosen: he raised him up
  alternatives:
  - he lifted him up
  - he helped him up
  lexicon: BDAG
  rationale: ἐγείρω commonly means 'raise up.' In this healing context, 'raised him
    up' preserves both the physical action and the slightly elevated register of the
    narrative better than the more colloquial 'helped him up.'
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb marks the suddenness of the healing. 'Immediately' is clear,
    idiomatic, and suitably direct.
- source_word: ἐστερεώθησαν
  chosen: were strengthened
  alternatives:
  - were made strong
  - became firm
  lexicon: BDAG
  rationale: Passive verb indicating that strength was imparted to the man's lower
    limbs. 'Were strengthened' is a natural English passive and preserves the resultative
    sense without overinterpreting the agent in the clause.
- source_word: αἱ βάσεις αὐτοῦ
  chosen: his feet
  alternatives:
  - the soles of his feet
  - his foot-bases
  lexicon: BDAG
  rationale: βάσεις literally refers to bases or feet as the supporting parts used
    for standing. In this bodily context, 'his feet' is the most natural and accurate
    English rendering; 'soles' is too anatomically narrow and 'bases' is unnatural.
- source_word: τὰ σφυδρά
  chosen: ankles
  alternatives:
  - ankle bones
  lexicon: BDAG
  rationale: The term refers to the ankle area/joints. 'Ankles' is idiomatic and sufficiently
    precise; 'ankle bones' is possible but more specific than the Greek requires.
