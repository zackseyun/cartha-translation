theological_decisions:
- issue: Prophetic reference to the present salvation-historical moment
  chosen_reading: these days
  alternative_readings:
  - these times
  rationale: The phrase likely refers to the days of fulfillment associated with the
    Messiah and the events Peter is proclaiming. The translation preserves the temporal
    wording of the Greek rather than making the eschatological implication more explicit
    than the text itself does.
  doctrine_reference: Preserve theological tension rather than resolve it.
