id: ACT.3.24
reference: Acts 3:24
source:
  edition: SBLGNT
  text: καὶ πάντες δὲ οἱ προφῆται ἀπὸ Σαμουὴλ καὶ τῶν καθεξῆς ὅσοι ἐλάλησαν καὶ κατήγγειλαν
    τὰς ἡμέρας ταύτας.
translation:
  text: And indeed, all the prophets from Samuel and those after him, as many as spoke,
    also announced these days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those in succession' or 'those who followed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'proclaimed' or, more interpretively, 'foretold.'
    reason: lexical_alternative
  - marker: c
    text: Or 'these times.' The phrase refers to the present period of fulfillment
      in Peter's speech.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες δὲ οἱ προφῆται
  chosen: indeed, all the prophets
  alternatives:
  - and all the prophets
  - now all the prophets
  lexicon: BDAG
  rationale: δέ here is mildly connective/emphatic rather than strongly adversative.
    Rendering with 'indeed' preserves the discourse force without overstating contrast,
    while 'all the prophets' straightforwardly reflects πάντες οἱ προφῆται.
- source_word: ἀπὸ Σαμουὴλ
  chosen: from Samuel
  alternatives:
  - beginning with Samuel
  - starting from Samuel
  lexicon: BDAG
  rationale: ἀπό with a personal name marks the starting point in a sequence. 'From
    Samuel' is concise and natural, while still allowing the implied sense of beginning
    with him.
- source_word: τῶν καθεξῆς
  chosen: those after him
  alternatives:
  - those in succession
  - those who followed
  lexicon: BDAG
  rationale: καθεξῆς denotes sequence or succession. Because the article makes the
    phrase substantival, 'those after him' gives clear English sense tied to the preceding
    Samuel.
- source_word: ὅσοι ἐλάλησαν
  chosen: as many as spoke
  alternatives:
  - whoever spoke
  - all who spoke
  lexicon: BDAG
  rationale: ὅσοι has a quantitative force, 'as many as,' and ἐλάλησαν is the simple
    aorist 'spoke.' This preserves the inclusive scope of the statement.
- source_word: καὶ κατήγγειλαν
  chosen: also announced
  alternatives:
  - and proclaimed
  - and foretold
  lexicon: BDAG
  rationale: καταγγέλλω commonly means to proclaim or announce publicly. 'Announced'
    fits the prophetic context well; 'also' reflects the coordinating καί linking
    speaking and announcing. 'Foretold' is possible contextually but slightly more
    interpretive than the Greek verb itself.
- source_word: τὰς ἡμέρας ταύτας
  chosen: these days
  alternatives:
  - these times
  lexicon: BDAG
  rationale: The phrase is idiomatic for the present eschatological period under discussion.
    'These days' is the most direct rendering; 'these times' is possible but less
    literal.
