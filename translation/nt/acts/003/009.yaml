id: ACT.3.9
reference: Acts 3:9
source:
  edition: SBLGNT
  text: καὶ εἶδεν ⸂πᾶς ὁ λαὸς αὐτὸν⸃ περιπατοῦντα καὶ αἰνοῦντα τὸν θεόν,
translation:
  text: And all the people saw him walking and praising God,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; simple coordination best fits the narrative flow
    without adding temporal force beyond the Greek.
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - looked at
  - observed
  lexicon: BDAG
  rationale: Aorist of ὁράω here reports the crowd's perception of the healed man.
    'Saw' is the natural English equivalent and preserves the straightforward narrative
    sense.
- source_word: πᾶς ὁ λαὸς
  chosen: all the people
  alternatives:
  - the whole people
  - all the crowd
  lexicon: BDAG
  rationale: πᾶς with the singular noun and article has a collective sense, 'all the
    people.' 'People' is preferable to 'crowd' because λαός commonly denotes the people
    as a body, not merely a gathered mass.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to the healed man from the preceding
    context.
- source_word: περιπατοῦντα
  chosen: walking
  alternatives:
  - going about
  - walking around
  lexicon: BDAG
  rationale: Present participle describing the visible state/action of the man. 'Walking'
    is the plain and contextually important rendering, highlighting the healing.
- source_word: καὶ αἰνοῦντα
  chosen: and praising
  alternatives:
  - and giving praise to
  lexicon: BDAG
  rationale: αἰνέω means to praise, especially in worshipful acknowledgment. 'Praising'
    is concise and idiomatic in English.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Definite object of praise; English normally omits the article with 'God'
    in this construction.
