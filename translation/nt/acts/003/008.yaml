id: ACT.3.8
reference: Acts 3:8
source:
  edition: SBLGNT
  text: καὶ ἐξαλλόμενος ἔστη καὶ περιεπάτει, καὶ εἰσῆλθεν σὺν αὐτοῖς εἰς τὸ ἱερὸν
    περιπατῶν καὶ ἁλλόμενος καὶ αἰνῶν τὸν θεόν.
translation:
  text: And leaping up, he stood and began to walk, and he entered the temple with
    them, walking and jumping and praising God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more precisely, 'the temple precincts' or 'the temple courts'; the Greek
      ἱερόν refers to the temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαλλόμενος
  chosen: leaping up
  alternatives:
  - springing up
  - jumping up
  lexicon: BDAG
  rationale: The participle depicts an energetic upward movement at the moment of
    healing. 'Leaping up' is vivid and natural English, and the added 'up' reflects
    the force of the compound verb.
- source_word: ἔστη
  chosen: he stood
  alternatives:
  - he stood up
  - he came to his feet
  lexicon: BDAG
  rationale: 'Aorist of ἵστημι here marks the immediate result of the healing: he
    stood. ''He stood'' is concise and preserves the narrative sequence.'
- source_word: περιεπάτει
  chosen: began to walk
  alternatives:
  - was walking
  - walked
  lexicon: BDAG
  rationale: 'The imperfect likely has an inceptive nuance in this healing context:
    after standing, he started walking. ''Began to walk'' communicates the onset of
    restored ability more clearly than a simple past.'
- source_word: εἰσῆλθεν
  chosen: he entered
  alternatives:
  - he went in
  lexicon: BDAG
  rationale: Aorist narrative main verb; 'entered' is slightly more formal and fits
    the movement into the temple precincts.
- source_word: σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - together with them
  lexicon: BDAG
  rationale: Simple accompaniment is intended, referring to Peter and John. 'With
    them' is idiomatic and sufficient.
- source_word: τὸ ἱερὸν
  chosen: the temple
  alternatives:
  - the temple courts
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'The
    temple' is the standard readable rendering; the more precise sense can be preserved
    in a footnote.
- source_word: περιπατῶν
  chosen: walking
  alternatives:
  - going about
  lexicon: BDAG
  rationale: Present participle expresses accompanying action as he entered. 'Walking'
    keeps the repeated emphasis on his restored mobility.
- source_word: ἁλλόμενος
  chosen: jumping
  alternatives:
  - leaping
  - bounding
  lexicon: BDAG
  rationale: This participle echoes the exuberant movement already described. Using
    'jumping' here avoids awkward repetition of 'leaping' while preserving the sense
    of joyful physical motion.
- source_word: αἰνῶν
  chosen: praising
  alternatives:
  - giving praise to
  lexicon: BDAG
  rationale: The participle denotes verbal or public praise directed toward God. 'Praising'
    is direct and idiomatic.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Definite object of praise; standard rendering is appropriate.
