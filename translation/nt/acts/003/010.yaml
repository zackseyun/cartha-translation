id: ACT.3.10
reference: Acts 3:10
source:
  edition: SBLGNT
  text: ἐπεγίνωσκον ⸀δὲ αὐτὸν ὅτι ⸀οὗτος ἦν ὁ πρὸς τὴν ἐλεημοσύνην καθήμενος ἐπὶ τῇ
    Ὡραίᾳ Πύλῃ τοῦ ἱεροῦ, καὶ ἐπλήσθησαν θάμβους καὶ ἐκστάσεως ἐπὶ τῷ συμβεβηκότι
    αὐτῷ.
translation:
  text: And they recognized him, that this was the man who used to sit for alms at
    the Beautiful Gate of the temple, and they were filled with amazement and astonishment
    at what had happened to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the one sitting for alms.' The translation 'used to
      sit for alms' brings out the descriptive, customary sense in context.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex generally, not specifically the
      inner sanctuary (ναός).
    reason: cultural_note
lexical_decisions:
- source_word: ἐπεγίνωσκον
  chosen: recognized
  alternatives:
  - were recognizing
  - knew
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing/repeated recognition by the crowd;
    'recognized' is idiomatic English in narrative and captures identification better
    than the more wooden 'were recognizing.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural English and preserves the flow without overstating contrast.
- source_word: οὗτος ἦν
  chosen: this was
  alternatives:
  - he was
  - this is the one who was
  lexicon: BDAG
  rationale: The demonstrative plus imperfect of 'to be' points emphatically to the
    healed man as the same known beggar. 'This was' preserves that deictic force.
- source_word: ὁ πρὸς τὴν ἐλεημοσύνην καθήμενος
  chosen: the man who used to sit for alms
  alternatives:
  - the one sitting for alms
  - the man sitting to receive alms
  - the beggar seated for charitable gifts
  lexicon: BDAG
  rationale: The article with participle forms a substantive expression describing
    his customary role. 'Used to sit' brings out the imperfective/background sense
    in context, and 'for alms' is the most natural rendering of ἐλεημοσύνη here.
- source_word: ἐλεημοσύνην
  chosen: alms
  alternatives:
  - charity
  - charitable gifts
  lexicon: BDAG
  rationale: '''Alms'' is the established and precise term for money or gifts given
    to the poor; ''charity'' is broader and less concrete.'
- source_word: ἐπὶ τῇ Ὡραίᾳ Πύλῃ
  chosen: at the Beautiful Gate
  alternatives:
  - at the gate called Beautiful
  - at the Beautiful gate
  lexicon: BDAG
  rationale: Ὡραίᾳ functions as the gate's designation. Capitalizing 'Beautiful Gate'
    treats it as a recognized name in context.
- source_word: τοῦ ἱεροῦ
  chosen: of the temple
  alternatives:
  - of the temple complex
  - of the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary specifically,
    but 'temple' is the standard readable rendering in English; the broader sense
    is not crucial enough here to require expansion in the main text.
- source_word: ἐπλήσθησαν
  chosen: they were filled
  alternatives:
  - they became full
  - they were overcome
  lexicon: BDAG
  rationale: Passive of πίμπλημι commonly takes an emotion or state with the genitive.
    'Were filled' is both accurate and idiomatic.
- source_word: θάμβους
  chosen: amazement
  alternatives:
  - wonder
  - astonishment
  lexicon: BDAG
  rationale: θάμβος denotes stunned wonder or amazement. 'Amazement' pairs well with
    the following term while preserving a distinction.
- source_word: ἐκστάσεως
  chosen: astonishment
  alternatives:
  - bewilderment
  - ecstasy
  lexicon: BDAG
  rationale: In this context ἔκστασις refers to a state of astonishment or being beside
    oneself, not mystical ecstasy. 'Astonishment' is clear and natural.
- source_word: ἐπὶ τῷ συμβεβηκότι αὐτῷ
  chosen: at what had happened to him
  alternatives:
  - because of what had happened to him
  - over what had happened to him
  lexicon: BDAG
  rationale: The perfect participle of συμβαίνω denotes the event that had occurred
    to him with continuing relevance. 'At what had happened to him' is idiomatic after
    'filled with amazement and astonishment.'
