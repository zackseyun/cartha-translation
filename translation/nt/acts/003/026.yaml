id: ACT.3.26
reference: Acts 3:26
source:
  edition: SBLGNT
  text: ὑμῖν πρῶτον ⸂ἀναστήσας ὁ θεὸς⸃ τὸν παῖδα ⸀αὐτοῦ ἀπέστειλεν αὐτὸν εὐλογοῦντα
    ὑμᾶς ἐν τῷ ἀποστρέφειν ἕκαστον ἀπὸ τῶν πονηριῶν ὑμῶν.
translation:
  text: To you first, God, having raised up his servant, sent him to bless you by
    turning each of you from your wicked ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having raised up' may mean 'having brought forth/appointed' his servant,
      not specifically 'having raised him from the dead.'
    reason: alternative_reading
  - marker: b
    text: Or 'his child'; Greek παῖς can mean 'servant' or 'child,' though 'servant'
      likely reflects the Isaiah Servant background here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμῖν πρῶτον
  chosen: To you first
  alternatives:
  - For you first
  - To you in the first place
  lexicon: BDAG
  rationale: 'Dative ὑμῖν with πρῶτον is naturally rendered as priority directed toward
    Peter''s Jewish audience: the blessing is sent ''to you first.'' This preserves
    both the indirect-object force and the salvation-historical priority.'
- source_word: ἀναστήσας
  chosen: having raised up
  alternatives:
  - having appointed
  - having caused to arise
  lexicon: BDAG
  rationale: In Acts this verb can mean either 'raise up' in the sense of bringing
    forth/appointing a deliverer or 'raise' in the resurrection sense. Given the immediate
    christological context and common Christian hearing, 'having raised up' preserves
    the Greek wording while allowing the ambiguity to stand. The alternative sense
    is preserved in a footnote rather than resolved away.
- source_word: τὸν παῖδα αὐτοῦ
  chosen: his servant
  alternatives:
  - his child
  - his son
  lexicon: BDAG
  rationale: παῖς in Lukan usage, especially in speeches echoing Isaiah's Servant
    language, is best rendered 'servant.' 'Child' is lexically possible but would
    obscure the likely servant-messianic background; 'son' is too interpretive here
    and would import a different Greek term.
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - commissioned
  - dispatched
  lexicon: BDAG
  rationale: A straightforward rendering that preserves the missional force without
    over-specifying formal commissioning language.
- source_word: εὐλογοῦντα ὑμᾶς
  chosen: to bless you
  alternatives:
  - blessing you
  lexicon: BDAG
  rationale: 'The participle is rendered in idiomatic English as expressing purpose/result
    attendant to the sending: God sent him ''to bless you.'' This is smoother than
    a wooden participial construction while preserving the sense.'
- source_word: ἐν τῷ ἀποστρέφειν
  chosen: by turning
  alternatives:
  - in turning
  - when turning
  lexicon: BDAG
  rationale: The articular infinitive with ἐν here expresses means or closely related
    circumstance. 'By turning' best captures how the blessing is effected.
- source_word: ἕκαστον
  chosen: each of you
  alternatives:
  - each one
  - every one
  lexicon: BDAG
  rationale: This brings out the distributive force in natural English and makes explicit
    that the reference is to the audience addressed by ὑμᾶς.
- source_word: ἀπὸ τῶν πονηριῶν ὑμῶν
  chosen: from your wicked ways
  alternatives:
  - from your evil deeds
  - from your wickednesses
  lexicon: BDAG
  rationale: The plural πονηρίαι denotes concrete expressions of evil. 'Wicked ways'
    is idiomatic and morally weighty; 'wickednesses' is overly wooden in English,
    while 'evil deeds' is possible but narrower than the broader behavioral sense.
