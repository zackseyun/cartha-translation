theological_decisions:
- issue: Sense of ἀναστήσας in relation to Jesus
  chosen_reading: Retain 'having raised up' in the main text without specifying whether
    this refers to resurrection or to God raising up/bringing forth his servant.
  alternative_readings:
  - having raised from the dead
  - having raised up in the sense of appointing/bringing forth
  rationale: The Greek permits a hearing connected with resurrection, but in this
    speech it also echoes the promise of God 'raising up' a prophet/servant. Following
    the translation philosophy, the rendering preserves the theological tension rather
    than collapsing it into one interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
- issue: Christological nuance of παῖς
  chosen_reading: Render παῖς as 'servant'
  alternative_readings:
  - child
  - son
  rationale: This best preserves the Isaianic Servant background and avoids importing
    a more explicit filial claim than the Greek term itself states in this verse,
    while remaining fully compatible with orthodox Christology.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
