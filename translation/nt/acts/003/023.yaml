theological_decisions:
- issue: Nature of the threatened judgment in Peter's citation/allusion to Deut 18:19
  chosen_reading: Render the warning in terms of destruction/removal without specifying
    whether the judgment is temporal, covenantal, or eschatological.
  alternative_readings:
  - excommunication from the covenant community
  - final divine judgment
  rationale: The verse clearly announces severe divine judgment for refusing the prophet,
    but the text itself does not fully define the mode or timing of that judgment.
    The translation therefore preserves the severity of ἐξολεθρευθήσεται and the communal
    phrase ἐκ τοῦ λαοῦ without narrowing the warning to one theological system or
    outcome.
  doctrine_reference: Preserve theological tension rather than resolve it.
