id: ACT.3.23
reference: Acts 3:23
source:
  edition: SBLGNT
  text: ἔσται δὲ πᾶσα ψυχὴ ἥτις ⸀ἂν μὴ ἀκούσῃ τοῦ προφήτου ἐκείνου ἐξολεθρευθήσεται
    ἐκ τοῦ λαοῦ.
translation:
  text: And every person who does not listen to that prophet will be utterly destroyed
    from among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be cut off from among the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ψυχὴ
  chosen: every person
  alternatives:
  - every soul
  - everyone
  lexicon: BDAG
  rationale: Literally 'every soul,' but in this idiom ψυχή refers to an individual
    person. 'Every person' communicates the sense in clear modern English without
    importing a dualistic anthropology. 'Every soul' is possible but sounds less natural
    in contemporary English and may suggest a narrower theological meaning than intended
    here.
- source_word: ἥτις ἂν μὴ ἀκούσῃ
  chosen: who does not listen
  alternatives:
  - whoever does not hear
  - who does not heed
  lexicon: BDAG
  rationale: 'The construction ἥτις ἂν with the aorist subjunctive expresses an indefinite
    relative clause: ''whoever/anyone who does not.'' ἀκούω can mean hear, listen
    to, or heed. ''Listen'' best captures the covenantal sense of responsive hearing
    in this citation context, while remaining natural English.'
- source_word: τοῦ προφήτου ἐκείνου
  chosen: that prophet
  alternatives:
  - that Prophet
  lexicon: BDAG
  rationale: The phrase points back to the prophet like Moses in the preceding citation.
    Lowercase 'prophet' is retained because the Greek is not itself a formal title
    here, though the referent is specific and messianically significant. Capitalization
    is an interpretive convention in English rather than a feature of the Greek text.
- source_word: ἐξολεθρευθήσεται
  chosen: will be utterly destroyed
  alternatives:
  - will be destroyed
  - will be cut off
  - will be exterminated
  lexicon: BDAG
  rationale: The future passive of ἐξολεθρεύω is stronger than a simple 'destroy';
    it conveys complete removal/destruction. 'Utterly destroyed' preserves that force
    in readable English. 'Cut off' reflects the Deuteronomy/LXX background and is
    worth preserving in a footnote, but here the Greek verb used in Acts is more explicitly
    destructive than a mere idiom of exclusion.
- source_word: ἐκ τοῦ λαοῦ
  chosen: from among the people
  alternatives:
  - from the people
  - from among his people
  lexicon: BDAG
  rationale: ἐκ with λαός indicates removal from within the covenant people. 'From
    among the people' is idiomatic and preserves the sense of exclusion/removal from
    the community. 'His people' would echo some OT formulations, but the possessive
    is not present in the Greek here.
