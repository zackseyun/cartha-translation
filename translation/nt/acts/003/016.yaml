theological_decisions:
- issue: Meaning of 'faith in/through his name' and agency of healing
  chosen_reading: The verse attributes the man's strengthening to Jesus' name, with
    faith related to that name and mediated through Jesus, without specifying more
    narrowly whose faith is in view.
  alternative_readings:
  - the healed man's faith in Jesus' name
  - the apostles' faith in Jesus' name
  - faith generated by Jesus
  rationale: The Greek emphasizes the efficacy of Jesus' name and mentions faith both
    'in his name' and 'through him,' but does not explicitly identify the human subject
    of that faith in this verse. The translation preserves that tension rather than
    resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Metonymic force of 'name'
  chosen_reading: '''His name'' is retained in the main text as a metonym for Jesus''
    person and authority.'
  alternative_readings:
  - Jesus himself has made this man strong
  - the power of his name has made this man strong
  rationale: Acts frequently uses 'name' in a theologically charged way. Retaining
    the expression avoids flattening Luke's wording while still being intelligible
    in English.
revisions:
- timestamp: '2026-04-21T02:33:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/003/016.json
  category: awkward_english
  tier: 1
  from: his name has made strong
  to: his name itself has made strong
  rationale: The Greek clause structure is complex (Adv-O-V-S), and the repetition
    of 'name' (`τοῦ ὀνόματος αὐτοῦ`...`τὸ ὄνομα αὐτοῦ`) is emphatic. The draft's rendering,
    'on the basis of faith in his name, his name has made strong...', is faithful
    but slightly clunky in English. Adding 'itself' after the second 'his name' preserves
    the emphatic repetition while making it sound more deliberate and rhetorical in
    English, improving the flow without altering the meaning.
