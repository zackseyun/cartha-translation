id: ACT.3.16
reference: Acts 3:16
source:
  edition: SBLGNT
  text: καὶ ⸀ἐπὶ τῇ πίστει τοῦ ὀνόματος αὐτοῦ τοῦτον ὃν θεωρεῖτε καὶ οἴδατε ἐστερέωσεν
    τὸ ὄνομα αὐτοῦ, καὶ ἡ πίστις ἡ δι’ αὐτοῦ ἔδωκεν αὐτῷ τὴν ὁλοκληρίαν ταύτην ἀπέναντι
    πάντων ὑμῶν.
translation:
  text: And on the basis of faith in his name, his name itself has made strong this
    man whom you see and know; and the faith that is through him has given him this
    wholeness in the presence of all of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust in his name.' The Greek word pistis can mean 'faith,' 'trust,'
      or in some contexts 'faithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'complete soundness' or 'perfect health.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his name has made strong'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπὶ τῇ πίστει
  chosen: on the basis of faith
  alternatives:
  - by faith
  - through faith
  lexicon: BDAG
  rationale: ἐπί with the dative can express basis or ground. 'On the basis of faith'
    preserves the causal/foundational sense more explicitly than a simple instrumental
    'by faith,' while remaining natural English.
- source_word: πίστει
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the sense is reliance/trust directed toward Jesus' name, not primarily 'faithfulness.'
    An alternative is preserved in a footnote because πίστις is a contested term in
    the project guidelines.
- source_word: τοῦ ὀνόματος αὐτοῦ
  chosen: in his name
  alternatives:
  - of his name
  - for his name
  lexicon: BDAG
  rationale: The genitive construction with πίστις is idiomatically expressed in English
    as 'faith in his name.' In Acts, 'name' often stands metonymically for the person
    and authority of Jesus, so 'in his name' communicates the intended sense better
    than a wooden 'of his name.'
- source_word: ἐστερέωσεν
  chosen: has made strong
  alternatives:
  - has strengthened
  - has made firm
  lexicon: BDAG
  rationale: The verb denotes making firm or strong. 'Has made strong' preserves the
    concrete result in the healed man's body and echoes the visible restoration described
    in context.
- source_word: θεωρεῖτε καὶ οἴδατε
  chosen: whom you see and know
  alternatives:
  - whom you are looking at and know
  - whom you observe and recognize
  lexicon: BDAG
  rationale: The pair emphasizes direct public knowledge of the man. 'See and know'
    is clear, concise, and preserves both visual recognition and personal familiarity.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  lexicon: BDAG
  rationale: Retaining 'his name' reflects the Greek subject and preserves Luke's
    emphasis on Jesus' name as the effective agent, without over-paraphrasing to 'Jesus
    himself' in the main text.
- source_word: ἡ πίστις ἡ δι’ αὐτοῦ
  chosen: the faith that is through him
  alternatives:
  - the faith through him
  - the trust that comes through him
  lexicon: BDAG
  rationale: The article plus prepositional phrase is rendered with a relative clause
    for clarity. 'Through him' is left slightly open, preserving the Greek's compactness
    and the interpretive question whether this points to faith mediated by Jesus or
    faith directed through his agency.
- source_word: ἔδωκεν αὐτῷ
  chosen: has given him
  alternatives:
  - gave him
  lexicon: BDAG
  rationale: English present perfect fits the discourse well by highlighting the present
    visible result of the completed healing, though the Greek aorist is simple past.
    This is an optimal-equivalence choice for natural English in context.
- source_word: ὁλοκληρίαν
  chosen: wholeness
  alternatives:
  - complete soundness
  - perfect health
  lexicon: BDAG
  rationale: The noun denotes soundness, completeness, or full health. 'Wholeness'
    captures both physical restoration and the idea of completeness without sounding
    overly clinical; a more literal alternative is preserved in a footnote.
- source_word: ἀπέναντι πάντων ὑμῶν
  chosen: in the presence of all of you
  alternatives:
  - before all of you
  - in front of all of you
  lexicon: BDAG
  rationale: This phrase stresses the public, undeniable nature of the healing. 'In
    the presence of all of you' is natural English and preserves the evidentiary force.
