theological_decisions:
- issue: Historical tension with Genesis burial-purchase accounts
  chosen_reading: 'Retain Stephen''s wording as given: Abraham bought the tomb from
    the sons of Hamor in Shechem.'
  alternative_readings:
  - Harmonize to Jacob's purchase in Genesis 33:19
  - Harmonize to Abraham's purchase at Machpelah in Genesis 23
  rationale: The translation should represent the Greek text as it stands rather than
    importing a harmonization from related Old Testament passages. Because the verse
    is historically discussed and potentially confusing to readers, the alternatives
    are preserved in a footnote rather than resolved in the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
