id: ACT.7.16
reference: Acts 7:16
source:
  edition: SBLGNT
  text: καὶ μετετέθησαν εἰς Συχὲμ καὶ ἐτέθησαν ἐν τῷ μνήματι ⸀ᾧ ὠνήσατο Ἀβραὰμ τιμῆς
    ἀργυρίου παρὰ τῶν υἱῶν Ἑμμὼρ ⸀ἐν Συχέμ.
translation:
  text: and they were carried over to Shechem and laid in the tomb that Abraham had
    bought for a price of silver from the sons of Hamor in Shechem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Stephen's wording combines details that readers may compare with Genesis
      23, where Abraham buys a burial site from Ephron at Machpelah, and Genesis 33:19,
      where Jacob buys land near Shechem from the sons of Hamor.
    reason: cross_reference
lexical_decisions:
- source_word: μετετέθησαν
  chosen: were carried over
  alternatives:
  - were transferred
  - were moved
  lexicon: BDAG
  rationale: Aorist passive of μετατίθημι here refers to the relocation of the patriarchs'
    remains. 'Carried over' is natural English that still preserves the sense of transfer
    from one place to another.
- source_word: Συχὲμ / Συχέμ
  chosen: Shechem
  alternatives:
  - Sychem
  rationale: Standard English transliteration of the place name.
- source_word: ἐτέθησαν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: Aorist passive of τίθημι in burial context is idiomatically rendered
    'laid,' which fits English funerary usage better than the more wooden 'put' while
    remaining close to the Greek.
- source_word: μνήματι
  chosen: tomb
  alternatives:
  - grave
  - memorial tomb
  lexicon: BDAG
  rationale: μνῆμα denotes a burial place or tomb. 'Tomb' best matches the likely
    sense here.
- source_word: ᾧ
  chosen: that
  alternatives:
  - which
  - where
  lexicon: BDAG
  rationale: The relative pronoun is dative singular neuter agreeing with μνήματι.
    In English, 'that' smoothly introduces the relative clause modifying 'tomb.'
- source_word: ὠνήσατο
  chosen: had bought
  alternatives:
  - purchased
  - acquired
  lexicon: BDAG
  rationale: The verb means 'buy/purchase.' 'Had bought' is idiomatic in English for
    a prior action relative to the burial event narrated.
- source_word: τιμῆς ἀργυρίου
  chosen: for a price of silver
  alternatives:
  - for silver
  - for a sum of money
  lexicon: BDAG
  rationale: The genitive construction literally expresses a price consisting of silver.
    'For a price of silver' preserves the wording without over-paraphrasing.
- source_word: παρὰ τῶν υἱῶν Ἑμμὼρ
  chosen: from the sons of Hamor
  alternatives:
  - from Hamor's sons
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, 'from.' 'Sons of Hamor' is a
    transparent rendering of the Greek phrase.
- source_word: ἐν Συχέμ
  chosen: in Shechem
  alternatives:
  - at Shechem
  rationale: The final prepositional phrase most naturally modifies Hamor ('Hamor
    in Shechem') or the transaction location. Rendering it straightforwardly as 'in
    Shechem' preserves the Greek wording without forcing a resolution beyond the text.
