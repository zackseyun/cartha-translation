id: ACT.7.52
reference: Acts 7:52
source:
  edition: SBLGNT
  text: τίνα τῶν προφητῶν οὐκ ἐδίωξαν οἱ πατέρες ὑμῶν; καὶ ἀπέκτειναν τοὺς προκαταγγείλαντας
    περὶ τῆς ἐλεύσεως τοῦ δικαίου οὗ νῦν ὑμεῖς προδόται καὶ φονεῖς ⸀ἐγένεσθε,
translation:
  text: Which of the prophets did your fathers not persecute? They even killed those
    who announced beforehand the coming of the Righteous One, of whom you have now
    become betrayers and murderers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Just One.'
    reason: lexical_alternative
  - marker: b
    text: Or 'traitors and murderers.'
    reason: lexical_alternative
  - marker: c
    text: '''Your fathers'' could also be rendered ''your ancestors,'' but the Greek
      more literally says ''fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνα τῶν προφητῶν
  chosen: Which of the prophets
  alternatives:
  - Which prophet
  lexicon: BDAG
  rationale: The partitive construction with τίνα + genitive plural is best rendered
    idiomatically as 'Which of the prophets,' preserving the rhetorical force that
    no prophet escaped persecution.
- source_word: ἐδίωξαν
  chosen: did ... persecute
  alternatives:
  - did ... pursue
  - did ... harass
  lexicon: BDAG
  rationale: In this context διώκω refers to hostile pursuit/oppression of prophets,
    so 'persecute' best captures the established sense in biblical usage.
- source_word: οἱ πατέρες ὑμῶν
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: BDAG
  rationale: A formally closer rendering preserves Stephen's accusatory continuity
    with Israel's forefathers. 'Ancestors' is possible, but 'fathers' better reflects
    the Greek and the speech's rhetoric.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: '''Killed'' is clear modern English and accurately renders the aorist
    active without unnecessary archaism.'
- source_word: τοὺς προκαταγγείλαντας
  chosen: those who announced beforehand
  alternatives:
  - those who foretold
  - those who proclaimed in advance
  lexicon: BDAG
  rationale: The participle denotes prior proclamation. 'Announced beforehand' preserves
    both the verbal aspect of proclamation and the temporal prefix προ-.
- source_word: περὶ τῆς ἐλεύσεως
  chosen: the coming of
  alternatives:
  - about the coming of
  - concerning the coming of
  - the arrival of
  lexicon: BDAG
  rationale: With προκαταγγέλλω, the phrase naturally means announcing beforehand
    the coming. 'Coming' is the most idiomatic and theologically familiar rendering
    for ἔλευσις here.
- source_word: τοῦ δικαίου
  chosen: the Righteous One
  alternatives:
  - the Just One
  - the righteous one
  lexicon: BDAG
  rationale: The articular singular functions as a messianic/title-like designation
    for Jesus in Acts. Capitalization signals titular use without adding content beyond
    the Greek.
- source_word: οὗ
  chosen: of whom
  alternatives:
  - whose
  lexicon: BDAG
  rationale: The genitive relative pronoun links 'the Righteous One' to the predicate
    nouns 'betrayers and murderers.' 'Of whom' is the most direct rendering of the
    genitive construction.
- source_word: νῦν
  chosen: now
  alternatives:
  - at this time
  lexicon: BDAG
  rationale: '''Now'' preserves the temporal contrast between the fathers'' actions
    and the hearers'' present culpability.'
- source_word: προδόται
  chosen: betrayers
  alternatives:
  - traitors
  lexicon: BDAG
  rationale: '''Betrayers'' closely matches the personal act of handing over Jesus
    and avoids importing broader political overtones that ''traitors'' can carry.'
- source_word: φονεῖς
  chosen: murderers
  alternatives:
  - killers
  lexicon: BDAG
  rationale: Given the judicial-moral accusation, 'murderers' better conveys culpable
    unlawful killing than the more generic 'killers.'
- source_word: ἐγένεσθε
  chosen: have now become
  alternatives:
  - became
  - have become
  lexicon: BDAG
  rationale: The aorist middle here can be rendered ingressively ('became'), but 'have
    now become' brings out the resultant state in idiomatic English while retaining
    νῦν.
