theological_decisions:
- issue: Rendering τοῦ δικαίου as a christological designation
  chosen_reading: the Righteous One
  alternative_readings:
  - the Just One
  rationale: In Stephen's speech this refers to Jesus as the one whose coming was
    foretold by the prophets. 'Righteous One' is transparent modern English and preserves
    the title-like force without relying on archaic diction.
  doctrine_reference: Affirmations; Translation philosophy §§2, 6
- issue: Capitalization of 'Righteous One'
  chosen_reading: capitalized as a title
  alternative_readings:
  - lowercase 'righteous one'
  rationale: The context identifies a specific, recognized figure—Jesus—rather than
    a merely descriptive adjective. Capitalization helps English readers perceive
    the titular force present in the articular construction.
  doctrine_reference: Translation philosophy §§2, 6
