theological_decisions:
- issue: Idolatry language and rhetorical force
  chosen_reading: Render εἴδωλον as 'idol' and retain 'works of their hands' literally.
  alternative_readings:
  - image
  - what they had made
  rationale: Stephen's speech alludes to Israel's idolatry in language resonant with
    the Septuagint and prophetic critique. The translation should preserve that theological
    indictment without softening it into neutral craftsmanship language.
  doctrine_reference: Translation philosophy §§1, 5
