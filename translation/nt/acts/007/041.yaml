id: ACT.7.41
reference: Acts 7:41
source:
  edition: SBLGNT
  text: καὶ ἐμοσχοποίησαν ἐν ταῖς ἡμέραις ἐκείναις καὶ ἀνήγαγον θυσίαν τῷ εἰδώλῳ,
    καὶ εὐφραίνοντο ἐν τοῖς ἔργοις τῶν χειρῶν αὐτῶν.
translation:
  text: And in those days they made a calf and offered a sacrifice to the idol, and
    they were rejoicing in the works of their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they fashioned a calf.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they rejoiced over what their hands had made.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοσχοποίησαν
  chosen: they made a calf
  alternatives:
  - they made a calf-idol
  - they fashioned a calf
  lexicon: BDAG
  rationale: The verb means to make or fashion a calf. 'Made a calf' is concise and
    natural English, while the following explicit reference to 'the idol' makes adding
    'idol' here unnecessary in the main text.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: A standard temporal expression. 'In those days' preserves the Greek structure
    and reads naturally.
- source_word: ἀνήγαγον θυσίαν
  chosen: offered a sacrifice
  alternatives:
  - brought up a sacrifice
  - presented a sacrifice
  lexicon: BDAG
  rationale: In sacrificial contexts, ἀνάγω idiomatically conveys offering or presenting.
    'Offered a sacrifice' best communicates the cultic action in clear English.
- source_word: τῷ εἰδώλῳ
  chosen: to the idol
  alternatives:
  - to an idol
  - to the image
  lexicon: BDAG
  rationale: With the article, 'the idol' likely points to the calf just mentioned
    as the specific object of worship. 'Idol' preserves the pejorative force of εἴδωλον
    better than the more neutral 'image'.
- source_word: εὐφραίνοντο
  chosen: they were rejoicing
  alternatives:
  - they rejoiced
  - they were celebrating
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action, so 'they were
    rejoicing' preserves the aspect better than a simple past. 'Celebrating' is possible
    but slightly more interpretive.
- source_word: ἐν τοῖς ἔργοις τῶν χειρῶν αὐτῶν
  chosen: in the works of their hands
  alternatives:
  - in what their hands had made
  - over the works of their hands
  lexicon: BDAG
  rationale: This phrase echoes biblical polemic against idolatry and is best kept
    relatively literal. 'In the works of their hands' preserves the imagery and rhetorical
    force, even if slightly formal in English.
