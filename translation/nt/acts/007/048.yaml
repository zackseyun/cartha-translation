theological_decisions:
- issue: Whether to specify the referent of χειροποιήτοις as 'temples' in the main
    text
  chosen_reading: Keep the broader expression 'things made by hands'
  alternative_readings:
  - temples made with hands
  - sanctuaries made by hands
  rationale: Stephen's immediate argument concerns the temple, but the Greek adjective
    is broader and carries a biblical polemic against human-made sacred objects/structures.
    Retaining the broader wording preserves the text's rhetorical and theological
    force without over-narrowing it.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to expand ὁ ὕψιστος to 'the Most High God'
  chosen_reading: Translate simply as 'the Most High'
  alternative_readings:
  - the Most High God
  rationale: The title clearly refers to God, but the Greek does not include θεός.
    The translation avoids adding explicit wording not present in the source while
    preserving orthodox sense.
  doctrine_reference: Translation philosophy §1
