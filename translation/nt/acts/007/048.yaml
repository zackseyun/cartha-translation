id: ACT.7.48
reference: Acts 7:48
source:
  edition: SBLGNT
  text: ἀλλ’ οὐχ ὁ ὕψιστος ἐν ⸀χειροποιήτοις κατοικεῖ· καθὼς ὁ προφήτης λέγει·
translation:
  text: 'But the Most High does not dwell in things made by hands, just as the prophet
    says:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''in temples made with hands.'' The Greek is broader: ''in things made
      by hands,'' though the temple is the immediate context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - Yet
  - However
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding statement about Solomon building
    a house; 'But' is natural and sufficiently forceful in English.
- source_word: οὐχ
  chosen: does not
  alternatives:
  - not
  lexicon: BDAG
  rationale: Combined with the finite verb κατοικεῖ, standard English negation is
    best expressed with auxiliary 'does not'.
- source_word: ὁ ὕψιστος
  chosen: the Most High
  alternatives:
  - the highest one
  - the Most High God
  lexicon: BDAG
  rationale: A recognized divine title in Jewish and early Christian usage. 'The Most
    High' preserves the titular force without adding 'God,' which is implied but not
    explicit.
- source_word: ἐν χειροποιήτοις
  chosen: in things made by hands
  alternatives:
  - in handmade things
  - in temples made with hands
  - in what is made by hands
  lexicon: BDAG
  rationale: χειροποίητος means 'made by human hands.' The dative plural is broader
    than 'temples' alone, though the immediate context concerns the temple. 'Things
    made by hands' preserves the plural and the polemical contrast between God and
    human manufacture.
- source_word: κατοικεῖ
  chosen: does not dwell
  alternatives:
  - lives
  - resides
  lexicon: BDAG
  rationale: '''Dwell'' is the most fitting English equivalent in biblical/theological
    context, especially regarding divine presence and habitation.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Introduces scriptural confirmation; 'just as' clearly signals correspondence
    with the prophetic citation that follows.
- source_word: ὁ προφήτης
  chosen: the prophet
  alternatives:
  - the prophet Isaiah
  lexicon: BDAG
  rationale: The Greek says only 'the prophet.' Although Isaiah is the source of the
    quotation, the text does not name him here, so the translation should not supply
    the name in the main text.
- source_word: λέγει
  chosen: says
  alternatives:
  - declares
  lexicon: BDAG
  rationale: Present tense citation formula is naturally rendered 'says' in English
    and reflects the ongoing voice of Scripture.
