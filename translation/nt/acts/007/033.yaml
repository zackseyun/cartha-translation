theological_decisions:
- issue: Rendering of κύριος in a theophanic citation from Exodus
  chosen_reading: Lord
  alternative_readings:
  - LORD
  rationale: The Greek text reads κύριος, and the project's default is 'Lord.' Although
    the underlying Exodus context involves the divine name, this NT verse does not
    itself use the Tetragrammaton. Therefore 'Lord' best reflects original-language
    primacy while preserving theological reverence.
