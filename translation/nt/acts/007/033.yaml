id: ACT.7.33
reference: Acts 7:33
source:
  edition: SBLGNT
  text: εἶπεν δὲ αὐτῷ ὁ κύριος· Λῦσον τὸ ὑπόδημα τῶν ποδῶν σου, ὁ γὰρ τόπος ⸀ἐφ’ ᾧ
    ἕστηκας γῆ ἁγία ἐστίν.
translation:
  text: Then the Lord said to him, ‘Take off the sandal from your feet, for the place
    on which you are standing is holy ground.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Untie the sandal from your feet.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In this
    citation of the burning bush scene, 'Lord' preserves both reverence and continuity
    with biblical usage without importing the OT small-caps convention 'LORD,' which
    is not present in the Greek text here.
- source_word: Λῦσον
  chosen: Take off
  alternatives:
  - Untie
  - Loose
  lexicon: BDAG
  rationale: Although λύω is literally 'loose/untie,' in context with footwear the
    idiomatic sense is removal. 'Take off' is natural modern English and accurately
    conveys the imperative's force.
- source_word: τὸ ὑπόδημα
  chosen: the sandal
  alternatives:
  - your sandal
  - the shoe
  lexicon: BDAG
  rationale: ὑπόδημα is singular here, so the translation preserves the singular rather
    than harmonizing to the more familiar plural 'sandals/shoes.' The article is retained
    as 'the sandal,' while possession is expressed by the following phrase 'from your
    feet.'
- source_word: τῶν ποδῶν σου
  chosen: from your feet
  alternatives:
  - from your foot
  lexicon: BDAG
  rationale: The Greek explicitly has plural 'feet,' so the English reflects that.
    Combined with singular ὑπόδημα, the phrase yields the idiomatic command to remove
    footwear.
- source_word: ὁ γὰρ τόπος
  chosen: for the place
  alternatives:
  - for the spot
  - because the place
  lexicon: BDAG
  rationale: τόπος commonly means 'place.' 'For' renders γάρ straightforwardly as
    explanatory.
- source_word: ἐφ’ ᾧ
  chosen: on which
  alternatives:
  - where
  - upon which
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the prepositional force of ἐπί
    with the relative pronoun, while remaining readable.
- source_word: ἕστηκας
  chosen: you are standing
  alternatives:
  - you stand
  - you have stood
  lexicon: BDAG
  rationale: The perfect form of ἵστημι has a present-state sense here. 'You are standing'
    communicates the current posture naturally in English.
- source_word: γῆ ἁγία
  chosen: holy ground
  alternatives:
  - holy land
  - holy soil
  - ground is holy
  lexicon: BDAG
  rationale: γῆ can mean land, earth, or ground. In this immediate local setting,
    'ground' is the most natural English choice. The predicate expression is rendered
    idiomatically as 'holy ground' rather than the more wooden 'ground holy is.'
