id: ACT.7.8
reference: Acts 7:8
source:
  edition: SBLGNT
  text: καὶ ἔδωκεν αὐτῷ διαθήκην περιτομῆς· καὶ οὕτως ἐγέννησεν τὸν Ἰσαὰκ καὶ περιέτεμεν
    αὐτὸν τῇ ἡμέρᾳ τῇ ὀγδόῃ, ⸀καὶ Ἰσαὰκ τὸν Ἰακώβ, ⸁καὶ Ἰακὼβ τοὺς δώδεκα πατριάρχας.
translation:
  text: And he gave him the covenant of circumcision. And so he fathered Isaac and
    circumcised him on the eighth day, and Isaac fathered Jacob, and Jacob the twelve
    patriarchs.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διαθήκην περιτομῆς
  chosen: the covenant of circumcision
  alternatives:
  - a covenant of circumcision
  - the covenant marked by circumcision
  lexicon: BDAG
  rationale: 'διαθήκη is best rendered ''covenant'' in this biblical-historical context.
    The genitive περιτομῆς is taken as attributive/defining: the covenant characterized
    by circumcision (cf. Gen 17). The article is retained in English because the referent
    is specific in salvation history.'
- source_word: οὕτως
  chosen: And so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: οὕτως links the giving of the covenant with what follows. 'And so' is
    natural modern English and preserves the inferential/sequential force without
    sounding overly formal.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - became the father of
  - begot
  lexicon: BDAG
  rationale: γεννάω here refers to male procreation/genealogical descent. 'Fathered'
    is concise, natural, and gender-accurate to the male subject; 'begot' is archaic,
    while 'became the father of' is more cumbersome.
- source_word: περιέτεμεν
  chosen: circumcised
  alternatives:
  - cut off the foreskin of
  lexicon: BDAG
  rationale: περιτέμνω straightforwardly means 'circumcise.' The standard English
    term is clear and appropriately formal for the covenantal act.
- source_word: τῇ ἡμέρᾳ τῇ ὀγδόῃ
  chosen: on the eighth day
  alternatives:
  - on the eighth day after birth
  lexicon: BDAG
  rationale: The dative phrase is idiomatically temporal. 'On the eighth day' is the
    natural English rendering and sufficiently clear without adding words not explicit
    in the Greek.
- source_word: πατριάρχας
  chosen: patriarchs
  alternatives:
  - forefathers
  - family heads
  lexicon: BDAG
  rationale: πατριάρχης is a recognized biblical-historical term for the founding
    fathers of Israel's tribes. 'Patriarchs' preserves the established sense and fits
    Stephen's speech context.
- source_word: Ἰσαάκ / Ἰακώβ
  chosen: Isaac / Jacob
  lexicon: standard transliteration practice
  rationale: Per translation philosophy, personal names are transliterated by standard
    English conventions rather than translated.
