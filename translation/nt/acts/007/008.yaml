theological_decisions:
- issue: Specificity of the Abrahamic covenant reference
  chosen_reading: Rendered as 'the covenant of circumcision' with definite article
  alternative_readings:
  - '''a covenant of circumcision'''
  rationale: The verse refers to the specific covenant God gave Abraham, especially
    as narrated in Genesis 17. Using 'the' reflects the identifiable covenantal event
    without importing extra theological content beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Genealogical wording for γεννάω
  chosen_reading: Used 'fathered' throughout the genealogy
  alternative_readings:
  - '''begot'''
  - '''became the father of'''
  rationale: This preserves the male-genealogical force of the Greek and follows the
    gender-accurate principle without archaic diction.
  doctrine_reference: Translation philosophy §4, §6
