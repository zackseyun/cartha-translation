theological_decisions:
- issue: Anthropomorphic language for God
  chosen_reading: Retain 'my hand' as the speaker's self-reference to divine agency
  alternative_readings:
  - Render dynamically as 'I made all these things'
  - Render interpretively as 'my power made all these things'
  rationale: The verse is a citation of Isaiah 66:2 and uses anthropomorphic language
    to describe God's creative action. Preserving 'my hand' maintains the scriptural
    imagery and rhetorical force without importing a more abstract theological paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
