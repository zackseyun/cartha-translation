id: ACT.7.50
reference: Acts 7:50
source:
  edition: SBLGNT
  text: οὐχὶ ἡ χείρ μου ἐποίησεν ταῦτα πάντα;
translation:
  text: Did not my hand make all these things?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'Have not I made all these things?'
    reason: lexical_alternative
  - marker: b
    text: This line echoes Isaiah 66:2.
    reason: cross_reference
lexical_decisions:
- source_word: οὐχὶ
  chosen: Did not
  alternatives:
  - Has not
  - Didn't
  lexicon: BDAG
  rationale: οὐχί introduces a question expecting an affirmative answer. 'Did not'
    preserves the rhetorical force in natural English without colloquial contraction.
- source_word: ἡ χείρ μου
  chosen: my hand
  alternatives:
  - my power
  - I myself
  lexicon: BDAG
  rationale: χείρ is literally 'hand.' Although it can imply agency or power, the
    quotation from Isaiah 66:2 retains the concrete anthropomorphic expression, so
    the literal rendering should be preserved.
- source_word: ἐποίησεν
  chosen: make
  alternatives:
  - made
  - fashioned
  lexicon: BDAG
  rationale: ποιέω here refers to bringing into being or making. 'Make' fits the English
    interrogative construction 'Did not ... make' and matches the creation context.
- source_word: ταῦτα πάντα
  chosen: all these things
  alternatives:
  - all this
  - all these
  lexicon: BDAG
  rationale: The combination of demonstrative ταῦτα with πάντα is best represented
    fully as 'all these things,' preserving both the demonstrative force and the comprehensive
    scope.
