id: ACT.7.53
reference: Acts 7:53
source:
  edition: SBLGNT
  text: οἵτινες ἐλάβετε τὸν νόμον εἰς διαταγὰς ἀγγέλων, καὶ οὐκ ἐφυλάξατε.
translation:
  text: you who received the law as delivered by angels, and did not keep it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through arrangements of angels' or 'at the direction of angels.' The
      Greek phrase is difficult, but it refers to the law as given with angelic mediation.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: you who
  alternatives:
  - who
  - you people who
  lexicon: BDAG
  rationale: The relative pronoun is qualitative and addresses Stephen's hearers directly
    in the second person because of the following finite verbs. 'You who' preserves
    both the direct address and the accusatory force better than a bare 'who.'
- source_word: ἐλάβετε
  chosen: received
  alternatives:
  - accepted
  - took
  lexicon: BDAG
  rationale: Aorist active indicative, second plural of λαμβάνω. 'Received' is the
    most natural rendering for receiving the law and fits biblical idiom without implying
    willing acceptance beyond the text.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic law. 'The law' is clear and readable;
    capitalization as 'Law' is possible to signal the Mosaic Torah, but lowercase
    avoids adding an interpretive convention not marked in the Greek.
- source_word: εἰς διαταγὰς ἀγγέλων
  chosen: as delivered by angels
  alternatives:
  - through arrangements of angels
  - at the direction of angels
  - by ordinances of angels
  lexicon: BDAG
  rationale: This phrase is idiomatically difficult. διαταγή can denote arrangement,
    ordinance, or direction/order. In context, Stephen refers to the traditional Jewish
    understanding that the law was mediated angelically (cf. Gal 3:19; Heb 2:2). 'As
    delivered by angels' communicates the sense in natural English without over-literal
    awkwardness. The preposition εἰς is taken in an idiomatic/resultative sense tied
    to the manner or circumstance of reception.
- source_word: ἀγγέλων
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this context the referent is heavenly beings associated with the giving
    of the law, not human messengers. 'Angels' is the standard and contextually correct
    rendering.
- source_word: οὐκ ἐφυλάξατε
  chosen: did not keep it
  alternatives:
  - did not obey it
  - did not guard it
  lexicon: BDAG
  rationale: φυλάσσω can mean keep, guard, observe. With 'the law' as object, 'keep
    it' is the most idiomatic English expression for observing the law. Adding 'it'
    makes the implied object explicit in English.
