theological_decisions:
- issue: Meaning of the angelic mediation phrase εἰς διαταγὰς ἀγγέλων
  chosen_reading: The verse states that the law was received in connection with angelic
    mediation/delivery.
  alternative_readings:
  - The law was received 'through arrangements of angels' in a more formal or administrative
    sense.
  - The phrase could be rendered more literally as 'into ordinances of angels,' though
    this is obscure in English.
  rationale: The text clearly invokes the tradition of angels' involvement in the
    giving of the law, but the exact nuance of διαταγαί is debated. The chosen rendering
    preserves the core claim without over-specifying the mechanics of mediation.
  doctrine_reference: Preserve theological tension rather than resolve it.
