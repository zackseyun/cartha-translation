theological_decisions:
- issue: Referent of Ἰησοῦ
  chosen_reading: Joshua
  alternative_readings:
  - Jesus
  rationale: Although the Greek form is identical, the narrative setting is Israel's
    entry into the land and the succession after Moses. The intended referent is Joshua
    son of Nun, not Jesus of Nazareth. Translating the historical referent prevents
    a misleading christological reading not intended by the text.
  doctrine_reference: Translation philosophy §1, §2
- issue: Force of διαδεξάμενοι in relation to the tabernacle
  chosen_reading: The fathers brought it in as successive inheritors/custodians
  alternative_readings:
  - The fathers, after receiving it, brought it in
  rationale: The participle emphasizes succession across generations. The main text
    compresses this as 'in turn' for readability, while preserving the inherited continuity
    of the tabernacle tradition in Israel's history.
  doctrine_reference: Translation philosophy §5
