id: ACT.7.45
reference: Acts 7:45
source:
  edition: SBLGNT
  text: ἣν καὶ εἰσήγαγον διαδεξάμενοι οἱ πατέρες ἡμῶν μετὰ Ἰησοῦ ἐν τῇ κατασχέσει
    τῶν ἐθνῶν ὧν ἐξῶσεν ὁ θεὸς ἀπὸ προσώπου τῶν πατέρων ἡμῶν ἕως τῶν ἡμερῶν Δαυίδ·
translation:
  text: which our fathers in turn brought in with Joshua when they took possession
    of the nations that God drove out from before our fathers, until the days of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'with Jesus'; the name Ἰησοῦς can refer to either Jesus or Joshua.
      Here it refers to Joshua son of Nun.
    reason: alternative_reading
  - marker: b
    text: Or 'after receiving it in succession, our fathers brought it in.' The participle
      emphasizes generational succession.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  chosen: which
  alternatives:
  - it
  lexicon: BDAG
  rationale: Feminine singular relative pronoun referring back to the tent/tabernacle
    in the previous verse. 'Which' preserves the relative connection smoothly in English.
- source_word: εἰσήγαγον
  chosen: brought in
  alternatives:
  - brought into
  - carried in
  lexicon: BDAG
  rationale: Aorist of εἰσάγω means to bring in/lead in. 'Brought in' is natural English
    and fits the object, the tent of witness.
- source_word: διαδεξάμενοι
  chosen: in turn
  alternatives:
  - having received in succession
  - after receiving it
  lexicon: BDAG
  rationale: The participle from διαδέχομαι conveys succession or receiving from predecessors.
    'In turn' compactly expresses the generational succession of the fathers without
    overloading the sentence, while the idea of reception is implicit from the context
    of inherited custody.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Retains Stephen's covenant-historical language and the repeated patriarchal/ancestral
    framing in the speech. 'Ancestors' is possible but less literal and slightly flattens
    the rhetorical repetition.
- source_word: μετὰ Ἰησοῦ
  chosen: with Joshua
  alternatives:
  - with Jesus
  lexicon: BDAG
  rationale: Ἰησοῦ is the Greek form for both Jesus and Joshua. In this historical
    context of entering the land after Moses, the referent is clearly Joshua son of
    Nun. Translating the intended historical referent avoids confusion while remaining
    faithful to the Greek name form.
- source_word: ἐν τῇ κατασχέσει
  chosen: when they took possession of
  alternatives:
  - in the taking possession of
  - at the occupation of
  lexicon: BDAG
  rationale: κατάσχεσις denotes taking possession or occupation. Rendering the prepositional
    phrase idiomatically as a temporal-circumstantial clause produces clear English
    while preserving the sense of entering and possessing the land.
- source_word: τῶν ἐθνῶν
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In this land-conquest context, ἔθνη refers to the nations inhabiting
    Canaan, not specifically 'Gentiles' as a Jew/Gentile theological category. 'The
    nations' is the most contextually accurate and transparent rendering.
- source_word: ὧν ἐξῶσεν ὁ θεὸς
  chosen: that God drove out
  alternatives:
  - which God expelled
  - that God thrust out
  lexicon: BDAG
  rationale: ἐξωθέω means to push out, drive out, expel. 'Drove out' is idiomatic
    and matches common biblical land-conquest language without being archaic.
- source_word: ἀπὸ προσώπου
  chosen: from before
  alternatives:
  - from the presence of
  - from before the face of
  lexicon: BDAG
  rationale: This is a standard Semitic-influenced expression meaning removal from
    someone's presence. 'From before' preserves the biblical idiom in readable English.
- source_word: ἕως τῶν ἡμερῶν Δαυίδ
  chosen: until the days of David
  alternatives:
  - up to the time of David
  lexicon: BDAG
  rationale: A straightforward temporal expression. 'Until the days of David' preserves
    the wording and links naturally to the following verse.
