id: ACT.7.28
reference: Acts 7:28
source:
  edition: SBLGNT
  text: μὴ ἀνελεῖν με σὺ θέλεις ὃν τρόπον ἀνεῖλες ⸀ἐχθὲς τὸν Αἰγύπτιον;
translation:
  text: Do you want to kill me the way you killed the Egyptian yesterday?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "murder me ... murdered the Egyptian." The Greek verb can denote killing
      or putting to death; "kill" is used here as the broader rendering.
    reason: lexical_alternative
  - marker: b
    text: This question alludes to Moses' killing of an Egyptian the previous day
      (see Exod 2:12, 14).
    reason: cross_reference
lexical_decisions:
- source_word: μὴ
  chosen: Do ... ?
  alternatives:
  - Surely ... not?
  - You do not ... do you?
  lexicon: BDAG
  rationale: Introduces a question expecting a negative or incredulous force. In idiomatic
    English here, the rhetorical challenge is best carried by a direct question rather
    than a wooden negative particle.
- source_word: ἀνελεῖν
  chosen: kill
  alternatives:
  - do away with
  - take away
  - murder
  lexicon: BDAG
  rationale: The infinitive of ἀναιρέω here refers to taking a life. 'Kill' is the
    clearest modern English equivalent. 'Murder' may over-specify the legal/moral
    nuance in this immediate wording, though the act is wrongful in context.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun of the infinitive; straightforwardly rendered 'me'.
- source_word: σὺ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: The explicit subject pronoun adds emphasis. English can carry the force
    adequately with normal word order in the question; 'you yourself' would overstate
    the emphasis.
- source_word: θέλεις
  chosen: want
  alternatives:
  - wish
  - intend
  lexicon: BDAG
  rationale: θέλω commonly means 'want' or 'wish.' 'Want' is natural modern English
    and fits the confrontational tone.
- source_word: ὃν τρόπον
  chosen: the way
  alternatives:
  - in the manner that
  - just as
  lexicon: BDAG
  rationale: This idiom introduces comparison of manner. 'The way' is the most natural
    idiomatic rendering in contemporary English.
- source_word: ἀνεῖλες
  chosen: killed
  alternatives:
  - did away with
  - slew
  lexicon: BDAG
  rationale: Aorist of the same verb as earlier in the verse; consistency favors 'killed'
    in both instances.
- source_word: ἐχθὲς
  chosen: yesterday
  lexicon: BDAG
  rationale: Temporal adverb, directly rendered 'yesterday'.
- source_word: τὸν Αἰγύπτιον
  chosen: the Egyptian
  lexicon: BDAG
  rationale: Substantivized adjective/national designation; standard English rendering
    is 'the Egyptian'.
