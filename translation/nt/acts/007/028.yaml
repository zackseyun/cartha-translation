theological_decisions:
- issue: Moral-legal nuance of ἀναιρέω in Moses' act
  chosen_reading: Render neutrally as 'kill' rather than 'murder' in the main text
  alternative_readings:
  - murder
  rationale: The verse reports an accusation by the Israelite and echoes Exod 2:14/LXX-style
    wording. 'Kill' preserves the lexical sense without importing a more specific
    legal judgment into the main text beyond what the Greek expression itself explicitly
    states here.
