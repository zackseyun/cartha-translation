id: ACT.7.7
reference: Acts 7:7
source:
  edition: SBLGNT
  text: καὶ τὸ ἔθνος ᾧ ⸀ἐὰν ⸀δουλεύσουσιν κρινῶ ἐγώ, ⸂ὁ θεὸς εἶπεν⸃, καὶ μετὰ ταῦτα
    ἐξελεύσονται καὶ λατρεύσουσίν μοι ἐν τῷ τόπῳ τούτῳ.
translation:
  text: And I will judge the nation that they will serve, God said, and after these
    things they will come out and worship me in this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nation to which they will be enslaved' / 'the nation they will serve
      as slaves.' The Greek uses the verb 'serve,' but the context is Israel's bondage
      in Egypt.
    reason: lexical_alternative
  - marker: b
    text: Or 'serve me.' The Greek verb can denote religious service or worship offered
      to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνος
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: BDAG
  rationale: ἔθνος here refers to the political entity enslaving Abraham's offspring,
    echoing Genesis 15:14. 'Nation' is the most natural singular rendering in context.
- source_word: ᾧ ἐὰν δουλεύσουσιν
  chosen: that they will serve
  alternatives:
  - to which they will be enslaved
  - which they will serve
  lexicon: BDAG
  rationale: The dative relative with δουλεύω indicates the entity to which service
    is rendered. Because the context is bondage in Egypt, the sense includes forced
    servitude, but the direct quotation wording is best preserved as 'serve' in the
    main text, with the stronger nuance noted as an alternative.
- source_word: κρινῶ
  chosen: I will judge
  alternatives:
  - I will punish
  - I will bring judgment on
  lexicon: BDAG
  rationale: κρίνω in this future divine-speech context means to execute judgment.
    'I will judge' is formally closer and preserves the judicial sense without overinterpreting
    the mode of judgment.
- source_word: ὁ θεὸς εἶπεν
  chosen: God said
  alternatives:
  - said God
  lexicon: BDAG
  rationale: This is the speech attribution within Stephen's quotation. Standard English
    order is clearer while preserving the explicit subject.
- source_word: μετὰ ταῦτα
  chosen: after these things
  alternatives:
  - after that
  - afterward
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the sequence marker in Stephen's
    retelling. It remains natural English while reflecting the plural demonstrative.
- source_word: ἐξελεύσονται
  chosen: they will come out
  alternatives:
  - they will go out
  - they will depart
  lexicon: BDAG
  rationale: The future middle of ἐξέρχομαι here refers to Israel's exodus from the
    enslaving nation. 'Come out' is idiomatic in English and suits the liberation
    context.
- source_word: λατρεύσουσίν μοι
  chosen: worship me
  alternatives:
  - serve me
  - offer sacred service to me
  lexicon: BDAG
  rationale: λατρεύω often denotes cultic or religious service rendered to God. 'Worship
    me' communicates the religious sense clearly in modern English; 'serve me' could
    sound too general.
- source_word: ἐν τῷ τόπῳ τούτῳ
  chosen: in this place
  alternatives:
  - at this place
  - in this location
  lexicon: BDAG
  rationale: τόπος is straightforwardly 'place.' In Stephen's speech, it points to
    the place from which he is speaking/the temple-land setting, while echoing the
    Exodus promise. 'In this place' is the natural rendering.
