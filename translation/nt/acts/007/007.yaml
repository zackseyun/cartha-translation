theological_decisions:
- issue: Rendering δουλεύω in a slavery context
  chosen_reading: serve
  alternative_readings:
  - be enslaved
  - serve as slaves
  rationale: Although the broader context is clearly slavery in Egypt, the Greek verb
    here is δουλεύω rather than the noun δοῦλος. The main text keeps the quotation's
    verbal form as 'serve' while documenting the bondage nuance as a lexical alternative.
    This preserves the source wording without flattening the oppression context.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; contested terms table for
    δοῦλος servant/slave (context-dependent)'
- issue: Rendering λατρεύω toward God
  chosen_reading: worship me
  alternative_readings:
  - serve me
  rationale: The term denotes religious service offered to God, not ordinary labor.
    'Worship' best communicates the cultic/theological force in contemporary English
    without importing extra doctrinal claims.
  doctrine_reference: 'DOCTRINE.md: readable modern English; preserve meaning of source
    text'
