theological_decisions:
- issue: Sense of ἀστεῖος τῷ θεῷ
  chosen_reading: Moses was 'beautiful before God,' expressing God's evaluative regard
    rather than merely human assessment.
  alternative_readings:
  - Moses was 'beautiful to God'
  - Moses was 'exceptional in God's sight'
  - Moses was simply 'a fine child' without explicit theological nuance
  rationale: The phrase includes explicit reference to God, which should be preserved
    in translation rather than reduced to a purely human observation. At the same
    time, the wording should not import a stronger theological claim than the Greek
    states.
  doctrine_reference: Translation philosophy §1, §3
