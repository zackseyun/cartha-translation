id: ACT.7.20
reference: Acts 7:20
source:
  edition: SBLGNT
  text: ἐν ᾧ καιρῷ ἐγεννήθη Μωϋσῆς, καὶ ἦν ἀστεῖος τῷ θεῷ· ὃς ἀνετράφη μῆνας τρεῖς
    ἐν τῷ οἴκῳ τοῦ πατρός·
translation:
  text: At that time Moses was born, and he was beautiful before God. He was brought
    up for three months in his father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beautiful in God's sight.' The Greek could also be rendered 'fine' or
      'handsome,' but the reference to God is explicit and is therefore preserved.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ καιρῷ
  chosen: At that time
  alternatives:
  - In which time
  - At that season
  lexicon: BDAG
  rationale: Idiomatic temporal expression. 'At that time' is natural English and
    preserves the temporal reference without wooden literalism.
- source_word: ἐγεννήθη
  chosen: was born
  alternatives:
  - came to be born
  lexicon: BDAG
  rationale: Aorist passive of γεννάω in birth context is standardly rendered 'was
    born.'
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name, following the
    philosophy of transliterating names.
- source_word: ἀστεῖος
  chosen: beautiful
  alternatives:
  - fine
  - handsome
  - exceptional
  lexicon: BDAG
  rationale: The adjective can denote physical attractiveness or exceptional quality.
    In this context, with the allusion to Exod 2:2 and Heb 11:23, 'beautiful' best
    preserves the plain lexical sense without over-interpreting it as merely 'promising'
    or 'special.'
- source_word: τῷ θεῷ
  chosen: before God
  alternatives:
  - to God
  - in God's sight
  lexicon: BDAG
  rationale: The dative here is best taken as a dative of reference or evaluation.
    'Before God' is concise and preserves the sense that Moses was beautiful in God's
    sight, not merely 'godly' or 'divine.'
- source_word: ὃς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: English style prefers a new sentence with 'He' rather than a relative
    clause carried over mechanically. The referent remains Moses.
- source_word: ἀνετράφη
  chosen: was brought up
  alternatives:
  - was reared
  - was nurtured
  lexicon: BDAG
  rationale: The verb denotes being brought up or reared. 'Was brought up' is clear
    modern English and fits the domestic setting.
- source_word: μῆνας τρεῖς
  chosen: for three months
  alternatives:
  - three months
  lexicon: BDAG
  rationale: English idiom normally supplies 'for' with a duration of time.
- source_word: ἐν τῷ οἴκῳ τοῦ πατρός
  chosen: in his father's house
  alternatives:
  - in the house of his father
  - in his paternal home
  lexicon: BDAG
  rationale: Natural English rendering of the prepositional phrase. 'His father's
    house' preserves the familial and household sense of οἶκος.
