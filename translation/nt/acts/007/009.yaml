id: ACT.7.9
reference: Acts 7:9
source:
  edition: SBLGNT
  text: Καὶ οἱ πατριάρχαι ζηλώσαντες τὸν Ἰωσὴφ ἀπέδοντο εἰς Αἴγυπτον· καὶ ἦν ὁ θεὸς
    μετ’ αὐτοῦ,
translation:
  text: And the patriarchs, being jealous of Joseph, sold him into Egypt; and God
    was with him,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πατριάρχαι
  chosen: the patriarchs
  alternatives:
  - the fathers
  - the ancestors
  lexicon: BDAG
  rationale: In Acts 7 Stephen refers specifically to the sons of Jacob as Israel's
    founding fathers. 'Patriarchs' is the standard and precise English equivalent,
    preserving the historical-theological sense better than the more generic 'ancestors'
    or 'fathers'.
- source_word: ζηλώσαντες
  chosen: being jealous of
  alternatives:
  - envying
  - out of jealousy toward
  lexicon: BDAG
  rationale: The aorist participle expresses the motive accompanying the main action.
    'Being jealous of' is natural English and preserves the emotional force of ζηλόω
    here better than the slightly flatter 'envying'.
- source_word: ἀπέδοντο
  chosen: sold
  alternatives:
  - gave over
  - handed over
  lexicon: BDAG
  rationale: In this context, with Joseph as the object and Egypt as destination,
    the verb refers to selling Joseph away. 'Sold' captures the concrete sense plainly
    and aligns with the Genesis background. More literal options like 'gave over'
    are too vague in English.
- source_word: εἰς Αἴγυπτον
  chosen: into Egypt
  alternatives:
  - to Egypt
  lexicon: BDAG
  rationale: εἰς marks movement toward/into a place. 'Into Egypt' is slightly more
    formal and reflects the preposition closely, while remaining idiomatic.
- source_word: ἦν ὁ θεὸς μετ’ αὐτοῦ
  chosen: God was with him
  alternatives:
  - God was alongside him
  - God was with Joseph
  lexicon: BDAG
  rationale: This clause states divine presence and favor in simple terms. 'God was
    with him' is the most natural and faithful rendering. Supplying 'Joseph' would
    clarify the pronoun but is unnecessary because the antecedent is clear.
