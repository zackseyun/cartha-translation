theological_decisions:
- issue: Divine presence in Joseph's suffering
  chosen_reading: and God was with him
  rationale: The text affirms God's presence with Joseph despite his brothers' betrayal.
    The translation preserves this theological tension without expanding it into claims
    about providence beyond what the verse states.
  doctrine_reference: Translation philosophy §3
