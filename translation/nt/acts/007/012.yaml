theological_decisions:
- issue: Rendering τοὺς πατέρας ἡμῶν
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  - the patriarchs
  rationale: In keeping with the translation philosophy's gender-accurate principle,
    the masculine familial term is retained rather than neutralized. Here it refers
    specifically to the male forefathers/brothers in Israel's history, not generically
    to all ancestors.
