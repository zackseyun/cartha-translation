id: ACT.7.12
reference: Acts 7:12
source:
  edition: SBLGNT
  text: ἀκούσας δὲ Ἰακὼβ ὄντα ⸂σιτία εἰς Αἴγυπτον⸃ ἐξαπέστειλεν τοὺς πατέρας ἡμῶν
    πρῶτον·
translation:
  text: But when Jacob heard that there was grain in Egypt, he sent out our fathers
    the first time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'food supplies in Egypt.' The Greek σιτία can refer more broadly to provisions,
      though in this context 'grain' is likely intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when ... heard
  alternatives:
  - after ... heard
  - having heard
  lexicon: BDAG
  rationale: Aorist participle used temporally with the main verb; 'when ... heard'
    gives natural English while preserving the sequence of events.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild transition in Stephen's narrative. 'But' preserves discourse
    movement without overstating contrast.
- source_word: ὄντα ⸂σιτία εἰς Αἴγυπτον⸃
  chosen: that there was grain in Egypt
  alternatives:
  - that grain was in Egypt
  - that there were food supplies in Egypt
  lexicon: BDAG
  rationale: The accusative-and-participle construction after ἀκούω is rendered idiomatically
    in English as indirect discourse, 'that there was...'. 'Grain' fits the Joseph
    famine context better than the broader 'food supplies,' while remaining natural.
- source_word: σιτία
  chosen: grain
  alternatives:
  - food supplies
  - provisions
  lexicon: BDAG
  rationale: Plural of σιτίον can denote grain or provisions. In the Genesis/Joseph
    setting, grain is the most contextually precise and traditional sense.
- source_word: ἐξαπέστειλεν
  chosen: sent out
  alternatives:
  - sent
  - dispatched
  lexicon: BDAG
  rationale: The compound verb can be represented by 'sent out,' preserving the force
    of ἐξ- without becoming wooden. It suits the idea of sending the brothers on a
    journey.
- source_word: τοὺς πατέρας ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  - the patriarchs
  lexicon: BDAG
  rationale: Stephen speaks from within Israel's story; 'our fathers' preserves the
    familial-covenantal language of the Greek. 'Ancestors' is smoother but less textually
    specific, and 'patriarchs' is more interpretive than the immediate wording.
- source_word: πρῶτον
  chosen: the first time
  alternatives:
  - first
  - at first
  lexicon: BDAG
  rationale: Adverbial accusative indicating the first of multiple visits. 'The first
    time' is the clearest idiomatic English and anticipates the later second visit
    in the narrative.
