id: ACT.7.26
reference: Acts 7:26
source:
  edition: SBLGNT
  text: τῇ τε ἐπιούσῃ ἡμέρᾳ ὤφθη αὐτοῖς μαχομένοις καὶ ⸀συνήλλασσεν αὐτοὺς εἰς εἰρήνην
    εἰπών· Ἄνδρες, ἀδελφοί ⸀ἐστε· ἱνατί ἀδικεῖτε ἀλλήλους;
translation:
  text: And on the following day he appeared to them as they were fighting and was
    trying to reconcile them to peace, saying, ‘Men, you are brothers; why are you
    wronging one another?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''was reconciling them into peace.'' The Greek imperfect may be read
      as ongoing action, but here likely carries the sense of attempted action: Moses
      was trying to bring them to peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε ἐπιούσῃ ἡμέρᾳ
  chosen: on the following day
  alternatives:
  - the next day
  - on the coming day
  lexicon: BDAG
  rationale: Idiomatic temporal dative with participle; 'following day' is natural
    English and preserves the sequential sense without awkward literalism.
- source_word: ὤφθη
  chosen: he appeared
  alternatives:
  - he was seen
  - he showed himself
  lexicon: BDAG
  rationale: Aorist passive of ὁράω commonly functions intransitively as 'appeared'
    in narrative. This is more natural in English than the wooden 'was seen' while
    preserving the event of Moses becoming visible to them.
- source_word: αὐτοῖς μαχομένοις
  chosen: to them as they were fighting
  alternatives:
  - to them while they were fighting
  - to them fighting
  lexicon: BDAG
  rationale: The dative participle is circumstantial, describing their ongoing action
    at the time of his appearance. 'As they were fighting' captures the imperfective
    force clearly.
- source_word: συνήλλασσεν
  chosen: was trying to reconcile
  alternatives:
  - was reconciling
  - urged them to make peace
  - was bringing together
  lexicon: BDAG
  rationale: The imperfect indicates attempted or ongoing action in context; Moses'
    effort is not completed because the next verse shows rejection. 'Was trying to
    reconcile' best reflects the conative imperfect.
- source_word: εἰς εἰρήνην
  chosen: to peace
  alternatives:
  - into peace
  - in peace
  lexicon: BDAG
  rationale: The preposition εἰς with εἰρήνην expresses movement toward a state of
    peace. 'To peace' works idiomatically with 'reconcile' in English.
- source_word: Ἄνδρες
  chosen: Men
  alternatives:
  - Sirs
  lexicon: BDAG
  rationale: Vocative plural of ἀνήρ is directly 'men.' 'Sirs' would soften the lexical
    force and import a politeness nuance not required by the Greek.
- source_word: ἀδελφοί ἐστε
  chosen: you are brothers
  alternatives:
  - you are brethren
  - you are fellow brothers
  lexicon: BDAG
  rationale: The statement appeals to shared kinship as fellow Israelites. 'Brothers'
    is the natural modern rendering; 'brethren' is archaic. Because the referents
    here are specifically two men, no inclusivity footnote is needed.
- source_word: ἱνατί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Direct interrogative asking reason; 'why' is the plain modern equivalent.
- source_word: ἀδικεῖτε ἀλλήλους
  chosen: are you wronging one another
  alternatives:
  - do you injure one another
  - do you act unjustly toward one another
  lexicon: BDAG
  rationale: ἀδικέω here denotes doing wrong or injustice to another. 'Wronging one
    another' is concise, relational, and fits the immediate context of mutual mistreatment
    better than the more abstract 'acting unjustly.'
