id: ACT.7.34
reference: Acts 7:34
source:
  edition: SBLGNT
  text: ἰδὼν εἶδον τὴν κάκωσιν τοῦ λαοῦ μου τοῦ ἐν Αἰγύπτῳ, καὶ τοῦ στεναγμοῦ ⸀αὐτοῦ
    ἤκουσα, καὶ κατέβην ἐξελέσθαι αὐτούς· καὶ νῦν δεῦρο ⸀ἀποστείλω σε εἰς Αἴγυπτον.
translation:
  text: I have surely seen the mistreatment of my people in Egypt, and I have heard
    their groaning, and I have come down to rescue them. And now come, I will send
    you to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'affliction' or 'oppression' for 'mistreatment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'deliver them' for 'rescue them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν εἶδον
  chosen: I have surely seen
  alternatives:
  - I have certainly seen
  - Seeing, I saw
  - I have indeed seen
  lexicon: BDAG
  rationale: The participle plus finite verb is a Semitic-style emphatic construction,
    echoing the LXX of Exodus 3:7. 'I have surely seen' preserves the emphasis in
    natural English better than a wooden 'seeing, I saw.' Present perfect English
    also fits the present relevance of the divine observation.
- source_word: κάκωσιν
  chosen: mistreatment
  alternatives:
  - affliction
  - oppression
  - suffering
  lexicon: BDAG
  rationale: The noun denotes harsh treatment or oppression. 'Mistreatment' is clear
    modern English and preserves the idea of wrongful treatment without over-specifying
    political oppression. 'Affliction' is traditional but less natural; 'oppression'
    is possible but slightly narrower.
- source_word: λαοῦ μου
  chosen: my people
  lexicon: BDAG
  rationale: Standard rendering of λαός with possessive; covenantal overtones are
    preserved naturally in English.
- source_word: τοῦ ἐν Αἰγύπτῳ
  chosen: in Egypt
  alternatives:
  - who are in Egypt
  lexicon: BDAG
  rationale: The article-participle-like adjectival phrase identifies the location
    of 'my people.' English expresses this most naturally as 'my people in Egypt'
    without loss of meaning.
- source_word: στεναγμοῦ αὐτοῦ
  chosen: their groaning
  alternatives:
  - its groaning
  - their sighing
  - their lament
  lexicon: BDAG
  rationale: Although the Greek pronoun is singular, it refers collectively to the
    people. English idiom prefers plural 'their' for a collective antecedent here.
    'Groaning' best matches στεναγμός and preserves the Exodus allusion.
- source_word: κατέβην
  chosen: I have come down
  alternatives:
  - I came down
  - I have descended
  lexicon: BDAG
  rationale: In this divine-speech quotation, 'come down' is the established and natural
    English equivalent, preserving the anthropomorphic-theophanic language without
    flattening it. Present perfect fits the sequence with the preceding perfect-like
    English verbs.
- source_word: ἐξελέσθαι
  chosen: to rescue
  alternatives:
  - to deliver
  - to take out
  lexicon: BDAG
  rationale: The middle infinitive from ἐξαιρέω here means to deliver or rescue. 'Rescue'
    is clear modern English and communicates active deliverance. 'Deliver' is viable
    but can sound ecclesiastical.
- source_word: δεῦρο
  chosen: come
  alternatives:
  - come here
  lexicon: BDAG
  rationale: An imperative-like deictic particle inviting Moses forward. 'Come' is
    concise and natural; 'come here' is possible but slightly more explicit than needed.
- source_word: ἀποστείλω
  chosen: I will send
  alternatives:
  - let me send
  lexicon: BDAG
  rationale: Future indicative is the straightforward sense. In context it functions
    as a commissioning statement. 'I will send' is more direct than 'let me send,'
    which would imply a hortatory nuance not required by the Greek.
- source_word: εἰς Αἴγυπτον
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: BDAG
  rationale: English destination idiom prefers 'to Egypt.'
