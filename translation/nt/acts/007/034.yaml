theological_decisions:
- issue: Rendering of divine anthropomorphic descent
  chosen_reading: I have come down
  alternative_readings:
  - I came down
  - I have descended
  rationale: The text quotes God's words from the Exodus narrative using anthropomorphic
    language of divine intervention. The translation preserves the wording rather
    than explaining it away, in keeping with the philosophy of not importing doctrinal
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
