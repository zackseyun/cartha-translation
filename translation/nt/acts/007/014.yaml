theological_decisions:
- issue: Numerical total of Jacob's household compared with Genesis traditions
  chosen_reading: seventy-five persons in all
  alternative_readings:
  - seventy persons
  rationale: The Greek text of Acts explicitly reads 'seventy-five.' Because this
    differs from the Hebrew-text form of Genesis 46:27/Exodus 1:5 often rendered 'seventy,'
    the translation preserves Acts' wording in the main text and notes the alternative
    as a cross-reference issue rather than harmonizing.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve tension rather than resolve it'
