id: ACT.7.14
reference: Acts 7:14
source:
  edition: SBLGNT
  text: ἀποστείλας δὲ Ἰωσὴφ μετεκαλέσατο ⸂Ἰακὼβ τὸν πατέρα αὐτοῦ⸃ καὶ πᾶσαν τὴν συγγένειαν
    ἐν ψυχαῖς ἑβδομήκοντα πέντε,
translation:
  text: Then Joseph sent and summoned Jacob his father and all his relatives, seventy-five
    persons in all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some Old Testament passages give the total as 'seventy' (for example, the
      Hebrew text of Genesis 46:27 and Exodus 1:5); Acts here reads 'seventy-five.'
    reason: cross_reference
lexical_decisions:
- source_word: ἀποστείλας
  chosen: sent
  alternatives:
  - having sent
  - sent word
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in idiomatic English, 'sent'
    captures the action without awkwardness. 'Sent word' is possible by implication,
    but the object is not explicit in Greek, so the simpler 'sent' is preferred.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks narrative progression. 'Then' fits Stephen's retelling smoothly
    in English better than a bare 'and' while preserving the connective force.
- source_word: μετεκαλέσατο
  chosen: summoned
  alternatives:
  - called for
  - sent for
  lexicon: BDAG
  rationale: The middle verb means to call or send for someone to come. 'Summoned'
    is concise and natural here. 'Sent for' is also viable, but using 'summoned' avoids
    repeating 'sent' immediately after ἀποστείλας while preserving the sense.
- source_word: Ἰακὼβ τὸν πατέρα αὐτοῦ
  chosen: Jacob his father
  alternatives:
  - Jacob, his father
  lexicon: BDAG
  rationale: Straightforward appositional construction. English can omit the comma
    without loss, yielding a smooth rendering.
- source_word: πᾶσαν τὴν συγγένειαν
  chosen: all his relatives
  alternatives:
  - all his family
  - all his kindred
  lexicon: BDAG
  rationale: συγγένεια denotes kinship group or relatives. 'Relatives' is the clearest
    modern English choice; 'family' could sound narrower or more household-focused,
    while 'kindred' is archaic.
- source_word: ἐν ψυχαῖς
  chosen: persons in all
  alternatives:
  - souls
  - in number
  lexicon: BDAG
  rationale: Literally 'in souls,' an idiom for counting persons. 'Persons in all'
    communicates the counting sense in natural English without importing later theological
    connotations of 'souls' that are not foregrounded here.
- source_word: ἑβδομήκοντα πέντε
  chosen: seventy-five
  lexicon: BDAG
  rationale: Direct rendering of the numeral.
