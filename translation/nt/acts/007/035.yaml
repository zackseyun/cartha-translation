id: ACT.7.35
reference: Acts 7:35
source:
  edition: SBLGNT
  text: Τοῦτον τὸν Μωϋσῆν, ὃν ἠρνήσαντο εἰπόντες· Τίς σε κατέστησεν ἄρχοντα καὶ δικαστήν,
    τοῦτον ὁ θεὸς ⸀καὶ ἄρχοντα καὶ λυτρωτὴν ⸂ἀπέσταλκεν σὺν⸃ χειρὶ ἀγγέλου τοῦ ὀφθέντος
    αὐτῷ ἐν τῇ βάτῳ.
translation:
  text: This Moses, whom they rejected, saying, ‘Who appointed you a ruler and a judge?’—this
    man God sent as both ruler and redeemer by the hand of the angel who appeared
    to him in the bush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverer.' The Greek term can denote one who brings release or liberation;
      'redeemer' was chosen to preserve the redemption nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρνήσαντο
  chosen: rejected
  alternatives:
  - denied
  - disowned
  lexicon: BDAG
  rationale: In this context the verb refers to repudiating Moses’ authority, not
    merely verbal denial. 'Rejected' best fits the narrative allusion to Israel’s
    refusal of Moses in Exodus 2:14 and reads naturally in English.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - made
  - set
  lexicon: BDAG
  rationale: The question concerns installation into office or authority. 'Appointed'
    captures the sense of being established as ruler/judge more idiomatically than
    'made' while remaining close to the Greek.
- source_word: ἄρχοντα
  chosen: ruler
  alternatives:
  - leader
  - prince
  lexicon: BDAG
  rationale: 'ἄρχων denotes one who exercises authority. ''Ruler'' preserves the official
    sense and also matches the repeated irony of the verse: the one they refused as
    ruler is the one God sent as ruler.'
- source_word: δικαστήν
  chosen: judge
  alternatives:
  - magistrate
  lexicon: BDAG
  rationale: The term straightforwardly denotes one who judges. 'Judge' is the clearest
    and most direct rendering.
- source_word: λυτρωτὴν
  chosen: redeemer
  alternatives:
  - deliverer
  - liberator
  lexicon: BDAG
  rationale: λυτρωτής carries the sense of one who effects release or redemption.
    'Redeemer' preserves the theological weight and verbal connection to redemption
    language better than the flatter 'deliverer,' while still fitting Moses typologically.
- source_word: ἀπέσταλκεν
  chosen: sent
  alternatives:
  - has sent
  lexicon: BDAG
  rationale: The perfect can emphasize the completed act with abiding significance,
    but in English narrative summary 'sent' is the most natural rendering. The present
    relevance is sufficiently conveyed by the context.
- source_word: σὺν χειρὶ
  chosen: by the hand of
  alternatives:
  - with the help of
  - through
  lexicon: BDAG
  rationale: This is a semitic/idiomatic expression for agency or instrumentality.
    'By the hand of' preserves the biblical idiom and the mediating role of the angel
    better than a more flattened paraphrase.
- source_word: ἀγγέλου
  chosen: the angel
  alternatives:
  - the messenger
  lexicon: BDAG
  rationale: In Acts' retelling of the burning bush event, ἄγγελος refers to the heavenly
    being who appeared to Moses. 'Angel' is the standard and contextually appropriate
    rendering.
- source_word: τοῦ ὀφθέντος αὐτῷ ἐν τῇ βάτῳ
  chosen: who appeared to him in the bush
  alternatives:
  - who was seen by him in the bush
  lexicon: BDAG
  rationale: The participle is passive in form but idiomatically means 'appeared.'
    'In the bush' follows the Greek closely and reflects the burning bush setting
    without adding 'burning,' which is implied by context rather than stated here.
- source_word: Τοῦτον ... τοῦτον
  chosen: This Moses ... this man
  alternatives:
  - This Moses ... this one
  - This very Moses ... this one
  lexicon: BDAG
  rationale: The repeated demonstrative is emphatic and rhetorically important. Rendering
    the first as 'This Moses' and the second as 'this man' preserves the emphasis
    while avoiding awkward repetition in English.
- source_word: καὶ ἄρχοντα καὶ λυτρωτὴν
  chosen: as both ruler and redeemer
  alternatives:
  - both ruler and redeemer
  - as ruler and redeemer
  lexicon: BDAG
  rationale: The repeated καί marks the paired roles emphatically. 'As both ... and
    ...' brings out the force of the construction in natural English.
