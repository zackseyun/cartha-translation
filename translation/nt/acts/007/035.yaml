theological_decisions:
- issue: Rendering λυτρωτής in a passage where Moses functions typologically in salvation
    history
  chosen_reading: redeemer
  alternative_readings:
  - deliverer
  - liberator
  rationale: Using 'redeemer' preserves the text's stronger liberation/redemption
    nuance and allows Luke's portrayal of Moses as a God-sent agent of redemption
    to stand without flattening it into mere rescue language. This does not import
    a full christological equation but preserves the typological weight present in
    the wording.
  doctrine_reference: Translation philosophy §§1, 3, 5
