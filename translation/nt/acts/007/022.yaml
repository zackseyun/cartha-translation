theological_decisions:
- issue: Scope of Moses' capability in λόγοις
  chosen_reading: Rendered as 'mighty in his words and deeds' without harmonizing
    to Exodus 4:10.
  alternative_readings:
  - Rendered more loosely as 'mighty in speech and action'
  - Interpreted as referring only to reputation or effect rather than Moses' own words
  rationale: Stephen's statement should be translated on its own terms. Although Exodus
    4:10 records Moses saying he is not eloquent, this verse presents him as powerful
    in word and deed, whether by education, public stature, or effective action. The
    translation preserves the tension rather than resolving it by paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
