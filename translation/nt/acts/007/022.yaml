id: ACT.7.22
reference: Acts 7:22
source:
  edition: SBLGNT
  text: καὶ ἐπαιδεύθη ⸀Μωϋσῆς πάσῃ σοφίᾳ Αἰγυπτίων, ἦν δὲ δυνατὸς ἐν λόγοις καὶ ἔργοις
    ⸀αὐτοῦ.
translation:
  text: And Moses was educated in all the wisdom of the Egyptians, and he was mighty
    in his words and deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in speech and actions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαιδεύθη
  chosen: was educated
  alternatives:
  - was instructed
  - was trained
  lexicon: BDAG
  rationale: The passive of παιδεύω here refers to Moses receiving formal formation
    or instruction. 'Was educated' is natural modern English and fits the context
    of Egyptian court learning better than the narrower 'was instructed.'
- source_word: πάσῃ σοφίᾳ Αἰγυπτίων
  chosen: in all the wisdom of the Egyptians
  alternatives:
  - with all the wisdom of the Egyptians
  - in every kind of Egyptian wisdom
  lexicon: BDAG
  rationale: The dative construction is well represented by 'in all the wisdom of
    the Egyptians,' conveying sphere/content of education. This preserves the breadth
    of πάσῃ and the genitive Αἰγυπτίων as possessive/source.
- source_word: δυνατὸς
  chosen: mighty
  alternatives:
  - powerful
  - capable
  lexicon: BDAG
  rationale: '''Mighty'' preserves the strength nuance of δυνατός and echoes biblical
    style without becoming archaic. ''Capable'' is too weak, and ''powerful'' is possible
    but less idiomatic with the following datives.'
- source_word: ἐν λόγοις καὶ ἔργοις
  chosen: in his words and deeds
  alternatives:
  - in speech and actions
  - in words and works
  lexicon: BDAG
  rationale: This keeps the paired expression close to the Greek while remaining readable.
    'Words and deeds' is a natural English collocation and preserves the rhetorical
    balance of λόγοις / ἔργοις.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - —
  lexicon: BDAG
  rationale: The pronoun most naturally modifies both coordinated nouns, yielding
    'his words and deeds.' This is clearer in English than leaving the possessive
    implicit.
