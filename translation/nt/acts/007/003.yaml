id: ACT.7.3
reference: Acts 7:3
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρὸς αὐτόν· Ἔξελθε ἐκ τῆς γῆς σου καὶ ⸀ἐκ τῆς συγγενείας σου, καὶ
    δεῦρο εἰς ⸀τὴν γῆν ἣν ἄν σοι δείξω.
translation:
  text: And he said to him, ‘Go out from your land and from your kindred, and come
    into the land that I will show you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from your relatives” or “from your family.” The Greek συγγένεια refers
      to one’s kinship group or kindred.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρὸς αὐτόν
  chosen: he said to him
  alternatives:
  - he said to Abraham
  - he told him
  lexicon: BDAG
  rationale: A straightforward narrative formula. The pronoun is retained rather than
    replacing it with the referent's name, since the Greek uses αὐτόν and the context
    already identifies Abraham.
- source_word: Ἔξελθε
  chosen: Go out
  alternatives:
  - Leave
  - Come out
  lexicon: BDAG
  rationale: The aorist imperative of ἐξέρχομαι is well represented by 'Go out,' preserving
    the directional force of ἐκ that follows. 'Leave' is possible but slightly less
    explicit about the motion imagery.
- source_word: ἐκ τῆς γῆς σου
  chosen: from your land
  alternatives:
  - out of your country
  - from your country
  lexicon: BDAG
  rationale: γῆ can mean land, earth, ground, or country. Here 'land' best preserves
    the broad territorial sense without importing modern nation-state connotations
    that 'country' may suggest.
- source_word: συγγενείας
  chosen: kindred
  alternatives:
  - relatives
  - family
  - kin
  lexicon: BDAG
  rationale: συγγένεια denotes kinship group or relatives. 'Kindred' captures the
    collective familial/clan sense better than the narrower or more colloquial 'family'
    or 'relatives,' while remaining readable.
- source_word: δεῦρο
  chosen: come
  alternatives:
  - come here
  - go
  lexicon: BDAG
  rationale: δεῦρο is an adverb functioning imperativally, literally 'come' or 'come
    here.' In idiomatic English after a prior command, 'come' is concise and natural.
    'Go' would flatten the deictic nuance, though English often tolerates either in
    reported divine speech.
- source_word: εἰς τὴν γῆν
  chosen: into the land
  alternatives:
  - to the land
  lexicon: BDAG
  rationale: εἰς naturally carries movement into. 'Into the land' preserves that force
    slightly more closely than 'to the land,' though both are acceptable English.
- source_word: ἣν ἄν σοι δείξω
  chosen: that I will show you
  alternatives:
  - which I may show you
  - which I shall show you
  lexicon: BDAG
  rationale: The relative clause with ἄν and the aorist subjunctive δείξω has a future-oriented,
    indefinite sense in this command context. Idiomatic English is 'that I will show
    you.' More literal renderings like 'may show' are less natural and can miscommunicate
    uncertainty.
