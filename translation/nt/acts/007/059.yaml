theological_decisions:
- issue: Whether Stephen's address to Jesus should be rendered in a way that clearly
    reflects prayer/invocation to the risen Jesus
  chosen_reading: Rendered ἐπικαλούμενον as 'as he called out' and retained the direct
    address 'Lord Jesus'
  alternative_readings:
  - as he was invoking him
  - calling upon God and saying
  rationale: 'The Greek text directly presents Stephen addressing Jesus: ''Lord Jesus,
    receive my spirit.'' The participle ἐπικαλούμενον can carry the sense of invocation,
    and the translation should not obscure that Stephen is praying to Jesus. At the
    same time, the wording should remain natural English and not over-interpret beyond
    the text.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
