id: ACT.7.59
reference: Acts 7:59
source:
  edition: SBLGNT
  text: καὶ ἐλιθοβόλουν τὸν Στέφανον ἐπικαλούμενον καὶ λέγοντα· Κύριε Ἰησοῦ, δέξαι
    τὸ πνεῦμά μου·
translation:
  text: And they were stoning Stephen as he called out and said, “Lord Jesus, receive
    my spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as he was invoking [him] and saying.” The Greek participle can more
      explicitly convey calling upon or invoking in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλιθοβόλουν
  chosen: they were stoning
  alternatives:
  - they stoned
  - they kept stoning
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing action in progress; 'were stoning'
    best captures the durative sense in natural English.
- source_word: ἐπικαλούμενον
  chosen: as he called out
  alternatives:
  - calling upon
  - invoking
  lexicon: BDAG
  rationale: The participle modifies Stephen and in this context introduces his appeal
    to Jesus. 'Called out' is idiomatic and readable, while preserving the sense of
    direct invocation/prayer. 'Calling upon' is more formal but less natural in contemporary
    English.
- source_word: λέγοντα
  chosen: and said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: A straightforward rendering of the participle coordinated with ἐπικαλούμενον.
    'And said' reads naturally in English while preserving the sequence.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus here, 'Lord' preserves both reverence and christological significance better
    than 'Master'.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: δέξαι
  chosen: receive
  alternatives:
  - accept
  - take
  lexicon: BDAG
  rationale: Aorist middle imperative of δέχομαι in a prayer context is well rendered
    'receive.' This preserves the solemnity and echoes the sense of entrusting oneself
    to another.
- source_word: τὸ πνεῦμά μου
  chosen: my spirit
  alternatives:
  - my life-breath
  lexicon: BDAG
  rationale: πνεῦμα here refers to Stephen's immaterial life/spirit being entrusted
    at death. 'My spirit' is the standard and clearest rendering in context.
