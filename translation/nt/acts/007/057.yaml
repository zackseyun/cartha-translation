id: ACT.7.57
reference: Acts 7:57
source:
  edition: SBLGNT
  text: κράξαντες δὲ φωνῇ μεγάλῃ συνέσχον τὰ ὦτα αὐτῶν, καὶ ὥρμησαν ὁμοθυμαδὸν ἐπ’
    αὐτόν,
translation:
  text: But crying out with a loud voice, they covered their ears and rushed together
    at him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with one accord.' The Greek adverb ὁμοθυμαδόν emphasizes their united
      action.
    reason: lexical_alternative
lexical_decisions:
- source_word: κράξαντες
  chosen: crying out
  alternatives:
  - shouting
  - screaming out
  lexicon: BDAG
  rationale: Aorist participle from κράζω denotes a loud cry or shout. 'Crying out'
    preserves the participial connection to the following actions and avoids over-specifying
    emotional tone beyond the Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the narrative turn
    from Stephen's vision to the crowd's hostile reaction.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: The dative phrase is idiomatically rendered 'with a loud voice.' This
    keeps the concrete expression of the Greek while remaining natural English.
- source_word: συνέσχον τὰ ὦτα αὐτῶν
  chosen: they covered their ears
  alternatives:
  - they stopped their ears
  - they held their ears shut
  lexicon: BDAG
  rationale: The idiom means to shut or cover the ears to avoid hearing. 'Covered
    their ears' is the clearest modern English equivalent; 'stopped their ears' is
    more traditional but less natural today.
- source_word: ὥρμησαν
  chosen: rushed
  alternatives:
  - charged
  - rushed violently
  lexicon: BDAG
  rationale: The verb conveys a sudden forceful movement. 'Rushed' captures the action
    without adding intensity not explicitly stated in the verb alone.
- source_word: ὁμοθυμαδὸν
  chosen: together
  alternatives:
  - with one accord
  - as one
  lexicon: BDAG
  rationale: The adverb denotes united action or shared purpose. 'Together' is natural
    and concise in English; the fuller nuance 'with one accord' is preserved as an
    alternative.
- source_word: ἐπ’ αὐτόν
  chosen: at him
  alternatives:
  - upon him
  - against him
  lexicon: BDAG
  rationale: With a verb of rushing, ἐπί + accusative indicates movement directed
    toward a person. 'At him' is idiomatic in English for a hostile rush; 'against
    him' is interpretive and 'upon him' is more wooden.
