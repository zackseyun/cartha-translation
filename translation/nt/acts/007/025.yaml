theological_decisions:
- issue: Rendering σωτηρία in a Moses-deliverance context
  chosen_reading: deliverance
  alternative_readings:
  - salvation
  rationale: The verse concerns God's saving action for Israel through Moses in history.
    'Deliverance' preserves the immediate exodus-context sense while allowing readers
    to perceive the broader salvation motif in Stephen's speech. This avoids importing
    a narrower later soteriological sense into the main text while not denying theological
    continuity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
