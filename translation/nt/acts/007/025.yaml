id: ACT.7.25
reference: Acts 7:25
source:
  edition: SBLGNT
  text: ἐνόμιζεν δὲ συνιέναι τοὺς ⸀ἀδελφοὺς ὅτι ὁ θεὸς διὰ χειρὸς αὐτοῦ δίδωσιν ⸂σωτηρίαν
    αὐτοῖς⸃, οἱ δὲ οὐ συνῆκαν.
translation:
  text: Now he was supposing that his brothers understood that God was giving them
    deliverance through his hand, but they did not understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'salvation.' The Greek term can denote rescue, deliverance, or salvation;
      here the immediate context points to God's deliverance of Israel through Moses.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' refers to Moses'' fellow Israelites; the term is masculine
      plural kinship language in Greek.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐνόμιζεν
  chosen: was supposing
  alternatives:
  - thought
  - assumed
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or backgrounded mental expectation rather
    than a punctiliar thought. 'Was supposing' preserves that aspect, though idiomatic
    English could also use 'thought'.
- source_word: συνιέναι
  chosen: understood
  alternatives:
  - comprehended
  - recognized
  lexicon: BDAG
  rationale: The infinitive depends on ἐνόμιζεν and refers to grasping the significance
    of the situation. 'Understood' is natural English and matches the repeated verb
    later in the verse.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - fellow Israelites
  - brothers and sisters
  lexicon: BDAG
  rationale: Stephen is referring to Moses' fellow Israelites in kinship language.
    Per gender-accurate philosophy, 'brothers' best reflects the masculine plural
    and the ethnic-fraternal sense. A more inclusive paraphrase would go beyond the
    lexical form, though the broader referent is the people of Israel.
- source_word: διὰ χειρὸς αὐτοῦ
  chosen: through his hand
  alternatives:
  - through him
  - by his hand
  lexicon: BDAG
  rationale: This is an idiomatic expression for agency or instrumentality. 'Through
    his hand' preserves the vivid Greek wording while remaining understandable; 'through
    him' would be smoother but less transparent to the source image.
- source_word: δίδωσιν
  chosen: was giving
  alternatives:
  - gives
  - was granting
  lexicon: BDAG
  rationale: Although formally present tense, in indirect discourse after a past-tense
    main verb English commonly shifts to past progressive or past to reflect the narrative
    frame. 'Was giving' fits the sense of God's action mediated through Moses in that
    moment.
- source_word: σωτηρίαν
  chosen: deliverance
  alternatives:
  - salvation
  - rescue
  lexicon: BDAG
  rationale: In this context Stephen is recounting Moses' attempted deliverance of
    Israel from oppression in Egypt. 'Deliverance' best captures the concrete historical
    sense without excluding theological overtones. 'Salvation' is possible but in
    contemporary English can sound more narrowly spiritual than the context warrants.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  - for them
  lexicon: BDAG
  rationale: The dative marks the recipients of the deliverance. English expresses
    this naturally as 'giving them deliverance.'
- source_word: οἱ δὲ οὐ συνῆκαν
  chosen: but they did not understand
  alternatives:
  - but they did not comprehend
  - but they failed to understand
  lexicon: BDAG
  rationale: The aorist states the contrary reality to Moses' expectation. Repeating
    'understand' mirrors the Greek wordplay with συνιέναι / συνῆκαν and keeps the
    contrast clear.
