id: ACT.7.24
reference: Acts 7:24
source:
  edition: SBLGNT
  text: καὶ ἰδών τινα ἀδικούμενον ἠμύνατο καὶ ἐποίησεν ἐκδίκησιν τῷ καταπονουμένῳ
    πατάξας τὸν Αἰγύπτιον.
translation:
  text: And when he saw someone being wronged, he defended him and brought justice
    for the one being oppressed by striking down the Egyptian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'executed vengeance for the one being oppressed.' The Greek expression
      ἐποίησεν ἐκδίκησιν can carry the sense of avenging or vindicating.
    reason: lexical_alternative
  - marker: b
    text: Or 'by striking the Egyptian.' The verb can simply mean 'strike'; 'striking
      down' reflects the likely lethal outcome in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδών
  chosen: when he saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is rendered temporally in natural English to
    set the circumstance for the main actions that follow.
- source_word: τινα
  chosen: someone
  alternatives:
  - a certain man
  - someone
  lexicon: BDAG
  rationale: Indefinite pronoun without explicit noun; 'someone' is natural and preserves
    the indefiniteness better than supplying 'man' from context.
- source_word: ἀδικούμενον
  chosen: being wronged
  alternatives:
  - being treated unjustly
  - being injured
  lexicon: BDAG
  rationale: Passive participle from ἀδικέω denotes suffering injustice or wrong.
    'Being wronged' is concise, idiomatic, and preserves the moral dimension.
- source_word: ἠμύνατο
  chosen: he defended him
  alternatives:
  - he came to his aid
  - he helped
  lexicon: BDAG
  rationale: The middle of ἀμύνομαι conveys coming to someone's defense or helping
    against an attacker. 'Defended him' fits the context of intervention against abuse
    and links naturally with the following clause.
- source_word: ἐποίησεν ἐκδίκησιν
  chosen: brought justice
  alternatives:
  - executed vengeance
  - obtained revenge
  - secured justice
  lexicon: BDAG
  rationale: This idiom literally means 'did/made vengeance/justice.' In context it
    refers to avenging the oppressed man by acting against the Egyptian. 'Brought
    justice' preserves the judicial sense without overstating personal vindictiveness,
    while remaining readable modern English.
- source_word: τῷ καταπονουμένῳ
  chosen: for the one being oppressed
  alternatives:
  - for the one being mistreated
  - for the one being abused
  lexicon: BDAG
  rationale: Passive participle from καταπονέω denotes harsh treatment or oppression.
    'The one being oppressed' captures the ongoing victimization and matches the dative
    of advantage with 'for.'
- source_word: πατάξας
  chosen: by striking down
  alternatives:
  - after striking
  - by striking
  - by killing
  lexicon: BDAG
  rationale: Aorist participle from πατάσσω means to strike, smite. In this context
    the result is death (cf. Exod 2), but the Greek verb itself is 'strike.' 'By striking
    down' preserves the action and likely lethal force without importing more than
    the word itself states.
- source_word: τὸν Αἰγύπτιον
  chosen: the Egyptian
  alternatives:
  - the Egyptian man
  lexicon: BDAG
  rationale: Standard ethnic substantive; 'the Egyptian' is the natural English rendering.
