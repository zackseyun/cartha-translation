theological_decisions:
- issue: Nuance of ἐκδίκησιν in Moses' act
  chosen_reading: Render with justice-oriented language rather than personal revenge
    language
  alternative_readings:
  - executed vengeance
  - took revenge
  rationale: The noun can denote vengeance or vindication. In Stephen's retelling,
    Moses acts on behalf of the oppressed Israelite, so English should preserve the
    avenging/vindicating sense without implying a doctrinal endorsement of private
    revenge. 'Brought justice' best reflects the contextual force in readable English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    sense without importing doctrinal claims.'
