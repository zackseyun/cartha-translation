theological_decisions:
- issue: Whether to render οἶκον as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The source text uses the ordinary term οἶκος rather than the more specific
    ναός/ἱερόν. Rendering it 'house' preserves Stephen's diction and the theological
    tension of speaking of a 'house' for God immediately before the statement that
    the Most High does not dwell in handmade houses. 'Temple' is a valid contextual
    interpretation but is better preserved in a footnote than moved into the main
    text.
  doctrine_reference: Translation philosophy §§1, 3, 5
