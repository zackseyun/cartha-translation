id: ACT.7.47
reference: Acts 7:47
source:
  edition: SBLGNT
  text: Σολομῶν δὲ οἰκοδόμησεν αὐτῷ οἶκον.
translation:
  text: But Solomon built a house for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a temple'; Greek 'a house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σολομῶν
  chosen: Solomon
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best reflects the contrast
    with the preceding statement that the Most High does not dwell in houses made
    by hands, while still fitting Stephen's historical narration.
- source_word: οἰκοδόμησεν
  chosen: built
  alternatives:
  - constructed
  - built up
  lexicon: BDAG
  rationale: Aorist active indicative of οἰκοδομέω here refers concretely to constructing
    a building, not metaphorical edification. 'Built' is the most natural and direct
    English rendering.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: Dative pronoun referring to God in context. In English, 'built a house
    for him' is idiomatic for constructing a house intended for someone's use or honor;
    'to him' is possible but less natural here.
- source_word: οἶκον
  chosen: a house
  alternatives:
  - a temple
  lexicon: BDAG
  rationale: The Greek noun is literally 'house.' Although the referent is the temple,
    retaining 'house' preserves the wording Stephen uses and echoes biblical temple
    language ('house' for God's dwelling). The contextual identification as the temple
    is clear from the surrounding verses.
