id: ACT.7.23
reference: Acts 7:23
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐπληροῦτο αὐτῷ τεσσερακονταετὴς χρόνος, ἀνέβη ἐπὶ τὴν καρδίαν αὐτοῦ
    ἐπισκέψασθαι τοὺς ἀδελφοὺς αὐτοῦ τοὺς υἱοὺς Ἰσραήλ.
translation:
  text: Now when he was approaching forty years of age, it came into his heart to
    visit his brothers, the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it arose in his heart' or 'he decided.' The Greek preserves an idiom
      of inward resolve.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to his fellow Israelites; the phrase ''the sons
      of Israel'' identifies the group ethnically.'
    reason: cultural_note
  - marker: c
    text: Or 'the children of Israel' or 'the Israelites.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: Now when
  alternatives:
  - And when
  - As
  lexicon: BDAG
  rationale: Introduces a temporal transition in Stephen's narrative. 'Now when' is
    natural English that preserves both the connective and temporal force without
    sounding wooden.
- source_word: ἐπληροῦτο αὐτῷ τεσσερακονταετὴς χρόνος
  chosen: he was approaching forty years of age
  alternatives:
  - the time of forty years was being fulfilled for him
  - he was forty years old
  - his forty-year period was being completed
  lexicon: BDAG
  rationale: The Greek is idiomatic rather than a simple equative statement. 'Was
    approaching forty years of age' captures the inceptive/approaching sense commonly
    conveyed in context and avoids an overly literal but awkward English expression.
- source_word: ἀνέβη ἐπὶ τὴν καρδίαν αὐτοῦ
  chosen: it came into his heart
  alternatives:
  - it arose in his heart
  - it came upon his heart
  - he decided
  lexicon: BDAG
  rationale: This is a Semitic/idiomatic expression for an inward resolve or intention.
    'It came into his heart' preserves the metaphor of the source better than the
    flattened 'he decided,' while remaining understandable in modern English.
- source_word: ἐπισκέψασθαι
  chosen: to visit
  alternatives:
  - to look after
  - to inspect
  - to care for
  lexicon: BDAG
  rationale: In context Moses intends to go to his people and see to their condition.
    'Visit' is the most natural concise rendering, while the broader nuance of concern/oversight
    is preserved by context.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his fellow Israelites
  - his kinsmen
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and refers to fellow members
    of his people. Per the gender-accurate philosophy, 'brothers' is retained in the
    main text rather than neutralizing it; the ethnic identification is then made
    explicit by the following apposition.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: BDAG
  rationale: This appositional phrase identifies who the 'brothers' are. 'Sons of
    Israel' is more formally transparent to the Greek and preserves the traditional
    biblical idiom; alternatives are possible but less directly reflect the source
    wording.
