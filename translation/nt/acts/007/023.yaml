theological_decisions:
- issue: Gendered kinship and ethnic designation
  chosen_reading: his brothers, the sons of Israel
  alternative_readings:
  - his fellow Israelites
  - his brothers and sisters, the people of Israel
  rationale: No doctrinal dispute is at stake, but the translation philosophy calls
    for gender-accurate rendering where the Greek uses masculine representative language.
    Retaining 'brothers' and 'sons of Israel' preserves the source texture and familial
    covenantal language without importing a narrower claim than the Greek intends.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
