id: ACT.7.54
reference: Acts 7:54
source:
  edition: SBLGNT
  text: Ἀκούοντες δὲ ταῦτα διεπρίοντο ταῖς καρδίαις αὐτῶν καὶ ἔβρυχον τοὺς ὀδόντας
    ἐπ’ αὐτόν.
translation:
  text: Now when they heard these things, they were cut to the heart and gnashed their
    teeth at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were enraged in their hearts'; the Greek verb is literally 'were
      cut through,' preserving vivid imagery of intense inner agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούοντες
  chosen: when they heard
  alternatives:
  - hearing
  lexicon: BDAG
  rationale: A participle introducing the circumstance for the main verbs. 'When they
    heard' is natural English and preserves the temporal force better than a more
    wooden 'hearing.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ marks transition or development. 'Now' lightly signals narrative progression
    in readable English without overstating contrast.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these words
  lexicon: BDAG
  rationale: The plural demonstrative refers to Stephen's preceding speech. 'These
    things' is a standard and sufficiently literal rendering.
- source_word: διεπρίοντο
  chosen: they were cut to the heart
  alternatives:
  - they were enraged
  - they were sawn through in their hearts
  lexicon: BDAG
  rationale: The verb literally conveys being cut through, used idiomatically here
    for intense inner agitation. 'Cut to the heart' preserves the metaphor and communicates
    the emotional force in idiomatic English. 'Enraged' captures result but loses
    the imagery.
- source_word: ταῖς καρδίαις αὐτῶν
  chosen: to the heart
  alternatives:
  - in their hearts
  - in their inner being
  lexicon: BDAG
  rationale: The dative with the verb expresses the sphere affected. English idiom
    prefers singular in the expression 'cut to the heart,' though the Greek has plural
    'hearts.' This is a natural equivalent rather than a theological shift.
- source_word: ἔβρυχον τοὺς ὀδόντας
  chosen: gnashed their teeth
  alternatives:
  - ground their teeth
  lexicon: BDAG
  rationale: A conventional expression for rage. 'Gnashed their teeth' is both accurate
    and established English, preserving the vividness of the Greek.
- source_word: ἐπ’ αὐτόν
  chosen: at him
  alternatives:
  - against him
  - toward him
  lexicon: BDAG
  rationale: With verbs of hostile action, ἐπί here indicates direction of hostility.
    'At him' is the most natural English with 'gnashed their teeth.'
