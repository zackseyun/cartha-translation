id: ACT.7.43
reference: Acts 7:43
source:
  edition: SBLGNT
  text: καὶ ἀνελάβετε τὴν σκηνὴν τοῦ Μολὸχ καὶ τὸ ἄστρον τοῦ ⸀θεοῦ ⸀Ῥαιφάν, τοὺς τύπους
    οὓς ἐποιήσατε προσκυνεῖν αὐτοῖς. καὶ μετοικιῶ ὑμᾶς ἐπέκεινα Βαβυλῶνος.
translation:
  text: And you took up the tent of Moloch and the star of the god Rephan, the images
    that you made to worship them, and I will deport you beyond Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some translations, reflecting the Hebrew source in Amos 5:26, read 'your
      god Rephan' instead of 'the god Rephan.' Acts here reads 'the god Rephan.'
    reason: alternative_reading
  - marker: b
    text: Acts reads 'beyond Babylon.' In Amos 5:27 the source passage is commonly
      rendered 'beyond Damascus.'
    reason: cross_reference
  - marker: c
    text: Or 'figures' or 'representations' for 'images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνελάβετε
  chosen: you took up
  alternatives:
  - you carried
  - you lifted up
  lexicon: BDAG
  rationale: Aorist active indicative, here in Stephen's citation of Israel's idolatry.
    'Took up' is a natural rendering that preserves the sense of bearing/carrying
    cultic objects without overinterpreting the action.
- source_word: σκηνὴν
  chosen: tent
  alternatives:
  - tabernacle
  - shrine
  lexicon: BDAG
  rationale: σκηνή literally means 'tent.' 'Tabernacle' could misleadingly evoke the
    legitimate tabernacle of God; here the referent is an idolatrous portable shrine,
    so 'tent' best preserves the lexical sense while avoiding confusion. 'Shrine'
    is interpretive and therefore kept as an alternative only.
- source_word: Μολὸχ
  chosen: Moloch
  alternatives:
  - Molech
  lexicon: BDAG
  rationale: Proper name transliterated per translation philosophy. 'Moloch' is a
    standard English form; 'Molech' is also common and worth preserving as an alternative
    spelling.
- source_word: ἄστρον
  chosen: star
  alternatives:
  - star-image
  lexicon: BDAG
  rationale: The noun straightforwardly denotes a star. Because it is linked with
    idolatrous worship, some interpret it as a star-symbol or astral image, but the
    plain lexical value 'star' should stand in the main text.
- source_word: τοῦ θεοῦ Ῥαιφάν
  chosen: of the god Rephan
  alternatives:
  - of your god Rephan
  - of god Rephan
  lexicon: BDAG
  rationale: The Greek text here reads 'the god Rephan.' This differs from the Hebrew
    of Amos 5:26 ('your god'). Following original-language primacy for Acts, the main
    text reflects the Greek wording. The alternative 'your god Rephan' is preserved
    in a footnote because of the OT source background and translation tradition.
- source_word: Ῥαιφάν
  chosen: Rephan
  alternatives:
  - Raiphan
  - Rompha
  lexicon: BDAG
  rationale: Proper name transliterated from the Greek form in Acts. 'Rephan' is a
    standard English transliteration of Ῥαιφάν. Other forms reflect textual/traditional
    variation and the underlying Amos tradition.
- source_word: τύπους
  chosen: images
  alternatives:
  - figures
  - forms
  - representations
  lexicon: BDAG
  rationale: τύπος can mean pattern, form, or image. In this idolatry context, 'images'
    best communicates manufactured cultic representations in clear modern English.
- source_word: ἐποιήσατε
  chosen: you made
  alternatives:
  - you fashioned
  lexicon: BDAG
  rationale: Simple past rendering of the aorist, preserving the direct accusation
    that they themselves made these objects.
- source_word: προσκυνεῖν αὐτοῖς
  chosen: to worship them
  alternatives:
  - to bow down to them
  lexicon: BDAG
  rationale: προσκυνέω often literally means to bow down, but in religious contexts
    'worship' is the clearest idiomatic English equivalent. The dative pronoun αὐτοῖς
    is naturally rendered 'them,' referring to the idolatrous objects/deities.
- source_word: μετοικιῶ
  chosen: I will deport
  alternatives:
  - I will carry away into exile
  - I will remove into exile
  lexicon: BDAG
  rationale: Future active indicative with God as speaker, denoting forced relocation/exile.
    'Deport' is concise, modern, and preserves the judicial force better than the
    more archaic 'carry away.'
- source_word: ἐπέκεινα Βαβυλῶνος
  chosen: beyond Babylon
  alternatives:
  - beyond Babylonia
  lexicon: BDAG
  rationale: ἐπέκεινα means 'beyond' or 'on the far side of.' 'Babylon' follows the
    Greek text of Acts. Although Amos 5:27 in the Hebrew/LXX tradition is often rendered
    'beyond Damascus,' Acts here reads 'beyond Babylon,' which should be translated
    as given and noted as a source-related variation.
