theological_decisions:
- issue: Stephen's citation differs from the Amos source tradition in naming the destination
    of exile
  chosen_reading: beyond Babylon
  alternative_readings:
  - beyond Damascus
  rationale: The Greek text of Acts explicitly reads 'beyond Babylon,' and the translation
    should reflect the wording of Acts rather than harmonize it to Amos 5:27. The
    alternative is preserved in a footnote because readers may recognize the OT wording
    and because the difference is exegetically significant.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §3 (Preserve theological tension rather than resolve it)
