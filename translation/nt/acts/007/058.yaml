id: ACT.7.58
reference: Acts 7:58
source:
  edition: SBLGNT
  text: καὶ ἐκβαλόντες ἔξω τῆς πόλεως ἐλιθοβόλουν. καὶ οἱ μάρτυρες ἀπέθεντο τὰ ἱμάτια
    ⸀αὐτῶν παρὰ τοὺς πόδας νεανίου καλουμένου Σαύλου.
translation:
  text: And after they had driven him out of the city, they were stoning him. And
    the witnesses laid their outer garments at the feet of a young man called Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their garments' or 'their cloaks'; the Greek term refers broadly to
      outer clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλόντες
  chosen: after they had driven him out
  alternatives:
  - having cast him out
  - after they had thrown him out
  lexicon: BDAG
  rationale: Aorist participle preceding the main imperfect verb, best represented
    in English as prior action. 'Driven out' is natural modern English and preserves
    the force of forcible expulsion without sounding overly wooden.
- source_word: ἔξω τῆς πόλεως
  chosen: out of the city
  alternatives:
  - outside the city
  lexicon: BDAG
  rationale: Both are possible; 'out of the city' fits smoothly with ἐκβαλόντες and
    preserves the movement from within to outside.
- source_word: ἐλιθοβόλουν
  chosen: they were stoning him
  alternatives:
  - they stoned him
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action, so the progressive 'were stoning'
    better reflects the Greek aspect than a simple past.
- source_word: οἱ μάρτυρες
  chosen: the witnesses
  alternatives:
  - the accusers
  - those who testified
  lexicon: BDAG
  rationale: μάρτυρες here refers to legal witnesses in the execution context, not
    later Christian 'martyrs.' 'Witnesses' is the most direct and contextually accurate
    rendering.
- source_word: ἀπέθεντο
  chosen: laid
  alternatives:
  - set down
  - put aside
  lexicon: BDAG
  rationale: Middle voice here conveys the act of putting off or depositing clothing.
    'Laid' is concise and idiomatic with the following phrase 'at the feet of.'
- source_word: τὰ ἱμάτια αὐτῶν
  chosen: their outer garments
  alternatives:
  - their garments
  - their cloaks
  lexicon: BDAG
  rationale: ἱμάτια commonly refers to outer clothing. 'Outer garments' is slightly
    more precise than the generic 'garments' while remaining accessible. 'Cloaks'
    is possible but somewhat narrower.
- source_word: παρὰ τοὺς πόδας
  chosen: at the feet of
  alternatives:
  - beside the feet of
  - by the feet of
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering in English for depositing something
    in someone's custody or near their feet.
- source_word: νεανίου
  chosen: a young man
  alternatives:
  - a youth
  lexicon: BDAG
  rationale: νεανίας denotes a relatively young male. 'Young man' is natural modern
    English; 'youth' can sound either archaic or too juvenile.
- source_word: καλουμένου Σαύλου
  chosen: called Saul
  alternatives:
  - named Saul
  lexicon: BDAG
  rationale: The participle καλουμένου is commonly rendered 'called' or 'named.' 'Called
    Saul' is straightforward and preserves the Greek wording closely.
