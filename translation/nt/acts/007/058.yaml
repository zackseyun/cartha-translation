theological_decisions:
- issue: Identification of μάρτυρες in an execution setting
  chosen_reading: Rendered as 'witnesses' in the legal sense, not 'martyrs.'
  alternative_readings:
  - martyrs
  rationale: Although μάρτυς later develops the sense 'martyr,' in this narrative
    context it refers to those bearing witness in the judicial process and participating
    in the stoning. Translating 'martyrs' would import a later ecclesial sense not
    warranted by the immediate context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; do not import doctrinal claims the text does not make.'
