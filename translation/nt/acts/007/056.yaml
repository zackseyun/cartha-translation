id: ACT.7.56
reference: Acts 7:56
source:
  edition: SBLGNT
  text: καὶ εἶπεν· Ἰδοὺ θεωρῶ τοὺς οὐρανοὺς ⸀διηνοιγμένους καὶ τὸν υἱὸν τοῦ ἀνθρώπου
    ἐκ δεξιῶν ἑστῶτα τοῦ θεοῦ.
translation:
  text: And he said, “Look, I see the heavens opened, and the Son of Man standing
    at the right hand of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, I see the heavens having been opened.” The Greek uses a perfect
      passive participle, emphasizing the heavens as already opened in Stephen’s vision.
    reason: lexical_alternative
  - marker: b
    text: “The Son of Man” is a recognized messianic title, echoing Daniel 7:13.
    reason: cross_reference
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Rendered as the attention-getting interjection 'Look' to preserve the
    immediacy of Stephen's exclamation in readable modern English. 'Behold' is too
    archaic; 'See' is possible but less natural introducing direct speech.
- source_word: θεωρῶ
  chosen: I see
  alternatives:
  - I behold
  - I observe
  lexicon: BDAG
  rationale: Present tense indicates ongoing perception. 'I see' is the most natural
    modern equivalent and fits the visionary context without unnecessary elevation.
- source_word: τοὺς οὐρανοὺς
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: BDAG
  rationale: The Greek is plural, so 'the heavens' preserves the source form better
    than singular 'heaven.' 'The skies' would flatten the theological register of
    the vision.
- source_word: διηνοιγμένους
  chosen: opened
  alternatives:
  - having been opened
  - standing open
  lexicon: BDAG
  rationale: Perfect passive participle conveys a state resulting from opening. 'Opened'
    in English naturally communicates that resultant state without overloading the
    line; 'standing open' is interpretive.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is a fixed, theologically significant title used by Jesus and in
    apocalyptic contexts. It should be translated literally, preserving both its messianic
    resonance and its connection to Daniel 7.
- source_word: ἐκ δεξιῶν
  chosen: at the right hand
  alternatives:
  - at the right side
  - on the right
  lexicon: BDAG
  rationale: Idiomatic rendering for the Greek expression denoting the place of honor
    and authority. 'At the right hand' preserves the biblical idiom and its intertextual
    significance.
- source_word: ἑστῶτα
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: The participle from ἵστημι here denotes the Son of Man in a standing
    posture. 'Standing' is straightforward and preserves the notable contrast with
    passages that speak of him as seated.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Simple possessive/genitival construction best rendered directly. No expansion
    is warranted.
