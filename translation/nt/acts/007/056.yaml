theological_decisions:
- issue: Christological title υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: Retained the traditional literal rendering because it best reflects the
    Greek wording and preserves the title's Danielic and messianic force. 'The Human
    One' is possible as an interpretive gloss but weakens the recognized title and
    its intertextual resonance.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Posture of the exalted Jesus
  chosen_reading: standing at the right hand of God
  alternative_readings:
  - standing on the right side of God
  rationale: The text explicitly says 'standing,' and the translation preserves this
    rather than harmonizing to more common formulations about Christ being seated.
    This maintains the text's own theological tension and specificity.
  doctrine_reference: Translation philosophy §3
