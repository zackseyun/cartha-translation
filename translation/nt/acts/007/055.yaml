id: ACT.7.55
reference: Acts 7:55
source:
  edition: SBLGNT
  text: ὑπάρχων δὲ πλήρης πνεύματος ἁγίου ἀτενίσας εἰς τὸν οὐρανὸν εἶδεν δόξαν θεοῦ
    καὶ Ἰησοῦν ἑστῶτα ἐκ δεξιῶν τοῦ θεοῦ,
translation:
  text: But being full of the Holy Spirit, he gazed into heaven and saw the glory
    of God, and Jesus standing at the right hand of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'looked intently into heaven.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'at the right hand of God' is a biblical idiom for the place
      of highest honor and authority.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπάρχων
  chosen: being
  alternatives:
  - existing
  - being in a state of
  lexicon: BDAG
  rationale: The present participle introduces Stephen's ongoing state before the
    main action. 'Being' is natural English and preserves the circumstantial force
    without overtranslating.
- source_word: πλήρης πνεύματος ἁγίου
  chosen: full of the Holy Spirit
  alternatives:
  - full of Holy Spirit
  lexicon: BDAG
  rationale: This is a standard idiom for being filled with the Spirit. Including
    'the' before 'Holy Spirit' is idiomatic English and reflects personal reference
    rather than an impersonal quality.
- source_word: ἀτενίσας
  chosen: gazed
  alternatives:
  - looked intently
  - fixed his eyes
  lexicon: BDAG
  rationale: The aorist participle conveys focused, intent looking. 'Gazed' is concise
    and readable while preserving the intensity better than a simple 'looked'.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - into the sky
  - toward heaven
  lexicon: BDAG
  rationale: In this visionary context οὐρανός refers to heaven, not merely the visible
    sky. 'Into heaven' fits the scene and avoids flattening the supernatural dimension.
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - beheld
  lexicon: BDAG
  rationale: A straightforward past-tense rendering of the main verb. 'Saw' is clear
    modern English without archaic coloring.
- source_word: δόξαν θεοῦ
  chosen: the glory of God
  alternatives:
  - God's glory
  lexicon: BDAG
  rationale: The phrase denotes the visible manifestation of God's majesty. 'The glory
    of God' is the most transparent and traditional rendering here.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἑστῶτα
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι describes Jesus in a standing
    posture. 'Standing' is the natural English equivalent and preserves the vividness
    of the vision.
- source_word: ἐκ δεξιῶν τοῦ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - from the right hand of God
  - on the right side of God
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' the idiom ἐκ δεξιῶν in this context
    is best rendered 'at the right hand of.' This preserves the recognized biblical
    idiom of honor and authority in comprehensible English.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the hostile crowd in the preceding context.
    'But' brings out that contrast more clearly than a simple connective.
