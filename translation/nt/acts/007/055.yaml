theological_decisions:
- issue: Rendering πνεύματος ἁγίου as personal divine reference
  chosen_reading: the Holy Spirit
  alternative_readings:
  - holy spirit
  rationale: Given Luke-Acts usage and the immediate narrative context, the phrase
    refers to the divine person of the Spirit, not merely a holy disposition or impersonal
    force. Capitalization and the article in English communicate this clearly without
    adding doctrine beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Rendering Stephen's vision of Jesus at God's right hand
  chosen_reading: Jesus standing at the right hand of God
  alternative_readings:
  - Jesus standing from the right hand of God
  rationale: The wording preserves the text's distinction between God and Jesus while
    also retaining the exaltation imagery central to the passage. The idiom 'right
    hand of God' should be preserved rather than paraphrased away, since it carries
    biblical-theological significance of honor and authority.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
