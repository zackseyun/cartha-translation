id: ACT.7.19
reference: Acts 7:19
source:
  edition: SBLGNT
  text: οὗτος κατασοφισάμενος τὸ γένος ἡμῶν ἐκάκωσεν τοὺς ⸀πατέρας τοῦ ποιεῖν ⸂τὰ
    βρέφη ἔκθετα⸃ αὐτῶν εἰς τὸ μὴ ζῳογονεῖσθαι.
translation:
  text: This man, having dealt shrewdly with our people, mistreated our fathers by
    forcing their infants to be exposed so that they would not be kept alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having dealt craftily with our people.' The Greek participle emphasizes
      cunning or deceptive treatment.
    reason: lexical_alternative
  - marker: b
    text: That is, to abandon their babies by exposure, a practice intended to leave
      them to die.
    reason: cultural_note
  - marker: c
    text: Or 'our ancestors' for 'our fathers.' The Greek uses the traditional familial
      term for Israel's forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: In context Stephen is referring back to a specific king (Pharaoh). 'This
    man' is natural English and preserves the demonstrative force better than a bare
    'he.'
- source_word: κατασοφισάμενος
  chosen: having dealt shrewdly with
  alternatives:
  - having outwitted
  - having dealt craftily with
  - having exploited by cunning
  lexicon: BDAG
  rationale: The participle conveys cunning or crafty action directed against Israel.
    'Having dealt shrewdly with' preserves the adverbial participial sense without
    sounding archaic; 'shrewdly' here carries a negative sense from context.
- source_word: τὸ γένος ἡμῶν
  chosen: our people
  alternatives:
  - our race
  - our nation
  - our family line
  lexicon: BDAG
  rationale: γένος here refers to the ethnic people of Israel, not merely lineage.
    'Our people' is idiomatic modern English and avoids the potentially misleading
    modern connotations of 'race.'
- source_word: ἐκάκωσεν
  chosen: mistreated
  alternatives:
  - oppressed
  - harmed
  - ill-treated
  lexicon: BDAG
  rationale: The verb denotes causing harm or ill-treatment. 'Mistreated' fits the
    immediate context and avoids over-specifying political oppression, though that
    is implied.
- source_word: τοὺς πατέρας
  chosen: our fathers
  alternatives:
  - the fathers
  - our ancestors
  lexicon: BDAG
  rationale: The phrase refers to Israel's forefathers/ancestors. 'Our fathers' preserves
    the familial-historical language of the Greek; 'ancestors' is possible but less
    formally aligned with the source.
- source_word: τοῦ ποιεῖν
  chosen: by forcing
  alternatives:
  - to make
  - by causing
  - with the result that they made
  lexicon: BDAG
  rationale: 'The articular infinitive expresses means or result tied to Pharaoh''s
    mistreatment. ''By forcing'' makes explicit the coercive sense implied by the
    context: the fathers were compelled regarding their infants.'
- source_word: τὰ βρέφη
  chosen: their infants
  alternatives:
  - their babies
  - their newborns
  - their children
  lexicon: BDAG
  rationale: βρέφη refers to very young children, especially babies/infants. 'Infants'
    is precise and suitably dignified.
- source_word: ἔκθετα
  chosen: to be exposed
  alternatives:
  - to be cast out
  - to be abandoned
  - as exposed infants
  lexicon: BDAG
  rationale: The adjective refers to infants being exposed, that is, abandoned outdoors.
    'To be exposed' preserves the historical practice with concise wording; a footnote
    explains the cultural sense.
- source_word: εἰς τὸ μὴ ζῳογονεῖσθαι
  chosen: so that they would not be kept alive
  alternatives:
  - so that they would not survive
  - for them not to be preserved alive
  - so that they might not live
  lexicon: BDAG
  rationale: The construction expresses purpose/result. ζῳογονέω means to preserve
    alive or keep alive. 'Would not be kept alive' closely reflects the passive infinitive
    while remaining readable.
