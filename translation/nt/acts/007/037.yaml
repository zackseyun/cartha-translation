id: ACT.7.37
reference: Acts 7:37
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ὁ Μωϋσῆς ὁ ⸀εἴπας τοῖς υἱοῖς Ἰσραήλ· Προφήτην ὑμῖν ἀναστήσει ⸂ὁ
    θεὸς⸃ ἐκ τῶν ἀδελφῶν ὑμῶν ὡς ἐμέ.
translation:
  text: This is the Moses who said to the sons of Israel, ‘God will raise up for you
    a prophet from among your brothers, like me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the Prophet,' reflecting the well-known expectation
      from Deuteronomy 18:15 and its application to Jesus in Acts.
    reason: alternative_reading
  - marker: b
    text: '''Sons of Israel'' could also be rendered ''children of Israel'' or ''Israelites'';
      the Greek is specifically ''sons.'''
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' here refers to fellow Israelites; the Greek is masculine plural.'
    reason: cultural_note
lexical_decisions:
- source_word: οὗτός
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring emphatically back to Moses in Stephen's speech.
    'This' is natural English and preserves the identificational force.
- source_word: ὁ Μωϋσῆς
  chosen: the Moses
  alternatives:
  - Moses
  lexicon: BDAG
  rationale: 'The Greek article marks specific identification: ''this is the Moses.''
    Retaining ''the Moses'' in English best reflects the emphatic, contrastive force
    here, even though it is slightly marked English.'
- source_word: εἴπας
  chosen: who said
  alternatives:
  - the one who said
  lexicon: BDAG
  rationale: Aorist participle functioning attributively with ὁ Μωϋσῆς. Relative clause
    is the most natural English equivalent.
- source_word: τοῖς υἱοῖς Ἰσραήλ
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: BDAG
  rationale: Gender-accurate rendering preserves the lexical form υἱοῖς ('sons') and
    echoes the OT citation context. 'Israelites' is smoother but less formally transparent.
- source_word: Προφήτην
  chosen: a prophet
  lexicon: BDAG
  rationale: Anarthrous accusative in the cited statement; indefinite 'a prophet'
    is the straightforward rendering.
- source_word: ἀναστήσει
  chosen: will raise up
  alternatives:
  - will appoint
  lexicon: BDAG
  rationale: Standard rendering of ἀνίστημι in this prophetic context, preserving
    the verbal link to God's action of bringing forth a prophet.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: Subject of the verb in the citation. English normally omits the article
    with 'God' in this usage.
- source_word: ἐκ τῶν ἀδελφῶν ὑμῶν
  chosen: from among your brothers
  alternatives:
  - from your brothers
  - from among your brethren
  lexicon: BDAG
  rationale: ἐκ with the genitive indicates source from within the group. 'Brothers'
    is gender-accurate to the Greek and preserves the familial-national sense.
- source_word: ὡς ἐμέ
  chosen: like me
  alternatives:
  - as he raised me up
  lexicon: BDAG
  rationale: Comparative phrase in the Deuteronomy citation, indicating likeness to
    Moses. 'Like me' is the direct and idiomatic rendering.
