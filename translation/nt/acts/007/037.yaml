theological_decisions:
- issue: Quotation of Deuteronomy 18:15 and its messianic significance
  chosen_reading: Render the statement straightforwardly as Moses' prophecy of 'a
    prophet' without capitalizing or explicitly interpreting it as 'the Prophet' in
    the main text.
  alternative_readings:
  - '''the Prophet'''
  rationale: In Acts, the citation is christologically significant, but the Greek
    here has anarthrous Προφήτην and the translation should not import an interpretive
    conclusion beyond the wording. The messianic identification can be recognized
    by readers from context without being forced into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
