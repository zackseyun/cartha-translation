id: ACT.7.42
reference: Acts 7:42
source:
  edition: SBLGNT
  text: ἔστρεψεν δὲ ὁ θεὸς καὶ παρέδωκεν αὐτοὺς λατρεύειν τῇ στρατιᾷ τοῦ οὐρανοῦ,
    καθὼς γέγραπται ἐν βίβλῳ τῶν προφητῶν· Μὴ σφάγια καὶ θυσίας προσηνέγκατέ μοι ἔτη
    τεσσεράκοντα ἐν τῇ ἐρήμῳ, οἶκος Ἰσραήλ;
translation:
  text: 'But God turned away and gave them over to serve the host of heaven, just
    as it is written in the book of the prophets: ‘Did you offer me slain offerings
    and sacrifices for forty years in the wilderness, O house of Israel?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to worship the host of heaven.' The Greek verb can denote religious
      service or worship.
    reason: lexical_alternative
  - marker: b
    text: '''The host of heaven'' is a biblical expression for the heavenly bodies,
      and by extension the celestial powers associated with them in idolatrous worship.'
    reason: cultural_note
  - marker: c
    text: Quoted from Amos 5:25.
    reason: cross_reference
  - marker: d
    text: Or 'in the scroll of the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστρεψεν
  chosen: turned away
  alternatives:
  - turned
  - turned back
  lexicon: BDAG
  rationale: In this context, with God as subject and followed by judgment language
    ('gave them over'), the sense is not mere physical turning but relational withdrawal.
    'Turned away' makes the judicial nuance clear without overparaphrasing.
- source_word: παρέδωκεν
  chosen: gave them over
  alternatives:
  - handed them over
  - delivered them
  lexicon: BDAG
  rationale: This verb commonly carries the sense of judicial abandonment or handing
    over. 'Gave them over' is idiomatic modern English and preserves the severe judgment
    sense.
- source_word: λατρεύειν
  chosen: to serve
  alternatives:
  - to worship
  lexicon: BDAG
  rationale: λατρεύω can mean cultic service or worship. Here it refers to idolatrous
    religious devotion to heavenly bodies. 'Serve' preserves the verbal link to religious
    service while avoiding interpretive narrowing; the worship sense is preserved
    by context and footnote-worthy alternative.
- source_word: τῇ στρατιᾷ τοῦ οὐρανοῦ
  chosen: the host of heaven
  alternatives:
  - the army of heaven
  - the starry host
  lexicon: BDAG
  rationale: This is a standard biblical expression for the heavenly bodies or celestial
    powers worshiped idolatrously. 'Host of heaven' is the most natural and intertextually
    recognizable rendering.
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: A conventional citation formula. 'Just as' slightly strengthens the correspondence
    between Israel's conduct and the prophetic indictment.
- source_word: ἐν βίβλῳ τῶν προφητῶν
  chosen: in the book of the prophets
  alternatives:
  - in the scroll of the prophets
  lexicon: BDAG
  rationale: βίβλος can denote a scroll/book. 'Book' is standard readable English;
    'scroll' is possible historically but not necessary in the main text.
- source_word: Μὴ
  chosen: Did ... ?
  alternatives:
  - Surely ... not?
  - You did not ... did you?
  lexicon: BDAG
  rationale: μή introducing a question expects a negative answer. English idiom is
    best conveyed by 'Did you ... ?' in context, with the rhetorical force supplied
    by the quotation.
- source_word: σφάγια
  chosen: slain offerings
  alternatives:
  - slaughtered animals
  - victims
  lexicon: BDAG
  rationale: The noun refers to slaughtered sacrificial offerings. 'Slain offerings'
    preserves the sacrificial and slaughter-related nuance more closely than the broader
    'offerings' alone.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - sacrificial offerings
  lexicon: BDAG
  rationale: The standard rendering 'sacrifices' is clear and preserves the cultic
    sense.
- source_word: προσηνέγκατέ μοι
  chosen: offer me
  alternatives:
  - bring to me
  - present to me
  lexicon: BDAG
  rationale: In sacrificial contexts προσφέρω is naturally rendered 'offer.' The dative
    μοι is retained as 'me' rather than softened.
- source_word: ἔτη τεσσεράκοντα
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: BDAG
  rationale: English requires the preposition for smooth idiom in this temporal accusative
    construction.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: '''Wilderness'' is the standard biblical rendering and better evokes
    the Israel exodus setting than ''desert'' alone.'
- source_word: οἶκος Ἰσραήλ
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: BDAG
  rationale: The vocative force is best represented with 'O,' preserving the prophetic
    address and solemn tone.
