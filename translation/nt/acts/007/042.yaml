theological_decisions:
- issue: Divine action in judgment
  chosen_reading: God 'turned away and gave them over' is rendered as judicial abandonment
    to idolatrous service, without implying that God caused the idolatry itself.
  alternative_readings:
  - God merely permitted them to worship
  - God actively made them worship the host of heaven
  rationale: The paired verbs indicate divine judgment in response to prior rebellion.
    The translation preserves God's judicial handing over while avoiding wording that
    would suggest God positively authored their sin.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referent of 'host of heaven'
  chosen_reading: Rendered as a stock biblical phrase for celestial bodies/powers
    worshiped idolatrously.
  alternative_readings:
  - angels of heaven
  - the stars specifically
  rationale: In this prophetic citation context, the phrase points to astral/cosmic
    objects or powers of false worship. The translation keeps the traditional phrase
    rather than over-specifying the referent.
  doctrine_reference: Translation philosophy §1
