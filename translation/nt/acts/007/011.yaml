id: ACT.7.11
reference: Acts 7:11
source:
  edition: SBLGNT
  text: ἦλθεν δὲ λιμὸς ἐφ’ ὅλην τὴν ⸀Αἴγυπτον καὶ Χανάαν καὶ θλῖψις μεγάλη, καὶ οὐχ
    ηὕρισκον χορτάσματα οἱ πατέρες ἡμῶν·
translation:
  text: Now a famine came over all Egypt and Canaan, and great distress, and our fathers
    could not find food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Greek says 'our fathers,' referring to Israel's
      forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - occurred
  - fell
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι used idiomatically with λιμός; 'came' is natural English
    and preserves the eventive force without over-paraphrasing.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ marks narrative development. 'Now' signals transition smoothly in
    English without implying strong contrast.
- source_word: λιμὸς
  chosen: famine
  alternatives:
  - hunger
  - dearth
  lexicon: BDAG
  rationale: In this context λιμός denotes a widespread scarcity of food, best rendered
    'famine' rather than the more subjective 'hunger'.
- source_word: ἐφ’ ὅλην τὴν Αἴγυπτον καὶ Χανάαν
  chosen: over all Egypt and Canaan
  alternatives:
  - throughout all Egypt and Canaan
  - upon the whole of Egypt and Canaan
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys extension over a region. 'Over all Egypt
    and Canaan' is idiomatic and preserves the geographic scope.
- source_word: Χανάαν
  chosen: Canaan
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: θλῖψις μεγάλη
  chosen: great distress
  alternatives:
  - great affliction
  - severe hardship
  - great tribulation
  lexicon: BDAG
  rationale: θλῖψις here refers to severe hardship accompanying the famine, not specifically
    eschatological tribulation. 'Great distress' is clear modern English and fits
    the historical setting.
- source_word: οὐχ ηὕρισκον
  chosen: could not find
  alternatives:
  - were not finding
  - did not find
  lexicon: BDAG
  rationale: Imperfect indicates ongoing inability during the crisis. 'Could not find'
    captures the practical force better than a wooden past progressive.
- source_word: χορτάσματα
  chosen: food
  alternatives:
  - provisions
  - fodder
  - grain
  lexicon: BDAG
  rationale: χορτάσματα denotes food supplies/provisions. 'Food' is the broadest natural
    rendering; 'grain' is too narrow and 'fodder' could misleadingly suggest animal
    feed only.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Stephen is speaking of Israel's forefathers. Per translation philosophy,
    the masculine familial term is retained as 'fathers' rather than neutralized,
    since it matches the source and the patriarchal reference.
