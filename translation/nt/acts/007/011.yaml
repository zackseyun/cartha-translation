- issue: Gendered ancestral language
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek is explicitly masculine and refers to Israel's forefathers
    in salvation history. Following the project's gender-accurate policy, the masculine
    form is preserved rather than neutralized.
