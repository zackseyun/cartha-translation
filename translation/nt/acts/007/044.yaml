theological_decisions:
- issue: Referent of 'the one speaking to Moses'
  chosen_reading: Left implicit as 'the one speaking to Moses' rather than making
    the subject explicit as God or the Lord.
  alternative_readings:
  - God speaking to Moses
  - the Lord speaking to Moses
  rationale: The Greek uses a substantival participle without naming the speaker explicitly.
    To preserve the text's wording and avoid importing a more explicit identification
    than the verse itself states, the translation keeps the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
