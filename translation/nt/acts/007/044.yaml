id: ACT.7.44
reference: Acts 7:44
source:
  edition: SBLGNT
  text: Ἡ σκηνὴ τοῦ μαρτυρίου ἦν τοῖς πατράσιν ἡμῶν ἐν τῇ ἐρήμῳ, καθὼς διετάξατο ὁ
    λαλῶν τῷ Μωϋσῇ ποιῆσαι αὐτὴν κατὰ τὸν τύπον ὃν ἑωράκει,
translation:
  text: The tent of testimony was with our fathers in the wilderness, just as the
    one speaking to Moses directed him to make it according to the pattern that he
    had seen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tabernacle of testimony.'
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' The Greek says 'our fathers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the one who spoke to Moses' or 'God/the Lord speaking to Moses.' The
      Greek leaves the speaker implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: σκηνὴ
  chosen: tent
  alternatives:
  - tabernacle
  lexicon: BDAG
  rationale: Rendered as 'tent' for transparent, ordinary English that reflects the
    basic sense of a portable dwelling/shrine. 'Tabernacle' is traditional but more
    ecclesiastical; the source does not require the specialized term here.
- source_word: τοῦ μαρτυρίου
  chosen: of testimony
  alternatives:
  - of the testimony
  - of witness
  lexicon: BDAG
  rationale: Kept the genitive construction closely as 'of testimony.' This reflects
    the established biblical expression for the sanctuary associated with God's testimony/covenant
    witness, while remaining understandable in English.
- source_word: ἦν ... ἐν τῇ ἐρήμῳ
  chosen: was with our fathers in the wilderness
  alternatives:
  - was among our fathers in the wilderness
  lexicon: BDAG
  rationale: The dative 'to/with our fathers' is idiomatically conveyed as 'with our
    fathers.' 'In the wilderness' renders ἐν τῇ ἐρήμῳ in its standard biblical-geographical
    sense.
- source_word: πατράσιν ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Retained 'our fathers' because the Greek is explicitly masculine and
    refers to the forefathers of Israel. This follows the gender-accurate principle
    rather than flattening to a neutral term, though 'ancestors' is a possible interpretive
    alternative.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks correspondence between the wilderness tent
    and the divine instruction given to Moses.'
- source_word: διετάξατο
  chosen: directed
  alternatives:
  - commanded
  - instructed
  lexicon: BDAG
  rationale: Rendered with 'directed' to capture authoritative instruction without
    sounding overly stiff. The middle form here does not require a special reflexive
    rendering in English.
- source_word: ὁ λαλῶν τῷ Μωϋσῇ
  chosen: the one speaking to Moses
  alternatives:
  - he who spoke to Moses
  - the one who spoke to Moses
  lexicon: BDAG
  rationale: Translated substantivally and transparently. 'The one speaking to Moses'
    preserves the participial form and leaves the referent reverently implicit, as
    in the Greek.
- source_word: ποιῆσαι αὐτὴν
  chosen: to make it
  alternatives:
  - to construct it
  lexicon: BDAG
  rationale: Simple, natural rendering of the infinitive plus object, adequate for
    the context of building the sanctuary.
- source_word: κατὰ τὸν τύπον
  chosen: according to the pattern
  alternatives:
  - according to the model
  - according to the form
  lexicon: BDAG
  rationale: '''Pattern'' is the most idiomatic rendering in this Exodus/tabernacle
    context and reflects the idea of a divinely shown prototype.'
- source_word: ὃν ἑωράκει
  chosen: that he had seen
  alternatives:
  - which he had seen
  lexicon: BDAG
  rationale: Pluperfect sense is brought out with 'had seen,' referring to Moses'
    prior vision of the pattern.
