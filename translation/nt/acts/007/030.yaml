theological_decisions:
- issue: Nature of the appearing figure (ἄγγελος) in a theophanic context
  chosen_reading: Render ἄγγελος as 'an angel' without importing a stronger identification
    in the main text.
  alternative_readings:
  - the angel of the Lord
  - a messenger
  rationale: The Greek text here reads simply ἄγγελος, not 'the angel of the Lord.'
    Because the verse itself does not specify more, the translation should not import
    a fuller theological identification from Exodus or later interpretation. The broader
    canonical connection may be noted in a footnote rather than resolved in the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
