id: ACT.7.30
reference: Acts 7:30
source:
  edition: SBLGNT
  text: Καὶ πληρωθέντων ἐτῶν τεσσεράκοντα ὤφθη αὐτῷ ἐν τῇ ἐρήμῳ τοῦ ὄρους Σινᾶ ⸀ἄγγελος
    ἐν φλογὶ πυρὸς βάτου·
translation:
  text: And after forty years had been fulfilled, an angel appeared to him in the
    wilderness of Mount Sinai, in a flame of fire from a bush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when forty years were completed.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in a flame of fire of a bush'; that is, the flame was associated
      with a bush, echoing Exodus 3:2.
    reason: cross_reference
  - marker: c
    text: Some interpreters connect this with 'the angel of the Lord' in Exodus 3:2,
      but Acts here says simply 'an angel.'
    reason: alternative_reading
lexical_decisions:
- source_word: πληρωθέντων ἐτῶν τεσσεράκοντα
  chosen: after forty years had been fulfilled
  alternatives:
  - when forty years were completed
  - after forty years had passed
  lexicon: BDAG
  rationale: The genitive absolute marks temporal circumstance. 'Had been fulfilled'
    preserves the verbal force of πληρόω more closely than the idiomatic 'had passed,'
    while still reading naturally in English.
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: The passive form of ὁράω commonly functions as an intransitive divine-appearance
    expression, best rendered 'appeared' in English rather than the wooden 'was seen.'
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Simple dative indirect object referring to Moses in context; 'to him'
    is the natural English equivalent.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος can mean either 'desert' or 'wilderness.' 'Wilderness' better
    matches biblical geographic style and the Exodus setting without overstating aridity.
- source_word: τοῦ ὄρους Σινᾶ
  chosen: of Mount Sinai
  alternatives:
  - of the mountain Sinai
  lexicon: BDAG
  rationale: Standard English idiom for the genitival construction naming the mountain.
- source_word: ἄγγελος
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: BDAG
  rationale: In this theophanic narrative, the referent is a heavenly being, not a
    human envoy. 'Angel' is the contextually appropriate and conventional rendering.
- source_word: ἐν φλογὶ πυρὸς
  chosen: in a flame of fire
  alternatives:
  - in fiery flame
  - in the flame of a fire
  lexicon: BDAG
  rationale: This preserves the vivid imagery and the double expression without flattening
    it. The phrase modifies the manner/location of the appearance.
- source_word: βάτου
  chosen: from a bush
  alternatives:
  - of a bush
  - in a bush
  lexicon: BDAG
  rationale: The genitive after 'flame of fire' is somewhat compressed in Greek. In
    English, 'from a bush' best conveys the source/origin of the flame in the burning-bush
    scene and aligns with the Exodus background.
