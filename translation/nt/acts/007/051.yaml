id: ACT.7.51
reference: Acts 7:51
source:
  edition: SBLGNT
  text: Σκληροτράχηλοι καὶ ἀπερίτμητοι ⸀καρδίαις καὶ τοῖς ὠσίν, ὑμεῖς ἀεὶ τῷ πνεύματι
    τῷ ἁγίῳ ἀντιπίπτετε, ὡς οἱ πατέρες ὑμῶν καὶ ὑμεῖς.
translation:
  text: You stiff-necked people, uncircumcised in hearts and ears, you always resist
    the Holy Spirit; as your fathers did, so do you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''your ancestors.'' Greek: ''your fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Σκληροτράχηλοι
  chosen: stiff-necked
  alternatives:
  - stubborn
  - hard-necked
  lexicon: BDAG
  rationale: Retains the vivid metaphor and its strong biblical resonance from the
    Greek and Septuagintal idiom, rather than flattening it to the interpretive 'stubborn.'
- source_word: ἀπερίτμητοι
  chosen: uncircumcised
  alternatives:
  - uninitiated
  - impure
  lexicon: BDAG
  rationale: The literal covenantal term should be preserved because Stephen is invoking
    prophetic language about inward rebellion, not merely general impurity.
- source_word: καρδίαις
  chosen: in hearts
  alternatives:
  - in your hearts
  lexicon: BDAG
  rationale: Rendered with 'in' to express the dative of respect/sphere idiomatically
    in English. The possessive is implied by address and need not be repeated because
    'you' frames the clause.
- source_word: τοῖς ὠσίν
  chosen: and ears
  alternatives:
  - and in ears
  - and in your ears
  lexicon: BDAG
  rationale: 'Paired with ''in hearts'' as a coordinated dative of respect: ''uncircumcised
    in hearts and ears.'' This preserves the metaphor of inward and outward unresponsiveness.'
- source_word: ἀεὶ
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Straightforward temporal adverb indicating persistent pattern.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the definite phrase; capitalized as
    the personal divine referent in context.
- source_word: ἀντιπίπτετε
  chosen: resist
  alternatives:
  - oppose
  - set yourselves against
  lexicon: BDAG
  rationale: Conveys active opposition without overexpansion. 'Resist' is idiomatic
    and fits the prophetic accusation.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  lexicon: BDAG
  rationale: Introduces comparison between the present audience and their ancestors.
- source_word: οἱ πατέρες ὑμῶν
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: BDAG
  rationale: Kept as 'fathers' to match the masculine familial term in the Greek and
    to preserve the rhetorical force of Stephen's accusation, in line with the gender-accurate
    policy.
- source_word: καὶ ὑμεῖς
  chosen: so do you
  alternatives:
  - you also
  - and you
  lexicon: BDAG
  rationale: 'English idiom completes the comparison naturally: ''as your fathers
    did, so do you.'' This makes explicit the implied verbal parallel without adding
    new content.'
