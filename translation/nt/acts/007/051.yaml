theological_decisions:
- issue: Reference of 'the Holy Spirit'
  chosen_reading: Personal divine Holy Spirit
  alternative_readings:
  - holy spirit as a more general divine influence or disposition
  rationale: In Acts, the phrase with article and adjective normally refers to the
    Holy Spirit personally. Capitalization reflects orthodox and contextual reading
    without adding content beyond the Greek phrase.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Rendering of covenantal insult imagery
  chosen_reading: Preserve 'uncircumcised' metaphor in hearts and ears
  alternative_readings:
  - Interpretive rendering such as 'closed-hearted and deaf'
  rationale: The text intentionally echoes prophetic covenant language and should
    not be reduced to a generic psychological description. Preserving the metaphor
    maintains theological continuity with Israel's Scriptures.
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: Gendered ancestral term
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Greek explicitly uses the masculine plural 'fathers.' Per gender-accurate
    policy, the translation keeps the source's form rather than neutralizing it, while
    the context still clearly refers to prior generations of Israel.
  doctrine_reference: 'Translation philosophy #4'
