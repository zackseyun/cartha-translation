theological_decisions:
- issue: Rendering of πατέρες in Israel's ancestral history
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The phrase is not merely generic lineage but Stephen's covenant-historical
    identification with Israel's forefathers. The masculine term should be preserved
    where it reflects the source's intent rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
