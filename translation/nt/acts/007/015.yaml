id: ACT.7.15
reference: Acts 7:15
source:
  edition: SBLGNT
  text: ⸂καὶ κατέβη⸃ Ἰακὼβ εἰς Αἴγυπτον. καὶ ἐτελεύτησεν αὐτὸς καὶ οἱ πατέρες ἡμῶν,
translation:
  text: And Jacob went down into Egypt, and he died, he and our fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Greek says 'our fathers,' referring to Israel's
      forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  chosen: went down
  alternatives:
  - went
  - came down
  lexicon: BDAG
  rationale: καταβαίνω literally means 'go down/come down.' 'Went down' preserves
    the directional nuance present in the Greek and matches the conventional geographic
    idiom for travel to Egypt.
- source_word: Ἰακώβ
  chosen: Jacob
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: εἰς Αἴγυπτον
  chosen: into Egypt
  alternatives:
  - to Egypt
  lexicon: BDAG
  rationale: εἰς commonly marks movement into a place. 'Into Egypt' slightly more
    closely reflects the preposition than simple 'to Egypt,' while remaining natural
    English.
- source_word: ἐτελεύτησεν
  chosen: died
  alternatives:
  - came to the end of his life
  - passed away
  lexicon: BDAG
  rationale: τελευτάω is a standard verb for dying. 'Died' is the clearest and most
    direct modern English equivalent; euphemistic alternatives are less transparent.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek and is retained. In context it serves
    to identify Jacob before adding 'and our fathers'; simple 'he' is natural English,
    while the appositional repetition 'he and our fathers' preserves the Greek structure.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: πατέρες is literally 'fathers.' In Stephen's speech it refers to the
    patriarchal forefathers of Israel. Per gender-accurate philosophy, 'our fathers'
    is preferred over the more generic 'our ancestors,' since the masculine familial-historical
    reference is intended.
