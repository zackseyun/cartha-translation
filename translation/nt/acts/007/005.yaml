id: ACT.7.5
reference: Acts 7:5
source:
  edition: SBLGNT
  text: καὶ οὐκ ἔδωκεν αὐτῷ κληρονομίαν ἐν αὐτῇ οὐδὲ βῆμα ποδός, καὶ ἐπηγγείλατο δοῦναι
    αὐτῷ εἰς κατάσχεσιν αὐτὴν καὶ τῷ σπέρματι αὐτοῦ μετ’ αὐτόν, οὐκ ὄντος αὐτῷ τέκνου.
translation:
  text: And he gave him no inheritance in it, not even a footstep, but promised to
    give it to him as a possession, and to his offspring after him, though he had
    no child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "not even a foot of ground." The Greek expression is an idiom for the
      smallest possible portion of land.
    reason: lexical_alternative
  - marker: b
    text: Or, "when he had no child." The Greek construction can be taken temporally,
      though the context strongly supports the concessive sense, "though he had no
      child."
    reason: alternative_reading
lexical_decisions:
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - heritage
  - property
  lexicon: BDAG
  rationale: '"Inheritance" best preserves the covenantal and legal sense of a received
    allotment in the land, fitting the Abrahamic context better than the more general
    "property."'
- source_word: οὐδὲ βῆμα ποδός
  chosen: not even a footstep
  alternatives:
  - not even a foot of ground
  - not even a step of a foot
  lexicon: BDAG
  rationale: The Greek is literally "not even a step/footstep of a foot," an idiom
    for the smallest piece of land. "Not even a footstep" keeps the vividness and
    compactness of the idiom while remaining natural English. The more interpretive
    "not even a foot of ground" is possible but moves further from the wording.
- source_word: ἐπηγγείλατο
  chosen: promised
  alternatives:
  - made a promise
  lexicon: BDAG
  rationale: The middle verb here is naturally rendered "promised" in idiomatic English;
    this preserves the divine commitment without unnecessary expansion.
- source_word: εἰς κατάσχεσιν
  chosen: as a possession
  alternatives:
  - for a possession
  - for ownership
  lexicon: BDAG
  rationale: '"As a possession" communicates the resultative force of εἰς with κατάσχεσις
    in clear modern English and fits the land-promise context.'
- source_word: σπέρματι
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: BDAG
  rationale: '"Offspring" is singular in form but collective in sense, matching the
    Greek well and preserving the Abrahamic promise language without sounding overly
    archaic like "seed" or overly pluralized like "descendants."'
- source_word: μετ’ αὐτόν
  chosen: after him
  alternatives:
  - afterward
  - after Abraham
  lexicon: BDAG
  rationale: '"After him" is the most direct and natural rendering, indicating subsequent
    succession of Abraham''s offspring.'
- source_word: οὐκ ὄντος αὐτῷ τέκνου
  chosen: though he had no child
  alternatives:
  - when he had no child
  - although he had no child
  lexicon: BDAG
  rationale: 'The genitive absolute gives the circumstance accompanying the promise.
    "Though he had no child" brings out the concessive force that is contextually
    prominent: the promise was given despite Abraham''s childlessness.'
- source_word: τέκνου
  chosen: child
  alternatives:
  - offspring
  - son
  lexicon: BDAG
  rationale: τέκνον is broader than "son" and in this clause refers to Abraham's lack
    of any child at the time, so "child" is the most accurate rendering.
