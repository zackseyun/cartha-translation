theological_decisions:
- issue: Concessive nuance of Abraham's childlessness at the time of the promise
  chosen_reading: though he had no child
  alternative_readings:
  - when he had no child
  rationale: The participial construction could be rendered more neutrally as temporal
    ("when"), but in Stephen's argument the striking point is that God promised the
    land and offspring despite Abraham's present lack of a child. Rendering it concessively
    preserves the rhetorical force without adding doctrine beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
