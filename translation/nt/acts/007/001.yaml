id: ACT.7.1
reference: Acts 7:1
source:
  edition: SBLGNT
  text: Εἶπεν δὲ ὁ ἀρχιερεύς· ⸀Εἰ ταῦτα οὕτως ἔχει;
translation:
  text: Then the high priest said, “Are these things so?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is this so?” or more explicitly, “Are these charges true?”
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said.' Although the clause
    introduces a question, English commonly uses 'said' before direct questions, preserving
    the Greek narrative form without overinterpreting.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' gives a natural English transition
    and fits the flow from the accusations in the previous context.
- source_word: ἀρχιερεύς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: The standard and contextually precise rendering for ἀρχιερεύς in this
    judicial setting is 'high priest.' 'Chief priest' would suggest the broader priestly
    leadership rather than the singular presiding figure.
- source_word: Εἰ
  chosen: Are
  alternatives:
  - If
  lexicon: BDAG
  rationale: Although εἰ is formally 'if,' in direct questions it commonly introduces
    an interrogative equivalent to 'whether' or an English yes/no question. Rendering
    it as 'Are' produces idiomatic English while preserving the force of the question.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these charges
  - this
  lexicon: BDAG
  rationale: The demonstrative plural refers back to the accusations just reported.
    'These things' is formally close and sufficiently clear; 'these charges' is interpretive
    and therefore left as an alternative rather than adopted in the main text.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: οὕτως here affirms the manner or state of affairs alleged. 'So' is the
    most natural concise English equivalent in this judicial question.
- source_word: ἔχει
  chosen: are
  alternatives:
  - stand
  - are the case
  lexicon: BDAG
  rationale: ἔχω in the idiom οὕτως ἔχει means 'to be so' or 'to be the case.' English
    'are' in 'Are these things so?' best captures the idiomatic sense.
