id: ACT.7.4
reference: Acts 7:4
source:
  edition: SBLGNT
  text: τότε ἐξελθὼν ἐκ γῆς Χαλδαίων κατῴκησεν ἐν Χαρράν. κἀκεῖθεν μετὰ τὸ ἀποθανεῖν
    τὸν πατέρα αὐτοῦ μετῴκισεν αὐτὸν εἰς τὴν γῆν ταύτην εἰς ἣν ὑμεῖς νῦν κατοικεῖτε,
translation:
  text: Then, after he had gone out from the land of the Chaldeans, he settled in
    Haran. And from there, after his father died, God moved him into this land in
    which you now live,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he moved him'; the Greek does not state the subject explicitly, though
      the context indicates God.
    reason: lexical_alternative
  - marker: b
    text: Stephen says this move happened after his father died. Compare Genesis 11:32;
      12:4 for the related chronology.
    reason: cross_reference
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in Stephen's retelling;
    'Then' is natural and sufficiently formal.
- source_word: ἐξελθὼν
  chosen: after he had gone out
  alternatives:
  - having gone out
  - when he went out
  - after leaving
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb κατῴκησεν is best rendered
    with antecedent time in English. 'After he had gone out' preserves sequence clearly.
- source_word: ἐκ γῆς Χαλδαίων
  chosen: from the land of the Chaldeans
  alternatives:
  - out of the land of the Chaldeans
  - from Chaldea
  lexicon: BDAG
  rationale: γῆ with ethnic genitive is naturally 'land of the Chaldeans.' This preserves
    the fuller expression rather than compressing it to 'Chaldea.'
- source_word: κατῴκησεν
  chosen: he settled
  alternatives:
  - he lived
  - he dwelt
  lexicon: BDAG
  rationale: '''Settled'' captures κατοικέω as taking up residence, with readable
    modern English. ''Dwelt'' is too archaic; ''lived'' is possible but less specific.'
- source_word: ἐν Χαρράν
  chosen: in Haran
  alternatives:
  - at Haran
  lexicon: BDAG
  rationale: Standard transliteration of the place name; 'in Haran' is the normal
    English rendering for residence in a place.
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - and from there
  - from there
  lexicon: BDAG
  rationale: The crasis combines καί + ἐκεῖθεν. Rendering both elements preserves
    the narrative linkage.
- source_word: μετὰ τὸ ἀποθανεῖν
  chosen: after ... died
  alternatives:
  - after the death of
  - after ... had died
  lexicon: BDAG
  rationale: The articular infinitive with μετά expresses temporal sequence. English
    finite clause is the clearest equivalent.
- source_word: τὸν πατέρα αὐτοῦ
  chosen: his father
  lexicon: BDAG
  rationale: Straightforward possessive construction.
- source_word: μετῴκισεν αὐτὸν
  chosen: God moved him
  alternatives:
  - he moved him
  - he resettled him
  - he transferred him
  lexicon: BDAG
  rationale: The verb μετοικίζω means to cause someone to move or resettle. The explicit
    subject 'God' is not stated in Greek but is the understood subject from the preceding
    context (v. 3) and is commonly supplied in English for clarity; 'moved him' is
    idiomatic and accurate. 'Resettled' is possible but sounds bureaucratic in English.
- source_word: εἰς τὴν γῆν ταύτην
  chosen: into this land
  alternatives:
  - to this land
  - into this country
  lexicon: BDAG
  rationale: εἰς indicates movement into; 'land' matches γῆ and fits the biblical-geographical
    context better than 'country.'
- source_word: εἰς ἣν ὑμεῖς νῦν κατοικεῖτε
  chosen: in which you now live
  alternatives:
  - where you now live
  - in which you now dwell
  lexicon: BDAG
  rationale: Although Greek repeats εἰς before the relative clause, idiomatic English
    uses 'in which.' 'Live' is preferred over 'dwell' for modern readability while
    preserving sense.
