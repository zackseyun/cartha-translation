theological_decisions:
- issue: Supplying the subject of μετῴκισεν
  chosen_reading: 'Explicitly supply ''God'' in English: ''God moved him'''
  alternative_readings:
  - Leave the subject implicit as 'he moved him'
  rationale: The Greek verb is third singular without an expressed subject, but the
    discourse context identifies God as the actor in Stephen's speech. Supplying 'God'
    avoids ambiguity in English and does not import a new claim beyond the immediate
    context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Chronological tension with Genesis regarding Terah's death and Abram's move
  chosen_reading: Translate the Greek as written without harmonizing
  alternative_readings:
  - Alter wording to harmonize with Genesis chronology
  rationale: The translation should preserve Stephen's wording and narrative sequence
    as presented in Acts rather than smoothing an apparent chronological tension by
    paraphrase.
  doctrine_reference: Translation philosophy §1, §3
