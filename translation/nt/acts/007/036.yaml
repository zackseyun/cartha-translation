id: ACT.7.36
reference: Acts 7:36
source:
  edition: SBLGNT
  text: οὗτος ἐξήγαγεν αὐτοὺς ποιήσας τέρατα καὶ σημεῖα ἐν ⸀γῇ Αἰγύπτῳ καὶ ἐν Ἐρυθρᾷ
    Θαλάσσῃ καὶ ἐν τῇ ἐρήμῳ ἔτη τεσσεράκοντα.
translation:
  text: This man led them out, performing wonders and signs in the land of Egypt and
    in the Red Sea and in the wilderness for forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Reed Sea.' The Greek text reads 'Red Sea' (Ἐρυθρὰ Θάλασσα), the standard
      New Testament and Septuagint designation for the place of Israel's crossing.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: The demonstrative is emphatic in Stephen's speech, pointing back to Moses.
    'This man' preserves the rhetorical force better than the flatter 'he,' while
    remaining natural English.
- source_word: ἐξήγαγεν
  chosen: led ... out
  alternatives:
  - brought ... out
  lexicon: BDAG
  rationale: The verb means to lead or bring out. 'Led them out' is idiomatic and
    fits the exodus context, preserving the sense of Moses as the agent through whom
    God delivered Israel.
- source_word: ποιήσας
  chosen: performing
  alternatives:
  - having done
  - doing
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous in sense with the main action
    in narrative summary. 'Performing' gives smooth English while retaining the participial
    relationship to Moses' leading them out.
- source_word: τέρατα καὶ σημεῖα
  chosen: wonders and signs
  alternatives:
  - miracles and signs
  - portents and signs
  lexicon: BDAG
  rationale: This common Lukan pair is conventionally and accurately rendered 'wonders
    and signs.' It preserves the distinction between awe-producing acts (τέρατα) and
    evidentiary signs (σημεῖα) without over-paraphrase.
- source_word: ἐν γῇ Αἰγύπτῳ
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: BDAG
  rationale: 'Including ''land of'' reflects γῇ and preserves the triadic geographic
    structure: Egypt, Red Sea, wilderness.'
- source_word: ἐν Ἐρυθρᾷ Θαλάσσῃ
  chosen: in the Red Sea
  alternatives:
  - at the Red Sea
  - in the Reed Sea
  lexicon: BDAG
  rationale: Ἐρυθρὰ Θάλασσα is the standard Greek designation used in the New Testament
    and Septuagintal tradition. 'Red Sea' is the established and most recognizable
    English rendering. 'At the Red Sea' is possible contextually, but 'in' follows
    the repeated ἐν structure. 'Reed Sea' reflects Hebrew background but is not the
    plain sense of the Greek phrase here, so it is preserved in a footnote rather
    than adopted in the main text.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: '''Wilderness'' better matches biblical usage for Israel''s wandering
    and avoids suggesting only sandy desert terrain.'
- source_word: ἔτη τεσσεράκοντα
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: BDAG
  rationale: English normally supplies 'for' to express duration. This makes explicit
    the temporal extent of the wilderness signs without adding interpretive content.
