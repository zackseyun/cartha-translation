theological_decisions:
- issue: Nature of Israel's turning to Egypt
  chosen_reading: 'Rendered as an inward turning of desire and allegiance rather than
    a physical return alone: ''turned back in their hearts to Egypt.'''
  alternative_readings:
  - turned in their hearts toward Egypt
  - returned to Egypt in their hearts
  rationale: The explicit phrase 'in their hearts' indicates an internal reorientation,
    echoing Israel's desire to reverse the exodus. The translation preserves this
    theological and narrative tension without over-interpreting it as merely metaphorical
    or fully literal.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
