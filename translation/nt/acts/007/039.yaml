id: ACT.7.39
reference: Acts 7:39
source:
  edition: SBLGNT
  text: ᾧ οὐκ ἠθέλησαν ὑπήκοοι γενέσθαι οἱ πατέρες ἡμῶν, ἀλλὰ ἀπώσαντο καὶ ἐστράφησαν
    ⸂ἐν ταῖς καρδίαις⸃ αὐτῶν εἰς Αἴγυπτον,
translation:
  text: Our fathers were unwilling to become obedient to him, but rejected him and
    turned back in their hearts to Egypt,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pushed him away.' The Greek verb can more literally suggest thrusting
      Moses aside.
    reason: lexical_alternative
  - marker: b
    text: That is, they inwardly longed to return to Egypt even while still in the
      wilderness.
    reason: cultural_note
lexical_decisions:
- source_word: ᾧ
  chosen: to him
  alternatives:
  - whom
  - to whom
  lexicon: BDAG
  rationale: 'Dative singular relative pronoun referring back to Moses in the previous
    verse. In English, the sense is best carried as the object of obedience: ''obedient
    to him'' rather than a more wooden ''to whom'' in the running text.'
- source_word: ἠθέλησαν
  chosen: were unwilling
  alternatives:
  - did not want
  - did not wish
  lexicon: BDAG
  rationale: θέλω denotes willing/wishing. With οὐκ, the phrase expresses refusal
    of will, stronger and more idiomatic in context as 'were unwilling' than the flatter
    'did not want.'
- source_word: ὑπήκοοι γενέσθαι
  chosen: to become obedient
  alternatives:
  - to obey
  - to become subject
  lexicon: BDAG
  rationale: The construction literally means 'to become obedient/obedient ones.'
    'Become obedient' preserves both the adjective ὑπήκοοι and infinitive γενέσθαι
    better than simply 'obey,' while remaining natural English.
- source_word: οἱ πατέρες ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Stephen is speaking of Israel's forefathers. 'Our fathers' is the more
    direct and source-near rendering; 'ancestors' is possible but less gender-accurate
    relative to the Greek wording.
- source_word: ἀπώσαντο
  chosen: rejected him
  alternatives:
  - pushed away
  - thrust aside
  lexicon: BDAG
  rationale: The middle verb conveys repudiation of Moses. 'Rejected him' communicates
    the relational force clearly in modern English; 'pushed away' is more literal
    but less idiomatic here.
- source_word: ἐστράφησαν
  chosen: turned back
  alternatives:
  - turned
  - returned
  lexicon: BDAG
  rationale: In context the verb indicates reversal toward Egypt. 'Turned back' captures
    the sense of reverting, not merely turning in a neutral sense.
- source_word: ἐν ταῖς καρδίαις αὐτῶν
  chosen: in their hearts
  alternatives:
  - in their inner selves
  - in their minds
  lexicon: BDAG
  rationale: καρδία in biblical usage commonly denotes the inner person, including
    desire and intention. 'In their hearts' preserves the biblical idiom and fits
    the contrast between outward location and inward longing.
- source_word: εἰς Αἴγυπτον
  chosen: to Egypt
  alternatives:
  - toward Egypt
  - back to Egypt
  lexicon: BDAG
  rationale: εἰς marks direction toward Egypt. Because 'turned back' already supplies
    the notion of return, the simpler 'to Egypt' avoids redundancy while preserving
    the directional sense.
