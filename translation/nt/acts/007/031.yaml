id: ACT.7.31
reference: Acts 7:31
source:
  edition: SBLGNT
  text: ὁ δὲ Μωϋσῆς ἰδὼν ⸀ἐθαύμασεν τὸ ὅραμα. προσερχομένου δὲ αὐτοῦ κατανοῆσαι ἐγένετο
    φωνὴ ⸀κυρίου·
translation:
  text: 'When Moses saw it, he marveled at the sight. And as he came near to look
    closely, a voice of the Lord came:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vision.' The Greek term can denote a visible appearance or vision;
      here 'the sight' was chosen because Moses is reacting to the visible phenomenon
      of the bush.
    reason: lexical_alternative
  - marker: b
    text: Or 'there came a voice of the Lord.'
    reason: lexical_alternative
  - marker: c
    text: Some readers may expect 'the LORD' because this scene echoes Exodus 3; the
      Greek text here reads 'Lord' (κύριος).
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν
  chosen: saw it
  alternatives:
  - having seen
  - saw
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning temporally prior to the main verb.
    'Saw it' gives natural English and makes explicit the object from the following
    phrase without overtranslating.
- source_word: ἐθαύμασεν
  chosen: marveled
  alternatives:
  - was amazed
  - wondered
  lexicon: BDAG
  rationale: θαυμάζω here expresses astonishment. 'Marveled' preserves the sense of
    wonder with slightly elevated but still readable diction appropriate to narrative.
- source_word: τὸ ὅραμα
  chosen: the sight
  alternatives:
  - the vision
  - the spectacle
  lexicon: BDAG
  rationale: Although ὅραμα can mean 'vision,' in this context Moses is looking at
    the burning bush in an outward event, not necessarily an inward revelatory trance.
    'The sight' fits the immediate narrative context and idiomatic English.
- source_word: προσερχομένου
  chosen: as he came near
  alternatives:
  - as he approached
  - while he was coming near
  lexicon: BDAG
  rationale: Genitive absolute with αὐτοῦ, expressing attendant circumstance/time.
    'As he came near' is smooth and preserves the movement toward the bush.
- source_word: κατανοῆσαι
  chosen: to look closely
  alternatives:
  - to examine
  - to observe carefully
  - to consider
  lexicon: BDAG
  rationale: κατανοέω means to notice carefully or examine attentively. 'To look closely'
    is natural in context and captures the visual focus of Moses approaching the phenomenon.
- source_word: ἐγένετο φωνὴ
  chosen: a voice came
  alternatives:
  - there came a voice
  - a voice was heard
  lexicon: BDAG
  rationale: The idiom ἐγένετο + noun often introduces an event. 'A voice came' is
    concise and reflects the Greek eventive construction; 'was heard' would add an
    auditory nuance not explicit in the wording.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' With φωνὴ κυρίου,
    English idiom favors 'a voice of the Lord' rather than anarthrous 'a voice of
    Lord.' The capitalization reflects title usage.
