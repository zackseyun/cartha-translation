theological_decisions:
- issue: Rendering of κύριος in a theophanic context
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The source has κύριος, not the Tetragrammaton. Following the project's
    contested-terms guidance, κύριος is rendered 'Lord.' Because the scene alludes
    to the Exodus theophany associated with YHWH, 'the LORD' is a possible interpretive
    rendering, but the Greek form itself is best represented by 'the Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
