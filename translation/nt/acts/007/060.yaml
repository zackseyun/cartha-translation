theological_decisions:
- issue: Rendering the death euphemism ἐκοιμήθη
  chosen_reading: he fell asleep
  alternative_readings:
  - he died
  rationale: The Greek uses a sleep metaphor for Stephen's death. Preserving the metaphor
    reflects the text's own idiom and its theological tone without overstating a doctrine
    beyond the verse itself.
  doctrine_reference: 'Translation philosophy #3, #6'
- issue: Address of Κύριε in Stephen's prayer
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The vocative is addressed to Jesus in context (cf. previous verse). 'Lord'
    preserves the christological title and aligns with the doctrine default for κύριος
    without importing additional doctrinal explanation into the translation.
  doctrine_reference: 'Contested terms: κύριος → Lord'
