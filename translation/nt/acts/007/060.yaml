id: ACT.7.60
reference: Acts 7:60
source:
  edition: SBLGNT
  text: θεὶς δὲ τὰ γόνατα ἔκραξεν φωνῇ μεγάλῃ· Κύριε, μὴ στήσῃς αὐτοῖς ⸂ταύτην τὴν
    ἁμαρτίαν⸃· καὶ τοῦτο εἰπὼν ἐκοιμήθη.
translation:
  text: Then, kneeling down, he cried out with a loud voice, “Lord, do not hold this
    sin against them.” And after saying this, he fell asleep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “do not charge them with this sin” or “do not count this sin to them.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek: “fell asleep,” a customary expression for death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὶς δὲ τὰ γόνατα
  chosen: Then, kneeling down
  alternatives:
  - And kneeling down
  - Having placed his knees
  lexicon: BDAG
  rationale: The idiom literally means 'having put the knees,' i.e., kneeling. 'Kneeling
    down' gives the natural English equivalent while preserving the physical action.
    δέ is rendered as 'Then' to mark narrative progression.
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  chosen: he cried out with a loud voice
  alternatives:
  - he shouted loudly
  - he cried out in a loud voice
  lexicon: BDAG
  rationale: κράζω denotes a loud cry or shout. The dative phrase φωνῇ μεγάλῃ is retained
    explicitly as 'with a loud voice' rather than compressed to an adverb, preserving
    the emphatic wording.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this prayer addressed
    to the exalted Jesus, 'Lord' best preserves both reverence and established NT
    title usage.
- source_word: μὴ στήσῃς αὐτοῖς ταύτην τὴν ἁμαρτίαν
  chosen: do not hold this sin against them
  alternatives:
  - do not charge them with this sin
  - do not count this sin to them
  lexicon: BDAG
  rationale: στήσῃς from ἵστημι here carries the sense of setting or placing to someone's
    account. 'Hold this sin against them' is idiomatic modern English that preserves
    the forensic sense without sounding archaic. 'This sin' keeps the demonstrative
    ταύτην explicit.
- source_word: καὶ τοῦτο εἰπὼν
  chosen: And after saying this
  alternatives:
  - And having said this
  - And when he had said this
  lexicon: BDAG
  rationale: The participial construction is rendered with smooth English temporal
    sequence while preserving the connection to the preceding prayer.
- source_word: ἐκοιμήθη
  chosen: he fell asleep
  alternatives:
  - he died
  - he was put to sleep
  lexicon: BDAG
  rationale: κοιμάομαι is a conventional euphemism for death in early Christian usage.
    'He fell asleep' preserves the metaphor present in the Greek and its resonance
    in Acts, rather than flattening it to 'he died'.
