id: ACT.7.2
reference: Acts 7:2
source:
  edition: SBLGNT
  text: ὁ δὲ ἔφη· Ἄνδρες ἀδελφοὶ καὶ πατέρες, ἀκούσατε· Ὁ θεὸς τῆς δόξης ὤφθη τῷ πατρὶ
    ἡμῶν Ἀβραὰμ ὄντι ἐν τῇ Μεσοποταμίᾳ πρὶν ἢ κατοικῆσαι αὐτὸν ἐν Χαρράν,
translation:
  text: 'And he said, “Brothers and fathers, listen: the God of glory appeared to
    our father Abraham when he was in Mesopotamia, before he lived in Haran.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Men, brothers, and fathers.” The Greek vocative formula is explicitly
      masculine and formal.
    reason: lexical_alternative
  - marker: b
    text: Or “before he settled in Haran.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: And he said
  alternatives:
  - Then he said
  - But he said
  lexicon: BDAG
  rationale: A standard narrative introduction. δέ is lightly connective here; 'And
    he said' is natural English while preserving discourse continuity.
- source_word: Ἄνδρες ἀδελφοὶ καὶ πατέρες
  chosen: Brothers and fathers
  alternatives:
  - Men, brothers, and fathers
  - Brothers, fathers
  lexicon: BDAG
  rationale: This is a formal address to the Sanhedrin/audience. Although ἄνδρες can
    be rendered 'men,' in this collocation it functions as part of the vocative formula
    rather than adding separate semantic content in English. 'Brothers and fathers'
    preserves the relational force and reads naturally. Because the Greek is explicitly
    masculine, the rendering remains gender-accurate rather than gender-neutral.
- source_word: ἀκούσατε
  chosen: listen
  alternatives:
  - hear
  - listen to me
  lexicon: BDAG
  rationale: Imperative calling for attention. 'Listen' is idiomatic modern English
    and sufficiently direct.
- source_word: Ὁ θεὸς τῆς δόξης
  chosen: the God of glory
  alternatives:
  - the glorious God
  lexicon: BDAG
  rationale: The genitive is best preserved formally as 'of glory.' This also echoes
    biblical diction and may allude to OT language without flattening it into an adjectival
    paraphrase.
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - revealed himself
  lexicon: BDAG
  rationale: Aorist passive of ὁράω in the common sense 'appeared' in divine-appearance
    contexts. 'Revealed himself' is interpretive; 'appeared' is closer to the Greek.
- source_word: τῷ πατρὶ ἡμῶν Ἀβραὰμ
  chosen: to our father Abraham
  alternatives:
  - to Abraham our father
  lexicon: BDAG
  rationale: Both are possible in English. The chosen order is natural and preserves
    the communal identification Stephen makes with Abraham.
- source_word: ὄντι ἐν τῇ Μεσοποταμίᾳ
  chosen: when he was in Mesopotamia
  alternatives:
  - while he was in Mesopotamia
  - being in Mesopotamia
  lexicon: BDAG
  rationale: The participle is temporal/circumstantial. 'When he was in Mesopotamia'
    is clear, natural, and faithful.
- source_word: πρὶν ἢ κατοικῆσαι αὐτὸν ἐν Χαρράν
  chosen: before he lived in Haran
  alternatives:
  - before he settled in Haran
  - before he dwelt in Haran
  lexicon: BDAG
  rationale: κατοικέω means to live, settle, or dwell in a place. 'Lived' is the most
    accessible default; 'settled' is possible but slightly more interpretive regarding
    permanence. 'Haran' is the standard English transliteration of Χαρράν.
