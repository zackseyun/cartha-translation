theological_decisions:
- issue: Rendering of the audience address with masculine terms
  chosen_reading: Brothers and fathers
  alternative_readings:
  - Men, brothers, and fathers
  rationale: Following the gender-accurate principle, the masculine vocative is not
    neutralized. At the same time, the idiomatic English formula omits a wooden separate
    rendering of ἄνδρες because its force is absorbed in the formal address.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of the divine title θεὸς τῆς δόξης
  chosen_reading: the God of glory
  alternative_readings:
  - the glorious God
  rationale: The more formal rendering preserves the genitival structure and possible
    intertextual resonance, avoiding an unnecessary interpretive smoothing.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
