id: ACT.7.6
reference: Acts 7:6
source:
  edition: SBLGNT
  text: ἐλάλησεν ⸀δὲ οὕτως ὁ θεὸς ὅτι ἔσται τὸ σπέρμα αὐτοῦ πάροικον ἐν γῇ ἀλλοτρίᾳ,
    καὶ δουλώσουσιν αὐτὸ καὶ κακώσουσιν ἔτη τετρακόσια·
translation:
  text: 'But God spoke in this way: that his offspring would be a foreign resident
    in a strange land, and they would enslave it and mistreat it for four hundred
    years.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or more idiomatically, ''his descendants would be foreigners in a strange
      land, and they would enslave them and mistreat them for four hundred years.''
      The Greek uses a collective singular: ''offspring ... it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν δὲ οὕτως
  chosen: But God spoke in this way
  alternatives:
  - And God spoke thus
  - But God said this
  lexicon: BDAG
  rationale: δέ is rendered 'But' to continue Stephen's speech with mild contrast/development.
    οὕτως is kept explicitly ('in this way') rather than absorbed, preserving the
    formal introduction to the quotation/allusion.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering; the article is not reproduced in English idiom.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: Introduces the content of what God spoke; 'that' is the most natural
    and sufficiently formal English complementizer here.
- source_word: ἔσται
  chosen: would be
  alternatives:
  - will be
  - was to be
  lexicon: BDAG
  rationale: Future in indirect discourse after a past main verb is naturally rendered
    in English with 'would be.' This preserves the prospective sense relative to the
    time of speaking.
- source_word: τὸ σπέρμα αὐτοῦ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: BDAG
  rationale: σπέρμα here is collective, referring to Abraham's posterity. 'Offspring'
    preserves the singular collective force better than 'descendants,' while avoiding
    the less natural literalism 'seed' in modern English.
- source_word: πάροικον
  chosen: a foreign resident
  alternatives:
  - a sojourner
  - an alien
  - a stranger
  lexicon: BDAG
  rationale: πάροικος denotes one residing in a place not one's own, a temporary or
    non-native resident. 'Foreign resident' communicates both residence and outsider
    status in accessible modern English.
- source_word: ἐν γῇ ἀλλοτρίᾳ
  chosen: in a strange land
  alternatives:
  - in a foreign land
  - in another's land
  lexicon: BDAG
  rationale: ἀλλοτρίᾳ emphasizes belonging to another/being foreign. 'Strange land'
    is idiomatic and traditional enough, while still conveying foreignness. The sense
    is not merely geographically different but not their own.
- source_word: δουλώσουσιν αὐτὸ
  chosen: they would enslave it
  alternatives:
  - they will enslave it
  - they would make it a slave
  - they would enslave them
  lexicon: BDAG
  rationale: δουλόω is best rendered 'enslave,' preserving the bonded nature in line
    with the project's treatment of the doul- word group. αὐτό is singular, agreeing
    with the collective singular 'offspring'; English keeps the singular pronoun for
    formal correspondence.
- source_word: κακώσουσιν
  chosen: mistreat
  alternatives:
  - afflict
  - oppress
  - harm
  lexicon: BDAG
  rationale: κακόω here refers to causing suffering or ill-treatment. 'Mistreat' is
    clear modern English and broad enough to include oppression without over-specifying.
- source_word: ἔτη τετρακόσια
  chosen: for four hundred years
  alternatives:
  - four hundred years
  lexicon: BDAG
  rationale: English idiom normally supplies 'for' with a duration expression after
    these verbs, though the Greek accusative of extent has no preposition.
