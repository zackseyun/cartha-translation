theological_decisions:
- issue: Rendering of the collective singular pronouns for Abraham's seed
  chosen_reading: Kept the collective singular in the main text ('his offspring ...
    enslave it ... mistreat it')
  alternative_readings:
  - 'Shift to plural for natural English: ''his descendants ... enslave them ... mistreat
    them'''
  rationale: The Greek uses singular collective language (σπέρμα ... αὐτό). Preserving
    the singular maintains the wording of the Abrahamic promise tradition and avoids
    smoothing away a significant textual feature. Because English readers may find
    the singular pronoun unusual, the more idiomatic plural is preserved in a footnote.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §1
    (original-language primacy over translation tradition)
