id: ACT.7.38
reference: Acts 7:38
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ὁ γενόμενος ἐν τῇ ἐκκλησίᾳ ἐν τῇ ἐρήμῳ μετὰ τοῦ ἀγγέλου τοῦ λαλοῦντος
    αὐτῷ ἐν τῷ ὄρει Σινᾶ καὶ τῶν πατέρων ἡμῶν, ὃς ἐδέξατο ⸀λόγια ζῶντα δοῦναι ⸀ἡμῖν,
translation:
  text: This is the one who was in the assembly in the wilderness with the angel who
    was speaking to him on Mount Sinai, and with our fathers; he received living oracles
    to give to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congregation'; traditionally 'church in the wilderness.'
    reason: alternative_reading
  - marker: b
    text: Or 'living words' or 'life-giving oracles.'
    reason: lexical_alternative
  - marker: c
    text: '''Our fathers'' refers to Israel''s forefathers; some translations render
      this more generally as ''our ancestors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  chosen: assembly
  alternatives:
  - congregation
  - church
  lexicon: BDAG
  rationale: Rendered as 'assembly' to reflect the basic sense of a gathered people
    without importing later institutional 'church' associations into Israel in the
    wilderness. 'Congregation' is possible, but 'assembly' is more natural modern
    English while remaining close to the Greek.
- source_word: ἐρήμῳ
  chosen: wilderness
  alternatives:
  - desert
  lexicon: BDAG
  rationale: '''Wilderness'' best matches the biblical setting of Israel''s wandering
    and is the standard contextual sense here; ''desert'' is narrower and less idiomatic
    in this salvation-historical context.'
- source_word: ἀγγέλου
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: In this Sinai context and in Acts 7, the referent is best understood
    as an angelic being rather than a human messenger, so 'angel' is the most direct
    rendering.
- source_word: λαλοῦντος
  chosen: who was speaking
  alternatives:
  - speaking
  - who spoke
  lexicon: BDAG
  rationale: The participle is rendered with an English relative clause for naturalness.
    The imperfective force is preserved with 'was speaking,' showing the ongoing action
    in the scene.
- source_word: ὄρει Σινᾶ
  chosen: Mount Sinai
  alternatives:
  - the mountain Sinai
  lexicon: BDAG
  rationale: Standard English idiom for the place name; this is a straightforward
    contextual equivalent.
- source_word: πατέρων ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Retained 'fathers' because the Greek is explicitly masculine and refers
    to the patriarchal forebears of Israel. This follows the gender-accurate policy
    rather than flattening to a gender-neutral term in the main text.
- source_word: ἐδέξατο
  chosen: received
  alternatives:
  - accepted
  lexicon: BDAG
  rationale: '''Received'' is the standard and most transparent rendering here, fitting
    Moses as the recipient of divine revelation.'
- source_word: λόγια
  chosen: oracles
  alternatives:
  - words
  - utterances
  - sayings
  lexicon: BDAG
  rationale: λόγια often denotes divine utterances rather than ordinary speech. 'Oracles'
    preserves the sacred, revelatory sense better than the flatter 'words,' while
    remaining understandable in context.
- source_word: ζῶντα
  chosen: living
  alternatives:
  - alive
  - life-giving
  lexicon: BDAG
  rationale: The participle directly means 'living.' While 'life-giving' is an interpretive
    possibility, 'living' better preserves the text's wording and theological vividness
    without overexplaining.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - for giving
  - to deliver
  lexicon: BDAG
  rationale: The infinitive is best taken as expressing purpose/result with Moses
    receiving the oracles in order to give them to the people. 'To give' is simple
    and sufficiently precise.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - to our people
  lexicon: BDAG
  rationale: Rendered literally as 'to us,' preserving Stephen's identification of
    his audience with Israel's covenant history.
- source_word: ὁ γενόμενος
  chosen: the one who was
  alternatives:
  - the one who came to be
  - the one who was present
  lexicon: BDAG
  rationale: This participial expression identifies Moses as the one who came to be
    in that setting, idiomatically rendered 'the one who was' in English. 'Was present'
    is interpretive; 'came to be' is too wooden here.
