theological_decisions:
- issue: Whether ἐκκλησίᾳ should be rendered 'church' in reference to Israel in the
    wilderness
  chosen_reading: assembly
  alternative_readings:
  - church
  - congregation
  rationale: The verse refers to Israel gathered in the wilderness, not to the later
    new-covenant church as an institution. Rendering ἐκκλησία as 'assembly' preserves
    lexical continuity without importing ecclesiological conclusions the text itself
    does not require.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether λόγια ζῶντα should be rendered more interpretively as 'life-giving
    words'
  chosen_reading: living oracles
  alternative_readings:
  - living words
  - life-giving oracles
  rationale: 'The Greek wording is compact and theologically rich. ''Living oracles''
    preserves the source''s tension: the utterances are characterized as living, without
    forcing a narrower interpretation such as merely ''life-giving.'''
  doctrine_reference: Translation philosophy §3
