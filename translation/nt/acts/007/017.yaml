id: ACT.7.17
reference: Acts 7:17
source:
  edition: SBLGNT
  text: Καθὼς δὲ ἤγγιζεν ὁ χρόνος τῆς ἐπαγγελίας ἧς ⸀ὡμολόγησεν ὁ θεὸς τῷ Ἀβραάμ,
    ηὔξησεν ὁ λαὸς καὶ ἐπληθύνθη ἐν Αἰγύπτῳ,
translation:
  text: But as the time of the promise that God had made to Abraham was drawing near,
    the people increased and multiplied in Egypt,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the promise that God had promised to Abraham' or 'the promise that God
      had pledged to Abraham.' The Greek verb here can denote a declared commitment;
      'had made' is used for natural English in the expression 'made a promise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθὼς δὲ
  chosen: But as
  alternatives:
  - Now as
  - And as
  lexicon: BDAG
  rationale: Καθώς introduces a temporal clause ('as/when'), while δέ marks a mild
    transition. 'But as' preserves both the temporal sense and the discourse movement
    without overstating contrast.
- source_word: ἤγγιζεν
  chosen: was drawing near
  alternatives:
  - approached
  - was nearing
  lexicon: BDAG
  rationale: Imperfect tense suggests an in-progress approach rather than a simple
    punctiliar event. 'Was drawing near' captures the progressive aspect naturally
    in English.
- source_word: ὁ χρόνος
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: BDAG
  rationale: χρόνος here refers generally to time rather than a more specialized 'appointed
    time' term such as καιρός. 'The time' is sufficiently precise and avoids importing
    nuance not explicit in the Greek.
- source_word: τῆς ἐπαγγελίας
  chosen: of the promise
  alternatives:
  - of the pledged promise
  lexicon: BDAG
  rationale: 'ἐπαγγελία is straightforwardly ''promise.'' The genitive is best rendered
    directly: ''the time of the promise.'''
- source_word: ἧς
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: 'The relative pronoun refers back to ''promise.'' English idiom prefers
    ''that'' in this restrictive clause: ''the promise that God had made...''.'
- source_word: ὡμολόγησεν
  chosen: had made
  alternatives:
  - had promised
  - had pledged
  - had sworn
  lexicon: BDAG
  rationale: Although ὁμολογέω commonly means 'confess' or 'acknowledge,' in this
    context with 'promise' and dative recipient it carries the sense of making or
    declaring a promise. 'Had made' fits the collocation 'made a promise' in English.
    'Had sworn' would overtranslate, since the verb is not specifically ὀμνύω.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. No article needs to be represented in English
    here.
- source_word: τῷ Ἀβραάμ
  chosen: to Abraham
  lexicon: BDAG
  rationale: Dative indirect object after the verb of promising/declaration is naturally
    rendered 'to Abraham.' Personal name is transliterated per project philosophy.
- source_word: ηὔξησεν ὁ λαὸς
  chosen: the people increased
  alternatives:
  - the people grew
  - the people became numerous
  lexicon: BDAG
  rationale: Greek places the verb first, but natural English prefers subject before
    verb. λαός in this context refers to Israel as a collective people; 'the people
    increased' preserves both the collective sense and the verbal distinction from
    the following verb.
- source_word: καὶ ἐπληθύνθη
  chosen: and multiplied
  alternatives:
  - and became numerous
  lexicon: BDAG
  rationale: Using 'multiplied' preserves the lexical distinction from ηὔξησεν ('increased/grew')
    and echoes biblical language about Israel's growth without becoming archaic.
- source_word: ἐν Αἰγύπτῳ
  chosen: in Egypt
  lexicon: BDAG
  rationale: Simple locative phrase. Standard transliteration 'Egypt' for Αἴγυπτος.
