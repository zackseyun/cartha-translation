theological_decisions:
- issue: Rendering of ὡμολόγησεν in relation to God's promise to Abraham
  chosen_reading: translated as 'had made' within the phrase 'the promise that God
    had made to Abraham'
  alternative_readings:
  - had promised
  - had pledged
  - had sworn
  rationale: The verse concerns the Abrahamic promise and its approaching fulfillment.
    Rendering the verb within the English collocation 'made a promise' communicates
    the sense clearly without importing the stronger oath-language of 'sworn.' This
    preserves the text's focus on divine promise rather than expanding it into a separate
    doctrinal claim about oath-taking.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
