theological_decisions:
- issue: Referent and nature of the requested structure in Stephen's summary of Israel's
    history
  chosen_reading: Rendered σκήνωμα as 'a dwelling place' rather than the more technical
    'tabernacle' or 'temple.'
  alternative_readings:
  - a tabernacle for the God of Jacob
  - a house for the God of Jacob
  rationale: The Greek term itself is broader than the later technical temple terminology
    and fits Stephen's compressed retelling, where David desires a place for God and
    Solomon later builds the house. The translation preserves that narrative tension
    rather than resolving it into one specific structure too early.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
