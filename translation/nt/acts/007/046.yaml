id: ACT.7.46
reference: Acts 7:46
source:
  edition: SBLGNT
  text: ὃς εὗρεν χάριν ἐνώπιον τοῦ θεοῦ καὶ ᾐτήσατο εὑρεῖν σκήνωμα τῷ ⸀θεῷ Ἰακώβ.
translation:
  text: who found favor before God and asked to find a dwelling place for the God
    of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a tabernacle for the God of Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν χάριν
  chosen: found favor
  alternatives:
  - found grace
  lexicon: BDAG
  rationale: The idiom χάριν εὑρίσκειν commonly means to obtain favor rather than
    to discover 'grace' as an abstract noun. 'Found favor' is natural English and
    preserves the relational sense.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: ἐνώπιον with the genitive denotes being before or in the sight of someone.
    'Before God' is concise and idiomatic here.
- source_word: ᾐτήσατο
  chosen: asked
  alternatives:
  - requested
  - petitioned
  lexicon: BDAG
  rationale: The middle form here conveys making a request. 'Asked' is clear modern
    English without overstating formality.
- source_word: εὑρεῖν
  chosen: to find
  alternatives:
  - to provide
  - to secure
  lexicon: BDAG
  rationale: The infinitive is formally 'to find.' Although context implies obtaining
    or making provision, the Greek wording is best preserved with 'to find' in this
    speech.
- source_word: σκήνωμα
  chosen: a dwelling place
  alternatives:
  - a tabernacle
  - a habitation
  - a tent-dwelling
  lexicon: BDAG
  rationale: σκήνωμα denotes a dwelling place or habitation. 'Dwelling place' communicates
    the sense clearly in modern English. 'Tabernacle' is possible, but here Stephen
    is speaking broadly of a place for God, and the next verse names Solomon's temple,
    so a less technical term avoids prematurely narrowing the reference.
- source_word: τῷ θεῷ Ἰακώβ
  chosen: for the God of Jacob
  alternatives:
  - for Jacob's God
  lexicon: BDAG
  rationale: The dative after σκήνωμα is naturally rendered with 'for.' 'The God of
    Jacob' preserves the covenantal phrasing familiar from Scripture and reflects
    the genitive Ἰακώβ.
