id: ACT.7.13
reference: Acts 7:13
source:
  edition: SBLGNT
  text: καὶ ἐν τῷ δευτέρῳ ⸀ἀνεγνωρίσθη Ἰωσὴφ τοῖς ἀδελφοῖς αὐτοῦ, καὶ φανερὸν ἐγένετο
    τῷ Φαραὼ τὸ ⸀γένος Ἰωσήφ.
translation:
  text: And on the second visit Joseph made himself known to his brothers, and Joseph’s
    family became known to Pharaoh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Joseph was recognized by his brothers.' The Greek verb
      is passive, but in context it likely refers to Joseph revealing his identity
      to them.
    reason: lexical_alternative
  - marker: b
    text: Or 'Joseph’s kindred' or 'Joseph’s lineage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ δευτέρῳ
  chosen: on the second visit
  alternatives:
  - on the second time
  - during the second occasion
  lexicon: BDAG
  rationale: The articular adjective functions idiomatically for 'on the second occasion.'
    'Visit' is supplied in English because the context is Joseph's brothers' repeated
    coming to Egypt; this makes the sense clear without over-paraphrasing.
- source_word: ἀνεγνωρίσθη
  chosen: made himself known
  alternatives:
  - was recognized
  - was made known
  lexicon: BDAG
  rationale: Although formally passive ('was recognized' / 'was made known'), in the
    Joseph narrative the sense is that Joseph disclosed his identity to his brothers
    on the second encounter. 'Made himself known' best captures the event in natural
    English and aligns with the narrative background.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The referent is Joseph's male siblings in the Genesis narrative, so 'brothers'
    is both literal and gender-accurate.
- source_word: φανερὸν ἐγένετο
  chosen: became known
  alternatives:
  - became evident
  - was made clear
  lexicon: BDAG
  rationale: The predicate adjective with γίνομαι expresses coming into public knowledge.
    'Became known' is concise and idiomatic.
- source_word: γένος
  chosen: family
  alternatives:
  - kindred
  - race
  - lineage
  lexicon: BDAG
  rationale: Here γένος refers to Joseph's kin group or family relations becoming
    known to Pharaoh. 'Family' is the clearest modern English rendering; 'kindred'
    is more formal, while 'race' would mislead modern readers.
- source_word: τῷ Φαραώ
  chosen: to Pharaoh
  alternatives:
  - before Pharaoh
  lexicon: BDAG
  rationale: The dative naturally marks the one to whom the matter became known. 'To
    Pharaoh' is straightforward and preserves the relation.
