id: ACT.7.18
reference: Acts 7:18
source:
  edition: SBLGNT
  text: ἄχρι οὗ ἀνέστη βασιλεὺς ἕτερος ⸂ἐπ’ Αἴγυπτον⸃, ὃς οὐκ ᾔδει τὸν Ἰωσήφ.
translation:
  text: until another king arose over Egypt, who did not know Joseph.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came to power over Egypt.' The Greek verb literally means 'arose.'
    reason: lexical_alternative
  - marker: b
    text: '''Did not know Joseph'' may also imply ''did not acknowledge'' or ''did
      not regard'' Joseph.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι οὗ
  chosen: until
  alternatives:
  - up to the time when
  - until the time when
  lexicon: BDAG
  rationale: 'The phrase marks a temporal limit: the preceding situation continued
    up to the point when a new ruler came to power. Simple ''until'' is natural English
    and preserves the temporal force.'
- source_word: ἀνέστη
  chosen: arose
  alternatives:
  - appeared
  - came to power
  - rose up
  lexicon: BDAG
  rationale: From ἀνίστημι, here used idiomatically of the emergence of a ruler. 'Arose'
    preserves the verbal imagery and echoes biblical style without becoming archaic.
    'Came to power' is interpretive and slightly more dynamic.
- source_word: βασιλεὺς
  chosen: king
  alternatives:
  - ruler
  lexicon: BDAG
  rationale: The standard meaning is 'king.' Although 'ruler' could communicate political
    authority, 'king' is the direct lexical equivalent and fits the historical setting.
- source_word: ἕτερος
  chosen: another
  alternatives:
  - a different
  - another of a different kind
  lexicon: BDAG
  rationale: ἕτερος distinguishes this king from the previous one. 'Another' is the
    most natural English rendering here; the nuance of difference is sufficiently
    conveyed by context without overtranslating.
- source_word: ἐπ’ Αἴγυπτον
  chosen: over Egypt
  alternatives:
  - in Egypt
  - against Egypt
  lexicon: BDAG
  rationale: With βασιλεύς, ἐπί + accusative can denote rule over a territory. 'Over
    Egypt' best expresses dominion. 'In Egypt' is possible but weaker, and 'against
    Egypt' does not fit the context.
- source_word: οὐκ ᾔδει
  chosen: did not know
  alternatives:
  - did not acknowledge
  - was not acquainted with
  - did not recognize
  lexicon: BDAG
  rationale: The verb οἶδα literally means 'know.' In context it may imply lack of
    regard or acknowledgment, but the text itself states simply that he 'did not know'
    Joseph. This preserves the source wording and leaves the fuller implication to
    context.
- source_word: τὸν Ἰωσήφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
