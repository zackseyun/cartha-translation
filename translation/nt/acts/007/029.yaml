id: ACT.7.29
reference: Acts 7:29
source:
  edition: SBLGNT
  text: ἔφυγεν δὲ Μωϋσῆς ἐν τῷ λόγῳ τούτῳ, καὶ ἐγένετο πάροικος ἐν γῇ Μαδιάμ, οὗ ἐγέννησεν
    υἱοὺς δύο.
translation:
  text: So Moses fled at this word, and became a sojourner in the land of Midian,
    where he fathered two sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of this statement.' The Greek phrase 'at this word' can be understood
      as the immediate cause of Moses' flight.
    reason: lexical_alternative
  - marker: b
    text: Or 'lived as a foreigner' or 'became a resident alien.' The term denotes
      someone dwelling in a land not his own.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: Aorist active of φεύγω denotes fleeing or escaping. 'Fled' is concise,
    natural English and preserves the force of sudden departure better than the more
    colloquial 'ran away'.
- source_word: δὲ
  chosen: So
  alternatives:
  - And
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative continuation with mild inferential force from
    the preceding event. 'So' captures the connection to Moses' fear and departure
    more naturally than a bare 'And'.
- source_word: ἐν τῷ λόγῳ τούτῳ
  chosen: at this word
  alternatives:
  - because of this statement
  - when he heard this
  lexicon: BDAG
  rationale: The phrase is fairly literal and idiomatic enough in English. 'At this
    word' preserves the compact Greek expression and indicates the triggering statement
    without over-paraphrasing into an explicit causal clause.
- source_word: ἐγένετο πάροικος
  chosen: became a sojourner
  alternatives:
  - lived as a foreigner
  - became an exile
  - became a resident alien
  lexicon: BDAG
  rationale: πάροικος denotes one living in a place not his homeland, a resident foreigner.
    'Sojourner' preserves the temporary/alien nuance and biblical register without
    becoming overly technical like 'resident alien'.
- source_word: ἐν γῇ Μαδιάμ
  chosen: in the land of Midian
  alternatives:
  - in Midian
  lexicon: BDAG
  rationale: Including 'the land of' reflects γῇ and preserves the geographic phrasing
    of the Greek rather than compressing it to simply 'in Midian'.
- source_word: οὗ
  chosen: where
  alternatives:
  - there
  lexicon: BDAG
  rationale: The relative adverb points back to Midian as the location in which the
    next action occurred. 'Where' is the most natural English equivalent.
- source_word: ἐγέννησεν
  chosen: fathered
  alternatives:
  - begot
  - had
  lexicon: BDAG
  rationale: The active verb γεννάω with Moses as subject means he became the father
    of children. 'Fathered' preserves the male-subject nuance better than the generic
    'had,' while avoiding the archaic 'begot'.
- source_word: υἱοὺς δύο
  chosen: two sons
  alternatives:
  - two male children
  lexicon: BDAG
  rationale: This is the straightforward sense of the phrase. 'Two sons' is natural
    and accurate.
