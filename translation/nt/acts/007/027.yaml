id: ACT.7.27
reference: Acts 7:27
source:
  edition: SBLGNT
  text: ὁ δὲ ἀδικῶν τὸν πλησίον ἀπώσατο αὐτὸν εἰπών· Τίς σε κατέστησεν ἄρχοντα καὶ
    δικαστὴν ἐφ’ ⸀ἡμῶν;
translation:
  text: But the man who was wronging his neighbor pushed him away, saying, ‘Who appointed
    you ruler and judge over us?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thrust him aside.' The Greek verb can emphasize a forceful physical
      or dismissive rejection.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῶν
  chosen: was wronging
  alternatives:
  - was injuring
  - was acting unjustly toward
  - was mistreating
  lexicon: BDAG
  rationale: Present participle with imperfective force; 'was wronging' preserves
    the injustice sense of ἀδικέω more directly than the broader 'was mistreating.'
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow man
  - other man
  lexicon: BDAG
  rationale: Standard sense is 'neighbor' or 'one nearby.' In this context it refers
    to a fellow Israelite; 'neighbor' preserves the lexical link without over-specifying.
- source_word: ἀπώσατο
  chosen: pushed him away
  alternatives:
  - rejected him
  - thrust him aside
  lexicon: BDAG
  rationale: The middle aorist here denotes a physical or forceful dismissive action.
    'Pushed him away' fits the narrative scene and preserves the concrete force better
    than the more abstract 'rejected.'
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - made
  - set
  lexicon: BDAG
  rationale: In the idiom 'appoint someone ruler and judge,' 'appointed' is natural
    English and captures the causative sense of καθίστημι.
- source_word: ἄρχοντα
  chosen: ruler
  alternatives:
  - leader
  - official
  lexicon: BDAG
  rationale: '''Ruler'' is the most direct rendering and matches the political-authoritative
    nuance in the accusation.'
- source_word: δικαστὴν
  chosen: judge
  alternatives:
  - arbiter
  lexicon: BDAG
  rationale: '''Judge'' is the straightforward lexical equivalent and pairs naturally
    with ''ruler'' in English, echoing the Greek construction.'
- source_word: ἐφ’ ἡμῶν
  chosen: over us
  alternatives:
  - among us
  - for us
  lexicon: BDAG
  rationale: With ἐπί plus genitive in this context, the sense is authority exercised
    over a group. 'Over us' best fits the challenge to Moses' authority.
