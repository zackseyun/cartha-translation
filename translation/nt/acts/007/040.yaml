id: ACT.7.40
reference: Acts 7:40
source:
  edition: SBLGNT
  text: εἰπόντες τῷ Ἀαρών· Ποίησον ἡμῖν θεοὺς οἳ προπορεύσονται ἡμῶν· ὁ γὰρ Μωϋσῆς οὗτος, ὃς ἐξήγαγεν ἡμᾶς ἐκ γῆς Αἰγύπτου, οὐκ οἴδαμεν τί ⸀ἐγένετο αὐτῷ.
translation:
  text: saying to Aaron, ‘Make gods for us who will go before us, for as for this Moses, who led us out from the land of Egypt, we do not know what has happened to him.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'idols.' The Greek word is literally 'gods,' echoing the wording of the Exodus account and preserving the people's claim rather than replacing it with an interpretive label.
    reason: lexical_alternative
  - marker: b
    text: Or 'because as for this Moses'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰπόντες
  chosen: saying
  alternatives:
  - having said
  lexicon: BDAG
  rationale: Aorist participle introducing the content of the people's speech. 'Saying' is natural English in narrative and preserves the participial linkage without awkwardness.
- source_word: Ποίησον
  chosen: Make
  alternatives:
  - make for us
  - fashion
  lexicon: BDAG
  rationale: Imperative of ποιέω here means to make or produce. 'Make' is the most direct and idiomatic rendering in this request to Aaron.
- source_word: θεοὺς
  chosen: gods
  alternatives:
  - gods/idols
  lexicon: BDAG
  rationale: The plural of θεός is best rendered 'gods' because that is the lexical sense of the word used in the quotation from Exodus. Although the referent is idolatrous, the Greek does not use a distinct word meaning 'idols' here, so 'gods' preserves the source wording.
- source_word: οἳ προπορεύσονται ἡμῶν
  chosen: who will go before us
  alternatives:
  - who will lead us
  - who will go ahead of us
  lexicon: BDAG
  rationale: προπορεύομαι means to go before or precede. 'Go before us' is more formally accurate than 'lead us,' which would add an interpretive nuance not explicit in the verb.
- source_word: ὁ γὰρ Μωϋσῆς οὗτος
  chosen: because as for this Moses
  alternatives:
  - for this Moses
  - because this Moses
  lexicon: BDAG
  rationale: γάρ gives the reason for the request, and οὗτος carries a somewhat distancing demonstrative force. 'Because as for this Moses' captures both the explanatory connection and the slightly dismissive tone.
- source_word: ἐξήγαγεν
  chosen: led ... out
  alternatives:
  - brought ... out
  lexicon: BDAG
  rationale: ἐξάγω commonly means to lead or bring out. 'Led us out' fits the exodus context naturally and keeps the movement sense clear.
- source_word: ἐκ γῆς Αἰγύπτου
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: BDAG
  rationale: The fuller phrase includes γῆς, so 'from the land of Egypt' preserves the explicit wording rather than compressing it.
- source_word: οὐκ οἴδαμεν
  chosen: we do not know
  alternatives:
  - we don't know
  lexicon: BDAG
  rationale: A straightforward present-state expression. The full form suits the register of the translation.
- source_word: τί ἐγένετο αὐτῷ
  chosen: what has happened to him
  alternatives:
  - what became of him
  - what happened to him
  lexicon: BDAG
  rationale: Idiomatic English for γίνομαι in this construction. 'What has happened to him' is clear and contemporary; 'what became of him' is possible but less natural for the target audience.
