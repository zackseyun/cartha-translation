id: ACT.7.10
reference: Acts 7:10
source:
  edition: SBLGNT
  text: καὶ ἐξείλατο αὐτὸν ἐκ πασῶν τῶν θλίψεων αὐτοῦ, καὶ ἔδωκεν αὐτῷ χάριν καὶ σοφίαν
    ἐναντίον Φαραὼ βασιλέως Αἰγύπτου, καὶ κατέστησεν αὐτὸν ἡγούμενον ἐπ’ Αἴγυπτον
    ⸀καὶ ὅλον τὸν οἶκον αὐτοῦ.
translation:
  text: and rescued him from all his afflictions, and gave him favor and wisdom before
    Pharaoh king of Egypt, and appointed him ruler over Egypt and over all his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'delivered him from all his troubles.'
    reason: lexical_alternative
  - marker: b
    text: '''Favor'' here means favorable regard in Pharaoh''s sight; alternatively,
      ''grace.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'appointed him governor over Egypt and all his household.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξείλατο
  chosen: rescued
  alternatives:
  - delivered
  - took out
  lexicon: BDAG
  rationale: The middle of ἐξαιρέω here denotes deliverance from danger or distress.
    'Rescued' is natural modern English and preserves the sense of active deliverance
    better than the more wooden 'took out.' 'Delivered' is also possible, but 'rescued'
    is slightly more idiomatic in this narrative context.
- source_word: θλίψεων
  chosen: afflictions
  alternatives:
  - troubles
  - distresses
  - tribulations
  lexicon: BDAG
  rationale: θλῖψις in narrative context refers broadly to pressures, hardships, and
    sufferings Joseph endured. 'Afflictions' preserves the gravity without importing
    specifically eschatological overtones that 'tribulations' may carry.
- source_word: χάριν
  chosen: favor
  alternatives:
  - grace
  lexicon: BDAG
  rationale: In this context χάρις refers to favorable regard shown toward Joseph
    in Pharaoh's presence rather than the fuller theological sense often conveyed
    by 'grace.' 'Favor' best matches the immediate narrative sense.
- source_word: σοφίαν
  chosen: wisdom
  lexicon: BDAG
  rationale: σοφία straightforwardly denotes wisdom here, especially practical discernment
    recognized by Pharaoh.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in the presence of
  - in the sight of
  lexicon: BDAG
  rationale: ἐναντίον with the genitive indicates being in someone's presence or sight.
    'Before Pharaoh' is concise, idiomatic, and faithful.
- source_word: κατέστησεν
  chosen: appointed
  alternatives:
  - made
  - set
  lexicon: BDAG
  rationale: καθίστημι here means to place someone in an office or role. 'Appointed'
    clearly conveys formal installation into authority.
- source_word: ἡγούμενον
  chosen: ruler
  alternatives:
  - governor
  - leader
  lexicon: BDAG
  rationale: As a participial complement after κατέστησεν, ἡγούμενον denotes one exercising
    governing authority. 'Ruler' is broad and clear; 'governor' is possible but may
    sound more bureaucratic than the text requires.
- source_word: ἐπ’ Αἴγυπτον
  chosen: over Egypt
  alternatives:
  - over the land of Egypt
  - in charge of Egypt
  lexicon: BDAG
  rationale: ἐπί with the accusative after a verb of appointment expresses authority
    over a domain. 'Over Egypt' is concise and accurate.
- source_word: ὅλον τὸν οἶκον αὐτοῦ
  chosen: all his household
  alternatives:
  - his whole house
  lexicon: BDAG
  rationale: οἶκος here refers to Pharaoh's household/estate rather than merely the
    physical building. 'All his household' communicates the sphere of domestic-administrative
    authority in natural English.
