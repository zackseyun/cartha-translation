id: ACT.7.21
reference: Acts 7:21
source:
  edition: SBLGNT
  text: ⸂ἐκτεθέντος δὲ αὐτοῦ ἀνείλατο αὐτὸν⸃ ἡ θυγάτηρ Φαραὼ καὶ ἀνεθρέψατο αὐτὸν
    ἑαυτῇ εἰς υἱόν.
translation:
  text: But when he had been exposed, Pharaoh’s daughter took him up and raised him
    as her own son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'picked him up.' The Greek verb can denote taking up an exposed child.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for a son' or 'as a son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκτεθέντος
  chosen: had been exposed
  alternatives:
  - had been set out
  - had been abandoned
  lexicon: BDAG
  rationale: Aorist passive participle of ἐκτίθημι in the context of an infant being
    left out/exposed. 'Exposed' preserves the historical-cultural sense without overinterpreting
    motive. 'Abandoned' is possible contextually but stronger than the verb itself.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative transition/contrast. 'But' fits the shift from Moses
    being cast out to Pharaoh's daughter rescuing him.
- source_word: ἀνείλατο
  chosen: took him up
  alternatives:
  - took him
  - picked him up
  - adopted him
  lexicon: BDAG
  rationale: Middle voice of ἀναιρέω here means 'take up' in the sense of taking up
    an exposed child. 'Adopted' imports the later result expressed separately by εἰς
    υἱόν; 'took him up' keeps the immediate action distinct.
- source_word: θυγάτηρ Φαραὼ
  chosen: Pharaoh’s daughter
  alternatives:
  - the daughter of Pharaoh
  lexicon: BDAG
  rationale: Standard English possessive is natural and preserves the genitival relationship.
- source_word: ἀνεθρέψατο
  chosen: raised him
  alternatives:
  - brought him up
  - nurtured him
  lexicon: BDAG
  rationale: ἀνατρέφω refers to rearing or bringing up a child. 'Raised him' is idiomatic
    modern English and fits the context.
- source_word: ἑαυτῇ
  chosen: as her own
  alternatives:
  - for herself
  - for her own use
  lexicon: BDAG
  rationale: The reflexive dative indicates relation to herself; in idiomatic English
    with εἰς υἱόν the sense is that she raised him as belonging to her own household/family.
    'As her own' captures this naturally.
- source_word: εἰς υἱόν
  chosen: as her own son
  alternatives:
  - for a son
  - as a son
  lexicon: BDAG
  rationale: 'εἰς with υἱόν expresses result or role: he was raised in the status
    of son. ''As her own son'' makes the filial relationship explicit in natural English
    while reflecting the force of the phrase.'
