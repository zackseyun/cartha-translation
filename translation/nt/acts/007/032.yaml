theological_decisions:
- issue: Rendering the divine self-identification in a quotation from Exodus
  chosen_reading: I am the God of your fathers
  alternative_readings:
  - I, the God of your fathers
  rationale: The Greek is formally verbless after the emphatic pronoun, but English normally supplies 'am.' This preserves the force of the divine declaration and aligns with the source context without importing additional theological claims beyond the quotation itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; readable modern English'
revisions:
- timestamp: '2026-04-21T02:35:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/007/032.json
  category: awkward_english
  tier: 1
  from: Then Moses, becoming terrified, did not dare to look closely.
  to: Then Moses became terrified and did not dare to look closely.
  rationale: The phrase 'becoming terrified' is a very literal rendering of the Greek aorist participle (ἔντρομος...γενόμενος) that sounds unnatural in English. Recasting the participle as a finite verb ('became terrified') and connecting it with 'and' is a standard translation technique that creates a more fluid and idiomatic narrative sentence without losing the sequential meaning.
