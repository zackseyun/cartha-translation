id: ACT.7.32
reference: Acts 7:32
source:
  edition: SBLGNT
  text: Ἐγὼ ὁ θεὸς τῶν πατέρων σου, ὁ θεὸς Ἀβραὰμ ⸀καὶ Ἰσαὰκ ⸁καὶ Ἰακώβ. ἔντρομος δὲ γενόμενος Μωϋσῆς οὐκ ἐτόλμα κατανοῆσαι.
translation:
  text: I am the God of your fathers, the God of Abraham and Isaac and Jacob. Then Moses became terrified and did not dare to look closely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not dare to examine' or 'did not dare to observe closely.' The Greek verb can denote careful looking or attentive consideration.
    reason: lexical_alternative
  - marker: b
    text: Or 'Then Moses, becoming terrified, did not dare to look closely.'.
    reason: previous_rendering
lexical_decisions:
- source_word: Ἐγὼ
  chosen: I am
  alternatives:
  - I
  lexicon: BDAG
  rationale: The pronoun is emphatic and stands in a verbless identification formula echoing the divine self-declaration in the Exodus citation. English idiom requires supplying 'am' to make the clause natural and complete.
- source_word: ὁ θεὸς
  chosen: the God
  lexicon: BDAG
  rationale: Definite nominative with θεός in a predicate-identification statement is best rendered straightforwardly as 'the God.'
- source_word: τῶν πατέρων σου
  chosen: of your fathers
  alternatives:
  - of your ancestors
  lexicon: BDAG
  rationale: πατέρων is literally 'fathers.' In this citation to Moses, the singular possessive 'your' points to his forefathers specifically. 'Fathers' preserves the wording and covenantal resonance better than the more generic 'ancestors.'
- source_word: ὁ θεὸς Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  chosen: the God of Abraham and Isaac and Jacob
  alternatives:
  - the God of Abraham, Isaac, and Jacob
  lexicon: BDAG
  rationale: The repeated article and θεός are retained in natural English as a second appositional identification. The repeated 'and' reflects the Greek coordination and preserves the cadence of the scriptural quotation.
- source_word: ἔντρομος
  chosen: terrified
  alternatives:
  - trembling
  - afraid
  lexicon: BDAG
  rationale: ἔντρομος denotes being in a state of fear or trembling. 'Terrified' communicates the intensity clearly in modern English; 'trembling' is possible but can sound more physical than emotional here.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ marks a mild transition to Moses's response. 'Then' gives a natural narrative progression in English without overstating contrast.
- source_word: γενόμενος
  chosen: becoming
  alternatives:
  - being
  - having become
  lexicon: BDAG
  rationale: Aorist participle of γίνομαι here is ingressive, indicating entry into a state. 'Becoming terrified' preserves that nuance, though smoothed in the full sentence.
- source_word: οὐκ ἐτόλμα
  chosen: did not dare
  alternatives:
  - was not daring
  - did not venture
  lexicon: BDAG
  rationale: Imperfect τολμάω expresses continued reluctance; idiomatic English renders this as 'did not dare.'
- source_word: κατανοῆσαι
  chosen: to look closely
  alternatives:
  - to examine
  - to observe
  - to look
  lexicon: BDAG
  rationale: κατανοέω can mean to observe carefully or consider attentively. In the visual context of the burning bush, 'to look closely' best captures the concrete sense without becoming overly technical.
