id: ACT.28.3
reference: Acts 28:3
source:
  edition: SBLGNT
  text: συστρέψαντος δὲ τοῦ Παύλου φρυγάνων ⸀τι πλῆθος καὶ ἐπιθέντος ἐπὶ τὴν πυράν,
    ἔχιδνα ⸀ἀπὸ τῆς θέρμης ⸀ἐξελθοῦσα καθῆψε τῆς χειρὸς αὐτοῦ.
translation:
  text: But when Paul had gathered a bundle of sticks and put them on the fire, a
    viper came out because of the heat and fastened onto his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''from the heat.'' The Greek preposition can be rendered more literally
      this way, though here it likely expresses cause: the viper came out because
      of the fire''s heat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'seized his hand' or 'bit his hand.' The Greek verb more broadly means
      'fastened to' or 'took hold of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συστρέψαντος
  chosen: had gathered
  alternatives:
  - had collected
  - had twisted together
  lexicon: BDAG
  rationale: Aorist participle in a genitive absolute describing prior action by Paul.
    In context with firewood, the sense is gathering/collecting together rather than
    the more literal 'twisting together.' 'Had gathered' gives natural English sequence.
- source_word: φρυγάνων τι πλῆθος
  chosen: a bundle of sticks
  alternatives:
  - a quantity of brushwood
  - some sticks
  lexicon: BDAG
  rationale: φρύγανα refers to dry sticks/brushwood used for fuel; τι πλῆθος indicates
    an indefinite amount. 'A bundle of sticks' is idiomatic and concrete, preserving
    the idea of a gathered mass without awkwardness.
- source_word: ἐπιθέντος ἐπὶ τὴν πυράν
  chosen: put them on the fire
  alternatives:
  - laid them on the fire
  - placed them upon the fire
  lexicon: BDAG
  rationale: Aorist participle continuing the genitive absolute. πυρά is a fire/fireplace/bonfire
    rather than merely 'flame.' 'Put them on the fire' is clear modern English.
- source_word: ἔχιδνα
  chosen: a viper
  alternatives:
  - a snake
  - a venomous snake
  lexicon: BDAG
  rationale: ἔχιδνα specifically denotes a viper rather than a generic snake. The
    more specific rendering should be preserved.
- source_word: ἀπὸ τῆς θέρμης
  chosen: because of the heat
  alternatives:
  - from the heat
  lexicon: BDAG
  rationale: 'ἀπό can be rendered literally ''from,'' but here it expresses source/cause:
    the snake emerged due to the heat of the fire. ''Because of the heat'' communicates
    the sense more clearly in English.'
- source_word: ἐξελθοῦσα
  chosen: came out
  alternatives:
  - having come out
  - emerged
  lexicon: BDAG
  rationale: Aorist participle modifying 'viper.' 'Came out' is straightforward and
    natural; the participial relation is represented in English by sequencing.
- source_word: καθῆψε τῆς χειρὸς αὐτοῦ
  chosen: fastened onto his hand
  alternatives:
  - seized his hand
  - bit his hand
  - hung from his hand
  lexicon: BDAG
  rationale: καθάπτω can mean seize/fasten to. In this narrative context the snake
    attaches itself to Paul's hand; 'fastened onto' preserves that image without over-specifying
    the manner. 'Bit' is possible by implication but is narrower than the verb itself.
