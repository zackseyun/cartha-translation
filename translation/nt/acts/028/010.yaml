id: ACT.28.10
reference: Acts 28:10
source:
  edition: SBLGNT
  text: οἳ καὶ πολλαῖς τιμαῖς ἐτίμησαν ἡμᾶς καὶ ἀναγομένοις ἐπέθεντο τὰ πρὸς ⸂τὰς
    χρείας⸃.
translation:
  text: They also honored us with many honors, and when we were setting sail, they
    put on board the things needed for our needs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''They honored us greatly.'' The Greek more literally
      repeats the honor language: ''with many honors they honored us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'when we were putting out to sea.' The participle is a nautical term
      for beginning a voyage by ship.
    reason: lexical_alternative
  - marker: c
    text: Or 'they supplied us with what we needed.' The Greek more literally says
      they 'put on board the things for the needs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλαῖς τιμαῖς
  chosen: with many honors
  alternatives:
  - in many ways
  - with many marks of honor
  lexicon: BDAG
  rationale: The dative phrase with τιμή denotes expressions of honor or esteem. Rendering
    it explicitly as 'with many honors' preserves the repetition with ἐτίμησαν and
    reflects the concrete sense of bestowed honors rather than flattening it to a
    vague adverbial phrase.
- source_word: ἐτίμησαν
  chosen: honored
  alternatives:
  - showed honor to
  - treated with honor
  lexicon: BDAG
  rationale: The verb τιμάω means to honor or value. 'Honored' is the most direct
    and natural English equivalent and preserves the lexical connection to τιμαῖς.
- source_word: ἀναγομένοις
  chosen: when we were setting sail
  alternatives:
  - as we were putting out to sea
  - when we were departing
  lexicon: BDAG
  rationale: The participle from ἀνάγω in nautical contexts means to put out to sea
    or set sail. 'When we were setting sail' captures the maritime setting more precisely
    than the broader 'departing.'
- source_word: ἐπέθεντο
  chosen: they put on board
  alternatives:
  - they supplied
  - they placed on
  lexicon: BDAG
  rationale: The middle of ἐπιτίθημι here refers to placing items onto the ship for
    the travelers. 'Put on board' makes the implied nautical object explicit in idiomatic
    English while staying close to the action of placing.
- source_word: τὰ πρὸς τὰς χρείας
  chosen: the things needed for our needs
  alternatives:
  - what we needed
  - the supplies for our needs
  - the things for our needs
  lexicon: BDAG
  rationale: The article plus πρός phrase denotes things pertaining to needs, that
    is, necessary provisions. The chosen rendering keeps the concrete plural sense
    ('the things') and the lexical idea of needs (χρείας), though the English is slightly
    expanded for clarity.
