id: ACT.28.30
reference: Acts 28:30
source:
  edition: SBLGNT
  text: ⸀Ἐνέμεινεν ⸀δὲ διετίαν ὅλην ἐν ἰδίῳ μισθώματι, καὶ ἀπεδέχετο πάντας τοὺς εἰσπορευομένους
    πρὸς αὐτόν,
translation:
  text: And he stayed for two whole years in his own rented lodging, and he welcomed
    all who came in to him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his own hired house.' The Greek μίσθωμα refers to rented accommodations;
      'rented lodging' is a more natural contemporary rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'everyone who came to him.' The Greek more literally says 'those coming
      in to him,' likely reflecting visitors entering his lodging.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνέμεινεν
  chosen: he stayed
  alternatives:
  - he remained
  - he lived
  lexicon: BDAG
  rationale: The aorist of ἐμμένω here denotes continued residence or remaining in
    a place. 'Stayed' is natural modern English and fits the narrative summary. 'Remained'
    is more formal; 'lived' is possible but slightly more interpretive than the basic
    sense of remaining/staying.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'And' best reflects the flow in readable English.
- source_word: διετίαν ὅλην
  chosen: for two whole years
  alternatives:
  - for a full two years
  - for the entire two-year period
  lexicon: BDAG
  rationale: The accusative of extent of time with ὅλην emphasizes the full duration.
    'Two whole years' preserves both the time span and the emphasis without sounding
    wooden.
- source_word: ἐν ἰδίῳ μισθώματι
  chosen: in his own rented lodging
  alternatives:
  - in his own rented quarters
  - in his own hired house
  lexicon: BDAG
  rationale: μίσθωμα refers to rented accommodations. 'Hired house' reflects older
    tradition but is less idiomatic in contemporary English. 'His own' renders ἰδίῳ,
    indicating lodging under his own arrangement rather than public custody quarters.
- source_word: ἀπεδέχετο
  chosen: he welcomed
  alternatives:
  - he received
  - he accepted
  lexicon: BDAG
  rationale: The imperfect portrays customary or ongoing action. 'Welcomed' captures
    the hospitable nuance of ἀποδέχομαι better than the flatter 'received' in contemporary
    English.
- source_word: πάντας τοὺς εἰσπορευομένους πρὸς αὐτόν
  chosen: all who came in to him
  alternatives:
  - everyone who came to him
  - all those entering to him
  lexicon: BDAG
  rationale: The participle εἰσπορευομένους literally means those coming in/entering.
    Because the setting is Paul's lodging, 'came in to him' preserves the spatial
    nuance better than simply 'came to him,' while remaining natural enough in English.
