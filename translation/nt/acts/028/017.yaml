id: ACT.28.17
reference: Acts 28:17
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ μετὰ ἡμέρας τρεῖς συγκαλέσασθαι ⸀αὐτὸν τοὺς ὄντας τῶν Ἰουδαίων
    πρώτους· συνελθόντων δὲ αὐτῶν ἔλεγεν πρὸς αὐτούς· ⸂Ἐγώ, ἄνδρες ἀδελφοί⸃, οὐδὲν
    ἐναντίον ποιήσας τῷ λαῷ ἢ τοῖς ἔθεσι τοῖς πατρῴοις δέσμιος ἐξ Ἱεροσολύμων παρεδόθην
    εἰς τὰς χεῖρας τῶν Ῥωμαίων,
translation:
  text: Now it happened that after three days he called together the leading men of
    the Jews. And when they had come together, he said to them, “I, brothers, though
    I had done nothing against the people or the customs of our fathers, was delivered
    as a prisoner from Jerusalem into the hands of the Romans.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leaders of the Jews' or 'the foremost among the Jews.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' translates the Greek vocative ἀδελφοί. Here Paul is addressing
      the leading Jewish men he had called together.'
    reason: cultural_note
  - marker: c
    text: Or 'the ancestral customs.'
    reason: lexical_alternative
  - marker: d
    text: Or 'was handed over ... to the Romans.' The Greek more literally says 'was
      delivered into the hands of the Romans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened that
  alternatives:
  - And it happened that
  - After this
  lexicon: BDAG
  rationale: A common Lukan narrative transition. 'Now it happened that' preserves
    the event-introducing force without sounding overly wooden.
- source_word: μετὰ ἡμέρας τρεῖς
  chosen: after three days
  alternatives:
  - three days later
  lexicon: BDAG
  rationale: Standard temporal expression; 'after three days' is the most direct rendering.
- source_word: συγκαλέσασθαι αὐτὸν
  chosen: he called together
  alternatives:
  - he summoned
  - he convened
  lexicon: BDAG
  rationale: The infinitive construction after ἐγένετο is idiomatically rendered in
    English with a finite verb. 'Called together' reflects the συν- prefix and the
    gathering sense.
- source_word: τοὺς ὄντας τῶν Ἰουδαίων πρώτους
  chosen: the leading men of the Jews
  alternatives:
  - the leaders of the Jews
  - the foremost among the Jews
  lexicon: BDAG
  rationale: πρῶτος here denotes prominence/status, not merely sequence. 'Leading
    men' captures the socially prominent Jewish representatives Paul invited.
- source_word: συνελθόντων δὲ αὐτῶν
  chosen: when they had come together
  alternatives:
  - after they had assembled
  - when they had gathered
  lexicon: BDAG
  rationale: Genitive absolute rendered naturally as a temporal clause in English.
- source_word: Ἐγώ, ἄνδρες ἀδελφοί
  chosen: I, brothers
  alternatives:
  - Men, brothers
  - Brothers
  lexicon: BDAG
  rationale: The vocative combines respectful address and kinship solidarity. 'Brothers'
    preserves ἀδελφοί per the gender-accurate policy; 'I' is retained for the emphatic
    self-reference. 'Men, brothers' is more formally literal but less natural in modern
    English.
- source_word: οὐδὲν ἐναντίον ποιήσας
  chosen: though I had done nothing against
  alternatives:
  - having done nothing against
  - without having done anything contrary to
  lexicon: BDAG
  rationale: 'The participle is concessive in context: despite innocence, Paul was
    handed over. ''Against'' fits ἐναντίον here as opposition/contrary action.'
- source_word: τῷ λαῷ
  chosen: the people
  alternatives:
  - our people
  lexicon: BDAG
  rationale: λαός here refers to the Jewish people. The Greek lacks an explicit possessive,
    so 'the people' is kept in the main text; the relational nuance is clear from
    context.
- source_word: τοῖς ἔθεσι τοῖς πατρῴοις
  chosen: the customs of our fathers
  alternatives:
  - the ancestral customs
  - the customs of the fathers
  lexicon: BDAG
  rationale: πατρῷος denotes what is inherited from the fathers/ancestors. 'The customs
    of our fathers' is idiomatic and reflects Paul's solidarity with Jewish tradition.
- source_word: δέσμιος
  chosen: as a prisoner
  alternatives:
  - a prisoner
  - in chains
  lexicon: BDAG
  rationale: The predicate nominative describes Paul's status when handed over. 'As
    a prisoner' reads naturally with 'was delivered' and preserves the legal-custodial
    sense.
- source_word: ἐξ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: BDAG
  rationale: Simple source/origin expression.
- source_word: παρεδόθην
  chosen: was delivered
  alternatives:
  - was handed over
  - was turned over
  lexicon: BDAG
  rationale: παραδίδωμι in legal/custodial contexts often means 'hand over' or 'deliver.'
    'Was delivered' is slightly more formal and fits the passive legal sense.
- source_word: εἰς τὰς χεῖρας τῶν Ῥωμαίων
  chosen: into the hands of the Romans
  alternatives:
  - to the Romans
  lexicon: BDAG
  rationale: The idiom 'into the hands of' should be preserved because it is natural
    in English and retains the concrete legal-transfer imagery of the Greek.
