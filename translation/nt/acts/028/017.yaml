theological_decisions:
- issue: Rendering of ἀδελφοί in direct address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek is grammatically masculine and here addresses Jewish male leaders
    whom Paul has summoned. 'Brothers' preserves both the source form and the solidarity
    implied by the address, in keeping with the gender-accurate policy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Force of Paul's participle οὐδὲν ἐναντίον ποιήσας
  chosen_reading: concessive ('though I had done nothing against')
  alternative_readings:
  - attendant circumstance ('having done nothing against')
  rationale: The discourse emphasizes the injustice of Paul's transfer to Roman custody.
    Rendering the participle concessively preserves that tension without adding doctrinal
    interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
