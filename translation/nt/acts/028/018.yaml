id: ACT.28.18
reference: Acts 28:18
source:
  edition: SBLGNT
  text: οἵτινες ἀνακρίναντές με ἐβούλοντο ἀπολῦσαι διὰ τὸ μηδεμίαν αἰτίαν θανάτου
    ὑπάρχειν ἐν ἐμοί·
translation:
  text: who, after examining me, wanted to release me because there was no basis for
    a death sentence in my case.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because they found no charge deserving death against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - the very ones who
  lexicon: BDAG
  rationale: Rendered as the simple relative 'who' for natural English. The qualitative
    nuance of ὅστις is not prominent enough here to require expansion.
- source_word: ἀνακρίναντές
  chosen: after examining
  alternatives:
  - having examined
  - after interrogating
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    'After examining' captures the temporal sequence and judicial context without
    sounding overly technical.
- source_word: ἐβούλοντο
  chosen: wanted
  alternatives:
  - intended
  - were willing
  lexicon: BDAG
  rationale: Imperfect middle of βούλομαι expresses ongoing or settled intent in past
    time. 'Wanted' is clear modern English and fits the narrative flow.
- source_word: ἀπολῦσαι
  chosen: to release
  alternatives:
  - to set free
  - to let go
  lexicon: BDAG
  rationale: In legal context ἀπολύω commonly means to release or acquit from custody.
    'Release' best matches the Roman judicial setting.
- source_word: διὰ τὸ ... ὑπάρχειν
  chosen: because there was
  alternatives:
  - on account of there being
  - because ... existed
  lexicon: BDAG
  rationale: The articular infinitive construction with διά expresses cause. 'Because
    there was' is idiomatic English that preserves the causal force.
- source_word: μηδεμίαν αἰτίαν
  chosen: no basis
  alternatives:
  - no cause
  - no ground
  - no charge
  lexicon: BDAG
  rationale: αἰτία in judicial contexts can mean charge, case, or legal basis. 'No
    basis' communicates that no valid legal grounds were found, which fits the following
    genitive 'of death sentence.'
- source_word: θανάτου
  chosen: for a death sentence
  alternatives:
  - for death
  - deserving death
  - for capital punishment
  lexicon: BDAG
  rationale: 'The genitive with αἰτίαν is judicial: not merely ''death'' abstractly,
    but grounds warranting execution. ''Death sentence'' makes the legal sense explicit
    in natural English.'
- source_word: ἐν ἐμοί
  chosen: in my case
  alternatives:
  - in me
  - against me
  lexicon: BDAG
  rationale: Literally 'in me,' but in this forensic context the idiomatic sense is
    that no capital basis was found with respect to Paul. 'In my case' is clearer
    than a wooden rendering and avoids implying inward moral quality.
