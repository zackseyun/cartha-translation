id: ACT.28.15
reference: Acts 28:15
source:
  edition: SBLGNT
  text: κἀκεῖθεν οἱ ἀδελφοὶ ἀκούσαντες τὰ περὶ ἡμῶν ⸀ἦλθαν εἰς ἀπάντησιν ἡμῖν ἄχρι
    Ἀππίου Φόρου καὶ Τριῶν Ταβερνῶν, οὓς ἰδὼν ὁ Παῦλος εὐχαριστήσας τῷ θεῷ ἔλαβε θάρσος.
translation:
  text: And from there the brothers, when they heard the news about us, came to meet
    us as far as Appius Forum and Three Taverns. When Paul saw them, he gave thanks
    to God and took courage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the brothers and sisters'; the Greek says 'brothers,' a common form
      for fellow believers that may include women in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - And from that place
  - And from there also
  lexicon: BDAG
  rationale: Carries forward the travel narrative with a spatial transition. 'And
    from there' is natural English and preserves the connective force of καί + ἐκεῖθεν.
- source_word: οἱ ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: ἀδελφοί here refers to fellow Christians in Rome and likely includes
    women, but the translation philosophy prefers gender-accurate rendering over flattening
    to a neutral term. 'The brothers' preserves the Greek form; inclusivity can be
    noted in a footnote.
- source_word: ἀκούσαντες τὰ περὶ ἡμῶν
  chosen: when they heard the news about us
  alternatives:
  - having heard about us
  - when they heard the things concerning us
  lexicon: BDAG
  rationale: The participle is temporal in context. τὰ περὶ ἡμῶν idiomatically means
    the report/news concerning Paul's party, not merely abstract 'things about us.'
    'When they heard the news about us' is clear and faithful.
- source_word: ἦλθαν εἰς ἀπάντησιν ἡμῖν
  chosen: came to meet us
  alternatives:
  - came for a meeting with us
  - came out to meet us
  lexicon: BDAG
  rationale: This is a standard idiom for going out to meet someone. 'Came to meet
    us' is idiomatic English; 'came out to meet us' is possible but not required by
    the verse itself.
- source_word: ἄχρι Ἀππίου Φόρου καὶ Τριῶν Ταβερνῶν
  chosen: as far as Appius Forum and Three Taverns
  alternatives:
  - to Appius Forum and Three Taverns
  lexicon: BDAG
  rationale: 'ἄχρι marks extent, so ''as far as'' best preserves the sense that the
    brothers came out to these points along the route. Place names are transliterated/translated
    by standard convention: Appius Forum, Three Taverns.'
- source_word: οὓς ἰδὼν
  chosen: When Paul saw them
  alternatives:
  - whom Paul, seeing
  - and when Paul saw them
  lexicon: BDAG
  rationale: The relative pronoun refers to the brothers just mentioned. Rendering
    the participle as a temporal clause produces natural English while preserving
    the sequence.
- source_word: εὐχαριστήσας τῷ θεῷ
  chosen: he gave thanks to God
  alternatives:
  - thanking God
  - he thanked God
  lexicon: BDAG
  rationale: The aorist participle is best represented by a finite verb in sequence
    with the main verb in English. 'Gave thanks to God' preserves the explicit dative
    object and the solemn tone.
- source_word: ἔλαβε θάρσος
  chosen: took courage
  alternatives:
  - was encouraged
  - gained confidence
  - became bold
  lexicon: BDAG
  rationale: The idiom literally 'received courage' means that Paul was strengthened
    in heart. 'Took courage' is concise, idiomatic, and closer to the Greek than the
    more interpretive 'was encouraged.'
