theological_decisions:
- issue: Rendering of ἀδελφοί for a likely mixed Christian group
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is retained in the main text rather than replaced with a gender-neutral collective.
    Because the referent likely includes the wider Christian community, the inclusive
    sense is preserved in a footnote rather than imported into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
