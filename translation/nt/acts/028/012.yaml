id: ACT.28.12
reference: Acts 28:12
source:
  edition: SBLGNT
  text: καὶ καταχθέντες εἰς Συρακούσας ἐπεμείναμεν ἡμέρας τρεῖς,
translation:
  text: And after putting in at Syracuse, we stayed there three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after landing at Syracuse' or 'after putting in to Syracuse.' The Greek
      participle is nautical in sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταχθέντες
  chosen: after putting in
  alternatives:
  - after landing
  - after coming down
  - after being brought down
  lexicon: BDAG
  rationale: The participle from κατάγω in a nautical travel context commonly means
    to put in to port or come to land. 'After putting in' captures the maritime sense
    more naturally than the overly literal 'being brought down' and more specifically
    than simply 'landing'.
- source_word: εἰς Συρακούσας
  chosen: at Syracuse
  alternatives:
  - into Syracuse
  - to Syracuse
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' English idiom with a port city after
    a nautical verb is better expressed as 'at Syracuse' or 'to Syracuse.' 'At Syracuse'
    fits the sense of arriving and docking there.
- source_word: ἐπεμείναμεν
  chosen: we stayed there
  alternatives:
  - we remained
  - we stayed
  lexicon: BDAG
  rationale: The verb means to remain or stay. 'We stayed there' is natural modern
    English and makes explicit the locative sense implied by the context without adding
    new content.
- source_word: ἡμέρας τρεῖς
  chosen: three days
  alternatives:
  - for three days
  lexicon: BDAG
  rationale: The accusative of extent of time indicates duration. English can express
    this simply as 'three days'; with 'stayed' the durative sense is clear. 'For three
    days' is also possible but not necessary in the main text.
- source_word: Συρακούσας
  chosen: Syracuse
  lexicon: BDAG
  rationale: This is the standard English transliteration of the place name Συράκουσαι,
    consistent with the policy to transliterate names by standard conventions.
