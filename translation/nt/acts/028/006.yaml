id: ACT.28.6
reference: Acts 28:6
source:
  edition: SBLGNT
  text: οἱ δὲ προσεδόκων αὐτὸν μέλλειν πίμπρασθαι ἢ καταπίπτειν ἄφνω νεκρόν. ἐπὶ πολὺ
    δὲ αὐτῶν προσδοκώντων καὶ θεωρούντων μηδὲν ἄτοπον εἰς αὐτὸν γινόμενον, ⸀μεταβαλόμενοι
    ἔλεγον ⸂αὐτὸν εἶναι θεόν⸃.
translation:
  text: But they were expecting him to swell up or suddenly fall down dead. But after
    they had waited a long time and saw that nothing unusual was happening to him,
    they changed their minds and began saying that he was a god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'nothing out of the ordinary' or 'nothing amiss' was happening to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεδόκων
  chosen: were expecting
  alternatives:
  - were waiting for
  - expected
  lexicon: BDAG
  rationale: Imperfect tense conveys ongoing expectation; 'were expecting' is natural
    English and preserves the durative sense.
- source_word: μέλλειν
  chosen: to
  alternatives:
  - was about to
  - was going to
  lexicon: BDAG
  rationale: With the infinitives πίμπρασθαι and καταπίπτειν after a verb of expectation,
    μέλλω marks anticipated imminence. English can express this smoothly with the
    infinitive construction after 'expecting' without adding awkwardness.
- source_word: πίμπρασθαι
  chosen: to swell up
  alternatives:
  - to become inflamed
  - to burn/swollen
  lexicon: BDAG
  rationale: In this context of a snakebite, the sense is bodily swelling rather than
    literal burning. 'Swell up' is idiomatic and contextually precise.
- source_word: καταπίπτειν ἄφνω νεκρόν
  chosen: suddenly fall down dead
  alternatives:
  - suddenly drop dead
  - fall down suddenly dead
  lexicon: BDAG
  rationale: This phrase describes abrupt collapse resulting in death. 'Fall down
    dead' is a clear, natural equivalent that preserves both motion and result; 'suddenly'
    renders ἄφνω.
- source_word: ἐπὶ πολὺ
  chosen: after they had waited a long time
  alternatives:
  - for a long time
  - after a long while
  lexicon: BDAG
  rationale: The idiom marks an extended period. In context with the genitive participles,
    this is best rendered as a temporal clause in English.
- source_word: θεωρούντων
  chosen: saw
  alternatives:
  - were observing
  - were watching
  lexicon: BDAG
  rationale: Although more literally 'observing,' the verb here denotes attentive
    watching that leads to perception. 'Saw' is concise and idiomatic in the combined
    participial clause.
- source_word: μηδὲν ἄτοπον
  chosen: nothing unusual
  alternatives:
  - nothing out of the ordinary
  - nothing amiss
  - nothing harmful
  lexicon: BDAG
  rationale: ἄτοπος can mean strange, abnormal, or improper. Here it refers to no
    abnormal consequence from the bite. 'Nothing unusual' preserves the broad sense
    without over-specifying 'harmful,' which the Greek does not explicitly state.
- source_word: μεταβαλόμενοι
  chosen: they changed their minds
  alternatives:
  - they changed their opinion
  - they changed
  lexicon: BDAG
  rationale: The middle participle indicates a change in attitude or conclusion. 'Changed
    their minds' communicates the reversal clearly in modern English.
- source_word: ἔλεγον
  chosen: began saying
  alternatives:
  - were saying
  - said
  lexicon: BDAG
  rationale: The imperfect suggests repeated or inceptive action. 'Began saying' captures
    the onset of their new conclusion after the reversal.
- source_word: θεόν
  chosen: a god
  alternatives:
  - god
  - divine
  lexicon: BDAG
  rationale: Anarthrous θεόν in this pagan setting is best rendered indefinitely.
    'A god' avoids implying identification with the one true God and fits the islanders'
    polytheistic frame.
