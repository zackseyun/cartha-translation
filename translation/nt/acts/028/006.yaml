theological_decisions:
- issue: Rendering αὐτὸν εἶναι θεόν in a way that does not import later Christian
    claims about Paul's status
  chosen_reading: that he was a god
  alternative_readings:
  - that he was God
  - that he was divine
  rationale: The narrative reports the mistaken pagan conclusion of the islanders.
    Given the anarthrous θεόν and the context of local polytheistic interpretation,
    'a god' is the most contextually faithful rendering and avoids theological confusion
    with Christian confession about the one God.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
