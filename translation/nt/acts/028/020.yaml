id: ACT.28.20
reference: Acts 28:20
source:
  edition: SBLGNT
  text: διὰ ταύτην οὖν τὴν αἰτίαν παρεκάλεσα ὑμᾶς ἰδεῖν καὶ προσλαλῆσαι, ἕνεκεν γὰρ
    τῆς ἐλπίδος τοῦ Ἰσραὴλ τὴν ἅλυσιν ταύτην περίκειμαι.
translation:
  text: For this reason, therefore, I asked to see you and to speak with you, for
    it is because of the hope of Israel that I am wearing this chain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel's hope,' likely referring to the covenantal and resurrection
      hope Paul proclaims.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ ταύτην οὖν τὴν αἰτίαν
  chosen: For this reason, therefore
  alternatives:
  - Therefore, for this reason
  - For this cause, then
  lexicon: BDAG
  rationale: Retains both the causal phrase and inferential particle. English can
    sound redundant, but preserving both reflects Paul's explicit logical connection.
- source_word: παρεκάλεσα
  chosen: I asked
  alternatives:
  - I appealed
  - I invited
  - I requested
  lexicon: BDAG
  rationale: In this context of summoning local Jewish leaders, 'asked' is the most
    natural modern English rendering. 'Appealed' is too formal/legal here, and 'invited'
    may imply hospitality rather than request.
- source_word: ἰδεῖν
  chosen: to see you
  alternatives:
  - to meet with you
  lexicon: BDAG
  rationale: The infinitive literally means 'to see.' 'To meet with you' is possible
    idiomatic English, but 'to see you' preserves the directness of the Greek while
    remaining natural.
- source_word: προσλαλῆσαι
  chosen: to speak with you
  alternatives:
  - to talk with you
  - to speak to you
  lexicon: BDAG
  rationale: The prefixed verb suggests speaking with/in addition to direct encounter.
    'Speak with you' best conveys conversational engagement, not merely one-way address.
- source_word: ἕνεκεν γὰρ
  chosen: for it is because of
  alternatives:
  - for because of
  - for on account of
  lexicon: BDAG
  rationale: This rendering preserves both γάρ and the causal force of ἕνεκεν while
    producing idiomatic English. A simpler 'for the hope of Israel' could obscure
    the explicit causal relation to Paul's imprisonment.
- source_word: τῆς ἐλπίδος τοῦ Ἰσραήλ
  chosen: the hope of Israel
  alternatives:
  - Israel's hope
  - the hope belonging to Israel
  lexicon: BDAG
  rationale: 'Keeps the genitival expression compact and traditional while preserving
    its likely sense: the eschatological hope associated with Israel, especially fulfilled
    in the resurrection and Messiah.'
- source_word: ἅλυσιν
  chosen: chain
  alternatives:
  - shackle
  lexicon: BDAG
  rationale: Singular 'chain' matches the Greek and fits the likely image of Paul's
    custodial restraint. 'Shackle' is possible but less direct and less common in
    English Bible style.
- source_word: περίκειμαι
  chosen: I am wearing
  alternatives:
  - I am bound with
  - I bear
  - I have around me
  lexicon: BDAG
  rationale: The verb literally means to have something lying around/on oneself. 'I
    am wearing this chain' is vivid and idiomatic, preserving the physical image without
    overinterpreting. 'I am bound with' is interpretive and could flatten the concrete
    metaphor.
