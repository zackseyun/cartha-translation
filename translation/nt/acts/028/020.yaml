theological_decisions:
- issue: Meaning of 'the hope of Israel'
  chosen_reading: Rendered as 'the hope of Israel' without explicit interpretive expansion.
  alternative_readings:
  - the hope promised to Israel
  - Israel's hope in the resurrection
  - the messianic hope of Israel
  rationale: The phrase likely evokes Israel's covenantal and resurrection hope as
    fulfilled in Jesus, but the Greek itself leaves the expression compact and allusive.
    To preserve theological tension and avoid importing a narrower doctrinal gloss,
    the translation keeps the phrase unexpanded.
  doctrine_reference: Preserve theological tension rather than resolve it.
