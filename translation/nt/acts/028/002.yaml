id: ACT.28.2
reference: Acts 28:2
source:
  edition: SBLGNT
  text: οἵ ⸀τε βάρβαροι παρεῖχον οὐ τὴν τυχοῦσαν φιλανθρωπίαν ἡμῖν, ⸀ἅψαντες γὰρ πυρὰν
    προσελάβοντο πάντας ἡμᾶς διὰ τὸν ὑετὸν τὸν ἐφεστῶτα καὶ διὰ τὸ ψῦχος.
translation:
  text: And the local people showed us extraordinary kindness, for they lit a fire
    and welcomed all of us because of the rain that had set in and because of the
    cold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek βάρβαροι literally means 'barbarians,' that is, non-Greek-speaking
      people; here it refers to the island's local inhabitants without necessarily
      implying savagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'showed us no ordinary kindness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάρβαροι
  chosen: the local people
  alternatives:
  - the natives
  - the islanders
  - the barbarians
  lexicon: BDAG
  rationale: In this context βάρβαροι refers to non-Greek-speaking inhabitants, not
    necessarily to uncivilized or savage people. 'The local people' communicates the
    ethnolinguistic sense in natural modern English without importing the pejorative
    force that 'barbarians' has in contemporary usage. 'Natives' is possible but can
    sound dated or colonial in English.
- source_word: οὐ τὴν τυχοῦσαν φιλανθρωπίαν
  chosen: extraordinary kindness
  alternatives:
  - no ordinary kindness
  - unusual kindness
  - not the kindness that happened to be ordinary
  lexicon: BDAG
  rationale: The idiom οὐ τὴν τυχοῦσαν means 'not ordinary' or 'more than usual.'
    φιλανθρωπία denotes benevolence/human kindness. 'Extraordinary kindness' captures
    the idiomatic force in clear English; 'no ordinary kindness' is more formally
    literal but less natural.
- source_word: παρεῖχον
  chosen: showed
  alternatives:
  - offered
  - provided
  lexicon: BDAG
  rationale: With φιλανθρωπίαν, παρέχω is naturally rendered 'showed' in English ('showed
    kindness'), preserving the sense of extending benevolence.
- source_word: ἅψαντες
  chosen: lit
  alternatives:
  - kindled
  - having kindled
  lexicon: BDAG
  rationale: The participle from ἅπτω with πυράν means to ignite or kindle a fire.
    'Lit' is idiomatic modern English; the participial relation is adequately conveyed
    by 'for they lit...'.
- source_word: πυρὰν
  chosen: a fire
  alternatives:
  - a bonfire
  lexicon: BDAG
  rationale: πυρά refers to a fire, often a heap or bonfire. 'A fire' is sufficient
    and natural here; 'bonfire' may over-specify the scene.
- source_word: προσελάβοντο
  chosen: welcomed
  alternatives:
  - received
  - took in
  lexicon: BDAG
  rationale: προσλαμβάνομαι here conveys receiving others hospitably. 'Welcomed' best
    fits the context of hospitality around the fire; 'received' is more formal, and
    'took in' may imply lodging specifically.
- source_word: πάντας ἡμᾶς
  chosen: all of us
  alternatives:
  - us all
  lexicon: BDAG
  rationale: The phrase emphasizes the inclusiveness of the welcome. 'All of us' preserves
    that emphasis naturally.
- source_word: διὰ τὸν ὑετὸν τὸν ἐφεστῶτα
  chosen: because of the rain that had set in
  alternatives:
  - because of the rain that was upon us
  - because of the present rain
  - because of the rain that had come on
  lexicon: BDAG
  rationale: ὑετός is 'rain' or 'rainstorm.' The participle ἐφεστῶτα indicates something
    that had arrived and was now present. 'That had set in' captures the ongoing adverse
    weather in idiomatic English.
- source_word: διὰ τὸ ψῦχος
  chosen: because of the cold
  alternatives:
  - because of the chill
  lexicon: BDAG
  rationale: ψῦχος denotes cold weather or coldness. 'The cold' is the most straightforward
    rendering.
- source_word: οἵ τε
  chosen: And the
  alternatives:
  - Now the
  - Then the
  lexicon: BDAG
  rationale: The combination links this statement to the preceding narrative and introduces
    the subject. 'And the' preserves the connective force without overtranslating.
