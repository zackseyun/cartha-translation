id: ACT.28.7
reference: Acts 28:7
source:
  edition: SBLGNT
  text: Ἐν δὲ τοῖς περὶ τὸν τόπον ἐκεῖνον ὑπῆρχεν χωρία τῷ πρώτῳ τῆς νήσου ὀνόματι
    Ποπλίῳ, ὃς ἀναδεξάμενος ἡμᾶς ⸂τρεῖς ἡμέρας⸃ φιλοφρόνως ἐξένισεν.
translation:
  text: Now in the area around that place there were lands belonging to the leading
    man of the island, named Publius, who welcomed us and hosted us courteously for
    three days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “estates” for “lands” (χωρία), referring to landed property in the vicinity.
    reason: lexical_alternative
  - marker: b
    text: Or “the chief man of the island.” The Greek title τῷ πρώτῳ τῆς νήσου likely
      denotes the island’s leading or highest-ranking man.
    reason: alternative_reading
  - marker: c
    text: Or “received us and showed us hospitality kindly for three days.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ τοῖς περὶ τὸν τόπον ἐκεῖνον
  chosen: Now in the area around that place
  alternatives:
  - And in the regions around that place
  - Now in the vicinity of that place
  lexicon: BDAG
  rationale: περὶ with τόπον denotes the surrounding vicinity. 'Now' captures δέ as
    a mild narrative transition. 'Area around that place' is natural English while
    preserving the spatial sense.
- source_word: ὑπῆρχεν
  chosen: there were
  alternatives:
  - there existed
  - there was
  lexicon: BDAG
  rationale: Impersonal existential use here introduces what was present in the area.
    Because the subject χωρία is plural, English plural 'there were' is required.
- source_word: χωρία
  chosen: lands
  alternatives:
  - estates
  - property
  - fields
  lexicon: BDAG
  rationale: χωρία can denote landed property or estates. 'Lands' preserves the plural
    and avoids over-specifying the exact type of holding, while still conveying real
    property.
- source_word: τῷ πρώτῳ τῆς νήσου
  chosen: the leading man of the island
  alternatives:
  - the chief man of the island
  - the first man of the island
  lexicon: BDAG
  rationale: πρῶτος here is a title or status designation, not merely ordinal sequence.
    'Leading man' communicates prominence and likely official standing in idiomatic
    English without forcing a technical office title.
- source_word: ὀνόματι Ποπλίῳ
  chosen: named Publius
  alternatives:
  - by name Publius
  lexicon: BDAG
  rationale: ὀνόματι plus dative introduces the person's name. 'Publius' is the standard
    English transliteration of the Latin name Πόπλιος.
- source_word: ἀναδεξάμενος ἡμᾶς
  chosen: welcomed us
  alternatives:
  - received us
  - took us in
  lexicon: BDAG
  rationale: The participle denotes receiving or welcoming guests. 'Welcomed us' fits
    the hospitality context and reads naturally in English.
- source_word: τρεῖς ἡμέρας
  chosen: for three days
  alternatives:
  - for three days' time
  lexicon: BDAG
  rationale: Accusative of extent of time; 'for three days' is the standard English
    rendering.
- source_word: φιλοφρόνως
  chosen: courteously
  alternatives:
  - kindly
  - graciously
  - in a friendly way
  lexicon: BDAG
  rationale: The adverb conveys friendly, considerate, or gracious treatment. 'Courteously'
    preserves the manner of hospitable reception without becoming too colloquial.
- source_word: ἐξένισεν
  chosen: hosted us
  alternatives:
  - showed us hospitality
  - lodged us
  lexicon: BDAG
  rationale: ξενίζω in this context means to receive and entertain as guests. 'Hosted
    us' is concise, natural, and captures the hospitality sense.
