id: ACT.28.25
reference: Acts 28:25
source:
  edition: SBLGNT
  text: ἀσύμφωνοι δὲ ὄντες πρὸς ἀλλήλους ἀπελύοντο, εἰπόντος τοῦ Παύλου ῥῆμα ἓν ὅτι
    Καλῶς τὸ πνεῦμα τὸ ἅγιον ἐλάλησεν διὰ Ἠσαΐου τοῦ προφήτου πρὸς τοὺς πατέρας ⸀ὑμῶν
translation:
  text: 'And since they were disagreeing with one another, they were leaving after
    Paul had said one final word: “The Holy Spirit spoke rightly through Isaiah the
    prophet to your fathers'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one word” or “one statement.” The Greek literally says “one word,” here
      functioning as a concluding remark.
    reason: lexical_alternative
  - marker: b
    text: Or “to your ancestors.” The Greek reads “to your fathers,” referring to
      Israel’s forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσύμφωνοι ... ὄντες
  chosen: since they were disagreeing
  alternatives:
  - being in disagreement
  - being at odds
  lexicon: BDAG
  rationale: The participial construction with ἀσύμφωνοι and ὄντες describes their
    state of discord. 'Disagreeing' is natural modern English and preserves the sense
    without over-literal awkwardness.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - among themselves
  lexicon: BDAG
  rationale: This reciprocal phrase indicates mutual disagreement. 'With one another'
    is the most direct idiomatic rendering.
- source_word: ἀπελύοντο
  chosen: they were leaving
  alternatives:
  - they departed
  - they were dismissed
  lexicon: BDAG
  rationale: In this middle/passive imperfect context, the sense is that the group
    was breaking up and departing. 'They were leaving' captures the inceptive/process
    nuance in readable English better than the more formal 'departed.'
- source_word: εἰπόντος τοῦ Παύλου
  chosen: after Paul had said
  alternatives:
  - when Paul had spoken
  - Paul having said
  lexicon: BDAG
  rationale: The genitive absolute is best rendered with a temporal clause in English.
    'After Paul had said' fits the sequence naturally.
- source_word: ῥῆμα ἓν
  chosen: one final word
  alternatives:
  - one word
  - one statement
  lexicon: BDAG
  rationale: Literally 'one word,' but idiomatically it introduces a concluding remark.
    'One final word' conveys the discourse function without straying from the source.
- source_word: Καλῶς
  chosen: rightly
  alternatives:
  - well
  - truly
  lexicon: BDAG
  rationale: Here καλῶς evaluates the correctness of what the Holy Spirit said. 'Rightly'
    communicates that evaluative force more clearly than the more ambiguous 'well.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: The Holy Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: Standard English rendering of the definite phrase; capitalization reflects
    personal divine reference in keeping with orthodox Christian usage and the verse's
    clear referent.
- source_word: ἐλάλησεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak.' 'Spoke' fits the formal prophetic mediation
    phrase that follows.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  chosen: through Isaiah the prophet
  alternatives:
  - by means of Isaiah the prophet
  lexicon: BDAG
  rationale: διά with the genitive marks agency/instrumentality. 'Through Isaiah the
    prophet' is the standard and clear rendering for prophetic mediation.
- source_word: πρὸς τοὺς πατέρας ὑμῶν
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: BDAG
  rationale: πατέρας is literally 'fathers.' Per the translation philosophy's gender-accurate
    principle, the masculine familial term is retained rather than neutralized to
    'ancestors,' though that sense is contextually included.
