theological_decisions:
- issue: Reference of 'your fathers'
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Greek explicitly uses the masculine plural πατέρας. Following the
    gender-accurate principle, the translation preserves 'fathers' rather than smoothing
    to a gender-neutral term, while recognizing that it refers to the forefathers
    of Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Agency of the Holy Spirit in prophetic speech
  chosen_reading: The Holy Spirit spoke rightly through Isaiah the prophet
  alternative_readings:
  - The Holy Spirit rightly spoke by Isaiah the prophet
  rationale: The wording preserves the text's explicit attribution of prophetic speech
    to the Holy Spirit mediated through Isaiah, without reducing the Spirit to an
    impersonal force or altering the syntax beyond normal English style.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
