id: ACT.28.28
reference: Acts 28:28
source:
  edition: SBLGNT
  text: γνωστὸν οὖν ⸂ἔστω ὑμῖν⸃ ὅτι τοῖς ἔθνεσιν ἀπεστάλη ⸀τοῦτο τὸ σωτήριον τοῦ θεοῦ·
    αὐτοὶ καὶ ⸀ἀκούσονται.
translation:
  text: Therefore let it be known to you that this salvation of God has been sent
    to the Gentiles; they also will listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this salvation from God.' The Greek genitive can be understood in more
      than one closely related way.
    reason: lexical_alternative
  - marker: b
    text: Or 'they too will hear.' The verb can mean either 'hear' or 'listen/respond,'
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ... ἔστω ὑμῖν
  chosen: let it be known to you
  alternatives:
  - be it known to you
  - know this
  lexicon: BDAG
  rationale: The idiom combines the predicate adjective γνωστόν with imperative ἔστω
    and dative ὑμῖν. 'Let it be known to you' preserves the formal force and public-declarative
    tone better than the more compressed 'know this.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks inference from the preceding exchange. 'Therefore' best preserves
    the logical conclusion Paul is drawing.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη in Jewish/Gentile contrast normally refers to non-Jews,
    so 'Gentiles' is the clearest contextual rendering. 'Nations' is more literal
    but less precise in this discourse setting.
- source_word: ἀπεστάλη
  chosen: has been sent
  alternatives:
  - was sent
  lexicon: BDAG
  rationale: The aorist passive states the completed sending of God's salvation message.
    English present perfect communicates a completed action with present relevance
    in a natural way; 'was sent' is possible but slightly flatter in context.
- source_word: τοῦτο τὸ σωτήριον τοῦ θεοῦ
  chosen: this salvation of God
  alternatives:
  - this salvation from God
  - this saving message of God
  lexicon: BDAG
  rationale: σωτήριον here is substantival ('salvation'). The genitive τοῦ θεοῦ is
    left relatively literal as 'of God' to preserve the source wording and avoid over-interpreting
    whether the emphasis is source ('from God') or possession/character. 'Saving message'
    is interpretive and not required by the Greek.
- source_word: αὐτοὶ καὶ ἀκούσονται
  chosen: they also will listen
  alternatives:
  - they too will hear
  - they will indeed listen
  lexicon: BDAG
  rationale: ἀκούω can mean either 'hear' or 'listen/respond.' In this context of
    contrasting Jewish rejection with Gentile reception, 'will listen' better captures
    the likely sense of receptive hearing. αὐτοὶ with καί is represented by 'they
    also'/'they too' for emphasis.
