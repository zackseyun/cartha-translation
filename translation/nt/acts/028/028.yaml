theological_decisions:
- issue: Meaning of σωτήριον in context
  chosen_reading: Rendered as 'salvation' rather than 'saving message.'
  alternative_readings:
  - saving message
  rationale: The Greek term itself denotes salvation, and the verse states that this
    salvation has been sent to the Gentiles. While the context includes proclamation,
    translating it as 'saving message' imports an explanatory nuance not demanded
    by the text. The wording preserves the theological breadth of God's saving action
    reaching the Gentiles.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Force of ἀκούσονται
  chosen_reading: Rendered as receptive 'will listen.'
  alternative_readings:
  - will hear
  rationale: The context contrasts rejection by some Jews with expected Gentile reception.
    'Will listen' reflects that contextual force without overstating conversion. It
    preserves the text's implication of receptivity while avoiding doctrinal embellishment.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never import doctrinal
    claims the text does not make.'
