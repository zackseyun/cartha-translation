id: ACT.28.13
reference: Acts 28:13
source:
  edition: SBLGNT
  text: ὅθεν ⸀περιελόντες κατηντήσαμεν εἰς Ῥήγιον. καὶ μετὰ μίαν ἡμέραν ἐπιγενομένου
    νότου δευτεραῖοι ἤλθομεν εἰς Ποτιόλους,
translation:
  text: From there, after weighing anchor, we came to Rhegium. And after one day,
    when a south wind came up, on the second day we came to Puteoli,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'setting sail.' The Greek participle περιελόντες is nautical and may
      refer specifically to weighing anchor or more generally to putting out to sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: From there
  alternatives:
  - from which place
  - thence
  lexicon: BDAG
  rationale: Idiomatic spatial transition in narrative; 'From there' is natural modern
    English and preserves the referential force.
- source_word: περιελόντες
  chosen: after weighing anchor
  alternatives:
  - casting off
  - setting sail
  - loosening from there
  lexicon: BDAG
  rationale: In this nautical context, the participle refers to getting underway by
    loosening or taking up what held the ship. 'After weighing anchor' is a clear,
    contextually precise English rendering. Some take it more generally as 'setting
    sail'; that alternative is preserved in a footnote because the verb can be understood
    more broadly in travel contexts.
- source_word: κατηντήσαμεν
  chosen: we came
  alternatives:
  - we arrived
  - we reached
  lexicon: BDAG
  rationale: The verb denotes arriving at a destination. 'We came' fits the narrative
    flow and pairs well with the destination phrase; 'arrived' would also be possible.
- source_word: Ῥήγιον
  chosen: Rhegium
  alternatives:
  - Reggio
  rationale: Standard transliteration of the ancient place name, following the philosophy
    of transliterating names.
- source_word: μετὰ μίαν ἡμέραν
  chosen: after one day
  alternatives:
  - after a day
  - one day later
  lexicon: BDAG
  rationale: A straightforward temporal expression. 'After one day' preserves the
    Greek structure and sense.
- source_word: ἐπιγενομένου νότου
  chosen: when a south wind came up
  alternatives:
  - when the south wind arose
  - with a south wind springing up
  lexicon: BDAG
  rationale: Genitive absolute indicating attendant circumstance. 'Came up' is natural
    modern English for wind conditions while preserving the eventive sense.
- source_word: δευτεραῖοι
  chosen: on the second day
  alternatives:
  - the next day
  - on the second day after that
  lexicon: BDAG
  rationale: The adverbial adjective indicates arrival on the second day. 'On the
    second day' is more formally transparent than 'the next day' and best matches
    the Greek.
- source_word: ἤλθομεν
  chosen: we came
  alternatives:
  - we arrived
  - we went
  lexicon: BDAG
  rationale: Common motion verb; 'we came' is idiomatic in English with destination
    specified by 'to Puteoli.'
- source_word: Ποτιόλους
  chosen: Puteoli
  alternatives: []
  rationale: Standard transliteration of the place name.
