id: ACT.28.26
reference: Acts 28:26
source:
  edition: SBLGNT
  text: ⸀λέγων· Πορεύθητι πρὸς τὸν λαὸν τοῦτον καὶ εἰπόν· Ἀκοῇ ἀκούσετε καὶ οὐ μὴ
    συνῆτε, καὶ βλέποντες βλέψετε καὶ οὐ μὴ ἴδητε·
translation:
  text: 'saying, ‘Go to this people and say: You will indeed hear, but you will never
    understand; and though seeing, you will see, but you will never perceive.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'By hearing you will hear,' an emphatic Hebrew-style expression
      preserved in the Greek quotation from Isaiah.
    reason: lexical_alternative
  - marker: b
    text: Or 'and seeing you will see, and you will certainly not see.' The Greek
      uses repeated sight-language, but the final verb can imply inward perception
      in context.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present participle introducing the quotation; 'saying' preserves the
    participial linkage to the preceding clause more transparently than converting
    to a finite verb.
- source_word: Πορεύθητι
  chosen: Go
  alternatives:
  - Go your way
  - Travel
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative of πορεύομαι functions idiomatically
    as an imperative of movement. 'Go' is the most natural and sufficiently formal
    rendering.
- source_word: λαὸν τοῦτον
  chosen: this people
  alternatives:
  - this people group
  - these people
  lexicon: BDAG
  rationale: λαός commonly means 'people' in a collective sense. 'This people' preserves
    the prophetic, collective address echoing Isaiah better than the more idiomatic
    but less formally aligned 'these people'.
- source_word: εἰπόν
  chosen: say
  alternatives:
  - tell
  lexicon: BDAG
  rationale: Aorist imperative of λέγω. 'Say' matches the direct-speech introduction
    and preserves the formal parallelism with the Greek.
- source_word: Ἀκοῇ ἀκούσετε
  chosen: You will indeed hear
  alternatives:
  - Hearing, you will hear
  - You will surely hear
  lexicon: BDAG
  rationale: The dative noun plus cognate verb is a Semitic/prophetic intensification.
    'Indeed hear' conveys emphasis in readable English without awkward literalism;
    the more literal alternative is preserved in a footnote.
- source_word: οὐ μὴ συνῆτε
  chosen: you will never understand
  alternatives:
  - you will certainly not understand
  - you will by no means understand
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive is an emphatic negation. 'Never understand'
    communicates the force naturally in modern English.
- source_word: βλέποντες βλέψετε
  chosen: though seeing, you will see
  alternatives:
  - Seeing, you will see
  - You will indeed look
  lexicon: BDAG
  rationale: The participle plus finite verb creates emphatic parallelism with the
    previous clause. 'Though seeing, you will see' preserves both the participial
    form and the rhetorical irony.
- source_word: οὐ μὴ ἴδητε
  chosen: you will never perceive
  alternatives:
  - you will certainly not see
  - you will by no means perceive
  lexicon: BDAG
  rationale: Although ὁράω can mean physical 'see,' in this prophetic context the
    contrast is between sensory exposure and inward apprehension. 'Perceive' best
    captures that sense while maintaining the parallel with 'understand'.
