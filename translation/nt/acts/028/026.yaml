theological_decisions:
- issue: Rendering of prophetic quotation from Isaiah with sensory verbs that imply
    spiritual dullness
  chosen_reading: Use 'understand' and 'perceive' to reflect the inward, not merely
    physical, failure indicated by συνίημι and ὁράω in context.
  alternative_readings:
  - Use 'see' in the final clause for tighter lexical repetition
  rationale: The quotation contrasts external hearing/seeing with internal comprehension.
    Preserving that tension is more important than mechanically repeating 'see' in
    English, though the lexical repetition is noted in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
