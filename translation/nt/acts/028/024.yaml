id: ACT.28.24
reference: Acts 28:24
source:
  edition: SBLGNT
  text: καὶ οἱ μὲν ἐπείθοντο τοῖς λεγομένοις οἱ δὲ ἠπίστουν,
translation:
  text: And some were persuaded by what was being said, but others refused to believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disbelieved' or 'did not believe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείθοντο
  chosen: were persuaded
  alternatives:
  - were convinced
  - believed
  lexicon: BDAG
  rationale: Imperfect passive/middle indicates an ongoing response to Paul's message.
    'Were persuaded' preserves the sense of being convinced by the arguments without
    collapsing it into full saving-faith language. 'Believed' is possible in context
    but would blur the contrast with ἠπίστουν too strongly.
- source_word: τοῖς λεγομένοις
  chosen: by what was being said
  alternatives:
  - by the things being spoken
  - by what was said
  lexicon: BDAG
  rationale: The articular present passive participle refers to the content of the
    speech/message. 'What was being said' captures the ongoing discourse and reads
    naturally in English. The passive English also reflects the Greek participial
    form.
- source_word: ἠπίστουν
  chosen: refused to believe
  alternatives:
  - disbelieved
  - were unbelieving
  - did not believe
  lexicon: BDAG
  rationale: ἀπιστέω can mean 'disbelieve' or 'refuse to believe.' In this contrastive
    context, 'refused to believe' brings out the volitional nuance and sharp opposition
    to those persuaded. It is stronger and more idiomatic than 'were unbelieving.'
- source_word: οἱ μὲν ... οἱ δὲ
  chosen: some ... but others
  alternatives:
  - some ... and others
  - the ones ... but the others
  lexicon: Greek grammar
  rationale: This correlative construction marks a division within the group. 'Some
    ... but others' is the most natural English equivalent and preserves the contrast
    signaled by μέν ... δέ.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - So
  lexicon: BDAG
  rationale: καί here links this verse to the preceding narrative. 'And' is a straightforward
    connective that preserves continuity without overinterpreting the discourse relation.
