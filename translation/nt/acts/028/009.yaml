id: ACT.28.9
reference: Acts 28:9
source:
  edition: SBLGNT
  text: τούτου ⸀δὲ γενομένου καὶ οἱ λοιποὶ οἱ ⸂ἐν τῇ νήσῳ ἔχοντες ἀσθενείας⸃ προσήρχοντο
    καὶ ἐθεραπεύοντο,
translation:
  text: And after this happened, the rest of those on the island who had diseases
    also came and were healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were sick.' The Greek literally says 'having diseases/illnesses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου δὲ γενομένου
  chosen: after this happened
  alternatives:
  - when this had happened
  - after this took place
  lexicon: BDAG
  rationale: Genitive absolute with δέ marking transition; 'after this happened' gives
    natural English temporal sequence without overformal stiffness.
- source_word: οἱ λοιποί
  chosen: the rest
  alternatives:
  - the others
  - the remaining people
  lexicon: BDAG
  rationale: λοιποί refers to those remaining beyond the previously mentioned case;
    'the rest' is concise and idiomatic.
- source_word: οἱ ἐν τῇ νήσῳ
  chosen: those on the island
  alternatives:
  - those in the island
  - the people on the island
  lexicon: BDAG
  rationale: The article plus prepositional phrase identifies the group located on
    Malta; English idiom prefers 'on the island' for islands.
- source_word: ἔχοντες ἀσθενείας
  chosen: who had diseases
  alternatives:
  - who were sick
  - who had illnesses
  - who had sicknesses
  lexicon: BDAG
  rationale: The participle ἔχοντες with plural ἀσθενείας is literally 'having illnesses/diseases.'
    'Who had diseases' preserves the concrete plural better than the more generalized
    'were sick,' while remaining readable.
- source_word: προσήρχοντο
  chosen: came
  alternatives:
  - were coming
  - came to him
  - approached
  lexicon: BDAG
  rationale: Imperfect middle here describes repeated/inceptive approach in context.
    English simple past 'came' communicates the narrative flow naturally; 'to him'
    is implied by context but not explicit in the Greek, so it is not added.
- source_word: ἐθεραπεύοντο
  chosen: were healed
  alternatives:
  - were being healed
  - received healing
  - were cured
  lexicon: BDAG
  rationale: Imperfect passive indicates they were healed as they came. 'Were healed'
    is standard, clear English and preserves the passive sense without awkwardness.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  - indeed
  lexicon: BDAG
  rationale: 'The second καί links this event to the previous healing and can be brought
    out adverbially in English as ''also'' to show continuation: others also came
    and were healed.'
