id: ACT.28.5
reference: Acts 28:5
source:
  edition: SBLGNT
  text: ὁ μὲν οὖν ἀποτινάξας τὸ θηρίον εἰς τὸ πῦρ ἔπαθεν οὐδὲν κακόν·
translation:
  text: So he, after shaking the creature off into the fire, suffered no harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beast' or 'the animal'; the Greek term is general, though the context
      identifies it as a snake.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν οὖν
  chosen: So he
  alternatives:
  - Then he
  - He then
  - So he indeed
  lexicon: BDAG
  rationale: The article functions pronominally ('he'), referring back to Paul. μέν
    with οὖν gives a mild transitional/resumptive force. 'So he' captures the narrative
    continuation in natural English without overtranslating the particles.
- source_word: ἀποτινάξας
  chosen: after shaking ... off
  alternatives:
  - having shaken ... off
  - shaking ... off
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb, so 'after shaking
    ... off' clearly conveys prior action in idiomatic English while preserving the
    participial relationship.
- source_word: τὸ θηρίον
  chosen: the creature
  alternatives:
  - the beast
  - the animal
  - the viper
  lexicon: BDAG
  rationale: θηρίον is a general term for an animal/creature, often a wild one. In
    this immediate context it refers to the snake from the previous verse, but the
    Greek here does not use the more specific word for 'snake' or 'viper.' 'The creature'
    preserves the source's lexical generality better than 'viper,' while remaining
    natural.
- source_word: εἰς τὸ πῦρ
  chosen: into the fire
  alternatives:
  - into the flames
  - in the fire
  lexicon: BDAG
  rationale: A straightforward spatial expression. 'Into the fire' is the most direct
    and natural rendering of εἰς + accusative.
- source_word: ἔπαθεν
  chosen: suffered
  alternatives:
  - experienced
  - was affected by
  lexicon: BDAG
  rationale: πάσχω commonly means 'suffer' or 'experience.' With οὐδὲν κακόν, 'suffered'
    is the standard and most idiomatic collocation in English.
- source_word: οὐδὲν κακόν
  chosen: no harm
  alternatives:
  - nothing bad
  - no ill effect
  - nothing harmful
  lexicon: BDAG
  rationale: The phrase is idiomatic and denotes absence of injury or ill effect.
    'No harm' is concise, natural, and accurately reflects the sense.
