id: ACT.28.14
reference: Acts 28:14
source:
  edition: SBLGNT
  text: οὗ εὑρόντες ἀδελφοὺς παρεκλήθημεν ⸀παρ’ αὐτοῖς ἐπιμεῖναι ἡμέρας ἑπτά· καὶ
    οὕτως εἰς τὴν Ῥώμην ἤλθαμεν.
translation:
  text: There we found brothers, and we were invited to stay with them seven days.
    And so we came to Rome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' but in this context
      it likely refers to fellow believers generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  chosen: There
  alternatives:
  - where
  lexicon: BDAG
  rationale: Locative relative adverb referring back to the place just mentioned (Puteoli).
    English idiom prefers 'There' at the start of the sentence rather than the more
    formal 'where.'
- source_word: εὑρόντες
  chosen: we found
  alternatives:
  - having found
  lexicon: BDAG
  rationale: Aorist participle, nominative plural, linked to the main verb with the
    same subject. Rendered as a finite verb in natural English while preserving the
    sequence of action.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: In Acts this commonly refers to fellow believers. Per translation philosophy,
    the masculine form is retained as 'brothers' rather than made gender-neutral in
    the main text; the contextual sense can be noted in a footnote.
- source_word: παρεκλήθημεν
  chosen: we were invited
  alternatives:
  - we were urged
  - we were entreated
  - we were asked
  lexicon: BDAG
  rationale: Passive of παρακαλέω here most naturally means receiving an appeal/request
    from the local believers. 'Invited' fits the hospitality context better than the
    more formal 'urged,' while still reflecting the passive sense.
- source_word: παρ’ αὐτοῖς
  chosen: with them
  alternatives:
  - beside them
  - at their place
  lexicon: BDAG
  rationale: παρά with the dative here indicates association/lodging in their company.
    'With them' is the most natural English rendering in context.
- source_word: ἐπιμεῖναι
  chosen: to stay
  alternatives:
  - to remain
  - to continue
  lexicon: BDAG
  rationale: Infinitive of ἐπιμένω in a travel/hospitality setting is best rendered
    'to stay.' 'Remain' is possible but less idiomatic in contemporary English.
- source_word: ἡμέρας ἑπτά
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: BDAG
  rationale: Accusative of extent of time. English can express this naturally as 'seven
    days'; the duration sense is clear from 'stay.'
- source_word: καὶ οὕτως
  chosen: And so
  alternatives:
  - and in this way
  - and thus
  lexicon: BDAG
  rationale: Marks the transition/result in the travel narrative. 'And so' is natural
    modern English and preserves the connective force without sounding stiff.
- source_word: εἰς τὴν Ῥώμην ἤλθαμεν
  chosen: we came to Rome
  alternatives:
  - we arrived at Rome
  - we went to Rome
  lexicon: BDAG
  rationale: ἔρχομαι with εἰς + accusative indicates arrival at destination. 'Came
    to Rome' is straightforward and preserves Luke's first-person travel narrative.
