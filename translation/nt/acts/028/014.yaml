theological_decisions:
- issue: Referent of ἀδελφοὺς
  chosen_reading: fellow believers in the local Christian community
  alternative_readings:
  - biological brothers
  - Jewish compatriots more generally
  rationale: In Acts, 'brothers' in such travel contexts ordinarily refers to fellow
    Christians who offer hospitality. The immediate context of invitation and lodging
    supports this communal-believer sense. The main text keeps the lexical form 'brothers'
    while not over-specifying beyond the context.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
