id: ACT.28.19
reference: Acts 28:19
source:
  edition: SBLGNT
  text: ἀντιλεγόντων δὲ τῶν Ἰουδαίων ἠναγκάσθην ἐπικαλέσασθαι Καίσαρα, οὐχ ὡς τοῦ
    ἔθνους μου ἔχων τι ⸀κατηγορεῖν.
translation:
  text: But because the Jews objected, I was compelled to appeal to Caesar—not because
    I had anything to accuse my nation of.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while the Jews were opposing me' or 'because the Jews were contradicting
      me.'
    reason: lexical_alternative
  - marker: b
    text: '''The Jews'' here refers to Paul''s Jewish opponents in this legal context,
      not a blanket statement about all Jewish people.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀντιλεγόντων
  chosen: because ... objected
  alternatives:
  - while ... were opposing
  - because ... were contradicting
  - because ... objected
  lexicon: BDAG
  rationale: The genitive absolute with present participle gives the circumstance
    prompting Paul's action. 'Objected' is idiomatic modern English and fits the legal
    setting better than the more wooden 'contradicting,' while still preserving opposition
    rather than mere verbal disagreement.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous statement. 'But'
    best reflects the adversative nuance in context.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The text says 'the Jews' without further qualification. In Acts this
    can denote Jewish opponents in context; here Paul is recounting the response of
    the Jewish accusers. 'Judeans' is possible in some contexts but less likely here,
    and 'Jewish leaders' would add specificity not present in the Greek.
- source_word: ἠναγκάσθην
  chosen: I was compelled
  alternatives:
  - I was forced
  - I had to
  lexicon: BDAG
  rationale: The passive conveys constraint or necessity. 'I was compelled' preserves
    the formal/legal pressure without sounding overly colloquial.
- source_word: ἐπικαλέσασθαι Καίσαρα
  chosen: to appeal to Caesar
  alternatives:
  - to invoke Caesar
  - to appeal to the emperor
  lexicon: BDAG
  rationale: This is a technical legal expression in Acts for exercising the right
    of appeal to the emperor. 'Appeal to Caesar' is the most precise and recognizable
    rendering; 'Caesar' is retained as the title/name used in the Greek.
- source_word: οὐχ ὡς
  chosen: not because
  alternatives:
  - not as though
  - not that
  lexicon: BDAG
  rationale: Introduces a clarification of motive. 'Not because' is natural English
    and accurately conveys Paul's denial of hostile intent.
- source_word: τοῦ ἔθνους μου
  chosen: my nation
  alternatives:
  - my people
  - my ethnic people
  lexicon: BDAG
  rationale: ἔθνος here refers to Paul's own people as a national/ethnic body. 'My
    nation' preserves the corporate sense and echoes the legal-public register of
    the sentence. 'My people' is possible but slightly less specific.
- source_word: ἔχων τι κατηγορεῖν
  chosen: I had anything to accuse ... of
  alternatives:
  - having anything to charge ... with
  - having any accusation against
  lexicon: BDAG
  rationale: The participle plus infinitive expresses possessing grounds for accusation.
    'Anything to accuse ... of' is clear, idiomatic, and preserves the forensic sense.
