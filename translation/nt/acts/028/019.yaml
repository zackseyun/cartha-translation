theological_decisions:
- issue: Reference of 'the Jews' in a potentially sensitive ethnic/religious expression
  chosen_reading: Retain 'the Jews' in the main text as the direct rendering of τῶν
    Ἰουδαίων, without softening to 'Jewish leaders' or 'Judeans.'
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation follows original-language primacy and does not narrow
    or redefine the referent beyond what the Greek states. In this verse the phrase
    refers contextually to Paul's Jewish accusers/opponents, not to all Jewish people
    universally; that contextual clarification is best preserved in a footnote rather
    than by altering the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy) and §6
    (Readable modern English)
