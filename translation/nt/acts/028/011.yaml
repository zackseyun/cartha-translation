theological_decisions:
- issue: Rendering the pagan ship emblem Διοσκούροις
  chosen_reading: the Twin Gods
  alternative_readings:
  - the Dioscuri
  - Castor and Pollux
  rationale: The verse reports a pagan maritime emblem without endorsing it. 'The
    Twin Gods' makes the religious reference explicit for modern readers; a footnote
    preserves the proper mythological name.
