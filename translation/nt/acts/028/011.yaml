id: ACT.28.11
reference: Acts 28:11
source:
  edition: SBLGNT
  text: Μετὰ δὲ τρεῖς μῆνας ⸀ἀνήχθημεν ἐν πλοίῳ παρακεχειμακότι ἐν τῇ νήσῳ Ἀλεξανδρίνῳ,
    παρασήμῳ Διοσκούροις.
translation:
  text: After three months we set sail in an Alexandrian ship that had wintered on
    the island, with the Twin Gods as its figurehead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the Dioscuri,'' that is, Castor and Pollux, the twin sons of Zeus
      in Greco-Roman mythology.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τρεῖς μῆνας
  chosen: After three months
  alternatives:
  - And after three months
  - Now after three months
  lexicon: BDAG
  rationale: μετά with the accusative expresses time after an interval. δέ is lightly
    connective and can be left untranslated in smooth English without loss of meaning.
- source_word: ἀνήχθημεν
  chosen: we set sail
  alternatives:
  - we put out to sea
  - we sailed away
  lexicon: BDAG
  rationale: ἀνάγω in nautical contexts means to put to sea or set sail. 'We set sail'
    is idiomatic modern English and fits the travel narrative.
- source_word: ἐν πλοίῳ
  chosen: in a ... ship
  alternatives:
  - on a ... ship
  - in a vessel
  lexicon: BDAG
  rationale: πλοῖον is a ship or boat. 'Ship' best fits the larger Alexandrian grain
    vessel context in Acts 27–28. English idiom often prefers 'in' or 'on'; 'in a
    ship' preserves the Greek preposition while remaining natural enough.
- source_word: παρακεχειμακότι
  chosen: that had wintered
  alternatives:
  - that had spent the winter
  - that had wintered over
  lexicon: BDAG
  rationale: The perfect active participle of παραχειμάζω describes a ship that had
    remained through the winter. 'Had wintered' is concise and accurate.
- source_word: ἐν τῇ νήσῳ
  chosen: on the island
  alternatives:
  - in the island
  lexicon: BDAG
  rationale: Although Greek uses ἐν, idiomatic English with islands is 'on the island.'
    The referent is Malta from the immediate context.
- source_word: Ἀλεξανδρίνῳ
  chosen: Alexandrian
  alternatives:
  - from Alexandria
  lexicon: BDAG
  rationale: The adjective modifies 'ship' and denotes origin or association with
    Alexandria. 'Alexandrian ship' is the most direct rendering.
- source_word: παρασήμῳ
  chosen: with ... as its figurehead
  alternatives:
  - bearing the insignia of
  - marked with the sign of
  lexicon: BDAG
  rationale: παράσημος refers to a distinguishing mark, emblem, or figurehead on a
    ship. In this maritime context, 'figurehead' best conveys the likely visible ship's
    emblem.
- source_word: Διοσκούροις
  chosen: the Twin Gods
  alternatives:
  - the Dioscuri
  - Castor and Pollux
  - the Twin Brothers
  lexicon: BDAG
  rationale: Διόσκουροι refers to the Dioscuri, the twin sons of Zeus known in Latin
    tradition as Castor and Pollux. 'The Twin Gods' communicates the referent clearly
    to modern readers while preserving the pagan character of the emblem.
