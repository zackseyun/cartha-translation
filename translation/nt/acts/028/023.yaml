theological_decisions:
- issue: Scope of Paul's witness regarding Jesus and the kingdom
  chosen_reading: Paul is presented as explaining the kingdom of God and persuading
    them concerning Jesus on the basis of Israel's Scriptures.
  alternative_readings:
  - Paul was preaching two separate topics with no necessary connection between them
  rationale: The syntax joins 'the kingdom of God' and 'concerning Jesus' within one
    sustained exposition. The translation preserves the textual linkage without importing
    a fuller theological system beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
