id: ACT.28.23
reference: Acts 28:23
source:
  edition: SBLGNT
  text: Ταξάμενοι δὲ αὐτῷ ἡμέραν ⸀ἧκον πρὸς αὐτὸν εἰς τὴν ξενίαν πλείονες, οἷς ἐξετίθετο
    διαμαρτυρόμενος τὴν βασιλείαν τοῦ θεοῦ πείθων τε ⸀αὐτοὺς περὶ τοῦ Ἰησοῦ ἀπό τε
    τοῦ νόμου Μωϋσέως καὶ τῶν προφητῶν ἀπὸ πρωῒ ἕως ἑσπέρας.
translation:
  text: After they had arranged a day with him, more of them came to him at his lodging.
    To them he was explaining, solemnly testifying about the kingdom of God and trying
    to persuade them concerning Jesus from both the Law of Moses and the Prophets,
    from morning until evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his lodging' or 'to the place where he was staying.' The Greek term
      refers to lodging or accommodations.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was expounding' or 'setting forth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and persuading them'; the Greek participle can emphasize either the
      act of persuasion or the attempt to persuade.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταξάμενοι ... ἡμέραν
  chosen: After they had arranged a day with him
  alternatives:
  - having appointed a day for him
  - after setting a day with him
  lexicon: BDAG
  rationale: The aorist middle participle with ἡμέραν idiomatically refers to fixing
    or arranging a meeting day. 'With him' reflects αὐτῷ naturally in English in this
    context.
- source_word: ἧκον
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Simple narrative motion verb; 'came' is the most natural English rendering
    here.
- source_word: εἰς τὴν ξενίαν
  chosen: at his lodging
  alternatives:
  - to his lodging
  - to the place where he was staying
  - to his quarters
  lexicon: BDAG
  rationale: ξενία can denote lodging or guest room/accommodations. 'At his lodging'
    communicates the sense idiomatically in English and fits the context of Paul's
    rented quarters.
- source_word: πλείονες
  chosen: more of them
  alternatives:
  - many
  - a larger number
  lexicon: BDAG
  rationale: 'Comparative sense is present: more came on this arranged day than previously.
    ''More of them'' preserves that nuance better than the flatter ''many.'''
- source_word: ἐξετίθετο
  chosen: he was explaining
  alternatives:
  - he was expounding
  - he was setting forth
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing exposition. 'Explaining' is clear
    modern English; 'expounding' is possible but slightly more technical.
- source_word: διαμαρτυρόμενος
  chosen: solemnly testifying about
  alternatives:
  - earnestly testifying about
  - bearing solemn witness to
  lexicon: BDAG
  rationale: The participle adds the sense of earnest, solemn witness. 'Solemnly testifying'
    preserves the force without becoming wooden.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  lexicon: BDAG
  rationale: Standard and transparent rendering; no reason to depart from the established
    equivalent.
- source_word: πείθων τε αὐτοὺς
  chosen: and trying to persuade them
  alternatives:
  - and persuading them
  - and seeking to convince them
  lexicon: BDAG
  rationale: The present participle in context suggests ongoing persuasive effort,
    not necessarily successful persuasion of all hearers. 'Trying to persuade' captures
    the process nuance.
- source_word: περὶ τοῦ Ἰησοῦ
  chosen: concerning Jesus
  alternatives:
  - about Jesus
  lexicon: BDAG
  rationale: Either is possible; 'concerning' slightly better matches the formal explanatory
    tone of the sentence.
- source_word: ἀπό τε τοῦ νόμου Μωϋσέως καὶ τῶν προφητῶν
  chosen: from both the Law of Moses and the Prophets
  alternatives:
  - from the law of Moses and from the prophets
  - from the Mosaic Law and the Prophets
  lexicon: BDAG
  rationale: ἀπό marks source or basis of argument. 'From both ... and ...' reflects
    the τε ... καί pairing. 'Law of Moses' is more transparent than 'Mosaic Law' and
    closely follows the Greek.
- source_word: ἀπὸ πρωῒ ἕως ἑσπέρας
  chosen: from morning until evening
  alternatives:
  - from early morning until evening
  - from dawn to dusk
  lexicon: BDAG
  rationale: This is a straightforward temporal span. 'From morning until evening'
    is accurate and idiomatic without overinterpreting πρωῒ as 'dawn.'
