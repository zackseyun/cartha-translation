id: ACT.28.22
reference: Acts 28:22
source:
  edition: SBLGNT
  text: ἀξιοῦμεν δὲ παρὰ σοῦ ἀκοῦσαι ἃ φρονεῖς, περὶ μὲν γὰρ τῆς αἱρέσεως ταύτης γνωστὸν
    ⸂ἡμῖν ἐστιν⸃ ὅτι πανταχοῦ ἀντιλέγεται.
translation:
  text: But we consider it proper to hear from you what you think, for concerning
    this sect it is known to us that it is spoken against everywhere.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'party' or 'movement'; Greek αἵρεσις here does not necessarily mean 'heresy'
      in the later technical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀξιοῦμεν
  chosen: we consider it proper
  alternatives:
  - we think it fitting
  - we deem it worthy
  - we desire
  lexicon: BDAG
  rationale: In this context the verb expresses a judgment of appropriateness or propriety
    rather than a demand of merit. 'We consider it proper' captures the polite, formal
    tone of the speakers better than a stronger 'we demand' or a weaker 'we desire'.
- source_word: παρὰ σοῦ ἀκοῦσαι
  chosen: to hear from you
  alternatives:
  - to hear from your side
  - to hear from you directly
  lexicon: BDAG
  rationale: The construction with παρά + genitive emphasizes hearing from Paul himself.
    'To hear from you' is natural English and preserves the direct-source nuance without
    overtranslating.
- source_word: ἃ φρονεῖς
  chosen: what you think
  alternatives:
  - what your views are
  - what you have in mind
  lexicon: BDAG
  rationale: φρονέω here refers to one's viewpoint or opinion. 'What you think' is
    clear, idiomatic, and sufficiently close to the Greek.
- source_word: αἱρέσεως
  chosen: sect
  alternatives:
  - party
  - school
  - movement
  lexicon: BDAG
  rationale: In Acts, αἵρεσις often denotes a recognized group or faction, not yet
    the later technical sense 'heresy.' 'Sect' best fits the social-religious sense
    here and avoids importing later doctrinal connotations.
- source_word: γνωστὸν ἡμῖν ἐστιν
  chosen: it is known to us
  alternatives:
  - we know
  - it is well known to us
  lexicon: BDAG
  rationale: The impersonal construction is preserved in English. 'It is known to
    us' reflects the Greek structure and keeps the formal register.
- source_word: πανταχοῦ
  chosen: everywhere
  alternatives:
  - in every place
  lexicon: BDAG
  rationale: πανταχοῦ is straightforwardly locative and broad in scope. 'Everywhere'
    is the natural English equivalent.
- source_word: ἀντιλέγεται
  chosen: it is spoken against
  alternatives:
  - it is opposed
  - it is contradicted
  lexicon: BDAG
  rationale: The passive conveys that people everywhere are speaking against this
    group. 'It is spoken against' preserves the verbal nuance better than the more
    abstract 'it is opposed'.
