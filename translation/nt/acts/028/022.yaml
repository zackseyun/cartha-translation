theological_decisions:
- issue: Rendering αἵρεσις
  chosen_reading: sect
  alternative_readings:
  - heresy
  rationale: The term here refers to the Christian movement as viewed by outsiders,
    not a formal doctrinal deviation. Rendering it 'heresy' would import later ecclesiastical
    meaning not warranted by the first-century context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
