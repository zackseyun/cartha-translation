id: ACT.28.16
reference: Acts 28:16
source:
  edition: SBLGNT
  text: Ὅτε δὲ ⸀εἰσήλθομεν εἰς Ῥώμην, ⸂ἐπετράπη τῷ Παύλῳ⸃ μένειν καθ’ ἑαυτὸν σὺν τῷ
    φυλάσσοντι αὐτὸν στρατιώτῃ.
translation:
  text: When we entered Rome, Paul was permitted to stay by himself with the soldier
    guarding him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Paul was allowed to live by himself with a soldier guarding him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅτε
  chosen: When
  alternatives:
  - Now when
  - And when
  lexicon: BDAG
  rationale: Temporal conjunction introducing the circumstance of arrival; 'When'
    is the natural modern English equivalent.
- source_word: δὲ
  chosen: —
  alternatives:
  - now
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective. In smooth modern English it is best left
    untranslated rather than forcing an awkward discourse marker.
- source_word: εἰσήλθομεν εἰς Ῥώμην
  chosen: we entered Rome
  alternatives:
  - we came into Rome
  - we arrived in Rome
  lexicon: BDAG
  rationale: The aorist of εἰσέρχομαι with εἰς + accusative is straightforwardly 'enter
    into.' 'Entered Rome' preserves the motion sense more directly than the more interpretive
    'arrived in Rome.'
- source_word: ἐπετράπη τῷ Παύλῳ
  chosen: Paul was permitted
  alternatives:
  - it was permitted to Paul
  - Paul was allowed
  lexicon: BDAG
  rationale: Passive of ἐπιτρέπω expresses permission granted to Paul. 'Was permitted'
    is slightly more formal and close to the Greek while remaining natural.
- source_word: μένειν
  chosen: to stay
  alternatives:
  - to remain
  - to live
  lexicon: BDAG
  rationale: Infinitive complement to ἐπετράπη. 'Stay' is idiomatic in context of
    lodging/house arrest; 'remain' is possible but less natural in contemporary English.
- source_word: καθ’ ἑαυτόν
  chosen: by himself
  alternatives:
  - alone
  - in his own quarters
  lexicon: BDAG
  rationale: Idiomatic expression meaning separately/on one's own. 'By himself' preserves
    the sense without overstating total isolation, since the following phrase qualifies
    that a soldier was with him.
- source_word: σὺν τῷ φυλάσσοντι αὐτὸν στρατιώτῃ
  chosen: with the soldier guarding him
  alternatives:
  - with the soldier who was guarding him
  - with a soldier guarding him
  lexicon: BDAG
  rationale: σύν indicates accompaniment; the present participle φυλάσσοντι is attributive/descriptive.
    The article suggests a specific assigned guard in the situation, so 'the soldier'
    is preferable to the indefinite 'a soldier.'
