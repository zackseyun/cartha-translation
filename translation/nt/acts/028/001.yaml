  from: And after we had been brought safely through, then we learned
  to: After we were brought safely through, we then learned
  rationale: The current 'And after..., then...' construction is slightly redundant and awkward in English. While it formally accounts for both 'Καὶ' and 'τότε', the result is less natural than it could be. Shifting to 'After..., we then...' removes the less essential initial conjunction and places 'then' in a more idiomatic position, creating a smoother sentence without losing the temporal sequence indicated by 'τότε'.
