id: ACT.28.1
reference: Acts 28:1
source:
  edition: SBLGNT
  text: Καὶ διασωθέντες τότε ⸀ἐπέγνωμεν ὅτι ⸀Μελίτη ἡ νῆσος καλεῖται.
translation:
  text: After we were brought safely through, we then learned that the island was called Malta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'after we had escaped safely' or 'after we had been saved.' The Greek verb can emphasize safe deliverance through danger.
    reason: lexical_alternative
  - marker: b
    text: Greek Melitē, the island traditionally identified as Malta.
    reason: cultural_note
  - marker: c
    text: Literally, 'the island is called Malta.' The Greek uses a present passive in reported information.
    reason: lexical_alternative
  - marker: d
    text: Or 'And after we had been brought safely through, then we learned'.
    reason: previous_rendering
lexical_decisions:
- source_word: διασωθέντες
  chosen: after we had been brought safely through
  alternatives:
  - after we had escaped safely
  - having been saved
  - having been brought safely to shore
  lexicon: BDAG
  rationale: Aorist passive participle of διασῴζω indicates successful deliverance through danger rather than merely physical arrival. 'Brought safely through' preserves the passive nuance and the preceding shipwreck context without over-paraphrasing.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Simple temporal adverb marking sequence; 'then' is natural modern English and preserves the narrative flow.
- source_word: ἐπέγνωμεν
  chosen: we learned
  alternatives:
  - we came to know
  - we recognized
  - we found out
  lexicon: BDAG
  rationale: ἐπιγινώσκω here denotes coming to know or learning information. 'We learned' is idiomatic and fits the discovery of the island's name.
- source_word: Μελίτη
  chosen: Malta
  alternatives:
  - Melitē
  - Melita
  lexicon: BDAG
  rationale: The proper name refers to the island traditionally and historically identified as Malta. Per philosophy, names are transliterated by standard conventions; 'Malta' is the standard English form.
- source_word: ἡ νῆσος
  chosen: the island
  alternatives:
  - the isle
  lexicon: BDAG
  rationale: Straightforward nominal phrase; 'the island' is clear modern English.
- source_word: καλεῖται
  chosen: was called
  alternatives:
  - is called
  - was named
  lexicon: BDAG
  rationale: Present passive can be rendered idiomatically in English as 'was called' in past narrative when reporting what they learned at that time. This avoids awkwardness while preserving the naming sense.
