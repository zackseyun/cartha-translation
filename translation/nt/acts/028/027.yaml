theological_decisions:
- issue: Divine intention in the Isaianic citation
  chosen_reading: Render μήποτε in a way that preserves the judicial-hardening tension
    without making God the direct efficient cause of unbelief in the English wording.
  alternative_readings:
  - Render with 'lest' to preserve a stronger purpose nuance
  - Render with 'so that they may not' to emphasize judicial purpose
  rationale: The Greek citation carries the tension of divine judgment and human culpability.
    'Otherwise' preserves that tension in readable English and avoids over-resolving
    a debated theological question, while a footnote preserves the stronger alternative
    nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἐπιστρέψωσιν
  chosen_reading: turn back
  alternative_readings:
  - turn
  - repent
  - be converted
  rationale: '''Turn back'' preserves the conversion-oriented sense without forcing
    a denominationally loaded term such as ''be converted'' or narrowing the sense
    to explicit repentance language.'
  doctrine_reference: Within historic orthodoxy, avoid importing doctrinal claims
    the text does not make.
