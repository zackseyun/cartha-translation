theological_decisions:
- issue: Nature of Paul's healing act
  chosen_reading: Render the sequence straightforwardly as prayer, laying on of hands,
    and healing, without specifying whether the healing was immediate, miraculous
    in a technical sense, or sacramental.
  alternative_readings:
  - Emphasize miraculous healing explicitly
  - Render more clinically as medical recovery
  rationale: The verse clearly presents healing through Paul's prayerful action, but
    it does not itself add interpretive labels beyond that. The translation preserves
    the narrative claim without importing denominational or theological elaboration.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
