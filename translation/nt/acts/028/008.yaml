id: ACT.28.8
reference: Acts 28:8
source:
  edition: SBLGNT
  text: ἐγένετο δὲ τὸν πατέρα τοῦ Ποπλίου πυρετοῖς καὶ ⸀δυσεντερίῳ συνεχόμενον κατακεῖσθαι,
    πρὸς ὃν ὁ Παῦλος εἰσελθὼν καὶ προσευξάμενος ἐπιθεὶς τὰς χεῖρας αὐτῷ ἰάσατο αὐτόν.
translation:
  text: Now it happened that the father of Publius was lying sick, afflicted with
    fevers and dysentery. Paul went in to him, and after praying and laying his hands
    on him, healed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'suffering from fevers and dysentery.' The Greek participle conveys being
      afflicted or gripped by these illnesses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο δὲ
  chosen: Now it happened that
  alternatives:
  - And it happened that
  - Now it came about that
  lexicon: BDAG
  rationale: A common narrative transition in Luke-Acts. 'Now it happened that' preserves
    the event-introducing force without sounding overly wooden.
- source_word: πατέρα τοῦ Ποπλίου
  chosen: the father of Publius
  alternatives:
  - Publius's father
  lexicon: BDAG
  rationale: Both are natural English; the chosen form stays slightly closer to the
    Greek genitive construction while remaining readable.
- source_word: πυρετοῖς
  chosen: fevers
  alternatives:
  - a fever
  - fever attacks
  lexicon: BDAG
  rationale: The plural is explicit in Greek and should be preserved. It likely refers
    to recurring or severe feverish episodes rather than a single fever.
- source_word: δυσεντερίῳ
  chosen: dysentery
  alternatives:
  - intestinal disease
  lexicon: BDAG
  rationale: The medical term is the plain lexical sense and remains understandable
    in modern English.
- source_word: συνεχόμενον
  chosen: afflicted with
  alternatives:
  - suffering from
  - held fast by
  - being gripped by
  lexicon: BDAG
  rationale: The participle conveys being seized or afflicted by illness. 'Afflicted
    with' is idiomatic and preserves the sense of ongoing distress.
- source_word: κατακεῖσθαι
  chosen: was lying sick
  alternatives:
  - was bedridden
  - was lying down
  lexicon: BDAG
  rationale: The verb means to be lying down, often in illness contexts. 'Was lying
    sick' captures both posture and condition without over-specifying total incapacity
    implied by 'bedridden'.
- source_word: πρὸς ὃν
  chosen: to him
  alternatives:
  - to whom
  lexicon: BDAG
  rationale: Idiomatic English prefers 'to him' here while preserving the directional
    sense of Paul's approach.
- source_word: εἰσελθὼν
  chosen: went in to him
  alternatives:
  - entered
  - came in
  lexicon: BDAG
  rationale: The participle indicates Paul entering where the sick man was. 'Went
    in to him' makes the relational movement explicit in natural English.
- source_word: προσευξάμενος
  chosen: after praying
  alternatives:
  - having prayed
  - and prayed
  lexicon: BDAG
  rationale: This aorist middle participle is naturally rendered as antecedent action
    relative to the main verb. 'After praying' communicates sequence clearly.
- source_word: ἐπιθεὶς τὰς χεῖρας αὐτῷ
  chosen: laying his hands on him
  alternatives:
  - placing his hands on him
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering for the gesture of healing/blessing
    in biblical contexts and accurately reflects the plural 'hands'.
- source_word: ἰάσατο αὐτόν
  chosen: healed him
  alternatives:
  - cured him
  - restored him to health
  lexicon: BDAG
  rationale: The verb denotes healing. 'Healed him' is the most direct and biblically
    recognizable rendering without importing extra theological nuance.
