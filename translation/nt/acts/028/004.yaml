id: ACT.28.4
reference: Acts 28:4
source:
  edition: SBLGNT
  text: ὡς δὲ εἶδον οἱ βάρβαροι κρεμάμενον τὸ θηρίον ἐκ τῆς χειρὸς αὐτοῦ, ⸂πρὸς ἀλλήλους ἔλεγον⸃· Πάντως φονεύς ἐστιν ὁ ἄνθρωπος οὗτος ὃν διασωθέντα ἐκ τῆς θαλάσσης ἡ δίκη ζῆν οὐκ εἴασεν.
translation:
  text: When the islanders saw the creature hanging from his hand, they said to one another, “Surely this man is a murderer, whom Justice has not allowed to live, though he was brought safely from the sea.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natives' or, more literally, 'the barbarians'—that is, the non-Greek-speaking local inhabitants.
    reason: lexical_alternative
  - marker: b
    text: '''Justice'' translates Greek dikē, here likely personified as retributive justice; possibly an allusion to a goddess figure in the islanders'' pagan understanding.'
    reason: cultural_note
  - marker: c
    text: Or 'whom justice did not permit to live, though he had escaped from the sea.'
    reason: alternative_reading
  - marker: d
    text: Or 'through from the sea'.
    reason: previous_rendering
lexical_decisions:
- source_word: βάρβαροι
  chosen: the islanders
  alternatives:
  - the natives
  - the local people
  - the barbarians
  lexicon: BDAG
  rationale: In this context Luke uses the conventional Greek term for non-Greek-speaking inhabitants of Malta, not a moral judgment like modern English 'barbarians.' 'Islanders' communicates the referent naturally in modern English and avoids misleading connotations, while fitting the immediate setting.
- source_word: κρεμάμενον
  chosen: hanging
  alternatives:
  - dangling
  - clinging
  lexicon: BDAG
  rationale: The participle describes the creature suspended from or attached to Paul's hand after the bite. 'Hanging' is the most straightforward rendering and preserves the visual force without overinterpreting the exact posture.
- source_word: τὸ θηρίον
  chosen: the creature
  alternatives:
  - the beast
  - the animal
  - the viper
  lexicon: BDAG
  rationale: The noun is generic ('animal/creature/beast'). Although the context identifies it as a venomous snake, the Greek here does not yet specify 'viper.' 'Creature' preserves the generic wording while remaining natural English.
- source_word: πρὸς ἀλλήλους ἔλεγον
  chosen: they said to one another
  alternatives:
  - they kept saying to one another
  - they said among themselves
  lexicon: BDAG
  rationale: The imperfect ἔλεγον can suggest repeated or ongoing speech, but in English direct discourse often naturally compresses this to simple past. 'To one another' preserves πρὸς ἀλλήλους explicitly.
- source_word: Πάντως
  chosen: Surely
  alternatives:
  - certainly
  - no doubt
  - at any rate
  lexicon: BDAG
  rationale: The adverb conveys strong inference or certainty from the speakers' perspective. 'Surely' captures that tone idiomatically in direct speech.
- source_word: φονεύς
  chosen: a murderer
  alternatives:
  - a killer
  - a manslayer
  lexicon: BDAG
  rationale: The noun denotes one who murders. 'Murderer' is the standard and clearest English equivalent.
- source_word: διασωθέντα
  chosen: was brought safely through
  alternatives:
  - was saved
  - escaped safely
  - was rescued
  lexicon: BDAG
  rationale: The participle from διασῴζω emphasizes coming safely through danger. 'Was brought safely through' preserves the passive sense and avoids importing soteriological overtones that 'saved' might suggest in English.
- source_word: ἡ δίκη
  chosen: Justice
  alternatives:
  - justice
  - vengeance
  - the goddess Justice
  lexicon: BDAG
  rationale: Here δίκη is personified as the force that punishes wrongdoing, reflecting the islanders' pagan conception of retributive justice. Capitalized 'Justice' preserves the personification without overcommitting to a formal divine name in the main text.
- source_word: ζῆν οὐκ εἴασεν
  chosen: has not allowed to live
  alternatives:
  - did not permit to live
  - has not let live
  lexicon: BDAG
  rationale: The idiom means 'did not allow him to go on living.' The English perfect fits the direct-speech inference tied to the present evidence, though a simple past would also be possible.
- source_word: ἐκ τῆς θαλάσσης
  chosen: through from the sea
  alternatives:
  - out of the sea
  - from the sea
  lexicon: BDAG
  rationale: Combined with διασωθέντα, the phrase refers to surviving the sea ordeal. 'Through from the sea' is slightly interpretive but conveys survival through maritime danger rather than mere spatial emergence.
