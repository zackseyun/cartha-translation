id: ACT.28.21
reference: Acts 28:21
source:
  edition: SBLGNT
  text: οἱ δὲ πρὸς αὐτὸν εἶπαν· Ἡμεῖς οὔτε γράμματα περὶ σοῦ ἐδεξάμεθα ἀπὸ τῆς Ἰουδαίας,
    οὔτε παραγενόμενός τις τῶν ἀδελφῶν ἀπήγγειλεν ἢ ἐλάλησέν τι περὶ σοῦ πονηρόν.
translation:
  text: But they said to him, “We have received no letters from Judea about you, nor
    has any of the brothers who has come here reported or spoken anything evil about
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor has any of the brothers who came reported or said anything bad about
      you.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' may refer to fellow Jews from Judea; the text does not explicitly
      identify them as Christian believers.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ... εἶπαν
  chosen: But they said
  alternatives:
  - And they said
  - Then they said
  lexicon: BDAG
  rationale: δέ is rendered with mild adversative/continuative force as 'But' to mark
    response in dialogue without overstating contrast.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - in reply to him
  lexicon: BDAG
  rationale: Standard idiomatic rendering of πρός with accusative after a speech verb.
- source_word: Ἡμεῖς
  chosen: We
  lexicon: BDAG
  rationale: Explicit pronoun retained for emphasis, though natural in English without
    special stress.
- source_word: οὔτε ... οὔτε
  chosen: no ... nor
  alternatives:
  - neither ... nor
  lexicon: BDAG
  rationale: The correlative negation is preserved. English idiom works better here
    as 'received no letters ... nor has anyone...' than a more wooden 'neither...nor'
    construction.
- source_word: γράμματα
  chosen: letters
  alternatives:
  - written communications
  - documents
  lexicon: BDAG
  rationale: γράμματα in this context refers to letters/messages, not 'scriptures'
    or 'learning'.
- source_word: περὶ σοῦ
  chosen: about you
  alternatives:
  - concerning you
  lexicon: BDAG
  rationale: Natural modern English for περί with genitive in this context.
- source_word: ἐδεξάμεθα
  chosen: have received
  alternatives:
  - received
  - accepted
  lexicon: BDAG
  rationale: δέχομαι here means receiving correspondence. English present perfect
    fits the current-result sense in reported speech.
- source_word: ἀπὸ τῆς Ἰουδαίας
  chosen: from Judea
  alternatives:
  - from the province of Judea
  lexicon: BDAG
  rationale: Simple geographic rendering is sufficient and natural.
- source_word: παραγενόμενός τις
  chosen: any ... who has come here
  alternatives:
  - anyone arriving
  - anyone who came
  lexicon: BDAG
  rationale: The participle παραγενόμενος denotes someone who has arrived or come
    on the scene. 'Who has come here' makes the implied movement to Rome explicit
    in idiomatic English without overtranslation.
- source_word: τῶν ἀδελφῶν
  chosen: of the brothers
  alternatives:
  - of the brothers and sisters
  - from the brothers
  lexicon: BDAG
  rationale: Gender-accurate policy favors 'brothers' for ἀδελφοί. In this setting
    it likely refers to fellow Jews/Jewish brothers rather than specifically Christian
    believers; the masculine plural is retained rather than neutralized.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - informed us
  lexicon: BDAG
  rationale: ἀπαγγέλλω here conveys bringing a report.
- source_word: ἢ ἐλάλησέν τι
  chosen: or spoken anything
  alternatives:
  - or said anything
  lexicon: BDAG
  rationale: The distinction between ἀπήγγειλεν and ἐλάλησεν is lightly preserved
    by using 'reported' and 'spoken' rather than collapsing both into 'said'.
- source_word: πονηρόν
  chosen: evil
  alternatives:
  - bad
  - harmful
  lexicon: BDAG
  rationale: πονηρός here refers to something malicious or unfavorable said about
    Paul. 'Evil' preserves the moral weight, though in English it functions idiomatically
    as slanderous/hostile speech.
