theological_decisions:
- issue: Reference of 'the brothers' (τῶν ἀδελφῶν)
  chosen_reading: Rendered as 'the brothers' without specifying Christian believers.
  alternative_readings:
  - fellow Jews
  - Christian brothers
  rationale: In context, the speakers are Jewish leaders in Rome responding about
    reports from Judea. The phrase most naturally refers broadly to fellow Jews from
    Judea rather than a technical Christian term. The translation leaves the expression
    as in Greek and avoids importing a sectarian identification the text does not
    explicitly make.
  doctrine_reference: Translation philosophy §§1, 4, 5
