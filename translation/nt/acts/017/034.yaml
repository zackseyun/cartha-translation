theological_decisions:
- issue: Nature of πιστεύω in context
  chosen_reading: believed
  alternative_readings:
  - came to faith
  rationale: The verb denotes genuine belief in response to Paul's proclamation, but
    the text does not specify a fuller doctrinal formula here. 'Believed' preserves
    the narrative statement without importing additional theological phrasing.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις → faith'
