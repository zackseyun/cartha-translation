id: ACT.17.8
reference: Acts 17:8
source:
  edition: SBLGNT
  text: ἐτάραξαν δὲ τὸν ὄχλον καὶ τοὺς πολιτάρχας ἀκούοντας ταῦτα,
translation:
  text: And they disturbed the crowd and the city officials when they heard these
    things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'the politarchs,' a local Macedonian title for civic authorities.
    reason: cultural_note
lexical_decisions:
- source_word: ἐτάραξαν
  chosen: disturbed
  alternatives:
  - troubled
  - agitated
  - threw into confusion
  lexicon: BDAG
  rationale: ταράσσω commonly denotes causing inward or social disturbance, trouble,
    or agitation. 'Disturbed' is natural modern English and fits both the crowd and
    the officials without overstating the effect.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural English linker in context.
- source_word: ὄχλον
  chosen: crowd
  alternatives:
  - multitude
  - mob
  lexicon: BDAG
  rationale: ὄχλος is a common term for a gathered crowd. 'Crowd' is idiomatic and
    neutral; 'mob' would import a more hostile nuance than the Greek itself requires.
- source_word: πολιτάρχας
  chosen: city officials
  alternatives:
  - politarchs
  - city rulers
  - magistrates
  lexicon: BDAG
  rationale: πολιτάρχης is a Macedonian civic title attested historically. Translating
    it as 'city officials' preserves the sense for modern readers; 'politarchs' is
    more formally precise but opaque, while 'magistrates' may suggest a more specifically
    judicial office than the term itself demands.
- source_word: ἀκούοντας ταῦτα
  chosen: when they heard these things
  alternatives:
  - hearing these things
  - on hearing this
  lexicon: BDAG
  rationale: The present participle ἀκούοντας modifies both 'the crowd' and 'the city
    officials' and is best rendered temporally in smooth English. 'These things' reflects
    the plural ταῦτα more closely than singular 'this'.
