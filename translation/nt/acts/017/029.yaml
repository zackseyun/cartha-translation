theological_decisions:
- issue: Rendering τὸ θεῖον in a monotheistic but philosophically framed speech
  chosen_reading: the Divine Being
  alternative_readings:
  - the Deity
  - the divine nature
  - the Godhead
  rationale: Paul is speaking in the Areopagus using language his audience would understand,
    yet he refers to the true God rather than an impersonal force. 'The Divine Being'
    preserves the philosophical register of τὸ θεῖον while avoiding both overly abstract
    ('the divine nature') and archaic/ecclesiastical ('the Godhead') English.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve theological tension rather than resolve it.'
