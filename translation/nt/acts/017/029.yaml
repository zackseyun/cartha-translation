id: ACT.17.29
reference: Acts 17:29
source:
  edition: SBLGNT
  text: γένος οὖν ὑπάρχοντες τοῦ θεοῦ οὐκ ὀφείλομεν νομίζειν χρυσῷ ἢ ἀργύρῳ ἢ λίθῳ,
    χαράγματι τέχνης καὶ ἐνθυμήσεως ἀνθρώπου, τὸ θεῖον εἶναι ὅμοιον.
translation:
  text: Therefore, since we are God’s offspring, we ought not to think that the Divine
    Being is like gold or silver or stone, an image formed by human skill and imagination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Deity,” “the divine nature,” or “the Godhead.” Greek τὸ θεῖον is
      a broad term for what is divine; here it refers to the true God in Paul’s argument.
    reason: lexical_alternative
  - marker: b
    text: Or “a carved image” or “an engraved thing.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γένος
  chosen: offspring
  alternatives:
  - kindred
  - race
  - family
  - descendants
  lexicon: BDAG
  rationale: In context Paul has just cited the idea that humans are God's γένος;
    'offspring' best conveys derivation/kinship without implying ethnicity ('race')
    or a narrower household sense ('family').
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'therefore' clearly signals
    Paul's logical conclusion.
- source_word: ὑπάρχοντες
  chosen: since we are
  alternatives:
  - being
  - existing as
  lexicon: BDAG
  rationale: 'The participle is causal in context: because we are God''s offspring,
    a conclusion follows. ''Since we are'' expresses the participial force in natural
    English.'
- source_word: τοῦ θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Possessive English is the most natural rendering of the genitive here.
- source_word: οὐκ ὀφείλομεν
  chosen: we ought not
  alternatives:
  - we must not
  - we are not obligated to
  lexicon: BDAG
  rationale: Conveys moral obligation/inappropriateness rather than mere possibility.
    'Ought not' fits Paul's ethical-philosophical argument.
- source_word: νομίζειν
  chosen: to think
  alternatives:
  - to suppose
  - to consider
  lexicon: BDAG
  rationale: A broad cognitive verb; 'to think' is clear modern English and fits the
    infinitival construction after ὀφείλομεν.
- source_word: χρυσῷ ἢ ἀργύρῳ ἢ λίθῳ
  chosen: gold or silver or stone
  alternatives:
  - gold or silver or a stone image
  lexicon: BDAG
  rationale: Retains the three materials named in the Greek. The comparison is completed
    by the following phrase about an engraved image.
- source_word: χαράγματι
  chosen: an image formed
  alternatives:
  - an engraved thing
  - a carved image
  - a graven work
  lexicon: BDAG
  rationale: Refers to something produced by engraving/carving. 'An image formed'
    reads naturally with the following genitives while preserving the artifact sense.
- source_word: τέχνης
  chosen: by human skill
  alternatives:
  - by art
  - by craftsmanship
  lexicon: BDAG
  rationale: τέχνη denotes craft, art, or skill. 'Human skill' communicates the productive
    artistry involved and pairs well with 'imagination.'
- source_word: ἐνθυμήσεως
  chosen: imagination
  alternatives:
  - thought
  - design
  - conception
  lexicon: BDAG
  rationale: Denotes what is conceived in the mind. 'Imagination' captures the mental-design
    aspect behind idol-making in accessible English.
- source_word: ἀνθρώπου
  chosen: human
  alternatives:
  - man’s
  - of man
  lexicon: BDAG
  rationale: The singular generic refers to humanity in representative sense. 'Human'
    is natural in English and avoids suggesting one male individual while preserving
    the generic force.
- source_word: τὸ θεῖον
  chosen: the Divine Being
  alternatives:
  - the divine nature
  - the Deity
  - the Godhead
  - the divine
  lexicon: BDAG
  rationale: The neuter substantive can denote the divine being/deity in a general
    sense. In Paul's address to pagans, 'the Divine Being' is both intelligible and
    suitably personal enough for the argument, without importing later technical metaphysics.
- source_word: ὅμοιον
  chosen: is like
  alternatives:
  - to be like
  - similar to
  lexicon: BDAG
  rationale: 'Completes the infinitival clause naturally in English: ''that the Divine
    Being is like...'''
