id: ACT.17.19
reference: Acts 17:19
source:
  edition: SBLGNT
  text: ἐπιλαβόμενοί ⸀τε αὐτοῦ ἐπὶ τὸν Ἄρειον Πάγον ἤγαγον, λέγοντες· Δυνάμεθα γνῶναι
    τίς ἡ καινὴ αὕτη ἡ ὑπὸ σοῦ λαλουμένη διδαχή;
translation:
  text: So they took hold of him and brought him to the Areopagus, saying, “May we
    know what this new teaching is that is being spoken by you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that you are speaking.' The Greek more literally says, 'the teaching
      being spoken by you.'
    reason: lexical_alternative
  - marker: b
    text: '''Areopagus'' may refer to the hill itself or to the council associated
      with it; traditional English also has ''Mars Hill.'''
    reason: cultural_note
lexical_decisions:
- source_word: ἐπιλαβόμενοί
  chosen: took hold of
  alternatives:
  - seized
  - took aside
  lexicon: BDAG
  rationale: The participle of ἐπιλαμβάνομαι can mean to take hold of, seize, or take
    along. In this context, a neutral-to-firm sense fits better than the harsher 'seized,'
    since the following question is inquisitive rather than overtly hostile. 'Took
    hold of' preserves the physical initiative without overstating coercion.
- source_word: τε
  chosen: So
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: τέ is a mild connective. In smooth English, 'So' captures the narrative
    progression better than a wooden 'and,' while still reflecting connection to the
    previous verse.
- source_word: ἐπὶ τὸν Ἄρειον Πάγον
  chosen: to the Areopagus
  alternatives:
  - to Mars Hill
  - before the Areopagus
  lexicon: BDAG
  rationale: Ἄρειος Πάγος is best transliterated as the proper place/institution name
    'Areopagus.' 'Mars Hill' is a traditional Latinized equivalent but is less directly
    tied to the Greek text. 'To the Areopagus' leaves open the debated nuance of place
    versus council without over-interpreting.
- source_word: ἤγαγον
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: BDAG
  rationale: ἄγω commonly means lead or bring. 'Brought' is idiomatic with the destination
    phrase and works naturally with 'took hold of him.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - while saying
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main action. 'Saying' preserves
    the participial linkage in natural English.
- source_word: Δυνάμεθα γνῶναι
  chosen: May we know
  alternatives:
  - Can we know
  - Are we able to know
  lexicon: BDAG
  rationale: The phrase functions as a polite request rather than a question about
    raw ability. 'May we know' captures the courteous inquisitive tone better than
    the more literal but less idiomatic 'Can we know.'
- source_word: καινὴ
  chosen: new
  alternatives:
  - novel
  - unfamiliar
  lexicon: BDAG
  rationale: καινός here denotes something new in kind or recent to the hearers. 'New'
    is the most natural and sufficiently broad rendering.
- source_word: ὑπὸ σοῦ λαλουμένη
  chosen: that is being spoken by you
  alternatives:
  - that you are speaking
  - proclaimed by you
  lexicon: BDAG
  rationale: The passive participle with ὑπό + genitive is formally 'being spoken
    by you.' This slightly unusual English preserves the Greek construction and keeps
    the focus on the teaching as the thing being voiced. A smoother alternative is
    preserved in a footnote.
- source_word: διδαχή
  chosen: teaching
  alternatives:
  - doctrine
  - instruction
  lexicon: BDAG
  rationale: '''Teaching'' is the clearest modern equivalent. ''Doctrine'' is possible
    but sounds more technical and ecclesiastical than the context requires.'
