theological_decisions:
- issue: Nuance of Paul's being taken to the Areopagus
  chosen_reading: A firm but not necessarily hostile escort to the Areopagus
  alternative_readings:
  - A formal arrest or seizure
  - A merely courteous invitation
  rationale: The verb ἐπιλαμβάνομαι can suggest stronger physical action, but the
    immediate context presents curiosity about Paul's message rather than explicit
    judicial hostility. The translation therefore avoids both minimizing the action
    and overstating it as an arrest.
- issue: Meaning of Ἄρειος Πάγος
  chosen_reading: Rendered as the proper name 'Areopagus' without specifying whether
    it is strictly the hill, the court, or both
  alternative_readings:
  - Mars Hill as a place name
  - the council of the Areopagus
  rationale: The Greek expression can denote the location and, by extension, the body
    associated with it. The main text preserves the ambiguity rather than resolving
    a debated historical detail beyond what the verse itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
