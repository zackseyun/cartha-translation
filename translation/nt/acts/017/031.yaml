id: ACT.17.31
reference: Acts 17:31
source:
  edition: SBLGNT
  text: ⸀καθότι ἔστησεν ἡμέραν ἐν ᾗ μέλλει κρίνειν τὴν οἰκουμένην ἐν δικαιοσύνῃ ἐν
    ἀνδρὶ ᾧ ὥρισεν, πίστιν παρασχὼν πᾶσιν ἀναστήσας αὐτὸν ἐκ νεκρῶν.
translation:
  text: because he has fixed a day on which he is going to judge the inhabited world
    in righteousness by a man whom he appointed, having given proof to all by raising
    him from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with justice' for 'in righteousness' (δικαιοσύνῃ).
    reason: lexical_alternative
  - marker: b
    text: Or 'having furnished assurance to all'; more literally, 'having given faith
      to all' (πίστιν παρασχὼν πᾶσιν), though here the sense is public proof or assurance.
    reason: alternative_reading
lexical_decisions:
- source_word: καθότι
  chosen: because
  alternatives:
  - inasmuch as
  - since
  lexicon: BDAG
  rationale: Introduces the ground for the preceding call to repentance. 'Because'
    is natural modern English and preserves the causal force.
- source_word: ἔστησεν ἡμέραν
  chosen: has fixed a day
  alternatives:
  - has appointed a day
  - set a day
  lexicon: BDAG
  rationale: ἵστημι here means to set or appoint. 'Has fixed a day' conveys a determined,
    established time with suitable solemnity.
- source_word: ἐν ᾗ μέλλει κρίνειν
  chosen: on which he is going to judge
  alternatives:
  - in which he is about to judge
  - on which he will judge
  lexicon: BDAG
  rationale: μέλλει with infinitive indicates impending or intended future action.
    'Is going to judge' preserves that nuance better than a simple future, while remaining
    idiomatic.
- source_word: τὴν οἰκουμένην
  chosen: the inhabited world
  alternatives:
  - the world
  - the whole world
  lexicon: BDAG
  rationale: οἰκουμένη often denotes the inhabited world, not merely the cosmos in
    abstraction. 'Inhabited world' preserves the lexical sense and the universal human
    scope of judgment.
- source_word: ἐν δικαιοσύνῃ
  chosen: in righteousness
  alternatives:
  - with righteousness
  - with justice
  lexicon: BDAG
  rationale: The default rendering of δικαιοσύνη is 'righteousness' per doctrine guidelines,
    while preserving 'justice' as a meaningful alternative in a footnote. 'In righteousness'
    is a natural rendering of the prepositional phrase.
- source_word: ἐν ἀνδρὶ ᾧ ὥρισεν
  chosen: by a man whom he appointed
  alternatives:
  - through a man whom he designated
  - by the man whom he appointed
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man,' and the doctrine calls for gender-accurate
    rendering. The anarthrous phrase is indefinite in form, so 'a man' is preferred.
    ὥρισεν means appointed/designated; 'appointed' is clear and idiomatic.
- source_word: πίστιν παρασχὼν πᾶσιν
  chosen: having given proof to all
  alternatives:
  - having furnished assurance to all
  - having given faith to all
  lexicon: BDAG
  rationale: Although πίστις commonly means 'faith,' in this idiom with παρέχω it
    carries the sense of assurance, proof, or guarantee. 'Given proof to all' best
    fits the context of public validation of the appointed judge. Because πίστις is
    a contested term in doctrine defaults, the more literal alternative is preserved
    in a footnote.
- source_word: ἀναστήσας αὐτὸν ἐκ νεκρῶν
  chosen: by raising him from the dead
  alternatives:
  - after raising him from the dead
  - when he raised him from the dead
  lexicon: BDAG
  rationale: 'The aorist participle is most naturally rendered as means or attendant
    circumstance here: God gave proof by raising this man. ''From the dead'' is the
    standard and contextually clear rendering of ἐκ νεκρῶν.'
