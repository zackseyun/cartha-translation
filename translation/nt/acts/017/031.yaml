theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: in righteousness
  alternative_readings:
  - with justice
  rationale: The doctrine excerpt specifies 'righteousness' as the default rendering
    of δικαιοσύνη, with 'justice' preserved in a footnote where relevant. In this
    judgment context, both are plausible, so the default is retained and the alternative
    noted.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Rendering of πίστις in πίστιν παρασχὼν πᾶσιν
  chosen_reading: proof
  alternative_readings:
  - assurance
  - faith
  rationale: Although πίστις defaults to 'faith,' the immediate idiom παρέχειν πίστιν
    commonly means to provide assurance or proof. Translating it woodenly as 'faith'
    would obscure the sense. The default alternative is preserved in a footnote to
    maintain auditability and theological transparency.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις'
- issue: Rendering of ἀνδρὶ
  chosen_reading: a man
  alternative_readings:
  - the man
  rationale: The Greek uses ἀνήρ, not a generic term for person or humanity. Per doctrine,
    gender-accurate translation is preferred. The lack of article supports the indefinite
    'a man,' though the referent is clearly Jesus from context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
