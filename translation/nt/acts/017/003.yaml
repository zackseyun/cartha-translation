id: ACT.17.3
reference: Acts 17:3
source:
  edition: SBLGNT
  text: διανοίγων καὶ παρατιθέμενος ὅτι τὸν χριστὸν ἔδει παθεῖν καὶ ἀναστῆναι ἐκ νεκρῶν,
    καὶ ὅτι οὗτός ἐστιν ⸂ὁ χριστός, ὁ⸃ Ἰησοῦς ὃν ἐγὼ καταγγέλλω ὑμῖν.
translation:
  text: explaining and demonstrating that the Messiah had to suffer and rise from
    the dead, and that this Jesus, whom I proclaim to you, is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Christ' in both occurrences of 'the Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'be raised from the dead.' The Greek here uses an active infinitive,
      'rise,' though elsewhere the New Testament also speaks of Jesus being raised
      by God.
    reason: lexical_alternative
lexical_decisions:
- source_word: διανοίγων
  chosen: explaining
  alternatives:
  - opening up
  - interpreting
  lexicon: BDAG
  rationale: The participle describes Paul’s act of opening the Scriptures or making
    their meaning plain. 'Explaining' is natural modern English and fits the discourse
    context of synagogue reasoning.
- source_word: παρατιθέμενος
  chosen: demonstrating
  alternatives:
  - setting forth
  - proving
  - placing before
  lexicon: BDAG
  rationale: In context this participle complements 'explaining' by indicating presentation
    of evidence or argument. 'Demonstrating' captures the sense of laying out proof
    without overstating formal logical proof.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Both occurrences introduce the content of Paul’s message, best rendered
    with straightforward English 'that' clauses.
- source_word: τὸν χριστόν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Here Χριστός is clearly titular rather than name-like, referring to the
    expected anointed one. Per doctrine, the default rendering in title contexts is
    'Messiah' to preserve the Hebraic messianic sense.
- source_word: ἔδει
  chosen: had to
  alternatives:
  - it was necessary for
  - must
  lexicon: BDAG
  rationale: This imperfect of impersonal necessity expresses divine necessity grounded
    in Scripture. 'Had to' is concise, idiomatic, and preserves the force of necessity
    in past discourse.
- source_word: παθεῖν
  chosen: suffer
  lexicon: BDAG
  rationale: Standard rendering for πάσχω here, referring to the Messiah’s suffering,
    likely especially in his passion.
- source_word: ἀναστῆναι ἐκ νεκρῶν
  chosen: rise from the dead
  alternatives:
  - be raised from the dead
  lexicon: BDAG
  rationale: The active infinitive ἀναστῆναι is most directly 'rise.' 'From the dead'
    is the idiomatic rendering of ἐκ νεκρῶν. The alternative 'be raised' reflects
    theological implication but is less formally aligned to the Greek form here.
- source_word: οὗτός ἐστιν
  chosen: this ... is
  alternatives:
  - this is
  lexicon: BDAG
  rationale: The demonstrative points to Jesus just identified in Paul’s proclamation.
    English naturally places the appositional phrase between subject and predicate
    in this sentence.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Again titular, not name-like. Consistency with the doctrine’s default
    rendering is appropriate.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention.
- source_word: καταγγέλλω
  chosen: I proclaim
  alternatives:
  - I announce
  - I preach
  lexicon: BDAG
  rationale: '''Proclaim'' preserves the public heralding sense without narrowing
    to specifically sermonic ''preach.'''
- source_word: ὑμῖν
  chosen: to you
  lexicon: BDAG
  rationale: Standard dative complement after 'proclaim.'
