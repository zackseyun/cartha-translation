theological_decisions:
- issue: Rendering of Χριστός in a verse where it appears as a title twice and in
    close apposition to Jesus
  chosen_reading: Messiah in both instances
  alternative_readings:
  - Christ
  rationale: The verse’s argument is that the expected anointed deliverer had to suffer
    and rise, and that Jesus fits that identity. This is explicitly titular usage,
    so 'Messiah' best preserves the Jewish-scriptural context. The traditional 'Christ'
    is preserved in a footnote as an alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like.'
- issue: Voice nuance of ἀναστῆναι
  chosen_reading: rise from the dead
  alternative_readings:
  - be raised from the dead
  rationale: The Greek uses the active infinitive of ἀνίστημι, so 'rise' is the more
    direct rendering. This does not deny the broader NT teaching that God raised Jesus;
    it simply follows the wording of this verse and avoids importing a different verbal
    form.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve what the source text says without importing additional doctrinal claims.'
