id: ACT.17.28
reference: Acts 17:28
source:
  edition: SBLGNT
  text: ἐν αὐτῷ γὰρ ζῶμεν καὶ κινούμεθα καὶ ἐσμέν, ὡς καί τινες τῶν καθ’ ὑμᾶς ποιητῶν
    εἰρήκασιν· Τοῦ γὰρ καὶ γένος ἐσμέν.
translation:
  text: For in him we live and move and exist, as even some of your own poets have
    said, ‘For we also are his offspring.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'For in him we live and move and have our being.'
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' renders Greek γένος, which can also mean ''children,'' ''race,''
      or ''kindred''; here it refers broadly to human derivation from God in the poetic
      citation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: BDAG
  rationale: 'The preposition ἐν with the dative most naturally expresses sphere or
    relation here: human life is situated in relation to God. ''In him'' preserves
    the Greek wording and Paul''s rhetorical point without over-interpreting it as
    instrumental.'
- source_word: ζῶμεν
  chosen: we live
  lexicon: BDAG
  rationale: Straightforward present active indicative of ζάω; 'we live' is the natural
    formal rendering.
- source_word: κινούμεθα
  chosen: move
  alternatives:
  - are moved
  - have our movement
  lexicon: BDAG
  rationale: The middle/passive form here is idiomatically rendered 'move.' 'Are moved'
    would suggest an external mover too explicitly, and 'have our movement' is wooden
    English influenced by older tradition rather than the plain sense.
- source_word: ἐσμέν
  chosen: exist
  alternatives:
  - are
  - have our being
  lexicon: BDAG
  rationale: Although εἰμί is simply 'are,' in this triad 'live and move and exist'
    communicates the existential force in clear modern English. 'Have our being' is
    traditional but less natural; 'are' is too bare in English to carry the climactic
    sense.
- source_word: ὡς καί τινες τῶν καθ’ ὑμᾶς ποιητῶν
  chosen: as even some of your own poets
  alternatives:
  - as also some of the poets among you
  - as some of your poets as well
  lexicon: BDAG
  rationale: καθ’ ὑμᾶς idiomatically means 'belonging to your people' or 'your own.'
    'Even' reflects καί in a natural emphatic way.
- source_word: εἰρήκασιν
  chosen: have said
  alternatives:
  - said
  lexicon: BDAG
  rationale: The perfect form can be represented by English present perfect here,
    highlighting a saying that stands on record.
- source_word: Τοῦ
  chosen: his
  alternatives:
  - of him
  - of this one
  lexicon: BDAG
  rationale: The genitive pronoun refers back to God in Paul's speech. In English,
    possessive 'his' is the natural rendering in the quoted line.
- source_word: γένος
  chosen: offspring
  alternatives:
  - children
  - race
  - kindred
  lexicon: BDAG
  rationale: γένος here denotes lineage or progeny in a broad sense. 'Offspring' best
    fits the poetic citation and avoids importing stronger filial theology than the
    context warrants.
