theological_decisions:
- issue: Relational force of 'in him' in reference to God
  chosen_reading: Retain 'in him' without expanding it into a metaphysical explanation.
  alternative_readings:
  - by him
  - through him
  rationale: Paul's wording affirms creaturely dependence on God, but the verse itself
    does not define the precise metaphysical mechanism. The translation preserves
    the theological tension rather than resolving it into a stronger doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering γένος in relation to God
  chosen_reading: offspring
  alternative_readings:
  - children
  rationale: The citation supports humanity's derivation from and dependence on God,
    but 'children' could suggest covenantal or adoptive sonship not asserted in this
    context. 'Offspring' preserves the claim without importing additional theological
    categories.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
