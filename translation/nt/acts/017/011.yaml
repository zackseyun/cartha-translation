theological_decisions:
- issue: Sense of εὐγενέστεροι in context
  chosen_reading: commendable disposition ('more noble-minded') rather than social
    nobility
  alternative_readings:
  - more noble in birth/status
  rationale: The verse itself defines their 'nobility' by their response to the apostolic
    message and their scriptural examination. This avoids importing a class distinction
    the context does not emphasize.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering λόγος
  chosen_reading: '''the word'' retained in the main text'
  alternative_readings:
  - the message
  rationale: Retaining 'word' preserves biblical diction and theological continuity
    in Acts while remaining understandable in context. No doctrinal claim is added
    beyond the Greek.
  doctrine_reference: Translation philosophy §1, §6
