id: ACT.17.11
reference: Acts 17:11
source:
  edition: SBLGNT
  text: οὗτοι δὲ ἦσαν εὐγενέστεροι τῶν ἐν Θεσσαλονίκῃ, οἵτινες ἐδέξαντο τὸν λόγον
    μετὰ πάσης προθυμίας, ⸀τὸ καθ’ ἡμέραν ἀνακρίνοντες τὰς γραφὰς εἰ ἔχοι ταῦτα οὕτως.
translation:
  text: Now these were more noble-minded than those in Thessalonica, for they received
    the word with all eagerness, examining the Scriptures daily to see whether these
    things were so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more noble.' The Greek may refer either to a more commendable disposition
      or, less likely here, to higher social standing.
    reason: lexical_alternative
  - marker: b
    text: Or 'welcomed the message.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐγενέστεροι
  chosen: more noble-minded
  alternatives:
  - more noble
  - more open-minded
  lexicon: BDAG
  rationale: The comparative adjective can denote higher social standing or, in context,
    a more commendable disposition. Here the following clause explains their character
    by their eager reception and examination of the Scriptures, so an attitudinal
    rendering is preferable to a class-based one. 'More noble-minded' preserves the
    evaluative force without implying aristocratic birth.
- source_word: οἵτινες
  chosen: for they
  alternatives:
  - who
  - inasmuch as they
  lexicon: BDAG
  rationale: The relative pronoun here introduces an explanatory characterization
    of why they were called εὐγενέστεροι. Rendering with 'for they' brings out the
    explanatory force naturally in English.
- source_word: ἐδέξαντο τὸν λόγον
  chosen: received the word
  alternatives:
  - welcomed the message
  - accepted the word
  lexicon: BDAG
  rationale: '''Received the word'' is a natural and fairly literal rendering of the
    idiom, preserving the theological and narrative resonance of λόγος in Acts without
    over-paraphrasing to ''message'' in the main text.'
- source_word: μετὰ πάσης προθυμίας
  chosen: with all eagerness
  alternatives:
  - with great readiness
  - with full willingness
  lexicon: BDAG
  rationale: προθυμία denotes readiness, willingness, or eagerness. 'With all eagerness'
    captures πάσης as an intensifier and reads naturally in modern English.
- source_word: τὸ καθ’ ἡμέραν
  chosen: daily
  alternatives:
  - day by day
  - every day
  lexicon: BDAG
  rationale: The article with the prepositional phrase functions adverbially. 'Daily'
    is concise and idiomatic while preserving the habitual sense.
- source_word: ἀνακρίνοντες
  chosen: examining
  alternatives:
  - investigating
  - carefully questioning
  lexicon: BDAG
  rationale: ἀνακρίνω can mean to examine, investigate, or question carefully. In
    this context of checking the Scriptures, 'examining' best fits both the judicial
    nuance and common English usage without sounding overly technical.
- source_word: τὰς γραφὰς
  chosen: the Scriptures
  alternatives:
  - the writings
  lexicon: BDAG
  rationale: In Luke-Acts γραφαί in this context refers to the sacred Jewish Scriptures.
    'The Scriptures' is the standard and accurate rendering.
- source_word: εἰ ἔχοι ταῦτα οὕτως
  chosen: to see whether these things were so
  alternatives:
  - whether these things were true
  - if these things were this way
  lexicon: BDAG
  rationale: The optative after εἰ conveys indirect inquiry. 'To see whether these
    things were so' is idiomatic English that preserves the sense of testing Paul's
    claims against Scripture.
