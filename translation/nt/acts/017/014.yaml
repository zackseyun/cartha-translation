id: ACT.17.14
reference: Acts 17:14
source:
  edition: SBLGNT
  text: εὐθέως δὲ τότε τὸν Παῦλον ἐξαπέστειλαν οἱ ἀδελφοὶ πορεύεσθαι ⸀ἕως ἐπὶ τὴν
    θάλασσαν· ⸂ὑπέμεινάν τε⸃ ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος ἐκεῖ.
translation:
  text: Then the brothers immediately sent Paul away to go as far as the sea, but
    both Silas and Timothy remained there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and can refer to
      fellow believers collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the sea' or 'toward the sea'; the Greek wording may indicate movement
      as far as the coast without specifying more.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys the adverb's sense of prompt action in natural modern English.
- source_word: δὲ τότε
  chosen: Then
  alternatives:
  - and then
  - so then
  lexicon: BDAG
  rationale: The combination marks narrative progression; 'Then' captures the temporal
    transition without overtranslating both particles separately.
- source_word: ἐξαπέστειλαν
  chosen: sent ... away
  alternatives:
  - sent off
  - dispatched
  lexicon: BDAG
  rationale: The compound verb suggests sending out/from a place; 'sent away' reflects
    the departure nuance in idiomatic English.
- source_word: οἱ ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Following the gender-accurate policy, the masculine plural is retained
    as 'brothers.' In Acts this can refer to fellow believers more broadly, but the
    source term is ἀδελφοί, so the more literal rendering is preferred.
- source_word: πορεύεσθαι
  chosen: to go
  alternatives:
  - to travel
  - to proceed
  lexicon: BDAG
  rationale: Infinitive of purpose after 'sent'; 'to go' is simple and sufficient
    in context.
- source_word: ἕως ἐπὶ τὴν θάλασσαν
  chosen: as far as the sea
  alternatives:
  - to the sea
  - toward the sea
  lexicon: BDAG
  rationale: This reflects the prepositional phrase with ἕως plus ἐπί as indicating
    movement up to the seacoast. 'As far as the sea' preserves the wording found in
    the Greek and leaves open whether the destination was merely the coast or onward
    by sea.
- source_word: ὑπέμεινάν
  chosen: remained
  alternatives:
  - stayed behind
  - stayed
  lexicon: BDAG
  rationale: In this context the verb means to remain in a place rather than endure
    hardship. 'Remained' is concise and fits the contrast with Paul's departure.
- source_word: ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος
  chosen: both Silas and Timothy
  alternatives:
  - Silas as well as Timothy
  - Silas and Timothy
  lexicon: BDAG
  rationale: The correlative use of τε ... καὶ naturally yields 'both ... and ...'
    in English, preserving the paired emphasis.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Standard locative adverb; 'there' is the natural English equivalent.
