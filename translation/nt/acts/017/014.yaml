theological_decisions:
- issue: Rendering of ἀδελφοί for the believing community
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: The translation follows the project's gender-accurate policy by retaining
    the masculine plural where that is the Greek form. Because the term likely refers
    to the Christian community more broadly, an inclusive alternative is worth preserving
    in a footnote rather than replacing the source-shaped wording in the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
