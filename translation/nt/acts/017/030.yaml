theological_decisions:
- issue: Meaning of God's prior action toward 'the times of ignorance'
  chosen_reading: God 'overlooked' these times in the sense of forbearance or non-immediate
    judgment, not approval or indifference to sin.
  alternative_readings:
  - God ignored sin
  - God excused ignorance entirely
  rationale: The participle ὑπεριδών indicates divine overlooking/forbearance in salvation-history,
    while the present command to repent shows moral accountability remains. The translation
    avoids wording that would imply divine endorsement of idolatry or denial of guilt.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Scope of the command to repent
  chosen_reading: 'The command is universal: ''all people everywhere.'''
  alternative_readings:
  - all men everywhere
  - all the Gentiles everywhere
  rationale: πάντας πανταχοῦ with τοῖς ἀνθρώποις expresses comprehensive human scope,
    fitting Paul's Areopagus address and the immediate context. 'People' preserves
    generic reference without male restriction.
  doctrine_reference: Gender-accurate over gender-neutral
