id: ACT.17.27
reference: Acts 17:27
source:
  edition: SBLGNT
  text: ζητεῖν τὸν ⸀θεὸν εἰ ἄρα γε ψηλαφήσειαν αὐτὸν καὶ εὕροιεν, καί γε οὐ μακρὰν
    ἀπὸ ἑνὸς ἑκάστου ἡμῶν ὑπάρχοντα.
translation:
  text: that they should seek God, if perhaps they might grope for him and find him—though
    indeed he is not far from each one of us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feel after him.' The Greek verb suggests searching by touch, as in limited
      perception or darkness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητεῖν
  chosen: that they should seek
  alternatives:
  - to seek
  - that they might seek
  lexicon: BDAG
  rationale: Infinitive dependent on the previous clause expressing divine purpose/result;
    English idiom is best carried by a finite clause, 'that they should seek,' while
    preserving the purposive sense.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: Although the article is present, English normally omits it with 'God'
    in this kind of generic/theological reference. 'The God' would sound unnatural
    and over-specify beyond normal English usage.
- source_word: εἰ ἄρα γε
  chosen: if perhaps
  alternatives:
  - if indeed perhaps
  - whether perhaps
  lexicon: BDAG
  rationale: This particle combination conveys contingency with a tentative nuance.
    'If perhaps' preserves the sense that humans might, in their seeking, come to
    apprehend God.
- source_word: ψηλαφήσειαν
  chosen: might grope for
  alternatives:
  - might feel after
  - might search for by touch
  lexicon: BDAG
  rationale: The verb literally evokes touching or feeling around, often in the dark.
    'Grope for' preserves the metaphor of limited human perception better than the
    traditional but less natural 'feel after.'
- source_word: αὐτόν
  chosen: him
  alternatives:
  - it
  lexicon: BDAG
  rationale: The referent is God, so personal English pronoun 'him' is required.
- source_word: καὶ εὕροιεν
  chosen: and find him
  alternatives:
  - and might find him
  lexicon: BDAG
  rationale: Coordinated with the previous optative; English can leave the modal force
    implied after 'might grope for' without loss. Repeating 'might' would also be
    acceptable, but this rendering is smoother while preserving the sense.
- source_word: καί γε
  chosen: though indeed
  alternatives:
  - and indeed
  - yet indeed
  lexicon: BDAG
  rationale: 'Here the phrase introduces a concessive clarification: despite the tentative
    human search, God is in fact near. ''Though indeed'' captures that concessive
    force better than a simple connective.'
- source_word: οὐ μακρὰν
  chosen: not far
  alternatives:
  - not distant
  lexicon: BDAG
  rationale: '''Not far'' is the most direct and idiomatic rendering.'
- source_word: ἀπὸ ἑνὸς ἑκάστου ἡμῶν
  chosen: from each one of us
  alternatives:
  - from every one of us
  - from each of us
  lexicon: BDAG
  rationale: This preserves the distributive emphasis of ἑνὸς ἑκάστου while remaining
    natural English.
- source_word: ὑπάρχοντα
  chosen: he is
  alternatives:
  - existing
  - being
  - present
  lexicon: BDAG
  rationale: The participle modifies God and states his actual nearness. In English,
    an explicit finite verb is needed; 'he is not far' communicates the existential/predicative
    force naturally.
