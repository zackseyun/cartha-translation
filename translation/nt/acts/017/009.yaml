id: ACT.17.9
reference: Acts 17:9
source:
  edition: SBLGNT
  text: καὶ λαβόντες τὸ ἱκανὸν παρὰ τοῦ Ἰάσονος καὶ τῶν λοιπῶν ἀπέλυσαν αὐτούς.
translation:
  text: And after taking security from Jason and the others, they released them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sufficient amount'; likely a legal pledge or bond posted to secure
      peaceable conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: after taking
  alternatives:
  - having taken
  - when they had taken
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After taking' is idiomatic and preserves the sequence without
    over-paraphrasing.
- source_word: τὸ ἱκανὸν
  chosen: security
  alternatives:
  - a sufficient amount
  - bail
  - bond
  lexicon: BDAG
  rationale: The idiom λαμβάνειν τὸ ἱκανόν in this legal context refers to receiving
    adequate security or a pledge. 'Security' best captures the likely legal/financial
    sense without specifying more than the Greek states. 'Bail' or 'bond' are plausible
    but more interpretive and jurisdiction-specific.
- source_word: παρὰ τοῦ Ἰάσονος καὶ τῶν λοιπῶν
  chosen: from Jason and the others
  alternatives:
  - from Jason and the rest
  lexicon: BDAG
  rationale: παρά with the genitive indicates source, 'from.' λοιπῶν means the remaining
    associated persons; 'the others' is clear modern English and avoids implying a
    totality beyond the immediate group.
- source_word: ἀπέλυσαν
  chosen: they released
  alternatives:
  - they let go
  - they set free
  - they dismissed
  lexicon: BDAG
  rationale: In this judicial/civic setting, ἀπολύω means to release or let go. 'Released'
    fits the legal context better than the more colloquial 'let go' and is less ambiguous
    than 'dismissed.'
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative plural pronoun referring to the detained persons;
    English requires only 'them.'
