id: ACT.17.32
reference: Acts 17:32
source:
  edition: SBLGNT
  text: Ἀκούσαντες δὲ ἀνάστασιν νεκρῶν οἱ μὲν ἐχλεύαζον οἱ δὲ εἶπαν Ἀκουσόμεθά σου
    ⸂περὶ τούτου καὶ πάλιν⸃.
translation:
  text: Now when they heard of the resurrection of the dead, some began mocking, but
    others said, “We will hear you again about this.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “We will hear you about this again,” preserving the explicit force of
      “again” (καὶ πάλιν).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: when they heard
  alternatives:
  - after hearing
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verbs; 'when
    they heard' is natural English and preserves the temporal sense without overformal
    stiffness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Marks a mild development in the narrative. 'Now' gives smooth discourse
    transition in English at the verse opening.
- source_word: ἀνάστασιν νεκρῶν
  chosen: the resurrection of the dead
  alternatives:
  - a resurrection of the dead
  - resurrection from the dead
  lexicon: BDAG
  rationale: This is the central content heard in Paul's speech. 'The resurrection
    of the dead' is idiomatic and reflects the anarthrous construction as a concept
    rather than an indefinite event. It also matches common NT usage for the general
    idea under discussion.
- source_word: οἱ μὲν ... οἱ δὲ
  chosen: some ... but others
  alternatives:
  - some on the one hand ... but others on the other
  - some ... others
  lexicon: BDAG
  rationale: This correlative construction contrasts two groups in the audience. 'Some
    ... but others' is clear, natural, and preserves the contrast.
- source_word: ἐχλεύαζον
  chosen: began mocking
  alternatives:
  - mocked
  - sneered
  - ridiculed
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action. 'Began mocking'
    captures the reaction as it arose in response to Paul's mention of resurrection.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: Aorist main verb reporting the response of the second group; simple past
    'said' is the most straightforward rendering.
- source_word: Ἀκουσόμεθά σου
  chosen: We will hear you again
  alternatives:
  - We will listen to you again
  - We will hear from you again
  lexicon: BDAG
  rationale: Future middle of ἀκούω with genitive pronoun means hearing/listening
    to someone. 'Hear you again' is idiomatic and concise in English.
- source_word: περὶ τούτου καὶ πάλιν
  chosen: about this
  alternatives:
  - about this again
  - concerning this another time
  lexicon: BDAG
  rationale: The phrase likely means they would hear Paul again concerning this matter
    at another time. In English, 'again about this' can sound awkward; 'about this'
    in the main text keeps the sense readable, while the temporal nuance from καὶ
    πάλιν is preserved in a footnote.
