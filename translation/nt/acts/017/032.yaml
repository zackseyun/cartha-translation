theological_decisions:
- issue: Meaning of resurrection language in a mixed pagan audience context
  chosen_reading: the resurrection of the dead
  alternative_readings:
  - resurrection from the dead
  rationale: The Greek phrase naturally denotes resurrection involving the dead as
    a category, matching the content of Paul's proclamation. No doctrinal expansion
    beyond the text is introduced.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
