id: ACT.17.24
reference: Acts 17:24
source:
  edition: SBLGNT
  text: ὁ θεὸς ὁ ποιήσας τὸν κόσμον καὶ πάντα τὰ ἐν αὐτῷ, οὗτος οὐρανοῦ καὶ γῆς ⸂ὑπάρχων
    κύριος⸃ οὐκ ἐν χειροποιήτοις ναοῖς κατοικεῖ
translation:
  text: The God who made the world and everything in it, being Lord of heaven and
    earth, does not dwell in temples made by hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temples made with hands.' The phrase means temples constructed by human
      beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας
  chosen: who made
  alternatives:
  - having made
  - who created
  lexicon: BDAG
  rationale: Aorist participle modifying ὁ θεός. 'Who made' is natural English and
    preserves the participial sense without awkwardness. 'Created' is possible, but
    'made' more directly reflects ποιέω here.
- source_word: κόσμον
  chosen: the world
  alternatives:
  - the universe
  - the cosmos
  lexicon: BDAG
  rationale: κόσμος here refers to the created world/order as a whole. 'The world'
    is idiomatic and sufficiently broad in context.
- source_word: πάντα τὰ ἐν αὐτῷ
  chosen: everything in it
  alternatives:
  - all things in it
  - everything within it
  lexicon: BDAG
  rationale: This phrase expands κόσμον to include all that is in the world. 'Everything
    in it' is clear modern English and preserves the comprehensive force of πάντα.
- source_word: ὑπάρχων κύριος
  chosen: being Lord
  alternatives:
  - since he is Lord
  - as Lord
  lexicon: BDAG
  rationale: 'The participle ὑπάρχων with κύριος expresses an existing state: God,
    being Lord of heaven and earth. ''Being Lord'' preserves the syntax and avoids
    overinterpreting the participle as causal.'
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' Here it denotes sovereignty
    over heaven and earth.
- source_word: οὐρανοῦ καὶ γῆς
  chosen: of heaven and earth
  alternatives:
  - of the heavens and the earth
  lexicon: BDAG
  rationale: The genitives depend on κύριος. 'Heaven and earth' is the standard English
    pairing and fits the singular οὐρανοῦ in this text.
- source_word: χειροποιήτοις
  chosen: made by hands
  alternatives:
  - made with hands
  - handmade
  lexicon: BDAG
  rationale: χειροποίητος means made by human hands. 'Made by hands' is idiomatic
    here and preserves the contrast with the Creator not being contained in human-made
    shrines.
- source_word: ναοῖς
  chosen: temples
  alternatives:
  - shrines
  - sanctuaries
  lexicon: BDAG
  rationale: ναός refers to a temple/shrine as a sacred dwelling place. In the Areopagus
    context, 'temples' is the clearest general rendering.
- source_word: κατοικεῖ
  chosen: does not dwell
  alternatives:
  - does not live
  - does not reside
  lexicon: BDAG
  rationale: κατοικέω means dwell/reside. 'Dwell' fits biblical register while remaining
    readable and matches the temple-indwelling contrast.
