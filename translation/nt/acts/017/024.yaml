theological_decisions:
- issue: Divine transcendence versus temple localization
  chosen_reading: The verse states that the Creator and Lord of heaven and earth is
    not localized in human-made temples.
  alternative_readings:
  - The verse could be paraphrased more dynamically as denying that God is confined
    to temples.
  rationale: The translation preserves the text's direct claim without expanding it
    into a broader theological paraphrase. 'Does not dwell in temples made by hands'
    communicates transcendence while staying close to the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
