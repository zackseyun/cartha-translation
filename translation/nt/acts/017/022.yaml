theological_decisions:
- issue: Tone of Paul's characterization of Athenian religion in δεισιδαιμονεστέρους
  chosen_reading: Render with the relatively neutral-to-positive 'very religious'
    in the main text
  alternative_readings:
  - superstitious
  - more religious
  rationale: The Greek term is semantically flexible and likely rhetorically strategic
    in context. A pejorative rendering ('superstitious') may overresolve Paul's tone
    at the outset of the speech, while a strictly comparative 'more religious' sounds
    incomplete in English without an explicit standard of comparison. The chosen rendering
    preserves the ambiguity better in readable English, with the sharper alternative
    footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
