id: ACT.17.23
reference: Acts 17:23
source:
  edition: SBLGNT
  text: διερχόμενος γὰρ καὶ ἀναθεωρῶν τὰ σεβάσματα ὑμῶν εὗρον καὶ βωμὸν ἐν ᾧ ἐπεγέγραπτο·
    Ἀγνώστῳ θεῷ. ⸀ὃ οὖν ἀγνοοῦντες εὐσεβεῖτε, ⸀τοῦτο ἐγὼ καταγγέλλω ὑμῖν.
translation:
  text: For as I was passing through and observing your objects of worship, I even
    found an altar on which had been inscribed, ‘To an unknown god.’ Therefore, what
    you worship in ignorance—this I proclaim to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'To the unknown god.' The Greek inscription lacks the article, so either
      an indefinite or a more idiomatic definite rendering is possible in English.
    reason: lexical_alternative
  - marker: b
    text: Or, 'whom you worship without knowing.' Some translations personalize the
      referent, but the Greek uses a neuter relative pronoun ('what/that which').
    reason: alternative_reading
lexical_decisions:
- source_word: διερχόμενος
  chosen: as I was passing through
  alternatives:
  - passing through
  - going through
  lexicon: BDAG
  rationale: Present participle with γάρ introducing Paul's explanation; rendered
    as a temporal-progressive clause in natural English.
- source_word: ἀναθεωρῶν
  chosen: observing
  alternatives:
  - looking closely at
  - examining
  lexicon: BDAG
  rationale: Carries the sense of attentive observation rather than a mere glance;
    'observing' is readable and fits the participial sequence.
- source_word: σεβάσματα
  chosen: objects of worship
  alternatives:
  - objects of reverence
  - holy things
  - shrines
  lexicon: BDAG
  rationale: Broad term for revered religious objects or cultic items. 'Objects of
    worship' preserves the breadth better than the narrower 'shrines' while remaining
    clear.
- source_word: βωμὸν
  chosen: altar
  lexicon: BDAG
  rationale: Standard rendering for βωμός, the cultic altar Paul found.
- source_word: ἐπεγέγραπτο
  chosen: had been inscribed
  alternatives:
  - was inscribed
  - had been written
  lexicon: BDAG
  rationale: Pluperfect/passive sense naturally conveyed in English as prior inscription
    on the altar; 'inscribed' fits an altar better than the more generic 'written'.
- source_word: Ἀγνώστῳ θεῷ
  chosen: To an unknown god
  alternatives:
  - To the unknown god
  lexicon: BDAG
  rationale: The Greek lacks the article. English idiom for dedicatory inscriptions
    works well with 'To an unknown god.' The alternative with 'the' is possible as
    an interpretive smoothing and is preserved in a footnote.
- source_word: ὃ οὖν
  chosen: Therefore, what
  alternatives:
  - What then
  - Therefore, that which
  lexicon: BDAG
  rationale: Neuter relative pronoun refers back to the object of worship indicated
    by the inscription. 'Therefore, what' gives a natural transition and preserves
    the inferential force of οὖν.
- source_word: ἀγνοοῦντες
  chosen: in ignorance
  alternatives:
  - without knowing
  - unknowingly
  lexicon: BDAG
  rationale: The participle modifies the manner of their worship. 'In ignorance' preserves
    the connection with 'unknown' and keeps Paul's rhetorical contrast.
- source_word: εὐσεβεῖτε
  chosen: you worship
  alternatives:
  - you reverence
  - you practice devotion toward
  lexicon: BDAG
  rationale: The verb denotes reverent religious devotion. 'Worship' is the clearest
    idiomatic English equivalent in this context, though slightly stronger than 'reverence.'
- source_word: καταγγέλλω
  chosen: I proclaim
  alternatives:
  - I announce
  - I declare
  lexicon: BDAG
  rationale: A public, authoritative declaration is in view. 'Proclaim' fits Paul's
    speech and common NT usage.
