theological_decisions:
- issue: Reference of the neuter relative ὃ
  chosen_reading: Rendered impersonally as 'what you worship in ignorance' rather
    than 'whom you worship' or 'what therefore you unknowingly revere as unknown.'
  alternative_readings:
  - whom therefore you worship without knowing
  - what therefore you revere without knowing
  rationale: The Greek uses the neuter relative pronoun, likely referring to the Athenians'
    object of worship as identified by the inscription rather than directly personalizing
    the referent with a masculine pronoun. This preserves Paul's rhetorical starting
    point without importing a stronger personal form than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
