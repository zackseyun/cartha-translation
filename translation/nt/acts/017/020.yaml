id: ACT.17.20
reference: Acts 17:20
source:
  edition: SBLGNT
  text: ξενίζοντα γάρ τινα εἰσφέρεις εἰς τὰς ἀκοὰς ἡμῶν· βουλόμεθα οὖν γνῶναι ⸂τίνα
    θέλει⸃ ταῦτα εἶναι.
translation:
  text: For you are bringing some strange things to our ears. Therefore we want to
    know what these things mean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreign things' or 'unfamiliar things.' The Greek term can denote what
      is strange because it is new or foreign to the hearer.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'what these things want to be,' an idiom meaning 'what these
      things mean' or 'what significance they have.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ξενίζοντα
  chosen: strange
  alternatives:
  - foreign
  - unfamiliar
  - astonishing
  lexicon: BDAG
  rationale: The participle from ξενίζω here describes the content Paul is introducing
    as unusual or unfamiliar to the hearers. 'Strange' is natural English and fits
    the Athenians' reaction without overstating to 'astonishing.'
- source_word: τινα
  chosen: some things
  alternatives:
  - certain things
  - something
  lexicon: BDAG
  rationale: The indefinite pronoun is neuter plural in sense with ξενίζοντα and is
    best represented idiomatically as 'some things.' This preserves the indefinite,
    non-specific character of the accusation.
- source_word: εἰσφέρεις
  chosen: you are bringing
  alternatives:
  - you bring
  - you are introducing
  lexicon: BDAG
  rationale: Present tense is rendered progressively in English for naturalness in
    context. 'Bringing' also preserves the metaphor of carrying something into their
    hearing.
- source_word: εἰς τὰς ἀκοὰς ἡμῶν
  chosen: to our ears
  alternatives:
  - into our hearing
  - to our hearing
  lexicon: BDAG
  rationale: This is an idiomatic expression. 'To our ears' is clear modern English
    and preserves the bodily metaphor better than the more abstract 'to our hearing.'
- source_word: βουλόμεθα
  chosen: we want
  alternatives:
  - we wish
  - we desire
  lexicon: BDAG
  rationale: '''We want'' is straightforward contemporary English for βούλομαι here,
    avoiding archaic stiffness while preserving volition.'
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - to learn
  - to find out
  lexicon: BDAG
  rationale: The infinitive expresses the content of their desire. In idiomatic English,
    'want to know' is more direct than 'wish to learn,' though the sense overlaps.
- source_word: τίνα θέλει ταῦτα εἶναι
  chosen: what these things mean
  alternatives:
  - what these things are
  - what these things intend to be
  lexicon: BDAG
  rationale: The construction is idiomatic and asks for the significance or import
    of Paul's message, not merely its bare identity. 'What these things mean' best
    captures the sense in natural English.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for their request in the previous verse. 'For' preserves
    the explanatory connection.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding statement. 'Therefore' makes
    the logic explicit and readable.
