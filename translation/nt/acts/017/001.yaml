theological_decisions:
- issue: Rendering Ἰουδαίων in a narrative setting
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish people
  - the Judeans
  rationale: In this context the phrase refers to the Jewish community associated
    with the synagogue in Thessalonica, not specifically to residents of Judea. 'The
    Jews' is the standard and most direct rendering of Ἰουδαῖοι here. 'Judeans' would
    be misleading geographically, while 'the Jewish people' is more expansive than
    the immediate local reference.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not paraphrase'
