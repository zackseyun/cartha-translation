id: ACT.17.1
reference: Acts 17:1
source:
  edition: SBLGNT
  text: Διοδεύσαντες δὲ τὴν Ἀμφίπολιν καὶ ⸀τὴν Ἀπολλωνίαν ἦλθον εἰς Θεσσαλονίκην,
    ὅπου ⸀ἦν συναγωγὴ τῶν Ἰουδαίων.
translation:
  text: After passing through Amphipolis and Apollonia, they came to Thessalonica,
    where there was a synagogue of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Having passed through Amphipolis and Apollonia."
    reason: lexical_alternative
  - marker: b
    text: Or "where there was the synagogue of the Jews," though the Greek lacks the
      article before "synagogue."
    reason: lexical_alternative
lexical_decisions:
- source_word: Διοδεύσαντες
  chosen: After passing through
  alternatives:
  - Having passed through
  - Traveling through
  lexicon: BDAG
  rationale: Aorist active participle, nominative plural, indicating action prior
    to the main verb ἦλθον. 'After passing through' expresses the antecedent action
    clearly in natural English while preserving the sense of moving through these
    cities rather than stopping as the narrative focus.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective or narrative transition. In smooth
    modern English it is best left untranslated, since an explicit 'and' or 'now'
    would add awkwardness without conveying significant contrast.
- source_word: Ἀμφίπολιν
  chosen: Amphipolis
  rationale: Proper place name; transliterated according to standard English convention,
    following the project's principle to transliterate names.
- source_word: Ἀπολλωνίαν
  chosen: Apollonia
  rationale: Proper place name; transliterated according to standard English convention.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: BDAG
  rationale: Aorist indicative plural of ἔρχομαι. 'They came' is the straightforward
    narrative rendering. 'Arrived' is possible but slightly more interpretive; 'came'
    preserves the simple motion verb.
- source_word: εἰς Θεσσαλονίκην
  chosen: to Thessalonica
  alternatives:
  - into Thessalonica
  lexicon: BDAG
  rationale: εἰς with a city name commonly denotes movement to/into a place. 'To Thessalonica'
    is idiomatic English and sufficiently reflects the destination.
- source_word: ὅπου
  chosen: where
  alternatives:
  - in which place
  lexicon: BDAG
  rationale: Relative adverb introducing a locative clause. 'Where' is the natural
    English equivalent.
- source_word: συναγωγὴ
  chosen: a synagogue
  alternatives:
  - the synagogue
  lexicon: BDAG
  rationale: The noun is anarthrous in Greek. Rendering it as 'a synagogue' best reflects
    the lack of the article and the likely sense that Thessalonica had a Jewish synagogue,
    in contrast to the preceding towns passed through.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Jewish people
  - belonging to the Jews
  lexicon: BDAG
  rationale: Genitive plural with συναγωγή, denoting association/possession. 'Of the
    Jews' is the most direct rendering. It preserves the ethnic-religious designation
    Ἰουδαῖοι without paraphrase.
