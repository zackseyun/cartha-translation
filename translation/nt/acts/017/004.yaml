id: ACT.17.4
reference: Acts 17:4
source:
  edition: SBLGNT
  text: καί τινες ἐξ αὐτῶν ἐπείσθησαν καὶ προσεκληρώθησαν τῷ Παύλῳ καὶ τῷ Σιλᾷ, τῶν
    τε σεβομένων Ἑλλήνων ⸂πλῆθος πολὺ⸃ γυναικῶν τε τῶν πρώτων οὐκ ὀλίγαι.
translation:
  text: And some of them were persuaded and joined Paul and Silas, along with a large
    number of the God-fearing Greeks and not a few of the leading women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'cast in their lot with Paul and Silas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες ἐξ αὐτῶν
  chosen: some of them
  alternatives:
  - some from among them
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the partitive expression, referring
    back to the synagogue audience in the previous verse.
- source_word: ἐπείσθησαν
  chosen: were persuaded
  alternatives:
  - were convinced
  - believed
  lexicon: BDAG
  rationale: The passive of πείθω here most naturally means 'were persuaded' by the
    message. 'Believed' is possible contextually, but 'were persuaded' better preserves
    Luke's wording without importing a more explicit faith-term not used here.
- source_word: προσεκληρώθησαν
  chosen: joined
  alternatives:
  - cast in their lot with
  - attached themselves to
  - were added to
  lexicon: BDAG
  rationale: This rare verb conveys being assigned or attached to someone by lot/association;
    idiomatically in context it means they aligned themselves with Paul and Silas.
    'Joined' is clear modern English while preserving the sense of affiliation. The
    more literal 'cast in their lot with' is vivid but too interpretive for the main
    text.
- source_word: τῷ Παύλῳ καὶ τῷ Σιλᾷ
  chosen: Paul and Silas
  alternatives:
  - to Paul and Silas
  lexicon: BDAG
  rationale: The dative is relational with προσεκληρώθησαν. In English, 'joined Paul
    and Silas' is natural and conveys the same sense without awkwardness.
- source_word: τῶν τε σεβομένων Ἑλλήνων
  chosen: the God-fearing Greeks
  alternatives:
  - the worshiping Greeks
  - the devout Greeks
  - the Greeks who worshiped God
  lexicon: BDAG
  rationale: In Acts, σεβόμενοι commonly refers to Gentiles attached to Jewish worship
    and reverence for Israel's God. 'God-fearing' is the established and contextually
    precise rendering, making explicit the object of reverence that is implicit in
    the historical setting.
- source_word: πλῆθος πολὺ
  chosen: a large number
  alternatives:
  - a great multitude
  - a large crowd
  lexicon: BDAG
  rationale: This phrase denotes a substantial quantity. 'A large number' is natural
    modern English and fits the genitive construction with the following group.
- source_word: γυναικῶν τε τῶν πρώτων
  chosen: the leading women
  alternatives:
  - the prominent women
  - the women of high standing
  - the foremost women
  lexicon: BDAG
  rationale: πρῶτος here refers to social prominence or status, not chronological
    order. 'Leading women' is concise and idiomatic.
- source_word: οὐκ ὀλίγαι
  chosen: not a few
  alternatives:
  - quite a few
  - many
  lexicon: BDAG
  rationale: Luke uses this litotes for rhetorical effect. 'Not a few' preserves the
    understated emphasis better than flattening it to 'many'.
- source_word: τε ... τε
  chosen: along with ... and
  alternatives:
  - both ... and
  - as well as ... and
  lexicon: BDAG
  rationale: The paired τε links the two additional groups beyond 'some of them.'
    English does not require a rigidly symmetrical rendering; 'along with ... and'
    communicates the additive structure smoothly.
