theological_decisions:
- issue: Whether to render ἐπείσθησαν with explicitly conversional language
  chosen_reading: were persuaded
  alternative_readings:
  - believed
  rationale: The verse describes response to apostolic proclamation, but the Greek
    verb is πείθω rather than πιστεύω. Rendering it 'were persuaded' preserves the
    lexical distinction and avoids overstating the wording while still allowing the
    evangelistic context to inform the reader.
  doctrine_reference: 'Translation philosophy #1, #3'
- issue: How explicit to make the religious identity of σεβομένων Ἑλλήνων
  chosen_reading: God-fearing Greeks
  alternative_readings:
  - devout Greeks
  - Greeks who worshiped God
  rationale: Because Acts uses this expression for Gentiles associated with Jewish
    worship, 'God-fearing' best captures the historical-religious sense without unnecessary
    expansion. This is a contextual clarification, not a doctrinal addition.
  doctrine_reference: 'Translation philosophy #1, #6'
