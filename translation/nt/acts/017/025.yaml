theological_decisions:
- issue: Whether θεραπεύεται should be rendered in explicitly cultic terms ('is worshiped')
    or more broadly as receiving service
  chosen_reading: is served
  alternative_readings:
  - is worshiped
  - is ministered to
  rationale: Paul's argument concerns God's independence from human religious service,
    especially temple-based or idol-like conceptions of deity. 'Is served' includes
    cultic service without reducing the statement to inward worship alone. This avoids
    importing a narrower theological claim than the Greek requires.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
