id: ACT.17.25
reference: Acts 17:25
source:
  edition: SBLGNT
  text: οὐδὲ ὑπὸ χειρῶν ⸀ἀνθρωπίνων θεραπεύεται προσδεόμενός τινος, αὐτὸς διδοὺς πᾶσι
    ζωὴν καὶ πνοὴν ⸂καὶ τὰ⸃ πάντα·
translation:
  text: Nor is he served by human hands as though he needed anything, since he himself
    gives to all life and breath and everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is worshiped by human hands.' The Greek verb can refer to service or
      attendance offered in a religious context; here the sense is that God is not
      dependent on human ministrations.
    reason: lexical_alternative
lexical_decisions:
- source_word: θεραπεύεται
  chosen: is served
  alternatives:
  - is worshiped
  - is cared for
  - is ministered to
  lexicon: BDAG
  rationale: In this context, with ὑπὸ χειρῶν ἀνθρωπίνων ('by human hands') and the
    following participle 'as needing anything,' the sense is not healing but receiving
    service/attendance. 'Is served' is idiomatic and fits Paul's argument that God
    is not dependent on cultic ministrations.
- source_word: ὑπὸ χειρῶν ἀνθρωπίνων
  chosen: by human hands
  alternatives:
  - by the hands of men
  - by human agency
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the concrete idiom and echoes biblical
    language about man-made religious service without over-paraphrasing.
- source_word: προσδεόμενός τινος
  chosen: as though he needed anything
  alternatives:
  - since he needs nothing
  - being in need of anything
  lexicon: BDAG
  rationale: 'The participle gives the reason or implied condition under which such
    service would be necessary. ''As though he needed anything'' captures the rhetorical
    force: God is not served in the way needy beings are. ''Anything'' appropriately
    renders the indefinite τινος in context.'
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - himself
  lexicon: BDAG
  rationale: The pronoun is emphatic, contrasting God with idols or needy beings.
    'He himself' preserves the emphasis in natural English.
- source_word: διδοὺς
  chosen: gives
  alternatives:
  - giving
  - is giving
  lexicon: BDAG
  rationale: A finite English verb after 'since' communicates the participial relation
    smoothly in modern English while preserving the causal sense.
- source_word: πᾶσι
  chosen: to all
  alternatives:
  - to everyone
  - to all people
  lexicon: BDAG
  rationale: The dative is broad and unrestricted. 'To all' preserves the universal
    scope without narrowing it to humans only, especially since the statement is cosmological
    in tone.
- source_word: ζωὴν
  chosen: life
  lexicon: BDAG
  rationale: Standard rendering; paired with πνοή to express God's role as giver of
    life itself.
- source_word: πνοὴν
  chosen: breath
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In this collocation with 'life,' 'breath' is the natural sense, evoking
    creaturely dependence. 'Spirit' would overread the term here.
- source_word: καὶ τὰ πάντα
  chosen: and everything
  alternatives:
  - and all things
  - and all else
  lexicon: BDAG
  rationale: The phrase broadens the scope beyond life and breath to all that creatures
    possess. 'Everything' is natural modern English and preserves the totalizing force.
- source_word: οὐδὲ
  chosen: Nor
  alternatives:
  - And not
  - Neither
  lexicon: BDAG
  rationale: This continues the negated description from the previous verse. 'Nor'
    is the most natural connective in English for this continuation.
