id: ACT.17.2
reference: Acts 17:2
source:
  edition: SBLGNT
  text: κατὰ δὲ τὸ εἰωθὸς τῷ Παύλῳ εἰσῆλθεν πρὸς αὐτοὺς καὶ ἐπὶ σάββατα τρία διελέξατο
    αὐτοῖς ἀπὸ τῶν γραφῶν,
translation:
  text: And according to Paul's custom, he went in to them, and on three Sabbaths
    he reasoned with them from the Scriptures,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as was Paul's custom.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for three Sabbaths.'
    reason: lexical_alternative
  - marker: c
    text: Or 'discussed with them' or 'dialogued with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ δὲ τὸ εἰωθὸς τῷ Παύλῳ
  chosen: according to Paul's custom
  alternatives:
  - as was Paul's custom
  - according to what was customary for Paul
  lexicon: BDAG
  rationale: The idiom κατά + article + perfect participle of εἴωθα expresses established
    habit or customary practice. 'According to Paul's custom' is natural English and
    preserves the habitual sense without unnecessary expansion.
- source_word: εἰσῆλθεν πρὸς αὐτοὺς
  chosen: he went in to them
  alternatives:
  - he entered among them
  - he went to them
  lexicon: BDAG
  rationale: εἰσέρχομαι means 'go in/enter.' With πρὸς αὐτούς in this context, it
    refers to Paul going in to the synagogue gathering mentioned in the surrounding
    context. 'Went in to them' keeps the verbal motion and relational direction without
    over-specifying beyond the text.
- source_word: ἐπὶ σάββατα τρία
  chosen: on three Sabbaths
  alternatives:
  - for three Sabbaths
  - during three Sabbath days
  lexicon: BDAG
  rationale: ἐπί with the accusative here marks extent/distribution over time. 'On
    three Sabbaths' is idiomatic and fits the narrative sequence of repeated synagogue
    engagement across three Sabbath occasions.
- source_word: διελέξατο
  chosen: he reasoned with them
  alternatives:
  - he discussed with them
  - he dialogued with them
  - he argued with them
  lexicon: BDAG
  rationale: διαλέγομαι often denotes discourse, discussion, or reasoning in Acts.
    'Reasoned with them' best captures Paul's argumentative engagement from Scripture
    without implying hostility ('argued') or flattening the persuasive element ('discussed').
- source_word: ἀπὸ τῶν γραφῶν
  chosen: from the Scriptures
  alternatives:
  - from the writings
  - from the sacred writings
  lexicon: BDAG
  rationale: γραφή in plural in Jewish-Christian usage refers to the recognized sacred
    writings. 'The Scriptures' is the standard and clearest rendering, preserving
    the authoritative sense in context.
