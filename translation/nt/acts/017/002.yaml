theological_decisions:
- issue: Referent of 'them' in Paul's synagogue activity
  chosen_reading: Retain the pronoun 'them' without specifying 'the Jews' or 'the
    people in the synagogue' in the main text.
  alternative_readings:
  - he went into the synagogue
  - he went to the Jews there
  rationale: The immediate context identifies the synagogue setting, but this verse
    itself uses pronouns rather than explicit nouns. Keeping 'them' avoids importing
    more specificity than the Greek states while remaining clear in context.
  doctrine_reference: Translation philosophy §1, §3
