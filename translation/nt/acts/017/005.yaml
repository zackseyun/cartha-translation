theological_decisions:
- issue: Rendering οἱ Ἰουδαῖοι in a conflict narrative
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation follows the Greek wording directly without broadening
    or narrowing the referent beyond the text. Context shows this refers to a particular
    group of Jews in Thessalonica, not all Jews universally, but the main text should
    not replace the source term with an interpretive paraphrase.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Gender-accurate over gender-neutral'
