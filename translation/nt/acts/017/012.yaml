id: ACT.17.12
reference: Acts 17:12
source:
  edition: SBLGNT
  text: πολλοὶ μὲν οὖν ἐξ αὐτῶν ἐπίστευσαν, καὶ τῶν Ἑλληνίδων γυναικῶν τῶν εὐσχημόνων
    καὶ ἀνδρῶν οὐκ ὀλίγοι.
translation:
  text: Therefore many of them believed, and not a few of the prominent Greek women
    and men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'respectable' or 'of high social standing' for 'prominent.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'not a few,' an idiom meaning a considerable number.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ μὲν οὖν
  chosen: Therefore many
  alternatives:
  - So many
  - Accordingly many
  - Then many
  lexicon: BDAG
  rationale: μὲν οὖν together marks an inferential and transitional conclusion from
    the Bereans' examination of the Scriptures in the previous verse. 'Therefore'
    captures the logical result in natural English without over-translating each particle
    separately.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from them
  - among them
  lexicon: BDAG
  rationale: The phrase refers back to the Bereans/Jews just mentioned. 'Of them'
    is idiomatic in English after 'many ... believed' and preserves the partitive
    sense of ἐξ.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to faith
  - put their faith
  lexicon: BDAG
  rationale: πιστεύω is most directly rendered 'believed.' This avoids adding interpretive
    wording while fitting Luke's common usage for coming to faith.
- source_word: τῶν Ἑλληνίδων γυναικῶν
  chosen: of the Greek women
  alternatives:
  - of the Greek wives
  - of the Greek ladies
  lexicon: BDAG
  rationale: Ἑλληνίδων identifies these women as Greeks/Gentiles, and γυναικῶν here
    is best rendered 'women' rather than 'wives' because no marital relationship is
    in view.
- source_word: τῶν εὐσχημόνων
  chosen: prominent
  alternatives:
  - high-standing
  - respectable
  - of high social standing
  lexicon: BDAG
  rationale: εὐσχήμων in this context denotes social standing and respectability.
    'Prominent' is concise, natural modern English and conveys recognized status better
    than the more ambiguous 'respectable.'
- source_word: καὶ ἀνδρῶν οὐκ ὀλίγοι
  chosen: and men, not a few
  alternatives:
  - and not a few men
  - and many men
  lexicon: BDAG
  rationale: οὐκ ὀλίγοι is a litotes meaning 'not a few,' a Lukan idiom worth preserving
    rather than flattening to 'many.' In the final English sentence, the phrase is
    reordered to read naturally while retaining the idiom's emphasis.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: The conjunction links the additional group of converts. 'And' is the
    straightforward rendering.
