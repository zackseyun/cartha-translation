theological_decisions:
- issue: Whether to render ἐπίστευσαν with explicitly Christian doctrinal language
  chosen_reading: believed
  alternative_readings:
  - came to faith in Messiah
  - believed the message
  rationale: The verse itself states only that they 'believed,' with the object understood
    from context. Rendering simply 'believed' preserves the text's wording without
    importing a fuller doctrinal formulation not explicit in this verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
