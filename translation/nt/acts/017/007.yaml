id: ACT.17.7
reference: Acts 17:7
source:
  edition: SBLGNT
  text: οὓς ὑποδέδεκται Ἰάσων· καὶ οὗτοι πάντες ἀπέναντι τῶν δογμάτων Καίσαρος πράσσουσι,
    βασιλέα ⸂ἕτερον λέγοντες⸃ εἶναι Ἰησοῦν.
translation:
  text: These men, whom Jason has welcomed, are all acting against Caesar’s decrees,
    saying that there is another king—Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has received' or 'has taken in.' The Greek verb can denote receiving
      guests or offering hospitality.
    reason: lexical_alternative
  - marker: b
    text: Or 'edicts' for 'decrees.' The term refers to official rulings or ordinances.
    reason: lexical_alternative
  - marker: c
    text: Or 'a different king.' The Greek says 'another king,' presenting the charge
      as a rival claim to Caesar’s rule.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποδέδεκται
  chosen: has welcomed
  alternatives:
  - has received
  - has taken in
  lexicon: BDAG
  rationale: The perfect middle indicates Jason has received them as guests and that
    this hospitality stands as the basis of the accusation. 'Has welcomed' is natural
    modern English and preserves the hospitable nuance better than the more wooden
    'has received.'
- source_word: ἀπέναντι
  chosen: against
  alternatives:
  - in opposition to
  - contrary to
  lexicon: BDAG
  rationale: With the genitive, the term conveys opposition or contrariness. 'Against'
    is the clearest idiomatic rendering in this legal-accusatory context.
- source_word: δογμάτων
  chosen: decrees
  alternatives:
  - edicts
  - ordinances
  lexicon: BDAG
  rationale: In this Roman civic setting, δόγματα refers to official rulings or decrees.
    'Decrees' is accessible and suitably formal without sounding archaic.
- source_word: πράσσουσι
  chosen: are ... acting
  alternatives:
  - do
  - practice
  - are carrying on
  lexicon: BDAG
  rationale: The present tense portrays ongoing conduct. Rendering with 'are acting'
    brings out the verbal force in idiomatic English and fits the charge being made.
- source_word: βασιλέα ἕτερον
  chosen: another king
  alternatives:
  - a different king
  - another ruler
  lexicon: BDAG
  rationale: βασιλεύς is specifically 'king,' and ἕτερον marks another of a different
    kind or at least another distinct claimant. 'Another king' is the most direct
    and natural rendering of the accusation.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - claiming
  - declaring
  lexicon: BDAG
  rationale: The participle explains the manner/content of their alleged opposition.
    'Saying' is sufficiently transparent and avoids overstating the force as 'claiming'
    unless the context requires skepticism in the translation itself.
- source_word: εἶναι Ἰησοῦν
  chosen: that there is ... Jesus
  alternatives:
  - Jesus to be
  - Jesus is
  lexicon: BDAG
  rationale: English requires restructuring the infinitival clause. 'That there is
    another king—Jesus' preserves the reported-content sense while ending with the
    emphatic identification of Jesus.
- source_word: οὗτοι πάντες
  chosen: These men ... are all
  alternatives:
  - all these men
  - these all
  lexicon: BDAG
  rationale: The phrase is emphatic and collective. 'These men ... are all' preserves
    both the demonstrative force and the universalizing accusation in natural English.
