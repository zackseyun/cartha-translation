theological_decisions:
- issue: Political force of the accusation about Jesus as king
  chosen_reading: Render the charge straightforwardly as an accusation that they proclaim
    Jesus as another king, without softening it into merely spiritual language.
  alternative_readings:
  - Render 'king' more loosely as 'leader' or 'ruler' to reduce political overtones
  rationale: The text presents the opponents' allegation in explicitly political terms
    tied to Caesar's decrees. Translating βασιλέα as 'king' preserves the historical
    and theological tension without importing a narrower doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
