theological_decisions:
- issue: Rendering ἀδελφοὶ in a mixed-community context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural is retained in the main text rather than expanded. The inclusive
    sense is plausible contextually, but the Greek form itself is not gender-neutral.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering τῶν Ἰουδαίων
  chosen_reading: of the Jews
  alternative_readings:
  - Jewish
  rationale: The phrase is rendered transparently from the Greek rather than softened
    or paraphrased. In context it denotes the synagogue belonging to the Jewish community
    in Berea, not a theological judgment.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
