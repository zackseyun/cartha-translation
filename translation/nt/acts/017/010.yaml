id: ACT.17.10
reference: Acts 17:10
source:
  edition: SBLGNT
  text: Οἱ δὲ ἀδελφοὶ εὐθέως ⸀διὰ νυκτὸς ἐξέπεμψαν τόν τε Παῦλον καὶ τὸν Σιλᾶν εἰς
    Βέροιαν, οἵτινες παραγενόμενοι εἰς τὴν συναγωγὴν ⸂τῶν Ἰουδαίων ἀπῄεσαν⸃·
translation:
  text: Then the brothers immediately sent both Paul and Silas away by night to Berea,
    and when they arrived, they went into the synagogue of the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers,' which can refer to the wider
      believing community.
    reason: lexical_alternative
  - marker: b
    text: Or 'during the night.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the Jewish synagogue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers and sisters
  - believers
  lexicon: BDAG
  rationale: Rendered 'brothers' to preserve the grammatically masculine plural and
    likely familial/community sense, in keeping with the gender-accurate policy. Because
    the referent in Acts often includes the broader believing community, 'brothers
    and sisters' is a plausible interpretive expansion, but it is not placed in the
    main text since the Greek says ἀδελφοί.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: '''Immediately'' best conveys the adverb''s sense of prompt action in
    clear modern English.'
- source_word: διὰ νυκτός
  chosen: by night
  alternatives:
  - during the night
  - at night
  lexicon: BDAG
  rationale: The genitive construction with διά idiomatically indicates movement or
    action during nighttime. 'By night' is concise and natural while preserving the
    temporal nuance.
- source_word: ἐξέπεμψαν
  chosen: sent ... away
  alternatives:
  - sent out
  - dispatched
  lexicon: BDAG
  rationale: The compound verb ἐκπέμπω carries the sense of sending out or away. 'Sent
    ... away' fits the context of urgent departure from danger better than the more
    neutral 'sent out.'
- source_word: τόν τε Παῦλον καὶ τὸν Σιλᾶν
  chosen: both Paul and Silas
  alternatives:
  - Paul and Silas
  lexicon: BDAG
  rationale: The correlative force of τε ... καί is represented by 'both ... and'
    for fuller accuracy.
- source_word: Βέροιαν
  chosen: Berea
  alternatives:
  - Beroea
  lexicon: BDAG
  rationale: Used the standard English transliteration 'Berea,' which is more familiar
    in modern English Bible usage.
- source_word: οἵτινες
  chosen: and when they
  alternatives:
  - who
  - these men, when they
  lexicon: BDAG
  rationale: οἵτινες introduces the next action of Paul and Silas with a slightly
    qualitative/continuative force. In English, 'and when they' produces natural narrative
    flow without woodenly preserving the relative pronoun.
- source_word: παραγενόμενοι
  chosen: when they arrived
  alternatives:
  - having arrived
  - after they came
  lexicon: BDAG
  rationale: The participle is temporal in context. 'When they arrived' is idiomatic
    English and preserves the sequence of events.
- source_word: συναγωγὴν τῶν Ἰουδαίων
  chosen: the synagogue of the Jews
  alternatives:
  - the Jewish synagogue
  - the synagogue
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the genitival construction and Luke's
    wording. 'Jewish synagogue' is smoother but slightly more interpretive. 'Of the
    Jews' should not be read pejoratively; it identifies the local synagogue community.
- source_word: ἀπῄεσαν
  chosen: they went into
  alternatives:
  - they went
  - they proceeded to
  lexicon: BDAG
  rationale: Given the destination phrase 'into the synagogue,' English idiom prefers
    'went into.' The imperfect may be ingressive or simply narrative here; English
    simple past communicates the event naturally.
