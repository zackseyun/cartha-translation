id: ACT.17.33
reference: Acts 17:33
source:
  edition: SBLGNT
  text: ⸀οὕτως ὁ Παῦλος ἐξῆλθεν ἐκ μέσου αὐτῶν·
translation:
  text: So Paul went out from among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus Paul departed from their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: 'Here οὕτως functions as a discourse connector concluding the Areopagus
    episode: ''so/thus.'' ''So'' is natural modern English and preserves the inferential/narrative
    force without sounding stiff.'
- source_word: Παῦλος
  chosen: Paul
  rationale: Proper name transliterated by standard English convention, in keeping
    with the philosophy of transliterating names.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - left
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι means 'go out, come out, depart.' 'Went out' preserves
    the concrete motion expressed by the verb and matches the following prepositional
    phrase.
- source_word: ἐκ μέσου αὐτῶν
  chosen: from among them
  alternatives:
  - out of their midst
  - from their midst
  lexicon: BDAG
  rationale: The idiom ἐκ μέσου αὐτῶν means departure from the group's midst/presence.
    'From among them' is idiomatic modern English that retains the sense of leaving
    the assembled audience.
