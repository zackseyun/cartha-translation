id: ACT.17.21
reference: Acts 17:21
source:
  edition: SBLGNT
  text: Ἀθηναῖοι δὲ πάντες καὶ οἱ ἐπιδημοῦντες ξένοι εἰς οὐδὲν ἕτερον ηὐκαίρουν ἢ
    λέγειν τι ⸀ἢ ἀκούειν ⸀τι καινότερον.
translation:
  text: Now all the Athenians and the foreigners staying there would spend their time
    in nothing else than telling or hearing something newer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'something new.' The Greek uses the comparative
      'newer,' likely expressing a continual appetite for the latest novelty.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀθηναῖοι
  chosen: the Athenians
  alternatives:
  - Athenians
  lexicon: BDAG
  rationale: Definite reference to the people of Athens as a class. English article
    improves naturalness in context with πάντες.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Marks a mild transition/explanatory aside. 'Now' fits Luke's narrative
    style here better than a strongly adversative 'but'.
- source_word: πάντες
  chosen: all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: Straightforward universal reference modifying Athenians and, by extension
    through coordination, the resident foreigners.
- source_word: οἱ ἐπιδημοῦντες ξένοι
  chosen: the foreigners staying there
  alternatives:
  - the visiting foreigners
  - the resident foreigners
  - the strangers staying there
  lexicon: BDAG
  rationale: ἐπιδημοῦντες denotes those being present in a place, staying or residing
    temporarily; ξένοι are foreigners/outsiders. 'Staying there' preserves the temporary-local
    sense without implying permanent residence.
- source_word: εἰς οὐδὲν ἕτερον
  chosen: in nothing else
  alternatives:
  - for nothing else
  - with respect to nothing else
  lexicon: BDAG
  rationale: Idiomatic expression with ηὐκαίρουν meaning they occupied themselves
    with no other thing. 'In nothing else' preserves the Greek structure while remaining
    readable.
- source_word: ηὐκαίρουν
  chosen: would spend their time
  alternatives:
  - had leisure for
  - occupied themselves
  - devoted themselves
  lexicon: BDAG
  rationale: Imperfect verb describing customary activity. 'Would spend their time'
    captures the iterative/habitual sense and the idiomatic force of εὐκαιρέω in this
    context.
- source_word: ἢ λέγειν
  chosen: than telling
  alternatives:
  - except to tell
  - than speaking
  lexicon: BDAG
  rationale: After εἰς οὐδὲν ἕτερον ηὐκαίρουν ἢ, the sense is 'spent time in nothing
    else than...'. 'Telling' fits the object 'something newer' better than the more
    general 'speaking'.
- source_word: ἀκούειν
  chosen: hearing
  alternatives:
  - listening to
  lexicon: BDAG
  rationale: Balances 'telling' and keeps the infinitive pair concise and parallel.
- source_word: τι καινότερον
  chosen: something newer
  alternatives:
  - something new
  - some newer thing
  - something novel
  lexicon: BDAG
  rationale: καινότερον is comparative ('newer'), not merely positive ('new'). Retaining
    the comparative reflects the Greek more precisely, even if English idiom often
    smooths it to 'something new'.
