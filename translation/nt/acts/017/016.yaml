id: ACT.17.16
reference: Acts 17:16
source:
  edition: SBLGNT
  text: Ἐν δὲ ταῖς Ἀθήναις ἐκδεχομένου αὐτοὺς τοῦ Παύλου, παρωξύνετο τὸ πνεῦμα αὐτοῦ
    ἐν αὐτῷ ⸀θεωροῦντος κατείδωλον οὖσαν τὴν πόλιν.
translation:
  text: Now while Paul was waiting for them in Athens, his spirit was provoked within
    him as he saw that the city was full of idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was distressed' or 'was stirred up'; the Greek verb conveys a sharp
      inner agitation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the city was given over to idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδεχομένου
  chosen: was waiting for
  alternatives:
  - was expecting
  - was awaiting
  lexicon: BDAG
  rationale: 'The genitive participle with τοῦ Παύλου gives the temporal circumstance:
    Paul was in a state of waiting for his companions. ''Waiting for'' is natural
    modern English and preserves the durative sense.'
- source_word: παρωξύνετο
  chosen: was provoked
  alternatives:
  - was distressed
  - was stirred up
  - was irritated
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing internal reaction.
    'Was provoked' preserves the stronger sense of sharp agitation and echoes the
    semantic force of παροξύνω without reducing it merely to sadness.
- source_word: τὸ πνεῦμα αὐτοῦ
  chosen: his spirit
  alternatives:
  - his inner being
  lexicon: BDAG
  rationale: πνεῦμα here refers to Paul's inner spirit, not the Holy Spirit. 'His
    spirit' is the most direct and idiomatic rendering.
- source_word: ἐν αὐτῷ
  chosen: within him
  alternatives:
  - in him
  lexicon: BDAG
  rationale: This dative phrase intensifies the inward location of the provocation.
    'Within him' is clearer in English than the more wooden 'in him.'
- source_word: θεωροῦντος
  chosen: as he saw
  alternatives:
  - while he was observing
  - as he was beholding
  lexicon: BDAG
  rationale: The participle expresses contemporaneous perception. 'As he saw' is concise
    and natural, while still reflecting the observational force of θεωρέω.
- source_word: κατείδωλον
  chosen: full of idols
  alternatives:
  - given over to idols
  - covered with idols
  lexicon: BDAG
  rationale: The adjective denotes a city filled with or swamped by idols. 'Full of
    idols' is the clearest idiomatic rendering in modern English. 'Given over to idols'
    is interpretive and less strictly lexical.
- source_word: πόλιν
  chosen: the city
  alternatives:
  - Athens
  lexicon: BDAG
  rationale: The Greek explicitly says 'the city,' referring to Athens already named
    in the sentence. Retaining 'the city' preserves the source wording while remaining
    clear.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative transition rather than strong contrast. 'Now'
    signals the shift smoothly in English.
