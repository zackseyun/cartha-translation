theological_decisions:
- issue: Referent of 'spirit'
  chosen_reading: Paul's own human spirit is in view, not the Holy Spirit.
  alternative_readings:
  - An allusion to the Holy Spirit's prompting
  rationale: The possessive construction 'his spirit' and the inward phrase 'within
    him' indicate Paul's internal response to the idolatry he observed. The verse
    does not explicitly attribute this reaction to the Holy Spirit, so the translation
    should not import that claim.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
