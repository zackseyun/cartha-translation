id: ACT.17.13
reference: Acts 17:13
source:
  edition: SBLGNT
  text: ὡς δὲ ἔγνωσαν οἱ ἀπὸ τῆς Θεσσαλονίκης Ἰουδαῖοι ὅτι καὶ ἐν τῇ Βεροίᾳ κατηγγέλη
    ὑπὸ τοῦ Παύλου ὁ λόγος τοῦ θεοῦ, ἦλθον κἀκεῖ σαλεύοντες ⸂καὶ ταράσσοντες⸃ τοὺς
    ὄχλους.
translation:
  text: But when the Jews from Thessalonica learned that the word of God had been
    proclaimed by Paul in Berea also, they came there too, stirring up and troubling
    the crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was proclaimed' instead of 'had been proclaimed'; the Greek aorist passive
      can be rendered either way in English depending on how tightly the sequence
      is expressed.
    reason: lexical_alternative
  - marker: b
    text: Or 'stirring up and disturbing the crowds.' The two participles overlap
      but likely intensify the picture of public agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: But when
  alternatives:
  - Now when
  - And when
  - As soon as
  lexicon: BDAG
  rationale: Renders the transitional particle δέ with a natural English discourse
    marker and ὡς temporally. 'But when' preserves the narrative shift and mild contrast
    with the previous positive reception in Berea.
- source_word: ἔγνωσαν
  chosen: learned
  alternatives:
  - knew
  - found out
  - came to know
  lexicon: BDAG
  rationale: Aorist of γινώσκω here denotes coming to know information, not mere possession
    of knowledge. 'Learned' is idiomatic and fits the report context.
- source_word: οἱ ἀπὸ τῆς Θεσσαλονίκης Ἰουδαῖοι
  chosen: the Jews from Thessalonica
  alternatives:
  - the Thessalonian Jews
  - the Jews who were from Thessalonica
  lexicon: BDAG
  rationale: This identifies the specific group by origin. 'From Thessalonica' is
    clear modern English and avoids implying all Jews in general.
- source_word: ὅτι καὶ ἐν τῇ Βεροίᾳ
  chosen: that ... in Berea also
  alternatives:
  - that also in Berea
  - that in Berea too
  lexicon: BDAG
  rationale: καί modifies the additional location where Paul's proclamation occurred.
    'Also' preserves the sense that Berea, like Thessalonica, had received the message.
- source_word: κατηγγέλη
  chosen: had been proclaimed
  alternatives:
  - was proclaimed
  - was announced
  - was preached
  lexicon: BDAG
  rationale: Aorist passive of καταγγέλλω emphasizes public proclamation. 'Proclaimed'
    is slightly broader and less sermon-specific than 'preached,' while still fitting
    apostolic announcement. English pluperfect smooths the sequence after 'learned
    that'.
- source_word: ὑπὸ τοῦ Παύλου
  chosen: by Paul
  alternatives:
  - through Paul
  lexicon: BDAG
  rationale: ὑπό with genitive marks personal agency in a passive construction; 'by
    Paul' is the straightforward rendering.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard biblical expression for the divine message being proclaimed.
    'The word of God' preserves the familiar theological phrase without overinterpreting
    λόγος.
- source_word: ἦλθον κἀκεῖ
  chosen: they came there too
  alternatives:
  - they came there also
  - they came even there
  lexicon: BDAG
  rationale: κἀκεῖ means 'there also/too.' 'There too' is natural English and preserves
    the sense of extending their opposition to Berea.
- source_word: σαλεύοντες
  chosen: stirring up
  alternatives:
  - agitating
  - shaking
  - inciting
  lexicon: BDAG
  rationale: The participle conveys causing unrest or disturbance among people. 'Stirring
    up' is idiomatic in English for fomenting public agitation.
- source_word: καὶ ταράσσοντες
  chosen: and troubling
  alternatives:
  - and disturbing
  - and throwing into confusion
  lexicon: BDAG
  rationale: 'ταράσσω adds a second nuance beyond σαλεύω: causing disturbance, turmoil,
    or alarm. ''Troubling'' preserves the distinct second participle without collapsing
    it into the first.'
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the people
  - the mobs
  lexicon: BDAG
  rationale: ὄχλοι commonly refers to gathered crowds. 'Crowds' is neutral and contextually
    appropriate; 'mobs' would overstate the term.
