id: ACT.17.18
reference: Acts 17:18
source:
  edition: SBLGNT
  text: τινὲς δὲ καὶ τῶν Ἐπικουρείων ⸀καὶ Στοϊκῶν φιλοσόφων συνέβαλλον αὐτῷ, καί τινες
    ἔλεγον· Τί ἂν θέλοι ὁ σπερμολόγος οὗτος λέγειν; οἱ δέ· Ξένων δαιμονίων δοκεῖ καταγγελεὺς
    εἶναι· ὅτι τὸν Ἰησοῦν καὶ τὴν ἀνάστασιν εὐηγγελίζετο.
translation:
  text: Some of the Epicurean and Stoic philosophers also engaged with him, and some
    were saying, “What is this babbler trying to say?” But others said, “He seems
    to be a proclaimer of foreign deities,” because he was proclaiming the good news
    about Jesus and the resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'debated with him' or 'conversed with him'; the Greek verb can denote
      active discussion or dispute.
    reason: lexical_alternative
  - marker: b
    text: '''Babbler'' translates a derogatory term literally associated with a ''seed-picker,''
      used for someone viewed as a collector and repeater of scraps of ideas.'
    reason: cultural_note
  - marker: c
    text: Or 'foreign demons' or 'strange gods.' Here the speakers likely mean unfamiliar
      divine beings according to their own pagan framework, not necessarily evil spirits
      in the later Christian sense.
    reason: alternative_reading
  - marker: d
    text: Some interpreters think the Athenians may have mistaken 'the resurrection'
      for another deity because Paul was proclaiming Jesus and the resurrection.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέβαλλον αὐτῷ
  chosen: engaged with him
  alternatives:
  - conversed with him
  - debated with him
  - contended with him
  lexicon: BDAG
  rationale: συμβάλλω in this context refers to interaction in discussion or dispute.
    'Engaged with him' preserves the sense broadly without overcommitting to hostile
    debate, while fitting the philosophical setting.
- source_word: σπερμολόγος
  chosen: babbler
  alternatives:
  - seed-picker
  - charlatan
  - scavenger of scraps
  lexicon: BDAG
  rationale: A derogatory term used of someone who picks up scraps of ideas and repeats
    them. 'Babbler' is the established concise English equivalent and communicates
    dismissiveness; more literal options are obscure in modern English.
- source_word: Τί ἂν θέλοι ... λέγειν
  chosen: What is this babbler trying to say?
  alternatives:
  - What might this babbler want to say?
  - What does this babbler mean to say?
  lexicon: BDAG
  rationale: The optative with ἄν conveys tentative or somewhat contemptuous speculation.
    'Trying to say' captures the idiomatic force in natural English.
- source_word: Ξένων δαιμονίων
  chosen: foreign deities
  alternatives:
  - foreign divinities
  - strange gods
  - foreign demons
  lexicon: BDAG
  rationale: In this Athenian pagan context, δαιμόνια refers to divine beings/deities
    as perceived by the speakers, not necessarily evil demons in the later Christian
    sense. 'Foreign deities' best reflects their viewpoint and avoids importing Christian
    demonology into their accusation.
- source_word: καταγγελεὺς
  chosen: proclaimer
  alternatives:
  - announcer
  - herald
  lexicon: BDAG
  rationale: The noun denotes one who publicly announces or proclaims. 'Proclaimer'
    is clear and suitably formal.
- source_word: εὐηγγελίζετο
  chosen: was proclaiming the good news
  alternatives:
  - was preaching
  - was evangelizing
  lexicon: BDAG
  rationale: The verb specifically denotes announcing good news. Rendering it explicitly
    preserves the lexical connection to gospel proclamation better than the more generic
    'preaching'.
- source_word: ἀνάστασιν
  chosen: the resurrection
  alternatives:
  - Resurrection
  lexicon: BDAG
  rationale: The article and context indicate the concept Paul was proclaiming. Lowercase
    'the resurrection' is preferable here because the Athenians may have mistaken
    it as another deity, but Luke's narration refers to the message content rather
    than naming a personified figure.
- source_word: τινὲς ... καί τινες ... οἱ δέ
  chosen: some ... and some ... but others
  alternatives:
  - some ... some ... others
  lexicon: BDAG
  rationale: This sequence marks differing reactions within the group. The English
    rendering preserves the contrast and flow of the Greek discourse.
- source_word: Ἐπικουρείων καὶ Στοϊκῶν φιλοσόφων
  chosen: the Epicurean and Stoic philosophers
  alternatives:
  - philosophers of the Epicureans and Stoics
  - Epicurean and Stoic thinkers
  lexicon: BDAG
  rationale: This is the most natural English rendering of the genitive construction
    while preserving the named philosophical schools.
