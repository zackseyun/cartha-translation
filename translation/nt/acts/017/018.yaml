theological_decisions:
- issue: Rendering δαιμόνια in a pagan speech context
  chosen_reading: foreign deities
  alternative_readings:
  - foreign demons
  - strange gods
  rationale: To translate δαιμόνια here as 'demons' would likely misrepresent the
    Athenians' own categories and import later Christian usage into their speech.
    The narrative reports their accusation from their perspective, so 'deities' is
    contextually and historically more accurate.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to capitalize 'resurrection' as if personified
  chosen_reading: the resurrection
  alternative_readings:
  - Resurrection
  rationale: Although some interpreters suggest the Athenians may have heard ἀνάστασις
    as the name of a goddess, the Greek text itself presents Luke's explanation of
    Paul's message content. The main text therefore keeps the common noun, while the
    alternative interpretive possibility is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
