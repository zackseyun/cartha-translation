theological_decisions:
- issue: Responsibility formula in 'Your blood be on your own heads'
  chosen_reading: A declaration that responsibility for the consequences of rejecting
    the message rests on the hearers, not on Paul.
  alternative_readings:
  - A curse formula in a stronger imprecatory sense
  rationale: The expression echoes biblical watchman/responsibility language and functions
    here as a solemn disclaimer of Paul's liability after faithful witness. The translation
    preserves the idiom without importing a stronger curse than the text requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
