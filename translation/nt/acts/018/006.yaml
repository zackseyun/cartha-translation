id: ACT.18.6
reference: Acts 18:6
source:
  edition: SBLGNT
  text: ἀντιτασσομένων δὲ αὐτῶν καὶ βλασφημούντων ἐκτιναξάμενος τὰ ἱμάτια εἶπεν πρὸς
    αὐτούς· Τὸ αἷμα ὑμῶν ἐπὶ τὴν κεφαλὴν ὑμῶν· καθαρὸς ἐγώ· ἀπὸ τοῦ νῦν εἰς τὰ ἔθνη
    πορεύσομαι.
translation:
  text: But when they opposed and reviled him, he shook out his garments and said
    to them, “Your blood be on your own heads. I am innocent. From now on I will go
    to the Gentiles.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “blasphemed.” The Greek verb can denote blasphemous speech or abusive
      reviling; here it likely refers to hostile abusive speech against Paul and his
      message.
    reason: lexical_alternative
  - marker: b
    text: “Your blood be on your own heads” is an idiom meaning that responsibility
      for the consequences rests on them.
    reason: cultural_note
  - marker: c
    text: “Gentiles” could be rendered “the nations”; in this context it refers to
      non-Jews.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιτασσομένων
  chosen: opposed
  alternatives:
  - set themselves against
  - resisted
  lexicon: BDAG
  rationale: The middle/passive participle here describes active opposition to Paul's
    message. 'Opposed' is concise, natural English and preserves the adversarial force
    without overexpanding.
- source_word: βλασφημούντων
  chosen: reviled him
  alternatives:
  - blasphemed
  - spoke abusively
  lexicon: BDAG
  rationale: In this context the object of the abuse is most naturally Paul and his
    message, not necessarily direct blasphemy against God in the narrower English
    sense. 'Reviled him' communicates hostile abusive speech clearly in modern English.
    A more formal 'blasphemed' is preserved in a footnote as a lexical alternative.
- source_word: ἐκτιναξάμενος τὰ ἱμάτια
  chosen: he shook out his garments
  alternatives:
  - he shook out his clothes
  - he shook off his garments
  lexicon: BDAG
  rationale: This idiom refers to a symbolic gesture of dissociation/testimony. 'Shook
    out his garments' stays close to the Greek while remaining readable. 'Garments'
    better matches ἱμάτια than the more casual 'clothes.'
- source_word: Τὸ αἷμα ὑμῶν ἐπὶ τὴν κεφαλὴν ὑμῶν
  chosen: Your blood be on your own heads
  alternatives:
  - Your blood is on your own heads
  - Your blood be upon your own head
  lexicon: BDAG
  rationale: This is an idiomatic declaration of responsibility for the consequences
    of rejecting the message. The plural 'heads' matches the Greek. 'Be on your own
    heads' preserves the solemn, judicial tone better than a flattened paraphrase.
- source_word: καθαρὸς ἐγώ
  chosen: I am innocent
  alternatives:
  - I am clean
  - I am guiltless
  lexicon: BDAG
  rationale: The adjective here is metaphorical, expressing freedom from responsibility
    or guilt. 'I am innocent' communicates the intended sense in natural English more
    clearly than the more literal but potentially misleading 'I am clean.'
- source_word: ἀπὸ τοῦ νῦν
  chosen: From now on
  alternatives:
  - From this time
  - Henceforth
  lexicon: BDAG
  rationale: This temporal phrase marks a decisive transition in Paul's ministry focus.
    'From now on' is idiomatic modern English.
- source_word: εἰς τὰ ἔθνη
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη in contrast with the synagogue audience refers specifically
    to non-Jews. 'Gentiles' is the clearest contextual rendering; 'nations' would
    be more literal but less precise in this setting.
- source_word: πορεύσομαι
  chosen: I will go
  alternatives:
  - I will depart
  - I will proceed
  lexicon: BDAG
  rationale: The future middle indicates intended movement/mission. 'I will go' is
    the most straightforward and idiomatic rendering in context.
