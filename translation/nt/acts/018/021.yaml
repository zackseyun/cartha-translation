id: ACT.18.21
reference: Acts 18:21
source:
  edition: SBLGNT
  text: ⸂ἀλλὰ ἀποταξάμενος καὶ⸃ ⸀εἰπών· ⸀Πάλιν ἀνακάμψω πρὸς ὑμᾶς τοῦ θεοῦ θέλοντος
    ἀνήχθη ἀπὸ τῆς Ἐφέσου,
translation:
  text: but after taking leave and saying, “I will return to you again, if God wills,”
    he set sail from Ephesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit 'and saying, “I will return to you again, if God wills.”'
    reason: textual_variant
  - marker: b
    text: Or 'God willing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - instead
  - yet
  lexicon: BDAG
  rationale: Marks contrast with the preceding request that he remain longer; 'but'
    is the most natural English adversative here.
- source_word: ἀποταξάμενος
  chosen: after taking leave
  alternatives:
  - having said farewell
  - after saying goodbye
  lexicon: BDAG
  rationale: Aorist middle participle indicating leave-taking. 'After taking leave'
    is natural English and preserves the participial sequence without over-paraphrase.
- source_word: καὶ εἰπών
  chosen: and saying
  alternatives:
  - and said
  - after saying
  lexicon: BDAG
  rationale: Retains the second participle in sequence with ἀποταξάμενος. English
    smoothness is preserved while reflecting the Greek construction.
- source_word: Πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense; paired naturally with 'return' in English.
- source_word: ἀνακάμψω
  chosen: I will return
  alternatives:
  - I will come back
  - I will turn back
  lexicon: BDAG
  rationale: Future verb of returning. 'Return' is slightly more formal and fits Luke's
    narrative style better than 'come back.'
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - back to you
  lexicon: BDAG
  rationale: Directional πρός with accusative. 'To you' is sufficient because 'again'
    already conveys return; 'back' would be redundant.
- source_word: τοῦ θεοῦ θέλοντος
  chosen: if God wills
  alternatives:
  - God willing
  - if God is willing
  lexicon: BDAG
  rationale: Genitive absolute expressing contingency under God's will. 'If God wills'
    is concise, idiomatic, and preserves the explicit conditional dependence.
- source_word: ἀνήχθη
  chosen: he set sail
  alternatives:
  - he put out to sea
  - he was taken up
  lexicon: BDAG
  rationale: In travel narrative ἀνάγω commonly means to put to sea/set sail. This
    is the contextually correct nautical sense, not a literal 'was led up.'
- source_word: ἀπὸ τῆς Ἐφέσου
  chosen: from Ephesus
  alternatives: []
  lexicon: BDAG
  rationale: Standard expression of departure from the city; 'Ephesus' is the conventional
    English transliteration of Ἔφεσος.
