theological_decisions:
- issue: Expression of divine willing in Paul's travel plan
  chosen_reading: if God wills
  alternative_readings:
  - God willing
  - if the Lord wills
  rationale: The Greek explicitly reads τοῦ θεοῦ θέλοντος, 'if God wills.' The translation
    preserves dependence on God's will without importing the variant 'Lord' or softening
    the explicit reference to God.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
