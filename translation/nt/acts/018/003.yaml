id: ACT.18.3
reference: Acts 18:3
source:
  edition: SBLGNT
  text: καὶ διὰ τὸ ὁμότεχνον εἶναι ἔμενεν παρ’ αὐτοῖς καὶ ⸀ἠργάζετο, ἦσαν γὰρ σκηνοποιοὶ
    ⸂τῇ τέχνῃ⸃.
translation:
  text: And because he was of the same trade, he stayed with them and worked, for
    they were tentmakers by trade.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'leatherworkers'; the Greek term can refer more broadly to those
      who made tents or worked in the related craft.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ ὁμότεχνον εἶναι
  chosen: because he was of the same trade
  alternatives:
  - because he had the same occupation
  - because he was a fellow craftsman
  lexicon: BDAG
  rationale: The articular infinitive with διά expresses reason ('because'). ὁμότεχνος
    denotes sharing the same craft or trade. 'Of the same trade' is natural English
    and preserves the causal connection and vocational sense without over-specifying
    the craft before Luke names it.
- source_word: ἔμενεν παρ’ αὐτοῖς
  chosen: he stayed with them
  alternatives:
  - he remained with them
  - he lodged with them
  lexicon: BDAG
  rationale: μένω commonly means remain/stay. In this narrative context, Paul is residing
    with Aquila and Priscilla, so 'stayed with them' is idiomatic and clear. 'Lodged'
    is possible but slightly narrower and less natural in contemporary English.
- source_word: ἠργάζετο
  chosen: worked
  alternatives:
  - was working
  - labored
  lexicon: BDAG
  rationale: ἐργάζομαι here refers to engaging in manual labor or trade work. 'Worked'
    is the most straightforward rendering. The imperfect aspect is adequately conveyed
    in English narrative by the simple past, especially alongside 'stayed.'
- source_word: σκηνοποιοὶ
  chosen: tentmakers
  alternatives:
  - leatherworkers
  - makers of tents
  lexicon: BDAG
  rationale: The traditional and most likely sense is 'tentmakers.' Some argue for
    a broader leatherworking trade because tents could be made from leather or woven
    material, but the lexical evidence and longstanding usage support 'tentmakers'
    as the main text rendering. The broader occupational possibility is worth preserving
    in a footnote.
- source_word: τῇ τέχνῃ
  chosen: by trade
  alternatives:
  - by craft
  - in their trade
  lexicon: BDAG
  rationale: τέχνη refers to craft, skill, or trade. The dative here is best rendered
    idiomatically as 'by trade,' clarifying that tentmaking was their occupation rather
    than a one-time activity.
