id: ACT.18.10
reference: Acts 18:10
source:
  edition: SBLGNT
  text: διότι ἐγώ εἰμι μετὰ σοῦ καὶ οὐδεὶς ἐπιθήσεταί σοι τοῦ κακῶσαί σε, διότι λαός
    ἐστί μοι πολὺς ἐν τῇ πόλει ταύτῃ.
translation:
  text: because I am with you, and no one will attack you to harm you, because I have
    many people in this city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'no one will lay a hand on you to harm you.'
    reason: lexical_alternative
  - marker: b
    text: '''I have many people in this city'' likely means many in Corinth who belong
      to the Lord, including those who will yet believe.'
    reason: cross_reference
lexical_decisions:
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the command in the previous verse and again
    the reason for the promise at the end of this verse. 'Because' is clear modern
    English and preserves the causal force.
- source_word: ἐγώ εἰμι μετὰ σοῦ
  chosen: I am with you
  alternatives:
  - I am with you personally
  lexicon: BDAG
  rationale: The explicit pronoun ἐγώ adds emphasis, but standard English can convey
    this without an awkward 'I myself.' The phrase is a straightforward assurance
    of presence.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - no person
  lexicon: BDAG
  rationale: Natural English equivalent for the indefinite negative subject.
- source_word: ἐπιθήσεταί σοι
  chosen: will attack you
  alternatives:
  - will lay a hand on you
  - will set upon you
  lexicon: BDAG
  rationale: Future middle of ἐπιτίθημι with dative σοι in this context carries the
    sense of hostile action against Paul. 'Attack you' is idiomatic and fits the following
    infinitive of purpose/result. 'Lay a hand on you' is possible but more idiomatic
    than the Greek requires and can sound euphemistic.
- source_word: τοῦ κακῶσαί σε
  chosen: to harm you
  alternatives:
  - to mistreat you
  - to do you evil
  - to injure you
  lexicon: BDAG
  rationale: 'Articular infinitive expressing purpose/result: the hostile action is
    aimed at harming Paul. ''To harm you'' is broad enough to include physical or
    other injury and reads naturally in English.'
- source_word: λαός
  chosen: people
  alternatives:
  - a people
  lexicon: BDAG
  rationale: Here λαός refers collectively to persons belonging to the speaker. In
    English, 'many people' is the natural collective expression. The anarthrous singular
    in Greek does not require the awkward English singular 'a people' here.
- source_word: ἐστί μοι
  chosen: I have
  alternatives:
  - there are to me
  - there is for me
  lexicon: BDAG
  rationale: The dative μοι with εἰμί expresses possession idiomatically. English
    normally renders this as 'I have,' which preserves the sense without wooden phrasing.
- source_word: πολὺς
  chosen: many
  alternatives:
  - a great number of
  lexicon: BDAG
  rationale: Simple quantitative adjective modifying λαός; 'many' is the most direct
    and natural rendering.
- source_word: ἐν τῇ πόλει ταύτῃ
  chosen: in this city
  alternatives:
  - in this town
  lexicon: BDAG
  rationale: πόλις is best rendered 'city' in Acts for an urban center like Corinth.
    The demonstrative ταύτῃ is naturally brought forward in English as 'this city'.
