theological_decisions:
- issue: Meaning of 'many people' in the city
  chosen_reading: The phrase refers to people in Corinth who belong to the Lord and
    will come to faith, grounding Paul's safety and continued ministry there.
  alternative_readings:
  - It could be taken more generally as many people favorable to Paul already present
    in the city.
  rationale: Within Acts, divine claims of having a 'people' commonly imply covenantal
    belonging rather than mere population count. The statement explains why Paul should
    continue speaking boldly. The translation 'I have many people in this city' preserves
    the wording without importing a narrower doctrinal system into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
