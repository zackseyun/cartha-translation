id: ACT.18.17
reference: Acts 18:17
source:
  edition: SBLGNT
  text: ἐπιλαβόμενοι δὲ ⸀πάντες Σωσθένην τὸν ἀρχισυνάγωγον ἔτυπτον ἔμπροσθεν τοῦ βήματος·
    καὶ οὐδὲν τούτων τῷ Γαλλίωνι ⸀ἔμελεν.
translation:
  text: Then they all seized Sosthenes, the synagogue ruler, and were beating him
    in front of the tribunal. But Gallio paid no attention to these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'all the Greeks' instead of simply 'they all.' The
      earliest text is shorter and leaves the group's identity unspecified.
    reason: textual_variant
lexical_decisions:
- source_word: ἐπιλαβόμενοι
  chosen: seized
  alternatives:
  - took hold of
  - laid hold of
  lexicon: BDAG
  rationale: Aorist middle participle of ἐπιλαμβάνομαι commonly means to take hold
    of or seize. 'Seized' is concise, natural English and fits the hostile action
    that leads into the beating.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  - everyone
  lexicon: BDAG
  rationale: The nominative plural adjective functions substantivally. 'They all'
    preserves the explicit totalizing force while leaving the referent contextually
    inferred, as in the Greek.
- source_word: ἀρχισυνάγωγον
  chosen: synagogue ruler
  alternatives:
  - leader of the synagogue
  - synagogue official
  lexicon: BDAG
  rationale: The term denotes the leading official of a synagogue. 'Synagogue ruler'
    is a clear, fairly literal rendering in readable modern English.
- source_word: ἔτυπτον
  chosen: were beating
  alternatives:
  - beat
  - were striking
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated action. 'Were beating'
    best conveys the durative force better than simple past 'beat.'
- source_word: ἔμπροσθεν τοῦ βήματος
  chosen: in front of the tribunal
  alternatives:
  - before the judgment seat
  - before the bench
  lexicon: BDAG
  rationale: βῆμα here refers to the official judicial platform or tribunal where
    Gallio sat. 'Tribunal' communicates the legal setting in contemporary English
    better than the more traditional but less transparent 'judgment seat.'
- source_word: οὐδὲν τούτων
  chosen: no attention to these things
  alternatives:
  - none of these things
  - nothing of this
  lexicon: BDAG
  rationale: With μέλει, the idiom means that something is of no concern to someone.
    Rendering the phrase together as 'paid no attention to these things' expresses
    the sense naturally in English.
- source_word: ἔμελεν
  chosen: paid no attention
  alternatives:
  - was unconcerned
  - did not care
  lexicon: BDAG
  rationale: μέλει/ἔμελεν often means 'to be a matter of concern.' 'Paid no attention'
    captures Gallio's indifference in context without sounding overly colloquial or
    emotionally loaded.
- source_word: δέ
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative progression here. 'Then' gives smooth English flow
    and reflects the transition to the next event.
- source_word: καί
  chosen: But
  alternatives:
  - and
  lexicon: BDAG
  rationale: Although καί is often simply 'and,' here it introduces a contrast between
    the crowd's violence and Gallio's indifference. 'But' makes that contrast explicit
    in idiomatic English.
