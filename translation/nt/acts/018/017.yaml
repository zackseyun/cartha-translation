theological_decisions:
- issue: Identity of πάντες ('all')
  chosen_reading: Left unspecified in the main text as 'they all,' without identifying
    the group as either Jews or Greeks.
  alternative_readings:
  - all the Jews
  - all the Greeks
  rationale: The Greek text simply says πάντες ('all') without an explicit subject.
    Some manuscripts and interpreters associate the crowd with Greeks, while some
    later traditions read Jews. The translation should not import an identification
    the source text does not state. The ambiguity is preserved in the main text and
    clarified in a footnote.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it; original-language primacy over translation tradition.
