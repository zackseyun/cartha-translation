theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: The speaker is rendered simply as 'the Lord,' leaving the title
    intact rather than paraphrasing as 'Jesus.'
  alternative_readings:
  - the Lord Jesus
  rationale: The Greek text reads ὁ κύριος. In Acts this commonly refers to Jesus,
    but the translation should not import a fuller identification than the text states.
    Retaining 'the Lord' preserves both the narrative usage and the christological
    weight.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → ''Lord''; preserve
    theological tension rather than resolve it.'
