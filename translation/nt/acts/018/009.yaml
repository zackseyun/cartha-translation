id: ACT.18.9
reference: Acts 18:9
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ κύριος ⸂ἐν νυκτὶ δι’ ὁράματος⸃ τῷ Παύλῳ· Μὴ φοβοῦ, ἀλλὰ λάλει καὶ
    μὴ σιωπήσῃς,
translation:
  text: And the Lord said to Paul in the night through a vision, “Do not be afraid,
    but keep speaking and do not be silent,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a vision.” The Greek phrase literally says “through a vision.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines and defaults to
    'Lord.' In Acts, with the article and in revelatory speech to Paul, it most naturally
    refers to the risen Jesus as 'the Lord,' not merely 'master.'
- source_word: ἐν νυκτὶ
  chosen: in the night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: The phrase is temporal. 'In the night' is slightly more formal and preserves
    the Greek prepositional structure while remaining natural English.
- source_word: δι’ ὁράματος
  chosen: through a vision
  alternatives:
  - in a vision
  - by a vision
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through
    a vision' best reflects the Greek construction, while 'in a vision' is possible
    but less explicit about means.
- source_word: Μὴ φοβοῦ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: BDAG
  rationale: Present middle/passive imperative with μή naturally conveys a prohibition
    of fear. 'Do not be afraid' is idiomatic modern English and preserves the force
    without archaism.
- source_word: ἀλλὰ λάλει
  chosen: but keep speaking
  alternatives:
  - but speak
  - but go on speaking
  lexicon: BDAG
  rationale: The present imperative λάλει suggests ongoing or continued action. 'Keep
    speaking' captures the imperfective force better than the simple 'speak.'
- source_word: καὶ μὴ σιωπήσῃς
  chosen: and do not be silent
  alternatives:
  - and do not keep silent
  - and do not fall silent
  lexicon: BDAG
  rationale: The aorist subjunctive with μή in prohibition can be rendered naturally
    as 'do not be silent.' In coordination with the previous present imperative, the
    English preserves the paired exhortation without overcomplicating aspect.
