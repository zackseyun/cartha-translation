theological_decisions:
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In this clause Χριστός is articular and predicative in a proclamation
    to Jews, making the titular, messianic sense explicit. The translation therefore
    uses 'Messiah' in keeping with the project's default for title usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
