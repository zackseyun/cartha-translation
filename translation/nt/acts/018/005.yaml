id: ACT.18.5
reference: Acts 18:5
source:
  edition: SBLGNT
  text: Ὡς δὲ κατῆλθον ἀπὸ τῆς Μακεδονίας ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος, συνείχετο τῷ
    ⸀λόγῳ ὁ Παῦλος, διαμαρτυρόμενος τοῖς Ἰουδαίοις ⸀εἶναι τὸν χριστὸν Ἰησοῦν.
translation:
  text: But when Silas and Timothy came down from Macedonia, Paul was occupied with
    the word, solemnly testifying to the Jews that Jesus is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was constrained by the word' or 'was engrossed in the message.' The
      Greek verb can suggest being taken up with, pressed by, or devoted to something.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ.' Here the term is a title, so 'Messiah' is used to preserve
      the messianic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: Marks a transition with temporal force. 'But when' preserves both the
    connective δέ and the temporal sense of ὡς in smooth English.
- source_word: κατῆλθον ἀπὸ τῆς Μακεδονίας
  chosen: came down from Macedonia
  alternatives:
  - returned from Macedonia
  - came from Macedonia
  lexicon: BDAG
  rationale: κατέρχομαι commonly means 'come down.' Even if geographically relative,
    Luke often preserves travel idiom; 'came down from Macedonia' is natural and sufficiently
    literal.
- source_word: ὅ τε Σιλᾶς καὶ ὁ Τιμόθεος
  chosen: Silas and Timothy
  alternatives:
  - both Silas and Timothy
  lexicon: BDAG
  rationale: The correlative construction with τε ... καί emphasizes the pair, but
    standard English can convey this without awkwardness. The simpler rendering is
    readable while retaining the joint subject.
- source_word: συνείχετο
  chosen: was occupied
  alternatives:
  - was constrained
  - was engrossed
  - was devoted
  lexicon: BDAG
  rationale: The imperfect middle/passive of συνέχω here conveys being taken up with
    or pressed by something. 'Was occupied' fits the context of intensified ministry
    activity without overinterpreting the cause. 'Was constrained' is possible but
    can sound psychologically or spiritually loaded beyond the immediate syntax.
- source_word: τῷ λόγῳ
  chosen: with the word
  alternatives:
  - by the word
  - in the message
  lexicon: BDAG
  rationale: The dative likely expresses the sphere/object with which Paul was occupied.
    'The word' is a common Lucan shorthand for the gospel message and preserves the
    source term λόγος more transparently than paraphrastic 'message.'
- source_word: διαμαρτυρόμενος
  chosen: solemnly testifying
  alternatives:
  - earnestly testifying
  - solemnly bearing witness
  - insisting
  lexicon: BDAG
  rationale: διαμαρτύρομαι carries the sense of emphatic or solemn testimony. 'Solemnly
    testifying' preserves both the witness language and the heightened force.
- source_word: τοῖς Ἰουδαίοις
  chosen: to the Jews
  alternatives:
  - to the Jewish people
  - to the Judeans
  lexicon: BDAG
  rationale: In Acts, Ἰουδαῖοι commonly refers to Jews as an ethnoreligious group
    rather than specifically Judeans. 'To the Jews' is the most direct contextual
    rendering.
- source_word: εἶναι τὸν χριστὸν Ἰησοῦν
  chosen: that Jesus is the Messiah
  alternatives:
  - that Jesus is the Christ
  - that the Messiah is Jesus
  lexicon: BDAG
  rationale: Χριστός here functions clearly as a title, not a name-like form, so per
    doctrine it is translated 'Messiah.' The clause means Paul testified that Jesus
    is the promised Messiah.
