id: ACT.18.22
reference: Acts 18:22
source:
  edition: SBLGNT
  text: καὶ κατελθὼν εἰς Καισάρειαν, ἀναβὰς καὶ ἀσπασάμενος τὴν ἐκκλησίαν, κατέβη
    εἰς Ἀντιόχειαν,
translation:
  text: And after going down to Caesarea, he went up and greeted the church, then
    went down to Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely the church in Jerusalem; many translations make Jerusalem
      explicit here, but it is not named in the Greek text.
    reason: alternative_reading
lexical_decisions:
- source_word: κατελθὼν
  chosen: after going down
  alternatives:
  - having gone down
  - after arriving
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb.
    'Going down' preserves Luke's travel/topographical language better than the more
    interpretive 'arriving.'
- source_word: Καισάρειαν
  chosen: Caesarea
  alternatives:
  - Caesarea Maritima
  lexicon: BDAG
  rationale: Standard English transliteration of the place name. The shorter form
    is natural in running text; the specific coastal Caesarea is contextually understood.
- source_word: ἀναβὰς
  chosen: he went up
  alternatives:
  - having gone up
  - went up to Jerusalem
  lexicon: BDAG
  rationale: The participle is retained with its directional sense. Although many
    interpreters understand this as going up to Jerusalem from Caesarea, Jerusalem
    is not stated explicitly in the Greek, so the translation should not import it
    into the main text.
- source_word: ἀσπασάμενος
  chosen: greeted
  alternatives:
  - welcomed
  - visited
  lexicon: BDAG
  rationale: The verb commonly means to greet or welcome. 'Greeted' is the most direct
    and least interpretive rendering in this travel narrative context.
- source_word: τὴν ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: '''Church'' is the standard contextual rendering for ἐκκλησία in Acts
    when referring to the Christian community. ''Assembly'' is more literal but less
    idiomatic here.'
- source_word: κατέβη
  chosen: went down
  alternatives:
  - came down
  - traveled down
  lexicon: BDAG
  rationale: Preserves the directional/topographical wording of the Greek and matches
    Luke's travel style.
- source_word: Ἀντιόχειαν
  chosen: Antioch
  alternatives:
  - Antioch of Syria
  lexicon: BDAG
  rationale: Standard English transliteration. In Acts 18 the referent is the Syrian
    Antioch associated with Paul's mission base, but the shorter form is sufficient
    in the main text.
