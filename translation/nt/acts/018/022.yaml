theological_decisions:
- issue: Whether to identify the implied destination of 'he went up' as Jerusalem
  chosen_reading: Leave the destination implicit in the main text
  alternative_readings:
  - Explicitly render 'he went up to Jerusalem'
  rationale: The sequence 'went down to Caesarea, went up and greeted the church,
    went down to Antioch' strongly suggests a visit to Jerusalem, since 'going up'
    and greeting 'the church' fit Jerusalem well. However, the Greek text does not
    name Jerusalem explicitly. Following original-language primacy and avoiding unwarranted
    expansion, the main text preserves the implication without stating it; the likely
    referent is noted in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
