theological_decisions:
- issue: Scope of λόγος in Gallio's dismissal
  chosen_reading: Rendered generically as 'a word' rather than specifying 'doctrine'
    or 'the message.'
  alternative_readings:
  - a message
  - doctrine
  - teaching
  rationale: The verse concerns Roman refusal to adjudicate an intra-Jewish dispute.
    The text itself does not define λόγος precisely, so the translation preserves
    the ambiguity rather than importing a more specific theological content.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
