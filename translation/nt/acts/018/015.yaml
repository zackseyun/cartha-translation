id: ACT.18.15
reference: Acts 18:15
source:
  edition: SBLGNT
  text: εἰ δὲ ⸀ζητήματά ἐστιν περὶ λόγου καὶ ὀνομάτων καὶ νόμου τοῦ καθ’ ὑμᾶς, ὄψεσθε
    αὐτοί· ⸀κριτὴς ἐγὼ τούτων οὐ βούλομαι εἶναι.
translation:
  text: But if it is a matter of questions about a word and names and your own law,
    you yourselves will see to it; I do not want to be a judge of these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about a message' or 'about doctrine.' The Greek word λόγος is broad
      and may refer to disputed teaching or terminology.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήματά
  chosen: questions
  alternatives:
  - disputes
  - matters of inquiry
  - controversies
  lexicon: BDAG
  rationale: ζήτημα denotes an issue under dispute or inquiry. 'Questions' preserves
    the somewhat procedural/judicial tone without overinterpreting it as necessarily
    hostile, while fitting the plural predicate construction.
- source_word: περὶ λόγου
  chosen: about a word
  alternatives:
  - about a message
  - about doctrine
  - about an account
  lexicon: BDAG
  rationale: λόγος is broad. Here Gallio appears to dismiss an intra-Jewish dispute
    involving terminology or teaching. 'A word' stays close to the Greek and preserves
    the ambiguity; more interpretive options like 'doctrine' are possible but narrower
    than the source warrants.
- source_word: ὀνομάτων
  chosen: names
  alternatives:
  - titles
  - designations
  lexicon: BDAG
  rationale: The plural likely refers to disputed names/titles within the controversy.
    'Names' is the most direct rendering and leaves the referent open, as in the Greek.
- source_word: νόμου τοῦ καθ’ ὑμᾶς
  chosen: your own law
  alternatives:
  - the law among you
  - the law that concerns you
  - your law
  lexicon: BDAG
  rationale: καθ’ ὑμᾶς marks the law as pertaining to the Jewish parties rather than
    Roman civil jurisdiction. 'Your own law' communicates Gallio's distancing stance
    more naturally in English than a more literal but awkward phrase.
- source_word: ὄψεσθε αὐτοί
  chosen: you yourselves will see to it
  alternatives:
  - see to it yourselves
  - you yourselves must handle it
  - you will see yourselves
  lexicon: BDAG
  rationale: Future middle of ὁράω can function idiomatically as 'see to' or 'take
    care of.' 'You yourselves will see to it' preserves both the future form and the
    emphatic αὐτοί.
- source_word: κριτὴς
  chosen: a judge
  alternatives:
  - judge
  - arbiter
  lexicon: BDAG
  rationale: Anarthrous predicate noun in English is best rendered with the indefinite
    article. 'A judge' fits the legal setting and Gallio's refusal to adjudicate.
- source_word: τούτων
  chosen: of these things
  alternatives:
  - of these matters
  - in these things
  lexicon: BDAG
  rationale: The demonstrative refers back to the disputed issues just mentioned.
    'Of these things' is transparent and sufficiently broad.
- source_word: οὐ βούλομαι εἶναι
  chosen: I do not want to be
  alternatives:
  - I am not willing to be
  - I refuse to be
  lexicon: BDAG
  rationale: βούλομαι expresses volition or willingness. 'Do not want to be' is natural
    modern English and preserves the personal refusal without overstating it as a
    formal legal refusal.
