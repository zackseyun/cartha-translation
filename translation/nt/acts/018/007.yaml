id: ACT.18.7
reference: Acts 18:7
source:
  edition: SBLGNT
  text: καὶ μεταβὰς ἐκεῖθεν ⸀εἰσῆλθεν εἰς οἰκίαν τινὸς ὀνόματι ⸀Τιτίου Ἰούστου σεβομένου
    τὸν θεόν, οὗ ἡ οἰκία ἦν συνομοροῦσα τῇ συναγωγῇ.
translation:
  text: And after leaving there, he entered the house of a man named Titius Justus,
    who worshiped God, whose house was next door to the synagogue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who feared God' or 'a worshiper of God.' The Greek describes a Gentile
      devoted to the God of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or 'was adjoining' or 'shared a boundary with' the synagogue.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταβὰς
  chosen: after leaving
  alternatives:
  - having departed
  - after going away
  lexicon: BDAG
  rationale: Aorist participle of μεταβαίνω, indicating movement away from the previous
    location. 'After leaving' gives natural English while preserving the participial
    sequence before the main verb.
- source_word: ἐκεῖθεν
  chosen: there
  alternatives:
  - from there
  lexicon: BDAG
  rationale: The adverb marks the place departed from. In English, 'after leaving
    there' naturally incorporates the sense of 'from there' without redundancy.
- source_word: εἰσῆλθεν
  chosen: he entered
  alternatives:
  - he went into
  lexicon: BDAG
  rationale: Standard rendering of εἰσέρχομαι. 'Entered' is concise and fits the narrative
    style.
- source_word: οἰκίαν
  chosen: the house
  alternatives:
  - a house
  - the home
  lexicon: BDAG
  rationale: With εἰς plus accusative and followed by the genitive description of
    the owner, 'the house of a man named...' is idiomatic English. 'House' is preferred
    over 'home' because the verse later refers to the building's proximity to the
    synagogue.
- source_word: τινὸς
  chosen: a man
  alternatives:
  - someone
  - a certain man
  lexicon: BDAG
  rationale: Indefinite pronoun in the genitive modifying 'house.' 'A man' is natural
    English; 'a certain man' is more formal but less idiomatic here.
- source_word: ὀνόματι Τιτίου Ἰούστου
  chosen: named Titius Justus
  alternatives:
  - by the name of Titius Justus
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ὀνόματι plus proper name. Personal names
    are transliterated per project philosophy.
- source_word: σεβομένου τὸν θεόν
  chosen: who worshiped God
  alternatives:
  - who feared God
  - a worshiper of God
  - who revered God
  lexicon: BDAG
  rationale: Present middle participle of σέβομαι commonly describes a Gentile adherent
    who worships Israel's God. 'Who worshiped God' is clear and natural in context;
    'God-fearer' would import a semi-technical label not explicit in the Greek.
- source_word: οὗ
  chosen: whose
  alternatives:
  - of whom
  lexicon: BDAG
  rationale: Genitive relative pronoun linking Titius Justus to his house. 'Whose'
    is the most natural English equivalent.
- source_word: συνομοροῦσα
  chosen: was next door to
  alternatives:
  - was adjoining
  - was adjacent to
  - shared a boundary with
  lexicon: BDAG
  rationale: The participle denotes being contiguous or sharing a border. 'Was next
    door to' communicates the spatial relationship clearly in modern English, while
    remaining faithful to the sense.
- source_word: συναγωγῇ
  chosen: the synagogue
  lexicon: BDAG
  rationale: Standard rendering of συναγωγή in this narrative context.
