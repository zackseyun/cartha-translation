theological_decisions:
- issue: Description of Titius Justus as σεβόμενος τὸν θεόν
  chosen_reading: Rendered descriptively as 'who worshiped God' rather than as the
    quasi-technical label 'God-fearer.'
  alternative_readings:
  - who feared God
  - a God-fearer
  rationale: The Greek participle clearly indicates devotion to the God of Israel,
    but the verse itself does not require the more technical socioreligious category
    as the main text. A descriptive rendering preserves meaning without over-specifying.
  doctrine_reference: Translation philosophy §§1, 6
