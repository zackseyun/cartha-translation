id: ACT.18.19
reference: Acts 18:19
source:
  edition: SBLGNT
  text: ⸀κατήντησαν δὲ εἰς Ἔφεσον, κἀκείνους κατέλιπεν αὐτοῦ, αὐτὸς δὲ εἰσελθὼν εἰς
    τὴν συναγωγὴν ⸀διελέξατο τοῖς Ἰουδαίοις.
translation:
  text: They came to Ephesus, and he left them there; but he himself entered into
    the synagogue and reasoned with the Jews.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrived at Ephesus.'
    reason: lexical_alternative
  - marker: b
    text: That is, he left his companions there, namely Priscilla and Aquila from
      the previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'discussed with' or 'dialogued with.' The Greek suggests reasoned conversation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατήντησαν
  chosen: came
  alternatives:
  - arrived
  - reached
  lexicon: BDAG
  rationale: The verb denotes arriving at or reaching a destination. 'Came to Ephesus'
    is natural modern English and fits the narrative flow without over-translating.
- source_word: δὲ
  chosen: and / but
  alternatives:
  - now
  - then
  lexicon: BDAG
  rationale: δέ is mildly connective or contrastive. The first instance is carried
    by 'and' to continue the narrative; the second marks contrast between Paul's action
    and the others remaining behind, so 'but' is appropriate.
- source_word: κἀκείνους
  chosen: them
  alternatives:
  - those people
  - Priscilla and Aquila
  lexicon: BDAG
  rationale: The crasis means 'and those' and refers back to Paul's companions from
    the previous verse. English naturally uses the pronoun 'them'; specifying names
    would import information from context into the verse itself.
- source_word: κατέλιπεν
  chosen: left
  alternatives:
  - left behind
  - departed from
  lexicon: BDAG
  rationale: The verb means to leave behind or leave in a place. 'Left them there'
    captures both the action and the local sense supplied by αὐτοῦ.
- source_word: αὐτοῦ
  chosen: there
  alternatives:
  - in that place
  - at Ephesus
  lexicon: BDAG
  rationale: 'This adverbial genitive indicates location: ''there.'' Rendering it
    explicitly avoids awkward literalism and clarifies that he left them in Ephesus.'
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - Paul himself
  lexicon: BDAG
  rationale: The pronoun is emphatic, contrasting Paul's personal action with leaving
    the others behind. 'He himself' preserves that emphasis without adding the proper
    name.
- source_word: εἰσελθὼν
  chosen: entered into
  alternatives:
  - went into
  - having entered
  lexicon: BDAG
  rationale: The participle is contemporaneous/background action leading into the
    main verb. 'Entered into' is idiomatic and preserves the movement into the synagogue.
- source_word: συναγωγήν
  chosen: synagogue
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In this Jewish setting the institutional and physical sense is best rendered
    'synagogue.'
- source_word: διελέξατο
  chosen: reasoned with
  alternatives:
  - discussed with
  - dialogued with
  - argued with
  lexicon: BDAG
  rationale: διαλέγομαι in Acts often denotes reasoned discourse in a synagogue or
    public setting. 'Reasoned with' preserves the deliberative sense better than the
    flatter 'discussed' and is less adversarial than 'argued.'
- source_word: τοῖς Ἰουδαίοις
  chosen: the Jews
  alternatives:
  - the Jewish people
  - the Jewish leaders
  lexicon: BDAG
  rationale: The phrase is the standard ethnic-religious designation in Acts. 'The
    Jews' is the most direct rendering; 'leaders' would be too narrow, and 'Jewish
    people' is less precise to the Greek form here.
