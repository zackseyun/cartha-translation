id: ACT.18.14
reference: Acts 18:14
source:
  edition: SBLGNT
  text: μέλλοντος δὲ τοῦ Παύλου ἀνοίγειν τὸ στόμα εἶπεν ὁ Γαλλίων πρὸς τοὺς Ἰουδαίους·
    Εἰ ⸀μὲν ἦν ἀδίκημά τι ἢ ῥᾳδιούργημα πονηρόν, ὦ Ἰουδαῖοι, κατὰ λόγον ἂν ἀνεσχόμην
    ὑμῶν·
translation:
  text: But as Paul was about to open his mouth, Gallio said to the Jews, “If it were
    some wrongdoing or a serious crime, O Jews, I would have reason to put up with
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as Paul was about to speak.” The Greek literally says “to open the mouth,”
      an idiom for beginning to speak.
    reason: lexical_alternative
  - marker: b
    text: Or “a wicked crime” or “a malicious offense.” The Greek phrase combines
      a term for criminal misconduct with an adjective meaning “evil” or “wicked.”
    reason: lexical_alternative
  - marker: c
    text: Or “I would reasonably bear with you.” The expression means Gallio would
      have good reason to tolerate hearing their complaint if it concerned an actual
      civil wrong or crime.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλοντος ... ἀνοίγειν τὸ στόμα
  chosen: as Paul was about to open his mouth
  alternatives:
  - when Paul was about to speak
  - as Paul was about to speak
  lexicon: BDAG
  rationale: The genitive absolute with μέλλω + infinitive indicates imminence. 'Open
    his mouth' preserves the idiom of the Greek, while still sounding natural in English;
    'speak' is a viable dynamic alternative but less transparent to the source wording.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: 'δέ here marks narrative transition with mild contrast: Paul is about
    to respond, but Gallio interrupts first. ''But'' best captures that turn.'
- source_word: Γαλλίων
  chosen: Gallio
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: πρὸς τοὺς Ἰουδαίους
  chosen: to the Jews
  alternatives:
  - to the Jewish accusers
  lexicon: BDAG
  rationale: The phrase is straightforwardly directional/speech-oriented. 'The Jews'
    reflects the Greek wording; the narrower interpretive gloss 'Jewish accusers'
    is contextually true but adds specificity not present in the text.
- source_word: Εἰ μὲν ἦν
  chosen: If it were
  alternatives:
  - If indeed it were
  - If this were
  lexicon: BDAG
  rationale: This introduces a conditional premise. The particle μέν is lightly represented
    in English by the conditional setup without forcing an awkward 'indeed'.
- source_word: ἀδίκημά τι
  chosen: some wrongdoing
  alternatives:
  - some injustice
  - some offense
  lexicon: BDAG
  rationale: ἀδίκημα denotes a wrong, offense, or legal wrongdoing. 'Wrongdoing' is
    broad enough to fit Gallio's judicial framing without over-specifying the offense.
- source_word: ῥᾳδιούργημα πονηρόν
  chosen: a serious crime
  alternatives:
  - a wicked villainy
  - a malicious crime
  - some evil misdemeanor
  lexicon: BDAG
  rationale: The phrase denotes a morally bad criminal act. 'Serious crime' communicates
    the legal and moral force in clear modern English. More literal options like 'wicked
    villainy' are archaic or unnatural.
- source_word: ὦ Ἰουδαῖοι
  chosen: O Jews
  alternatives:
  - Jews
  lexicon: BDAG
  rationale: The vocative particle ὦ is retained with 'O' to reflect direct address
    and the rhetorical tone. Although somewhat formal in English, it is brief and
    transparent.
- source_word: κατὰ λόγον
  chosen: have reason to
  alternatives:
  - reasonably
  - according to reason
  - with good reason
  lexicon: BDAG
  rationale: The idiom means 'with reason' or 'justifiably.' In this sentence, 'I
    would have reason to' fits idiomatic English and connects naturally to Gallio's
    willingness to hear the case.
- source_word: ἀνεσχόμην ὑμῶν
  chosen: put up with you
  alternatives:
  - bear with you
  - hear your case patiently
  lexicon: BDAG
  rationale: ἀνέχομαι can mean endure, bear with, or put up with. In context Gallio
    means he would tolerate listening to their complaint if it involved an actual
    crime. 'Put up with you' preserves his dismissive tone. 'Bear with you' is possible
    but less colloquial; 'hear your case patiently' is interpretive.
