theological_decisions:
- issue: Attachment of διὰ τῆς χάριτος
  chosen_reading: The phrase modifies 'those who had believed,' yielding 'those who
    had believed through grace.'
  alternative_readings:
  - The phrase modifies Apollos's help, yielding 'he greatly helped through grace
    those who had believed.'
  rationale: Both syntactically and contextually, the phrase most naturally qualifies
    the believers' coming to faith rather than the manner of Apollos's assistance.
    This preserves Luke's emphasis on divine grace in conversion without excluding
    that Apollos's ministry was also graciously enabled.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine; here the main text adopts the more natural reading and the alternative
    is preserved in a footnote.
