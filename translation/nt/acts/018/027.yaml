id: ACT.18.27
reference: Acts 18:27
source:
  edition: SBLGNT
  text: βουλομένου δὲ αὐτοῦ διελθεῖν εἰς τὴν Ἀχαΐαν προτρεψάμενοι οἱ ἀδελφοὶ ἔγραψαν
    τοῖς μαθηταῖς ἀποδέξασθαι αὐτόν· ὃς παραγενόμενος συνεβάλετο πολὺ τοῖς πεπιστευκόσιν
    διὰ τῆς χάριτος·
translation:
  text: And when he wanted to go across to Achaia, the brothers encouraged him and
    wrote to the disciples to welcome him. When he arrived, he greatly helped those
    who had believed through grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he greatly helped through grace those who had believed.' The Greek
      phrase 'through grace' may be taken with Apollos's help rather than with the
      believers' having believed.
    reason: alternative_reading
  - marker: b
    text: '''The brothers'' may refer to the wider community of believers, including
      women, though the Greek uses the masculine form.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλομένου ... αὐτοῦ
  chosen: when he wanted
  alternatives:
  - as he desired
  - since he wanted
  - when he intended
  lexicon: BDAG
  rationale: The genitive absolute introduces a circumstantial clause about Apollos's
    intention. 'When he wanted' is natural modern English and preserves the voluntive
    sense without overformal wording.
- source_word: διελθεῖν εἰς τὴν Ἀχαΐαν
  chosen: to go across to Achaia
  alternatives:
  - to pass over into Achaia
  - to go to Achaia
  lexicon: BDAG
  rationale: διέρχομαι here likely carries the sense of crossing from Ephesus to the
    region of Achaia. 'Go across' preserves the travel nuance better than the flatter
    'go,' while remaining readable.
- source_word: προτρεψάμενοι
  chosen: encouraged him
  alternatives:
  - urged him
  - exhorted him
  lexicon: BDAG
  rationale: The participle indicates the brothers' supportive urging. 'Encouraged
    him' fits the positive context and contemporary English better than the more formal
    'exhorted,' while 'urged' can sound stronger than the context requires.
- source_word: οἱ ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Per gender-accurate policy, the masculine plural is retained as 'brothers.'
    In early Christian usage it may include the wider believing community, but the
    translation preserves the source form rather than neutralizing it.
- source_word: ἔγραψαν τοῖς μαθηταῖς
  chosen: wrote to the disciples
  alternatives:
  - wrote to the believers
  - sent a letter to the disciples
  lexicon: BDAG
  rationale: γράφω with dative is straightforwardly 'wrote to.' μαθηταῖς is best kept
    as 'disciples,' a standard and accurate term in Acts.
- source_word: ἀποδέξασθαι αὐτόν
  chosen: to welcome him
  alternatives:
  - to receive him
  - to accept him
  lexicon: BDAG
  rationale: ἀποδέχομαι in this context refers to receiving Apollos favorably. 'Welcome
    him' communicates the hospitable force more idiomatically than the more wooden
    'receive him.'
- source_word: ὃς παραγενόμενος
  chosen: When he arrived
  alternatives:
  - who, when he came
  - and after arriving
  lexicon: BDAG
  rationale: The relative pronoun plus participle resumes Apollos and introduces the
    next action. 'When he arrived' is smooth English that preserves the temporal sense.
- source_word: συνεβάλετο πολὺ
  chosen: greatly helped
  alternatives:
  - contributed much
  - was of great assistance
  - helped greatly
  lexicon: BDAG
  rationale: In context, συμβάλλω in the middle conveys substantial assistance or
    benefit. 'Greatly helped' is clear and idiomatic, and fits the following dative
    of persons benefited.
- source_word: τοῖς πεπιστευκόσιν
  chosen: those who had believed
  alternatives:
  - those who believed
  - the believers
  lexicon: BDAG
  rationale: The perfect participle points to a settled prior coming-to-faith. 'Those
    who had believed' preserves that aspect better than the simpler 'believers,' though
    the latter is possible.
- source_word: διὰ τῆς χάριτος
  chosen: through grace
  alternatives:
  - by grace
  - through the grace of God
  lexicon: BDAG
  rationale: The phrase most naturally modifies 'had believed,' indicating the means
    by which they came to faith. 'Through grace' is concise and preserves the Greek
    wording without adding 'of God,' which is not explicit in the text.
