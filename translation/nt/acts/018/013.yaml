id: ACT.18.13
reference: Acts 18:13
source:
  edition: SBLGNT
  text: λέγοντες ὅτι Παρὰ τὸν νόμον ⸂ἀναπείθει οὗτος⸃ τοὺς ἀνθρώπους σέβεσθαι τὸν
    θεόν.
translation:
  text: saying, “This man is persuading people to worship God contrary to the law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against the law” or “in violation of the law.”
    reason: lexical_alternative
  - marker: b
    text: The accusers likely mean the Jewish law, though the Greek simply says “the
      law.”
    reason: cultural_note
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - saying that
  - declaring
  lexicon: BDAG
  rationale: Present participle introducing the content of the accusation; 'saying'
    is natural and sufficiently formal in English.
- source_word: ὅτι
  chosen: “... ”
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct content of speech. In English, punctuation can naturally
    represent ὅτι after a speech participle.
- source_word: Παρὰ τὸν νόμον
  chosen: contrary to the law
  alternatives:
  - against the law
  - in violation of the law
  lexicon: BDAG
  rationale: παρά with the accusative here conveys contrariness or violation. 'Contrary
    to the law' is idiomatic and preserves the forensic tone of the accusation.
- source_word: ἀναπείθει
  chosen: is persuading
  alternatives:
  - persuades
  - is winning over
  - is misleading
  lexicon: BDAG
  rationale: The present tense can be rendered as progressive in English in reported
    accusation. 'Persuading' reflects the lexical sense of influencing or winning
    over without importing the stronger negative sense 'misleading,' which the Greek
    itself does not require.
- source_word: οὗτος
  chosen: This man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: Demonstrative used somewhat pointedly in an accusation. 'This man' preserves
    the deictic force without becoming overly colloquial or pejorative.
- source_word: τοὺς ἀνθρώπους
  chosen: people
  alternatives:
  - men
  - the people
  lexicon: BDAG
  rationale: Although grammatically masculine, ἄνθρωποι here is generic for human
    beings. 'People' accurately conveys the representative sense in natural English.
- source_word: σέβεσθαι τὸν θεόν
  chosen: to worship God
  alternatives:
  - to revere God
  - to honor God religiously
  lexicon: BDAG
  rationale: σέβομαι in this context refers to religious devotion or worship. 'Worship
    God' is the clearest modern English equivalent and fits the legal-religious accusation.
- source_word: τὸν νόμον
  chosen: the law
  alternatives:
  - our law
  - the Jewish law
  lexicon: BDAG
  rationale: The Greek simply says 'the law.' In context the speakers mean the Jewish
    law, but the text does not explicitly add 'our' or 'Jewish,' so the translation
    remains restrained.
