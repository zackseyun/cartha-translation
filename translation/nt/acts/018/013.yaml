theological_decisions:
- issue: Referent of 'the law' in the accusation
  chosen_reading: Retain the generic phrase 'the law' without specifying 'Jewish law'
    in the main text.
  alternative_readings:
  - the Jewish law
  - our law
  rationale: The accusers almost certainly refer to Jewish law, but the Greek text
    itself leaves it as τὸν νόμον. To avoid importing explanatory material into the
    translation, the main text preserves the source wording; contextual specificity
    can be noted in a footnote.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering generic ἀνθρώπους
  chosen_reading: people
  alternative_readings:
  - men
  rationale: 'This follows the gender-accurate principle: the masculine plural here
    is generic rather than male-specific. ''People'' preserves the source intent more
    accurately in contemporary English.'
  doctrine_reference: Translation philosophy §4
