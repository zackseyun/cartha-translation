id: ACT.18.4
reference: Acts 18:4
source:
  edition: SBLGNT
  text: διελέγετο δὲ ἐν τῇ συναγωγῇ κατὰ πᾶν σάββατον, ἔπειθέν τε Ἰουδαίους καὶ Ἕλληνας.
translation:
  text: And he was reasoning in the synagogue every Sabbath, and trying to persuade
    Jews and Greeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was discussing' or 'was debating.' The Greek verb can denote reasoned
      dialogue or argument.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''was persuading.'' The imperfect verb may emphasize ongoing effort:
      ''was trying to persuade.'''
    reason: lexical_alternative
  - marker: c
    text: That is, Greeks associated with the synagogue; some understand this more
      broadly as 'Gentiles.'
    reason: alternative_reading
lexical_decisions:
- source_word: διελέγετο
  chosen: was reasoning
  alternatives:
  - was discussing
  - was debating
  - was dialoguing
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing/repeated activity. 'Was reasoning'
    captures Paul's argumentative, persuasive discourse in synagogue settings better
    than the more generic 'was discussing' and is more natural English than 'was dialoguing.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'And' gives a natural English transition.
- source_word: ἐν τῇ συναγωγῇ
  chosen: in the synagogue
  alternatives:
  - at the synagogue
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is straightforwardly locative. 'In
    the synagogue' is the most direct rendering.
- source_word: κατὰ πᾶν σάββατον
  chosen: every Sabbath
  alternatives:
  - on every Sabbath
  - Sabbath after Sabbath
  lexicon: BDAG
  rationale: The distributive sense of κατά with πᾶν is well conveyed by 'every Sabbath.'
    This preserves the repeated customary action indicated by the imperfect verb.
- source_word: ἔπειθέν
  chosen: trying to persuade
  alternatives:
  - persuading
  - seeking to convince
  - was convincing
  lexicon: BDAG
  rationale: The imperfect portrays ongoing effort, not necessarily completed success.
    'Trying to persuade' best reflects the iterative/incomplete nuance in idiomatic
    English better than the potentially overstrong 'was convincing.'
- source_word: τε
  chosen: and
  alternatives:
  - both
  - also
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: τε links this clause smoothly with what precedes. In English, simple
    'and' best represents the connective force without awkwardness.
- source_word: Ἰουδαίους
  chosen: Jews
  alternatives:
  - Jewish people
  - Judeans
  lexicon: BDAG
  rationale: In Acts, Ἰουδαῖος commonly denotes Jews as an ethnoreligious group rather
    than specifically residents of Judea. 'Jews' is the standard and clearest rendering
    here.
- source_word: Ἕλληνας
  chosen: Greeks
  alternatives:
  - Gentiles
  - Greek people
  lexicon: BDAG
  rationale: Ἕλληνες in this synagogue context most naturally refers to Greeks/Greek-speaking
    Gentiles associated with the synagogue. The text specifically says 'Greeks,' so
    that should be preserved rather than generalized to 'Gentiles.'
