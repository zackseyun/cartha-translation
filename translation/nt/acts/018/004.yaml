theological_decisions:
- issue: Identity of Ἕλληνας in synagogue context
  chosen_reading: Rendered as 'Greeks' without narrowing further.
  alternative_readings:
  - Gentiles
  - God-fearing Greeks
  rationale: The verse itself identifies the second group as Ἕλληνες. While these
    may have been Gentiles associated with the synagogue, the text does not explicitly
    specify 'God-fearers,' so the translation preserves the lexical form 'Greeks'
    and avoids importing a more specific social-religious category.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; original-language primacy over translation tradition.'
