id: ACT.18.25
reference: Acts 18:25
source:
  edition: SBLGNT
  text: οὗτος ἦν κατηχημένος τὴν ὁδὸν τοῦ κυρίου, καὶ ζέων τῷ πνεύματι ἐλάλει καὶ
    ἐδίδασκεν ἀκριβῶς τὰ περὶ τοῦ ⸀Ἰησοῦ, ἐπιστάμενος μόνον τὸ βάπτισμα Ἰωάννου.
translation:
  text: This man had been instructed in the way of the Lord, and being fervent in
    spirit, he was speaking and teaching accurately the things concerning Jesus, though
    he knew only the baptism of John.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'fervent in the Spirit,' which may be understood as a reference to the
      Holy Spirit rather than to Apollos's own spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: κατηχημένος
  chosen: had been instructed
  alternatives:
  - had been taught
  - had been catechized
  lexicon: BDAG
  rationale: Perfect passive participle indicates a prior completed process with continuing
    result. 'Had been instructed' is natural modern English and preserves the sense
    of received oral teaching without importing later technical ecclesial overtones
    as strongly as 'catechized,' though that is a possible gloss.
- source_word: τὴν ὁδὸν τοῦ κυρίου
  chosen: the way of the Lord
  alternatives:
  - the Lord's way
  - the way of the Master
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the early Christian idiom of 'the
    way' while keeping κύριος as 'Lord' per doctrine defaults. 'The Lord's way' is
    possible but less transparent to the Greek expression.
- source_word: ζέων τῷ πνεύματι
  chosen: being fervent in spirit
  alternatives:
  - burning in spirit
  - fervent in the Spirit
  lexicon: BDAG
  rationale: ζέων conveys boiling/burning zeal. 'Fervent' gives idiomatic English
    while retaining intensity. The dative τῷ πνεύματι may be understood as human spirit
    or the Holy Spirit; the lowercase 'spirit' in the main text preserves the likely
    idiomatic sense without over-resolving the ambiguity, while the capitalized alternative
    is preserved in a footnote.
- source_word: ἐλάλει καὶ ἐδίδασκεν
  chosen: he was speaking and teaching
  alternatives:
  - he spoke and taught
  - he was proclaiming and teaching
  lexicon: BDAG
  rationale: The imperfects suggest ongoing customary activity, best reflected by
    'was speaking and teaching.' 'Speaking' is more lexically direct for λαλέω than
    the more interpretive 'proclaiming.'
- source_word: ἀκριβῶς
  chosen: accurately
  alternatives:
  - carefully
  - precisely
  lexicon: BDAG
  rationale: ἀκριβῶς here most naturally describes correctness/precision in his teaching.
    'Accurately' fits both the lexical sense and the narrative contrast with his incomplete
    knowledge.
- source_word: τὰ περὶ τοῦ Ἰησοῦ
  chosen: the things concerning Jesus
  alternatives:
  - the things about Jesus
  - what concerns Jesus
  lexicon: BDAG
  rationale: This preserves the broad object of his teaching without narrowing it.
    'The things concerning Jesus' is slightly formal but clear and close to the Greek.
- source_word: ἐπιστάμενος μόνον τὸ βάπτισμα Ἰωάννου
  chosen: though he knew only the baptism of John
  alternatives:
  - knowing only John's baptism
  - being acquainted only with the baptism of John
  lexicon: BDAG
  rationale: The participial clause is concessive in context, explaining the limitation
    of Apollos's knowledge despite his accurate teaching. 'Though he knew only' makes
    that relation explicit in natural English. 'The baptism of John' is retained rather
    than the more compressed 'John's baptism' to mirror the Greek structure.
