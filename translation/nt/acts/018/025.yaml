theological_decisions:
- issue: Meaning of τῷ πνεύματι in ζέων τῷ πνεύματι
  chosen_reading: human spirit / inward fervor
  alternative_readings:
  - the Holy Spirit
  rationale: The phrase can be read either as Apollos being inwardly fervent or as
    fervent in the Holy Spirit. Since the Greek lacks explicit markers that would
    force capitalization in English, the main text uses 'spirit' to preserve the idiomatic
    sense and avoid asserting more than the text states. The alternative is preserved
    in a footnote to maintain theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
