id: ACT.18.26
reference: Acts 18:26
source:
  edition: SBLGNT
  text: οὗτός τε ἤρξατο παρρησιάζεσθαι ἐν τῇ συναγωγῇ· ἀκούσαντες δὲ αὐτοῦ ⸂Πρίσκιλλα
    καὶ Ἀκύλας⸃ προσελάβοντο αὐτὸν καὶ ἀκριβέστερον αὐτῷ ἐξέθεντο τὴν ⸂ὁδὸν τοῦ θεοῦ⸃.
translation:
  text: And he began to speak boldly in the synagogue. But when Priscilla and Aquila
    heard him, they took him aside and explained the way of God to him more accurately.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they took him with them' or 'they welcomed him.' The Greek verb can
      carry the sense of receiving someone as well as taking someone aside.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός τε
  chosen: And he
  alternatives:
  - Now he
  - And this man
  lexicon: BDAG
  rationale: οὗτος refers back to Apollos in the previous context. English naturally
    uses the pronoun 'he' rather than 'this man.' τέ adds mild connective force, here
    well represented by 'And'.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Aorist middle of ἄρχω with infinitive commonly means 'began to.' 'Began'
    is standard and natural.
- source_word: παρρησιάζεσθαι
  chosen: to speak boldly
  alternatives:
  - to speak freely
  - to speak with boldness
  lexicon: BDAG
  rationale: παρρησιάζομαι denotes open, confident, bold speech. 'Speak boldly' is
    idiomatic modern English and preserves the sense of courageous public proclamation.
- source_word: ἐν τῇ συναγωγῇ
  chosen: in the synagogue
  lexicon: BDAG
  rationale: Straightforward locative phrase; 'synagogue' is the established and accurate
    rendering.
- source_word: ἀκούσαντες δὲ αὐτοῦ
  chosen: But when ... heard him
  alternatives:
  - and after hearing him
  - when they heard him
  lexicon: BDAG
  rationale: The participle ἀκούσαντες is temporal in context. δέ marks a mild development/contrast,
    represented by 'But.' The genitive αὐτοῦ after ἀκούω is naturally rendered as
    the object 'him' in English.
- source_word: Πρίσκιλλα καὶ Ἀκύλας
  chosen: Priscilla and Aquila
  alternatives:
  - Prisca and Aquila
  lexicon: BDAG
  rationale: Standard English transliterations of the names. The Greek here uses Πρίσκιλλα,
    so 'Priscilla' is preferred over the shorter Latin form 'Prisca.'
- source_word: προσελάβοντο αὐτὸν
  chosen: they took him aside
  alternatives:
  - they took him with them
  - they welcomed him
  - they received him
  lexicon: BDAG
  rationale: προσλαμβάνομαι can mean take aside/to oneself, receive, or welcome depending
    on context. Here, followed by private instruction, the sense is that they drew
    him aside for further explanation. 'Took him aside' best fits the narrative flow
    without implying hostility.
- source_word: ἀκριβέστερον
  chosen: more accurately
  alternatives:
  - more carefully
  - more precisely
  lexicon: BDAG
  rationale: Comparative adverb indicating greater precision or correctness. 'More
    accurately' best captures the comparative force in relation to Apollos's prior
    understanding.
- source_word: ἐξέθεντο
  chosen: explained
  alternatives:
  - set forth
  - expounded
  lexicon: BDAG
  rationale: ἐκτίθημι in middle voice here means to explain or set forth. 'Explained'
    is clear modern English; 'expounded' is possible but more formal.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  chosen: the way of God
  alternatives:
  - God's way
  - the way of the Lord
  lexicon: BDAG
  rationale: A recognizable early Christian expression for God's saving way/teaching.
    The genitive is best preserved as 'of God' rather than flattened to 'God's way,'
    and the textual reading here is τοῦ θεοῦ, not 'of the Lord.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - for him
  lexicon: BDAG
  rationale: Dative indirect object after ἐξέθεντο is naturally rendered 'to him.'
