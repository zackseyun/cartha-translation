theological_decisions:
- issue: Nature of Priscilla and Aquila's action toward Apollos
  chosen_reading: they took him aside for fuller private instruction
  alternative_readings:
  - they welcomed him
  - they received him into their home/company
  rationale: The verb προσελάβοντο can bear senses of receiving or taking along, but
    in this context the following clause about explaining more accurately suggests
    a private, corrective-yet-supportive conversation rather than merely hospitality.
    The translation avoids implying public rebuke or formal ecclesial authority structures
    not stated in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of 'the way of God'
  chosen_reading: an early Christian expression for God's redemptive way/message,
    explained with greater precision
  alternative_readings:
  - a more general reference to God's moral way
  - a technical label equivalent to the full Christian faith
  rationale: The phrase likely refers to the Christian message/path as Apollos knew
    it only partially, but the translation keeps the wording broad enough to preserve
    the text's own expression without over-specifying doctrinal content.
  doctrine_reference: Preserve theological tension rather than resolve it.
