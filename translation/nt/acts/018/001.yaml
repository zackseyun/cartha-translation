id: ACT.18.1
reference: Acts 18:1
source:
  edition: SBLGNT
  text: ⸀Μετὰ ταῦτα ⸀χωρισθεὶς ἐκ τῶν Ἀθηνῶν ἦλθεν εἰς Κόρινθον.
translation:
  text: After this, he left Athens and went to Corinth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'After these things, having departed from Athens, he
      came to Corinth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After this
  alternatives:
  - After these things
  - Afterward
  lexicon: BDAG
  rationale: A common temporal transition in narrative. 'After this' is natural modern
    English while preserving the sequence indicated by the Greek.
- source_word: χωρισθεὶς
  chosen: he left
  alternatives:
  - having departed
  - having separated himself
  - after leaving
  lexicon: BDAG
  rationale: The aorist passive participle of χωρίζω here functions idiomatically
    for departure from a place. 'He left' communicates the sense clearly in English
    without forcing an awkward passive ('having been separated').
- source_word: ἐκ τῶν Ἀθηνῶν
  chosen: Athens
  alternatives:
  - from Athens
  lexicon: BDAG
  rationale: The preposition ἐκ explicitly means 'from/out of.' In English, with 'left,'
    the source location is naturally expressed as the direct object ('left Athens')
    rather than 'left from Athens,' preserving the same meaning idiomatically.
- source_word: ἦλθεν
  chosen: went
  alternatives:
  - came
  lexicon: BDAG
  rationale: Although ἔρχομαι often means 'come,' in narrative movement from the speaker's
    standpoint English normally uses 'went' for travel to another city. This is an
    idiomatic adjustment consistent with optimal equivalence.
- source_word: εἰς Κόρινθον
  chosen: to Corinth
  alternatives:
  - into Corinth
  lexicon: BDAG
  rationale: εἰς marks movement toward/into a place. 'To Corinth' is the standard
    natural rendering for travel between cities.
