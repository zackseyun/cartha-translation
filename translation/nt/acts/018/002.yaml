theological_decisions:
- issue: Rendering of Ἰουδαῖον / Ἰουδαίους
  chosen_reading: Jew / Jews
  alternative_readings:
  - Judean / Judeans
  rationale: In this context the reference is to the Jewish people living in Rome
    under Claudius's order, not merely residents of Judea. 'Jew(s)' best captures
    the ethnic-religious sense in English.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
