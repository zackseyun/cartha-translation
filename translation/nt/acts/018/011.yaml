id: ACT.18.11
reference: Acts 18:11
source:
  edition: SBLGNT
  text: ἐκάθισεν ⸀δὲ ἐνιαυτὸν καὶ μῆνας ἓξ διδάσκων ἐν αὐτοῖς τὸν λόγον τοῦ θεοῦ.
translation:
  text: So he stayed there a year and six months, teaching the word of God among them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάθισεν
  chosen: stayed there
  alternatives:
  - sat
  - settled
  - remained
  lexicon: BDAG
  rationale: Although the verb literally means 'sat' or 'sat down,' in this narrative
    context it idiomatically refers to remaining or staying in a place for a period
    of time. 'Stayed there' gives the natural English sense while preserving the temporal
    force of the aorist narrative verb.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ is a mild connective. 'So' fits the flow from the preceding divine
    encouragement and resulting action, without overstating contrast. It is more natural
    in English narrative than a bare 'and' here.
- source_word: ἐνιαυτὸν καὶ μῆνας ἓξ
  chosen: a year and six months
  alternatives:
  - a year and six more months
  - one year and six months
  lexicon: BDAG
  rationale: This is the straightforward accusative of duration. 'A year and six months'
    is idiomatic modern English and accurately reflects the time span.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - while teaching
  - as he taught
  lexicon: BDAG
  rationale: The present participle expresses attendant or contemporaneous action
    during his stay. 'Teaching' is concise and preserves the ongoing sense without
    overtranslating.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - with them
  - in their midst
  lexicon: BDAG
  rationale: The preposition ἐν with the dative pronoun here is best taken in a locative/social
    sense. 'Among them' communicates Paul's activity within the community more naturally
    than the more literal but less idiomatic 'in them'.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: λόγος in Acts often refers to the proclaimed message from God. 'The word
    of God' preserves the established biblical expression and its theological resonance,
    while remaining understandable in modern English.
