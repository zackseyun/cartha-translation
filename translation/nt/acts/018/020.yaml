id: ACT.18.20
reference: Acts 18:20
source:
  edition: SBLGNT
  text: ἐρωτώντων δὲ αὐτῶν ἐπὶ πλείονα χρόνον ⸀μεῖναι οὐκ ἐπένευσεν,
translation:
  text: But when they asked him to stay for a longer time, he did not consent,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he did not agree' or 'he declined.' The Greek verb means to assent or
      consent to a request.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρωτώντων
  chosen: when they asked
  alternatives:
  - while they were asking
  - as they were requesting
  lexicon: BDAG
  rationale: Genitive absolute with present participle, naturally rendered as a temporal
    clause in English. 'Asked' is idiomatic and fits the context of a request made
    to Paul.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous verse; 'But' best
    reflects the narrative turn that, despite their positive reception, he declined
    their request.
- source_word: αὐτῶν
  chosen: they / him
  alternatives:
  - them / him
  lexicon: BDAG
  rationale: In the genitive absolute, αὐτῶν refers to the people at Ephesus making
    the request. English requires explicit subject/object resolution from context,
    yielding 'they asked him.'
- source_word: ἐπὶ πλείονα χρόνον
  chosen: for a longer time
  alternatives:
  - for more time
  - for a greater length of time
  lexicon: BDAG
  rationale: Idiomatic expression meaning an extended period. 'For a longer time'
    is natural modern English and preserves the comparative sense of πλείονα.
- source_word: μεῖναι
  chosen: to stay
  alternatives:
  - to remain
  lexicon: BDAG
  rationale: Aorist infinitive complement to the request. 'Stay' is more natural in
    contemporary English than 'remain' in this travel narrative context.
- source_word: οὐκ ἐπένευσεν
  chosen: he did not consent
  alternatives:
  - he did not agree
  - he refused
  lexicon: BDAG
  rationale: ἐπινεύω here means to assent or consent to a request. 'Did not consent'
    is slightly more formal than 'did not agree' and avoids the stronger nuance of
    outright refusal that 'refused' may suggest.
