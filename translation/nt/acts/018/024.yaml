id: ACT.18.24
reference: Acts 18:24
source:
  edition: SBLGNT
  text: Ἰουδαῖος δέ τις Ἀπολλῶς ὀνόματι, Ἀλεξανδρεὺς τῷ γένει, ἀνὴρ λόγιος, κατήντησεν
    εἰς Ἔφεσον, δυνατὸς ὢν ἐν ταῖς γραφαῖς.
translation:
  text: Now a certain Jew named Apollos, an Alexandrian by birth, an eloquent man,
    arrived in Ephesus, being mighty in the Scriptures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'learned man' for 'eloquent man'; the Greek λόγιος can describe either
      eloquence or learning.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰουδαῖος
  chosen: Jew
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Acts this term can mean either ethnic-religious 'Jew' or geographic
    'Judean.' Here it identifies Apollos ethnically/religiously rather than geographically,
    so 'Jew' best fits the context.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ marks a narrative transition. 'Now' gives natural English discourse
    flow without implying strong contrast.
- source_word: τις
  chosen: a certain
  alternatives:
  - a
  - someone
  lexicon: BDAG
  rationale: τις introduces a new participant with slight indefiniteness. 'A certain'
    preserves that nuance better than a bare article.
- source_word: Ἀπολλῶς ὀνόματι
  chosen: named Apollos
  alternatives:
  - Apollos by name
  lexicon: BDAG
  rationale: This is the standard idiom for introducing a person's name. 'Named Apollos'
    is idiomatic modern English while remaining close to the Greek.
- source_word: Ἀλεξανδρεὺς τῷ γένει
  chosen: an Alexandrian by birth
  alternatives:
  - an Alexandrian by race
  - a native of Alexandria
  lexicon: BDAG
  rationale: The phrase denotes origin/descent. 'By birth' communicates native origin
    naturally in English without the potentially misleading modern connotations of
    'race.'
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun is explicitly masculine singular and refers to Apollos as an
    individual male. Per gender-accurate policy, 'man' should be retained.
- source_word: λόγιος
  chosen: eloquent
  alternatives:
  - learned
  - well-spoken
  lexicon: BDAG
  rationale: λόγιος can mean learned or eloquent. In this context, especially alongside
    'mighty in the Scriptures,' either is possible. 'Eloquent' is a common and contextually
    fitting rendering, while the alternative sense is preserved in a footnote.
- source_word: κατήντησεν
  chosen: arrived
  alternatives:
  - came
  - came to
  lexicon: BDAG
  rationale: The verb here denotes reaching a destination. 'Arrived' is concise and
    natural with the following destination phrase.
- source_word: εἰς Ἔφεσον
  chosen: in Ephesus
  alternatives:
  - to Ephesus
  lexicon: BDAG
  rationale: With 'arrived,' English idiom prefers 'arrived in Ephesus,' though the
    Greek preposition is literally 'to/into.' This is a natural optimal-equivalence
    rendering.
- source_word: δυνατὸς ὢν
  chosen: being mighty
  alternatives:
  - being competent
  - being powerful
  - being well-versed
  lexicon: BDAG
  rationale: The participial phrase describes Apollos's capability. 'Mighty' preserves
    the strength of δυνατός and echoes established biblical diction without becoming
    archaic in this context.
- source_word: ἐν ταῖς γραφαῖς
  chosen: in the Scriptures
  alternatives:
  - in the writings
  lexicon: BDAG
  rationale: In this Jewish setting γραφαί refers to the sacred Scriptures, not merely
    writings in general. The capitalized 'Scriptures' reflects that recognized referent.
