id: ACT.18.12
reference: Acts 18:12
source:
  edition: SBLGNT
  text: Γαλλίωνος δὲ ⸂ἀνθυπάτου ὄντος⸃ τῆς Ἀχαΐας κατεπέστησαν ⸂ὁμοθυμαδὸν οἱ Ἰουδαῖοι⸃
    τῷ Παύλῳ καὶ ἤγαγον αὐτὸν ἐπὶ τὸ βῆμα,
translation:
  text: But while Gallio was proconsul of Achaia, the Jews rose up together against
    Paul and brought him before the tribunal,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the Jews'; here this refers to the local Jewish group acting against
      Paul, not to all Jewish people universally.
    reason: cultural_note
  - marker: b
    text: Or 'to the judgment seat.' The Greek term refers to the official judicial
      bench or tribunal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γαλλίωνος
  chosen: Gallio
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, following
    the philosophy to transliterate names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a narrative development with mild contrast or transition. 'But'
    fits the shift to a new circumstance and ensuing opposition better than a simple
    'and.'
- source_word: ἀνθυπάτου ὄντος
  chosen: while ... was proconsul
  alternatives:
  - when ... was proconsul
  - during the proconsulship of
  lexicon: BDAG
  rationale: Genitive absolute expressing the temporal setting. 'While Gallio was
    proconsul' is natural English and preserves the temporal force without over-literalism.
- source_word: ἀνθύπατος
  chosen: proconsul
  alternatives:
  - governor
  lexicon: BDAG
  rationale: Specific Roman provincial title; 'proconsul' is more precise than the
    generic 'governor' and suits the historical setting of Achaia.
- source_word: Ἀχαΐας
  chosen: Achaia
  lexicon: BDAG
  rationale: Standard transliteration of the Roman province name.
- source_word: κατεπέστησαν
  chosen: rose up against
  alternatives:
  - made a united attack on
  - stood against
  - set upon
  lexicon: BDAG
  rationale: The verb here conveys hostile action taken against Paul. 'Rose up against'
    is idiomatic, preserves the adversative force, and avoids overstating physical
    violence beyond what the text explicitly says.
- source_word: ὁμοθυμαδὸν
  chosen: together
  alternatives:
  - with one accord
  - unanimously
  lexicon: BDAG
  rationale: Conveys united action. 'Together' is clear modern English; 'with one
    accord' is traditional but less natural today. The sense of concerted action is
    preserved.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek explicitly says 'the Jews.' In Acts this often refers to a
    particular local Jewish group opposing Paul, not all Jewish people universally;
    however, the text here does not specify leaders only, so the direct rendering
    is retained.
- source_word: τῷ Παύλῳ
  chosen: against Paul
  alternatives:
  - to Paul
  lexicon: BDAG
  rationale: With κατεπέστησαν the dative functions as the object of hostile action;
    English requires 'against Paul' to express the relation clearly.
- source_word: ἤγαγον αὐτὸν
  chosen: brought him
  alternatives:
  - led him
  - dragged him
  lexicon: BDAG
  rationale: ἄγω commonly means 'lead' or 'bring.' 'Brought him' fits the legal setting
    and does not import the harsher nuance of 'dragged,' which the text does not explicitly
    state here.
- source_word: ἐπὶ τὸ βῆμα
  chosen: before the tribunal
  alternatives:
  - to the judgment seat
  - before the judgment seat
  lexicon: BDAG
  rationale: βῆμα in this context refers to the official judicial platform or court
    seat. 'Before the tribunal' communicates the legal setting in accessible modern
    English, while preserving the judicial sense more clearly for contemporary readers
    than the traditional 'judgment seat.'
