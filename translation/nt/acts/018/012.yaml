theological_decisions:
- issue: Rendering οἱ Ἰουδαῖοι in a conflict narrative
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The text's plain wording is 'the Jews,' and the translation should not
    narrow the referent beyond the Greek. At the same time, because modern readers
    may overgeneralize this phrase ethnically or religiously, a footnote clarifies
    that Luke refers here to a local group acting against Paul, not to all Jewish
    people without exception.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    claims the text does not make.'
