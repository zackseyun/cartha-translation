id: ACT.18.28
reference: Acts 18:28
source:
  edition: SBLGNT
  text: εὐτόνως γὰρ τοῖς Ἰουδαίοις διακατηλέγχετο δημοσίᾳ ἐπιδεικνὺς διὰ τῶν γραφῶν
    εἶναι τὸν χριστὸν Ἰησοῦν.
translation:
  text: For he powerfully refuted the Jews in public, demonstrating through the Scriptures
    that Jesus is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that the Messiah is Jesus.' The Greek infinitive clause may be represented
      with either English word order.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the Christ'; here rendered 'the Messiah' because the term functions
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐτόνως
  chosen: powerfully
  alternatives:
  - vigorously
  - forcefully
  lexicon: BDAG
  rationale: The adverb conveys intensity and effectiveness. 'Powerfully' is natural
    modern English and captures more than mere energy; it suggests persuasive force
    in Apollos's argumentation.
- source_word: διακατηλέγχετο
  chosen: refuted
  alternatives:
  - confuted
  - proved wrong
  - argued convincingly against
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing action of thoroughly disproving
    or refuting opponents. 'Refuted' best captures the adversarial and evidential
    sense without archaic wording. The imperfect force is conveyed at the clause level
    rather than by an English progressive.
- source_word: τοῖς Ἰουδαίοις
  chosen: the Jews
  alternatives:
  - the Jewish people
  - the Jewish opponents
  lexicon: BDAG
  rationale: This is the direct rendering of the dative phrase. In Acts, Ἰουδαῖοι
    can be ethnic or group-designating depending on context; here it refers to the
    Jewish interlocutors/opponents in the synagogue setting. 'The Jews' preserves
    the Greek wording most directly.
- source_word: δημοσίᾳ
  chosen: in public
  alternatives:
  - publicly
  lexicon: BDAG
  rationale: The dative adverbial form indicates the public setting of the refutation.
    'In public' is slightly more idiomatic here in English and clearly modifies the
    action's setting.
- source_word: ἐπιδεικνὺς
  chosen: demonstrating
  alternatives:
  - proving
  - showing
  lexicon: BDAG
  rationale: The participle explains the means by which he refuted them. 'Demonstrating'
    preserves the evidential, reasoned character of the action and fits the argumentative
    context.
- source_word: διὰ τῶν γραφῶν
  chosen: through the Scriptures
  alternatives:
  - from the Scriptures
  - by means of the Scriptures
  lexicon: BDAG
  rationale: διά with the genitive expresses means or instrumentality. 'Through the
    Scriptures' communicates that the Scriptures were the means by which Apollos made
    his case.
- source_word: τὸν χριστὸν
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title. Here it is clearly titular in the proposition that Jesus is the promised
    anointed one.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἰησοῦς.
- source_word: εἶναι τὸν χριστὸν Ἰησοῦν
  chosen: that Jesus is the Messiah
  alternatives:
  - that the Messiah is Jesus
  lexicon: BDAG
  rationale: The infinitival clause can be represented in English either way. 'That
    Jesus is the Messiah' is the more natural English order and reflects the evangelistic
    thrust of identifying Jesus as the promised Messiah.
