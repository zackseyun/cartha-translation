id: ACT.18.8
reference: Acts 18:8
source:
  edition: SBLGNT
  text: Κρίσπος δὲ ὁ ἀρχισυνάγωγος ἐπίστευσεν τῷ κυρίῳ σὺν ὅλῳ τῷ οἴκῳ αὐτοῦ, καὶ
    πολλοὶ τῶν Κορινθίων ἀκούοντες ἐπίστευον καὶ ἐβαπτίζοντο.
translation:
  text: But Crispus, the synagogue ruler, believed in the Lord together with his whole
    household, and many of the Corinthians, hearing, were believing and were being
    baptized.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'many of the Corinthians, when they heard, believed
      and were baptized.' The Greek uses present/imperfect forms that portray the
      response as unfolding.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κρίσπος
  chosen: Crispus
  lexicon: BDAG
  rationale: Proper personal name; transliterated by standard English convention per
    translation philosophy.
- source_word: ἀρχισυνάγωγος
  chosen: synagogue ruler
  alternatives:
  - leader of the synagogue
  - synagogue official
  lexicon: BDAG
  rationale: Denotes the leading official of a synagogue. 'Synagogue ruler' is concise,
    natural, and preserves the role without overinterpreting administrative specifics.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - came to faith
  - put his faith
  lexicon: BDAG
  rationale: Aorist indicative marking Crispus's act of believing. 'Believed' is the
    most direct rendering and avoids adding interpretive nuance beyond the Greek.
- source_word: τῷ κυρίῳ
  chosen: in the Lord
  alternatives:
  - the Lord
  - on the Lord
  lexicon: BDAG
  rationale: With πιστεύω plus dative, English idiom is commonly 'believe in.' κύριος
    is rendered 'Lord' per doctrinal default. This likely refers to the Lord Jesus
    in Acts' narrative context, but the translation keeps the Greek title as given.
- source_word: σὺν ὅλῳ τῷ οἴκῳ αὐτοῦ
  chosen: together with his whole household
  alternatives:
  - with all his household
  - along with his entire house
  lexicon: BDAG
  rationale: σύν indicates accompaniment; οἶκος here refers to household rather than
    physical house. 'Whole household' preserves ὅλος and the social/familial sense
    of οἶκος.
- source_word: πολλοὶ τῶν Κορινθίων
  chosen: many of the Corinthians
  alternatives:
  - many Corinthians
  lexicon: BDAG
  rationale: Partitive genitive is naturally represented by 'many of the Corinthians,'
    preserving the sense that many among the Corinthian population responded.
- source_word: ἀκούοντες
  chosen: hearing
  alternatives:
  - when they heard
  - upon hearing
  lexicon: BDAG
  rationale: Present participle, contemporaneous with the following imperfects. 'Hearing'
    preserves the participial form and leaves the object implied from context.
- source_word: ἐπίστευον
  chosen: were believing
  alternatives:
  - believed
  - came to believe
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or repeated response among many
    Corinthians. 'Were believing' preserves the imperfective aspect better than a
    simple past, even if slightly less idiomatic.
- source_word: ἐβαπτίζοντο
  chosen: were being baptized
  alternatives:
  - were baptized
  lexicon: BDAG
  rationale: Imperfect passive indicates an ongoing process and passive reception
    of baptism. 'Were being baptized' preserves both aspect and voice.
