theological_decisions:
- issue: Scope of household belief in 'together with his whole household'
  chosen_reading: Render the phrase straightforwardly without specifying whether every
    individual exercised personal faith in the same manner or whether the phrase is
    a household summary.
  alternative_readings:
  - Every member of the household personally believed
  - The household is described corporately without detailing each individual's response
  rationale: The Greek states that Crispus believed 'with his whole household' but
    does not unpack the mechanics of household participation. To avoid importing denominational
    conclusions about household faith or baptism, the translation preserves the wording
    without explanatory expansion.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Referent of 'the Lord'
  chosen_reading: Translate κύριος as 'Lord' without expanding to 'the Lord Jesus'
    in the main text.
  alternative_readings:
  - the Lord Jesus
  rationale: In Acts the referent is contextually Jesus, but the Greek text here reads
    simply τῷ κυρίῳ. The translation follows original-language primacy and the contested-terms
    default for κύριος.
  doctrine_reference: 'Contested terms: κύριος → Lord'
