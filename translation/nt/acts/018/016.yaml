id: ACT.18.16
reference: Acts 18:16
source:
  edition: SBLGNT
  text: καὶ ἀπήλασεν αὐτοὺς ἀπὸ τοῦ βήματος.
translation:
  text: And he drove them away from the judgment seat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tribunal' or 'bench'; the Greek βῆμα refers to the official judicial
      seat or court platform.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήλασεν
  chosen: drove ... away
  alternatives:
  - dismissed
  - expelled
  - sent away
  lexicon: BDAG
  rationale: The aorist of ἀπελαύνω denotes forcible removal or driving away. 'Drove
    ... away' preserves the physical, authoritative action better than the softer
    'dismissed,' while remaining natural English.
- source_word: αὐτοὺς
  chosen: them
  alternatives:
  - those men
  lexicon: BDAG
  rationale: The pronoun refers back to the accusers/parties before Gallio. 'Them'
    is the natural English equivalent and leaves the referent appropriately contextual
    rather than over-specifying.
- source_word: βήματος
  chosen: judgment seat
  alternatives:
  - tribunal
  - bench
  lexicon: BDAG
  rationale: βῆμα in this judicial context refers to the official tribunal or magistrate's
    seat. 'Judgment seat' is a clear and established rendering that preserves the
    legal setting more explicitly than the broader 'bench.'
- source_word: ἀπὸ τοῦ βήματος
  chosen: from the judgment seat
  alternatives:
  - from the tribunal
  - away from the bench
  lexicon: BDAG
  rationale: The prepositional phrase marks removal from the area of judicial hearing.
    'From the judgment seat' communicates that Gallio expelled them from his court
    setting, not merely from his personal presence.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: καί here continues the narrative straightforwardly. 'And' preserves the
    simple connective force without adding interpretive nuance.
