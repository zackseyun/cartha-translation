id: ACT.18.23
reference: Acts 18:23
source:
  edition: SBLGNT
  text: καὶ ποιήσας χρόνον τινὰ ἐξῆλθεν, διερχόμενος καθεξῆς τὴν Γαλατικὴν χώραν καὶ
    Φρυγίαν, ⸀στηρίζων πάντας τοὺς μαθητάς.
translation:
  text: And after spending some time there, he departed and traveled from place to
    place through the Galatian region and Phrygia, strengthening all the disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'passing through in sequence' or 'traveling successively through' the
      Galatian region and Phrygia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσας χρόνον τινά
  chosen: after spending some time there
  alternatives:
  - after making some stay
  - after spending some time
  lexicon: BDAG
  rationale: The idiom ποιέω + χρόνον means to spend or pass time. English 'spending
    some time' is natural and accurate. 'There' is supplied from context because the
    participial idiom implies a stay in the previously mentioned location, and this
    is standard English completion rather than unwarranted paraphrase.
- source_word: ἐξῆλθεν
  chosen: he departed
  alternatives:
  - he went out
  - he left
  lexicon: BDAG
  rationale: Although literally 'went out,' in travel narrative this commonly means
    departure from a place. 'He departed' fits idiomatic English and the narrative
    context of beginning a journey.
- source_word: διερχόμενος
  chosen: traveled
  alternatives:
  - passing through
  - going through
  lexicon: BDAG
  rationale: The participle describes ongoing movement through regions. 'Traveled'
    gives clear modern English while preserving the sense of journeying through an
    area. The more formal 'passing through' is possible but less natural in this sentence.
- source_word: καθεξῆς
  chosen: from place to place
  alternatives:
  - in order
  - successively
  - one after another
  lexicon: BDAG
  rationale: Here καθεξῆς modifies the route/progression of travel, indicating sequential
    movement through the area. 'From place to place' communicates the iterative, successive
    sense in idiomatic English better than the wooden 'in order.'
- source_word: τὴν Γαλατικὴν χώραν
  chosen: the Galatian region
  alternatives:
  - the region of Galatia
  - the Galatic territory
  lexicon: BDAG
  rationale: χώρα is region/country/territory. 'The Galatian region' is concise and
    natural. It preserves that the text refers to a broader area, not necessarily
    only the Roman province as a technical term.
- source_word: καὶ Φρυγίαν
  chosen: and Phrygia
  alternatives:
  - and the region of Phrygia
  lexicon: BDAG
  rationale: The proper name is best transliterated. Since χώρα most naturally governs
    both place names in sense, English can simply render the second as 'and Phrygia'
    without repeating 'region.'
- source_word: στηρίζων
  chosen: strengthening
  alternatives:
  - establishing
  - encouraging
  lexicon: BDAG
  rationale: στηρίζω often means strengthen, establish, or make firm. In this discipleship
    context, 'strengthening' best captures the ongoing pastoral support without over-specifying
    doctrinal establishment.
- source_word: πάντας τοὺς μαθητάς
  chosen: all the disciples
  alternatives:
  - all the learners
  - every one of the disciples
  lexicon: BDAG
  rationale: μαθηταί in Acts is the established term for Jesus' followers. 'Disciples'
    is the standard and clearest rendering. πάντας is preserved by 'all.'
