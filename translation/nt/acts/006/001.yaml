theological_decisions:
- issue: Ethnic/social group labels Ἑλληνισταί and Ἑβραῖοι
  chosen_reading: Retain the labels as 'Hellenists' and 'Hebrews' in the main text,
    with explanatory footnote.
  alternative_readings:
  - Greek-speaking Jews and Hebrew-speaking Jews
  rationale: This is not a doctrinally contested term, but it is interpretively significant.
    Keeping the labels in the text avoids collapsing a first-century intra-Jewish
    distinction into a paraphrase, while the footnote supplies the likely linguistic-cultural
    sense for clarity.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve ambiguity where the source uses group labels.'
