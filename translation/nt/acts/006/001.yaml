id: ACT.6.1
reference: Acts 6:1
source:
  edition: SBLGNT
  text: Ἐν δὲ ταῖς ἡμέραις ταύταις πληθυνόντων τῶν μαθητῶν ἐγένετο γογγυσμὸς τῶν Ἑλληνιστῶν
    πρὸς τοὺς Ἑβραίους ὅτι παρεθεωροῦντο ἐν τῇ διακονίᾳ τῇ καθημερινῇ αἱ χῆραι αὐτῶν.
translation:
  text: Now in those days, as the disciples were increasing in number, a complaint
    arose from the Hellenists against the Hebrews, because their widows were being
    overlooked in the daily distribution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely Greek-speaking Jews, in contrast to the 'Hebrews,' likely
      Aramaic- or Hebrew-speaking Jews.
    reason: cultural_note
  - marker: b
    text: Or 'were being neglected' in the daily service/ministry.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ ταῖς ἡμέραις ταύταις
  chosen: Now in those days
  alternatives:
  - In those days
  - At that time
  lexicon: BDAG
  rationale: Retains the temporal setting and the mild discourse-transition force
    of δέ. 'Now' reflects narrative progression without overstating contrast.
- source_word: πληθυνόντων τῶν μαθητῶν
  chosen: as the disciples were increasing in number
  alternatives:
  - when the disciples were multiplying
  - with the disciples increasing
  lexicon: BDAG
  rationale: The genitive absolute gives background circumstance. 'Increasing in number'
    is idiomatic modern English and preserves the sense of numerical growth conveyed
    by πληθύνω.
- source_word: ἐγένετο γογγυσμός
  chosen: a complaint arose
  alternatives:
  - there arose a grumbling
  - a murmuring occurred
  lexicon: BDAG
  rationale: γογγυσμός can denote murmuring or complaint. 'Complaint arose' is natural
    English and fits the concrete grievance that follows, while still reflecting the
    emergence of discontent.
- source_word: τῶν Ἑλληνιστῶν
  chosen: the Hellenists
  alternatives:
  - the Greek-speaking Jews
  - the Grecian Jews
  lexicon: BDAG
  rationale: Transliterating preserves the historically specific group designation
    without over-interpreting it in the main text. A footnote preserves the likely
    sense 'Greek-speaking Jews.'
- source_word: πρὸς τοὺς Ἑβραίους
  chosen: against the Hebrews
  alternatives:
  - toward the Hebrews
  - against the Hebrew-speaking Jews
  lexicon: BDAG
  rationale: πρός here marks the direction/target of the complaint. 'Against' best
    conveys the adversative social tension in context. 'Hebrews' is retained as the
    group label parallel to 'Hellenists.'
- source_word: παρεθεωροῦντο
  chosen: were being overlooked
  alternatives:
  - were being neglected
  - were being passed over
  lexicon: BDAG
  rationale: The imperfect passive indicates an ongoing situation. 'Overlooked' captures
    the sense of being disregarded in the process without requiring a stronger claim
    of intentional mistreatment; 'neglected' is viable and preserved in a footnote
    as a lexical alternative.
- source_word: ἐν τῇ διακονίᾳ τῇ καθημερινῇ
  chosen: in the daily distribution
  alternatives:
  - in the daily service
  - in the daily ministry
  lexicon: BDAG
  rationale: διακονία is broad ('service/ministry'), but here the context of widows
    and material provision in the following verses favors 'distribution' as the specific
    expression of that service. 'Daily' renders καθημερινῇ straightforwardly.
- source_word: αἱ χῆραι αὐτῶν
  chosen: their widows
  alternatives:
  - the widows among them
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the Hellenists, so 'their widows'
    preserves the possessive relationship and the social complaint being voiced.
