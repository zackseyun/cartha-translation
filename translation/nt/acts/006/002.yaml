theological_decisions:
- issue: Nature of apostolic priority in relation to practical service
  chosen_reading: Render the statement as a matter of propriety and calling ('It is
    not right for us to abandon the word of God to serve tables') rather than as a
    denigration of service work.
  alternative_readings:
  - It is not pleasing for us...
  - It is not desirable for us...
  rationale: The verse contrasts responsibilities, not spiritual value. The translation
    should preserve the apostles' prioritization of the ministry of the word without
    implying that table service is inferior in dignity.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
