id: ACT.6.2
reference: Acts 6:2
source:
  edition: SBLGNT
  text: προσκαλεσάμενοι δὲ οἱ δώδεκα τὸ πλῆθος τῶν μαθητῶν εἶπαν· Οὐκ ἀρεστόν ἐστιν
    ἡμᾶς καταλείψαντας τὸν λόγον τοῦ θεοῦ διακονεῖν τραπέζαις·
translation:
  text: So the Twelve called together the whole group of the disciples and said, “It
    is not right for us to abandon the word of God to serve tables.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the full number of the disciples” or “the multitude of the disciples.”
    reason: lexical_alternative
  - marker: b
    text: Or “It is not fitting” or “It is not acceptable for us.”
    reason: lexical_alternative
  - marker: c
    text: That is, to handle the practical distribution associated with the community’s
      meals and resources.
    reason: cultural_note
lexical_decisions:
- source_word: προσκαλεσάμενοι
  chosen: called together
  alternatives:
  - summoned
  - called to themselves
  lexicon: BDAG
  rationale: Aorist middle participle introducing the main action; 'called together'
    is natural English and preserves the sense of convening an assembly.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative development rather than strong contrast; 'So'
    conveys progression from the prior complaint to the apostles' response.
- source_word: οἱ δώδεκα
  chosen: the Twelve
  alternatives:
  - the twelve apostles
  lexicon: BDAG
  rationale: This is the established designation for the apostolic group. 'The Twelve'
    is concise and reflects the Greek directly without adding 'apostles,' which is
    not explicit here.
- source_word: τὸ πλῆθος τῶν μαθητῶν
  chosen: the whole group of the disciples
  alternatives:
  - the multitude of the disciples
  - the full number of the disciples
  lexicon: BDAG
  rationale: πλῆθος denotes a large body or whole assembly. 'Whole group' is readable
    modern English and avoids the slightly archaic 'multitude' while preserving collective
    force.
- source_word: Οὐκ ἀρεστόν ἐστιν
  chosen: It is not right
  alternatives:
  - It is not pleasing
  - It is not acceptable
  - It is not fitting
  lexicon: BDAG
  rationale: ἀρεστόν can mean pleasing/acceptable, but in this context it expresses
    propriety regarding apostolic priorities. 'It is not right' communicates that
    sense idiomatically.
- source_word: ἡμᾶς καταλείψαντας
  chosen: for us to abandon
  alternatives:
  - for us to leave
  - for us to neglect
  lexicon: BDAG
  rationale: The accusative with infinitive construction is best rendered idiomatically
    in English. καταλείπω here means to leave behind or abandon; 'abandon' captures
    the seriousness without overstating.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard and transparent rendering. In Acts, λόγος often refers to
    the proclaimed message from God; 'the word of God' preserves both the theological
    resonance and the likely preaching/teaching sense.
- source_word: διακονεῖν
  chosen: to serve
  alternatives:
  - to minister
  lexicon: BDAG
  rationale: The infinitive denotes practical service. 'Serve' is the plain, modern
    equivalent and avoids importing later ecclesiastical nuance into 'minister.'
- source_word: τραπέζαις
  chosen: tables
  alternatives:
  - at tables
  - distribution tables
  lexicon: BDAG
  rationale: A literal rendering is best. In context it likely refers to table service
    or management of food/resources, but the Greek simply says 'tables,' and the context
    supplies the practical meaning.
