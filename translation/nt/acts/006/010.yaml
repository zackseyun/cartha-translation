id: ACT.6.10
reference: Acts 6:10
source:
  edition: SBLGNT
  text: καὶ οὐκ ἴσχυον ἀντιστῆναι τῇ σοφίᾳ καὶ τῷ πνεύματι ᾧ ἐλάλει.
translation:
  text: And they were not able to withstand the wisdom and the Spirit by whom he was
    speaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the spirit by which he was speaking," if πνεύματι is taken as referring
      to Stephen's own spirit rather than the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: ἴσχυον
  chosen: were not able
  alternatives:
  - were not strong enough
  - could not
  lexicon: BDAG
  rationale: The imperfect of ἰσχύω here expresses inability. 'Were not able' is natural
    English and preserves the sense without adding nuance beyond the Greek. 'Could
    not' is possible, but 'were not able' more transparently reflects the verbal idea.
- source_word: ἀντιστῆναι
  chosen: to withstand
  alternatives:
  - to resist
  - to oppose
  lexicon: BDAG
  rationale: ἀνθίστημι in this context means to set oneself against successfully or
    hold one's ground against. 'Withstand' fits the construction with dative objects
    and conveys inability to answer Stephen effectively.
- source_word: σοφίᾳ
  chosen: the wisdom
  alternatives:
  - wisdom
  lexicon: BDAG
  rationale: 'The article is retained in English because the Greek has a specific
    referent: the wisdom evident in Stephen''s speech. English can omit the article,
    but ''the wisdom'' better reflects the marked specificity of the Greek.'
- source_word: πνεύματι
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: Given the immediate context in Acts, where Stephen is described as full
    of the Holy Spirit (Acts 6:5), and the pairing of wisdom with Spirit as the source
    of his speech, the referent is best taken as the Holy Spirit rather than merely
    Stephen's human spirit. Capitalization signals this interpretive judgment in English.
- source_word: ᾧ ἐλάλει
  chosen: by whom he was speaking
  alternatives:
  - with which he was speaking
  - by which he was speaking
  lexicon: BDAG
  rationale: The relative pronoun is dative singular neuter agreeing grammatically
    with πνεύματι, but because the chosen referent is the Holy Spirit, English idiom
    naturally uses personal 'whom.' The dative is rendered instrumentally/associatively
    as 'by whom,' expressing the Spirit as the empowering agent of Stephen's speech.
    'By which' would be more formally tied to the neuter grammatical form but would
    sound impersonal if the Holy Spirit is intended.
- source_word: ἐλάλει
  chosen: he was speaking
  alternatives:
  - he spoke
  lexicon: BDAG
  rationale: The imperfect indicates ongoing speech in the scene. 'He was speaking'
    preserves the progressive aspect better than the simple past.
