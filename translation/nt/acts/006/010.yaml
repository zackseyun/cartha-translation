theological_decisions:
- issue: Whether πνεύματι refers to the Holy Spirit or to Stephen's own spirit
  chosen_reading: the Spirit
  alternative_readings:
  - the spirit
  rationale: Acts repeatedly emphasizes Stephen's fullness of the Holy Spirit, and
    the collocation of wisdom and Spirit as the source of his speech strongly supports
    a reference to the Holy Spirit. This is a contextual-theological judgment rather
    than a purely lexical necessity, so the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguous readings.
