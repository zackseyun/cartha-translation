theological_decisions:
- issue: Whether πνεύματος refers generically to spirit or specifically to the Holy
    Spirit
  chosen_reading: the Spirit
  alternative_readings:
  - spirit
  - the Holy Spirit
  rationale: Given Luke-Acts usage and the pairing with wisdom in a qualification
    for ministry, the referent is best understood as God's Spirit. The main text uses
    'the Spirit' because the Greek does not explicitly include 'holy,' while capitalization
    signals the likely personal divine referent without overtranslating.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
