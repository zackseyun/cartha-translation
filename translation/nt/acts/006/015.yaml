id: ACT.6.15
reference: Acts 6:15
source:
  edition: SBLGNT
  text: καὶ ἀτενίσαντες εἰς αὐτὸν ⸀πάντες οἱ καθεζόμενοι ἐν τῷ συνεδρίῳ εἶδον τὸ πρόσωπον
    αὐτοῦ ὡσεὶ πρόσωπον ἀγγέλου.
translation:
  text: And all who were sitting in the council, fixing their eyes on him, saw his
    face like the face of an angel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sanhedrin.' The Greek word refers to the ruling council.
    reason: cultural_note
lexical_decisions:
- source_word: ἀτενίσαντες
  chosen: fixing their eyes on
  alternatives:
  - looking intently at
  - gazing at
  - staring at
  lexicon: BDAG
  rationale: The participle denotes focused, sustained looking rather than a mere
    glance. 'Fixing their eyes on' preserves the intensity in natural English and
    fits Luke-Acts usage well.
- source_word: πάντες οἱ καθεζόμενοι
  chosen: all who were sitting
  alternatives:
  - all those seated
  - everyone sitting
  lexicon: BDAG
  rationale: This renders both the totality of πάντες and the participial description
    καθεζόμενοι. 'Who were sitting' is slightly more natural in English narrative
    than a more wooden 'those seated,' while preserving the scene.
- source_word: συνεδρίῳ
  chosen: the council
  alternatives:
  - the Sanhedrin
  - the assembly
  lexicon: BDAG
  rationale: συνέδριον can denote the Jewish ruling council. 'The council' translates
    the noun directly without importing a proper-name sense into the main text; 'Sanhedrin'
    is a valid contextual alternative preserved in a footnote as a cultural clarification.
- source_word: πρόσωπον
  chosen: face
  alternatives:
  - countenance
  lexicon: BDAG
  rationale: In this context πρόσωπον refers straightforwardly to Stephen's visible
    face. 'Face' is clear modern English; 'countenance' is more traditional but less
    natural.
- source_word: ὡσεὶ
  chosen: like
  alternatives:
  - as if it were
  - as though it were
  lexicon: BDAG
  rationale: ὡσεὶ marks comparison or resemblance. 'Like' is the most natural concise
    rendering in English.
- source_word: ἀγγέλου
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: BDAG
  rationale: In this narrative setting, ἄγγελος is best understood in its common supernatural
    sense, not merely 'messenger.' The comparison concerns Stephen's appearance, likely
    conveying radiance or heavenly dignity.
