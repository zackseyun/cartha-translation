theological_decisions:
- issue: Nature of the comparison in 'like the face of an angel'
  chosen_reading: A simile describing Stephen's appearance as resembling that of an
    angel, without specifying the exact quality of resemblance.
  alternative_readings:
  - A reference specifically to radiant glory
  - A reference to calm innocence or heavenly authority
  rationale: The Greek states resemblance but does not define whether the likeness
    is brightness, serenity, majesty, or some combination. The translation preserves
    the text's theological tension rather than narrowing it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
