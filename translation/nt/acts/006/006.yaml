id: ACT.6.6
reference: Acts 6:6
source:
  edition: SBLGNT
  text: οὓς ἔστησαν ἐνώπιον τῶν ἀποστόλων, καὶ προσευξάμενοι ἐπέθηκαν αὐτοῖς τὰς χεῖρας.
translation:
  text: They set these men before the apostles, and after praying, they laid their
    hands on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whom they presented before the apostles.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'laid their hands on them' can signify public commissioning or
      blessing; the Greek names the action without further defining its ecclesial
      meaning here.
    reason: cultural_note
lexical_decisions:
- source_word: οὓς
  chosen: these men
  alternatives:
  - whom
  - these
  lexicon: BDAG
  rationale: The relative pronoun refers back to the seven men named in the previous
    verse. Rendering it as 'these men' makes the English natural and explicit while
    preserving the masculine plural referent.
- source_word: ἔστησαν
  chosen: set
  alternatives:
  - placed
  - presented
  - stood
  lexicon: BDAG
  rationale: From ἵστημι in the causative sense, 'set' or 'place.' 'Set ... before'
    is concise and idiomatic in English for presenting persons to an authority.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  - before the presence of
  lexicon: BDAG
  rationale: The preposition indicates being in someone's presence. 'Before' is the
    most natural compact rendering here.
- source_word: ἀποστόλων
  chosen: the apostles
  alternatives:
  - the emissaries
  lexicon: BDAG
  rationale: Although ἀπόστολος can mean 'messenger' or 'emissary,' in Acts this clearly
    denotes the recognized apostolic group. 'Apostles' preserves the established office/title
    without unnecessary paraphrase.
- source_word: προσευξάμενοι
  chosen: after praying
  alternatives:
  - having prayed
  - when they had prayed
  lexicon: BDAG
  rationale: The aorist middle participle is most naturally rendered as antecedent
    action relative to the main verb. 'After praying' communicates the sequence clearly
    in modern English.
- source_word: ἐπέθηκαν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: With χεῖρας, the idiom ἐπιτίθημι τὰς χεῖρας is conventionally and accurately
    rendered 'lay hands on.' 'Laid' preserves the verbal force naturally.
- source_word: αὐτοῖς
  chosen: on them
  alternatives:
  - upon them
  - to them
  lexicon: BDAG
  rationale: In English the dative object with 'laid hands' is idiomatically expressed
    as 'on them.' This reflects the sense of the Greek construction rather than a
    wooden dative rendering.
- source_word: τὰς χεῖρας
  chosen: their hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: Greek often uses the article where English prefers a possessive in body-part
    expressions. 'Their hands' is the natural English equivalent and makes explicit
    that the apostles are the ones performing the action.
