theological_decisions:
- issue: Nature of the hand-laying action
  chosen_reading: Rendered descriptively as 'they laid their hands on them' without
    specifying ordination, commissioning, or impartation.
  alternative_readings:
  - they ordained them
  - they commissioned them
  rationale: The Greek states the physical and ritual action but does not itself define
    its full ecclesial significance. To avoid importing denominational conclusions,
    the translation preserves the act without interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    advocate denominational distinctives unless the Greek unambiguously supports one
    reading.
