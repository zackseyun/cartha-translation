theological_decisions:
- issue: Rendering διακονία in contrast with table service in the immediate context
  chosen_reading: ministry of the word
  alternative_readings:
  - service of the word
  rationale: The same semantic field underlies both practical service and apostolic
    proclamation in Acts 6. Rendering it as 'ministry' here preserves the recognized
    ecclesial sense in English while still reflecting service-oriented work. This
    avoids importing a rigid clergy/laity distinction not explicit in the text, while
    distinguishing the apostles' task from serving tables in the preceding verses.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without importing doctrinal claims.'
