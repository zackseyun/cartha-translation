id: ACT.6.4
reference: Acts 6:4
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ τῇ προσευχῇ καὶ τῇ διακονίᾳ τοῦ λόγου προσκαρτερήσομεν.
translation:
  text: But we will devote ourselves to prayer and to the ministry of the word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'service of the word.' The Greek term can mean either 'service' or 'ministry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: First person plural pronoun, explicit in Greek for emphasis/contrast.
    English 'we' carries the sense naturally; the contrast is further conveyed by
    'But' rather than by adding 'ourselves' in the main text.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the proposed assignment of others to table service
    in the preceding context. 'But' best reflects the adversative force here in readable
    English.
- source_word: τῇ προσευχῇ
  chosen: to prayer
  alternatives:
  - in prayer
  lexicon: BDAG
  rationale: Dative with προσκαρτερέω expresses the sphere/object of devoted persistence.
    'To prayer' fits the English idiom 'devote ourselves to' and preserves the article's
    specificity without awkwardness.
- source_word: διακονίᾳ
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: διακονία can mean service or ministry. Here, in contrast with the practical
    service of tables in the immediate context, 'ministry' appropriately denotes the
    apostles' assigned service in proclamation without denying that it is still service.
- source_word: τοῦ λόγου
  chosen: of the word
  alternatives:
  - of the message
  - of the proclamation
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed word/message of God. 'The word' preserves
    the familiar early Christian idiom and remains understandable in context; alternatives
    are possible but less textually transparent.
- source_word: προσκαρτερήσομεν
  chosen: will devote ourselves
  alternatives:
  - will continue steadfastly
  - will persist
  - will be continually occupied
  lexicon: BDAG
  rationale: Future active indicative of προσκαρτερέω conveys ongoing persistence
    or steadfast devotion. 'Will devote ourselves' is idiomatic modern English and
    captures sustained commitment better than a flatter 'will continue'.
