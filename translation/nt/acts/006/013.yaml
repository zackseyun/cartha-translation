id: ACT.6.13
reference: Acts 6:13
source:
  edition: SBLGNT
  text: ἔστησάν τε μάρτυρας ψευδεῖς λέγοντας· Ὁ ἄνθρωπος οὗτος οὐ παύεται ⸂λαλῶν ῥήματα⸃
    κατὰ τοῦ τόπου τοῦ ⸀ἁγίου καὶ τοῦ νόμου,
translation:
  text: They also set up false witnesses who said, “This man does not stop speaking
    words against this holy place and the law,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy place.' The Greek expression refers specifically to the temple
      in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not cease speaking.'
    reason: lexical_alternative
  - marker: c
    text: Or 'speaking' or 'saying things' against this holy place and the law.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησάν
  chosen: set up
  alternatives:
  - produced
  - presented
  lexicon: BDAG
  rationale: In this legal setting, ἵστημι with μάρτυρας conveys causing witnesses
    to appear or be put forward. 'Set up' captures both presentation and the hostile,
    arranged nature of the action without overparaphrasing.
- source_word: τε
  chosen: also
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: τέ here adds another action in sequence. 'Also' brings out the additive
    force more clearly in English than a bare 'and'.
- source_word: μάρτυρας ψευδεῖς
  chosen: false witnesses
  alternatives:
  - lying witnesses
  lexicon: BDAG
  rationale: This is the standard legal expression for witnesses giving false testimony.
    'False witnesses' is idiomatic and preserves the forensic sense.
- source_word: λέγοντας
  chosen: who said
  alternatives:
  - saying
  lexicon: BDAG
  rationale: A finite relative clause is more natural in English than a participial
    construction here, while preserving the content relation.
- source_word: Ὁ ἄνθρωπος οὗτος
  chosen: This man
  alternatives:
  - This fellow
  - This person
  lexicon: BDAG
  rationale: The phrase is somewhat dismissive in context but not so colloquial as
    'this fellow.' 'This man' is direct and faithful.
- source_word: οὐ παύεται
  chosen: does not stop
  alternatives:
  - does not cease
  - never stops
  lexicon: BDAG
  rationale: Present middle/passive idiomatically means continual persistence. 'Does
    not stop' is clear modern English and preserves the durative force.
- source_word: λαλῶν ῥήματα
  chosen: speaking words
  alternatives:
  - speaking
  - saying things
  lexicon: BDAG
  rationale: The object ῥήματα is explicit in Greek and should be represented. 'Speaking
    words' sounds slightly marked in English, but it preserves the wording and the
    accusatory tone of the charge.
- source_word: κατὰ
  chosen: against
  alternatives:
  - concerning
  - in opposition to
  lexicon: BDAG
  rationale: In this hostile legal accusation, κατά with the genitive clearly means
    opposition directed against the temple and the law.
- source_word: τοῦ τόπου τοῦ ἁγίου
  chosen: this holy place
  alternatives:
  - the holy place
  - this sacred place
  lexicon: BDAG
  rationale: Although the Greek has articles rather than an explicit demonstrative,
    the accusers are referring to the locally salient temple precincts. 'This holy
    place' reflects the deictic force naturally conveyed in the accusation and matches
    common English usage in this context.
- source_word: νόμου
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic law in a Jewish setting. Lowercase 'law'
    keeps the translation readable; the referent is still clear from context.
