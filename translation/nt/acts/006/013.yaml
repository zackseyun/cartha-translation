theological_decisions:
- issue: Reference of 'the holy place' and 'the law'
  chosen_reading: The accusation concerns the Jerusalem temple and the Mosaic law.
  alternative_readings:
  - A more generalized reference to sacred space and legal tradition
  rationale: The immediate narrative context in Acts concerns charges against Stephen
    related to the temple and Moses. The translation preserves the accusers' wording
    without expanding it into a theological claim beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Register of the accusation
  chosen_reading: Retain the hostile legal tone without intensifying it beyond the
    Greek.
  alternative_readings:
  - Use more interpretive wording such as 'blaspheming' or 'slandering'
  rationale: The verse reports the content of false testimony, but the Greek wording
    itself says 'speaking words against,' not a stronger interpretive label. This
    preserves the text's own level of accusation.
  doctrine_reference: Translation philosophy §§1, 3
