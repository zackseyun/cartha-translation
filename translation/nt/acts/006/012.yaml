id: ACT.6.12
reference: Acts 6:12
source:
  edition: SBLGNT
  text: συνεκίνησάν τε τὸν λαὸν καὶ τοὺς πρεσβυτέρους καὶ τοὺς γραμματεῖς, καὶ ἐπιστάντες
    συνήρπασαν αὐτὸν καὶ ἤγαγον εἰς τὸ συνέδριον,
translation:
  text: So they stirred up the people and the elders and the scribes, and coming upon
    him, they seized him and brought him into the Sanhedrin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the council.' The Greek συνέδριον can be rendered more generically,
      but here likely refers specifically to the Jewish ruling council, the Sanhedrin.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεκίνησάν
  chosen: stirred up
  alternatives:
  - agitated
  - incited
  - roused
  lexicon: BDAG
  rationale: The verb συγκινέω here denotes provoking or setting people in motion
    emotionally/socially. 'Stirred up' is idiomatic modern English and preserves the
    causative sense without over-specifying violence. 'Incited' is possible but slightly
    stronger and more juridically loaded than the context requires.
- source_word: τε
  chosen: So
  alternatives:
  - and
  - now
  - — (left untranslated)
  lexicon: BDAG
  rationale: τέ is a mild connective. In English, a simple connective force is best
    represented by a natural discourse link rather than a wooden 'and.' 'So' captures
    narrative continuation and consequence in readable English. The particle is not
    strong enough to require separate emphasis.
- source_word: λαὸν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός commonly means 'people' and in Acts often refers to the public or
    populace. 'The people' is the most direct and least interpretively narrowed rendering.
- source_word: πρεσβυτέρους
  chosen: the elders
  alternatives:
  - the older men
  - the leaders
  lexicon: BDAG
  rationale: In this Jerusalem judicial context, πρεσβύτεροι refers to recognized
    Jewish leaders/elders, not merely older males. 'The elders' is the standard and
    contextually precise rendering.
- source_word: γραμματεῖς
  chosen: the scribes
  alternatives:
  - the teachers of the law
  - the legal experts
  lexicon: BDAG
  rationale: γραμματεῖς literally denotes scribes and in this context refers to the
    recognized scriptural/legal scholars. 'Scribes' preserves the historical term;
    explanatory alternatives are possible but less formally transparent.
- source_word: ἐπιστάντες
  chosen: coming upon him
  alternatives:
  - confronting him suddenly
  - standing over him
  - approaching him
  lexicon: BDAG
  rationale: The aorist participle from ἐφίστημι here suggests sudden approach or
    appearing upon someone. 'Coming upon him' preserves the abruptness without over-paraphrasing.
    It also fits the sequence leading to seizure.
- source_word: συνήρπασαν
  chosen: seized
  alternatives:
  - dragged away
  - snatched
  - grabbed
  lexicon: BDAG
  rationale: συναρπάζω conveys forceful taking hold of someone. 'Seized' is concise,
    natural, and appropriately forceful. 'Dragged away' may overstate the motion component,
    which is not explicit until the following verb.
- source_word: ἤγαγον
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: BDAG
  rationale: ἄγω is a broad verb of leading/bringing. Since the prior verb already
    conveys force, 'brought' gives a clear English sequence without redundancy. 'Led'
    could sound too voluntary in this hostile context.
- source_word: συνέδριον
  chosen: the Sanhedrin
  alternatives:
  - the council
  lexicon: BDAG
  rationale: In Acts, συνέδριον commonly refers to the Jewish ruling council, the
    Sanhedrin. Translating it as 'Sanhedrin' gives historical specificity and is widely
    understood; 'council' is a viable alternative but less precise in this setting.
