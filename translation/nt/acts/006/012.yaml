theological_decisions:
- issue: Rendering συνέδριον
  chosen_reading: the Sanhedrin
  alternative_readings:
  - the council
  rationale: This is primarily a historical/judicial identification rather than a
    doctrinal issue. Given Acts' Jerusalem setting and the involvement of elders and
    scribes, the referent is the Jewish ruling council. Using 'Sanhedrin' avoids flattening
    the institutional specificity.
