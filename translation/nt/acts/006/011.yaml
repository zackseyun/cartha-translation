id: ACT.6.11
reference: Acts 6:11
source:
  edition: SBLGNT
  text: τότε ὑπέβαλον ἄνδρας λέγοντας ὅτι Ἀκηκόαμεν αὐτοῦ λαλοῦντος ῥήματα βλάσφημα
    εἰς Μωϋσῆν καὶ τὸν θεόν·
translation:
  text: Then they secretly induced men to say, “We have heard him speaking blasphemous
    words against Moses and God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they instigated men' or 'they suborned men.' The Greek verb carries
      a covert sense of prompting or inducing.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next action in the narrative.
- source_word: ὑπέβαλον
  chosen: they secretly induced
  alternatives:
  - they instigated
  - they suborned
  - they put forward secretly
  lexicon: BDAG
  rationale: ὑποβάλλω here carries the sense of prompting or instigating covertly,
    not merely 'bringing forward.' 'Secretly induced' captures both the causative
    action and the underhanded nuance in context.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - some men
  lexicon: BDAG
  rationale: Accusative plural of ἀνήρ refers specifically to male persons here, not
    generic people. 'Men' preserves the gendered reference.
- source_word: λέγοντας
  chosen: to say
  alternatives:
  - saying
  lexicon: BDAG
  rationale: 'Participial construction after ὑπέβαλον is rendered idiomatically in
    English as complementary content of the inducement: they induced men ''to say''.'
- source_word: ὅτι
  chosen: “We have heard...
  alternatives:
  - that we have heard...
  lexicon: BDAG
  rationale: Introduces direct reported content. English punctuation with quotation
    marks communicates the content naturally.
- source_word: Ἀκηκόαμεν
  chosen: We have heard
  alternatives:
  - We heard
  lexicon: BDAG
  rationale: Perfect tense suggests a present state resulting from hearing; 'We have
    heard' preserves that force better than simple past.
- source_word: αὐτοῦ λαλοῦντος
  chosen: him speaking
  alternatives:
  - him say
  - him talking
  lexicon: BDAG
  rationale: Genitive absolute-like/report construction after ἀκούω is naturally rendered
    'heard him speaking.' 'Speaking' better reflects λαλέω than the more specific
    'say'.
- source_word: ῥήματα βλάσφημα
  chosen: blasphemous words
  alternatives:
  - blasphemies
  - slanderous words
  lexicon: BDAG
  rationale: The phrase is literally 'blasphemous words.' This preserves the lexical
    form and the charge being made against Stephen.
- source_word: εἰς Μωϋσῆν καὶ τὸν θεόν
  chosen: against Moses and God
  alternatives:
  - concerning Moses and God
  - against Moses and against God
  lexicon: BDAG
  rationale: In this hostile-accusation context, εἰς conveys direction of offense,
    well represented by 'against.' Repeating 'against' in English is unnecessary.
