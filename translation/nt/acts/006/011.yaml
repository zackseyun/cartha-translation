theological_decisions:
- issue: Nature of the accusation against Stephen
  chosen_reading: Render the charge as an accusation of speaking 'blasphemous words
    against Moses and God' without softening or endorsing the accusation.
  alternative_readings:
  - '''slanderous words'' against Moses and God'
  rationale: The narrative reports what false witnesses were induced to say. 'Blasphemous'
    reflects βλάσφημα and preserves the legal-religious force of the accusation, while
    the translation itself does not imply the accusation was true.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
