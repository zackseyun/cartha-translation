theological_decisions:
- issue: Reference of 'this place'
  chosen_reading: Rendered as 'this place' in the main text, leaving the temple reference
    implicit.
  alternative_readings:
  - this temple
  - this sanctuary
  rationale: The Greek says 'this place,' and while the referent is clearly the temple
    area in context, the translation preserves the accusers' exact wording rather
    than interpretively specifying it in the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tone of the accusation against Jesus
  chosen_reading: Preserved the hostile demonstrative in 'this Jesus the Nazarene.'
  alternative_readings:
  - Jesus of Nazareth
  - that Jesus of Nazareth
  rationale: The wording reflects the accusers' disparaging tone without adding commentary.
    This preserves narrative texture and avoids flattening the rhetoric.
  doctrine_reference: Translation philosophy §1, §6
