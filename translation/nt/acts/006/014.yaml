id: ACT.6.14
reference: Acts 6:14
source:
  edition: SBLGNT
  text: ἀκηκόαμεν γὰρ αὐτοῦ λέγοντος ὅτι Ἰησοῦς ὁ Ναζωραῖος οὗτος καταλύσει τὸν τόπον
    τοῦτον καὶ ἀλλάξει τὰ ἔθη ἃ παρέδωκεν ἡμῖν Μωϋσῆς.
translation:
  text: For we heard him saying that this Jesus the Nazarene will destroy this place
    and will change the customs that Moses handed down to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this Jesus of Nazareth.'
    reason: lexical_alternative
  - marker: b
    text: '''This place'' refers to the temple.'
    reason: cultural_note
  - marker: c
    text: Or 'the traditions that Moses delivered to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκηκόαμεν
  chosen: we heard
  alternatives:
  - we have heard
  lexicon: BDAG
  rationale: Perfect form of ἀκούω can be rendered with present relevance ('we have
    heard'), but in idiomatic English within reported accusation, simple past 'we
    heard' is more natural while preserving the claim of direct hearing.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this accusation to the previous
    statement.
- source_word: αὐτοῦ λέγοντος
  chosen: him saying
  alternatives:
  - him say
  - him speaking
  lexicon: BDAG
  rationale: Genitive participial construction after ἀκούω is naturally rendered as
    object plus participle in English, preserving the sense of direct reported speech.
- source_word: Ἰησοῦς ὁ Ναζωραῖος οὗτος
  chosen: this Jesus the Nazarene
  alternatives:
  - this Jesus of Nazareth
  - this Nazarene Jesus
  lexicon: BDAG
  rationale: ὁ Ναζωραῖος is a designation meaning 'the Nazarene'/'of Nazareth.' 'The
    Nazarene' preserves the titular/descriptive force and the slightly pejorative
    tone in the accusers' wording; οὗτος is kept as 'this' for demonstrative emphasis.
- source_word: καταλύσει
  chosen: will destroy
  alternatives:
  - will tear down
  - will abolish
  lexicon: BDAG
  rationale: In context of 'this place' (the temple), καταλύω most naturally means
    to destroy or dismantle. 'Destroy' is clear modern English and fits the accusation.
- source_word: τὸν τόπον τοῦτον
  chosen: this place
  alternatives:
  - this temple place
  - this sanctuary
  lexicon: BDAG
  rationale: τόπος literally means 'place.' In Acts this expression refers to the
    temple precincts, but the accusers' wording is preserved without over-specifying
    in the main text.
- source_word: ἀλλάξει
  chosen: will change
  alternatives:
  - will alter
  lexicon: BDAG
  rationale: Straightforward future of ἀλλάσσω; 'change' is the most natural equivalent.
- source_word: τὰ ἔθη
  chosen: the customs
  alternatives:
  - the traditions
  - the practices
  lexicon: BDAG
  rationale: ἔθη refers to customary practices or institutions. 'Customs' best captures
    inherited communal observances without importing later technical connotations
    of 'traditions.'
- source_word: ἃ παρέδωκεν ἡμῖν Μωϋσῆς
  chosen: that Moses handed down to us
  alternatives:
  - that Moses delivered to us
  - that Moses gave us
  lexicon: BDAG
  rationale: παραδίδωμι here conveys transmission of received practices. 'Handed down'
    naturally expresses inherited tradition/custom in English and fits the legal-religious
    context.
