id: ACT.6.9
reference: Acts 6:9
source:
  edition: SBLGNT
  text: ἀνέστησαν δέ τινες τῶν ἐκ τῆς συναγωγῆς τῆς λεγομένης Λιβερτίνων καὶ Κυρηναίων
    καὶ Ἀλεξανδρέων καὶ τῶν ἀπὸ Κιλικίας καὶ Ἀσίας συζητοῦντες τῷ Στεφάνῳ,
translation:
  text: But some of those from the synagogue called the Synagogue of the Freedmen,
    and of the Cyrenians and Alexandrians, and of those from Cilicia and Asia, stood
    up and began arguing with Stephen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Libertines.' The Greek refers to freedmen, likely former slaves
      or descendants of such people; 'Freedmen' avoids the misleading modern sense
      of 'libertines.'
    reason: lexical_alternative
  - marker: b
    text: '''Asia'' here refers to the Roman province in western Asia Minor, not the
      continent of Asia in the modern sense.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀνέστησαν
  chosen: stood up
  alternatives:
  - rose up
  - came forward
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here most naturally means to rise or stand up in opposition,
    introducing hostile action. 'Stood up' preserves the concrete imagery and the
    adversarial nuance without overinterpreting.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a development with mild contrast from the preceding description
    of Stephen's ministry. 'But' captures the narrative turn toward opposition.
- source_word: τινες
  chosen: some
  alternatives:
  - certain men
  - some people
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset. 'Some' is natural
    and sufficiently precise.
- source_word: τῶν ἐκ τῆς συναγωγῆς
  chosen: of those from the synagogue
  alternatives:
  - from the synagogue
  - of the synagogue
  lexicon: BDAG
  rationale: The partitive genitive with τινες is best represented by 'some of those
    from the synagogue,' making clear these individuals belonged to or came from that
    synagogue.
- source_word: συναγωγῆς
  chosen: synagogue
  lexicon: BDAG
  rationale: Standard rendering for the Jewish assembly or meeting place; no contextual
    reason to vary.
- source_word: τῆς λεγομένης
  chosen: called
  alternatives:
  - known as
  - so-called
  lexicon: BDAG
  rationale: The participle identifies the synagogue by its recognized designation.
    'Called' is straightforward and idiomatic.
- source_word: Λιβερτίνων
  chosen: the Freedmen
  alternatives:
  - the Libertines
  - the Freedmen (that is, freed slaves)
  lexicon: BDAG
  rationale: Λιβερτῖνοι refers to freed persons/libertini, not to the later English
    sense of 'libertines.' 'Freedmen' best conveys the historical group name in understandable
    English.
- source_word: Κυρηναίων
  chosen: the Cyrenians
  alternatives:
  - men from Cyrene
  lexicon: BDAG
  rationale: A gentillic referring to people from Cyrene. 'Cyrenians' is concise and
    standard.
- source_word: Ἀλεξανδρέων
  chosen: Alexandrians
  alternatives:
  - men from Alexandria
  lexicon: BDAG
  rationale: A gentillic referring to people from Alexandria. 'Alexandrians' is the
    natural English equivalent.
- source_word: τῶν ἀπὸ Κιλικίας καὶ Ἀσίας
  chosen: those from Cilicia and Asia
  alternatives:
  - those from Cilicia and the province of Asia
  - the Cilicians and Asians
  lexicon: BDAG
  rationale: ἀπό with place names indicates origin. 'Those from Cilicia and Asia'
    is clear; 'Asia' here refers to the Roman province, not the continent, which is
    worth clarifying in a footnote.
- source_word: συζητοῦντες
  chosen: began arguing with
  alternatives:
  - disputing with
  - debating with
  - discussing with
  lexicon: BDAG
  rationale: The participle in context describes active verbal opposition to Stephen,
    not neutral conversation. 'Began arguing with' brings out the adversarial force
    while fitting the narrative flow after 'stood up.'
- source_word: τῷ Στεφάνῳ
  chosen: Stephen
  lexicon: BDAG
  rationale: Dative object after συζητέω, naturally rendered with 'with Stephen' in
    English.
