id: ACT.6.7
reference: Acts 6:7
source:
  edition: SBLGNT
  text: Καὶ ὁ λόγος τοῦ θεοῦ ηὔξανεν, καὶ ἐπληθύνετο ὁ ἀριθμὸς τῶν μαθητῶν ἐν Ἰερουσαλὴμ
    σφόδρα, πολύς τε ὄχλος τῶν ἱερέων ὑπήκουον τῇ πίστει.
translation:
  text: And the word of God kept increasing, and the number of the disciples in Jerusalem
    kept multiplying greatly, and a large crowd of the priests were becoming obedient
    to the faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were obeying faith' or 'were becoming obedient to faith.' The Greek
      phrase may denote obedience to the Christian message, not merely an inward act
      of trust.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard and transparent rendering of λόγος here, referring to the
    proclaimed message from God. 'Word of God' preserves the biblical idiom and avoids
    over-specifying whether the emphasis is on speech, message, or gospel proclamation.
- source_word: ηὔξανεν
  chosen: kept increasing
  alternatives:
  - was growing
  - increased
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing progress rather than a simple punctiliar
    event. 'Kept increasing' captures the iterative/progressive sense in natural English.
- source_word: ἐπληθύνετο
  chosen: kept multiplying
  alternatives:
  - was multiplying
  - increased
  lexicon: BDAG
  rationale: The imperfect likewise conveys continuing expansion. 'Multiplying' preserves
    the stronger growth nuance distinct from ηὔξανεν, avoiding flattening both verbs
    into the same English gloss.
- source_word: ὁ ἀριθμὸς τῶν μαθητῶν
  chosen: the number of the disciples
  alternatives:
  - the number of the followers
  - the disciples
  lexicon: BDAG
  rationale: This formally reflects the Greek construction and preserves μαθηταί as
    'disciples,' an important Lukan term for Jesus' followers. 'Followers' is possible
    but less precise.
- source_word: ἐν Ἰερουσαλὴμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Straightforward locative rendering.
- source_word: σφόδρα
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: '''Greatly'' is concise, natural, and preserves the adverbial intensification
    without sounding archaic.'
- source_word: πολύς τε ὄχλος
  chosen: a large crowd
  alternatives:
  - a great many
  - a large number
  lexicon: BDAG
  rationale: ὄχλος often means 'crowd' or 'multitude.' Here it idiomatically denotes
    a substantial body of people. 'A large crowd' preserves the collective sense better
    than the more abstract 'a great many.' The connective τε is represented by the
    continuing 'and' structure rather than separately glossed.
- source_word: τῶν ἱερέων
  chosen: of the priests
  lexicon: BDAG
  rationale: A direct rendering of ἱερεύς, referring to Jewish temple priests.
- source_word: ὑπήκουον
  chosen: were becoming obedient
  alternatives:
  - were obeying
  - were submitting
  lexicon: BDAG
  rationale: The imperfect again suggests an ongoing process. With the dative object,
    ὑπακούω means to obey or become obedient to. 'Were becoming obedient' fits the
    conversion context and avoids implying mere external compliance.
- source_word: τῇ πίστει
  chosen: the faith
  alternatives:
  - faith
  - the Christian faith
  lexicon: BDAG
  rationale: 'Although πίστις defaults to ''faith,'' the article here supports a more
    objective sense: the faith, that is, the Christian message/belief to which they
    were yielding. This preserves Luke''s likely idiom without over-paraphrasing as
    ''the Christian faith'' in the main text.'
