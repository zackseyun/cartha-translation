theological_decisions:
- issue: Rendering of πίστις in the phrase τῇ πίστει
  chosen_reading: the faith
  alternative_readings:
  - faith
  - the Christian faith
  rationale: The doctrine file gives πίστις the default rendering 'faith,' with alternatives
    preserved where contested. In this context the article and idiom 'obey the faith'
    favor an objective sense referring to the faith as the believed message/community
    confession rather than subjective trust alone. 'The faith' preserves that nuance
    while remaining close to the Greek. The simpler 'faith' is preserved as an alternative
    because English readers may hear either subjective or objective force.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3 and #5'
