id: ACT.6.8
reference: Acts 6:8
source:
  edition: SBLGNT
  text: Στέφανος δὲ πλήρης ⸀χάριτος καὶ δυνάμεως ἐποίει τέρατα καὶ σημεῖα μεγάλα ἐν
    τῷ λαῷ.
translation:
  text: Now Stephen, full of grace and power, was doing great wonders and signs among
    the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'full of faith and power' instead of 'full of grace
      and power.'
    reason: textual_variant
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative rather
    than marking strong contrast. 'Now' gives natural English discourse flow without
    overstating adversative force.
- source_word: πλήρης χάριτος καὶ δυνάμεως
  chosen: full of grace and power
  alternatives:
  - full of favor and power
  - full of grace and strength
  lexicon: BDAG
  rationale: πλήρης with genitives expresses being characterized by or filled with
    these qualities. χάρις can mean 'grace,' 'favor,' or 'kindness'; 'grace' best
    preserves the theological and literary resonance in Acts, especially given nearby
    textual tradition. δύναμις is rendered 'power' as the standard gloss in miracle
    contexts.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: The SBLGNT reads χάριτος, not πίστεως. 'Grace' is therefore translated
    directly. It may denote divine favor operative in Stephen, and it fits Luke's
    diction. Because some manuscripts read 'faith,' that alternative is preserved
    in a textual footnote rather than adopted in the main text.
- source_word: δυνάμεως
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: BDAG
  rationale: In Acts, δύναμις commonly refers to divine power manifested in ministry
    and miracles. 'Power' is the most natural and consistent rendering here.
- source_word: ἐποίει
  chosen: was doing
  alternatives:
  - did
  - was performing
  lexicon: BDAG
  rationale: The imperfect tense indicates ongoing or customary action in past time.
    'Was doing' preserves the aspect better than simple past 'did.' 'Was performing'
    is possible but slightly more interpretive and formal.
- source_word: τέρατα καὶ σημεῖα
  chosen: wonders and signs
  alternatives:
  - portents and signs
  - miracles and signs
  lexicon: BDAG
  rationale: 'This is a common Lucan pair. ''Wonders and signs'' preserves the distinct
    nuance of each term: τέρατα emphasizes the awe-producing character, σημεῖα the
    signifying function. ''Miracles'' would flatten the pair into a more generalized
    category.'
- source_word: μεγάλα
  chosen: great
  alternatives:
  - remarkable
  - mighty
  lexicon: BDAG
  rationale: μεγάλα modifies both τέρατα and σημεῖα. 'Great' is straightforward and
    preserves the broad force without overinterpreting the nature of the acts.
- source_word: ἐν τῷ λαῷ
  chosen: among the people
  alternatives:
  - in the people
  - among the populace
  lexicon: BDAG
  rationale: The phrase indicates the sphere in which these acts occurred, namely
    among the covenant people/public. 'Among the people' is idiomatic English and
    fits Luke's usage.
