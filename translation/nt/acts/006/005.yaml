theological_decisions:
- issue: Rendering πίστις in Stephen's description
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: DOCTRINE.md gives πίστις the default rendering 'faith,' while preserving alternatives in footnotes where context allows. Here the phrase likely describes Stephen's trust-filled character, but 'faithfulness' is a plausible nuance and is preserved in a footnote rather than elevated to the main text.
