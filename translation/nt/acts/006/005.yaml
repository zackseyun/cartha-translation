id: ACT.6.5
reference: Acts 6:5
source:
  edition: SBLGNT
  text: καὶ ἤρεσεν ὁ λόγος ἐνώπιον παντὸς τοῦ πλήθους, καὶ ἐξελέξαντο Στέφανον, ἄνδρα ⸀πλήρης πίστεως καὶ πνεύματος ἁγίου, καὶ Φίλιππον καὶ Πρόχορον καὶ Νικάνορα καὶ Τίμωνα καὶ Παρμενᾶν καὶ Νικόλαον προσήλυτον Ἀντιοχέα,
translation:
  text: And the proposal pleased the whole multitude, and they chose Stephen, a man full of faith and of the Holy Spirit, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus, a proselyte of Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of faithfulness.' The Greek word can denote faith, trust, or faithfulness; here the main text follows the project's default rendering 'faith.'
    reason: lexical_alternative
  - marker: b
    text: A 'proselyte' was a Gentile convert to Judaism.
    reason: cultural_note
  - marker: c
    text: Or 'Stephen, a man full of faith and of the Holy Spirit, and Philip and Prochorus and Nicanor and Timon and Parmenas and Nicolaus'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ λόγος
  chosen: the proposal
  alternatives:
  - the statement
  - the word
  - the matter
  lexicon: BDAG
  rationale: In this context λόγος refers to what the apostles had just said/proposed, not to 'word' in an abstract sense. 'Proposal' best captures the concrete referent in natural English while staying close to the discourse context.
- source_word: ἤρεσεν
  chosen: pleased
  alternatives:
  - was pleasing to
  - met with approval from
  lexicon: BDAG
  rationale: The aorist of ἀρέσκω here straightforwardly means that the proposal found favor with the assembly. 'Pleased' is concise and idiomatic.
- source_word: ἐνώπιον παντὸς τοῦ πλήθους
  chosen: the whole multitude
  alternatives:
  - the whole congregation
  - all the crowd
  - the entire assembly
  lexicon: BDAG
  rationale: The phrase literally means 'before all the multitude,' but idiomatically with ἀρέσκω it conveys approval by the gathered body. 'The whole multitude' preserves the collective sense of πλῆθος without importing later ecclesial terminology.
- source_word: ἐξελέξαντο
  chosen: they chose
  alternatives:
  - they selected
  - they elected
  lexicon: BDAG
  rationale: The middle voice verb means to choose/select for oneself. 'They chose' is the most direct and natural rendering.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a male
  - one who was
  lexicon: BDAG
  rationale: ἀνήρ here identifies Stephen as 'a man.' This follows the gender-accurate principle and avoids flattening the noun into a vague relative clause.
- source_word: πλήρης πίστεως
  chosen: full of faith
  alternatives:
  - full of trust
  - full of faithfulness
  lexicon: BDAG
  rationale: The default rendering of πίστις in DOCTRINE.md is 'faith.' In this characterization of Stephen, 'faith' is the most natural and traditional sense. 'Faithfulness' is possible but less likely as the primary nuance here, so it is preserved in a footnote as a lexical alternative.
- source_word: πνεύματος ἁγίου
  chosen: of the Holy Spirit
  alternatives:
  - of holy spirit
  lexicon: BDAG
  rationale: In Acts, this expression regularly refers to the divine Holy Spirit, not merely a quality of spiritual disposition. Capitalization reflects that referent in English.
- source_word: πλήρης
  chosen: full
  alternatives:
  - filled
  lexicon: BDAG
  rationale: 'Though the form is nominative where an accusative might be expected by strict agreement, the sense is clear: Stephen is characterized as being full of faith and the Holy Spirit. ''Full'' is the standard idiomatic rendering.'
- source_word: προσήλυτον
  chosen: a proselyte
  alternatives:
  - a convert
  lexicon: BDAG
  rationale: προσήλυτος denotes a Gentile convert/adherent to Judaism. 'Proselyte' is precise and historically accurate; 'convert' is understandable but less specific. A footnote explains the cultural sense.
- source_word: Ἀντιοχέα
  chosen: of Antioch
  alternatives:
  - an Antiochian
  - from Antioch
  lexicon: BDAG
  rationale: The ethnic adjective identifies Nicolaus as associated with Antioch. 'Of Antioch' is concise and natural in apposition to 'a proselyte.'
- source_word: Στέφανον, Φίλιππον, Πρόχορον, Νικάνορα, Τίμωνα, Παρμενᾶν, Νικόλαον
  chosen: Stephen, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus
  alternatives:
  - Nikolaos for Νικόλαον
  lexicon: LSJ
  rationale: Personal names are transliterated by standard English conventions per project philosophy. 'Nicolaus' is a conventional transliteration that distinguishes the Greek name from later anglicized 'Nicholas'.
