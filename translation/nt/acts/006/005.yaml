  from: Stephen, a man full of faith and of the Holy Spirit, and Philip and Prochorus and Nicanor and Timon and Parmenas and Nicolaus
  to: Stephen, a man full of faith and of the Holy Spirit, Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolaus
  rationale: The current rendering of the list of names is syntactically awkward. The conjunction 'and' after the long description of Stephen incorrectly separates him from the other six men, implying they are a separate group. Additionally, rendering the Greek polysyndeton ('and... and... and...') literally without commas is unnatural in modern English. A standard comma-separated list with a final 'and' more clearly and naturally presents the seven chosen men as the single group selected, which is the sense of the Greek.
