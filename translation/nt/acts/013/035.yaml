id: ACT.13.35
reference: Acts 13:35
source:
  edition: SBLGNT
  text: ⸀διότι καὶ ἐν ἑτέρῳ λέγει· Οὐ δώσεις τὸν ὅσιόν σου ἰδεῖν διαφθοράν·
translation:
  text: Therefore he also says in another psalm, ‘You will not let your Holy One see
    decay.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in another place' or 'in another passage'; Greek simply says 'in another.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your faithful one.'
    reason: lexical_alternative
  - marker: c
    text: Or 'corruption.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  chosen: Therefore
  alternatives:
  - For this reason
  - Because
  lexicon: BDAG
  rationale: In context Paul is drawing an inference from the preceding argument and
    scripture citation. Although διότι can mean 'because,' here the discourse function
    is inferential, so 'Therefore' best reflects the flow in natural English.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - and
  lexicon: BDAG
  rationale: καί adds another supporting scriptural witness to the argument. 'Also'
    captures the additive force clearly.
- source_word: ἐν ἑτέρῳ
  chosen: in another psalm
  alternatives:
  - in another place
  - in another passage
  lexicon: BDAG
  rationale: Literally 'in another,' with the noun implied from context. Since the
    quotation is from Psalm 16 and the surrounding discourse concerns scriptural citations,
    supplying 'psalm' makes the ellipsis explicit for English readers without over-paraphrasing.
    'Place' is possible but less informative.
- source_word: λέγει
  chosen: he says
  alternatives:
  - it says
  - he said
  lexicon: BDAG
  rationale: The present tense is the standard vivid/scriptural citation formula.
    The subject is implicit and may refer to God or the scripture speaking; 'he says'
    preserves the Greek form. 'It says' is idiomatic but less literal.
- source_word: Οὐ δώσεις
  chosen: You will not let
  alternatives:
  - You will not give
  - You will not allow
  lexicon: BDAG
  rationale: Although δίδωμι is literally 'give,' in this idiom with infinitive it
    means to permit or allow. 'Let' is the most natural English equivalent here.
- source_word: τὸν ὅσιόν σου
  chosen: your Holy One
  alternatives:
  - your faithful one
  - your devout one
  - your holy one
  lexicon: BDAG
  rationale: ὅσιος can denote one who is holy, devout, or faithful in relation to
    God. In this messianic citation, 'Holy One' is the established and contextually
    fitting rendering, preserving both sanctity and the christological resonance of
    the passage. Capitalization reflects a referential decision in context, not a
    lexical change.
- source_word: ἰδεῖν
  chosen: see
  alternatives:
  - experience
  lexicon: BDAG
  rationale: The infinitive of ὁράω is literally 'to see.' In English 'see decay'
    is idiomatic and preserves the scriptural wording; 'experience decay' is interpretive
    and less direct.
- source_word: διαφθοράν
  chosen: decay
  alternatives:
  - corruption
  - decomposition
  lexicon: BDAG
  rationale: διαφθορά can mean corruption or decay. 'Decay' is clearer in contemporary
    English and fits the context of bodily decomposition in the resurrection argument.
    'Corruption' is traditional and worth preserving in a footnote.
