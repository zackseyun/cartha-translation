theological_decisions:
- issue: Messianic/christological reference of the Psalm citation
  chosen_reading: Render τὸν ὅσιόν σου as 'your Holy One' with capitalization in context
  alternative_readings:
  - your holy one
  - your faithful one
  rationale: In Acts 13 Paul explicitly applies Psalm 16 to Jesus' resurrection, so
    capitalization in English helps signal the contextual referent without altering
    the lexical meaning. The lower-case form would also be lexically possible if translating
    the Psalm in isolation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Supplying the implied noun after ἐν ἑτέρῳ
  chosen_reading: Specify 'psalm' in the main text
  alternative_readings:
  - another place
  - another passage
  rationale: The immediate context is a chain of scriptural quotations, and the cited
    line comes from a Psalm. Supplying 'psalm' clarifies the reference for modern
    readers while remaining faithful to the source's implied sense.
  doctrine_reference: Translation philosophy §6
