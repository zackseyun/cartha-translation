id: ACT.13.23
reference: Acts 13:23
source:
  edition: SBLGNT
  text: τούτου ὁ θεὸς ἀπὸ τοῦ σπέρματος κατ’ ἐπαγγελίαν ἤγαγεν τῷ Ἰσραὴλ ⸂σωτῆρα Ἰησοῦν⸃,
translation:
  text: From this man's offspring, God has brought to Israel a Savior, Jesus, according
    to promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in accordance with the promise' or 'as promised.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from this one's seed'; 'offspring' here refers to Davidic descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου
  chosen: this man's
  alternatives:
  - this one’s
  - his
  lexicon: BDAG
  rationale: Genitive demonstrative referring back to David in the previous verse.
    Rendering it explicitly as 'this man's' makes the personal antecedent clear in
    English and preserves the genitive relation with 'offspring.'
- source_word: ἀπὸ τοῦ σπέρματος
  chosen: from ... offspring
  alternatives:
  - from ... seed
  - from ... descendants
  lexicon: BDAG
  rationale: σπέρμα can mean 'seed' literally or figuratively 'offspring/descendant(s).'
    Here it refers to Davidic lineage, so 'offspring' is natural modern English while
    preserving the genealogical sense. 'Seed' is more formal but less idiomatic here.
- source_word: κατ’ ἐπαγγελίαν
  chosen: according to promise
  alternatives:
  - in accordance with the promise
  - as he promised
  lexicon: BDAG
  rationale: The prepositional phrase indicates conformity to a prior promise, likely
    the Davidic promise in context. 'According to promise' is concise and close to
    the Greek; the anarthrous singular is well represented without over-specifying
    which promise in the main text.
- source_word: ἤγαγεν
  chosen: has brought
  alternatives:
  - brought
  - raised up
  - led forth
  lexicon: BDAG
  rationale: ἄγω normally means 'bring/lead.' In this context God 'brought' or 'brought
    forth' a Savior from David's line for Israel. 'Raised up' is possible in some
    contexts but can be confused with resurrection language and is less lexically
    direct here. Present perfect English ('has brought') fits the completed act with
    present relevance in Paul's speech.
- source_word: τῷ Ἰσραήλ
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: BDAG
  rationale: The dative is naturally rendered 'to Israel,' though contextually it
    also carries benefactive force. 'To Israel' stays closer to the Greek while still
    making sense in English.
- source_word: σωτῆρα
  chosen: a Savior
  alternatives:
  - a deliverer
  lexicon: BDAG
  rationale: σωτήρ is a theologically weighty title meaning 'savior/deliverer.' 'Savior'
    is the standard and most fitting rendering in this christological context.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy to transliterate names while translating titles.
