theological_decisions:
- issue: Relation of Jesus to the Davidic promise
  chosen_reading: The verse states that God brought Jesus from David's offspring to
    Israel in fulfillment of promise, without expanding beyond the text.
  alternative_readings:
  - The phrase could be paraphrased more explicitly as fulfillment of the promise
    to David.
  rationale: The Greek links Jesus' Davidic descent and God's promise, but the main
    text should not import explanatory material beyond what is stated. The translation
    preserves the fulfillment theme with 'according to promise.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
