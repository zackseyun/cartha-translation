id: ACT.13.14
reference: Acts 13:14
source:
  edition: SBLGNT
  text: αὐτοὶ δὲ διελθόντες ἀπὸ τῆς Πέργης παρεγένοντο εἰς Ἀντιόχειαν ⸂τὴν Πισιδίαν⸃,
    καὶ ⸀εἰσελθόντες εἰς τὴν συναγωγὴν τῇ ἡμέρᾳ τῶν σαββάτων ἐκάθισαν.
translation:
  text: But they went on from Perga and came to Antioch in Pisidia, and on the Sabbath
    day they entered the synagogue and sat down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Pisidian Antioch." The Greek reads "Antioch in Pisidia."
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ δὲ
  chosen: But they
  alternatives:
  - Now they
  - But they themselves
  lexicon: BDAG
  rationale: δέ marks continuation with mild contrast; αὐτοὶ is an explicit pronoun
    that can add slight emphasis, but in English the natural subject pronoun sufficiently
    carries the sense without awkward overemphasis.
- source_word: διελθόντες ἀπὸ τῆς Πέργης
  chosen: went on from Perga
  alternatives:
  - passed through from Perga
  - departed from Perga
  lexicon: BDAG
  rationale: The aorist participle from διέρχομαι here indicates proceeding onward
    from a location in the travel narrative. 'Went on from' is idiomatic English and
    preserves the sense of continuing the journey.
- source_word: παρεγένοντο
  chosen: came to
  alternatives:
  - arrived at
  - came into
  lexicon: BDAG
  rationale: παραγίνομαι in travel contexts commonly means to arrive or come to a
    place. 'Came to' is natural and fits the narrative flow.
- source_word: Ἀντιόχειαν τὴν Πισιδίαν
  chosen: Antioch in Pisidia
  alternatives:
  - Pisidian Antioch
  - Antioch of Pisidia
  lexicon: BDAG
  rationale: This identifies the specific Antioch by region. 'Antioch in Pisidia'
    is clear modern English and closely reflects the Greek construction without importing
    a more interpretive adjectival form.
- source_word: εἰσελθόντες εἰς τὴν συναγωγήν
  chosen: they entered the synagogue
  alternatives:
  - having gone into the synagogue
  - they went into the synagogue
  lexicon: BDAG
  rationale: The participle is best rendered with a finite verb in English for readability.
    'Entered' is concise and accurately conveys εἰσέρχομαι with εἰς.
- source_word: τῇ ἡμέρᾳ τῶν σαββάτων
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbaths
  - on the Sabbath
  lexicon: BDAG
  rationale: This idiom refers to the Jewish Sabbath. Although the Greek uses a plural
    form σαββάτων, idiomatic English is singular here. 'Sabbath day' preserves the
    temporal phrase explicitly.
- source_word: ἐκάθισαν
  chosen: sat down
  alternatives:
  - sat
  - took their seats
  lexicon: BDAG
  rationale: The aorist verb denotes the simple action of sitting. 'Sat down' is natural
    English and slightly better reflects the ingressive action than bare 'sat'.
