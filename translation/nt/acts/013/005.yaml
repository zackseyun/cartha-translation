id: ACT.13.5
reference: Acts 13:5
source:
  edition: SBLGNT
  text: καὶ γενόμενοι ἐν Σαλαμῖνι κατήγγελλον τὸν λόγον τοῦ θεοῦ ἐν ταῖς συναγωγαῖς
    τῶν Ἰουδαίων· εἶχον δὲ καὶ Ἰωάννην ὑπηρέτην.
translation:
  text: And when they arrived at Salamis, they proclaimed the word of God in the synagogues
    of the Jews; and they also had John as an assistant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having come to Salamis.'
    reason: lexical_alternative
  - marker: b
    text: Or 'John as a helper' or 'John as an attendant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενοι
  chosen: when they arrived
  alternatives:
  - having come
  - being there
  lexicon: BDAG
  rationale: The aorist participle of γίνομαι with a location marker (ἐν Σαλαμῖνι)
    idiomatically indicates arrival or coming to a place. 'When they arrived' gives
    natural English while preserving the participial temporal sense.
- source_word: Σαλαμῖνι
  chosen: Salamis
  rationale: Standard English transliteration of the place name Σαλαμίς in the dative
    after ἐν.
- source_word: κατήγγελλον
  chosen: proclaimed
  alternatives:
  - announced
  - declared
  - preached
  lexicon: BDAG
  rationale: καταγγέλλω denotes public proclamation or announcement. 'Proclaimed'
    preserves the formal/public sense without narrowing it to sermonic 'preached'.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard and transparent rendering that preserves the genitival construction
    and the likely sense of God's message/revelation without overinterpreting.
- source_word: συναγωγαῖς
  chosen: synagogues
  alternatives:
  - meeting places
  lexicon: BDAG
  rationale: The term specifically refers here to Jewish synagogue assemblies/buildings;
    'synagogues' is the precise and established rendering.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - of the Jewish people
  - of the Judeans
  lexicon: BDAG
  rationale: In Acts, Ἰουδαῖοι can mean either Judeans or Jews depending on context.
    Here, because synagogues are in view and the reference is ethnic-religious rather
    than regional, 'of the Jews' is the most natural and contextually accurate rendering.
- source_word: εἶχον δὲ καὶ
  chosen: and they also had
  alternatives:
  - now they also had
  - and they had also
  lexicon: BDAG
  rationale: δέ marks a mild transition/addition, and καί adds 'also.' 'And they also
    had' communicates the additive force in smooth English.
- source_word: Ἰωάννην
  chosen: John
  rationale: Standard English transliteration of the personal name Ἰωάννης.
- source_word: ὑπηρέτην
  chosen: as an assistant
  alternatives:
  - as a helper
  - as an attendant
  - as a servant
  lexicon: BDAG
  rationale: ὑπηρέτης often denotes an assistant, attendant, or subordinate helper.
    'Assistant' fits the ministry-travel context well and avoids the potentially misleading
    servile connotations of 'servant,' especially since δοῦλος is the more marked
    term for slave/servant.
