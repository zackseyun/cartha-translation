theological_decisions:
- issue: Identity denied by John in οὐκ εἰμὶ ἐγώ
  chosen_reading: John denies that he is the expected messianic figure without explicitly
    naming 'the Messiah' in the main text.
  alternative_readings:
  - I am not the Messiah
  - I am not the one
  rationale: The immediate context strongly implies a denial of messianic identity,
    but the Greek remains elliptical. To preserve the text's own level of explicitness,
    the main text keeps the ellipsis while a footnote can clarify the likely referent.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
