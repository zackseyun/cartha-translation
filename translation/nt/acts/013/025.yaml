id: ACT.13.25
reference: Acts 13:25
source:
  edition: SBLGNT
  text: ὡς δὲ ἐπλήρου ⸀Ἰωάννης τὸν δρόμον, ἔλεγεν· ⸂Τί ἐμὲ⸃ ὑπονοεῖτε εἶναι; οὐκ εἰμὶ
    ἐγώ· ἀλλ’ ἰδοὺ ἔρχεται μετ’ ἐμὲ οὗ οὐκ εἰμὶ ἄξιος τὸ ὑπόδημα τῶν ποδῶν λῦσαι.
translation:
  text: And as John was completing his course, he kept saying, ‘What do you suppose
    me to be? I am not he. But look, one is coming after me, the sandals of whose
    feet I am not worthy to untie.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “What do you suppose me to be? I am not the Messiah.”
      The Greek leaves the denied identity implicit, though the context points to
      the Messiah.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts and translations render this more specifically as “to untie
      the strap of his sandals,” but the printed Greek text here reads simply “the
      sandal(s) of his feet ... to untie.”
    reason: textual_variant
lexical_decisions:
- source_word: ἐπλήρου ... τὸν δρόμον
  chosen: was completing his course
  alternatives:
  - was fulfilling his course
  - was finishing his race
  lexicon: BDAG
  rationale: πληρόω here means to bring to completion, and δρόμος is used metaphorically
    for a life-task or appointed ministry. 'Course' preserves the metaphor without
    over-specifying athletic imagery, while 'was completing' reflects the imperfect
    aspect.
- source_word: ἔλεγεν
  chosen: he kept saying
  alternatives:
  - he said
  - he was saying
  lexicon: BDAG
  rationale: The imperfect indicates repeated or ongoing speech in this summary of
    John's testimony. 'Kept saying' captures the iterative force more naturally than
    simple past.
- source_word: Τί ἐμὲ ὑπονοεῖτε εἶναι;
  chosen: What do you suppose me to be?
  alternatives:
  - What do you think I am?
  - Whom do you suppose me to be?
  lexicon: BDAG
  rationale: ὑπονοέω means to suppose, suspect, or assume. The construction asks what
    identity the audience is attributing to John. 'What do you suppose me to be?'
    stays close to the Greek while remaining intelligible. 'Whom' is possible in idiomatic
    English because identity is personal, but 'what' better reflects τί.
- source_word: οὐκ εἰμὶ ἐγώ
  chosen: I am not he
  alternatives:
  - I am not the one
  - I am not
  lexicon: BDAG
  rationale: The Greek is elliptical, with ἐγώ emphatic. In context John denies being
    the expected figure, likely the Messiah. 'I am not he' preserves the terseness
    and allusive force better than an explicit interpretive expansion in the main
    text.
- source_word: ἀλλ’ ἰδοὺ
  chosen: But look
  alternatives:
  - But behold
  - But see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' is natural modern
    English and preserves the deictic force without archaic tone.
- source_word: ἔρχεται μετ’ ἐμὲ
  chosen: one is coming after me
  alternatives:
  - he comes after me
  - there is one coming after me
  lexicon: BDAG
  rationale: The present tense has a vivid or imminent sense. Supplying 'one' is warranted
    by English style and the implied subject in context.
- source_word: οὗ ... τὸ ὑπόδημα τῶν ποδῶν λῦσαι
  chosen: the sandals of whose feet ... to untie
  alternatives:
  - whose sandal ... to untie
  - to untie the strap of whose sandals
  lexicon: BDAG
  rationale: The SBLGNT text reads ὑπόδημα ('sandal/footwear'), singular collective
    or generic, with τῶν ποδῶν ('of the feet'). English idiom prefers plural 'sandals'
    here. 'Untie' is the natural rendering of λύω in this context. Some translation
    traditions include 'strap,' but that noun is not present in this text and should
    not be imported into the main text.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - fit
  - deserving
  lexicon: BDAG
  rationale: ἄξιος denotes worthiness or fitness. 'Worthy' is the standard and most
    transparent rendering in this humility formula.
