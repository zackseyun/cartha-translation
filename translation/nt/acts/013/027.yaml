theological_decisions:
- issue: Nature of the ignorance regarding Jesus
  chosen_reading: did not recognize this one
  alternative_readings:
  - were ignorant of him
  - did not know him
  rationale: The verse speaks of culpable failure to recognize Jesus and the prophetic
    witness, not necessarily absolute ignorance of his existence. This preserves the
    text's theological tension without overstating it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
