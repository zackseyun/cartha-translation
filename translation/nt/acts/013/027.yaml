id: ACT.13.27
reference: Acts 13:27
source:
  edition: SBLGNT
  text: οἱ γὰρ κατοικοῦντες ἐν Ἰερουσαλὴμ καὶ οἱ ἄρχοντες αὐτῶν τοῦτον ἀγνοήσαντες
    καὶ τὰς φωνὰς τῶν προφητῶν τὰς κατὰ πᾶν σάββατον ἀναγινωσκομένας κρίναντες ἐπλήρωσαν,
translation:
  text: For those who live in Jerusalem and their rulers, because they did not recognize
    this one and by condemning him fulfilled the voices of the prophets that are read
    every Sabbath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'him.' The Greek has the demonstrative 'this one,' which may emphasize
      the speaker's reference to Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or 'the words of the prophets.' Literally 'the voices of the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοικοῦντες ἐν Ἰερουσαλήμ
  chosen: those who live in Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the inhabitants of Jerusalem
  lexicon: BDAG
  rationale: The participial expression functions substantivally for a group of people.
    'Those who live in Jerusalem' is natural modern English while preserving the sense
    of κατοικέω.
- source_word: οἱ ἄρχοντες αὐτῶν
  chosen: their rulers
  alternatives:
  - their leaders
  - their authorities
  lexicon: BDAG
  rationale: ἄρχοντες refers to governing authorities or leaders. 'Rulers' best preserves
    the political/judicial force in this context.
- source_word: τοῦτον
  chosen: this one
  alternatives:
  - him
  lexicon: BDAG
  rationale: The demonstrative is explicit in Greek and points emphatically to Jesus
    in the discourse. 'This one' preserves that force better than simply 'him,' though
    English remains natural enough here.
- source_word: ἀγνοήσαντες
  chosen: did not recognize
  alternatives:
  - having been ignorant of
  - not knowing
  - failing to recognize
  lexicon: BDAG
  rationale: In context the issue is not mere lack of information but failure to recognize
    who Jesus was. 'Did not recognize' captures the contextual sense of ἀγνοέω.
- source_word: τὰς φωνὰς τῶν προφητῶν
  chosen: the voices of the prophets
  alternatives:
  - the words of the prophets
  - the utterances of the prophets
  lexicon: BDAG
  rationale: φωνάς is literally 'voices.' Retaining 'voices' preserves the vividness
    of the Greek and the sense of the prophetic witness being heard in Scripture.
- source_word: τὰς κατὰ πᾶν σάββατον ἀναγινωσκομένας
  chosen: that are read every Sabbath
  alternatives:
  - which are read on every Sabbath
  - being read every Sabbath
  lexicon: BDAG
  rationale: This attributive participial phrase modifies 'the voices of the prophets.'
    'Every Sabbath' is idiomatic for κατὰ πᾶν σάββατον.
- source_word: κρίναντες
  chosen: by condemning him
  alternatives:
  - having judged
  - after judging
  - when they condemned him
  lexicon: BDAG
  rationale: In context κρίνω refers specifically to judicial condemnation of Jesus,
    not generic evaluation. Rendering it instrumentally with 'by condemning him' makes
    the relation to 'fulfilled' clear in English.
- source_word: ἐπλήρωσαν
  chosen: fulfilled
  alternatives:
  - brought to fulfillment
  lexicon: BDAG
  rationale: πληρόω here means to fulfill Scripture. 'Fulfilled' is the standard and
    clearest rendering.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation of the preceding claim. 'For' preserves
    the explanatory connection.
