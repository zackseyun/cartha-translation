id: ACT.13.32
reference: Acts 13:32
source:
  edition: SBLGNT
  text: καὶ ἡμεῖς ὑμᾶς εὐαγγελιζόμεθα τὴν πρὸς τοὺς πατέρας ἐπαγγελίαν γενομένην
translation:
  text: And we ourselves proclaim to you the good news of the promise made to the
    fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ancestors.' The Greek says 'the fathers,' a covenant-historical
      reference to Israel's forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Also
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding argument;
    'And' preserves the flow without adding interpretive nuance.
- source_word: ἡμεῖς
  chosen: we ourselves
  alternatives:
  - we
  - even we
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for basic Greek syntax and therefore
    carries emphasis. 'We ourselves' reflects that emphasis more clearly than a simple
    'we'.
- source_word: ὑμᾶς
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: With εὐαγγελιζόμεθα, the accusative addressee is naturally rendered in
    English as an indirect object, 'to you,' rather than a bare object.
- source_word: εὐαγγελιζόμεθα
  chosen: proclaim ... the good news
  alternatives:
  - bring good news
  - preach the gospel
  - announce good news
  lexicon: BDAG
  rationale: The verb means to announce or proclaim good news. Rendering it as 'proclaim
    ... the good news' preserves both the verbal force and the euangelion sense without
    relying on ecclesiastical jargon like 'gospel' in the main text.
- source_word: τὴν ... ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - the promised message
  - the pledge
  lexicon: BDAG
  rationale: ἐπαγγελία in this context refers to God's promise, not merely a general
    announcement. 'The promise' is the most natural and theologically appropriate
    rendering.
- source_word: πρὸς τοὺς πατέρας
  chosen: to the fathers
  alternatives:
  - to our fathers
  - to the ancestors
  lexicon: BDAG
  rationale: πρός here expresses relation/direction toward the recipients of the promise.
    'To the fathers' is a close rendering. 'Our fathers' is contextually possible
    from Paul's Jewish setting, but the possessive is not present in the Greek. 'Ancestors'
    is smoother but loses the source's masculine familial term.
- source_word: γενομένην
  chosen: made
  alternatives:
  - given
  - which came
  - that was fulfilled
  lexicon: BDAG
  rationale: As an attributive participle modifying ἐπαγγελίαν, γενομένην here denotes
    the promise that came to be or was made to the fathers. 'Made' is idiomatic English
    and fits the collocation 'promise made.' 'Fulfilled' would anticipate the next
    verse and overtranslate the participle.
