theological_decisions:
- issue: Rendering πατέρες
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Greek explicitly uses the masculine familial term πατέρες, a common
    covenant-historical designation for Israel's forefathers. In keeping with the
    gender-accurate policy, 'fathers' is retained in the main text, while 'ancestors'
    is preserved as a possible smoother English alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
