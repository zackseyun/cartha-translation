theological_decisions:
- issue: Referent of 'his' in 'before his coming'
  chosen_reading: The pronoun refers to Jesus/the Davidic Savior in Paul's speech
    context.
  alternative_readings:
  - generic antecedent left unspecified in isolation
  rationale: Within Acts 13:23–25, Paul is speaking of the Savior, Jesus, and John
    as his forerunner. The English pronoun naturally preserves this contextual referent
    without adding an explicit name not present in the Greek of this verse.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently identifies the referent.
