id: ACT.13.24
reference: Acts 13:24
source:
  edition: SBLGNT
  text: προκηρύξαντος Ἰωάννου πρὸ προσώπου τῆς εἰσόδου αὐτοῦ βάπτισμα μετανοίας ⸂παντὶ
    τῷ λαῷ⸃ Ἰσραήλ.
translation:
  text: before his coming, John had proclaimed to all the people of Israel a baptism
    of repentance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before his arrival.' The Greek literally speaks of 'before the face
      of his entrance,' an idiom for preceding someone's coming.
    reason: lexical_alternative
  - marker: b
    text: Or 'a baptism for repentance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προκηρύξαντος
  chosen: had proclaimed
  alternatives:
  - had preached beforehand
  - had announced beforehand
  lexicon: BDAG
  rationale: Aorist participle in genitive absolute-like construction referring to
    prior public proclamation. 'Had proclaimed' is natural English and preserves the
    sense of public heralding without overloading the line with 'beforehand,' since
    temporal priority is already conveyed by the following phrase.
- source_word: πρὸ προσώπου τῆς εἰσόδου αὐτοῦ
  chosen: before his coming
  alternatives:
  - before his arrival
  - before he appeared
  - before the face of his entrance
  lexicon: BDAG
  rationale: This idiomatic expression means 'before' or 'in advance of' someone's
    arrival/appearance. 'Before his coming' is concise, idiomatic, and fits the messianic
    context without woodenly reproducing 'before the face of.'
- source_word: εἰσόδου
  chosen: coming
  alternatives:
  - arrival
  - entrance
  lexicon: BDAG
  rationale: Although the noun literally denotes 'entrance' or 'entry,' in context
    it refers to the arrival/appearance of the one being spoken of. 'Coming' is the
    most natural English rendering here.
- source_word: βάπτισμα μετανοίας
  chosen: a baptism of repentance
  alternatives:
  - a baptism for repentance
  lexicon: BDAG
  rationale: The genitive is preserved straightforwardly as 'of repentance,' matching
    common NT usage and allowing the phrase to retain its theological and lexical
    connection to John's ministry. 'For repentance' is possible interpretively but
    less formally tied to the Greek construction.
- source_word: παντὶ τῷ λαῷ Ἰσραήλ
  chosen: to all the people of Israel
  alternatives:
  - to all Israel's people
  - to the whole people of Israel
  lexicon: BDAG
  rationale: Dative of indirect object after the proclamation idea. 'All the people
    of Israel' preserves both πᾶς and λαός and makes explicit that the reference is
    to Israel as a people.
- source_word: Ἰωάννου
  chosen: John
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰωάννης.
