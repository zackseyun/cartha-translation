theological_decisions:
- issue: Duration phrase ἔτη τεσσεράκοντα
  chosen_reading: 'The phrase is rendered with Saul''s period of rule/gift: ''for
    forty years.'''
  alternative_readings:
  - The phrase could be taken more loosely in the historical summary, with some readers
    noting tension with the Old Testament chronology.
  rationale: The Greek most naturally attaches the duration to the immediately preceding
    clause about God giving Saul. The translation preserves Luke's wording without
    attempting to harmonize or resolve chronological questions beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
