id: ACT.13.21
reference: Acts 13:21
source:
  edition: SBLGNT
  text: κἀκεῖθεν ᾐτήσαντο βασιλέα, καὶ ἔδωκεν αὐτοῖς ὁ θεὸς τὸν Σαοὺλ υἱὸν Κίς, ἄνδρα
    ἐκ φυλῆς Βενιαμίν, ἔτη τεσσεράκοντα·
translation:
  text: And from there they asked for a king, and God gave them Saul son of Kish,
    a man from the tribe of Benjamin, for forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And after that they asked for a king.' The opening term can function
      as a transitional marker in the historical sequence.
    reason: lexical_alternative
  - marker: b
    text: Some readers note that 'for forty years' may raise chronological questions
      when compared with Old Testament data; the translation preserves Luke's wording
      as given.
    reason: cross_reference
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - And then
  - And after that
  lexicon: BDAG
  rationale: The compound adverb/conjunction links this event to the preceding historical
    sequence. 'And from there' preserves the transitional force and the sense of movement
    in the narrative flow better than a looser temporal paraphrase.
- source_word: ᾐτήσαντο
  chosen: they asked for
  alternatives:
  - they requested
  - they demanded
  lexicon: BDAG
  rationale: The middle form here conveys that the people made a request for themselves.
    'Asked for' is natural English and fits the historical allusion to Israel's request
    for a king without overstating the tone as 'demanded.'
- source_word: βασιλέα
  chosen: a king
  alternatives:
  - king
  lexicon: BDAG
  rationale: Anarthrous accusative is well rendered with the indefinite article in
    English. The phrase refers to the kind of ruler requested, not yet to a previously
    identified individual.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - granted
  - appointed
  lexicon: BDAG
  rationale: The verb is the common 'gave.' 'Granted' is interpretive and 'appointed'
    narrows the sense. 'Gave' preserves the wording while allowing the context to
    convey divine action in response to the request.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The explicit subject is retained. No article is needed in English for
    the proper referent.
- source_word: τὸν Σαοὺλ
  chosen: Saul
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: υἱὸν Κίς
  chosen: son of Kish
  alternatives:
  - the son of Kish
  lexicon: BDAG
  rationale: This is a standard patronymic expression. 'Son of Kish' is idiomatic
    and sufficiently formal without adding emphasis not present in the Greek.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a male
  - one
  lexicon: BDAG
  rationale: ἀνήρ refers to an adult male person. 'A man' is the natural and gender-accurate
    rendering here, describing Saul individually rather than humanity generically.
- source_word: ἐκ φυλῆς Βενιαμίν
  chosen: from the tribe of Benjamin
  alternatives:
  - of the tribe of Benjamin
  lexicon: BDAG
  rationale: ἐκ is most directly 'from/out of.' 'From the tribe of Benjamin' is clear
    modern English and preserves the tribal origin statement.
- source_word: ἔτη τεσσεράκοντα
  chosen: for forty years
  alternatives:
  - forty years
  lexicon: BDAG
  rationale: The accusative phrase expresses duration. 'For forty years' makes the
    temporal force explicit in English. This most naturally modifies God's giving
    Saul as king for that period in the flow of the sentence.
