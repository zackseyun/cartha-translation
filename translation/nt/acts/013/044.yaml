theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's contested-terms table sets 'Lord' as the default rendering
    for κύριος. In Acts this also coheres with early Christian proclamation language
    without narrowing the referent beyond what the text states.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sense of 'the word of the Lord'
  chosen_reading: Retain the traditional phrase rather than interpretively expanding
    it to 'the Lord's message' or 'the message about the Lord.'
  alternative_readings:
  - the Lord's message
  - the message about the Lord
  rationale: The genitive construction can carry overlapping nuances, and Luke regularly
    uses this phrase as a theological shorthand for apostolic proclamation. Preserving
    the ambiguity maintains the text's theological tension rather than resolving it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
