id: ACT.13.44
reference: Acts 13:44
source:
  edition: SBLGNT
  text: Τῷ ⸀δὲ ἐρχομένῳ σαββάτῳ σχεδὸν πᾶσα ἡ πόλις συνήχθη ἀκοῦσαι τὸν λόγον τοῦ
    ⸀κυρίου.
translation:
  text: On the coming Sabbath, nearly the whole city gathered together to hear the
    word of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On the next Sabbath' or 'On the following Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: '''The word of the Lord'' may also be understood as ''the Lord''s message''
      or, contextually, ''the message about the Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Τῷ δὲ ἐρχομένῳ σαββάτῳ
  chosen: On the coming Sabbath
  alternatives:
  - On the next Sabbath
  - On the following Sabbath
  lexicon: BDAG
  rationale: 'The dative construction with the participle ἐρχομένῳ is temporal: ''on
    the coming/following Sabbath.'' ''Coming Sabbath'' is slightly more literal, while
    remaining natural English.'
- source_word: σχεδὸν
  chosen: nearly
  alternatives:
  - almost
  lexicon: BDAG
  rationale: σχεδόν means 'almost/nearly.' 'Nearly' fits smoothly with 'the whole
    city' in contemporary English.
- source_word: πᾶσα ἡ πόλις
  chosen: the whole city
  alternatives:
  - all the city
  - the entire city
  lexicon: BDAG
  rationale: This idiom refers to the city population in a broad, hyperbolic sense,
    not necessarily every individual without exception. 'The whole city' is idiomatic
    English and preserves the force of πᾶσα ἡ πόλις.
- source_word: συνήχθη
  chosen: gathered together
  alternatives:
  - assembled
  - came together
  lexicon: BDAG
  rationale: 'The aorist passive of συνάγω here has an intransitive/middle-like sense:
    the people assembled. ''Gathered together'' preserves the communal sense and echoes
    the underlying συν- prefix.'
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: they gathered in order to hear. ''To
    hear'' is the most direct rendering.'
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'speech.' In Acts, 'the word' is
    a common expression for the proclaimed gospel message. Retaining 'word' preserves
    Luke's recurring terminology.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - from the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for Kyrios. The genitive
    is most naturally rendered 'of the Lord,' identifying the proclaimed word as belonging
    to or concerning the Lord. 'From the Lord' is possible interpretively but less
    direct.
