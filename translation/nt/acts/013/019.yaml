id: ACT.13.19
reference: Acts 13:19
source:
  edition: SBLGNT
  text: ⸀καὶ καθελὼν ἔθνη ἑπτὰ ἐν γῇ Χανάαν ⸀κατεκληρονόμησεν τὴν γῆν αὐτῶν
translation:
  text: And after destroying seven nations in the land of Canaan, he gave them their
    land as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he allotted their land as an inheritance.' The Greek verb can emphasize
      distribution or apportionment by inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθελὼν
  chosen: after destroying
  alternatives:
  - after overthrowing
  - after bringing down
  lexicon: BDAG
  rationale: The aorist participle from καθαιρέω here refers to God's action against
    the Canaanite nations in conquest. 'Destroying' communicates the force clearly
    in natural English; 'overthrowing' is possible but can sound less decisive than
    the context warrants.
- source_word: ἔθνη ἑπτὰ
  chosen: seven nations
  alternatives:
  - seven peoples
  lexicon: BDAG
  rationale: ἔθνη commonly means 'nations' or 'peoples.' In this historical-conquest
    setting, 'nations' is the most standard and clear rendering.
- source_word: ἐν γῇ Χανάαν
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: BDAG
  rationale: The phrase explicitly includes γῇ ('land'), so the translation preserves
    it rather than compressing to simply 'in Canaan.'
- source_word: κατεκληρονόμησεν
  chosen: he gave them their land as an inheritance
  alternatives:
  - he distributed their land
  - he allotted their land as an inheritance
  lexicon: BDAG
  rationale: The verb κατακληρονομέω can mean to assign or distribute by lot/inheritance.
    In context, the sense is that God apportioned the conquered land to Israel as
    an inheritance. Rendering it this way makes the implied recipient explicit in
    idiomatic English while preserving the inheritance theme.
- source_word: τὴν γῆν αὐτῶν
  chosen: their land
  alternatives:
  - the land of those nations
  - their territory
  lexicon: BDAG
  rationale: αὐτῶν refers to the seven nations just mentioned, so 'their land' is
    the most direct and natural rendering.
