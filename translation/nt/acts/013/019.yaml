theological_decisions:
- issue: Subject and implied recipient of the inheritance
  chosen_reading: God is the subject of both actions, and the land of the seven nations
    is given to Israel as an inheritance.
  alternative_readings:
  - God distributed their land
  - he allotted their land
  rationale: The immediate context recounts God's acts in Israel's history. Although
    the Greek does not state the indirect object explicitly, the historical sense
    requires that the land was given to Israel. This is an idiomatic clarification
    rather than a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §3, §6
