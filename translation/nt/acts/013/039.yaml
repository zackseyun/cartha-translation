id: ACT.13.39
reference: Acts 13:39
source:
  edition: SBLGNT
  text: ἐν τούτῳ πᾶς ὁ πιστεύων δικαιοῦται.
translation:
  text: In him everyone who believes is justified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By this one everyone who believes is justified.' The Greek phrase ἐν
      τούτῳ can be rendered more literally as 'in/by this one,' referring to Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: In him
  alternatives:
  - By this one
  - In this one
  lexicon: BDAG
  rationale: 'In the immediate context Paul has just spoken of Jesus (vv. 38–39),
    so the demonstrative is best taken personally/anaphorically: ''in him.'' This
    is more natural English than the more wooden ''in this one'' while preserving
    the Greek prepositional construction.'
- source_word: πᾶς ὁ πιστεύων
  chosen: everyone who believes
  alternatives:
  - everyone believing
  - all who believe
  lexicon: BDAG
  rationale: The articular present participle functions substantivally and generically.
    'Everyone who believes' is idiomatic modern English and preserves the ongoing/generic
    force without awkwardness.
- source_word: δικαιοῦται
  chosen: is justified
  alternatives:
  - is declared righteous
  - is acquitted
  lexicon: BDAG
  rationale: For Pauline usage, 'justify' is the standard rendering of δικαιόω and
    preserves the legal-forensic sense without over-paraphrasing. 'Declared righteous'
    is interpretive expansion; 'acquitted' is too narrow.
