theological_decisions:
- issue: Referent of ἐν τούτῳ
  chosen_reading: 'personal reference to Jesus: ''In him'''
  alternative_readings:
  - 'instrumental or impersonal: ''by this one'' / ''in this'''
  rationale: The preceding clause names Jesus as the one through whom forgiveness
    is proclaimed, and this clause continues that christological focus. Rendering
    the phrase personally best reflects the discourse flow without importing extra
    theology.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of δικαιοῦται in a Pauline context
  chosen_reading: forensic 'is justified'
  alternative_readings:
  - '''is declared righteous'''
  - '''is set right'''
  rationale: The verse stands in a law-and-justification contrast in the immediate
    context (v. 39 as a whole), so the established forensic sense is most faithful.
    This preserves theological tension without collapsing justification into moral
    transformation.
  doctrine_reference: Translation philosophy §3, §5
