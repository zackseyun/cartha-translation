theological_decisions:
- issue: Referent of 'the prophets'
  chosen_reading: a reference to the prophetic writings/scriptural prophets as a corpus
  alternative_readings:
  - a reference primarily to the human prophetic speakers
  rationale: In context Paul is about to quote Habakkuk, so the phrase points to what
    stands written in the prophetic Scriptures. Rendering 'in the prophets' preserves
    that scriptural reference without over-interpreting the phrase as merely instrumental
    ('by the prophets').
