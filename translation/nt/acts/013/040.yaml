id: ACT.13.40
reference: Acts 13:40
source:
  edition: SBLGNT
  text: βλέπετε οὖν μὴ ⸀ἐπέλθῃ τὸ εἰρημένον ἐν τοῖς προφήταις·
translation:
  text: 'Therefore watch out, lest what has been spoken in the prophets come upon
    you:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the prophets.' The Greek reads 'in the prophets,' likely referring
      to the prophetic writings as the place where this warning is found.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  chosen: watch out
  alternatives:
  - beware
  - see to it
  lexicon: BDAG
  rationale: Second person plural present imperative functioning as a warning. 'Watch
    out' is idiomatic modern English that preserves the force of urgent caution better
    than the more formal 'beware' while remaining close to the Greek.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Draws an inference from the preceding proclamation and warning. 'Therefore'
    clearly marks the logical connection in English.
- source_word: μὴ ἐπέλθῃ
  chosen: lest ... come upon you
  alternatives:
  - so that ... may not come upon you
  - that ... not overtake you
  lexicon: BDAG
  rationale: 'μή with the aorist subjunctive after an imperative expresses a negative
    purpose/warning: ''lest'' or ''so that not.'' ''Come upon you'' reflects ἐπέρχομαι
    naturally in a context of impending judgment.'
- source_word: τὸ εἰρημένον
  chosen: what has been spoken
  alternatives:
  - the thing spoken
  - what was said
  lexicon: BDAG
  rationale: The neuter singular perfect passive participle with article is substantival.
    'What has been spoken' preserves both the substantival sense and the abiding force
    of the perfect better than the flatter 'what was said.'
- source_word: ἐν τοῖς προφήταις
  chosen: in the prophets
  alternatives:
  - by the prophets
  - in the prophetic writings
  lexicon: BDAG
  rationale: The preposition ἐν is retained as 'in,' pointing to what is written within
    the prophetic corpus rather than directly emphasizing agency. 'In the prophets'
    is slightly unusual in English but faithful and intelligible in context.
