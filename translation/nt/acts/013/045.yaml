theological_decisions:
- issue: Potential anti-Jewish overreading of οἱ Ἰουδαῖοι
  chosen_reading: the Jews
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation keeps the textually explicit designation 'the Jews' rather
    than narrowing it interpretively. However, the phrase refers to a particular group
    in the narrative setting, not to all Jewish people universally. A footnote clarifies
    this to avoid importing a broader ethnic condemnation not warranted by the text.
  doctrine_reference: Translation philosophy §1, §6
