id: ACT.13.45
reference: Acts 13:45
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ Ἰουδαῖοι τοὺς ὄχλους ἐπλήσθησαν ζήλου καὶ ἀντέλεγον τοῖς ⸀ὑπὸ
    Παύλου ⸀λαλουμένοις ⸀βλασφημοῦντες.
translation:
  text: But when the Jews saw the crowds, they were filled with jealousy and began
    contradicting what was being spoken by Paul, blaspheming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the local Jewish group opposing Paul in this scene, not the Jewish
      people as a whole.
    reason: cultural_note
  - marker: b
    text: Or 'were filled with zeal'; here the context favors the negative sense,
      'jealousy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the things Paul was saying.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in smooth English:
    ''when ... saw.'' This preserves the participial relation to the main verb without
    awkward literalism.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast with the previous positive response to Paul's
    message; 'But' best signals the narrative turn.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek text simply says 'the Jews.' In Acts this can denote a local
    Jewish group in opposition, but the text here does not specify leaders only, so
    the broader literal rendering is retained.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  - the crowd
  lexicon: BDAG
  rationale: ὄχλοι is plural and refers to gathered masses of people; 'the crowds'
    is natural modern English and preserves the plural.
- source_word: ἐπλήσθησαν ζήλου
  chosen: were filled with jealousy
  alternatives:
  - were filled with zeal
  - became jealous
  lexicon: BDAG
  rationale: ζῆλος can mean either positive 'zeal' or negative 'jealousy/envy.' In
    this hostile context, prompted by seeing the crowds and followed by contradiction
    and blasphemy, the negative sense is clearly intended. 'Were filled with jealousy'
    closely reflects the idiom ἐπλήσθησαν + genitive.
- source_word: ἀντέλεγον
  chosen: began contradicting
  alternatives:
  - were opposing
  - kept speaking against
  - contradicted
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or inceptive action. 'Began contradicting'
    captures the narrative onset of their opposition in idiomatic English.
- source_word: τοῖς ὑπὸ Παύλου λαλουμένοις
  chosen: what was being spoken by Paul
  alternatives:
  - the things spoken by Paul
  - the things Paul was saying
  lexicon: BDAG
  rationale: The articular participle with ὑπό + genitive is most naturally rendered
    as a substantive phrase referring to Paul's spoken message. 'What was being spoken
    by Paul' preserves the passive construction and content focus.
- source_word: βλασφημοῦντες
  chosen: blaspheming
  alternatives:
  - speaking abusively
  - reviling
  - slandering
  lexicon: BDAG
  rationale: The participle likely expresses manner accompanying their contradiction.
    'Blaspheming' is the traditional and lexically strong rendering, and in this context
    likely refers to abusive speech against the message and, by implication, God.
    It preserves the gravity of the Greek without over-specifying the object.
