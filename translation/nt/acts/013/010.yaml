id: ACT.13.10
reference: Acts 13:10
source:
  edition: SBLGNT
  text: εἶπεν· Ὦ πλήρης παντὸς δόλου καὶ πάσης ῥᾳδιουργίας, υἱὲ διαβόλου, ἐχθρὲ πάσης
    δικαιοσύνης, οὐ παύσῃ διαστρέφων τὰς ⸀ὁδοὺς κυρίου τὰς εὐθείας;
translation:
  text: And he said, “You who are full of every kind of deceit and every kind of villainy,
    son of the devil, enemy of all righteousness, will you not stop twisting the straight
    ways of the Lord?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enemy of all justice.' The Greek word can denote righteousness or justice
      depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήρης παντὸς δόλου
  chosen: full of every kind of deceit
  alternatives:
  - full of all deceit
  - full of every deceit
  lexicon: BDAG
  rationale: πλήρης with the genitive indicates being characterized by or filled with
    something. δόλος commonly denotes deceit, treachery, or guile. 'Every kind of
    deceit' renders παντός idiomatically in English while preserving the comprehensive
    force.
- source_word: πάσης ῥᾳδιουργίας
  chosen: every kind of villainy
  alternatives:
  - all fraud
  - all knavery
  - all wickedness
  lexicon: BDAG
  rationale: ῥᾳδιουργία carries the sense of unscrupulousness, knavery, or villainous
    conduct, not merely generic evil. 'Villainy' preserves the sharp moral accusation
    and pairs well with 'deceit' without collapsing the two terms into synonyms.
- source_word: υἱὲ διαβόλου
  chosen: son of the devil
  alternatives:
  - child of the devil
  lexicon: BDAG
  rationale: The vocative υἱέ is literally 'son.' In Semitic and biblical idiom, 'son
    of' can denote moral likeness or belonging. The more literal 'son of the devil'
    preserves the force of the rebuke better than the more generalized 'child of the
    devil.'
- source_word: ἐχθρὲ πάσης δικαιοσύνης
  chosen: enemy of all righteousness
  alternatives:
  - enemy of all justice
  lexicon: BDAG
  rationale: δικαιοσύνη defaults to 'righteousness' per doctrine guidance, though
    'justice' is a possible gloss. Here the phrase denotes opposition to what is morally
    right and upright. The default rendering is retained, with the alternative preserved
    in a footnote.
- source_word: οὐ παύσῃ
  chosen: will you not stop
  alternatives:
  - will you not cease
  - will you never stop
  lexicon: BDAG
  rationale: Future middle indicative used rhetorically in a rebuke functions naturally
    in English as 'will you not stop...?' This preserves the confrontational question
    better than a wooden future. 'Will you never stop' is possible but slightly intensifies
    beyond the Greek.
- source_word: διαστρέφων
  chosen: twisting
  alternatives:
  - perverting
  - distorting
  lexicon: BDAG
  rationale: διαστρέφω means to distort, pervert, or twist from a right course. 'Twisting'
    works idiomatically with 'ways' and preserves the metaphor of bending what should
    be straight.
- source_word: τὰς ὁδοὺς κυρίου τὰς εὐθείας
  chosen: the straight ways of the Lord
  alternatives:
  - the straight paths of the Lord
  - the right ways of the Lord
  lexicon: BDAG
  rationale: ὁδοί can be rendered 'ways' or 'paths'; 'ways' better captures both literal
    and metaphorical senses in biblical usage. τὰς εὐθείας is attributive, 'the straight
    [ways],' emphasizing uprightness and directness. κύριος is rendered 'Lord' per
    doctrinal default.
- source_word: Ὦ
  chosen: You who are
  alternatives:
  - O
  - Oh
  lexicon: BDAG
  rationale: Ὦ marks direct, emphatic address. In contemporary English, retaining
    a bare 'O' can sound archaic. 'You who are' carries the vocative force naturally
    in readable modern English while introducing the string of accusatory descriptors.
