theological_decisions:
- issue: Symbolic act of shaking dust from the feet
  chosen_reading: Rendered plainly as a gesture 'against them' without expanding its
    meaning in the main text.
  alternative_readings:
  - as a testimony against them
  - as a sign of judgment against them
  rationale: The action carries known biblical significance, but the Greek text itself
    states only the act and its direction. To avoid importing interpretation into
    the translation, the main text remains concise; explanatory nuance is preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
