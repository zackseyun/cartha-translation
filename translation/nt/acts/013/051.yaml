id: ACT.13.51
reference: Acts 13:51
source:
  edition: SBLGNT
  text: οἱ δὲ ἐκτιναξάμενοι τὸν κονιορτὸν τῶν ⸀ποδῶν ἐπ’ αὐτοὺς ἦλθον εἰς Ἰκόνιον,
translation:
  text: But they shook off the dust from their feet against them and went to Iconium.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shaking off the dust from one's feet was a symbolic act of dissociation
      and testimony against those who rejected the message.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ
  chosen: But they
  alternatives:
  - And they
  - But those men
  lexicon: BDAG
  rationale: δέ marks a mild contrast or narrative transition; English 'But' preserves
    the adversative nuance. The article with participle functions substantivally,
    referring back to Paul and Barnabas, so 'they' is natural English.
- source_word: ἐκτιναξάμενοι
  chosen: shook off
  alternatives:
  - having shaken off
  - shook out
  lexicon: BDAG
  rationale: Aorist middle participle of ἐκτινάσσω denotes forcefully shaking something
    off/out. 'Shook off' is idiomatic in English and fits the symbolic action. The
    participle is rendered with a finite verb in coordination for natural English
    under optimal equivalence.
- source_word: τὸν κονιορτὸν
  chosen: the dust
  alternatives:
  - the dirt
  lexicon: BDAG
  rationale: κονιορτός refers to dust, especially loose dust stirred from the ground.
    'Dust' is the standard and most precise rendering in this gesture context.
- source_word: τῶν ποδῶν
  chosen: from their feet
  alternatives:
  - of their feet
  lexicon: BDAG
  rationale: The genitive depends on 'dust' in an idiomatic expression. English requires
    'from their feet' to express the source relation naturally.
- source_word: ἐπ’ αὐτοὺς
  chosen: against them
  alternatives:
  - at them
  - in protest against them
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys direction with hostile or testimonial
    force in this symbolic act. 'Against them' best preserves the sense of witness/judgment
    without over-expanding the text.
- source_word: ἦλθον
  chosen: went
  alternatives:
  - came
  - departed
  lexicon: BDAG
  rationale: Though ἔρχομαι often means 'come,' in narrative movement toward a named
    destination it is commonly rendered 'went' from the speaker's perspective in English.
- source_word: εἰς Ἰκόνιον
  chosen: to Iconium
  alternatives:
  - into Iconium
  lexicon: BDAG
  rationale: εἰς marks movement toward/into the city. 'To Iconium' is standard idiomatic
    English for travel to a city.
