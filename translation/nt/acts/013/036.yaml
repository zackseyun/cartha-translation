theological_decisions:
- issue: Rendering death euphemism in relation to David
  chosen_reading: fell asleep
  alternative_readings:
  - died
  rationale: The text uses κοιμάομαι rather than a more direct verb for dying. Preserving
    the euphemism maintains the biblical idiom and avoids importing additional doctrinal
    claims while still clearly referring to death in context.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering βουλή with respect to divine intentionality
  chosen_reading: God’s purpose
  alternative_readings:
  - the counsel of God
  - God’s plan
  rationale: The verse speaks of David serving in relation to God’s intended purpose
    for his generation. 'Purpose' is accessible modern English and preserves divine
    sovereignty without forcing a narrower theological system.
  doctrine_reference: Translation philosophy §§1, 6
