id: ACT.13.36
reference: Acts 13:36
source:
  edition: SBLGNT
  text: Δαυὶδ μὲν γὰρ ἰδίᾳ γενεᾷ ὑπηρετήσας τῇ τοῦ θεοῦ βουλῇ ἐκοιμήθη καὶ προσετέθη
    πρὸς τοὺς πατέρας αὐτοῦ καὶ εἶδεν διαφθοράν,
translation:
  text: For David, after serving God’s purpose in his own generation, fell asleep
    and was gathered to his fathers and saw decay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having served the purpose/counsel of God in his own generation.'
    reason: lexical_alternative
  - marker: b
    text: '''Fell asleep'' is a biblical euphemism for death.'
    reason: cultural_note
  - marker: c
    text: Or 'was added to his fathers,' a Hebrew-style idiom meaning he joined his
      forefathers in death.
    reason: lexical_alternative
  - marker: d
    text: That is, his body underwent decay; compare the contrast in the following
      verse.
    reason: cross_reference
lexical_decisions:
- source_word: ἰδίᾳ γενεᾷ
  chosen: in his own generation
  alternatives:
  - for his own generation
  - among his own generation
  lexicon: BDAG
  rationale: Dative phrase indicating the sphere/time of David’s service; 'in his
    own generation' is idiomatic and preserves the temporal-historical sense without
    overinterpreting it as beneficiary ('for').
- source_word: ὑπηρετήσας
  chosen: after serving
  alternatives:
  - having served
  - having ministered
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verbs; 'after serving' gives
    clear English sequence. 'Served' fits the context better than 'ministered,' which
    can sound ecclesiastical and narrower than the Greek.
- source_word: τῇ τοῦ θεοῦ βουλῇ
  chosen: God’s purpose
  alternatives:
  - the purpose of God
  - the counsel of God
  - God’s plan
  lexicon: BDAG
  rationale: βουλή here denotes purpose/plan/counsel. 'God’s purpose' is natural modern
    English and preserves divine intentionality without the archaic feel of 'counsel.'
- source_word: ἐκοιμήθη
  chosen: fell asleep
  alternatives:
  - died
  lexicon: BDAG
  rationale: The verb is a conventional euphemism for death. Rendering it literally
    as 'fell asleep' preserves the source metaphor and its biblical resonance, rather
    than flattening it to 'died'.
- source_word: προσετέθη πρὸς τοὺς πατέρας αὐτοῦ
  chosen: was gathered to his fathers
  alternatives:
  - was added to his fathers
  - was gathered to his ancestors
  lexicon: BDAG
  rationale: This is a Semitic/biblical idiom for joining one’s forefathers in death.
    'Was gathered to his fathers' is established, clear, and closer to the idiom than
    'ancestors,' while 'added' is too wooden in English.
- source_word: εἶδεν διαφθοράν
  chosen: saw decay
  alternatives:
  - experienced corruption
  - underwent decay
  lexicon: BDAG
  rationale: The phrase means that David’s body underwent decomposition. 'Saw decay'
    is the direct and rhetorically important wording in this context, echoing the
    Psalm citation and contrast with the one who did not see decay.
