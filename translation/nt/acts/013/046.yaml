id: ACT.13.46
reference: Acts 13:46
source:
  edition: SBLGNT
  text: παρρησιασάμενοί ⸀τε ὁ Παῦλος καὶ ὁ Βαρναβᾶς εἶπαν· Ὑμῖν ἦν ἀναγκαῖον πρῶτον
    λαληθῆναι τὸν λόγον τοῦ θεοῦ· ⸀ἐπειδὴ ἀπωθεῖσθε αὐτὸν καὶ οὐκ ἀξίους κρίνετε ἑαυτοὺς
    τῆς αἰωνίου ζωῆς, ἰδοὺ στρεφόμεθα εἰς τὰ ἔθνη·
translation:
  text: So Paul and Barnabas spoke boldly and said, “It was necessary that the word
    of God be spoken first to you. Since you are rejecting it and judging yourselves
    unworthy of eternal life, look, we are turning to the Gentiles.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the nations.” Here the phrase refers to non-Jews in contrast with
      the synagogue audience, so “Gentiles” is used in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησιασάμενοί
  chosen: spoke boldly
  alternatives:
  - became bold
  - spoke openly
  lexicon: BDAG
  rationale: 'The participle from παρρησιάζομαι conveys bold, frank speech. In context
    it is best rendered adverbially with the main verb εἶπαν: ''spoke boldly and said,''
    preserving both the manner and the narrative flow in natural English.'
- source_word: τέ
  chosen: So
  alternatives:
  - and
  - then
  - ': implicit/not separately rendered'
  lexicon: BDAG
  rationale: τέ lightly links the participial clause with the main clause. English
    often does not require a separate equivalent; 'So' captures the discourse connection
    without woodenly reproducing the particle.
- source_word: Ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun marking the initial audience of the proclamation. 'To
    you' fits naturally with 'be spoken' and preserves the directional sense.
- source_word: ἀναγκαῖον
  chosen: necessary
  alternatives:
  - required
  - obligatory
  lexicon: BDAG
  rationale: Conveys necessity or compulsion. 'Necessary' is the most straightforward
    and idiomatic rendering here.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  - in the first place
  lexicon: BDAG
  rationale: 'Marks priority in sequence: the message was to go to the Jews before
    turning to the Gentiles. ''First'' is concise and sufficient.'
- source_word: λαληθῆναι
  chosen: be spoken
  alternatives:
  - be proclaimed
  - be told
  lexicon: BDAG
  rationale: Aorist passive infinitive of λαλέω, literally 'to be spoken.' While 'proclaimed'
    is possible, 'be spoken' stays closer to the Greek while remaining clear in English.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God’s word
  - the message of God
  lexicon: BDAG
  rationale: Standard NT expression for God's message/revelation. 'The word of God'
    preserves the established biblical phrase and fits the context.
- source_word: ἐπειδὴ
  chosen: Since
  alternatives:
  - because
  - inasmuch as
  - seeing that
  lexicon: BDAG
  rationale: Introduces the reason for the turn to the Gentiles. 'Since' is natural
    and clearly causal.
- source_word: ἀπωθεῖσθε
  chosen: are rejecting
  alternatives:
  - push away
  - repudiate
  - thrust aside
  lexicon: BDAG
  rationale: Present middle indicates active refusal of the message. 'Are rejecting'
    communicates ongoing repudiation in idiomatic English.
- source_word: αὐτὸν
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: Although αὐτόν is masculine singular and could grammatically refer to
    λόγον, English naturally refers back to 'the word' as 'it.' This avoids awkwardness
    while preserving the referent.
- source_word: οὐκ ἀξίους κρίνετε ἑαυτοὺς
  chosen: judging yourselves unworthy
  alternatives:
  - considering yourselves unworthy
  - deeming yourselves not worthy
  lexicon: BDAG
  rationale: The construction means they render a verdict on themselves by their response.
    'Judging yourselves unworthy' preserves the judicial nuance of κρίνω and the reflexive
    force.
- source_word: τῆς αἰωνίου ζωῆς
  chosen: of eternal life
  alternatives:
  - for eternal life
  lexicon: BDAG
  rationale: Genitive after ἀξίους. English idiom commonly uses 'unworthy of eternal
    life,' which clearly conveys the sense.
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: A discourse marker drawing attention to the announced shift. 'Look' is
    readable modern English; 'behold' would sound archaic.
- source_word: στρεφόμεθα
  chosen: we are turning
  alternatives:
  - we turn
  - we are turning ourselves
  lexicon: BDAG
  rationale: Present tense highlights the decisive movement now being made in mission
    focus. 'We are turning' preserves the immediacy.
- source_word: εἰς τὰ ἔθνη
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts this phrase commonly denotes non-Jews rather than nations in
    a geopolitical sense. 'Gentiles' best communicates the Jew/Gentile contrast central
    to the passage.
