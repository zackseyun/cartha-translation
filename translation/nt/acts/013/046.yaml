theological_decisions:
- issue: Meaning of τὰ ἔθνη in salvation-historical context
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The immediate contrast is between the synagogue audience ('you') and
    non-Jews. Rendering ἔθνη as 'Gentiles' preserves Luke's ethnic-redemptive contrast
    without flattening it into a merely geographic reference.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of οὐκ ἀξίους κρίνετε ἑαυτοὺς τῆς αἰωνίου ζωῆς
  chosen_reading: Their rejection shows they judge themselves unworthy of eternal
    life
  alternative_readings:
  - Paul declares them objectively unworthy of eternal life
  rationale: The Greek explicitly places the act of judgment on the hearers themselves
    (κρίνετε ἑαυτούς). The translation preserves that reflexive force and does not
    import a broader doctrinal conclusion beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
