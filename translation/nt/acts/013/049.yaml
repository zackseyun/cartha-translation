id: ACT.13.49
reference: Acts 13:49
source:
  edition: SBLGNT
  text: διεφέρετο δὲ ὁ λόγος τοῦ κυρίου δι’ ὅλης τῆς χώρας.
translation:
  text: And the word of the Lord was being spread throughout the whole region.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message of the Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφέρετο
  chosen: was being spread
  alternatives:
  - spread
  - was carried
  - was spreading
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing action in past time. 'Was being spread'
    preserves both the progressive aspect and the passive sense better than a simple
    'spread.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - So
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural English and avoids overstating contrast.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος in Acts often refers to the proclaimed message of the gospel. 'The
    word' preserves the recurring Lukan idiom, while the contextual sense remains
    clear in English.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' In Acts this phrase commonly
    denotes the message belonging to or concerning the risen Lord, and 'of the Lord'
    preserves that theological and literary resonance.
- source_word: δι’ ὅλης
  chosen: throughout the whole
  alternatives:
  - through the entire
  - through all
  lexicon: BDAG
  rationale: διά with the genitive here expresses extension through an area. 'Throughout
    the whole' is idiomatic and reflects the comprehensiveness conveyed by ὅλης.
- source_word: τῆς χώρας
  chosen: region
  alternatives:
  - district
  - country
  - territory
  lexicon: BDAG
  rationale: χώρα denotes the surrounding geographical area rather than a modern nation-state.
    'Region' is the clearest modern English equivalent in this context.
