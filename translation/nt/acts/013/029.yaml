id: ACT.13.29
reference: Acts 13:29
source:
  edition: SBLGNT
  text: ὡς δὲ ἐτέλεσαν πάντα τὰ περὶ αὐτοῦ γεγραμμένα, καθελόντες ἀπὸ τοῦ ξύλου ἔθηκαν
    εἰς μνημεῖον.
translation:
  text: And when they had carried out all that had been written concerning him, they
    took him down from the tree and laid him in a tomb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cross'; Greek 'tree' (ξύλον), a term also used for the wooden instrument
      of execution and possibly echoing Deuteronomy 21:23.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: And when
  alternatives:
  - Now when
  - And after
  lexicon: BDAG
  rationale: Introduces the next event with a temporal sense. 'And when' is natural
    English and preserves the narrative flow better than a more wooden 'now when.'
- source_word: ἐτέλεσαν
  chosen: had carried out
  alternatives:
  - fulfilled
  - completed
  - finished
  lexicon: BDAG
  rationale: τελέω here means to bring to completion or accomplish. 'Had carried out'
    fits the plural human subject and avoids implying that the writings themselves
    were merely 'finished'; it conveys that what was written concerning him was brought
    to fulfillment through their actions.
- source_word: πάντα τὰ περὶ αὐτοῦ γεγραμμένα
  chosen: all that had been written concerning him
  alternatives:
  - all the things written about him
  - everything written concerning him
  lexicon: BDAG
  rationale: This phrase refers comprehensively to the scriptural things written about
    Jesus. 'Concerning him' is slightly more formal and matches περὶ αὐτοῦ well; the
    pluperfect 'had been written' reflects the prior written state implied by γεγραμμένα
    in context.
- source_word: καθελόντες
  chosen: they took him down
  alternatives:
  - having taken him down
  - they brought him down
  lexicon: BDAG
  rationale: An aorist participle preceding the main verb, naturally rendered in English
    as a finite verb in sequence. 'Took him down' is idiomatic and clearly refers
    to removing Jesus' body from the execution instrument.
- source_word: ἀπὸ τοῦ ξύλου
  chosen: from the tree
  alternatives:
  - from the wood
  - from the cross
  lexicon: BDAG
  rationale: ξύλον literally means 'wood' or 'tree' and in early Christian usage can
    denote the wooden execution device. Following original-language primacy, 'tree'
    preserves the lexical choice and its likely allusion to Deut 21:23, rather than
    importing the more interpretive 'cross' into the main text.
- source_word: ἔθηκαν
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: τίθημι is broad ('put/place'), but 'laid' is the most natural English
    verb for placing a body in burial.
- source_word: εἰς μνημεῖον
  chosen: in a tomb
  alternatives:
  - in a memorial tomb
  - in a grave
  lexicon: BDAG
  rationale: μνημεῖον in this context is a burial tomb. 'Tomb' is the clearest and
    most standard modern rendering.
