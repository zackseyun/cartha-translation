theological_decisions:
- issue: Rendering ξύλον in a passion context
  chosen_reading: tree
  alternative_readings:
  - cross
  rationale: The Greek term is ξύλον, not σταυρός. Rendering it as 'tree' preserves
    the lexical form and possible scriptural resonance with curse-on-a-tree language,
    while avoiding unnecessary harmonization to more familiar passion terminology.
    Because 'cross' is a common contextual rendering, it is preserved in a footnote
    as an alternative.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
