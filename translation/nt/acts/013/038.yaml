id: ACT.13.38
reference: Acts 13:38
source:
  edition: SBLGNT
  text: γνωστὸν οὖν ἔστω ὑμῖν, ἄνδρες ἀδελφοί, ὅτι διὰ τούτου ὑμῖν ἄφεσις ἁμαρτιῶν
    καταγγέλλεται, καὶ ἀπὸ πάντων ὧν οὐκ ἠδυνήθητε ⸀ἐν νόμῳ Μωϋσέως δικαιωθῆναι
translation:
  text: Therefore let it be known to you, brothers, that through this one forgiveness
    of sins is proclaimed to you, and from all the things from which you could not
    be justified by the law of Moses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' if the address is understood inclusively to the
      gathered audience.
    reason: lexical_alternative
  - marker: b
    text: That is, Jesus, the one just mentioned.
    reason: cross_reference
  - marker: c
    text: Or 'be declared righteous.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν οὖν ἔστω ὑμῖν
  chosen: Therefore let it be known to you
  alternatives:
  - Therefore know
  - Therefore be it known to you
  lexicon: BDAG
  rationale: Uses a natural but still formal English equivalent for the impersonal
    imperative construction. 'Therefore' reflects οὖν, and 'let it be known to you'
    preserves the declarative force of γνωστὸν ... ἔστω.
- source_word: ἄνδρες ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - men, brothers
  lexicon: BDAG
  rationale: The address is vocative and idiomatic. 'Brothers' preserves the masculine
    plural form and the familial covenantal address without over-literal awkwardness.
    A footnote preserves the inclusive sense that may be present in audience reference.
- source_word: διὰ τούτου
  chosen: through this one
  alternatives:
  - through him
  - through this man
  lexicon: BDAG
  rationale: τούτου is masculine singular and refers back to the immediately preceding
    referent, Jesus. 'Through this one' is a transparent rendering that avoids adding
    'man' where the Greek simply has the demonstrative, while still preserving personal
    reference.
- source_word: ἄφεσις ἁμαρτιῶν
  chosen: forgiveness of sins
  alternatives:
  - release of sins
  - remission of sins
  lexicon: BDAG
  rationale: '''Forgiveness of sins'' is the clearest and most established sense in
    this context. ''Remission'' is traditional but less accessible; ''release'' is
    too wooden here.'
- source_word: καταγγέλλεται
  chosen: is proclaimed
  alternatives:
  - is announced
  - is declared
  lexicon: BDAG
  rationale: The present passive indicates public proclamation. 'Is proclaimed' best
    captures the heraldic force of the verb in apostolic preaching.
- source_word: ἀπὸ πάντων ὧν
  chosen: from all the things from which
  alternatives:
  - from all things from which
  - from everything from which
  lexicon: BDAG
  rationale: This preserves the repeated prepositional structure and prepares for
    the infinitive clause. Slightly fuller English avoids ambiguity about the antecedent.
- source_word: οὐκ ἠδυνήθητε
  chosen: you could not
  alternatives:
  - you were not able to
  - you were unable to
  lexicon: BDAG
  rationale: A straightforward idiomatic rendering of the aorist middle/passive form
    of δύναμαι in context.
- source_word: ἐν νόμῳ Μωϋσέως
  chosen: by the law of Moses
  alternatives:
  - in the law of Moses
  - by means of the law of Moses
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' with δικαιωθῆναι the sense is instrumental/sphere-related:
    justification was not attainable by means of or within the Mosaic law. ''By the
    law of Moses'' is concise and idiomatic.'
- source_word: δικαιωθῆναι
  chosen: be justified
  alternatives:
  - be declared righteous
  - be acquitted
  lexicon: BDAG
  rationale: In Pauline and Lukan theological context, δικαιόω here carries forensic
    covenantal weight. 'Be justified' preserves the established theological term without
    over-paraphrasing. An alternative is preserved in a footnote for clarity.
