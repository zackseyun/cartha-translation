theological_decisions:
- issue: Rendering of δικαιωθῆναι in relation to Mosaic law
  chosen_reading: be justified
  alternative_readings:
  - be declared righteous
  rationale: The verse contrasts forgiveness proclaimed through Jesus with inability
    to attain justification through the law of Moses. 'Be justified' best preserves
    the forensic and theological force without collapsing it into a purely moral transformation.
    Because this is a theologically weighty term, a clarifying lexical alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5; Contested terms table on δικαιοσύνη
    indicates preserving theological nuance in Pauline contexts.
- issue: Gendered address ἄνδρες ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Per the doctrine's gender-accurate principle, the masculine form is retained
    in the main text. Because the audience may have mixed-gender representative force
    in English reception, the inclusive alternative is preserved in a footnote rather
    than moved into the main text.
  doctrine_reference: Translation philosophy §4
