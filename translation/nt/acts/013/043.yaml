id: ACT.13.43
reference: Acts 13:43
source:
  edition: SBLGNT
  text: λυθείσης δὲ τῆς συναγωγῆς ἠκολούθησαν πολλοὶ τῶν Ἰουδαίων καὶ τῶν σεβομένων
    προσηλύτων τῷ Παύλῳ καὶ τῷ Βαρναβᾷ, οἵτινες προσλαλοῦντες ⸀αὐτοῖς ἔπειθον· αὐτοὺς
    ⸀προσμένειν τῇ χάριτι τοῦ θεοῦ.
translation:
  text: After the synagogue meeting had been dismissed, many of the Jews and of the
    devout proselytes followed Paul and Barnabas, who, speaking with them, were urging
    them to continue in the grace of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After the synagogue had broken up.' The Greek may refer to the dismissal
      of the gathered assembly rather than the building itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'were persuading them to remain in the grace of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λυθείσης ... τῆς συναγωγῆς
  chosen: After the synagogue meeting had been dismissed
  alternatives:
  - After the synagogue had broken up
  - When the assembly was dismissed
  lexicon: BDAG
  rationale: The genitive absolute marks a prior circumstance. συναγωγή can denote
    either the synagogue as a gathered assembly or the institution/building; here
    the context is the concluded gathering, so 'synagogue meeting' makes the event
    sense explicit in natural English. 'Dismissed' reflects λυθείσης idiomatically
    for the ending of an assembly.
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went along with
  - accompanied
  lexicon: BDAG
  rationale: The verb commonly means 'follow' literally or figuratively. Here it describes
    people going after Paul and Barnabas after the meeting, so 'followed' is the most
    direct rendering.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a large number
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is concise and natural.
- source_word: τῶν Ἰουδαίων
  chosen: of the Jews
  alternatives:
  - from among the Jews
  lexicon: BDAG
  rationale: The partitive genitive after πολλοὶ is naturally rendered 'many of the
    Jews.'
- source_word: τῶν σεβομένων προσηλύτων
  chosen: of the devout proselytes
  alternatives:
  - of the worshiping converts
  - of the God-fearing proselytes
  lexicon: BDAG
  rationale: προσήλυτος refers to a convert to Judaism/proselyte, not merely a sympathizer.
    σεβομένων adds the sense of reverence/devotion. 'Devout proselytes' preserves
    both elements without overloading the phrase. 'God-fearing' is possible but can
    blur the distinction from σεβόμενοι who are not full proselytes in Acts.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - and they
  lexicon: BDAG
  rationale: Refers to Paul and Barnabas and introduces what they did next. Simple
    'who' is sufficient in English.
- source_word: προσλαλοῦντες αὐτοῖς
  chosen: speaking with them
  alternatives:
  - talking to them
  - speaking further to them
  lexicon: BDAG
  rationale: The participle indicates accompanying action. The πρός prefix can suggest
    directed or additional speech; 'speaking with them' is natural and captures ongoing
    interaction without overtranslating.
- source_word: ἔπειθον
  chosen: were urging
  alternatives:
  - were persuading
  - kept encouraging
  lexicon: BDAG
  rationale: Imperfect aspect suggests continued action. In this context the content
    clause is exhortational rather than merely argumentative, so 'were urging' better
    fits than the more neutral 'were persuading,' while still reflecting πείθω.
- source_word: αὐτοὺς προσμένειν
  chosen: them to continue
  alternatives:
  - them to remain
  - them to continue steadfastly
  lexicon: BDAG
  rationale: προσμένω means remain with, continue in, persist. With the dative phrase
    that follows, 'continue' is idiomatic English and conveys ongoing perseverance.
- source_word: τῇ χάριτι τοῦ θεοῦ
  chosen: in the grace of God
  alternatives:
  - in God's grace
  - with the grace of God
  lexicon: BDAG
  rationale: The dative after προσμένειν is well represented by 'in.' χάρις here denotes
    God's gracious favor operative in the gospel, and the full phrase 'the grace of
    God' preserves the theological weight of the expression.
