theological_decisions:
- issue: Meaning of 'the grace of God' in apostolic exhortation
  chosen_reading: Retained the phrase 'continue in the grace of God' without paraphrasing
    it as either perseverance in God's favor or continuance in the gospel message
    alone.
  alternative_readings:
  - continue in God's gracious favor
  - continue in the message about God's grace
  rationale: The Greek phrase can encompass both God's gracious action and the sphere
    of life shaped by that grace. To preserve theological tension and avoid importing
    a narrower doctrinal reading, the translation keeps the more literal expression.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
