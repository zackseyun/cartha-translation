id: ACT.13.22
reference: Acts 13:22
source:
  edition: SBLGNT
  text: καὶ μεταστήσας αὐτὸν ἤγειρεν ⸂τὸν Δαυὶδ αὐτοῖς⸃ εἰς βασιλέα, ᾧ καὶ εἶπεν μαρτυρήσας·
    Εὗρον Δαυὶδ τὸν τοῦ Ἰεσσαί, ἄνδρα κατὰ τὴν καρδίαν μου, ὃς ποιήσει πάντα τὰ θελήματά
    μου.
translation:
  text: And after removing him, he raised up David for them as king, to whom he also
    bore witness and said, ‘I have found David the son of Jesse, a man according to
    my heart, who will do all my wills.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “a man after my own heart.” The Greek more literally
      says “according to my heart.”
    reason: lexical_alternative
  - marker: b
    text: Greek “all my wills,” with the noun in the plural; many English translations
      smooth this to “all my will.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταστήσας
  chosen: after removing him
  alternatives:
  - after deposing him
  - after taking him away
  lexicon: BDAG
  rationale: Aorist participle of μεθίστημι here refers to God's removal of Saul from
    kingship. 'Removing' is broad and natural; 'deposing' is possible but slightly
    more interpretive/political.
- source_word: ἤγειρεν
  chosen: raised up
  alternatives:
  - appointed
  - brought forward
  lexicon: BDAG
  rationale: ἐγείρω can mean 'raise up' in the sense of bringing forth or appointing
    a leader. 'Raised up' preserves the biblical idiom and avoids over-narrowing to
    mere appointment, while context makes clear this is enthronement, not resurrection.
- source_word: αὐτοῖς
  chosen: for them
  alternatives:
  - for them/for their benefit
  - to them
  lexicon: BDAG
  rationale: 'Dative pronoun indicates advantage/benefit in context: David was raised
    up for Israel as king.'
- source_word: εἰς βασιλέα
  chosen: as king
  alternatives:
  - to be king
  - for king
  lexicon: BDAG
  rationale: εἰς with predicate accusative expresses result or role. 'As king' is
    idiomatic English and accurately conveys appointment to kingship.
- source_word: ᾧ καὶ εἶπεν μαρτυρήσας
  chosen: to whom he also bore witness and said
  alternatives:
  - about whom he also testified and said
  - for whom he also gave testimony and said
  lexicon: BDAG
  rationale: μαρτυρήσας is an attendant participle explaining the manner of God's
    speech concerning David. 'Bore witness' preserves the testimonial nuance; 'to
    whom' follows the dative relative, though in English the sense is effectively
    'about whom.'
- source_word: Εὗρον
  chosen: I have found
  alternatives:
  - I found
  lexicon: BDAG
  rationale: The aorist in a citation of divine speech can be rendered as English
    present perfect to sound natural while preserving completed action with present
    relevance.
- source_word: τὸν τοῦ Ἰεσσαί
  chosen: the son of Jesse
  alternatives:
  - son of Jesse
  - the one of Jesse
  lexicon: BDAG
  rationale: This genitival expression is idiomatically rendered 'the son of Jesse'
    in English.
- source_word: ἄνδρα
  chosen: a man
  alternatives:
  - a male
  - a person
  lexicon: BDAG
  rationale: ἀνήρ specifically means 'man' here, referring to David as an individual
    male. This follows the project's gender-accurate policy.
- source_word: κατὰ τὴν καρδίαν μου
  chosen: according to my heart
  alternatives:
  - after my own heart
  - in accord with my heart
  lexicon: BDAG
  rationale: The traditional idiom is often rendered 'after my own heart,' but the
    Greek more literally means 'according to my heart.' This better reflects conformity
    to God's will/choice without importing sentimental overtones.
- source_word: ποιήσει
  chosen: will do
  alternatives:
  - will carry out
  - will accomplish
  lexicon: BDAG
  rationale: Simple future of ποιέω. 'Will do' is straightforward and preserves the
    broad verbal sense.
- source_word: πάντα τὰ θελήματά μου
  chosen: all my wills
  alternatives:
  - all my desires
  - all my will
  lexicon: BDAG
  rationale: The Greek is plural, θελήματα. Rendering it as 'wills' preserves the
    plural form and the sense of God's various intentions or purposes. 'All my will'
    is smoother English but obscures the number.
