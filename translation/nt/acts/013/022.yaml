theological_decisions:
- issue: Idiomatic rendering of David's characterization
  chosen_reading: according to my heart
  alternative_readings:
  - after my own heart
  rationale: The translation favors the source text's plain sense over inherited English
    tradition. 'According to my heart' reflects κατά + accusative more transparently
    and avoids possible modern misunderstanding that God is speaking primarily of
    emotional affinity rather than conformity to his purpose.
  doctrine_reference: Translation philosophy §1, §5
- issue: Potential misunderstanding of 'raised up'
  chosen_reading: raised up David for them as king
  alternative_readings:
  - appointed David for them as king
  rationale: Although 'raised up' could be misconstrued by some readers as resurrection
    language, in context it is a standard biblical idiom for bringing forth a ruler.
    Retaining it preserves intertextual and lexical continuity while the phrase 'as
    king' clarifies the sense.
  doctrine_reference: Translation philosophy §5
