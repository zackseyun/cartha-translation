id: ACT.13.16
reference: Acts 13:16
source:
  edition: SBLGNT
  text: ἀναστὰς δὲ Παῦλος καὶ κατασείσας τῇ χειρὶ εἶπεν· Ἄνδρες Ἰσραηλῖται καὶ οἱ
    φοβούμενοι τὸν θεόν, ἀκούσατε.
translation:
  text: So Paul stood up, and motioning with his hand said, “Men of Israel, and you
    who fear God, listen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “God-fearers.” The phrase refers to those who fear God, likely Gentile
      worshipers associated with the synagogue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces Paul's physical action
    before speaking. 'Stood up' is natural modern English and preserves the concrete
    movement better than the slightly more literary 'rose'.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ marks narrative progression rather than strong contrast here. 'So'
    gives smooth English discourse flow into Paul's speech without overstating contrast.
- source_word: κατασείσας τῇ χειρὶ
  chosen: motioning with his hand
  alternatives:
  - gesturing with his hand
  - beckoning with his hand
  - waving his hand
  lexicon: BDAG
  rationale: The participial phrase describes a hand gesture used to gain attention
    or signal for quiet before speaking. 'Motioning with his hand' is idiomatic and
    avoids the potentially misleading sense of frantic waving.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard narrative speech verb. 'Said' fits the direct address that follows.
- source_word: Ἄνδρες Ἰσραηλῖται
  chosen: Men of Israel
  alternatives:
  - Israelite men
  - Men, Israelites
  lexicon: BDAG
  rationale: Vocative address. 'Men of Israel' is idiomatic English and preserves
    both the masculine vocative ἄνδρες and the ethnic/religious identification Ἰσραηλῖται.
    This follows the gender-accurate principle rather than neutralizing to 'people
    of Israel'.
- source_word: οἱ φοβούμενοι τὸν θεόν
  chosen: you who fear God
  alternatives:
  - God-fearers
  - those who fear God
  lexicon: BDAG
  rationale: This phrase likely refers to Gentile worshipers attached to the synagogue.
    'You who fear God' preserves the verbal force of the participle and remains transparent
    to readers; 'God-fearers' is possible but more label-like and less immediately
    clear.
- source_word: ἀκούσατε
  chosen: listen
  alternatives:
  - hear
  - listen up
  lexicon: BDAG
  rationale: Aorist imperative calling for attentive hearing. 'Listen' is direct,
    natural, and appropriately solemn; 'hear' is possible but less idiomatic in contemporary
    English.
