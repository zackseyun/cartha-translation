theological_decisions:
- issue: Rendering the synagogue address to Israelites and attached Gentile worshipers
  chosen_reading: “Men of Israel, and you who fear God”
  alternative_readings:
  - “Israelite men, and God-fearers”
  - “Men of Israel and those who worship God”
  rationale: The Greek distinguishes ethnic Israelites from a second group described
    as fearing God, commonly understood as Gentile God-fearers in synagogue context.
    The translation preserves that distinction without importing more technical terminology
    into the main text.
  doctrine_reference: Translation philosophy §§4–6
