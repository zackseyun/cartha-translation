theological_decisions:
- issue: Referent and force of the Isaianic quotation applied by Paul and Barnabas
  chosen_reading: Retain the direct quotation in singular ('you') without expanding
    or resolving how the servant-text is applied to apostolic mission.
  alternative_readings:
  - Interpretively paraphrasing the quotation as directly about the apostles in the
    main text
  - Explicitly identifying the quoted speaker/addressee in the translation
  rationale: The Greek cites Scripture directly and leaves the theological relationship
    between the servant text and apostolic mission implicit. Preserving the singular
    quotation maintains the text's theological tension rather than resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
