id: ACT.13.47
reference: Acts 13:47
source:
  edition: SBLGNT
  text: οὕτως γὰρ ἐντέταλται ἡμῖν ὁ κύριος· Τέθεικά σε εἰς φῶς ἐθνῶν τοῦ εἶναί σε
    εἰς σωτηρίαν ἕως ἐσχάτου τῆς γῆς.
translation:
  text: 'For so the Lord has commanded us: ‘I have set you as a light for the nations,
    so that you may be for salvation to the end of the earth.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a light to the Gentiles.' The Greek ἐθνῶν can mean 'nations' or,
      in many contexts, 'Gentiles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: so
  alternatives:
  - in this way
  - thus
  lexicon: BDAG
  rationale: Adverb introducing the manner/basis of the preceding action. 'So' is
    natural modern English and preserves the inferential force without sounding archaic
    like 'thus.'
- source_word: ἐντέταλται
  chosen: has commanded
  alternatives:
  - has given command
  - has instructed
  lexicon: BDAG
  rationale: Perfect middle/passive of ἐντέλλομαι conveys a standing command with
    present force. 'Has commanded' reflects both the authoritative sense and the continuing
    relevance of the command.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In this context it refers
    to the divine speaker of the cited Scripture and preserves the authoritative covenantal/theological
    force.
- source_word: Τέθεικά
  chosen: I have set
  alternatives:
  - I have appointed
  - I have placed
  lexicon: BDAG
  rationale: Perfect active of τίθημι in the quotation indicates an established appointment.
    'I have set' is a close, readable rendering that fits the Isaianic commissioning
    context.
- source_word: εἰς φῶς ἐθνῶν
  chosen: as a light for the nations
  alternatives:
  - for a light to the Gentiles
  - as light for the Gentiles
  lexicon: BDAG
  rationale: εἰς here is idiomatic for appointment/result ('as'). φῶς is metaphorical
    but standardly 'light.' ἐθνῶν can mean 'nations' or 'Gentiles'; 'nations' preserves
    the broader collective sense of the Isaianic mission while still including Gentiles.
- source_word: ἐθνῶν
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: BDAG
  rationale: In Acts, ἔθνη often refers to Gentiles, but in this quotation from Isaiah
    the phrase carries the broader salvation-historical sense of the peoples/nations
    beyond Israel. The alternative is preserved in a footnote because it is contextually
    plausible and traditional.
- source_word: τοῦ εἶναί σε
  chosen: so that you may be
  alternatives:
  - for you to be
  - that you should be
  lexicon: BDAG
  rationale: Articular infinitive with τοῦ expresses purpose/result. 'So that you
    may be' gives clear English purpose force without over-literal awkwardness.
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - as salvation
  - bringing salvation
  lexicon: BDAG
  rationale: εἰς again marks result/goal. 'For salvation' preserves the concise Greek
    expression and avoids over-interpreting whether the servant is personally salvation
    or the means of it.
- source_word: ἕως ἐσχάτου τῆς γῆς
  chosen: to the end of the earth
  alternatives:
  - to the farthest part of the earth
  - to the ends of the earth
  lexicon: BDAG
  rationale: The singular Greek phrase literally points to the extremity of the earth.
    'To the end of the earth' is close to the wording here, while the plural traditional
    English 'ends of the earth' is preserved as an alternative.
