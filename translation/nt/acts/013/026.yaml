theological_decisions:
- issue: Rendering of the audience designation including φοβούμενοι τὸν θεόν
  chosen_reading: Translate descriptively as 'those among you who fear God' rather
    than as the semi-technical label 'God-fearers.'
  alternative_readings:
  - the God-fearers among you
  rationale: The verse addresses both Jews ('sons of the family of Abraham') and non-Jews
    attached to the synagogue. A descriptive rendering preserves the text's meaning
    without requiring readers to know the historical label, while still leaving room
    for that background in a footnote.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve source
    meaning without importing more specificity than the text requires.'
- issue: Gendered kinship language in the vocative
  chosen_reading: Retain 'Brothers' in the main text.
  alternative_readings:
  - Brothers and sisters
  rationale: The Greek is grammatically masculine and the doctrine excerpt directs
    gender-accurate rather than gender-neutral rendering. Because the address likely
    includes a mixed audience, the inclusive implication can be noted in a footnote
    rather than altered in the main text.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
