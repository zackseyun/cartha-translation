id: ACT.13.26
reference: Acts 13:26
source:
  edition: SBLGNT
  text: Ἄνδρες ἀδελφοί, υἱοὶ γένους Ἀβραὰμ καὶ οἱ ἐν ὑμῖν φοβούμενοι τὸν θεόν, ⸀ἡμῖν
    ὁ λόγος τῆς σωτηρίας ταύτης ⸀ἐξαπεστάλη.
translation:
  text: Brothers, sons of the family of Abraham, and those among you who fear God,
    to us the message of this salvation has been sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Men, brothers.' The Greek vocative is literally masculine; the address
      may include the wider gathered audience.
    reason: lexical_alternative
  - marker: b
    text: Or 'the God-fearers among you,' a possible reference to Gentile synagogue
      adherents who worshiped the God of Israel.
    reason: cultural_note
  - marker: c
    text: Or 'the word of this salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  chosen: Brothers
  alternatives:
  - Men, brothers
  - Brothers and sisters
  lexicon: BDAG
  rationale: A conventional vocative address meaning 'brothers.' 'Men, brothers' is
    overly wooden in English, while 'Brothers and sisters' would over-specify beyond
    the masculine Greek. Per gender-accurate policy, the masculine form is retained,
    with context indicating a public address.
- source_word: υἱοὶ γένους Ἀβραὰμ
  chosen: sons of the family of Abraham
  alternatives:
  - sons of Abraham's race
  - children of the family of Abraham
  - sons of Abraham's line
  lexicon: BDAG
  rationale: υἱοὶ is explicitly 'sons,' and γένος denotes family line, stock, or people-group.
    'Sons of the family of Abraham' preserves both the filial and lineage sense without
    collapsing it to the less specific 'children of Abraham.'
- source_word: οἱ ἐν ὑμῖν φοβούμενοι τὸν θεόν
  chosen: those among you who fear God
  alternatives:
  - those among you who worship God
  - the God-fearers among you
  lexicon: BDAG
  rationale: φοβούμενοι τὸν θεόν is rendered transparently as 'who fear God.' 'God-fearers'
    is historically plausible as a semi-technical label for Gentile synagogue adherents,
    but the Greek here can be read descriptively, so the more transparent phrase is
    preferred.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: The dative is best represented as 'to us' with ἐξαπεστάλη ('has been
    sent'), preserving the directionality of the sending.
- source_word: ὁ λόγος
  chosen: the message
  alternatives:
  - the word
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' In this proclamation context, 'message'
    communicates the sense more naturally in modern English without loss of meaning.
- source_word: τῆς σωτηρίας ταύτης
  chosen: of this salvation
  alternatives:
  - about this salvation
  - of this deliverance
  lexicon: BDAG
  rationale: 'The genitive is most naturally taken as attributive/content-related
    with λόγος: ''the message of this salvation.'' ''Salvation'' is the standard rendering
    for σωτηρία here and fits Luke-Acts usage.'
- source_word: ἐξαπεστάλη
  chosen: has been sent
  alternatives:
  - was sent
  lexicon: BDAG
  rationale: The aorist passive states the completed sending of the salvation-message.
    'Has been sent' is idiomatic English that highlights present relevance in the
    speech context; 'was sent' is possible but slightly flatter.
