theological_decisions:
- issue: Possible implication of John's departure
  chosen_reading: Render the action neutrally as 'departing from them' without suggesting
    desertion or apostasy.
  alternative_readings:
  - leaving them
  - withdrawing from them
  rationale: The verse itself reports only that John departed and returned to Jerusalem.
    Although later context may cast the departure negatively, this verse alone does
    not specify motive or moral evaluation, so the translation preserves that restraint.
  doctrine_reference: Translation philosophy §1, §3
