id: ACT.13.13
reference: Acts 13:13
source:
  edition: SBLGNT
  text: Ἀναχθέντες δὲ ἀπὸ τῆς Πάφου οἱ ⸀περὶ Παῦλον ἦλθον εἰς Πέργην τῆς Παμφυλίας·
    Ἰωάννης δὲ ἀποχωρήσας ἀπ’ αὐτῶν ὑπέστρεψεν εἰς Ἱεροσόλυμα.
translation:
  text: After setting sail from Paphos, those with Paul came to Perga in Pamphylia;
    but John, departing from them, returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Paul and his companions'; literally, 'those around Paul.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb can mean 'set sail' or 'put out to sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχθέντες
  chosen: After setting sail
  alternatives:
  - Having put out to sea
  - Having sailed away
  lexicon: BDAG
  rationale: The participle of ἀνάγω in travel contexts commonly means to put out
    to sea or set sail. 'After setting sail' is natural English and preserves the
    maritime sense better than a generic 'departing'.
- source_word: οἱ περὶ Παῦλον
  chosen: those with Paul
  alternatives:
  - Paul and his companions
  - the group around Paul
  lexicon: BDAG
  rationale: The idiom οἱ περὶ + accusative refers to the people associated with a
    leader. 'Those with Paul' is a transparent rendering that avoids over-paraphrase
    while still conveying the group sense.
- source_word: ἦλθον
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: ἔρχομαι is straightforwardly 'come'/'go' depending on viewpoint. 'Came'
    follows the Greek lexical value and is idiomatic in English travel narrative.
- source_word: Πέργην τῆς Παμφυλίας
  chosen: Perga in Pamphylia
  alternatives:
  - Perga of Pamphylia
  lexicon: BDAG
  rationale: The genitive identifies the regional location of Perga. 'In Pamphylia'
    is the most natural English expression of place.
- source_word: ἀποχωρήσας
  chosen: departing from them
  alternatives:
  - withdrawing from them
  - leaving them
  lexicon: BDAG
  rationale: ἀποχωρέω means to depart or withdraw. 'Departing from them' stays close
    to the participial form and avoids importing motives for John's action.
- source_word: ὑπέστρεψεν
  chosen: returned
  alternatives:
  - went back
  lexicon: BDAG
  rationale: ὑποστρέφω regularly means 'return.' 'Returned' is concise and standard
    in narrative.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  alternatives:
  - Hierosolyma
  lexicon: BDAG
  rationale: Standard English transliteration for the city name.
