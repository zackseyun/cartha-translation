id: ACT.13.52
reference: Acts 13:52
source:
  edition: SBLGNT
  text: οἵ ⸀τε μαθηταὶ ἐπληροῦντο χαρᾶς καὶ πνεύματος ἁγίου.
translation:
  text: And the disciples were being filled with joy and the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were filled with joy and Holy Spirit.' The Greek imperfect verb can
      also be rendered more simply as 'were filled,' though the form suggests ongoing
      or repeated filling.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε
  chosen: And
  alternatives:
  - and also
  - now ... and
  lexicon: BDAG
  rationale: The combination of the article with τε links this sentence to the preceding
    narrative and marks continuation. In natural English, a simple sentence-initial
    'And' best preserves the connective force without awkwardness.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  - the followers
  lexicon: BDAG
  rationale: The standard NT sense is 'disciples,' referring here to the believers
    in the region. This is the established and most accurate English equivalent.
- source_word: ἐπληροῦντο
  chosen: were being filled
  alternatives:
  - were filled
  - kept being filled
  - were continually filled
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing or repeated action in past time.
    'Were being filled' preserves both the passive voice and the imperfect aspect
    better than the simple 'were filled,' while remaining readable.
- source_word: χαρᾶς
  chosen: with joy
  alternatives:
  - with gladness
  lexicon: BDAG
  rationale: Although the Greek uses the genitive after πληρόω, idiomatic English
    expresses the content with 'with.' 'Joy' is the most direct and natural rendering
    of χαρά.
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - the Holy Ghost
  lexicon: BDAG
  rationale: The phrase denotes the divine Holy Spirit. Adding the English article
    yields natural idiomatic expression and reflects the definite referent. 'Holy
    Ghost' is archaic; omission of the article is possible in English but less natural
    here.
