theological_decisions:
- issue: Whether πνεύματος ἁγίου should be rendered impersonally ('holy spirit') or
    personally ('the Holy Spirit')
  chosen_reading: the Holy Spirit
  alternative_readings:
  - holy spirit
  rationale: In Acts, πνεῦμα ἅγιον regularly refers to the personal divine Spirit
    active in the church's mission. The immediate context in Acts strongly supports
    the personal referent rather than a merely qualitative spiritual state.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
