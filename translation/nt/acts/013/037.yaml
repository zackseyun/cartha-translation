id: ACT.13.37
reference: Acts 13:37
source:
  edition: SBLGNT
  text: ὃν δὲ ὁ θεὸς ἤγειρεν οὐκ εἶδεν διαφθοράν.
translation:
  text: But the one whom God raised up did not see decay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corruption.' The Greek term can denote bodily corruption/decay; 'corruption'
      preserves the wording echoed from Psalm 16:10 in the Greek Scriptures.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  chosen: the one whom
  alternatives:
  - whom
  - he whom
  lexicon: BDAG
  rationale: The relative pronoun refers back to the person under discussion (Jesus)
    and functions as the object of the clause. 'The one whom' makes the referent clear
    in natural English without adding content beyond the Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - however
  - now
  lexicon: BDAG
  rationale: δέ marks contrast with the previous statement about David, so 'But' best
    preserves the adversative force in concise English.
- source_word: ὁ θεὸς
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: 'With θεός as the subject and the article functioning normally, idiomatic
    English omits the article: ''God.'''
- source_word: ἤγειρεν
  chosen: raised up
  alternatives:
  - raised
  - brought back to life
  lexicon: BDAG
  rationale: In Acts 13 the verb ἐγείρω is used in resurrection context, and 'raised
    up' preserves the verbal link to the surrounding argument and to the citation
    about not seeing corruption. 'Brought back to life' is interpretive; 'raised'
    is possible but slightly less reflective of the Greek form here.
- source_word: οὐκ
  chosen: did not
  alternatives:
  - not
  lexicon: BDAG
  rationale: Standard English negation with the past-tense verb requires 'did not.'
- source_word: εἶδεν
  chosen: see
  alternatives:
  - experience
  - undergo
  lexicon: BDAG
  rationale: The idiom 'see decay/corruption' echoes the wording of Psalm 16 in the
    LXX and in the immediate context. Retaining 'see' preserves the scriptural resonance
    better than more interpretive alternatives.
- source_word: διαφθοράν
  chosen: decay
  alternatives:
  - corruption
  - decomposition
  lexicon: BDAG
  rationale: '''Decay'' communicates bodily corruption in clear modern English and
    fits the Psalm 16 quotation context. ''Corruption'' is more traditional and should
    be preserved in a footnote because of its intertextual significance.'
