theological_decisions:
- issue: Resurrection sense of ἤγειρεν
  chosen_reading: raised up, referring to God raising Jesus from the dead
  alternative_readings:
  - raised up in the sense of appointing or bringing onto the scene
  rationale: In this immediate context Paul contrasts David, who died and saw decay,
    with Jesus, whom God raised and who did not see decay. The mention of not seeing
    decay makes the resurrection sense contextually decisive rather than the broader
    sense of 'raise up' as appoint.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
