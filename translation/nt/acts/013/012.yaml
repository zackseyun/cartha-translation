id: ACT.13.12
reference: Acts 13:12
source:
  edition: SBLGNT
  text: τότε ἰδὼν ὁ ἀνθύπατος τὸ γεγονὸς ἐπίστευσεν ἐκπλησσόμενος ἐπὶ τῇ διδαχῇ τοῦ
    κυρίου.
translation:
  text: Then, when the proconsul saw what had happened, he believed, being astonished
    at the teaching of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what had taken place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord's teaching' or 'the teaching about the Lord.' The Greek genitive
      may be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal-sequential adverb marking the next event in the narrative; 'Then'
    is the most natural concise English equivalent.
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, contemporaneous or antecedent to the main
    verb. English idiom is smoother with a temporal clause, 'when ... saw,' while
    preserving the causal/temporal connection.
- source_word: ὁ ἀνθύπατος
  chosen: the proconsul
  alternatives:
  - the governor
  lexicon: BDAG
  rationale: ἀνθύπατος is the specific Roman title 'proconsul,' not the more generic
    'governor.' This preserves historical precision.
- source_word: τὸ γεγονός
  chosen: what had happened
  alternatives:
  - the event
  - what had taken place
  lexicon: BDAG
  rationale: Perfect participle used substantivally from γίνομαι, referring to the
    completed occurrence just witnessed. 'What had happened' is idiomatic and accurately
    conveys the completed event.
- source_word: ἐπίστευσεν
  chosen: he believed
  alternatives:
  - he came to believe
  - he believed in
  lexicon: BDAG
  rationale: Aorist of πιστεύω without an expressed object. 'He believed' preserves
    the Greek's concise wording without adding an explicit object not present in the
    text. In context it implies Christian faith, but the translation should not over-specify
    beyond the source.
- source_word: ἐκπλησσόμενος
  chosen: being astonished
  alternatives:
  - amazed
  - astounded
  lexicon: BDAG
  rationale: Present participle expressing accompanying manner or circumstance. 'Being
    astonished' preserves the participial force and the stronger sense of being struck
    with amazement.
- source_word: ἐπὶ τῇ διδαχῇ
  chosen: at the teaching
  alternatives:
  - by the teaching
  - because of the teaching
  lexicon: BDAG
  rationale: ἐπί with the dative here indicates the basis or occasion of astonishment.
    'At the teaching' is natural English and fits the emotional response.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - about the Lord
  - from the Lord
  lexicon: BDAG
  rationale: Genitive most naturally qualifies 'teaching' as belonging to or concerning
    the Lord. 'Of the Lord' preserves the Greek wording and leaves the exact nuance
    broad, which suits Luke's style. 'Lord' follows the project's default rendering
    for κύριος.
