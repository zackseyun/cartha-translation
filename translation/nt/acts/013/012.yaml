theological_decisions:
- issue: Meaning of πιστεύω without explicit object
  chosen_reading: Rendered simply as 'he believed' without adding 'in the Lord' or
    'the gospel.'
  alternative_readings:
  - he believed in the Lord
  - he believed the message
  rationale: The context clearly indicates conversion-like belief, but the Greek text
    leaves the object unstated. To avoid importing doctrinal specificity beyond the
    wording, the translation preserves the text's brevity while allowing context to
    inform the reader.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
- issue: Nuance of 'the teaching of the Lord'
  chosen_reading: Retained the genitive as 'the teaching of the Lord.'
  alternative_readings:
  - the Lord's teaching
  - the teaching about the Lord
  rationale: The genitive can be read as subjective, objective, or possessive. The
    more literal 'of the Lord' preserves this ambiguity rather than forcing one interpretive
    option.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
