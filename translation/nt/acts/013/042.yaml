id: ACT.13.42
reference: Acts 13:42
source:
  edition: SBLGNT
  text: Ἐξιόντων δὲ ⸀αὐτῶν ⸀παρεκάλουν εἰς τὸ μεταξὺ σάββατον λαληθῆναι αὐτοῖς τὰ
    ῥήματα ⸀ταῦτα.
translation:
  text: As they were going out, they were urging that these words be spoken to them
    on the next Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read more explicitly, 'As Paul and Barnabas were going
      out, the people were urging that these words be spoken to them on the next Sabbath.'
    reason: textual_variant
  - marker: b
    text: Or 'As they were leaving, they were asking that these things be spoken to
      them on the coming Sabbath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξιόντων
  chosen: As they were going out
  alternatives:
  - As they were leaving
  - When they were going out
  lexicon: BDAG
  rationale: Genitive absolute with present participle, best rendered as a temporal
    circumstantial clause. 'Going out' preserves the verbal aspect; 'leaving' is possible
    but slightly more interpretive.
- source_word: δὲ
  chosen: As
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective within the genitive absolute construction.
    It is naturally absorbed into the English temporal clause rather than translated
    with a separate conjunction.
- source_word: αὐτῶν
  chosen: they
  alternatives:
  - Paul and Barnabas
  - the people
  lexicon: BDAG
  rationale: The pronoun in the genitive absolute is ambiguous in isolation because
    of a textual issue and contextual referent. English 'they' preserves the Greek's
    pronominal reference without over-specifying in the main text.
- source_word: παρεκάλουν
  chosen: they were urging
  alternatives:
  - they were asking
  - they were begging
  - they were inviting
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing or repeated action. παρακαλέω here
    conveys earnest request rather than comfort or exhortation in the moral sense.
    'Urging' captures the strength better than the weaker 'asking.'
- source_word: εἰς τὸ μεταξὺ σάββατον
  chosen: on the next Sabbath
  alternatives:
  - for the coming Sabbath
  - on the Sabbath in between
  lexicon: BDAG
  rationale: This idiom refers to the intervening/next Sabbath. 'On the next Sabbath'
    is idiomatic modern English and reflects the temporal sense without woodenly reproducing
    the unusual Greek expression.
- source_word: λαληθῆναι
  chosen: be spoken
  alternatives:
  - be told
  - be said
  lexicon: BDAG
  rationale: Aorist passive infinitive of λαλέω. 'Be spoken' is the most direct rendering
    and keeps the verbal link to speech rather than shifting to a more interpretive
    gloss.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative indirect object after the infinitive, naturally rendered 'to them.'
- source_word: τὰ ῥήματα ταῦτα
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: BDAG
  rationale: ῥήματα often means spoken words/sayings. 'These words' is formally close
    and fits the immediate reference to Paul's synagogue message. 'This message' is
    smoother but more interpretive.
