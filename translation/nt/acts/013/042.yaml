theological_decisions:
- issue: Referent of the pronouns in this verse
  chosen_reading: The main text preserves the ambiguity with 'they' rather than specifying
    the speakers or hearers.
  alternative_readings:
  - The people urged Paul and Barnabas
  - Paul and Barnabas urged the people
  rationale: The verse contains a known textual and interpretive difficulty regarding
    who was leaving and who was making the request. Since the Greek form in this edition
    does not explicitly identify the referent beyond pronouns, the translation preserves
    that ambiguity in the main text rather than resolving it beyond the source text.
  doctrine_reference: Translation philosophy §1, §3
