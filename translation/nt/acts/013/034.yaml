theological_decisions:
- issue: Rendering the Isaiah 55:3 quotation τὰ ὅσια Δαυὶδ τὰ πιστά
  chosen_reading: the holy and sure blessings of David
  alternative_readings:
  - the sure mercies of David
  - the holy promises made to David
  rationale: The quotation is used by Paul to argue that Jesus' resurrection fulfills
    the enduring Davidic covenant promises. The Greek phrase is elliptical and can
    be rendered in several ways. The chosen wording preserves the covenantal sense
    without importing a narrower doctrinal formulation than the text itself states.
    A traditional alternative is preserved in a footnote because of its prominence
    in English Bible history.
  doctrine_reference: Translation philosophy §§1, 3, 6
