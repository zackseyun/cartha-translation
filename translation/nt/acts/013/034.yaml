id: ACT.13.34
reference: Acts 13:34
source:
  edition: SBLGNT
  text: ὅτι δὲ ἀνέστησεν αὐτὸν ἐκ νεκρῶν μηκέτι μέλλοντα ὑποστρέφειν εἰς διαφθοράν,
    οὕτως εἴρηκεν ὅτι Δώσω ὑμῖν τὰ ὅσια Δαυὶδ τὰ πιστά.
translation:
  text: 'And that he raised him from the dead, no longer about to return to decay,
    he has spoken in this way: ‘I will give you the holy and sure blessings of David.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “the sure mercies of David.” The Greek phrase echoes
      Isaiah 55:3 and refers to the holy, reliable covenant promises associated with
      David.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέστησεν
  chosen: raised
  alternatives:
  - caused to rise up
  - raised up
  lexicon: BDAG
  rationale: In context with ἐκ νεκρῶν, the verb clearly refers to resurrection. 'Raised'
    is natural modern English and preserves the divine action without unnecessary
    expansion.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering for resurrection language; more literal
    alternatives are possible but less natural in English.
- source_word: μηκέτι μέλλοντα ὑποστρέφειν
  chosen: no longer about to return
  alternatives:
  - no longer destined to return
  - never again to return
  lexicon: BDAG
  rationale: The participle μέλλοντα with infinitive conveys impending/intended future
    action. 'About to return' preserves the verbal force more closely than the smoother
    'never again to return,' while still reading naturally.
- source_word: διαφθοράν
  chosen: decay
  alternatives:
  - corruption
  - decomposition
  lexicon: BDAG
  rationale: In this resurrection context the term refers to bodily corruption/decay.
    'Decay' is accessible modern English; 'corruption' is traditional but can sound
    moral rather than physical in contemporary usage.
- source_word: οὕτως εἴρηκεν
  chosen: he has spoken in this way
  alternatives:
  - he said thus
  - he has said this
  lexicon: BDAG
  rationale: The perfect εἴρηκεν suggests a statement with abiding scriptural force.
    'He has spoken in this way' preserves both the aspect and the introductory function
    to the quotation.
- source_word: Δώσω ὑμῖν
  chosen: I will give you
  alternatives:
  - I shall give you
  lexicon: BDAG
  rationale: Straightforward future promise; 'will' is standard modern English.
- source_word: τὰ ὅσια Δαυὶδ τὰ πιστά
  chosen: the holy and sure blessings of David
  alternatives:
  - the holy things of David, the faithful ones
  - the steadfast holy promises made to David
  - the sure mercies of David
  lexicon: BDAG
  rationale: This phrase echoes Isaiah 55:3 and is semantically difficult. In context
    it refers not to David's personal piety but to the sacred covenantal benefits/promises
    associated with David. 'Blessings' communicates the plural neuter phrase idiomatically
    in English; 'holy and sure' reflects both adjectives. The traditional 'sure mercies
    of David' is preserved in a footnote because of its historical prominence, but
    'mercies' is less transparent from the Greek here than a covenant-promise sense.
