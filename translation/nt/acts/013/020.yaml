id: ACT.13.20
reference: Acts 13:20
source:
  edition: SBLGNT
  text: ⸂ὡς ἔτεσι τετρακοσίοις καὶ πεντήκοντα. καὶ μετὰ ταῦτα⸃ ἔδωκεν κριτὰς ἕως Σαμουὴλ
    ⸀τοῦ προφήτου.
translation:
  text: For about four hundred and fifty years. And after these things he gave judges
    until Samuel the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, in some translations, the time reference is connected differently:
      ''he gave judges for about four hundred and fifty years, until Samuel the prophet.''
      The Greek wording and punctuation here are debated.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς
  chosen: about
  alternatives:
  - for about
  - approximately
  lexicon: BDAG
  rationale: Here ὡς with a numeral softens the figure, indicating approximation rather
    than exact count. English 'about' best captures this nuance.
- source_word: ἔτεσι τετρακοσίοις καὶ πεντήκοντα
  chosen: four hundred and fifty years
  alternatives:
  - 450 years
  lexicon: BDAG
  rationale: The dative phrase expresses duration/extent of time. Rendering it as
    'four hundred and fifty years' preserves the formal content while remaining natural
    English.
- source_word: καὶ μετὰ ταῦτα
  chosen: And after these things
  alternatives:
  - And after that
  - After these things
  lexicon: BDAG
  rationale: The phrase marks sequence in the narrative. 'After these things' is slightly
    more formal but transparent and preserves the plural demonstrative.
- source_word: ἔδωκεν
  chosen: he gave
  alternatives:
  - he appointed
  - he granted
  lexicon: BDAG
  rationale: The verb is δίδωμι, literally 'gave.' In context it refers to God's provision/appointment
    of judges. 'Gave' preserves the lexical form and allows readers to hear the biblical
    idiom.
- source_word: κριτὰς
  chosen: judges
  alternatives:
  - leaders
  - rulers
  lexicon: BDAG
  rationale: The term directly evokes the judges of Israel in the period before the
    monarchy. 'Judges' is the established and accurate historical term.
- source_word: ἕως
  chosen: until
  alternatives:
  - up to the time of
  lexicon: BDAG
  rationale: ἕως marks the endpoint of the period of judges. 'Until' is the most direct
    equivalent.
- source_word: Σαμουὴλ τοῦ προφήτου
  chosen: Samuel the prophet
  alternatives:
  - Samuel, the prophet
  lexicon: BDAG
  rationale: The genitive apposition identifies Samuel by role. 'Samuel the prophet'
    is idiomatic English and preserves the identifying title.
