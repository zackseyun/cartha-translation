theological_decisions:
- issue: Placement and relation of the 'about four hundred and fifty years' phrase
    in a text-critically difficult verse
  chosen_reading: Treat the phrase as a standalone duration statement followed by
    'And after these things he gave judges until Samuel the prophet,' in line with
    the provided SBLGNT text.
  alternative_readings:
  - Connect the 450 years more directly with the period of the judges or with the
    preceding clause in translations based on different punctuation/textual decisions.
  rationale: Acts 13:20 is text-critically and syntactically difficult. The supplied
    Greek text places 'about four hundred and fifty years' before 'And after these
    things he gave judges.' The translation follows the given source text rather than
    harmonizing to another tradition. Because the relation of the time phrase is debated,
    the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §§1, 3, 5
