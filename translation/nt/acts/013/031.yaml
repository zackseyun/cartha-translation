id: ACT.13.31
reference: Acts 13:31
source:
  edition: SBLGNT
  text: ὃς ὤφθη ἐπὶ ἡμέρας πλείους τοῖς συναναβᾶσιν αὐτῷ ἀπὸ τῆς Γαλιλαίας εἰς Ἰερουσαλήμ,
    οἵτινες ⸀νῦν εἰσὶ μάρτυρες αὐτοῦ πρὸς τὸν λαόν.
translation:
  text: He appeared for many days to those who had gone up with him from Galilee to
    Jerusalem, who are now his witnesses to the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was seen for many days.' The Greek verb can be rendered more formally
      this way, especially in resurrection-appearance contexts.
    reason: lexical_alternative
  - marker: b
    text: '''The people'' here likely refers specifically to the Jewish people/Israel
      in context.'
    reason: cultural_note
lexical_decisions:
- source_word: ὃς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to Jesus in the previous verse. English
    idiom prefers resuming with 'He' at the start of the sentence rather than a bare
    relative clause, while preserving the referent.
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - was made visible
  lexicon: BDAG
  rationale: Aorist passive of ὁράω is commonly used in resurrection appearance contexts
    with the sense 'appeared.' 'Was seen' is more formally literal, but 'appeared'
    better conveys the event in natural English without changing meaning.
- source_word: ἐπὶ ἡμέρας πλείους
  chosen: for many days
  alternatives:
  - over many days
  - during many days
  lexicon: BDAG
  rationale: The preposition with accusative here expresses duration/extent of time.
    'For many days' is clear, idiomatic, and faithful.
- source_word: τοῖς συναναβᾶσιν αὐτῷ
  chosen: to those who had gone up with him
  alternatives:
  - to those who went up with him
  - to his companions who went up
  lexicon: BDAG
  rationale: The aorist participle denotes those who accompanied him on the journey.
    'Had gone up' reflects the prior action relative to the appearance and preserves
    the pilgrimage/travel sense of ἀναβαίνω.
- source_word: ἀπὸ τῆς Γαλιλαίας εἰς Ἰερουσαλήμ
  chosen: from Galilee to Jerusalem
  lexicon: BDAG
  rationale: Straightforward geographical movement. 'Gone up' already reflects the
    upward/travel idiom toward Jerusalem, so the prepositional phrase is rendered
    simply and directly.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - and these
  - who indeed
  lexicon: BDAG
  rationale: The qualitative relative pronoun identifies this group as the ones who
    now serve as witnesses. English 'who' is sufficient here without overtranslating
    the nuance.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Marks the present status of the witnesses in relation to the past appearances.
- source_word: μάρτυρες αὐτοῦ
  chosen: his witnesses
  alternatives:
  - witnesses of him
  - witnesses to him
  lexicon: BDAG
  rationale: 'The genitive is most naturally possessive/relational in English here:
    they are witnesses belonging to him, that is, witnesses concerning him. ''His
    witnesses'' is idiomatic and preserves the relationship.'
- source_word: πρὸς τὸν λαόν
  chosen: to the people
  alternatives:
  - before the people
  - for the people
  lexicon: BDAG
  rationale: πρός with accusative here indicates direction toward an audience. 'To
    the people' best captures their testimonial role directed toward Israel.
- source_word: λαόν
  chosen: the people
  alternatives:
  - the people of Israel
  - the nation
  lexicon: BDAG
  rationale: In Acts this often refers specifically to the Jewish people, but the
    Greek says simply 'the people.' The translation preserves the wording without
    importing an explicit interpretive expansion.
