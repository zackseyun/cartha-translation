theological_decisions:
- issue: Nature of resurrection appearance language
  chosen_reading: He appeared
  alternative_readings:
  - He was seen
  rationale: The verse speaks of post-resurrection appearances to designated witnesses.
    'Appeared' communicates the event naturally in English while not diminishing the
    bodily, historical witness emphasized in the context.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Scope of 'the people'
  chosen_reading: the people
  alternative_readings:
  - the people of Israel
  rationale: Although context strongly suggests Israel/Jewish people, the text itself
    uses λαός without explicit expansion. To avoid importing more specificity than
    the Greek states, the main text retains 'the people.'
  doctrine_reference: Translation philosophy §1, §3
