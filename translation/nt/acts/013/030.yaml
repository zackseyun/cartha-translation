theological_decisions:
- issue: Resurrection wording
  chosen_reading: But God raised him from the dead.
  alternative_readings:
  - But God raised him up from the dead.
  rationale: The verse explicitly attributes Jesus' resurrection to God's action.
    'Raised him from the dead' preserves the historical and bodily resurrection claim
    without adding interpretive material beyond the Greek. 'Raised up' is possible,
    but in English can sound less specifically resurrection-oriented unless expanded.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
