id: ACT.13.30
reference: Acts 13:30
source:
  edition: SBLGNT
  text: ὁ δὲ θεὸς ἤγειρεν αὐτὸν ἐκ νεκρῶν·
translation:
  text: But God raised him from the dead.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks contrast with the preceding human action in the discourse;
    'But' best preserves the adversative force in natural English.
- source_word: θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The noun straightforwardly refers to God as the subject of the action.
- source_word: ἤγειρεν
  chosen: raised
  alternatives:
  - raised up
  - awakened
  lexicon: BDAG
  rationale: ἐγείρω in resurrection contexts commonly means 'raise.' 'Raised' is the
    clearest and most idiomatic English rendering here, while preserving the resurrection
    sense without unnecessary expansion.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to Jesus in the immediate context and is naturally
    rendered 'him.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  - from among dead people
  lexicon: BDAG
  rationale: This is the standard resurrection idiom. 'From the dead' is natural English
    and accurately conveys emergence from the realm/state of the dead.
