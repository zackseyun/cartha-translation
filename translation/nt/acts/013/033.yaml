id: ACT.13.33
reference: Acts 13:33
source:
  edition: SBLGNT
  text: ὅτι ταύτην ὁ θεὸς ἐκπεπλήρωκεν τοῖς τέκνοις ⸀ἡμῶν ἀναστήσας Ἰησοῦν, ὡς καὶ
    ἐν τῷ ⸂ψαλμῷ γέγραπται τῷ δευτέρῳ⸃· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε.
translation:
  text: 'that God has fulfilled this for our children by raising up Jesus, as it is
    also written in the second Psalm: ‘You are my Son; today I have begotten you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to us, their children.' Some manuscripts read 'to our children,' while
      others support 'to us, their children.'
    reason: textual_variant
  - marker: b
    text: Or 'by raising Jesus from the dead'; the Greek can also mean 'by raising
      up' in the sense of bringing forth or appointing.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπεπλήρωκεν
  chosen: has fulfilled
  alternatives:
  - has completed
  - has brought to fulfillment
  lexicon: BDAG
  rationale: Perfect tense indicates a completed action with present relevance; 'has
    fulfilled' is idiomatic and preserves covenant/promise-fulfillment language common
    in Luke-Acts.
- source_word: ταύτην
  chosen: this
  alternatives:
  - this promise
  - this word
  lexicon: BDAG
  rationale: The pronoun refers back to the promise in the preceding context. 'This'
    keeps the Greek's explicit wording in the main text without adding a noun not
    present here.
- source_word: τοῖς τέκνοις ἡμῶν
  chosen: for our children
  alternatives:
  - to us, their children
  - for us, their children
  lexicon: BDAG
  rationale: In context Paul contrasts the fathers with their descendants; τέκνοις
    can mean 'children/descendants.' 'For our children' is a natural rendering of
    the dative here, though the textual issue around ἡμῶν is preserved in a footnote.
- source_word: ἀναστήσας Ἰησοῦν
  chosen: by raising up Jesus
  alternatives:
  - by raising Jesus
  - by bringing Jesus onto the scene
  lexicon: BDAG
  rationale: The aorist participle is best rendered adverbially. In Acts, ἀνίστημι
    with Jesus can mean either 'raise up' in the sense of appointing/bringing forth
    or 'raise' from the dead; here the following citation of Psalm 2 and the immediate
    context create interpretive tension, so the more literal 'raising up' preserves
    that tension.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard English rendering of the perfect passive formula introducing
    Scripture; preserves the enduring authority implied by the perfect.
- source_word: ψαλμῷ ... τῷ δευτέρῳ
  chosen: the second Psalm
  alternatives:
  - Psalm 2
  - the second psalm
  lexicon: BDAG
  rationale: This closely follows the Greek phrasing while remaining natural in English.
- source_word: Υἱός μου εἶ σύ
  chosen: You are my Son
  alternatives:
  - My Son are you
  lexicon: BDAG
  rationale: Normal English word order communicates the emphatic identification without
    awkwardness.
- source_word: σήμερον γεγέννηκά σε
  chosen: today I have begotten you
  alternatives:
  - today I have become your father
  - today I have fathered you
  lexicon: BDAG
  rationale: '''Begotten'' preserves the intertextual and theological weight of Psalm
    2:7 and aligns with historic christological language, while remaining a direct
    rendering of γεννάω.'
