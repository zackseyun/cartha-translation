theological_decisions:
- issue: Meaning of ἀναστήσας Ἰησοῦν in this context
  chosen_reading: rendered as 'raising up Jesus' to preserve ambiguity between resurrection
    language and God's raising up/appointing Jesus
  alternative_readings:
  - raising Jesus from the dead
  - bringing forth/appointing Jesus
  rationale: The broader paragraph includes explicit resurrection language in the
    following verse, while Acts also uses ἀνίστημι for God 'raising up' a deliverer
    or leader. To avoid over-resolving the interpretive question, the main text keeps
    the more literal 'raising up,' with alternatives preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological force of 'today I have begotten you'
  chosen_reading: retain the quotation directly without interpretive expansion
  alternative_readings:
  - understood as enthronement/adoption language
  - understood as resurrection vindication language
  rationale: The verse quotes Psalm 2:7 and should not be expanded in translation
    to settle later theological debates. The wording is preserved as written, consistent
    with Nicene and Chalcedonian orthodoxy while not importing doctrinal explanation
    into the text itself.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
