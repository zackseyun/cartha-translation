theological_decisions:
- issue: Rendering λειτουργούντων in a context of communal devotion and commissioning
  chosen_reading: ministering to the Lord
  alternative_readings:
  - worshiping the Lord
  - serving the Lord
  rationale: The term can suggest liturgical/worshipful service, but the verse does
    not require reducing it to formal worship alone. 'Ministering' preserves the devotional
    and service dimensions without importing a specific ecclesial practice.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase'
- issue: Subject and personhood of τὸ πνεῦμα τὸ ἅγιον
  chosen_reading: the Holy Spirit said
  rationale: The Greek presents the Holy Spirit as the speaking subject. The translation
    preserves this directly and does not depersonalize the Spirit.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD) within historic orthodoxy'
- issue: Force of ἀφορίσατε ... εἰς τὸ ἔργον
  chosen_reading: Set apart for me ... for the work
  alternative_readings:
  - Appoint ... to the ministry
  rationale: The wording indicates divine separation for a specific mission, but does
    not itself specify ordination language or a technical office. The translation
    preserves commissioning without importing later church-structural categories.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the
    text does not make'
