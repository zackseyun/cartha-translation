id: ACT.13.2
reference: Acts 13:2
source:
  edition: SBLGNT
  text: λειτουργούντων δὲ αὐτῶν τῷ κυρίῳ καὶ νηστευόντων εἶπεν τὸ πνεῦμα τὸ ἅγιον·
    Ἀφορίσατε δή μοι τὸν Βαρναβᾶν ⸀καὶ Σαῦλον εἰς τὸ ἔργον ὃ προσκέκλημαι αὐτούς.
translation:
  text: While they were ministering to the Lord and fasting, the Holy Spirit said,
    “Set apart for me Barnabas and Saul for the work to which I have called them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “worshiping the Lord.” The Greek verb can denote service with worshipful
      or liturgical overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργούντων
  chosen: ministering
  alternatives:
  - serving
  - worshiping
  lexicon: BDAG
  rationale: The participle denotes carrying out a service, often with cultic or public-service
    overtones. In this context of prayer/fasting and divine commissioning, 'ministering'
    preserves both service and worship dimensions better than the narrower 'worshiping'
    or the flatter 'serving'.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - before the Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The dative naturally
    expresses the one to whom their ministry is directed; 'to the Lord' is straightforward
    and idiomatic.
- source_word: νηστευόντων
  chosen: fasting
  lexicon: BDAG
  rationale: Standard rendering of the participle; paired with λειτουργούντων as concurrent
    activity.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: This is the standard and natural modern English rendering. It preserves
    the personal subject of the clause without archaic diction.
- source_word: Ἀφορίσατε
  chosen: Set apart
  alternatives:
  - separate
  - appoint
  lexicon: BDAG
  rationale: The imperative means to mark off or separate for a special purpose. 'Set
    apart' communicates consecration/commissioning more clearly than bare 'separate'
    and avoids over-specifying with 'appoint'.
- source_word: δή
  chosen: —
  alternatives:
  - now
  - indeed
  lexicon: BDAG
  rationale: δή adds urgency or immediacy, but English often leaves it implicit in
    direct command style. It is not ignored conceptually, but not represented by a
    separate English word to avoid stiffness.
- source_word: μοι
  chosen: for me
  alternatives:
  - to me
  lexicon: BDAG
  rationale: With ἀφορίσατε, the dative expresses the one for whose purpose the setting
    apart is done. 'For me' is more idiomatic and purposeful than 'to me.'
- source_word: Βαρναβᾶν καὶ Σαῦλον
  chosen: Barnabas and Saul
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: εἰς τὸ ἔργον
  chosen: for the work
  alternatives:
  - for the task
  - for the ministry
  lexicon: BDAG
  rationale: ἔργον is broad and should not be narrowed prematurely to 'ministry' or
    'mission.' 'Work' preserves the open-endedness of the Spirit's commission.
- source_word: ὃ προσκέκλημαι αὐτούς
  chosen: to which I have called them
  alternatives:
  - for which I have summoned them
  lexicon: BDAG
  rationale: The perfect middle indicates a prior call with present relevance. 'Have
    called' is natural English and fits divine vocation language better than the more
    mechanical 'summoned.'
