id: ACT.13.28
reference: Acts 13:28
source:
  edition: SBLGNT
  text: καὶ μηδεμίαν αἰτίαν θανάτου εὑρόντες ᾐτήσαντο Πιλᾶτον ἀναιρεθῆναι αὐτόν·
translation:
  text: And though they found no basis for a death sentence, they asked Pilate to
    have him executed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'no charge deserving death' or 'no legal basis for death.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'to put him to death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεμίαν αἰτίαν θανάτου
  chosen: no basis for a death sentence
  alternatives:
  - no cause for death
  - no charge deserving death
  - no legal basis for death
  lexicon: BDAG
  rationale: αἰτία can mean cause, charge, case, or basis. In this judicial context,
    paired with θανάτου, it refers not merely to a general reason but to grounds warranting
    capital punishment. 'Basis for a death sentence' communicates the legal sense
    in natural English better than the more wooden 'cause of death,' which could be
    misunderstood.
- source_word: εὑρόντες
  chosen: though they found
  alternatives:
  - having found
  - after finding
  - when they found
  lexicon: BDAG
  rationale: 'The aorist participle is antecedent to the main verb and here carries
    a concessive nuance in context: despite not finding grounds for execution, they
    still requested it. English idiom is best served by making that concessive force
    explicit with ''though.'''
- source_word: ᾐτήσαντο
  chosen: they asked
  alternatives:
  - they requested
  - they petitioned
  lexicon: BDAG
  rationale: αἰτέω commonly means ask or request. 'Asked' is the most natural modern
    English rendering and fits the narrative register. The object and infinitive clause
    make clear that this is a formal request to Pilate.
- source_word: Πιλᾶτον
  chosen: Pilate
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἀναιρεθῆναι αὐτόν
  chosen: to have him executed
  alternatives:
  - to put him to death
  - to kill him
  - for him to be taken away
  lexicon: BDAG
  rationale: ἀναιρέω in this context means to do away with, kill, or execute. Because
    the setting is a Roman judicial proceeding and the preceding phrase concerns grounds
    for capital punishment, 'to have him executed' best captures the legal/judicial
    force. 'Kill him' is too blunt and less specific; 'put him to death' is viable
    but slightly less idiomatic in this sentence.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: καί here continues the narrative flow. 'And' preserves the straightforward
    connective force without adding interpretive weight.
