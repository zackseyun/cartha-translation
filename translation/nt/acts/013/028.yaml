theological_decisions:
- issue: Whether to render the participial clause with explicit concessive force
  chosen_reading: And though they found no basis for a death sentence, they asked
    Pilate to have him executed.
  alternative_readings:
  - And finding no basis for a death sentence, they asked Pilate to have him executed.
  - And after finding no basis for a death sentence, they asked Pilate to have him
    executed.
  rationale: 'The Greek participle εὑρόντες is formally temporal/circumstantial, but
    in context the sense is clearly tension-filled: they requested execution despite
    lacking valid grounds. Making the concessive relationship explicit preserves the
    narrative and moral force without importing extra theology.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
