theological_decisions:
- issue: Sense of God's action toward Israel in the wilderness
  chosen_reading: he put up with them
  alternative_readings:
  - he cared for them
  rationale: The printed Greek text provided has ἐτροποφόρησεν, which supports the
    sense 'bear with/endure.' This should not be softened into a purely nurturing
    idea in the main text. However, because a well-known textual variant supports
    'he cared for them,' that alternative is preserved in a footnote to maintain transparency
    and theological tension where the textual tradition differs.
  doctrine_reference: Translation philosophy §§1, 3, 5
