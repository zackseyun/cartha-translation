id: ACT.13.18
reference: Acts 13:18
source:
  edition: SBLGNT
  text: καί, ὡς τεσσερακονταετῆ χρόνον ἐτροποφόρησεν αὐτοὺς ἐν τῇ ἐρήμῳ,
translation:
  text: And for about forty years he put up with them in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'he cared for them' instead of 'he put up with them.'
    reason: textual_variant
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - Then
  - and
  lexicon: BDAG
  rationale: Standard connective continuing Stephen's/Paul's historical narration;
    capitalized in English because it begins the verse.
- source_word: ὡς
  chosen: about
  alternatives:
  - for approximately
  - as if
  lexicon: BDAG
  rationale: With a measure of time, ὡς can mark approximation. Rendering it as 'about'
    preserves the nuance that the period is approximately forty years rather than
    pressing mathematical exactness.
- source_word: τεσσερακονταετῆ χρόνον
  chosen: forty years
  alternatives:
  - a forty-year period
  - for forty years
  lexicon: BDAG
  rationale: The adjective-noun combination denotes a span of forty years. In idiomatic
    English, 'forty years' is the natural rendering; the preposition 'for' is supplied
    by English syntax with the verb.
- source_word: ἐτροποφόρησεν
  chosen: put up with
  alternatives:
  - cared for
  - bore with
  - endured
  lexicon: BDAG
  rationale: The verb is text-critically and lexically difficult. In this SBLGNT reading,
    τροποφορέω most naturally means 'to bear with' or 'put up with,' fitting Israel's
    repeated rebellion in the wilderness. Because a closely related textual variant
    reads ἐτροφοφόρησεν ('he cared for/nursed'), that alternative is preserved in
    a footnote rather than adopted in the main text.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object referring to the people of Israel; simple plural pronoun
    in English.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος here refers to the wilderness region of Israel's wandering. 'Wilderness'
    is the standard biblical-geographical term and better preserves intertextual resonance
    than 'desert,' though both are possible.
