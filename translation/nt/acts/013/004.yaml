id: ACT.13.4
reference: Acts 13:4
source:
  edition: SBLGNT
  text: ⸀Αὐτοὶ μὲν οὖν ἐκπεμφθέντες ὑπὸ τοῦ ⸂ἁγίου πνεύματος⸃ κατῆλθον ⸀εἰς Σελεύκειαν,
    ἐκεῖθέν ⸀τε ἀπέπλευσαν ⸁εἰς Κύπρον,
translation:
  text: So they, having been sent out by the Holy Spirit, went down to Seleucia, and
    from there sailed away to Cyprus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the holy Spirit.' The Greek phrase is literally 'by the holy spirit,'
      but in Acts it refers to the personal divine agent commonly rendered 'the Holy
      Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτοὶ
  chosen: they
  alternatives:
  - they themselves
  lexicon: BDAG
  rationale: The pronoun is explicit and somewhat emphatic. English can reflect this
    simply with 'they' in this narrative context without overloading the sentence;
    the emphasis is lightly carried by the clause opening 'So they.'
- source_word: μὲν οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  - indeed, therefore
  lexicon: BDAG
  rationale: The combination marks narrative progression and inference from the previous
    commissioning. 'So' captures the discourse flow naturally in modern English better
    than a more wooden 'therefore' or an untranslated μέν.
- source_word: ἐκπεμφθέντες
  chosen: having been sent out
  alternatives:
  - being sent out
  - sent out
  lexicon: BDAG
  rationale: Aorist passive participle, antecedent to the main verbs. 'Having been
    sent out' preserves both the passive voice and the prior action relative to 'went
    down' and 'sailed away.'
- source_word: ὑπὸ τοῦ ἁγίου πνεύματος
  chosen: by the Holy Spirit
  alternatives:
  - by the holy Spirit
  lexicon: BDAG
  rationale: ὑπό with genitive marks agency. Capitalized 'Holy Spirit' reflects the
    personal divine referent in Acts and standard English usage for the third person
    of the Trinity.
- source_word: κατῆλθον
  chosen: went down
  alternatives:
  - came down
  - traveled down
  lexicon: BDAG
  rationale: The verb literally means 'went down' and commonly reflects descent in
    elevation or movement to the coast. 'Went down' preserves the concrete sense without
    unnecessary interpretation.
- source_word: εἰς Σελεύκειαν
  chosen: to Seleucia
  alternatives:
  - into Seleucia
  lexicon: BDAG
  rationale: With a destination city, idiomatic English uses 'to Seleucia.' The place
    name is transliterated per translation philosophy.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Standard adverb of place indicating point of departure; 'from there'
    is the natural English equivalent.
- source_word: τε
  chosen: and
  alternatives:
  - and then
  - also
  lexicon: BDAG
  rationale: The enclitic links the next action to the previous one. In English, simple
    'and' best represents the connective force in smooth narrative.
- source_word: ἀπέπλευσαν
  chosen: sailed away
  alternatives:
  - sailed
  - set sail
  lexicon: BDAG
  rationale: The compound verb ἀποπλέω includes the idea of departure by sea. 'Sailed
    away' preserves the outbound nuance better than plain 'sailed.'
- source_word: εἰς Κύπρον
  chosen: to Cyprus
  alternatives:
  - for Cyprus
  lexicon: BDAG
  rationale: Destination is most naturally rendered 'to Cyprus.' The island name is
    transliterated by standard convention.
