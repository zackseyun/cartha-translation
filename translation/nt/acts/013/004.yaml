theological_decisions:
- issue: Rendering of ἁγίου πνεύματος
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the holy Spirit
  rationale: In Acts this expression refers to the personal divine agent who commissions
    and directs mission. Rendering it as 'the Holy Spirit' aligns with historic orthodox
    Trinitarian confession while matching the narrative context; the text itself presents
    agency ('sent out by').
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy:
    preserve source meaning without importing extra doctrinal claims.'
