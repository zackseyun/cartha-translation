theological_decisions:
- issue: Nature of the ministry terms in Antioch
  chosen_reading: Render προφῆται καὶ διδάσκαλοι straightforwardly as recognized roles
    within the local church, without importing later ecclesiastical office structures.
  alternative_readings:
  - Treat as formal offices in a later technical sense
  rationale: The verse identifies certain people in the Antioch church as prophets
    and teachers, but does not define a later institutional hierarchy. The translation
    preserves the text's categories without denominational overlay.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 6
- issue: Meaning of σύντροφος in relation to Herod
  chosen_reading: Use the broader 'a close companion' rather than the more specific
    'foster-brother.'
  alternative_readings:
  - foster-brother
  - childhood companion
  rationale: The term may imply shared upbringing, but the exact social relation is
    not explicit enough to force the narrower reading in the main text. Preserving
    a broader rendering avoids overstating historical detail while remaining faithful
    to the likely sense.
  doctrine_reference: Translation philosophy items 1 and 3
