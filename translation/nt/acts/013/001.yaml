id: ACT.13.1
reference: Acts 13:1
source:
  edition: SBLGNT
  text: Ἦσαν ⸀δὲ ἐν Ἀντιοχείᾳ κατὰ τὴν οὖσαν ἐκκλησίαν προφῆται καὶ διδάσκαλοι ὅ τε
    Βαρναβᾶς καὶ Συμεὼν ὁ καλούμενος Νίγερ, καὶ Λούκιος ὁ Κυρηναῖος, Μαναήν τε Ἡρῴδου
    τοῦ τετραάρχου σύντροφος καὶ Σαῦλος.
translation:
  text: 'Now in Antioch, in the church there, there were prophets and teachers: Barnabas,
    Simeon who was called Niger, Lucius the Cyrenian, Manaen, a close companion of
    Herod the tetrarch, and Saul.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Niger” is a Latin name meaning “black.” It is retained here as a proper
      name rather than translated.
    reason: lexical_alternative
  - marker: b
    text: Or “foster-brother of Herod the tetrarch” or “one brought up with Herod
      the tetrarch.”
    reason: alternative_reading
  - marker: c
    text: That is, Lucius was from Cyrene in North Africa.
    reason: cultural_note
lexical_decisions:
- source_word: Ἦσαν δὲ
  chosen: Now ... there were
  alternatives:
  - And ... there were
  - Now ... were
  lexicon: BDAG
  rationale: Ἦσαν is the main existential verb ('there were'). δέ is a mild connective;
    'Now' gives natural English discourse progression without overstating contrast.
- source_word: ἐν Ἀντιοχείᾳ
  chosen: in Antioch
  lexicon: BDAG
  rationale: Straightforward locative phrase; standard transliteration of the place
    name.
- source_word: κατὰ τὴν οὖσαν ἐκκλησίαν
  chosen: in the church there
  alternatives:
  - in the church that was there
  - according to the church there
  - in the church in Antioch
  lexicon: BDAG
  rationale: κατά with the accusative here is idiomatic for location/distribution
    with reference to the local congregation; οὖσαν marks the existing church in that
    place. 'In the church there' is natural English and preserves the local-reference
    force without woodenly reproducing the participle.
- source_word: ἐκκλησίαν
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Acts this term commonly denotes the Christian congregation. 'Church'
    is the clearest contextual rendering in modern English.
- source_word: προφῆται καὶ διδάσκαλοι
  chosen: prophets and teachers
  lexicon: BDAG
  rationale: These are recognized ministry roles/groups in the Antioch church. A direct
    rendering is both accurate and readable.
- source_word: ὅ τε Βαρναβᾶς
  chosen: Barnabas
  alternatives:
  - namely Barnabas
  lexicon: BDAG
  rationale: The article plus τε begins the list. English does not need an explicit
    equivalent beyond introducing the names after the colon.
- source_word: Συμεὼν ὁ καλούμενος Νίγερ
  chosen: Simeon who was called Niger
  alternatives:
  - Simeon called Niger
  - Simon who was called Niger
  lexicon: BDAG
  rationale: Συμεών is best transliterated 'Simeon' rather than assimilated to 'Simon.'
    The participle καλούμενος is naturally rendered 'who was called.' 'Niger' is retained
    as a proper cognomen rather than translated.
- source_word: Νίγερ
  chosen: Niger
  alternatives:
  - the Black
  lexicon: BDAG
  rationale: As a Latin cognomen used as a name, it is best transliterated. Translating
    it as an epithet in the main text would over-interpret; the lexical sense can
    be preserved in a footnote.
- source_word: Λούκιος ὁ Κυρηναῖος
  chosen: Lucius the Cyrenian
  alternatives:
  - Lucius of Cyrene
  lexicon: BDAG
  rationale: ὁ Κυρηναῖος denotes a man from Cyrene. 'The Cyrenian' is concise and
    close to the Greek; 'of Cyrene' is also possible but slightly less formally parallel
    to the Greek appositional form.
- source_word: Μαναήν
  chosen: Manaen
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: Ἡρῴδου τοῦ τετραάρχου
  chosen: of Herod the tetrarch
  alternatives:
  - of Herod Antipas the tetrarch
  lexicon: BDAG
  rationale: The Greek identifies Herod by title, not by the fuller historical label
    'Antipas.' The translation preserves the text's wording while remaining clear.
- source_word: σύντροφος
  chosen: a close companion
  alternatives:
  - foster-brother
  - court companion
  - lifelong companion
  lexicon: BDAG
  rationale: σύντροφος can denote one brought up with another, hence a close associate
    from upbringing. 'Close companion' communicates the relationship without claiming
    the more specific 'foster-brother,' which may be too narrow for the context.
- source_word: καὶ Σαῦλος
  chosen: and Saul
  lexicon: BDAG
  rationale: Simple continuation of the list; standard transliteration of the name.
