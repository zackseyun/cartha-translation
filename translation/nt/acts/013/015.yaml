id: ACT.13.15
reference: Acts 13:15
source:
  edition: SBLGNT
  text: μετὰ δὲ τὴν ἀνάγνωσιν τοῦ νόμου καὶ τῶν προφητῶν ἀπέστειλαν οἱ ἀρχισυνάγωγοι
    πρὸς αὐτοὺς λέγοντες· Ἄνδρες ἀδελφοί, εἴ ⸀τίς ἐστιν ⸂ἐν ὑμῖν λόγος⸃ παρακλήσεως
    πρὸς τὸν λαόν, λέγετε.
translation:
  text: Now after the reading of the Law and the Prophets, the synagogue rulers sent
    word to them, saying, “Brothers, if there is among you any word of encouragement
    for the people, speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “message of exhortation.” The Greek phrase can carry both encouragement
      and exhortation.
    reason: lexical_alternative
  - marker: b
    text: Greek “Men, brothers,” a respectful familial form of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάγνωσιν
  chosen: the reading
  alternatives:
  - the public reading
  - the lesson
  lexicon: BDAG
  rationale: Refers to the synagogue Scripture reading. 'The reading' is sufficiently
    natural in English while preserving the formal link to the act of reading aloud.
- source_word: νόμου
  chosen: the Law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: Capitalized to indicate the recognized scriptural division of the Torah
    in synagogue context, paired with 'the Prophets.'
- source_word: προφητῶν
  chosen: the Prophets
  alternatives:
  - the prophets
  lexicon: BDAG
  rationale: Capitalized to reflect the scriptural collection read in synagogue worship,
    not merely prophetic persons in general.
- source_word: ἀπέστειλαν
  chosen: sent word
  alternatives:
  - sent
  - sent to
  lexicon: BDAG
  rationale: Although literally 'sent,' the idiom with πρὸς αὐτοὺς and the following
    direct speech indicates a communicated message rather than physical dispatch alone.
    'Sent word' captures the sense in idiomatic English.
- source_word: ἀρχισυνάγωγοι
  chosen: the synagogue rulers
  alternatives:
  - the leaders of the synagogue
  - the synagogue officials
  lexicon: BDAG
  rationale: Plural noun referring to those in charge of the synagogue service. 'Rulers'
    is a standard and accurate rendering, though not implying civil rule.
- source_word: Ἄνδρες ἀδελφοί
  chosen: Brothers
  alternatives:
  - Men, brothers
  - Brothers and fathers
  - Brothers, men
  lexicon: BDAG
  rationale: A conventional address meaning 'brothers' or 'brothers, fellow men.'
    Since the immediate addressees are Paul and his companions, 'Brothers' is natural
    and preserves the familial-respectful tone without over-literal awkwardness. The
    masculine form is retained in keeping with gender-accurate translation philosophy.
- source_word: λόγος παρακλήσεως
  chosen: word of encouragement
  alternatives:
  - message of exhortation
  - word of exhortation
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement or exhortation. In this synagogue
    invitation to address the assembly, 'word of encouragement' is idiomatic and broad
    enough to include exhortation without sounding technical.
- source_word: πρὸς τὸν λαόν
  chosen: for the people
  alternatives:
  - to the people
  lexicon: BDAG
  rationale: In context this phrase marks the intended audience of the address. 'For
    the people' reads naturally in English, though 'to the people' is also possible.
- source_word: λέγετε
  chosen: speak
  alternatives:
  - say it
  - speak up
  lexicon: BDAG
  rationale: Imperative inviting them to address the assembly. 'Speak' is concise
    and natural in English.
- source_word: εἴ τίς ἐστιν ἐν ὑμῖν
  chosen: if there is among you any
  alternatives:
  - if any of you has
  - if there is any among you
  lexicon: BDAG
  rationale: 'The Greek is somewhat impersonal: ''if there is in you/among you any
    word...'' Rendering it as ''if there is among you any'' preserves the structure
    without becoming wooden.'
