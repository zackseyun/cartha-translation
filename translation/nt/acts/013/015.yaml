theological_decisions:
- issue: Gendered address in synagogue setting
  chosen_reading: Brothers
  alternative_readings:
  - Brothers and sisters
  rationale: The Greek vocative Ἄνδρες ἀδελφοί is explicitly masculine and addresses
    the male visitors who are being invited to speak. Per the translation philosophy,
    the masculine form is retained rather than generalized.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
