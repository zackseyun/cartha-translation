id: ACT.13.50
reference: Acts 13:50
source:
  edition: SBLGNT
  text: οἱ δὲ Ἰουδαῖοι παρώτρυναν τὰς σεβομένας ⸀γυναῖκας τὰς εὐσχήμονας καὶ τοὺς
    πρώτους τῆς πόλεως καὶ ἐπήγειραν διωγμὸν ἐπὶ τὸν Παῦλον ⸀καὶ Βαρναβᾶν, καὶ ἐξέβαλον
    αὐτοὺς ἀπὸ τῶν ὁρίων αὐτῶν.
translation:
  text: But the Jews stirred up the devout women of high standing and the leading
    men of the city, and they incited persecution against Paul and Barnabas and drove
    them out of their district.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God-fearing women.' The participle can denote women who worshiped the
      God of Israel, possibly Gentile adherents associated with the synagogue.
    reason: lexical_alternative
  - marker: b
    text: Or 'from their region' or 'from their borders.' The Greek term can refer
      to territorial boundaries or the district enclosed by them.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρώτρυναν
  chosen: stirred up
  alternatives:
  - urged on
  - incited
  lexicon: BDAG
  rationale: Conveys active instigation by the Jews toward the women and city leaders.
    'Stirred up' is idiomatic modern English and fits the hostile social agitation
    in context.
- source_word: σεβομένας γυναῖκας
  chosen: the devout women
  alternatives:
  - the worshiping women
  - the God-fearing women
  lexicon: BDAG
  rationale: σέβομαι in Acts often refers to reverent worship, frequently of Gentile
    adherents to Judaism. 'Devout' preserves religious seriousness without over-specifying
    technical status. 'God-fearing' is possible but more interpretive here.
- source_word: εὐσχήμονας
  chosen: of high standing
  alternatives:
  - prominent
  - honorable
  - respectable
  lexicon: BDAG
  rationale: The adjective denotes social respectability or prominence. 'Of high standing'
    captures both status and public esteem in natural English.
- source_word: τοὺς πρώτους τῆς πόλεως
  chosen: the leading men of the city
  alternatives:
  - the first men of the city
  - the city leaders
  - the prominent men of the city
  lexicon: BDAG
  rationale: πρῶτος here refers to those foremost in civic rank. 'Leading men' is
    a clear idiomatic rendering and preserves the masculine reference present in the
    Greek.
- source_word: ἐπήγειραν διωγμὸν
  chosen: they incited persecution
  alternatives:
  - they stirred up persecution
  - they raised up persecution
  lexicon: BDAG
  rationale: The verb-noun combination expresses causing persecution to arise. 'Incited
    persecution' is concise and natural while preserving causative force.
- source_word: ἐπὶ τὸν Παῦλον καὶ Βαρναβᾶν
  chosen: against Paul and Barnabas
  alternatives:
  - toward Paul and Barnabas
  lexicon: BDAG
  rationale: With διωγμός, ἐπί + accusative is naturally rendered 'against,' indicating
    hostile direction.
- source_word: ἐξέβαλον
  chosen: drove ... out
  alternatives:
  - cast ... out
  - expelled
  lexicon: BDAG
  rationale: ἐκβάλλω is forceful. 'Drove out' preserves the coercive sense in readable
    English better than the more formal 'expelled,' while 'cast out' can sound archaic
    here.
- source_word: ἀπὸ τῶν ὁρίων αὐτῶν
  chosen: out of their district
  alternatives:
  - from their region
  - from their borders
  - from their territory
  lexicon: BDAG
  rationale: ὅρια can mean borders, region, or district. In this civic setting, 'district'
    communicates the local territorial jurisdiction from which Paul and Barnabas were
    expelled. 'Their' refers to the city's people/authorities, not possession in a
    strict personal sense.
- source_word: οἱ δὲ Ἰουδαῖοι
  chosen: But the Jews
  alternatives:
  - Now the Jews
  lexicon: BDAG
  rationale: δέ marks contrast with the previous positive response. 'But' best reflects
    the narrative turn.
