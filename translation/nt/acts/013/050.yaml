- issue: Rendering of socially marked masculine terms in a mixed clause
  chosen_reading: the leading men of the city
  alternative_readings:
  - the city leaders
  rationale: The Greek explicitly uses a masculine plural expression for the civic
    elite. Following the project's gender-accurate policy, the translation preserves
    the masculine reference rather than neutralizing it, while still rendering naturally
    in English.
