id: ACT.13.11
reference: Acts 13:11
source:
  edition: SBLGNT
  text: καὶ νῦν ἰδοὺ χεὶρ κυρίου ἐπὶ σέ, καὶ ἔσῃ τυφλὸς μὴ βλέπων τὸν ἥλιον ἄχρι καιροῦ.
    παραχρῆμα ⸀δὲ ⸀ἔπεσεν ἐπ’ αὐτὸν ἀχλὺς καὶ σκότος, καὶ περιάγων ἐζήτει χειραγωγούς.
translation:
  text: And now, look, the hand of the Lord is upon you, and you will be blind, not
    seeing the sun for a time. Immediately a mist and darkness fell upon him, and
    groping about, he was seeking people to lead him by the hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for a season.'
    reason: lexical_alternative
  - marker: c
    text: The expression 'the hand of the Lord' is a biblical idiom for the Lord's
      active power, here in judgment.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: Rendered with a natural but still vivid attention-getter in modern English.
    'Behold' is more formal/traditional but less natural; 'look' preserves the deictic
    force.
- source_word: χεὶρ κυρίου
  chosen: the hand of the Lord
  alternatives:
  - the Lord's hand
  lexicon: BDAG
  rationale: Kept the idiom in a transparent form. In context it signifies divine
    action/judgment, but the metaphor should remain explicit rather than paraphrased.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. Here it refers to
    the Lord in a divine-judicial sense.
- source_word: ἔσῃ τυφλὸς
  chosen: you will be blind
  alternatives:
  - you will become blind
  lexicon: BDAG
  rationale: Future of εἰμί with predicate adjective is naturally rendered 'you will
    be blind.' English context already implies the onset of blindness.
- source_word: μὴ βλέπων τὸν ἥλιον
  chosen: not seeing the sun
  alternatives:
  - unable to see the sun
  - not able to see the sun
  lexicon: BDAG
  rationale: Retains the participial construction's descriptive force without overexpanding
    it. Mention of 'the sun' is kept literally rather than generalized to 'daylight'.
- source_word: ἄχρι καιροῦ
  chosen: for a time
  alternatives:
  - until a time
  - for a season
  lexicon: BDAG
  rationale: Idiomatic English for a temporary but unspecified period. 'For a season'
    is possible but slightly more stylized.
- source_word: παραχρῆμα
  chosen: Immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Conveys the suddenness of the judgment in clear modern English.
- source_word: ἀχλὺς
  chosen: a mist
  alternatives:
  - a haze
  - dimness
  lexicon: BDAG
  rationale: ἀχλύς denotes a dimming obscurity or mist before the eyes. 'Mist' preserves
    the concrete imagery and pairs well with 'darkness.'
- source_word: σκότος
  chosen: darkness
  alternatives:
  - gloom
  lexicon: BDAG
  rationale: Standard rendering that preserves both literal and ominous force.
- source_word: περιάγων
  chosen: groping about
  alternatives:
  - wandering about
  - going around
  lexicon: BDAG
  rationale: In context of sudden blindness, the participle implies moving around
    uncertainly in search of help. 'Groping about' makes the situational sense explicit
    without adding content foreign to the context.
- source_word: ἐζήτει χειραγωγούς
  chosen: he was seeking people to lead him by the hand
  alternatives:
  - he sought guides
  - he was looking for hand-guides
  lexicon: BDAG
  rationale: χειραγωγός is specifically one who leads another by the hand. The fuller
    rendering preserves that concrete sense better than the generic 'guides.'
