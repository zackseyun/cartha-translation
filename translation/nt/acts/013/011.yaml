theological_decisions:
- issue: Nature of 'the hand of the Lord'
  chosen_reading: Retained as a literal idiom for divine action/judgment without paraphrasing
    it as punishment or curse.
  alternative_readings:
  - the Lord's judgment is upon you
  - the Lord is striking you
  rationale: The phrase clearly signals divine intervention, but the translation should
    preserve the biblical idiom rather than interpretively expand it into a fuller
    theological statement.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
