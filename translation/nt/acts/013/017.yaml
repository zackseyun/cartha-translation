theological_decisions:
- issue: Rendering of Israel's ancestors
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly uses πατέρας, and the translation philosophy prefers
    gender-accurate renderings over neutralizing language unless context demands otherwise.
    In Paul's synagogue speech, the covenant-historical reference to the patriarchal
    forefathers is prominent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Interpretation of ὕψωσεν in Egypt
  chosen_reading: made the people great
  alternative_readings:
  - exalted the people
  - increased the people
  rationale: The verb can suggest exaltation or increase. This rendering preserves
    the historical-theological point that God caused Israel to prosper in Egypt without
    narrowing the sense to only status or only population growth.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
