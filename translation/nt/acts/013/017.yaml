id: ACT.13.17
reference: Acts 13:17
source:
  edition: SBLGNT
  text: ὁ θεὸς τοῦ λαοῦ τούτου ⸀Ἰσραὴλ ἐξελέξατο τοὺς πατέρας ἡμῶν, καὶ τὸν λαὸν ὕψωσεν
    ἐν τῇ παροικίᾳ ἐν γῇ ⸀Αἰγύπτου, καὶ μετὰ βραχίονος ὑψηλοῦ ἐξήγαγεν αὐτοὺς ἐξ αὐτῆς,
translation:
  text: The God of this people Israel chose our fathers, and made the people great
    during their sojourn in the land of Egypt, and with an uplifted arm he led them
    out from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''our ancestors.'' Greek: ''our fathers.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'exalted the people' or 'increased the people.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'with a high arm'; an Exodus idiom for God's powerful deliverance.
    reason: cultural_note
  - marker: d
    text: Or 'he brought them out from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς
  chosen: The God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The article is naturally represented in English by 'The God' in this
    genitival construction, preserving the formal opening of the sentence.
- source_word: τοῦ λαοῦ τούτου Ἰσραήλ
  chosen: of this people Israel
  alternatives:
  - of this Israelite people
  - of this people, Israel
  lexicon: BDAG
  rationale: Keeps the appositional/genitival structure close to the Greek. 'Israel'
    is retained as a proper name rather than converted to an adjective.
- source_word: ἐξελέξατο
  chosen: chose
  alternatives:
  - selected
  - chose for himself
  lexicon: BDAG
  rationale: Aorist middle of ἐκλέγομαι is best rendered simply 'chose' in idiomatic
    English; the middle nuance does not require explicit expression here.
- source_word: τοὺς πατέρας ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: Retains the masculine familial term actually used in Greek, in keeping
    with the gender-accurate policy. 'Ancestors' is possible but less formally aligned
    with the source.
- source_word: τὸν λαὸν
  chosen: the people
  alternatives:
  - the nation
  lexicon: BDAG
  rationale: λαός regularly denotes a people-group; 'the people' preserves continuity
    with the first clause and the covenant-historical sense.
- source_word: ὕψωσεν
  chosen: made the people great
  alternatives:
  - exalted the people
  - increased the people
  lexicon: BDAG
  rationale: In this Exodus-setting context, ὑψόω likely refers to God's causing Israel
    to flourish or become numerous/status-elevated in Egypt. 'Made the people great'
    captures the result in natural English without overcommitting to either purely
    social exaltation or strictly numerical increase.
- source_word: ἐν τῇ παροικίᾳ
  chosen: during their sojourn
  alternatives:
  - in their sojourning
  - during their stay as foreigners
  lexicon: BDAG
  rationale: παροικία denotes residence as a foreigner/temporary stay. 'Sojourn' preserves
    the biblical-historical nuance and remains readable.
- source_word: ἐν γῇ Αἰγύπτου
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: BDAG
  rationale: The fuller phrase 'in the land of Egypt' reflects the explicit γῇ and
    preserves the elevated historical style.
- source_word: μετὰ βραχίονος ὑψηλοῦ
  chosen: with an uplifted arm
  alternatives:
  - with a high arm
  - with a mighty arm
  lexicon: BDAG
  rationale: This is a biblical idiom echoing the Exodus tradition. 'Uplifted arm'
    is a fairly literal rendering that preserves the metaphor; 'mighty arm' interprets
    the idiom more dynamically.
- source_word: ἐξήγαγεν
  chosen: he led them out
  alternatives:
  - he brought them out
  lexicon: BDAG
  rationale: Both are possible, but 'led them out' fits naturally with the prepositional
    phrase 'from it' and preserves the directional force of ἐξάγω.
- source_word: ἐξ αὐτῆς
  chosen: from it
  alternatives:
  - out of it
  - from there
  lexicon: BDAG
  rationale: Refers back to Egypt. 'From it' is concise and idiomatic after 'led them
    out.'
