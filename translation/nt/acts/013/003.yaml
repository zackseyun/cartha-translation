id: ACT.13.3
reference: Acts 13:3
source:
  edition: SBLGNT
  text: τότε νηστεύσαντες καὶ προσευξάμενοι καὶ ἐπιθέντες τὰς χεῖρας αὐτοῖς ἀπέλυσαν.
translation:
  text: Then, after fasting and praying and laying their hands on them, they sent
    them off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they released them' or 'they dismissed them.' In context, the sense
      is that Barnabas and Saul were allowed to depart for the mission.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal/sequential adverb marking what followed the prior prophetic
    direction; 'Then' is natural and sufficiently formal.
- source_word: νηστεύσαντες
  chosen: after fasting
  alternatives:
  - having fasted
  - when they had fasted
  lexicon: BDAG
  rationale: Aorist participle indicating action preceding the main verb. 'After fasting'
    conveys the participial sequence in readable English.
- source_word: προσευξάμενοι
  chosen: praying
  alternatives:
  - having prayed
  - offering prayer
  lexicon: BDAG
  rationale: Middle participle coordinated with the other preparatory actions. 'Praying'
    keeps the sequence concise and natural alongside 'after fasting.'
- source_word: ἐπιθέντες τὰς χεῖρας αὐτοῖς
  chosen: laying their hands on them
  alternatives:
  - having laid hands on them
  - placing their hands on them
  lexicon: BDAG
  rationale: Idiomatic expression for the commissioning gesture. Retaining 'hands'
    preserves the concrete action and avoids paraphrase.
- source_word: ἀπέλυσαν
  chosen: they sent them off
  alternatives:
  - they released them
  - they dismissed them
  lexicon: BDAG
  rationale: In this missionary context, the verb means to let them go/depart rather
    than merely dismiss a meeting. 'Sent them off' best fits the context while remaining
    close to the Greek.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - on them
  - to them
  lexicon: BDAG
  rationale: Dative pronoun governed by the hand-laying phrase and then resumed by
    the main clause in English as the object of 'sent them off.' The referent is Barnabas
    and Saul.
