theological_decisions:
- issue: Nature of the hand-laying action
  chosen_reading: Render the action descriptively as a commissioning gesture without
    importing a specific sacramental or ordination theology.
  alternative_readings:
  - ordination
  - blessing
  - formal commissioning
  rationale: The verse reports fasting, prayer, laying on of hands, and sending, but
    does not itself define the precise ecclesial status or sacramental meaning of
    the act. The translation should preserve the action without resolving denominational
    debates.
  doctrine_reference: Preserve theological tension rather than resolve it.
