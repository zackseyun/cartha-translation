id: ACT.13.41
reference: Acts 13:41
source:
  edition: SBLGNT
  text: Ἴδετε, οἱ καταφρονηταί, καὶ θαυμάσατε καὶ ἀφανίσθητε, ὅτι ἔργον ⸂ἐργάζομαι
    ἐγὼ⸃ ἐν ταῖς ἡμέραις ὑμῶν, ⸀ἔργον ὃ οὐ μὴ πιστεύσητε ἐάν τις ἐκδιηγῆται ὑμῖν.
translation:
  text: Look, you scoffers, and marvel, and perish; for I am doing a work in your
    days, a work that you will certainly not believe if someone tells it to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despisers.' The Greek term can denote those who treat something with
      contempt; 'scoffers' brings out the derisive force in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'vanish' or 'be destroyed.' The quotation echoes Habakkuk 1:5 in Greek
      and carries a strong warning of ruin.
    reason: alternative_reading
  - marker: c
    text: The verb can mean 'recount fully' or 'tell in detail.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἴδετε
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: Aorist imperative plural calling for attention. 'Look' is vivid, natural
    modern English; 'Behold' is too archaic, while 'See' is slightly flatter.
- source_word: καταφρονηταί
  chosen: scoffers
  alternatives:
  - despisers
  - mockers
  lexicon: BDAG
  rationale: In this citation context the sense is not merely intellectual disregard
    but contemptuous rejection. 'Scoffers' communicates active derision better than
    the more literal but less idiomatic 'despisers.'
- source_word: θαυμάσατε
  chosen: marvel
  alternatives:
  - wonder
  - be astonished
  lexicon: BDAG
  rationale: Imperative matching the prophetic citation. 'Marvel' preserves the sharp,
    ironic force of being struck with astonishment without overexpanding the wording.
- source_word: ἀφανίσθητε
  chosen: perish
  alternatives:
  - vanish
  - be destroyed
  lexicon: BDAG
  rationale: The passive imperative in this quotation likely carries the sense of
    coming to ruin/disappearing under judgment. 'Perish' is idiomatic and preserves
    the warning tone better than the more wooden 'vanish.'
- source_word: ἔργον
  chosen: work
  alternatives:
  - deed
  - act
  lexicon: BDAG
  rationale: Standard rendering for ἔργον here, referring to a significant divine
    act. 'Work' is both natural and broad enough to preserve the prophetic force.
- source_word: ἐργάζομαι ἐγώ
  chosen: I am doing
  alternatives:
  - I am working
  - I work
  lexicon: BDAG
  rationale: Present middle indicative with explicit ἐγώ gives emphasis to God's present
    action. 'I am doing' is idiomatic with 'a work' in English and preserves the ongoing
    aspect.
- source_word: ἐν ταῖς ἡμέραις ὑμῶν
  chosen: in your days
  alternatives:
  - during your days
  - in the days of you
  lexicon: BDAG
  rationale: Natural English equivalent preserving temporal reference and rhetorical
    immediacy.
- source_word: οὐ μὴ πιστεύσητε
  chosen: you will certainly not believe
  alternatives:
  - you will never believe
  - you will by no means believe
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic negation. 'Will certainly
    not believe' preserves the force in clear modern English without sounding stilted.
- source_word: ἐάν τις ἐκδιηγῆται ὑμῖν
  chosen: if someone tells it to you
  alternatives:
  - if anyone explains it to you
  - if someone recounts it to you fully
  lexicon: BDAG
  rationale: ἐκδιηγέομαι suggests narrating or relating in detail. Because English
    requires a natural object, 'it' refers back to the work. 'Tells it to you' is
    concise and readable, while a fuller nuance is preserved in a footnote.
