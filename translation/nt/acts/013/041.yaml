theological_decisions:
- issue: Rendering the prophetic warning from Habakkuk as quoted in Acts
  chosen_reading: Use direct judicial language ('perish') and emphatic unbelief without
    softening the warning.
  alternative_readings:
  - Use 'vanish' to mirror the LXX wording more literally
  - Use 'be astounded' without explicit judicial force
  rationale: The verse functions as a solemn warning against rejecting God's saving
    work. The translation should preserve the severity of the citation while remaining
    idiomatic. 'Perish' best conveys the judgment-laden force in context.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense;
    do not import or soften doctrinal claims.'
