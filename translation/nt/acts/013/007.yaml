theological_decisions:
- issue: Rendering λόγον τοῦ θεοῦ
  chosen_reading: the word of God
  alternative_readings:
  - God's message
  rationale: The phrase can be rendered more dynamically as 'God's message,' but the
    traditional and more formally transparent 'the word of God' best preserves the
    source wording without importing additional doctrinal nuance.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Nuance of συνετῷ in describing Sergius Paulus
  chosen_reading: an intelligent man
  alternative_readings:
  - a prudent man
  - a man of understanding
  rationale: The term describes discernment or intelligence, not necessarily moral
    virtue in a theological sense. The rendering avoids overstating the commendation
    while keeping the positive characterization.
  doctrine_reference: Translation philosophy §6
