id: ACT.13.7
reference: Acts 13:7
source:
  edition: SBLGNT
  text: ὃς ἦν σὺν τῷ ἀνθυπάτῳ Σεργίῳ Παύλῳ, ἀνδρὶ συνετῷ. οὗτος προσκαλεσάμενος Βαρναβᾶν
    καὶ Σαῦλον ἐπεζήτησεν ἀκοῦσαι τὸν λόγον τοῦ θεοῦ·
translation:
  text: who was with the proconsul Sergius Paulus, an intelligent man. This man summoned
    Barnabas and Saul and sought to hear the word of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a prudent man" or "a man of understanding."
    reason: lexical_alternative
  - marker: b
    text: Or "God's message."
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθυπάτῳ
  chosen: proconsul
  alternatives:
  - governor
  lexicon: BDAG
  rationale: The term denotes a Roman provincial official specifically holding the
    rank/title of proconsul. 'Proconsul' is more precise than the generic 'governor'
    and fits Luke's historical usage.
- source_word: σὺν
  chosen: with
  alternatives:
  - in the company of
  - associated with
  lexicon: BDAG
  rationale: The preposition straightforwardly indicates association or accompaniment
    here; 'with' is the most natural and sufficiently precise rendering.
- source_word: ἀνδρὶ συνετῷ
  chosen: an intelligent man
  alternatives:
  - a prudent man
  - a man of understanding
  lexicon: BDAG
  rationale: συνετός conveys intelligence, understanding, or prudence. 'Intelligent'
    is clear modern English and fits the narrative description of Sergius Paulus without
    sounding archaic.
- source_word: οὗτος
  chosen: This man
  alternatives:
  - He
  - This one
  lexicon: BDAG
  rationale: The demonstrative adds slight emphasis/resumption after the appositional
    description. 'This man' preserves that discourse function better than a simple
    'he'.
- source_word: προσκαλεσάμενος
  chosen: summoned
  alternatives:
  - called for
  - invited
  lexicon: BDAG
  rationale: The middle participle indicates having called Barnabas and Saul to himself.
    'Summoned' captures the official initiative of a Roman authority figure, though
    not necessarily coercively.
- source_word: ἐπεζήτησεν
  chosen: sought
  alternatives:
  - desired
  - requested
  lexicon: BDAG
  rationale: The verb means to seek or desire earnestly. 'Sought' preserves the verbal
    force and leaves the infinitive 'to hear' to complete the sense.
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: A direct and standard rendering of the aorist infinitive; 'to hear' is
    idiomatic in English in contexts of receiving a message.
- source_word: λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's message
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed message from God. 'The word of God'
    preserves the familiar biblical expression while remaining faithful to the Greek.
- source_word: Σεργίῳ Παύλῳ
  chosen: Sergius Paulus
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
- source_word: Βαρναβᾶν καὶ Σαῦλον
  chosen: Barnabas and Saul
  rationale: Personal names are transliterated rather than translated, following project
    policy.
