theological_decisions:
- issue: Rendering of the personal name Βαριησοῦ
  chosen_reading: Bar-Jesus
  alternative_readings:
  - Barjesus
  rationale: The project philosophy says to transliterate names rather than translate
    titles or name elements. Although the Semitic form likely means 'son of Jesus/Joshua,'
    translating the name would overstep the text's function here as a proper name.
    Hyphenation is retained for readability and to signal the patronymic structure.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
