id: ACT.13.6
reference: Acts 13:6
source:
  edition: SBLGNT
  text: διελθόντες δὲ ⸀ὅλην τὴν νῆσον ἄχρι Πάφου εὗρον ⸀ἄνδρα τινὰ μάγον ψευδοπροφήτην
    Ἰουδαῖον ᾧ ὄνομα ⸀Βαριησοῦ,
translation:
  text: And after they had gone through the whole island as far as Paphos, they found
    a certain man, a magician, a false prophet, a Jew, whose name was Bar-Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bar-Jesus may also be written Barjesus; the name likely reflects a Semitic
      patronymic meaning 'son of Jesus' or 'son of Joshua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διελθόντες
  chosen: after they had gone through
  alternatives:
  - having gone through
  - when they had traveled through
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb εὗρον is best represented as
    antecedent action in English. 'Gone through' preserves the sense of traversing
    the island without overinterpreting the manner of travel.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. 'And'
    is natural modern English and avoids implying stronger contrast than the Greek
    warrants.
- source_word: ὅλην τὴν νῆσον
  chosen: the whole island
  alternatives:
  - the entire island
  - all the island
  lexicon: BDAG
  rationale: This straightforwardly denotes traversal of Cyprus in its entirety. 'The
    whole island' is idiomatic and sufficiently formal.
- source_word: ἄχρι Πάφου
  chosen: as far as Paphos
  alternatives:
  - up to Paphos
  - until Paphos
  lexicon: BDAG
  rationale: ἄχρι marks the endpoint of the journey. 'As far as Paphos' is the most
    natural English expression for geographic extent.
- source_word: εὗρον
  chosen: they found
  alternatives:
  - they came upon
  - they encountered
  lexicon: BDAG
  rationale: The simple narrative aorist is well rendered by 'they found.' It keeps
    the discovery sense without adding nuance.
- source_word: ἄνδρα τινὰ
  chosen: a certain man
  alternatives:
  - a man
  - a particular man
  lexicon: BDAG
  rationale: τινά adds indefiniteness with a slight individuating force. 'A certain
    man' preserves that force better than the bare 'a man.'
- source_word: μάγον
  chosen: a magician
  alternatives:
  - a magus
  - a sorcerer
  lexicon: BDAG
  rationale: μάγος in this context refers to an occult practitioner, not one of the
    honored eastern visitors of Matthew 2 as such. 'Magician' is accessible modern
    English and fits the negative context. 'Magus' is too opaque for most readers;
    'sorcerer' is possible but somewhat more interpretive.
- source_word: ψευδοπροφήτην
  chosen: a false prophet
  alternatives:
  - a fraudulent prophet
  lexicon: BDAG
  rationale: This is the standard and transparent rendering of ψευδοπροφήτης, preserving
    the religious claim and its falsity.
- source_word: Ἰουδαῖον
  chosen: a Jew
  alternatives:
  - Jewish
  - a Judean
  lexicon: BDAG
  rationale: As an accusative adjective used substantivally/appositionally with ἄνδρα,
    it identifies the man ethnically/religiously. In Acts, 'Jew' is the normal rendering
    unless a specifically geographic Judean sense is demanded, which is not evident
    here.
- source_word: ᾧ ὄνομα Βαριησοῦ
  chosen: whose name was Bar-Jesus
  alternatives:
  - whose name was Barjesus
  lexicon: BDAG
  rationale: This idiom is naturally rendered 'whose name was ...' The personal name
    is transliterated per project philosophy. Hyphenating 'Bar-Jesus' helps English
    readers recognize the Semitic patronymic element 'Bar' ('son of').
