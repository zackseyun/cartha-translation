theological_decisions:
- issue: Rendering of πίστις
  chosen_reading: the faith
  alternative_readings:
  - faith
  rationale: The doctrinal guideline sets 'faith' as the default for πίστις. Here
    the article and context of conversion/opposition support a more definite sense,
    referring to the Christian faith rather than faith in an abstract sense. The alternative
    is preserved in a footnote because English readers may hear either nuance.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
