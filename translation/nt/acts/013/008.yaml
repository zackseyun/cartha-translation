id: ACT.13.8
reference: Acts 13:8
source:
  edition: SBLGNT
  text: ἀνθίστατο δὲ αὐτοῖς Ἐλύμας ὁ μάγος, οὕτως γὰρ μεθερμηνεύεται τὸ ὄνομα αὐτοῦ,
    ζητῶν διαστρέψαι τὸν ἀνθύπατον ἀπὸ τῆς πίστεως.
translation:
  text: But Elymas the magician opposed them—for that is how his name is translated—seeking
    to turn the proconsul away from the faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “away from faith.” The Greek phrase may be heard either as turning
      him away from the Christian faith specifically or from believing response more
      generally.'
    reason: alternative_reading
  - marker: b
    text: “Elymas” is explained as a translated or interpreted name; the exact derivation
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθίστατο
  chosen: opposed
  alternatives:
  - withstood
  - resisted
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing opposition. 'Opposed' is natural modern
    English and preserves the adversarial sense without archaic tone.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding positive reception; 'But' best signals
    the adversative force in context.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - Paul and Barnabas
  - them both
  lexicon: BDAG
  rationale: The pronoun refers to the missionaries already in context. 'Them' preserves
    the Greek without over-specifying in the main text.
- source_word: Ἐλύμας
  chosen: Elymas
  rationale: Personal name is transliterated per translation philosophy.
- source_word: ὁ μάγος
  chosen: the magician
  alternatives:
  - the magus
  - the sorcerer
  lexicon: BDAG
  rationale: μάγος can denote magician, sorcerer, or magus. 'Magician' is the most
    accessible rendering here and matches the explanatory apposition to Elymas without
    importing more pejorative force than necessary.
- source_word: οὕτως γὰρ μεθερμηνεύεται τὸ ὄνομα αὐτοῦ
  chosen: for that is how his name is translated
  alternatives:
  - for so his name is interpreted
  - for this is the meaning of his name
  lexicon: BDAG
  rationale: μεθερμηνεύεται refers to translation/interpretation of a name. This rendering
    is idiomatic and preserves the explanatory parenthesis.
- source_word: ζητῶν
  chosen: seeking
  alternatives:
  - trying
  - attempting
  lexicon: BDAG
  rationale: The participle expresses purpose or intent accompanying his opposition.
    'Seeking' preserves the verbal connection and is suitably formal yet readable.
- source_word: διαστρέψαι
  chosen: to turn ... away
  alternatives:
  - to distort
  - to mislead
  - to pervert
  lexicon: BDAG
  rationale: In this context the object is a person ('the proconsul') with ἀπό plus
    'the faith,' so the sense is to turn someone away from something rather than merely
    distort an idea. 'Turn ... away' communicates the relational/apostasy sense clearly.
- source_word: τὸν ἀνθύπατον
  chosen: the proconsul
  alternatives:
  - the governor
  lexicon: BDAG
  rationale: ἀνθύπατος is a specific Roman administrative title. 'Proconsul' preserves
    the historical precision better than the more generic 'governor'.
- source_word: ἀπὸ τῆς πίστεως
  chosen: away from the faith
  alternatives:
  - from the faith
  - away from faith
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine guidelines. The article likely
    points to the Christian faith as the object from which Sergius Paulus was being
    turned, so 'the faith' is appropriate here.
