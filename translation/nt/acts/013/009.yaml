theological_decisions:
- issue: Rendering πνεύματος ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - a holy spirit
  rationale: In Acts, the phrase refers to the divine Holy Spirit, especially in empowerment
    contexts. The narrative setting and Lukan usage strongly support the personal
    divine referent rather than an indefinite qualitative sense.
