id: ACT.13.9
reference: Acts 13:9
source:
  edition: SBLGNT
  text: Σαῦλος δέ, ὁ καὶ Παῦλος, πλησθεὶς πνεύματος ⸀ἁγίου ἀτενίσας εἰς αὐτὸν
translation:
  text: But Saul, who was also Paul, filled with the Holy Spirit, looked intently
    at him
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'also called Paul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαῦλος
  chosen: Saul
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, following
    the philosophy of transliterating personal names.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild development or contrast with the preceding narrative. 'But'
    best captures the discourse turn here as the narrative shifts to Saul's response.
- source_word: ὁ καὶ Παῦλος
  chosen: who was also Paul
  alternatives:
  - also called Paul
  - who is also Paul
  lexicon: BDAG
  rationale: The article with καί and the second name identifies Saul by an additional
    name. 'Who was also Paul' is natural English and preserves the explanatory apposition
    without overinterpreting why the name is introduced.
- source_word: πλησθεὶς
  chosen: filled
  alternatives:
  - having been filled
  - full
  lexicon: BDAG
  rationale: Aorist passive participle from πίμπλημι. 'Filled' preserves the passive
    sense and works idiomatically in English when linked with the following participle.
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - the Holy Ghost
  lexicon: BDAG
  rationale: Genitive construction after 'filled' is idiomatically rendered in English
    as 'filled with the Holy Spirit.' The referent is the divine Spirit, so capitalization
    is appropriate. The article is supplied in English for naturalness though absent
    in Greek.
- source_word: ἀτενίσας
  chosen: looked intently
  alternatives:
  - fixed his gaze
  - stared
  lexicon: BDAG
  rationale: Aorist active participle meaning to look steadily or intently. 'Looked
    intently' is clear modern English and preserves the force without sounding overly
    wooden.
- source_word: εἰς αὐτόν
  chosen: at him
  alternatives:
  - toward him
  - into him
  lexicon: BDAG
  rationale: After ἀτενίζω, εἰς with the accusative is naturally rendered 'at him'
    in English. This preserves the directional focus of Saul's gaze toward Elymas.
