id: ACT.16.11
reference: Acts 16:11
source:
  edition: SBLGNT
  text: Ἀναχθέντες ⸀οὖν ⸀ἀπὸ Τρῳάδος εὐθυδρομήσαμεν εἰς Σαμοθρᾴκην, τῇ ⸀δὲ ἐπιούσῃ
    εἰς ⸂Νέαν Πόλιν⸃,
translation:
  text: So, after putting out to sea from Troas, we sailed straight to Samothrace,
    and on the following day to Neapolis,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having set sail from Troas, we made a direct voyage to Samothrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχθέντες
  chosen: after putting out to sea
  alternatives:
  - having set sail
  - after setting sail
  lexicon: BDAG
  rationale: The participle from ἀνάγω in nautical contexts means to put out to sea
    or set sail. 'After putting out to sea' makes the maritime sense explicit in natural
    English while preserving the participial sequence.
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is idiomatic modern English
    and fits Luke's travel narrative without sounding overly formal.
- source_word: ἀπὸ Τρῳάδος
  chosen: from Troas
  lexicon: BDAG
  rationale: Standard rendering of the prepositional phrase indicating point of departure.
    'Troas' is the conventional English transliteration of the place name Τρῳάς.
- source_word: εὐθυδρομήσαμεν
  chosen: we sailed straight
  alternatives:
  - we made a direct voyage
  - we ran a straight course
  lexicon: BDAG
  rationale: The verb denotes sailing a straight course. 'We sailed straight' is concise,
    natural, and preserves the directional force without unnecessary technicality.
- source_word: εἰς Σαμοθρᾴκην
  chosen: to Samothrace
  lexicon: BDAG
  rationale: εἰς marks destination; 'Samothrace' is the standard English transliteration.
- source_word: τῇ δὲ ἐπιούσῃ
  chosen: and on the following day
  alternatives:
  - and the next day
  - and on the next day
  lexicon: BDAG
  rationale: This dative temporal expression means 'on the next/following day.' 'Following
    day' is slightly more formal and fits the travel itinerary style. δέ is represented
    by 'and' to continue the sequence.
- source_word: εἰς Νέαν Πόλιν
  chosen: to Neapolis
  alternatives:
  - to New City
  lexicon: BDAG
  rationale: As a place name, Νέαν Πόλιν should be transliterated rather than translated,
    in keeping with the philosophy to transliterate names. 'Neapolis' is the established
    English form.
