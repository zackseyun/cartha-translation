theological_decisions:
- issue: Definiteness of ὁδὸν σωτηρίας
  chosen_reading: a way of salvation
  alternative_readings:
  - the way of salvation
  rationale: Because ὁδόν is anarthrous, the translation preserves the Greek's indefiniteness
    rather than making an exclusivist theological claim more explicit than the wording
    itself does. The broader Lukan theology may affirm the uniqueness of salvation
    in Christ, but this verse's wording is best represented with 'a way.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
