id: ACT.16.17
reference: Acts 16:17
source:
  edition: SBLGNT
  text: αὕτη ⸀κατακολουθοῦσα τῷ Παύλῳ καὶ ἡμῖν ἔκραζεν λέγουσα· Οὗτοι οἱ ἄνθρωποι
    δοῦλοι τοῦ θεοῦ τοῦ ὑψίστου εἰσίν, οἵτινες καταγγέλλουσιν ⸀ὑμῖν ὁδὸν σωτηρίας.
translation:
  text: She kept following Paul and us and crying out, saying, “These men are slaves
    of the Most High God, who are proclaiming to you a way of salvation.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the way of salvation.” The Greek reads literally “a/the way of salvation”;
      the noun 'way' has no article here, so the wording may be understood as either
      indefinite or definite in English.
    reason: alternative_reading
lexical_decisions:
- source_word: κατακολουθοῦσα
  chosen: kept following
  alternatives:
  - followed closely
  - was following
  lexicon: BDAG
  rationale: The present participle with the imperfect main verb suggests ongoing,
    repeated action. 'Kept following' captures the durative sense naturally in English.
- source_word: ἔκραζεν
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: The imperfect indicates repeated or continued loud speech. 'Crying out'
    preserves the force without over-specifying emotional tone.
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: Per the project's doctrine, δοῦλος should be rendered 'slave' where bonded
    status is salient. Here the speaker identifies Paul and his companions as belonging
    to God; 'slaves' preserves that ownership relation more clearly than 'servants'.
- source_word: τοῦ θεοῦ τοῦ ὑψίστου
  chosen: of the Most High God
  alternatives:
  - of God Most High
  lexicon: BDAG
  rationale: This is a standard divine title. 'The Most High God' is idiomatic English
    and preserves the superlative title ὕψιστος.
- source_word: καταγγέλλουσιν
  chosen: are proclaiming
  alternatives:
  - announce
  - declare
  lexicon: BDAG
  rationale: The verb denotes public announcement or proclamation. 'Are proclaiming'
    fits the present tense and the public, heralding sense.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: The dative is most naturally rendered as indirect object, 'to you,' indicating
    the audience of the proclamation.
- source_word: ὁδὸν σωτηρίας
  chosen: a way of salvation
  alternatives:
  - the way of salvation
  - a path to salvation
  lexicon: BDAG
  rationale: The anarthrous phrase lacks the article before ὁδόν, so 'a way of salvation'
    best reflects the Greek form. This avoids importing the more definite 'the way'
    unless context requires it.
