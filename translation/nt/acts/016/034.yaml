id: ACT.16.34
reference: Acts 16:34
source:
  edition: SBLGNT
  text: ἀναγαγών τε αὐτοὺς εἰς τὸν ⸀οἶκον παρέθηκεν τράπεζαν καὶ ⸀ἠγαλλιάσατο πανοικεὶ
    πεπιστευκὼς τῷ θεῷ.
translation:
  text: And after bringing them up into the house, he set a meal before them and rejoiced
    greatly with his whole household, because he had believed in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he set a table before them'; the Greek idiom refers to providing a meal.
    reason: lexical_alternative
  - marker: b
    text: The Greek can also be understood to emphasize that the rejoicing involved
      his entire household; some take the clause to imply the household also shared
      in the believing.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναγαγών
  chosen: after bringing ... up
  alternatives:
  - having brought ... up
  - bringing ... up
  lexicon: BDAG
  rationale: Aorist participle of ἀνάγω here is spatial, indicating movement upward
    into the house. 'After bringing ... up' gives natural English while preserving
    the participial sequence prior to the main verbs.
- source_word: οἶκον
  chosen: the house
  alternatives:
  - his house
  - the home
  lexicon: BDAG
  rationale: With the article, the phrase most naturally refers to the jailer's house.
    'The house' is a close rendering; English readers will infer possession from context.
    'Home' is possible but slightly more interpretive.
- source_word: παρέθηκεν τράπεζαν
  chosen: he set a meal before them
  alternatives:
  - he set a table before them
  - he served them food
  lexicon: BDAG
  rationale: The idiom literally involves setting a table, but in context it means
    providing food/hospitality. 'Set a meal before them' preserves the hospitality
    sense without wooden literalism.
- source_word: ἠγαλλιάσατο
  chosen: rejoiced greatly
  alternatives:
  - rejoiced
  - was overjoyed
  - exulted
  lexicon: BDAG
  rationale: The verb denotes exuberant joy. 'Rejoiced greatly' preserves the elevated
    sense while remaining readable modern English.
- source_word: πανοικεὶ
  chosen: with his whole household
  alternatives:
  - with all his house
  - household-wide
  lexicon: BDAG
  rationale: The adverb means 'with the whole household' or 'with all in the house.'
    This rendering is idiomatic and preserves the collective family/household scope.
- source_word: πεπιστευκὼς τῷ θεῷ
  chosen: because he had believed in God
  alternatives:
  - having believed in God
  - since he had come to believe in God
  lexicon: BDAG
  rationale: Perfect participle indicates a completed act with continuing result.
    In English, 'because he had believed in God' best explains the ground of the rejoicing
    in this sentence. 'Believed in God' is the most straightforward rendering of πιστεύω
    + dative here.
