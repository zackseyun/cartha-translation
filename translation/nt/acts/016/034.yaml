theological_decisions:
- issue: Scope of the rejoicing and believing in relation to the household
  chosen_reading: The main text presents the jailer as rejoicing with his whole household,
    with the cause stated as his having believed in God.
  alternative_readings:
  - The whole household rejoiced because all had believed in God
  - He rejoiced over his whole household having believed in God
  rationale: Greek syntax allows discussion over whether πανοικεὶ modifies the rejoicing
    alone or also implies household participation in the believing. The singular perfect
    participle πεπιστευκώς most directly refers to the jailer, so the translation
    keeps the singular subject in the main text and does not overstate a collective
    conversion beyond what this clause explicitly says.
  doctrine_reference: Preserve theological tension rather than resolve it.
