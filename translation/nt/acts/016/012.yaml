id: ACT.16.12
reference: Acts 16:12
source:
  edition: SBLGNT
  text: ⸀κἀκεῖθεν εἰς Φιλίππους, ἥτις ἐστὶν ⸂πρώτη τῆς μερίδος⸃ Μακεδονίας πόλις,
    κολωνία. ἦμεν δὲ ἐν ⸀ταύτῃ τῇ πόλει διατρίβοντες ἡμέρας τινάς.
translation:
  text: and from there to Philippi, which is a leading city of the district of Macedonia,
    a Roman colony. And we stayed in this city for some days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first city of the district of Macedonia.' The Greek phrase is difficult,
      and 'first' may refer to rank, prominence, or sequence.
    reason: alternative_reading
  - marker: b
    text: That is, a Roman colony, a city granted special status under Roman rule.
    reason: cultural_note
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: and from there
  alternatives:
  - and from there we went
  - from there
  lexicon: BDAG
  rationale: The compound adverb/conjunction links this movement with the previous
    travel sequence. 'And from there' preserves the connective force without adding
    an explicit verb not present in Greek.
- source_word: εἰς Φιλίππους
  chosen: to Philippi
  alternatives:
  - into Philippi
  lexicon: BDAG
  rationale: εἰς with a city name is naturally rendered 'to' in English travel narrative.
    'Philippi' is the standard transliteration of the plural-form place name Φίλιπποι.
- source_word: ἥτις
  chosen: which
  alternatives:
  - which indeed
  - a city that
  lexicon: BDAG
  rationale: ἥτις can carry a slightly qualitative/explanatory nuance, but simple
    'which' communicates the appositional explanation naturally in English without
    overtranslating.
- source_word: πρώτη τῆς μερίδος Μακεδονίας πόλις
  chosen: a leading city of the district of Macedonia
  alternatives:
  - the first city of the district of Macedonia
  - a foremost city of the district of Macedonia
  lexicon: BDAG
  rationale: The phrase is historically and syntactically difficult. Since Philippi
    was not the capital of Macedonia, rendering πρώτη as 'first' may mislead modern
    readers into a claim of rank or sequence that is debated. 'Leading city' captures
    the likely sense of prominence while remaining close to the Greek. μερίς is rendered
    'district' as a regional subdivision.
- source_word: κολωνία
  chosen: a Roman colony
  alternatives:
  - a colony
  lexicon: BDAG
  rationale: The Greek loanword denotes the formal Roman colonial status of Philippi.
    Adding 'Roman' makes explicit the historical referent that an English reader may
    not infer from 'colony' alone.
- source_word: ἦμεν ... διατρίβοντες
  chosen: we stayed
  alternatives:
  - we were spending time
  - we remained
  lexicon: BDAG
  rationale: The periphrastic construction conveys continued residence or spending
    time in a place. 'We stayed' is idiomatic and adequately reflects the imperfective
    sense in context.
- source_word: ἐν ταύτῃ τῇ πόλει
  chosen: in this city
  alternatives:
  - in that city
  lexicon: BDAG
  rationale: ταύτῃ is deictic and naturally rendered 'this' from the narrator's perspective.
    'In this city' preserves the demonstrative emphasis.
- source_word: ἡμέρας τινάς
  chosen: for some days
  alternatives:
  - for several days
  - for a few days
  lexicon: BDAG
  rationale: The accusative of extent with τις indicates an indefinite short period.
    'For some days' is a straightforward rendering that avoids overprecision.
