theological_decisions:
- issue: Meaning of πρώτη in the description of Philippi
  chosen_reading: Render as 'a leading city' rather than 'the first city'
  alternative_readings:
  - the first city of the district of Macedonia
  - a foremost city of Macedonia
  rationale: This is not a doctrinal issue but an interpretive one with historical
    implications. The translation avoids implying an unambiguous administrative status
    that is debated, while preserving the sense of prominence suggested by πρώτη in
    context.
  doctrine_reference: Translation philosophy §1, §3, §6
