id: ACT.16.25
reference: Acts 16:25
source:
  edition: SBLGNT
  text: Κατὰ δὲ τὸ μεσονύκτιον Παῦλος καὶ Σιλᾶς προσευχόμενοι ὕμνουν τὸν θεόν, ἐπηκροῶντο
    δὲ αὐτῶν οἱ δέσμιοι·
translation:
  text: Now about midnight Paul and Silas were praying and singing hymns to God, and
    the prisoners were listening to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prisoners were listening attentively to them.' The Greek verb can
      imply attentive or eager listening.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ τὸ μεσονύκτιον
  chosen: Now about midnight
  alternatives:
  - About midnight
  - Around midnight
  - At midnight
  lexicon: BDAG
  rationale: κατά with the accusative of time here idiomatically means 'about/around'
    a point in time rather than strict simultaneity. δέ is lightly connective; 'Now'
    gives natural English discourse flow without overstating contrast.
- source_word: Παῦλος καὶ Σιλᾶς
  chosen: Paul and Silas
  rationale: Standard transliteration of personal names, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: προσευχόμενοι
  chosen: were praying
  alternatives:
  - praying
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb ὕμνουν.
    Rendering it with 'were praying' in coordination with the imperfect main verb
    conveys the ongoing action naturally in English.
- source_word: ὕμνουν
  chosen: singing hymns
  alternatives:
  - were singing hymns
  - were singing praise
  lexicon: BDAG
  rationale: ὑμνέω specifically denotes singing hymns or songs of praise, not merely
    generic singing. 'Singing hymns' preserves that specificity while reading naturally
    with the participle.
- source_word: τὸν θεόν
  chosen: to God
  alternatives:
  - God
  lexicon: BDAG
  rationale: With ὑμνέω, English idiom normally takes 'sing hymns to God.' This expresses
    the object of praise clearly and naturally.
- source_word: ἐπηκροῶντο
  chosen: were listening
  alternatives:
  - were listening attentively
  - were listening intently
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing attentive listening. 'Were listening'
    captures the durative sense; the stronger nuance of attentiveness is real but
    can be left implicit in the main text for readability.
- source_word: οἱ δέσμιοι
  chosen: the prisoners
  alternatives:
  - the prisoners in chains
  - the detainees
  lexicon: BDAG
  rationale: δέσμιος refers to prisoners or those in bonds. 'The prisoners' is the
    most natural and accurate English rendering in this narrative context.
