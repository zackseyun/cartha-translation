id: ACT.16.35
reference: Acts 16:35
source:
  edition: SBLGNT
  text: Ἡμέρας δὲ γενομένης ἀπέστειλαν οἱ στρατηγοὶ τοὺς ῥαβδούχους λέγοντες· Ἀπόλυσον
    τοὺς ἀνθρώπους ἐκείνους.
translation:
  text: And when day came, the magistrates sent the rod-bearers, saying, “Release
    those men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lictors,' the official attendants of Roman magistrates who carried rods
      as symbols of authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμέρας δὲ γενομένης
  chosen: And when day came
  alternatives:
  - When it was day
  - At daybreak
  - When morning came
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'And when day came'
    is natural modern English while preserving the temporal force of the construction
    and the connective δέ.
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Standard aorist of ἀποστέλλω meaning 'sent.' 'Dispatched' is possible
    but 'sent' is clearer and more idiomatic.
- source_word: στρατηγοὶ
  chosen: magistrates
  alternatives:
  - praetors
  - chief magistrates
  lexicon: BDAG
  rationale: In the Philippian civic context this refers to Roman colonial officials,
    not military generals in the ordinary sense. 'Magistrates' best conveys the office
    in accessible English.
- source_word: ῥαβδούχους
  chosen: rod-bearers
  alternatives:
  - lictors
  - officers
  lexicon: BDAG
  rationale: Literally 'rod-bearers,' the attendants of Roman magistrates who carried
    rods. This preserves the concrete image and official function better than the
    more interpretive 'officers'; 'lictors' is historically precise but less accessible,
    so it is preserved in a footnote.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - with the message
  - telling them
  lexicon: BDAG
  rationale: Present participle introducing the content of the message. 'Saying' keeps
    the participial linkage straightforwardly.
- source_word: Ἀπόλυσον
  chosen: Release
  alternatives:
  - Set free
  - Let go
  lexicon: BDAG
  rationale: Aorist imperative singular addressed through the messengers, commanding
    the jailer to free the prisoners. 'Release' fits the legal/custodial setting well.
- source_word: τοὺς ἀνθρώπους ἐκείνους
  chosen: those men
  alternatives:
  - those people
  - those persons
  lexicon: BDAG
  rationale: Here ἄνθρωποι refers specifically to Paul and Silas, both male individuals.
    'Those men' is gender-accurate and contextually precise, in line with the translation
    philosophy.
