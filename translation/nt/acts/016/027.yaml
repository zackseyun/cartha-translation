id: ACT.16.27
reference: Acts 16:27
source:
  edition: SBLGNT
  text: ἔξυπνος δὲ γενόμενος ὁ δεσμοφύλαξ καὶ ἰδὼν ἀνεῳγμένας τὰς θύρας τῆς φυλακῆς
    σπασάμενος ⸀τὴν μάχαιραν ἤμελλεν ἑαυτὸν ἀναιρεῖν, νομίζων ἐκπεφευγέναι τοὺς δεσμίους.
translation:
  text: When the jailer woke up and saw the prison doors standing open, he drew his
    sword and was about to kill himself, supposing that the prisoners had escaped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'saw that the prison doors had been opened.' The Greek
      perfect participle emphasizes the doors' opened state.
    reason: lexical_alternative
  - marker: b
    text: μάχαιρα can denote a sword or a shorter bladed weapon such as a dagger;
      'sword' is retained as the standard contextual rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξυπνος ... γενόμενος
  chosen: woke up
  alternatives:
  - became awake
  - awakened
  lexicon: BDAG
  rationale: The adjective-participle combination idiomatically means coming into
    a waking state. 'Woke up' is natural modern English and accurately conveys the
    ingressive sense.
- source_word: δεσμοφύλαξ
  chosen: jailer
  alternatives:
  - guard
  - keeper of the prison
  lexicon: BDAG
  rationale: Refers specifically to the official responsible for prisoners. 'Jailer'
    is concise and idiomatic; 'guard' is too broad.
- source_word: ἰδὼν ἀνεῳγμένας τὰς θύρας τῆς φυλακῆς
  chosen: saw the prison doors standing open
  alternatives:
  - saw the doors of the prison opened
  - saw that the prison doors had been opened
  lexicon: BDAG
  rationale: The perfect passive participle ἀνεῳγμένας denotes a resultant state.
    'Standing open' preserves that state more naturally than a bare 'opened.'
- source_word: σπασάμενος τὴν μάχαιραν
  chosen: drew his sword
  alternatives:
  - pulled out the sword
  - drew the dagger
  lexicon: BDAG
  rationale: σπάομαι with μάχαιρα commonly means drawing a weapon. 'Sword' is the
    standard rendering for μάχαιρα here; while the term can denote a shorter blade,
    'sword' best fits established usage without over-specifying.
- source_word: ἤμελλεν ἑαυτὸν ἀναιρεῖν
  chosen: was about to kill himself
  alternatives:
  - was intending to do away with himself
  - was going to kill himself
  lexicon: BDAG
  rationale: ἤμελλεν conveys imminence, and ἀναιρεῖν here means to kill. 'Was about
    to kill himself' clearly expresses the impending action.
- source_word: νομίζων
  chosen: supposing
  alternatives:
  - thinking
  - assuming
  lexicon: BDAG
  rationale: The participle gives the reason for his action. 'Supposing' captures
    his inference from the open doors without implying certainty.
- source_word: ἐκπεφευγέναι
  chosen: had escaped
  alternatives:
  - had fled away
  - had gotten away
  lexicon: BDAG
  rationale: The perfect infinitive indicates completed escape from custody. 'Had
    escaped' is the most direct and idiomatic rendering.
- source_word: τοὺς δεσμίους
  chosen: the prisoners
  alternatives:
  - the captives
  - those in chains
  lexicon: BDAG
  rationale: δέσμιος in this context refers to imprisoned persons. 'Prisoners' is
    the clearest contextual equivalent.
