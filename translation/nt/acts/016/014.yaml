id: ACT.16.14
reference: Acts 16:14
source:
  edition: SBLGNT
  text: καί τις γυνὴ ὀνόματι Λυδία, πορφυρόπωλις πόλεως Θυατείρων σεβομένη τὸν θεόν,
    ἤκουεν, ἧς ὁ κύριος διήνοιξεν τὴν καρδίαν προσέχειν τοῖς λαλουμένοις ὑπὸ ⸀τοῦ
    Παύλου.
translation:
  text: And a certain woman named Lydia, a seller of purple cloth from the city of
    Thyatira, who worshiped God, was listening; the Lord opened her heart to pay attention
    to what was being spoken by Paul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a worshiper of God'; the phrase may denote a Gentile devotee of Israel's
      God.
    reason: lexical_alternative
lexical_decisions:
- source_word: καί τις γυνὴ
  chosen: And a certain woman
  alternatives:
  - And a woman
  - Now a certain woman
  lexicon: BDAG
  rationale: Retains the indefiniteness and slight narrative-introducing force of
    τις without sounding overly wooden. 'Certain' reflects the Greek more closely
    than a bare 'a woman.'
- source_word: ὀνόματι Λυδία
  chosen: named Lydia
  alternatives:
  - by the name Lydia
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the dative expression ὀνόματι with a
    personal name.
- source_word: πορφυρόπωλις
  chosen: a seller of purple cloth
  alternatives:
  - a dealer in purple
  - a seller of purple goods
  lexicon: BDAG
  rationale: The term denotes one who trades in purple-dyed goods or cloth. 'Purple
    cloth' communicates the likely commodity in clear modern English without over-specifying
    luxury garments.
- source_word: πόλεως Θυατείρων
  chosen: from the city of Thyatira
  alternatives:
  - of the city of Thyatira
  - from Thyatira
  lexicon: BDAG
  rationale: Expresses provenance naturally in English while preserving the genitival
    relation to Lydia.
- source_word: σεβομένη τὸν θεόν
  chosen: who worshiped God
  alternatives:
  - who feared God
  - a worshiper of God
  - God-fearing
  lexicon: BDAG
  rationale: σεβομένη here describes Lydia as a Gentile adherent who reveres Israel's
    God. 'Worshiped God' is clear and avoids importing the more technical label 'God-fearer'
    into the main text, while preserving the religious sense.
- source_word: ἤκουεν
  chosen: was listening
  alternatives:
  - was hearing
  - listened
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action in the narrative. 'Was listening'
    captures the progressive aspect better than simple past.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In Acts
    this most naturally refers to the Lord as the divine agent without forcing a narrower
    doctrinal specification in translation.
- source_word: διήνοιξεν τὴν καρδίαν
  chosen: opened her heart
  alternatives:
  - opened up her heart
  lexicon: BDAG
  rationale: A natural and established English rendering that accurately reflects
    the idiom of enabling inward receptivity.
- source_word: προσέχειν
  chosen: to pay attention
  alternatives:
  - to respond
  - to heed
  - to give attention
  lexicon: BDAG
  rationale: Conveys directed attentiveness resulting from the Lord's action. 'Respond'
    would over-interpret; 'pay attention' stays closer to the lexical sense.
- source_word: τοῖς λαλουμένοις
  chosen: to what was being spoken
  alternatives:
  - to the things being said
  - to what was said
  lexicon: BDAG
  rationale: The passive participle with article is rendered as a content clause in
    idiomatic English. The imperfective nuance is preserved with 'was being spoken.'
- source_word: ὑπὸ τοῦ Παύλου
  chosen: by Paul
  alternatives:
  - by Paulus
  lexicon: BDAG
  rationale: Standard transliteration and straightforward agency expression.
