theological_decisions:
- issue: Referent of 'the Lord' in ὁ κύριος
  chosen_reading: Rendered simply as 'the Lord' without specifying 'Jesus' or 'God'
    in the main text.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text says only ὁ κύριος. Since Luke can use 'Lord' with Christological
    force yet the immediate emphasis is on divine action, the translation preserves
    the text's wording and theological openness rather than resolving the referent
    beyond what is explicit.
  doctrine_reference: Translation philosophy §3; Contested terms table for κύριος
