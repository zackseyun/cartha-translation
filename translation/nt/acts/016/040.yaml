theological_decisions:
- issue: Rendering of ἀδελφοί in a likely mixed-gender Christian gathering
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: Following the stated philosophy of gender-accurate over gender-neutral,
    the masculine plural is retained in the main text. Because the referent likely
    includes Lydia and other believers in her household/church setting, the inclusive
    sense is preserved in a footnote rather than replacing the source-shaped wording
    in the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
