id: ACT.16.40
reference: Acts 16:40
source:
  edition: SBLGNT
  text: ἐξελθόντες δὲ ⸀ἀπὸ τῆς φυλακῆς εἰσῆλθον πρὸς τὴν Λυδίαν, καὶ ἰδόντες ⸂παρεκάλεσαν
    τοὺς ἀδελφοὺς⸃ καὶ ἐξῆλθαν.
translation:
  text: After they came out from the prison, they went to Lydia’s house, and when
    they saw the brothers, they encouraged them and departed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the brothers and sisters.” The Greek word is masculine plural but can
      refer to fellow believers as a mixed group.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  chosen: After they came out
  alternatives:
  - Having come out
  - When they came out
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as a temporal
    participial clause in English. 'After they came out' is clear modern English and
    preserves the sequence.
- source_word: ἀπὸ τῆς φυλακῆς
  chosen: from the prison
  alternatives:
  - out of the prison
  - from prison
  lexicon: BDAG
  rationale: φυλακή here refers to the specific jail from which Paul and Silas were
    released. The article supports 'the prison' rather than the more idiomatic but
    less specific 'prison'.
- source_word: εἰσῆλθον πρὸς τὴν Λυδίαν
  chosen: they went to Lydia’s house
  alternatives:
  - they entered to Lydia
  - they went in to Lydia
  lexicon: BDAG
  rationale: The idiom εἰσέρχομαι πρός with a person commonly means going in to visit
    that person, implying their home or place of lodging. 'Lydia’s house' makes the
    sense explicit in natural English without adding foreign content, since the context
    already locates the believers at Lydia’s household.
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle rendered temporally for smooth English. 'When they
    saw' fits the narrative flow and links naturally to the following finite verb.
- source_word: παρεκάλεσαν
  chosen: they encouraged them
  alternatives:
  - they exhorted them
  - they comforted them
  lexicon: BDAG
  rationale: παρακαλέω can mean encourage, exhort, comfort, depending on context.
    Here, after imprisonment and release, Paul and Silas likely strengthened the believers;
    'encouraged' best captures the broad pastoral sense without narrowing it to either
    emotional comfort alone or formal exhortation alone.
- source_word: τοὺς ἀδελφούς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Per the translation philosophy, gender-accurate rendering is preferred.
    ἀδελφοί is grammatically masculine plural and often includes mixed-gender fellow
    believers. The main text keeps 'brothers' to reflect the source form, while a
    footnote preserves the inclusive sense relevant in context.
- source_word: ἐξῆλθαν
  chosen: departed
  alternatives:
  - went out
  - left
  lexicon: BDAG
  rationale: A simple narrative exit verb. 'Departed' avoids awkward repetition with
    the earlier 'came out' and fits the context of leaving Lydia's place/city scene.
