theological_decisions:
- issue: Subject shift to first person plural ('we') in the narrative
  chosen_reading: 'Retain the first person plural straightforwardly as part of Luke''s
    narration: ''we immediately sought.'''
  alternative_readings:
  - Treat as a stylistic device without comment
  - Paraphrase impersonally to avoid implications about authorship
  rationale: The Greek explicitly shifts to first person plural, and the translation
    should preserve that textual feature without importing a theory of authorship
    beyond the text itself.
  doctrine_reference: Translation philosophy §1, §3
- issue: Divine guidance language in προσκέκληται ἡμᾶς ὁ θεὸς
  chosen_reading: Render as 'God had called us' rather than weaker language such as
    'God was leading us.'
  alternative_readings:
  - God had invited us
  - God was directing us
  rationale: The verb προσκαλέομαι specifically denotes calling/summoning. 'Called'
    preserves the text's claim about divine initiative without embellishment.
  doctrine_reference: Translation philosophy §1, §5
