id: ACT.16.37
reference: Acts 16:37
source:
  edition: SBLGNT
  text: ὁ δὲ Παῦλος ἔφη πρὸς αὐτούς· Δείραντες ἡμᾶς δημοσίᾳ ἀκατακρίτους, ἀνθρώπους
    Ῥωμαίους ὑπάρχοντας, ἔβαλαν εἰς φυλακήν· καὶ νῦν λάθρᾳ ἡμᾶς ἐκβάλλουσιν; οὐ γάρ,
    ἀλλὰ ἐλθόντες αὐτοὶ ⸀ἡμᾶς ἐξαγαγέτωσαν.
translation:
  text: But Paul said to them, “After beating us publicly without trial, men who are
    Roman citizens, they threw us into prison; and now are they sending us out secretly?
    No indeed! Rather, let them come themselves and lead us out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “without being condemned” or “uncondemned.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “men being Romans”; the sense here is that they possessed Roman citizenship
      and its legal protections.
    reason: cultural_note
  - marker: c
    text: Or “bring us out” or “escort us out.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  - told
  lexicon: BDAG
  rationale: Standard narrative speech verb; simple past 'said' fits English narrative
    style without loss.
- source_word: Δείραντες
  chosen: After beating
  alternatives:
  - Having beaten
  - After flogging
  lexicon: BDAG
  rationale: Aorist participle is rendered as prior action relative to the main verb.
    'Beating' is broad and accurate; 'flogging' is possible but more specific than
    the verb itself requires in this verse.
- source_word: δημοσίᾳ
  chosen: publicly
  alternatives:
  - in public
  - before the public
  lexicon: BDAG
  rationale: Adverbial sense is straightforward; 'publicly' is concise and natural.
- source_word: ἀκατακρίτους
  chosen: without trial
  alternatives:
  - uncondemned
  - without being condemned
  lexicon: BDAG
  rationale: The term means not judicially condemned. In this legal context, 'without
    trial' communicates the procedural injustice clearly in modern English, while
    preserving the force of Roman legal violation.
- source_word: ἀνθρώπους Ῥωμαίους ὑπάρχοντας
  chosen: men who are Roman citizens
  alternatives:
  - Roman men
  - men being Romans
  - men who are Romans
  lexicon: BDAG
  rationale: The phrase identifies Paul and Silas as legally Roman. 'Roman citizens'
    makes explicit the civic-legal force that is central to the complaint. 'Men' is
    retained because ἀνθρώπους is masculine plural and refers specifically to the
    two male missionaries.
- source_word: ἔβαλαν εἰς φυλακήν
  chosen: they threw us into prison
  alternatives:
  - they put us in prison
  - they cast us into prison
  lexicon: BDAG
  rationale: βάλλω here is forceful; 'threw ... into prison' preserves the harshness
    better than the flatter 'put'.
- source_word: λάθρᾳ
  chosen: secretly
  alternatives:
  - in secret
  - quietly
  lexicon: BDAG
  rationale: Adverb meaning covertly; 'secretly' is the most direct modern equivalent.
- source_word: ἐκβάλλουσιν
  chosen: are they sending us out
  alternatives:
  - are they casting us out
  - do they expel us
  lexicon: BDAG
  rationale: In context of release from prison, 'sending us out' is idiomatic English
    while still conveying dismissive expulsion. The present tense is preserved with
    'are they ...' in the rhetorical question.
- source_word: οὐ γάρ
  chosen: No indeed!
  alternatives:
  - Certainly not!
  - No!
  lexicon: BDAG
  rationale: An emphatic refusal. 'No indeed!' captures the sharp rejection in natural
    English.
- source_word: ἐλθόντες αὐτοὶ
  chosen: let them come themselves
  alternatives:
  - let them themselves come
  - let them come in person
  lexicon: BDAG
  rationale: The participle plus emphatic pronoun stresses personal involvement by
    the magistrates. 'Come themselves' preserves that emphasis.
- source_word: ἡμᾶς ἐξαγαγέτωσαν
  chosen: and lead us out
  alternatives:
  - and bring us out
  - and escort us out
  lexicon: BDAG
  rationale: ἐξάγω is literally 'lead out/bring out.' 'Lead us out' is a natural rendering
    that preserves the public, personal action Paul demands; 'escort us out' is interpretive
    and therefore left as an alternative.
