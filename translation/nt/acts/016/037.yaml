theological_decisions:
- issue: Legal-civic force of Paul's appeal to Roman status
  chosen_reading: Render Ῥωμαίους as 'Roman citizens' rather than merely 'Romans'
  alternative_readings:
  - Romans
  - Roman men
  rationale: The verse centers on unlawful punishment of persons possessing Roman
    civic protections. 'Roman citizens' makes the legal complaint explicit in idiomatic
    English without importing theology or exceeding the context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering ἀκατακρίτους
  chosen_reading: Translate as 'without trial' in the main text
  alternative_readings:
  - uncondemned
  - without being condemned
  rationale: The Greek denotes lack of judicial condemnation; in this context the
    practical legal sense is that they were punished without due process. 'Without
    trial' communicates this clearly for modern readers while preserving the injustice
    Paul highlights.
  doctrine_reference: Translation philosophy §6
