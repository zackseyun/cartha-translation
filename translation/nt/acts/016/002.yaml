id: ACT.16.2
reference: Acts 16:2
source:
  edition: SBLGNT
  text: ὃς ἐμαρτυρεῖτο ὑπὸ τῶν ἐν Λύστροις καὶ Ἰκονίῳ ἀδελφῶν·
translation:
  text: He was well spoken of by the brothers in Lystra and Iconium.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “brothers and sisters,” referring to the fellow believers in those places.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: Relative pronoun referring back to Timothy in v.1. English idiom prefers
    an independent pronoun here rather than repeating a relative clause fragment.
- source_word: ἐμαρτυρεῖτο
  chosen: was well spoken of
  alternatives:
  - was testified to
  - was spoken well of
  - was well attested
  lexicon: BDAG
  rationale: Imperfect passive of μαρτυρέω here denotes receiving favorable testimony/reputation
    from others. 'Was well spoken of' communicates the idiomatic sense in natural
    English better than the more wooden 'was testified to.'
- source_word: ὑπὸ
  chosen: by
  alternatives:
  - from
  lexicon: BDAG
  rationale: With the genitive after a passive verb, ὑπό marks personal agency; 'by'
    is the standard and clearest rendering.
- source_word: τῶν ἐν Λύστροις καὶ Ἰκονίῳ
  chosen: in Lystra and Iconium
  alternatives:
  - from Lystra and Iconium
  - who were in Lystra and Iconium
  lexicon: BDAG
  rationale: The article with ἐν plus place names modifies 'brothers' and identifies
    the believing community located in those cities. 'In Lystra and Iconium' is concise
    and faithful.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - believers
  - fellow believers
  lexicon: BDAG
  rationale: Per the project's gender-accurate philosophy, the masculine plural is
    retained as 'brothers' while recognizing that in early Christian usage it can
    denote fellow believers more broadly. A footnote preserves the inclusive sense.
