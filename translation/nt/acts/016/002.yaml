theological_decisions:
- issue: Gendered rendering of ἀδελφῶν for the Christian community
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - believers
  rationale: The Greek form is grammatically masculine plural. Following the stated
    philosophy, the main text keeps the gendered form rather than flattening it to
    a neutral collective, while a footnote can clarify the likely inclusive reference
    within the church community.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate
    over gender-neutral)
