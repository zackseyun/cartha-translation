id: ACT.16.24
reference: Acts 16:24
source:
  edition: SBLGNT
  text: ὃς παραγγελίαν τοιαύτην ⸀λαβὼν ἔβαλεν αὐτοὺς εἰς τὴν ἐσωτέραν φυλακὴν καὶ
    τοὺς πόδας ⸂ἠσφαλίσατο αὐτῶν⸃ εἰς τὸ ξύλον.
translation:
  text: He, having received such an order, threw them into the inner prison and secured
    their feet in the stocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the innermost prison.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the wood'; in context this refers to a wooden restraining
      device, that is, stocks.
    reason: cultural_note
lexical_decisions:
- source_word: παραγγελίαν τοιαύτην
  chosen: such an order
  alternatives:
  - such a command
  - instructions like this
  lexicon: BDAG
  rationale: παραγγελία commonly denotes an order, command, or instruction from an
    authority. 'Order' is natural modern English and fits the jailer receiving an
    official directive.
- source_word: λαβὼν
  chosen: having received
  alternatives:
  - after receiving
  - when he had received
  lexicon: BDAG
  rationale: The aorist participle is best represented as antecedent action to the
    main verb. 'Having received' preserves the participial linkage without over-paraphrasing.
- source_word: ἔβαλεν
  chosen: threw
  alternatives:
  - put
  - cast
  lexicon: BDAG
  rationale: βάλλω is literally 'throw' or 'cast.' In this custodial context it can
    mean 'put,' but 'threw' preserves the forceful sense and the harsh treatment implied
    by the narrative.
- source_word: ἐσωτέραν φυλακήν
  chosen: the inner prison
  alternatives:
  - the innermost prison
  - the inner cell
  lexicon: BDAG
  rationale: ἐσωτέραν is the comparative form meaning 'inner' or 'more inward.' 'The
    inner prison' is idiomatic English and reflects a more secure interior part of
    the jail.
- source_word: ἠσφαλίσατο
  chosen: secured
  alternatives:
  - fastened
  - made secure
  lexicon: BDAG
  rationale: ἀσφαλίζω means to secure or make safe/fast. 'Secured' is concise and
    works well with the following phrase describing how their feet were restrained.
- source_word: τοὺς πόδας αὐτῶν
  chosen: their feet
  alternatives:
  - their legs
  lexicon: BDAG
  rationale: πούς straightforwardly means 'foot.' The plural with possessive pronoun
    is naturally rendered 'their feet.'
- source_word: εἰς τὸ ξύλον
  chosen: in the stocks
  alternatives:
  - in the wooden stocks
  - in the wood
  lexicon: BDAG
  rationale: ξύλον literally means 'wood' or 'wooden object,' but in this prison context
    it refers to a wooden device for restraining feet, conventionally 'stocks.' This
    is a contextually warranted idiomatic rendering rather than a bare literalism.
