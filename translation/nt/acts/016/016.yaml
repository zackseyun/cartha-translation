id: ACT.16.16
reference: Acts 16:16
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ πορευομένων ἡμῶν εἰς ⸀τὴν προσευχὴν παιδίσκην τινὰ ἔχουσαν πνεῦμα
    ⸀πύθωνα ⸀ὑπαντῆσαι ἡμῖν, ἥτις ἐργασίαν πολλὴν παρεῖχεν τοῖς κυρίοις αὐτῆς μαντευομένη·
translation:
  text: And it happened that, as we were going to the place of prayer, a certain slave
    girl who had a python spirit met us, and she was bringing much profit to her masters
    by fortune-telling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of divination.' The Greek says 'a python spirit,' using a culturally
      specific term associated with mantic prediction.
    reason: alternative_reading
  - marker: b
    text: Or 'by practicing divination.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: And it happened that
  alternatives:
  - Now it happened that
  - And it came to pass that
  lexicon: BDAG
  rationale: A common narrative transition in Luke-Acts. 'And it happened that' preserves
    the event-introducing force without archaic diction.
- source_word: πορευομένων ἡμῶν
  chosen: as we were going
  alternatives:
  - while we were going
  - as we went
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a contemporaneous background
    action. 'As we were going' is natural modern English and preserves the ongoing
    sense.
- source_word: εἰς τὴν προσευχὴν
  chosen: to the place of prayer
  alternatives:
  - to prayer
  - to the prayer place
  lexicon: BDAG
  rationale: In Acts this expression likely refers to a recognized meeting place for
    prayer rather than merely the act of praying. 'Place of prayer' captures the local
    sense of the article and noun.
- source_word: παιδίσκην τινά
  chosen: a certain slave girl
  alternatives:
  - a certain servant girl
  - a certain young girl
  lexicon: BDAG
  rationale: παιδίσκη commonly denotes a female slave or servant girl. Because the
    verse immediately mentions her 'masters' and economic exploitation, 'slave girl'
    best reflects the bonded status and fits the project's preference to render bonded
    terms clearly where salient.
- source_word: ἔχουσαν πνεῦμα πύθωνα
  chosen: who had a python spirit
  alternatives:
  - who had a spirit of Python
  - who had a spirit of divination
  lexicon: BDAG
  rationale: The Greek uses the culturally specific expression πνεῦμα πύθωνα. Rendering
    it as 'python spirit' preserves the source-language specificity and avoids prematurely
    interpreting it away. The more interpretive 'spirit of divination' is preserved
    in a footnote.
- source_word: ὑπαντῆσαι ἡμῖν
  chosen: met us
  alternatives:
  - came to meet us
  - encountered us
  lexicon: BDAG
  rationale: 'The infinitive after the narrative setup is idiomatically rendered in
    English as the main event: she ''met us.'' This is concise and faithful to the
    sense of an encounter.'
- source_word: ἥτις
  chosen: and she
  alternatives:
  - who
  - this girl
  lexicon: BDAG
  rationale: The relative pronoun introduces explanatory information about the girl.
    English smooths this naturally with 'and she' in a flowing narrative sentence.
- source_word: ἐργασίαν πολλὴν παρεῖχεν
  chosen: was bringing much profit
  alternatives:
  - provided much gain
  - brought in a great deal of money
  lexicon: BDAG
  rationale: The phrase denotes substantial financial benefit. 'Was bringing much
    profit' is clear, natural, and preserves the imperfect aspect of ongoing gain.
- source_word: τοῖς κυρίοις αὐτῆς
  chosen: to her masters
  alternatives:
  - to her owners
  - to her lords
  lexicon: BDAG
  rationale: κύριος here refers to those exercising ownership/control over the slave
    girl, not the divine title 'Lord.' 'Masters' is the most contextually fitting
    English term.
- source_word: μαντευομένη
  chosen: by fortune-telling
  alternatives:
  - by divining
  - by practicing divination
  - by soothsaying
  lexicon: BDAG
  rationale: The participle refers to mantic/divinatory activity. 'Fortune-telling'
    is the most accessible modern equivalent, while 'divination' is preserved in a
    footnote as a more formal alternative.
