theological_decisions:
- issue: How to render πνεῦμα πύθωνα, a culturally loaded expression associated with
    divination
  chosen_reading: python spirit
  alternative_readings:
  - spirit of divination
  rationale: The translation preserves the culturally specific Greek expression in
    the main text rather than flattening it into an interpretation. Because many English
    readers may not recognize the idiom, the explanatory alternative 'spirit of divination'
    is preserved in a footnote. This follows the project's preference for original-language
    primacy while documenting a readable interpretive alternative.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether παιδίσκη should be rendered to reflect servile status
  chosen_reading: slave girl
  alternative_readings:
  - servant girl
  rationale: The context emphasizes her exploitation by multiple masters and the profit
    they derive from her. Rendering the term as 'slave girl' better reflects the social
    reality and aligns with the project's stated preference to make bonded status
    explicit where salient.
  doctrine_reference: Translation philosophy §1; Contested terms table on δοῦλος (context-dependent
    bonded rendering)
