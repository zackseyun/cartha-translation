id: ACT.16.26
reference: Acts 16:26
source:
  edition: SBLGNT
  text: ἄφνω δὲ σεισμὸς ἐγένετο μέγας ὥστε σαλευθῆναι τὰ θεμέλια τοῦ δεσμωτηρίου,
    ἠνεῴχθησαν ⸀δὲ παραχρῆμα αἱ θύραι πᾶσαι, καὶ πάντων τὰ δεσμὰ ἀνέθη.
translation:
  text: Suddenly there was a great earthquake, so that the foundations of the prison
    were shaken; and immediately all the doors were opened, and everyone's chains
    were unfastened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone's bonds were loosened.' The Greek δεσμά can mean 'bonds' or
      'chains,' and ἀνέθη can be rendered 'were loosened' or 'were unfastened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'jail' instead of 'prison' for δεσμωτήριον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφνω
  chosen: Suddenly
  alternatives:
  - At once
  lexicon: BDAG
  rationale: Adverb marking abruptness. 'Suddenly' is natural modern English and preserves
    the narrative force.
- source_word: σεισμὸς ἐγένετο μέγας
  chosen: there was a great earthquake
  alternatives:
  - a great earthquake occurred
  - a severe earthquake happened
  lexicon: BDAG
  rationale: The γίνομαι + noun construction is idiomatically rendered in English
    as 'there was.' 'Great earthquake' preserves μέγας without overinterpreting it
    as 'severe,' though that sense is possible.
- source_word: ὥστε σαλευθῆναι
  chosen: so that ... were shaken
  alternatives:
  - with the result that ... were shaken
  lexicon: BDAG
  rationale: ὥστε introduces result. The passive infinitive σαλευθῆναι is naturally
    expressed in English with a finite passive clause after 'so that.'
- source_word: τὰ θεμέλια τοῦ δεσμωτηρίου
  chosen: the foundations of the prison
  alternatives:
  - the prison's foundations
  - the foundations of the jail
  lexicon: BDAG
  rationale: θεμέλια refers to foundational structural elements. δεσμωτήριον is a
    place of confinement; 'prison' is the most standard and broadly understandable
    rendering, though 'jail' is also possible.
- source_word: ἠνεῴχθησαν ... αἱ θύραι πᾶσαι
  chosen: all the doors were opened
  alternatives:
  - all the doors opened
  lexicon: BDAG
  rationale: The passive form is retained with 'were opened.' Positioning 'all' before
    'the doors' is idiomatic English while preserving πᾶσαι.
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: The adverb denotes something happening right away. 'Immediately' is clear
    and suitably formal for narrative prose.
- source_word: πάντων
  chosen: everyone's
  alternatives:
  - of all of them
  - for all
  lexicon: BDAG
  rationale: 'Genitive plural with δεσμὰ indicates possession: the bonds belonging
    to all the prisoners. ''Everyone''s'' is concise and natural English.'
- source_word: τὰ δεσμὰ
  chosen: chains
  alternatives:
  - bonds
  - fetters
  lexicon: BDAG
  rationale: δεσμά can denote bonds or restraints. 'Chains' gives a concrete and vivid
    rendering appropriate to an imprisonment context, while remaining within the semantic
    range.
- source_word: ἀνέθη
  chosen: were unfastened
  alternatives:
  - were loosened
  - came loose
  - were released
  lexicon: BDAG
  rationale: From ἀνίημι, here meaning to loosen or release. 'Were unfastened' communicates
    the passive/resultative sense clearly without implying full liberation beyond
    the text's statement.
