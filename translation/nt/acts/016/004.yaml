theological_decisions:
- issue: Authority of the Jerusalem council's rulings
  chosen_reading: Rendered δόγματα as 'decrees' to reflect formal, communal decisions
    without implying later ecclesiastical dogma in a technical sense.
  alternative_readings:
  - decisions
  - ordinances
  rationale: The verse describes the transmission of rulings from Acts 15. 'Decrees'
    best reflects their authoritative status in context while avoiding anachronistic
    doctrinal overtones associated with later church usage of 'dogma.'
  doctrine_reference: Translation philosophy §§1, 5
