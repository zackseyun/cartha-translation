id: ACT.16.4
reference: Acts 16:4
source:
  edition: SBLGNT
  text: ὡς δὲ διεπορεύοντο τὰς πόλεις, ⸀παρεδίδοσαν αὐτοῖς φυλάσσειν τὰ δόγματα τὰ
    κεκριμένα ὑπὸ τῶν ἀποστόλων ⸀καὶ πρεσβυτέρων τῶν ἐν ⸀Ἱεροσολύμοις.
translation:
  text: As they went through the cities, they delivered to them for observance the
    decrees that had been decided by the apostles and elders in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decisions'; Greek 'dogmata,' referring to the rulings issued by
      the Jerusalem council.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύοντο
  chosen: went through
  alternatives:
  - traveled through
  - passed through
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing movement from place to place.
    'Went through' is natural English and preserves the sense of traveling through
    multiple cities without overinterpreting the route.
- source_word: παρεδίδοσαν
  chosen: delivered
  alternatives:
  - handed over
  - passed on
  lexicon: BDAG
  rationale: In this context the verb refers to transmitting authoritative decisions
    to the churches. 'Delivered' preserves the formal sense of handing on something
    entrusted, fitting the administrative context better than the more casual 'passed
    on'.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to the believers
  - to the churches
  lexicon: BDAG
  rationale: The pronoun's referent is contextually the believers in the cities, but
    the Greek leaves it pronominal. 'To them' preserves the source wording without
    importing an explicit noun absent from the verse.
- source_word: φυλάσσειν
  chosen: for observance
  alternatives:
  - to keep
  - to obey
  lexicon: BDAG
  rationale: φυλάσσω here means to keep or observe in the sense of careful adherence.
    'For observance' works smoothly with 'delivered' in English and conveys ongoing
    compliance rather than mere storage or guarding.
- source_word: δόγματα
  chosen: decrees
  alternatives:
  - decisions
  - ordinances
  lexicon: BDAG
  rationale: In Acts 16:4 the term refers to the rulings issued by the Jerusalem council.
    'Decrees' captures their formal and authoritative character. 'Ordinances' can
    sound overly ecclesiastical, while 'decisions' may understate the official force.
- source_word: κεκριμένα
  chosen: had been decided
  alternatives:
  - had been determined
  - had been decreed
  lexicon: BDAG
  rationale: The perfect passive participle of κρίνω emphasizes decisions already
    reached with continuing validity. 'Had been decided' is clear modern English and
    matches the council context.
- source_word: ἀποστόλων καὶ πρεσβυτέρων
  chosen: the apostles and elders
  alternatives:
  - the emissaries and elders
  lexicon: BDAG
  rationale: '''Apostles'' is the standard and contextually established rendering
    for ἀπόστολοι in Acts. ''Elders'' is the natural rendering of πρεσβύτεροι here
    as recognized leaders. The phrase denotes the recognized Jerusalem leadership
    involved in the council''s ruling.'
- source_word: τῶν ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - who were in Jerusalem
  - at Jerusalem
  lexicon: BDAG
  rationale: The article with prepositional phrase modifies 'the apostles and elders'
    and locates them in Jerusalem. 'In Jerusalem' is concise and idiomatic, while
    preserving the geographical identification.
- source_word: ὡς δὲ
  chosen: As
  alternatives:
  - Now as
  - And as
  - While
  lexicon: BDAG
  rationale: This combination marks narrative progression. 'As' gives a smooth temporal
    transition into the ongoing action without adding unnecessary connective weight.
