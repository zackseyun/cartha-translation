id: ACT.16.33
reference: Acts 16:33
source:
  edition: SBLGNT
  text: καὶ παραλαβὼν αὐτοὺς ἐν ἐκείνῃ τῇ ὥρᾳ τῆς νυκτὸς ἔλουσεν ἀπὸ τῶν πληγῶν, καὶ
    ἐβαπτίσθη αὐτὸς καὶ οἱ αὐτοῦ ⸀πάντες παραχρῆμα,
translation:
  text: And taking them in that hour of the night, he washed their wounds, and he
    was baptized at once, he and all his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at that hour of the night.' The phrase highlights how late and immediate
      the response was.
    reason: lexical_alternative
  - marker: b
    text: Literally 'washed [them] from the wounds'; that is, he washed their injuries.
    reason: lexical_alternative
  - marker: c
    text: Or 'all his family.' The Greek more broadly denotes his household, those
      belonging to his domestic sphere.
    reason: alternative_reading
lexical_decisions:
- source_word: παραλαβὼν
  chosen: taking
  alternatives:
  - having taken
  - taking aside
  lexicon: BDAG
  rationale: Aorist participle introducing the jailer's action prior to washing them.
    'Taking' is natural English and preserves the sequence without over-specifying
    destination or manner.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ τῆς νυκτός
  chosen: in that hour of the night
  alternatives:
  - at that hour of the night
  - that same hour of the night
  lexicon: BDAG
  rationale: This phrase emphasizes the immediacy and lateness of the action. 'In
    that hour of the night' is slightly more formal but closely reflects the Greek
    construction and preserves the temporal vividness.
- source_word: ἔλουσεν
  chosen: washed
  alternatives:
  - bathed
  - cleaned
  lexicon: BDAG
  rationale: λούω here refers to washing Paul and Silas, specifically in relation
    to their injuries. 'Washed' is the most natural and sufficiently specific rendering.
- source_word: ἀπὸ τῶν πληγῶν
  chosen: their wounds
  alternatives:
  - from their wounds
  - their stripes
  lexicon: BDAG
  rationale: The prepositional phrase with ἀπό after λούω idiomatically indicates
    washing away the effects associated with the wounds. 'Their wounds' communicates
    the sense clearly in English. 'Stripes' is traditional but less transparent to
    modern readers.
- source_word: ἐβαπτίσθη
  chosen: was baptized
  alternatives:
  - was immersed
  lexicon: BDAG
  rationale: The passive verb denotes receiving baptism. 'Was baptized' is the standard
    and contextually appropriate rendering without importing a denominationally specific
    mode into the main text.
- source_word: οἱ αὐτοῦ πάντες
  chosen: all his household
  alternatives:
  - all his people
  - all his family
  lexicon: BDAG
  rationale: The expression refers to those belonging to the jailer's domestic sphere.
    'Household' is the most precise and traditional rendering, broader than merely
    nuclear family and fitting Acts usage.
- source_word: παραχρῆμα
  chosen: at once
  alternatives:
  - immediately
  - right away
  lexicon: BDAG
  rationale: The adverb stresses immediacy. 'At once' is concise, natural, and preserves
    the narrative force.
