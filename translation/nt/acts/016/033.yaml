theological_decisions:
- issue: Scope of οἱ αὐτοῦ πάντες in relation to baptism
  chosen_reading: Rendered as 'all his household' without specifying age, personal
    profession, or mode of baptism.
  alternative_readings:
  - all his family
  - all his people
  rationale: The verse states that the jailer and all those belonging to his household
    were baptized, but it does not itself resolve later denominational debates about
    household baptism, infant baptism, or the mode of baptism. The translation preserves
    the narrative statement without importing doctrinal conclusions beyond the Greek.
  doctrine_reference: Affirmations; Translation philosophy §3
