id: ACT.16.28
reference: Acts 16:28
source:
  edition: SBLGNT
  text: ἐφώνησεν δὲ ⸂φωνῇ μεγάλῃ ὁ Παῦλος⸃ λέγων· Μηδὲν πράξῃς σεαυτῷ κακόν, ἅπαντες
    γάρ ἐσμεν ἐνθάδε.
translation:
  text: But Paul shouted with a loud voice, saying, “Do not do yourself any harm,
    for we are all here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Do not harm yourself.” The Greek expression is broader literally, “Do
      not do anything bad to yourself,” but in context it refers to the jailer’s intended
      self-injury.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφώνησεν
  chosen: shouted
  alternatives:
  - called out
  - cried out
  lexicon: BDAG
  rationale: The aorist of φωνέω here denotes a forceful vocal utterance in an urgent
    situation. 'Shouted' best captures the intensity in natural English, especially
    with the accompanying dative phrase 'with a loud voice.'
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the jailer's intended action
    in the previous verse. 'But' appropriately signals Paul's interrupting response.
- source_word: φωνῇ μεγάλῃ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: The dative phrase is rendered idiomatically as manner/instrument. 'With
    a loud voice' preserves the concrete expression while remaining natural English.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of Paul's speech. 'Saying' keeps
    the Greek structure without awkwardness.
- source_word: Μηδὲν πράξῃς σεαυτῷ κακόν
  chosen: Do not do yourself any harm
  alternatives:
  - Do nothing bad to yourself
  - Do not harm yourself
  lexicon: BDAG
  rationale: The prohibition with aorist subjunctive is naturally rendered as a direct
    negative command. 'Do yourself any harm' preserves both the reflexive force and
    the broad wording κακόν, while fitting the context of imminent self-injury.
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - every one of us
  lexicon: BDAG
  rationale: ἅπαντες emphasizes the totality of the prisoners present. 'All' is concise
    and fully adequate in context.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason the jailer should not harm himself. 'For' preserves
    the explanatory connection in a slightly more formal but still readable way.
- source_word: ἐνθάδε
  chosen: here
  alternatives:
  - in here
  - in this place
  lexicon: BDAG
  rationale: The adverb simply indicates location. 'Here' is the most natural English
    equivalent.
- source_word: ὁ Παῦλος
  chosen: Paul
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
