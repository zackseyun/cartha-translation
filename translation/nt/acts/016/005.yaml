theological_decisions:
- issue: Sense of πίστις with article
  chosen_reading: the faith = the Christian faith/community belief in which the churches
    were strengthened
  alternative_readings:
  - faith = subjective trust/faithfulness of believers
  rationale: 'The article and the ecclesial context favor an objective or communal
    sense: the churches were strengthened with respect to the faith they held. This
    does not exclude personal trust, but the main text best reflects the likely referent
    in Acts.'
  doctrine_reference: 'DOCTRINE.md: πίστις default rendering ''faith''; preserve theological
    tension where ambiguity is genuine'
