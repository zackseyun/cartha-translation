id: ACT.16.5
reference: Acts 16:5
source:
  edition: SBLGNT
  text: αἱ μὲν οὖν ἐκκλησίαι ἐστερεοῦντο τῇ πίστει καὶ ἐπερίσσευον τῷ ἀριθμῷ καθ’
    ἡμέραν.
translation:
  text: So the churches were being strengthened in the faith and were increasing in
    number day by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in faith.' The Greek phrase may refer either to being strengthened in
      the Christian faith as a shared body of belief and life, or more generally to
      being strengthened in faith.
    reason: alternative_reading
lexical_decisions:
- source_word: αἱ μὲν οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then indeed
  - So then
  lexicon: BDAG
  rationale: The particle combination marks a transitional summary/inference from
    the preceding narrative. 'So' gives natural modern English while preserving the
    discourse connection without overtranslating μέν, which here does not require
    an explicit adversative counterpart in English.
- source_word: ἐκκλησίαι
  chosen: churches
  alternatives:
  - assemblies
  - congregations
  lexicon: BDAG
  rationale: In Acts this term commonly refers to local Christian communities. 'Churches'
    is the standard and clearest rendering in context, while 'assemblies' would be
    more literal but less idiomatic and potentially underplays the established communal
    sense.
- source_word: ἐστερεοῦντο
  chosen: were being strengthened
  alternatives:
  - were strengthened
  - were being established
  - were made firm
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing action in past time. 'Were being
    strengthened' preserves both the progressive aspect and passive voice better than
    the simple past 'were strengthened.' 'Established' is possible, but 'strengthened'
    better fits the dative phrase that follows.
- source_word: τῇ πίστει
  chosen: in the faith
  alternatives:
  - in faith
  - with respect to the faith
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine guidance. Here the article likely
    points to the Christian faith as the shared body of belief/life rather than merely
    subjective trust, so 'in the faith' is preferable. The dative is rendered idiomatically
    with 'in' to express the sphere in which they were strengthened.
- source_word: ἐπερίσσευον
  chosen: were increasing
  alternatives:
  - abounded
  - grew
  - were multiplying
  lexicon: BDAG
  rationale: The imperfect active again signals ongoing growth. 'Were increasing'
    matches the verb's sense of becoming more and fits naturally with the following
    dative of respect. 'Were multiplying' is possible but stronger than the Greek
    requires here.
- source_word: τῷ ἀριθμῷ
  chosen: in number
  alternatives:
  - in numbers
  - numerically
  lexicon: BDAG
  rationale: This dative expresses the respect or measure in which the increase occurred.
    'In number' is idiomatic English and clearly conveys numerical growth.
- source_word: καθ’ ἡμέραν
  chosen: day by day
  alternatives:
  - daily
  - each day
  lexicon: BDAG
  rationale: The distributive phrase indicates continual, repeated growth. 'Day by
    day' preserves the iterative feel more vividly than the adverb 'daily'.
