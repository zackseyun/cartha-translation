theological_decisions:
- issue: Rendering Ἰουδαῖοι in a potentially sensitive ethnic-religious accusation
  chosen_reading: Jews
  alternative_readings:
  - Judeans
  rationale: The verse reports the accusers' hostile framing of Paul and Silas, not
    the narrator's theological judgment against Jews as a whole. 'Jews' best reflects
    the likely ethnic-religious sense in Philippi while avoiding anachronistic narrowing
    to geography alone.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    by analogy to source-accurate representation; Translation philosophy §1 original-language
    primacy
