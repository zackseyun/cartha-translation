id: ACT.16.20
reference: Acts 16:20
source:
  edition: SBLGNT
  text: καὶ προσαγαγόντες αὐτοὺς τοῖς στρατηγοῖς εἶπαν· Οὗτοι οἱ ἄνθρωποι ἐκταράσσουσιν
    ἡμῶν τὴν πόλιν Ἰουδαῖοι ὑπάρχοντες,
translation:
  text: And after bringing them before the magistrates, they said, “These men are
    disturbing our city, being Jews,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “praetors,” the Roman civic officials in a colony such as Philippi.
    reason: cultural_note
  - marker: b
    text: Or “Judeans.” The Greek term can refer either to Jews generally or to people
      from Judea; here “Jews” best fits the ethnic-religious accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαγαγόντες
  chosen: after bringing
  alternatives:
  - having brought
  - bringing
  lexicon: BDAG
  rationale: Aorist participle of προσάγω, preceding the main verb εἶπαν. 'After bringing'
    gives natural English while preserving the participle's antecedent action.
- source_word: στρατηγοῖς
  chosen: magistrates
  alternatives:
  - chief magistrates
  - praetors
  lexicon: BDAG
  rationale: In Philippi, a Roman colony, στρατηγοί refers to the city authorities
    functioning as magistrates. 'Magistrates' is clear modern English; 'praetors'
    is more technical and may be footnoted as a historical alternative.
- source_word: ἐκταράσσουσιν
  chosen: are disturbing
  alternatives:
  - are throwing into confusion
  - are causing trouble in
  lexicon: BDAG
  rationale: The verb conveys serious agitation or disturbance. 'Are disturbing' is
    idiomatic and preserves the present-tense accusation without overparaphrasing.
- source_word: ἡμῶν τὴν πόλιν
  chosen: our city
  alternatives:
  - the city of ours
  - our town
  lexicon: BDAG
  rationale: The genitive pronoun ἡμῶν is possessive/emotive in force. 'Our city'
    captures the accusers' civic ownership and rhetoric naturally in English.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Judeans
  lexicon: BDAG
  rationale: In Acts this term can denote ethnic-religious identity. Here the charge
    highlights Paul and Silas as members of the Jewish people in contrast to local
    Roman civic identity. 'Jews' is the standard and most contextually fitting rendering;
    'Judeans' is possible but less likely in this diaspora setting.
- source_word: ὑπάρχοντες
  chosen: being
  alternatives:
  - since they are
  - as they are
  lexicon: BDAG
  rationale: 'The participle marks attendant circumstance/grounds for the accusation:
    they are disturbing the city ''being Jews.'' ''Being'' preserves the compact Greek
    linkage without adding interpretive force.'
- source_word: Οὗτοι οἱ ἄνθρωποι
  chosen: These men
  alternatives:
  - These people
  - These fellows
  lexicon: BDAG
  rationale: Masculine plural with specific male referents, Paul and Silas. 'These
    men' is gender-accurate and natural.
