theological_decisions:
- issue: Potential denominational inference from 'her household were baptized'
  chosen_reading: Translate the narrative statement straightforwardly without importing
    implications about the age or faith-status of each household member.
  alternative_readings:
  - Render in a way that implies infant baptism
  - Render in a way that implies only professing believers were baptized
  rationale: The verse reports that Lydia and her household were baptized but does
    not specify the composition of the household or make an explicit doctrinal argument.
    Per doctrine, the translation preserves the text's statement without resolving
    later sacramental debates.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Meaning of πιστὴν in Lydia's self-description
  chosen_reading: faithful to the Lord
  alternative_readings:
  - a believer in the Lord
  - trustworthy before the Lord
  rationale: The Greek adjective allows more than one nuance. 'Faithful' preserves
    the theological tension between belief and demonstrated loyalty, avoiding unnecessary
    narrowing.
  doctrine_reference: Translation philosophy §3
