id: ACT.16.15
reference: Acts 16:15
source:
  edition: SBLGNT
  text: ὡς δὲ ἐβαπτίσθη καὶ ὁ οἶκος αὐτῆς, παρεκάλεσεν λέγουσα· Εἰ κεκρίκατέ με πιστὴν
    τῷ κυρίῳ εἶναι, εἰσελθόντες εἰς τὸν οἶκόν μου ⸀μένετε· καὶ παρεβιάσατο ἡμᾶς.
translation:
  text: And when she and her household were baptized, she urged us, saying, “If you
    have judged me to be faithful to the Lord, come into my house and stay.” And she
    prevailed upon us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you consider me a believer in the Lord.' The Greek adjective can
      mean 'faithful,' 'trustworthy,' or 'believing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: And when
  alternatives:
  - Now when
  - And after
  lexicon: BDAG
  rationale: Renders the temporal force of ὡς with the mild connective δέ in natural
    English. 'And when' preserves sequence without overtranslating δέ.
- source_word: ἐβαπτίσθη
  chosen: were baptized
  alternatives:
  - was baptized
  lexicon: BDAG
  rationale: 'Although the verb is singular and first refers to Lydia, the following
    coordinated phrase καὶ ὁ οἶκος αὐτῆς extends the sense to both Lydia and her household.
    English idiom naturally expresses this as a plural passive: ''she and her household
    were baptized.'''
- source_word: ὁ οἶκος αὐτῆς
  chosen: her household
  alternatives:
  - her house
  - those of her house
  lexicon: BDAG
  rationale: οἶκος here denotes the household unit, not the physical building. 'Household'
    best matches the social sense in context.
- source_word: παρεκάλεσεν
  chosen: she urged us
  alternatives:
  - she asked us
  - she invited us
  - she entreated us
  lexicon: BDAG
  rationale: παρακαλέω can mean urge, exhort, request, or invite depending on context.
    Because the following clause shows earnest insistence, 'urged us' captures both
    invitation and earnestness better than the weaker 'asked.'
- source_word: Εἰ κεκρίκατέ με πιστὴν τῷ κυρίῳ εἶναι
  chosen: If you have judged me to be faithful to the Lord
  alternatives:
  - If you consider me a believer in the Lord
  - If you have found me faithful to the Lord
  lexicon: BDAG
  rationale: 'κεκρίκατέ is perfect, indicating a settled assessment: ''have judged.''
    πιστή can mean faithful, trustworthy, or believing. Here ''faithful to the Lord''
    preserves the adjective''s moral-relational sense without narrowing it merely
    to profession of belief.'
- source_word: πιστὴν
  chosen: faithful
  alternatives:
  - believing
  - trustworthy
  lexicon: BDAG
  rationale: The adjective πιστή is not the noun/adjective πίστις from the contested-terms
    table, but it is semantically related. 'Faithful' best preserves the ambiguity
    of genuine allegiance and reliability before the Lord; 'believing' would tilt
    toward one denominational inference.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - by the Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the doctrinal default ''Lord.'' The dative here
    is relational with πιστή: faithful to the Lord.'
- source_word: εἰσελθόντες εἰς τὸν οἶκόν μου
  chosen: come into my house
  alternatives:
  - enter my house
  - come into my home
  lexicon: BDAG
  rationale: The participle εἰσελθόντες is naturally rendered as an imperative-like
    attendant action in English after the conditional clause. 'House' is retained
    here because the physical dwelling is in view, unlike earlier οἶκος meaning household.
- source_word: μένετε
  chosen: stay
  alternatives:
  - remain
  - lodge
  lexicon: BDAG
  rationale: μένω here refers to staying in Lydia's home. 'Stay' is idiomatic modern
    English and preserves the hospitality context.
- source_word: παρεβιάσατο ἡμᾶς
  chosen: she prevailed upon us
  alternatives:
  - she persuaded us
  - she strongly urged us
  - she compelled us
  lexicon: BDAG
  rationale: παραβιάζομαι conveys strong insistence, even pressing someone. 'Prevailed
    upon us' preserves the force without suggesting coercion stronger than the context
    warrants; 'compelled' could sound too forceful in English.
