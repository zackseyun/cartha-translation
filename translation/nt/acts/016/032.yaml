theological_decisions:
- issue: Nuance of 'the word of the Lord'
  chosen_reading: Rendered as 'the word of the Lord' without specifying whether the genitive is subjective or objective.
  alternative_readings:
  - the message from the Lord
  - the message about the Lord
  rationale: The Greek expression can naturally carry either or both nuances in context. To preserve theological tension rather than resolve it, the main text keeps the more literal phrase. This avoids importing a narrower doctrinal claim than the text itself states.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms: κύριος → Lord'
revisions:
- timestamp: '2026-04-21T02:55:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/016/032.json
  category: awkward_english
  tier: 1
  from: to him, together with all those in his house
  to: to him and to all who were in his house
  rationale: The Greek construction uses a dative object ('αὐτῷ') followed by a prepositional phrase with 'σύν' ('σὺν πᾶσι...'). The draft's rendering, 'to him, together with all those...', is a formally parallel translation but is awkward in English. It creates ambiguity as to whether the household was merely present or was also the recipient of the message. While the drafter's note acknowledges the alternative, the current rendering's lack of clarity and naturalness constitutes a minor issue. Translating the 'σύν' phrase as a second indirect object ('and to all who were in his house') is a standard and clearer solution that better conveys the sense that the entire household was addressed, not just physically present.
