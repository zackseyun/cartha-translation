id: ACT.16.36
reference: Acts 16:36
source:
  edition: SBLGNT
  text: ἀπήγγειλεν δὲ ὁ δεσμοφύλαξ τοὺς λόγους ⸀τούτους πρὸς τὸν Παῦλον, ὅτι Ἀπέσταλκαν
    οἱ στρατηγοὶ ἵνα ἀπολυθῆτε· νῦν οὖν ἐξελθόντες πορεύεσθε ἐν εἰρήνῃ.
translation:
  text: 'And the jailer reported these words to Paul: “The magistrates have sent word
    that you may be released. So now, come out and go in peace.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The magistrates have sent that you be released.” The Greek leaves the
      object of “have sent” implicit; “sent word” makes the sense explicit in English.
    reason: lexical_alternative
  - marker: b
    text: “Magistrates” translates στρατηγοί, the civic authorities of Philippi; more
      technically, “praetors.”
    reason: cultural_note
lexical_decisions:
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: Aorist of ἀπαγγέλλω denotes reporting or relaying information. 'Reported'
    fits the narrative context of conveying an official message without sounding overly
    formal.
- source_word: δεσμοφύλαξ
  chosen: jailer
  alternatives:
  - guard
  - keeper of the prison
  lexicon: BDAG
  rationale: Refers specifically to the prison keeper in this context. 'Jailer' is
    concise, natural modern English, and more precise than the generic 'guard'.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this message
  - these things
  lexicon: BDAG
  rationale: A fairly literal rendering that preserves the wording of the Greek while
    remaining idiomatic. 'Message' is possible but slightly more interpretive.
- source_word: πρὸς τὸν Παῦλον
  chosen: to Paul
  alternatives:
  - for Paul
  lexicon: BDAG
  rationale: With verbs of speaking/reporting, πρός naturally conveys direction toward
    the person addressed; 'to Paul' is the standard idiomatic rendering.
- source_word: Ἀπέσταλκαν
  chosen: have sent word
  alternatives:
  - have sent
  - sent
  lexicon: BDAG
  rationale: The perfect form indicates a completed action with present relevance.
    Since the object of sending is implicit in context, 'have sent word' makes explicit
    that a message/order has been sent, which English requires for clarity.
- source_word: οἱ στρατηγοὶ
  chosen: the magistrates
  alternatives:
  - the chief magistrates
  - the praetors
  lexicon: BDAG
  rationale: In Philippi's Roman colonial setting, στρατηγοί refers to the city authorities/magistrates.
    'Magistrates' is clear and idiomatic; 'praetors' is more technical and less accessible.
- source_word: ἵνα ἀπολυθῆτε
  chosen: that you may be released
  alternatives:
  - that you be set free
  - for you to be released
  lexicon: BDAG
  rationale: The ἵνα clause expresses the content/purpose of the order. Passive ἀπολυθῆτε
    here means release from custody. 'May be released' preserves the official, permissive
    sense.
- source_word: νῦν οὖν
  chosen: So now
  alternatives:
  - Now therefore
  - Therefore now
  lexicon: BDAG
  rationale: Captures the inferential and transitional force in natural modern English.
    'Now therefore' is more formal but less readable.
- source_word: ἐξελθόντες
  chosen: come out
  alternatives:
  - having gone out
  - go out
  lexicon: BDAG
  rationale: Although formally an aorist participle ('having come out/gone out'),
    in this sequence it functions imperativally with the following verb. 'Come out'
    is idiomatic from the speaker's perspective and fits the prison setting.
- source_word: πορεύεσθε
  chosen: go
  alternatives:
  - depart
  - be on your way
  lexicon: BDAG
  rationale: A present middle imperative meaning to go or depart. 'Go' is simple and
    natural; 'depart' is more formal than the context requires.
- source_word: ἐν εἰρήνῃ
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: BDAG
  rationale: Standard idiom meaning to go with peace/safety. 'In peace' preserves
    the familiar biblical expression without unnecessary expansion.
