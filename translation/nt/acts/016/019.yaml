id: ACT.16.19
reference: Acts 16:19
source:
  edition: SBLGNT
  text: Ἰδόντες δὲ οἱ κύριοι αὐτῆς ὅτι ἐξῆλθεν ἡ ἐλπὶς τῆς ἐργασίας αὐτῶν ἐπιλαβόμενοι
    τὸν Παῦλον καὶ τὸν Σιλᾶν εἵλκυσαν εἰς τὴν ἀγορὰν ἐπὶ τοὺς ἄρχοντας,
translation:
  text: But when her masters saw that their hope of profit had gone out, they seized
    Paul and Silas and dragged them into the marketplace before the rulers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their hope of gain.' The Greek phrase is literally 'the hope of their
      profit/earning.'
    reason: lexical_alternative
  - marker: b
    text: The term rendered 'rulers' is a general word for civic authorities; the
      following verse uses a more specific term often rendered 'magistrates.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κύριοι αὐτῆς
  chosen: her masters
  alternatives:
  - her owners
  - her lords
  lexicon: BDAG
  rationale: In this context κύριοι refers to those exercising ownership/control over
    the slave girl, not a respectful title. 'Masters' best conveys social dominance
    and economic exploitation in readable English. 'Owners' is possible and highlights
    property status, but 'masters' fits both the lexical range and the narrative setting.
- source_word: ἐξῆλθεν
  chosen: had gone out
  alternatives:
  - was gone
  - had departed
  lexicon: BDAG
  rationale: The aorist of ἐξέρχομαι is rendered with an English past perfect in context
    after 'saw that' to express the completed loss of their former source of gain.
    'Gone out' preserves the Greek imagery more closely than a purely idiomatic 'was
    gone'.
- source_word: ἡ ἐλπὶς τῆς ἐργασίας αὐτῶν
  chosen: their hope of profit
  alternatives:
  - their hope of gain
  - their hope of business
  lexicon: BDAG
  rationale: ἐλπίς is literally 'hope,' and ἐργασία here refers to gainful activity/earnings
    rather than work in the abstract. 'Hope of profit' communicates that their expected
    income from her divination was now lost. 'Hope of gain' is also strong and slightly
    more formal; 'profit' is more natural contemporary English.
- source_word: ἐπιλαβόμενοι
  chosen: they seized
  alternatives:
  - laying hold of
  - grabbing
  lexicon: BDAG
  rationale: The participle denotes taking hold of forcefully. In English, 'they seized'
    communicates the hostile action clearly and idiomatically without awkwardly reproducing
    the participial structure.
- source_word: εἵλκυσαν
  chosen: dragged
  alternatives:
  - hauled
  - pulled
  lexicon: BDAG
  rationale: ἕλκω often conveys forceful pulling. 'Dragged' best reflects the coercive
    public treatment of Paul and Silas.
- source_word: ἀγορὰν
  chosen: the marketplace
  alternatives:
  - the public square
  - the forum
  lexicon: BDAG
  rationale: ἀγορά denotes the civic marketplace/public square. 'Marketplace' is the
    most straightforward rendering; the public and judicial setting is clarified by
    the following phrase.
- source_word: ἐπὶ τοὺς ἄρχοντας
  chosen: before the rulers
  alternatives:
  - to the magistrates
  - before the authorities
  lexicon: BDAG
  rationale: ἄρχοντες is a general term for civic rulers/authorities. 'Before the
    rulers' preserves the broad Greek term without importing the more specific title
    used in the following verse. 'To the magistrates' is possible contextually but
    more interpretive.
