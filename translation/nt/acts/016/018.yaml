id: ACT.16.18
reference: Acts 16:18
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἐποίει ἐπὶ πολλὰς ἡμέρας. διαπονηθεὶς ⸀δὲ Παῦλος καὶ ἐπιστρέψας τῷ
    πνεύματι εἶπεν· Παραγγέλλω σοι ⸀ἐν ὀνόματι Ἰησοῦ Χριστοῦ ἐξελθεῖν ἀπ’ αὐτῆς· καὶ
    ἐξῆλθεν αὐτῇ τῇ ὥρᾳ.
translation:
  text: And she kept doing this for many days. But Paul, greatly troubled, turned
    to the spirit and said, “I command you in the name of Jesus Messiah to come out
    of her.” And it came out that very hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in the name of Jesus Christ.” The Greek title Χριστός is rendered “Messiah”
      here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Greek simply, “to the spirit”; the context identifies it as the spirit afflicting
      the slave girl.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίει ἐπὶ πολλὰς ἡμέρας
  chosen: kept doing this for many days
  alternatives:
  - was doing this for many days
  - did this for many days
  lexicon: BDAG
  rationale: The imperfect ἐποίει indicates repeated or ongoing action in past time;
    'kept doing this' captures the iterative force more naturally than a simple past.
- source_word: διαπονηθεὶς
  chosen: greatly troubled
  alternatives:
  - annoyed
  - worn out
  - distressed
  lexicon: BDAG
  rationale: The participle conveys being deeply troubled or worn down, not mere mild
    irritation. 'Greatly troubled' preserves the seriousness without overstating anger.
- source_word: ἐπιστρέψας
  chosen: turned
  alternatives:
  - turned around
  - turned back
  lexicon: BDAG
  rationale: Aorist participle indicating Paul's physical reorientation before speaking.
    'Turned' is concise and sufficient in English.
- source_word: τῷ πνεύματι
  chosen: to the spirit
  alternatives:
  - to the evil spirit
  - to the demon
  lexicon: BDAG
  rationale: The Greek says simply 'to the spirit.' Since the immediate context identifies
    the girl as having a spirit, the main text preserves the wording without adding
    'evil' or 'demon'; the referent is still clear from context.
- source_word: Παραγγέλλω σοι
  chosen: I command you
  alternatives:
  - I order you
  - I charge you
  lexicon: BDAG
  rationale: παραγγέλλω here is an authoritative directive addressed to the spirit.
    'I command you' is idiomatic and reflects the force well.
- source_word: ἐν ὀνόματι Ἰησοῦ Χριστοῦ
  chosen: in the name of Jesus Messiah
  alternatives:
  - in the name of Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a fixed name. Here the phrase expresses delegated authority
    in relation to Jesus' messianic identity.
- source_word: ἐξελθεῖν ἀπ’ αὐτῆς
  chosen: to come out of her
  alternatives:
  - to go out from her
  - to depart from her
  lexicon: BDAG
  rationale: English idiom for expulsion of a spirit is 'come out of her.' It accurately
    renders the infinitive with ἀπό in this exorcistic context.
- source_word: ἐξῆλθεν αὐτῇ τῇ ὥρᾳ
  chosen: it came out that very hour
  alternatives:
  - it came out at that hour
  - it left her that very moment
  lexicon: BDAG
  rationale: The subject is the spirit implied from context. αὐτῇ τῇ ὥρᾳ is an idiom
    meaning immediately/at that very time; 'that very hour' preserves the wording
    while communicating prompt fulfillment.
