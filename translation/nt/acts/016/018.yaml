theological_decisions:
- issue: Rendering of Χριστοῦ in the command formula ἐν ὀνόματι Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: Following the project's contested-terms guidance, Χριστός is rendered
    'Messiah' where title sense is active. In this verse it is not merely a surname-like
    label but part of the authority formula invoking Jesus' messianic identity.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Whether to specify the spirit as demonic in the main text
  chosen_reading: the spirit
  alternative_readings:
  - the evil spirit
  - the demon
  rationale: The verse itself uses πνεῦμα without an explicit qualifier. To avoid
    importing more than the immediate wording states, the main text keeps 'the spirit,'
    while the broader context supplies that this is an enslaving spirit of divination.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve what the source text states'
