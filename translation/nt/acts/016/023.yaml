id: ACT.16.23
reference: Acts 16:23
source:
  edition: SBLGNT
  text: πολλάς ⸀τε ἐπιθέντες αὐτοῖς πληγὰς ἔβαλον εἰς φυλακήν, παραγγείλαντες τῷ δεσμοφύλακι
    ἀσφαλῶς τηρεῖν αὐτούς·
translation:
  text: And after they had inflicted many blows on them, they threw them into prison,
    ordering the jailer to keep them securely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many lashes' or 'many beatings.' The Greek speaks of numerous inflicted
      blows without specifying the exact instrument here.
    reason: lexical_alternative
  - marker: b
    text: Or 'jail' instead of 'prison'; the Greek term can denote a place of confinement
      more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλάς ... πληγὰς
  chosen: many blows
  alternatives:
  - many lashes
  - many beatings
  - many wounds
  lexicon: BDAG
  rationale: πληγή can denote a blow, stripe, or wound resulting from beating. In
    this context of public punishment before imprisonment, 'blows' best captures the
    inflicted strikes without over-specifying the instrument. 'Many' reflects πολλάς
    modifying πληγάς.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - now
  lexicon: BDAG
  rationale: τέ is a connective particle linking this action with the preceding narrative.
    It is naturally represented by simple 'and' in English; leaving it untranslated
    would underrepresent the connective flow.
- source_word: ἐπιθέντες
  chosen: after they had inflicted
  alternatives:
  - having laid on
  - having imposed
  lexicon: BDAG
  rationale: The participle literally means 'having laid upon,' but with πληγάς it
    is an idiom for inflicting blows. The temporal force is well conveyed by 'after
    they had inflicted' in smooth English while preserving the participial relation
    to the main verb.
- source_word: ἔβαλον εἰς φυλακήν
  chosen: they threw them into prison
  alternatives:
  - they put them in prison
  - they cast them into jail
  lexicon: BDAG
  rationale: βάλλω literally means 'throw/cast,' and here likely conveys forceful
    commitment to custody. 'Threw ... into prison' preserves that vividness better
    than the flatter 'put.' φυλακή is rendered 'prison' as the general place of confinement.
- source_word: φυλακήν
  chosen: prison
  alternatives:
  - jail
  - custody
  lexicon: BDAG
  rationale: φυλακή can refer to prison, jail, or guard/custody. Since the verse speaks
    of confinement under a jailer, 'prison' is a clear modern rendering, with 'jailer'
    retained for δεσμοφύλαξ.
- source_word: παραγγείλαντες
  chosen: ordering
  alternatives:
  - commanding
  - instructing
  lexicon: BDAG
  rationale: 'The participle indicates an accompanying action: they committed them
    to prison while giving a directive. ''Ordering'' reflects the authoritative force
    of παραγγέλλω without sounding overly formal.'
- source_word: δεσμοφύλακι
  chosen: the jailer
  alternatives:
  - the prison guard
  - the keeper of the prison
  lexicon: BDAG
  rationale: δεσμοφύλαξ is the official responsible for prisoners. 'Jailer' is concise,
    idiomatic modern English and fits the narrative context.
- source_word: ἀσφαλῶς
  chosen: securely
  alternatives:
  - safely
  - carefully
  - secure
  lexicon: BDAG
  rationale: ἀσφαλῶς here means securely, with emphasis on making escape impossible
    rather than on the prisoners' safety. 'Securely' best matches the custodial sense.
- source_word: τηρεῖν
  chosen: to keep
  alternatives:
  - to guard
  - to watch over
  lexicon: BDAG
  rationale: τηρέω has a broad range including keep, guard, preserve, observe. In
    prison context, 'keep' is natural English with 'securely' supplying the guarding
    nuance; 'guard' would also be possible.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Refers to Paul and Silas as the direct objects of both imprisonment and
    secure keeping.
