theological_decisions:
- issue: Nature of the prohibition in the accusation
  chosen_reading: Render the charge in legal-civic terms ('it is not lawful for us')
    without endorsing the truth of the claim.
  alternative_readings:
  - Render more loosely as 'it is not right for us'
  rationale: The verse reports an accusation by the crowd/owners, not Luke's endorsement
    of actual Roman law. The translation preserves the accusers' legal framing while
    avoiding interpretive expansion.
  doctrine_reference: 'Translation philosophy: preserve the source''s sense without
    importing claims the text does not make.'
