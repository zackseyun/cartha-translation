id: ACT.16.21
reference: Acts 16:21
source:
  edition: SBLGNT
  text: καὶ καταγγέλλουσιν ἔθη ἃ οὐκ ἔξεστιν ἡμῖν παραδέχεσθαι οὐδὲ ποιεῖν Ῥωμαίοις
    οὖσιν.
translation:
  text: and they are proclaiming customs that it is not lawful for us to accept or
    practice, since we are Romans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being Romans' or 'as Romans.' The Greek participial phrase states the
      reason the accusers give for rejecting these customs.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταγγέλλουσιν
  chosen: are proclaiming
  alternatives:
  - proclaim
  - advocate
  - announce
  lexicon: BDAG
  rationale: The verb commonly means to proclaim or announce publicly. In this accusation
    context, 'are proclaiming' captures the present-tense charge without overinterpreting
    it as formal teaching. 'Advocate' is possible but slightly more interpretive.
- source_word: ἔθη
  chosen: customs
  alternatives:
  - practices
  - usages
  lexicon: BDAG
  rationale: ἔθη refers to customs or established practices. 'Customs' is the most
    natural English equivalent here and fits the civic-religious accusation being
    made.
- source_word: ἃ
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: The relative pronoun introduces the content of the accusation. 'That'
    is smoother in modern English than 'which' in this restrictive clause.
- source_word: οὐκ ἔξεστιν
  chosen: it is not lawful
  alternatives:
  - it is not permitted
  - it is not allowed
  lexicon: BDAG
  rationale: The expression denotes what is legally or socially permitted. 'It is
    not lawful' preserves the formal, juridical tone of the accusation better than
    the more colloquial 'not allowed.'
- source_word: παραδέχεσθαι
  chosen: to accept
  alternatives:
  - to receive
  - to adopt
  lexicon: BDAG
  rationale: In context the sense is receiving or adopting customs. 'Accept' is idiomatic
    and broad enough to cover receiving such practices as valid. 'Adopt' is possible
    but slightly narrows the sense.
- source_word: οὐδὲ ποιεῖν
  chosen: or practice
  alternatives:
  - nor do
  - nor observe
  lexicon: BDAG
  rationale: ποιεῖν with ἔθη naturally means to do or practice customs. 'Practice'
    is more idiomatic English than the wooden 'do' while remaining faithful to the
    sense.
- source_word: Ῥωμαίοις οὖσιν
  chosen: since we are Romans
  alternatives:
  - being Romans
  - as Romans
  lexicon: BDAG
  rationale: The dative participial phrase gives the stated basis for the prohibition
    from the accusers' perspective. 'Since we are Romans' communicates the causal
    nuance clearly in natural English. 'As Romans' is also possible and slightly more
    formal.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Simple connective continuing the accusation from the previous verse.
    'And' is the straightforward rendering.
