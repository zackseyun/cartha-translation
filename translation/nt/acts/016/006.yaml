theological_decisions:
- issue: Agency and personhood of the Spirit in the prohibition
  chosen_reading: by the Holy Spirit
  alternative_readings:
  - by the spirit
  rationale: The presence of the article and adjective with πνεύματος in Luke-Acts
    strongly supports reference to the Holy Spirit as divine personal agent. This
    aligns with orthodox Trinitarian reading without adding claims beyond the text.
