id: ACT.16.6
reference: Acts 16:6
source:
  edition: SBLGNT
  text: ⸀Διῆλθον δὲ τὴν Φρυγίαν ⸀καὶ Γαλατικὴν χώραν, κωλυθέντες ὑπὸ τοῦ ἁγίου πνεύματος
    λαλῆσαι τὸν λόγον ἐν τῇ Ἀσίᾳ,
translation:
  text: And they passed through the region of Phrygia and Galatia, having been forbidden
    by the Holy Spirit to speak the word in Asia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern
      continent.
    reason: cultural_note
  - marker: b
    text: Or possibly, “the Phrygian and Galatian region.” The Greek construction
      can be understood as a single regional designation.
    reason: alternative_reading
lexical_decisions:
- source_word: Διῆλθον
  chosen: passed through
  alternatives:
  - went through
  - traveled through
  lexicon: BDAG
  rationale: Aorist indicative of διέρχομαι denotes movement through a region. 'Passed
    through' is natural English and preserves the directional sense without overinterpreting
    the route.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural unobtrusive rendering in context.
- source_word: τὴν Φρυγίαν καὶ Γαλατικὴν χώραν
  chosen: the region of Phrygia and Galatia
  alternatives:
  - Phrygia and the Galatian region
  - the Phrygian and Galatian region
  lexicon: BDAG
  rationale: χώρα means 'region/country/territory.' The construction may be understood
    either as two coordinated place names with χώρα applying broadly, or as a single
    phrase 'the Phrygian and Galatian region.' Rendering 'the region of Phrygia and
    Galatia' keeps the geography readable while not forcing a more technical historical
    reconstruction.
- source_word: κωλυθέντες
  chosen: having been forbidden
  alternatives:
  - being prevented
  - having been hindered
  lexicon: BDAG
  rationale: Aorist passive participle of κωλύω indicates prior or attendant prevention.
    'Having been forbidden' fits the infinitive λαλῆσαι and conveys a direct divine
    prohibition more clearly than the weaker 'hindered.'
- source_word: ὑπὸ τοῦ ἁγίου πνεύματος
  chosen: by the Holy Spirit
  alternatives:
  - by the Holy Ghost
  lexicon: BDAG
  rationale: Standard NT reference to the divine Spirit. 'Holy Spirit' is contemporary
    English and preserves the personal divine agency expressed by ὑπό with the genitive.
- source_word: λαλῆσαι
  chosen: to speak
  alternatives:
  - to proclaim
  - to preach
  lexicon: BDAG
  rationale: λαλέω is broadly 'to speak.' Although proclamation is in view, 'to speak'
    stays closer to the Greek and lets 'the word' carry the content.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the gospel
  lexicon: BDAG
  rationale: λόγος here likely refers to the Christian message, but 'the word' is
    a common Luke-Acts expression and preserves the source wording without narrowing
    it beyond the text.
- source_word: ἐν τῇ Ἀσίᾳ
  chosen: in Asia
  alternatives:
  - in the province of Asia
  - in Asia Minor
  lexicon: BDAG
  rationale: Ἀσία in Acts refers to the Roman province in western Asia Minor, not
    the modern continent. The main text keeps the familiar proper name, while a footnote
    can clarify the historical referent.
