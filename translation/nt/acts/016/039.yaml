id: ACT.16.39
reference: Acts 16:39
source:
  edition: SBLGNT
  text: καὶ ἐλθόντες παρεκάλεσαν αὐτούς, καὶ ἐξαγαγόντες ἠρώτων ⸂ἀπελθεῖν ἀπὸ⸃ τῆς
    πόλεως.
translation:
  text: And they came and appealed to them, and after leading them out, they asked
    them to leave the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'urged them' or 'entreated them'; the Greek verb can also mean 'comforted'
      in other contexts, but here it likely carries a conciliatory sense after the
      magistrates' mistreatment of Paul and Silas.
    reason: lexical_alternative
  - marker: b
    text: 'The verb ''asked'' is imperfect in Greek, which may imply repeated or continued
      asking: ''they were asking'' or ''they kept asking.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  chosen: they came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, introducing the magistrates' action. 'They
    came' is natural English and preserves the sequence without overloading the sentence
    with participial structure.
- source_word: παρεκάλεσαν
  chosen: appealed to
  alternatives:
  - urged
  - entreated
  - comforted
  - begged
  lexicon: BDAG
  rationale: παρακαλέω has a broad range including urge, exhort, encourage, comfort,
    and appeal. In this context, after unlawfully imprisoning Paul and Silas, the
    officials are placating them rather than comforting them in a pastoral sense.
    'Appealed to' captures the conciliatory, deferential force better than 'comforted'
    or the overly strong 'begged'.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Refers to Paul and Silas; standard pronoun rendering.
- source_word: ἐξαγαγόντες
  chosen: after leading them out
  alternatives:
  - bringing them out
  - having brought them out
  - taking them out
  lexicon: BDAG
  rationale: Aorist participle of ἐξάγω, literally 'lead out' or 'bring out.' 'After
    leading them out' preserves the participial sequence and the physical movement
    from the prison or custody setting.
- source_word: ἠρώτων
  chosen: they asked
  alternatives:
  - they requested
  - they urged
  - they kept asking
  lexicon: BDAG
  rationale: Imperfect of ἐρωτάω can suggest repeated or polite asking. 'They asked'
    is the clearest idiomatic rendering in context; the politeness and pressure are
    already conveyed by the surrounding narrative. 'Requested' is possible but slightly
    too formal.
- source_word: ἀπελθεῖν ἀπὸ τῆς πόλεως
  chosen: to leave the city
  alternatives:
  - to depart from the city
  - to go away from the city
  lexicon: BDAG
  rationale: Infinitive phrase expressing the content of the request. 'Leave the city'
    is idiomatic modern English and accurately conveys ἀπέρχομαι with ἀπό.
