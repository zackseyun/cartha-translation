id: ACT.16.8
reference: Acts 16:8
source:
  edition: SBLGNT
  text: παρελθόντες δὲ τὴν Μυσίαν κατέβησαν εἰς Τρῳάδα.
translation:
  text: So, passing by Mysia, they went down to Troas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having passed through Mysia' or 'passing past Mysia.' The Greek participle
      can be rendered in several close ways; the sense is that they continued on rather
      than stopping there.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρελθόντες
  chosen: passing by
  alternatives:
  - having passed through
  - passing past
  - going on through
  lexicon: BDAG
  rationale: Aorist active participle of παρέρχομαι, here with the accusative τὴν
    Μυσίαν, most naturally means moving past or by a region rather than stopping there.
    'Passing by' is concise, idiomatic English and fits the narrative sense that they
    did not minister in Mysia but continued onward.
- source_word: δὲ
  chosen: So,
  alternatives:
  - and
  - then
  - now
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ is a mild connective. In English narrative it is often best represented
    by light discourse flow rather than a strong conjunction. 'So' gives natural continuity
    from the previous verse without overstating contrast.
- source_word: Μυσίαν
  chosen: Mysia
  rationale: Proper regional name; per translation philosophy, names are transliterated
    by standard convention.
- source_word: κατέβησαν
  chosen: they went down
  alternatives:
  - they came down
  - they traveled down
  - they descended
  lexicon: BDAG
  rationale: Aorist indicative of καταβαίνω commonly means 'go down' or 'come down.'
    'Went down' preserves the directional sense without sounding overly literalistic.
    It may reflect geographical movement toward the coast or lower elevation.
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  lexicon: BDAG
  rationale: With a destination city in English narrative, 'to' is the most natural
    rendering, though εἰς more literally means 'into.'
- source_word: Τρῳάδα
  chosen: Troas
  rationale: Proper place name; standard English transliteration.
