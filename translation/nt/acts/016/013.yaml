id: ACT.16.13
reference: Acts 16:13
source:
  edition: SBLGNT
  text: τῇ τε ἡμέρᾳ τῶν σαββάτων ἐξήλθομεν ἔξω τῆς ⸀πύλης παρὰ ποταμὸν οὗ ⸂ἐνομίζομεν
    προσευχὴν⸃ εἶναι, καὶ καθίσαντες ἐλαλοῦμεν ταῖς συνελθούσαις γυναιξίν.
translation:
  text: On the Sabbath day we went outside the gate beside the river, where we supposed
    there was a place of prayer, and after sitting down we were speaking to the women
    who had gathered there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where we thought there was prayer.' The Greek word can refer either
      to prayer itself or to a place set apart for prayer; the context here favors
      'place of prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ τε ἡμέρᾳ τῶν σαββάτων
  chosen: On the Sabbath day
  alternatives:
  - On the day of the Sabbaths
  - On the Sabbath
  lexicon: BDAG
  rationale: The idiom ἡμέρᾳ τῶν σαββάτων in Koine commonly refers to the Sabbath
    day. A more wooden rendering ('day of the Sabbaths') is less natural in English
    and obscures the idiomatic sense.
- source_word: ἐξήλθομεν ἔξω τῆς πύλης
  chosen: we went outside the gate
  alternatives:
  - we went out outside the gate
  - we went outside the city gate
  lexicon: BDAG
  rationale: ἐξήλθομεν plus ἔξω emphasizes movement outward. 'Went outside the gate'
    captures the sense idiomatically. 'City' is implied by context but not explicit,
    so it is not added to the main text.
- source_word: παρὰ ποταμόν
  chosen: beside the river
  alternatives:
  - by the river
  - along the river
  lexicon: BDAG
  rationale: παρά with the accusative here indicates movement to a place alongside
    the river. 'Beside the river' is natural English and preserves the spatial sense.
- source_word: οὗ ἐνομίζομεν προσευχὴν εἶναι
  chosen: where we supposed there was a place of prayer
  alternatives:
  - where we thought there was prayer
  - where we supposed there was a prayer place
  - where we thought there was a synagogue
  lexicon: BDAG
  rationale: νομίζω here means 'suppose/think.' προσευχή can denote prayer generally
    or, in some contexts, a place set aside for prayer. Given the syntax with εἶναι
    and the narrative setting by the river, 'a place of prayer' best fits. 'Synagogue'
    is interpretive and not the lexical value of προσευχή here.
- source_word: καὶ καθίσαντες
  chosen: and after sitting down
  alternatives:
  - and sitting down
  - and when we had sat down
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered as antecedent action
    relative to the main verb. 'After sitting down' communicates the sequence clearly
    in modern English.
- source_word: ἐλαλοῦμεν
  chosen: we were speaking
  alternatives:
  - we spoke
  - we were talking
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Were speaking' preserves
    the imperfective aspect better than the simple past.
- source_word: ταῖς συνελθούσαις γυναιξίν
  chosen: to the women who had gathered there
  alternatives:
  - to the women who had come together
  - to the assembled women
  lexicon: BDAG
  rationale: συνελθούσαις denotes women who had come together/assembled. 'Who had
    gathered there' is idiomatic and reflects the completed action prior to the speaking.
    'There' is supplied for natural English from the immediate context.
