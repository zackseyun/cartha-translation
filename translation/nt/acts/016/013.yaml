theological_decisions:
- issue: Meaning of προσευχή in this setting
  chosen_reading: Rendered as 'a place of prayer' rather than 'prayer' or 'synagogue.'
  alternative_readings:
  - '''prayer'' as an abstract activity'
  - '''synagogue'' as an interpretive institutional equivalent'
  rationale: The verse describes a location by the river where people gathered, and
    προσευχή in Hellenistic Jewish usage can refer to a prayer-place. Rendering it
    as 'a place of prayer' preserves the likely local sense without over-translating
    to 'synagogue,' which the Greek does not say.
  doctrine_reference: Translation philosophy §1, §5
