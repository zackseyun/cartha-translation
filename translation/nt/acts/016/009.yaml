theological_decisions:
- issue: Nature of the experience described by ὅραμα and ὤφθη
  chosen_reading: Render as an actual vision appearance to Paul without specifying
    more than the text states.
  alternative_readings:
  - dream
  - inner impression
  - objective apparition
  rationale: The text explicitly says a vision appeared to Paul during the night.
    Translating 'vision appeared' preserves the revelatory event while avoiding interpretive
    overreach about its precise phenomenology.
  doctrine_reference: Translation philosophy §1, §3
