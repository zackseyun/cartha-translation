id: ACT.16.9
reference: Acts 16:9
source:
  edition: SBLGNT
  text: καὶ ὅραμα ⸀διὰ νυκτὸς ⸂τῷ Παύλῳ ὤφθη⸃, ἀνὴρ ⸂Μακεδών τις ἦν⸃ ἑστὼς ⸀καὶ παρακαλῶν
    αὐτὸν καὶ λέγων· Διαβὰς εἰς Μακεδονίαν βοήθησον ἡμῖν.
translation:
  text: 'And a vision appeared to Paul in the night: a certain Macedonian man was
    standing and urging him, saying, “Come over into Macedonia and help us.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “during the night” or “by night.”
    reason: lexical_alternative
  - marker: b
    text: Or “a man of Macedonia.”
    reason: lexical_alternative
  - marker: c
    text: Greek “crossing over into Macedonia, help us”; the English “Come over” conveys
      the idiomatic force of the participle with the imperative.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅραμα
  chosen: vision
  alternatives:
  - appearance
  - revelatory vision
  lexicon: BDAG
  rationale: Standard sense in narrative contexts of a divinely given sight or experience.
    'Vision' is the natural English equivalent and fits Acts usage.
- source_word: διὰ νυκτός
  chosen: in the night
  alternatives:
  - during the night
  - by night
  lexicon: BDAG
  rationale: The idiom indicates time when the vision occurred. 'In the night' is
    natural modern English and preserves the nocturnal setting without sounding archaic
    like 'by night.'
- source_word: τῷ Παύλῳ ὤφθη
  chosen: appeared to Paul
  alternatives:
  - was seen by Paul
  - was revealed to Paul
  lexicon: BDAG
  rationale: The passive of ὁράω with dative is idiomatically rendered 'appeared to.'
    This is clearer and more natural than a wooden passive while preserving the event's
    revelatory character.
- source_word: ἀνὴρ Μακεδών τις
  chosen: a certain Macedonian man
  alternatives:
  - a man of Macedonia
  - a Macedonian man
  - a certain man, a Macedonian
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man,' not generic 'person,' and τις adds indefiniteness,
    here well conveyed by 'a certain.' 'Macedonian' functions adjectivally in English.
- source_word: ἑστώς
  chosen: was standing
  alternatives:
  - stood
  - standing
  lexicon: BDAG
  rationale: The periphrastic description presents the man in a standing posture within
    the vision. 'Was standing' preserves the scene-setting imperfective feel better
    than simple 'stood.'
- source_word: παρακαλῶν
  chosen: urging
  alternatives:
  - begging
  - appealing to
  - imploring
  lexicon: BDAG
  rationale: παρακαλέω can range from exhorting to pleading. In this context of a
    request for aid, 'urging' captures earnest appeal without overstating emotional
    intensity as 'begging' might.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: A standard participial introducer of direct speech. English can render
    it simply as 'saying' after 'urging him.'
- source_word: Διαβάς
  chosen: Come over
  alternatives:
  - Cross over
  - After crossing over, come
  lexicon: BDAG
  rationale: As an aorist participle used with an imperative, it functions idiomatically
    as an attendant circumstance-like appeal. 'Come over' is the most natural English
    in context, conveying movement across to Macedonia.
- source_word: εἰς Μακεδονίαν
  chosen: into Macedonia
  alternatives:
  - to Macedonia
  lexicon: BDAG
  rationale: εἰς marks movement into. 'Into Macedonia' preserves the directional force
    slightly more clearly than 'to Macedonia,' though both are possible.
- source_word: βοήθησον ἡμῖν
  chosen: help us
  alternatives:
  - come to our aid
  - assist us
  lexicon: BDAG
  rationale: A direct imperative request for aid. 'Help us' is simple, accurate, and
    forceful in modern English.
