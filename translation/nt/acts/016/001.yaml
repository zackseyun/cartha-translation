theological_decisions:
- issue: Meaning of πιστῆς describing Timothy's mother
  chosen_reading: believing Jewish woman
  alternative_readings:
  - faithful Jewish woman
  rationale: Given Luke's usage in Acts, πιστός commonly identifies a believer. Rendering it 'believing' avoids reducing the phrase to general moral reliability and better fits the Christian context of Timothy being introduced as a disciple's son.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: πίστις → faith'
revisions:
- timestamp: '2026-04-21T02:45:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/016/001.json
  category: awkward_english
  tier: 1
  from: there was a certain disciple there
  to: a certain disciple was there
  rationale: The current rendering uses an existential 'there was' followed by a locational 'there' to translate 'ἦν ἐκεῖ'. This creates a slightly redundant and awkward English phrase. While the intent to preserve the force of ἐκεῖ is understandable, a construction like 'a certain disciple was there' is more natural in English and conveys the exact same meaning without loss.
