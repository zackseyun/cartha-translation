id: ACT.16.1
reference: Acts 16:1
source:
  edition: SBLGNT
  text: Κατήντησεν δὲ ⸀καὶ εἰς Δέρβην καὶ ⸀εἰς Λύστραν. καὶ ἰδοὺ μαθητής τις ἦν ἐκεῖ ὀνόματι Τιμόθεος, υἱὸς ⸀γυναικὸς Ἰουδαίας πιστῆς, πατρὸς δὲ Ἕλληνος,
translation:
  text: He also came to Derbe and to Lystra. And behold, a certain disciple was there named Timothy, the son of a believing Jewish woman, but of a Greek father,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of a Jewish woman who was faithful.' The Greek adjective can mean either 'believing' or 'faithful,' though in Acts the sense 'believing' is more likely here.
    reason: lexical_alternative
  - marker: b
    text: Or 'there was a certain disciple there'.
    reason: previous_rendering
lexical_decisions:
- source_word: Κατήντησεν
  chosen: came
  alternatives:
  - arrived
  - went on to
  lexicon: BDAG
  rationale: The verb καταντάω here denotes arriving at or coming to a place. 'Came' is natural English and fits the narrative flow; 'arrived' is possible but slightly more formal, while 'went on to' adds a nuance of travel progression not explicit in the single verb.
- source_word: δὲ καὶ
  chosen: also
  alternatives:
  - and
  - now also
  lexicon: BDAG
  rationale: The combination marks continuation with slight addition. 'Also' captures the additive force without overtranslating the connective structure.
- source_word: εἰς Δέρβην καὶ εἰς Λύστραν
  chosen: to Derbe and to Lystra
  alternatives:
  - into Derbe and into Lystra
  lexicon: BDAG
  rationale: εἰς with place names in travel narrative is idiomatically rendered 'to.' Repeating 'to' reflects the repeated preposition in Greek and preserves the rhythm of the itinerary.
- source_word: καὶ ἰδοὺ
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  - And there was
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to what follows. 'And behold' preserves the markedness and narrative vividness better than smoothing it away entirely.
- source_word: μαθητής τις
  chosen: a certain disciple
  alternatives:
  - a disciple
  - a certain follower
  lexicon: BDAG
  rationale: τις is indefinite but not empty; 'a certain' preserves the introduction of a specific yet newly mentioned person. 'Disciple' is the standard rendering of μαθητής in Acts.
- source_word: ἦν ἐκεῖ
  chosen: there was ... there
  alternatives:
  - was there
  lexicon: BDAG
  rationale: The existential use of ἦν is best represented by 'there was.' Retaining 'there' also reflects ἐκεῖ, though English becomes slightly repetitive; this preserves the Greek emphasis on Timothy's presence in that location.
- source_word: ὀνόματι Τιμόθεος
  chosen: named Timothy
  alternatives:
  - by the name of Timothy
  lexicon: BDAG
  rationale: The dative ὀνόματι is idiomatically rendered 'named.' This is clear modern English while remaining faithful to the construction.
- source_word: υἱὸς γυναικὸς Ἰουδαίας πιστῆς
  chosen: the son of a believing Jewish woman
  alternatives:
  - the son of a Jewish woman who was a believer
  - the son of a faithful Jewish woman
  lexicon: BDAG
  rationale: πιστῆς in Acts commonly refers to one who believes, not merely one who is faithful in character. 'Believing Jewish woman' is concise and preserves both descriptors modifying γυναικός.
- source_word: πιστῆς
  chosen: believing
  alternatives:
  - faithful
  lexicon: BDAG
  rationale: In this context, contrasting Timothy's mother with his Greek father and within Luke's usage, πιστός most naturally means 'believing,' i.e., a believer. 'Faithful' is lexically possible but less specific to Christian faith here.
- source_word: πατρὸς δὲ Ἕλληνος
  chosen: but of a Greek father
  alternatives:
  - but his father was a Greek
  - but of a Greek man as father
  lexicon: BDAG
  rationale: The genitive phrase is elliptical after 'son of.' 'But of a Greek father' preserves the compact contrast introduced by δέ. 'His father was a Greek' is smoother English but slightly more expansive than the Greek wording.
- source_word: Ἕλληνος
  chosen: Greek
  alternatives:
  - Gentile
  lexicon: BDAG
  rationale: Ἕλλην here denotes an ethnic/cultural Greek rather than the broader theological category 'Gentile.' 'Greek' is the direct and standard rendering.
