id: ACT.16.38
reference: Acts 16:38
source:
  edition: SBLGNT
  text: ⸀ἀπήγγειλαν δὲ τοῖς στρατηγοῖς οἱ ῥαβδοῦχοι τὰ ῥήματα ταῦτα· ⸂ἐφοβήθησαν δὲ⸃
    ἀκούσαντες ὅτι Ῥωμαῖοί εἰσιν,
translation:
  text: So the rod-bearers reported these words to the magistrates, and they were
    afraid when they heard that they were Romans,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Roman citizens.' The Greek says 'Romans,' but in this legal context
      the point is their protected civic status.
    reason: lexical_alternative
  - marker: b
    text: '''Rod-bearers'' refers to the magistrates'' attendants, traditionally called
      ''lictors.'''
    reason: cultural_note
  - marker: c
    text: '''Magistrates'' translates στρατηγοί, the leading civic officials in Philippi.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: Aorist active indicative meaning to report or convey a message. 'Reported'
    fits the official setting and the indirect relay of information from the officers
    to the magistrates.
- source_word: στρατηγοῖς
  chosen: magistrates
  alternatives:
  - praetors
  - chief magistrates
  lexicon: BDAG
  rationale: In Philippi's Roman colonial context, στρατηγοί refers to the city authorities
    commonly rendered 'magistrates.' 'Praetors' is historically precise but less accessible;
    'magistrates' balances accuracy and readability.
- source_word: ῥαβδοῦχοι
  chosen: rod-bearers
  alternatives:
  - lictors
  - officers
  lexicon: BDAG
  rationale: Literally 'rod-bearers,' referring to attendants who carried rods as
    symbols of magisterial authority. This preserves the concrete image of the Greek
    better than the more interpretive 'officers.' 'Lictors' is historically specific
    but less transparent to modern readers.
- source_word: τὰ ῥήματα ταῦτα
  chosen: these words
  alternatives:
  - this message
  - these things
  lexicon: BDAG
  rationale: A straightforward rendering of the accusative phrase. 'These words' preserves
    the lexical form and points back to the specific statement just delivered.
- source_word: ἐφοβήθησαν
  chosen: were afraid
  alternatives:
  - became afraid
  - were alarmed
  lexicon: BDAG
  rationale: Passive/deponent aorist conveying fear in response to what they heard.
    'Were afraid' is natural English and adequately reflects the reaction without
    overinterpreting intensity.
- source_word: ἀκούσαντες
  chosen: when they heard
  alternatives:
  - after hearing
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle expressing attendant circumstance or temporal relation.
    'When they heard' is idiomatic and clearly conveys the causal-temporal sequence.
- source_word: Ῥωμαῖοί
  chosen: Romans
  alternatives:
  - Roman citizens
  lexicon: BDAG
  rationale: The adjective used substantivally means 'Romans.' In context it implies
    Roman citizenship, which explains the magistrates' fear, but the Greek itself
    says 'Romans,' so the main text preserves that wording.
