id: ACT.16.3
reference: Acts 16:3
source:
  edition: SBLGNT
  text: τοῦτον ἠθέλησεν ὁ Παῦλος σὺν αὐτῷ ἐξελθεῖν, καὶ λαβὼν περιέτεμεν αὐτὸν διὰ
    τοὺς Ἰουδαίους τοὺς ὄντας ἐν τοῖς τόποις ἐκείνοις, ᾔδεισαν γὰρ ἅπαντες ⸂ὅτι Ἕλλην
    ὁ πατὴρ αὐτοῦ⸃ ὑπῆρχεν.
translation:
  text: Paul wanted this man to go out with him, and after taking him, he circumcised
    him because of the Jews who were in those places, for they all knew that his father
    was a Greek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to travel with him.' The Greek literally says 'to go out with him,'
      an idiom that can refer to setting out on a journey.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sake of the Jews' / 'on account of the Jews.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'a Greek'; in this context this likely marks Timothy's father as non-Jewish.
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτον
  chosen: this man
  alternatives:
  - him
  - this one
  lexicon: BDAG
  rationale: Accusative demonstrative referring to Timothy from the prior context.
    'This man' makes the personal reference explicit in natural English; 'him' would
    be less clear at the start of the sentence.
- source_word: ἠθέλησεν
  chosen: wanted
  alternatives:
  - desired
  - wished
  lexicon: BDAG
  rationale: Aorist of θέλω here expresses Paul's intention or desire. 'Wanted' is
    natural modern English and adequately reflects volition without overstating resolve.
- source_word: σὺν αὐτῷ ἐξελθεῖν
  chosen: to go out with him
  alternatives:
  - to leave with him
  - to travel with him
  lexicon: BDAG
  rationale: The infinitive ἐξελθεῖν literally means 'to go out.' In Acts, this often
    carries the sense of setting out on travel. 'To go out with him' preserves the
    verbal imagery while remaining idiomatic. 'To travel with him' is interpretive
    and slightly more dynamic.
- source_word: λαβὼν
  chosen: after taking him
  alternatives:
  - taking him
  - having taken him
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb. 'After taking him' clearly
    conveys the sequence in smooth English.
- source_word: περιέτεμεν
  chosen: he circumcised him
  lexicon: BDAG
  rationale: Direct and standard rendering of περιτέμνω. No euphemism is warranted.
- source_word: διὰ τοὺς Ἰουδαίους
  chosen: because of the Jews
  alternatives:
  - for the sake of the Jews
  - on account of the Jews
  lexicon: BDAG
  rationale: διά with the accusative here indicates reason or motive. 'Because of'
    is the clearest default. 'For the sake of' could imply a more positive or conciliatory
    nuance than the Greek itself requires.
- source_word: τοὺς ὄντας ἐν τοῖς τόποις ἐκείνοις
  chosen: who were in those places
  alternatives:
  - who were in those regions
  - who lived in those areas
  lexicon: BDAG
  rationale: A participial phrase identifying the local Jewish population. 'Places'
    is formally closer to τόποις; 'regions/areas' are possible but slightly more interpretive.
- source_word: ᾔδεισαν γὰρ ἅπαντες
  chosen: for they all knew
  alternatives:
  - for everyone knew
  - because all of them knew
  lexicon: BDAG
  rationale: γάρ gives explanatory force; ἅπαντες emphasizes the comprehensiveness
    of local knowledge. 'They all knew' preserves both the explanation and the plural
    reference to the people just mentioned.
- source_word: Ἕλλην
  chosen: a Greek
  alternatives:
  - Greek
  - a Gentile
  lexicon: BDAG
  rationale: Ἕλλην literally denotes a Greek. In some Jewish contexts it can function
    broadly for a Gentile, but here the straightforward ethnic/cultural designation
    is preferable. The anarthrous predicate nominative is naturally rendered 'a Greek.'
- source_word: ὁ πατὴρ αὐτοῦ ὑπῆρχεν
  chosen: his father was
  alternatives:
  - his father happened to be
  - his father was by origin
  lexicon: BDAG
  rationale: ὑπάρχω can sometimes add a nuance of existing or being by circumstance,
    but in this context simple 'was' is the most natural English rendering without
    importing unnecessary emphasis.
