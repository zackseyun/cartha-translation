id: ACT.16.30
reference: Acts 16:30
source:
  edition: SBLGNT
  text: καὶ προαγαγὼν αὐτοὺς ἔξω ἔφη· Κύριοι, τί με δεῖ ποιεῖν ἵνα σωθῶ;
translation:
  text: And after bringing them outside, he said, “Sirs, what must I do so that I
    may be saved?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is necessary for me to do in order to be saved?'
    reason: lexical_alternative
  - marker: b
    text: The address 'Sirs' translates Greek kyrios in a polite social sense here,
      not as the divine title 'Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προαγαγὼν
  chosen: after bringing
  alternatives:
  - having brought
  - leading
  lexicon: BDAG
  rationale: Aorist participle of προάγω, here indicating prior action relative to
    the main verb ἔφη. 'After bringing' gives natural English while preserving the
    sequence.
- source_word: αὐτοὺς ἔξω
  chosen: them outside
  alternatives:
  - them out
  - them outdoors
  lexicon: BDAG
  rationale: The object plus adverb indicates movement to the outside. 'Outside' is
    idiomatic and clear in English.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he was saying
  lexicon: BDAG
  rationale: Imperfect of φημί often functions as a simple speech introducer in narrative.
    'He said' is standard, readable English.
- source_word: Κύριοι
  chosen: Sirs
  alternatives:
  - Lords
  - Masters
  lexicon: BDAG
  rationale: Vocative plural of κύριος used as a respectful form of address to Paul
    and Silas, not a theological title here. 'Sirs' best captures the social sense
    in contemporary English. This is a contextual exception to the default 'Lord'
    rendering for κύριος and is documented here.
- source_word: τί με δεῖ ποιεῖν
  chosen: what must I do
  alternatives:
  - what is necessary for me to do
  - what ought I to do
  lexicon: BDAG
  rationale: δεῖ expresses necessity, and the infinitive ποιεῖν supplies the action.
    'What must I do' is concise and faithful to the force of the Greek.
- source_word: ἵνα σωθῶ
  chosen: so that I may be saved
  alternatives:
  - in order that I may be saved
  - to be saved
  lexicon: BDAG
  rationale: ἵνα with the aorist passive subjunctive expresses purpose/result. 'So
    that I may be saved' preserves the clause structure and the passive voice, avoiding
    overcompression.
