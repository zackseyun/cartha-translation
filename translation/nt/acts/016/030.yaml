theological_decisions:
- issue: Meaning of σωθῶ in the jailer's question
  chosen_reading: be saved
  alternative_readings:
  - be rescued
  - be delivered
  rationale: In Acts, σώζω can denote rescue or salvation depending on context. Here,
    in immediate response to the apostles' witness and followed by v.31, the sense
    is best taken as salvation in the fuller spiritual sense, while still allowing
    the term's broad semantic range. The translation keeps the traditional and contextually
    warranted 'be saved' without importing a narrower doctrinal system.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
