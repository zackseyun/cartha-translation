id: ACT.16.7
reference: Acts 16:7
source:
  edition: SBLGNT
  text: ἐλθόντες ⸀δὲ κατὰ τὴν Μυσίαν ἐπείραζον ⸀εἰς τὴν Βιθυνίαν ⸀πορευθῆναι καὶ οὐκ
    εἴασεν αὐτοὺς τὸ πνεῦμα ⸀Ἰησοῦ·
translation:
  text: But when they came opposite Mysia, they were trying to go into Bithynia, and
    the Spirit of Jesus did not permit them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'near Mysia' or 'along Mysia.' The Greek phrase likely refers to reaching
      the border region of Mysia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  chosen: when they came
  alternatives:
  - having come
  - after they came
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context. 'When they came' gives
    natural English while preserving the sequence of events.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast with the previous movement in the
    narrative. 'But' best reflects the shift that follows.
- source_word: κατὰ τὴν Μυσίαν
  chosen: opposite Mysia
  alternatives:
  - by Mysia
  - along Mysia
  - near Mysia
  lexicon: BDAG
  rationale: κατά with the accusative in geographical description can mean 'opposite'
    or 'alongside.' Here it likely indicates reaching the region bordering Mysia rather
    than entering it fully. 'Opposite Mysia' preserves the directional nuance without
    overinterpreting.
- source_word: ἐπείραζον
  chosen: they were trying
  alternatives:
  - they attempted
  - they kept trying
  lexicon: BDAG
  rationale: Imperfect tense conveys attempted action in progress. 'They were trying'
    captures both the imperfective aspect and the sense of attempted movement.
- source_word: εἰς τὴν Βιθυνίαν πορευθῆναι
  chosen: to go into Bithynia
  alternatives:
  - to travel into Bithynia
  - to proceed to Bithynia
  lexicon: BDAG
  rationale: The infinitive πορευθῆναι expresses intended travel; εἰς suggests movement
    into the region. 'Go into Bithynia' is clear and sufficiently literal.
- source_word: οὐκ εἴασεν
  chosen: did not permit
  alternatives:
  - did not allow
  - forbade
  lexicon: BDAG
  rationale: ἐάω means to allow or permit. 'Did not permit' is a natural formal rendering;
    'forbade' would be stronger than the Greek requires.
- source_word: τὸ πνεῦμα Ἰησοῦ
  chosen: the Spirit of Jesus
  alternatives:
  - Jesus' Spirit
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered as possession/association: ''the
    Spirit of Jesus.'' This preserves the unusual christological expression found
    in the Greek and should not be flattened to simply ''the Holy Spirit'' in the
    main text.'
