theological_decisions:
- issue: Rendering the christological phrase τὸ πνεῦμα Ἰησοῦ
  chosen_reading: the Spirit of Jesus
  alternative_readings:
  - the Holy Spirit
  - the Spirit
  rationale: The Greek explicitly includes 'of Jesus,' and the translation should
    preserve that wording rather than harmonize it to more familiar expressions. This
    maintains the text's own Trinitarian/christological texture without importing
    a doctrinal explanation beyond the verse.
