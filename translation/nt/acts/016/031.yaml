id: ACT.16.31
reference: Acts 16:31
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Πίστευσον ἐπὶ τὸν κύριον ⸀Ἰησοῦν, καὶ σωθήσῃ σὺ καὶ ὁ οἶκός σου.
translation:
  text: And they said, “Believe in the Lord Jesus, and you will be saved—you and your
    household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Believe on the Lord Jesus.”
    reason: lexical_alternative
  - marker: b
    text: “Your household” refers to those of his house, not merely the physical building.
    reason: cultural_note
lexical_decisions:
- source_word: Πίστευσον
  chosen: Believe
  alternatives:
  - Put your faith
  - Trust
  lexicon: BDAG
  rationale: Aorist imperative of πιστεύω calling for decisive response. 'Believe'
    is the most direct and idiomatic English rendering and aligns with the project's
    default handling of the πιστ- word group without adding interpretive expansion.
    'Trust' is possible, but 'believe in' better matches common NT salvation-language
    in English.
- source_word: ἐπὶ τὸν
  chosen: in
  alternatives:
  - 'on'
  - upon
  lexicon: BDAG
  rationale: With πιστεύω, ἐπί + accusative expresses the object toward whom faith
    is directed. English idiom strongly prefers 'believe in' here over the more wooden
    'believe on,' while preserving the relational sense.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrine file's default rendering for κύριος. In this christological
    context, 'Lord' preserves both honorific and theological force better than 'Master.'
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, per project
    philosophy to transliterate names and translate titles.
- source_word: σωθήσῃ
  chosen: you will be saved
  alternatives:
  - you will be rescued
  - you will be delivered
  lexicon: BDAG
  rationale: Future passive of σῴζω. In Acts and in this evangelistic context, 'saved'
    is the established and contextually appropriate rendering, preserving both spiritual
    and comprehensive deliverance without narrowing the sense to merely temporal rescue.
- source_word: σὺ καὶ ὁ οἶκός σου
  chosen: you and your household
  alternatives:
  - you and your house
  lexicon: BDAG
  rationale: οἶκος here refers not merely to the building but to the household/family
    unit under the jailer's roof. 'Household' communicates the social unit intended
    in natural modern English. The construction does not itself specify the mechanism
    of their salvation, only includes them in the promise as the gospel reaches the
    household.
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - But they said
  lexicon: BDAG
  rationale: δέ is lightly connective here. 'And' is smoother in English narrative
    flow, while 'But' would overstate contrast.
