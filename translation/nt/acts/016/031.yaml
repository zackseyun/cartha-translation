theological_decisions:
- issue: Scope of the promise concerning 'you and your household'
  chosen_reading: Render the phrase straightforwardly without implying automatic salvation
    apart from personal faith.
  alternative_readings:
  - A covenantal reading implying household inclusion through the jailer's faith alone
  - A strictly individualistic reading minimizing household scope
  rationale: The Greek states the promise as spoken to the jailer and his household,
    but this verse alone does not resolve later theological debates about household
    salvation or baptism. The translation preserves the wording and leaves the interpretive
    tension unresolved, in keeping with the doctrine's instruction not to import denominational
    claims the text does not make.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
