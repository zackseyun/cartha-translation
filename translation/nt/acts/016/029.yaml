theological_decisions:
- issue: Nature of the jailer's gesture toward Paul and Silas
  chosen_reading: A physical act of fearful supplication/respect, rendered 'he fell
    down before Paul and Silas' without implying worship.
  alternative_readings:
  - he worshiped Paul and Silas
  - he prostrated himself before Paul and Silas
  rationale: The context indicates alarm and urgent deference after the earthquake
    and apparent divine intervention. The Greek verb can describe falling before someone
    without requiring religious worship. The translation preserves the act without
    importing a theological claim the text does not make.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
