id: ACT.19.30
reference: Acts 19:30
source:
  edition: SBLGNT
  text: ⸂Παύλου δὲ⸃ βουλομένου εἰσελθεῖν εἰς τὸν δῆμον οὐκ εἴων αὐτὸν οἱ μαθηταί·
translation:
  text: But when Paul wanted to go in among the assembly, the disciples would not
    let him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "into the assembly" or "into the crowd." The Greek δῆμος can refer to
      the assembled public body in this civic setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παύλου
  chosen: Paul
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Παῦλος, following the policy
    to transliterate names rather than translate them.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous verse. 'But'
    best captures the adversative nuance here as the narrative shifts from the crowd's
    action to Paul's intention.
- source_word: βουλομένου
  chosen: when Paul wanted
  alternatives:
  - while Paul was wanting
  - when Paul intended
  - when Paul desired
  lexicon: BDAG
  rationale: The genitive absolute with βούλομαι expresses Paul's intention or desire.
    'When Paul wanted' is natural English and preserves the sense without overformal
    awkwardness.
- source_word: εἰσελθεῖν
  chosen: to go in
  alternatives:
  - to enter
  lexicon: BDAG
  rationale: Aorist infinitive of εἰσέρχομαι, denoting entry. 'To go in' is idiomatic
    modern English and fits the narrative movement.
- source_word: εἰς τὸν δῆμον
  chosen: among the assembly
  alternatives:
  - into the assembly
  - to the people
  - into the crowd
  lexicon: BDAG
  rationale: δῆμος can denote the assembled civic body or public gathering. In this
    Ephesian theater context, 'assembly' best reflects the gathered public body and
    anticipates the same civic setting in the surrounding passage. 'Among' fits the
    sense of entering into the gathered body rather than merely approaching it.
- source_word: οὐκ εἴων
  chosen: would not let
  alternatives:
  - were not allowing
  - did not permit
  lexicon: BDAG
  rationale: Imperfect of ἐάω conveys attempted prevention or ongoing refusal. 'Would
    not let' captures both the prohibition and the imperfective force in natural English.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring back to Paul.
- source_word: οἱ μαθηταί
  chosen: the disciples
  alternatives:
  - his disciples
  - the believers
  lexicon: BDAG
  rationale: μαθηταί is most straightforwardly 'disciples.' Adding 'his' would over-specify
    possession not explicit in the Greek, and 'believers' would flatten the learner/follower
    nuance.
