id: ACT.19.32
reference: Acts 19:32
source:
  edition: SBLGNT
  text: ἄλλοι μὲν οὖν ἄλλο τι ἔκραζον, ἦν γὰρ ἡ ἐκκλησία συγκεχυμένη, καὶ οἱ πλείους
    οὐκ ᾔδεισαν τίνος ἕνεκα συνεληλύθεισαν.
translation:
  text: So then some were shouting one thing and some another, for the assembly was
    in confusion, and most of them did not know why they had come together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gathering' or 'the crowd.' The Greek word is ἐκκλησία, here used
      for a civic assembly rather than the church.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι μὲν οὖν ἄλλο τι ἔκραζον
  chosen: So then some were shouting one thing and some another
  alternatives:
  - Then some were crying out one thing, others another
  - So some were shouting one thing, others something else
  lexicon: BDAG
  rationale: ἄλλοι ... ἄλλο τι creates a distributive contrast ('some ... something
    else'). ἔκραζον is imperfect, so 'were shouting' best conveys ongoing noisy action.
    μὲν οὖν is represented idiomatically by 'So then' rather than woodenly.
- source_word: ἐκκλησία
  chosen: assembly
  alternatives:
  - gathering
  - crowd
  lexicon: BDAG
  rationale: In this civic-riot context, ἐκκλησία refers to an assembled public gathering,
    not the Christian church. 'Assembly' preserves the lexical link without importing
    ecclesial meaning; 'crowd' is possible but less precise.
- source_word: συγκεχυμένη
  chosen: in confusion
  alternatives:
  - confused
  - in disorder
  lexicon: BDAG
  rationale: The perfect participle from συγχέω describes a state of disorder/confusion.
    Rendering the clause as 'was in confusion' is natural English and captures the
    resultant state.
- source_word: οἱ πλείους
  chosen: most of them
  alternatives:
  - the majority
  - most
  lexicon: BDAG
  rationale: The comparative form functions substantivally to mean 'the majority'
    or 'most people' in the assembly. 'Most of them' is idiomatic and clearly refers
    back to those gathered.
- source_word: τίνος ἕνεκα
  chosen: why
  alternatives:
  - for what reason
  - for what purpose
  lexicon: BDAG
  rationale: The idiom means 'for what reason.' 'Why' is the most natural concise
    English equivalent.
- source_word: συνεληλύθεισαν
  chosen: they had come together
  alternatives:
  - they had assembled
  - they had gathered together
  lexicon: BDAG
  rationale: From συνέρχομαι, the pluperfect indicates prior completed gathering relative
    to the narrative moment. 'Had come together' preserves both the verbal idea and
    the prior aspect.
