id: ACT.19.38
reference: Acts 19:38
source:
  edition: SBLGNT
  text: εἰ μὲν οὖν Δημήτριος καὶ οἱ σὺν αὐτῷ τεχνῖται ἔχουσιν πρός τινα λόγον, ἀγοραῖοι
    ἄγονται καὶ ἀνθύπατοί εἰσιν, ἐγκαλείτωσαν ἀλλήλοις.
translation:
  text: If, then, Demetrius and the craftsmen with him have a complaint against anyone,
    court sessions are being held and there are proconsuls; let them bring charges
    against one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the courts are in session.' The Greek expression ἀγοραῖοι ἄγονται refers
      to officially convened judicial proceedings.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there are proconsuls available/present.' The plural may refer to the
      provincial office in a general administrative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ μὲν οὖν
  chosen: If, then
  alternatives:
  - Therefore if
  - If indeed, then
  lexicon: BDAG
  rationale: Renders the inferential and transitional force naturally in English without
    overloading the sentence with particles. μέν is lightly represented in the flow
    rather than separately translated.
- source_word: Δημήτριος
  chosen: Demetrius
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: οἱ σὺν αὐτῷ τεχνῖται
  chosen: the craftsmen with him
  alternatives:
  - the artisans with him
  - his fellow craftsmen
  lexicon: BDAG
  rationale: τεχνῖται denotes skilled workers/artisans. 'Craftsmen' is natural and
    fits the Ephesian silversmith context; 'with him' preserves σὺν αὐτῷ without making
    the relationship more specific than the Greek states.
- source_word: ἔχουσιν πρός τινα λόγον
  chosen: have a complaint against anyone
  alternatives:
  - have a case against someone
  - have a matter against anyone
  lexicon: BDAG
  rationale: This idiom refers to having a legal grievance or case against someone.
    'Complaint' communicates the forensic sense clearly in modern English.
- source_word: τινα
  chosen: anyone
  alternatives:
  - someone
  - a certain person
  lexicon: BDAG
  rationale: Indefinite object in a general legal statement; 'anyone' best fits the
    broad procedural sense.
- source_word: ἀγοραῖοι ἄγονται
  chosen: court sessions are being held
  alternatives:
  - court days are held
  - the courts are in session
  lexicon: BDAG
  rationale: The phrase refers to official judicial sessions/days. 'Court sessions
    are being held' preserves the passive and communicates the institutional meaning
    more clearly than a wooden 'market-days are conducted.'
- source_word: ἀνθύπατοί εἰσιν
  chosen: there are proconsuls
  alternatives:
  - the proconsuls are available
  - proconsuls are present
  lexicon: BDAG
  rationale: ἀνθύπατοι are Roman provincial officials, properly 'proconsuls.' The
    plural likely reflects the office in a general or institutional sense rather than
    requiring a singular smoothing.
- source_word: ἐγκαλείτωσαν
  chosen: let them bring charges
  alternatives:
  - let them accuse
  - let them press charges
  lexicon: BDAG
  rationale: Forensic verb meaning to bring an accusation in a legal setting. 'Bring
    charges' best matches the courtroom context.
- source_word: ἀλλήλοις
  chosen: against one another
  alternatives:
  - with one another
  - against each other
  lexicon: BDAG
  rationale: 'In context with ἐγκαλείτωσαν, the reciprocal pronoun carries adversative
    legal force: each side should proceed against the other through proper channels.'
