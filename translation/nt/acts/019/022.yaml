id: ACT.19.22
reference: Acts 19:22
source:
  edition: SBLGNT
  text: ἀποστείλας δὲ εἰς τὴν Μακεδονίαν δύο τῶν διακονούντων αὐτῷ, Τιμόθεον καὶ Ἔραστον,
    αὐτὸς ἐπέσχεν χρόνον εἰς τὴν Ἀσίαν.
translation:
  text: So after sending into Macedonia two of those who were ministering to him—Timothy
    and Erastus—he himself stayed for a time in Asia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern
      continent.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποστείλας
  chosen: after sending
  alternatives:
  - having sent
  - sending
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered as antecedent
    action in English. 'After sending' makes the sequence clear and reads smoothly.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking
    strong contrast. 'So' gives natural English discourse flow.
- source_word: εἰς τὴν Μακεδονίαν
  chosen: into Macedonia
  alternatives:
  - to Macedonia
  lexicon: BDAG
  rationale: εἰς most basically means 'into.' With a destination region, English can
    use either 'into' or 'to'; 'into Macedonia' preserves the directional force slightly
    more closely.
- source_word: δύο τῶν διακονούντων αὐτῷ
  chosen: two of those who were ministering to him
  alternatives:
  - two of those serving him
  - two of his assistants
  lexicon: BDAG
  rationale: διακονέω denotes service/ministry. 'Ministering to him' preserves the
    verbal idea without overstating office. 'Assistants' is interpretive and less
    transparent to the Greek construction.
- source_word: Τιμόθεον καὶ Ἔραστον
  chosen: Timothy and Erastus
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in context, contrasting Paul with the
    two he sent. 'He himself' preserves that emphasis.
- source_word: ἐπέσχεν χρόνον
  chosen: stayed for a time
  alternatives:
  - remained for a while
  - delayed for some time
  lexicon: BDAG
  rationale: The idiom means to remain/stay for a period. 'Stayed for a time' is clear
    modern English and fits the narrative context.
- source_word: εἰς τὴν Ἀσίαν
  chosen: in Asia
  alternatives:
  - in the province of Asia
  - into Asia
  lexicon: BDAG
  rationale: 'Although εἰς literally means ''into,'' with ἐπέσχεν χρόνον the sense
    is locative: he remained in Asia. ''Asia'' here refers to the Roman province,
    but the shorter form is acceptable in the main text.'
