id: ACT.19.36
reference: Acts 19:36
source:
  edition: SBLGNT
  text: ἀναντιρρήτων οὖν ὄντων τούτων δέον ἐστὶν ὑμᾶς κατεσταλμένους ὑπάρχειν καὶ
    μηδὲν προπετὲς πράσσειν.
translation:
  text: Therefore, since these things are undeniable, it is necessary for you to remain
    calm and to do nothing rash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'indisputable' or 'beyond contradiction.'
    reason: lexical_alternative
  - marker: b
    text: Or 'be quiet' or 'stay composed' for 'remain calm.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do nothing reckless' or 'do nothing hasty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναντιρρήτων
  chosen: undeniable
  alternatives:
  - indisputable
  - beyond contradiction
  lexicon: BDAG
  rationale: 'The adjective means not open to contradiction or dispute. ''Undeniable''
    is natural modern English and preserves the force of the genitive absolute: the
    facts in question cannot reasonably be contested.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' best reflects
    the formal logical connection in the town clerk's speech.
- source_word: ὄντων τούτων
  chosen: since these things are
  alternatives:
  - these things being
  - because these things are
  lexicon: BDAG
  rationale: This genitive absolute gives the circumstance or basis for the exhortation.
    'Since these things are' renders the causal nuance idiomatically in English.
- source_word: δέον ἐστίν
  chosen: it is necessary
  alternatives:
  - it is proper
  - it is required
  lexicon: BDAG
  rationale: The impersonal expression conveys necessity or obligation. 'It is necessary'
    preserves the force without overformalizing.
- source_word: κατεσταλμένους ὑπάρχειν
  chosen: to remain calm
  alternatives:
  - to be quiet
  - to stay composed
  lexicon: BDAG
  rationale: The perfect participle of καταστέλλω with ὑπάρχειν describes a settled
    state of being calmed or composed. 'Remain calm' captures both the state and the
    exhortational context better than the more wooden 'be quiet,' which could imply
    mere silence.
- source_word: μηδὲν προπετὲς πράσσειν
  chosen: to do nothing rash
  alternatives:
  - to do nothing reckless
  - to do nothing hasty
  lexicon: BDAG
  rationale: προπετής denotes acting precipitously or rashly. The phrase is idiomatically
    rendered 'do nothing rash,' which preserves the warning against impulsive action.
