id: ACT.19.7
reference: Acts 19:7
source:
  edition: SBLGNT
  text: ἦσαν δὲ οἱ πάντες ἄνδρες ὡσεὶ ⸀δώδεκα.
translation:
  text: There were about twelve men in all.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦσαν
  chosen: There were
  alternatives:
  - they were
  lexicon: BDAG
  rationale: Impersonal existential English is the most natural rendering here. While
    the Greek verb is simply 'they were,' in context it introduces the number of persons
    present, so 'There were' communicates the sense clearly without adding content.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. In smooth modern English it is often left untranslated
    when it adds no strong contrast or sequence that must be marked.
- source_word: οἱ πάντες
  chosen: in all
  alternatives:
  - all
  - all of them
  lexicon: BDAG
  rationale: The article with πάντες functions substantivally, referring to the whole
    group. Rendering it with 'in all' fits idiomatic English when giving a total number
    and preserves the summarizing force.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - males
  - people
  lexicon: BDAG
  rationale: ἀνήρ specifically denotes adult males/men, not people in general. Per
    the gender-accurate philosophy, 'men' should be retained rather than neutralized.
- source_word: ὡσεὶ
  chosen: about
  alternatives:
  - approximately
  - some
  lexicon: BDAG
  rationale: ὡσεὶ marks approximation. 'About' is the clearest natural English equivalent
    in this numerical context.
- source_word: δώδεκα
  chosen: twelve
  lexicon: BDAG
  rationale: Straightforward cardinal number.
