id: ACT.19.25
reference: Acts 19:25
source:
  edition: SBLGNT
  text: οὓς συναθροίσας καὶ τοὺς περὶ τὰ τοιαῦτα ἐργάτας εἶπεν· Ἄνδρες, ἐπίστασθε
    ὅτι ἐκ ταύτης τῆς ἐργασίας ἡ εὐπορία ⸀ἡμῖν ἐστιν,
translation:
  text: After gathering them together, along with the workmen occupied with such things,
    he said, “Men, you know that from this business we have our prosperity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from this trade we derive our wealth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναθροίσας
  chosen: After gathering ... together
  alternatives:
  - having assembled
  - after bringing together
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered with
    temporal force in English. 'After gathering ... together' is idiomatic and preserves
    the sense of assembling a group.
- source_word: τοὺς περὶ τὰ τοιαῦτα ἐργάτας
  chosen: the workmen occupied with such things
  alternatives:
  - the craftsmen in such trades
  - the workers concerning such things
  lexicon: BDAG
  rationale: ἐργάτας is broadly 'workers/workmen'; in context these are artisans connected
    to the shrine-making trade. 'Workmen occupied with such things' stays close to
    the Greek without over-specifying beyond the text.
- source_word: Ἄνδρες
  chosen: Men
  alternatives:
  - Gentlemen
  lexicon: BDAG
  rationale: Vocative plural of ἀνήρ directly addresses the male associates present.
    Per gender-accurate philosophy, 'Men' best matches the source rather than a more
    idiomatic but less literal 'Gentlemen'.
- source_word: ἐπίστασθε
  chosen: you know
  alternatives:
  - you understand
  - you are aware
  lexicon: BDAG
  rationale: The verb denotes knowledge or understanding already possessed. 'You know'
    is the most natural and direct English equivalent here.
- source_word: ἐκ ταύτης τῆς ἐργασίας
  chosen: from this business
  alternatives:
  - from this trade
  - from this work
  lexicon: BDAG
  rationale: ἐργασία can mean work, trade, or business activity. In this commercial
    context, 'business' communicates the profit-making enterprise clearly in modern
    English.
- source_word: ἡ εὐπορία ἡμῖν ἐστιν
  chosen: we have our prosperity
  alternatives:
  - our wealth comes
  - our income comes
  - our prosperity is ours
  lexicon: BDAG
  rationale: εὐπορία refers to prosperity, wealth, or financial well-being. The Greek
    construction literally states that prosperity is to us/from this business; 'we
    have our prosperity' preserves the possessive/resultative sense without sounding
    wooden.
