id: ACT.19.12
reference: Acts 19:12
source:
  edition: SBLGNT
  text: ὥστε καὶ ἐπὶ τοὺς ἀσθενοῦντας ⸀ἀποφέρεσθαι ἀπὸ τοῦ χρωτὸς αὐτοῦ σουδάρια ἢ
    σιμικίνθια καὶ ἀπαλλάσσεσθαι ἀπ’ αὐτῶν τὰς νόσους, τά τε πνεύματα τὰ πονηρὰ ⸀ἐκπορεύεσθαι.
translation:
  text: so that even handkerchiefs or work aprons were carried away from his skin
    to the sick, and their diseases left them, and the evil spirits went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his body.' The Greek says more literally 'from his skin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'aprons.' The Greek term refers to work garments or aprons.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so that as a result
  lexicon: BDAG
  rationale: Introduces the result of the extraordinary miracles in the preceding
    verse; 'so that' is natural English and preserves the consecutive force.
- source_word: ἐπὶ τοὺς ἀσθενοῦντας
  chosen: to the sick
  alternatives:
  - upon the sick
  - to those who were sick
  lexicon: BDAG
  rationale: The participle ἀσθενοῦντας means 'those being sick/ill.' 'To the sick'
    is concise modern English and fits the motion implied by ἀποφέρεσθαι.
- source_word: ἀποφέρεσθαι
  chosen: were carried away
  alternatives:
  - were brought
  - were carried
  lexicon: BDAG
  rationale: The present infinitive in indirect/result construction describes the
    items being taken from Paul to the sick. 'Carried away' preserves the sense of
    movement from his person; 'brought' would shift perspective toward the recipients.
- source_word: ἀπὸ τοῦ χρωτὸς αὐτοῦ
  chosen: from his skin
  alternatives:
  - from his body
  - from his person
  lexicon: BDAG
  rationale: χρώς refers literally to the surface of the body, skin. 'From his skin'
    is more textually precise than the traditional broader 'from his body,' while
    still understandable in context.
- source_word: σουδάρια
  chosen: handkerchiefs
  alternatives:
  - face cloths
  - cloths
  lexicon: BDAG
  rationale: A loanword for cloths used for wiping sweat or the face. 'Handkerchiefs'
    is the most idiomatic equivalent in this context.
- source_word: σιμικίνθια
  chosen: work aprons
  alternatives:
  - aprons
  - work cloths
  lexicon: BDAG
  rationale: Refers to aprons or work garments associated with manual labor. 'Work
    aprons' clarifies the kind of item without over-paraphrasing.
- source_word: ἀπαλλάσσεσθαι
  chosen: left them
  alternatives:
  - departed from them
  - were removed from them
  lexicon: BDAG
  rationale: Used of release or removal. With νόσους as subject, 'their diseases left
    them' is natural English and preserves the idea that the illnesses departed.
- source_word: νόσους
  chosen: diseases
  alternatives:
  - sicknesses
  - illnesses
  lexicon: BDAG
  rationale: νόσος denotes disease or illness. 'Diseases' fits the plural and pairs
    well with 'left them'.
- source_word: πνεύματα τὰ πονηρά
  chosen: the evil spirits
  alternatives:
  - evil spirits
  - wicked spirits
  lexicon: BDAG
  rationale: Definite article plus adjective identifies a known class of hostile spiritual
    beings. 'The evil spirits' preserves the Greek definiteness.
- source_word: ἐκπορεύεσθαι
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: BDAG
  rationale: Common expression for spirits exiting possessed persons. 'Went out' is
    straightforward and idiomatic.
