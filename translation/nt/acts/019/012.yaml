theological_decisions:
- issue: Nature of the healing/exorcism mediated through cloths from Paul
  chosen_reading: Translate the event straightforwardly as narrated, without adding
    explanatory language about relics, sacramental mechanism, or superstition.
  alternative_readings:
  - Interpretive renderings that imply endorsement of relic-veneration
  - Interpretive renderings that downplay the miraculous event as merely symbolic
  rationale: The verse presents extraordinary miracles associated with items carried
    from Paul's skin to the sick. The translation should neither import later doctrinal
    practices nor rationalize away the supernatural claim; it should preserve Luke's
    narrative description plainly.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
