id: ACT.19.24
reference: Acts 19:24
source:
  edition: SBLGNT
  text: Δημήτριος γάρ τις ὀνόματι, ἀργυροκόπος, ποιῶν ναοὺς ἀργυροῦς Ἀρτέμιδος παρείχετο
    τοῖς τεχνίταις ⸂οὐκ ὀλίγην ἐργασίαν⸃,
translation:
  text: For a certain man named Demetrius, a silversmith who made silver shrines of
    Artemis, was providing the craftsmen with no small business.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver temples of Artemis' or 'silver models of the temple of Artemis.'
      The Greek uses naous ('shrines/temples'), likely referring to small crafted
      objects associated with Artemis worship.
    reason: lexical_alternative
  - marker: b
    text: Greek 'no small business,' a litotes meaning substantial trade or profit.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δημήτριος
  chosen: Demetrius
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: γάρ
  chosen: For
  alternatives:
  - Now
  - Indeed
  lexicon: BDAG
  rationale: Marks explanation/background for the preceding narrative; 'For' preserves
    the connective force more transparently than omitting it.
- source_word: τις
  chosen: a certain man
  alternatives:
  - a certain one
  - someone
  lexicon: BDAG
  rationale: Indefinite τις introduces a particular but previously unspecified person.
    'A certain man' is idiomatic and preserves the narrative introduction.
- source_word: ὀνόματι
  chosen: named
  alternatives:
  - by name
  lexicon: BDAG
  rationale: The dative idiom ὀνόματι naturally means 'named' in English.
- source_word: ἀργυροκόπος
  chosen: a silversmith
  alternatives:
  - silverworker
  lexicon: BDAG
  rationale: The noun denotes a worker in silver; 'silversmith' is the standard and
    natural English equivalent.
- source_word: ποιῶν
  chosen: who made
  alternatives:
  - making
  - manufacturing
  lexicon: BDAG
  rationale: The participle is contemporaneous and descriptive of Demetrius's trade.
    Rendering it as a relative clause gives clear English style while preserving the
    sense.
- source_word: ναοὺς ἀργυροῦς Ἀρτέμιδος
  chosen: silver shrines of Artemis
  alternatives:
  - silver temples of Artemis
  - silver models of the temple of Artemis
  lexicon: BDAG
  rationale: ναός literally means 'temple' or 'sanctuary,' but in this commercial
    context it refers to small crafted representations associated with Artemis worship.
    'Shrines' best conveys the likely sense in natural English without over-specifying
    their exact form.
- source_word: Ἀρτέμιδος
  chosen: Artemis
  alternatives:
  - Diana
  lexicon: BDAG
  rationale: Direct transliteration of the Greek divine name is preferred over the
    Roman equivalent 'Diana' because the source text is Greek and names are transliterated.
- source_word: παρείχετο
  chosen: was providing
  alternatives:
  - provided
  - brought
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing/customary action in past time. 'Was
    providing' captures the durative sense.
- source_word: τοῖς τεχνίταις
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the workmen
  lexicon: BDAG
  rationale: τεχνίταις refers to skilled workers in the trade. 'Craftsmen' is idiomatic
    and fits the economic context.
- source_word: οὐκ ὀλίγην ἐργασίαν
  chosen: no small business
  alternatives:
  - not a little income
  - no little work
  - considerable profit
  lexicon: BDAG
  rationale: The litotes οὐκ ὀλίγην means 'considerable' or 'substantial.' ἐργασία
    can denote business, gain, or work. 'No small business' preserves the Greek understatement
    while fitting the context of commercial activity.
