id: ACT.19.23
reference: Acts 19:23
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ κατὰ τὸν καιρὸν ἐκεῖνον τάραχος οὐκ ὀλίγος περὶ τῆς ὁδοῦ.
translation:
  text: Now at that time there arose no small disturbance concerning the Way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the way.' Here it refers to the Christian movement, a recurring designation
      in Acts.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: there arose
  alternatives:
  - there happened
  - there came about
  - there was
  lexicon: BDAG
  rationale: γίνομαι here introduces the occurrence of an event. 'There arose' is
    idiomatic English that preserves the eventive force better than the flatter 'there
    was,' while fitting the nominative subject τάραχος.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - ''
  lexicon: BDAG
  rationale: δέ functions as a mild discourse connector. 'Now' signals narrative progression
    in natural English without overstating contrast.
- source_word: κατὰ τὸν καιρὸν ἐκεῖνον
  chosen: at that time
  alternatives:
  - during that time
  - about that time
  lexicon: BDAG
  rationale: The phrase is a temporal expression meaning 'at/during that time.' 'At
    that time' is concise and natural, preserving the temporal reference without unnecessary
    expansion.
- source_word: τάραχος
  chosen: disturbance
  alternatives:
  - uproar
  - commotion
  - riot
  lexicon: BDAG
  rationale: τάραχος denotes turmoil or disorder. 'Disturbance' is broad enough to
    fit the immediate statement without importing the more specific legal or mob nuance
    of 'riot' before the narrative develops it. 'Uproar' is possible, but 'disturbance'
    better matches optimal equivalence here.
- source_word: οὐκ ὀλίγος
  chosen: no small
  alternatives:
  - considerable
  - not a little
  - great
  lexicon: BDAG
  rationale: This litotes is best preserved in English as 'no small,' which reflects
    Luke's rhetorical style more closely than smoothing it to 'considerable' or 'great.'
- source_word: περὶ
  chosen: concerning
  alternatives:
  - about
  - regarding
  - over
  lexicon: BDAG
  rationale: περί with the genitive marks the matter under discussion. 'Concerning'
    is slightly more formal but clear and precise in narrative prose.
- source_word: τῆς ὁδοῦ
  chosen: the Way
  alternatives:
  - the way
  lexicon: BDAG
  rationale: In Acts, ἡ ὁδός functions as a recognized designation for the Christian
    movement, so capitalization is warranted in English to mark it as a title-like
    expression rather than a generic path.
