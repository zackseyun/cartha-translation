theological_decisions:
- issue: Rendering κύριος in the christological phrase τοῦ κυρίου Ἰησοῦ
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance specifies κύριος → 'Lord' as the default. In Acts
    this title carries both honorific and theological weight, and 'Lord Jesus' is
    the established and accurate rendering here.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to make demonic possession explicit in τοὺς ἔχοντας τὰ πνεύματα τὰ
    πονηρά
  chosen_reading: those who had evil spirits
  alternative_readings:
  - those possessed by evil spirits
  rationale: The Greek says literally 'those having evil spirits.' While possession
    is likely the sense in context, the translation preserves the source wording's
    level of explicitness rather than importing a stronger doctrinal or phenomenological
    description.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    never import doctrinal claims the text does not make'
