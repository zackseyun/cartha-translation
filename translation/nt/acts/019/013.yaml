id: ACT.19.13
reference: Acts 19:13
source:
  edition: SBLGNT
  text: ἐπεχείρησαν δέ τινες ⸀καὶ τῶν περιερχομένων Ἰουδαίων ἐξορκιστῶν ὀνομάζειν
    ἐπὶ τοὺς ἔχοντας τὰ πνεύματα τὰ πονηρὰ τὸ ὄνομα τοῦ κυρίου Ἰησοῦ λέγοντες· ⸀Ὁρκίζω
    ὑμᾶς τὸν Ἰησοῦν ⸀ὃν Παῦλος κηρύσσει.
translation:
  text: But some also of the itinerant Jewish exorcists attempted to invoke the name
    of the Lord Jesus over those who had evil spirits, saying, “I adjure you by Jesus,
    whom Paul proclaims.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “some even of the traveling Jewish exorcists.”
    reason: lexical_alternative
  - marker: b
    text: Literally “those having evil spirits”; that is, people under the influence
      of evil spirits.
    reason: lexical_alternative
  - marker: c
    text: Or “I put you under oath by Jesus” or “I solemnly charge you by Jesus.”
    reason: lexical_alternative
  - marker: d
    text: Or “whom Paul preaches.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεχείρησαν
  chosen: attempted
  alternatives:
  - undertook
  - tried
  lexicon: BDAG
  rationale: Aorist indicative of ἐπιχειρέω conveys making an attempt or undertaking
    an action. 'Attempted' is natural modern English and preserves the sense that
    the action was ventured, not necessarily successful.
- source_word: τινες καὶ τῶν περιερχομένων Ἰουδαίων ἐξορκιστῶν
  chosen: some also of the itinerant Jewish exorcists
  alternatives:
  - some even of the traveling Jewish exorcists
  - some of the wandering Jewish exorcists as well
  lexicon: BDAG
  rationale: τινες gives 'some'; καὶ here adds 'also/even'; περιερχομένων denotes
    those going about from place to place, hence 'itinerant' or 'traveling.' 'Itinerant'
    preserves the slightly technical sense without paraphrase. Ἰουδαίων is rendered
    'Jewish' adjectivally, and ἐξορκιστῶν as 'exorcists.'
- source_word: ὀνομάζειν ἐπὶ ... τὸ ὄνομα
  chosen: to invoke the name ... over
  alternatives:
  - to name ... over
  - to call upon the name ... over
  lexicon: BDAG
  rationale: The infinitive ὀνομάζειν with τὸ ὄνομα and ἐπί in this context refers
    not merely to pronouncing a name but to invoking it in an exorcistic formula.
    'Invoke the name' best captures the idiomatic force while remaining close to the
    Greek.
- source_word: τοὺς ἔχοντας τὰ πνεύματα τὰ πονηρά
  chosen: those who had evil spirits
  alternatives:
  - those possessed by evil spirits
  - those having evil spirits
  lexicon: BDAG
  rationale: Literally 'those having the evil spirits.' English idiom favors 'those
    who had evil spirits.' 'Possessed by' is interpretive and slightly stronger than
    the Greek wording, so it is not used in the main text.
- source_word: τὰ πνεύματα τὰ πονηρά
  chosen: evil spirits
  alternatives:
  - wicked spirits
  lexicon: BDAG
  rationale: πονηρά commonly means 'evil' in moral/spiritual contexts. 'Evil spirits'
    is standard, clear, and contextually appropriate.
- source_word: τὸ ὄνομα τοῦ κυρίου Ἰησοῦ
  chosen: the name of the Lord Jesus
  alternatives:
  - the name of Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default. The genitival phrase
    is naturally expressed in English as 'the name of the Lord Jesus.'
- source_word: Ὁρκίζω ὑμᾶς
  chosen: I adjure you
  alternatives:
  - I put you under oath
  - I command you by oath
  lexicon: BDAG
  rationale: ὁρκίζω in exorcistic usage means to bind by an oath or solemnly charge.
    Addressed to spirits, 'I adjure you' is the most precise and idiomatic rendering
    in English, preserving the formal exorcistic tone better than the more wooden
    alternatives.
- source_word: τὸν Ἰησοῦν ὃν Παῦλος κηρύσσει
  chosen: by Jesus, whom Paul proclaims
  alternatives:
  - Jesus, whom Paul preaches
  - by the Jesus whom Paul proclaims
  lexicon: BDAG
  rationale: After ὁρκίζω, the accusative can express the one by whom the adjuration
    is made; thus 'by Jesus' is the natural English sense. κηρύσσει is 'proclaims/preaches';
    'proclaims' is chosen as slightly broader and less church-specific while still
    accurate. The relative clause identifies Jesus as the one Paul is publicly heralding.
