id: ACT.19.14
reference: Acts 19:14
source:
  edition: SBLGNT
  text: ἦσαν δέ ⸀τινος Σκευᾶ Ἰουδαίου ἀρχιερέως ἑπτὰ ⸀υἱοὶ τοῦτο ποιοῦντες.
translation:
  text: Now there were seven sons of a Jewish chief priest named Sceva doing this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'high priest.' The Greek term can refer either to the high priest or
      more broadly to a chief priest/high-priestly figure.
    reason: alternative_reading
lexical_decisions:
- source_word: ἦσαν δέ
  chosen: Now there were
  alternatives:
  - And there were
  - But there were
  lexicon: BDAG
  rationale: Renders the imperfect of εἰμί with δέ as scene-setting narrative continuation.
    'Now' gives natural English discourse flow without overstating contrast.
- source_word: τινος Σκευᾶ
  chosen: of a ... named Sceva
  alternatives:
  - of a certain Sceva
  - of someone named Sceva
  lexicon: BDAG
  rationale: The genitive τινος with the proper name introduces an otherwise unspecified
    individual. English idiom is smoother with 'named Sceva' rather than the more
    wooden 'a certain Sceva,' while preserving the indefiniteness with 'a.'
- source_word: Ἰουδαίου
  chosen: Jewish
  alternatives:
  - Judean
  lexicon: BDAG
  rationale: In Acts, Ἰουδαῖος commonly denotes ethnic-religious identity rather than
    strictly geographic origin. 'Jewish' best fits the context here.
- source_word: ἀρχιερέως
  chosen: chief priest
  alternatives:
  - high priest
  lexicon: BDAG
  rationale: ἀρχιερεύς can mean 'high priest' or more broadly a member of the high-priestly
    class/chief priest. Since Sceva is not otherwise known as the Jerusalem high priest,
    'chief priest' avoids implying he held the singular official office while still
    reflecting the Greek term.
- source_word: ἑπτὰ υἱοὶ
  chosen: seven sons
  lexicon: BDAG
  rationale: Straightforward rendering of the numeral plus noun; preserves the familial
    designation in natural English order.
- source_word: τοῦτο ποιοῦντες
  chosen: doing this
  alternatives:
  - practicing this
  - doing these things
  lexicon: BDAG
  rationale: The present participle describes their ongoing action in the immediately
    preceding context. 'Doing this' is the most direct and idiomatic rendering of
    the singular demonstrative τοῦτο.
