theological_decisions:
- issue: Meaning of ἀρχιερεύς with reference to Sceva
  chosen_reading: Rendered as 'chief priest' rather than 'high priest'
  alternative_readings:
  - high priest
  rationale: The Greek term often refers to the high priest, but in some contexts
    can denote chief priests or members of the high-priestly class. Because the historical
    Sceva is otherwise unattested as the singular Jewish high priest, 'chief priest'
    better preserves the likely sense without importing a potentially misleading institutional
    claim.
  doctrine_reference: Translation philosophy §1, §5
