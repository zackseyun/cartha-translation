id: ACT.19.1
reference: Acts 19:1
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν τῷ τὸν Ἀπολλῶ εἶναι ἐν Κορίνθῳ Παῦλον διελθόντα τὰ ἀνωτερικὰ
    μέρη ⸀ἐλθεῖν εἰς Ἔφεσον καὶ ⸀εὑρεῖν τινας μαθητάς,
translation:
  text: Now it happened that while Apollos was in Corinth, Paul passed through the
    inland regions and came to Ephesus and found some disciples,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the upper regions' or 'the interior regions'; the phrase likely refers
      to the inland route through the higher country rather than the coastal road.
    reason: lexical_alternative
  - marker: b
    text: '''Disciples'' is left unspecified here; the following verses indicate that
      these were associated with John''s baptism.'
    reason: cross_reference
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now it happened that
  alternatives:
  - And it happened that
  - It happened that
  - Now it came about that
  lexicon: BDAG
  rationale: Ἐγένετο as a narrative transition formula is commonly rendered 'it happened'
    or 'it came about.' Including 'Now' for δέ preserves the discourse shift without
    overtranslating. This keeps Luke's narrative style while remaining natural English.
- source_word: ἐν τῷ τὸν Ἀπολλῶ εἶναι ἐν Κορίνθῳ
  chosen: while Apollos was in Corinth
  alternatives:
  - during Apollos's being in Corinth
  - when Apollos was in Corinth
  lexicon: BDAG
  rationale: The articular infinitive construction with ἐν τῷ expresses contemporaneous
    time. 'While Apollos was in Corinth' is idiomatic English that accurately conveys
    the temporal sense.
- source_word: διελθόντα
  chosen: passed through
  alternatives:
  - having gone through
  - traveled through
  lexicon: BDAG
  rationale: The aorist participle from διέρχομαι denotes movement through an area
    prior to the main verb. 'Passed through' is concise and natural, preserving the
    sequential participial force.
- source_word: τὰ ἀνωτερικὰ μέρη
  chosen: the inland regions
  alternatives:
  - the upper regions
  - the interior regions
  - the higher districts
  lexicon: BDAG
  rationale: ἀνωτερικός literally means 'upper,' but geographically here it refers
    to the interior/upland route as opposed to the coastal route. 'Inland regions'
    communicates the likely geographical sense in clear modern English.
- source_word: ἐλθεῖν εἰς Ἔφεσον
  chosen: came to Ephesus
  alternatives:
  - to come to Ephesus
  - arrived at Ephesus
  lexicon: BDAG
  rationale: The infinitive depends on Ἐγένετο with Paul as the understood subject.
    'Came to Ephesus' is straightforward and preserves the motion toward the city.
- source_word: καὶ εὑρεῖν
  chosen: and found
  alternatives:
  - and to find
  lexicon: BDAG
  rationale: The coordinated infinitive continues the result/content of the narrative
    formula. Finite English 'and found' is the most natural rendering in sequence
    with 'came.'
- source_word: τινας μαθητάς
  chosen: some disciples
  alternatives:
  - certain disciples
  - some followers
  lexicon: BDAG
  rationale: τινας is indefinite, best rendered 'some.' μαθητάς is consistently 'disciples';
    'followers' is possible but less precise and less consistent with NT usage.
