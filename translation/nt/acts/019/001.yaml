theological_decisions:
- issue: Identity of μαθητάς in context
  chosen_reading: Render neutrally as 'disciples' without specifying 'disciples of
    Jesus' in the main text.
  alternative_readings:
  - some disciples of John
  - some disciples [of Jesus]
  rationale: The immediate context (vv. 2–3) clarifies that these men had received
    John's baptism and lacked knowledge of the Holy Spirit. The Greek here simply
    says 'some disciples,' so the translation should not import a more specific identification
    before Luke supplies it.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
