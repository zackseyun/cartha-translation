theological_decisions:
- issue: Object of πείθων is implicit rather than explicit in Greek
  chosen_reading: 'Included ''them'' in English: ''persuading them about the kingdom
    of God'''
  alternative_readings:
  - '''persuading about the kingdom of God'''
  rationale: English normally requires an object for 'persuading,' and the implied
    audience is the synagogue hearers. Supplying 'them' clarifies the sense without
    adding new content beyond what the context plainly implies.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: βασιλεία τοῦ θεοῦ
  chosen_reading: kingdom of God
  alternative_readings:
  - reign of God
  - rule of God
  rationale: While βασιλεία can denote reign/rule as well as kingdom, 'kingdom of
    God' is both accurate and the most recognizable rendering in this context. No
    doctrinal tension requires an alternative in the main text here.
  doctrine_reference: 'Translation philosophy: consistency of key terms'
