id: ACT.19.8
reference: Acts 19:8
source:
  edition: SBLGNT
  text: Εἰσελθὼν δὲ εἰς τὴν συναγωγὴν ἐπαρρησιάζετο ἐπὶ μῆνας τρεῖς διαλεγόμενος καὶ
    ⸀πείθων περὶ τῆς βασιλείας τοῦ θεοῦ.
translation:
  text: And entering the synagogue, he spoke boldly for three months, reasoning and
    persuading them about the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning the kingdom of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'reasoning and trying to persuade them about the kingdom of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσελθὼν
  chosen: entering
  alternatives:
  - having entered
  - after entering
  lexicon: BDAG
  rationale: Aorist participle of εἰσέρχομαι, used adverbially to set the circumstance
    before the main verb. 'Entering' is natural English and preserves the participial
    linkage without overcomplicating the sentence.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is simple, readable, and sufficient in context.
- source_word: συναγωγήν
  chosen: synagogue
  alternatives:
  - meeting place
  lexicon: BDAG
  rationale: The term specifically refers to the Jewish synagogue, so the established
    and precise English term should be retained.
- source_word: ἐπαρρησιάζετο
  chosen: he spoke boldly
  alternatives:
  - he was speaking boldly
  - he spoke freely
  lexicon: BDAG
  rationale: Imperfect middle of παρρησιάζομαι conveys ongoing bold, open speech.
    'He spoke boldly' communicates the sense clearly in idiomatic English; the durative
    force is also supported by 'for three months.'
- source_word: ἐπὶ μῆνας τρεῖς
  chosen: for three months
  alternatives:
  - during three months
  lexicon: BDAG
  rationale: ἐπί with an accusative of duration is naturally rendered 'for three months.'
- source_word: διαλεγόμενος
  chosen: reasoning
  alternatives:
  - discussing
  - arguing
  lexicon: BDAG
  rationale: The participle suggests discourse involving explanation and argument.
    'Reasoning' fits Luke's usage in Acts and preserves the intellectual, dialogical
    sense without sounding overly combative.
- source_word: πείθων
  chosen: persuading them
  alternatives:
  - trying to persuade them
  - convincing them
  lexicon: BDAG
  rationale: The participle denotes active effort to persuade. 'Persuading them' makes
    explicit the implied object from context and reads naturally in English. 'Trying
    to persuade' would overstate uncertainty not required by the Greek.
- source_word: περὶ τῆς βασιλείας τοῦ θεοῦ
  chosen: about the kingdom of God
  alternatives:
  - concerning the kingdom of God
  lexicon: BDAG
  rationale: περί with the genitive is straightforwardly 'about/concerning.' 'Kingdom
    of God' is the standard and accurate rendering of βασιλεία τοῦ θεοῦ, preserving
    the theological phrase used throughout the New Testament.
