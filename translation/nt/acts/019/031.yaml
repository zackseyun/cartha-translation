id: ACT.19.31
reference: Acts 19:31
source:
  edition: SBLGNT
  text: τινὲς δὲ καὶ τῶν Ἀσιαρχῶν, ὄντες αὐτῷ φίλοι, πέμψαντες πρὸς αὐτὸν παρεκάλουν
    μὴ δοῦναι ἑαυτὸν εἰς τὸ θέατρον.
translation:
  text: And even some of the Asiarchs, being his friends, sent word to him and urged
    him not to give himself up to the theater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "sent a message to him."
    reason: lexical_alternative
  - marker: b
    text: '"Asiarchs" were prominent officials associated with the Roman province
      of Asia.'
    reason: cultural_note
  - marker: c
    text: Or "not to present himself in the theater" or "not to go into the theater."
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset; 'some' is natural
    modern English and preserves the indefiniteness.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: Here δέ marks continuation with mild contrast/addition. 'And' best fits
    the narrative flow in English without overstating contrast.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - too
  lexicon: BDAG
  rationale: καί adds emphasis to the surprising fact that members of this prominent
    group were favorable to Paul. 'Even' captures that nuance better than a flat 'also'.
- source_word: Ἀσιαρχῶν
  chosen: Asiarchs
  alternatives:
  - officials of Asia
  - provincial leaders of Asia
  lexicon: BDAG
  rationale: Ἀσιάρχης is a specific title for leading provincial officials connected
    with the Roman province of Asia. Transliteration preserves the technical title
    more accurately than a potentially flattening paraphrase.
- source_word: ὄντες αὐτῷ φίλοι
  chosen: being his friends
  alternatives:
  - who were friendly to him
  - as his friends
  lexicon: BDAG
  rationale: The participial phrase gives background description. 'Being his friends'
    is concise and preserves the relational sense of φίλοι with the dative αὐτῷ.
- source_word: πέμψαντες πρὸς αὐτὸν
  chosen: sent word to him
  alternatives:
  - having sent to him
  - sending to him
  - sent a message to him
  lexicon: BDAG
  rationale: The aorist participle indicates prior attendant action before the main
    verb. In context the object of sending is implicit, so idiomatic English supplies
    'word' or 'a message.' 'Sent word to him' is natural and faithful.
- source_word: παρεκάλουν
  chosen: urged
  alternatives:
  - kept urging
  - begged
  - appealed to
  lexicon: BDAG
  rationale: παρακαλέω here conveys earnest exhortation. The imperfect suggests ongoing
    or repeated action, but English often expresses this naturally with a simple past
    in narrative. 'Urged' captures the force without overtranslation.
- source_word: μὴ δοῦναι ἑαυτὸν
  chosen: not to give himself up
  alternatives:
  - not to present himself
  - not to hand himself over
  lexicon: BDAG
  rationale: The idiom δοῦναι ἑαυτόν in this context means to place oneself into a
    dangerous situation or into others' hands. 'Give himself up' communicates voluntary
    exposure to danger more clearly than the more wooden 'give himself.'
- source_word: εἰς τὸ θέατρον
  chosen: to the theater
  alternatives:
  - into the theater
  lexicon: BDAG
  rationale: εἰς can be rendered 'into,' but with motion toward a public venue in
    idiomatic English, 'to the theater' reads more naturally while preserving the
    sense of intended entry.
