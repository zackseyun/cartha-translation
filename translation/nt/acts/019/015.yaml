theological_decisions:
- issue: Rendering the distinction between γινώσκω and ἐπίσταμαι in the demon's speech
  chosen_reading: 'Different English verbs: ''Jesus I know, and Paul I recognize'''
  alternative_readings:
  - '''Jesus I know, and Paul I know about'''
  - '''Jesus I know, and Paul I am acquainted with'''
  - '''Jesus I know, and Paul I know'''
  rationale: The Greek uses two different verbs, likely for rhetorical effect. Rendering
    both as 'know' is possible but obscures the lexical distinction. 'Recognize' preserves
    a meaningful difference without over-interpreting the theology of the spirit's
    knowledge. The verse does not require a doctrinal claim about degrees of demonic
    knowledge beyond the contrast stated.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception); §6 (Readable modern English, not archaic or academic)
