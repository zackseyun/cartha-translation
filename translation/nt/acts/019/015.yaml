id: ACT.19.15
reference: Acts 19:15
source:
  edition: SBLGNT
  text: ἀποκριθὲν δὲ τὸ πνεῦμα τὸ πονηρὸν εἶπεν ⸀αὐτοῖς· ⸀Τὸν Ἰησοῦν γινώσκω καὶ τὸν
    Παῦλον ἐπίσταμαι, ὑμεῖς δὲ τίνες ἐστέ;
translation:
  text: But the evil spirit answered them, “Jesus I know, and Paul I recognize—but
    who are you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Jesus I know, and Paul I know about.'' The Greek uses two different
      verbs: γινώσκω (''know'') and ἐπίσταμαι, which may suggest a distinction in
      nuance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθὲν
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι used idiomatically with εἶπεν to introduce
    speech. English commonly renders the participle + finite verb construction as
    a simple speech introduction, 'answered,' which is natural and preserves the responsive
    force.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best captures the adversative
    turn here as the narrative shifts from the exorcists' attempt to the spirit's
    response.
- source_word: τὸ πνεῦμα τὸ πονηρόν
  chosen: the evil spirit
  alternatives:
  - the wicked spirit
  lexicon: BDAG
  rationale: πνεῦμα here refers to a personal spiritual being, and πονηρός in this
    context is best rendered 'evil.' 'Evil spirit' is standard, clear modern English
    and fits Luke's usage.
- source_word: εἶπεν αὐτοῖς
  chosen: answered them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Combined with ἀποκριθέν, the clause is best rendered smoothly as 'answered
    them.' This avoids wooden duplication ('answering... said') while preserving the
    addressees with 'them.'
- source_word: Τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated per project philosophy. Fronting in Greek
    gives emphasis; English preserves this naturally by placing 'Jesus' first in the
    quoted clause.
- source_word: γινώσκω
  chosen: I know
  alternatives:
  - I am acquainted with
  lexicon: BDAG
  rationale: γινώσκω commonly denotes knowing or being acquainted with. 'I know' is
    the most direct and idiomatic rendering here.
- source_word: τὸν Παῦλον
  chosen: Paul
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: ἐπίσταμαι
  chosen: I recognize
  alternatives:
  - I know
  - I am acquainted with
  - I know about
  lexicon: BDAG
  rationale: Luke uses a different verb from γινώσκω, so the English should reflect
    some distinction if possible. 'I recognize' preserves a nuance of being informed
    about or acknowledging Paul without flattening both verbs into the same English
    gloss. This also highlights the rhetorical contrast in the spirit's statement.
- source_word: ὑμεῖς δὲ
  chosen: but who are you
  alternatives:
  - and you, who are you
  - but you—who are you
  lexicon: BDAG
  rationale: ὑμεῖς is emphatic, and δέ marks contrast with Jesus and Paul. English
    can convey this with 'but' and word order; an em dash is optional but not necessary
    in the main text.
- source_word: τίνες ἐστέ
  chosen: who are you
  alternatives:
  - who might you be
  lexicon: BDAG
  rationale: τίνες asks for identity in the plural. Since English 'you' can be singular
    or plural, the plural is inferred from context ('them'). 'Who are you?' is the
    most natural rendering.
