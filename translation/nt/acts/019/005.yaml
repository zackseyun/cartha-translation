theological_decisions:
- issue: Baptismal formula wording
  chosen_reading: into the name of the Lord Jesus
  alternative_readings:
  - in the name of the Lord Jesus
  rationale: The Greek uses εἰς τὸ ὄνομα, which is more literally 'into the name.'
    This avoids importing later doctrinal or liturgical harmonization and preserves
    Luke's wording as given. The alternative traditional rendering is preserved in
    a footnote because it is familiar and idiomatic in English.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: κύριος →
    Lord'
