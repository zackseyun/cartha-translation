id: ACT.19.5
reference: Acts 19:5
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ ἐβαπτίσθησαν εἰς τὸ ὄνομα τοῦ κυρίου Ἰησοῦ·
translation:
  text: And when they heard this, they were baptized into the name of the Lord Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in the name of the Lord Jesus.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω, functioning temporally in context. 'When
    they heard this' gives clear English sense and supplies the implied object from
    the preceding discourse, which is necessary in idiomatic English though not repeated
    in Greek.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' best carries the narrative progression
    without implying strong contrast. An untranslated option is possible in English,
    but a light connective preserves the flow.
- source_word: ἐβαπτίσθησαν
  chosen: they were baptized
  alternatives:
  - they got baptized
  lexicon: BDAG
  rationale: Aorist passive indicative of βαπτίζω. The passive should be preserved
    in translation. 'They were baptized' is both natural and formally faithful.
- source_word: εἰς τὸ ὄνομα
  chosen: into the name
  alternatives:
  - in the name
  - upon the name
  lexicon: BDAG
  rationale: The preposition εἰς most naturally means 'into,' and retaining it preserves
    the directional/associative force of incorporation or identification. 'In the
    name' is traditional English, but 'into the name' more closely reflects the Greek
    construction here.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' In this christological
    context it functions as the title of Jesus, not merely 'master.'
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Ἰησοῦς in the genitive
    form.
