id: ACT.19.17
reference: Acts 19:17
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἐγένετο γνωστὸν πᾶσιν Ἰουδαίοις τε καὶ Ἕλλησιν τοῖς κατοικοῦσιν τὴν
    Ἔφεσον, καὶ ⸀ἐπέπεσεν φόβος ἐπὶ πάντας αὐτούς, καὶ ἐμεγαλύνετο τὸ ὄνομα τοῦ κυρίου
    Ἰησοῦ.
translation:
  text: And this became known to all the Jews and Greeks living in Ephesus, and fear
    fell upon them all, and the name of the Lord Jesus was being magnified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fear came upon them all.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the name of the Lord Jesus was exalted' or 'was held in high honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - these things
  - it
  lexicon: BDAG
  rationale: Demonstrative singular referring back to the preceding incident; 'this'
    is the most natural and sufficiently specific English rendering.
- source_word: ἐγένετο γνωστὸν
  chosen: became known
  alternatives:
  - was made known
  - came to be known
  lexicon: BDAG
  rationale: The idiom γίνομαι + adjective naturally means 'become known' rather than
    a more wooden 'came to be known.' This preserves the inceptive sense.
- source_word: πᾶσιν Ἰουδαίοις τε καὶ Ἕλλησιν
  chosen: to all the Jews and Greeks
  alternatives:
  - to all Jews and Greeks
  lexicon: BDAG
  rationale: The dative with γνωστόν marks those to whom the matter became known.
    Including the articles in English ('the Jews and Greeks') reflects the identifiable
    groups in Ephesus without overtranslating.
- source_word: τοῖς κατοικοῦσιν τὴν Ἔφεσον
  chosen: living in Ephesus
  alternatives:
  - dwelling in Ephesus
  - residing in Ephesus
  lexicon: BDAG
  rationale: κατοικέω denotes residing or living in a place. 'Living in Ephesus' is
    idiomatic modern English and captures the participial modifier of both Jews and
    Greeks.
- source_word: ἐπέπεσεν φόβος ἐπὶ πάντας αὐτούς
  chosen: fear fell upon them all
  alternatives:
  - fear came upon them all
  - terror fell on them all
  lexicon: BDAG
  rationale: This is a common biblical idiom. 'Fear fell upon' preserves the vivid
    metaphor of ἐπιπίπτω while remaining clear in English. 'Them all' reflects πάντας
    αὐτούς naturally.
- source_word: φόβος
  chosen: fear
  alternatives:
  - awe
  - terror
  lexicon: BDAG
  rationale: φόβος can denote fear, awe, or alarm depending on context. Here the immediate
    response to a public display of spiritual power supports 'fear' as the broadest
    and least interpretively loaded rendering.
- source_word: ἐμεγαλύνετο
  chosen: was being magnified
  alternatives:
  - was exalted
  - was extolled
  - was held in high honor
  lexicon: BDAG
  rationale: The imperfect passive indicates an ongoing/resultative public honoring.
    'Was being magnified' preserves the verbal imagery and aspect better than the
    more interpretive 'was highly honored.'
- source_word: τὸ ὄνομα
  chosen: the name
  alternatives:
  - the reputation
  lexicon: BDAG
  rationale: In biblical usage 'name' can imply reputation, authority, or honor, but
    the text explicitly says 'the name.' Retaining it preserves the theological and
    literary resonance.
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - of Lord Jesus
  lexicon: BDAG
  rationale: 'κύριος is rendered ''Lord'' per the project''s default for Kyrios. The
    genitive depends on ''name'': ''the name of the Lord Jesus.'''
