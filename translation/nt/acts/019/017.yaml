theological_decisions:
- issue: Rendering κύριος in reference to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this context it functions as a christological title and should be translated
    rather than paraphrased.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Whether to render τὸ ὄνομα idiomatically as 'reputation' or literally as
    'name'
  chosen_reading: the name of the Lord Jesus was being magnified
  alternative_readings:
  - the reputation of the Lord Jesus was being exalted
  rationale: Retaining 'name' preserves the biblical-theological weight of the expression
    without importing a narrower modern concept. The context concerns public honor
    attached to Jesus' person and authority.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
