theological_decisions:
- issue: Rendering Paul's anti-idol statement without importing broader metaphysical
    claims
  chosen_reading: gods made by hands are not gods
  alternative_readings:
  - handmade gods are not really gods
  - things made by human hands are not gods
  rationale: The Greek directly denies the divine status of manufactured idols. The
    translation preserves the polemical force while avoiding added wording such as
    'really' unless supplied in a footnote-worthy alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing doctrinal claims the text does not make.'
