id: ACT.19.26
reference: Acts 19:26
source:
  edition: SBLGNT
  text: καὶ θεωρεῖτε καὶ ἀκούετε ὅτι οὐ μόνον Ἐφέσου ἀλλὰ σχεδὸν πάσης τῆς Ἀσίας ὁ
    Παῦλος οὗτος πείσας μετέστησεν ἱκανὸν ὄχλον, λέγων ὅτι οὐκ εἰσὶν θεοὶ οἱ διὰ χειρῶν
    γινόμενοι.
translation:
  text: And you see and hear that not only in Ephesus but in almost all of Asia, this
    Paul has persuaded and turned away a considerable crowd, saying that gods made
    by hands are not gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'are no gods.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the ones coming into being through hands,' an idiom for idols
      made by human craftsmanship.
    reason: cultural_note
lexical_decisions:
- source_word: θεωρεῖτε
  chosen: you see
  alternatives:
  - you observe
  - you behold
  lexicon: BDAG
  rationale: 'Present indicative, paired with ἀκούετε for rhetorical immediacy: Demetrius
    appeals to what his hearers are presently perceiving. ''See'' is natural and direct.'
- source_word: ἀκούετε
  chosen: hear
  alternatives:
  - are hearing
  - listen to
  lexicon: BDAG
  rationale: Kept coordinate with 'see' to preserve the double appeal to public evidence.
    English supplies 'you' once in the full clause.
- source_word: οὐ μόνον Ἐφέσου ἀλλὰ σχεδὸν πάσης τῆς Ἀσίας
  chosen: not only in Ephesus but in almost all of Asia
  alternatives:
  - not only of Ephesus but of nearly all Asia
  - not only here in Ephesus but in almost all Asia
  lexicon: BDAG
  rationale: The genitive after μόνον/ἀλλά is idiomatic in this construction and is
    best represented in English with an understood locative sense, 'in Ephesus ...
    in Asia.' 'Almost' renders σχεδόν naturally.
- source_word: ὁ Παῦλος οὗτος
  chosen: this Paul
  alternatives:
  - this fellow Paul
  - Paul here
  lexicon: BDAG
  rationale: Preserves the demonstrative's dismissive/deprecatory force in Demetrius's
    speech without adding excessive paraphrase.
- source_word: πείσας
  chosen: has persuaded
  alternatives:
  - having persuaded
  - won over
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, expressing means or attendant
    action. In idiomatic English, 'has persuaded and turned away' captures the sequence
    and rhetorical accusation.
- source_word: μετέστησεν
  chosen: turned away
  alternatives:
  - misled
  - moved
  - caused to change sides
  lexicon: BDAG
  rationale: The verb conveys causing a change from one position to another. In this
    context of abandoning idol worship, 'turned away' best fits without overinterpreting
    as merely intellectual deception. 'Misled' is possible but more interpretive.
- source_word: ἱκανὸν ὄχλον
  chosen: a considerable crowd
  alternatives:
  - a large crowd
  - a substantial multitude
  lexicon: BDAG
  rationale: ἱκανός here denotes size/extent sufficient to matter. 'Considerable crowd'
    preserves the sense of significant numbers in readable English.
- source_word: λέγων ὅτι
  chosen: saying that
  alternatives:
  - by saying that
  - because he says that
  lexicon: BDAG
  rationale: Straightforward participial speech introduction; 'saying that' preserves
    the Greek structure.
- source_word: οὐκ εἰσὶν θεοὶ
  chosen: are not gods
  alternatives:
  - are no gods
  lexicon: BDAG
  rationale: '''Are not gods'' is clear modern English and preserves the predicative
    force. ''Are no gods'' is traditional but slightly less natural.'
- source_word: οἱ διὰ χειρῶν γινόμενοι
  chosen: made by hands
  alternatives:
  - made with hands
  - manufactured by human hands
  lexicon: BDAG
  rationale: This idiom refers to idols produced by human craftsmanship. 'Made by
    hands' is concise and natural; it preserves the human-made contrast without overexpanding.
    The article-participle construction is represented attributively with 'gods.'
