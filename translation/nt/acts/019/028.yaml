theological_decisions:
- issue: Rendering a pagan acclamation without importing theological endorsement
  chosen_reading: Great is Artemis of the Ephesians!
  alternative_readings:
  - Artemis of the Ephesians is great!
  rationale: The translation preserves the crowd's chant as reported speech without
    softening its idolatrous content or reshaping it into a less direct statement.
    No doctrinal tension from the Christian translator is introduced into the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
