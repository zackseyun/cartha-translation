id: ACT.19.28
reference: Acts 19:28
source:
  edition: SBLGNT
  text: Ἀκούσαντες δὲ καὶ γενόμενοι πλήρεις θυμοῦ ἔκραζον λέγοντες· Μεγάλη ἡ Ἄρτεμις
    Ἐφεσίων.
translation:
  text: When they heard this and became full of غضب, they were crying out, saying,
    “Great is Artemis of the Ephesians!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “became full of anger,” “were filled with rage,” or “became furious.”
      The Greek expression is literally “became full of θυμός,” denoting intense anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: When they heard this
  alternatives:
  - After hearing
  - When they heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    'When they heard this' is natural English and makes explicit the implied object
    from context without over-paraphrasing.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - now
  - ''
  lexicon: BDAG
  rationale: Here δέ is a mild connective rather than strongly adversative. English
    often leaves it untranslated, but 'and' preserves the flow between participles
    and the main clause.
- source_word: γενόμενοι πλήρεις θυμοῦ
  chosen: became full of غضب
  alternatives:
  - became full of anger
  - were filled with rage
  - became furious
  lexicon: BDAG
  rationale: The construction literally means 'having become full of θυμός.' The sense
    is intense anger or fury. A natural English rendering would be 'became full of
    anger' or 'were filled with rage'; the chosen rendering intends to preserve the
    fullness idiom and intensity.
- source_word: θυμοῦ
  chosen: غضب
  alternatives:
  - anger
  - rage
  - fury
  lexicon: BDAG
  rationale: θυμός denotes strong anger, wrath, or rage. The context is a hostile
    mob reaction, so an intense term is appropriate.
- source_word: ἔκραζον
  chosen: they were crying out
  alternatives:
  - they shouted
  - they kept shouting
  - they cried out
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing or repeated action. 'They were crying
    out' preserves the durative force better than a simple past.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  - as they said
  lexicon: BDAG
  rationale: Participle of attendant manner introducing the content of the cry. 'Saying'
    is the most straightforward English equivalent.
- source_word: Μεγάλη ἡ Ἄρτεμις Ἐφεσίων
  chosen: Great is Artemis of the Ephesians!
  alternatives:
  - Artemis of the Ephesians is great!
  - Great is the Artemis of the Ephesians!
  lexicon: BDAG
  rationale: This is an acclamatory nominal clause. 'Great is Artemis of the Ephesians!'
    preserves the elevated chant-like word order and the genitive relation identifying
    Artemis as the deity associated with the Ephesians.
- source_word: Ἄρτεμις
  chosen: Artemis
  lexicon: BDAG
  rationale: Proper name of the goddess; per translation philosophy, names are transliterated
    rather than translated.
- source_word: Ἐφεσίων
  chosen: of the Ephesians
  alternatives:
  - of Ephesus
  - belonging to the Ephesians
  lexicon: BDAG
  rationale: Genitive plural adjective functioning substantivally, referring to the
    people of Ephesus. 'Of the Ephesians' is more precise than 'of Ephesus' and matches
    the Greek form.
