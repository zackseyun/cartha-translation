id: ACT.19.33
reference: Acts 19:33
source:
  edition: SBLGNT
  text: ἐκ δὲ τοῦ ὄχλου ⸀συνεβίβασαν Ἀλέξανδρον προβαλόντων αὐτὸν τῶν Ἰουδαίων, ὁ
    δὲ Ἀλέξανδρος κατασείσας τὴν χεῖρα ἤθελεν ἀπολογεῖσθαι τῷ δήμῳ.
translation:
  text: And from the crowd they brought forward Alexander, since the Jews had pushed
    him forward; and Alexander, motioning with his hand, wanted to make a defense
    to the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they put forward Alexander ... the Jews having put him forward.' The
      Greek uses two related verbs for publicly bringing Alexander to the front.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the people.' The term here has a civic-public sense and is distinct
      from 'crowd' earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεβίβασαν
  chosen: they brought forward
  alternatives:
  - they put forward
  - they prompted
  - they instructed
  lexicon: BDAG
  rationale: In this context with Ἀλέξανδρον as object and ἐκ τοῦ ὄχλου, the sense
    is physical/public presentation from the crowd rather than intellectual instruction.
    'Brought forward' is natural English and fits the scene of a public assembly.
- source_word: προβαλόντων αὐτὸν τῶν Ἰουδαίων
  chosen: since the Jews had pushed him forward
  alternatives:
  - the Jews having put him forward
  - after the Jews put him forward
  lexicon: BDAG
  rationale: The genitive absolute explains how Alexander came to be singled out.
    'Pushed him forward' captures the public, situational force of προβάλλω here without
    implying violence. 'Since' conveys explanatory force better than a bare participial
    English construction.
- source_word: κατασείσας τὴν χεῖρα
  chosen: motioning with his hand
  alternatives:
  - gesturing with his hand
  - waving his hand for silence
  - beckoning with his hand
  lexicon: BDAG
  rationale: The idiom denotes a hand gesture to gain attention or quiet the crowd.
    'Motioning with his hand' is clear and avoids over-specifying 'for silence,' which
    is likely but not explicit.
- source_word: ἤθελεν ἀπολογεῖσθαι
  chosen: wanted to make a defense
  alternatives:
  - was wanting to defend himself
  - intended to make a defense
  - wanted to give a defense
  lexicon: BDAG
  rationale: ἤθελεν marks intention/desire, not completed action. ἀπολογεῖσθαι in
    Acts commonly refers to making a formal defense. 'Make a defense' preserves that
    forensic/public nuance.
- source_word: τῷ δήμῳ
  chosen: to the assembly
  alternatives:
  - to the people
  - to the crowd
  lexicon: BDAG
  rationale: δῆμος can mean the civic populace or assembled public. In this riot/assembly
    setting, 'assembly' preserves the public-civic nuance better than the more generic
    'crowd,' already used for ὄχλος earlier in the verse.
- source_word: ὄχλου
  chosen: crowd
  alternatives:
  - multitude
  lexicon: BDAG
  rationale: ὄχλος is the general mass of people. 'Crowd' is the most natural modern
    rendering and distinguishes it from δήμῳ later in the verse.
- source_word: Ἀλέξανδρον / Ἀλέξανδρος
  chosen: Alexander
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
