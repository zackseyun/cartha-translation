theological_decisions:
- issue: Rendering of Ἰουδαῖος
  chosen_reading: a Jew
  alternative_readings:
  - a Judean
  rationale: This verse concerns the crowd's reaction to Alexander's ethnoreligious
    identity in Ephesus, not specifically his geographic origin from Judea. 'Jew'
    best communicates the social-religious category recognized by the crowd without
    importing further theological claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity only where genuine'
