id: ACT.19.34
reference: Acts 19:34
source:
  edition: SBLGNT
  text: ἐπιγνόντες δὲ ὅτι Ἰουδαῖός ἐστιν φωνὴ ἐγένετο μία ἐκ πάντων ⸀ὡς ἐπὶ ὥρας δύο
    κραζόντων· Μεγάλη ἡ Ἄρτεμις Ἐφεσίων.
translation:
  text: But when they recognized that he was a Jew, one voice arose from them all,
    as they were shouting for about two hours, “Great is Artemis of the Ephesians!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a Judean.” The Greek term can denote either a Jew or someone from Judea;
      here the broader ethnoreligious sense is more likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  chosen: when they recognized
  alternatives:
  - when they realized
  - having recognized
  lexicon: BDAG
  rationale: Aorist participle giving prior circumstance; 'recognized' fits the crowd's
    identification of Alexander's Jewish identity better than the more generic 'knew.'
    'When they recognized' gives natural English while preserving temporal force.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks a development or contrast with the preceding attempt to speak;
    'but' best reflects the adversative turn in context.
- source_word: Ἰουδαῖός
  chosen: a Jew
  alternatives:
  - Jewish
  - a Judean
  lexicon: BDAG
  rationale: In this Diaspora setting the ethnoreligious sense 'Jew' is more natural
    than the geographically narrower 'Judean.' The predicate nominative with ἐστιν
    is best rendered 'he was a Jew.'
- source_word: φωνὴ ἐγένετο μία ἐκ πάντων
  chosen: one voice arose from them all
  alternatives:
  - they all cried out with one voice
  - a single voice came from all
  lexicon: BDAG
  rationale: This idiom emphasizes unified outcry. The chosen rendering stays relatively
    close to the Greek image ('voice arose') while remaining readable. A more dynamic
    alternative is possible, but this preserves the singular 'one voice' explicitly.
- source_word: ὡς ἐπὶ ὥρας δύο
  chosen: for about two hours
  alternatives:
  - for nearly two hours
  - for a period of two hours
  lexicon: BDAG
  rationale: ὡς with a measure expression can indicate approximation; 'about two hours'
    captures that nuance better than an exact 'for two hours.'
- source_word: κραζόντων
  chosen: as they were shouting
  alternatives:
  - crying out
  - yelling
  lexicon: BDAG
  rationale: Present participle conveys ongoing action. 'Shouting' is natural modern
    English and fits the public uproar; 'crying out' is possible but slightly less
    idiomatic here.
- source_word: Μεγάλη ἡ Ἄρτεμις Ἐφεσίων
  chosen: Great is Artemis of the Ephesians!
  alternatives:
  - Great is the Artemis of the Ephesians!
  - Artemis of the Ephesians is great!
  lexicon: BDAG
  rationale: This preserves the acclamatory word order and the genitive Ἐφεσίων as
    association/possession ('of the Ephesians'). Omitting the article before Artemis
    in English is idiomatic for a proper name.
