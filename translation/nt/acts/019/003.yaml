theological_decisions:
- issue: Whether to preserve the repeated preposition εἰς in both question and answer
  chosen_reading: Render both clauses with 'into'
  alternative_readings:
  - Render idiomatically as 'What baptism did you receive?' / 'John's baptism'
  rationale: Preserving 'into' reflects the Greek wording and maintains the rhetorical
    parallelism of Paul's question and their answer, without importing a denominational
    theology of baptism. It also keeps the text's conceptual focus on the baptismal
    identification involved.
  doctrine_reference: Translation philosophy §§1, 5
