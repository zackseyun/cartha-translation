id: ACT.19.3
reference: Acts 19:3
source:
  edition: SBLGNT
  text: εἶπέν ⸀τε· Εἰς τί οὖν ἐβαπτίσθητε; οἱ δὲ εἶπαν· Εἰς τὸ Ἰωάννου βάπτισμα.
translation:
  text: And he said, “Into what then were you baptized?” And they said, “Into John's
    baptism.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Into the baptism of John.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τε
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say.' The enclitic τε here lightly connects
    the clause to the preceding context; 'And' preserves the narrative linkage without
    overtranslating.
- source_word: Εἰς τί
  chosen: Into what
  alternatives:
  - For what
  - To what
  lexicon: BDAG
  rationale: εἰς with τί is best rendered literally here as 'into what,' matching
    the repeated εἰς in the reply and preserving the conceptual object/sphere of baptism
    rather than reducing it to mere purpose.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν marks an inferential or consequential step in the dialogue. 'Then'
    is natural modern English and fits the interrogative context without sounding
    overly formal.
- source_word: ἐβαπτίσθητε
  chosen: were you baptized
  alternatives:
  - did you receive baptism
  lexicon: BDAG
  rationale: Aorist passive of βαπτίζω is naturally rendered 'were baptized.' This
    preserves the verbal form and avoids paraphrase.
- source_word: Εἰς τὸ Ἰωάννου βάπτισμα
  chosen: Into John's baptism
  alternatives:
  - Into the baptism of John
  - With John's baptism
  lexicon: BDAG
  rationale: 'The repeated εἰς is preserved for consistency with the question. Ἰωάννου
    is a genitive modifying βάπτισμα, naturally ''John''s baptism.'' This keeps the
    Greek parallelism: ''Into what...?'' / ''Into John''s baptism.'''
- source_word: βάπτισμα
  chosen: baptism
  alternatives:
  - washing rite
  lexicon: BDAG
  rationale: βάπτισμα is the established and accurate rendering here. Although 'baptism'
    can carry later ecclesial associations, in this context it directly names the
    rite associated with John and should not be paraphrased.
