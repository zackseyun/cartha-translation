id: ACT.19.19
reference: Acts 19:19
source:
  edition: SBLGNT
  text: ἱκανοὶ δὲ τῶν τὰ περίεργα πραξάντων συνενέγκαντες τὰς βίβλους κατέκαιον ἐνώπιον
    πάντων· καὶ συνεψήφισαν τὰς τιμὰς αὐτῶν καὶ εὗρον ἀργυρίου μυριάδας πέντε.
translation:
  text: And many of those who had practiced magic arts brought their books together
    and were burning them in front of everyone; and they totaled up their value and
    found it to be fifty thousand pieces of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'occult practices.' The Greek expression literally refers to 'curious'
      or 'special' things, but in this context it denotes magical practices.
    reason: lexical_alternative
  - marker: b
    text: Literally 'five myriads of silver,' that is, fifty thousand pieces of silver.
      The exact coin denomination is not specified.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκανοὶ
  chosen: many
  alternatives:
  - a considerable number
  - quite a few
  lexicon: BDAG
  rationale: In this context ἱκανοί refers to a substantial number of people rather
    than mere sufficiency. 'Many' is natural English and fits Luke's narrative style.
- source_word: τὰ περίεργα πραξάντων
  chosen: who had practiced magic arts
  alternatives:
  - who had practiced curious arts
  - who had engaged in occult practices
  lexicon: BDAG
  rationale: The idiom refers to magical or occult activities, not merely 'curious'
    behavior. 'Magic arts' is clear, idiomatic, and closely tied to the Ephesian context
    of spell books and exorcistic practices.
- source_word: συνενέγκαντες
  chosen: brought ... together
  alternatives:
  - collected
  - gathered up
  lexicon: BDAG
  rationale: The participle indicates bringing the books together into one place before
    burning them. 'Brought together' preserves the concrete action.
- source_word: τὰς βίβλους
  chosen: their books
  alternatives:
  - the scrolls
  - the books
  lexicon: BDAG
  rationale: βίβλους broadly denotes written volumes/documents. 'Books' is standard
    and readable; 'their' is supplied in English from context since these are the
    items belonging to those practitioners.
- source_word: κατέκαιον
  chosen: were burning
  alternatives:
  - burned
  - kept burning
  lexicon: BDAG
  rationale: The imperfect tense portrays the action in progress. 'Were burning' better
    reflects the aspect than a simple past 'burned.'
- source_word: ἐνώπιον πάντων
  chosen: in front of everyone
  alternatives:
  - before all
  - in the sight of all
  lexicon: BDAG
  rationale: This phrase emphasizes the public nature of the act. 'In front of everyone'
    is clear modern English.
- source_word: συνεψήφισαν
  chosen: totaled up
  alternatives:
  - calculated
  - counted together
  lexicon: BDAG
  rationale: The verb means to compute or add up a sum. 'Totaled up' is accurate and
    idiomatic.
- source_word: τὰς τιμὰς αὐτῶν
  chosen: their value
  alternatives:
  - their prices
  - the prices of them
  lexicon: BDAG
  rationale: τιμή here refers to monetary value. 'Their value' is smoother English
    than 'their prices' while preserving the economic sense.
- source_word: ἀργυρίου μυριάδας πέντε
  chosen: fifty thousand pieces of silver
  alternatives:
  - five myriads of silver
  - fifty thousand silver coins
  lexicon: BDAG
  rationale: μυριάδες πέντε is literally 'five myriads,' i.e., fifty thousand. ἀργυρίου
    indicates silver as the unit of valuation, but the exact coin denomination is
    unspecified in the Greek, so 'pieces of silver' preserves the generality better
    than naming a coin.
