theological_decisions:
- issue: Nature of τὰ περίεργα in Ephesian context
  chosen_reading: Rendered as 'magic arts' without softening to merely 'curious practices.'
  alternative_readings:
  - curious arts
  - occult practices
  rationale: The immediate context concerns exorcists, evil spirits, and the destruction
    of costly magical texts. 'Magic arts' best reflects the historical-religious practice
    described without importing later technical terminology beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
