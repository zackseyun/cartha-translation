id: ACT.19.4
reference: Acts 19:4
source:
  edition: SBLGNT
  text: εἶπεν δὲ Παῦλος· ⸀Ἰωάννης ἐβάπτισεν βάπτισμα μετανοίας, τῷ λαῷ λέγων εἰς τὸν
    ἐρχόμενον μετ’ αὐτὸν ἵνα πιστεύσωσιν, τοῦτ’ ἔστιν εἰς ⸀τὸν Ἰησοῦν.
translation:
  text: And Paul said, “John baptized with a baptism of repentance, telling the people
    to believe in the one coming after him—that is, in Jesus.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'John baptized a baptism of repentance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβάπτισεν βάπτισμα μετανοίας
  chosen: baptized with a baptism of repentance
  alternatives:
  - baptized a baptism of repentance
  - administered a baptism of repentance
  lexicon: BDAG
  rationale: Retains the cognate construction for transparency while smoothing it
    into natural English with 'with a baptism.' 'Repentance' accurately renders μετανοίας
    as the content/character of the baptism.
- source_word: τῷ λαῷ
  chosen: the people
  alternatives:
  - the crowd
  - the people of Israel
  lexicon: BDAG
  rationale: λαός here is a general collective reference. 'The people' is natural
    and sufficiently broad; 'people of Israel' would over-specify what the Greek does
    not explicitly state in this clause.
- source_word: λέγων
  chosen: telling
  alternatives:
  - saying
  - while saying
  lexicon: BDAG
  rationale: The participle is contemporaneous with John's baptizing and introduces
    the content of his proclamation. 'Telling' reads naturally in English before an
    infinitival/that-clause sense.
- source_word: εἰς τὸν ἐρχόμενον μετ’ αὐτὸν
  chosen: in the one coming after him
  alternatives:
  - in the one who was coming after him
  - into the one coming after him
  lexicon: BDAG
  rationale: εἰς with πιστεύω commonly expresses the object of faith as 'believe in.'
    The present participle ἐρχόμενον is well rendered 'coming,' and μετ’ αὐτόν in
    this context means succession, 'after him.'
- source_word: ἵνα πιστεύσωσιν
  chosen: to believe
  alternatives:
  - that they should believe
  - so that they might believe
  lexicon: BDAG
  rationale: After a verb of speaking, ἵνα can express intended content/purpose. English
    idiom is best served by 'telling the people to believe,' which preserves the force
    without awkwardness.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - that is to say
  - namely
  lexicon: BDAG
  rationale: A straightforward explanatory formula linking 'the one coming after him'
    with Jesus.
- source_word: εἰς τὸν Ἰησοῦν
  chosen: in Jesus
  alternatives:
  - into Jesus
  - in the Messiah Jesus
  lexicon: BDAG
  rationale: With πιστεύω implied from the previous clause, εἰς is idiomatically 'in.'
    The Greek text here gives the personal name Ἰησοῦν without the title Χριστός/Messiah,
    so the translation should not add it.
