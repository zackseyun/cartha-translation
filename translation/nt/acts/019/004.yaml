theological_decisions:
- issue: Relation of John's baptism to faith in Jesus
  chosen_reading: John's baptism is characterized as a baptism associated with repentance,
    accompanied by a call to believe in the coming one, identified as Jesus.
  alternative_readings:
  - John's baptism itself effected Christian faith
  - '''the one coming after him'' should remain unspecified'
  rationale: 'The syntax presents John''s baptism and his accompanying message distinctly:
    he baptized with a repentance-baptism while telling the people to believe in the
    coming one. The explanatory phrase ''that is, in Jesus'' identifies that coming
    one explicitly.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
