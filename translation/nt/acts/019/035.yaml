id: ACT.19.35
reference: Acts 19:35
source:
  edition: SBLGNT
  text: καταστείλας δὲ ⸂ὁ γραμματεὺς τὸν ὄχλον⸃ φησίν· Ἄνδρες Ἐφέσιοι, τίς γάρ ἐστιν
    ⸀ἀνθρώπων ὃς οὐ γινώσκει τὴν Ἐφεσίων πόλιν νεωκόρον οὖσαν τῆς ⸀μεγάλης Ἀρτέμιδος
    καὶ τοῦ διοπετοῦς;
translation:
  text: But after the city clerk had quieted the crowd, he said, “Men of Ephesus,
    for what man is there who does not know that the city of the Ephesians is temple-keeper
    of the great Artemis and of the image fallen from heaven?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guardian of the temple of the great Artemis.' The Greek term denotes
      a city recognized as custodian of a temple or cult.
    reason: lexical_alternative
  - marker: b
    text: Or 'of the heaven-fallen thing.' The Greek word refers to something believed
      to have fallen from the sky; here it likely means the cult image associated
      with Artemis.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστείλας
  chosen: had quieted
  alternatives:
  - having quieted
  - had calmed
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb indicates prior action. 'Had
    quieted' gives natural English while preserving sequence; 'quieted' fits the context
    of restraining a noisy crowd better than a more wooden 'having quieted.'
- source_word: γραμματεὺς
  chosen: city clerk
  alternatives:
  - town clerk
  - secretary
  lexicon: BDAG
  rationale: In this civic context the term refers to a municipal official, not a
    Jewish scribe. 'City clerk' is clear modern English and reflects the administrative
    role in Ephesus.
- source_word: ὄχλον
  chosen: crowd
  alternatives:
  - multitude
  lexicon: BDAG
  rationale: '''Crowd'' is the natural modern rendering for a public assembly in turmoil.'
- source_word: Ἄνδρες Ἐφέσιοι
  chosen: Men of Ephesus
  alternatives:
  - Ephesian men
  - Men, Ephesians
  lexicon: BDAG
  rationale: This is a formal vocative address. Per the gender-accurate guideline,
    'Men' is retained rather than neutralizing the masculine form.
- source_word: τίς γάρ ἐστιν ἀνθρώπων ὃς οὐ γινώσκει
  chosen: for what man is there who does not know
  alternatives:
  - for who among men does not know
  - for what person is there who does not know
  lexicon: BDAG
  rationale: The idiom is rhetorical. 'What man is there who does not know' preserves
    the singular rhetorical force and the masculine/generic wording of ἀνθρώπων in
    context, while remaining idiomatic English.
- source_word: τὴν Ἐφεσίων πόλιν
  chosen: the city of the Ephesians
  alternatives:
  - the Ephesian city
  - the city of Ephesus
  lexicon: BDAG
  rationale: The genitive is preserved most transparently as 'the city of the Ephesians.'
    'City of Ephesus' would be smoother but slightly less literal than the Greek phrasing.
- source_word: νεωκόρον
  chosen: temple-keeper
  alternatives:
  - guardian of the temple
  - temple warden
  lexicon: BDAG
  rationale: The term denotes a city honored as custodian of a temple or cult. 'Temple-keeper'
    is concise and preserves the cultic sense without over-paraphrasing.
- source_word: τῆς μεγάλης Ἀρτέμιδος
  chosen: of the great Artemis
  alternatives:
  - of great Artemis
  lexicon: BDAG
  rationale: The article and adjective are naturally rendered in English as 'the great
    Artemis,' reflecting the recognized title used in Ephesian devotion.
- source_word: τοῦ διοπετοῦς
  chosen: of the image fallen from heaven
  alternatives:
  - of the heaven-fallen image
  - of the thing fallen from Zeus/heaven
  lexicon: BDAG
  rationale: διοπετής refers to something believed to have fallen from the sky/heaven.
    In context it most naturally refers to the cult image associated with Artemis.
    'Image fallen from heaven' makes the implied referent explicit for English readers
    without changing the sense. 'From heaven' is preferred over 'from Zeus' because
    the term had become idiomatic for 'sky-fallen,' and this avoids importing a more
    specific theological claim than the context requires.
