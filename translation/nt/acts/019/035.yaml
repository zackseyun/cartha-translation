theological_decisions:
- issue: Rendering the pagan cultic claim about Artemis and the διοπετές object
  chosen_reading: 'Translate the civic-religious boast straightforwardly without endorsing
    its truth: ''temple-keeper of the great Artemis and of the image fallen from heaven.'''
  alternative_readings:
  - '''guardian of the temple of the great Artemis and of the sacred stone that fell
    from the sky'''
  - '''temple warden of the great Artemis and of the thing fallen from Zeus'''
  rationale: The verse reports pagan speech, not biblical affirmation. The translation
    should preserve the claim as the speaker presents it while avoiding interpretive
    embellishment. 'Image' clarifies the likely referent in context, and 'fallen from
    heaven' communicates the conventional meaning accessibly.
  doctrine_reference: Translation philosophy §§1, 3, 6
