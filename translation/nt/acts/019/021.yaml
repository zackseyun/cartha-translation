theological_decisions:
- issue: Referent of ἐν τῷ πνεύματι
  chosen_reading: in the Spirit
  alternative_readings:
  - in his spirit
  rationale: The Greek lacks an explicit possessive and can be read either as Paul's
    inward resolve or as resolve prompted by the Holy Spirit. Because Luke frequently
    presents mission decisions in relation to the Holy Spirit, 'in the Spirit' is
    adopted in the main text, but the ambiguity is genuine and should be preserved
    in a footnote rather than dogmatically resolved.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
revisions:
- timestamp: '2026-04-21T02:49:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/019/021.json
  category: awkward_english
  tier: 1
  from: resolved in the Spirit, after passing through Macedonia and Achaia, to go
    to Jerusalem
  to: resolved in the Spirit to go to Jerusalem after passing through Macedonia and
    Achaia
  rationale: The current word order places the participial phrase 'after passing through...'
    between the verb 'resolved' and its complementary infinitive 'to go.' This separation,
    while grammatically possible, is slightly awkward and can momentarily obscure
    that passing through Macedonia is part of the plan being resolved upon, not a
    precondition for the act of resolving. Reordering the clauses connects the main
    verb to its infinitive more directly, improving the sentence's flow and clarity.
