id: ACT.19.21
reference: Acts 19:21
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐπληρώθη ταῦτα, ἔθετο ὁ Παῦλος ἐν τῷ πνεύματι διελθὼν τὴν Μακεδονίαν
    καὶ Ἀχαΐαν πορεύεσθαι εἰς ⸀Ἱεροσόλυμα, εἰπὼν ὅτι Μετὰ τὸ γενέσθαι με ἐκεῖ δεῖ
    με καὶ Ῥώμην ἰδεῖν.
translation:
  text: Now after these things were completed, Paul resolved in the Spirit to go to
    Jerusalem after passing through Macedonia and Achaia, saying, “After I have been
    there, I must also see Rome.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in his spirit.” The Greek phrase may refer either to Paul's own inner
      resolve or to the Holy Spirit's guidance.
    reason: alternative_reading
  - marker: b
    text: Or 'resolved in the Spirit, after passing through Macedonia and Achaia,
      to go to Jerusalem'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐπληρώθη
  chosen: were completed
  alternatives:
  - were fulfilled
  - came to an end
  lexicon: BDAG
  rationale: Passive of πληρόω here refers to events reaching completion rather than
    prophetic fulfillment. 'Were completed' is natural English and preserves the sense
    that the preceding matters had run their course.
- source_word: ἔθετο
  chosen: resolved
  alternatives:
  - purposed
  - decided
  lexicon: BDAG
  rationale: Middle voice of τίθημι in this idiom means to set or determine for oneself.
    'Resolved' captures deliberate inward determination better than the flatter 'decided.'
- source_word: ἐν τῷ πνεύματι
  chosen: in the Spirit
  alternatives:
  - in his spirit
  lexicon: BDAG
  rationale: The phrase is ambiguous between Paul's own spirit and the Holy Spirit.
    Capitalized 'Spirit' is chosen in the main text because Luke often uses πνεῦμα
    in ways shaped by divine guidance, and the following sense of necessity coheres
    with that. The alternative is preserved in a footnote to maintain the ambiguity.
- source_word: διελθὼν
  chosen: after passing through
  alternatives:
  - having gone through
  - after traveling through
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main infinitive of going to
    Jerusalem. 'After passing through' clearly conveys sequence in idiomatic English.
- source_word: πορεύεσθαι
  chosen: to go
  alternatives:
  - to travel
  - to journey
  lexicon: BDAG
  rationale: A broad movement verb; 'to go' is the most natural and sufficiently precise
    in this context.
- source_word: Ἱεροσόλυμα
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
- source_word: Μετὰ τὸ γενέσθαι με ἐκεῖ
  chosen: After I have been there
  alternatives:
  - After I go there
  - After I am there
  lexicon: BDAG
  rationale: The articular infinitive construction with γίνομαι and accusative subject
    is idiomatic. 'After I have been there' expresses the sense of being present in
    that place before the next step.
- source_word: δεῖ
  chosen: I must
  alternatives:
  - it is necessary for me to
  - I need to
  lexicon: BDAG
  rationale: δεῖ expresses necessity, often with a sense of divine or compelling purpose
    in Luke-Acts. 'I must' is concise and preserves that force.
- source_word: ἰδεῖν
  chosen: see
  alternatives:
  - visit
  lexicon: BDAG
  rationale: Literally 'see.' In travel contexts it can imply visiting, but 'see Rome'
    preserves the Greek wording while remaining idiomatic.
