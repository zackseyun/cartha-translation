theological_decisions:
- issue: Nature of γλώσσαις in Acts 19:6
  chosen_reading: Render as 'tongues' in the main text without specifying whether
    these were known human languages or ecstatic speech.
  alternative_readings:
  - Render as 'languages' to emphasize intelligible human languages
  rationale: The Greek γλώσσαις can denote 'tongues' or 'languages,' and this verse
    alone does not require resolving the broader interpretive debate. Per translation
    philosophy, the wording should preserve theological tension rather than settle
    a denominationally contested question.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Rendering the Spirit's coming
  chosen_reading: the Holy Spirit came upon them
  alternative_readings:
  - the Holy Spirit came on them
  rationale: This wording reflects the narrative description of the Spirit's arrival
    without importing a later doctrinal framework about subsequence or sacramental
    causality. The text reports the event but does not explain its full theological
    mechanics.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1, §3
