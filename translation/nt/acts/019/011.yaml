theological_decisions:
- issue: Agency in miracle-working
  chosen_reading: God is presented as the one performing the miracles, with Paul as
    the instrument.
  alternative_readings:
  - Paul performed the miracles
  rationale: The Greek makes ὁ θεὸς the grammatical subject of ἐποίει, while διὰ τῶν
    χειρῶν Παύλου marks mediated instrumentality. The translation preserves this distinction
    to avoid attributing independent miracle-working power to Paul.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
