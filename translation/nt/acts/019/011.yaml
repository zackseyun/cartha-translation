id: ACT.19.11
reference: Acts 19:11
source:
  edition: SBLGNT
  text: Δυνάμεις τε οὐ τὰς τυχούσας ⸂ὁ θεὸς ἐποίει⸃ διὰ τῶν χειρῶν Παύλου,
translation:
  text: And God was doing extraordinary miracles through the hands of Paul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'works of power not the ordinary kind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δυνάμεις
  chosen: miracles
  alternatives:
  - works of power
  - mighty deeds
  - powers
  lexicon: BDAG
  rationale: In Acts, δύναμις in the plural commonly refers to miraculous works rather
    than abstract 'powers.' 'Miracles' communicates the eventive sense clearly in
    modern English, while the alternatives are preserved because the noun literally
    denotes acts of power.
- source_word: τε
  chosen: And
  alternatives:
  - now
  - also
  - ', and'
  lexicon: BDAG
  rationale: τε is a connective particle linking this statement to the preceding narrative.
    English typically renders it with a simple coordinating connection; 'And' is natural
    at the head of the sentence.
- source_word: οὐ τὰς τυχούσας
  chosen: extraordinary
  alternatives:
  - not ordinary
  - unusual
  - not just any
  lexicon: BDAG
  rationale: The idiom οὐ τὰς τυχούσας literally means 'not the ordinary/ordinary
    ones' or 'not just any.' In idiomatic English modifying 'miracles,' 'extraordinary'
    best captures the emphatic sense without awkwardness.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: The explicit subject is God, and the verse emphasizes divine agency rather
    than Paul's independent power.
- source_word: ἐποίει
  chosen: was doing
  alternatives:
  - did
  - was performing
  - kept doing
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or repeated action in past time.
    'Was doing' preserves that aspect better than a simple past.
- source_word: διὰ τῶν χειρῶν Παύλου
  chosen: through the hands of Paul
  alternatives:
  - through Paul
  - by Paul's hands
  lexicon: BDAG
  rationale: διά with the genitive marks instrumentality or agency mediated through
    Paul. Retaining 'hands' preserves the concrete idiom and underscores Paul as the
    human instrument through whom God acted.
- source_word: Παύλου
  chosen: Paul
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
