id: ACT.19.10
reference: Acts 19:10
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἐγένετο ἐπὶ ἔτη δύο, ὥστε πάντας τοὺς κατοικοῦντας τὴν Ἀσίαν ἀκοῦσαι
    τὸν λόγον τοῦ ⸀κυρίου, Ἰουδαίους τε καὶ Ἕλληνας.
translation:
  text: This continued for two years, so that all who lived in Asia heard the word
    of the Lord, both Jews and Greeks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern
      continent of Asia.
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτο δὲ ἐγένετο
  chosen: This continued
  alternatives:
  - This happened
  - This took place
  lexicon: BDAG
  rationale: Although ἐγένετο can be rendered 'happened' or 'took place,' in context
    it refers back to the ongoing teaching arrangement in the previous verse and its
    duration. 'This continued' better conveys the sense of an activity persisting
    over time in idiomatic English while remaining faithful to the Greek.
- source_word: ἐπὶ ἔτη δύο
  chosen: for two years
  alternatives:
  - during two years
  lexicon: BDAG
  rationale: ἐπί with an accusative of time commonly expresses duration. 'For two
    years' is the natural English rendering.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - so as to
  lexicon: BDAG
  rationale: ὥστε introduces the result of the preceding activity. 'So that' is concise
    and preserves the resultative force.
- source_word: πάντας τοὺς κατοικοῦντας τὴν Ἀσίαν
  chosen: all who lived in Asia
  alternatives:
  - all the inhabitants of Asia
  - everyone living in Asia
  lexicon: BDAG
  rationale: κατοικοῦντας is a substantival participle meaning those dwelling or living
    in a place. 'All who lived in Asia' is natural English and preserves the universal
    scope of πάντας. 'Asia' here refers to the Roman province, not the modern continent;
    that cultural detail is best preserved in a footnote rather than expanded in the
    main text.
- source_word: ἀκοῦσαι
  chosen: heard
  alternatives:
  - came to hear
  lexicon: BDAG
  rationale: The aorist infinitive after ὥστε expresses the result that they heard.
    'Heard' is the straightforward rendering. 'Came to hear' would add nuance not
    explicit in the Greek.
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' In Acts, 'the word' is a common expression
    for the proclaimed gospel message. Retaining 'the word' preserves Luke's recurring
    terminology and theological texture.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: 'Per the doctrine''s contested-terms guidance, κύριος is rendered ''Lord.''
    Here the genitive most naturally modifies λόγον: ''the word of the Lord.'''
- source_word: Ἰουδαίους τε καὶ Ἕλληνας
  chosen: both Jews and Greeks
  alternatives:
  - Jews as well as Greeks
  lexicon: BDAG
  rationale: τε καὶ coordinates the two groups inclusively. 'Both Jews and Greeks'
    is idiomatic and preserves the Jew-Gentile scope emphasized in Acts.
