theological_decisions:
- issue: Meaning of 'Asia'
  chosen_reading: Asia refers to the Roman province of Asia in western Asia Minor,
    not the modern continent.
  alternative_readings:
  - Asia as the broader continental region
  rationale: In Acts, Ἀσία regularly denotes the Roman province. Rendering simply
    'Asia' preserves the proper name in the text, while a footnote can prevent anachronistic
    misunderstanding.
