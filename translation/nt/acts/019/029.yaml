id: ACT.19.29
reference: Acts 19:29
source:
  edition: SBLGNT
  text: καὶ ἐπλήσθη ἡ ⸀πόλις τῆς συγχύσεως, ὥρμησάν τε ὁμοθυμαδὸν εἰς τὸ θέατρον συναρπάσαντες
    Γάϊον καὶ Ἀρίσταρχον Μακεδόνας, συνεκδήμους Παύλου.
translation:
  text: And the city was filled with confusion, and they rushed together into the
    theater, dragging along Gaius and Aristarchus, Macedonians who were Paul’s traveling
    companions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seizing Gaius and Aristarchus' or 'snatching up Gaius and Aristarchus.'
      The Greek participle emphasizes forceful taking; 'dragging along' highlights
      the mob’s movement into the theater.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπλήσθη
  chosen: was filled
  alternatives:
  - became full
  - was filled up
  lexicon: BDAG
  rationale: Aorist passive of πίμπλημι naturally renders as 'was filled.' This preserves
    the passive sense without overinterpreting agency.
- source_word: πόλις
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: Standard rendering for πόλις; 'city' best fits Ephesus in context.
- source_word: συγχύσεως
  chosen: confusion
  alternatives:
  - uproar
  - disorder
  - turmoil
  lexicon: BDAG
  rationale: The genitive after 'was filled' is well represented by 'with confusion.'
    'Uproar' is contextually possible, but 'confusion' more directly reflects the
    lexical sense and matches the narrative emphasis on chaotic disorder.
- source_word: ὥρμησάν
  chosen: rushed
  alternatives:
  - surged
  - hurried
  - charged
  lexicon: BDAG
  rationale: The verb conveys a forceful, sudden movement. 'Rushed' is natural modern
    English and preserves the urgency.
- source_word: ὁμοθυμαδόν
  chosen: together
  alternatives:
  - with one accord
  - as one
  lexicon: BDAG
  rationale: In this riot context, the adverb emphasizes collective action rather
    than harmonious unity. 'Together' communicates that clearly in idiomatic English;
    'with one accord' is more wooden and can sound positively unified in a way the
    context does not require.
- source_word: θέατρον
  chosen: theater
  alternatives:
  - amphitheater
  lexicon: BDAG
  rationale: θέατρον refers to the public theater. 'Theater' is the direct and sufficient
    rendering; 'amphitheater' is more specific than the Greek requires.
- source_word: συναρπάσαντες
  chosen: dragging along
  alternatives:
  - seizing
  - snatching up
  - dragging
  lexicon: BDAG
  rationale: The participle denotes violent seizure/carrying off. 'Dragging along'
    captures both the force and the movement into the theater, fitting the mob scene.
- source_word: Γάϊον
  chosen: Gaius
  rationale: Personal name transliterated by standard convention per project philosophy.
- source_word: Ἀρίσταρχον
  chosen: Aristarchus
  rationale: Personal name transliterated by standard convention per project philosophy.
- source_word: Μακεδόνας
  chosen: Macedonians
  alternatives:
  - men from Macedonia
  lexicon: BDAG
  rationale: Ethnic/geographic designation is straightforwardly rendered 'Macedonians.'
- source_word: συνεκδήμους Παύλου
  chosen: Paul’s traveling companions
  alternatives:
  - fellow travelers with Paul
  - companions in travel of Paul
  lexicon: BDAG
  rationale: The noun means those traveling with someone away from home. 'Paul’s traveling
    companions' is idiomatic and accurately conveys the relationship.
- source_word: τε
  chosen: and
  alternatives:
  - then
  - also
  lexicon: BDAG
  rationale: The enclitic links the next action to the previous clause. In English,
    a simple coordinating 'and' best represents the flow.
