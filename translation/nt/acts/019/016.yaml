id: ACT.19.16
reference: Acts 19:16
source:
  edition: SBLGNT
  text: καὶ ⸀ἐφαλόμενος ⸂ὁ ἄνθρωπος ἐπ’ αὐτοὺς⸃ ἐν ᾧ ἦν τὸ πνεῦμα τὸ πονηρὸν ⸂κατακυριεύσας
    ἀμφοτέρων⸃ ἴσχυσεν κατ’ αὐτῶν, ὥστε γυμνοὺς καὶ τετραυματισμένους ἐκφυγεῖν ἐκ
    τοῦ οἴκου ἐκείνου.
translation:
  text: And the man in whom the evil spirit was, leaping on them and overpowering
    both of them, prevailed against them, so that they fled out of that house naked
    and wounded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jumping on them' or 'springing on them.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'both of them.' Although the wider context mentions more than two
      sons of Sceva, the text here explicitly uses 'both,' so the translation preserves
      that wording.
    reason: alternative_reading
  - marker: c
    text: Or 'escaped out of that house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφαλόμενος
  chosen: leaping on
  alternatives:
  - jumping on
  - springing on
  lexicon: BDAG
  rationale: Aorist middle participle of ἐφάλλομαι denotes a sudden physical pounce
    or leap. 'Leaping on' is vivid, natural English and preserves the violent action
    without over-paraphrase.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: The noun is grammatically and contextually masculine singular, referring
    to the possessed male individual. 'The man' is gender-accurate and fits the narrative
    context.
- source_word: ἐν ᾧ ἦν τὸ πνεῦμα τὸ πονηρόν
  chosen: in whom the evil spirit was
  alternatives:
  - who had the evil spirit in him
  - in whom was the evil spirit
  lexicon: BDAG
  rationale: This relative clause identifies the man as the one inhabited by the spirit.
    The chosen wording stays close to the Greek structure while remaining readable
    modern English.
- source_word: τὸ πνεῦμα τὸ πονηρόν
  chosen: the evil spirit
  alternatives:
  - the wicked spirit
  lexicon: BDAG
  rationale: ποντηρός here characterizes the spirit as evil or malignant. 'Evil spirit'
    is the standard and clearest rendering in this exorcism context.
- source_word: κατακυριεύσας
  chosen: overpowering
  alternatives:
  - mastering
  - subduing
  - gaining mastery over
  lexicon: BDAG
  rationale: The participle conveys gaining dominance or mastery. 'Overpowering' communicates
    the forceful defeat in idiomatic English and fits the immediate result clause.
- source_word: ἀμφοτέρων
  chosen: both of them
  alternatives:
  - both
  lexicon: BDAG
  rationale: The genitive dual/plural sense here refers to two members of the group
    specifically affected. 'Both of them' makes the numeral explicit, matching the
    Greek.
- source_word: ἴσχυσεν κατ’ αὐτῶν
  chosen: prevailed against them
  alternatives:
  - was stronger than them
  - overpowered them
  lexicon: BDAG
  rationale: ἰσχύω with κατά expresses prevailing over or proving stronger than. 'Prevailed
    against them' preserves the idiom and avoids collapsing it entirely into the previous
    participle.
- source_word: γυμνούς
  chosen: naked
  alternatives:
  - stripped
  lexicon: BDAG
  rationale: The adjective straightforwardly means naked. Although context may imply
    their clothes were torn off, the Greek states the resulting condition, so 'naked'
    is preferred.
- source_word: τετραυματισμένους
  chosen: wounded
  alternatives:
  - injured
  - badly wounded
  lexicon: BDAG
  rationale: Perfect passive participle from τραυματίζω indicates they had been wounded
    and remained in that condition. 'Wounded' is concise and sufficiently strong.
- source_word: ἐκφυγεῖν
  chosen: they fled out
  alternatives:
  - they escaped
  - they ran away
  lexicon: BDAG
  rationale: 'The infinitive under ὥστε expresses result: they escaped/fled. ''They
    fled out'' preserves both the escape and the explicit movement from the house.'
- source_word: ἐκ τοῦ οἴκου ἐκείνου
  chosen: out of that house
  alternatives:
  - from that house
  lexicon: BDAG
  rationale: The phrase marks physical departure from the specific house just mentioned.
    'Out of that house' is the most direct rendering.
