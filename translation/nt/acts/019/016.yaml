theological_decisions:
- issue: Rendering of demonic possession language
  chosen_reading: the man in whom the evil spirit was
  alternative_readings:
  - the man possessed by the evil spirit
  - the man who had the evil spirit
  rationale: The Greek describes the spirit as being in the man. The chosen rendering
    stays close to the source text and does not import later technical terminology,
    while still clearly indicating demonic indwelling.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Scope of ἀμφοτέρων in relation to the larger group
  chosen_reading: both of them
  alternative_readings:
  - all of them
  - the two of them among the group
  rationale: The Greek explicitly says 'both,' even though the broader context mentions
    more than two exorcists. The translation preserves the textual detail rather than
    smoothing the narrative tension; interpretation of how this relates to the larger
    group is left unresolved.
  doctrine_reference: Translation philosophy §3
