theological_decisions:
- issue: Referent of 'the Lord' in τοῦ κυρίου
  chosen_reading: Rendered simply as 'the Lord' without specifying 'Jesus' in the
    main text.
  alternative_readings:
  - the Lord Jesus
  rationale: The immediate context in Acts strongly suggests the Lord Jesus, but the
    Greek text itself says only 'the Lord.' To avoid importing an explicit identification
    beyond the wording while preserving orthodox sense, the title is translated directly.
  doctrine_reference: Translate titles; transliterate names. Preserve theological
    tension rather than resolve it.
