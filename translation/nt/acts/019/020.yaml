id: ACT.19.20
reference: Acts 19:20
source:
  edition: SBLGNT
  text: οὕτως κατὰ κράτος ⸂τοῦ κυρίου ὁ λόγος⸃ ηὔξανεν καὶ ἴσχυεν.
translation:
  text: So the word of the Lord was growing and prevailing with power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was growing mightily and prevailing.' The phrase κατὰ κράτος can be
      rendered adverbially as 'mightily' or 'powerfully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: BDAG
  rationale: Introduces the result of the preceding events. 'So' is natural modern
    English and preserves the inferential/resultative force without sounding overly
    formal.
- source_word: κατὰ κράτος
  chosen: with power
  alternatives:
  - mightily
  - powerfully
  - according to strength
  lexicon: BDAG
  rationale: The idiom κατὰ κράτος conveys force, might, or powerful effect. 'With
    power' preserves the noun-based sense of κράτος better than the traditional adverb
    'mightily,' while remaining readable. It is taken adverbially with the verbal
    idea of growth and prevailing.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' In Acts this naturally
    refers to the Lord Jesus in context, but the translation keeps the Greek title
    rather than making the referent explicit in the main text.
- source_word: ὁ λόγος
  chosen: the word
  alternatives:
  - the message
  lexicon: BDAG
  rationale: λόγος here refers to the proclaimed message/gospel, but 'the word' is
    a standard and sufficiently clear rendering in Acts, preserving the recurring
    Lucan expression. 'Message' is possible but less consistent with Acts usage.
- source_word: ηὔξανεν
  chosen: was growing
  alternatives:
  - grew
  - kept growing
  - increased
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing progress rather than a simple summary
    event. 'Was growing' captures the imperfective aspect in natural English.
- source_word: ἴσχυεν
  chosen: prevailing
  alternatives:
  - was strong
  - was gaining strength
  - was proving powerful
  lexicon: BDAG
  rationale: ἰσχύω denotes being strong or having force. In this context, paired with
    growth, 'prevailing' communicates effective, victorious advance of the word. The
    English participial form works idiomatically after 'was growing and' while preserving
    the sense of active strength.
