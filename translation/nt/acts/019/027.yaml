id: ACT.19.27
reference: Acts 19:27
source:
  edition: SBLGNT
  text: οὐ μόνον δὲ τοῦτο κινδυνεύει ἡμῖν τὸ μέρος εἰς ἀπελεγμὸν ἐλθεῖν, ἀλλὰ καὶ
    τὸ τῆς μεγάλης θεᾶς ⸂Ἀρτέμιδος ἱερὸν⸃ εἰς οὐθὲν λογισθῆναι, μέλλειν ⸀τε καὶ καθαιρεῖσθαι
    ⸂τῆς μεγαλειότητος⸃ αὐτῆς, ἣν ὅλη ἡ Ἀσία καὶ ἡ οἰκουμένη σέβεται.
translation:
  text: And not only is this trade of ours in danger of coming into disrepute, but
    also the temple of the great goddess Artemis may be counted as nothing, and even
    her majesty—whom all Asia and the world worships—may be brought down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world.' The Greek often refers to the populated world,
      especially the wider Roman world.
    reason: lexical_alternative
  - marker: b
    text: Or 'her magnificence' or 'her greatness.' The Greek expression refers to
      Artemis's exalted status or splendor being brought down.
    reason: lexical_alternative
lexical_decisions:
- source_word: κινδυνεύει
  chosen: is in danger
  alternatives:
  - is endangered
  - runs the risk
  lexicon: BDAG
  rationale: The verb denotes being in danger or at risk. 'Is in danger' is idiomatic
    modern English and preserves the present-tense sense.
- source_word: τὸ μέρος
  chosen: this trade
  alternatives:
  - this line of work
  - this business
  lexicon: BDAG
  rationale: In context Demetrius refers to the craftsmen's occupation or business
    sector, not merely a 'part' in an abstract sense. 'Trade' best captures the economic
    reference in natural English.
- source_word: εἰς ἀπελεγμὸν ἐλθεῖν
  chosen: of coming into disrepute
  alternatives:
  - to fall into disgrace
  - to come into reproach
  lexicon: BDAG
  rationale: The phrase expresses movement into a state of reproach or loss of reputation.
    'Coming into disrepute' communicates the commercial and social shame implied here.
- source_word: ἱερὸν
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: BDAG
  rationale: The word refers to a sacred precinct/temple. Given the famous Artemision
    at Ephesus, 'temple' is the clearest and most standard rendering here.
- source_word: εἰς οὐθὲν λογισθῆναι
  chosen: may be counted as nothing
  alternatives:
  - may be regarded as nothing
  - may be considered worthless
  lexicon: BDAG
  rationale: The passive infinitive with εἰς οὐθέν means to be reckoned as of no account.
    'Counted as nothing' preserves the evaluative force without overinterpreting.
- source_word: μέλλειν τε καὶ καθαιρεῖσθαι
  chosen: may be brought down
  alternatives:
  - is about to be deposed
  - is going to be overthrown
  lexicon: BDAG
  rationale: The construction is compressed and somewhat awkward in Greek, expressing
    impending loss through being brought down. 'May be brought down' captures the
    feared downfall while fitting the coordinated infinitives in smooth English. The
    modal 'may' reflects the danger/warning context carried from κινδυνεύει.
- source_word: τῆς μεγαλειότητος αὐτῆς
  chosen: her majesty
  alternatives:
  - her magnificence
  - her greatness
  lexicon: BDAG
  rationale: The genitive after καθαιρεῖσθαι is difficult; the sense is that Artemis's
    grandeur/status will be stripped away or brought down. 'Her majesty' is concise
    and conveys exalted public honor.
- source_word: ὅλη ἡ Ἀσία
  chosen: all Asia
  alternatives:
  - the whole of Asia
  lexicon: BDAG
  rationale: Refers to the Roman province/region known as Asia. 'All Asia' is the
    natural English equivalent and preserves the rhetorical sweep.
- source_word: ἡ οἰκουμένη
  chosen: the world
  alternatives:
  - the inhabited world
  - the whole world
  lexicon: BDAG
  rationale: The term often denotes the inhabited world, especially the civilized
    world of the Roman sphere. 'The world' is idiomatic, while a footnote preserves
    the more literal nuance.
- source_word: σέβεται
  chosen: worships
  alternatives:
  - reveres
  - venerates
  lexicon: BDAG
  rationale: The middle verb denotes religious reverence or worship. 'Worships' best
    fits the cultic context of Artemis.
