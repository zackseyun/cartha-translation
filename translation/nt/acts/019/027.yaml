theological_decisions:
- issue: Rendering pagan religious language without softening or endorsing it
  chosen_reading: the great goddess Artemis ... whom all Asia and the world worships
  alternative_readings:
  - the so-called great goddess Artemis ... whom all Asia and the world reveres
  rationale: The verse reports Demetrius's speech from a pagan perspective. The translation
    preserves his claims straightforwardly as reported discourse without inserting
    distancing language not present in Greek.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
