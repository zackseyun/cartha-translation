id: ACT.19.39
reference: Acts 19:39
source:
  edition: SBLGNT
  text: εἰ δέ τι ⸀περαιτέρω ἐπιζητεῖτε, ἐν τῇ ἐννόμῳ ἐκκλησίᾳ ἐπιλυθήσεται.
translation:
  text: But if you seek anything further, it will be settled in the lawful assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the legal assembly' or 'in the regular assembly.' The Greek refers
      to a lawfully constituted civic gathering, not the church.
    reason: lexical_alternative
lexical_decisions:
- source_word: περαιτέρω
  chosen: further
  alternatives:
  - more
  - beyond this
  lexicon: BDAG
  rationale: Adverb indicating something additional or beyond the present matter.
    'Further' is natural modern English and preserves the comparative sense without
    overexpansion.
- source_word: ἐπιζητεῖτε
  chosen: you seek
  alternatives:
  - you inquire about
  - you demand
  lexicon: BDAG
  rationale: The verb can mean seek, look for, or pursue. In this civic-legal context,
    'seek' fits the broad sense of pursuing an additional matter, while avoiding an
    overly technical or aggressive nuance.
- source_word: ἐννόμῳ
  chosen: lawful
  alternatives:
  - legal
  - regular
  lexicon: BDAG
  rationale: The adjective denotes what is in accordance with law. 'Lawful' best captures
    conformity to legal procedure and fits the civic setting better than the more
    modern but flatter 'legal' or the potentially ambiguous 'regular'.
- source_word: ἐκκλησίᾳ
  chosen: assembly
  alternatives:
  - meeting
  - court
  lexicon: BDAG
  rationale: In Acts this term can denote a gathered civic body as well as a congregation.
    Here the Ephesian town clerk refers to a legally constituted civic gathering,
    so 'assembly' preserves the Greek term's public-gathering sense without importing
    specifically Christian-church associations. 'Court' is too interpretive because
    the word itself is not a judicial term.
- source_word: ἐπιλυθήσεται
  chosen: it will be settled
  alternatives:
  - it will be resolved
  - it will be decided
  lexicon: BDAG
  rationale: Future passive indicating that the matter will be resolved. 'Settled'
    is idiomatic in English for legal/civic dispute resolution and matches the procedural
    context.
- source_word: τι
  chosen: anything
  alternatives:
  - something
  - any matter
  lexicon: BDAG
  rationale: Indefinite pronoun in a conditional clause. 'Anything' works smoothly
    with 'if you seek' and conveys an open-ended additional matter.
