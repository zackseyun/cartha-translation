theological_decisions:
- issue: Rendering of ἐκκλησία in a non-Christian civic context
  chosen_reading: assembly
  alternative_readings:
  - church
  - meeting
  rationale: Because the referent is a lawful civic gathering in Ephesus rather than
    the Christian community, 'assembly' is required by context. This avoids misleading
    ecclesial overtones while preserving the core sense of ἐκκλησία as an assembled
    body.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
