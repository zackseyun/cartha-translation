id: ACT.19.40
reference: Acts 19:40
source:
  edition: SBLGNT
  text: καὶ γὰρ κινδυνεύομεν ἐγκαλεῖσθαι στάσεως περὶ τῆς σήμερον μηδενὸς αἰτίου ὑπάρχοντος
    περὶ οὗ οὐ δυνησόμεθα ⸀ἀποδοῦναι λόγον ⸀περὶ τῆς συστροφῆς ταύτης. καὶ ταῦτα εἰπὼν
    ἀπέλυσεν τὴν ἐκκλησίαν.
translation:
  text: For indeed we are in danger of being charged with rioting over what happened
    today, since there is no cause for it, and we will not be able to give an account
    for this disorderly gathering. And after saying these things, he dismissed the
    assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with sedition' or 'with insurrection'; the Greek term can denote a serious
      civil uprising, but here 'rioting' best fits the immediate context of a public
      uproar.
    reason: lexical_alternative
  - marker: b
    text: Or 'commotion' or 'mob'; the Greek refers to this tumultuous gathering and
      is distinct from the more formal 'assembly' later in the verse.
    reason: lexical_alternative
  - marker: c
    text: The word translated 'assembly' is the same Greek word often used elsewhere
      for 'church,' but here it refers to the civic assembly in Ephesus.
    reason: cross_reference
lexical_decisions:
- source_word: κινδυνεύομεν
  chosen: we are in danger
  alternatives:
  - we risk
  - we are at risk
  lexicon: BDAG
  rationale: Present indicative conveys a current state of danger; 'are in danger'
    is natural English and preserves the immediacy.
- source_word: ἐγκαλεῖσθαι
  chosen: of being charged
  alternatives:
  - to be accused
  - to be brought to account
  lexicon: BDAG
  rationale: The verb commonly has legal/forensic force, so 'being charged' best reflects
    the civic-judicial context of the town clerk's warning.
- source_word: στάσεως
  chosen: with rioting
  alternatives:
  - with insurrection
  - with sedition
  - with disturbance
  lexicon: BDAG
  rationale: In this context of a public uproar before Roman authorities, the term
    denotes a riotous civil disturbance. 'Rioting' captures the legal and public-order
    sense better than the broader 'disturbance,' while avoiding the potentially overstated
    political sense of 'insurrection'.
- source_word: περὶ τῆς σήμερον
  chosen: over what happened today
  alternatives:
  - concerning today
  - about today's events
  lexicon: BDAG
  rationale: This idiomatic rendering makes explicit the reference to the present
    day's incident while remaining faithful to the Greek construction.
- source_word: μηδενὸς αἰτίου ὑπάρχοντος
  chosen: since there is no cause for it
  alternatives:
  - there being no cause
  - since no valid reason exists
  lexicon: BDAG
  rationale: A genitive absolute expressing the absence of legitimate grounds. 'Cause'
    preserves the legal nuance of αἴτιον in context.
- source_word: ἀποδοῦναι λόγον
  chosen: to give an account
  alternatives:
  - to give a reason
  - to render an explanation
  lexicon: BDAG
  rationale: This is a standard idiom for answering or explaining oneself. 'Give an
    account' preserves both the formal and explanatory sense.
- source_word: συστροφῆς
  chosen: disorderly gathering
  alternatives:
  - commotion
  - mob
  - concourse
  lexicon: BDAG
  rationale: The noun denotes a crowding together or tumultuous gathering. 'Disorderly
    gathering' fits the civic/legal setting and avoids overtranslating it as 'mob'
    while still distinguishing it from the more formal ἐκκλησία later in the verse.
- source_word: ἐκκλησίαν
  chosen: assembly
  alternatives:
  - gathering
  - crowd
  lexicon: BDAG
  rationale: Here the word refers to the civic assembly, not the church. 'Assembly'
    preserves the formal public sense and avoids ecclesiastical misunderstanding.
- source_word: ἀπέλυσεν
  chosen: dismissed
  alternatives:
  - sent away
  - dispersed
  lexicon: BDAG
  rationale: In context of a public meeting, 'dismissed' is the most idiomatic rendering.
- source_word: καὶ γὰρ
  chosen: For indeed
  alternatives:
  - For
  - Indeed
  lexicon: BDAG
  rationale: The combination gives explanatory emphasis; 'For indeed' preserves both
    the connective and emphatic force.
