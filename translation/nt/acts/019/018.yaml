id: ACT.19.18
reference: Acts 19:18
source:
  edition: SBLGNT
  text: πολλοί τε τῶν πεπιστευκότων ἤρχοντο ἐξομολογούμενοι καὶ ἀναγγέλλοντες τὰς
    πράξεις αὐτῶν.
translation:
  text: And many of those who had believed were coming, confessing and disclosing
    their practices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their deeds' or 'the things they had done.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοί
  chosen: many
  alternatives:
  - a large number
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural concise English
    equivalent.
- source_word: τε
  chosen: And
  alternatives:
  - now
  - also
  lexicon: BDAG
  rationale: The particle links this sentence to the preceding narrative with mild
    continuative force. English often leaves τέ untranslated, but 'And' best preserves
    the flow here alongside readable style.
- source_word: τῶν πεπιστευκότων
  chosen: of those who had believed
  alternatives:
  - of the believers
  - of those who believed
  lexicon: BDAG
  rationale: The perfect participle of πιστεύω points to a prior act with continuing
    state; 'those who had believed' preserves the temporal nuance better than the
    more static label 'believers,' while remaining natural English.
- source_word: ἤρχοντο
  chosen: were coming
  alternatives:
  - came
  - kept coming
  lexicon: BDAG
  rationale: Imperfect middle/deponent indicates ongoing or repeated action in past
    time. 'Were coming' preserves the imperfective aspect without overinterpreting
    frequency; 'kept coming' is possible but slightly more interpretive.
- source_word: ἐξομολογούμενοι
  chosen: confessing
  alternatives:
  - openly confessing
  - admitting
  lexicon: BDAG
  rationale: The participle denotes confession or acknowledgment. 'Confessing' is
    the most direct rendering and leaves open whether the confession is of sins, deeds,
    or involvement, which the context then clarifies.
- source_word: ἀναγγέλλοντες
  chosen: disclosing
  alternatives:
  - declaring
  - reporting
  - making known
  lexicon: BDAG
  rationale: The verb means to report or make known. 'Disclosing' fits the context
    of formerly hidden occult involvement being brought into the open, while avoiding
    redundancy with 'confessing.'
- source_word: τὰς πράξεις αὐτῶν
  chosen: their practices
  alternatives:
  - their deeds
  - the things they had done
  lexicon: BDAG
  rationale: πρᾶξις can mean deed, practice, or activity. In this context of magic
    arts and prior behavior, 'practices' best captures habitual or characteristic
    actions rather than a single act.
