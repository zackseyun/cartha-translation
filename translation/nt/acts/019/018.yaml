theological_decisions:
- issue: Whether πεπιστευκότων should be rendered as a settled group label ('believers')
    or as a prior act/state ('those who had believed').
  chosen_reading: those who had believed
  alternative_readings:
  - the believers
  - those who believed
  rationale: The perfect participle naturally highlights prior belief with continuing
    relevance. This avoids importing a technical ecclesial label where the Greek simply
    describes those who had come to faith.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether τὰς πράξεις αὐτῶν refers specifically to sins, magical practices,
    or deeds more generally.
  chosen_reading: their practices
  alternative_readings:
  - their deeds
  - their sins
  rationale: The immediate context concerns former magical activity, but the noun
    itself is broader than 'sins.' 'Practices' preserves the contextual sense without
    narrowing the term beyond what the Greek explicitly states.
  doctrine_reference: Translation philosophy §1, §3
