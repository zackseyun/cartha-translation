theological_decisions:
- issue: Temporal relation between faith and receiving the Holy Spirit
  chosen_reading: Rendered as 'when you believed'
  alternative_readings:
  - '''after you believed'''
  - '''upon believing'''
  rationale: The Greek participle πιστεύσαντες is temporally related to ἐλάβετε but
    does not by itself settle a detailed theology of subsequence or simultaneity.
    The chosen wording preserves the text's question without resolving a debated doctrinal
    issue beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the disciples' ignorance regarding the Holy Spirit
  chosen_reading: Rendered as 'we have not even heard that there is a Holy Spirit'
  alternative_readings:
  - '''we have not even heard whether there is a Holy Spirit'''
  - '''we have not even heard that the Holy Spirit has been given'''
  rationale: The Greek wording is terse and has generated interpretive discussion.
    The chosen rendering follows the plain sense of the clause while avoiding explanatory
    additions not present in the text. Alternatives are preserved in a footnote for
    auditability.
  doctrine_reference: Original-language primacy over translation tradition; Preserve
    theological tension rather than resolve it.
