id: ACT.19.2
reference: Acts 19:2
source:
  edition: SBLGNT
  text: εἶπέν ⸀τε πρὸς αὐτούς· Εἰ πνεῦμα ἅγιον ἐλάβετε πιστεύσαντες; οἱ ⸀δὲ πρὸς αὐτόν·
    Ἀλλ’ οὐδ’ εἰ πνεῦμα ἅγιον ἔστιν ἠκούσαμεν.
translation:
  text: And he said to them, “Did you receive the Holy Spirit when you believed?”
    And they said to him, “No, we have not even heard that there is a Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Did you receive the Holy Spirit after believing?' The Greek participle
      can be understood with slightly different temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we have not even heard whether there is a Holy Spirit,' or more interpretively,
      'we have not even heard that the Holy Spirit has been given.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπέν τε
  chosen: And he said
  alternatives:
  - Then he said
  - He also said
  lexicon: BDAG
  rationale: λέγω is straightforwardly 'say.' The enclitic τέ lightly connects the
    clause to the preceding narrative; in natural English, 'And' adequately carries
    the connective force without overtranslating.
- source_word: Εἰ ... ἐλάβετε πιστεύσαντες
  chosen: Did you receive ... when you believed?
  alternatives:
  - Did you receive ... after believing?
  - Did you receive ... upon believing?
  lexicon: BDAG
  rationale: The aorist participle πιστεύσαντες with the main verb ἐλάβετε can be
    rendered temporally. 'When you believed' best preserves the relation without forcing
    a strict sequence ('after') or an instantaneous sense ('upon'). This keeps the
    Greek's temporal flexibility and avoids importing denominational conclusions about
    Spirit reception.
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: In this context πνεῦμα ἅγιον refers personally to God's Holy Spirit,
    not a generic 'holy spirit.' English idiom normally uses the definite form here.
    Capitalization reflects personal reference in context.
- source_word: οἱ δὲ πρὸς αὐτόν
  chosen: And they said to him
  alternatives:
  - But they said to him
  - They replied to him
  lexicon: BDAG
  rationale: δέ marks a mild contrast or continuation. 'And' is smoother in English
    dialogue while still reflecting narrative progression; 'replied' is possible but
    slightly more interpretive than the simple verb supplied from context.
- source_word: Ἀλλ’ οὐδ’
  chosen: No, not even
  alternatives:
  - But not even
  - Rather, not even
  lexicon: BDAG
  rationale: The combination strengthens the negation in their response. English idiom
    expresses this naturally with an initial 'No' followed by 'not even,' preserving
    the emphatic denial.
- source_word: οὐδ’ εἰ πνεῦμα ἅγιον ἔστιν ἠκούσαμεν
  chosen: we have not even heard that there is a Holy Spirit
  alternatives:
  - we have not even heard whether there is a Holy Spirit
  - we have not even heard that the Holy Spirit has been given
  lexicon: BDAG
  rationale: The construction οὐδὲ εἰ can mean 'not even that' or 'not even whether.'
    The most direct sense here is lack of awareness that the Holy Spirit is present/known
    as such. 'That there is a Holy Spirit' is the standard, textually grounded rendering
    and avoids importing the interpretive expansion 'has been given,' which is not
    explicit in the Greek.
