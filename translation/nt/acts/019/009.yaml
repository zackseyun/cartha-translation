id: ACT.19.9
reference: Acts 19:9
source:
  edition: SBLGNT
  text: ὡς δέ τινες ἐσκληρύνοντο καὶ ἠπείθουν κακολογοῦντες τὴν ὁδὸν ἐνώπιον τοῦ πλήθους,
    ἀποστὰς ἀπ’ αὐτῶν ἀφώρισεν τοὺς μαθητάς, καθ’ ἡμέραν διαλεγόμενος ἐν τῇ σχολῇ
    ⸀Τυράννου.
translation:
  text: But when some became hardened and disobedient, speaking evil of the Way before
    the crowd, he withdrew from them and set apart the disciples, reasoning daily
    in the lecture hall of Tyrannus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unbelieving' or 'refusing to be persuaded' for 'disobedient.'
    reason: lexical_alternative
  - marker: b
    text: '''The Way'' was an early designation for the Christian movement in Acts.'
    reason: cultural_note
  - marker: c
    text: Or 'school of Tyrannus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκληρύνοντο
  chosen: became hardened
  alternatives:
  - were hardened
  - grew stubborn
  lexicon: BDAG
  rationale: Imperfect middle/passive conveys an ongoing process/state. 'Became hardened'
    captures the developing resistance without overinterpreting agency; 'grew stubborn'
    is possible but more interpretive.
- source_word: ἠπείθουν
  chosen: disobedient
  alternatives:
  - unbelieving
  - refused to be persuaded
  lexicon: BDAG
  rationale: ἀπειθέω can denote disobedience or unbelief. In this context of resisting
    Paul's message and publicly opposing it, 'disobedient' preserves the moral-volitional
    force better than the narrower 'unbelieving.'
- source_word: κακολογοῦντες
  chosen: speaking evil of
  alternatives:
  - reviling
  - slandering
  lexicon: BDAG
  rationale: The participle describes hostile public speech. 'Speaking evil of' is
    natural modern English and broad enough to cover abusive denunciation without
    requiring a legal sense like 'slandering.'
- source_word: τὴν ὁδὸν
  chosen: the Way
  alternatives:
  - this Way
  - the path
  lexicon: BDAG
  rationale: In Acts, 'the Way' is a recognized designation for the Christian movement.
    Retaining the capitalized expression preserves Luke's idiom and historical usage.
    'This Way' reflects some contexts in Acts but is not the wording here.
- source_word: ἐνώπιον τοῦ πλήθους
  chosen: before the crowd
  alternatives:
  - in the presence of the multitude
  - publicly before the people
  lexicon: BDAG
  rationale: This phrase indicates a public setting. 'Before the crowd' is concise,
    natural, and preserves the sense of open, public opposition.
- source_word: ἀποστὰς ἀπ’ αὐτῶν
  chosen: he withdrew from them
  alternatives:
  - having departed from them
  - he stood apart from them
  lexicon: BDAG
  rationale: The aorist participle marks Paul's decisive separation from the hostile
    group. 'Withdrew from them' communicates both departure and relational disengagement
    in idiomatic English.
- source_word: ἀφώρισεν
  chosen: set apart
  alternatives:
  - separated
  - took aside
  lexicon: BDAG
  rationale: ἀφορίζω means to separate or set apart. 'Set apart' preserves the deliberate
    distinction Paul made between the disciples and the opponents, without implying
    a merely spatial move. 'Separated' is possible but less idiomatic here.
- source_word: τοὺς μαθητάς
  chosen: the disciples
  alternatives:
  - the learners
  - the followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually appropriate rendering
    for μαθηταί in Acts, referring to committed followers within the Christian community.'
- source_word: καθ’ ἡμέραν
  chosen: daily
  alternatives:
  - every day
  - day by day
  lexicon: BDAG
  rationale: The phrase indicates regular daily activity. 'Daily' is concise and natural.
- source_word: διαλεγόμενος
  chosen: reasoning
  alternatives:
  - discussing
  - dialoguing
  - arguing
  lexicon: BDAG
  rationale: διαλέγομαι in Acts often denotes reasoned discourse or argumentation.
    'Reasoning' best reflects Paul's persuasive, explanatory activity without sounding
    overly technical.
- source_word: σχολῇ
  chosen: lecture hall
  alternatives:
  - school
  - hall
  lexicon: BDAG
  rationale: σχολή can mean school or lecture hall. In this setting, 'lecture hall'
    communicates a public instructional venue more clearly to modern readers than
    'school,' which may suggest a modern institutional school.
- source_word: Τυράννου
  chosen: of Tyrannus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The genitive is naturally rendered 'of Tyrannus.'
