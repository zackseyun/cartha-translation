theological_decisions:
- issue: Rendering of 'the Way' as a movement title
  chosen_reading: Capitalized 'the Way' referring to the Christian movement
  alternative_readings:
  - lowercase 'the way' as a generic path or teaching
  rationale: In Acts this expression functions as a recognizable designation for the
    Jesus movement, not merely a generic metaphor. Capitalization helps modern readers
    perceive the titular force without adding doctrinal content beyond Luke's usage.
  doctrine_reference: Translation philosophy §1, §5
