id: ACT.19.37
reference: Acts 19:37
source:
  edition: SBLGNT
  text: ἠγάγετε γὰρ τοὺς ἄνδρας τούτους οὔτε ἱεροσύλους οὔτε βλασφημοῦντας τὴν θεὸν
    ⸀ἡμῶν.
translation:
  text: For you have brought these men here who are neither temple robbers nor blasphemers
    of our goddess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''our god''; the referent is Artemis, so ''our goddess'' conveys
      the sense in natural English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάγετε
  chosen: you have brought
  alternatives:
  - you brought
  - you led
  lexicon: BDAG
  rationale: Aorist of ἄγω in direct address. 'Have brought' is natural English that
    reflects the completed action with present relevance in the scene; 'led' is possible
    but less idiomatic here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces the reason supporting the speaker's statement. 'For' preserves
    the explanatory force concisely.
- source_word: τοὺς ἄνδρας τούτους
  chosen: these men here
  alternatives:
  - these men
  - these persons
  lexicon: BDAG
  rationale: ἀνήρ normally means 'man/men' rather than a gender-neutral 'persons.'
    Adding 'here' brings out the deictic force of τούτους in the courtroom/public-assembly
    setting without overtranslation.
- source_word: οὔτε ... οὔτε
  chosen: neither ... nor
  alternatives:
  - not ... and not
  lexicon: BDAG
  rationale: Standard correlative negation in English matching the Greek structure.
- source_word: ἱεροσύλους
  chosen: temple robbers
  alternatives:
  - sacrilegious persons
  - robbers of temples
  lexicon: BDAG
  rationale: The term denotes those who rob temples or commit sacrilege against sacred
    property. 'Temple robbers' is the clearest and most concrete rendering in context.
- source_word: βλασφημοῦντας
  chosen: blasphemers
  alternatives:
  - speaking abusively against
  - reviling
  lexicon: BDAG
  rationale: The participle describes abusive speech against a deity. 'Blasphemers'
    is concise and fits the religious-legal context; the object clarifies whom they
    are accused of blaspheming.
- source_word: τὴν θεὸν ἡμῶν
  chosen: our goddess
  alternatives:
  - our god
  lexicon: BDAG
  rationale: Although θεός can be grammatically masculine or generic, the referent
    in context is Artemis of the Ephesians, a female deity. English should reflect
    the actual referent, so 'goddess' is required by context rather than a wooden
    'god.'
