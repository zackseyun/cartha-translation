theological_decisions:
- issue: Rendering θεὸν ἡμῶν with reference to Artemis
  chosen_reading: our goddess
  alternative_readings:
  - our god
  rationale: The speaker is a pagan Ephesian official referring to Artemis. Translating
    with 'goddess' preserves the contextual meaning and avoids misleading readers
    into hearing a reference to the true God. This is a lexical-contextual decision,
    not a theological endorsement.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
