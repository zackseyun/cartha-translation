id: ACT.23.18
reference: Acts 23:18
source:
  edition: SBLGNT
  text: ὁ μὲν οὖν παραλαβὼν αὐτὸν ἤγαγεν πρὸς τὸν χιλίαρχον καὶ φησίν· Ὁ δέσμιος Παῦλος
    προσκαλεσάμενός με ἠρώτησεν τοῦτον τὸν ⸀νεανίαν ἀγαγεῖν πρὸς σέ, ἔχοντά τι λαλῆσαί
    σοι.
translation:
  text: So he took him and brought him to the commander and said, “The prisoner Paul
    called me to him and asked me to bring this young man to you, since he has something
    to say to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “asked me to bring this youth to you.”
    reason: lexical_alternative
  - marker: b
    text: Greek χιλίαρχος, a Roman military commander; traditionally “tribune.”
    reason: cultural_note
lexical_decisions:
- source_word: παραλαβὼν
  chosen: took
  alternatives:
  - took aside
  - received
  lexicon: BDAG
  rationale: Aorist participle of παραλαμβάνω here introduces the attendant action
    before ἤγαγεν. 'Took' is natural English and fits the context of escorting the
    young man; 'received' is too formal and less idiomatic here.
- source_word: ἤγαγεν
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: BDAG
  rationale: ἄγω commonly means 'lead' or 'bring.' Because the destination is explicit
    ('to the commander'), 'brought' reads most naturally in English while preserving
    the movement toward the officer.
- source_word: χιλίαρχον
  chosen: commander
  alternatives:
  - tribune
  - military commander
  - chiliarch
  lexicon: BDAG
  rationale: χιλίαρχος denotes a Roman military officer, literally commander of a
    thousand. 'Commander' is clear modern English; 'tribune' is historically specific
    but less accessible, and 'chiliarch' is transliterated jargon.
- source_word: φησίν
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although φησίν is present tense (historical present), English narrative
    normally smooths this to past tense. 'Said' preserves the narrative sense without
    awkwardness.
- source_word: δέσμιος
  chosen: prisoner
  alternatives:
  - bound one
  - captive
  lexicon: BDAG
  rationale: δέσμιος refers to someone in custody or chains. 'Prisoner' is the clearest
    idiomatic rendering in this context.
- source_word: προσκαλεσάμενός με
  chosen: called me to him
  alternatives:
  - summoned me
  - called for me
  lexicon: BDAG
  rationale: The middle participle indicates Paul had the soldier come to him. 'Called
    me to him' makes the direction explicit and fits the prison setting. 'Summoned
    me' is possible but sounds more formal and authoritative than the context requires.
- source_word: ἠρώτησεν
  chosen: asked
  alternatives:
  - requested
  - urged
  lexicon: BDAG
  rationale: ἠρωτάω here conveys a request rather than interrogation. 'Asked' is the
    most straightforward rendering.
- source_word: νεανίαν
  chosen: young man
  alternatives:
  - youth
  - young fellow
  lexicon: BDAG
  rationale: νεανίας denotes a young male. 'Young man' is natural, accurate, and avoids
    colloquial or archaic alternatives.
- source_word: ἔχοντά τι λαλῆσαί σοι
  chosen: since he has something to say to you
  alternatives:
  - having something to tell you
  - with something to speak to you
  lexicon: BDAG
  rationale: The participial phrase modifies 'this young man' and explains the request.
    'Has something to say to you' is idiomatic English. 'Since' appropriately conveys
    the explanatory force in context without overstating causation.
