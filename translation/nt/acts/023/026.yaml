id: ACT.23.26
reference: Acts 23:26
source:
  edition: SBLGNT
  text: Κλαύδιος Λυσίας τῷ κρατίστῳ ἡγεμόνι Φήλικι χαίρειν.
translation:
  text: Claudius Lysias, to the most excellent governor Felix, greetings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to His Excellency Governor Felix.' The Greek honorific κρατίστῳ is a
      formal title of respect.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κλαύδιος Λυσίας
  chosen: Claudius Lysias
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: τῷ κρατίστῳ
  chosen: to the most excellent
  alternatives:
  - to his excellency
  - to the excellency
  lexicon: BDAG
  rationale: κρατίστῳ is a superlative honorific used in formal address. 'Most excellent'
    is natural modern English and matches the epistolary and official tone without
    sounding archaic. It also aligns with Luke-Acts usage for high officials.
- source_word: ἡγεμόνι
  chosen: governor
  alternatives:
  - ruler
  - prefect
  lexicon: BDAG
  rationale: ἡγεμών denotes a governing official. 'Governor' is the standard and clearest
    English equivalent in this Roman provincial context. 'Prefect' would be too specific
    here and may overstate the technical title.
- source_word: Φήλικι
  chosen: Felix
  rationale: Personal name transliterated by standard English convention.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - greeting
  - rejoice
  lexicon: BDAG
  rationale: In letter openings, χαίρειν functions as a conventional epistolary salutation
    rather than an imperative meaning 'rejoice.' 'Greetings' best captures the idiomatic
    force in natural English.
