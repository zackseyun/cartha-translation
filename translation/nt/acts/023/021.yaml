id: ACT.23.21
reference: Acts 23:21
source:
  edition: SBLGNT
  text: σὺ οὖν μὴ πεισθῇς αὐτοῖς, ἐνεδρεύουσιν γὰρ αὐτὸν ἐξ αὐτῶν ἄνδρες πλείους τεσσεράκοντα,
    οἵτινες ἀνεθεμάτισαν ἑαυτοὺς μήτε φαγεῖν μήτε πιεῖν ἕως οὗ ἀνέλωσιν αὐτόν, καὶ
    νῦν ⸂εἰσιν ἕτοιμοι⸃ προσδεχόμενοι τὴν ἀπὸ σοῦ ἐπαγγελίαν.
translation:
  text: So do not be persuaded by them, for more than forty men from among them are
    lying in ambush for him, who have bound themselves under a curse neither to eat
    nor to drink until they have killed him. And now they are ready, waiting for the
    promise from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have put themselves under an oath'; the Greek expression includes the
      idea of invoking a curse upon themselves if they fail.
    reason: lexical_alternative
  - marker: b
    text: That is, they are waiting for your agreement or authorization.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεισθῇς
  chosen: be persuaded
  alternatives:
  - be convinced
  - listen to
  - yield to
  lexicon: BDAG
  rationale: Passive imperative of πείθω; 'be persuaded' preserves the verbal idea
    of being won over rather than the more interpretive 'listen to' or 'yield to.'
    In context it functions as a warning not to let their request sway him.
- source_word: ἐνεδρεύουσιν
  chosen: are lying in ambush
  alternatives:
  - are waiting in ambush
  - are plotting against
  lexicon: BDAG
  rationale: The verb specifically denotes ambush/lying in wait. 'Are lying in ambush'
    keeps the concrete hostile imagery better than the broader 'plotting against.'
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - of them
  - from them
  lexicon: BDAG
  rationale: Clarifies that the men are drawn from the group just mentioned, not merely
    acting on behalf of them.
- source_word: ἄνδρες πλείους τεσσεράκοντα
  chosen: more than forty men
  alternatives:
  - over forty men
  lexicon: BDAG
  rationale: Natural English rendering of the comparative plus numeral while preserving
    the count's force.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - men who
  - such men as
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause. Simple 'who' is idiomatic and
    sufficient in English.
- source_word: ἀνεθεμάτισαν ἑαυτοὺς
  chosen: have bound themselves under a curse
  alternatives:
  - have put themselves under an oath
  - have cursed themselves
  lexicon: BDAG
  rationale: The expression conveys a self-imprecation/oath invoking a curse if they
    fail. 'Bound themselves under a curse' preserves both the solemnity and the curse
    element better than the flatter 'put themselves under an oath.'
- source_word: μήτε φαγεῖν μήτε πιεῖν
  chosen: neither to eat nor to drink
  alternatives:
  - not to eat or drink
  lexicon: BDAG
  rationale: Retains the correlative structure and formal force of the vow.
- source_word: ἕως οὗ ἀνέλωσιν αὐτόν
  chosen: until they have killed him
  alternatives:
  - until they kill him
  - until they do away with him
  lexicon: BDAG
  rationale: ἀναιρέω here means to kill/remove by violence. 'Until they have killed
    him' fits the aorist subjunctive in a future-oriented temporal clause and makes
    the murderous intent explicit.
- source_word: εἰσιν ἕτοιμοι
  chosen: they are ready
  alternatives:
  - they stand ready
  lexicon: BDAG
  rationale: Straightforward rendering of copula plus adjective; concise and natural.
- source_word: προσδεχόμενοι
  chosen: waiting
  alternatives:
  - expecting
  - awaiting
  lexicon: BDAG
  rationale: The participle indicates expectant waiting. 'Waiting' is clear; the object
    that follows supplies the content of expectation.
- source_word: τὴν ἀπὸ σοῦ ἐπαγγελίαν
  chosen: the promise from you
  alternatives:
  - your promise
  - the assurance from you
  lexicon: BDAG
  rationale: ἐπαγγελία normally means 'promise.' 'The promise from you' closely follows
    the Greek construction and in context refers to the commander's expected agreement/authorization.
