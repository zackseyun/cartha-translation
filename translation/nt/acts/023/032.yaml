id: ACT.23.32
reference: Acts 23:32
source:
  edition: SBLGNT
  text: τῇ δὲ ἐπαύριον ἐάσαντες τοὺς ἱππεῖς ⸀ἀπέρχεσθαι σὺν αὐτῷ ὑπέστρεψαν εἰς τὴν
    παρεμβολήν·
translation:
  text: But on the next day, after letting the horsemen go on with him, they returned
    to the barracks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the camp." The Greek term can denote a camp or military quarters;
      here it likely refers to the Roman barracks/fortress in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  chosen: But on the next day
  alternatives:
  - And on the next day
  - Then the next day
  - On the following day
  lexicon: BDAG
  rationale: The idiom τῇ ... ἐπαύριον means 'on the next day' or 'the following day.'
    δέ is rendered 'But' as a mild narrative transition; 'And' is possible, but 'But'
    preserves the slight shift in scene without overstating contrast.
- source_word: ἐάσαντες
  chosen: after letting
  alternatives:
  - having allowed
  - after allowing
  - leaving
  lexicon: BDAG
  rationale: Aorist participle of ἐάω here means 'allow/permit/let.' 'After letting'
    gives natural English while preserving the participial action prior to the main
    verb. 'Leaving' would be too interpretive.
- source_word: τοὺς ἱππεῖς
  chosen: the horsemen
  alternatives:
  - the cavalry
  - the mounted soldiers
  lexicon: BDAG
  rationale: ἱππεῖς refers to mounted troops. 'Horsemen' is a clear, fairly formal
    rendering that stays close to the Greek. 'Cavalry' is possible but slightly more
    collective and military-technical.
- source_word: ἀπέρχεσθαι σὺν αὐτῷ
  chosen: go on with him
  alternatives:
  - go with him
  - continue on with him
  - depart with him
  lexicon: BDAG
  rationale: 'ἀπέρχεσθαι means ''go away/depart/go on,'' and with σύν + dative indicates
    accompaniment. ''Go on with him'' fits the escort context: the horsemen continue
    the journey with Paul while the others turn back. ''Depart with him'' is possible
    but less idiomatic here.'
- source_word: ὑπέστρεψαν
  chosen: they returned
  alternatives:
  - they turned back
  - they went back
  lexicon: BDAG
  rationale: ὑποστρέφω commonly means 'return' or 'turn back.' 'They returned' is
    the most natural narrative rendering.
- source_word: εἰς τὴν παρεμβολήν
  chosen: to the barracks
  alternatives:
  - to the camp
  - to the headquarters
  lexicon: BDAG
  rationale: παρεμβολή literally denotes a camp/encampment, but in this Jerusalem
    military setting it refers to the Roman quarters/fortress area from which the
    soldiers came. 'Barracks' best communicates the concrete referent in context without
    unnecessary technicality.
