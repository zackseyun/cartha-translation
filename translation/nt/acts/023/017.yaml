id: ACT.23.17
reference: Acts 23:17
source:
  edition: SBLGNT
  text: προσκαλεσάμενος δὲ ὁ Παῦλος ἕνα τῶν ἑκατονταρχῶν ἔφη· Τὸν νεανίαν τοῦτον ⸀ἄπαγε
    πρὸς τὸν χιλίαρχον, ἔχει γὰρ ⸂ἀπαγγεῖλαί τι⸃ αὐτῷ.
translation:
  text: So Paul called one of the centurions and said, “Take this young man to the
    commander, for he has something to report to him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to tell him.' The Greek verb can mean to report, announce, or tell;
      'report' was chosen because the context involves relaying urgent information.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  chosen: called
  alternatives:
  - summoned
  - called over
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι, introducing Paul’s action prior
    to speaking. 'Called' is natural modern English and adequately reflects the sense
    of summoning someone to oneself without sounding overly formal.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So'
    gives smooth English linkage to the preceding context while preserving the forward
    movement of the story.
- source_word: ἕνα τῶν ἑκατονταρχῶν
  chosen: one of the centurions
  alternatives:
  - one of the captains of a hundred
  lexicon: BDAG
  rationale: ἑκατοντάρχης is the standard Roman military rank 'centurion.' This is
    the conventional and precise historical equivalent.
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  - spoke
  lexicon: BDAG
  rationale: φημί is a common speech verb. 'Said' is the most direct and unobtrusive
    rendering in narrative dialogue.
- source_word: νεανίαν
  chosen: young man
  alternatives:
  - youth
  - young fellow
  lexicon: BDAG
  rationale: νεανίας refers to a younger male person. 'Young man' is clear, idiomatic,
    and avoids archaic tone.
- source_word: ἄπαγε
  chosen: Take
  alternatives:
  - lead
  - bring
  lexicon: BDAG
  rationale: Imperative of ἀπάγω, here meaning to lead or take someone along to another
    person. 'Take' is the most natural English command in this context.
- source_word: πρὸς τὸν χιλίαρχον
  chosen: to the commander
  alternatives:
  - to the tribune
  - to the chiliarch
  lexicon: BDAG
  rationale: χιλίαρχος denotes a military commander, specifically the Roman tribune
    in this context. 'Commander' is readable modern English; 'tribune' is more technical
    and possible, but less immediately accessible. The article indicates the known
    commander already present in the narrative.
- source_word: ἔχει γὰρ ἀπαγγεῖλαί τι αὐτῷ
  chosen: for he has something to report to him
  alternatives:
  - for he has something to tell him
  - for he has a message to give him
  lexicon: BDAG
  rationale: The construction ἔχει + infinitive expresses having something to do/say.
    ἀπαγγέλλω often carries the sense of reporting or relaying information. 'Has something
    to report to him' fits the context of conveying important intelligence and is
    slightly more precise than the broader 'tell.'
