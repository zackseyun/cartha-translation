id: ACT.23.15
reference: Acts 23:15
source:
  edition: SBLGNT
  text: νῦν οὖν ὑμεῖς ἐμφανίσατε τῷ χιλιάρχῳ σὺν τῷ συνεδρίῳ ⸀ὅπως ⸂καταγάγῃ αὐτὸν
    εἰς⸃ ὑμᾶς ὡς μέλλοντας διαγινώσκειν ἀκριβέστερον τὰ περὶ αὐτοῦ· ἡμεῖς δὲ πρὸ τοῦ
    ἐγγίσαι αὐτὸν ἕτοιμοί ἐσμεν τοῦ ἀνελεῖν αὐτόν.
translation:
  text: Now therefore, you, together with the council, make it known to the commander
    so that he may bring him down to you, as though you were about to examine more
    accurately the things concerning him. But we are ready to kill him before he comes
    near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring him before you.' The Greek verb literally includes the idea of
      bringing him down.
    reason: lexical_alternative
  - marker: b
    text: Or 'as if you were going to investigate his case more carefully.' The wording
      implies a pretense of further judicial examination.
    reason: lexical_alternative
  - marker: c
    text: Or 'before he arrives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμφανίσατε
  chosen: make it known
  alternatives:
  - inform
  - request
  lexicon: BDAG
  rationale: Aorist active imperative, here meaning to communicate or make a matter
    known to an authority. 'Make it known' preserves the formal sense without over-specifying
    the content as merely a request, though the context implies a formal communication.
- source_word: χιλιάρχῳ
  chosen: commander
  alternatives:
  - tribune
  - military commander
  lexicon: BDAG
  rationale: Refers to the Roman chiliarch, a commander over a cohort. 'Commander'
    is clear modern English; 'tribune' is more technical and less accessible.
- source_word: σὺν τῷ συνεδρίῳ
  chosen: together with the council
  alternatives:
  - with the Sanhedrin
  - along with the council
  lexicon: BDAG
  rationale: σύν marks association. συνέδριον can denote the Jewish ruling council;
    'the council' is a transparent translation, while 'Sanhedrin' is a possible contextual
    gloss but more interpretive. The article supports a known body, but 'council'
    keeps the translation closer to the Greek.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: καταγάγῃ αὐτὸν εἰς ὑμᾶς
  chosen: he may bring him down to you
  alternatives:
  - he may bring him before you
  - he may lead him down to you
  lexicon: BDAG
  rationale: κατάγω literally means 'bring down' or 'lead down.' Because the narrative
    setting involves movement to the council, 'bring him down to you' preserves the
    directional nuance. 'Before you' is smoother but less literal.
- source_word: ὡς μέλλοντας
  chosen: as though you were about to
  alternatives:
  - as if you intended to
  - on the pretense that you were going to
  lexicon: BDAG
  rationale: ὡς with the participle conveys a presented or pretended intention. 'As
    though you were about to' captures the deceptive pretense without adding too much
    interpretive weight.
- source_word: διαγινώσκειν
  chosen: examine
  alternatives:
  - investigate
  - determine
  lexicon: BDAG
  rationale: The verb here carries the sense of examining or deciding after investigation.
    'Examine' fits the judicial context and reads naturally with the infinitive construction.
- source_word: ἀκριβέστερον
  chosen: more accurately
  alternatives:
  - more carefully
  - more exactly
  lexicon: BDAG
  rationale: Comparative adverb indicating greater precision. 'More accurately' preserves
    the comparative and the forensic nuance.
- source_word: τὰ περὶ αὐτοῦ
  chosen: the things concerning him
  alternatives:
  - the matters about him
  - his case
  lexicon: BDAG
  rationale: A fairly literal rendering of the idiom. 'His case' is idiomatic in English
    but slightly more interpretive; 'the things concerning him' keeps the wording
    auditable.
- source_word: πρὸ τοῦ ἐγγίσαι αὐτὸν
  chosen: before he comes near
  alternatives:
  - before he arrives
  - before he gets close
  lexicon: BDAG
  rationale: πρὸ τοῦ with infinitive marks prior time. ἐγγίζω means 'come near' or
    'approach.' 'Before he comes near' preserves the spatial nuance and the infinitival
    construction's sense.
- source_word: ἕτοιμοί ἐσμεν
  chosen: we are ready
  alternatives:
  - we are prepared
  lexicon: BDAG
  rationale: Straightforward predicate adjective plus copula. 'Ready' is concise and
    natural.
- source_word: τοῦ ἀνελεῖν αὐτόν
  chosen: to kill him
  alternatives:
  - to do away with him
  - to murder him
  lexicon: BDAG
  rationale: ἀναιρέω in this context means to kill or do away with. 'Kill him' is
    the clearest direct rendering. 'Murder him' reflects the moral character of the
    act but imports evaluative language not explicit in the verb itself.
