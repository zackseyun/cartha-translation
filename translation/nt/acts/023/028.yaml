id: ACT.23.28
reference: Acts 23:28
source:
  edition: SBLGNT
  text: βουλόμενός ⸀τε ⸀ἐπιγνῶναι τὴν αἰτίαν δι’ ἣν ἐνεκάλουν αὐτῷ, ⸀κατήγαγον εἰς
    τὸ συνέδριον αὐτῶν.
translation:
  text: And wanting to know the charge for which they were accusing him, I brought
    him down to their council.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their Sanhedrin." The Greek συνέδριον refers to a council; in this context
      it likely denotes the Jewish ruling council in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενός
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  - intending
  lexicon: BDAG
  rationale: The participle introduces Lysias's motive. 'Wanting' is natural modern
    English and preserves the volitional sense without sounding overly formal.
- source_word: τε
  chosen: And
  alternatives:
  - so
  - then
  - ''
  lexicon: BDAG
  rationale: τέ lightly connects this clause to the previous statement. English often
    leaves it untranslated, but 'And' preserves the connective flow in this formal
    report.
- source_word: ἐπιγνῶναι
  chosen: to know
  alternatives:
  - to learn
  - to find out fully
  lexicon: BDAG
  rationale: The aorist infinitive expresses the purpose of the participle. Although
    ἐπιγινώσκω can carry the nuance of fuller or precise knowledge, here 'to know'
    is idiomatic and sufficient in context.
- source_word: τὴν αἰτίαν
  chosen: the charge
  alternatives:
  - the reason
  - the accusation
  - the cause
  lexicon: BDAG
  rationale: In this legal setting, αἰτία refers not merely to a general reason but
    to the basis of accusation. 'The charge' best captures the forensic sense in concise
    English.
- source_word: δι’ ἣν
  chosen: for which
  alternatives:
  - why
  - on account of which
  lexicon: BDAG
  rationale: This relative construction modifies 'charge' and explains its content.
    'For which' keeps the relation explicit and fits the legal tone.
- source_word: ἐνεκάλουν
  chosen: they were accusing
  alternatives:
  - they were bringing charges against
  - they were prosecuting
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated accusation. 'They were accusing'
    preserves that aspect and remains readable; the legal nuance is already carried
    by 'charge'.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - against him
  lexicon: BDAG
  rationale: The dative with ἐγκαλέω means 'bring charges against someone.' In English,
    the object is naturally rendered 'him,' with the adversative sense supplied by
    the verb phrase.
- source_word: κατήγαγον
  chosen: I brought him down
  alternatives:
  - I took him down
  - I led him down
  lexicon: BDAG
  rationale: The verb literally means 'brought down,' likely reflecting movement to
    the council venue. Retaining 'down' preserves the spatial detail present in the
    Greek.
- source_word: συνέδριον
  chosen: council
  alternatives:
  - Sanhedrin
  - assembly
  lexicon: BDAG
  rationale: συνέδριον can denote the Jewish ruling council. 'Council' translates
    the term rather than importing the more specific traditional label 'Sanhedrin,'
    which is possible but not required by the Greek alone.
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - the Jews'
  - their own
  lexicon: BDAG
  rationale: The pronoun identifies the council as belonging to Paul's accusers/people
    under discussion. 'Their' is the direct and sufficiently clear rendering.
