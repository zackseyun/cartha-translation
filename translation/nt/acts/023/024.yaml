  from: after putting Paul on them they may bring him safely
  to: they may put Paul on them and bring him safely
  rationale: The current rendering translates the aorist participle (ἐπιβιβάσαντες) with a subordinate temporal clause ('after putting...'), which is a literal representation of the grammar but results in a slightly cumbersome English phrase. A more idiomatic approach is to render the participle and the main verb as a compound predicate ('put... and bring...'). This is a common translation strategy that improves flow while accurately conveying the sequence of actions within the purpose clause.
