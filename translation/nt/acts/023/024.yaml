id: ACT.23.24
reference: Acts 23:24
source:
  edition: SBLGNT
  text: κτήνη τε παραστῆσαι ἵνα ἐπιβιβάσαντες τὸν Παῦλον διασώσωσι πρὸς Φήλικα τὸν
    ἡγεμόνα,
translation:
  text: and provide mounts, so that after putting Paul on them they may bring him
    safely to Felix the governor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'animals' or 'beasts of burden'; the Greek does not specify the kind
      of mount.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτήνη
  chosen: mounts
  alternatives:
  - animals
  - beasts
  - horses
  lexicon: BDAG
  rationale: κτῆνος broadly denotes a beast of burden or riding animal, not specifically
    horses. 'Mounts' is natural English that preserves the functional sense without
    over-specifying the species.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - both
  lexicon: BDAG
  rationale: τε here links this instruction with the preceding commands. In English,
    simple 'and' best carries the connective force idiomatically.
- source_word: παραστῆσαι
  chosen: provide
  alternatives:
  - make ready
  - present
  - furnish
  lexicon: BDAG
  rationale: As an infinitive dependent on the command context, the sense is to have
    animals available or ready. 'Provide' communicates the practical force clearly
    in modern English.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' is idiomatic and preserves the purposive
    sense.
- source_word: ἐπιβιβάσαντες
  chosen: after putting ... on them
  alternatives:
  - having mounted
  - after seating ... on them
  lexicon: BDAG
  rationale: The participle means to cause someone to mount or board. Because the
    object is Paul and the implied vehicle/animal is from κτήνη, 'after putting Paul
    on them' is explicit and natural.
- source_word: διασώσωσι
  chosen: they may bring him safely
  alternatives:
  - they may bring safely through
  - they may rescue and bring
  - they may deliver safely
  lexicon: BDAG
  rationale: διασῴζω emphasizes safe arrival or preservation through danger. In this
    escort context, 'bring him safely' captures both movement and protection better
    than the more abstract 'save' or 'rescue'.
- source_word: πρὸς
  chosen: to
  alternatives:
  - before
  - into the presence of
  lexicon: BDAG
  rationale: With a personal object and motion verb, πρός here indicates movement
    toward a person; 'to' is the most straightforward English rendering.
- source_word: ἡγεμόνα
  chosen: the governor
  alternatives:
  - the ruler
  - the prefect
  lexicon: BDAG
  rationale: ἡγεμών is a governing official. 'Governor' is the standard and clearest
    rendering in this Roman provincial context.
