id: ACT.23.25
reference: Acts 23:25
source:
  edition: SBLGNT
  text: γράψας ἐπιστολὴν ⸀ἔχουσαν τὸν τύπον τοῦτον·
translation:
  text: 'He wrote a letter having this form:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'He wrote a letter as follows.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γράψας
  chosen: He wrote
  alternatives:
  - having written
  - after writing
  lexicon: BDAG
  rationale: Aorist participle from γράφω, referring to the action of composing the
    letter by the subject from the previous verse. English commonly renders the participle
    with a finite verb here for natural narrative flow while preserving the sequence
    of action.
- source_word: ἐπιστολήν
  chosen: a letter
  alternatives:
  - an epistle
  lexicon: BDAG
  rationale: ἐπιστολή denotes a written communication or letter. 'Letter' is the clear,
    natural modern English equivalent; 'epistle' is accurate but too formal and ecclesiastical
    for this narrative context.
- source_word: ἔχουσαν
  chosen: having
  alternatives:
  - containing
  - with
  lexicon: BDAG
  rationale: Present participle modifying ἐπιστολήν, literally 'having.' In idiomatic
    English, 'having this form' preserves the participial structure and sense without
    over-paraphrasing.
- source_word: τύπον
  chosen: form
  alternatives:
  - content
  - wording
  - tenor
  lexicon: BDAG
  rationale: τύπος here refers to the pattern, form, or wording of the letter. 'Form'
    is a close lexical match and fits the idiom 'having this form.' 'Content' or 'wording'
    are possible interpretive renderings but slightly narrower.
- source_word: τοῦτον
  chosen: this
  alternatives:
  - as follows
  lexicon: BDAG
  rationale: Demonstrative pointing forward to the text of the letter. 'This' is formally
    accurate; English often expands the phrase idiomatically as 'as follows,' but
    the main text keeps the closer rendering.
