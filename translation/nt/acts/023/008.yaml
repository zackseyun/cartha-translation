id: ACT.23.8
reference: Acts 23:8
source:
  edition: SBLGNT
  text: Σαδδουκαῖοι ⸀μὲν γὰρ λέγουσιν μὴ εἶναι ἀνάστασιν ⸀μήτε ἄγγελον μήτε πνεῦμα,
    Φαρισαῖοι δὲ ὁμολογοῦσιν τὰ ἀμφότερα.
translation:
  text: For the Sadducees say there is no resurrection, nor angel nor spirit, but
    the Pharisees acknowledge both.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Pharisees acknowledge all three'—that is, resurrection, angel,
      and spirit. The Greek says 'both,' which most directly points to 'angel' and
      'spirit,' but some understand it more broadly from the context.
    reason: alternative_reading
lexical_decisions:
- source_word: Σαδδουκαῖοι
  chosen: the Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish sect name; names are transliterated
    rather than translated.
- source_word: μὲν γὰρ
  chosen: For
  alternatives:
  - For indeed
  - Now
  lexicon: BDAG
  rationale: The combination marks explanatory background. English 'For' captures
    the causal/explanatory force without overtranslating the particles individually.
- source_word: λέγουσιν
  chosen: say
  alternatives:
  - claim
  - maintain
  lexicon: BDAG
  rationale: A straightforward present-tense reporting verb fits the generic statement
    about Sadducean belief.
- source_word: μὴ εἶναι
  chosen: there is no
  alternatives:
  - that there is not
  - not to exist
  lexicon: BDAG
  rationale: Idiomatic English rendering of the infinitival clause after 'say,' expressing
    denial of existence.
- source_word: ἀνάστασιν
  chosen: resurrection
  alternatives:
  - a resurrection
  - rising again
  lexicon: BDAG
  rationale: The noun refers to resurrection as a category or reality, not merely
    a single event; anarthrous English works naturally here.
- source_word: μήτε ἄγγελον μήτε πνεῦμα
  chosen: nor angel nor spirit
  alternatives:
  - neither angel nor spirit
  - nor an angel nor a spirit
  lexicon: BDAG
  rationale: Preserves the correlative negation and the singular nouns of the Greek.
    The asyndetic list after 'no resurrection' is best represented compactly in English.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the sect name.
- source_word: ὁμολογοῦσιν
  chosen: acknowledge
  alternatives:
  - confess
  - affirm
  lexicon: BDAG
  rationale: Here the verb means to affirm or admit as true. 'Acknowledge' is natural
    English and avoids the potentially misleading penitential sense of 'confess.'
- source_word: τὰ ἀμφότερα
  chosen: both
  alternatives:
  - both things
  - all three
  lexicon: BDAG
  rationale: 'The idiom refers to the two categories just mentioned after resurrection:
    angel and spirit. Although three items appear in the sentence overall, the Greek
    ''both'' most naturally points to the paired items introduced by μήτε...μήτε.'
