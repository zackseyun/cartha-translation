theological_decisions:
- issue: Scope of 'both' in the Pharisees' affirmation
  chosen_reading: The Pharisees acknowledge both angel and spirit, in contrast to
    the Sadducees' denial of those two items.
  alternative_readings:
  - 'The Pharisees acknowledge all three: resurrection, angel, and spirit.'
  rationale: The Greek uses τὰ ἀμφότερα ('both'), not 'all' or 'the three.' Since
    the immediately preceding coordinated pair is 'angel' and 'spirit,' the main text
    preserves that wording. However, the broader context in Acts and known Pharisaic
    belief include resurrection as well, so the alternative understanding is worth
    preserving in a footnote rather than being imported into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
