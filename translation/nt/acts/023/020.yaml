theological_decisions:
- issue: Reference of 'the Jews' in a hostile narrative context
  chosen_reading: Retain 'The Jews' as the direct translation of Οἱ Ἰουδαῖοι
  alternative_readings:
  - The Jewish leaders
  - The Judeans
  rationale: 'The translation follows original-language primacy and does not narrow
    the referent beyond what the Greek explicitly states. Because the phrase can be
    misunderstood in English as a blanket ethnic statement, the context must govern
    interpretation: this refers to the particular Jewish group involved in the plot
    against Paul.'
  doctrine_reference: Translation philosophy §1, §6
