id: ACT.23.20
reference: Acts 23:20
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὅτι Οἱ Ἰουδαῖοι συνέθεντο τοῦ ἐρωτῆσαί σε ὅπως αὔριον ⸂τὸν Παῦλον
    καταγάγῃς εἰς τὸ συνέδριον⸃ ὡς ⸀μέλλον τι ἀκριβέστερον πυνθάνεσθαι περὶ αὐτοῦ·
translation:
  text: He said, “The Jews have agreed to ask you to bring Paul down to the Sanhedrin
    tomorrow, as though they were about to learn something more exact about him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'council.' The Greek συνέδριον here likely refers specifically to the
      Sanhedrin, the Jewish ruling council.
    reason: lexical_alternative
  - marker: b
    text: Or 'as if they were going to inquire more carefully about him.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνέθεντο
  chosen: have agreed
  alternatives:
  - have conspired
  - have arranged together
  - have made an agreement
  lexicon: BDAG
  rationale: The middle voice of συντίθεμαι here conveys coming to an agreement or
    forming a plan together. 'Have agreed' is natural English and fits the context
    without overstating the term as inherently sinister, though the surrounding narrative
    shows hostile intent.
- source_word: τοῦ ἐρωτῆσαί
  chosen: to ask
  alternatives:
  - to request
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose/content of the agreement.
    'To ask' is the most direct and idiomatic rendering of ἐρωτάω in this context.
- source_word: καταγάγῃς
  chosen: bring ... down
  alternatives:
  - lead ... down
  - take ... down
  lexicon: BDAG
  rationale: κατάγω commonly means to bring or lead down. Because the movement is
    from the barracks/fortress area to the council, 'bring ... down' preserves the
    directional force of κατά- and matches the narrative setting.
- source_word: συνέδριον
  chosen: Sanhedrin
  alternatives:
  - council
  lexicon: BDAG
  rationale: Although συνέδριον can mean 'council,' in Acts this commonly refers to
    the Jewish ruling council in Jerusalem. 'Sanhedrin' gives the specific institutional
    reference clearly for modern readers.
- source_word: ὡς
  chosen: as though
  alternatives:
  - as if
  - on the pretext that
  lexicon: BDAG
  rationale: Here ὡς introduces the pretense or claimed purpose behind the request.
    'As though' captures the deceptive appearance without over-paraphrasing.
- source_word: μέλλον τι ἀκριβέστερον πυνθάνεσθαι
  chosen: they were about to learn something more exact
  alternatives:
  - they intended to inquire more carefully into something
  - they were going to ascertain something more accurately
  lexicon: BDAG
  rationale: μέλλον with infinitive conveys impending intention; πυνθάνομαι means
    to learn by inquiry or ascertain; ἀκριβέστερον adds the sense of greater precision.
    'Learn something more exact' preserves the comparative force while remaining readable.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase in natural English.
- source_word: Οἱ Ἰουδαῖοι
  chosen: The Jews
  alternatives:
  - The Jewish leaders
  - The Judeans
  lexicon: BDAG
  rationale: The Greek text says 'the Jews.' In this immediate context it refers to
    the Jewish group plotting against Paul, not all Jewish people universally. 'The
    Jews' is retained as the direct rendering, while the narrative context supplies
    the narrower reference.
