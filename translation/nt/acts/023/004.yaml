theological_decisions:
- issue: Force of τοῦ θεοῦ in reference to the high priest
  chosen_reading: Rendered as 'God’s high priest' without implying divine approval
    of the individual’s conduct beyond the office named in the text.
  alternative_readings:
  - the high priest of God
  rationale: The phrase identifies the office in relation to God; the translation
    should not import a theological endorsement beyond what the Greek states. The
    possessive English form is idiomatic and semantically equivalent.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
