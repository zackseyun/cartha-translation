id: ACT.23.4
reference: Acts 23:4
source:
  edition: SBLGNT
  text: οἱ δὲ παρεστῶτες εἶπαν· Τὸν ἀρχιερέα τοῦ θεοῦ λοιδορεῖς;
translation:
  text: Those standing nearby said, “Are you insulting God’s high priest?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do you revile the high priest of God?”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ παρεστῶτες
  chosen: Those standing nearby
  alternatives:
  - Those who were standing by
  - The men standing there
  - Those present
  lexicon: BDAG
  rationale: The articular participle functions substantivally, referring to the people
    present beside Paul. 'Standing nearby' is natural modern English and preserves
    the spatial sense of παρίστημι without over-literal awkwardness.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - were saying
  lexicon: BDAG
  rationale: Aorist indicative here advances the narrative with a simple past, so
    'said' is the most natural rendering.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς in this context refers to the Jewish high priest, and 'high
    priest' is the standard, precise English equivalent.
- source_word: τοῦ θεοῦ
  chosen: God’s
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The genitive is naturally rendered as possession/association in English.
    'God’s high priest' is smoother than 'the high priest of God' while preserving
    the meaning.
- source_word: λοιδορεῖς
  chosen: are you insulting
  alternatives:
  - do you revile
  - are you abusing verbally
  - are you speaking evil of
  lexicon: BDAG
  rationale: λοιδορέω denotes verbal abuse, reviling, or insulting speech. 'Insulting'
    is clear contemporary English and fits the rebuking question. 'Revile' is more
    traditional but less accessible.
