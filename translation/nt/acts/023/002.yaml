id: ACT.23.2
reference: Acts 23:2
source:
  edition: SBLGNT
  text: ὁ δὲ ἀρχιερεὺς Ἁνανίας ἐπέταξεν τοῖς παρεστῶσιν αὐτῷ τύπτειν αὐτοῦ τὸ στόμα.
translation:
  text: But the high priest Ananias ordered those standing by him to strike him on
    the mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to slap him on the mouth.' The Greek verb can denote striking generally;
      'slap' is a plausible but more specific rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Rendered as a mild adversative/continuative conjunction. In context it
    marks the narrative response to Paul's preceding statement, and 'But' best captures
    the abrupt reaction without overstating contrast.
- source_word: ἀρχιερεὺς
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for the singular office/title ἀρχιερεύς in this context.
    'High priest' is the established and semantically precise English equivalent.
- source_word: Ἁνανίας
  chosen: Ananias
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: ἐπέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: The verb denotes giving an authoritative command. 'Ordered' is natural
    modern English and preserves the force of official authority.
- source_word: τοῖς παρεστῶσιν αὐτῷ
  chosen: those standing by him
  alternatives:
  - those who stood near him
  - those attending him
  lexicon: BDAG
  rationale: The participle from παρίστημι here refers to persons present beside or
    attending Ananias. 'Those standing by him' preserves the spatial sense and remains
    idiomatic.
- source_word: τύπτειν
  chosen: to strike
  alternatives:
  - to hit
  - to slap
  lexicon: BDAG
  rationale: τύπτω broadly means to strike or beat. 'Strike' is suitably formal and
    does not over-specify the manner. 'Slap' is possible in context but is more interpretive
    than the Greek requires.
- source_word: αὐτοῦ τὸ στόμα
  chosen: him on the mouth
  alternatives:
  - his mouth
  - in the mouth
  lexicon: BDAG
  rationale: The Greek literally has 'his mouth,' but idiomatic English with the infinitive
    of striking is 'strike him on the mouth.' This preserves the object and target
    clearly without wooden phrasing.
