id: ACT.23.19
reference: Acts 23:19
source:
  edition: SBLGNT
  text: ἐπιλαβόμενος δὲ τῆς χειρὸς αὐτοῦ ὁ χιλίαρχος καὶ ἀναχωρήσας κατ’ ἰδίαν ἐπυνθάνετο·
    Τί ἐστιν ὃ ἔχεις ἀπαγγεῖλαί μοι;
translation:
  text: So the commander took him by the hand and, drawing aside in private, began
    asking, “What is it that you have to report to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “taking him aside privately.”
    reason: lexical_alternative
  - marker: b
    text: Or, “What do you have to tell me?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλαβόμενος ... τῆς χειρὸς αὐτοῦ
  chosen: took him by the hand
  alternatives:
  - took hold of his hand
  - grasped his hand
  lexicon: BDAG
  rationale: The participle ἐπιλαβόμενος with the genitive of χείρ naturally means
    taking hold of someone's hand. 'Took him by the hand' is idiomatic modern English
    and preserves the concrete action without overstating force.
- source_word: δὲ
  chosen: So
  alternatives:
  - And
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'So' gives a natural English transition
    in context; 'and' would be more wooden, while 'then' is also possible. This is
    a discourse-level choice rather than a strong lexical contrast.
- source_word: ὁ χιλίαρχος
  chosen: the commander
  alternatives:
  - the tribune
  - the chiliarch
  - the military commander
  lexicon: BDAG
  rationale: χιλίαρχος denotes a Roman military officer, literally commander of a
    thousand. 'Commander' is clear modern English and fits Acts' narrative context
    better than the less familiar 'tribune' or untranslated 'chiliarch'.
- source_word: ἀναχωρήσας κατ’ ἰδίαν
  chosen: drawing aside in private
  alternatives:
  - taking him aside privately
  - withdrawing privately
  - going aside by themselves
  lexicon: BDAG
  rationale: The participle ἀναχωρήσας means withdrawing or going aside, and κατ’
    ἰδίαν means privately. 'Drawing aside in private' captures both movement away
    from others and the private setting. It also avoids adding an explicit object
    not present in the Greek, though the context implies the young man is taken aside.
- source_word: ἐπυνθάνετο
  chosen: began asking
  alternatives:
  - asked
  - inquired
  - was asking
  lexicon: BDAG
  rationale: The imperfect middle suggests an inceptive or progressive nuance in narrative.
    'Began asking' reflects that nuance better than a simple past 'asked,' while remaining
    natural English.
- source_word: Τί ἐστιν
  chosen: What is it
  alternatives:
  - What is this
  - What is
  lexicon: BDAG
  rationale: This idiomatic English rendering preserves the direct question and prepares
    for the following relative clause.
- source_word: ὃ ἔχεις ἀπαγγεῖλαί μοι
  chosen: that you have to report to me
  alternatives:
  - that you have to tell me
  - which you have to announce to me
  - that you have to inform me of
  lexicon: BDAG
  rationale: 'The construction ἔχεις + infinitive expresses possession of something
    to do/say: ''you have to report.'' ἀπαγγεῖλαι carries the sense of reporting or
    relaying information. ''Report'' fits the military/legal setting better than the
    more generic ''tell''.'
