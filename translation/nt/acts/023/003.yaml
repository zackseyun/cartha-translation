id: ACT.23.3
reference: Acts 23:3
source:
  edition: SBLGNT
  text: τότε ὁ Παῦλος πρὸς αὐτὸν εἶπεν· Τύπτειν σε μέλλει ὁ θεός, τοῖχε κεκονιαμένε·
    καὶ σὺ κάθῃ κρίνων με κατὰ τὸν νόμον, καὶ παρανομῶν κελεύεις με τύπτεσθαι;
translation:
  text: Then Paul said to him, “God is about to strike you, you whitewashed wall!
    And do you sit judging me according to the law, and yet in violation of the law
    command me to be struck?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God will strike you.' The Greek says literally, 'God is about to strike
      you,' which may emphasize imminence.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τύπτειν σε μέλλει ὁ θεός
  chosen: God is about to strike you
  alternatives:
  - God will strike you
  - God is going to strike you
  lexicon: BDAG
  rationale: μέλλει with the infinitive commonly conveys imminence or impending action.
    'Is about to strike' preserves that force better than a simple future, while remaining
    natural English. τύπτω here is rendered 'strike' rather than 'beat' because the
    singular threatened act is in view.
- source_word: τοῖχε κεκονιαμένε
  chosen: you whitewashed wall
  alternatives:
  - you plastered wall
  - you whitewashed partition
  lexicon: BDAG
  rationale: A vivid insult meaning outwardly clean or respectable but inwardly corrupt.
    'Whitewashed wall' is the established and accurate idiom in English and preserves
    the metaphor's force; 'whitewashed' reflects the perfect participle κεκονιαμένε.
- source_word: κάθῃ
  chosen: do you sit
  alternatives:
  - are you sitting
  - do you sit there
  lexicon: BDAG
  rationale: The present middle is retained with the concrete verb 'sit' rather than
    flattened to 'are seated,' preserving the rhetorical sharpness of Paul's rebuke.
- source_word: κρίνων με κατὰ τὸν νόμον
  chosen: judging me according to the law
  alternatives:
  - judging me by the law
  - sitting in judgment over me according to the law
  lexicon: BDAG
  rationale: κατὰ τὸν νόμον here indicates conformity to legal standard. 'According
    to the law' is both precise and idiomatic.
- source_word: παρανομῶν
  chosen: in violation of the law
  alternatives:
  - acting unlawfully
  - breaking the law
  lexicon: BDAG
  rationale: The participle denotes acting contrary to law. 'In violation of the law'
    preserves the legal register and creates a deliberate contrast with 'according
    to the law' in the prior clause.
- source_word: κελεύεις με τύπτεσθαι
  chosen: command me to be struck
  alternatives:
  - order me to be struck
  - command that I be struck
  lexicon: BDAG
  rationale: κελεύω is well rendered 'command' or 'order'; 'command me to be struck'
    closely follows the Greek construction and keeps the passive infinitive explicit.
- source_word: τότε ὁ Παῦλος πρὸς αὐτὸν εἶπεν
  chosen: Then Paul said to him
  alternatives:
  - Then Paul said to him in reply
  lexicon: BDAG
  rationale: A straightforward narrative introduction. No expansion beyond the Greek
    is needed.
