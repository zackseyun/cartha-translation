theological_decisions:
- issue: Nature of Paul's statement 'God is about to strike you'
  chosen_reading: Rendered as a prophetic/judicial declaration without softening or
    expanding it
  alternative_readings:
  - 'an imprecation or wish: ''May God strike you'''
  rationale: The Greek construction with μέλλει + infinitive most naturally states
    impending action rather than expressing a wish. The translation preserves the
    text's force without importing a theological judgment about Paul's moral propriety.
  doctrine_reference: Preserve theological tension rather than resolve it.
