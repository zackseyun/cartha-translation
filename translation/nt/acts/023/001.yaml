theological_decisions:
- issue: Rendering of Paul's self-description with πεπολίτευμαι
  chosen_reading: A general claim about his manner of life before God, not a technical
    assertion of civic status or sinless perfection.
  alternative_readings:
  - 'A more literal civic nuance: ''I have conducted myself as a citizen before God'''
  - A stronger moral claim that could be read as absolute innocence
  rationale: 'The verb πολιτεύομαι can carry civic overtones, but in this setting
    Paul''s point is ethical and covenantal: his life has been conducted with a good
    conscience before God. The translation avoids overstating either Roman/Jewish
    citizenship imagery or a claim of moral perfection beyond the text''s wording.'
  doctrine_reference: Translation philosophy §§1, 3, 5
