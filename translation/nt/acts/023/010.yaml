id: ACT.23.10
reference: Acts 23:10
source:
  edition: SBLGNT
  text: πολλῆς δὲ ⸀γινομένης στάσεως ⸀φοβηθεὶς ὁ χιλίαρχος μὴ διασπασθῇ ὁ Παῦλος ὑπ’
    αὐτῶν ἐκέλευσεν τὸ στράτευμα ⸀καταβὰν ἁρπάσαι αὐτὸν ἐκ μέσου αὐτῶν, ἄγειν ⸀τε
    εἰς τὴν παρεμβολήν.
translation:
  text: And when a great dispute arose, the commander, fearing that Paul might be
    torn apart by them, ordered the troops to go down, seize him from among them,
    and bring him into the barracks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dissension' or 'uproar' for 'dispute' (στάσις), a term that can denote
      sharp internal conflict and, in some contexts, civil unrest.
    reason: lexical_alternative
  - marker: b
    text: Or 'torn to pieces by them' for 'torn apart by them' (διασπασθῇ), preserving
      the vivid force of the Greek.
    reason: lexical_alternative
  - marker: c
    text: '''Barracks'' translates παρεμβολή, which can more literally mean ''camp'';
      here it refers to the Roman military quarters in Jerusalem.'
    reason: cultural_note
lexical_decisions:
- source_word: πολλῆς ... γινομένης στάσεως
  chosen: when a great dispute arose
  alternatives:
  - as a great dissension was developing
  - when a great uproar arose
  - when a great conflict arose
  lexicon: BDAG
  rationale: The genitive absolute marks a circumstantial clause. στάσις can denote
    dissension, strife, or uprising; here the immediate context is a violent dispute
    in the council rather than a formal rebellion, so 'dispute' best fits while 'great'
    preserves πολλῆς.
- source_word: φοβηθεὶς
  chosen: fearing
  alternatives:
  - being afraid
  - becoming afraid
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered with an English participle
    introducing the commander’s motive for the following action.
- source_word: χιλίαρχος
  chosen: the commander
  alternatives:
  - the tribune
  - the chiliarch
  lexicon: BDAG
  rationale: The term refers to a Roman military officer commanding roughly a cohort.
    'Commander' is clear modern English and avoids unexplained transliteration; 'tribune'
    is possible but less accessible.
- source_word: μὴ διασπασθῇ ὁ Παῦλος ὑπ’ αὐτῶν
  chosen: that Paul might be torn apart by them
  alternatives:
  - that Paul might be pulled to pieces by them
  - that Paul might be torn to pieces by them
  lexicon: BDAG
  rationale: διασπάω is vivid and forceful, indicating violent tearing apart. 'Might
    be torn apart' preserves the feared potential outcome without overstating beyond
    the Greek subjunctive construction after μή.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders to
  lexicon: BDAG
  rationale: A straightforward rendering of the main verb in military context.
- source_word: τὸ στράτευμα
  chosen: the troops
  alternatives:
  - the soldiers
  - the military force
  lexicon: BDAG
  rationale: στράτευμα denotes the body of soldiers under command. 'Troops' fits the
    collective singular and military setting.
- source_word: καταβὰν
  chosen: to go down
  alternatives:
  - to come down
  - after going down
  lexicon: BDAG
  rationale: The infinitival sequence after ἐκέλευσεν is best represented in English
    as coordinated infinitives. 'Go down' reflects the spatial movement from the fortress
    area to the council below.
- source_word: ἁρπάσαι αὐτὸν ἐκ μέσου αὐτῶν
  chosen: seize him from among them
  alternatives:
  - snatch him out of their midst
  - take him away from among them
  lexicon: BDAG
  rationale: ἁρπάζω conveys forceful removal. 'Seize' is natural English in a military
    rescue/arrest setting, while 'from among them' preserves ἐκ μέσου αὐτῶν.
- source_word: ἄγειν τε
  chosen: and bring him
  alternatives:
  - and lead him
  - and take him
  lexicon: BDAG
  rationale: ἄγω often means lead or bring. Because the destination follows and the
    context is escorting Paul into custody/protection, 'bring him' reads naturally.
- source_word: παρεμβολήν
  chosen: the barracks
  alternatives:
  - the camp
  - the fortress barracks
  lexicon: BDAG
  rationale: In Acts this term refers to the Roman military quarters attached to the
    fortress. 'Barracks' is the clearest contextual rendering; 'camp' would sound
    misleading in an urban Jerusalem setting.
