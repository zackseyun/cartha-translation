id: ACT.23.16
reference: Acts 23:16
source:
  edition: SBLGNT
  text: Ἀκούσας δὲ ὁ υἱὸς τῆς ἀδελφῆς Παύλου ⸂τὴν ἐνέδραν⸃ παραγενόμενος καὶ εἰσελθὼν
    εἰς τὴν παρεμβολὴν ἀπήγγειλεν τῷ Παύλῳ.
translation:
  text: But when Paul’s sister’s son heard of the ambush, he came and entered the
    barracks and reported it to Paul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the son of Paul’s sister'; that is, Paul’s nephew.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plot' or 'the conspiracy.' The Greek more specifically refers to
      an ambush or lying in wait.
    reason: lexical_alternative
  - marker: c
    text: Or 'entered the camp.' In this context the term likely refers to the Roman
      barracks.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσας
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω, functioning temporally before the main verb.
    'When ... heard' gives natural English while preserving the antecedent action.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative development with mild contrast or transition. 'But'
    fits the shift from the plot to its discovery; 'Now' or 'And' are possible but
    less pointed here.
- source_word: ὁ υἱὸς τῆς ἀδελφῆς Παύλου
  chosen: Paul’s sister’s son
  alternatives:
  - the son of Paul’s sister
  - Paul’s nephew
  lexicon: BDAG
  rationale: The Greek explicitly identifies the relation as 'the son of Paul’s sister.'
    The chosen rendering is natural English and preserves the exact familial relationship
    more transparently than the interpretive shorthand 'Paul’s nephew.'
- source_word: τὴν ἐνέδραν
  chosen: the ambush
  alternatives:
  - the plot
  - the conspiracy
  lexicon: BDAG
  rationale: ἐνέδρα literally denotes an ambush or lying in wait. 'The ambush' preserves
    the concrete sense of the planned attack better than the more general 'plot' or
    'conspiracy.'
- source_word: παραγενόμενος
  chosen: he came
  alternatives:
  - having come
  - appearing on the scene
  lexicon: BDAG
  rationale: The participle indicates arrival/presence prior to the next action. 'He
    came' is concise and idiomatic in sequence with the following participle.
- source_word: εἰσελθὼν εἰς τὴν παρεμβολὴν
  chosen: entered the barracks
  alternatives:
  - went into the barracks
  - entered the camp
  lexicon: BDAG
  rationale: παρεμβολή can mean camp or barracks. In this Jerusalem military setting,
    where Paul is under Roman custody, 'barracks' best fits the referent and avoids
    an overly generic 'camp.'
- source_word: ἀπήγγειλεν
  chosen: reported it
  alternatives:
  - told
  - announced
  - informed
  lexicon: BDAG
  rationale: ἀπαγγέλλω conveys reporting or relaying information. 'Reported it' matches
    the formal communication of discovered information and naturally takes the implied
    object from context.
- source_word: τῷ Παύλῳ
  chosen: to Paul
  lexicon: BDAG
  rationale: Simple dative indirect object; rendered directly.
