id: ACT.23.30
reference: Acts 23:30
source:
  edition: SBLGNT
  text: μηνυθείσης δέ μοι ἐπιβουλῆς εἰς τὸν ⸀ἄνδρα ἔσεσθαι ⸀ἐξαυτῆς ἔπεμψα πρὸς σέ,
    παραγγείλας καὶ τοῖς κατηγόροις ⸀λέγειν πρὸς αὐτὸν ἐπὶ ⸀σοῦ.
translation:
  text: And when I was informed that there would be a plot against the man, I sent
    him to you at once, also ordering his accusers to state their case before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to present their charges against him before you.' The Greek literally
      says 'to speak to/against him before you,' using courtroom language.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηνυθείσης
  chosen: when I was informed
  alternatives:
  - when it was reported to me
  - after being informed
  lexicon: BDAG
  rationale: Aorist passive genitive absolute from μηνύω, naturally rendered as a
    temporal-circumstantial clause in English. 'I was informed' is idiomatic and preserves
    the passive sense without awkwardness.
- source_word: ἐπιβουλῆς
  chosen: a plot
  alternatives:
  - an ambush
  - a conspiracy
  lexicon: BDAG
  rationale: ἐπιβουλή denotes a hostile plan or scheme. 'Plot' is broad and natural
    here; 'ambush' is possible in context but slightly more specific than the noun
    itself requires.
- source_word: εἰς τὸν ἄνδρα
  chosen: against the man
  alternatives:
  - against this man
  - against him
  lexicon: BDAG
  rationale: The preposition with ἀνήρ here indicates direction of hostility. 'The
    man' reflects the article and keeps the formal tone of the letter; it refers to
    Paul without prematurely substituting the pronoun.
- source_word: ἔσεσθαι
  chosen: there would be
  alternatives:
  - was going to be
  - would occur
  lexicon: BDAG
  rationale: Future infinitive of εἰμί complements the reported content of the warning.
    'There would be' is the most natural English way to express the impending existence
    of the plot.
- source_word: ἐξαυτῆς
  chosen: at once
  alternatives:
  - immediately
  - without delay
  lexicon: BDAG
  rationale: This adverb conveys immediacy. 'At once' is concise, idiomatic, and fits
    the official tone of the letter.
- source_word: ἔπεμψα πρὸς σέ
  chosen: I sent him to you
  alternatives:
  - I sent to you
  - I dispatched him to you
  lexicon: BDAG
  rationale: Although 'him' is not explicit in the Greek phrase, English idiom requires
    the object, clearly supplied from the context as Paul. 'Dispatched' is possible
    but sounds overly stiff in modern English.
- source_word: παραγγείλας
  chosen: also ordering
  alternatives:
  - having instructed
  - and I ordered
  lexicon: BDAG
  rationale: Aorist participle indicating attendant action accompanying the sending.
    'Also ordering' captures the participial linkage and the addition marked by καί.
- source_word: κατηγόροις
  chosen: his accusers
  alternatives:
  - the accusers
  - those accusing him
  lexicon: BDAG
  rationale: The context makes clear these are Paul's accusers. Supplying 'his' improves
    English clarity while preserving the referent.
- source_word: λέγειν πρὸς αὐτὸν
  chosen: to state their case
  alternatives:
  - to speak against him
  - to present their charges
  lexicon: BDAG
  rationale: Literally 'to speak to/against him,' but in judicial context this means
    to present accusations. 'State their case' is a clear optimal-equivalence rendering
    that fits legal proceedings.
- source_word: ἐπὶ σοῦ
  chosen: before you
  alternatives:
  - in your presence
  - before your tribunal
  lexicon: BDAG
  rationale: With judicial nuance, ἐπί plus genitive here means appearing before the
    authority of Felix. 'Before you' is concise and sufficiently formal.
