theological_decisions:
- issue: Historical-rhetorical presentation in the tribune's letter
  chosen_reading: Translate the tribune's claim straightforwardly without harmonizing
    it to the fuller narrative in Acts 21–22.
  alternative_readings:
  - Render in a way that signals he learned Paul's Roman status earlier than the narrative
    indicates
  - Paraphrase to smooth the apparent tension with the surrounding account
  rationale: The verse reports Claudius Lysias's own wording, which presents his actions
    favorably. The translation should reflect the Greek as written and not resolve
    the narrative tension by paraphrase or embellishment.
  doctrine_reference: Translation philosophy §1, §3
