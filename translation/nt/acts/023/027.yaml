id: ACT.23.27
reference: Acts 23:27
source:
  edition: SBLGNT
  text: τὸν ἄνδρα τοῦτον συλλημφθέντα ὑπὸ τῶν Ἰουδαίων καὶ μέλλοντα ἀναιρεῖσθαι ὑπ’
    αὐτῶν ἐπιστὰς σὺν τῷ στρατεύματι ⸀ἐξειλάμην, μαθὼν ὅτι Ῥωμαῖός ἐστιν,
translation:
  text: This man was seized by the Jews and was about to be killed by them, but I
    came with the troops and rescued him, having learned that he is a Roman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Judeans.' The Greek term can denote Jews in an ethnic-religious
      sense or people of Judea in a geographic sense; here it most likely refers to
      the Jewish crowd/opponents in Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: συλλημφθέντα
  chosen: was seized
  alternatives:
  - was arrested
  - was taken
  lexicon: BDAG
  rationale: Passive participle of συλλαμβάνω here denotes being apprehended or seized.
    'Was seized' is natural English and preserves the hostile action without implying
    a formal legal arrest.
- source_word: Ἰουδαίων
  chosen: the Jews
  alternatives:
  - the Judeans
  lexicon: BDAG
  rationale: In Acts this term can mean either ethnic-religious Jews or Judeans geographically.
    Here the reference is to the Jewish group in Jerusalem opposing Paul, and the
    conventional contextual sense is 'the Jews.' The alternative 'Judeans' is preserved
    in a footnote because the term is contextually debated.
- source_word: μέλλοντα ἀναιρεῖσθαι
  chosen: was about to be killed
  alternatives:
  - was about to be done away with
  - was about to be murdered
  lexicon: BDAG
  rationale: μέλλω with infinitive expresses imminence; ἀναιρέω in this context means
    to kill or do away with. 'Was about to be killed' is clear, idiomatic, and neither
    euphemistic nor overly interpretive.
- source_word: ἐπιστὰς
  chosen: I came
  alternatives:
  - I intervened
  - I came upon them
  - I stepped in
  lexicon: BDAG
  rationale: Aorist participle of ἐφίστημι here conveys sudden arrival/intervention.
    In smooth English, 'I came' works well with the following phrase 'with the troops';
    the intervention nuance is carried by the larger clause.
- source_word: σὺν τῷ στρατεύματι
  chosen: with the troops
  alternatives:
  - with the soldiers
  - with the force
  lexicon: BDAG
  rationale: στράτευμα denotes a military body or detachment. 'With the troops' is
    concise and natural, preserving the military sense without over-specifying unit
    size.
- source_word: ἐξειλάμην
  chosen: rescued him
  alternatives:
  - delivered him
  - took him away
  lexicon: BDAG
  rationale: Middle of ἐξαιρέω here means to rescue or deliver from danger. 'Rescued
    him' best fits the immediate context of imminent killing.
- source_word: μαθὼν
  chosen: having learned
  alternatives:
  - after learning
  - when I learned
  lexicon: BDAG
  rationale: Aorist participle of μανθάνω is best rendered as prior or attendant action.
    'Having learned' preserves the participial relation and the sequence stated in
    the Greek, even though the historical claim in the letter is rhetorically selective.
- source_word: Ῥωμαῖός ἐστιν
  chosen: he is a Roman
  alternatives:
  - he was a Roman citizen
  lexicon: BDAG
  rationale: Ῥωμαῖος means 'Roman'; in this legal context it implies Roman citizenship.
    'He is a Roman' is the direct lexical rendering and leaves the citizenship implication
    to context rather than importing it explicitly.
