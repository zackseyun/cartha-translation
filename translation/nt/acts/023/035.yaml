id: ACT.23.35
reference: Acts 23:35
source:
  edition: SBLGNT
  text: Διακούσομαί σου, ἔφη, ὅταν καὶ οἱ κατήγοροί σου παραγένωνται· ⸀κελεύσας ἐν
    τῷ πραιτωρίῳ ⸀τοῦ Ἡρῴδου φυλάσσεσθαι ⸀αὐτόν.
translation:
  text: “I will hear your case fully,” he said, “when your accusers also arrive.”
    And he ordered that he be kept under guard in Herod’s praetorium.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will hear you fully.” The Greek verb can mean to hear someone out
      completely; in this legal context, “hear your case fully” makes the judicial
      sense explicit.
    reason: lexical_alternative
  - marker: b
    text: Praetorium refers to the official residence or headquarters of the Roman
      governor; here, likely Herod’s palace in Caesarea.
    reason: cultural_note
lexical_decisions:
- source_word: Διακούσομαί
  chosen: I will hear your case fully
  alternatives:
  - I will hear you fully
  - I will examine your case fully
  lexicon: BDAG
  rationale: διακούω carries the sense of hearing through to the end or hearing fully.
    In legal context, English idiom is best conveyed by 'hear your case fully,' making
    explicit the judicial setting without adding content beyond the verb's force.
- source_word: σου
  chosen: your
  alternatives:
  - you
  lexicon: BDAG
  rationale: The genitive pronoun with διακούω can be rendered literally as 'hear
    you,' but in this courtroom context English more naturally expresses the object
    as 'your case.' This is an idiomatic expansion tied to the legal sense of the
    verb.
- source_word: ὅταν καὶ οἱ κατήγοροί σου παραγένωνται
  chosen: when your accusers also arrive
  alternatives:
  - when your accusers also come
  - whenever your accusers arrive
  lexicon: BDAG
  rationale: ὅταν with the subjunctive marks a future contingency, naturally rendered
    'when.' κατήγοροι is specifically 'accusers' in a legal setting. παραγίνομαι here
    means 'arrive' or 'come on the scene'; 'arrive' fits the formal judicial context.
- source_word: κελεύσας
  chosen: And he ordered
  alternatives:
  - Then he ordered
  - having given orders
  lexicon: BDAG
  rationale: The aorist participle is attendant to the main action and is best rendered
    as a finite verb in smooth English narrative. 'And he ordered' preserves sequence
    without awkwardness.
- source_word: πραιτωρίῳ
  chosen: praetorium
  alternatives:
  - governor's residence
  - palace
  lexicon: BDAG
  rationale: πραιτώριον denotes an official residence or headquarters. 'Praetorium'
    preserves the historical-administrative term and is recognizable in NT usage.
    A more interpretive gloss like 'governor's residence' is possible but less precise
    here, especially since it is further specified as Herod's.
- source_word: τοῦ Ἡρῴδου
  chosen: Herod’s
  alternatives:
  - of Herod
  lexicon: BDAG
  rationale: The genitive is possessive. 'Herod’s' is the natural English rendering
    and identifies the building as the Herodian palace complex used by the Roman governor.
- source_word: φυλάσσεσθαι
  chosen: be kept under guard
  alternatives:
  - be guarded
  - be kept in custody
  lexicon: BDAG
  rationale: The passive infinitive from φυλάσσω in this context refers to custodial
    guarding. 'Be kept under guard' clearly conveys ongoing protective detention without
    implying punitive imprisonment beyond the text.
- source_word: αὐτόν
  chosen: he
  alternatives:
  - him
  lexicon: BDAG
  rationale: In English the infinitival clause after 'ordered' is naturally recast
    as 'that he be kept under guard.' This preserves the referent while producing
    idiomatic syntax.
