id: ACT.23.23
reference: Acts 23:23
source:
  edition: SBLGNT
  text: Καὶ προσκαλεσάμενός ⸂τινας δύο⸃ τῶν ἑκατονταρχῶν εἶπεν· Ἑτοιμάσατε στρατιώτας
    διακοσίους ὅπως πορευθῶσιν ἕως Καισαρείας, καὶ ἱππεῖς ἑβδομήκοντα καὶ δεξιολάβους
    διακοσίους, ἀπὸ τρίτης ὥρας τῆς νυκτός,
translation:
  text: And calling two of the centurions to him, he said, “Prepare two hundred soldiers
    so that they may go as far as Caesarea, and seventy horsemen and two hundred spearmen,
    at the third hour of the night.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “two hundred right-hand guards”; the precise sense of the rare term translated
      “spearmen” is uncertain.
    reason: lexical_alternative
  - marker: b
    text: That is, about the third hour after nightfall, roughly 9 p.m. by Jewish
      reckoning.
    reason: cultural_note
lexical_decisions:
- source_word: προσκαλεσάμενός
  chosen: calling ... to him
  alternatives:
  - summoning
  - calling over
  lexicon: BDAG
  rationale: Aorist middle participle of προσκαλέομαι, introducing the main verb εἶπεν.
    'Calling ... to him' is natural English and preserves the sense of summoning persons
    into one's presence.
- source_word: τινας δύο τῶν ἑκατονταρχῶν
  chosen: two of the centurions
  alternatives:
  - certain two of the centurions
  - some two centurions
  lexicon: BDAG
  rationale: The idiom τινας δύο is best rendered simply as 'two' in English; retaining
    'certain' would sound wooden without adding meaningful nuance. ἑκατοντάρχης is
    the standard Roman rank 'centurion.'
- source_word: Ἑτοιμάσατε
  chosen: Prepare
  alternatives:
  - Make ready
  - Get ready
  lexicon: BDAG
  rationale: Imperative addressed to the centurions. 'Prepare' is direct, readable,
    and suitably formal for a military command.
- source_word: στρατιώτας διακοσίους
  chosen: two hundred soldiers
  lexicon: BDAG
  rationale: Straightforward accusative object plus numeral; 'soldiers' is the broad
    category distinct from the mounted troops and δεξιολάβοι that follow.
- source_word: ὅπως πορευθῶσιν
  chosen: so that they may go
  alternatives:
  - in order that they might travel
  - to go
  lexicon: BDAG
  rationale: ὅπως with subjunctive expresses purpose. 'So that they may go' preserves
    the purposive force without overcomplicating the English.
- source_word: ἕως Καισαρείας
  chosen: as far as Caesarea
  alternatives:
  - to Caesarea
  lexicon: BDAG
  rationale: ἕως with the genitive can denote extent up to a place. 'As far as Caesarea'
    preserves the directional nuance more precisely than the simpler 'to Caesarea.'
- source_word: ἱππεῖς ἑβδομήκοντα
  chosen: seventy horsemen
  alternatives:
  - seventy cavalrymen
  - seventy mounted soldiers
  lexicon: BDAG
  rationale: ἱππεῖς refers to mounted troops. 'Horsemen' is concise and idiomatic,
    while still clear to modern readers.
- source_word: δεξιολάβους διακοσίους
  chosen: two hundred spearmen
  alternatives:
  - two hundred right-hand guards
  - two hundred light-armed troops
  lexicon: BDAG
  rationale: δεξιολάβος is a rare term with debated precise reference. 'Spearmen'
    is a widely adopted rendering that fits the military context and likely sense
    of an auxiliary troop type, while avoiding an overly literal but obscure 'right-hand
    guards.' Because the exact force designation is uncertain, an alternative is preserved
    in a footnote.
- source_word: ἀπὸ τρίτης ὥρας τῆς νυκτός
  chosen: at the third hour of the night
  alternatives:
  - from the third hour of the night
  - at about nine o'clock at night
  lexicon: BDAG
  rationale: Formally, ἀπό means 'from,' but in this command context it marks the
    starting time for departure/preparation. 'At the third hour of the night' preserves
    the ancient time expression without importing a precise modern equivalence into
    the main text.
