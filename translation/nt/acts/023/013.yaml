id: ACT.23.13
reference: Acts 23:13
source:
  edition: SBLGNT
  text: ἦσαν δὲ πλείους τεσσεράκοντα οἱ ταύτην τὴν συνωμοσίαν ⸀ποιησάμενοι·
translation:
  text: There were more than forty who had formed this conspiracy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over forty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλείους τεσσεράκοντα
  chosen: more than forty
  alternatives:
  - over forty
  - more than forty men
  lexicon: BDAG
  rationale: The comparative πλείους with the numeral τεσσεράκοντα idiomatically means
    'more than forty' or 'over forty.' 'More than forty' is clear modern English and
    preserves the quantitative force without adding an explicit noun not present in
    the Greek.
- source_word: συνωμοσίαν
  chosen: conspiracy
  alternatives:
  - plot
  - oath-bound plot
  lexicon: BDAG
  rationale: συνωμοσία denotes a conspiracy or secret agreement. 'Conspiracy' best
    matches the noun's formal sense here. 'Plot' is possible but slightly less precise;
    'oath-bound plot' imports detail from the wider context rather than this word
    alone.
- source_word: ποιησάμενοι
  chosen: had formed
  alternatives:
  - had made
  - had entered into
  lexicon: BDAG
  rationale: The aorist middle participle from ποιέω with συνωμοσίαν means 'having
    made/formed' the conspiracy. 'Had formed' is idiomatic in English and fits naturally
    with 'conspiracy.' 'Had entered into' is interpretive and less directly tied to
    ποιέω.
- source_word: ἦσαν δὲ
  chosen: There were
  alternatives:
  - Now there were
  - And there were
  lexicon: BDAG
  rationale: ἦσαν introduces the existence of this group, and English existential
    'There were' is the most natural rendering. δέ is lightly connective; its force
    is adequately carried by the flow of the sentence without requiring an explicit
    'now' or 'and' in the main text.
- source_word: οἱ ταύτην τὴν συνωμοσίαν ποιησάμενοι
  chosen: who had formed this conspiracy
  alternatives:
  - the ones who had formed this conspiracy
  - those who had made this plot
  lexicon: BDAG
  rationale: 'The article with participle functions substantivally: ''those who had
    formed this conspiracy.'' Rendering it with a relative clause is natural English
    and preserves the referential force.'
