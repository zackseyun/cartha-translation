id: ACT.23.14
reference: Acts 23:14
source:
  edition: SBLGNT
  text: οἵτινες προσελθόντες τοῖς ἀρχιερεῦσιν καὶ τοῖς πρεσβυτέροις εἶπαν· Ἀναθέματι
    ἀνεθεματίσαμεν ἑαυτοὺς μηδενὸς γεύσασθαι ἕως οὗ ἀποκτείνωμεν τὸν Παῦλον.
translation:
  text: These men came to the chief priests and the elders and said, “We have bound
    ourselves under a curse to taste nothing until we kill Paul.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “We have put ourselves under an anathema/curse.” The
      Greek expresses a self-imprecatory oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  chosen: These men
  alternatives:
  - who
  - they
  lexicon: BDAG
  rationale: The qualitative/indefinite relative refers back to the conspirators of
    the previous verse. 'These men' makes the referent explicit in natural English
    while preserving the sense better than a bare 'who' at the start of an English
    sentence.
- source_word: προσελθόντες
  chosen: came to
  alternatives:
  - approached
  - went to
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, here functioning temporally prior to
    'said.' 'Came to' is idiomatic and clear in narrative English.
- source_word: ἀρχιερεῦσιν
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard plural rendering in Second Temple/Jewish leadership contexts;
    'high priests' is less idiomatic in English for this collective group.
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In this institutional context the term denotes recognized leaders, not
    merely older males.
- source_word: Ἀναθέματι
  chosen: under a curse
  alternatives:
  - with an oath of destruction
  - by an anathema
  lexicon: BDAG
  rationale: Dative noun used with the cognate verb intensifies the self-imprecation.
    'Under a curse' communicates the force in accessible English without importing
    later ecclesiastical jargon from 'anathema'.
- source_word: ἀνεθεματίσαμεν ἑαυτοὺς
  chosen: we have bound ourselves
  alternatives:
  - we have put ourselves under a curse
  - we have solemnly sworn
  lexicon: BDAG
  rationale: The idiom means to bind oneself by a self-imprecatory oath. 'Bound ourselves'
    preserves the oath language, and the following phrase 'under a curse' makes the
    self-imprecation explicit.
- source_word: μηδενὸς γεύσασθαι
  chosen: to taste nothing
  alternatives:
  - to eat nothing
  - to take nothing
  lexicon: BDAG
  rationale: γεύομαι literally means 'taste' or 'partake of.' 'Taste nothing' closely
    follows the Greek and naturally includes abstaining from food; it also preserves
    the emphatic μηδενός.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - before
  lexicon: BDAG
  rationale: Standard temporal conjunction here introducing the limit of their vow.
- source_word: ἀποκτείνωμεν
  chosen: we kill
  alternatives:
  - we have killed
  - we murder
  lexicon: BDAG
  rationale: Aorist subjunctive after ἕως οὗ expresses the contemplated event. 'We
    kill' is the most direct equivalent; 'murder' would add an interpretive legal/moral
    label beyond the lexical sense.
- source_word: τὸν Παῦλον
  chosen: Paul
  lexicon: BDAG
  rationale: Standard transliteration of the personal name Παῦλος, following the translation
    philosophy to transliterate names.
