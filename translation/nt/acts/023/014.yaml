theological_decisions:
- issue: Rendering the oath formula Ἀναθέματι ἀνεθεματίσαμεν ἑαυτοὺς
  chosen_reading: We have bound ourselves under a curse
  alternative_readings:
  - We have put ourselves under an anathema
  - We have bound ourselves with a solemn oath
  rationale: The phrase is not a doctrinal 'anathema' in the later ecclesiastical
    sense but a self-imprecatory vow. The chosen rendering preserves the severity
    of the oath without importing later theological terminology.
  doctrine_reference: Translation philosophy §§1, 6
