theological_decisions:
- issue: Meaning of πνεῦμα in contrast with ἄγγελος
  chosen_reading: a spirit, meaning a spiritual being rather than the Holy Spirit
  alternative_readings:
  - the Spirit
  rationale: The immediate pairing 'spirit or an angel' reflects categories associated
    with Pharisaic belief and does not require identifying πνεῦμα as the Holy Spirit.
    This preserves the narrative's stated uncertainty rather than importing a more
    specific theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Completion of the broken final clause
  chosen_reading: 'Represented as a complete rhetorical question in English: ''What
    if a spirit or an angel has spoken to him?'''
  alternative_readings:
  - Retain the dash to mirror the Greek's abrupt ending
  rationale: The Greek text ends abruptly with a dash, likely reflecting an interrupted
    or unfinished statement. For readable modern English under optimal equivalence,
    the implied sense is made explicit in the main text, while the more formal alternative
    is preserved in a footnote for auditability.
  doctrine_reference: Optimal equivalence; readable modern English, not archaic or
    academic.
