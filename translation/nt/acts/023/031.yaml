id: ACT.23.31
reference: Acts 23:31
source:
  edition: SBLGNT
  text: Οἱ μὲν οὖν στρατιῶται κατὰ τὸ διατεταγμένον αὐτοῖς ἀναλαβόντες τὸν Παῦλον
    ἤγαγον ⸀διὰ νυκτὸς εἰς τὴν Ἀντιπατρίδα·
translation:
  text: So the soldiers, according to what had been ordered them, took Paul and brought
    him by night to Antipatris.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the orders given to them.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'by night,' that is, during the night.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ μὲν οὖν στρατιῶται
  chosen: So the soldiers
  alternatives:
  - Then the soldiers
  - Therefore the soldiers
  - Accordingly, the soldiers
  lexicon: BDAG
  rationale: οὖν marks inference/continuation, while μέν contributes discourse structure
    anticipating the next clause. English usually does not reproduce μέν explicitly
    here, so 'So' captures the narrative progression naturally without overtranslating.
- source_word: κατὰ τὸ διατεταγμένον αὐτοῖς
  chosen: according to what had been ordered them
  alternatives:
  - according to the orders given to them
  - as they had been instructed
  - according to their orders
  lexicon: BDAG
  rationale: 'The articular perfect passive participle of διατάσσω functions substantivally:
    ''the thing having been ordered to them.'' The chosen rendering preserves the
    passive sense and the reference to prior command, while remaining idiomatic English.'
- source_word: ἀναλαβόντες
  chosen: took
  alternatives:
  - having taken
  - taking charge of
  - escorting
  lexicon: BDAG
  rationale: As an aorist participle preceding the main verb, it denotes attendant
    action prior to 'brought.' 'Took' is concise and natural in English narrative.
    'Having taken' is more formally precise but less readable; 'escorting' imports
    nuance not explicit in the verb itself.
- source_word: ἤγαγον
  chosen: brought him
  alternatives:
  - led him
  - took him
  lexicon: BDAG
  rationale: ἄγω commonly means lead, bring, or take. Because the destination is specified
    ('to Antipatris') and Paul is being conveyed under guard, 'brought him' fits the
    movement toward the stated location from the narrator's perspective and reads
    naturally with 'to Antipatris.'
- source_word: διὰ νυκτός
  chosen: by night
  alternatives:
  - during the night
  - through the night
  - at night
  lexicon: BDAG
  rationale: The idiom διά with the genitive of νύξ means 'during the night' or 'by
    night.' 'By night' is concise, idiomatic, and preserves the nocturnal timing without
    implying the entire duration of the journey.
- source_word: Ἀντιπατρίδα
  chosen: Antipatris
  lexicon: BDAG
  rationale: Proper place name is transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
