id: ACT.23.11
reference: Acts 23:11
source:
  edition: SBLGNT
  text: Τῇ δὲ ἐπιούσῃ νυκτὶ ἐπιστὰς αὐτῷ ὁ κύριος εἶπεν· ⸀Θάρσει, ὡς γὰρ διεμαρτύρω
    τὰ περὶ ἐμοῦ εἰς Ἰερουσαλὴμ οὕτω σε δεῖ καὶ εἰς Ῥώμην μαρτυρῆσαι.
translation:
  text: But on the following night, the Lord stood by him and said, “Take courage,
    for just as you have testified about me in Jerusalem, so you must also testify
    in Rome.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Take heart.”
    reason: lexical_alternative
  - marker: b
    text: Or “bear witness”; both verbs for Paul's past and future speaking are from
      the same witness/testimony word group in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπιούσῃ νυκτί
  chosen: But on the following night
  alternatives:
  - And on the next night
  - Now on the following night
  lexicon: BDAG
  rationale: ἐπιούσῃ with νυκτί denotes the next/following night. δέ is rendered with
    mild connective force as 'But' to reflect narrative progression without overstating
    contrast.
- source_word: ἐπιστάς αὐτῷ
  chosen: stood by him
  alternatives:
  - came and stood by him
  - appeared to him
  lexicon: BDAG
  rationale: ἐφίστημι here conveys coming upon/standing near someone. 'Stood by him'
    is idiomatic and preserves the personal, supportive presence better than the more
    interpretive 'appeared.'
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' With the article,
    'the Lord' is the natural English expression in this narrative context.
- source_word: Θάρσει
  chosen: Take courage
  alternatives:
  - Be courageous
  - Take heart
  lexicon: BDAG
  rationale: The present imperative calls Paul to courage. 'Take courage' is clear
    modern English and preserves the exhortational tone. 'Take heart' is possible
    but slightly more idiomatic than the Greek requires.
- source_word: διεμαρτύρω
  chosen: you have testified
  alternatives:
  - you have borne witness
  - you have solemnly testified
  lexicon: BDAG
  rationale: διαμαρτύρομαι can mean testify solemnly or bear witness. 'Have testified'
    fits the aorist as a completed act and matches the later cognate μαρτυρῆσαι for
    verbal consistency, while avoiding overloading the English with 'solemnly' unless
    context demands it.
- source_word: τὰ περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - the things concerning me
  - the things about me
  lexicon: BDAG
  rationale: The phrase refers to matters concerning Jesus. 'About me' is natural
    English that preserves the referential sense without unnecessary stiffness.
- source_word: εἰς Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Although εἰς is literally 'into/to,' with city names in Koine it can
    function idiomatically where English prefers 'in' for location of testimony already
    given.
- source_word: οὕτω
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: BDAG
  rationale: οὕτω marks correspondence between Paul's witness in Jerusalem and his
    future witness in Rome. 'So' is concise and natural in English.
- source_word: σε δεῖ
  chosen: you must
  alternatives:
  - it is necessary for you
  - you are bound to
  lexicon: BDAG
  rationale: δεῖ expresses divine necessity here. 'You must' communicates necessity
    clearly in readable English without importing fatalism.
- source_word: καὶ εἰς Ῥώμην
  chosen: also in Rome
  alternatives:
  - in Rome also
  - even in Rome
  lexicon: BDAG
  rationale: καί adds Rome as the further sphere of witness. 'Also in Rome' is the
    most natural English placement.
- source_word: μαρτυρῆσαι
  chosen: testify
  alternatives:
  - bear witness
  lexicon: BDAG
  rationale: μαρτυρέω is rendered consistently with διεμαρτύρω as 'testify' to preserve
    the lexical connection across the sentence in clear modern English.
