theological_decisions:
- issue: Identity of ὁ κύριος in the narrative
  chosen_reading: Rendered as 'the Lord,' understood in context as the risen Jesus
    speaking of 'me' and commissioning Paul.
  alternative_readings:
  - A less explicit rendering could leave the referent simply as 'the Lord' without
    comment.
  rationale: The Greek text itself says 'the Lord' and then records speech referring
    to testimony 'about me,' which in Acts context points to Jesus. The translation
    keeps the text's wording rather than expanding it to 'the Lord Jesus,' avoiding
    unnecessary interpretive addition while preserving orthodox Christological sense.
  doctrine_reference: Affirmations; Contested terms table for κύριος
- issue: Force of δεῖ
  chosen_reading: Expressed as necessity ('you must') without specifying the mechanism
    beyond what the text states.
  alternative_readings:
  - '''it is necessary for you'''
  - '''you are destined to'''
  rationale: Acts often uses δεῖ for divine necessity, but the translation should
    preserve that tension rather than paraphrase it into a stronger doctrine of fate
    or predestination. 'You must' communicates necessity while remaining textually
    restrained.
  doctrine_reference: Translation philosophy §3
