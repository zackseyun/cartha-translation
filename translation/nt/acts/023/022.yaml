id: ACT.23.22
reference: Acts 23:22
source:
  edition: SBLGNT
  text: ὁ μὲν οὖν χιλίαρχος ἀπέλυσε τὸν ⸀νεανίσκον παραγγείλας μηδενὶ ἐκλαλῆσαι ὅτι
    ταῦτα ἐνεφάνισας πρὸς ⸀ἐμέ.
translation:
  text: So the commander dismissed the young man, instructing him, “Tell no one that
    you have reported these things to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “informed me” or “made these things known to me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: χιλίαρχος
  chosen: commander
  alternatives:
  - tribune
  - military commander
  - commander of a thousand
  lexicon: BDAG
  rationale: Refers to a Roman military officer commanding roughly a cohort/tribune-level
    unit. 'Commander' is clear modern English and avoids the archaic or overly technical
    feel of 'tribune,' while preserving the officer's authority.
- source_word: ἀπέλυσε
  chosen: dismissed
  alternatives:
  - released
  - sent away
  - let go
  lexicon: BDAG
  rationale: In context the officer is ending the interview and sending the youth
    away. 'Dismissed' fits the official setting better than 'released,' which could
    imply custody, though that nuance is possible.
- source_word: νεανίσκον
  chosen: young man
  alternatives:
  - youth
  - young fellow
  - boy
  lexicon: BDAG
  rationale: The term denotes a younger male. 'Young man' is natural, respectful modern
    English and avoids the possible over-youthful sense of 'boy.'
- source_word: παραγγείλας
  chosen: instructing
  alternatives:
  - ordering
  - commanding
  - charging
  lexicon: BDAG
  rationale: The participle conveys giving a directive. 'Instructing' preserves the
    official direction without overstating harshness; the content is still clearly
    a command from a superior.
- source_word: μηδενὶ ἐκλαλῆσαι
  chosen: Tell no one
  alternatives:
  - speak to no one
  - disclose to no one
  - report to no one
  lexicon: BDAG
  rationale: The infinitive with μηδενί means not to divulge the matter to anyone.
    'Tell no one' is concise, idiomatic English that captures the prohibition.
- source_word: ἐνεφάνισας
  chosen: have reported
  alternatives:
  - have informed
  - have disclosed
  - have made known
  lexicon: BDAG
  rationale: The verb means to make something known or report it to an authority.
    'Have reported' fits the context of bringing intelligence to the commander.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  - these matters
  lexicon: BDAG
  rationale: Plural demonstrative referring to the information just conveyed. 'These
    things' is slightly formal but accurate; it preserves the plural better than singular
    'this'.
- source_word: πρὸς ἐμέ
  chosen: to me
  alternatives:
  - before me
  lexicon: BDAG
  rationale: 'Here πρός with accusative after a verb of reporting functions idiomatically
    as direction toward a person: ''to me.'' ''Before me'' is possible but less natural
    in contemporary English.'
