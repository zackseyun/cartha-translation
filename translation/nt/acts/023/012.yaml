id: ACT.23.12
reference: Acts 23:12
source:
  edition: SBLGNT
  text: Γενομένης δὲ ἡμέρας ποιήσαντες ⸂συστροφὴν οἱ Ἰουδαῖοι⸃ ἀνεθεμάτισαν ἑαυτοὺς
    λέγοντες μήτε φαγεῖν μήτε πιεῖν ἕως οὗ ἀποκτείνωσιν τὸν Παῦλον.
translation:
  text: When day came, the Jews formed a conspiracy and bound themselves under a curse,
    saying that they would neither eat nor drink until they had killed Paul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the Jews'; here it refers to a particular group among the Jews involved
      in the plot, not to the Jewish people as a whole.
    reason: cultural_note
  - marker: b
    text: Or 'put themselves under a curse.' The expression refers to a self-imposed
      oath invoking judgment on themselves if they failed.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένης δὲ ἡμέρας
  chosen: When day came
  alternatives:
  - When it became day
  - When morning came
  - And when it was day
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'When day came' is natural
    modern English while preserving the temporal sense without unnecessary literalism.
- source_word: ποιήσαντες συστροφὴν
  chosen: formed a conspiracy
  alternatives:
  - having made a plot
  - having formed a mob
  - having banded together
  lexicon: BDAG
  rationale: The participle plus noun idiom denotes organized collusion or plotting.
    'Conspiracy' best captures deliberate secret coordination in this context of an
    assassination plan. 'Mob' would overemphasize riotous assembly rather than plotted
    intent.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - some Jews
  - the Judeans
  lexicon: BDAG
  rationale: The Greek text explicitly says 'the Jews.' It should not be narrowed
    to leaders or softened to 'some Jews' in the main text without textual warrant.
    However, because the referent is a specific subgroup rather than the Jewish people
    as a whole, a footnote preserves that contextual clarification.
- source_word: ἀνεθεμάτισαν ἑαυτοὺς
  chosen: bound themselves under a curse
  alternatives:
  - put themselves under a curse
  - swore an oath against themselves
  - anathematized themselves
  lexicon: BDAG
  rationale: The verb here means to place oneself under a curse in support of an oath.
    'Bound themselves under a curse' communicates both the self-imprecatory and oath-like
    force better than the opaque 'anathematized themselves.'
- source_word: λέγοντες μήτε φαγεῖν μήτε πιεῖν
  chosen: saying that they would neither eat nor drink
  alternatives:
  - saying to eat neither nor drink
  - declaring that they would not eat or drink
  lexicon: BDAG
  rationale: This infinitival construction expresses the content of their oath. 'Would
    neither eat nor drink' is idiomatic English and preserves the paired negation.
- source_word: ἕως οὗ ἀποκτείνωσιν τὸν Παῦλον
  chosen: until they had killed Paul
  alternatives:
  - until they kill Paul
  - until they should kill Paul
  lexicon: BDAG
  rationale: The clause marks the terminus of the oath. English often uses past perfect
    after a past reporting frame to express the action as subsequent to the oath but
    prior to its release. 'Had killed' reads naturally in context; 'kill' is also
    possible but slightly less smooth in English narrative sequence.
