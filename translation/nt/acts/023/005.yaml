theological_decisions:
- issue: Whether to render ἀδελφοί inclusively
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The translation follows the project's gender-accurate policy. In this
    context Paul addresses a male governing body, so 'brothers' is both formally accurate
    and contextually appropriate.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: How to present Paul's citation of Scripture
  chosen_reading: for it is written, ‘You shall not speak evil of a ruler of your
    people.’
  alternative_readings:
  - for it stands written, ‘You shall not revile a ruler of your people.’
  rationale: The wording preserves the scriptural authority formula and the ethical
    prohibition without archaic diction. 'Revile' is a viable alternative but less
    accessible for the target readership.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
