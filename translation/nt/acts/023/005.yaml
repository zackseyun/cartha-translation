id: ACT.23.5
reference: Acts 23:5
source:
  edition: SBLGNT
  text: ἔφη τε ὁ Παῦλος· Οὐκ ᾔδειν, ἀδελφοί, ὅτι ἐστὶν ἀρχιερεύς· γέγραπται γὰρ ⸀ὅτι
    Ἄρχοντα τοῦ λαοῦ σου οὐκ ἐρεῖς κακῶς.
translation:
  text: And Paul said, “I did not know, brothers, that he is the high priest; for
    it is written, ‘You shall not speak evil of a ruler of your people.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall not revile a ruler of your people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη τε
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  - And ... was saying
  lexicon: BDAG
  rationale: τέ is a mild connective, and ἔφη introduces direct speech. 'And Paul
    said' preserves the narrative flow without overtranslating the particle.
- source_word: Οὐκ ᾔδειν
  chosen: I did not know
  alternatives:
  - I was not aware
  - I did not recognize
  lexicon: BDAG
  rationale: οἶδα in the pluperfect/imperfect form functions with present-like sense
    of knowledge. 'I did not know' is the most direct and idiomatic rendering.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, fellow Jews
  lexicon: BDAG
  rationale: The vocative plural is grammatically masculine. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In this setting Paul addresses the
    council, so 'brothers' is natural and source-faithful.
- source_word: ὅτι ἐστὶν ἀρχιερεύς
  chosen: that he is the high priest
  alternatives:
  - that he was high priest
  - that he is high priest
  lexicon: BDAG
  rationale: The present ἐστίν is retained as 'is.' The article is naturally represented
    in English as 'the high priest,' referring to the office held by the person in
    view.
- source_word: γέγραπται γὰρ
  chosen: for it is written
  alternatives:
  - for it stands written
  - for scripture says
  lexicon: BDAG
  rationale: This standard citation formula is best rendered with familiar English
    that preserves the perfect passive force without sounding archaic.
- source_word: Ἄρχοντα
  chosen: a ruler
  alternatives:
  - the ruler
  - a leader
  - an authority
  lexicon: BDAG
  rationale: The anarthrous accusative in the quotation is well rendered generically
    as 'a ruler.' 'Ruler' best matches ἄρχων in this legal-ethical context.
- source_word: τοῦ λαοῦ σου
  chosen: of your people
  alternatives:
  - of your nation
  - of your own people
  lexicon: BDAG
  rationale: λαός commonly means 'people,' especially covenant/community language.
    'Of your people' preserves the wording of the scriptural citation.
- source_word: οὐκ ἐρεῖς κακῶς
  chosen: You shall not speak evil
  alternatives:
  - You shall not speak badly
  - You shall not revile
  - You shall not speak abusively
  lexicon: BDAG
  rationale: The future indicative functions imperativally in the citation from Exodus
    22:28. 'Speak evil of' is natural modern English and reflects κακῶς without importing
    a narrower sense than the Greek requires.
