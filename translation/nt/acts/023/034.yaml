id: ACT.23.34
reference: Acts 23:34
source:
  edition: SBLGNT
  text: ἀναγνοὺς ⸀δὲ καὶ ἐπερωτήσας ἐκ ποίας ⸀ἐπαρχείας ἐστὶν καὶ πυθόμενος ὅτι ἀπὸ
    Κιλικίας,
translation:
  text: After reading it and asking what province he was from, and learning that he
    was from Cilicia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'having read it and having asked from which province
      he was, and having learned that he was from Cilicia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνοὺς
  chosen: After reading it
  alternatives:
  - having read it
  - when he had read it
  lexicon: BDAG
  rationale: Aorist participle of ἀναγινώσκω, referring to the governor's reading
    of the letter just mentioned in context. English supplies 'it' from context for
    naturalness.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective with little standalone force in English;
    its discourse function is adequately carried by the flow of the sentence without
    an explicit gloss.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Coordinates the participles and subsequent action in a straightforward
    way.
- source_word: ἐπερωτήσας
  chosen: asking
  alternatives:
  - having asked
  - inquiring
  lexicon: BDAG
  rationale: Aorist participle from ἐπερωτάω. 'Asking' gives natural English while
    preserving the sense of a direct inquiry.
- source_word: ἐκ ποίας ἐπαρχείας ἐστίν
  chosen: what province he was from
  alternatives:
  - from which province he was
  - what jurisdiction he belonged to
  lexicon: BDAG
  rationale: ἐπαρχεία denotes a Roman administrative province. 'What province he was
    from' is idiomatic modern English and preserves the administrative sense.
- source_word: πυθόμενος
  chosen: learning
  alternatives:
  - finding out
  - having learned
  lexicon: BDAG
  rationale: Middle participle of πυνθάνομαι, indicating coming to know information.
    'Learning' is concise and natural in sequence with the prior participles.
- source_word: ὅτι ἀπὸ Κιλικίας
  chosen: that he was from Cilicia
  alternatives:
  - that he was from the province of Cilicia
  - that he came from Cilicia
  lexicon: BDAG
  rationale: ἀπό with a place name indicates origin. 'From Cilicia' is the most direct
    rendering; 'he was' is supplied from context to complete the clause in English.
- source_word: Κιλικίας
  chosen: Cilicia
  lexicon: BDAG
  rationale: Standard English transliteration of the Roman province name.
