id: ACT.23.6
reference: Acts 23:6
source:
  edition: SBLGNT
  text: Γνοὺς δὲ ὁ Παῦλος ὅτι τὸ ἓν μέρος ἐστὶν Σαδδουκαίων τὸ δὲ ἕτερον Φαρισαίων
    ⸀ἔκραζεν ἐν τῷ συνεδρίῳ· Ἄνδρες ἀδελφοί, ἐγὼ Φαρισαῖός εἰμι, υἱὸς ⸀Φαρισαίων·
    περὶ ἐλπίδος καὶ ἀναστάσεως νεκρῶν ⸀ἐγὼ κρίνομαι.
translation:
  text: But Paul, knowing that one part were Sadducees and the other Pharisees, cried
    out in the council, “Men, brothers, I am a Pharisee, a son of Pharisees. It is
    concerning the hope and resurrection of the dead that I am being judged.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the Sanhedrin.” The Greek word can refer specifically to the Jewish
      ruling council.
    reason: lexical_alternative
  - marker: b
    text: Or “a son of Pharisee parents” or “a descendant of Pharisees.”
    reason: alternative_reading
  - marker: c
    text: Or “for the hope of the resurrection of the dead I am being judged.”
    reason: alternative_reading
lexical_decisions:
- source_word: Γνοὺς
  chosen: knowing
  alternatives:
  - when he knew
  - being aware
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for Paul's action. 'Knowing'
    is concise and natural while preserving the participial force.
- source_word: τὸ ἓν μέρος ... τὸ δὲ ἕτερον
  chosen: one part ... the other
  alternatives:
  - one group ... the other
  - one faction ... the other
  lexicon: BDAG
  rationale: μέρος here denotes a division within the assembly. 'Part' preserves the
    imagery of the Greek while remaining idiomatic in English.
- source_word: Σαδδουκαίων / Φαρισαίων
  chosen: Sadducees / Pharisees
  rationale: Standard transliterations of the Jewish sect names.
- source_word: ἔκραζεν
  chosen: cried out
  alternatives:
  - shouted
  - called out
  lexicon: BDAG
  rationale: κράζω often conveys a loud public utterance. 'Cried out' preserves the
    force without sounding overly colloquial.
- source_word: ἐν τῷ συνεδρίῳ
  chosen: in the council
  alternatives:
  - in the Sanhedrin
  - in the assembly
  lexicon: BDAG
  rationale: συνέδριον can denote the Jewish council specifically. 'Council' is a
    transparent translation of the noun; 'Sanhedrin' is preserved as a possible contextual
    alternative in a footnote.
- source_word: Ἄνδρες ἀδελφοί
  chosen: Men, brothers
  alternatives:
  - Brothers
  - Men and brothers
  lexicon: BDAG
  rationale: The vocative includes both ἄνδρες and ἀδελφοί. A gender-accurate rendering
    should preserve both elements rather than collapse them into a smoother but less
    explicit English phrase.
- source_word: Φαρισαῖός εἰμι
  chosen: I am a Pharisee
  lexicon: BDAG
  rationale: Straightforward self-identification in the present tense.
- source_word: υἱὸς Φαρισαίων
  chosen: a son of Pharisees
  alternatives:
  - a son of Pharisees'
  - a son of Pharisee parents
  - a descendant of Pharisees
  lexicon: BDAG
  rationale: The plural Φαρισαίων is well attested here and should be represented.
    'A son of Pharisees' is slightly formal but preserves the idiom and avoids over-interpreting
    whether it means both parents or ancestral lineage.
- source_word: περὶ ἐλπίδος καὶ ἀναστάσεως νεκρῶν
  chosen: concerning the hope and resurrection of the dead
  alternatives:
  - about the hope and the resurrection of the dead
  - for the hope of the resurrection of the dead
  lexicon: BDAG
  rationale: περί with the genitives introduces the matter under dispute. The phrase
    can be read as two linked items ('hope and resurrection') or as a hendiadys-like
    expression ('hope of the resurrection'). The chosen rendering stays close to the
    Greek wording and preserves the tension.
- source_word: κρίνομαι
  chosen: I am being judged
  alternatives:
  - I am on trial
  - I am judged
  lexicon: BDAG
  rationale: Present passive indicates Paul's current judicial situation. 'I am being
    judged' is formally accurate; 'I am on trial' is idiomatic but slightly more interpretive.
