theological_decisions:
- issue: Meaning of Paul's claim 'υἱὸς Φαρισαίων'
  chosen_reading: Retained as 'a son of Pharisees' without resolving whether it refers
    to Pharisaic parentage, ancestry, or party affiliation.
  alternative_readings:
  - a son of Pharisee parents
  - a descendant of Pharisees
  rationale: The Greek plural allows more than one nuance. The translation preserves
    the familial idiom and avoids importing a narrower historical claim than the text
    itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relation of 'hope' and 'resurrection' in Paul's defense
  chosen_reading: Rendered as 'the hope and resurrection of the dead' rather than
    collapsing to 'the hope of the resurrection of the dead.'
  alternative_readings:
  - the hope of the resurrection of the dead
  rationale: The Greek coordinates ἐλπίδος and ἀναστάσεως with καί. Since the phrase
    may either distinguish two closely related concepts or express one hope focused
    on resurrection, the main text preserves the coordinate form and the alternative
    is footnoted.
  doctrine_reference: Preserve theological tension rather than resolve it.
