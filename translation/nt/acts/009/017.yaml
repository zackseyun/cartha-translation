id: ACT.9.17
reference: Acts 9:17
source:
  edition: SBLGNT
  text: ἀπῆλθεν δὲ Ἁνανίας καὶ εἰσῆλθεν εἰς τὴν οἰκίαν, καὶ ἐπιθεὶς ἐπ’ αὐτὸν τὰς
    χεῖρας εἶπεν· Σαοὺλ ἀδελφέ, ὁ κύριος ἀπέσταλκέν με, ⸀Ἰησοῦς ὁ ὀφθείς σοι ἐν τῇ
    ὁδῷ ᾗ ἤρχου, ὅπως ἀναβλέψῃς καὶ πλησθῇς πνεύματος ἁγίου.
translation:
  text: So Ananias went and entered the house, and laying his hands on him he said,
    “Brother Saul, the Lord has sent me—Jesus, the one who appeared to you on the
    road by which you were coming—so that you may regain your sight and be filled
    with the Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the road on which you were traveling.”
    reason: lexical_alternative
  - marker: b
    text: Or “that you may see again.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι here advances the narrative simply; 'went' is natural
    modern English without overstating the departure nuance.
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks narrative progression. 'So' captures the consequential flow
    from the prior command better than a bare 'and' in English.
- source_word: εἰσῆλθεν εἰς τὴν οἰκίαν
  chosen: entered the house
  alternatives:
  - went into the house
  lexicon: BDAG
  rationale: This is a standard idiomatic compression in English; no meaning is lost.
- source_word: ἐπιθεὶς ἐπ’ αὐτὸν τὰς χεῖρας
  chosen: laying his hands on him
  alternatives:
  - placing his hands on him
  - having laid hands on him
  lexicon: BDAG
  rationale: The participial construction denotes the accompanying action. 'Laying
    his hands on him' preserves the physical act and its recognizable biblical idiom.
- source_word: Σαοὺλ ἀδελφέ
  chosen: Brother Saul
  alternatives:
  - Saul, brother
  lexicon: BDAG
  rationale: Vocative ἀδελφέ is naturally rendered before the name in English. 'Brother
    Saul' preserves both the familial Christian address and the directness of the
    speech.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος. The article is retained
    in idiomatic English because the clause identifies the sender.
- source_word: ἀπέσταλκέν με
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: BDAG
  rationale: The perfect tense suggests a present relevance/result of the sending;
    'has sent me' preserves that better than a simple past.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated per project philosophy.
- source_word: ὁ ὀφθείς σοι
  chosen: the one who appeared to you
  alternatives:
  - who appeared to you
  - the one seen by you
  lexicon: BDAG
  rationale: The articular participle is best represented by 'the one who appeared
    to you.' This is idiomatic and preserves the identifying force.
- source_word: ἐν τῇ ὁδῷ ᾗ ἤρχου
  chosen: on the road by which you were coming
  alternatives:
  - on the road on which you were traveling
  - on the way as you came
  lexicon: BDAG
  rationale: ὁδός here is literal 'road.' The imperfect ἤρχου is durative, and 'were
    coming' reflects the motion toward Damascus from Saul's perspective in the narrative.
    'By which' preserves the relative construction more closely than a looser paraphrase.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose; 'so that' is clear modern English.
- source_word: ἀναβλέψῃς
  chosen: you may regain your sight
  alternatives:
  - you may see again
  - you may look up
  lexicon: BDAG
  rationale: In this healing context ἀναβλέπω means recovery of sight, not merely
    'look up.' 'Regain your sight' makes the contextual sense explicit.
- source_word: πλησθῇς
  chosen: be filled
  alternatives:
  - be made full
  lexicon: BDAG
  rationale: Standard rendering of the passive here; concise and idiomatic.
- source_word: πνεύματος ἁγίου
  chosen: with the Holy Spirit
  alternatives:
  - with Holy Spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article before πνεύματος ἁγίου, English
    idiom normally requires 'the Holy Spirit' when referring to the divine person.
    'With' naturally expresses the content/complement of filling in English.
