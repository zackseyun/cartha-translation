theological_decisions:
- issue: Rendering πνεύματος ἁγίου without Greek article
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Holy Spirit
  rationale: The anarthrous construction does not require an indefinite sense. In
    Acts this phrase refers to the divine Spirit, and English idiom normally uses
    the article. This preserves orthodox personal reference without importing anything
    beyond the context.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Force of ἀδελφέ in Ananias's address to Saul
  chosen_reading: Brother Saul
  alternative_readings:
  - Saul, brother
  rationale: The address signals acceptance and fellowship rather than mere ethnic
    kinship in this immediate Christian context. Rendering it as 'Brother Saul' preserves
    that relational-theological nuance while remaining textually grounded.
  doctrine_reference: Translation philosophy §1, §6
