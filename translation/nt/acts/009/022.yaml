- issue: Rendering of Χριστός as title
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: Here ὁ χριστός is clearly titular rather than name-like, identifying
    Jesus as the promised anointed one. The project default is to translate the title
    as 'Messiah' where context supports it.
