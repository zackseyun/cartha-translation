id: ACT.9.29
reference: Acts 9:29
source:
  edition: SBLGNT
  text: ἐλάλει τε καὶ συνεζήτει πρὸς τοὺς Ἑλληνιστάς· οἱ δὲ ἐπεχείρουν ⸂ἀνελεῖν αὐτόν⸃.
translation:
  text: And he was speaking and debating with the Hellenists, but they were attempting
    to kill him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Greek-speaking Jews.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλει
  chosen: was speaking
  alternatives:
  - spoke
  - was talking
  lexicon: BDAG
  rationale: Imperfect indicative suggests ongoing or repeated action in narrative;
    'was speaking' preserves the durative sense better than simple 'spoke.'
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  - and also
  lexicon: BDAG
  rationale: The pair links two coordinated imperfect verbs. In natural English, a
    simple 'and' conveys the connection without overloading the sentence.
- source_word: συνεζήτει
  chosen: debating
  alternatives:
  - arguing
  - disputing
  - discussing
  lexicon: BDAG
  rationale: In Acts this verb often carries the sense of active disputation rather
    than neutral conversation. 'Debating' fits the confrontational context and pairs
    well with the hostile response that follows.
- source_word: πρὸς τοὺς Ἑλληνιστάς
  chosen: with the Hellenists
  alternatives:
  - against the Hellenists
  - to the Hellenists
  - with the Greek-speaking Jews
  lexicon: BDAG
  rationale: With verbs of discussion, πρός can indicate interaction with persons.
    'With' is idiomatic in English for debate. Ἑλληνισταί most naturally refers to
    Greek-speaking Jews in Acts, not Gentile Greeks.
- source_word: Ἑλληνιστάς
  chosen: Hellenists
  alternatives:
  - Greek-speaking Jews
  lexicon: BDAG
  rationale: The transliterated term preserves the specific group designation used
    in Acts. Because modern readers may not know the term, a footnote preserves the
    explanatory alternative.
- source_word: οἱ δὲ
  chosen: but they
  alternatives:
  - and they
  - now they
  lexicon: BDAG
  rationale: δέ marks contrast with Saul's activity; 'but they' clearly signals the
    adversative turn.
- source_word: ἐπεχείρουν
  chosen: were attempting
  alternatives:
  - tried
  - were trying
  lexicon: BDAG
  rationale: The imperfect again suggests ongoing effort. 'Were attempting' preserves
    both the aspect and the formal sense of undertaking an action.
- source_word: ἀνελεῖν αὐτόν
  chosen: to kill him
  alternatives:
  - to do away with him
  - to put him to death
  lexicon: BDAG
  rationale: ἀναιρέω here means to kill or put to death. 'To kill him' is the clearest
    modern English rendering and matches the hostile plot context.
