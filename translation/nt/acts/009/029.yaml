theological_decisions:
- issue: Identity of Ἑλληνιστάς
  chosen_reading: Hellenists refers to the Greek-speaking Jewish group in Jerusalem
    rather than Gentiles in general.
  alternative_readings:
  - Greeks
  - Greek-speaking people
  rationale: Acts uses Ἑλληνισταί as a recognizable social-linguistic designation,
    especially in contrast with Hebrews in Acts 6:1. Rendering it as 'Hellenists'
    avoids importing the idea that Saul was here debating Gentiles as such.
