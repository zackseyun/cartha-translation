theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Rendered simply as 'the Lord' without expanding to 'the Lord Jesus'
    in the main text.
  alternative_readings:
  - the Lord Jesus
  rationale: The immediate context in Acts 9 strongly points to Jesus as the referent,
    but the Greek text says only τὸν κύριον. To avoid importing words not present
    while preserving the likely referent, the title is translated straightforwardly.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy #1 and
    #3'
- issue: Force of ἐπέστρεψαν
  chosen_reading: Expressed as 'turned to' rather than a more doctrinally loaded term.
  alternative_readings:
  - were converted to
  - returned to
  rationale: The verse reports a response to the healing miracle and apostolic witness.
    'Turned to' preserves the conversion/repentance sense without forcing a narrower
    theological system or prior spiritual state.
  doctrine_reference: 'Translation philosophy #3'
