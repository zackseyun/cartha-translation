id: ACT.9.35
reference: Acts 9:35
source:
  edition: SBLGNT
  text: καὶ εἶδαν αὐτὸν πάντες οἱ κατοικοῦντες Λύδδα καὶ τὸν ⸀Σαρῶνα, οἵτινες ἐπέστρεψαν
    ἐπὶ τὸν κύριον.
translation:
  text: And all those living in Lydda and Sharon saw him, and they turned to the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sharon' or 'the plain of Sharon.'
    reason: lexical_alternative
  - marker: b
    text: '''Turned to the Lord'' can also be rendered ''returned to the Lord'' or,
      more interpretively, ''were converted to the Lord.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδαν
  chosen: saw
  alternatives:
  - came to see
  - looked at
  lexicon: BDAG
  rationale: 'Aorist of ὁράω here most naturally means simple visual perception: the
    residents saw Aeneas after his healing. ''Saw'' is direct and sufficient in English.'
- source_word: πάντες οἱ κατοικοῦντες
  chosen: all those living
  alternatives:
  - all who lived
  - all the inhabitants
  lexicon: BDAG
  rationale: 'The articular participle κατοικοῦντες functions substantivally: ''those
    living'' or ''those dwelling.'' ''All those living'' preserves the participial
    sense while reading naturally.'
- source_word: Λύδδα
  chosen: Lydda
  rationale: Standard English transliteration of the place name, following the philosophy
    of transliterating names.
- source_word: τὸν Σαρῶνα
  chosen: Sharon
  alternatives:
  - the Sharon
  - the plain of Sharon
  lexicon: BDAG
  rationale: Σαρών refers to the Sharon region/plain. English idiom commonly uses
    'Sharon' as a place name without the article. The article in Greek reflects the
    toponym and need not be reproduced woodenly. The more expansive 'plain of Sharon'
    is possible but adds specificity not explicit in the verse.
- source_word: οἵτινες
  chosen: and they
  alternatives:
  - who
  - who indeed
  lexicon: BDAG
  rationale: οἵτινες introduces the consequent action of the people just mentioned.
    In smooth English, repeating with 'and they' best conveys the narrative progression
    without awkwardness. A relative 'who turned' is also possible, but the coordinate
    structure is clearer in English.
- source_word: ἐπέστρεψαν ἐπὶ τὸν κύριον
  chosen: turned to the Lord
  alternatives:
  - returned to the Lord
  - converted to the Lord
  lexicon: BDAG
  rationale: ἐπιστρέφω with ἐπί + accusative in Acts commonly denotes turning in repentance/faith
    toward the Lord. 'Turned to the Lord' preserves the biblical idiom without over-specifying
    either prior apostasy ('returned') or later theological terminology ('converted').
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord' as the default NT
    title. In Acts this naturally refers to the risen Lord Jesus in context, but the
    translation keeps the title itself rather than expanding it.
