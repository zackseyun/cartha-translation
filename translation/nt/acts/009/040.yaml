id: ACT.9.40
reference: Acts 9:40
source:
  edition: SBLGNT
  text: ἐκβαλὼν δὲ ἔξω πάντας ὁ Πέτρος ⸀καὶ θεὶς τὰ γόνατα προσηύξατο, καὶ ἐπιστρέψας
    πρὸς τὸ σῶμα εἶπεν· Ταβιθά, ἀνάστηθι. ἡ δὲ ἤνοιξεν τοὺς ὀφθαλμοὺς αὐτῆς, καὶ ἰδοῦσα
    τὸν Πέτρον ἀνεκάθισεν.
translation:
  text: But Peter put them all outside, knelt down and prayed, and turning toward
    the body said, “Tabitha, arise.” Then she opened her eyes, and when she saw Peter,
    she sat up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “get up.” The Greek imperative can be rendered either way; “arise” was
      chosen to preserve the solemn tone of the scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβαλών ... ἔξω πάντας
  chosen: put them all outside
  alternatives:
  - sent everyone outside
  - drove them all out
  lexicon: BDAG
  rationale: The participle with ἔξω and πάντας indicates removing all present from
    the room. 'Put them all outside' is natural English and preserves the concrete
    action without overstating force as 'drove out' might.
- source_word: θεὶς τὰ γόνατα
  chosen: knelt down
  alternatives:
  - having put down his knees
  - fell on his knees
  lexicon: BDAG
  rationale: This idiom means kneeling for prayer. 'Knelt down' is idiomatic modern
    English and accurately reflects the aorist participial action.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: BDAG
  rationale: Standard rendering of the middle form of προσεύχομαι; no special nuance
    requires expansion.
- source_word: ἐπιστρέψας πρὸς τὸ σῶμα
  chosen: turning toward the body
  alternatives:
  - having turned to the body
  lexicon: BDAG
  rationale: Retains the physical orientation indicated by ἐπιστρέψας and πρός. 'Body'
    is preferable to 'corpse' here because σῶμα is the actual lexical item and the
    narrative immediately moves to restoration of life.
- source_word: Ταβιθά
  chosen: Tabitha
  rationale: Personal names are transliterated by project policy.
- source_word: ἀνάστηθι
  chosen: arise
  alternatives:
  - get up
  - stand up
  lexicon: BDAG
  rationale: The imperative from ἀνίστημι can be rendered several ways. 'Arise' preserves
    the solemn, miracle-context tone and echoes biblical resurrection language without
    becoming archaic in this setting.
- source_word: ἤνοιξεν τοὺς ὀφθαλμοὺς αὐτῆς
  chosen: opened her eyes
  lexicon: BDAG
  rationale: Direct and literal rendering of the clause.
- source_word: ἰδοῦσα τὸν Πέτρον
  chosen: when she saw Peter
  alternatives:
  - seeing Peter
  lexicon: BDAG
  rationale: The participle is naturally rendered as a temporal clause in English
    for readability while preserving sequence.
- source_word: ἀνεκάθισεν
  chosen: she sat up
  alternatives:
  - she sat upright
  - she sat up again
  lexicon: BDAG
  rationale: This verb denotes sitting up from a reclining position. 'Sat up' is the
    clearest natural English equivalent in context.
- source_word: δὲ
  chosen: But / Then
  alternatives:
  - and
  lexicon: BDAG
  rationale: δέ marks narrative development rather than strong contrast. The first
    is rendered 'But' to mark transition from the prior scene; the second is rendered
    'Then' to move the narrative forward in natural English.
