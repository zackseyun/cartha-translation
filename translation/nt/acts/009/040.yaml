theological_decisions:
- issue: Rendering of resurrection-command language
  chosen_reading: arise
  alternative_readings:
  - get up
  - stand up
  rationale: The command ἀνάστηθι can be translated more colloquially, but 'arise'
    better preserves the narrative and theological resonance with restoration to life
    while not importing extra doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §§1, 6
