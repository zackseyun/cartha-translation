id: ACT.9.1
reference: Acts 9:1
source:
  edition: SBLGNT
  text: Ὁ δὲ Σαῦλος ἔτι ἐμπνέων ἀπειλῆς καὶ φόνου εἰς τοὺς μαθητὰς τοῦ κυρίου, προσελθὼν
    τῷ ἀρχιερεῖ
translation:
  text: But Saul, still breathing threats and murder against the disciples of the
    Lord, came to the high priest
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slaughter' for 'murder.' The Greek φόνος can denote killing or murder;
      'murder' was chosen for its moral force, while 'slaughter' reflects a traditional
      idiomatic rendering in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks narrative development with mild contrast/resumption. 'But' fits
    the shift back to Saul after the preceding scene.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - still yet
  lexicon: BDAG
  rationale: Conveys ongoing continuation of Saul's hostile state from prior context.
- source_word: ἐμπνέων
  chosen: breathing
  alternatives:
  - breathing in
  - being full of
  - exhaling
  lexicon: BDAG
  rationale: The participle is vivid and idiomatic; 'breathing' preserves the metaphor
    of hostility as Saul's very atmosphere.
- source_word: ἀπειλῆς
  chosen: threats
  alternatives:
  - threatening
  lexicon: BDAG
  rationale: Genitive with ἐμπνέων is well represented by an English object-like complement;
    plural 'threats' is idiomatic in English for hostile intent.
- source_word: φόνου
  chosen: murder
  alternatives:
  - slaughter
  - killing
  lexicon: BDAG
  rationale: φόνος denotes killing/murder. 'Murder' preserves the moral gravity and
    personal violence implied. 'Slaughter' is possible but more interpretive and is
    used by some English traditions idiomatically rather than as the plain lexical
    sense.
- source_word: εἰς τοὺς μαθητὰς
  chosen: against the disciples
  alternatives:
  - toward the disciples
  - at the disciples
  lexicon: BDAG
  rationale: With hostile nouns, εἰς carries adversative force in context; 'against'
    communicates the direction of Saul's threats and murderous intent.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - followers
  - learners
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise term for committed
    followers in Acts.'
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered ''Lord'' per doctrinal default. The genitive most
    naturally modifies ''disciples'': they belong to the Lord.'
- source_word: προσελθὼν
  chosen: came
  alternatives:
  - approached
  - went to
  lexicon: BDAG
  rationale: Aorist participle preceding the main action in the next verse can be
    rendered smoothly in English as 'came to.' Since this verse ends with the participial
    clause, 'came to' preserves the movement without awkwardness.
- source_word: ἀρχιερεῖ
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in this singular referent; clear and
    conventional in English.
