theological_decisions:
- issue: Rendering κύριος in τοῦ κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - the Master
  rationale: The term is not textually or theologically ambiguous here in a way that
    requires a main-text alternative. Per doctrine, κύριος defaults to 'Lord.' This
    also matches Luke-Acts usage for Jesus in this context.
