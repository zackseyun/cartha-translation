id: ACT.9.43
reference: Acts 9:43
source:
  edition: SBLGNT
  text: ἐγένετο ⸀δὲ ἡμέρας ἱκανὰς ⸀μεῖναι ἐν Ἰόππῃ παρά τινι Σίμωνι βυρσεῖ.
translation:
  text: And he stayed in Joppa for many days with a certain Simon, a tanner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the house of a certain Simon.' The Greek preposition can imply lodging
      with someone in his home.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ... μεῖναι
  chosen: he stayed
  alternatives:
  - it happened that he stayed
  - he came to stay
  lexicon: BDAG
  rationale: 'The construction ἐγένετο + infinitive is a common idiom introducing
    a resulting state or event. In natural English here, the sense is best conveyed
    by making the infinitive the main verb: ''he stayed.'' Retaining ''it happened''
    would be overly wooden and less idiomatic.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    preserves the flow simply and naturally without overstating contrast.
- source_word: ἡμέρας ἱκανὰς
  chosen: for many days
  alternatives:
  - for quite a few days
  - for a considerable number of days
  lexicon: BDAG
  rationale: ἱκανός with a time expression commonly means 'many' or 'considerable.'
    'For many days' is idiomatic and preserves the temporal duration without unnecessary
    expansion.
- source_word: ἐν Ἰόππῃ
  chosen: in Joppa
  lexicon: BDAG
  rationale: Ἰόππη is a place name and is appropriately transliterated as 'Joppa'
    per the translation philosophy for names.
- source_word: παρά τινι Σίμωνι
  chosen: with a certain Simon
  alternatives:
  - with someone named Simon
  - at the house of a certain Simon
  lexicon: BDAG
  rationale: παρά with the dative can indicate staying with or at the home of someone.
    'With a certain Simon' is concise and natural, while preserving the indefiniteness
    of τινι. The locative nuance ('at the house of') is implicit in the context of
    lodging and can be preserved in a footnote rather than expanded in the main text.
- source_word: βυρσεῖ
  chosen: a tanner
  alternatives:
  - a leatherworker
  lexicon: BDAG
  rationale: βυρσεύς specifically denotes a tanner, one who cures hides. 'Tanner'
    is the most precise and standard rendering; 'leatherworker' is broader and less
    exact.
