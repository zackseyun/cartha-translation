theological_decisions:
- issue: Whether to render ὑπερῴῳ with the traditional 'upper room' or a more generic
    spatial description
  chosen_reading: in an upstairs room
  alternative_readings:
  - in the upper room
  - in an upper chamber
  rationale: This is not a doctrinally weighty phrase, but translation tradition can
    imply a specific known location. The Greek is anarthrous and simply indicates
    an upper-story room, so the more transparent rendering is preferred in keeping
    with original-language primacy and readable modern English.
  doctrine_reference: Translation philosophy §§1, 6
