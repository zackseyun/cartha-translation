id: ACT.9.37
reference: Acts 9:37
source:
  edition: SBLGNT
  text: ἐγένετο δὲ ἐν ταῖς ἡμέραις ἐκείναις ἀσθενήσασαν αὐτὴν ἀποθανεῖν· λούσαντες
    δὲ ⸂ἔθηκαν αὐτὴν⸃ ἐν ὑπερῴῳ.
translation:
  text: Now in those days it happened that she became sick and died. After washing
    her, they laid her in an upstairs room.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the upper room.' The Greek simply refers to a room on the upper floor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came to pass
  - it happened that
  lexicon: BDAG
  rationale: Idiomatic narrative formula from γίνομαι in Acts. 'It happened' preserves
    the event-introducing function without archaic English like 'it came to pass.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - ', omitted'
  lexicon: BDAG
  rationale: Used here as a mild discourse connector introducing the next event in
    the narrative. 'Now' gives natural English flow while preserving transition.
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  chosen: in those days
  alternatives:
  - during those days
  lexicon: BDAG
  rationale: Standard temporal expression; 'in those days' is both natural and close
    to the Greek wording.
- source_word: ἀσθενήσασαν
  chosen: became sick
  alternatives:
  - fell sick
  - grew weak
  - became ill
  lexicon: BDAG
  rationale: Aorist participle of ἀσθενέω here denotes illness preceding death. 'Became
    sick' is clear modern English and preserves the sequence.
- source_word: ἀποθανεῖν
  chosen: died
  alternatives:
  - to die
  lexicon: BDAG
  rationale: 'Although the Greek uses an infinitive after ἐγένετο with αὐτήν, the
    natural English rendering is finite: ''she ... died.'' This reflects the sense
    rather than forcing an awkward literal construction.'
- source_word: λούσαντες
  chosen: after washing her
  alternatives:
  - having washed her
  - when they had washed her
  lexicon: BDAG
  rationale: Aorist participle indicating action prior to the main verb. 'After washing
    her' clearly conveys sequence in natural English. In context this refers to washing
    the body after death.
- source_word: ἔθηκαν αὐτὴν
  chosen: they laid her
  alternatives:
  - they placed her
  - they put her
  lexicon: BDAG
  rationale: τίθημι here means to place or lay. 'Laid her' fits the funerary context
    better than the more generic 'put her.'
- source_word: ἐν ὑπερῴῳ
  chosen: in an upstairs room
  alternatives:
  - in the upper room
  - in an upper chamber
  lexicon: BDAG
  rationale: ὑπερῷον denotes an upper room/upper story room. 'Upstairs room' is clear,
    modern, and spatially precise. The anarthrous Greek does not require 'the upper
    room,' which in English could suggest a specific famous room.
