id: ACT.9.25
reference: Acts 9:25
source:
  edition: SBLGNT
  text: λαβόντες δὲ ⸂οἱ μαθηταὶ αὐτοῦ⸃ νυκτὸς ⸂διὰ τοῦ τείχους καθῆκαν αὐτὸν⸃ χαλάσαντες
    ἐν σπυρίδι.
translation:
  text: But his disciples took him by night and lowered him through the wall, letting
    him down in a large basket.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through an opening in the wall.' The Greek says literally 'through the
      wall,' likely referring to an aperture or window in the city wall.
    reason: lexical_alternative
  - marker: b
    text: The Greek uses two lowering expressions ('lowered' and 'letting down'),
      a vivid construction emphasizing the manner of escape.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: took
  alternatives:
  - took hold of
  - received
  lexicon: BDAG
  rationale: Aorist participle from λαμβάνω here introduces the disciples' action
    in seizing or taking Paul in hand for escape. 'Took' is natural English and sufficiently
    concrete without overtranslating.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast with the previous plot against him.
    'But' fits the narrative turn better than a simple 'and.'
- source_word: οἱ μαθηταὶ αὐτοῦ
  chosen: his disciples
  alternatives:
  - the disciples
  - his followers
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is present in the text and should be represented.
    'Disciples' is the standard rendering of μαθηταί and is preferable to the looser
    'followers.'
- source_word: νυκτός
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: BDAG
  rationale: The genitive of time is idiomatically rendered 'by night' or 'at night.'
    'By night' preserves the compact narrative feel and slightly formal tone of the
    Greek.
- source_word: διὰ τοῦ τείχους
  chosen: through the wall
  alternatives:
  - through an opening in the wall
  - through the city wall
  lexicon: BDAG
  rationale: διά with the genitive indicates movement through. The phrase likely refers
    to an opening/window in the city wall, but the Greek does not explicitly mention
    'opening' or 'city,' so 'through the wall' stays close to the text while remaining
    intelligible.
- source_word: καθῆκαν αὐτόν
  chosen: lowered him
  alternatives:
  - let him down
  - sent him down
  lexicon: BDAG
  rationale: καθίημι in this context means to lower or let down from a height. 'Lowered
    him' is the clearest main rendering in contemporary English.
- source_word: χαλάσαντες
  chosen: letting him down
  alternatives:
  - lowering him
  - after lowering
  lexicon: BDAG
  rationale: χαλάω overlaps semantically with καθῆκαν and describes the means or manner
    of the lowering. Rendering it as 'letting him down' preserves the participial
    nuance and avoids flattening the double expression in Greek.
- source_word: ἐν σπυρίδι
  chosen: in a large basket
  alternatives:
  - in a basket
  - in a hamper
  lexicon: BDAG
  rationale: σπυρίς denotes a basket, often a large one. 'Large basket' helps distinguish
    it from smaller basket terms elsewhere and reflects the practical sense required
    for lowering a man.
