theological_decisions:
- issue: Rendering of Χριστός in a healing declaration
  chosen_reading: Jesus the Messiah
  alternative_readings:
  - Jesus Christ
  rationale: The phrase presents Jesus with the title Χριστός rather than using 'Christ'
    as a fixed surname. Rendering it 'Messiah' preserves the title's meaning and aligns
    with the project's default for Χριστός where context supports a titular sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
