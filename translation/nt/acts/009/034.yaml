id: ACT.9.34
reference: Acts 9:34
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ ὁ Πέτρος· Αἰνέα, ἰᾶταί σε Ἰησοῦς ⸀Χριστός· ἀνάστηθι καὶ στρῶσον
    σεαυτῷ· καὶ εὐθέως ἀνέστη.
translation:
  text: And Peter said to him, “Aeneas, Jesus the Messiah heals you. Get up and make
    your bed for yourself.” And immediately he got up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Jesus Christ heals you.” The Greek title Χριστός can be rendered “Christ”;
      here it is translated “Messiah” to preserve its titular sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰᾶταί
  chosen: heals
  alternatives:
  - is healing
  - cures
  - has healed
  lexicon: BDAG
  rationale: Present middle/passive indicative of ἰάομαι. In direct speech announcing
    the healing, English present 'heals' best captures the performative force without
    overinterpreting aspect as either progressive or completed-result. 'Has healed'
    is possible contextually but less formally tied to the Greek present.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name-like element. Here 'Jesus the Messiah' preserves the titular
    sense in Peter's declaration.
- source_word: ἀνάστηθι
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: Aorist imperative of ἀνίστημι. 'Get up' is natural modern English and
    fits the immediate command to a bedridden man. 'Rise' is more traditional but
    less idiomatic for the target audience.
- source_word: στρῶσον σεαυτῷ
  chosen: make your bed for yourself
  alternatives:
  - make up your mat
  - prepare a place for yourself
  - spread your bedding for yourself
  lexicon: BDAG
  rationale: στρώννυμι means to spread or make ready, especially bedding. In this
    healing context, the command signals restored ability to manage his own sleeping
    place. 'Make your bed' is idiomatic and clear; 'for yourself' preserves σεαυτῷ,
    emphasizing personal agency now restored.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Standard adverb meaning immediate action. 'Immediately' preserves Luke's
    frequent emphasis on prompt response and miraculous efficacy.
- source_word: ἀνέστη
  chosen: he got up
  alternatives:
  - he rose
  - he stood up
  lexicon: BDAG
  rationale: Aorist indicative of ἀνίστημι, narrating the result of Peter's command.
    'He got up' matches the earlier imperative 'Get up' and reads naturally in modern
    English.
- source_word: Αἰνέα
  chosen: Aeneas
  rationale: Personal name is transliterated per translation philosophy.
