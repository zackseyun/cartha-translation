id: ACT.9.38
reference: Acts 9:38
source:
  edition: SBLGNT
  text: ἐγγὺς δὲ οὔσης Λύδδας τῇ Ἰόππῃ οἱ μαθηταὶ ἀκούσαντες ὅτι Πέτρος ἐστὶν ἐν αὐτῇ
    ἀπέστειλαν ⸂δύο ἄνδρας⸃ πρὸς αὐτὸν παρακαλοῦντες· Μὴ ⸀ὀκνήσῃς διελθεῖν ἕως ⸀ἡμῶν·
translation:
  text: Now since Lydda was near Joppa, the disciples, hearing that Peter was there,
    sent two men to him, urging, “Do not delay to come to us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not hesitate to come to us.” The verb can denote hesitation or delay;
      the main text chooses the sense most natural in this urgent request.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγὺς ... οὔσης
  chosen: since ... was near
  alternatives:
  - with ... being near
  - because ... was near
  - as ... was near
  lexicon: BDAG
  rationale: The genitive absolute gives background circumstance. 'Since Lydda was
    near Joppa' is natural English and preserves the causal nuance implied by the
    disciples' action without over-paraphrasing.
- source_word: Λύδδας
  chosen: Lydda
  alternatives:
  - Lod
  lexicon: BDAG
  rationale: Standard transliteration of the Greek place name is appropriate in NT
    context; names are transliterated by project policy.
- source_word: Ἰόππῃ
  chosen: Joppa
  alternatives:
  - Jaffa
  lexicon: BDAG
  rationale: Standard NT transliteration preserves the Greek form familiar in Acts.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for
    μαθηταί in Acts, referring to members of the believing community.'
- source_word: ἀκούσαντες
  chosen: hearing
  alternatives:
  - when they heard
  - after hearing
  lexicon: BDAG
  rationale: The aorist participle is well represented by 'hearing' in English here,
    keeping the flow compact while indicating prior circumstance.
- source_word: ἐν αὐτῇ
  chosen: there
  alternatives:
  - in it
  - in that town
  lexicon: BDAG
  rationale: The pronoun refers to Lydda. 'There' is idiomatic English and avoids
    awkwardness while preserving the locative sense.
- source_word: ἀπέστειλαν δύο ἄνδρας
  chosen: sent two men
  alternatives:
  - sent two men out
  - dispatched two men
  lexicon: BDAG
  rationale: A straightforward rendering of the verb-object phrase. 'Dispatched' is
    possible but slightly more formal than needed.
- source_word: παρακαλοῦντες
  chosen: urging
  alternatives:
  - begging
  - appealing to
  - imploring
  lexicon: BDAG
  rationale: παρακαλέω here conveys earnest request. 'Urging' captures the tone without
    overstating emotional intensity.
- source_word: Μὴ ὀκνήσῃς
  chosen: Do not delay
  alternatives:
  - Do not hesitate
  - Do not be reluctant
  lexicon: BDAG
  rationale: ὀκνέω can mean hesitate, shrink back, or delay. In this travel-request
    context, 'Do not delay' best fits the practical sense of asking Peter to come
    promptly.
- source_word: διελθεῖν
  chosen: to come
  alternatives:
  - to go through
  - to come over
  - to come across
  lexicon: BDAG
  rationale: Although literally 'to go through/pass over,' in context it refers to
    Peter's traveling from Lydda to Joppa. 'To come' is the natural deictic equivalent
    from the speakers' perspective.
- source_word: ἕως ἡμῶν
  chosen: to us
  alternatives:
  - as far as us
  - to our place
  lexicon: BDAG
  rationale: The idiom means movement to the location of the speakers. 'To us' is
    concise and idiomatic English.
