id: ACT.9.4
reference: Acts 9:4
source:
  edition: SBLGNT
  text: καὶ πεσὼν ἐπὶ τὴν γῆν ἤκουσεν φωνὴν λέγουσαν αὐτῷ Σαοὺλ Σαούλ, τί με διώκεις;
translation:
  text: And falling to the ground, he heard a voice saying to him, “Saul, Saul, why
    are you persecuting me?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πεσὼν
  chosen: falling
  alternatives:
  - having fallen
  - when he fell
  lexicon: BDAG
  rationale: Aorist participle of πίπτω, rendered as an attendant circumstantial participle.
    'Falling' preserves the participial flow in natural English without over-specifying
    temporal nuance.
- source_word: ἐπὶ τὴν γῆν
  chosen: to the ground
  alternatives:
  - upon the ground
  - to the earth
  lexicon: BDAG
  rationale: Idiomatic English for motion onto the surface. 'Ground' fits the immediate
    scene better than the broader 'earth'.
- source_word: ἤκουσεν φωνὴν
  chosen: he heard a voice
  alternatives:
  - he heard a sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' in contexts of intelligible speech, especially
    since the following participle introduces spoken words. 'Sound' would under-translate
    the personal address.
- source_word: λέγουσαν αὐτῷ
  chosen: saying to him
  alternatives:
  - speaking to him
  lexicon: BDAG
  rationale: λέγω is the standard verb 'say.' 'Saying to him' closely reflects the
    Greek construction and prepares for the direct quotation.
- source_word: Σαοὺλ Σαούλ
  chosen: Saul, Saul
  lexicon: BDAG
  rationale: Personal name is transliterated per project philosophy. The repetition
    is preserved because it is emphatic and rhetorically significant.
- source_word: τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Although τί is literally 'what,' in this idiom with a verb it functions
    adverbially as 'why.' This is standard and natural English.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun retained plainly. Its force is important because
    the speaker identifies the persecution of his people with persecution of himself.
- source_word: διώκεις
  chosen: are you persecuting
  alternatives:
  - do you persecute
  - are you pursuing
  lexicon: BDAG
  rationale: Present indicative conveys ongoing action; English progressive best captures
    the immediacy in context. 'Persecuting' fits Acts usage for hostile pursuit of
    believers better than the broader 'pursuing'.
