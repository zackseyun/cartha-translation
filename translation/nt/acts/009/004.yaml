theological_decisions:
- issue: Identification of the speaker with those Saul is attacking
  chosen_reading: Retain the direct wording 'me' without explanatory expansion.
  alternative_readings:
  - Paraphrastic expansions such as 'my people' or 'my followers'
  rationale: The verse itself presents the speaker as personally identified with the
    persecuted community. The translation should preserve that theological force without
    importing interpretive explanation into the main text.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
