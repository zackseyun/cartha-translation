id: ACT.9.27
reference: Acts 9:27
source:
  edition: SBLGNT
  text: Βαρναβᾶς δὲ ἐπιλαβόμενος αὐτὸν ἤγαγεν πρὸς τοὺς ἀποστόλους, καὶ διηγήσατο
    αὐτοῖς πῶς ἐν τῇ ὁδῷ εἶδεν τὸν κύριον καὶ ὅτι ἐλάλησεν αὐτῷ καὶ πῶς ἐν Δαμασκῷ
    ἐπαρρησιάσατο ἐν τῷ ὀνόματι ⸀τοῦ Ἰησοῦ.
translation:
  text: But Barnabas took hold of him and brought him to the apostles, and told them
    how on the road he had seen the Lord, and that he had spoken to him, and how in
    Damascus he had spoken boldly in the name of Jesus.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιλαβόμενος
  chosen: took hold of
  alternatives:
  - took
  - took him in
  - seized
  lexicon: BDAG
  rationale: The participle of ἐπιλαμβάνομαι often means to take hold of or take along.
    'Took hold of' preserves the concrete force better than the flatter 'took,' while
    fitting the supportive action of Barnabas in context rather than hostile seizure.
- source_word: ἤγαγεν πρὸς τοὺς ἀποστόλους
  chosen: brought him to the apostles
  alternatives:
  - led him to the apostles
  lexicon: BDAG
  rationale: ἄγω commonly means lead or bring. 'Brought' is natural English here and
    reflects Barnabas presenting Saul to the apostles.
- source_word: διηγήσατο
  chosen: told them
  alternatives:
  - related to them
  - recounted to them
  - explained to them
  lexicon: BDAG
  rationale: The verb means to relate in detail or recount. 'Told them' is slightly
    less formal but remains accurate in readable modern English; the following clauses
    supply the detailed content.
- source_word: πῶς ἐν τῇ ὁδῷ
  chosen: how on the road
  alternatives:
  - how on the way
  - how along the road
  lexicon: BDAG
  rationale: ὁδός here refers to the journey to Damascus, not 'the Way' as a movement
    label. 'On the road' is idiomatic and contextually clear.
- source_word: εἶδεν τὸν κύριον
  chosen: he had seen the Lord
  alternatives:
  - he saw the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default. The pluperfect-like
    English 'had seen' fits the reported sequence from Barnabas's recounting, though
    the Greek aorist itself is simply past.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Per the contested-terms guidance, κύριος defaults to 'Lord.' In Acts
    9 this refers to the risen Jesus and carries christological weight.
- source_word: ὅτι ἐλάλησεν αὐτῷ
  chosen: that he had spoken to him
  alternatives:
  - that he spoke to him
  lexicon: BDAG
  rationale: ὅτι introduces the content Barnabas recounted. The subject is the Lord
    from the preceding clause. 'Had spoken' clarifies the sequence in English.
- source_word: ἐπαρρησιάσατο
  chosen: he had spoken boldly
  alternatives:
  - he had preached boldly
  - he had spoken openly
  - he had been bold in speaking
  lexicon: BDAG
  rationale: παρρησιάζομαι denotes speaking freely, openly, or boldly. 'Spoken boldly'
    preserves the lexical sense without importing the more specific 'preached' unless
    context explicitly requires it.
- source_word: ἐν τῷ ὀνόματι τοῦ Ἰησοῦ
  chosen: in the name of Jesus
  alternatives:
  - for the name of Jesus
  - under the authority of Jesus
  lexicon: BDAG
  rationale: The phrase is a standard idiom for acting or speaking in relation to
    Jesus' authority and confession. 'In the name of Jesus' preserves the biblical
    idiom and its theological resonance.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
