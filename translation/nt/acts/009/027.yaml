theological_decisions:
- issue: Referent of 'the Lord' in Saul's road experience
  chosen_reading: '''the Lord'' refers to Jesus'
  alternative_readings:
  - '''the Lord'' as a more general divine reference'
  rationale: In the immediate context of Acts 9, Saul's Damascus-road encounter is
    with the risen Jesus, and the verse concludes with 'in the name of Jesus,' reinforcing
    the identification. Rendering κύριος as 'Lord' preserves the title without flattening
    its christological force.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
