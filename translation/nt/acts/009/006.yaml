id: ACT.9.6
reference: Acts 9:6
source:
  edition: SBLGNT
  text: ἀλλὰ ἀνάστηθι καὶ εἴσελθε εἰς τὴν πόλιν, καὶ λαληθήσεταί σοι ⸂ὅ τί⸃ σε δεῖ
    ποιεῖν.
translation:
  text: But get up and enter the city, and you will be told what you must do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'it will be spoken to you what it is necessary for you
      to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Adversative conjunction marking a turn from Saul's question to Jesus'
    command. 'But' is the most natural concise English equivalent here.
- source_word: ἀνάστηθι
  chosen: get up
  alternatives:
  - rise
  - stand up
  lexicon: BDAG
  rationale: Second person aorist middle imperative of ἀνίστημι. 'Get up' is idiomatic
    modern English and fits the immediate command to Saul after falling to the ground.
- source_word: εἴσελθε
  chosen: enter
  alternatives:
  - go into
  lexicon: BDAG
  rationale: Aorist imperative of εἰσέρχομαι. 'Enter' is slightly more concise and
    formal than 'go into' while remaining natural.
- source_word: εἰς τὴν πόλιν
  chosen: the city
  alternatives:
  - into the city
  lexicon: BDAG
  rationale: The prepositional phrase is carried by the English verb phrase 'enter
    the city,' which naturally incorporates εἰς.
- source_word: λαληθήσεταί σοι
  chosen: you will be told
  alternatives:
  - it will be spoken to you
  - someone will tell you
  lexicon: BDAG
  rationale: Future passive of λαλέω with dative pronoun. The passive is retained
    in natural English as 'you will be told,' avoiding an unnecessary explicit subject
    while preserving the Greek's indirectness.
- source_word: ὅ τί
  chosen: what
  alternatives:
  - the things that
  - what it is that
  lexicon: BDAG
  rationale: The combined relative-interrogative expression introduces the content
    of what will be communicated. Simple 'what' best captures the sense in idiomatic
    English.
- source_word: σε δεῖ ποιεῖν
  chosen: you must do
  alternatives:
  - it is necessary for you to do
  - you need to do
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. 'You must do' preserves the force
    more clearly than the softer 'need to do' and is more natural than the overly
    literal 'it is necessary for you to do.'
