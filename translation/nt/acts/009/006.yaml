theological_decisions:
- issue: Force of δεῖ in divine-direction context
  chosen_reading: must
  alternative_readings:
  - need to
  rationale: In Acts, δεῖ often carries a strong sense of necessity, frequently within
    divine purpose or obligation. Rendering it as 'must' preserves that force without
    over-specifying the source of the necessity beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
