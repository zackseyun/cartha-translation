id: ACT.9.24
reference: Acts 9:24
source:
  edition: SBLGNT
  text: ἐγνώσθη δὲ τῷ Σαύλῳ ἡ ἐπιβουλὴ αὐτῶν. ⸂παρετηροῦντο δὲ καὶ⸃ τὰς πύλας ἡμέρας
    τε καὶ νυκτὸς ὅπως αὐτὸν ἀνέλωσιν·
translation:
  text: But their plot became known to Saul. They were also watching the gates day
    and night so that they might kill him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the city gates.' The Greek simply says 'the gates,' with the city setting
      understood from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώσθη
  chosen: became known
  alternatives:
  - was made known
  - was discovered
  lexicon: BDAG
  rationale: Aorist passive of γινώσκω here is naturally rendered as an impersonal
    passive, indicating that the plot came to Saul's knowledge. 'Became known' is
    idiomatic and preserves the passive sense without over-specifying the agent.
- source_word: ἐπιβουλή
  chosen: plot
  alternatives:
  - conspiracy
  - scheme
  lexicon: BDAG
  rationale: The noun denotes a hostile plan or ambush. 'Plot' is concise, natural
    English and fits the murderous intent clarified in the second clause.
- source_word: παρετηροῦντο
  chosen: were watching
  alternatives:
  - were closely watching
  - were guarding
  lexicon: BDAG
  rationale: The imperfect middle/passive conveys ongoing surveillance. 'Were watching'
    preserves the durative force. 'Guarding' is possible by implication, but the verb
    more directly emphasizes observation/surveillance.
- source_word: πύλας
  chosen: gates
  alternatives:
  - city gates
  lexicon: BDAG
  rationale: Plural 'gates' refers to the city gates of Damascus in context. The simple
    'gates' is sufficient in the main text; 'city gates' is an interpretive expansion
    not strictly required.
- source_word: ἡμέρας τε καὶ νυκτός
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: BDAG
  rationale: This genitive expression is idiomatically rendered 'day and night,' conveying
    continual vigilance.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    the purposive force.
- source_word: ἀνέλωσιν
  chosen: might kill
  alternatives:
  - might do away with
  - might murder
  lexicon: BDAG
  rationale: From ἀναιρέω, in this context meaning to kill or do away with. 'Might
    kill' is the clearest and most direct rendering in contemporary English.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or narrative development. 'But' fits the shift
    from the plot itself to Saul's awareness of it.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: The particle adds the further detail that they were not only plotting
    but also watching the gates. 'Also' captures the additive force.
