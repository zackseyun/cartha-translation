id: ACT.9.9
reference: Acts 9:9
source:
  edition: SBLGNT
  text: καὶ ἦν ἡμέρας τρεῖς μὴ βλέπων, καὶ οὐκ ἔφαγεν οὐδὲ ἔπιεν.
translation:
  text: And for three days he was without sight, and he neither ate nor drank.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'not seeing.' The phrase indicates that Saul was unable
      to see.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἡμέρας τρεῖς
  chosen: for three days he was
  alternatives:
  - he was three days
  - he remained for three days
  lexicon: BDAG
  rationale: The accusative of extent of time (ἡμέρας τρεῖς) is most naturally rendered
    in idiomatic English as 'for three days.' Keeping 'he was' reflects ἦν without
    overparaphrasing to 'remained,' though that is a possible contextual alternative.
- source_word: μὴ βλέπων
  chosen: without sight
  alternatives:
  - not seeing
  - blind
  lexicon: BDAG
  rationale: βλέπω means 'see.' The participial phrase literally means 'not seeing.'
    'Without sight' is idiomatic and preserves the result of Saul's condition without
    importing the stronger adjective 'blind' into the main text, though 'blind' is
    contextually implied from the surrounding narrative.
- source_word: οὐκ ἔφαγεν
  chosen: he did not eat / he neither ate
  alternatives:
  - he ate nothing
  lexicon: BDAG
  rationale: Aorist ἔφαγεν is straightforwardly 'ate.' In coordination with οὐδὲ ἔπιεν,
    English idiom is best expressed as 'he neither ate nor drank.'
- source_word: οὐδὲ ἔπιεν
  chosen: nor drank
  alternatives:
  - and did not drink
  lexicon: BDAG
  rationale: οὐδὲ coordinates the second negated verb with the first. 'Nor drank'
    is the most natural paired rendering with 'neither ate' in English.
