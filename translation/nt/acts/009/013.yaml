id: ACT.9.13
reference: Acts 9:13
source:
  edition: SBLGNT
  text: ἀπεκρίθη δὲ Ἁνανίας· Κύριε, ⸀ἤκουσα ἀπὸ πολλῶν περὶ τοῦ ἀνδρὸς τούτου, ὅσα
    κακὰ ⸂τοῖς ἁγίοις σου ἐποίησεν⸃ ἐν Ἰερουσαλήμ·
translation:
  text: But Ananias answered, “Lord, I have heard from many about this man, how many
    evil things he has done to your saints in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what evil things he has done to your holy ones in Jerusalem.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - But ... replied
  lexicon: BDAG
  rationale: δέ is mildly connective/adversative here; 'But' fits the narrative turn
    as Ananias responds with hesitation. 'Answered' closely reflects ἀποκρίνομαι.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default for κύριος, 'Lord' is the standard rendering. In
    direct address to Jesus in Acts 9, it preserves both respect and theological weight.
- source_word: ἤκουσα
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: BDAG
  rationale: The aorist is naturally past, but English present perfect idiomatically
    conveys information received and still relevant to Ananias's present objection.
- source_word: ἀπὸ πολλῶν
  chosen: from many
  alternatives:
  - from many people
  - from many sources
  lexicon: BDAG
  rationale: The Greek is concise and indefinite; 'from many' preserves that brevity
    without adding a noun not explicit in the text.
- source_word: περὶ τοῦ ἀνδρὸς τούτου
  chosen: about this man
  alternatives:
  - concerning this man
  lexicon: BDAG
  rationale: Straightforward rendering of περί + genitive with ἀνήρ. 'This man' preserves
    the demonstrative force.
- source_word: ὅσα κακὰ
  chosen: how many evil things
  alternatives:
  - what evil things
  - how much harm
  lexicon: BDAG
  rationale: ὅσα with neuter plural κακά emphasizes the extent/number of harmful deeds.
    'How many evil things' captures both quantity and moral quality.
- source_word: τοῖς ἁγίοις σου
  chosen: to your saints
  alternatives:
  - to your holy ones
  - to your people
  lexicon: BDAG
  rationale: ἅγιοι in Acts commonly refers to believers as 'saints.' This preserves
    the established NT term and the possessive 'your' indicates they belong to the
    Lord.
- source_word: ἐποίησεν
  chosen: he has done
  alternatives:
  - he did
  - he has committed
  lexicon: BDAG
  rationale: ποιέω is broad; 'done' is the most direct equivalent. Present perfect
    English pairs naturally with 'I have heard' and highlights continuing relevance.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard locative rendering.
