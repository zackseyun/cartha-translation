id: ACT.9.12
reference: Acts 9:12
source:
  edition: SBLGNT
  text: καὶ εἶδεν ⸂ἄνδρα ἐν ὁράματι Ἁνανίαν ὀνόματι⸃ εἰσελθόντα καὶ ἐπιθέντα αὐτῷ
    ⸀χεῖρας ὅπως ἀναβλέψῃ.
translation:
  text: and he has seen in a vision a man named Ananias coming in and laying hands
    on him so that he might regain his sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "saw"; the Greek verb is aorist, but English "has seen" fits the present
      relevance of the vision in context.
    reason: lexical_alternative
  - marker: b
    text: Or "he might see again."
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: has seen
  alternatives:
  - saw
  lexicon: BDAG
  rationale: Although the form is aorist ('saw'), in context Ananias is being told
    the content of a vision already granted to Saul and still relevant to the present
    moment. English present perfect naturally conveys a past event with present relevance.
    'Saw' is possible but sounds less idiomatic in this reported-vision context.
- source_word: ἄνδρα
  chosen: a man
  lexicon: BDAG
  rationale: ἀνήρ here refers to an adult male person, specifically Ananias. 'A man'
    is the plain and gender-accurate rendering.
- source_word: ἐν ὁράματι
  chosen: in a vision
  lexicon: BDAG
  rationale: Standard rendering of the prepositional phrase indicating the sphere
    or medium of what Saul saw.
- source_word: Ἁνανίαν ὀνόματι
  chosen: named Ananias
  alternatives:
  - Ananias by name
  lexicon: BDAG
  rationale: This idiom identifies the man by name. 'Named Ananias' is natural modern
    English while preserving the identification.
- source_word: εἰσελθόντα
  chosen: coming in
  alternatives:
  - entering
  - having entered
  lexicon: BDAG
  rationale: The participle describes Ananias's action within the vision. 'Coming
    in' is idiomatic and readable; 'entering' is slightly more formal; 'having entered'
    overstates sequence in English.
- source_word: ἐπιθέντα αὐτῷ χεῖρας
  chosen: laying hands on him
  alternatives:
  - placing his hands on him
  - laying his hands on him
  lexicon: BDAG
  rationale: This is a common biblical expression for the act of placing hands on
    someone. 'Laying hands on him' preserves the recognizable idiom without adding
    interpretive detail.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English and accurately
    conveys the clause's function.
- source_word: ἀναβλέψῃ
  chosen: he might regain his sight
  alternatives:
  - he might see again
  - he might look up
  lexicon: BDAG
  rationale: In this healing context ἀναβλέπω means to recover sight or see again,
    not merely 'look up.' 'Regain his sight' is the clearest idiomatic English expression.
