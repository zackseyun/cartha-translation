theological_decisions:
- issue: Whether to preserve the idiom of hand-laying without specifying sacramental
    or charismatic meaning
  chosen_reading: laying hands on him
  alternative_readings:
  - placing his hands on him
  rationale: The Greek states the physical action but does not explicitly define its
    theological significance here. The translation preserves the biblical idiom and
    avoids importing a denominational reading about ordination, sacrament, or healing
    method.
  doctrine_reference: Preserve theological tension rather than resolve it.
