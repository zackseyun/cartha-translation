id: ACT.9.11
reference: Acts 9:11
source:
  edition: SBLGNT
  text: ὁ δὲ κύριος πρὸς αὐτόν· ⸀Ἀναστὰς πορεύθητι ἐπὶ τὴν ῥύμην τὴν καλουμένην Εὐθεῖαν
    καὶ ζήτησον ἐν οἰκίᾳ Ἰούδα Σαῦλον ὀνόματι Ταρσέα, ἰδοὺ γὰρ προσεύχεται,
translation:
  text: And the Lord said to him, “Get up and go to the street called Straight, and
    in the house of Judas look for a man named Saul, from Tarsus. For behold, he is
    praying.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Saul of Tarsus.” The Greek adjective Ταρσέα identifies Saul by his origin
      from Tarsus.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In this
    narrative context it refers to the risen Jesus speaking to Ananias, and 'Lord'
    preserves both authority and standard NT usage.
- source_word: Ἀναστὰς
  chosen: Get up
  alternatives:
  - Rise
  - After getting up
  lexicon: BDAG
  rationale: Aorist participle used imperativally with the following finite imperative.
    'Get up' is natural modern English and preserves the sense of initiating action
    without over-literal awkwardness.
- source_word: πορεύθητι
  chosen: go
  alternatives:
  - be on your way
  - travel
  lexicon: BDAG
  rationale: Aorist middle imperative of πορεύομαι. 'Go' is the most idiomatic and
    sufficiently direct rendering in English.
- source_word: ῥύμην
  chosen: street
  alternatives:
  - lane
  lexicon: BDAG
  rationale: Refers to a street within a city. 'Street' is the standard and clearest
    English equivalent.
- source_word: τὴν καλουμένην Εὐθεῖαν
  chosen: called Straight
  alternatives:
  - named Straight
  lexicon: BDAG
  rationale: Passive participle plus adjective functioning as a proper street name.
    'Called Straight' is idiomatic and preserves the naming construction.
- source_word: ἐν οἰκίᾳ Ἰούδα
  chosen: in the house of Judas
  alternatives:
  - at Judas's house
  - in Judas's house
  lexicon: BDAG
  rationale: The prepositional phrase naturally modifies the location where Saul is
    to be sought. 'In the house of Judas' is slightly more formal but clear and close
    to the Greek structure.
- source_word: ζήτησον
  chosen: look for
  alternatives:
  - seek
  - find
  lexicon: BDAG
  rationale: Imperative of ζητέω here means to search for or ask for someone. 'Look
    for' is natural modern English; 'find' would overstate the verb's nuance.
- source_word: Σαῦλον ὀνόματι Ταρσέα
  chosen: a man named Saul, from Tarsus
  alternatives:
  - Saul by name, a Tarsian
  - Saul of Tarsus
  lexicon: BDAG
  rationale: ὀνόματι marks the name ('named Saul'), and Ταρσέα denotes origin ('a
    man from Tarsus'). 'From Tarsus' communicates the ethnic/geographic adjective
    naturally in English. 'Of Tarsus' is traditional and possible, but 'from Tarsus'
    is more transparent to modern readers.
- source_word: ἰδοὺ γὰρ
  chosen: For behold
  alternatives:
  - for look
  - for see
  lexicon: BDAG
  rationale: ἰδού draws attention to what follows, while γάρ gives the reason for
    the command. 'For behold' preserves both discourse functions, though slightly
    elevated; it fits the solemn narrative tone.
- source_word: προσεύχεται
  chosen: he is praying
  alternatives:
  - he prays
  lexicon: BDAG
  rationale: Present middle/passive indicative here is best rendered progressively
    in context, highlighting Saul's current activity at the moment Ananias is being
    sent.
