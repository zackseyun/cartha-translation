theological_decisions:
- issue: Referent of κύριος
  chosen_reading: The speaker is rendered simply as 'the Lord' without expanding the
    identity in the translation.
  alternative_readings:
  - the Lord Jesus
  rationale: The immediate context identifies the speaker, but the Greek text here
    uses only κύριος. The translation preserves the wording of the verse itself and
    avoids importing an explicit identification not stated in this clause.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
