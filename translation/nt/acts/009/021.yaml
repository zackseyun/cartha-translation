id: ACT.9.21
reference: Acts 9:21
source:
  edition: SBLGNT
  text: ἐξίσταντο δὲ πάντες οἱ ἀκούοντες καὶ ἔλεγον· Οὐχ οὗτός ἐστιν ὁ πορθήσας ⸀ἐν
    Ἰερουσαλὴμ τοὺς ἐπικαλουμένους τὸ ὄνομα τοῦτο, καὶ ὧδε εἰς τοῦτο ἐληλύθει ἵνα
    δεδεμένους αὐτοὺς ἀγάγῃ ἐπὶ τοὺς ἀρχιερεῖς;
translation:
  text: 'And all who heard him were amazed and were saying, “Isn’t this the man who
    devastated those in Jerusalem who call on this name? And he had come here for
    this purpose: to bring them bound before the chief priests.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “invoke this name.” The expression “call on this name” preserves the
      biblical idiom for appeal to or confession of Jesus’ name.
    reason: lexical_alternative
  - marker: b
    text: Literally “this name,” referring to Jesus.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξίσταντο
  chosen: were amazed
  alternatives:
  - were beside themselves
  - were astounded
  lexicon: BDAG
  rationale: The imperfect middle/passive indicates an ongoing state of astonishment
    among the hearers. 'Were amazed' is natural modern English and preserves the force
    without the more idiomatic but less transparent 'were beside themselves.'
- source_word: πάντες οἱ ἀκούοντες
  chosen: all who heard him
  alternatives:
  - all who were hearing
  - all the hearers
  lexicon: BDAG
  rationale: The substantival participle refers to those hearing Saul. 'Heard him'
    makes the implied object clear in English from context while remaining faithful
    to the Greek sense.
- source_word: πορθήσας
  chosen: devastated
  alternatives:
  - destroyed
  - ravaged
  - made havoc of
  lexicon: BDAG
  rationale: πορθέω is stronger than merely 'persecuted'; it conveys violent ruin
    or devastation. 'Devastated' preserves the severity better than traditional 'destroyed'
    or archaic 'made havoc of,' while fitting the context of Saul's prior attacks
    on believers.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Straightforward locative rendering.
- source_word: τοὺς ἐπικαλουμένους τὸ ὄνομα τοῦτο
  chosen: those ... who call on this name
  alternatives:
  - those ... who invoke this name
  - those ... who call upon this name
  lexicon: BDAG
  rationale: The participle ἐπικαλουμένους with ὄνομα is a recognized expression for
    invoking or appealing to a name in worshipful/confessional allegiance. 'Call on
    this name' preserves the biblical idiom and its theological resonance better than
    the more technical 'invoke.'
- source_word: τὸ ὄνομα τοῦτο
  chosen: this name
  alternatives:
  - the name of Jesus
  lexicon: BDAG
  rationale: The Greek says 'this name,' likely referring to Jesus by reverent shorthand.
    The translation preserves the demonstrative rather than making the referent explicit
    in the main text.
- source_word: ὧδε
  chosen: here
  lexicon: BDAG
  rationale: Simple adverb of place.
- source_word: εἰς τοῦτο
  chosen: for this purpose
  alternatives:
  - for this very thing
  - for this reason
  lexicon: BDAG
  rationale: This idiom expresses intended purpose. 'For this purpose' is idiomatic
    and clear.
- source_word: ἐληλύθει
  chosen: he had come
  alternatives:
  - he came
  lexicon: BDAG
  rationale: The pluperfect form naturally points to prior arrival relative to the
    speakers' present reflection. 'Had come' preserves that nuance better than a simple
    past.
- source_word: δεδεμένους
  chosen: bound
  alternatives:
  - in chains
  - tied up
  lexicon: BDAG
  rationale: Perfect passive participle from δέω indicates a state of being tied or
    bound. 'Bound' is concise and formal enough; 'in chains' may over-specify the
    means.
- source_word: ἀγάγῃ ἐπὶ τοὺς ἀρχιερεῖς
  chosen: bring them bound before the chief priests
  alternatives:
  - lead them bound to the chief priests
  - bring them as prisoners to the chief priests
  lexicon: BDAG
  rationale: ἄγω commonly means 'bring/lead.' With ἐπί plus accusative here, 'before'
    captures presentation to authority. This avoids flattening the judicial nuance
    while remaining natural English.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple context refers to the chief-priestly
    authorities, not multiple simultaneous holders of the high priest office. 'Chief
    priests' is the standard and historically accurate rendering.
