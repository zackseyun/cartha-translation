theological_decisions:
- issue: Whether to expand 'this name' to 'the name of Jesus' in the main text
  chosen_reading: Retain 'this name'
  alternative_readings:
  - the name of Jesus
  rationale: The Greek leaves the referent implicit, and preserving 'this name' maintains
    the narrative's reverential and rhetorical force. The referent is clear from context
    without interpretive expansion.
  doctrine_reference: Translation philosophy §1, §3
- issue: How strongly to render πορθήσας regarding Saul's prior actions
  chosen_reading: Use 'devastated' rather than a softer term like 'persecuted'
  alternative_readings:
  - persecuted
  - destroyed
  - made havoc of
  rationale: The text uses a vivid verb stronger than generic persecution language.
    Rendering it strongly avoids understating Saul's violence while not importing
    details beyond the Greek.
  doctrine_reference: Translation philosophy §1, §5
