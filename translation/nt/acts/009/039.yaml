id: ACT.9.39
reference: Acts 9:39
source:
  edition: SBLGNT
  text: ἀναστὰς δὲ Πέτρος συνῆλθεν αὐτοῖς· ὃν παραγενόμενον ἀνήγαγον εἰς τὸ ὑπερῷον,
    καὶ παρέστησαν αὐτῷ πᾶσαι αἱ χῆραι κλαίουσαι καὶ ἐπιδεικνύμεναι χιτῶνας καὶ ἱμάτια
    ὅσα ἐποίει μετ’ αὐτῶν οὖσα ἡ Δορκάς.
translation:
  text: So Peter got up and went with them. When he arrived, they took him up to the
    upper room, and all the widows stood beside him, weeping and showing the tunics
    and garments that Dorcas used to make while she was with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood before him.' The Greek could be read more formally, but the context
      suggests the widows gathered around Peter in grief.
    reason: lexical_alternative
  - marker: b
    text: '''Tunics and garments'' reflects two distinct Greek clothing terms, likely
      referring to inner and outer garments.'
    reason: cultural_note
  - marker: c
    text: Dorcas is the Greek name; in Acts 9:36 she is also called Tabitha.
    reason: cross_reference
lexical_decisions:
- source_word: ἀναστὰς
  chosen: got up
  alternatives:
  - rose
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces Peter's responsive action.
    'Got up' is natural modern English and preserves the movement sense without sounding
    overly formal.
- source_word: συνῆλθεν αὐτοῖς
  chosen: went with them
  alternatives:
  - went along with them
  - accompanied them
  lexicon: BDAG
  rationale: Though συνέρχομαι is literally 'came/went together,' in this context
    it means Peter accompanied the messengers. 'Went with them' is idiomatic and clear.
- source_word: παραγενόμενον
  chosen: when he arrived
  alternatives:
  - after he came
  - upon his arrival
  lexicon: BDAG
  rationale: The participle marks attendant circumstance/time relative to the main
    verb ἀνήγαγον. 'When he arrived' renders the temporal force smoothly in English.
- source_word: ἀνήγαγον
  chosen: they took him up
  alternatives:
  - they brought him up
  - they led him up
  lexicon: BDAG
  rationale: ἀνάγω here refers to leading someone upward to an upper room. 'Took him
    up' is straightforward and fits the spatial context.
- source_word: ὑπερῷον
  chosen: upper room
  alternatives:
  - upstairs room
  - room upstairs
  lexicon: BDAG
  rationale: '''Upper room'' is a standard and accurate rendering for an upstairs
    chamber, and remains readily understandable in modern English.'
- source_word: παρέστησαν αὐτῷ
  chosen: stood beside him
  alternatives:
  - presented themselves to him
  - stood before him
  lexicon: BDAG
  rationale: In context the widows are physically present around Peter, not merely
    being formally introduced. 'Stood beside him' captures the scene naturally.
- source_word: πᾶσαι αἱ χῆραι
  chosen: all the widows
  alternatives:
  - all the widowed women
  lexicon: BDAG
  rationale: χήρα specifically means 'widow.' The phrase emphasizes the whole group
    of women who had benefited from Dorcas's care.
- source_word: κλαίουσαι
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: The present participle depicts ongoing mourning. 'Weeping' fits the solemn
    tone better than the more colloquial 'crying.'
- source_word: ἐπιδεικνύμεναι
  chosen: showing
  alternatives:
  - displaying
  - holding up for him to see
  lexicon: BDAG
  rationale: The participle indicates demonstrative presentation of the clothing Dorcas
    had made. 'Showing' is simple and sufficient.
- source_word: χιτῶνας
  chosen: tunics
  alternatives:
  - shirts
  - inner garments
  lexicon: BDAG
  rationale: χιτών refers to a basic body garment, often worn next to the skin. 'Tunics'
    preserves the ancient clothing category better than anachronistic modern terms.
- source_word: ἱμάτια
  chosen: garments
  alternatives:
  - cloaks
  - outer garments
  - clothes
  lexicon: BDAG
  rationale: ἱμάτια is broader and often refers to outer clothing. 'Garments' keeps
    the distinction from χιτῶνας without over-specifying one type.
- source_word: ὅσα ἐποίει
  chosen: used to make
  alternatives:
  - made
  - was making
  lexicon: BDAG
  rationale: The imperfect ἐποίει suggests customary or repeated action in past time.
    'Used to make' best conveys Dorcas's habitual charitable work.
- source_word: μετ’ αὐτῶν οὖσα
  chosen: while she was with them
  alternatives:
  - when she was with them
  - while among them
  lexicon: BDAG
  rationale: This phrase most naturally indicates Dorcas's presence among the widows
    during her life, not merely companionship in a vague sense. 'While she was with
    them' is idiomatic and contextually clear.
- source_word: ἡ Δορκάς
  chosen: Dorcas
  alternatives:
  - Tabitha
  lexicon: BDAG
  rationale: The verse itself uses the Greek name Δορκάς, so the translation follows
    the form present in this clause. The alternative Semitic name appears in the surrounding
    context, not here.
