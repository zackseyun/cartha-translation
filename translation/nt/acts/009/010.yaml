id: ACT.9.10
reference: Acts 9:10
source:
  edition: SBLGNT
  text: Ἦν δέ τις μαθητὴς ἐν Δαμασκῷ ὀνόματι Ἁνανίας, καὶ εἶπεν πρὸς αὐτὸν ⸂ἐν ὁράματι
    ὁ κύριος⸃· Ἁνανία. ὁ δὲ εἶπεν· Ἰδοὺ ἐγώ, κύριε.
translation:
  text: Now there was a disciple in Damascus named Ananias, and the Lord said to him
    in a vision, “Ananias.” And he said, “Here I am, Lord.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἦν δέ
  chosen: Now there was
  alternatives:
  - And there was
  - There was
  lexicon: BDAG
  rationale: The imperfect of εἰμί introduces a new scene or participant, and δέ marks
    a mild narrative transition. 'Now there was' captures both the discourse shift
    and natural English narrative flow better than a bare 'there was.'
- source_word: τις μαθητὴς
  chosen: a disciple
  alternatives:
  - a certain disciple
  lexicon: BDAG
  rationale: τις is indefinite here, introducing an otherwise unknown individual.
    English normally conveys this with the indefinite article alone; 'a certain disciple'
    is possible but sounds stilted and adds emphasis not required by the context.
- source_word: ἐν Δαμασκῷ
  chosen: in Damascus
  lexicon: BDAG
  rationale: Straightforward locative use of ἐν with the dative; standard transliteration
    of the place name is retained.
- source_word: ὀνόματι Ἁνανίας
  chosen: named Ananias
  alternatives:
  - by the name Ananias
  - whose name was Ananias
  lexicon: BDAG
  rationale: The dative ὀνόματι is idiomatic for naming. 'Named Ananias' is concise,
    natural English and preserves the sense without unnecessary formality.
- source_word: ἐν ὁράματι
  chosen: in a vision
  alternatives:
  - in vision
  - through a vision
  lexicon: BDAG
  rationale: The phrase indicates the mode in which the Lord addressed Ananias. 'In
    a vision' is the most idiomatic and transparent rendering in English.
- source_word: ὁ κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' The article is present in Greek,
    and in this narrative context 'the Lord' naturally refers to Jesus as the risen
    Lord speaking to Ananias.
- source_word: εἶπεν πρὸς αὐτόν
  chosen: said to him
  alternatives:
  - spoke to him
  lexicon: BDAG
  rationale: λέγω with πρός + accusative is well represented by 'said to.' 'Spoke
    to' is possible but less direct than the Greek wording.
- source_word: Ἁνανία
  chosen: Ananias
  lexicon: BDAG
  rationale: Vocative proper name, transliterated according to standard English convention.
- source_word: Ἰδοὺ ἐγώ
  chosen: Here I am
  alternatives:
  - Behold, I am here
  - Look, it is I
  lexicon: BDAG
  rationale: This is a conventional response of readiness or attention. 'Here I am'
    conveys the idiomatic force in natural modern English better than a wooden rendering
    of ἰδού.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  lexicon: BDAG
  rationale: The vocative κύριε can in some contexts mean 'sir,' but here the speaker
    is responding to a divine address in a vision from ὁ κύριος. 'Lord' is therefore
    contextually and theologically appropriate, and aligns with the project's default
    rendering of κύριος.
