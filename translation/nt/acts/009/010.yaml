theological_decisions:
- issue: Referent of ὁ κύριος / κύριε in the vision
  chosen_reading: Both refer to the risen Jesus as Lord
  alternative_readings:
  - A more generic divine address
  rationale: In Acts 9 the speaker in the vision is the same Lord who commissions
    Ananias regarding Saul and identifies Saul as his chosen instrument in the following
    verses. Rendering κύριος as 'Lord' preserves the christological force without
    overexpanding the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
