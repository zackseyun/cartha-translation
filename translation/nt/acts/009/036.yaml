id: ACT.9.36
reference: Acts 9:36
source:
  edition: SBLGNT
  text: Ἐν Ἰόππῃ δέ τις ἦν μαθήτρια ὀνόματι Ταβιθά, ἣ διερμηνευομένη λέγεται Δορκάς·
    αὕτη ἦν πλήρης ⸂ἔργων ἀγαθῶν⸃ καὶ ἐλεημοσυνῶν ὧν ἐποίει.
translation:
  text: Now in Joppa there was a disciple named Tabitha, which translated is called
    Dorcas. She was full of good works and acts of mercy that she was doing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dorcas is the Greek name corresponding to Tabitha; the name means 'gazelle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθήτρια
  chosen: disciple
  alternatives:
  - female disciple
  lexicon: BDAG
  rationale: The noun is explicitly feminine, referring to a woman disciple. English
    'disciple' is natural and sufficient in context because the woman is immediately
    identified by name and feminine pronouns; 'female disciple' is more explicit but
    less idiomatic.
- source_word: ὀνόματι
  chosen: named
  alternatives:
  - by name
  - with the name
  lexicon: BDAG
  rationale: The dative idiom ὀνόματι commonly introduces a person's name. 'Named'
    is idiomatic modern English and preserves the sense without woodenness.
- source_word: Ταβιθά
  chosen: Tabitha
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: διερμηνευομένη λέγεται
  chosen: which translated is called
  alternatives:
  - which translated means
  - which is translated
  lexicon: BDAG
  rationale: The participle plus passive verb indicates an explanatory translation
    of the Semitic name into Greek. 'Which translated is called' preserves both the
    translation note and the naming formula, though slightly formal.
- source_word: Δορκάς
  chosen: Dorcas
  alternatives:
  - Gazelle
  lexicon: BDAG
  rationale: Luke gives the Greek equivalent name, not merely the lexical meaning.
    Therefore the proper name 'Dorcas' belongs in the main text; the semantic gloss
    'Gazelle' may be preserved in a footnote.
- source_word: πλήρης
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: '''Full of'' is the most natural rendering and conveys habitual abundance
    of the qualities that follow.'
- source_word: ἔργων ἀγαθῶν
  chosen: good works
  alternatives:
  - good deeds
  lexicon: BDAG
  rationale: A standard and accurate rendering. 'Good works' preserves the lexical
    connection to ἔργα while remaining natural in English.
- source_word: ἐλεημοσυνῶν
  chosen: acts of mercy
  alternatives:
  - charitable deeds
  - almsgiving
  lexicon: BDAG
  rationale: The term denotes merciful giving to those in need. 'Acts of mercy' is
    accessible modern English and avoids narrowing the sense too strictly to monetary
    alms, though 'almsgiving' is a viable more formal alternative.
- source_word: ὧν ἐποίει
  chosen: that she was doing
  alternatives:
  - which she did
  - that she kept doing
  lexicon: BDAG
  rationale: The imperfect ἐποίει suggests ongoing or customary action. 'That she
    was doing' preserves the durative sense better than a simple past.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ here marks narrative development. 'Now' is a natural discourse marker
    in English narrative.
- source_word: Ἐν Ἰόππῃ
  chosen: in Joppa
  rationale: Standard rendering of the place name in its locative phrase.
