theological_decisions:
- issue: Rendering the feminine noun μαθήτρια
  chosen_reading: disciple
  alternative_readings:
  - female disciple
  rationale: The verse notably uses the feminine form 'female disciple,' the only
    NT occurrence of μαθήτρια. However, English can naturally preserve the referent
    with 'disciple' while the surrounding syntax and pronouns make her sex explicit.
    This avoids awkwardness without obscuring the text's meaning.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Rendering ἐλεημοσυνῶν
  chosen_reading: acts of mercy
  alternative_readings:
  - almsgiving
  - charitable deeds
  rationale: The term can specifically denote alms, but in context it describes Tabitha's
    pattern of merciful care for the needy. 'Acts of mercy' preserves the ethical
    force in readable modern English without importing a narrower institutional sense.
  doctrine_reference: Readable modern English, not archaic or academic
