theological_decisions:
- issue: Apparent tension between Acts 9:7 and Acts 22:9 regarding what Saul's companions
    heard
  chosen_reading: Render φωνή here as 'sound' in the main text
  alternative_readings:
  - Render φωνή as 'voice' and leave the tension unresolved in the main text
  rationale: The semantic range of φωνή includes both 'voice' and 'sound.' Because
    Acts 22:9 says the companions did not hear the voice of the one speaking to Paul,
    translating Acts 9:7 as 'hearing the sound' preserves both passages without forcing
    a contradiction or importing extra explanation. This follows the translation philosophy
    of preserving source-based nuance and theological tension where appropriate.
  doctrine_reference: Translation philosophy §§1, 3, 5
