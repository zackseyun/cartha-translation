id: ACT.9.7
reference: Acts 9:7
source:
  edition: SBLGNT
  text: οἱ δὲ ἄνδρες οἱ συνοδεύοντες αὐτῷ εἱστήκεισαν ἐνεοί, ἀκούοντες μὲν τῆς φωνῆς
    μηδένα δὲ θεωροῦντες.
translation:
  text: Now the men traveling with him stood speechless, hearing the sound but seeing
    no one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hearing the voice.' The Greek word can mean either 'voice' or 'sound';
      compare Acts 22:9.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄνδρες
  chosen: Now the men
  alternatives:
  - And the men
  - But the men
  lexicon: BDAG
  rationale: οἱ ἄνδρες is straightforwardly 'the men.' δέ is mildly connective/adversative;
    'Now' gives natural English discourse movement without overstating contrast.
- source_word: οἱ συνοδεύοντες αὐτῷ
  chosen: traveling with him
  alternatives:
  - accompanying him
  - journeying with him
  lexicon: BDAG
  rationale: συνοδεύω means to accompany on a journey. 'Traveling with him' is idiomatic
    modern English and preserves the journey context.
- source_word: εἱστήκεισαν
  chosen: stood
  alternatives:
  - were standing
  - had stopped
  lexicon: BDAG
  rationale: Pluperfect of ἵστημι can function with stative force, describing their
    standing position. 'Stood' is concise and natural in English narrative.
- source_word: ἐνεοί
  chosen: speechless
  alternatives:
  - silent
  - mute
  - astonished into silence
  lexicon: BDAG
  rationale: ἐνεός denotes being unable to speak, often from shock. 'Speechless' captures
    both silence and the implied astonishment better than the flatter 'silent.'
- source_word: ἀκούοντες μὲν τῆς φωνῆς
  chosen: hearing the sound
  alternatives:
  - hearing the voice
  - hearing the noise
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' In light of the apparent tension with
    Acts 22:9, where Paul's companions are said not to hear the voice, rendering it
    here as 'sound' best reflects a distinction between perceiving a sound and understanding
    articulated speech. This is a lexical-contextual choice, not a doctrinal harmonization
    beyond what the semantic range allows.
- source_word: μηδένα δὲ θεωροῦντες
  chosen: but seeing no one
  alternatives:
  - but observing no one
  - but seeing nobody
  lexicon: BDAG
  rationale: θεωρέω is 'see/observe/behold.' 'Seeing no one' is the most natural English
    rendering, and μηδένα indicates that no person was visible to them.
