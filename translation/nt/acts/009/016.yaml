id: ACT.9.16
reference: Acts 9:16
source:
  edition: SBLGNT
  text: ἐγὼ γὰρ ὑποδείξω αὐτῷ ὅσα δεῖ αὐτὸν ὑπὲρ τοῦ ὀνόματός μου παθεῖν.
translation:
  text: For I will show him how much he must suffer for my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of my name' or 'on behalf of my name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit first-person pronoun retained for emphasis; English naturally
    conveys this with 'I,' especially alongside the future verb.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanation/ground for the preceding statement. 'For' preserves
    the connective force more transparently than the more interpretive 'because.'
- source_word: ὑποδείξω
  chosen: will show
  alternatives:
  - will indicate
  - will make known
  lexicon: BDAG
  rationale: Future active of ὑποδείκνυμι means to show, point out, or make known.
    'Will show' is clear, natural, and preserves the directness of the Greek.
- source_word: αὐτῷ
  chosen: him
  lexicon: BDAG
  rationale: Dative indirect object rendered idiomatically in English as 'him' after
    'show.'
- source_word: ὅσα
  chosen: how much
  alternatives:
  - what things
  - all that
  lexicon: BDAG
  rationale: In this construction with δεῖ and infinitive, ὅσα idiomatically expresses
    extent/quantity rather than listing specific items. 'How much' is the most natural
    English equivalent here.
- source_word: δεῖ
  chosen: must
  alternatives:
  - it is necessary for
  lexicon: BDAG
  rationale: Conveys necessity or divine necessity. 'Must' is concise and preserves
    the force without over-paraphrasing.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: 'With ''my name,'' ὑπέρ here denotes cause or sake: suffering because
    of allegiance to Jesus and for the sake of his name. ''For'' is idiomatic and
    sufficiently broad; alternatives are preserved in a footnote because they may
    bring out the nuance more explicitly.'
- source_word: τοῦ ὀνόματός μου
  chosen: my name
  alternatives:
  - the sake of my name
  lexicon: BDAG
  rationale: '''Name'' in biblical usage can stand for the person, authority, and
    public confession associated with that person. The literal ''my name'' is retained
    to preserve this theological richness.'
- source_word: παθεῖν
  chosen: suffer
  alternatives:
  - undergo suffering
  lexicon: BDAG
  rationale: Aorist infinitive of πάσχω, commonly 'to suffer' or 'experience suffering.'
    'Suffer' is the standard, natural rendering and fits the construction with δεῖ.
