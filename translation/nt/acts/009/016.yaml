theological_decisions:
- issue: Nature of the necessity expressed by δεῖ
  chosen_reading: must
  alternative_readings:
  - is destined to
  - is appointed to
  rationale: The verse states necessity without specifying in the wording whether
    the necessity is logical, providential, or explicitly decretive. 'Must' preserves
    the theological tension and avoids importing a stronger determinist nuance than
    the Greek itself requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
