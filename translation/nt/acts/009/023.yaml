theological_decisions:
- issue: Rendering of οἱ Ἰουδαῖοι in a hostile narrative context
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  - the Jewish leaders
  rationale: The translation preserves the Greek wording rather than softening or
    specifying the referent beyond the text. In Acts this term can be contextually
    complex, but here there is insufficient basis in the verse itself to restrict
    it to leaders only. A footnote clarifies that this refers to a particular group
    opposing Saul, not to all Jewish people universally.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source says without importing interpretive narrowing'
