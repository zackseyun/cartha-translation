id: ACT.9.23
reference: Acts 9:23
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐπληροῦντο ἡμέραι ἱκαναί, συνεβουλεύσαντο οἱ Ἰουδαῖοι ἀνελεῖν αὐτόν·
translation:
  text: When many days had passed, the Jews conspired to kill him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the Jews'; in context this refers to a particular group opposing
      Saul, not to every Jewish person without exception.
    reason: cultural_note
  - marker: b
    text: Or 'had been fulfilled' / 'were completed' for 'many days had passed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'plotted together' for 'conspired.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: When
  alternatives:
  - And when
  - Now when
  - But when
  lexicon: BDAG
  rationale: Introduces a temporal transition. In smooth modern English, 'When' captures
    the sense without overtranslating δέ.
- source_word: ἐπληροῦντο
  chosen: had passed
  alternatives:
  - were being fulfilled
  - were completed
  lexicon: BDAG
  rationale: The imperfect passive of πληρόω with a temporal subject ('days') idiomatically
    means that time was passing or being completed. 'Had passed' is natural English
    and preserves the temporal sense.
- source_word: ἡμέραι ἱκαναί
  chosen: many days
  alternatives:
  - a considerable number of days
  - enough days
  lexicon: BDAG
  rationale: ἱκαναί here means 'considerable' or 'many' rather than merely 'sufficient.'
    'Many days' is idiomatic and matches the narrative sense of a substantial interval.
- source_word: συνεβουλεύσαντο
  chosen: conspired
  alternatives:
  - plotted together
  - took counsel together
  - consulted together
  lexicon: BDAG
  rationale: The middle verb conveys joint deliberation with hostile intent in this
    context. 'Conspired' communicates both the collective planning and the malicious
    purpose more clearly than the more neutral 'consulted together.'
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek says 'the Jews' without further qualification. This should
    not be narrowed to 'leaders' without textual warrant. 'Judeans' is possible in
    some contexts, but here the standard ethnic-religious sense in Acts is best preserved
    as 'the Jews.'
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to do away with
  - to murder
  - to put to death
  lexicon: BDAG
  rationale: ἀναιρέω here denotes taking someone's life. 'To kill' is direct, clear,
    and natural; 'murder' adds a legal-moral nuance not explicit in the verb itself,
    while 'put to death' can sound overly formal.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Saul in context.
