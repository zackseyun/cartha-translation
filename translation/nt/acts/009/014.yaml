theological_decisions:
- issue: Force of the expression 'call on your name' addressed to Jesus
  chosen_reading: Retain the idiom 'call on your name' without reducing it to merely
    'identify with you' or expanding it to an explicit doctrinal paraphrase about
    worship.
  alternative_readings:
  - all who pray to you
  - all who invoke your authority
  rationale: The phrase ἐπικαλεῖσθαι τὸ ὄνομα in biblical and early Christian usage
    commonly denotes invocation in prayer and allegiance. Because the speaker addresses
    Jesus directly ('your name'), the wording naturally reflects devotion directed
    to Jesus. The translation preserves this theological weight without adding explanatory
    wording not present in the Greek.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
