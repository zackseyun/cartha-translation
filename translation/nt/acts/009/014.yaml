id: ACT.9.14
reference: Acts 9:14
source:
  edition: SBLGNT
  text: καὶ ὧδε ἔχει ἐξουσίαν παρὰ τῶν ἀρχιερέων δῆσαι πάντας τοὺς ἐπικαλουμένους
    τὸ ὄνομά σου.
translation:
  text: And here he has authority from the chief priests to bind all who call on your
    name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all those invoking your name.' The Greek expression is a standard biblical
      idiom for calling on or invoking someone, often in prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Adverb of place meaning 'here.' In context Ananias is speaking about
    Saul's authority in Damascus, so 'here' is the most natural modern English rendering.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: '''Authority'' best captures delegated legal or official authorization
    from the chief priests, which fits the following phrase παρὰ τῶν ἀρχιερέων.'
- source_word: παρὰ τῶν ἀρχιερέων
  chosen: from the chief priests
  alternatives:
  - from the high priests
  lexicon: BDAG
  rationale: 'παρά with the genitive indicates source: the authority comes ''from''
    them. ἀρχιερεῖς in NT usage commonly refers to the Jerusalem chief-priestly leadership,
    conventionally rendered ''chief priests'' rather than the less idiomatic ''high
    priests.'''
- source_word: δῆσαι
  chosen: to bind
  alternatives:
  - to tie up
  - to arrest
  lexicon: BDAG
  rationale: The infinitive literally means 'to bind.' While arrest is the practical
    sense, 'bind' preserves the source imagery and remains understandable in context.
- source_word: πάντας τοὺς ἐπικαλουμένους
  chosen: all who call on
  alternatives:
  - all those invoking
  - everyone who appeals to
  lexicon: BDAG
  rationale: 'The articular participle functions substantivally: ''all those who call
    on.'' This is a standard early Christian expression for invoking Jesus in prayer/worship,
    and ''call on'' preserves that biblical idiom better than more interpretive alternatives.'
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: BDAG
  rationale: A literal rendering is best. In biblical usage 'name' can stand for the
    person and authority invoked, but the text itself says 'your name,' and the idiom
    is clear in English.
