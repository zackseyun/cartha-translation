id: ACT.9.33
reference: Acts 9:33
source:
  edition: SBLGNT
  text: εὗρεν δὲ ἐκεῖ ἄνθρωπόν τινα ⸂ὀνόματι Αἰνέαν⸃ ἐξ ἐτῶν ὀκτὼ κατακείμενον ἐπὶ
    ⸀κραβάττου, ὃς ἦν παραλελυμένος.
translation:
  text: And there he found a certain man named Aeneas, who had been bedridden for
    eight years, and was paralyzed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'lying on a mat' or 'confined to a pallet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he came upon
  - he encountered
  lexicon: BDAG
  rationale: Aorist indicative of εὑρίσκω is straightforwardly rendered 'found.' This
    preserves the narrative sequence without adding nuance beyond the Greek.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here marks simple narrative continuation. 'And' is natural modern
    English and preserves the connective force without overinterpreting it.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Locative adverb indicating the place Peter was; 'there' is the natural
    concise rendering.
- source_word: ἄνθρωπόν τινα
  chosen: a certain man
  alternatives:
  - a man
  - someone
  lexicon: BDAG
  rationale: The combination of ἄνθρωπος with τις often introduces a particular but
    previously unknown person. 'A certain man' preserves that discourse function better
    than the flatter 'a man' or less personal 'someone.'
- source_word: ὀνόματι Αἰνέαν
  chosen: named Aeneas
  alternatives:
  - by the name Aeneas
  lexicon: BDAG
  rationale: Dative ὀνόματι with a personal name is idiomatically rendered 'named
    Aeneas.' The personal name is transliterated per translation philosophy.
- source_word: ἐξ ἐτῶν ὀκτὼ
  chosen: for eight years
  alternatives:
  - from eight years
  - for a period of eight years
  lexicon: BDAG
  rationale: This idiom expresses duration extending over a period. In English, 'for
    eight years' best communicates the temporal sense naturally.
- source_word: κατακείμενον ἐπὶ κραβάττου
  chosen: had been bedridden
  alternatives:
  - lying on a mat
  - lying in bed
  - confined to a mat
  lexicon: BDAG
  rationale: Literally the phrase describes lying down on a pallet/mat. In context,
    with the duration phrase and the following statement that he was paralyzed, 'had
    been bedridden' communicates the condition idiomatically while remaining faithful
    to the sense. The more literal image is preserved as an alternative in a footnote
    because κράβαττος can specifically denote a mat or pallet.
- source_word: κραβάττου
  chosen: bedridden
  alternatives:
  - mat
  - pallet
  - bed
  lexicon: BDAG
  rationale: Though κράβαττος often refers to a mat or pallet, English style is smoother
    if the noun is absorbed into the idiom 'bedridden' in this clause. Because this
    reduces the concrete image, the lexical alternative is preserved in a footnote.
- source_word: ὃς ἦν παραλελυμένος
  chosen: and was paralyzed
  alternatives:
  - who was paralyzed
  - and he was paralyzed
  lexicon: BDAG
  rationale: παραλελυμένος denotes a paralyzed condition. Rendering with 'was paralyzed'
    is clear and idiomatic. 'And' before the clause reflects the cumulative description
    in English, though 'who was paralyzed' would also be possible.
