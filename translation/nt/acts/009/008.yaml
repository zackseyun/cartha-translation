id: ACT.9.8
reference: Acts 9:8
source:
  edition: SBLGNT
  text: ἠγέρθη δὲ ⸀Σαῦλος ἀπὸ τῆς γῆς, ἀνεῳγμένων ⸀δὲ τῶν ὀφθαλμῶν αὐτοῦ ⸀οὐδὲν ἔβλεπεν·
    χειραγωγοῦντες δὲ αὐτὸν εἰσήγαγον εἰς Δαμασκόν.
translation:
  text: But Saul got up from the ground, and though his eyes were open, he saw nothing.
    So they led him by the hand and brought him into Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with his eyes having been opened, he saw nothing.'
      The Greek construction highlights the irony that his eyes were open, yet he
      remained unable to see.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγέρθη
  chosen: got up
  alternatives:
  - rose
  - was raised up
  lexicon: BDAG
  rationale: 'Aorist passive of ἐγείρω here functions intransitively in narrative
    context: Saul stood up from the ground. ''Got up'' is natural modern English and
    fits optimal equivalence better than the slightly stiffer ''rose.'''
- source_word: ἀπὸ τῆς γῆς
  chosen: from the ground
  alternatives:
  - from the earth
  - from the land
  lexicon: BDAG
  rationale: In this immediate scene γῆ refers to the ground on which Saul had fallen,
    not 'earth' in a cosmic sense or 'land' geographically.
- source_word: ἀνεῳγμένων ... τῶν ὀφθαλμῶν αὐτοῦ
  chosen: though his eyes were open
  alternatives:
  - when his eyes had been opened
  - with his eyes open
  lexicon: BDAG
  rationale: The genitive absolute marks attendant circumstance. Because the point
    is the contrast between opened eyes and inability to see, 'though his eyes were
    open' best captures the concessive force implicit in context.
- source_word: οὐδὲν ἔβλεπεν
  chosen: he saw nothing
  alternatives:
  - he could see nothing
  lexicon: BDAG
  rationale: This straightforwardly expresses total lack of sight. 'He could see nothing'
    is also possible, but 'he saw nothing' is slightly closer to the Greek while remaining
    idiomatic.
- source_word: χειραγωγοῦντες
  chosen: led him by the hand
  alternatives:
  - guiding him by the hand
  - taking him by the hand
  lexicon: BDAG
  rationale: χειραγωγέω specifically denotes leading someone by the hand, especially
    one needing guidance. The fuller phrase preserves that concrete image better than
    a generic 'guided him.'
- source_word: εἰσήγαγον εἰς Δαμασκόν
  chosen: brought him into Damascus
  alternatives:
  - led him into Damascus
  - took him into Damascus
  lexicon: BDAG
  rationale: εἰσάγω means to bring or lead into. Because the previous participle already
    expresses the manner of leading, 'brought him into Damascus' avoids redundancy
    while preserving the motion into the city.
- source_word: δὲ
  chosen: But / and / so
  alternatives:
  - now
  lexicon: BDAG
  rationale: δέ appears three times, marking narrative progression and mild contrast.
    English does not require each instance to be represented identically; 'But' at
    the start signals transition from the prior event, 'and' links the concessive
    clause, and 'So' introduces the resulting action in natural English.
- source_word: Σαῦλος
  chosen: Saul
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention per project philosophy.
- source_word: Δαμασκόν
  chosen: Damascus
  lexicon: BDAG
  rationale: Place name is transliterated by standard convention per project philosophy.
