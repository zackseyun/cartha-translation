theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: '''the Lord'' is retained as the title in the main text, with the
    contextual referent understood to be Jesus.'
  alternative_readings:
  - explicitly rendering 'Jesus'
  rationale: The Greek text reads κυρίου, not Ἰησοῦ. Since the title is clear and
    important in Luke-Acts, the translation preserves it rather than resolving the
    title into a name in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. κύριος
    → Lord.'
