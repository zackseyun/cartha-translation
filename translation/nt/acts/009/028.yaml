id: ACT.9.28
reference: Acts 9:28
source:
  edition: SBLGNT
  text: καὶ ἦν μετ’ αὐτῶν εἰσπορευόμενος ⸂καὶ ἐκπορευόμενος⸃ εἰς ⸀Ἰερουσαλήμ, παρρησιαζόμενος
    ἐν τῷ ὀνόματι τοῦ ⸀κυρίου,
translation:
  text: And he was with them in Jerusalem, going in and going out, speaking boldly
    in the name of the Lord.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦν μετ’ αὐτῶν
  chosen: he was with them
  alternatives:
  - he stayed with them
  - he was among them
  lexicon: BDAG
  rationale: The imperfect of εἰμί with μετά + genitive indicates ongoing association.
    'He was with them' preserves the simple durative sense without adding the stronger
    nuance of residence implied by 'stayed.'
- source_word: εἰσπορευόμενος καὶ ἐκπορευόμενος
  chosen: going in and going out
  alternatives:
  - coming and going
  - moving about freely
  lexicon: BDAG
  rationale: The paired participles form an idiomatic expression for regular movement
    and open association. 'Going in and going out' is the closest formal rendering
    and preserves the repetitive aspect; smoother English alternatives are possible
    but less transparent to the Greek.
- source_word: εἰς Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Although εἰς often means 'into,' here with the idiom 'going in and going
    out' it functions locatively with the city as the sphere of activity. 'In Jerusalem'
    best reflects the sense in context and avoids the misleading impression of repeated
    entry into the city itself.
- source_word: παρρησιαζόμενος
  chosen: speaking boldly
  alternatives:
  - speaking openly
  - speaking courageously
  lexicon: BDAG
  rationale: The verb denotes frank, fearless public speech. 'Speaking boldly' is
    the standard and most natural rendering in Acts, preserving both openness and
    courage.
- source_word: ἐν τῷ ὀνόματι
  chosen: in the name of
  alternatives:
  - on the authority of
  - with reference to
  lexicon: BDAG
  rationale: The phrase can imply authority, representation, or confession. 'In the
    name of' preserves the biblical idiom and leaves its full resonance intact rather
    than narrowing it to one component such as authority alone.
- source_word: τοῦ κυρίου
  chosen: the Lord
  alternatives: []
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In this context in
    Acts, the referent is Jesus, but the title should remain translated rather than
    paraphrased as a proper name.
