id: ACT.9.41
reference: Acts 9:41
source:
  edition: SBLGNT
  text: δοὺς δὲ αὐτῇ χεῖρα ἀνέστησεν αὐτήν, φωνήσας δὲ τοὺς ἁγίους καὶ τὰς χήρας παρέστησεν
    αὐτὴν ζῶσαν.
translation:
  text: And giving her his hand, he raised her up; then he called the saints and the
    widows and presented her alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'helped her up' / 'made her stand up'; the Greek verb can denote causing
      someone to rise or stand, and in this context also resonates with resurrection
      language.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοὺς ... χεῖρα
  chosen: giving her his hand
  alternatives:
  - taking her by the hand
  - giving her a hand
  lexicon: BDAG
  rationale: The participle δοὺς with χεῖρα is a natural idiom for extending one's
    hand to assist someone. 'Giving her his hand' stays close to the Greek while remaining
    clear in English. 'Giving her a hand' is avoided because it can sound idiomatic
    in modern English in a less literal sense.
- source_word: ἀνέστησεν
  chosen: raised her up
  alternatives:
  - helped her up
  - made her stand up
  lexicon: BDAG
  rationale: ἀνίστημι commonly means 'raise up' or 'cause to stand.' In this resurrection
    context, 'raised her up' preserves the verbal force and echoes the miracle without
    overstating beyond the immediate action of helping her to her feet.
- source_word: φωνήσας
  chosen: he called
  alternatives:
  - summoning
  - calling together
  lexicon: BDAG
  rationale: The aorist participle indicates prior action before the main verb παρέστησεν.
    'He called' is natural English and sufficiently captures the act of summoning
    the group.
- source_word: τοὺς ἁγίους
  chosen: the saints
  alternatives:
  - the holy ones
  - the believers
  lexicon: BDAG
  rationale: ἅγιοι is a standard designation for God's holy people in the NT. 'The
    saints' is the most direct rendering here. 'Believers' is interpretive and less
    lexically precise, while 'holy ones' is more wooden in English.
- source_word: τὰς χήρας
  chosen: the widows
  lexicon: BDAG
  rationale: A straightforward lexical rendering. The separate mention likely reflects
    the narrative importance of the widows in the preceding context, so the distinction
    should be preserved.
- source_word: παρέστησεν
  chosen: presented
  alternatives:
  - stood before
  - showed
  lexicon: BDAG
  rationale: παρίστημι here means to present or bring someone before others. 'Presented'
    fits the context of Peter bringing Tabitha before the assembled saints and widows.
    'Showed' is too weak, and 'stood before' would misassign the action.
- source_word: ζῶσαν
  chosen: alive
  alternatives:
  - living
  lexicon: BDAG
  rationale: 'The participle functions predicatively after παρέστησεν: he presented
    her to them as alive. ''Alive'' is the most idiomatic and contextually forceful
    English rendering in a resurrection scene.'
