theological_decisions:
- issue: Rendering the resurrection-related verb ἀνέστησεν in narrative context
  chosen_reading: raised her up
  alternative_readings:
  - helped her up
  - made her stand up
  rationale: The verse narrates Peter's action after Tabitha has been restored to
    life in the preceding context. 'Raised her up' preserves the lexical connection
    to resurrection language while still fitting the immediate physical action. This
    maintains the narrative's theological weight without importing claims beyond the
    text.
  doctrine_reference: Translation philosophy §1, §3
