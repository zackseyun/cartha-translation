id: ACT.9.42
reference: Acts 9:42
source:
  edition: SBLGNT
  text: γνωστὸν δὲ ἐγένετο καθ’ ὅλης ⸀τῆς Ἰόππης, καὶ ⸂ἐπίστευσαν πολλοὶ⸃ ἐπὶ τὸν
    κύριον.
translation:
  text: And it became known throughout all Joppa, and many believed in the Lord.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνωστὸν ... ἐγένετο
  chosen: it became known
  alternatives:
  - it became widely known
  - it was made known
  lexicon: BDAG
  rationale: The impersonal construction naturally yields 'it became known' in English.
    This preserves the event/result sense of ἐγένετο without over-specifying an agent.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural unobtrusive English equivalent in this context.
- source_word: καθ’ ὅλης τῆς Ἰόππης
  chosen: throughout all Joppa
  alternatives:
  - throughout the whole of Joppa
  - through all Joppa
  lexicon: BDAG
  rationale: κατά with the genitive here conveys distribution through the area. 'Throughout
    all Joppa' is idiomatic and preserves the comprehensiveness of ὅλης.
- source_word: Ἰόππης
  chosen: Joppa
  alternatives:
  - Jaffa
  lexicon: BDAG
  rationale: Per translation philosophy, personal and place names are transliterated
    by standard conventions. 'Joppa' is the conventional NT English form.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to believe
  - put their faith
  lexicon: BDAG
  rationale: πιστεύω is most directly rendered 'believe.' The aorist indicates the
    event of coming to faith, but 'believed' is sufficiently natural and concise in
    narrative English.
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The substantive adjective is well represented by 'many.' Adding 'people'
    would be interpretive and unnecessary.
- source_word: ἐπὶ τὸν κύριον
  chosen: in the Lord
  alternatives:
  - on the Lord
  - upon the Lord
  lexicon: BDAG
  rationale: With πιστεύω, ἐπί plus the accusative expresses the object of trust.
    In idiomatic English, 'believed in the Lord' best communicates this sense. 'On
    the Lord' is more literal but less natural in contemporary English.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Following the doctrine's contested-terms guidance, κύριος is rendered
    'Lord.' In Acts this title for Jesus carries both honorific and theological weight;
    'master' would underrepresent that usage.
