theological_decisions:
- issue: Rendering πιστεύω + ἐπί τὸν κύριον
  chosen_reading: believed in the Lord
  alternative_readings:
  - believed on the Lord
  rationale: The phrase denotes placing faith/trust in the Lord Jesus. 'Believed in'
    is standard contemporary English and preserves the theological sense of personal
    trust without importing a narrower doctrinal formulation.
  doctrine_reference: 'DOCTRINE.md: πίστις default ''faith''; preserve source meaning
    without resolving beyond the text'
- issue: Rendering κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrine excerpt specifies 'Lord' as the default rendering for κύριος.
    This also preserves the christological significance of the title in Acts.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
