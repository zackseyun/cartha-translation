id: ACT.9.20
reference: Acts 9:20
source:
  edition: SBLGNT
  text: καὶ εὐθέως ἐν ταῖς συναγωγαῖς ἐκήρυσσεν τὸν ⸀Ἰησοῦν ὅτι οὗτός ἐστιν ὁ υἱὸς
    τοῦ θεοῦ.
translation:
  text: And immediately in the synagogues he began proclaiming Jesus, that this one
    is the Son of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was proclaiming Jesus' or 'he preached Jesus.' The Greek verb carries
      the sense of public proclamation.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he is God's Son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - right away
  lexicon: BDAG
  rationale: Conveys the adverb's sense of promptness and suddenness in a natural
    modern English form. 'Immediately' preserves the narrative force without colloquiality.
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  alternatives:
  - among the synagogues
  lexicon: BDAG
  rationale: A straightforward locative rendering of ἐν with the dative plural. The
    plural is preserved, indicating Saul's activity in synagogue settings rather than
    a single location.
- source_word: ἐκήρυσσεν
  chosen: began proclaiming
  alternatives:
  - was proclaiming
  - preached
  - proclaimed
  lexicon: BDAG
  rationale: κηρύσσω denotes public proclamation. 'Proclaiming' preserves that heraldic
    sense better than 'preached,' which can sound more sermonic or ecclesiastical.
    'Began proclaiming' reflects the ingressive force naturally suggested in this
    narrative context after 'immediately,' though the imperfect itself is not explicitly
    iterative in English.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  alternatives:
  - about Jesus
  lexicon: BDAG
  rationale: 'The accusative direct object after κηρύσσω is retained directly: he
    proclaimed Jesus. English can imply the content of proclamation without adding
    ''about,'' and this keeps closer to the Greek''s compact Christ-centered expression.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - namely, that
  lexicon: BDAG
  rationale: Introduces the content of Saul's proclamation in standard English.
- source_word: οὗτός
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: 'The demonstrative is more emphatic than a simple pronoun. ''This one''
    preserves the force of identification: the Jesus he proclaims is the one who is
    the Son of God. It is slightly more formal than ''this man'' and avoids adding
    ''man,'' which is not explicit here.'
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is the standard and most transparent rendering of the titular expression.
    It preserves both the definite article and the christological weight of the phrase
    in Acts' narrative context.
