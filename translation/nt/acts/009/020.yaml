theological_decisions:
- issue: Christological title in Saul's proclamation
  chosen_reading: the Son of God
  alternative_readings:
  - God's Son
  rationale: The Greek phrase ὁ υἱὸς τοῦ θεοῦ is rendered directly and without reduction.
    This preserves the explicit christological claim of the text while avoiding interpretive
    expansion beyond what Luke states.
