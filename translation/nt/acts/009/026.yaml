theological_decisions:
- issue: Nature of Saul's attempted relationship to the Jerusalem believers
  chosen_reading: Rendered κολλᾶσθαι as 'to join' rather than a more institutional
    or sacramental expression.
  alternative_readings:
  - to attach himself to
  - to associate with
  rationale: The text describes Saul's effort to be accepted among the disciples,
    not a formal ecclesial rite or membership category. The rendering avoids importing
    later church structures while preserving the social and communal sense.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
