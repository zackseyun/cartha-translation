id: ACT.9.26
reference: Acts 9:26
source:
  edition: SBLGNT
  text: Παραγενόμενος δὲ ⸀εἰς Ἰερουσαλὴμ ⸀ἐπείραζεν κολλᾶσθαι τοῖς μαθηταῖς· καὶ πάντες
    ἐφοβοῦντο αὐτόν, μὴ πιστεύοντες ὅτι ἐστὶν μαθητής.
translation:
  text: And when he came to Jerusalem, he was trying to join the disciples, but they
    were all afraid of him, not believing that he was a disciple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to attach himself to the disciples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγενόμενος
  chosen: when he came
  alternatives:
  - after arriving
  - having come
  lexicon: BDAG
  rationale: Aorist participle of παραγίνομαι introducing the circumstance prior to
    the main action. 'When he came' is natural English and preserves the temporal
    force without awkwardness.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    fits the flow better than the more contrastive 'but' at the verse opening.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard directional use of εἰς with a city name. English idiom prefers
    'to Jerusalem.'
- source_word: ἐπείραζεν
  chosen: he was trying
  alternatives:
  - he attempted
  - he kept trying
  lexicon: BDAG
  rationale: Imperfect of πειράζω here conveys attempted action in progress rather
    than temptation. 'Was trying' captures the imperfective aspect naturally.
- source_word: κολλᾶσθαι
  chosen: to join
  alternatives:
  - to attach himself
  - to associate closely
  lexicon: BDAG
  rationale: The infinitive of κολλάομαι literally means to join or cling to. In this
    social context, 'to join' communicates his effort to associate himself with the
    disciples in readable modern English.
- source_word: τοῖς μαθηταῖς
  chosen: the disciples
  alternatives:
  - the disciples there
  lexicon: BDAG
  rationale: Definite article plus μαθηταῖς refers to the known group of disciples
    in Jerusalem. No expansion is needed in the main text.
- source_word: καὶ πάντες ἐφοβοῦντο αὐτόν
  chosen: but they were all afraid of him
  alternatives:
  - and all were fearing him
  - and everyone was afraid of him
  lexicon: BDAG
  rationale: The conjunction marks the next development, and English idiom is improved
    by rendering the sense contrastively with 'but.' The imperfect middle/passive
    ἐφοβοῦντο is well represented by 'were afraid.' 'They' refers back to the disciples.
- source_word: μὴ πιστεύοντες
  chosen: not believing
  alternatives:
  - because they did not believe
  - since they did not trust
  lexicon: BDAG
  rationale: Present participle with μή gives the reason for their fear. 'Not believing'
    preserves the participial linkage compactly; the causal nuance is clear from context.
- source_word: ὅτι ἐστὶν μαθητής
  chosen: that he was a disciple
  alternatives:
  - that he is a disciple
  lexicon: BDAG
  rationale: Although ἐστίν is present in Greek, English commonly backshifts to 'was'
    in indirect discourse after a past-tense main verb. This is idiomatic and does
    not alter the sense.
- source_word: μαθητής
  chosen: disciple
  alternatives:
  - follower
  lexicon: BDAG
  rationale: '''Disciple'' is the standard and contextually precise rendering for
    μαθητής in Acts, preserving the term''s established sense of committed follower/learner.'
