theological_decisions:
- issue: Rendering the expression τῆς ὁδοῦ
  chosen_reading: the Way
  alternative_readings:
  - the movement called the Way
  - followers of the Way
  rationale: The phrase functions as a recognized designation for the early Christian
    community. Retaining 'the Way' preserves the historical self-designation and avoids
    importing a fuller interpretive paraphrase into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Explicit mention of both sexes in ἄνδρας τε καὶ γυναῖκας
  chosen_reading: both men and women
  alternative_readings:
  - men as well as women
  rationale: The Greek explicitly names both men and women, emphasizing the breadth
    of Saul's intended arrests. The translation preserves that specificity rather
    than collapsing it into a generic term like 'people.'
  doctrine_reference: Translation philosophy §4
