id: ACT.9.2
reference: Acts 9:2
source:
  edition: SBLGNT
  text: ᾐτήσατο παρ’ αὐτοῦ ἐπιστολὰς εἰς Δαμασκὸν πρὸς τὰς συναγωγάς, ὅπως ἐάν τινας
    εὕρῃ τῆς ὁδοῦ ὄντας, ἄνδρας τε καὶ γυναῖκας, δεδεμένους ἀγάγῃ εἰς Ἰερουσαλήμ.
translation:
  text: and asked him for letters to the synagogues in Damascus, so that if he found
    any belonging to the Way, both men and women, he might bring them bound to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Way' or 'followers of the Way.' The Greek uses an early title
      for the Christian movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐτήσατο
  chosen: asked
  alternatives:
  - requested
  - asked for
  lexicon: BDAG
  rationale: Aorist middle of αἰτέω here means to ask/request. 'Asked' is natural
    modern English and fits the direct object 'letters'; the sense of petition is
    preserved without sounding overly formal.
- source_word: παρ’ αὐτοῦ
  chosen: him
  alternatives:
  - from him
  lexicon: BDAG
  rationale: With αἰτέω, παρά + genitive marks the person from whom the request is
    made. English idiom normally expresses this as 'asked him for...' rather than
    the more wooden 'asked from him.'
- source_word: ἐπιστολὰς
  chosen: letters
  alternatives:
  - letters of authorization
  - documents
  lexicon: BDAG
  rationale: ἐπιστολή is straightforwardly 'letter.' The context implies authorization,
    but that should not be imported into the main text beyond what the noun itself
    states.
- source_word: εἰς Δαμασκὸν πρὸς τὰς συναγωγάς
  chosen: to the synagogues in Damascus
  alternatives:
  - for Damascus, to the synagogues
  - to Damascus, to the synagogues
  lexicon: BDAG
  rationale: The paired prepositional phrases indicate letters directed to the synagogues
    located in Damascus. 'To the synagogues in Damascus' gives the sense clearly in
    idiomatic English without over-literal repetition of both prepositions.
- source_word: ὅπως ἐάν
  chosen: so that if
  alternatives:
  - in order that if
  - so that whenever
  lexicon: BDAG
  rationale: ὅπως introduces purpose; ἐάν with the subjunctive εὕρῃ adds contingency.
    'So that if' preserves both purpose and conditionality in natural English.
- source_word: τινας
  chosen: any
  alternatives:
  - any persons
  - some
  lexicon: BDAG
  rationale: Indefinite plural object in a conditional setting is best rendered 'any.'
    'Any persons' is unnecessarily stiff.
- source_word: τῆς ὁδοῦ
  chosen: belonging to the Way
  alternatives:
  - of the Way
  - followers of the Way
  lexicon: BDAG
  rationale: This is an early designation for the Christian movement. 'Belonging to
    the Way' preserves the genitival relation and avoids prematurely converting the
    expression into an interpretive label like 'followers.' The title 'the Way' is
    retained and capitalized as a recognized movement designation.
- source_word: ἄνδρας τε καὶ γυναῖκας
  chosen: both men and women
  alternatives:
  - men as well as women
  lexicon: BDAG
  rationale: τε καὶ coordinates the pair inclusively. 'Both men and women' is concise
    and preserves the explicit mention of both sexes, in line with gender-accurate
    translation.
- source_word: δεδεμένους
  chosen: bound
  alternatives:
  - tied up
  - in chains
  lexicon: BDAG
  rationale: Perfect passive participle of δέω indicates persons in a bound state.
    'Bound' is the most direct rendering. 'In chains' is possible contextually but
    adds specificity not stated by the participle itself.
- source_word: ἀγάγῃ
  chosen: he might bring
  alternatives:
  - he might lead
  - he might take
  lexicon: BDAG
  rationale: Aorist subjunctive of ἄγω in this purpose clause expresses intended action.
    'Bring' fits the destination phrase 'to Jerusalem' from Saul's perspective in
    the narrative and is standard English here.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς with a city name is normally rendered 'to.' 'Into' is possible but
    less idiomatic in English for travel to a city.
