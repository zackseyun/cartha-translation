id: ACT.9.31
reference: Acts 9:31
source:
  edition: SBLGNT
  text: ⸂Ἡ μὲν οὖν ἐκκλησία καθ’ ὅλης τῆς Ἰουδαίας καὶ Γαλιλαίας καὶ Σαμαρείας εἶχεν
    εἰρήνην οἰκοδομουμένη, καὶ πορευομένη τῷ φόβῳ τοῦ κυρίου καὶ τῇ παρακλήσει τοῦ
    ἁγίου πνεύματος ἐπληθύνετο⸃.
translation:
  text: So then the church throughout all Judea and Galilee and Samaria had peace,
    being built up; and walking in the fear of the Lord and in the encouragement of
    the Holy Spirit, it was multiplying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the churches' instead of 'the church.'
    reason: textual_variant
  - marker: b
    text: Or 'comfort' or 'exhortation' of the Holy Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησία
  chosen: the church
  alternatives:
  - the churches
  - the assembly
  lexicon: BDAG
  rationale: The SBLGNT reads the singular ἐκκλησία, so the main text follows 'the
    church' as a collective singular spanning the regions named. 'Churches' reflects
    a well-known textual variant and is preserved in a footnote rather than adopted
    in the main text.
- source_word: καθ’ ὅλης τῆς Ἰουδαίας καὶ Γαλιλαίας καὶ Σαμαρείας
  chosen: throughout all Judea and Galilee and Samaria
  alternatives:
  - throughout Judea, Galilee, and Samaria
  - throughout the whole of Judea and Galilee and Samaria
  lexicon: BDAG
  rationale: κατά with the genitive here has a distributive/regional sense, best conveyed
    by 'throughout.' Including 'all' reflects ὅλης without becoming overly wooden.
- source_word: εἶχεν εἰρήνην
  chosen: had peace
  alternatives:
  - was at peace
  - had rest
  lexicon: BDAG
  rationale: The idiom is straightforwardly rendered 'had peace.' 'Had rest' reflects
    older English tradition but can suggest mere inactivity; 'peace' better matches
    εἰρήνη and can include relief from persecution and internal stability.
- source_word: οἰκοδομουμένη
  chosen: being built up
  alternatives:
  - being edified
  - being strengthened
  lexicon: BDAG
  rationale: The participle is passive/present and metaphorical, referring to the
    church's ongoing strengthening or edification. 'Being built up' preserves the
    construction metaphor and remains natural English.
- source_word: πορευομένη
  chosen: walking
  alternatives:
  - living
  - conducting itself
  lexicon: BDAG
  rationale: In Luke-Acts this participle often carries the sense of conduct or manner
    of life. 'Walking' preserves the metaphor and is idiomatic in biblical English
    without being obscure.
- source_word: τῷ φόβῳ τοῦ κυρίου
  chosen: in the fear of the Lord
  alternatives:
  - with reverence for the Lord
  - in reverent fear of the Lord
  lexicon: BDAG
  rationale: φόβος here denotes reverent awe rather than terror. The traditional biblical
    phrase 'fear of the Lord' is both accurate and theologically rich; 'Lord' follows
    the default rendering for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In Acts this title
    can refer to Jesus in context, but the translation preserves the Greek wording
    without over-specifying beyond the text.
- source_word: τῇ παρακλήσει τοῦ ἁγίου πνεύματος
  chosen: in the encouragement of the Holy Spirit
  alternatives:
  - in the comfort of the Holy Spirit
  - by the encouragement of the Holy Spirit
  - in the exhortation of the Holy Spirit
  lexicon: BDAG
  rationale: παράκλησις has a semantic range including encouragement, comfort, and
    exhortation. 'Encouragement' best fits the growth context and modern readability
    while preserving the Spirit's active supportive role.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: of the Holy Spirit
  alternatives:
  - of the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the phrase, preserving the personal
    and divine reference without archaic diction.
- source_word: ἐπληθύνετο
  chosen: it was multiplying
  alternatives:
  - it increased
  - it was growing in number
  lexicon: BDAG
  rationale: The imperfect middle/passive here conveys ongoing increase in number.
    'Was multiplying' is vivid and close to the Greek, while the singular pronoun
    matches the collective singular 'church.'
