theological_decisions:
- issue: Referent and number of ἐκκλησία
  chosen_reading: 'collective singular: ''the church'''
  alternative_readings:
  - 'plural textual variant: ''the churches'''
  rationale: The printed source text provided is singular, and the participles and
    verbs are singular as well. This yields a picture of the one church across the
    region rather than separate congregations in focus. The plural reading is significant
    enough to preserve in a footnote as a textual variant.
- issue: Meaning of 'fear of the Lord'
  chosen_reading: reverent awe and obedient piety, not servile terror
  alternative_readings:
  - terror before the Lord
  - general religious reverence
  rationale: The phrase is a standard biblical expression for covenantal reverence
    and faithful conduct. The translation keeps the literal phrase to preserve theological
    depth rather than flattening it to a single interpretive gloss.
- issue: Sense of παράκλησις in relation to the Holy Spirit
  chosen_reading: encouragement
  alternative_readings:
  - comfort
  - exhortation
  rationale: The term is semantically broad. In this context of peace, edification,
    and numerical increase, 'encouragement' best captures the Spirit's sustaining
    ministry without excluding the broader nuance. Alternatives are preserved in a
    footnote because the range is theologically meaningful.
