theological_decisions:
- issue: Potential doctrinal overreading of ἐκλογῆς ('chosen/election')
  chosen_reading: Render as 'chosen' in the phrase 'chosen instrument of mine'
  alternative_readings:
  - elect vessel of mine
  - vessel of election
  rationale: The verse clearly states divine selection for mission, but the translation
    should not force later debates about individual election into the wording. 'Chosen
    instrument' preserves the text's claim without importing a narrower theological
    system.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
