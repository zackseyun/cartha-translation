id: ACT.9.15
reference: Acts 9:15
source:
  edition: SBLGNT
  text: εἶπεν δὲ πρὸς αὐτὸν ὁ κύριος· Πορεύου, ὅτι σκεῦος ἐκλογῆς ⸂ἐστίν μοι⸃ οὗτος
    τοῦ βαστάσαι τὸ ὄνομά μου ἐνώπιον ⸀ἐθνῶν ⸀τε καὶ βασιλέων υἱῶν τε Ἰσραήλ,
translation:
  text: But the Lord said to him, “Go, because this man is a chosen instrument of
    mine to carry my name before the Gentiles and kings and the sons of Israel,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the nations.”
    reason: lexical_alternative
  - marker: b
    text: “The sons of Israel” is a traditional biblical expression for the people
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In this
    narrative context it refers to the risen Jesus speaking with divine authority.
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Be on your way
  - Proceed
  lexicon: BDAG
  rationale: A natural imperative in English that preserves the force of the middle
    imperative without unnecessary stiffness.
- source_word: σκεῦος
  chosen: instrument
  alternatives:
  - vessel
  - container
  lexicon: BDAG
  rationale: σκεῦος literally means 'vessel,' but here metaphorically denotes a means
    used for a purpose. 'Instrument' communicates the figurative sense clearly in
    modern English while preserving the image of being chosen for service.
- source_word: ἐκλογῆς
  chosen: chosen
  alternatives:
  - of election
  - elect
  lexicon: BDAG
  rationale: 'The genitive qualifies σκεῦος: literally ''a vessel of choice/election.''
    ''Chosen instrument'' is idiomatic English and preserves the sense of divine selection
    without importing later theological systematization.'
- source_word: ἐστίν μοι
  chosen: is ... of mine
  alternatives:
  - is mine
  - belongs to me
  lexicon: BDAG
  rationale: The dative μοι expresses personal relation or possession. 'Is a chosen
    instrument of mine' preserves both the predication and the personal claim.
- source_word: τοῦ βαστάσαι
  chosen: to carry
  alternatives:
  - to bear
  - to bring
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. βαστάζω can mean 'carry'
    or 'bear'; 'carry' is clear and works well with 'my name' in mission context.
- source_word: τὸ ὄνομά μου
  chosen: my name
  lexicon: BDAG
  rationale: Retained literally. In biblical usage 'name' carries representative authority
    and public confession, and no paraphrase should flatten that resonance.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: A straightforward rendering that fits the public-witness context.
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη in contrast with 'the sons of Israel' most naturally means
    non-Jewish peoples, so 'Gentiles' best captures the contextual sense. The more
    literal 'nations' is preserved in a footnote.
- source_word: βασιλέων
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The literal term is appropriate and readable; no need to generalize.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the children of Israel
  lexicon: BDAG
  rationale: Per the project's gender-accurate principle, the masculine familial expression
    is preserved rather than neutralized. It is a conventional biblical designation
    for Israel and should remain visible in English, with a footnote noting the more
    idiomatic collective alternative.
- source_word: τε ... καὶ ... τε
  chosen: and ... and
  alternatives:
  - both ... and ... and
  lexicon: LSJ
  rationale: The paired particles mark coordination across the three groups. English
    normally does not reproduce each particle explicitly, so simple coordination is
    the most natural equivalent.
