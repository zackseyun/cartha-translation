- issue: Rendering βαπτίζω in a denominationally neutral but lexically faithful way
  chosen_reading: was baptized
  alternative_readings:
  - was immersed
  rationale: The verse reports the act without specifying mode. 'Was baptized' is
    the standard and sufficiently transparent rendering, avoiding unnecessary sectarian
    over-specification while remaining faithful to the Greek verb.
