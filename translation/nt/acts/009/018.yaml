id: ACT.9.18
reference: Acts 9:18
source:
  edition: SBLGNT
  text: καὶ εὐθέως ἀπέπεσαν ⸂αὐτοῦ ἀπὸ τῶν ὀφθαλμῶν⸃ ⸀ὡς λεπίδες, ἀνέβλεψέν τε καὶ
    ἀναστὰς ἐβαπτίσθη,
translation:
  text: And immediately something like scales fell from his eyes, and he regained
    his sight; then he got up and was baptized,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'like scales fell from his eyes.' The Greek uses a comparison,
      describing what it seemed like rather than identifying literal scales.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys the temporal immediacy of the event in clear modern English.
    'Straightway' is archaic; 'at once' is possible but slightly less direct in narrative
    flow.
- source_word: ἀπέπεσαν
  chosen: fell
  alternatives:
  - dropped off
  - fell away
  lexicon: BDAG
  rationale: The aorist verb from ἀποπίπτω denotes falling off/from. 'Fell' is the
    most natural English base rendering here, with the separation nuance supplied
    by 'from his eyes.'
- source_word: αὐτοῦ ἀπὸ τῶν ὀφθαλμῶν
  chosen: from his eyes
  alternatives:
  - off his eyes
  lexicon: BDAG
  rationale: Standard idiomatic English for the genitive pronoun with ἀπό + genitive.
    'Off his eyes' is more literal but less natural.
- source_word: ὡς λεπίδες
  chosen: something like scales
  alternatives:
  - like scales
  lexicon: BDAG
  rationale: ὡς marks comparison, not identity. Adding 'something' makes explicit
    that Luke describes an appearance or effect rather than asserting literal scales.
    'Scales' preserves the concrete image of λεπίδες.
- source_word: ἀνέβλεψέν
  chosen: he regained his sight
  alternatives:
  - he looked up
  - he could see again
  - he received sight
  lexicon: BDAG
  rationale: In healing/restoration contexts ἀναβλέπω commonly means to recover sight,
    not merely to look upward. 'Regained his sight' best fits the immediate context
    of blindness being removed.
- source_word: τε καὶ
  chosen: and ... then
  alternatives:
  - and
  - both ... and
  lexicon: BDAG
  rationale: The paired connective links successive actions. English does not require
    a wooden representation of both particles; 'and' with 'then' preserves the sequence
    naturally.
- source_word: ἀναστὰς
  chosen: he got up
  alternatives:
  - rising
  - having arisen
  - he stood up
  lexicon: BDAG
  rationale: Aorist participle indicating the next action in sequence. 'He got up'
    is idiomatic modern English and fits the narrative progression.
- source_word: ἐβαπτίσθη
  chosen: was baptized
  alternatives:
  - was immersed
  lexicon: BDAG
  rationale: The passive form of βαπτίζω is most transparently rendered 'was baptized.'
    This avoids importing a denominationally specific mode into the main text while
    preserving the established lexical sense.
