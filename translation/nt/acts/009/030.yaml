theological_decisions:
- issue: Rendering ἀδελφοί in a likely mixed community
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the fellow believers
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    is retained in the main text rather than replaced with an inclusive paraphrase.
    Because the referent likely includes the believing community more broadly, an
    explanatory footnote preserves that contextual nuance without altering the main-text
    form.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
