id: ACT.9.30
reference: Acts 9:30
source:
  edition: SBLGNT
  text: ἐπιγνόντες δὲ οἱ ἀδελφοὶ κατήγαγον αὐτὸν εἰς Καισάρειαν καὶ ἐξαπέστειλαν αὐτὸν
    εἰς Ταρσόν.
translation:
  text: When the brothers learned this, they brought him down to Caesarea and sent
    him off to Tarsus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' but in this context
      it may refer to the community of believers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  chosen: learned this
  alternatives:
  - found out
  - became aware
  - recognized
  lexicon: BDAG
  rationale: Aorist participle of ἐπιγινώσκω here introduces the circumstance prompting
    the main actions. In context, the object is implicit from the previous verse,
    so English naturally supplies 'this.' 'Learned this' is clear modern English and
    preserves the sense of coming to know information.
- source_word: οἱ ἀδελφοὶ
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the fellow believers
  lexicon: BDAG
  rationale: Literally 'the brothers.' Per the translation philosophy, gender-accurate
    rendering is preferred over gender-neutraling. In Acts this term can denote fellow
    believers more broadly, but the Greek form is masculine plural and is best rendered
    'brothers,' with inclusivity noted in a footnote.
- source_word: κατήγαγον
  chosen: brought him down
  alternatives:
  - took him down
  - escorted him down
  lexicon: BDAG
  rationale: κατάγω commonly means 'bring down' or 'lead down,' often with geographical/topographical
    movement, especially toward the coast. 'Brought him down' preserves the directional
    element κατά- better than a flatter 'took him.'
- source_word: Καισάρειαν
  chosen: Caesarea
  alternatives:
  - Caesarea Maritima
  lexicon: BDAG
  rationale: Standard English transliteration of the place name. 'Caesarea' is sufficient
    in context without expanding to the more specific historical designation.
- source_word: ἐξαπέστειλαν
  chosen: sent him off
  alternatives:
  - sent him away
  - dispatched him
  lexicon: BDAG
  rationale: The compound verb ἐξαποστέλλω intensifies simple 'send.' 'Sent him off'
    captures the sense of sending him onward from Caesarea without sounding overly
    formal. It also fits the narrative movement toward Tarsus.
- source_word: Ταρσόν
  chosen: Tarsus
  lexicon: BDAG
  rationale: Standard English transliteration of the city name.
