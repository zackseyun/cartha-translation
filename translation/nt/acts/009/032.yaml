id: ACT.9.32
reference: Acts 9:32
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ Πέτρον διερχόμενον διὰ πάντων κατελθεῖν καὶ πρὸς τοὺς ἁγίους τοὺς
    κατοικοῦντας Λύδδα.
translation:
  text: Now as Peter was passing through all of them, he also went down to the saints
    living in Lydda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through all the regions'—the Greek says 'through all,' leaving the object
      implicit from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now as
  alternatives:
  - And it happened that
  - Now it happened that
  lexicon: BDAG
  rationale: The idiom ἐγένετο δὲ commonly marks narrative transition. Rendering it
    woodenly as 'it happened' is possible, but 'Now as' preserves the transitional
    force in natural modern English while preparing for the participial construction
    that follows.
- source_word: Πέτρον
  chosen: Peter
  rationale: Standard transliteration of the personal name Πέτρος, following the translation
    policy to transliterate names.
- source_word: διερχόμενον
  chosen: was passing through
  alternatives:
  - went through
  - traveled through
  lexicon: BDAG
  rationale: The present participle conveys ongoing movement. 'Was passing through'
    preserves the durative sense better than the simpler 'went through'.
- source_word: διὰ πάντων
  chosen: through all of them
  alternatives:
  - through all the regions
  - among them all
  lexicon: BDAG
  rationale: The phrase is elliptical. In context it refers to the various groups/places
    just mentioned in the surrounding narrative. 'Through all of them' keeps the Greek's
    brevity without over-specifying 'regions,' which is interpretive. An alternative
    is preserved in a footnote because English readers may find the object implicit.
- source_word: κατελθεῖν
  chosen: went down
  alternatives:
  - came down
  - visited
  lexicon: BDAG
  rationale: κατέρχομαι often denotes downward movement, whether geographically or
    topographically. 'Went down' preserves the directional nuance without flattening
    it into the more interpretive 'visited'.
- source_word: καὶ πρὸς
  chosen: also ... to
  alternatives:
  - and to
  - even to
  lexicon: BDAG
  rationale: The combination links Peter's broader travel with a specific visit. 'Also
    went down to' captures the additive force naturally in English.
- source_word: τοὺς ἁγίους
  chosen: the saints
  alternatives:
  - the holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is a common designation for believers. 'The saints' is concise
    and traditional while still accurate here. 'God's holy people' is possible but
    more expansive than the Greek.
- source_word: τοὺς κατοικοῦντας
  chosen: living
  alternatives:
  - dwelling
  - residing
  lexicon: BDAG
  rationale: A participial description of residence. 'Living' is idiomatic modern
    English and sufficiently precise.
- source_word: Λύδδα
  chosen: Lydda
  rationale: Standard transliteration of the place name.
