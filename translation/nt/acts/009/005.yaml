theological_decisions:
- issue: Rendering κύριε in Saul's address before full identification of the speaker
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The term can denote respectful address, but the project's contested-terms
    policy sets κύριος to 'Lord' by default. In this revelatory setting, 'Lord' also
    preserves the narrative-theological force without overstating a fully developed
    confession at this exact moment.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord)'
