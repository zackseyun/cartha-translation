id: ACT.9.5
reference: Acts 9:5
source:
  edition: SBLGNT
  text: εἶπεν δέ· Τίς εἶ, κύριε; ὁ ⸀δέ· Ἐγώ εἰμι Ἰησοῦς ὃν σὺ διώκεις·
translation:
  text: And he said, “Who are you, Lord?” And he said, “I am Jesus, whom you are persecuting.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sir.” The Greek κύριε can be a respectful form of address; here it is
      rendered “Lord” in keeping with the project’s default for κύριος and the verse’s
      revelatory context.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - said
  lexicon: BDAG
  rationale: Standard aorist narrative verb from λέγω; English supplies the subject
    pronoun naturally since Greek leaves it implicit.
- source_word: δέ
  chosen: And
  alternatives:
  - but
  - now
  - ''
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in narrative sequence. 'And' preserves
    the flow better than the more contrastive 'but'; omission is possible in English
    but retaining a connective reflects the Greek discourse movement.
- source_word: Τίς εἶ
  chosen: Who are you
  alternatives:
  - Who are you, then
  lexicon: BDAG
  rationale: Direct, idiomatic rendering of the interrogative plus copula, preserving
    the personal question addressed to the speaker.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: DOCTRINE.md gives κύριος the default rendering 'Lord.' In this immediate
    context Saul addresses the heavenly speaker with reverence; 'sir' is possible
    at the level of politeness, but 'Lord' best matches both the default policy and
    the unfolding revelation that the speaker is Jesus.
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - It is I
  lexicon: BDAG
  rationale: Straightforward rendering of the emphatic pronoun plus copula. 'I am'
    preserves the Greek form without importing additional theological overtones beyond
    the text's immediate self-identification.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated by standard conventions.'
- source_word: ὃν
  chosen: whom
  alternatives:
  - that
  lexicon: BDAG
  rationale: Accusative relative pronoun referring to Jesus as the object of persecution.
    'Whom' is formally accurate and still readable in this context.
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek; English naturally conveys
    this with 'you' in the clause without needing typographic stress.
- source_word: διώκεις
  chosen: are persecuting
  alternatives:
  - persecute
  - are pursuing
  lexicon: BDAG
  rationale: Present tense in context is well represented by English progressive,
    highlighting Saul's ongoing hostile action against Jesus' people. 'Persecuting'
    fits established NT usage for διώκω in hostile religious opposition contexts.
