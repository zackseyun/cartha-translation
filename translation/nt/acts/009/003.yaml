theological_decisions:
- issue: Meaning of οὐρανός in a revelatory context
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: Because the event is presented as a divine encounter in Luke's narrative,
    'heaven' better reflects the likely sense of οὐρανός here while remaining a direct
    lexical rendering.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological weight without paraphrase'
