id: ACT.9.3
reference: Acts 9:3
source:
  edition: SBLGNT
  text: ἐν δὲ τῷ πορεύεσθαι ἐγένετο αὐτὸν ἐγγίζειν τῇ Δαμασκῷ, ⸂ἐξαίφνης τε αὐτὸν
    περιήστραψεν⸃ φῶς ⸀ἐκ τοῦ οὐρανοῦ,
translation:
  text: Now as he was traveling, it happened that he was drawing near to Damascus,
    and suddenly a light from heaven flashed around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek οὐρανός can mean either 'heaven' or 'sky,'
      though in this context 'heaven' likely signals the light's divine source.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δὲ τῷ πορεύεσθαι
  chosen: Now as he was traveling
  alternatives:
  - While he was going
  - As he journeyed
  lexicon: BDAG
  rationale: The articular infinitive with ἐν expresses contemporaneous action ('while/as
    he was traveling'). 'Now' reflects δέ as a mild narrative transition without overtranslating
    it.
- source_word: ἐγένετο
  chosen: it happened
  alternatives:
  - it came about
  - there was
  lexicon: BDAG
  rationale: Luke frequently uses ἐγένετο as a narrative marker. Rendering it explicitly
    preserves the Greek structure and suddenness of the event better than omitting
    it.
- source_word: αὐτὸν ἐγγίζειν
  chosen: he was drawing near
  alternatives:
  - he approached
  - he was nearing
  lexicon: BDAG
  rationale: The accusative-plus-infinitive construction after ἐγένετο is represented
    idiomatically in English. 'Drawing near' preserves the imperfective sense of the
    present infinitive ἐγγίζειν better than the simple 'approached.'
- source_word: τῇ Δαμασκῷ
  chosen: to Damascus
  alternatives:
  - near Damascus
  lexicon: BDAG
  rationale: With ἐγγίζω the dative marks the place approached. 'To Damascus' is the
    most natural English equivalent, though the sense is proximity rather than entry
    into the city.
- source_word: ἐξαίφνης τε
  chosen: and suddenly
  alternatives:
  - suddenly
  - and all at once
  lexicon: BDAG
  rationale: ἐξαίφνης conveys abruptness; τε lightly links the clause to what precedes.
    'And suddenly' captures both the connective and the sudden onset in readable English.
- source_word: περιήστραψεν
  chosen: flashed around him
  alternatives:
  - shone around him
  - blazed around him
  lexicon: BDAG
  rationale: The verb denotes flashing or shining around on all sides. 'Flashed around
    him' best conveys the sudden, enveloping effect implied by the aorist and the
    compound verb.
- source_word: φῶς
  chosen: a light
  alternatives:
  - light
  lexicon: BDAG
  rationale: Anarthrous φῶς is naturally rendered with the English indefinite article
    in this context.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: In Luke-Acts οὐρανός in such revelatory contexts carries the sense 'heaven,'
    not merely atmospheric 'sky.' This preserves the divine-source implication without
    adding interpretation beyond the text.
