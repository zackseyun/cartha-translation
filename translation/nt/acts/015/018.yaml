theological_decisions:
- issue: Temporal scope of God's knowledge in this compressed clause
  chosen_reading: Render the phrase as a statement that these things are known from
    ancient time, without expanding it into a stronger doctrinal paraphrase about
    eternal foreknowledge.
  alternative_readings:
  - known from eternity
  - who makes these things known from of old
  rationale: 'The SBLGNT text is extremely brief: γνωστὰ ἀπ’ αἰῶνος. The translation
    should reflect that brevity and not import additional wording from the longer
    textual tradition or from theological inference. A footnote preserves the more
    expansive traditional reading.'
  doctrine_reference: Translation philosophy items 1, 3, and 5
