id: ACT.15.18
reference: Acts 15:18
source:
  edition: SBLGNT
  text: γνωστὰ ἀπ’ ⸀αἰῶνος.
translation:
  text: known from of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read more fully, 'known from eternity' or 'who makes these
      things known from of old.'
    reason: textual_variant
lexical_decisions:
- source_word: γνωστὰ
  chosen: known
  alternatives:
  - made known
  - well known
  lexicon: BDAG
  rationale: Adjective functioning predicatively in this verbless clause. 'Known'
    is the most direct and natural rendering. 'Made known' would import a verbal nuance
    not explicit in the adjective, while 'well known' overstates the degree.
- source_word: ἀπ’
  chosen: from
  alternatives:
  - since
  lexicon: BDAG
  rationale: Standard sense of ἀπό marking temporal origin here. 'From' preserves
    the concise temporal force of the Greek.
- source_word: αἰῶνος
  chosen: of old
  alternatives:
  - eternity
  - the age
  - ancient times
  lexicon: BDAG
  rationale: In this temporal idiom, αἰών can denote a long past duration or ancient
    time. 'Of old' gives idiomatic English and fits the compressed citation form.
    'Eternity' is possible in some textual traditions and translations, but with the
    SBLGNT wording this shorter phrase is better represented as 'from of old,' with
    the stronger alternative preserved in a footnote.
