id: ACT.15.31
reference: Acts 15:31
source:
  edition: SBLGNT
  text: ἀναγνόντες δὲ ἐχάρησαν ἐπὶ τῇ παρακλήσει.
translation:
  text: And when they had read it, they rejoiced because of its encouragement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they rejoiced at the encouragement,' with παρακλήσει also possibly rendered
      'exhortation' or 'comfort.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνόντες
  chosen: when they had read it
  alternatives:
  - after reading it
  - having read it
  lexicon: BDAG
  rationale: Aorist active participle of ἀναγινώσκω, functioning temporally prior
    to the main verb. English requires an object from context, namely the letter just
    mentioned in the preceding verse, so 'it' is supplied. 'When they had read it'
    is natural English and preserves the sequence.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild connective transition. 'And' is a natural English connector
    here, linking this verse to the reading of the letter in the previous context
    without overstating contrast.
- source_word: ἐχάρησαν
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they took joy
  lexicon: BDAG
  rationale: Aorist passive-form verb from χαίρω with active meaning in Koine usage.
    'They rejoiced' preserves the verbal force and slightly fuller emotional weight
    better than the flatter 'were glad'.
- source_word: ἐπὶ
  chosen: because of
  alternatives:
  - at
  - over
  - on account of
  lexicon: BDAG
  rationale: With the dative here, ἐπί expresses basis or cause for the rejoicing.
    'Because of' communicates the causal sense clearly in contemporary English.
- source_word: τῇ παρακλήσει
  chosen: its encouragement
  alternatives:
  - the encouragement
  - the exhortation
  - the comfort
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement, exhortation, comfort, or appeal
    depending on context. In this setting, the letter's effect is consoling and strengthening
    the believers after the controversy, so 'encouragement' best captures the sense.
    The possessive 'its' makes explicit that the encouragement comes from the letter's
    message.
