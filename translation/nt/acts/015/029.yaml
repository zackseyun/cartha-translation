theological_decisions:
- issue: Meaning of πορνεία in the apostolic decree
  chosen_reading: Rendered broadly as 'sexual immorality' without narrowing it to
    one specific sexual offense.
  alternative_readings:
  - fornication
  - unlawful marriage/Lev 18 violations
  rationale: The term can be understood broadly or, in this Jerusalem-council context,
    by some as especially tied to prohibited unions associated with Leviticus. The
    verse itself does not explicitly narrow the term, so the translation preserves
    the broader lexical value in the main text rather than importing a specific interpretive
    scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
