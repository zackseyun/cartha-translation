id: ACT.15.29
reference: Acts 15:29
source:
  edition: SBLGNT
  text: ἀπέχεσθαι εἰδωλοθύτων καὶ αἵματος καὶ ⸀πνικτῶν καὶ πορνείας· ἐξ ὧν διατηροῦντες
    ἑαυτοὺς εὖ πράξετε. ἔρρωσθε.
translation:
  text: to abstain from food sacrificed to idols, from blood, from what has been strangled,
    and from sexual immorality. If you keep yourselves from these things, you will
    do well. Farewell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'things sacrificed to idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'strangled meat' or 'things strangled.'
    reason: lexical_alternative
  - marker: c
    text: The Greek term rendered 'sexual immorality' can be understood broadly, though
      some interpreters take it here more specifically in light of Levitical prohibitions.
    reason: alternative_reading
  - marker: d
    text: Or 'Stay well.' The Greek is a conventional letter closing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχεσθαι
  chosen: to abstain
  alternatives:
  - to keep away from
  - to refrain from
  lexicon: BDAG
  rationale: 'The present middle infinitive expresses the content of the instruction:
    they are to refrain from certain practices. ''Abstain'' is concise, idiomatic,
    and preserves the formal force better than a looser paraphrase.'
- source_word: εἰδωλοθύτων
  chosen: food sacrificed to idols
  alternatives:
  - idol sacrifices
  - things sacrificed to idols
  lexicon: BDAG
  rationale: The genitive plural refers to items offered in idol worship, especially
    food/meat. 'Food sacrificed to idols' is clear modern English and avoids the less
    natural nominal form 'idol sacrifices' while preserving the cultic sense.
- source_word: αἵματος
  chosen: blood
  lexicon: BDAG
  rationale: A straightforward rendering of the genitive after ἀπέχεσθαι. The context
    is dietary/prohibitory, but the Greek simply says 'blood,' so the translation
    retains that concise form.
- source_word: πνικτῶν
  chosen: what has been strangled
  alternatives:
  - strangled meat
  - things strangled
  lexicon: BDAG
  rationale: The adjective used substantivally refers to animals killed by strangling,
    i.e., meat not properly drained of blood. 'What has been strangled' is natural
    English and preserves the broad substantive force.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual misconduct
  lexicon: BDAG
  rationale: πορνεία is broader than premarital sex alone and in contemporary English
    is best represented by 'sexual immorality.' 'Fornication' is too narrow and archaic
    for the stated translation philosophy.
- source_word: ἐξ ὧν
  chosen: from these things
  alternatives:
  - from which
  - from these
  lexicon: BDAG
  rationale: The relative phrase points back to the listed prohibitions. 'From these
    things' makes the antecedent explicit in natural English.
- source_word: διατηροῦντες ἑαυτούς
  chosen: If you keep yourselves
  alternatives:
  - keeping yourselves
  - by keeping yourselves
  lexicon: BDAG
  rationale: 'Although formally a participial construction (''keeping yourselves''),
    in English the sense is naturally conditional: if they guard themselves from these
    practices. This is an optimal-equivalence adjustment for readability while preserving
    meaning.'
- source_word: εὖ πράξετε
  chosen: you will do well
  alternatives:
  - you will do rightly
  - you will prosper
  lexicon: BDAG
  rationale: The idiom expresses that compliance is the right and commendable course.
    'You will do well' is the standard natural rendering and fits the epistolary tone.
- source_word: ἔρρωσθε
  chosen: Farewell
  alternatives:
  - Be strong
  - Stay well
  lexicon: BDAG
  rationale: In closing formulae this imperative functions idiomatically as an epistolary
    farewell rather than a literal exhortation to strength. 'Farewell' best captures
    the conventional closing sense in English.
