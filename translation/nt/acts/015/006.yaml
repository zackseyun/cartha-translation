id: ACT.15.6
reference: Acts 15:6
source:
  edition: SBLGNT
  text: Συνήχθησάν ⸀τε οἱ ἀπόστολοι καὶ οἱ πρεσβύτεροι ἰδεῖν περὶ τοῦ λόγου τούτου.
translation:
  text: So the apostles and the elders gathered together to consider this matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled' or 'came together.' The Greek verb is formally passive ('were
      gathered') but commonly functions in context to mean that the group convened.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to see concerning this word.' Here 'word' means the matter or
      issue under discussion.
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνήχθησάν
  chosen: gathered together
  alternatives:
  - were gathered
  - came together
  - assembled
  lexicon: BDAG
  rationale: Aorist passive of συνάγω in this context functions naturally in English
    as an intransitive event of assembling. 'Gathered together' preserves the collective
    sense without awkwardly foregrounding the passive form.
- source_word: τε
  chosen: So
  alternatives:
  - and
  - then
  - ''
  lexicon: BDAG
  rationale: The particle τε lightly connects this sentence to the preceding context.
    English often leaves such a particle untranslated, but 'So' captures the discourse
    linkage and resulting progression from the dispute in the prior verse to the convening
    in this verse.
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - emissaries
  - messengers
  lexicon: BDAG
  rationale: In Acts this term refers to the recognized apostolic leaders, so the
    established and contextually precise rendering 'apostles' is best.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  - presbyters
  lexicon: BDAG
  rationale: Here the word denotes recognized community leaders, not merely older
    males. 'Elders' is the clearest idiomatic rendering in ecclesial context.
- source_word: ἰδεῖν
  chosen: to consider
  alternatives:
  - to see
  - to examine
  - to look into
  lexicon: BDAG
  rationale: Although literally 'to see,' the infinitive here expresses deliberative
    consideration of an issue. 'To consider' communicates the idiomatic sense in natural
    English while remaining close to the Greek function.
- source_word: περὶ τοῦ λόγου τούτου
  chosen: this matter
  alternatives:
  - about this matter
  - concerning this issue
  - about this word
  lexicon: BDAG
  rationale: λόγος can mean 'word,' 'message,' or 'matter/issue' depending on context.
    In this council setting it refers to the disputed question just raised, so 'this
    matter' best conveys the sense in clear English.
