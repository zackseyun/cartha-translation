theological_decisions:
- issue: Institutional nuance of πρεσβύτεροι in the Jerusalem meeting
  chosen_reading: Rendered as 'elders' without importing later denominational office
    structures.
  alternative_readings:
  - presbyters as a technical later church office
  rationale: The verse identifies recognized leaders in the Jerusalem church, but
    the text itself does not require a later, more developed ecclesiastical polity.
    'Elders' preserves the historical and lexical sense without over-specification.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Deliberative purpose of the meeting
  chosen_reading: The leaders gathered 'to consider this matter,' expressing a process
    of examination rather than a predetermined doctrinal verdict.
  alternative_readings:
  - to decide this issue
  - to see about this word
  rationale: The infinitive ἰδεῖν indicates taking up the issue for consideration.
    Rendering it as 'consider' avoids overstating the procedural outcome at this point
    in the narrative.
  doctrine_reference: Translation philosophy §3
