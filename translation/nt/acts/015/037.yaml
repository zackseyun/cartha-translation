id: ACT.15.37
reference: Acts 15:37
source:
  edition: SBLGNT
  text: Βαρναβᾶς δὲ ⸀ἐβούλετο συμπαραλαβεῖν ⸀καὶ τὸν Ἰωάννην τὸν καλούμενον Μᾶρκον·
translation:
  text: But Barnabas wanted to take along also John, who was called Mark.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'John, also called Mark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Βαρναβᾶς
  chosen: Barnabas
  lexicon: BDAG
  rationale: Proper personal name; transliterated by standard English convention per
    translation philosophy.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding context, where Paul had proposed revisiting
    the brothers; 'But' best captures the mild adversative force here.
- source_word: ἐβούλετο
  chosen: wanted
  alternatives:
  - intended
  - wished
  - was wanting
  lexicon: BDAG
  rationale: Imperfect middle of βούλομαι expresses Barnabas's desire/intention in
    the narrative setting. 'Wanted' is natural modern English and preserves the volitional
    sense without overstating deliberation.
- source_word: συμπαραλαβεῖν
  chosen: to take along
  alternatives:
  - to take with them
  - to bring along
  lexicon: BDAG
  rationale: The compound verb conveys taking someone along in company. 'Take along'
    is idiomatic and reflects the sense of accompanying the missionary party.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: 'Placed with the object for emphasis: Barnabas wanted to take along John
    also. ''Also'' preserves the additive force in smooth English.'
- source_word: Ἰωάννην
  chosen: John
  lexicon: BDAG
  rationale: Proper personal name; transliterated in standard English form.
- source_word: τὸν καλούμενον Μᾶρκον
  chosen: who was called Mark
  alternatives:
  - called Mark
  - also called Mark
  lexicon: BDAG
  rationale: The participial phrase identifies John by his other name. 'Who was called
    Mark' is clear and slightly more formal than bare 'called Mark'; 'also called
    Mark' is possible but the Greek does not require 'also' within the participial
    clause.
- source_word: Μᾶρκον
  chosen: Mark
  lexicon: BDAG
  rationale: Proper personal name; transliterated by standard English convention.
