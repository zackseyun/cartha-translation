id: ACT.15.32
reference: Acts 15:32
source:
  edition: SBLGNT
  text: Ἰούδας τε καὶ Σιλᾶς, καὶ αὐτοὶ προφῆται ὄντες, διὰ λόγου πολλοῦ παρεκάλεσαν
    τοὺς ἀδελφοὺς καὶ ἐπεστήριξαν·
translation:
  text: Judas and Silas, who were themselves prophets, encouraged the brothers at
    length and strengthened them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and may refer to
      the whole believing community.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰούδας
  chosen: Judas
  alternatives:
  - Judah
  lexicon: BDAG
  rationale: Standard transliteration of the personal name in Acts. 'Judas' is the
    conventional English form for this NT individual.
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The combination links Judas and Silas closely. In natural English, a
    simple 'and' best conveys the coordination without awkwardness.
- source_word: Σιλᾶς
  chosen: Silas
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: καὶ αὐτοὶ προφῆται ὄντες
  chosen: who were themselves prophets
  alternatives:
  - being prophets themselves
  - since they also were prophets
  lexicon: BDAG
  rationale: The participial construction gives explanatory background about Judas
    and Silas. 'Themselves' reflects αὐτοὶ for emphasis, indicating that they personally
    shared this prophetic role.
- source_word: προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Direct and standard rendering of προφῆται; no reason to weaken or paraphrase
    the term.
- source_word: διὰ λόγου πολλοῦ
  chosen: at length
  alternatives:
  - with many words
  - in a long message
  - through much speaking
  lexicon: BDAG
  rationale: Literally 'through much word/speech.' In idiomatic English here it indicates
    extended verbal ministry. 'At length' preserves the sense of substantial exhortation
    without wooden phrasing.
- source_word: παρεκάλεσαν
  chosen: encouraged
  alternatives:
  - exhorted
  - urged
  - comforted
  lexicon: BDAG
  rationale: In this context of prophetic ministry to fellow believers, παρακαλέω
    most naturally conveys strengthening encouragement/exhortation. 'Encouraged' is
    accessible modern English and fits the pastoral tone.
- source_word: τοὺς ἀδελφοὺς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Per the project's gender-accurate philosophy, ἀδελφοὺς is rendered 'brothers'
    in the main text. In Acts this often refers to the Christian community, likely
    including women, so an inclusivity note is appropriate rather than replacing the
    masculine form.
- source_word: ἐπεστήριξαν
  chosen: strengthened them
  alternatives:
  - confirmed them
  - established them
  lexicon: BDAG
  rationale: The verb means to strengthen or make firm. 'Strengthened them' is clear
    modern English and pairs well with 'encouraged' while preserving the distinct
    second action.
