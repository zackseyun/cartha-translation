theological_decisions:
- issue: Rendering ἀδελφοὺς in a mixed-community context
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: The Greek is grammatically masculine plural and, in early Christian usage,
    often refers representatively to the believing community. Following the stated
    gender-accurate policy, the main text keeps 'brothers' while a footnote preserves
    the likely inclusive sense.
