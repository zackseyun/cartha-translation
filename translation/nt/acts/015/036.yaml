id: ACT.15.36
reference: Acts 15:36
source:
  edition: SBLGNT
  text: Μετὰ δέ τινας ἡμέρας εἶπεν ⸂πρὸς Βαρναβᾶν Παῦλος⸃· Ἐπιστρέψαντες δὴ ἐπισκεψώμεθα
    τοὺς ⸀ἀδελφοὺς κατὰ ⸂πόλιν πᾶσαν⸃ ἐν αἷς κατηγγείλαμεν τὸν λόγον τοῦ κυρίου, πῶς
    ἔχουσιν.
translation:
  text: After some days, Paul said to Barnabas, “Let us return now and visit the brothers
    in every city where we proclaimed the word of the Lord, to see how they are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and may use the
      masculine term representatively for the whole group of believers.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δέ τινας ἡμέρας
  chosen: After some days
  alternatives:
  - After some time
  - Some days later
  lexicon: BDAG
  rationale: μετά with the accusative plus a time expression indicates subsequent
    time. 'After some days' is a natural, close rendering that preserves the indefinite
    interval without overinterpreting its length.
- source_word: εἶπεν πρὸς Βαρναβᾶν Παῦλος
  chosen: Paul said to Barnabas
  alternatives:
  - Paul said to Barnabas that
  - Paul told Barnabas
  lexicon: BDAG
  rationale: The Greek word order foregrounds the speech act and identifies Paul as
    speaker to Barnabas. 'Said to' is the straightforward rendering of εἶπεν πρὸς.
- source_word: Ἐπιστρέψαντες
  chosen: Let us return
  alternatives:
  - Returning
  - Let us go back
  lexicon: BDAG
  rationale: 'Although formally an aorist participle (''having returned''), in idiomatic
    English with the following hortatory subjunctive it is best carried into the main
    exhortation: ''Let us return.'' This preserves the sense without awkward literalism.'
- source_word: δὴ
  chosen: now
  alternatives:
  - then
  - indeed
  lexicon: BDAG
  rationale: δή adds urgency or immediacy to the proposal. 'Now' communicates the
    pragmatic force naturally in English.
- source_word: ἐπισκεψώμεθα
  chosen: visit
  alternatives:
  - look in on
  - inspect
  - care for
  lexicon: BDAG
  rationale: In this context the verb means to go see people with concern for their
    condition. 'Visit' is natural and broad enough to include pastoral concern without
    importing more than the text states.
- source_word: τοὺς ἀδελφοὺς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Per the translation philosophy, gender-accurate rendering is preferred.
    ἀδελφοί here likely refers to the mixed Christian community, but the Greek uses
    the masculine familial term. Therefore 'the brothers' is retained in the main
    text, with an inclusivity note preserved in a footnote.
- source_word: κατὰ πόλιν πᾶσαν
  chosen: in every city
  alternatives:
  - city by city
  - in each city
  lexicon: BDAG
  rationale: The distributive κατά construction means throughout each city on their
    route of prior ministry. 'In every city' is idiomatic and preserves the distributive
    sense.
- source_word: ἐν αἷς κατηγγείλαμεν
  chosen: where we proclaimed
  alternatives:
  - in which we announced
  - where we preached
  lexicon: BDAG
  rationale: καταγγέλλω is stronger than merely 'say' and commonly refers to public
    proclamation. 'Proclaimed' best reflects that sense in readable modern English.
- source_word: τὸν λόγον τοῦ κυρίου
  chosen: the word of the Lord
  alternatives:
  - the Lord's word
  - the message of the Lord
  lexicon: BDAG
  rationale: λόγος here refers to the preached message belonging to or concerning
    the Lord. 'The word of the Lord' is a standard and accurate rendering. κύριος
    is rendered 'Lord' in keeping with the doctrinal default for Kyrios.
- source_word: πῶς ἔχουσιν
  chosen: to see how they are
  alternatives:
  - how they are doing
  - how they fare
  lexicon: BDAG
  rationale: The idiom asks about their condition or state. 'To see how they are'
    is natural English and avoids colloquial looseness while preserving the pastoral
    concern.
