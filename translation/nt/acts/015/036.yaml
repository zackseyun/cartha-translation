theological_decisions:
- issue: Rendering of ἀδελφοί for a likely mixed-gender group
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: Following the stated philosophy of gender-accurate over gender-neutral,
    the masculine familial term is retained in the main text. Because the referent
    is likely the broader Christian community including women, the inclusive sense
    is preserved in a footnote rather than replacing the source-shaped wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance specifies 'Lord' as the default rendering for
    κύριος. In this context it refers to the Lord whose message was proclaimed, and
    'Lord' best matches both NT usage and the project's consistency goals.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
