id: ACT.15.30
reference: Acts 15:30
source:
  edition: SBLGNT
  text: Οἱ μὲν οὖν ἀπολυθέντες ⸀κατῆλθον εἰς Ἀντιόχειαν, καὶ συναγαγόντες τὸ πλῆθος
    ἐπέδωκαν τὴν ἐπιστολήν·
translation:
  text: So, after being sent off, they went down to Antioch, and after gathering the
    multitude, they delivered the letter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after being dismissed' or 'after being released.' The Greek participle
      can denote being formally sent away or dismissed.
    reason: lexical_alternative
  - marker: b
    text: '''Went down'' reflects the Greek verb''s directional sense, likely from
      Jerusalem''s higher elevation to Antioch.'
    reason: cultural_note
  - marker: c
    text: Or 'the assembly' or 'the congregation.' The phrase refers to the gathered
      group in Antioch.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολυθέντες
  chosen: after being sent off
  alternatives:
  - after being dismissed
  - after being released
  lexicon: BDAG
  rationale: The participle denotes being formally let go or sent away from the Jerusalem
    gathering. 'Sent off' fits the context of an authorized departure better than
    the more neutral 'released,' and is more natural in modern English than 'dismissed.'
- source_word: κατῆλθον
  chosen: went down
  alternatives:
  - came down
  - traveled down
  lexicon: BDAG
  rationale: The verb literally means 'went down/came down,' often reflecting geographical
    descent from Jerusalem. 'Went down' preserves the directional nuance without overexplaining.
- source_word: συναγαγόντες
  chosen: after gathering
  alternatives:
  - having assembled
  - bringing together
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as antecedent action in English.
    'After gathering' is clear and idiomatic while preserving the sequence.
- source_word: τὸ πλῆθος
  chosen: the multitude
  alternatives:
  - the assembly
  - the congregation
  - the crowd
  lexicon: BDAG
  rationale: In Acts this expression commonly refers to the gathered body of believers
    or assembled group. 'Multitude' is a fairly literal rendering that avoids prematurely
    narrowing the referent to a formal ecclesial term, though 'assembly' is possible
    contextually.
- source_word: ἐπέδωκαν
  chosen: they delivered
  alternatives:
  - they handed over
  - they gave
  lexicon: BDAG
  rationale: The verb here refers to formally presenting the letter to the gathered
    group. 'Delivered' captures the official sense better than the more generic 'gave.'
- source_word: ἐπιστολήν
  chosen: the letter
  alternatives:
  - the epistle
  lexicon: BDAG
  rationale: '''Letter'' is the standard modern English equivalent and avoids unnecessary
    ecclesiastical diction.'
