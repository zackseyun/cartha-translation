theological_decisions:
- issue: Divine impartiality evidenced by the gift of the Spirit to Gentiles
  chosen_reading: The verse is translated to show that God's testimony consisted in
    giving the Holy Spirit to 'them' in the same way as to 'us,' without adding interpretive
    language about ethnicity or covenant status beyond what the immediate context
    supplies.
  alternative_readings:
  - A more interpretive rendering could explicitly identify 'them' as Gentiles in
    the verse itself.
  rationale: The Greek pronoun αὐτοῖς does not itself specify 'Gentiles'; that identification
    comes from context. The translation preserves the text's wording while allowing
    the narrative context to supply the referent.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
