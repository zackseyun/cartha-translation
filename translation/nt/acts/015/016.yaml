id: ACT.15.16
reference: Acts 15:16
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἀναστρέψω καὶ ἀνοικοδομήσω τὴν σκηνὴν Δαυὶδ τὴν πεπτωκυῖαν καὶ
    τὰ ⸀κατεσκαμμένα αὐτῆς ἀνοικοδομήσω καὶ ἀνορθώσω αὐτήν,
translation:
  text: After these things I will return, and I will rebuild the fallen tent of David;
    I will rebuild its ruins, and I will restore it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tabernacle of David.' The Greek word can mean 'tent' or 'tabernacle.'
    reason: lexical_alternative
  - marker: b
    text: '''The tent of David'' is a prophetic metaphor for the restoration associated
      with David''s line or kingdom.'
    reason: cross_reference
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Afterward
  lexicon: BDAG
  rationale: A formally transparent rendering that preserves the plural demonstrative
    and the temporal transition in the quotation. 'After this' is smoother English
    and common in translations, but 'After these things' more closely reflects the
    Greek wording.
- source_word: ἀναστρέψω
  chosen: I will return
  alternatives:
  - I will turn back
  - I will come back
  lexicon: BDAG
  rationale: In this context the future verb is best taken in the sense of returning/coming
    back rather than the more general 'turn.' 'I will return' is idiomatic and preserves
    the divine first-person promise in the citation.
- source_word: ἀνοικοδομήσω
  chosen: I will rebuild
  alternatives:
  - I will build again
  lexicon: BDAG
  rationale: The compound verb denotes building again/rebuilding. 'Rebuild' is concise,
    natural English and preserves the restoration imagery.
- source_word: σκηνὴν Δαυὶδ
  chosen: the tent of David
  alternatives:
  - the tabernacle of David
  - the house of David
  lexicon: BDAG
  rationale: σκηνή literally means 'tent' or 'tabernacle.' 'Tent' is preferred for
    readable modern English and avoids importing later ecclesiastical associations.
    'House of David' would over-interpret the metaphor, though the referent is David's
    dynasty/kingdom.
- source_word: τὴν πεπτωκυῖαν
  chosen: the fallen
  alternatives:
  - that has fallen
  - the collapsed
  lexicon: BDAG
  rationale: The perfect participle describes a state resulting from falling. 'Fallen'
    is compact and idiomatic in English when modifying 'tent.'
- source_word: τὰ κατεσκαμμένα αὐτῆς
  chosen: its ruins
  alternatives:
  - its broken parts
  - the things torn down from it
  - its wreckage
  lexicon: BDAG
  rationale: The neuter plural perfect passive participle refers to what has been
    demolished/torn down. 'Its ruins' captures the collective sense naturally in English
    without awkward literalism.
- source_word: ἀνορθώσω
  chosen: I will restore
  alternatives:
  - I will set upright
  - I will raise up again
  lexicon: BDAG
  rationale: The verb can mean to straighten up, set upright, or restore. In parallel
    with 'rebuild' and applied to the fallen tent, 'restore' best communicates the
    result in natural English while preserving the restoration theme.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun refers back to the grammatically feminine σκηνή, but English
    uses the neuter for an inanimate structure. 'It' is therefore the natural and
    accurate rendering.
