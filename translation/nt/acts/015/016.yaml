theological_decisions:
- issue: Metaphorical force of 'the tent of David'
  chosen_reading: Retain the metaphor as 'the tent of David' rather than interpret
    it directly as 'David's dynasty/kingdom.'
  alternative_readings:
  - the house of David
  - David's fallen dynasty
  rationale: The quotation evokes restoration imagery from the prophetic source and
    likely points to the restoration of David's royal line/people, but the Greek itself
    preserves the metaphor. Following optimal equivalence and the instruction not
    to import doctrinal claims the text does not make, the metaphor is kept in the
    main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
