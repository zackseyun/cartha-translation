theological_decisions:
- issue: Rendering αἵρεσις in a pre-Christian/Jewish-group context
  chosen_reading: party
  alternative_readings:
  - sect
  rationale: The term here identifies the Pharisees as a recognized group within Judaism,
    not a doctrinally deviant movement in the later Christian sense. 'Party' avoids
    importing the later ecclesiastical sense of 'heresy' while remaining readable.
    'Sect' is viable and preserved as an alternative.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Force of πεπιστευκότες
  chosen_reading: who had believed
  alternative_readings:
  - who were believers
  rationale: The verse explicitly presents these Pharisees as having believed, while
    still advocating circumcision and law-keeping for Gentiles. Rendering the participle
    verbally preserves that historical-theological tension rather than smoothing it
    into a label.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
