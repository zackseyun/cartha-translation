id: ACT.15.5
reference: Acts 15:5
source:
  edition: SBLGNT
  text: ἐξανέστησαν δέ τινες τῶν ἀπὸ τῆς αἱρέσεως τῶν Φαρισαίων πεπιστευκότες, λέγοντες
    ὅτι δεῖ περιτέμνειν αὐτοὺς παραγγέλλειν τε τηρεῖν τὸν νόμον Μωϋσέως.
translation:
  text: But some of those from the party of the Pharisees who had believed stood up,
    saying that it is necessary to circumcise them and to command them to keep the
    law of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “sect of the Pharisees.” The Greek word here denotes a recognized party
      or school, not necessarily 'heresy' in the later technical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξανέστησαν
  chosen: stood up
  alternatives:
  - rose
  - got up
  lexicon: BDAG
  rationale: Aorist indicative of ἐξανίστημι in this deliberative setting naturally
    means rising to speak or take a stand in the assembly. 'Stood up' is idiomatic
    modern English and preserves the narrative action without overinterpreting it.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  - some men
  lexicon: BDAG
  rationale: Indefinite plural pronoun; 'some' is the most natural English equivalent.
    'Men' is not explicit in the Greek and would add specificity not warranted by
    the text.
- source_word: τῶν ἀπὸ τῆς αἱρέσεως τῶν Φαρισαίων
  chosen: those from the party of the Pharisees
  alternatives:
  - those of the sect of the Pharisees
  - those from the Pharisaic party
  lexicon: BDAG
  rationale: αἵρεσις here denotes a party, school, or sect, not 'heresy' in the later
    technical sense. 'Party' communicates group affiliation in readable modern English
    while avoiding anachronistic negative connotations.
- source_word: πεπιστευκότες
  chosen: who had believed
  alternatives:
  - who had come to believe
  - who were believers
  lexicon: BDAG
  rationale: Perfect active participle indicates a completed act with continuing state.
    'Who had believed' preserves the prior action relative to the main verb and avoids
    turning the participle into a noun ('believers') where the verbal aspect is meaningful.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - declaring
  - insisting
  lexicon: BDAG
  rationale: Present participle introducing the content of their speech. 'Saying'
    is sufficiently neutral and does not import a stronger tone than the Greek requires.
- source_word: δεῖ
  chosen: it is necessary
  alternatives:
  - it is required
  - one must
  lexicon: BDAG
  rationale: Impersonal verb expressing necessity. 'It is necessary' closely matches
    the Greek force and leaves the source of the claimed necessity implicit, as in
    the original.
- source_word: περιτέμνειν αὐτούς
  chosen: to circumcise them
  alternatives:
  - that they be circumcised
  lexicon: BDAG
  rationale: Infinitive construction after δεῖ. 'To circumcise them' is a direct and
    natural rendering; passive restructuring is possible in English but less closely
    reflects the Greek syntax.
- source_word: παραγγέλλειν
  chosen: to command
  alternatives:
  - to instruct
  - to order
  lexicon: BDAG
  rationale: The verb carries authoritative force. 'Command' best preserves that force;
    'instruct' would soften the demand, while 'order' can sound overly harsh in contemporary
    English.
- source_word: τε τηρεῖν
  chosen: and to keep
  alternatives:
  - and to observe
  - and to obey
  lexicon: BDAG
  rationale: τε links the infinitives, and τηρέω here means to keep/observe in the
    sense of maintaining obedience to a law. 'Keep' is concise and standard for legal/religious
    observance.
- source_word: τὸν νόμον Μωϋσέως
  chosen: the law of Moses
  alternatives:
  - the Mosaic law
  lexicon: BDAG
  rationale: A transparent genitive construction. 'The law of Moses' is the most direct
    rendering and preserves the phrasing familiar to English readers without becoming
    overly technical.
