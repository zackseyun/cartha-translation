id: ACT.15.7
reference: Acts 15:7
source:
  edition: SBLGNT
  text: πολλῆς δὲ ⸀ζητήσεως γενομένης ἀναστὰς Πέτρος εἶπεν πρὸς αὐτούς· Ἄνδρες ἀδελφοί,
    ὑμεῖς ἐπίστασθε ὅτι ἀφ’ ἡμερῶν ἀρχαίων ⸂ἐν ὑμῖν ἐξελέξατο ὁ θεὸς⸃ διὰ τοῦ στόματός
    μου ἀκοῦσαι τὰ ἔθνη τὸν λόγον τοῦ εὐαγγελίου καὶ πιστεῦσαι,
translation:
  text: And after much debate had taken place, Peter stood up and said to them, “Brothers,
    you know that from ancient days God chose among you that through my mouth the
    Gentiles should hear the word of the gospel and believe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Men, brothers.” The Greek address is masculine plural; “Brothers” preserves
      the form, though the audience may have included others represented by this conventional
      address.
    reason: lexical_alternative
  - marker: b
    text: Or “from early days.”
    reason: lexical_alternative
  - marker: c
    text: Or “the nations.” Here the sense is non-Jewish peoples, hence “the Gentiles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλῆς ... ζητήσεως γενομένης
  chosen: after much debate had taken place
  alternatives:
  - after much discussion had taken place
  - after much dispute had arisen
  lexicon: BDAG
  rationale: The genitive absolute marks prior circumstance. ζήτησις here refers to
    deliberative controversy in the Jerusalem council context; 'debate' is natural
    modern English and preserves the sense of serious discussion without overstating
    hostility.
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: Aorist participle introducing Peter's action before speaking. 'Stood
    up' is idiomatic and concrete in English.
- source_word: Ἄνδρες ἀδελφοί
  chosen: Brothers
  alternatives:
  - Men, brothers
  - Brothers and sisters
  lexicon: BDAG
  rationale: This is a conventional vocative address. 'Brothers' preserves the masculine
    plural form and the familial tone. 'Brothers and sisters' would add inclusivity
    not explicit in the Greek, while 'Men, brothers' is overly wooden in English.
    Inclusivity relevance is preserved in a footnote per gender-accurate policy.
- source_word: ἐπίστασθε
  chosen: you know
  alternatives:
  - you understand
  - you are aware
  lexicon: BDAG
  rationale: The verb denotes knowledge or awareness already possessed by the audience.
    'You know' is the most direct and natural rendering.
- source_word: ἀφ’ ἡμερῶν ἀρχαίων
  chosen: from ancient days
  alternatives:
  - from early days
  - from days of old
  lexicon: BDAG
  rationale: The phrase points to an earlier period known to the audience, likely
    the earlier episode of Peter's mission to Cornelius. 'From ancient days' is slightly
    formal but clear and reflects the Greek wording closely.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - from among you
  - in your midst
  lexicon: BDAG
  rationale: In this context the phrase indicates selection within the group present
    or represented. 'Among you' is the most natural rendering; 'from among you' is
    possible but slightly more interpretive.
- source_word: ἐξελέξατο
  chosen: chose
  alternatives:
  - selected
  - made choice
  lexicon: BDAG
  rationale: Middle voice of ἐκλέγομαι commonly means 'choose/select.' 'Chose' is
    concise and standard.
- source_word: διὰ τοῦ στόματός μου
  chosen: through my mouth
  alternatives:
  - through me
  - by my mouth
  lexicon: BDAG
  rationale: The Greek is more vivid than a simple instrumental pronoun and emphasizes
    Peter as the speaking instrument. 'Through my mouth' preserves the metaphor and
    rhetorical force.
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Acts 15 the contrast is between Jews and non-Jews entering the people
    of God. 'Gentiles' best communicates that contextual sense, though 'nations' is
    the broader lexical possibility.
- source_word: τὸν λόγον τοῦ εὐαγγελίου
  chosen: the word of the gospel
  alternatives:
  - the message of the good news
  - the word of the good news
  lexicon: BDAG
  rationale: λόγος here means message/word, and εὐαγγέλιον is 'gospel/good news.'
    'The word of the gospel' preserves the formal texture of Luke's phrasing while
    remaining understandable.
- source_word: πιστεῦσαι
  chosen: believe
  alternatives:
  - come to faith
  lexicon: BDAG
  rationale: 'The infinitive coordinates with ἀκοῦσαι: the Gentiles were to hear and
    believe. ''Believe'' is the straightforward rendering and avoids importing a more
    developed theological phrase.'
