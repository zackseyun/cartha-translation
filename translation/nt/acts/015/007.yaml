theological_decisions:
- issue: Gendered vocative Ἄνδρες ἀδελφοί in a mixed or representative assembly
  chosen_reading: Brothers
  alternative_readings:
  - Men, brothers
  - Brothers and sisters
  rationale: Following the gender-accurate policy, the masculine plural is preserved
    in the main text rather than expanded. Because the address is likely representative
    and may include a broader audience than biological brothers alone, the inclusive
    relevance is noted in a footnote rather than imported into the translation itself.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of τὰ ἔθνη in salvation-historical context
  chosen_reading: the Gentiles
  alternative_readings:
  - the nations
  rationale: Although ἔθνη can mean 'nations,' the immediate context of the Jerusalem
    council concerns non-Jewish believers. 'Gentiles' best conveys the referent without
    flattening the Jewish-Gentile distinction central to the passage.
