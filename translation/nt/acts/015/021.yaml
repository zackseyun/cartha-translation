id: ACT.15.21
reference: Acts 15:21
source:
  edition: SBLGNT
  text: Μωϋσῆς γὰρ ἐκ γενεῶν ἀρχαίων κατὰ πόλιν τοὺς κηρύσσοντας αὐτὸν ἔχει ἐν ταῖς
    συναγωγαῖς κατὰ πᾶν σάββατον ἀναγινωσκόμενος.
translation:
  text: For from ancient generations Moses has had those who proclaim him in every
    city, since he is read in the synagogues every Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Moses ... those who proclaim him ... he is read.' 'Moses' stands
      metonymically for the writings or law associated with Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks this verse as giving the rationale for the preceding judgment;
    'For' preserves the explanatory force naturally in English.
- source_word: ἐκ γενεῶν ἀρχαίων
  chosen: from ancient generations
  alternatives:
  - from generations of old
  - from ancient times
  lexicon: BDAG
  rationale: The phrase is idiomatic and temporal. 'From ancient generations' keeps
    the plural noun and the sense of long-standing antiquity without becoming wooden.
- source_word: κατὰ πόλιν
  chosen: in every city
  alternatives:
  - city by city
  - in each city
  lexicon: BDAG
  rationale: The distributive κατά + singular noun indicates distribution. 'In every
    city' is idiomatic English and preserves the sense that this is true throughout
    the cities.
- source_word: τοὺς κηρύσσοντας αὐτὸν
  chosen: those who proclaim him
  alternatives:
  - those who preach him
  - those who announce him
  lexicon: BDAG
  rationale: κηρύσσω is proclamation language. 'Proclaim' is broad and natural; 'him'
    refers to Moses metonymically, that is, the Mosaic law/tradition associated with
    him, but the Greek personifies Moses and the translation preserves that wording.
- source_word: ἔχει
  chosen: has had
  alternatives:
  - has
  - has had for a long time
  lexicon: BDAG
  rationale: Although formally present tense, in context it expresses an enduring
    state extending from ancient generations to the present. 'Has had' communicates
    that durative force more clearly in English.
- source_word: ἐν ταῖς συναγωγαῖς
  chosen: in the synagogues
  alternatives:
  - in synagogues
  lexicon: BDAG
  rationale: The article is naturally represented in English. The phrase identifies
    the regular setting where Moses is read.
- source_word: κατὰ πᾶν σάββατον
  chosen: every Sabbath
  alternatives:
  - on every Sabbath
  - Sabbath by Sabbath
  lexicon: BDAG
  rationale: The distributive phrase denotes regular recurrence. 'Every Sabbath' is
    concise and idiomatic.
- source_word: ἀναγινωσκόμενος
  chosen: since he is read
  alternatives:
  - being read
  - as he is read
  lexicon: BDAG
  rationale: The participle explains the basis for the previous clause. Rendering
    it with 'since' brings out the causal nuance in context while preserving the passive
    sense. 'He is read' again preserves the metonymic personification of Moses for
    his writings.
