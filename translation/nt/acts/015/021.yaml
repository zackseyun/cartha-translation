theological_decisions:
- issue: Metonymic reference to Moses
  chosen_reading: Retain the personal reference 'Moses'/'him' rather than explicitly
    substituting 'the law of Moses' or 'the writings of Moses.'
  alternative_readings:
  - For from ancient generations the law of Moses has had those who proclaim it in
    every city...
  - For Moses' writings are read in the synagogues every Sabbath...
  rationale: The Greek text explicitly says 'Moses' and 'him,' using a common metonymy
    for Moses' writings. Preserving the metonymy keeps closer to the source and avoids
    importing an interpretive expansion into the main text. The sense remains clear
    in context.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
