theological_decisions:
- issue: Divine agency in apostolic mission
  chosen_reading: God is presented as the one who performed the signs and wonders,
    working through Barnabas and Paul.
  alternative_readings:
  - Barnabas and Paul performed the signs and wonders in a primary sense
  rationale: The syntax places ὁ θεὸς as subject of ἐποίησεν, with δι’ αὐτῶν marking
    Barnabas and Paul as instruments. The translation preserves this theological emphasis
    without diminishing the apostles' real participation.
  doctrine_reference: Translation philosophy §1, §3
