id: ACT.15.20
reference: Acts 15:20
source:
  edition: SBLGNT
  text: ἀλλὰ ἐπιστεῖλαι αὐτοῖς τοῦ ⸀ἀπέχεσθαι τῶν ἀλισγημάτων τῶν εἰδώλων καὶ τῆς
    πορνείας καὶ ⸀τοῦ πνικτοῦ καὶ τοῦ αἵματος·
translation:
  text: but to write to them to abstain from the pollutions of idols, and from sexual
    immorality, and from what has been strangled, and from blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defilements associated with idols'; some translations narrow this to
      'food sacrificed to idols,' but the Greek here is broader.
    reason: lexical_alternative
  - marker: b
    text: Or 'fornication'; the Greek term can denote sexual immorality broadly, and
      some understand it here more specifically as prohibited sexual unions.
    reason: alternative_reading
  - marker: c
    text: Literally 'what is strangled,' referring to meat from an animal not properly
      drained of blood.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπιστεῖλαι
  chosen: to write
  alternatives:
  - to instruct by letter
  - to send word
  lexicon: BDAG
  rationale: The aorist infinitive of ἐπιστέλλω here refers to sending a written directive
    in the context of the Jerusalem council's letter. 'To write' is natural modern
    English and fits the immediate context, while preserving the epistolary sense
    better than the broader 'send word.'
- source_word: ἀπέχεσθαι
  chosen: to abstain from
  alternatives:
  - to keep away from
  - to refrain from
  lexicon: BDAG
  rationale: ἀπέχω in the middle commonly means to abstain or keep oneself from something.
    'Abstain from' is the standard and clearest idiomatic rendering in this moral/legal
    context.
- source_word: ἀλισγημάτων
  chosen: pollutions
  alternatives:
  - defilements
  - contaminations
  lexicon: BDAG
  rationale: ἀλίσγημα denotes defilement or pollution, especially cultic contamination.
    'Pollutions' preserves the concrete and ritual sense better than the more abstract
    'defilements,' while remaining understandable in English.
- source_word: τῶν εἰδώλων
  chosen: of idols
  alternatives:
  - associated with idols
  - from idols
  lexicon: BDAG
  rationale: 'The genitive is most naturally taken as specifying the source or association
    of the pollutions: pollutions ''of idols,'' that is, idol-related defilements.
    This keeps close to the Greek while allowing the reader to infer the cultic context.'
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual immorality/prohibited sexual relations
  lexicon: BDAG
  rationale: Given modern English usage and the translation philosophy's avoidance
    of archaic ecclesiastical jargon, 'sexual immorality' is the clearest rendering
    of πορνεία. It preserves the term's broad scope without narrowing it to premarital
    sex alone, as 'fornication' might suggest to modern readers.
- source_word: τοῦ πνικτοῦ
  chosen: what has been strangled
  alternatives:
  - strangled meat
  - that which is strangled
  lexicon: BDAG
  rationale: πνικτός refers to an animal killed by strangling or without proper draining
    of blood. 'What has been strangled' is idiomatic, preserves the substantival force,
    and avoids adding 'meat' where the Greek leaves it implicit.
- source_word: τοῦ αἵματος
  chosen: blood
  alternatives:
  - the blood
  - consuming blood
  lexicon: BDAG
  rationale: The genitive governed by ἀπέχεσθαι is succinctly rendered 'from blood.'
    English can omit the article naturally here. The sense is abstention from blood
    as food/use in this context, but the translation should not over-specify beyond
    the Greek.
