theological_decisions:
- issue: Scope of idol-related prohibition
  chosen_reading: Rendered literally as 'the pollutions of idols' rather than interpreting
    more narrowly as only 'food sacrificed to idols.'
  alternative_readings:
  - things polluted by idols
  - food sacrificed to idols
  rationale: The Greek uses ἀλισγημάτων τῶν εἰδώλων, not the more specific εἰδωλόθυτα
    found elsewhere. A more literal rendering preserves the broader cultic-defilement
    sense and avoids importing a narrower interpretation not explicit in this wording.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Meaning of πορνεία in apostolic decree
  chosen_reading: Translated broadly as 'sexual immorality' without resolving whether
    the reference is general sexual sin or specifically prohibited unions under Levitical/Jewish
    categories.
  alternative_readings:
  - fornication
  - unlawful marriage/prohibited sexual unions
  rationale: The term can be understood broadly or, in this context, as shorthand
    for sexual practices prohibited to Gentile converts under Jewish moral expectations.
    The translation preserves the lexical breadth and does not settle the interpretive
    debate in the main text.
  doctrine_reference: Translation philosophy §3
- issue: Nature of the food laws in the decree
  chosen_reading: Kept the list as abstentions without implying whether these are
    temporary table-fellowship measures or universally binding moral commands.
  alternative_readings:
  - temporary concessions for Jew-Gentile fellowship
  - permanent binding commands for all believers
  rationale: The verse itself states the prohibitions but does not explain their full
    theological duration or rationale. The translation therefore remains text-bound
    and avoids importing a denominational conclusion.
  doctrine_reference: Affirmations; Translation philosophy §3
