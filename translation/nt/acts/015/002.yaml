id: ACT.15.2
reference: Acts 15:2
source:
  edition: SBLGNT
  text: γενομένης ⸀δὲ στάσεως καὶ ζητήσεως οὐκ ὀλίγης τῷ Παύλῳ καὶ τῷ Βαρναβᾷ πρὸς
    αὐτοὺς ἔταξαν ἀναβαίνειν Παῦλον καὶ Βαρναβᾶν καί τινας ἄλλους ἐξ αὐτῶν πρὸς τοὺς
    ἀποστόλους καὶ πρεσβυτέρους εἰς Ἰερουσαλὴμ περὶ τοῦ ζητήματος τούτου.
translation:
  text: And after no small dissension and debate had arisen between Paul and Barnabas
    and them, they appointed Paul and Barnabas and some others from among them to
    go up to the apostles and elders in Jerusalem about this issue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not a little dissension and debate.' The Greek uses a litotes ('no small')
      to emphasize the seriousness of the dispute.
    reason: lexical_alternative
  - marker: b
    text: '''Go up'' is the Greek idiom commonly used for travel to Jerusalem.'
    reason: cultural_note
  - marker: c
    text: Or 'about this matter' or 'about this question.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένης δὲ
  chosen: And after ... had arisen
  alternatives:
  - And when ... arose
  - Now after ... had occurred
  lexicon: BDAG
  rationale: Genitive absolute introducing the circumstance preceding the main action.
    'And after ... had arisen' gives natural English while preserving the temporal-circumstantial
    force of the construction and the connective δέ.
- source_word: στάσεως
  chosen: dissension
  alternatives:
  - conflict
  - discord
  - strife
  lexicon: BDAG
  rationale: στάσις here denotes serious opposition or discord, not merely a neutral
    difference of opinion. 'Dissension' preserves the sharpness without overstating
    it as violence or revolt.
- source_word: ζητήσεως
  chosen: debate
  alternatives:
  - discussion
  - argument
  - dispute
  lexicon: BDAG
  rationale: Paired with στάσις, ζητήσις refers to active disputation. 'Debate' distinguishes
    it from the stronger 'dissension' while keeping the sense of verbal contention.
- source_word: οὐκ ὀλίγης
  chosen: no small
  alternatives:
  - not a little
  - considerable
  lexicon: BDAG
  rationale: This litotes emphasizes magnitude. 'No small' preserves the rhetorical
    flavor more closely than the smoother but less transparent 'considerable.'
- source_word: τῷ Παύλῳ καὶ τῷ Βαρναβᾷ πρὸς αὐτούς
  chosen: between Paul and Barnabas and them
  alternatives:
  - for Paul and Barnabas with them
  - by Paul and Barnabas against them
  lexicon: BDAG
  rationale: The construction marks the parties involved in the dispute. English idiom
    is best served by 'between ... and ...'. 'Them' refers to the men from Judea in
    the immediate context. This avoids importing an adversarial nuance stronger than
    the Greek requires.
- source_word: ἔταξαν
  chosen: they appointed
  alternatives:
  - they arranged
  - they determined
  - they decided
  lexicon: BDAG
  rationale: τάσσω can mean appoint, arrange, or order. Here the sense is that the
    church/community designated representatives for the journey. 'Appointed' captures
    that formal selection better than the weaker 'decided.'
- source_word: ἀναβαίνειν
  chosen: to go up
  alternatives:
  - to travel up
  - to go
  lexicon: BDAG
  rationale: ἀναβαίνω literally means 'go up' and is commonly used for travel to Jerusalem.
    Retaining 'go up' preserves the conventional geographic/cultic idiom.
- source_word: τινας ἄλλους ἐξ αὐτῶν
  chosen: some others from among them
  alternatives:
  - certain others from them
  - some other men from among them
  lexicon: BDAG
  rationale: The phrase indicates additional delegates selected from the local group.
    'From among them' makes explicit the representative sense of ἐξ αὐτῶν without
    adding unwarranted specificity.
- source_word: τοὺς ἀποστόλους καὶ πρεσβυτέρους
  chosen: the apostles and elders
  alternatives:
  - the emissaries and elders
  lexicon: BDAG
  rationale: ἀπόστολος is a recognized title in Acts and should be rendered traditionally
    as 'apostles.' πρεσβύτεροι in this context refers to recognized leaders, best
    rendered 'elders' rather than paraphrased.
- source_word: περὶ τοῦ ζητήματος τούτου
  chosen: about this issue
  alternatives:
  - concerning this matter
  - about this question
  lexicon: BDAG
  rationale: ζήτημα denotes the disputed matter under discussion. 'Issue' is clear
    modern English; 'matter' is also possible, but 'issue' better reflects the live
    controversy in context.
