theological_decisions:
- issue: Identification of the disputing parties
  chosen_reading: The dispute is rendered as between Paul and Barnabas and 'them,'
    referring back to the men from Judea in the previous verse.
  alternative_readings:
  - The dative with πρὸς could be rendered more loosely as 'Paul and Barnabas had
    no small dissension and debate with them.'
  rationale: This is primarily a syntactic decision, but it affects how clearly the
    verse identifies the controversy. The translation avoids importing denominational
    or doctrinal conclusions and simply reflects the immediate narrative referent.
  doctrine_reference: Translation philosophy §1, §3
- issue: Institutional nuance of ἔταξαν
  chosen_reading: Rendered 'they appointed' to reflect a communal designation of delegates
    rather than a mere private decision.
  alternative_readings:
  - they decided
  - they arranged
  rationale: The verse depicts an ordered ecclesial response to controversy, but the
    translation avoids overstating formal church polity beyond what the Greek states.
  doctrine_reference: Translation philosophy §1, §6
