theological_decisions:
- issue: Referent of 'the Lord'
  chosen_reading: Rendered simply as 'the Lord' without specifying Jesus or God the
    Father.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text uses the conventional Christian title κύριος without explicit
    specification. To preserve the text's own level of specificity and avoid importing
    a doctrinally unnecessary resolution, the translation leaves the referent as stated.
  doctrine_reference: 'Preserve theological tension rather than resolve it; Contested
    terms: κύριος → Lord'
- issue: Scope of 'brothers'
  chosen_reading: Main text keeps 'brothers' with a footnote noting likely inclusive
    communal sense.
  alternative_readings:
  - brothers and sisters
  - fellow believers
  rationale: The source term is masculine plural ἀδελφῶν. Per doctrine, gender-accurate
    rendering is preferred in the main text, while contextual inclusivity may be annotated
    rather than flattened into the translation.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
