id: ACT.15.40
reference: Acts 15:40
source:
  edition: SBLGNT
  text: Παῦλος δὲ ἐπιλεξάμενος Σιλᾶν ἐξῆλθεν παραδοθεὶς τῇ χάριτι τοῦ ⸀κυρίου ὑπὸ
    τῶν ἀδελφῶν,
translation:
  text: But Paul chose Silas and departed, having been commended by the brothers to
    the grace of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been entrusted/committed to the grace of the Lord.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' may refer to the believing community more broadly, including
      women, depending on context.'
    reason: cultural_note
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with Barnabas's departure in the previous verse; 'But'
    best preserves the mild adversative force in context.
- source_word: ἐπιλεξάμενος
  chosen: chose
  alternatives:
  - selected
  - picked out
  lexicon: BDAG
  rationale: Aorist middle participle indicating Paul's personal selection of Silas
    prior to departure. 'Chose' is natural English and preserves the sense without
    overtranslating the middle voice.
- source_word: Σιλᾶν
  chosen: Silas
  rationale: Personal name is transliterated per translation philosophy.
- source_word: ἐξῆλθεν
  chosen: departed
  alternatives:
  - went out
  - left
  lexicon: BDAG
  rationale: In travel narrative, ἐξέρχομαι commonly means to set out or depart. 'Departed'
    is idiomatic and fits the missionary context better than the more literal 'went
    out.'
- source_word: παραδοθεὶς
  chosen: having been commended
  alternatives:
  - having been entrusted
  - having been committed
  lexicon: BDAG
  rationale: Passive participle of παραδίδωμι here refers to being committed into
    God's care by the community. 'Commended' is the established and contextually precise
    sense in this idiom.
- source_word: τῇ χάριτι
  chosen: to the grace
  alternatives:
  - to grace
  - to the gracious care
  lexicon: BDAG
  rationale: The dative after παραδίδωμι in this idiom expresses entrusting someone
    to divine favor/care. 'To the grace' preserves the formal theological noun χάρις
    rather than paraphrasing it away.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default and standard NT usage;
    in Acts this naturally refers to the Lord Jesus or the Lord in Christian confession
    without needing to resolve further.
- source_word: ὑπὸ τῶν ἀδελφῶν
  chosen: by the brothers
  alternatives:
  - by the brothers and sisters
  - by the believers
  lexicon: BDAG
  rationale: ἀδελφῶν is grammatically masculine plural and in early Christian communal
    address often includes the wider sibling community. Per translation philosophy,
    the main text remains gender-accurate as 'brothers,' with an inclusivity note
    preserved in a footnote.
