id: ACT.15.9
reference: Acts 15:9
source:
  edition: SBLGNT
  text: καὶ ⸀οὐθὲν διέκρινεν μεταξὺ ἡμῶν τε καὶ αὐτῶν, τῇ πίστει καθαρίσας τὰς καρδίας
    αὐτῶν.
translation:
  text: And he made no distinction between us and them, having cleansed their hearts
    by faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through faith.' The Greek dative can express means or instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐθὲν
  chosen: 'no'
  alternatives:
  - nothing
  lexicon: BDAG
  rationale: Used idiomatically with διέκρινεν to form the expression 'made no distinction.'
    Rendering it as bare 'nothing' would be less natural in English and obscure the
    verbal sense.
- source_word: διέκρινεν
  chosen: made ... distinction
  alternatives:
  - distinguished
  - discriminated between
  - separated
  lexicon: BDAG
  rationale: In this context διακρίνω means to differentiate or make a distinction
    between groups. 'Made no distinction' is clear modern English and preserves the
    force of the aorist statement about God's impartial action.
- source_word: μεταξὺ ἡμῶν τε καὶ αὐτῶν
  chosen: between us and them
  alternatives:
  - between both us and them
  lexicon: BDAG
  rationale: Standard rendering of the prepositional phrase. The τε ... καὶ pairing
    is naturally conveyed in English simply as 'and' here without loss of meaning.
- source_word: τῇ πίστει
  chosen: by faith
  alternatives:
  - through faith
  - by means of faith
  lexicon: BDAG
  rationale: 'πίστις defaults to ''faith'' per doctrine guidance. The dative is best
    rendered instrumentally here: God cleansed their hearts by means of faith. ''Through
    faith'' is possible, but ''by faith'' is more concise and idiomatic.'
- source_word: καθαρίσας
  chosen: having cleansed
  alternatives:
  - cleansing
  - after cleansing
  - purified
  lexicon: BDAG
  rationale: 'The aorist participle is rendered as antecedent or attendant action
    relative to the main verb: God made no distinction, having cleansed their hearts.
    ''Cleansed'' preserves the verbal link to purification language without overinterpreting
    the exact temporal nuance.'
- source_word: καρδίας
  chosen: hearts
  alternatives:
  - inner selves
  lexicon: BDAG
  rationale: '''Hearts'' is the standard and theologically resonant rendering for
    καρδία, referring to the inner person rather than merely emotions.'
- source_word: αὐτῶν
  chosen: their
  lexicon: BDAG
  rationale: Refers to the Gentiles in context; straightforward possessive rendering.
