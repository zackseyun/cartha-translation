id: ACT.15.15
reference: Acts 15:15
source:
  edition: SBLGNT
  text: καὶ τούτῳ συμφωνοῦσιν οἱ λόγοι τῶν προφητῶν, καθὼς γέγραπται·
translation:
  text: 'And with this the words of the prophets agree, just as it is written:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to this the words of the prophets agree.' The Greek dative construction
      can be represented either way in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  lexicon: BDAG
  rationale: Standard connective introducing James's further support. 'And' fits the
    discourse flow naturally in English.
- source_word: τούτῳ
  chosen: with this
  alternatives:
  - to this
  - with him/it
  lexicon: BDAG
  rationale: Dative demonstrative referring back to the preceding matter or statement.
    With συμφωνέω, English idiom is best expressed as 'agree with this' rather than
    the more wooden 'agree to this.' Fronting as 'with this' preserves the Greek emphasis.
- source_word: συμφωνοῦσιν
  chosen: agree
  alternatives:
  - are in agreement
  - harmonize
  lexicon: BDAG
  rationale: Present active indicative plural meaning 'agree' or 'be in accord.' 'Agree'
    is the clearest modern English rendering and fits the construction with the dative
    demonstrative.
- source_word: οἱ λόγοι
  chosen: the words
  alternatives:
  - the sayings
  - the message
  lexicon: BDAG
  rationale: λόγοι here refers to prophetic utterances in textual form. 'Words' is
    the most direct and sufficiently natural rendering.
- source_word: τῶν προφητῶν
  chosen: of the prophets
  alternatives:
  - from the prophets
  lexicon: BDAG
  rationale: 'Genitive most naturally expresses possession/source: these are the prophetic
    words. ''Of the prophets'' is idiomatic and formally close.'
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: BDAG
  rationale: Introduces scriptural citation with a comparative force. 'Just as' preserves
    the sense that what James has said corresponds to Scripture.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it stands written
  lexicon: BDAG
  rationale: Perfect passive commonly used as a scriptural citation formula. 'It is
    written' is standard, accurate, and readable English.
