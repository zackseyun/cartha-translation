theological_decisions:
- issue: Referent of τούτῳ in James's speech
  chosen_reading: A neuter demonstrative referring to the preceding claim/event, rendered
    impersonally as 'this' rather than specifying a doctrinal interpretation.
  alternative_readings:
  - the conversion of the Gentiles
  - Peter's statement
  - this plan/purpose of God
  rationale: The Greek leaves the referent somewhat broad, pointing back to the immediately
    preceding matter without explicitly naming it. The translation preserves that
    breadth rather than narrowing it to one interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
