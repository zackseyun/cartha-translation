id: ACT.15.41
reference: Acts 15:41
source:
  edition: SBLGNT
  text: διήρχετο δὲ τὴν Συρίαν καὶ ⸀τὴν Κιλικίαν ἐπιστηρίζων τὰς ἐκκλησίας.
translation:
  text: And he went through Syria and Cilicia, strengthening the churches.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διήρχετο
  chosen: went through
  alternatives:
  - was traveling through
  - passed through
  lexicon: BDAG
  rationale: Imperfect middle indicative of διέρχομαι denotes ongoing movement through
    regions. 'Went through' is natural English and preserves the sense of traversing
    these areas without over-specifying duration.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural unobtrusive rendering in context.
- source_word: Συρίαν
  chosen: Syria
  lexicon: BDAG
  rationale: Standard transliteration of the regional name.
- source_word: Κιλικίαν
  chosen: Cilicia
  lexicon: BDAG
  rationale: Standard transliteration of the regional name.
- source_word: ἐπιστηρίζων
  chosen: strengthening
  alternatives:
  - encouraging
  - establishing
  lexicon: BDAG
  rationale: 'The participle conveys the action accompanying Paul''s travel: giving
    support so that believers are made firm. ''Strengthening'' best captures the idea
    of reinforcing or establishing them in faith and practice without narrowing it
    merely to emotional encouragement.'
- source_word: ἐκκλησίας
  chosen: churches
  alternatives:
  - assemblies
  - congregations
  lexicon: BDAG
  rationale: In Acts this term commonly refers to local Christian communities. 'Churches'
    is the clearest and most idiomatic rendering in modern English.
