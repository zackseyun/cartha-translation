id: ACT.15.28
reference: Acts 15:28
source:
  edition: SBLGNT
  text: ἔδοξεν γὰρ τῷ ⸂πνεύματι τῷ ἁγίῳ⸃ καὶ ἡμῖν μηδὲν πλέον ἐπιτίθεσθαι ὑμῖν βάρος
    πλὴν ⸂τούτων τῶν ἐπάναγκες⸃,
translation:
  text: 'For it seemed good to the Holy Spirit and to us to place on you no greater
    burden than these necessary things:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it was decided by the Holy Spirit and by us.' The Greek idiom ἔδοξεν
      ... καὶ ἡμῖν can be rendered more formally as a decision formula.
    reason: lexical_alternative
  - marker: b
    text: Or 'these essentials' or 'these necessary requirements.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδοξεν
  chosen: it seemed good
  alternatives:
  - it was decided
  - it seemed best
  lexicon: BDAG
  rationale: The impersonal aorist of δοκέω commonly means 'it seemed good' or 'it
    was decided.' 'It seemed good' preserves the Greek idiom and the deliberative
    tone of the Jerusalem council without overstating it as a merely human preference.
- source_word: τῷ πνεύματι τῷ ἁγίῳ
  chosen: to the Holy Spirit
  alternatives:
  - to the Holy Ghost
  lexicon: BDAG
  rationale: The dative complements ἔδοξεν in the idiom 'it seemed good to.' The phrase
    refers personally to the Holy Spirit, not an impersonal force. 'Holy Spirit' is
    standard modern English and aligns with orthodox Trinitarian confession.
- source_word: καὶ ἡμῖν
  chosen: and to us
  alternatives:
  - and us
  lexicon: BDAG
  rationale: The dative is coordinated with τῷ πνεύματι and should be rendered explicitly
    as 'to us' in English for clarity and parallelism.
- source_word: μηδὲν πλέον
  chosen: no greater
  alternatives:
  - nothing more
  - nothing further
  lexicon: BDAG
  rationale: With βάρος, the comparative πλέον conveys 'no greater/further burden.'
    'No greater' reads naturally in English while preserving the comparative sense.
- source_word: ἐπιτίθεσθαι
  chosen: to place on
  alternatives:
  - to impose on
  - to lay on
  lexicon: BDAG
  rationale: The infinitive means to put or lay upon. 'Place on' is clear modern English
    and fits the metaphor of burden. 'Impose on' is possible but slightly more interpretive
    and institutional in tone.
- source_word: ὑμῖν
  chosen: on you
  alternatives:
  - upon you
  lexicon: BDAG
  rationale: This pronoun marks the recipients of the burden. 'On you' is idiomatic
    with 'place' in contemporary English.
- source_word: βάρος
  chosen: burden
  alternatives:
  - load
  lexicon: BDAG
  rationale: βάρος here is metaphorical for obligations being laid upon the Gentile
    believers. 'Burden' is the established and most natural equivalent.
- source_word: πλὴν
  chosen: than
  alternatives:
  - except for
  - apart from
  lexicon: BDAG
  rationale: In this construction after a negative statement about imposing a burden,
    πλὴν introduces the exception. English expresses this smoothly as 'than' in 'no
    greater burden than...'; 'except for' is also possible but less elegant here.
- source_word: τούτων τῶν ἐπάναγκες
  chosen: these necessary things
  alternatives:
  - these essentials
  - these necessary requirements
  lexicon: BDAG
  rationale: The phrase points forward to the specific stipulations in the next verse.
    'Necessary things' stays close to the Greek and avoids overinterpreting the nature
    of the requirements. 'Essentials' is idiomatic but slightly more interpretive.
