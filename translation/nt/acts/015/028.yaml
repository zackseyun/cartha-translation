theological_decisions:
- issue: Relation of the Holy Spirit to the council's decision
  chosen_reading: 'The text presents the decision as jointly affirmed by the Holy
    Spirit and the apostolic assembly: ''it seemed good to the Holy Spirit and to
    us.'''
  alternative_readings:
  - A merely rhetorical claim of human consensus
  - An impersonal influence rather than personal agency of the Spirit
  rationale: The dative construction with both 'the Holy Spirit' and 'us' indicates
    coordinated approval. The translation preserves the wording without diminishing
    the Spirit's personal agency or collapsing the statement into a purely human decision.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language)'
- issue: Force of the decree on Gentile believers
  chosen_reading: The verse speaks of not placing an additional burden beyond specified
    necessary requirements.
  alternative_readings:
  - A total rejection of any obligations whatsoever
  - A comprehensive imposition of Mosaic law
  rationale: The wording 'no greater burden than these necessary things' preserves
    the limited scope of the decree without importing later doctrinal systems about
    law and grace.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
