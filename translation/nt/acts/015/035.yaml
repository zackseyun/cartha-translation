theological_decisions:
- issue: Referent of 'the Lord' in 'the word of the Lord'
  chosen_reading: Rendered neutrally as 'the Lord' without specifying beyond the Greek
    expression.
  alternative_readings:
  - the word from the Lord Jesus
  - the Lord's message in a broader divine sense
  rationale: Acts often uses 'the Lord' in ways that can point especially to Jesus,
    but the translation should not over-specify where the Greek itself uses the title
    κύριος. The standard phrase is preserved without interpretive expansion.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
