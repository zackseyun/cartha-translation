id: ACT.15.35
reference: Acts 15:35
source:
  edition: SBLGNT
  text: Παῦλος δὲ καὶ Βαρναβᾶς διέτριβον ἐν Ἀντιοχείᾳ διδάσκοντες καὶ εὐαγγελιζόμενοι
    μετὰ καὶ ἑτέρων πολλῶν τὸν λόγον τοῦ κυρίου.
translation:
  text: But Paul and Barnabas stayed in Antioch, teaching and proclaiming the good
    news, with many others also, the word of the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spent some time in Antioch.' The Greek verb can emphasize remaining
      there for a period.
    reason: lexical_alternative
  - marker: b
    text: Or 'preaching the gospel.' The Greek means announcing or proclaiming good
      news.
    reason: lexical_alternative
  - marker: c
    text: '''The word of the Lord'' is a common expression in Acts for the Lord''s
      message; ''message of the Lord'' is a possible English alternative.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβον
  chosen: stayed
  alternatives:
  - spent some time
  - remained
  lexicon: BDAG
  rationale: The imperfect of διατρίβω here denotes continuing residence or spending
    time in a place. 'Stayed' is natural modern English and preserves the durative
    sense without sounding wooden.
- source_word: διδάσκοντες
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: A straightforward participial rendering that preserves the ongoing activity
    accompanying their stay.
- source_word: εὐαγγελιζόμενοι
  chosen: proclaiming the good news
  alternatives:
  - preaching the gospel
  - announcing the good news
  lexicon: BDAG
  rationale: This verb specifically refers to announcing good news. 'Proclaiming the
    good news' is clear modern English and avoids unnecessary ecclesiastical jargon
    while preserving the evangelistic sense.
- source_word: μετὰ καὶ ἑτέρων πολλῶν
  chosen: with many others also
  alternatives:
  - also with many others
  - with many other people as well
  lexicon: BDAG
  rationale: The phrase indicates that Paul and Barnabas were not alone in this ministry.
    Rendering καί as 'also' preserves the additive force, and ἕτεροι is naturally
    'others' here.
- source_word: λόγον
  chosen: word
  alternatives:
  - message
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' 'Word' is retained because the phrase
    'the word of the Lord' is a recognizable Lucan expression with theological and
    literary continuity in Acts.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In the genitive phrase
    τοῦ κυρίου, the full expression is 'the word of the Lord,' preserving standard
    NT title usage.
