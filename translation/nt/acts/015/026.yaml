theological_decisions:
- issue: Rendering Χριστοῦ in the title sequence κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    to preserve meaning. Here Χριστοῦ still functions as a title in apposition to
    Jesus, not merely as a name-like element. 'Messiah' therefore better reflects
    the Greek while remaining natural enough in context.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' and
    contested terms table for Χριστός'
