id: ACT.15.26
reference: Acts 15:26
source:
  edition: SBLGNT
  text: ἀνθρώποις παραδεδωκόσι τὰς ψυχὰς αὐτῶν ὑπὲρ τοῦ ὀνόματος τοῦ κυρίου ἡμῶν Ἰησοῦ
    Χριστοῦ.
translation:
  text: men who have risked their lives for the name of our Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have handed over their lives'; the Greek is more literally 'having delivered
      up their lives,' an idiom for exposing themselves to deadly danger.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' here because Χριστός functions
      as a title meaning 'Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - men and women
  lexicon: BDAG
  rationale: Dative plural of ἄνθρωπος here depends on the preceding commendatory
    formula ('we have sent... with our beloved Barnabas and Paul,' v. 25–26), yielding
    'men who...'. Although ἄνθρωπος can be generic, the immediate referents are Barnabas
    and Paul, so 'men' is gender-accurate and specific rather than generic.
- source_word: παραδεδωκόσι
  chosen: have risked
  alternatives:
  - have handed over
  - have given up
  - have devoted
  lexicon: BDAG
  rationale: Perfect active participle of παραδίδωμι literally means 'having handed
    over/delivered up.' In the idiom with 'their lives' and ὑπέρ, the sense is exposing
    oneself to mortal danger for a cause. 'Have risked' communicates the idiomatic
    force in natural English without overstating to actual death.
- source_word: τὰς ψυχὰς αὐτῶν
  chosen: their lives
  alternatives:
  - their souls
  - themselves
  lexicon: BDAG
  rationale: ψυχή can mean 'soul,' 'life,' or 'self.' In this context of danger and
    sacrifice, 'their lives' is the standard and contextually correct sense; 'their
    souls' would mislead English readers toward an immaterial sense not intended here.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: With the genitive, ὑπέρ commonly expresses benefit or cause. 'For' is
    concise and idiomatic here; 'for the sake of' is possible but heavier than needed.
- source_word: τοῦ ὀνόματος
  chosen: the name
  alternatives:
  - the reputation
  - the authority
  lexicon: BDAG
  rationale: ὄνομα is retained as 'name' because in biblical usage it carries the
    fuller sense of person, authority, and honor. Rendering it more interpretively
    would narrow the resonance. English readers can understand 'for the name of...'
    as a reverent biblical expression.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: of our Lord
  alternatives:
  - of our Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' This preserves both
    the title's christological weight and standard NT usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is rendered 'Messiah' where it functions
    as a title rather than a name-like fixed surname. In this formal designation following
    'our Lord,' the titular sense remains clear, so 'Jesus Messiah' best preserves
    meaning.
