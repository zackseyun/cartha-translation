theological_decisions:
- issue: Corporate deliberative tone of the Jerusalem letter
  chosen_reading: The verse is rendered as a communal judgment ('it seemed good to
    us') rather than a stronger authoritative formula.
  alternative_readings:
  - it was our decision
  - we decided
  rationale: The Greek δοκέω construction communicates collective approval/judgment.
    A more forceful rendering could imply a level of command not explicit in this
    clause. The chosen wording preserves the text's tone while remaining natural English.
  doctrine_reference: 'Translation philosophy: preserve what the source text says
    without importing doctrinal claims.'
