id: ACT.15.14
reference: Acts 15:14
source:
  edition: SBLGNT
  text: Συμεὼν ἐξηγήσατο καθὼς πρῶτον ὁ θεὸς ἐπεσκέψατο λαβεῖν ἐξ ἐθνῶν ⸀λαὸν τῷ ὀνόματι
    αὐτοῦ.
translation:
  text: Simeon has recounted how God first visited the Gentiles to take from them
    a people for his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Simon.' James uses the form 'Simeon' here.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among the nations.'
    reason: lexical_alternative
  - marker: c
    text: That is, a people belonging to him, identified with his name.
    reason: cultural_note
lexical_decisions:
- source_word: Συμεὼν
  chosen: Simeon
  alternatives:
  - Simon
  lexicon: BDAG
  rationale: Transliterated as the Greek form 'Simeon,' which James uses here, rather
    than harmonizing to the more familiar 'Simon.' This preserves the distinct form
    present in the source text.
- source_word: ἐξηγήσατο
  chosen: has recounted
  alternatives:
  - has explained
  - has related
  - has described
  lexicon: BDAG
  rationale: The verb denotes narrating or setting forth an account. 'Has recounted'
    fits the aorist in discourse summary and communicates that Simeon has just given
    an account to the assembly.
- source_word: καθὼς
  chosen: how
  alternatives:
  - that
  - in what way
  lexicon: BDAG
  rationale: In this construction after a verb of recounting, καθώς introduces the
    content of the report. 'How' is idiomatic English and preserves the sense of manner/content.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - for the first time
  - at first
  lexicon: BDAG
  rationale: Placed with God's action toward the Gentiles, it marks the initial stage
    of this divine visitation. 'First' is concise and natural.
- source_word: ἐπεσκέψατο
  chosen: visited
  alternatives:
  - looked upon
  - came to help
  - turned his attention to
  lexicon: BDAG
  rationale: The verb often carries the sense of visiting with concern or purposeful
    intervention. 'Visited' preserves the biblical idiom and leaves intact the theological
    nuance of gracious divine attention without over-paraphrasing.
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to receive
  - to gather
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: God visited in order ''to take'' a
    people. ''Take'' is the most direct rendering of λαβεῖν and avoids importing interpretive
    language.'
- source_word: ἐξ ἐθνῶν
  chosen: from the Gentiles
  alternatives:
  - from among the Gentiles
  - out of the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη commonly refers to non-Jews, so 'Gentiles' is the clearest
    contextual rendering. 'From the Gentiles' is slightly more formal than 'from among'
    but remains natural.
- source_word: λαὸν
  chosen: a people
  alternatives:
  - a people-group
  lexicon: BDAG
  rationale: λαός here refers to a covenantally identified people. 'A people' preserves
    the biblical-theological resonance without narrowing it to ethnicity.
- source_word: τῷ ὀνόματι αὐτοῦ
  chosen: for his name
  alternatives:
  - for himself
  - bearing his name
  - for the honor of his name
  lexicon: BDAG
  rationale: The dative construction is idiomatically rendered 'for his name,' echoing
    biblical covenant language about a people belonging to God. This preserves the
    source wording and theological texture better than smoothing to 'for himself.'
