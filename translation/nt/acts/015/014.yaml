theological_decisions:
- issue: Whether to render ἐξ ἐθνῶν as 'Gentiles' or 'nations'
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In the immediate context of Acts 15, the issue is the inclusion of non-Jews
    in the people of God. Rendering ἔθνη as 'Gentiles' makes that referent explicit
    in natural English while preserving the Jew/Gentile contrast central to the passage.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether τῷ ὀνόματι αὐτοῦ should be paraphrased as 'for himself'
  chosen_reading: for his name
  alternative_readings:
  - for himself
  rationale: The phrase is theologically weighty covenant language. Preserving 'for
    his name' maintains the biblical idiom and avoids resolving the expression into
    a flatter paraphrase.
  doctrine_reference: Translation philosophy §1, §3
