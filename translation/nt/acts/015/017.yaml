id: ACT.15.17
reference: Acts 15:17
source:
  edition: SBLGNT
  text: ὅπως ἂν ἐκζητήσωσιν οἱ κατάλοιποι τῶν ἀνθρώπων τὸν κύριον, καὶ πάντα τὰ ἔθνη
    ἐφ’ οὓς ἐπικέκληται τὸ ὄνομά μου ἐπ’ αὐτούς, λέγει ⸀κύριος ποιῶν ⸀ταῦτα
translation:
  text: so that the remnant of mankind may seek the Lord, even all the Gentiles on
    whom my name has been called, says the Lord, who does these things
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the nations.' The Greek ἔθνη can mean either 'Gentiles' or 'nations';
      here 'Gentiles' is chosen because the Jerusalem Council is addressing the inclusion
      of non-Jews.
    reason: alternative_reading
  - marker: b
    text: Or 'who are called by my name.' The Greek idiom literally reads 'on whom
      my name has been called.'
    reason: lexical_alternative
  - marker: c
    text: This line echoes Amos 9:12 in a form reflected in the Greek Scriptures,
      where the emphasis falls on the nations/Gentiles bearing the Lord's name.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπως ἂν
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result with the subjunctive. 'So that' is natural
    modern English and preserves the clause's telic force without sounding wooden.
- source_word: ἐκζητήσωσιν
  chosen: may seek
  alternatives:
  - might seek
  - may diligently seek
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅπως ἄν expresses intended result. The compound
    can intensify 'seek,' but in context 'may seek' is sufficiently idiomatic; the
    stronger nuance is not pressed in the main text to avoid overtranslation.
- source_word: οἱ κατάλοιποι τῶν ἀνθρώπων
  chosen: the remnant of mankind
  alternatives:
  - the rest of humanity
  - the remnant of men
  lexicon: BDAG
  rationale: κατάλοιποι denotes those left remaining, hence 'remnant.' τῶν ἀνθρώπων
    is generic for humanity, so 'mankind' preserves the representative human sense
    better than the potentially male-specific 'men.' 'Remnant' also echoes the prophetic
    citation background.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default 'Lord.' The article is retained
    in idiomatic English as 'the Lord' in this citation context.
- source_word: πάντα τὰ ἔθνη
  chosen: all the Gentiles
  alternatives:
  - all the nations
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In Acts 15 the issue is the inclusion
    of non-Jews, so 'Gentiles' best conveys the contextual force. The alternative
    'nations' is preserved in a footnote because of the prophetic and intertextual
    background.
- source_word: ἐφ’ οὓς ἐπικέκληται τὸ ὄνομά μου ἐπ’ αὐτούς
  chosen: on whom my name has been called
  alternatives:
  - who are called by my name
  - upon whom my name has been invoked
  lexicon: BDAG
  rationale: The perfect passive idiom denotes belonging/identification by the divine
    name. 'On whom my name has been called' stays close to the Greek and preserves
    the covenantal resonance. A more idiomatic English alternative is worth preserving
    in a footnote.
- source_word: λέγει κύριος
  chosen: says the Lord
  alternatives:
  - the Lord says
  lexicon: BDAG
  rationale: Standard prophetic citation formula. Present tense is retained for vivid
    scriptural speech.
- source_word: ποιῶν ταῦτα
  chosen: who does these things
  alternatives:
  - doing these things
  - who makes these things happen
  lexicon: BDAG
  rationale: The participle modifies 'the Lord.' 'Who does these things' is clear,
    natural, and preserves the ongoing divine agency expressed by the present participle.
