theological_decisions:
- issue: Rendering ἔθνη in a context of Jew-Gentile inclusion
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The immediate context of the Jerusalem Council concerns the inclusion
    of non-Jews among the people of God, so 'Gentiles' best communicates Luke's application
    of the Amos citation. Because the prophetic source also carries the broader sense
    'nations,' that alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic ανθρωποι language
  chosen_reading: mankind
  alternative_readings:
  - humanity
  - men
  rationale: The phrase is generic, not male-specific. 'Mankind' preserves the collective
    human reference while remaining gender-accurate to the source's intent, in line
    with the project's policy.
  doctrine_reference: Translation philosophy §4
