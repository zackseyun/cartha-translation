id: ACT.15.22
reference: Acts 15:22
source:
  edition: SBLGNT
  text: Τότε ἔδοξε τοῖς ἀποστόλοις καὶ τοῖς πρεσβυτέροις σὺν ὅλῃ τῇ ἐκκλησίᾳ ἐκλεξαμένους
    ἄνδρας ἐξ αὐτῶν πέμψαι εἰς Ἀντιόχειαν σὺν ⸀τῷ Παύλῳ καὶ Βαρναβᾷ, Ἰούδαν τὸν ⸀καλούμενον
    Βαρσαββᾶν καὶ Σιλᾶν, ἄνδρας ἡγουμένους ἐν τοῖς ἀδελφοῖς,
translation:
  text: 'Then it seemed good to the apostles and the elders, together with the whole
    church, to choose men from among them and send them to Antioch with Paul and Barnabas:
    Judas, who was called Barsabbas, and Silas, men who were leading among the brothers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men who were leaders among the brothers.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here likely refers to the community of believers more broadly,
      including women.'
    reason: cultural_note
lexical_decisions:
- source_word: ἔδοξε
  chosen: it seemed good
  alternatives:
  - it was decided
  - it pleased
  lexicon: BDAG
  rationale: Common idiomatic rendering for δοκέω in deliberative contexts, preserving
    the sense of a collective judgment without overstating it as a formal decree.
- source_word: πρεσβυτέροις
  chosen: elders
  alternatives:
  - presbyters
  lexicon: BDAG
  rationale: Standard and readable rendering in church-governance contexts; 'presbyters'
    is more technical and less natural in modern English.
- source_word: σὺν ὅλῃ τῇ ἐκκλησίᾳ
  chosen: together with the whole church
  alternatives:
  - with the whole assembly
  - along with the entire church
  lexicon: BDAG
  rationale: ἐκκλησία here refers to the gathered Christian community in Jerusalem.
    'Church' fits Luke-Acts usage and preserves the communal participation indicated
    by σύν.
- source_word: ἐκλεξαμένους ἄνδρας
  chosen: to choose men
  alternatives:
  - having chosen men
  - to select men
  lexicon: BDAG
  rationale: The participle is complementary to πέμψαι in sense; English smooths this
    as an infinitival idea. 'Men' is retained because ἄνδρας is specifically masculine,
    in line with the gender-accurate policy.
- source_word: ἐξ αὐτῶν
  chosen: from among them
  alternatives:
  - from their own number
  - out of them
  lexicon: BDAG
  rationale: Clarifies that the chosen delegates came from within the Jerusalem body.
- source_word: πέμψαι
  chosen: send
  alternatives:
  - dispatch
  lexicon: BDAG
  rationale: Natural modern English for the infinitive of purpose/result in this context.
- source_word: σὺν τῷ Παύλῳ καὶ Βαρναβᾷ
  chosen: with Paul and Barnabas
  alternatives:
  - along with Paul and Barnabas
  lexicon: BDAG
  rationale: Straightforward accompaniment sense of σύν.
- source_word: καλούμενον
  chosen: who was called
  alternatives:
  - called
  - known as
  lexicon: BDAG
  rationale: This preserves the descriptive force of the participle while reading
    naturally in English prose.
- source_word: ἄνδρας ἡγουμένους ἐν τοῖς ἀδελφοῖς
  chosen: men who were leading among the brothers
  alternatives:
  - men who were leaders among the brothers
  - leading men among the brothers
  lexicon: BDAG
  rationale: ἡγουμένους denotes those exercising recognized leadership. 'Leading among'
    preserves the participial nuance without making it sound like a formal office
    title. 'Brothers' is retained for ἀδελφοῖς per gender-accurate policy, while a
    footnote can preserve the inclusive sense of the community context.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - believers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in early Christian usage
    often refers to fellow believers collectively. Per doctrine, the main text remains
    gender-accurate rather than gender-neutral, with inclusivity noted in a footnote.
