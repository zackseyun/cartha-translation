theological_decisions:
- issue: Extent of congregational participation in the decision
  chosen_reading: The wording includes the whole church alongside the apostles and
    elders in approving the selection and sending of delegates.
  alternative_readings:
  - Only the apostles and elders formally decided, while the church was merely present
  rationale: The phrase σὺν ὅλῃ τῇ ἐκκλησίᾳ most naturally includes the whole church
    in the action described by ἔδοξε and the subsequent choosing/sending. The translation
    preserves this without importing a specific polity model beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Rendering of ἀδελφοῖς
  chosen_reading: brothers in the main text, with inclusive sense preserved in a footnote
  alternative_readings:
  - brothers and sisters
  - members
  rationale: The source is masculine plural and likely representative of the believing
    community. Per doctrine, masculine forms with representative force are not flattened
    in the main text, but contextual inclusivity may be annotated.
  doctrine_reference: Translation philosophy §4
