id: ACT.15.19
reference: Acts 15:19
source:
  edition: SBLGNT
  text: διὸ ἐγὼ κρίνω μὴ παρενοχλεῖν τοῖς ἀπὸ τῶν ἐθνῶν ἐπιστρέφουσιν ἐπὶ τὸν θεόν,
translation:
  text: Therefore I judge that we should not trouble those from the Gentiles who are
    turning to God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those from among the nations.' The Greek term can mean 'nations,' but
      here refers to Gentiles turning to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'I conclude that we are not to trouble' or 'it is my judgment not to
      trouble.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument in James's speech. 'Therefore'
    is natural English and preserves the logical force.
- source_word: ἐγὼ κρίνω
  chosen: I judge that
  alternatives:
  - I conclude that
  - it is my judgment that
  lexicon: BDAG
  rationale: κρίνω here expresses James's considered judgment or decision. 'I judge
    that' keeps the first-person explicit ἐγώ and remains close to the Greek without
    sounding overly formal.
- source_word: μὴ παρενοχλεῖν
  chosen: we should not trouble
  alternatives:
  - not to trouble
  - not to harass
  - not to cause difficulties for
  lexicon: BDAG
  rationale: The infinitive with μή depends on κρίνω and expresses the content of
    the judgment. παρενοχλέω conveys causing difficulty or disturbance. 'We should
    not trouble' gives idiomatic English for the deliberative sense in context, where
    James is proposing a communal decision.
- source_word: τοῖς ἀπὸ τῶν ἐθνῶν
  chosen: those from the Gentiles
  alternatives:
  - those from among the Gentiles
  - the Gentiles
  lexicon: BDAG
  rationale: The phrase refers specifically to persons originating from the nations/Gentiles,
    not Gentiles as an abstract category. 'Those from the Gentiles' preserves the
    personal reference and the prepositional nuance.
- source_word: ἐθνῶν
  chosen: Gentiles
  alternatives:
  - nations
  lexicon: BDAG
  rationale: In this Jewish-Christian context, ἔθνη refers to non-Jewish peoples.
    'Gentiles' is the standard contextual rendering and is clearer than the more literal
    'nations' here.
- source_word: ἐπιστρέφουσιν
  chosen: are turning
  alternatives:
  - turn
  - are converting
  - are returning
  lexicon: BDAG
  rationale: Present participle indicates an ongoing movement toward God. 'Are turning'
    preserves the verbal imagery of conversion without importing later technical terminology.
- source_word: ἐπὶ τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: With ἐπιστρέφω, the phrase denotes direction toward God in repentance/conversion.
    'To God' is idiomatic and sufficiently precise.
