theological_decisions:
- issue: Whether to render the verse as James's personal opinion only or as a proposed
    communal judgment
  chosen_reading: 'James states his own judgment in a form that implies a recommendation
    for the assembly: ''I judge that we should not trouble...''.'
  alternative_readings:
  - I judge not to trouble...
  - it is my judgment that they should not be troubled
  rationale: The Greek explicitly has first-person singular κρίνω, but the infinitive
    clause functions as the content of a decision affecting the group. Rendering with
    'we should not trouble' preserves James's personal voice while making the practical
    force clear in English.
  doctrine_reference: Translation philosophy §1, §6
