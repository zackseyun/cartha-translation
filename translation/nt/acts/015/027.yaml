id: ACT.15.27
reference: Acts 15:27
source:
  edition: SBLGNT
  text: ἀπεστάλκαμεν οὖν Ἰούδαν καὶ Σιλᾶν, καὶ αὐτοὺς διὰ λόγου ἀπαγγέλλοντας τὰ αὐτά.
translation:
  text: Therefore we have sent Judas and Silas, and they themselves will report the
    same things by word of mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we sent Judas and Silas'; the Greek perfect may be rendered as a simple
      past in English, but 'have sent' better preserves the present relevance of the
      action.
    reason: lexical_alternative
  - marker: b
    text: Literally 'through word'; that is, by spoken communication in addition to
      the letter.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεστάλκαμεν
  chosen: we have sent
  alternatives:
  - we sent
  lexicon: BDAG
  rationale: Perfect tense in Greek naturally conveys a present state resulting from
    the sending; 'we have sent' preserves that nuance better than a simple past, while
    remaining natural English in epistolary context.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference or conclusion from the preceding decision of the council.
    'Therefore' preserves the logical connection more explicitly than 'so' or 'then'.
- source_word: Ἰούδαν καὶ Σιλᾶν
  chosen: Judas and Silas
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: αὐτοὺς
  chosen: they themselves
  alternatives:
  - they
  - these men themselves
  lexicon: BDAG
  rationale: The pronoun is explicitly present and somewhat emphatic in context, distinguishing
    the messengers as personal confirmers of the letter's contents. 'They themselves'
    brings out that emphasis.
- source_word: διὰ λόγου
  chosen: by word of mouth
  alternatives:
  - by word
  - orally
  - in person
  lexicon: BDAG
  rationale: The phrase contrasts spoken communication with the written letter just
    mentioned. 'By word of mouth' is idiomatic modern English that preserves the oral
    sense without sounding wooden.
- source_word: ἀπαγγέλλοντας
  chosen: will report
  alternatives:
  - reporting
  - will tell
  - will announce
  lexicon: BDAG
  rationale: Although formally a present participle, in this construction it functions
    to describe what Judas and Silas will do as the purpose/result of being sent.
    English finite future wording is clearer and more natural than a bare participial
    rendering.
- source_word: τὰ αὐτά
  chosen: the same things
  alternatives:
  - these same things
  - the same message
  lexicon: BDAG
  rationale: Refers to the contents of the council's written communication. 'The same
    things' is the most direct rendering; 'message' would be interpretive.
