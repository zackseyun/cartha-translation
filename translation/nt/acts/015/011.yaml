theological_decisions:
- issue: Direction of comparison in Peter's statement
  chosen_reading: The main text preserves the Greek emphasis that 'we' (Jewish believers)
    are saved in the same way as 'they also' (Gentiles), not vice versa.
  alternative_readings:
  - We believe that they will be saved just as we will
  rationale: 'The Greek wording places ''we believe'' first and compares Jewish salvation
    to Gentile salvation. This is theologically significant in context: Gentiles are
    not required to become Jews; rather, Jews and Gentiles alike are saved by the
    same grace.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of salvation by grace
  chosen_reading: The verse is rendered to state salvation comes through the grace
    of the Lord Jesus, without importing later denominational formulations about faith,
    works, or ordo salutis.
  alternative_readings:
  - Expanded paraphrases such as 'saved by grace alone through faith alone'
  rationale: The text explicitly mentions grace and belief, but the translation should
    not add doctrinal formulae not stated in the verse. This preserves historic orthodoxy
    while avoiding sectarian overstatement.
  doctrine_reference: Affirmations; Translation philosophy §3
