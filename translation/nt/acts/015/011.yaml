id: ACT.15.11
reference: Acts 15:11
source:
  edition: SBLGNT
  text: ἀλλὰ διὰ τῆς χάριτος τοῦ κυρίου Ἰησοῦ πιστεύομεν σωθῆναι καθ’ ὃν τρόπον κἀκεῖνοι.
translation:
  text: But through the grace of the Lord Jesus we believe that we will be saved,
    in the same way as they also will.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'we believe to be saved through the grace of the Lord
      Jesus, in the same way as those also.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Rather
  - On the contrary
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding claim that neither the fathers
    nor the present generation could bear the yoke; 'But' is natural English and preserves
    the adversative force.
- source_word: διὰ τῆς χάριτος
  chosen: through the grace
  alternatives:
  - by the grace
  - through grace
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through
    the grace' preserves the mediating sense and the article-noun construction.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: 'Standard theological sense here: divine grace as the basis/means of
    salvation. ''Grace'' is both accurate and idiomatic.'
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - of Lord Jesus
  lexicon: BDAG
  rationale: 'κύριος is rendered by the doctrinal default ''Lord.'' The genitive most
    naturally modifies ''grace'': the grace belonging to or given by the Lord Jesus.'
- source_word: πιστεύομεν
  chosen: we believe
  alternatives:
  - we trust
  - we believe/are convinced
  lexicon: BDAG
  rationale: Default rendering of πιστεύω is 'believe.' Here it introduces the content
    clause with infinitive, expressing confident conviction.
- source_word: σωθῆναι
  chosen: that we will be saved
  alternatives:
  - to be saved
  - that we are to be saved
  lexicon: BDAG
  rationale: Aorist passive infinitive after πιστεύομεν can be rendered more idiomatically
    in English as a finite clause, 'that we will be saved.' This communicates the
    expected future salvation without awkwardness.
- source_word: καθ’ ὃν τρόπον
  chosen: in the same way as
  alternatives:
  - just as
  - according to the manner in which
  lexicon: BDAG
  rationale: This idiom expresses manner/comparison. 'In the same way as' makes explicit
    the comparative force in clear modern English.
- source_word: κἀκεῖνοι
  chosen: they also will
  alternatives:
  - they also
  - those also
  lexicon: BDAG
  rationale: 'κἀκεῖνοι = καὶ ἐκεῖνοι, ''they also.'' English supplies ''will'' to
    match the future sense already implied by σωθῆναι and to complete the comparison
    naturally: Jews are saved in the same way as Gentiles also will be.'
