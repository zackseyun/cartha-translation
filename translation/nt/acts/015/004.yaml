theological_decisions:
- issue: Agency in God's work described by μετ’ αὐτῶν
  chosen_reading: God had done with them
  alternative_readings:
  - God had done through them
  - God had done among them
  rationale: 'The Greek phrase is somewhat open-textured. Rendering it ''with them''
    preserves the wording''s theological restraint: God is the primary actor, while
    Paul and Barnabas are associated with his work. This avoids overstating either
    human instrumentality or the location of the activity.'
  doctrine_reference: Preserve theological tension rather than resolve it.
