id: ACT.15.4
reference: Acts 15:4
source:
  edition: SBLGNT
  text: παραγενόμενοι δὲ εἰς ⸀Ἱεροσόλυμα ⸀παρεδέχθησαν ⸀ἀπὸ τῆς ἐκκλησίας καὶ τῶν
    ἀποστόλων καὶ τῶν πρεσβυτέρων, ἀνήγγειλάν τε ὅσα ὁ θεὸς ἐποίησεν μετ’ αὐτῶν.
translation:
  text: When they arrived in Jerusalem, they were welcomed by the church and the apostles
    and the elders, and they reported all that God had done with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God had done through them' or 'God had done among them.' The Greek says
      'with them.'
    reason: alternative_reading
lexical_decisions:
- source_word: παραγενόμενοι
  chosen: when they arrived
  alternatives:
  - having arrived
  - after they came
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verbs.
    'When they arrived' gives natural English while preserving the temporal force.
- source_word: δὲ
  chosen: when
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective. Its discourse role is absorbed
    into the temporal participial construction in English rather than translated with
    a separate conjunction.
- source_word: εἰς Ἱεροσόλυμα
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: BDAG
  rationale: With a verb of arrival, idiomatic English prefers 'arrived in Jerusalem,'
    though the Greek preposition literally marks motion toward the city.
- source_word: παρεδέχθησαν
  chosen: they were welcomed
  alternatives:
  - they were received
  - they were accepted
  lexicon: BDAG
  rationale: Passive of παραδέχομαι here denotes being received hospitably by the
    Jerusalem believers. 'Welcomed' is more natural modern English than 'received'
    while preserving the sense.
- source_word: ἀπὸ τῆς ἐκκλησίας καὶ τῶν ἀποστόλων καὶ τῶν πρεσβυτέρων
  chosen: by the church and the apostles and the elders
  alternatives:
  - from the church and the apostles and the elders
  lexicon: BDAG
  rationale: Although ἀπό commonly means 'from,' with a passive verb of reception
    it can mark personal agency/source. 'By' communicates the sense clearly in English.
    'Church' renders ἐκκλησία in its ordinary assembly/community sense here.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: In Acts this term commonly refers to the gathered Christian community.
    'Church' is the most idiomatic and contextually appropriate rendering.
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - older men
  - presbyters
  lexicon: BDAG
  rationale: In this ecclesial context the term denotes recognized leaders, not merely
    older males. 'Elders' preserves the institutional sense without importing denominational
    terminology.
- source_word: ἀνήγγειλάν τε
  chosen: and they reported
  alternatives:
  - and they announced
  - and they told
  lexicon: BDAG
  rationale: The verb means to report or relate information. 'Reported' fits the formal
    account given to the Jerusalem leadership and community. τε is represented by
    the coordinating 'and' linking this clause to the previous one.
- source_word: ὅσα
  chosen: all that
  alternatives:
  - the things that
  - everything that
  lexicon: BDAG
  rationale: This relative pronoun introduces the content of the report. 'All that'
    is concise and natural.
- source_word: ὁ θεὸς ἐποίησεν
  chosen: God had done
  alternatives:
  - God did
  - God had accomplished
  lexicon: BDAG
  rationale: The aorist is rendered with English past perfect because it refers to
    actions completed prior to the reporting event. 'Done' is broad enough to match
    ποιέω.
- source_word: μετ’ αὐτῶν
  chosen: with them
  alternatives:
  - through them
  - among them
  lexicon: BDAG
  rationale: μετά with genitive normally means 'with.' In Acts this can imply God's
    activity in association with his messengers. 'With them' preserves the Greek wording
    and avoids over-interpreting it as exclusively instrumental ('through them') or
    locative ('among them').
