id: ACT.15.33
reference: Acts 15:33
source:
  edition: SBLGNT
  text: ποιήσαντες δὲ χρόνον ἀπελύθησαν μετ’ εἰρήνης ἀπὸ τῶν ἀδελφῶν πρὸς τοὺς ⸂ἀποστείλαντας
    αὐτούς⸃.
translation:
  text: And after spending some time there, they were sent off in peace from the brothers
    to those who had sent them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the brothers and sisters'; the Greek says 'brothers,' but in this
      context it likely refers to the believing community inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσαντες ... χρόνον
  chosen: after spending some time there
  alternatives:
  - having spent some time
  - after staying for a time
  lexicon: BDAG
  rationale: The participial idiom literally means 'having made time,' a natural Greek
    expression for spending or staying for a period. English requires an idiomatic
    rendering. 'There' is supplied for naturalness from the context of their stay
    in Antioch, though not explicit in the Greek.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is the most natural unobtrusive English equivalent.
- source_word: ἀπελύθησαν
  chosen: they were sent off
  alternatives:
  - they were dismissed
  - they were released
  lexicon: BDAG
  rationale: In this context of delegates departing with the community's blessing,
    'sent off' better captures the courteous, communal leave-taking than the more
    formal 'dismissed' or the misleadingly restrictive 'released'.
- source_word: μετ’ εἰρήνης
  chosen: in peace
  alternatives:
  - with peace
  - with a blessing of peace
  lexicon: BDAG
  rationale: This is a conventional expression for departing in peace or with goodwill.
    'In peace' is idiomatic English and preserves the sense of peaceful blessing.
- source_word: ἀπὸ τῶν ἀδελφῶν
  chosen: from the brothers
  alternatives:
  - from the brothers and sisters
  - from the believers
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural 'brothers,' but in Acts it often
    refers to the believing community inclusively. Per translation philosophy, the
    main text remains gender-accurate to the source form, while an inclusive sense
    can be noted in a footnote.
- source_word: πρὸς τοὺς ἀποστείλαντας αὐτούς
  chosen: to those who had sent them
  alternatives:
  - to the ones who sent them
  - back to those who had sent them
  lexicon: BDAG
  rationale: The articular participle denotes the people who commissioned them. 'Had
    sent' reflects prior action relative to the departure. 'Back' is contextually
    true but not explicit, so it is omitted from the main text.
