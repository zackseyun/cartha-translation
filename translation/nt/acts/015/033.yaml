theological_decisions:
- issue: Inclusive force of ἀδελφοί
  chosen_reading: from the brothers
  alternative_readings:
  - from the brothers and sisters
  - from the believers
  rationale: No doctrinal issue is at stake, but the translation philosophy requires
    gender-accurate rendering where the Greek is grammatically masculine and likely
    representative. Therefore 'brothers' is retained in the main text, with the inclusive
    communal sense preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
