id: ACT.15.10
reference: Acts 15:10
source:
  edition: SBLGNT
  text: νῦν οὖν τί πειράζετε τὸν θεόν, ἐπιθεῖναι ζυγὸν ἐπὶ τὸν τράχηλον τῶν μαθητῶν
    ὃν οὔτε οἱ πατέρες ἡμῶν οὔτε ἡμεῖς ἰσχύσαμεν βαστάσαι;
translation:
  text: Now then, why are you testing God by putting a yoke on the neck of the disciples
    that neither our fathers nor we have been able to bear?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'why do you put God to the test.'
    reason: lexical_alternative
  - marker: b
    text: The 'yoke' is a metaphor for an imposed obligation; in context, it refers
      to requirements being placed on the disciples.
    reason: cultural_note
  - marker: c
    text: Or, 'neither our ancestors nor we.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν οὖν
  chosen: Now then
  alternatives:
  - Now therefore
  - So now
  lexicon: BDAG
  rationale: Captures the inferential and transitional force of the pair in natural
    modern English without sounding archaic.
- source_word: τί πειράζετε τὸν θεόν
  chosen: why are you testing God
  alternatives:
  - why do you put God to the test
  - why are you trying God
  lexicon: BDAG
  rationale: The idiom with πειράζω + object means to test or put to the test. 'Testing
    God' is concise and natural; 'why' reflects τί in this rhetorical question context.
- source_word: ἐπιθεῖναι
  chosen: by putting
  alternatives:
  - to place
  - to impose
  lexicon: BDAG
  rationale: The aorist infinitive explains the manner/content of the testing. 'By
    putting' expresses the infinitival relation smoothly in English.
- source_word: ζυγὸν
  chosen: a yoke
  alternatives:
  - an obligation
  - a burden
  lexicon: BDAG
  rationale: The metaphor of a yoke should be preserved rather than interpreted away,
    since it is central to the image of imposed obligation.
- source_word: ἐπὶ τὸν τράχηλον
  chosen: on the neck
  alternatives:
  - upon the neck
  lexicon: BDAG
  rationale: A direct, literal rendering preserves the vivid metaphor and reads naturally
    in English.
- source_word: τῶν μαθητῶν
  chosen: of the disciples
  alternatives:
  - of the learners
  - of these disciples
  lexicon: BDAG
  rationale: μαθητής is consistently rendered 'disciple' in Acts; no contextual reason
    demands variation here.
- source_word: ὃν
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: Refers back to 'yoke'; 'that' is the most natural restrictive relative
    in contemporary English.
- source_word: οὔτε οἱ πατέρες ἡμῶν οὔτε ἡμεῖς
  chosen: neither our fathers nor we
  alternatives:
  - neither our ancestors nor we
  - neither our forefathers nor we
  lexicon: BDAG
  rationale: '''Fathers'' is a gender-accurate rendering of πατέρες and fits the historical
    reference to prior generations of Israel. ''Ancestors'' is possible but less literal;
    no footnote judged necessary because the referent is specifically the forefathers.'
- source_word: ἰσχύσαμεν
  chosen: have been able
  alternatives:
  - were strong enough
  - had the strength
  lexicon: BDAG
  rationale: Idiomatic English for ἰσχύω with infinitive, expressing capability rather
    than physical strength.
- source_word: βαστάσαι
  chosen: to bear
  alternatives:
  - to carry
  - to endure
  lexicon: BDAG
  rationale: With 'yoke,' 'bear' is the most natural collocation in English and preserves
    the metaphor of carrying an imposed load.
