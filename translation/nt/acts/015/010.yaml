theological_decisions:
- issue: Nature of the 'yoke' metaphor
  chosen_reading: Retained as a metaphor for the imposed obligation being placed on
    Gentile believers, without specifying more than the verse itself states.
  alternative_readings:
  - Interpreting the yoke specifically as the Mosaic law as a whole
  - Interpreting it more narrowly as circumcision and associated requirements
  rationale: The immediate context concerns demands placed on Gentile believers, but
    this verse itself speaks metaphorically. The translation preserves the image and
    avoids importing a narrower doctrinal interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
