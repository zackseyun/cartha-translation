  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the project's gender-accurate policy, the masculine plural
    is retained in the main text. Since the referent likely includes the whole believing
    community, the inclusive sense is noted in a footnote rather than replacing the
    lexical form.
