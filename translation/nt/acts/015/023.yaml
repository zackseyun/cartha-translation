id: ACT.15.23
reference: Acts 15:23
source:
  edition: SBLGNT
  text: γράψαντες διὰ χειρὸς ⸀αὐτῶν· Οἱ ἀπόστολοι καὶ οἱ ⸀πρεσβύτεροι ἀδελφοὶ τοῖς
    κατὰ τὴν Ἀντιόχειαν καὶ Συρίαν καὶ Κιλικίαν ἀδελφοῖς τοῖς ἐξ ἐθνῶν χαίρειν.
translation:
  text: 'Having written by their hand: “The apostles and the elder brothers, to the
    brothers from among the Gentiles in Antioch and Syria and Cilicia, greetings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'sent through them' or 'by them'; Greek literally,
      'by their hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the elders, brothers'; many translations take this as 'the apostles
      and the elders, brothers,' while the Greek most naturally reads 'the elder brothers.'
    reason: alternative_reading
  - marker: c
    text: '''Brothers'' here may refer inclusively to fellow believers, that is, the
      whole community including women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γράψαντες
  chosen: Having written
  alternatives:
  - after writing
  - writing
  lexicon: BDAG
  rationale: Aorist participle introducing the act of composing the letter. 'Having
    written' preserves the participial, antecedent sense without over-paraphrasing.
- source_word: διὰ χειρὸς αὐτῶν
  chosen: by their hand
  alternatives:
  - by them
  - through them
  lexicon: BDAG
  rationale: This idiom commonly means delivery or agency 'through/by the hand of.'
    Here it introduces the letter as sent via the named delegates. 'By their hand'
    keeps the Greek idiom transparent; the more idiomatic English alternative is preserved
    in a footnote.
- source_word: ἀπόστολοι
  chosen: apostles
  lexicon: BDAG
  rationale: Standard rendering for the recognized emissary-leaders in Jerusalem;
    no contextual reason to vary.
- source_word: πρεσβύτεροι ἀδελφοὶ
  chosen: the elder brothers
  alternatives:
  - the elders, brothers
  - the elders and brothers
  lexicon: BDAG
  rationale: The Greek lacks a second article before ἀδελφοί, making it most naturally
    appositional to πρεσβύτεροι rather than a separate third group. 'Elder brothers'
    preserves the syntax and avoids importing an additional coordinate group. Because
    English readers may hear this awkwardly, the common alternative is preserved in
    a footnote.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate rendering is preferred. The masculine plural
    reflects the source wording; in this epistolary context it likely addresses the
    Christian community inclusively, so an explanatory footnote preserves that nuance
    without replacing the lexical form.
- source_word: τοῖς ἐξ ἐθνῶν
  chosen: from among the Gentiles
  alternatives:
  - of the Gentiles
  - who are Gentiles
  lexicon: BDAG
  rationale: This phrase identifies the recipients' ethnic origin. 'From among the
    Gentiles' is a natural rendering of ἐξ + genitive and preserves the sense of people
    drawn out from the nations/Gentiles.
- source_word: χαίρειν
  chosen: greetings
  alternatives:
  - rejoice
  - greeting
  lexicon: BDAG
  rationale: In letter openings χαίρειν functions as the conventional epistolary salutation
    'greetings,' not an imperative command to rejoice.
- source_word: κατὰ τὴν Ἀντιόχειαν καὶ Συρίαν καὶ Κιλικίαν
  chosen: in Antioch and Syria and Cilicia
  alternatives:
  - throughout Antioch and Syria and Cilicia
  - according to Antioch and Syria and Cilicia
  lexicon: BDAG
  rationale: κατά with the accusative here marks distribution/location across the
    named regions. 'In' is the clearest natural English equivalent in this address
    formula.
