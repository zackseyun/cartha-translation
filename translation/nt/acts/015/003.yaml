id: ACT.15.3
reference: Acts 15:3
source:
  edition: SBLGNT
  text: οἱ μὲν οὖν προπεμφθέντες ὑπὸ τῆς ἐκκλησίας διήρχοντο τήν ⸀τε Φοινίκην καὶ
    Σαμάρειαν ἐκδιηγούμενοι τὴν ἐπιστροφὴν τῶν ἐθνῶν, καὶ ἐποίουν χαρὰν μεγάλην πᾶσι
    τοῖς ἀδελφοῖς.
translation:
  text: So then, having been sent on their way by the church, they passed through
    both Phoenicia and Samaria, describing in detail the conversion of the Gentiles,
    and they brought great joy to all the brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the turning of the Gentiles.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here likely refers to fellow believers generally, including
      women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προπεμφθέντες
  chosen: having been sent on their way
  alternatives:
  - having been escorted onward
  - having been sent forth
  lexicon: BDAG
  rationale: The participle from προπέμπω often carries the sense of being accompanied
    or helped onward for a journey, not merely 'sent.' 'Having been sent on their
    way' preserves the travel-related nuance in natural English without over-specifying
    escort details.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Acts this term ordinarily refers to the Christian community. 'Church'
    is the clearest contextual rendering in modern English.
- source_word: διήρχοντο
  chosen: they passed through
  alternatives:
  - they traveled through
  - they went through
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing travel through regions. 'Passed
    through' is idiomatic and fits the narrative flow.
- source_word: τε ... καὶ
  chosen: both ... and
  alternatives:
  - and ... and
  lexicon: Greek grammar
  rationale: The correlative construction links the two regions closely. 'Both ...
    and' brings out the force of τε ... καί in natural English.
- source_word: Φοινίκην
  chosen: Phoenicia
  alternatives:
  - Phenicia
  lexicon: BDAG
  rationale: Standard English transliteration of the region name.
- source_word: Σαμάρειαν
  chosen: Samaria
  lexicon: BDAG
  rationale: Standard English transliteration of the region name.
- source_word: ἐκδιηγούμενοι
  chosen: describing in detail
  alternatives:
  - reporting fully
  - recounting in detail
  - telling
  lexicon: BDAG
  rationale: The compound verb intensifies the act of narration. 'Describing in detail'
    reflects the fuller, thorough sense better than a simple 'telling.'
- source_word: ἐπιστροφὴν
  chosen: conversion
  alternatives:
  - turning
  - turning back
  lexicon: BDAG
  rationale: In this context the noun refers to the Gentiles' turning to God in response
    to the gospel. 'Conversion' communicates that religious turning clearly in contemporary
    English, while 'turning' is preserved as an alternative because it is more formally
    literal.
- source_word: τῶν ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Acts 15 the contrast is between Jewish believers and non-Jews entering
    the people of God. 'Gentiles' is the contextually appropriate rendering, though
    the more literal 'nations' remains a lexical alternative.
- source_word: ἐποίουν χαρὰν μεγάλην
  chosen: they brought great joy
  alternatives:
  - they caused great joy
  - they made great joy
  lexicon: BDAG
  rationale: The idiom ποιέω + noun is best rendered idiomatically in English. 'Brought
    great joy' preserves the causative sense naturally.
- source_word: ἀδελφοῖς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - fellow believers
  lexicon: BDAG
  rationale: Per the project's gender-accurate policy, the grammatically masculine
    plural is retained as 'brothers' in the main text. Because the referent likely
    includes the wider Christian community, an inclusive clarification is appropriate
    in a footnote rather than replacing the source-shaped term in the text.
