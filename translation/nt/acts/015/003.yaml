theological_decisions:
- issue: Rendering ἐπιστροφή in relation to Gentile inclusion
  chosen_reading: conversion
  alternative_readings:
  - turning
  rationale: The verse reports the Gentiles' turning to God as a result of the gospel
    mission. 'Conversion' communicates the religious and communal significance without
    importing a later technical doctrine beyond the text. The more literal 'turning'
    is preserved in a footnote as a lexical alternative.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering ἀδελφοί in a mixed-community context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The project specifies gender-accurate over gender-neutral renderings.
    Since ἀδελφοί often addresses mixed groups in early Christian contexts, the inclusive
    sense is preserved by footnote rather than by replacing the masculine form in
    the main text.
  doctrine_reference: Translation philosophy §4
