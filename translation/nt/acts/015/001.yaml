theological_decisions:
- issue: Meaning of σωθῆναι in the Jerusalem council controversy
  chosen_reading: be saved
  alternative_readings:
  - be delivered
  rationale: The context concerns the terms of inclusion among God's people and whether
    circumcision is necessary for salvation. Rendering as 'be saved' preserves the
    soteriological force of the dispute without importing a denominational framework.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Rendering ἀδελφοὺς with gender-accurate language
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: The Greek is masculine plural and likely refers representatively to the
    Christian community. Per doctrine, the main text should remain gender-accurate
    rather than gender-neutral, while contextual inclusivity may be preserved in a
    footnote.
  doctrine_reference: Translation philosophy §4
