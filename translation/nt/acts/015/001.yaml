id: ACT.15.1
reference: Acts 15:1
source:
  edition: SBLGNT
  text: Καί τινες κατελθόντες ἀπὸ τῆς Ἰουδαίας ἐδίδασκον τοὺς ἀδελφοὺς ὅτι Ἐὰν μὴ
    ⸀περιτμηθῆτε τῷ ἔθει ⸀τῷ Μωϋσέως, οὐ δύνασθε σωθῆναι.
translation:
  text: And some men came down from Judea and were teaching the brothers, “Unless
    you are circumcised according to the custom of Moses, you cannot be saved.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers' and likely refers
      to the believing community inclusively.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καί
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Standard connective introducing the next event in the narrative; 'And'
    preserves Luke's paratactic flow better than a more interpretive transition.
- source_word: τινες
  chosen: some men
  alternatives:
  - some people
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to specific persons. 'Some men' is natural
    English and reflects the masculine plural without overgeneralizing; 'certain ones'
    is too wooden.
- source_word: κατελθόντες
  chosen: came down
  alternatives:
  - having come down
  - went down
  lexicon: BDAG
  rationale: Aorist participle of motion from Judea to Antioch. In English narrative,
    'came down' is the most natural rendering; 'having come down' is overly formal,
    while 'went down' would shift deictic perspective.
- source_word: ἀπὸ τῆς Ἰουδαίας
  chosen: from Judea
  alternatives:
  - from Judaea
  lexicon: BDAG
  rationale: Geographical source phrase. 'Judea' is the standard modern English spelling.
- source_word: ἐδίδασκον
  chosen: were teaching
  alternatives:
  - taught
  - kept teaching
  lexicon: BDAG
  rationale: Imperfect verb indicates ongoing or repeated action. 'Were teaching'
    preserves the imperfective aspect without adding interpretive force.
- source_word: τοὺς ἀδελφοὺς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Per translation philosophy, gender-accurate over gender-neutral. In Acts
    this term often addresses the believing community inclusively, but the Greek is
    masculine plural; therefore 'the brothers' is retained, with inclusivity noted
    in a footnote.
- source_word: Ἐὰν μὴ
  chosen: Unless
  alternatives:
  - If not
  lexicon: BDAG
  rationale: Idiomatic English rendering of the conditional negative construction.
- source_word: περιτμηθῆτε
  chosen: you are circumcised
  alternatives:
  - you get circumcised
  lexicon: BDAG
  rationale: Aorist passive subjunctive in a general condition. 'Are circumcised'
    is idiomatic and sufficiently formal; 'get circumcised' is more colloquial.
- source_word: τῷ ἔθει τῷ Μωϋσέως
  chosen: according to the custom of Moses
  alternatives:
  - according to the custom handed down by Moses
  - by the custom of Moses
  - according to the Mosaic custom
  lexicon: BDAG
  rationale: ἔθος denotes custom or established practice. The dative phrase is best
    expressed with 'according to.' 'Of Moses' is retained rather than expanded interpretively
    to 'handed down by Moses,' though that sense may be implied.
- source_word: οὐ δύνασθε
  chosen: you cannot
  alternatives:
  - you are not able to
  lexicon: BDAG
  rationale: Natural English rendering of inability.
- source_word: σωθῆναι
  chosen: be saved
  alternatives:
  - be delivered
  lexicon: BDAG
  rationale: In this theological dispute context, σῴζω refers to salvation rather
    than mere rescue. 'Be saved' is the established and contextually precise rendering.
