id: ACT.15.39
reference: Acts 15:39
source:
  edition: SBLGNT
  text: ἐγένετο ⸀δὲ παροξυσμὸς ὥστε ἀποχωρισθῆναι αὐτοὺς ἀπ’ ἀλλήλων, τόν τε Βαρναβᾶν
    παραλαβόντα τὸν Μᾶρκον ἐκπλεῦσαι εἰς Κύπρον,
translation:
  text: And there arose such a sharp disagreement that they separated from one another,
    and Barnabas took Mark and sailed away to Cyprus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharp contention.' The Greek term can denote a strong provocation or
      intense clash.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: there arose
  alternatives:
  - there was
  - it happened
  lexicon: BDAG
  rationale: Idiomatic English rendering of γίνομαι introducing a new event/state.
    'There arose' preserves the narrative force better than the flatter 'there was.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective in narrative progression. 'And'
    is natural English and avoids overstating contrast.
- source_word: παροξυσμὸς
  chosen: sharp disagreement
  alternatives:
  - sharp contention
  - provocation
  - irritation
  lexicon: BDAG
  rationale: In this context the noun refers to an intense clash between Paul and
    Barnabas, not merely inward irritation. 'Sharp disagreement' is clear modern English
    and preserves the severity without archaic diction.
- source_word: ὥστε
  chosen: such ... that
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: The construction with ὥστε + infinitive expresses result. Rendering it
    as 'such ... that' communicates the degree-result relationship naturally in English.
- source_word: ἀποχωρισθῆναι
  chosen: they separated
  alternatives:
  - to separate
  - to part from each other
  lexicon: BDAG
  rationale: Although formally an infinitive dependent on ὥστε, English idiom prefers
    a finite clause after 'such ... that.' 'They separated' clearly conveys the resulting
    action.
- source_word: ἀπ’ ἀλλήλων
  chosen: from one another
  alternatives:
  - from each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering; 'from one another' is slightly more formal
    and fits the narrative register.
- source_word: τόν τε Βαρναβᾶν
  chosen: and Barnabas
  alternatives:
  - then Barnabas
  - Barnabas, for his part
  lexicon: BDAG
  rationale: τε marks the first member of the ensuing split action, completed in the
    next verse by Paul. In English this is best represented simply with 'and' here,
    while preserving the flow into v. 40.
- source_word: παραλαβόντα
  chosen: took
  alternatives:
  - having taken along
  - taking with him
  lexicon: BDAG
  rationale: The participle is attendant/circumstantial to the main action ἐκπλεῦσαι.
    'Took' is concise and natural, with the sense 'took along' understood from context.
- source_word: τὸν Μᾶρκον
  chosen: Mark
  alternatives:
  - John Mark
  lexicon: BDAG
  rationale: The Greek here reads simply 'Mark.' Although the broader context identifies
    him as John Mark, the translation should not import the fuller name into this
    verse.
- source_word: ἐκπλεῦσαι
  chosen: sailed away
  alternatives:
  - sailed
  - set sail
  lexicon: BDAG
  rationale: ἐκπλέω carries the sense of sailing out/departing by sea. 'Sailed away'
    preserves the outward/departure nuance better than bare 'sailed.'
- source_word: εἰς Κύπρον
  chosen: to Cyprus
  alternatives:
  - for Cyprus
  lexicon: BDAG
  rationale: Standard directional rendering of εἰς with destination.
