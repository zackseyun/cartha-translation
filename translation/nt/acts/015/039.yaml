theological_decisions:
- issue: Narrative portrayal of conflict between apostolic coworkers
  chosen_reading: Render the dispute in straightforward terms as a 'sharp disagreement'
    without softening or moralizing it.
  alternative_readings:
  - sharp contention
  - serious argument
  rationale: The verse reports a real and intense conflict between Barnabas and Paul.
    The translation should preserve that tension rather than minimize it for harmonizing
    purposes or intensify it beyond the lexical evidence.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
