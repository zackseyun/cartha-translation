theological_decisions:
- issue: Gendered vocative address in δημόσια assembly speech
  chosen_reading: Retain the explicitly masculine address 'Men, brothers' in the main
    text
  alternative_readings:
  - Brothers
  - Brothers and sisters
  rationale: The Greek contains two masculine vocatives, ἄνδρες and ἀδελφοί. In keeping
    with the project's gender-accurate policy, the translation preserves the form
    and rhetorical force of the original rather than neutralizing it. Because modern
    readers may understand the address more broadly in context, an explanatory footnote
    preserves that contextual nuance without altering the wording.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
