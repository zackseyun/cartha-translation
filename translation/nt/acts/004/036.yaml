theological_decisions:
- issue: Meaning of παρακλήσεως in the explanatory name Barnabas
  chosen_reading: Rendered broadly as 'encouragement' in the main text
  alternative_readings:
  - exhortation
  - consolation
  - comfort
  rationale: The term carries a semantic range that includes urging and comforting.
    The verse itself does not force a narrower theological interpretation, so the
    translation preserves a broad sense in the main text and notes alternatives rather
    than resolving the nuance too tightly.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
