id: ACT.4.36
reference: Acts 4:36
source:
  edition: SBLGNT
  text: ⸀Ἰωσὴφ δὲ ὁ ἐπικληθεὶς Βαρναβᾶς ἀπὸ τῶν ἀποστόλων, ὅ ἐστιν μεθερμηνευόμενον
    υἱὸς παρακλήσεως, Λευίτης, Κύπριος τῷ γένει,
translation:
  text: Now Joseph, who was also called Barnabas by the apostles—which translated
    means son of encouragement—a Levite, a native of Cyprus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'son of exhortation,' 'son of consolation,' or 'son of comfort.' The
      Greek word can carry the senses of encouragement, urging, or comfort.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωσὴφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild transition to a new example within the narrative.
    'Now' gives natural English discourse flow without overstating contrast.
- source_word: ἐπικληθεὶς
  chosen: was also called
  alternatives:
  - was surnamed
  - was nicknamed
  - was called
  lexicon: BDAG
  rationale: The participle indicates a name by which Joseph was known. 'Was also
    called' is idiomatic modern English and fits the explanatory apposition that follows.
- source_word: Βαρναβᾶς
  chosen: Barnabas
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: ἀπὸ τῶν ἀποστόλων
  chosen: by the apostles
  alternatives:
  - from the apostles
  lexicon: BDAG
  rationale: 'ἀπό with persons here indicates source/origin of the naming: the apostles
    gave him this designation. ''By the apostles'' is the clearest English expression.'
- source_word: ὅ ἐστιν μεθερμηνευόμενον
  chosen: which translated means
  alternatives:
  - which is translated
  - which means when translated
  lexicon: BDAG
  rationale: Luke explicitly glosses the Semitic name for Greek readers. 'Which translated
    means' is concise and natural while preserving the explanatory force.
- source_word: υἱὸς παρακλήσεως
  chosen: son of encouragement
  alternatives:
  - son of exhortation
  - son of consolation
  - son of comfort
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement, exhortation, comfort, or consolation.
    'Encouragement' best captures a broad, accessible sense in modern English and
    fits Barnabas's later character in Acts. Alternatives are preserved in a footnote
    because the semantic range is meaningful.
- source_word: Λευίτης
  chosen: a Levite
  lexicon: BDAG
  rationale: Straightforward ethnic/tribal-religious designation; the indefinite article
    is required in English apposition.
- source_word: Κύπριος τῷ γένει
  chosen: a native of Cyprus
  alternatives:
  - Cypriot by birth
  - of Cypriot descent
  lexicon: BDAG
  rationale: The dative τῷ γένει expresses origin/birth. 'A native of Cyprus' is natural
    English and accurately conveys provenance.
