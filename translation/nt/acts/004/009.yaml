theological_decisions:
- issue: Rendering of σέσωσται from σῴζω in a healing context
  chosen_reading: has been healed
  alternative_readings:
  - has been saved
  - has been made well
  rationale: The context is explicitly the restoration of the previously lame man, so the physical-healing sense is primary in this verse. However, because σῴζω also commonly bears salvific force, the translation preserves that lexical overlap in a footnote rather than importing a full soteriological sense into the main text where the immediate context does not require it. This preserves theological tension without flattening the narrative context.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
revisions:
- timestamp: '2026-04-21T02:33:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/004/009.json
  category: awkward_english
  tier: 1
  from: concerning a good deed done to a sick man, by what means this man has been healed,
  to: concerning a good deed done to a sick man—by what means this man has been healed—
  rationale: The current rendering uses a comma to connect the general topic of the examination ('a good deed') with the specific question being investigated ('by what means...'). This structure can be read as two parallel items rather than the second item specifying the first. Using an em-dash clarifies the epexegetical relationship, showing that the examination about the good deed consists of asking by what means the man was healed. This improves the logical flow and precision of the English sentence.
