id: ACT.4.9
reference: Acts 4:9
source:
  edition: SBLGNT
  text: εἰ ἡμεῖς σήμερον ἀνακρινόμεθα ἐπὶ εὐεργεσίᾳ ἀνθρώπου ἀσθενοῦς, ἐν τίνι οὗτος ⸀σέσωσται,
translation:
  text: If we are being examined today concerning a good deed done to a sick man—by what means this man has been healed—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been saved' or 'has been made well'; the Greek verb can refer to rescue, salvation, or healing. Here the immediate context points to physical healing.
    reason: lexical_alternative
  - marker: b
    text: Or 'concerning a good deed done to a sick man, by what means this man has been healed,'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἀνακρινόμεθα
  chosen: are being examined
  alternatives:
  - are being questioned
  - are being interrogated
  - are on trial
  lexicon: BDAG
  rationale: The verb can denote judicial questioning or examination. 'Are being examined' preserves the legal/investigative sense in clear modern English without overstating the formality as 'on trial' or the harshness as 'interrogated'.
- source_word: ἐπὶ εὐεργεσίᾳ
  chosen: concerning a good deed
  alternatives:
  - for a good deed
  - on account of a benefaction
  - about an act of kindness
  lexicon: BDAG
  rationale: ἐπί with the dative here gives the basis or occasion of the examination. εὐεργεσία denotes a beneficent act. 'Concerning a good deed' fits the syntax smoothly in English while retaining the irony that they are being examined over something beneficial.
- source_word: ἀνθρώπου ἀσθενοῦς
  chosen: to a sick man
  alternatives:
  - for a weak man
  - to an infirm man
  - to a disabled man
  lexicon: BDAG
  rationale: The genitive phrase modifies the good deed and identifies its recipient. ἀσθενής here refers to physical weakness/illness in context, especially given the healing of the lame man. 'Sick man' is natural English and broad enough to cover the condition without over-specifying beyond the Greek.
- source_word: ἐν τίνι
  chosen: by what means
  alternatives:
  - by whom
  - in what
  - in whom
  lexicon: BDAG
  rationale: 'The dative interrogative with ἐν can indicate means or instrument here: the question is about the agency/instrument by which the man was restored. Because Peter''s answer in the next verse names Jesus, ''by whom'' is possible, but the Greek wording itself is broader. ''By what means'' preserves the immediate syntax and leaves the answer to specify the person.'
- source_word: σέσωσται
  chosen: has been healed
  alternatives:
  - has been saved
  - has been made well
  - has been restored
  lexicon: BDAG
  rationale: σῴζω can mean save, rescue, heal, or make well. In this immediate context of a physically restored man, 'has been healed' best communicates the referent in idiomatic English. The broader semantic overlap with 'saved' is important in Acts, so that alternative is preserved in a footnote.
