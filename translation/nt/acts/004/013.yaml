id: ACT.4.13
reference: Acts 4:13
source:
  edition: SBLGNT
  text: Θεωροῦντες δὲ τὴν τοῦ Πέτρου παρρησίαν καὶ Ἰωάννου καὶ καταλαβόμενοι ὅτι ἄνθρωποι
    ἀγράμματοί εἰσιν καὶ ἰδιῶται, ἐθαύμαζον, ἐπεγίνωσκόν τε αὐτοὺς ὅτι σὺν τῷ Ἰησοῦ
    ἦσαν,
translation:
  text: Now as they observed the boldness of Peter and John, and realized that they
    were uneducated and ordinary men, they were astonished, and they recognized that
    they had been with Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unlettered and laymen.' The Greek describes men without formal scholarly
      training and without official professional status.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θεωροῦντες
  chosen: as they observed
  alternatives:
  - seeing
  - looking at
  - perceiving
  lexicon: BDAG
  rationale: The participle introduces the leaders' ongoing observation that leads
    into their reaction. 'Observed' is slightly more deliberate than simple 'saw'
    and fits the evaluative sense in context.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - confidence
  - plainness of speech
  - outspokenness
  lexicon: BDAG
  rationale: In Acts, παρρησία commonly denotes courageous openness in speaking. 'Boldness'
    is the most natural modern English rendering and preserves both courage and public
    frankness.
- source_word: καταλαβόμενοι
  chosen: realized
  alternatives:
  - understood
  - perceived
  - grasped
  lexicon: BDAG
  rationale: The aorist participle marks their coming to an understanding about Peter
    and John. 'Realized' communicates this recognition idiomatically in English.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: BDAG
  rationale: The referents are specifically Peter and John, both male individuals,
    so 'men' is gender-accurate and more precise than a generic term.
- source_word: ἀγράμματοί
  chosen: uneducated
  alternatives:
  - unlettered
  - unschooled
  - without formal learning
  lexicon: BDAG
  rationale: The term refers not to illiteracy in a strict modern sense, but to lack
    of formal scribal or rabbinic training. 'Uneducated' communicates that clearly
    for modern readers.
- source_word: ἰδιῶται
  chosen: ordinary
  alternatives:
  - common
  - laymen
  - private persons
  lexicon: BDAG
  rationale: Here the word contrasts Peter and John with trained or official religious
    experts. 'Ordinary' captures their non-elite, non-professional status without
    importing a pejorative tone. Because ἄνθρωποι already supplies 'men,' the adjective
    is rendered attributively as 'ordinary' in the phrase 'ordinary men.'
- source_word: ἐθαύμαζον
  chosen: they were astonished
  alternatives:
  - they marveled
  - they were amazed
  lexicon: BDAG
  rationale: The imperfect depicts their continuing reaction. 'Were astonished' conveys
    sustained amazement in readable modern English.
- source_word: ἐπεγίνωσκόν
  chosen: they recognized
  alternatives:
  - they began to recognize
  - they identified
  - they came to know
  lexicon: BDAG
  rationale: The verb indicates recognition or identification. 'Recognized' is concise
    and natural, and the following clause states what they recognized about them.
- source_word: σὺν τῷ Ἰησοῦ ἦσαν
  chosen: they had been with Jesus
  alternatives:
  - they were with Jesus
  lexicon: BDAG
  rationale: The imperfect ἦσαν in this retrospective context points to their prior
    association with Jesus. English past perfect best conveys that this was a recognized
    prior relationship explaining their present boldness.
- source_word: δὲ ... τε
  chosen: Now ... and
  alternatives:
  - and ... also
  - but ... and
  lexicon: BDAG
  rationale: The particles structure the narrative flow rather than carry heavy adversative
    force. 'Now' smoothly advances the scene, while 'and' adequately reflects τε in
    natural English.
