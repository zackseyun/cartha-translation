theological_decisions:
- issue: Social characterization of Peter and John
  chosen_reading: Rendered ἀγράμματοι καὶ ἰδιῶται as 'uneducated and ordinary men'
  alternative_readings:
  - unlearned and ignorant men
  - unlettered and laymen
  rationale: The verse describes the Sanhedrin's perception of Peter and John as lacking
    formal training and elite status, not as morally deficient or unintelligent. The
    chosen wording avoids misleading modern connotations of 'ignorant' while preserving
    the contrast with educated authorities.
  doctrine_reference: Translation philosophy §§1, 4, 6
