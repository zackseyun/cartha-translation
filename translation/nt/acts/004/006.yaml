id: ACT.4.6
reference: Acts 4:6
source:
  edition: SBLGNT
  text: (καὶ ⸂Ἅννας ὁ ἀρχιερεὺς καὶ Καϊάφας καὶ Ἰωάννης καὶ Ἀλέξανδρος⸃ καὶ ὅσοι ἦσαν
    ἐκ γένους ἀρχιερατικοῦ),
translation:
  text: and Annas the high priest, and Caiaphas, and John, and Alexander, and all
    who were of the high-priestly family,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "of high-priestly descent" or "from the high-priestly lineage."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἅννας
  chosen: Annas
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς in Acts normally refers to the high priestly office or its
    holder(s). Here the singular apposition to Annas is most naturally rendered 'the
    high priest,' preserving the title as given in the Greek, even though historically
    Caiaphas was the acting high priest at the time.
- source_word: Καϊάφας
  chosen: Caiaphas
  rationale: Standard transliteration of the personal name.
- source_word: Ἰωάννης
  chosen: John
  alternatives:
  - Johanan
  rationale: Standard English transliteration/traditional form of the Greek personal
    name. 'Johanan' would reflect a Semitic background more explicitly, but 'John'
    is the normal English form.
- source_word: Ἀλέξανδρος
  chosen: Alexander
  rationale: Standard transliteration of the personal name.
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - as many as
  lexicon: BDAG
  rationale: Idiomatic English for the plural relative/quantifying expression. 'As
    many as' is more formally literal but less natural here.
- source_word: ἦσαν
  chosen: were
  lexicon: BDAG
  rationale: Simple imperfect of εἰμί rendered with the natural English past tense
    in this list construction.
- source_word: ἐκ γένους ἀρχιερατικοῦ
  chosen: of the high-priestly family
  alternatives:
  - from the high-priestly lineage
  - of high-priestly descent
  lexicon: BDAG
  rationale: γένος denotes family, lineage, or kin-group; ἀρχιερατικός means pertaining
    to the high priest/high priesthood. 'Of the high-priestly family' is clear modern
    English and preserves the sense of belonging to the high-priestly clan rather
    than merely holding office.
