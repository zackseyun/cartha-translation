theological_decisions:
- issue: Rendering Annas as 'the high priest' despite historical questions about the
    office at this time
  chosen_reading: 'Retain the text''s title straightforwardly: ''Annas the high priest'''
  alternative_readings:
  - Annas, a former high priest
  - Annas the chief priest
  rationale: The Greek explicitly gives Annas the title ὁ ἀρχιερεύς. The translation
    should not harmonize or correct Luke's wording on historical grounds. Any nuance
    about former versus acting office is interpretive and should not be imported into
    the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
