id: ACT.4.22
reference: Acts 4:22
source:
  edition: SBLGNT
  text: ἐτῶν γὰρ ἦν πλειόνων τεσσεράκοντα ὁ ἄνθρωπος ἐφ’ ὃν ⸀γεγόνει τὸ σημεῖον τοῦτο
    τῆς ἰάσεως.
translation:
  text: For the man on whom this sign of healing had happened was more than forty
    years old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this healing sign' or 'this miracle of healing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτῶν ... πλειόνων τεσσεράκοντα
  chosen: more than forty years old
  alternatives:
  - over forty years old
  - older than forty years
  lexicon: BDAG
  rationale: 'The genitive construction with comparative πλειόνων and τεσσεράκοντα
    is idiomatic for age: ''of more than forty years.'' Natural English expresses
    this as ''more than forty years old.'''
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding statement; 'For' preserves
    the discourse connection in a concise, natural way.
- source_word: ὁ ἄνθρωπος
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual already known from
    context, so 'the man' is the most accurate and natural rendering.
- source_word: ἐφ’ ὃν
  chosen: on whom
  alternatives:
  - upon whom
  - for whom
  lexicon: BDAG
  rationale: ἐπί with the accusative relative pronoun here marks the person affected
    by the event/sign. 'On whom' is the most direct formal equivalent and works idiomatically
    in English with 'had happened.'
- source_word: γεγόνει
  chosen: had happened
  alternatives:
  - had come about
  - had been done
  - had taken place
  lexicon: BDAG
  rationale: The pluperfect of γίνομαι indicates a completed event with prior reference.
    In this context, where the sign has occurred in relation to the man, 'had happened'
    is natural and avoids implying an agent too strongly, which the Greek verb itself
    does not explicitly state.
- source_word: τὸ σημεῖον τοῦτο
  chosen: this sign
  alternatives:
  - this miracle
  - this sign-miracle
  lexicon: BDAG
  rationale: σημεῖον is best kept as 'sign' in Acts to preserve Luke's emphasis on
    the event as a meaningful attestation, not merely a wonder. 'Miracle' is interpretive
    and less precise.
- source_word: τῆς ἰάσεως
  chosen: of healing
  alternatives:
  - of restoration
  - of cure
  lexicon: BDAG
  rationale: ἴασις denotes healing/cure. 'Of healing' is the most transparent and
    idiomatic genitival rendering in English.
