theological_decisions:
- issue: Rendering σημεῖον in a miracle context
  chosen_reading: sign
  alternative_readings:
  - miracle
  - wonder
  rationale: Luke often uses σημεῖον to emphasize the evidential and revelatory character
    of the act. Rendering it 'sign' preserves that theological nuance without overstating
    beyond the Greek.
  doctrine_reference: Translation philosophy §1, §5
- issue: Voice/agency implied by γεγόνει
  chosen_reading: had happened
  alternative_readings:
  - had been performed
  - had been done
  rationale: The Greek uses γίνομαι rather than an explicit passive of 'do.' 'Had
    happened' preserves the event-focused wording and avoids importing a stronger
    statement about agency than the verse itself makes, while the broader context
    still makes clear that the healing came through the apostles by God's power.
  doctrine_reference: Translation philosophy §1, §3
