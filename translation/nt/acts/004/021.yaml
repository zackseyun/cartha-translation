id: ACT.4.21
reference: Acts 4:21
source:
  edition: SBLGNT
  text: οἱ δὲ προσαπειλησάμενοι ἀπέλυσαν αὐτούς, μηδὲν εὑρίσκοντες τὸ πῶς ⸀κολάσωνται
    αὐτούς, διὰ τὸν λαόν, ὅτι πάντες ἐδόξαζον τὸν θεὸν ἐπὶ τῷ γεγονότι·
translation:
  text: So after further threatening them, they released them, finding no way to punish
    them because of the people, since everyone was glorifying God for what had happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after threatening them again' or 'after adding threats.' The Greek participle
      προσαπειλησάμενοι conveys an additional or intensified threatening beyond what
      had already occurred.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαπειλησάμενοι
  chosen: after further threatening
  alternatives:
  - after threatening them again
  - after adding threats
  lexicon: BDAG
  rationale: The participle from προσαπειλέομαι intensifies prior threats; 'further
    threatening' captures the prefixed sense ('additionally threaten') without awkwardness.
- source_word: ἀπέλυσαν
  chosen: they released
  alternatives:
  - they let go
  - they set free
  lexicon: BDAG
  rationale: ἀπολύω here means to release or let go from custody. 'Released' is natural
    modern English and fits the legal/custodial setting.
- source_word: μηδὲν εὑρίσκοντες
  chosen: finding no way
  alternatives:
  - finding nothing
  - finding no basis
  lexicon: BDAG
  rationale: Although literally 'finding nothing,' the following articular πῶς specifies
    that what they lacked was a means or way to proceed. 'Finding no way' expresses
    the idiom clearly in English.
- source_word: τὸ πῶς κολάσωνται αὐτούς
  chosen: to punish them
  alternatives:
  - how they might punish them
  - how they could punish them
  lexicon: BDAG
  rationale: The construction τὸ πῶς + subjunctive means 'how/what way' they might
    do something. κολάζω here is punitive action by authorities; 'punish' is the straightforward
    rendering. The finite sense is smoothed into idiomatic English after 'finding
    no way.'
- source_word: διὰ τὸν λαόν
  chosen: because of the people
  alternatives:
  - on account of the people
  - because of the crowd
  lexicon: BDAG
  rationale: διά with the accusative gives causal force here. λαός is best rendered
    'people' rather than 'crowd,' since it refers broadly to the populace whose reaction
    constrained the authorities.
- source_word: πάντες
  chosen: everyone
  alternatives:
  - all
  - all the people
  lexicon: BDAG
  rationale: πάντες is indefinite in context and refers generally to the populace.
    'Everyone' is idiomatic and preserves the universal sense.
- source_word: ἐδόξαζον τὸν θεόν
  chosen: was glorifying God
  alternatives:
  - was praising God
  - was giving glory to God
  lexicon: BDAG
  rationale: 'δοξάζω is more than simple praise; ''glorify'' preserves the God-directed
    honor language common in Luke-Acts. The imperfect is rendered with progressive
    aspect: ''was glorifying.'''
- source_word: ἐπὶ τῷ γεγονότι
  chosen: for what had happened
  alternatives:
  - because of what had happened
  - over what had happened
  - for the thing that had happened
  lexicon: BDAG
  rationale: The perfect participle γεγονότι refers to the completed event with present
    relevance. 'What had happened' is idiomatic English and fits ἐπί here as the basis/reason
    for glorifying God.
