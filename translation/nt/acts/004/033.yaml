theological_decisions:
- issue: Meaning of χάρις in context
  chosen_reading: favor resting on the whole community
  alternative_readings:
  - divine grace in a more explicitly theological sense
  - favor from the people
  rationale: The verse does not specify the source of χάρις, and Luke may intentionally
    allow a broad sense. Rendering it as 'favor' preserves that ambiguity rather than
    narrowing it to either exclusively divine grace or merely human popularity.
  doctrine_reference: Preserve theological tension rather than resolve it.
