id: ACT.4.33
reference: Acts 4:33
source:
  edition: SBLGNT
  text: καὶ ⸂δυνάμει μεγάλῃ⸃ ἀπεδίδουν τὸ μαρτύριον οἱ ἀπόστολοι ⸂τῆς ἀναστάσεως τοῦ
    κυρίου Ἰησοῦ⸃, χάρις τε μεγάλη ἦν ἐπὶ πάντας αὐτούς.
translation:
  text: And with great power the apostles were giving their testimony about the resurrection
    of the Lord Jesus, and great favor was upon them all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great grace was upon them all.' The Greek χάρις can mean 'grace' or
      'favor'; the wording may include both God's gracious presence and the favorable
      regard shown toward the believers.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμει μεγάλῃ
  chosen: with great power
  alternatives:
  - with great strength
  - with great force
  lexicon: BDAG
  rationale: Instrumental dative expressing the manner or means of the apostles' witness.
    'Power' is the most natural rendering for δύναμις in Luke-Acts and preserves the
    sense of Spirit-empowered effectiveness without over-specifying miraculous activity.
- source_word: ἀπεδίδουν
  chosen: were giving
  alternatives:
  - were rendering
  - were bearing
  - kept giving
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing or repeated action. ἀποδίδωμι literally
    means 'give back/render,' but in this idiom with μαρτύριον it means to give or
    render testimony. 'Were giving' preserves the imperfect aspect in readable English.
- source_word: τὸ μαρτύριον
  chosen: their testimony
  alternatives:
  - the testimony
  - witness
  lexicon: BDAG
  rationale: μαρτύριον denotes testimony or witness. English idiom prefers 'give testimony'
    rather than 'give the testimony.' 'Their' is supplied to make explicit that the
    apostles are the ones bearing witness; this is implicit in the Greek subject and
    not an added doctrinal claim.
- source_word: τῆς ἀναστάσεως
  chosen: about the resurrection
  alternatives:
  - of the resurrection
  - concerning the resurrection
  lexicon: BDAG
  rationale: The genitive after μαρτύριον is most naturally understood as the content
    of the testimony. 'About the resurrection' communicates this clearly in modern
    English better than the more wooden 'of the resurrection.'
- source_word: τοῦ κυρίου Ἰησοῦ
  chosen: of the Lord Jesus
  alternatives:
  - of Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default for Kyrios. The genitive
    links the resurrection specifically to Jesus. Standard English requires the article
    in 'the Lord Jesus.'
- source_word: χάρις
  chosen: favor
  alternatives:
  - grace
  lexicon: BDAG
  rationale: In this context χάρις likely refers to favorable regard resting on the
    community, whether from God, people, or both. 'Favor' is more idiomatic and contextually
    precise than 'grace,' which in English can sound like a technical soteriological
    term not demanded by this verse.
- source_word: τε
  chosen: and
  alternatives:
  - now
  - also
  lexicon: BDAG
  rationale: τε mildly connects this clause to the previous one. In smooth English,
    simple 'and' best captures the connective force without awkwardness.
- source_word: ἐπὶ πάντας αὐτούς
  chosen: upon them all
  alternatives:
  - on them all
  - upon all of them
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys something resting upon or extending
    over the whole group. 'Upon them all' preserves the imagery and emphasis on the
    entirety of the community.
