theological_decisions:
- issue: Textual form of the introductory citation formula
  chosen_reading: Translate the quotation introduction without including “of our father,”
    yielding a smooth connection to God as the speaker through the Holy Spirit and
    David.
  alternative_readings:
  - 'Include “our father David” as in many manuscripts and translations: “who through
    the Holy Spirit, by the mouth of our father David your servant, said”'
  - Read the phrase as “through the mouth of our father David, your servant”
  rationale: The SBLGNT text presents a difficult reading with “τοῦ πατρὸς ἡμῶν” separated
    from “David.” Because the phrase is text-critically uncertain and awkward in direct
    English representation, the main text follows the sense of the clause while preserving
    the alternative in a footnote. This avoids overstating a disputed textual detail
    while keeping the verse readable and auditable.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
