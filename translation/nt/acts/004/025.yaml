id: ACT.4.25
reference: Acts 4:25
source:
  edition: SBLGNT
  text: ὁ ⸂τοῦ πατρὸς ἡμῶν⸃ διὰ ⸂πνεύματος ἁγίου⸃ στόματος Δαυὶδ παιδός σου εἰπών·
    Ἱνατί ἐφρύαξαν ἔθνη καὶ λαοὶ ἐμελέτησαν κενά;
translation:
  text: 'who, through the Holy Spirit, by the mouth of David your servant, said: ‘Why
    did the nations rage, and the peoples plot futile things?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Some manuscripts read “our father David your servant,” making the introduction:
      “who through the Holy Spirit, by the mouth of our father David your servant,
      said.”'
    reason: textual_variant
  - marker: b
    text: Or “meditated on vain things.” The Greek verb can mean “meditate” or, in
      context, “plot/devise.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τοῦ πατρὸς ἡμῶν
  chosen: who
  alternatives:
  - who through our father
  - who by our father
  lexicon: BDAG
  rationale: The article with the genitive phrase is part of a textual variant in
    the introductory formula. The main clause requires a relative connection back
    to God in v. 24, so English idiom is best served by simply rendering the resumptive
    force as “who.” The variant phrase “of our father” is preserved in a footnote
    rather than forced awkwardly into the main text.
- source_word: διὰ πνεύματος ἁγίου
  chosen: through the Holy Spirit
  alternatives:
  - through the Holy Spirit's agency
  - by the Holy Spirit
  lexicon: BDAG
  rationale: διά with the genitive commonly marks means or agency. “Through the Holy
    Spirit” preserves the instrumental sense and the explicit personal reference to
    the Spirit.
- source_word: στόματος Δαυὶδ
  chosen: by the mouth of David
  alternatives:
  - through David's mouth
  - by David
  lexicon: BDAG
  rationale: The idiom στόματος with a genitive is a standard biblical expression
    for spoken prophetic agency. “By the mouth of David” keeps the scriptural idiom
    while remaining understandable.
- source_word: παιδός σου
  chosen: your servant
  alternatives:
  - your child
  - your slave
  lexicon: BDAG
  rationale: παῖς can mean either “child” or “servant.” In this context, modifying
    David in a citation formula and echoing biblical language about David as God's
    servant, “servant” is the most natural and contextually fitting rendering. “Child”
    would sound misleading in English here.
- source_word: εἰπών
  chosen: said
  alternatives:
  - having said
  - speaking
  lexicon: BDAG
  rationale: The aorist participle introduces the quotation and is naturally rendered
    in English with a finite verb, “said,” for readability without loss of meaning.
- source_word: Ἱνατί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: A straightforward interrogative introducing the Psalm citation; “Why”
    is the natural English equivalent.
- source_word: ἐφρύαξαν
  chosen: rage
  alternatives:
  - raged
  - were arrogant
  - stormed
  lexicon: BDAG
  rationale: The verb denotes turbulent, defiant agitation. “Rage” captures both the
    emotional and rebellious force and aligns with the Psalm's traditional sense.
- source_word: ἔθνη
  chosen: the nations
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: In this Psalm citation the plural refers broadly to the nations/peoples
    in opposition, not specifically to non-Jews as a socioreligious category. “The
    nations” best preserves the Old Testament background.
- source_word: λαοὶ
  chosen: the peoples
  alternatives:
  - the people groups
  - the peoples of the earth
  lexicon: BDAG
  rationale: The plural should be retained. “The peoples” reflects the Greek and the
    Psalmic parallelism better than flattening to singular “people.”
- source_word: ἐμελέτησαν
  chosen: plot
  alternatives:
  - meditate on
  - devise
  - plan
  lexicon: BDAG
  rationale: Although the verb can mean “meditate,” in this hostile context it carries
    the sense of devising or plotting. “Plot” communicates the adversarial intent
    clearly in modern English.
- source_word: κενά
  chosen: futile things
  alternatives:
  - vain things
  - empty things
  lexicon: BDAG
  rationale: The adjective denotes emptiness or vanity. “Futile things” expresses
    both emptiness and ineffectiveness in idiomatic English.
