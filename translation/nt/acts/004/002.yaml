id: ACT.4.2
reference: Acts 4:2
source:
  edition: SBLGNT
  text: διαπονούμενοι διὰ τὸ διδάσκειν αὐτοὺς τὸν λαὸν καὶ καταγγέλλειν ἐν τῷ Ἰησοῦ
    τὴν ἀνάστασιν ⸂τὴν ἐκ⸃ νεκρῶν,
translation:
  text: being greatly disturbed because they were teaching the people and proclaiming
    in Jesus the resurrection from the dead,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'proclaiming in the case of Jesus the resurrection from the dead'; the
      Greek phrase 'in Jesus' may point specifically to resurrection as shown in Jesus'
      own rising.
    reason: alternative_reading
lexical_decisions:
- source_word: διαπονούμενοι
  chosen: being greatly disturbed
  alternatives:
  - being annoyed
  - being troubled
  - being exasperated
  lexicon: BDAG
  rationale: The participle describes strong vexation or irritation on the part of
    the authorities. 'Greatly disturbed' captures the intensity without sounding overly
    colloquial; 'annoyed' is possible but too weak, while 'exasperated' may overstate
    emotional coloring.
- source_word: διὰ τὸ διδάσκειν
  chosen: because they were teaching
  alternatives:
  - because of their teaching
  - over teaching
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses reason/cause. Rendering it
    with a finite clause in English is natural and preserves the causal force.
- source_word: αὐτοὺς
  chosen: they
  alternatives:
  - Peter and John
  - the apostles
  lexicon: BDAG
  rationale: The pronoun refers to the previously mentioned speakers. English requires
    an explicit subject for the infinitive clause, and 'they' preserves the anaphoric
    reference without importing more than the immediate context supplies.
- source_word: τὸν λαὸν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός here refers to the people in a collective sense, not merely a random
    crowd. 'The people' is the standard and contextually appropriate rendering.
- source_word: καταγγέλλειν
  chosen: proclaiming
  alternatives:
  - announcing
  - preaching
  - declaring
  lexicon: BDAG
  rationale: The verb carries the sense of public proclamation. 'Proclaiming' fits
    the formal public setting and pairs well with the content clause that follows.
- source_word: ἐν τῷ Ἰησοῦ
  chosen: in Jesus
  alternatives:
  - by Jesus
  - in the case of Jesus
  - through Jesus
  lexicon: BDAG
  rationale: The prepositional phrase most naturally modifies the proclamation of
    resurrection as located or manifested in Jesus—i.e., resurrection as shown in
    his case. 'In Jesus' is the most direct rendering of the Greek and preserves the
    interpretive openness better than more specific paraphrases.
- source_word: ἀνάστασιν
  chosen: the resurrection
  alternatives:
  - resurrection
  - rising
  lexicon: BDAG
  rationale: With the article, the noun points to the resurrection as a definite proclaimed
    reality. 'The resurrection' is idiomatic and preserves the theological weight
    of the term.
- source_word: τὴν ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from among the dead
  lexicon: BDAG
  rationale: The phrase specifies resurrection from among dead persons. 'From the
    dead' is standard, clear English; the more literal 'out from among the dead' is
    possible but too cumbersome for the main text.
