theological_decisions:
- issue: Meaning of 'ἐν τῷ Ἰησοῦ' in relation to resurrection proclamation
  chosen_reading: The phrase is rendered transparently as 'in Jesus,' allowing the
    text to indicate that the resurrection being proclaimed is manifested in or centered
    in Jesus.
  alternative_readings:
  - '''through Jesus'' (resurrection mediated by Jesus)'
  - '''in the case of Jesus'' (Jesus'' own resurrection as the instance proclaimed)'
  rationale: The Greek preposition ἐν can support several closely related nuances
    here. To preserve theological tension rather than over-resolve the phrase, the
    main text keeps the more literal 'in Jesus,' while a footnote preserves a clarifying
    alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Scope of 'the resurrection from the dead'
  chosen_reading: The wording allows both the immediate reference to Jesus' resurrection
    and the broader apostolic proclamation of resurrection as demonstrated in him.
  alternative_readings:
  - A strict reference only to Jesus' resurrection
  - A broader doctrine of final resurrection grounded in Jesus
  rationale: Luke's wording can evoke both Jesus' resurrection and the general resurrection
    hope validated in him. The translation avoids narrowing the phrase beyond what
    the Greek states.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
