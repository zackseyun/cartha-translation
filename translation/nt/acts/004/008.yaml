id: ACT.4.8
reference: Acts 4:8
source:
  edition: SBLGNT
  text: τότε Πέτρος πλησθεὶς πνεύματος ἁγίου εἶπεν πρὸς αὐτούς· Ἄρχοντες τοῦ λαοῦ
    καὶ ⸀πρεσβύτεροι,
translation:
  text: Then Peter, filled with the Holy Spirit, said to them, “Rulers of the people
    and elders,”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: Πέτρος
  chosen: Peter
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names.
- source_word: πλησθεὶς
  chosen: filled
  alternatives:
  - having been filled
  lexicon: BDAG
  rationale: Aorist passive participle of πίμπλημι. 'Filled' gives the sense idiomatically
    in English without overloading the line; the passive force is retained conceptually
    in the participial construction.
- source_word: πνεύματος ἁγίου
  chosen: with the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - of the Holy Spirit
  lexicon: BDAG
  rationale: Genitive construction after πλησθεὶς is idiomatically rendered in English
    as 'filled with.' 'Holy Spirit' is the standard and contextually clear rendering
    of πνεῦμα ἅγιον here.
- source_word: εἶπεν πρὸς αὐτούς
  chosen: said to them
  alternatives:
  - said to these men
  - spoke to them
  lexicon: BDAG
  rationale: Straightforward narrative speech formula; 'said to them' is the most
    natural equivalent for εἶπεν πρὸς αὐτούς.
- source_word: Ἄρχοντες
  chosen: Rulers
  alternatives:
  - Leaders
  - Officials
  lexicon: BDAG
  rationale: Vocative plural addressing those in governing authority. 'Rulers' preserves
    the official and political/judicial sense better than the broader 'leaders.'
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the nation
  lexicon: BDAG
  rationale: λαός commonly refers to the people, here likely the covenant people/Israel
    in civic-religious context. 'Of the people' is the most direct rendering.
- source_word: πρεσβύτεροι
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In this governing context, πρεσβύτεροι refers to recognized elders rather
    than merely older males. 'Elders' is the established and contextually precise
    rendering.
