theological_decisions:
- issue: Rendering of πνεύματος ἁγίου
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the holy spirit
  rationale: In Acts this expression refers to the personal divine Holy Spirit empowering
    witness and speech. Capitalization in English reflects that referent without adding
    content beyond the context.
  doctrine_reference: Affirmations; Translation philosophy §6
