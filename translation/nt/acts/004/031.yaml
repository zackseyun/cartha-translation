theological_decisions:
- issue: Rendering of Spirit-filling language
  chosen_reading: they were all filled with the Holy Spirit
  alternative_readings:
  - they were all filled by the Holy Spirit
  rationale: The genitive construction after πίμπλημι is most naturally rendered in
    English as content ('with the Holy Spirit'), matching Luke's idiom elsewhere.
    This preserves the text's statement of divine empowerment without importing a
    narrower denominational theology of a distinct second experience beyond what the
    verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; historic
    ecumenical orthodoxy regarding the Holy Spirit
- issue: Aspect of ἐλάλουν
  chosen_reading: were speaking
  alternative_readings:
  - spoke
  - began to speak
  rationale: The imperfect portrays ongoing proclamation rather than a mere punctiliar
    event. This matters theologically because the verse emphasizes sustained bold
    witness following prayer and Spirit-filling.
  doctrine_reference: Original-language primacy over translation tradition
