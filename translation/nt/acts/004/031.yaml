id: ACT.4.31
reference: Acts 4:31
source:
  edition: SBLGNT
  text: καὶ δεηθέντων αὐτῶν ἐσαλεύθη ὁ τόπος ἐν ᾧ ἦσαν συνηγμένοι, καὶ ἐπλήσθησαν
    ἅπαντες ⸂τοῦ ἁγίου πνεύματος⸃, καὶ ἐλάλουν τὸν λόγον τοῦ θεοῦ μετὰ παρρησίας.
translation:
  text: And when they had prayed, the place in which they were gathered was shaken,
    and they were all filled with the Holy Spirit and were speaking the word of God
    with boldness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where they were assembled.' The Greek describes them as being in a gathered
      state.
    reason: lexical_alternative
  - marker: b
    text: Or 'with confidence' or 'with frankness.' The term denotes open, fearless
      speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεηθέντων αὐτῶν
  chosen: when they had prayed
  alternatives:
  - after they had prayed
  - when they had made supplication
  lexicon: BDAG
  rationale: 'Aorist participle with genitive absolute gives temporal background:
    ''when/after they had prayed.'' ''Prayed'' is more natural modern English than
    ''made supplication'' while still accurately reflecting δέομαι in context of communal
    prayer.'
- source_word: ἐσαλεύθη
  chosen: was shaken
  alternatives:
  - was moved
  - was stirred
  lexicon: BDAG
  rationale: Passive aorist indicates the place underwent a shaking. 'Was shaken'
    is the clearest idiomatic rendering and preserves the physical force of σαλεύω.
- source_word: ὁ τόπος
  chosen: the place
  alternatives:
  - the location
  lexicon: BDAG
  rationale: τόπος here refers to the physical place where the believers were assembled.
    'The place' is straightforward and natural.
- source_word: ἐν ᾧ ἦσαν συνηγμένοι
  chosen: in which they were gathered
  alternatives:
  - where they were assembled
  - in which they had assembled
  lexicon: BDAG
  rationale: The relative clause identifies the place. The periphrastic construction
    with ἦσαν + perfect participle suggests a gathered state. 'Were gathered' preserves
    that state without overcomplicating the English.
- source_word: ἐπλήσθησαν
  chosen: were filled
  alternatives:
  - were filled up
  lexicon: BDAG
  rationale: Standard rendering for πίμπλημι in Spirit-filling contexts. It preserves
    the passive sense and Luke's repeated idiom.
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: ἅπαντες emphasizes the entirety of the group. 'All' is concise and fully
    adequate.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Definite genitive after 'filled' is idiomatically rendered 'with the
    Holy Spirit.' Capitalization reflects the personal divine referent in context
    and historic orthodox usage.
- source_word: ἐλάλουν
  chosen: were speaking
  alternatives:
  - began speaking
  - kept speaking
  - spoke
  lexicon: BDAG
  rationale: Imperfect indicates ongoing action. 'Were speaking' best preserves the
    durative aspect without adding an inceptive nuance like 'began.'
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A common Lukan expression for the proclaimed divine message. 'The word
    of God' preserves the established biblical idiom and theological weight.
- source_word: μετὰ παρρησίας
  chosen: with boldness
  alternatives:
  - with confidence
  - with openness
  - with frankness
  lexicon: BDAG
  rationale: παρρησία in Acts commonly denotes bold, fearless public speech. 'With
    boldness' is the most contextually fitting and traditional without being archaic.
