id: ACT.4.4
reference: Acts 4:4
source:
  edition: SBLGNT
  text: πολλοὶ δὲ τῶν ἀκουσάντων τὸν λόγον ἐπίστευσαν, καὶ ἐγενήθη ⸀ὁ ἀριθμὸς τῶν
    ἀνδρῶν ⸀ὡς χιλιάδες πέντε.
translation:
  text: But many of those who had heard the message believed, and the number of the
    men became about five thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word.' Here λόγος refers to the apostolic proclamation or message.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the number of the men,' likely indicating a count of males rather
      than the entire mixed crowd.
    reason: cultural_note
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  - many people
  lexicon: BDAG
  rationale: Retains the indefinite quantitative force without over-specifying. 'Many
    people' would smooth the syntax but adds a noun not present in Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the opposition and arrest in the preceding context
    while remaining natural in English narrative flow.
- source_word: ἀκουσάντων τὸν λόγον
  chosen: those who had heard the message
  alternatives:
  - those who heard the word
  - those who had heard the message spoken
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as prior action ('had heard').
    λόγος here refers to the apostolic proclamation, so 'message' communicates sense
    clearly in modern English; 'word' is possible but less transparent.
- source_word: ἐπίστευσαν
  chosen: believed
  alternatives:
  - came to faith
  - put their faith in it
  lexicon: BDAG
  rationale: A straightforward rendering of πιστεύω. 'Believed' preserves the verbal
    simplicity of the Greek and avoids importing a more developed theological idiom.
- source_word: ἐγενήθη
  chosen: became
  alternatives:
  - came to be
  - grew to
  lexicon: BDAG
  rationale: γίνομαι here indicates resulting state/number. 'Became' is direct and
    idiomatic with 'the number.' 'Grew to' is interpretive and slightly more dynamic.
- source_word: ὁ ἀριθμὸς
  chosen: the number
  alternatives:
  - the total number
  lexicon: BDAG
  rationale: Formal and natural rendering of the noun phrase; no need to expand beyond
    the Greek.
- source_word: τῶν ἀνδρῶν
  chosen: of the men
  alternatives:
  - of the males
  - of the people
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man'/'male adult,' not generic 'people.' Per translation
    philosophy, the masculine reference is preserved rather than neutralized. A footnote
    can clarify that this may refer to counted males specifically rather than the
    entire mixed crowd.
- source_word: ὡς χιλιάδες πέντε
  chosen: about five thousand
  alternatives:
  - approximately five thousand
  - some five thousand
  lexicon: BDAG
  rationale: ὡς before a number commonly signals approximation. 'About five thousand'
    is idiomatic and preserves that nuance.
