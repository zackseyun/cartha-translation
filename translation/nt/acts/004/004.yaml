theological_decisions:
- issue: Gender-specific counting in τῶν ἀνδρῶν
  chosen_reading: Translate explicitly as 'the men' rather than a gender-neutral term.
  alternative_readings:
  - the people
  - the believers
  rationale: The Greek uses ἀνδρῶν, which normally denotes men rather than humans
    in general. Following the gender-accurate policy, the translation preserves the
    masculine form. This does not itself settle whether women were excluded from the
    total community; it reflects the wording of the count in this verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
