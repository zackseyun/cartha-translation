id: ACT.4.34
reference: Acts 4:34
source:
  edition: SBLGNT
  text: οὐδὲ γὰρ ἐνδεής τις ⸀ἦν ἐν αὐτοῖς· ὅσοι γὰρ κτήτορες χωρίων ἢ οἰκιῶν ὑπῆρχον,
    πωλοῦντες ἔφερον τὰς τιμὰς τῶν πιπρασκομένων
translation:
  text: For there was not even any needy person among them, for as many as were owners
    of fields or houses, selling them, were bringing the proceeds of what was sold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prices of the things being sold.' The Greek is more literally 'the
      prices,' but 'proceeds' better conveys the sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδεής
  chosen: needy
  alternatives:
  - in need
  - poor
  lexicon: BDAG
  rationale: Conveys lack or need without narrowing the term to economic poverty alone.
    'Needy' fits the communal-support context and reads naturally in modern English.
- source_word: οὐδὲ γὰρ
  chosen: For ... not even
  alternatives:
  - For ... not
  - Indeed ... not even
  lexicon: BDAG
  rationale: γάρ gives explanatory force linking to the previous statement, while
    οὐδέ adds emphasis ('not even'). English idiom places 'for' first and renders
    the emphasis with 'not even.'
- source_word: τις ἦν ἐν αὐτοῖς
  chosen: there was ... among them
  alternatives:
  - anyone was among them
  - there existed among them
  lexicon: BDAG
  rationale: An existential construction is the most natural English equivalent for
    τις ἦν ἐν αὐτοῖς.
- source_word: ὅσοι
  chosen: as many as
  alternatives:
  - all who
  - whoever
  lexicon: BDAG
  rationale: Preserves the distributive/indefinite scope of the relative pronoun,
    indicating all within that class without overstating universality beyond the group
    described.
- source_word: κτήτορες
  chosen: owners
  alternatives:
  - possessors
  - property owners
  lexicon: BDAG
  rationale: '''Owners'' is clear, idiomatic, and accurately reflects those possessing
    property. ''Possessors'' is too wooden; ''property owners'' is slightly more interpretive
    than needed.'
- source_word: χωρίων
  chosen: fields
  alternatives:
  - plots of land
  - lands
  lexicon: BDAG
  rationale: In this context χωρίον refers to parcels of land; 'fields' is concise
    and conventional, while still understandable.
- source_word: οἰκιῶν
  chosen: houses
  alternatives:
  - homes
  lexicon: BDAG
  rationale: A straightforward rendering of the concrete noun. 'Homes' could suggest
    domestic sentiment beyond the lexical sense.
- source_word: ὑπῆρχον
  chosen: were
  alternatives:
  - were existing as
  - belonged to the class of
  lexicon: BDAG
  rationale: Here ὑπάρχω functions idiomatically to indicate that such persons existed
    within the community. Simple 'were' is natural English.
- source_word: πωλοῦντες
  chosen: selling them
  alternatives:
  - after selling them
  - would sell them
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and implies the
    objects just mentioned. 'Selling them' preserves the participial flow without
    forcing a temporal nuance not explicit in the Greek.
- source_word: ἔφερον
  chosen: were bringing
  alternatives:
  - brought
  - used to bring
  lexicon: BDAG
  rationale: The imperfect suggests repeated or customary action in the narrative.
    'Were bringing' preserves that ongoing/repeated sense better than a simple past.
- source_word: τὰς τιμὰς
  chosen: the proceeds
  alternatives:
  - the prices
  - the sums
  lexicon: BDAG
  rationale: Although τιμή can mean 'price,' in this context the idiomatic sense is
    the money realized from the sale. 'Proceeds' communicates that naturally in English.
- source_word: τῶν πιπρασκομένων
  chosen: of what was sold
  alternatives:
  - of the things being sold
  - of the sold properties
  lexicon: BDAG
  rationale: The substantival participle refers to the items sold. 'Of what was sold'
    is idiomatic and sufficiently precise without over-specifying.
