id: ACT.4.15
reference: Acts 4:15
source:
  edition: SBLGNT
  text: κελεύσαντες δὲ αὐτοὺς ἔξω τοῦ συνεδρίου ἀπελθεῖν συνέβαλλον πρὸς ἀλλήλους
translation:
  text: But after ordering them to go outside the council, they began conferring with
    one another,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the Sanhedrin.' The Greek uses συνέδριον, which can refer to
      the Jewish ruling council or its assembled session.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were discussing among themselves' or 'they were deliberating with
      one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κελεύσαντες
  chosen: after ordering
  alternatives:
  - having ordered
  - commanding
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'Ordering' fits the authoritative setting without overstating
    tone.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous scene. 'But' fits
    the narrative turn as the council moves from public exchange to private deliberation.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Refers to Peter and John; simple pronoun is sufficient in English.
- source_word: ἔξω τοῦ συνεδρίου
  chosen: outside the council
  alternatives:
  - out of the Sanhedrin
  - outside the assembly
  lexicon: BDAG
  rationale: The phrase means outside the meeting/body's presence or chamber. 'Council'
    is clearer modern English than transliterating 'Sanhedrin' here, while still conveying
    the governing body.
- source_word: ἀπελθεῖν
  chosen: to go
  alternatives:
  - to leave
  - to depart
  lexicon: BDAG
  rationale: Complements κελεύσαντες. 'To go outside' is idiomatic with ἔξω and avoids
    redundancy that would arise with 'depart'.
- source_word: συνέβαλλον
  chosen: they began conferring
  alternatives:
  - they were discussing
  - they were deliberating
  - they were consulting
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action. In this context συμβάλλω πρὸς
    ἀλλήλους means to confer or deliberate together, not merely to 'throw together.'
    'Began conferring' captures the narrative onset of discussion in natural English.
- source_word: πρὸς ἀλλήλους
  chosen: with one another
  alternatives:
  - among themselves
  - to one another
  lexicon: BDAG
  rationale: Idiomatic reciprocal expression indicating mutual discussion.
