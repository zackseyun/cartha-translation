theological_decisions:
- issue: Description of communal property in the Jerusalem church
  chosen_reading: The verse is translated descriptively as reporting voluntary communal
    sharing, without importing a later economic or ecclesial system.
  alternative_readings:
  - A stronger communitarian formulation such as 'they owned everything together'
  - A weaker individualized formulation that minimizes shared possession
  rationale: The Greek states that no one claimed possessions as exclusively his own
    and that all things were common among them. The translation preserves that tension
    without turning the verse into a doctrinal endorsement of any later political
    or denominational model.
  doctrine_reference: Affirmations; Translation philosophy §3
