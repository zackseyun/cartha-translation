id: ACT.4.32
reference: Acts 4:32
source:
  edition: SBLGNT
  text: Τοῦ δὲ πλήθους τῶν πιστευσάντων ἦν ⸀καρδία καὶ ⸀ψυχὴ μία, καὶ οὐδὲ εἷς τι
    τῶν ὑπαρχόντων ⸀αὐτῷ ἔλεγεν ἴδιον εἶναι, ἀλλ’ ἦν αὐτοῖς ⸀πάντα κοινά.
translation:
  text: Now the multitude of those who had believed were of one heart and soul, and
    not even one of them said that anything belonging to him was his own, but all
    things were held in common among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'they shared everything.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'him' reflects the distributive singular in Greek ('to him'),
      referring to each person individually.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλήθους
  chosen: multitude
  alternatives:
  - group
  - number
  - community
  lexicon: BDAG
  rationale: πλῆθος denotes a large number or multitude. 'Multitude' preserves the
    sense of a sizable body without flattening it to the more generic 'group.'
- source_word: τῶν πιστευσάντων
  chosen: of those who had believed
  alternatives:
  - of the believers
  - of those who believed
  lexicon: BDAG
  rationale: The aorist participle πιστευσάντων is rendered 'those who had believed'
    to reflect prior action relative to the narrative description. 'Believers' is
    possible but less transparent to the verbal form.
- source_word: καρδία καὶ ψυχὴ μία
  chosen: of one heart and soul
  alternatives:
  - one heart and one soul
  - one in heart and soul
  lexicon: BDAG
  rationale: This idiom expresses profound unity of inner life and purpose. 'Of one
    heart and soul' is natural English and preserves both nouns rather than collapsing
    them into a paraphrase like 'fully united.'
- source_word: οὐδὲ εἷς
  chosen: not even one of them
  alternatives:
  - no one
  - not one
  lexicon: BDAG
  rationale: The expression is emphatic. 'Not even one of them' brings out the force
    of οὐδὲ while fitting the following singular construction in English.
- source_word: τι τῶν ὑπαρχόντων αὐτῷ
  chosen: anything belonging to him
  alternatives:
  - any of his possessions
  - anything he owned
  lexicon: BDAG
  rationale: τῶν ὑπαρχόντων refers to one's possessions or property, literally 'the
    things belonging to him.' This rendering preserves the possessive sense without
    sounding wooden. Because the Greek singular αὐτῷ is distributive, English singular
    'him' matches the source form.
- source_word: ἔλεγεν ἴδιον εἶναι
  chosen: said that ... was his own
  alternatives:
  - claimed ... as his own
  - said ... belonged exclusively to him
  lexicon: BDAG
  rationale: ἴδιον emphasizes private ownership or what is one's own. 'Said that ...
    was his own' stays close to the Greek wording and avoids overinterpreting the
    social practice.
- source_word: πάντα κοινά
  chosen: all things were held in common among them
  alternatives:
  - everything was common to them
  - they shared everything
  lexicon: BDAG
  rationale: κοινά means common/shared. 'Were held in common among them' preserves
    the predicate structure and communal sense. 'They shared everything' is smoother
    but more dynamic and slightly more interpretive than the Greek copular clause.
