id: ACT.4.5
reference: Acts 4:5
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐπὶ τὴν αὔριον συναχθῆναι αὐτῶν τοὺς ἄρχοντας καὶ ⸀τοὺς πρεσβυτέρους
    καὶ ⸁τοὺς γραμματεῖς ⸀ἐν Ἰερουσαλήμ
translation:
  text: And it happened that on the next day their rulers and elders and scribes were
    gathered together in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled' or 'came together.' The Greek verb is passive in form ('were
      gathered together').
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: BDAG
  rationale: The impersonal narrative formula ἐγένετο with δέ commonly advances the
    story. 'And it happened' preserves the narrative feel without archaic diction
    like 'came to pass.'
- source_word: ἐπὶ τὴν αὔριον
  chosen: on the next day
  alternatives:
  - on the following day
  - the next day
  lexicon: BDAG
  rationale: This idiom means 'on the next/following day.' 'On the next day' is natural
    English and preserves the temporal marker introduced by ἐπί with the accusative.
- source_word: συναχθῆναι
  chosen: were gathered together
  alternatives:
  - assembled
  - came together
  lexicon: BDAG
  rationale: The aorist passive infinitive after ἐγένετο expresses the event that
    took place. 'Were gathered together' reflects the passive form and the collective
    sense of συνάγω more closely than the simpler 'assembled.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - of them
  lexicon: BDAG
  rationale: The genitive pronoun most naturally refers to Peter and John / the Jewish
    populace in context, identifying the leadership group as 'their' rulers. This
    is idiomatic English and preserves the relational force better than a wooden 'of
    them.'
- source_word: τοὺς ἄρχοντας
  chosen: rulers
  alternatives:
  - leaders
  - chief men
  lexicon: BDAG
  rationale: ἄρχοντες here refers to governing authorities among the Jewish leadership.
    'Rulers' is the standard and sufficiently broad rendering in this setting.
- source_word: τοὺς πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  lexicon: BDAG
  rationale: In this institutional context πρεσβύτεροι denotes recognized community
    leaders, not merely older males. 'Elders' is the established and contextually
    precise rendering.
- source_word: τοὺς γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: γραμματεῖς refers to the recognized scribal/legal class. 'Scribes' is
    concise and traditional; alternatives interpret their function more explicitly
    but move beyond the lexical form.
- source_word: ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Straightforward locative phrase. 'In Jerusalem' is the natural rendering.
