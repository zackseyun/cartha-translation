theological_decisions:
- issue: Referent of αὐτῶν in the phrase describing the assembled authorities
  chosen_reading: Rendered as 'their' to preserve the Greek relational pronoun without
    over-specifying the antecedent.
  alternative_readings:
  - 'Rendered implicitly by omitting the pronoun in English: ''the rulers and elders
    and scribes assembled'''
  - Interpreted more specifically as 'the Jewish rulers...'
  rationale: The Greek includes αὐτῶν, and the translation should preserve it. At
    the same time, the antecedent is contextual rather than explicit in the verse
    itself, so the English should not import a narrower identification than the text
    states.
  doctrine_reference: Translation philosophy §1, §3, §5
