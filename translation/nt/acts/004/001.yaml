id: ACT.4.1
reference: Acts 4:1
source:
  edition: SBLGNT
  text: Λαλούντων δὲ αὐτῶν πρὸς τὸν λαὸν ἐπέστησαν αὐτοῖς οἱ ⸀ἱερεῖς καὶ ὁ στρατηγὸς
    τοῦ ἱεροῦ καὶ οἱ Σαδδουκαῖοι,
translation:
  text: Now while they were speaking to the people, the priests and the captain of
    the temple and the Sadducees came upon them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came up to them' or 'approached them.' The Greek verb can denote sudden
      arrival or approach; the context suggests an official interruption.
    reason: lexical_alternative
  - marker: b
    text: The 'captain of the temple' was the official in charge of order and security
      in the temple precincts.
    reason: cultural_note
lexical_decisions:
- source_word: Λαλούντων δὲ αὐτῶν
  chosen: Now while they were speaking
  alternatives:
  - And as they were speaking
  - While they were speaking
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a temporal subordinate clause
    in natural English. δέ is carried by 'Now' to mark narrative progression without
    overtranslating.
- source_word: πρὸς τὸν λαὸν
  chosen: to the people
  alternatives:
  - to the crowd
  - to the populace
  lexicon: BDAG
  rationale: λαός commonly means 'people'; here it refers to the gathered people in
    the temple setting. 'People' is both accurate and natural, while 'crowd' is possible
    but slightly more interpretive.
- source_word: ἐπέστησαν αὐτοῖς
  chosen: came upon them
  alternatives:
  - approached them
  - stood by them
  - confronted them
  lexicon: BDAG
  rationale: ἐφίστημι can mean to come upon, approach, or suddenly appear. In this
    context of official interruption, 'came upon them' preserves the sense of sudden
    arrival without importing a stronger hostile nuance than the verb itself requires.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - the chief priests
  lexicon: BDAG
  rationale: The Greek is simply ἱερεῖς, not ἀρχιερεῖς. Therefore 'the priests' is
    the precise rendering and avoids importing rank not present in the text.
- source_word: ὁ στρατηγὸς τοῦ ἱεροῦ
  chosen: the captain of the temple
  alternatives:
  - the temple captain
  - the commander of the temple guard
  lexicon: BDAG
  rationale: στρατηγός denotes an official commander. 'Captain of the temple' is a
    clear, established rendering that communicates the office without overexpanding
    the phrase. 'Temple guard' is explanatory but not explicit in the Greek.
- source_word: οἱ Σαδδουκαῖοι
  chosen: the Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the group name is appropriate, following
    the principle of transliterating names.
