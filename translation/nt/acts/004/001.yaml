theological_decisions:
- issue: Potentially adversarial nuance of the officials' arrival
  chosen_reading: Render ἐπέστησαν neutrally as 'came upon them' rather than more
    interpretive 'confronted them.'
  alternative_readings:
  - confronted them
  - came up to them
  rationale: The broader context shows opposition, but this verse itself primarily
    narrates the arrival of temple authorities. A neutral rendering preserves the
    narrative tension without overstating the hostility in the verb alone.
  doctrine_reference: Preserve theological tension rather than resolve it.
