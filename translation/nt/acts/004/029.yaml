theological_decisions:
- issue: Rendering δοῦλος in address to God
  chosen_reading: your servants
  alternative_readings:
  - your slaves
  - your bondservants
  rationale: The doctrine guidelines allow 'servant / slave' context-dependently.
    In this prayer setting, the relational posture of submission to God is foregrounded
    more than the bonded-status metaphor. Therefore 'servants' best fits the immediate
    context without denying the stronger sense δοῦλος can carry elsewhere.
