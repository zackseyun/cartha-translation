id: ACT.4.29
reference: Acts 4:29
source:
  edition: SBLGNT
  text: καὶ τὰ νῦν, κύριε, ἔπιδε ἐπὶ τὰς ἀπειλὰς αὐτῶν καὶ δὸς τοῖς δούλοις σου μετὰ
    παρρησίας πάσης λαλεῖν τὸν λόγον σου,
translation:
  text: And now, Lord, look upon their threats and grant your servants to speak your
    word with all boldness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your slaves' or 'your bondservants'; Greek doulos can denote one who
      belongs to a master. Here 'servants' is used because the prayer context foregrounds
      humble service to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τὰ νῦν
  chosen: And now
  alternatives:
  - And as for now
  - And at this time
  lexicon: BDAG
  rationale: Idiomatic discourse transition in prayer. The article with νῦν forms
    an adverbial expression meaning 'now' or 'as things now stand.' 'And now' is natural
    English and preserves the petition's movement from citation of Scripture to present
    request.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address to God in prayer. Per doctrine defaults, κύριος is rendered
    'Lord.' 'Master' is possible in some contexts but is less fitting here given prayer
    language and established NT usage.
- source_word: ἔπιδε ἐπὶ
  chosen: look upon
  alternatives:
  - take notice of
  - look at
  - regard
  lexicon: BDAG
  rationale: Aorist imperative asking God to attend to or take notice of something.
    'Look upon' preserves the concrete imagery and prayerful tone better than the
    flatter 'take notice of.'
- source_word: ἀπειλὰς
  chosen: threats
  alternatives:
  - threatenings
  lexicon: BDAG
  rationale: Standard and clear rendering of the plural noun. 'Threatenings' is archaic
    in modern English.
- source_word: δὸς
  chosen: grant
  alternatives:
  - give
  lexicon: BDAG
  rationale: Although literally 'give,' English prayer idiom commonly uses 'grant'
    for a requested enablement. This preserves the imperative force while sounding
    natural and reverent.
- source_word: τοῖς δούλοις σου
  chosen: your servants
  alternatives:
  - your slaves
  - your bondservants
  lexicon: BDAG
  rationale: δοῦλος can be 'slave' or 'servant' per doctrine defaults. Here the emphasis
    is humble belonging to God within a prayer, not the bonded social institution
    itself. 'Your servants' is the most natural English in this context while still
    conveying subordination to God.
- source_word: μετὰ παρρησίας πάσης
  chosen: with all boldness
  alternatives:
  - with complete boldness
  - with all confidence
  - with full openness
  lexicon: BDAG
  rationale: παρρησία here denotes fearless openness in proclamation. 'With all boldness'
    is idiomatic, preserves the intensifying πάσης, and matches the evangelistic context.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to proclaim
  lexicon: BDAG
  rationale: Infinitive dependent on 'grant,' expressing what they ask to be enabled
    to do. 'Speak' is the plain lexical sense; 'proclaim' is interpretive and stronger
    than the Greek requires.
- source_word: τὸν λόγον σου
  chosen: your word
  alternatives:
  - your message
  lexicon: BDAG
  rationale: λόγος in Acts often refers to God's spoken message/gospel proclamation.
    'Your word' preserves the biblical idiom and theological resonance, while 'your
    message' is possible but less textually transparent.
