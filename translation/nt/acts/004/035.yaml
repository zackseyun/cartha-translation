theological_decisions:
- issue: Whether to make explicit the object being laid/distributed
  chosen_reading: Keep the implied object unstated in English except by pronoun ('them'
    / 'it'), allowing the context from v.34 to supply that these are the proceeds
    from sold properties.
  alternative_readings:
  - Explicitly supply 'the money'
  - Explicitly supply 'the proceeds' in both clauses
  rationale: The Greek leaves the object implicit, relying on the previous verse.
    Supplying a pronoun preserves the textual flow and avoids adding interpretive
    specificity beyond what the immediate context already provides, while still yielding
    readable English.
  doctrine_reference: Translation philosophy §1, §5
