id: ACT.4.35
reference: Acts 4:35
source:
  edition: SBLGNT
  text: καὶ ἐτίθουν παρὰ τοὺς πόδας τῶν ἀποστόλων· διεδίδετο δὲ ἑκάστῳ καθότι ἄν τις
    χρείαν εἶχεν.
translation:
  text: and they were laying them at the apostles’ feet, and it was being distributed
    to each one as anyone had need.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the apostles.' The Greek literally says 'beside/at the feet of
      the apostles,' preserving the image of placing the proceeds under apostolic
      oversight.
    reason: lexical_alternative
  - marker: b
    text: 'The object of ''they were laying'' and ''it was being distributed'' is
      implied from the previous verse: the proceeds from what had been sold.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐτίθουν
  chosen: they were laying
  alternatives:
  - they laid
  - they would place
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing/repeated action in the narrative,
    so an English progressive best reflects the aspect. 'Laying' fits the concrete
    act of placing proceeds before the apostles.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων
  chosen: at the apostles’ feet
  alternatives:
  - before the apostles
  - beside the apostles’ feet
  lexicon: BDAG
  rationale: This is a conventional idiom for placing something before someone's authority
    or care, but the physical image should be preserved. 'At the apostles’ feet' is
    natural English and keeps the concrete wording.
- source_word: διεδίδετο
  chosen: it was being distributed
  alternatives:
  - it was distributed
  - distribution was made
  lexicon: BDAG
  rationale: The imperfect passive again suggests ongoing customary action. The singular
    passive verb naturally refers to the proceeds/money implied from the previous
    verse, so 'it was being distributed' preserves the impersonal/passive sense without
    over-specifying the subject.
- source_word: ἑκάστῳ
  chosen: to each one
  alternatives:
  - to each
  - to every person
  lexicon: BDAG
  rationale: Dative singular indicates individual distribution. 'Each one' is slightly
    more explicit and natural in English while preserving the distributive force.
- source_word: καθότι ἄν τις χρείαν εἶχεν
  chosen: as anyone had need
  alternatives:
  - according as anyone had need
  - to the extent that anyone had need
  lexicon: BDAG
  rationale: The clause expresses proportion or correspondence to need. 'As anyone
    had need' is idiomatic modern English and closely matches the Greek sense without
    paraphrase.
- source_word: τις
  chosen: anyone
  alternatives:
  - someone
  - any person
  lexicon: BDAG
  rationale: Indefinite τις in this context is generic rather than specifically masculine.
    'Anyone' conveys the generic force naturally in English.
- source_word: χρείαν
  chosen: need
  alternatives:
  - necessity
  lexicon: BDAG
  rationale: χρεία commonly denotes need or necessity. 'Need' is the clearest and
    most natural modern rendering.
