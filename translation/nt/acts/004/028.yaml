theological_decisions:
- issue: Rendering of προώρισεν in a context touching divine sovereignty and human
    responsibility
  chosen_reading: had predestined
  alternative_readings:
  - had predetermined
  - had decided beforehand
  - had foreordained
  rationale: The Greek verb προορίζω straightforwardly denotes prior determination.
    In this prayer context, the text affirms God's prior purpose regarding the events
    surrounding Jesus' suffering without explicitly resolving broader theological
    systems. Following the doctrine guideline to preserve theological tension rather
    than resolve it, the translation keeps the strong term 'predestined' in the main
    text and preserves a less tradition-laden alternative in a footnote.
  doctrine_reference: Translation philosophy §3; ecumenical orthodoxy without denominational
    distinctives
