id: ACT.4.28
reference: Acts 4:28
source:
  edition: SBLGNT
  text: ποιῆσαι ὅσα ἡ χείρ σου καὶ ἡ ⸀βουλὴ προώρισεν γενέσθαι.
translation:
  text: to do whatever your hand and your purpose had predestined to happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had predetermined' or 'had decided beforehand.' The Greek verb indicates
      prior determination.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι
  chosen: to do
  alternatives:
  - to carry out
  - to accomplish
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/result following the preceding context;
    'to do' is the most direct and natural rendering, preserving the verbal connection
    without over-interpreting the nuance.
- source_word: ὅσα
  chosen: whatever
  alternatives:
  - all that
  - the things that
  lexicon: BDAG
  rationale: The relative pronoun in neuter plural with broad scope is well represented
    by 'whatever,' which is idiomatic in English and captures comprehensiveness.
- source_word: χείρ
  chosen: hand
  alternatives:
  - power
  lexicon: BDAG
  rationale: Literally 'hand.' Although it can function metaphorically for power or
    agency, retaining 'hand' preserves the concrete biblical idiom while allowing
    readers to perceive the metaphor.
- source_word: βουλή
  chosen: purpose
  alternatives:
  - plan
  - counsel
  - will
  lexicon: BDAG
  rationale: βουλή denotes deliberate intention or counsel. 'Purpose' is clear modern
    English and avoids sounding overly technical ('counsel') while preserving intentionality
    better than the broader 'will.'
- source_word: προώρισεν
  chosen: had predestined
  alternatives:
  - predetermined
  - decided beforehand
  - foreordained
  lexicon: BDAG
  rationale: The verb means to decide or determine beforehand. 'Had predestined' preserves
    the temporal priority and the strong force of the Greek. The pluperfect-like English
    sense fits the relation to the events now being described as having come to pass.
    Because the term is theologically charged, alternatives are preserved in a footnote
    and documented below.
- source_word: γενέσθαι
  chosen: to happen
  alternatives:
  - to take place
  - to come to pass
  - to be
  lexicon: BDAG
  rationale: Infinitive of γίνομαι here refers to events coming about. 'To happen'
    is natural modern English and fits the eventive sense better than the more wooden
    'to be.'
