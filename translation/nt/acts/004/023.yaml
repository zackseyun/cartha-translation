id: ACT.4.23
reference: Acts 4:23
source:
  edition: SBLGNT
  text: Ἀπολυθέντες δὲ ἦλθον πρὸς τοὺς ἰδίους καὶ ἀπήγγειλαν ὅσα πρὸς αὐτοὺς οἱ ἀρχιερεῖς
    καὶ οἱ πρεσβύτεροι εἶπαν.
translation:
  text: After they were released, they went to their own people and reported all that
    the chief priests and the elders had said to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to their own companions' or more literally 'to their own.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπολυθέντες
  chosen: After they were released
  alternatives:
  - When they had been released
  - After being set free
  lexicon: BDAG
  rationale: Aorist passive participle of ἀπολύω, here indicating prior action relative
    to the main verb. 'Released' fits the legal/custodial context better than the
    more general 'sent away.' 'After they were released' gives natural English while
    preserving the temporal participial force.
- source_word: δὲ
  chosen: After
  alternatives:
  - Now
  - And
  - Then
  lexicon: BDAG
  rationale: δέ is a mild connective. In English, its discourse function is adequately
    carried by the temporal participial clause 'After they were released,' so no separate
    conjunction is needed. This is a documented smoothing for readable modern English.
- source_word: ἦλθον
  chosen: they went
  alternatives:
  - they came
  lexicon: BDAG
  rationale: ἔρχομαι can be rendered 'come' or 'go' depending on viewpoint. Since
    the narrative perspective is not anchored at the destination in English, 'went'
    is the more natural idiomatic choice with πρὸς + accusative.
- source_word: πρὸς τοὺς ἰδίους
  chosen: to their own people
  alternatives:
  - to their own
  - to their companions
  - to their own group
  lexicon: BDAG
  rationale: The idiom τοὺς ἰδίους literally means 'their own,' referring to their
    own associates/community. 'Their own people' makes the referent clear in English
    without over-specifying beyond the Greek.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - told
  lexicon: BDAG
  rationale: ἀπαγγέλλω denotes reporting or relaying information. 'Reported' fits
    the formal recounting of what had happened and is slightly more precise than the
    broader 'told.'
- source_word: ὅσα
  chosen: all that
  alternatives:
  - whatever things
  - everything that
  lexicon: BDAG
  rationale: ὅσα introduces the full content of the report. 'All that' is concise,
    natural, and preserves the comprehensive sense.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - against them
  - to Peter and John
  lexicon: BDAG
  rationale: With λέγω, πρός + accusative commonly means speaking to someone. 'To
    them' is the straightforward contextual sense; 'against them' would overread hostility
    into the preposition itself.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural title referring to the leading priestly
    authorities, not multiple holders of the singular office of high priest.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the older men
  - the leaders
  lexicon: BDAG
  rationale: In this institutional context, πρεσβύτεροι refers to recognized Jewish
    leaders/council elders, not merely older men. 'The elders' is the established
    and contextually accurate rendering.
- source_word: εἶπαν
  chosen: had said
  alternatives:
  - said
  lexicon: BDAG
  rationale: English past perfect is appropriate because the speaking occurred prior
    to the subsequent reporting. This clarifies sequence in natural English without
    altering the Greek sense.
