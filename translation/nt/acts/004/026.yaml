theological_decisions:
- issue: Rendering of Χριστός in a Psalm 2 citation
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  - Anointed One
  rationale: Because the verse quotes Psalm 2:2 and presents χριστοῦ as a title in
    relation to 'the Lord,' 'Messiah' best preserves the Old Testament messianic framework.
    'Christ' is preserved as an alternative because of New Testament usage and reader
    familiarity.
