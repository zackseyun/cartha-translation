id: ACT.4.26
reference: Acts 4:26
source:
  edition: SBLGNT
  text: παρέστησαν οἱ βασιλεῖς τῆς γῆς καὶ οἱ ἄρχοντες συνήχθησαν ἐπὶ τὸ αὐτὸ κατὰ
    τοῦ κυρίου καὶ κατὰ τοῦ χριστοῦ αὐτοῦ.
translation:
  text: The kings of the earth took their stand, and the rulers were gathered together
    against the Lord and against his Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ'; Greek 'his Christos,' that is, 'his Anointed One.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρέστησαν
  chosen: took their stand
  alternatives:
  - stood
  - rose up
  - presented themselves
  lexicon: BDAG
  rationale: Aorist active of παρίστημι here echoes Psalm 2:2 and conveys a deliberate
    stance of opposition, not mere physical standing. 'Took their stand' preserves
    the idiomatic force and intertextual resonance better than a flat 'stood.'
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The noun specifically denotes kings, and retaining the more precise political
    title preserves the Psalm 2 quotation.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: BDAG
  rationale: In this Psalm 2 citation, γῆ likely has a broad, world-oriented sense
    rather than a localized 'land.' 'Of the earth' also matches established biblical
    idiom in this context.
- source_word: ἄρχοντες
  chosen: rulers
  alternatives:
  - leaders
  - princes
  lexicon: BDAG
  rationale: '''Rulers'' is the most natural modern English equivalent and fits the
    parallelism with ''kings'' without sounding archaic.'
- source_word: συνήχθησαν
  chosen: were gathered together
  alternatives:
  - assembled
  - came together
  lexicon: BDAG
  rationale: The passive form is preserved with 'were gathered together,' which reflects
    the Greek closely and maintains the formal echo of the Psalm citation. 'Assembled'
    is smoother but less transparent to the source wording.
- source_word: ἐπὶ τὸ αὐτό
  chosen: together
  alternatives:
  - in the same place
  - as one
  lexicon: BDAG
  rationale: This idiom means 'together' or 'at the same place.' In this context,
    'together' is concise and idiomatic in English while preserving the sense of coordinated
    opposition.
- source_word: κατὰ
  chosen: against
  alternatives:
  - in opposition to
  lexicon: BDAG
  rationale: The preposition clearly marks hostile opposition in both occurrences;
    'against' is the direct and natural rendering.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this quotation context
    it refers to God and carries scriptural-theological weight best preserved by 'Lord.'
- source_word: χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  - Anointed One
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is rendered 'Messiah' where it functions
    as a title. Here, in a Psalm 2 citation ('his anointed'), the titular and messianic
    sense is prominent, so 'Messiah' best preserves the Hebraic context.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - the Lord's
  lexicon: BDAG
  rationale: The pronoun naturally refers back to 'the Lord,' yielding 'his Messiah.'
    This preserves the relational sense of the Greek genitive pronoun.
