theological_decisions:
- issue: Apostolic compulsion is presented as inability rather than mere unwillingness.
  chosen_reading: The verse states that the apostles are unable to refrain from speaking.
  alternative_readings:
  - The verse could be paraphrased as strong resolve or moral necessity rather than
    literal inability.
  rationale: The Greek οὐ δυνάμεθα ... μὴ λαλεῖν most directly expresses inability
    to remain silent. The translation preserves that force rather than softening it
    to 'we will not stop speaking.' This avoids importing a weaker or more interpretive
    reading.
  doctrine_reference: Translation philosophy §1, §3
