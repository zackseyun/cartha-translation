theological_decisions:
- issue: Exclusivity of salvation in relation to Jesus
  chosen_reading: 'The verse is rendered with unqualified exclusivity: ''there is
    salvation in no one else.'''
  alternative_readings:
  - A softened rendering such as 'there is no other way of salvation'
  rationale: The Greek explicitly states that salvation is in no one else and grounds
    this in the absence of any other name under heaven. The translation preserves
    the text's exclusivist claim without adding explanatory doctrinal language beyond
    the verse itself.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Rendering ἀνθρώποις
  chosen_reading: '''among men'' in the main text, with inclusive alternative preserved
    in a footnote.'
  alternative_readings:
  - among human beings
  - among humanity
  rationale: Per the gender-accurate policy, representative/generic masculine language
    may be retained where it matches the source's intent. Here ἀνθρώποις is generic
    for humankind, so 'men' is acceptable in the main text, while a footnote preserves
    the inclusive sense for modern readers.
  doctrine_reference: 'Translation philosophy #4'
