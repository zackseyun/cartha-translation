id: ACT.4.3
reference: Acts 4:3
source:
  edition: SBLGNT
  text: καὶ ἐπέβαλον αὐτοῖς τὰς χεῖρας καὶ ἔθεντο εἰς τήρησιν εἰς τὴν αὔριον, ἦν γὰρ
    ἑσπέρα ἤδη.
translation:
  text: And they laid hands on them and put them in custody until the next day, for
    it was already evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seized them.' The Greek idiom is literally 'laid hands on them,' often
      used for hostile apprehension.
    reason: lexical_alternative
  - marker: b
    text: Or 'put them in jail' or 'placed them under guard.' The Greek speaks of
      keeping them in custody without specifying the exact facility.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβαλον ... τὰς χεῖρας
  chosen: laid hands on
  alternatives:
  - seized
  - arrested
  lexicon: BDAG
  rationale: The idiom literally means 'laid the hands on' and in this hostile legal
    context conveys physical apprehension. 'Laid hands on' preserves the Greek expression
    while remaining natural English; 'seized' or 'arrested' capture the sense but
    flatten the idiom.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to Peter and John; simple object rendering
    in English is most natural after the idiom 'laid hands on them.'
- source_word: ἔθεντο εἰς τήρησιν
  chosen: put them in custody
  alternatives:
  - put them in jail
  - placed them under guard
  - held them
  lexicon: BDAG
  rationale: τήρησις denotes keeping, guarding, or custody. 'Put them in custody'
    is clear modern English and does not over-specify a prison structure, while still
    conveying official detention.
- source_word: εἰς τὴν αὔριον
  chosen: until the next day
  alternatives:
  - until tomorrow
  lexicon: BDAG
  rationale: The phrase is temporal. 'Until the next day' reads more naturally in
    narrative English than 'until tomorrow' and fits the formal setting.
- source_word: ἦν γὰρ ἑσπέρα ἤδη
  chosen: for it was already evening
  alternatives:
  - for it was already late
  - for evening had already come
  lexicon: BDAG
  rationale: This clause explains why the hearing was delayed. 'It was already evening'
    closely reflects the Greek while remaining idiomatic. 'Late' is interpretive and
    less precise than the explicit reference to evening.
