theological_decisions:
- issue: Rendering the Psalm 118:22 citation imagery
  chosen_reading: cornerstone
  alternative_readings:
  - capstone
  - head of the corner
  rationale: The verse identifies Jesus with the vindicated stone rejected by the
    builders. 'Cornerstone' preserves the traditional and likely architectural sense
    without importing extra doctrinal claims. Because the exact architectural referent
    is debated, alternatives are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
