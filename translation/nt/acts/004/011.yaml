id: ACT.4.11
reference: Acts 4:11
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ὁ λίθος ὁ ἐξουθενηθεὶς ὑφ’ ὑμῶν τῶν ⸀οἰκοδόμων, ὁ γενόμενος εἰς
    κεφαλὴν γωνίας.
translation:
  text: This is the stone that was rejected by you, the builders, which has become
    the cornerstone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the capstone'; more literally, 'the head of the corner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative referring emphatically to Jesus in the immediate context.
    'This' is natural English and preserves the direct identification.
- source_word: λίθος
  chosen: stone
  alternatives:
  - rock
  lexicon: BDAG
  rationale: '''Stone'' is the standard sense and preserves the Psalm 118 allusion.
    ''Rock'' would overstate the lexical sense here.'
- source_word: ἐξουθενηθεὶς
  chosen: rejected
  alternatives:
  - despised
  - treated as nothing
  lexicon: BDAG
  rationale: The verb carries the sense of treating with contempt or as worthless.
    In the building metaphor and in established Psalmic usage, 'rejected' best captures
    the functional result while remaining faithful to the semantic range.
- source_word: ὑφ’ ὑμῶν
  chosen: by you
  alternatives:
  - by you all
  lexicon: BDAG
  rationale: Retains the direct second-person accusation. English does not require
    marking the plural explicitly in the main text.
- source_word: οἰκοδόμων
  chosen: the builders
  alternatives:
  - those building
  - builders
  lexicon: BDAG
  rationale: The noun is metaphorical, referring to Israel's leaders in Peter's address.
    'The builders' preserves the metaphor and the scriptural quotation.
- source_word: γενόμενος
  chosen: has become
  alternatives:
  - became
  - came to be
  lexicon: BDAG
  rationale: The perfect-like English 'has become' communicates the completed change
    with present result in context better than the simple past.
- source_word: κεφαλὴν γωνίας
  chosen: the cornerstone
  alternatives:
  - the head of the corner
  - the chief cornerstone
  - the capstone
  lexicon: BDAG
  rationale: The phrase is an idiomatic construction from Psalm 118:22. 'Cornerstone'
    is the clearest modern English rendering and best fits the metaphor of the decisive,
    honored stone. 'Head of the corner' is too literal for modern readers; 'capstone'
    is possible but less likely in this context and should be preserved in a footnote.
