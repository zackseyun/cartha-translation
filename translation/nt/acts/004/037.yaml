theological_decisions:
- issue: Whether to preserve the physical idiom of presenting the money to apostolic
    authority
  chosen_reading: Retained the concrete expression 'laid it at the apostles’ feet.'
  alternative_readings:
  - render the sense only as 'gave it to the apostles'
  rationale: The verse describes an actual act of presentation and also carries the
    social implication of submitting the gift to apostolic oversight. Preserving the
    idiom maintains both the literal image and the narrative force without importing
    extra ecclesiological claims.
  doctrine_reference: Translation philosophy §1, §3, §6
