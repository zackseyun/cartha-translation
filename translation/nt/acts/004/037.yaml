id: ACT.4.37
reference: Acts 4:37
source:
  edition: SBLGNT
  text: ὑπάρχοντος αὐτῷ ἀγροῦ πωλήσας ἤνεγκεν τὸ χρῆμα καὶ ἔθηκεν ⸀παρὰ τοὺς πόδας
    τῶν ἀποστόλων.
translation:
  text: Since he owned a field, he sold it and brought the money and laid it at the
    apostles’ feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having a field' or 'since he had a field.' The Greek uses a genitive
      absolute to give background circumstance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the proceeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπάρχοντος αὐτῷ ἀγροῦ
  chosen: Since he owned a field
  alternatives:
  - having a field
  - there being a field belonging to him
  - since he had a field
  lexicon: BDAG
  rationale: The genitive absolute gives background circumstance. ὑπάρχω here conveys
    possession/existence in relation to him, and idiomatic English is best expressed
    as 'owned' or 'had.' 'Since he owned a field' preserves the circumstantial force
    and reads naturally.
- source_word: ἀγροῦ
  chosen: a field
  alternatives:
  - a piece of land
  - a farm
  lexicon: BDAG
  rationale: ἀγρός commonly denotes a field or tract of land. 'Field' is the most
    direct and sufficiently broad rendering here.
- source_word: πωλήσας
  chosen: he sold it
  alternatives:
  - having sold it
  - after selling it
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verbs. English finite
    coordination ('he sold it and brought...') communicates the sequence clearly.
    'It' is supplied naturally from the context, referring to the field.
- source_word: ἤνεγκεν
  chosen: brought
  alternatives:
  - carried
  - bore
  lexicon: BDAG
  rationale: φέρω in this context means to bring/carry. 'Brought' is the most natural
    English choice for delivering proceeds to the apostles.
- source_word: τὸ χρῆμα
  chosen: the money
  alternatives:
  - the proceeds
  - the sum of money
  lexicon: BDAG
  rationale: χρῆμα here refers to money, specifically the sale proceeds. 'The money'
    is straightforward and idiomatic; 'the proceeds' is possible but slightly more
    interpretive.
- source_word: ἔθηκεν
  chosen: laid
  alternatives:
  - placed
  - set
  lexicon: BDAG
  rationale: τίθημι means to put/place. In the idiom with 'at the feet,' 'laid' is
    the most natural English rendering and matches the solemnity of the scene.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων
  chosen: at the apostles’ feet
  alternatives:
  - before the apostles
  - beside the apostles' feet
  lexicon: BDAG
  rationale: This is a conventional expression for placing something before someone
    in submission to their authority or for their administration. 'At the apostles’
    feet' preserves the concrete imagery of the Greek.
