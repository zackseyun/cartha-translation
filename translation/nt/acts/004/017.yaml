id: ACT.4.17
reference: Acts 4:17
source:
  edition: SBLGNT
  text: ἀλλ’ ἵνα μὴ ἐπὶ πλεῖον διανεμηθῇ εἰς τὸν λαόν, ⸀ἀπειλησώμεθα αὐτοῖς μηκέτι
    λαλεῖν ἐπὶ τῷ ὀνόματι τούτῳ μηδενὶ ἀνθρώπων.
translation:
  text: But so that it may not spread any further among the people, let us warn them
    not to speak any longer to anyone in this name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'let us threaten them.' The Greek verb carries an overtone
      of intimidation by authorities.
    reason: lexical_alternative
lexical_decisions:
- source_word: διανεμηθῇ
  chosen: may not spread
  alternatives:
  - may not be distributed
  - may not be spread abroad
  lexicon: BDAG
  rationale: Although the verb can more literally suggest being distributed or spread
    around, in this context the subject is the report/message about the apostles'
    act and teaching, so 'spread' best captures the idiomatic sense in natural English
    without over-paraphrasing.
- source_word: ἐπὶ πλεῖον
  chosen: any further
  alternatives:
  - more widely
  - to a greater extent
  lexicon: BDAG
  rationale: This idiom expresses extension beyond the present point. 'Any further'
    is concise, natural English and preserves the comparative force.
- source_word: λαός
  chosen: the people
  alternatives:
  - the populace
  - the crowd
  lexicon: BDAG
  rationale: In Acts this commonly refers to the people at large, especially the Jewish
    public. 'The people' is the most natural and sufficiently broad rendering.
- source_word: ἀπειλησώμεθα
  chosen: let us warn them
  alternatives:
  - let us threaten them
  - let us sternly warn them
  lexicon: BDAG
  rationale: The verb fundamentally means to threaten, but in English 'threaten them
    not to speak' can sound awkward. 'Warn them' fits the infinitive construction
    smoothly while still conveying official intimidation; the stronger alternative
    is preserved in a footnote.
- source_word: μηκέτι λαλεῖν
  chosen: not to speak any longer
  alternatives:
  - to speak no longer
  - to stop speaking
  lexicon: BDAG
  rationale: This preserves both the negative and the temporal force of μηκέτι. 'Any
    longer' communicates cessation from this point onward.
- source_word: ἐπὶ τῷ ὀνόματι τούτῳ
  chosen: in this name
  alternatives:
  - on the basis of this name
  - in connection with this name
  lexicon: BDAG
  rationale: In Acts, speaking 'in the name' refers to invoking or speaking under
    the authority/association of Jesus' name. 'In this name' is the established and
    contextually accurate English rendering.
- source_word: μηδενὶ ἀνθρώπων
  chosen: to anyone
  alternatives:
  - to no one
  - to any person
  lexicon: BDAG
  rationale: The dative with the infinitive indicates the audience of the prohibited
    speech. 'To anyone' is idiomatic English after a negative main clause ('not to
    speak ... to anyone'). Although ἄνθρωπος is formally 'man/person,' the sense here
    is generic, so gender-accurate English favors 'anyone'.
