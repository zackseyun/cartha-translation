theological_decisions:
- issue: Force of ἀπειλησώμεθα in the council's response
  chosen_reading: Render with the smoother English 'let us warn them' in the main
    text while preserving the stronger 'threaten' nuance in a footnote.
  alternative_readings:
  - let us threaten them
  rationale: The scene is juridical and coercive, so the underlying force is stronger
    than a mild warning. However, optimal equivalence favors natural English syntax
    in the main text. Because the coercive nuance is significant for interpretation,
    the stronger lexical alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §5 (documented exception/variance) and
    §6 (readable modern English)
