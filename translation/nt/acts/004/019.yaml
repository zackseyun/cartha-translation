theological_decisions:
- issue: Whether ἀκούειν should be rendered more interpretively as 'obey' in the contrast
    between human authorities and God
  chosen_reading: Retain the more literal 'listen to you rather than to God' in the
    main text
  alternative_readings:
  - obey you rather than God
  rationale: The context clearly concerns obedience, but the Greek uses ἀκούω rather
    than a more explicit obedience verb. Following the translation philosophy, the
    main text preserves the source wording and theological tension without importing
    a stronger term than the text itself uses.
  doctrine_reference: Translation philosophy §1, §3
