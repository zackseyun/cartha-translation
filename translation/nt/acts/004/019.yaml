id: ACT.4.19
reference: Acts 4:19
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος καὶ Ἰωάννης ἀποκριθέντες ⸂εἶπον πρὸς αὐτούς⸃· Εἰ δίκαιόν ἐστιν
    ἐνώπιον τοῦ θεοῦ ὑμῶν ἀκούειν μᾶλλον ἢ τοῦ θεοῦ, κρίνατε,
translation:
  text: But Peter and John answered and said to them, “If it is right in the sight
    of God to listen to you rather than to God, judge for yourselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “obey you rather than God.” The Greek verb is literally
      “listen to/hear,” but in context it carries the sense of heeding authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες ... εἶπον
  chosen: answered and said
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: The participle plus finite verb is a common Semitic-influenced Greek
    expression. Rendering both elements preserves the form without becoming unnatural;
    'answered and said' is transparent and idiomatic enough in English.
- source_word: δίκαιόν
  chosen: right
  alternatives:
  - just
  - fair
  - righteous
  lexicon: BDAG
  rationale: Here the adjective evaluates what is proper or justifiable in God's sight.
    'Right' is the most natural modern English equivalent in this direct-speech context,
    while still preserving the moral/judicial force.
- source_word: ἐνώπιον τοῦ θεοῦ
  chosen: in the sight of God
  alternatives:
  - before God
  - in God's presence
  lexicon: BDAG
  rationale: '''In the sight of God'' preserves the evaluative sense of what stands
    before God''s judgment. ''Before God'' is possible, but the chosen rendering is
    slightly clearer in contemporary English.'
- source_word: ἀκούειν
  chosen: to listen to
  alternatives:
  - to obey
  - to hear
  lexicon: BDAG
  rationale: The verb literally means 'to hear/listen.' In this context it carries
    the practical sense of heeding someone's command, but translating it as 'obey'
    would over-interpret the lexical form. 'Listen to' preserves the wording while
    allowing the implied contrast with obedience to God to remain evident.
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: This is the natural English comparative construction for contrasting
    two objects of listening/heeding.
- source_word: κρίνατε
  chosen: judge for yourselves
  alternatives:
  - judge
  - decide
  lexicon: BDAG
  rationale: The imperative invites the hearers to make the evaluation themselves.
    Adding 'for yourselves' makes explicit the reflexive force implied by the direct
    challenge in context, while remaining faithful to the discourse function.
- source_word: ὁ δὲ Πέτρος καὶ Ἰωάννης
  chosen: But Peter and John
  alternatives:
  - And Peter and John
  - Now Peter and John
  lexicon: BDAG
  rationale: δέ here marks mild contrast or transition. 'But' best reflects the adversative
    turn in response to the authorities' command.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - to these men
  lexicon: BDAG
  rationale: A straightforward pronominal rendering is sufficient; the referent is
    clear from context.
