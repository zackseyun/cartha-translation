theological_decisions:
- issue: Rendering Χριστοῦ as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The context is public proclamation about Jesus' identity and power before
    Israel's leaders, so the titular force is still active. This follows the doctrine
    guideline to translate titles where context supports.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Resurrection wording
  chosen_reading: whom God raised from the dead
  rationale: This preserves explicit divine agency and the historic Christian claim
    of Jesus' resurrection without importing additional doctrinal explanation beyond
    the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
