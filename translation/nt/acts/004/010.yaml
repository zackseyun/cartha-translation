id: ACT.4.10
reference: Acts 4:10
source:
  edition: SBLGNT
  text: γνωστὸν ἔστω πᾶσιν ὑμῖν καὶ παντὶ τῷ λαῷ Ἰσραὴλ ὅτι ἐν τῷ ὀνόματι Ἰησοῦ Χριστοῦ
    τοῦ Ναζωραίου, ὃν ὑμεῖς ἐσταυρώσατε, ὃν ὁ θεὸς ἤγειρεν ἐκ νεκρῶν, ἐν τούτῳ οὗτος
    παρέστηκεν ἐνώπιον ὑμῶν ὑγιής.
translation:
  text: let it be known to all of you and to all the people of Israel that by the
    name of Jesus the Messiah of Nazareth, whom you crucified, whom God raised from
    the dead—by him this man stands before you healthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Jesus Christ of Nazareth." The Greek title Χριστός can be rendered "Messiah"
      or, in more name-like usage, "Christ."
    reason: alternative_reading
  - marker: b
    text: Or "by this name." The phrase ἐν τούτῳ may refer instrumentally to Jesus
      himself or more specifically to his name just mentioned.
    reason: lexical_alternative
  - marker: c
    text: Or "whole" or "well." The Greek ὑγιής denotes soundness or restored health.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ἔστω
  chosen: let it be known
  alternatives:
  - be it known
  - let it be made known
  lexicon: BDAG
  rationale: A natural English rendering of the impersonal imperative construction
    that preserves the formal force of a public declaration.
- source_word: πᾶσιν ὑμῖν καὶ παντὶ τῷ λαῷ Ἰσραήλ
  chosen: to all of you and to all the people of Israel
  alternatives:
  - to you all and to all the people of Israel
  lexicon: BDAG
  rationale: 'Retains the twofold audience distinction: the immediate hearers (''you'')
    and the broader covenant people (''the people of Israel'').'
- source_word: ἐν τῷ ὀνόματι
  chosen: by the name of
  alternatives:
  - in the name of
  - by the authority of
  lexicon: BDAG
  rationale: Here the phrase expresses effective agency or power by which the healing
    occurred. 'By the name of' preserves the idiom while communicating instrumentality
    more clearly in English than a strictly formal 'in the name of' in this context.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ is a title here rather than a fixed surname-like element. Per
    doctrine guidance, titles are translated where context supports, preserving the
    messianic sense.
- source_word: τοῦ Ναζωραίου
  chosen: of Nazareth
  alternatives:
  - the Nazarene
  lexicon: BDAG
  rationale: Both are possible, but 'of Nazareth' is the most immediately transparent
    English expression and fits the genitival construction after the name-title sequence.
- source_word: ὃν ὑμεῖς ἐσταυρώσατε
  chosen: whom you crucified
  lexicon: BDAG
  rationale: Direct and formal rendering of the aorist active indicative, preserving
    Peter's accusation against the audience.
- source_word: ὃν ὁ θεὸς ἤγειρεν ἐκ νεκρῶν
  chosen: whom God raised from the dead
  alternatives:
  - whom God raised out from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic English for resurrection language; it preserves both
    divine agency and bodily resurrection.
- source_word: ἐν τούτῳ
  chosen: by him
  alternatives:
  - by this name
  - in him
  - by this one
  lexicon: BDAG
  rationale: The dative demonstrative most naturally points back to Jesus just named,
    functioning instrumentally. 'By him' is concise and matches the following statement
    about the healed man's present condition. Because the Greek could also be understood
    as 'by this name,' that alternative is preserved in a footnote.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  lexicon: BDAG
  rationale: The demonstrative refers to the healed man standing present before the
    council. English normally supplies 'man' for clarity.
- source_word: παρέστηκεν ἐνώπιον ὑμῶν
  chosen: stands before you
  alternatives:
  - has stood before you
  - is standing before you
  lexicon: BDAG
  rationale: The perfect conveys a present state resulting from prior action; 'stands
    before you' is idiomatic and captures the current visible reality.
- source_word: ὑγιής
  chosen: healthy
  alternatives:
  - whole
  - well
  - sound
  lexicon: BDAG
  rationale: Describes restored physical soundness. 'Healthy' is clear modern English,
    though 'whole' is a traditional alternative with slightly broader connotations.
