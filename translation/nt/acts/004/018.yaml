id: ACT.4.18
reference: Acts 4:18
source:
  edition: SBLGNT
  text: καὶ καλέσαντες αὐτοὺς παρήγγειλαν ⸀τὸ καθόλου μὴ φθέγγεσθαι μηδὲ διδάσκειν
    ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ.
translation:
  text: And after calling them in, they ordered them not to speak at all or teach
    in the name of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not to say anything whatsoever or to teach in the name of Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσαντες
  chosen: after calling them in
  alternatives:
  - having called them
  - summoning them
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered with
    temporal force in English. 'Calling them in' fits the hearing context better than
    the more formal 'summoning them,' while preserving the action.
- source_word: παρήγγειλαν
  chosen: they ordered
  alternatives:
  - they commanded
  - they instructed
  lexicon: BDAG
  rationale: The verb denotes an authoritative directive. 'Ordered' communicates the
    force clearly in modern English without sounding overly formal.
- source_word: τὸ καθόλου
  chosen: at all
  alternatives:
  - absolutely
  - altogether
  - completely
  lexicon: BDAG
  rationale: The articular infinitive construction with καθόλου intensifies the prohibition.
    'At all' is idiomatic English that captures the emphatic totality of the ban.
- source_word: μὴ φθέγγεσθαι
  chosen: not to speak
  alternatives:
  - not to say anything
  - not to utter
  lexicon: BDAG
  rationale: φθέγγομαι refers to speaking or uttering. 'Speak' is the most natural
    English equivalent here and works well with the emphatic 'at all.'
- source_word: μηδὲ διδάσκειν
  chosen: or teach
  alternatives:
  - nor to teach
  lexicon: BDAG
  rationale: Coordinates a second prohibited activity with the first. 'Or teach' is
    smooth modern English after 'not to speak at all,' while preserving the sense
    of μηδέ.
- source_word: ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  chosen: in the name of Jesus
  alternatives:
  - on the basis of the name of Jesus
  - about Jesus' name
  lexicon: BDAG
  rationale: This prepositional phrase in Acts commonly denotes speaking/acting with
    reference to or under the authority of Jesus' name. 'In the name of Jesus' is
    the clearest and most idiomatic rendering in context.
- source_word: Ἰησοῦ
  chosen: Jesus
  lexicon: N/A
  rationale: Personal name is transliterated according to the project's stated policy.
