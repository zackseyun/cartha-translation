theological_decisions:
- issue: Force of the prohibition concerning witness to Jesus
  chosen_reading: A comprehensive ban on both speaking and teaching connected with
    Jesus
  alternative_readings:
  - A ban specifically on public proclamation rather than all speech
  rationale: The combination of τὸ καθόλου with μὴ φθέγγεσθαι μηδὲ διδάσκειν indicates
    an emphatic prohibition covering both verbal utterance and instruction. The translation
    preserves the breadth of the command without narrowing it to a specific mode beyond
    what the Greek states.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims'
