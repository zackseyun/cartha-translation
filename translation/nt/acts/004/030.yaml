id: ACT.4.30
reference: Acts 4:30
source:
  edition: SBLGNT
  text: ἐν τῷ τὴν χεῖρά ⸀σου ἐκτείνειν σε εἰς ἴασιν καὶ σημεῖα καὶ τέρατα γίνεσθαι
    διὰ τοῦ ὀνόματος τοῦ ἁγίου παιδός σου Ἰησοῦ.
translation:
  text: as you stretch out your hand for healing, and signs and wonders happen through
    the name of your holy servant Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your holy child Jesus.' The Greek word pais can mean either 'child'
      or 'servant'; here 'servant' is preferred because Acts echoes Isaiah's Servant
      language.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ ... ἐκτείνειν
  chosen: as you stretch out
  alternatives:
  - while you stretch out
  - in stretching out
  lexicon: BDAG
  rationale: The construction ἐν τῷ + infinitive commonly expresses contemporaneous
    circumstance ('while/as doing'). In context, continuing the prayer from v.29,
    idiomatic English is best served by 'as you stretch out,' which preserves the
    temporal-circumstantial force without woodenness.
- source_word: χεῖρά σου
  chosen: your hand
  lexicon: BDAG
  rationale: A literal rendering is natural in English and preserves the biblical
    idiom of divine action/power without interpretive expansion.
- source_word: εἰς ἴασιν
  chosen: for healing
  alternatives:
  - to heal
  - for cure
  lexicon: BDAG
  rationale: ἴασις denotes healing. 'For healing' closely reflects εἰς + accusative
    of purpose/result and fits the prayer's syntax.
- source_word: σημεῖα καὶ τέρατα
  chosen: signs and wonders
  alternatives:
  - miraculous signs and wonders
  lexicon: BDAG
  rationale: This is the standard paired expression in Acts. 'Signs and wonders' is
    both accurate and idiomatic; adding 'miraculous' would be interpretive and unnecessary.
- source_word: γίνεσθαι
  chosen: happen
  alternatives:
  - be done
  - take place
  - occur
  lexicon: BDAG
  rationale: γίνομαι here refers to events coming about. 'Happen' is natural modern
    English and avoids the slightly ambiguous passive feel of 'be done.'
- source_word: διὰ τοῦ ὀνόματος
  chosen: through the name
  alternatives:
  - by the name
  - through the authority of the name
  lexicon: BDAG
  rationale: διά with the genitive is most basically 'through.' Retaining 'name' preserves
    the biblical concept of agency/authority associated with Jesus' name without over-specifying
    it.
- source_word: τοῦ ἁγίου παιδός σου Ἰησοῦ
  chosen: of your holy servant Jesus
  alternatives:
  - of your holy child Jesus
  lexicon: BDAG
  rationale: παῖς can mean either 'child' or 'servant.' In Acts 3:13, 3:26, and here,
    the allusion to the Servant motif of Isaiah strongly favors 'servant.' This also
    avoids implying immaturity and better fits the exalted, mission-oriented context.
    'Holy' straightforwardly renders ἁγίου.
