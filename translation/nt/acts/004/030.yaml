theological_decisions:
- issue: Rendering παῖς for Jesus
  chosen_reading: servant
  alternative_readings:
  - child
  rationale: Although παῖς is lexically capable of meaning 'child' or 'servant,' the
    context in Acts repeatedly echoes Isaianic Servant language. Rendering it 'servant'
    preserves that canonical and theological connection without diminishing Jesus'
    holiness or sonship, which are taught elsewhere by other terms. The alternative
    is preserved in a footnote because it is a known translation option.
  doctrine_reference: Translation philosophy §1, §3, §5
