id: ACT.4.14
reference: Acts 4:14
source:
  edition: SBLGNT
  text: τόν ⸀τε ἄνθρωπον βλέποντες σὺν αὐτοῖς ἑστῶτα τὸν τεθεραπευμένον οὐδὲν εἶχον
    ἀντειπεῖν.
translation:
  text: And seeing the man who had been healed standing with them, they had nothing
    to say in reply.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they could say nothing against it' or 'they had nothing to contradict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τε
  chosen: And
  alternatives:
  - and indeed
  - and also
  - now
  lexicon: BDAG
  rationale: Here τε links this clause to the preceding narrative development. In
    natural English, a simple coordinating 'And' best carries the connective force
    without overtranslating the particle.
- source_word: ἄνθρωπον
  chosen: the man
  alternatives:
  - the person
  lexicon: BDAG
  rationale: The accusative singular refers to the specific male individual healed
    in the previous context. 'The man' is gender-accurate and contextually precise.
- source_word: βλέποντες
  chosen: seeing
  alternatives:
  - when they saw
  - looking at
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb and is naturally
    rendered as 'seeing' in English. 'When they saw' is possible, but 'seeing' preserves
    the participial structure while remaining readable.
- source_word: σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - beside them
  - in their company
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With them' is the most
    direct and idiomatic rendering.
- source_word: ἑστῶτα
  chosen: standing
  alternatives:
  - having stood
  - present
  lexicon: BDAG
  rationale: The perfect active participle of ἵστημι describes the healed man as being
    in a standing state. English idiom is best served by the stative 'standing' rather
    than a more wooden perfect form.
- source_word: τεθεραπευμένον
  chosen: who had been healed
  alternatives:
  - the one who had been healed
  - who had been cured
  - who had been restored
  lexicon: BDAG
  rationale: The perfect passive participle of θεραπεύω identifies the man by his
    completed healing with continuing result. 'Who had been healed' is clear, natural,
    and preserves the passive sense. 'Cured' is possible but can sound more clinical
    and less tied to the miracle context.
- source_word: οὐδὲν
  chosen: nothing
  alternatives:
  - not anything
  lexicon: BDAG
  rationale: οὐδέν functions as the object of εἶχον with the infinitive, expressing
    total lack. 'Nothing' is the natural English equivalent.
- source_word: εἶχον ἀντειπεῖν
  chosen: had nothing to say in reply
  alternatives:
  - had nothing to say against it
  - had nothing to contradict
  - could say nothing in opposition
  lexicon: BDAG
  rationale: The idiom ἔχω + infinitive here means they had no basis or ability to
    respond against the apostles' claim. 'Had nothing to say in reply' is idiomatic
    and preserves the adversative sense of ἀντειπεῖν without sounding overly formal.
    A stronger rendering like 'contradict' is possible, but 'say in reply' better
    reflects the verbal-response setting.
