theological_decisions:
- issue: Whether δύναμις should be rendered 'power' or interpreted as 'authority'
    in the leaders' question
  chosen_reading: power
  alternative_readings:
  - authority
  rationale: The Greek uses δύναμις, whose ordinary sense is 'power,' while the paired
    phrase 'in what name' already conveys representative authority. Rendering it 'power'
    preserves the distinction the question appears to make between operative power
    and invoked name.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
