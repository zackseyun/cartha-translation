id: ACT.4.7
reference: Acts 4:7
source:
  edition: SBLGNT
  text: καὶ στήσαντες αὐτοὺς ἐν ⸀τῷ μέσῳ ἐπυνθάνοντο· Ἐν ποίᾳ δυνάμει ἢ ἐν ποίῳ ὀνόματι
    ἐποιήσατε τοῦτο ὑμεῖς;
translation:
  text: And after setting them in the midst, they began asking, “By what power or
    in what name did you do this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “they were asking” or “they inquired.” The Greek imperfect may emphasize
      ongoing inquiry rather than the beginning of it.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσαντες
  chosen: after setting
  alternatives:
  - having set
  - when they had placed
  lexicon: BDAG
  rationale: Aorist participle of ἵστημι here is attendant/circumstantial, describing
    the action prior to the questioning. 'After setting' gives clear temporal sequence
    in natural English without over-paraphrasing.
- source_word: ἐν τῷ μέσῳ
  chosen: in the midst
  alternatives:
  - in the middle
  - before them
  lexicon: BDAG
  rationale: The phrase literally means 'in the midst' or 'in the middle.' 'In the
    midst' preserves the formal sense and the courtroom/interrogation setting better
    than the more interpretive 'before them.'
- source_word: ἐπυνθάνοντο
  chosen: they began asking
  alternatives:
  - they were asking
  - they inquired
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or inceptive past action. 'They began
    asking' captures the imperfect's likely inceptive nuance in this narrative context;
    'they inquired' is possible but less vivid.
- source_word: Ἐν ποίᾳ δυνάμει
  chosen: By what power
  alternatives:
  - In what power
  - By what authority
  lexicon: BDAG
  rationale: Although the Greek preposition is ἐν ('in'), idiomatic English with instrumental
    force is 'by.' 'Power' is the direct lexical equivalent of δύναμις; 'authority'
    would shift toward ἐξουσία and is therefore less precise.
- source_word: ἢ ἐν ποίῳ ὀνόματι
  chosen: or in what name
  alternatives:
  - or by what name
  lexicon: BDAG
  rationale: Retaining 'in what name' reflects the Greek wording and preserves the
    biblical idiom of acting 'in the name' of someone, which carries representative
    authority and invocation. 'By what name' is possible English but slightly flattens
    the idiom.
- source_word: ἐποιήσατε τοῦτο
  chosen: did you do this
  alternatives:
  - have you done this
  - did you make this happen
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this narrative interrogation.
    'Do this' is broad enough to refer to the healing/sign without adding explanatory
    material into the main text.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can convey the question
    naturally with 'you'; the emphasis is sufficiently carried by the interrogative
    context. 'You yourselves' is possible but sounds overstated in English.
