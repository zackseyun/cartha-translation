id: ACT.4.27
reference: Acts 4:27
source:
  edition: SBLGNT
  text: συνήχθησαν γὰρ ἐπ’ ἀληθείας ⸂ἐν τῇ πόλει ταύτῃ⸃ ἐπὶ τὸν ἅγιον παῖδά σου Ἰησοῦν,
    ὃν ἔχρισας, Ἡρῴδης τε καὶ Πόντιος Πιλᾶτος σὺν ἔθνεσιν καὶ λαοῖς Ἰσραήλ,
translation:
  text: For truly in this city Herod and Pontius Pilate, together with the Gentiles
    and the peoples of Israel, were gathered against your holy servant Jesus, whom
    you anointed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your holy child Jesus." The Greek παῖς can mean either "servant" or
      "child"; here "servant" is preferred because of the likely echo of Isaiah’s
      Servant language.
    reason: lexical_alternative
  - marker: b
    text: Or "the nations and the people of Israel." The Greek reads "Gentiles/nations"
      and "peoples" (plural) of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  chosen: were gathered
  alternatives:
  - assembled
  - came together
  lexicon: BDAG
  rationale: Aorist passive indicates a completed gathering; 'were gathered' preserves
    the passive form and the sense of coalition formation without overinterpreting
    agency.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this verse to the preceding citation/prayer explanation. 'For'
    is the most natural English discourse marker here.
- source_word: ἐπ’ ἀληθείας
  chosen: truly
  alternatives:
  - in truth
  - really
  lexicon: BDAG
  rationale: Idiomatic adverbial expression meaning 'in truth' or 'indeed.' 'Truly'
    is concise and natural in modern English while preserving the emphatic force.
- source_word: ἐν τῇ πόλει ταύτῃ
  chosen: in this city
  alternatives:
  - in this very city
  lexicon: BDAG
  rationale: Straightforward locative phrase. 'This city' naturally refers to Jerusalem
    in context without needing to make the referent explicit in the translation.
- source_word: ἐπὶ τὸν
  chosen: against
  alternatives:
  - concerning
  - toward
  lexicon: BDAG
  rationale: With verbs of hostile gathering, ἐπί + accusative carries adversative
    force. 'Against' best reflects the opposition directed toward Jesus.
- source_word: ἅγιον
  chosen: holy
  alternatives:
  - set apart
  lexicon: BDAG
  rationale: Standard rendering that preserves both consecration and moral holiness;
    here it marks Jesus as specially belonging to God.
- source_word: παῖδά σου
  chosen: your holy servant
  alternatives:
  - your holy child
  - your holy Son
  lexicon: BDAG
  rationale: παῖς can mean 'servant' or 'child,' but in Acts 3:13, 3:26, and 4:27,
    4:30 the Isaianic servant background makes 'servant' the best contextual rendering.
    'Son' is too interpretive here, though orthodox Christology is affirmed elsewhere.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: ὃν ἔχρισας
  chosen: whom you anointed
  alternatives:
  - whom you appointed
  lexicon: BDAG
  rationale: χρίω literally means 'anoint.' This preserves the messianic resonance
    and allusion to divine commissioning without importing the title 'Messiah' where
    the noun Χριστός is not present.
- source_word: Ἡρῴδης
  chosen: Herod
  lexicon: BDAG
  rationale: Standard transliteration of the ruler's name.
- source_word: τε καὶ
  chosen: and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The pair links Herod with Pontius Pilate. English can represent the coordination
    naturally with a single 'and' without loss of meaning.
- source_word: Πόντιος Πιλᾶτος
  chosen: Pontius Pilate
  lexicon: BDAG
  rationale: Standard transliteration of the Roman governor's name.
- source_word: σὺν
  chosen: together with
  alternatives:
  - with
  lexicon: BDAG
  rationale: Slightly fuller than simple 'with,' highlighting coalition and joint
    participation.
- source_word: ἔθνεσιν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In this Jewish/Israel contrast, 'Gentiles' best conveys non-Jewish peoples
    rather than nations in a geopolitical sense. This is the most contextually transparent
    English rendering.
- source_word: λαοῖς Ἰσραήλ
  chosen: the peoples of Israel
  alternatives:
  - the people of Israel
  lexicon: BDAG
  rationale: The Greek plural λαοῖς is textually present and should be reflected.
    'Peoples of Israel' is less idiomatic than the singular but preserves the source
    form, likely indicating the various groups within Israel.
