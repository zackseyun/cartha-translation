theological_decisions:
- issue: Rendering of παῖς for Jesus
  chosen_reading: servant
  alternative_readings:
  - child
  - Son
  rationale: The immediate prayer context echoes the Servant language of Isaiah and
    earlier Acts usage. 'Servant' preserves the biblical-theological connection without
    denying Jesus' sonship, which this specific term does not foreground.
  doctrine_reference: Translation philosophy §§1, 3, 5; Affirmations (Chalcedonian
    orthodoxy preserved without overtranslation)
- issue: Rendering of ἔθνεσιν in contrast with Israel
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: Because the phrase is coordinated with 'the peoples of Israel,' the contrast
    is ethnic-religious rather than merely political. 'Gentiles' communicates the
    intended distinction more clearly in English.
  doctrine_reference: Translation philosophy §§1, 6
