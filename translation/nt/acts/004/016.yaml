id: ACT.4.16
reference: Acts 4:16
source:
  edition: SBLGNT
  text: λέγοντες· Τί ⸀ποιήσωμεν τοῖς ἀνθρώποις τούτοις; ὅτι μὲν γὰρ γνωστὸν σημεῖον
    γέγονεν δι’ αὐτῶν πᾶσιν τοῖς κατοικοῦσιν Ἰερουσαλὴμ φανερόν, καὶ οὐ δυνάμεθα ⸀ἀρνεῖσθαι·
translation:
  text: saying, “What should we do with these men? For indeed, a well-known sign has
    happened through them, evident to all who live in Jerusalem, and we cannot deny
    it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a notable sign.” The Greek γνωστόν can mean “known, well-known,” and
      in context carries the sense of a publicly recognized sign.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: Present participle introducing the content of the council's speech; 'saying'
    is natural in English narrative and preserves the participial connection to the
    previous context.
- source_word: Τί ποιήσωμεν
  chosen: What should we do
  alternatives:
  - What are we to do
  - What shall we do
  lexicon: BDAG
  rationale: Aorist subjunctive in deliberative question. 'Should we do' conveys deliberation
    idiomatically in modern English without losing force.
- source_word: τοῖς ἀνθρώποις τούτοις
  chosen: with these men
  alternatives:
  - to these men
  lexicon: BDAG
  rationale: The dative after ποιέω in this idiom is best rendered 'do with' in English.
    ἄνθρωποι here refers specifically to male persons in context (Peter and John),
    so 'men' is gender-accurate.
- source_word: ὅτι μὲν γὰρ
  chosen: For indeed
  alternatives:
  - For certainly
  - Because indeed
  lexicon: BDAG
  rationale: This combination marks explanatory emphasis. 'For indeed' preserves both
    the explanatory and emphatic force without overloading the English.
- source_word: γνωστὸν σημεῖον
  chosen: a well-known sign
  alternatives:
  - a notable sign
  - a known sign
  lexicon: BDAG
  rationale: γνωστός can mean known or well-known/notable. In context, the sign is
    publicly recognized in Jerusalem, so 'well-known sign' best captures the public
    notoriety. 'Notable sign' is possible but slightly more interpretive and traditional.
- source_word: γέγονεν
  chosen: has happened
  alternatives:
  - has come about
  - has been done
  lexicon: BDAG
  rationale: Perfect tense indicates a completed event with present result. 'Has happened'
    is idiomatic and fits the occurrence of a sign.
- source_word: δι’ αὐτῶν
  chosen: through them
  alternatives:
  - by them
  lexicon: BDAG
  rationale: διά with genitive commonly expresses agency or instrumentality. 'Through
    them' preserves that the sign occurred by means of the apostles without overstating
    independent agency.
- source_word: πᾶσιν τοῖς κατοικοῦσιν Ἰερουσαλὴμ
  chosen: to all who live in Jerusalem
  alternatives:
  - to all the inhabitants of Jerusalem
  - to everyone living in Jerusalem
  lexicon: BDAG
  rationale: The dative phrase indicates those to whom the matter is evident. 'All
    who live in Jerusalem' is clear, natural, and faithful to the participial construction.
- source_word: φανερόν
  chosen: evident
  alternatives:
  - plain
  - manifest
  lexicon: BDAG
  rationale: Predicate adjective describing the sign's public visibility. 'Evident'
    is readable modern English and preserves the sense of something openly apparent.
- source_word: οὐ δυνάμεθα ἀρνεῖσθαι
  chosen: we cannot deny it
  alternatives:
  - we are not able to deny it
  - we cannot refuse to acknowledge it
  lexicon: BDAG
  rationale: ἀρνέομαι here means deny/disown. English requires an object, supplied
    from the preceding clause ('it,' i.e., the evident sign). This makes explicit
    what Greek leaves implicit.
