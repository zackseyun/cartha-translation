theological_decisions:
- issue: Nature of σημεῖον in public miracle context
  chosen_reading: sign
  alternative_readings:
  - miracle
  rationale: Acts often uses σημεῖον with theological weight as a sign pointing beyond
    the act itself. 'Sign' preserves Luke's wording and avoids flattening it to mere
    wonder-working, though the miraculous sense is present contextually.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
