theological_decisions:
- issue: Rendering of Δέσποτα as a divine title
  chosen_reading: Master
  alternative_readings:
  - Sovereign Lord
  - Sovereign
  - Lord
  rationale: To preserve lexical distinction from κύριος and avoid importing an additional
    title not present in the Greek. The context clearly addresses God with a title
    of absolute authority, but the translation keeps the source term's own semantic
    profile rather than harmonizing it to more familiar liturgical wording.
  doctrine_reference: Translation philosophy §1, §5; Contested terms table for κύριος
    distinguishes 'Lord' from other titles.
