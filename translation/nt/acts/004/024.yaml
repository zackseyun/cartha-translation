id: ACT.4.24
reference: Acts 4:24
source:
  edition: SBLGNT
  text: οἱ δὲ ἀκούσαντες ὁμοθυμαδὸν ἦραν φωνὴν πρὸς τὸν θεὸν καὶ εἶπαν· Δέσποτα, ⸀σὺ
    ὁ ποιήσας τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὴν θάλασσαν καὶ πάντα τὰ ἐν αὐτοῖς,
translation:
  text: When they heard this, they lifted their voices together to God and said, “Master,
    you are the one who made heaven and earth and sea, and everything in them,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with one accord.”
    reason: lexical_alternative
  - marker: b
    text: 'Or “Sovereign Lord.” Greek: Δέσποτα, a title emphasizing absolute authority;
      distinct from κύριος (“Lord”).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - after hearing
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context; English supplies 'this'
    from the discourse situation to make the object of hearing explicit and natural.
- source_word: ὁμοθυμαδόν
  chosen: together
  alternatives:
  - with one accord
  - unanimously
  lexicon: BDAG
  rationale: Conveys shared unity of action in idiomatic modern English. 'With one
    accord' is traditional but archaic; 'unanimously' is too deliberative for a prayer
    setting.
- source_word: ἦραν φωνήν
  chosen: they lifted their voices
  alternatives:
  - they raised their voice
  - they raised their voices
  lexicon: BDAG
  rationale: Idiomatic plural English for a collective outcry/prayer. Although Greek
    has singular 'voice,' English commonly uses plural 'voices' for a group speaking
    together while preserving the sense of united prayer.
- source_word: πρὸς τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: In prayer context πρός naturally means directed address to God; 'to God'
    is the clear idiomatic rendering.
- source_word: Δέσποτα
  chosen: Master
  alternatives:
  - Sovereign Lord
  - Sovereign
  - Lord
  lexicon: BDAG
  rationale: δεσπότης denotes an owner/master with absolute authority. 'Master' translates
    the title directly and distinguishes it from κύριος ('Lord'). 'Sovereign Lord'
    is interpretive and adds 'Lord,' which is not present here.
- source_word: σὺ ὁ ποιήσας
  chosen: you are the one who made
  alternatives:
  - you who made
  - you, having made
  - you made
  lexicon: BDAG
  rationale: The pronoun plus articular participle identifies God emphatically as
    the maker. 'You are the one who made' brings out the appositional force in natural
    English.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὴν θάλασσαν
  chosen: heaven and earth and sea
  alternatives:
  - the heaven and the earth and the sea
  - the sky and the land and the sea
  lexicon: BDAG
  rationale: Standard biblical creation formula; singular 'heaven' matches the Greek
    and echoes scriptural idiom.
- source_word: πάντα τὰ ἐν αὐτοῖς
  chosen: everything in them
  alternatives:
  - all that is in them
  - all things in them
  lexicon: BDAG
  rationale: Natural comprehensive English for all created contents of heaven, earth,
    and sea.
