  from: and that as the first to rise from the dead he would proclaim
  to: and, as the first to rise from the dead, would proclaim
  rationale: The Greek presents two parallel points about the Messiah, introduced
    by 'εἰ ... εἰ'. The current English rendering uses 'that... and that... he...',
    which is slightly redundant and less fluid. A more elegant and direct structure
    in English is to join the two predicates ('would suffer' and 'would proclaim')
    under a single 'that,' which better reflects the parallelism of the source text
    and improves the flow of the sentence.
