theological_decisions:
- issue: Resurrection phrasing and Christological implication
  chosen_reading: the Messiah is described as the first to rise from the dead in the
    sense of first in resurrection precedence, not as denying prior temporary restorations
    to life in Scripture.
  alternative_readings:
  - the firstfruits of the final resurrection
  - the first to rise never to die again
  rationale: The Greek states precedence (πρῶτος ἐξ ἀναστάσεως νεκρῶν) without spelling
    out the theological nuance. The translation preserves the wording without importing
    a fuller doctrinal explanation into the main text.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Scope of 'the people'
  chosen_reading: '''the people'' is left as written, with the Jewish referent implied
    by contrast with ''the Gentiles.'''
  alternative_readings:
  - the Jewish people
  - Israel
  rationale: The Greek uses λαός, and Luke often uses it as a covenantal designation
    for Israel. The main text preserves the source wording while allowing readers
    to infer the contrast; a footnote can clarify the likely referent.
  doctrine_reference: 'Translation philosophy #1; #5'
