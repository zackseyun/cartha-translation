id: ACT.26.23
reference: Acts 26:23
source:
  edition: SBLGNT
  text: εἰ παθητὸς ὁ χριστός, εἰ πρῶτος ἐξ ἀναστάσεως νεκρῶν φῶς μέλλει καταγγέλλειν
    τῷ ⸀τε λαῷ καὶ τοῖς ἔθνεσιν.
translation:
  text: that the Messiah would suffer, and that, as the first to rise from the dead,
    he would proclaim light both to the people and to the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title in a prophetic context.
    reason: alternative_reading
  - marker: b
    text: '''The people'' here likely refers to the Jewish people, in contrast with
      ''the Gentiles.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to the nations.' In this context the phrase commonly means the Gentiles.
    reason: lexical_alternative
  - marker: d
    text: Or 'and that as the first to rise from the dead he would proclaim'.
    reason: previous_rendering
lexical_decisions:
- source_word: παθητὸς
  chosen: would suffer
  alternatives:
  - subject to suffering
  - passible
  - sufferer
  lexicon: BDAG
  rationale: The adjective means 'capable of suffering' or 'destined to suffer.' In
    this prophetic-summary context, English verbalizes it naturally as 'would suffer,'
    which communicates the messianic necessity without awkward philosophical wording
    like 'passible.'
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like designation. Here Paul is summarizing what
    the prophets and Moses said about the anointed deliverer, so the titular sense
    is primary.
- source_word: πρῶτος
  chosen: the first
  alternatives:
  - first
  lexicon: BDAG
  rationale: Retained explicitly to preserve the claim of precedence. The article
    is not separately represented in English because 'the first' is the natural idiom.
- source_word: ἐξ ἀναστάσεως νεκρῶν
  chosen: to rise from the dead
  alternatives:
  - from the resurrection of the dead
  - out of resurrection from among the dead
  lexicon: BDAG
  rationale: The phrase is somewhat compressed in Greek. In context with πρῶτος and
    μέλλει καταγγέλλειν, the sense is that he is the first one arising from among
    the dead. 'To rise from the dead' is idiomatic English and preserves the resurrection
    claim.
- source_word: φῶς
  chosen: light
  alternatives:
  - illumination
  lexicon: BDAG
  rationale: The noun is kept as 'light,' preserving the biblical metaphor of revelation,
    salvation, and hope. A more interpretive gloss like 'illumination' would narrow
    the imagery too much.
- source_word: μέλλει καταγγέλλειν
  chosen: would proclaim
  alternatives:
  - was about to proclaim
  - was destined to proclaim
  - would announce
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys futurity or destined intention. In
    this indirect-summary construction after repeated εἰ, 'would proclaim' is the
    most natural English rendering. 'Was about to proclaim' would misleadingly suggest
    immediate imminence.
- source_word: τῷ τε λαῷ
  chosen: to the people
  alternatives:
  - to the Jewish people
  - to the people of Israel
  lexicon: BDAG
  rationale: λαός in Acts commonly refers to the Jewish people/Israel, especially
    in contrast with ἔθνεσιν. 'The people' preserves the Greek wording while allowing
    the contrast to signal the Jewish referent. The more explicit alternatives are
    interpretive and therefore better reserved for a note.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In this Jewish/Gentile contrast, ἔθνη is best rendered 'Gentiles' rather
    than the more literal 'nations,' since the latter can obscure the ethnic-religious
    contrast central to Luke-Acts.
- source_word: τε ... καὶ
  chosen: both ... and
  alternatives:
  - and ... and
  lexicon: LSJ
  rationale: The correlative construction is naturally represented in English as 'both
    ... and,' making the paired recipients explicit.
