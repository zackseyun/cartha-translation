id: ACT.26.16
reference: Acts 26:16
source:
  edition: SBLGNT
  text: ἀλλὰ ἀνάστηθι καὶ στῆθι ἐπὶ τοὺς πόδας σου· εἰς τοῦτο γὰρ ὤφθην σοι, προχειρίσασθαί
    σε ὑπηρέτην καὶ μάρτυρα ὧν τε εἶδές ⸀με ὧν τε ὀφθήσομαί σοι,
translation:
  text: 'But rise and stand on your feet, for I have appeared to you for this purpose:
    to appoint you as a servant and witness both of the things you have seen of me
    and of the things in which I will appear to you,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'of what you have seen me and of what I will appear to
      you.' The Greek construction is compressed and has been rendered for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάστηθι
  chosen: rise
  alternatives:
  - get up
  - stand up
  lexicon: BDAG
  rationale: Aorist imperative of ἀνίστημι here calls for immediate action. 'Rise'
    is concise and natural in English, while preserving the formal force of the command.
- source_word: στῆθι ἐπὶ τοὺς πόδας σου
  chosen: stand on your feet
  alternatives:
  - stand up on your feet
  - stand on your feet upright
  lexicon: BDAG
  rationale: This idiom is common in call/commission scenes. 'Stand on your feet'
    preserves the vivid bodily command without unnecessary expansion.
- source_word: εἰς τοῦτο γὰρ
  chosen: for this purpose
  alternatives:
  - for this reason
  - to this end
  lexicon: BDAG
  rationale: This phrase introduces the purpose of the appearance. 'For this purpose'
    is idiomatic and clearly teleological.
- source_word: ὤφθην σοι
  chosen: I have appeared to you
  alternatives:
  - I appeared to you
  - I was seen by you
  lexicon: BDAG
  rationale: Although formally passive, ὤφθην commonly functions as an intransitive
    divine/self-revelatory appearance formula. 'I have appeared to you' is standard,
    natural English and fits the commissioning context.
- source_word: προχειρίσασθαί σε
  chosen: to appoint you
  alternatives:
  - to choose you
  - to designate you
  lexicon: BDAG
  rationale: The infinitive expresses the purpose of the appearance. 'Appoint' best
    captures formal commissioning to a role, stronger than merely 'choose.'
- source_word: ὑπηρέτην
  chosen: servant
  alternatives:
  - assistant
  - attendant
  - minister
  lexicon: BDAG
  rationale: ὑπηρέτης denotes an assistant or subordinate agent, not δοῦλος. 'Servant'
    is the best accessible rendering here; 'minister' sounds ecclesiastical and 'assistant'
    is too weak for the solemn commission.
- source_word: μάρτυρα
  chosen: witness
  alternatives:
  - testifier
  lexicon: BDAG
  rationale: '''Witness'' is the standard and contextually precise rendering for one
    who bears testimony to what has been seen and revealed.'
- source_word: ὧν τε εἶδές με
  chosen: of the things you have seen of me
  alternatives:
  - of what you have seen of me
  - of the things in which you have seen me
  lexicon: BDAG
  rationale: The genitive relative construction is somewhat compressed. The presence
    of με in the SBLGNT supports the sense that Paul is to testify concerning what
    he has seen of Jesus. This rendering preserves that relation while remaining readable.
- source_word: ὧν τε ὀφθήσομαί σοι
  chosen: of the things in which I will appear to you
  alternatives:
  - of what I will show you
  - of the things about which I will appear to you
  lexicon: BDAG
  rationale: Future passive form of ὁράω again carries the sense 'appear.' The relative
    construction links future revelations to Paul's witness. 'In which I will appear
    to you' stays close to the Greek without over-paraphrasing.
