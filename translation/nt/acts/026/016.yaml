theological_decisions:
- issue: Nature of the revelatory language in ὤφθην / ὀφθήσομαί
  chosen_reading: Render both verbs as appearance language ('I have appeared,' 'I
    will appear') rather than reducing them to generic seeing or inward impression.
  alternative_readings:
  - I was seen by you / I will be seen by you
  - I revealed myself / I will reveal myself
  rationale: The verse presents the risen Jesus personally commissioning Paul. Translating
    with appearance language preserves the objective revelatory force of the Greek
    while avoiding over-interpretation about the mode of appearance.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
