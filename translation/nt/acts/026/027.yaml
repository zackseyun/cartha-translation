id: ACT.26.27
reference: Acts 26:27
source:
  edition: SBLGNT
  text: πιστεύεις, βασιλεῦ Ἀγρίππα, τοῖς προφήταις; οἶδα ὅτι πιστεύεις.
translation:
  text: King Agrippa, do you believe the prophets? I know that you do believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accept the prophets' or 'trust the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύεις
  chosen: do you believe
  alternatives:
  - do you trust
  - are you believing
  lexicon: BDAG
  rationale: Present active indicative, second singular, here naturally rendered as
    a direct question. 'Believe' best fits the object 'the prophets,' conveying acceptance
    of their testimony rather than mere personal trust.
- source_word: βασιλεῦ
  chosen: King
  alternatives:
  - O king
  lexicon: BDAG
  rationale: Vocative singular of βασιλεύς. 'King' is the natural modern English form
    of address; 'O king' is more archaic than the translation philosophy prefers.
- source_word: Ἀγρίππα
  chosen: Agrippa
  rationale: Personal name transliterated according to standard English convention,
    following the stated principle to transliterate names.
- source_word: τοῖς προφήταις
  chosen: the prophets
  alternatives:
  - the prophetic writings
  - the prophets' message
  lexicon: BDAG
  rationale: Dative plural with πιστεύω commonly marks the person or testimony believed.
    'The prophets' is the most direct and contextually appropriate rendering, referring
    to the recognized prophetic witnesses of Scripture.
- source_word: οἶδα
  chosen: I know
  alternatives:
  - I am sure
  - I understand
  lexicon: BDAG
  rationale: Perfect-form verb with present sense. 'I know' preserves the straightforward
    force of Paul's assertion without softening it.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Standard conjunction introducing the content of what Paul knows.
- source_word: πιστεύεις
  chosen: you do believe
  alternatives:
  - you believe
  - you trust
  lexicon: BDAG
  rationale: Repeated verb retained as 'believe' for consistency. The auxiliary 'do'
    brings out the emphatic rhetorical force in English and mirrors Paul's pointed
    affirmation after the question.
