theological_decisions:
- issue: Nature of belief in 'the prophets'
  chosen_reading: Rendered as belief in the prophetic witnesses/scriptural testimony,
    not specifically as obedience or generic religiosity.
  alternative_readings:
  - accept the prophets
  - trust the prophets
  rationale: The Greek πιστεύω with the dative here most naturally means believing
    or accepting the prophets' message. The translation avoids importing a fuller
    doctrinal claim beyond Paul's rhetorical appeal to Agrippa's acknowledged Jewish
    belief.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
