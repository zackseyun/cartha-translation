id: ACT.26.6
reference: Acts 26:6
source:
  edition: SBLGNT
  text: καὶ νῦν ἐπ’ ἐλπίδι τῆς ⸀εἰς τοὺς πατέρας ⸀ἡμῶν ἐπαγγελίας γενομένης ὑπὸ τοῦ
    θεοῦ ἕστηκα κρινόμενος,
translation:
  text: And now I stand on trial because of the hope in the promise made by God to
    our fathers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Greek reads 'our fathers,' referring to Israel's
      forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπ’ ἐλπίδι
  chosen: because of the hope
  alternatives:
  - on account of the hope
  - for the hope
  lexicon: BDAG
  rationale: ἐπί with the dative here expresses basis or cause. In English, 'because
    of the hope' communicates why Paul is being judged more naturally than a more
    wooden 'upon hope' while preserving the causal sense.
- source_word: ἐπαγγελίας
  chosen: promise
  alternatives:
  - promised thing
  lexicon: BDAG
  rationale: 'The genitive depends on ἐλπίδι: the hope is centered in God''s promise.
    ''Promise'' is the standard and clear rendering.'
- source_word: τῆς εἰς τοὺς πατέρας ἡμῶν ἐπαγγελίας
  chosen: the promise made by God to our fathers
  alternatives:
  - the promise to our fathers
  - the promise directed to our fathers
  lexicon: BDAG
  rationale: The prepositional phrase εἰς τοὺς πατέρας ἡμῶν modifies ἐπαγγελίας and
    indicates the promise's direction/recipient. In idiomatic English, 'made ... to
    our fathers' best conveys this relation.
- source_word: γενομένης ὑπὸ τοῦ θεοῦ
  chosen: made by God
  alternatives:
  - given by God
  - which came from God
  lexicon: BDAG
  rationale: The aorist middle participle γενομένης with ὑπό + genitive indicates
    the promise came to be or was made by God. 'Made by God' is idiomatic and preserves
    divine agency.
- source_word: πατέρας ἡμῶν
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and in Jewish covenantal context
    refers to the patriarchal forefathers of Israel. Per the gender-accurate policy,
    'our fathers' is preferred over the more neutral 'ancestors,' though the latter
    is a possible interpretive gloss.
- source_word: ἕστηκα
  chosen: I stand
  alternatives:
  - I have stood
  - I am standing
  lexicon: BDAG
  rationale: 'Perfect ἕστηκα often has present stative force: ''I stand.'' This is
    the most natural English rendering in courtroom context.'
- source_word: κρινόμενος
  chosen: on trial
  alternatives:
  - being judged
  - being tried
  lexicon: BDAG
  rationale: The participle describes Paul's present judicial situation. 'On trial'
    is a natural courtroom equivalent that preserves the legal sense without unnecessary
    stiffness.
- source_word: καὶ νῦν
  chosen: And now
  alternatives:
  - And at this time
  - So now
  lexicon: BDAG
  rationale: This transitional phrase links Paul's present defense to the preceding
    narrative and is well represented by the standard English connective 'And now.'
