theological_decisions:
- issue: Identity of 'our fathers'
  chosen_reading: Israel's patriarchal forefathers/covenant ancestors
  alternative_readings:
  - generic ancestors of the Jewish people
  rationale: In Paul's speech before Agrippa, the phrase evokes Israel's covenant
    history and the ancestral recipients of God's promises. The translation keeps
    the traditional covenantal wording without expanding it interpretively in the
    main text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
