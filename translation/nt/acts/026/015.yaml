theological_decisions:
- issue: Rendering of κύριος in Saul's address and in the narrator's identification
    of the speaker
  chosen_reading: Lord
  alternative_readings:
  - sir
  - Master
  rationale: The project's contested-terms guidance sets κύριος to 'Lord' by default.
    In this Christophany context, 'Lord' also preserves the theological weight of
    the encounter without importing more than the text states. 'Sir' remains a lexical
    possibility for the vocative in isolation, but the immediate reply 'I am Jesus'
    and the narrative use of 'the Lord' favor 'Lord' in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
