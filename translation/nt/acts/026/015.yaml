id: ACT.26.15
reference: Acts 26:15
source:
  edition: SBLGNT
  text: ἐγὼ δὲ εἶπα· Τίς εἶ, κύριε; ὁ δὲ ⸀κύριος εἶπεν· Ἐγώ εἰμι Ἰησοῦς ὃν σὺ διώκεις·
translation:
  text: And I said, ‘Who are you, Lord?’ And the Lord said, ‘I am Jesus, whom you
    are persecuting.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who are you, sir?' The Greek κύριε can function as a respectful form
      of address, but here 'Lord' is preferred because the speaker is immediately
      identified as Jesus in a heavenly appearance.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ δὲ εἶπα
  chosen: And I said
  alternatives:
  - Then I said
  - But I said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'And' preserves the narrative flow in natural
    English without overstating contrast. The explicit pronoun ἐγώ is not separately
    emphasized in English because standard English verb phrasing already includes
    the subject, and no strong contrast needs to be forced here.
- source_word: Τίς εἶ, κύριε;
  chosen: Who are you, Lord?
  alternatives:
  - Who are you, sir?
  lexicon: BDAG
  rationale: τίς εἶ is straightforwardly 'Who are you?' κύριε is rendered 'Lord' in
    keeping with the project's default for κύριος. In context Saul is addressing the
    heavenly speaker with reverence; while 'sir' is lexically possible in some contexts,
    the narrative identification of the speaker as Jesus supports 'Lord' here.
- source_word: ὁ δὲ κύριος εἶπεν
  chosen: And the Lord said
  alternatives:
  - But the Lord said
  - Then the Lord said
  lexicon: BDAG
  rationale: κύριος is translated 'Lord' per the doctrinal default for Kyrios. The
    article marks the identified speaker, naturally rendered in English as 'the Lord.'
    δέ again functions as a simple connective, best represented by 'And' in smooth
    narrative English.
- source_word: Ἐγώ εἰμι Ἰησοῦς
  chosen: I am Jesus
  alternatives:
  - I am Jesus himself
  lexicon: BDAG
  rationale: This is a direct self-identification. The explicit Ἐγώ is adequately
    conveyed by normal English 'I am'; adding extra emphasis such as 'myself' would
    overtranslate the Greek in this context.
- source_word: ὃν σὺ διώκεις
  chosen: whom you are persecuting
  alternatives:
  - whom you persecute
  lexicon: BDAG
  rationale: διώκω here means 'persecute' in the hostile sense. The present tense
    is rendered with English progressive ('are persecuting') to reflect the ongoing
    action naturally in contemporary English. The explicit σὺ is retained in the normal
    English subject 'you' without added emphasis.
