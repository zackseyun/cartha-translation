id: ACT.26.14
reference: Acts 26:14
source:
  edition: SBLGNT
  text: πάντων ⸀τε καταπεσόντων ἡμῶν εἰς τὴν γῆν ἤκουσα φωνὴν ⸀λέγουσαν πρός ⸀με τῇ
    Ἑβραΐδι διαλέκτῳ· Σαοὺλ Σαούλ, τί με διώκεις; σκληρόν σοι πρὸς κέντρα λακτίζειν.
translation:
  text: And when we had all fallen to the ground, I heard a voice saying to me in
    the Hebrew language, ‘Saul, Saul, why are you persecuting me? It is hard for you
    to kick against the goads.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'in Aramaic'; the Greek expression literally says 'in the Hebrew
      language/dialect.'
    reason: alternative_reading
  - marker: b
    text: 'A proverbial expression: resisting the speaker only brings harm to oneself.'
    reason: cultural_note
lexical_decisions:
- source_word: πάντων τε καταπεσόντων ἡμῶν
  chosen: when we had all fallen
  alternatives:
  - after we all fell
  - with all of us having fallen
  lexicon: BDAG
  rationale: Genitive absolute rendered with a natural English temporal clause. πάντων
    with ἡμῶν is preserved by 'we had all,' and the aorist participle καταπεσόντων
    is represented as a completed action prior to ἤκουσα.
- source_word: εἰς τὴν γῆν
  chosen: to the ground
  alternatives:
  - onto the ground
  - to the earth
  lexicon: BDAG
  rationale: Idiomatic English for falling εἰς τὴν γῆν in this narrative context is
    'to the ground.' 'Earth' would sound unnatural here.
- source_word: ἤκουσα φωνὴν
  chosen: I heard a voice
  alternatives:
  - I heard a sound
  - I heard a voice speaking
  lexicon: BDAG
  rationale: φωνή in direct-speech context is best rendered 'voice,' not merely 'sound,'
    since articulated words follow immediately.
- source_word: λέγουσαν πρός με
  chosen: saying to me
  alternatives:
  - speaking to me
  - that said to me
  lexicon: BDAG
  rationale: The participle λέγουσαν is naturally rendered as 'saying,' and πρός with
    accusative here indicates address directed to Paul.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  chosen: in the Hebrew language
  alternatives:
  - in the Hebrew dialect
  - in Aramaic
  lexicon: BDAG
  rationale: A straightforward rendering of the Greek phrase is retained in the main
    text. Although many understand this expression in Acts to refer to Aramaic, the
    text says 'Hebrew'; the possible historical-linguistic nuance is preserved in
    a footnote rather than imported into the main text.
- source_word: Σαοὺλ Σαούλ
  chosen: Saul, Saul
  rationale: Personal name is transliterated, and the repetition is preserved for
    emphasis exactly as in the Greek.
- source_word: τί με διώκεις;
  chosen: why are you persecuting me?
  alternatives:
  - why do you persecute me?
  lexicon: BDAG
  rationale: Present tense διώκεις is rendered with English progressive aspect for
    natural speech in direct address. 'Persecuting' accurately conveys hostile pursuit
    in this context.
- source_word: σκληρόν
  chosen: It is hard
  alternatives:
  - it is painful
  - it is difficult
  lexicon: BDAG
  rationale: The adjective is used impersonally in this proverbial expression. 'Hard'
    preserves both the literal and proverbial force better than more interpretive
    alternatives.
- source_word: σοι
  chosen: for you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative of reference is idiomatically rendered 'for you' in English in
    this construction.
- source_word: πρὸς κέντρα
  chosen: against the goads
  alternatives:
  - against goads
  - against the ox-goads
  lexicon: BDAG
  rationale: κέντρα refers to pointed prods used to drive animals. 'Goads' is the
    concise standard English equivalent; the article helps the proverb read naturally.
- source_word: λακτίζειν
  chosen: to kick
  alternatives:
  - to kick back
  - to strike with the feet
  lexicon: BDAG
  rationale: Infinitive retained in the English idiom 'to kick against the goads,'
    a well-established rendering that matches the proverbial sense without over-paraphrase.
