theological_decisions:
- issue: Rendering τῇ Ἑβραΐδι διαλέκτῳ
  chosen_reading: in the Hebrew language
  alternative_readings:
  - in Aramaic
  rationale: Following original-language primacy, the main text reflects the Greek
    wording 'Hebrew.' Because some interpreters understand this as a conventional
    reference to Aramaic in first-century Judea, that alternative is preserved in
    a footnote rather than substituted into the translation.
  doctrine_reference: Translation philosophy §1, §3
