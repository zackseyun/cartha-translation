id: ACT.26.24
reference: Acts 26:24
source:
  edition: SBLGNT
  text: Ταῦτα δὲ αὐτοῦ ἀπολογουμένου ὁ Φῆστος μεγάλῃ τῇ φωνῇ ⸀φησιν· Μαίνῃ, Παῦλε·
    τὰ πολλά σε γράμματα εἰς μανίαν περιτρέπει.
translation:
  text: As he was saying these things in his defense, Festus said with a loud voice,
    “You are out of your mind, Paul! Your great learning is driving you into madness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are mad, Paul! Your much learning is driving you mad.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολογουμένου
  chosen: as he was saying these things in his defense
  alternatives:
  - as he was making his defense
  - while he was defending himself
  lexicon: BDAG
  rationale: The genitive absolute marks contemporaneous action. ἀπολογέομαι in this
    context refers to giving a legal/verbal defense, not merely casual speech. 'In
    his defense' preserves the forensic sense while remaining natural English.
- source_word: μεγάλῃ τῇ φωνῇ
  chosen: with a loud voice
  alternatives:
  - in a loud voice
  - loudly
  lexicon: BDAG
  rationale: The dative phrase is idiomatic for manner. 'With a loud voice' is a close
    and natural rendering that preserves the vividness of Festus's interruption.
- source_word: φησιν
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, standard English narrative
    style commonly shifts to simple past. This preserves readability without loss
    of meaning.
- source_word: Μαίνῃ
  chosen: You are out of your mind
  alternatives:
  - You are insane
  - You are mad
  lexicon: BDAG
  rationale: The verb μαίνομαι denotes being mad or insane. 'Out of your mind' communicates
    the force in clear modern English without sounding archaic; 'mad' is preserved
    as an alternative because it is more formally literal.
- source_word: τὰ πολλά ... γράμματα
  chosen: Your great learning
  alternatives:
  - Your much learning
  - Your many writings
  - Your extensive study
  lexicon: BDAG
  rationale: γράμματα can denote letters, writings, or learning/education depending
    on context. Here Festus is reacting to Paul's extensive learning and study, not
    literal documents. 'Great learning' captures the idiomatic sense of τὰ πολλά ...
    γράμματα in natural English.
- source_word: εἰς μανίαν
  chosen: into madness
  alternatives:
  - to madness
  - insanity
  lexicon: BDAG
  rationale: The preposition εἰς with μανίαν expresses result or movement into a state.
    'Into madness' preserves that directional/resultative nuance better than a flatter
    paraphrase.
- source_word: περιτρέπει
  chosen: is driving
  alternatives:
  - turns
  - drives
  - is turning
  lexicon: BDAG
  rationale: περιτρέπω here conveys causing someone to turn into a state. 'Is driving'
    idiomatically expresses causation in English and fits the accusation that Paul's
    learning has pushed him into madness.
