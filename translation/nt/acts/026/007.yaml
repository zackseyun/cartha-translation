id: ACT.26.7
reference: Acts 26:7
source:
  edition: SBLGNT
  text: εἰς ἣν τὸ δωδεκάφυλον ἡμῶν ἐν ἐκτενείᾳ νύκτα καὶ ἡμέραν λατρεῦον ἐλπίζει καταντῆσαι·
    περὶ ἧς ἐλπίδος ἐγκαλοῦμαι ⸂ὑπὸ Ἰουδαίων, βασιλεῦ⸃·
translation:
  text: to which our twelve-tribe people hope to attain, as they earnestly serve God
    night and day. It is concerning this hope that I am accused by Jews, O king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our nation of twelve tribes.' The Greek uses a collective singular,
      referring to Israel as the twelve-tribe people.
    reason: lexical_alternative
  - marker: b
    text: Or 'worship' for 'serve God'; the Greek verb can denote religious service
      or worship offered to God.
    reason: lexical_alternative
  - marker: c
    text: Or 'by Jewish people.' The Greek reads 'by Jews' in a legal-context description
      of Paul's accusers, not a statement about all Jews universally.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν
  chosen: to which
  alternatives:
  - for which
  - unto which
  lexicon: BDAG
  rationale: Retains the directional sense of εἰς with the relative pronoun, referring
    back to the promise in the previous verse and expressing the goal toward which
    hope is directed.
- source_word: τὸ δωδεκάφυλον ἡμῶν
  chosen: our twelve-tribe people
  alternatives:
  - our twelve tribes
  - our nation of twelve tribes
  lexicon: BDAG
  rationale: δωδεκάφυλον is a collective singular meaning the twelve-tribe people/nation.
    'Our twelve-tribe people' preserves the singular collective force better than
    the simpler plural 'our twelve tribes,' while remaining readable.
- source_word: ἐν ἐκτενείᾳ
  chosen: earnestly
  alternatives:
  - with earnestness
  - with persistence
  - fervently
  lexicon: BDAG
  rationale: The phrase denotes intensity or persistence. Rendering it adverbially
    as 'earnestly' gives natural English while preserving the sense of devoted constancy.
- source_word: νύκτα καὶ ἡμέραν
  chosen: night and day
  alternatives:
  - day and night
  lexicon: BDAG
  rationale: Keeps the Greek order and idiomatic sense of continual action.
- source_word: λατρεῦον
  chosen: serve God
  alternatives:
  - worship
  - render sacred service
  lexicon: BDAG
  rationale: λατρεύω often denotes religious service/worship offered to God. 'Serve
    God' makes the implicit divine object clear in English from the context of Israel's
    devotion, while avoiding overly technical wording. The alternative 'worship' is
    viable but narrower than the broader cultic-service sense.
- source_word: ἐλπίζει καταντῆσαι
  chosen: hope to attain
  alternatives:
  - hope to reach
  - hope to arrive at
  lexicon: BDAG
  rationale: καταντάω here expresses arriving at or attaining a hoped-for goal. 'Hope
    to attain' is concise and idiomatic in connection with the antecedent promise/hope.
- source_word: περὶ ἧς ἐλπίδος
  chosen: concerning this hope
  alternatives:
  - because of this hope
  - about which hope
  lexicon: BDAG
  rationale: περί with the genitive can mean 'concerning' or, in context, 'because
    of.' 'Concerning this hope' stays closer to the Greek while still making the referent
    clear.
- source_word: ἐγκαλοῦμαι
  chosen: I am accused
  alternatives:
  - I am charged
  - I am being accused
  lexicon: BDAG
  rationale: The passive legal sense fits the courtroom setting. 'I am accused' is
    straightforward modern English.
- source_word: ὑπὸ Ἰουδαίων
  chosen: by Jews
  alternatives:
  - by the Jews
  - by Jewish people
  lexicon: BDAG
  rationale: The anarthrous genitive lacks the article. 'By Jews' is the most direct
    formal rendering. Because this can sound harsh in English and may be heard as
    a blanket statement, a footnote preserves the alternative 'by Jewish people' as
    a contextual clarification without softening the legal accusation in the main
    text.
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  lexicon: BDAG
  rationale: The vocative is directly addressed to Agrippa. 'O king' preserves the
    formal address and rhetorical force.
