theological_decisions:
- issue: Implicit object of λατρεῦον
  chosen_reading: 'Explicitly supplied ''God'' in English: ''serve God'''
  alternative_readings:
  - serve
  - worship
  rationale: Although God is not explicitly stated in the Greek clause, λατρεύω in
    this context of Israel's continual religious devotion naturally takes God as its
    object. Supplying 'God' clarifies the sense for modern readers without adding
    a new theological claim; the verse describes covenantal worship/service directed
    to God.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
- issue: Reference of the hope
  chosen_reading: The verse is rendered so that the hope points back to the promise
    of God in the previous verse, without specifying resurrection in the main text
    here
  alternative_readings:
  - making the resurrection explicit in this verse
  - rendering more vaguely as a general hope
  rationale: The immediate context identifies the hope as the promise made by God
    to the fathers, especially fulfilled in the resurrection theme of Paul's defense.
    This verse itself does not restate that content explicitly, so the translation
    preserves the textual linkage without importing fuller doctrinal content into
    the verse.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
