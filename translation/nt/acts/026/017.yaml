id: ACT.26.17
reference: Acts 26:17
source:
  edition: SBLGNT
  text: ἐξαιρούμενός σε ἐκ τοῦ λαοῦ καὶ ⸀ἐκ τῶν ἐθνῶν, εἰς οὓς ἐγὼ ⸂ἀποστέλλω σε⸃
translation:
  text: delivering you from the people and from the Gentiles, to whom I am sending
    you
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescuing you from the Jewish people and from the Gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαιρούμενός
  chosen: delivering
  alternatives:
  - rescuing
  - taking out
  lexicon: BDAG
  rationale: 'Present middle participle of ἐξαιρέω, here expressing Jesus'' ongoing
    action relative to Paul: ''delivering/rescuing'' him. ''Delivering'' is concise
    and idiomatic in English while preserving the sense of rescue from hostile parties
    better than the more wooden ''taking out.'''
- source_word: τοῦ λαοῦ
  chosen: the people
  alternatives:
  - the Jewish people
  - the people of Israel
  lexicon: BDAG
  rationale: In Acts, λαός in this contrast with 'the Gentiles' commonly refers to
    the Jewish people/Israel. The more literal 'the people' preserves the Greek wording
    and the narrative's insider Jewish frame without over-specifying beyond the text.
- source_word: τῶν ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: Although ἔθνη can mean 'nations,' in Jewish-Gentile contrast in Acts
    it normally denotes non-Jews. 'The Gentiles' best communicates the contextual
    sense in natural English.
- source_word: εἰς οὓς
  chosen: to whom
  alternatives:
  - to which ones
  - among whom
  lexicon: BDAG
  rationale: The preposition εἰς with relative pronoun here functions idiomatically
    after a verb of sending, and English naturally renders this as 'to whom' rather
    than the more literal but awkward 'into whom' or 'to which ones.'
- source_word: ἀποστέλλω
  chosen: I am sending
  alternatives:
  - I send
  lexicon: BDAG
  rationale: Present indicative can be rendered as a progressive in English in this
    commissioning context. 'I am sending' conveys the immediacy of the commission
    being given, while remaining faithful to the present tense.
