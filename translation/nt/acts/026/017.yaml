theological_decisions:
- issue: Referent of 'the people' in contrast with 'the Gentiles'
  chosen_reading: '''the people'' is retained in the main text, with the understood
    referent being the Jewish people.'
  alternative_readings:
  - '''the Jewish people'''
  - '''Israel'''
  rationale: The contrast strongly indicates Jews versus Gentiles, but the Greek says
    simply 'the people.' Retaining the literal expression preserves the source wording
    and avoids importing a fuller interpretive gloss into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    ambiguity/tension where present.'
