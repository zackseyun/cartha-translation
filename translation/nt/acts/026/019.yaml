id: ACT.26.19
reference: Acts 26:19
source:
  edition: SBLGNT
  text: Ὅθεν, βασιλεῦ Ἀγρίππα, οὐκ ἐγενόμην ἀπειθὴς τῇ οὐρανίῳ ὀπτασίᾳ,
translation:
  text: Therefore, King Agrippa, I was not disobedient to the heavenly vision,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the vision from heaven."
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅθεν
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Introduces an inference from the preceding account of Paul's encounter
    and commission. 'Therefore' preserves the logical connection in natural English
    better than the more archaic 'whereupon' or 'hence'.
- source_word: βασιλεῦ Ἀγρίππα
  chosen: King Agrippa
  alternatives:
  - O King Agrippa
  - Agrippa the king
  lexicon: BDAG
  rationale: The vocative directly addresses Agrippa. 'King Agrippa' is idiomatic
    modern English and preserves the honorific title without archaic vocative styling.
- source_word: οὐκ ἐγενόμην
  chosen: I was not
  alternatives:
  - I did not become
  - I did not prove to be
  lexicon: BDAG
  rationale: γίνομαι with predicate adjective here functions idiomatically as 'be/become.'
    In English, 'I was not disobedient' is the most natural rendering and adequately
    conveys the resultant state without awkwardness.
- source_word: ἀπειθὴς
  chosen: disobedient
  alternatives:
  - unpersuaded
  - rebellious
  lexicon: BDAG
  rationale: In this context the term denotes refusal to comply with a divine commission,
    so 'disobedient' best captures the volitional sense. 'Unpersuaded' is too cognitive,
    and 'rebellious' is stronger than the immediate context requires.
- source_word: τῇ οὐρανίῳ ὀπτασίᾳ
  chosen: to the heavenly vision
  alternatives:
  - to the vision from heaven
  - to the heavenly appearance
  lexicon: BDAG
  rationale: ὀπτασία refers to a supernatural sight/vision. 'Heavenly vision' is concise
    and traditional yet clear; it can denote both origin and character. The dative
    after ἀπειθής is naturally rendered with 'to' in English.
