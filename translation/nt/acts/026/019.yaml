theological_decisions:
- issue: Nature of Paul's Damascus-road experience
  chosen_reading: vision
  alternative_readings:
  - appearance
  - revelation from heaven
  rationale: The noun ὀπτασία most directly denotes a vision/appearance. 'Vision'
    preserves the text's own category without importing a more developed theological
    interpretation. The adjective οὐρανίῳ marks it as heavenly in origin or character.
  doctrine_reference: Preserve theological tension rather than resolve it.
