id: ACT.26.12
reference: Acts 26:12
source:
  edition: SBLGNT
  text: Ἐν ⸀οἷς πορευόμενος εἰς τὴν Δαμασκὸν μετ’ ἐξουσίας καὶ ἐπιτροπῆς ⸀τῆς τῶν
    ἀρχιερέων
translation:
  text: In this connection, as I was traveling to Damascus with authority and a commission
    from the chief priests,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'In which things,' referring back to Paul's preceding
      actions and intentions.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν οἷς
  chosen: In this connection
  alternatives:
  - In which things
  - In these circumstances
  - On this mission
  lexicon: BDAG
  rationale: The idiom ἐν οἷς is not naturally rendered woodenly in English here.
    In context it refers back to the preceding persecuting activities/intentions,
    so 'In this connection' preserves the anaphoric link without awkwardness. 'On
    this mission' is possible but slightly more interpretive because 'mission' is
    not explicit.
- source_word: πορευόμενος
  chosen: as I was traveling
  alternatives:
  - going
  - journeying
  lexicon: BDAG
  rationale: The present middle participle is contemporaneous with the main narrative
    and is best rendered with an English participial/subordinate clause. 'Traveling'
    is idiomatic modern English and fits the road-to-Damascus setting better than
    the more wooden 'going' or slightly archaic 'journeying'.
- source_word: εἰς τὴν Δαμασκὸν
  chosen: to Damascus
  alternatives:
  - into Damascus
  lexicon: BDAG
  rationale: With a city name, εἰς is naturally rendered 'to' in English. 'Into' is
    possible but less idiomatic here unless emphasizing entry into the city.
- source_word: μετ’ ἐξουσίας
  chosen: with authority
  alternatives:
  - with power
  - with authorization
  lexicon: BDAG
  rationale: ἐξουσία here denotes delegated authority/right rather than raw power.
    'With authority' is concise and preserves the official nature of Saul's mandate.
    'Authorization' is semantically close but less natural in the paired phrase with
    ἐπιτροπῆς.
- source_word: ἐπιτροπῆς
  chosen: a commission
  alternatives:
  - authorization
  - orders
  - mandate
  lexicon: BDAG
  rationale: ἐπιτροπή in this context refers to formal authorization/charge. 'Commission'
    captures an officially entrusted task and pairs well with 'authority.' 'Orders'
    is possible but can overstate military nuance not explicit in the noun.
- source_word: τῆς τῶν ἀρχιερέων
  chosen: from the chief priests
  alternatives:
  - of the chief priests
  lexicon: BDAG
  rationale: 'Although formally genitival, in English the relationship is best expressed
    as source: the authority and commission came from the chief priests. This avoids
    an awkward literal genitive while preserving the sense.'
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: The plural ἀρχιερεῖς in Second Temple/Jewish leadership contexts is conventionally
    and accurately rendered 'chief priests,' referring to the high-priestly leadership
    class, not multiple simultaneous holders of the singular office of high priest.
