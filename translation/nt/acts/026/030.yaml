id: ACT.26.30
reference: Acts 26:30
source:
  edition: SBLGNT
  text: ⸀Ἀνέστη ⸀τε ὁ βασιλεὺς καὶ ὁ ἡγεμὼν ἥ τε Βερνίκη καὶ οἱ συγκαθήμενοι αὐτοῖς,
translation:
  text: Then the king rose, and the governor and Bernice and those seated with them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Bernice: alternatively, ''Berenice.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέστη
  chosen: rose
  alternatives:
  - stood up
  - got up
  lexicon: BDAG
  rationale: Aorist of ἀνίστημι here denotes the physical act of rising from one's
    seat. 'Rose' is concise, natural, and fits the formal courtroom/audience setting
    better than the more colloquial 'got up.'
- source_word: τε
  chosen: Then
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: The particle τε links this action to the preceding scene. Because English
    does not naturally reproduce every connective particle, 'Then' captures the narrative
    progression idiomatically. The second τε is absorbed into the coordinated English
    structure rather than separately represented.
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly denotes a king. In context this refers to
    Agrippa, but the Greek uses the title rather than the personal name, so the translation
    preserves the title.
- source_word: ὁ ἡγεμὼν
  chosen: the governor
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: ἡγεμών in Acts commonly refers to a Roman provincial governor. 'Governor'
    is the most precise and idiomatic English equivalent in this context.
- source_word: Βερνίκη
  chosen: Bernice
  alternatives:
  - Berenice
  lexicon: BDAG
  rationale: Standard English transliteration often uses 'Bernice' in NT contexts,
    though 'Berenice' is also defensible. The chosen form is conventional and readable;
    the alternative is preserved in a footnote.
- source_word: οἱ συγκαθήμενοι αὐτοῖς
  chosen: those seated with them
  alternatives:
  - those sitting with them
  - their fellow guests
  lexicon: BDAG
  rationale: The participle συγκαθήμενοι literally means those sitting together with
    them. 'Those seated with them' is natural English and preserves the image of shared
    seating without overinterpreting the social role of the group.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: The repeated καί coordinates the listed persons and groups. English likewise
    uses 'and' to preserve the additive structure of the Greek list.
