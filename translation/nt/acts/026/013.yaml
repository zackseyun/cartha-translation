theological_decisions:
- issue: Rendering οὐρανόθεν in a visionary context
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: Because the narrative concerns a revelatory encounter and Luke-Acts regularly
    uses heaven-language with theological significance, 'from heaven' best reflects
    the source text without over-interpreting the event.
