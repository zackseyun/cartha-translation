id: ACT.26.13
reference: Acts 26:13
source:
  edition: SBLGNT
  text: ἡμέρας μέσης κατὰ τὴν ὁδὸν εἶδον, βασιλεῦ, οὐρανόθεν ὑπὲρ τὴν λαμπρότητα τοῦ
    ἡλίου περιλάμψαν με φῶς καὶ τοὺς σὺν ἐμοὶ πορευομένους·
translation:
  text: At midday, along the road, I saw, O king, a light from heaven, brighter than
    the brightness of the sun, shining around me and those traveling with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beyond the brightness of the sun'; the Greek emphasizes that the light
      surpassed the sun's brightness.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας μέσης
  chosen: At midday
  alternatives:
  - About noon
  - In the middle of the day
  lexicon: BDAG
  rationale: The genitive construction is idiomatic for time, referring to the middle
    of the day. 'At midday' is concise, natural English and preserves the temporal
    specificity.
- source_word: κατὰ τὴν ὁδὸν
  chosen: along the road
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: The phrase denotes location during travel. 'Along the road' fits the
    narrative setting and keeps the concrete travel imagery.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I caught sight of
  lexicon: BDAG
  rationale: A straightforward aorist of perception; 'I saw' is the plain and sufficient
    rendering.
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  lexicon: BDAG
  rationale: The vocative directly addresses Agrippa. 'O king' preserves the formal
    direct address without sounding overly archaic in this context.
- source_word: οὐρανόθεν
  chosen: from heaven
  alternatives:
  - from the sky
  lexicon: BDAG
  rationale: In Acts this adverb commonly carries the sense of heavenly origin, not
    merely atmospheric location. 'From heaven' preserves the theological and narrative
    force.
- source_word: ὑπὲρ τὴν λαμπρότητα τοῦ ἡλίου
  chosen: brighter than the brightness of the sun
  alternatives:
  - beyond the brightness of the sun
  - brighter than the sun
  lexicon: BDAG
  rationale: ὑπέρ with the accusative expresses excess or surpassing. Retaining 'brightness'
    reflects λαμπρότης explicitly; this is slightly fuller than simply 'brighter than
    the sun' and more closely mirrors the Greek.
- source_word: περιλάμψαν
  chosen: shining around
  alternatives:
  - flashing around
  - surrounding with light
  lexicon: BDAG
  rationale: The participle modifies 'light' and conveys illumination encircling Paul
    and his companions. 'Shining around' is natural and preserves the circumferential
    sense of the compound verb.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of the participle's action; no special nuance beyond the
    personal reference.
- source_word: φῶς
  chosen: a light
  alternatives:
  - light
  lexicon: BDAG
  rationale: Anarthrous φῶς is naturally rendered with the indefinite article in English.
    This introduces the phenomenon Paul saw.
- source_word: τοὺς σὺν ἐμοὶ πορευομένους
  chosen: those traveling with me
  alternatives:
  - those journeying with me
  - my companions on the journey
  lexicon: BDAG
  rationale: The present participle with σύν describes Paul's fellow travelers. 'Those
    traveling with me' is clear, accurate, and avoids adding interpretive detail beyond
    the Greek.
