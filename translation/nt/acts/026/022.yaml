theological_decisions:
- issue: Scope of Paul's claim about continuity with Israel's Scriptures
  chosen_reading: Paul claims that his testimony goes beyond neither the prophets
    nor Moses, emphasizing continuity with prior revelation rather than novelty.
  alternative_readings:
  - Paul is merely claiming general agreement with Scripture without asserting detailed
    prophetic fulfillment.
  rationale: The phrase οὐδὲν ἐκτὸς λέγων ὧν ... ἐλάλησαν presents a strong continuity
    claim. The translation preserves that force with 'saying nothing except what both
    the prophets and Moses said was going to happen.'
  doctrine_reference: Translation philosophy §1, §3
