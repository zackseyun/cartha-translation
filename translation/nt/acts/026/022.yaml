id: ACT.26.22
reference: Acts 26:22
source:
  edition: SBLGNT
  text: ἐπικουρίας οὖν τυχὼν τῆς ⸀ἀπὸ τοῦ θεοῦ ἄχρι τῆς ἡμέρας ταύτης ἕστηκα μαρτυρόμενος
    μικρῷ τε καὶ μεγάλῳ, οὐδὲν ἐκτὸς λέγων ὧν τε οἱ προφῆται ἐλάλησαν μελλόντων γίνεσθαι
    καὶ Μωϋσῆς,
translation:
  text: Therefore, having received the help that is from God, I have stood to this
    day, testifying to both small and great, saying nothing except what both the prophets
    and Moses said was going to happen,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having obtained help from God.'
    reason: lexical_alternative
  - marker: b
    text: '''Small and great'' is an idiom meaning people of every social rank.'
    reason: cultural_note
  - marker: c
    text: Or 'saying nothing beyond what both the prophets and Moses said would happen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικουρίας
  chosen: the help
  alternatives:
  - help
  - assistance
  - aid
  lexicon: BDAG
  rationale: The noun denotes assistance or aid. 'Help' is natural modern English
    and fits the genitive construction with τῆς ἀπὸ τοῦ θεοῦ. The article is represented
    idiomatically as 'the help' rather than omitted.
- source_word: τυχὼν
  chosen: having received
  alternatives:
  - having obtained
  - having happened to receive
  lexicon: BDAG
  rationale: Aorist participle of τυγχάνω here carries the sense 'obtain/receive.'
    'Having received' is smoother in English than the more formal 'having obtained'
    while preserving the participial relation.
- source_word: τῆς ἀπὸ τοῦ θεοῦ
  chosen: that is from God
  alternatives:
  - from God
  - which comes from God
  lexicon: BDAG
  rationale: The attributive prepositional phrase modifies 'help.' 'That is from God'
    preserves the explicit source and reads clearly in English.
- source_word: ἄχρι τῆς ἡμέρας ταύτης
  chosen: to this day
  alternatives:
  - until this day
  - up to this day
  lexicon: BDAG
  rationale: Idiomatic temporal expression. 'To this day' is concise and natural while
    preserving the durative sense.
- source_word: ἕστηκα
  chosen: I have stood
  alternatives:
  - I stand
  - I have remained standing
  lexicon: BDAG
  rationale: Perfect of ἵστημι conveys a present state resulting from prior action.
    'I have stood' preserves the perfect nuance better than a simple present, while
    still fitting English style.
- source_word: μαρτυρόμενος
  chosen: testifying
  alternatives:
  - bearing witness
  - giving testimony
  lexicon: BDAG
  rationale: The participle describes Paul's ongoing activity. 'Testifying' is clear,
    contemporary, and retains legal/witness connotations.
- source_word: μικρῷ τε καὶ μεγάλῳ
  chosen: to both small and great
  alternatives:
  - to both low and high
  - to both insignificant and important
  - to everyone, small and great
  lexicon: BDAG
  rationale: This idiom refers to people of all social ranks. 'Small and great' preserves
    the source wording and rhetorical balance better than an interpretive paraphrase.
- source_word: οὐδὲν ἐκτὸς λέγων
  chosen: saying nothing except
  alternatives:
  - saying nothing beyond
  - declaring nothing except
  lexicon: BDAG
  rationale: ἐκτός with the genitive-relative clause means 'except/beyond.' 'Saying
    nothing except' is the most natural English rendering here.
- source_word: ὧν
  chosen: what
  alternatives:
  - the things that
  - those things which
  lexicon: BDAG
  rationale: The relative pronoun refers to the content of what was foretold. 'What'
    is idiomatic English after 'nothing except.'
- source_word: οἱ προφῆται ... καὶ Μωϋσῆς
  chosen: both the prophets and Moses
  alternatives:
  - the prophets and Moses also
  - both Moses and the prophets
  lexicon: BDAG
  rationale: The paired τε ... καί construction is represented by 'both ... and ...'.
    The Greek order places 'the prophets' before 'Moses,' so that order is retained.
- source_word: ἐλάλησαν
  chosen: said
  alternatives:
  - spoke
  - declared
  lexicon: BDAG
  rationale: Though literally 'spoke,' in English with a content clause 'said' is
    more idiomatic and does not weaken the prophetic force.
- source_word: μελλόντων γίνεσθαι
  chosen: was going to happen
  alternatives:
  - would happen
  - were about to happen
  - was destined to take place
  lexicon: BDAG
  rationale: The participle plus infinitive expresses futurity relative to the prophets'
    speech. Singular English agreement is used because the clause is rendered with
    the collective 'what.' 'Was going to happen' is natural and preserves the future-oriented
    sense without overinterpreting imminence.
