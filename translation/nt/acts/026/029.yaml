theological_decisions:
- issue: Interpretation of ἐν ὀλίγῳ καὶ ἐν μεγάλῳ in relation to Agrippa's preceding
    remark
  chosen_reading: 'Rendered as a broad contrast of duration/extent: ''whether in a
    short time or in a long time.'''
  alternative_readings:
  - '''almost and altogether'''
  - '''with little effort or with much effort'''
  rationale: The phrase is genuinely debated, and the verse does not require a doctrinally
    loaded resolution. Following the translation philosophy, the main text preserves
    a plausible sense that fits the immediate exchange, while alternatives are preserved
    in a footnote rather than hidden.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
