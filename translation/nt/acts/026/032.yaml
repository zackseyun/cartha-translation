id: ACT.26.32
reference: Acts 26:32
source:
  edition: SBLGNT
  text: Ἀγρίππας δὲ τῷ Φήστῳ ἔφη· Ἀπολελύσθαι ἐδύνατο ὁ ἄνθρωπος οὗτος εἰ μὴ ἐπεκέκλητο
    Καίσαρα.
translation:
  text: Then Agrippa said to Festus, “This man could have been released if he had
    not appealed to Caesar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This man might have been set free if he had not appealed to Caesar.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Here δέ marks narrative progression and transition to Agrippa's concluding
    remark. 'Then' gives natural English flow while preserving the connective force
    better than omitting it.
- source_word: ἔφη
  chosen: said
  alternatives:
  - was saying
  - told
  lexicon: BDAG
  rationale: The imperfect of φημί often functions as a simple speech introducer in
    narrative. 'Said' is idiomatic English and does not overplay the aspect.
- source_word: Ἀπολελύσθαι
  chosen: have been released
  alternatives:
  - have been set free
  - have been acquitted
  lexicon: BDAG
  rationale: The perfect infinitive of ἀπολύω denotes being freed or released. In
    this legal context, 'released' fits best. 'Acquitted' is too narrow and judicially
    specific, while the Greek can include release without a formal acquittal.
- source_word: ἐδύνατο
  chosen: could
  alternatives:
  - was able to
  - might have been able to
  lexicon: BDAG
  rationale: δύναμαι expresses possibility or capability. 'Could' naturally conveys
    unrealized past possibility in English when paired with the conditional clause.
- source_word: ὁ ἄνθρωπος οὗτος
  chosen: this man
  alternatives:
  - this person
  - the man
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual, Paul. 'This man'
    is gender-accurate and preserves the demonstrative force of οὗτος.
- source_word: εἰ μὴ
  chosen: if ... not
  alternatives:
  - unless
  - had it not been that
  lexicon: BDAG
  rationale: The construction introduces a contrary-to-fact condition. English expresses
    it smoothly as 'if he had not ...' in this sentence; this preserves the logic
    clearly.
- source_word: ἐπεκέκλητο
  chosen: had not appealed
  alternatives:
  - had not invoked
  - had not called upon
  lexicon: BDAG
  rationale: In Roman legal context, ἐπικαλέω with Caesar means to appeal to the emperor
    for judgment. 'Appealed' is the precise contextual rendering; more literal options
    would obscure the legal sense.
- source_word: Καίσαρα
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: Καῖσαρ is the formal title/name used in the appeal formula. 'Caesar'
    preserves the historical and legal wording of the text better than the interpretive
    'the emperor'.
