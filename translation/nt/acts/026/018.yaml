id: ACT.26.18
reference: Acts 26:18
source:
  edition: SBLGNT
  text: ἀνοῖξαι ὀφθαλμοὺς αὐτῶν, τοῦ ⸀ἐπιστρέψαι ἀπὸ σκότους εἰς φῶς καὶ τῆς ἐξουσίας
    τοῦ Σατανᾶ ἐπὶ τὸν θεόν, τοῦ λαβεῖν αὐτοὺς ἄφεσιν ἁμαρτιῶν καὶ κλῆρον ἐν τοῖς
    ἡγιασμένοις πίστει τῇ εἰς ἐμέ.
translation:
  text: to open their eyes, so that they may turn from darkness to light and from
    the authority of Satan to God, that they may receive forgiveness of sins and an
    inheritance among those who have been sanctified by faith in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the power of Satan' or 'the dominion of Satan.' The Greek term can denote
      authority, ruling power, or domain.
    reason: lexical_alternative
  - marker: b
    text: Or 'among those who have been made holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι
  chosen: to open
  alternatives:
  - to cause to see
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/result in the commissioning context. 'To
    open' preserves the concrete metaphor of opened eyes without over-interpreting
    it as merely figurative insight.
- source_word: ὀφθαλμοὺς αὐτῶν
  chosen: their eyes
  lexicon: BDAG
  rationale: Retains the bodily image that functions metaphorically for spiritual
    perception. No need to paraphrase as 'understanding' in the main text.
- source_word: τοῦ ἐπιστρέψαι
  chosen: so that they may turn
  alternatives:
  - that they may turn
  - to turn
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'Turn' preserves the conversion
    language of ἐπιστρέφω without importing a stronger gloss like 'be converted' into
    the main text.
- source_word: ἀπὸ σκότους εἰς φῶς
  chosen: from darkness to light
  lexicon: BDAG
  rationale: Standard metaphorical contrast retained literally; it is both readable
    and theologically rich.
- source_word: τῆς ἐξουσίας τοῦ Σατανᾶ
  chosen: the authority of Satan
  alternatives:
  - the power of Satan
  - the dominion of Satan
  lexicon: BDAG
  rationale: ἐξουσία often denotes authority, right, or delegated ruling power. 'Authority'
    is the most direct rendering; 'power' is possible but less precise here.
- source_word: ἐπὶ τὸν θεόν
  chosen: to God
  alternatives:
  - toward God
  lexicon: BDAG
  rationale: With movement language paired to the prior ἀπό...εἰς construction, this
    indicates transfer of allegiance/orientation. 'To God' is idiomatic and sufficiently
    literal.
- source_word: τοῦ λαβεῖν
  chosen: that they may receive
  alternatives:
  - so that they may receive
  - to receive
  lexicon: BDAG
  rationale: A second articular infinitive continuing the purpose sequence. 'Receive'
    fits the gracious, bestowed nature of what follows.
- source_word: ἄφεσιν ἁμαρτιῶν
  chosen: forgiveness of sins
  alternatives:
  - release from sins
  - remission of sins
  lexicon: BDAG
  rationale: '''Forgiveness of sins'' is the clearest contemporary rendering and matches
    established NT usage without archaic diction.'
- source_word: κλῆρον
  chosen: an inheritance
  alternatives:
  - a share
  - a portion
  - a lot
  lexicon: BDAG
  rationale: In this salvific context κλῆρος refers to the allotted inheritance/share
    among God's people. 'Inheritance' best conveys the covenantal and eschatological
    sense in natural English.
- source_word: ἐν τοῖς ἡγιασμένοις
  chosen: among those who have been sanctified
  alternatives:
  - among the holy ones
  - among those who have been made holy
  lexicon: BDAG
  rationale: Perfect passive participle indicates a completed action with ongoing
    state. 'Those who have been sanctified' preserves the verbal force better than
    the more static 'saints' or 'holy ones'.
- source_word: πίστει
  chosen: by faith
  alternatives:
  - through faith
  lexicon: BDAG
  rationale: Following the project's default for πίστις as 'faith.' Instrumental dative
    is well represented by 'by faith'; 'through faith' is also possible but not necessary
    in the main text.
- source_word: τῇ εἰς ἐμέ
  chosen: in me
  alternatives:
  - directed toward me
  lexicon: BDAG
  rationale: The construction specifies the object of faith. 'In me' is idiomatic
    English and preserves the personal focus on Jesus.
