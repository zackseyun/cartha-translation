theological_decisions:
- issue: Rendering of πίστις in πίστει τῇ εἰς ἐμέ
  chosen_reading: by faith in me
  alternative_readings:
  - by trust in me
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith.' Here the construction with
    εἰς ἐμέ is not the debated pistis-Christou genitive construction, so 'faith in
    me' is the most straightforward rendering. 'Trust in me' is a viable lexical alternative
    but not required in the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — πίστις default English
    ''faith'''
