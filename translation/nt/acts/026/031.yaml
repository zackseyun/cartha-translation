id: ACT.26.31
reference: Acts 26:31
source:
  edition: SBLGNT
  text: καὶ ἀναχωρήσαντες ἐλάλουν πρὸς ἀλλήλους λέγοντες ὅτι Οὐδὲν θανάτου ⸂ἢ δεσμῶν
    ἄξιον⸃ ⸀τι πράσσει ὁ ἄνθρωπος οὗτος.
translation:
  text: And after they withdrew, they were speaking to one another, saying, “This
    man is doing nothing worthy of death or imprisonment.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “worthy of death or chains.” The Greek δεσμῶν is literally “bonds/chains,”
      but here likely refers to imprisonment or custody.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναχωρήσαντες
  chosen: after they withdrew
  alternatives:
  - after they had gone aside
  - after they retired
  lexicon: BDAG
  rationale: Aorist participle indicating departure from the public setting before
    the main imperfect verb. 'Withdrew' is natural English and preserves the sense
    of moving away.
- source_word: ἐλάλουν
  chosen: they were speaking
  alternatives:
  - they were talking
  - they said
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing conversation rather than a single utterance.
    'Were speaking' preserves the durative aspect better than simple past 'said'.
- source_word: πρὸς ἀλλήλους
  chosen: to one another
  alternatives:
  - with each other
  lexicon: BDAG
  rationale: Idiomatic reciprocal expression indicating mutual conversation among
    the parties present.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Present participle introducing the content of their conversation. 'Saying'
    is the standard concise rendering in English.
- source_word: Οὐδὲν ... ἄξιον
  chosen: nothing worthy
  alternatives:
  - nothing deserving
  - nothing that merits
  lexicon: BDAG
  rationale: The construction means that no action of the man merits the stated penalties.
    'Worthy' is concise and idiomatic with the following genitives.
- source_word: θανάτου ἢ δεσμῶν
  chosen: of death or imprisonment
  alternatives:
  - of death or chains
  - of death or bonds
  lexicon: BDAG
  rationale: θάνατος here refers to the death penalty; δεσμοί can literally mean 'chains/bonds'
    but in judicial context denotes imprisonment or custody. 'Imprisonment' communicates
    the legal sense clearly in modern English, while the more literal 'chains' is
    preserved as an alternative.
- source_word: τι πράσσει
  chosen: is doing
  alternatives:
  - does
  - is committing
  lexicon: BDAG
  rationale: πράσσω here refers broadly to what Paul is doing or has done. Present
    tense is well represented by 'is doing'; 'committing' would over-specify criminality
    not explicit in the wording.
- source_word: ὁ ἄνθρωπος οὗτος
  chosen: this man
  alternatives:
  - this person
  lexicon: BDAG
  rationale: Masculine singular referring specifically to Paul. 'This man' is gender-accurate
    and natural English.
