id: ACT.26.1
reference: Acts 26:1
source:
  edition: SBLGNT
  text: Ἀγρίππας δὲ πρὸς τὸν Παῦλον ἔφη· Ἐπιτρέπεταί σοι ⸀ὑπὲρ σεαυτοῦ λέγειν. τότε
    ὁ Παῦλος ⸂ἐκτείνας τὴν χεῖρα ἀπελογεῖτο⸃·
translation:
  text: 'Then Agrippa said to Paul, “You are permitted to speak on your own behalf.”
    Then Paul stretched out his hand and began his defense:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to speak for yourself.”
    reason: lexical_alternative
  - marker: b
    text: Or “made his defense.” The Greek verb can denote giving a legal defense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγρίππας
  chosen: Agrippa
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: δὲ
  chosen: Then
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative progression; 'Then' gives natural English flow
    while preserving the discourse move.
- source_word: πρὸς τὸν Παῦλον ἔφη
  chosen: said to Paul
  alternatives:
  - said toward Paul
  - addressed Paul
  lexicon: BDAG
  rationale: Idiomatic rendering of πρὸς with verb of speaking; English requires 'said
    to Paul' rather than a more literal but awkward form.
- source_word: Ἐπιτρέπεταί σοι
  chosen: You are permitted
  alternatives:
  - It is permitted to you
  - You have permission
  lexicon: BDAG
  rationale: Passive present naturally conveys granted permission. 'You are permitted'
    preserves the formal courtroom tone.
- source_word: ὑπὲρ σεαυτοῦ λέγειν
  chosen: to speak on your own behalf
  alternatives:
  - to speak for yourself
  - to speak concerning yourself
  lexicon: BDAG
  rationale: ὑπέρ with reflexive pronoun in this legal setting means speaking in one's
    own defense or on one's own behalf. This wording is clear and contextually precise.
- source_word: τότε
  chosen: Then
  alternatives:
  - At that point
  - So
  lexicon: BDAG
  rationale: Maintains the temporal sequence explicitly marked in Greek.
- source_word: ἐκτείνας τὴν χεῖρα
  chosen: stretched out his hand
  alternatives:
  - extended his hand
  - gestured with his hand
  lexicon: BDAG
  rationale: Aorist participle plus object is straightforwardly rendered; 'stretched
    out his hand' preserves the physical gesture without overinterpreting it.
- source_word: ἀπελογεῖτο
  chosen: began his defense
  alternatives:
  - made his defense
  - was defending himself
  lexicon: BDAG
  rationale: Imperfect middle indicates the onset/progress of Paul's formal defense
    speech. 'Began his defense' captures the narrative imperfect well in English and
    fits the legal context.
