theological_decisions:
- issue: Resurrection language
  chosen_reading: God raises the dead
  alternative_readings:
  - God resurrects dead people
  rationale: The verse refers plainly to divine resurrection power. The translation
    preserves the direct wording of the Greek without importing a more technical theological
    term where the ordinary verb 'raises' adequately conveys the meaning.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
