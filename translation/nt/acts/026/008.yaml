id: ACT.26.8
reference: Acts 26:8
source:
  edition: SBLGNT
  text: τί ἄπιστον κρίνεται παρ’ ὑμῖν εἰ ὁ θεὸς νεκροὺς ἐγείρει;
translation:
  text: Why is it judged unbelievable by you if God raises the dead?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What is judged unbelievable among you, if God raises the dead?' The
      Greek wording can be represented more formally, but the sense is a rhetorical
      'Why?'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: 'In this idiomatic interrogative construction with ἄπιστον κρίνεται,
    τί functions adverbially: ''why?'' or ''for what reason?'' rather than a simple
    neuter pronoun ''what?''. English ''Why'' best captures Paul''s rhetorical challenge.'
- source_word: ἄπιστον
  chosen: unbelievable
  alternatives:
  - incredible
  - untrustworthy
  - unbelieving
  lexicon: BDAG
  rationale: Here ἄπιστον is a predicate adjective describing the matter as not credible
    or unbelievable, not describing persons as unbelieving. 'Unbelievable' is natural
    modern English and fits the rhetorical question.
- source_word: κρίνεται
  chosen: is judged
  alternatives:
  - is considered
  - is thought
  lexicon: BDAG
  rationale: The passive of κρίνω means 'is judged/considered.' 'Is judged' preserves
    the formal sense while remaining clear. The more idiomatic alternatives are possible,
    but the chosen rendering keeps the evaluative nuance explicit.
- source_word: παρ’ ὑμῖν
  chosen: by you
  alternatives:
  - among you
  - in your judgment
  lexicon: BDAG
  rationale: παρά with the dative can indicate the perspective or sphere in which
    something is regarded. 'By you' is concise and natural in English, conveying that
    this is their assessment. 'Among you' is possible but less direct in this context.
- source_word: εἰ
  chosen: if
  alternatives:
  - that
  lexicon: BDAG
  rationale: 'εἰ introduces the content under consideration: ''if God raises the dead.''
    In English, ''if'' works naturally in this rhetorical question. Some take it almost
    as ''that,'' but ''if'' better reflects the Greek form without obscuring the sense.'
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The article is not separately represented
    in English.
- source_word: νεκροὺς
  chosen: the dead
  alternatives:
  - dead people
  - the dead ones
  lexicon: BDAG
  rationale: The adjective is substantival here, referring to dead persons collectively.
    'The dead' is the standard and most natural English expression.
- source_word: ἐγείρει
  chosen: raises
  alternatives:
  - raises up
  lexicon: BDAG
  rationale: ἐγείρω in resurrection contexts means 'raise.' 'Raises' is clear and
    idiomatic; 'raises up' is possible but unnecessary in contemporary English.
