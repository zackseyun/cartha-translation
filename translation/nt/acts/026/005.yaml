theological_decisions:
- issue: Rendering αἵρεσις in a Jewish historical context
  chosen_reading: sect
  alternative_readings:
  - heresy
  - party
  rationale: The term here refers to the Pharisees as a recognized group within Judaism,
    not to doctrinal deviation in the later ecclesiastical sense. Rendering it 'heresy'
    would import anachronistic theological baggage not warranted by the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source meaning without importing doctrinal claims.'
