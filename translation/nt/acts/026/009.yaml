theological_decisions:
- issue: Sense of 'the name' in relation to Jesus
  chosen_reading: Retain the biblical idiom 'the name' rather than interpret it as
    'authority' or 'cause.'
  alternative_readings:
  - the authority of Jesus
  - the cause of Jesus
  rationale: The text does not require narrowing the idiom to one theological nuance.
    Preserving 'the name' maintains the scriptural way of speaking about the person
    and public confession of Jesus without importing a more specific doctrinal claim.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
