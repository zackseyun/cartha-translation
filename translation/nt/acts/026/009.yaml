id: ACT.26.9
reference: Acts 26:9
source:
  edition: SBLGNT
  text: Ἐγὼ μὲν οὖν ἔδοξα ἐμαυτῷ πρὸς τὸ ὄνομα Ἰησοῦ τοῦ Ναζωραίου δεῖν πολλὰ ἐναντία
    πρᾶξαι·
translation:
  text: So I myself indeed thought that I ought to do many things in opposition to
    the name of Jesus the Nazarene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the name of Jesus of Nazareth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ
  chosen: I myself
  alternatives:
  - I
  - I personally
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for basic Greek syntax and is therefore
    emphatic; 'I myself' preserves the self-referential emphasis in Paul's confession.
- source_word: μὲν οὖν
  chosen: So ... indeed
  alternatives:
  - therefore
  - then
  - indeed
  lexicon: BDAG
  rationale: The particle combination marks continuation/inference with mild emphasis.
    English cannot mirror both particles neatly, so 'So' captures οὖν and 'indeed'
    captures μέν without overloading the sentence.
- source_word: ἔδοξα ἐμαυτῷ
  chosen: thought
  alternatives:
  - considered
  - was of the opinion
  - thought to myself
  lexicon: BDAG
  rationale: The idiom means 'I thought/considered' with ἐμαυτῷ reinforcing the internal
    judgment. 'Thought' is natural English; the reflexive force is already represented
    by 'I myself' and the personal framing of the clause.
- source_word: πρὸς τὸ ὄνομα
  chosen: in opposition to the name
  alternatives:
  - against the name
  - toward the name
  lexicon: BDAG
  rationale: With πράσσω and ἐναντία, πρός here has adversative force. 'In opposition
    to the name' is slightly more explicit than 'against the name' and fits the following
    ἐναντία. 'The name' is retained because in biblical usage it signifies the person/reputation/authority
    represented by Jesus' name.
- source_word: ὄνομα
  chosen: name
  alternatives:
  - reputation
  - authority
  lexicon: BDAG
  rationale: A literal rendering best preserves the biblical-theological idiom while
    allowing readers to infer the representative sense. More interpretive glosses
    would narrow the semantic range unnecessarily.
- source_word: Ἰησοῦ τοῦ Ναζωραίου
  chosen: Jesus the Nazarene
  alternatives:
  - Jesus of Nazareth
  - Jesus the Nazorean
  lexicon: BDAG
  rationale: Ναζωραῖος is a designation tied to Jesus' origin/identity. 'The Nazarene'
    is a standard and concise rendering that preserves the titular feel of the Greek.
    'Jesus of Nazareth' is possible but slightly more paraphrastic.
- source_word: δεῖν
  chosen: ought to
  alternatives:
  - must
  - had to
  lexicon: BDAG
  rationale: The infinitive expresses perceived necessity within Paul's former mindset.
    'Ought to' conveys subjective moral/practical obligation better than the stronger
    and potentially externally imposed 'must.'
- source_word: πολλὰ ἐναντία πρᾶξαι
  chosen: to do many things in opposition
  alternatives:
  - to do many hostile things
  - to act in many ways against
  - to do many things contrary
  lexicon: BDAG
  rationale: The phrase denotes carrying out many actions hostile or contrary to Jesus'
    name. 'Do many things in opposition' is clear modern English and preserves both
    the multiplicity (πολλά) and adversative sense (ἐναντία) without over-specifying
    the acts.
