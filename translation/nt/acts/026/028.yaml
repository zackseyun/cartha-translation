id: ACT.26.28
reference: Acts 26:28
source:
  edition: SBLGNT
  text: ὁ δὲ Ἀγρίππας πρὸς τὸν ⸀Παῦλον· Ἐν ὀλίγῳ με πείθεις Χριστιανὸν ⸀ποιῆσαι.
translation:
  text: Then Agrippa said to Paul, “In a short time you are persuading me to become
    a Christian.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Almost you persuade me to become a Christian,' or possibly, 'In such
      a short time do you think you can make me a Christian?' The Greek expression
      can refer to a small amount of time or degree, and Agrippa's tone may be sincere
      or ironic.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ Ἀγρίππας
  chosen: Then Agrippa
  alternatives:
  - But Agrippa
  - And Agrippa
  lexicon: BDAG
  rationale: δέ is a mild connective; 'Then' gives natural English narrative progression
    without overstating contrast. The article with the proper name is not carried
    into English.
- source_word: πρὸς τὸν Παῦλον
  chosen: said to Paul
  alternatives:
  - to Paul
  - addressing Paul
  lexicon: BDAG
  rationale: πρός with an implied speech verb after a naming formula is idiomatically
    rendered as direct address in English. 'Said to Paul' makes the discourse function
    explicit and readable.
- source_word: Ἐν ὀλίγῳ
  chosen: In a short time
  alternatives:
  - Almost
  - With little effort
  - In a little while
  lexicon: BDAG
  rationale: The phrase is famously ambiguous, capable of referring to a small amount
    of time or degree. 'In a short time' preserves the temporal sense most directly
    from the Greek while avoiding the more interpretive traditional 'Almost.' The
    alternative is preserved in a footnote because the expression is contested in
    meaning.
- source_word: με πείθεις
  chosen: you are persuading me
  alternatives:
  - you persuade me
  - you are trying to persuade me
  lexicon: BDAG
  rationale: Present indicative πείθεις is rendered progressively in English to fit
    the immediate conversational setting. This keeps the force of an ongoing attempt/result
    without adding modal nuance not explicit in the Greek.
- source_word: Χριστιανὸν
  chosen: a Christian
  lexicon: BDAG
  rationale: The accusative predicate with ποιῆσαι indicates the resulting identity/status.
    'Christian' is the established and accurate rendering of Χριστιανός here.
- source_word: ποιῆσαι
  chosen: to become
  alternatives:
  - to make me
  - to make me into
  lexicon: BDAG
  rationale: With πείθω + accusative + infinitive, ποιῆσαι expresses causing someone
    to be or become something. English idiom prefers 'to become a Christian' over
    the more wooden 'to make me a Christian,' while preserving the resultative sense.
