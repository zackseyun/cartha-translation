id: ACT.26.21
reference: Acts 26:21
source:
  edition: SBLGNT
  text: ἕνεκα τούτων ⸂με Ἰουδαῖοι⸃ ⸀συλλαβόμενοι ἐν τῷ ἱερῷ ἐπειρῶντο διαχειρίσασθαι.
translation:
  text: Because of these things, Jews seized me in the temple and were trying to kill
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For this reason' or 'On account of these things.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in the temple' uses a term for the temple complex, not specifically
      the inner sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: ἕνεκα τούτων
  chosen: Because of these things
  alternatives:
  - For this reason
  - On account of these things
  lexicon: BDAG
  rationale: ἕνεκα with the genitive expresses cause or reason. 'Because of these
    things' is natural English and preserves the backward-pointing causal force to
    Paul's preceding testimony and actions.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object of the participle συλλαβόμενοι; straightforward first-person
    singular accusative.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Jewish people
  - the Jews
  lexicon: BDAG
  rationale: The anarthrous plural refers to Jewish opponents involved in the incident,
    not to all Jewish people universally. 'Jews' is the most direct rendering; omitting
    'the' avoids sounding like a blanket ethnic generalization in English while still
    reflecting the Greek.
- source_word: συλλαβόμενοι
  chosen: seized
  alternatives:
  - arresting
  - laying hold of
  lexicon: BDAG
  rationale: The participle denotes taking hold of or seizing. 'Seized' fits the hostile
    context in the temple better than the more official-sounding 'arresting' and reads
    smoothly with the main verb.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is idiomatic and sufficient in English; 'temple courts' is possible
    but slightly more interpretive than the Greek requires.
- source_word: ἐπειρῶντο
  chosen: were trying
  alternatives:
  - attempted
  - were attempting
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or repeated attempt in past time.
    'Were trying' preserves the imperfective aspect more clearly than simple 'attempted'.
- source_word: διαχειρίσασθαι
  chosen: to kill
  alternatives:
  - to do away with
  - to murder
  lexicon: BDAG
  rationale: In this context the verb means to kill or do away with violently. 'To
    kill' is the clearest modern English rendering; 'murder' adds a legal/moral nuance
    not explicit in the lexeme itself, while 'do away with' is too euphemistic.
