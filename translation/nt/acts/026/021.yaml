theological_decisions:
- issue: Reference of 'Jews' in a polemically sensitive context
  chosen_reading: Rendered as 'Jews' without the article and understood contextually
    as the specific Jewish opponents who seized Paul, not as an indictment of the
    Jewish people as a whole.
  alternative_readings:
  - the Jews
  - Jewish people
  rationale: The Greek names the group involved in the event. The translation should
    neither erase the historical referent nor intensify it into an ethnic generalization.
    English style without the article helps preserve the narrative specificity.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    claims the text does not make.'
