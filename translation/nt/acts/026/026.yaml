id: ACT.26.26
reference: Acts 26:26
source:
  edition: SBLGNT
  text: ἐπίσταται γὰρ περὶ τούτων ὁ βασιλεύς, πρὸς ὃν ⸀καὶ παρρησιαζόμενος λαλῶ· λανθάνειν
    γὰρ ⸀αὐτὸν τούτων οὐ πείθομαι ⸀οὐθέν, οὐ γάρ ⸀ἐστιν ἐν γωνίᾳ πεπραγμένον τοῦτο.
translation:
  text: For the king knows about these things, and I speak boldly to him. For I am
    persuaded that none of these things has escaped his notice, because this has not
    been done in a corner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I speak freely to him.' The Greek participle conveys frank, open, confident
      speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'nothing of these things is hidden from him' or 'has gone unnoticed by
      him.'
    reason: lexical_alternative
  - marker: c
    text: '''Not been done in a corner'' is an idiom meaning it was not done secretly
      or obscurely.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐπίσταται
  chosen: knows
  alternatives:
  - is acquainted with
  - understands
  lexicon: BDAG
  rationale: The verb denotes knowledge or familiarity. 'Knows' is the most natural
    modern English rendering here and fits the direct assertion about the king's awareness.
- source_word: περὶ τούτων
  chosen: about these things
  alternatives:
  - concerning these things
  lexicon: BDAG
  rationale: περί with the genitive indicates reference or subject matter. 'About
    these things' is idiomatic and sufficiently formal.
- source_word: παρρησιαζόμενος
  chosen: speak boldly
  alternatives:
  - speak freely
  - speak openly
  lexicon: BDAG
  rationale: The participle conveys frankness and confidence in speech. 'Boldly' preserves
    the sense of fearless openness better than merely 'openly.'
- source_word: πρὸς ὃν ... λαλῶ
  chosen: I speak boldly to him
  alternatives:
  - I speak freely to whom
  - I address boldly
  lexicon: BDAG
  rationale: πρός with the relative pronoun marks the person addressed. Restructuring
    into natural English avoids awkwardness while preserving the direct object of
    Paul's speech.
- source_word: λανθάνειν ... αὐτὸν
  chosen: has escaped his notice
  alternatives:
  - is hidden from him
  - has gone unnoticed by him
  lexicon: BDAG
  rationale: The idiom with λανθάνω expresses something being unnoticed by someone.
    'Has escaped his notice' captures the idiomatic force in clear English.
- source_word: οὐ πείθομαι οὐθέν
  chosen: I am persuaded that none of these things
  alternatives:
  - I am convinced that nothing
  - I do not believe that anything
  lexicon: BDAG
  rationale: πείθομαι in the middle/passive commonly means 'be convinced/persuaded.'
    The double-negative construction is best rendered positively in English as Paul's
    settled conviction that nothing has escaped the king.
- source_word: πεπραγμένον
  chosen: has been done
  alternatives:
  - has happened
  - has been carried out
  lexicon: BDAG
  rationale: The perfect participle of πράσσω points to an action accomplished. 'Has
    been done' is a close and natural rendering, preserving the completed aspect.
- source_word: ἐν γωνίᾳ
  chosen: in a corner
  alternatives:
  - in secret
  - in some hidden place
  lexicon: BDAG
  rationale: The phrase is metaphorical for something not done secretly or obscurely.
    'In a corner' preserves the image and remains understandable in English.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this matter
  - this thing
  lexicon: BDAG
  rationale: The demonstrative refers broadly to the events under discussion. 'This'
    is concise and leaves the referent appropriately broad, as in the Greek.
