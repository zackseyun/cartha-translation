theological_decisions:
- issue: Scope of 'this' and public character of the events
  chosen_reading: Render neutrally as a public, well-known set of events without specifying
    more than the text states.
  alternative_readings:
  - Interpret 'this' narrowly as Jesus' death and resurrection alone
  - Interpret 'this' broadly as the whole Christian movement and Paul's case
  rationale: Paul's wording likely gestures to the publicly known events surrounding
    Jesus and the movement, but the verse itself does not define the scope with precision.
    The translation preserves that breadth rather than importing a narrower doctrinal
    specification.
  doctrine_reference: Preserve theological tension rather than resolve it.
