theological_decisions:
- issue: Meaning of ἅγιοι in Acts
  chosen_reading: Rendered as 'saints' referring to believers
  alternative_readings:
  - holy ones
  - God's people
  rationale: The term denotes members of the Christian community, not an elite subset.
    'Saints' preserves the lexical continuity of NT usage while remaining within historic
    Christian vocabulary.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Force of κατήνεγκα ψῆφον
  chosen_reading: Personal participation in voting against condemned believers
  alternative_readings:
  - general approval without formal vote
  rationale: The phrase most naturally conveys the act of casting a vote. The translation
    preserves that force without making claims beyond the text about the exact institutional
    setting.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
