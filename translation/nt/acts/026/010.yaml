id: ACT.26.10
reference: Acts 26:10
source:
  edition: SBLGNT
  text: ὃ καὶ ἐποίησα ἐν Ἱεροσολύμοις, καὶ πολλούς ⸀τε τῶν ἁγίων ἐγὼ ⸀ἐν φυλακαῖς
    κατέκλεισα τὴν παρὰ τῶν ἀρχιερέων ἐξουσίαν λαβών, ἀναιρουμένων τε αὐτῶν κατήνεγκα
    ψῆφον,
translation:
  text: 'And that is what I did in Jerusalem: not only did I lock up many of the saints
    in prisons, having received authority from the chief priests, but when they were
    being put to death, I cast my vote against them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I gave my vote against them.' The Greek literally refers to bringing
      or casting a 'vote' (ψῆφος).
    reason: lexical_alternative
  - marker: b
    text: '''Saints'' here means the holy people of God, that is, believers in Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ καὶ ἐποίησα
  chosen: And that is what I did
  alternatives:
  - Which I also did
  - This also I did
  lexicon: BDAG
  rationale: ὃ refers back to the preceding description of Paul's persecuting activity.
    English idiom prefers an explicit resumptive clause, 'that is what I did,' rather
    than the more wooden 'which I also did.'
- source_word: ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  lexicon: BDAG
  rationale: Standard rendering of the place name in idiomatic English.
- source_word: πολλούς τε τῶν ἁγίων
  chosen: many of the saints
  alternatives:
  - many of the holy ones
  - many of God's people
  lexicon: BDAG
  rationale: ἅγιοι in Acts commonly refers to believers/the holy people of God. 'Saints'
    preserves the established lexical sense without importing later canonization concepts.
- source_word: ἐν φυλακαῖς κατέκλεισα
  chosen: I lock up ... in prisons
  alternatives:
  - I shut up ... in prisons
  - I imprisoned
  lexicon: BDAG
  rationale: κατακλείω means to shut up/confine. 'Lock up ... in prisons' preserves
    both the verbal force and the explicit plural φυλακαῖς better than the compressed
    'imprisoned.'
- source_word: τὴν παρὰ τῶν ἀρχιερέων ἐξουσίαν λαβών
  chosen: having received authority from the chief priests
  alternatives:
  - having obtained authorization from the chief priests
  - with authority from the chief priests
  lexicon: BDAG
  rationale: The participial phrase explains the basis on which Paul acted. 'Authority'
    is the most direct rendering of ἐξουσία here; 'chief priests' is the standard
    translation of ἀρχιερεῖς.
- source_word: ἀναιρουμένων τε αὐτῶν
  chosen: when they were being put to death
  alternatives:
  - when they were being killed
  - when they were being executed
  lexicon: BDAG
  rationale: ἀναιρέω here denotes putting people to death. The passive participle
    is best represented temporally in English. 'Put to death' is clear and suitably
    grave without over-specifying legal execution.
- source_word: κατήνεγκα ψῆφον
  chosen: I cast my vote against them
  alternatives:
  - I gave my vote against them
  - I cast a vote
  lexicon: BDAG
  rationale: ψῆφος literally refers to a voting pebble and by extension a vote. The
    idiom 'cast my vote against them' communicates both the concrete and judicial
    sense in natural English. 'Against them' is contextually implied by the hostile
    action and commonly supplied in translation.
