theological_decisions:
- issue: Meaning of πνεύματος ἁγίου
  chosen_reading: Reference to the Holy Spirit as the divine person
  alternative_readings:
  - a holy spirit/disposition
  rationale: In Luke-Acts, πνεῦμα ἅγιον overwhelmingly refers to the Holy Spirit,
    and the characterization of Barnabas aligns with Spirit-empowered discipleship
    rather than a merely human attitude.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Nuance of πίστεως in Barnabas's characterization
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The doctrine table sets 'faith' as the default for πίστις, with alternatives
    preserved where contested. Here the context allows either inward trust or faithful
    character, but the default is retained in the main text and the alternative preserved
    in a footnote.
  doctrine_reference: 'Contested terms: πίστις'
- issue: Object of addition in προσετέθη ... τῷ κυρίῳ
  chosen_reading: people were added to the Lord
  alternative_readings:
  - people were added to the church/community
  rationale: The Greek explicitly says 'to the Lord.' While ecclesial incorporation
    is implied in Acts, the translation should not replace the stated object with
    an interpretive paraphrase.
  doctrine_reference: 'Translation philosophy #1, #3'
