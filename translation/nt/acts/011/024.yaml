id: ACT.11.24
reference: Acts 11:24
source:
  edition: SBLGNT
  text: ὅτι ἦν ἀνὴρ ἀγαθὸς καὶ πλήρης πνεύματος ἁγίου καὶ πίστεως. καὶ προσετέθη ὄχλος
    ἱκανὸς τῷ κυρίῳ.
translation:
  text: For he was a good man, full of the Holy Spirit and of faith. And a considerable
    crowd was added to the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of the Holy Spirit and of faithfulness.' The Greek word pistis
      can also mean 'faithfulness' or 'trust'; here the main text follows the default
      rendering 'faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the explanation for the preceding commendation of Barnabas.
    'For' reads naturally in English while preserving the explanatory force.
- source_word: ἀνὴρ
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The noun is grammatically and semantically masculine singular here, referring
    specifically to Barnabas. Per gender-accurate policy, 'man' is retained rather
    than neutralizing to 'person'.
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - upright
  - kind
  lexicon: BDAG
  rationale: '''Good'' is the most direct and idiomatic rendering, conveying moral
    quality without over-specifying the nuance.'
- source_word: πλήρης
  chosen: full
  alternatives:
  - filled
  lexicon: BDAG
  rationale: With genitives following, 'full of' is the standard and natural English
    equivalent.
- source_word: πνεύματος ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Rendered as the personal divine Spirit, not merely a holy disposition.
    The article is supplied in English for idiomatic reference to the known person
    of the Spirit.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine table, the default rendering of πίστις is 'faith.' In this
    context describing Barnabas's character, 'faith' fits well; 'faithfulness' is
    possible but less clearly demanded by the syntax.
- source_word: προσετέθη
  chosen: was added
  alternatives:
  - was joined
  - was added in number
  lexicon: BDAG
  rationale: The passive verb is preserved. In Acts this verb often denotes people
    being added to the community/the Lord; 'was added' keeps the biblical idiom without
    unnecessary expansion.
- source_word: ὄχλος ἱκανὸς
  chosen: a considerable crowd
  alternatives:
  - a large crowd
  - a sizable multitude
  lexicon: BDAG
  rationale: ὄχλος denotes a crowd/multitude, and ἱκανός here indicates substantial
    size. 'Considerable crowd' is natural modern English and preserves the sense of
    notable number.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - unto the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine defaults. The dative with προστίθημι
    here expresses being added to the Lord, not merely to the church, so the wording
    is retained.
