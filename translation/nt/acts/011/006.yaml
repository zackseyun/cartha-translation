id: ACT.11.6
reference: Acts 11:6
source:
  edition: SBLGNT
  text: εἰς ἣν ἀτενίσας κατενόουν καὶ εἶδον τὰ τετράποδα τῆς γῆς καὶ τὰ θηρία καὶ
    τὰ ἑρπετὰ καὶ τὰ πετεινὰ τοῦ οὐρανοῦ·
translation:
  text: As I looked intently into it, I was observing carefully, and I saw the four-footed
    animals of the earth, the wild beasts, the reptiles, and the birds of the sky.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the creeping things.' This rendering preserves the broader category
      language that echoes creation and purity-law classifications.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ἣν
  chosen: into it
  alternatives:
  - at which
  - on which
  lexicon: BDAG
  rationale: The phrase refers back to the sheet/container in Peter's vision. With
    ἀτενίζω, εἰς naturally conveys direction of gaze 'into' rather than merely 'at,'
    fitting the imagery of looking into the opened object.
- source_word: ἀτενίσας
  chosen: looked intently
  alternatives:
  - fixed my gaze
  - stared
  lexicon: BDAG
  rationale: The aorist participle denotes focused, intent looking. 'Looked intently'
    is natural modern English and preserves the concentrated visual attention.
- source_word: κατενόουν
  chosen: I was observing carefully
  alternatives:
  - I considered
  - I examined
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or progressive action, distinct from
    the aorist εἶδον that follows. Rendering it as 'was observing carefully' preserves
    both the durative sense and the nuance of attentive examination.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I perceived
  lexicon: BDAG
  rationale: A simple past 'I saw' best reflects the aorist and keeps a clear distinction
    from the preceding imperfect.
- source_word: τετράποδα τῆς γῆς
  chosen: the four-footed animals of the earth
  alternatives:
  - the quadrupeds of the earth
  - the four-footed creatures of the land
  lexicon: BDAG
  rationale: τετράποδα refers to four-footed animals. 'Animals' is more readable than
    'quadrupeds' while remaining accurate. 'Of the earth' is retained rather than
    flattened away, echoing the Greek categorization.
- source_word: θηρία
  chosen: the wild beasts
  alternatives:
  - the beasts
  - the wild animals
  lexicon: BDAG
  rationale: θηρία commonly denotes wild animals/beasts, distinct from the broader
    τετράποδα. 'Wild beasts' preserves that distinction and the elevated catalog style
    of the verse.
- source_word: ἑρπετὰ
  chosen: the reptiles
  alternatives:
  - the creeping things
  - the crawling creatures
  lexicon: BDAG
  rationale: The term denotes creeping/reptilian creatures. 'Reptiles' is concise
    and idiomatic, though somewhat narrower than 'creeping things'; the alternative
    is preserved in a footnote because of its biblical intertextual resonance with
    creation and food-law categories.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  chosen: the birds of the sky
  alternatives:
  - the birds of heaven
  - the flying creatures of the sky
  lexicon: BDAG
  rationale: πετεινά denotes birds/flying creatures. In this catalog, 'birds' is the
    most natural English rendering. 'Of the sky' is preferred over 'of heaven' in
    this concrete zoological context to avoid unnecessary ambiguity.
