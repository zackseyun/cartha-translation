id: ACT.11.16
reference: Acts 11:16
source:
  edition: SBLGNT
  text: ἐμνήσθην δὲ τοῦ ῥήματος ⸀τοῦ κυρίου ὡς ἔλεγεν· Ἰωάννης μὲν ἐβάπτισεν ὕδατι,
    ὑμεῖς δὲ βαπτισθήσεσθε ἐν πνεύματι ἁγίῳ.
translation:
  text: Then I remembered the word of the Lord, how he used to say, ‘John baptized
    with water, but you will be baptized in the Holy Spirit.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘with the Holy Spirit.’ The Greek preposition can be understood either
      locatively (‘in’) or instrumentally (‘with’).
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμνήσθην
  chosen: I remembered
  alternatives:
  - I recalled
  - it came to my mind
  lexicon: BDAG
  rationale: 'Aorist passive/deponent first singular of μιμνῄσκομαι functions idiomatically
    as an active: Peter states that he remembered. ''I remembered'' is natural and
    sufficiently formal.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ here marks a mild development in the narrative rather than strong
    contrast. 'Then' fits the discourse flow in English better than a bare 'but' or
    'and'.
- source_word: τοῦ ῥήματος
  chosen: the word
  alternatives:
  - the saying
  - the statement
  lexicon: BDAG
  rationale: ῥῆμα commonly denotes a spoken word or saying. 'The word' is idiomatic
    in biblical English and fits the following quotation.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' In Acts this refers to Jesus' authoritative saying, and 'Lord' preserves
    both usage and theological weight.
- source_word: ὡς ἔλεγεν
  chosen: how he used to say
  alternatives:
  - how he said
  - as he was saying
  lexicon: BDAG
  rationale: The imperfect ἔλεγεν can convey customary or repeated speech. Since Peter
    is recalling a known saying of Jesus, 'used to say' captures the imperfective
    nuance better than simple past, while remaining natural English.
- source_word: Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: μὲν ... δὲ
  chosen: but
  alternatives:
  - on the one hand ... on the other hand
  - indeed ... but
  lexicon: BDAG
  rationale: The pair sets up a contrast between John's baptism and the disciples'
    future baptism. English usually expresses this contrast simply with 'but' rather
    than preserving both particles explicitly.
- source_word: ἐβάπτισεν ὕδατι
  chosen: baptized with water
  alternatives:
  - immersed in water
  - baptized in water
  lexicon: BDAG
  rationale: βαπτίζω is best rendered 'baptize' here because it is the established
    and contextually precise term, and ὕδατι as dative of means/instrument is naturally
    'with water.' 'In water' is possible, but 'with water' better preserves the contrast
    with the following ἐν phrase in idiomatic English.
- source_word: ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit for emphasis, contrasting the audience with John.
    English can carry the emphasis adequately in the clause without an expanded rendering.
- source_word: βαπτισθήσεσθε
  chosen: will be baptized
  alternatives:
  - will be immersed
  lexicon: BDAG
  rationale: Future passive of βαπτίζω. 'Will be baptized' is the standard and contextually
    appropriate rendering, especially in a quotation echoing earlier Acts language.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - with the Holy Spirit
  - in Holy Spirit
  lexicon: BDAG
  rationale: The phrase is traditionally and naturally rendered 'in the Holy Spirit.'
    Because ἐν can be rendered either 'in' or 'with' here, and both are defensible,
    the main text keeps 'in' while preserving 'with' in a footnote. 'Holy Spirit'
    is capitalized because the referent is the divine Spirit, not a generic holy spirit.
