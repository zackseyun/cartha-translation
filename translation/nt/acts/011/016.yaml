theological_decisions:
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The project doctrine specifies 'Lord' as the default rendering for κύριος.
    In this context it refers to Jesus and carries authoritative theological significance
    without requiring a different gloss.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Preposition in ἐν πνεύματι ἁγίῳ
  chosen_reading: in the Holy Spirit
  alternative_readings:
  - with the Holy Spirit
  rationale: The Greek preposition ἐν permits more than one plausible English rendering
    here. To preserve theological tension rather than over-resolve the mode/instrument
    nuance, the main text uses 'in' and the alternative 'with' is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
