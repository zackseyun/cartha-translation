theological_decisions:
- issue: Reference of 'the Spirit' in διὰ τοῦ πνεύματος
  chosen_reading: the Holy Spirit is intended
  alternative_readings:
  - a spirit-inspired utterance in a less specific sense
  rationale: In Acts, 'the Spirit' in prophetic contexts ordinarily refers to the
    Holy Spirit. Capitalization in English reflects this contextual judgment, not
    a separate lexical item in Greek.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Scope of οἰκουμένη
  chosen_reading: rendered lexically as 'the whole inhabited world' without restricting
    it in the main text
  alternative_readings:
  - the whole world
  - the whole Roman world
  rationale: The term can denote the inhabited world broadly and in Luke-Acts often
    carries an imperial-world sense. To preserve the source's wording and avoid over-resolution,
    the main text keeps the broader lexical rendering, while a footnote preserves
    the contextual alternative.
  doctrine_reference: Translation philosophy §1, §3
