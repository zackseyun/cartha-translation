id: ACT.11.28
reference: Acts 11:28
source:
  edition: SBLGNT
  text: ἀναστὰς δὲ εἷς ἐξ αὐτῶν ὀνόματι Ἅγαβος ἐσήμανεν διὰ τοῦ πνεύματος λιμὸν ⸀μεγάλην
    μέλλειν ἔσεσθαι ἐφ’ ὅλην τὴν οἰκουμένην· ⸀ἥτις ἐγένετο ἐπὶ ⸀Κλαυδίου.
translation:
  text: And one of them, named Agabus, stood up and indicated by the Spirit that a
    great famine was about to come over the whole inhabited world—which happened in
    the time of Claudius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole world'; in Luke-Acts, 'inhabited world' can also refer more
      specifically to the Roman world.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces Agabus's action in the
    gathering. 'Stood up' is natural modern English and preserves the physical/actional
    sense better than the more literary 'rose'.
- source_word: ἐσήμανεν
  chosen: indicated
  alternatives:
  - signified
  - made known
  - predicted
  lexicon: BDAG
  rationale: σημαίνω means to indicate, signify, or make known. 'Indicated' preserves
    the lexical sense without over-interpreting the mode as a formal prophecy formula,
    while the context still clearly conveys predictive revelation.
- source_word: διὰ τοῦ πνεύματος
  chosen: by the Spirit
  alternatives:
  - through the Spirit
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or agency. 'By the Spirit'
    is concise and idiomatic in English, while still conveying that the revelation
    came through the Holy Spirit's agency. Capitalized 'Spirit' reflects the contextual
    reference to the Holy Spirit.
- source_word: λιμὸν μεγάλην
  chosen: a great famine
  alternatives:
  - a severe famine
  lexicon: BDAG
  rationale: λιμός denotes famine; μεγάλην is literally 'great.' 'A great famine'
    is a transparent rendering that preserves the Greek adjective rather than interpreting
    it more dynamically as 'severe,' though that is a plausible sense.
- source_word: μέλλειν ἔσεσθαι
  chosen: was about to come
  alternatives:
  - was going to happen
  - would occur
  lexicon: BDAG
  rationale: The periphrastic construction with μέλλω + infinitive expresses imminence
    or expected futurity. 'Was about to come' captures the predictive force and reads
    naturally with 'famine' as subject.
- source_word: ἐφ’ ὅλην τὴν οἰκουμένην
  chosen: over the whole inhabited world
  alternatives:
  - over the whole world
  - throughout the whole Roman world
  lexicon: BDAG
  rationale: οἰκουμένη literally refers to the inhabited world, often in Luke-Acts
    with reference to the imperial world rather than the globe in a modern scientific
    sense. 'The whole inhabited world' preserves the lexical meaning without prematurely
    narrowing it to 'Roman world' in the main text.
- source_word: ἥτις
  chosen: which
  alternatives:
  - and this
  - which indeed
  lexicon: BDAG
  rationale: ἥτις is a qualitative/indefinite relative pronoun, but in this context
    simple 'which' communicates the connection smoothly in English. The nuance is
    not weighty enough to force a more cumbersome rendering.
- source_word: ἐγένετο
  chosen: happened
  alternatives:
  - came to pass
  - occurred
  lexicon: BDAG
  rationale: γίνομαι here means 'happened' or 'took place.' 'Happened' is clear modern
    English and fits the translation philosophy's avoidance of archaic diction.
- source_word: ἐπὶ Κλαυδίου
  chosen: in the time of Claudius
  alternatives:
  - under Claudius
  - during Claudius's reign
  lexicon: BDAG
  rationale: ἐπί with the genitive in chronological expressions commonly means 'in
    the time of' or 'under' a ruler. 'In the time of Claudius' is accurate and accessible
    without requiring the supplied word 'reign' in the main text.
