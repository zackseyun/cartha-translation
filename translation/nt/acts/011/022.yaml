theological_decisions:
- issue: Referent of 'they sent out'
  chosen_reading: The subject is the Jerusalem church collectively.
  alternative_readings:
  - Unspecified leaders within the Jerusalem church sent him
  rationale: The nearest explicit antecedent is 'the church in Jerusalem.' The text
    does not specify apostles or elders, so the translation leaves the collective
    subject as 'they' rather than importing a narrower governing body.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the
    text does not make.'
