id: ACT.11.22
reference: Acts 11:22
source:
  edition: SBLGNT
  text: ἠκούσθη δὲ ὁ λόγος εἰς τὰ ὦτα τῆς ἐκκλησίας τῆς ⸀οὔσης ἐν ⸀Ἰερουσαλὴμ περὶ
    αὐτῶν, καὶ ἐξαπέστειλαν ⸀Βαρναβᾶν ἕως Ἀντιοχείας·
translation:
  text: Now the report about them reached the ears of the church in Jerusalem, and
    they sent out Barnabas as far as Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was heard by the church in Jerusalem'; literally, 'the report was heard
      into the ears of the church in Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσθη
  chosen: reached
  alternatives:
  - was heard
  - came
  lexicon: BDAG
  rationale: Although the verb is literally 'was heard,' in the idiom with 'into the
    ears' natural English is 'reached.' This preserves the passive sense of news coming
    to the church without awkwardness.
- source_word: ὁ λόγος
  chosen: the report
  alternatives:
  - the word
  - the news
  - the message
  lexicon: BDAG
  rationale: In this context λόγος refers to the news/report concerning events in
    Antioch, not a formal speech or theological 'word.' 'Report' best fits the narrative
    context.
- source_word: εἰς τὰ ὦτα
  chosen: reached the ears
  alternatives:
  - into the ears
  - came to the ears
  - was heard by
  lexicon: BDAG
  rationale: This is a Greek idiom for information coming to someone's attention.
    'Reached the ears' keeps the imagery while remaining readable English.
- source_word: ἐκκλησίας
  chosen: the church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: In Acts this term commonly denotes the Christian community. 'Church'
    is the most natural and contextually accurate rendering in English.
- source_word: τῆς οὔσης ἐν Ἰερουσαλήμ
  chosen: in Jerusalem
  alternatives:
  - that was in Jerusalem
  - which was in Jerusalem
  lexicon: BDAG
  rationale: The participial phrase identifies which church is meant. English normally
    compresses this to 'the church in Jerusalem' without loss of meaning.
- source_word: περὶ αὐτῶν
  chosen: about them
  alternatives:
  - concerning them
  - about these things
  lexicon: BDAG
  rationale: The pronoun most naturally refers to the people/events just described,
    especially the new believers in Antioch. 'About them' is the most direct rendering.
- source_word: ἐξαπέστειλαν
  chosen: they sent out
  alternatives:
  - they sent
  - they dispatched
  lexicon: BDAG
  rationale: The compound verb can mean send out/dispatch. 'Sent out' preserves the
    force of the compound while sounding natural in narrative English.
- source_word: Βαρναβᾶν
  chosen: Barnabas
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: ἕως Ἀντιοχείας
  chosen: as far as Antioch
  alternatives:
  - to Antioch
  - up to Antioch
  lexicon: BDAG
  rationale: ἕως with a place can mark extent or destination. 'As far as Antioch'
    reflects the Greek wording more closely than a simple 'to Antioch' while remaining
    idiomatic.
