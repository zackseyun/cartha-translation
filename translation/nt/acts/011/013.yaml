id: ACT.11.13
reference: Acts 11:13
source:
  edition: SBLGNT
  text: ἀπήγγειλεν ⸀δὲ ἡμῖν πῶς εἶδεν τὸν ἄγγελον ἐν τῷ οἴκῳ αὐτοῦ σταθέντα καὶ ⸀εἰπόντα·
    Ἀπόστειλον εἰς ⸀Ἰόππην καὶ μετάπεμψαι Σίμωνα τὸν ἐπικαλούμενον Πέτρον,
translation:
  text: And he reported to us how he had seen the angel standing in his house and
    saying, ‘Send to Joppa and summon Simon, who is called Peter.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'send for Simon, who is called Peter.' The verb translated 'summon' can
      also be rendered 'send for.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - told
  - described
  lexicon: BDAG
  rationale: Aorist indicative of ἀπαγγέλλω conveys reporting or relaying information.
    'Reported' fits the narrative register and preserves the sense of giving an account
    to others.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'And' is natural
    English and avoids overemphasizing contrast.
- source_word: πῶς
  chosen: how
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the report with the manner/content nuance 'how
    he had seen.' This is more precise than flattening it to simple 'that.'
- source_word: εἶδεν
  chosen: had seen
  alternatives:
  - saw
  lexicon: BDAG
  rationale: Although the Greek is aorist, English past perfect is appropriate because
    the seeing is prior to the reporting. This clarifies temporal sequence in idiomatic
    English.
- source_word: τὸν ἄγγελον
  chosen: the angel
  alternatives:
  - an angel
  lexicon: BDAG
  rationale: The Greek has the article, and in context this refers to the specific
    angel of Cornelius's vision already known in the narrative. 'The angel' best reflects
    the discourse reference.
- source_word: ἐν τῷ οἴκῳ αὐτοῦ
  chosen: in his house
  alternatives:
  - in his home
  lexicon: BDAG
  rationale: οἶκος here denotes the dwelling/household setting. 'House' is the more
    direct rendering and fits the physical location described.
- source_word: σταθέντα
  chosen: standing
  alternatives:
  - having stood
  - stationed
  lexicon: BDAG
  rationale: Aorist participle from ἵστημι describes the angel's posture/presence
    in the vision. English idiom prefers the participial adjective 'standing' rather
    than a more wooden 'having stood.'
- source_word: εἰπόντα
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: 'As a participle coordinated with σταθέντα, ''saying'' preserves the
    participial flow: the angel was standing and speaking.'
- source_word: Ἀπόστειλον
  chosen: Send
  alternatives:
  - Send men
  - Dispatch
  lexicon: BDAG
  rationale: Second person singular aorist imperative of ἀποστέλλω. The object is
    implicit from context; adding 'men' would import wording from related passages
    not explicit here.
- source_word: εἰς Ἰόππην
  chosen: to Joppa
  alternatives:
  - into Joppa
  lexicon: BDAG
  rationale: Standard destination sense of εἰς with a city name. 'Joppa' is the conventional
    English transliteration of Ἰόππη.
- source_word: μετάπεμψαι
  chosen: summon
  alternatives:
  - send for
  - call for
  lexicon: BDAG
  rationale: Aorist middle imperative of μεταπέμπομαι means to send for someone, with
    the result that they come. 'Summon' is concise and natural, though the nuance
    'send for' is preserved as an alternative.
- source_word: τὸν ἐπικαλούμενον Πέτρον
  chosen: who is called Peter
  alternatives:
  - the one called Peter
  - who is surnamed Peter
  lexicon: BDAG
  rationale: The present passive participle functions attributively to identify Simon
    by his commonly used name. 'Who is called Peter' is clear modern English and preserves
    the identifying force.
