theological_decisions:
- issue: Purity terminology distinction between κοινόν and ἀκάθαρτον
  chosen_reading: Render the two terms distinctly as 'common or unclean'
  alternative_readings:
  - unclean or impure
  - defiled or unclean
  - anything forbidden
  rationale: The verse intentionally preserves two related but non-identical purity
    categories. Distinguishing them avoids flattening Peter's objection and preserves
    the theological tension surrounding Jewish food laws in Acts 10–11.
  doctrine_reference: Translation philosophy §3, §5
