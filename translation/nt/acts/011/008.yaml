id: ACT.11.8
reference: Acts 11:8
source:
  edition: SBLGNT
  text: εἶπον δέ· Μηδαμῶς, κύριε, ⸀ὅτι κοινὸν ἢ ἀκάθαρτον οὐδέποτε εἰσῆλθεν εἰς τὸ
    στόμα μου.
translation:
  text: But I said, ‘By no means, Lord, because nothing common or unclean has ever
    entered my mouth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nothing defiled or unclean.' The Greek uses two distinct terms, 'common'
      and 'unclean,' which overlap in this purity context but are not identical.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδαμῶς
  chosen: By no means
  alternatives:
  - Certainly not
  - Not at all
  lexicon: BDAG
  rationale: Strong idiomatic negation; 'By no means' preserves the emphatic refusal
    in natural modern English better than a flat 'No.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title/address.
    In Peter's direct address, 'Lord' is the most contextually and theologically appropriate
    English equivalent.
- source_word: ὅτι
  chosen: because
  alternatives:
  - that
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Peter's refusal. 'Because' makes the causal
    force explicit in idiomatic English.
- source_word: κοινὸν
  chosen: common
  alternatives:
  - defiled
  - profane
  lexicon: BDAG
  rationale: Retains the distinct lexical value of κοινός rather than collapsing it
    into 'unclean.' In this dietary/purity context, 'common' reflects what is not
    set apart, while allowing ἀκάθαρτον to carry the stronger impurity term.
- source_word: ἀκάθαρτον
  chosen: unclean
  alternatives:
  - impure
  lexicon: BDAG
  rationale: Standard rendering in purity contexts; preserves the distinction from
    κοινόν and matches common biblical usage for ritual impurity.
- source_word: οὐδέποτε
  chosen: has ever
  alternatives:
  - never
  lexicon: BDAG
  rationale: With the English present perfect, 'has ever entered' naturally conveys
    Peter's lifelong experience up to the present speech. This is smoother than 'never
    entered' while preserving the force of οὐδέποτε.
- source_word: εἰσῆλθεν
  chosen: has entered
  alternatives:
  - entered
  - gone into
  lexicon: BDAG
  rationale: Rendered as an English present perfect to communicate past action with
    continuing relevance in current speech. 'Entered' is more natural than 'gone into'
    with 'my mouth.'
- source_word: εἰς τὸ στόμα μου
  chosen: entered my mouth
  alternatives:
  - gone into my mouth
  lexicon: BDAG
  rationale: A literal but natural expression for eating; preserves the concrete imagery
    of the Greek rather than paraphrasing as 'I have eaten.'
