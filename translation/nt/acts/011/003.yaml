theological_decisions:
- issue: Whether to render ἀκροβυστίαν ἔχοντας as the more interpretive 'Gentiles'
    or the more literal 'uncircumcised'
  chosen_reading: uncircumcised
  alternative_readings:
  - Gentiles
  rationale: The speakers' objection is specifically framed in covenantal and purity-boundary
    terms, not merely ethnicity. Retaining 'uncircumcised' preserves the theological
    and social offense expressed in the Greek.
  doctrine_reference: Translation philosophy §§1, 4, 5
