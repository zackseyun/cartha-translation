id: ACT.11.3
reference: Acts 11:3
source:
  edition: SBLGNT
  text: λέγοντες ὅτι ⸂Εἰσῆλθες πρὸς ἄνδρας ἀκροβυστίαν ἔχοντας καὶ συνέφαγες⸃ αὐτοῖς.
translation:
  text: saying, “You went in to men who were uncircumcised and ate with them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to uncircumcised men'; the phrase refers to those outside the Jewish
      covenant marker of circumcision, that is, Gentiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - they were saying
  lexicon: BDAG
  rationale: Present participle introducing the content of the accusation; 'saying'
    is natural English and preserves the participial linkage to the previous narrative
    context.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse. English idiom is best served by quotation
    rather than an explicit 'that' clause.
- source_word: Εἰσῆλθες
  chosen: you went in
  alternatives:
  - you entered
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι. 'Went in' is more natural modern English here while
    retaining the concrete sense of entering.
- source_word: πρὸς
  chosen: to
  alternatives:
  - into the company of
  - with
  lexicon: BDAG
  rationale: With persons, πρός can indicate movement toward or association with.
    'To' fits the idiom 'went in to' and preserves the accusatory force of entering
    their space.
- source_word: ἄνδρας
  chosen: men
  alternatives:
  - people
  - males
  lexicon: BDAG
  rationale: ἀνήρ refers to men/males, not generic humanity here. 'Men' is gender-accurate
    and matches the source.
- source_word: ἀκροβυστίαν ἔχοντας
  chosen: who were uncircumcised
  alternatives:
  - having uncircumcision
  - uncircumcised men
  lexicon: BDAG
  rationale: The participial expression is an idiomatic Jewish way of referring to
    Gentiles as uncircumcised. 'Who were uncircumcised' is clear, natural, and preserves
    the ethnic-religious stigma in the accusation without overparaphrasing to 'Gentiles'.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordination of the two accusations.
- source_word: συνέφαγες
  chosen: ate with
  alternatives:
  - shared a meal with
  - ate together with
  lexicon: BDAG
  rationale: The compound verb συνεσθίω emphasizes eating together. 'Ate with' is
    the most direct and idiomatic rendering.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - with them
  lexicon: BDAG
  rationale: 'Rendered within the English idiom required by συνέφαγες: ''ate with
    them.'''
