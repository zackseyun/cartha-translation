id: ACT.11.15
reference: Acts 11:15
source:
  edition: SBLGNT
  text: ἐν δὲ τῷ ἄρξασθαί με λαλεῖν ἐπέπεσεν τὸ πνεῦμα τὸ ἅγιον ἐπ’ αὐτοὺς ὥσπερ καὶ ἐφ’ ἡμᾶς ἐν ἀρχῇ.
translation:
  text: And as I began to speak, the Holy Spirit fell on them just as it had on us at the beginning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I began to speak.' The Greek construction can be rendered either 'as' or 'when.'
    reason: lexical_alternative
  - marker: b
    text: '''At the beginning'' likely refers to the beginning of the Spirit''s outpouring on the disciples, that is, Pentecost.'
    reason: cross_reference
  - marker: c
    text: Or 'just as also on us'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν δὲ τῷ ἄρξασθαί με λαλεῖν
  chosen: as I began to speak
  alternatives:
  - when I began to speak
  - as I started speaking
  lexicon: BDAG
  rationale: The construction ἐν + articular infinitive commonly expresses contemporaneous time ('when/as'). 'As I began to speak' is natural English and preserves the sense that the Spirit came at the very outset of Peter's speech.
- source_word: λαλεῖν
  chosen: to speak
  alternatives:
  - to talk
  lexicon: BDAG
  rationale: λαλέω here refers to Peter's act of speaking/addressing the audience. 'Speak' is more fitting than the more casual 'talk' in narrative discourse.
- source_word: ἐπέπεσεν
  chosen: fell on
  alternatives:
  - came upon
  - fell upon
  lexicon: BDAG
  rationale: ἐπιπίπτω with ἐπί in Acts is a vivid idiom for the Spirit's coming upon people. 'Fell on' is the most direct rendering and preserves the narrative force without overinterpreting.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the Greek title; it is both accurate and readable modern English.
- source_word: ἐπ’ αὐτούς
  chosen: on them
  alternatives:
  - upon them
  lexicon: BDAG
  rationale: Matches the preposition ἐπί with the verb ἐπέπεσεν and keeps the parallel with 'on us' later in the verse.
- source_word: ὥσπερ καὶ ἐφ’ ἡμᾶς
  chosen: just as also on us
  alternatives:
  - just as on us also
  - even as on us
  lexicon: BDAG
  rationale: ὥσπερ marks close comparison ('just as'), and καί adds 'also.' The wording preserves the explicit parallel between the Gentiles and the apostles.
- source_word: ἐν ἀρχῇ
  chosen: at the beginning
  alternatives:
  - in the beginning
  - at first
  lexicon: BDAG
  rationale: In Acts this points back to the beginning of the Spirit's outpouring among the disciples (Pentecost), not to creation. 'At the beginning' is the clearest idiomatic English in context and avoids the potentially misleading cosmic sense of 'in the beginning.'
