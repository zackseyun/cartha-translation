theological_decisions:
- issue: Referent of 'at the beginning' (ἐν ἀρχῇ)
  chosen_reading: A temporal reference to the beginning of the apostolic Spirit-outpouring experience, especially Pentecost.
  alternative_readings:
  - A more general 'at first' without specific Pentecost reference
  rationale: The immediate context is Peter comparing the Spirit's coming on Cornelius's household with what happened 'on us.' In Acts, this naturally points to the initial outpouring on the apostles and other disciples. The translation itself remains non-interpretively broad enough ('at the beginning') while the rationale documents the likely referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T02:39:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/011/015.json
  category: awkward_english
  tier: 1
  from: just as also on us
  to: just as it had on us
  rationale: The current rendering is a literal but slightly stiff translation of 'ὥσπερ καὶ ἐφ’ ἡμᾶς'. A more idiomatic English rendering would supply the implied verb. Using the past perfect ('just as it had on us') makes the parallel action explicit and clarifies the temporal sequence, since the event 'at the beginning' (Pentecost) preceded the current event.
