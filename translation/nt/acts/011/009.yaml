theological_decisions:
- issue: Purity-language nuance in κοινόω
  chosen_reading: call common
  alternative_readings:
  - regard as unclean
  - call impure
  rationale: The verse contrasts divine cleansing with human designation of something
    as κοινός. Rendering it 'common' preserves the Jewish purity-category language
    without flattening it into the broader category 'unclean.' Because many English
    readers may understand the sense as 'unclean/impure,' that alternative is preserved
    in a footnote rather than moved into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
