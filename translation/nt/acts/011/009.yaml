id: ACT.11.9
reference: Acts 11:9
source:
  edition: SBLGNT
  text: ἀπεκρίθη δὲ ⸂φωνὴ ἐκ δευτέρου⸃ ἐκ τοῦ οὐρανοῦ· Ἃ ὁ θεὸς ἐκαθάρισεν σὺ μὴ κοίνου.
translation:
  text: But a voice answered from heaven a second time, ‘What God has made clean,
    you must not call common.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “you must not regard as unclean” or “you must not call impure.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent of ἀποκρίνομαι commonly means 'answered/replied.'
    'Answered' is natural English and fits the narrative sequence.
- source_word: φωνὴ
  chosen: a voice
  lexicon: BDAG
  rationale: The nominative subject is indefinite here; 'a voice' preserves the Greek
    without over-specifying the speaker.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - for the second time
  - again
  lexicon: BDAG
  rationale: This idiom means 'for the second time' or 'a second time.' 'A second
    time' is concise and idiomatic in English.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: In this context οὐρανός refers to heaven, not merely the sky. 'From heaven'
    is the standard and theologically appropriate rendering.
- source_word: Ἃ
  chosen: What
  alternatives:
  - The things that
  - Those things that
  lexicon: BDAG
  rationale: The neuter plural relative pronoun introduces a general category. English
    idiom prefers singular 'What' for this construction.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject; no article is needed in English
    proper usage.
- source_word: ἐκαθάρισεν
  chosen: has made clean
  alternatives:
  - cleansed
  - made clean
  lexicon: BDAG
  rationale: καθαρίζω means 'cleanse/make clean.' The perfect-like English 'has made
    clean' highlights the completed action with present relevance in the quoted divine
    statement.
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can preserve this
    sufficiently with 'you' in normal position before 'must not,' without adding awkward
    emphasis.
- source_word: μὴ κοίνου
  chosen: must not call common
  alternatives:
  - must not make common
  - must not regard as unclean
  - do not call impure
  lexicon: BDAG
  rationale: κοινόω literally means 'make common/profane,' and in Jewish purity contexts
    'common' contrasts with what God has cleansed. 'Call common' best reflects the
    idiom and preserves the conceptual contrast with 'made clean.' 'Unclean' is interpretive
    and better preserved as an alternative.
