id: ACT.11.10
reference: Acts 11:10
source:
  edition: SBLGNT
  text: τοῦτο δὲ ἐγένετο ἐπὶ τρίς, καὶ ⸂ἀνεσπάσθη πάλιν⸃ ἅπαντα εἰς τὸν οὐρανόν.
translation:
  text: This happened three times, and everything was drawn up again into heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all of it was taken up again into heaven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: This
  alternatives:
  - This thing
  - This vision
  lexicon: BDAG
  rationale: Demonstrative referring back to the repeated visionary event just described.
    'This' is natural English and sufficiently specific without adding 'vision,' which
    is implied by context but not explicit in the word itself.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - then
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective in narrative flow. English idiom
    is best served by rendering the clause connection with 'and' in the second half
    while not forcing a separate gloss at the start.
- source_word: ἐγένετο
  chosen: happened
  alternatives:
  - took place
  - came about
  - occurred
  lexicon: BDAG
  rationale: γίνομαι in this context denotes an event occurring. 'Happened' is clear,
    natural modern English and fits the narrative register.
- source_word: ἐπὶ τρίς
  chosen: three times
  alternatives:
  - on three occasions
  - thrice
  lexicon: BDAG
  rationale: The idiom means repetition on three occasions. 'Three times' is the most
    natural contemporary equivalent; 'thrice' is too archaic.
- source_word: ἀνεσπάσθη
  chosen: was drawn up
  alternatives:
  - was pulled up
  - was taken up
  - was lifted up
  lexicon: BDAG
  rationale: Passive of ἀνασπάω conveys upward movement by an external force. 'Was
    drawn up' preserves the passive and the imagery of the sheet-like object being
    pulled upward, without overinterpreting the agent.
- source_word: πάλιν
  chosen: again
  alternatives:
  - back
  - once more
  lexicon: BDAG
  rationale: Adverb of repetition/restoration. 'Again' is the most straightforward
    rendering in context.
- source_word: ἅπαντα
  chosen: everything
  alternatives:
  - all things
  - it all
  lexicon: BDAG
  rationale: Neuter plural used comprehensively for the contents/whole scene. 'Everything'
    reads naturally in English and captures the totality. 'It all' is possible but
    slightly more interpretive.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - into the sky
  - to heaven
  lexicon: BDAG
  rationale: In Acts, οὐρανός in visionary contexts commonly refers to heaven rather
    than merely the visible sky. 'Into heaven' preserves the directional force of
    εἰς and the theological/narrative setting.
