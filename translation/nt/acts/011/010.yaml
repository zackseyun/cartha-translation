theological_decisions:
- issue: Referent of ἅπαντα in Peter's vision report
  chosen_reading: Rendered broadly as 'everything' without specifying 'the sheet'
    or 'the animals.'
  alternative_readings:
  - '''the whole thing'''
  - '''all of it'''
  - '''all the animals'''
  rationale: The Greek neuter plural is comprehensive but not narrowly explicit here.
    A broad rendering preserves the wording of the report and avoids importing a more
    specific referent than the text states in this verse alone.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
