id: ACT.11.7
reference: Acts 11:7
source:
  edition: SBLGNT
  text: ἤκουσα δὲ ⸀καὶ φωνῆς λεγούσης μοι· Ἀναστάς, Πέτρε, θῦσον καὶ φάγε.
translation:
  text: And I also heard a voice saying to me, ‘Get up, Peter; kill and eat.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rise, Peter; slaughter and eat.' The Greek verb θῦσον can in some contexts
      mean 'sacrifice,' but here the sense is the killing of animals for food within
      the vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω here reports a completed act of hearing.
    'I heard' is the natural English equivalent in narrative context.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' best carries the narrative continuation
    in smooth modern English without implying stronger contrast than the Greek requires.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: 'Placed with φωνῆς, καί adds an additional element to Peter''s report:
    he not only saw but also heard. ''Also'' makes that additive force explicit in
    idiomatic English.'
- source_word: φωνῆς
  chosen: a voice
  alternatives:
  - a sound
  lexicon: BDAG
  rationale: φωνή can mean 'sound' or 'voice'; with the participle λεγούσης ('saying'),
    the personal sense 'voice' is clearly intended.
- source_word: λεγούσης μοι
  chosen: saying to me
  alternatives:
  - speaking to me
  lexicon: BDAG
  rationale: The present participle modifies 'voice' and introduces the content of
    speech. 'Saying to me' is the most direct and natural rendering.
- source_word: Ἀναστάς
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: The aorist participle functions imperativally in direct address before
    the following commands. 'Get up' is clear modern English and fits the command
    sequence.
- source_word: Πέτρε
  chosen: Peter
  lexicon: BDAG
  rationale: Vocative of the proper name Πέτρος. Standard English transliteration
    is 'Peter.'
- source_word: θῦσον
  chosen: kill
  alternatives:
  - slaughter
  - sacrifice
  lexicon: BDAG
  rationale: Though θύω can mean 'sacrifice,' in this vision context the command concerns
    preparing animals for food. 'Kill' best fits the collocation 'kill and eat' and
    avoids importing cultic overtones not required here.
- source_word: φάγε
  chosen: eat
  lexicon: BDAG
  rationale: Aorist imperative of ἐσθίω, straightforwardly rendered 'eat.'
