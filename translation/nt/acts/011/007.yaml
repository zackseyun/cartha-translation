theological_decisions:
- issue: Whether θῦσον should be rendered with sacrificial language
  chosen_reading: kill
  alternative_readings:
  - sacrifice
  - slaughter
  rationale: The immediate context is Peter's vision about clean and unclean animals
    and permission to eat, not an instruction to perform a sacrifice. Rendering θῦσον
    as 'kill' preserves the practical sense without adding cultic theology beyond
    the text.
  doctrine_reference: Translation philosophy §1, §3
