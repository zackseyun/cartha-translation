theological_decisions:
- issue: Rendering the group name Χριστιανούς in light of the project's preference for translating Χριστός as 'Messiah' where title is in view
  chosen_reading: Christians
  alternative_readings:
  - Messianists
  rationale: Here the term is not simply the title Χριστός used predicatively, but the established ethnicon/group label Χριστιανοί. English 'Christians' is the conventional and semantically accurate equivalent for the name by which the disciples were known. Rendering it 'Messianists' would foreground etymology at the expense of natural meaning and could suggest a sectarian nuance not present in normal English usage.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; consistency of key terms, or documented exception.'
revisions:
- timestamp: '2026-04-21T02:47:52Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/011/026.json
  category: awkward_english
  tier: 1
  from: and taught a considerable crowd, and in Antioch the disciples were first called Christians.
  to: and taught a considerable crowd; and it was in Antioch that the disciples were first called Christians.
  rationale: The current rendering joins three distinct events (meeting, teaching, being named) in a way that creates a run-on sentence, weakening the impact of the final, climactic statement. The Greek presents these as a series of outcomes of the year-long ministry. Using a semicolon and the 'it-cleft' construction ('it was in Antioch that...') separates the final clause for emphasis, improves the grammatical structure, and better reflects that the naming of 'Christians' is the key takeaway of the verse.
