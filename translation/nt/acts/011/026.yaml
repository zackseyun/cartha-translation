id: ACT.11.26
reference: Acts 11:26
source:
  edition: SBLGNT
  text: καὶ εὑρὼν ⸀ἤγαγεν εἰς Ἀντιόχειαν. ἐγένετο δὲ ⸂αὐτοῖς καὶ⸃ ἐνιαυτὸν ὅλον συναχθῆναι ⸀ἐν τῇ ἐκκλησίᾳ καὶ διδάξαι ὄχλον ἱκανόν, χρηματίσαι τε ⸀πρώτως ἐν Ἀντιοχείᾳ τοὺς μαθητὰς Χριστιανούς.
translation:
  text: And when he found him, he brought him to Antioch. And for a whole year they met together with the church and taught a considerable crowd; and it was in Antioch that the disciples were first called Christians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled with the church.' The phrase may emphasize gathering together with the Christian community rather than meeting in a building.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'were first called Christians.' The name likely originated as a public designation in Antioch.
    reason: cultural_note
  - marker: c
    text: Or 'and taught a considerable crowd, and in Antioch the disciples were first called Christians.'.
    reason: previous_rendering
lexical_decisions:
- source_word: εὑρὼν
  chosen: when he found him
  alternatives:
  - having found him
  - after finding him
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; English idiom is smoother with a temporal clause while preserving sequence.
- source_word: ἤγαγεν
  chosen: he brought him
  alternatives:
  - he led him
  - he took him
  lexicon: BDAG
  rationale: ἄγω here denotes bringing Saul to Antioch; 'brought' is natural English and fits the context better than the more wooden 'led'.
- source_word: ἐγένετο δὲ αὐτοῖς καὶ
  chosen: And for a whole year they
  alternatives:
  - And it happened for them also
  - And it came about that they
  lexicon: BDAG
  rationale: This idiom introduces the ensuing circumstance. The dative αὐτοῖς refers to Barnabas and Saul. The rendering avoids awkward literalism while preserving the narrative transition.
- source_word: ἐνιαυτὸν ὅλον
  chosen: for a whole year
  alternatives:
  - an entire year
  - for the whole year
  lexicon: BDAG
  rationale: Straightforward temporal accusative; 'for a whole year' is clear modern English.
- source_word: συναχθῆναι ἐν τῇ ἐκκλησίᾳ
  chosen: met together with the church
  alternatives:
  - were gathered in the church
  - assembled with the church
  lexicon: BDAG
  rationale: The passive infinitive with ἐν τῇ ἐκκλησίᾳ most naturally conveys gathering in association with the church/community. 'Met together with the church' is more idiomatic than 'were gathered in the church' and avoids implying a building.
- source_word: ἐκκλησίᾳ
  chosen: church
  alternatives:
  - assembly
  - congregation
  lexicon: BDAG
  rationale: In Acts this term commonly denotes the Christian community. 'Church' is the standard and contextually appropriate rendering, without requiring a building sense.
- source_word: διδάξαι
  chosen: taught
  alternatives:
  - to teach
  lexicon: BDAG
  rationale: Coordinated infinitive dependent on ἐγένετο; rendered as a finite verb in English for natural style while preserving the action.
- source_word: ὄχλον ἱκανόν
  chosen: a considerable crowd
  alternatives:
  - many people
  - a large crowd
  lexicon: BDAG
  rationale: ἱκανός here means considerable/substantial. 'Considerable crowd' preserves the sense of size without overstatement.
- source_word: χρηματίσαι
  chosen: were called
  alternatives:
  - were named
  - were designated
  - received the name
  lexicon: BDAG
  rationale: In this context χρηματίζω refers to being called or designated by a name. The passive English construction matches the sense well.
- source_word: πρώτως
  chosen: first
  alternatives:
  - for the first time
  lexicon: BDAG
  rationale: Adverb marking first occurrence; 'first' is concise and idiomatic in this sentence.
- source_word: Χριστιανούς
  chosen: Christians
  alternatives:
  - Messianists
  lexicon: BDAG
  rationale: Although Χριστός is often rendered 'Messiah' when functioning clearly as a title, Χριστιανούς is a lexicalized group designation in Greek and standard English 'Christians' best represents the established name. A more literal title-based coinage like 'Messianists' would be unnatural and misleading in English.
