id: ACT.11.5
reference: Acts 11:5
source:
  edition: SBLGNT
  text: Ἐγὼ ἤμην ἐν πόλει Ἰόππῃ προσευχόμενος καὶ εἶδον ἐν ἐκστάσει ὅραμα, καταβαῖνον
    σκεῦός τι ὡς ὀθόνην μεγάλην τέσσαρσιν ἀρχαῖς καθιεμένην ἐκ τοῦ οὐρανοῦ, καὶ ἦλθεν
    ἄχρι ἐμοῦ·
translation:
  text: 'I was in the city of Joppa praying, and in a trance I saw a vision: something
    like a large sheet was coming down, being lowered from heaven by its four corners,
    and it came to me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a certain vessel'; the Greek uses a broad term for an object or container
      before comparing it to a large sheet.
    reason: lexical_alternative
  - marker: b
    text: Or 'let down from heaven by four corners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ ἤμην
  chosen: I was
  alternatives:
  - I myself was
  lexicon: BDAG
  rationale: The explicit pronoun Ἐγώ adds slight emphasis, but natural English usually
    does not require 'I myself' here. 'I was' preserves the first-person setting without
    overtranslating the emphasis.
- source_word: ἐν πόλει Ἰόππῃ
  chosen: in the city of Joppa
  alternatives:
  - in Joppa
  lexicon: BDAG
  rationale: The Greek explicitly includes πόλει ('city'), so 'in the city of Joppa'
    preserves the fuller expression, though 'in Joppa' would be idiomatic English.
- source_word: προσευχόμενος
  chosen: praying
  alternatives:
  - while praying
  lexicon: BDAG
  rationale: The present participle is contemporaneous with ἤμην and is naturally
    rendered 'praying.' English readers will understand the ongoing action; 'while
    praying' is possible but slightly more interpretive.
- source_word: ἐν ἐκστάσει
  chosen: in a trance
  alternatives:
  - in ecstasy
  - in an ecstatic state
  lexicon: BDAG
  rationale: ἔκστασις in Acts denotes an altered visionary state. 'In a trance' is
    the clearest modern English rendering and matches the narrative context better
    than the misleadingly emotional 'ecstasy.'
- source_word: ὅραμα
  chosen: a vision
  lexicon: BDAG
  rationale: Standard rendering for ὅραμα in visionary contexts; clear and consistent
    with Acts usage.
- source_word: καταβαῖνον
  chosen: was coming down
  alternatives:
  - descending
  lexicon: BDAG
  rationale: The participle describes the motion of the object seen in the vision.
    'Was coming down' is readable modern English; 'descending' is more formal but
    less natural.
- source_word: σκεῦός τι
  chosen: something
  alternatives:
  - a certain object
  - some kind of container
  - a vessel
  lexicon: BDAG
  rationale: σκεῦος is a broad term for an object, vessel, or container. Because the
    following comparison ('like a large sheet') clarifies its appearance, 'something'
    best reflects the indefinite τι without forcing a more specific category too early.
- source_word: ὡς ὀθόνην μεγάλην
  chosen: like a large sheet
  alternatives:
  - like a great linen sheet
  lexicon: BDAG
  rationale: ὀθόνη refers to a sheet or sailcloth-like fabric. 'Large sheet' is clear
    and sufficient here; adding 'linen' would be more specific than the Greek requires.
- source_word: τέσσαρσιν ἀρχαῖς
  chosen: by its four corners
  alternatives:
  - by four corners
  - at the four ends
  lexicon: BDAG
  rationale: ἀρχαί here refers to extremities/ends. 'By its four corners' is the most
    natural English expression for the image.
- source_word: καθιεμένην
  chosen: being lowered
  alternatives:
  - let down
  - lowered
  lexicon: BDAG
  rationale: The perfect/passive participle from καθίημι describes the sheet as in
    the state of being lowered. 'Being lowered' fits the participial relation smoothly
    in English. 'Let down' is traditional and possible, but 'being lowered' is slightly
    clearer for modern readers.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: In Acts this phrase in a vision context naturally means 'from heaven,'
    not merely 'from the sky.' This preserves the vertical, revelatory sense.
- source_word: ἦλθεν ἄχρι ἐμοῦ
  chosen: it came to me
  alternatives:
  - it came as far as me
  - it reached me
  lexicon: BDAG
  rationale: ἄχρι with the genitive marks movement up to Peter's location. 'It came
    to me' is idiomatic and captures the sense without awkward literalism.
