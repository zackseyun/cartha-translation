theological_decisions:
- issue: Rendering of visionary terminology without overstating mystical experience
  chosen_reading: in a trance I saw a vision
  alternative_readings:
  - in ecstasy I saw a vision
  - I saw a vision while in an ecstatic state
  rationale: 'The verse reports a revelatory experience using both ἐκστάσει and ὅραμα.
    The chosen wording preserves both elements distinctly: Peter was in a trance,
    and within that state he saw a vision. This avoids flattening the two terms into
    one idea or importing later mystical connotations.'
  doctrine_reference: Translation philosophy §1, §6
