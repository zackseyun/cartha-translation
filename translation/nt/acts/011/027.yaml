theological_decisions:
- issue: Nature of 'prophets' in the Antioch/Jerusalem church context
  chosen_reading: Render προφῆται simply as 'prophets' without narrowing the term
    to either OT-style canonical prophets or merely gifted preachers.
  alternative_readings:
  - prophetic teachers
  - inspired messengers
  rationale: The Greek uses the ordinary term προφῆται and does not itself define
    the precise scope of their ministry here. To preserve theological tension and
    avoid importing a denominational view of prophetic office, the translation keeps
    the broad term 'prophets.'
  doctrine_reference: Preserve theological tension rather than resolve it.
