id: ACT.11.27
reference: Acts 11:27
source:
  edition: SBLGNT
  text: Ἐν ταύταις δὲ ταῖς ἡμέραις κατῆλθον ἀπὸ Ἱεροσολύμων προφῆται εἰς Ἀντιόχειαν·
translation:
  text: Now in those days prophets came down from Jerusalem to Antioch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went down from Jerusalem to Antioch.' The Greek verb can be rendered
      either 'came down' or 'went down'; 'came down' is chosen for natural English
      from the perspective of arrival.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ταύταις δὲ ταῖς ἡμέραις
  chosen: Now in those days
  alternatives:
  - In those days
  - During those days
  - At that time
  lexicon: BDAG
  rationale: The phrase is a temporal frame. δέ is lightly connective; 'Now' captures
    the narrative transition in natural English without overtranslating. 'In those
    days' preserves the temporal wording of the Greek.
- source_word: κατῆλθον
  chosen: came down
  alternatives:
  - went down
  - came
  lexicon: BDAG
  rationale: κατέρχομαι commonly means 'go/come down.' Because the destination is
    Antioch from the narrator's perspective and English idiom favors 'came' for arrival
    at the stated destination, 'came down' is natural while preserving the vertical/geographical
    sense present in the Greek.
- source_word: ἀπὸ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - from Jerusalems
  lexicon: BDAG
  rationale: Although Ἱεροσόλυμα is morphologically plural in Greek, standard English
    uses the singular place name 'Jerusalem.' The preposition ἀπό is straightforwardly
    'from.'
- source_word: προφῆται
  chosen: prophets
  alternatives:
  - inspired speakers
  lexicon: BDAG
  rationale: The ordinary and contextually appropriate rendering is 'prophets.' This
    preserves the recognized early Christian prophetic role without paraphrase.
- source_word: εἰς Ἀντιόχειαν
  chosen: to Antioch
  alternatives:
  - into Antioch
  lexicon: BDAG
  rationale: εἰς marks movement toward/into a place. In idiomatic English with city
    names, 'to Antioch' is the standard rendering.
