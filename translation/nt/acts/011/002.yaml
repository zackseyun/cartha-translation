theological_decisions:
- issue: Identification of οἱ ἐκ περιτομῆς
  chosen_reading: a circumcision-identified group within the Jerusalem believers who
    objected to Peter
  alternative_readings:
  - all Jewish believers generally
  - a formal 'circumcision party' in a later technical sense
  rationale: The phrase marks a subgroup defined by circumcision concerns. The translation
    avoids overstating this as a formal party while still reflecting that more than
    ethnicity is in view in the narrative context.
  doctrine_reference: Translation philosophy §§1, 5
