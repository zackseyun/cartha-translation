id: ACT.11.2
reference: Acts 11:2
source:
  edition: SBLGNT
  text: ⸂ὅτε δὲ⸃ ἀνέβη Πέτρος εἰς ⸀Ἰερουσαλήμ, διεκρίνοντο πρὸς αὐτὸν οἱ ἐκ περιτομῆς
translation:
  text: But when Peter went up to Jerusalem, those of the circumcision group were
    disputing with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those of the circumcision,' 'the circumcision party,' or 'the circumcised
      believers.' The Greek identifies a group by its association with circumcision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - Now when
  - And when
  lexicon: BDAG
  rationale: δέ here marks narrative development with mild contrast or transition.
    'But when' preserves the connective force in readable English better than omitting
    it.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: BDAG
  rationale: ἀναβαίνω commonly means 'go up,' and with Jerusalem it reflects the conventional
    geographical/topographical idiom. 'Went up' preserves the source wording without
    sounding unnatural.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name, in keeping with the
    policy to transliterate names.
- source_word: διεκρίνοντο
  chosen: were disputing
  alternatives:
  - were contending
  - took issue
  - were criticizing
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or repeated opposition/dispute.
    In this context the sense is not mere internal doubt but active contention directed
    toward Peter. 'Were disputing' captures the verbal conflict while remaining natural
    English.
- source_word: πρὸς αὐτόν
  chosen: with him
  alternatives:
  - against him
  - to him
  lexicon: BDAG
  rationale: With verbs of dispute, πρός plus accusative commonly indicates engagement
    directed toward a person. 'With him' is idiomatic in English for verbal contention;
    'against him' would sharpen hostility beyond what the phrase itself requires.
- source_word: οἱ ἐκ περιτομῆς
  chosen: those of the circumcision group
  alternatives:
  - those of the circumcision
  - the circumcision party
  - the circumcised believers
  lexicon: BDAG
  rationale: Literally 'those from/out of circumcision.' In Acts this refers to the
    Jewish-Christian faction identified by circumcision, not simply all circumcised
    persons in a bare ethnic sense. 'Those of the circumcision group' preserves the
    identity marker without importing a later technical party label too strongly.
