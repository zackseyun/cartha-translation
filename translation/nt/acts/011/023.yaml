id: ACT.11.23
reference: Acts 11:23
source:
  edition: SBLGNT
  text: ὃς παραγενόμενος καὶ ἰδὼν τὴν χάριν ⸀τὴν τοῦ θεοῦ, ἐχάρη καὶ παρεκάλει πάντας
    τῇ προθέσει τῆς καρδίας ⸀προσμένειν τῷ κυρίῳ,
translation:
  text: When he arrived and saw the grace of God, he rejoiced and kept urging them
    all to remain devoted to the Lord with purpose of heart,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'God's grace.' The phrase may refer to the visible evidence of God's
      gracious work among them.
    reason: lexical_alternative
  - marker: b
    text: Or 'to continue with the Lord' or 'to remain faithful to the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: παραγενόμενος
  chosen: arrived
  alternatives:
  - came
  - came there
  lexicon: BDAG
  rationale: Aorist participle indicating Barnabas's arrival on the scene. 'Arrived'
    is natural modern English and preserves the event sense without unnecessary expansion.
- source_word: ἰδὼν
  chosen: saw
  alternatives:
  - perceived
  - observed
  lexicon: BDAG
  rationale: The participle from ὁράω is straightforwardly rendered 'saw.' In context
    it can imply perception of God's work, but the text itself uses ordinary visual
    language.
- source_word: τὴν χάριν τὴν τοῦ θεοῦ
  chosen: the grace of God
  alternatives:
  - God's grace
  - the favor of God
  lexicon: BDAG
  rationale: χάρις here refers to God's gracious action evident in the Antioch believers.
    'The grace of God' preserves the theological weight and the article structure
    without overinterpreting it as merely subjective attitude.
- source_word: ἐχάρη
  chosen: rejoiced
  alternatives:
  - was glad
  - became joyful
  lexicon: BDAG
  rationale: The passive/deponent form idiomatically means 'rejoiced' or 'was glad.'
    'Rejoiced' best matches the elevated but readable tone.
- source_word: παρεκάλει
  chosen: kept urging
  alternatives:
  - encouraged
  - exhorted
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action. παρακαλέω can mean
    encourage, exhort, urge; 'kept urging' preserves the imperfect force and the hortatory
    sense.
- source_word: πάντας
  chosen: them all
  alternatives:
  - everyone
  - all
  lexicon: BDAG
  rationale: The object is the gathered believers in context. 'Them all' makes the
    referent explicit in idiomatic English without adding new content.
- source_word: τῇ προθέσει τῆς καρδίας
  chosen: with purpose of heart
  alternatives:
  - with resolute heart
  - with steadfast purpose
  - with heartfelt resolve
  lexicon: BDAG
  rationale: πρόθεσις denotes purpose, resolve, or intention; καρδία in biblical usage
    is the inner person/will. 'With purpose of heart' is slightly formal but transparent
    and closely follows the Greek construction.
- source_word: προσμένειν
  chosen: to remain devoted
  alternatives:
  - to remain faithful
  - to continue with
  - to remain with
  lexicon: BDAG
  rationale: προσμένω means to continue in association with, persist, remain devoted
    to. Because the dative τῷ κυρίῳ follows, 'remain devoted to' communicates persevering
    attachment better than the flatter 'remain with.'
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' Here the referent is the risen
    Jesus in Acts' narrative context, but the translation keeps the title as in Greek.
