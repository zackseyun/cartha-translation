theological_decisions:
- issue: Meaning of 'the grace of God' in context
  chosen_reading: God's gracious work evident among the Antioch believers
  alternative_readings:
  - a gracious disposition from God
  - the believers' graciousness
  rationale: The phrase in Acts commonly refers to observable divine favor/work rather
    than merely an inward attitude. The translation preserves the phrase literally
    rather than paraphrasing it as 'what God had done,' allowing the theological richness
    to remain.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Force of προσμένειν τῷ κυρίῳ
  chosen_reading: persevering attachment/devotion to the Lord
  alternative_readings:
  - remaining with the Lord
  - continuing in faithfulness to the Lord
  rationale: The Greek expresses ongoing steadfast adherence. 'Remain devoted to the
    Lord' communicates this clearly without importing a narrower doctrinal category
    such as perseverance in a later systematic sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Contested terms
    table for κύριος'
