id: ACT.11.19
reference: Acts 11:19
source:
  edition: SBLGNT
  text: Οἱ μὲν οὖν διασπαρέντες ἀπὸ τῆς θλίψεως τῆς γενομένης ἐπὶ Στεφάνῳ διῆλθον
    ἕως Φοινίκης καὶ Κύπρου καὶ Ἀντιοχείας μηδενὶ λαλοῦντες τὸν λόγον εἰ μὴ μόνον
    Ἰουδαίοις.
translation:
  text: So then, those who had been scattered because of the affliction that arose
    over Stephen went as far as Phoenicia and Cyprus and Antioch, speaking the word
    to no one except Jews only.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'persecution' for 'affliction.' The Greek term can denote distress, trouble,
      or persecution in context.
    reason: lexical_alternative
  - marker: b
    text: '''The word'' here refers to the proclaimed message about Jesus; alternatively,
      ''the message.'''
    reason: lexical_alternative
  - marker: c
    text: 'The Greek is emphatic: ''except only to Jews'' or ''except to Jews alone.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διασπαρέντες
  chosen: had been scattered
  alternatives:
  - were scattered
  - had been dispersed
  lexicon: BDAG
  rationale: Aorist passive participle referring back to the dispersion following
    persecution. 'Had been scattered' captures antecedent action relative to the main
    verb and preserves the passive sense.
- source_word: θλίψεως
  chosen: affliction
  alternatives:
  - tribulation
  - persecution
  - trouble
  lexicon: BDAG
  rationale: θλῖψις broadly denotes distress/affliction. Here the context is hostile
    pressure connected with Stephen, but the noun itself is not the more specific
    term for persecution. 'Affliction' preserves the broader lexical sense while fitting
    the narrative context.
- source_word: τῆς γενομένης ἐπὶ Στεφάνῳ
  chosen: that arose over Stephen
  alternatives:
  - that happened because of Stephen
  - that occurred in connection with Stephen
  - over Stephen
  lexicon: BDAG
  rationale: The construction points to the outbreak associated with Stephen's case,
    not merely his personal suffering in abstraction. 'Arose over Stephen' is concise
    and preserves the causal/associative force of ἐπί with the dative in this context.
- source_word: διῆλθον
  chosen: went
  alternatives:
  - traveled
  - passed through
  lexicon: BDAG
  rationale: In context the verb describes movement through regions to specified destinations.
    'Went' is natural English and sufficiently reflects the travel sense without overtranslating.
- source_word: ἕως
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: BDAG
  rationale: Marks the extent of their travel. 'As far as' clearly conveys geographic
    range.
- source_word: Φοινίκης
  chosen: Phoenicia
  alternatives:
  - Phenicia
  lexicon: BDAG
  rationale: Standard English transliteration of the region name.
- source_word: Κύπρου
  chosen: Cyprus
  lexicon: BDAG
  rationale: Standard English transliteration of the island name.
- source_word: Ἀντιοχείας
  chosen: Antioch
  lexicon: BDAG
  rationale: Standard English transliteration of the city name.
- source_word: μηδενὶ λαλοῦντες
  chosen: speaking ... to no one
  alternatives:
  - telling no one
  - speaking to nobody
  lexicon: BDAG
  rationale: Retains the participial construction and the ordinary sense of λαλέω
    as speaking. The dative μηδενί is naturally rendered 'to no one.'
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the word of the gospel
  lexicon: BDAG
  rationale: In Acts this expression often functions as a shorthand for the Christian
    message. 'The word' preserves Luke's recurring terminology; more explicit expansions
    would import interpretive content into the main text.
- source_word: εἰ μὴ μόνον Ἰουδαίοις
  chosen: except Jews only
  alternatives:
  - except only to Jews
  - except to Jews alone
  lexicon: BDAG
  rationale: The phrase is emphatic, with both εἰ μή and μόνον restricting the audience.
    'Except Jews only' preserves that emphasis, though slightly marked in English.
