theological_decisions:
- issue: Nature of the hostility following Stephen's death
  chosen_reading: Render θλίψις with the broader term 'affliction' rather than the
    narrower 'persecution' in the main text.
  alternative_readings:
  - persecution
  rationale: The narrative context certainly involves persecution, but the Greek noun
    here is broader. Using 'affliction' avoids narrowing the lexical range beyond
    what the source explicitly states while still allowing readers to infer the hostile
    setting from context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Meaning of τὸν λόγον in Acts
  chosen_reading: Keep the idiomatic but source-near expression 'the word' in the
    main text.
  alternative_readings:
  - the message
  - the gospel message
  rationale: Luke frequently uses 'the word' as a thematic expression for the proclaimed
    message. Expanding it to 'gospel message' would be interpretively clarifying but
    less transparent to the Greek. A lexical alternative is preserved in a footnote
    for readability.
  doctrine_reference: Translation philosophy §1, §5
