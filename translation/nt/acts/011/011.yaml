id: ACT.11.11
reference: Acts 11:11
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ἐξαυτῆς τρεῖς ἄνδρες ἐπέστησαν ἐπὶ τὴν οἰκίαν ἐν ᾗ ⸀ἦμεν, ἀπεσταλμένοι
    ἀπὸ Καισαρείας πρός με.
translation:
  text: And behold, at that very moment three men arrived at the house where we were,
    having been sent to me from Caesarea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immediately' or 'just then' for 'at that very moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retains the discourse-marking force of drawing attention to a significant
    development. 'Behold' is slightly formal but still transparent here and preserves
    the vividness better than omitting it.
- source_word: ἐξαυτῆς
  chosen: at that very moment
  alternatives:
  - immediately
  - just then
  lexicon: BDAG
  rationale: The term emphasizes immediacy ('at once,' 'immediately, just then').
    'At that very moment' captures the temporal connection to the preceding vision
    more naturally in English than a bare adverb.
- source_word: τρεῖς ἄνδρες
  chosen: three men
  lexicon: BDAG
  rationale: A straightforward rendering of the numeral plus ἀνήρ. 'Men' is gender-accurate
    and contextually specific, matching the source.
- source_word: ἐπέστησαν
  chosen: arrived
  alternatives:
  - stood at
  - came up to
  - appeared at
  lexicon: BDAG
  rationale: In this context ἐφίστημι conveys sudden arrival/presence. 'Arrived' gives
    clear modern English while fitting the narrative sense better than the more wooden
    'stood at.'
- source_word: ἐπὶ τὴν οἰκίαν
  chosen: at the house
  alternatives:
  - to the house
  - upon the house
  lexicon: BDAG
  rationale: With ἐπέστησαν, the phrase indicates arrival at the location. 'At the
    house' is idiomatic English and reflects the sense without over-literal awkwardness.
- source_word: ἐν ᾗ ἦμεν
  chosen: where we were
  alternatives:
  - in which we were
  - where we were staying
  lexicon: BDAG
  rationale: The relative clause simply states location. 'Where we were' is the most
    direct rendering; 'staying' is possible but slightly more interpretive than the
    Greek requires.
- source_word: ἀπεσταλμένοι
  chosen: having been sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: The perfect/passive participle is well represented by 'having been sent,'
    showing prior commissioning relative to their arrival. This preserves the participial
    nuance better than a flattened adjective alone.
- source_word: ἀπὸ Καισαρείας
  chosen: from Caesarea
  lexicon: BDAG
  rationale: Standard rendering of the place name with ἀπό indicating origin.
- source_word: πρός με
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: Here πρός with the accusative marks direction toward Peter as the intended
    recipient. 'To me' is the clearest and least interpretive choice.
