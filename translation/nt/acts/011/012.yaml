id: ACT.11.12
reference: Acts 11:12
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸂τὸ πνεῦμά μοι⸃ συνελθεῖν αὐτοῖς μηδὲν ⸀διακρίναντα. ἦλθον δὲ σὺν
    ἐμοὶ καὶ οἱ ἓξ ἀδελφοὶ οὗτοι, καὶ εἰσήλθομεν εἰς τὸν οἶκον τοῦ ἀνδρός.
translation:
  text: And the Spirit told me to go with them, making no distinction. These six brothers
    also came with me, and we entered the man's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without hesitating' or 'without doubting.' The Greek participle can
      denote either not making a distinction or not wavering.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ πνεῦμά
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: In Acts, πνεῦμα with the article in revelatory guidance contexts commonly
    refers to the Holy Spirit. Rendering as 'the Spirit' is natural English and preserves
    Luke's wording without adding 'Holy' where it is not explicit.
- source_word: εἶπεν ... μοι
  chosen: told me
  alternatives:
  - said to me
  lexicon: BDAG
  rationale: λέγω plus indirect object can be rendered more idiomatically in English
    as 'told me' when introducing an instruction. This preserves the directive force
    in readable modern English.
- source_word: συνελθεῖν αὐτοῖς
  chosen: to go with them
  alternatives:
  - to accompany them
  - to join them
  lexicon: BDAG
  rationale: The infinitive from συνέρχομαι here denotes accompanying the men. 'Go
    with them' is the clearest natural rendering in context.
- source_word: μηδὲν διακρίναντα
  chosen: making no distinction
  alternatives:
  - without hesitating
  - without doubting
  lexicon: BDAG
  rationale: 'διακρίνω can mean distinguish, doubt, or hesitate depending on context.
    Here, in Peter''s defense for entering a Gentile house, the social/ethnic sense
    fits strongly: the Spirit told him not to discriminate between Jew and Gentile.
    The participle is rendered adverbially as ''making no distinction.'' Alternative
    renderings are preserved in a footnote because the phrase is genuinely debated.'
- source_word: οἱ ἓξ ἀδελφοὶ οὗτοι
  chosen: these six brothers
  alternatives:
  - these six brothers here
  - these six fellow believers
  lexicon: BDAG
  rationale: ἀδελφοί is rendered 'brothers' in keeping with the gender-accurate policy
    and because the referents are six male companions. 'These' preserves οὗτοι.
- source_word: εἰσήλθομεν
  chosen: we entered
  alternatives:
  - we went in
  lexicon: BDAG
  rationale: A straightforward rendering of the aorist verb; 'entered' is slightly
    more formal and fits the narrative register.
- source_word: τὸν οἶκον τοῦ ἀνδρός
  chosen: the man's house
  alternatives:
  - the house of the man
  - his house
  lexicon: BDAG
  rationale: ἀνήρ here refers to the specific male person just mentioned (Cornelius).
    'The man's house' is natural English and preserves the explicit noun rather than
    replacing it with a pronoun.
