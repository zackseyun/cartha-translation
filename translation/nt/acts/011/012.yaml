theological_decisions:
- issue: Meaning of μηδὲν διακρίναντα in Peter's report
  chosen_reading: making no distinction
  alternative_readings:
  - without hesitating
  - without doubting
  rationale: The immediate context concerns Peter's crossing the Jew-Gentile boundary
    and defending that action before Jewish believers. Rendering the participle in
    terms of discrimination/distinction best preserves Luke's theological emphasis
    that God made no distinction between Jews and Gentiles. Because the Greek can
    also be understood as 'without hesitating/doubting,' those alternatives are preserved
    in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it
