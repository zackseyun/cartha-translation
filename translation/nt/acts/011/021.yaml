theological_decisions:
- issue: Referent of 'the Lord' in this context
  chosen_reading: Render κύριος simply as 'Lord' in both instances without specifying
    'Jesus' in the translation.
  alternative_readings:
  - the Lord = Jesus explicitly
  - the Lord = God more generally
  rationale: Acts often uses κύριος in ways that can point to Jesus, especially in
    conversion contexts, but the Greek text itself says only 'the Lord.' To preserve
    the text's wording and theological openness, the translation keeps 'Lord' without
    interpretive expansion.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
