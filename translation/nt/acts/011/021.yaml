id: ACT.11.21
reference: Acts 11:21
source:
  edition: SBLGNT
  text: καὶ ἦν χεὶρ κυρίου μετ’ αὐτῶν, πολύς τε ἀριθμὸς ⸀ὁ πιστεύσας ἐπέστρεψεν ἐπὶ
    τὸν κύριον.
translation:
  text: And the hand of the Lord was with them, and a great number who believed turned
    to the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord's hand'; the phrase is a biblical idiom for the Lord's active
      power or favor.
    reason: lexical_alternative
  - marker: b
    text: Or 'having believed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χεὶρ κυρίου
  chosen: the hand of the Lord
  alternatives:
  - the Lord's hand
  - the power of the Lord
  lexicon: BDAG
  rationale: A common biblical idiom for the Lord's active power or favor. The literal
    rendering 'the hand of the Lord' preserves the metaphor and intertextual resonance,
    while remaining clear in English.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine default, κύριος is rendered 'Lord.' In Acts this title can
    refer to Jesus in context; the standard title should be preserved rather than
    weakened to 'master.'
- source_word: μετ’ αὐτῶν
  chosen: with them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: The preposition μετά with genitive most naturally means 'with.' This
    expresses divine presence/support accompanying the missionaries.
- source_word: πολύς τε ἀριθμός
  chosen: a great number
  alternatives:
  - a large number
  - many
  lexicon: BDAG
  rationale: This phrase idiomatically denotes a large quantity of people. 'A great
    number' is natural English and preserves the nominal construction better than
    the looser 'many.'
- source_word: ὁ πιστεύσας
  chosen: who believed
  alternatives:
  - having believed
  - who came to believe
  lexicon: BDAG
  rationale: 'The articular aorist participle functions collectively with ''a great
    number'': ''those who believed.'' In idiomatic English after a quantitative expression,
    ''a great number who believed'' is concise and clear. ''Having believed'' is more
    wooden.'
- source_word: ἐπέστρεψεν ἐπὶ τὸν κύριον
  chosen: turned to the Lord
  alternatives:
  - turned to the Lord in repentance
  - returned to the Lord
  lexicon: BDAG
  rationale: ἐπιστρέφω with ἐπί can denote turning/conversion toward the Lord. 'Turned
    to the Lord' preserves the conversion sense without importing an explicit doctrinal
    nuance such as repentance beyond what the text states. 'Returned' could imply
    prior covenant relationship, which is not required here.
