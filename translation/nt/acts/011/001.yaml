theological_decisions:
- issue: Rendering ἀδελφοὶ in a representative mixed-community context
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - believers
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    renderings where the Greek is grammatically masculine with representative force.
    Because the term likely includes the wider believing community, an explanatory
    footnote preserves that nuance without flattening the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
