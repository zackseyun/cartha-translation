id: ACT.11.1
reference: Acts 11:1
source:
  edition: SBLGNT
  text: Ἤκουσαν δὲ οἱ ἀπόστολοι καὶ οἱ ἀδελφοὶ οἱ ὄντες κατὰ τὴν Ἰουδαίαν ὅτι καὶ
    τὰ ἔθνη ἐδέξαντο τὸν λόγον τοῦ θεοῦ.
translation:
  text: Now the apostles and the brothers who were throughout Judea heard that the
    Gentiles also had received the word of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may refer to fellow
      believers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουσαν
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω, introducing reported news. 'Heard'
    is the natural and sufficiently formal English rendering.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - then
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative transition rather than strong contrast. 'Now'
    signals the shift smoothly in modern English.
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Acts this term refers to the recognized apostolic group, so 'apostles'
    is the established and contextually precise rendering.
- source_word: ἀδελφοὶ
  chosen: brothers
  alternatives:
  - brothers and sisters
  - believers
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and likely refers representatively
    to fellow believers. Per translation philosophy, a gender-accurate rendering is
    preferred over a gender-neutral one; inclusivity can be noted in a footnote.
- source_word: οἱ ὄντες κατὰ τὴν Ἰουδαίαν
  chosen: who were throughout Judea
  alternatives:
  - who were in Judea
  - who were across Judea
  lexicon: BDAG
  rationale: The participial phrase identifies the brothers by location. κατά with
    the accusative here has a distributive sense, best captured by 'throughout Judea'
    rather than merely 'in Judea.'
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - the Judean region
  lexicon: BDAG
  rationale: Standard geographical transliteration; concise and natural in English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - how
  lexicon: BDAG
  rationale: Introduces the content of what was heard; 'that' is the straightforward
    English complementizer.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Here καί highlights the surprising inclusion of the Gentiles in addition
    to Jews. 'Also' preserves that additive emphasis without overstatement.
- source_word: τὰ ἔθνη
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In this Acts context ἔθνη refers to non-Jews rather than nations in a
    geopolitical sense. 'Gentiles' is the clearest contextual rendering.
- source_word: ἐδέξαντο
  chosen: had received
  alternatives:
  - received
  - accepted
  - welcomed
  lexicon: BDAG
  rationale: δέχομαι can mean receive or welcome. 'Received' fits the idiom 'received
    the word of God.' The English past perfect reflects the action as prior to the
    hearing in the main clause.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A common early Christian expression for God's proclaimed message. 'The
    word of God' preserves the biblical idiom and theological resonance.
