id: ACT.11.29
reference: Acts 11:29
source:
  edition: SBLGNT
  text: τῶν δὲ μαθητῶν καθὼς εὐπορεῖτό τις ὥρισαν ἕκαστος αὐτῶν εἰς διακονίαν πέμψαι
    τοῖς κατοικοῦσιν ἐν τῇ Ἰουδαίᾳ ἀδελφοῖς·
translation:
  text: So the disciples determined, each according to his ability, to send relief
    for service to the brothers living in Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as anyone prospered' or 'according to what each could afford.'
    reason: lexical_alternative
  - marker: b
    text: '''The brothers'' likely refers to fellow believers in Judea, including
      the wider Christian community.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητῶν
  chosen: the disciples
  alternatives:
  - the followers
  lexicon: BDAG
  rationale: Standard NT term for Jesus' disciples/followers; 'disciples' is the established
    and accurate rendering in Acts.
- source_word: καθὼς εὐπορεῖτό τις
  chosen: each according to his ability
  alternatives:
  - as anyone prospered
  - according to what each could afford
  lexicon: BDAG
  rationale: The idiom expresses proportion to one's means/resources. 'Ability' communicates
    practical capacity in natural English while preserving the distributive sense
    with ἕκαστος. The masculine singular τις is generic/distributive, so 'his' follows
    the gender-accurate policy.
- source_word: ὥρισαν
  chosen: determined
  alternatives:
  - decided
  - resolved
  lexicon: BDAG
  rationale: ὁρίζω here means to set/decide/resolve. 'Determined' preserves the sense
    of a deliberate decision without sounding overly formal.
- source_word: ἕκαστος αὐτῶν
  chosen: each
  alternatives:
  - each of them
  lexicon: BDAG
  rationale: The distributive force is already carried in English by 'each' in this
    sentence; 'of them' is implicit and can be omitted for readability.
- source_word: εἰς διακονίαν
  chosen: for service
  alternatives:
  - for ministry
  - as aid
  - for relief
  lexicon: BDAG
  rationale: διακονία broadly denotes service/ministry/assistance. Here it refers
    to practical support sent to believers in need. 'For service' keeps the lexical
    connection to διακονία while allowing 'relief' to be expressed by the whole clause
    rather than forcing it into this noun alone.
- source_word: πέμψαι
  chosen: to send relief
  alternatives:
  - to send
  - to send assistance
  lexicon: BDAG
  rationale: The infinitive means 'to send,' but in context the implied object is
    aid/support for famine-stricken believers. Supplying 'relief' makes the English
    idiomatic and reflects the contextual sense without over-specifying the exact
    form of the gift.
- source_word: τοῖς κατοικοῦσιν ἐν τῇ Ἰουδαίᾳ
  chosen: to those living in Judea
  alternatives:
  - to those dwelling in Judea
  lexicon: BDAG
  rationale: A straightforward rendering of the participial phrase; 'living' is natural
    modern English.
- source_word: ἀδελφοῖς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the fellow believers
  lexicon: BDAG
  rationale: Per gender-accurate policy, the masculine plural is retained as 'brothers.'
    In context it likely refers to the Christian community inclusively, so an explanatory
    footnote preserves that nuance without flattening the source form in the main
    text.
