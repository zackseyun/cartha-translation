theological_decisions:
- issue: Gendered familial term ἀδελφοῖς in reference to the Judean Christian community
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the fellow believers
  rationale: The Greek uses the masculine plural ἀδελφοῖς, which in early Christian
    usage can refer to a mixed community. Following the stated policy, the main text
    remains gender-accurate to the source form, while inclusivity is preserved in
    a footnote rather than being resolved in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
