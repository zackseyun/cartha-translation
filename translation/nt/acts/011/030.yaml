id: ACT.11.30
reference: Acts 11:30
source:
  edition: SBLGNT
  text: ὃ καὶ ἐποίησαν ἀποστείλαντες πρὸς τοὺς πρεσβυτέρους διὰ χειρὸς Βαρναβᾶ καὶ
    Σαύλου.
translation:
  text: And they did so, sending it to the elders by the hand of Barnabas and Saul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Barnabas and Saul.' The Greek idiom literally says 'by the hand
      of Barnabas and Saul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  chosen: so
  alternatives:
  - which
  - this
  lexicon: BDAG
  rationale: The neuter relative pronoun refers back to the relief contribution mentioned
    in the previous verse. In idiomatic English, after 'And they did,' the anaphoric
    sense is best conveyed by 'so' rather than the more wooden 'which.'
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  lexicon: BDAG
  rationale: Here καί links this verse to the previous statement narratively. 'And'
    fits the flow better than 'also' in English.
- source_word: ἐποίησαν
  chosen: they did
  alternatives:
  - they carried it out
  - they acted
  lexicon: BDAG
  rationale: ποιέω here is semantically light, referring to carrying out the previously
    stated intention. 'They did' preserves the concise Greek expression and naturally
    pairs with 'so.'
- source_word: ἀποστείλαντες
  chosen: sending
  alternatives:
  - having sent
  - by sending
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous or attendant to the main action
    in narrative summary. 'Sending' is natural modern English and captures the means
    by which they carried out the action.
- source_word: πρὸς τοὺς πρεσβυτέρους
  chosen: to the elders
  alternatives:
  - to the presbyters
  lexicon: BDAG
  rationale: πρεσβύτεροι in Acts refers to recognized community leaders. 'Elders'
    is the standard transparent rendering; 'presbyters' is more technical and less
    accessible.
- source_word: διὰ χειρὸς
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: BDAG
  rationale: This idiom denotes agency or instrumentality through designated messengers.
    'By the hand of' preserves the concrete Greek idiom while remaining understandable
    in English.
- source_word: Βαρναβᾶ καὶ Σαύλου
  chosen: Barnabas and Saul
  rationale: Personal names are transliterated by standard conventions in keeping
    with the translation philosophy.
- source_word: implicit object from context
  chosen: it
  alternatives:
  - the gift
  - the relief
  rationale: English normally requires an explicit object with 'sending,' though Greek
    leaves it implicit because it is recoverable from the previous verse's mention
    of the relief contribution. 'It' preserves the Greek economy without over-specifying.
