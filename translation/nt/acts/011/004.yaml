id: ACT.11.4
reference: Acts 11:4
source:
  edition: SBLGNT
  text: ἀρξάμενος ⸀δὲ Πέτρος ἐξετίθετο αὐτοῖς καθεξῆς λέγων·
translation:
  text: But Peter began and explained it to them in order, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set it before them in sequence' or 'gave them an orderly account.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρξάμενος
  chosen: began
  alternatives:
  - having begun
  - beginning
  lexicon: BDAG
  rationale: Aorist middle participle of ἄρχω used adverbially with the main verb.
    In idiomatic English, 'began' naturally conveys the participial sense without
    awkwardness. It also preserves the narrative transition into Peter's explanation.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition from the accusation in the
    previous verse to Peter's response. 'But' best captures that adversative nuance
    in context.
- source_word: Πέτρος
  chosen: Peter
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: ἐξετίθετο
  chosen: explained
  alternatives:
  - set forth
  - related
  - expounded
  lexicon: BDAG
  rationale: Imperfect middle of ἐκτίθημι here means to set out or explain a matter.
    'Explained' is clear modern English and fits the context of Peter recounting events.
    The imperfect is represented together with λέγων as ongoing narrative discourse.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to Peter's interlocutors. 'To them' is
    the straightforward English equivalent.
- source_word: καθεξῆς
  chosen: in order
  alternatives:
  - in sequence
  - step by step
  - from the beginning
  lexicon: BDAG
  rationale: The adverb means in sequence or in orderly fashion. 'In order' is concise
    and natural, preserving the sense that Peter gave an orderly account. 'From the
    beginning' is interpretive and better left as an alternative, since the word itself
    emphasizes sequence more than starting point.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the content of Peter's speech. 'Saying'
    preserves the participial linkage and prepares for the direct discourse that follows.
