id: ACT.11.25
reference: Acts 11:25
source:
  edition: SBLGNT
  text: ἐξῆλθεν δὲ εἰς ⸀Ταρσὸν ἀναζητῆσαι Σαῦλον,
translation:
  text: Then he went out to Tarsus to look for Saul,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to search for Saul' or 'to seek out Saul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - went
  lexicon: BDAG
  rationale: Aorist of ἐξέρχομαι, literally 'went out.' 'Went out' preserves the directional
    nuance present in the Greek better than the flatter 'went' or the slightly more
    formal 'departed.'
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'Then'
    gives natural English narrative flow without overstating contrast; 'but' would
    suggest opposition not evident here.
- source_word: εἰς Ταρσόν
  chosen: to Tarsus
  alternatives:
  - into Tarsus
  lexicon: BDAG
  rationale: With a verb of motion, εἰς commonly indicates destination. 'To Tarsus'
    is idiomatic English and accurately conveys movement toward the city.
- source_word: ἀναζητῆσαι
  chosen: to look for
  alternatives:
  - to search for
  - to seek out
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: Barnabas went to Tarsus for the purpose
    of finding Saul. ''Look for'' is clear modern English; ''search for'' is possible
    but can sound more intensive than the context requires, while ''seek out'' is
    slightly more interpretive.'
- source_word: Σαῦλον
  chosen: Saul
  lexicon: BDAG
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
