id: ACT.11.14
reference: Acts 11:14
source:
  edition: SBLGNT
  text: ὃς λαλήσει ῥήματα πρὸς σὲ ἐν οἷς σωθήσῃ σὺ καὶ πᾶς ὁ οἶκός σου.
translation:
  text: He will speak words to you by which you and all your household will be saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in which' or 'through which'; the Greek expression indicates the words
      are the means by which salvation comes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: Relative pronoun referring back to the man/angel previously mentioned.
    English idiom prefers resolving the relative into a personal pronoun at the start
    of the clause rather than beginning, 'who will speak.'
- source_word: λαλήσει
  chosen: will speak
  alternatives:
  - will say
  lexicon: BDAG
  rationale: Future of λαλέω commonly means 'speak.' 'Speak' is slightly more formal
    and fits the introduction of a message better than the more colloquial 'say.'
- source_word: ῥήματα
  chosen: words
  alternatives:
  - things
  - message
  lexicon: BDAG
  rationale: ῥήματα is the direct object of 'speak' and most naturally rendered 'words.'
    Although 'message' could smooth the English, the plural concrete noun is retained
    to stay close to the Greek.
- source_word: πρὸς σὲ
  chosen: to you
  alternatives:
  - with you
  lexicon: BDAG
  rationale: With verbs of speaking, πρός + accusative commonly indicates direction
    toward the hearer, best rendered 'to you.'
- source_word: ἐν οἷς
  chosen: by which
  alternatives:
  - in which
  - through which
  lexicon: BDAG
  rationale: 'The preposition ἐν with the relative pronoun is instrumental here: the
    words are the means by which salvation comes. ''By which'' expresses this naturally
    in English while preserving the means nuance.'
- source_word: σωθήσῃ
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: Future passive of σῴζω. In Acts, especially in contexts of response to
    the gospel, 'be saved' is the standard and theologically appropriate rendering.
    'Delivered' is lexically possible but too nonspecific here.
- source_word: σὺ
  chosen: you
  lexicon: BDAG
  rationale: Explicit subject pronoun in Greek adds emphasis; English retains it in
    the coordinated phrase 'you and all your household' without needing additional
    stress marking.
- source_word: πᾶς ὁ οἶκός σου
  chosen: all your household
  alternatives:
  - your whole household
  - all your house
  lexicon: BDAG
  rationale: οἶκος here refers not merely to the building but to the household unit.
    'All your household' is natural English and preserves the collective sense of
    everyone belonging to the house.
