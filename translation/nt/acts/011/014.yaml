theological_decisions:
- issue: Meaning of salvation in Cornelius's household context
  chosen_reading: Rendered σωθήσῃ as 'will be saved,' allowing the text to speak of
    salvation through the proclaimed message without specifying the mechanics beyond
    the verse.
  alternative_readings:
  - will be delivered
  rationale: The immediate context in Acts concerns hearing the gospel and receiving
    salvation. The translation preserves the soteriological force of σῴζω without
    importing later doctrinal formulations about how each household member participates.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of 'all your household'
  chosen_reading: Translated collectively as 'all your household' without implying
    automatic salvation apart from response.
  alternative_readings:
  - your whole household
  rationale: The Greek states the household scope of the promised salvation but does
    not itself spell out every narrative or theological qualification. The wording
    remains faithful to the text and avoids importing a denominational reading on
    household salvation.
  doctrine_reference: The translation does not advocate for a particular denominational
    distinctive unless the Greek unambiguously supports one reading.
