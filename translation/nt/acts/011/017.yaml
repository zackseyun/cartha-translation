id: ACT.11.17
reference: Acts 11:17
source:
  edition: SBLGNT
  text: εἰ οὖν τὴν ἴσην δωρεὰν ἔδωκεν αὐτοῖς ὁ θεὸς ὡς καὶ ἡμῖν πιστεύσασιν ἐπὶ τὸν
    κύριον Ἰησοῦν Χριστόν, ⸀ἐγὼ τίς ἤμην δυνατὸς κωλῦσαι τὸν θεόν;
translation:
  text: If then God gave to them the same gift as also to us when we believed in the
    Lord Jesus Messiah, who was I that I could hinder God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ'': Greek Χριστόν. Here rendered ''Messiah'' because the title
      sense is still active.'
    reason: alternative_reading
  - marker: b
    text: Or 'to us who believed in the Lord Jesus Messiah.' The Greek participle
      can be rendered more literally that way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσην δωρεάν
  chosen: the same gift
  alternatives:
  - an equal gift
  - the equal gift
  lexicon: BDAG
  rationale: ἴσην modifies δωρεάν and denotes equivalence/sameness. 'The same gift'
    is idiomatic English and fits Peter's comparison between Gentile believers and
    Jewish believers.
- source_word: πιστεύσασιν ἐπὶ τὸν κύριον Ἰησοῦν Χριστόν
  chosen: when we believed in the Lord Jesus Messiah
  alternatives:
  - after believing in the Lord Jesus Messiah
  - having believed in the Lord Jesus Messiah
  lexicon: BDAG
  rationale: 'The aorist participle πιστεύσασιν is dative plural agreeing with ἡμῖν
    and is best rendered temporally in smooth English here: ''when we believed.''
    ἐπὶ with the accusative after πιστεύω conveys direction/object of faith, naturally
    rendered ''believed in.'' Χριστόν is a title here, so ''Messiah'' follows the
    project''s default for Χριστός where title sense is active.'
- source_word: κύριον
  chosen: Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In this
    christological confession it functions as Jesus' title, not merely 'master.'
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it retains
    titular force rather than functioning as a fixed name. In 'Lord Jesus Messiah'
    the title remains meaningful and should be translated.
- source_word: ἐγὼ τίς ἤμην δυνατὸς
  chosen: who was I that I could
  alternatives:
  - who was I to be able to
  - was I anyone able to
  lexicon: BDAG
  rationale: This idiom expresses rhetorical self-abasement before God's action. 'Who
    was I that I could...' captures both the emphatic ἐγώ and the sense of δυνατός
    without wooden English.
- source_word: κωλῦσαι
  chosen: hinder
  alternatives:
  - prevent
  - stand in the way of
  lexicon: BDAG
  rationale: κωλύω means to hinder, prevent, or forbid. 'Hinder' preserves the direct
    object 'God' and the rhetorical force of resisting divine action, while remaining
    natural English.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of κωλῦσαι. The wording intentionally preserves the striking
    expression that opposing the Gentiles' reception of the Spirit would amount to
    hindering God himself.
