theological_decisions:
- issue: Rendering Χριστόν in the christological title 'κύριον Ἰησοῦν Χριστόν'
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where title
    sense is active. In this verse Peter refers to the object of faith with a meaningful
    title, not merely a surname-like form. Retaining 'Messiah' preserves the Jewish-messianic
    force without altering orthodox christology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; ''Χριστός Christos | Messiah
    (where title; Christ where name-like)'''
- issue: Relation of the participle πιστεύσασιν to ἡμῖν
  chosen_reading: 'temporal sense: ''when we believed'''
  alternative_readings:
  - 'descriptive sense: ''to us who believed'''
  - 'anterior sense: ''to us after we believed'''
  rationale: 'The participle is adjectival to ἡμῖν but in English a temporal rendering
    is more natural and preserves the sequence implied in the narrative: God gave
    the gift to them just as to us at the time of believing. This does not import
    a doctrinally precise ordo salutis beyond the verse''s wording.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
