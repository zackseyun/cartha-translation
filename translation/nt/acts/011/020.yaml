theological_decisions:
- issue: Identity of τοὺς Ἑλληνιστάς / textual variant Ἕλληνας
  chosen_reading: Main text follows SBLGNT 'Hellenists' and preserves 'Greeks' in
    a footnote.
  alternative_readings:
  - Greeks
  rationale: 'This is primarily a textual and lexical issue with interpretive significance:
    ''Hellenists'' would mean Greek-speaking Jews, while ''Greeks'' would indicate
    Gentiles. Because the provided source text is SBLGNT, the draft follows it in
    the main text. The alternative is important enough to preserve in a footnote due
    to its significance for the narrative expansion of the gospel.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
