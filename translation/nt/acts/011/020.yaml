id: ACT.11.20
reference: Acts 11:20
source:
  edition: SBLGNT
  text: ἦσαν δέ τινες ἐξ αὐτῶν ἄνδρες Κύπριοι καὶ Κυρηναῖοι, οἵτινες ⸀ἐλθόντες εἰς
    Ἀντιόχειαν ἐλάλουν ⸀καὶ πρὸς τοὺς ⸀Ἑλληνιστάς, εὐαγγελιζόμενοι τὸν κύριον Ἰησοῦν.
translation:
  text: But some of them were men from Cyprus and Cyrene, who, when they came to Antioch,
    were also speaking to the Hellenists, proclaiming the good news about the Lord
    Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Greeks' instead of 'Hellenists.' If that reading
      is original, the sense is that they were speaking to Gentiles, not only to Greek-speaking
      Jews.
    reason: textual_variant
lexical_decisions:
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to an unspecified subset of the previously
    mentioned group; 'some' is natural modern English.
- source_word: ἄνδρες
  chosen: men
  alternatives:
  - people
  lexicon: BDAG
  rationale: The Greek specifically uses the masculine noun for adult males, not a
    generic term for persons. This follows the gender-accurate policy.
- source_word: Κύπριοι καὶ Κυρηναῖοι
  chosen: from Cyprus and Cyrene
  alternatives:
  - Cypriots and Cyrenians
  lexicon: BDAG
  rationale: The adjectival ethnics identify origin. 'From Cyprus and Cyrene' is more
    idiomatic in English while preserving the sense.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - these men who
  lexicon: BDAG
  rationale: Introduces a descriptive relative clause. Simple 'who' is sufficient
    in English.
- source_word: ἐλθόντες εἰς Ἀντιόχειαν
  chosen: when they came to Antioch
  alternatives:
  - having come to Antioch
  - after coming to Antioch
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered temporally in English
    here.
- source_word: ἐλάλουν
  chosen: were speaking
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action; 'were speaking'
    preserves the progressive aspect better than simple past.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: In this context καί likely has an adjunctive sense, marking an expansion
    of the audience beyond prior preaching activity. 'Also' brings out that force.
- source_word: πρὸς τοὺς Ἑλληνιστάς
  chosen: to the Hellenists
  alternatives:
  - to the Greek-speaking Jews
  - to the Greeks
  lexicon: BDAG
  rationale: The SBLGNT reads Ἑλληνιστάς, which ordinarily means 'Hellenists,' that
    is, Greek-speaking Jews. Because a major textual variant reads Ἕλληνας ('Greeks'),
    the main text follows the printed text while preserving the alternative in a footnote.
- source_word: εὐαγγελιζόμενοι
  chosen: proclaiming the good news about
  alternatives:
  - preaching
  - evangelizing
  lexicon: BDAG
  rationale: The participle explains the content and character of their speaking.
    'Proclaiming the good news' communicates the verbal and gospel-centered sense
    in accessible English.
- source_word: τὸν κύριον Ἰησοῦν
  chosen: the Lord Jesus
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for this christological
    title. The article is naturally retained in English in this construction.
