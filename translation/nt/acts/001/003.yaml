theological_decisions:
- issue: Resurrection language and evidential force
  chosen_reading: The verse is rendered to state plainly that Jesus presented himself
    alive after suffering, with many proofs.
  alternative_readings:
  - he showed himself after his passion by many infallible proofs
  rationale: The Greek explicitly affirms post-suffering life and evidential appearances.
    The translation preserves this without archaic wording ('passion,' 'infallible')
    or embellishment beyond τεκμήριοις.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Gender rendering of the antecedent of οἷς
  chosen_reading: '''to these men'''
  alternative_readings:
  - to them
  rationale: The antecedent is the male apostles in the immediate context, so a masculine
    rendering is accurate and aligns with the gender-accurate policy. A more neutral
    'to them' is possible but less explicit.
  doctrine_reference: Translation philosophy §4
