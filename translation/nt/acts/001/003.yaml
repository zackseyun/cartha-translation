id: ACT.1.3
reference: Acts 1:3
source:
  edition: SBLGNT
  text: οἷς καὶ παρέστησεν ἑαυτὸν ζῶντα μετὰ τὸ παθεῖν αὐτὸν ἐν πολλοῖς τεκμηρίοις,
    δι’ ἡμερῶν τεσσεράκοντα ὀπτανόμενος αὐτοῖς καὶ λέγων τὰ περὶ τῆς βασιλείας τοῦ
    θεοῦ·
translation:
  text: To these men he also presented himself alive after he had suffered, by many
    proofs, appearing to them over forty days and speaking about the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with many proofs' or 'with many convincing proofs.' The Greek term denotes
      evidence that establishes certainty.
    reason: lexical_alternative
  - marker: b
    text: Or 'during forty days' or 'for forty days.' The phrase indicates appearances
      spread across that period.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷς
  chosen: to these men
  alternatives:
  - to them
  - to these
  lexicon: BDAG
  rationale: Dative plural relative pronoun referring back to the apostles in the
    previous verse. 'To these men' makes the antecedent explicit in English while
    preserving the masculine referent rather than neutralizing it.
- source_word: παρέστησεν ἑαυτὸν
  chosen: he presented himself
  alternatives:
  - he showed himself
  - he made himself appear
  lexicon: BDAG
  rationale: The aorist of παρίστημι with reflexive object conveys presenting/showing
    oneself. 'Presented himself' is slightly more formal and fits the following evidential
    phrase 'by many proofs.'
- source_word: ζῶντα
  chosen: alive
  alternatives:
  - living
  lexicon: BDAG
  rationale: Predicate participle describing Jesus' post-suffering state. 'Alive'
    is the natural English idiom in resurrection contexts.
- source_word: μετὰ τὸ παθεῖν αὐτὸν
  chosen: after he had suffered
  alternatives:
  - after his suffering
  - after he suffered
  lexicon: BDAG
  rationale: 'The articular infinitive with μετά is temporal: ''after.'' ''Had suffered''
    gives smooth English and preserves the completed action prior to the appearances.'
- source_word: ἐν πολλοῖς τεκμηρίοις
  chosen: by many proofs
  alternatives:
  - with many proofs
  - by many convincing proofs
  - with many evidences
  lexicon: BDAG
  rationale: τεκμήριον denotes proof/evidence that establishes certainty. 'By many
    proofs' preserves the instrumental sense of ἐν here without adding the interpretive
    adjective 'convincing,' though that nuance is legitimate.
- source_word: δι’ ἡμερῶν τεσσεράκοντα
  chosen: over forty days
  alternatives:
  - through forty days
  - during forty days
  - for forty days
  lexicon: BDAG
  rationale: διά with the genitive here expresses extension through a span of time.
    'Over forty days' is idiomatic and captures repeated appearances across that period
    rather than uninterrupted duration.
- source_word: ὀπτανόμενος αὐτοῖς
  chosen: appearing to them
  alternatives:
  - being seen by them
  - showing himself to them
  lexicon: BDAG
  rationale: The middle/passive participle of ὀπτάνομαι commonly means 'appear' in
    resurrection contexts. 'Appearing to them' is the clearest modern rendering.
- source_word: λέγων τὰ περὶ τῆς βασιλείας τοῦ θεοῦ
  chosen: speaking about the kingdom of God
  alternatives:
  - saying the things concerning the kingdom of God
  - speaking the things about the kingdom of God
  lexicon: BDAG
  rationale: The idiom τὰ περὶ + genitive means 'the things concerning.' 'Speaking
    about' is natural English and preserves the content of Jesus' instruction.
- source_word: βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom, but 'kingdom of God' is the standard
    and contextually appropriate rendering here, preserving both royal rule and realm
    associations.
