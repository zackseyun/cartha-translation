theological_decisions:
- issue: Rendering πνεῦμα as the personal divine referent
  chosen_reading: the Holy Spirit
  alternative_readings:
  - the Holy Ghost
  rationale: The phrase refers to the third person of the Trinity in historic Christian
    reading. The translation uses contemporary English while avoiding archaic diction.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD)'
- issue: Scope of witness commission
  chosen_reading: witnesses in expanding geographic spheres ending 'to the end of
    the earth'
  alternative_readings:
  - a purely symbolic spiritual geography
  rationale: The verse presents a real geographic expansion from Jerusalem outward.
    The translation preserves the concrete place names and global horizon without
    importing a programmatic ecclesiology beyond the text.
