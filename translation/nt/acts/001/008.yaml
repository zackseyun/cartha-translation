id: ACT.1.8
reference: Acts 1:8
source:
  edition: SBLGNT
  text: ἀλλὰ λήμψεσθε δύναμιν ἐπελθόντος τοῦ ἁγίου πνεύματος ἐφ’ ὑμᾶς, καὶ ἔσεσθέ
    ⸀μου μάρτυρες ἔν τε Ἰερουσαλὴμ καὶ ἐν πάσῃ τῇ Ἰουδαίᾳ καὶ Σαμαρείᾳ καὶ ἕως ἐσχάτου
    τῆς γῆς.
translation:
  text: But you will receive power when the Holy Spirit has come upon you, and you
    will be my witnesses in Jerusalem, and in all Judea and Samaria, and to the end
    of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to the ends of the earth.' The Greek phrase is singular ('to the end
      of the earth') but functions idiomatically for the earth's remotest extent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement in v. 7; 'But' is the most
    natural English adversative here.
- source_word: λήμψεσθε
  chosen: you will receive
  alternatives:
  - you will take
  lexicon: BDAG
  rationale: Future middle indicative of λαμβάνω here carries the sense of receiving
    what is given, not taking for oneself.
- source_word: δύναμιν
  chosen: power
  alternatives:
  - ability
  - strength
  lexicon: BDAG
  rationale: '''Power'' best captures the broad sense of enabling force given by the
    Spirit in context, without narrowing it to mere physical strength or innate ability.'
- source_word: ἐπελθόντος ... ἐφ’ ὑμᾶς
  chosen: when ... has come upon you
  alternatives:
  - after ... comes upon you
  - with ... coming upon you
  lexicon: BDAG
  rationale: The genitive absolute is rendered with a temporal clause in idiomatic
    English. 'Has come upon you' reflects the aorist participle's event sense and
    the preposition ἐπί with accusative indicating movement onto/upon.
- source_word: τοῦ ἁγίου πνεύματος
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the personal divine referent; capitalized
    to reflect the referent in Christian usage.
- source_word: ἔσεσθέ
  chosen: you will be
  alternatives:
  - you will become
  lexicon: BDAG
  rationale: Future of εἰμί is straightforwardly existential/copulative here; 'be'
    is more direct than 'become'.
- source_word: μου
  chosen: my
  alternatives:
  - for me
  lexicon: BDAG
  rationale: 'The genitive pronoun most naturally expresses possession/association
    with μάρτυρες: they are Jesus'' witnesses.'
- source_word: μάρτυρες
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: Primary sense in this context is those who bear testimony. Although the
    English word 'martyrs' is historically related, that later sense is not primary
    here.
- source_word: ἔν τε Ἰερουσαλὴμ
  chosen: in Jerusalem
  alternatives:
  - both in Jerusalem
  lexicon: BDAG
  rationale: The combination ἔν τε introduces the first element in a sequence. English
    usually does not require an explicit 'both' here, and omitting it yields smoother
    style while preserving the distributive sense through the repeated 'and in' sequence.
- source_word: ἐν πάσῃ τῇ Ἰουδαίᾳ
  chosen: in all Judea
  alternatives:
  - throughout Judea
  lexicon: BDAG
  rationale: πάσῃ with the region name is naturally rendered 'all Judea'; this preserves
    the geographic scope without over-paraphrase.
- source_word: καὶ Σαμαρείᾳ
  chosen: and Samaria
  alternatives:
  - and in Samaria
  lexicon: BDAG
  rationale: The preposition ἐν is understood from the previous phrase. English can
    either repeat it or leave it implicit; repeating 'in' in the full sentence improves
    clarity, but the lexical value here is simply the coordinated region 'Samaria'.
- source_word: ἕως ἐσχάτου τῆς γῆς
  chosen: to the end of the earth
  alternatives:
  - to the farthest part of the earth
  - to the ends of the earth
  lexicon: BDAG
  rationale: A singular idiom in Greek meaning the remotest extent of the earth/world.
    'To the end of the earth' is a close and natural rendering; the plural 'ends of
    the earth' is a common idiomatic alternative and echoes OT phrasing, but the Greek
    here is singular.
