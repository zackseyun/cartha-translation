id: ACT.1.26
reference: Acts 1:26
source:
  edition: SBLGNT
  text: καὶ ἔδωκαν κλήρους ⸀αὐτοῖς, καὶ ἔπεσεν ὁ κλῆρος ἐπὶ Μαθθίαν, καὶ συγκατεψηφίσθη
    μετὰ τῶν ἕνδεκα ἀποστόλων.
translation:
  text: And they cast lots for them, and the lot fell to Matthias, and he was counted
    with the eleven apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the lot fell on Matthias.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was numbered with the eleven apostles' or 'he was added to the eleven
      apostles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν κλήρους αὐτοῖς
  chosen: they cast lots for them
  alternatives:
  - they gave lots to them
  - they assigned lots to them
  lexicon: BDAG
  rationale: Although literally 'they gave lots to them,' the idiom in context refers
    to the act of casting or assigning lots between the two candidates. 'Cast lots
    for them' is natural English and preserves the selection-by-lot sense without
    over-paraphrasing.
- source_word: κλήρους / ὁ κλῆρος
  chosen: lots / the lot
  alternatives:
  - shares
  - portions
  lexicon: BDAG
  rationale: In this narrative context κλῆρος refers to a lot used for selection,
    not an inheritance share. Rendering with 'lot(s)' preserves the concrete procedure
    described.
- source_word: ἔπεσεν ὁ κλῆρος ἐπὶ Μαθθίαν
  chosen: the lot fell to Matthias
  alternatives:
  - the lot fell on Matthias
  lexicon: BDAG
  rationale: This is a standard idiomatic way in English to express the result of
    lot-casting. 'Fell to Matthias' is slightly more natural than 'fell on Matthias'
    while preserving the metaphor of the Greek.
- source_word: Μαθθίαν
  chosen: Matthias
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: συγκατεψηφίσθη
  chosen: was counted with
  alternatives:
  - was enrolled with
  - was added to
  - was numbered with
  lexicon: BDAG
  rationale: The verb denotes being counted together with or reckoned among a group.
    'Was counted with' is clear, close to the Greek, and avoids implying more than
    the text states. 'Added to' is possible but slightly more interpretive.
- source_word: μετὰ τῶν ἕνδεκα ἀποστόλων
  chosen: with the eleven apostles
  alternatives:
  - among the eleven apostles
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' This yields the sense that Matthias
    was reckoned together with the existing apostolic group, now identified as 'the
    eleven apostles' from the pre-selection standpoint of the narrative.
