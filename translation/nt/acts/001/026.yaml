theological_decisions:
- issue: Whether συγκατεψηφίσθη should be rendered in a way that implies divine appointment
    beyond the narrative statement
  chosen_reading: was counted with the eleven apostles
  alternative_readings:
  - was added to the eleven apostles
  - was enrolled among the eleven apostles
  rationale: The verse reports the communal recognition of Matthias after the lot
    fell to him. Rendering the verb as 'was counted with' preserves the text's wording
    without importing a stronger ecclesiological or sacramental claim than the Greek
    itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
