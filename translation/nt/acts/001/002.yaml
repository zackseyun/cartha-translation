theological_decisions:
- issue: Relation of Jesus' commands to the Holy Spirit
  chosen_reading: Jesus gave commands through the Holy Spirit to the apostles before
    he was taken up.
  alternative_readings:
  - Jesus gave commands by the Holy Spirit
  - Jesus gave commands through the Holy Spirit after choosing the apostles
  rationale: The syntax most naturally links διὰ πνεύματος ἁγίου with ἐντειλάμενος,
    indicating the means by which Jesus gave the commands. This preserves Luke's presentation
    of continuity between Jesus' ministry and the Spirit without expanding the statement
    doctrinally beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
