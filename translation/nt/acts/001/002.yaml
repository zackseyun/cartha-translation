id: ACT.1.2
reference: Acts 1:2
source:
  edition: SBLGNT
  text: ἄχρι ἧς ἡμέρας ἐντειλάμενος τοῖς ἀποστόλοις διὰ πνεύματος ἁγίου οὓς ἐξελέξατο
    ἀνελήμφθη·
translation:
  text: until the day when, after giving commands through the Holy Spirit to the apostles
    whom he had chosen, he was taken up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having commanded ... by the Holy Spirit.' The Greek phrase can be rendered
      with either 'through' or 'by' to express means or agency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι ἧς ἡμέρας
  chosen: until the day when
  alternatives:
  - up to the day on which
  - until the day on which
  lexicon: BDAG
  rationale: This idiom marks the temporal endpoint of the narrative in v. 1. 'Until
    the day when' is natural modern English while preserving the formal temporal construction.
- source_word: ἐντειλάμενος
  chosen: after giving commands
  alternatives:
  - having commanded
  - after instructing
  lexicon: BDAG
  rationale: The aorist middle participle is antecedent to the main verb ἀνελήμφθη,
    so 'after giving commands' makes the sequence explicit in idiomatic English. 'Commands'
    better reflects ἐντέλλομαι than the softer 'instructions.'
- source_word: τοῖς ἀποστόλοις
  chosen: to the apostles
  alternatives:
  - to the emissaries
  lexicon: BDAG
  rationale: '''Apostles'' is the established and accurate rendering for ἀπόστολοι
    in Luke-Acts, especially as a recognized group designated by Jesus. ''Emissaries''
    is possible etymologically but not suitable here.'
- source_word: διὰ πνεύματος ἁγίου
  chosen: through the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - through the Holy Spirit's power
  lexicon: BDAG
  rationale: διά with the genitive normally expresses means or agency. 'Through the
    Holy Spirit' preserves the Greek wording and avoids over-specifying the nuance
    beyond the text.
- source_word: οὓς ἐξελέξατο
  chosen: whom he had chosen
  alternatives:
  - whom he chose
  - whom he selected for himself
  lexicon: BDAG
  rationale: The relative clause identifies the apostles as those Jesus had previously
    chosen. The pluperfect-like English 'had chosen' best conveys action prior to
    the ascension reference. The middle voice nuance is not naturally represented
    in English here.
- source_word: ἀνελήμφθη
  chosen: he was taken up
  alternatives:
  - he was taken up into heaven
  - he was ascended
  lexicon: BDAG
  rationale: The passive verb refers to Jesus' ascension. 'He was taken up' is the
    direct lexical sense and avoids importing 'into heaven,' which is explicit in
    Acts 1:11 but not stated in this verse.
