id: ACT.1.23
reference: Acts 1:23
source:
  edition: SBLGNT
  text: καὶ ἔστησαν δύο, Ἰωσὴφ τὸν καλούμενον Βαρσαββᾶν, ὃς ἐπεκλήθη Ἰοῦστος, καὶ
    Μαθθίαν.
translation:
  text: 'And they put forward two: Joseph called Barsabbas, who was also called Justus,
    and Matthias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed two' or 'presented two.' The Greek verb can mean to set persons
      before a group, and here likely refers to proposing them as candidates.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησαν
  chosen: put forward
  alternatives:
  - appointed
  - presented
  - stood
  lexicon: BDAG
  rationale: In this selection context, ἵστημι with a direct object refers to setting
    persons before the group as candidates, not merely causing them to stand physically.
    'Put forward' is idiomatic English that preserves the procedural sense without
    overtranslating to a formal appointment.
- source_word: δύο
  chosen: two
  lexicon: BDAG
  rationale: Straightforward numeral referring to the two proposed men.
- source_word: καλούμενον
  chosen: called
  alternatives:
  - named
  - known as
  lexicon: BDAG
  rationale: The participle identifies Joseph by an additional name/designation. 'Called'
    is natural and sufficiently formal.
- source_word: Βαρσαββᾶν
  chosen: Barsabbas
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: ἐπεκλήθη
  chosen: was also called
  alternatives:
  - was surnamed
  - was called
  - was known as
  lexicon: BDAG
  rationale: The passive of ἐπικαλέω here introduces another name or cognomen. Adding
    'also' makes explicit the relation between the two naming clauses in smooth English
    without adding new information beyond the context.
- source_word: Ἰοῦστος
  chosen: Justus
  rationale: Personal name transliterated by standard convention.
- source_word: Μαθθίαν
  chosen: Matthias
  rationale: Personal name transliterated by standard convention.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Now ... and
  lexicon: BDAG
  rationale: The verse is a simple narrative continuation and coordination of the
    two candidates. Retaining 'And' reflects the Greek connective structure.
