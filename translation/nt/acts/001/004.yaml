id: ACT.1.4
reference: Acts 1:4
source:
  edition: SBLGNT
  text: καὶ συναλιζόμενος παρήγγειλεν αὐτοῖς ἀπὸ Ἱεροσολύμων μὴ χωρίζεσθαι, ἀλλὰ περιμένειν
    τὴν ἐπαγγελίαν τοῦ πατρὸς ἣν ἠκούσατέ μου·
translation:
  text: And while staying with them, he ordered them not to depart from Jerusalem,
    but to wait for the promise of the Father, which you heard from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while assembling with them'; some understand the phrase as 'while eating
      with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συναλιζόμενος
  chosen: while staying with them
  alternatives:
  - while assembling with them
  - while eating with them
  lexicon: BDAG
  rationale: The participle is textually and lexically difficult. In context, the
    sense of Jesus being together with the apostles is clear. 'While staying with
    them' gives natural English and fits the immediate narrative setting. 'While assembling
    with them' is a more formal possibility; 'while eating with them' reflects an
    ancient interpretive tradition tied to a variant understanding of the verb, but
    is less certain from this form and is preserved in a footnote.
- source_word: παρήγγειλεν
  chosen: ordered
  alternatives:
  - commanded
  - instructed
  lexicon: BDAG
  rationale: The verb denotes a directive with authority. 'Ordered' preserves the
    force more clearly than the softer 'instructed,' while remaining idiomatic modern
    English.
- source_word: ἀπὸ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - away from Jerusalem
  lexicon: BDAG
  rationale: With χωρίζεσθαι, the phrase indicates separation/departure from the city.
    'From Jerusalem' is the most natural English rendering.
- source_word: μὴ χωρίζεσθαι
  chosen: not to depart
  alternatives:
  - not to leave
  - not to separate themselves
  lexicon: BDAG
  rationale: The infinitive here expresses the content of the command. 'Not to depart'
    preserves the sense of not leaving the place; 'not to separate themselves' is
    too wooden in English for this context.
- source_word: περιμένειν
  chosen: to wait for
  alternatives:
  - to remain for
  - to await
  lexicon: BDAG
  rationale: '''Wait for'' is clear, idiomatic, and preserves the expectant sense
    of the verb.'
- source_word: τὴν ἐπαγγελίαν τοῦ πατρὸς
  chosen: the promise of the Father
  alternatives:
  - the Father's promise
  - the promised gift of the Father
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly. 'The promise of the
    Father' preserves the wording and leaves open whether the promise is something
    the Father made or something belonging to the Father's plan; context clarifies
    it as what the Father promised.
- source_word: ἣν ἠκούσατέ μου
  chosen: which you heard from me
  alternatives:
  - which you heard me speak about
  - which you heard from my mouth
  lexicon: BDAG
  rationale: The genitive pronoun after ἀκούω naturally yields 'heard from me.' This
    is concise and faithful, without over-specifying the implied object of hearing.
