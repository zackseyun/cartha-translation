theological_decisions:
- issue: Meaning of συναλιζόμενος in relation to Jesus' post-resurrection activity
  chosen_reading: Rendered generally as Jesus being together with the disciples ('while
    staying with them') rather than specifically 'eating with them.'
  alternative_readings:
  - while assembling with them
  - while eating with them
  rationale: The verse does not require a doctrinally loaded choice, and the broader
    context already affirms Jesus' bodily post-resurrection appearances (Acts 1:3).
    A general rendering avoids overstating a debated lexical nuance while preserving
    the scene. The more specific alternative is retained in a footnote for auditability.
  doctrine_reference: Preserve theological tension rather than resolve it.
