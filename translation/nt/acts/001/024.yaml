id: ACT.1.24
reference: Acts 1:24
source:
  edition: SBLGNT
  text: καὶ προσευξάμενοι εἶπαν Σὺ κύριε καρδιογνῶστα πάντων, ἀνάδειξον ὃν ἐξελέξω,
    ἐκ τούτων τῶν δύο ἕνα,
translation:
  text: And after praying, they said, “You, Lord, knower of the hearts of all, show
    which one of these two you have chosen,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appoint' or 'indicate' for 'show'; the verb can denote making known
      or designating publicly.
    reason: lexical_alternative
  - marker: b
    text: The address 'Lord' may be understood as directed to God generally or specifically
      to Jesus; the Greek does not explicitly identify the referent here.
    reason: alternative_reading
lexical_decisions:
- source_word: προσευξάμενοι
  chosen: after praying
  alternatives:
  - having prayed
  - praying
  lexicon: BDAG
  rationale: Aorist middle participle preceding the main verb naturally conveys prior
    action. 'After praying' is idiomatic modern English while preserving the sequence.
- source_word: Σὺ κύριε
  chosen: You, Lord
  alternatives:
  - You Lord
  - O Lord
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, so 'You, Lord' preserves the direct
    address and stress. 'Lord' follows the default rendering for κύριος in DOCTRINE.md.
- source_word: καρδιογνῶστα πάντων
  chosen: knower of the hearts of all
  alternatives:
  - heart-knower of all
  - one who knows everyone's heart
  - knower of all hearts
  lexicon: BDAG
  rationale: The compound noun καρδιογνώστης is rendered transparently rather than
    flattened. 'Knower of the hearts of all' preserves both the singular vocative
    title and πάντων as 'of all.'
- source_word: ἀνάδειξον
  chosen: show
  alternatives:
  - appoint
  - indicate
  - reveal
  lexicon: BDAG
  rationale: In this context of asking God to identify the chosen replacement, 'show'
    best captures the imperative without over-specifying formal appointment. 'Appoint'
    could imply the act of installation rather than disclosure of God's choice.
- source_word: ὃν ἐξελέξω
  chosen: which one ... you have chosen
  alternatives:
  - whom ... you chose
  - the one ... you selected
  lexicon: BDAG
  rationale: The relative pronoun plus middle verb refers to the person already chosen
    by the Lord. English idiom prefers 'which one ... you have chosen' with the following
    'of these two'; the perfect-like English sense reflects a prior completed choice
    with present relevance.
- source_word: ἐκ τούτων τῶν δύο ἕνα
  chosen: which one of these two
  alternatives:
  - one from these two
  - one of these two men
  lexicon: BDAG
  rationale: This phrase specifies the selection from the two candidates. 'Which one
    of these two' is natural English and avoids adding 'men,' which is contextually
    true but not explicit in the Greek of this verse.
