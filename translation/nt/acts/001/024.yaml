theological_decisions:
- issue: Referent of 'Lord' in the prayer
  chosen_reading: Retain the vocative 'Lord' without specifying in translation whether
    the address is to the Father or to Jesus.
  alternative_readings:
  - Addressed to God generally
  - Addressed specifically to the risen Jesus
  rationale: The Greek text says only 'You, Lord,' and the translation should preserve
    that wording without resolving an interpretive question the verse itself does
    not explicitly settle. This maintains theological tension rather than importing
    a doctrinal conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος
    default rendering 'Lord'.
