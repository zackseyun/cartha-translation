theological_decisions:
- issue: Nature of scriptural necessity
  chosen_reading: Rendered ἔδει as 'it was necessary' without specifying more than
    the text states.
  alternative_readings:
  - it had to happen because of divine predestination
  - it was merely fitting
  rationale: The verse presents fulfillment as necessary but does not explicitly unpack
    the mechanism. The translation preserves the theological tension of divine foreknowledge,
    inspiration, and human action without resolving debates beyond the text.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Agency in inspiration
  chosen_reading: Rendered the clause as 'which the Holy Spirit spoke beforehand through
    the mouth of David.'
  alternative_readings:
  - which David spoke by the Holy Spirit
  - which the Spirit inspired David to write
  rationale: The Greek explicitly makes the Holy Spirit the speaker and David the
    human instrument. The translation preserves both divine and human agency in the
    wording used by Luke.
  doctrine_reference: Affirmations; Translation philosophy §1 Original-language primacy
    over translation tradition.
