id: ACT.1.16
reference: Acts 1:16
source:
  edition: SBLGNT
  text: Ἄνδρες ἀδελφοί, ἔδει πληρωθῆναι τὴν ⸀γραφὴν ἣν προεῖπε τὸ πνεῦμα τὸ ἅγιον
    διὰ στόματος Δαυὶδ περὶ Ἰούδα τοῦ γενομένου ὁδηγοῦ τοῖς συλλαβοῦσιν ⸀Ἰησοῦν,
translation:
  text: Men, brothers, it was necessary for the Scripture to be fulfilled, which the
    Holy Spirit spoke beforehand through the mouth of David concerning Judas, who
    became a guide to those who arrested Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'said beforehand.' The verb can also be rendered 'foretold.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'through the mouth of David,' an idiom for speech delivered through
      a human agent.
    reason: cultural_note
  - marker: c
    text: Or 'to those who seized Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες ἀδελφοί
  chosen: Men, brothers
  alternatives:
  - Brothers
  - Brothers and sisters
  - Men and brothers
  lexicon: BDAG
  rationale: Both nouns are vocative masculine plurals. The Greek explicitly includes
    ἄνδρες ('men') in addition to ἀδελφοί ('brothers'), so the translation preserves
    both rather than collapsing to 'brothers.' This follows the gender-accurate principle
    and reflects the formal address style in Acts.
- source_word: ἔδει
  chosen: it was necessary
  alternatives:
  - it had to be
  - it was bound to be
  lexicon: BDAG
  rationale: Impersonal imperfect of δεῖ/ἔδει expresses necessity. 'It was necessary'
    preserves the sense of divine necessity without overinterpreting the source of
    that necessity.
- source_word: πληρωθῆναι
  chosen: to be fulfilled
  alternatives:
  - to be completed
  - to come to fulfillment
  lexicon: BDAG
  rationale: Common scriptural-fulfillment language in Luke-Acts. 'To be fulfilled'
    is idiomatic and preserves the passive form and theological resonance of Scripture
    reaching its intended realization.
- source_word: γραφὴν
  chosen: the Scripture
  alternatives:
  - the writing
  - the passage of Scripture
  lexicon: BDAG
  rationale: γραφή in this context refers to sacred Scripture, not merely any writing.
    Singular 'the Scripture' is natural English and matches NT usage.
- source_word: προεῖπε
  chosen: spoke beforehand
  alternatives:
  - foretold
  - said beforehand
  lexicon: BDAG
  rationale: The verb literally means 'said beforehand.' 'Spoke beforehand' keeps
    the verbal connection with the Holy Spirit as speaker and avoids importing a more
    technical prophetic term than necessary, though prophecy is clearly implied.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the divine person named in the text.
    It is both accurate and readable modern English.
- source_word: διὰ στόματος Δαυὶδ
  chosen: through the mouth of David
  alternatives:
  - through David
  - by David's mouth
  lexicon: BDAG
  rationale: The phrase is idiomatic for inspired speech mediated through a human
    speaker. Retaining 'mouth' preserves the vividness and the instrumental expression
    of the Greek.
- source_word: περὶ Ἰούδα
  chosen: concerning Judas
  alternatives:
  - about Judas
  - regarding Judas
  lexicon: BDAG
  rationale: περί with genitive here introduces the subject matter of the scriptural
    statement. 'Concerning' is slightly more formal and fits the register of the speech.
- source_word: τοῦ γενομένου ὁδηγοῦ
  chosen: who became a guide
  alternatives:
  - who became the guide
  - who served as a guide
  lexicon: BDAG
  rationale: The genitive participial phrase modifies Judas. 'Became a guide' closely
    reflects γενομένου and avoids overstating definiteness, since ὁδηγοῦ lacks the
    article.
- source_word: τοῖς συλλαβοῦσιν Ἰησοῦν
  chosen: to those who arrested Jesus
  alternatives:
  - to those who seized Jesus
  - to those who took Jesus
  lexicon: BDAG
  rationale: συλλαμβάνω in arrest contexts commonly means 'seize' or 'arrest.' 'Arrested'
    communicates the intended action clearly in modern English, while 'those who'
    preserves the participial construction.
