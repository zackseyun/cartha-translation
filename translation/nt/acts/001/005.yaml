id: ACT.1.5
reference: Acts 1:5
source:
  edition: SBLGNT
  text: ὅτι Ἰωάννης μὲν ἐβάπτισεν ὕδατι, ὑμεῖς δὲ ⸂ἐν πνεύματι βαπτισθήσεσθε⸃ ἁγίῳ
    οὐ μετὰ πολλὰς ταύτας ἡμέρας.
translation:
  text: For John baptized with water, but you will be baptized in the Holy Spirit
    not many days from now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the Holy Spirit.' The Greek preposition can be understood as 'in'
      or 'with.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - that
  - because
  lexicon: BDAG
  rationale: In context this introduces the content/reason for Jesus' preceding statement
    and works naturally in English as an explanatory 'For,' rather than a bare 'that'
    clause.
- source_word: ἐβάπτισεν
  chosen: baptized
  alternatives:
  - immersed
  lexicon: BDAG
  rationale: '''Baptized'' preserves the established religious term without over-resolving
    the mode. ''Immersed'' is possible lexically but would import a denominationally
    charged specificity not required by the verse.'
- source_word: ὕδατι
  chosen: with water
  alternatives:
  - in water
  lexicon: BDAG
  rationale: The dative/instrumental sense is well represented by 'with water' here,
    especially in contrast with the following ἐν πνεύματι. English idiom commonly
    says 'baptized with water' for John's baptism.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - with the Holy Spirit
  - in Holy Spirit
  lexicon: BDAG
  rationale: The preposition ἐν can be rendered 'in' or 'with' here. 'In the Holy
    Spirit' keeps the Greek preposition more transparently and preserves the theological
    and interpretive tension of sphere versus instrument. The article is supplied
    in English because 'Holy Spirit' normally functions as a definite personal referent
    in this context.
- source_word: βαπτισθήσεσθε
  chosen: you will be baptized
  alternatives:
  - you will be immersed
  lexicon: BDAG
  rationale: Future passive is best rendered straightforwardly as 'you will be baptized.'
    This preserves the verbal link with John's baptism while leaving the agent implicit
    as in Greek.
- source_word: οὐ μετὰ πολλὰς ταύτας ἡμέρας
  chosen: not many days from now
  alternatives:
  - not after many of these days
  - not many days hence
  lexicon: BDAG
  rationale: This idiomatic English rendering captures the temporal sense naturally.
    'From now' makes explicit the deictic force of ταύτας in context without adding
    content.
