theological_decisions:
- issue: Rendering of ἐν πνεύματι ἁγίῳ in a theologically sensitive baptism formula
  chosen_reading: in the Holy Spirit
  alternative_readings:
  - with the Holy Spirit
  rationale: Because ἐν may denote sphere or means/instrument, and because traditions
    differ on how to construe Spirit baptism, the main text preserves the Greek preposition
    more formally with 'in.' The common alternative 'with the Holy Spirit' is preserved
    in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
