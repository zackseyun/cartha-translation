id: ACT.1.19
reference: Acts 1:19
source:
  edition: SBLGNT
  text: καὶ γνωστὸν ἐγένετο πᾶσι τοῖς κατοικοῦσιν Ἰερουσαλήμ, ὥστε κληθῆναι τὸ χωρίον
    ἐκεῖνο τῇ ⸀ἰδίᾳ διαλέκτῳ αὐτῶν Ἁκελδαμάχ, τοῦτ’ ἔστιν Χωρίον Αἵματος.—
translation:
  text: And it became known to all those living in Jerusalem, so that in their own
    language that field was called Akeldamach, that is, Field of Blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akeldamach is more commonly rendered 'Akeldama' in English versions; the
      Greek form here is Ἁκελδαμάχ.
    reason: alternative_reading
  - marker: b
    text: Or 'in their own dialect.' The Greek διάλεκτος can refer to a regional speech
      form or more generally to a language.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ἐγένετο
  chosen: it became known
  alternatives:
  - it became evident
  - it became public knowledge
  lexicon: BDAG
  rationale: The impersonal construction naturally conveys that the matter came to
    be widely known. 'It became known' is idiomatic and sufficiently formal without
    overinterpreting the degree of publicity.
- source_word: πᾶσι τοῖς κατοικοῦσιν Ἰερουσαλήμ
  chosen: to all those living in Jerusalem
  alternatives:
  - to all the residents of Jerusalem
  - to everyone dwelling in Jerusalem
  lexicon: BDAG
  rationale: κατοικοῦσιν is a participial expression meaning those residing or living
    in a place. 'Those living in Jerusalem' is clear modern English and preserves
    the sense without sounding overly technical.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  - therefore
  lexicon: BDAG
  rationale: Here ὥστε introduces result. 'So that' preserves the connection naturally
    in English; 'therefore' would overstate logical inference rather than result.
- source_word: κληθῆναι
  chosen: was called
  alternatives:
  - came to be called
  - was named
  lexicon: BDAG
  rationale: The aorist passive infinitive after ὥστε is well represented by an English
    passive finite clause in context. 'Was called' is straightforward and idiomatic.
- source_word: τὸ χωρίον ἐκεῖνο
  chosen: that field
  alternatives:
  - that piece of land
  - that place
  lexicon: BDAG
  rationale: χωρίον commonly denotes a field or parcel of land. Since the explanatory
    gloss is 'Field of Blood,' rendering χωρίον as 'field' preserves lexical coherence
    within the verse.
- source_word: τῇ ἰδίᾳ διαλέκτῳ αὐτῶν
  chosen: in their own language
  alternatives:
  - in their own dialect
  - in their native tongue
  lexicon: BDAG
  rationale: διάλεκτος can mean dialect or language. In English, 'language' is more
    natural and avoids implying a narrow technical distinction not required by the
    context, while ἰδίᾳ is preserved by 'their own'.
- source_word: Ἁκελδαμάχ
  chosen: Akeldamach
  alternatives:
  - Hakeldamach
  - Akeldama
  lexicon: BDAG
  rationale: Names are transliterated. 'Akeldamach' closely reflects the Greek form
    Ἁκελδαμάχ in this verse. A more familiar English form, 'Akeldama,' is worth preserving
    in a footnote because of its prevalence in translation tradition.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - which means
  - that means
  lexicon: BDAG
  rationale: This formula introduces an explanation or gloss. 'That is' is concise
    and preserves the explanatory force.
- source_word: Χωρίον Αἵματος
  chosen: Field of Blood
  alternatives:
  - Field of blood
  - Blood Field
  lexicon: BDAG
  rationale: This is the explicit translation gloss supplied in the Greek text itself.
    Capitalization reflects its function as a place-name explanation in English.
