theological_decisions:
- issue: Relationship intended by Ἰούδας Ἰακώβου
  chosen_reading: Judas the son of James
  alternative_readings:
  - Judas brother of James
  rationale: The Greek genitive leaves the relationship implicit. In a list of named
    men identified by patronymics, 'son of James' is the more probable reading and
    avoids conflating this Judas with other figures without textual warrant. Because
    the Greek itself does not specify 'son' or 'brother,' the alternative is preserved
    in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
