id: ACT.1.13
reference: Acts 1:13
source:
  edition: SBLGNT
  text: καὶ ὅτε εἰσῆλθον, ⸂εἰς τὸ ὑπερῷον ἀνέβησαν⸃ οὗ ἦσαν καταμένοντες, ὅ τε Πέτρος
    καὶ ⸂Ἰωάννης καὶ Ἰάκωβος⸃ καὶ Ἀνδρέας, Φίλιππος καὶ Θωμᾶς, Βαρθολομαῖος καὶ Μαθθαῖος,
    Ἰάκωβος Ἁλφαίου καὶ Σίμων ὁ ζηλωτὴς καὶ Ἰούδας Ἰακώβου.
translation:
  text: 'And when they had entered, they went up to the upstairs room where they were
    staying: Peter, John, James, and Andrew; Philip and Thomas; Bartholomew and Matthew;
    James the son of Alphaeus, and Simon the Zealot, and Judas the son of James.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judas brother of James.' The Greek says only 'Judas of James,' leaving
      the exact relationship implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσῆλθον
  chosen: had entered
  alternatives:
  - entered
  - came in
  lexicon: BDAG
  rationale: Aorist indicative in a temporal clause with ὅτε is naturally rendered
    in English as prior action relative to the main verb, hence 'had entered' rather
    than simple 'entered' for smoother sequence.
- source_word: εἰς τὸ ὑπερῷον ἀνέβησαν
  chosen: they went up to the upstairs room
  alternatives:
  - they went up into the upper room
  - they went upstairs to the room above
  lexicon: BDAG
  rationale: The idiom combines motion upward (ἀνέβησαν) with destination (εἰς τὸ
    ὑπερῷον). 'Upstairs room' is clear modern English while preserving the upward
    movement and the architectural sense of ὑπερῷον.
- source_word: ὑπερῷον
  chosen: upstairs room
  alternatives:
  - upper room
  lexicon: BDAG
  rationale: Traditional 'upper room' is possible, but 'upstairs room' is more transparent
    for modern readers and reflects the ordinary spatial sense without importing later
    ecclesial associations.
- source_word: οὗ ἦσαν καταμένοντες
  chosen: where they were staying
  alternatives:
  - where they were remaining
  - where they were lodging
  lexicon: BDAG
  rationale: καταμένοντες conveys continued staying or remaining in a place. 'Were
    staying' is idiomatic and captures the durative force of the imperfect plus participle
    construction.
- source_word: ὅ τε Πέτρος καὶ Ἰωάννης καὶ Ἰάκωβος καὶ Ἀνδρέας, Φίλιππος καὶ Θωμᾶς,
    Βαρθολομαῖος καὶ Μαθθαῖος
  chosen: Peter, John, James, and Andrew; Philip and Thomas; Bartholomew and Matthew
  alternatives:
  - namely Peter and John and James and Andrew, Philip and Thomas, Bartholomew and
    Matthew
  lexicon: BDAG
  rationale: The construction introduces the list of those present. English style
    favors a colon and grouped names rather than reproducing every connective. Semicolons
    preserve the list structure and pairings visible in Greek punctuation and rhythm.
- source_word: Ἰάκωβος Ἁλφαίου
  chosen: James the son of Alphaeus
  alternatives:
  - James of Alphaeus
  - James son of Alphaeus
  lexicon: BDAG
  rationale: The genitive is most naturally relational here, identifying which James
    is meant. Supplying 'the son of' makes the relationship explicit in natural English.
- source_word: Σίμων ὁ ζηλωτὴς
  chosen: Simon the Zealot
  alternatives:
  - Simon the Zealous One
  - Simon the Cananaean
  lexicon: BDAG
  rationale: ζηλωτής here functions as an identifying epithet. 'The Zealot' is the
    standard and clearest rendering; 'Cananaean' belongs to a different Gospel form
    and should not be imported here.
- source_word: Ἰούδας Ἰακώβου
  chosen: Judas the son of James
  alternatives:
  - Judas of James
  - Judas brother of James
  lexicon: BDAG
  rationale: The genitive Ἰακώβου is ambiguous by itself, but in apostolic lists it
    commonly serves as a patronymic. 'The son of James' is the most likely sense in
    context, while the alternative 'brother of James' is worth preserving in a footnote
    because the Greek does not explicitly state the relationship.
