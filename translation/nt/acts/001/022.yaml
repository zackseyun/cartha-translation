theological_decisions:
- issue: Supplying the governing necessity from the previous verse
  chosen_reading: Included 'must' in the English text
  alternative_readings:
  - Rendered only 'to become' and left the sense incomplete in English
  rationale: Acts 1:22 is syntactically dependent on the δεῖ ('it is necessary') in
    v. 21. Including 'must' communicates the actual force of the sentence in natural
    English without adding new meaning.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Rendering the ascension reference
  chosen_reading: '''he was taken up'''
  alternative_readings:
  - '''he was taken away'''
  - '''he was received up'''
  rationale: The phrase refers to Jesus' ascension but should not be expanded into
    doctrinal paraphrase such as 'ascended into heaven' when those words are not present
    in this verse. The chosen wording preserves the event without importing extra
    detail.
  doctrine_reference: 'Affirmations; Translation philosophy: original-language primacy
    over translation tradition'
