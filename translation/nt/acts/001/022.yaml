id: ACT.1.22
reference: Acts 1:22
source:
  edition: SBLGNT
  text: ἀρξάμενος ἀπὸ τοῦ βαπτίσματος Ἰωάννου ἕως τῆς ἡμέρας ἧς ἀνελήμφθη ἀφ’ ἡμῶν,
    μάρτυρα τῆς ἀναστάσεως αὐτοῦ ⸂σὺν ἡμῖν γενέσθαι⸃ ἕνα τούτων.
translation:
  text: beginning from the baptism of John until the day when he was taken up from
    us, one of these must become with us a witness of his resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from John's baptism.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'of his resurrection'; English may also be expressed as 'a witness
      to his resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρξάμενος
  chosen: beginning
  alternatives:
  - starting
  - from the beginning
  lexicon: BDAG
  rationale: A participial form introducing the temporal span required for the candidate.
    'Beginning' preserves the participial force and connects naturally with 'from
    ... until.'
- source_word: ἀπὸ τοῦ βαπτίσματος Ἰωάννου
  chosen: from the baptism of John
  alternatives:
  - from John's baptism
  lexicon: BDAG
  rationale: Both are possible; 'the baptism of John' stays closer to the Greek genitive
    construction while remaining natural English.
- source_word: ἕως τῆς ἡμέρας ἧς
  chosen: until the day when
  alternatives:
  - until the day on which
  lexicon: BDAG
  rationale: This renders the temporal limit idiomatically in modern English without
    losing the relative-clause sense.
- source_word: ἀνελήμφθη
  chosen: he was taken up
  alternatives:
  - he was taken away
  - he was received up
  lexicon: BDAG
  rationale: The passive refers to Jesus' ascension. 'Taken up' is the standard, clear
    rendering that matches Luke-Acts usage and preserves the vertical/ascension nuance.
- source_word: ἀφ’ ἡμῶν
  chosen: from us
  alternatives:
  - away from us
  - from among us
  lexicon: BDAG
  rationale: '''From us'' is the most direct rendering. ''From among us'' is interpretive;
    the simpler phrase preserves the Greek while fitting the context of Jesus'' departure
    from the apostles.'
- source_word: μάρτυρα
  chosen: a witness
  alternatives:
  - witness
  lexicon: BDAG
  rationale: 'Accusative complement with γενέσθαι: the person selected is to become
    ''a witness.'' The indefinite article is required in English.'
- source_word: τῆς ἀναστάσεως αὐτοῦ
  chosen: of his resurrection
  alternatives:
  - to his resurrection
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of his resurrection.' English
    idiom sometimes says 'witness to,' but 'witness of' more closely reflects the
    Greek construction here.
- source_word: σὺν ἡμῖν
  chosen: with us
  alternatives:
  - together with us
  - along with us
  lexicon: BDAG
  rationale: 'This phrase modifies the becoming of the witness: the new apostolic
    witness joins the existing group. ''With us'' is concise and accurate.'
- source_word: γενέσθαι
  chosen: must become
  alternatives:
  - to become
  lexicon: BDAG
  rationale: Although the infinitive itself is simply 'to become,' the broader syntax
    with δεῖ from the previous verse carries over, so English requires 'must become'
    for a complete translation of the sentence.
- source_word: ἕνα τούτων
  chosen: one of these
  alternatives:
  - one of these men
  lexicon: BDAG
  rationale: The Greek says simply 'one of these.' 'Men' is supplied in many English
    versions from the previous verse, but it is not present here, so it is omitted
    for closer adherence to the source while remaining clear in context.
