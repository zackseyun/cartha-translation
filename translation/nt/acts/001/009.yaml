id: ACT.1.9
reference: Acts 1:9
source:
  edition: SBLGNT
  text: καὶ ταῦτα εἰπὼν βλεπόντων αὐτῶν ἐπήρθη καὶ νεφέλη ὑπέλαβεν αὐτὸν ἀπὸ τῶν ὀφθαλμῶν
    αὐτῶν.
translation:
  text: And after he said these things, as they were watching, he was lifted up, and
    a cloud took him out of their sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was taken up.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a cloud took him' may echo biblical scenes where a cloud signifies
      God's presence, though the verse does not state this explicitly.
    reason: cross_reference
  - marker: c
    text: Or 'received him out of their sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this event to the preceding speech; 'And'
    preserves the simple narrative flow without adding temporal nuance beyond the
    Greek.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative, referring back to Jesus' preceding words; 'these
    things' is the most direct and natural rendering.
- source_word: εἰπὼν
  chosen: after he said
  alternatives:
  - having said
  - when he had said
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb. 'After he said' expresses
    the temporal relationship clearly in natural English while preserving the sequence.
- source_word: βλεπόντων αὐτῶν
  chosen: as they were watching
  alternatives:
  - while they were looking on
  - with them watching
  lexicon: BDAG
  rationale: Genitive absolute indicating attendant circumstance during the ascension.
    'As they were watching' is idiomatic and conveys the ongoing action of their seeing.
- source_word: ἐπήρθη
  chosen: he was lifted up
  alternatives:
  - he was taken up
  - he was raised up
  lexicon: BDAG
  rationale: Passive of ἐπαίρω, literally 'was lifted up.' This preserves the visual
    upward movement in the narrative. 'Taken up' is possible, but 'lifted up' more
    closely reflects the lexical sense here.
- source_word: νεφέλη
  chosen: a cloud
  alternatives:
  - the cloud
  lexicon: BDAG
  rationale: Anarthrous singular noun; 'a cloud' is the straightforward rendering.
    The lack of article does not require a specialized theological identification
    in the main text.
- source_word: ὑπέλαβεν
  chosen: took him
  alternatives:
  - received him
  - took him up
  lexicon: BDAG
  rationale: The verb can mean 'take up/receive.' In context, the cloud removes him
    from visible sight. 'Took him' is clear modern English; the more traditional 'received
    him' is possible but less natural and potentially misleading.
- source_word: ἀπὸ τῶν ὀφθαλμῶν αὐτῶν
  chosen: out of their sight
  alternatives:
  - from their eyes
  - from before their eyes
  lexicon: BDAG
  rationale: Idiomatic expression indicating disappearance from visible perception.
    'Out of their sight' communicates the sense naturally in English while preserving
    the meaning of the Greek phrase.
