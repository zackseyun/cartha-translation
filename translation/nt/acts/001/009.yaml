theological_decisions:
- issue: Whether to use a more overtly theological or traditional ascension formula
    for ἐπήρθη
  chosen_reading: he was lifted up
  alternative_readings:
  - he was taken up
  rationale: The verse narrates a visible upward movement without requiring a more
    interpretive or traditionalized formula in the main text. 'He was lifted up' stays
    close to the Greek and avoids importing later doctrinal phrasing while remaining
    fully compatible with orthodox Christology.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Whether νεφέλη should be rendered in a way that explicitly signals theophanic
    significance
  chosen_reading: a cloud
  alternative_readings:
  - the cloud
  rationale: Although clouds can carry biblical theophanic associations, the Greek
    here is indefinite and the verse itself does not explicitly identify the cloud
    symbolically. The main text therefore remains restrained, with the possible theological
    resonance preserved by a footnote rather than embedded in translation.
  doctrine_reference: 'Translation philosophy: never import doctrinal claims the text
    does not make.'
