theological_decisions:
- issue: Implication of ἤρξατο ('began') regarding the continuation of Jesus' work
    in Acts
  chosen_reading: Retain 'began' in the main text without explicating the continuation.
  alternative_readings:
  - Translate more dynamically as 'all that Jesus did and taught'
  - Paraphrase to make continuation explicit, e.g. 'all that Jesus began to do and
    continued to do through his apostles'
  rationale: The Greek explicitly says 'began,' and this should be preserved. It may
    suggest that Acts narrates the continuing work of Jesus, but the translation should
    preserve that theological tension rather than resolve it by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
