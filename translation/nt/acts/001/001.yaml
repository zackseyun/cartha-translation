id: ACT.1.1
reference: Acts 1:1
source:
  edition: SBLGNT
  text: Τὸν μὲν πρῶτον λόγον ἐποιησάμην περὶ πάντων, ὦ Θεόφιλε, ὧν ἤρξατο ⸀ὁ Ἰησοῦς
    ποιεῖν τε καὶ διδάσκειν
translation:
  text: In the first account, O Theophilus, I wrote about all that Jesus began both
    to do and to teach,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the former account' or 'the first book.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸν μὲν πρῶτον λόγον
  chosen: the first account
  alternatives:
  - the former account
  - the first book
  - the first narrative
  lexicon: BDAG
  rationale: λόγος here refers not to a single 'word' but to a written account or
    narrative, referring back to the Gospel of Luke. 'First account' is natural modern
    English and preserves the sequential force of πρῶτον. The particle μέν is not
    directly represented with an English counterpart but is reflected in the discourse
    framing of 'the first account' anticipating continuation.
- source_word: ἐποιησάμην
  chosen: I wrote
  alternatives:
  - I composed
  - I made
  lexicon: BDAG
  rationale: Although ποιέω literally means 'make/do,' in context with λόγον it idiomatically
    means to compose or produce a written work. 'I wrote' is the clearest idiomatic
    English equivalent.
- source_word: περὶ πάντων
  chosen: about all
  alternatives:
  - concerning all things
  - about everything
  lexicon: BDAG
  rationale: περί with the genitive indicates reference or subject matter. 'About
    all' fits the relative clause that follows and avoids overstating exhaustive totality
    beyond Luke's narrative scope.
- source_word: ὦ Θεόφιλε
  chosen: O Theophilus
  alternatives:
  - Theophilus
  - dear Theophilus
  lexicon: BDAG
  rationale: ὦ marks direct address. Retaining 'O' preserves the vocative force without
    adding interpretive warmth such as 'dear,' which is not present in the Greek.
- source_word: ὧν
  chosen: that
  alternatives:
  - which
  - of the things that
  lexicon: BDAG
  rationale: The genitive relative pronoun links back to πάντων. In idiomatic English,
    'all that' best captures the construction 'περὶ πάντων ... ὧν' without awkwardness.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: The verb means 'began.' Retaining it is important because Luke's wording
    implies continuity from Jesus' earthly ministry into the apostolic witness narrated
    in Acts, without making that implication more explicit than the text does.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the translation
    philosophy of transliterating names.
- source_word: ποιεῖν τε καὶ διδάσκειν
  chosen: both to do and to teach
  alternatives:
  - to do and teach
  - both to act and to teach
  lexicon: BDAG
  rationale: The correlative τε καί is best represented by 'both ... and ...'. 'Do'
    is somewhat broad but preserves the Greek ποιεῖν and the traditional distinction
    between Jesus' deeds and teaching.
