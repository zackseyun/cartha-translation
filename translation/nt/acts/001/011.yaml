id: ACT.1.11
reference: Acts 1:11
source:
  edition: SBLGNT
  text: οἳ καὶ εἶπαν· Ἄνδρες Γαλιλαῖοι, τί ἑστήκατε ⸀βλέποντες εἰς τὸν οὐρανόν; οὗτος
    ὁ Ἰησοῦς ὁ ἀναλημφθεὶς ἀφ’ ὑμῶν εἰς τὸν οὐρανὸν οὕτως ἐλεύσεται ὃν τρόπον ἐθεάσασθε
    αὐτὸν πορευόμενον εἰς τὸν οὐρανόν.
translation:
  text: They also said, “Men of Galilee, why do you stand looking into heaven? This
    Jesus, who was taken up from you into heaven, will come in the same way that you
    saw him going into heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “This same Jesus.” The Greek explicitly says “This
      Jesus”; “same” is an interpretive expansion meant to emphasize identity.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες Γαλιλαῖοι
  chosen: Men of Galilee
  alternatives:
  - Galilean men
  - Men, Galileans
  lexicon: BDAG
  rationale: Vocative plural ἄνδρες with the ethnic adjective Γαλιλαῖοι is most naturally
    rendered as a direct address, 'Men of Galilee.' This preserves the masculine form
    in keeping with the gender-accurate policy and reflects the source's rhetorical
    force.
- source_word: τί ἑστήκατε βλέποντες
  chosen: why do you stand looking
  alternatives:
  - why are you standing, looking
  - why have you stood looking
  - why do you stand gazing
  lexicon: BDAG
  rationale: The perfect ἑστήκατε has present-state force ('you are standing'), and
    the participle βλέποντες describes the attendant action. 'Why do you stand looking'
    is natural English that preserves both elements without over-paraphrase. 'Gazing'
    is possible but stronger than βλέπω ordinarily requires.
- source_word: εἰς τὸν οὐρανόν
  chosen: into heaven
  alternatives:
  - toward heaven
  - into the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven,' but in this ascension context the
    theological and narrative sense is 'heaven.' 'Into' reflects εἰς more directly
    than a weaker directional gloss.
- source_word: οὗτος ὁ Ἰησοῦς
  chosen: This Jesus
  alternatives:
  - This same Jesus
  - Jesus, this one
  lexicon: BDAG
  rationale: The demonstrative οὗτος is emphatic and points to Jesus specifically.
    'This Jesus' is the most direct rendering. 'This same Jesus' is interpretively
    acceptable and traditional, but 'same' is not explicit in the Greek and is therefore
    left out of the main text.
- source_word: ὁ ἀναλημφθεὶς ἀφ’ ὑμῶν
  chosen: who was taken up from you
  alternatives:
  - who was taken from you
  - who was received up from you
  lexicon: BDAG
  rationale: The aorist passive participle ἀναλημφθείς in ascension context means
    'taken up.' Including 'up' preserves the vertical nuance present in the verb and
    context. ἀφ’ ὑμῶν is best rendered 'from you,' indicating separation from the
    disciples' presence.
- source_word: οὕτως ἐλεύσεται
  chosen: will come in the same way
  alternatives:
  - will come thus
  - will come in this way
  lexicon: BDAG
  rationale: οὕτως points to manner. 'Will come in the same way' communicates the
    comparative force naturally in English when followed by ὃν τρόπον.
- source_word: ὃν τρόπον
  chosen: that
  alternatives:
  - in the way that
  - just as
  - in the manner that
  lexicon: BDAG
  rationale: The phrase means 'in the manner that / just as.' Because the main clause
    already includes 'in the same way,' rendering ὃν τρόπον simply as 'that' avoids
    redundancy while preserving the comparative structure in idiomatic English.
- source_word: ἐθεάσασθε
  chosen: you saw
  alternatives:
  - you watched
  - you beheld
  lexicon: BDAG
  rationale: θεάομαι can carry the sense of beholding or watching attentively. 'You
    saw' is clear, natural, and sufficient here; 'beheld' is archaic, and 'watched'
    may overemphasize duration.
- source_word: πορευόμενον
  chosen: going
  alternatives:
  - departing
  - traveling
  lexicon: BDAG
  rationale: The participle describes Jesus' movement as he ascended. 'Going' is the
    most straightforward English equivalent and fits the eyewitness description without
    importing additional nuance.
