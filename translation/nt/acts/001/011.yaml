theological_decisions:
- issue: Meaning of οὐρανός in the ascension/return context
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: Although οὐρανός can denote the visible sky, the immediate context of
    Jesus' ascension and promised return supports 'heaven' as the intended sense.
    This preserves the theological dimension present in Luke-Acts without adding claims
    beyond the text.
  doctrine_reference: Translation philosophy §1; Affirmations (historic ecumenical
    orthodoxy)
- issue: Whether to render οὗτος ὁ Ἰησοῦς as 'This Jesus' or 'This same Jesus'
  chosen_reading: This Jesus
  alternative_readings:
  - This same Jesus
  rationale: The Greek explicitly has the demonstrative 'this' but not an adjective
    meaning 'same.' The traditional expansion 'this same Jesus' is understandable
    but slightly interpretive. The main text therefore keeps the tighter rendering,
    with the traditional alternative preserved in a footnote.
  doctrine_reference: Translation philosophy §1
