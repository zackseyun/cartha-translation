id: ACT.1.14
reference: Acts 1:14
source:
  edition: SBLGNT
  text: οὗτοι πάντες ἦσαν προσκαρτεροῦντες ὁμοθυμαδὸν τῇ ⸀προσευχῇ σὺν γυναιξὶν καὶ
    ⸀Μαριὰμ τῇ μητρὶ τοῦ Ἰησοῦ καὶ ⸀σὺν τοῖς ἀδελφοῖς αὐτοῦ.
translation:
  text: All of these were continually devoting themselves with one accord to prayer,
    together with the women, and Mary the mother of Jesus, and with his brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unitedly' or 'with one mind'; the Greek emphasizes shared purpose as
      well as physical gathering.
    reason: lexical_alternative
  - marker: b
    text: Or 'with women.' The Greek lacks the article, but the phrase likely refers
      to a known group of women associated with the disciples.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' translates the Greek word adelphoi. Some understand this more
      broadly as close relatives or kin; the text itself does not specify further
      here.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι πάντες
  chosen: All of these
  alternatives:
  - These all
  - All these
  lexicon: BDAG
  rationale: A natural English rendering that preserves the demonstrative force of
    οὗτοι and the comprehensiveness of πάντες without sounding wooden.
- source_word: ἦσαν προσκαρτεροῦντες
  chosen: were continually devoting themselves
  alternatives:
  - were persisting
  - were continuing steadfastly
  - were constantly attending
  lexicon: BDAG
  rationale: The periphrastic imperfect with present participle conveys ongoing, durative
    action. 'Continually devoting themselves' captures both the progressive aspect
    and the sense of steadfast persistence in προσκαρτερέω.
- source_word: ὁμοθυμαδόν
  chosen: with one accord
  alternatives:
  - together
  - with one mind
  - unitedly
  lexicon: BDAG
  rationale: '''With one accord'' preserves the adverb''s emphasis on shared purpose
    and unity, a recurrent Lucan expression, more strongly than the flatter ''together.'''
- source_word: τῇ προσευχῇ
  chosen: to prayer
  alternatives:
  - in prayer
  - to the prayer
  lexicon: BDAG
  rationale: 'With προσκαρτερέω, the dative is naturally rendered as the object of
    devoted persistence: ''devoting themselves to prayer.'' The article is not naturally
    reproduced in English here.'
- source_word: σὺν γυναιξίν
  chosen: together with the women
  alternatives:
  - with women
  - along with the women
  lexicon: BDAG
  rationale: The article is absent in Greek, but English idiom commonly supplies 'the'
    for a known group in context. 'Together with' reflects σύν and keeps the phrase
    connected to the gathered community.
- source_word: Μαριὰμ τῇ μητρὶ τοῦ Ἰησοῦ
  chosen: Mary the mother of Jesus
  alternatives:
  - Mariam, the mother of Jesus
  lexicon: BDAG
  rationale: Standard English transliteration uses 'Mary.' The appositional phrase
    is rendered straightforwardly and identifies her specifically within the group.
- source_word: σὺν τοῖς ἀδελφοῖς αὐτοῦ
  chosen: and with his brothers
  alternatives:
  - and with his brothers and sisters
  - and with his siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and here most naturally refers
    to Jesus's male siblings/kin as a distinct group. Per the gender-accurate policy,
    'brothers' is preferred over gender-neutral expansion unless context clearly requires
    inclusivity.
