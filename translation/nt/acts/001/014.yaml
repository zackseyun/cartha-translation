theological_decisions:
- issue: Reference of Jesus's ἀδελφοί
  chosen_reading: Rendered as 'his brothers' without resolving broader doctrinal debates
    about whether these were biological brothers, stepbrothers, or close kin.
  alternative_readings:
  - his siblings/relatives in a broader kinship sense
  rationale: The Greek term ἀδελφοί ordinarily means 'brothers,' but Christian traditions
    differ on the precise familial relationship. The translation preserves the lexical
    form of the Greek and does not import a denominational conclusion beyond what
    the text states.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it; Gender-accurate over gender-neutral
