theological_decisions:
- issue: Rendering of ἐπισκοπή in an apostolic succession context
  chosen_reading: office
  alternative_readings:
  - overseership
  - bishopric
  rationale: The verse quotes Ps 109:8 in application to Judas's vacated role. Translating
    ἐπισκοπή as 'office' avoids importing later denominational structures into the
    text while still conveying a recognized role to be filled. Because the term can
    also denote 'overseership' and has historically been rendered 'bishopric,' those
    alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §§1, 3, 6
