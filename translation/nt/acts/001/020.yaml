id: ACT.1.20
reference: Acts 1:20
source:
  edition: SBLGNT
  text: γέγραπται γὰρ ἐν βίβλῳ ψαλμῶν· Γενηθήτω ἡ ἔπαυλις αὐτοῦ ἔρημος καὶ μὴ ἔστω
    ὁ κατοικῶν ἐν αὐτῇ, καί· Τὴν ἐπισκοπὴν αὐτοῦ ⸀λαβέτω ἕτερος.
translation:
  text: For it is written in the book of Psalms, ‘Let his dwelling become desolate,
    and let there be no one living in it,’ and, ‘Let another take his office.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'homestead' or 'habitation' for 'dwelling' (ἔπαυλις).
    reason: lexical_alternative
  - marker: b
    text: Or 'Let no one dwell in it' or 'let there be no inhabitant in it.'
    reason: lexical_alternative
  - marker: c
    text: '''Office'' translates ἐπισκοπή; alternatively ''overseership.'' Older English
      versions often have ''bishopric,'' but that may suggest a later technical church
      office not required by the context.'
    reason: alternative_reading
lexical_decisions:
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Perfect passive commonly functions as a scriptural citation formula in
    the NT; 'it is written' is idiomatic English and preserves the present force of
    the perfect.
- source_word: βίβλῳ ψαλμῶν
  chosen: the book of Psalms
  alternatives:
  - the scroll/book of Psalms
  lexicon: BDAG
  rationale: Natural rendering of the genitive construction identifying the scriptural
    source; 'book of Psalms' is standard and clear.
- source_word: Γενηθήτω
  chosen: Let ... become
  alternatives:
  - May ... become
  lexicon: BDAG
  rationale: Aorist imperative in a quotation expressing a jussive wish/curse; 'Let
    ... become' preserves the force and matches English citation style.
- source_word: ἔπαυλις
  chosen: dwelling
  alternatives:
  - homestead
  - encampment
  - habitation
  lexicon: BDAG
  rationale: The term denotes a habitation or residence. 'Dwelling' is broad enough
    to fit the Psalm citation while remaining natural in modern English.
- source_word: ἔρημος
  chosen: desolate
  alternatives:
  - deserted
  - wilderness-like
  lexicon: BDAG
  rationale: In context it describes a place left uninhabited. 'Desolate' preserves
    the solemn scriptural tone better than the more colloquial 'deserted'.
- source_word: μὴ ἔστω ὁ κατοικῶν ἐν αὐτῇ
  chosen: let there be no one living in it
  alternatives:
  - let there be no inhabitant in it
  - let no one dwell in it
  lexicon: BDAG
  rationale: This renders the prohibition plus participial substantive idiomatically.
    'No one living in it' is readable modern English while preserving the sense of
    no inhabitant.
- source_word: ἐπισκοπή
  chosen: office
  alternatives:
  - overseership
  - position of oversight
  - bishopric
  lexicon: BDAG
  rationale: Here the word refers to the role or charge Judas held among the apostles,
    not yet to a later ecclesiastical office in a technical sense. 'Office' is concise
    and contextually appropriate; more technical alternatives are preserved in a footnote.
- source_word: λαβέτω ἕτερος
  chosen: Let another take
  alternatives:
  - let someone else receive
  - let another assume
  lexicon: BDAG
  rationale: Aorist imperative plus subject adjective is well rendered by 'Let another
    take,' preserving the formal citation style and the sense of succession.
