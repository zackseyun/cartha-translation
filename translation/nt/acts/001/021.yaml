theological_decisions:
- issue: Rendering of κύριος as a christological title
  chosen_reading: the Lord Jesus
  alternative_readings:
  - Master Jesus
  rationale: The doctrinal guidance specifies κύριος should normally be rendered 'Lord.'
    In Acts this title carries both honorific and theological weight; 'Master' would
    underrepresent established NT usage here.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Gendered reference in ἀνδρῶν
  chosen_reading: men
  alternative_readings:
  - people
  - persons
  rationale: The source text uses ἀνήρ, which is specifically masculine. Following
    the gender-accurate principle, the translation preserves 'men' rather than neutralizing
    the term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
