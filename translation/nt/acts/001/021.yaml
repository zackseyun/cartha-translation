id: ACT.1.21
reference: Acts 1:21
source:
  edition: SBLGNT
  text: δεῖ οὖν τῶν συνελθόντων ἡμῖν ἀνδρῶν ἐν παντὶ χρόνῳ ⸀ᾧ εἰσῆλθεν καὶ ἐξῆλθεν
    ἐφ’ ἡμᾶς ὁ κύριος Ἰησοῦς,
translation:
  text: Therefore, it is necessary that one of the men who accompanied us during all
    the time in which the Lord Jesus went in and out among us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men who were with us' or more literally 'the men who came together
      with us.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'went in and out among us' is an idiom for Jesus' ongoing
      public life and activity in the company of the disciples.
    reason: cultural_note
lexical_decisions:
- source_word: δεῖ
  chosen: it is necessary
  alternatives:
  - it is required
  - it must be
  lexicon: BDAG
  rationale: Impersonal verb expressing necessity. 'It is necessary' preserves the
    formal force without prematurely supplying the infinitive complement that continues
    into the next verse.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: Marks inference from the preceding context; 'therefore' clearly signals
    the logical conclusion Peter is drawing.
- source_word: συνελθόντων ... ἀνδρῶν
  chosen: the men who accompanied us
  alternatives:
  - the men who came together with us
  - the men who were with us
  lexicon: BDAG
  rationale: The participle from συνέρχομαι literally means 'having come together,'
    but in this context it refers to those who were in company with the apostles over
    time. 'Accompanied us' communicates sustained association more naturally in English
    while remaining faithful to the sense.
- source_word: ἀνδρῶν
  chosen: men
  alternatives:
  - males
  lexicon: BDAG
  rationale: The noun ἀνήρ specifically denotes men, not generic humans. This fits
    the stated criterion for the replacement witness in context, so a gender-accurate
    rendering is required rather than a neutral term like 'people'.
- source_word: ἐν παντὶ χρόνῳ
  chosen: during all the time
  alternatives:
  - throughout the whole time
  - at all times
  lexicon: BDAG
  rationale: The phrase refers to the entire span of Jesus' public presence with them,
    not to every individual occasion in a distributive sense. 'During all the time'
    is natural and accurate.
- source_word: ᾧ
  chosen: in which
  alternatives:
  - when
  lexicon: BDAG
  rationale: The relative pronoun is dative singular governed by the temporal phrase;
    'in which' preserves the construction, though idiomatically temporal.
- source_word: εἰσῆλθεν καὶ ἐξῆλθεν
  chosen: went in and out
  alternatives:
  - came and went
  - entered and went out
  lexicon: BDAG
  rationale: This is a Semitic-style idiom for regular association and public activity.
    'Went in and out' keeps the source imagery and familiar biblical idiom without
    over-paraphrasing.
- source_word: ἐφ’ ἡμᾶς
  chosen: among us
  alternatives:
  - with us
  - before us
  lexicon: BDAG
  rationale: With verbs of movement here, ἐπί plus accusative conveys movement/activity
    in relation to the group. 'Among us' best fits the idiom 'went in and out among
    us' in English and the communal setting.
- source_word: ὁ κύριος Ἰησοῦς
  chosen: the Lord Jesus
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrine guidance for this christological
    title. Including the article as 'the Lord Jesus' reflects the Greek naturally
    in this sentence.
