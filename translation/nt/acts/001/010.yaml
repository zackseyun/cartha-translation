theological_decisions:
- issue: Rendering οὐρανός in the ascension context
  chosen_reading: heaven
  alternative_readings:
  - sky
  rationale: The immediate context is Jesus' ascension, so 'heaven' best reflects
    the narrative's theological horizon while remaining a legitimate lexical sense
    of οὐρανός. This does not force a cosmological claim beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Identity of the two men
  chosen_reading: two men
  alternative_readings:
  - two angels
  rationale: The Greek text says 'two men' and does not explicitly identify them as
    angels in this verse. The translation therefore preserves the surface wording
    and leaves the implied identification to context rather than importing it into
    the main text.
  doctrine_reference: 'Translation philosophy: never import doctrinal claims the text
    does not make; gender-accurate over gender-neutral'
