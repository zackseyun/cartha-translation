id: ACT.1.10
reference: Acts 1:10
source:
  edition: SBLGNT
  text: καὶ ὡς ἀτενίζοντες ἦσαν εἰς τὸν οὐρανὸν πορευομένου αὐτοῦ, καὶ ἰδοὺ ἄνδρες
    δύο παρειστήκεισαν αὐτοῖς ἐν ⸂ἐσθήσεσι λευκαῖς⸃,
translation:
  text: And as they were gazing intently into heaven while he was going, behold, two
    men stood by them in white clothing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the sky.' The Greek word can mean either 'heaven' or 'sky'; in
      this ascension context, 'heaven' was chosen.
    reason: lexical_alternative
  - marker: b
    text: Or 'in white garments' or 'in white robes.' The Greek refers broadly to
      clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτενίζοντες
  chosen: gazing intently
  alternatives:
  - looking steadily
  - staring
  lexicon: BDAG
  rationale: The participle conveys fixed, intent looking rather than a mere glance.
    'Gazing intently' preserves the durative and focused sense in natural English.
- source_word: οὐρανόν
  chosen: heaven
  alternatives:
  - sky
  lexicon: BDAG
  rationale: Although οὐρανός can mean 'sky,' in this ascension context 'heaven' better
    matches the upward, theological setting without overstating the term beyond its
    normal semantic range.
- source_word: πορευομένου αὐτοῦ
  chosen: while he was going
  alternatives:
  - as he went
  - while he was departing
  lexicon: BDAG
  rationale: The genitive absolute marks contemporaneous action. 'While he was going'
    is a straightforward rendering that preserves the movement without importing interpretive
    detail beyond the Greek.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to what follows. 'Behold'
    preserves the markedness and solemn narrative force better than the more colloquial
    'look'; 'suddenly' would add a nuance not explicit in the word itself.
- source_word: ἄνδρες δύο
  chosen: two men
  alternatives:
  - two males
  lexicon: BDAG
  rationale: ἀνήρ ordinarily means 'man' rather than the generic 'person.' The phrase
    should be rendered gender-accurately as 'two men,' while the broader narrative
    may imply angelic identity from context rather than from this noun alone.
- source_word: παρειστήκεισαν
  chosen: stood by
  alternatives:
  - were standing beside
  - appeared beside
  lexicon: BDAG
  rationale: The pluperfect form of παρίστημι here functions idiomatically to indicate
    their presence beside the disciples. 'Stood by' is concise and natural; 'appeared'
    would over-interpret the verb.
- source_word: ἐσθήσεσι λευκαῖς
  chosen: in white clothing
  alternatives:
  - in white robes
  - in white garments
  lexicon: BDAG
  rationale: ἐσθής denotes clothing/garment broadly. 'White clothing' is clear modern
    English and avoids specifying 'robes' unless the context requires a more formal
    garment than the Greek itself states.
