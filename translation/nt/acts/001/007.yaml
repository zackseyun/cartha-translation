id: ACT.1.7
reference: Acts 1:7
source:
  edition: SBLGNT
  text: εἶπεν ⸀δὲ πρὸς αὐτούς· Οὐχ ὑμῶν ἐστιν γνῶναι χρόνους ἢ καιροὺς οὓς ὁ πατὴρ
    ἔθετο ἐν τῇ ἰδίᾳ ἐξουσίᾳ,
translation:
  text: But he said to them, “It is not for you to know times or seasons that the
    Father has set by his own authority.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “times or appointed times” or “times or epochs.” Greek distinguishes
      χρόνοι and καιροί, two related terms for temporal periods and appointed moments.
    reason: lexical_alternative
  - marker: b
    text: Or “in his own authority.” The Greek expression is literally “in his own
      authority,” meaning that the Father has reserved these matters to his own sovereign
      prerogative.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild discourse transition/contrast from the disciples’ question
    to Jesus’ corrective response. 'But' best captures the adversative nuance in natural
    English.
- source_word: Οὐχ ὑμῶν ἐστιν γνῶναι
  chosen: It is not for you to know
  alternatives:
  - It is not yours to know
  - It is not your place to know
  lexicon: BDAG
  rationale: This idiom expresses that such knowledge does not belong to the disciples'
    sphere or prerogative. 'It is not for you to know' is idiomatic English and preserves
    the force without over-paraphrasing.
- source_word: χρόνους
  chosen: times
  alternatives:
  - periods
  lexicon: BDAG
  rationale: χρόνος commonly denotes time in duration or extended periods. 'Times'
    is the standard concise rendering and pairs naturally with καιρούς.
- source_word: καιροὺς
  chosen: seasons
  alternatives:
  - appointed times
  - epochs
  lexicon: BDAG
  rationale: καιρός often denotes a fitting, appointed, or decisive time. 'Seasons'
    preserves the traditional distinction from χρόνοι while remaining readable. The
    pairing 'times or seasons' reflects two related but distinct temporal concepts
    without forcing a technical distinction.
- source_word: οὓς
  chosen: that
  alternatives:
  - which
  lexicon: BDAG
  rationale: A natural English relative pronoun introducing the clause modifying 'times
    or seasons.' 'That' is smoother in contemporary English than 'which' here.
- source_word: ὁ πατὴρ
  chosen: the Father
  alternatives:
  - my Father
  lexicon: BDAG
  rationale: The Greek has the articular noun 'the Father,' not 'my Father.' The title
    is retained as written and reflects Jesus' reference to God.
- source_word: ἔθετο
  chosen: has set
  alternatives:
  - set
  - appointed
  - fixed
  lexicon: BDAG
  rationale: τίθημι here means to set, establish, or appoint. The English present
    perfect 'has set' idiomatically conveys a past action with present relevance.
    'Appointed' is possible but slightly more interpretive.
- source_word: ἐν τῇ ἰδίᾳ ἐξουσίᾳ
  chosen: by his own authority
  alternatives:
  - in his own authority
  - under his own authority
  - within his own authority
  lexicon: BDAG
  rationale: ἐξουσία denotes authority/right/power. Although ἐν is literally 'in,'
    English idiom prefers 'by his own authority' to express that the Father has reserved
    and established these times under his sovereign prerogative. 'Own' reflects ἰδίᾳ.
