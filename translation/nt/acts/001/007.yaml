theological_decisions:
- issue: Rendering the temporal pair χρόνοι / καιροί
  chosen_reading: times or seasons
  alternative_readings:
  - times or appointed times
  - periods or seasons
  - times or epochs
  rationale: The verse distinguishes two related temporal terms without inviting a
    rigid technical system. 'Times or seasons' preserves the lexical distinction and
    theological restraint of Jesus' answer, avoiding speculative precision beyond
    the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering ἐξουσία with reference to the Father
  chosen_reading: by his own authority
  alternative_readings:
  - in his own authority
  rationale: This wording preserves the Father's sovereign prerogative without importing
    later doctrinal formulations not explicit in the verse. It communicates divine
    authority clearly in modern English while staying close to the Greek sense.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
