theological_decisions:
- issue: Nature of Judas's relation to the apostolic office
  chosen_reading: The verse states that Judas was included among the apostles and
    had an allotted share in their ministry, without implying approval or perseverance.
  alternative_readings:
  - The verse could be read more weakly as mere association with the group.
  rationale: The Greek plainly affirms real inclusion ('was numbered among us') and
    participation ('received a share in this ministry'). The translation should preserve
    that historical reality without importing later doctrinal conclusions beyond the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
