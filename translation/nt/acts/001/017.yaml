id: ACT.1.17
reference: Acts 1:17
source:
  edition: SBLGNT
  text: ὅτι κατηριθμημένος ἦν ⸀ἐν ἡμῖν καὶ ἔλαχεν τὸν κλῆρον τῆς διακονίας ταύτης.—
translation:
  text: For he was numbered among us and received a share in this ministry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obtained the lot/allotted portion of this ministry.' The Greek uses
      κλῆρος, which can mean 'lot' or 'share/portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In context Peter is giving the reason Judas had to be addressed in this
    matter, so a causal connector is most natural in English. 'For' preserves the
    explanatory force concisely.
- source_word: κατηριθμημένος ἦν
  chosen: was numbered
  alternatives:
  - had been counted
  - was enrolled
  lexicon: BDAG
  rationale: The periphrastic perfect/passive sense indicates Judas stood as one counted
    within the apostolic group. 'Was numbered' is idiomatic, fairly formal, and preserves
    the passive nuance without overtranslating.
- source_word: ἐν ἡμῖν
  chosen: among us
  alternatives:
  - with us
  - in our number
  lexicon: BDAG
  rationale: The phrase denotes inclusion within the group rather than mere proximity.
    'Among us' communicates membership in the apostolic company clearly.
- source_word: ἔλαχεν
  chosen: received
  alternatives:
  - obtained
  - was allotted
  lexicon: BDAG
  rationale: The verb λαγχάνω can carry the sense of obtaining by lot or receiving
    an allotted portion. Here the focus is that Judas came to have this role/portion.
    'Received' is natural English; the allotment nuance is preserved by translating
    κλῆρον as 'share' and noted in a footnote.
- source_word: τὸν κλῆρον
  chosen: a share
  alternatives:
  - the lot
  - the allotted portion
  - the share
  lexicon: BDAG
  rationale: κλῆρος can mean 'lot' or, by extension, 'share/portion assigned.' In
    this context English 'received the lot of this ministry' is awkward and potentially
    misleading to modern readers as if a casting of lots occurred here. 'A share'
    best conveys participation in an assigned role while remaining faithful to the
    semantic range.
- source_word: τῆς διακονίας ταύτης
  chosen: in this ministry
  alternatives:
  - of this ministry
  - in this service
  lexicon: BDAG
  rationale: διακονία here refers to the apostolic service/ministry. Rendering with
    'in this ministry' produces natural English with 'share' while preserving the
    ministerial sense. 'Service' is possible but weaker in this apostolic context.
