id: ACT.1.6
reference: Acts 1:6
source:
  edition: SBLGNT
  text: Οἱ μὲν οὖν συνελθόντες ⸀ἠρώτων αὐτὸν λέγοντες· Κύριε, εἰ ἐν τῷ χρόνῳ τούτῳ
    ἀποκαθιστάνεις τὴν βασιλείαν τῷ Ἰσραήλ;
translation:
  text: So when they had come together, they asked him, saying, “Lord, is it at this
    time that you are restoring the kingdom to Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for Israel.” The Greek dative may be understood as advantage (“for Israel”)
      or more directly as restoration “to Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ μὲν οὖν συνελθόντες
  chosen: So when they had come together
  alternatives:
  - Therefore, when they had come together
  - Then those who had come together
  lexicon: BDAG
  rationale: The participle συνελθόντες is temporal here, introducing the circumstance
    of the question. μὲν οὖν is a discourse connector; 'So' captures the forward movement
    naturally in English without over-translating both particles woodenly.
- source_word: ἠρώτων αὐτὸν
  chosen: they asked him
  alternatives:
  - they were asking him
  - they questioned him
  lexicon: BDAG
  rationale: The imperfect ἠρώτων can be iterative or descriptive, but in English
    narrative 'they asked him' is the most natural rendering. 'Were asking' is possible
    but sounds unnecessarily durative here.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of the question. 'Saying' preserves
    the Greek structure cleanly; English punctuation then carries the quotation naturally.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In direct address to
    Jesus, this preserves both respect and the title's theological weight without
    narrowing it to merely 'Master'.
- source_word: εἰ
  chosen: is it
  alternatives:
  - if
  lexicon: BDAG
  rationale: Although εἰ often means 'if,' in direct questions it functions as an
    interrogative marker introducing a yes/no question. English idiom requires 'is
    it' rather than a literal 'if'.
- source_word: ἐν τῷ χρόνῳ τούτῳ
  chosen: at this time
  alternatives:
  - in this time
  - at this moment
  lexicon: BDAG
  rationale: χρόνος here refers to a time period or occasion, not merely a point-instant.
    'At this time' is idiomatic and sufficiently precise.
- source_word: ἀποκαθιστάνεις
  chosen: you are restoring
  alternatives:
  - you restore
  - you are reestablishing
  lexicon: BDAG
  rationale: The present tense is naturally rendered as progressive in this question.
    ἀποκαθίστημι carries the sense of restoring to a former state; 'restoring' is
    the clearest and most direct choice.
- source_word: τὴν βασιλείαν
  chosen: the kingdom
  alternatives:
  - the reign
  - the royal rule
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom, but here with 'to Israel' the concrete-national
    expectation of the disciples is foregrounded. 'The kingdom' best preserves that
    expectation while remaining standard English.
- source_word: τῷ Ἰσραήλ
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: BDAG
  rationale: The dative is best taken as advantage/reference with the restoration
    of the kingdom to Israel. 'To Israel' is the most direct rendering and preserves
    the Greek form closely.
