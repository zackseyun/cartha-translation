theological_decisions:
- issue: Nature of the disciples' expectation regarding Israel's kingdom
  chosen_reading: Render the question straightforwardly as a restoration of 'the kingdom
    to Israel' without interpreting it as either purely political or purely spiritual.
  alternative_readings:
  - restore the kingdom for Israel
  - restore Israel's kingdom
  - restore the reign to Israel
  rationale: The verse reports the disciples' question, not Jesus' endorsement or
    correction of every assumption embedded in it. The translation should preserve
    the historical and theological tension rather than resolve it by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
