theological_decisions:
- issue: Meaning of 'his own place' regarding Judas's destiny
  chosen_reading: Retain the ambiguous wording 'his own place' in the main text.
  alternative_readings:
  - a reference to death/grave
  - a reference to judgment/hell
  - a reference simply to the place fitting for Judas
  rationale: The Greek phrase does not explicitly define the destination. Because
    the expression is interpretively loaded, the translation preserves the textual
    ambiguity rather than resolving it into a doctrinally stronger claim than the
    verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
