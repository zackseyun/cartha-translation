id: ACT.1.25
reference: Acts 1:25
source:
  edition: SBLGNT
  text: λαβεῖν τὸν ⸀τόπον τῆς διακονίας ταύτης καὶ ἀποστολῆς, ⸀ἀφ’ ἧς παρέβη Ἰούδας
    πορευθῆναι εἰς τὸν τόπον τὸν ἴδιον.
translation:
  text: to take the place of this ministry and apostleship, from which Judas turned
    aside to go to his own place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'departed from' or 'fell away from.' The Greek verb can denote deviation
      or departure from the ministry/apostleship.
    reason: lexical_alternative
  - marker: b
    text: '''His own place'' may refer simply to the place that belonged to Judas,
      or more pointedly to the place of judgment fitting for him.'
    reason: alternative_reading
lexical_decisions:
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to receive
  lexicon: BDAG
  rationale: 'The aorist infinitive expresses the purpose/content of the prayer in
    context: that the chosen man would take up the vacant role. ''Take'' is idiomatic
    in English for assuming an office, while still reflecting the basic sense of λαμβάνω.'
- source_word: τόπον
  chosen: the place
  alternatives:
  - the position
  - the office
  lexicon: BDAG
  rationale: τόπος is literally 'place.' Here it refers metaphorically to a role or
    position. 'Place' preserves the Greek image and matches the immediate repetition
    later in the verse ('his own place'), creating a deliberate contrast.
- source_word: διακονίας
  chosen: ministry
  alternatives:
  - service
  lexicon: BDAG
  rationale: διακονία can mean service or ministry. In this ecclesial context, referring
    to apostolic work, 'ministry' best conveys an entrusted service without over-paraphrasing.
- source_word: ἀποστολῆς
  chosen: apostleship
  alternatives:
  - apostolic office
  - mission
  lexicon: BDAG
  rationale: ἀποστολή here denotes the apostolic commission/office rather than a general
    mission. 'Apostleship' is the most precise English equivalent and preserves the
    formal role in view.
- source_word: ἀφ’ ἧς
  chosen: from which
  alternatives:
  - from which place/office
  - which
  lexicon: BDAG
  rationale: The preposition and relative pronoun naturally yield 'from which,' referring
    back to the ministry/apostleship. This keeps the sense that Judas departed from
    the assigned role.
- source_word: παρέβη
  chosen: turned aside
  alternatives:
  - transgressed
  - departed
  - fell away
  lexicon: BDAG
  rationale: παραβαίνω can mean transgress or go beyond, but in this context the sense
    is that Judas deviated from or abandoned his appointed role. 'Turned aside' captures
    the departure without importing a more technical doctrinal term than the Greek
    itself requires.
- source_word: πορευθῆναι
  chosen: to go
  alternatives:
  - to depart
  - to journey
  lexicon: BDAG
  rationale: The infinitive expresses result/purpose after Judas's turning aside.
    'To go' is simple and direct, preserving the ordinary force of πορεύομαι.
- source_word: εἰς τὸν τόπον τὸν ἴδιον
  chosen: to his own place
  alternatives:
  - to the place that was his own
  - to his proper place
  lexicon: BDAG
  rationale: The phrase is intentionally terse and somewhat ominous. 'His own place'
    preserves the ambiguity of the Greek and avoids over-interpreting it as either
    merely death or specifically final judgment in the main text.
