theological_decisions:
- issue: Jewish distance idiom σαββάτου ἔχον ὁδόν
  chosen_reading: a Sabbath day’s journey away
  alternative_readings:
  - having a Sabbath day's journey
  rationale: This is primarily a cultural-lexical idiom rather than a doctrinal issue.
    The chosen rendering preserves the Jewish frame of reference while making the
    phrase intelligible in modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
