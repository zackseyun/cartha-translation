id: ACT.1.12
reference: Acts 1:12
source:
  edition: SBLGNT
  text: Τότε ὑπέστρεψαν εἰς Ἰερουσαλὴμ ἀπὸ ὄρους τοῦ καλουμένου Ἐλαιῶνος, ὅ ἐστιν
    ἐγγὺς Ἰερουσαλὴμ σαββάτου ἔχον ὁδόν.
translation:
  text: Then they returned to Jerusalem from the mount called Olivet, which is near
    Jerusalem, a Sabbath day’s journey away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more traditionally, “called the Mount of Olives.”
    reason: lexical_alternative
  - marker: b
    text: A “Sabbath day’s journey” was the customary distance a Jew could travel
      on the Sabbath.
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural and sufficiently formal.
- source_word: ὑπέστρεψαν
  chosen: they returned
  alternatives:
  - they went back
  lexicon: BDAG
  rationale: Aorist active indicative of ὑποστρέφω, meaning to return or go back.
    'Returned' is the most natural narrative rendering.
- source_word: εἰς Ἰερουσαλὴμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς commonly marks movement toward a place. In idiomatic English with
    a city name, 'to Jerusalem' is preferred.
- source_word: ἀπὸ ὄρους
  chosen: from the mount
  alternatives:
  - from the mountain
  - from a hill
  lexicon: BDAG
  rationale: ἀπό marks source, and ὄρος denotes a mountain or mount. 'Mount' fits
    the conventional place-name style in this context without overstating topography.
- source_word: τοῦ καλουμένου Ἐλαιῶνος
  chosen: called Olivet
  alternatives:
  - called the Mount of Olives
  - called the olive grove
  lexicon: BDAG
  rationale: The genitive phrase literally means 'called of Olives/Olive Grove.' 'Olivet'
    is a concise English place-name equivalent and reflects the named location. Because
    'Mount of Olives' is more familiar and more transparent, it is preserved in a
    footnote.
- source_word: ὅ ἐστιν ἐγγὺς Ἰερουσαλὴμ
  chosen: which is near Jerusalem
  alternatives:
  - which is close to Jerusalem
  lexicon: BDAG
  rationale: Relative clause identifying the location's proximity. 'Near Jerusalem'
    is straightforward and natural.
- source_word: σαββάτου ἔχον ὁδόν
  chosen: a Sabbath day’s journey away
  alternatives:
  - having a Sabbath day's journey
  - about a Sabbath day's walk away
  lexicon: BDAG
  rationale: Idiomatic expression meaning the distance permitted for travel on the
    Sabbath in Jewish usage. Rendering the sense in natural English is preferable
    to a wooden participial construction.
