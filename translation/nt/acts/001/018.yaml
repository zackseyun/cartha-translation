theological_decisions:
- issue: Relation of Judas to the acquisition of the field
  chosen_reading: Render ἐκτήσατο as 'acquired' rather than 'bought,' allowing the
    text to state possession without over-specifying the mechanism.
  alternative_readings:
  - '''bought'' the field personally'
  - the field was acquired in his name/by means of his money
  rationale: This avoids importing a harmonization problem with Matthew 27:5–8 into
    the translation itself. The Greek permits a broader statement of acquisition,
    and the translation should preserve that tension rather than resolve it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
