id: ACT.1.18
reference: Acts 1:18
source:
  edition: SBLGNT
  text: Οὗτος μὲν οὖν ἐκτήσατο χωρίον ἐκ μισθοῦ τῆς ἀδικίας, καὶ πρηνὴς γενόμενος
    ἐλάκησεν μέσος, καὶ ἐξεχύθη πάντα τὰ σπλάγχνα αὐτοῦ.
translation:
  text: So this man acquired a field from the wages of unrighteousness, and falling
    headlong he burst open in the middle, and all his intestines spilled out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the reward of wickedness.' The Greek expression can be rendered
      more dynamically, but 'from the wages of unrighteousness' preserves the wording
      more closely.
    reason: lexical_alternative
  - marker: b
    text: Or 'having become prone' / 'having fallen face down.' The phrase likely
      describes a headlong fall.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'acquired' a field, which may describe possession obtained
      through the money associated with Judas, not necessarily a direct personal purchase.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὗτος μὲν οὖν
  chosen: So this man
  alternatives:
  - Now this man
  - Therefore this man
  lexicon: BDAG
  rationale: Οὗτος refers back to Judas. μέν οὖν is a discourse combination marking
    continuation/inference; 'So' captures the connective force in natural English
    without overloading the sentence. 'This man' preserves the demonstrative reference.
- source_word: ἐκτήσατο
  chosen: acquired
  alternatives:
  - obtained
  - bought
  lexicon: BDAG
  rationale: κτάομαι means to acquire or gain possession. 'Acquired' is broad enough
    to allow the idiom that the field came into his possession through the money associated
    with him, without forcing the narrower commercial sense 'bought.'
- source_word: χωρίον
  chosen: a field
  alternatives:
  - a piece of land
  - a property
  lexicon: BDAG
  rationale: χωρίον commonly denotes a field or parcel of land. 'Field' is the most
    straightforward and idiomatic rendering here.
- source_word: ἐκ μισθοῦ τῆς ἀδικίας
  chosen: from the wages of unrighteousness
  alternatives:
  - with the reward of wickedness
  - from the payment for wrongdoing
  lexicon: BDAG
  rationale: μισθός is 'wages/pay/reward'; ἀδικία is 'unrighteousness/wrongdoing.'
    'From the wages of unrighteousness' stays close to the Greek and preserves the
    morally charged expression without paraphrase. 'From' reflects ἐκ more directly
    than 'with.'
- source_word: πρηνὴς γενόμενος
  chosen: falling headlong
  alternatives:
  - becoming prone
  - having fallen face down
  lexicon: BDAG
  rationale: πρηνής denotes being headfirst/prone; with γενόμενος it describes the
    manner/state leading into the next event. 'Falling headlong' is idiomatic English
    that captures the likely sense better than the wooden 'becoming prone.'
- source_word: ἐλάκησεν μέσος
  chosen: he burst open in the middle
  alternatives:
  - he split open down the middle
  - he burst apart in the midst
  lexicon: BDAG
  rationale: λακάω means to burst or crack open; μέσος here functions adverbially,
    indicating the middle. 'Burst open in the middle' is vivid, accurate, and readable.
- source_word: ἐξεχύθη
  chosen: spilled out
  alternatives:
  - poured out
  - gushed out
  lexicon: BDAG
  rationale: ἐκχέω in the passive here describes the contents being poured/spilled
    out. 'Spilled out' is natural modern English and fits the gruesome narrative context.
- source_word: πάντα τὰ σπλάγχνα αὐτοῦ
  chosen: all his intestines
  alternatives:
  - all his entrails
  - all his inward parts
  lexicon: BDAG
  rationale: σπλάγχνα literally refers to inward parts/entrails. 'Intestines' gives
    a clear concrete sense for modern readers; 'entrails' is possible but somewhat
    archaic.
