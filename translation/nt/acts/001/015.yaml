theological_decisions:
- issue: Gendered reference of ἀδελφῶν in the gathered community
  chosen_reading: Render as 'brothers' in the main text, with a footnote noting the
    likely inclusive reference to fellow believers including women.
  alternative_readings:
  - brothers and sisters
  - believers
  rationale: The translation philosophy requires gender-accurate rendering over gender-neutral
    smoothing. The masculine plural form is preserved as 'brothers,' while the contextual
    inclusivity is documented in a footnote rather than imported into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
