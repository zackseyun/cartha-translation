id: ACT.1.15
reference: Acts 1:15
source:
  edition: SBLGNT
  text: Καὶ ἐν ταῖς ἡμέραις ταύταις ἀναστὰς Πέτρος ἐν μέσῳ τῶν ⸀ἀδελφῶν εἶπεν (ἦν
    τε ὄχλος ὀνομάτων ἐπὶ τὸ αὐτὸ ⸀ὡς ἑκατὸν εἴκοσι)·
translation:
  text: And in those days Peter stood up in the midst of the brothers and said (the
    number of names together was about one hundred twenty),
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' but in this gathered
      community the reference may include all fellow believers, including women.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - got up
  - rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces Peter's action before speaking.
    'Stood up' is natural English in a speech-setting and preserves the concrete action
    better than the more generic 'got up.'
- source_word: ἐν μέσῳ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: BDAG
  rationale: The phrase denotes position within a gathered group. 'In the midst of'
    is slightly more formal but still natural and preserves the spatial nuance of
    the Greek.
- source_word: ἀδελφῶν
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers/siblings
  lexicon: BDAG
  rationale: Per the gender-accurate philosophy, the masculine plural is retained
    as 'brothers' in the main text. In this context the gathered believers likely
    included women, so the inclusive sense is preserved in a footnote rather than
    neutralized in the text.
- source_word: ὄχλος ὀνομάτων
  chosen: the number of names
  alternatives:
  - the company of persons
  - the crowd of people
  - the group in number
  lexicon: BDAG
  rationale: Literally the expression is 'a crowd/multitude of names,' an idiom for
    a counted group of persons. 'The number of names' keeps the lexical presence of
    ὀνόματα while producing idiomatic English. A more interpretive rendering like
    'company of persons' is possible but less transparent to the source.
- source_word: ἐπὶ τὸ αὐτό
  chosen: together
  alternatives:
  - in one place
  - assembled together
  lexicon: BDAG
  rationale: This idiom commonly means being gathered together. 'Together' is concise
    and natural; 'in one place' is possible but slightly more specific than the phrase
    requires here.
- source_word: ὡς ἑκατὸν εἴκοσι
  chosen: about one hundred twenty
  alternatives:
  - approximately one hundred twenty
  - some one hundred twenty
  lexicon: BDAG
  rationale: ὡς with a number signals approximation. 'About one hundred twenty' is
    the clearest modern English rendering.
- source_word: ὀνομάτων
  chosen: names
  alternatives:
  - persons
  - people
  lexicon: BDAG
  rationale: Although the idiom refers to persons, retaining 'names' in the main rendering
    preserves the wording of the Greek and avoids over-paraphrase.
