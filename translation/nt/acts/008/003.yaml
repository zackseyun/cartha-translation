id: ACT.8.3
reference: Acts 8:3
source:
  edition: SBLGNT
  text: Σαῦλος δὲ ἐλυμαίνετο τὴν ἐκκλησίαν κατὰ τοὺς οἴκους εἰσπορευόμενος, σύρων
    τε ἄνδρας καὶ γυναῖκας παρεδίδου εἰς φυλακήν.
translation:
  text: But Saul was ravaging the church, entering house after house; dragging off
    both men and women, he was handing them over to prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from house to house.' The Greek expression can be rendered either way;
      'house after house' emphasizes the distributive sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'was laying waste to the church.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλυμαίνετο
  chosen: was ravaging
  alternatives:
  - was destroying
  - was persecuting
  - was laying waste to
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing action, and λυμαίνομαι is stronger
    than a generic 'persecute,' conveying violent devastation or brutal mistreatment.
    'Was ravaging' preserves the force and the progressive aspect in natural English.
- source_word: ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  - the congregation
  lexicon: BDAG
  rationale: In Acts this term refers to the community of believers, not merely a
    civic assembly. 'The church' is the established and contextually accurate rendering.
- source_word: κατὰ τοὺς οἴκους
  chosen: house after house
  alternatives:
  - from house to house
  - throughout the houses
  lexicon: BDAG
  rationale: The distributive sense of κατά with the plural is best captured by 'house
    after house,' emphasizing repeated entry into multiple homes rather than a general
    location.
- source_word: εἰσπορευόμενος
  chosen: entering
  alternatives:
  - going into
  lexicon: BDAG
  rationale: The participle describes the manner of Saul's ravaging. 'Entering' is
    concise and fits the sequence with 'house after house.'
- source_word: σύρων
  chosen: dragging off
  alternatives:
  - dragging
  - hauling away
  lexicon: BDAG
  rationale: σύρω conveys forceful dragging. 'Dragging off' makes explicit the removal
    of persons from their homes, which the context implies.
- source_word: ἄνδρας καὶ γυναῖκας
  chosen: both men and women
  alternatives:
  - men and women
  lexicon: BDAG
  rationale: The phrase highlights the indiscriminate scope of Saul's actions. 'Both
    men and women' brings out that emphasis naturally in English.
- source_word: παρεδίδου
  chosen: he was handing them over
  alternatives:
  - he was delivering them
  - he was committing them
  lexicon: BDAG
  rationale: The imperfect again marks repeated or ongoing action. 'Handing them over'
    is idiomatic and preserves the sense of delivering people into official custody.
- source_word: εἰς φυλακήν
  chosen: to prison
  alternatives:
  - into prison
  - to imprisonment
  lexicon: BDAG
  rationale: φυλακή here denotes imprisonment/custody. 'To prison' is natural English
    following 'handing them over,' though 'into prison' is also possible.
