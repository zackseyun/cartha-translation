theological_decisions:
- issue: Rendering the severity of Saul's pre-conversion actions
  chosen_reading: Use strong language ('was ravaging the church') rather than a softened
    term like 'was persecuting the church.'
  alternative_readings:
  - was persecuting the church
  - was destroying the church
  rationale: The verse depicts violent, systematic harm against believers. A stronger
    rendering reflects the Greek verb's force without importing later theological
    interpretation about Saul/Paul beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 6
