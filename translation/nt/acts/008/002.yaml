id: ACT.8.2
reference: Acts 8:2
source:
  edition: SBLGNT
  text: συνεκόμισαν δὲ τὸν Στέφανον ἄνδρες εὐλαβεῖς καὶ ⸀ἐποίησαν κοπετὸν μέγαν ἐπ’
    αὐτῷ.
translation:
  text: But devout men buried Stephen and made great lamentation over him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepared Stephen for burial' or 'carried Stephen away for burial'; the
      Greek verb can emphasize the handling of the body as well as the burial itself.
    reason: lexical_alternative
  - marker: b
    text: '''Great lamentation'' may include audible and public expressions of grief,
      not merely inward sorrow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεκόμισαν
  chosen: buried
  alternatives:
  - prepared for burial
  - carried away for burial
  lexicon: BDAG
  rationale: In this context the verb refers to the handling of Stephen's body after
    his death. While the compound can more literally suggest gathering up or carrying
    away, idiomatic English in context is best expressed as 'buried,' which captures
    the action's end point without unnecessary awkwardness.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition or contrast with the preceding account of
    Stephen's death. 'But' preserves that narrative shift more clearly than a simple
    'and'.
- source_word: ἄνδρες εὐλαβεῖς
  chosen: devout men
  alternatives:
  - pious men
  - reverent men
  lexicon: BDAG
  rationale: ἄνδρες is specifically masculine plural, so 'men' is retained in keeping
    with the gender-accurate philosophy. εὐλαβεῖς conveys reverence or piety; 'devout'
    is natural modern English and fits the religious sense.
- source_word: ἐποίησαν
  chosen: made
  alternatives:
  - held
  - expressed
  lexicon: BDAG
  rationale: The verb is semantically light here and forms an idiom with κοπετόν.
    English likewise naturally says 'made great lamentation.'
- source_word: κοπετὸν μέγαν
  chosen: great lamentation
  alternatives:
  - great mourning
  - loud mourning
  lexicon: BDAG
  rationale: κοπετός denotes mourning or lament, often with outward expressions of
    grief. 'Great lamentation' preserves both the solemnity and the intensity marked
    by μέγαν.
- source_word: ἐπ’ αὐτῷ
  chosen: over him
  alternatives:
  - for him
  - over his death
  lexicon: BDAG
  rationale: With mourning language, ἐπί plus the dative naturally conveys lamentation
    over a person. 'Over him' is concise and idiomatic.
