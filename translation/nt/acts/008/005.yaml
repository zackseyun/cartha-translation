id: ACT.8.5
reference: Acts 8:5
source:
  edition: SBLGNT
  text: Φίλιππος δὲ κατελθὼν εἰς ⸀τὴν πόλιν τῆς Σαμαρείας ἐκήρυσσεν αὐτοῖς τὸν χριστόν.
translation:
  text: Now Philip went down to the city of Samaria and proclaimed the Messiah to
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a city of Samaria.' The Greek can be understood as referring either
      to a particular city in Samaria or more generally to one of the cities of the
      Samaritan region.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Rendered as a mild connective advancing the narrative. 'Now' gives natural
    English discourse flow without overstating contrast.
- source_word: κατελθὼν
  chosen: went down
  alternatives:
  - having gone down
  - came down
  lexicon: BDAG
  rationale: The aorist participle of κατέρχομαι is naturally represented in English
    as an attendant circumstance before the main verb. 'Went down' preserves the directional
    sense without woodenly retaining the participial form.
- source_word: τὴν πόλιν τῆς Σαμαρείας
  chosen: the city of Samaria
  alternatives:
  - a city of Samaria
  - Samaria city
  lexicon: BDAG
  rationale: The Greek text has the article with πόλιν and a genitive 'of Samaria.'
    'The city of Samaria' follows the wording of the source text most closely. Although
    some understand it as an unspecified city in the region, the article favors the
    more definite rendering here; the alternative is preserved in a footnote because
    English readers may otherwise take it as the named city rather than a city within
    Samaria.
- source_word: ἐκήρυσσεν
  chosen: proclaimed
  alternatives:
  - preached
  - announced
  lexicon: BDAG
  rationale: '''Proclaimed'' captures the public heralding sense of κηρύσσω in readable
    modern English, avoiding overly church-specific diction while preserving the formal
    announcement nuance.'
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - among them
  lexicon: BDAG
  rationale: The dative pronoun is most straightforwardly rendered 'to them,' indicating
    the audience of Philip's proclamation.
- source_word: τὸν χριστόν
  chosen: the Messiah
  alternatives:
  - Christ
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like designation. Here the article and proclamation
    context indicate the messianic title.
