id: ACT.8.11
reference: Acts 8:11
source:
  edition: SBLGNT
  text: προσεῖχον δὲ αὐτῷ διὰ τὸ ἱκανῷ χρόνῳ ταῖς μαγείαις ἐξεστακέναι αὐτούς.
translation:
  text: And they paid attention to him because for a considerable time he had amazed
    them with his magic arts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a long time.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with his sorceries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεῖχον
  chosen: paid attention to
  alternatives:
  - were paying attention to
  - gave heed to
  - devoted themselves to
  lexicon: BDAG
  rationale: προσέχω here means to direct attention to or heed someone. 'Paid attention
    to' is natural modern English and fits the imperfect sense in context without
    sounding archaic like 'gave heed.'
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: Dative object with προσέχω is naturally rendered 'to him' in English.
- source_word: διὰ τὸ ἱκανῷ χρόνῳ
  chosen: because for a considerable time
  alternatives:
  - because for a long time
  - because for quite some time
  lexicon: BDAG
  rationale: διά with the articular infinitive gives the reason. ἱκανός with χρόνος
    denotes a substantial or considerable period. 'For a considerable time' preserves
    the weight of duration while remaining idiomatic.
- source_word: ταῖς μαγείαις
  chosen: with his magic arts
  alternatives:
  - by his magic
  - with his sorceries
  lexicon: BDAG
  rationale: μαγεία refers to magical practices. 'Magic arts' is clear and avoids
    the potentially over-specific or archaic tone of 'sorceries,' while preserving
    the negative sense of occult practices. 'His' is supplied from context because
    the practices are Simon's.
- source_word: ἐξεστακέναι
  chosen: had amazed
  alternatives:
  - had astounded
  - had bewitched
  lexicon: BDAG
  rationale: Perfect infinitive of ἐξίστημι here means to cause astonishment or amazement.
    'Had amazed' reflects the completed prior effect leading to their continued attention.
    'Bewitched' would over-interpret toward magical causation rather than astonishment.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: Direct object of ἐξεστακέναι, referring to the people previously mentioned.
