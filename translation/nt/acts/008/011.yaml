theological_decisions:
- issue: Nature of Simon's practices in μαγείαις
  chosen_reading: Rendered as 'magic arts' without specifying whether the practices
    were fraudulent tricks, occult activity, or both.
  alternative_readings:
  - sorceries
  - magic
  rationale: The verse presents Simon's practices as μαγεία and their effect on the
    people, but does not itself define the metaphysical nature of those practices.
    The translation preserves the text's description without importing a stronger
    doctrinal judgment than the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
