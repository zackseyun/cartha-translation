theological_decisions:
- issue: Whether πνεῦμα ἅγιον should be rendered indefinitely ('a holy spirit') because
    of anarthrous Greek
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Holy Spirit
  - a holy spirit
  rationale: In Acts this phrase refers to the divine Spirit, and English normally
    marks this referent with the definite article. Rendering it as 'a holy spirit'
    would misrepresent the narrative and import a meaning not supported by context.
    'Holy Spirit' without the article is possible in English, but 'the Holy Spirit'
    is the most natural and precise here.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
