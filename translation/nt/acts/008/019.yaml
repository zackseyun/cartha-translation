id: ACT.8.19
reference: Acts 8:19
source:
  edition: SBLGNT
  text: λέγων· Δότε κἀμοὶ τὴν ἐξουσίαν ταύτην ἵνα ᾧ ἐὰν ἐπιθῶ τὰς χεῖρας λαμβάνῃ πνεῦμα
    ἅγιον.
translation:
  text: saying, “Give me also this authority, so that anyone on whom I lay my hands
    may receive the Holy Spirit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'power' for 'authority' (Greek exousia). The term can denote delegated
      authority, right, or power to act; 'authority' was chosen to preserve the lexical
      distinction from other Greek words more directly meaning 'power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - saying that
  lexicon: BDAG
  rationale: Present participle introducing Simon's speech is naturally rendered 'saying'
    in English narrative style, preserving the participial connection to the previous
    verse without unnecessary expansion.
- source_word: Δότε
  chosen: Give
  alternatives:
  - grant
  - give over
  lexicon: BDAG
  rationale: Aorist imperative plural from δίδωμι is straightforwardly 'Give.' 'Grant'
    is possible but slightly more formal and interpretive.
- source_word: κἀμοί
  chosen: me also
  alternatives:
  - also to me
  - to me too
  lexicon: BDAG
  rationale: 'The crasis combines καί + ἐμοί, emphasizing inclusion: Simon wants the
    same power for himself. ''Me also'' preserves the emphasis while reading naturally
    in English.'
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right
  lexicon: BDAG
  rationale: ἐξουσία commonly denotes authority, right, or delegated power. Here Simon
    asks for the capacity to confer the Spirit by laying on hands. 'Authority' best
    reflects the term itself, while the context already implies effective power. 'Power'
    is possible but would blur distinction from δύναμις, used elsewhere.
- source_word: ταύτην
  chosen: this
  alternatives:
  - this very
  lexicon: BDAG
  rationale: Demonstrative points to the specific authority Simon has just observed.
    Simple 'this' is sufficient.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and
    preserves the purposive sense.
- source_word: ᾧ ἐὰν
  chosen: anyone on whom
  alternatives:
  - whoever on whom
  - whomever
  lexicon: BDAG
  rationale: The relative pronoun with ἐάν expresses an indefinite/general condition.
    'Anyone on whom' communicates the sense clearly in modern English.
- source_word: ἐπιθῶ τὰς χεῖρας
  chosen: I lay my hands
  alternatives:
  - I place my hands
  - I lay hands
  lexicon: BDAG
  rationale: This is the idiomatic expression for laying on of hands. 'I lay my hands'
    preserves the concrete imagery and the possessive implied by English idiom.
- source_word: λαμβάνῃ
  chosen: may receive
  alternatives:
  - receives
  - might receive
  lexicon: BDAG
  rationale: Present subjunctive under ἵνα is well represented by 'may receive' in
    English, preserving the intended result without over-specifying aspect.
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  lexicon: BDAG
  rationale: Although the Greek lacks the article here, English idiom normally uses
    the definite form for the personal divine referent. This avoids an unnatural English
    expression and matches clear NT usage for the Spirit of God.
