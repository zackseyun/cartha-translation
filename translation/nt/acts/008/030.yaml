id: ACT.8.30
reference: Acts 8:30
source:
  edition: SBLGNT
  text: προσδραμὼν δὲ ὁ Φίλιππος ἤκουσεν αὐτοῦ ἀναγινώσκοντος ⸂Ἠσαΐαν τὸν προφήτην⸃
    καὶ εἶπεν· Ἆρά γε γινώσκεις ἃ ἀναγινώσκεις;
translation:
  text: So Philip ran up and heard him reading Isaiah the prophet, and said, “Do you
    really understand what you are reading?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do you indeed understand what you are reading?” The Greek particles
      add emphasis to Philip’s question.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδραμὼν
  chosen: ran up
  alternatives:
  - ran to him
  - approached quickly
  lexicon: BDAG
  rationale: Aorist participle of προστρέχω conveys swift movement toward the chariot.
    'Ran up' is natural modern English and preserves the vividness better than the
    flatter 'approached.'
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'So' gives a natural English connective
    showing continuation and consequence in context.
- source_word: ἤκουσεν αὐτοῦ ἀναγινώσκοντος
  chosen: heard him reading
  alternatives:
  - heard him while he was reading
  - heard him read aloud
  lexicon: BDAG
  rationale: The construction with ἀκούω + genitive participle means Philip heard
    the eunuch in the act of reading. 'Heard him reading' is concise and idiomatic.
    Reading in antiquity was commonly aloud, but 'aloud' is not explicit in the Greek
    and is therefore left implicit.
- source_word: Ἠσαΐαν τὸν προφήτην
  chosen: Isaiah the prophet
  alternatives:
  - the prophet Isaiah
  lexicon: BDAG
  rationale: Both English orders are acceptable. 'Isaiah the prophet' follows the
    Greek word order more closely while remaining natural.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - asked
  lexicon: BDAG
  rationale: λέγω is semantically broad, but 'said' is the direct lexical equivalent.
    The following direct question makes the speech act clear without needing to shift
    to 'asked' in the main text.
- source_word: Ἆρά γε
  chosen: Do you really
  alternatives:
  - Do you indeed
  - Do you actually
  - Do you
  lexicon: BDAG
  rationale: The particle combination introduces a pointed question with emphasis
    or expectation. 'Do you really' captures the probing force in natural English
    better than a bare 'Do you.'
- source_word: γινώσκεις
  chosen: understand
  alternatives:
  - know
  - comprehend
  lexicon: BDAG
  rationale: In this context γινώσκω concerns grasping the meaning of what is being
    read, not mere acquaintance. 'Understand' best fits the sense.
- source_word: ἃ ἀναγινώσκεις
  chosen: what you are reading
  alternatives:
  - the things you are reading
  - what you read
  lexicon: BDAG
  rationale: 'The relative pronoun ἃ refers to the content being read. Present tense
    is well represented by English progressive here: ''are reading.'''
