theological_decisions:
- issue: Identity of the implied subject
  chosen_reading: The subject is left as 'they,' referring contextually to the apostles/missionaries in the narrative without specifying names in the translation.
  alternative_readings:
  - Peter and John specifically
  rationale: The immediate context points to Peter and John, but the Greek text here uses an implicit plural subject. The translation preserves the text's wording rather than inserting names not present in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
revisions:
- timestamp: '2026-04-21T02:39:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/008/025.json
  category: awkward_english
  tier: 1
  from: and they were proclaiming the good news
  to: and proclaiming the good news
  rationale: 'The Greek presents two parallel actions using two imperfect verbs (''were returning'' and ''were proclaiming''). The current English rendering, by repeating ''they were'', creates a slightly stilted and disjointed feel. A more natural English construction that maintains the parallel structure is a compound predicate: ''they were returning... and proclaiming...''. This removes the redundant subject and auxiliary verb, improving the sentence''s flow while accurately reflecting the concurrent actions in the source text.'
