id: ACT.8.17
reference: Acts 8:17
source:
  edition: SBLGNT
  text: τότε ⸀ἐπετίθεσαν τὰς χεῖρας ἐπ’ αὐτούς, καὶ ἐλάμβανον πνεῦμα ἅγιον.
translation:
  text: Then they laid their hands on them, and they were receiving the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Then they were laying their hands on them, and they
      were receiving the Holy Spirit.' Both Greek verbs are imperfect.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal/sequential adverb marking what followed Philip's report and
    the apostles' prayer. 'Then' is natural English and preserves the narrative progression.
- source_word: ἐπετίθεσαν
  chosen: they laid
  alternatives:
  - they were laying
  - they placed
  lexicon: BDAG
  rationale: Imperfect of ἐπιτίθημι with χεῖρας forms the idiom 'lay hands on.' English
    simple past best conveys the action in narrative without awkwardness, while the
    following imperfect is preserved more explicitly.
- source_word: τὰς χεῖρας
  chosen: their hands
  alternatives:
  - the hands
  lexicon: BDAG
  rationale: 'Greek uses the article, but idiomatic English in this construction supplies
    the possessive: ''laid their hands on them.'' This is the standard equivalent
    for the gesture and does not add meaning beyond what the idiom implies.'
- source_word: ἐπ’ αὐτούς
  chosen: on them
  alternatives:
  - upon them
  lexicon: BDAG
  rationale: Straightforward prepositional phrase indicating the recipients of the
    laying on of hands. 'On them' is contemporary and sufficiently formal.
- source_word: ἐλάμβανον
  chosen: they were receiving
  alternatives:
  - they received
  - they began to receive
  lexicon: BDAG
  rationale: Imperfect of λαμβάνω is retained with progressive force to reflect the
    Greek aspect more clearly than a simple past. This avoids over-specifying inception
    ('began to receive') while preserving the narrative sense that reception accompanied
    the apostles' action.
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - a holy spirit
  lexicon: BDAG
  rationale: 'In Acts this expression refers to the divine Holy Spirit, not an indefinite
    ''holy spirit.'' English idiom normally includes the article here: ''the Holy
    Spirit.'' This aligns with historic Christian usage and the immediate context
    of apostolic prayer for Spirit reception.'
