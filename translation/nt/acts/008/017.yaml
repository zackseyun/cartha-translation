theological_decisions:
- issue: Whether πνεῦμα ἅγιον should be rendered indefinitely or personally/divinely
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Holy Spirit
  - a holy spirit
  rationale: Within Luke-Acts, πνεῦμα ἅγιον in this context denotes the promised divine
    Spirit given to believers. Rendering it as 'a holy spirit' would misrepresent
    the referent. 'The Holy Spirit' is the clearest natural English expression of
    the personal divine referent without importing extra doctrinal claims beyond the
    text.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: How to reflect the imperfect verbs in English narrative
  chosen_reading: 'Simple past for the hand-laying clause and progressive for the
    reception clause: ''they laid ... and they were receiving'''
  alternative_readings:
  - they were laying ... and were receiving
  - they laid ... and received
  rationale: Both Greek verbs are imperfect, but English style does not always require
    both to be rendered progressively. Preserving progressive aspect on ἐλάμβανον
    highlights the ongoing/resultative reception associated with the laying on of
    hands, while 'they laid their hands' remains idiomatic. This balances formal accuracy
    and readable modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
