theological_decisions:
- issue: Degree of certainty in the possibility of forgiveness
  chosen_reading: 'Peter speaks conditionally: Simon is told to repent and pray in
    hope that forgiveness may be granted, without guaranteeing the outcome.'
  alternative_readings:
  - Peter guarantees forgiveness upon repentance
  - Peter implies forgiveness is unlikely or impossible
  rationale: The phrase εἰ ἄρα with future passive is deliberately guarded. The translation
    preserves this tension rather than resolving it into either assurance or despair.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
