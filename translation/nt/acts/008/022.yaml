id: ACT.8.22
reference: Acts 8:22
source:
  edition: SBLGNT
  text: μετανόησον οὖν ἀπὸ τῆς κακίας σου ταύτης, καὶ δεήθητι τοῦ ⸀κυρίου εἰ ἄρα ἀφεθήσεταί
    σοι ἡ ἐπίνοια τῆς καρδίας σου·
translation:
  text: Therefore repent of this wickedness of yours, and pray to the Lord that, if
    possible, the intent of your heart may be forgiven you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if perhaps the thought of your heart will be forgiven you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετανόησον
  chosen: repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: Aorist imperative calling for decisive repentance. 'Repent' is the standard
    concise rendering and preserves the moral-spiritual force better than the weaker
    'change your mind.'
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from Peter's prior rebuke; 'therefore' clearly conveys
    the logical consequence.
- source_word: ἀπὸ τῆς κακίας σου ταύτης
  chosen: of this wickedness of yours
  alternatives:
  - from this evil of yours
  - from this malice of yours
  lexicon: BDAG
  rationale: κακία here denotes moral evil/wickedness rather than mere ill will. English
    idiom works better with 'repent of' than a more literal 'repent from.' 'Of yours'
    preserves the possessive emphasis.
- source_word: δεήθητι
  chosen: pray
  alternatives:
  - beg
  - implore
  lexicon: BDAG
  rationale: Imperative of δέομαι means to make earnest request. 'Pray' fits the religious
    context and is natural with the following genitive object 'to the Lord.'
- source_word: τοῦ κυρίου
  chosen: to the Lord
  alternatives:
  - to the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' In this narrative
    context it most naturally refers to the Lord Jesus or the Lord in Christian prayer
    without needing to resolve further in translation.
- source_word: εἰ ἄρα
  chosen: that, if possible,
  alternatives:
  - if perhaps
  - if then somehow
  lexicon: BDAG
  rationale: The combination expresses contingency or possibility, not certainty.
    'If possible' gives idiomatic modern English while preserving Peter's guarded
    wording.
- source_word: ἀφεθήσεταί σοι
  chosen: may be forgiven you
  alternatives:
  - will be forgiven you
  - may be forgiven for you
  lexicon: BDAG
  rationale: Future passive of ἀφίημι in a dependent clause after εἰ ἄρα conveys hoped-for
    forgiveness. 'May be forgiven you' is idiomatic and preserves the passive divine-forgiveness
    sense without overstating certainty.
- source_word: ἡ ἐπίνοια
  chosen: the intent
  alternatives:
  - the thought
  - the scheme
  - the purpose
  lexicon: BDAG
  rationale: ἐπίνοια can denote thought, intention, or design. Here it refers to the
    inward intention behind Simon's request; 'intent' captures that moral-volitional
    nuance better than the flatter 'thought.'
- source_word: τῆς καρδίας σου
  chosen: of your heart
  alternatives:
  - in your heart
  lexicon: BDAG
  rationale: A genitive specifying the source/location of the intent. 'Of your heart'
    is more formally aligned with the Greek and preserves biblical anthropology.
