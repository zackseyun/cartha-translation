theological_decisions:
- issue: Interpretation of 'his generation'
  chosen_reading: Retain the formally ambiguous 'his generation' in the main text.
  alternative_readings:
  - his descendants
  - his contemporaries
  rationale: The phrase from Isaiah 53 is notoriously difficult and may refer either
    to offspring/posterity, to contemporaries, or more broadly to his era/story. To
    preserve theological and interpretive tension rather than resolve it, the main
    text keeps 'generation' and the alternatives are footnoted.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it).
- issue: Sense of κρίσις
  chosen_reading: Render as 'justice' rather than 'judgment.'
  alternative_readings:
  - judgment
  rationale: In context the point is not merely that a judgment occurred, but that
    just treatment was denied. 'Justice was taken away from him' communicates the
    legal and moral deprivation without importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §6.
