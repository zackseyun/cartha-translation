id: ACT.8.33
reference: Acts 8:33
source:
  edition: SBLGNT
  text: ἐν τῇ ⸀ταπεινώσει ἡ κρίσις αὐτοῦ ἤρθη· ⸀τὴν γενεὰν αὐτοῦ τίς διηγήσεται; ὅτι
    αἴρεται ἀπὸ τῆς γῆς ἡ ζωὴ αὐτοῦ.
translation:
  text: In his humiliation justice was taken away from him. Who will recount his generation?
    For his life is taken from the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his descendants' or 'his contemporaries'; the Greek 'generation' preserves
      the ambiguity of the Isaiah 53 quotation.
    reason: alternative_reading
  - marker: b
    text: Or 'judgment was taken away from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταπεινώσει
  chosen: humiliation
  alternatives:
  - humbling
  - lowliness
  lexicon: BDAG
  rationale: The noun denotes a state of abasement or humiliation. 'Humiliation' best
    fits the context of unjust suffering and aligns with the Isaiah 53 source without
    becoming overly interpretive.
- source_word: κρίσις
  chosen: justice
  alternatives:
  - judgment
  - legal justice
  lexicon: BDAG
  rationale: While κρίσις can mean 'judgment,' in this passive-suffering context the
    sense is that due justice or a fair judicial process was denied. 'Justice' communicates
    the deprivation more naturally in English while preserving the legal dimension.
- source_word: ἤρθη
  chosen: was taken away
  alternatives:
  - was removed
  lexicon: BDAG
  rationale: The passive of αἴρω here indicates removal or deprivation. 'Was taken
    away' is idiomatic and preserves the force of loss.
- source_word: γενεὰν
  chosen: generation
  alternatives:
  - descendants
  - posterity
  - contemporaries
  lexicon: BDAG
  rationale: γενεά is semantically broad. 'Generation' preserves the ambiguity of
    the Greek and the Isaiah allusion, rather than resolving it to either offspring
    or contemporaries. Because the phrase is interpretively difficult, alternatives
    are preserved in a footnote.
- source_word: διηγήσεται
  chosen: will recount
  alternatives:
  - will describe
  - will declare
  - will tell of
  lexicon: BDAG
  rationale: The verb means to relate in detail or recount. 'Will recount' is concise,
    natural, and fits the rhetorical question.
- source_word: αἴρεται
  chosen: is taken
  alternatives:
  - is taken away
  - is removed
  lexicon: BDAG
  rationale: The present passive gives a vivid sense of ongoing action. 'Is taken'
    keeps the wording compact while matching the following phrase 'from the earth.'
- source_word: γῆς
  chosen: earth
  alternatives:
  - land
  lexicon: BDAG
  rationale: Both are possible, but 'earth' is the more natural rendering in the idiom
    'taken from the earth,' meaning removed from earthly life.
- source_word: ζωὴ
  chosen: life
  lexicon: BDAG
  rationale: The straightforward sense is physical life here, in keeping with the
    servant's death in the Isaiah context.
