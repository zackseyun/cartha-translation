id: ACT.8.26
reference: Acts 8:26
source:
  edition: SBLGNT
  text: Ἄγγελος δὲ κυρίου ἐλάλησεν πρὸς Φίλιππον λέγων· Ἀνάστηθι καὶ πορεύου κατὰ
    μεσημβρίαν ἐπὶ τὴν ὁδὸν τὴν καταβαίνουσαν ἀπὸ Ἰερουσαλὴμ εἰς Γάζαν· αὕτη ἐστὶν
    ἔρημος.
translation:
  text: Now an angel of the Lord spoke to Philip, saying, “Get up and go south to
    the road that goes down from Jerusalem to Gaza.” This is a deserted road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at noon.” The Greek phrase can indicate either direction (“south”) or
      time (“at midday/noon”).
    reason: alternative_reading
  - marker: b
    text: Or “This is desert,” possibly meaning the route passes through a desert
      region rather than emphasizing that the road itself is deserted.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄγγελος
  chosen: an angel
  alternatives:
  - the angel
  - messenger
  lexicon: BDAG
  rationale: Anarthrous singular noun is naturally rendered indefinitely here. 'Angel'
    fits the narrative context of divine guidance better than the more general 'messenger'.
- source_word: κυρίου
  chosen: of the Lord
  alternatives:
  - of the master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' In this Lukan narrative
    context it denotes divine authority, not merely a human master.
- source_word: ἐλάλησεν πρὸς Φίλιππον
  chosen: spoke to Philip
  alternatives:
  - said to Philip
  lexicon: BDAG
  rationale: '''Spoke to'' reflects λαλέω with πρὸς naturally and preserves the verbal
    distinction without sounding wooden.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial linkage in readable English.
- source_word: Ἀνάστηθι
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: Idiomatic modern English for the aorist imperative, preserving the sense
    of immediate action.
- source_word: πορεύου
  chosen: go
  alternatives:
  - travel
  - be on your way
  lexicon: BDAG
  rationale: Simple imperative fits the context and avoids overtranslation.
- source_word: κατὰ μεσημβρίαν
  chosen: south
  alternatives:
  - at noon
  - toward the south
  lexicon: BDAG
  rationale: The phrase can denote either time ('at noon') or direction ('south').
    In connection with movement toward a road, the directional sense is most likely.
    The temporal alternative is preserved in a footnote because the ambiguity is genuine.
- source_word: ἐπὶ τὴν ὁδὸν
  chosen: to the road
  alternatives:
  - onto the road
  - to the way
  lexicon: BDAG
  rationale: Natural English for motion toward a specific route.
- source_word: τὴν καταβαίνουσαν ἀπὸ Ἰερουσαλὴμ εἰς Γάζαν
  chosen: that goes down from Jerusalem to Gaza
  alternatives:
  - that descends from Jerusalem to Gaza
  lexicon: BDAG
  rationale: '''Goes down'' preserves the common geographical idiom of descent from
    Jerusalem while remaining natural in English.'
- source_word: αὕτη ἐστὶν ἔρημος
  chosen: This is a deserted road
  alternatives:
  - This is desert
  - This road is deserted
  - This is through a desert region
  lexicon: BDAG
  rationale: The feminine predicate likely refers back to ὁδός ('road'), so English
    makes the implied noun explicit for clarity. 'Deserted' can mean uninhabited/solitary
    and fits the travel setting better than the bare noun 'desert,' though the latter
    remains a viable alternative and is preserved in a footnote.
