theological_decisions:
- issue: Referent of 'Lord' in 'angel of the Lord'
  chosen_reading: The phrase is rendered straightforwardly as divine agency without
    specifying more than the text states.
  alternative_readings:
  - An angel sent by God
  - the angel of the Lord as a more specific revelatory figure
  rationale: The text identifies the messenger as belonging to or sent by 'the Lord'
    but does not require a more developed theological identification. The translation
    preserves that restraint.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
