theological_decisions:
- issue: Mode or theology of baptism
  chosen_reading: Render the eunuch's request neutrally as 'being baptized' without
    implying a particular mode or denominational understanding.
  alternative_readings:
  - No alternative main-text rendering needed; the Greek simply refers to baptism.
  rationale: The verse mentions baptism but does not specify immersion, pouring, covenantal
    significance, or prerequisites beyond the narrative context. Per doctrine, the
    translation should not import denominational distinctives the text does not state.
  doctrine_reference: 'Affirmations; Translation philosophy: do not advocate denominational
    distinctives unless the Greek unambiguously supports one reading over another.'
