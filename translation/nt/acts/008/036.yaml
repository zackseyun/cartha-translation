id: ACT.8.36
reference: Acts 8:36
source:
  edition: SBLGNT
  text: ὡς δὲ ἐπορεύοντο κατὰ τὴν ὁδόν, ἦλθον ἐπί τι ὕδωρ, καί φησιν ὁ εὐνοῦχος· Ἰδοὺ
    ὕδωρ, τί κωλύει με ⸀βαπτισθῆναι;
translation:
  text: And as they were going along the road, they came to some water, and the eunuch
    says, “Look, water! What prevents me from being baptized?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they came upon some water.” The Greek does not specify the size or kind
      of water.
    reason: lexical_alternative
  - marker: b
    text: Or “What hinders me to be baptized?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύοντο
  chosen: were going along
  alternatives:
  - were traveling
  - went on their way
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing movement; 'were going along' preserves
    the progressive sense in natural English.
- source_word: κατὰ τὴν ὁδόν
  chosen: along the road
  alternatives:
  - on the road
  - along the way
  lexicon: BDAG
  rationale: A straightforward locative/path expression. 'Along the road' fits the
    motion context and avoids over-idiomatizing.
- source_word: ἦλθον ἐπί τι ὕδωρ
  chosen: they came to some water
  alternatives:
  - they came upon some water
  - they came to a body of water
  lexicon: BDAG
  rationale: ἐπί with accusative here conveys arrival at a place/object encountered.
    τι is indefinite, so 'some water' best reflects the Greek without specifying size
    or type.
- source_word: φησιν
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: The present tense is vivid/present-historical. Rendering it as 'says'
    preserves Luke's narrative vividness better than flattening to a simple past.
- source_word: εὐνοῦχος
  chosen: the eunuch
  lexicon: BDAG
  rationale: Standard and precise rendering of the noun; no contextual reason to soften
    or paraphrase it.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: A deictic interjection drawing attention. 'Look' is natural modern English
    and preserves the immediacy without archaic tone.
- source_word: τί κωλύει με
  chosen: What prevents me
  alternatives:
  - What hinders me
  - What stands in the way of me
  lexicon: BDAG
  rationale: κωλύω means to hinder, prevent, or forbid. 'Prevents' is clear modern
    English and fits the infinitival complement.
- source_word: βαπτισθῆναι
  chosen: from being baptized
  alternatives:
  - to be baptized
  lexicon: BDAG
  rationale: Aorist passive infinitive. English idiom after 'prevent' normally takes
    'from being baptized'; this preserves the passive sense and reads naturally.
