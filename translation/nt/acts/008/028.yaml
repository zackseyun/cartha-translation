id: ACT.8.28
reference: Acts 8:28
source:
  edition: SBLGNT
  text: ἦν ⸀τε ὑποστρέφων καὶ καθήμενος ἐπὶ τοῦ ἅρματος αὐτοῦ καὶ ἀνεγίνωσκεν τὸν
    προφήτην Ἠσαΐαν.
translation:
  text: And he was returning, seated in his chariot, and was reading Isaiah the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the prophet Isaiah.' The Greek order is 'Isaiah the prophet.'
    reason: lexical_alternative
  - marker: b
    text: Ancient reading was often done aloud; 'was reading aloud' is possible, though
      the Greek verb itself does not explicitly state this here.
    reason: cultural_note
lexical_decisions:
- source_word: ἦν τε ὑποστρέφων
  chosen: he was returning
  alternatives:
  - he was on his way back
  - he was returning home
  lexicon: BDAG
  rationale: The periphrastic construction with ἦν + present participle presents ongoing
    action in past time. 'He was returning' preserves the progressive sense without
    adding 'home,' which is implied by context but not explicit in the Greek. τέ is
    lightly connective and is naturally absorbed into English 'And.'
- source_word: καθήμενος
  chosen: seated
  alternatives:
  - sitting
  lexicon: BDAG
  rationale: The participle describes his posture during the journey. 'Seated' is
    slightly more natural in English with 'in his chariot' and fits the narrative
    style, while preserving the stative sense.
- source_word: ἐπὶ τοῦ ἅρματος αὐτοῦ
  chosen: in his chariot
  alternatives:
  - on his chariot
  - upon his chariot
  lexicon: BDAG
  rationale: Although ἐπί with the genitive can be rendered more literally as 'on/upon,'
    idiomatic English for riding in a vehicle is 'in his chariot.' This is an optimal-equivalence
    choice for natural English while retaining the concrete image.
- source_word: ἀνεγίνωσκεν
  chosen: was reading
  alternatives:
  - read aloud
  - was reading aloud
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Was reading' preserves that
    aspect. Since ancient reading was often oral, 'read aloud' is possible, but the
    verb itself does not explicitly require 'aloud,' so it is not added to the main
    text.
- source_word: τὸν προφήτην Ἠσαΐαν
  chosen: Isaiah the prophet
  alternatives:
  - the prophet Isaiah
  lexicon: BDAG
  rationale: Both English orders are acceptable. 'Isaiah the prophet' follows the
    Greek word order more closely while remaining natural. It identifies the book/person
    being read without interpretive expansion.
