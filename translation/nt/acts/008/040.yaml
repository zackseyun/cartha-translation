theological_decisions:
- issue: Whether εὑρέθη should be rendered in a way that explicitly interprets Philip's
    relocation as miraculous appearance/translation
  chosen_reading: Retain the neutral passive 'was found' in the main text
  alternative_readings:
  - appeared at Azotus
  - was found himself at Azotus
  rationale: The context strongly implies divine action, but the Greek wording itself
    says 'was found.' Following optimal equivalence and the instruction not to import
    doctrinal claims beyond the text, the translation preserves the narrative's wording
    and lets the surrounding context convey the miraculous element.
  doctrine_reference: Translation philosophy §§1, 3
