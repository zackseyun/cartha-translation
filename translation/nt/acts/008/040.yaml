id: ACT.8.40
reference: Acts 8:40
source:
  edition: SBLGNT
  text: Φίλιππος δὲ εὑρέθη εἰς Ἄζωτον, καὶ διερχόμενος εὐηγγελίζετο τὰς πόλεις πάσας
    ἕως τοῦ ἐλθεῖν αὐτὸν εἰς Καισάρειαν.
translation:
  text: But Philip was found at Azotus, and as he passed through, he was proclaiming
    the good news to all the cities until he came to Caesarea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appeared at Azotus.' The Greek more literally says 'was found at Azotus,'
      which may imply sudden divine relocation in context without stating it explicitly.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild narrative transition/contrast from the Spirit's removal
    of Philip in the previous verse. 'But' preserves the connective force naturally
    in English.
- source_word: εὑρέθη
  chosen: was found
  alternatives:
  - appeared
  - was discovered
  lexicon: BDAG
  rationale: Aorist passive of εὑρίσκω is rendered straightforwardly as 'was found.'
    This preserves the source wording and leaves implicit the extraordinary relocation
    context without over-interpreting it as 'appeared.'
- source_word: εἰς Ἄζωτον
  chosen: at Azotus
  alternatives:
  - in Azotus
  - to Azotus
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into/to,' with verbs of being or finding
    it can indicate location/resultant presence. 'At Azotus' is idiomatic English
    for where Philip was found.
- source_word: διερχόμενος
  chosen: as he passed through
  alternatives:
  - going through
  - traveling through
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and describes Philip's
    movement through the region. 'As he passed through' captures the participial sense
    in smooth English.
- source_word: εὐηγγελίζετο
  chosen: he was proclaiming the good news
  alternatives:
  - he preached the gospel
  - he evangelized
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing/repeated action. 'Was proclaiming
    the good news' preserves the verbal aspect and communicates εὐαγγελίζω in accessible
    modern English without ecclesiastical jargon.
- source_word: τὰς πόλεις πάσας
  chosen: to all the cities
  alternatives:
  - all the towns
  - every city
  lexicon: BDAG
  rationale: The phrase means the cities collectively along his route. 'To all the
    cities' fits the evangelistic context with εὐηγγελίζετο and preserves the distributive
    sense of πάσας.
- source_word: ἕως τοῦ ἐλθεῖν αὐτὸν
  chosen: until he came
  alternatives:
  - until his coming
  - until he arrived
  lexicon: BDAG
  rationale: The articular infinitive with ἕως expresses the endpoint of the ongoing
    action. 'Until he came' is a natural and sufficiently formal rendering.
- source_word: εἰς Καισάρειαν
  chosen: to Caesarea
  alternatives:
  - at Caesarea
  - into Caesarea
  lexicon: BDAG
  rationale: With ἔρχομαι, εἰς naturally marks destination. 'To Caesarea' is the most
    idiomatic rendering.
