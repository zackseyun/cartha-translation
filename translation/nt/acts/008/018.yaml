id: ACT.8.18
reference: Acts 8:18
source:
  edition: SBLGNT
  text: ⸀ἰδὼν δὲ ὁ Σίμων ὅτι διὰ τῆς ἐπιθέσεως τῶν χειρῶν τῶν ἀποστόλων δίδοται τὸ
    ⸀πνεῦμα προσήνεγκεν αὐτοῖς χρήματα
translation:
  text: But when Simon saw that the Spirit was given through the laying on of the
    apostles’ hands, he offered them money,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Holy Spirit." The Greek text says simply "the Spirit," but the referent
      in context is the Holy Spirit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  chosen: when ... saw
  alternatives:
  - having seen
  - seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning temporally in context. English
    'when ... saw' is natural and preserves the sequence leading to Simon's action.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast with the preceding narrative. 'But'
    best captures the shift to Simon's reaction.
- source_word: διὰ τῆς ἐπιθέσεως τῶν χειρῶν
  chosen: through the laying on of ... hands
  alternatives:
  - by the laying on of ... hands
  - through the imposition of ... hands
  lexicon: BDAG
  rationale: διά with the genitive expresses means/instrumentality. 'Laying on of
    hands' is standard, clear English and accurately reflects ἐπίθεσις + χειρῶν.
- source_word: τῶν ἀποστόλων
  chosen: the apostles’
  alternatives:
  - of the apostles
  lexicon: BDAG
  rationale: Possessive form in English is more natural while preserving the genitival
    relationship.
- source_word: δίδοται
  chosen: was given
  alternatives:
  - is given
  - was being given
  lexicon: BDAG
  rationale: Present passive in narrative can be rendered with an English past to
    fit the storyline smoothly. 'Was given' communicates the passive best in idiomatic
    English without implying a different subject.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: The Greek here reads simply τὸ πνεῦμα, but in this immediate context
    Acts refers to the Holy Spirit (cf. preceding verses). 'The Spirit' preserves
    the actual wording while remaining clear.
- source_word: προσήνεγκεν
  chosen: offered
  alternatives:
  - brought
  - presented
  lexicon: BDAG
  rationale: προσφέρω here means to offer or present. 'Offered' fits the context of
    proposing payment.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: Indirect object is naturally expressed in English after 'offered' without
    repeating the preposition.
- source_word: χρήματα
  chosen: money
  alternatives:
  - silver
  - funds
  lexicon: BDAG
  rationale: χρήματα commonly means money or sums of money. 'Money' is the most direct
    and contextually appropriate rendering.
