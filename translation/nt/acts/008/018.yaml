theological_decisions:
- issue: Referent of τὸ πνεῦμα
  chosen_reading: the Spirit, referring to the Holy Spirit
  alternative_readings:
  - the Holy Spirit
  rationale: The noun is anarthrous? No, articular here, and in the immediate narrative
    context the referent is clearly the Holy Spirit. The main text keeps the shorter
    'the Spirit' because that is what the Greek says, without losing the theological
    referent.
  doctrine_reference: Translation philosophy §1, §6
- issue: Agency in the giving of the Spirit
  chosen_reading: the Spirit was given through the laying on of the apostles’ hands
  alternative_readings:
  - the Holy Spirit was bestowed by the laying on of the apostles' hands
  rationale: The wording preserves the text's statement of means ('through the laying
    on of hands') without making the apostles the ultimate source of the Spirit. This
    avoids importing a sacramental or anti-sacramental conclusion beyond the verse
    itself.
  doctrine_reference: Affirmations; Translation philosophy §3
