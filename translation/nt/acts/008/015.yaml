id: ACT.8.15
reference: Acts 8:15
source:
  edition: SBLGNT
  text: οἵτινες καταβάντες προσηύξαντο περὶ αὐτῶν ὅπως λάβωσιν πνεῦμα ἅγιον·
translation:
  text: who came down and prayed for them so that they might receive the Holy Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having come down' or 'when they came down.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who, after they came down, prayed'.
    reason: previous_rendering
lexical_decisions:
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - the ones who
  lexicon: BDAG
  rationale: Introduces the relative clause referring back to Peter and John in the previous verse. Simple 'who' is natural English and sufficiently captures the referential force without overtranslating.
- source_word: καταβάντες
  chosen: after they came down
  alternatives:
  - having come down
  - when they came down
  lexicon: BDAG
  rationale: Aorist participle of καταβαίνω, here indicating prior action relative to the main verb. 'After they came down' expresses the temporal sequence clearly in modern English.
- source_word: προσηύξαντο
  chosen: prayed
  alternatives:
  - offered prayer
  - began to pray
  lexicon: BDAG
  rationale: Aorist middle of προσεύχομαι, straightforwardly rendered 'prayed.' No special nuance in the middle needs to be brought out in English here.
- source_word: περὶ αὐτῶν
  chosen: for them
  alternatives:
  - concerning them
  - about them
  lexicon: BDAG
  rationale: With προσεύχομαι, περί + genitive commonly indicates prayer on behalf of someone. 'For them' best conveys intercessory sense in idiomatic English.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Marks purpose or intended result of the prayer. 'So that' is clear, natural, and preserves the purposive force.
- source_word: λάβωσιν
  chosen: they might receive
  alternatives:
  - they may receive
  - they would receive
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅπως. 'Might receive' fits the purpose construction in English without implying uncertainty beyond the Greek syntax.
- source_word: πνεῦμα ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - Holy Spirit
  - holy spirit
  lexicon: BDAG
  rationale: In Acts this expression refers to the divine Holy Spirit, not a generic spirit. The article is not explicit in Greek here, but English idiom normally uses 'the Holy Spirit' for the personal divine referent.
