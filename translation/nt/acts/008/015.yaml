theological_decisions:
- issue: Whether πνεῦμα ἅγιον should be rendered as a generic 'holy spirit' or as the personal divine Holy Spirit
  chosen_reading: the Holy Spirit
  alternative_readings:
  - Holy Spirit
  - a holy spirit
  rationale: Within Acts, the phrase in this narrative context refers to the promised Spirit given to believers. Rendering it as 'the Holy Spirit' reflects the referent recognized in context while avoiding any doctrinal expansion beyond the text.
