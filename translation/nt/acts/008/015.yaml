  source_review: state/reviews/gemini/nt/acts/008/015.json
  category: awkward_english
  tier: 1
  from: who, after they came down, prayed
  to: who came down and prayed
  rationale: The current rendering of the aorist participle (καταβάντες) as a subordinate temporal clause is grammatically correct but slightly interrupts the flow of the main clause. A common and often more idiomatic English rendering for an aorist participle followed by a main verb is a compound predicate ('came down and prayed'). This maintains the sequential nature of the actions while creating a smoother sentence.
