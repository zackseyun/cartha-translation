id: ACT.8.24
reference: Acts 8:24
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Σίμων εἶπεν· Δεήθητε ὑμεῖς ὑπὲρ ἐμοῦ πρὸς τὸν κύριον ὅπως
    μηδὲν ἐπέλθῃ ἐπ’ ἐμὲ ὧν εἰρήκατε.
translation:
  text: But Simon answered, “You pray to the Lord for me, so that nothing of what
    you have said may come upon me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nothing from the things you have said may come upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι used idiomatically with εἶπεν to introduce
    speech. 'Answered' is standard, natural English and preserves the responsive force
    without awkwardly doubling the verbal idea.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from Peter's rebuke to Simon's
    response. 'But' best captures the turn in discourse here.
- source_word: Δεήθητε
  chosen: pray
  alternatives:
  - beg
  - implore
  - make petition
  lexicon: BDAG
  rationale: Aorist middle imperative from δέομαι/δέω in the sense 'pray, make request.'
    In context Simon is asking Peter and John to intercede with God, so 'pray' is
    the clearest idiomatic rendering.
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: 'The explicit pronoun adds emphasis: Simon asks them, not himself, to
    pray. English can convey this with expressed ''You'' at the front of the clause
    without over-translating.'
- source_word: ὑπὲρ ἐμοῦ
  chosen: for me
  alternatives:
  - on my behalf
  lexicon: BDAG
  rationale: ὑπέρ with genitive here indicates representation/intercession. 'For me'
    is natural and sufficient.
- source_word: πρὸς τὸν κύριον
  chosen: to the Lord
  alternatives:
  - to Lord
  - to the Master
  lexicon: BDAG
  rationale: πρός with accusative after a verb of prayer indicates direction toward
    the one addressed. κύριος follows the doctrinal default 'Lord.' 'To the Lord'
    is more idiomatic with 'pray' than a more literal 'toward the Lord.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per DOCTRINE.md contested terms table, κύριος defaults to 'Lord.' In
    Acts this naturally refers to the Lord in Christian usage without needing further
    specification in translation.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces the purpose/content of the requested prayer. 'So that' is
    clear modern English and preserves the intended result nuance.
- source_word: μηδὲν
  chosen: nothing
  alternatives:
  - not one thing
  - none
  lexicon: BDAG
  rationale: Neuter singular used substantivally. 'Nothing' is the most natural equivalent.
- source_word: ἐπέλθῃ ἐπ’ ἐμὲ
  chosen: may come upon me
  alternatives:
  - may happen to me
  - may come on me
  lexicon: BDAG
  rationale: Aorist subjunctive of ἐπέρχομαι with ἐπί conveys something coming upon
    someone, often adversity or judgment. 'May come upon me' preserves the solemnity
    and possible judgment nuance better than the flatter 'happen to me.'
- source_word: ὧν εἰρήκατε
  chosen: of what you have said
  alternatives:
  - from the things you have spoken
  - of the things you said
  lexicon: BDAG
  rationale: Genitive relative construction dependent on μηδέν, meaning 'nothing of
    the things which you have said.' Perfect εἰρήκατε can be represented idiomatically
    as 'have said,' preserving the present relevance of their spoken warning.
