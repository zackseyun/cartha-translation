theological_decisions:
- issue: Referent of 'the Lord' (τὸν κύριον)
  chosen_reading: Rendered simply as 'the Lord' without specifying further.
  alternative_readings:
  - God
  - the Lord Jesus
  rationale: The Greek text itself says only 'the Lord.' In Acts, κύριος can refer
    to God or to the risen Jesus depending on context, and this verse does not require
    the translator to resolve the referent more narrowly than the source does. Preserving
    'the Lord' maintains the text's own level of specificity and avoids importing
    a doctrinally unnecessary precision.
  doctrine_reference: Preserve theological tension rather than resolve it; contested
    terms table for κύριος → 'Lord'.
