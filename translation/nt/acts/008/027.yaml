id: ACT.8.27
reference: Acts 8:27
source:
  edition: SBLGNT
  text: καὶ ἀναστὰς ἐπορεύθη, καὶ ἰδοὺ ἀνὴρ Αἰθίοψ εὐνοῦχος δυνάστης ⸀Κανδάκης βασιλίσσης
    Αἰθιόπων, ὃς ἦν ἐπὶ πάσης τῆς γάζης αὐτῆς, ὃς ἐληλύθει προσκυνήσων εἰς Ἰερουσαλήμ,
translation:
  text: So he got up and went. And behold, an Ethiopian man, a eunuch, a high official
    of Candace, queen of the Ethiopians, who was over all her treasury, had come to
    Jerusalem to worship,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'court official' for 'eunuch'; the Greek term can in some contexts refer
      to a royal official, though here the literal sense is likely intended.
    reason: lexical_alternative
  - marker: b
    text: '''Candace'' may function as a dynastic title for the queen rather than
      a personal name.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀναστὰς
  chosen: got up
  alternatives:
  - arose
  - stood up
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; 'got up' is natural modern
    English and preserves the action sequence without archaic tone.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - set out
  lexicon: BDAG
  rationale: Common narrative motion verb; 'went' is the most straightforward rendering
    in context.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: BDAG
  rationale: Retains the narrative attention-marker explicitly. Though somewhat elevated,
    it remains understandable and preserves Luke's vivid style better than omitting
    it.
- source_word: ἀνὴρ Αἰθίοψ
  chosen: an Ethiopian man
  alternatives:
  - an Ethiopian
  - a man of Ethiopia
  lexicon: BDAG
  rationale: ἀνήρ explicitly means 'man,' and the translation philosophy prefers gender-accurate
    renderings. Including 'man' preserves the Greek wording rather than flattening
    it to the ethnic designation alone.
- source_word: εὐνοῦχος
  chosen: a eunuch
  alternatives:
  - a court official
  lexicon: BDAG
  rationale: The primary sense is 'eunuch'; while the term can sometimes function
    more broadly for a court official, Acts likely intends the literal/social designation,
    especially given the narrative significance of the figure's status. The more interpretive
    alternative is preserved in a footnote.
- source_word: δυνάστης
  chosen: a high official
  alternatives:
  - a ruler
  - a court official
  - a potentate
  lexicon: BDAG
  rationale: The term denotes a person of authority or power. 'High official' communicates
    rank clearly in modern English without overstating sovereignty implied by 'ruler'.
- source_word: Κανδάκης βασιλίσσης Αἰθιόπων
  chosen: of Candace, queen of the Ethiopians
  alternatives:
  - of Candace, queen of Ethiopia
  lexicon: BDAG
  rationale: Candace is transliterated as a personal/dynastic name per philosophy.
    The genitive phrase is rendered naturally in English. 'Queen of the Ethiopians'
    follows the Greek plural ethnonym more closely than the singular territorial form.
- source_word: ἐπὶ πάσης τῆς γάζης αὐτῆς
  chosen: over all her treasury
  alternatives:
  - in charge of all her treasure
  - over all her wealth
  lexicon: BDAG
  rationale: γάζα refers to treasury/treasure. 'Over all her treasury' captures both
    the administrative sense of ἐπὶ and the institutional nuance better than the more
    concrete 'wealth'.
- source_word: ἐληλύθει
  chosen: had come
  alternatives:
  - came
  lexicon: BDAG
  rationale: Pluperfect indicates prior action relative to the narrative scene; 'had
    come' preserves that aspect.
- source_word: προσκυνήσων
  chosen: to worship
  alternatives:
  - to bow down in worship
  lexicon: BDAG
  rationale: Future participle expressing purpose. 'To worship' is the natural idiomatic
    rendering in this pilgrimage context.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard directional rendering in English for movement toward the city.
