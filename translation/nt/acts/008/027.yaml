theological_decisions:
- issue: Whether εὐνοῦχος should be rendered literally or generalized as 'court official'
  chosen_reading: Rendered literally as 'eunuch' in the main text
  alternative_readings:
  - court official
  rationale: The lexical default sense is literal, and the narrative likely highlights
    the man's social and bodily status, which matters in the wider biblical context
    of access to worship and inclusion. A broader administrative nuance is acknowledged
    in a footnote but not adopted in the main text because δυνάστης already supplies
    the official-status idea.
  doctrine_reference: Translation philosophy §§1, 4, 5
