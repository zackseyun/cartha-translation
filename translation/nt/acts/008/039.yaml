id: ACT.8.39
reference: Acts 8:39
source:
  edition: SBLGNT
  text: ὅτε δὲ ἀνέβησαν ἐκ τοῦ ὕδατος, πνεῦμα κυρίου ἥρπασεν τὸν Φίλιππον, καὶ οὐκ
    εἶδεν αὐτὸν οὐκέτι ὁ εὐνοῦχος, ἐπορεύετο γὰρ τὴν ὁδὸν αὐτοῦ χαίρων.
translation:
  text: And when they came up out of the water, the Spirit of the Lord carried Philip
    away, and the eunuch saw him no longer, for he went on his way rejoicing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'snatched Philip away.' The Greek verb can emphasize sudden, forceful
      removal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν ἐκ τοῦ ὕδατος
  chosen: came up out of the water
  alternatives:
  - came up from the water
  lexicon: BDAG
  rationale: ἀναβαίνω with ἐκ naturally conveys upward movement out from the water.
    'Came up out of the water' is idiomatic English and preserves the spatial sense
    without overinterpreting the mode of baptism.
- source_word: πνεῦμα κυρίου
  chosen: the Spirit of the Lord
  alternatives:
  - the spirit of the Lord
  lexicon: BDAG
  rationale: Given Luke-Acts usage, πνεῦμα κυρίου most naturally refers to the Holy
    Spirit acting with divine agency, so 'Spirit' is capitalized. κύριος is rendered
    'Lord' per the project's default for κύριος.
- source_word: ἥρπασεν
  chosen: carried Philip away
  alternatives:
  - snatched Philip away
  - seized Philip
  lexicon: BDAG
  rationale: ἁρπάζω denotes sudden forceful removal. 'Carried ... away' communicates
    the removal clearly in natural English while avoiding a needlessly harsh or colloquial
    tone; the stronger alternative 'snatched ... away' is preserved in a footnote.
- source_word: οὐκ εἶδεν αὐτὸν οὐκέτι
  chosen: saw him no longer
  alternatives:
  - did not see him anymore
  - saw him no more
  lexicon: BDAG
  rationale: 'This reproduces the sense of the negated aorist with οὐκέτι in smooth
    English: after this moment, the eunuch did not see Philip again.'
- source_word: ὁ εὐνοῦχος
  chosen: the eunuch
  lexicon: BDAG
  rationale: The noun is explicit in the Greek and remains the most direct rendering.
    It also maintains continuity with the preceding narrative identification.
- source_word: ἐπορεύετο
  chosen: went on
  alternatives:
  - was going
  - continued on
  lexicon: BDAG
  rationale: The imperfect portrays ongoing action. 'Went on' captures the continuation
    of his journey in idiomatic English.
- source_word: τὴν ὁδὸν αὐτοῦ
  chosen: his way
  alternatives:
  - his road
  - his journey
  lexicon: BDAG
  rationale: ὁδός here refers to the route/journey rather than a literal 'road' only.
    'His way' is a natural English equivalent in this narrative expression.
- source_word: χαίρων
  chosen: rejoicing
  alternatives:
  - with joy
  - joyfully
  lexicon: BDAG
  rationale: The present participle expresses accompanying manner. 'Rejoicing' preserves
    the verbal force and links his emotional state directly to his continued travel.
