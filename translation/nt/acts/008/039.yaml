theological_decisions:
- issue: Whether πνεῦμα κυρίου should be understood as the Holy Spirit or an impersonal
    divine force
  chosen_reading: 'Personal divine agency: ''the Spirit of the Lord'''
  alternative_readings:
  - an impersonal spirit from the Lord
  rationale: In Luke-Acts, this expression ordinarily denotes God's Spirit acting
    personally and powerfully. Capitalization reflects that reading without adding
    content beyond the text.
  doctrine_reference: 'Affirmations; Contested terms: κύριος → Lord'
- issue: Whether ἥρπασεν should be rendered in a way that implies miraculous sudden
    removal
  chosen_reading: A miraculous removal is implied by 'carried Philip away'
  alternative_readings:
  - '''snatched Philip away'' to emphasize suddenness more strongly'
  rationale: The narrative context indicates divine intervention. The chosen wording
    preserves the event's supernatural character while remaining readable modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Preserve theological
    tension rather than resolve it'
