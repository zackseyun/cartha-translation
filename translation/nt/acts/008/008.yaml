id: ACT.8.8
reference: Acts 8:8
source:
  edition: SBLGNT
  text: ⸂ἐγένετο δὲ⸃ ⸂πολλὴ χαρὰ⸃ ἐν τῇ πόλει ἐκείνῃ.
translation:
  text: And there was great joy in that city.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγένετο
  chosen: there was
  alternatives:
  - came to be
  - happened
  - arose
  lexicon: BDAG
  rationale: The idiom ἐγένετο + nominative functions here existentially, indicating
    that a state obtained in the city. 'There was' is natural English and preserves
    the sense without awkward literalism.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - So
  - Then
  lexicon: BDAG
  rationale: δέ marks continuation in the narrative. 'And' is a simple, readable connective
    that preserves the flow without overstating contrast or sequence.
- source_word: πολλὴ χαρά
  chosen: great joy
  alternatives:
  - much joy
  - abundant joy
  lexicon: BDAG
  rationale: πολλή with an abstract noun can be rendered idiomatically as 'great'
    in English. 'Great joy' is more natural than 'much joy' while retaining the intensity
    of the Greek.
- source_word: ἐν τῇ πόλει ἐκείνῃ
  chosen: in that city
  alternatives:
  - in that town
  - in the city there
  lexicon: BDAG
  rationale: πόλις normally means 'city' here, and ἐκείνῃ is best rendered demonstratively
    as 'that.' The phrase locates the joy within the specific city just mentioned
    in context.
