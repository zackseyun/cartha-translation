id: ACT.8.23
reference: Acts 8:23
source:
  edition: SBLGNT
  text: εἰς γὰρ χολὴν πικρίας καὶ σύνδεσμον ἀδικίας ὁρῶ σε ὄντα.
translation:
  text: For I see that you are in the gall of bitterness and the bond of unrighteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chain of injustice' or 'the fetter of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: '''The gall of bitterness'' is a vivid metaphor, likely echoing Old Testament
      language for poisonous bitterness (compare Deuteronomy 29:18 LXX).'
    reason: cross_reference
lexical_decisions:
- source_word: εἰς
  chosen: in
  alternatives:
  - into
  - for
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into,' in this idiomatic construction with
    ὁρῶ σε ὄντα it expresses the state or condition in which Simon is seen to be.
    English 'in' best conveys the metaphorical sphere or condition.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for Peter's preceding rebuke. 'For' preserves the
    connective force in a natural but still fairly formal way.
- source_word: χολὴν πικρίας
  chosen: the gall of bitterness
  alternatives:
  - a bitter gall
  - the bitterness of gall
  lexicon: BDAG
  rationale: This is a vivid Semitic-sounding expression, likely echoing Deut 29:18
    LXX language of poisonous bitterness. 'Gall' preserves the metaphor rather than
    flattening it to mere 'bitterness.' The genitive πικρίας is rendered 'of bitterness'
    to retain the compact metaphor.
- source_word: σύνδεσμον ἀδικίας
  chosen: the bond of unrighteousness
  alternatives:
  - the chain of injustice
  - the fetter of wickedness
  lexicon: BDAG
  rationale: σύνδεσμος can denote that which binds, hence 'bond.' ἀδικία is broadly
    'unrighteousness' or 'injustice.' Here the personal moral condition is foregrounded,
    so 'unrighteousness' fits better than the more social-sounding 'injustice.'
- source_word: ὁρῶ
  chosen: I see
  alternatives:
  - I perceive
  - I discern
  lexicon: BDAG
  rationale: ὁράω here expresses Peter's spiritual discernment about Simon's condition.
    'I see' is both literal to the Greek and idiomatic in English for discernment.
- source_word: σε ὄντα
  chosen: that you are
  alternatives:
  - you being
  - you to be
  lexicon: BDAG
  rationale: 'The accusative plus participle construction after ὁρῶ is naturally rendered
    in English as a content clause: ''I see that you are.'' This avoids wooden English
    while preserving the sense.'
