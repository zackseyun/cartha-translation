theological_decisions:
- issue: Metaphorical description of Simon's spiritual state
  chosen_reading: 'Rendered the two phrases as metaphors of present moral/spiritual
    bondage: ''in the gall of bitterness and the bond of unrighteousness.'''
  alternative_readings:
  - Rendered more interpretively as 'full of bitter poison and captive to sin/injustice'
  rationale: The Greek uses compact metaphorical expressions rather than an explicit
    doctrinal explanation. Preserving the metaphors maintains the text's severity
    and ambiguity without importing a more developed theology of sin than the verse
    itself states.
  doctrine_reference: Translation philosophy items 1, 3, and 6
