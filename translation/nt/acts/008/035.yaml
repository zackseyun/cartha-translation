theological_decisions:
- issue: Sense of εὐηγγελίσατο αὐτῷ τὸν Ἰησοῦν
  chosen_reading: Philip proclaimed the good news about Jesus, making Jesus the content
    and center of the gospel proclamation.
  alternative_readings:
  - Philip preached Jesus to him
  rationale: The Greek construction places Jesus as the object/content of the evangelizing
    act. The chosen rendering expresses that clearly in natural English without reducing
    the phrase to a mere slogan. No doctrinal tension is being resolved beyond conveying
    the syntax faithfully.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
