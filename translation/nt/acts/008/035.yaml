id: ACT.8.35
reference: Acts 8:35
source:
  edition: SBLGNT
  text: ἀνοίξας δὲ ὁ Φίλιππος τὸ στόμα αὐτοῦ καὶ ἀρξάμενος ἀπὸ τῆς γραφῆς ταύτης εὐηγγελίσατο
    αὐτῷ τὸν Ἰησοῦν.
translation:
  text: Then Philip opened his mouth, and beginning from this Scripture, he proclaimed
    the good news about Jesus to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'beginning with this Scripture.'
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''he proclaimed the good news to him: Jesus,'' that is, the
      good news about Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοίξας ... τὸ στόμα αὐτοῦ
  chosen: opened his mouth
  alternatives:
  - began to speak
  - spoke
  lexicon: BDAG
  rationale: This is a common idiomatic expression for beginning to speak. Retaining
    'opened his mouth' preserves the Greek wording and the solemn narrative style
    without becoming unnatural in English.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression. 'Then' communicates the forward
    movement of the story more naturally in English than a bare 'and,' while avoiding
    over-interpretation.
- source_word: ἀρξάμενος ἀπὸ τῆς γραφῆς ταύτης
  chosen: beginning from this Scripture
  alternatives:
  - beginning with this Scripture
  - starting from this passage of Scripture
  lexicon: BDAG
  rationale: The participial phrase indicates the starting point of Philip's explanation.
    'Beginning from this Scripture' closely reflects ἀπό while remaining readable.
    'Scripture' is preferred over 'passage' because γραφή normally refers to sacred
    writing, not merely a textual excerpt.
- source_word: γραφῆς
  chosen: Scripture
  alternatives:
  - writing
  - passage of Scripture
  lexicon: BDAG
  rationale: In New Testament usage, γραφή commonly denotes sacred Scripture. Capitalizing
    'Scripture' reflects that recognized sense in context.
- source_word: εὐηγγελίσατο
  chosen: proclaimed the good news about
  alternatives:
  - preached
  - announced the good news of
  - evangelized
  lexicon: BDAG
  rationale: The verb means to announce or proclaim good news. 'Proclaimed the good
    news about Jesus' preserves the evangelistic force of the verb while using accessible
    modern English. 'Preached' is possible but can sound more institutional than the
    context requires.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to the eunuch
  lexicon: BDAG
  rationale: The pronoun directly refers to the Ethiopian official in context. 'To
    him' is the explicit Greek wording and avoids adding a noun not present in this
    verse.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  alternatives:
  - the message about Jesus
  lexicon: BDAG
  rationale: With εὐαγγελίζομαι, the accusative can denote the content proclaimed.
    In idiomatic English, 'the good news about Jesus' makes the sense explicit without
    obscuring that Jesus himself is the focus of the proclamation.
