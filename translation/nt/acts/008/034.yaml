id: ACT.8.34
reference: Acts 8:34
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ εὐνοῦχος τῷ Φιλίππῳ εἶπεν· Δέομαί σου, περὶ τίνος ὁ προφήτης
    λέγει ⸀τοῦτο; περὶ ἑαυτοῦ ἢ περὶ ἑτέρου τινός;
translation:
  text: Then the eunuch answered Philip and said, “I ask you, about whom does the
    prophet say this—about himself or about someone else?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I beg you.” The Greek expression conveys a respectful request and can
      be rendered with stronger urgency.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative. 'Answered' is natural English and preserves
    the discourse function without overtranslating the participle.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    gives a natural English transition in context.
- source_word: εὐνοῦχος
  chosen: eunuch
  lexicon: BDAG
  rationale: The noun specifically denotes a eunuch; there is no contextual reason
    to generalize it to 'official.' Retaining 'eunuch' preserves Luke's wording and
    the character's identity.
- source_word: τῷ Φιλίππῳ
  chosen: Philip
  alternatives:
  - to Philip
  lexicon: BDAG
  rationale: The dative marks the indirect object of speaking. English idiom normally
    omits the preposition after 'answered' and 'said,' so 'answered Philip and said'
    is concise and natural.
- source_word: Δέομαί σου
  chosen: I ask you
  alternatives:
  - I beg you
  - please tell me
  - I implore you
  lexicon: BDAG
  rationale: δέομαι can convey request or entreaty. 'I ask you' preserves the respectful
    appeal without sounding overly formal or emotionally heightened beyond the context.
    The polite force is retained by including 'you.'
- source_word: περὶ τίνος
  chosen: about whom
  alternatives:
  - concerning whom
  - about who
  lexicon: BDAG
  rationale: περί with the genitive expresses reference or topic. 'About whom' is
    idiomatic and accurately introduces the indirect question.
- source_word: ὁ προφήτης
  chosen: the prophet
  lexicon: BDAG
  rationale: The noun is definite and refers to Isaiah as prophet. 'The prophet' preserves
    the Greek form and the eunuch's wording.
- source_word: λέγει τοῦτο
  chosen: say this
  alternatives:
  - speak this
  - say these things
  lexicon: BDAG
  rationale: λέγει with τοῦτο refers to the quoted passage just read. 'Say this' is
    the most direct and natural rendering.
- source_word: περὶ ἑαυτοῦ
  chosen: about himself
  alternatives:
  - concerning himself
  lexicon: BDAG
  rationale: The reflexive pronoun clearly refers back to the prophet as the possible
    referent. 'About himself' is straightforward English.
- source_word: περὶ ἑτέρου τινός
  chosen: about someone else
  alternatives:
  - about another person
  - concerning someone different
  lexicon: BDAG
  rationale: ἕτερος τις means another/someone else. 'Someone else' is natural modern
    English and preserves the contrast with 'himself.'
