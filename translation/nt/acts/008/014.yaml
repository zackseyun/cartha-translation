theological_decisions:
- issue: Metonymic use of 'Samaria'
  chosen_reading: Retain 'Samaria had received the word of God' rather than replacing
    it with 'the Samaritans had received.'
  alternative_readings:
  - the Samaritans had received the word of God
  - the region of Samaria had received the word of God
  rationale: The Greek names the region/city in a collective sense. Preserving 'Samaria'
    keeps closer to the source and avoids adding an interpretive narrowing, while
    the context makes clear that the inhabitants are meant.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering λόγος as 'word' rather than 'message'
  chosen_reading: the word of God
  alternative_readings:
  - the message of God
  - God's message
  rationale: This preserves the familiar biblical idiom and theological weight without
    unnecessary paraphrase. The phrase refers to God's proclaimed message, but the
    source wording is best retained in the main text.
  doctrine_reference: Translation philosophy §1, §6
