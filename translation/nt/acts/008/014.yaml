id: ACT.8.14
reference: Acts 8:14
source:
  edition: SBLGNT
  text: Ἀκούσαντες δὲ οἱ ἐν Ἱεροσολύμοις ἀπόστολοι ὅτι δέδεκται ἡ Σαμάρεια τὸν λόγον
    τοῦ θεοῦ, ἀπέστειλαν πρὸς ⸀αὐτοὺς Πέτρον καὶ Ἰωάννην,
translation:
  text: Now when the apostles in Jerusalem heard that Samaria had received the word
    of God, they sent Peter and John to them,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    English 'when ... heard' is natural and preserves the temporal sense without awkwardness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative development rather than
    strong contrast. 'Now' signals transition in readable English.
- source_word: οἱ ἐν Ἱεροσολύμοις ἀπόστολοι
  chosen: the apostles in Jerusalem
  alternatives:
  - the apostles who were in Jerusalem
  - the Jerusalem apostles
  lexicon: BDAG
  rationale: This straightforwardly identifies the apostles located in Jerusalem.
    'The apostles in Jerusalem' is idiomatic and sufficiently formal.
- source_word: δέδεκται
  chosen: had received
  alternatives:
  - has received
  - had accepted
  - had welcomed
  lexicon: BDAG
  rationale: Perfect middle/passive of δέχομαι indicates a completed reception with
    present result. In English narrative sequence after 'heard that,' pluperfect 'had
    received' reads naturally. 'Received' is preferred over 'accepted' because it
    more closely matches the lexical sense and common NT idiom.
- source_word: ἡ Σαμάρεια
  chosen: Samaria
  alternatives:
  - the Samaritans
  - the region of Samaria
  lexicon: BDAG
  rationale: The subject is the place-name used metonymically for the people/region.
    Retaining 'Samaria' follows the Greek directly while remaining clear in context.
- source_word: τὸν λόγον τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  - the message of God
  lexicon: BDAG
  rationale: A standard NT expression for the proclaimed divine message. 'The word
    of God' preserves both lexical form and theological resonance better than more
    interpretive alternatives.
- source_word: ἀπέστειλαν
  chosen: they sent
  alternatives:
  - they dispatched
  lexicon: BDAG
  rationale: Simple aorist main verb. 'Sent' is the natural and sufficiently formal
    rendering.
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - to those people
  - toward them
  lexicon: BDAG
  rationale: πρός with accusative here indicates direction toward the Samaritans previously
    mentioned. 'To them' is idiomatic and contextually clear.
- source_word: Πέτρον καὶ Ἰωάννην
  chosen: Peter and John
  lexicon: BDAG
  rationale: Standard transliteration of personal names, in keeping with the translation
    philosophy to transliterate names.
