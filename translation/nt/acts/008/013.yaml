id: ACT.8.13
reference: Acts 8:13
source:
  edition: SBLGNT
  text: ὁ δὲ Σίμων καὶ αὐτὸς ἐπίστευσεν, καὶ βαπτισθεὶς ἦν προσκαρτερῶν τῷ Φιλίππῳ,
    θεωρῶν τε ⸂σημεῖα καὶ δυνάμεις μεγάλας γινομένας⸃ ἐξίστατο.
translation:
  text: And Simon himself also believed, and after being baptized he continued with
    Philip, and as he saw signs and great miracles happening, he was amazed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great works of power.' The Greek term can denote displays of power as
      well as miracles.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτὸς
  chosen: himself also
  alternatives:
  - also
  - even he
  lexicon: BDAG
  rationale: The combination is emphatic, highlighting that Simon too responded. 'Himself
    also' preserves both the reflexive/emphatic force of αὐτός and the additive force
    of καί.
- source_word: ἐπίστευσεν
  chosen: believed
  alternatives:
  - put faith in
  - came to faith
  lexicon: BDAG
  rationale: Aorist active indicative of πιστεύω is most naturally rendered 'believed.'
    This avoids importing a fuller theological conclusion than the verb itself states
    in context.
- source_word: βαπτισθεὶς
  chosen: after being baptized
  alternatives:
  - having been baptized
  - and was baptized
  lexicon: BDAG
  rationale: The aorist passive participle is antecedent to the main imperfect ἦν
    προσκαρτερῶν. 'After being baptized' makes the sequence clear in natural English.
- source_word: ἦν προσκαρτερῶν
  chosen: he continued with
  alternatives:
  - he was devoting himself to
  - he kept close to
  - he persisted with
  lexicon: BDAG
  rationale: This periphrastic imperfect conveys ongoing action. 'Continued with'
    is idiomatic and captures Simon's sustained attachment to Philip without overstating
    the nuance.
- source_word: θεωρῶν
  chosen: as he saw
  alternatives:
  - seeing
  - observing
  - watching
  lexicon: BDAG
  rationale: The present participle gives attendant ongoing perception. 'As he saw'
    fits the flow of the sentence and links his amazement to what he was witnessing.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - attesting signs
  lexicon: BDAG
  rationale: '''Signs'' is the standard rendering and preserves the term''s evidentiary
    or revelatory nuance in Acts.'
- source_word: δυνάμεις μεγάλας
  chosen: great miracles
  alternatives:
  - great works of power
  - great mighty works
  lexicon: BDAG
  rationale: In this context δυνάμεις refers to manifestations of divine power. 'Great
    miracles' is clear modern English and avoids the awkwardness of a more literal
    but less natural phrase.
- source_word: γινομένας
  chosen: happening
  alternatives:
  - being done
  - taking place
  lexicon: BDAG
  rationale: The participle modifies the signs and miracles as events occurring before
    Simon's eyes. 'Happening' is natural and preserves the ongoing aspect.
- source_word: ἐξίστατο
  chosen: he was amazed
  alternatives:
  - he was astounded
  - he was beside himself with amazement
  lexicon: BDAG
  rationale: The imperfect middle indicates continuing astonishment. 'He was amazed'
    is concise and natural, while retaining the sense of being overwhelmed.
