theological_decisions:
- issue: Whether Simon's believing should be rendered in a way that settles the question
    of genuine conversion
  chosen_reading: Render ἐπίστευσεν simply as 'believed' without qualifying it as
    genuine or false faith
  alternative_readings:
  - truly believed
  - professed belief
  - believed superficially
  rationale: The verse states that Simon believed and was baptized, but the broader
    narrative raises interpretive questions. To preserve theological tension and avoid
    importing a denominational conclusion, the translation states only what the Greek
    explicitly says.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
