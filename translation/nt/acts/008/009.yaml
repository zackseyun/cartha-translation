theological_decisions:
- issue: Characterization of Simon's activity
  chosen_reading: Rendered μαγεύων as 'practicing magic' without importing later theological
    labels such as 'demonic' or 'occultic fraud.'
  alternative_readings:
  - practicing sorcery
  - using sorcery
  rationale: The verse presents Simon as engaged in magical practice and self-exaltation,
    but does not itself specify the metaphysical source or offer a full theological
    evaluation. The translation therefore stays close to the lexical sense and preserves
    narrative tension.
  doctrine_reference: Translation philosophy items 1, 3, and 6
