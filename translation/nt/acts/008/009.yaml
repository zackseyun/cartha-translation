id: ACT.8.9
reference: Acts 8:9
source:
  edition: SBLGNT
  text: Ἀνὴρ δέ τις ὀνόματι Σίμων προϋπῆρχεν ἐν τῇ πόλει μαγεύων καὶ ⸀ἐξιστάνων τὸ
    ἔθνος τῆς Σαμαρείας, λέγων εἶναί τινα ἑαυτὸν μέγαν,
translation:
  text: Now a certain man named Simon had previously been in the city practicing magic
    and astonishing the people of Samaria, saying that he himself was someone great,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'practicing sorcery.' The Greek verb refers to engaging in magical arts.
    reason: lexical_alternative
  - marker: b
    text: Or 'that he was somebody great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνὴρ δέ τις
  chosen: Now a certain man
  alternatives:
  - But a certain man
  - Now there was a man
  lexicon: BDAG
  rationale: Ἀνήρ is specifically 'man,' not a gender-neutral 'person,' fitting the
    gender-accurate policy. δέ is rendered with a mild transitional 'Now' to introduce
    a new participant in readable English. τις adds indefiniteness, hence 'a certain.'
- source_word: ὀνόματι Σίμων
  chosen: named Simon
  alternatives:
  - by name Simon
  lexicon: BDAG
  rationale: Idiomatic English for the dative ὀνόματι plus proper name. The personal
    name is transliterated rather than translated, per philosophy.
- source_word: προϋπῆρχεν
  chosen: had previously been
  alternatives:
  - was already
  - had been there before
  lexicon: BDAG
  rationale: The imperfect of προϋπάρχω indicates prior existing/presence before the
    events just narrated. 'Had previously been' captures the temporal sense without
    overreading duration.
- source_word: ἐν τῇ πόλει
  chosen: in the city
  alternatives:
  - in that city
  lexicon: BDAG
  rationale: A straightforward locative rendering. The article likely refers to the
    city just mentioned in context; English can naturally say 'the city.'
- source_word: μαγεύων
  chosen: practicing magic
  alternatives:
  - using sorcery
  - practicing sorcery
  lexicon: BDAG
  rationale: μαγεύω refers to engaging in magical arts. 'Practicing magic' is clear
    modern English and avoids archaic ecclesiastical tone, while still conveying illicit
    wonder-working.
- source_word: ἐξιστάνων
  chosen: astonishing
  alternatives:
  - amazing
  - bewildering
  lexicon: BDAG
  rationale: From ἐξίστημι in this causative sense, 'to astound' or 'to amaze.' 'Astonishing'
    preserves the ongoing participial force and fits the context of public amazement.
- source_word: τὸ ἔθνος τῆς Σαμαρείας
  chosen: the people of Samaria
  alternatives:
  - the nation of Samaria
  - the Samaritan people
  lexicon: BDAG
  rationale: Although ἔθνος can mean 'nation' or 'people,' here 'people of Samaria'
    is the most natural English for the populace as a collective. 'Nation' would sound
    overly political in this context.
- source_word: λέγων
  chosen: saying
  alternatives:
  - claiming
  lexicon: BDAG
  rationale: The participle introduces the content of Simon's self-presentation. 'Saying'
    is formally closer; the boastful nuance is supplied by the content itself.
- source_word: εἶναί τινα ἑαυτὸν μέγαν
  chosen: that he himself was someone great
  alternatives:
  - that he was somebody great
  - that he himself was a great one
  lexicon: BDAG
  rationale: τινα here means 'someone/somebody,' and μέγαν conveys greatness or importance.
    'He himself' reflects ἑαυτόν and preserves the self-exalting force. 'Someone great'
    is natural English and avoids sounding either too colloquial or too wooden.
