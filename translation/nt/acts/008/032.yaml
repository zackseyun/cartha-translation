id: ACT.8.32
reference: Acts 8:32
source:
  edition: SBLGNT
  text: ἡ δὲ περιοχὴ τῆς γραφῆς ἣν ἀνεγίνωσκεν ἦν αὕτη· Ὡς πρόβατον ἐπὶ σφαγὴν ἤχθη,
    καὶ ὡς ἀμνὸς ἐναντίον τοῦ ⸀κείραντος αὐτὸν ἄφωνος, οὕτως οὐκ ἀνοίγει τὸ στόμα
    αὐτοῦ.
translation:
  text: 'Now the passage of Scripture that he was reading was this: “Like a sheep
    he was led to slaughter, and like a lamb before the one shearing it is silent,
    so he does not open his mouth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the slaughter.”
    reason: lexical_alternative
  - marker: b
    text: Or “before the shearer”; Greek literally “before the one shearing it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: περιοχὴ
  chosen: passage
  alternatives:
  - section
  - excerpt
  lexicon: BDAG
  rationale: In this context περιοχή refers to a specific portion or passage of Scripture
    being read aloud. 'Passage' is natural modern English and preserves the sense
    better than the less common 'section' or 'excerpt.'
- source_word: γραφή
  chosen: Scripture
  alternatives:
  - writing
  lexicon: BDAG
  rationale: γραφή in Acts commonly refers to sacred Scripture, not merely any writing.
    Capitalized 'Scripture' reflects that recognized referent without adding interpretation
    beyond the context.
- source_word: ἀνεγίνωσκεν
  chosen: was reading
  alternatives:
  - read
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action in past time. 'Was reading' captures
    the progressive sense more clearly than simple past 'read.'
- source_word: Ὡς πρόβατον
  chosen: Like a sheep
  alternatives:
  - As a sheep
  lexicon: BDAG
  rationale: ὡς introduces comparison. 'Like a sheep' is idiomatic contemporary English
    and preserves the simile.
- source_word: ἐπὶ σφαγὴν
  chosen: to slaughter
  alternatives:
  - for slaughter
  - to the slaughter
  lexicon: BDAG
  rationale: The phrase denotes movement toward slaughter. 'To slaughter' is concise
    and natural; 'to the slaughter' is traditional and possible, but slightly more
    idiomatic than necessary in modern English.
- source_word: ἤχθη
  chosen: was led
  alternatives:
  - was brought
  lexicon: BDAG
  rationale: Passive of ἄγω here conveys being led along. 'Was led' matches both the
    Greek and the Isaiah allusion well.
- source_word: ἀμνὸς
  chosen: lamb
  lexicon: BDAG
  rationale: ἀμνός specifically denotes a lamb, distinct from the broader πρόβατον
    ('sheep'). Preserving the lexical distinction reflects the source text.
- source_word: ἐναντίον
  chosen: before
  alternatives:
  - in the presence of
  lexicon: BDAG
  rationale: ἐναντίον here marks position in front of someone. 'Before' is the most
    natural concise rendering in English.
- source_word: κείραντος
  chosen: the one shearing
  alternatives:
  - the shearer
  - the one who shears
  lexicon: BDAG
  rationale: The participle means 'shearing' or 'cutting the wool/hair.' 'The one
    shearing' closely reflects the participial form while remaining readable. 'The
    shearer' is also valid but slightly more interpretive as a nominalized role.
- source_word: ἄφωνος
  chosen: is silent
  alternatives:
  - voiceless
  - mute
  lexicon: BDAG
  rationale: Though literally 'voiceless' or 'speechless,' in this simile the sense
    is that the lamb remains silent. 'Is silent' is idiomatic and communicates the
    intended meaning clearly.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: '''So'' naturally carries the comparative conclusion in English and fits
    the poetic cadence of the quotation.'
- source_word: οὐκ ἀνοίγει τὸ στόμα αὐτοῦ
  chosen: he does not open his mouth
  alternatives:
  - he did not open his mouth
  lexicon: BDAG
  rationale: The present tense ἀνοίγει is retained as 'does not open,' matching the
    Greek citation form from Isaiah as quoted here. This also preserves the vivid,
    scriptural present rather than flattening it into simple past.
