theological_decisions:
- issue: Messianic quotation from Isaiah 53 applied to Jesus in context
  chosen_reading: Retained the quotation in its literal simile form without making
    the Christological identification explicit in the verse itself.
  alternative_readings:
  - A more interpretive rendering that foregrounds Jesus as the suffering servant
  rationale: The broader narrative identifies the referent christologically, but this
    verse itself presents the quoted Scripture. To avoid importing doctrinal explanation
    into the translation, the wording remains close to the Greek quotation while allowing
    the canonical connection to stand from context.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
