id: ACT.8.1
reference: Acts 8:1
source:
  edition: SBLGNT
  text: Σαῦλος δὲ ἦν συνευδοκῶν τῇ ἀναιρέσει αὐτοῦ. Ἐγένετο δὲ ἐν ἐκείνῃ τῇ ἡμέρᾳ
    διωγμὸς μέγας ἐπὶ τὴν ἐκκλησίαν τὴν ἐν Ἱεροσολύμοις· πάντες δὲ διεσπάρησαν κατὰ
    τὰς χώρας τῆς Ἰουδαίας καὶ Σαμαρείας πλὴν τῶν ἀποστόλων.
translation:
  text: Now Saul was approving of his killing. And on that day a great persecution
    arose against the church in Jerusalem, and they were all scattered throughout
    the regions of Judea and Samaria, except the apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his execution,' 'his death,' or more interpretively, 'his murder.' The
      Greek refers to the act of putting him to death.
    reason: lexical_alternative
lexical_decisions:
- source_word: Σαῦλος
  chosen: Saul
  lexicon: BDAG
  rationale: Standard transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: συνευδοκῶν
  chosen: was approving of
  alternatives:
  - was consenting to
  - was in agreement with
  - approved of
  lexicon: BDAG
  rationale: The participle with ἦν expresses ongoing or contemporaneous approval.
    'Approving of' captures favorable consent without overstating direct participation.
- source_word: ἀναιρέσει αὐτοῦ
  chosen: his killing
  alternatives:
  - his execution
  - his murder
  - his death
  lexicon: BDAG
  rationale: ἀναίρεσις denotes killing or putting to death. 'His killing' is the most
    transparent rendering here, preserving the act rather than softening it to mere
    'death.' 'Execution' could imply legal legitimacy not granted by the text; 'murder'
    may be interpretively stronger than the lexical item alone requires.
- source_word: Ἐγένετο
  chosen: arose
  alternatives:
  - came about
  - happened
  - began
  lexicon: BDAG
  rationale: In context introducing the onset of persecution, 'arose' is idiomatic
    and concise in English.
- source_word: διωγμὸς μέγας
  chosen: a great persecution
  alternatives:
  - severe persecution
  - a major persecution
  lexicon: BDAG
  rationale: This preserves both the noun and adjective straightforwardly. 'Great
    persecution' is natural and keeps the scale emphasized by μέγας.
- source_word: ἐπὶ τὴν ἐκκλησίαν
  chosen: against the church
  alternatives:
  - upon the church
  lexicon: BDAG
  rationale: With ἐπί in this hostile context, 'against' best conveys directed opposition.
- source_word: τὴν ἐν Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - that was in Jerusalem
  lexicon: BDAG
  rationale: The attributive phrase identifies the location of the church. 'In Jerusalem'
    is sufficient in natural English without loss of meaning.
- source_word: πάντες
  chosen: they were all
  alternatives:
  - all of them were
  - everyone was
  lexicon: BDAG
  rationale: Because the referent is the members of the Jerusalem church rather than
    an absolute universal, English requires an implied subject. 'They were all' makes
    the sense explicit while preserving the scope.
- source_word: διεσπάρησαν
  chosen: were scattered
  alternatives:
  - were dispersed
  lexicon: BDAG
  rationale: Passive 'were scattered' is the standard and clear rendering for forced
    dispersal.
- source_word: κατὰ τὰς χώρας
  chosen: throughout the regions
  alternatives:
  - through the districts
  - across the countryside
  lexicon: BDAG
  rationale: χώρας refers to territories or regions. 'Throughout the regions' fits
    the geographic sense and reads naturally with the following genitives.
- source_word: τῆς Ἰουδαίας καὶ Σαμαρείας
  chosen: of Judea and Samaria
  lexicon: BDAG
  rationale: Standard geographical transliteration and straightforward genitival rendering.
- source_word: πλὴν τῶν ἀποστόλων
  chosen: except the apostles
  alternatives:
  - apart from the apostles
  lexicon: BDAG
  rationale: πλήν marks exception. 'Except the apostles' is direct and idiomatic.
