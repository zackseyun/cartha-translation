theological_decisions:
- issue: Rendering ἀναιρέσει αὐτοῦ in relation to Stephen's death
  chosen_reading: his killing
  alternative_readings:
  - his execution
  - his murder
  - his death
  rationale: The translation avoids importing a legal judgment ('execution') or a
    stronger moral-legal label not explicit in the noun itself ('murder'), while still
    preserving that Saul approved the act of putting Stephen to death, not merely
    the fact that he died.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the source text states without importing doctrinal or
    interpretive claims.'
- issue: Scope of πάντες ('all')
  chosen_reading: they were all scattered ... except the apostles
  alternative_readings:
  - all the believers were scattered
  - everyone was scattered
  rationale: The text itself qualifies the statement with 'except the apostles.' The
    English keeps the literary force of 'all' while allowing the contextual referent
    to be the Jerusalem church rather than every individual without exception.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not paraphrase
    beyond what the source warrants.'
