theological_decisions:
- issue: Whether the wording should be translated in a way that settles the mode of
    baptism
  chosen_reading: Retain the directional phrase 'went down into the water' and the
    verb 'baptized' without adding interpretive language about immersion or sprinkling.
  alternative_readings:
  - Translate βαπτίζω as 'immersed' to imply mode
  - Soften εἰς τὸ ὕδωρ to 'to the water' to avoid implications
  rationale: The Greek plainly says both men went down into the water and that Philip
    baptized him. The translation should preserve those lexical facts while not importing
    a denominational conclusion beyond the text itself.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not advocate a denominational distinctive unless the Greek
    unambiguously supports one reading over another.'
