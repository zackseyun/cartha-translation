id: ACT.8.38
reference: Acts 8:38
source:
  edition: SBLGNT
  text: καὶ ἐκέλευσεν στῆναι τὸ ἅρμα, καὶ κατέβησαν ἀμφότεροι εἰς τὸ ὕδωρ ὅ τε Φίλιππος
    καὶ ὁ εὐνοῦχος, καὶ ἐβάπτισεν αὐτόν.
translation:
  text: And he ordered the chariot to stop, and both Philip and the eunuch went down
    into the water, and he baptized him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the water'; however, the Greek preposition normally indicates movement
      into the water.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: κέλευω commonly means to order or command. 'Ordered' is natural modern
    English and preserves the authoritative sense without sounding overly stiff.
- source_word: στῆναι
  chosen: to stop
  alternatives:
  - to stand still
  - to halt
  lexicon: BDAG
  rationale: With τὸ ἅρμα as object, the infinitive conveys causing the chariot to
    come to a stop. 'To stop' is idiomatic English for a vehicle.
- source_word: ἅρμα
  chosen: chariot
  alternatives:
  - carriage
  lexicon: BDAG
  rationale: ἅρμα is the standard term for a chariot. Although the vehicle may function
    more like a carriage in this narrative setting, 'chariot' is the direct and conventional
    rendering and does not distort the text.
- source_word: κατέβησαν
  chosen: went down
  alternatives:
  - went down into
  - descended
  lexicon: BDAG
  rationale: καταβαίνω means to go down or descend. 'Went down' is clear modern English;
    the following prepositional phrase supplies the destination.
- source_word: ἀμφότεροι
  chosen: both
  alternatives:
  - the two of them
  lexicon: BDAG
  rationale: ἀμφότεροι explicitly marks that both persons acted together. 'Both' is
    concise and accurate.
- source_word: εἰς τὸ ὕδωρ
  chosen: into the water
  alternatives:
  - to the water
  - in the water
  lexicon: BDAG
  rationale: εἰς normally indicates movement into. 'Into the water' best reflects
    the preposition's directional force. This is a lexical decision, not an attempt
    to settle later denominational debates about baptismal mode.
- source_word: ὅ τε Φίλιππος καὶ ὁ εὐνοῦχος
  chosen: both Philip and the eunuch
  alternatives:
  - Philip as well as the eunuch
  - Philip and the eunuch
  lexicon: BDAG
  rationale: The correlative construction with τε ... καί identifies the two participants
    explicitly. Rendering it as 'both Philip and the eunuch' preserves the emphasis
    already signaled by ἀμφότεροι.
- source_word: εὐνοῦχος
  chosen: eunuch
  alternatives:
  - court official
  lexicon: BDAG
  rationale: εὐνοῦχος can in some contexts denote a court official, but in Acts 8
    the narrative has already identified this man with the conventional term 'eunuch,'
    and retaining it preserves lexical continuity and the likely plain sense.
- source_word: ἐβάπτισεν
  chosen: baptized
  alternatives:
  - immersed
  lexicon: BDAG
  rationale: βαπτίζω is best rendered by the established English term 'baptized.'
    Using 'immersed' here would over-resolve a debated issue and move beyond the translation's
    non-sectarian stance.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to the eunuch as the direct object of the baptismal
    action.
