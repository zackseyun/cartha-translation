id: ACT.8.20
reference: Acts 8:20
source:
  edition: SBLGNT
  text: Πέτρος δὲ εἶπεν πρὸς αὐτόν· Τὸ ἀργύριόν σου σὺν σοὶ εἴη εἰς ἀπώλειαν ὅτι τὴν
    δωρεὰν τοῦ θεοῦ ἐνόμισας διὰ χρημάτων κτᾶσθαι.
translation:
  text: But Peter said to him, “May your silver perish with you, because you thought
    you could acquire the gift of God with money.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May your money go to destruction with you.' The Greek uses 'silver'
      here, a common way of referring to money.
    reason: lexical_alternative
  - marker: b
    text: Or 'obtain' or 'purchase.' The sense is that Simon regarded God's gift as
      something that could be gained by payment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργύριόν
  chosen: silver
  alternatives:
  - money
  lexicon: BDAG
  rationale: The noun literally denotes silver/silver money. 'Silver' preserves the
    concrete wording of the Greek while still naturally implying money in context.
    The later phrase διὰ χρημάτων is rendered 'with money,' so retaining 'silver'
    here avoids unnecessary repetition and keeps the rhetorical force of Peter's curse.
- source_word: σὺν σοὶ
  chosen: with you
  alternatives:
  - along with you
  lexicon: BDAG
  rationale: A straightforward rendering of the preposition and pronoun. 'With you'
    is idiomatic and preserves the sense that both Simon and his money are bound together
    in the pronouncement.
- source_word: εἴη εἰς ἀπώλειαν
  chosen: may ... perish
  alternatives:
  - be for destruction
  - go to ruin
  - be damned
  lexicon: BDAG
  rationale: The optative εἴη expresses a wish or imprecation. 'May ... perish' captures
    the force in natural English without importing later doctrinal language such as
    'be damned.' ἀπώλεια carries the sense of destruction/ruin/perishing; 'perish'
    is concise and idiomatic here.
- source_word: δωρεὰν
  chosen: gift
  alternatives:
  - free gift
  lexicon: BDAG
  rationale: '''Gift'' is the natural English equivalent. Although the Greek term
    can stress freeness, English ''gift'' already conveys something given rather than
    purchased, and the contrast with buying is explicit in the verse.'
- source_word: ἐνόμισας
  chosen: you thought
  alternatives:
  - you supposed
  - you considered
  lexicon: BDAG
  rationale: The verb means to think, suppose, or consider. 'You thought' is clear,
    direct, and fits Peter's rebuke.
- source_word: διὰ χρημάτων
  chosen: with money
  alternatives:
  - by means of money
  - through money
  lexicon: BDAG
  rationale: διά with the genitive expresses means. 'With money' is the most natural
    modern English rendering.
- source_word: κτᾶσθαι
  chosen: acquire
  alternatives:
  - obtain
  - purchase
  - possess
  lexicon: BDAG
  rationale: The verb means to acquire or obtain. 'Acquire' preserves the idea of
    gaining possession without overstating the commercial nuance; the attempted means
    ('with money') already supplies that nuance.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks contrast with Simon's request in the previous verse. 'But'
    best reflects the adversative turn.
