theological_decisions:
- issue: Force of Peter's pronouncement toward Simon and his money
  chosen_reading: An imprecatory wish of destruction/ruin, rendered 'May your silver
    perish with you'
  alternative_readings:
  - A declarative prediction of destruction
  - A stronger eternal-condemnation formula such as 'to hell with you and your money'
  rationale: The optative εἴη is best represented as a wish/pronouncement rather than
    a simple statement of fact. The translation avoids importing a more specific doctrine
    of final condemnation than the Greek itself states, while preserving the severity
    of Peter's rebuke.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
