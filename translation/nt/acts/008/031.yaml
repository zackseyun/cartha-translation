id: ACT.8.31
reference: Acts 8:31
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Πῶς γὰρ ἂν δυναίμην ἐὰν μή τις ⸀ὁδηγήσει με; παρεκάλεσέν τε τὸν
    Φίλιππον ἀναβάντα καθίσαι σὺν αὐτῷ.
translation:
  text: And he said, “How could I, unless someone guides me?” Then he urged Philip
    to come up and sit with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unless someone leads me.' The Greek verb can refer both to literal guidance
      and to directed understanding.
    reason: lexical_alternative
  - marker: b
    text: Or 'invited Philip to come up and sit with him.' The verb can denote an
      earnest request or invitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πῶς γὰρ ἂν δυναίμην
  chosen: How could I
  alternatives:
  - How can I
  - How would I be able
  lexicon: BDAG
  rationale: The optative with ἄν expresses potentiality, so 'How could I' best captures
    the sense of inability apart from a condition. 'How can I' is possible in smoother
    English but slightly flattens the modal nuance.
- source_word: ἐὰν μή τις ὁδηγήσει με
  chosen: unless someone guides me
  alternatives:
  - unless someone explains it to me
  - unless someone leads me
  lexicon: BDAG
  rationale: ὁδηγέω literally means 'to guide/lead on the way.' In this context of
    understanding Scripture, 'guides me' preserves both the literal and interpretive
    sense without over-paraphrasing to 'explains.'
- source_word: παρεκάλεσέν
  chosen: urged
  alternatives:
  - invited
  - asked
  - begged
  lexicon: BDAG
  rationale: παρακαλέω has a range including urge, exhort, invite, request. Here the
    eunuch is making a courteous but earnest request. 'Urged' preserves the strength
    of the verb better than the weaker 'asked,' while avoiding the excessive intensity
    of 'begged.'
- source_word: τε
  chosen: Then
  alternatives:
  - and
  - so
  lexicon: BDAG
  rationale: τέ is a connective particle often lightly linking clauses. In natural
    English, 'Then' conveys the narrative progression implied here better than a wooden
    'and,' while remaining within optimal equivalence.
- source_word: ἀναβάντα
  chosen: to come up
  alternatives:
  - to get in
  - to come aboard
  lexicon: BDAG
  rationale: ἀναβαίνω means 'go up/come up.' Since Philip is being invited into the
    chariot, 'come up' preserves the spatial imagery of ascending into it. 'Get in'
    is idiomatic but less literal.
- source_word: καθίσαι σὺν αὐτῷ
  chosen: sit with him
  alternatives:
  - sit beside him
  lexicon: BDAG
  rationale: καθίζω with σύν + dative naturally means to sit with someone. 'Sit with
    him' is clear and sufficiently precise; 'beside him' is interpretive though plausible.
- source_word: Φίλιππον
  chosen: Philip
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
