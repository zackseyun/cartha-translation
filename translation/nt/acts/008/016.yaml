theological_decisions:
- issue: Implied subject of 'had not yet fallen'
  chosen_reading: The implied subject is the Holy Spirit, rendered as 'he' from the
    immediate context.
  alternative_readings:
  - Leave the subject entirely implicit in English
  rationale: Greek leaves the subject unstated, but the previous verse explicitly
    names the Holy Spirit, making the referent clear. English normally requires an
    explicit subject; 'he' preserves the personal reference without adding interpretive
    content beyond the context.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: Baptism formula wording
  chosen_reading: Rendered 'in the name of the Lord Jesus' while preserving the more
    literal 'into the name' as an alternative.
  alternative_readings:
  - into the name of the Lord Jesus
  rationale: The verse describes Christian baptism associated with Jesus' name, but
    does not itself adjudicate later doctrinal debates about baptismal formulas or
    sacramental theology. The idiomatic English rendering is preferred while preserving
    the literal prepositional alternative in a footnote-worthy lexical note.
  doctrine_reference: 'Translation philosophy #3'
