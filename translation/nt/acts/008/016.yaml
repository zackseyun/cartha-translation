id: ACT.8.16
reference: Acts 8:16
source:
  edition: SBLGNT
  text: ⸀οὐδέπω γὰρ ἦν ἐπ’ οὐδενὶ αὐτῶν ἐπιπεπτωκός, μόνον δὲ βεβαπτισμένοι ὑπῆρχον
    εἰς τὸ ὄνομα τοῦ ⸀κυρίου Ἰησοῦ.
translation:
  text: For he had not yet fallen on any of them; they had only been baptized in the
    name of the Lord Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'had not yet come upon any of them.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'had only been baptized into the name of the Lord Jesus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδέπω
  chosen: not yet
  alternatives:
  - not as yet
  lexicon: BDAG
  rationale: Temporal adverb indicating that the action had not occurred up to that
    point. 'Not yet' is the natural modern English equivalent.
- source_word: ἐπ’ οὐδενὶ αὐτῶν
  chosen: on any of them
  alternatives:
  - upon any of them
  lexicon: BDAG
  rationale: The preposition ἐπί with the dative here expresses coming upon persons.
    'On any of them' is idiomatic and preserves the spatial metaphor used in Acts
    for the Spirit's coming.
- source_word: ἐπιπεπτωκός
  chosen: fallen
  alternatives:
  - come upon
  lexicon: BDAG
  rationale: Perfect active participle of ἐπιπίπτω, used in Acts for the Holy Spirit's
    coming upon people. 'Fallen' preserves the verbal imagery and traditional Acts
    usage without over-paraphrasing. The subject 'he' is supplied from context, referring
    to the Holy Spirit mentioned in the previous verse.
- source_word: μόνον
  chosen: only
  alternatives:
  - merely
  - simply
  lexicon: BDAG
  rationale: 'Marks limitation or contrast: the Samaritans had experienced baptism,
    but not yet the Spirit''s falling. ''Only'' is concise and clear.'
- source_word: βεβαπτισμένοι ὑπῆρχον
  chosen: they had been baptized
  alternatives:
  - they were baptized
  - they were in a baptized state
  lexicon: BDAG
  rationale: Periphrastic pluperfect-like construction (perfect participle with imperfect
    of ὑπάρχω) describing an existing resultant state from prior baptism. 'They had
    been baptized' best conveys prior completed action in natural English.
- source_word: εἰς τὸ ὄνομα
  chosen: in the name
  alternatives:
  - into the name
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' the idiom with baptism is conventionally
    and intelligibly rendered 'in the name.' 'Into the name' is more formally literal
    but less natural in English; the idiomatic sense is preserved.
- source_word: κυρίου Ἰησοῦ
  chosen: the Lord Jesus
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is translated 'Lord' per project policy for Kyrios. The article
    is retained in English because it reads naturally with the full title here.
