id: ACT.8.12
reference: Acts 8:12
source:
  edition: SBLGNT
  text: ὅτε δὲ ἐπίστευσαν τῷ Φιλίππῳ εὐαγγελιζομένῳ ⸀περὶ τῆς βασιλείας τοῦ θεοῦ καὶ
    τοῦ ὀνόματος Ἰησοῦ Χριστοῦ, ἐβαπτίζοντο ἄνδρες τε καὶ γυναῖκες.
translation:
  text: But when they believed Philip as he proclaimed the good news about the kingdom
    of God and the name of Jesus Messiah, they were being baptized, both men and women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the name of Jesus Christ.' The Greek title Χριστός is rendered 'Messiah'
      here to preserve its title sense.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause ('when'), and δέ marks a mild contrast
    or development in the narrative. 'But when' preserves the discourse shift from
    the preceding context without overstating it.
- source_word: ἐπίστευσαν τῷ Φιλίππῳ
  chosen: they believed Philip
  alternatives:
  - they believed in Philip
  - they believed what Philip said
  - they trusted Philip
  lexicon: BDAG
  rationale: πιστεύω with the dative commonly means to believe or trust a person as
    a witness/speaker, not to place saving faith in that person. 'Believed Philip'
    is concise and close to the Greek; the content of belief is then specified by
    the participial phrase.
- source_word: εὐαγγελιζομένῳ
  chosen: as he proclaimed the good news
  alternatives:
  - preaching
  - announcing the gospel
  - bringing good news
  lexicon: BDAG
  rationale: The present middle participle modifies Philip and explains the circumstance
    in which they believed him. 'Proclaimed the good news' renders the verbal force
    accessibly while preserving the evangelistic sense of εὐαγγελίζω.
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: BDAG
  rationale: περί with the genitive here introduces the subject matter of Philip's
    proclamation. 'About' is natural modern English and sufficiently precise.
- source_word: τῆς βασιλείας τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: '''Kingdom of God'' is the standard and transparent rendering of the
    phrase. ''Reign of God'' is possible but less idiomatic here and not required
    by the context.'
- source_word: τοῦ ὀνόματος Ἰησοῦ Χριστοῦ
  chosen: the name of Jesus Messiah
  alternatives:
  - the name of Jesus Christ
  - the name of Jesus the Messiah
  lexicon: BDAG
  rationale: ὄνομα can denote the person, authority, or revealed identity represented
    by the name; 'the name of' should be retained rather than paraphrased away. Χριστοῦ
    is a title here, so per doctrine it is rendered 'Messiah' rather than 'Christ'.
- source_word: ἐβαπτίζοντο
  chosen: they were being baptized
  alternatives:
  - they were baptized
  - they kept being baptized
  lexicon: BDAG
  rationale: The imperfect passive indicates ongoing or repeated action in past time
    as people responded. 'Were being baptized' preserves that imperfective aspect
    better than the simple past.
- source_word: ἄνδρες τε καὶ γυναῖκες
  chosen: both men and women
  alternatives:
  - men as well as women
  - both males and females
  lexicon: BDAG
  rationale: τε ... καὶ coordinates the two groups inclusively. 'Both men and women'
    is natural English and preserves Luke's explicit mention of both sexes.
