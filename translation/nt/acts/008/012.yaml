theological_decisions:
- issue: Rendering Χριστοῦ in Ἰησοῦ Χριστοῦ
  chosen_reading: Jesus Messiah
  alternative_readings:
  - Jesus Christ
  - Jesus the Messiah
  rationale: In this context Χριστοῦ functions as a christological title rather than
    a mere name-like surname. Per DOCTRINE.md, Christos is translated 'Messiah' where
    title is in view, preserving the Hebraic messianic sense while remaining readable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title;
    Christ where name-like)'
