theological_decisions:
- issue: Whether Peter's statement should be rendered in a way that implies exclusion
    from salvation, ministry participation, or the specific apostolic matter at hand
  chosen_reading: 'The translation leaves the scope at the level of the Greek: Simon
    has no part or share ''in this matter,'' without expanding it to a doctrinal conclusion
    about his final salvation status.'
  alternative_readings:
  - A stronger reading that implies Simon is wholly outside salvation
  - A narrower reading that limits the statement only to receiving apostolic authority
  rationale: The Greek text itself specifies exclusion 'in this matter' and grounds
    it in the condition of Simon's heart before God. The translation preserves that
    wording and tension rather than importing a denominational conclusion about Simon's
    ultimate state.
  doctrine_reference: Preserve theological tension rather than resolve it.
