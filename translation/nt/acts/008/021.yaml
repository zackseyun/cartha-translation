id: ACT.8.21
reference: Acts 8:21
source:
  edition: SBLGNT
  text: οὐκ ἔστιν σοι μερὶς οὐδὲ κλῆρος ἐν τῷ λόγῳ τούτῳ, ἡ γὰρ καρδία σου οὐκ ἔστιν
    εὐθεῖα ⸀ἔναντι τοῦ θεοῦ.
translation:
  text: You have neither part nor share in this matter, because your heart is not
    right before God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lot' instead of 'share'; the Greek pairs two near-synonyms ('part' and
      'lot/share') to stress that Simon has no stake in this matter.
    reason: lexical_alternative
  - marker: b
    text: Or 'in this word/message.' The Greek word can mean 'word,' 'message,' or
      'matter'; here it likely refers to the issue under discussion.
    reason: lexical_alternative
  - marker: c
    text: Literally 'straight before God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μερὶς
  chosen: part
  alternatives:
  - portion
  - share
  lexicon: BDAG
  rationale: μερὶς commonly denotes a part, portion, or share. 'Part' works naturally
    in the paired expression with κλῆρος while preserving the idiomatic sense of having
    no stake in what is under discussion.
- source_word: κλῆρος
  chosen: share
  alternatives:
  - lot
  - inheritance
  lexicon: BDAG
  rationale: κλῆρος can mean 'lot,' 'share,' or 'inheritance.' In this collocation
    with μερὶς, a hendiadys-like pairing emphasizes exclusion from participation.
    'Share' communicates the sense clearly in modern English, while 'lot' is preserved
    as an alternative because of its literal and traditional force.
- source_word: ἐν τῷ λόγῳ τούτῳ
  chosen: in this matter
  alternatives:
  - in this word
  - in this message
  - in this affair
  lexicon: BDAG
  rationale: λόγος has a broad semantic range including 'word,' 'message,' 'matter,'
    and 'thing.' In context Peter is speaking about Simon's involvement in the apostolic
    ministry and request, so 'this matter' best captures the referent in idiomatic
    English without over-specifying.
- source_word: καρδία
  chosen: heart
  lexicon: BDAG
  rationale: A standard rendering that preserves the biblical sense of the inner person,
    including intention and moral disposition.
- source_word: εὐθεῖα
  chosen: right
  alternatives:
  - straight
  - upright
  lexicon: BDAG
  rationale: εὐθεῖα literally means 'straight,' but in moral evaluation 'right' is
    the most natural English equivalent here. It conveys alignment with God's standard
    without sounding wooden.
- source_word: ἔναντι τοῦ θεοῦ
  chosen: before God
  alternatives:
  - in the sight of God
  - in God's presence
  lexicon: BDAG
  rationale: ἔναντι with the genitive means 'before' or 'in the presence/sight of.'
    'Before God' is concise, natural, and preserves the judicial-moral force of divine
    evaluation.
