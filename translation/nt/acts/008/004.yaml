theological_decisions:
- issue: Rendering of εὐαγγελιζόμενοι τὸν λόγον
  chosen_reading: proclaiming the good news of the word
  alternative_readings:
  - proclaiming the word as good news
  - preaching the gospel message
  rationale: The Greek combines the evangelizing verb with the object 'the word.'
    To preserve both elements without collapsing one into the other, the main text
    renders the participle as 'proclaiming the good news' and keeps τὸν λόγον as 'of
    the word.' This avoids importing a narrower ecclesiastical sense while retaining
    Luke's terminology.
  doctrine_reference: Translation philosophy §§1, 5, 6
