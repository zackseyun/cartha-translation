theological_decisions:
- issue: Rendering of εὐαγγελιζόμενοι τὸν λόγον
  chosen_reading: proclaiming the good news of the word
  alternative_readings:
  - proclaiming the word as good news
  - preaching the gospel message
  rationale: The Greek combines the evangelizing verb with the object 'the word.'
    To preserve both elements without collapsing one into the other, the main text
    renders the participle as 'proclaiming the good news' and keeps τὸν λόγον as 'of
    the word.' This avoids importing a narrower ecclesiastical sense while retaining
    Luke's terminology.
  doctrine_reference: Translation philosophy §§1, 5, 6
revisions:
- timestamp: '2026-04-21T02:35:51Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/acts/008/004.json
  category: awkward_english
  tier: 1
  from: proclaiming the good news of the word
  to: proclaiming the word
  rationale: The current rendering, 'proclaiming the good news of the word,' is awkward
    English. It constructs a genitive relationship ('of the word') that is not present
    in the Greek, where 'τὸν λόγον' is the direct object of the participle 'εὐαγγελιζόμενοι'.
    The Greek means they 'evangelized the word'—the word *is* the good news. The draft's
    phrasing makes it sound as if 'the word' is the source or topic of the good news,
    rather than its content. A more direct rendering like 'proclaiming the word' or
    'preaching the word' (as in the footnote) better reflects the Greek syntax and
    is more idiomatic English. The 'good news' aspect is inherent in the verb and
    can be explained in a note if necessary.
