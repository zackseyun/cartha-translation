id: ACT.8.4
reference: Acts 8:4
source:
  edition: SBLGNT
  text: Οἱ μὲν οὖν διασπαρέντες διῆλθον εὐαγγελιζόμενοι τὸν λόγον.
translation:
  text: So those who had been scattered went through the region proclaiming the good
    news of the word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went about preaching the gospel message.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the word'; that is, the message about Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ μὲν οὖν
  chosen: So those
  alternatives:
  - Therefore those
  - Now those
  lexicon: BDAG
  rationale: The combination marks a transition/inference from the preceding persecution
    and scattering. 'So those' gives natural English while preserving the inferential
    force of οὖν and the discourse-setting function of μέν without overtranslating
    it.
- source_word: διασπαρέντες
  chosen: who had been scattered
  alternatives:
  - who were scattered
  - who had been dispersed
  lexicon: BDAG
  rationale: Aorist passive participle of διασπείρω, referring to believers scattered
    by persecution. The pluperfect-like English 'had been scattered' captures antecedent
    action relative to the main verb. 'Scattered' is more vivid and idiomatic here
    than 'dispersed'.
- source_word: διῆλθον
  chosen: went through the region
  alternatives:
  - went about
  - passed through
  lexicon: BDAG
  rationale: διέρχομαι here denotes moving from place to place. 'Went through the
    region' makes the itinerant sense explicit in idiomatic English. 'Passed through'
    can sound too momentary; 'went about' is possible but less concrete.
- source_word: εὐαγγελιζόμενοι
  chosen: proclaiming the good news
  alternatives:
  - preaching the gospel
  - announcing the good news
  lexicon: BDAG
  rationale: 'The participle expresses attendant manner: as they traveled, they were
    evangelizing. ''Proclaiming the good news'' preserves the verbal force and uses
    accessible modern English. ''Preaching the gospel'' is traditional but more ecclesiastical.'
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the word of God
  lexicon: BDAG
  rationale: λόγος here most naturally refers to the Christian message already in
    view. 'The word' preserves the concise expression of the Greek and common Lukan
    usage. 'The message' is interpretive; 'the word of God' adds words not present
    in this verse.
