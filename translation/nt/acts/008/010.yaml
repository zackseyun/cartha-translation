id: ACT.8.10
reference: Acts 8:10
source:
  edition: SBLGNT
  text: ᾧ προσεῖχον ⸀πάντες ἀπὸ μικροῦ ἕως μεγάλου λέγοντες· Οὗτός ἐστιν ἡ Δύναμις
    τοῦ θεοῦ ἡ ⸀καλουμένη Μεγάλη.
translation:
  text: They all paid attention to him, from the least to the greatest, saying, “This
    man is the power of God that is called Great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This is what is called the Great Power of God.” The Greek can be rendered
      more compactly as a title-like expression.
    reason: alternative_reading
lexical_decisions:
- source_word: ᾧ προσεῖχον
  chosen: paid attention to him
  alternatives:
  - gave heed to him
  - were devoted to him
  lexicon: BDAG
  rationale: προσέχω in this context means to pay close attention or give heed. 'Paid
    attention to him' is natural modern English and preserves the sense of directed
    attention without overstating allegiance.
- source_word: πάντες
  chosen: they all
  alternatives:
  - all
  lexicon: BDAG
  rationale: The explicit subject is plural and comprehensive. 'They all' makes the
    implied subject clear in English.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from the smallest to the greatest
  lexicon: BDAG
  rationale: This idiom denotes the full social range of people. 'From the least to
    the greatest' is idiomatic English and preserves the merism.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and is naturally
    rendered 'saying' in English.
- source_word: Οὗτός
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: The demonstrative points to Simon as a person. 'This man' is more idiomatic
    and explicit in English than 'This one,' while preserving the deictic force.
- source_word: ἡ Δύναμις τοῦ θεοῦ
  chosen: the power of God
  alternatives:
  - God's power
  lexicon: BDAG
  rationale: The phrase is articular and titular in form. 'The power of God' preserves
    the formal structure and the claim being made about Simon.
- source_word: ἡ καλουμένη Μεγάλη
  chosen: that is called Great
  alternatives:
  - which is called Great
  - called Great
  lexicon: BDAG
  rationale: καλουμένη identifies a designation or title. 'That is called Great' preserves
    the passive naming sense and keeps 'Great' as the claimed epithet.
- source_word: Μεγάλη
  chosen: Great
  alternatives:
  - the Great
  lexicon: BDAG
  rationale: The Greek adjective functions as the title being ascribed to the 'power.'
    English can render this simply as 'Great.' Adding 'the' would be interpretive
    beyond the Greek wording.
