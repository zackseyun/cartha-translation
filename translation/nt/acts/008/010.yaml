theological_decisions:
- issue: Whether the crowd's statement should be rendered as a formal divine title
    or as a descriptive claim about Simon
  chosen_reading: Render as the crowd's claim, 'This man is the power of God that
    is called Great,' without endorsing the claim or capitalizing beyond what the
    quoted speech itself warrants.
  alternative_readings:
  - This is the Great Power of God
  - This man is what is called the Great Power of God
  rationale: The Greek reports what the people were saying about Simon. The translation
    should preserve the content of their attribution without making it sound like
    the narrator affirms it. The chosen wording keeps the quoted claim intact and
    readable while avoiding unnecessary interpretive elevation.
  doctrine_reference: Preserve theological tension rather than resolve it.
