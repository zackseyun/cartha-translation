id: ACT.8.29
reference: Acts 8:29
source:
  edition: SBLGNT
  text: εἶπεν δὲ τὸ πνεῦμα τῷ Φιλίππῳ· Πρόσελθε καὶ κολλήθητι τῷ ἅρματι τούτῳ.
translation:
  text: Then the Spirit said to Philip, “Go over and join this chariot.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Come near and stay close to this chariot.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in narrative. 'Spoke'
    is possible but less idiomatic here with direct discourse following.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    gives natural English flow and reflects the sequential sense in context.
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the Holy Spirit
  lexicon: BDAG
  rationale: In Acts, τὸ πνεῦμα in revelatory guidance contexts commonly refers to
    the Holy Spirit. The Greek here lacks ἅγιον, so 'the Spirit' preserves the wording
    while still conveying the personal divine agent intended by Luke.
- source_word: τῷ Φιλίππῳ
  chosen: to Philip
  lexicon: BDAG
  rationale: Simple dative indirect object; standard transliteration of the personal
    name follows the translation philosophy.
- source_word: Πρόσελθε
  chosen: Go over
  alternatives:
  - Come near
  - Approach
  lexicon: BDAG
  rationale: The aorist imperative of προσέρχομαι calls for movement toward the chariot.
    'Go over' is idiomatic in English and fits the situational context of Philip moving
    toward a nearby vehicle. 'Come near' is more traditional and remains a viable
    alternative.
- source_word: κολλήθητι
  chosen: join
  alternatives:
  - attach yourself to
  - stay close to
  - keep near
  lexicon: BDAG
  rationale: The passive/deponent imperative of κολλάομαι literally conveys being
    joined or attaching oneself closely. In this context, 'join' communicates the
    commanded close association in natural English without over-literal awkwardness.
    The nuance of remaining close is preserved by context and noted in alternatives.
- source_word: τῷ ἅρματι τούτῳ
  chosen: this chariot
  alternatives:
  - that chariot
  lexicon: BDAG
  rationale: ἅρμα is 'chariot' or carriage/vehicle; 'chariot' is the standard and
    contextually appropriate rendering. τούτῳ is proximal ('this'), likely from the
    narrator's vantage in the scene, so 'this chariot' is retained rather than smoothing
    to 'that chariot'.
