theological_decisions:
- issue: Referent of τὸ πνεῦμα
  chosen_reading: the Spirit refers to the Holy Spirit
  alternative_readings:
  - the spirit as a less explicit spiritual prompting
  rationale: Within Acts, divine direction given to believers by 'the Spirit' is a
    recurring motif and is best understood as the Holy Spirit. The translation keeps
    the Greek's exact expression 'the Spirit' rather than expanding to 'the Holy Spirit,'
    preserving both the likely referent and the source wording.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
