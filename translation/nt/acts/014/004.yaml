id: ACT.14.4
reference: Acts 14:4
source:
  edition: SBLGNT
  text: ἐσχίσθη δὲ τὸ πλῆθος τῆς πόλεως, καὶ οἱ μὲν ἦσαν σὺν τοῖς Ἰουδαίοις οἱ δὲ
    σὺν τοῖς ἀποστόλοις.
translation:
  text: But the people of the city were divided, and some were with the Jews and some
    with the apostles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the multitude of the city was split.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσχίσθη
  chosen: were divided
  alternatives:
  - was split
  - was divided
  lexicon: BDAG
  rationale: Passive of σχίζω literally means 'was split/divided.' In idiomatic English
    with collective subject 'the people,' 'were divided' best conveys the social division
    without awkward literalism.
- source_word: τὸ πλῆθος τῆς πόλεως
  chosen: the people of the city
  alternatives:
  - the multitude of the city
  - the crowd of the city
  - the population of the city
  lexicon: BDAG
  rationale: πλῆθος can mean multitude/crowd/large number. Here it refers broadly
    to the city's populace rather than a gathered crowd at one moment, so 'the people
    of the city' is the most natural and contextually accurate rendering.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous verse. 'But'
    appropriately signals the resulting division in response to the prior events.
- source_word: οἱ μὲν ... οἱ δὲ
  chosen: some ... some
  alternatives:
  - some ... others
  - the one group ... the other
  lexicon: BDAG
  rationale: The correlative construction marks two contrasting groups. 'Some ...
    some' is concise and natural in English, preserving the bipartite division.
- source_word: σὺν
  chosen: with
  alternatives:
  - on the side of
  - in support of
  lexicon: BDAG
  rationale: σύν with the dative denotes association. 'With' is the straightforward
    rendering; the context already implies alignment of sides.
- source_word: Ἰουδαίοις
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: In Acts, Ἰουδαῖοι commonly refers to Jews as an identifiable group. Nothing
    in this verse narrows the reference specifically to leaders, and 'Judeans' is
    less likely in this context of social-religious alignment.
- source_word: ἀποστόλοις
  chosen: the apostles
  alternatives:
  - the emissaries
  - the messengers
  lexicon: BDAG
  rationale: ἀπόστολος is well established in Acts as 'apostle.' Here it refers to
    Paul and Barnabas (cf. Acts 14:14), and the traditional term remains both accurate
    and readable.
