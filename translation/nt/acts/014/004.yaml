theological_decisions:
- issue: Reference of 'the apostles'
  chosen_reading: Retain 'the apostles' as the narrative designation for Paul and
    Barnabas.
  alternative_readings:
  - Translate more generically as 'the messengers'
  rationale: Luke later explicitly calls Barnabas and Paul 'the apostles' in this
    chapter (Acts 14:14). Rendering the term directly preserves Luke's wording without
    importing a narrower doctrinal claim beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
