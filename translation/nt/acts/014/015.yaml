id: ACT.14.15
reference: Acts 14:15
source:
  edition: SBLGNT
  text: καὶ λέγοντες· Ἄνδρες, τί ταῦτα ποιεῖτε; καὶ ἡμεῖς ὁμοιοπαθεῖς ἐσμεν ὑμῖν ἄνθρωποι,
    εὐαγγελιζόμενοι ὑμᾶς ἀπὸ τούτων τῶν ματαίων ἐπιστρέφειν ἐπὶ ⸀θεὸν ζῶντα ὃς ἐποίησεν
    τὸν οὐρανὸν καὶ τὴν γῆν καὶ τὴν θάλασσαν καὶ πάντα τὰ ἐν αὐτοῖς·
translation:
  text: and saying, “Men, why are you doing these things? We also are men with the
    same nature as you, bringing you good news to turn from these worthless things
    to the living God, who made the heaven and the earth and the sea and everything
    in them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of like nature with you'; the phrase means that Paul and Barnabas share
      the same human condition as their hearers.
    reason: lexical_alternative
  - marker: b
    text: '''These worthless things'' refers contextually to futile pagan worship,
      including idols.'
    reason: cultural_note
  - marker: c
    text: Or 'the heavens'; Greek has singular 'heaven' in a stock creation formula
      echoing the language of Scripture.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄνδρες
  chosen: Men
  alternatives:
  - Gentlemen
  - Men of Lycaonia
  lexicon: BDAG
  rationale: Vocative plural of ἀνήρ directly addresses the male crowd. Per gender-accurate
    philosophy, 'Men' best matches the source without softening to a more generic
    form.
- source_word: ὁμοιοπαθεῖς
  chosen: with the same nature as
  alternatives:
  - of like nature with
  - with the same feelings as
  - subject to the same human experiences as
  lexicon: BDAG
  rationale: The adjective denotes sharing the same human condition/experience. 'With
    the same nature as you' communicates that Paul and Barnabas are merely human like
    their hearers, fitting the anti-idolatry context. More literal 'of like nature'
    is possible but less natural in modern English.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: BDAG
  rationale: Predicate nominative reinforcing common humanity. 'Men' preserves the
    rhetorical force and parallels the vocative Ἄνδρες, though the sense is 'human
    beings.'
- source_word: εὐαγγελιζόμενοι
  chosen: bringing you good news
  alternatives:
  - preaching the gospel to you
  - announcing good news to you
  lexicon: BDAG
  rationale: The participle explains what Paul and Barnabas are doing. 'Bringing you
    good news' preserves the verbal force and remains accessible modern English without
    importing later ecclesiastical jargon.
- source_word: ματαίων
  chosen: worthless things
  alternatives:
  - vain things
  - empty things
  - idols
  lexicon: BDAG
  rationale: μάταιος means futile, empty, worthless. 'Worthless things' captures the
    evaluative force. 'Idols' is interpretively accurate in context but more specific
    than the Greek wording, which likely refers broadly to futile pagan worship/practices.
- source_word: ἐπιστρέφειν
  chosen: to turn
  alternatives:
  - to turn back
  - to convert
  lexicon: BDAG
  rationale: 'Infinitive of purpose/complement after εὐαγγελιζόμενοι: the good news
    calls them ''to turn'' from idols to God. ''Convert'' is too theologically loaded
    and less transparent.'
- source_word: ἐπὶ θεὸν ζῶντα
  chosen: to the living God
  alternatives:
  - toward the living God
  lexicon: BDAG
  rationale: ἐπί with accusative after ἐπιστρέφειν indicates movement toward. Idiomatic
    English is 'turn ... to the living God.' 'Living' contrasts the true God with
    lifeless idols.
- source_word: ἐποίησεν
  chosen: made
  alternatives:
  - created
  lexicon: BDAG
  rationale: ποιέω here refers to God's creative act. 'Made' is the straightforward
    lexical equivalent and echoes scriptural creation formulas; 'created' is possible
    but slightly more interpretive.
- source_word: τὸν οὐρανὸν
  chosen: the heaven
  alternatives:
  - heaven
  - sky
  lexicon: BDAG
  rationale: Singular οὐρανός is best rendered 'the heaven' here to reflect the Greek
    form in the stock creation formula 'the heaven and the earth.'
- source_word: πάντα τὰ ἐν αὐτοῖς
  chosen: everything in them
  alternatives:
  - all things in them
  - all that is in them
  lexicon: BDAG
  rationale: Natural English rendering of the comprehensive phrase referring to all
    that exists within heaven, earth, and sea.
