id: ACT.14.16
reference: Acts 14:16
source:
  edition: SBLGNT
  text: ὃς ἐν ταῖς παρῳχημέναις γενεαῖς εἴασεν πάντα τὰ ἔθνη πορεύεσθαι ταῖς ὁδοῖς
    αὐτῶν·
translation:
  text: In past generations he allowed all the nations to walk in their own ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'permitted all the Gentiles to go in their ways.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  chosen: he
  alternatives:
  - who
  lexicon: BDAG
  rationale: Although the relative pronoun literally means 'who,' English style in
    this sentence is smoother by continuing the antecedent with 'he.' The referent
    is God from the previous verse.
- source_word: ἐν ταῖς παρῳχημέναις γενεαῖς
  chosen: In past generations
  alternatives:
  - in bygone generations
  - in former generations
  lexicon: BDAG
  rationale: παρῳχημέναις conveys generations that have gone by or passed. 'Past generations'
    is natural modern English and preserves the temporal sense without sounding archaic.
- source_word: εἴασεν
  chosen: allowed
  alternatives:
  - permitted
  - let
  lexicon: BDAG
  rationale: ἐάω means to allow or permit. 'Allowed' is clear, idiomatic, and avoids
    the slightly more formal 'permitted' while preserving the sense of divine non-intervention
    rather than approval.
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: BDAG
  rationale: ἔθνη can mean nations or Gentiles. In this context Paul speaks broadly
    of the non-Jewish peoples of the world across prior generations, and 'all the
    nations' best preserves the collective, ethnic-national scope of the Greek. 'Gentiles'
    is possible but narrows the wording toward a Jewish/non-Jewish contrast not explicit
    in this clause alone.
- source_word: πορεύεσθαι
  chosen: to walk
  alternatives:
  - to go
  - to live
  lexicon: BDAG
  rationale: Though literally 'to go,' in biblical idiom with 'ways' it commonly denotes
    manner of life. 'Walk' preserves the metaphor and intertextual biblical resonance
    better than the flatter 'go' or the more interpretive 'live'.
- source_word: ταῖς ὁδοῖς αὐτῶν
  chosen: in their own ways
  alternatives:
  - in their ways
  - by their own ways
  lexicon: BDAG
  rationale: ὁδοῖς literally means 'ways,' here metaphorically referring to courses
    of conduct. Adding 'own' makes explicit the possessive force of αὐτῶν in idiomatic
    English and highlights that these were the nations' self-directed paths.
