theological_decisions:
- issue: Divine permission versus approval
  chosen_reading: The verse states that God allowed the nations to follow their own
    ways, implying divine forbearance or non-intervention rather than moral approval.
  alternative_readings:
  - God approved the nations' ways
  - God causally determined the nations' ways
  rationale: The verb εἴασεν denotes permitting/allowing. The context in Acts 14:15–17
    contrasts the living God with idolatry and immediately affirms that God nevertheless
    left witness to himself. The translation should preserve the tension of divine
    sovereignty and human responsibility without importing a stronger claim of approval
    or determinism.
  doctrine_reference: Preserve theological tension rather than resolve it.
