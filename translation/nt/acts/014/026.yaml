theological_decisions:
- issue: Nature of the church's prior action toward Paul and Barnabas
  chosen_reading: they had been entrusted to the grace of God
  alternative_readings:
  - they had been commended to the grace of God
  - they had been committed to the grace of God
  rationale: The text describes the Antioch church placing them into God's gracious
    care for their missionary work. 'Entrusted' communicates dependence on divine
    grace without importing a denominational commissioning theology beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
