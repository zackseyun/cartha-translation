id: ACT.14.20
reference: Acts 14:20
source:
  edition: SBLGNT
  text: κυκλωσάντων δὲ ⸂τῶν μαθητῶν αὐτὸν⸃ ἀναστὰς εἰσῆλθεν εἰς τὴν πόλιν. καὶ τῇ
    ἐπαύριον ἐξῆλθεν σὺν τῷ Βαρναβᾷ εἰς Δέρβην.
translation:
  text: But after the disciples had gathered around him, he got up and went into the
    city. And on the next day he went out with Barnabas to Derbe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had surrounded him' or 'had encircled him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he rose.' The Greek can be rendered this way, but here it likely refers
      to Paul getting up physically rather than explicitly describing resurrection.
    reason: alternative_reading
lexical_decisions:
- source_word: κυκλωσάντων
  chosen: had gathered around
  alternatives:
  - had surrounded
  - had encircled
  lexicon: BDAG
  rationale: Aorist participle of κυκλόω literally denotes surrounding or encircling.
    In this narrative context, 'gathered around' is natural modern English and does
    not imply hostility, whereas 'surrounded' could sound threatening. The sense of
    the disciples forming a circle around Paul is preserved.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild development or contrast with the previous verse, where
    Paul had been stoned and dragged out of the city. 'But' appropriately signals
    the surprising turn without overstating the contrast.
- source_word: τῶν μαθητῶν
  chosen: the disciples
  alternatives:
  - the followers
  lexicon: BDAG
  rationale: μαθητής is regularly rendered 'disciple' in Acts, and consistency favors
    that established gloss here.
- source_word: ἀναστὰς
  chosen: he got up
  alternatives:
  - he rose
  - he stood up
  lexicon: BDAG
  rationale: The participle from ἀνίστημι here describes Paul's physical action after
    being left for dead. 'Got up' is idiomatic modern English and avoids importing
    a resurrection nuance that 'rose' might suggest in English.
- source_word: εἰσῆλθεν εἰς τὴν πόλιν
  chosen: went into the city
  alternatives:
  - entered the city
  lexicon: BDAG
  rationale: Both are accurate for εἰσέρχομαι with εἰς. 'Went into the city' reads
    smoothly in sequence with the participle and keeps the motion explicit.
- source_word: τῇ ἐπαύριον
  chosen: on the next day
  alternatives:
  - the next day
  - on the following day
  lexicon: BDAG
  rationale: This dative temporal expression means 'on the next day.' The preposition
    is supplied naturally in English.
- source_word: ἐξῆλθεν
  chosen: he went out
  alternatives:
  - he departed
  - he left
  lexicon: BDAG
  rationale: ἐξέρχομαι literally means 'go out.' Since the destination 'to Derbe'
    follows, 'went out' preserves the directional force while remaining natural.
- source_word: σὺν τῷ Βαρναβᾷ
  chosen: with Barnabas
  alternatives:
  - together with Barnabas
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With Barnabas' is the clearest
    concise rendering.
- source_word: Δέρβην
  chosen: Derbe
  lexicon: BDAG
  rationale: Standard English transliteration of the place name, in keeping with the
    philosophy of transliterating names.
