theological_decisions:
- issue: Whether ἀναστὰς should be rendered in a way that suggests resurrection or
    miraculous revival
  chosen_reading: 'Rendered as a straightforward physical action: ''he got up'''
  alternative_readings:
  - he rose
  - he was raised up
  rationale: The Greek participle ἀναστὰς by itself commonly means 'having arisen/gotten
    up.' While the broader context may imply a remarkable recovery after stoning,
    this verse does not explicitly state a resurrection or miraculous raising. To
    preserve theological restraint and avoid importing claims the text does not make,
    the translation uses the ordinary narrative sense.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
