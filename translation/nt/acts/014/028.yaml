id: ACT.14.28
reference: Acts 14:28
source:
  edition: SBLGNT
  text: διέτριβον ⸀δὲ χρόνον οὐκ ὀλίγον σὺν τοῖς μαθηταῖς.
translation:
  text: And they stayed with the disciples for no little time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''for a considerable time'' or ''for quite some
      time.'' The Greek uses a litotes: ''not a little time.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: διέτριβον
  chosen: they stayed
  alternatives:
  - they spent time
  - they remained
  lexicon: BDAG
  rationale: The imperfect of διατρίβω here denotes continuing to spend or pass time
    in a place. 'They stayed' is natural modern English and preserves the durative
    sense without over-paraphrasing.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' best carries the simple narrative continuation
    in readable English.
- source_word: χρόνον οὐκ ὀλίγον
  chosen: for no little time
  alternatives:
  - for a considerable time
  - for quite some time
  lexicon: BDAG
  rationale: This is a litotic expression meaning a significant duration. 'For no
    little time' preserves Luke's rhetorical form more closely than a fully smoothed
    idiom, while remaining understandable in modern English.
- source_word: σὺν τοῖς μαθηταῖς
  chosen: with the disciples
  alternatives:
  - among the disciples
  lexicon: BDAG
  rationale: σύν with the dative straightforwardly means 'with.' 'The disciples' most
    naturally refers to the local body of believers in context.
