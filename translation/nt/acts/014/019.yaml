id: ACT.14.19
reference: Acts 14:19
source:
  edition: SBLGNT
  text: Ἐπῆλθαν δὲ ἀπὸ Ἀντιοχείας καὶ Ἰκονίου Ἰουδαῖοι, καὶ πείσαντες τοὺς ὄχλους
    καὶ λιθάσαντες τὸν Παῦλον ἔσυρον ἔξω τῆς πόλεως, ⸀νομίζοντες αὐτὸν τεθνηκέναι.
translation:
  text: But Jews came from Antioch and Iconium, and after persuading the crowds and
    stoning Paul, they dragged him outside the city, supposing that he was dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thinking that he had died.' The Greek states their assumption, not explicitly
      that Paul actually died.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπῆλθαν
  chosen: came
  alternatives:
  - arrived
  - came upon
  lexicon: BDAG
  rationale: Aorist of ἐπέρχομαι here introduces the arrival of hostile opponents
    from other cities. 'Came' is natural English and fits the narrative flow better
    than the more wooden 'came upon,' which can imply sudden assault rather than travel
    and arrival.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a development with mild contrast from the previous favorable
    response to Paul. 'But' best captures the adversative turn in context.
- source_word: Ἰουδαῖοι
  chosen: Jews
  alternatives:
  - Jewish people
  - Judeans
  lexicon: BDAG
  rationale: In Acts this term commonly denotes Jewish opponents or Jewish people
    generally, not specifically residents of Judea. 'Jews' is the most direct and
    contextually appropriate rendering here.
- source_word: πείσαντες τοὺς ὄχλους
  chosen: after persuading the crowds
  alternatives:
  - having won over the crowds
  - after convincing the crowds
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb and indicates means
    or prior action. 'After persuading' preserves the sequence and the causal force
    without overinterpreting the manner.
- source_word: ὄχλους
  chosen: the crowds
  alternatives:
  - the people
  - the multitudes
  lexicon: BDAG
  rationale: ὄχλος in Acts usually refers to gathered crowds. 'Crowds' is idiomatic
    modern English and preserves the plural.
- source_word: λιθάσαντες
  chosen: stoning
  alternatives:
  - after stoning
  - having stoned
  lexicon: BDAG
  rationale: The participle is coordinated with πείσαντες before the main verb ἔσυρον.
    Rendering it as 'stoning' in the English participial chain keeps the Greek sequence
    compact and readable; the sense still implies prior action relative to the dragging.
- source_word: ἔσυρον
  chosen: they dragged
  alternatives:
  - they were dragging
  - they hauled
  lexicon: BDAG
  rationale: Imperfect of σύρω portrays the action in progress. English simple past
    is the most natural narrative rendering here; 'dragged' conveys the violence clearly
    without unnecessary aspectual awkwardness.
- source_word: ἔξω τῆς πόλεως
  chosen: outside the city
  alternatives:
  - out of the city
  lexicon: BDAG
  rationale: This phrase denotes location reached by the dragging. 'Outside the city'
    is idiomatic and clear in English.
- source_word: νομίζοντες
  chosen: supposing
  alternatives:
  - thinking
  - assuming
  lexicon: BDAG
  rationale: The participle gives the reason for their dragging him away. 'Supposing'
    preserves the inferential sense without implying certainty.
- source_word: τεθνηκέναι
  chosen: that he was dead
  alternatives:
  - him to have died
  - that he had died
  lexicon: BDAG
  rationale: Perfect infinitive of θνῄσκω indicates a resultant state from dying.
    'That he was dead' is the most natural English expression of the state they believed
    Paul to be in.
