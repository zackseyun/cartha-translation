theological_decisions:
- issue: Whether the text states that Paul actually died or only that his attackers
    believed he had died
  chosen_reading: 'The main text preserves the attackers'' perception only: ''supposing
    that he was dead.'''
  alternative_readings:
  - Some interpreters infer that Paul truly died and was later revived, but the verse
    itself does not explicitly say this.
  rationale: The Greek explicitly reports the opponents' assumption (νομίζοντες αὐτὸν
    τεθνηκέναι) rather than narrating Paul's actual death. To preserve theological
    tension and avoid importing a stronger claim than the text makes, the translation
    states only their supposition.
  doctrine_reference: Preserve theological tension rather than resolve it.
