theological_decisions:
- issue: Sense of πίστις with article
  chosen_reading: the faith
  alternative_readings:
  - faith
  rationale: The article τῇ suggests a definite referent, likely the Christian faith
    in which the disciples are to continue, rather than faith considered only as a
    subjective act. This preserves the text's communal and doctrinal sense without
    overstating later technical usage.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table
    for πίστις'
- issue: Force of δεῖ
  chosen_reading: we must enter into the kingdom of God through many afflictions
  alternative_readings:
  - it is necessary for us to enter into the kingdom of God through many afflictions
  rationale: The verse states necessity without specifying its metaphysical mechanism.
    Rendering δεῖ as 'must' preserves the text's force while avoiding doctrinal expansion
    about predestination, merit, or the exact nature of suffering.
  doctrine_reference: 'DOCTRINE.md Affirmations; Translation philosophy #3'
