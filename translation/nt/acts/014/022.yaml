id: ACT.14.22
reference: Acts 14:22
source:
  edition: SBLGNT
  text: ἐπιστηρίζοντες τὰς ψυχὰς τῶν μαθητῶν, παρακαλοῦντες ἐμμένειν τῇ πίστει καὶ
    ὅτι διὰ πολλῶν θλίψεων δεῖ ἡμᾶς εἰσελθεῖν εἰς τὴν βασιλείαν τοῦ θεοῦ.
translation:
  text: strengthening the souls of the disciples, encouraging them to remain in the
    faith, and that through many afflictions we must enter into the kingdom of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through many tribulations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'remain in faith.' The Greek can be read more generally, though the article
      favors 'the faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστηρίζοντες
  chosen: strengthening
  alternatives:
  - strengthening firmly
  - establishing
  - strengthening further
  lexicon: BDAG
  rationale: Present participle describing ongoing action by Paul and Barnabas. 'Strengthening'
    is natural English and preserves the sense of making firm without overinterpreting
    as formal establishment.
- source_word: ψυχὰς
  chosen: souls
  alternatives:
  - lives
  - inner selves
  lexicon: BDAG
  rationale: ψυχή here refers to the inner life/personhood of the disciples. 'Souls'
    preserves the lexical form and spiritual weight better than the flatter 'lives,'
    while not requiring a dualistic reading.
- source_word: μαθητῶν
  chosen: disciples
  alternatives:
  - learners
  - followers
  lexicon: BDAG
  rationale: Standard NT term for committed followers; 'disciples' is both accurate
    and established in readable modern English.
- source_word: παρακαλοῦντες
  chosen: encouraging
  alternatives:
  - exhorting
  - urging
  - comforting
  lexicon: BDAG
  rationale: παρακαλέω can range from comfort to exhortation. In this context, with
    the infinitive ἐμμένειν and the following statement about tribulations, 'encouraging'
    best captures supportive exhortation in accessible English.
- source_word: ἐμμένειν
  chosen: to remain
  alternatives:
  - to continue
  - to persist
  lexicon: BDAG
  rationale: The verb means to continue in or remain with. 'Remain' fits well with
    the dative τῇ πίστει and communicates steadfast continuance.
- source_word: πίστει
  chosen: the faith
  alternatives:
  - faith
  - the trust
  lexicon: BDAG
  rationale: 'Although πίστις defaults to ''faith,'' the article here supports a more
    definite sense: remaining in the Christian faith. This is not the contested pistis-Christou
    construction, so no doctrinal footnote is required.'
- source_word: διὰ πολλῶν θλίψεων
  chosen: through many afflictions
  alternatives:
  - through many tribulations
  - through many troubles
  lexicon: BDAG
  rationale: θλῖψις denotes pressure, distress, or tribulation. 'Afflictions' is clear
    modern English and preserves the gravity of suffering without sounding archaic.
- source_word: δεῖ
  chosen: we must
  alternatives:
  - it is necessary for us
  - it is necessary that we
  lexicon: BDAG
  rationale: Impersonal necessity is idiomatically rendered 'we must.' This preserves
    the force of divine/necessary obligation without adding an explicit subject not
    present in Greek.
- source_word: εἰσελθεῖν
  chosen: enter into
  alternatives:
  - enter
  - go into
  lexicon: BDAG
  rationale: Aorist infinitive of entry. 'Enter into' reflects the motion toward the
    kingdom and reads naturally after 'must.'
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Traditional and accurate rendering preserving both the concrete and reign-related
    dimensions of βασιλεία. 'Kingdom of God' remains the clearest standard expression
    in this context.
