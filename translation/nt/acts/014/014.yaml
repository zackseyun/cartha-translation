theological_decisions:
- issue: Reference of 'the apostles' to Barnabas and Paul
  chosen_reading: Retain 'the apostles Barnabas and Paul' as the text states, without
    narrowing the term or adding explanation in the main text.
  alternative_readings:
  - Render more loosely as 'Barnabas and Paul, the apostles'
  - Interpret 'apostles' in a broader commissioned sense rather than restricting it
    to the Twelve
  rationale: The Greek apposition straightforwardly identifies Barnabas and Paul with
    'the apostles' in this context. The translation should preserve the wording without
    importing later doctrinal debates about the scope of apostleship.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
