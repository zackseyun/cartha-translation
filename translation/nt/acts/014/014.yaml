id: ACT.14.14
reference: Acts 14:14
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ οἱ ἀπόστολοι Βαρναβᾶς καὶ Παῦλος, διαρρήξαντες τὰ ἱμάτια ⸀αὐτῶν
    ⸀ἐξεπήδησαν εἰς τὸν ὄχλον κράζοντες
translation:
  text: But when the apostles Barnabas and Paul heard, they tore their garments and
    rushed out into the crowd, crying out,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tearing one's garments was a customary sign of grief, horror, or protest
      against blasphemous honor.
    reason: cultural_note
  - marker: b
    text: Or 'sprang out into the crowd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - having heard
  - on hearing
  lexicon: BDAG
  rationale: Aorist participle with temporal force in context; 'when ... heard' is
    natural English while preserving the sequence of action.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild contrast/transition from the crowd's attempted sacrifice
    to the apostles' reaction; 'But' best captures the discourse turn.
- source_word: ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Acts this term commonly designates commissioned emissaries of Jesus;
    'apostles' preserves the established sense and narrative role.
- source_word: διαρρήξαντες τὰ ἱμάτια αὐτῶν
  chosen: they tore their garments
  alternatives:
  - they ripped their clothes
  - having torn their robes
  lexicon: BDAG
  rationale: Idiomatic expression of grief/horror in Jewish practice. 'Garments' is
    slightly more formal than 'clothes' and fits the cultural action without over-paraphrase.
- source_word: ἐξεπήδησαν
  chosen: rushed out
  alternatives:
  - sprang out
  - jumped out
  - burst out
  lexicon: BDAG
  rationale: The verb conveys sudden, forceful movement. 'Rushed out' communicates
    urgency in clear modern English better than the more literal but potentially awkward
    'sprang out.'
- source_word: εἰς τὸν ὄχλον
  chosen: into the crowd
  alternatives:
  - among the crowd
  - into the multitude
  lexicon: BDAG
  rationale: εἰς with ὄχλος indicates movement into the mass of people. 'Crowd' is
    the most natural modern rendering.
- source_word: κράζοντες
  chosen: crying out
  alternatives:
  - shouting
  - calling out
  lexicon: BDAG
  rationale: Present participle indicates accompanying action and sustained loud speech.
    'Crying out' preserves the intensity without specifying content yet, which follows
    in the next verse.
- source_word: Βαρναβᾶς καὶ Παῦλος
  chosen: Barnabas and Paul
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
