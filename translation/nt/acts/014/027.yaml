theological_decisions:
- issue: Meaning of μετ’ αὐτῶν in describing God's action
  chosen_reading: God had done with them
  alternative_readings:
  - God had done through them
  - God had done among them
  rationale: 'The translation preserves the Greek preposition μετά (''with'') rather
    than resolving it into stronger instrumental language. This maintains theological
    modesty about apostolic agency: God is the actor, and Paul and Barnabas are associated
    with his work.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering ἔθνεσιν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In this narrative context the emphasis is on the inclusion of non-Jews
    in the people of God, not on nation-states. 'Gentiles' best reflects the theological
    and narrative force without importing extra claims.
