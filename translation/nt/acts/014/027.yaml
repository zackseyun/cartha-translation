id: ACT.14.27
reference: Acts 14:27
source:
  edition: SBLGNT
  text: παραγενόμενοι δὲ καὶ συναγαγόντες τὴν ἐκκλησίαν ⸀ἀνήγγελλον ὅσα ἐποίησεν ὁ
    θεὸς μετ’ αὐτῶν καὶ ὅτι ἤνοιξεν τοῖς ἔθνεσιν θύραν πίστεως.
translation:
  text: And when they arrived and gathered the church together, they reported all
    that God had done with them, and that he had opened a door of faith to the Gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that God had done through them.' The Greek more literally says 'with
      them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'opened to the nations a door of faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενοι
  chosen: when they arrived
  alternatives:
  - having arrived
  - after they arrived
  lexicon: BDAG
  rationale: Aorist participle introducing attendant circumstance prior to the main
    verb. 'When they arrived' is natural English and preserves the temporal sense
    without awkwardness.
- source_word: συναγαγόντες τὴν ἐκκλησίαν
  chosen: gathered the church together
  alternatives:
  - assembled the church
  - gathered the congregation
  lexicon: BDAG
  rationale: The participle is coordinated with παραγενόμενοι and refers to convening
    the local Christian assembly. 'Church' is the standard rendering for ἐκκλησία
    in Acts; 'together' reflects the gathering action idiomatically.
- source_word: ἀνήγγελλον
  chosen: they reported
  alternatives:
  - they announced
  - they told
  lexicon: BDAG
  rationale: Imperfect verb describing their recounting to the church. 'Reported'
    fits the missionary-update context better than the more formal 'announced' and
    better preserves the sense than the generic 'told'.
- source_word: ὅσα
  chosen: all that
  alternatives:
  - what things
  - everything that
  lexicon: BDAG
  rationale: Idiomatic English rendering of the neuter plural relative pronoun introducing
    the content of the report.
- source_word: ἐποίησεν ὁ θεὸς μετ’ αὐτῶν
  chosen: God had done with them
  alternatives:
  - God had done through them
  - God had done among them
  lexicon: BDAG
  rationale: μετά with genitive is most directly 'with.' In this context it conveys
    God's working in association with Paul and Barnabas. 'With them' preserves the
    Greek wording and avoids over-interpreting agency as 'through them,' though that
    nuance is possible.
- source_word: ἤνοιξεν
  chosen: he had opened
  alternatives:
  - he opened
  lexicon: BDAG
  rationale: Aorist in reported speech referring to a completed divine action. Pluperfect
    English fits the retrospective report in context.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts this term commonly denotes non-Jews rather than nations in a
    geopolitical sense. 'Gentiles' best communicates the Jew/Gentile distinction central
    to the narrative.
- source_word: θύραν πίστεως
  chosen: a door of faith
  alternatives:
  - a door for faith
  - the door of faith
  lexicon: BDAG
  rationale: Retains the metaphor and the genitival construction without flattening
    it. 'A door of faith' naturally conveys an opening into the sphere or response
    of faith.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the phrase is not the contested pistis-Christou construction, so no theological
    ambiguity requires elevation in the main text.
