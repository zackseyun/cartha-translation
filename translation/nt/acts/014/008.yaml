id: ACT.14.8
reference: Acts 14:8
source:
  edition: SBLGNT
  text: Καί τις ἀνὴρ ⸂ἀδύνατος ἐν Λύστροις⸃ τοῖς ποσὶν ἐκάθητο, χωλὸς ἐκ κοιλίας μητρὸς
    ⸀αὐτοῦ, ὃς οὐδέποτε ⸀περιεπάτησεν.
translation:
  text: And in Lystra a certain man was sitting there, powerless in his feet, lame
    from his mother's womb, who had never walked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without strength in his feet.' The Greek emphasizes lack of strength
      before stating explicitly that he was lame.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καί
  chosen: And
  alternatives:
  - Now
  lexicon: BDAG
  rationale: Retained as a simple connective linking this scene to the preceding narrative.
    'And' is the most straightforward narrative continuation.
- source_word: τις ἀνὴρ
  chosen: a certain man
  alternatives:
  - a man
  - someone, a man
  lexicon: BDAG
  rationale: The combination often introduces a particular but unnamed individual.
    'A certain man' preserves the indefiniteness plus narrative specificity better
    than simply 'a man.'
- source_word: ἀδύνατος ... τοῖς ποσίν
  chosen: powerless in his feet
  alternatives:
  - without strength in his feet
  - crippled in his feet
  - weak in his feet
  lexicon: BDAG
  rationale: ἀδύνατος literally denotes lack of power/strength. Rendering it as 'powerless
    in his feet' preserves the lexical sense and avoids collapsing it too quickly
    into the later adjective χωλός, which already states that he was lame. This keeps
    Luke's layered description.
- source_word: ἐν Λύστροις
  chosen: in Lystra
  alternatives: []
  lexicon: BDAG
  rationale: Standard transliteration of the place name. Although the Greek form is
    plural, idiomatic English uses the singular place name 'Lystra.'
- source_word: ἐκάθητο
  chosen: was sitting there
  alternatives:
  - sat
  - was sitting
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing state rather than simple punctiliar
    action. 'Was sitting there' conveys the scene-setting force naturally in English;
    'there' is implicit from the narrative setting and idiomatic in English.
- source_word: χωλός
  chosen: lame
  alternatives:
  - crippled
  lexicon: BDAG
  rationale: '''Lame'' is the standard, accurate, and suitably neutral rendering for
    physical inability to walk properly. It avoids potentially harsher modern connotations
    of ''crippled.'''
- source_word: ἐκ κοιλίας μητρὸς αὐτοῦ
  chosen: from his mother's womb
  alternatives:
  - from birth
  - from his mother's belly
  lexicon: BDAG
  rationale: This is a conventional idiom for congenital condition. 'From his mother's
    womb' preserves the vivid source-language expression more closely than the more
    interpretive 'from birth.'
- source_word: οὐδέποτε περιεπάτησεν
  chosen: had never walked
  alternatives:
  - never walked
  lexicon: BDAG
  rationale: 'English past perfect fits the narrative background description: his
    lifelong condition up to that point was that he had never walked.'
