id: ACT.14.11
reference: Acts 14:11
source:
  edition: SBLGNT
  text: οἵ ⸀τε ὄχλοι ἰδόντες ὃ ⸀ἐποίησεν Παῦλος ἐπῆραν τὴν φωνὴν αὐτῶν Λυκαονιστὶ
    λέγοντες· Οἱ θεοὶ ὁμοιωθέντες ἀνθρώποις κατέβησαν πρὸς ἡμᾶς
translation:
  text: And when the crowds saw what Paul had done, they raised their voices, saying
    in the Lycaonian language, “The gods have come down to us in the likeness of men!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The gods, having become like men, have come down to us”; Greek “having
      been made like men.”
    reason: lexical_alternative
  - marker: b
    text: Or simply “in Lycaonian.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε ὄχλοι
  chosen: And when the crowds
  alternatives:
  - Then the crowds
  - And the crowds
  lexicon: BDAG
  rationale: οἵ with τέ marks continuation, and ὄχλοι is plural. Rendering with an
    initial connective plus temporal framing from the participle that follows gives
    natural English while preserving discourse flow.
- source_word: ἰδόντες
  chosen: when ... saw
  alternatives:
  - having seen
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle of ὁράω is most naturally temporal here, introducing
    the circumstance for the main action. 'When ... saw' is idiomatic English and
    preserves the sequence.
- source_word: ὃ ἐποίησεν Παῦλος
  chosen: what Paul had done
  alternatives:
  - what Paul did
  lexicon: BDAG
  rationale: The relative clause refers to the miracle just performed. English past
    perfect fits the narrative sequence after the participle and before the main verb,
    though simple past would also be possible.
- source_word: ἐπῆραν τὴν φωνὴν αὐτῶν
  chosen: they raised their voices
  alternatives:
  - they lifted up their voice
  - they shouted
  lexicon: BDAG
  rationale: This is an idiom meaning to cry out loudly. 'Raised their voices' preserves
    the metaphor without becoming wooden; 'shouted' is possible but slightly more
    interpretive.
- source_word: Λυκαονιστί
  chosen: in the Lycaonian language
  alternatives:
  - in Lycaonian
  lexicon: BDAG
  rationale: The adverb denotes speaking in the Lycaonian tongue. Expanding to 'language'
    makes the sense explicit for modern readers.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - crying out
  - declaring
  lexicon: BDAG
  rationale: Standard participial speech introduction; 'saying' is sufficient and
    least interpretive.
- source_word: Οἱ θεοὶ
  chosen: The gods
  lexicon: BDAG
  rationale: Plural θεοί clearly refers to pagan deities in the crowd's exclamation,
    not the true God.
- source_word: ὁμοιωθέντες ἀνθρώποις
  chosen: in the likeness of men
  alternatives:
  - having become like men
  - made like men
  - in human form
  lexicon: BDAG
  rationale: 'Aorist passive participle of ὁμοιόω with dative ἀνθρώποις expresses
    resemblance: the gods are perceived as having taken on human likeness. ''In the
    likeness of men'' is clear and preserves the form/language of resemblance without
    overcommitting to incarnation language.'
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural but here contrasts gods with
    humans generally. 'Men' preserves the source's form and the idiomatic expression
    'in the likeness of men'; a more inclusive alternative is possible but less idiomatic
    in this exclamation.
- source_word: κατέβησαν πρὸς ἡμᾶς
  chosen: have come down to us
  alternatives:
  - came down to us
  - have descended to us
  lexicon: BDAG
  rationale: καταβαίνω means 'come down' or 'descend.' Present perfect in English
    gives vividness to the crowd's excited declaration, though the Greek aorist is
    simple past. 'Come down' is more natural than 'descended' in direct speech.
