theological_decisions:
- issue: Rendering the crowd's pagan interpretation without importing Christian incarnational
    theology
  chosen_reading: The gods have come down to us in the likeness of men
  alternative_readings:
  - The gods, having become like men, have come down to us
  - The gods have come down to us in human form
  rationale: The verse reports the mistaken belief of the Lystran crowd. The translation
    should preserve their claim as pagan speech without using wording that too strongly
    evokes orthodox Christological categories. 'In the likeness of men' reflects the
    participle ὁμοιωθέντες and keeps the statement descriptive rather than doctrinal.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
