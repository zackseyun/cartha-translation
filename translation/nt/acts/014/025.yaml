id: ACT.14.25
reference: Acts 14:25
source:
  edition: SBLGNT
  text: καὶ λαλήσαντες ἐν Πέργῃ τὸν λόγον κατέβησαν εἰς Ἀττάλειαν,
translation:
  text: And after speaking the word in Perga, they went down to Attalia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having spoken the word in Perga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλήσαντες
  chosen: after speaking
  alternatives:
  - having spoken
  - after proclaiming
  lexicon: BDAG
  rationale: 'Aorist active participle, nominative plural, is best rendered as an
    antecedent action relative to the main verb: ''after speaking.'' ''Having spoken''
    is more formally literal but less natural in modern English. ''Proclaiming'' is
    possible in context, but λαλέω is broader than explicit heralding language and
    does not require that stronger nuance here.'
- source_word: τὸν λόγον
  chosen: the word
  alternatives:
  - the message
  - the word of the Lord
  lexicon: BDAG
  rationale: λόγος here refers to the preached Christian message. 'The word' preserves
    the idiomatic early Christian expression and is sufficiently clear in context.
    'The message' is possible but slightly flattens the recurring Lucan phrasing.
    'The word of the Lord' is not in the Greek text and should not be imported.
- source_word: ἐν Πέργῃ
  chosen: in Perga
  alternatives:
  - at Perga
  lexicon: BDAG
  rationale: ἐν with a city name is naturally rendered 'in Perga.' 'At Perga' is possible
    in English but less directly reflects the preposition.
- source_word: κατέβησαν
  chosen: they went down
  alternatives:
  - they came down
  - they traveled down
  lexicon: BDAG
  rationale: καταβαίνω commonly means 'go down' or 'come down.' 'Went down' fits the
    narrative perspective without implying motion toward the speaker. It may reflect
    descent from inland Perga to coastal Attalia, and the simple wording preserves
    that geographical sense.
- source_word: εἰς Ἀττάλειαν
  chosen: to Attalia
  alternatives:
  - into Attalia
  lexicon: BDAG
  rationale: εἰς with a destination is idiomatically 'to Attalia.' 'Into' is more
    wooden and unnecessary with a city name.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: καί here continues the travel narrative. 'And' preserves the straightforward
    connective force without adding temporal nuance beyond what the Greek states.
