id: ACT.14.18
reference: Acts 14:18
source:
  edition: SBLGNT
  text: καὶ ταῦτα λέγοντες μόλις κατέπαυσαν τοὺς ὄχλους τοῦ μὴ θύειν αὐτοῖς.
translation:
  text: Even by saying these things, they barely restrained the crowds from sacrificing
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And saying these things, they scarcely stopped the crowds from offering
      sacrifice to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: Even
  alternatives:
  - And
  lexicon: BDAG
  rationale: Here καί is rendered with slight concessive/emphatic force in context
    ('even'), smoothing the connection with the previous verse and reflecting that
    despite these words, the result was only partial. 'And' is possible but less natural
    in English.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: Plural demonstrative, referring to the preceding statements by Paul and
    Barnabas. 'These things' preserves the plural form more closely than the idiomatic
    singular 'this'.
- source_word: λέγοντες
  chosen: by saying
  alternatives:
  - saying
  - while saying
  - as they were saying
  lexicon: BDAG
  rationale: The present participle is adverbial, expressing attendant means/circumstance.
    'By saying' communicates that their speech was the means by which they restrained
    the crowds, while remaining natural English.
- source_word: μόλις
  chosen: barely
  alternatives:
  - with difficulty
  - scarcely
  lexicon: BDAG
  rationale: μόλις conveys difficulty or near failure. 'Barely' is concise, natural
    modern English, and preserves the sense that they only just succeeded.
- source_word: κατέπαυσαν
  chosen: restrained
  alternatives:
  - stopped
  - prevented
  - quieted
  lexicon: BDAG
  rationale: καταπαύω here means to cause to cease from an intended action. 'Restrained'
    fits the object 'the crowds' and the following infinitive construction, conveying
    that they held them back from acting. 'Stopped' is possible but less precise with
    the personal object.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: Plural in Greek, so 'the crowds' is retained. This reflects the gathered
    populace more accurately than smoothing to singular.
- source_word: τοῦ μὴ θύειν
  chosen: from sacrificing
  alternatives:
  - so that they would not sacrifice
  - from offering sacrifice
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses prevention from an action.
    'From sacrificing' is the most natural English equivalent. Because θύω commonly
    refers to sacrificial offering, 'sacrificing' preserves the cultic sense.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: Dative pronoun referring to Paul and Barnabas as the intended recipients/honorees
    of the sacrifice. 'To them' is the most straightforward rendering in English for
    this context.
