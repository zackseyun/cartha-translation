id: ACT.14.6
reference: Acts 14:6
source:
  edition: SBLGNT
  text: συνιδόντες κατέφυγον εἰς τὰς πόλεις τῆς Λυκαονίας Λύστραν καὶ Δέρβην καὶ τὴν
    περίχωρον,
translation:
  text: when they learned of it, they fled to the cities of Lycaonia—Lystra and Derbe—and
    the surrounding region,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they realized this' or 'when they became aware of it.' The Greek
      participle indicates coming to understand the danger described in the previous
      verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιδόντες
  chosen: when they learned of it
  alternatives:
  - realizing this
  - becoming aware of it
  - perceiving it
  lexicon: BDAG
  rationale: The aorist participle of συνοράω here conveys coming to understand or
    becoming aware of the situation described in the previous verse. English needs
    an object supplied from context ('of it/this'). 'Learned of it' is natural modern
    English and captures the ingressive sense without over-paraphrasing.
- source_word: κατέφυγον
  chosen: they fled
  alternatives:
  - they took refuge
  - they escaped
  lexicon: BDAG
  rationale: καταφεύγω can mean flee for refuge. In this narrative context, the emphasis
    is on urgent departure in response to danger, so 'they fled' is the clearest rendering.
    'Took refuge' is possible but less direct in English here.
- source_word: εἰς
  chosen: to
  alternatives:
  - into
  lexicon: BDAG
  rationale: With verbs of motion, εἰς commonly marks destination. 'To' is idiomatic
    English with city names.
- source_word: τὰς πόλεις τῆς Λυκαονίας
  chosen: the cities of Lycaonia
  alternatives:
  - the Lycaonian cities
  - the cities in Lycaonia
  lexicon: BDAG
  rationale: 'The genitive is most straightforwardly rendered as a regional genitive:
    cities belonging to/in Lycaonia. ''The cities of Lycaonia'' preserves the structure
    and prepares for the appositional naming of the two cities.'
- source_word: Λύστραν καὶ Δέρβην
  chosen: Lystra and Derbe
  lexicon: BDAG
  rationale: Standard English transliterations of the place names. They stand in apposition
    to 'the cities of Lycaonia.'
- source_word: τὴν περίχωρον
  chosen: the surrounding region
  alternatives:
  - the surrounding area
  - the neighboring countryside
  lexicon: BDAG
  rationale: περίχωρος here functions substantivally for the area around the named
    cities. 'The surrounding region' is clear, natural, and broad enough to include
    both urban and rural environs.
- source_word: καὶ ... καὶ
  chosen: —Lystra and Derbe—and
  alternatives:
  - ', namely Lystra and Derbe, and'
  - Lystra and Derbe, and also
  lexicon: Greek grammar
  rationale: The repeated καί links the appositional city names and then adds the
    surrounding region. Em dashes help modern readers see that 'Lystra and Derbe'
    identifies the cities just mentioned.
