id: ACT.14.1
reference: Acts 14:1
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ἐν Ἰκονίῳ κατὰ τὸ αὐτὸ εἰσελθεῖν αὐτοὺς εἰς τὴν συναγωγὴν τῶν Ἰουδαίων
    καὶ λαλῆσαι οὕτως ὥστε πιστεῦσαι Ἰουδαίων τε καὶ Ἑλλήνων πολὺ πλῆθος.
translation:
  text: Now in Iconium they entered together into the synagogue of the Jews and spoke
    in such a way that a great multitude of both Jews and Greeks believed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the Jewish synagogue.' The Greek reads literally 'into the synagogue
      of the Jews.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δὲ
  chosen: Now
  alternatives:
  - And it happened
  - Then
  lexicon: BDAG
  rationale: The idiom ἐγένετο δέ often functions as a narrative transition rather
    than emphasizing the event of 'happening' itself. 'Now' preserves the discourse
    shift in natural English without woodenly reproducing the Semitic-style formula.
- source_word: ἐν Ἰκονίῳ
  chosen: in Iconium
  lexicon: BDAG
  rationale: Straightforward locative phrase; the place name is transliterated per
    translation philosophy.
- source_word: κατὰ τὸ αὐτό
  chosen: together
  alternatives:
  - in the same way
  - as before
  lexicon: BDAG
  rationale: In this idiom the phrase most naturally conveys joint action by Paul
    and Barnabas. 'Together' is concise and fits the context better than a more literal
    but obscure rendering.
- source_word: εἰσελθεῖν αὐτοὺς
  chosen: they entered
  alternatives:
  - they went in
  lexicon: BDAG
  rationale: The infinitive depends on the narrative construction with ἐγένετο; idiomatic
    English converts it to a finite verb. 'Entered' is slightly more formal and suits
    the movement into the synagogue.
- source_word: εἰς τὴν συναγωγὴν τῶν Ἰουδαίων
  chosen: into the synagogue of the Jews
  alternatives:
  - into the Jewish synagogue
  - into the synagogue
  lexicon: BDAG
  rationale: The genitive τῶν Ἰουδαίων is retained explicitly. 'Synagogue of the Jews'
    closely reflects the Greek while remaining clear. 'Jewish synagogue' is possible
    but slightly more interpretive.
- source_word: λαλῆσαι
  chosen: spoke
  alternatives:
  - spoke there
  - addressed them
  lexicon: BDAG
  rationale: λαλέω here denotes speaking/proclaiming. 'Spoke' is the most direct and
    least interpretive rendering.
- source_word: οὕτως ὥστε
  chosen: in such a way that
  alternatives:
  - so that
  - with the result that
  lexicon: BDAG
  rationale: This combination expresses manner with resulting effect. 'In such a way
    that' preserves both the manner and the outcome more fully than the shorter 'so
    that.'
- source_word: πιστεῦσαι
  chosen: believed
  alternatives:
  - came to faith
  - believed the message
  lexicon: BDAG
  rationale: The aorist infinitive after ὥστε indicates the result that they believed.
    The default rendering for the πιστ- word group is 'faith/believe' unless context
    requires otherwise.
- source_word: Ἰουδαίων τε καὶ Ἑλλήνων
  chosen: of both Jews and Greeks
  alternatives:
  - both Jews and Greeks
  - Jews as well as Greeks
  lexicon: BDAG
  rationale: The τε καὶ pairing marks both groups together. 'Of both Jews and Greeks'
    fits naturally with 'a great multitude' in English.
- source_word: πολὺ πλῆθος
  chosen: a great multitude
  alternatives:
  - a large number
  - many people
  lexicon: BDAG
  rationale: The phrase emphasizes a sizable crowd. 'A great multitude' preserves
    the weight of πλῆθος without becoming archaic in this context.
