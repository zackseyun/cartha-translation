theological_decisions:
- issue: Implied referent in 'τοῦ ὄντος πρὸ τῆς πόλεως'
  chosen_reading: The phrase refers to the temple/shrine of Zeus located before or
    outside the city, rendered 'whose temple was before the city.'
  alternative_readings:
  - 'The phrase refers directly to Zeus: ''Zeus, who was before the city'''
  - 'The phrase could be rendered more minimally: ''the Zeus who was before the city'''
  rationale: The narrative context concerns a priest preparing sacrifice, and ancient
    usage commonly identifies a deity by the location of his temple. English requires
    an explicit referent for intelligibility; supplying 'temple' clarifies the sense
    without adding doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
