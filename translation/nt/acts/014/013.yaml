id: ACT.14.13
reference: Acts 14:13
source:
  edition: SBLGNT
  text: ὅ ⸀τε ἱερεὺς τοῦ Διὸς τοῦ ὄντος πρὸ τῆς ⸀πόλεως ταύρους καὶ στέμματα ἐπὶ τοὺς
    πυλῶνας ἐνέγκας σὺν τοῖς ὄχλοις ἤθελεν θύειν.
translation:
  text: And the priest of Zeus, whose temple was before the city, brought bulls and
    wreaths to the gates and wanted to offer sacrifice with the crowds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'garlands' for 'wreaths.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the Zeus who was before the city'; the sense is likely 'Zeus
      whose temple/shrine was outside the city.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅ τε
  chosen: And
  alternatives:
  - Then
  - And so
  lexicon: BDAG
  rationale: 'The relative pronoun with τε functions idiomatically to continue the
    narrative: ''and the ...''. A simple ''And'' gives natural English flow without
    overtranslating the connective force.'
- source_word: ἱερεὺς τοῦ Διὸς
  chosen: the priest of Zeus
  alternatives:
  - the priest of Jupiter
  lexicon: BDAG
  rationale: Ζεύς is the Greek divine name in the text, so 'Zeus' is preferred over
    the Roman equivalent 'Jupiter' to preserve original-language specificity.
- source_word: τοῦ ὄντος πρὸ τῆς πόλεως
  chosen: whose temple was before the city
  alternatives:
  - who was before the city
  - which was in front of the city
  - whose shrine was outside the city
  lexicon: BDAG
  rationale: The genitive participial phrase most naturally modifies Zeus, referring
    to the sanctuary/temple of Zeus located before or outside the city. English requires
    making the implied cult-site explicit; 'temple' is supplied for clarity. 'Before
    the city' here means situated in front of/outside the city.
- source_word: ταύρους
  chosen: bulls
  alternatives:
  - oxen
  lexicon: BDAG
  rationale: ταῦρος denotes a bull. 'Bulls' is the most direct and natural rendering
    in this sacrificial context.
- source_word: στέμματα
  chosen: wreaths
  alternatives:
  - garlands
  lexicon: BDAG
  rationale: στέμματα refers to festal wreaths/garlands used in sacrificial processions.
    'Wreaths' is concise and natural; the alternative 'garlands' is preserved in a
    footnote as a viable lexical option.
- source_word: ἐπὶ τοὺς πυλῶνας
  chosen: to the gates
  alternatives:
  - to the gate
  - at the gates
  - to the entrance gates
  lexicon: BDAG
  rationale: πυλών commonly denotes a gate or gateway. The plural is retained as 'gates.'
    With ἐπί and motion, 'to the gates' fits the participle 'brought' well.
- source_word: ἐνέγκας
  chosen: brought
  alternatives:
  - having brought
  - carried
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/backgrounded relative to the
    main verb. English smooths this naturally as 'brought' before the main finite
    verb, without forcing a more wooden 'having brought'.
- source_word: σὺν τοῖς ὄχλοις
  chosen: with the crowds
  alternatives:
  - with the crowd
  - together with the crowds
  lexicon: BDAG
  rationale: ὄχλοις is plural, so 'crowds' is retained. The phrase indicates the priest
    acted in concert with the gathered people.
- source_word: ἤθελεν θύειν
  chosen: wanted to offer sacrifice
  alternatives:
  - intended to sacrifice
  - was wanting to offer sacrifice
  - wanted to make a sacrifice
  lexicon: BDAG
  rationale: θέλω + infinitive expresses intention/desire. θύω in this cultic setting
    means to offer a sacrifice, not merely 'kill.' 'Offer sacrifice' preserves the
    religious sense clearly.
