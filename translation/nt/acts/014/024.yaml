id: ACT.14.24
reference: Acts 14:24
source:
  edition: SBLGNT
  text: καὶ διελθόντες τὴν Πισιδίαν ἦλθον εἰς ⸀τὴν Παμφυλίαν,
translation:
  text: And after passing through Pisidia, they came into Pamphylia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διελθόντες
  chosen: after passing through
  alternatives:
  - having passed through
  - traveling through
  lexicon: BDAG
  rationale: Aorist active participle of διέρχομαι, temporally prior to the main verb
    ἦλθον. 'After passing through' makes the participial relationship clear in natural
    English without over-paraphrasing.
- source_word: Πισιδίαν
  chosen: Pisidia
  rationale: Proper regional name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: ἦλθον
  chosen: they came
  alternatives:
  - they went
  - they arrived
  lexicon: BDAG
  rationale: Standard rendering of ἔρχομαι in narrative movement. 'They came' is the
    plain lexical sense and works naturally with the destination phrase.
- source_word: εἰς τὴν Παμφυλίαν
  chosen: into Pamphylia
  alternatives:
  - to Pamphylia
  lexicon: BDAG
  rationale: εἰς commonly marks movement into a place. 'Into Pamphylia' preserves
    the directional nuance slightly more closely than 'to Pamphylia' while remaining
    idiomatic.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Simple connective continuing the travel narrative. 'And' preserves the
    straightforward coordination of the Greek.
