id: ACT.14.7
reference: Acts 14:7
source:
  edition: SBLGNT
  text: κἀκεῖ ⸂εὐαγγελιζόμενοι ἦσαν⸃.
translation:
  text: And there they were preaching the good news.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there also they were proclaiming the gospel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖ
  chosen: And there
  alternatives:
  - and there
  - there also
  lexicon: BDAG
  rationale: κἀκεῖ combines καί + ἐκεῖ, meaning 'and there' or 'there also.' 'And
    there' fits the narrative flow from the previous verse and preserves the connective
    force.
- source_word: εὐαγγελιζόμενοι
  chosen: preaching the good news
  alternatives:
  - proclaiming the gospel
  - evangelizing
  lexicon: BDAG
  rationale: The participle of εὐαγγελίζω means to announce good news, especially
    the gospel. 'Preaching the good news' is clear modern English and preserves the
    verbal sense without relying on ecclesiastical jargon. 'Proclaiming the gospel'
    is possible, but 'good news' more directly reflects the lexical meaning.
- source_word: ἦσαν
  chosen: they were
  alternatives:
  - they continued
  - they were continuing
  lexicon: BDAG
  rationale: With the periphrastic construction εὐαγγελιζόμενοι ἦσαν, the imperfect
    of εἰμί conveys ongoing past action. 'They were' naturally supports the English
    progressive sense with the participle rendered as 'preaching,' yielding 'they
    were preaching.'
