theological_decisions:
- issue: Rendering pagan divine names
  chosen_reading: Use 'Zeus' and 'Hermes' in the main text
  alternative_readings:
  - Jupiter and Mercury
  rationale: The verse reports the crowd's identification of Barnabas and Paul with
    Greco-Roman deities. Following original-language primacy, the Greek divine names
    are retained rather than replaced with Roman equivalents from translation tradition.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
