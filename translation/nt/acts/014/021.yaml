id: ACT.14.21
reference: Acts 14:21
source:
  edition: SBLGNT
  text: Εὐαγγελισάμενοί τε τὴν πόλιν ἐκείνην καὶ μαθητεύσαντες ἱκανοὺς ὑπέστρεψαν
    εἰς τὴν Λύστραν καὶ ⸀εἰς Ἰκόνιον καὶ ⸁εἰς Ἀντιόχειαν,
translation:
  text: And after proclaiming the good news in that city and making many disciples,
    they returned to Lystra and to Iconium and to Antioch,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having preached the gospel in that city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐαγγελισάμενοί
  chosen: after proclaiming the good news
  alternatives:
  - having preached the gospel
  - having evangelized
  lexicon: BDAG
  rationale: 'Aorist middle participle, contemporaneous/prior to the main verb, best
    rendered in natural English as a prior action: ''after proclaiming.'' ''The good
    news'' communicates εὐαγγελίζω accessibly while preserving the evangelistic sense
    better than the more traditional but jargon-heavy ''preached the gospel.'''
- source_word: τε
  chosen: and
  alternatives:
  - now
  - indeed
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: τε lightly links the participial clause with what precedes and with the
    following καί. In English, an explicit 'and' best preserves the connective flow
    without awkwardness.
- source_word: τὴν πόλιν ἐκείνην
  chosen: that city
  alternatives:
  - the city there
  - that town
  lexicon: BDAG
  rationale: Straightforward demonstrative phrase referring back to Derbe in context.
    'City' is the most direct rendering of πόλις.
- source_word: μαθητεύσαντες
  chosen: making disciples
  alternatives:
  - having made disciples
  - discipling
  lexicon: BDAG
  rationale: The verb means to make someone a disciple / cause to be a disciple. 'Making
    disciples' is idiomatic and preserves the active formative sense better than the
    potentially narrower 'discipling.'
- source_word: ἱκανοὺς
  chosen: many
  alternatives:
  - a considerable number
  - quite a few
  lexicon: BDAG
  rationale: In this context ἱκανός idiomatically denotes a substantial number rather
    than mere adequacy. 'Many' is concise, natural, and fits Luke's usage.
- source_word: ὑπέστρεψαν
  chosen: they returned
  alternatives:
  - they turned back
  - they went back
  lexicon: BDAG
  rationale: Aorist main verb indicating return travel. 'Returned' is the standard
    and clearest English equivalent.
- source_word: εἰς τὴν Λύστραν
  chosen: to Lystra
  alternatives:
  - into Lystra
  lexicon: BDAG
  rationale: With place names, εἰς is naturally rendered 'to' in English for destination.
- source_word: εἰς Ἰκόνιον
  chosen: to Iconium
  alternatives:
  - into Iconium
  lexicon: BDAG
  rationale: Repeated εἰς is retained with repeated 'to' for rhythmic and geographic
    clarity.
- source_word: εἰς Ἀντιόχειαν
  chosen: to Antioch
  alternatives:
  - into Antioch
  lexicon: BDAG
  rationale: As above, destination sense. Repeating 'to' reflects the Greek sequence
    and avoids compressing the itinerary.
