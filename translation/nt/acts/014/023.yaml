id: ACT.14.23
reference: Acts 14:23
source:
  edition: SBLGNT
  text: χειροτονήσαντες δὲ αὐτοῖς ⸂κατ’ ἐκκλησίαν πρεσβυτέρους⸃ προσευξάμενοι μετὰ
    νηστειῶν παρέθεντο αὐτοὺς τῷ κυρίῳ εἰς ὃν πεπιστεύκεισαν.
translation:
  text: And after appointing elders for them in every church, and praying with fasting,
    they entrusted them to the Lord, in whom they had believed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “after electing elders for them in each church.” The Greek verb can in
      some contexts carry the sense of choosing by vote or raised hands, though here
      it may simply mean appointing.
    reason: alternative_reading
  - marker: b
    text: Or “they entrusted them” may refer specifically to the newly appointed elders
      rather than to the believers as a whole.
    reason: alternative_reading
lexical_decisions:
- source_word: χειροτονήσαντες
  chosen: after appointing
  alternatives:
  - after choosing
  - after electing
  - after appointing by a show of hands
  lexicon: BDAG
  rationale: The participle denotes the action of selecting/appointing. Although the
    term can have an older sense related to voting by raised hands, in Koine usage
    it commonly means appoint. 'Appointing' fits the context without importing a specific
    polity mechanism not explicit in the verse.
- source_word: κατ’ ἐκκλησίαν
  chosen: in every church
  alternatives:
  - for each church
  - church by church
  lexicon: BDAG
  rationale: The distributive κατά with singular noun indicates distribution across
    local congregations. 'In every church' is idiomatic English and preserves the
    sense that elders were appointed in each congregation.
- source_word: πρεσβυτέρους
  chosen: elders
  alternatives:
  - older men
  - presbyters
  lexicon: BDAG
  rationale: In this ecclesial context the term refers to recognized leaders, not
    merely older males. 'Elders' is the standard and clearest English rendering.
- source_word: προσευξάμενοι
  chosen: praying
  alternatives:
  - having prayed
  lexicon: BDAG
  rationale: An aorist participle coordinated with the previous participle, expressing
    attendant action prior to the main verb. 'Praying' reads naturally in English
    while preserving the sequence with 'after appointing'.
- source_word: μετὰ νηστειῶν
  chosen: with fasting
  alternatives:
  - with fastings
  - accompanied by fasting
  lexicon: BDAG
  rationale: The plural noun can be rendered idiomatically in English as the practice
    of fasting accompanying prayer. 'With fasting' is natural and accurate.
- source_word: παρέθεντο
  chosen: they entrusted
  alternatives:
  - they committed
  - they commended
  lexicon: BDAG
  rationale: The middle voice here conveys committing persons into another's care.
    'Entrusted' is clear modern English and preserves the personal, relational sense
    better than the more traditional 'commended'.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - to Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The dative after
    παρατίθημι marks the one to whose care they were committed.
- source_word: εἰς ὃν πεπιστεύκεισαν
  chosen: in whom they had believed
  alternatives:
  - on whom they had believed
  - in whom they had put their faith
  lexicon: BDAG
  rationale: The preposition εἰς with πιστεύω commonly expresses belief directed into
    someone; idiomatic English is 'believed in.' The pluperfect indicates prior settled
    trust, hence 'had believed.' The relative pronoun most naturally refers to 'the
    Lord.'
- source_word: αὐτοῖς ... αὐτοὺς
  chosen: for them ... them
  alternatives:
  - for them ... these men
  - for them ... the disciples
  lexicon: BDAG
  rationale: The first pronoun refers to the believers/congregations for whom elders
    were appointed; the second most naturally refers to those same believers being
    entrusted to the Lord, not merely the elders. English keeps the pronouns, with
    context supplying the referents.
