theological_decisions:
- issue: Meaning of χειροτονήσαντες in relation to church polity
  chosen_reading: appointing elders
  alternative_readings:
  - electing elders by congregational vote
  rationale: The lexical evidence allows a historical association with voting, but
    the verse itself does not specify a formal election procedure. Rendering it as
    'appointing' avoids importing a denominational model while preserving the core
    act of selection.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not advocate denominational distinctives unless the Greek
    unambiguously supports one reading.'
- issue: Referent of αὐτοὺς in παρέθεντο αὐτοὺς τῷ κυρίῳ
  chosen_reading: the believers/congregations were entrusted to the Lord
  alternative_readings:
  - the newly appointed elders were entrusted to the Lord
  rationale: The broader discourse in Acts 14 concerns strengthening the disciples,
    and the dative αὐτοῖς earlier refers to the congregations for whom elders were
    appointed. Thus the most natural reading is that Paul and Barnabas entrusted the
    believers as a whole to the Lord, though the elders are closely involved in context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
