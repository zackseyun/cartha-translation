id: ACT.14.9
reference: Acts 14:9
source:
  edition: SBLGNT
  text: οὗτος ⸀ἤκουσεν τοῦ Παύλου λαλοῦντος· ὃς ἀτενίσας αὐτῷ καὶ ἰδὼν ὅτι ⸂ἔχει πίστιν⸃
    τοῦ σωθῆναι
translation:
  text: This man listened to Paul speaking, who, looking intently at him and seeing
    that he had faith to be healed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'faith to be saved.' The Greek verb can mean 'to save'
      or 'to heal'; here the context favors physical healing.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: Demonstrative referring back to the lame man in the previous verse; 'This
    man' is natural English and preserves the specific referent better than bare 'he.'
- source_word: ἤκουσεν
  chosen: listened
  alternatives:
  - heard
  lexicon: BDAG
  rationale: The aorist indicates the simple event of hearing, but in context 'listened'
    better conveys attentive reception of Paul's speech without overtranslating.
- source_word: λαλοῦντος
  chosen: speaking
  alternatives:
  - talking
  lexicon: BDAG
  rationale: Present participle with τοῦ Παύλου, naturally rendered 'Paul speaking.'
    'Speaking' is more fitting than 'talking' for public proclamation.
- source_word: ἀτενίσας
  chosen: looking intently
  alternatives:
  - fixing his gaze
  - staring
  lexicon: BDAG
  rationale: The verb often denotes a focused, intent look. 'Looking intently' is
    readable modern English and preserves the force without sounding awkward.
- source_word: ἰδὼν
  chosen: seeing
  alternatives:
  - perceiving
  - realizing
  lexicon: BDAG
  rationale: Aorist participle of perception; 'seeing' keeps the concrete wording
    while allowing the contextual sense of discernment.
- source_word: ἔχει πίστιν
  chosen: had faith
  alternatives:
  - had trust
  - had faithfulness
  lexicon: BDAG
  rationale: Per doctrine, πίστις defaults to 'faith.' Here the phrase denotes the
    man's believing response oriented toward receiving divine help, not his own faithfulness.
- source_word: τοῦ σωθῆναι
  chosen: to be healed
  alternatives:
  - to be saved
  - to be made well
  lexicon: BDAG
  rationale: Although σῴζω often means 'save,' in this immediate miracle context involving
    a lame man who is about to be physically restored, 'to be healed' best reflects
    the contextual sense. The broader lexical possibility 'to be saved' is preserved
    in a footnote because the Greek term can carry wider resonance.
