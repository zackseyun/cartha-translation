theological_decisions:
- issue: Meaning of σωθῆναι in a healing narrative
  chosen_reading: physical healing ('to be healed')
  alternative_readings:
  - broader salvation ('to be saved')
  rationale: The narrative context is a visible healing miracle, and the following
    verse confirms physical restoration. Rendering with 'healed' avoids importing
    a soteriological claim beyond the immediate context, while preserving the broader
    semantic range of σῴζω in a footnote.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: πίστις'
