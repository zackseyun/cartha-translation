id: ACT.14.2
reference: Acts 14:2
source:
  edition: SBLGNT
  text: οἱ δὲ ⸀ἀπειθήσαντες Ἰουδαῖοι ἐπήγειραν καὶ ἐκάκωσαν τὰς ψυχὰς τῶν ἐθνῶν κατὰ
    τῶν ἀδελφῶν.
translation:
  text: But the Jews who refused to believe stirred up the Gentiles and poisoned their
    minds against the brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were disobedient.' The Greek can denote refusal to believe the message,
      and in this context likely refers to rejecting the gospel.
    reason: lexical_alternative
  - marker: b
    text: Greek 'their souls'; here the sense is their inner disposition or attitude.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' here likely refers to fellow believers generally, including
      women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπειθήσαντες
  chosen: refused to believe
  alternatives:
  - disobeyed
  - were disobedient
  - were unbelieving
  lexicon: BDAG
  rationale: In Acts, ἀπειθέω often carries the sense of refusing the apostolic message
    rather than generic disobedience. Given the evangelistic context, 'refused to
    believe' makes explicit the object implied by the narrative while preserving the
    volitional force of the participle.
- source_word: Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish people
  - the Judeans
  lexicon: BDAG
  rationale: The term here refers to a specific group of Jews in the synagogue setting
    who opposed the message, not to all Jewish people universally. 'The Jews' is the
    most direct rendering of the Greek; the limitation to the local opposing group
    is supplied by context, not by changing the lexical gloss.
- source_word: ἐπήγειραν
  chosen: stirred up
  alternatives:
  - incited
  - aroused
  lexicon: BDAG
  rationale: '''Stirred up'' is natural modern English and fits the causative sense
    of provoking hostile action or sentiment.'
- source_word: ἐκάκωσαν
  chosen: poisoned
  alternatives:
  - embittered
  - mistreated
  - corrupted
  - made evil
  lexicon: BDAG
  rationale: With 'the souls/minds' as object and followed by 'against the brothers,'
    the verb is idiomatic for corrupting or embittering inner disposition. 'Poisoned'
    vividly and idiomatically conveys hostile corruption of attitude in contemporary
    English.
- source_word: τὰς ψυχὰς
  chosen: their minds
  alternatives:
  - their souls
  - their inner selves
  lexicon: BDAG
  rationale: Although ψυχή is often 'soul,' here the idiom concerns the inner disposition
    or attitude of the Gentiles toward the believers. 'Minds' communicates the sense
    clearly in English without importing a technical anthropology.
- source_word: τῶν ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  - the non-Jews
  lexicon: BDAG
  rationale: In Acts, ἔθνη in Jewish-Gentile contrast normally means 'Gentiles.' That
    contextual sense is clearer than the more literal but less idiomatic 'nations.'
- source_word: κατὰ τῶν ἀδελφῶν
  chosen: against the brothers
  alternatives:
  - against the brothers and sisters
  - against the believers
  lexicon: BDAG
  rationale: ἀδελφῶν is formally masculine plural but in early Christian usage often
    refers to fellow believers collectively. Per the doctrine's gender-accurate principle,
    the main text keeps 'brothers' close to the Greek form, while an inclusive sense
    is worth preserving in a footnote.
