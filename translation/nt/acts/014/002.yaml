theological_decisions:
- issue: Rendering ἀδελφῶν in a mixed-gender Christian community reference
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - believers
  rationale: The Greek uses the masculine plural ἀδελφῶν, which in this context likely
    refers collectively to the Christian community, not only males. Following the
    stated gender-accurate policy, the main text retains 'brothers' while preserving
    the inclusive sense in a footnote rather than flattening the source form in the
    main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
