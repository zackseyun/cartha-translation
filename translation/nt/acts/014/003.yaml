id: ACT.14.3
reference: Acts 14:3
source:
  edition: SBLGNT
  text: ἱκανὸν μὲν οὖν χρόνον διέτριψαν παρρησιαζόμενοι ἐπὶ τῷ κυρίῳ τῷ μαρτυροῦντι
    ⸀τῷ λόγῳ τῆς χάριτος αὐτοῦ, διδόντι σημεῖα καὶ τέρατα γίνεσθαι διὰ τῶν χειρῶν
    αὐτῶν.
translation:
  text: So they stayed there a considerable time, speaking boldly for the Lord, who
    was bearing witness to the word of his grace, granting signs and wonders to be
    done through their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speaking boldly in the Lord.' The Greek expression may emphasize that
      their boldness was grounded in or exercised in relation to the Lord.
    reason: alternative_reading
lexical_decisions:
- source_word: ἱκανὸν ... χρόνον
  chosen: a considerable time
  alternatives:
  - a long time
  - for some time
  lexicon: BDAG
  rationale: The idiom ἱκανὸν χρόνον denotes a substantial duration. 'A considerable
    time' is natural modern English and preserves the sense of notable length without
    overstating it.
- source_word: διέτριψαν
  chosen: they stayed there
  alternatives:
  - they remained
  - they spent time
  lexicon: BDAG
  rationale: διατρίβω here means to spend time or remain in a place. 'Stayed there'
    fits the narrative context and communicates location plus duration clearly.
- source_word: παρρησιαζόμενοι
  chosen: speaking boldly
  alternatives:
  - speaking openly
  - being bold in speaking
  lexicon: BDAG
  rationale: παρρησιάζομαι commonly conveys bold, fearless speech. 'Speaking boldly'
    is the standard clear rendering in Acts and matches the participial manner sense.
- source_word: ἐπὶ τῷ κυρίῳ
  chosen: for the Lord
  alternatives:
  - in the Lord
  - on the basis of the Lord
  - relying on the Lord
  lexicon: BDAG
  rationale: With παρρησιάζομαι, ἐπί + dative can express basis or reliance. In this
    context, their bold proclamation is grounded in and directed by the Lord. 'For
    the Lord' reads naturally in English while preserving that their boldness is in
    his cause. The alternative 'in the Lord' is possible and worth preserving in a
    footnote.
- source_word: τῷ κυρίῳ
  chosen: the Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Acts this title
    commonly refers to the risen Jesus in missionary narrative, though the English
    rendering need not over-specify beyond the Greek title.
- source_word: τῷ μαρτυροῦντι
  chosen: who was bearing witness
  alternatives:
  - who testified
  - who was testifying
  lexicon: BDAG
  rationale: The present participle depicts ongoing divine attestation during their
    ministry. 'Was bearing witness' preserves the durative aspect and the legal-testimonial
    nuance of μαρτυρέω.
- source_word: τῷ λόγῳ τῆς χάριτος αὐτοῦ
  chosen: to the word of his grace
  alternatives:
  - to the message of his grace
  - to his gracious word
  lexicon: BDAG
  rationale: λόγος can mean 'word' or 'message.' 'Word of his grace' is slightly more
    formal but remains clear and preserves the genitival construction. It likely means
    the message characterized by or concerning God's grace.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in Luke-Acts regularly carries the theological sense of divine
    grace rather than mere favor. 'Grace' preserves that weight.
- source_word: διδόντι
  chosen: granting
  alternatives:
  - giving
  - allowing
  lexicon: BDAG
  rationale: The participle describes the Lord as enabling miraculous works. 'Granting'
    captures divine bestowal and authorization better than the flatter 'giving.'
- source_word: σημεῖα καὶ τέρατα
  chosen: signs and wonders
  alternatives:
  - miraculous signs and wonders
  lexicon: BDAG
  rationale: This fixed biblical collocation is best preserved as 'signs and wonders.'
    It communicates both evidentiary and astonishing aspects of the miracles.
- source_word: γίνεσθαι
  chosen: to be done
  alternatives:
  - to happen
  - to occur
  lexicon: BDAG
  rationale: With signs and wonders plus διὰ τῶν χειρῶν αὐτῶν, the passive-like infinitive
    is well rendered 'to be done,' highlighting that the acts occur through the apostles
    as instruments.
- source_word: διὰ τῶν χειρῶν αὐτῶν
  chosen: through their hands
  alternatives:
  - through them
  - by their hands
  lexicon: BDAG
  rationale: The idiom emphasizes instrumentality in miracle-working. 'Through their
    hands' is idiomatic enough in English and preserves the concrete biblical expression.
