theological_decisions:
- issue: Referent of 'the Lord' in the participial clauses
  chosen_reading: Render simply as 'the Lord' without specifying beyond the Greek
    title, while understanding the narrative likely refers to the risen Jesus.
  alternative_readings:
  - Explicitly render 'the Lord Jesus'
  - Interpret more generally as God
  rationale: The Greek text has only τῷ κυρίῳ. Supplying 'Jesus' would import specificity
    not present in the wording, while 'the Lord' preserves the text and remains consistent
    with doctrinal guidance to avoid importing claims the text does not make.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Contested terms: κύριος → Lord'
- issue: Force of ἐπὶ τῷ κυρίῳ
  chosen_reading: Express the relation as 'for the Lord' in the main text, with 'in
    the Lord' preserved as an alternative.
  alternative_readings:
  - in the Lord
  - relying on the Lord
  rationale: The phrase can denote basis, sphere, or reliance. In context of missionary
    proclamation, 'for the Lord' communicates that their bold speech was in his service,
    while a footnote preserves the more literal/spherical alternative.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
