id: ACT.14.10
reference: Acts 14:10
source:
  edition: SBLGNT
  text: εἶπεν ⸀μεγάλῃ φωνῇ· Ἀνάστηθι ἐπὶ τοὺς πόδας σου ⸀ὀρθός· καὶ ⸀ἥλατο καὶ περιεπάτει.
translation:
  text: He said in a loud voice, “Stand upright on your feet.” And he leaped up and
    began walking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rise up straight on your feet.”
    reason: lexical_alternative
  - marker: b
    text: Or “he sprang up and was walking.” The final verb is imperfect, which may
      emphasize ongoing action or the beginning of walking.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλῃ φωνῇ
  chosen: in a loud voice
  alternatives:
  - with a loud voice
  - in a great voice
  lexicon: BDAG
  rationale: The dative phrase expresses manner. 'In a loud voice' is idiomatic modern
    English and preserves the force of public, emphatic speech better than the more
    wooden 'with a loud voice.'
- source_word: Ἀνάστηθι
  chosen: Stand
  alternatives:
  - Get up
  - Rise
  lexicon: BDAG
  rationale: The aorist imperative of ἀνίστημι here is a command to assume an upright
    standing position. 'Stand' fits the immediate context of healing a man unable
    to use his feet, while 'get up' or 'rise' are possible but less directly tied
    to the following phrase.
- source_word: ἐπὶ τοὺς πόδας σου
  chosen: on your feet
  alternatives:
  - upon your feet
  lexicon: BDAG
  rationale: This prepositional phrase is naturally rendered 'on your feet' in English.
    It conveys the result of standing upright without unnecessary archaism.
- source_word: ὀρθός
  chosen: upright
  alternatives:
  - straight
  - erect
  lexicon: BDAG
  rationale: ὀρθός modifies the commanded posture. 'Upright' clearly conveys straight,
    proper standing posture in contemporary English. 'Straight' is possible but can
    sound adverbial or less precise.
- source_word: ἥλατο
  chosen: he leaped up
  alternatives:
  - he jumped up
  - he sprang up
  lexicon: BDAG
  rationale: The middle form from ἅλλομαι denotes a sudden leap. 'Leaped up' preserves
    the vividness of the miracle and reads naturally in narrative English.
- source_word: περιεπάτει
  chosen: began walking
  alternatives:
  - was walking
  - walked about
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or inceptive action after the leap. 'Began
    walking' captures the onset of sustained walking in context, highlighting the
    immediate effect of the healing. 'Was walking' is possible but less vivid in English
    narrative.
