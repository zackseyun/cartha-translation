theological_decisions:
- issue: Miracle language and posture command
  chosen_reading: Translate the command and response straightforwardly as an immediate
    physical healing without embellishment.
  rationale: The Greek narrates a direct command followed by an instantaneous, visible
    response. The translation should preserve the concreteness of the miracle without
    adding interpretive theological commentary.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
