theological_decisions:
- issue: Rendering the idiom ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  chosen_reading: in the name of Jesus
  alternative_readings:
  - about the name of Jesus
  - on the basis of the name of Jesus
  rationale: 'The phrase carries a range of associations in Acts: reference to Jesus,
    invocation of his authority, and public witness tied to his person. The translation
    preserves that theological breadth rather than resolving it into a narrower paraphrase.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
