id: ACT.5.40
reference: Acts 5:40
source:
  edition: SBLGNT
  text: καὶ προσκαλεσάμενοι τοὺς ἀποστόλους δείραντες παρήγγειλαν μὴ λαλεῖν ἐπὶ τῷ
    ὀνόματι τοῦ Ἰησοῦ καὶ ⸀ἀπέλυσαν.
translation:
  text: And after summoning the apostles, they beat them, ordered them not to speak
    in the name of Jesus, and released them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about the name of Jesus' or 'on the basis of the name of Jesus.' The
      Greek idiom can include speaking with reference to Jesus and under his authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενοι
  chosen: after summoning
  alternatives:
  - having called in
  - after calling to themselves
  lexicon: BDAG
  rationale: Aorist middle participle indicating prior action relative to the main
    verb. 'After summoning' is natural English and preserves the sequence without
    over-literal awkwardness.
- source_word: ἀποστόλους
  chosen: the apostles
  alternatives:
  - the emissaries
  - the messengers
  lexicon: BDAG
  rationale: '''Apostles'' is the established and contextually precise rendering for
    the Twelve and related commissioned witnesses in Acts; alternatives are too generic
    here.'
- source_word: δείραντες
  chosen: they beat them
  alternatives:
  - having flogged them
  - after beating them
  lexicon: BDAG
  rationale: From δέρω, 'to beat, thrash.' 'Beat them' is the clearest broad rendering.
    'Flogged' is possible in context but may imply a more specific judicial punishment
    than the verb itself states.
- source_word: παρήγγειλαν
  chosen: ordered
  alternatives:
  - commanded
  - instructed
  - gave orders
  lexicon: BDAG
  rationale: παραγγέλλω commonly means to give an order or command. 'Ordered' is concise,
    strong, and idiomatic in modern English.
- source_word: μὴ λαλεῖν
  chosen: not to speak
  alternatives:
  - not to keep speaking
  - not to talk
  lexicon: BDAG
  rationale: μή with the infinitive expresses the content of the prohibition. 'Speak'
    is more fitting than 'talk' in this formal setting.
- source_word: ἐπὶ τῷ ὀνόματι τοῦ Ἰησοῦ
  chosen: in the name of Jesus
  alternatives:
  - about the name of Jesus
  - on the basis of the name of Jesus
  lexicon: BDAG
  rationale: This idiom in Acts commonly refers to speaking with reference to, under
    the authority of, or invoking Jesus' name. 'In the name of Jesus' preserves the
    familiar biblical idiom and its theological resonance without narrowing it to
    only one nuance.
- source_word: ἀπέλυσαν
  chosen: released them
  alternatives:
  - let them go
  - dismissed them
  lexicon: BDAG
  rationale: ἀπολύω here means to release or let go from custody/restraint. 'Released
    them' fits the legal setting better than the more casual 'let them go'.
