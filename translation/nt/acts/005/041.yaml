theological_decisions:
- issue: Absolute use of 'the Name'
  chosen_reading: Retain 'the Name' without expanding it to 'the name of Jesus' in
    the main text.
  alternative_readings:
  - the name of Jesus
  - his name
  rationale: The Greek uses the absolute phrase τοῦ ὀνόματος, which carries reverential
    force and likely refers to Jesus in context, but the text itself does not state
    the explicit referent here. Preserving the shorthand maintains the source-text's
    theological resonance and avoids interpretive expansion beyond what is written.
  doctrine_reference: Translation philosophy §1, §3
