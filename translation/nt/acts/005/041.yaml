id: ACT.5.41
reference: Acts 5:41
source:
  edition: SBLGNT
  text: οἱ μὲν οὖν ἐπορεύοντο χαίροντες ἀπὸ προσώπου τοῦ συνεδρίου ὅτι ⸂κατηξιώθησαν
    ὑπὲρ τοῦ ὀνόματος⸃ ἀτιμασθῆναι·
translation:
  text: So they went on their way from the presence of the council, rejoicing that
    they had been counted worthy to be dishonored for the Name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the name of Jesus.'' Greek: ''the Name,'' a reverential shorthand
      left implicit in the text.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπορεύοντο
  chosen: went on their way
  alternatives:
  - were going
  - departed
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing movement away from the council; 'went
    on their way' is idiomatic modern English that preserves the narrative flow better
    than the more wooden 'were going' while avoiding the overly punctiliar 'departed'.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - with joy
  - glad
  lexicon: BDAG
  rationale: Present participle expresses attendant manner concurrent with their departure.
    'Rejoicing' preserves the verbal force and links naturally with the reason clause
    that follows.
- source_word: ἀπὸ προσώπου τοῦ συνεδρίου
  chosen: from the presence of the council
  alternatives:
  - from before the Sanhedrin
  - away from the council
  lexicon: BDAG
  rationale: The idiom literally involves 'from the face/presence' of the council.
    'From the presence of the council' keeps the formal nuance without becoming unnatural.
    'Council' is preferred over transliterated 'Sanhedrin' for accessibility, since
    συνέδριον denotes the ruling council.
- source_word: συνεδρίου
  chosen: council
  alternatives:
  - Sanhedrin
  lexicon: BDAG
  rationale: While this body is historically the Sanhedrin, the common noun means
    'council.' Translating the title rather than transliterating keeps the text readable;
    the historical identification can be inferred from context.
- source_word: κατηξιώθησαν
  chosen: had been counted worthy
  alternatives:
  - were considered worthy
  - were deemed worthy
  lexicon: BDAG
  rationale: Passive aorist of καταξιόω conveys being judged or regarded as worthy.
    'Had been counted worthy' is a natural English passive and preserves the evaluative
    nuance.
- source_word: ὑπὲρ
  chosen: for
  alternatives:
  - on behalf of
  - for the sake of
  lexicon: BDAG
  rationale: 'In this context ὑπέρ marks cause/reference: suffering in relation to
    the Name. ''For'' is concise and idiomatic; ''for the sake of'' is possible but
    slightly more expansive than needed.'
- source_word: τοῦ ὀνόματος
  chosen: the Name
  alternatives:
  - his name
  - the name of Jesus
  lexicon: BDAG
  rationale: The Greek text has the absolute expression 'the Name,' a reverent shorthand
    common in Jewish and early Christian usage. Preserving 'the Name' retains the
    theological and literary force without importing an explicit referent absent from
    the Greek.
- source_word: ἀτιμασθῆναι
  chosen: to be dishonored
  alternatives:
  - to be shamed
  - to be treated shamefully
  - to suffer disgrace
  lexicon: BDAG
  rationale: The aorist passive infinitive denotes being subjected to dishonor. 'To
    be dishonored' closely matches the lexical sense and preserves the passive. 'To
    suffer disgrace' is idiomatic but less directly tied to the verb's honor/shame
    framework.
