theological_decisions:
- issue: Nature of Ananias's death
  chosen_reading: Render the event straightforwardly as immediate death without specifying
    divine mechanism beyond the narrative.
  alternative_readings:
  - He died naturally from shock
  - God directly struck him dead
  rationale: The Greek states that he fell down and died, and that great fear followed.
    It does not explicitly explain the mechanism. The translation should preserve
    the narrative force without importing a more specific theological explanation
    than the text itself gives.
  doctrine_reference: Preserve theological tension rather than resolve it.
