id: ACT.5.5
reference: Acts 5:5
source:
  edition: SBLGNT
  text: ἀκούων δὲ ὁ Ἁνανίας τοὺς λόγους τούτους πεσὼν ἐξέψυξεν· καὶ ἐγένετο φόβος
    μέγας ἐπὶ πάντας τοὺς ⸀ἀκούοντας.
translation:
  text: But when Ananias heard these words, he fell down and died. And great fear
    came upon all who heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'expired' or 'breathed his last.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούων
  chosen: when ... heard
  alternatives:
  - hearing
  - as ... heard
  lexicon: BDAG
  rationale: 'The present participle is most naturally rendered temporally in English
    here: ''when Ananias heard.'' This preserves the sequence without awkward literalism.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative development with mild contrast or transition. 'But'
    fits the immediate turn in the story after Peter's words.
- source_word: λόγους τούτους
  chosen: these words
  alternatives:
  - these statements
  - these things
  lexicon: BDAG
  rationale: λόγοι in this context refers to Peter's spoken words. 'These words' is
    idiomatic and sufficiently formal.
- source_word: πεσὼν
  chosen: he fell down
  alternatives:
  - falling down
  - collapsed
  lexicon: BDAG
  rationale: The aorist participle is best represented as an accompanying action preceding
    the main verb. 'Fell down' preserves the physical imagery more directly than the
    more interpretive 'collapsed.'
- source_word: ἐξέψυξεν
  chosen: died
  alternatives:
  - breathed his last
  - expired
  lexicon: BDAG
  rationale: The verb literally suggests expiring or breathing out one's life, but
    in clear narrative context it means death. 'Died' is clear modern English; the
    more literal alternatives can be preserved in a footnote.
- source_word: ἐγένετο φόβος μέγας
  chosen: great fear came upon
  alternatives:
  - there was great fear
  - great fear fell upon
  lexicon: BDAG
  rationale: This construction idiomatically expresses the onset of fear. 'Came upon'
    works naturally with ἐπί and preserves the sense of fear overtaking the group.
- source_word: ἐπὶ πάντας τοὺς ἀκούοντας
  chosen: upon all who heard
  alternatives:
  - upon all the hearers
  - upon all who were hearing
  lexicon: BDAG
  rationale: The participle functions substantivally for those hearing about or hearing
    the report/event. 'All who heard' is idiomatic and broad enough to preserve the
    Greek without over-specifying the object heard.
- source_word: Ἁνανίας
  chosen: Ananias
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
