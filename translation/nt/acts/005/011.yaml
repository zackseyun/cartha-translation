id: ACT.5.11
reference: Acts 5:11
source:
  edition: SBLGNT
  text: καὶ ἐγένετο φόβος μέγας ἐφ’ ὅλην τὴν ἐκκλησίαν καὶ ἐπὶ πάντας τοὺς ἀκούοντας
    ταῦτα.
translation:
  text: And great fear came upon the whole church and upon all who heard these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' or 'congregation' for 'church' (ἐκκλησία).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: came upon
  alternatives:
  - came
  - arose
  - happened
  lexicon: BDAG
  rationale: With φόβος as the subject and followed by ἐπί + accusative, γίνομαι is
    idiomatically rendered as fear 'came upon' people rather than the more wooden
    'fear happened.' This preserves the eventive force and reads naturally in English.
- source_word: φόβος μέγας
  chosen: great fear
  alternatives:
  - great awe
  - intense fear
  lexicon: BDAG
  rationale: φόβος ordinarily denotes fear, dread, or reverence depending on context.
    Here, in the immediate aftermath of divine judgment on Ananias and Sapphira, 'fear'
    best fits the gravity of the scene. μέγας intensifies it straightforwardly as
    'great.'
- source_word: ἐφ’ ὅλην τὴν ἐκκλησίαν
  chosen: upon the whole church
  alternatives:
  - over the whole assembly
  - upon the whole congregation
  lexicon: BDAG
  rationale: ἐκκλησία in Acts refers to the gathered community of believers; 'church'
    is the standard and contextually appropriate rendering. ὅλην is kept as 'whole'
    to preserve the comprehensiveness of the effect. ἐπί with accusative after φόβος
    is naturally rendered 'upon.'
- source_word: πάντας τοὺς ἀκούοντας ταῦτα
  chosen: all who heard these things
  alternatives:
  - everyone hearing this
  - all those who heard about these things
  lexicon: BDAG
  rationale: The present participle ἀκούοντας can be rendered in idiomatic past reference
    after the main aorist as 'who heard.' ταῦτα is translated 'these things' to preserve
    the plural demonstrative rather than smoothing to singular 'this.'
