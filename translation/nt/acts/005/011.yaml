theological_decisions:
- issue: Rendering ἐκκλησία
  chosen_reading: church
  alternative_readings:
  - assembly
  - congregation
  rationale: The term denotes the Christian community in Acts, and this verse is notable
    as the first explicit use of ἐκκλησία in Acts for that community. 'Church' best
    reflects that referent without importing extra ecclesiology beyond the text.
  doctrine_reference: Translation philosophy §1, §5
