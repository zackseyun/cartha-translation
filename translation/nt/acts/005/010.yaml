id: ACT.5.10
reference: Acts 5:10
source:
  edition: SBLGNT
  text: ἔπεσεν δὲ παραχρῆμα ⸀πρὸς τοὺς πόδας αὐτοῦ καὶ ἐξέψυξεν· εἰσελθόντες δὲ οἱ
    νεανίσκοι εὗρον αὐτὴν νεκράν, καὶ ἐξενέγκαντες ἔθαψαν πρὸς τὸν ἄνδρα αὐτῆς.
translation:
  text: Then she immediately fell at his feet and died. When the young men came in,
    they found her dead, and they carried her out and buried her beside her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breathed her last' / 'expired' for 'died.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with her husband'; the Greek can indicate burial in relation to her
      husband's resting place.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραχρῆμα
  chosen: immediately
  alternatives:
  - at once
  - instantly
  lexicon: BDAG
  rationale: Conveys the adverb's sense of something happening without delay. 'Immediately'
    is natural modern English and preserves the suddenness of judgment.
- source_word: πρὸς τοὺς πόδας αὐτοῦ
  chosen: at his feet
  alternatives:
  - before his feet
  - near his feet
  lexicon: BDAG
  rationale: Idiomatic English for the spatial expression πρός + accusative here.
    'At his feet' preserves the vivid scene without wooden literalism.
- source_word: ἐξέψυξεν
  chosen: died
  alternatives:
  - breathed her last
  - expired
  lexicon: BDAG
  rationale: The verb literally relates to breathing out or expiring, but in context
    plainly means death. 'Died' is the clearest modern rendering; the more literal
    alternatives are possible but less natural here.
- source_word: οἱ νεανίσκοι
  chosen: the young men
  alternatives:
  - the younger men
  - the youths
  lexicon: BDAG
  rationale: Refers to younger male attendants or men present. 'Young men' is the
    most straightforward and idiomatic rendering in context.
- source_word: νεκράν
  chosen: dead
  alternatives:
  - a corpse
  lexicon: BDAG
  rationale: Predicate adjective describing her condition when found. 'Dead' is direct
    and matches the Greek adjective naturally in English.
- source_word: ἐξενέγκαντες
  chosen: carried her out
  alternatives:
  - took her out
  - bore her out
  lexicon: BDAG
  rationale: The participle from ἐκφέρω indicates removal of the body from the place.
    'Carried her out' is idiomatic and fits the burial context.
- source_word: ἔθαψαν
  chosen: buried
  alternatives:
  - interred
  lexicon: BDAG
  rationale: Standard rendering of θάπτω. 'Buried' is clear, accurate, and natural.
- source_word: πρὸς τὸν ἄνδρα αὐτῆς
  chosen: beside her husband
  alternatives:
  - with her husband
  - near her husband
  lexicon: BDAG
  rationale: Here πρός with burial context most naturally indicates location in relation
    to her husband's burial place. 'Beside her husband' makes the spatial sense explicit
    and reads naturally. 'With her husband' is possible but slightly less precise
    spatially.
- source_word: ἄνδρα
  chosen: husband
  alternatives:
  - man
  lexicon: BDAG
  rationale: In context, αὐτῆς specifies marital relationship, so 'husband' is required
    rather than the more generic 'man'.
