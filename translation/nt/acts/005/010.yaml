theological_decisions:
- issue: Nature of the death described by ἐξέψυξεν
  chosen_reading: Render as straightforward physical death without adding interpretive
    explanation about divine causation in the translation itself.
  alternative_readings:
  - Render more explicitly as 'breathed her last'
  - Add explanatory wording implying direct divine judgment
  rationale: The narrative context strongly implies judgment, but this verse itself
    simply narrates that she fell and died. The translation should preserve the event
    without importing theological explanation beyond the Greek wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
