id: ACT.5.25
reference: Acts 5:25
source:
  edition: SBLGNT
  text: παραγενόμενος δέ τις ἀπήγγειλεν αὐτοῖς ὅτι Ἰδοὺ οἱ ἄνδρες οὓς ἔθεσθε ἐν τῇ
    φυλακῇ εἰσὶν ἐν τῷ ἱερῷ ἑστῶτες καὶ διδάσκοντες τὸν λαόν.
translation:
  text: But someone came and reported to them, “Look, the men whom you put in the
    prison are standing in the temple and teaching the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the temple courts”; the Greek ἱερόν refers to the temple complex
      rather than specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενόμενος
  chosen: came
  alternatives:
  - arrived
  - appeared
  - came up
  lexicon: BDAG
  rationale: Aorist participle introducing the messenger's arrival before the main
    verb. 'Came' is natural modern English and preserves the narrative sequence without
    overtranslating.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild development or contrast in the narrative. 'But' best reflects
    the turn in events after the previous scene.
- source_word: τις
  chosen: someone
  alternatives:
  - a certain man
  - someone or other
  lexicon: BDAG
  rationale: Indefinite subject with no need to specify gender beyond the Greek's
    generic usage. 'Someone' is idiomatic and sufficiently indefinite.
- source_word: ἀπήγγειλεν
  chosen: reported
  alternatives:
  - announced
  - informed
  - told
  lexicon: BDAG
  rationale: Conveys formal relaying of information to authorities. 'Reported' fits
    the setting better than the more casual 'told'.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to these men
  lexicon: BDAG
  rationale: Simple dative indirect object; the referent is the council/officials
    from context, but the pronoun should remain untranslated as a pronoun.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of the report. In English it is naturally absorbed
    into the quotation structure.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic particle drawing attention to surprising news. 'Look' is readable
    modern English; 'Behold' would be too archaic for this translation philosophy.
- source_word: οἱ ἄνδρες
  chosen: the men
  alternatives:
  - those men
  lexicon: BDAG
  rationale: Refers specifically to the apostles previously imprisoned. 'The men'
    is the straightforward rendering of the nominative phrase.
- source_word: οὓς ἔθεσθε
  chosen: whom you put
  alternatives:
  - whom you placed
  - whom you confined
  lexicon: BDAG
  rationale: τίθημι here means to place or put. 'Put' is idiomatic in English with
    a prison complement and preserves the directness of the accusation.
- source_word: ἐν τῇ φυλακῇ
  chosen: in the prison
  alternatives:
  - in prison
  - in the jail
  lexicon: BDAG
  rationale: The article is present in Greek, pointing to the known place of confinement.
    'The prison' preserves that specificity better than the idiomatic but less formal
    'in prison'.
- source_word: εἰσὶν
  chosen: are
  alternatives:
  - are now
  lexicon: BDAG
  rationale: Present tense of being; no need to add emphasis not explicit in the Greek.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - at the temple
  lexicon: BDAG
  rationale: ἱερόν denotes the temple complex rather than the inner sanctuary. 'In
    the temple' is acceptable in English, with 'temple courts' preserved as a lexical
    alternative in a footnote for precision.
- source_word: ἑστῶτες
  chosen: standing
  alternatives:
  - standing there
  lexicon: BDAG
  rationale: 'Perfect active participle functioning with present force: they are in
    a standing position/present there. ''Standing'' preserves the vividness of the
    scene.'
- source_word: καὶ διδάσκοντες
  chosen: and teaching
  alternatives:
  - and instructing
  lexicon: BDAG
  rationale: Present participle coordinated with 'standing,' describing ongoing activity.
    'Teaching' is the standard rendering of διδάσκω.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: In Acts this commonly refers to the people at large, often in a public
    or covenant-community sense. 'The people' is the most natural and contextually
    appropriate rendering.
