id: ACT.5.24
reference: Acts 5:24
source:
  edition: SBLGNT
  text: ὡς δὲ ἤκουσαν τοὺς λόγους τούτους ὅ ⸀τε στρατηγὸς τοῦ ἱεροῦ καὶ οἱ ἀρχιερεῖς,
    διηπόρουν περὶ αὐτῶν τί ἂν γένοιτο τοῦτο.
translation:
  text: Now when the captain of the temple and the chief priests heard these words,
    they were perplexed about them, wondering what this might come to.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what would come of this.' The Greek expression asks about the outcome
      or result of the situation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  chosen: Now when
  alternatives:
  - And when
  - But when
  - As soon as
  lexicon: BDAG
  rationale: Introduces the next development in the narrative with a natural temporal
    transition. 'Now when' preserves both the connective force of δέ and the temporal
    sense of ὡς without sounding wooden.
- source_word: ἤκουσαν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Standard past narrative rendering of ἀκούω here; 'heard' is the plain
    sense in context.
- source_word: τοὺς λόγους τούτους
  chosen: these words
  alternatives:
  - this report
  - these things
  lexicon: BDAG
  rationale: λόγοι here refers to the message/report just received. 'These words'
    is formally close and idiomatic in English.
- source_word: ὅ τε στρατηγὸς τοῦ ἱεροῦ
  chosen: the captain of the temple
  alternatives:
  - the temple captain
  - the commander of the temple
  lexicon: BDAG
  rationale: στρατηγός denotes an official commander; τοῦ ἱεροῦ specifies his sphere
    of authority. 'Captain of the temple' is established and clear modern English.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  - the leading priests
  lexicon: BDAG
  rationale: Plural ἀρχιερεῖς in Second Temple context commonly refers to the chief-priestly
    leadership, not multiple acting high priests. 'Chief priests' is the standard
    accurate rendering.
- source_word: διηπόρουν
  chosen: they were perplexed
  alternatives:
  - they were greatly puzzled
  - they were at a loss
  lexicon: BDAG
  rationale: διαπορέω conveys being in serious uncertainty or puzzlement. The imperfect
    is represented with 'were perplexed,' indicating an ongoing state.
- source_word: περὶ αὐτῶν
  chosen: about them
  alternatives:
  - concerning them
  - about these things
  lexicon: BDAG
  rationale: The pronoun most naturally refers back to 'these words' or the reported
    events. 'About them' preserves the Greek reference without over-specifying.
- source_word: τί ἂν γένοιτο τοῦτο
  chosen: what this might come to
  alternatives:
  - what might happen from this
  - what this might become
  - what would come of this
  lexicon: BDAG
  rationale: The optative with ἄν expresses uncertainty about the outcome. The idiom
    'what this might come to' captures the sense of wondering about the eventual result.
