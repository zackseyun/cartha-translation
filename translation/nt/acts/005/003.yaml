  source_review: state/reviews/gemini/nt/acts/005/003.json
  category: awkward_english
  tier: 1
  from: for you to lie to the Holy Spirit and to keep back
  to: to lie to the Holy Spirit and to keep back
  rationale: The Greek construction is an accusative (σε) with an infinitive (ψεύσασθαι), indicating the purpose or result of Satan filling Ananias's heart. While 'for you to lie' is a literal rendering, it is slightly redundant in English following 'your heart.' The suggested change to a simple infinitive, 'to lie,' is more idiomatic and creates better parallel structure with the second infinitive ('and to keep back'). This improves the flow without losing any meaning.
