id: ACT.5.3
reference: Acts 5:3
source:
  edition: SBLGNT
  text: εἶπεν δὲ ⸀ὁ Πέτρος· Ἁνανία, διὰ τί ἐπλήρωσεν ὁ Σατανᾶς τὴν καρδίαν σου, ψεύσασθαί σε τὸ πνεῦμα τὸ ἅγιον καὶ ⸀νοσφίσασθαι ἀπὸ τῆς τιμῆς τοῦ χωρίου;
translation:
  text: But Peter said, “Ananias, why has Satan filled your heart to lie to the Holy Spirit and to keep back some of the price of the land?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deceive the Holy Spirit.' The Greek verb can carry the sense of speaking falsely to someone, but in this context 'lie to' is the more direct rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'to keep back part of the proceeds' or 'of the sale price.'
    reason: lexical_alternative
  - marker: c
    text: '''Land'' may also be rendered ''property'' or ''field.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'for you to lie to the Holy Spirit and to keep back'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἶπεν δὲ ὁ Πέτρος
  chosen: But Peter said
  alternatives:
  - And Peter said
  - Then Peter said
  lexicon: BDAG
  rationale: δέ is a mild connective; 'But' fits the adversative turn as Peter confronts Ananias, while remaining natural English.
- source_word: διὰ τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the interrogative phrase in direct speech.
- source_word: ἐπλήρωσεν ὁ Σατανᾶς τὴν καρδίαν σου
  chosen: has Satan filled your heart
  alternatives:
  - did Satan fill your heart
  - has Satan so filled your heart
  lexicon: BDAG
  rationale: Aorist is naturally rendered in English here with present perfect in dialogue. 'Filled your heart' preserves the metaphor and avoids over-interpreting it as total possession or irresistible control.
- source_word: ψεύσασθαί σε τὸ πνεῦμα τὸ ἅγιον
  chosen: for you to lie to the Holy Spirit
  alternatives:
  - to lie to the Holy Spirit
  - that you should lie to the Holy Spirit
  lexicon: BDAG
  rationale: The infinitive expresses result/purpose after 'filled your heart'; 'for you to lie' is clear modern English and preserves the construction. ψεύδομαι with accusative person means 'lie to' rather than merely 'deceive' in this context.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering; 'Holy Ghost' is archaic in modern English.
- source_word: νοσφίσασθαι
  chosen: to keep back some
  alternatives:
  - to misappropriate
  - to withhold
  - to embezzle
  lexicon: BDAG
  rationale: The verb carries the sense of secretly keeping back for oneself part of what should be given. 'Keep back some' is idiomatic, accurate, and matches the context of partial retention with deception.
- source_word: ἀπὸ τῆς τιμῆς
  chosen: some of the price
  alternatives:
  - part of the proceeds
  - some of the sale price
  lexicon: BDAG
  rationale: ἀπό with the genitive indicates taking from a whole; English needs 'some/part of' to make the sense explicit. 'Price' is a close rendering of τιμή here.
- source_word: τοῦ χωρίου
  chosen: of the land
  alternatives:
  - of the property
  - of the field
  lexicon: BDAG
  rationale: χωρίον can mean field, piece of land, or property. In this narrative of a sold possession, 'land' is natural and sufficiently specific without over-narrowing.
