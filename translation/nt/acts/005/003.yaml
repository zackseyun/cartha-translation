theological_decisions:
- issue: Agency of Satan in filling Ananias's heart
  chosen_reading: Retain the literal expression 'has Satan filled your heart' without paraphrasing it as possession or coercion.
  alternative_readings:
  - has Satan taken control of you
  - why did you let Satan fill your heart
  rationale: The Greek states Satan as the subject of 'filled' and Ananias as morally responsible, but it does not specify a full doctrine of demonic possession or remove human culpability. The translation preserves that tension rather than resolving it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Implication of lying to the Holy Spirit
  chosen_reading: Translate directly as 'lie to the Holy Spirit.'
  alternative_readings:
  - deceive the Holy Spirit
  - lie in the presence of the Holy Spirit
  rationale: The wording should remain direct and personal, matching the Greek construction and preserving the verse's strong personal reference to the Holy Spirit without adding doctrinal explanation in the translation itself.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
revisions:
- timestamp: '2026-04-21T02:37:51Z'
