id: ACT.5.30
reference: Acts 5:30
source:
  edition: SBLGNT
  text: ὁ θεὸς τῶν πατέρων ἡμῶν ἤγειρεν Ἰησοῦν, ὃν ὑμεῖς διεχειρίσασθε κρεμάσαντες
    ἐπὶ ξύλου·
translation:
  text: The God of our fathers raised up Jesus, whom you put to death by hanging on
    a tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raised.' The verb can refer to resurrection here, though the Greek does
      not explicitly say 'from the dead' in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'on a cross.' The Greek says 'on a tree,' likely echoing Deuteronomy
      21:23.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ θεὸς
  chosen: The God
  alternatives:
  - God
  lexicon: BDAG
  rationale: The article is naturally represented in English here as 'The God,' especially
    in the full phrase 'The God of our fathers,' which echoes Israel's covenantal
    God and preserves the formal force of the Greek construction.
- source_word: τῶν πατέρων ἡμῶν
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: BDAG
  rationale: '''Fathers'' is the direct lexical equivalent of πατέρων and preserves
    the biblical idiom and intertextual echo of Israel''s ancestral covenant formula.
    ''Ancestors'' is possible for contemporary readability, but the source is specifically
    masculine and traditional in this formulaic expression.'
- source_word: ἤγειρεν
  chosen: raised up
  alternatives:
  - raised
  - brought forth
  lexicon: BDAG
  rationale: ἐγείρω can mean 'raise' in the sense of resurrection, but in Acts this
    wording can also carry the sense of God bringing forth or appointing a deliverer.
    Here, because the following clause refers to Jesus' death and the broader context
    concerns resurrection, 'raised up' preserves the Greek wording while allowing
    the resurrection sense to remain audible without over-paraphrasing.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the translation
    philosophy of transliterating names.
- source_word: διεχειρίσασθε
  chosen: put to death
  alternatives:
  - killed
  - did away with
  - laid hands on
  lexicon: BDAG
  rationale: The verb here conveys violent action resulting in death. 'Put to death'
    is idiomatic, clear, and fits the participial explanation that follows ('by hanging
    on a tree'). 'Killed' is possible but slightly flatter; 'laid hands on' would
    undertranslate the context.
- source_word: κρεμάσαντες
  chosen: by hanging
  alternatives:
  - having hanged
  - after hanging
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered instrumentally here: the means
    by which they put him to death was hanging him. ''By hanging'' is natural modern
    English and preserves the participial relationship.'
- source_word: ἐπὶ ξύλου
  chosen: on a tree
  alternatives:
  - on wood
  - on a wooden beam
  - on a cross
  lexicon: BDAG
  rationale: ξύλον literally means 'wood' or 'tree.' In this context it evokes Deuteronomic
    curse language and early Christian usage for the cross. 'On a tree' preserves
    the lexical form and theological resonance better than the interpretive rendering
    'on a cross,' which would obscure the allusion.
