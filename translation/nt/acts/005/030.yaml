theological_decisions:
- issue: Whether ἤγειρεν should be rendered as explicit resurrection language or more
    generally as 'raised up'
  chosen_reading: raised up
  alternative_readings:
  - raised
  - raised from the dead
  rationale: The immediate context strongly implies resurrection, but the Greek verb
    itself is simply ἐγείρω and does not explicitly include 'from the dead' in this
    verse. Rendering it 'raised up' preserves the source wording and allows the resurrection
    claim to stand without adding words not present in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ξύλου should be interpreted directly as 'cross' or retained as 'tree'
  chosen_reading: on a tree
  alternative_readings:
  - on a cross
  rationale: The Greek uses ξύλον rather than σταυρός. Retaining 'tree' preserves
    the lexical choice and the likely allusion to Deuteronomy 21:23, while readers
    can still understand it as referring to Jesus' crucifixion.
  doctrine_reference: Original-language primacy over translation tradition.
