id: ACT.5.8
reference: Acts 5:8
source:
  edition: SBLGNT
  text: ἀπεκρίθη δὲ ⸂πρὸς αὐτὴν⸃ ⸀Πέτρος· Εἰπέ μοι, εἰ τοσούτου τὸ χωρίον ἀπέδοσθε;
    ἡ δὲ εἶπεν· Ναί, τοσούτου.
translation:
  text: But Peter answered her, “Tell me, did you sell the land for this much?” And
    she said, “Yes, for this much.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the property” or “the field” for χωρίον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - Then ... answered
  lexicon: BDAG
  rationale: δέ is rendered 'But' to mark the narrative turn and Peter's response
    in a natural English way. ἀποκρίνομαι is idiomatically 'answer' in narrative dialogue.
- source_word: πρὸς αὐτὴν
  chosen: her
  alternatives:
  - to her
  lexicon: BDAG
  rationale: The phrase literally means 'to her,' but English normally says 'answered
    her' rather than 'answered to her.' The indirect object is preserved idiomatically.
- source_word: Εἰπέ μοι
  chosen: Tell me
  alternatives:
  - Tell me this
  - Say to me
  lexicon: BDAG
  rationale: Aorist imperative of λέγω with dative pronoun is naturally rendered 'Tell
    me' in direct speech.
- source_word: εἰ
  chosen: did
  alternatives:
  - whether
  lexicon: BDAG
  rationale: 'Here εἰ introduces an indirect yes/no question. In English, this is
    best expressed by inversion: ''did you sell...?'' rather than the more wooden
    ''whether you sold...'''
- source_word: τοσούτου
  chosen: for this much
  alternatives:
  - for so much
  - for such a price
  lexicon: BDAG
  rationale: τοσοῦτος here refers to the amount just mentioned. 'For this much' is
    clear modern English and preserves the deictic force without sounding archaic.
- source_word: τὸ χωρίον
  chosen: the land
  alternatives:
  - the property
  - the field
  lexicon: BDAG
  rationale: χωρίον can mean a piece of land, field, or property. In this context
    of a sold possession, 'the land' is natural and sufficiently specific, while avoiding
    overprecision not demanded by the text.
- source_word: ἀπέδοσθε
  chosen: did you sell
  alternatives:
  - did you give in sale
  - did you dispose of
  lexicon: BDAG
  rationale: Though ἀποδίδωμι often means 'give back' or 'pay,' in commercial contexts
    it can mean 'sell.' The context of proceeds from property in Acts 5 favors 'sell'
    as the plain sense.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Certainly
  - Indeed
  lexicon: BDAG
  rationale: Simple affirmative response in direct speech.
- source_word: τοσούτου
  chosen: for this much
  alternatives:
  - for so much
  - for that amount
  lexicon: BDAG
  rationale: The repeated term in the reply is best rendered consistently with the
    question. Supplying 'for' in English makes the elliptical answer natural.
