theological_decisions:
- issue: Gendered reference of τοὺς ἀνθρώπους
  chosen_reading: the men
  alternative_readings:
  - the people
  - the persons
  rationale: In this context the referent is the male apostles standing before the
    council, not humanity in general. The rendering follows the project's gender-accurate
    principle rather than flattening to a gender-neutral term.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
