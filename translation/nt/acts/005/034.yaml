id: ACT.5.34
reference: Acts 5:34
source:
  edition: SBLGNT
  text: ἀναστὰς δέ τις ἐν τῷ συνεδρίῳ Φαρισαῖος ὀνόματι Γαμαλιήλ, νομοδιδάσκαλος τίμιος
    παντὶ τῷ λαῷ, ἐκέλευσεν ἔξω ⸀βραχὺ τοὺς ⸀ἀνθρώπους ποιῆσαι,
translation:
  text: But a Pharisee named Gamaliel stood up in the council, a teacher of the law
    honored by all the people, and ordered the men to be put outside for a short time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to send the men outside briefly.” The Greek literally says “to make
      the men outside for a short time,” an idiom meaning to have them removed temporarily.
    reason: lexical_alternative
  - marker: b
    text: “The council” refers to the Jewish ruling council, the Sanhedrin.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναστὰς
  chosen: stood up
  alternatives:
  - rose
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι here introduces Gamaliel's action in the
    assembly. 'Stood up' is natural modern English and preserves the physical/public
    sense.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the narrative turn
    from the prior speakers to Gamaliel's intervention.
- source_word: τις
  chosen: a
  alternatives:
  - someone
  - a certain
  lexicon: BDAG
  rationale: Indefinite τις introduces a new participant. In idiomatic English, the
    indefiniteness is adequately conveyed by 'a' before 'Pharisee'.
- source_word: συνεδρίῳ
  chosen: the council
  alternatives:
  - the Sanhedrin
  lexicon: BDAG
  rationale: The term denotes the Jewish ruling council. 'The council' is a direct
    translation; 'Sanhedrin' is more specific but more interpretive and less transparent
    to readers. The context in Acts makes the referent clear.
- source_word: Φαρισαῖος
  chosen: a Pharisee
  lexicon: BDAG
  rationale: Standard rendering of the group designation; no reason to paraphrase.
- source_word: ὀνόματι Γαμαλιήλ
  chosen: named Gamaliel
  alternatives:
  - by the name of Gamaliel
  lexicon: BDAG
  rationale: Idiomatic English for the dative expression ὀνόματι plus name.
- source_word: νομοδιδάσκαλος
  chosen: a teacher of the law
  alternatives:
  - a law-teacher
  - an expert in the law
  lexicon: BDAG
  rationale: Compound noun meaning one who teaches the law. 'Teacher of the law' is
    clear, established, and accurate without becoming technical.
- source_word: τίμιος
  chosen: honored
  alternatives:
  - respected
  - held in honor
  lexicon: BDAG
  rationale: τίμιος here describes social esteem. 'Honored' preserves the sense of
    public regard and fits the following dative phrase.
- source_word: παντὶ τῷ λαῷ
  chosen: by all the people
  alternatives:
  - by all the people of Israel
  - by all the populace
  lexicon: BDAG
  rationale: The dative expresses the sphere/agents of esteem. 'The people' is the
    natural rendering of λαός here; adding 'of Israel' would over-specify beyond the
    Greek.
- source_word: ἐκέλευσεν
  chosen: ordered
  alternatives:
  - commanded
  - directed
  lexicon: BDAG
  rationale: κελεύω conveys authoritative instruction. 'Ordered' is concise and appropriately
    forceful in this judicial setting.
- source_word: ἔξω ... ποιῆσαι
  chosen: to be put outside
  alternatives:
  - to put outside
  - to send outside
  lexicon: BDAG
  rationale: The idiom ἔξω ... ποιῆσαι literally means 'to make [them] outside,' i.e.,
    have them removed. English naturally uses a passive infinitive here to express
    the commanded action.
- source_word: βραχύ
  chosen: for a short time
  alternatives:
  - briefly
  - for a little while
  lexicon: BDAG
  rationale: Adverbial accusative indicating duration/extent. 'For a short time' is
    clear and preserves the temporal nuance better than the bare adverb 'briefly'.
- source_word: τοὺς ἀνθρώπους
  chosen: the men
  alternatives:
  - the men in question
  - the apostles
  - the people
  lexicon: BDAG
  rationale: Although ἄνθρωποι can mean 'people/humans,' here it refers to the male
    defendants just mentioned. 'The men' is contextually precise and gender-accurate,
    in line with the translation philosophy. 'The apostles' would be interpretive
    expansion beyond the immediate wording.
