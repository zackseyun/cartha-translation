theological_decisions:
- issue: Rendering generic ἀνθρώποις in contrast with θεῷ
  chosen_reading: men
  alternative_readings:
  - people
  - human beings
  rationale: The Greek uses a masculine plural noun with representative force. Per
    the translation philosophy, gender-accurate rendering is preferred over flattening
    to gender-neutral language when the source's form and rhetorical contrast are
    clear. Here 'God rather than men' is concise, idiomatic, and preserves the force
    of the contrast without making a doctrinal claim beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
