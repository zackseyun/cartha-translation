id: ACT.5.29
reference: Acts 5:29
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ Πέτρος καὶ οἱ ἀπόστολοι εἶπαν· Πειθαρχεῖν δεῖ θεῷ μᾶλλον ἢ ἀνθρώποις.
translation:
  text: But Peter and the apostles answered, “We must obey God rather than men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “human beings” or “people.” The Greek says “men,” contrasting God with
      human authorities in general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following finite verb in narrative ('answered and said'). In natural English,
    'answered' captures the sense without awkwardly reproducing both verbal elements.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous speech situation.
    'But' best reflects the adversative turn here.
- source_word: Πέτρος
  chosen: Peter
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: καὶ οἱ ἀπόστολοι
  chosen: and the apostles
  alternatives:
  - and the emissaries
  lexicon: BDAG
  rationale: ἀπόστολοι is rendered with the established and accurate term 'apostles.'
    Although the word can denote 'messengers' or 'emissaries' in some contexts, here
    it refers specifically to the recognized apostolic group.
- source_word: εἶπαν
  chosen: answered
  alternatives:
  - said
  lexicon: BDAG
  rationale: Though εἶπαν literally means 'said,' in combination with ἀποκριθεὶς it
    forms a Semitic-style response formula. Rendering the whole as 'answered' avoids
    redundancy while preserving the narrative function.
- source_word: Πειθαρχεῖν
  chosen: obey
  alternatives:
  - follow the authority of
  - be obedient to
  lexicon: BDAG
  rationale: πειθαρχέω means to obey one in authority. 'Obey' is the clearest and
    most natural English equivalent in this context.
- source_word: δεῖ
  chosen: We must
  alternatives:
  - it is necessary to
  - one must
  lexicon: BDAG
  rationale: δεῖ expresses necessity or obligation. Supplying 'We' makes explicit
    the implied subject of the infinitive in idiomatic English and fits the speakers'
    self-reference.
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Dative object of obedience; straightforwardly rendered 'God.'
- source_word: μᾶλλον ἢ
  chosen: rather than
  alternatives:
  - more than
  lexicon: BDAG
  rationale: The comparative construction contrasts obedience to God with obedience
    to humans. 'Rather than' is idiomatic and precise in English.
- source_word: ἀνθρώποις
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to human authorities in contrast with
    God. 'Men' preserves the source's gender-accurate representative force and the
    traditional rhetorical contrast 'God ... men.' 'People' is possible but slightly
    flattens the pointed contrast.
