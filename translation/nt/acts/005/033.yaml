id: ACT.5.33
reference: Acts 5:33
source:
  edition: SBLGNT
  text: Οἱ δὲ ⸀ἀκούσαντες διεπρίοντο καὶ ἐβούλοντο ἀνελεῖν αὐτούς.
translation:
  text: But when they heard this, they were enraged and wanted to kill them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they were cut through' or 'they were cut to the quick,'
      expressing intense hostile agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  chosen: But they
  alternatives:
  - Now they
  - And they
  lexicon: BDAG
  rationale: δέ is rendered with mild adversative force as 'But' to mark the narrative
    turn from the apostles' speech to the council's reaction. The article functions
    substantivally for the previously identified group, so English supplies 'they'
    rather than a more wooden 'the ones.'
- source_word: ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - after hearing
  - on hearing
  lexicon: BDAG
  rationale: The aorist participle is best rendered temporally in smooth English.
    'When they heard this' makes the sequence explicit and naturally supplies the
    implied object from context.
- source_word: διεπρίοντο
  chosen: were enraged
  alternatives:
  - were cut to the quick
  - were infuriated
  - were sawn through in their hearts
  lexicon: BDAG
  rationale: The verb literally evokes being cut or sawn through, but idiomatically
    here it denotes a violent emotional reaction. 'Were enraged' communicates the
    force in clear modern English better than the more traditional but less transparent
    'were cut to the heart,' which can sound like conviction rather than hostile fury
    in this context.
- source_word: ἐβούλοντο
  chosen: wanted
  alternatives:
  - intended
  - were wishing
  - were determined
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing volition or intention. 'Wanted'
    is natural and sufficiently strong in context, especially when paired with the
    infinitive that follows.
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to do away with
  - to put to death
  - to destroy
  lexicon: BDAG
  rationale: ἀναιρέω in this context refers to taking life. 'To kill' is direct, idiomatic,
    and avoids unnecessary formality while preserving the severity of the intent.
- source_word: αὐτούς
  chosen: them
  lexicon: BDAG
  rationale: The pronoun refers to the apostles under examination and is straightforwardly
    rendered 'them.'
