theological_decisions:
- issue: Nature of ἄγγελος in context
  chosen_reading: heavenly angel
  alternative_readings:
  - human messenger
  rationale: In Acts 5:19 the prison doors are supernaturally opened and the prisoners
    are brought out, strongly indicating an angelic being rather than a human envoy.
    The translation therefore uses 'angel' rather than 'messenger.'
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md lists κύριος with the default rendering 'Lord.' In the phrase
    'angel of the Lord,' this also aligns with established biblical usage while remaining
    faithful to the Greek.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
