id: ACT.5.19
reference: Acts 5:19
source:
  edition: SBLGNT
  text: ἄγγελος δὲ κυρίου ⸀διὰ νυκτὸς ⸀ἤνοιξε τὰς θύρας τῆς φυλακῆς ἐξαγαγών τε αὐτοὺς
    εἶπεν·
translation:
  text: But an angel of the Lord opened the doors of the prison during the night,
    brought them out, and said,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄγγελος
  chosen: an angel
  alternatives:
  - the angel
  - a messenger
  lexicon: BDAG
  rationale: Rendered as 'an angel' because the noun is anarthrous and in Acts this
    normally refers to a heavenly angelic being in context, not merely a human messenger.
    'The angel' would over-specify definiteness not explicit in Greek.
- source_word: κυρίου
  chosen: of the Lord
  alternatives:
  - of the Master
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' In this construction
    ('angel of the Lord') it is the standard biblical expression and should be preserved.
- source_word: διὰ νυκτός
  chosen: during the night
  alternatives:
  - by night
  - at night
  lexicon: BDAG
  rationale: The genitive with διά here is temporal. 'During the night' is clear modern
    English and preserves the temporal sense without archaic phrasing.
- source_word: ἤνοιξε
  chosen: opened
  alternatives:
  - unlocked
  lexicon: BDAG
  rationale: The aorist verb ἀνοίγω straightforwardly means 'opened.' 'Unlocked' would
    add a detail not stated in the text.
- source_word: τὰς θύρας τῆς φυλακῆς
  chosen: the doors of the prison
  alternatives:
  - the prison doors
  - the gates of the prison
  lexicon: BDAG
  rationale: θύραι are 'doors'; φυλακή here denotes the prison/jail. 'Doors of the
    prison' is slightly more formal and transparent to the Greek structure, though
    idiomatic in English.
- source_word: ἐξαγαγών
  chosen: brought them out
  alternatives:
  - led them out
  - took them out
  lexicon: BDAG
  rationale: The participle from ἐξάγω indicates causing them to come out. 'Brought
    them out' is natural and does not imply more guidance than the Greek requires,
    though 'led them out' is also possible.
- source_word: τε
  chosen: and
  alternatives:
  - then
  - also
  lexicon: BDAG
  rationale: τέ links the participial action with the main verb in a mild connective
    sense. In English, simple 'and' best represents the coordination.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: λέγω in aorist narrative is most naturally 'said.' The following verse
    supplies the content, so ending with 'said,' appropriately carries the sentence
    forward.
