id: ACT.5.39
reference: Acts 5:39
source:
  edition: SBLGNT
  text: εἰ δὲ ἐκ θεοῦ ἐστιν, οὐ ⸀δυνήσεσθε καταλῦσαι ⸀αὐτούς·) μήποτε καὶ θεομάχοι
    εὑρεθῆτε. ἐπείσθησαν δὲ αὐτῷ,
translation:
  text: But if it is from God, you will not be able to overthrow them. You may even
    be found to be fighting against God.” So they were persuaded by him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destroy them' or 'bring them down.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you may even be found to be opponents of God'; literally, 'God-fighters.'
    reason: lexical_alternative
  - marker: c
    text: The pronoun 'them' most naturally refers to the apostles, though some understand
      it more broadly as their movement or work.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ θεοῦ
  chosen: from God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: The preposition ἐκ here denotes source or origin. 'From God' is the most
    natural modern English rendering and preserves Gamaliel's criterion of divine
    origin.
- source_word: δυνήσεσθε
  chosen: you will be able
  alternatives:
  - you can
  - you will have power
  lexicon: BDAG
  rationale: Future middle of δύναμαι expresses future capability. Rendering with
    'will be able' preserves both tense and sense more clearly than the simpler 'can'.
- source_word: καταλῦσαι
  chosen: to overthrow
  alternatives:
  - to destroy
  - to bring down
  - to abolish
  lexicon: BDAG
  rationale: In context, καταλύω refers to bringing a movement to ruin or nullifying
    it. 'Overthrow' fits the institutional and oppositional setting better than the
    more absolute 'destroy'.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - it
  lexicon: BDAG
  rationale: The pronoun is masculine plural, referring most naturally to the apostles
    rather than abstractly to 'this plan or work.' English should preserve the personal
    object here.
- source_word: μήποτε
  chosen: You may even
  alternatives:
  - lest perhaps
  - otherwise perhaps
  lexicon: BDAG
  rationale: μήποτε introduces a warning about an undesirable outcome. 'You may even'
    communicates the caution idiomatically in modern English without losing the force
    of possible discovery.
- source_word: θεομάχοι
  chosen: fighting against God
  alternatives:
  - God-fighters
  - opponents of God
  lexicon: BDAG
  rationale: The adjective/noun literally means those who fight against God. Rendering
    it verbally in English is more natural and preserves the theological seriousness.
- source_word: εὑρεθῆτε
  chosen: be found to be
  alternatives:
  - be discovered as
  - turn out to be
  lexicon: BDAG
  rationale: The passive of εὑρίσκω here conveys being shown or discovered to be in
    a certain state. 'Be found to be' is a standard and transparent English equivalent.
- source_word: ἐπείσθησαν δὲ αὐτῷ
  chosen: So they were persuaded by him
  alternatives:
  - And they listened to him
  - And they were convinced by him
  lexicon: BDAG
  rationale: The passive of πείθω indicates that the council accepted Gamaliel's counsel.
    'Were persuaded by him' is both accurate and idiomatic; 'So' gives a natural inferential
    sense for δέ in context.
