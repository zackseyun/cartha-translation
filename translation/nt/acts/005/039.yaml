theological_decisions:
- issue: Referent of αὐτούς in the warning about what cannot be overthrown
  chosen_reading: The pronoun refers to the apostles/the men before the council, not
    merely to the plan or movement in the abstract.
  alternative_readings:
  - The pronoun refers to the movement/message as an extension of the prior discussion
    of 'this plan or this work' in v. 38.
  rationale: The Greek pronoun is masculine plural and most directly points to the
    persons under discussion. Theologically, this avoids overextending the statement
    into a blanket promise about every claimed religious movement while still preserving
    Gamaliel's warning about opposing what may be of divine origin.
  doctrine_reference: Preserve theological tension rather than resolve it.
