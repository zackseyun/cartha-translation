theological_decisions:
- issue: Whether the verse should imply that Peter's shadow itself had healing power
  chosen_reading: The translation states only the people's purpose and hope, not that
    the shadow itself effected healing.
  alternative_readings:
  - A wording that more strongly suggests miraculous power resided in Peter's shadow
  rationale: 'The Greek presents the action with ἵνα and subjunctive as the crowd''s
    intention: they placed the sick so that Peter''s shadow might overshadow some
    of them. The verse does not explicitly state in itself that the shadow healed,
    though the broader context reports many healings. The translation preserves that
    narrative restraint.'
  doctrine_reference: Preserve theological tension rather than resolve it.
