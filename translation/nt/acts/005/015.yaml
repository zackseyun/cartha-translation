id: ACT.5.15
reference: Acts 5:15
source:
  edition: SBLGNT
  text: ὥστε ⸂καὶ εἰς⸃ τὰς πλατείας ἐκφέρειν τοὺς ἀσθενεῖς καὶ τιθέναι ἐπὶ ⸀κλιναρίων
    καὶ κραβάττων, ἵνα ἐρχομένου Πέτρου κἂν ἡ σκιὰ ⸀ἐπισκιάσῃ τινὶ αὐτῶν.
translation:
  text: so that they even carried the sick out into the streets and laid them on cots
    and mats, so that as Peter was coming by, even his shadow might overshadow some
    of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the public squares.' The Greek πλατείας can refer to broad streets
      or open public areas.
    reason: lexical_alternative
  - marker: b
    text: Or 'beds and pallets.' The Greek distinguishes two kinds of bedding or sleeping
      surfaces.
    reason: lexical_alternative
  - marker: c
    text: 'The verse reports the people''s intention: they positioned the sick so
      that even Peter''s shadow might overshadow them; it does not explicitly say
      here that the shadow itself healed.'
    reason: cross_reference
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - as a result that
  - with the result that
  lexicon: BDAG
  rationale: Introduces the result of the apostles' growing influence in the preceding
    context. 'So that' is natural English and preserves the consecutive force.
- source_word: καὶ εἰς τὰς πλατείας
  chosen: even ... out into the streets
  alternatives:
  - also into the streets
  - into the public squares
  lexicon: BDAG
  rationale: The combination heightens the extent of the action. πλατεῖαι can denote
    streets or broad public spaces; 'streets' is idiomatic here for places where people
    would pass by, while 'even' captures the emphatic καί.
- source_word: ἐκφέρειν
  chosen: carried ... out
  alternatives:
  - bring out
  - carry out
  lexicon: BDAG
  rationale: The infinitive describes physically bringing the sick from houses into
    public view. 'Carried ... out' fits the likely scene and reads naturally in English.
- source_word: τοὺς ἀσθενεῖς
  chosen: the sick
  alternatives:
  - the weak
  - the infirm
  lexicon: BDAG
  rationale: In this healing context ἀσθενεῖς refers to sick or infirm people, not
    merely weak in a general sense.
- source_word: τιθέναι
  chosen: laid
  alternatives:
  - placed
  - put
  lexicon: BDAG
  rationale: A natural English rendering for placing people on bedding. 'Laid' suits
    the context of sick persons being positioned to receive possible healing.
- source_word: ἐπὶ κλιναρίων καὶ κραβάττων
  chosen: on cots and mats
  alternatives:
  - on beds and pallets
  - on stretchers and sleeping mats
  lexicon: BDAG
  rationale: The two terms likely denote different kinds of bedding or portable sleeping
    surfaces. 'Cots and mats' preserves the distinction in accessible modern English
    without overstating technical differences.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose or intended result. 'So that' is idiomatic and clear.
- source_word: ἐρχομένου Πέτρου
  chosen: as Peter was coming by
  alternatives:
  - when Peter came
  - as Peter came along
  lexicon: BDAG
  rationale: The genitive absolute conveys Peter's movement past them. 'Was coming
    by' captures the ongoing sense and the idea of passing near them.
- source_word: κἂν
  chosen: even
  alternatives:
  - at least
  - if only
  lexicon: BDAG
  rationale: 'Here κἄν intensifies the minimal hoped-for contact: even Peter''s shadow
    would be enough. ''Even'' best conveys that nuance in smooth English.'
- source_word: σκιὰ
  chosen: shadow
  lexicon: BDAG
  rationale: Literal reference to Peter's shadow; no metaphor is indicated.
- source_word: ἐπισκιάσῃ
  chosen: might overshadow
  alternatives:
  - might fall upon
  - might cast a shadow on
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended possibility. 'Overshadow'
    is the direct lexical equivalent and preserves the verbal link with other NT uses,
    while remaining understandable.
- source_word: τινὶ αὐτῶν
  chosen: some of them
  alternatives:
  - any one of them
  - one of them
  lexicon: BDAG
  rationale: The singular indefinite with the genitive plural means any individual
    among them; 'some of them' communicates that Peter's shadow need only touch any
    among the sick gathered there.
