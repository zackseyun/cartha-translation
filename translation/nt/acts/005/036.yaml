theological_decisions:
- issue: Historical report of Theudas within Gamaliel's speech
  chosen_reading: Render the statement straightforwardly as part of Gamaliel's argument
    without attempting to harmonize or correct the historical reference in translation.
  alternative_readings:
  - Translate with wording that implies uncertainty or legendary status
  - Alter the wording to align with external historical reconstructions
  rationale: The verse presents Gamaliel's cited example in direct speech. Translation
    should reflect the Greek as given, not import a harmonization strategy or historical
    judgment into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
