id: ACT.5.36
reference: Acts 5:36
source:
  edition: SBLGNT
  text: πρὸ γὰρ τούτων τῶν ἡμερῶν ἀνέστη Θευδᾶς, λέγων εἶναί τινα ἑαυτόν, ᾧ ⸀προσεκλίθη
    ⸂ἀνδρῶν ἀριθμὸς ὡς⸃ τετρακοσίων· ὃς ἀνῃρέθη, καὶ πάντες ὅσοι ἐπείθοντο αὐτῷ διελύθησαν
    καὶ ἐγένοντο εἰς οὐδέν.
translation:
  text: For before these days Theudas rose up, claiming to be somebody, and a number
    of men, about four hundred, joined him. He was killed, and all who had been persuaded
    by him were scattered and came to nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'claiming to be someone important.' The Greek idiom means that he presented
      himself as a person of significance.
    reason: lexical_alternative
  - marker: b
    text: Or 'attached themselves to him' or 'rallied to him.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all who followed him.' More literally, 'all who were persuaded by him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸ γὰρ τούτων τῶν ἡμερῶν
  chosen: For before these days
  alternatives:
  - For before these times
  - For some time ago before this
  lexicon: BDAG
  rationale: πρό with the genitive marks prior time; γάρ is retained as 'For' to preserve
    Gamaliel's explanatory argument. 'These days' is a natural rendering of the demonstrative
    phrase without over-paraphrase.
- source_word: ἀνέστη
  chosen: rose up
  alternatives:
  - appeared
  - came forward
  lexicon: BDAG
  rationale: In this context ἀνίστημι refers to the emergence of a leader or movement,
    not literal resurrection. 'Rose up' preserves the idiomatic sense and rhetorical
    force.
- source_word: Θευδᾶς
  chosen: Theudas
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: λέγων εἶναί τινα ἑαυτόν
  chosen: claiming to be somebody
  alternatives:
  - saying that he was someone
  - claiming to be someone important
  lexicon: BDAG
  rationale: The participial clause expresses Theudas's self-assertion. τινα ἑαυτόν
    is idiomatic for making oneself out to be significant. 'Somebody' captures the
    idiom in readable modern English without adding more than the Greek warrants.
- source_word: ᾧ προσεκλίθη
  chosen: joined him
  alternatives:
  - attached themselves to him
  - rallied to him
  lexicon: BDAG
  rationale: The passive of προσκλίνομαι here conveys people aligning themselves with
    or joining a leader. 'Joined him' is concise and natural while preserving the
    sense of adherence.
- source_word: ἀνδρῶν ἀριθμὸς ὡς τετρακοσίων
  chosen: a number of men, about four hundred
  alternatives:
  - about four hundred men
  - a group of about four hundred men
  lexicon: BDAG
  rationale: ἀριθμὸς with a genitive means 'a number of'; ὡς marks approximation.
    'Men' is retained because ἀνδρῶν specifically denotes males, fitting the gender-accurate
    principle.
- source_word: ὃς ἀνῃρέθη
  chosen: He was killed
  alternatives:
  - he was slain
  - he was done away with
  lexicon: BDAG
  rationale: ἀναιρέω in this context means to kill or do away with. 'He was killed'
    is clear modern English and preserves the passive sense.
- source_word: πάντες ὅσοι ἐπείθοντο αὐτῷ
  chosen: all who had been persuaded by him
  alternatives:
  - all who followed him
  - all who were obeying him
  lexicon: BDAG
  rationale: πείθω in the imperfect passive/middle here denotes being won over or
    persuaded, not merely generic following. 'Had been persuaded by him' reflects
    both the passive nuance and the causal relation to Theudas.
- source_word: διελύθησαν
  chosen: were scattered
  alternatives:
  - were dispersed
  - were broken up
  lexicon: BDAG
  rationale: διαλύω here describes the dissolution of the movement's adherents. 'Were
    scattered' is idiomatic and fits the narrative context.
- source_word: ἐγένοντο εἰς οὐδέν
  chosen: came to nothing
  alternatives:
  - amounted to nothing
  - became nothing
  lexicon: BDAG
  rationale: This idiom expresses the collapse and futility of the movement. 'Came
    to nothing' is the most natural English equivalent.
