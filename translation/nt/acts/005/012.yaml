theological_decisions:
- issue: Referent of 'they were all together'
  chosen_reading: The phrase refers to the gathered body associated with the apostles,
    without narrowing it to apostles alone in translation.
  alternative_readings:
  - the apostles alone were all together
  - all the believers were all together
  rationale: The Greek text leaves the antecedent of 'they' implicit. The translation
    preserves that openness rather than resolving it toward either apostles only or
    the entire church. This follows the doctrine's instruction to preserve genuine
    ambiguity rather than settle contested interpretation in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
