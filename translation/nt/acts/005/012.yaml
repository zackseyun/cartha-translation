id: ACT.5.12
reference: Acts 5:12
source:
  edition: SBLGNT
  text: Διὰ δὲ τῶν χειρῶν τῶν ἀποστόλων ἐγίνετο σημεῖα καὶ τέρατα ⸂πολλὰ ἐν τῷ λαῷ⸃·
    καὶ ἦσαν ὁμοθυμαδὸν ⸀ἅπαντες ἐν τῇ Στοᾷ Σολομῶντος·
translation:
  text: Now many signs and wonders were being done among the people through the hands
    of the apostles, and they were all together in Solomon’s Portico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with one accord.' The Greek emphasizes shared unity as well as physical
      gathering.
    reason: lexical_alternative
  - marker: b
    text: Or 'Solomon’s Colonnade.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ ... τῶν χειρῶν τῶν ἀποστόλων
  chosen: through the hands of the apostles
  alternatives:
  - through the apostles
  - by the hands of the apostles
  lexicon: BDAG
  rationale: διά with the genitive expresses means or agency. Retaining 'through the
    hands' preserves the concrete Greek idiom and emphasizes instrumentality without
    over-paraphrasing to the smoother but less explicit 'through the apostles.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Now'
    gives a natural English transition while preserving the discourse movement.
- source_word: ἐγίνετο
  chosen: were being done
  alternatives:
  - were happening
  - came to pass
  lexicon: BDAG
  rationale: The imperfect middle/passive here conveys ongoing activity in past time.
    With 'signs and wonders' as the subject, English idiom is best represented by
    the passive 'were being done,' preserving the sense of repeated or continuing
    miraculous activity.
- source_word: σημεῖα καὶ τέρατα
  chosen: signs and wonders
  alternatives:
  - miraculous signs and wonders
  lexicon: BDAG
  rationale: This is a common Lukan pairing for miraculous acts. 'Signs and wonders'
    is the standard and sufficiently transparent rendering; adding 'miraculous' would
    be interpretive and somewhat redundant.
- source_word: πολλὰ
  chosen: many
  alternatives:
  - numerous
  lexicon: BDAG
  rationale: πολλά modifies both 'signs' and 'wonders' and is naturally rendered 'many'
    in readable modern English.
- source_word: ἐν τῷ λαῷ
  chosen: among the people
  alternatives:
  - among the people of Israel
  - in the people
  lexicon: BDAG
  rationale: ἐν with λαός here indicates sphere/location among the gathered people.
    'Among the people' is idiomatic and avoids over-specifying ethnic reference beyond
    what the immediate wording states.
- source_word: ὁμοθυμαδὸν
  chosen: together
  alternatives:
  - with one accord
  - unitedly
  lexicon: BDAG
  rationale: The adverb denotes shared purpose or unified gathering. 'Together' is
    clear modern English; the fuller nuance of unanimity is contextually present but
    'with one accord' is more archaic. Because some nuance may be felt as reduced,
    an alternative is preserved in a footnote.
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - all of them
  - everyone
  lexicon: BDAG
  rationale: ἅπαντες is comprehensive. 'All' is concise and natural, and in combination
    with 'they were' clearly refers to the whole group in view.
- source_word: Στοᾷ Σολομῶντος
  chosen: Solomon’s Portico
  alternatives:
  - Solomon's Colonnade
  - the Portico of Solomon
  lexicon: BDAG
  rationale: στοά refers to a covered colonnade or portico. 'Portico' is a standard
    architectural term and preserves the specific location without sounding overly
    technical; 'Solomon's Colonnade' is a viable alternative preserved in a footnote.
