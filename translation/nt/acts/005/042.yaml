id: ACT.5.42
reference: Acts 5:42
source:
  edition: SBLGNT
  text: πᾶσάν τε ἡμέραν ἐν τῷ ἱερῷ καὶ κατ’ οἶκον οὐκ ἐπαύοντο διδάσκοντες καὶ εὐαγγελιζόμενοι
    ⸂τὸν χριστὸν Ἰησοῦν⸃.
translation:
  text: And every day, in the temple and from house to house, they did not stop teaching
    and proclaiming the good news that Jesus is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'proclaiming the good news of Jesus the Messiah' / 'proclaiming
      Jesus as the Messiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσάν τε ἡμέραν
  chosen: And every day
  alternatives:
  - day after day
  - every single day
  lexicon: BDAG
  rationale: Accusative of extent/time with τε linking to the previous narrative.
    'Every day' is natural English and preserves the continual, habitual sense.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - at the temple
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the sanctuary proper.
    'In the temple' is concise and idiomatic; 'temple courts' is possible but slightly
    more interpretive.
- source_word: κατ’ οἶκον
  chosen: from house to house
  alternatives:
  - at home
  - in homes
  - house by house
  lexicon: BDAG
  rationale: The distributive force of κατά with singular οἶκον is best captured by
    'from house to house' or 'house by house,' indicating activity in private homes
    rather than merely 'at home.'
- source_word: οὐκ ἐπαύοντο
  chosen: they did not stop
  alternatives:
  - they did not cease
  - they kept on
  lexicon: BDAG
  rationale: Imperfect middle conveys ongoing refusal to stop. 'Did not stop' is clear
    modern English; 'did not cease' is more formal but less natural.
- source_word: διδάσκοντες
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: Standard rendering of διδάσκω. It pairs naturally with the following
    participle and reflects ongoing apostolic instruction.
- source_word: εὐαγγελιζόμενοι
  chosen: proclaiming the good news
  alternatives:
  - preaching the gospel
  - announcing the good news
  lexicon: BDAG
  rationale: The verb means to announce good news / proclaim the gospel. 'Proclaiming
    the good news' is accessible modern English and preserves the evangelistic sense.
- source_word: τὸν χριστὸν Ἰησοῦν
  chosen: that Jesus is the Messiah
  alternatives:
  - Jesus the Messiah
  - the Messiah Jesus
  - the Christ Jesus
  lexicon: BDAG
  rationale: 'Given the article with Χριστόν and the doctrinal guidance to translate
    titles, Χριστός is rendered ''Messiah'' rather than transliterated ''Christ.''
    In this construction after εὐαγγελιζόμενοι, the sense is the content of the proclamation:
    that Jesus is the Messiah.'
