theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Christological titles be translated, with Χριστός
    rendered 'Messiah' where it functions as a title rather than a name-like element.
    Here the phrase presents the apostolic proclamation about Jesus' messianic identity,
    so 'Messiah' best preserves the title's meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Syntactical force of τὸν χριστὸν Ἰησοῦν after εὐαγγελιζόμενοι
  chosen_reading: 'content proclamation: ''that Jesus is the Messiah'''
  alternative_readings:
  - '''Jesus the Messiah'' as an object phrase'
  rationale: The accusative phrase can be represented woodenly as the object of 'proclaiming
    good news,' but idiomatic English normally expresses the content explicitly. This
    avoids obscuring the claim being proclaimed while staying within the source sense.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source plain sense
    without paraphrase'
