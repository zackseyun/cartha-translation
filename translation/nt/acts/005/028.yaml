id: ACT.5.28
reference: Acts 5:28
source:
  edition: SBLGNT
  text: ⸀λέγων· Παραγγελίᾳ παρηγγείλαμεν ὑμῖν μὴ διδάσκειν ἐπὶ τῷ ὀνόματι τούτῳ, καὶ
    ἰδοὺ πεπληρώκατε τὴν Ἰερουσαλὴμ τῆς διδαχῆς ὑμῶν, καὶ βούλεσθε ἐπαγαγεῖν ἐφ’ ἡμᾶς
    τὸ αἷμα τοῦ ἀνθρώπου τούτου.
translation:
  text: saying, “We strictly ordered you not to teach in this name, and look, you
    have filled Jerusalem with your teaching, and you intend to bring this man's blood
    upon us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'hold us responsible for this man's death.' The Greek
      speaks of bringing 'this man's blood' upon them, an idiom for bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παραγγελίᾳ παρηγγείλαμεν
  chosen: We strictly ordered
  alternatives:
  - We gave strict orders
  - We commanded in a command
  lexicon: BDAG
  rationale: The dative noun plus cognate verb intensifies the command. English cannot
    naturally reproduce the exact cognate construction, so 'strictly ordered' conveys
    the emphatic force without awkwardness.
- source_word: μὴ διδάσκειν
  chosen: not to teach
  alternatives:
  - to stop teaching
  - not to be teaching
  lexicon: BDAG
  rationale: The present infinitive after μή with a verb of command is naturally rendered
    as the content of the prohibition, 'not to teach.' The text does not require the
    more interpretive 'stop teaching.'
- source_word: ἐπὶ τῷ ὀνόματι τούτῳ
  chosen: in this name
  alternatives:
  - on the basis of this name
  - about this name
  lexicon: BDAG
  rationale: In Acts, speaking or teaching 'in the name' commonly denotes acting or
    speaking under the authority associated with that name. 'In this name' is idiomatic
    English and preserves the likely sense better than a flatter 'about this name.'
- source_word: ἰδοὺ
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: BDAG
  rationale: '''Look'' preserves the deictic and confrontational force in readable
    modern English. ''Behold'' is too archaic for the stated translation philosophy.'
- source_word: πεπληρώκατε τὴν Ἰερουσαλὴμ
  chosen: you have filled Jerusalem
  alternatives:
  - you have saturated Jerusalem
  - you have made Jerusalem full
  lexicon: BDAG
  rationale: The perfect tense indicates a completed action with present effect. 'You
    have filled Jerusalem' is both natural and close to the Greek metaphor.
- source_word: τῆς διδαχῆς ὑμῶν
  chosen: with your teaching
  alternatives:
  - with your doctrine
  - with what you teach
  lexicon: BDAG
  rationale: The genitive after 'filled' is well represented by English 'with.' 'Teaching'
    is clearer and less tradition-bound than 'doctrine' while preserving the content
    of διδαχή.
- source_word: βούλεσθε
  chosen: you intend
  alternatives:
  - you want
  - you are determined
  lexicon: BDAG
  rationale: The middle form here expresses volition. 'You intend' fits the accusatory
    tone and the infinitive complement naturally in English.
- source_word: ἐπαγαγεῖν ἐφ’ ἡμᾶς
  chosen: to bring upon us
  alternatives:
  - to bring against us
  - to place on us
  lexicon: BDAG
  rationale: The verb with ἐπί conveys bringing something onto or upon someone, here
    in the sense of assigning liability or guilt. 'Bring upon us' preserves that idiom.
- source_word: τὸ αἷμα τοῦ ἀνθρώπου τούτου
  chosen: this man's blood
  alternatives:
  - the blood of this man
  lexicon: BDAG
  rationale: This idiom refers to responsibility for the man's death or bloodguilt.
    'This man's blood' is idiomatic English and preserves the hostile distancing of
    'this man.'
- source_word: ἀνθρώπου
  chosen: man's
  alternatives:
  - person's
  lexicon: BDAG
  rationale: The Greek is singular masculine and refers to a specific male individual,
    Jesus. Per the gender-accurate policy, 'man's' is the appropriate rendering.
