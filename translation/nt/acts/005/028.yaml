theological_decisions:
- issue: Implication of 'bring this man's blood upon us'
  chosen_reading: Render as an accusation of assigning bloodguilt/responsibility for
    Jesus' death, without making the implication explicit in the main text.
  alternative_readings:
  - Render interpretively as 'hold us responsible for this man's death'
  rationale: The Greek idiom of blood coming upon someone commonly denotes bloodguilt.
    To preserve the text's imagery and avoid over-paraphrase, the main text keeps
    'this man's blood upon us,' while the idiomatic sense is documented here and preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it beyond the source text.'
