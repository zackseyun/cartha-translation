theological_decisions:
- issue: Moral force of Ananias's action
  chosen_reading: Render the act as deceptive withholding ('kept back some of') rather
    than neutral retention.
  alternative_readings:
  - retained part of the money
  rationale: The narrative context and the verb νοσφίζομαι indicate wrongful, concealed
    withholding, not merely keeping a legitimate portion. The translation should preserve
    that negative force without adding doctrinal commentary beyond the text.
  doctrine_reference: Translation philosophy §1, §3
