id: ACT.5.2
reference: Acts 5:2
source:
  edition: SBLGNT
  text: καὶ ἐνοσφίσατο ἀπὸ τῆς τιμῆς, συνειδυίης καὶ τῆς ⸀γυναικός, καὶ ἐνέγκας μέρος
    τι παρὰ τοὺς πόδας τῶν ἀποστόλων ἔθηκεν.
translation:
  text: And he kept back some of the proceeds, with his wife also knowing it, and
    bringing a certain part, he laid it at the apostles’ feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'secretly withheld from the sale price'; the Greek verb implies dishonest
      keeping back for oneself.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'at the feet of the apostles,' a concrete expression for placing
      the money before them.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνοσφίσατο
  chosen: kept back some of
  alternatives:
  - misappropriated from
  - secretly withheld from
  lexicon: BDAG
  rationale: The verb νοσφίζομαι carries the sense of appropriating or withholding
    for oneself, often covertly. In this context, 'kept back some of' is idiomatic
    English that preserves the deceptive withholding without over-specifying legal
    theft language in the main text. The 'some of' is supplied from context with ἀπὸ
    τῆς τιμῆς.
- source_word: ἀπὸ τῆς τιμῆς
  chosen: of the proceeds
  alternatives:
  - from the price
  - from the sale price
  lexicon: BDAG
  rationale: τιμή here refers to the amount received from the sale. 'Proceeds' communicates
    the financial result naturally in English, while still reflecting the genitive
    with ἀπό. 'Price' is more literal but less idiomatic in this context.
- source_word: συνειδυίης καὶ τῆς γυναικός
  chosen: with his wife also knowing it
  alternatives:
  - his wife also being aware of it
  - with the knowledge of his wife
  lexicon: BDAG
  rationale: 'The genitive absolute indicates attendant circumstance: his wife was
    aware of the act. ''Knowing it'' is concise and natural; ''also'' reflects καί.
    The possessive ''his'' is contextually appropriate though not explicit in the
    noun alone.'
- source_word: ἐνέγκας
  chosen: bringing
  alternatives:
  - having brought
  - after bringing
  lexicon: BDAG
  rationale: The aorist participle is most naturally rendered in English as a participial
    action preceding the main verb. 'Bringing' keeps the flow readable while preserving
    the participial relationship.
- source_word: μέρος τι
  chosen: a certain part
  alternatives:
  - some part
  - a portion
  lexicon: BDAG
  rationale: μέρος τι denotes an indefinite portion. 'A certain part' is slightly
    more formal but closely tracks the Greek indefiniteness; 'a portion' is possible
    but less transparent to the underlying wording.
- source_word: παρὰ τοὺς πόδας τῶν ἀποστόλων ἔθηκεν
  chosen: he laid it at the apostles’ feet
  alternatives:
  - he placed it before the apostles
  - he set it beside the apostles' feet
  lexicon: BDAG
  rationale: This is a conventional expression in Acts for placing money before apostolic
    authority. 'At the apostles’ feet' preserves the concrete imagery and narrative
    continuity with the surrounding context.
