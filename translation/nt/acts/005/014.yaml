id: ACT.5.14
reference: Acts 5:14
source:
  edition: SBLGNT
  text: μᾶλλον δὲ προσετίθεντο πιστεύοντες τῷ κυρίῳ πλήθη ἀνδρῶν τε καὶ γυναικῶν·
translation:
  text: And even more believers in the Lord were being added—multitudes of both men
    and women.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were joining' or 'were added.' The Greek verb can be understood as an
      ongoing increase in number, with a passive sense that may imply God as the one
      adding them.
    reason: lexical_alternative
lexical_decisions:
- source_word: μᾶλλον
  chosen: even more
  alternatives:
  - more and more
  - all the more
  lexicon: BDAG
  rationale: Adverb intensifying the increase described in context. 'Even more' captures
    the comparative force naturally in English without sounding wooden.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - —
  lexicon: BDAG
  rationale: Here δέ is mildly connective rather than strongly adversative. 'And'
    best carries the narrative continuation in readable English.
- source_word: προσετίθεντο
  chosen: were being added
  alternatives:
  - were added
  - were joining
  - increased
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing addition over time. 'Were being added'
    preserves both the imperfective aspect and the passive form better than the simpler
    'were added.' 'Increased' is too interpretive and loses the imagery of addition.
- source_word: πιστεύοντες
  chosen: believers
  alternatives:
  - those believing
  - people believing
  lexicon: BDAG
  rationale: The present participle functions substantivally. 'Believers' is concise,
    idiomatic, and accurately reflects those characterized by believing.
- source_word: τῷ κυρίῳ
  chosen: in the Lord
  alternatives:
  - to the Lord
  - for the Lord
  lexicon: BDAG
  rationale: With πιστεύω, the dative can be rendered as the object of trust. In English
    NT usage, 'believers in the Lord' is the most natural expression of faith directed
    toward the Lord. This also follows the default rendering of κύριος as 'Lord' per
    doctrine guidance.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per the project's contested-terms guidance, κύριος is rendered 'Lord.'
    In this context it refers to Jesus and carries both reverential and christological
    force.
- source_word: πλήθη
  chosen: multitudes
  alternatives:
  - large numbers
  - crowds
  lexicon: BDAG
  rationale: Neuter plural noun used appositionally/exegetically to specify the scale
    of those being added. 'Multitudes' preserves the sense of large numbers without
    reducing it to a vague paraphrase.
- source_word: ἀνδρῶν τε καὶ γυναικῶν
  chosen: of both men and women
  alternatives:
  - of men and women
  - both men and women
  lexicon: BDAG
  rationale: The genitives depend on πλήθη. 'Of both men and women' makes explicit
    the correlative force of τε καί and preserves the gendered wording of the Greek.
