theological_decisions:
- issue: Referent and force of 'the Lord'
  chosen_reading: '''the Lord'' refers to Jesus, and the phrase expresses people coming
    to faith in him.'
  alternative_readings:
  - '''the Lord'' could be heard more generally as God'
  rationale: In Acts, κύριος often refers to the risen Jesus in evangelistic summaries,
    and πιστεύοντες τῷ κυρίῳ naturally describes faith directed toward him. The translation
    preserves the title without expanding it interpretively to 'Jesus' in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Voice/aspect of προσετίθεντο
  chosen_reading: 'Passive-progressive sense: people were being added.'
  alternative_readings:
  - 'Middle/intransitive nuance: people were joining themselves'
  rationale: Luke frequently uses προστίθημι in growth summaries with divine-implicit
    passive force ('the Lord added'). Retaining the passive preserves that theological
    nuance without making God the explicit subject where the Greek does not.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
