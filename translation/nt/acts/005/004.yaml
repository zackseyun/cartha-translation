id: ACT.5.4
reference: Acts 5:4
source:
  edition: SBLGNT
  text: οὐχὶ μένον σοὶ ἔμενεν καὶ πραθὲν ἐν τῇ σῇ ἐξουσίᾳ ὑπῆρχεν; τί ὅτι ἔθου ἐν
    τῇ καρδίᾳ σου τὸ πρᾶγμα τοῦτο; οὐκ ἐψεύσω ἀνθρώποις ἀλλὰ τῷ θεῷ.
translation:
  text: While it remained unsold, did it not remain yours? And after it was sold,
    was it not under your authority? Why is it that you have set this matter in your
    heart? You have not lied to men but to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was at your disposal' or 'was in your power' for 'was under your authority.'
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here means human beings generally, not males only.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μένον / ἔμενεν
  chosen: remained / remain
  alternatives:
  - was remaining
  - continued to be
  lexicon: BDAG
  rationale: The participle plus imperfect emphasizes the state of the property before
    sale. 'Remain' preserves the verbal repetition in Greek and clearly conveys continued
    possession.
- source_word: σοὶ
  chosen: yours
  alternatives:
  - to you
  - your own
  lexicon: BDAG
  rationale: 'The dative with μένω is idiomatically rendered in English as possession:
    ''remain yours'' rather than the wooden ''remain to you.'''
- source_word: πραθὲν
  chosen: was sold
  alternatives:
  - having been sold
  lexicon: BDAG
  rationale: An English finite clause is more natural here while preserving the passive
    sense of the aorist participle.
- source_word: ἐν τῇ σῇ ἐξουσίᾳ ὑπῆρχεν
  chosen: was ... under your authority
  alternatives:
  - was at your disposal
  - belonged to your control
  - was in your power
  lexicon: BDAG
  rationale: ἐξουσία denotes authority, right, or control. 'Under your authority'
    preserves the sense of rightful control without over-paraphrasing. It also fits
    Peter's point that Ananias was free to decide what to do with the proceeds.
- source_word: τί ὅτι
  chosen: Why is it that
  alternatives:
  - Why
  - How is it that
  lexicon: BDAG
  rationale: This idiom introduces a rebuke or probing question. 'Why is it that'
    reflects the emphatic, slightly confrontational force better than a bare 'Why'.
- source_word: ἔθου ἐν τῇ καρδίᾳ σου
  chosen: you have set ... in your heart
  alternatives:
  - you conceived in your heart
  - you planned in your heart
  - you put in your heart
  lexicon: BDAG
  rationale: The expression denotes inward resolve or intention. 'Set this matter
    in your heart' is natural English and preserves the heart-language rather than
    reducing it merely to 'planned.'
- source_word: τὸ πρᾶγμα τοῦτο
  chosen: this matter
  alternatives:
  - this thing
  - this deed
  - this scheme
  lexicon: BDAG
  rationale: πρᾶγμα is broad ('matter, thing, deed, affair'). 'This matter' is suitably
    neutral and lets the context define its moral weight without importing extra interpretation.
- source_word: οὐκ ἐψεύσω ἀνθρώποις ἀλλὰ τῷ θεῷ
  chosen: You have not lied to men but to God
  alternatives:
  - You did not lie to people but to God
  - You have lied not to men but to God
  lexicon: BDAG
  rationale: The middle verb ψεύδομαι with dative means 'lie to.' 'Men' matches the
    Greek ἀνθρώποις here in contrast with God; it is not intended to exclude women
    but reflects the representative human sense in a concise form.
