theological_decisions:
- issue: Implication of the Spirit's divinity in the immediate context (cf. Acts 5:3)
  chosen_reading: Render the clause straightforwardly as 'to God' without adding explanatory
    wording.
  alternative_readings:
  - Explicitly harmonize with v.3 by paraphrasing 'to God, that is, to the Holy Spirit'
  rationale: The verse itself says 'to God.' The surrounding context strongly contributes
    to Trinitarian theology, but the translation should not import explanatory material
    into the main text. Historic orthodoxy is preserved by translating the text as
    written and allowing the canonical context to speak.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Possession and freedom over the property
  chosen_reading: Translate to emphasize Ananias's real authority over the property
    and proceeds.
  alternative_readings:
  - Translate more weakly as mere possession without volitional freedom
  rationale: Peter's argument is that the sin was not failure to surrender property
    but deceit. 'Under your authority' preserves that moral-theological point without
    denominational overlay.
  doctrine_reference: 'Translation philosophy #1 and #6'
- issue: ἀνθρώποις rendered as 'men'
  chosen_reading: Use 'men' in the main text.
  alternative_readings:
  - people
  - human beings
  rationale: The Greek plural can be generic for humans. Per the gender-accurate policy,
    'men' is acceptable where representative force is intended; an inclusivity clarification
    is best preserved in a footnote rather than flattening the contrastive rhetoric
    of 'men ... God.'
  doctrine_reference: 'Translation philosophy #4'
