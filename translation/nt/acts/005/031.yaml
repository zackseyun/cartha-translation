id: ACT.5.31
reference: Acts 5:31
source:
  edition: SBLGNT
  text: τοῦτον ὁ θεὸς ἀρχηγὸν καὶ σωτῆρα ὕψωσεν τῇ δεξιᾷ αὐτοῦ, ⸀τοῦ δοῦναι μετάνοιαν
    τῷ Ἰσραὴλ καὶ ἄφεσιν ἁμαρτιῶν·
translation:
  text: God exalted this one to his right hand as Leader and Savior, to give repentance
    to Israel and forgiveness of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by his right hand." The Greek phrase may be read instrumentally, though
      here it likely refers to exaltation to the place of highest honor at God's right
      hand.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτον
  chosen: this one
  alternatives:
  - him
  lexicon: BDAG
  rationale: The demonstrative is emphatic and points back to Jesus specifically.
    'This one' preserves the force better than the smoother but less marked 'him'.
- source_word: ἀρχηγὸν
  chosen: Leader
  alternatives:
  - Prince
  - Founder
  - Pioneer
  - Author
  lexicon: BDAG
  rationale: ἀρχηγός can denote one who leads, originates, or stands at the head.
    In Acts 5:31, paired with 'Savior' and in a royal-exaltation context, 'Leader'
    is clear modern English and preserves the sense of one elevated to governing headship
    without importing the archaic ambiguity of 'Prince.'
- source_word: σωτῆρα
  chosen: Savior
  alternatives:
  - Deliverer
  lexicon: BDAG
  rationale: Standard rendering for σωτήρ in this christological context; it preserves
    both rescue and salvific theological weight.
- source_word: ὕψωσεν
  chosen: exalted
  alternatives:
  - raised up
  - lifted up
  lexicon: BDAG
  rationale: In this context the verb refers to God's elevating Jesus to honor/status
    at his right hand, not merely resurrection. 'Exalted' best fits the royal-enthronement
    sense.
- source_word: τῇ δεξιᾷ αὐτοῦ
  chosen: to his right hand
  alternatives:
  - by his right hand
  - at his right hand
  lexicon: BDAG
  rationale: The dative phrase can be understood instrumentally ('by his right hand')
    or locatively/associatively ('to/at his right hand'). Given the exaltation context
    and common NT idiom of enthronement, 'to his right hand' best conveys placement
    in highest honor. The instrumental alternative is preserved in a footnote because
    the Greek permits it.
- source_word: τοῦ δοῦναι
  chosen: to give
  alternatives:
  - in order to give
  - so as to give
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. Simple 'to give' is natural
    English and adequately conveys purpose in context.
- source_word: μετάνοιαν
  chosen: repentance
  alternatives:
  - a change of mind
  - turning
  lexicon: BDAG
  rationale: '''Repentance'' is the established and accurate rendering for μετάνοια
    here, encompassing a decisive turning to God rather than mere mental reconsideration.'
- source_word: τῷ Ἰσραὴλ
  chosen: to Israel
  alternatives:
  - for Israel
  lexicon: BDAG
  rationale: The dative is naturally rendered 'to Israel' with δοῦναι. This preserves
    the direct-object/recipient structure of the Greek.
- source_word: ἄφεσιν ἁμαρτιῶν
  chosen: forgiveness of sins
  alternatives:
  - release from sins
  - pardon of sins
  lexicon: BDAG
  rationale: This is a standard NT expression. 'Forgiveness of sins' is clear, idiomatic,
    and theologically precise.
