theological_decisions:
- issue: Sense of Jesus' exaltation at God's right hand
  chosen_reading: The verse speaks of God's exalting Jesus to the position of highest
    honor and authority at his right hand.
  alternative_readings:
  - The phrase could be taken instrumentally, 'God exalted him by his right hand.'
  rationale: The immediate syntax and broader NT enthronement idiom favor locative/associative
    exaltation rather than instrument alone. This preserves the christological force
    of the passage without overstating beyond the Greek. The alternative is retained
    in a footnote because the dative construction allows it.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), including the homoousios
    language; Translation philosophy §3 Preserve theological tension rather than resolve
    it.'
