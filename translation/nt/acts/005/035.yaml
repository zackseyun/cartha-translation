id: ACT.5.35
reference: Acts 5:35
source:
  edition: SBLGNT
  text: εἶπέν τε πρὸς αὐτούς· Ἄνδρες Ἰσραηλῖται, προσέχετε ἑαυτοῖς ἐπὶ τοῖς ἀνθρώποις
    τούτοις τί μέλλετε πράσσειν.
translation:
  text: And he said to them, “Men of Israel, be careful about what you are about to
    do with these men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take heed to yourselves concerning these men what you are about to do.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπέν τε
  chosen: And he said
  alternatives:
  - Then he said
  - So he said
  lexicon: BDAG
  rationale: The conjunction τέ lightly connects this statement to the preceding narrative.
    'And he said' preserves the simple narrative linkage without overstating sequence
    or inference.
- source_word: πρὸς αὐτούς
  chosen: to them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: With λέγω, πρός + accusative idiomatically marks the addressees of speech.
    'To them' is standard and natural English.
- source_word: Ἄνδρες Ἰσραηλῖται
  chosen: Men of Israel
  alternatives:
  - Men, Israelites
  - Israelite men
  lexicon: BDAG
  rationale: This is a formal vocative address used in Acts. 'Men of Israel' is idiomatic
    English and preserves the masculine representative form present in the Greek,
    in keeping with the gender-accurate policy.
- source_word: προσέχετε ἑαυτοῖς
  chosen: be careful
  alternatives:
  - take heed
  - watch yourselves
  - pay attention to yourselves
  lexicon: BDAG
  rationale: The imperative προσέχετε with reflexive dative ἑαυτοῖς conveys caution
    or careful self-watch. 'Be careful' communicates the warning naturally in modern
    English while retaining the force of admonition. The reflexive nuance is carried
    by the construction 'be careful about what you are about to do.'
- source_word: ἐπὶ τοῖς ἀνθρώποις τούτοις
  chosen: with these men
  alternatives:
  - concerning these men
  - in regard to these men
  - against these men
  lexicon: BDAG
  rationale: Here ἐπί with the dative after a verb of caution points to the matter
    under consideration. In context Gamaliel warns about intended action toward the
    apostles, so 'with these men' best captures the practical sense without importing
    hostility more strongly than the Greek states. 'Against these men' is possible
    contextually but is more interpretive.
- source_word: τί μέλλετε πράσσειν
  chosen: what you are about to do
  alternatives:
  - what you intend to do
  - what you are going to do
  lexicon: BDAG
  rationale: μέλλω + infinitive often indicates imminence or intended future action.
    'Are about to do' preserves both the forward-looking and cautionary force. πράσσειν
    is rendered simply 'do' as the natural English equivalent in this context.
