id: ACT.5.22
reference: Acts 5:22
source:
  edition: SBLGNT
  text: οἱ δὲ ⸂παραγενόμενοι ὑπηρέται⸃ οὐχ εὗρον αὐτοὺς ἐν τῇ φυλακῇ, ἀναστρέψαντες
    δὲ ἀπήγγειλαν
translation:
  text: But when the officers arrived, they did not find them in the prison; so they
    returned and reported,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραγενόμενοι
  chosen: arrived
  alternatives:
  - came
  - having come
  - appeared
  lexicon: BDAG
  rationale: The participle with ὑπηρέται describes the officers' arrival at the prison.
    'Arrived' is natural modern English and preserves the temporal sense without awkwardness.
- source_word: ὑπηρέται
  chosen: officers
  alternatives:
  - servants
  - attendants
  - temple police
  lexicon: BDAG
  rationale: In Acts this term commonly refers to official attendants under the authority
    of the Jewish leaders, not household servants. 'Officers' best fits the institutional
    setting and remains readable. 'Temple police' is more interpretive than the Greek
    explicitly states in this verse.
- source_word: οὐχ εὗρον
  chosen: did not find
  alternatives:
  - did not discover
  lexicon: BDAG
  rationale: Standard rendering of εὑρίσκω in narrative context; straightforward and
    idiomatic.
- source_word: ἐν τῇ φυλακῇ
  chosen: in the prison
  alternatives:
  - in the jail
  - in prison
  lexicon: BDAG
  rationale: The article points to the specific prison already in view. 'The prison'
    preserves that specificity better than the more general 'in prison.'
- source_word: ἀναστρέψαντες
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: BDAG
  rationale: In this context the participle indicates going back from the prison to
    those who sent them. 'Returned' is concise and idiomatic.
- source_word: ἀπήγγειλαν
  chosen: reported
  alternatives:
  - announced
  - informed
  - reported back
  lexicon: BDAG
  rationale: The verb denotes bringing a report. 'Reported' fits the official tone
    and avoids unnecessary expansion.
- source_word: δέ
  chosen: But / so
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: The first δέ marks contrast with the expectation that the apostles would
    be found; 'But' captures this. The second δέ is lightly connective after the participle,
    and its sense is naturally conveyed in English by 'so' in the clause sequence
    rather than by a second explicit 'but'.
