theological_decisions:
- issue: ἀνθρώπων in the phrase ἐξ ἀνθρώπων
  chosen_reading: from men
  alternative_readings:
  - of human origin
  - from human beings
  rationale: The phrase contrasts human source with divine source in the following
    verse. Because the immediate setting concerns male Jewish leaders and apostles,
    'from men' is acceptable and reasonably literal; alternatives are preserved because
    English may also express the generic sense as 'human.' This follows the gender-accurate-over-gender-neutral
    principle without flattening the source contrast.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
