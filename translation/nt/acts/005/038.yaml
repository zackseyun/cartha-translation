id: ACT.5.38
reference: Acts 5:38
source:
  edition: SBLGNT
  text: καὶ τὰ νῦν λέγω ὑμῖν, ἀπόστητε ἀπὸ τῶν ἀνθρώπων τούτων καὶ ⸀ἄφετε αὐτούς·
    (ὅτι ἐὰν ᾖ ἐξ ἀνθρώπων ἡ βουλὴ ⸀αὕτη ἢ τὸ ἔργον τοῦτο, καταλυθήσεται,
translation:
  text: And now I tell you, keep away from these men and leave them alone; for if
    this plan or this work is from men, it will be overthrown,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of human origin' or 'from human beings.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it will be destroyed' or 'it will be brought to nothing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ νῦν
  chosen: now
  alternatives:
  - as for the present
  - at this time
  lexicon: BDAG
  rationale: Idiomatic temporal expression introducing the speaker's present counsel.
    'Now' is natural modern English and preserves the discourse force without woodenly
    reproducing the article.
- source_word: ἀπόστητε
  chosen: keep away from
  alternatives:
  - stand away from
  - withdraw from
  lexicon: BDAG
  rationale: Aorist imperative of ἀφίσταμαι here calls for separation from or non-involvement
    with these men. 'Keep away from' communicates the practical force in readable
    English better than the stiffer 'depart from'.
- source_word: ἄφετε αὐτούς
  chosen: leave them alone
  alternatives:
  - let them go
  - leave them
  lexicon: BDAG
  rationale: In this context the command is to refrain from interfering with or prosecuting
    them further. 'Leave them alone' best captures the idiomatic sense for contemporary
    readers.
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: Introduces the reason for Gamaliel's counsel. 'For' fits the explanatory
    connection smoothly in English.
- source_word: ἐὰν ᾖ ἐξ ἀνθρώπων
  chosen: if ... is from men
  alternatives:
  - if ... is of human origin
  - if ... comes from men
  lexicon: BDAG
  rationale: ἐκ/ἐξ with ἀνθρώπων denotes source or origin. 'From men' is a close rendering
    and preserves the contrast with what would be from God in the next verse. The
    masculine plural here refers to human beings generally, but 'men' is retained
    because the immediate referents are male leaders and the phrase is conventional
    in this contrast.
- source_word: βουλή
  chosen: plan
  alternatives:
  - purpose
  - counsel
  lexicon: BDAG
  rationale: βουλή can mean plan, intention, or purpose. 'Plan' is clear, natural,
    and fits the contrast with 'work' as the movement's intention or scheme.
- source_word: ἔργον
  chosen: work
  alternatives:
  - undertaking
  - activity
  - deed
  lexicon: BDAG
  rationale: A broad term for deed, action, or undertaking. 'Work' preserves the lexical
    connection straightforwardly and pairs well with 'plan'.
- source_word: καταλυθήσεται
  chosen: it will be overthrown
  alternatives:
  - it will be destroyed
  - it will be brought to nothing
  lexicon: BDAG
  rationale: Future passive indicating dissolution or overthrow. 'It will be overthrown'
    preserves the passive force and the sense that the movement will collapse if merely
    human in origin.
