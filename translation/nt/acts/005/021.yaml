id: ACT.5.21
reference: Acts 5:21
source:
  edition: SBLGNT
  text: ἀκούσαντες δὲ εἰσῆλθον ὑπὸ τὸν ὄρθρον εἰς τὸ ἱερὸν καὶ ἐδίδασκον. Παραγενόμενος
    δὲ ὁ ἀρχιερεὺς καὶ οἱ σὺν αὐτῷ συνεκάλεσαν τὸ συνέδριον καὶ πᾶσαν τὴν γερουσίαν
    τῶν υἱῶν Ἰσραήλ, καὶ ἀπέστειλαν εἰς τὸ δεσμωτήριον ἀχθῆναι αὐτούς.
translation:
  text: When they heard this, they entered the temple courts at daybreak and were
    teaching. But when the high priest arrived, and those with him, they called together
    the Sanhedrin and the whole council of the sons of Israel, and sent to the prison
    to have them brought.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the whole council of Israel' or 'the whole body
      of elders of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: When they heard this
  alternatives:
  - after hearing
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle is temporal and refers back to the angel's command
    in the previous verse; 'when they heard this' is natural English and preserves
    the sequence without over-paraphrasing.
- source_word: ὑπὸ τὸν ὄρθρον
  chosen: at daybreak
  alternatives:
  - early in the morning
  - about dawn
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning the early dawn hours. 'At daybreak'
    is concise, natural, and faithful.
- source_word: ἱερὸν
  chosen: the temple courts
  alternatives:
  - the temple
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the sanctuary proper (ναός).
    'Temple courts' makes this distinction clear in accessible English.
- source_word: ἐδίδασκον
  chosen: were teaching
  alternatives:
  - taught
  - began teaching
  lexicon: BDAG
  rationale: Imperfect indicates ongoing action; 'were teaching' preserves the durative
    sense better than simple past.
- source_word: Παραγενόμενος
  chosen: when the high priest arrived
  alternatives:
  - having come
  - appearing
  lexicon: BDAG
  rationale: Aorist participle introducing the next event. Rendering with 'when ...
    arrived' gives clear temporal flow in English.
- source_word: οἱ σὺν αὐτῷ
  chosen: those with him
  alternatives:
  - his associates
  - those who were with him
  lexicon: BDAG
  rationale: A straightforward rendering of the accompanying group without importing
    a more specific identity than the Greek states.
- source_word: συνεκάλεσαν
  chosen: they called together
  alternatives:
  - they convened
  - they assembled
  lexicon: BDAG
  rationale: The verb means to summon or convene a body. 'Called together' is clear
    modern English and fits the governing objects.
- source_word: συνέδριον
  chosen: the Sanhedrin
  alternatives:
  - the council
  lexicon: BDAG
  rationale: Although literally 'council,' in this context it refers to the Jewish
    ruling council commonly known as the Sanhedrin. Using the historical term preserves
    specificity.
- source_word: πᾶσαν τὴν γερουσίαν τῶν υἱῶν Ἰσραήλ
  chosen: the whole council of the sons of Israel
  alternatives:
  - all the senate of the sons of Israel
  - the whole body of elders of Israel
  - the whole council of Israel
  lexicon: BDAG
  rationale: γερουσία denotes an elder-body/council. The phrase is somewhat appositional
    or expansive alongside 'Sanhedrin.' 'Council' is more readable than 'senate,'
    while 'sons of Israel' preserves the literal familial-national expression rather
    than flattening it to simply 'Israel.'
- source_word: δεσμωτήριον
  chosen: the prison
  alternatives:
  - the jail
  - the place of confinement
  lexicon: BDAG
  rationale: Standard term for prison or jail. 'Prison' is the most natural formal
    equivalent here.
- source_word: ἀχθῆναι αὐτούς
  chosen: to have them brought
  alternatives:
  - to bring them
  - that they be brought
  lexicon: BDAG
  rationale: 'Passive infinitive of ἄγω after ''sent'' expresses purpose: they sent
    officers so that the apostles might be brought. ''To have them brought'' captures
    the indirect causative sense in idiomatic English.'
