theological_decisions:
- issue: Rendering of τῶν υἱῶν Ἰσραήλ
  chosen_reading: of the sons of Israel
  alternative_readings:
  - of Israel
  - of the Israelites
  rationale: In keeping with the project's gender-accurate principle, the explicitly
    masculine familial expression is preserved rather than neutralized. Here it functions
    as a traditional national designation, so a more idiomatic alternative is possible,
    but the literal form is retained in the main text and a smoother alternative is
    preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
