id: ACT.5.6
reference: Acts 5:6
source:
  edition: SBLGNT
  text: ἀναστάντες δὲ οἱ νεώτεροι συνέστειλαν αὐτὸν καὶ ἐξενέγκαντες ἔθαψαν.
translation:
  text: Then the younger men rose, wrapped him up, carried him out, and buried him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young men.' The Greek νεώτεροι is comparative in form and may mean
      either 'younger men' or, more generally, 'young men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάντες
  chosen: rose
  alternatives:
  - got up
  - stood up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι, here indicating the young men getting
    up to act. 'Rose' is concise and natural in narrative English, preserving the
    participial sequence without overtranslating.
- source_word: δὲ
  chosen: Then
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks narrative progression. 'Then' conveys the forward movement of
    the story more idiomatically than a bare 'and' in English.
- source_word: οἱ νεώτεροι
  chosen: the younger men
  alternatives:
  - the young men
  - the younger ones
  lexicon: BDAG
  rationale: νεώτεροι is comparative in form ('younger'), likely distinguishing these
    men from older members present. 'The younger men' preserves that nuance better
    than simply 'young men,' while remaining natural English.
- source_word: συνέστειλαν
  chosen: wrapped him up
  alternatives:
  - prepared him for burial
  - bound him up
  lexicon: BDAG
  rationale: In this context συστέλλω refers to gathering or wrapping the body, likely
    in preparation for removal and burial. 'Wrapped him up' is the clearest idiomatic
    rendering that stays close to the probable physical action. 'Prepared him for
    burial' is too interpretive; 'bound him up' is possible but less natural in contemporary
    English.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Ananias; straightforwardly rendered
    'him.'
- source_word: ἐξενέγκαντες
  chosen: carried him out
  alternatives:
  - took him out
  - brought him out
  lexicon: BDAG
  rationale: Aorist participle of ἐκφέρω, here meaning to carry the body out from
    the place. 'Carried him out' fits the burial context better than the more generic
    'took him out.'
- source_word: ἔθαψαν
  chosen: buried him
  alternatives:
  - interred him
  lexicon: BDAG
  rationale: θάπτω means to bury. 'Buried him' is the standard clear English equivalent;
    'interred' is too formal for the translation philosophy.
