theological_decisions:
- issue: Rendering πνευμάτων ἀκαθάρτων
  chosen_reading: unclean spirits
  alternative_readings:
  - impure spirits
  rationale: The phrase refers to personal evil spirits in Luke-Acts. 'Unclean spirits'
    preserves the standard biblical expression without reducing it to a merely psychological
    or metaphorical description.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Scope of ἅπαντες
  chosen_reading: they were all being healed
  alternative_readings:
  - all of them were healed
  rationale: The text presents a comprehensive statement about those brought in this
    scene. The translation preserves the force of totality without adding theological
    explanation beyond the verse itself.
  doctrine_reference: 'Translation philosophy #1 and #3'
