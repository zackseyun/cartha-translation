id: ACT.5.16
reference: Acts 5:16
source:
  edition: SBLGNT
  text: συνήρχετο δὲ καὶ τὸ πλῆθος τῶν πέριξ ⸀πόλεων Ἰερουσαλήμ, φέροντες ἀσθενεῖς
    καὶ ὀχλουμένους ὑπὸ πνευμάτων ἀκαθάρτων, οἵτινες ἐθεραπεύοντο ἅπαντες.
translation:
  text: And even the crowd from the towns around Jerusalem was coming together, bringing
    the sick and those troubled by unclean spirits, and they were all being healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the multitude from the surrounding cities around Jerusalem was gathering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those tormented by unclean spirits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήρχετο
  chosen: was coming together
  alternatives:
  - was gathering
  - was assembling
  - came together
  lexicon: BDAG
  rationale: Imperfect middle/passive indicates ongoing or repeated action in past
    time. 'Was coming together' preserves the durative sense better than a simple
    past 'came together.'
- source_word: τὸ πλῆθος
  chosen: the crowd
  alternatives:
  - the multitude
  - the mass of people
  lexicon: BDAG
  rationale: Refers collectively to a large number of people. 'Crowd' is natural modern
    English and fits the collective singular construction.
- source_word: τῶν πέριξ πόλεων Ἰερουσαλήμ
  chosen: from the towns around Jerusalem
  alternatives:
  - from the surrounding cities of Jerusalem
  - from the nearby towns around Jerusalem
  lexicon: BDAG
  rationale: πέριξ with πόλεων denotes the settlements in the vicinity of Jerusalem.
    'Towns around Jerusalem' is idiomatic English and avoids the awkward literalism
    'cities of Jerusalem,' while preserving the geographic sense.
- source_word: φέροντες
  chosen: bringing
  alternatives:
  - carrying
  lexicon: BDAG
  rationale: Present participle describing how the people were coming together. 'Bringing'
    is the most natural contextual rendering for bringing afflicted persons to the
    apostles.
- source_word: ἀσθενεῖς
  chosen: the sick
  alternatives:
  - the weak
  - the ill
  lexicon: BDAG
  rationale: In healing contexts ἀσθενής commonly means physically sick or ill. 'The
    sick' is concise and idiomatic.
- source_word: ὀχλουμένους
  chosen: those troubled
  alternatives:
  - those tormented
  - those harassed
  - those disturbed
  lexicon: BDAG
  rationale: The participle denotes people being afflicted or troubled. 'Troubled'
    is broad enough to reflect the term without overstating the intensity in every
    case; stronger options are possible but less neutral.
- source_word: ὑπὸ πνευμάτων ἀκαθάρτων
  chosen: by unclean spirits
  alternatives:
  - by impure spirits
  lexicon: BDAG
  rationale: Standard New Testament expression for demonic spirits. 'Unclean spirits'
    preserves the established biblical idiom and the moral/ritual connotations of
    ἀκάθαρτος.
- source_word: οἵτινες
  chosen: and they
  alternatives:
  - who
  - these
  lexicon: BDAG
  rationale: The relative pronoun resumes the two groups just mentioned and introduces
    the result. English often renders this more smoothly with a coordinating phrase,
    here 'and they.'
- source_word: ἐθεραπεύοντο
  chosen: were all being healed
  alternatives:
  - were healed
  - all were cured
  lexicon: BDAG
  rationale: Imperfect passive indicates ongoing repeated healing activity. Rendering
    with 'were all being healed' preserves both the passive voice and the imperfect
    aspect better than a simple past.
- source_word: ἅπαντες
  chosen: all
  alternatives:
  - every one of them
  lexicon: BDAG
  rationale: Emphasizes the comprehensiveness of the healings. 'All' is direct and
    natural; the sense 'every one of them' is preserved implicitly.
