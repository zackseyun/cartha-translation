id: ACT.5.20
reference: Acts 5:20
source:
  edition: SBLGNT
  text: Πορεύεσθε καὶ σταθέντες λαλεῖτε ἐν τῷ ἱερῷ τῷ λαῷ πάντα τὰ ῥήματα τῆς ζωῆς
    ταύτης.
translation:
  text: Go, and standing in the temple, speak to the people all the words of this
    life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple courts' or 'in the temple precincts'; the Greek ἱερόν
      refers to the temple complex, not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'about this life' or 'of this way of life.' The phrase may refer to the
      life proclaimed in the gospel.
    reason: alternative_reading
lexical_decisions:
- source_word: Πορεύεσθε
  chosen: Go
  alternatives:
  - Be on your way
  - Proceed
  lexicon: BDAG
  rationale: A present middle/passive imperative functioning as a command to depart
    and act. 'Go' is the most natural and direct English imperative.
- source_word: σταθέντες
  chosen: standing
  alternatives:
  - stand
  - having stood
  lexicon: BDAG
  rationale: Aorist participle from ἵστημι, likely attendant circumstance or participle
    of manner preceding the main imperative. 'Standing' preserves the participial
    force without overcomplicating the English. 'Stand' would smooth the syntax but
    lose the Greek form; 'having stood' is too wooden.
- source_word: λαλεῖτε
  chosen: speak
  alternatives:
  - tell
  - proclaim
  lexicon: BDAG
  rationale: Present imperative meaning to speak or address. 'Speak' is broad and
    faithful; 'proclaim' adds a heraldic nuance not explicit in λαλέω itself.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'In
    the temple' is idiomatic and sufficient in English, while the broader precinct
    sense is preserved in a footnote.
- source_word: τῷ λαῷ
  chosen: to the people
  alternatives:
  - to the crowd
  - to the people of Israel
  lexicon: BDAG
  rationale: λαός here refers to the gathered people, likely the Jewish people present
    at the temple. 'To the people' is the most direct rendering and avoids importing
    a narrower ethnic or situational specification not explicit in the verse.
- source_word: πάντα τὰ ῥήματα
  chosen: all the words
  alternatives:
  - everything spoken
  - the whole message
  lexicon: BDAG
  rationale: A formally close rendering that preserves both πᾶς and ῥῆμα. 'The whole
    message' is interpretive and smoother, but 'all the words' better reflects the
    Greek wording.
- source_word: τῆς ζωῆς ταύτης
  chosen: of this life
  alternatives:
  - about this life
  - of this way of life
  lexicon: BDAG
  rationale: A genitive construction modifying 'words.' 'Of this life' is the most
    literal and traditional rendering, preserving the ambiguity of ζωή here—whether
    referring to the life proclaimed in the gospel, the new life in Messiah, or the
    life-giving message itself. Alternatives are possible but more interpretive.
