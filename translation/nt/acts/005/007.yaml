id: ACT.5.7
reference: Acts 5:7
source:
  edition: SBLGNT
  text: Ἐγένετο δὲ ὡς ὡρῶν τριῶν διάστημα καὶ ἡ γυνὴ αὐτοῦ μὴ εἰδυῖα τὸ γεγονὸς εἰσῆλθεν.
translation:
  text: Now after an interval of about three hours, his wife came in, not knowing
    what had happened.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐγένετο
  chosen: Now ... after
  alternatives:
  - Then it happened
  - And it came to pass
  - After
  lexicon: BDAG
  rationale: γίνομαι here functions idiomatically to introduce the next event in the
    narrative rather than to assert 'becoming.' In English, this is best represented
    by a natural temporal transition. 'Now ... after' captures the narrative progression
    without archaic stiffness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ', and'
  lexicon: BDAG
  rationale: δέ is a mild connective marking development in the story. 'Now' gives
    a natural English discourse transition and avoids overusing 'and' while preserving
    continuity.
- source_word: ὡς ὡρῶν τριῶν διάστημα
  chosen: after an interval of about three hours
  alternatives:
  - about three hours later
  - after a span of three hours
  - when an interval of about three hours had passed
  lexicon: BDAG
  rationale: The construction expresses elapsed time. διάστημα denotes an interval/span,
    and ὡς with a measure can indicate approximation, so 'about three hours' is preferable
    to an overly exact 'three hours.' 'After an interval of about three hours' preserves
    the temporal phrasing while remaining readable.
- source_word: γυνὴ αὐτοῦ
  chosen: his wife
  alternatives:
  - the wife of him
  - his woman
  lexicon: BDAG
  rationale: γυνή in this context clearly means 'wife,' not merely 'woman,' because
    the referent is Ananias's spouse in the narrative.
- source_word: μὴ εἰδυῖα
  chosen: not knowing
  alternatives:
  - without knowing
  - being unaware
  lexicon: BDAG
  rationale: The participle from οἶδα describes her state as she entered. 'Not knowing'
    is a straightforward participial rendering that preserves the contemporaneous
    sense.
- source_word: τὸ γεγονὸς
  chosen: what had happened
  alternatives:
  - the thing that had happened
  - what had taken place
  - the event
  lexicon: BDAG
  rationale: The perfect participle used substantivally refers to the event that had
    already occurred. 'What had happened' is idiomatic English and accurately conveys
    the completed prior action.
- source_word: εἰσῆλθεν
  chosen: came in
  alternatives:
  - entered
  - went in
  lexicon: BDAG
  rationale: εἰσέρχομαι means to enter/go in. 'Came in' fits the immediate scene naturally
    in English narrative, while still accurately reflecting movement into the place.
