id: ACT.5.37
reference: Acts 5:37
source:
  edition: SBLGNT
  text: μετὰ τοῦτον ἀνέστη Ἰούδας ὁ Γαλιλαῖος ἐν ταῖς ἡμέραις τῆς ἀπογραφῆς καὶ ἀπέστησε
    ⸀λαὸν ὀπίσω αὐτοῦ· κἀκεῖνος ἀπώλετο καὶ πάντες ὅσοι ἐπείθοντο αὐτῷ διεσκορπίσθησαν.
translation:
  text: After this, Judas the Galilean rose up in the days of the census and drew
    away people after him. He also perished, and all who were persuaded by him were
    scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time of the registration.' The Greek term can refer to a census
      or official registration.
    reason: lexical_alternative
  - marker: b
    text: Or 'caused people to defect and follow him.' The verb can carry the sense
      of drawing people away from prior allegiance.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τοῦτον
  chosen: After this
  alternatives:
  - After him
  - After this man
  lexicon: BDAG
  rationale: Temporal μετά with the accusative most naturally means 'after this' in
    context, referring back to the previously mentioned figure/event. 'After him'
    is possible if the antecedent is personal, but the discourse sense is temporal
    succession.
- source_word: ἀνέστη
  chosen: rose up
  alternatives:
  - appeared
  - arose
  lexicon: BDAG
  rationale: In this context of a leader emerging in history, ἀνίστημι is idiomatically
    'rose up' or 'arose,' not resurrection language. 'Rose up' preserves the vividness
    and common English idiom for the emergence of a rebel leader.
- source_word: Ἰούδας ὁ Γαλιλαῖος
  chosen: Judas the Galilean
  alternatives:
  - Judas of Galilee
  lexicon: BDAG
  rationale: Standard transliteration for the personal name and adjectival ethnic
    designation. 'The Galilean' closely matches the Greek appositional adjective.
- source_word: ἐν ταῖς ἡμέραις τῆς ἀπογραφῆς
  chosen: in the days of the census
  alternatives:
  - at the time of the registration
  - during the census
  lexicon: BDAG
  rationale: ἀπογραφή denotes a registration/census. 'Census' is concise and natural
    English, while 'in the days of' preserves the temporal phrasing of the Greek.
- source_word: ἀπέστησε λαὸν ὀπίσω αὐτοῦ
  chosen: drew away people after him
  alternatives:
  - led people in revolt after him
  - misled the people to follow him
  - caused people to follow him
  lexicon: BDAG
  rationale: ἀφίστημι here has the sense of causing people to defect or be drawn away.
    Because λαόν lacks the article, 'people' is preferable to 'the people.' 'After
    him' preserves ὀπίσω αὐτοῦ literally enough while remaining idiomatic.
- source_word: λαὸν
  chosen: people
  alternatives:
  - a people
  - the people
  - a crowd
  lexicon: BDAG
  rationale: Anarthrous singular λαός can function collectively. 'People' best captures
    the collective sense without implying the whole nation ('the people').
- source_word: κἀκεῖνος
  chosen: He also
  alternatives:
  - And that man
  - And he
  lexicon: BDAG
  rationale: 'κἀκεῖνος adds emphasis/continuation: ''and that one also.'' ''He also''
    is natural English and preserves the connective force.'
- source_word: ἀπώλετο
  chosen: perished
  alternatives:
  - was killed
  - came to ruin
  lexicon: BDAG
  rationale: Middle ἀπόλλυμι here indicates that he met destruction or died. 'Perished'
    preserves the broader sense without specifying the manner of death beyond what
    the Greek states.
- source_word: πάντες ὅσοι ἐπείθοντο αὐτῷ
  chosen: all who were persuaded by him
  alternatives:
  - all who followed him
  - all who obeyed him
  - all who believed him
  lexicon: BDAG
  rationale: πείθω in the imperfect passive/middle here conveys those who were won
    over or persuaded by him. 'Followed him' would overlap too much with the previous
    clause and flatten the distinct verb choice.
- source_word: διεσκορπίσθησαν
  chosen: were scattered
  alternatives:
  - were dispersed
  lexicon: BDAG
  rationale: Aorist passive of διασκορπίζω is straightforwardly 'were scattered.'
    This is both accurate and idiomatic.
