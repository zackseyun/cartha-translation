theological_decisions:
- issue: Historical-political description of Judas's movement
  chosen_reading: Rendered the verse as describing Judas as an insurgent leader who
    attracted followers, without importing evaluative theological language beyond
    the text.
  alternative_readings:
  - Rendered with stronger revolt language such as 'led a rebellion'
  rationale: The verse reports Gamaliel's historical example. While Judas is associated
    historically with revolt, the Greek here emphasizes that he arose and drew people
    after him; it does not explicitly use a noun for rebellion. The translation therefore
    avoids adding political specificity not stated in the text.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve the source''s plain sense.'
