id: ACT.5.26
reference: Acts 5:26
source:
  edition: SBLGNT
  text: τότε ἀπελθὼν ὁ στρατηγὸς σὺν τοῖς ὑπηρέταις ⸀ἤγαγεν αὐτούς, οὐ μετὰ βίας,
    ἐφοβοῦντο γὰρ τὸν λαόν, ⸀μὴ λιθασθῶσιν.
translation:
  text: Then the captain went with the officers and brought them in, not with force,
    for they were afraid of the people, lest they be stoned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commander.' The Greek στρατηγός here refers to the temple captain, the
      official overseeing temple order.
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατηγὸς
  chosen: captain
  alternatives:
  - commander
  lexicon: BDAG
  rationale: In Acts this refers to the temple official in charge of order, not a
    Roman military general. 'Captain' is concise and idiomatic in English while preserving
    an official leadership role.
- source_word: ὑπηρέταις
  chosen: officers
  alternatives:
  - attendants
  - guards
  - temple police
  lexicon: BDAG
  rationale: Here the referent is the subordinate personnel accompanying the temple
    captain. 'Officers' fits the law-enforcement context better than the more generic
    'servants' or 'attendants'.
- source_word: ἤγαγεν αὐτούς
  chosen: brought them in
  alternatives:
  - led them away
  - brought them
  lexicon: BDAG
  rationale: ἄγω commonly means 'lead' or 'bring.' In this context of escorting the
    apostles to the council, 'brought them in' naturally conveys movement into the
    hearing setting.
- source_word: οὐ μετὰ βίας
  chosen: not with force
  alternatives:
  - not violently
  - without violence
  lexicon: BDAG
  rationale: The phrase denotes the manner of the arrest/escort. 'Not with force'
    is a clear modern rendering that preserves the concrete sense of coercive violence.
- source_word: ἐφοβοῦντο
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or situational fear. 'They were afraid'
    is natural English and captures the sense without archaic stiffness.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: BDAG
  rationale: λαός here refers to the gathered Jewish public. 'The people' is the most
    straightforward contextual rendering.
- source_word: μὴ λιθασθῶσιν
  chosen: lest they be stoned
  alternatives:
  - so that they might not be stoned
  - for fear that they would be stoned
  lexicon: BDAG
  rationale: μή with the subjunctive after a verb of fear expresses feared result.
    The passive leaves the implied agents unstated; 'lest they be stoned' preserves
    both the syntax and the threat from the crowd.
- source_word: τότε ἀπελθὼν
  chosen: Then ... went
  alternatives:
  - Then, having gone
  - So then ... went away
  lexicon: BDAG
  rationale: 'The participle ἀπελθών is attendant to the main verb and is best rendered
    in smooth English as part of the narrative sequence: ''Then the captain went...''
    rather than a more wooden participial construction.'
