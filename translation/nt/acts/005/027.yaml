id: ACT.5.27
reference: Acts 5:27
source:
  edition: SBLGNT
  text: Ἀγαγόντες δὲ αὐτοὺς ἔστησαν ἐν τῷ συνεδρίῳ. καὶ ἐπηρώτησεν αὐτοὺς ὁ ἀρχιερεὺς
translation:
  text: After bringing them in, they stood them before the council, and the high priest
    questioned them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sanhedrin.' The Greek term συνέδριον refers to the Jewish ruling
      council.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀγαγόντες
  chosen: After bringing them in
  alternatives:
  - Having brought them
  - When they had brought them in
  lexicon: BDAG
  rationale: Aorist active participle of ἄγω, functioning temporally prior to the
    main verb. 'After bringing them in' gives clear English sequence and preserves
    the participial relation without awkwardness.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. It is left untranslated
    in English because the flow is natural without an explicit connector, while its
    discourse function is reflected in the sentence progression.
- source_word: ἔστησαν
  chosen: they stood them before
  alternatives:
  - they set them before
  - they placed them in
  lexicon: BDAG
  rationale: From ἵστημι in the transitive sense, 'cause to stand, place.' 'Stood
    them before' preserves the concrete courtroom setting better than the more generic
    'placed them.'
- source_word: ἐν τῷ συνεδρίῳ
  chosen: before the council
  alternatives:
  - in the Sanhedrin
  - in the council
  lexicon: BDAG
  rationale: συνέδριον can denote the Jewish ruling council. 'Council' is a clear
    translation of the common noun, while 'before' fits idiomatic English with the
    preceding verb of presentation. 'Sanhedrin' is possible but more interpretive
    and less transparent as a translation of the term itself.
- source_word: ἐπηρώτησεν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: ἐπερωτάω means to ask or question. In this judicial context, 'questioned'
    best captures the formal setting without overstating the force as 'interrogated.'
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard and precise rendering of ἀρχιερεύς in this context, referring
    to the presiding Jewish high priest.
