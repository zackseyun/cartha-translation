theological_decisions:
- issue: Rendering συνέδριον
  chosen_reading: the council
  alternative_readings:
  - the Sanhedrin
  rationale: The Greek term is translated rather than replaced with a traditional
    proper-name-like rendering. This follows the project's preference for source-transparent
    English unless the context requires a more specific label. The referent is indeed
    the Sanhedrin, but 'the council' preserves the lexical sense in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
