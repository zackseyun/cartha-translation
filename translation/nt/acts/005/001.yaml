theological_decisions:
- issue: Narrative contrast with the preceding example of Barnabas
  chosen_reading: Render δέ as 'But' to preserve the contrastive force.
  alternative_readings:
  - Render δέ as 'Now' for a softer transition
  - Render δέ as 'And' for simple continuation
  rationale: The immediate context contrasts Barnabas's generous act with Ananias's
    deceptive act. 'But' makes that contrast explicit without adding interpretation
    beyond the discourse marker's normal range.
  doctrine_reference: Translation philosophy §1, §6
