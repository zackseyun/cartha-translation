id: ACT.5.1
reference: Acts 5:1
source:
  edition: SBLGNT
  text: Ἀνὴρ δέ τις Ἁνανίας ὀνόματι σὺν Σαπφίρῃ τῇ γυναικὶ αὐτοῦ ἐπώλησεν κτῆμα
translation:
  text: But a man named Ananias, with Sapphira his wife, sold a piece of property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply “property”; the Greek term can refer broadly to a possession or
      piece of real property.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνὴρ
  chosen: a man
  alternatives:
  - a husband
  - a certain man
  lexicon: BDAG
  rationale: ἀνήρ commonly means 'man' or 'husband.' Here it introduces an individual
    in narrative, and 'a man' fits the syntax and discourse function best. 'Husband'
    is possible in isolation, but the later explicit phrase 'his wife' already supplies
    the marital relation.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the preceding account of
    Barnabas. 'But' best preserves the narrative contrast between the positive example
    just mentioned and the negative example that follows.
- source_word: τις
  chosen: a
  alternatives:
  - a certain
  lexicon: BDAG
  rationale: τις is an indefinite marker here. English normally expresses this naturally
    with the indefinite article rather than the more wooden 'a certain,' unless special
    emphasis is intended.
- source_word: Ἁνανίας
  chosen: Ananias
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: ὀνόματι
  chosen: named
  alternatives:
  - by name
  - called
  lexicon: BDAG
  rationale: The dative ὀνόματι idiomatically means 'by name' or 'named.' 'Named'
    is the most natural modern English rendering.
- source_word: σὺν
  chosen: with
  alternatives:
  - together with
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With' is concise and natural;
    'together with' is possible but unnecessarily heavy here.
- source_word: Σαπφίρῃ
  chosen: Sapphira
  rationale: Personal name transliterated by standard English convention.
- source_word: τῇ γυναικὶ αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' In this possessive construction, 'his
    wife' is clearly intended and is standard English.
- source_word: ἐπώλησεν
  chosen: sold
  lexicon: BDAG
  rationale: Aorist active indicative of πωλέω, straightforwardly rendered 'sold'
    in narrative past tense.
- source_word: κτῆμα
  chosen: a piece of property
  alternatives:
  - property
  - an estate
  - a possession
  - a tract of land
  lexicon: BDAG
  rationale: κτῆμα denotes a possession or property, here specifically something saleable
    in the context of land/property transactions in Acts 4–5. 'A piece of property'
    is natural English and preserves the concrete sense without over-specifying beyond
    the Greek.
