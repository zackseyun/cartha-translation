theological_decisions:
- issue: Rendering αἵρεσις
  chosen_reading: party
  alternative_readings:
  - sect
  rationale: The term here denotes a recognized group or faction within Second Temple
    Judaism, not a doctrinally loaded 'heresy.' 'Party' avoids importing later ecclesiastical
    polemics while preserving the social-religious grouping.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
- issue: Rendering ζῆλος in context
  chosen_reading: jealousy
  alternative_readings:
  - zeal
  - envy
  rationale: Although ζῆλος can be positive or negative, the narrative context is
    opposition to the apostles, so the negative sense is required. This is a contextual
    lexical decision, not a doctrinal one, but it affects the portrayal of motive
    and should be documented.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
