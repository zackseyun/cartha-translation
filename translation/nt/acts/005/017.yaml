id: ACT.5.17
reference: Acts 5:17
source:
  edition: SBLGNT
  text: Ἀναστὰς δὲ ὁ ἀρχιερεὺς καὶ πάντες οἱ σὺν αὐτῷ, ἡ οὖσα αἵρεσις τῶν Σαδδουκαίων,
    ἐπλήσθησαν ζήλου
translation:
  text: But the high priest rose up, and all those with him—that is, the party of
    the Sadducees—and they were filled with jealousy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sect of the Sadducees.' The Greek word can denote a party, school,
      or sect.
    reason: lexical_alternative
  - marker: b
    text: Or 'envy.' The Greek word can also mean 'zeal,' but here the context favors
      a hostile sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναστὰς
  chosen: rose up
  alternatives:
  - stood up
  - got up
  lexicon: BDAG
  rationale: Aorist participle of ἀνίστημι used idiomatically to introduce decisive
    action. 'Rose up' preserves the narrative force and common Lukan usage better
    than the flatter 'got up.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here marks a mild contrast with the preceding favorable response to
    the apostles. 'But' brings out that adversative turn more clearly than 'And.'
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in this singular office reference; 'high
    priest' is the established and accurate English equivalent.
- source_word: πάντες οἱ σὺν αὐτῷ
  chosen: all those with him
  alternatives:
  - all who were with him
  - all his associates
  lexicon: BDAG
  rationale: This phrase refers to the group aligned with the high priest. 'All those
    with him' is natural English and preserves the relational sense without overinterpreting
    their exact status.
- source_word: ἡ οὖσα αἵρεσις τῶν Σαδδουκαίων
  chosen: that is, the party of the Sadducees
  alternatives:
  - being the sect of the Sadducees
  - the Sadducees' party
  - the sect of the Sadducees
  lexicon: BDAG
  rationale: The appositional phrase identifies 'all those with him.' αἵρεσις in Acts
    denotes a party/sect within Judaism, not necessarily 'heresy.' 'Party' is more
    accessible and less misleading in modern English, while 'that is' makes the explanatory
    apposition explicit.
- source_word: ἐπλήσθησαν
  chosen: they were filled
  alternatives:
  - they became full
  - they were seized
  lexicon: BDAG
  rationale: Passive of πίμπλημι with a genitive complement is a standard idiom meaning
    'be filled with.' This should be preserved rather than paraphrased too freely.
- source_word: ζήλου
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: In this hostile context, ζῆλος carries the negative sense of jealous
    resentment rather than positive zeal. 'Jealousy' best fits the immediate narrative
    context; 'envy' is possible but slightly narrower.
