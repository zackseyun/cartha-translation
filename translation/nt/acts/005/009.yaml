id: ACT.5.9
reference: Acts 5:9
source:
  edition: SBLGNT
  text: ὁ δὲ ⸀Πέτρος πρὸς αὐτήν· Τί ὅτι συνεφωνήθη ὑμῖν πειράσαι τὸ πνεῦμα κυρίου;
    ἰδοὺ οἱ πόδες τῶν θαψάντων τὸν ἄνδρα σου ἐπὶ τῇ θύρᾳ καὶ ἐξοίσουσίν σε.
translation:
  text: But Peter said to her, “Why did you agree together to test the Spirit of the
    Lord? Look, the feet of those who buried your husband are at the door, and they
    will carry you out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Lord's Spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'did you conspire together to test.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνεφωνήθη
  chosen: did you agree together
  alternatives:
  - was it agreed by you
  - did you conspire
  lexicon: BDAG
  rationale: The verb συμφωνέω means to agree or come to an agreement. The passive
    form here functions idiomatically with ὑμῖν ('by/among you'), indicating mutual
    agreement. 'Agree together' preserves the sense of collusion without overtranslating
    to 'conspire,' though that idea is contextually present.
- source_word: πειράσαι
  chosen: to test
  alternatives:
  - to tempt
  - to put to the test
  lexicon: BDAG
  rationale: πειράζω can mean 'tempt' or 'test.' Here the object is 'the Spirit of
    the Lord,' so 'test' is the natural English rendering; 'tempt' would sound misleading
    in this context. 'Put to the test' is possible but less concise.
- source_word: τὸ πνεῦμα κυρίου
  chosen: the Spirit of the Lord
  alternatives:
  - the Lord's Spirit
  lexicon: BDAG
  rationale: This genitive construction is most naturally rendered 'the Spirit of
    the Lord.' It preserves the likely reference to the Holy Spirit in relation to
    the Lord without paraphrasing. 'Lord' follows the project's default rendering
    for κύριος.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord' as the default. 'Master'
    is possible in some contexts but is not the project's standard here.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention. 'Look' is natural modern
    English and preserves the immediacy better than the archaic 'Behold.'
- source_word: οἱ πόδες
  chosen: the feet
  alternatives:
  - the footsteps
  lexicon: BDAG
  rationale: The Greek literally says 'the feet.' Although English might idiomatically
    say 'footsteps,' the literal wording is vivid and clear enough in context, so
    it is retained.
- source_word: τῶν θαψάντων
  chosen: of those who buried
  alternatives:
  - of the men who buried
  lexicon: BDAG
  rationale: The participle refers to the people who buried Ananias. 'Those who buried'
    is accurate and avoids adding 'men,' which is not explicit in the Greek participle
    itself, even if likely from context.
- source_word: τὸν ἄνδρα σου
  chosen: your husband
  alternatives:
  - your man
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband' depending on context. Since Sapphira
    is being addressed about Ananias, 'your husband' is the clear contextual sense.
- source_word: ἐπὶ τῇ θύρᾳ
  chosen: at the door
  alternatives:
  - by the door
  - at the doorway
  lexicon: BDAG
  rationale: This prepositional phrase indicates immediate presence at the entrance.
    'At the door' is idiomatic and sufficiently precise.
- source_word: ἐξοίσουσίν σε
  chosen: they will carry you out
  alternatives:
  - they will bring you out
  - they will carry out your body
  lexicon: BDAG
  rationale: ἐκφέρω means to carry or bring out. 'Carry you out' fits the burial context
    and preserves the ominous directness. Adding 'your body' would import information
    not explicitly stated, though implied by the context of death.
- source_word: Τί ὅτι
  chosen: Why
  alternatives:
  - Why is it that
  - What is this, that
  lexicon: BDAG
  rationale: The idiom Τί ὅτι introduces a rebuke or question of reason. 'Why' gives
    the natural English force without unnecessary stiffness.
