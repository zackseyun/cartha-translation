theological_decisions:
- issue: Referent of 'the Spirit of the Lord'
  chosen_reading: A reference to the Holy Spirit in relation to the Lord, rendered
    without interpretive expansion.
  alternative_readings:
  - a more general reference to the Lord's spiritual presence
  rationale: In Acts, 'the Spirit' in this context strongly refers to the Holy Spirit,
    especially in continuity with Acts 5:3. The translation keeps the wording 'the
    Spirit of the Lord' rather than expanding to 'the Holy Spirit' so as not to go
    beyond the Greek while preserving the likely referent.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Force of Peter's accusation
  chosen_reading: Mutual agreement to test God/the Lord's Spirit is expressed as 'agree
    together' rather than the more interpretive 'conspire.'
  alternative_readings:
  - conspire together
  rationale: The context is morally severe, but the Greek verb itself denotes agreement.
    The translation preserves the accusation's gravity through context rather than
    importing a stronger lexical judgment into the verb itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition'
