id: ACT.5.18
reference: Acts 5:18
source:
  edition: SBLGNT
  text: καὶ ἐπέβαλον τὰς ⸀χεῖρας ἐπὶ τοὺς ἀποστόλους καὶ ἔθεντο αὐτοὺς ἐν τηρήσει
    δημοσίᾳ.
translation:
  text: And they laid hands on the apostles and put them in the public jail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put them in public custody.' The Greek phrase can denote detention or
      confinement more generally, not only a jail building.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέβαλον τὰς χεῖρας ἐπὶ
  chosen: laid hands on
  alternatives:
  - seized
  - arrested
  - put their hands on
  lexicon: BDAG
  rationale: The idiom literally means 'laid the hands on' and in this context denotes
    hostile apprehension rather than blessing or commissioning. 'Laid hands on' preserves
    the Greek expression while remaining natural English; the arrestive force is clarified
    by the following clause about imprisonment.
- source_word: ἀποστόλους
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Acts this term functions as the recognized designation for Jesus'
    commissioned emissaries, not merely generic 'messengers.' 'Apostles' preserves
    the established office/title sense.
- source_word: ἔθεντο
  chosen: put
  alternatives:
  - placed
  - committed
  lexicon: BDAG
  rationale: A straightforward rendering of τίθημι in this context. 'Put' is idiomatic
    with the following prepositional phrase and avoids unnecessary formality.
- source_word: ἐν τηρήσει
  chosen: in ... jail
  alternatives:
  - in custody
  - in prison
  - under guard
  lexicon: BDAG
  rationale: τήρησις denotes custody, keeping, or a place/state of detention. Because
    the context is physical confinement, 'jail' communicates the sense clearly in
    modern English. The preposition ἐν is absorbed idiomatically into English as 'put
    ... in the public jail.'
- source_word: δημοσίᾳ
  chosen: public
  alternatives:
  - publicly
  - common
  - state
  lexicon: BDAG
  rationale: The adjective modifies τηρήσει and most naturally means the public or
    common jail, likely an official public holding place. 'Public' preserves the modifier
    without overinterpreting it as 'state' or as an adverb.
