id: ACT.5.32
reference: Acts 5:32
source:
  edition: SBLGNT
  text: καὶ ἡμεῖς ⸀ἐσμεν μάρτυρες τῶν ῥημάτων τούτων, καὶ τὸ ⸀πνεῦμα τὸ ἅγιον ὃ ἔδωκεν
    ὁ θεὸς τοῖς πειθαρχοῦσιν αὐτῷ.
translation:
  text: And we are witnesses of these things, and so is the Holy Spirit, whom God
    has given to those who obey him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these words' or 'these matters.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''and the Holy Spirit,'' with the sense carried over from the previous
      clause: ''and [is witness] the Holy Spirit.'''
    reason: alternative_reading
  - marker: c
    text: The Greek relative pronoun is neuter in form because it agrees with 'Spirit'
      (πνεῦμα), a neuter noun; English uses 'whom' here because the referent is personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυρες
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: '''Witnesses'' is the standard and most natural rendering for μάρτυρες
    in legal/testimonial contexts in Acts, preserving the sense of those who bear
    firsthand testimony.'
- source_word: ῥημάτων
  chosen: things
  alternatives:
  - words
  - matters
  lexicon: BDAG
  rationale: Although ῥῆμα often means 'word' or 'statement,' in this context 'these
    things' is idiomatic English for τῶν ῥημάτων τούτων and captures the content of
    the apostolic testimony without sounding wooden. 'Words' is possible but less
    natural here.
- source_word: πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary English rendering for the personal divine referent
    in Luke-Acts. 'Holy Ghost' is archaic and avoided per readability principles.
- source_word: ὃ
  chosen: whom
  alternatives:
  - which
  lexicon: Greek grammar / BDAG
  rationale: Although πνεῦμα is grammatically neuter and the relative pronoun here
    is neuter in form, English should reflect the personal referent of the Holy Spirit
    in this context. 'Whom' communicates personhood without adding doctrine beyond
    the text's referent.
- source_word: ἔδωκεν
  chosen: has given
  alternatives:
  - gave
  lexicon: BDAG
  rationale: 'The Greek aorist can be rendered as a simple past, but present perfect
    English fits the ongoing relevance: the Spirit is the one God has given and remains
    given to the obedient. This is a natural optimal-equivalence choice.'
- source_word: πειθαρχοῦσιν
  chosen: obey
  alternatives:
  - submit to authority
  - follow
  lexicon: BDAG
  rationale: πειθαρχέω means to obey one in authority. 'Obey' is the clearest and
    most direct rendering here, especially in the immediate context of obeying God
    rather than men (Acts 5:29).
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - God
  lexicon: Greek grammar
  rationale: The pronoun refers back to God. Rendering it as 'him' preserves the Greek
    pronominal cohesion while remaining clear in English.
