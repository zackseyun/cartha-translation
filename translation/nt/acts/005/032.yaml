theological_decisions:
- issue: Whether the Holy Spirit is presented as a co-witness alongside the apostles
  chosen_reading: The clause is rendered 'and so is the Holy Spirit,' making explicit
    the implied predicate 'is [a witness]' in natural English.
  alternative_readings:
  - and the Holy Spirit [is witness]
  - and also the Holy Spirit, whom God gave...
  rationale: The Greek second clause is verbless after καί and naturally shares the
    predicate from the first clause. Supplying 'so is' in English makes the syntax
    clear without adding content. This preserves the text's presentation of the Holy
    Spirit as bearing witness alongside the apostles.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering the relative pronoun for the Holy Spirit
  chosen_reading: Use personal English 'whom' for the Holy Spirit.
  alternative_readings:
  - which
  rationale: The Greek relative pronoun agrees grammatically with neuter πνεῦμα, but
    the referent is the Holy Spirit. English style and orthodox Christian usage favor
    personal reference here. This reflects referential sense rather than imposing
    a new doctrinal claim.
  doctrine_reference: Affirmations; Translation philosophy §6
