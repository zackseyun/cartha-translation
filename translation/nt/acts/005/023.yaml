id: ACT.5.23
reference: Acts 5:23
source:
  edition: SBLGNT
  text: λέγοντες ὅτι ⸀Τὸ δεσμωτήριον εὕρομεν κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ καὶ τοὺς
    φύλακας ἑστῶτας ⸀ἐπὶ τῶν θυρῶν, ἀνοίξαντες δὲ ἔσω οὐδένα εὕρομεν.
translation:
  text: saying, “We found the prison securely locked, and the guards standing at the
    doors; but when we opened them, we found no one inside.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'locked with complete security.' The Greek emphasizes that the prison
      was found fully secured.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμωτήριον
  chosen: prison
  alternatives:
  - jail
  - prison house
  lexicon: BDAG
  rationale: Refers to the place of confinement. 'Prison' is the most natural modern
    English equivalent and fits the narrative context better than the more colloquial
    'jail' or archaic 'prison house'.
- source_word: κεκλεισμένον ἐν πάσῃ ἀσφαλείᾳ
  chosen: securely locked
  alternatives:
  - shut with all security
  - locked with complete security
  lexicon: BDAG
  rationale: The perfect passive participle κεκλεισμένον indicates a state of being
    shut/locked, while ἐν πάσῃ ἀσφαλείᾳ intensifies the security of that state. 'Securely
    locked' captures both the closed condition and the emphasis on security in idiomatic
    English.
- source_word: φύλακας ἑστῶτας
  chosen: the guards standing
  alternatives:
  - the guards posted
  - the watchmen standing
  lexicon: BDAG
  rationale: φύλακες are guards in this custodial setting. ἑστῶτας, a perfect-form
    participle with present force, describes them as standing in position. 'The guards
    standing' preserves the visual detail without overinterpreting as a formal posting,
    though that nuance is possible.
- source_word: ἐπὶ τῶν θυρῶν
  chosen: at the doors
  alternatives:
  - by the doors
  - before the doors
  lexicon: BDAG
  rationale: ἐπί with the genitive here conveys location in proximity. 'At the doors'
    is the most natural English rendering in this context and matches the image of
    guards stationed at the entrances.
- source_word: ἀνοίξαντες
  chosen: when we opened them
  alternatives:
  - but having opened
  - when we opened the doors
  lexicon: BDAG
  rationale: 'The aorist participle is best rendered temporally in English here: ''when
    we opened.'' The object ''them'' is supplied from ''the doors'' in the previous
    clause for natural English clarity.'
- source_word: ἔσω
  chosen: inside
  alternatives:
  - within
  lexicon: BDAG
  rationale: ἔσω functions adverbially, indicating the interior of the prison. 'Inside'
    is clear, natural modern English.
- source_word: οὐδένα
  chosen: no one
  alternatives:
  - nobody
  - not anyone
  lexicon: BDAG
  rationale: An emphatic negative indefinite object. 'No one' is the clearest standard
    English rendering.
- source_word: λέγοντες ὅτι
  chosen: saying, “
  alternatives:
  - reporting that
  - they said,
  lexicon: BDAG
  rationale: This participial construction introduces the content of the report from
    the officers in the preceding verse. 'Saying' preserves the narrative linkage
    and allows direct discourse in natural English.
