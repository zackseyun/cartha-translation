id: ACT.5.13
reference: Acts 5:13
source:
  edition: SBLGNT
  text: τῶν δὲ λοιπῶν οὐδεὶς ἐτόλμα κολλᾶσθαι αὐτοῖς, ἀλλ’ ἐμεγάλυνεν αὐτοὺς ὁ λαός,
translation:
  text: But none of the rest dared to join them; rather, the people held them in high
    esteem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attach themselves to them' or 'associate with them closely.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the people magnified them,' that is, regarded them as great or honored
      them highly.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν λοιπῶν
  chosen: of the rest
  alternatives:
  - of the others
  - of the remainder
  lexicon: BDAG
  rationale: 'The genitive plural with article functions partitively: ''none of the
    rest/others.'' ''The rest'' is concise and natural in English while preserving
    the sense of a remaining group distinct from ''them.'''
- source_word: οὐδεὶς
  chosen: none
  alternatives:
  - no one
  lexicon: BDAG
  rationale: Means 'no one, nobody.' 'None' fits smoothly with the partitive phrase
    'of the rest' in English.
- source_word: ἐτόλμα
  chosen: dared
  alternatives:
  - was daring
  - ventured
  lexicon: BDAG
  rationale: Imperfect of τολμάω conveys ongoing or customary lack of courage. English
    idiom naturally renders this as 'dared,' with the broader durative sense carried
    by context.
- source_word: κολλᾶσθαι
  chosen: to join
  alternatives:
  - to attach oneself
  - to associate closely
  - to cling
  lexicon: BDAG
  rationale: The verb literally means 'to join/attach oneself to.' In this context
    of association with the apostolic community, 'join' is the clearest optimal-equivalence
    rendering. A more literal 'attach oneself' is possible but less natural.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: 'Dative pronoun governed by κολλᾶσθαι, referring to the apostolic believers/community.
    English idiom with ''join'' takes a direct object sense: ''join them.'''
- source_word: ἀλλ’
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: BDAG
  rationale: Marks contrast with the previous clause. 'Rather' captures the adversative
    nuance well in modern English.
- source_word: ἐμεγάλυνεν
  chosen: held ... in high esteem
  alternatives:
  - magnified
  - exalted
  - praised highly
  lexicon: BDAG
  rationale: μεγαλύνω literally means 'make great, magnify, extol.' Here the sense
    is that the people spoke of them as important or honored them highly. 'Held them
    in high esteem' communicates the idiomatic force clearly without archaic 'magnified.'
- source_word: ὁ λαός
  chosen: the people
  alternatives:
  - the populace
  - the crowd
  lexicon: BDAG
  rationale: Standard rendering of λαός here is 'the people.' 'Crowd' is too situationally
    narrow, and 'populace' is less natural.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Accusative object of ἐμεγάλυνεν, referring back to the apostles/believing
    group.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ here introduces a mild contrast with the preceding context. 'But'
    best signals that contrast in English.
