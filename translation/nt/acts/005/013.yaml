theological_decisions:
- issue: Referent of 'the rest' and 'them'
  chosen_reading: '''The rest'' refers to those outside the core apostolic/believing
    group, and ''them'' refers to that group, likely especially the apostles in context.'
  alternative_readings:
  - '''The rest'' refers specifically to non-apostolic believers'
  - '''Them'' refers narrowly to the apostles alone'
  rationale: 'The Greek does not explicitly define the groups, so the translation
    avoids over-specification and preserves the text''s general contrast: outsiders
    did not dare join them, yet the people honored them.'
  doctrine_reference: Preserve theological tension rather than resolve it.
