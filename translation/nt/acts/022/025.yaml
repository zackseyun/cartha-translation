id: ACT.22.25
reference: Acts 22:25
source:
  edition: SBLGNT
  text: ὡς δὲ ⸀προέτειναν αὐτὸν τοῖς ἱμᾶσιν εἶπεν πρὸς τὸν ἑστῶτα ἑκατόνταρχον ὁ Παῦλος·
    Εἰ ἄνθρωπον Ῥωμαῖον καὶ ἀκατάκριτον ἔξεστιν ὑμῖν μαστίζειν;
translation:
  text: But when they had stretched him out with the straps, Paul said to the centurion
    standing there, “Is it lawful for you to flog a Roman man who is uncondemned?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a Roman citizen.” The Greek says “a Roman man,” but in this legal context
      the point is Paul's protected status as a Roman citizen.
    reason: lexical_alternative
lexical_decisions:
- source_word: προέτειναν ... τοῖς ἱμᾶσιν
  chosen: had stretched him out with the straps
  alternatives:
  - had tied him up with thongs
  - had bound him with leather straps
  lexicon: BDAG
  rationale: προτείνω here refers to extending or stretching Paul out for scourging
    preparation, and ἱμᾶσιν are straps/thongs. 'Stretched him out with the straps'
    preserves the physical action more precisely than the traditional but less explicit
    'bound him with thongs.'
- source_word: ἑστῶτα
  chosen: standing there
  alternatives:
  - standing by
  - present
  lexicon: BDAG
  rationale: The participle from ἵστημι describes the centurion as standing nearby/in
    attendance. 'Standing there' is natural modern English and preserves the scene.
- source_word: ἑκατόνταρχον
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: '''Centurion'' is the standard and precise rendering for the Roman rank.'
- source_word: ἄνθρωπον Ῥωμαῖον
  chosen: a Roman man
  alternatives:
  - a Roman citizen
  - a Roman
  lexicon: BDAG
  rationale: ἄνθρωπον is explicitly present and masculine singular, so 'man' preserves
    the wording. However, in context 'Roman' implies Roman citizenship status; this
    nuance is preserved by the legal context and footnoted alternative.
- source_word: ἀκατάκριτον
  chosen: uncondemned
  alternatives:
  - without a verdict
  - not yet condemned
  lexicon: BDAG
  rationale: The adjective means not judicially condemned. 'Uncondemned' is concise
    and legally pointed, fitting Paul's appeal to Roman law.
- source_word: ἔξεστιν
  chosen: Is it lawful for you
  alternatives:
  - Is it permitted for you
  - May you legally
  lexicon: BDAG
  rationale: ἔξεστιν asks about what is legally permissible. 'Lawful' best fits the
    juridical setting.
- source_word: μαστίζειν
  chosen: to flog
  alternatives:
  - to scourge
  - to whip
  lexicon: BDAG
  rationale: μαστίζω refers to severe whipping/scourging. 'Flog' is clear modern English
    and suitably strong without sounding archaic.
