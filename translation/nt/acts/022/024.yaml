id: ACT.22.24
reference: Acts 22:24
source:
  edition: SBLGNT
  text: ἐκέλευσεν ⸂ὁ χιλίαρχος εἰσάγεσθαι αὐτὸν⸃ εἰς τὴν παρεμβολήν, ⸀εἴπας μάστιξιν
    ἀνετάζεσθαι αὐτὸν ἵνα ἐπιγνῷ δι’ ἣν αἰτίαν οὕτως ἐπεφώνουν αὐτῷ.
translation:
  text: The tribune ordered him to be brought into the barracks, saying that he should
    be examined by scourging, so that he might find out for what reason they were
    shouting against him like this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be interrogated by flogging.' The Greek combines examination language
      with the explicit means of scourging.
    reason: lexical_alternative
  - marker: b
    text: Or 'the camp' or 'the fortress.' Here the term refers to the Roman military
      quarters in Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: χιλίαρχος
  chosen: tribune
  alternatives:
  - commander
  - military commander
  lexicon: BDAG
  rationale: In Acts this refers to a Roman officer commanding roughly a cohort-level
    force. 'Tribune' is a historically specific and concise rendering for the Roman
    chiliarch, preferable to the vaguer 'commander'.
- source_word: παρεμβολή
  chosen: barracks
  alternatives:
  - camp
  - fortress
  lexicon: BDAG
  rationale: In this Jerusalem setting the term refers to the Roman military quarters/fortress
    area. 'Barracks' communicates the functional destination in natural English better
    than the more literal but potentially misleading 'camp'.
- source_word: εἰσάγεσθαι
  chosen: to be brought into
  alternatives:
  - to be led into
  - to be taken into
  lexicon: BDAG
  rationale: The passive infinitive indicates Paul was to be taken inside by others.
    'Brought into' is idiomatic and preserves the passive sense.
- source_word: εἴπας
  chosen: saying
  alternatives:
  - ordering
  - directing
  lexicon: BDAG
  rationale: The aorist participle introduces the content of the tribune's command.
    'Saying' is a straightforward English participial link that preserves the discourse
    flow.
- source_word: μάστιξιν
  chosen: by scourging
  alternatives:
  - with whips
  - by flogging
  lexicon: BDAG
  rationale: The dative plural denotes the means of examination. 'Scourging' reflects
    the severe whipping implied by μάστιξ and fits the formal gravity of the scene;
    'by scourging' makes the instrumental force clear.
- source_word: ἀνετάζεσθαι
  chosen: be examined
  alternatives:
  - be interrogated
  - be questioned under torture
  lexicon: BDAG
  rationale: The verb means to examine or interrogate, here in the context of scourging.
    'Be examined' keeps the lexical core while the accompanying 'by scourging' supplies
    the coercive method explicitly present in the Greek.
- source_word: ἐπιγνῷ
  chosen: he might find out
  alternatives:
  - he might know fully
  - he might learn
  lexicon: BDAG
  rationale: The purpose clause expresses the tribune's aim of discovering the facts.
    'Find out' is natural modern English for this investigative sense.
- source_word: δι’ ἣν αἰτίαν
  chosen: for what reason
  alternatives:
  - why
  - for what charge
  lexicon: BDAG
  rationale: This phrase asks the cause or reason. 'For what reason' is slightly more
    explicit than 'why' and avoids importing a formal legal 'charge' not stated in
    the Greek.
- source_word: οὕτως
  chosen: like this
  alternatives:
  - so
  - in this way
  lexicon: BDAG
  rationale: The adverb modifies the manner/intensity of the crowd's outcry. 'Like
    this' is idiomatic and preserves the demonstrative force.
- source_word: ἐπεφώνουν αὐτῷ
  chosen: they were shouting against him
  alternatives:
  - they were crying out against him
  - they were shouting at him
  lexicon: BDAG
  rationale: The imperfect depicts ongoing loud accusation or outcry. 'Shouting against
    him' captures the hostile sense better than the more neutral 'at him'.
