theological_decisions:
- issue: οὐρανός in the phrase ἐκ τοῦ οὐρανοῦ
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: Given Luke-Acts usage and the context of Paul's revelatory encounter,
    'heaven' better preserves the likely intended source as transcendent/divine rather
    than merely atmospheric. This reflects lexical-contextual judgment, not an added
    doctrinal claim.
  doctrine_reference: Translation philosophy §1, §3
