id: ACT.22.29
reference: Acts 22:29
source:
  edition: SBLGNT
  text: εὐθέως οὖν ἀπέστησαν ἀπ’ αὐτοῦ οἱ μέλλοντες αὐτὸν ἀνετάζειν· καὶ ὁ χιλίαρχος
    δὲ ἐφοβήθη ἐπιγνοὺς ὅτι Ῥωμαῖός ἐστιν καὶ ὅτι ⸂αὐτὸν ἦν⸃ δεδεκώς.
translation:
  text: Therefore those who were about to examine him withdrew from him at once, and
    the tribune also became afraid when he realized that he was a Roman citizen and
    that he had bound him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'those who were about to examine him by
      scourging.' The Greek verb can refer to official examination, and the previous
      verse clarifies the means.
    reason: lexical_alternative
  - marker: b
    text: Or 'the commander'; Greek 'tribune' refers to a Roman military officer commanding
      about a thousand soldiers in title, though actual numbers varied.
    reason: cultural_note
lexical_decisions:
- source_word: εὐθέως
  chosen: at once
  alternatives:
  - immediately
  - straightway
  lexicon: BDAG
  rationale: Conveys the immediate response in natural modern English without archaic
    tone.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks the inferential/sequential connection to the previous verse; 'therefore'
    preserves the logical force slightly better than a bare temporal 'then'.
- source_word: ἀπέστησαν ἀπ’ αὐτοῦ
  chosen: withdrew from him
  alternatives:
  - stood away from him
  - drew back from him
  lexicon: BDAG
  rationale: Idiomatic rendering of ἀφίσταμαι with ἀπό, expressing that they ceased
    their approach and backed off from Paul.
- source_word: οἱ μέλλοντες αὐτὸν ἀνετάζειν
  chosen: those who were about to examine him
  alternatives:
  - those who were going to interrogate him
  - those who were about to question him under examination
  lexicon: BDAG
  rationale: μέλλοντες + infinitive indicates imminent intention; ἀνετάζω in this
    context refers to official examination, likely by scourging, but 'examine' keeps
    the wording close to the Greek while the context supplies the severity.
- source_word: χιλίαρχος
  chosen: tribune
  alternatives:
  - commander
  - military tribune
  lexicon: BDAG
  rationale: Refers to the Roman officer commanding a cohort; 'tribune' is concise
    and historically accurate, while 'military tribune' is possible but heavier.
- source_word: ἐφοβήθη
  chosen: became afraid
  alternatives:
  - was afraid
  - feared
  lexicon: BDAG
  rationale: The aorist here marks his reaction upon realizing the situation; 'became
    afraid' captures the onset of fear.
- source_word: ἐπιγνοὺς
  chosen: when he realized
  alternatives:
  - when he learned
  - after recognizing
  lexicon: BDAG
  rationale: ἐπιγινώσκω here denotes coming to full awareness; 'realized' is natural
    and fits the causal-temporal sense of the participle.
- source_word: Ῥωμαῖός ἐστιν
  chosen: he was a Roman citizen
  alternatives:
  - he was a Roman
  - he is a Roman citizen
  lexicon: BDAG
  rationale: In context the issue is legal status, not ethnicity; English idiom is
    clearer with 'Roman citizen.' Although ἐστιν is present in Greek, English narrative
    style naturally shifts to past tense in indirect discourse after the main past-tense
    verb.
- source_word: δεδεκώς
  chosen: had bound him
  alternatives:
  - had him bound
  - had tied him up
  lexicon: BDAG
  rationale: Perfect participle of δέω indicates a completed act with present legal
    significance. 'Had bound him' is a straightforward rendering. 'Had him bound'
    is possible if understood causatively, but the Greek can be rendered directly
    without adding causative nuance.
