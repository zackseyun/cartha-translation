theological_decisions:
- issue: Nature of Paul's visionary experience (ἐκστάσει)
  chosen_reading: Render as 'trance' without importing claims beyond the text
  alternative_readings:
  - ecstasy
  - visionary state
  rationale: The verse reports Paul's altered state during prayer but does not itself
    define the mechanics or theological status beyond the narrative context. 'Trance'
    is a transparent lexical rendering that preserves the text's claim without embellishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
