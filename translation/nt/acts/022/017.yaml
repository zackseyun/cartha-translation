id: ACT.22.17
reference: Acts 22:17
source:
  edition: SBLGNT
  text: Ἐγένετο δέ μοι ὑποστρέψαντι εἰς Ἰερουσαλὴμ καὶ προσευχομένου μου ἐν τῷ ἱερῷ
    γενέσθαι με ἐν ἐκστάσει
translation:
  text: And it happened to me, after I returned to Jerusalem and while I was praying
    in the temple, that I fell into a trance,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically
      the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: Or 'in a trance.' The Greek expression literally says 'to become in a trance,'
      an idiom for entering a visionary state.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο δέ
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came about
  lexicon: BDAG
  rationale: The impersonal narrative formula ἐγένετο with δέ introduces the next
    event in Paul's account. 'And it happened' preserves the narrative transition
    without sounding overly archaic.
- source_word: μοι
  chosen: to me
  alternatives:
  - for me
  lexicon: BDAG
  rationale: 'The dative marks personal involvement/experience. ''To me'' is idiomatic
    in English with the event formula: ''it happened to me.'''
- source_word: ὑποστρέψαντι εἰς Ἰερουσαλήμ
  chosen: after I returned to Jerusalem
  alternatives:
  - when I returned to Jerusalem
  - upon my return to Jerusalem
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main event, so 'after I returned'
    best conveys temporal sequence in natural English.
- source_word: καὶ προσευχομένου μου
  chosen: and while I was praying
  alternatives:
  - and as I was praying
  - and while I prayed
  lexicon: BDAG
  rationale: The genitive absolute indicates contemporaneous action. 'While I was
    praying' clearly expresses ongoing action at the time of the main event.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple precincts
  - in the temple complex
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    'Temple' is the standard readable rendering; the more precise sense is preserved
    in a footnote.
- source_word: γενέσθαι με
  chosen: that I fell
  alternatives:
  - that I came to be
  - that I became
  lexicon: BDAG
  rationale: With the complement ἐν ἐκστάσει, γίνομαι idiomatically means entering
    a state. English naturally expresses this as 'I fell' or 'I came' into that state;
    'fell' is idiomatic and concise.
- source_word: ἐν ἐκστάσει
  chosen: into a trance
  alternatives:
  - in a trance
  - in ecstasy
  lexicon: BDAG
  rationale: ἔκστασις in Acts denotes an altered visionary state. 'Trance' is the
    clearest modern equivalent. Because the Greek uses ἐν with γίνομαι to indicate
    entry into a state, 'into a trance' best reflects the sense.
