id: ACT.22.26
reference: Acts 22:26
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὁ ἑκατοντάρχης προσελθὼν ⸂τῷ χιλιάρχῳ ἀπήγγειλεν⸃ λέγων· ⸀Τί μέλλεις
    ποιεῖν; ὁ γὰρ ἄνθρωπος οὗτος Ῥωμαῖός ἐστιν.
translation:
  text: When the centurion heard this, he went to the commander and reported it, saying,
    “What are you about to do? For this man is a Roman citizen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What are you going to do?” The Greek expression can indicate either
      imminent action or intended action.
    reason: lexical_alternative
  - marker: b
    text: Literally, “this man is a Roman.” In context, the meaning is that he possesses
      Roman citizenship.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: When ... heard this
  alternatives:
  - after hearing
  - having heard
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main verb.
    'When ... heard this' is natural English and preserves the temporal force without
    awkwardness.
- source_word: ἑκατοντάρχης
  chosen: centurion
  alternatives:
  - Roman officer
  lexicon: BDAG
  rationale: Standard rendering for the Roman military rank denoted by ἑκατοντάρχης;
    more precise than the generic 'officer'.
- source_word: προσελθὼν
  chosen: he went to
  alternatives:
  - approaching
  - coming up to
  lexicon: BDAG
  rationale: The participle indicates movement toward the superior officer. 'He went
    to' is idiomatic in English and fits the narrative flow better than the more wooden
    'approaching.'
- source_word: χιλιάρχῳ
  chosen: the commander
  alternatives:
  - the tribune
  - the chiliarch
  lexicon: BDAG
  rationale: χιλίαρχος refers to a Roman military commander over a cohort/tribune-level
    officer. 'Commander' is clear modern English; 'tribune' is possible but less immediately
    accessible, and 'chiliarch' is too transliterated for the translation philosophy.
- source_word: ἀπήγγειλεν
  chosen: reported it
  alternatives:
  - informed him
  - announced
  lexicon: BDAG
  rationale: The verb means to report or convey information. 'Reported it' fits the
    military/legal context and naturally takes the implied content from the preceding
    event.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial linkage to the reporting action in a straightforward
    way.
- source_word: Τί μέλλεις ποιεῖν;
  chosen: What are you about to do?
  alternatives:
  - What are you going to do?
  - What do you intend to do?
  lexicon: BDAG
  rationale: μέλλω + infinitive commonly expresses imminence or intended action. 'About
    to do' preserves the sense of impending action more closely than the broader 'intend
    to do.'
- source_word: ὁ γὰρ ἄνθρωπος οὗτος
  chosen: For this man
  alternatives:
  - for this person
  - for this fellow
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to an adult male individual, so 'man'
    is gender-accurate and natural.
- source_word: Ῥωμαῖός ἐστιν
  chosen: is a Roman citizen
  alternatives:
  - is a Roman
  - has Roman citizenship
  lexicon: BDAG
  rationale: In this legal context, the point is not ethnicity or residence but citizenship
    status, as the surrounding passage makes clear. 'Roman citizen' makes explicit
    the force that English readers might miss in the bare 'Roman.'
