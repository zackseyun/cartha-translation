id: ACT.22.4
reference: Acts 22:4
source:
  edition: SBLGNT
  text: ὃς ταύτην τὴν ὁδὸν ἐδίωξα ἄχρι θανάτου, δεσμεύων καὶ παραδιδοὺς εἰς φυλακὰς
    ἄνδρας τε καὶ γυναῖκας,
translation:
  text: I persecuted this Way to the death, binding and delivering both men and women
    into prisons,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this path' or 'this movement.' The Greek literally says 'this way,'
      but in Acts it often functions as a name for the Christian movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'unto death.' The phrase indicates the deadly extent of the persecution.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην τὴν ὁδὸν
  chosen: this Way
  alternatives:
  - this path
  - this movement
  lexicon: BDAG
  rationale: ὁδός literally means 'way/road/path,' but in Acts it functions as a recognized
    designation for the Christian movement. Capitalizing 'Way' preserves the likely
    titular sense while remaining close to the Greek wording.
- source_word: ἐδίωξα
  chosen: I persecuted
  alternatives:
  - I pursued
  lexicon: BDAG
  rationale: In this context διώκω refers to hostile pursuit of believers, not neutral
    pursuit. 'Persecuted' best captures the established contextual sense.
- source_word: ἄχρι θανάτου
  chosen: to the death
  alternatives:
  - unto death
  - as far as death
  - to death
  lexicon: BDAG
  rationale: The phrase expresses the extreme extent of the persecution. 'To the death'
    is idiomatic modern English and preserves the force without overstating whether
    Paul personally killed or pursued people with lethal consequence.
- source_word: δεσμεύων
  chosen: binding
  alternatives:
  - arresting
  - tying up
  lexicon: BDAG
  rationale: The participle literally denotes binding. 'Binding' keeps the concrete
    imagery and matches the formal texture of the Greek better than the more interpretive
    'arresting.'
- source_word: παραδιδοὺς
  chosen: delivering
  alternatives:
  - handing over
  - turning over
  lexicon: BDAG
  rationale: παραδίδωμι here means handing persons over to authorities/custody. 'Delivering'
    is concise and natural in sequence with 'binding,' while preserving the juridical
    sense.
- source_word: εἰς φυλακὰς
  chosen: into prisons
  alternatives:
  - to prisons
  - into prison
  lexicon: BDAG
  rationale: The plural φυλακάς is best represented by 'prisons.' 'Into' reflects
    εἰς and the movement implied by παραδιδοὺς.
- source_word: ἄνδρας τε καὶ γυναῖκας
  chosen: both men and women
  alternatives:
  - men as well as women
  lexicon: BDAG
  rationale: This construction emphasizes both sexes explicitly. 'Both men and women'
    is natural English and preserves the rhetorical force that Paul's persecution
    extended broadly.
