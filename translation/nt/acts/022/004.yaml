theological_decisions:
- issue: Whether ἡ ὁδός should be rendered as a common noun or as a quasi-title for
    the Christian movement
  chosen_reading: Rendered as 'this Way' with capitalization
  alternative_readings:
  - this way
  - this path
  - this movement
  rationale: Acts regularly uses ἡ ὁδός as a designation for the Christian faith/community.
    Capitalization signals this recognized referent without importing later ecclesiastical
    terminology.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    source meaning over tradition inertia'
