theological_decisions:
- issue: Rendering Ἰουδαίων
  chosen_reading: the Jews
  alternative_readings:
  - the Judeans
  rationale: In this context the referent is the Jewish population residing in Damascus,
    and the emphasis is on communal/religious identity and reputation among them,
    not on people from the region of Judea. Therefore 'the Jews' best fits the immediate
    sense.
