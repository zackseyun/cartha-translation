id: ACT.22.12
reference: Acts 22:12
source:
  edition: SBLGNT
  text: Ἁνανίας δέ τις ἀνὴρ ⸀εὐλαβὴς κατὰ τὸν νόμον μαρτυρούμενος ὑπὸ πάντων τῶν κατοικούντων
    Ἰουδαίων,
translation:
  text: Now a certain man, Ananias, devout according to the law, well spoken of by
    all the Jews living there,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Judeans," if taken as an ethnic-geographic term rather than a religious-communal
      one.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἁνανίας
  chosen: Ananias
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, following the
    translation philosophy to transliterate names rather than translate them.
- source_word: δέ
  chosen: Now
  alternatives:
  - And
  - Then
  lexicon: BDAG
  rationale: δέ here marks a mild narrative transition. 'Now' gives natural English
    discourse flow without overstating sequence.
- source_word: τις ἀνὴρ
  chosen: a certain man
  alternatives:
  - a man
  - a certain person
  lexicon: BDAG
  rationale: The combination τις ἀνήρ idiomatically introduces a particular but previously
    unspecified male individual. 'A certain man' preserves the indefiniteness and
    the masculine reference.
- source_word: εὐλαβής
  chosen: devout
  alternatives:
  - pious
  - reverent
  lexicon: BDAG
  rationale: '''Devout'' is idiomatic and accessible modern English for someone marked
    by reverence and careful religious observance. ''Pious'' can sound archaic or
    carry unintended connotations.'
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - with respect to the law
  - in keeping with the law
  lexicon: BDAG
  rationale: This phrase qualifies Ananias's devoutness in relation to the Mosaic
    law. 'According to the law' is both natural and close to the Greek, preserving
    the Jewish legal frame.
- source_word: μαρτυρούμενος
  chosen: well spoken of
  alternatives:
  - having a good reputation
  - being testified to
  - commended
  lexicon: BDAG
  rationale: The passive participle indicates that testimony is being borne about
    Ananias by others. 'Well spoken of' is natural English and captures the favorable
    public witness.
- source_word: ὑπὸ πάντων
  chosen: by all
  alternatives:
  - by everyone
  lexicon: BDAG
  rationale: A straightforward rendering of the agent phrase, preserving the comprehensive
    force of πάντων.
- source_word: τῶν κατοικούντων Ἰουδαίων
  chosen: the Jews living there
  alternatives:
  - the resident Jews
  - the Jews who lived there
  - the Jews dwelling there
  lexicon: BDAG
  rationale: The participle κατοικούντων denotes residing in the place in question,
    here Damascus from the surrounding context. Because English normally requires
    an explicit locative, 'living there' makes the sense clear without adding more
    than the context warrants. 'Jews' is retained rather than 'Judeans' because the
    context concerns Jewish communal identity rather than geographic origin.
