id: ACT.22.23
reference: Acts 22:23
source:
  edition: SBLGNT
  text: ⸀κραυγαζόντων ⸀τε αὐτῶν καὶ ῥιπτούντων τὰ ἱμάτια καὶ κονιορτὸν βαλλόντων εἰς
    τὸν ἀέρα,
translation:
  text: And as they were shouting and throwing off their cloaks and flinging dust
    into the air,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throwing their garments' or 'casting off their garments.' The Greek
      can denote either the act of tossing garments away or throwing them about in
      agitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κραυγαζόντων
  chosen: were shouting
  alternatives:
  - were crying out
  - were yelling
  lexicon: BDAG
  rationale: Present active participle in the genitive plural, coordinated with the
    following participles to describe simultaneous ongoing actions of the crowd. 'Shouting'
    is natural modern English and preserves the loud public outcry without over-translating.
- source_word: τε
  chosen: and
  alternatives:
  - both
  - also
  lexicon: BDAG
  rationale: Here τέ links the first participle with the following coordinated actions.
    In English, simple 'and' best conveys the connective force in a smooth way.
- source_word: αὐτῶν
  chosen: they
  alternatives:
  - them
  lexicon: BDAG
  rationale: Though formally genitive ('of them'), in English the participial genitive
    absolute-like construction is best rendered with an explicit subject, 'they,'
    to make the clause idiomatic.
- source_word: ῥιπτούντων
  chosen: throwing off
  alternatives:
  - throwing
  - casting off
  lexicon: BDAG
  rationale: The verb means to throw or cast. With τὰ ἱμάτια in this crowd-action
    context, 'throwing off' captures the likely sense of tossing off outer garments
    in agitation, a conventional sign of violent excitement.
- source_word: τὰ ἱμάτια
  chosen: their cloaks
  alternatives:
  - their garments
  - their robes
  lexicon: BDAG
  rationale: ἱμάτια commonly refers to outer garments or cloaks. 'Cloaks' is more
    specific and vivid than the generic 'garments,' while remaining natural in English.
- source_word: κονιορτόν
  chosen: dust
  alternatives:
  - dirt
  lexicon: BDAG
  rationale: The noun denotes dust. 'Dust' is the standard and more literary-natural
    rendering in this idiom of demonstrative outrage.
- source_word: βαλλόντων
  chosen: flinging
  alternatives:
  - throwing
  - casting
  lexicon: BDAG
  rationale: βάλλω is broadly 'throw/cast.' 'Flinging' conveys the forceful, agitated
    action of the mob and avoids repeating 'throwing' immediately after ῥιπτούντων.
- source_word: εἰς τὸν ἀέρα
  chosen: into the air
  alternatives:
  - into the sky
  lexicon: BDAG
  rationale: A standard idiomatic rendering of the prepositional phrase. 'Air' matches
    the Greek more closely than 'sky' and fits the gesture described.
