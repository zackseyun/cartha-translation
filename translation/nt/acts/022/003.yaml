theological_decisions:
- issue: Rendering of πατρῴου νόμου in a way that reflects Paul's identification with
    his Jewish audience
  chosen_reading: the law of our fathers
  alternative_readings:
  - the ancestral law
  - the law of the fathers
  rationale: The Greek adjective πατρῷος means ancestral, but in this speech Paul
    is emphasizing common heritage with his hearers. 'Our fathers' makes that solidarity
    explicit in idiomatic English without changing the referent. This is a contextual-rhetorical
    decision, not a sectarian one.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Whether to preserve the literal idiom παρὰ τοὺς πόδας Γαμαλιήλ
  chosen_reading: at the feet of Gamaliel
  alternative_readings:
  - under Gamaliel
  - under the instruction of Gamaliel
  rationale: The literal idiom is understandable in modern English and preserves the
    historical teacher-disciple imagery. A more interpretive rendering was not necessary.
  doctrine_reference: Translation philosophy §§1, 6
