id: ACT.22.3
reference: Acts 22:3
source:
  edition: SBLGNT
  text: ⸀Ἐγώ εἰμι ἀνὴρ Ἰουδαῖος, γεγεννημένος ἐν Ταρσῷ τῆς Κιλικίας, ἀνατεθραμμένος
    δὲ ἐν τῇ πόλει ταύτῃ παρὰ τοὺς πόδας Γαμαλιήλ, πεπαιδευμένος κατὰ ἀκρίβειαν τοῦ
    πατρῴου νόμου, ζηλωτὴς ὑπάρχων τοῦ θεοῦ καθὼς πάντες ὑμεῖς ἐστε σήμερον,
translation:
  text: I am a Jewish man, born in Tarsus of Cilicia, but brought up in this city
    at the feet of Gamaliel, educated according to the strictness of the law of our
    fathers, being zealous for God just as all of you are today.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'at the feet of Gamaliel,' an idiom for being trained under a
      teacher.
    reason: cultural_note
  - marker: b
    text: Or 'the ancestral law.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ Ἰουδαῖος
  chosen: a Jewish man
  alternatives:
  - a Jew
  - a Jewish male
  lexicon: BDAG
  rationale: ἀνήρ explicitly denotes an adult male person, while Ἰουδαῖος identifies
    him ethnically/religiously as Jewish/Judean. 'A Jewish man' preserves both elements
    more fully than the idiomatic but less explicit 'a Jew.'
- source_word: γεγεννημένος ἐν Ταρσῷ τῆς Κιλικίας
  chosen: born in Tarsus of Cilicia
  alternatives:
  - having been born in Tarsus of Cilicia
  - born in Tarsus, in Cilicia
  lexicon: BDAG
  rationale: The perfect participle γεγεννημένος is naturally rendered in English
    as 'born.' 'Of Cilicia' is retained as a compact geographic qualifier matching
    the genitive construction.
- source_word: ἀνατεθραμμένος δὲ ἐν τῇ πόλει ταύτῃ
  chosen: but brought up in this city
  alternatives:
  - but raised in this city
  - but reared in this city
  lexicon: BDAG
  rationale: ἀνατρέφω here refers to upbringing rather than mere physical nourishment.
    'Brought up' is idiomatic modern English and distinguishes upbringing from birth.
    δέ is rendered as 'but' to mark the contrast between birthplace and upbringing.
- source_word: παρὰ τοὺς πόδας Γαμαλιήλ
  chosen: at the feet of Gamaliel
  alternatives:
  - under Gamaliel
  - under the instruction of Gamaliel
  lexicon: BDAG
  rationale: The expression is a standard idiom for discipleship/instruction under
    a teacher. The more literal 'at the feet of' is retained because it is clear in
    English and preserves the vivid educational image.
- source_word: πεπαιδευμένος
  chosen: educated
  alternatives:
  - trained
  - instructed
  lexicon: BDAG
  rationale: παιδεύω in this context concerns formal formation and instruction. 'Educated'
    fits the academic-rabbinic setting and reads naturally with the following phrase.
- source_word: κατὰ ἀκρίβειαν
  chosen: according to the strictness
  alternatives:
  - according to the exactness
  - with precision
  - strictly
  lexicon: BDAG
  rationale: ἀκρίβεια conveys exactness/strictness. 'According to the strictness'
    preserves the prepositional structure and highlights rigorous conformity in Paul's
    training.
- source_word: τοῦ πατρῴου νόμου
  chosen: the law of our fathers
  alternatives:
  - the ancestral law
  - the law of the fathers
  lexicon: BDAG
  rationale: πατρῷος means ancestral/paternal. 'The law of our fathers' is a natural
    English rendering in this Jewish speech context and reflects Paul's solidarity
    with his audience. It also matches the communal sense better than the more wooden
    'of the fathers.'
- source_word: ζηλωτὴς ὑπάρχων τοῦ θεοῦ
  chosen: being zealous for God
  alternatives:
  - being a zealot for God
  - being devoted to God
  lexicon: BDAG
  rationale: ζηλωτής denotes one characterized by zeal. 'Zealous for God' is idiomatic
    and avoids importing the later technical-political sense that 'zealot' may suggest
    in English.
- source_word: καθὼς πάντες ὑμεῖς ἐστε σήμερον
  chosen: just as all of you are today
  alternatives:
  - as all of you are today
  - just as you all are today
  lexicon: BDAG
  rationale: καθώς introduces comparison. 'Just as all of you are today' preserves
    Paul's rhetorical alignment with his audience and keeps σήμερον attached to their
    present zeal.
