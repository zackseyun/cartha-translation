theological_decisions:
- issue: Rendering of κύριε in Saul's address
  chosen_reading: Lord
  alternative_readings:
  - sir
  rationale: The project default for κύριος is 'Lord.' Although Saul may initially
    use the term as a respectful address without full christological recognition,
    the narrative context and direct identification by Jesus support retaining 'Lord'
    in the main text while preserving 'sir' as an alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; Preserve theological
    tension rather than resolve it'
