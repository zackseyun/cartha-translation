id: ACT.22.8
reference: Acts 22:8
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ἀπεκρίθην· Τίς εἶ, κύριε; εἶπέν τε πρὸς ⸀ἐμέ· Ἐγώ εἰμι Ἰησοῦς ὁ Ναζωραῖος
    ὃν σὺ διώκεις.
translation:
  text: And I answered, ‘Who are you, Lord?’ And he said to me, ‘I am Jesus the Nazarene,
    whom you are persecuting.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘sir.’ The Greek κύριε can function as a respectful form of address as
      well as the title ‘Lord.’
    reason: alternative_reading
  - marker: b
    text: Or ‘Jesus of Nazareth’ or ‘Jesus the Nazorean.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθην
  chosen: I answered
  alternatives:
  - I replied
  lexicon: BDAG
  rationale: Aorist middle/passive deponent of ἀποκρίνομαι is naturally rendered 'answered.'
    'Replied' is possible but 'answered' is the more direct and standard equivalent.
- source_word: Τίς εἶ
  chosen: Who are you
  alternatives:
  - Who are you?
  lexicon: BDAG
  rationale: Straightforward interrogative pronoun plus copula. English requires inversion
    for a natural question.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Following the project's default rendering for κύριος as 'Lord.' In this
    immediate context Saul does not yet fully understand the speaker's identity, so
    'sir' is contextually possible, but the default title is retained and the alternative
    preserved in a footnote.
- source_word: εἶπέν τε πρὸς ἐμέ
  chosen: And he said to me
  alternatives:
  - Then he said to me
  - and he said to me
  lexicon: BDAG
  rationale: λέγω with πρὸς ἐμέ is idiomatically 'said to me.' τε adds connective
    force; 'and' captures it adequately in readable English.
- source_word: Ἐγώ εἰμι
  chosen: I am
  lexicon: BDAG
  rationale: Direct self-identification; no expansion is warranted.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
- source_word: ὁ Ναζωραῖος
  chosen: the Nazarene
  alternatives:
  - of Nazareth
  - the Nazorean
  lexicon: BDAG
  rationale: The articular epithet is most naturally rendered 'the Nazarene.' This
    preserves the Greek form more closely than 'of Nazareth,' while remaining idiomatic
    English. 'Nazorean' is more formal but less natural for the target audience.
- source_word: ὃν σὺ διώκεις
  chosen: whom you are persecuting
  alternatives:
  - whom you persecute
  lexicon: BDAG
  rationale: διώκω in this context means hostile pursuit/persecution, not mere pursuit.
    English progressive aspect ('are persecuting') fits the present tense well in
    direct speech and sounds natural.
