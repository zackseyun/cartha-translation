id: ACT.22.19
reference: Acts 22:19
source:
  edition: SBLGNT
  text: κἀγὼ εἶπον· Κύριε, αὐτοὶ ἐπίστανται ὅτι ἐγὼ ἤμην φυλακίζων καὶ δέρων κατὰ
    τὰς συναγωγὰς τοὺς πιστεύοντας ἐπὶ σέ·
translation:
  text: And I said, ‘Lord, they themselves know that throughout the synagogues I was
    imprisoning and beating those who believe in you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from synagogue to synagogue”; the Greek phrase is distributive, indicating
      repeated action across multiple synagogues.
    reason: lexical_alternative
  - marker: b
    text: Or “those who trust in you” or “those who put their faith in you.”
    reason: alternative_reading
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - And I myself
  lexicon: BDAG
  rationale: Contraction of καὶ ἐγώ, naturally rendered 'And I.' The emphatic force
    is mild and adequately carried by English word order in context.
- source_word: εἶπον
  chosen: said
  alternatives:
  - answered
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω in direct discourse is most naturally 'said.'
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine defaults, κύριος is rendered 'Lord.'
    In Acts 22 the addressee is Jesus in Paul's vision, so 'Lord' preserves both respect
    and christological force.
- source_word: αὐτοὶ
  chosen: they themselves
  alternatives:
  - they
  - they personally
  lexicon: BDAG
  rationale: The pronoun is emphatic; 'they themselves' preserves the emphasis that
    Paul's hearers already know his former conduct.
- source_word: ἐπίστανται
  chosen: know
  alternatives:
  - understand
  - are aware
  lexicon: BDAG
  rationale: Middle/passive form of ἐπίσταμαι commonly means 'know' or 'be acquainted
    with.' 'Know' is the clearest idiomatic English choice.
- source_word: ἤμην φυλακίζων καὶ δέρων
  chosen: I was imprisoning and beating
  alternatives:
  - I used to imprison and beat
  - I was putting in prison and beating
  lexicon: BDAG
  rationale: Imperfect εἰμί with present participles conveys ongoing/customary past
    action. 'I was imprisoning and beating' preserves the verbal aspect more formally;
    the sense is iterative/customary.
- source_word: φυλακίζων
  chosen: imprisoning
  alternatives:
  - putting in prison
  - jailing
  lexicon: BDAG
  rationale: φυλακίζω means to imprison or put in prison. 'Imprisoning' is concise
    and suitably formal.
- source_word: δέρων
  chosen: beating
  alternatives:
  - flogging
  - striking
  lexicon: BDAG
  rationale: δέρω means to beat physically. 'Beating' is broad enough for the context
    without over-specifying a judicial flogging.
- source_word: κατὰ τὰς συναγωγάς
  chosen: throughout the synagogues
  alternatives:
  - in the synagogues
  - from synagogue to synagogue
  lexicon: BDAG
  rationale: κατά with the accusative here is distributive, indicating activity across
    multiple synagogues. 'Throughout the synagogues' preserves that spread better
    than a simple locative 'in the synagogues.'
- source_word: τοὺς πιστεύοντας ἐπὶ σέ
  chosen: those who believe in you
  alternatives:
  - those who put their faith in you
  - those who trust in you
  lexicon: BDAG
  rationale: Present participle with ἐπί + accusative expresses ongoing belief/trust
    directed toward Jesus. 'Believe in you' is the most natural English rendering
    here and fits the narrative context.
