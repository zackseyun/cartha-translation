theological_decisions:
- issue: Rendering of κύριος in address to Jesus
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The verse is part of Paul's recounting of his encounter with the risen
    Jesus. Rendering κύριος as 'Lord' follows the project's default and preserves
    the christological weight without importing more than the text states.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Aspect of Paul's former persecution
  chosen_reading: I was imprisoning and beating
  alternative_readings:
  - I used to imprison and beat
  rationale: The Greek imperfect-periphrastic construction highlights ongoing/customary
    past action. The chosen rendering preserves that aspect more transparently, while
    the alternative is idiomatic but slightly more interpretive.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
