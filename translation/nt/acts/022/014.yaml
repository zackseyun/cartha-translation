theological_decisions:
- issue: Whether τὸν δίκαιον should be rendered as a christological title or a descriptive
    adjective
  chosen_reading: Rendered as the title 'the Righteous One' referring to Jesus
  alternative_readings:
  - render as 'the righteous one' without capitalization
  - render as 'the Just One'
  rationale: In Acts, this expression is used in a recognizably christological way
    (cf. Acts 3:14; 7:52). Capitalization in English helps signal titular usage without
    adding content beyond the context.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Whether 'our fathers' should be made gender-neutral
  chosen_reading: Retained 'our fathers'
  alternative_readings:
  - our ancestors
  rationale: The Greek explicitly uses πατέρων, and the doctrine calls for gender-accurate
    rather than gender-neutral rendering where the source is masculine and representative.
    The covenantal idiom is also biblically significant.
  doctrine_reference: Translation philosophy §4
