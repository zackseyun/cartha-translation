id: ACT.22.14
reference: Acts 22:14
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὁ θεὸς τῶν πατέρων ἡμῶν προεχειρίσατό σε γνῶναι τὸ θέλημα αὐτοῦ
    καὶ ἰδεῖν τὸν δίκαιον καὶ ἀκοῦσαι φωνὴν ἐκ τοῦ στόματος αὐτοῦ,
translation:
  text: And he said, ‘The God of our fathers has appointed you to know his will, to
    see the Righteous One, and to hear a voice from his mouth,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has chosen you.' The Greek verb can denote selecting or appointing someone
      for a task.
    reason: lexical_alternative
  - marker: b
    text: '''The Righteous One'' is a title for Jesus; alternatively, ''the Just One.'''
    reason: alternative_reading
lexical_decisions:
- source_word: προεχειρίσατό
  chosen: has appointed
  alternatives:
  - has chosen
  - has designated beforehand
  lexicon: BDAG
  rationale: The middle voice of προχειρίζομαι here conveys selection/appointment
    for a purpose. 'Has appointed' is natural English and preserves the purposive
    force without overreading temporal priority. 'Has chosen' is possible, but 'appointed'
    better fits the following infinitives that specify the commission.
- source_word: γνῶναι
  chosen: to know
  alternatives:
  - to come to know
  lexicon: BDAG
  rationale: Aorist infinitive of γινώσκω can denote coming to know, but in English
    'to know' adequately carries the purpose clause here and reads more naturally
    in sequence with the other infinitives.
- source_word: θέλημα
  chosen: will
  alternatives:
  - purpose
  - desire
  lexicon: BDAG
  rationale: '''Will'' is the standard and contextually fitting rendering for God''s
    intended purpose. ''Purpose'' is possible but slightly interpretive; ''will''
    preserves broader semantic range.'
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to behold
  lexicon: BDAG
  rationale: '''To see'' is the plain sense of the aorist infinitive and suits readable
    modern English. ''Behold'' is too elevated for the stated style.'
- source_word: τὸν δίκαιον
  chosen: the Righteous One
  alternatives:
  - the Just One
  - the righteous one
  lexicon: BDAG
  rationale: This expression functions as a title for Jesus in Acts. Capitalizing
    'Righteous One' signals titular force in English while preserving the lexical
    sense of δίκαιος. 'Just One' is traditional but less natural in contemporary English.
- source_word: ἀκοῦσαι φωνὴν
  chosen: to hear a voice
  alternatives:
  - to hear the voice
  - to hear a sound/utterance
  lexicon: BDAG
  rationale: The anarthrous φωνή is best rendered indefinitely as 'a voice.' Adding
    'the' would over-specify. 'Sound' is possible in some contexts, but here the following
    phrase 'from his mouth' points to articulated speech.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  chosen: from his mouth
  alternatives:
  - from him
  lexicon: BDAG
  rationale: The Greek is concrete and should be preserved. 'From his mouth' keeps
    the vivid idiom and emphasizes direct speech rather than merely source.
- source_word: Ὁ θεὸς τῶν πατέρων ἡμῶν
  chosen: The God of our fathers
  alternatives:
  - The God of our ancestors
  lexicon: BDAG
  rationale: This is a conventional covenantal expression linking Paul with Israel's
    heritage. 'Fathers' is gender-accurate to the Greek and preserves the traditional
    biblical idiom; 'ancestors' is possible but less formally aligned with the source.
