id: ACT.22.10
reference: Acts 22:10
source:
  edition: SBLGNT
  text: εἶπον δέ· Τί ποιήσω, κύριε; ὁ δὲ κύριος εἶπεν πρός με· Ἀναστὰς πορεύου εἰς
    Δαμασκόν, κἀκεῖ σοι λαληθήσεται περὶ πάντων ὧν τέτακταί σοι ποιῆσαι.
translation:
  text: Then I said, ‘What should I do, Lord?’ And the Lord said to me, ‘Get up and
    go into Damascus, and there you will be told about everything that has been appointed
    for you to do.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What shall I do, Lord?”
    reason: lexical_alternative
  - marker: b
    text: Or “everything that has been assigned for you to do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί ποιήσω
  chosen: What should I do
  alternatives:
  - What shall I do
  - What am I to do
  lexicon: BDAG
  rationale: The deliberative aorist subjunctive asks for direction about the proper
    next action. 'Should I do' gives natural modern English while preserving the sense
    of obligation or guidance better than a bare future.
- source_word: κύριε / ὁ ... κύριος
  chosen: Lord / the Lord
  alternatives:
  - sir / the Lord
  - master / the Lord
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'Lord' is used. In this Damascus-road
    context, the speaker addresses and identifies Jesus with the title κύριος; 'sir'
    would understate the christological force in Acts' narrative retelling.
- source_word: Ἀναστὰς
  chosen: Get up
  alternatives:
  - Rise
  - Stand up
  lexicon: BDAG
  rationale: The participle functions imperativally in sequence with πορεύου. 'Get
    up' is idiomatic modern English and preserves the command to rise before going.
- source_word: πορεύου εἰς Δαμασκόν
  chosen: go into Damascus
  alternatives:
  - go to Damascus
  - travel into Damascus
  lexicon: BDAG
  rationale: πορεύομαι is a common verb of going/journeying. 'Go into Damascus' reflects
    εἰς with a slight sense of movement into the city, while remaining natural English.
- source_word: κἀκεῖ
  chosen: and there
  alternatives:
  - and in that place
  - and thereupon
  lexicon: BDAG
  rationale: This compressed form of καὶ ἐκεῖ is best rendered straightforwardly as
    'and there,' preserving the sequence and location.
- source_word: λαληθήσεται
  chosen: you will be told
  alternatives:
  - it will be spoken to you
  - you will be spoken to
  lexicon: BDAG
  rationale: The future passive of λαλέω with dative σοι is naturally rendered in
    English as an impersonal passive, 'you will be told.' This communicates the sense
    without awkward literalism.
- source_word: περὶ πάντων
  chosen: about everything
  alternatives:
  - concerning all things
  - about all that
  lexicon: BDAG
  rationale: περί with genitive introduces the content of what will be communicated.
    'About everything' is clear and idiomatic.
- source_word: τέτακταί σοι ποιῆσαι
  chosen: has been appointed for you to do
  alternatives:
  - has been assigned for you to do
  - has been ordered for you to do
  - you have been appointed to do
  lexicon: BDAG
  rationale: The perfect passive of τάσσω indicates something already set or appointed,
    with continuing force. Rendering it as 'has been appointed for you to do' preserves
    divine ordering without over-specifying predestinarian implications. The dative
    σοι is retained as 'for you.'
