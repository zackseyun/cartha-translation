theological_decisions:
- issue: Force of τέτακταί in relation to divine direction and vocation
  chosen_reading: has been appointed for you to do
  alternative_readings:
  - has been commanded for you to do
  - you have been appointed to do
  rationale: The wording should preserve that Paul's forthcoming actions are divinely
    set without importing a stronger theological system than the verse itself states.
    'Appointed' reflects τάσσω well and leaves the text's tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
