id: ACT.22.16
reference: Acts 22:16
source:
  edition: SBLGNT
  text: καὶ νῦν τί μέλλεις; ἀναστὰς βάπτισαι καὶ ἀπόλουσαι τὰς ἁμαρτίας σου ἐπικαλεσάμενος
    τὸ ὄνομα ⸀αὐτοῦ.
translation:
  text: And now why are you waiting? Rise, be baptized, and wash away your sins, calling
    on his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'why do you delay?'
    reason: lexical_alternative
  - marker: b
    text: The Greek can also be understood with the participle more explicitly as
      'calling on his name' or 'by calling on his name'; the translation preserves
      the ambiguity.
    reason: alternative_reading
lexical_decisions:
- source_word: τί μέλλεις
  chosen: why are you waiting
  alternatives:
  - what are you about to do
  - why do you delay
  lexicon: BDAG
  rationale: The idiom μέλλω with an interrogative here functions naturally as a rebuke
    against delay, not a question about future intention. 'Why are you waiting?' captures
    the force in clear modern English.
- source_word: ἀναστὰς
  chosen: Rise
  alternatives:
  - Get up
  - Having arisen
  lexicon: BDAG
  rationale: The aorist participle is attendant to the following imperatives and is
    best rendered idiomatically as an imperative in English. 'Rise' preserves the
    brisk, urgent tone.
- source_word: βάπτισαι
  chosen: be baptized
  alternatives:
  - have yourself baptized
  lexicon: BDAG
  rationale: The aorist middle imperative of βαπτίζω is most naturally rendered in
    idiomatic English as passive 'be baptized.' This avoids awkwardness while preserving
    the command.
- source_word: ἀπόλουσαι
  chosen: wash away
  alternatives:
  - wash off
  - be washed from
  lexicon: BDAG
  rationale: The verb ἀπολούομαι carries the sense of washing away or cleansing off.
    'Wash away' is the standard, natural English equivalent and fits the object 'your
    sins'.
- source_word: τὰς ἁμαρτίας σου
  chosen: your sins
  alternatives:
  - your sinful acts
  lexicon: BDAG
  rationale: A direct rendering preserves the ordinary NT sense of ἁμαρτία without
    interpretive expansion.
- source_word: ἐπικαλεσάμενος
  chosen: calling on
  alternatives:
  - having called on
  - by calling on
  - as you call on
  lexicon: BDAG
  rationale: The aorist middle participle is closely linked to the imperatives and
    likely expresses attendant circumstance or means. 'Calling on' preserves the Greek
    connection without over-specifying whether it is strictly temporal or instrumental.
- source_word: τὸ ὄνομα αὐτοῦ
  chosen: his name
  alternatives:
  - the name of him
  - the name of the Lord
  lexicon: BDAG
  rationale: The Greek text reads the pronoun αὐτοῦ, so 'his name' is the most direct
    translation. The referent is contextually the Lord Jesus, but the verse itself
    uses the pronoun rather than an explicit title.
