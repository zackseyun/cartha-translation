theological_decisions:
- issue: Relation of baptism, washing away sins, and calling on his name
  chosen_reading: The translation preserves the Greek sequence and leaves the precise
    theological relation between the commands and participle unstated beyond the grammar.
  alternative_readings:
  - Baptism itself is the means by which sins are washed away
  - Calling on his name is the means by which sins are washed away, with baptism accompanying
    it
  - The whole expression forms a conversion-initiation complex without isolating one
    element
  rationale: The verse is doctrinally disputed across Christian traditions. The Greek
    presents coordinated imperatives with a participle, but does not require the translator
    to resolve sacramental theology beyond the wording itself. Preserving the syntax
    best fits the instruction to maintain theological tension rather than resolve
    it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
