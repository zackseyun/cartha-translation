id: ACT.22.27
reference: Acts 22:27
source:
  edition: SBLGNT
  text: προσελθὼν δὲ ὁ χιλίαρχος εἶπεν αὐτῷ· Λέγε μοι, ⸀σὺ Ῥωμαῖος εἶ; ὁ δὲ ἔφη· Ναί.
translation:
  text: So the tribune came up and said to him, “Tell me, are you a Roman?” And he
    said, “Yes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “commander.” The Greek χιλίαρχος refers to a Roman officer, traditionally
      rendered “tribune” or more generally “commander.”
    reason: lexical_alternative
  - marker: b
    text: “A Roman” here means a Roman citizen in the legal sense, as the surrounding
      context makes clear.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, indicating the commander moved toward
    Paul before speaking. 'Came up' is natural modern English and preserves the movement
    more idiomatically than a wooden 'having approached.'
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ marks narrative progression rather than strong contrast. 'So'
    gives a natural connective in English narrative; the second δέ is left untranslated
    explicitly and conveyed by English sentence flow.
- source_word: χιλίαρχος
  chosen: tribune
  alternatives:
  - commander
  - military commander
  - chiliarch
  lexicon: BDAG
  rationale: In Acts this term refers to the Roman military officer in command of
    a cohort. 'Tribune' is a standard, concise rendering for this Roman officer and
    fits the historical setting better than the overly generic 'commander.'
- source_word: εἶπεν αὐτῷ
  chosen: said to him
  alternatives:
  - told him
  - said
  lexicon: BDAG
  rationale: Straightforward speech introduction; 'said to him' preserves the indirect
    object αὐτῷ.
- source_word: Λέγε μοι
  chosen: Tell me
  alternatives:
  - Say to me
  - Tell me this
  lexicon: BDAG
  rationale: Imperative plus dative pronoun is idiomatically rendered 'Tell me' in
    English. This preserves the direct questioning force without awkward literalism.
- source_word: σὺ
  chosen: you
  alternatives:
  - you yourself
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English can reflect this
    adequately by normal word order in the direct question; an overly emphatic 'you
    yourself' would sound unnatural here.
- source_word: Ῥωμαῖος
  chosen: a Roman
  alternatives:
  - Roman citizen
  - Roman
  lexicon: BDAG
  rationale: The adjective functions substantivally. In context it refers to Roman
    citizenship status, but 'a Roman' is the natural and sufficiently precise English
    expression, with the citizenship implication supplied by context.
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  - Yes, I am
  lexicon: BDAG
  rationale: Simple affirmative response. 'Yes' is the most direct equivalent; expanding
    to 'Yes, I am' would add words not present in the Greek.
