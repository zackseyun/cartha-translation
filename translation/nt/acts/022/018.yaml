theological_decisions:
- issue: Referent of 'him' in Paul's vision report
  chosen_reading: The pronoun refers to the Lord/Jesus from the immediate context,
    but the verse itself leaves the pronoun as 'him' rather than replacing it with
    an interpretive title.
  alternative_readings:
  - Explicitly supplying 'the Lord' or 'Jesus' in the main text
  rationale: The context identifies the speaker, but the Greek text uses a pronoun.
    To avoid importing words not present in this verse while keeping the referent
    clear from context, the translation retains 'him.'
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve
    tension rather than resolve it
