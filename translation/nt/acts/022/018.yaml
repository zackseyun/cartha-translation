id: ACT.22.18
reference: Acts 22:18
source:
  edition: SBLGNT
  text: καὶ ἰδεῖν αὐτὸν λέγοντά μοι· Σπεῦσον καὶ ἔξελθε ἐν τάχει ἐξ Ἰερουσαλήμ, διότι
    οὐ παραδέξονταί ⸀σου μαρτυρίαν περὶ ἐμοῦ.
translation:
  text: and I saw him saying to me, ‘Hurry and get out of Jerusalem quickly, because
    they will not accept your testimony about me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receive your testimony about me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδεῖν
  chosen: I saw
  alternatives:
  - to see
  - I looked and saw
  lexicon: BDAG
  rationale: Although the infinitive is formally 'to see,' in this narrative construction
    following καὶ it functions idiomatically to continue Paul's report of the vision.
    Rendering it as finite 'I saw' gives natural English while preserving the sense
    of visionary perception.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers to the Lord seen in the vision from the preceding
    context. 'Him' is the straightforward English equivalent.
- source_word: λέγοντά μοι
  chosen: saying to me
  alternatives:
  - telling me
  lexicon: BDAG
  rationale: A participial construction modifying αὐτόν. 'Saying to me' preserves
    the verbal form and direct-speech introduction more closely than the slightly
    freer 'telling me.'
- source_word: Σπεῦσον
  chosen: Hurry
  alternatives:
  - Make haste
  - Be quick
  lexicon: BDAG
  rationale: Aorist imperative conveying urgency. 'Hurry' is idiomatic modern English
    and preserves the force without archaic diction.
- source_word: ἔξελθε
  chosen: get out
  alternatives:
  - go out
  - leave
  lexicon: BDAG
  rationale: Aorist imperative of ἐξέρχομαι. 'Get out' conveys the urgent command
    to depart more naturally in English than the more wooden 'go out.'
- source_word: ἐν τάχει
  chosen: quickly
  alternatives:
  - at once
  - with haste
  - soon
  lexicon: BDAG
  rationale: This adverbial phrase intensifies the urgency of departure. 'Quickly'
    is concise and natural. Combined with 'Hurry,' it reflects the emphatic double
    urgency in the Greek without sounding unnatural.
- source_word: ἐξ Ἰερουσαλήμ
  chosen: out of Jerusalem
  alternatives:
  - from Jerusalem
  lexicon: BDAG
  rationale: The preposition ἐξ emphasizes movement out from the city. 'Out of Jerusalem'
    preserves that directional force better than simply 'from Jerusalem.'
- source_word: διότι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the command. 'Because' is the clearest modern
    English connective.
- source_word: οὐ παραδέξονταί
  chosen: they will not accept
  alternatives:
  - they will not receive
  - they will not welcome
  lexicon: BDAG
  rationale: Future middle of παραδέχομαι here means to accept or receive favorably.
    'Accept' best fits the object 'testimony' in contemporary English.
- source_word: σου μαρτυρίαν
  chosen: your testimony
  alternatives:
  - your witness
  lexicon: BDAG
  rationale: μαρτυρία can mean testimony or witness. 'Testimony' fits the object of
    acceptance and the legal/proclamatory sense in context.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  lexicon: BDAG
  rationale: περί with genitive here indicates reference. 'About me' is natural modern
    English; 'concerning me' is more formal but not necessary.
