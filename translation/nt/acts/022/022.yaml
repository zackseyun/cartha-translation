id: ACT.22.22
reference: Acts 22:22
source:
  edition: SBLGNT
  text: Ἤκουον δὲ αὐτοῦ ἄχρι τούτου τοῦ λόγου καὶ ἐπῆραν τὴν φωνὴν αὐτῶν λέγοντες·
    Αἶρε ἀπὸ τῆς γῆς τὸν τοιοῦτον, οὐ γὰρ καθῆκεν αὐτὸν ζῆν.
translation:
  text: They were listening to him up to this statement, and they raised their voices,
    saying, “Take such a man away from the earth, for it was not fitting for him to
    live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Away with such a man from the earth.”
    reason: lexical_alternative
  - marker: b
    text: That is, they were demanding his death; alternatively, “for he ought not
      to live.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤκουον
  chosen: were listening
  alternatives:
  - listened
  - kept listening
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time; 'were listening'
    captures the durative sense better than simple 'listened.'
- source_word: ἄχρι τούτου τοῦ λόγου
  chosen: up to this statement
  alternatives:
  - until this word
  - up to this point in what he said
  lexicon: BDAG
  rationale: λόγος here refers to a spoken utterance or point in Paul's speech, not
    merely a single lexical 'word.' 'Statement' is natural English while preserving
    the sense that this specific point triggered the reaction.
- source_word: ἐπῆραν τὴν φωνὴν αὐτῶν
  chosen: they raised their voices
  alternatives:
  - they lifted up their voice
  - they shouted
  lexicon: BDAG
  rationale: This is an idiomatic expression for a loud outcry. 'Raised their voices'
    preserves the imagery and avoids over-paraphrasing, while 'shouted' is possible
    but less formally tied to the Greek idiom.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - crying out
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of their outcry. 'Saying' is the
    most direct and transparent rendering.
- source_word: Αἶρε
  chosen: Take ... away
  alternatives:
  - Away with
  - remove
  - take up
  lexicon: BDAG
  rationale: In this hostile imperative context, αἴρω means to remove. 'Take ... away'
    reflects the verb's force and works naturally with the following phrase 'from
    the earth.' The idiomatic English alternative 'Away with' is preserved in a footnote.
- source_word: ἀπὸ τῆς γῆς
  chosen: from the earth
  alternatives:
  - from the land
  - off the earth
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here the crowd's cry is a demand that
    Paul be removed from among the living, so 'from the earth' best conveys the universal,
    life-ending force of the expression.
- source_word: τὸν τοιοῦτον
  chosen: such a man
  alternatives:
  - such a fellow
  - this kind of man
  - such a one
  lexicon: BDAG
  rationale: The demonstrative-like adjective is contemptuous. 'Such a man' preserves
    the disdain without sounding archaic or colloquial.
- source_word: οὐ γὰρ καθῆκεν αὐτὸν ζῆν
  chosen: for it was not fitting for him to live
  alternatives:
  - for he ought not to live
  - for he should not be allowed to live
  lexicon: BDAG
  rationale: καθήκω denotes what is fitting, proper, or appropriate. 'It was not fitting
    for him to live' stays close to the Greek wording; the more idiomatic implication
    'he ought not to live' is preserved in a footnote because it captures the crowd's
    intended force.
