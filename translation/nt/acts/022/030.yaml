theological_decisions:
- issue: Rendering of Ἰουδαίων in Acts
  chosen_reading: by the Jews
  alternative_readings:
  - by the Jewish leaders
  - by the Judeans
  rationale: No doctrinally contested term from DOCTRINE.md is involved, but this
    term can be sensitive. The translation keeps the lexical form 'Jews' because the
    Greek says Ἰουδαίων and the immediate context identifies a specific accusing group.
    Narrower interpretive renderings are possible but would import contextual interpretation
    into the main text.
  doctrine_reference: Translation philosophy §1, §5
