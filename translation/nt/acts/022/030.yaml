id: ACT.22.30
reference: Acts 22:30
source:
  edition: SBLGNT
  text: Τῇ δὲ ἐπαύριον βουλόμενος γνῶναι τὸ ἀσφαλὲς τὸ τί κατηγορεῖται ⸀ὑπὸ τῶν Ἰουδαίων
    ἔλυσεν ⸀αὐτόν, καὶ ἐκέλευσεν ⸀συνελθεῖν τοὺς ἀρχιερεῖς καὶ ⸀πᾶν τὸ ⸀συνέδριον,
    καὶ καταγαγὼν τὸν Παῦλον ἔστησεν εἰς αὐτούς.
translation:
  text: But on the next day, wanting to know for certain what he was being accused
    of by the Jews, he released him and ordered the chief priests and the whole council
    to assemble; and bringing Paul down, he set him before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Jewish leaders' or 'by the Judeans.' The Greek reads 'by the
      Jews'; in context it refers to Paul's accusers, not to every Jewish person without
      distinction.
    reason: lexical_alternative
  - marker: b
    text: '''Council'' refers to the Sanhedrin, the Jewish ruling body in Jerusalem.'
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  chosen: But on the next day
  alternatives:
  - Now on the following day
  - And on the next day
  lexicon: BDAG
  rationale: Temporal dative idiom means 'on the next day.' δέ is lightly adversative/sequential;
    'But' preserves the narrative turn from the previous scene without overstating
    contrast.
- source_word: βουλόμενος
  chosen: wanting
  alternatives:
  - wishing
  - intending
  - desiring
  lexicon: BDAG
  rationale: The participle expresses the commander’s purpose or intent. 'Wanting'
    is natural modern English and fits the infinitive γνῶναι.
- source_word: γνῶναι τὸ ἀσφαλές
  chosen: to know for certain
  alternatives:
  - to learn the truth
  - to know the facts for sure
  lexicon: BDAG
  rationale: The idiom combines γινώσκω with the substantivized adjective ἀσφαλές,
    conveying certainty or reliable facts. 'To know for certain' is concise and accurate.
- source_word: τὸ τί κατηγορεῖται
  chosen: what he was being accused of
  alternatives:
  - the charge against him
  - why he was being accused
  lexicon: BDAG
  rationale: 'This construction specifies the content of the certainty sought. The
    passive κατηγορεῖται is best represented with an English passive: ''what he was
    being accused of.'''
- source_word: ὑπὸ τῶν Ἰουδαίων
  chosen: by the Jews
  alternatives:
  - by the Jewish leaders
  - by the Judeans
  lexicon: BDAG
  rationale: The Greek explicitly says 'by the Jews.' In Acts this often refers to
    the Jewish opposition in context, not every Jewish person universally. The more
    literal rendering is retained, with contextual sensitivity noted rather than narrowing
    the referent in translation.
- source_word: ἔλυσεν αὐτόν
  chosen: he released him
  alternatives:
  - he untied him
  - he unbound him
  lexicon: BDAG
  rationale: λύω can mean loose/unbind/release. In context of Paul being held under
    Roman custody and previously bound, 'released him' communicates the practical
    action in idiomatic English.
- source_word: ἐκέλευσεν συνελθεῖν
  chosen: ordered ... to assemble
  alternatives:
  - commanded ... to come together
  - gave orders ... to meet
  lexicon: BDAG
  rationale: κελεύω plus infinitive expresses authoritative command. 'Ordered ...
    to assemble' is clear and suitably formal for the official setting.
- source_word: τοὺς ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural title referring to the leading priestly
    authorities, not multiple incumbent high priests in a strict modern sense.
- source_word: πᾶν τὸ συνέδριον
  chosen: the whole council
  alternatives:
  - the whole Sanhedrin
  - the entire council
  lexicon: BDAG
  rationale: συνέδριον denotes the Jewish ruling council. 'Council' translates the
    term rather than transliterating, in keeping with readability; 'whole' reflects
    πᾶν.
- source_word: καταγαγὼν τὸν Παῦλον
  chosen: bringing Paul down
  alternatives:
  - having brought Paul down
  - escorting Paul down
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/antecedent to the main verb.
    'Bringing Paul down' preserves the narrative movement, likely from the barracks/fortress
    area to the meeting place.
- source_word: ἔστησεν εἰς αὐτούς
  chosen: he set him before them
  alternatives:
  - he stood him among them
  - he placed him before them
  lexicon: BDAG
  rationale: ἵστημι with εἰς here has the sense of causing someone to stand in the
    presence of others. 'Set him before them' is idiomatic and reflects the official
    presentation.
