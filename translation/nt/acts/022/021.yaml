theological_decisions:
- issue: Rendering of ἔθνη in apostolic mission context
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: The verse concerns Paul's commission to non-Jews, a major theme in Acts.
    Rendering ἔθνη as 'Gentiles' preserves that theological-historical distinction
    without importing extra doctrine. 'Nations' is lexically possible and preserved
    in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it where ambiguity is genuine'
