id: ACT.22.21
reference: Acts 22:21
source:
  edition: SBLGNT
  text: καὶ εἶπεν πρός με· Πορεύου, ὅτι ἐγὼ εἰς ἔθνη μακρὰν ἐξαποστελῶ σε.
translation:
  text: And he said to me, ‘Go, because I will send you far away to the Gentiles.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the nations.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν πρός με
  chosen: he said to me
  alternatives:
  - he told me
  lexicon: BDAG
  rationale: λέγω with πρός + accusative commonly introduces direct speech addressed
    to someone. 'Said to me' is the most straightforward English rendering and preserves
    the narrative style.
- source_word: Πορεύου
  chosen: Go
  alternatives:
  - Be on your way
  - Depart
  lexicon: BDAG
  rationale: Present middle imperative of πορεύομαι functions idiomatically as a command
    to go or depart. 'Go' is natural modern English and sufficiently captures the
    force without overtranslating.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the reason for the command: Paul is to go because
    the speaker will send him elsewhere. ''Because'' makes the causal sense explicit
    in clear English.'
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek. English normally includes
    the subject pronoun anyway; the emphasis is adequately conveyed by the clause
    structure without typographical stress.
- source_word: εἰς ἔθνη
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Acts, ἔθνη in this missionary context refers specifically to non-Jews
    rather than nations in a geopolitical sense. 'Gentiles' best communicates the
    established Jewish-Gentile distinction in context, while 'nations' is preserved
    as an alternative.
- source_word: μακρὰν
  chosen: far away
  alternatives:
  - far
  - to distant places
  lexicon: BDAG
  rationale: μακράν modifies the sending and emphasizes distance. 'Far away' is idiomatic
    and preserves the sense of geographical remoteness.
- source_word: ἐξαποστελῶ
  chosen: I will send
  alternatives:
  - I will send out
  - I will commission and send
  lexicon: BDAG
  rationale: The future of ἐξαποστέλλω means to send out or send forth. In English,
    'I will send' is the cleanest rendering here; the outward/commissioning nuance
    is present in context but need not be made overly explicit in the main text.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object of the sending verb; standard second-person singular object
    in English.
