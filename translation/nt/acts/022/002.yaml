id: ACT.22.2
reference: Acts 22:2
source:
  edition: SBLGNT
  text: Ἀκούσαντες δὲ ὅτι τῇ Ἑβραΐδι διαλέκτῳ προσεφώνει αὐτοῖς μᾶλλον παρέσχον ἡσυχίαν.
    καὶ φησίν·
translation:
  text: 'But when they heard that he was addressing them in the Hebrew language, they
    became even more quiet. And he said:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'in Aramaic'; the Greek says 'in the Hebrew language,' which
      in this context may refer to the local Semitic speech of Judea.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀκούσαντες
  chosen: when they heard
  alternatives:
  - after hearing
  - hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance for the main verb; 'when
    they heard' is natural English and preserves the temporal force without awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild development/contrast with the previous scene. 'But' fits
    the narrative turn as the crowd's reaction changes.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  chosen: in the Hebrew language
  alternatives:
  - in the Hebrew dialect
  - in Aramaic
  lexicon: BDAG
  rationale: The Greek expression literally refers to the 'Hebrew dialect/language.'
    In Acts this likely denotes the local Semitic speech, often understood as Aramaic,
    but the text itself says 'Hebrew.' Following original-language primacy, the main
    text preserves 'Hebrew,' while the likely referential nuance is noted in a footnote.
- source_word: προσεφώνει
  chosen: was addressing
  alternatives:
  - was speaking to
  - was calling out to
  lexicon: BDAG
  rationale: Imperfect verb indicating ongoing speech directed toward the crowd. 'Was
    addressing' captures formal directed speech in context better than the more wooden
    'was speaking to'.
- source_word: αὐτοῖς
  chosen: them
  alternatives:
  - to them
  lexicon: BDAG
  rationale: English incorporates the dative object naturally as 'them' after 'addressing.'
- source_word: μᾶλλον
  chosen: even more
  alternatives:
  - more
  - all the more
  lexicon: BDAG
  rationale: Comparative adverb intensifying the crowd's quietness. 'Even more' is
    idiomatic and preserves the escalation.
- source_word: παρέσχον ἡσυχίαν
  chosen: they became even more quiet
  alternatives:
  - they kept greater silence
  - they became more silent
  - they gave more quietness
  lexicon: BDAG
  rationale: The idiom literally means 'they provided silence.' In English, 'they
    became even more quiet' communicates the sense naturally while preserving the
    comparative force. 'Kept greater silence' is more formal but less natural for
    modern readers.
- source_word: καὶ φησίν
  chosen: 'And he said:'
  alternatives:
  - 'and he says:'
  lexicon: BDAG
  rationale: Historical present φησίν is commonly rendered with past tense in English
    narrative for readability. The colon signals the start of Paul's speech.
