theological_decisions:
- issue: Referent of 'the Hebrew language'
  chosen_reading: Retain 'Hebrew' in the main text
  alternative_readings:
  - Understand the phrase as referring to Aramaic, the local Semitic vernacular
  rationale: This is primarily a linguistic/historical question rather than a doctrinal
    one. Because the Greek explicitly says 'Hebrew,' the translation preserves that
    wording in the main text in keeping with original-language primacy, while noting
    the common scholarly understanding that this may refer to Aramaic.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
