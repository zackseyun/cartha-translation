theological_decisions:
- issue: Reference of αὐτῷ in Paul's commission
  chosen_reading: The pronoun refers to the Lord/Jesus as the one for whom Paul will
    bear witness.
  alternative_readings:
  - The pronoun could be rendered more neutrally as 'to him' without specifying whether
    the sense is dative of reference or advantage.
  rationale: In the immediate context of Acts 22, Ananias is recounting the commission
    Paul received from the risen Jesus. Rendering αὐτῷ as 'for him' preserves that
    Paul is commissioned to testify on Jesus' behalf before others, without importing
    additional doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
