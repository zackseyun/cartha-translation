id: ACT.22.15
reference: Acts 22:15
source:
  edition: SBLGNT
  text: ὅτι ἔσῃ μάρτυς αὐτῷ πρὸς πάντας ἀνθρώπους ὧν ἑώρακας καὶ ἤκουσας.
translation:
  text: For you will be a witness for him to all people of what you have seen and
    heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all men.' The Greek uses a masculine plural form generically for
      human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'to him' instead of 'for him.' The Greek dative can be understood in
      more than one closely related way here.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: In this commissioning context, ὅτι introduces the content/explanation
    of why Paul is to act; 'for' gives natural English while preserving the explanatory
    force better than a bare 'that.'
- source_word: ἔσῃ
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: BDAG
  rationale: Future middle of εἰμί is best rendered as a simple future in English.
    'Will' is modern and readable without the archaic tone of 'shall.'
- source_word: μάρτυς
  chosen: a witness
  alternatives:
  - witness
  lexicon: BDAG
  rationale: μάρτυς denotes one who bears testimony. 'A witness' is the standard and
    contextually precise rendering; the article is supplied idiomatically in English.
- source_word: αὐτῷ
  chosen: for him
  alternatives:
  - to him
  - his
  lexicon: BDAG
  rationale: The dative with μάρτυς here indicates the one on whose behalf or concerning
    whom testimony is borne. 'For him' communicates representative testimony more
    naturally than 'to him,' which could suggest Paul is testifying directly to God/Jesus
    rather than about him before others.
- source_word: πρὸς πάντας ἀνθρώπους
  chosen: to all people
  alternatives:
  - to all men
  - before all people
  - to all humanity
  lexicon: BDAG
  rationale: πρός with the accusative here marks direction toward the audience of
    the witness. ἄνθρωποι is generic, so 'people' is gender-accurate to the source's
    representative sense and avoids misleadingly male-specific 'men.'
- source_word: ὧν
  chosen: of what
  alternatives:
  - about the things that
  - concerning what
  lexicon: BDAG
  rationale: The genitive relative pronoun refers to the content of testimony, linked
    to the verbs 'have seen and heard.' 'Of what' is concise and idiomatic in English
    after 'witness.'
- source_word: ἑώρακας
  chosen: you have seen
  alternatives:
  - you saw
  lexicon: BDAG
  rationale: The perfect form carries resultant force from prior experience; 'have
    seen' preserves that aspect better than the simple past.
- source_word: καὶ ἤκουσας
  chosen: and heard
  alternatives:
  - and have heard
  lexicon: BDAG
  rationale: Although ἤκουσας is aorist, English commonly coordinates it with the
    preceding perfect as 'have seen and heard.' The shorter 'and heard' avoids awkwardness
    while still conveying the paired experiential basis of testimony.
