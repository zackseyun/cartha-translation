id: ACT.22.7
reference: Acts 22:7
source:
  edition: SBLGNT
  text: ἔπεσά τε εἰς τὸ ἔδαφος καὶ ἤκουσα φωνῆς λεγούσης μοι· Σαοὺλ Σαούλ, τί με διώκεις;
translation:
  text: I fell to the ground and heard a voice saying to me, ‘Saul, Saul, why are
    you persecuting me?’
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔπεσά
  chosen: I fell
  alternatives:
  - I fell down
  lexicon: BDAG
  rationale: Aorist active indicative, first person singular of πίπτω, straightforwardly
    rendered as a simple past. 'I fell' is natural English; 'down' is implicit and
    unnecessary because the destination phrase follows.
- source_word: τε
  chosen: '[not separately translated]'
  alternatives:
  - and
  - then
  lexicon: BDAG
  rationale: The enclitic τε links this clause with what precedes, but in English
    its connective force is adequately conveyed by the overall sentence flow and the
    following 'and.' Rendering it separately would sound wooden.
- source_word: εἰς τὸ ἔδαφος
  chosen: to the ground
  alternatives:
  - onto the ground
  - to the earth
  lexicon: BDAG
  rationale: Idiomatic English for falling εἰς τὸ ἔδαφος is 'to the ground.' 'Earth'
    is possible lexically for ἔδαφος but less natural here.
- source_word: ἤκουσα
  chosen: heard
  alternatives:
  - I heard
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω, rendered as simple past. Subject is
    explicit in English sentence.
- source_word: φωνῆς
  chosen: a voice
  alternatives:
  - the sound of a voice
  - a sound
  lexicon: BDAG
  rationale: The genitive after ἀκούω is standard and is best rendered naturally as
    the direct object in English. 'A voice' fits the immediate context of speech that
    follows.
- source_word: λεγούσης μοι
  chosen: saying to me
  alternatives:
  - speaking to me
  - saying
  lexicon: BDAG
  rationale: Present participle modifying φωνῆς, expressing contemporaneous action.
    'Saying to me' preserves both the verbal content and the dative μοι.
- source_word: Σαοὺλ Σαούλ
  chosen: Saul, Saul
  rationale: Personal name is transliterated per project philosophy. Repetition is
    preserved for emphasis and direct address.
- source_word: τί
  chosen: why
  alternatives:
  - for what reason
  lexicon: BDAG
  rationale: In this idiom τί with a verb of action is naturally rendered 'why,' asking
    the reason for the action rather than 'what' in English.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to the speaker, preserved plainly.
- source_word: διώκεις
  chosen: are you persecuting
  alternatives:
  - do you persecute
  - are you pursuing
  lexicon: BDAG
  rationale: Present active indicative, second person singular of διώκω. In this context
    of hostility toward Jesus and his people, 'persecute' is the established and contextually
    precise sense. The English progressive reflects the ongoing force of the present
    tense in direct speech.
