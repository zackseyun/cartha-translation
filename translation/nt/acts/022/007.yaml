theological_decisions:
- issue: Identification of the speaker's relation to Saul's actions against believers
  chosen_reading: Retain the direct first-person 'me' without explanatory expansion.
  alternative_readings:
  - Paraphrastic expansions such as 'my people' or 'my followers'
  rationale: The verse's theological force depends on the speaker identifying Saul's
    persecution of believers as persecution of himself. The translation should preserve
    that claim exactly as stated without interpretive unpacking.
  doctrine_reference: Preserve theological tension rather than resolve it.
