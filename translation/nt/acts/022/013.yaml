id: ACT.22.13
reference: Acts 22:13
source:
  edition: SBLGNT
  text: ἐλθὼν πρὸς ⸀ἐμὲ καὶ ἐπιστὰς εἶπέν μοι· Σαοὺλ ἀδελφέ, ἀνάβλεψον· κἀγὼ αὐτῇ
    τῇ ὥρᾳ ἀνέβλεψα εἰς αὐτόν.
translation:
  text: He came to me, and standing by me said, ‘Brother Saul, receive your sight.’
    And in that very hour I received my sight and looked at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'see again' / 'regain your sight' for both occurrences of ἀναβλέπω; the
      verb can also mean 'look up,' but here the blindness-and-healing context favors
      restoration of sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν πρὸς ἐμέ
  chosen: He came to me
  alternatives:
  - having come to me
  - coming to me
  lexicon: BDAG
  rationale: A natural English rendering of the aorist participle plus πρός with accusative.
    'He came to me' preserves the movement toward Paul without awkward participial
    overload in English narrative style.
- source_word: ἐπιστάς
  chosen: standing by me
  alternatives:
  - standing near
  - coming up and standing by
  lexicon: BDAG
  rationale: In context the participle conveys taking a position beside Paul. 'Standing
    by me' captures the spatial sense and fits the following speech naturally.
- source_word: Σαοὺλ
  chosen: Saul
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: ἀδελφέ
  chosen: Brother
  alternatives:
  - brother
  lexicon: BDAG
  rationale: Vocative address indicating kinship/fellowship. Capitalized here because
    it begins direct speech, not to signal a title beyond the Greek.
- source_word: ἀνάβλεψον
  chosen: receive your sight
  alternatives:
  - look up
  - see again
  - regain your sight
  lexicon: BDAG
  rationale: ἀναβλέπω can mean 'look up' or, in healing/blindness contexts, 'recover
    sight.' Because the immediate context concerns Paul's blindness and the next clause
    reports restored vision, 'receive your sight' best conveys the idiomatic sense
    in clear English.
- source_word: αὐτῇ τῇ ὥρᾳ
  chosen: in that very hour
  alternatives:
  - at that very hour
  - immediately
  lexicon: BDAG
  rationale: This idiom marks the precise time of the event. 'In that very hour' preserves
    the temporal emphasis without flattening it to the looser 'immediately.'
- source_word: ἀνέβλεψα
  chosen: I received my sight
  alternatives:
  - I saw again
  - I regained my sight
  - I looked up
  lexicon: BDAG
  rationale: For consistency with ἀνάβλεψον in the same healing context, the verb
    is rendered as restoration of sight rather than merely upward gaze.
- source_word: εἰς αὐτόν
  chosen: looked at him
  alternatives:
  - saw him
  - looked up at him
  lexicon: BDAG
  rationale: After sight is restored, εἰς αὐτόν naturally indicates directing vision
    toward Ananias. 'Looked at him' preserves the directional force better than simply
    'saw him.'
- source_word: κἀγώ
  chosen: And I
  alternatives:
  - and I also
  - and I myself
  lexicon: BDAG
  rationale: The crasis joins καί and ἐγώ. In English, simple 'And I' is sufficient
    unless stronger emphasis is contextually required.
