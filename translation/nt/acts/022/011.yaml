theological_decisions:
- issue: Rendering δόξα in a theophanic context
  chosen_reading: brightness
  alternative_readings:
  - glory
  - splendor
  rationale: Although δόξα often carries theological weight as 'glory,' in this sentence
    it functions as the visible radiance of the light that caused temporary blindness.
    Translating 'brightness' avoids importing a more abstract doctrinal emphasis than
    the immediate context requires, while a footnote preserves the more literal 'glory.'
  doctrine_reference: Translation philosophy §§1, 3, 6
