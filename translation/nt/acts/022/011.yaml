id: ACT.22.11
reference: Acts 22:11
source:
  edition: SBLGNT
  text: ὡς δὲ οὐκ ἐνέβλεπον ἀπὸ τῆς δόξης τοῦ φωτὸς ἐκείνου, χειραγωγούμενος ὑπὸ τῶν
    συνόντων μοι ἦλθον εἰς Δαμασκόν.
translation:
  text: And since I could not see because of the brightness of that light, I came
    into Damascus being led by the hand by those who were with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'because of the glory of that light.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέβλεπον
  chosen: could not see
  alternatives:
  - could not look
  - could not see clearly
  lexicon: BDAG
  rationale: The imperfect of ἐμβλέπω can mean 'look at' or 'see.' In this context,
    following the blinding heavenly light, the sense is inability to see rather than
    merely inability to gaze. 'Could not see' communicates the practical result in
    natural English.
- source_word: ἀπὸ τῆς δόξης τοῦ φωτὸς ἐκείνου
  chosen: because of the brightness of that light
  alternatives:
  - from the glory of that light
  - because of the splendor of that light
  lexicon: BDAG
  rationale: δόξα literally means 'glory,' but here in connection with a visible light
    causing blindness it denotes radiant splendor/brightness. Rendering it as 'brightness'
    best conveys the immediate physical cause while preserving the extraordinary character
    of the light. 'That light' retains ἐκείνου.
- source_word: χειραγωγούμενος
  chosen: being led by the hand
  alternatives:
  - being hand-led
  - being guided by the hand
  lexicon: BDAG
  rationale: The participle explicitly includes the notion of hand-guidance. 'Being
    led by the hand' is idiomatic English and preserves the vivid detail better than
    the more generic 'being led.'
- source_word: ὑπὸ τῶν συνόντων μοι
  chosen: by those who were with me
  alternatives:
  - by my companions
  - by those accompanying me
  lexicon: BDAG
  rationale: The present participle of σύνειμι means 'be with, accompany.' 'Those
    who were with me' is a transparent rendering that preserves the relational wording
    of the Greek without overinterpreting the group as formal 'companions.'
- source_word: ἦλθον εἰς Δαμασκόν
  chosen: I came into Damascus
  alternatives:
  - I came to Damascus
  - I arrived in Damascus
  lexicon: BDAG
  rationale: ἔρχομαι with εἰς is literally movement 'into' a place. 'Came into Damascus'
    preserves that directional nuance, though 'came to Damascus' would also be acceptable
    idiomatic English.
- source_word: ὡς δὲ
  chosen: And since
  alternatives:
  - But when
  - And when
  lexicon: BDAG
  rationale: 'Here ὡς introduces the circumstance explaining what followed, and δέ
    continues the narrative. ''And since'' captures the causal force in context: because
    he could not see, he had to be led.'
