theological_decisions:
- issue: Rendering ἀδελφοί in a context where the referent may be a broader community
  chosen_reading: to the brothers
  alternative_readings:
  - to the brothers and sisters
  - to the fellow Jews
  rationale: Following the gender-accurate policy, the masculine plural is retained
    as 'brothers' rather than neutralizing it. Because modern readers may infer a
    mixed group, the broader possibility is preserved in a footnote rather than imported
    into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
