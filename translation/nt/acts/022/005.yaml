id: ACT.22.5
reference: Acts 22:5
source:
  edition: SBLGNT
  text: ὡς καὶ ὁ ἀρχιερεὺς μαρτυρεῖ μοι καὶ πᾶν τὸ πρεσβυτέριον· παρ’ ὧν καὶ ἐπιστολὰς
    δεξάμενος πρὸς τοὺς ἀδελφοὺς εἰς Δαμασκὸν ἐπορευόμην ἄξων καὶ τοὺς ἐκεῖσε ὄντας
    δεδεμένους εἰς Ἰερουσαλὴμ ἵνα τιμωρηθῶσιν.
translation:
  text: as also the high priest and the whole council of elders can testify for me.
    From them I also received letters to the brothers in Damascus, and I was traveling
    there to bring even those who were there, bound, to Jerusalem so that they might
    be punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the brothers and sisters.' The Greek says 'brothers,' but in some
      contexts it can refer to a wider community.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς καὶ
  chosen: as also
  alternatives:
  - just as also
  - as even
  lexicon: BDAG
  rationale: Introduces corroboration of Paul's claim. 'As also' preserves the comparative-confirmatory
    force without sounding overly wooden.
- source_word: ἀρχιερεύς
  chosen: the high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard singular title for the leading priestly authority; 'high priest'
    is the natural English equivalent in this historical setting.
- source_word: μαρτυρεῖ μοι
  chosen: can testify for me
  alternatives:
  - bears witness to me
  - testifies to me
  lexicon: BDAG
  rationale: Present tense in context expresses ongoing attestable testimony. 'Can
    testify for me' communicates available corroboration in idiomatic English; 'for
    me' reflects dative μοι in context of supporting Paul's statement.
- source_word: πᾶν τὸ πρεσβυτέριον
  chosen: the whole council of elders
  alternatives:
  - all the council of elders
  - the whole body of elders
  - the presbytery
  lexicon: BDAG
  rationale: πρεσβυτέριον denotes the body/council of elders rather than merely older
    men. 'Council of elders' is clear modern English and avoids unexplained ecclesiastical
    jargon like 'presbytery'.
- source_word: παρ’ ὧν
  chosen: From them
  alternatives:
  - from whom
  lexicon: BDAG
  rationale: Refers back to the high priest and council collectively. 'From them'
    is smoother English while preserving source sense.
- source_word: ἐπιστολάς
  chosen: letters
  alternatives:
  - written authorizations
  - letters of authorization
  lexicon: BDAG
  rationale: The basic lexical sense is 'letters.' The official nature is inferable
    from context and need not be overtranslated into the main text.
- source_word: πρὸς τοὺς ἀδελφοὺς
  chosen: to the brothers
  alternatives:
  - to the brothers and sisters
  - to the fellow Jews
  lexicon: BDAG
  rationale: Gender-accurate policy favors 'brothers' where the Greek is masculine
    plural and reflects group identity. Here it likely refers to fellow Jews / synagogue
    associates in Damascus, but the text says 'brothers,' so that is retained.
- source_word: ἐπορευόμην
  chosen: I was traveling there
  alternatives:
  - I was going
  - I journeyed
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing past movement. 'I was traveling there'
    reads naturally and fits the narrative progression toward Damascus.
- source_word: ἄξων
  chosen: to bring
  alternatives:
  - bringing
  - to lead away
  lexicon: BDAG
  rationale: Future participle commonly expresses purpose with a verb of motion. 'To
    bring' captures the intended action in idiomatic English.
- source_word: τοὺς ἐκεῖσε ὄντας
  chosen: those who were there
  alternatives:
  - those there
  - the ones who were there
  lexicon: BDAG
  rationale: A straightforward rendering of the substantival participial phrase referring
    to persons located in Damascus.
- source_word: δεδεμένους
  chosen: bound
  alternatives:
  - tied up
  - in chains
  lexicon: BDAG
  rationale: Perfect passive participle emphasizes their state as prisoners. 'Bound'
    is concise and faithful; 'in chains' would be more specific than the Greek requires.
- source_word: ἵνα τιμωρηθῶσιν
  chosen: so that they might be punished
  alternatives:
  - so that they might be brought to punishment
  - so that they might be punished judicially
  lexicon: BDAG
  rationale: τιμωρέω here denotes punitive treatment. 'Punished' is the clearest natural
    equivalent and preserves the hostile legal intent without specifying a penalty
    not named in the text.
