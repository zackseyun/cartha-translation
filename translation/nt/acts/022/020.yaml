theological_decisions:
- issue: Rendering μάρτυς in reference to Stephen
  chosen_reading: witness
  alternative_readings:
  - martyr
  rationale: The verse's Greek uses the ordinary lexical sense 'witness,' even though
    Stephen is traditionally called the first Christian martyr. To avoid importing
    later ecclesiastical terminology into the main text, 'witness' is used, while
    'martyr' is preserved in a footnote because the context of his death naturally
    supports that traditional understanding.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
