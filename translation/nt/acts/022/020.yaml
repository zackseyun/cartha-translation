id: ACT.22.20
reference: Acts 22:20
source:
  edition: SBLGNT
  text: καὶ ὅτε ⸀ἐξεχύννετο τὸ αἷμα Στεφάνου τοῦ μάρτυρός σου, καὶ αὐτὸς ἤμην ἐφεστὼς
    καὶ συνευδοκῶν ⸀καὶ φυλάσσων τὰ ἱμάτια τῶν ἀναιρούντων αὐτόν.
translation:
  text: And when the blood of Stephen your witness was being poured out, I myself
    was standing by and approving, and guarding the cloaks of those who were killing
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''martyr'': the Greek word can denote a witness, and in Christian usage
      came to be associated especially with one who dies for that witness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεχύννετο
  chosen: was being poured out
  alternatives:
  - was shed
  lexicon: BDAG
  rationale: Imperfect passive of ἐκχέω is rendered with an ongoing passive sense.
    'Poured out' preserves the vivid metaphor of blood being spilled more closely
    than the traditional 'shed,' while remaining natural English.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Direct, standard rendering; no contextual reason to paraphrase.
- source_word: μάρτυρός
  chosen: witness
  alternatives:
  - martyr
  lexicon: BDAG
  rationale: Although English 'martyr' is historically associated with Stephen, the
    lexical sense of μάρτυς is 'witness.' Since the translation philosophy prioritizes
    source-language primacy over tradition, 'witness' is preferred in the main text,
    with 'martyr' preserved in a footnote because the context of violent death makes
    that association salient.
- source_word: ἐφεστὼς
  chosen: standing by
  alternatives:
  - standing there
  - present
  lexicon: BDAG
  rationale: The participle from ἐφίστημι here conveys being present/standing near.
    'Standing by' is idiomatic and fits the scene without overinterpreting Paul's
    role.
- source_word: συνευδοκῶν
  chosen: approving
  alternatives:
  - consenting
  - agreeing
  lexicon: BDAG
  rationale: The participle indicates active approval or consent. 'Approving' is clear
    modern English and slightly stronger than mere agreement.
- source_word: φυλάσσων
  chosen: guarding
  alternatives:
  - watching over
  - keeping
  lexicon: BDAG
  rationale: φυλάσσω commonly means guard/keep/watch. 'Guarding' best fits the concrete
    action regarding the garments.
- source_word: ἱμάτια
  chosen: cloaks
  alternatives:
  - garments
  - robes
  - clothes
  lexicon: BDAG
  rationale: ἱμάτια refers to outer garments. 'Cloaks' is more specific and vivid
    than generic 'clothes,' matching the likely outer garments laid aside during the
    stoning.
- source_word: ἀναιρούντων
  chosen: killing
  alternatives:
  - putting to death
  - murdering
  lexicon: BDAG
  rationale: ἀναιρέω in this context means to kill/put to death. 'Killing' is the
    most natural modern rendering; 'murdering' adds a moral evaluation not explicit
    in the lexical item, and 'putting to death' is more formal than needed.
- source_word: αὐτὸς
  chosen: I myself
  alternatives:
  - I too
  - I personally
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'I myself' preserves the emphasis in natural
    English.
