id: ACT.22.28
reference: Acts 22:28
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸀δὲ ὁ χιλίαρχος· Ἐγὼ πολλοῦ κεφαλαίου τὴν πολιτείαν ταύτην ἐκτησάμην.
    ὁ δὲ Παῦλος ἔφη· Ἐγὼ δὲ καὶ γεγέννημαι.
translation:
  text: But the tribune answered, “I acquired this citizenship for a large sum.” But
    Paul said, “But I was even born with it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I acquired this citizenship with a large amount of money.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “But I have even been born,” with citizenship understood from
      the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: χιλίαρχος
  chosen: tribune
  alternatives:
  - commander
  - military commander
  lexicon: BDAG
  rationale: Refers to a Roman military officer commanding roughly a thousand soldiers;
    'tribune' is the most historically precise concise English term, though 'commander'
    is more general.
- source_word: πολλοῦ κεφαλαίου
  chosen: for a large sum
  alternatives:
  - with much money
  - for a great amount of money
  lexicon: BDAG
  rationale: The genitive phrase is idiomatic for a large monetary payment. 'For a
    large sum' is natural modern English and preserves the sense of costly purchase.
- source_word: πολιτείαν
  chosen: citizenship
  alternatives:
  - civic status
  - citizen rights
  lexicon: BDAG
  rationale: In this context the word denotes Roman citizenship status, not merely
    political life or conduct. 'Citizenship' best matches the legal sense in context.
- source_word: ἐκτησάμην
  chosen: I acquired
  alternatives:
  - I obtained
  - I purchased
  lexicon: BDAG
  rationale: The middle verb means to acquire or obtain for oneself. 'I acquired'
    is broad enough to fit the Greek while the cost is already expressed by the preceding
    phrase; 'purchased' would slightly over-specify the means.
- source_word: καὶ γεγέννημαι
  chosen: I was even born with it
  alternatives:
  - I was actually born a citizen
  - I was born into it
  lexicon: BDAG
  rationale: The perfect passive of γεννάω here means 'have been born,' with the implied
    sense of possessing citizenship by birth. 'Even' reflects καί in emphatic contrast
    to the tribune's purchased status, and 'with it' makes explicit the implied object
    in idiomatic English.
- source_word: δέ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Used here as a mild adversative/continuative marker in dialogue. 'But'
    best conveys the contrast between the tribune's statement and Paul's reply in
    readable English.
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - answered
  lexicon: BDAG
  rationale: A common speech verb. 'Said' is the most natural English rendering here
    without adding rhetorical force.
