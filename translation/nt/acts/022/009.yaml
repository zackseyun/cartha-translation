id: ACT.22.9
reference: Acts 22:9
source:
  edition: SBLGNT
  text: οἱ δὲ σὺν ἐμοὶ ὄντες τὸ μὲν φῶς ⸀ἐθεάσαντο τὴν δὲ φωνὴν οὐκ ἤκουσαν τοῦ λαλοῦντός
    μοι.
translation:
  text: Now those who were with me saw the light, but they did not hear the voice
    of the one speaking to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not understand the voice.' Compare Acts 9:7, where Paul's companions
      are said to hear the sound/voice; the difference may be between hearing a sound
      and understanding the speaker.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ σὺν ἐμοὶ ὄντες
  chosen: those who were with me
  alternatives:
  - the men who were with me
  - those accompanying me
  lexicon: BDAG
  rationale: Renders the articular participial construction naturally in English.
    'Those who were with me' is faithful and avoids adding 'men,' which is not explicit
    here though supplied in some English traditions from the parallel account.
- source_word: τὸ μὲν φῶς
  chosen: the light
  alternatives:
  - the bright light
  lexicon: BDAG
  rationale: φῶς straightforwardly means 'light.' The μέν sets up the contrast with
    δέ, reflected by 'saw the light, but...'. 'Bright' is contextually inferable from
    the larger narrative but not stated in this verse.
- source_word: ἐθεάσαντο
  chosen: saw
  alternatives:
  - looked at
  - beheld
  lexicon: BDAG
  rationale: θεάομαι can mean 'see, behold, observe.' 'Saw' is the most natural modern
    English rendering here; 'beheld' is too elevated, and 'looked at' may imply intentionality
    not required by the context.
- source_word: τὴν δὲ φωνὴν
  chosen: the voice
  alternatives:
  - the sound
  lexicon: BDAG
  rationale: φωνή can denote either 'voice' or 'sound.' Here 'voice' is preferred
    because the genitive participle 'of the one speaking to me' specifies a personal
    speaker, not merely a noise. This also preserves the narrative distinction with
    Acts 9:7 without forcing a contradiction; the semantic range of ἀκούω/φωνή allows
    hearing a sound without understanding the articulated voice.
- source_word: οὐκ ἤκουσαν
  chosen: did not hear
  alternatives:
  - did not understand
  - did not hear distinctly
  lexicon: BDAG
  rationale: ἀκούω normally means 'hear,' though in some contexts it can shade toward
    'understand.' The main text keeps the direct lexical sense. Because of the apparent
    tension with Acts 9:7, the interpretive alternative is preserved in a footnote
    rather than imported into the translation.
- source_word: τοῦ λαλοῦντός μοι
  chosen: of the one speaking to me
  alternatives:
  - of him who was speaking to me
  - of the one who spoke to me
  lexicon: BDAG
  rationale: The present participle λαλοῦντος is best represented as ongoing action,
    'speaking.' 'The one speaking to me' is clear modern English and preserves the
    genitival relation to 'voice'.
