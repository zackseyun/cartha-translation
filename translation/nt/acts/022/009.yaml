theological_decisions:
- issue: Apparent tension with Acts 9:7 regarding whether Paul's companions heard
    the voice
  chosen_reading: Translate the verse as 'they did not hear the voice of the one speaking
    to me' and preserve the harmonizing alternative in a footnote.
  alternative_readings:
  - they did not understand the voice
  - they did not hear the message/words
  rationale: The Greek here most naturally reads 'they did not hear the voice,' especially
    with φωνή qualified by 'of the one speaking to me.' However, because ἀκούω and
    φωνή can be used with nuance, and because Acts 9:7 says the companions heard the
    sound/voice, the translation preserves the surface wording here while noting that
    the sense may be that they heard a sound but did not comprehend the speaker. This
    preserves textual and theological tension rather than resolving it in the main
    text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
