theological_decisions:
- issue: Referent of 'foods' and the contrast with 'grace'
  chosen_reading: The verse contrasts divine grace with reliance on dietary practices
    or food-related observances as a means of inner establishment.
  alternative_readings:
  - The verse refers more narrowly to sacrificial meals
  - The verse refers broadly to Jewish ceremonial food laws
  rationale: The noun βρώμασιν is translated literally as 'foods' to avoid importing
    a narrower or broader system than the text states. The context in Hebrews makes
    cultic associations plausible, but the main text should not resolve beyond the
    wording given.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Metaphorical force of 'heart'
  chosen_reading: '''Heart'' is retained as the center of the inner person rather
    than paraphrased as ''mind'' or ''inner life.'''
  alternative_readings:
  - mind
  - inner being
  rationale: The Greek καρδία carries theological and anthropological weight. Retaining
    'heart' preserves biblical idiom and avoids interpretive flattening.
  doctrine_reference: Translation philosophy items 1 and 6
