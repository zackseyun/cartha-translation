id: HEB.13.9
reference: Hebrews 13:9
source:
  edition: SBLGNT
  text: διδαχαῖς ποικίλαις καὶ ξέναις μὴ παραφέρεσθε· καλὸν γὰρ χάριτι βεβαιοῦσθαι
    τὴν καρδίαν, οὐ βρώμασιν, ἐν οἷς οὐκ ὠφελήθησαν οἱ ⸀περιπατοῦντες.
translation:
  text: Do not be carried away by various and strange teachings, for it is good for
    the heart to be strengthened by grace, not by foods, by which those who walked
    in them were not benefited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'established by grace.' The Greek verb can mean 'to strengthen,' 'to
      establish,' or 'to make firm.'
    reason: lexical_alternative
  - marker: b
    text: '''Foods'' likely refers to dietary practices or food-related observances;
      the Greek says simply ''foods.'''
    reason: cultural_note
  - marker: c
    text: Or 'those who lived by them' or 'those who occupied themselves with them.'
      The Greek literally says 'those walking in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διδαχαῖς
  chosen: teachings
  alternatives:
  - doctrines
  - instructions
  lexicon: BDAG
  rationale: Plural dative after παραφέρεσθε indicates the sphere/instrument of being
    led astray. 'Teachings' is natural modern English and avoids the more systematized
    sense 'doctrines' can suggest.
- source_word: ποικίλαις καὶ ξέναις
  chosen: various and strange
  alternatives:
  - diverse and foreign
  - many and alien
  lexicon: BDAG
  rationale: ποικίλαις conveys variety/diversity; ξέναις here means foreign or unfamiliar
    in the sense of not belonging to the apostolic message. 'Strange' preserves the
    warning tone in idiomatic English without over-specifying ethnicity or origin.
- source_word: μὴ παραφέρεσθε
  chosen: Do not be carried away
  alternatives:
  - Do not be led astray
  - Do not be swept along
  lexicon: BDAG
  rationale: Present passive/imperfective imperative/prohibition suggests ongoing
    warning against being borne off course. 'Carried away' preserves the metaphor
    of being borne along while remaining idiomatic.
- source_word: καλὸν γὰρ
  chosen: for it is good
  alternatives:
  - for it is fitting
  - for it is right
  lexicon: BDAG
  rationale: καλόν here expresses what is good/fitting. 'It is good' is the most straightforward
    rendering in context.
- source_word: χάριτι
  chosen: by grace
  alternatives:
  - with grace
  lexicon: BDAG
  rationale: 'Dative is best taken instrumentally/means: the heart is strengthened
    by grace. ''Grace'' should remain theologically transparent and not be paraphrased.'
- source_word: βεβαιοῦσθαι τὴν καρδίαν
  chosen: for the heart to be strengthened
  alternatives:
  - for the heart to be established
  - for the heart to be made firm
  lexicon: BDAG
  rationale: βεβαιοῦσθαι can mean establish, confirm, strengthen. 'Strengthened' reads
    naturally in English while preserving the sense of inward stabilization. 'Heart'
    is retained literally as the center of inner life.
- source_word: οὐ βρώμασιν
  chosen: not by foods
  alternatives:
  - not by food regulations
  - not by meals
  lexicon: BDAG
  rationale: βρώμασιν literally means foods. Although the referent likely involves
    dietary practices, the noun itself should be translated directly rather than expanded
    to 'regulations' in the main text.
- source_word: ἐν οἷς
  chosen: by which
  alternatives:
  - in which
  - through which
  lexicon: BDAG
  rationale: Though literally 'in which,' English idiom with ὠφελέω is clearer as
    'by which' or 'through which,' referring back to foods/dietary practices as the
    means in question.
- source_word: οἱ περιπατοῦντες
  chosen: those who walked in them
  alternatives:
  - those who occupied themselves with them
  - those who lived by them
  lexicon: BDAG
  rationale: περιπατέω is literally 'walk,' often metaphorical for conduct. Because
    the antecedent is neuter plural 'foods,' the idiom is awkward in English; 'walked
    in them' preserves the metaphor and the likely sense of ordering one's life around
    such practices.
- source_word: οὐκ ὠφελήθησαν
  chosen: were not benefited
  alternatives:
  - did not benefit
  - were not helped
  lexicon: BDAG
  rationale: Passive form is best reflected in English. 'Were not benefited' is slightly
    formal but preserves the verbal voice and the author's evaluative point.
