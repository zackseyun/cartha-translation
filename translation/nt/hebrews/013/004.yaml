theological_decisions:
- issue: Whether the opening clause is indicative ('Marriage is honorable among all')
    or imperative/exhortational ('Let marriage be held in honor among all')
  chosen_reading: Imperative/exhortational in English
  alternative_readings:
  - 'Indicative/declarative: ''Marriage is honorable among all'''
  rationale: The Greek lacks an explicit finite verb, so either a declarative or exhortational
    sense is possible. In the immediate context of rapid ethical exhortations in Hebrews
    13 (brotherly love, hospitality, remembering prisoners, contentment), an exhortational
    rendering best fits the discourse flow. This also avoids implying that all in
    fact honor marriage, which the following warning about divine judgment suggests
    is not the case. The declarative alternative is preserved in a footnote because
    the ambiguity is genuine and should not be hidden.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
