id: HEB.13.4
reference: Hebrews 13:4
source:
  edition: SBLGNT
  text: τίμιος ὁ γάμος ἐν πᾶσιν καὶ ἡ κοίτη ἀμίαντος, πόρνους ⸀γὰρ καὶ μοιχοὺς κρινεῖ
    ὁ θεός.
translation:
  text: Let marriage be held in honor among all, and the marriage bed be undefiled,
    for God will judge the sexually immoral and adulterers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Marriage is honorable among all.' The Greek has no explicit verb in
      the first clause, so it may be read either as an exhortation or as a statement.
    reason: alternative_reading
  - marker: b
    text: Or, 'by all' instead of 'among all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίμιος
  chosen: be held in honor
  alternatives:
  - is honorable
  - is precious
  lexicon: BDAG
  rationale: τίμιος denotes something honored, valuable, or esteemed. Although the
    Greek clause can be read as a verbless statement ('marriage is honorable'), in
    context the paraenetic flow of Hebrews 13 favors an exhortational sense in English.
    'Be held in honor' captures the honor/shame nuance better than the flatter 'is
    honorable.'
- source_word: γάμος
  chosen: marriage
  alternatives:
  - the marriage bond
  - wedding
  lexicon: BDAG
  rationale: γάμος here refers to marriage as an institution/state, not a wedding
    ceremony. 'Marriage' is the most natural and contextually accurate rendering.
- source_word: ἐν πᾶσιν
  chosen: among all
  alternatives:
  - by all
  - in every way
  lexicon: BDAG
  rationale: 'The dative plural most naturally refers to persons here: marriage is
    to be honored among all people / by all. ''Among all'' preserves the breadth without
    over-specifying whether the sense is universal social honor or honor by all believers.
    The alternative ''by all'' is viable and preserved in a footnote.'
- source_word: κοίτη
  chosen: the marriage bed
  alternatives:
  - the bed
  - sexual union
  lexicon: BDAG
  rationale: κοίτη literally means 'bed' but commonly functions as a metonym for sexual
    relations. In this context, paired with γάμος, 'the marriage bed' makes the intended
    marital-sexual reference explicit in idiomatic English without becoming euphemistically
    vague.
- source_word: ἀμίαντος
  chosen: undefiled
  alternatives:
  - pure
  - unstained
  lexicon: BDAG
  rationale: ἀμίαντος means undefiled, unstained, pure. 'Undefiled' preserves the
    moral and cultic resonance present in the term and fits the solemn tone of Hebrews.
- source_word: πόρνους
  chosen: the sexually immoral
  alternatives:
  - fornicators
  - sexually immoral people
  lexicon: BDAG
  rationale: πόρνος broadly denotes one engaged in sexual immorality. 'Fornicators'
    is traditional but archaic and narrower in modern English. 'The sexually immoral'
    is clear, contemporary, and preserves the category's breadth.
- source_word: μοιχούς
  chosen: adulterers
  alternatives:
  - those who commit adultery
  lexicon: BDAG
  rationale: μοιχός specifically denotes an adulterer. 'Adulterers' is concise, standard,
    and preserves the distinction from the broader πόρνοι category.
- source_word: κρινεῖ
  chosen: will judge
  alternatives:
  - judges
  - will condemn
  lexicon: BDAG
  rationale: The future indicative points to future divine judgment. 'Will judge'
    is preferable to 'will condemn' because κρίνω does not itself specify the full
    outcome and should not be made more explicit than the Greek warrants.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason grounding the exhortation/statement. 'For' preserves
    the logical connection in a formal but still readable way.
