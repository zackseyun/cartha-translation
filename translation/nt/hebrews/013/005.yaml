id: HEB.13.5
reference: Hebrews 13:5
source:
  edition: SBLGNT
  text: ἀφιλάργυρος ὁ τρόπος· ἀρκούμενοι τοῖς παροῦσιν· αὐτὸς γὰρ εἴρηκεν· Οὐ μή σε
    ἀνῶ οὐδ’ οὐ μή σε ⸀ἐγκαταλίπω·
translation:
  text: Let your way of life be free from the love of money, being content with what
    is present, for he himself has said, “I will never leave you, nor will I ever
    forsake you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “being content with what you have.” Literally, “being
      content with the things present.”
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Old Testament covenant assurances, especially Deuteronomy
      31:6, 8 and Joshua 1:5.
    reason: cross_reference
lexical_decisions:
- source_word: ἀφιλάργυρος
  chosen: free from the love of money
  alternatives:
  - without love of money
  - not money-loving
  - free from greed
  lexicon: BDAG
  rationale: The adjective denotes being not characterized by love of money. 'Free
    from the love of money' is idiomatic modern English and preserves the specific
    focus on avarice better than the broader 'free from greed.'
- source_word: ὁ τρόπος
  chosen: your way of life
  alternatives:
  - your conduct
  - your manner of life
  - character
  lexicon: BDAG
  rationale: τρόπος here refers to one's manner of living or conduct. Supplying 'your'
    is natural in English because the verse addresses the audience directly through
    predicate-style exhortation. 'Way of life' is readable and broad enough to cover
    conduct and lifestyle.
- source_word: ἀρκούμενοι
  chosen: being content
  alternatives:
  - being satisfied
  - contenting yourselves
  lexicon: BDAG
  rationale: The participle carries an exhortational sense linked to the opening clause.
    'Being content' is concise and natural, preserving the ongoing disposition implied
    by the participle.
- source_word: τοῖς παροῦσιν
  chosen: with what is present
  alternatives:
  - with what you have
  - with the things at hand
  lexicon: BDAG
  rationale: Literally the phrase refers to the things that are present/at hand. 'With
    what is present' stays closer to the Greek than the traditional 'with such things
    as you have,' while still making sense in English. It points to present possessions/circumstances
    without overexpansion.
- source_word: αὐτὸς γὰρ εἴρηκεν
  chosen: for he himself has said
  alternatives:
  - for he himself said
  - for God himself has said
  lexicon: BDAG
  rationale: The perfect εἴρηκεν supports 'has said,' emphasizing the abiding force
    of the divine word. 'He himself' reflects αὐτός for emphasis. 'God' is not explicit
    in the Greek, so the pronoun is retained in the main text.
- source_word: Οὐ μή σε ἀνῶ
  chosen: I will never leave you
  alternatives:
  - I will certainly not let you go
  - I will never release you
  lexicon: BDAG
  rationale: The emphatic negation οὐ μή with ἀνίημι conveys a strong assurance. In
    this citation context, 'leave' is the most idiomatic English rendering and pairs
    naturally with 'forsake' in the following clause.
- source_word: οὐδ’ οὐ μή σε ἐγκαταλίπω
  chosen: nor will I ever forsake you
  alternatives:
  - nor will I ever abandon you
  - nor will I ever desert you
  lexicon: BDAG
  rationale: ἐγκαταλείπω means to leave behind, abandon, or forsake. 'Forsake' preserves
    the solemn covenantal tone familiar from biblical usage, while 'will I ever' helps
    convey the emphatic negation.
