theological_decisions:
- issue: Identification of the speaker in the quotation
  chosen_reading: Retain the Greek pronoun as 'he himself' rather than explicitly
    inserting 'God' in the main text.
  alternative_readings:
  - for God himself has said
  rationale: The context clearly implies God as the speaker, likely echoing scriptural
    promises, but the Greek text itself uses αὐτός rather than θεός. To avoid importing
    an explicit noun not present in the source while preserving the referent's force,
    the main text keeps 'he himself'; the rationale is documented here.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the emphatic double negations in the quotation
  chosen_reading: 'Use strong English negatives: ''I will never leave you, nor will
    I ever forsake you.'''
  alternative_readings:
  - I will certainly not leave you or abandon you
  - I will never, never leave you nor forsake you
  rationale: The repeated οὐ μή constructions intensify the assurance. English cannot
    reproduce the Greek form exactly without sounding unnatural, so a strong idiomatic
    rendering is used while preserving the force of emphatic negation.
  doctrine_reference: Translation philosophy §6
