id: HEB.13.25
reference: Hebrews 13:25
source:
  edition: SBLGNT
  text: ἡ χάρις μετὰ πάντων ⸀ὑμῶν.
translation:
  text: Grace be with all of you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ χάρις
  chosen: Grace
  alternatives:
  - The grace
  lexicon: BDAG
  rationale: χάρις here functions as the conventional epistolary benediction 'grace.'
    English idiom in closing blessings normally omits the article, so 'Grace' rather
    than the more wooden 'The grace' best reflects the sense while remaining natural.
- source_word: μετὰ
  chosen: be with
  alternatives:
  - with
  lexicon: BDAG
  rationale: 'μετά with the genitive means ''with.'' In English benedictory style,
    an implied optative/elliptical sense is naturally supplied: ''Grace be with...''
    rather than the verbless ''Grace with...''. This is not an added doctrinal claim
    but the standard way to render the Greek closing formula intelligibly.'
- source_word: πάντων ὑμῶν
  chosen: all of you
  alternatives:
  - you all
  - all of you all
  lexicon: BDAG
  rationale: πάντων with ὑμῶν is explicitly inclusive of the whole audience. 'All
    of you' preserves the distributive force more clearly than simply 'you' and is
    idiomatic modern English.
