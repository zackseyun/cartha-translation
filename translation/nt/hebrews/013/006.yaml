theological_decisions:
- issue: Rendering of generic ἄνθρωπος
  chosen_reading: man
  alternative_readings:
  - a human being
  - anyone
  rationale: The Greek singular ἄνθρωπος is grammatically masculine with generic force.
    Per the project's gender-accurate policy, 'man' is retained in the main text rather
    than neutralizing the representative singular. A footnote preserves the inclusive
    sense for modern readers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Force of the rhetorical future ποιήσει
  chosen_reading: What can man do to me?
  alternative_readings:
  - What will man do to me?
  rationale: The future verb in this citation functions rhetorically to deny ultimate
    human threat. English 'can' communicates the intended force more naturally than
    a strictly formal future, while remaining within optimal equivalence and not adding
    doctrinal content.
  doctrine_reference: DOCTRINE.md §Translation philosophy (optimal equivalence)
