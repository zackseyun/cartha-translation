id: HEB.13.6
reference: Hebrews 13:6
source:
  edition: SBLGNT
  text: ὥστε θαρροῦντας ἡμᾶς λέγειν· Κύριος ἐμοὶ βοηθός, ⸀οὐ φοβηθήσομαι· τί ποιήσει
    μοι ἄνθρωπος;
translation:
  text: so that we can confidently say, “The Lord is my helper; I will not be afraid.
    What can man do to me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “What will man do to me?”
    reason: lexical_alternative
  - marker: b
    text: “Man” here translates Greek ἄνθρωπος, a singular generic term meaning a
      human being in representative sense.
    reason: cultural_note
lexical_decisions:
- source_word: ὥστε
  chosen: so that
  alternatives:
  - therefore
  - thus
  lexicon: BDAG
  rationale: Introduces the result of the preceding statement. 'So that' preserves
    the inferential/resultative force while flowing naturally into the infinitive
    construction that follows.
- source_word: θαρροῦντας ἡμᾶς λέγειν
  chosen: we can confidently say
  alternatives:
  - we say with confidence
  - we boldly say
  lexicon: BDAG
  rationale: The participle θαρροῦντας conveys confidence/courage, and with ἡμᾶς +
    λέγειν forms an idiomatic sense of 'for us to say confidently.' 'We can confidently
    say' captures the construction in natural English without overstating it as a
    command.
- source_word: Κύριος
  chosen: The Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering of κύριος as 'Lord.' The article
    is represented in English here because the clause is a citation-like declaration
    and 'The Lord' reads naturally and distinctly as a title.
- source_word: ἐμοὶ
  chosen: my
  alternatives:
  - for me
  - to me
  lexicon: BDAG
  rationale: 'The dative with predicate noun βοηθός means ''helper for me/on my behalf.''
    English idiom is best expressed as possessive: ''my helper.'''
- source_word: βοηθός
  chosen: helper
  alternatives:
  - one who helps
  - help
  lexicon: BDAG
  rationale: '''Helper'' is the straightforward nominal equivalent and preserves the
    personal sense of one who comes to aid, echoing the LXX source.'
- source_word: οὐ φοβηθήσομαι
  chosen: I will not be afraid
  alternatives:
  - I will not fear
  lexicon: BDAG
  rationale: Future middle/passive of φοβέομαι is naturally rendered 'I will not be
    afraid' in contemporary English. 'I will not fear' is more formal/traditional
    but slightly less idiomatic.
- source_word: τί ποιήσει μοι ἄνθρωπος
  chosen: What can man do to me?
  alternatives:
  - What will man do to me?
  - What can a human being do to me?
  lexicon: BDAG
  rationale: Although ποιήσει is future ('will do'), in this rhetorical question English
    idiom often uses 'can' to express the implied limitation of human threat. 'Man'
    preserves the singular generic ἄνθρωπος in line with the project's gender-accurate
    policy; the phrase refers representatively to a human opponent, not specifically
    to males only.
