theological_decisions:
- issue: Rendering ἁγιάζω in a sacrificial context
  chosen_reading: sanctify
  alternative_readings:
  - make holy
  - consecrate
  rationale: Hebrews uses cultic and covenantal categories; 'sanctify' preserves that
    theological register without reducing the term to a merely moral transformation.
    It also avoids importing a narrower denominational doctrine of sanctification,
    preserving the text's sacrificial logic.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of τὸν λαόν
  chosen_reading: the people
  alternative_readings:
  - the people of God
  rationale: The context strongly suggests God's covenant people, but the Greek text
    itself says only 'the people.' The translation preserves the textual wording and
    does not expand it interpretively in the main text.
  doctrine_reference: Translation philosophy §§1, 3
