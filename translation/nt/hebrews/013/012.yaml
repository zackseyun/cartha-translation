id: HEB.13.12
reference: Hebrews 13:12
source:
  edition: SBLGNT
  text: διὸ καὶ Ἰησοῦς, ἵνα ἁγιάσῃ διὰ τοῦ ἰδίου αἵματος τὸν λαόν, ἔξω τῆς πύλης ἔπαθεν.
translation:
  text: Therefore Jesus also suffered outside the gate, so that he might sanctify
    the people through his own blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make holy' or 'consecrate' for 'sanctify.'
    reason: lexical_alternative
  - marker: b
    text: '''Outside the gate'' likely refers to the place outside Jerusalem where
      Jesus suffered, echoing the disposal of sacrificial remains outside the camp/gate
      in the preceding context.'
    reason: cross_reference
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument;
    'Therefore' is natural modern English and preserves the logical connection.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: Adds Jesus as corresponding to the preceding sacrificial pattern; 'also'
    best preserves the comparative force without overemphasis.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the policy
    to transliterate names.
- source_word: ἵνα ἁγιάσῃ
  chosen: so that he might sanctify
  alternatives:
  - in order that he might make holy
  - so that he might consecrate
  lexicon: BDAG
  rationale: ἵνα with aorist subjunctive expresses purpose. 'Sanctify' preserves the
    theological and cultic sense of ἁγιάζω better than the more paraphrastic 'make
    holy,' while remaining standard English.
- source_word: διὰ τοῦ ἰδίου αἵματος
  chosen: through his own blood
  alternatives:
  - by means of his own blood
  - through the blood that was his own
  lexicon: BDAG
  rationale: διά with genitive indicates means/instrument. 'His own blood' preserves
    the emphatic force of ἰδίου and the sacrificial imagery central to Hebrews.
- source_word: τὸν λαόν
  chosen: the people
  alternatives:
  - the people of God
  - the people group
  lexicon: BDAG
  rationale: λαός here is definite but not explicitly expanded in the Greek. 'The
    people' preserves the covenantal sense without importing words not present in
    the text.
- source_word: ἔξω τῆς πύλης
  chosen: outside the gate
  alternatives:
  - outside the city gate
  - outside the gates
  lexicon: BDAG
  rationale: Singular 'gate' matches the Greek. The phrase evokes the place outside
    Jerusalem's gate without adding 'city,' which is implied but not stated.
- source_word: ἔπαθεν
  chosen: suffered
  alternatives:
  - endured suffering
  lexicon: BDAG
  rationale: Aorist indicative of πάσχω is straightforwardly rendered 'suffered.'
    This keeps the statement concise and faithful to the Greek.
