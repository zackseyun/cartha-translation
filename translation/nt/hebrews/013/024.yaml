theological_decisions:
- issue: Referent of οἱ ἀπὸ τῆς Ἰταλίας
  chosen_reading: Those from Italy
  alternative_readings:
  - Those in Italy
  rationale: This is not a major doctrinal issue, but it is an interpretive ambiguity
    with implications for reconstructing the letter's setting. The preposition ἀπό
    normally indicates source/origin ('from'), so the main text keeps that sense.
    Because some interpreters understand it as a greeting from believers currently
    in Italy, the alternative is preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
