id: HEB.13.24
reference: Hebrews 13:24
source:
  edition: SBLGNT
  text: ἀσπάσασθε πάντας τοὺς ἡγουμένους ὑμῶν καὶ πάντας τοὺς ἁγίους. ἀσπάζονται ὑμᾶς
    οἱ ἀπὸ τῆς Ἰταλίας.
translation:
  text: Greet all your leaders and all the saints. Those from Italy greet you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Those in Italy greet you.' The Greek phrase can denote either people
      originating from Italy or people located there.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσασθε
  chosen: Greet
  alternatives:
  - Give greetings to
  - Welcome
  lexicon: BDAG
  rationale: Aorist middle imperative of ἀσπάζομαι, commonly used for conveying greetings.
    'Greet' is natural modern English and preserves the imperative force without unnecessary
    expansion.
- source_word: πάντας
  chosen: all
  alternatives:
  - every
  lexicon: BDAG
  rationale: The accusative plural with the article emphasizes the whole group. 'All'
    is the most direct and idiomatic rendering in English.
- source_word: τοὺς ἡγουμένους ὑμῶν
  chosen: your leaders
  alternatives:
  - those leading you
  - your rulers
  lexicon: BDAG
  rationale: ἡγούμενοι literally means 'those leading' and in Hebrews 13 refers to
    recognized community leaders (cf. 13:7, 17). 'Your leaders' is clear, idiomatic,
    and avoids the overly harsh or politically misleading 'rulers.'
- source_word: τοὺς ἁγίους
  chosen: the saints
  alternatives:
  - the holy ones
  - God's people
  lexicon: BDAG
  rationale: ἅγιοι is the standard NT designation for believers as holy ones. 'The
    saints' preserves the lexical and theological weight better than the more interpretive
    'God's people,' while remaining familiar English.
- source_word: ἀσπάζονται
  chosen: greet
  alternatives:
  - send greetings to
  lexicon: BDAG
  rationale: Present middle indicative of ἀσπάζομαι. In epistolary context, English
    commonly supplies 'greet' or 'send greetings.' The shorter 'greet' is sufficiently
    clear in context and mirrors the Greek more closely.
- source_word: οἱ ἀπὸ τῆς Ἰταλίας
  chosen: Those from Italy
  alternatives:
  - The ones from Italy
  - Those in Italy
  lexicon: BDAG
  rationale: ἀπό with the genitive most naturally means origin or association, 'from
    Italy.' The phrase could refer either to Italians presently with the author or
    to people located in Italy, but the more direct lexical sense is 'from Italy';
    the location-based alternative is worth preserving in a footnote because the referent
    is debated.
