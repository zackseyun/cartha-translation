id: HEB.13.1
reference: Hebrews 13:1
source:
  edition: SBLGNT
  text: Ἡ φιλαδελφία μενέτω.
translation:
  text: Let brotherly love continue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'love for fellow believers'; the Greek term refers to familial affection
      within the Christian community, not only to males.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλαδελφία
  chosen: brotherly love
  alternatives:
  - love of the brothers
  - family affection among believers
  - mutual love
  lexicon: BDAG
  rationale: The noun denotes affection/love among brothers or siblings, and in early
    Christian usage commonly refers to the familial love expected within the believing
    community. 'Brotherly love' is the established and still understandable English
    rendering that preserves the metaphorical family language of the Greek better
    than the more generic 'mutual love.'
- source_word: μενέτω
  chosen: let ... continue
  alternatives:
  - let ... remain
  - must continue
  - continue
  lexicon: BDAG
  rationale: 'The present active imperative of μένω calls for an ongoing state: ''remain''
    or ''continue.'' ''Let ... continue'' captures the imperatival force in natural
    English while preserving the durative sense better than a bare ''continue.'''
- source_word: Ἡ
  chosen: the
  lexicon: Greek grammar
  rationale: The article marks φιλαδελφία as a definite, recognizable virtue already
    known to the audience. English idiom does not require an explicit 'the' in this
    exhortational construction, so its force is absorbed in the natural phrase 'brotherly
    love.'
