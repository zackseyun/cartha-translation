theological_decisions:
- issue: Scope of φιλαδελφία and gendered family language
  chosen_reading: Render as 'brotherly love' in the main text, preserving the familial
    metaphor rather than neutralizing it.
  alternative_readings:
  - mutual love
  - love for fellow believers
  - sibling love
  rationale: The Greek term is built on 'brother' language and refers to familial
    affection within the Christian community. Following the translation philosophy's
    gender-accurate principle, the main text keeps the source metaphor rather than
    flattening it to a generic abstraction. Because modern readers may hear 'brotherly'
    too narrowly, an explanatory footnote preserves the broader communal sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
