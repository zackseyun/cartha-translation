id: HEB.13.19
reference: Hebrews 13:19
source:
  edition: SBLGNT
  text: περισσοτέρως δὲ παρακαλῶ τοῦτο ποιῆσαι ἵνα τάχιον ἀποκατασταθῶ ὑμῖν.
translation:
  text: And I urge you all the more to do this, so that I may be restored to you sooner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned to you.' The Greek can refer generally to being restored to
      the readers, without specifying the exact circumstance.
    reason: lexical_alternative
lexical_decisions:
- source_word: περισσοτέρως
  chosen: all the more
  alternatives:
  - more earnestly
  - even more
  lexicon: BDAG
  rationale: Comparative adverb intensifying the appeal. 'All the more' is idiomatic
    modern English and preserves the comparative force better than a flat 'more.'
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And'
    smoothly links this sentence to the preceding exhortation without overstating
    contrast.
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal
  - I exhort
  - I ask
  lexicon: BDAG
  rationale: In this context the verb expresses earnest exhortation/request. 'I urge'
    captures the strength of the appeal in natural English.
- source_word: τοῦτο ποιῆσαι
  chosen: to do this
  alternatives:
  - to do so
  - to act in this way
  lexicon: BDAG
  rationale: The infinitive phrase refers back to the immediately preceding request
    for prayer. 'To do this' is direct and clear, preserving the anaphoric force of
    τοῦτο.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural English and preserves the purposive
    nuance.
- source_word: τάχιον
  chosen: sooner
  alternatives:
  - more quickly
  - the sooner
  lexicon: BDAG
  rationale: Comparative adverb meaning 'more quickly/sooner.' 'Sooner' fits idiomatic
    English with the passive verb that follows.
- source_word: ἀποκατασταθῶ
  chosen: I may be restored
  alternatives:
  - I may be returned
  - I may be given back
  lexicon: BDAG
  rationale: Passive of ἀποκαθίστημι can mean restore or return to a former state/place.
    In context the writer asks prayer so that he may be restored to the recipients,
    likely meaning returned to them. 'Restored' preserves the passive and the relational
    nuance without over-specifying the circumstances.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to your presence
  - to you all
  lexicon: BDAG
  rationale: Dative pronoun indicating relation/direction toward the audience. 'To
    you' is sufficient; plurality is implicit in English context.
