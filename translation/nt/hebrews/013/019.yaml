theological_decisions:
- issue: Meaning of the writer's hoped-for restoration
  chosen_reading: A general request that he be restored/returned to the recipients,
    without specifying whether this refers to release from imprisonment, recovery
    from illness, or simple reunion after absence.
  alternative_readings:
  - release from imprisonment
  - return after travel or separation
  - restoration to ministry among them
  rationale: The Greek passive ἀποκατασταθῶ ὑμῖν indicates restoration to the audience
    but does not identify the exact circumstance. To preserve theological and historical
    restraint, the translation keeps the broader wording rather than importing a specific
    scenario.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
