theological_decisions:
- issue: Nature of 'sacrifices' in the verse
  chosen_reading: Metaphorical reference to acts of doing good and sharing as sacrifices
    pleasing to God
  alternative_readings:
  - Primarily almsgiving as a cultic equivalent
  - General ethical conduct without sacrificial nuance
  rationale: The Greek explicitly uses sacrificial language (θυσίαις) for ethical
    acts. The translation preserves the metaphor without flattening it into mere moralism
    or over-narrowing it to almsgiving alone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
