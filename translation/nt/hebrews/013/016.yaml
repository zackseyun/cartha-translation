id: HEB.13.16
reference: Hebrews 13:16
source:
  edition: SBLGNT
  text: τῆς δὲ εὐποιΐας καὶ κοινωνίας μὴ ἐπιλανθάνεσθε, τοιαύταις γὰρ θυσίαις εὐαρεστεῖται
    ὁ θεός.
translation:
  text: And do not neglect doing good and sharing, for with such sacrifices God is
    pleased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not forget.' The Greek verb can be rendered more literally this way,
      though here it carries the practical sense of failing to carry out these acts.
    reason: lexical_alternative
  - marker: b
    text: '''Sharing'' can also be rendered ''fellowship'' or ''generosity''; in this
      context it likely refers to practical sharing of resources with others.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐποιΐας
  chosen: doing good
  alternatives:
  - good works
  - beneficence
  lexicon: BDAG
  rationale: The noun denotes active beneficence or doing what is good. 'Doing good'
    is natural modern English and preserves the verbal force implied by the abstract
    noun better than the more formal 'beneficence.'
- source_word: κοινωνίας
  chosen: sharing
  alternatives:
  - fellowship
  - generosity
  - contribution
  lexicon: BDAG
  rationale: In this context, paired with εὐποιΐας and followed by 'such sacrifices,'
    the sense is practical sharing of resources with others rather than merely relational
    fellowship. 'Sharing' is broad enough to include material generosity without over-specifying.
- source_word: μὴ ἐπιλανθάνεσθε
  chosen: do not neglect
  alternatives:
  - do not forget
  lexicon: BDAG
  rationale: The verb literally means 'forget,' but in exhortational context English
    idiom often expresses the intended force as failure to carry out a duty. 'Do not
    neglect' communicates the practical imperative while remaining faithful to the
    sense.
- source_word: τοιαύταις ... θυσίαις
  chosen: such sacrifices
  alternatives:
  - these kinds of sacrifices
  lexicon: BDAG
  rationale: The phrase explicitly compares acts of doing good and sharing to sacrifices
    acceptable to God. 'Such sacrifices' is concise and preserves the cultic metaphor.
- source_word: εὐαρεστεῖται
  chosen: is pleased
  alternatives:
  - is well pleased
  - is pleased with
  lexicon: BDAG
  rationale: The passive verb means 'to be pleased' or 'to take pleasure.' 'Is pleased'
    is clear modern English; the object is already implied by the dative phrase 'with
    such sacrifices.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of the nominative subject; no contextual factor suggests
    expansion or variation.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here links this exhortation with the preceding context without strong
    contrast. 'And' best reflects the connective force in smooth English.
