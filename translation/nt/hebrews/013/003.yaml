id: HEB.13.3
reference: Hebrews 13:3
source:
  edition: SBLGNT
  text: μιμνῄσκεσθε τῶν δεσμίων ὡς συνδεδεμένοι, τῶν κακουχουμένων ὡς καὶ αὐτοὶ ὄντες
    ἐν σώματι.
translation:
  text: Remember those in prison, as though you were imprisoned with them; those who
    are mistreated, since you yourselves also are in the body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as being bound with them.' The Greek literally evokes being bound together
      with the prisoners.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'in the body' as a reference to belonging to the body of Christ;
      more likely it refers to sharing ordinary human bodily vulnerability.
    reason: alternative_reading
lexical_decisions:
- source_word: μιμνῄσκεσθε
  chosen: Remember
  alternatives:
  - Keep remembering
  - Be mindful of
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural, calling for
    ongoing active remembrance. 'Remember' is idiomatic English and can carry the
    durative force in context without awkwardness; 'keep remembering' is possible
    but slightly over-explicit.
- source_word: τῶν δεσμίων
  chosen: those in prison
  alternatives:
  - the prisoners
  - those in chains
  lexicon: BDAG
  rationale: δέσμιος denotes one in bonds, often a prisoner. 'Those in prison' is
    natural modern English and fits the social setting. 'Those in chains' is more
    literal to the imagery of bonds but less idiomatic here.
- source_word: ὡς συνδεδεμένοι
  chosen: as though you were imprisoned with them
  alternatives:
  - as fellow prisoners
  - as being bound with them
  lexicon: BDAG
  rationale: The participle from συνδέομαι literally suggests being bound together/with.
    The sense is empathetic identification, not merely mental recollection. 'As though
    you were imprisoned with them' communicates the force clearly in contemporary
    English while preserving the solidarity implied by the Greek.
- source_word: τῶν κακουχουμένων
  chosen: those who are mistreated
  alternatives:
  - those who are suffering ill-treatment
  - the abused
  lexicon: BDAG
  rationale: κακουχέομαι means to be mistreated, oppressed, or suffer hardship at
    others' hands. 'Those who are mistreated' is clear, accessible, and preserves
    the passive sense of suffering inflicted by others.
- source_word: ὡς καὶ αὐτοὶ ὄντες ἐν σώματι
  chosen: since you yourselves also are in the body
  alternatives:
  - as also being yourselves in the body
  - since you yourselves also have a body
  - because you too are in the body
  lexicon: BDAG
  rationale: ἐν σώματι is literally 'in the body.' The phrase likely appeals to shared
    embodied human vulnerability, though some hear an ecclesial nuance. 'Since you
    yourselves also are in the body' preserves the literal wording and the interpretive
    openness better than the more explicit 'have a body.' 'Since' brings out the motivational
    force in context.
