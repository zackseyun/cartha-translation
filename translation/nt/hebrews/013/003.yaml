theological_decisions:
- issue: Meaning of 'in the body' (ἐν σώματι)
  chosen_reading: shared embodied human condition
  alternative_readings:
  - membership in the body of Christ
  rationale: In context the exhortation concerns empathy toward prisoners and the
    mistreated; the appeal most naturally rests on common bodily vulnerability and
    exposure to suffering. The translation preserves the literal phrase 'in the body'
    so as not to foreclose the possible resonance with corporate Christian identity,
    but the main sense is human embodiment.
  doctrine_reference: Preserve theological tension rather than resolve it.
