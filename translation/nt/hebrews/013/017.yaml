id: HEB.13.17
reference: Hebrews 13:17
source:
  edition: SBLGNT
  text: Πείθεσθε τοῖς ἡγουμένοις ὑμῶν καὶ ὑπείκετε, αὐτοὶ γὰρ ἀγρυπνοῦσιν ὑπὲρ τῶν
    ψυχῶν ὑμῶν ὡς λόγον ἀποδώσοντες, ἵνα μετὰ χαρᾶς τοῦτο ποιῶσιν καὶ μὴ στενάζοντες,
    ἀλυσιτελὲς γὰρ ὑμῖν τοῦτο.
translation:
  text: Be persuaded by your leaders and yield to them, for they are keeping watch
    over your souls as those who will give an account, so that they may do this with
    joy and not with groaning, for this would be unprofitable for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Obey your leaders.” The Greek Πείθεσθε can carry the sense of obeying,
      but more literally suggests being persuaded or won over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πείθεσθε
  chosen: Be persuaded by
  alternatives:
  - Obey
  - Trust
  lexicon: BDAG
  rationale: Middle/passive imperative of πείθω can mean 'be persuaded' or, by extension,
    'obey.' Here the form does not most literally denote bare command-compliance;
    'be persuaded by' preserves the relational nuance of responsive trust while still
    fitting the exhortational context. Because 'obey' is a common and plausible rendering,
    it is preserved in a footnote.
- source_word: ἡγουμένοις
  chosen: leaders
  alternatives:
  - those leading
  - those ruling over
  lexicon: BDAG
  rationale: Participle of ἡγέομαι here refers to recognized community leaders. 'Leaders'
    is natural modern English and avoids importing a stronger authoritarian sense
    than the term itself requires.
- source_word: ὑπείκετε
  chosen: yield to
  alternatives:
  - submit to
  - defer to
  lexicon: BDAG
  rationale: ὑπείκω carries the sense of giving way, yielding, or deferring. 'Yield
    to' is a clear modern rendering that complements Πείθεσθε without collapsing the
    two verbs into a single idea.
- source_word: ἀγρυπνοῦσιν
  chosen: are keeping watch
  alternatives:
  - are watchful
  - stay awake
  lexicon: BDAG
  rationale: The verb literally evokes sleepless vigilance; in context it refers to
    pastoral watchfulness. 'Are keeping watch' preserves the metaphor and reads naturally.
- source_word: ψυχῶν
  chosen: souls
  alternatives:
  - lives
  - persons
  lexicon: BDAG
  rationale: ψυχή can denote soul, life, or self/person. In this pastoral and moral
    context, 'souls' best preserves the spiritual weight of the expression without
    denying holistic human reference.
- source_word: ὡς λόγον ἀποδώσοντες
  chosen: as those who will give an account
  alternatives:
  - since they will render an account
  - as men who must give account
  lexicon: BDAG
  rationale: The participial phrase explains the leaders' responsibility before God.
    'As those who will give an account' is idiomatic and preserves the prospective
    force of the future participle.
- source_word: μετὰ χαρᾶς
  chosen: with joy
  alternatives:
  - joyfully
  lexicon: BDAG
  rationale: A straightforward prepositional phrase; 'with joy' is slightly more formal
    and mirrors the Greek structure.
- source_word: στενάζοντες
  chosen: with groaning
  alternatives:
  - groaning
  - with grief
  lexicon: BDAG
  rationale: στενάζω denotes groaning or sighing. 'With groaning' keeps the concrete
    metaphor rather than abstracting it to mere sadness.
- source_word: ἀλυσιτελὲς
  chosen: unprofitable
  alternatives:
  - of no benefit
  - harmful
  lexicon: BDAG
  rationale: The adjective means not advantageous or not beneficial. 'Unprofitable'
    is concise and close to the lexical sense; 'harmful' would overstate the term.
