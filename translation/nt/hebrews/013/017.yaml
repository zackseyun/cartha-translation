theological_decisions:
- issue: Nature of the exhortation toward church leaders
  chosen_reading: The verse calls for responsive trust and yielding toward recognized
    leaders, not an unqualified endorsement of authoritarian obedience.
  alternative_readings:
  - A stronger command to absolute obedience to leaders
  rationale: The paired verbs Πείθεσθε and ὑπείκετε support a posture of trustful
    compliance and deference, but the wording does not require the translation to
    maximize authoritarian force. The rationale clause grounds the exhortation in
    leaders' accountable care before God.
  doctrine_reference: Translation philosophy §§1, 3, 6
