theological_decisions:
- issue: Relation of the final participial clause to the assertion of a good conscience
  chosen_reading: 'Rendered as explanatory/causal: ''since we want to conduct ourselves
    well in everything'''
  alternative_readings:
  - 'Rendered more coordinate: ''wanting to conduct ourselves well in everything'''
  - 'Rendered inferentially: ''because we intend to act honorably in all things'''
  rationale: The Greek participle θέλοντες can be left more formally attached, but
    idiomatic English benefits from making the relation explicit. The clause explains
    the basis or character of the claimed good conscience without importing a stronger
    theological claim about sinlessness.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
