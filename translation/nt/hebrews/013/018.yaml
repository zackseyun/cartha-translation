id: HEB.13.18
reference: Hebrews 13:18
source:
  edition: SBLGNT
  text: Προσεύχεσθε περὶ ἡμῶν, ⸀πειθόμεθα γὰρ ὅτι καλὴν συνείδησιν ἔχομεν, ἐν πᾶσιν
    καλῶς θέλοντες ἀναστρέφεσθαι.
translation:
  text: Pray for us, for we are convinced that we have a good conscience, since we
    want to conduct ourselves well in everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we are persuaded' or 'we are confident.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a clear conscience.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wanting to conduct ourselves honorably in all things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσεύχεσθε
  chosen: Pray
  alternatives:
  - Keep praying
  - Pray continually
  lexicon: BDAG
  rationale: Present middle/passive imperative, second person plural. English imperative
    'Pray' is natural and sufficient; the present aspect may imply ongoing action,
    but making that explicit in the main text would overtranslate.
- source_word: περὶ ἡμῶν
  chosen: for us
  alternatives:
  - concerning us
  - about us
  lexicon: BDAG
  rationale: With prayer language, περί + genitive is idiomatically 'for' rather than
    the more literal 'concerning/about.'
- source_word: πειθόμεθα
  chosen: we are convinced
  alternatives:
  - we are persuaded
  - we are confident
  lexicon: BDAG
  rationale: Perfectly natural rendering of the present middle/passive form in context.
    The sense is the writers' settled persuasion about their moral standing. 'Confident'
    is possible, but 'convinced' better reflects the cognitive force of πείθω.
- source_word: καλὴν συνείδησιν
  chosen: a good conscience
  alternatives:
  - a clear conscience
  lexicon: BDAG
  rationale: Standard rendering preserving both adjective and noun. 'Clear conscience'
    is idiomatic English but interprets καλὴν more specifically than necessary.
- source_word: ἔχομεν
  chosen: we have
  lexicon: BDAG
  rationale: Simple present indicative; no reason to paraphrase.
- source_word: ἐν πᾶσιν
  chosen: in everything
  alternatives:
  - in all things
  - in every respect
  lexicon: BDAG
  rationale: Neuter plural with ἐν is best taken adverbially and comprehensively.
    'In everything' is clear modern English.
- source_word: καλῶς
  chosen: well
  alternatives:
  - honorably
  - rightly
  lexicon: BDAG
  rationale: Adverb modifying the infinitive ἀναστρέφεσθαι. 'Well' is broad and natural;
    'honorably' is attractive in context but slightly more interpretive.
- source_word: θέλοντες
  chosen: since we want
  alternatives:
  - desiring
  - wanting
  - because we desire
  lexicon: BDAG
  rationale: Present participle expressing the writers' ongoing intention or desire.
    Rendering it with 'since we want' makes the participial relation intelligible
    in English without excessive literalism.
- source_word: ἀναστρέφεσθαι
  chosen: to conduct ourselves
  alternatives:
  - to live
  - to behave
  lexicon: BDAG
  rationale: The verb commonly refers to one's manner of life or conduct. 'Conduct
    ourselves' preserves the ethical nuance better than the broader 'live' and is
    less narrow than 'behave'.
