theological_decisions:
- issue: Relation of 'ἐν αἵματι διαθήκης αἰωνίου' to the resurrection clause
  chosen_reading: Attached to God's act of bringing Jesus up, rendered instrumentally
    as 'by the blood of an eternal covenant'
  alternative_readings:
  - Attached primarily to 'the great shepherd of the sheep' ('the great shepherd of
    the sheep in/by the blood of an eternal covenant')
  - Rendered more explicitly as 'through the blood of the eternal covenant'
  rationale: The Greek placement allows some ambiguity, but in context the phrase
    most naturally qualifies the divine action in the benediction. The translation
    preserves this without expanding into a doctrinal paraphrase about atonement mechanics.
  doctrine_reference: Preserve theological tension rather than resolve it.
