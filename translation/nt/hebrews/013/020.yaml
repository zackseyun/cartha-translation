id: HEB.13.20
reference: Hebrews 13:20
source:
  edition: SBLGNT
  text: Ὁ δὲ θεὸς τῆς εἰρήνης, ὁ ἀναγαγὼν ἐκ νεκρῶν τὸν ποιμένα τῶν προβάτων τὸν μέγαν
    ἐν αἵματι διαθήκης αἰωνίου, τὸν κύριον ἡμῶν Ἰησοῦν,
translation:
  text: Now may the God of peace, who brought up from the dead our Lord Jesus, the
    great shepherd of the sheep, by the blood of an eternal covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who raised from the dead our Lord Jesus ... through the blood of the
      eternal covenant.' The Greek allows slightly different construals of the phrase
      'in/by the blood of an eternal covenant.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁ δὲ
  chosen: Now
  alternatives:
  - And
  - But
  - Now then
  lexicon: BDAG
  rationale: δέ here marks a transition from exhortation to benediction/prayer. 'Now'
    is natural English that preserves the discourse shift without overemphasizing
    contrast.
- source_word: θεὸς τῆς εἰρήνης
  chosen: the God of peace
  alternatives:
  - the peaceful God
  lexicon: BDAG
  rationale: A standard genitive construction meaning God characterized by or associated
    with peace. 'God of peace' is both idiomatic and theologically established without
    adding interpretation.
- source_word: ὁ ἀναγαγὼν
  chosen: who brought up
  alternatives:
  - who raised
  - who brought back
  lexicon: BDAG
  rationale: ἀνάγω literally means 'bring up' or 'lead up.' In resurrection context
    it can function as 'raise up,' but 'brought up' preserves the verbal imagery and
    fits the prepositional phrase 'from the dead.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - out from the dead ones
  lexicon: BDAG
  rationale: Idiomatic resurrection formula in Greek and standard English equivalent.
- source_word: τὸν ποιμένα τῶν προβάτων τὸν μέγαν
  chosen: the great shepherd of the sheep
  alternatives:
  - the great shepherd of the flock
  - the shepherd of the sheep, the great one
  lexicon: BDAG
  rationale: This preserves the appositional structure and the pastoral metaphor.
    'Sheep' is more literal than 'flock' for πρόβατα.
- source_word: ἐν αἵματι
  chosen: by the blood
  alternatives:
  - in the blood
  - through the blood
  lexicon: BDAG
  rationale: ἐν here is instrumental or associative. 'By the blood' is concise and
    natural in English, expressing means or basis without overdefining the relation.
- source_word: διαθήκης αἰωνίου
  chosen: of an eternal covenant
  alternatives:
  - of the eternal covenant
  - of an everlasting covenant
  lexicon: BDAG
  rationale: διαθήκη is best rendered 'covenant' in Hebrews given the book's covenantal
    argument. The anarthrous phrase is naturally rendered with an indefinite article
    in English, though the sense may still evoke the known new covenant.
- source_word: τὸν κύριον ἡμῶν Ἰησοῦν
  chosen: our Lord Jesus
  alternatives:
  - Jesus our Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default. The Greek apposition
    identifies the one brought up from the dead as 'our Lord Jesus.'
