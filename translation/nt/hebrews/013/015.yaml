id: HEB.13.15
reference: Hebrews 13:15
source:
  edition: SBLGNT
  text: δι’ αὐτοῦ ⸀οὖν ἀναφέρωμεν θυσίαν αἰνέσεως διὰ παντὸς τῷ θεῷ, τοῦτ’ ἔστιν καρπὸν
    χειλέων ὁμολογούντων τῷ ὀνόματι αὐτοῦ.
translation:
  text: Therefore, through him let us continually offer up to God a sacrifice of praise—that
    is, the fruit of lips confessing his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'always' or 'at all times.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fruit of our lips'; 'our' is supplied in some English renderings
      but is not explicit in the Greek.
    reason: lexical_alternative
  - marker: c
    text: Or 'acknowledging his name.' The Greek verb can denote open confession or
      acknowledgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: 'διά with the genitive normally expresses agency or means. ''Through
    him'' best preserves the mediatorial sense in context: access and offering are
    made by means of Christ.'
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' clearly signals
    the logical connection in natural English.
- source_word: ἀναφέρωμεν
  chosen: let us ... offer up
  alternatives:
  - let us offer
  - we should offer up
  lexicon: BDAG
  rationale: First person plural present active subjunctive functioning as a hortatory
    subjunctive. 'Let us ... offer up' preserves both the exhortational force and
    the sacrificial nuance of ἀναφέρω.
- source_word: θυσίαν αἰνέσεως
  chosen: a sacrifice of praise
  alternatives:
  - a praise sacrifice
  lexicon: BDAG
  rationale: A natural rendering of the genitive construction that preserves sacrificial
    imagery while remaining idiomatic English. It also echoes the Old Testament background
    without becoming wooden.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - at all times
  lexicon: BDAG
  rationale: The phrase means 'continually/constantly.' 'Continually' is concise and
    fits the exhortational flow.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: Dative of indirect object/recipient. 'To God' is the most straightforward
    rendering in the context of offering sacrifice.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - namely
  - which is
  lexicon: BDAG
  rationale: Introduces an explanatory restatement of what the sacrifice of praise
    consists in.
- source_word: καρπὸν χειλέων
  chosen: the fruit of lips
  alternatives:
  - fruit from lips
  - the fruit of our lips
  lexicon: BDAG
  rationale: Retains the metaphor and echoes the scriptural idiom behind the phrase.
    'Our' is not explicit in the Greek and is therefore omitted.
- source_word: ὁμολογούντων
  chosen: confessing
  alternatives:
  - acknowledging
  - praising
  - giving thanks
  lexicon: BDAG
  rationale: The participle modifies 'lips' and denotes open acknowledgment/confession.
    'Confessing' preserves the verbal link to public acknowledgment of God's name
    better than the more interpretive 'praising' or 'giving thanks'.
- source_word: τῷ ὀνόματι αὐτοῦ
  chosen: his name
  alternatives:
  - to his name
  lexicon: BDAG
  rationale: Although the Greek uses a dative after ὁμολογέω, idiomatic English says
    'confessing his name.' This preserves the sense of openly acknowledging who he
    is.
