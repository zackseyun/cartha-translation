theological_decisions:
- issue: Referent of 'him' in δι’ αὐτοῦ
  chosen_reading: 'Christ is the referent, yielding a mediatorial sense: believers
    offer praise to God through Christ.'
  alternative_readings:
  - A more generic 'through him' without explicit theological elaboration
  rationale: The immediate context of Hebrews centers on Jesus' priestly and sacrificial
    mediation (especially the preceding verses). The translation leaves the pronoun
    as 'him' rather than expanding to 'Messiah' or 'Jesus,' but the wording 'through
    him' preserves the text's mediatorial theology without over-interpretation.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Force of sacrificial language
  chosen_reading: Retain literal sacrificial imagery in 'offer up' and 'sacrifice
    of praise.'
  alternative_readings:
  - Flattening to 'give praise'
  rationale: The verse intentionally frames Christian praise in sacrificial terms.
    Preserving that imagery maintains the theological continuity between old covenant
    sacrifice and new covenant worship without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1 and §6
