id: HEB.13.23
reference: Hebrews 13:23
source:
  edition: SBLGNT
  text: γινώσκετε τὸν ἀδελφὸν ⸀ἡμῶν Τιμόθεον ἀπολελυμένον, μεθ’ οὗ ἐὰν τάχιον ἔρχηται
    ὄψομαι ὑμᾶς.
translation:
  text: Know that our brother Timothy has been released, with whom I will see you
    if he comes soon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has been set free,' possibly from imprisonment; the verb can also mean
      'has been sent away' or 'dismissed,' but 'released' best fits the likely context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  chosen: Know
  alternatives:
  - Be informed
  - You should know
  lexicon: BDAG
  rationale: Present active imperative/plural used epistolarily to inform the audience.
    'Know' is concise and natural in English, preserving the imperative force without
    over-paraphrasing.
- source_word: ἀδελφὸν ἡμῶν
  chosen: our brother
  alternatives:
  - our fellow brother
  lexicon: BDAG
  rationale: Standard Christian familial language in context. Singular masculine refers
    specifically to Timothy, so 'brother' is both gender-accurate and contextually
    precise.
- source_word: Τιμόθεον
  chosen: Timothy
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: ἀπολελυμένον
  chosen: has been released
  alternatives:
  - has been set free
  - has been sent away
  - has been dismissed
  lexicon: BDAG
  rationale: Perfect passive participle of ἀπολύω. In this context the most likely
    sense is release from custody or confinement, a common understanding in Heb 13:23.
    'Has been released' preserves the completed action with present relevance. Alternative
    senses are possible lexically, so they are preserved in a footnote.
- source_word: μεθ’ οὗ
  chosen: with whom
  alternatives:
  - with him
  lexicon: BDAG
  rationale: Relative construction naturally rendered 'with whom' in formal but readable
    English, linking Timothy to the author's prospective visit.
- source_word: ἐὰν τάχιον ἔρχηται
  chosen: if he comes soon
  alternatives:
  - if he comes more quickly
  - if he comes shortly
  lexicon: BDAG
  rationale: τάχιον is comparative in form ('more quickly/sooner'), but idiomatic
    English in this context is 'soon.' The clause expresses contingency regarding
    Timothy's arrival.
- source_word: ὄψομαι ὑμᾶς
  chosen: I will see you
  alternatives:
  - I will visit you
  lexicon: BDAG
  rationale: Future middle of ὁράω literally means 'I will see.' 'Visit' captures
    implication but is more interpretive; the more direct rendering is preferred in
    the main text.
