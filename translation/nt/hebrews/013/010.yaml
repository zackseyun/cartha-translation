theological_decisions:
- issue: Referent of 'altar' in Hebrews 13:10
  chosen_reading: Retain the concrete term 'altar' without specifying its referent
    in the main text.
  alternative_readings:
  - Christ himself
  - the cross
  - the heavenly altar
  - the sacrificial benefits of Christ's offering
  rationale: The verse is theologically dense and interpreters differ on what the
    'altar' specifically denotes. To preserve the text's theological tension and avoid
    importing a doctrinally narrowed interpretation, the translation keeps the literal
    cultic image in the main text and notes the interpretive possibilities separately.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
