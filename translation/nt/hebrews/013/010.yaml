id: HEB.13.10
reference: Hebrews 13:10
source:
  edition: SBLGNT
  text: ἔχομεν θυσιαστήριον ἐξ οὗ φαγεῖν οὐκ ἔχουσιν ἐξουσίαν οἱ τῇ σκηνῇ λατρεύοντες.
translation:
  text: We have an altar from which those who serve at the tabernacle have no right
    to eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'those who minister in the tent/tabernacle.' The
      phrase refers to those engaged in the old covenant sanctuary service.
    reason: lexical_alternative
  - marker: b
    text: The 'altar' is interpreted variously as Christ himself, the cross, the heavenly
      altar, or the sacrificial benefits of Christ's offering. The Greek leaves the
      image stated without further specification here.
    reason: alternative_reading
lexical_decisions:
- source_word: θυσιαστήριον
  chosen: altar
  alternatives:
  - sacrificial altar
  lexicon: BDAG
  rationale: The standard sense is 'altar.' In Hebrews this likely carries typological/theological
    weight, but the noun itself should be translated straightforwardly rather than
    interpreted as 'sacrifice' or 'cross' in the main text.
- source_word: ἐξ οὗ
  chosen: from which
  alternatives:
  - from it
  lexicon: BDAG
  rationale: 'The preposition ἐκ with the relative pronoun naturally expresses source:
    ''from which.'' This fits the following infinitive ''to eat'' and preserves the
    imagery of eating from an altar.'
- source_word: φαγεῖν
  chosen: to eat
  lexicon: BDAG
  rationale: Aorist infinitive of ἐσθίω, best rendered simply 'to eat.' English idiom
    with 'have no right' makes the infinitive natural.
- source_word: οὐκ ἔχουσιν ἐξουσίαν
  chosen: have no right
  alternatives:
  - have no authority
  - are not permitted
  lexicon: BDAG
  rationale: ἐξουσία can mean authority, right, or freedom. In this cultic context,
    'have no right' best conveys lack of authorized privilege to partake.
- source_word: οἱ τῇ σκηνῇ λατρεύοντες
  chosen: those who serve at the tabernacle
  alternatives:
  - those who minister in the tabernacle
  - those who worship at the tent
  lexicon: BDAG
  rationale: λατρεύω here denotes cultic service, not merely general worship. σκηνή
    in Hebrews evokes the tabernacle/tent sanctuary; 'tabernacle' is the clearest
    established English equivalent in this context. 'At the tabernacle' is idiomatic
    for the dative construction and avoids over-literal awkwardness.
- source_word: ἔχομεν
  chosen: We have
  lexicon: BDAG
  rationale: Present indicative, retained as a simple present. The author includes
    himself and his audience in present possession/access.
