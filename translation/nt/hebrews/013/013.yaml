theological_decisions:
- issue: Referent of 'him'
  chosen_reading: '''him'' refers to Jesus, implied from the immediate context (13:12)'
  rationale: The verse exhorts believers to identify with Jesus in his rejection and
    suffering outside the city/camp imagery. The translation keeps the pronoun rather
    than replacing it with 'Jesus' because the Greek uses the pronoun and the referent
    is contextually clear.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Meaning of 'outside the camp'
  chosen_reading: Retain the metaphor/cultic image rather than paraphrasing it
  alternative_readings:
  - outside the religious establishment
  - outside the community
  rationale: The phrase evokes Levitical sacrificial practice and social-religious
    exclusion in the argument of Hebrews 13:11–13. A paraphrase would flatten the
    intertextual and theological force. The literal image is understandable in English
    and should be preserved.
  doctrine_reference: Optimal equivalence; never paraphrase beyond what the source
    text warrants.
