id: HEB.13.13
reference: Hebrews 13:13
source:
  edition: SBLGNT
  text: τοίνυν ἐξερχώμεθα πρὸς αὐτὸν ἔξω τῆς παρεμβολῆς, τὸν ὀνειδισμὸν αὐτοῦ φέροντες.
translation:
  text: Therefore, let us go out to him outside the camp, bearing his reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'outside the encampment.' The phrase evokes the sacrificial imagery of
      Lev 16 and the rejection borne by Jesus outside the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοίνυν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Inferential particle drawing a conclusion from the preceding argument
    (especially 13:11–12). 'Therefore' best preserves the logical force in natural
    English.
- source_word: ἐξερχώμεθα
  chosen: let us go out
  alternatives:
  - let us go forth
  - let us depart
  lexicon: BDAG
  rationale: First person plural present middle subjunctive used hortatorily. 'Let
    us go out' is clear modern English and preserves the exhortational force without
    archaic diction.
- source_word: πρὸς αὐτὸν
  chosen: to him
  alternatives:
  - toward him
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person. 'To him'
    is the most idiomatic rendering in this exhortational context.
- source_word: ἔξω τῆς παρεμβολῆς
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: BDAG
  rationale: παρεμβολή can denote camp/encampment. In Hebrews' cultic and wilderness
    imagery, 'camp' is the established and clearest English equivalent, echoing the
    sacrificial background of the preceding verses.
- source_word: τὸν ὀνειδισμὸν αὐτοῦ
  chosen: his reproach
  alternatives:
  - his disgrace
  - the insult directed at him
  lexicon: BDAG
  rationale: ὀνειδισμός denotes reproach, insult, or disgrace. 'Reproach' preserves
    both the social shame dimension and the biblical resonance of sharing in Messiah's
    rejected status.
- source_word: φέροντες
  chosen: bearing
  alternatives:
  - carrying
  - enduring
  lexicon: BDAG
  rationale: Present active participle modifying the implied subject 'us.' 'Bearing'
    naturally conveys ongoing willing acceptance of reproach and fits the idiom 'bearing
    reproach' better than 'carrying'; 'enduring' is interpretive rather than lexical.
