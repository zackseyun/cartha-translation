theological_decisions:
- issue: Cultic reference of εἰς τὰ ἅγια
  chosen_reading: Rendered as 'into the holy places' rather than specifying 'Most
    Holy Place.'
  alternative_readings:
  - into the sanctuary
  - into the Most Holy Place
  rationale: Hebrews uses τὰ ἅγια with some flexibility for the sacred sanctuary domain.
    This verse alludes to Day of Atonement and related sacrificial procedure, but
    the Greek here does not itself require the narrower English 'Most Holy Place.'
    Preserving the broader phrase avoids importing more specificity than the text
    states while retaining the cultic setting.
  doctrine_reference: Translation philosophy §§1, 3, 5
