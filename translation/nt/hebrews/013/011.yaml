id: HEB.13.11
reference: Hebrews 13:11
source:
  edition: SBLGNT
  text: ὧν γὰρ εἰσφέρεται ζῴων τὸ αἷμα περὶ ἁμαρτίας εἰς τὰ ἅγια διὰ τοῦ ἀρχιερέως,
    τούτων τὰ σώματα κατακαίεται ἔξω τῆς παρεμβολῆς·
translation:
  text: For the bodies of those animals whose blood is brought into the holy places
    for sin by the high priest are burned outside the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the sanctuary.' The Greek says 'into the holy places,' a cultic
      expression for the sacred sanctuary area.
    reason: lexical_alternative
  - marker: b
    text: Or 'are completely burned up.' The verb can emphasize thorough burning.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν ... ζῴων
  chosen: those animals
  alternatives:
  - those living creatures
  - such animals
  lexicon: BDAG
  rationale: The genitive plural relative construction refers back generically to
    sacrificial animals. 'Animals' is the most natural and contextually precise English
    rendering in a sacrificial context.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation grounding the previous statement, and 'For'
    preserves the logical connection in readable English.
- source_word: εἰσφέρεται
  chosen: is brought into
  alternatives:
  - is carried into
  - is taken into
  lexicon: BDAG
  rationale: Passive present indicates the blood is brought into the sanctuary area.
    'Is brought into' is idiomatic and sufficiently formal.
- source_word: τὸ αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal sacrificial reference; no reason to paraphrase.
- source_word: περὶ ἁμαρτίας
  chosen: for sin
  alternatives:
  - concerning sin
  - as a sin offering
  lexicon: BDAG
  rationale: In sacrificial contexts this phrase can denote relation to sin and often
    functions like 'for sin.' 'For sin' is concise and preserves the cultic sense
    without over-specifying 'sin offering' where the Greek phrase itself is broader.
- source_word: εἰς τὰ ἅγια
  chosen: into the holy places
  alternatives:
  - into the sanctuary
  - into the Most Holy Place
  lexicon: BDAG
  rationale: The plural τὰ ἅγια in Hebrews commonly refers to the sacred sanctuary
    realm. 'Holy places' preserves the plural form and cultic register. 'Most Holy
    Place' would be too specific here, while 'sanctuary' is a viable smoother alternative
    preserved in a footnote.
- source_word: διὰ τοῦ ἀρχιερέως
  chosen: by the high priest
  alternatives:
  - through the high priest
  lexicon: BDAG
  rationale: διά with the genitive can mean agency or instrumentality. In English,
    'by the high priest' communicates the priestly agency naturally in this ritual
    description.
- source_word: τούτων τὰ σώματα
  chosen: the bodies of those animals
  alternatives:
  - their bodies
  lexicon: BDAG
  rationale: The demonstrative resumes the antecedent animals. Expanding to 'the bodies
    of those animals' avoids ambiguity and mirrors the Greek resumptive structure
    more clearly than a bare pronoun.
- source_word: κατακαίεται
  chosen: are burned
  alternatives:
  - are completely burned up
  - are consumed by fire
  lexicon: BDAG
  rationale: The verb intensifies burning, but standard English 'are burned' communicates
    the ritual action without awkwardness. The stronger nuance 'burned up' is worth
    preserving in a footnote as a lexical alternative.
- source_word: ἔξω τῆς παρεμβολῆς
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: BDAG
  rationale: This is the established and accurate rendering for the Israelite camp
    in wilderness/tabernacle imagery, and Hebrews 13 continues to exploit that typology.
