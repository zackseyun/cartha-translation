id: HEB.13.2
reference: Hebrews 13:2
source:
  edition: SBLGNT
  text: τῆς φιλοξενίας μὴ ἐπιλανθάνεσθε, διὰ ταύτης γὰρ ἔλαθόν τινες ξενίσαντες ἀγγέλους.
translation:
  text: Do not neglect hospitality, for through it some have entertained angels without
    knowing it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some have hosted messengers without knowing it.' The Greek word can
      mean either 'angels' or 'messengers,' though 'angels' best fits the likely allusion
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλοξενίας
  chosen: hospitality
  alternatives:
  - love of strangers
  - hospitality to strangers
  lexicon: BDAG
  rationale: The noun literally denotes love or welcome for strangers, but in idiomatic
    English 'hospitality' best captures the practice in a natural and established
    way. The broader sense toward strangers is implicit in the term and context.
- source_word: μὴ ἐπιλανθάνεσθε
  chosen: Do not neglect
  alternatives:
  - do not forget
  - do not overlook
  lexicon: BDAG
  rationale: The verb means 'forget' or 'neglect.' In this exhortational context,
    English 'do not neglect' communicates not merely mental lapse but failure to practice
    hospitality, which fits the paraenetic force better than a strictly cognitive
    'do not forget.'
- source_word: διὰ ταύτης
  chosen: through it
  alternatives:
  - by this
  - through this practice
  lexicon: BDAG
  rationale: The feminine pronoun refers back to hospitality. 'Through it' is concise
    and natural, preserving the instrumental sense of διά.
- source_word: ἔλαθόν
  chosen: have entertained ... without knowing it
  alternatives:
  - have unknowingly entertained
  - were unaware that they entertained
  lexicon: BDAG
  rationale: 'The aorist of λανθάνω with participle construction conveys that something
    happened without the subject''s awareness. In English this is best expressed by
    making the lack of awareness explicit: ''have entertained angels without knowing
    it.'' This preserves the idiomatic sense rather than translating λανθάνω woodenly
    as ''escaped notice.'''
- source_word: τινες
  chosen: some
  alternatives:
  - certain people
  lexicon: BDAG
  rationale: An indefinite plural is most naturally rendered 'some' in English.
- source_word: ξενίσαντες
  chosen: have entertained
  alternatives:
  - have shown hospitality to
  - have hosted
  lexicon: BDAG
  rationale: The participle is cognate with hospitality/stranger language and refers
    to receiving or hosting guests. 'Entertained' is the traditional concise rendering
    and in this context means hosted hospitably, not amused.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: Although ἄγγελος can mean either 'messenger' or 'angel,' the allusion
    is almost certainly to narratives such as Abraham and Lot receiving heavenly visitors
    (Gen 18–19). 'Angels' is therefore the most contextually appropriate rendering,
    while the lexical alternative is preserved in a footnote.
