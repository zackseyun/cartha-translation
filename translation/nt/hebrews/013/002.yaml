theological_decisions:
- issue: Referent and force of ἀγγέλους
  chosen_reading: angels in the supernatural sense
  alternative_readings:
  - messengers in a human sense
  rationale: The immediate context and likely allusion to Old Testament episodes of
    hospitality toward heavenly visitors favor the supernatural reading. This does
    not require embellishment beyond the text, but it does justify translating ἄγγελος
    as 'angels' rather than the more generic 'messengers.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it only where ambiguity
    is genuine.'
