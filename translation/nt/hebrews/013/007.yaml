id: HEB.13.7
reference: Hebrews 13:7
source:
  edition: SBLGNT
  text: Μνημονεύετε τῶν ἡγουμένων ὑμῶν, οἵτινες ἐλάλησαν ὑμῖν τὸν λόγον τοῦ θεοῦ,
    ὧν ἀναθεωροῦντες τὴν ἔκβασιν τῆς ἀναστροφῆς μιμεῖσθε τὴν πίστιν.
translation:
  text: Remember your leaders, who spoke the word of God to you. As you consider the
    outcome of their way of life, imitate their faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their faithfulness." The Greek word can mean either faith or faithfulness;
      the main text follows the project's default rendering "faith."
    reason: alternative_reading
  - marker: b
    text: '"Outcome" could also be rendered "end" or, in some interpretations, refer
      specifically to the manner of their death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνημονεύετε
  chosen: Remember
  alternatives:
  - Keep remembering
  - Call to mind
  lexicon: BDAG
  rationale: Present imperative calls for ongoing remembrance; 'Remember' is idiomatic
    English and can carry the durative force in context without awkwardness.
- source_word: τῶν ἡγουμένων ὑμῶν
  chosen: your leaders
  alternatives:
  - those leading you
  - your rulers
  lexicon: BDAG
  rationale: ἡγούμενοι here refers to recognized leaders in the community. 'Leaders'
    is natural modern English and avoids the overly political or authoritarian sense
    of 'rulers' while preserving real authority.
- source_word: οἵτινες ἐλάλησαν ὑμῖν τὸν λόγον τοῦ θεοῦ
  chosen: who spoke the word of God to you
  alternatives:
  - who told you the word of God
  - who proclaimed God's word to you
  lexicon: BDAG
  rationale: λαλέω is straightforwardly 'speak.' 'The word of God' preserves the genitive
    construction and common biblical idiom.
- source_word: ἀναθεωροῦντες
  chosen: As you consider
  alternatives:
  - carefully observing
  - contemplating
  lexicon: BDAG
  rationale: The participle conveys attentive observation/reflection. 'As you consider'
    fits the flow in English and captures reflective attention rather than a mere
    glance.
- source_word: τὴν ἔκβασιν
  chosen: the outcome
  alternatives:
  - the result
  - the end
  lexicon: BDAG
  rationale: ἔκβασις can denote outcome or result, and in this context likely the
    end-result of the leaders' lives. 'Outcome' is broad enough to preserve the sense
    without over-specifying death or final destiny in the main text.
- source_word: τῆς ἀναστροφῆς
  chosen: of their way of life
  alternatives:
  - of their conduct
  - of their manner of life
  lexicon: BDAG
  rationale: ἀναστροφή commonly refers to conduct or way of life. 'Way of life' is
    readable modern English and includes both behavior and manner of living.
- source_word: μιμεῖσθε
  chosen: imitate
  alternatives:
  - follow the example of
  - copy
  lexicon: BDAG
  rationale: Direct imperative; 'imitate' is the standard and sufficiently clear rendering.
- source_word: τὴν πίστιν
  chosen: their faith
  alternatives:
  - their faithfulness
  - their trust
  lexicon: BDAG
  rationale: Per project defaults, πίστις is rendered 'faith' in the main text unless
    context strongly demands otherwise. Here the object of imitation could be understood
    as either faith or faithfulness; 'faith' is retained in the main text and the
    alternative is preserved in a footnote.
