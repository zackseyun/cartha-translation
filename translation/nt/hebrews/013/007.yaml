theological_decisions:
- issue: Meaning of πίστις in an imitable human context
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: The verse exhorts readers to imitate what characterized these leaders.
    πίστις can denote either faith or faithfulness, and both fit contextually. Following
    the project's default for πίστις, the main text uses 'faith,' while preserving
    'faithfulness' in a footnote to maintain the interpretive tension rather than
    resolving it absolutely.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table for πίστις'
- issue: Whether ἔκβασις implies specifically the leaders' death/martyrdom
  chosen_reading: outcome
  alternative_readings:
  - end
  - death
  rationale: Some interpreters take ἔκβασις as the final end of the leaders' lives,
    possibly martyrdom. The Greek term itself can more broadly denote outcome or result.
    'Outcome' preserves the lexical range without importing a more specific historical
    claim the verse does not explicitly state.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
