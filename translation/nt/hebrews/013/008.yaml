id: HEB.13.8
reference: Hebrews 13:8
source:
  edition: SBLGNT
  text: Ἰησοῦς Χριστὸς ἐχθὲς καὶ σήμερον ὁ αὐτός, καὶ εἰς τοὺς αἰῶνας.
translation:
  text: Jesus Messiah is the same yesterday and today and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ is the same yesterday and today and forever.' The Greek
      title Χριστός can be rendered 'Christ' or translated as 'Messiah.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name into English.
- source_word: Χριστὸς
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the translated title 'Messiah' rather than the transliterated
    'Christ,' following the doctrine guideline to translate titles where context supports
    title force. Here it identifies Jesus by his messianic office rather than functioning
    merely as a fixed surname.
- source_word: ἐχθὲς
  chosen: yesterday
  lexicon: BDAG
  rationale: Straightforward temporal adverb meaning 'yesterday,' retained literally
    as part of the triad.
- source_word: σήμερον
  chosen: today
  lexicon: BDAG
  rationale: Straightforward temporal adverb meaning 'today,' paired with 'yesterday'
    and 'forever' to express continuity.
- source_word: ὁ αὐτός
  chosen: is the same
  alternatives:
  - the same
  lexicon: BDAG
  rationale: The Greek predicate expression means 'the same.' English idiom normally
    supplies the copula, so 'is' is added for natural readability without changing
    sense.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  - for ever
  lexicon: BDAG
  rationale: Idiomatic rendering of the prepositional phrase meaning enduring perpetually.
    'Forever' communicates the sense in clear modern English better than the more
    wooden 'unto the ages.'
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  lexicon: BDAG
  rationale: The repeated conjunctions are preserved to maintain the rhythmic emphasis
    of the Greek temporal sequence.
