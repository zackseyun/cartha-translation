theological_decisions:
- issue: Gendered address in ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: Per the translation philosophy, grammatically masculine forms with representative
    force are rendered in a gender-accurate way in the main text rather than neutralized.
    Because the address likely includes the whole congregation, the inclusive sense
    is preserved in a footnote rather than imported into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
