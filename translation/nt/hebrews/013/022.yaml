id: HEB.13.22
reference: Hebrews 13:22
source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, ἀνέχεσθε τοῦ λόγου τῆς παρακλήσεως, καὶ γὰρ διὰ
    βραχέων ἐπέστειλα ὑμῖν.
translation:
  text: Now I urge you, brothers, bear with this word of exhortation, for I have written
    to you briefly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' which may address
      the whole congregation inclusively.
    reason: lexical_alternative
  - marker: b
    text: '''Word of exhortation'' may also be rendered ''message of encouragement.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: παρακαλέω can mean urge, appeal, exhort, or encourage depending on context.
    Here the author makes a personal request to the audience, and 'I urge' is natural
    modern English that preserves the earnest force without sounding overly formal.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' captures
    the discourse shift into a concluding appeal better than 'but'; it is preferable
    to leaving the particle untranslated because it contributes to the flow.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - brothers, sisters
  lexicon: BDAG
  rationale: The vocative plural literally means 'brothers.' Following the gender-accurate
    policy, the main text preserves the masculine form. Because the audience may well
    be mixed, an inclusive alternative is worth preserving in a footnote rather than
    replacing the source-shaped wording in the text.
- source_word: ἀνέχεσθε
  chosen: bear with
  alternatives:
  - put up with
  - listen patiently to
  - endure
  lexicon: BDAG
  rationale: ἀνέχομαι commonly means to endure, bear with, or put up with. In this
    epistolary request, 'bear with' best conveys patient acceptance of the message
    without the colloquial harshness of 'put up with' or the narrower sense of mere
    listening.
- source_word: τοῦ λόγου τῆς παρακλήσεως
  chosen: this word of exhortation
  alternatives:
  - the message of exhortation
  - this exhorting word
  - this word of encouragement
  lexicon: BDAG
  rationale: λόγος here refers to the communicated message, and παράκλησις in Hebrews
    carries the sense of exhortation/encouragement. 'Word of exhortation' is a recognizable
    idiom and likely echoes Acts 13:15. Adding 'this' makes the English natural and
    points to the present letter/sermon, though the demonstrative is implicit rather
    than explicit in Greek.
- source_word: καὶ γὰρ
  chosen: for
  alternatives:
  - indeed for
  - for also
  - for in fact
  lexicon: BDAG
  rationale: The combination gives explanatory support for the request just made.
    In idiomatic English, a simple 'for' best captures the causal-explanatory force
    without overtranslating both particles woodenly.
- source_word: διὰ βραχέων
  chosen: briefly
  alternatives:
  - in few words
  - in short
  - with brevity
  lexicon: BDAG
  rationale: The idiom means 'briefly' or 'in few words.' 'Briefly' is concise, natural
    English and fits the author's claim about the relative brevity of the composition.
- source_word: ἐπέστειλα
  chosen: I have written
  alternatives:
  - I wrote
  - I sent a letter
  lexicon: BDAG
  rationale: Although the aorist formally means 'I wrote' and the verb can denote
    sending a message or letter, in epistolary context English commonly uses the present
    perfect, 'I have written,' to reflect the letter now in the readers' hands. This
    is an optimal-equivalence adjustment for natural English.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - to all of you
  lexicon: BDAG
  rationale: The dative pronoun marks the recipients of the writing. 'To you' is the
    straightforward rendering.
