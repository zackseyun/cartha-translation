theological_decisions:
- issue: Referent of the doxological relative pronoun ᾧ ('to whom')
  chosen_reading: The doxology is left as 'to whom be the glory' without specifying
    the antecedent beyond the Greek relative construction.
  alternative_readings:
  - the glory is directed to the God of peace
  - the glory is directed to Jesus the Messiah
  rationale: The Greek relative pronoun could be taken to refer most immediately to
    Jesus the Messiah or more broadly to the God who is the subject of the prayer.
    Rather than resolve the ambiguity beyond the text, the translation preserves it
    with the standard relative clause and notes the alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
