id: HEB.13.21
reference: Hebrews 13:21
source:
  edition: SBLGNT
  text: καταρτίσαι ὑμᾶς ἐν ⸀παντὶ ἀγαθῷ εἰς τὸ ποιῆσαι τὸ θέλημα αὐτοῦ, ποιῶν ἐν ⸀ἡμῖν
    τὸ εὐάρεστον ἐνώπιον αὐτοῦ διὰ Ἰησοῦ Χριστοῦ, ᾧ ἡ δόξα εἰς τοὺς ⸀αἰῶνας· ἀμήν.
translation:
  text: may he equip you with every good thing to do his will, working in us what
    is pleasing before him through Jesus the Messiah, to whom be the glory forever.
    Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to whom' may refer specifically to Jesus the Messiah; some understand
      it instead to refer to the God of peace, the subject of the prayer.
    reason: alternative_reading
lexical_decisions:
- source_word: καταρτίσαι
  chosen: equip
  alternatives:
  - restore
  - prepare
  - make complete
  - perfect
  lexicon: BDAG
  rationale: In this benedictory prayer, the aorist optative asks that God furnish
    believers for obedience. 'Equip' is natural modern English and captures the sense
    of supplying what is needed better than the archaic 'make perfect' or the contextually
    less fitting 'restore'.
- source_word: ἐν παντὶ ἀγαθῷ
  chosen: with every good thing
  alternatives:
  - in every good thing
  - in all that is good
  lexicon: BDAG
  rationale: 'The phrase can be rendered woodenly as ''in every good [thing],'' but
    in English after ''equip'' the idiomatic sense is instrumental/supplied means:
    ''equip you with every good thing.'' This preserves the idea that God provides
    what is needed for obedience.'
- source_word: εἰς τὸ ποιῆσαι
  chosen: to do
  alternatives:
  - for doing
  - so that you may do
  lexicon: BDAG
  rationale: The articular infinitive expresses purpose. 'To do' is concise and natural,
    preserving the purposive force without over-expansion.
- source_word: θέλημα αὐτοῦ
  chosen: his will
  lexicon: BDAG
  rationale: Standard and precise rendering for God's desired purpose.
- source_word: ποιῶν
  chosen: working
  alternatives:
  - doing
  - producing
  - accomplishing
  lexicon: BDAG
  rationale: The participle describes God's ongoing action. 'Working' fits both the
    verbal aspect and the theological sense of divine activity within believers.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: 'The dative with ἐν most naturally indicates inward sphere here: God
    works within believers. ''Among us'' is possible but less likely in this immediate
    ethical context.'
- source_word: τὸ εὐάρεστον
  chosen: what is pleasing
  alternatives:
  - the pleasing thing
  - what is acceptable
  lexicon: BDAG
  rationale: The substantivized adjective is best rendered idiomatically as 'what
    is pleasing.' 'Acceptable' is possible, but 'pleasing' better reflects the relational
    sense before God.
- source_word: ἐνώπιον αὐτοῦ
  chosen: before him
  alternatives:
  - in his sight
  lexicon: BDAG
  rationale: '''Before him'' is a clear, direct rendering that preserves the Godward
    evaluative perspective.'
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus the Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as 'Messiah' where it functions
    as a title rather than a name-like form. Here the phrase retains titular force
    in a theological benediction, so 'Jesus the Messiah' is preferred.
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - to him
  lexicon: BDAG
  rationale: 'The relative pronoun introduces the doxology in standard English form:
    ''to whom be the glory.'''
- source_word: ἡ δόξα
  chosen: the glory
  alternatives:
  - glory
  lexicon: BDAG
  rationale: 'The article is retained in idiomatic doxological English: ''the glory.'''
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for the ages
  - unto the ages
  - forever and ever
  lexicon: BDAG
  rationale: The idiom denotes unending duration. 'Forever' is clear modern English;
    'forever and ever' is traditional but slightly more expansive than the Greek here.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration preserved in English Christian usage.
