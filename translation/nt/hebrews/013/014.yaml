id: HEB.13.14
reference: Hebrews 13:14
source:
  edition: SBLGNT
  text: οὐ γὰρ ἔχομεν ὧδε μένουσαν πόλιν, ἀλλὰ τὴν μέλλουσαν ἐπιζητοῦμεν·
translation:
  text: For we do not have a lasting city here, but we seek the one that is to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, "the coming city" or "the city to come."
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  chosen: For ... not
  alternatives:
  - because ... not
  - indeed ... not
  lexicon: BDAG
  rationale: γάρ is rendered "for" to connect this verse as a reason/explanation for
    the preceding exhortation. οὐ straightforwardly negates the clause.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: A simple present indicative best rendered with the ordinary English "have";
    "possess" is possible but less natural here.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  - on earth
  lexicon: BDAG
  rationale: ὧδε is a deictic adverb meaning "here." "On earth" would over-interpret
    the immediate adverbial sense, though it may be implied by context.
- source_word: μένουσαν
  chosen: lasting
  alternatives:
  - remaining
  - abiding
  - enduring
  lexicon: BDAG
  rationale: As a present active participle modifying πόλιν, it describes a city that
    remains or endures. "Lasting" is idiomatic modern English and preserves the contrast
    with the future city.
- source_word: πόλιν
  chosen: city
  alternatives:
  - civic center
  - homeland
  lexicon: BDAG
  rationale: The concrete noun πόλις is retained as "city." Broader interpretive glosses
    such as "homeland" go beyond the lexical form.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Marks strong contrast between the present lack and the future object
    of pursuit; "but" is the most natural English equivalent.
- source_word: τὴν μέλλουσαν
  chosen: the one that is to come
  alternatives:
  - the coming one
  - the future one
  - the city to come
  lexicon: BDAG
  rationale: The feminine participle refers back to πόλιν and is therefore translated
    with an English expression that preserves the implied noun without awkward repetition.
    "The one that is to come" keeps the future-oriented sense of μέλλω.
- source_word: ἐπιζητοῦμεν
  chosen: we seek
  alternatives:
  - we are seeking
  - we strive for
  - we eagerly seek
  lexicon: BDAG
  rationale: ἐπιζητέω can intensify ζητέω ('seek, look for, strive after'). "We seek"
    is clear and idiomatic; the intensified nuance is present in context without requiring
    an adverb in the main text.
