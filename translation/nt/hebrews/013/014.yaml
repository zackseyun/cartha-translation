theological_decisions:
- issue: Nature of the 'city' imagery
  chosen_reading: Retain 'city' as the text's metaphor for the believers' future dwelling/order
    rather than specifying 'heaven' or 'the heavenly Jerusalem' in the main text.
  alternative_readings:
  - heaven
  - the heavenly city
  - the heavenly Jerusalem
  rationale: The verse itself speaks of a present non-abiding city and a coming city.
    While Hebrews elsewhere develops heavenly-city imagery, this verse does not explicitly
    name heaven or Jerusalem, so the translation preserves the text's own wording
    and theological tension without importing a fuller interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
