id: HEB.10.9
reference: Hebrews 10:9
source:
  edition: SBLGNT
  text: τότε εἴρηκεν· Ἰδοὺ ἥκω τοῦ ⸀ποιῆσαι τὸ θέλημά σου· ἀναιρεῖ τὸ πρῶτον ἵνα τὸ
    δεύτερον στήσῃ.
translation:
  text: Then he has said, ‘Behold, I have come to do your will.’ He takes away the
    first so that he may establish the second.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He removes the first in order to establish the second.' Here 'the first'
      and 'the second' likely refer to the first arrangement of sacrifices and the
      second reality of God's will fulfilled in the Messiah's offering.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - thereupon
  lexicon: BDAG
  rationale: Temporal/sequential adverb linking this statement to the preceding citation
    and argument. 'Then' is natural English and preserves the discourse flow.
- source_word: εἴρηκεν
  chosen: he has said
  alternatives:
  - he said
  - he says
  lexicon: BDAG
  rationale: Perfect of λέγω can carry present relevance from a prior utterance. 'Has
    said' preserves the perfect aspect better than simple past and fits the author's
    use of Scripture as a still-speaking word.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retained as a marked deictic/interjection introducing the quoted declaration.
    'Behold' preserves the elevated, scriptural tone without paraphrase; 'Look' would
    be more colloquial.
- source_word: ἥκω
  chosen: I have come
  alternatives:
  - I come
  - I am here
  lexicon: BDAG
  rationale: Though formally present, ἥκω commonly means 'have come' or 'am here,'
    emphasizing arrival with continuing presence. 'I have come' is idiomatic and matches
    the citation's force.
- source_word: τοῦ ποιῆσαι
  chosen: to do
  alternatives:
  - for doing
  - in order to do
  lexicon: BDAG
  rationale: Articular infinitive expressing purpose. English infinitive 'to do' is
    the most natural equivalent and sufficiently conveys purpose in context.
- source_word: τὸ θέλημά σου
  chosen: your will
  alternatives:
  - what you desire
  lexicon: BDAG
  rationale: θέλημα is a key theological term for God's will/purpose. 'Your will'
    is the standard and most precise rendering here.
- source_word: ἀναιρεῖ
  chosen: takes away
  alternatives:
  - removes
  - does away with
  - abolishes
  lexicon: BDAG
  rationale: In context the verb refers to setting aside the first order mentioned
    in the argument. 'Takes away' is a close, readable rendering and echoes the sacrificial
    context without overinterpreting as formal abolition.
- source_word: τὸ πρῶτον
  chosen: the first
  alternatives:
  - the first thing
  - the first arrangement
  lexicon: BDAG
  rationale: The adjective is substantival. 'The first' preserves the Greek's terseness;
    the referent is supplied by context as the first arrangement/order, not repeated
    in the text.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is clear modern English and preserves
    the logical relation.
- source_word: τὸ δεύτερον
  chosen: the second
  alternatives:
  - the second thing
  - the second arrangement
  lexicon: BDAG
  rationale: Substantival adjective parallel to 'the first.' Keeping the same concise
    form preserves the rhetorical contrast.
- source_word: στήσῃ
  chosen: he may establish
  alternatives:
  - he may set up
  - he may put in place
  - he may confirm
  lexicon: BDAG
  rationale: Aorist subjunctive of ἵστημι here means to establish or put into force.
    'Establish' best fits the covenantal/argumentative context and the contrast with
    'takes away.'
