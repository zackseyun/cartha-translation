theological_decisions:
- issue: Referent of 'the first' and 'the second'
  chosen_reading: The verse speaks of God, through the obedient coming of the Son,
    removing the first sacrificial arrangement/order in order to establish the second,
    namely the will of God fulfilled in Christ's self-offering.
  alternative_readings:
  - The first and second refer more narrowly to the two statements in the Psalm citation.
  - The first and second refer broadly to the old covenant and new covenant.
  rationale: The immediate context (Heb 10:8–10) contrasts sacrifices and offerings
    with the doing of God's will. The translation keeps the Greek's concise 'the first'/'the
    second' rather than importing a full interpretive expansion into the main text,
    thus preserving the theological tension while allowing the context to clarify
    the referents.
  doctrine_reference: Preserve theological tension rather than resolve it.
