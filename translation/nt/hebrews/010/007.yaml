id: HEB.10.7
reference: Hebrews 10:7
source:
  edition: SBLGNT
  text: τότε εἶπον· Ἰδοὺ ἥκω, ἐν κεφαλίδι βιβλίου γέγραπται περὶ ἐμοῦ, τοῦ ποιῆσαι,
    ὁ θεός, τὸ θέλημά σου.
translation:
  text: Then I said, ‘Behold, I have come—in the scroll of the book it is written
    about me—to do your will, O God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the roll of the book.” The phrase refers to a scroll, not a modern
      bound book.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb introducing the quoted response; 'Then' is the natural
    concise English equivalent.
- source_word: εἶπον
  chosen: I said
  alternatives:
  - I spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'I said' in narrative quotation
    formulae.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the marked deictic force and solemn scriptural tone of the citation
    better than the more colloquial 'look' or 'see.'
- source_word: ἥκω
  chosen: I have come
  alternatives:
  - I come
  - I am here
  lexicon: BDAG
  rationale: Although formally present, ἥκω commonly has perfective force ('have come,'
    'am here'). 'I have come' best conveys arrival with present relevance in this
    context.
- source_word: ἐν κεφαλίδι βιβλίου
  chosen: in the scroll of the book
  alternatives:
  - in the roll of the book
  - in the heading of the book
  lexicon: BDAG
  rationale: κεφαλίς in this idiom refers to a scroll/roll rather than a chapter heading.
    'Scroll of the book' is clear modern English and preserves the imagery of a written
    scroll.
- source_word: γέγραπται
  chosen: it is written
  alternatives:
  - it has been written
  lexicon: BDAG
  rationale: Standard English rendering of the perfect passive formula, preserving
    the abiding authority of what stands written.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  - of me
  lexicon: BDAG
  rationale: '''About me'' is idiomatic modern English and accurately reflects περί
    with the genitive.'
- source_word: τοῦ ποιῆσαι
  chosen: to do
  alternatives:
  - to accomplish
  - for doing
  lexicon: BDAG
  rationale: 'Articular infinitive expressing purpose/result in apposition to the
    coming: the speaker has come ''to do'' God''s will. ''Do'' is the most direct
    equivalent of ποιέω here.'
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: BDAG
  rationale: Vocative force is intended despite nominative form, a common usage in
    address. English should mark direct address explicitly as 'O God.'
- source_word: τὸ θέλημά σου
  chosen: your will
  alternatives:
  - what you desire
  lexicon: BDAG
  rationale: θέλημα is a key theological term meaning will/desire; 'your will' is
    the standard and most precise rendering in this context.
