theological_decisions:
- issue: Messianic self-reference in the Psalm citation applied in Hebrews
  chosen_reading: Translate straightforwardly as first-person speech without importing
    explicit christological expansion into the verse itself.
  alternative_readings:
  - Explicitly identify the speaker as the Messiah in the main text
  rationale: Hebrews applies the citation to the Son/Christ in context, but this verse's
    wording itself remains a first-person declaration. The translation should preserve
    the text as written and let the surrounding context establish the christological
    application.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
