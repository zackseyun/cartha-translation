theological_decisions:
- issue: Meaning of πίστις in contrast with ὑποστολή
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  rationale: Following the doctrine table, πίστις defaults to 'faith' in the main text. In this exhortational context, the term may include persevering fidelity, but the text does not require resolving the nuance beyond the default; the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Sense of περιποίησις ψυχῆς
  chosen_reading: the preserving of the soul
  alternative_readings:
  - the gaining of the soul
  - the preservation of life
  rationale: The immediate contrast with 'destruction' favors a preservation sense rather than acquisition. This avoids importing a doctrinally loaded notion of earning salvation while still reflecting the Greek noun's range.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
