id: HEB.10.39
reference: Hebrews 10:39
source:
  edition: SBLGNT
  text: ἡμεῖς δὲ οὐκ ἐσμὲν ὑποστολῆς εἰς ἀπώλειαν, ἀλλὰ πίστεως εἰς περιποίησιν ψυχῆς.
translation:
  text: But we are not of shrinking back to destruction, but of faith to the preservation of the soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drawing back.' The Greek term can denote retreat or withdrawal; some interpreters take it more strongly here as apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'faithfulness.' The Greek pistis can carry the sense of faithful perseverance as well as faith.
    reason: alternative_reading
  - marker: c
    text: Or 'for preservation,' 'for gaining,' or 'for possession of the soul/life.' The Greek phrase may refer to preserving one's life/self, not only 'soul' in a narrow modern sense.
    reason: lexical_alternative
  - marker: d
    text: Or 'to the preserving of the soul'.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡμεῖς
  chosen: we
  rationale: Explicit first-person plural pronoun retained for emphasis and contrast with the preceding warning context.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  rationale: Marks a strong contrast with the preceding statement; 'But' best captures the adversative force in natural English.
- source_word: οὐκ ἐσμὲν
  chosen: are not
  alternatives:
  - do not belong to
  - are not characterized by
  lexicon: BDAG
  rationale: A straightforward rendering of the copula with negation. Although the genitives that follow imply category or belonging, the Greek does not explicitly add a verb like 'belong'; keeping 'are not' preserves the concise force of the clause.
- source_word: ὑποστολῆς
  chosen: shrinking back
  alternatives:
  - drawing back
  - cowardice
  - apostasy
  lexicon: BDAG
  rationale: The noun denotes retreat or drawing back. 'Shrinking back' communicates the sense of fearful retreat without over-specifying it as full apostasy, which would import an interpretive conclusion stronger than the lexical data alone.
- source_word: εἰς ἀπώλειαν
  chosen: to destruction
  alternatives:
  - for destruction
  - to ruin
  - to perdition
  lexicon: BDAG
  rationale: εἰς expresses result or end. 'To destruction' is clear modern English and preserves the grave outcome without choosing the more traditional but less accessible 'perdition'.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  rationale: Simple adversative contrast between the two categories.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. Here it denotes the believing stance contrasted with shrinking back. 'Faithfulness' is possible as a nuance of persevering fidelity and is preserved in a footnote.
- source_word: εἰς περιποίησιν
  chosen: to the preserving
  alternatives:
  - for preservation
  - to obtaining
  - to possession
  lexicon: BDAG
  rationale: The noun can denote preservation, acquisition, or obtaining. In this context, contrasted with destruction, 'preserving' best reflects the semantic opposition and avoids implying meritorious self-acquisition of salvation.
- source_word: ψυχῆς
  chosen: of the soul
  alternatives:
  - of life
  - of the self
  - of the person
  lexicon: BDAG
  rationale: ψυχή here refers to the person's life/self in a salvific sense. 'Soul' preserves the traditional and theological weight of the term, while the footnote notes that the Greek can also denote 'life' or 'self' more broadly.
