  from: to the preserving of the soul
  to: to the preservation of the soul
  rationale: The Greek uses a noun, περιποίησιν, in a construction parallel to ἀπώλειαν ('destruction'). While the meaning is captured, rendering this with a gerund ('the preserving') is less natural in English than using the corresponding noun, 'preservation'. The suggested change improves the flow and creates a more direct noun-for-noun parallel with 'destruction' without altering the meaning.
