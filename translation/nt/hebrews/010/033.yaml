theological_decisions:
- issue: Meaning of ἀναστρεφομένων in context
  chosen_reading: understood as referring to those being treated in the same persecuted
    manner
  alternative_readings:
  - those conducting themselves in that way
  rationale: The immediate context concerns suffering, reproach, and solidarity with
    persecuted believers. Rendering the participle as passive-like 'were treated that
    way' preserves the contextual emphasis on shared persecution rather than shifting
    focus to moral conduct. This is an exegetical rather than doctrinally contested
    issue, so the alternative is preserved in a footnote for transparency.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    genuine ambiguity
