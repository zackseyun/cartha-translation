id: HEB.10.33
reference: Hebrews 10:33
source:
  edition: SBLGNT
  text: τοῦτο μὲν ὀνειδισμοῖς τε καὶ θλίψεσιν θεατριζόμενοι, τοῦτο δὲ κοινωνοὶ τῶν
    οὕτως ἀναστρεφομένων γενηθέντες·
translation:
  text: sometimes being publicly exposed to insults and afflictions, and at other
    times becoming partners with those who were treated that way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more vividly, 'being made a public spectacle.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly, 'becoming partners with those who lived/conducted themselves
      that way'; the Greek participle can in some contexts refer to manner of life,
      though here the persecution context favors 'were treated that way.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο μὲν ... τοῦτο δὲ
  chosen: sometimes ... and at other times
  alternatives:
  - partly ... and partly
  - on the one hand ... and on the other hand
  lexicon: BDAG
  rationale: The correlative structure marks two aspects of the readers' former endurance.
    In idiomatic English here, 'sometimes ... and at other times' best conveys alternating
    or dual experiences without sounding wooden.
- source_word: ὀνειδισμοῖς
  chosen: insults
  alternatives:
  - reproaches
  - public abuse
  - disgraces
  lexicon: BDAG
  rationale: The noun denotes verbal shame or reproach. 'Insults' is clear modern
    English and preserves the sense of hostile verbal abuse.
- source_word: θλίψεσιν
  chosen: afflictions
  alternatives:
  - tribulations
  - sufferings
  - hardships
  lexicon: BDAG
  rationale: The term refers to pressures or troubles inflicted on them. 'Afflictions'
    keeps the gravity of persecution-related suffering without narrowing it too much.
- source_word: θεατριζόμενοι
  chosen: being publicly exposed
  alternatives:
  - being made a public spectacle
  - being publicly humiliated
  lexicon: BDAG
  rationale: The verb evokes being displayed in a theater-like public setting as an
    object of scorn. 'Being publicly exposed' communicates the public-shaming element
    in readable English; the more vivid alternative 'made a public spectacle' is preserved
    in a footnote.
- source_word: κοινωνοὶ
  chosen: partners
  alternatives:
  - sharers
  - companions
  - participants
  lexicon: BDAG
  rationale: The word indicates sharing in the experience of others. 'Partners' communicates
    solidarity and participation in their suffering, not mere friendship.
- source_word: τῶν οὕτως ἀναστρεφομένων
  chosen: with those who were treated that way
  alternatives:
  - with those who lived that way
  - with those who conducted themselves in this way
  lexicon: BDAG
  rationale: Although ἀναστρέφω often means 'conduct oneself,' in passive/middle usage
    it can denote being dealt with or living under certain circumstances. In this
    persecution context, 'were treated that way' best fits the parallel with public
    reproach and affliction. The conduct-oriented alternative is possible but less
    likely here and is preserved in a footnote.
- source_word: γενηθέντες
  chosen: becoming
  alternatives:
  - having become
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as 'becoming' in smooth English
    within the coordinate structure, expressing entry into solidarity with the persecuted.
