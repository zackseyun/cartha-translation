id: HEB.10.6
reference: Hebrews 10:6
source:
  edition: SBLGNT
  text: ὁλοκαυτώματα καὶ περὶ ἁμαρτίας οὐκ εὐδόκησας.
translation:
  text: In whole burnt offerings and sin offerings you took no pleasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnt offerings and offerings for sin.' The Greek phrase περὶ ἁμαρτίας
      is an idiomatic sacrificial expression meaning an offering made for sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  - holocausts
  lexicon: BDAG
  rationale: The term denotes offerings wholly consumed by fire. 'Whole burnt offerings'
    makes that sense explicit and distinguishes it from more general sacrificial language.
    'Holocausts' is etymologically related but misleading in modern English.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two sacrificial categories.
- source_word: περὶ ἁμαρτίας
  chosen: sin offerings
  alternatives:
  - offerings for sin
  - concerning sin
  lexicon: BDAG
  rationale: In sacrificial contexts, the prepositional phrase functions idiomatically
    for the category of sacrifice offered for sin. 'Sin offerings' is the most natural
    and contextually precise English rendering, especially given the quotation's cultic
    background in the Greek Psalter.
- source_word: οὐκ
  chosen: 'no'
  alternatives:
  - not
  lexicon: BDAG
  rationale: Rendered idiomatically with 'took no pleasure' in English rather than
    the less natural 'did not take pleasure.' The negation itself is preserved fully.
- source_word: εὐδόκησας
  chosen: you took no pleasure
  alternatives:
  - you were not pleased
  - you did not delight
  lexicon: BDAG
  rationale: Aorist active indicative, second singular, addressed to God in the quoted
    speech. 'Took no pleasure' is natural English and preserves the volitional evaluative
    sense of εὐδοκέω without overstating emotional delight.
