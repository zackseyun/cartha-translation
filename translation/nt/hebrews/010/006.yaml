theological_decisions:
- issue: Rendering sacrificial terminology in a quotation from Psalm 40:6 LXX / Hebrews
    10 argument
  chosen_reading: Use explicit cultic terms 'whole burnt offerings' and 'sin offerings'
    without softening them into generic 'sacrifices.'
  alternative_readings:
  - burnt offerings and offerings for sin
  - burnt offerings and sacrifices for sin
  rationale: Hebrews' theological argument contrasts specific categories of Mosaic
    sacrifices with the obedient self-offering of the Son. Preserving the sacrificial
    specificity helps the reader follow the argument without importing additional
    doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
