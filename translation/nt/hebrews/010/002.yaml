id: HEB.10.2
reference: Hebrews 10:2
source:
  edition: SBLGNT
  text: ἐπεὶ οὐκ ἂν ἐπαύσαντο προσφερόμεναι, διὰ τὸ μηδεμίαν ἔχειν ἔτι συνείδησιν
    ἁμαρτιῶν τοὺς λατρεύοντας ἅπαξ ⸀κεκαθαρισμένους;
translation:
  text: Otherwise, would they not have stopped being offered, because those who worship,
    having once been cleansed, would no longer have any consciousness of sins?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conscience of sins.' The Greek expression can denote conscience, awareness,
      or consciousness of sins; here it refers to the continuing sense of guilt before
      God.
    reason: lexical_alternative
  - marker: b
    text: Or 'once for all been cleansed.' The adverb 'once' may carry a definitive,
      unrepeatable sense in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: Otherwise
  alternatives:
  - For then
  - Since
  lexicon: BDAG
  rationale: In this argumentative context, ἐπεί introduces a contrary-to-fact inference
    from the previous verse. 'Otherwise' captures the logical flow in natural English
    better than the more wooden 'for then,' while preserving the inferential force.
- source_word: οὐκ ἂν ἐπαύσαντο
  chosen: would they not have stopped
  alternatives:
  - would they not cease
  - would they not have ceased
  lexicon: BDAG
  rationale: The combination of οὐκ ἄν with the aorist middle indicative expresses
    a contrary-to-fact rhetorical question. 'Would they not have stopped' is idiomatic
    and preserves the hypothetical force.
- source_word: προσφερόμεναι
  chosen: being offered
  alternatives:
  - being presented
  - being brought as offerings
  lexicon: BDAG
  rationale: The present passive participle refers to the sacrifices of the previous
    verse continuing in cultic presentation. 'Being offered' is the standard and clearest
    sacrificial rendering.
- source_word: διὰ τὸ μηδεμίαν ἔχειν ἔτι
  chosen: because ... would no longer have any
  alternatives:
  - because of no longer having any
  - since ... would have no further
  lexicon: BDAG
  rationale: The articular infinitive with διά gives the reason. Rendering with 'because'
    produces clear English. ἔτι is best expressed as 'no longer' here, modifying the
    ongoing state after cleansing.
- source_word: συνείδησιν ἁμαρτιῶν
  chosen: consciousness of sins
  alternatives:
  - conscience of sins
  - awareness of sins
  lexicon: BDAG
  rationale: συνείδησις can mean 'conscience' or 'consciousness/awareness.' In Hebrews
    10 the point is not the destruction of moral conscience but the cessation of guilt-consciousness
    before God. 'Consciousness of sins' best fits the immediate argument and avoids
    implying moral insensibility.
- source_word: τοὺς λατρεύοντας
  chosen: those who worship
  alternatives:
  - the worshipers
  - those serving in worship
  lexicon: BDAG
  rationale: The participle functions substantivally for those engaged in cultic worship.
    'Those who worship' is natural English and preserves the verbal sense.
- source_word: ἅπαξ
  chosen: once
  alternatives:
  - once for all
  lexicon: BDAG
  rationale: ἅπαξ by itself means 'once' or 'once for all' depending on context. Here
    it modifies the completed cleansing of the worshipers. 'Once' is sufficient in
    the main text; the stronger idiomatic nuance 'once for all' is possible but not
    required by the single word alone in this clause.
- source_word: κεκαθαρισμένους
  chosen: having once been cleansed
  alternatives:
  - once having been purified
  - having been cleansed once for all
  lexicon: BDAG
  rationale: The perfect passive participle denotes a completed cleansing with abiding
    result. 'Having once been cleansed' preserves both the temporal adverb and the
    participial force in readable English.
