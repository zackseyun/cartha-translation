theological_decisions:
- issue: Meaning of συνείδησιν ἁμαρτιῶν in relation to worshipers after cleansing
  chosen_reading: Rendered as 'consciousness of sins' to denote ongoing guilt-awareness
    rather than the total absence of moral conscience.
  alternative_readings:
  - conscience of sins
  rationale: The verse argues that effective sacrifice would end repeated offerings
    because worshipers, once cleansed, would no longer remain burdened by sin-consciousness.
    This preserves the theological point of definitive cleansing without suggesting
    that believers lose ethical awareness of sin.
  doctrine_reference: Translation philosophy §3, §6
