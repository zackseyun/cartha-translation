theological_decisions:
- issue: Nature of sacrificial efficacy in Hebrews
  chosen_reading: The verse states that animal blood cannot take away sins in the
    ultimate sense intended by the argument.
  alternative_readings:
  - The sacrifices temporarily covered sins
  - The sacrifices provided ritual cleansing without final removal of sins
  rationale: The translation should not import a full doctrinal explanation into the
    main text. 'Take away sins' stays close to the Greek and preserves the author's
    contrast between repeated animal sacrifices and the definitive efficacy of Messiah's
    offering in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
