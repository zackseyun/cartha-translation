id: HEB.10.4
reference: Hebrews 10:4
source:
  edition: SBLGNT
  text: ἀδύνατον γὰρ αἷμα ταύρων καὶ τράγων ἀφαιρεῖν ἁμαρτίας.
translation:
  text: For it is impossible for the blood of bulls and goats to take away sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove sins.' The Greek verb can denote taking away or removing.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδύνατον
  chosen: it is impossible
  alternatives:
  - impossible
  - unable
  lexicon: BDAG
  rationale: Predicate adjective used impersonally with the infinitive ἀφαιρεῖν; English
    idiom is best expressed as 'it is impossible' rather than the bare adjective 'impossible.'
    This preserves the absolute force of the statement.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support to the preceding argument. 'For' is the
    most natural concise English connector and preserves the logical flow.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal sacrificial 'blood' is central to the argument in Hebrews and
    should be retained, not paraphrased as 'sacrifice' or 'death,' since the author
    explicitly names blood.
- source_word: ταύρων
  chosen: of bulls
  alternatives:
  - bulls'
  lexicon: BDAG
  rationale: Genitive plural dependent on αἷμα. 'The blood of bulls' is standard and
    clear English.
- source_word: τράγων
  chosen: and goats
  alternatives:
  - and male goats
  lexicon: BDAG
  rationale: τράγος specifically denotes a male goat, but in English sacrificial contexts
    'goats' is idiomatic and sufficiently precise unless sex distinction is exegetically
    foregrounded. The pairing 'bulls and goats' echoes Levitical sacrificial language
    naturally.
- source_word: ἀφαιρεῖν
  chosen: to take away
  alternatives:
  - to remove
  - to carry off
  lexicon: BDAG
  rationale: The infinitive expresses what the blood cannot do. 'Take away' is idiomatic
    in English and fits the cultic/theological context of removing sins, while preserving
    the concrete force better than a more abstract 'deal with.'
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sin
  lexicon: BDAG
  rationale: Plural accusative is explicit in the Greek and should be preserved as
    'sins,' referring to acts/guilt rather than flattening to the abstract singular.
