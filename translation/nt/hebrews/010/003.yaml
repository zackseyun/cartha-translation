theological_decisions:
- issue: Referent of αὐταῖς
  chosen_reading: The pronoun refers to the repeated sacrifices under the old covenant,
    made explicit as 'these sacrifices.'
  alternative_readings:
  - Leave the pronoun untranslated as 'in them'
  rationale: The immediate context (vv. 1–2) discusses the same sacrifices offered
    continually. Making the referent explicit aids clarity and does not alter theology;
    it preserves the author's contrast between repeated sacrifices and effective cleansing.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of κατ’ ἐνιαυτόν
  chosen_reading: Render as 'year after year' to emphasize repeated annual recurrence.
  alternative_readings:
  - every year
  - annually
  rationale: The phrase points to the annual repetition of sacrificial remembrance,
    likely with Day of Atonement background. 'Year after year' best conveys the ongoing
    repetition central to Hebrews' argument.
  doctrine_reference: Translation philosophy §6
