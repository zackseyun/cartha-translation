id: HEB.10.3
reference: Hebrews 10:3
source:
  edition: SBLGNT
  text: ἀλλ’ ἐν αὐταῖς ἀνάμνησις ἁμαρτιῶν κατ’ ἐνιαυτόν,
translation:
  text: But in these sacrifices there is a reminder of sins year after year,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  chosen: But
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Adversative conjunction linking this verse to the preceding claim that
    the sacrifices cannot perfect worshipers. 'But' is the most natural concise English
    adversative here.
- source_word: ἐν αὐταῖς
  chosen: in these sacrifices
  alternatives:
  - in them
  lexicon: BDAG
  rationale: The pronoun αὐταῖς refers back to the sacrifices of the previous context.
    Supplying 'sacrifices' in English makes the referent explicit and readable without
    adding new content.
- source_word: ἀνάμνησις
  chosen: a reminder
  alternatives:
  - remembrance
  - memorial
  lexicon: BDAG
  rationale: ἀνάμνησις denotes a bringing to mind or reminder. 'A reminder' is idiomatic
    modern English and fits the argument that the repeated sacrifices recall sins
    rather than remove them.
- source_word: ἁμαρτιῶν
  chosen: of sins
  alternatives:
  - about sins
  lexicon: BDAG
  rationale: Genitive dependent on ἀνάμνησις, naturally rendered 'of sins.' This preserves
    the sense that sins are what are being recalled.
- source_word: κατ’ ἐνιαυτόν
  chosen: year after year
  alternatives:
  - every year
  - year by year
  - annually
  lexicon: BDAG
  rationale: The idiom κατά + accusative of time here expresses recurrence each year.
    'Year after year' captures the repeated, ongoing force in natural English, slightly
    highlighting the cumulative repetition in context.
