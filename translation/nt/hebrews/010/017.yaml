theological_decisions:
- issue: Divine non-remembrance of sins
  chosen_reading: 'Render the statement straightforwardly as God''s covenantal refusal
    to hold sins against his people: ''I will no longer remember their sins and their
    lawless deeds.'''
  alternative_readings:
  - A more wooden rendering, 'I will certainly not remember anymore,' preserving the
    emphatic negation more explicitly
  rationale: The verse quotes God's promise of forgiveness in covenantal terms. 'Remember'
    should be preserved rather than paraphrased as 'bring up' or 'count against,'
    since the biblical idiom of divine remembering/non-remembering is theologically
    significant. The translation avoids importing a philosophical claim about divine
    omniscience; the text speaks of covenantal non-remembrance, not literal loss of
    knowledge.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
