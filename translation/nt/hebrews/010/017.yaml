id: HEB.10.17
reference: Hebrews 10:17
source:
  edition: SBLGNT
  text: ⸀καὶ τῶν ἁμαρτιῶν αὐτῶν καὶ τῶν ἀνομιῶν αὐτῶν οὐ μὴ ⸀μνησθήσομαι ἔτι·
translation:
  text: and I will no longer remember their sins and their lawless deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will certainly not remember their sins and their lawless
      deeds anymore.'
    reason: lexical_alternative
  - marker: b
    text: '''Lawless deeds'' translates ἀνομίαι, also rendered ''lawless acts'' or
      traditionally ''iniquities.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction. Retained at the start because this
    clause continues the citation and links with the preceding statement.
- source_word: τῶν ἁμαρτιῶν αὐτῶν
  chosen: their sins
  alternatives:
  - their sinful acts
  lexicon: BDAG
  rationale: ἁμαρτία is most naturally 'sin' here; plural genitive with αὐτῶν yields
    'their sins.' 'Sinful acts' is possible but less direct and less consistent with
    standard usage.
- source_word: καὶ τῶν ἀνομιῶν αὐτῶν
  chosen: and their lawless deeds
  alternatives:
  - and their lawless acts
  - and their iniquities
  lexicon: BDAG
  rationale: ἀνομία denotes lawlessness or violation of law. 'Lawless deeds' communicates
    the concrete plural sense in accessible English. 'Iniquities' is traditional but
    less transparent for modern readers.
- source_word: οὐ μὴ μνησθήσομαι
  chosen: I will no longer remember
  alternatives:
  - I will certainly not remember
  - I will never remember
  lexicon: BDAG
  rationale: The emphatic negation οὐ μὴ with future middle/passive strongly conveys
    decisive non-remembrance. 'I will no longer remember' captures both the force
    of the negation and the following ἔτι in natural English. 'Never' is possible,
    but with ἔτι the sense is more specifically 'no longer' or 'not anymore.'
- source_word: ἔτι
  chosen: no longer
  alternatives:
  - any longer
  - anymore
  lexicon: BDAG
  rationale: ἔτι means 'still, yet, any longer.' In combination with οὐ μὴ μνησθήσομαι,
    it is best brought into English as 'no longer,' integrated with the verb phrase
    for idiomatic clarity.
