theological_decisions:
- issue: Whether the washing language should be rendered in a way that explicitly
    identifies Christian baptism
  chosen_reading: Retain the text's cleansing imagery without specifying baptism in
    the main text
  alternative_readings:
  - Render more explicitly as baptismal washing
  - Treat entirely metaphorically as inward cleansing only
  rationale: Hebrews 10:22 uses sacrificial and purification imagery that may evoke
    baptism, Levitical washings, or both. The verse itself does not unambiguously
    require an explicit baptismal gloss, so the translation preserves the imagery
    and theological tension rather than resolving it denominationally.
  doctrine_reference: Translation philosophy §3; Affirmations (non-sectarian within
    ecumenical orthodoxy)
- issue: Whether 'evil conscience' should be softened to 'guilty conscience' for interpretive
    clarity
  chosen_reading: Translate πονηρᾶς formally as 'evil'
  alternative_readings:
  - guilty conscience
  rationale: The source text says 'evil,' not specifically 'guilty.' Using 'evil'
    avoids importing a narrower psychological interpretation and preserves the moral/ritual
    breadth of the Greek expression.
  doctrine_reference: Translation philosophy §1
