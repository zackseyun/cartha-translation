id: HEB.10.22
reference: Hebrews 10:22
source:
  edition: SBLGNT
  text: προσερχώμεθα μετὰ ἀληθινῆς καρδίας ἐν πληροφορίᾳ πίστεως, ῥεραντισμένοι τὰς
    καρδίας ἀπὸ συνειδήσεως πονηρᾶς καὶ λελουσμένοι τὸ σῶμα ὕδατι καθαρῷ·
translation:
  text: let us draw near with a true heart in full assurance of faith, with our hearts
    sprinkled clean from an evil conscience and our bodies washed with pure water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a sincere heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from a guilty conscience.'
    reason: lexical_alternative
  - marker: c
    text: The imagery may evoke ritual purification language and may also be heard
      by some readers as echoing baptism, but the verse does not explicitly identify
      the washing.
    reason: cultural_note
lexical_decisions:
- source_word: προσερχώμεθα
  chosen: let us draw near
  alternatives:
  - let us approach
  - let us come near
  lexicon: BDAG
  rationale: Present middle subjunctive, first person plural, functioning as a hortatory
    subjunctive. 'Let us draw near' is idiomatic, preserves the exhortational force,
    and matches the cultic/access-to-God context in Hebrews better than the flatter
    'approach.'
- source_word: ἀληθινῆς καρδίας
  chosen: a true heart
  alternatives:
  - a sincere heart
  - a genuine heart
  lexicon: BDAG
  rationale: ἀληθινός can mean 'true, genuine, real.' 'True heart' preserves the compactness
    and biblical resonance of the phrase without over-interpreting it as merely subjective
    sincerity, though sincerity is included.
- source_word: ἐν πληροφορίᾳ πίστεως
  chosen: in full assurance of faith
  alternatives:
  - with full assurance of faith
  - in the fullness of faith
  lexicon: BDAG
  rationale: πληροφορία denotes full certainty or assurance. The preposition ἐν is
    retained with 'in,' though English could also use 'with.' πίστις is rendered by
    the default 'faith'; this is not a contested pistis-Christou construction.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Following the project's default rendering for πίστις. Here the sense
    is the believer's confident faith rather than 'faithfulness.'
- source_word: ῥεραντισμένοι
  chosen: with our hearts sprinkled clean
  alternatives:
  - having our hearts sprinkled
  - with hearts sprinkled
  lexicon: BDAG
  rationale: Perfect passive participle indicating a completed state accompanying
    the exhortation. 'Sprinkled clean' makes explicit the cleansing result implied
    by the following ἀπό phrase and reads naturally in English while preserving sacrificial/purification
    imagery.
- source_word: τὰς καρδίας
  chosen: our hearts
  alternatives:
  - the hearts
  lexicon: BDAG
  rationale: The Greek article with body-part language is naturally rendered with
    a possessive in English. 'Our' is implied by the first person plural exhortation
    and the participial construction.
- source_word: ἀπὸ συνειδήσεως πονηρᾶς
  chosen: from an evil conscience
  alternatives:
  - from a guilty conscience
  - from a wicked conscience
  lexicon: BDAG
  rationale: Formal rendering preserves the lexical sense of πονηρός as 'evil/wicked.'
    'Guilty conscience' is interpretive and common in English versions, but the Greek
    does not explicitly say guilt; it speaks more broadly of a conscience defiled
    by evil.
- source_word: λελουσμένοι
  chosen: and our bodies washed
  alternatives:
  - having our body washed
  - and with our bodies washed
  lexicon: BDAG
  rationale: Perfect middle/passive participle parallel to ῥεραντισμένοι, denoting
    a completed cleansing state. Plural 'bodies' fits the plural subject in English,
    even though Greek uses singular distributively ('the body').
- source_word: τὸ σῶμα
  chosen: our bodies
  alternatives:
  - the body
  - our body
  lexicon: BDAG
  rationale: Greek singular is distributive with a plural referent; idiomatic English
    uses the plural. Possessive 'our' is likewise natural and implied.
- source_word: ὕδατι καθαρῷ
  chosen: with pure water
  alternatives:
  - with clean water
  lexicon: BDAG
  rationale: καθαρός can be 'clean' or 'pure.' 'Pure water' is idiomatic in English
    and preserves the ritual-cleansing nuance in this cultic context.
