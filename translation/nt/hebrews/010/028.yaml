theological_decisions:
- issue: Whether to make the judicial/executive force of ἀποθνῄσκει explicit
  chosen_reading: Retain the more literal 'dies' in the main text while allowing the
    legal context to imply capital punishment.
  alternative_readings:
  - is put to death
  - must die
  rationale: The verse alludes to Mosaic legal procedure and capital punishment, especially
    in light of Deuteronomic background. However, the Greek uses ἀποθνῄσκει rather
    than an explicit causative expression. Preserving 'dies' maintains source-text
    restraint while still fitting the context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve what the text says without importing more than warranted.'
