id: HEB.10.28
reference: Hebrews 10:28
source:
  edition: SBLGNT
  text: ἀθετήσας τις νόμον Μωϋσέως χωρὶς οἰκτιρμῶν ἐπὶ δυσὶν ἢ τρισὶν μάρτυσιν ἀποθνῄσκει·
translation:
  text: Anyone who has set aside the law of Moses dies without mercy on the testimony
    of two or three witnesses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is put to death.' The Greek literally says 'dies,' but the context
      is judicial execution under the law of Moses.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀθετήσας
  chosen: has set aside
  alternatives:
  - has rejected
  - has violated
  - has disregarded
  lexicon: BDAG
  rationale: Aorist participle of ἀθετέω denotes rejecting, nullifying, or setting
    aside something authoritative. 'Has set aside' preserves the sense of repudiating
    the law's authority without over-specifying the manner of offense. 'Violated'
    is possible but can sound narrower, as though referring only to transgression
    rather than repudiation.
- source_word: τις
  chosen: Anyone
  alternatives:
  - Someone
  - Whoever
  lexicon: BDAG
  rationale: Indefinite pronoun used generically. 'Anyone' gives natural modern English
    and preserves the representative force.
- source_word: νόμον Μωϋσέως
  chosen: the law of Moses
  alternatives:
  - Moses' law
  - the Mosaic law
  lexicon: BDAG
  rationale: Standard genitive construction. 'The law of Moses' is clear, idiomatic,
    and close to the Greek. 'Mosaic law' is acceptable but slightly more technical.
- source_word: χωρὶς οἰκτιρμῶν
  chosen: without mercy
  alternatives:
  - without compassion
  - without pity
  lexicon: BDAG
  rationale: The plural οἰκτιρμῶν is idiomatically rendered in English by the singular
    abstract 'mercy.' This best conveys the judicial sense in context. 'Compassion'
    or 'pity' are possible but slightly less idiomatic here.
- source_word: ἐπὶ δυσὶν ἢ τρισὶν μάρτυσιν
  chosen: on the testimony of two or three witnesses
  alternatives:
  - on the evidence of two or three witnesses
  - on two or three witnesses
  lexicon: BDAG
  rationale: The preposition ἐπί with dative here indicates the basis on which judgment
    is made. English normally supplies 'testimony' or 'evidence' to make the judicial
    sense explicit. 'On the testimony of two or three witnesses' is both natural and
    faithful to the legal background (cf. Deut 17:6).
- source_word: ἀποθνῄσκει
  chosen: dies
  alternatives:
  - is put to death
  - must die
  lexicon: BDAG
  rationale: Present indicative states the legal consequence in a gnomic/general way.
    'Dies' is formally closer to the Greek and leaves the judicial context to imply
    execution. 'Is put to death' makes the legal force more explicit and is a viable
    alternative, but the Greek verb itself is simply 'dies.'
