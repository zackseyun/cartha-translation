theological_decisions:
- issue: Relationship between completed perfection and ongoing sanctification
  chosen_reading: 'Retain both dimensions in translation: ''has perfected'' alongside
    ''are being sanctified.'''
  alternative_readings:
  - Resolve toward a purely positional sense ('has made holy')
  - Resolve toward a purely progressive sense that weakens the completed result
  rationale: The Greek intentionally holds together a completed, enduring result (τετελείωκεν)
    and an ongoing process/identity (ἁγιαζομένους). Per translation philosophy, the
    rendering preserves this theological tension rather than harmonizing it toward
    one doctrinal system.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
