id: HEB.10.14
reference: Hebrews 10:14
source:
  edition: SBLGNT
  text: μιᾷ γὰρ προσφορᾷ τετελείωκεν εἰς τὸ διηνεκὲς τοὺς ἁγιαζομένους.
translation:
  text: For by one offering he has perfected for all time those who are being sanctified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are being made holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μιᾷ
  chosen: one
  alternatives:
  - a single
  lexicon: BDAG
  rationale: Dative feminine singular of εἷς modifying προσφορᾷ; rendered 'one' to
    stress the singularity and sufficiency of the sacrifice in context.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks an explanatory ground connecting this verse to the preceding argument;
    'For' preserves the discourse function naturally in English.
- source_word: προσφορᾷ
  chosen: offering
  alternatives:
  - sacrifice
  lexicon: BDAG
  rationale: προσφορά commonly denotes an offering presented to God. 'Offering' is
    broad enough to match the term while fitting Hebrews' sacrificial context. 'Sacrifice'
    is possible but slightly more interpretive here.
- source_word: τετελείωκεν
  chosen: has perfected
  alternatives:
  - has made perfect
  - has brought to completion
  lexicon: BDAG
  rationale: Perfect active indicative of τελειόω. The perfect tense conveys a completed
    act with abiding result. 'Has perfected' preserves both the verbal force and the
    theological contrast in Hebrews between repeated sacrifices and Messiah's effective
    offering.
- source_word: εἰς τὸ διηνεκές
  chosen: for all time
  alternatives:
  - continually
  - in perpetuity
  - forever
  lexicon: BDAG
  rationale: This idiom in Hebrews denotes enduring, ongoing validity. 'For all time'
    is idiomatic modern English and captures the lasting effect of the one offering
    better than the more awkward 'continually' in this clause.
- source_word: τοὺς ἁγιαζομένους
  chosen: those who are being sanctified
  alternatives:
  - those who are being made holy
  - the sanctified
  lexicon: BDAG
  rationale: Present passive participle, accusative plural. The present participle
    suggests an ongoing process, so 'those who are being sanctified' best preserves
    the aspect. 'Those who are being made holy' is a good explanatory alternative,
    while 'the sanctified' would flatten the participial process.
