theological_decisions:
- issue: Whether ἐπαγγελίαν refers to the promise itself or the promised reward/fulfillment
  chosen_reading: the promise
  alternative_readings:
  - what was promised
  rationale: The Greek uses ἐπαγγελίαν, literally 'the promise,' yet in context with
    κομίσησθε it can idiomatically point to receiving the promised blessing. To preserve
    the source wording and avoid overresolving the nuance, the main text keeps 'the
    promise' and the more interpretive alternative is footnoted.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
