id: HEB.10.36
reference: Hebrews 10:36
source:
  edition: SBLGNT
  text: ὑπομονῆς γὰρ ἔχετε χρείαν ἵνα τὸ θέλημα τοῦ θεοῦ ποιήσαντες κομίσησθε τὴν
    ἐπαγγελίαν·
translation:
  text: For you have need of endurance, so that after doing the will of God you may
    receive the promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'receive what was promised.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπομονῆς
  chosen: endurance
  alternatives:
  - steadfastness
  - perseverance
  - patient endurance
  lexicon: BDAG
  rationale: ὑπομονή denotes remaining under pressure with constancy. 'Endurance'
    is natural modern English and preserves the sense of persevering steadfastly through
    trial without overinterpreting the nuance.
- source_word: χρείαν ἔχετε
  chosen: you have need of
  alternatives:
  - you need
  - there is need for you to have
  lexicon: BDAG
  rationale: The idiom χρείαν ἔχειν means 'to need' or 'to have need of.' Rendering
    it as 'have need of' keeps the force and slightly formal tone of the Greek while
    remaining readable.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ἵνα introduces purpose/result. 'So that' communicates the intended outcome
    in idiomatic English without sounding wooden.
- source_word: τὸ θέλημα τοῦ θεοῦ
  chosen: the will of God
  alternatives:
  - God's will
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'The will of God' preserves
    the formal weight and matches common biblical usage.
- source_word: ποιήσαντες
  chosen: after doing
  alternatives:
  - having done
  - when you have done
  - by doing
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb and is best represented
    as action prior to receiving. 'After doing' makes that temporal relationship clear
    in natural English.
- source_word: κομίσησθε
  chosen: you may receive
  alternatives:
  - you may obtain
  - you may carry away for yourselves
  lexicon: BDAG
  rationale: κομίζω here means to receive or obtain what is promised/rewarded. 'Receive'
    is the clearest idiomatic rendering in this context.
- source_word: τὴν ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - what was promised
  - the promised thing
  lexicon: BDAG
  rationale: ἐπαγγελία can denote either the promise itself or its fulfillment. In
    this context, after obedience/endurance, the sense leans toward receiving what
    God promised, but 'the promise' preserves the Greek wording and the theological
    tension; the alternative is preserved in a footnote.
