theological_decisions:
- issue: Meaning of solidarity with imprisoned believers
  chosen_reading: The verse speaks of sharing in the suffering of imprisoned believers,
    not merely feeling sympathy for them.
  alternative_readings:
  - The verse could be rendered more weakly as 'you had compassion on the prisoners.'
  rationale: The lexical force of συμπαθέω with the dative supports active solidarity
    in suffering. This fits the persecution context of Hebrews 10:32–34 and avoids
    understating the costliness of their identification with fellow believers.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nature of the 'better and lasting possession'
  chosen_reading: Rendered generally as a superior enduring possession without specifying
    heaven, salvation, or reward beyond what the text states.
  alternative_readings:
  - a better possession in heaven
  - a better inheritance
  rationale: Some manuscripts include an explicit heavenly reference, and interpreters
    often infer eschatological reward. The SBLGNT text here does not include 'in heaven,'
    so the translation preserves the broader wording and does not import a more specific
    doctrinal claim into the main text.
  doctrine_reference: Translation philosophy §1, §3
