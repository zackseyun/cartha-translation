theological_decisions:
- issue: How to render the shadow/reality contrast in cultic theology
  chosen_reading: The law is described as possessing only an anticipatory shadow,
    not the full corresponding reality.
  alternative_readings:
  - The law is a symbolic image of future blessings
  - The law is itself the image rather than merely a shadow
  rationale: The Greek explicitly contrasts σκιά with εἰκών and then with the actual
    πραγμάτων. The translation preserves this tension without diminishing the law's
    God-given role or overstating it as the final reality.
  doctrine_reference: Translation philosophy §3
- issue: How to render τελειῶσαι in Hebrews' sacrificial context
  chosen_reading: perfect
  alternative_readings:
  - make complete
  - bring to fulfillment
  rationale: In Hebrews, τελειόω is a key theological term tied to definitive access
    to God and the insufficiency of repeated sacrifices. 'Perfect' preserves that
    canonical and theological resonance without importing a doctrine of sinless moral
    flawlessness into the English wording.
  doctrine_reference: Translation philosophy §5
