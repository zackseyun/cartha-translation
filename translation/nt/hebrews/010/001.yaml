id: HEB.10.1
reference: Hebrews 10:1
source:
  edition: SBLGNT
  text: Σκιὰν γὰρ ἔχων ὁ νόμος τῶν μελλόντων ἀγαθῶν, οὐκ αὐτὴν τὴν εἰκόνα τῶν πραγμάτων,
    κατ’ ἐνιαυτὸν ταῖς αὐταῖς θυσίαις ἃς προσφέρουσιν εἰς τὸ διηνεκὲς οὐδέποτε ⸀δύναται
    τοὺς προσερχομένους τελειῶσαι·
translation:
  text: For since the law has only a shadow of the good things to come, not the very
    form of the realities, it can never, by the same sacrifices that they continually
    offer year after year, perfect those who draw near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not the image itself of the realities.'
    reason: lexical_alternative
  - marker: b
    text: '''Those who draw near'' carries the sense of approaching God in worship.'
    reason: cultural_note
  - marker: c
    text: Or 'make perfect' or 'bring to completion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σκιὰν
  chosen: a shadow
  alternatives:
  - a foreshadowing
  lexicon: BDAG
  rationale: σκιά is literally 'shadow.' In this contrast with εἰκών, 'shadow' preserves
    the metaphor of insubstantial anticipatory outline better than a more interpretive
    rendering.
- source_word: τῶν μελλόντων ἀγαθῶν
  chosen: of the good things to come
  alternatives:
  - of the coming good things
  - of the good things that were to come
  lexicon: BDAG
  rationale: μέλλω with the participle denotes what is impending or future. 'To come'
    is idiomatic and preserves the forward-looking sense without over-specifying eschatological
    timing.
- source_word: οὐκ αὐτὴν τὴν εἰκόνα
  chosen: not the very form
  alternatives:
  - not the image itself
  - not the actual representation
  lexicon: BDAG
  rationale: εἰκών can mean image, form, or representation. In contrast to 'shadow,'
    'the very form' communicates the full, substantial reality rather than a mere
    outline. 'Very' reflects αὐτήν's emphatic force.
- source_word: τῶν πραγμάτων
  chosen: of the realities
  alternatives:
  - of the things
  - of the matters
  lexicon: BDAG
  rationale: πρᾶγμα is broad, but here refers to the actual realities corresponding
    to the law's shadow. 'Realities' makes the shadow/reality contrast clear in natural
    English.
- source_word: κατ’ ἐνιαυτὸν
  chosen: year after year
  alternatives:
  - every year
  - year by year
  lexicon: BDAG
  rationale: The idiom denotes annual repetition. 'Year after year' highlights the
    repeated ongoing cycle, fitting the argument of ineffectiveness through repetition.
- source_word: ταῖς αὐταῖς θυσίαις
  chosen: by the same sacrifices
  alternatives:
  - with the same sacrifices
  lexicon: BDAG
  rationale: The dative is instrumental here; 'by the same sacrifices' expresses means.
    'Same' preserves the emphasis on repeated identical offerings.
- source_word: ἃς προσφέρουσιν
  chosen: that they continually offer
  alternatives:
  - which they offer
  - that are offered
  lexicon: BDAG
  rationale: The present tense suggests customary repeated action. 'They' is left
    indefinite, matching the Greek's unstated subject while preserving the active
    voice. 'Continually' reflects the ongoing cultic practice in context, though the
    annual phrase already narrows the repetition.
- source_word: εἰς τὸ διηνεκές
  chosen: continually
  alternatives:
  - continually
  - perpetually
  - without interruption
  lexicon: BDAG
  rationale: The phrase means continuously or perpetually. Because English style becomes
    cumbersome if rendered too literally alongside κατ’ ἐνιαυτόν, it is absorbed adverbially
    into 'continually offer' while retaining the sense of ongoing repetition.
- source_word: οὐδέποτε δύναται
  chosen: can never
  alternatives:
  - is never able to
  - can by no means ever
  lexicon: BDAG
  rationale: This compact rendering preserves both the modal force of δύναται and
    the absolute negation of οὐδέποτε in idiomatic English.
- source_word: τοὺς προσερχομένους
  chosen: those who draw near
  alternatives:
  - those who come near
  - the worshipers who approach
  lexicon: BDAG
  rationale: προσέρχομαι in Hebrews often carries cultic overtones of approaching
    God. 'Draw near' preserves that theological and liturgical nuance better than
    the flatter 'come near.'
- source_word: τελειῶσαι
  chosen: perfect
  alternatives:
  - make perfect
  - bring to completion
  lexicon: BDAG
  rationale: τελειόω in Hebrews includes the sense of bringing to the intended goal,
    especially in relation to access to God. 'Perfect' is concise and traditional,
    while still fitting the epistle's theological vocabulary.
