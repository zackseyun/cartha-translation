id: HEB.10.29
reference: Hebrews 10:29
source:
  edition: SBLGNT
  text: πόσῳ δοκεῖτε χείρονος ἀξιωθήσεται τιμωρίας ὁ τὸν υἱὸν τοῦ θεοῦ καταπατήσας,
    καὶ τὸ αἷμα τῆς διαθήκης κοινὸν ἡγησάμενος ἐν ᾧ ἡγιάσθη, καὶ τὸ πνεῦμα τῆς χάριτος
    ἐνυβρίσας.
translation:
  text: How much worse punishment do you think will be deserved by the one who has
    trampled underfoot the Son of God, and has regarded the blood of the covenant
    by which he was sanctified as common, and has insulted the Spirit of grace?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has regarded the blood of the covenant as unclean' or 'as profane.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'by which he was sanctified' is syntactically linked to the offender
      in Greek; some interpreters understand the referent differently. The translation
      preserves the ambiguity rather than resolving the theological debate.
    reason: alternative_reading
  - marker: c
    text: Or 'has outraged the Spirit of grace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόσῳ
  chosen: How much worse
  alternatives:
  - How much more
  - By how much
  lexicon: BDAG
  rationale: Used idiomatically with the comparative χείρονος to form the rhetorical
    question 'How much worse...?' rather than a more wooden 'By how much...?'.
- source_word: χείρονος
  chosen: worse
  alternatives:
  - more severe
  lexicon: BDAG
  rationale: Comparative adjective modifying punishment; 'worse' is the most natural
    English equivalent in this rhetorical construction.
- source_word: ἀξιωθήσεται
  chosen: will be deserved
  alternatives:
  - will be considered worthy of
  - will deserve
  lexicon: BDAG
  rationale: Passive form literally means 'will be deemed worthy of.' English idiom
    is smoother with 'will be deserved,' keeping the judicial sense without awkwardness.
- source_word: τιμωρίας
  chosen: punishment
  alternatives:
  - penalty
  - retribution
  lexicon: BDAG
  rationale: Conveys judicial punishment in accessible modern English; 'retribution'
    is possible but more interpretive and less natural here.
- source_word: καταπατήσας
  chosen: has trampled underfoot
  alternatives:
  - has trampled on
  - has treated with contempt
  lexicon: BDAG
  rationale: Retains the vivid metaphor of contempt rather than flattening it into
    an abstract paraphrase.
- source_word: υἱὸν τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Standard and precise rendering of the christological title; preserves
    the text's high Christology in line with orthodox doctrine.
- source_word: κοινὸν
  chosen: common
  alternatives:
  - unclean
  - profane
  lexicon: BDAG
  rationale: The basic sense is 'common' in contrast to holy/consecrated. 'Unclean'
    is a possible contextual gloss, but 'common' better preserves the lexical contrast
    and lets the reader feel the sacrilegious force.
- source_word: ἡγησάμενος
  chosen: has regarded
  alternatives:
  - has considered
  - has counted
  lexicon: BDAG
  rationale: Natural English for a mental evaluation verb, preserving the deliberative
    sense.
- source_word: αἷμα τῆς διαθήκης
  chosen: the blood of the covenant
  alternatives:
  - the covenant blood
  lexicon: BDAG
  rationale: Formal enough to preserve the biblical covenantal phrase and its sacrificial
    resonance.
- source_word: ἐν ᾧ
  chosen: by which
  alternatives:
  - in which
  - with which
  lexicon: BDAG
  rationale: 'Instrumental sense is most natural in context: sanctification occurs
    by means of the covenant blood. A more literal ''in which'' is possible but less
    clear in English.'
- source_word: ἡγιάσθη
  chosen: he was sanctified
  alternatives:
  - he was made holy
  - he was consecrated
  lexicon: BDAG
  rationale: '''Sanctified'' preserves the important theological term and matches
    the passive verbal form. Alternatives are possible but less consistent with Hebrews''
    vocabulary.'
- source_word: ἐνυβρίσας
  chosen: has insulted
  alternatives:
  - has outraged
  - has treated with arrogant contempt
  lexicon: BDAG
  rationale: Conveys abusive, contemptuous treatment in readable English. 'Outraged'
    is also strong and traditional, but 'insulted' better matches the verbal action
    while remaining clear.
- source_word: τὸ πνεῦμα τῆς χάριτος
  chosen: the Spirit of grace
  alternatives:
  - the gracious Spirit
  lexicon: BDAG
  rationale: Keeps the genitival construction and likely title-like force, preserving
    the solemnity of the warning.
