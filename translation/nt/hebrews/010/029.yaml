theological_decisions:
- issue: Referent of 'he was sanctified' (ἐν ᾧ ἡγιάσθη)
  chosen_reading: Rendered straightforwardly as 'by which he was sanctified,' leaving
    the pronoun's referent as the apostate figure in the syntax of the verse.
  alternative_readings:
  - '''by which it was sanctified'' or other non-personal construals'
  - interpretive readings taking the referent to be Christ or the covenant community
    rather than the offender
  rationale: The nearest grammatical referent is the singular subject described by
    the participles. Because this clause is theologically debated in discussions of
    apostasy and perseverance, the translation preserves the Greek syntax rather than
    resolving the doctrinal question beyond what the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
