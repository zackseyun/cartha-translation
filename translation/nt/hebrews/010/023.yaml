id: HEB.10.23
reference: Hebrews 10:23
source:
  edition: SBLGNT
  text: κατέχωμεν τὴν ὁμολογίαν τῆς ἐλπίδος ἀκλινῆ, πιστὸς γὰρ ὁ ἐπαγγειλάμενος·
translation:
  text: Let us hold fast the confession of our hope without wavering, for the one
    who promised is faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the confession of hope.' The Greek does not explicitly include 'our.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέχωμεν
  chosen: Let us hold fast
  alternatives:
  - let us hold firmly
  - let us keep hold of
  lexicon: BDAG
  rationale: First person plural present subjunctive used hortatorily; 'let us hold
    fast' is idiomatic English that preserves the exhortational force and the sense
    of firm retention.
- source_word: ὁμολογίαν
  chosen: the confession
  alternatives:
  - the profession
  - the acknowledgment
  lexicon: BDAG
  rationale: '''Confession'' best captures a public or declared profession of allegiance/belief
    in this context, and fits Hebrews'' emphasis on persevering public commitment.'
- source_word: τῆς ἐλπίδος
  chosen: of our hope
  alternatives:
  - of hope
  lexicon: BDAG
  rationale: Although the Greek lacks an explicit possessive pronoun, English idiom
    commonly supplies 'our' with 'confession of hope' in an exhortation addressed
    to the community. This clarifies that the hope is the community's confessed hope
    without materially adding a new concept.
- source_word: ἀκλινῆ
  chosen: without wavering
  alternatives:
  - unwavering
  - without bending
  lexicon: BDAG
  rationale: Predicate-like adjective modifying 'confession'; 'without wavering' is
    natural English and conveys steadfastness more idiomatically than the bare adjective
    'unwavering' after the object.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: '''Faithful'' is the standard rendering and preserves covenantal/theological
    resonance, while still being clear in modern English.'
- source_word: ὁ ἐπαγγειλάμενος
  chosen: the one who promised
  alternatives:
  - he who promised
  - the promiser
  lexicon: BDAG
  rationale: Articular aorist middle participle functioning substantivally; 'the one
    who promised' is clear, natural, and preserves the focus on God's prior promise
    without overformal diction.
