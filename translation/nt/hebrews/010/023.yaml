theological_decisions:
- issue: Implicit subject of 'the one who promised'
  chosen_reading: Understood as God, left implicit in the translation as in the Greek.
  alternative_readings:
  - Explicitly supplying 'God who promised'
  rationale: The context clearly points to God, but the Greek leaves the referent
    implicit. Retaining the implicit expression respects the source text and avoids
    unnecessary interpretive expansion.
  doctrine_reference: Translation philosophy §1, §3
- issue: Supplying 'our' with 'hope'
  chosen_reading: 'Included ''our'' for natural English: ''the confession of our hope.'''
  alternative_readings:
  - '''the confession of hope'''
  rationale: This is not a doctrinal addition but an English smoothing that reflects
    the communal exhortation. It preserves meaning while improving readability under
    optimal equivalence.
  doctrine_reference: Translation philosophy §6
