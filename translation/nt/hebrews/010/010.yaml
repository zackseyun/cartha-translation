theological_decisions:
- issue: Aspect and theological force of sanctification
  chosen_reading: Render ἡγιασμένοι ἐσμὲν as 'we have been sanctified' to preserve
    completed action with ongoing result
  alternative_readings:
  - we are sanctified
  - we are being sanctified
  rationale: The Greek form is periphrastic perfect, not present progressive. This
    avoids importing a denominationally loaded doctrine of either purely positional
    or purely progressive sanctification beyond what the grammar itself states, while
    still preserving the text's completed-yet-enduring force.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
- issue: Christological title Χριστοῦ
  chosen_reading: Translate as 'Messiah'
  alternative_readings:
  - Christ
  rationale: The doctrine excerpt directs that Christological titles be translated
    to preserve meaning where context supports it. Here the title remains semantically
    transparent and does not require the more name-like 'Christ.'
  doctrine_reference: 'Contested terms table: Χριστός → Messiah where title; Christ
    where name-like'
