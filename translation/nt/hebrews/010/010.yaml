id: HEB.10.10
reference: Hebrews 10:10
source:
  edition: SBLGNT
  text: ἐν ᾧ θελήματι ἡγιασμένοι ⸀ἐσμὲν διὰ τῆς προσφορᾶς τοῦ σώματος Ἰησοῦ Χριστοῦ
    ἐφάπαξ.
translation:
  text: By that will we have been sanctified through the offering of the body of Jesus
    the Messiah once for all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'in which will.' The sense is that believers are sanctified
      by God's will just mentioned in the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ θελήματι
  chosen: By that will
  alternatives:
  - In which will
  - By this will
  lexicon: BDAG
  rationale: The phrase is idiomatic, referring back to God's will just cited in the
    context. English 'By that will' best captures instrumental sense without wooden
    awkwardness. 'In which will' is more literal but less natural and less clear in
    English.
- source_word: ἡγιασμένοι ἐσμὲν
  chosen: we have been sanctified
  alternatives:
  - we are sanctified
  - we have been made holy
  lexicon: BDAG
  rationale: Periphrastic perfect (perfect participle + present of 'to be') conveys
    a completed action with abiding result. 'We have been sanctified' preserves that
    aspect better than simple present. 'Made holy' is a valid dynamic alternative
    but 'sanctified' retains the theological register of ἁγιάζω.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  - because of
  lexicon: BDAG
  rationale: With the genitive, διά here marks means or instrument. 'Through' is the
    most natural and sufficiently precise rendering.
- source_word: προσφορᾶς
  chosen: offering
  alternatives:
  - sacrifice
  - presentation
  lexicon: BDAG
  rationale: προσφορά commonly denotes an offering, especially in sacrificial context.
    'Offering' is the direct lexical match and allows the sacrificial sense to remain
    clear from context. 'Sacrifice' is possible but slightly more interpretive.
- source_word: τοῦ σώματος
  chosen: the body
  alternatives:
  - his body
  lexicon: BDAG
  rationale: The Greek has the explicit noun phrase 'the body' with the following
    genitives identifying whose body. Retaining 'the body' mirrors the source structure
    and emphasizes the concrete bodily self-offering of Jesus.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus the Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Following the doctrine guideline, Χριστός is translated as 'Messiah'
    where it functions as a title rather than a fixed name-like form. Here the phrase
    readily bears titular force, so 'Jesus the Messiah' preserves meaning.
- source_word: ἐφάπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: The adverb emphasizes the definitive, unrepeatable character of Christ's
    offering. 'Once for all' is concise and idiomatic; 'once and for all' is also
    possible but slightly more expansive.
