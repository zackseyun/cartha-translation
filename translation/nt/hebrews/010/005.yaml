theological_decisions:
- issue: Quotation wording from Psalm 40:6 in Hebrews differs from the MT-based Hebrew
    text ('ears you have dug/opened for me').
  chosen_reading: 'Translate the Greek text of Hebrews as given: ''a body you prepared
    for me.'''
  alternative_readings:
  - '''ears you have opened for me'' (reflecting the Hebrew text of Psalm 40:6)'
  rationale: Cartha prioritizes the original-language text of the verse being translated.
    Hebrews explicitly cites the Greek form with σῶμα, and the translation should
    reflect Hebrews' wording rather than harmonize it to the Hebrew Psalm. Because
    the alternative underlying Psalm wording is significant, it is preserved in a
    footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
