id: HEB.10.5
reference: Hebrews 10:5
source:
  edition: SBLGNT
  text: διὸ εἰσερχόμενος εἰς τὸν κόσμον λέγει· Θυσίαν καὶ προσφορὰν οὐκ ἠθέλησας,
    σῶμα δὲ κατηρτίσω μοι·
translation:
  text: 'Therefore, as he comes into the world, he says: “Sacrifice and offering you
    did not desire, but a body you prepared for me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrews here follows the Greek wording of Psalm 40:6, 'a body you prepared
      for me.' The Hebrew text of Psalm 40:6 reads, 'ears you have opened for me.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential connection to the preceding argument; 'Therefore'
    is natural modern English and preserves the logical force.
- source_word: εἰσερχόμενος εἰς τὸν κόσμον
  chosen: as he comes into the world
  alternatives:
  - when he came into the world
  - upon entering the world
  lexicon: BDAG
  rationale: The present participle is used in a vivid/scriptural citation frame.
    'As he comes into the world' preserves the participial sense without over-specifying
    tense beyond the quotation context. 'Into the world' is the standard rendering
    of κόσμος here in the sense of the inhabited human order.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is commonly used to introduce Scripture citations in
    the NT. 'He says' preserves that citation-present idiom better than flattening
    it to past tense.
- source_word: Θυσίαν
  chosen: Sacrifice
  alternatives:
  - A sacrifice
  lexicon: BDAG
  rationale: Anarthrous singular used generically in parallel with προσφοράν. English
    singular without article works well in a category statement.
- source_word: καὶ προσφορὰν
  chosen: and offering
  alternatives:
  - and an offering
  lexicon: BDAG
  rationale: Paired cultic terms from the Psalm citation are best kept distinct and
    concrete. 'Offering' is the standard accessible gloss.
- source_word: οὐκ ἠθέλησας
  chosen: you did not desire
  alternatives:
  - you did not want
  - you did not will
  lexicon: BDAG
  rationale: θέλω here expresses desire/will. 'Did not desire' fits the sacrificial
    context and echoes biblical idiom without sounding archaic.
- source_word: σῶμα
  chosen: a body
  alternatives:
  - body
  lexicon: BDAG
  rationale: The noun is singular and concrete. Including the English article yields
    idiomatic English while preserving the incarnational force of the citation as
    used in Hebrews.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: Marks contrast between rejected sacrifices and the prepared body; 'but'
    best conveys the adversative force.
- source_word: κατηρτίσω
  chosen: you prepared
  alternatives:
  - you fitted out
  - you made ready
  - you formed
  lexicon: BDAG
  rationale: καταρτίζω can mean prepare, equip, make ready. 'Prepared' is the clearest
    idiomatic rendering in context and aligns with the argument of Hebrews about the
    Son's embodied coming.
- source_word: μοι
  chosen: for me
  alternatives:
  - me
  lexicon: BDAG
  rationale: 'The dative is naturally rendered as advantage/reference here: the body
    was prepared for the speaker.'
