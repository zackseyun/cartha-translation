id: HEB.10.27
reference: Hebrews 10:27
source:
  edition: SBLGNT
  text: φοβερὰ δέ τις ἐκδοχὴ κρίσεως καὶ πυρὸς ζῆλος ἐσθίειν μέλλοντος τοὺς ὑπεναντίους.
translation:
  text: but a certain fearful expectation of judgment, and a zeal of fire about to
    consume the adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'a terrifying expectation of judgment and a fiery
      zeal about to consume the adversaries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβερὰ
  chosen: fearful
  alternatives:
  - terrifying
  - dreadful
  lexicon: BDAG
  rationale: Predicate adjective modifying ἐκδοχὴ; 'fearful' preserves the stark quality
    without over-paraphrasing. 'Terrifying' is possible but slightly more interpretive
    in English tone.
- source_word: δέ
  chosen: but
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the preceding negation in v. 26; 'but' best carries
    the adversative force in context.
- source_word: τις
  chosen: a certain
  alternatives:
  - some
  - a
  lexicon: BDAG
  rationale: Indefinite pronoun intensifying the unspecified but real prospect. 'A
    certain' reflects the Greek more closely than a bare article, though the phrase
    remains idiomatic enough in English.
- source_word: ἐκδοχὴ
  chosen: expectation
  alternatives:
  - prospect
  - waiting for
  lexicon: BDAG
  rationale: The noun denotes expectation or awaiting. 'Expectation' is the most direct
    lexical equivalent and fits the genitive κρίσεως naturally.
- source_word: κρίσεως
  chosen: of judgment
  alternatives:
  - of condemnation
  - of justice
  lexicon: BDAG
  rationale: κρίσις here refers to coming judicial judgment. 'Judgment' is broad enough
    to preserve the text's gravity without importing a narrower doctrinal conclusion.
- source_word: πυρὸς ζῆλος
  chosen: a zeal of fire
  alternatives:
  - fiery zeal
  - fire's fury
  lexicon: BDAG
  rationale: The phrase is compressed and vivid. A more idiomatic English rendering
    would be 'fiery zeal,' but 'a zeal of fire' better preserves the genitival structure
    and the personified force of the Greek while remaining understandable.
- source_word: ἐσθίειν
  chosen: to consume
  alternatives:
  - to eat up
  - to devour
  lexicon: BDAG
  rationale: Infinitive expressing the action of the coming fiery zeal. 'Consume'
    is idiomatic in judgment contexts and preserves the destructive sense without
    sounding colloquial.
- source_word: μέλλοντος
  chosen: about to
  alternatives:
  - destined to
  - going to
  lexicon: BDAG
  rationale: Present participle of μέλλω conveys imminence. 'About to' best reflects
    the impending nature of the judgment.
- source_word: τοὺς ὑπεναντίους
  chosen: the adversaries
  alternatives:
  - the opponents
  - the hostile ones
  - the enemies
  lexicon: BDAG
  rationale: Refers to those set in opposition. 'Adversaries' preserves the formal
    and judicial tone of the context better than the more general 'enemies'.
