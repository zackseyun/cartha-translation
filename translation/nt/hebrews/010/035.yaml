theological_decisions:
- issue: Meaning of παρρησία in Hebrews 10:35
  chosen_reading: The term refers to the believers' confident boldness before God
    and in persevering faith, rendered 'boldness.'
  alternative_readings:
  - confidence
  rationale: Hebrews uses παρρησία for confident access and steadfast openness grounded
    in faith. Rendering it 'boldness' preserves the exhortational force without narrowing
    it to inward assurance alone.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
