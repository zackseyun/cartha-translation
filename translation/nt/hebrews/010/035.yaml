id: HEB.10.35
reference: Hebrews 10:35
source:
  edition: SBLGNT
  text: μὴ ἀποβάλητε οὖν τὴν παρρησίαν ὑμῶν, ἥτις ἔχει ⸂μεγάλην μισθαποδοσίαν⸃,
translation:
  text: Therefore, do not throw away your boldness, which has a great reward,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confidence.' The Greek term can denote confident freedom or openness,
      especially in approaching God.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀποβάλητε
  chosen: do not throw away
  alternatives:
  - do not cast away
  - do not discard
  - do not lose
  lexicon: BDAG
  rationale: Aorist subjunctive with μή functions as a prohibition. ἀποβάλλω here
    conveys forceful rejection or relinquishment, stronger than merely 'lose.' 'Throw
    away' is idiomatic modern English and preserves the deliberate sense.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks inference from the preceding exhortation and examples. 'Therefore'
    best preserves the logical connection in a formal yet readable way.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - confidence
  - openness
  - bold confidence
  lexicon: BDAG
  rationale: παρρησία in Hebrews often denotes confident freedom of approach and speech
    before God. 'Boldness' preserves the courageous nuance, while 'confidence' is
    possible but slightly flatter. The context of persevering public faith supports
    'boldness.'
- source_word: ὑμῶν
  chosen: your
  lexicon: BDAG
  rationale: Straightforward possessive genitive modifying 'boldness.'
- source_word: ἥτις
  chosen: which
  alternatives:
  - for it
  - and it
  lexicon: BDAG
  rationale: The qualitative relative pronoun introduces an explanatory clause about
    the nature of this boldness. English 'which' is the most natural equivalent here.
- source_word: ἔχει
  chosen: has
  alternatives:
  - holds
  - brings
  lexicon: BDAG
  rationale: Simple present indicative. 'Has' is the most direct rendering; 'brings'
    would interpret the relationship more dynamically than the Greek states.
- source_word: μεγάλην
  chosen: great
  alternatives:
  - large
  - rich
  lexicon: BDAG
  rationale: Standard adjectival sense. 'Great' fits idiomatic English with 'reward'
    and preserves evaluative force.
- source_word: μισθαποδοσίαν
  chosen: reward
  alternatives:
  - recompense
  - repayment
  - reward payment
  lexicon: BDAG
  rationale: The noun denotes recompense or reward. 'Reward' is clear, natural, and
    fits the positive eschatological sense in Hebrews. More literal options like 'recompense'
    are less readable and can sound transactional in a way not required by the context.
