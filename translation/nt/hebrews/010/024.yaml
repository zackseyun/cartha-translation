id: HEB.10.24
reference: Hebrews 10:24
source:
  edition: SBLGNT
  text: καὶ κατανοῶμεν ἀλλήλους εἰς παροξυσμὸν ἀγάπης καὶ καλῶν ἔργων,
translation:
  text: and let us consider one another, to stir up love and good works,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spur on' or 'provoke' love and good works. The Greek noun παροξυσμός
      can denote a strong prompting or provocation.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοῶμεν
  chosen: let us consider
  alternatives:
  - let us think about
  - let us pay attention to
  - let us take note of
  lexicon: BDAG
  rationale: First person plural present subjunctive in a hortatory sense; 'let us
    consider' is natural English and preserves the exhortational force without over-paraphrasing.
    The verb carries the sense of attentive consideration directed toward others.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering. 'One another' fits the communal exhortation
    register of the passage.
- source_word: εἰς
  chosen: to
  alternatives:
  - for
  - toward
  lexicon: BDAG
  rationale: 'Here εἰς marks purpose/result with the following noun phrase. ''To''
    idiomatically introduces the infinitive-like sense in English: ''to stir up.'''
- source_word: παροξυσμὸν
  chosen: stir up
  alternatives:
  - provoke
  - spur on
  - encourage strongly
  lexicon: BDAG
  rationale: The noun can denote provocation, stimulation, or incitement. In English,
    a literal 'provocation' can sound negative, but here the object is explicitly
    positive ('love and good works'). 'Stir up' preserves the strong activating sense
    without importing hostility. The alternative 'spur on' is also viable and worth
    preserving in a footnote.
- source_word: ἀγάπης
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering of ἀγάπη as 'love.' 'Charity'
    is archaic in contemporary English.
- source_word: καλῶν ἔργων
  chosen: good works
  alternatives:
  - good deeds
  lexicon: BDAG
  rationale: A straightforward rendering of adjective plus noun. 'Good works' preserves
    the lexical link to ἔργον and matches common New Testament usage without implying
    a specific doctrinal system of merit.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Coordinates this exhortation with the preceding context and also joins
    'love' with 'good works.' The repeated conjunction is naturally represented in
    English.
