theological_decisions:
- issue: Potentially negative connotation of παροξυσμός
  chosen_reading: Render the exhortation positively as 'stir up love and good works'
    rather than a more jarring 'provoke' in the main text.
  alternative_readings:
  - provoke love and good works
  - spur one another on to love and good works
  rationale: The Greek term can be sharp, even provocative, but the immediate objects
    are virtuous. A positive but still forceful English rendering best reflects the
    author's intent in context while preserving the strength of the exhortation. An
    alternative is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without unnecessary paraphrase.'
