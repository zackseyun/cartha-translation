id: HEB.10.37
reference: Hebrews 10:37
source:
  edition: SBLGNT
  text: ἔτι γὰρ μικρὸν ὅσον ὅσον, ὁ ἐρχόμενος ἥξει καὶ οὐ χρονίσει·
translation:
  text: For yet a very little while, the Coming One will come and will not delay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who is coming will come.' The Greek phrase can be read more
      generically, but 'the Coming One' preserves its likely titular, messianic force
      in context.
    reason: alternative_reading
  - marker: b
    text: Literally, 'a little as much as as much,' an idiom meaning 'a very little
      while.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι γὰρ
  chosen: For yet
  alternatives:
  - For still
  - For in yet
  lexicon: BDAG
  rationale: γάρ is explanatory ('for'), linking this line to the preceding exhortation,
    and ἔτι adds the sense of 'still/yet.' 'For yet' preserves both discourse connection
    and temporal nuance in concise English.
- source_word: μικρὸν ὅσον ὅσον
  chosen: a very little while
  alternatives:
  - a little while
  - in a very little while
  - a little, little while
  lexicon: BDAG
  rationale: The idiomatic repetition ὅσον ὅσον intensifies μικρόν, conveying extreme
    brevity. 'A very little while' captures the emphatic idiom in natural English
    better than a wooden repetition.
- source_word: ὁ ἐρχόμενος
  chosen: the Coming One
  alternatives:
  - the one who is coming
  - he who comes
  - the coming one
  lexicon: BDAG
  rationale: The articular present participle functions substantivally. In this context
    it likely echoes a recognized messianic designation from the scriptural citation
    tradition. 'The Coming One' preserves the titular force better than the more generic
    'the one who is coming.'
- source_word: ἥξει
  chosen: will come
  alternatives:
  - is coming
  - will arrive
  lexicon: BDAG
  rationale: Future indicative with straightforward predictive force. 'Will come'
    is the most direct and idiomatic rendering and preserves the verbal echo with
    ὁ ἐρχόμενος.
- source_word: οὐ χρονίσει
  chosen: will not delay
  alternatives:
  - will not tarry
  - will not be late
  - will not linger
  lexicon: BDAG
  rationale: χρονίζω here means to take time, delay, or tarry. 'Will not delay' is
    clear modern English and avoids archaic diction like 'tarry.'
