theological_decisions:
- issue: Whether ὁ ἐρχόμενος should be rendered as a messianic title or a generic
    participial phrase
  chosen_reading: Rendered as 'the Coming One' in the main text
  alternative_readings:
  - the one who is coming
  - he who comes
  rationale: In Hebrews 10:37 the phrase stands within a scriptural citation adapted
    in a christological context, and the articular participle plausibly carries titular
    force referring to the returning Messiah. Capitalization and the nominal rendering
    preserve that force without adding content beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 3, 6
