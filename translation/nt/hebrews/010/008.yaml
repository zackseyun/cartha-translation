theological_decisions:
- issue: Rendering the sacrificial categories from Psalm 40/LXX in a way that preserves
    their cultic specificity without importing later doctrinal interpretation
  chosen_reading: 'Use explicit sacrificial terms: ''Sacrifices and offerings and
    whole burnt offerings and sin offerings'''
  alternative_readings:
  - '''Sacrifices and offerings, burnt offerings and offerings for sin'''
  rationale: The verse catalogs Levitical sacrificial types and contrasts them with
    God's deeper will in the surrounding argument. The translation preserves the categories
    as cultic terms and does not overinterpret the theological point beyond the text
    itself.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: How to render God's negative stance toward the sacrifices
  chosen_reading: '''you did not desire, nor did you delight in them'''
  alternative_readings:
  - '''you did not want, nor were you pleased with'''
  rationale: This preserves the rhetorical force of the Psalm citation while avoiding
    a misleading implication that the law itself was illegitimate; the final clause
    clarifies that these were offerings made according to the law.
  doctrine_reference: Translation philosophy §§1, 3, 6
