id: HEB.10.8
reference: Hebrews 10:8
source:
  edition: SBLGNT
  text: ἀνώτερον λέγων ὅτι ⸂Θυσίας καὶ προσφορὰς⸃ καὶ ὁλοκαυτώματα καὶ περὶ ἁμαρτίας
    οὐκ ἠθέλησας οὐδὲ εὐδόκησας, αἵτινες κατὰ ⸀νόμον προσφέρονται,
translation:
  text: After saying above, “Sacrifices and offerings and whole burnt offerings and
    sin offerings you did not desire, nor did you delight in them”—which are offered
    according to the law—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnt offerings.' The Greek term refers to offerings wholly consumed
      on the altar.
    reason: lexical_alternative
  - marker: b
    text: Or 'offerings for sin.'
    reason: lexical_alternative
  - marker: c
    text: That is, in accordance with the Mosaic law.
    reason: cultural_note
lexical_decisions:
- source_word: ἀνώτερον
  chosen: After saying above
  alternatives:
  - Previously saying
  - Saying above
  lexicon: BDAG
  rationale: In context this adverb points back to the earlier citation just mentioned
    ('above' in the argument). 'After saying above' gives natural English while preserving
    the discourse function of referring to the prior statement.
- source_word: λέγων
  chosen: saying
  alternatives:
  - having said
  - he says
  lexicon: BDAG
  rationale: Present participle linked with ἀνώτερον, introducing the quotation. Rendered
    with 'saying' as part of the idiomatic phrase 'After saying above'.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces direct discourse from the Psalm citation. English punctuation
    conveys this more naturally than retaining 'that'.
- source_word: Θυσίας
  chosen: Sacrifices
  lexicon: BDAG
  rationale: Standard rendering for θυσία in sacrificial contexts; preserves cultic
    terminology.
- source_word: προσφορὰς
  chosen: offerings
  alternatives:
  - gifts
  lexicon: BDAG
  rationale: In sacrificial context, 'offerings' is the clearest and most consistent
    gloss.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  lexicon: BDAG
  rationale: The compound term denotes offerings wholly consumed by fire. 'Whole burnt
    offerings' preserves that nuance better than the shorter traditional phrase, while
    remaining readable.
- source_word: περὶ ἁμαρτίας
  chosen: sin offerings
  alternatives:
  - offerings for sin
  - for sin
  lexicon: BDAG
  rationale: In sacrificial usage, the phrase functions as a technical expression
    for sin offerings, not merely a general reference to sin. This rendering communicates
    the cultic category clearly.
- source_word: οὐκ ἠθέλησας
  chosen: you did not desire
  alternatives:
  - you did not will
  - you did not want
  lexicon: BDAG
  rationale: '''Desire'' fits the sacrificial context and echoes the Psalm source
    without sounding wooden.'
- source_word: οὐδὲ εὐδόκησας
  chosen: nor did you delight in them
  alternatives:
  - nor were you pleased
  - nor did you take pleasure
  lexicon: BDAG
  rationale: εὐδοκέω here expresses favorable pleasure or approval. 'Delight in them'
    distinguishes it from the previous verb and avoids flattening the parallelism.
    'Them' is supplied naturally in English from the object list.
- source_word: αἵτινες
  chosen: which
  alternatives:
  - which indeed
  - such as
  lexicon: BDAG
  rationale: Refers back to the listed sacrifices and offerings. 'Which' is sufficient
    in English; the qualitative nuance of αἵτινες is not strong enough here to require
    expansion.
- source_word: κατὰ νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  - under the law
  lexicon: BDAG
  rationale: Expresses conformity to the Mosaic law's prescriptions. 'According to
    the law' is clear and close to the Greek.
- source_word: προσφέρονται
  chosen: are offered
  alternatives:
  - are being offered
  - are presented
  lexicon: BDAG
  rationale: Present passive describes the ongoing offering of these sacrifices. Simple
    present passive is idiomatic in English and suits the author's general statement.
