id: HEB.10.18
reference: Hebrews 10:18
source:
  edition: SBLGNT
  text: ὅπου δὲ ἄφεσις τούτων, οὐκέτι προσφορὰ περὶ ἁμαρτίας.
translation:
  text: Now where there is forgiveness of these, there is no longer any offering for
    sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remission of these'; the referent of 'these' is the sins and lawless
      deeds mentioned in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - wherever
  - in the place where
  lexicon: BDAG
  rationale: Introduces the condition or sphere in which the following statement holds.
    Simple 'where' is idiomatic in English and fits the logical conclusion of the
    argument.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: δέ here marks a mild transition or inference rather than strong contrast.
    'Now' signals continuation of the argument in readable English without overstating
    adversative force.
- source_word: ἄφεσις
  chosen: forgiveness
  alternatives:
  - remission
  - release
  - pardon
  lexicon: BDAG
  rationale: In this sacrificial context the noun denotes forgiveness/remission of
    sins. 'Forgiveness' is the clearest modern English rendering and avoids archaic
    'remission' while preserving theological weight.
- source_word: τούτων
  chosen: of these
  alternatives:
  - of these things
  - of these sins
  lexicon: BDAG
  rationale: The demonstrative points back to the sins and lawless deeds just mentioned
    in the preceding verse. 'Of these' is formally close and lets the immediate context
    specify the referent without adding words not explicit in the Greek.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  - not anymore
  lexicon: BDAG
  rationale: Expresses cessation in light of the once-for-all efficacy of Christ's
    sacrifice. 'No longer' is natural and precise.
- source_word: προσφορὰ
  chosen: offering
  alternatives:
  - sacrifice
  - offering up
  lexicon: BDAG
  rationale: προσφορά is a general sacrificial term. 'Offering' preserves the lexical
    form and avoids narrowing it beyond the Greek, while still fitting the cultic
    context.
- source_word: περὶ ἁμαρτίας
  chosen: for sin
  alternatives:
  - concerning sin
  - for a sin offering
  - for sins
  lexicon: BDAG
  rationale: The phrase in sacrificial contexts can mean 'for sin' or functionally
    'sin offering.' Here 'offering for sin' is idiomatic and preserves the cultic
    sense without over-specifying beyond the singular Greek construction.
