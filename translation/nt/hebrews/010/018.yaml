theological_decisions:
- issue: Implication of the finality of Christ's sacrifice
  chosen_reading: The verse states that once forgiveness has been granted, no further
    sin-offering remains necessary.
  alternative_readings:
  - The verse abolishes all forms of offering whatsoever
  - The verse refers only to repeated Levitical offerings in a limited ceremonial
    sense
  rationale: The immediate context in Hebrews 10 contrasts repeated sacrifices with
    the effective once-for-all sacrifice of Christ. The translation preserves the
    text's claim about the cessation of offerings for sin without importing broader
    claims beyond the verse itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
