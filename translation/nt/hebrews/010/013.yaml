theological_decisions:
- issue: Messianic enthronement imagery from Psalm 110:1
  chosen_reading: Retain the concrete image of enemies being made 'a footstool for
    his feet' without paraphrasing it as mere defeat or subjugation.
  alternative_readings:
  - until his enemies are defeated
  - until his enemies are put under his feet
  rationale: The author intentionally echoes Psalm 110:1, a key christological enthronement
    text in Hebrews. Preserving the footstool imagery maintains the intertextual and
    theological force without over-interpreting it.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
