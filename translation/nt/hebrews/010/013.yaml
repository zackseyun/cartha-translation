id: HEB.10.13
reference: Hebrews 10:13
source:
  edition: SBLGNT
  text: τὸ λοιπὸν ἐκδεχόμενος ἕως τεθῶσιν οἱ ἐχθροὶ αὐτοῦ ὑποπόδιον τῶν ποδῶν αὐτοῦ,
translation:
  text: from then on waiting until his enemies should be made a footstool for his
    feet,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'expecting' or 'awaiting.' The Greek participle can carry the sense
      of waiting with expectation.
    reason: lexical_alternative
  - marker: b
    text: 'This wording echoes Psalm 110:1, a key enthronement text: ''Sit at my right
      hand until I make your enemies a footstool for your feet.'''
    reason: cross_reference
lexical_decisions:
- source_word: τὸ λοιπὸν
  chosen: from then on
  alternatives:
  - for the rest
  - thereafter
  - from now on
  lexicon: BDAG
  rationale: The articular neuter phrase functions adverbially, indicating what follows
    after the completed offering and seating of the Son in the preceding context.
    'From then on' is idiomatic modern English and captures the temporal sense better
    than the more wooden 'for the rest.'
- source_word: ἐκδεχόμενος
  chosen: waiting
  alternatives:
  - expecting
  - awaiting
  lexicon: BDAG
  rationale: The participle describes Christ's ongoing posture after sitting at God's
    right hand. 'Waiting' is clear and natural; 'expecting' is possible, but in English
    can suggest uncertainty, which is not required by the Greek. 'Awaiting' is also
    possible but slightly less natural for the target register.
- source_word: ἕως
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the goal or endpoint of the
    waiting.
- source_word: τεθῶσιν
  chosen: should be made
  alternatives:
  - are placed
  - be put
  lexicon: BDAG
  rationale: Aorist passive subjunctive of τίθημι after ἕως. 'Should be made' fits
    the dependent clause naturally in English and preserves the passive sense. 'Be
    put' is more literal but less idiomatic with the predicate noun 'footstool.'
- source_word: οἱ ἐχθροὶ αὐτοῦ
  chosen: his enemies
  alternatives:
  - the enemies of him
  lexicon: BDAG
  rationale: Straightforward possessive construction; idiomatic English requires 'his
    enemies.'
- source_word: ὑποπόδιον τῶν ποδῶν αὐτοῦ
  chosen: a footstool for his feet
  alternatives:
  - the footstool of his feet
  - a footstool beneath his feet
  lexicon: BDAG
  rationale: This echoes Psalm 110:1 language. 'A footstool for his feet' is idiomatic
    and preserves the image. 'The footstool of his feet' is more formally literal
    but awkward in contemporary English.
