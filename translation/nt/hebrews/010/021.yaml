theological_decisions:
- issue: Whether to render ἱερέα μέγαν as the technical title 'high priest'
  chosen_reading: great priest
  alternative_readings:
  - high priest
  rationale: Historic Christian theology and the broader argument of Hebrews strongly
    identify Jesus as high priest, but this clause uses ἱερεύς + μέγας rather than
    the standard title ἀρχιερεύς. Following original-language primacy and avoiding
    doctrinal over-importation, the translation keeps the wording 'great priest' while
    allowing readers to recognize the broader priestly theme from context.
  doctrine_reference: Translation philosophy §1, §3
