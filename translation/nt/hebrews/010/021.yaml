id: HEB.10.21
reference: Hebrews 10:21
source:
  edition: SBLGNT
  text: καὶ ἱερέα μέγαν ἐπὶ τὸν οἶκον τοῦ θεοῦ,
translation:
  text: and a great priest over the house of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a high priest." Hebrews frequently presents Jesus as the high priest,
      but this verse literally says "a great priest."
    reason: alternative_reading
  - marker: b
    text: '"House of God" may also carry the sense of God''s household, that is, his
      people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking this phrase with the previous
    participial/possessive construction in vv. 19–21.
- source_word: ἱερέα
  chosen: priest
  alternatives:
  - high priest
  lexicon: BDAG
  rationale: The noun ἱερεύς means 'priest.' Although Hebrews often speaks of Jesus
    as 'high priest' elsewhere, this verse does not use ἀρχιερεύς. To avoid importing
    a title not present in the Greek, 'priest' is retained here, with the elevated
    force conveyed by 'great.'
- source_word: μέγαν
  chosen: great
  alternatives:
  - great/high-ranking
  lexicon: BDAG
  rationale: μέγας here qualifies ἱερέα and conveys greatness or eminence. Rendering
    it as 'great' preserves the Greek wording without collapsing it into the technical
    title 'high priest.'
- source_word: ἐπὶ
  chosen: over
  alternatives:
  - in charge of
  - for
  lexicon: BDAG
  rationale: With the accusative τὸν οἶκον, ἐπί commonly expresses authority or superintendence
    in this context; 'over' is the most natural concise English equivalent.
- source_word: τὸν οἶκον
  chosen: the house
  alternatives:
  - the household
  lexicon: BDAG
  rationale: οἶκος can mean either a physical house or a household/community. In Hebrews,
    'house of God' carries covenantal and communal resonance (cf. Heb 3:2–6). 'House'
    preserves the biblical metaphor and allows readers to hear both senses.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Straightforward genitive construction identifying the house as belonging
    to God.
