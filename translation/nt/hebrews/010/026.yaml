id: HEB.10.26
reference: Hebrews 10:26
source:
  edition: SBLGNT
  text: Ἑκουσίως γὰρ ἁμαρτανόντων ἡμῶν μετὰ τὸ λαβεῖν τὴν ἐπίγνωσιν τῆς ἀληθείας,
    οὐκέτι περὶ ἁμαρτιῶν ἀπολείπεται θυσία,
translation:
  text: For if we go on sinning deliberately after receiving the knowledge of the
    truth, there no longer remains a sacrifice for sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full knowledge of the truth.' The Greek word can carry the sense of
      fuller or decisive knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑκουσίως
  chosen: deliberately
  alternatives:
  - willfully
  - voluntarily
  lexicon: BDAG
  rationale: Adverb modifying the ongoing sinning; 'deliberately' is clear modern
    English and preserves the sense of intentionality without archaic tone. 'Willfully'
    is traditional and viable, but slightly more archaic/legal in register.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding argument. 'For' is
    the most natural discourse marker here in English.
- source_word: ἁμαρτανόντων ἡμῶν
  chosen: if we go on sinning
  alternatives:
  - if we are sinning
  - while we sin
  - if we sin
  lexicon: BDAG
  rationale: Present participle with genitive absolute conveys ongoing or continued
    action rather than a single act. 'Go on sinning' best captures the durative force
    in idiomatic English. The conditional 'if' is supplied to make the genitive absolute
    natural in English.
- source_word: μετὰ τὸ λαβεῖν
  chosen: after receiving
  alternatives:
  - after we receive
  - after having received
  lexicon: BDAG
  rationale: The preposition with articular infinitive indicates temporal sequence.
    'After receiving' is concise and natural while preserving the completed prior
    action.
- source_word: ἐπίγνωσιν
  chosen: knowledge
  alternatives:
  - full knowledge
  - recognition
  lexicon: BDAG
  rationale: ἐπίγνωσις can carry the nuance of fuller or decisive knowledge, but 'knowledge'
    is the most natural English rendering here. The stronger nuance is possible but
    not required by the immediate context, so it is preserved in a footnote rather
    than forced into the main text.
- source_word: τῆς ἀληθείας
  chosen: of the truth
  alternatives:
  - of truth
  lexicon: BDAG
  rationale: Standard and natural rendering of the genitive phrase, likely referring
    to the truth of the gospel in context.
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - no more
  lexicon: BDAG
  rationale: Clear modern English indicating cessation from that point onward.
- source_word: περὶ ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - concerning sins
  - with respect to sins
  lexicon: BDAG
  rationale: In sacrificial contexts, περὶ + genitive commonly has the sense 'for'
    in relation to sin offerings. 'For sins' is idiomatic and reflects the cultic
    sense without over-paraphrase.
- source_word: ἀπολείπεται
  chosen: there remains
  alternatives:
  - is left
  - remains
  lexicon: BDAG
  rationale: Impersonal English construction 'there remains' best conveys the passive/deponent-style
    sense in context.
- source_word: θυσία
  chosen: a sacrifice
  alternatives:
  - sacrifice
  - an offering
  lexicon: BDAG
  rationale: '''Sacrifice'' is the standard rendering and fits the argument of Hebrews
    about Christ''s sacrificial work. The article is absent in Greek, so the English
    indefinite article is natural.'
