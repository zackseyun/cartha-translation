theological_decisions:
- issue: Aspect and pastoral/theological force of ἁμαρτανόντων
  chosen_reading: 'Rendered as ongoing action: ''if we go on sinning deliberately''
    rather than a single deliberate sin.'
  alternative_readings:
  - if we sin willfully
  - if we deliberately sin
  rationale: The present participle naturally suggests continued or persistent action.
    This preserves the warning's gravity without overstating it as referring to any
    one isolated post-conversion sin. The translation avoids importing a denominational
    doctrine of apostasy or perseverance beyond what the Greek aspect supports.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἐπίγνωσις in conversion/warning context
  chosen_reading: Main text uses 'knowledge of the truth' without specifying whether
    this implies saving regeneration.
  alternative_readings:
  - full knowledge of the truth
  - saving knowledge of the truth
  rationale: The verse states reception of the knowledge of the truth, but the text
    itself does not explicitly define the experiential/theological depth of that knowledge.
    The translation therefore stays lexical and does not resolve debates about whether
    the warning addresses regenerate believers, professing believers, or covenant-community
    participants.
  doctrine_reference: Within historic orthodoxy, do not advocate a denominational
    distinctive unless the Greek unambiguously supports it.
