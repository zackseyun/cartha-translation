theological_decisions:
- issue: Scope of εἰς τὸ διηνεκές
  chosen_reading: Attached to the enduring effect of the one sacrifice and rendered
    "for all time" before the main verb.
  alternative_readings:
  - 'Attached more directly to the act of offering: "offered one sacrifice for sins
    forever"'
  - 'Attached to the enthronement: "sat down forever at the right hand of God"'
  rationale: The phrase in Hebrews 10 most naturally underscores the permanent efficacy
    of Christ's single sacrifice in contrast to repeated Levitical offerings. English
    placement before "sat down" best communicates that force without suggesting that
    the sitting itself is the primary point.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it beyond what the text warrants.
