id: HEB.10.12
reference: Hebrews 10:12
source:
  edition: SBLGNT
  text: ⸀οὗτος δὲ μίαν ὑπὲρ ἁμαρτιῶν προσενέγκας θυσίαν εἰς τὸ διηνεκὲς ἐκάθισεν ἐν
    δεξιᾷ τοῦ θεοῦ,
translation:
  text: But this one, after offering one sacrifice for sins for all time, sat down
    at the right hand of God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "having offered one sacrifice for sins forever"; the Greek phrase "for
      all time" can be taken closely with the offering, emphasizing the permanent
      efficacy of the sacrifice.
    reason: alternative_reading
  - marker: b
    text: '"At the right hand of God" echoes Psalm 110:1, a key text in Hebrews for
      the Messiah''s exaltation.'
    reason: cross_reference
lexical_decisions:
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: Rendered demonstratively as "this one" to preserve the contrast with
    the repeated priestly offerings in the surrounding context; more explicit than
    a simple pronoun and closer to the Greek discourse force.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the previous verse's priests who stand daily offering
    repeated sacrifices.
- source_word: μίαν ... θυσίαν
  chosen: one sacrifice
  alternatives:
  - a single sacrifice
  lexicon: BDAG
  rationale: Preserves the emphatic singularity of Christ's offering in contrast to
    many repeated sacrifices.
- source_word: ὑπὲρ ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - on behalf of sins
  - for sin
  lexicon: BDAG
  rationale: Idiomatic English for sacrificial purpose/benefit; plural follows the
    Greek and fits Hebrews' cultic context.
- source_word: προσενέγκας
  chosen: after offering
  alternatives:
  - having offered
  - when he had offered
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb; "after offering" gives
    clear temporal sequence in natural English while preserving the participial relation.
- source_word: εἰς τὸ διηνεκές
  chosen: for all time
  alternatives:
  - continually
  - forever
  - in perpetuity
  lexicon: BDAG
  rationale: In Hebrews this phrase emphasizes enduring validity/permanence. "For
    all time" communicates the lasting effect accessibly and fits the argument of
    the chapter.
- source_word: ἐκάθισεν
  chosen: sat down
  alternatives:
  - took his seat
  lexicon: BDAG
  rationale: Standard rendering that preserves the completed action and its implication
    of finished priestly work in context.
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  chosen: at the right hand of God
  alternatives:
  - at God's right hand
  lexicon: BDAG
  rationale: Traditional and clear rendering of the exaltation formula, preserving
    the allusive connection to Psalm 110:1 and Hebrews' christological argument.
