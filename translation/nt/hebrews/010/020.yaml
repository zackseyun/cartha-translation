id: HEB.10.20
reference: Hebrews 10:20
source:
  edition: SBLGNT
  text: ἣν ἐνεκαίνισεν ἡμῖν ὁδὸν πρόσφατον καὶ ζῶσαν διὰ τοῦ καταπετάσματος, τοῦτ’
    ἔστιν τῆς σαρκὸς αὐτοῦ,
translation:
  text: which he inaugurated for us as a new and living way through the curtain—that
    is, through his flesh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the veil.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'that is, through his flesh' explains the curtain metaphor by
      identifying it with Jesus's flesh.
    reason: cultural_note
lexical_decisions:
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Relative pronoun referring back to the 'entrance' or access of the previous
    verse; 'which' preserves the grammatical linkage without over-specifying the antecedent.
- source_word: ἐνεκαίνισεν
  chosen: inaugurated
  alternatives:
  - opened
  - consecrated
  - dedicated
  lexicon: BDAG
  rationale: The verb ἐγκαινίζω carries the sense of inaugurating or dedicating something
    newly for use. 'Inaugurated' preserves the cultic and covenantal nuance better
    than the flatter 'opened,' while remaining natural English.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: Dative of advantage is best conveyed as 'for us' in English, highlighting
    benefit rather than mere indirect object.
- source_word: ὁδὸν
  chosen: way
  alternatives:
  - path
  - road
  lexicon: BDAG
  rationale: '''Way'' is the standard and most idiomatic rendering in both literal
    and metaphorical contexts, fitting the access-to-God imagery.'
- source_word: πρόσφατον
  chosen: new
  alternatives:
  - fresh
  - recent
  lexicon: BDAG
  rationale: πρόσφατος literally suggests something fresh/recent, but in this context
    modifying 'way' the established sense is a newly established way of access. 'New'
    communicates this clearly without awkwardness.
- source_word: ζῶσαν
  chosen: living
  alternatives:
  - alive
  - life-giving
  lexicon: BDAG
  rationale: Present participle used adjectivally; 'living' is the most natural equivalent
    and preserves the contrast with the old sacrificial system.
- source_word: διὰ τοῦ καταπετάσματος
  chosen: through the curtain
  alternatives:
  - through the veil
  lexicon: BDAG
  rationale: καταπέτασμα refers to the temple/tabernacle curtain. 'Curtain' is more
    accessible modern English; 'veil' is preserved in a footnote as a traditional
    alternative.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - that is to say
  - namely
  lexicon: BDAG
  rationale: Standard explanatory formula introducing the interpretation of the curtain
    imagery.
- source_word: τῆς σαρκὸς αὐτοῦ
  chosen: through his flesh
  alternatives:
  - his flesh
  lexicon: BDAG
  rationale: σάρξ is rendered 'flesh' per doctrinal guidance for literal contexts.
    Because διὰ governs the preceding phrase and the appositional explanation identifies
    the curtain with his flesh, English makes the relation explicit as 'through his
    flesh.' This preserves the metaphor without flattening it to mere 'body.'
