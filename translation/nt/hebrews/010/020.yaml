theological_decisions:
- issue: Metaphorical identification of the curtain with Jesus's flesh
  chosen_reading: Render the explanatory clause as 'that is, through his flesh' to
    preserve the author's typological identification and the means of access imagery.
  alternative_readings:
  - that is, his flesh
  - that is, the curtain being his flesh
  rationale: The Greek apposition τοῦτ’ ἔστιν τῆς σαρκὸς αὐτοῦ explains the curtain
    metaphor in relation to Jesus's flesh. Supplying 'through' in English clarifies
    the continuation of διὰ from the prior phrase and keeps the sacrificial-access
    logic intact without adding doctrinal content beyond the text.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve theological tension
    rather than resolve it'
- issue: Rendering σάρξ
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The doctrine guidance specifies 'flesh' for literal uses of σάρξ and
    'sinful nature' only for metaphorical contexts. Here the reference is to the incarnate,
    sacrificial humanity of Jesus, so 'flesh' is the appropriate and more textually
    transparent rendering.
  doctrine_reference: 'DOCTRINE.md contested terms table: σάρξ → flesh (literal) /
    sinful nature (metaphorical)'
