id: HEB.10.30
reference: Hebrews 10:30
source:
  edition: SBLGNT
  text: οἴδαμεν γὰρ τὸν εἰπόντα· Ἐμοὶ ἐκδίκησις, ἐγὼ ⸀ἀνταποδώσω· καὶ πάλιν· ⸂Κρινεῖ
    κύριος⸃ τὸν λαὸν αὐτοῦ.
translation:
  text: For we know the one who said, “Vengeance belongs to me; I will repay,” and
    again, “The Lord will judge his people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Vengeance is mine.”
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Deuteronomy 32:35–36. In its original context, “judge”
      can include both punishment and vindication; here the warning context emphasizes
      divine judgment.
    reason: cross_reference
lexical_decisions:
- source_word: οἴδαμεν
  chosen: we know
  alternatives:
  - we have known
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense in Koine; 'we know' is
    the natural English equivalent.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connection to the previous verse.
- source_word: τὸν εἰπόντα
  chosen: the one who said
  alternatives:
  - him who said
  - the one speaking
  lexicon: BDAG
  rationale: Substantival aorist participle referring to God as the speaker of the
    cited Scripture; 'the one who said' is idiomatic and preserves the personal reference.
- source_word: Ἐμοὶ ἐκδίκησις
  chosen: Vengeance belongs to me
  alternatives:
  - Vengeance is mine
  - To me belongs vengeance
  lexicon: BDAG
  rationale: The Greek is elliptical, literally 'to me vengeance.' 'Belongs to me'
    makes the possessive force explicit in clear modern English while preserving the
    solemnity of the citation.
- source_word: ἀνταποδώσω
  chosen: I will repay
  alternatives:
  - I will recompense
  - I will pay back
  lexicon: BDAG
  rationale: Future active verb of repayment/recompense. 'Repay' is clear, weighty,
    and idiomatic in English biblical style.
- source_word: καὶ πάλιν
  chosen: and again
  alternatives:
  - and again he says
  - again
  lexicon: BDAG
  rationale: Standard formula introducing a second citation; supplying no extra verb
    avoids overtranslation.
- source_word: Κρινεῖ
  chosen: will judge
  alternatives:
  - will govern
  - will vindicate
  lexicon: BDAG
  rationale: κρίνω can carry a range including judge, decide, vindicate. In this warning
    context, 'will judge' best preserves the judicial force and matches the source
    text plainly.
- source_word: κύριος
  chosen: The Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Default rendering per doctrine for κύριος is 'Lord.' Capitalized here
    because it begins the quotation.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - the people of him
  - his own people
  lexicon: BDAG
  rationale: Natural rendering of the object phrase, preserving covenantal overtones
    without awkward literalism.
