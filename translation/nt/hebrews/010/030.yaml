theological_decisions:
- issue: Rendering the Deuteronomy citation's judicial language
  chosen_reading: 'The verse is rendered with explicit judicial and retributive force:
    ''Vengeance belongs to me; I will repay'' and ''The Lord will judge his people.'''
  alternative_readings:
  - '''Vengeance is mine; I will recompense'''
  - '''The Lord will vindicate his people'''
  rationale: Hebrews uses these quotations in a warning context about divine judgment.
    While κρίνω in the Deuteronomy source can in some contexts imply vindication,
    the immediate context in Hebrews 10 strongly favors the broader and more severe
    sense 'judge.' The translation preserves the text's theological tension by not
    softening divine judgment into mere deliverance.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
