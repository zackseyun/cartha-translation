id: HEB.10.11
reference: Hebrews 10:11
source:
  edition: SBLGNT
  text: Καὶ πᾶς μὲν ἱερεὺς ἕστηκεν καθ’ ἡμέραν λειτουργῶν καὶ τὰς αὐτὰς πολλάκις προσφέρων
    θυσίας, αἵτινες οὐδέποτε δύνανται περιελεῖν ἁμαρτίας.
translation:
  text: And every priest stands day after day ministering and offering the same sacrifices
    again and again, which can never take away sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ... ἱερεὺς
  chosen: every priest
  alternatives:
  - each priest
  - every high priest
  lexicon: BDAG
  rationale: πᾶς with singular noun is distributive, referring to each priest in the
    Levitical order. 'Every priest' is natural English and preserves the distributive
    force. 'High priest' is excluded because ἱερεύς here is not ἀρχιερεύς.
- source_word: ἕστηκεν
  chosen: stands
  alternatives:
  - has stood
  - is standing
  lexicon: BDAG
  rationale: Perfect of ἵστημι conveys a standing posture/state. 'Stands' is idiomatic
    in English and preserves the vivid contrast with Messiah's seated posture in the
    surrounding context (v. 12) without overtranslating the aspect.
- source_word: καθ’ ἡμέραν
  chosen: day after day
  alternatives:
  - daily
  - every day
  lexicon: BDAG
  rationale: The phrase denotes repeated daily action. 'Day after day' brings out
    the ongoing, repetitive sense more clearly than the flatter adverb 'daily,' fitting
    the argument about continual priestly service.
- source_word: λειτουργῶν
  chosen: ministering
  alternatives:
  - serving
  - performing priestly service
  lexicon: BDAG
  rationale: The participle refers to cultic/priestly service. 'Ministering' is concise,
    readable, and retains the sacred-service nuance better than the generic 'serving.'
- source_word: τὰς αὐτὰς ... θυσίας
  chosen: the same sacrifices
  alternatives:
  - those same sacrifices
  lexicon: BDAG
  rationale: αὐτάς is adjectival, emphasizing repetition of identical sacrificial
    offerings. 'The same sacrifices' is the most direct rendering.
- source_word: πολλάκις
  chosen: again and again
  alternatives:
  - repeatedly
  - many times
  - often
  lexicon: BDAG
  rationale: The adverb stresses repeated recurrence. 'Again and again' is idiomatic
    and forceful, matching the rhetorical emphasis of the passage.
- source_word: προσφέρων
  chosen: offering
  alternatives:
  - presenting
  lexicon: BDAG
  rationale: In sacrificial contexts προσφέρω commonly means 'offer.' This is standard
    and contextually precise.
- source_word: αἵτινες
  chosen: which
  alternatives:
  - and these
  - such sacrifices as
  lexicon: BDAG
  rationale: αἵτινες is qualitative/explicative, referring back to the sacrifices
    as the kind that are unable to remove sins. 'Which' is sufficient in English;
    the explanatory force is carried by the clause as a whole.
- source_word: οὐδέποτε δύνανται
  chosen: can never
  alternatives:
  - are never able to
  - can by no means ever
  lexicon: BDAG
  rationale: The combination expresses absolute incapacity. 'Can never' is concise,
    natural, and preserves the force.
- source_word: περιελεῖν ἁμαρτίας
  chosen: take away sins
  alternatives:
  - remove sins
  lexicon: BDAG
  rationale: περιαιρέω here means to remove or take away. 'Take away sins' is idiomatic
    in English and resonates with sacrificial-removal language in biblical usage without
    importing a more technical term.
