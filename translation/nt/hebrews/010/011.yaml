theological_decisions:
- issue: Relation of priestly posture to the argument of Hebrews 10
  chosen_reading: Rendered ἕστηκεν as 'stands' to preserve the contrast between the
    ongoing standing ministry of Levitical priests and the seated finality of Messiah's
    work in the next verse.
  alternative_readings:
  - Rendered more neutrally as 'is standing' or 'has stood' without highlighting the
    literary contrast
  rationale: The verse participates in a deliberate contrast in the immediate context.
    Preserving 'stands' keeps the theological-literary tension explicit without adding
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of sacrificial ineffectiveness
  chosen_reading: The repeated sacrifices 'can never take away sins' refers to their
    inability to effect final removal of sins in the argument of Hebrews.
  alternative_readings:
  - A weaker rendering such as 'cannot fully deal with sins'
  rationale: The Greek states inability in absolute terms within the author's argument
    about the old sacrificial system's insufficiency. The translation should not soften
    this claim.
  doctrine_reference: Translation philosophy §1, §5
