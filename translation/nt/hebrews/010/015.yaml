theological_decisions:
- issue: Personal agency of the Holy Spirit in testimony
  chosen_reading: the Holy Spirit also testifies to us
  alternative_readings:
  - the Holy Spirit also bears witness for us
  rationale: The verse presents the Holy Spirit as an active personal witness. The
    translation preserves that personal agency without reduction to an impersonal
    force. This aligns with historic orthodox Trinitarian doctrine while simply reflecting
    the Greek syntax.
