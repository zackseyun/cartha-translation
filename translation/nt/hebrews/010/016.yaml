id: HEB.10.16
reference: Hebrews 10:16
source:
  edition: SBLGNT
  text: Αὕτη ἡ διαθήκη ἣν διαθήσομαι πρὸς αὐτοὺς μετὰ τὰς ἡμέρας ἐκείνας, λέγει κύριος,
    διδοὺς νόμους μου ἐπὶ καρδίας αὐτῶν, καὶ ἐπὶ ⸂τὴν διάνοιαν⸃ αὐτῶν ἐπιγράψω αὐτούς,
translation:
  text: 'This is the covenant that I will make with them after those days, says the
    Lord: putting my laws upon their hearts, and I will write them on their mind,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly in English, 'I will put my laws upon their hearts, and
      I will write them on their mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - testament
  - arrangement
  lexicon: BDAG
  rationale: In Hebrews, διαθήκη carries the covenantal sense drawn from Jeremiah
    31 rather than the later English sense 'testament.' 'Covenant' best preserves
    the intertextual and theological force.
- source_word: διαθήσομαι
  chosen: I will make
  alternatives:
  - I will establish
  - I will covenant
  lexicon: BDAG
  rationale: Future middle of διατίθεμαι in covenant contexts commonly means to make
    or establish a covenant. 'I will make' is idiomatic English and matches the covenant
    formula.
- source_word: πρὸς αὐτούς
  chosen: with them
  alternatives:
  - toward them
  lexicon: BDAG
  rationale: In covenant-making context, πρὸς with persons is naturally rendered 'with'
    in English rather than the more literal but awkward 'toward.'
- source_word: μετὰ τὰς ἡμέρας ἐκείνας
  chosen: after those days
  alternatives:
  - after those days have passed
  lexicon: BDAG
  rationale: This preserves the temporal phrase from the Jeremiah citation in natural
    English without expansion.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Although the verse
    quotes an OT passage with covenantal resonance, the Greek text here reads κύριος,
    and 'Lord' matches the stated default.
- source_word: διδοὺς
  chosen: putting
  alternatives:
  - giving
  - placing
  lexicon: BDAG
  rationale: The participle introduces the manner/content of the covenant promise.
    'Putting' fits the idiom with laws placed upon hearts better than the more wooden
    'giving.'
- source_word: νόμους
  chosen: laws
  alternatives:
  - law
  - instructions
  lexicon: BDAG
  rationale: The plural is explicit in the Greek and should be preserved. 'Instructions'
    is possible but weakens the lexical link to νόμος.
- source_word: ἐπὶ καρδίας αὐτῶν
  chosen: upon their hearts
  alternatives:
  - on their hearts
  - in their hearts
  lexicon: BDAG
  rationale: ἐπί with accusative here is spatial/metaphorical. 'Upon their hearts'
    preserves the prepositional imagery and pairs well with the following clause.
- source_word: διάνοιαν
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: BDAG
  rationale: διάνοια refers to the faculty of understanding/thought. 'Mind' is the
    most natural and sufficiently broad English equivalent in this covenant citation.
- source_word: ἐπιγράψω
  chosen: I will write
  alternatives:
  - I will inscribe
  lexicon: BDAG
  rationale: The future verb means to write on or inscribe. 'I will write' is clear
    modern English; the prepositional phrase already conveys the surface/location.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - these laws
  lexicon: BDAG
  rationale: The pronoun refers back to 'my laws.' Rendering it as 'them' preserves
    the Greek anaphora without unnecessary repetition, though English readers will
    understand the referent from context.
