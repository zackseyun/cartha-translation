theological_decisions:
- issue: Rendering the Jeremiah citation's internal syntax
  chosen_reading: Retain the participial construction ('putting my laws upon their
    hearts') followed by the finite future ('I will write them on their mind')
  alternative_readings:
  - 'Smooth into two finite verbs: ''I will put ... and write ...'''
  rationale: The Greek of Hebrews differs slightly in form from many English renderings
    of Jeremiah. Preserving the participle reflects the wording of this verse as transmitted
    in Hebrews while remaining readable. This avoids importing a harmonized form not
    strictly present in the Greek text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
