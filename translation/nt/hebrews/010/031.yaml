id: HEB.10.31
reference: Hebrews 10:31
source:
  edition: SBLGNT
  text: φοβερὸν τὸ ἐμπεσεῖν εἰς χεῖρας θεοῦ ζῶντος.
translation:
  text: It is a fearful thing to fall into the hands of the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It is terrifying to fall into the hands of the living God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβερὸν
  chosen: a fearful thing
  alternatives:
  - terrifying
  - dreadful
  lexicon: BDAG
  rationale: φοβερός denotes that which inspires fear, dread, or terror. The predicate
    adjective with the articular infinitive yields an idiomatic English expression,
    'It is a fearful thing,' which preserves the solemn gravity without sounding unnatural.
    'Terrifying' is possible but slightly more interpretive and emotive.
- source_word: τὸ ἐμπεσεῖν
  chosen: to fall
  alternatives:
  - to fall into
  - to encounter
  lexicon: BDAG
  rationale: 'The article plus aorist infinitive functions substantivally: ''the falling''
    or idiomatically ''to fall.'' Because εἰς follows, English can render the verbal
    idea simply as ''to fall'' and let the prepositional phrase complete it. ''Encounter''
    is too weak and loses the force of sudden falling into another''s power.'
- source_word: εἰς χεῖρας
  chosen: into the hands
  alternatives:
  - into the power
  - into the grasp
  lexicon: BDAG
  rationale: This is a standard idiom for coming under someone's power or judgment.
    Retaining 'hands' preserves the biblical imagery and intertextual resonance, while
    the preposition εἰς is naturally rendered 'into.'
- source_word: θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: 'Straightforward genitive dependent on ''hands'': ''the hands of God.''
    No contextual reason exists to expand or qualify the noun.'
- source_word: ζῶντος
  chosen: living
  alternatives:
  - alive
  lexicon: BDAG
  rationale: 'The present participle functions attributively with θεοῦ: ''the living
    God.'' This is a conventional biblical expression emphasizing God''s active, real,
    and judging presence. ''Alive'' is less idiomatic in this title-like expression.'
