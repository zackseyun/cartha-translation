theological_decisions:
- issue: Force of the warning statement
  chosen_reading: A general, solemn declaration about the terror of coming under the
    judgment of the living God
  alternative_readings:
  - A narrower reference only to temporal discipline
  - An existential statement without judgment connotations
  rationale: In context the verse concludes a warning passage and the idiom 'fall
    into the hands of' commonly carries judicial force. The translation preserves
    that gravity without adding interpretive expansions such as 'judgment' directly
    into the text, since the Greek expresses it through idiom rather than an explicit
    noun.
  doctrine_reference: Preserve theological tension rather than resolve it.
