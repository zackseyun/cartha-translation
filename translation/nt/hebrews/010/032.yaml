theological_decisions:
- issue: Meaning of φωτισθέντες in a warning/exhortation context
  chosen_reading: Retain the metaphorical term 'enlightened' without narrowing it
    to a specific doctrinal event such as conversion, baptism, or catechetical instruction.
  alternative_readings:
  - after you were converted
  - after you were baptized
  - after you received the light of the gospel
  rationale: The participle clearly indicates a prior reception of spiritual illumination,
    but the verse itself does not specify the precise ecclesial or experiential referent.
    Preserving 'enlightened' maintains the theological tension and avoids importing
    a denominationally specific interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
