id: HEB.10.32
reference: Hebrews 10:32
source:
  edition: SBLGNT
  text: Ἀναμιμνῄσκεσθε δὲ τὰς πρότερον ἡμέρας, ἐν αἷς φωτισθέντες πολλὴν ἄθλησιν ὑπεμείνατε
    παθημάτων,
translation:
  text: But remember the former days, when, after you were enlightened, you endured
    a great struggle of sufferings,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you were enlightened.' The Greek participle may be rendered with
      either temporal overlap or antecedent action in English.
    reason: lexical_alternative
  - marker: b
    text: '''Enlightened'' could refer broadly to receiving spiritual illumination;
      interpreters variously connect it with conversion, baptism, or instruction in
      the faith.'
    reason: alternative_reading
  - marker: c
    text: Or 'a hard contest of sufferings.' The noun carries the sense of a struggle
      or contest.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναμιμνῄσκεσθε
  chosen: remember
  alternatives:
  - call to mind
  - keep remembering
  lexicon: BDAG
  rationale: Present middle/passive imperative, second plural. 'Remember' gives the
    imperative force in natural English. 'Keep remembering' is possible to bring out
    the present aspect, but English imperative style commonly leaves that implicit.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild transition or contrast with the preceding warning/exhortation.
    'But' best captures the rhetorical turn here.
- source_word: τὰς πρότερον ἡμέρας
  chosen: the former days
  alternatives:
  - the earlier days
  - the days before
  lexicon: BDAG
  rationale: A natural rendering of the accusative object with πρότερον functioning
    adjectivally. 'Former days' is concise and idiomatic while preserving the temporal
    contrast.
- source_word: ἐν αἷς
  chosen: when
  alternatives:
  - in which
  - during which
  lexicon: BDAG
  rationale: Although literally 'in which,' the phrase is temporal in context. 'When'
    preserves the sense in idiomatic English without unnecessary stiffness.
- source_word: φωτισθέντες
  chosen: after you were enlightened
  alternatives:
  - when you were enlightened
  - after being enlightened
  - after you received light
  lexicon: BDAG
  rationale: Aorist passive participle. 'Enlightened' is the most direct lexical equivalent
    and preserves the author's metaphorical/theological language. 'After you were
    enlightened' makes the participle's antecedent action relative to the main verb
    clear in English.
- source_word: πολλὴν ἄθλησιν
  chosen: a great struggle
  alternatives:
  - much conflict
  - a hard contest
  lexicon: BDAG
  rationale: ἄθλησις evokes athletic contest/struggle. 'A great struggle' is idiomatic
    and preserves the intensity signaled by πολλήν without over-literalizing the athletic
    metaphor.
- source_word: ὑπεμείνατε
  chosen: you endured
  alternatives:
  - you persevered through
  - you bore up under
  lexicon: BDAG
  rationale: Aorist active indicative, second plural. 'Endured' is the standard and
    contextually fitting rendering for ὑπομένω in suffering contexts.
- source_word: παθημάτων
  chosen: of sufferings
  alternatives:
  - of afflictions
  - of hardships
  lexicon: BDAG
  rationale: Genitive plural dependent on 'struggle,' specifying the kind of struggle.
    'Sufferings' is the most direct rendering and preserves the broad scope of experienced
    hardships.
