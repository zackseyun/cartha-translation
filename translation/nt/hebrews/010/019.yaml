id: HEB.10.19
reference: Hebrews 10:19
source:
  edition: SBLGNT
  text: Ἔχοντες οὖν, ἀδελφοί, παρρησίαν εἰς τὴν εἴσοδον τῶν ἁγίων ἐν τῷ αἵματι Ἰησοῦ,
translation:
  text: Therefore, brothers, since we have boldness to enter the holy places by the
    blood of Jesus,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and may address the
      whole congregation representatively.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sanctuary'; the phrase refers to the holy places of God's presence
      in the context of Hebrews' tabernacle imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες
  chosen: since we have
  alternatives:
  - having
  - because we have
  lexicon: BDAG
  rationale: Although formally a participle ('having'), in this exhortational context
    it introduces the basis for the following appeal. 'Since we have' gives natural
    English while preserving the causal/logical force.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument. 'Therefore' best preserves
    the logical connection in clear modern English.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate rendering is preferred. The Greek is grammatically
    masculine plural and commonly addresses the whole congregation representatively.
    'Brothers' preserves the form of address; inclusivity can be noted in a footnote.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - confidence
  - freedom of speech
  lexicon: BDAG
  rationale: In Hebrews this term conveys confident freedom of access before God.
    'Boldness' preserves the strong, reverent confidence better than the slightly
    flatter 'confidence.'
- source_word: εἰς τὴν εἴσοδον
  chosen: to enter
  alternatives:
  - for entrance into
  - for entering
  lexicon: BDAG
  rationale: The prepositional phrase with the noun 'entrance' is rendered idiomatically
    in English as an infinitive, preserving the sense of access without awkwardness.
- source_word: τῶν ἁγίων
  chosen: the holy places
  alternatives:
  - the sanctuary
  - the Most Holy Place
  - the saints
  lexicon: BDAG
  rationale: In Hebrews this expression refers to the heavenly sanctuary/holy realm
    rather than 'saints.' 'The holy places' is a transparent rendering that preserves
    the cultic imagery and leaves the exact scope to context. 'Most Holy Place' would
    be too specific here.
- source_word: ἐν τῷ αἵματι Ἰησοῦ
  chosen: by the blood of Jesus
  alternatives:
  - in the blood of Jesus
  - through the blood of Jesus
  lexicon: BDAG
  rationale: The phrase expresses means or basis of access. 'By the blood of Jesus'
    is natural English and preserves sacrificial/theological force without overinterpreting
    beyond the Greek.
