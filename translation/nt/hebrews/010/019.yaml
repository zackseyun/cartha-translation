theological_decisions:
- issue: Scope of τῶν ἁγίων
  chosen_reading: cultic/spatial reference to the holy places of God's presence, not
    'the saints'
  alternative_readings:
  - the sanctuary
  - the Most Holy Place
  - the saints
  rationale: Within Hebrews' sustained tabernacle imagery, the phrase most naturally
    denotes access into God's holy presence through Jesus' sacrificial blood. Rendering
    it as 'the saints' would disrupt the immediate cultic context; rendering it as
    'the Most Holy Place' would narrow the phrase more than the Greek requires.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Representative force of ἀδελφοί
  chosen_reading: retain 'brothers' in the main text with inclusivity noted in a footnote
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The doctrine excerpt directs gender-accurate rather than gender-neutral
    translation. The masculine plural likely addresses the whole Christian assembly,
    but the main text should preserve the source form while a footnote can clarify
    representative force.
  doctrine_reference: Translation philosophy §4
