theological_decisions:
- issue: Eschatological reference of 'the Day'
  chosen_reading: Render as 'the Day' with capitalization, indicating the recognized
    final/eschatological day without specifying beyond the text.
  alternative_readings:
  - the day
  - the Day of the Lord
  - the day of judgment
  rationale: The context of perseverance and approaching consummation supports an
    eschatological referent. Capitalization helps English readers catch the likely
    force while avoiding over-interpretive expansion not present in the Greek.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Mutual object of παρακαλοῦντες
  chosen_reading: Supply 'one another' in English.
  alternative_readings:
  - leave the object implicit
  rationale: Although not explicit in the Greek phrase, the reciprocal sense is strongly
    implied by the communal context ('our own gathering together') and is standard,
    natural English. This is an explicitation of discourse sense, not an added doctrine.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
