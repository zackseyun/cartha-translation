id: HEB.10.38
reference: Hebrews 10:38
source:
  edition: SBLGNT
  text: ὁ δὲ δίκαιός ⸀μου ἐκ πίστεως ζήσεται, καὶ ἐὰν ὑποστείληται, οὐκ εὐδοκεῖ ἡ
    ψυχή μου ἐν αὐτῷ.
translation:
  text: But my righteous one will live by faith, and if he shrinks back, my soul takes
    no pleasure in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by faithfulness' or 'by trust.' The Greek word pistis can carry these
      senses, though the main text follows the project's default rendering 'faith.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read simply 'the righteous one' instead of 'my righteous
      one.'
    reason: textual_variant
  - marker: c
    text: The singular masculine ('he,' 'him') reflects the Greek wording and functions
      representatively, not necessarily exclusively of males.
    reason: cultural_note
lexical_decisions:
- source_word: δίκαιός
  chosen: righteous one
  alternatives:
  - righteous man
  - just one
  lexicon: BDAG
  rationale: Substantival adjective with the article, referring to a person characterized
    by righteousness. 'Righteous one' preserves the Greek form without over-specifying
    gender beyond the representative masculine already present.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: Included with δίκαιός per the SBLGNT reading, yielding 'my righteous
    one.' This follows the Greek text as given, though some textual traditions omit
    the pronoun here.
- source_word: ἐκ πίστεως
  chosen: by faith
  alternatives:
  - from faith
  - by faithfulness
  - by trust
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per doctrine guidelines. The preposition ἐκ
    here idiomatically expresses basis/source, and 'by faith' is the most natural
    English rendering. Because πίστις can also bear the sense 'faithfulness' or 'trust,'
    those alternatives are preserved in a footnote rather than adopted in the main
    text.
- source_word: ζήσεται
  chosen: will live
  alternatives:
  - shall live
  lexicon: BDAG
  rationale: Future middle indicative of ζάω, rendered straightforwardly as future
    'will live.' 'Shall' is possible but less natural in modern English.
- source_word: ὑποστείληται
  chosen: shrinks back
  alternatives:
  - draws back
  - turns back
  lexicon: BDAG
  rationale: The verb in this context conveys retreating or drawing back in the face
    of pressure. 'Shrinks back' communicates the sense idiomatically in modern English
    and fits the warning context of Hebrews 10.
- source_word: οὐκ εὐδοκεῖ
  chosen: takes no pleasure
  alternatives:
  - is not pleased
  - has no delight
  lexicon: BDAG
  rationale: εὐδοκέω means to take pleasure in, be pleased with. 'Takes no pleasure'
    closely reflects the lexical sense and preserves the personal force of the statement.
- source_word: ἡ ψυχή μου
  chosen: my soul
  alternatives:
  - I
  - myself
  lexicon: BDAG
  rationale: The Greek explicitly says 'my soul,' echoing the scriptural source and
    preserving the anthropomorphic/personal expression rather than flattening it to
    simply 'I.'
- source_word: ἐν αὐτῷ
  chosen: in him
  alternatives:
  - with him
  lexicon: BDAG
  rationale: Standard rendering of ἐν + dative here after εὐδοκέω. 'In him' is idiomatic
    and traditional; 'with him' is possible but less direct.
