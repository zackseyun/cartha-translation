theological_decisions:
- issue: Sense of πίστις in ἐκ πίστεως
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith' in the main text, while alternatives
    are preserved in a footnote where the term is theologically contested. In Hebrews
    10:38, the phrase echoes Habakkuk and can be discussed in terms of faith/faithfulness,
    so the alternative is documented without resolving the broader theological debate
    beyond the default rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved
    in footnotes where contested'
- issue: Referent of the subject in 'if he shrinks back'
  chosen_reading: the same singular person introduced as 'my righteous one'
  alternative_readings:
  - an indefinite person distinct from 'my righteous one'
  rationale: The Greek maintains singular masculine reference through the clause,
    and the verse as quoted in Hebrews presents both statements in sequence without
    explicitly changing subjects. The translation preserves that grammatical flow
    and does not attempt to soften the warning for doctrinal reasons.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
- issue: Gendered representation
  chosen_reading: retain singular masculine pronouns
  alternative_readings:
  - they shrink back
  - the person shrinks back
  rationale: The Greek uses singular masculine forms. Per doctrine guidelines, gender-accurate
    rendering is preferred over gender-neutral smoothing when the source is grammatically
    masculine with representative force. The translation therefore keeps 'he' and
    may clarify representational force in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: gender-accurate over
    gender-neutral'
