id: HEB.2.16
reference: Hebrews 2:16
source:
  edition: SBLGNT
  text: οὐ γὰρ δήπου ἀγγέλων ἐπιλαμβάνεται, ἀλλὰ σπέρματος Ἀβραὰμ ἐπιλαμβάνεται.
translation:
  text: For surely it is not angels that he helps, but the offspring of Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes hold of'; the Greek verb can mean 'grasp' literally, but here
      likely carries the sense 'help' or 'come to the aid of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δήπου
  chosen: surely
  alternatives:
  - certainly
  - of course
  lexicon: BDAG
  rationale: δήπου adds an emphatic inferential nuance, softening the assertion into
    something evident or obvious to the audience. 'Surely' captures this natural English
    force better than a wooden omission.
- source_word: ἀγγέλων
  chosen: angels
  lexicon: BDAG
  rationale: The genitive plural after ἐπιλαμβάνεται marks the class contrasted with
    'the offspring of Abraham.' 'Angels' is the straightforward lexical equivalent.
- source_word: ἐπιλαμβάνεται
  chosen: helps
  alternatives:
  - takes hold of
  - comes to the aid of
  lexicon: BDAG
  rationale: In this context the verb is widely understood idiomatically as taking
    hold in order to help or rescue, not merely grasping physically. 'Helps' gives
    clear modern English and fits the argument of the incarnation in context. The
    more formal alternative 'takes hold of' is preserved in a footnote because it
    has longstanding support and reflects the verb's more literal sense.
- source_word: σπέρματος Ἀβραὰμ
  chosen: the offspring of Abraham
  alternatives:
  - the seed of Abraham
  - Abraham's descendants
  lexicon: BDAG
  rationale: σπέρμα can denote seed, offspring, or descendants. 'The offspring of
    Abraham' preserves the singular collective form better than the more interpretive
    plural 'descendants,' while remaining more natural in modern English than 'seed
    of Abraham.'
- source_word: οὐ γὰρ ... ἀλλὰ
  chosen: For surely it is not ... but ...
  alternatives:
  - For certainly not ... but ...
  lexicon: BDAG
  rationale: This correlative structure marks a strong contrast. Rendering it with
    cleft-like English ('it is not ... that ... but ...') preserves the emphasis of
    the Greek argument.
