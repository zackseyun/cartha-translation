theological_decisions:
- issue: Meaning of ἐπιλαμβάνεται in relation to Christ's saving work
  chosen_reading: The verse states that the Son helps or comes to the aid of Abraham's
    offspring rather than angels.
  alternative_readings:
  - The verse states that the Son takes hold of the offspring of Abraham, emphasizing
    assumption of human nature.
  rationale: The immediate context concerns the Son's solidarity with humans and his
    saving action. While the literal sense 'take hold of' has been used to support
    an incarnational nuance, the idiomatic sense 'help/come to the aid of' better
    fits common usage and the contrast being made. Because the alternative has theological
    and translation-history significance, it is preserved in a footnote rather than
    excluded.
  doctrine_reference: Preserve theological tension rather than resolve it.
