id: HEB.2.11
reference: Hebrews 2:11
source:
  edition: SBLGNT
  text: ὅ τε γὰρ ἁγιάζων καὶ οἱ ἁγιαζόμενοι ἐξ ἑνὸς πάντες· δι’ ἣν αἰτίαν οὐκ ἐπαισχύνεται
    ἀδελφοὺς αὐτοὺς καλεῖν,
translation:
  text: For both the one who sanctifies and those who are being sanctified are all
    from one; for this reason he is not ashamed to call them brothers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from one Father,' 'of one source,' or 'from one ancestor.' The Greek
      does not specify the referent of 'one.'
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' translates the masculine plural ἀδελφοὺς; in context it may
      refer to the wider family of believers, including women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἁγιάζων
  chosen: the one who sanctifies
  alternatives:
  - the one who makes holy
  - the sanctifier
  lexicon: BDAG
  rationale: Present active participle used substantivally. 'Sanctifies' preserves
    the established theological term while remaining understandable; 'makes holy'
    is possible but less consistent with NT usage.
- source_word: οἱ ἁγιαζόμενοι
  chosen: those who are being sanctified
  alternatives:
  - those who are sanctified
  - those being made holy
  lexicon: BDAG
  rationale: Present passive participle indicates an ongoing process or state viewed
    in progress. 'Are being sanctified' best reflects the participial aspect and keeps
    lexical consistency with ἁγιάζω.
- source_word: ἐξ ἑνὸς
  chosen: from one
  alternatives:
  - from one Father
  - of one source
  - from one ancestor
  lexicon: BDAG
  rationale: The Greek leaves the referent of 'one' unstated. Rendering simply 'from
    one' preserves the ambiguity rather than resolving it toward God, Adam, Abraham,
    or a common human origin.
- source_word: πάντες
  chosen: are all
  alternatives:
  - all are
  - all come
  lexicon: BDAG
  rationale: Supplies the implied copula in natural English while preserving the emphatic
    inclusion of both sanctifier and sanctified.
- source_word: δι’ ἣν αἰτίαν
  chosen: for this reason
  alternatives:
  - therefore
  - because of which
  lexicon: BDAG
  rationale: This idiom introduces the consequence of the previous statement. 'For
    this reason' is clear, natural, and slightly more explicit than a bare 'therefore.'
- source_word: οὐκ ἐπαισχύνεται
  chosen: he is not ashamed
  alternatives:
  - he does not feel shame
  - he does not shrink from
  lexicon: BDAG
  rationale: Standard rendering of the middle/passive form in this context; it preserves
    the honor-shame nuance without paraphrase.
- source_word: ἀδελφοὺς
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Masculine plural noun retained per gender-accurate philosophy. In context
    it likely includes the whole sanctified community, but the source uses the masculine
    familial term, so 'brothers' is kept and inclusivity can be noted in a footnote.
- source_word: καλεῖν
  chosen: to call
  alternatives:
  - to name
  lexicon: BDAG
  rationale: Infinitive after ἐπαισχύνεται naturally yields 'to call.' 'Name' is possible
    but less idiomatic here.
