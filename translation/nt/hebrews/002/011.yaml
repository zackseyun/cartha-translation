theological_decisions:
- issue: Identity of the implied subject ('he') and the referent of 'from one'
  chosen_reading: 'The main text leaves both as in the Greek: ''he'' refers contextually
    to the sanctifying Son, while ''from one'' remains unspecified.'
  alternative_readings:
  - '''from one Father'''
  - '''from one ancestor'''
  - '''from one source'''
  rationale: The immediate context identifies the sanctifier as the Son/Jesus, so
    English 'he' is appropriate. But ἐξ ἑνὸς does not specify whether the 'one' is
    God, Adam, Abraham, or one shared human stock. The translation preserves this
    theological openness rather than narrowing it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
