theological_decisions:
- issue: Referent of 'his' in 'according to his will'
  chosen_reading: The pronoun refers to God the subject of the participle.
  alternative_readings:
  - The pronoun could be taken more loosely as referring to the Holy Spirit, though
    this is less likely syntactically.
  rationale: The nearest and controlling subject is 'God,' who is said to bear witness
    by signs, wonders, miracles, and distributions of the Holy Spirit. The final phrase
    most naturally grounds these attestations in God's sovereign will without making
    a separate doctrinal claim beyond the syntax.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Rendering of πνεύματος ἁγίου
  chosen_reading: Holy Spirit
  rationale: This is the standard and contextually appropriate rendering of the phrase,
    preserving the personal divine title recognized in historic Christian orthodoxy
    without importing extra doctrinal elaboration.
  doctrine_reference: Affirmations (Nicene Creed 381 AD)
