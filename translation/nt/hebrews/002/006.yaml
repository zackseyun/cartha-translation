theological_decisions:
- issue: Whether 'the son of man' should be rendered in a way that explicitly signals
    a messianic title
  chosen_reading: Retain 'the son of man' as the wording of the Psalm quotation without
    making the title explicit in the main text.
  alternative_readings:
  - render generically as 'a human being' or 'a human son'
  - capitalize as 'the Son of Man' to suggest a Christological title
  rationale: In its source context (Psalm 8), the phrase is a poetic parallel for
    humanity. Hebrews will apply the passage christologically in context, but this
    verse itself presents the quotation as written. Preserving the phrase maintains
    the theological tension between humanity in general and its fulfillment in Jesus,
    rather than resolving it prematurely.
  doctrine_reference: Translation philosophy §3; §4
