id: HEB.2.13
reference: Hebrews 2:13
source:
  edition: SBLGNT
  text: καὶ πάλιν· Ἐγὼ ἔσομαι πεποιθὼς ἐπ’ αὐτῷ· καὶ πάλιν· Ἰδοὺ ἐγὼ καὶ τὰ παιδία
    ἅ μοι ἔδωκεν ὁ θεός.
translation:
  text: And again, “I will put my trust in him.” And again, “Behold, I and the children
    whom God has given me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “I will be trusting in him” or “I will have confidence
      in him.”
    reason: lexical_alternative
  - marker: b
    text: The speaker is not named in the Greek of this verse; in context Hebrews
      applies these quotations to the Son.
    reason: cross_reference
  - marker: c
    text: Greek has neuter “the children … which/that,” matching the grammatical gender
      of “children”; English uses “whom” for persons.
    reason: lexical_alternative
  - marker: d
    text: Or “whom God gave me.”
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ πάλιν
  chosen: And again
  alternatives:
  - And again he says
  - And again
  lexicon: BDAG
  rationale: Introduces another citation. The Greek supplies only 'and again,' not
    an explicit verb of speaking, so the concise citation formula is preserved without
    adding 'he says' to the main text.
- source_word: Ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained because it is present in the citation
    and contributes to the emphatic first-person voice.
- source_word: ἔσομαι πεποιθὼς
  chosen: I will put my trust
  alternatives:
  - I will be trusting
  - I will have confidence
  lexicon: BDAG
  rationale: The future of εἰμί with the perfect participle of πείθω forms a periphrastic
    expression conveying a settled future posture of trust/confidence. 'I will put
    my trust' is idiomatic English and reflects the citation's sense better than the
    stiffer 'I will be trusting.'
- source_word: ἐπ’ αὐτῷ
  chosen: in him
  alternatives:
  - on him
  lexicon: BDAG
  rationale: With verbs of trust, English normally uses 'in' rather than the more
    literal 'on.' This preserves the sense naturally while remaining faithful to the
    Greek prepositional phrase.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retained as a formal deictic marker appropriate to a quotation. 'Behold'
    preserves the elevated citation style and rhetorical force without paraphrase.
- source_word: τὰ παιδία
  chosen: the children
  alternatives:
  - the little children
  - the young ones
  lexicon: BDAG
  rationale: παιδία here refers to children in a relational sense within the quoted
    text. 'The children' is the most natural and sufficiently broad rendering.
- source_word: ἅ μοι ἔδωκεν ὁ θεός
  chosen: whom God has given me
  alternatives:
  - that God gave me
  - whom God gave me
  lexicon: BDAG
  rationale: Although παιδία is grammatically neuter and ἅ matches it, English idiom
    for persons prefers 'whom' rather than 'that.' The perfective force is not marked
    in Greek tense here; 'has given' works well in English to express the present
    relevance of God's giving, though 'gave' is possible. 'God' is placed before the
    verb in normal English order.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. No article needs to be represented in English
    here.
