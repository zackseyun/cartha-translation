theological_decisions:
- issue: Quotation style and christological voice
  chosen_reading: Render the OT citations straightforwardly as first-person speech
    without adding interpretive identifiers in the main text.
  alternative_readings:
  - Add 'he says' or 'the Messiah says' in the main text to clarify the speaker
  rationale: Hebrews applies these quotations to the Son, but the Greek text here
    presents them simply as citation formulas. To avoid importing interpretation into
    the translation while preserving the epistle's argument, the main text leaves
    the speaker implicit and lets context identify the christological application.
  doctrine_reference: Preserve theological tension rather than resolve it.
