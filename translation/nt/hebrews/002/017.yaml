id: HEB.2.17
reference: Hebrews 2:17
source:
  edition: SBLGNT
  text: ὅθεν ὤφειλεν κατὰ πάντα τοῖς ἀδελφοῖς ὁμοιωθῆναι, ἵνα ἐλεήμων γένηται καὶ
    πιστὸς ἀρχιερεὺς τὰ πρὸς τὸν θεόν, εἰς τὸ ἱλάσκεσθαι τὰς ἁμαρτίας τοῦ λαοῦ·
translation:
  text: Therefore he had to become like his brothers in every respect, so that he
    might become a merciful and faithful high priest in the things pertaining to God,
    to make atonement for the sins of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brothers and sisters'; the Greek says 'brothers,' using a masculine
      plural familial term that can include the wider family of believers in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to propitiate' or 'to expiate' the sins of the people.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument; 'Therefore' is natural
    modern English and preserves the logical connection.
- source_word: ὤφειλεν
  chosen: he had to
  alternatives:
  - he was obligated to
  - it was necessary for him to
  lexicon: BDAG
  rationale: Conveys real necessity/obligation arising from God's saving purpose,
    without implying external coercion beyond the context.
- source_word: κατὰ πάντα
  chosen: in every respect
  alternatives:
  - in all things
  - in every way
  lexicon: BDAG
  rationale: Idiomatic rendering that preserves the comprehensive scope of likeness.
- source_word: τοῖς ἀδελφοῖς
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - the brothers
  lexicon: BDAG
  rationale: 'Follows the gender-accurate policy: the Greek is masculine plural and
    echoes the familial language of the surrounding context. ''His brothers'' preserves
    the source form and representative force; inclusivity can be clarified in a footnote.'
- source_word: ὁμοιωθῆναι
  chosen: to become like
  alternatives:
  - to be made like
  - to be likened to
  lexicon: BDAG
  rationale: Natural English infinitive that captures the sense of likeness without
    awkwardness. 'Become like' fits the incarnation context.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose clearly in contemporary English.
- source_word: ἐλεήμων
  chosen: merciful
  alternatives:
  - compassionate
  lexicon: BDAG
  rationale: Standard rendering that preserves the covenantal and priestly nuance
    of showing mercy.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: '''Faithful'' is the established and contextually apt description of
    priestly reliability before God.'
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Direct and standard rendering of the cultic title.
- source_word: τὰ πρὸς τὸν θεόν
  chosen: in the things pertaining to God
  alternatives:
  - in matters relating to God
  - in service to God
  lexicon: BDAG
  rationale: Keeps the somewhat formal priestly expression without over-paraphrasing.
    It refers to the sphere of priestly ministry before God.
- source_word: εἰς τὸ ἱλάσκεσθαι
  chosen: to make atonement for
  alternatives:
  - to expiate
  - to propitiate
  lexicon: BDAG
  rationale: Accessible rendering that communicates the removal/dealing with sins
    in priestly context. It avoids requiring technical theological jargon in the main
    text while preserving alternatives in a footnote.
- source_word: τὰς ἁμαρτίας
  chosen: the sins
  alternatives:
  - sins
  lexicon: BDAG
  rationale: The article is naturally represented in English here as 'the sins,' referring
    to the people's sins as the object of atoning action.
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of his people
  lexicon: BDAG
  rationale: The Greek has 'the people,' likely with covenantal resonance. 'Of the
    people' preserves the wording without importing an explicit pronoun not present
    in the text.
