theological_decisions:
- issue: Rendering of ἱλάσκεσθαι in a theologically contested atonement context
  chosen_reading: to make atonement for
  alternative_readings:
  - to propitiate
  - to expiate
  rationale: The doctrine excerpt explicitly prefers accessible renderings over ecclesiastical
    jargon for this word group (cf. ἱλαστήριον → 'atoning sacrifice' with alternatives
    footnoted). Here, 'to make atonement for' best captures the priestly action toward
    sins without prematurely narrowing the mechanism in a way the English reader may
    misunderstand. The more technical alternatives are preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic;
    preserve theological tension rather than resolve it.'
- issue: Gendered familial term ἀδελφοῖς
  chosen_reading: his brothers
  alternative_readings:
  - his brothers and sisters
  rationale: Per doctrine, masculine representative language should be rendered in
    a gender-accurate way rather than flattened into gender-neutral language in the
    main text. Because the referent in context includes the sanctified family of believers
    more broadly, the inclusive sense is worth preserving in a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral.'
