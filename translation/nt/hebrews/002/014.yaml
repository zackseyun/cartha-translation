id: HEB.2.14
reference: Hebrews 2:14
source:
  edition: SBLGNT
  text: Ἐπεὶ οὖν τὰ παιδία κεκοινώνηκεν ⸂αἵματος καὶ σαρκός⸃, καὶ αὐτὸς παραπλησίως
    μετέσχεν τῶν αὐτῶν, ἵνα διὰ τοῦ θανάτου καταργήσῃ τὸν τὸ κράτος ἔχοντα τοῦ θανάτου,
    τοῦτ’ ἔστι τὸν διάβολον,
translation:
  text: Therefore, since the children share in blood and flesh, he himself likewise
    partook of the same things, so that through death he might nullify the one who
    has the power of death—that is, the devil,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''flesh and blood.'' Greek: ''blood and flesh.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'might destroy'; the verb can mean 'render powerless,' 'nullify,' or
      'abolish' rather than imply annihilation.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐπεὶ οὖν
  chosen: Therefore, since
  alternatives:
  - Since then
  - Therefore since
  lexicon: BDAG
  rationale: Captures both the inferential force of οὖν and the causal/temporal force
    of ἐπεί in natural English. 'Therefore, since' preserves the logical connection
    to the preceding argument.
- source_word: τὰ παιδία
  chosen: the children
  alternatives:
  - the little children
  - the offspring
  lexicon: BDAG
  rationale: A straightforward rendering of παιδία in context, referring back to the
    children given to the Son in the surrounding passage. 'Children' is natural and
    sufficiently specific without overinterpreting.
- source_word: κεκοινώνηκεν
  chosen: share in
  alternatives:
  - have shared in
  - participate in
  lexicon: BDAG
  rationale: The perfect of κοινωνέω indicates having a share/participation. English
    present 'share in' communicates the general state resulting from that participation
    more naturally than a wooden perfect.
- source_word: αἵματος καὶ σαρκός
  chosen: blood and flesh
  alternatives:
  - flesh and blood
  lexicon: BDAG
  rationale: The Greek order is 'blood and flesh,' and preserving it respects the
    source text. Although English idiom often says 'flesh and blood,' the source order
    is neither obscure nor unnatural enough to require inversion. σάρξ here is literal
    'flesh,' not the metaphorical 'sinful nature'.
- source_word: παραπλησίως
  chosen: likewise
  alternatives:
  - in like manner
  - similarly
  lexicon: BDAG
  rationale: 'Conveys close similarity without implying absolute identity. This is
    important in a Christological context: he truly shared human nature, yet the adverb
    marks likeness of participation.'
- source_word: μετέσχεν τῶν αὐτῶν
  chosen: partook of the same things
  alternatives:
  - shared in the same
  - participated in the same things
  lexicon: BDAG
  rationale: μετέχω commonly means 'share in' or 'partake of.' 'Partook of the same
    things' preserves the deliberate parallel with the children's participation while
    distinguishing the verb from κοινωνέω.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose clearly in contemporary English.
- source_word: διὰ τοῦ θανάτου
  chosen: through death
  alternatives:
  - by means of death
  lexicon: BDAG
  rationale: A natural rendering of διά with the genitive indicating means/instrumentality.
- source_word: καταργήσῃ
  chosen: might nullify
  alternatives:
  - might destroy
  - might render powerless
  lexicon: BDAG
  rationale: καταργέω often means to render ineffective, abolish, or nullify rather
    than annihilate. 'Nullify' preserves the sense of depriving operative power without
    suggesting the devil ceased to exist. Because 'destroy' is traditional and possible
    in context, it is preserved in a footnote.
- source_word: τὸ κράτος ἔχοντα τοῦ θανάτου
  chosen: the one who has the power of death
  alternatives:
  - the one holding the dominion of death
  - the one having the might of death
  lexicon: BDAG
  rationale: κράτος denotes power, might, dominion. 'Power of death' is the most idiomatic
    and contextually clear rendering in English.
- source_word: τοῦτ’ ἔστι
  chosen: that is
  alternatives:
  - namely
  lexicon: BDAG
  rationale: Introduces the appositional identification of the preceding phrase in
    standard English.
- source_word: τὸν διάβολον
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: διάβολος here functions as the established personal designation for Satan
    in NT usage, so 'the devil' is the clearest translation rather than a more etymological
    gloss.
