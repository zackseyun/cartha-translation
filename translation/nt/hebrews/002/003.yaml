theological_decisions:
- issue: Referent of 'the Lord' (τοῦ κυρίου)
  chosen_reading: A reference to Jesus as the Lord through whom the message of salvation
    was first spoken.
  alternative_readings:
  - A more generic reference to God as lord
  rationale: In the immediate context of Hebrews 2:3-4, the salvation message is said
    to have begun through 'the Lord' and then been confirmed by those who heard him,
    which strongly points to Jesus' earthly proclamation and the apostolic witness.
    This preserves the text's christological force without importing claims beyond
    the verse.
  doctrine_reference: 'Affirmations: Nicene Creed; Contested terms: κύριος → Lord'
- issue: Force of the warning question
  chosen_reading: The verse is rendered as a rhetorical warning question without converting
    it into an explicit statement of condemnation.
  alternative_readings:
  - '''We will certainly not escape if we neglect...'''
  rationale: The Greek uses a rhetorical future question. Preserving the interrogative
    maintains the text's tension and warning force rather than resolving it into a
    flat assertion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
