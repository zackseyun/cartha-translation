theological_decisions:
- issue: Meaning of πειράζω language applied to Jesus and believers
  chosen_reading: tempted
  alternative_readings:
  - tested
  rationale: The verse teaches the Son's experiential solidarity in suffering and
    his consequent ability to aid believers. Rendering πειράζω as 'tempted' preserves
    the common NT sense and the close parallel with Hebrews 4:15, without implying
    any sinful yielding in Jesus. Because the Greek can also denote 'tested,' that
    alternative is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; per-verse
    documentation of context-dependent variance.
