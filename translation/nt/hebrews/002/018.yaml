id: HEB.2.18
reference: Hebrews 2:18
source:
  edition: SBLGNT
  text: ἐν ᾧ γὰρ πέπονθεν αὐτὸς πειρασθείς, δύναται τοῖς πειραζομένοις βοηθῆσαι.
translation:
  text: For because he himself suffered when he was tempted, he is able to help those
    who are being tempted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''tested'' in both places: ''because he himself suffered when he was
      tested, he is able to help those who are being tested.'' The Greek verb can
      mean either ''tempt'' or ''test,'' depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: because / in that
  alternatives:
  - in what
  - in which
  lexicon: BDAG
  rationale: The idiom ἐν ᾧ here functions causally or with the sense 'in that/because,'
    introducing the basis for Christ's ability to help. A strictly locative 'in which'
    is less natural in English and obscures the argument.
- source_word: γὰρ
  chosen: for because
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: γὰρ marks explanation. Since ἐν ᾧ already carries a causal nuance, rendering
    both together as 'For because' preserves the explanatory force and the connective
    flow from the previous verse.
- source_word: πέπονθεν
  chosen: suffered
  alternatives:
  - has suffered
  lexicon: BDAG
  rationale: From πάσχω, the perfect indicates a completed experience with abiding
    relevance. English simple past is the most natural here, while the ongoing relevance
    is conveyed by the argument of the sentence. 'Has suffered' is possible but slightly
    heavier in English.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The pronoun is emphatic. 'He himself' preserves the stress that the Son
    personally underwent the experience in view.
- source_word: πειρασθείς
  chosen: when he was tempted
  alternatives:
  - having been tempted
  - when he was tested
  lexicon: BDAG
  rationale: πειράζω can mean 'tempt' or 'test.' In Hebrews 2:18 and its parallel
    in 4:15, the experiential solidarity of Jesus with human trial is central. 'Tempted'
    is the traditional and likely sense, while 'tested' remains a viable lexical alternative
    worth preserving in a footnote.
- source_word: δύναται
  chosen: he is able
  alternatives:
  - he can
  lexicon: BDAG
  rationale: '''He is able'' preserves the formal force of capability and reads with
    appropriate dignity in context.'
- source_word: τοῖς πειραζομένοις
  chosen: those who are being tempted
  alternatives:
  - those being tested
  - the tempted
  lexicon: BDAG
  rationale: The present participle indicates people presently undergoing temptation/testing.
    'Those who are being tempted' best captures the ongoing aspect in natural English.
    'Tested' is a lexical alternative worth preserving because πειράζω can bear either
    nuance depending on context.
- source_word: βοηθῆσαι
  chosen: to help
  alternatives:
  - to come to the aid of
  - to assist
  lexicon: BDAG
  rationale: βοηθέω means to help or come to someone's aid. 'Help' is clear, natural,
    and sufficient in English, while the stronger nuance 'come to the aid of' is contextually
    implicit.
