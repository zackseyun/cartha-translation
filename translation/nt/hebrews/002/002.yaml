theological_decisions:
- issue: Nature of the 'message spoken through angels'
  chosen_reading: An allusion to the law mediated through angels, expressed without
    making the identification explicit in the translation.
  alternative_readings:
  - A more general divine message delivered by angels
  rationale: The broader context strongly suggests the Sinai law tradition, but the
    Greek text itself says only 'the message spoken through angels.' The translation
    preserves the wording and lets the allusion stand without importing 'law' into
    the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
