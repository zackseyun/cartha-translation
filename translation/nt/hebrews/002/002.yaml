id: HEB.2.2
reference: Hebrews 2:2
source:
  edition: SBLGNT
  text: εἰ γὰρ ὁ δι’ ἀγγέλων λαληθεὶς λόγος ἐγένετο βέβαιος, καὶ πᾶσα παράβασις καὶ
    παρακοὴ ἔλαβεν ἔνδικον μισθαποδοσίαν,
translation:
  text: For if the message spoken through angels proved firm, and every transgression
    and disobedience received a just penalty,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely the law understood in Jewish tradition as mediated through
      angels; compare Acts 7:53 and Galatians 3:19.
    reason: cross_reference
  - marker: b
    text: Or 'a just recompense' or 'a deserved repayment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δι’ ἀγγέλων λαληθεὶς λόγος
  chosen: the message spoken through angels
  alternatives:
  - the word spoken through angels
  - the message announced by angels
  lexicon: BDAG
  rationale: λόγος here refers to a communicated divine message rather than an abstract
    'word' in isolation. 'Through angels' preserves διά with genitive as agency/means
    without overstating direct authorship. The participle λαληθείς is naturally rendered
    'spoken.'
- source_word: ἀγγέλων
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Hebrews 2 the likely referent is heavenly angels in the traditional
    Jewish understanding of the mediation of the law, not human messengers, so 'angels'
    is the clearest rendering.
- source_word: ἐγένετο βέβαιος
  chosen: proved firm
  alternatives:
  - became binding
  - was confirmed
  - proved reliable
  lexicon: BDAG
  rationale: The expression conveys that the spoken message stood as valid and enforceable.
    'Proved firm' preserves the resultative force without overinterpreting as merely
    epistemic confirmation.
- source_word: πᾶσα παράβασις
  chosen: every transgression
  alternatives:
  - every violation
  - every trespass
  lexicon: BDAG
  rationale: παράβασις denotes a stepping across a boundary or violation of a command.
    'Transgression' is a standard and suitably weighty English equivalent.
- source_word: παρακοὴ
  chosen: disobedience
  alternatives:
  - failure to heed
  - refusal to listen
  lexicon: BDAG
  rationale: παρακοή is literally a failure to hear properly and thus disobedience.
    'Disobedience' best captures the moral-legal sense in parallel with παράβασις.
- source_word: ἔλαβεν
  chosen: received
  alternatives:
  - got
  - incurred
  lexicon: BDAG
  rationale: A straightforward rendering that fits judicial recompense language and
    keeps the subject as each act of violation/disobedience.
- source_word: ἔνδικον μισθαποδοσίαν
  chosen: a just penalty
  alternatives:
  - a just recompense
  - a deserved repayment
  lexicon: BDAG
  rationale: μισθαποδοσία is recompense or repayment, and ἔνδικος adds the sense of
    justice/desert. 'A just penalty' communicates the judicial force in natural English,
    especially in context of covenant sanctions.
