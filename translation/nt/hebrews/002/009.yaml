theological_decisions:
- issue: Textual variant in the purpose clause
  chosen_reading: by the grace of God
  alternative_readings:
  - apart from God
  rationale: The supplied Greek text reads χωρὶς θεοῦ ('apart from God'), but the
    variant χάριτι θεοῦ ('by the grace of God') is ancient, widespread, and commonly
    judged more likely in context. Because this is a significant contested reading,
    the alternative is preserved in a footnote for auditability rather than silently
    ignored.
  doctrine_reference: Preserve theological tension rather than resolve it; significant
    alternatives should be preserved in footnotes.
