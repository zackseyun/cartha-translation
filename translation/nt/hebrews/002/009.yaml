id: HEB.2.9
reference: Hebrews 2:9
source:
  edition: SBLGNT
  text: τὸν δὲ βραχύ τι παρ’ ἀγγέλους ἠλαττωμένον βλέπομεν Ἰησοῦν διὰ τὸ πάθημα τοῦ
    θανάτου δόξῃ καὶ τιμῇ ἐστεφανωμένον, ὅπως ⸀χωρὶς θεοῦ ὑπὲρ παντὸς γεύσηται θανάτου.
translation:
  text: But we see Jesus, who was made lower than the angels for a little while, crowned
    with glory and honor because of the suffering of death, so that by the grace of
    God he might taste death for everyone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'apart from God' instead of 'by the grace of God.'
    reason: textual_variant
lexical_decisions:
- source_word: βραχύ τι
  chosen: for a little while
  alternatives:
  - a little
  - somewhat
  lexicon: BDAG
  rationale: 'In this context, echoing Psalm 8 and modifying ἠλαττωμένον, the phrase
    is best taken temporally rather than in degree: Jesus was lowered beneath angels
    for a limited period.'
- source_word: παρ’ ἀγγέλους
  chosen: than the angels
  alternatives:
  - beside angels
  - from angels
  lexicon: BDAG
  rationale: With comparative force after ἐλαττόω, παρά + accusative means 'than'/'in
    comparison with.' The article is retained in natural English as 'the angels.'
- source_word: ἠλαττωμένον
  chosen: was made lower
  alternatives:
  - having been made lower
  - was humbled below
  lexicon: BDAG
  rationale: The perfect/passive participle is rendered idiomatically in English with
    a finite passive sense tied to Jesus. 'Made lower' preserves the comparative idea
    without overinterpreting as merely emotional humiliation.
- source_word: διὰ τὸ πάθημα τοῦ θανάτου
  chosen: because of the suffering of death
  alternatives:
  - because of suffering death
  - through the suffering of death
  lexicon: BDAG
  rationale: 'διά with the accusative most naturally expresses reason here: his crowning
    with glory and honor comes because of his suffering unto death. ''The suffering
    of death'' preserves the genitival construction without paraphrase.'
- source_word: δόξῃ καὶ τιμῇ ἐστεφανωμένον
  chosen: crowned with glory and honor
  alternatives:
  - having been crowned with glory and honor
  lexicon: BDAG
  rationale: στεφανόω is naturally rendered 'crown.' The dative nouns are instrumental/complementary
    with the participle. This concise English preserves the exaltation motif.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the clause's teleological force.
- source_word: χωρὶς θεοῦ
  chosen: by the grace of God
  alternatives:
  - apart from God
  lexicon: NA28 textual tradition / BDAG
  rationale: Although the printed source text reads χωρὶς θεοῦ ('apart from God'),
    a well-known variant reads χάριτι θεοῦ ('by the grace of God'). The latter is
    overwhelmingly adopted in modern translations and fits the context smoothly, but
    because the provided source text is χωρὶς θεοῦ, the alternative must be preserved
    explicitly. Main text follows the more widely accepted reading, with the source-text
    reading preserved in a footnote as a textual variant.
- source_word: ὑπὲρ παντός
  chosen: for everyone
  alternatives:
  - for everything
  - on behalf of everyone
  lexicon: BDAG
  rationale: 'In context the sense is distributive and personal: Christ''s death is
    on behalf of every person. ''For everyone'' is idiomatic and avoids an awkwardly
    literal singular.'
- source_word: γεύσηται θανάτου
  chosen: might taste death
  alternatives:
  - might experience death
  - might undergo death
  lexicon: BDAG
  rationale: The idiom 'taste death' is established English and preserves the metaphorical
    force of γεύομαι while remaining understandable.
