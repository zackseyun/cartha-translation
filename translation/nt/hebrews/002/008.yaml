theological_decisions:
- issue: Referent of the pronouns αὐτοῦ / αὐτῷ
  chosen_reading: Rendered simply as 'his/him' without specifying the referent in
    the translation text.
  alternative_readings:
  - humanity/man in the Psalm 8 citation context
  - the Son/Jesus in the author's christological application
  rationale: Hebrews is expounding Psalm 8, where the immediate referent is humanity
    represented in 'man/son of man,' while the surrounding context applies the text
    climactically to Jesus. To preserve the text's theological tension and argument,
    the translation retains the pronouns without interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
