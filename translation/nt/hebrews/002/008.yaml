id: HEB.2.8
reference: Hebrews 2:8
source:
  edition: SBLGNT
  text: πάντα ὑπέταξας ὑποκάτω τῶν ποδῶν αὐτοῦ· ἐν ⸂τῷ γὰρ⸃ ⸀ὑποτάξαι τὰ πάντα οὐδὲν
    ἀφῆκεν αὐτῷ ἀνυπότακτον. νῦν δὲ οὔπω ὁρῶμεν αὐτῷ τὰ πάντα ὑποτεταγμένα·
translation:
  text: You subjected all things under his feet.” For in subjecting all things to
    him, he left nothing not subjected to him. But now we do not yet see all things
    subjected to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronouns 'his' and 'him' echo Psalm 8. In context they can point to
      humanity in the psalm's original sense and to Jesus in Hebrews' application.
    reason: cross_reference
  - marker: b
    text: Or 'For when he subjected all things to him.' The Greek construction can
      be rendered more temporally.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Neuter plural with comprehensive scope; 'all things' is a natural and
    sufficiently formal rendering that preserves the universal extent of the statement.
- source_word: ὑπέταξας
  chosen: you subjected
  alternatives:
  - you put in subjection
  - you placed under
  lexicon: BDAG
  rationale: Aorist active indicative, echoing Psalm 8 language. 'Subjected' preserves
    the semantic field of subordination better than the looser 'placed under.'
- source_word: ὑποκάτω τῶν ποδῶν αὐτοῦ
  chosen: under his feet
  alternatives:
  - beneath his feet
  lexicon: BDAG
  rationale: Standard idiom of dominion/subjection. 'Under his feet' is the most idiomatic
    English equivalent and preserves the scriptural allusion.
- source_word: ἐν τῷ ... ὑποτάξαι
  chosen: For in subjecting
  alternatives:
  - for when he subjected
  - for by subjecting
  lexicon: BDAG
  rationale: The articular infinitive with ἐν can be rendered temporally or conceptually.
    'In subjecting' keeps the Greek structure visible while remaining readable; the
    following clause explains the implication of that act.
- source_word: γὰρ
  chosen: For
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Marks explanation of the preceding citation. 'For' best preserves the
    argumentative flow.
- source_word: οὐδὲν ἀφῆκεν
  chosen: he left nothing
  alternatives:
  - he omitted nothing
  - he left out nothing
  lexicon: BDAG
  rationale: Idiomatic English for the Greek expression, preserving the totality claim.
- source_word: ἀνυπότακτον
  chosen: not subjected
  alternatives:
  - unsubjected
  - not in subjection
  lexicon: BDAG
  rationale: Predicate adjective meaning 'not subject.' 'Not subjected' is clear modern
    English and matches the repeated ὑποτάσσω word group in the verse.
- source_word: νῦν δὲ
  chosen: But now
  alternatives:
  - yet now
  - as it is now
  lexicon: BDAG
  rationale: Signals contrast between the scriptural declaration and present observation.
    'But now' is concise and natural.
- source_word: οὔπω ὁρῶμεν
  chosen: we do not yet see
  alternatives:
  - we do not now see yet
  - we do not yet observe
  lexicon: BDAG
  rationale: Present tense with οὔπω expresses a present state of not yet seeing fulfillment.
    'See' is preferable to 'observe' for readability and theological resonance.
- source_word: ὑποτεταγμένα
  chosen: subjected
  alternatives:
  - in subjection
  - having been subjected
  lexicon: BDAG
  rationale: Perfect passive participle indicating a state resulting from subjection.
    English 'subjected' after 'see all things' communicates the resultant state without
    awkwardness.
