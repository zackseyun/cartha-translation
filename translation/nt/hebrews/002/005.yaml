id: HEB.2.5
reference: Hebrews 2:5
source:
  edition: SBLGNT
  text: Οὐ γὰρ ἀγγέλοις ὑπέταξεν τὴν οἰκουμένην τὴν μέλλουσαν, περὶ ἧς λαλοῦμεν·
translation:
  text: For he did not subject the coming world to angels, about which we are speaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inhabited world that is to come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ γὰρ
  chosen: For ... not
  alternatives:
  - For not
  - Indeed ... not
  lexicon: BDAG
  rationale: γάρ is best carried forward as an explanatory 'for,' linking this verse
    to the preceding argument. Οὐ straightforwardly negates the clause.
- source_word: ἀγγέλοις
  chosen: to angels
  alternatives:
  - to messengers
  lexicon: BDAG
  rationale: In Hebrews the referent is clearly heavenly angels, not human messengers,
    especially in the immediate context contrasting the Son and angels.
- source_word: ὑπέταξεν
  chosen: did not subject
  alternatives:
  - did not place under
  - did not subordinate to
  lexicon: BDAG
  rationale: ὑποτάσσω here denotes placing something under authority or rule. 'Subject'
    is natural English and preserves the governance sense without over-paraphrase.
- source_word: τὴν οἰκουμένην
  chosen: the world
  alternatives:
  - the inhabited world
  - the inhabited earth
  lexicon: BDAG
  rationale: οἰκουμένη often means the inhabited world/world-order. In English, 'the
    world' is the most readable rendering here; the modifying phrase 'coming' preserves
    the eschatological specificity.
- source_word: τὴν μέλλουσαν
  chosen: the coming
  alternatives:
  - that is to come
  - future
  lexicon: BDAG
  rationale: The participle μέλλουσαν marks futurity. 'Coming' is idiomatic and keeps
    the eschatological force while sounding natural in English.
- source_word: περὶ ἧς λαλοῦμεν
  chosen: about which we are speaking
  alternatives:
  - concerning which we speak
  - of which we are speaking
  lexicon: BDAG
  rationale: The present tense λαλοῦμεν suggests ongoing discourse. 'About which we
    are speaking' is clear modern English and preserves the author's reference to
    the present discussion.
