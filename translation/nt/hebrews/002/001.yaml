id: HEB.2.1
reference: Hebrews 2:1
source:
  edition: SBLGNT
  text: Διὰ τοῦτο δεῖ περισσοτέρως ⸂προσέχειν ἡμᾶς⸃ τοῖς ἀκουσθεῖσιν, μήποτε παραρυῶμεν.
translation:
  text: For this reason, we must pay much closer attention to what we have heard,
    lest we drift away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest we drift past' or 'lest we let them slip.' The Greek verb παραρυῶμεν
      evokes the image of drifting or slipping by.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: A natural inferential phrase in English that preserves the causal/logical
    connection to the preceding argument without sounding overly formal.
- source_word: δεῖ
  chosen: we must
  alternatives:
  - it is necessary for us to
  - we ought to
  lexicon: BDAG
  rationale: Conveys necessity forcefully and idiomatically in English. The explicit
    subject 'we' reflects the accusative subject of the infinitive construction (ἡμᾶς
    ... προσέχειν).
- source_word: περισσοτέρως
  chosen: much closer
  alternatives:
  - more earnestly
  - all the more
  - more carefully
  lexicon: BDAG
  rationale: Used adverbially with προσέχειν to intensify the manner of attention.
    'Much closer' fits the collocation 'pay attention' in natural English while preserving
    the comparative force.
- source_word: προσέχειν ἡμᾶς
  chosen: we must pay ... attention
  alternatives:
  - for us to give heed
  - for us to hold fast to
  lexicon: BDAG
  rationale: προσέχω here means to direct one's attention to, heed, or pay attention
    to. 'Pay attention' is clear modern English and preserves the exhortational force.
- source_word: τοῖς ἀκουσθεῖσιν
  chosen: to what we have heard
  alternatives:
  - to the things heard
  - to the message we heard
  lexicon: BDAG
  rationale: The dative plural perfect passive participle refers to the things heard,
    likely the proclaimed message. 'What we have heard' is idiomatic and preserves
    the perfect aspect's ongoing relevance better than the stiffer 'the things heard.'
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that we may not
  - otherwise
  lexicon: BDAG
  rationale: Introduces a warning of possible negative result. 'Lest' is concise and
    accurate, though slightly elevated; it best matches the hortatory caution here.
- source_word: παραρυῶμεν
  chosen: we drift away
  alternatives:
  - we drift past
  - we slip away
  - we be swept away
  lexicon: BDAG
  rationale: The verb literally evokes flowing past or drifting away. In context,
    'drift away' is the most natural warning image in English and has become standard
    because it captures the metaphor of gradual spiritual loss without over-interpreting
    it. The possible nuance 'drift past' is preserved in a footnote.
