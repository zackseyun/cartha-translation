theological_decisions:
- issue: Nature of the warning metaphor in παραρυῶμεν
  chosen_reading: Render as a warning that 'we drift away' from the heard message
    rather than that the message 'slips from us.'
  alternative_readings:
  - lest we drift past them
  - lest we let them slip
  rationale: The verb can be understood in relation either to the hearers or to the
    message, but the immediate syntax and the broader warning context in Hebrews favor
    the hearers' dangerous movement away. The rendering preserves the exhortational
    and pastoral force without importing a specific doctrinal system about apostasy.
  doctrine_reference: Preserve theological tension rather than resolve it
