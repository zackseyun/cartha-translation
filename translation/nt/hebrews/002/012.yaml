theological_decisions:
- issue: Rendering of ἀδελφοῖς in a representative familial sense
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Per the doctrine's gender-accurate principle, the masculine plural is
    preserved in the main text rather than neutralized. Because the referent in context
    likely includes the whole covenant family, the inclusive implication is preserved
    in a footnote rather than moved into the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Rendering of ἐκκλησία in an OT citation within Hebrews
  chosen_reading: assembly
  alternative_readings:
  - congregation
  - church
  rationale: The verse quotes Psalm 22:22 and evokes the gathered people of God. 'Assembly'
    preserves the lexical sense without importing later institutional church associations
    that the quotation itself does not require.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 1
