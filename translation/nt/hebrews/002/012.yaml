id: HEB.2.12
reference: Hebrews 2:12
source:
  edition: SBLGNT
  text: λέγων· Ἀπαγγελῶ τὸ ὄνομά σου τοῖς ἀδελφοῖς μου, ἐν μέσῳ ἐκκλησίας ὑμνήσω σε·
translation:
  text: saying, “I will proclaim your name to my brothers; in the midst of the assembly
    I will sing praise to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers,' but in context the
      family reference may include all fellow believers.
    reason: lexical_alternative
  - marker: b
    text: Or 'congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - saying that
  - as he says
  lexicon: BDAG
  rationale: Present participle introducing the citation; 'saying' is the most direct
    and natural English equivalent in context.
- source_word: Ἀπαγγελῶ
  chosen: I will proclaim
  alternatives:
  - I will declare
  - I will announce
  lexicon: BDAG
  rationale: Future verb meaning to report or declare openly. 'Proclaim' preserves
    the public, declarative force better than the flatter 'tell' or 'announce'.
- source_word: τὸ ὄνομά σου
  chosen: your name
  lexicon: BDAG
  rationale: Retained literally. In biblical usage 'name' can imply character, reputation,
    and revealed identity, but the text itself uses 'name' and should not be expanded
    in translation.
- source_word: τοῖς ἀδελφοῖς μου
  chosen: to my brothers
  alternatives:
  - to my brothers and sisters
  - to my siblings
  lexicon: BDAG
  rationale: Following the gender-accurate principle, ἀδελφοῖς is rendered 'brothers.'
    In Hebrews 2 the term is representative of the believing family and may include
    women, but the Greek form is masculine and the translation preserves that, with
    inclusivity noted in a footnote.
- source_word: ἐν μέσῳ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: BDAG
  rationale: This idiom is rendered fairly literally to preserve the elevated poetic
    tone of the citation while remaining clear.
- source_word: ἐκκλησίας
  chosen: the assembly
  alternatives:
  - the congregation
  - the church
  lexicon: BDAG
  rationale: In this quotation context, ἐκκλησία refers to the gathered people rather
    than the later institutional sense of 'church.' 'Assembly' best reflects the plain
    sense and avoids importing later ecclesial connotations.
- source_word: ὑμνήσω
  chosen: I will sing praise
  alternatives:
  - I will praise in song
  - I will hymn
  lexicon: BDAG
  rationale: The verb specifically denotes praise expressed in song. 'Sing praise'
    is idiomatic modern English and preserves the musical nuance better than simply
    'praise'.
- source_word: σε
  chosen: to you
  alternatives:
  - you
  lexicon: BDAG
  rationale: With ὑμνέω, English idiom commonly takes 'to you' after 'sing praise,'
    making the object relation clear and natural.
