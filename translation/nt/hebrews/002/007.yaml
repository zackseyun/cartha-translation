id: HEB.2.7
reference: Hebrews 2:7
source:
  edition: SBLGNT
  text: ἠλάττωσας αὐτὸν βραχύ τι παρ’ ἀγγέλους, δόξῃ καὶ τιμῇ ἐστεφάνωσας ⸀αὐτόν,
translation:
  text: You made him lower than the angels for a little while; you crowned him with
    glory and honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You made him a little lower than the angels.' The Greek phrase can
      express degree rather than duration.
    reason: alternative_reading
lexical_decisions:
- source_word: ἠλάττωσας
  chosen: you made ... lower
  alternatives:
  - you made ... a little lower
  - you diminished
  lexicon: BDAG
  rationale: 'Aorist active indicative, second person singular, from ἐλαττόω. In this
    citation of Psalm 8, the sense is causative/comparative: ''make lower'' rather
    than a more abstract ''diminish.'' English supplies the comparative naturally
    with the following παρ’ ἀγγέλους.'
- source_word: αὐτὸν
  chosen: him
  alternatives:
  - him / man
  lexicon: BDAG
  rationale: Direct object pronoun referring to the human figure in the Psalm citation.
    'Him' preserves the masculine singular form and the representative-human sense
    without importing an explicit noun not present in this clause.
- source_word: βραχύ τι
  chosen: for a little while
  alternatives:
  - a little
  - somewhat
  lexicon: BDAG
  rationale: This phrase can denote either degree ('a little lower') or duration ('for
    a little while lower'). In Hebrews, the temporal sense fits the author's Christological
    application especially well, while still remaining a legitimate rendering of the
    Greek. The degree alternative is preserved in a footnote.
- source_word: παρ’ ἀγγέλους
  chosen: than the angels
  alternatives:
  - than angels
  - beside the angels
  lexicon: BDAG
  rationale: With comparative force after ἐλαττόω, παρά + accusative is best rendered
    'than.' The article is represented idiomatically in English as 'the angels.'
- source_word: δόξῃ
  chosen: with glory
  alternatives:
  - in glory
  lexicon: BDAG
  rationale: Dative used with στεφανόω expresses that with which the person is crowned.
    'With glory' is the most natural English rendering.
- source_word: τιμῇ
  chosen: and honor
  alternatives:
  - and dignity
  lexicon: BDAG
  rationale: τιμή commonly denotes honor in contexts of bestowed status. Paired with
    δόξα, 'glory and honor' preserves the familiar and semantically precise collocation.
- source_word: ἐστεφάνωσας
  chosen: you crowned
  alternatives:
  - you have crowned
  lexicon: BDAG
  rationale: Aorist active indicative, second person singular, from στεφανόω. Simple
    past fits the citation style and mirrors the Greek tense-form without overinterpreting
    aspect.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Repeated object pronoun retained in English for clarity and fidelity
    to the Greek clause structure.
