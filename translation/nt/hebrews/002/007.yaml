theological_decisions:
- issue: Sense of βραχύ τι in a Psalm 8 citation applied in Hebrews
  chosen_reading: 'temporal: ''for a little while'''
  alternative_readings:
  - 'degree: ''a little lower'''
  rationale: The Greek permits both a temporal and a degree reading. In the immediate
    context of Hebrews 2, the temporal sense coheres strongly with the Son's temporary
    humiliation before exaltation. To preserve the text's interpretive tension, the
    degree sense is retained in a footnote rather than excluded.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it) and 4 (Gender-accurate over gender-neutral)
