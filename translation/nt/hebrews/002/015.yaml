theological_decisions:
- issue: Nature of the condition described by δουλείας
  chosen_reading: The verse speaks of real bondage/slavery associated with the fear
    of death, without specifying a narrower doctrinal mechanism in the translation.
  alternative_readings:
  - bondage to the devil
  - bondage to sin
  - existential fear under mortality
  rationale: The immediate context includes the devil's power of death (v. 14), but
    this verse itself states the condition more generally as slavery through fear
    of death. The translation preserves that wording and does not import a more specific
    doctrinal explanation than the text explicitly gives.
  doctrine_reference: Preserve theological tension rather than resolve it.
