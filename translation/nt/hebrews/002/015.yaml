id: HEB.2.15
reference: Hebrews 2:15
source:
  edition: SBLGNT
  text: καὶ ἀπαλλάξῃ τούτους, ὅσοι φόβῳ θανάτου διὰ παντὸς τοῦ ζῆν ἔνοχοι ἦσαν δουλείας.
translation:
  text: and free those who, through fear of death, were subject to slavery all their
    lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “were held in slavery” or “were in bondage.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαλλάξῃ
  chosen: free
  alternatives:
  - release
  - set free
  - deliver
  lexicon: BDAG
  rationale: The verb means to release or free from a condition or obligation. 'Free'
    is concise, natural English and fits the parallel with being held in slavery.
    'Deliver' is possible but can sound more theological than the immediate lexical
    sense requires.
- source_word: τούτους
  chosen: those
  alternatives:
  - these
  - these people
  lexicon: BDAG
  rationale: In English, 'free those who...' smoothly renders the demonstrative with
    the following relative clause. 'These' would be more wooden and less idiomatic
    here.
- source_word: ὅσοι
  chosen: who
  alternatives:
  - as many as
  - all who
  lexicon: BDAG
  rationale: 'The relative has a class-inclusive sense: those characterized by the
    following condition. ''Who'' is idiomatic in English after ''those''; the fuller
    force is preserved by the clause itself.'
- source_word: φόβῳ θανάτου
  chosen: through fear of death
  alternatives:
  - because of fear of death
  - by fear of death
  lexicon: BDAG
  rationale: The dative φόβῳ with genitive θανάτου expresses the controlling means
    or circumstance. 'Through fear of death' is idiomatic and preserves the causal/instrumental
    nuance.
- source_word: διὰ παντὸς τοῦ ζῆν
  chosen: all their lives
  alternatives:
  - throughout their whole life
  - for their entire lifetime
  - through all the time of living
  lexicon: BDAG
  rationale: This idiom literally means 'through all the living,' i.e., throughout
    the whole span of life. 'All their lives' is natural modern English and accurately
    conveys the duration.
- source_word: ἔνοχοι ἦσαν δουλείας
  chosen: were subject to slavery
  alternatives:
  - were held in slavery
  - were liable to slavery
  - were in bondage
  lexicon: BDAG
  rationale: ἔνοχος can mean subject to, liable to, or bound by something. With δουλείας,
    the sense is not mere legal liability but actual subjection. 'Were subject to
    slavery' preserves the state of bondage without overparaphrasing. 'In bondage'
    is interpretive; 'liable to slavery' is too weak.
- source_word: δουλείας
  chosen: slavery
  alternatives:
  - bondage
  - servitude
  lexicon: BDAG
  rationale: The noun denotes slavery or bondage. In line with the project's guidance
    on the bonded nature of slavery-related terms, 'slavery' best preserves the force
    of the image. 'Bondage' is a viable alternative but slightly more abstract.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: The conjunction links this clause to the prior purpose/result statement
    in v. 14. 'And' is the straightforward connective.
