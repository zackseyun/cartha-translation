  category: awkward_english
  tier: 1
  from: in bringing many sons to glory, to perfect the pioneer of their salvation through sufferings.
  to: to perfect the pioneer of their salvation through sufferings in order to bring many sons to glory.
  rationale: The current word order, which follows the Greek, creates an awkward English sentence. The participial phrase 'in bringing...' is placed between the logical subject ('him') and the main infinitive ('to perfect'), making the sentence difficult to parse. Furthermore, 'in bringing' suggests mere circumstance, whereas the Greek participle (ἀγαγόντα) likely carries a stronger nuance of purpose or result—the perfecting of the pioneer is the means *for the purpose of* bringing sons to glory. Reordering the clauses in English makes this crucial logical connection much clearer, improving readability and theological precision.
