theological_decisions:
- issue: Meaning of τελειῶσαι with reference to the Son
  chosen_reading: to perfect
  alternative_readings:
  - to make complete
  - to bring to completion
  rationale: Given orthodox Christology, the verb cannot imply that the Son was morally deficient and then improved. In Hebrews the term commonly denotes bringing someone to the intended goal, especially through consecration/completion in role. Retaining 'perfect' preserves the lexical connection within Hebrews while the rationale guards against a heterodox misunderstanding.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon (451 AD)'
- issue: Rendering of πολλοὺς υἱοὺς
  chosen_reading: many sons
  alternative_readings:
  - many children
  rationale: The Greek is explicitly masculine and likely resonates with sonship/inheritance themes in the immediate context. Per the project's gender-accurate principle, the masculine form is retained in the main text, with a footnote to indicate the representative scope rather than flattening the filial nuance.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
revisions:
- timestamp: '2026-04-21T03:17:53Z'
