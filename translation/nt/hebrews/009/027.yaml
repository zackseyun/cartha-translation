theological_decisions:
- issue: Generic reference of ἀνθρώποις
  chosen_reading: Rendered as 'men' with generic force referring to humanity
  alternative_readings:
  - people
  - human beings
  rationale: The Greek is grammatically masculine plural but clearly generic, not
    male-exclusive. Following the doctrine's gender-accurate principle, the main text
    keeps 'men' as a representative term matching the source's form and traditional
    cadence, while a footnote preserves the inclusive sense for readers who may otherwise
    hear it as male-only.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Scope of κρίσις after death
  chosen_reading: Rendered simply as 'judgment' without specifying condemnation or
    a particular eschatological scheme
  alternative_readings:
  - condemnation
  - final judgment
  rationale: The verse states post-mortem judgment but does not itself define all
    details of that judgment. The translation preserves the text's claim without importing
    a more detailed doctrinal system.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
