id: HEB.9.27
reference: Hebrews 9:27
source:
  edition: SBLGNT
  text: καὶ καθ’ ὅσον ἀπόκειται τοῖς ἀνθρώποις ἅπαξ ἀποθανεῖν, μετὰ δὲ τοῦτο κρίσις,
translation:
  text: And just as it is appointed for men to die once, and after this, judgment,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for people' or 'for human beings'; Greek 'for men' uses a masculine
      plural with generic force for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ὅσον
  chosen: just as
  alternatives:
  - inasmuch as
  - to the extent that
  lexicon: BDAG
  rationale: In this context the phrase introduces a comparison with the following
    verse rather than a mere statement of degree. 'Just as' best prepares for the
    corresponding comparison in Hebrews 9:28.
- source_word: ἀπόκειται
  chosen: it is appointed
  alternatives:
  - it is reserved
  - it is laid up
  lexicon: BDAG
  rationale: Although the verb can mean 'is reserved' or 'is stored up,' in this construction
    with an infinitive and dative ('for men to die') it conveys what is fixed or destined.
    'It is appointed' is idiomatic and fits the author's point about an established
    human condition.
- source_word: τοῖς ἀνθρώποις
  chosen: for men
  alternatives:
  - for people
  - for human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here refers generically to humanity. Per the project's gender-accurate
    philosophy, 'men' can represent humankind when the source has generic force. A
    footnote preserves the inclusive alternative for modern readers.
- source_word: ἅπαξ
  chosen: once
  alternatives:
  - one time
  - once for all
  lexicon: BDAG
  rationale: The adverb here marks the single occurrence of human death in ordinary
    experience. 'Once' is the natural and sufficiently precise rendering; 'once for
    all' would overstate the idiom in this verse.
- source_word: ἀποθανεῖν
  chosen: to die
  alternatives:
  - to die off
  lexicon: BDAG
  rationale: Standard infinitive complement to ἀπόκειται. 'To die' is the plain sense.
- source_word: μετὰ δὲ τοῦτο
  chosen: and after this
  alternatives:
  - and after that
  - then after this
  lexicon: BDAG
  rationale: This phrase indicates sequence. Rendering δέ as 'and' keeps the flow
    natural in English while preserving the progression from death to what follows.
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - judgment day
  - condemnation
  lexicon: BDAG
  rationale: κρίσις denotes judgment in the broad sense of judicial evaluation. 'Condemnation'
    is too narrow, since the noun itself does not specify the outcome; 'judgment'
    preserves the theological weight without overinterpretation.
