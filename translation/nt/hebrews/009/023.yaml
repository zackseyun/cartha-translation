theological_decisions:
- issue: Reference of 'the heavenly things' and their cleansing
  chosen_reading: 'Retain the text''s cultic language without explaining away the
    metaphor: ''the heavenly things themselves'' are said to be cleansed with better
    sacrifices.'
  alternative_readings:
  - Interpret 'heavenly things' as the heavenly sanctuary
  - Interpret it as the people who belong to the heavenly realm
  - Paraphrase to avoid saying heaven is cleansed
  rationale: The verse explicitly contrasts earthly copies with heavenly things and
    uses purification language for both. To preserve theological tension rather than
    resolve it, the translation keeps the wording of the Greek and does not import
    an interpretive paraphrase that would soften the statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Plural 'sacrifices' in relation to Christ's single offering
  chosen_reading: Keep the plural 'sacrifices' in the main text.
  alternative_readings:
  - Render conceptually as singular 'sacrifice'
  rationale: Although Hebrews elsewhere emphasizes the once-for-all singularity of
    Christ's offering, this verse uses the dative plural θυσίαις. Retaining the plural
    respects original-language primacy and avoids harmonizing the verse to theology
    expressed elsewhere.
  doctrine_reference: Translation philosophy §1 and §5.
