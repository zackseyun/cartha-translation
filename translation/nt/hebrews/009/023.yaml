id: HEB.9.23
reference: Hebrews 9:23
source:
  edition: SBLGNT
  text: Ἀνάγκη οὖν τὰ μὲν ὑποδείγματα τῶν ἐν τοῖς οὐρανοῖς τούτοις καθαρίζεσθαι, αὐτὰ
    δὲ τὰ ἐπουράνια κρείττοσι θυσίαις παρὰ ταύτας.
translation:
  text: Therefore it was necessary for the copies of the things in the heavens to
    be cleansed with these, but the heavenly things themselves with better sacrifices
    than these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'patterns' or 'representations' for 'copies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to be purified.' The verb is ritual language for cleansing/purification.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'better sacrifices' (plural), though the context in Hebrews
      centers on Messiah's once-for-all offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνάγκη
  chosen: it was necessary
  alternatives:
  - there was necessity
  - it is necessary
  lexicon: BDAG
  rationale: Impersonal predicate naturally rendered in English as 'it was necessary.'
    Past tense fits the argument's retrospective explanation of the tabernacle rites
    and Christ's work.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding discussion; 'Therefore' best conveys
    the logical conclusion in clear modern English.
- source_word: ὑποδείγματα
  chosen: copies
  alternatives:
  - patterns
  - sketches
  - representations
  lexicon: BDAG
  rationale: In Hebrews this term refers to earthly cultic realities as corresponding
    representations of heavenly realities. 'Copies' is clear and fits the immediate
    contrast with 'the heavenly things themselves.'
- source_word: τῶν ἐν τοῖς οὐρανοῖς τούτοις
  chosen: of the things in the heavens
  alternatives:
  - of the heavenly things
  - of the things in heaven
  lexicon: BDAG
  rationale: The genitival phrase identifies what the copies correspond to. 'In the
    heavens' preserves the plural οὐρανοῖς and avoids collapsing the phrase into the
    later adjective ἐπουράνια, though English readers may understand it collectively.
- source_word: καθαρίζεσθαι
  chosen: to be cleansed
  alternatives:
  - to be purified
  lexicon: BDAG
  rationale: The verb can mean cleanse/purify in ritual contexts. 'Cleansed' keeps
    the sacrificial and cultic sense while remaining accessible. 'Purified' is viable
    but slightly more abstract.
- source_word: αὐτὰ δὲ τὰ ἐπουράνια
  chosen: but the heavenly things themselves
  alternatives:
  - but the heavenly realities themselves
  - but the things in heaven themselves
  lexicon: BDAG
  rationale: αὐτά adds emphasis ('themselves'), and ἐπουράνια is best rendered adjectivally
    as 'heavenly things.' 'Realities' is interpretive; 'things' stays closer to the
    Greek while preserving the contrast.
- source_word: κρείττοσι θυσίαις
  chosen: with better sacrifices
  alternatives:
  - with superior sacrifices
  lexicon: BDAG
  rationale: κρείττων is a key Hebrews term often rendered 'better.' The plural θυσίαις
    is retained as plural rather than harmonized to the singular event of Christ's
    offering, since the Greek uses the plural.
- source_word: παρὰ ταύτας
  chosen: than these
  alternatives:
  - than those
  - beyond these
  lexicon: BDAG
  rationale: 'With comparative κρείττοσι, παρά marks comparison: ''than these.'' The
    demonstrative refers back to the cleansing means just mentioned, namely the earthly
    sacrificial provisions.'
