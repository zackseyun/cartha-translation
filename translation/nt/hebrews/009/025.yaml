id: HEB.9.25
reference: Hebrews 9:25
source:
  edition: SBLGNT
  text: οὐδ’ ἵνα πολλάκις προσφέρῃ ἑαυτόν, ὥσπερ ὁ ἀρχιερεὺς εἰσέρχεται εἰς τὰ ἅγια
    κατ’ ἐνιαυτὸν ἐν αἵματι ἀλλοτρίῳ,
translation:
  text: Nor was it so that he might offer himself many times, just as the high priest
    enters the holy places year by year with blood not his own,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sanctuary.' The Greek says 'the holy places'; some understand this
      more specifically as 'the Most Holy Place' in this cultic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδ’ ἵνα
  chosen: Nor was it so that
  alternatives:
  - Nor in order that
  - and not that
  lexicon: BDAG
  rationale: The construction continues the negated purpose/result flow from the previous
    verse. 'Nor was it so that' gives natural English while preserving the sense that
    Christ's entrance was not for the purpose of repeated self-offering.
- source_word: πολλάκις
  chosen: many times
  alternatives:
  - often
  - repeatedly
  lexicon: BDAG
  rationale: '''Many times'' is the most direct rendering and matches the contrast
    with the annual repetition of the Levitical high priest.'
- source_word: προσφέρῃ ἑαυτόν
  chosen: he might offer himself
  alternatives:
  - he should offer himself
  - to offer himself
  lexicon: BDAG
  rationale: This preserves the sacrificial sense of προσφέρω and the reflexive force
    of ἑαυτόν. The modal 'might' reflects the subjunctive under ἵνα.
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - in the same way as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks the comparison with the earthly high priest''s
    repeated entry.'
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the Jewish cultic office in context.
- source_word: εἰσέρχεται
  chosen: enters
  alternatives:
  - goes in
  - comes in
  lexicon: BDAG
  rationale: Present tense is retained for the customary action of the high priest
    in the comparison.
- source_word: εἰς τὰ ἅγια
  chosen: the holy places
  alternatives:
  - the sanctuary
  - the Most Holy Place
  lexicon: BDAG
  rationale: The plural neuter literally means 'the holy places' and in Hebrews often
    refers to the sanctuary/heavenly holy realm. 'Most Holy Place' would over-specify
    here, while 'holy places' preserves the Greek form and cultic resonance.
- source_word: κατ’ ἐνιαυτὸν
  chosen: year by year
  alternatives:
  - every year
  - annually
  lexicon: BDAG
  rationale: This idiomatic rendering preserves the repeated annual pattern and reads
    naturally in English.
- source_word: ἐν αἵματι ἀλλοτρίῳ
  chosen: with blood not his own
  alternatives:
  - with another's blood
  - by means of foreign blood
  lexicon: BDAG
  rationale: This captures both the instrumental sense of ἐν and the meaning of ἀλλότριος
    as belonging to another. 'Not his own' is clear and idiomatic, highlighting the
    contrast with Christ offering himself.
