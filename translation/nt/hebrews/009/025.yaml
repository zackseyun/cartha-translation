theological_decisions:
- issue: Referent of the comparison between Christ and the Levitical high priest
  chosen_reading: The verse contrasts Christ's once-for-all self-offering with the
    high priest's repeated annual entrance using sacrificial blood from another.
  alternative_readings:
  - The phrase 'the holy places' could be read more narrowly as the inner sanctuary/Most
    Holy Place.
  rationale: The immediate context in Hebrews 9 emphasizes the non-repetitive character
    of Messiah's sacrifice over against the repeated cultic ministry of the old covenant
    high priest. The translation avoids importing later doctrinal elaboration while
    preserving the contrast inherent in the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
