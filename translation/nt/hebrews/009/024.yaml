id: HEB.9.24
reference: Hebrews 9:24
source:
  edition: SBLGNT
  text: οὐ γὰρ εἰς χειροποίητα ⸂εἰσῆλθεν ἅγια⸃ Χριστός, ἀντίτυπα τῶν ἀληθινῶν, ἀλλ’
    εἰς αὐτὸν τὸν οὐρανόν, νῦν ἐμφανισθῆναι τῷ προσώπῳ τοῦ θεοῦ ὑπὲρ ἡμῶν·
translation:
  text: For the Messiah did not enter into holy places made by hands, copies of the
    true things, but into heaven itself, now to appear in the presence of God on our
    behalf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Christ'': Greek Χριστός. The main text uses ''Messiah'' because the
      title sense is active here.'
    reason: alternative_reading
  - marker: b
    text: Or 'representations' or 'counterparts' for 'copies.' The Greek term denotes
      things corresponding to the true heavenly realities.
    reason: lexical_alternative
  - marker: c
    text: Literally 'before the face of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Rendered as the title 'the Messiah' rather than the more name-like 'Christ,'
    following the project's default for Χριστός where the titular sense is active.
    In this argument about priestly entrance and fulfillment, the messianic office
    is in view.
- source_word: χειροποίητα
  chosen: made by hands
  alternatives:
  - man-made
  - made with hands
  lexicon: BDAG
  rationale: Kept the idiomatic contrast with the heavenly reality. 'Made by hands'
    preserves the biblical resonance of what is humanly constructed, while remaining
    understandable in modern English.
- source_word: ἅγια
  chosen: holy places
  alternatives:
  - the sanctuary
  - the holy places
  - the holy place
  lexicon: BDAG
  rationale: The neuter plural commonly refers to the sanctuary/holy places in Hebrews'
    cultic context. 'Holy places' preserves the plural form and temple-tabernacle
    register better than the singular, while avoiding over-interpretation of a specific
    chamber.
- source_word: ἀντίτυπα
  chosen: copies
  alternatives:
  - figures
  - representations
  - counterparts
  lexicon: BDAG
  rationale: In context the earthly sanctuary corresponds to and reflects the heavenly
    reality. 'Copies' is clear modern English and fits the contrast with 'the true
    things,' though the term can also carry the sense of corresponding representations.
- source_word: τῶν ἀληθινῶν
  chosen: of the true things
  alternatives:
  - of the real things
  - of the true realities
  lexicon: BDAG
  rationale: Rendered substantivally to match the Greek plural and to preserve the
    earthly/heavenly contrast. 'True things' here means the ultimate realities, not
    merely truthful objects.
- source_word: αὐτὸν τὸν οὐρανόν
  chosen: heaven itself
  alternatives:
  - the heaven itself
  lexicon: BDAG
  rationale: The intensive construction is best conveyed by 'itself,' emphasizing
    direct entry into the heavenly reality rather than its earthly counterpart.
- source_word: νῦν
  chosen: now
  alternatives:
  - at the present time
  lexicon: BDAG
  rationale: Retained the temporal adverb to mark the present, ongoing significance
    of Messiah's heavenly appearance.
- source_word: ἐμφανισθῆναι
  chosen: to appear
  alternatives:
  - to be manifested
  - to present himself
  lexicon: BDAG
  rationale: The infinitive expresses purpose/result of entering heaven. 'To appear'
    is idiomatic and fits the priestly-forensic setting without adding reflexive wording
    not explicit in the Greek.
- source_word: τῷ προσώπῳ τοῦ θεοῦ
  chosen: in the presence of God
  alternatives:
  - before the face of God
  - before God
  lexicon: BDAG
  rationale: An idiomatic rendering of the dative phrase that preserves the personal
    immediacy of access to God while using natural English.
- source_word: ὑπὲρ ἡμῶν
  chosen: on our behalf
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Chosen to preserve the representative/intercessory force of ὑπέρ in this
    priestly context more clearly than the broader 'for us.'
