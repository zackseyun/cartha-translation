theological_decisions:
- issue: Cultic terminology for ἅγια
  chosen_reading: Rendered as 'holy places' rather than a more interpretive singular
    such as 'the sanctuary.'
  alternative_readings:
  - the sanctuary
  - the holy place
  rationale: The Greek is plural and in Hebrews often denotes the sacred precincts
    in a cultic sense. Keeping the plural preserves the author's tabernacle imagery
    and avoids prematurely narrowing the reference to one chamber while still communicating
    the heavenly-earthly contrast.
  doctrine_reference: Translation philosophy §1, §5
- issue: Christological title Χριστός
  chosen_reading: Rendered as 'the Messiah.'
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where title
    is in view. This preserves the meaning of the title without altering orthodox
    Christology.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: Representative force of ὑπὲρ ἡμῶν
  chosen_reading: Rendered as 'on our behalf.'
  alternative_readings:
  - for us
  rationale: This wording preserves the text's priestly and mediatorial emphasis without
    importing a narrower atonement theory beyond what the verse itself states.
  doctrine_reference: Affirmations; Translation philosophy §3
