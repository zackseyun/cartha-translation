theological_decisions:
- issue: Meaning of θυμιατήριον in the holy-place description
  chosen_reading: altar of incense
  alternative_readings:
  - censer
  rationale: The verse has a longstanding interpretive and lexical debate because
    θυμιατήριον can refer to an incense-burning implement and because the tabernacle
    furniture arrangement raises historical questions. Following optimal equivalence
    and preserving ambiguity where real, the main text uses 'altar of incense' as
    the more likely cultic referent in this descriptive context, while the alternative
    'censer' is preserved in a footnote rather than being suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
