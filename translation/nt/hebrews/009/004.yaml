id: HEB.9.4
reference: Hebrews 9:4
source:
  edition: SBLGNT
  text: χρυσοῦν ἔχουσα θυμιατήριον καὶ τὴν κιβωτὸν τῆς διαθήκης περικεκαλυμμένην πάντοθεν
    χρυσίῳ, ἐν ᾗ στάμνος χρυσῆ ἔχουσα τὸ μάννα καὶ ἡ ῥάβδος Ἀαρὼν ἡ βλαστήσασα καὶ
    αἱ πλάκες τῆς διαθήκης,
translation:
  text: having the golden altar of incense, and the ark of the covenant covered on
    all sides with gold, in which were a golden jar holding the manna, Aaron’s staff
    that budded, and the tablets of the covenant,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'golden censer.' The Greek term θυμιατήριον can refer to an incense-burning
      implement and is debated here.
    reason: alternative_reading
lexical_decisions:
- source_word: θυμιατήριον
  chosen: altar of incense
  alternatives:
  - censer
  lexicon: BDAG
  rationale: The term can denote either a censer or an incense altar. In Hebrews 9:4,
    the cultic context and the association with the Most Holy Place have led some
    to prefer 'censer,' but the lexical range includes an altar/incense implement.
    'Altar of incense' is chosen for the main text as the more natural referent in
    the tabernacle description, while preserving 'censer' in a footnote because the
    term is genuinely debated.
- source_word: χρυσοῦν
  chosen: golden
  alternatives:
  - made of gold
  lexicon: BDAG
  rationale: The adjective straightforwardly means 'golden' or 'made of gold.' 'Golden'
    is idiomatic and sufficiently precise in English.
- source_word: κιβωτὸν τῆς διαθήκης
  chosen: the ark of the covenant
  alternatives:
  - the chest of the covenant
  lexicon: BDAG
  rationale: '''Ark of the covenant'' is the established and accurate rendering for
    the sacred chest; ''chest'' would be more wooden and less recognizable.'
- source_word: περικεκαλυμμένην πάντοθεν χρυσίῳ
  chosen: covered on all sides with gold
  alternatives:
  - completely overlaid with gold
  - covered all around with gold
  lexicon: BDAG
  rationale: The perfect passive participle with πάντοθεν emphasizes full surrounding
    coverage. 'Covered on all sides with gold' preserves that sense in clear modern
    English.
- source_word: ἐν ᾗ
  chosen: in which were
  alternatives:
  - in which was
  lexicon: BDAG
  rationale: Grammatically singular relative pronoun refers to the ark, but the following
    list contains multiple items. English idiom prefers 'in which were' to agree with
    the listed contents.
- source_word: στάμνος χρυσῆ ἔχουσα τὸ μάννα
  chosen: a golden jar holding the manna
  alternatives:
  - a golden urn containing the manna
  - a golden pot having the manna
  lexicon: BDAG
  rationale: στάμνος denotes a jar/pot; 'jar' is accessible modern English. 'Holding'
    renders ἔχουσα naturally without sounding wooden.
- source_word: μάννα
  chosen: the manna
  lexicon: BDAG
  rationale: Standard transliteration of the wilderness provision; the article is
    retained.
- source_word: ῥάβδος Ἀαρὼν ἡ βλαστήσασα
  chosen: Aaron’s staff that budded
  alternatives:
  - Aaron’s rod that sprouted
  - Aaron’s staff that had budded
  lexicon: BDAG
  rationale: ῥάβδος can be 'rod' or 'staff'; 'staff' is more natural contemporary
    English. The aorist participle βλαστήσασα is well rendered 'that budded,' referring
    to the known event.
- source_word: πλάκες τῆς διαθήκης
  chosen: the tablets of the covenant
  alternatives:
  - the tablets of the testimony
  - the stone tablets of the covenant
  lexicon: BDAG
  rationale: πλάκες are tablets, and διαθήκη here is best rendered 'covenant' consistently.
    'Stone' is implied historically but not explicit in this verse, so it is not added
    to the main text.
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  lexicon: BDAG
  rationale: In this cultic and biblical-theological context, 'covenant' is the standard
    and most accurate rendering, not 'testament'.
