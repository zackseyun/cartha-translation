id: HEB.9.14
reference: Hebrews 9:14
source:
  edition: SBLGNT
  text: πόσῳ μᾶλλον τὸ αἷμα τοῦ Χριστοῦ, ὃς διὰ πνεύματος αἰωνίου ἑαυτὸν προσήνεγκεν
    ἄμωμον τῷ θεῷ, καθαριεῖ τὴν συνείδησιν ⸀ἡμῶν ἀπὸ νεκρῶν ἔργων εἰς τὸ λατρεύειν
    θεῷ ζῶντι.
translation:
  text: how much more will the blood of the Messiah—who through the eternal Spirit
    offered himself without blemish to God—cleanse our conscience from dead works
    to serve the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through an eternal spirit.' The Greek phrase may be read more generally,
      though 'the eternal Spirit' is taken here as a reference to the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - by how much more
  - much more
  lexicon: BDAG
  rationale: Standard comparative idiom introducing an a fortiori argument from the
    previous verse; 'how much more' is natural English and preserves the rhetorical
    force.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal rendering is required; in Hebrews it carries sacrificial significance
    that should not be paraphrased away.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where functioning as
    a title. Here the genitive is titular rather than name-like, and 'Messiah' preserves
    the meaning of the Greek title.
- source_word: διὰ πνεύματος αἰωνίου
  chosen: through the eternal Spirit
  alternatives:
  - through an eternal spirit
  lexicon: BDAG
  rationale: The anarthrous phrase can be read qualitatively, but in context the capitalized
    'Spirit' best reflects the likely referent and the long-standing Christian reading,
    while preserving the preposition 'through' rather than weakening it.
- source_word: ἑαυτὸν προσήνεγκεν
  chosen: offered himself
  alternatives:
  - presented himself
  lexicon: BDAG
  rationale: Cultic/sacrificial context favors 'offered himself'; it matches Hebrews'
    priestly language and keeps the reflexive force of ἑαυτόν.
- source_word: ἄμωμον
  chosen: without blemish
  alternatives:
  - blameless
  - unblemished
  lexicon: BDAG
  rationale: Sacrificial terminology is prominent in the context; 'without blemish'
    best evokes an acceptable sacrificial offering to God.
- source_word: καθαριεῖ
  chosen: will cleanse
  alternatives:
  - cleanses
  - will purify
  lexicon: BDAG
  rationale: Future indicative is explicit in the Greek and should be preserved. 'Cleanse'
    fits the purity language of the passage.
- source_word: συνείδησιν
  chosen: conscience
  alternatives:
  - inner consciousness
  lexicon: BDAG
  rationale: '''Conscience'' is the standard and contextually precise rendering in
    Hebrews for the moral interior affected by sacrificial cleansing.'
- source_word: νεκρῶν ἔργων
  chosen: dead works
  alternatives:
  - dead deeds
  - works that lead to death
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the phrase's theological density
    and its established usage in Hebrews 6:1 and 9:14. More interpretive expansions
    go beyond the text.
- source_word: εἰς τὸ λατρεύειν
  chosen: to serve
  alternatives:
  - for serving
  - for worshiping
  lexicon: BDAG
  rationale: The infinitive of purpose is well rendered by 'to serve.' λατρεύω can
    denote cultic worship/service; 'serve' is broad enough to preserve both devotion
    and priestly service without over-narrowing.
- source_word: θεῷ ζῶντι
  chosen: the living God
  alternatives:
  - a living God
  lexicon: BDAG
  rationale: Anarthrous θεῷ in this idiom is definite in context; 'the living God'
    is the natural English rendering and echoes established biblical usage.
