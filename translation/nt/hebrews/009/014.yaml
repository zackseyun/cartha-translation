theological_decisions:
- issue: Referent of πνεύματος αἰωνίου
  chosen_reading: the Holy Spirit is intended, rendered 'the eternal Spirit'
  alternative_readings:
  - Christ's own eternal spirit/disposition
  - an eternal spiritual mode of offering
  rationale: The phrase is grammatically capable of more than one construal, but within
    historic orthodox bounds and the immediate sacrificial context, the personal divine
    Spirit is the most likely referent. Capitalization in English signals this reading.
    Because the ambiguity is genuine, an alternative is preserved in a footnote rather
    than erased.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrine file directs that Χριστός be translated as 'Messiah' where
    it functions as a title. This verse speaks of the sacrificial work of the anointed
    one, so the titular sense is active.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for Χριστός'
