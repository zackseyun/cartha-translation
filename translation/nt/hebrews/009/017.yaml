id: HEB.9.17
reference: Hebrews 9:17
source:
  edition: SBLGNT
  text: διαθήκη γὰρ ἐπὶ νεκροῖς βεβαία, ἐπεὶ ⸀μήποτε ἰσχύει ὅτε ζῇ ὁ διαθέμενος.
translation:
  text: For a covenant is valid over dead ones, since it is never in force while the
    one who made it is living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For a will is valid only after death, since it is never in force while
      the one who made it is living.' The Greek term can mean either 'covenant' or
      'will/testament.'
    reason: alternative_reading
  - marker: b
    text: The phrase 'over dead ones' is compressed in Greek and may refer either
      to dead persons (in a testamentary sense) or to death involved in covenant ratification.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - will
  - testament
  lexicon: BDAG
  rationale: Although διαθήκη can mean either 'covenant' or 'will/testament,' the
    broader context of Hebrews 9 is dominated by covenantal categories drawn from
    the Mosaic covenant and sacrificial inauguration. To preserve contextual coherence
    and avoid importing a purely legal-testamentary frame into the main text, 'covenant'
    is chosen, while the alternative is preserved in a footnote because this verse
    is famously debated.
- source_word: ἐπὶ νεκροῖς
  chosen: over dead ones
  alternatives:
  - in the case of dead persons
  - after deaths
  - when death has occurred
  lexicon: BDAG
  rationale: 'The phrase is compressed and somewhat elliptical. A more literal rendering,
    ''over dead ones,'' preserves the Greek''s terseness and leaves room for the debated
    sense: either concerning dead sacrificial victims or operative only after the
    death of the covenant-maker/testator. The wording avoids over-resolving the ambiguity.'
- source_word: βεβαία
  chosen: valid
  alternatives:
  - firm
  - confirmed
  - binding
  lexicon: BDAG
  rationale: The adjective here concerns legal or covenantal force rather than mere
    abstract certainty. 'Valid' communicates operative legal standing in natural English.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - for
  - because
  lexicon: BDAG
  rationale: Introduces the explanatory ground for the preceding statement. 'Since'
    is natural and preserves the causal force.
- source_word: μήποτε
  chosen: never
  alternatives:
  - not ever
  - lest perhaps
  lexicon: BDAG
  rationale: In this context μήποτε functions idiomatically with ἰσχύει to mean 'never'
    or 'not at any time,' not the more common prohibitive or apprehensive sense.
- source_word: ἰσχύει
  chosen: is in force
  alternatives:
  - has force
  - is valid
  - prevails
  lexicon: BDAG
  rationale: The verb here denotes legal effectiveness or operative force. 'Is in
    force' best captures that nuance in idiomatic English.
- source_word: ὅτε ζῇ
  chosen: while ... is living
  alternatives:
  - when ... lives
  - as long as ... lives
  lexicon: BDAG
  rationale: The temporal clause contrasts the state of death with ongoing life. 'While
    ... is living' is clear and natural.
- source_word: ὁ διαθέμενος
  chosen: the one who made it
  alternatives:
  - the covenant-maker
  - the one who enacted it
  - the testator
  lexicon: BDAG
  rationale: The participle from διατίθεμαι can denote the one who makes a covenant
    or the one who makes a will. 'The one who made it' preserves the ambiguity needed
    by the context and matches the chosen rendering of διαθήκη as 'covenant' without
    foreclosing the testamentary alternative.
