theological_decisions:
- issue: Whether διαθήκη in Hebrews 9:17 should be rendered in a testamentary sense
    ('will/testament') or covenantal sense ('covenant').
  chosen_reading: Render the main text with 'covenant' while preserving the testamentary
    alternative in a footnote.
  alternative_readings:
  - will
  - testament
  rationale: The immediate and wider context in Hebrews 8–10 is covenantal, especially
    the contrast between the first and new covenant and the role of sacrificial blood.
    At the same time, Hebrews 9:16–17 uses language that has often been read in a
    testamentary/legal sense. In keeping with the translation philosophy of preserving
    theological tension rather than resolving genuine ambiguity, the main text follows
    the dominant contextual frame ('covenant') and the alternative is explicitly footnoted.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; §5
- issue: How much to resolve the ambiguity of ἐπὶ νεκροῖς.
  chosen_reading: Retain an intentionally open rendering ('over dead ones') in the
    main text.
  alternative_readings:
  - after deaths
  - in the case of dead persons
  - over dead sacrifices
  rationale: The phrase is syntactically terse and interpretively disputed. Some understand
    it as referring to the death of a testator; others to sacrificial victims associated
    with covenant ratification. The translation preserves the ambiguity rather than
    importing one interpretive scheme into the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
