id: HEB.9.21
reference: Hebrews 9:21
source:
  edition: SBLGNT
  text: καὶ τὴν σκηνὴν δὲ καὶ πάντα τὰ σκεύη τῆς λειτουργίας τῷ αἵματι ὁμοίως ἐράντισεν.
translation:
  text: And likewise he sprinkled the tabernacle and all the vessels of the ministry
    with the blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent.' The Greek term can mean 'tent,' but here it refers to the
      sacred tabernacle.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the articles of the service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκηνή
  chosen: tabernacle
  alternatives:
  - tent
  lexicon: BDAG
  rationale: In Hebrews, σκηνή commonly refers to the Mosaic tabernacle as a cultic
    structure, not merely a generic tent. 'Tabernacle' preserves the sanctuary sense
    and matches the argument of the chapter.
- source_word: σκεῦη
  chosen: vessels
  alternatives:
  - articles
  - utensils
  - implements
  lexicon: BDAG
  rationale: σκεῦη denotes objects/equipment used in service. 'Vessels' is a natural
    English rendering in sacrificial/tabernacle context and preserves the cultic register
    better than the broader 'articles'.
- source_word: λειτουργία
  chosen: ministry
  alternatives:
  - service
  - liturgical service
  lexicon: BDAG
  rationale: λειτουργία here refers to priestly/cultic service. 'Ministry' is concise
    and understandable, while still carrying formal religious sense. 'Service' is
    possible, but 'ministry' better reflects the specialized sacred function in context.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal reference to sacrificial blood in the ritual context; no reason
    to paraphrase.
- source_word: ὁμοίως
  chosen: likewise
  alternatives:
  - in the same way
  - similarly
  lexicon: BDAG
  rationale: Connects this action with the preceding sprinkling in v. 19. 'Likewise'
    is compact and preserves the comparative force.
- source_word: ῥαντίζω
  chosen: sprinkled
  alternatives:
  - aspersed
  lexicon: BDAG
  rationale: Standard and clear rendering for ritual application of blood. 'Aspersed'
    is more technical but less readable.
- source_word: δὲ
  chosen: and
  alternatives:
  - now
  - but
  lexicon: BDAG
  rationale: Here δέ is mildly connective rather than strongly adversative. Rendering
    it with simple coordination produces natural English without overstating contrast.
- source_word: πάντα τὰ σκεύη
  chosen: all the vessels
  alternatives:
  - every vessel
  - all the articles
  lexicon: BDAG
  rationale: The plural with πάντα is naturally rendered 'all the vessels,' emphasizing
    the comprehensiveness of the ritual purification.
