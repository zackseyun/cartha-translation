theological_decisions:
- issue: Relation of this verse to the Mosaic ritual background in Exodus
  chosen_reading: Translate straightforwardly as a summary statement about Moses sprinkling
    the tabernacle and its cultic implements with blood, without harmonizing details
    beyond the text.
  alternative_readings:
  - Expand the wording to explain historical background or perceived discrepancies
    with Exodus accounts
  rationale: The verse presents the author's summary of ritual consecration/purification.
    The translation should not import explanatory material or attempt to resolve historical/intertextual
    questions in the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
