id: HEB.9.8
reference: Hebrews 9:8
source:
  edition: SBLGNT
  text: τοῦτο δηλοῦντος τοῦ πνεύματος τοῦ ἁγίου, μήπω πεφανερῶσθαι τὴν τῶν ἁγίων ὁδὸν
    ἔτι τῆς πρώτης σκηνῆς ἐχούσης στάσιν,
translation:
  text: By this the Holy Spirit is indicating that the way into the holy places has
    not yet been revealed while the first tabernacle still has standing,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the way into the sanctuary." The Greek expression can denote the sacred
      precincts generally; some take it more specifically as "the way into the Most
      Holy Place."
    reason: alternative_reading
  - marker: b
    text: Or "while the first tabernacle is still standing."
    reason: lexical_alternative
lexical_decisions:
- source_word: δηλοῦντος
  chosen: is indicating
  alternatives:
  - is making clear
  - is signifying
  - shows
  lexicon: BDAG
  rationale: Present participle in a genitive absolute; an English progressive finite
    verb best captures the ongoing explanatory force in context without sounding archaic.
- source_word: πνεύματος τοῦ ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - the Holy Spirit of God
  lexicon: BDAG
  rationale: Standard NT referent and idiomatic English rendering of the genitive
    phrase.
- source_word: μήπω πεφανερῶσθαι
  chosen: has not yet been revealed
  alternatives:
  - has not yet been made manifest
  - was not yet disclosed
  lexicon: BDAG
  rationale: Perfect passive infinitive conveys a state of not yet having been disclosed;
    English present perfect passive communicates that continuing state naturally.
- source_word: τὴν τῶν ἁγίων ὁδὸν
  chosen: the way into the holy places
  alternatives:
  - the way into the sanctuary
  - the way of the saints
  - the way into the Most Holy Place
  lexicon: BDAG
  rationale: In Hebrews, τὰ ἅγια commonly refers to the sanctuary/holy places rather
    than 'saints.' 'Holy places' preserves the cultic plural and avoids over-specifying
    the inner room. 'Into' is supplied idiomatically because ὁδός in this context
    denotes access to the sacred space.
- source_word: τῶν ἁγίων
  chosen: the holy places
  alternatives:
  - the sanctuary
  - the Most Holy Place
  lexicon: BDAG
  rationale: Genitive plural of ἅγιος used substantivally in tabernacle context. The
    plural likely reflects the sanctuary precincts generally; 'Most Holy Place' is
    possible by contextual inference but narrower than the Greek requires.
- source_word: πρώτης σκηνῆς
  chosen: the first tabernacle
  alternatives:
  - the first tent
  - the outer tabernacle
  lexicon: BDAG
  rationale: σκηνή in Hebrews 9 refers to the tabernacle structure/section. 'Tabernacle'
    preserves the cultic setting better than 'tent.' 'First' follows the author's
    spatial distinction in the immediate context.
- source_word: ἐχούσης στάσιν
  chosen: still has standing
  alternatives:
  - is still standing
  - still remains in place
  - still has a place
  lexicon: BDAG
  rationale: στάσις here denotes continued existence/status. 'Has standing' preserves
    the noun's sense of maintained status or validity and fits the participial construction
    with ἐχούσης.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  - as long as
  lexicon: BDAG
  rationale: Combined with the genitive absolute, ἔτι marks continued duration; 'still'
    is the most natural concise rendering in English.
