theological_decisions:
- issue: Referent of τῶν ἁγίων
  chosen_reading: cultic sanctuary access rather than access to holy people
  alternative_readings:
  - the way of the saints
  rationale: The surrounding context is explicitly about tabernacle layout and priestly
    access, so the phrase is spatial/cultic, not ecclesial. This avoids importing
    a theological reading foreign to the immediate argument.
  doctrine_reference: Translation philosophy §1, §3
- issue: Specificity of sanctuary reference
  chosen_reading: holy places / sanctuary generally
  alternative_readings:
  - Most Holy Place specifically
  rationale: Although the context concerns restricted access and may point especially
    to the inner sanctuary, the Greek plural τῶν ἁγίων is broader. The main text preserves
    that breadth rather than resolving the ambiguity too tightly.
  doctrine_reference: Translation philosophy §3
