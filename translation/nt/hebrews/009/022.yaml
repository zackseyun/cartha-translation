id: HEB.9.22
reference: Hebrews 9:22
source:
  edition: SBLGNT
  text: καὶ σχεδὸν ἐν αἵματι πάντα καθαρίζεται κατὰ τὸν νόμον, καὶ χωρὶς αἱματεκχυσίας
    οὐ γίνεται ἄφεσις.
translation:
  text: And according to the law, almost everything is cleansed with blood, and without
    the shedding of blood there is no forgiveness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''remission'': the Greek term can denote release or pardon; here it
      refers to the forgiveness of sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σχεδόν
  chosen: almost
  alternatives:
  - nearly
  lexicon: BDAG
  rationale: Adverb qualifying the scope of the statement; 'almost' is the most natural
    modern English equivalent and preserves the author's qualification that not absolutely
    every purification under the law involved blood.
- source_word: ἐν αἵματι
  chosen: with blood
  alternatives:
  - in blood
  - by blood
  lexicon: BDAG
  rationale: 'Although ἐν is literally ''in,'' here the instrumental sense is most
    natural in English: things are cleansed ''with blood.'' This preserves the ritual
    means without awkward literalism.'
- source_word: πάντα
  chosen: almost everything
  alternatives:
  - almost all things
  lexicon: BDAG
  rationale: Neuter plural used broadly for things/items/ritual matters under discussion.
    'Everything' is idiomatic English and fits the generalizing statement, while still
    governed by 'almost'.
- source_word: καθαρίζεται
  chosen: is cleansed
  alternatives:
  - is purified
  - is made clean
  lexicon: BDAG
  rationale: Passive present indicates customary action under the law. 'Is cleansed'
    is clear, readable, and retains ritual/theological force. 'Purified' is possible,
    but 'cleansed' better matches the concrete cultic context in accessible English.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - under the law
  - by the law
  lexicon: BDAG
  rationale: κατά here expresses conformity to the Mosaic legal system. 'According
    to the law' is the most transparent rendering and avoids overinterpreting the
    phrase.
- source_word: χωρὶς
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: Standard privative sense. 'Without' is direct and idiomatic in this maxim-like
    clause.
- source_word: αἱματεκχυσίας
  chosen: the shedding of blood
  alternatives:
  - bloodshedding
  - blood-pouring
  lexicon: BDAG
  rationale: This noun denotes the pouring out/shedding of blood, especially in sacrificial
    or violent death contexts. 'The shedding of blood' is established, accurate English
    and preserves the sacrificial resonance.
- source_word: οὐ γίνεται
  chosen: there is no
  alternatives:
  - does not happen
  - does not come about
  lexicon: BDAG
  rationale: 'γίνεται with abstract noun ἄφεσις yields an existential/resultative
    sense: forgiveness does not occur. English idiom is best captured by ''there is
    no'' in this proverbial formulation.'
- source_word: ἄφεσις
  chosen: forgiveness
  alternatives:
  - remission
  - release
  lexicon: BDAG
  rationale: In this sacrificial context, ἄφεσις refers to the forgiveness/remission
    of sins. 'Forgiveness' is the clearest modern English choice; 'remission' is more
    traditional but less accessible, while 'release' is too broad for the immediate
    context.
