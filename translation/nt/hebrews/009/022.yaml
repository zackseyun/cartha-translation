theological_decisions:
- issue: Rendering ἄφεσις in a sacrificial context
  chosen_reading: forgiveness
  alternative_readings:
  - remission
  rationale: The verse states a theological principle about sin and sacrificial blood
    within the argument of Hebrews. 'Forgiveness' communicates the sense clearly in
    modern English without importing a narrower doctrinal system. 'Remission' is preserved
    as a lexical alternative but not preferred in the main text because the translation
    philosophy favors readable modern English over ecclesiastical jargon.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
