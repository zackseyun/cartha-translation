theological_decisions:
- issue: Referent of the implied subject in ἐστίν
  chosen_reading: Rendered explicitly as 'he is' referring to Messiah/Jesus from the
    immediate context.
  alternative_readings:
  - Left implicit as 'is' without supplied subject
  rationale: English requires an explicit subject. The antecedent is clear from the
    preceding context about Messiah's sacrificial ministry, so supplying 'he' is necessary
    and does not add new doctrinal content.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-language
    primacy)
- issue: Meaning of διαθήκη in this verse
  chosen_reading: Rendered as 'covenant' in the main text.
  alternative_readings:
  - testament
  rationale: Although Hebrews 9:16–17 plays on the semantic range of διαθήκη, verse
    15 is still best read in continuity with the new/first covenant contrast. To preserve
    the semantic possibility without flattening the context, the alternative 'testament'
    is noted in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension)
