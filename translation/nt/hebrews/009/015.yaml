id: HEB.9.15
reference: Hebrews 9:15
source:
  edition: SBLGNT
  text: Καὶ διὰ τοῦτο διαθήκης καινῆς μεσίτης ἐστίν, ὅπως θανάτου γενομένου εἰς ἀπολύτρωσιν
    τῶν ἐπὶ τῇ πρώτῃ διαθήκῃ παραβάσεων τὴν ἐπαγγελίαν λάβωσιν οἱ κεκλημένοι τῆς αἰωνίου
    κληρονομίας.
translation:
  text: And for this reason he is the mediator of a new covenant, so that, since a
    death has occurred for the redemption of the transgressions committed under the
    first covenant, those who have been called may receive the promise of the eternal
    inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testament' for 'covenant'; the Greek word διαθήκη can bear both senses,
      and Hebrews 9:16–17 develops that overlap, though 'covenant' best fits the contrast
      with the first covenant in this verse.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - because of this
  - therefore
  lexicon: BDAG
  rationale: Idiomatic causal expression linking this verse to the preceding argument;
    'for this reason' preserves the explanatory force better than a bare 'therefore.'
- source_word: διαθήκης καινῆς
  chosen: of a new covenant
  alternatives:
  - of a new testament
  lexicon: BDAG
  rationale: In Hebrews the covenantal sense is primary in the surrounding context,
    even though the semantic overlap with 'testament/will' becomes relevant later
    in the chapter. 'New covenant' best reflects the theological and intertextual
    sense here.
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intermediary
  lexicon: BDAG
  rationale: Standard and precise rendering for one who stands between parties to
    effect covenantal relationship; fits Hebrews' priestly and covenantal argument.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Marks purpose/result. 'So that' is natural modern English while preserving
    the clause's teleological force.
- source_word: θανάτου γενομένου
  chosen: since a death has occurred
  alternatives:
  - a death having occurred
  - after a death occurred
  lexicon: BDAG
  rationale: The genitive absolute indicates the occurrence of death as the condition
    grounding what follows. 'Since a death has occurred' communicates the completed
    event and its relevance without wooden literalism.
- source_word: ἀπολύτρωσιν
  chosen: redemption
  alternatives:
  - release
  - ransom
  lexicon: BDAG
  rationale: '''Redemption'' best captures deliverance effected at cost, which is
    central to the sacrificial context of Hebrews. ''Ransom'' is possible but too
    narrow here.'
- source_word: τῶν ἐπὶ τῇ πρώτῃ διαθήκῃ παραβάσεων
  chosen: of the transgressions committed under the first covenant
  alternatives:
  - of the transgressions under the first covenant
  - of the violations associated with the first covenant
  lexicon: BDAG
  rationale: ἐπί with the dative here is best taken in the sense of 'under' or 'in
    the time/sphere of' the first covenant. 'Committed' is supplied in English to
    make explicit the relation of 'transgressions' to the covenantal sphere.
- source_word: τὴν ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - what was promised
  lexicon: BDAG
  rationale: The singular noun is retained. In context it refers to the promised inheritance
    rather than merely an abstract act of promising.
- source_word: λάβωσιν
  chosen: may receive
  alternatives:
  - might receive
  - may obtain
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅπως is well represented by 'may receive' in
    English, preserving intended result without awkwardness.
- source_word: οἱ κεκλημένοι
  chosen: those who have been called
  alternatives:
  - the called ones
  - those who are called
  lexicon: BDAG
  rationale: Perfect passive participle indicates persons in the state of having been
    called. This rendering preserves that aspect and avoids overly technical phrasing.
- source_word: τῆς αἰωνίου κληρονομίας
  chosen: of the eternal inheritance
  alternatives:
  - of the everlasting inheritance
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'Eternal inheritance' is both
    natural and theologically weighty, fitting Hebrews' contrast between temporary
    and enduring realities.
