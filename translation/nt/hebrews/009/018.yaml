id: HEB.9.18
reference: Hebrews 9:18
source:
  edition: SBLGNT
  text: ὅθεν οὐδὲ ἡ πρώτη χωρὶς αἵματος ἐγκεκαίνισται·
translation:
  text: Therefore not even the first covenant was inaugurated without blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first'—that is, the first covenant. Some translations render the
      implied noun more formally as 'the first testament.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - Hence
  - For this reason
  - From which it follows
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument
    about covenants/testaments and the necessity of death/blood. 'Therefore' is natural
    modern English and preserves the logical force.
- source_word: οὐδὲ
  chosen: not even
  alternatives:
  - nor
  - neither
  lexicon: BDAG
  rationale: Emphatic negative particle meaning 'not even' in this construction, highlighting
    that the principle applies also to the first covenant.
- source_word: ἡ πρώτη
  chosen: the first covenant
  alternatives:
  - the first
  - the first one
  lexicon: BDAG
  rationale: Although 'covenant' is not repeated explicitly, the feminine substantive
    adjective refers back to the immediately preceding discussion of the first covenant
    in context (Heb 9:1, 15–17). Supplying 'covenant' in English is necessary for
    clarity and reflects the anaphoric sense rather than adding new content.
- source_word: χωρὶς αἵματος
  chosen: without blood
  alternatives:
  - apart from blood
  lexicon: BDAG
  rationale: Standard prepositional phrase indicating absence of blood. 'Without blood'
    is idiomatic and preserves the sacrificial/covenantal force in context.
- source_word: ἐγκεκαίνισται
  chosen: was inaugurated
  alternatives:
  - has been inaugurated
  - was put into effect
  - was dedicated
  - was ratified
  lexicon: BDAG
  rationale: Perfect passive of ἐγκαινίζω, 'to inaugurate, dedicate, put into effect.'
    In this context of covenant enactment through sacrificial blood, 'was inaugurated'
    best captures the ceremonial commencement without over-narrowing to merely legal
    ratification. English simple past reads most naturally here, though the Greek
    perfect conveys a completed action with abiding significance.
