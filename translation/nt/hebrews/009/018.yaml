theological_decisions:
- issue: Referent of 'the first'
  chosen_reading: the first covenant
  alternative_readings:
  - the first tabernacle arrangement
  - the first testament
  rationale: The immediate and broader context in Hebrews 9 centers on the first covenant
    and its cultic regulations. Rendering simply 'the first' would be obscure in English.
    'Testament' is possible in the nearby argument, but in v.18 the allusion to Exodus
    24 and blood-inauguration favors 'covenant.'
  doctrine_reference: Translation philosophy §1, §3, §5
