id: HEB.9.7
reference: Hebrews 9:7
source:
  edition: SBLGNT
  text: εἰς δὲ τὴν δευτέραν ἅπαξ τοῦ ἐνιαυτοῦ μόνος ὁ ἀρχιερεύς, οὐ χωρὶς αἵματος,
    ὃ προσφέρει ὑπὲρ ἑαυτοῦ καὶ τῶν τοῦ λαοῦ ἀγνοημάτων,
translation:
  text: But into the second room only the high priest enters once a year, and not
    without blood, which he offers for himself and for the people's sins committed
    in ignorance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the second tent' or 'the second section,' referring to the inner part
      of the tabernacle.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people's unintentional sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς δὲ τὴν δευτέραν
  chosen: But into the second room
  alternatives:
  - But into the second tent
  - But into the second section
  lexicon: BDAG
  rationale: The phrase refers back to the second part of the tabernacle described
    in context (9:2–3). Supplying 'room' makes the elliptical Greek natural in English
    while preserving the spatial contrast. 'Tent' is possible because the broader
    structure is the tabernacle, but 'room' best fits the immediate contrast with
    the first and second compartments.
- source_word: ἅπαξ τοῦ ἐνιαυτοῦ
  chosen: once a year
  alternatives:
  - once in the year
  - once yearly
  lexicon: BDAG
  rationale: Idiomatic English equivalent of the genitive construction; preserves
    the annual frequency without awkward literalism.
- source_word: μόνος ὁ ἀρχιερεύς
  chosen: only the high priest
  alternatives:
  - the high priest alone
  - the high priest only
  lexicon: BDAG
  rationale: This conveys exclusivity clearly in modern English. Fronting 'only' naturally
    reflects μόνος without over-formal wording.
- source_word: οὐ χωρὶς αἵματος
  chosen: and not without blood
  alternatives:
  - not without blood
  - and never without blood
  lexicon: BDAG
  rationale: A close rendering of the litotes. 'Blood' is retained rather than 'a
    blood offering' because the sacrificial imagery is important and explicit in the
    Greek.
- source_word: ὃ προσφέρει
  chosen: which he offers
  alternatives:
  - which he brings as an offering
  - which he presents
  lexicon: BDAG
  rationale: '''Offers'' is the standard sacrificial sense of προσφέρει here and keeps
    the cultic context clear.'
- source_word: ὑπὲρ ἑαυτοῦ
  chosen: for himself
  alternatives:
  - on behalf of himself
  lexicon: BDAG
  rationale: Natural English rendering of ὑπέρ in sacrificial context, indicating
    benefit/representation without unnecessary stiffness.
- source_word: τῶν τοῦ λαοῦ ἀγνοημάτων
  chosen: the people's sins committed in ignorance
  alternatives:
  - the people's unintentional sins
  - the people's acts of ignorance
  lexicon: BDAG
  rationale: ἀγνοήματα denotes sins done in ignorance or unintentionally. 'Sins committed
    in ignorance' is clear and preserves the moral force better than the more abstract
    'acts of ignorance.'
