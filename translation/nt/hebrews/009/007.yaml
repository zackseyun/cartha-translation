theological_decisions:
- issue: Nature of ἀγνοήματα in sacrificial context
  chosen_reading: Rendered as 'sins committed in ignorance'
  alternative_readings:
  - unintentional sins
  - acts of ignorance
  rationale: The term refers to culpable offenses characterized by ignorance, not
    mere lack of information. The translation preserves sacrificial and moral categories
    without importing later doctrinal distinctions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
