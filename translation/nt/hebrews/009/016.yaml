theological_decisions:
- issue: Whether διαθήκη in Hebrews 9:16 should be rendered 'covenant' or 'will/testament'
  chosen_reading: covenant in the main text, with 'will/testament' preserved in a
    footnote
  alternative_readings:
  - will
  - testament
  rationale: The immediate verses are debated, but the larger discourse in Hebrews
    centers on covenant theology rather than inheritance law. Following the translation
    philosophy of preserving theological tension rather than over-resolving it, the
    main text keeps the covenantal sense while the alternative legal sense is explicitly
    footnoted for auditability.
  doctrine_reference: Translation philosophy §§1, 3, 5
