id: HEB.9.16
reference: Hebrews 9:16
source:
  edition: SBLGNT
  text: ὅπου γὰρ διαθήκη, θάνατον ἀνάγκη φέρεσθαι τοῦ διαθεμένου·
translation:
  text: For where there is a covenant, it is necessary for the death of the one who
    made it to be established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For where there is a will, it is necessary to establish the death of
      the one who made it.' The Greek word diathēkē can mean either 'covenant' or
      'will/testament,' and many understand vv. 16–17 in the legal sense here.
    reason: alternative_reading
lexical_decisions:
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - will
  - testament
  lexicon: BDAG
  rationale: Although διαθήκη can mean either 'covenant' or 'will/testament,' the
    broader context of Hebrews 8–10 is dominated by covenantal argument from Jeremiah
    31 and sacrificial inauguration language. To preserve contextual coherence and
    avoid importing later translation tradition, 'covenant' is preferred in the main
    text. Because vv. 16–17 are often understood with the sense 'will/testament,'
    that alternative is preserved in a footnote.
- source_word: θάνατον
  chosen: death
  lexicon: BDAG
  rationale: Standard rendering of θάνατος; here it refers to actual death as the
    condition under discussion.
- source_word: ἀνάγκη
  chosen: it is necessary
  alternatives:
  - there is necessity
  lexicon: BDAG
  rationale: Idiomatic English rendering of the predicate noun expressing necessity.
- source_word: φέρεσθαι
  chosen: to be established
  alternatives:
  - to be brought forward
  - to be borne
  - to be produced
  lexicon: BDAG
  rationale: The passive infinitive of φέρω literally means 'to be brought/carried,'
    but in legal or evidentiary context it can convey the idea of being brought forward
    or presented as valid. 'To be established' gives readable English while reflecting
    the requirement that the death be in view/operative for the covenant in this argument.
- source_word: τοῦ διαθεμένου
  chosen: the one who made it
  alternatives:
  - the covenant-maker
  - the testator
  - the one who enacted it
  lexicon: BDAG
  rationale: The participle from διατίθεμαι denotes the person who made/enacted the
    διαθήκη. 'The one who made it' is natural English and keeps the relation to διαθήκη
    explicit without prematurely forcing the narrower legal term 'testator' in the
    main text.
- source_word: ὅπου γὰρ
  chosen: For where
  alternatives:
  - For wherever
  lexicon: BDAG
  rationale: A straightforward connective and locative-relative opening that preserves
    the explanatory force of γάρ.
