theological_decisions:
- issue: Text-critical and interpretive rendering of τῶν γενομένων ἀγαθῶν
  chosen_reading: of the good things that have come
  alternative_readings:
  - of the good things to come
  rationale: The main text follows the SBLGNT reading γενομένων, which points to blessings realized in Christ's priestly work. Because many readers know the traditional rendering 'to come,' the alternative is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension where relevant)
revisions:
- timestamp: '2026-04-21T03:25:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/hebrews/009/011.json
  category: awkward_english
  tier: 1
  from: But when the Messiah appeared as high priest of the good things that have come, through the greater and more perfect tabernacle not made by hands—that is, not of this creation—
  to: But the Messiah came as high priest of the good things that are now here; and through the greater and more perfect tabernacle not made by hands—that is, not of this creation—
  rationale: The current phrasing 'when the Messiah appeared... through the... tabernacle' creates a misleading syntactic link, suggesting the tabernacle was the means of his appearance. The Greek adverbial phrase 'διὰ τῆς... σκηνῆς' almost certainly modifies the main verb 'εἰσῆλθεν' (he entered) in verse 12. The draft's structure misdirects the reader. Using a semicolon to separate the clauses resolves this ambiguity, correctly positioning the 'through the tabernacle' phrase as an adverbial element awaiting the main verb in the following verse.
