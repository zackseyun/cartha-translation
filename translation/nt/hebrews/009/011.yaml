id: HEB.9.11
reference: Hebrews 9:11
source:
  edition: SBLGNT
  text: Χριστὸς δὲ παραγενόμενος ἀρχιερεὺς τῶν ⸀γενομένων ἀγαθῶν διὰ τῆς μείζονος καὶ τελειοτέρας σκηνῆς οὐ χειροποιήτου, τοῦτ’ ἔστιν οὐ ταύτης τῆς κτίσεως,
translation:
  text: But the Messiah came as high priest of the good things that are now here; and through the greater and more perfect tabernacle not made by hands—that is, not of this creation—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'of the good things to come.'
    reason: textual_variant
  - marker: b
    text: Or 'But when the Messiah appeared as high priest of the good things that have come, through the greater and more perfect tabernacle not made by hands—that is, not of this creation—'.
    reason: previous_rendering
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name in this context, in keeping with the doctrine guideline to translate Χριστός as 'Messiah' where title sense is active.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding discussion of the earthly tabernacle and priestly ministry; 'But' best signals the transition in natural English.
- source_word: παραγενόμενος
  chosen: appeared
  alternatives:
  - having come
  - having arrived
  - having come forward
  lexicon: BDAG
  rationale: Aorist middle participle indicating Christ's advent/presence in this priestly role. 'Appeared' is idiomatic and fits the salvation-historical contrast, while avoiding an overly wooden participial rendering.
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the cultic office in Hebrews.
- source_word: τῶν γενομένων ἀγαθῶν
  chosen: of the good things that have come
  alternatives:
  - of the good things to come
  - of the good things that have come into being
  lexicon: BDAG
  rationale: The SBLGNT reads γενομένων ('having come' / 'that have come'), not μελλόντων ('to come'). The translation follows the printed text rather than traditional English inertia. The phrase refers to realized eschatological blessings now present in Christ's ministry.
- source_word: διὰ τῆς ... σκηνῆς
  chosen: through the ... tabernacle
  alternatives:
  - through the ... tent
  - by means of the ... tabernacle
  lexicon: BDAG
  rationale: σκηνή in Hebrews evokes the tabernacle imagery of the wilderness sanctuary. 'Tabernacle' preserves the cultic and intertextual resonance better than the more generic 'tent'.
- source_word: μείζονος
  chosen: greater
  alternatives:
  - larger
  lexicon: BDAG
  rationale: Comparative adjective expressing superiority, not physical size alone; 'greater' captures qualitative exaltation.
- source_word: τελειοτέρας
  chosen: more perfect
  alternatives:
  - more complete
  - more fully accomplished
  lexicon: BDAG
  rationale: Hebrews uses τέλειος/τελειόω language with theological force related to perfection/completion. 'More perfect' preserves that thematic linkage.
- source_word: οὐ χειροποιήτου
  chosen: not made by hands
  alternatives:
  - not handmade
  - not made with hands
  lexicon: BDAG
  rationale: Established biblical idiom for what is not of human manufacture; preserves the contrast between earthly and heavenly sanctuary.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - that means
  - namely
  lexicon: BDAG
  rationale: Introduces the explanatory clarification that follows.
- source_word: οὐ ταύτης τῆς κτίσεως
  chosen: not of this creation
  alternatives:
  - not of this created order
  - not belonging to this creation
  lexicon: BDAG
  rationale: κτίσις here denotes the created order/world. 'Not of this creation' is concise and preserves the contrast between the heavenly sanctuary and the present created realm.
