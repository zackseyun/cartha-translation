id: HEB.9.12
reference: Hebrews 9:12
source:
  edition: SBLGNT
  text: οὐδὲ δι’ αἵματος τράγων καὶ μόσχων διὰ δὲ τοῦ ἰδίου αἵματος, εἰσῆλθεν ἐφάπαξ
    εἰς τὰ ἅγια, αἰωνίαν λύτρωσιν εὑράμενος.
translation:
  text: and not through the blood of goats and calves, but through his own blood,
    he entered once for all into the holy places, having obtained eternal redemption.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the sanctuary.' The Greek says 'into the holy places'; some translations
      render this more specifically as 'the Most Holy Place,' but that is more interpretive
      than the wording itself requires.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐδὲ
  chosen: and not
  alternatives:
  - nor
  - not
  lexicon: BDAG
  rationale: In context this continues the contrast from the previous verse, so 'and
    not' preserves the connective force better than a bare 'not' and reads naturally
    in English.
- source_word: δι’ αἵματος τράγων καὶ μόσχων
  chosen: through the blood of goats and calves
  alternatives:
  - with the blood of goats and calves
  - by the blood of goats and calves
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or instrumentality. 'Through'
    preserves the repeated prepositional contrast with the following phrase. μόσχων
    is more precisely 'calves' than the traditional 'young bulls' here.
- source_word: διὰ δὲ τοῦ ἰδίου αἵματος
  chosen: but through his own blood
  alternatives:
  - but by his own blood
  - but through the blood that was his own
  lexicon: BDAG
  rationale: The repeated διά is best mirrored by repeating 'through.' ἰδίου adds
    emphasis of possession, so 'his own blood' is the natural English equivalent.
- source_word: εἰσῆλθεν
  chosen: he entered
  alternatives:
  - he went in
  - he entered in
  lexicon: BDAG
  rationale: Aorist indicative narrates the completed act. 'He entered' is idiomatic
    and fits the sanctuary imagery.
- source_word: ἐφάπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: ἐφάπαξ in Hebrews carries the sense of a single, decisive, unrepeatable
    act. 'Once for all' is concise and preserves that force.
- source_word: εἰς τὰ ἅγια
  chosen: into the holy places
  alternatives:
  - into the sanctuary
  - into the Most Holy Place
  - into the holy place
  lexicon: BDAG
  rationale: The plural τὰ ἅγια is retained with 'holy places,' which reflects the
    Greek form and the tabernacle/temple cultic idiom. 'Sanctuary' is possible, but
    the more formal rendering better preserves the cultic texture. 'Most Holy Place'
    would over-specify what the Greek here does not explicitly state.
- source_word: αἰωνίαν λύτρωσιν
  chosen: eternal redemption
  alternatives:
  - everlasting redemption
  - redemption for the age
  lexicon: BDAG
  rationale: 'This is the standard and contextually fitting sense: a redemption whose
    efficacy endures permanently. ''Eternal redemption'' is both accurate and natural.'
- source_word: εὑράμενος
  chosen: having obtained
  alternatives:
  - having secured
  - having found
  lexicon: BDAG
  rationale: Although literally 'having found,' in this context the participle idiomatically
    conveys obtaining or securing. 'Having obtained' preserves the participial relation
    while avoiding misleading literalism.
