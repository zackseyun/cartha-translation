theological_decisions:
- issue: Referent and force of Christ's entry with his own blood
  chosen_reading: The verse is rendered to state that Messiah entered the heavenly
    holy places through his own blood, in contrast to animal blood, without importing
    a more detailed sacrificial mechanism than the Greek states.
  alternative_readings:
  - He entered carrying/presenting his blood in a literal spatial sense
  - He entered merely after shedding his blood, with διά taken loosely
  rationale: The repeated διά + genitive is best represented consistently as means/instrumentality
    ('through'). This preserves the typological contrast with Levitical sacrifices
    while not forcing a speculative account of how the blood is presented in the heavenly
    sanctuary.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Scope of τὰ ἅγια
  chosen_reading: Rendered 'the holy places' rather than 'the Most Holy Place.'
  alternative_readings:
  - the sanctuary
  - the Most Holy Place
  rationale: The Greek expression is plural and can function as a cultic designation
    for the sanctuary, but translating it as 'the Most Holy Place' would resolve an
    interpretive question too strongly. The chosen rendering preserves the wording
    and theological tension.
  doctrine_reference: Translation philosophy item 3
