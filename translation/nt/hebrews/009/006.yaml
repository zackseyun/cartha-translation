id: HEB.9.6
reference: Hebrews 9:6
source:
  edition: SBLGNT
  text: Τούτων δὲ οὕτως κατεσκευασμένων, εἰς μὲν τὴν πρώτην σκηνὴν διὰ παντὸς εἰσίασιν
    οἱ ἱερεῖς τὰς λατρείας ἐπιτελοῦντες,
translation:
  text: Now with these things prepared in this way, the priests continually enter
    the first tabernacle, carrying out the services,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the first tent" or "the first room." The Greek σκηνή can denote the
      tabernacle itself or, in this context, its first section.
    reason: lexical_alternative
  - marker: b
    text: Or "performing the acts of worship" or "performing the ritual duties."
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτων δὲ οὕτως κατεσκευασμένων
  chosen: Now with these things prepared in this way
  alternatives:
  - And when these things had been arranged like this
  - Now these things having been prepared thus
  lexicon: BDAG
  rationale: Genitive absolute introducing the circumstance for what follows. 'Prepared'
    captures κατεσκευασμένων without over-specifying 'constructed'; the context is
    the arrangement of the tabernacle furnishings just described. 'Now' renders δὲ
    as a mild transition.
- source_word: εἰς μὲν τὴν πρώτην σκηνὴν
  chosen: the first tabernacle
  alternatives:
  - the first tent
  - the first room
  lexicon: BDAG
  rationale: σκηνή in Hebrews 9 refers to the tabernacle structure and its compartments.
    'Tabernacle' preserves cultic specificity better than 'tent,' while 'first' reflects
    the first section/compartment. English smooths the preposition into the verb phrase
    'enter the first tabernacle.'
- source_word: διὰ παντὸς
  chosen: continually
  alternatives:
  - at all times
  - regularly
  lexicon: BDAG
  rationale: Idiomatic expression meaning continually or constantly in customary practice,
    not necessarily every moment. 'Continually' fits the ongoing priestly access being
    contrasted with the restricted access of the high priest in the next verse.
- source_word: εἰσίασιν
  chosen: enter
  alternatives:
  - go in
  - are entering
  lexicon: BDAG
  rationale: Present indicative describing customary repeated action. English simple
    present 'enter' communicates habitual practice naturally.
- source_word: οἱ ἱερεῖς
  chosen: the priests
  alternatives:
  - priests
  lexicon: BDAG
  rationale: Refers to the ordinary priests in contrast to the high priest in v. 7.
    The article is naturally retained in English.
- source_word: τὰς λατρείας
  chosen: the services
  alternatives:
  - the acts of worship
  - the ritual duties
  lexicon: BDAG
  rationale: Plural λατρείας refers to the cultic services/ministrations performed
    in the sanctuary. 'Services' is readable modern English and preserves the ritual
    sense without importing later church-service connotations too strongly.
- source_word: ἐπιτελοῦντες
  chosen: carrying out
  alternatives:
  - performing
  - completing
  lexicon: BDAG
  rationale: Participle modifying 'the priests,' expressing what they do upon entering.
    'Carrying out' pairs naturally with 'services' and reflects the sense of performing
    prescribed duties.
