theological_decisions:
- issue: Rendering σκηνή in a sanctuary context
  chosen_reading: tabernacle
  alternative_readings:
  - tent
  - room
  rationale: Hebrews 9 is expounding the Mosaic sanctuary and its compartments. 'Tabernacle'
    preserves the Old Testament cultic setting and avoids flattening the reference
    to a generic tent or merely architectural room.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of διὰ παντὸς in priestly ministry
  chosen_reading: continually
  alternative_readings:
  - always
  - regularly
  rationale: The verse contrasts ordinary priests' ongoing access to the first section
    with the high priest's limited annual access to the second. 'Continually' preserves
    that theological contrast without implying uninterrupted physical presence.
  doctrine_reference: Translation philosophy §3
