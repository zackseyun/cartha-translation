id: HEB.9.28
reference: Hebrews 9:28
source:
  edition: SBLGNT
  text: οὕτως καὶ ὁ Χριστός, ἅπαξ προσενεχθεὶς εἰς τὸ πολλῶν ἀνενεγκεῖν ἁμαρτίας,
    ἐκ δευτέρου χωρὶς ἁμαρτίας ὀφθήσεται τοῖς αὐτὸν ἀπεκδεχομένοις εἰς σωτηρίαν.
translation:
  text: so also the Messiah, having been offered once to bear the sins of many, will
    appear a second time, apart from sin, to those who eagerly await him, for salvation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without reference to sin,' that is, not to bear sin as in his first
      offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ
  chosen: so also
  alternatives:
  - thus also
  - in the same way also
  lexicon: BDAG
  rationale: Marks the comparison with the preceding analogy in v. 27; 'so also' is
    natural English while preserving the inferential/comparative force.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as the title 'Messiah' where
    title sense is active. Here it functions as a christological title in a salvation-historical
    argument, not merely as a name-like label.
- source_word: ἅπαξ
  chosen: once
  alternatives:
  - once for all
  lexicon: BDAG
  rationale: ἅπαξ directly means 'once.' Although 'once for all' captures a common
    theological implication in Hebrews, the additional 'for all' is not explicit in
    this word here and would over-translate.
- source_word: προσενεχθεὶς
  chosen: having been offered
  alternatives:
  - being offered
  - having offered himself
  lexicon: BDAG
  rationale: Aorist passive participle; 'having been offered' preserves the passive
    form and temporal relation to the future main verb. 'Having offered himself' imports
    reflexive language not explicit in this clause.
- source_word: εἰς τὸ πολλῶν ἀνενεγκεῖν ἁμαρτίας
  chosen: to bear the sins of many
  alternatives:
  - to take up the sins of many
  - to offer up the sins of many
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose/result. ἀναφέρω in
    sacrificial contexts can mean 'bear' sins, echoing Isaianic and cultic language.
    'Bear the sins' best preserves both sacrificial and substitutionary resonance
    without over-explaining.
- source_word: πολλῶν
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: A straightforward genitive plural. 'Many' preserves the wording and its
    likely allusion to Isaiah 53; expanding to 'many people' is unnecessary.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - for the second time
  - again
  lexicon: BDAG
  rationale: Idiomatic expression for a second occurrence. 'A second time' is clear
    and preserves the eschatological contrast with the first appearing.
- source_word: χωρὶς ἁμαρτίας
  chosen: apart from sin
  alternatives:
  - without reference to sin
  - not to deal with sin
  lexicon: BDAG
  rationale: Literally 'apart from sin.' In context it means his second appearing
    is not for sin-bearing as the first was. The more interpretive alternatives capture
    the sense but move beyond the Greek's concise phrasing, so they are preserved
    in a footnote.
- source_word: ὀφθήσεται
  chosen: will appear
  alternatives:
  - will be seen
  - will be revealed
  lexicon: BDAG
  rationale: Future passive of ὁράω often functions in appearance language. 'Will
    appear' is idiomatic and fits eschatological usage better than the wooden 'will
    be seen.'
- source_word: τοῖς αὐτὸν ἀπεκδεχομένοις
  chosen: to those who eagerly await him
  alternatives:
  - to those waiting for him
  - to those expecting him
  lexicon: BDAG
  rationale: ἀπεκδέχομαι conveys eager, expectant waiting. 'Eagerly await' preserves
    the intensified expectancy better than simple 'wait.'
- source_word: εἰς σωτηρίαν
  chosen: for salvation
  alternatives:
  - unto salvation
  - bringing salvation
  lexicon: BDAG
  rationale: εἰς with accusative here expresses goal/purpose. 'For salvation' is concise
    and natural; 'bringing salvation' is interpretive though contextually sound.
