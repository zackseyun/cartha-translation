theological_decisions:
- issue: Meaning of 'apart from sin' in the second appearing
  chosen_reading: Rendered literally as 'apart from sin' in the main text, referring
    to Christ's second appearance as no longer related to sin-bearing in the way his
    first offering was.
  alternative_readings:
  - without reference to sin
  - not to deal with sin
  rationale: The phrase is theologically significant and has been interpreted in explanatory
    ways. To preserve the text's wording and tension, the main text stays close to
    the Greek while a footnote preserves the more explicit interpretive alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
