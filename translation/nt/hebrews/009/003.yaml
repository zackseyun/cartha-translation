theological_decisions:
- issue: Rendering the sanctuary term Ἅγια Ἁγίων
  chosen_reading: the Most Holy Place
  alternative_readings:
  - Holy of Holies
  rationale: This is not a doctrinally disputed term but a significant cultic expression.
    The chosen rendering favors accessible modern English while preserving the referent
    to the innermost sanctuary. The traditional expression is retained in a footnote
    for transparency and continuity with English Bible tradition.
  doctrine_reference: Translation philosophy §§1, 6
