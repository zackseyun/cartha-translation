id: HEB.9.3
reference: Hebrews 9:3
source:
  edition: SBLGNT
  text: μετὰ δὲ τὸ δεύτερον καταπέτασμα σκηνὴ ἡ λεγομένη ⸂Ἅγια Ἁγίων⸃,
translation:
  text: And behind the second curtain was a tabernacle called the Most Holy Place,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the Holy of Holies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ... τὸ δεύτερον καταπέτασμα
  chosen: behind the second curtain
  alternatives:
  - after the second curtain
  - beyond the second veil
  lexicon: BDAG
  rationale: μετά with the accusative can denote spatial relation here in the sanctuary
    description, best rendered idiomatically as 'behind' or 'beyond' rather than temporal
    'after.' καταπέτασμα refers to the inner veil/curtain separating the holy places;
    'curtain' is clear modern English, while 'veil' remains a viable alternative.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ is a mild connective advancing the description. 'And' fits the flow
    in English without overstating contrast.
- source_word: σκηνὴ
  chosen: tabernacle
  alternatives:
  - tent
  - room
  lexicon: BDAG
  rationale: σκηνή in Hebrews 9 refers to the tabernacle structure and its compartments.
    'Tabernacle' preserves the cultic setting better than the more generic 'tent'
    or interpretive 'room,' even though the immediate referent is a compartment within
    it.
- source_word: ἡ λεγομένη
  chosen: called
  alternatives:
  - which is called
  - named
  lexicon: BDAG
  rationale: The participial phrase functions attributively and is naturally rendered
    in English as 'called.'
- source_word: Ἅγια Ἁγίων
  chosen: the Most Holy Place
  alternatives:
  - Holy of Holies
  - the Holiest Place
  lexicon: BDAG
  rationale: The genitival superlative idiom literally means 'Holy of Holies.' 'Most
    Holy Place' communicates the sense in readable modern English while preserving
    the sanctuary reference. Because 'Holy of Holies' is a well-known traditional
    rendering, it is preserved in a footnote.
