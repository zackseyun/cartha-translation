id: HEB.9.26
reference: Hebrews 9:26
source:
  edition: SBLGNT
  text: ἐπεὶ ἔδει αὐτὸν πολλάκις παθεῖν ἀπὸ καταβολῆς κόσμου· ⸀νυνὶ δὲ ἅπαξ ἐπὶ συντελείᾳ
    τῶν αἰώνων εἰς ἀθέτησιν ⸀ἁμαρτίας διὰ τῆς θυσίας αὐτοῦ πεφανέρωται.
translation:
  text: Otherwise, he would have had to suffer many times since the foundation of
    the world. But as it is, he has appeared once for all at the consummation of the
    ages to put away sin through the sacrifice of himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the end of the ages.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the removal of sin' or 'for the annulment of sin.'
    reason: lexical_alternative
  - marker: c
    text: Or 'through his sacrifice.' The Greek more literally reads 'through the
      sacrifice of himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  chosen: Otherwise
  alternatives:
  - since
  - for then
  lexicon: BDAG
  rationale: In context, ἐπεί introduces the consequence that would follow if Christ
    were offering himself repeatedly. 'Otherwise' best captures the inferential force
    in natural English.
- source_word: ἔδει
  chosen: would have had to
  alternatives:
  - it was necessary for him to
  - he had to
  lexicon: BDAG
  rationale: The imperfect of δεῖ in this conditional-like argument points to a hypothetical
    necessity in past time. 'Would have had to' conveys that nuance more clearly than
    a simple past.
- source_word: πολλάκις
  chosen: many times
  alternatives:
  - often
  - repeatedly
  lexicon: BDAG
  rationale: The adverb contrasts with ἅπαξ later in the verse. 'Many times' preserves
    the numerical/repetitive contrast cleanly.
- source_word: παθεῖν
  chosen: to suffer
  alternatives:
  - to undergo suffering
  lexicon: BDAG
  rationale: πάσχω here refers to Christ's suffering in connection with sacrificial
    death. 'To suffer' is the standard and sufficiently weighty rendering.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: since the foundation of the world
  alternatives:
  - from the foundation of the world
  lexicon: BDAG
  rationale: This idiom denotes the time extending from the world's founding onward.
    'Since' communicates the temporal sense idiomatically in English.
- source_word: νυνὶ δὲ
  chosen: But as it is
  alternatives:
  - but now
  - but in fact now
  lexicon: BDAG
  rationale: The phrase marks a strong contrast between the hypothetical scenario
    and the actual state of affairs. 'But as it is' captures that argumentative contrast
    naturally.
- source_word: ἅπαξ
  chosen: once for all
  alternatives:
  - once
  - once and for all
  lexicon: BDAG
  rationale: In Hebrews, ἅπαξ in sacrificial contexts carries not merely singularity
    but decisive non-repeatability. 'Once for all' expresses that force in established
    but still clear English.
- source_word: ἐπὶ συντελείᾳ τῶν αἰώνων
  chosen: at the consummation of the ages
  alternatives:
  - at the end of the ages
  - at the completion of the ages
  lexicon: BDAG
  rationale: συντέλεια denotes culmination or consummation, and αἰῶνες here is plural.
    'Consummation of the ages' preserves the eschatological weight without flattening
    it to a merely chronological 'end of the world.'
- source_word: εἰς ἀθέτησιν ἁμαρτίας
  chosen: to put away sin
  alternatives:
  - for the removal of sin
  - for the annulment of sin
  lexicon: BDAG
  rationale: ἀθέτησις carries the sense of setting aside, nullifying, or abolishing.
    'To put away sin' is idiomatic, faithful to the sacrificial context, and avoids
    overly technical wording while preserving the decisive effect.
- source_word: ἁμαρτίας
  chosen: sin
  alternatives:
  - sins
  lexicon: BDAG
  rationale: The singular in Greek is best preserved as a collective/abstract singular
    in English, referring to sin as the reality dealt with by Christ's sacrifice,
    not merely individual acts.
- source_word: διὰ τῆς θυσίας αὐτοῦ
  chosen: through the sacrifice of himself
  alternatives:
  - through his sacrifice
  - by his sacrifice
  lexicon: BDAG
  rationale: 'The genitive αὐτοῦ can be rendered more explicitly here as objective/self-referential:
    the sacrifice consisting in himself. ''The sacrifice of himself'' makes the reflexive
    sense clear and aligns with the immediate context of Christ''s self-offering.'
- source_word: πεφανέρωται
  chosen: he has appeared
  alternatives:
  - he has been manifested
  - he has been revealed
  lexicon: BDAG
  rationale: The perfect tense indicates a completed manifestation with abiding significance.
    'He has appeared' is natural English and fits the incarnational/salvific context
    of Hebrews.
