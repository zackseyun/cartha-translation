theological_decisions:
- issue: Force of ἅπαξ in Christ's sacrificial work
  chosen_reading: Rendered as 'once for all' to express the definitive, non-repeatable
    character of Christ's offering.
  alternative_readings:
  - once
  rationale: The immediate contrast with πολλάκις ('many times') and the argument
    of Hebrews 9 favor an emphatic rendering that preserves the finality of Christ's
    sacrifice without adding doctrine beyond the text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Scope of ἁμαρτίας as singular
  chosen_reading: Rendered as singular 'sin' rather than plural 'sins.'
  alternative_readings:
  - sins
  rationale: The Greek singular likely presents sin as the power/reality being set
    aside, not merely a list of acts. This preserves the text's theological breadth
    without excluding forgiveness of individual sins.
  doctrine_reference: Translation philosophy §1, §5
