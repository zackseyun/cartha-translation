id: HEB.9.10
reference: Hebrews 9:10
source:
  edition: SBLGNT
  text: μόνον ἐπὶ βρώμασιν καὶ πόμασιν καὶ διαφόροις βαπτισμοῖς, ⸀δικαιώματα σαρκὸς
    μέχρι καιροῦ διορθώσεως ἐπικείμενα.
translation:
  text: concerned only with foods and drinks and various washings, fleshly regulations
    imposed until the time of reformation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'various baptisms'; the Greek term can be rendered more literally that
      way, but here it refers to ritual washings in the old covenant system.
    reason: lexical_alternative
  - marker: b
    text: Or 'until the time of setting things right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνον
  chosen: only
  alternatives:
  - merely
  - solely
  lexicon: BDAG
  rationale: Adverb limiting the scope of the preceding cultic provisions; 'only'
    is natural and preserves the restrictive force.
- source_word: ἐπὶ
  chosen: concerned with
  alternatives:
  - for
  - about
  - with respect to
  lexicon: BDAG
  rationale: In this elliptical construction, ἐπὶ with the dative indicates the sphere
    or matter to which the regulations pertain. 'Concerned with' makes the syntax
    intelligible in English while preserving the sense.
- source_word: βρώμασιν
  chosen: foods
  alternatives:
  - foods
  - meats
  lexicon: BDAG
  rationale: Plural dative of βρῶμα refers broadly to things eaten. 'Foods' is modern
    and avoids the misleading older English 'meats,' which can sound narrower than
    the Greek.
- source_word: πόμασιν
  chosen: drinks
  alternatives:
  - beverages
  lexicon: BDAG
  rationale: Straightforward plural noun paired with 'foods'; 'drinks' is the most
    natural equivalent.
- source_word: διαφόροις βαπτισμοῖς
  chosen: various washings
  alternatives:
  - various ritual washings
  - various baptisms
  lexicon: BDAG
  rationale: βαπτισμοῖς here refers to ceremonial washings in the old covenant cultic
    system, not specifically Christian baptism. 'Various washings' best fits the context
    of external regulations; the more literal 'baptisms' is preserved in a footnote
    because the Greek term is the same lexical family.
- source_word: δικαιώματα
  chosen: regulations
  alternatives:
  - ordinances
  - requirements
  lexicon: BDAG
  rationale: In this context the word denotes prescribed ritual requirements. 'Regulations'
    is clear modern English and fits the cultic/legal setting.
- source_word: σαρκὸς
  chosen: fleshly
  alternatives:
  - of the flesh
  - bodily
  - external
  lexicon: BDAG
  rationale: Given the contrast in Hebrews between external ritual matters and inward
    cleansing, σαρκὸς here refers to what pertains to the flesh/body rather than to
    'sinful nature.' 'Fleshly regulations' preserves the lexical link to σάρξ while
    communicating their outward, bodily character.
- source_word: μέχρι καιροῦ διορθώσεως
  chosen: until the time of reformation
  alternatives:
  - until the time of setting things right
  - until the time of correction
  - until the time of the new order
  lexicon: BDAG
  rationale: καιρός denotes an appointed time, and διόρθωσις denotes a setting right,
    reform, or rectification. 'Time of reformation' is concise and preserves the eschatological-historical
    sense without overinterpreting the referent.
- source_word: ἐπικείμενα
  chosen: imposed
  alternatives:
  - laid upon
  - resting upon
  - applying
  lexicon: BDAG
  rationale: The participle describes these regulations as lying upon or being imposed
    on the worshipers until the appointed time. 'Imposed' captures the burdensome,
    externally binding sense in idiomatic English.
