theological_decisions:
- issue: Meaning of σάρξ in σαρκὸς
  chosen_reading: refers to outward/bodily matters, not the sinful nature
  alternative_readings:
  - sinful nature
  rationale: The verse catalogs food, drink, and washings—external cultic practices.
    In this context σάρξ denotes the bodily/external sphere. This follows the doctrine
    guideline that σάρξ may mean 'flesh' literally or 'sinful nature' metaphorically
    depending on context; here the literal/external sense is required.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: Referent of διορθώσεως
  chosen_reading: a historical-redemptive 'reformation' or setting-right associated
    with the new covenant order
  alternative_readings:
  - general correction
  - moral reform
  rationale: The context in Hebrews 9 contrasts old covenant ritual arrangements with
    the superior priestly work of Christ. 'Reformation' preserves that covenantal
    transition without importing a later technical historical meaning.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
