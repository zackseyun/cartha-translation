theological_decisions:
- issue: Rendering Ἅγια in relation to tabernacle compartments
  chosen_reading: the Holy Place
  alternative_readings:
  - the Holy Places
  - the sanctuary
  rationale: The plural form can be rendered more literally, but the immediate context
    distinguishes the first room from the inner room. Translating as 'the Holy Place'
    preserves the author's spatial contrast without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5
