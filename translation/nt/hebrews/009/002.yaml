id: HEB.9.2
reference: Hebrews 9:2
source:
  edition: SBLGNT
  text: σκηνὴ γὰρ κατεσκευάσθη ἡ πρώτη ἐν ᾗ ἥ τε λυχνία καὶ ἡ τράπεζα καὶ ἡ πρόθεσις
    τῶν ἄρτων, ἥτις λέγεται Ἅγια·
translation:
  text: For a first tabernacle was prepared, in which were the lampstand and the table
    and the presentation of the bread, which is called the Holy Place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bread of the Presence'; traditionally 'the showbread.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Holy Places,' here referring to the first room of the tabernacle,
      that is, the Holy Place.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκηνὴ
  chosen: tabernacle
  alternatives:
  - tent
  - sanctuary
  lexicon: BDAG
  rationale: In Hebrews 9 the term refers to the wilderness sanctuary structure and
    its compartments, not merely a generic tent. 'Tabernacle' preserves the cultic
    and intertextual connection to the Mosaic sanctuary better than 'tent,' while
    remaining standard English.
- source_word: κατεσκευάσθη
  chosen: was prepared
  alternatives:
  - was constructed
  - was set up
  - was furnished
  lexicon: BDAG
  rationale: The passive indicates that the first tabernacle came into prepared existence.
    'Was prepared' fits the immediate context of arranging sacred space and its furnishings;
    'was constructed' is possible but sounds narrower and more architectural than
    the verse's focus.
- source_word: ἡ πρώτη
  chosen: a first
  alternatives:
  - the first
  - the first section
  lexicon: BDAG
  rationale: Although literally 'the first,' English idiom here works better with
    'a first' because the author is introducing the first compartment of the tabernacle.
    This avoids awkwardness while preserving the contrast with the second section
    in the following verse.
- source_word: ἐν ᾗ
  chosen: in which were
  alternatives:
  - in which was
  lexicon: BDAG
  rationale: The relative clause governs a list of multiple items, so idiomatic English
    uses plural 'were' even though the Greek relative pronoun is singular, referring
    to the singular antecedent 'tabernacle/section'.
- source_word: λυχνία
  chosen: lampstand
  alternatives:
  - candlestick
  - lamp
  lexicon: BDAG
  rationale: The cultic furnishing in the tabernacle is best rendered 'lampstand.'
    'Candlestick' is traditional but potentially misleading, suggesting candles rather
    than oil lamps.
- source_word: τράπεζα
  chosen: table
  lexicon: BDAG
  rationale: A straightforward rendering for the sacred table in the holy place.
- source_word: ἡ πρόθεσις τῶν ἄρτων
  chosen: the presentation of the bread
  alternatives:
  - the bread of the Presence
  - the setting out of the bread
  - the showbread
  lexicon: BDAG
  rationale: The Greek phrase is literally 'the setting forth/presentation of the
    breads.' Rendering it as 'the presentation of the bread' stays close to the Greek
    expression rather than importing the more interpretive traditional label 'showbread.'
    Because 'bread of the Presence' is a familiar OT equivalent, it is preserved in
    a footnote.
- source_word: ἥτις λέγεται
  chosen: which is called
  alternatives:
  - which is named
  lexicon: BDAG
  rationale: Standard rendering of the identifying relative clause.
- source_word: Ἅγια
  chosen: the Holy Place
  alternatives:
  - the Holy Places
  - the sanctuary
  lexicon: BDAG
  rationale: Although the Greek form is plural, in this context it designates the
    first compartment of the tabernacle, conventionally 'the Holy Place,' in contrast
    to the 'Holy of Holies' in the next verse. This is a context-driven singular rendering
    for clarity.
