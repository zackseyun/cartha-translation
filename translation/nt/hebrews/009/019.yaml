id: HEB.9.19
reference: Hebrews 9:19
source:
  edition: SBLGNT
  text: λαληθείσης γὰρ πάσης ἐντολῆς κατὰ ⸀τὸν νόμον ὑπὸ Μωϋσέως παντὶ τῷ λαῷ, λαβὼν
    τὸ αἷμα τῶν ⸀μόσχων μετὰ ὕδατος καὶ ἐρίου κοκκίνου καὶ ὑσσώπου αὐτό τε τὸ βιβλίον
    καὶ πάντα τὸν λαὸν ἐράντισεν,
translation:
  text: For when every commandment according to the law had been spoken by Moses to
    all the people, he took the blood of the calves with water and scarlet wool and
    hyssop, and sprinkled both the scroll itself and all the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “young bulls.” The Greek μόσχων can refer to calves or young bulls in
      sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαληθείσης ... πάσης ἐντολῆς
  chosen: when every commandment ... had been spoken
  alternatives:
  - after every commandment ... was spoken
  - when every command had been declared
  lexicon: BDAG
  rationale: The genitive absolute is best rendered temporally in English. ἐντολή
    here refers to individual commandments/instructions rather than the law as an
    abstract whole, so 'every commandment' preserves the distributive force of πάσης.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  - as required by the law
  lexicon: BDAG
  rationale: A straightforward rendering of κατά with the accusative indicating conformity/accord.
    'According to the law' is idiomatic and sufficiently formal.
- source_word: ὑπὸ Μωϋσέως
  chosen: by Moses
  lexicon: BDAG
  rationale: Standard agentive use of ὑπό with the genitive.
- source_word: παντὶ τῷ λαῷ
  chosen: to all the people
  alternatives:
  - to the whole people
  lexicon: BDAG
  rationale: παντί with the dative conveys totality of the audience. 'All the people'
    is natural English and preserves the comprehensiveness.
- source_word: λαβὼν
  chosen: he took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered as a finite verb in English
    narrative sequence for readability, while preserving the action sequence.
- source_word: τὸ αἷμα τῶν μόσχων
  chosen: the blood of the calves
  alternatives:
  - the blood of the young bulls
  lexicon: BDAG
  rationale: μόσχος can denote calf/young bull. Given the plural and sacrificial context,
    either is possible; 'calves' is the more direct lexical equivalent and matches
    the likely allusion to Exodus 24 in many English traditions. The alternative is
    preserved in a footnote because 'young bulls' is also defensible in sacrificial
    context.
- source_word: μετὰ ὕδατος καὶ ἐρίου κοκκίνου καὶ ὑσσώπου
  chosen: with water and scarlet wool and hyssop
  alternatives:
  - with water and crimson wool and hyssop
  - with water, scarlet wool, and hyssop
  lexicon: BDAG
  rationale: μετά with the genitive indicates accompaniment/instrumental association.
    ἔριον is 'wool'; κοκκίνου denotes scarlet/crimson color. 'Scarlet wool' is clear
    modern English and preserves the cultic imagery.
- source_word: αὐτό τε τὸ βιβλίον
  chosen: both the scroll itself
  alternatives:
  - the book itself also
  - the scroll itself too
  lexicon: BDAG
  rationale: βιβλίον in this context refers to the written covenant document; 'scroll'
    better reflects the ancient physical form than the anachronistic 'book.' τε coordinates
    with the following καί, yielding 'both ... and ...'. αὐτό adds emphasis, hence
    'itself'.
- source_word: πάντα τὸν λαὸν
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: BDAG
  rationale: Accusative object of ἐράντισεν; the phrase is rendered consistently with
    the earlier dative phrase.
- source_word: ἐράντισεν
  chosen: sprinkled
  alternatives:
  - aspersed
  lexicon: BDAG
  rationale: ῥαντίζω is the standard verb for ritual sprinkling. 'Sprinkled' is accurate
    and accessible; 'aspersed' is too technical for the stated translation philosophy.
