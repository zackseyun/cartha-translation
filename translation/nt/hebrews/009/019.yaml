theological_decisions:
- issue: Relation of this verse to the Exodus 24 narrative and the wording 'blood
    of the calves'
  chosen_reading: Translate the Greek as written without harmonizing to the OT source
    beyond what the text states.
  alternative_readings:
  - Render more interpretively as 'young bulls' to align with sacrificial terminology
  - Expand wording to explain the ritual background
  rationale: Hebrews' wording should stand on its own. The translation should not
    import explanatory detail from Exodus or smooth over the author's compressed retelling.
    A footnote can preserve the lexical alternative without altering the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
