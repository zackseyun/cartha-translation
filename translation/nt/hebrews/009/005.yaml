theological_decisions:
- issue: Rendering of ἱλαστήριον in a sanctuary-furnishings context
  chosen_reading: atoning sacrifice
  alternative_readings:
  - mercy seat
  - propitiation
  rationale: The doctrine excerpt specifies 'atoning sacrifice' as the default rendering
    for ἱλαστήριον, with alternatives preserved in a footnote. Because Hebrews 9:5
    refers concretely to the lid of the ark, 'mercy seat' is contextually strong and
    should be preserved for readers, but the mandated default remains in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἱλαστήριον → atoning sacrifice;
    alternatives footnoted'
