theological_decisions:
- issue: Rendering διαθήκη in a covenant-ratification context
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: The verse echoes Exodus 24:8 and refers to the Mosaic covenant being
    inaugurated by blood. 'Testament' would import a later legal sense that does not
    fit the immediate OT background.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    consistency of key terms'
- issue: Supplying the implied copula after Τοῦτο
  chosen_reading: This is the blood of the covenant
  alternative_readings:
  - This, the blood of the covenant
  rationale: English requires an explicit verb for a clear quotation. Adding 'is'
    is grammatically necessary and does not add theological content beyond the Greek's
    implied predication.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence'
