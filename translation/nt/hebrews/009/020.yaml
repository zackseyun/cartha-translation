id: HEB.9.20
reference: Hebrews 9:20
source:
  edition: SBLGNT
  text: λέγων· Τοῦτο τὸ αἷμα τῆς διαθήκης ἧς ἐνετείλατο πρὸς ὑμᾶς ὁ θεός·
translation:
  text: saying, “This is the blood of the covenant that God commanded for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less naturally in English, “This [is] the blood of the covenant which
      God commanded to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - saying that
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the quotation; 'saying' preserves the
    participial linkage to the previous clause without unnecessarily smoothing it
    into a finite verb.
- source_word: Τοῦτο
  chosen: This is
  alternatives:
  - This
  - This means
  lexicon: BDAG
  rationale: The Greek has no explicit copula, but idiomatic English requires it before
    the predicate nominative phrase 'the blood.' 'This is' is the natural and minimally
    interpretive rendering.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Direct lexical equivalent; in context it refers to sacrificial blood
    used in covenant ratification, but the concrete term should remain 'blood' rather
    than be paraphrased.
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  lexicon: BDAG
  rationale: In this Mosaic allusion the sense is covenantal, not a last will. 'Covenant'
    best reflects both the Greek usage here and the Exodus background.
- source_word: ἧς
  chosen: that
  alternatives:
  - which
  - of which
  lexicon: BDAG
  rationale: The genitive relative pronoun links back to 'covenant.' English idiom
    is clearer with 'that God commanded for you' rather than a more wooden 'of which.'
- source_word: ἐνετείλατο
  chosen: commanded
  alternatives:
  - ordained
  - enjoined
  lexicon: BDAG
  rationale: Middle form of ἐντέλλομαι means to command or give instructions. 'Commanded'
    is the most straightforward and readable rendering.
- source_word: πρὸς ὑμᾶς
  chosen: for you
  alternatives:
  - to you
  - concerning you
  lexicon: BDAG
  rationale: Although πρός with accusative often means 'to,' in this covenantal context
    'for you' better conveys that the command was directed with reference to the people.
    It also aligns naturally with the Exodus allusion while remaining faithful to
    the Greek.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός with the article; no special title nuance
    requires expansion.
