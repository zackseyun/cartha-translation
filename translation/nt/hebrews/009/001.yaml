theological_decisions:
- issue: Implicit referent of ἡ πρώτη
  chosen_reading: the first covenant
  alternative_readings:
  - the first tabernacle
  - the first arrangement
  rationale: The immediate context in Hebrews 8 contrasts the first and new covenant,
    making 'covenant' the most likely implied noun. This avoids importing a tabernacle
    referent before the author explicitly introduces the tent in the next verse, while
    still supplying the ellipsis required for intelligible English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of κοσμικόν
  chosen_reading: earthly
  alternative_readings:
  - worldly
  rationale: The verse contrasts the old covenant sanctuary with the heavenly, not
    with moral spirituality versus worldliness. Rendering it 'earthly' preserves the
    theological contrast without suggesting moral corruption.
  doctrine_reference: Translation philosophy §1, §6
