id: HEB.9.1
reference: Hebrews 9:1
source:
  edition: SBLGNT
  text: Εἶχε μὲν ⸀οὖν ἡ πρώτη δικαιώματα λατρείας τό τε ἅγιον κοσμικόν.
translation:
  text: Now even the first covenant had regulations for worship and an earthly sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first'—that is, the first covenant; some understand the phrase more
      generally as 'the first arrangement.'
    reason: alternative_reading
  - marker: b
    text: Or 'a worldly sanctuary'; here the sense is likely 'earthly,' in contrast
      to the heavenly realities discussed later in the chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶχε
  chosen: had
  alternatives:
  - possessed
  lexicon: BDAG
  rationale: Imperfect of ἔχω here introduces the description of the former arrangement;
    'had' is natural English and preserves the simple possessive sense.
- source_word: μὲν οὖν
  chosen: Now even
  alternatives:
  - Now indeed
  - So then indeed
  lexicon: BDAG
  rationale: The combination marks a transitional, mildly emphatic continuation from
    the previous argument. 'Now even' captures both discourse movement and the concessive/emphatic
    force without sounding wooden.
- source_word: ἡ πρώτη
  chosen: the first covenant
  alternatives:
  - the first
  - the first tabernacle
  lexicon: BDAG
  rationale: Although 'covenant' is not repeated explicitly in Greek, the feminine
    substantive 'the first' refers back to the first covenant in the immediately preceding
    context (8:13). Supplying 'covenant' is necessary for clear English and best matches
    the discourse referent; 'tabernacle' would anticipate later discussion rather
    than reflect the nearest antecedent.
- source_word: δικαιώματα
  chosen: regulations
  alternatives:
  - ordinances
  - requirements
  - prescriptions
  lexicon: BDAG
  rationale: In this cultic context δικαιώματα refers to prescribed rules or ordinances
    governing worship. 'Regulations' is clear modern English and fits the legal-cultic
    sense.
- source_word: λατρείας
  chosen: for worship
  alternatives:
  - of worship
  - for service
  lexicon: BDAG
  rationale: The genitive specifies the sphere or purpose of the regulations. 'For
    worship' communicates the cultic sense of λατρεία more idiomatically than the
    more literal but less natural 'of worship.'
- source_word: τό τε ἅγιον
  chosen: sanctuary
  alternatives:
  - holy place
  - holy sanctuary
  lexicon: BDAG
  rationale: The phrase denotes the sacred place associated with the first covenant's
    worship. 'Sanctuary' is idiomatic and broad enough here, since the following verses
    unpack its parts; 'holy place' could sound overly specific to one chamber.
- source_word: κοσμικόν
  chosen: earthly
  alternatives:
  - worldly
  - of this world
  lexicon: BDAG
  rationale: Here κοσμικός contrasts the old covenant sanctuary with the heavenly
    realities discussed later in the chapter. 'Earthly' conveys location and order
    without the misleading moral connotations of 'worldly' in modern English.
