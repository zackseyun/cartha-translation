theological_decisions:
- issue: Whether to render τὰ μὴ σαλευόμενα interpretively as 'the things that cannot
    be shaken' or more literally as 'the things not being shaken'
  chosen_reading: the things not being shaken
  alternative_readings:
  - the things that cannot be shaken
  - what is unshakable
  rationale: 'The immediate Greek contrasts present participles: ''the things being
    shaken'' versus ''the things not being shaken.'' Rendering the latter more literally
    preserves the textual tension and avoids harmonizing too quickly with the explicit
    ''unshakable kingdom'' language in the following verse. The theological point
    remains that what belongs to God''s enduring order remains after the removal of
    created, shakable things.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
