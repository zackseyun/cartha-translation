id: HEB.12.27
reference: Hebrews 12:27
source:
  edition: SBLGNT
  text: τὸ δὲ Ἔτι ἅπαξ δηλοῖ ⸂τῶν σαλευομένων⸃ μετάθεσιν ὡς πεποιημένων, ἵνα μείνῃ
    τὰ μὴ σαλευόμενα.
translation:
  text: Now this phrase, “Yet once more,” indicates the removal of the things being
    shaken—as things that have been made—so that the things not being shaken may remain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as created things.” The Greek literally says “as things that have been
      made.”
    reason: lexical_alternative
  - marker: b
    text: Or “the things that cannot be shaken” / “what is unshakable.”
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ δὲ Ἔτι ἅπαξ
  chosen: Now this phrase, “Yet once more,”
  alternatives:
  - And this, “Yet once more,”
  - But the words, “Yet once more,”
  lexicon: BDAG
  rationale: The neuter article τὸ substantivizes the quoted expression, referring
    to the phrase itself. δέ is mildly connective; 'Now' fits the explanatory transition
    in English. ἔτι ἅπαξ is best represented as the quotation 'Yet once more,' echoing
    the prior citation and signaling that the author is interpreting those words.
- source_word: δηλοῖ
  chosen: indicates
  alternatives:
  - signifies
  - makes clear
  - shows
  lexicon: BDAG
  rationale: δηλόω here introduces an inference from the quoted phrase. 'Indicates'
    is clear modern English and preserves the explanatory force without sounding overly
    technical.
- source_word: τῶν σαλευομένων
  chosen: of the things being shaken
  alternatives:
  - of the things that are shaken
  - of what is being shaken
  lexicon: BDAG
  rationale: The present passive participle suggests ongoing or characteristic shakability
    rather than a simple past event. 'The things being shaken' preserves the participial
    force and the contrast with what cannot be shaken.
- source_word: μετάθεσιν
  chosen: the removal
  alternatives:
  - the change
  - the displacement
  lexicon: BDAG
  rationale: In context, μετάθεσις refers to the taking away of created, shakable
    realities in eschatological judgment, not merely alteration. 'Removal' best fits
    the argument and common English usage.
- source_word: ὡς πεποιημένων
  chosen: as things that have been made
  alternatives:
  - as created things
  - as things made
  lexicon: BDAG
  rationale: πεζοιημένων is a perfect passive participle from ποιέω, pointing to things
    as belonging to the category of what has been made/created. 'As things that have
    been made' preserves the explanatory ὡς and the perfect aspect better than the
    compressed 'as created things,' though the latter is a valid interpretive alternative.
- source_word: ἵνα μείνῃ
  chosen: so that ... may remain
  alternatives:
  - in order that ... may remain
  - so that ... might remain
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose/result. 'So that ...
    may remain' is natural English and preserves the intended outcome of the removal.
- source_word: τὰ μὴ σαλευόμενα
  chosen: the things not being shaken
  alternatives:
  - the things that cannot be shaken
  - what is unshakable
  lexicon: BDAG
  rationale: Formally, the phrase is 'the things not being shaken,' parallel to 'the
    things being shaken.' While the broader context supports the sense 'cannot be
    shaken' (cf. v. 28), this verse itself uses μή with the participle rather than
    an explicit term for inability. The more literal rendering preserves the author's
    contrast without importing wording from the next verse.
