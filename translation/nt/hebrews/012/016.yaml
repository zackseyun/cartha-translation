theological_decisions:
- issue: Characterization of Esau by βέβηλος
  chosen_reading: Rendered as 'godless' to emphasize contempt for sacred privilege
    rather than merely coarse or secular behavior.
  alternative_readings:
  - profane
  - unholy
  rationale: The verse uses Esau as an example of someone who treated covenantal firstborn
    privilege as disposable. 'Godless' best conveys that theological-moral disregard
    in contemporary English, while avoiding the narrower modern association of 'profane'
    with speech alone.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve source meaning without importing extra doctrinal claims.'
