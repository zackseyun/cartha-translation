id: HEB.12.16
reference: Hebrews 12:16
source:
  edition: SBLGNT
  text: μή τις πόρνος ἢ βέβηλος ὡς Ἠσαῦ, ὃς ἀντὶ βρώσεως μιᾶς ἀπέδετο τὰ πρωτοτόκια
    ⸀ἑαυτοῦ.
translation:
  text: that no one be sexually immoral or godless like Esau, who sold his own birthright
    for a single meal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'profane like Esau.' The Greek adjective can mean 'profane' or 'godless,'
      referring to someone who treats what is holy as common.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόρνος
  chosen: sexually immoral
  alternatives:
  - fornicator
  - sexually immoral person
  lexicon: BDAG
  rationale: The noun denotes a person characterized by sexual immorality. 'Sexually
    immoral' is clear modern English and avoids archaic narrowing to premarital sin
    that 'fornicator' may suggest.
- source_word: βέβηλος
  chosen: godless
  alternatives:
  - profane
  - unholy
  - irreligious
  lexicon: BDAG
  rationale: In this context, linked with Esau's contempt for sacred privilege, the
    sense is not merely vulgar speech but disregard for what is holy. 'Godless' communicates
    practical irreverence in accessible English. 'Profane' is viable but less immediately
    clear to modern readers.
- source_word: ὡς Ἠσαῦ
  chosen: like Esau
  alternatives:
  - as Esau
  lexicon: BDAG
  rationale: Standard comparative force; 'like Esau' is idiomatic modern English.
- source_word: ἀντὶ
  chosen: for
  alternatives:
  - in exchange for
  - instead of
  lexicon: BDAG
  rationale: Here ἀντί marks exchange. 'For' is concise and natural in English; the
    exchange sense remains clear from the verb 'sold.'
- source_word: βρώσεως μιᾶς
  chosen: a single meal
  alternatives:
  - one meal
  - a single serving of food
  - one morsel of food
  lexicon: BDAG
  rationale: βρῶσις here refers to food/eating, and in context to the meal for which
    Esau traded his birthright. 'A single meal' captures both the concrete event and
    the triviality emphasized by μιᾶς. 'One morsel' would over-assimilate to Genesis/traditional
    phrasing not stated here.
- source_word: ἀπέδετο
  chosen: sold
  alternatives:
  - gave away
  - traded away
  lexicon: BDAG
  rationale: The middle form here conveys alienation by exchange; 'sold' is the established
    and contextually precise sense, especially with ἀντί marking what was received
    in return.
- source_word: τὰ πρωτοτόκια ἑαυτοῦ
  chosen: his own birthright
  alternatives:
  - his birthrights
  - the rights of the firstborn that were his
  lexicon: BDAG
  rationale: Although πρωτοτόκια is plural in form, English idiom normally uses the
    singular collective 'birthright' for the status and privileges of the firstborn.
    'His own' reflects ἑαυτοῦ and underscores personal possession before he relinquished
    it.
- source_word: μή τις
  chosen: that no one be
  alternatives:
  - lest anyone be
  - that there be no one who is
  lexicon: BDAG
  rationale: This continues the hortatory concern from the preceding context. 'That
    no one be' is natural English and preserves the warning force without unnecessary
    stiffness.
