theological_decisions:
- issue: Identity of 'the firstborn'
  chosen_reading: A collective designation for God's people sharing firstborn status/inheritance,
    rather than a reference to Christ alone.
  alternative_readings:
  - a reference to Christ as the firstborn, with the assembly belonging to him
  rationale: The plural πρωτοτόκων strongly favors a collective referent. The phrase
    therefore describes the gathered people of God as those possessing firstborn standing,
    consistent with the broader inheritance imagery of Hebrews.
  doctrine_reference: Preserve theological tension rather than resolve it; follow
    the Greek where it is clear.
- issue: Referent of 'spirits of righteous people made perfect'
  chosen_reading: Human righteous dead brought to their perfected state in God's presence.
  alternative_readings:
  - a broader reference to all righteous persons, whether embodied or not
  rationale: The phrase 'spirits of righteous people' most naturally refers to human
    persons in their spiritual state, distinguished from the living assembly and from
    God in the surrounding list. The translation avoids importing a more detailed
    doctrine of the intermediate state than the text itself states.
  doctrine_reference: Do not import doctrinal claims the text does not make.
