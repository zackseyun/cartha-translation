id: HEB.12.23
reference: Hebrews 12:23
source:
  edition: SBLGNT
  text: καὶ ἐκκλησίᾳ πρωτοτόκων ⸂ἀπογεγραμμένων ἐν οὐρανοῖς⸃, καὶ κριτῇ θεῷ πάντων,
    καὶ πνεύμασι δικαίων τετελειωμένων,
translation:
  text: and to the assembly of the firstborn who are enrolled in the heavens, and
    to God, the judge of all, and to the spirits of righteous people made perfect,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'enrolled in heaven.' The Greek has the plural 'in the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησίᾳ
  chosen: assembly
  alternatives:
  - church
  - congregation
  lexicon: BDAG
  rationale: Rendered as 'assembly' to preserve the basic sense of a gathered people
    without importing later institutional connotations of 'church.' In this heavenly-Zion
    context, the term denotes the gathered community.
- source_word: πρωτοτόκων
  chosen: the firstborn
  alternatives:
  - firstborn ones
  - firstborn sons
  lexicon: BDAG
  rationale: Rendered substantivally as 'the firstborn.' The plural genitive modifies
    'assembly' and likely denotes those possessing firstborn status/privilege. 'Firstborn
    sons' is possible but would over-specify 'sons,' which is not explicit in the
    Greek.
- source_word: ἀπογεγραμμένων
  chosen: who are enrolled
  alternatives:
  - who have been registered
  - who are recorded
  lexicon: BDAG
  rationale: Perfect passive participle indicating a completed registration with ongoing
    result. 'Enrolled' is idiomatic and preserves the civic/register imagery better
    than the more wooden 'registered.'
- source_word: ἐν οὐρανοῖς
  chosen: in the heavens
  alternatives:
  - in heaven
  lexicon: BDAG
  rationale: The Greek is plural. 'In the heavens' preserves the form and the elevated
    register of the expression, while remaining understandable in English. A footnote
    preserves the more idiomatic singular alternative.
- source_word: κριτῇ θεῷ πάντων
  chosen: God, the judge of all
  alternatives:
  - God the judge of all
  - to the judge, God of all
  lexicon: BDAG
  rationale: The dative chain continues from the previous verse's 'you have come to.'
    Apposition is best represented as 'God, the judge of all.' This preserves both
    identity and judicial role without awkwardness.
- source_word: πνεύμασι
  chosen: spirits
  alternatives:
  - spiritual beings
  lexicon: BDAG
  rationale: The plain lexical sense here is 'spirits.' In context it refers to the
    disembodied spirits of the righteous, not angels, so no expansion beyond the Greek
    is needed in the main text.
- source_word: δικαίων
  chosen: righteous people
  alternatives:
  - the righteous
  - righteous ones
  - righteous men
  lexicon: BDAG
  rationale: Rendered 'righteous people' to communicate the plural human referent
    naturally in modern English without implying only males. 'The righteous' is possible
    but slightly less explicit when paired with 'spirits.'
- source_word: τετελειωμένων
  chosen: made perfect
  alternatives:
  - brought to perfection
  - completed
  lexicon: BDAG
  rationale: Perfect passive participle from τελειόω. 'Made perfect' is the established
    and contextually fitting rendering in Hebrews, preserving the author's theme of
    perfection/completion while remaining readable.
