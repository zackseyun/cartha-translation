theological_decisions:
- issue: Relation to the Sinai command in the quotation
  chosen_reading: The verse is rendered as a citation of the command associated with
    Sinai without importing wording not present in this Greek text.
  alternative_readings:
  - Expanding the quotation with additional traditional wording from Exodus textual
    traditions
  rationale: Some textual traditions of Hebrews include an expanded form such as 'or
    shot with an arrow,' echoing Exodus 19:12-13, but the provided SBLGNT text ends
    with 'it will be stoned.' The translation follows the given Greek text and does
    not harmonize by adding absent material.
  doctrine_reference: Translation philosophy §1, §3
