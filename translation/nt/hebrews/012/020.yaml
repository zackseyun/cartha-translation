id: HEB.12.20
reference: Hebrews 12:20
source:
  edition: SBLGNT
  text: οὐκ ἔφερον γὰρ τὸ διαστελλόμενον· Κἂν θηρίον θίγῃ τοῦ ὄρους, λιθοβοληθήσεται·
translation:
  text: 'For they could not endure what was being commanded: “If even an animal touches
    the mountain, it will be stoned.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add, “or shot with an arrow,” echoing Exodus 19:12–13.
    reason: textual_variant
lexical_decisions:
- source_word: οὐκ ἔφερον
  chosen: they could not endure
  alternatives:
  - they could not bear
  - they were not able to endure
  lexicon: BDAG
  rationale: φέρω with a negative in this context idiomatically means to bear or endure.
    'Could not endure' is natural modern English and fits the sense of inability to
    tolerate the Sinai command.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the explanation for the previous statement. 'For' preserves
    the connective force in a readable way.
- source_word: τὸ διαστελλόμενον
  chosen: what was being commanded
  alternatives:
  - the command
  - what was being ordered
  - the thing being commanded
  lexicon: BDAG
  rationale: The participle διαστελλόμενον refers to an authoritative directive or
    injunction. Rendering it as 'what was being commanded' preserves the verbal aspect
    and avoids over-specifying beyond the Greek, while still making clear that a command
    is in view.
- source_word: Κἂν
  chosen: If even
  alternatives:
  - and if
  - even if
  lexicon: BDAG
  rationale: κἄν here introduces a conditional clause with an emphatic concessive
    nuance. 'If even' captures the force that not even an animal was exempt.
- source_word: θηρίον
  chosen: an animal
  alternatives:
  - a beast
  - a wild animal
  lexicon: BDAG
  rationale: θηρίον can mean beast or animal. 'An animal' is clearer in contemporary
    English and fits the general reference here without implying only wild beasts.
- source_word: θίγῃ
  chosen: touches
  alternatives:
  - should touch
  lexicon: BDAG
  rationale: 'The aorist subjunctive in the conditional clause is well represented
    by a simple present in English: ''touches.'' This keeps the condition straightforward
    and idiomatic.'
- source_word: τοῦ ὄρους
  chosen: the mountain
  alternatives:
  - the mountain itself
  - the mount
  lexicon: BDAG
  rationale: A straightforward rendering of ὄρος in context. The referent is Sinai
    from the surrounding passage, but the Greek here simply says 'the mountain,' so
    the translation does the same.
- source_word: λιθοβοληθήσεται
  chosen: it will be stoned
  alternatives:
  - it shall be stoned
  lexicon: BDAG
  rationale: The future passive is naturally rendered 'it will be stoned.' This preserves
    the judicial/passive force without archaic diction.
