id: HEB.12.4
reference: Hebrews 12:4
source:
  edition: SBLGNT
  text: οὔπω μέχρις αἵματος ἀντικατέστητε πρὸς τὴν ἁμαρτίαν ἀνταγωνιζόμενοι,
translation:
  text: You have not yet resisted to the point of shedding blood in your struggle
    against sin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have not yet resisted unto blood.' The Greek is more literally 'not
      yet unto blood you resisted,' an idiom meaning resistance to the point of bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not so far
  - still not
  lexicon: BDAG
  rationale: Temporal adverb indicating that the described limit has not yet been
    reached. 'Not yet' is the most natural modern English equivalent.
- source_word: μέχρις αἵματος
  chosen: to the point of shedding blood
  alternatives:
  - unto blood
  - to blood
  lexicon: BDAG
  rationale: The idiom means reaching the extent of bloodshed, likely martyrdom or
    violent injury. A more explicit English idiom communicates the sense better than
    the overly literal 'unto blood' while remaining close to the Greek.
- source_word: ἀντικατέστητε
  chosen: you have ... resisted
  alternatives:
  - you stood against
  - you opposed
  lexicon: BDAG
  rationale: Aorist indicative, second plural, describing their opposition or resistance.
    'Resisted' fits the athletic/conflict imagery and works naturally with the following
    phrase.
- source_word: πρὸς τὴν ἁμαρτίαν
  chosen: against sin
  alternatives:
  - against the sin
  - in opposition to sin
  lexicon: BDAG
  rationale: πρός with the accusative here expresses opposition. The article with
    ἁμαρτίαν is not naturally carried into English; 'against sin' best reflects idiomatic
    English while preserving the moral object of the struggle.
- source_word: ἀνταγωνιζόμενοι
  chosen: in your struggle
  alternatives:
  - as you struggle
  - contending
  - struggling against
  lexicon: BDAG
  rationale: Present middle participle from an athletic/combat term, modifying the
    main verb and explaining the manner/context of their resistance. 'In your struggle'
    captures the ongoing contest and reads smoothly in English.
