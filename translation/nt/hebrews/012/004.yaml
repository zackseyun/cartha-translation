theological_decisions:
- issue: Referent of 'sin' in context
  chosen_reading: Render generically as 'sin' without specifying whether it refers
    to personal sin, hostile sinful opposition, or apostasy.
  alternative_readings:
  - the sinful opposition of persecutors
  - sin in general
  - the temptation to abandon the faith
  rationale: The immediate context of Hebrews 12 includes endurance under hostility
    and the call to reject sin, but the verse itself does not narrowly define the
    referent. Preserving the broader term maintains the text's theological tension
    rather than resolving it beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
