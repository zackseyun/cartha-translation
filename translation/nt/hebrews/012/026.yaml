theological_decisions:
- issue: Referent of the relative pronoun and implied subject of the promise
  chosen_reading: The verse refers to God as the one whose voice shook the earth and
    who now promises a future shaking.
  alternative_readings:
  - Less explicitly personal renderings that obscure the divine referent
  rationale: The immediate context and the Haggai citation indicate God is the speaker.
    The translation keeps the personal subject explicit in English ('he has promised')
    without importing additional doctrinal content.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Scope of cosmic language
  chosen_reading: Render γῆ / οὐρανός as 'earth' and 'the heaven' in their broad cosmic
    sense.
  alternative_readings:
  - '''land'' and ''sky'''
  rationale: The quotation contrasts the present created order in comprehensive terms.
    A cosmic rendering preserves the eschatological force without over-specifying
    the mechanics of the event.
  doctrine_reference: Translation philosophy §1, §3
