id: HEB.12.26
reference: Hebrews 12:26
source:
  edition: SBLGNT
  text: οὗ ἡ φωνὴ τὴν γῆν ἐσάλευσεν τότε, νῦν δὲ ἐπήγγελται λέγων· Ἔτι ἅπαξ ἐγὼ ⸀σείσω
    οὐ μόνον τὴν γῆν ἀλλὰ καὶ τὸν οὐρανόν.
translation:
  text: whose voice shook the earth then, but now he has promised, saying, “Yet once
    more I will shake not only the earth but also the heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heaven.' The Greek has the singular with the article, literally 'the
      heaven.'
    reason: lexical_alternative
  - marker: b
    text: Quotation from Haggai 2:6.
    reason: cross_reference
lexical_decisions:
- source_word: οὗ
  chosen: whose
  alternatives:
  - of whom
  lexicon: BDAG
  rationale: Genitive relative pronoun referring back to God in the previous context;
    'whose' is the natural English possessive and preserves the connection to 'voice.'
- source_word: φωνὴ
  chosen: voice
  alternatives:
  - sound
  lexicon: BDAG
  rationale: '''Voice'' fits both the Sinai allusion and the personal divine speaker
    better than the more impersonal ''sound.'''
- source_word: ἐσάλευσεν
  chosen: shook
  alternatives:
  - caused to tremble
  - moved
  lexicon: BDAG
  rationale: Aorist of σαλεύω in context of cosmic disturbance is well rendered 'shook';
    it is idiomatic and preserves the force of the Sinai event.
- source_word: γῆν
  chosen: earth
  alternatives:
  - land
  - ground
  lexicon: BDAG
  rationale: In contrast with 'heaven,' γῆ clearly denotes the earth/cosmic realm
    rather than a local land.
- source_word: τότε
  chosen: then
  alternatives:
  - at that time
  lexicon: BDAG
  rationale: Simple temporal contrast with νῦν; 'then' is concise and natural.
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - and now
  - now however
  lexicon: BDAG
  rationale: δέ marks contrast between the past shaking at Sinai and the present promise
    of a future, greater shaking.
- source_word: ἐπήγγελται
  chosen: he has promised
  alternatives:
  - he has declared
  - he has announced
  lexicon: BDAG
  rationale: Perfect middle/passive of ἐπαγγέλλομαι most naturally means 'has promised';
    this preserves the ongoing validity of the divine promise.
- source_word: λέγων
  chosen: saying
  alternatives:
  - when he said
  lexicon: BDAG
  rationale: Participial introduction to the quotation is routinely and clearly rendered
    'saying.'
- source_word: Ἔτι ἅπαξ
  chosen: Yet once more
  alternatives:
  - Once more
  - One more time
  lexicon: BDAG
  rationale: This reproduces the wording of the citation from Haggai and preserves
    the emphatic temporal sense. 'Yet' reflects ἔτι, while 'once more' captures ἅπαξ
    idiomatically in this context.
- source_word: σείσω
  chosen: I will shake
  alternatives:
  - I will cause to quake
  lexicon: BDAG
  rationale: Future of σείω in prophetic citation; 'shake' is the standard and clearest
    rendering, matching the imagery of cosmic upheaval.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  chosen: not only ... but also
  alternatives:
  - not only ... but even
  lexicon: BDAG
  rationale: This correlative construction is straightforwardly represented by the
    standard English pairing.
- source_word: οὐρανόν
  chosen: the heaven
  alternatives:
  - heaven
  - the sky
  lexicon: BDAG
  rationale: The Greek singular with article is best preserved as 'the heaven' for
    formal correspondence and to maintain the earth/heaven pair of the citation; 'sky'
    is too narrow, and 'heaven' without the article is smoother but less explicit.
