id: HEB.12.22
reference: Hebrews 12:22
source:
  edition: SBLGNT
  text: ἀλλὰ προσεληλύθατε Σιὼν ὄρει καὶ πόλει θεοῦ ζῶντος, Ἰερουσαλὴμ ἐπουρανίῳ,
    καὶ μυριάσιν ἀγγέλων, πανηγύρει
translation:
  text: But you have come to Mount Zion and to the city of the living God, the heavenly
    Jerusalem, and to myriads of angels in festal gathering,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to countless angels, to a festal gathering.' The Greek syntax can
      take 'festal gathering' either with 'angels' or as a separate item in the series.
    reason: alternative_reading
  - marker: b
    text: '''Myriads'' can mean ''ten-thousands'' or, more generally, an innumerable
      multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - instead
  - rather
  lexicon: BDAG
  rationale: Strong adversative contrasting the readers' approach with Sinai in the
    preceding context; 'But' is the most natural English discourse marker here.
- source_word: προσεληλύθατε
  chosen: you have come
  alternatives:
  - you have approached
  - you have drawn near
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior approach;
    'you have come' is idiomatic and preserves the completed-yet-present force better
    than a simple present.
- source_word: Σιὼν ὄρει
  chosen: to Mount Zion
  alternatives:
  - to Zion's mountain
  - to the mountain Zion
  lexicon: BDAG
  rationale: Dative after προσέρχομαι is rendered with English 'to.' Standard English
    order is 'Mount Zion,' preserving the proper name and the mountain imagery.
- source_word: πόλει θεοῦ ζῶντος
  chosen: to the city of the living God
  alternatives:
  - to the city of God who lives
  - to the city belonging to the living God
  lexicon: BDAG
  rationale: Genitive θεοῦ is possessive, and ζῶντος is the conventional and theologically
    weighty descriptor 'living.' This preserves the covenantal contrast with lifeless
    earthly realities.
- source_word: Ἰερουσαλὴμ ἐπουρανίῳ
  chosen: the heavenly Jerusalem
  alternatives:
  - Jerusalem above
  - the Jerusalem in heaven
  lexicon: BDAG
  rationale: Appositional to 'the city of the living God.' 'Heavenly Jerusalem' is
    the most direct and natural rendering of the adjective ἐπουράνιος here.
- source_word: μυριάσιν ἀγγέλων
  chosen: to myriads of angels
  alternatives:
  - to countless angels
  - to tens of thousands of angels
  lexicon: BDAG
  rationale: μυριάς can denote an indefinitely vast number or literally ten-thousands.
    'Myriads' preserves the lexical form and elevated style, while leaving the exact
    number open.
- source_word: πανηγύρει
  chosen: in festal gathering
  alternatives:
  - in joyful assembly
  - at a festival assembly
  lexicon: BDAG
  rationale: πανήγυρις denotes a festive public assembly or celebration. Because of
    the punctuation and syntax, it is best taken with 'myriads of angels' as describing
    their celebratory assembly. 'Festal gathering' is clear, dignified, and semantically
    precise.
