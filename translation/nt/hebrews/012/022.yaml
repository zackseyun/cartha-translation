theological_decisions:
- issue: Syntactical relation of πανηγύρει
  chosen_reading: 'πανηγύρει modifies the angelic host: ''myriads of angels in festal
    gathering.'''
  alternative_readings:
  - 'πανηγύρει begins a new element in the list: ''and to myriads of angels, to a
    festal gathering'''
  - πανηγύρει is coordinated with the following 'assembly/church of the firstborn'
    in v. 23
  rationale: The dative sequence allows more than one construal, but attaching πανηγύρει
    to the immediately preceding 'myriads of angels' yields coherent sense and reflects
    a common understanding of the heavenly host celebrating. This preserves the verse's
    piling up of destinations without importing extra words. Because the syntax is
    genuinely debated, the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
