theological_decisions:
- issue: Referent of the contrasting singular subject ὁ δὲ
  chosen_reading: The subject is God, rendered pronominally as 'he' rather than explicitly
    as 'God.'
  alternative_readings:
  - Explicitly supplying 'God' in English for clarity
  rationale: The context of Hebrews 12:5–11 clearly contrasts earthly fathers with
    God as Father. Using 'he' preserves the Greek's implicitness while remaining understandable
    in context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Meaning of participation in 'his holiness'
  chosen_reading: Rendered as believers sharing in God's holiness without specifying
    a denominational doctrine of sanctification.
  alternative_readings:
  - Interpreting this as positional holiness only
  - Interpreting this as progressive sanctification only
  rationale: The verse states the purpose of divine discipline as participation in
    God's holiness, but it does not narrowly define the mechanics. The translation
    preserves the theological weight and tension without importing a sectarian framework.
  doctrine_reference: Affirmations; Translation philosophy §3
