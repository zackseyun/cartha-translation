id: HEB.12.10
reference: Hebrews 12:10
source:
  edition: SBLGNT
  text: οἱ μὲν γὰρ πρὸς ὀλίγας ἡμέρας κατὰ τὸ δοκοῦν αὐτοῖς ἐπαίδευον, ὁ δὲ ἐπὶ τὸ
    συμφέρον εἰς τὸ μεταλαβεῖν τῆς ἁγιότητος αὐτοῦ.
translation:
  text: For they disciplined us for a few days as seemed best to them, but he does
    so for our benefit, so that we may share in his holiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a short time.' The Greek phrase emphasizes the limited duration
      of earthly fathers' discipline in contrast with God's enduring purpose.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to what seemed right to them.'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς ὀλίγας ἡμέρας
  chosen: for a few days
  alternatives:
  - for a short time
  - for a few days/time
  lexicon: BDAG
  rationale: The phrase is idiomatic for a limited duration in contrast with God's
    enduring purpose. 'For a few days' is a natural, sufficiently literal rendering
    that preserves the temporal contrast.
- source_word: κατὰ τὸ δοκοῦν αὐτοῖς
  chosen: as seemed best to them
  alternatives:
  - according to what seemed right to them
  - as seemed good to them
  lexicon: BDAG
  rationale: δοκοῦν here conveys subjective judgment or what appeared proper to the
    earthly fathers. 'As seemed best to them' captures both the personal perspective
    and the evaluative sense without overstating moral correctness.
- source_word: ἐπαίδευον
  chosen: disciplined
  alternatives:
  - trained
  - corrected
  - educated
  lexicon: BDAG
  rationale: παιδεύω in Hebrews 12 carries the broad sense of parental discipline/training,
    not merely punishment. 'Disciplined' best matches the immediate context and the
    established terminology in the passage.
- source_word: ὁ δὲ
  chosen: but he does so
  alternatives:
  - but he
  - but God
  lexicon: BDAG
  rationale: The subject is implicitly God from the context, contrasted with earthly
    fathers. 'He does so' makes the ellipsis natural in English while preserving the
    contrast without inserting 'God' into the Greek text.
- source_word: ἐπὶ τὸ συμφέρον
  chosen: for our benefit
  alternatives:
  - for what is beneficial
  - for our good
  lexicon: BDAG
  rationale: The phrase denotes purpose directed toward advantage or benefit. 'For
    our benefit' is clear modern English and avoids flattening the purposeful nuance
    into a vague moralism.
- source_word: εἰς τὸ μεταλαβεῖν
  chosen: so that we may share in
  alternatives:
  - for us to partake of
  - unto sharing in
  lexicon: BDAG
  rationale: The construction expresses purpose/result. μεταλαμβάνω means to share
    in or partake of. 'So that we may share in' is idiomatic and preserves the telic
    force.
- source_word: ἁγιότητος
  chosen: holiness
  alternatives:
  - sanctity
  lexicon: BDAG
  rationale: ἁγιότης denotes holiness as a quality belonging to God and, by participation,
    shared by his children. 'Holiness' is the standard and clearest rendering in this
    theological context.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun refers to God in context. Retaining 'his' follows the Greek
    wording while keeping the antecedent clear from the contrast in the verse.
