id: HEB.12.13
reference: Hebrews 12:13
source:
  edition: SBLGNT
  text: καὶ τροχιὰς ὀρθὰς ⸀ποιεῖτε τοῖς ποσὶν ὑμῶν, ἵνα μὴ τὸ χωλὸν ἐκτραπῇ, ἰαθῇ
    δὲ μᾶλλον.
translation:
  text: and make straight paths for your feet, so that the lame may not be turned
    aside, but rather be healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may not be put out of joint' or 'may not be dislocated'; the Greek verb
      can carry a more medical nuance within the bodily metaphor.
    reason: lexical_alternative
  - marker: b
    text: The wording echoes Proverbs 4:26 and continues the passage's imagery of
      disciplined walking.
    reason: cross_reference
lexical_decisions:
- source_word: τροχιὰς
  chosen: paths
  alternatives:
  - tracks
  - ruts
  - courses
  lexicon: BDAG
  rationale: τροχιά literally refers to a track or wheel-rut, but in this exhortational
    context 'paths' is the most natural modern English rendering and preserves the
    metaphor of one's course of life without sounding overly technical.
- source_word: ὀρθὰς
  chosen: straight
  alternatives:
  - level
  - upright
  lexicon: BDAG
  rationale: ὀρθός here modifies τροχιὰς and evokes a direct, properly aligned route.
    'Straight' best matches the imagery and echoes the likely allusion to Proverbs
    4:26 in the LXX tradition.
- source_word: ποιεῖτε
  chosen: make
  alternatives:
  - prepare
  lexicon: BDAG
  rationale: The present active imperative calls for ongoing action. 'Make' is the
    plain and direct equivalent of ποιέω here; 'prepare' is possible but slightly
    more interpretive.
- source_word: τοῖς ποσὶν ὑμῶν
  chosen: for your feet
  alternatives:
  - with your feet
  lexicon: BDAG
  rationale: 'The dative is best taken as advantage/reference: the paths are to be
    made ''for your feet.'' This fits both the Greek construction and the metaphorical
    sense of ordering one''s walk.'
- source_word: τὸ χωλὸν
  chosen: the lame
  alternatives:
  - the crippled
  - what is lame
  lexicon: BDAG
  rationale: The neuter singular adjective functions substantivally and likely has
    a collective or generalized force. 'The lame' is idiomatic English and preserves
    the metaphor of weakness within the community or person without over-specifying
    the referent.
- source_word: ἐκτραπῇ
  chosen: be turned aside
  alternatives:
  - be put out of joint
  - be dislocated
  - turn aside
  lexicon: BDAG
  rationale: The verb can mean to turn aside or, in medical imagery, to be dislocated.
    Given the surrounding bodily metaphor and the ethical exhortation, 'be turned
    aside' works well in the main text as a balanced rendering, while the more medical
    nuance is worth preserving in a footnote.
- source_word: ἰαθῇ
  chosen: be healed
  alternatives:
  - be restored
  lexicon: BDAG
  rationale: ἰάομαι normally means to heal. 'Be healed' preserves the bodily metaphor
    and the restorative aim of the exhortation.
- source_word: μᾶλλον
  chosen: rather
  alternatives:
  - instead
  - all the more
  lexicon: BDAG
  rationale: 'μᾶλλον marks contrast with the preceding negative purpose clause: not
    this outcome, but rather that one. ''Rather'' is the clearest English fit.'
