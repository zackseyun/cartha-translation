theological_decisions:
- issue: Metaphorical versus strictly physical sense of the bodily imagery
  chosen_reading: Retain the bodily language in the main text without explicitly resolving
    whether it refers to literal physical weakness or metaphorical spiritual weakness.
  alternative_readings:
  - Interpret the lame strictly as spiritually weak believers
  - Interpret the lame as a general proverb-like image for anyone vulnerable
  rationale: The verse uses embodied imagery in a paraenetic context and likely draws
    on scriptural wisdom imagery. Preserving the metaphorical tension avoids importing
    a narrower doctrinal or pastoral interpretation than the Greek itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
