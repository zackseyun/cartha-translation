theological_decisions:
- issue: Gendered filial language in exhortation
  chosen_reading: Render υἱοῖς / Υἱέ as 'sons' / 'My son' in the main text
  alternative_readings:
  - children
  - child
  rationale: The verse intentionally uses masculine filial language from Proverbs
    and within Hebrews' sonship argument. Following the translation philosophy, the
    rendering remains gender-accurate rather than neutralized, while a footnote can
    clarify representative force for the audience.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Meaning of παιδεία in divine-human relationship
  chosen_reading: Render παιδεία as 'discipline'
  alternative_readings:
  - training
  - instruction
  rationale: The term can include both formative training and corrective chastening.
    'Discipline' preserves the theological tension by allowing both dimensions in
    context rather than reducing it to punishment alone or mere instruction.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
