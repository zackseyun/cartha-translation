id: HEB.12.5
reference: Hebrews 12:5
source:
  edition: SBLGNT
  text: καὶ ἐκλέλησθε τῆς παρακλήσεως, ἥτις ὑμῖν ὡς υἱοῖς διαλέγεται, Υἱέ μου, μὴ
    ὀλιγώρει παιδείας κυρίου, μηδὲ ἐκλύου ὑπ’ αὐτοῦ ἐλεγχόμενος·
translation:
  text: 'And you have forgotten the exhortation that addresses you as sons: “My son,
    do not regard lightly the Lord’s discipline, nor lose heart when you are reproved
    by him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as children.” The Greek says “as sons,” echoing the wording of Proverbs
      and the representative sonship language of the passage.
    reason: lexical_alternative
  - marker: b
    text: “Discipline” can also be understood as “training” or “instruction,” not
      only punishment.
    reason: lexical_alternative
  - marker: c
    text: Quotation/allusion to Proverbs 3:11.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκλέλησθε
  chosen: you have forgotten
  alternatives:
  - you have completely forgotten
  - you have neglected
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from forgetting; 'have
    forgotten' is natural English and preserves the rebuking force better than a simple
    past.
- source_word: παρακλήσεως
  chosen: the exhortation
  alternatives:
  - the encouragement
  - the consolation
  lexicon: BDAG
  rationale: παράκλησις can denote encouragement, exhortation, or comfort. In this
    context, introducing a warning citation from Proverbs, 'exhortation' best captures
    the admonitory sense without excluding encouragement.
- source_word: ἥτις ... διαλέγεται
  chosen: that addresses
  alternatives:
  - which speaks
  - which reasons with
  - which says
  lexicon: BDAG
  rationale: διαλέγομαι literally involves speaking/discoursing, but in idiomatic
    English 'addresses you' best conveys direct personal speech from Scripture. The
    relative ἥτις gives a qualitative nuance, but this need not be made explicit in
    English.
- source_word: ὡς υἱοῖς
  chosen: as sons
  alternatives:
  - as children
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and evokes the son-language
    of the cited proverb and the surrounding argument about sonship. Per doctrine,
    gender-accurate rendering is preferred over neutralization.
- source_word: Υἱέ μου
  chosen: My son
  alternatives:
  - My child
  lexicon: BDAG
  rationale: The vocative singular in the quotation is explicitly 'son'; retaining
    it preserves the wording and intertextual link to Proverbs 3:11.
- source_word: ὀλιγώρει
  chosen: do not regard lightly
  alternatives:
  - do not make light of
  - do not despise
  lexicon: BDAG
  rationale: The verb means to think little of, disdain, or treat as insignificant.
    'Regard lightly' is clear modern English and avoids the stronger emotional coloring
    of 'despise' while preserving the warning against dismissiveness.
- source_word: παιδείας
  chosen: discipline
  alternatives:
  - training
  - instruction
  - correction
  lexicon: BDAG
  rationale: παιδεία includes formative training and corrective discipline. 'Discipline'
    best fits the immediate context of divine reproof while still allowing the broader
    pedagogical sense developed in the passage.
- source_word: κυρίου
  chosen: the Lord’s
  alternatives:
  - of the Lord
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal default. The possessive form
    is idiomatic in English and preserves the genitival relationship.
- source_word: ἐκλύου
  chosen: lose heart
  alternatives:
  - grow weary
  - become discouraged
  - give up
  lexicon: BDAG
  rationale: The middle/passive imperative here warns against inward collapse under
    correction. 'Lose heart' is a natural English equivalent that matches the emotional
    and volitional sense in context.
- source_word: ἐλεγχόμενος
  chosen: when you are reproved
  alternatives:
  - when you are rebuked
  - when you are corrected
  - while being convicted
  lexicon: BDAG
  rationale: ἐλέγχω often means expose, reprove, or rebuke. 'Reproved' fits the parental-disciplinary
    context and is less harsh than 'rebuked' while more specific than 'corrected'.
