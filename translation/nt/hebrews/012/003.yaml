id: HEB.12.3
reference: Hebrews 12:3
source:
  edition: SBLGNT
  text: Ἀναλογίσασθε γὰρ τὸν τοιαύτην ὑπομεμενηκότα ὑπὸ τῶν ἁμαρτωλῶν εἰς ⸀ἑαυτοὺς
    ἀντιλογίαν, ἵνα μὴ κάμητε ταῖς ψυχαῖς ὑμῶν ἐκλυόμενοι.
translation:
  text: For consider the one who endured such opposition from sinners against himself,
    so that you may not grow weary, becoming discouraged in your souls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'against himself'; the SBLGNT text reads 'against
      themselves.' The sense in context is opposition directed against Jesus.
    reason: textual_variant
  - marker: b
    text: Or 'fainting in your souls.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναλογίσασθε
  chosen: consider
  alternatives:
  - think carefully about
  - reflect on
  lexicon: BDAG
  rationale: Aorist middle imperative calling for deliberate reflection or careful
    consideration. 'Consider' is concise, natural English and preserves the exhortational
    force without over-paraphrasing.
- source_word: τοιαύτην
  chosen: such
  alternatives:
  - so great
  - of this kind
  lexicon: BDAG
  rationale: Modifies ἀντιλογίαν and intensifies the kind/degree of opposition endured.
    'Such' is idiomatic and leaves the emphasis broad rather than specifying magnitude
    beyond the Greek.
- source_word: ὑπομεμενηκότα
  chosen: endured
  alternatives:
  - persevered through
  - remained steadfast under
  lexicon: BDAG
  rationale: Perfect active participle of ὑπομένω highlights completed endurance with
    abiding significance. 'Endured' is the most natural rendering in context and matches
    the suffering motif of the chapter.
- source_word: ἁμαρτωλῶν
  chosen: sinners
  alternatives:
  - sinful people
  lexicon: BDAG
  rationale: Substantival adjective referring to those characterized as sinful. 'Sinners'
    is direct and standard, preserving the moral contrast in the text.
- source_word: εἰς ἑαυτοὺς ἀντιλογίαν
  chosen: opposition from sinners against himself
  alternatives:
  - hostility from sinners against themselves
  - contradiction from sinners against himself
  lexicon: BDAG
  rationale: 'ἀντιλογία denotes opposition, hostility, or contradiction. In this context
    ''opposition'' communicates the broad resistance Jesus faced. The reflexive pronoun
    has a notable textual issue: SBLGNT reads ἑαυτούς (''themselves''), but a widely
    attested variant reads ἑαυτόν (''himself''). The main text follows the sense most
    likely intended in context—opposition directed at Jesus—while preserving the textual
    alternative in a footnote.'
- source_word: κάμητε
  chosen: grow weary
  alternatives:
  - become tired
  - lose heart
  lexicon: BDAG
  rationale: The verb means to become weary or tired. 'Grow weary' fits the paraenetic
    context and pairs well with the following participle.
- source_word: ταῖς ψυχαῖς ὑμῶν
  chosen: in your souls
  alternatives:
  - in yourselves
  - within yourselves
  lexicon: BDAG
  rationale: ψυχή here refers to the inner life or self. 'In your souls' preserves
    the anthropological language of the Greek without flattening it to a mere idiom.
- source_word: ἐκλυόμενοι
  chosen: becoming discouraged
  alternatives:
  - fainting
  - giving up
  - losing heart
  lexicon: BDAG
  rationale: Present participle expressing the manner/result accompanying weariness.
    'Becoming discouraged' is clear modern English; 'fainting' is more literal but
    can sound overly physical in contemporary usage.
