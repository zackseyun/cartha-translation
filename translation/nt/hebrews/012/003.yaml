theological_decisions:
- issue: Referent of 'the one'
  chosen_reading: The phrase refers to Jesus without repeating the name in the verse.
  rationale: The immediate context (Heb 12:2) identifies Jesus as the exemplar in
    view. Rendering 'the one' preserves the Greek expression while allowing the contextual
    referent to remain clear.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra wording.'
