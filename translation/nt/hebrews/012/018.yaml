  from: to what can be touched, to a blazing fire, and to darkness and gloom and storm
  to: to what can be touched, nor to a blazing fire, nor to darkness and gloom and
    storm
  rationale: The current rendering of the list is slightly awkward. It creates a three-part
    structure ('to A, to B, and to [C,D,E]') that breaks the parallelism of the five-item
    list in the Greek. The Greek construction 'Οὐ... καὶ... καὶ...' can be idiomatically
    and forcefully rendered in English as 'not... nor... nor...'. This change creates
    a more parallel and rhetorically elegant sentence that better reflects the source
    text's structure.
