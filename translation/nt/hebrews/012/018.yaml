theological_decisions:
- issue: Whether to supply 'mountain' as the object of approach
  chosen_reading: Do not supply 'mountain' in the main text; render the Greek as an
    unspecified tangible reality.
  alternative_readings:
  - For you have not come to a mountain that can be touched ...
  rationale: Although Sinai is clearly in view from the wider context and some translations
    make this explicit, the Greek text of this verse does not include ὄρει ('mountain').
    Following original-language primacy, the main text preserves the wording without
    importing the noun. The contextual identification can be preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
