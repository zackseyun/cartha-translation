id: HEB.12.18
reference: Hebrews 12:18
source:
  edition: SBLGNT
  text: Οὐ γὰρ προσεληλύθατε ⸀ψηλαφωμένῳ καὶ κεκαυμένῳ πυρὶ καὶ γνόφῳ καὶ ⸀ζόφῳ καὶ
    θυέλλῃ
translation:
  text: For you have not come to what can be touched, and to a blazing fire, and to
    darkness and gloom and storm,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to a mountain that can be touched.' Sinai is the implied referent from
      the surrounding context, but 'mountain' is not stated explicitly in the Greek
      of this verse.
    reason: alternative_reading
  - marker: b
    text: Or 'to what can be touched, to a blazing fire, and to darkness and gloom
      and storm'.
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐ γὰρ
  chosen: For ... not
  alternatives:
  - Indeed ... not
  - Because ... not
  lexicon: BDAG
  rationale: γάρ is retained with explanatory force as 'for,' linking this verse to
    the prior argument. Οὐ straightforwardly negates the verb.
- source_word: προσεληλύθατε
  chosen: you have not come
  alternatives:
  - you have not approached
  - you have not drawn near
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from approach; idiomatic
    English 'have come' captures this well. 'Drawn near' is possible, but 'come' is
    more natural here while preserving the pilgrimage/access imagery.
- source_word: ψηλαφωμένῳ
  chosen: what can be touched
  alternatives:
  - a touchable mountain
  - what is tangible
  lexicon: BDAG
  rationale: The participle literally means 'being touched' or 'touchable/tangible.'
    No explicit noun such as 'mountain' appears in the Greek of this verse, so the
    translation avoids supplying it in the main text. 'What can be touched' preserves
    the neuter dative sense without over-specifying the referent.
- source_word: κεκαυμένῳ πυρί
  chosen: a blazing fire
  alternatives:
  - burning fire
  - kindled fire
  lexicon: BDAG
  rationale: The perfect participle with πῦρ describes fire in a burning state. 'Blazing
    fire' is vivid, natural English and conveys the ongoing fiery condition.
- source_word: γνόφῳ
  chosen: darkness
  alternatives:
  - cloud-darkness
  - gloom
  lexicon: BDAG
  rationale: γνόφος denotes darkness, especially thick darkness. Because the next
    term ζόφος overlaps semantically, the pair is differentiated in English as 'darkness
    and gloom' to preserve the rhetorical accumulation.
- source_word: ζόφῳ
  chosen: gloom
  alternatives:
  - deep darkness
  - blackness
  lexicon: BDAG
  rationale: ζόφος carries the sense of murky gloom or black darkness. 'Gloom' distinguishes
    it from γνόφος while preserving the dark, ominous atmosphere.
- source_word: θυέλλῃ
  chosen: storm
  alternatives:
  - tempest
  - whirlwind
  lexicon: BDAG
  rationale: θύελλα refers to a violent storm or tempest. 'Storm' is clear modern
    English; 'tempest' is more literary but less accessible.
