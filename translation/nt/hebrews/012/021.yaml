theological_decisions:
- issue: Relation of the quotation to the Sinai narrative
  chosen_reading: Render the statement straightforwardly as Moses' response to the
    terrifying Sinai manifestation without attempting to harmonize or explain its
    exact OT source in the main text.
  alternative_readings:
  - Treat the wording as a free summary of Moses' fear drawn from Sinai traditions
    rather than a direct OT quotation.
  rationale: The verse presents Moses as speaking in response to the terrifying manifestation.
    The translation should preserve that claim plainly and leave source-critical or
    intertextual questions to a footnote rather than importing explanation into the
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
