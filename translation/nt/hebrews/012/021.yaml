id: HEB.12.21
reference: Hebrews 12:21
source:
  edition: SBLGNT
  text: καί, οὕτω φοβερὸν ἦν τὸ φανταζόμενον, Μωϋσῆς εἶπεν· Ἔκφοβός εἰμι καὶ ἔντρομος.
translation:
  text: And so terrifying was the sight that Moses said, “I am trembling with fear.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what appeared” or “the spectacle.” The Greek expression refers to the
      visible manifestation at Sinai.
    reason: lexical_alternative
  - marker: b
    text: The wording is not a verbatim quotation from the Old Testament but reflects
      Moses’ fearful response associated with the Sinai event; compare Deut 9:19.
    reason: cross_reference
lexical_decisions:
- source_word: καί
  chosen: And
  alternatives:
  - and indeed
  - even
  lexicon: BDAG
  rationale: Used as a connective continuing the previous description of Sinai; simple
    'And' best fits the flow in English.
- source_word: οὕτω
  chosen: so
  alternatives:
  - thus
  - so greatly
  lexicon: BDAG
  rationale: Intensifies the predicate φοβερόν; 'so' naturally conveys degree in English.
- source_word: φοβερὸν
  chosen: terrifying
  alternatives:
  - fearful
  - dreadful
  - terrible
  lexicon: BDAG
  rationale: Predicate adjective describing the overwhelming dreadfulness of the scene.
    'Terrifying' is vivid, natural modern English and preserves the emotional force
    better than the more archaic-sounding 'fearful'.
- source_word: τὸ φανταζόμενον
  chosen: the sight
  alternatives:
  - what appeared
  - the spectacle
  - the thing being seen
  lexicon: BDAG
  rationale: The participle refers to the visible manifestation at Sinai. 'The sight'
    is idiomatic English that captures the seen phenomenon without awkward literalism.
    'What appeared' is possible, but 'the sight' better matches the experiential emphasis.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - declared
  lexicon: BDAG
  rationale: Simple narrative speech verb; 'said' is the most direct and natural rendering.
- source_word: Ἔκφοβός εἰμι
  chosen: I am trembling with fear
  alternatives:
  - I am full of fear
  - I am terrified
  - I am exceedingly afraid
  lexicon: BDAG
  rationale: ἔκφοβος denotes being greatly frightened or terrified. Rendering the
    clause together with ἔντρομος as 'I am trembling with fear' communicates both
    intense fear and its physical expression in smooth English.
- source_word: καὶ ἔντρομος
  chosen: trembling
  alternatives:
  - and trembling
  - and shaken
  lexicon: BDAG
  rationale: ἔντρομος adds the idea of trembling. In English, folding it into 'trembling
    with fear' avoids a wooden double adjective while preserving both semantic components.
