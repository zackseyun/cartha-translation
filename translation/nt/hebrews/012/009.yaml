theological_decisions:
- issue: Meaning of 'the Father of spirits'
  chosen_reading: A title for God contrasting human fathers with God as the one who
    is related to and sovereign over spirits.
  alternative_readings:
  - the Father of our spirits specifically
  - the Father of spiritual beings generally
  rationale: The phrase should not be narrowed beyond the Greek. The immediate contrast
    is between earthly fathers and God, but the genitive 'of spirits' is left broad
    in the main text to preserve the text's theological tension rather than resolve
    a debated nuance.
  doctrine_reference: Preserve theological tension rather than resolve it.
