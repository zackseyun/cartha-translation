id: HEB.12.9
reference: Hebrews 12:9
source:
  edition: SBLGNT
  text: εἶτα τοὺς μὲν τῆς σαρκὸς ἡμῶν πατέρας εἴχομεν παιδευτὰς καὶ ἐνετρεπόμεθα·
    οὐ ⸀πολὺ μᾶλλον ὑποταγησόμεθα τῷ πατρὶ τῶν πνευμάτων καὶ ζήσομεν;
translation:
  text: Furthermore, we had our earthly fathers as disciplinarians, and we respected
    them. Shall we not much more submit to the Father of spirits and live?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our fathers according to the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who disciplined us.'
    reason: lexical_alternative
  - marker: c
    text: '''The Father of spirits'' may mean specifically the Father of our spirits,
      in contrast to our earthly fathers; the Greek leaves the expression broader.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶτα
  chosen: Furthermore
  alternatives:
  - Then
  - Besides
  - Moreover
  lexicon: BDAG
  rationale: Introduces an additional argument in the author's a fortiori reasoning.
    'Furthermore' fits the discourse flow in natural English better than the more
    sequential 'Then.'
- source_word: τῆς σαρκὸς ἡμῶν πατέρας
  chosen: our earthly fathers
  alternatives:
  - the fathers of our flesh
  - our human fathers
  - our fathers according to the flesh
  lexicon: BDAG
  rationale: The genitive phrase literally means 'fathers of our flesh,' contrasting
    with 'the Father of spirits.' 'Earthly fathers' conveys the embodied, human sense
    clearly in modern English without importing Pauline 'sinful nature' overtones
    for σάρξ.
- source_word: σάρξ
  chosen: earthly
  alternatives:
  - flesh
  - human
  lexicon: BDAG
  rationale: Per the doctrine guidance, σάρξ is rendered 'flesh' when literal and
    'sinful nature' when metaphorical. Here it refers to physical human descent, so
    the sense is literal/embodied. 'Earthly' is chosen idiomatically to preserve the
    contrast with 'spirits' while avoiding awkward English.
- source_word: παιδευτὰς
  chosen: disciplinarians
  alternatives:
  - those who disciplined us
  - correctors
  - trainers
  lexicon: BDAG
  rationale: The noun denotes those who provide discipline/training. 'Disciplinarians'
    preserves the connection with the surrounding context of παιδεία in Hebrews 12
    and is more precise than the broader 'trainers.'
- source_word: ἐνετρεπόμεθα
  chosen: we respected them
  alternatives:
  - we gave them respect
  - we stood in awe of them
  - we were reverent toward them
  lexicon: BDAG
  rationale: In context the verb conveys respectful regard toward parental discipline.
    'We respected them' is clear, idiomatic, and fits the argument better than a stronger
    emotional sense such as 'stood in awe.'
- source_word: οὐ πολὺ μᾶλλον
  chosen: Shall we not much more
  alternatives:
  - How much more shall we not
  - Should we not all the more
  lexicon: BDAG
  rationale: Captures the rhetorical question and the a fortiori force of the Greek
    in natural English.
- source_word: ὑποταγησόμεθα
  chosen: submit
  alternatives:
  - be subject
  - subject ourselves
  lexicon: BDAG
  rationale: The future passive here functions naturally in English as 'submit.' 'Be
    subject' is more formal but less readable; 'submit' preserves the intended response
    of willing subordination in context.
- source_word: τῷ πατρὶ τῶν πνευμάτων
  chosen: the Father of spirits
  alternatives:
  - the Father of our spirits
  - the spiritual Father
  lexicon: BDAG
  rationale: A close rendering of the genitive construction. The text does not explicitly
    say 'our spirits,' and 'spiritual Father' would weaken the likely contrast between
    human fathers and God as the one related to spirits.
- source_word: πνευμάτων
  chosen: spirits
  alternatives:
  - spiritual beings
  - our spirits
  lexicon: BDAG
  rationale: The plural is retained because it is explicit in Greek. This preserves
    the phrase's theological breadth and avoids narrowing it to only human inner life
    where the text itself is more concise.
- source_word: ζήσομεν
  chosen: and live
  alternatives:
  - and we will live
  lexicon: BDAG
  rationale: Retains the future/result sense while reading smoothly in English. The
    concise form suits the rhetorical question.
