theological_decisions:
- issue: Rendering the filial term υἱός in a context of divine discipline and sonship
  chosen_reading: every son
  alternative_readings:
  - every child
  rationale: The source text uses the masculine singular υἱός, and the surrounding
    context in Hebrews 12 emphasizes sonship imagery. Following the doctrine's gender-accurate
    principle, the main text preserves 'son' rather than neutralizing to 'child,'
    while a footnote can clarify the representative sense for all God's children.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4 (Gender-accurate over
    gender-neutral)
- issue: Strength of μαστιγοῖ in relation to divine discipline
  chosen_reading: scourges
  alternative_readings:
  - disciplines harshly
  - whips
  - flogs
  rationale: The text itself uses a severe verb and should not be softened to avoid
    theological discomfort. 'Scourges' preserves the gravity of the metaphor while
    remaining readable. This maintains the text's tension between divine love and
    painful discipline rather than resolving it.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
