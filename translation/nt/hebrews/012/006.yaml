id: HEB.12.6
reference: Hebrews 12:6
source:
  edition: SBLGNT
  text: ὃν γὰρ ἀγαπᾷ κύριος παιδεύει, μαστιγοῖ δὲ πάντα υἱὸν ὃν παραδέχεται.
translation:
  text: For the Lord disciplines the one he loves, and he scourges every son whom
    he receives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whips' or 'flogs.' The Greek verb is forceful and depicts severe discipline.
    reason: lexical_alternative
  - marker: b
    text: '''Every son'' reflects the Greek wording; the expression has representative
      force in context, referring to those whom God acknowledges as his children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃν
  chosen: the one ... whom
  alternatives:
  - whomever
  - him whom
  lexicon: BDAG
  rationale: The relative pronoun introduces a generalizing statement. English idiom
    is best served by rendering the first instance as 'the one' and the second as
    'whom,' preserving the singular personal reference without awkwardness.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or ground for the preceding exhortation. 'For' preserves
    the connective force in a concise, natural way.
- source_word: ἀγαπᾷ
  chosen: loves
  alternatives:
  - has love for
  lexicon: BDAG
  rationale: Standard rendering of ἀγαπάω. 'Loves' is clear, natural, and aligns with
    the default treatment of ἀγάπη cognates.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - the Lord
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' The English text includes the
    article for natural English ('the Lord'), while preserving the title's theological
    force.
- source_word: παιδεύει
  chosen: disciplines
  alternatives:
  - trains
  - corrects
  - chastens
  lexicon: BDAG
  rationale: παιδεύω in this context refers to formative correction/training, not
    merely punishment. 'Disciplines' best captures both corrective and pedagogical
    force in modern English. 'Chastens' is traditional but archaic.
- source_word: μαστιγοῖ
  chosen: scourges
  alternatives:
  - whips
  - flogs
  lexicon: BDAG
  rationale: μαστιγόω is a strong term meaning to whip or flog. 'Scourges' preserves
    the severity and traditional resonance without becoming overly colloquial. It
    also avoids softening the metaphor into mere hardship.
- source_word: δὲ
  chosen: and
  alternatives:
  - but
  - indeed
  lexicon: BDAG
  rationale: Here δέ links the second clause in a continuative way rather than marking
    strong contrast. 'And' is the most natural English connector.
- source_word: πάντα υἱὸν
  chosen: every son
  alternatives:
  - every child
  - every one as a son
  lexicon: BDAG
  rationale: The Greek is explicitly masculine singular with representative force.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral. 'Every
    son' preserves the filial/adoptive imagery central to the context, while a footnote
    can note the representative sense.
- source_word: παραδέχεται
  chosen: receives
  alternatives:
  - accepts
  - welcomes
  lexicon: BDAG
  rationale: παραδέχομαι here conveys receiving or accepting into favor. 'Receives'
    is concise and preserves the relational nuance, echoing filial acceptance in the
    context.
