id: HEB.12.8
reference: Hebrews 12:8
source:
  edition: SBLGNT
  text: εἰ δὲ χωρίς ἐστε παιδείας ἧς μέτοχοι γεγόνασι πάντες, ἄρα νόθοι ⸂καὶ οὐχ υἱοί
    ἐστε⸃.
translation:
  text: But if you are without discipline, of which all have become sharers, then
    you are illegitimate children and not sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participants' or 'partakers' in this discipline.
    reason: lexical_alternative
  - marker: b
    text: Greek 'sons'; the term reflects recognized filial status in the father's
      household.
    reason: cultural_note
lexical_decisions:
- source_word: χωρίς
  chosen: without
  alternatives:
  - apart from
  lexicon: BDAG
  rationale: The preposition indicates absence or lack. 'Without' is the most natural
    modern English rendering in this conditional statement.
- source_word: παιδείας
  chosen: discipline
  alternatives:
  - training
  - instruction
  - correction
  lexicon: BDAG
  rationale: In Hebrews 12 the term refers to formative parental training that includes
    correction, not mere punishment. 'Discipline' best preserves the breadth of the
    concept in context and matches the surrounding argument.
- source_word: ἧς
  chosen: of which
  alternatives:
  - in which
  lexicon: BDAG
  rationale: The genitive relative pronoun refers back to 'discipline.' 'Of which'
    fits the genitive construction with μέτοχοι and preserves the formal relation
    in clear English.
- source_word: μέτοχοι
  chosen: sharers
  alternatives:
  - participants
  - partakers
  lexicon: BDAG
  rationale: The word denotes those who share in something. 'Sharers' is concise and
    natural, while preserving the idea of real participation.
- source_word: γεγόνασι
  chosen: have become
  alternatives:
  - have been
  - have come to be
  lexicon: BDAG
  rationale: 'The perfect tense of γίνομαι points to a resulting state: they have
    come to be and remain sharers. ''Have become'' captures both the transition and
    present result.'
- source_word: πάντες
  chosen: all
  alternatives:
  - everyone
  lexicon: BDAG
  rationale: The adjective is comprehensive and plural. 'All' is the most direct rendering
    and fits the author's general statement about God's children.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: The particle marks an inference from the condition. 'Then' is idiomatic
    in English after 'if' and preserves the logical force.
- source_word: νόθοι
  chosen: illegitimate children
  alternatives:
  - illegitimate
  - bastards
  lexicon: BDAG
  rationale: The term refers to children lacking recognized filial status. 'Bastards'
    is historically traditional but too harsh and distracting in contemporary English;
    'illegitimate children' communicates the social-legal sense without unnecessary
    offensiveness.
- source_word: υἱοί
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: The Greek specifically uses the masculine filial term, not the more general
    τέκνα. In the immediate context of sonship and paternal discipline, 'sons' should
    be preserved as gender-accurate rather than neutralized.
