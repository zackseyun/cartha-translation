- issue: Rendering υἱοί in a context of filial status and divine discipline
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The verse contrasts illegitimate offspring with recognized sons in a
    paternal household framework. Following the project's gender-accurate principle,
    the masculine term is retained because it is part of the argument's social and
    theological texture, while English readers may infer representative force from
    context.
