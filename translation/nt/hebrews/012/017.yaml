id: HEB.12.17
reference: Hebrews 12:17
source:
  edition: SBLGNT
  text: ἴστε γὰρ ὅτι καὶ μετέπειτα θέλων κληρονομῆσαι τὴν εὐλογίαν ἀπεδοκιμάσθη, μετανοίας
    γὰρ τόπον οὐχ εὗρεν, καίπερ μετὰ δακρύων ἐκζητήσας αὐτήν.
translation:
  text: For you know that afterward also, when he wanted to inherit the blessing,
    he was rejected; for he found no opportunity for repentance, though he sought
    it with tears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he found no place for repentance'; this may mean he found no opportunity
      to reverse the outcome, or that he could not obtain a change of mind from Isaac.
    reason: alternative_reading
  - marker: b
    text: The pronoun 'it' may refer to 'the blessing' or, less likely, to 'repentance/opportunity';
      the Greek leaves the referent ambiguous.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴστε
  chosen: you know
  alternatives:
  - know
  lexicon: BDAG
  rationale: Perfect-form οἶδα functions with present sense; 'you know' is the natural
    English equivalent and preserves the author's appeal to the audience's existing
    knowledge.
- source_word: μετέπειτα
  chosen: afterward
  alternatives:
  - later
  - afterwards
  lexicon: BDAG
  rationale: Temporal adverb indicating subsequent time. 'Afterward' is concise and
    fits the warning context.
- source_word: θέλων
  chosen: when he wanted
  alternatives:
  - wanting
  - desiring
  lexicon: BDAG
  rationale: Participial construction is rendered temporally in smooth English. 'Wanted'
    preserves volition without overstating intensity.
- source_word: κληρονομῆσαι
  chosen: to inherit
  alternatives:
  - to receive as an inheritance
  lexicon: BDAG
  rationale: Standard sense of κληρονομέω. 'Inherit' is both accurate and idiomatic,
    especially in connection with 'the blessing' and Esau's birthright/blessing background.
- source_word: τὴν εὐλογίαν
  chosen: the blessing
  alternatives:
  - the blessing of inheritance
  lexicon: BDAG
  rationale: Definite article points to the specific paternal blessing in the Esau
    narrative. 'The blessing' preserves the allusive force without over-expanding
    the text.
- source_word: ἀπεδοκιμάσθη
  chosen: he was rejected
  alternatives:
  - he was disqualified
  - he was refused
  lexicon: BDAG
  rationale: Passive of ἀποδοκιμάζω conveys being rejected after testing/consideration.
    'He was rejected' is the clearest rendering in context, without importing a technical
    soteriological sense.
- source_word: μετανοίας ... τόπον
  chosen: opportunity for repentance
  alternatives:
  - place for repentance
  - chance to change his mind
  lexicon: BDAG
  rationale: The idiom 'find a place/room for' can mean finding scope or opportunity.
    'Opportunity for repentance' communicates the idiom in natural English while preserving
    the key term 'repentance.'
- source_word: μετανοίας
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: BDAG
  rationale: Default NT sense is repentance. Although some argue it refers to Isaac's
    change of mind, the lexical choice in the main text should preserve the standard
    semantic value while leaving the referential ambiguity to notes.
- source_word: καίπερ
  chosen: though
  alternatives:
  - although
  - even though
  lexicon: BDAG
  rationale: Concessive conjunction; 'though' is concise and natural.
- source_word: μετὰ δακρύων
  chosen: with tears
  alternatives:
  - accompanied by tears
  lexicon: BDAG
  rationale: Straightforward prepositional phrase indicating manner.
- source_word: ἐκζητήσας
  chosen: he sought
  alternatives:
  - he sought earnestly
  - he searched for
  lexicon: BDAG
  rationale: ἐκζητέω can intensify the seeking, but in English 'sought' already fits
    the solemn context; the earnest nuance is preserved by 'with tears'.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - her
  - this
  lexicon: BDAG
  rationale: Feminine pronoun most naturally refers back either to 'the blessing'
    or to 'repentance/opportunity.' English 'it' preserves the ambiguity rather than
    resolving it interpretively.
