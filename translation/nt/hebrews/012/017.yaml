theological_decisions:
- issue: Referent of 'it' (αὐτήν) and the phrase 'found no opportunity for repentance'
  chosen_reading: 'Main text preserves ambiguity: Esau found no opportunity for repentance,
    though he sought ''it'' with tears.'
  alternative_readings:
  - '''it'' refers to the blessing, i.e., he sought the blessing with tears'
  - the repentance in view is Isaac's change of mind rather than Esau's own repentance
  rationale: The Greek permits ambiguity. The immediate antecedents are feminine nouns
    ('blessing' and 'repentance'), and the idiom 'found no place for repentance' has
    been understood either of Esau's inability to reverse the consequences or Isaac's
    refusal to alter the blessing. In keeping with the translation philosophy, the
    English avoids resolving the ambiguity beyond what the Greek warrants.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
