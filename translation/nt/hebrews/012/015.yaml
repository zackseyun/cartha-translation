theological_decisions:
- issue: Whether the warning 'fall short of the grace of God' should be rendered in
    a way that implies loss of salvation, failure to receive grace, or communal exclusion
  chosen_reading: Rendered neutrally as 'fall short of the grace of God'
  alternative_readings:
  - fail to obtain the grace of God
  - lack the grace of God
  rationale: The Greek permits a warning about not attaining or not remaining within
    the sphere of God's grace, but the verse itself does not require resolution of
    later doctrinal debates about apostasy or perseverance. The translation preserves
    the warning without importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether 'defiled' should be softened to a merely social disturbance
  chosen_reading: Retained 'defiled'
  alternative_readings:
  - corrupted
  - contaminated
  rationale: The verb μιαίνω carries stronger moral/cultic force than mere inconvenience.
    Keeping 'defiled' preserves the seriousness of the communal effect of bitterness
    in the text.
