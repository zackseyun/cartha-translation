id: HEB.12.15
reference: Hebrews 12:15
source:
  edition: SBLGNT
  text: ἐπισκοποῦντες μή τις ὑστερῶν ἀπὸ τῆς χάριτος τοῦ θεοῦ, μή τις ῥίζα πικρίας
    ἄνω φύουσα ἐνοχλῇ καὶ ⸂δι’ αὐτῆς⸃ μιανθῶσιν ⸀πολλοί,
translation:
  text: watching carefully lest anyone fall short of the grace of God, lest any root
    of bitterness springing up cause trouble, and through it many be defiled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fail to obtain the grace of God.' The Greek expression can denote not
      attaining what is offered as well as falling short of it.
    reason: lexical_alternative
  - marker: b
    text: '''Root of bitterness'' likely echoes Deuteronomy 29:18, where a poisonous
      root symbolizes covenant unfaithfulness spreading within the community.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐπισκοποῦντες
  chosen: watching carefully
  alternatives:
  - seeing to it
  - watching over
  - taking care
  lexicon: BDAG
  rationale: Present participle with an overseeing/supervising sense. 'Watching carefully'
    preserves the active vigilance of the participle in readable English without sounding
    overly institutional.
- source_word: μή τις ὑστερῶν ἀπὸ τῆς χάριτος τοῦ θεοῦ
  chosen: lest anyone fall short of the grace of God
  alternatives:
  - lest anyone lack the grace of God
  - lest anyone fail to obtain the grace of God
  lexicon: BDAG
  rationale: ὑστερέω with ἀπό can mean to fail to attain or to fall short of. 'Fall
    short of' is idiomatic and preserves the warning sense without importing a specific
    doctrinal system. 'Anyone' reflects the indefinite τις.
- source_word: χάριτος
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Standard theological and lexical sense here; 'grace' best preserves the
    covenantal and soteriological resonance of the phrase.
- source_word: ῥίζα πικρίας
  chosen: root of bitterness
  alternatives:
  - bitter root
  lexicon: BDAG
  rationale: A close rendering of the genitive construction that also preserves likely
    resonance with Deuteronomy 29:18 LXX. 'Root of bitterness' is the more transparent
    and established English form.
- source_word: ἄνω φύουσα
  chosen: springing up
  alternatives:
  - growing up
  - shooting up
  lexicon: BDAG
  rationale: The participial phrase describes emergence or sprouting upward. 'Springing
    up' is natural English and preserves the vivid metaphor.
- source_word: ἐνοχλῇ
  chosen: cause trouble
  alternatives:
  - trouble
  - disturb
  - cause distress
  lexicon: BDAG
  rationale: The verb means to trouble or disturb. 'Cause trouble' fits the singular
    subject in smooth English and keeps the communal-disruptive sense.
- source_word: δι’ αὐτῆς
  chosen: through it
  alternatives:
  - by it
  - through this root
  lexicon: BDAG
  rationale: The feminine pronoun refers back most naturally to the 'root.' 'Through
    it' is concise and preserves the instrumental sense of διά.
- source_word: μιανθῶσιν πολλοί
  chosen: many be defiled
  alternatives:
  - many be contaminated
  - many be polluted
  lexicon: BDAG
  rationale: μιαίνω often carries moral or cultic defilement language. 'Defiled' preserves
    that biblical register better than flatter modern alternatives, while 'many' straightforwardly
    renders πολλοί.
