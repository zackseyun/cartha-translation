theological_decisions:
- issue: Meaning of ἁγιασμός in an exhortational context
  chosen_reading: Rendered as 'holiness' rather than 'sanctification.'
  alternative_readings:
  - sanctification
  rationale: The verse exhorts believers to actively pursue a manner of life marked
    by holiness. 'Sanctification' is a valid theological gloss, but in contemporary
    English it can sound technical and may suggest a doctrinal system rather than
    the ethical-religious reality the text enjoins. 'Holiness' better communicates
    the plain sense while preserving theological weight.
  doctrine_reference: Translation philosophy §§5–6
- issue: Referent of 'the Lord'
  chosen_reading: Left as 'the Lord' without specifying God the Father or the Lord
    Jesus.
  alternative_readings:
  - God
  - the Lord Jesus
  rationale: The Greek text says only 'the Lord.' Because the referent can be heard
    within the broader biblical tradition as God and, in Christian reading, in relation
    to Christ, the translation preserves the wording and does not resolve the ambiguity
    beyond the source text.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Lord'
