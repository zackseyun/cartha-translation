id: HEB.12.14
reference: Hebrews 12:14
source:
  edition: SBLGNT
  text: Εἰρήνην διώκετε μετὰ πάντων, καὶ τὸν ἁγιασμόν, οὗ χωρὶς οὐδεὶς ὄψεται τὸν
    κύριον,
translation:
  text: Pursue peace with everyone, and the holiness without which no one will see
    the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctification.' The Greek term can refer either to holiness as a quality
      of life or to sanctification as the state/process of being made holy.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰρήνην
  chosen: peace
  alternatives:
  - peacefulness
  - reconciliation
  lexicon: BDAG
  rationale: εἰρήνη commonly denotes peace in relational and communal contexts. Here,
    paired with 'with everyone,' it most naturally refers to living in peace with
    others rather than an inward feeling alone.
- source_word: διώκετε
  chosen: Pursue
  alternatives:
  - strive for
  - seek after
  lexicon: BDAG
  rationale: διώκω literally means pursue, often with energetic effort. 'Pursue' preserves
    the active, strenuous sense better than the weaker 'seek' and is idiomatic in
    exhortation.
- source_word: μετὰ πάντων
  chosen: with everyone
  alternatives:
  - with all
  - with all people
  lexicon: BDAG
  rationale: The phrase means 'with all' in the sense of all persons. 'With everyone'
    is natural modern English and preserves the universal scope.
- source_word: τὸν ἁγιασμόν
  chosen: the holiness
  alternatives:
  - sanctification
  - holiness
  lexicon: BDAG
  rationale: ἁγιασμός can denote sanctification as a process or holiness as the state/result.
    In this exhortational context, 'holiness' is clearer and more natural for modern
    readers while still preserving the ethical and consecrational sense. The article
    is retained as 'the holiness' to reflect the Greek construction and the specific
    quality in view.
- source_word: οὗ χωρὶς
  chosen: without which
  alternatives:
  - apart from which
  lexicon: BDAG
  rationale: The relative pronoun is singular masculine, referring most naturally
    to ἁγιασμός, and χωρὶς means 'without/apart from.' 'Without which' is the most
    direct and idiomatic rendering.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: οὐδείς is an absolute negation meaning 'no one.' This is the standard
    clear English equivalent.
- source_word: ὄψεται
  chosen: will see
  alternatives:
  - will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω, here meaning to see or behold. 'Will see' is simple
    and sufficiently weighty; 'behold' is more elevated but less natural in contemporary
    English.
- source_word: τὸν κύριον
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is rendered 'Lord.' In Hebrews this most
    naturally refers to God, though in Christian canonical context it resonates with
    the Lord Jesus as well; the translation should preserve the title without narrowing
    beyond the text.
