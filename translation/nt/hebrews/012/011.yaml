id: HEB.12.11
reference: Hebrews 12:11
source:
  edition: SBLGNT
  text: πᾶσα ⸀δὲ παιδεία πρὸς μὲν τὸ παρὸν οὐ δοκεῖ χαρᾶς εἶναι ἀλλὰ λύπης, ὕστερον
    δὲ καρπὸν εἰρηνικὸν τοῖς δι’ αὐτῆς γεγυμνασμένοις ἀποδίδωσιν δικαιοσύνης.
translation:
  text: Now all discipline seems for the present to be not joy but sorrow; yet later
    it yields the peaceful fruit of righteousness to those who have been trained by
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice.' The Greek word can denote righteousness or justice; here it
      likely refers to the uprightness produced by God's discipline.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδεία
  chosen: discipline
  alternatives:
  - training
  - instruction
  - correction
  lexicon: BDAG
  rationale: In Hebrews 12 the term refers to formative parental discipline from God,
    including correction and training, not merely punishment or abstract education.
    'Discipline' best preserves that breadth in natural English and matches the immediate
    context.
- source_word: πρὸς μὲν τὸ παρὸν
  chosen: for the present
  alternatives:
  - for the moment
  - at the present time
  lexicon: BDAG
  rationale: This idiom marks the temporary, present-time perspective in contrast
    with ὕστερον ('later'). 'For the present' is concise and idiomatic.
- source_word: οὐ δοκεῖ
  chosen: seems
  alternatives:
  - appears
  - is considered
  lexicon: BDAG
  rationale: The verb expresses appearance from human perception rather than an absolute
    statement. 'Seems' captures the experiential perspective.
- source_word: χαρᾶς ... ἀλλὰ λύπης
  chosen: not joy but sorrow
  alternatives:
  - not pleasant but painful
  - not gladness but grief
  lexicon: BDAG
  rationale: The Greek uses the nouns 'joy' and 'sorrow,' not adjectives. This rendering
    stays close to the source while remaining natural. 'Painful' would over-interpret
    λύπη.
- source_word: ὕστερον
  chosen: later
  alternatives:
  - afterward
  - afterwards
  lexicon: BDAG
  rationale: Marks subsequent result in straightforward modern English.
- source_word: καρπὸν εἰρηνικὸν
  chosen: the peaceful fruit
  alternatives:
  - peaceful fruit
  - fruit that brings peace
  lexicon: BDAG
  rationale: The adjective εἰρηνικός directly modifies 'fruit.' Including the article
    in English helps the phrase read naturally as the object of 'yields.' The sense
    is fruit characterized by peace, not necessarily merely producing peace.
- source_word: γεγυμνασμένοις
  chosen: have been trained
  alternatives:
  - have been exercised
  - have been disciplined
  lexicon: BDAG
  rationale: The perfect passive participle conveys persons shaped through repeated
    training. 'Have been trained' communicates the athletic metaphor behind γυμνάζω
    while remaining clear in modern English.
- source_word: ἀποδίδωσιν
  chosen: yields
  alternatives:
  - produces
  - gives back
  - renders
  lexicon: BDAG
  rationale: In context the subject 'discipline' produces a result. 'Yields' is idiomatic
    with 'fruit' and preserves the causal/resultative sense.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, with 'justice' preserved as an alternative where relevant. Here the
    phrase most naturally denotes uprightness/right relationship produced by divine
    discipline rather than social justice alone.
