theological_decisions:
- issue: Meaning of παιδεία in the context of God's action toward believers
  chosen_reading: formative discipline, including correction and training
  alternative_readings:
  - punishment
  - instruction only
  rationale: The broader context in Hebrews 12:5–10 frames God's παιδεία in filial
    terms, aimed at holiness and maturity. Rendering it as 'discipline' preserves
    the theological tension of loving correction without implying mere retribution.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
- issue: Rendering of δικαιοσύνης
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine table sets 'righteousness' as the default rendering for
    δικαιοσύνη, while preserving 'justice' as an alternative in a footnote where relevant.
    In this verse 'righteousness' best fits the moral/spiritual fruit produced by
    discipline.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
