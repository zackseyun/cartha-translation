theological_decisions:
- issue: Use of metaphorical exhortation drawn from bodily weakness
  chosen_reading: Render the command as an exhortation to renewed strength and perseverance
    rather than as a literal instruction about physical posture alone.
  alternative_readings:
  - Render more formally as 'lift up the hands that hang down and the weakened knees'
  rationale: The immediate context in Hebrews 12 concerns endurance, discipline, and
    perseverance. The verse uses bodily imagery metaphorically, likely echoing Isaiah
    35:3. The translation preserves the metaphor while expressing it in readable modern
    English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without unnecessary paraphrase.'
