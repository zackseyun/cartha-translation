id: HEB.12.12
reference: Hebrews 12:12
source:
  edition: SBLGNT
  text: Διὸ τὰς παρειμένας χεῖρας καὶ τὰ παραλελυμένα γόνατα ἀνορθώσατε,
translation:
  text: Therefore, strengthen your drooping hands and your weakened knees,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'lift up the hands that hang down and the weakened knees.'
      The wording echoes Isa 35:3 in the Greek tradition and uses bodily imagery for
      renewed courage and endurance.
    reason: cross_reference
lexical_decisions:
- source_word: Διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Inferential conjunction drawing an exhortational conclusion from the
    preceding discussion. 'Therefore' is natural, concise, and preserves the logical
    connection.
- source_word: παρειμένας χεῖρας
  chosen: your drooping hands
  alternatives:
  - the hands that hang down
  - your slack hands
  - your hanging hands
  lexicon: BDAG
  rationale: The participle from παρίημι conveys something let hang loose, slackened,
    or drooping. In English, 'drooping hands' communicates the idiomatic image clearly.
    'Your' is supplied in English because the imperative addresses the audience directly
    and English style normally makes the implied possessive explicit in body-part
    expressions.
- source_word: παραλελυμένα γόνατα
  chosen: your weakened knees
  alternatives:
  - the knees that are paralyzed
  - your feeble knees
  - your disabled knees
  lexicon: BDAG
  rationale: The perfect participle from παραλύω/παραλύομαι denotes knees that have
    become enfeebled or disabled. 'Weakened knees' preserves the metaphor of exhaustion
    without over-literalizing to clinical paralysis, which would sound misleading
    in context.
- source_word: ἀνορθώσατε
  chosen: strengthen
  alternatives:
  - lift up
  - straighten
  - restore
  - make upright
  lexicon: BDAG
  rationale: The aorist imperative calls for decisive action. While ἀνορθόω can mean
    'straighten up' or 'raise up,' in this athletic/exhortational context 'strengthen'
    best conveys the intended sense of renewed vigor for perseverance. The imagery
    is still preserved by the paired body parts.
