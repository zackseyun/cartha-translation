id: HEB.12.2
reference: Hebrews 12:2
source:
  edition: SBLGNT
  text: ἀφορῶντες εἰς τὸν τῆς πίστεως ἀρχηγὸν καὶ τελειωτὴν Ἰησοῦν, ὃς ἀντὶ τῆς προκειμένης
    αὐτῷ χαρᾶς ὑπέμεινεν σταυρὸν αἰσχύνης καταφρονήσας, ἐν δεξιᾷ τε τοῦ θρόνου τοῦ
    θεοῦ κεκάθικεν.
translation:
  text: fixing our eyes on Jesus, the pioneer and perfecter of faith, who for the
    joy set before him endured the cross, despising the shame, and has sat down at
    the right hand of the throne of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pioneer and perfecter of faithfulness,' or 'the pioneer and perfecter
      of our faith.' The Greek phrase is compact, and πίστις can also be understood
      as 'faithfulness' or as referring specifically to believers' faith.
    reason: alternative_reading
  - marker: b
    text: Or 'disregarding the shame.' The sense is that he treated the disgrace of
      crucifixion as something not decisive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφορῶντες
  chosen: fixing our eyes on
  alternatives:
  - looking to
  - looking away to
  lexicon: BDAG
  rationale: The participle carries the sense of directing attention away from distractions
    toward a specific object. 'Fixing our eyes on' expresses the sustained, focused
    force in natural English better than the flatter 'looking to.'
- source_word: ἀρχηγὸν
  chosen: pioneer
  alternatives:
  - founder
  - leader
  - author
  - source
  lexicon: BDAG
  rationale: ἀρχηγός can denote one who initiates or leads the way. 'Pioneer' captures
    both initiating and path-blazing nuance in context, where Jesus goes before believers
    in the race imagery. 'Author' is traditional but can sound overly literary and
    less connected to the athletic/exemplary context.
- source_word: τελειωτὴν
  chosen: perfecter
  alternatives:
  - completer
  - finisher
  lexicon: BDAG
  rationale: The noun denotes one who brings something to its intended completion.
    'Perfecter' preserves the teleological sense and pairs well with 'pioneer.' 'Finisher'
    is possible but can sound merely terminal rather than bringing to full maturity.
- source_word: τῆς πίστεως
  chosen: of faith
  alternatives:
  - of our faith
  - of faithfulness
  lexicon: BDAG
  rationale: The genitive is left as 'of faith' rather than expanded to 'of our faith,'
    since 'our' is not explicit in the Greek. Per doctrine defaults, πίστις is rendered
    'faith' in the main text; 'faithfulness' is preserved as an alternative because
    the phrase can be understood either as Jesus as the source/completer of believers'
    faith or as the exemplar/completer of faithful endurance.
- source_word: ἀντὶ
  chosen: for
  alternatives:
  - instead of
  - in exchange for
  - because of
  lexicon: BDAG
  rationale: '''For'' idiomatically conveys the sense here of acting in view of the
    joy set before him. ''Instead of'' is lexically possible but would suggest he
    chose suffering rather than joy, which fits the context less well than enduring
    suffering with future joy in view.'
- source_word: προκειμένης αὐτῷ χαρᾶς
  chosen: the joy set before him
  alternatives:
  - the joy lying before him
  lexicon: BDAG
  rationale: This preserves the imagery of something placed ahead as motivation. It
    fits the surrounding race/exhortation context and is standard, clear English.
- source_word: ὑπέμεινεν
  chosen: endured
  alternatives:
  - persevered through
  - bore up under
  lexicon: BDAG
  rationale: The verb denotes steadfast endurance under suffering. 'Endured' is concise,
    natural, and preserves the connection to the chapter's emphasis on endurance.
- source_word: σταυρὸν
  chosen: the cross
  alternatives:
  - a cross
  lexicon: BDAG
  rationale: 'Although anarthrous in Greek, the referent is definite in context: Jesus''
    crucifixion. English idiom therefore naturally uses ''the cross.'''
- source_word: αἰσχύνης καταφρονήσας
  chosen: despising the shame
  alternatives:
  - disregarding the shame
  - scorning the shame
  lexicon: BDAG
  rationale: The participle means treating something as of little account. 'Despising
    the shame' is traditional and forceful, indicating that he regarded the disgrace
    as not decisive. It does not imply shame itself was good, but that he refused
    to be governed by it.
- source_word: ἐν δεξιᾷ ... τοῦ θρόνου τοῦ θεοῦ
  chosen: at the right hand of the throne of God
  alternatives:
  - at the right hand of God’s throne
  - on the right side of the throne of God
  lexicon: BDAG
  rationale: This preserves the exaltation imagery and the genitival structure. 'Right
    hand' is the established idiom for the place of highest honor and authority.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: The enclitic links the final clause to the preceding description. In
    English, simple 'and' best carries the connective force without awkwardness.
- source_word: κεκάθικεν
  chosen: has sat down
  alternatives:
  - is seated
  - sat down
  lexicon: BDAG
  rationale: The perfect tense highlights the completed action with abiding result.
    'Has sat down' preserves that aspect better than the simple past, while still
    sounding natural.
