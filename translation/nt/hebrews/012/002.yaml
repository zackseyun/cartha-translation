theological_decisions:
- issue: Meaning of τῆς πίστεως in 'ἀρχηγὸν καὶ τελειωτὴν'
  chosen_reading: Jesus is presented as the pioneer and perfecter of faith, with πίστις
    rendered by the doctrinal default 'faith' rather than 'faithfulness.'
  alternative_readings:
  - Jesus as the pioneer and perfecter of faithfulness
  - Jesus as the pioneer and perfecter of our faith
  rationale: The phrase is somewhat compressed and can be read either with reference
    to believers' faith or to faithful endurance as exemplified by Jesus. Following
    the doctrine table, πίστις is rendered 'faith' in the main text, while alternatives
    are preserved in a footnote rather than resolved dogmatically.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table
    for πίστις'
- issue: Force of ἀντὶ τῆς προκειμένης αὐτῷ χαρᾶς
  chosen_reading: Jesus endured the cross with the joy set before him as the motivating
    prospect.
  alternative_readings:
  - Jesus endured the cross instead of taking the joy set before him
  rationale: Although ἀντί can mean 'instead of,' the broader context of endurance
    toward a promised goal strongly favors prospective motivation rather than renunciation
    of present joy. This avoids importing a speculative contrast not demanded by the
    text.
