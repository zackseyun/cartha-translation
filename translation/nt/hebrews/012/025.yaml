id: HEB.12.25
reference: Hebrews 12:25
source:
  edition: SBLGNT
  text: Βλέπετε μὴ παραιτήσησθε τὸν λαλοῦντα· εἰ γὰρ ἐκεῖνοι οὐκ ⸀ἐξέφυγον ⸂ἐπὶ γῆς
    παραιτησάμενοι τὸν⸃ χρηματίζοντα, ⸀πολὺ μᾶλλον ἡμεῖς οἱ τὸν ἀπ’ οὐρανῶν ἀποστρεφόμενοι·
translation:
  text: See to it that you do not refuse the one who is speaking. For if those did
    not escape when they refused the one who warned them on earth, much less will
    we if we turn away from the one who warns from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who gave divine warning on earth.' The Greek verb can denote
      divinely authorized instruction or warning.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'much more we, the ones turning away from the one from heaven';
      the Greek leaves the verb 'escape' implied from the previous clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  chosen: See to it
  alternatives:
  - Take care
  - Beware
  - See
  lexicon: BDAG
  rationale: Imperative plural functioning as a warning/exhortation. 'See to it' captures
    the idiomatic force better than a bare 'see' while remaining close to the Greek.
- source_word: μὴ παραιτήσησθε
  chosen: that you do not refuse
  alternatives:
  - that you do not reject
  - that you do not decline
  lexicon: BDAG
  rationale: παραιτέομαι here means to refuse, decline, or reject. 'Refuse' fits the
    warning context and also preserves verbal linkage with παραιτησάμενοι later in
    the verse.
- source_word: τὸν λαλοῦντα
  chosen: the one who is speaking
  alternatives:
  - him who speaks
  - the speaker
  lexicon: BDAG
  rationale: Present participle indicates ongoing speech. 'The one who is speaking'
    preserves the participial force and the immediacy of God's present address in
    context.
- source_word: ἐξέφυγον
  chosen: did not escape
  alternatives:
  - did not flee from
  - did not avoid
  lexicon: BDAG
  rationale: The verb means to escape or avoid the consequences. In context it refers
    to not escaping judgment, so 'did not escape' is the most natural English rendering.
- source_word: ἐπὶ γῆς
  chosen: on earth
  alternatives:
  - from earth
  - at the earthly mountain
  lexicon: BDAG
  rationale: The phrase contrasts with ἀπ’ οὐρανῶν, 'from heaven.' 'On earth' best
    preserves the earthly/heavenly contrast without over-specifying Sinai in the main
    text.
- source_word: παραιτησάμενοι
  chosen: when they refused
  alternatives:
  - after refusing
  - by refusing
  lexicon: BDAG
  rationale: Aorist middle participle linked to the same semantic field as παραιτήσησθε.
    'When they refused' gives clear temporal-circumstantial sense in English and preserves
    the repeated warning about refusal.
- source_word: χρηματίζοντα
  chosen: the one who warned them
  alternatives:
  - the one who gave divine instruction
  - the one who spoke an oracle
  - the one who admonished
  lexicon: BDAG
  rationale: χρηματίζω can denote divine communication, warning, or instruction. In
    this warning context, and in comparison with the present heavenly speaker, 'warned
    them' best conveys the judicial-exhortatory force. 'Them' is supplied for natural
    English from the implied object.
- source_word: πολὺ μᾶλλον
  chosen: much less
  alternatives:
  - much more
  - all the more
  lexicon: BDAG
  rationale: In a negative-to-greater negative argument, English idiom prefers 'much
    less will we...' rather than 'much more will we not...'. This preserves the logic
    of the lesser-to-greater warning.
- source_word: ἀποστρεφόμενοι
  chosen: if we turn away
  alternatives:
  - when we turn away
  - we who turn away
  - shrinking back from
  lexicon: BDAG
  rationale: The participle is substantival/appositional to ἡμεῖς and expresses the
    condition under which the warning applies. English requires some smoothing; 'if
    we turn away' makes the implied apodosis clear and preserves the sense of apostasy/refusal
    without overtranslating.
- source_word: τὸν ἀπ’ οὐρανῶν
  chosen: from the one who warns from heaven
  alternatives:
  - from him from heaven
  - from the heavenly one
  lexicon: BDAG
  rationale: The phrase modifies the implied speaking/warning figure in contrast to
    the one 'on earth.' Rendering it with 'the one who warns from heaven' makes the
    comparison explicit in idiomatic English, though the warning verb is carried over
    from χρηματίζοντα for clarity.
