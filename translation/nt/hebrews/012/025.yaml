theological_decisions:
- issue: Identity of the speaking/warning figure
  chosen_reading: Render generically as 'the one who is speaking' / 'the one who warned
    ... from heaven' without explicitly inserting 'God' or 'Christ' in the main text.
  alternative_readings:
  - God speaking at Sinai and now from heaven
  - Christ as the heavenly speaker
  rationale: The immediate context strongly involves divine speech, but the verse
    itself uses participial descriptions rather than a proper name or title. To avoid
    importing a more specific identification than the text states, the translation
    preserves the wording of the Greek while allowing readers to infer the referent
    from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Supplying an explicit apodosis in English
  chosen_reading: Add 'will we' in 'much less will we if we turn away...'
  alternative_readings:
  - 'Leave the Greek ellipsis more literal: ''much more we, the ones turning away...'''
  rationale: 'The Greek is elliptical, but the sense is clear: if the former did not
    escape, neither will we. Supplying the implied verb is necessary for readable
    modern English and does not add doctrinal content.'
  doctrine_reference: Optimal equivalence; readable modern English, not archaic or
    academic.
