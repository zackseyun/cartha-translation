theological_decisions:
- issue: Referent of the relative clause ἧς
  chosen_reading: The clause is rendered as referring most directly to 'a voice of
    words,' while leaving open that the broader Sinai auditory phenomenon is in view.
  alternative_readings:
  - 'The relative refers to the entire preceding experience: the trumpet sound and
    the voice together.'
  rationale: The nearest grammatical antecedent is φωνῇ, and the feminine singular
    supports that reading. Yet contextually the hearers recoiled from the whole manifestation
    at Sinai. The translation preserves the most immediate grammatical sense in the
    main text and notes the broader contextual possibility.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
