id: HEB.12.19
reference: Hebrews 12:19
source:
  edition: SBLGNT
  text: καὶ σάλπιγγος ἤχῳ καὶ φωνῇ ῥημάτων, ἧς οἱ ἀκούσαντες παρῃτήσαντο ⸀μὴ προστεθῆναι
    αὐτοῖς λόγον·
translation:
  text: and to the sound of a trumpet and to a voice of words, whose hearers begged
    that no further word be spoken to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which those who heard begged should not continue to address them,'
      taking the relative as referring more broadly to the whole Sinai manifestation
      rather than specifically to 'a voice of words.'
    reason: alternative_reading
  - marker: b
    text: See Exodus 20:18–19 and Deuteronomy 5:23–27 for the Israelites' plea not
      to hear God's voice directly any longer.
    reason: cross_reference
lexical_decisions:
- source_word: σάλπιγγος ἤχῳ
  chosen: the sound of a trumpet
  alternatives:
  - a trumpet blast
  - the noise of a trumpet
  lexicon: BDAG
  rationale: The dative phrase denotes the auditory phenomenon associated with Sinai.
    'The sound of a trumpet' is natural English and preserves the concrete imagery
    without overinterpreting intensity. 'Trumpet blast' is possible, but 'sound' more
    closely reflects ἦχος.
- source_word: φωνῇ ῥημάτων
  chosen: a voice of words
  alternatives:
  - a voice speaking words
  - the sound of words
  lexicon: BDAG
  rationale: The phrase is somewhat unusual and vivid. 'A voice of words' preserves
    the genitival construction and the sense that articulated speech, not merely noise,
    was heard. A smoother rendering like 'a voice speaking words' is possible but
    adds verbal content not explicit in the Greek.
- source_word: ἧς
  chosen: whose
  alternatives:
  - which
  lexicon: BDAG
  rationale: The feminine singular relative pronoun most naturally refers back to
    the immediately preceding feminine noun phrase, especially φωνῇ. English 'whose'
    idiomatically introduces the clause with personal hearers attached to the voice.
    Because the relative could be taken more broadly of the whole terrifying phenomenon,
    an alternative is preserved in a footnote.
- source_word: οἱ ἀκούσαντες
  chosen: hearers
  alternatives:
  - those who heard
  - the ones who heard
  lexicon: BDAG
  rationale: This substantival participle refers to the Israelites who heard the voice.
    'Hearers' is concise and idiomatic in English, while still representing the participial
    force. 'Those who heard' is also viable but slightly more expansive.
- source_word: παρῃτήσαντο
  chosen: begged
  alternatives:
  - refused
  - declined
  - entreated
  lexicon: BDAG
  rationale: In this context the middle verb carries the sense of earnestly asking
    to be excused from further direct address, echoing the Sinai narrative. 'Begged'
    captures the urgency better than the more neutral 'asked' and avoids the misleadingly
    bare 'refused.'
- source_word: μὴ προστεθῆναι αὐτοῖς λόγον
  chosen: that no further word be spoken to them
  alternatives:
  - that a word should not be added to them
  - that no more message be addressed to them
  lexicon: BDAG
  rationale: The infinitive with μή after παραιτέομαι expresses the content of the
    request. 'No further word be spoken to them' communicates the idiom of προστίθημι
    ('add further') in clear English while preserving the passive sense. 'Word' is
    retained rather than 'message' to stay close to λόγον and the solemnity of divine
    speech.
