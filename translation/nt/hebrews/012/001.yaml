theological_decisions:
- issue: Sense of 'witnesses' in relation to Hebrews 11
  chosen_reading: Those whose lives bear witness to faith, with the surrounding image
    contributing to the exhortation
  alternative_readings:
  - Primarily heavenly spectators watching believers run
  rationale: The immediate context points back to chapter 11, where the exemplars
    testify by their faithful endurance. The translation keeps 'witnesses' without
    importing the stronger interpretive claim that they are actively spectating, thus
    preserving theological and interpretive tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
