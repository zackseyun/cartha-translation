id: HEB.12.1
reference: Hebrews 12:1
source:
  edition: SBLGNT
  text: Τοιγαροῦν καὶ ἡμεῖς, τοσοῦτον ἔχοντες περικείμενον ἡμῖν νέφος μαρτύρων, ὄγκον
    ἀποθέμενοι πάντα καὶ τὴν εὐπερίστατον ἁμαρτίαν, δι’ ὑπομονῆς τρέχωμεν τὸν προκείμενον
    ἡμῖν ἀγῶνα,
translation:
  text: Therefore, since we also have so great a cloud of witnesses surrounding us,
    laying aside every weight and the sin that so easily entangles, let us run with
    endurance the race set before us,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sin that clings so closely' or 'the sin that easily ensnares.' The
      Greek adjective is rare and may emphasize either entangling, ensnaring, or closely
      clinging.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοιγαροῦν
  chosen: Therefore
  alternatives:
  - So then
  - Accordingly
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument,
    especially Hebrews 11. 'Therefore' is natural and preserves the logical force.
- source_word: τοσοῦτον ... νέφος μαρτύρων
  chosen: so great a cloud of witnesses
  alternatives:
  - such a great cloud of witnesses
  lexicon: BDAG
  rationale: Retains the metaphorical image and the intensifying force of τοσοῦτον.
    'Cloud' is established and fits the figurative sense of a vast surrounding multitude.
- source_word: περικείμενον ἡμῖν
  chosen: surrounding us
  alternatives:
  - encircling us
  - lying around us
  lexicon: BDAG
  rationale: The participle conveys being situated all around. 'Surrounding us' is
    idiomatic and preserves the spatial metaphor without over-literal awkwardness.
- source_word: μάρτυρων
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: BDAG
  rationale: The noun can denote those who bear witness or testify. In context, the
    reference is to the faithful of chapter 11 whose lives testify to persevering
    faith, not primarily to spectators at an athletic event, though the imagery overlaps.
- source_word: ὄγκον πάντα
  chosen: every weight
  alternatives:
  - every hindrance
  - every burden
  lexicon: BDAG
  rationale: ὄγκος denotes bulk, weight, or encumbrance. 'Every weight' preserves
    the athletic metaphor of discarding anything that slows the runner, while remaining
    readable.
- source_word: ἀποθέμενοι
  chosen: laying aside
  alternatives:
  - putting off
  - casting off
  lexicon: BDAG
  rationale: Aorist middle participle expressing decisive removal prior to or accompanying
    the main exhortation. 'Laying aside' is idiomatic in English and fits both moral
    and athletic imagery.
- source_word: εὐπερίστατον
  chosen: that so easily entangles
  alternatives:
  - that clings so closely
  - that easily ensnares
  - that readily surrounds
  lexicon: BDAG
  rationale: This adjective is rare and debated, with senses proposed such as 'easily
    entangling,' 'closely clinging,' or 'easily ensnaring.' In the running metaphor,
    'so easily entangles' best communicates the practical force in clear modern English
    while preserving the danger of impediment. Because the term is genuinely ambiguous,
    alternatives are preserved in a footnote.
- source_word: ἁμαρτίαν
  chosen: the sin
  alternatives:
  - sin
  lexicon: BDAG
  rationale: The article likely particularizes sin as a category viewed concretely
    in context rather than identifying one specific sin by name. 'The sin' preserves
    the Greek article and the rhetorical force better than an anarthrous English 'sin.'
- source_word: δι’ ὑπομονῆς
  chosen: with endurance
  alternatives:
  - through endurance
  - with perseverance
  lexicon: BDAG
  rationale: ὑπομονή denotes steadfast endurance under difficulty. 'With endurance'
    is concise, idiomatic, and suits the athletic exhortation.
- source_word: τρέχωμεν
  chosen: let us run
  alternatives:
  - we should run
  lexicon: BDAG
  rationale: First person plural present subjunctive in hortatory use. 'Let us run'
    is the standard and clearest English equivalent.
- source_word: τὸν προκείμενον ἡμῖν ἀγῶνα
  chosen: the race set before us
  alternatives:
  - the contest laid out before us
  - the struggle set before us
  lexicon: BDAG
  rationale: ἀγών can mean contest, struggle, or race. Given the explicit running
    imagery from τρέχωμεν, 'race' is the best contextual rendering. προκείμενον is
    naturally rendered 'set before us,' preserving the idea of an appointed course.
