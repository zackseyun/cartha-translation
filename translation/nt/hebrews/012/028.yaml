id: HEB.12.28
reference: Hebrews 12:28
source:
  edition: SBLGNT
  text: διὸ βασιλείαν ἀσάλευτον παραλαμβάνοντες ἔχωμεν χάριν, δι’ ἧς ⸀λατρεύωμεν εὐαρέστως
    τῷ θεῷ μετὰ ⸂εὐλαβείας καὶ δέους⸃,
translation:
  text: Therefore, since we are receiving an unshakable kingdom, let us have grace,
    through which we may serve God acceptably with reverence and awe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let us be thankful.' The Greek phrase ἔχωμεν χάριν can be understood
      as 'let us have grace' or idiomatically 'let us have gratitude/let us be thankful.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding argument about the
    shaking and removal of created things. 'Therefore' is natural modern English and
    preserves the logical force.
- source_word: βασιλείαν ἀσάλευτον
  chosen: an unshakable kingdom
  alternatives:
  - a kingdom that cannot be shaken
  - an immovable kingdom
  lexicon: BDAG
  rationale: βασιλείαν is straightforwardly 'kingdom.' ἀσάλευτον denotes what is not
    shaken or moved. 'Unshakable' is concise and idiomatic while preserving the contrast
    with the shaken created order in the context.
- source_word: παραλαμβάνοντες
  chosen: since we are receiving
  alternatives:
  - receiving
  - as we receive
  - having received
  lexicon: BDAG
  rationale: Present participle, nominative plural, linked to the exhortation that
    follows. 'Since we are receiving' captures the participial circumstance and the
    likely ongoing/realis sense better than a simple past 'having received,' while
    also fitting the hortatory flow.
- source_word: ἔχωμεν χάριν
  chosen: let us have grace
  alternatives:
  - let us be thankful
  - let us hold fast to grace
  - let us have gratitude
  lexicon: BDAG
  rationale: The phrase is debated because χάριν can mean either 'grace/favor' or,
    idiomatically in some contexts, 'gratitude/thankfulness.' The more literal rendering
    'have grace' preserves the lexical form and allows the following δι’ ἧς ('through
    which') to refer naturally to grace as the means by which acceptable worship is
    offered. The alternative 'be thankful' is preserved in a footnote because it is
    a longstanding and plausible interpretive rendering.
- source_word: δι’ ἧς
  chosen: through which
  alternatives:
  - by which
  - through it
  lexicon: BDAG
  rationale: The feminine relative pronoun most naturally refers back to χάριν. 'Through
    which' preserves the instrumental sense of διά with the genitive and keeps the
    connection explicit.
- source_word: λατρεύωμεν
  chosen: we may serve
  alternatives:
  - let us serve
  - we may worship
  lexicon: BDAG
  rationale: 'λατρεύω in biblical usage often denotes cultic/religious service rendered
    to God. ''Serve'' preserves the verbal idea without narrowing it only to inward
    worship, while the object ''God'' and adverb ''acceptably'' make the religious
    sense clear. Because both ἔχωμεν and λατρεύωμεν are hortatory/subjunctive forms,
    English can represent the second as a purpose/result nuance: ''through which we
    may serve.'''
- source_word: εὐαρέστως
  chosen: acceptably
  alternatives:
  - in a way pleasing to him
  - pleasingly
  lexicon: BDAG
  rationale: The adverb means in a manner pleasing or acceptable. 'Acceptably' is
    concise, natural, and preserves the God-directed evaluative sense.
- source_word: τῷ θεῷ
  chosen: God
  alternatives:
  - to God
  lexicon: BDAG
  rationale: English idiom with 'serve' normally takes a direct object ('serve God')
    rather than 'serve to God.' The dative sense is fully represented in idiomatic
    English.
- source_word: μετὰ εὐλαβείας καὶ δέους
  chosen: with reverence and awe
  alternatives:
  - with reverence and fear
  - with godly fear and dread
  lexicon: BDAG
  rationale: εὐλάβεια conveys reverence, caution, or godly respect; δέος denotes awe
    or fear before what is weighty and overwhelming. 'Reverence and awe' communicates
    both terms in contemporary English without suggesting cringing terror, and fits
    the context of holy approach to God.
