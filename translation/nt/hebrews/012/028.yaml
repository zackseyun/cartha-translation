theological_decisions:
- issue: Meaning of χάριν in ἔχωμεν χάριν
  chosen_reading: grace
  alternative_readings:
  - gratitude
  - thankfulness
  rationale: The immediate syntax favors taking χάριν as 'grace,' since the following
    relative phrase δι’ ἧς naturally refers to grace as the means by which believers
    render acceptable service to God. Rendering it as 'thankfulness' is possible and
    traditional, but it weakens the instrumental connection and shifts the focus from
    divine enablement to human response. To preserve the interpretive tension, the
    alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
