theological_decisions:
- issue: Metaphorical description of God as fire
  chosen_reading: 'Retain the metaphor directly: ''our God is a consuming fire'''
  alternative_readings:
  - our God is like a consuming fire
  - our God is a fire that consumes
  rationale: The Greek is an equative clause without an explicit comparative marker.
    Rendering it directly preserves the force of the biblical metaphor and its warning
    context, without softening the statement into a mere simile. This also maintains
    the intertextual connection to Deuteronomy 4:24.
  doctrine_reference: Translation philosophy §1, §3
