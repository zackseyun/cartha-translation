id: HEB.12.29
reference: Hebrews 12:29
source:
  edition: SBLGNT
  text: καὶ γὰρ ὁ θεὸς ἡμῶν πῦρ καταναλίσκον.
translation:
  text: For our God is a consuming fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An echo of Deuteronomy 4:24, where God is described as 'a consuming fire.'
    reason: cross_reference
  - marker: b
    text: Or 'a fire that consumes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For
  alternatives:
  - Indeed
  - Because
  - And indeed
  lexicon: BDAG
  rationale: The combination γὰρ gives explanatory force linking this verse to the
    preceding warning and exhortation. English 'For' best captures the causal/explanatory
    sense in natural style; καὶ is absorbed rather than separately rendered to avoid
    awkwardness.
- source_word: ὁ θεὸς ἡμῶν
  chosen: our God
  alternatives:
  - God of us
  lexicon: BDAG
  rationale: A straightforward possessive construction. 'Our God' is idiomatic English
    and preserves the covenantal and communal force of the Greek.
- source_word: πῦρ
  chosen: fire
  lexicon: BDAG
  rationale: Literal rendering of the predicate nominative. The metaphor is retained
    rather than interpreted, preserving the scriptural imagery and its allusion to
    Deuteronomy 4:24.
- source_word: καταναλίσκον
  chosen: consuming
  alternatives:
  - that consumes
  - devouring
  lexicon: BDAG
  rationale: 'The present active participle modifies πῦρ attributively/predicatively:
    ''a consuming fire.'' ''Consuming'' is the established and accurate English equivalent,
    preserving both the ongoing force of the participle and the likely intertextual
    echo of the LXX wording.'
