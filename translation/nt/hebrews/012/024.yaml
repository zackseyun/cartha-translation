theological_decisions:
- issue: Referent of the comparison with Abel
  chosen_reading: The main text preserves the Greek's concise comparison, 'better
    than Abel,' without expanding it to 'than the blood of Abel.'
  alternative_readings:
  - better than the blood of Abel
  - better things than Abel's blood cried out for
  rationale: The context strongly evokes Abel's blood (cf. Heb 11:4; Gen 4:10), but
    the Greek here names Abel directly. Preserving the terseness avoids over-interpreting
    the syntax while allowing readers to infer the allusion. An explanatory footnote
    preserves the fuller interpretive option.
  doctrine_reference: Preserve theological tension rather than resolve it.
