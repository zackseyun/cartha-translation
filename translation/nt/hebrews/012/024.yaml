id: HEB.12.24
reference: Hebrews 12:24
source:
  edition: SBLGNT
  text: καὶ διαθήκης νέας μεσίτῃ Ἰησοῦ, καὶ αἵματι ῥαντισμοῦ κρεῖττον λαλοῦντι παρὰ
    τὸν Ἅβελ.
translation:
  text: and to Jesus, the mediator of a new covenant, and to the sprinkled blood that
    speaks better than Abel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than the blood of Abel.' The Greek reads simply 'than Abel,' likely
      alluding to Abel's blood crying out from the ground (Gen 4:10).
    reason: alternative_reading
  - marker: b
    text: '''The sprinkled blood'' refers to sacrificial blood applied by sprinkling,
      evoking covenant ratification and cleansing imagery.'
    reason: cultural_note
lexical_decisions:
- source_word: διαθήκης νέας
  chosen: of a new covenant
  alternatives:
  - of a new testament
  - of the new covenant
  lexicon: BDAG
  rationale: διαθήκη in Hebrews carries the covenantal sense rooted in biblical theology
    rather than the later English 'testament.' The anarthrous construction is naturally
    rendered 'a new covenant' here, though 'the new covenant' is possible in light
    of the known covenant promised in Scripture.
- source_word: μεσίτῃ
  chosen: mediator
  alternatives:
  - go-between
  - intermediary
  lexicon: BDAG
  rationale: '''Mediator'' is the established and precise rendering for one who stands
    between parties to effect covenant relationship. It preserves the theological
    and legal force present in Hebrews.'
- source_word: Ἰησοῦ
  chosen: Jesus
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: αἵματι ῥαντισμοῦ
  chosen: the sprinkled blood
  alternatives:
  - blood of sprinkling
  - sprinkled blood
  lexicon: BDAG
  rationale: The phrase denotes blood associated with ritual sprinkling. 'The sprinkled
    blood' is clear modern English and preserves the sacrificial-cultic imagery without
    archaic phrasing.
- source_word: κρεῖττον
  chosen: better
  alternatives:
  - more excellent
  - superior
  lexicon: BDAG
  rationale: Hebrews repeatedly uses κρείττων language as a thematic term. 'Better'
    is the most natural and consistent English rendering.
- source_word: λαλοῦντι
  chosen: that speaks
  alternatives:
  - speaking
  - that is speaking
  lexicon: BDAG
  rationale: The present participle modifies 'blood.' Relative-clause English is smoother
    here while preserving the ongoing verbal force.
- source_word: παρὰ τὸν Ἅβελ
  chosen: than Abel
  alternatives:
  - than the blood of Abel
  - than Abel's blood
  lexicon: BDAG
  rationale: The Greek text says 'than Abel,' not explicitly 'than the blood of Abel.'
    The comparison is elliptical. Rendering the shorter form preserves the source
    wording and leaves the interpretive connection to Abel's blood in context rather
    than importing it into the main text.
