id: HEB.12.7
reference: Hebrews 12:7
source:
  edition: SBLGNT
  text: εἰς παιδείαν ὑπομένετε· ὡς υἱοῖς ὑμῖν προσφέρεται ὁ θεός· τίς ⸀γὰρ υἱὸς ὃν
    οὐ παιδεύει πατήρ;
translation:
  text: Endure for discipline; God is dealing with you as with sons. For what son
    is there whom a father does not discipline?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Endure this as discipline.' The Greek can be understood either as an
      exhortation to endure for the sake of discipline or to regard what is endured
      as discipline.
    reason: alternative_reading
  - marker: b
    text: Greek 'sons.' The term reflects the father-son analogy in the argument;
      the application is not limited to males.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς παιδείαν
  chosen: for discipline
  alternatives:
  - as discipline
  - for training
  lexicon: BDAG
  rationale: 'The preposition εἰς with παιδείαν is best taken in a purposive/resultative
    sense here: the readers are to endure with reference to discipline. ''For discipline''
    is concise and natural in English while preserving the idea that their endurance
    is bound up with God''s disciplinary training. ''As discipline'' is possible and
    common, but can suggest a stronger interpretive paraphrase (''endure this as discipline'')
    than the Greek explicitly states.'
- source_word: ὑπομένετε
  chosen: Endure
  alternatives:
  - you are enduring
  - endure it
  lexicon: BDAG
  rationale: Present active indicative/plural can be read as either indicative or
    imperative in form, but in this context the clause functions naturally as an exhortation.
    'Endure' gives clear English force without adding an object not present in the
    Greek. 'Endure it' would over-specify.
- source_word: ὡς υἱοῖς
  chosen: as with sons
  alternatives:
  - as sons
  - as with children
  lexicon: BDAG
  rationale: 'The comparison is relational: God treats them in the manner a father
    treats sons. ''As with sons'' preserves the simile and the paternal analogy. ''Children''
    would soften the masculine term υἱοῖς and obscure the gendered father-son comparison
    used in the argument.'
- source_word: υἱοῖς
  chosen: sons
  alternatives:
  - children
  lexicon: BDAG
  rationale: Per the translation philosophy's gender-accurate principle, the masculine
    plural should be retained because the verse explicitly pairs 'sons' with 'father'
    in a representative analogy. Rendering it 'children' would reduce the source-text's
    gendered imagery, though the application is not limited to males.
- source_word: προσφέρεται
  chosen: is dealing with
  alternatives:
  - is treating
  - is presented
  lexicon: BDAG
  rationale: 'In this middle/passive form and context, the sense is idiomatic: God
    conducts himself toward them in a certain way. ''Is dealing with'' is natural
    modern English and captures the relational action. A more literal ''is presented''
    would be misleading here.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of the nominative subject; no special title issue
    arises here.
- source_word: τίς γὰρ υἱὸς
  chosen: For what son is there
  alternatives:
  - For which son is there
  - For who is a son
  lexicon: BDAG
  rationale: This introduces a rhetorical question appealing to common paternal practice.
    'What son is there' is idiomatic English and preserves the force of τίς γὰρ.
- source_word: ὃν οὐ παιδεύει πατήρ
  chosen: whom a father does not discipline
  alternatives:
  - that a father does not train
  - whom his father does not discipline
  lexicon: BDAG
  rationale: παιδεύει should be rendered consistently with παιδεία as 'discipline'
    in this context, preserving the lexical link across the verse. 'His father' is
    not explicit in Greek, so 'a father' is preferable. 'Train' is possible but weaker
    than the corrective/formative nuance in context.
