theological_decisions:
- issue: Gendered familial language in the father-son analogy
  chosen_reading: Retain 'sons' in the main text
  alternative_readings:
  - children
  rationale: The verse's argument depends on the culturally recognizable analogy between
    a father and sons. In keeping with the translation philosophy's gender-accurate
    principle, the masculine term is preserved rather than neutralized. The representative
    application to the whole believing community can be noted in a footnote without
    altering the source-text imagery.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
