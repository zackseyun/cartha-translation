id: HEB.6.13
reference: Hebrews 6:13
source:
  edition: SBLGNT
  text: Τῷ γὰρ Ἀβραὰμ ἐπαγγειλάμενος ὁ θεός, ἐπεὶ κατ’ οὐδενὸς εἶχεν μείζονος ὀμόσαι,
    ὤμοσεν καθ’ ἑαυτοῦ,
translation:
  text: For when God made the promise to Abraham, since he had no one greater by whom
    to swear, he swore by himself,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, 'when God promised Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαγγειλάμενος
  chosen: made the promise
  alternatives:
  - promised
  lexicon: BDAG
  rationale: The aorist middle participle of ἐπαγγέλλομαι refers to making a promise.
    'Made the promise' preserves the participial linkage and the article with θεός
    while sounding natural in English. 'Promised' is possible but slightly less explicit
    about the object implied in context.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - when
  lexicon: BDAG
  rationale: Here ἐπεί introduces the reason for God's swearing by himself. 'Since'
    captures the causal sense smoothly in English.
- source_word: κατ’ οὐδενὸς ... μείζονος
  chosen: no one greater
  alternatives:
  - nothing greater
  - none greater
  lexicon: BDAG
  rationale: Although οὐδενός can be rendered 'nothing/no one,' the context is oath-taking
    'by' a greater party, which naturally points to a personal referent. 'No one greater'
    best fits the idiom and the following infinitive ὀμόσαι.
- source_word: ὀμόσαι
  chosen: to swear
  alternatives:
  - to take an oath
  lexicon: BDAG
  rationale: 'The aorist infinitive after εἶχεν expresses what God had no one greater
    to do: ''to swear.'' This is the standard rendering and keeps the verbal connection
    with ὤμοσεν.'
- source_word: ὤμοσεν
  chosen: he swore
  alternatives:
  - he took an oath
  lexicon: BDAG
  rationale: Aorist active indicative of ὀμνύω. 'He swore' is concise, direct, and
    preserves the lexical repetition with ὀμόσαι.
- source_word: καθ’ ἑαυτοῦ
  chosen: by himself
  alternatives:
  - on his own behalf
  lexicon: BDAG
  rationale: In oath formula language, κατά with the reflexive means swearing by oneself.
    'By himself' is the idiomatic English equivalent and preserves the theological
    force that God invokes no authority higher than himself.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Now
  - Indeed
  lexicon: BDAG
  rationale: γάρ connects this verse to the preceding argument as an explanation.
    'For' preserves the logical relation more transparently than a looser connective.
- source_word: Τῷ ... Ἀβραὰμ
  chosen: to Abraham
  alternatives:
  - for Abraham
  lexicon: BDAG
  rationale: The dative with ἐπαγγειλάμενος marks the recipient of the promise. 'To
    Abraham' is the most straightforward rendering.
