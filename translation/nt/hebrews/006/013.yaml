theological_decisions:
- issue: Nature of God's oath
  chosen_reading: God swore by himself because there was no one greater by whom he
    could swear.
  rationale: The verse presents God's self-oath as grounded in his unique supremacy.
    The translation preserves that claim without expanding it into later doctrinal
    formulations beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
