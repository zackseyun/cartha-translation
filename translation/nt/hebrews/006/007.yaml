id: HEB.6.7
reference: Hebrews 6:7
source:
  edition: SBLGNT
  text: γῆ γὰρ ἡ πιοῦσα τὸν ἐπ’ αὐτῆς ⸂ἐρχόμενον πολλάκις⸃ ὑετόν, καὶ τίκτουσα βοτάνην
    εὔθετον ἐκείνοις δι’ οὓς καὶ γεωργεῖται, μεταλαμβάνει εὐλογίας ἀπὸ τοῦ θεοῦ·
translation:
  text: For land that drinks the rain that often comes upon it and produces vegetation
    useful to those for whose sake it is also cultivated receives blessing from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plants,' 'herbage,' or 'crop' for 'vegetation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for those by whom it is cultivated,' though 'for whose sake it is cultivated'
      better reflects διά with the accusative here.
    reason: alternative_reading
lexical_decisions:
- source_word: γῆ
  chosen: land
  alternatives:
  - earth
  - soil
  - ground
  lexicon: BDAG
  rationale: In this agricultural metaphor, 'land' best captures a tract of ground
    under cultivation. 'Earth' is too broad/cosmic, and 'soil' is narrower than the
    image requires.
- source_word: πιοῦσα
  chosen: drinks
  alternatives:
  - having drunk
  - absorbs
  lexicon: BDAG
  rationale: The participle is metaphorical and vivid; 'drinks' preserves the personified
    imagery of the land receiving rain better than the flatter 'absorbs.'
- source_word: τὸν ἐπ’ αὐτῆς ἐρχόμενον πολλάκις ὑετόν
  chosen: the rain that often comes upon it
  alternatives:
  - the rain falling on it again and again
  - the frequently coming rain upon it
  lexicon: BDAG
  rationale: This renders the article-participle construction idiomatically while
    preserving πολλάκις ('often') and ἐπ’ αὐτῆς ('upon it'). 'Rain' is the natural
    English equivalent of ὑετός.
- source_word: τίκτουσα
  chosen: produces
  alternatives:
  - bears
  - brings forth
  lexicon: BDAG
  rationale: '''Produces'' is natural modern English for land yielding crops, while
    still reflecting the generative sense of the participle. ''Bears'' and ''brings
    forth'' are possible but less idiomatic here.'
- source_word: βοτάνην
  chosen: vegetation
  alternatives:
  - plants
  - herbage
  - crop
  lexicon: BDAG
  rationale: βοτάνη refers broadly to plant growth/herbage. 'Vegetation' preserves
    the breadth without implying a specific cultivated crop, which suits the general
    image.
- source_word: εὔθετον
  chosen: useful
  alternatives:
  - fit
  - suitable
  lexicon: BDAG
  rationale: The adjective denotes suitability or usefulness. 'Useful' is clear modern
    English and fits the practical agricultural context.
- source_word: ἐκείνοις δι’ οὓς καὶ γεωργεῖται
  chosen: to those for whose sake it is also cultivated
  alternatives:
  - for those by whom it is cultivated
  - for those for whom it is farmed
  lexicon: BDAG
  rationale: διά with the accusative most naturally expresses reason/purpose ('because
    of,' 'for the sake of'), not agency. Thus the sense is that the land is cultivated
    for the benefit of certain people, not necessarily by them. 'Also' reflects καί,
    linking cultivation with the prior description.
- source_word: γεωργεῖται
  chosen: it is also cultivated
  alternatives:
  - it is farmed
  - it is tilled
  lexicon: BDAG
  rationale: The passive verb refers to agricultural working of the land. 'Cultivated'
    is broad and idiomatic, fitting the metaphor better than the more specific 'tilled.'
- source_word: μεταλαμβάνει
  chosen: receives
  alternatives:
  - shares in
  - partakes of
  lexicon: BDAG
  rationale: In context the land is said to come into possession of blessing from
    God. 'Receives' is the clearest idiomatic rendering; 'partakes of' is more wooden
    and less natural in English.
- source_word: εὐλογίας ἀπὸ τοῦ θεοῦ
  chosen: blessing from God
  alternatives:
  - a blessing from God
  lexicon: BDAG
  rationale: The anarthrous genitive construction is naturally rendered without forcing
    the English article. 'Blessing from God' preserves the source sense and keeps
    the statement proverbial.
