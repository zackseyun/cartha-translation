id: HEB.6.10
reference: Hebrews 6:10
source:
  edition: SBLGNT
  text: οὐ γὰρ ἄδικος ὁ θεὸς ἐπιλαθέσθαι τοῦ ἔργου ὑμῶν ⸀καὶ τῆς ἀγάπης ἧς ἐνεδείξασθε
    εἰς τὸ ὄνομα αὐτοῦ, διακονήσαντες τοῖς ἁγίοις καὶ διακονοῦντες.
translation:
  text: For God is not unjust so as to forget your work and the love that you showed
    for his name by having served the saints and by continuing to serve them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sake of his name.'
    reason: lexical_alternative
  - marker: b
    text: That is, fellow believers; 'saints' here refers to God's holy people, not
      a later canonized class.
    reason: cultural_note
lexical_decisions:
- source_word: ἄδικος
  chosen: unjust
  alternatives:
  - unrighteous
  lexicon: BDAG
  rationale: In this context the sense is that God would not act unfairly or contrary
    to justice by overlooking their faithful deeds. 'Unjust' is the most natural modern
    English rendering here; 'unrighteous' is possible but sounds less idiomatic in
    this construction.
- source_word: ἐπιλαθέσθαι
  chosen: to forget
  alternatives:
  - to neglect
  - to overlook
  lexicon: BDAG
  rationale: The infinitive means 'to forget,' with the idiomatic sense of failing
    to remember in action. 'Forget' preserves the direct lexical sense while allowing
    the context to imply that God will not fail to take their deeds into account.
- source_word: ἔργου
  chosen: work
  alternatives:
  - deed
  - labor
  lexicon: BDAG
  rationale: ἔργον is broadly 'work' or 'deed.' 'Work' fits the singular collective
    sense here and pairs naturally with the following phrase about love expressed
    in service.
- source_word: ἀγάπης
  chosen: love
  lexicon: BDAG
  rationale: Per the project's default rendering for ἀγάπη, 'love' is used. The context
    concerns concrete love shown toward God's name through service to fellow believers.
- source_word: ἐνεδείξασθε
  chosen: you showed
  alternatives:
  - you demonstrated
  - you displayed
  lexicon: BDAG
  rationale: The verb denotes giving evidence or demonstrating something. 'You showed'
    is clear, natural English and adequately conveys manifested love.
- source_word: εἰς τὸ ὄνομα αὐτοῦ
  chosen: for his name
  alternatives:
  - toward his name
  - for the sake of his name
  lexicon: BDAG
  rationale: The phrase indicates direction or devotion toward God's name, meaning
    for his honor and in allegiance to him. 'For his name' is concise and idiomatic,
    while preserving the biblical significance of 'name' rather than paraphrasing
    it away.
- source_word: διακονήσαντες
  chosen: having served
  alternatives:
  - having ministered
  lexicon: BDAG
  rationale: The aorist participle points to past acts of service. 'Having served'
    captures the antecedent action relative to the present participle that follows.
- source_word: τοῖς ἁγίοις
  chosen: the saints
  alternatives:
  - the holy ones
  - God's people
  lexicon: BDAG
  rationale: ἅγιοι in the plural commonly refers to believers as 'saints.' This preserves
    the established NT term without importing a later technical canonization sense.
    'God's people' is interpretive and is preserved as an alternative sense.
- source_word: διακονοῦντες
  chosen: continuing to serve them
  alternatives:
  - and serving
  - and ministering
  lexicon: BDAG
  rationale: The present participle contrasts with the preceding aorist participle,
    highlighting ongoing service. 'Continuing to serve them' makes the aspectual distinction
    explicit in natural English; 'them' is supplied from the prior object for clarity.
