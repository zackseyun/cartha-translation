theological_decisions:
- issue: Whether the verse teaches merit before God or God's faithful recognition
    of believers' deeds
  chosen_reading: The wording presents God as just in not forgetting their work and
    love, without implying that their deeds earn salvation.
  alternative_readings:
  - A stronger merit-oriented reading in which God owes reward because of human works
  rationale: The Greek states that God is not unjust to forget their work and love.
    The translation preserves that claim of divine justice and remembrance while avoiding
    wording that would overstate a doctrine of meritorious earning not explicit in
    the verse.
  doctrine_reference: Affirmations; Translation philosophy §3
