id: HEB.6.6
reference: Hebrews 6:6
source:
  edition: SBLGNT
  text: καὶ παραπεσόντας, πάλιν ἀνακαινίζειν εἰς μετάνοιαν, ἀνασταυροῦντας ἑαυτοῖς
    τὸν υἱὸν τοῦ θεοῦ καὶ παραδειγματίζοντας.
translation:
  text: and who have fallen away, to renew them again to a change of mind, since they are
    crucifying again for themselves the Son of God and exposing him to public shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have committed apostasy.' The Greek verb can denote a serious falling
      away.
    reason: lexical_alternative
  - marker: b
    text: Or 'while they are crucifying again for themselves the Son of God and exposing
      him to public shame.' The Greek participles may be taken as contemporaneous
      as well as explanatory.
    reason: alternative_reading
lexical_decisions:
- source_word: παραπεσόντας
  chosen: have fallen away
  alternatives:
  - have committed apostasy
  - have fallen
  lexicon: BDAG
  rationale: Aorist participle from παραπίπτω denotes a serious falling away or apostasy
    in context. 'Have fallen away' is idiomatic modern English and preserves the gravity
    without importing a later technical theological label into the main text.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - back
  lexicon: BDAG
  rationale: The adverb most naturally modifies ἀνακαινίζειν ('to renew again'), expressing
    repetition. 'Again' is concise and preserves the syntax.
- source_word: ἀνακαινίζειν
  chosen: to renew
  alternatives:
  - to restore
  - to make new
  lexicon: BDAG
  rationale: The infinitive means to renew or restore to a former state. 'To renew'
    best matches the lexical sense and traditional theological discussion while remaining
    clear in modern English.
- source_word: εἰς μετάνοιαν
  chosen: to a change of mind
  alternatives:
  - for repentance
  - unto repentance
  lexicon: BDAG
  rationale: εἰς with μετάνοιαν expresses goal or result. 'To repentance' is natural
    English and preserves the directional force without archaic wording.
- source_word: ἀνασταυροῦντας
  chosen: are crucifying again
  alternatives:
  - are recrucifying
  - are crucifying anew
  lexicon: BDAG
  rationale: 'Present participle explains the basis for the impossibility: they are
    in effect crucifying again. Rendering the present participle with progressive
    aspect (''are crucifying again'') preserves the ongoing force better than a simple
    English participle alone.'
- source_word: ἑαυτοῖς
  chosen: for themselves
  alternatives:
  - to themselves
  lexicon: BDAG
  rationale: 'The dative reflexive likely indicates reference or disadvantage/interest:
    in relation to themselves, for themselves. ''For themselves'' is the most idiomatic
    and conveys that this action is their own culpable stance.'
- source_word: τὸν υἱὸν τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Standard and direct rendering of the christological title. It preserves
    the definite article and the full theological weight of the expression.
- source_word: παραδειγματίζοντας
  chosen: exposing him to public shame
  alternatives:
  - holding him up to contempt
  - making a public example of him
  lexicon: BDAG
  rationale: The verb denotes public exposure to disgrace or shame. 'Exposing him
    to public shame' is clear, contemporary, and captures the social-honor dimension
    better than the more idiomatic but less transparent 'making a public example of.'
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The paired conjunctions coordinate the two participles explaining the
    circumstance. Simple 'and' keeps the flow natural in English.
