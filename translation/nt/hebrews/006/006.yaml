theological_decisions:
- issue: Whether the verse should explicitly state impossibility from the previous
    verse or stand independently
  chosen_reading: The English begins with 'and' and supplies no new finite verb, allowing
    the infinitive phrase to continue the syntax from Hebrews 6:4–6, where the impossibility
    is stated.
  alternative_readings:
  - It is impossible ... to renew again those who have fallen away
  rationale: The Greek verse is syntactically dependent on the previous context. This
    draft preserves that dependence rather than repeating 'it is impossible' in this
    verse alone, while still making the English readable.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Nature of the falling away
  chosen_reading: Rendered as 'have fallen away' without specifying whether this describes
    loss of salvation, apparent faith only, or covenantal apostasy of another kind.
  alternative_readings:
  - have apostatized
  - have committed final apostasy
  rationale: The verse is central in debates over perseverance and apostasy, but the
    Greek itself does not settle later doctrinal systems. The translation therefore
    preserves the warning's force without importing a denominational conclusion.
  doctrine_reference: Within historic orthodoxy, do not advocate a denominational
    distinctive unless the Greek unambiguously supports it.
- issue: Force of the participles ἀνασταυροῦντας and παραδειγματίζοντας
  chosen_reading: Rendered causally with 'since they are crucifying again ... and
    exposing him to public shame.'
  alternative_readings:
  - while they are crucifying again ... and exposing him to public shame
  - as they crucify again ... and expose him to public shame
  rationale: The participles most plausibly explain why renewal is impossible, but
    they can also be read as contemporaneous. 'Since' makes the explanatory force
    explicit for English readers while remaining within the semantic range of participial
    usage.
  doctrine_reference: Optimal equivalence; preserve meaning without over-paraphrase.
