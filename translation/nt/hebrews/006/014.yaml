id: HEB.6.14
reference: Hebrews 6:14
source:
  edition: SBLGNT
  text: λέγων· ⸀Εἰ μὴν εὐλογῶν εὐλογήσω σε καὶ πληθύνων πληθυνῶ σε·
translation:
  text: saying, “Surely I will bless you and multiply you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''blessing I will bless you and multiplying I will multiply you,''
      an emphatic construction echoing Genesis 22:17.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - saying that
  - when he said
  lexicon: BDAG
  rationale: Present participle introducing the content of God's oath citation; 'saying'
    is the most direct and natural rendering in English.
- source_word: Εἰ μὴν
  chosen: Surely
  alternatives:
  - Indeed
  - Certainly
  lexicon: BDAG
  rationale: This idiomatic combination functions as a strong asseveration in oath
    language, not a literal conditional. 'Surely' captures the emphatic force in clear
    modern English.
- source_word: εὐλογῶν εὐλογήσω
  chosen: I will bless
  alternatives:
  - blessing I will bless
  - I will surely bless
  lexicon: BDAG
  rationale: This participle + finite verb construction reflects a Semitic-style emphatic
    duplication (echoing the LXX of Gen 22:17). English normally expresses the force
    with a simple future or an adverbial intensifier. The main text uses smooth English,
    while the emphatic alternative is preserved in a footnote.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Second person singular direct object, referring to Abraham in the quoted
    promise.
- source_word: καὶ
  chosen: and
  alternatives:
  - and indeed
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two promised actions.
- source_word: πληθύνων πληθυνῶ
  chosen: multiply you
  alternatives:
  - greatly multiply you
  - multiplying I will multiply you
  - make you numerous
  lexicon: BDAG
  rationale: Like the previous duplicated verbal form, this is an emphatic future
    promise. 'Multiply you' preserves the direct verbal form of the Greek and its
    allusion to the Abrahamic promise better than the more interpretive 'make you
    numerous.' The emphatic nuance is preserved in a footnote.
