theological_decisions:
- issue: Rendering the emphatic oath formula quoted from the Abrahamic promise
  chosen_reading: Use idiomatic English ('Surely I will bless you and multiply you')
    while preserving the underlying emphatic duplication in a footnote.
  alternative_readings:
  - 'More formally: ''Surely, blessing I will bless you and multiplying I will multiply
    you'''
  - 'Expanded idiomatic: ''Surely I will surely bless you and greatly multiply you'''
  rationale: The verse quotes God's oath to Abraham in language that reproduces a
    Hebrew/LXX emphatic infinitive/participle-like duplication. Optimal equivalence
    favors readable English in the main text while documenting the formal emphasis
    for auditability and intertextual awareness.
  doctrine_reference: Translation philosophy §1, §3, §6
