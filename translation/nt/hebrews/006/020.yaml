id: HEB.6.20
reference: Hebrews 6:20
source:
  edition: SBLGNT
  text: ὅπου πρόδρομος ὑπὲρ ἡμῶν εἰσῆλθεν Ἰησοῦς, κατὰ τὴν τάξιν Μελχισέδεκ ἀρχιερεὺς
    γενόμενος εἰς τὸν αἰῶνα.
translation:
  text: where Jesus has entered as a forerunner on our behalf, having become a high
    priest forever according to the order of Melchizedek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for us.' The Greek phrase can express action for the benefit of others;
      here it emphasizes Jesus' representative entry.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the order of Melchizedek,' echoing Psalm 110:4.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπου
  chosen: where
  alternatives:
  - into which
  - there
  lexicon: BDAG
  rationale: Refers back to the inner place behind the curtain in the previous verse;
    'where' is the most natural English connector and preserves the locative sense
    without over-specifying.
- source_word: πρόδρομος
  chosen: forerunner
  alternatives:
  - runner ahead
  - precursor
  lexicon: BDAG
  rationale: '''Forerunner'' best captures the metaphor of one who goes ahead to open
    the way for others. It preserves the theological force of Jesus entering first
    on behalf of believers.'
- source_word: ὑπὲρ ἡμῶν
  chosen: on our behalf
  alternatives:
  - for us
  - in our place
  lexicon: BDAG
  rationale: ὑπέρ here most naturally expresses representation/benefit. 'On our behalf'
    is precise and avoids importing a stronger substitutionary nuance than the phrase
    itself requires in this context.
- source_word: εἰσῆλθεν
  chosen: has entered
  alternatives:
  - entered
  - went in
  lexicon: BDAG
  rationale: Although the Greek is aorist, English present perfect fits the discourse
    well because the entry has abiding present significance for the readers' hope.
- source_word: Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, in keeping with the policy
    to transliterate names.
- source_word: κατὰ τὴν τάξιν Μελχισέδεκ
  chosen: according to the order of Melchizedek
  alternatives:
  - in the order of Melchizedek
  - after the order of Melchizedek
  lexicon: BDAG
  rationale: This phrase echoes Psalm 110:4 and denotes patterned correspondence or
    appointment. 'According to the order of Melchizedek' is clear, fairly formal,
    and preserves the intertextual resonance.
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the cultic office central to Hebrews'
    argument.
- source_word: γενόμενος
  chosen: having become
  alternatives:
  - becoming
  - having been made
  lexicon: BDAG
  rationale: The participle is best rendered as antecedent or attendant to the main
    clause, indicating the status in which Jesus entered. 'Having become' is natural
    English and avoids implying creaturely origin while still reflecting the verbal
    form.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: Idiomatic expression meaning enduring permanence. 'Forever' is the clearest
    modern English equivalent in this context.
