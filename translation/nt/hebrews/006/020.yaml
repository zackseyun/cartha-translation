theological_decisions:
- issue: Relation of γενόμενος ('having become') to Christology
  chosen_reading: Retained 'having become a high priest' as an appointment-to-office
    statement, not a change in divine nature.
  alternative_readings:
  - having been appointed high priest
  - being made high priest
  rationale: The verse speaks of Jesus' priestly status and role within salvation
    history. The translation must not flatten the participle away, but neither should
    it suggest that the Son came into existence or changed in essence. This aligns
    with orthodox Christology while staying close to the Greek.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon
    (451 AD)'
- issue: Force of ὑπὲρ ἡμῶν
  chosen_reading: Rendered representationally as 'on our behalf.'
  alternative_readings:
  - for us
  - in our place
  rationale: The context emphasizes Jesus entering ahead of believers into the heavenly
    holy place. 'On our behalf' preserves that representative sense without resolving
    the phrase into a narrower atonement formula not explicit in this verse.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
