theological_decisions:
- issue: Meaning of 'full assurance of hope' in relation to perseverance
  chosen_reading: The phrase is rendered without importing a later doctrinal system;
    it expresses the readers' hope reaching full certainty and continuing to the end.
  alternative_readings:
  - 'A stronger subjective sense: complete inward certainty of salvation'
  - 'A more objective sense: the full realization of the hoped-for promise'
  rationale: The Greek allows overlap between subjective assurance and the settled
    certainty attached to Christian hope. The translation preserves that theological
    tension rather than narrowing it to one confessional formulation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
