id: HEB.6.11
reference: Hebrews 6:11
source:
  edition: SBLGNT
  text: ἐπιθυμοῦμεν δὲ ἕκαστον ὑμῶν τὴν αὐτὴν ἐνδείκνυσθαι σπουδὴν πρὸς τὴν πληροφορίαν
    τῆς ἐλπίδος ἄχρι τέλους,
translation:
  text: And we desire each one of you to show the same diligence for the full assurance
    of hope until the end,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'complete confidence of hope.' The Greek term can denote fullness of
      certainty or assurance.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the end.' The phrase emphasizes perseverance through to completion.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμοῦμεν
  chosen: we desire
  alternatives:
  - we want
  - we long
  lexicon: BDAG
  rationale: The verb can denote strong desire or longing. Here it introduces pastoral
    exhortation rather than craving, so 'we desire' preserves the earnestness without
    sounding overly emotional or colloquial.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ marks a mild transition from the preceding reassurance to renewed
    exhortation. 'And' fits the flow in modern English better than the more contrastive
    'but,' while still signaling continuation.
- source_word: ἕκαστον ὑμῶν
  chosen: each one of you
  alternatives:
  - every one of you
  - each of you
  lexicon: BDAG
  rationale: This phrase emphasizes the individual application of the exhortation
    within the group. 'Each one of you' preserves that distributive force clearly.
- source_word: τὴν αὐτὴν
  chosen: the same
  alternatives:
  - this same
  lexicon: BDAG
  rationale: Refers back to the diligence already evidenced in love and service (vv.
    10, 12). 'The same' is the natural English equivalent.
- source_word: ἐνδείκνυσθαι
  chosen: to show
  alternatives:
  - to demonstrate
  - to display
  lexicon: BDAG
  rationale: The middle infinitive here conveys exhibiting or demonstrating a quality.
    'To show' is clear, idiomatic, and sufficiently close to the Greek.
- source_word: σπουδὴν
  chosen: diligence
  alternatives:
  - earnestness
  - zeal
  lexicon: BDAG
  rationale: σπουδή can mean eagerness, earnestness, or diligence. In this exhortational
    context, 'diligence' best captures sustained, active seriousness rather than mere
    emotional zeal.
- source_word: πρὸς
  chosen: for
  alternatives:
  - toward
  - unto
  lexicon: BDAG
  rationale: Here πρός expresses goal or purpose in relation to 'the full assurance
    of hope.' 'For' gives natural English while preserving the directional sense.
- source_word: πληροφορίαν
  chosen: full assurance
  alternatives:
  - full certainty
  - complete confidence
  lexicon: BDAG
  rationale: A standard sense of πληροφορία in Hebrews is a state of complete certainty
    or full assurance. 'Full assurance' is both accurate and established in English
    usage without being archaic.
- source_word: ἐλπίδος
  chosen: hope
  lexicon: BDAG
  rationale: The noun denotes hope, not mere wishfulness but confident expectation
    grounded in God's promise. 'Hope' is the direct and appropriate rendering.
- source_word: ἄχρι τέλους
  chosen: until the end
  alternatives:
  - to the end
  lexicon: BDAG
  rationale: The phrase marks perseverance through to the intended completion. 'Until
    the end' is straightforward and idiomatic, preserving the temporal force.
