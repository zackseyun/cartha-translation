id: HEB.6.8
reference: Hebrews 6:8
source:
  edition: SBLGNT
  text: ἐκφέρουσα δὲ ἀκάνθας καὶ τριβόλους ἀδόκιμος καὶ κατάρας ἐγγύς, ἧς τὸ τέλος
    εἰς καῦσιν.
translation:
  text: But if it bears thorns and thistles, it is worthless and near to a curse,
    and its end is for burning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rejected' for 'worthless' (ἀδόκιμος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκφέρουσα
  chosen: bears
  alternatives:
  - produces
  - brings forth
  lexicon: BDAG
  rationale: Present participle feminine singular agreeing with the implied 'land'
    from the prior verse. 'Bears' is natural English for land/crop imagery and preserves
    the ongoing/resultative sense without over-literal awkwardness.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the fruitful land in v. 7. 'But' best conveys the
    adversative force in context.
- source_word: ἀκάνθας
  chosen: thorns
  lexicon: BDAG
  rationale: Standard rendering for the plant imagery; pairs naturally with τριβόλους
    in an agricultural warning context.
- source_word: τριβόλους
  chosen: thistles
  alternatives:
  - briers
  lexicon: BDAG
  rationale: A prickly weed term paired with 'thorns.' 'Thistles' is clear modern
    English and preserves the agricultural metaphor better than the less common 'briers.'
- source_word: ἀδόκιμος
  chosen: worthless
  alternatives:
  - rejected
  - disqualified
  - unapproved
  lexicon: BDAG
  rationale: Describes land that fails the test of usefulness. 'Worthless' fits the
    agricultural context better in the main text than the more interpretively loaded
    'rejected,' while preserving the negative evaluative sense.
- source_word: κατάρας ἐγγύς
  chosen: near to a curse
  alternatives:
  - close to being cursed
  - near cursing
  lexicon: BDAG
  rationale: The genitive with ἐγγύς is naturally rendered 'near to a curse.' This
    preserves the text's wording without prematurely converting it into a finite verbal
    idea ('being cursed').
- source_word: ἧς
  chosen: its
  alternatives:
  - whose
  lexicon: BDAG
  rationale: Refers back to the feminine antecedent implied from the land/field image.
    English idiom prefers 'its' here.
- source_word: τέλος
  chosen: end
  alternatives:
  - outcome
  - destiny
  lexicon: BDAG
  rationale: '''End'' is concise and preserves both temporal and teleological force.
    ''Outcome'' is possible but slightly more interpretive.'
- source_word: εἰς καῦσιν
  chosen: for burning
  alternatives:
  - to be burned
  - for destruction by fire
  lexicon: BDAG
  rationale: A purpose/result expression. 'For burning' is close to the Greek and
    avoids over-specifying whether the image is purely agricultural or extends beyond
    it.
