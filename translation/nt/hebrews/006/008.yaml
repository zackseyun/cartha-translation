theological_decisions:
- issue: Whether the verse should be rendered in a way that explicitly identifies
    the subject as 'land' or 'field' from the previous verse
  chosen_reading: Use 'it' rather than repeating 'land' in the main text
  alternative_readings:
  - But land that bears thorns and thistles...
  - But if the ground produces thorns and thistles...
  rationale: The participle is feminine and clearly continues the agricultural metaphor
    from v. 7, but English can naturally carry the antecedent with 'it.' This avoids
    adding a noun not repeated in the Greek while preserving the metaphorical continuity.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether ἀδόκιμος should be rendered with a stronger theological term such
    as 'rejected'
  chosen_reading: Render as 'worthless' in the main text and preserve 'rejected' in
    a footnote
  alternative_readings:
  - rejected
  - disqualified
  - unapproved
  rationale: The immediate image is agricultural usefulness, so 'worthless' best fits
    the plain sense. Because 'rejected' is a common and weightier alternative with
    possible theological implications, it is preserved in a footnote rather than made
    the main text.
  doctrine_reference: Translation philosophy §3, §5
- issue: Whether εἰς καῦσιν should be made more explicit as final judgment
  chosen_reading: Retain the image 'for burning' without explicating it as hell or
    final condemnation
  alternative_readings:
  - to be burned
  - for judgment by fire
  rationale: The verse uses an agricultural metaphor and does not itself specify the
    full doctrinal referent. Preserving the image maintains the text's theological
    tension and avoids importing a more specific doctrinal claim than the Greek states.
  doctrine_reference: Affirmations; Translation philosophy §3
