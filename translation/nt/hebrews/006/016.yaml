id: HEB.6.16
reference: Hebrews 6:16
source:
  edition: SBLGNT
  text: ⸀ἄνθρωποι γὰρ κατὰ τοῦ μείζονος ὀμνύουσιν, καὶ πάσης αὐτοῖς ἀντιλογίας πέρας
    εἰς βεβαίωσιν ὁ ὅρκος·
translation:
  text: For people swear by one greater than themselves, and for them an oath is the
    end of every dispute for confirmation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men swear by one greater.' The Greek ἄνθρωποι is generic for human beings.
    reason: lexical_alternative
  - marker: b
    text: Or 'every objection' or 'every controversy' for 'every dispute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωποι
  chosen: people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Generic plural referring to human beings in general, not specifically
    males. 'People' conveys the representative sense in natural modern English while
    preserving the contrast with God in the surrounding context.
- source_word: κατὰ τοῦ μείζονος
  chosen: by one greater than themselves
  alternatives:
  - by the greater
  - by someone greater
  lexicon: BDAG
  rationale: In oath formulas κατά with the genitive can mean 'by' in the sense of
    invoking a higher authority. 'One greater than themselves' makes explicit the
    comparative force of μείζονος in idiomatic English without adding a specific referent
    absent from the Greek.
- source_word: ὀμνύουσιν
  chosen: swear
  alternatives:
  - take an oath
  - swear an oath
  lexicon: BDAG
  rationale: Simple present 'swear' is the most direct rendering. The object 'oath'
    is supplied later in the verse, so repeating it here is unnecessary.
- source_word: πάσης ... ἀντιλογίας
  chosen: every dispute
  alternatives:
  - every contradiction
  - every objection
  - every controversy
  lexicon: BDAG
  rationale: ἀντιλογία here denotes dispute or contention in a legal/social setting
    rather than mere logical contradiction. 'Every dispute' fits the context of oath-taking
    as settling contested matters.
- source_word: πέρας
  chosen: the end
  alternatives:
  - a limit
  - a conclusion
  - a settlement
  lexicon: BDAG
  rationale: πέρας literally means 'end' or 'termination.' In context it refers to
    what brings a dispute to its close. 'The end' preserves the metaphor and remains
    clear in English.
- source_word: εἰς βεβαίωσιν
  chosen: for confirmation
  alternatives:
  - for assurance
  - as confirmation
  - for ratification
  lexicon: BDAG
  rationale: βεβαίωσις carries the sense of confirmation or validation. 'For confirmation'
    closely reflects εἰς + accusative expressing purpose/result.
- source_word: ὁ ὅρκος
  chosen: an oath
  alternatives:
  - the oath
  lexicon: BDAG
  rationale: 'Although the Greek has the article, English idiom prefers the indefinite
    here in a general statement: ''an oath is the end...'' rather than ''the oath
    is...''.'
