id: HEB.6.17
reference: Hebrews 6:17
source:
  edition: SBLGNT
  text: ἐν ᾧ περισσότερον βουλόμενος ὁ θεὸς ἐπιδεῖξαι τοῖς κληρονόμοις τῆς ἐπαγγελίας
    τὸ ἀμετάθετον τῆς βουλῆς αὐτοῦ ἐμεσίτευσεν ὅρκῳ,
translation:
  text: So when God desired to show more clearly to the heirs of the promise the unchangeable
    character of his purpose, he guaranteed it with an oath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he interposed with an oath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the immutability of his counsel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  chosen: So when
  alternatives:
  - In which
  - Therefore
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers back to the preceding discussion about
    God's oath to Abraham. A wooden 'in which' is unclear in English; 'So when' captures
    the connective force and temporal/logical relation in readable modern English.
- source_word: περισσότερον
  chosen: more clearly
  alternatives:
  - more abundantly
  - more fully
  - all the more
  lexicon: BDAG
  rationale: The adverbial comparative intensifies God's intent to demonstrate his
    purpose. 'More clearly' expresses the sense in natural English in connection with
    ἐπιδεῖξαι ('to show, demonstrate'). 'More abundantly' is traditional but less
    idiomatic here.
- source_word: βουλόμενος
  chosen: desired
  alternatives:
  - willing
  - wanting
  - intending
  lexicon: BDAG
  rationale: As a participle modifying ὁ θεός, it expresses God's deliberate intention.
    'Desired' is natural English and avoids suggesting mere wishfulness; the context
    shows purposeful resolve.
- source_word: ἐπιδεῖξαι
  chosen: to show
  alternatives:
  - to demonstrate
  - to make plain
  lexicon: BDAG
  rationale: The verb means to show or demonstrate. Because περισσότερον already carries
    the intensifying nuance, 'to show more clearly' is smoother than 'to demonstrate
    more clearly' while preserving the sense.
- source_word: κληρονόμοις
  chosen: the heirs
  alternatives:
  - those who inherit
  - the inheritors
  lexicon: BDAG
  rationale: '''Heirs'' is the standard and precise rendering for those designated
    to receive an inheritance. It fits the covenantal and promise context of Hebrews.'
- source_word: τῆς ἐπαγγελίας
  chosen: of the promise
  alternatives:
  - of the promised thing
  - of his promise
  lexicon: BDAG
  rationale: The genitive is best rendered straightforwardly. 'The promise' likely
    refers to the divine promise already under discussion; adding 'his' is interpretively
    possible but not required by the Greek.
- source_word: τὸ ἀμετάθετον
  chosen: the unchangeable character
  alternatives:
  - the unchangeableness
  - the immutability
  - the unalterable nature
  lexicon: BDAG
  rationale: The adjective used substantivally denotes what cannot be changed or transferred.
    'Unchangeable character' communicates the abstract quality in accessible modern
    English without overly technical theological jargon like 'immutability.'
- source_word: τῆς βουλῆς αὐτοῦ
  chosen: of his purpose
  alternatives:
  - of his plan
  - of his resolve
  - of his counsel
  lexicon: BDAG
  rationale: βουλή here refers to God's deliberate purpose or resolve. 'Purpose' is
    clear and weighty in modern English; 'counsel' is traditional but can sound archaic
    or misleading.
- source_word: ἐμεσίτευσεν
  chosen: he guaranteed it
  alternatives:
  - he confirmed it
  - he intervened
  - he mediated
  lexicon: BDAG
  rationale: The verb literally relates to acting as a mediator or interposing, here
    in the sense of giving assurance by means of an oath. 'Guaranteed it' best conveys
    the functional meaning in context. The supplied object 'it' is implicit from the
    clause and natural in English.
- source_word: ὅρκῳ
  chosen: with an oath
  alternatives:
  - by an oath
  lexicon: BDAG
  rationale: The dative is instrumental. 'With an oath' is idiomatic English and clearly
    expresses the means by which God guaranteed the promise.
