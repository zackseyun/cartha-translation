theological_decisions:
- issue: Rendering God's purpose as unchangeable without importing later metaphysical
    categories
  chosen_reading: the unchangeable character of his purpose
  alternative_readings:
  - the immutability of his counsel
  - his unchangeable purpose
  rationale: The verse explicitly emphasizes the fixed, unalterable nature of God's
    purpose. The chosen wording preserves that theological force while staying close
    to the Greek and avoiding unnecessary technical terminology not required by the
    text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of ἐμεσίτευσεν in relation to God's oath
  chosen_reading: he guaranteed it with an oath
  alternative_readings:
  - he confirmed it by an oath
  - he interposed with an oath
  rationale: The context is God's added assurance to the heirs of the promise. 'Guaranteed
    it' communicates the practical force of the verb in context without obscuring
    the oath's role. A more literal 'interposed' is possible but opaque in contemporary
    English.
  doctrine_reference: Translation philosophy §§1, 6
