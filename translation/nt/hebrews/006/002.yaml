theological_decisions:
- issue: Meaning of βαπτισμῶν in the list of elementary teachings
  chosen_reading: Rendered as 'washings' rather than 'baptisms.'
  alternative_readings:
  - '''baptisms'' as a reference to Christian baptisms'
  rationale: The plural form and lexical usage favor ritual washings or washings more
    generally rather than the singular Christian rite. This avoids importing a specifically
    denominational sacramental reading into a debated passage while preserving the
    text's likely Jewish-catechetical background.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of κρίματος αἰωνίου
  chosen_reading: Rendered as 'eternal judgment' without specifying condemnation only.
  alternative_readings:
  - '''eternal condemnation'''
  rationale: The Greek says 'judgment,' not specifically 'condemnation.' The translation
    preserves the text's wording and theological tension without narrowing the outcome
    beyond what the verse states.
  doctrine_reference: Translation philosophy §§1, 3
