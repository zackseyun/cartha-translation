id: HEB.6.2
reference: Hebrews 6:2
source:
  edition: SBLGNT
  text: βαπτισμῶν ⸀διδαχὴν ἐπιθέσεώς τε χειρῶν, ἀναστάσεώς ⸀τε νεκρῶν καὶ κρίματος
    αἰωνίου.
translation:
  text: instruction about washings, the laying on of hands, the resurrection of the
    dead, and eternal judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instruction about baptisms.' The Greek plural can refer to ritual washings
      more broadly, not necessarily specifically Christian baptism.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαπτισμῶν
  chosen: washings
  alternatives:
  - baptisms
  - ablutions
  lexicon: BDAG
  rationale: The plural noun commonly denotes ritual washings in Jewish or ceremonial
    contexts, and the plural is significant. 'Washings' is more natural English and
    better reflects the likely broader sense than specifically Christian baptism.
    'Baptisms' is possible but may misleadingly suggest repeated Christian baptisms.
- source_word: διδαχὴν
  chosen: instruction
  alternatives:
  - teaching
  - doctrine
  lexicon: BDAG
  rationale: Accusative singular continuing the list of foundational matters from
    the previous verse. 'Instruction' fits readable modern English and can govern
    the following genitives ('about washings...'). 'Doctrine' is too ecclesiastical
    here; 'teaching' is also possible.
- source_word: ἐπιθέσεώς τε χειρῶν
  chosen: the laying on of hands
  alternatives:
  - laying on of hands
  - imposition of hands
  lexicon: BDAG
  rationale: A standard idiomatic rendering of the genitive phrase. Including the
    article in English improves readability while preserving the recognized practice
    named by the Greek.
- source_word: ἀναστάσεώς τε νεκρῶν
  chosen: the resurrection of the dead
  alternatives:
  - resurrection of dead people
  lexicon: BDAG
  rationale: This is the natural and established sense of the genitive construction.
    'The dead' is idiomatic English and preserves the collective force of νεκρῶν.
- source_word: κρίματος αἰωνίου
  chosen: eternal judgment
  alternatives:
  - everlasting judgment
  - judgment of the age to come
  lexicon: BDAG
  rationale: αἰώνιος in this context is best rendered 'eternal' in standard Christian
    eschatological usage. The phrase denotes final judgment without importing further
    doctrinal specification.
- source_word: τε ... τε καὶ
  chosen: '..., ..., and ...'
  alternatives:
  - both ... and ... and
  - as well as
  lexicon: LSJ
  rationale: The paired particles structure the list, but idiomatic English does not
    require explicit representation of each particle. A simple coordinated list preserves
    the sense cleanly.
