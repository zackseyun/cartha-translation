id: HEB.6.5
reference: Hebrews 6:5
source:
  edition: SBLGNT
  text: καὶ καλὸν γευσαμένους θεοῦ ῥῆμα δυνάμεις τε μέλλοντος αἰῶνος,
translation:
  text: and have tasted the good word of God and the powers of the coming age,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the age to come.'
    reason: lexical_alternative
  - marker: b
    text: Or 'miracles' or 'mighty works' for 'powers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  chosen: good
  alternatives:
  - excellent
  - beautiful
  lexicon: BDAG
  rationale: καλός here qualifies ῥῆμα and most naturally means 'good' in the sense
    of beneficial or excellent. 'Good' is the most natural English collocation with
    'word' and preserves the evaluative force without overinterpreting.
- source_word: γευσαμένους
  chosen: have tasted
  alternatives:
  - tasted
  - experienced
  lexicon: BDAG
  rationale: 'The participle continues the accusative plural series from the previous
    verse and is best rendered with an English perfect construction in context: ''have
    tasted.'' While γεύομαι can extend metaphorically to ''experience,'' ''tasted''
    preserves the metaphor and the lexical link to the Greek.'
- source_word: θεοῦ ῥῆμα
  chosen: the word of God
  alternatives:
  - God's word
  - the utterance of God
  lexicon: BDAG
  rationale: 'ῥῆμα often denotes a spoken word, saying, or utterance, but in idiomatic
    English ''the word of God'' is clear and natural. The genitive θεοῦ is taken straightforwardly
    as possessive/source: the word that comes from God.'
- source_word: δυνάμεις
  chosen: powers
  alternatives:
  - mighty works
  - miracles
  lexicon: BDAG
  rationale: δύναμις in the plural can denote manifestations of power, often miraculous
    works. 'Powers' is more formally transparent and leaves open whether the emphasis
    is on acts, forces, or manifestations, fitting the theological tension of the
    passage.
- source_word: τε
  chosen: and
  alternatives:
  - also
  - both
  lexicon: BDAG
  rationale: τε links δυνάμεις with the preceding object. In smooth English, simple
    'and' best represents the connective force without awkwardness.
- source_word: μέλλοντος αἰῶνος
  chosen: the coming age
  alternatives:
  - the age to come
  - the future age
  lexicon: BDAG
  rationale: This genitive phrase modifies 'powers' and refers to the eschatological
    age. 'The coming age' is idiomatic modern English and preserves the future-oriented
    eschatological sense of μέλλω + αἰών.
