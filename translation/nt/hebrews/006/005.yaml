theological_decisions:
- issue: Meaning of 'tasted' in a warning-passage context
  chosen_reading: Retain 'have tasted' without expanding it to 'fully experienced'
    or minimizing it to a merely superficial sampling.
  alternative_readings:
  - have experienced
  - have had a mere taste of
  rationale: The verse participates in Hebrews 6:4–6, a debated warning passage. The
    translation should preserve the lexical metaphor γεύομαι and not resolve the theological
    debate about the depth of the subjects' participation. Rendering it simply as
    'have tasted' maintains the text's tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of δυνάμεις in an eschatological context
  chosen_reading: Translate as 'powers' rather than 'miracles.'
  alternative_readings:
  - miracles
  - mighty works
  rationale: Because the phrase may denote miraculous manifestations associated with
    the inbreaking future age, but could also carry a broader sense of divine powers,
    'powers' preserves the ambiguity rather than narrowing the meaning.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
