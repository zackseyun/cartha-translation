- issue: Rendering of πίστις in a potentially nuanced exhortational context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where contested. In Hebrews 6:12 the term likely includes
    the sense of trusting reliance on God, but the standard rendering 'faith' best
    preserves lexical consistency and theological breadth without over-resolving the
    nuance.
