id: HEB.6.12
reference: Hebrews 6:12
source:
  edition: SBLGNT
  text: ἵνα μὴ νωθροὶ γένησθε, μιμηταὶ δὲ τῶν διὰ πίστεως καὶ μακροθυμίας κληρονομούντων
    τὰς ἐπαγγελίας.
translation:
  text: so that you may not become sluggish, but imitators of those who through faith
    and patience inherit the promises.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through faithfulness and patience.' The Greek word for 'faith' can in
      some contexts also carry the sense of 'faithfulness' or 'trust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νωθροὶ
  chosen: sluggish
  alternatives:
  - lazy
  - dull
  - slothful
  lexicon: BDAG
  rationale: The adjective denotes being slow, dull, or sluggish in response or effort.
    'Sluggish' fits the immediate context of spiritual diligence in Hebrews 5:11–6:12
    without sounding archaic like 'slothful' or overly moralistic like 'lazy'.
- source_word: γένησθε
  chosen: become
  alternatives:
  - be
  - prove to be
  lexicon: BDAG
  rationale: 'The aorist middle subjunctive of γίνομαι commonly carries an ingressive
    sense here: ''become'' rather than simply ''be,'' indicating a warning against
    falling into a state.'
- source_word: μιμηταὶ
  chosen: imitators
  alternatives:
  - followers
  lexicon: BDAG
  rationale: The noun directly means 'imitators.' 'Followers' is smoother English
    in some contexts, but 'imitators' better preserves the explicit call to model
    oneself after others.
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the phrase describes the means or manner by which the exemplars receive what was
    promised. 'Trust' is possible but less standard; 'faithfulness' is a plausible
    nuance but not necessary in the main text.
- source_word: μακροθυμίας
  chosen: patience
  alternatives:
  - longsuffering
  - steadfast endurance
  lexicon: BDAG
  rationale: μακροθυμία often denotes patient endurance over time. 'Patience' is clear
    modern English and pairs naturally with 'faith.' 'Longsuffering' is more literal
    but archaic; 'steadfast endurance' overlaps with other Greek terms such as ὑπομονή.
- source_word: κληρονομούντων
  chosen: inherit
  alternatives:
  - are inheriting
  - obtain as an inheritance
  lexicon: BDAG
  rationale: The present participle refers to those characterized as inheriting the
    promises. In English, a simple present relative clause ('those who ... inherit')
    reads naturally and captures the gnomic or characteristic force better than a
    cumbersome progressive.
- source_word: τὰς ἐπαγγελίας
  chosen: the promises
  alternatives:
  - what was promised
  lexicon: BDAG
  rationale: The plural is explicit in Greek and should be preserved. 'The promises'
    also resonates with Hebrews' repeated reference to God's covenantal promises.
- source_word: ἵνα μὴ
  chosen: so that you may not
  alternatives:
  - in order that you may not
  - that you not
  lexicon: BDAG
  rationale: This preserves the purpose/result nuance of ἵνα with μή in readable modern
    English. It connects this verse to the exhortation of the previous verse.
