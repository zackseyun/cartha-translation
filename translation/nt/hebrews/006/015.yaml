id: HEB.6.15
reference: Hebrews 6:15
source:
  edition: SBLGNT
  text: καὶ οὕτως μακροθυμήσας ἐπέτυχεν τῆς ἐπαγγελίας.
translation:
  text: And so, after waiting patiently, he obtained the promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'received what was promised.' The Greek more literally says 'obtained
      the promise.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding discussion
    about Abraham. Capitalized for sentence-initial English style.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Adverb indicating manner/result in relation to the preceding oath narrative.
    'So' is natural modern English and preserves the inferential force without sounding
    overly formal.
- source_word: μακροθυμήσας
  chosen: after waiting patiently
  alternatives:
  - having been patient
  - after being patient
  - having persevered patiently
  lexicon: BDAG
  rationale: Aorist active participle from μακροθυμέω, denoting patient endurance
    over time. Rendered with a temporal participial sense ('after waiting patiently')
    to fit idiomatic English and the narrative sequence. 'Waiting patiently' brings
    out the long-suffering aspect more clearly than the bare 'being patient' in this
    context of awaiting fulfillment.
- source_word: ἐπέτυχεν
  chosen: obtained
  alternatives:
  - received
  - attained
  - gained
  lexicon: BDAG
  rationale: Aorist verb meaning to attain or obtain. 'Obtained' fits well with the
    genitive complement and avoids overstating the nature of fulfillment. 'Received'
    is possible, but 'obtained' better reflects successful attainment after waiting.
- source_word: τῆς ἐπαγγελίας
  chosen: the promise
  alternatives:
  - what was promised
  - the promised thing
  lexicon: BDAG
  rationale: Singular noun with article, referring to the specific divine promise
    made to Abraham in the immediate context. 'The promise' preserves the lexical
    link to the surrounding passage and keeps the theological emphasis on God's pledged
    word rather than merely its content.
