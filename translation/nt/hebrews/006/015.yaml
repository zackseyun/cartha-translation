theological_decisions:
- issue: Whether ἐπέτυχεν τῆς ἐπαγγελίας should be rendered as Abraham receiving the
    full fulfillment of the promise or obtaining the promise in the sense of securing/receiving
    it from God.
  chosen_reading: Rendered as 'obtained the promise' without specifying full fulfillment.
  alternative_readings:
  - received what was promised
  - obtained what had been promised
  rationale: The Greek says 'obtained the promise,' not explicitly 'the fulfillment
    of the promise.' In Hebrews, ἐπαγγελία can refer either to the promise itself
    or its realized content depending on context. Here, preserving 'the promise' maintains
    the wording of the text and avoids importing a stronger claim than the verse itself
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
