id: HEB.6.18
reference: Hebrews 6:18
source:
  edition: SBLGNT
  text: ἵνα διὰ δύο πραγμάτων ἀμεταθέτων, ἐν οἷς ἀδύνατον ψεύσασθαι ⸀θεόν, ἰσχυρὰν
    παράκλησιν ἔχωμεν οἱ καταφυγόντες κρατῆσαι τῆς προκειμένης ἐλπίδος·
translation:
  text: so that through two unchangeable things, in which it is impossible for God
    to lie, we who have fled for refuge might have strong encouragement to seize the
    hope set before us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hold fast to the hope set before us.' The Greek verb can mean 'seize,'
      'grasp,' or 'hold firmly.'
    reason: lexical_alternative
  - marker: b
    text: '''Have fled for refuge'' likely evokes the imagery of seeking asylum or
      safety, possibly recalling the Old Testament cities of refuge.'
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result flowing from the previous verse. 'So that'
    is natural English while preserving the telic force.
- source_word: διὰ δύο πραγμάτων ἀμεταθέτων
  chosen: through two unchangeable things
  alternatives:
  - by two unchangeable matters
  - through two unalterable things
  lexicon: BDAG
  rationale: πράγματα is broad ('things,' 'matters'); 'things' is the most natural
    and sufficiently general here, referring back to God's promise and oath. ἀμετάθετος
    conveys what cannot be changed or altered; 'unchangeable' is idiomatic and precise.
- source_word: ἐν οἷς
  chosen: in which
  alternatives:
  - by which
  - with respect to which
  lexicon: BDAG
  rationale: Retains the relative connection to the two preceding 'things.' 'In which'
    is the conventional and syntactically straightforward rendering.
- source_word: ἀδύνατον ψεύσασθαι θεόν
  chosen: it is impossible for God to lie
  alternatives:
  - God cannot lie
  lexicon: BDAG
  rationale: This reproduces the impersonal construction ἀδύνατον + infinitive with
    explicit subject θεόν. 'It is impossible for God to lie' preserves the formal
    force and solemnity better than the shorter paraphrase.
- source_word: ἰσχυρὰν παράκλησιν
  chosen: strong encouragement
  alternatives:
  - strong consolation
  - powerful encouragement
  - strong comfort
  lexicon: BDAG
  rationale: παράκλησις can mean encouragement, comfort, exhortation, or consolation.
    In context of assurance grounded in God's promise and oath, 'encouragement' best
    captures the strengthening effect without sounding archaic. ἰσχυράν intensifies
    it as 'strong.'
- source_word: ἔχωμεν
  chosen: might have
  alternatives:
  - may have
  - would have
  lexicon: BDAG
  rationale: Aoristic/purpose-context subjunctive after ἵνα is well represented by
    'might have' in English, preserving intended result without overstatement.
- source_word: οἱ καταφυγόντες
  chosen: we who have fled for refuge
  alternatives:
  - we who have taken refuge
  - we who have fled
  lexicon: BDAG
  rationale: The participle evokes the imagery of fleeing to a place of safety. 'Have
    fled for refuge' preserves both the motion and the purpose, echoing likely asylum/cities-of-refuge
    imagery better than the flatter 'taken refuge.'
- source_word: κρατῆσαι
  chosen: to seize
  alternatives:
  - to hold fast to
  - to grasp
  lexicon: BDAG
  rationale: κρατέω commonly means seize, grasp firmly, or hold fast. Here the infinitive
    after the refuge imagery suggests active laying hold of the hope offered. 'Seize'
    preserves the vividness of the Greek; the more traditional 'hold fast to' is interpretive
    and may reflect the result more than the lexical core.
- source_word: τῆς προκειμένης ἐλπίδος
  chosen: the hope set before us
  alternatives:
  - the hope lying before us
  - the hope placed before us
  lexicon: BDAG
  rationale: πρόκειμαι means to be set before, lie before, or be presented. 'Set before
    us' is idiomatic and preserves the objective, offered character of the hope.
