theological_decisions:
- issue: Metaphor of refuge and hope
  chosen_reading: Retained the concrete imagery 'fled for refuge' and 'seize the hope
    set before us' rather than smoothing into abstract assurance language.
  alternative_readings:
  - we who have taken refuge might have strong encouragement to hold fast to the hope
    set before us
  rationale: The verse combines asylum imagery with active appropriation of hope.
    Preserving that tension aligns with the translation philosophy of not flattening
    vivid source-language metaphors into doctrinal paraphrase.
  doctrine_reference: Translation philosophy §3, §6
- issue: Divine truthfulness statement
  chosen_reading: Rendered as 'it is impossible for God to lie' without expanding
    into philosophical claims about divine nature beyond the text.
  alternative_readings:
  - God cannot lie
  rationale: The text explicitly grounds assurance in God's incapacity for falsehood.
    The translation preserves this theological affirmation without importing extra-systematic
    formulations.
  doctrine_reference: Affirmations; Translation philosophy §1
