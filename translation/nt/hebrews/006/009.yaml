id: HEB.6.9
reference: Hebrews 6:9
source:
  edition: SBLGNT
  text: Πεπείσμεθα δὲ περὶ ὑμῶν, ἀγαπητοί, τὰ κρείσσονα καὶ ἐχόμενα σωτηρίας, εἰ καὶ
    οὕτως λαλοῦμεν·
translation:
  text: But we are convinced of better things concerning you, beloved—things that
    belong to salvation—even though we speak in this way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'things accompanying salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πεπείσμεθα
  chosen: we are convinced
  alternatives:
  - we are persuaded
  - we are confident
  lexicon: BDAG
  rationale: Perfect tense conveys a settled state of persuasion/confidence. 'We are
    convinced' is natural modern English and preserves the author's assured judgment.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the severe warning in the preceding verses; 'But'
    best signals the rhetorical turn.
- source_word: περὶ ὑμῶν
  chosen: concerning you
  alternatives:
  - about you
  - regarding you
  lexicon: BDAG
  rationale: A straightforward rendering of περί with the genitive; 'concerning you'
    fits the formal yet readable tone.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: Vocative of affection. 'Beloved' preserves the warmth and ecclesial gravity
    without becoming colloquial.
- source_word: τὰ κρείσσονα
  chosen: better things
  alternatives:
  - the better things
  - things that are better
  lexicon: BDAG
  rationale: Neuter plural substantive adjective; 'better things' is idiomatic and
    keeps the comparative force.
- source_word: ἐχόμενα σωτηρίας
  chosen: things that belong to salvation
  alternatives:
  - things accompanying salvation
  - things connected with salvation
  - things pertaining to salvation
  lexicon: BDAG
  rationale: The participle ἐχόμενα with a genitive here likely means 'belonging to/connected
    with.' 'Things that belong to salvation' is clear modern English while preserving
    the relation to salvation. 'Accompanying salvation' is traditional and plausible,
    so it is preserved in a footnote.
- source_word: εἰ καὶ
  chosen: even though
  alternatives:
  - though
  - although
  lexicon: BDAG
  rationale: Concessive force is clear in context; 'even though' naturally introduces
    the concession.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - like this
  lexicon: BDAG
  rationale: Refers to the severe manner/content of the preceding warning. 'In this
    way' is idiomatic and sufficiently transparent.
- source_word: λαλοῦμεν
  chosen: we speak
  alternatives:
  - we are speaking
  - we say
  lexicon: BDAG
  rationale: Present indicative with general present force. 'We speak' is simple and
    direct.
