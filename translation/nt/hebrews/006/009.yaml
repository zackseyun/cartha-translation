theological_decisions:
- issue: Relation of ἐχόμενα to σωτηρίας in a warning-passage context
  chosen_reading: Rendered as 'things that belong to salvation' without specifying
    whether these are evidences, accompaniments, or effects of salvation.
  alternative_readings:
  - things accompanying salvation
  - things that lead to salvation
  rationale: The verse expresses confidence that the audience is characterized by
    realities properly associated with salvation, but the Greek does not require a
    narrower doctrinal claim about perseverance, evidences, or causation. The rendering
    preserves the text's theological tension rather than resolving later debates.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
