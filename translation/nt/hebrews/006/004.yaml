theological_decisions:
- issue: Whether φωτισθέντας should be rendered in a way that identifies the experience
    specifically as conversion or baptism
  chosen_reading: Retain the broader term 'enlightened' without specifying conversion
    or baptism
  alternative_readings:
  - were converted
  - were baptized/received baptismal illumination
  rationale: The Greek itself uses the metaphor of enlightenment and does not explicitly
    define the referent. To preserve theological tension and avoid importing a denominational
    reading, the translation keeps the broader wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether γευσαμένους implies a mere sampling or a full saving participation
  chosen_reading: Render literally as 'tasted' and leave the depth of the experience
    unresolved in the main text
  alternative_readings:
  - experienced fully
  - sampled only superficially
  rationale: The verb can denote genuine experience, but the extent of that experience
    is debated in Hebrews 6. The translation should not settle the perseverance/apostasy
    debate at the lexical level.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether μετόχους γενηθέντας πνεύματος ἁγίου should be phrased to imply full
    salvific indwelling or a looser participation
  chosen_reading: Use 'became partakers of the Holy Spirit'
  alternative_readings:
  - shared in the Holy Spirit
  - became participants in the Holy Spirit
  rationale: The phrase is rendered straightforwardly without doctrinal narrowing.
    'Partakers' preserves the strength of the expression while not forcing a particular
    systematic conclusion about apostasy or perseverance.
  doctrine_reference: Within orthodoxy, the translation does not advocate for a particular
    denominational distinctive unless the Greek unambiguously supports one reading
    over another.
