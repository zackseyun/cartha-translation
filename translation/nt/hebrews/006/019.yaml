id: HEB.6.19
reference: Hebrews 6:19
source:
  edition: SBLGNT
  text: ἣν ὡς ἄγκυραν ἔχομεν τῆς ψυχῆς, ⸀ἀσφαλῆ τε καὶ βεβαίαν καὶ εἰσερχομένην εἰς
    τὸ ἐσώτερον τοῦ καταπετάσματος,
translation:
  text: We have this as an anchor of the soul, both secure and firm, and entering
    into the inner place behind the curtain,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “into the inner place within the veil” or “behind the veil.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  chosen: this
  alternatives:
  - which
  lexicon: BDAG
  rationale: The feminine relative pronoun refers back to the hope of the previous
    verse. In English, an explicit resumptive 'this' is more natural than 'which'
    when beginning the sentence and makes the anaphoric reference clear without obscuring
    the connection.
- source_word: ὡς ἄγκυραν
  chosen: as an anchor
  alternatives:
  - like an anchor
  lexicon: BDAG
  rationale: ὡς here introduces comparison. 'As an anchor' is idiomatic and slightly
    more direct than 'like an anchor' while preserving the metaphor.
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - we possess
  lexicon: BDAG
  rationale: A straightforward present indicative best represented by 'we have.' 'Possess'
    is possible but less natural and unnecessarily elevated.
- source_word: τῆς ψυχῆς
  chosen: of the soul
  alternatives:
  - for the soul
  - of our life
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of the soul' in this established
    metaphor. 'Soul' preserves the lexical value of ψυχή without importing a narrower
    psychological sense or paraphrasing to 'life.'
- source_word: ἀσφαλῆ
  chosen: secure
  alternatives:
  - safe
  - certain
  lexicon: BDAG
  rationale: In context of an anchor metaphor, ἀσφαλής conveys safety/security and
    reliability. 'Secure' fits the nautical image and pairs well with βεβαίαν without
    collapsing the distinction between the two adjectives.
- source_word: τε καὶ
  chosen: both ... and
  alternatives:
  - and
  - indeed and
  lexicon: BDAG
  rationale: The correlative force of τε καὶ is best brought out by 'both ... and,'
    highlighting the two coordinated qualities of the anchor.
- source_word: βεβαίαν
  chosen: firm
  alternatives:
  - steadfast
  - sure
  lexicon: BDAG
  rationale: βέβαιος denotes firmness, dependability, or certainty. 'Firm' is concise,
    readable modern English and maintains a distinction from ἀσφαλής ('secure'). 'Steadfast'
    is possible but somewhat more interpretive and traditional.
- source_word: εἰσερχομένην
  chosen: entering
  alternatives:
  - that enters
  - going into
  lexicon: BDAG
  rationale: The present middle/passive participle agrees with 'anchor' and continues
    its description. 'Entering' preserves the participial flow of the Greek; English
    can naturally understand the metaphorical extension without adding a relative
    clause.
- source_word: εἰς τὸ ἐσώτερον
  chosen: into the inner place
  alternatives:
  - into the inner part
  - into the innermost place
  lexicon: BDAG
  rationale: The comparative adjective used substantivally refers to the inner area,
    here of the sanctuary. 'Inner place' is clear and avoids over-specifying beyond
    what the phrase itself states, while still preparing for the cultic reference
    completed by 'behind the curtain.'
- source_word: τοῦ καταπετάσματος
  chosen: behind the curtain
  alternatives:
  - of the curtain
  - within the veil
  - behind the veil
  lexicon: BDAG
  rationale: Although literally a genitive ('of the curtain'), the idiomatic sense
    in this sanctuary context is the inner place on the far side of the curtain. 'Curtain'
    is more accessible modern English than 'veil,' while preserving the tabernacle/temple
    imagery. The preposition 'behind' is supplied in English to express the understood
    spatial relation.
