theological_decisions:
- issue: Cultic imagery of the heavenly sanctuary
  chosen_reading: Render καταπέτασμα as 'curtain' and make the spatial sense explicit
    with 'behind the curtain' without over-interpreting the referent.
  alternative_readings:
  - within the veil
  - behind the veil
  rationale: The verse uses tabernacle/temple imagery that will be developed in the
    surrounding context. The translation should preserve that imagery clearly for
    modern readers while avoiding archaic ecclesiastical diction. 'Curtain' communicates
    the sanctuary barrier accessibly; a footnote preserves the traditional 'veil'
    wording familiar from Hebrews.
  doctrine_reference: Translation philosophy §§1, 6
