theological_decisions:
- issue: Rendering of God's Sabbath cessation in relation to Hebrews' theology of
    rest
  chosen_reading: rested
  alternative_readings:
  - ceased
  rationale: The verse quotes Genesis 2:2 and participates in Hebrews' argument about
    divine rest. 'Rested' preserves the canonical and theological linkage without
    implying divine fatigue; 'ceased' is a possible lexical nuance but is less fitting
    in this discourse context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English)
