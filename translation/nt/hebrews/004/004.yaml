id: HEB.4.4
reference: Hebrews 4:4
source:
  edition: SBLGNT
  text: εἴρηκεν γάρ που περὶ τῆς ἑβδόμης οὕτως· Καὶ κατέπαυσεν ὁ θεὸς ἐν τῇ ἡμέρᾳ
    τῇ ἑβδόμῃ ἀπὸ πάντων τῶν ἔργων αὐτοῦ,
translation:
  text: 'For he has spoken somewhere about the seventh day in this way: “And God rested
    on the seventh day from all his works,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in a certain place.” The Greek says “somewhere,” reflecting a non-specific
      introduction to the Scripture citation rather than uncertainty about its authority.
    reason: lexical_alternative
  - marker: b
    text: Or “ceased.” The verb can emphasize stopping from work; here “rested” is
      used to preserve the connection with Genesis 2:2 and the argument about God’s
      rest in Hebrews 3–4.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴρηκεν
  chosen: has spoken
  alternatives:
  - has said
  - said
  lexicon: BDAG
  rationale: Perfect tense of λέγω suggests a present relevance of a past utterance;
    'has spoken' preserves that force better than simple past 'said.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Marks explanation/support for the preceding argument; 'For' is the natural
    English connective here.
- source_word: που
  chosen: somewhere
  alternatives:
  - in a certain place
  lexicon: BDAG
  rationale: πού here functions idiomatically to indicate an unspecified scriptural
    location. 'Somewhere' is natural modern English and preserves the author's non-specific
    citation style without implying ignorance of Scripture.
- source_word: περὶ τῆς ἑβδόμης
  chosen: about the seventh day
  alternatives:
  - concerning the seventh day
  - about the seventh
  lexicon: BDAG
  rationale: The feminine adjective with article is shorthand for 'day' in context,
    made explicit in English for clarity.
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - like this
  lexicon: BDAG
  rationale: Introduces the wording of the citation. 'In this way' is readable modern
    English while retaining the demonstrative force.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Retained because it is part of the Genesis citation and should be represented
    in the quotation.
- source_word: κατέπαυσεν
  chosen: rested
  alternatives:
  - ceased
  - stopped
  lexicon: BDAG
  rationale: In the Genesis-rest context, 'rested' is the established and contextually
    appropriate rendering, while still reflecting cessation from work. It also coheres
    with the surrounding argument in Hebrews about God's rest.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward nominative subject with article; English does not require
    the article here.
- source_word: ἐν τῇ ἡμέρᾳ τῇ ἑβδόμῃ
  chosen: on the seventh day
  alternatives:
  - in the seventh day
  lexicon: BDAG
  rationale: Idiomatic English uses 'on' with days. The repeated article plus adjective
    is naturally rendered 'the seventh day.'
- source_word: ἀπὸ πάντων τῶν ἔργων αὐτοῦ
  chosen: from all his works
  alternatives:
  - from all his work
  - from all the works of his own
  lexicon: BDAG
  rationale: Plural ἔργων is best preserved as 'works.' 'From' reflects ἀπό, indicating
    cessation from the totality of God's works.
