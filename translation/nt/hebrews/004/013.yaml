theological_decisions:
- issue: Interpretation of πρὸς ὃν ἡμῖν ὁ λόγος
  chosen_reading: 'The clause expresses human accountability before God: ''to him
    we must give account.'''
  alternative_readings:
  - '''with whom we have to do'''
  - '''to whom our word/matter is directed'''
  rationale: The immediate context emphasizes God's penetrating knowledge and judgment
    (cf. 4:12–13). Rendering the idiom as accountability preserves the warning force
    without importing extra doctrinal content. Because the Greek expression is compressed
    and somewhat idiomatic, the more literal alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
