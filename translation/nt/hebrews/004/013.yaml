id: HEB.4.13
reference: Hebrews 4:13
source:
  edition: SBLGNT
  text: καὶ οὐκ ἔστιν κτίσις ἀφανὴς ἐνώπιον αὐτοῦ, πάντα δὲ γυμνὰ καὶ τετραχηλισμένα
    τοῖς ὀφθαλμοῖς αὐτοῦ, πρὸς ὃν ἡμῖν ὁ λόγος.
translation:
  text: And no creature is hidden from his sight, but all things are naked and laid
    bare to his eyes—to him we must give account.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with whom we have to do'; the Greek may also be understood
      as 'to whom our matter/word is directed.'
    reason: alternative_reading
  - marker: b
    text: The term rendered 'laid bare' comes from a rare verb that may evoke the
      neck being exposed or bent back, emphasizing complete exposure before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: κτίσις
  chosen: creature
  alternatives:
  - created thing
  - creation
  lexicon: BDAG
  rationale: Singular noun used generically for any created being/thing. 'Creature'
    is concise and idiomatic in English here, while still conveying createdness. 'Creation'
    could sound collective/abstract rather than distributive.
- source_word: ἀφανὴς
  chosen: hidden
  alternatives:
  - invisible
  - unseen
  - concealed
  lexicon: BDAG
  rationale: In context the sense is not metaphysical invisibility but being concealed
    from divine scrutiny. 'Hidden' best matches the forensic/exposure theme of the
    verse.
- source_word: ἐνώπιον αὐτοῦ
  chosen: from his sight
  alternatives:
  - before him
  - in his presence
  lexicon: BDAG
  rationale: The phrase literally means 'before him,' but because the next clause
    speaks of 'his eyes,' rendering it as 'from his sight' creates natural English
    and preserves the semantic link to divine seeing without over-paraphrasing.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: Neuter plural with broad scope. 'All things' preserves the comprehensive
    force and matches the formal tone of the context better than the more colloquial
    'everything'.
- source_word: γυμνὰ
  chosen: naked
  alternatives:
  - bare
  - uncovered
  lexicon: BDAG
  rationale: The metaphor is one of total exposure. 'Naked' is the most direct equivalent
    and preserves the vividness of the Greek.
- source_word: τετραχηλισμένα
  chosen: laid bare
  alternatives:
  - exposed
  - with neck laid open
  - laid open
  lexicon: BDAG
  rationale: This rare perfect participle likely conveys being fully exposed, possibly
    with imagery of the neck bent back or laid open. 'Laid bare' communicates the
    resultative state clearly in modern English without forcing a debated metaphor
    into the main text.
- source_word: τοῖς ὀφθαλμοῖς αὐτοῦ
  chosen: to his eyes
  alternatives:
  - before his eyes
  - in his eyes
  lexicon: BDAG
  rationale: Dative phrase expressing relation to divine sight. 'To his eyes' is slightly
    more literal and works well with 'naked and laid bare'; 'before his eyes' is possible
    but less compact.
- source_word: πρὸς ὃν ἡμῖν ὁ λόγος
  chosen: to him we must give account
  alternatives:
  - to whom our word is
  - with whom we have to do
  - to whom our case is addressed
  lexicon: BDAG
  rationale: This idiom is difficult literally ('to whom for us the word'). In context,
    after the theme of divine scrutiny and in light of common Greek usage of λόγος
    for account/matter, 'to him we must give account' best conveys the sense in clear
    English. The more traditional 'with whom we have to do' is too opaque for modern
    readers and underspecifies the accountability theme.
