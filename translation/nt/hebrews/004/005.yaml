theological_decisions:
- issue: Rendering the oath-like conditional εἰ εἰσελεύσονται
  chosen_reading: They shall certainly not enter my rest
  alternative_readings:
  - If they enter my rest
  rationale: Although the Greek form is literally conditional, in this citation formula
    it functions as an emphatic negation inherited from Hebrew oath style. Translating
    the idiom rather than the bare form best preserves the meaning without importing
    extra doctrine.
  doctrine_reference: Translation philosophy §1, §3
