id: HEB.4.5
reference: Hebrews 4:5
source:
  edition: SBLGNT
  text: καὶ ἐν τούτῳ πάλιν· Εἰ εἰσελεύσονται εἰς τὴν κατάπαυσίν μου.
translation:
  text: 'And in this place again: ‘They shall certainly not enter my rest.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'If they will enter my rest,' an oath formula meaning 'They
      shall certainly not enter my rest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: in this place
  alternatives:
  - in this
  - in this passage
  lexicon: BDAG
  rationale: The dative demonstrative with ἐν refers back to a scriptural location
    or passage. 'In this place' is idiomatic in English for citing another place in
    Scripture and fits the author's catena style.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once again
  lexicon: BDAG
  rationale: Signals a repeated citation or renewed appeal to Scripture. 'Again' is
    concise and natural.
- source_word: Εἰ εἰσελεύσονται
  chosen: They shall certainly not enter
  alternatives:
  - If they enter
  - They shall not enter
  lexicon: BDAG
  rationale: 'This reproduces the Semitic oath formula reflected in the Greek conditional
    construction, as in Psalm 95:11 LXX, where εἰ + future functions idiomatically
    as a strong negation: ''they shall certainly not.'' Rendering it woodenly as ''if
    they enter'' would obscure the force in English.'
- source_word: κατάπαυσίν
  chosen: rest
  alternatives:
  - resting place
  - cessation
  lexicon: BDAG
  rationale: In Hebrews 3–4 κατάπαυσις is a key theological term for God's rest. 'Rest'
    is the established and contextually precise rendering; broader alternatives are
    less natural here.
- source_word: μου
  chosen: my
  lexicon: BDAG
  rationale: 'The possessive pronoun is retained directly, preserving the divine speech
    from the Psalm citation: it is God''s own rest.'
