theological_decisions:
- issue: Rendering πεπειρασμένον in relation to Christ's sinlessness
  chosen_reading: has been tested
  alternative_readings:
  - has been tempted
  rationale: Given the affirmation of Christ's full humanity and sinlessness, 'tested'
    best communicates real experiential trial without suggesting sinful desire or
    moral failure. The text still supports the traditional rendering 'tempted,' so
    that alternative is preserved in a footnote rather than excluded.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon; Translation
    philosophy §3 Preserve theological tension rather than resolve it.'
- issue: How explicitly to state the comparison implied by καθ’ ὁμοιότητα
  chosen_reading: according to likeness
  alternative_readings:
  - as we are
  - in the same way as we are
  rationale: The Greek states likeness but does not explicitly supply 'as we are'
    in this clause. To avoid importing more than the source text says, the main text
    keeps the more literal expression, while the common interpretive expansion is
    preserved in a footnote.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it.
