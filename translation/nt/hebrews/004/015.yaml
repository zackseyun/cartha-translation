id: HEB.4.15
reference: Hebrews 4:15
source:
  edition: SBLGNT
  text: οὐ γὰρ ἔχομεν ἀρχιερέα μὴ δυνάμενον συμπαθῆσαι ταῖς ἀσθενείαις ἡμῶν, ⸀πεπειρασμένον
    δὲ κατὰ πάντα καθ’ ὁμοιότητα χωρὶς ἁμαρτίας.
translation:
  text: For we do not have a high priest unable to sympathize with our weaknesses,
    but one who has been tested in every way according to likeness, yet without sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “has been tempted in every way.”
    reason: alternative_reading
  - marker: b
    text: 'Literally, “according to likeness”; many translations make the comparison
      explicit: “as we are” or “in the same way as we are.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερέα
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the cultic office; in Hebrews this
    title is central to the argument about Jesus' priestly mediation.
- source_word: μὴ δυνάμενον συμπαθῆσαι
  chosen: unable to sympathize
  alternatives:
  - unable to have compassion for
  - unable to feel with
  lexicon: BDAG
  rationale: The construction is litotic with οὐ ... μὴ δυνάμενον, yielding the sense
    'not unable' = 'able.' Retaining 'unable to sympathize' within the negated clause
    preserves the Greek rhetoric more closely than flattening it to 'able to sympathize.'
    'Sympathize' best captures συμπαθέω as sharing in another's suffering, not mere
    pity.
- source_word: ταῖς ἀσθενείαις ἡμῶν
  chosen: with our weaknesses
  alternatives:
  - with our infirmities
  - with our frailties
  lexicon: BDAG
  rationale: ἀσθένεια here refers broadly to human weakness and vulnerability, not
    merely physical sickness. 'Weaknesses' is natural modern English and fits the
    context of temptation/testing.
- source_word: πεπειρασμένον
  chosen: has been tested
  alternatives:
  - has been tempted
  - having been tried
  lexicon: BDAG
  rationale: πειράζω can mean either 'tempt' or 'test.' In this Christological context,
    'tested' avoids implying inward sinful inclination while still affirming the full
    reality of his experience under trial. The alternative 'tempted' is important
    and preserved in a footnote because it is a common and defensible rendering.
- source_word: κατὰ πάντα
  chosen: in every way
  alternatives:
  - in all things
  - in every respect
  lexicon: BDAG
  rationale: Idiomatic rendering expressing comprehensiveness of the testing experience.
    'In every way' is clear modern English and preserves the force of κατά + accusative
    here.
- source_word: καθ’ ὁμοιότητα
  chosen: according to likeness
  alternatives:
  - as we are
  - in the same way
  - according to our likeness
  lexicon: BDAG
  rationale: The phrase is syntactically difficult and often smoothed in English.
    'According to likeness' preserves the Greek's explicit language of similarity
    without over-specifying the comparison. Because many English versions make the
    implicit comparison explicit ('as we are'), that alternative is preserved in a
    footnote.
- source_word: χωρὶς ἁμαρτίας
  chosen: yet without sin
  alternatives:
  - apart from sin
  - without sin
  lexicon: BDAG
  rationale: This phrase qualifies the preceding statement by marking a decisive exception.
    'Yet without sin' reads naturally in English and preserves the theological force
    that, despite full testing, Jesus remained sinless.
