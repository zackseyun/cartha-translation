theological_decisions:
- issue: Whether the warning should be softened to mere caution or retained as real
    fear
  chosen_reading: Retain the strong exhortation 'let us fear'
  alternative_readings:
  - let us be careful
  - let us take heed
  rationale: The Greek uses φοβηθῶμεν plainly, and the translation should preserve
    the text's warning intensity without importing a doctrinal resolution about perseverance
    or apostasy.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether 'his rest' should be interpreted explicitly as God's eschatological
    rest in the main text
  chosen_reading: Translate simply as 'his rest'
  alternative_readings:
  - God's rest
  - his Sabbath rest
  rationale: The referent is clear in context, but the verse itself uses the pronoun.
    Preserving 'his rest' avoids adding interpretive specificity beyond the wording
    of the text while maintaining theological tension developed in the chapter.
  doctrine_reference: Translation philosophy §§1, 3, 5
