id: HEB.4.1
reference: Hebrews 4:1
source:
  edition: SBLGNT
  text: Φοβηθῶμεν οὖν μήποτε καταλειπομένης ἐπαγγελίας εἰσελθεῖν εἰς τὴν κατάπαυσιν
    αὐτοῦ δοκῇ τις ἐξ ὑμῶν ὑστερηκέναι·
translation:
  text: Therefore, let us fear lest, while the promise of entering his rest still
    remains, any one of you should seem to have fallen short.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us be afraid.' The Greek verb is stronger than a mere 'be careful'
      and preserves the seriousness of the warning.
    reason: lexical_alternative
  - marker: b
    text: Or 'while a promise remains of entering his rest.' The Greek construction
      is compact and may be rendered more formally this way.
    reason: alternative_reading
  - marker: c
    text: Or 'might appear to have failed to reach it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φοβηθῶμεν
  chosen: let us fear
  alternatives:
  - let us be afraid
  - let us take care
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive used hortatorily: a direct exhortation. ''Let
    us fear'' preserves the force and seriousness better than softer paraphrases like
    ''let us take care.'''
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument about Israel's failure to
    enter rest; 'Therefore' best signals logical continuation in English.
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that not
  - for fear that
  lexicon: BDAG
  rationale: Introduces a negative purpose/result nuance after the hortatory subjunctive.
    'Lest' is concise and preserves the warning force.
- source_word: καταλειπομένης ἐπαγγελίας
  chosen: while the promise ... still remains
  alternatives:
  - since the promise ... remains
  - with the promise ... being left
  lexicon: BDAG
  rationale: The genitive absolute conveys a circumstance concurrent with the exhortation.
    'While ... still remains' communicates that the promise continues to stand and
    is not exhausted.
- source_word: ἐπαγγελίας
  chosen: promise
  lexicon: BDAG
  rationale: Standard rendering; central to the author's argument about God's still-open
    offer of entering rest.
- source_word: εἰσελθεῖν
  chosen: of entering
  alternatives:
  - to enter
  lexicon: BDAG
  rationale: 'Dependent on ''promise'' in English idiom: ''the promise of entering
    his rest'' reads naturally while preserving the infinitival sense.'
- source_word: κατάπαυσιν
  chosen: rest
  alternatives:
  - resting place
  lexicon: BDAG
  rationale: The established and contextually appropriate sense in Hebrews 3–4, referring
    to God's rest rather than merely cessation.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The pronoun is explicit in Greek; 'his' preserves the text's wording
    while the antecedent is clear from context.
- source_word: δοκῇ
  chosen: should seem
  alternatives:
  - might appear
  - should be thought
  lexicon: BDAG
  rationale: δοκέω here carries the sense of appearing or seeming. 'Should seem' preserves
    the nuance without overcommitting to either mere appearance or definitive judgment.
- source_word: τις ἐξ ὑμῶν
  chosen: any one of you
  alternatives:
  - any of you
  - someone among you
  lexicon: BDAG
  rationale: Represents the singular indefinite τις with the partitive phrase ἐξ ὑμῶν;
    'any one of you' keeps the individualizing force.
- source_word: ὑστερηκέναι
  chosen: to have fallen short
  alternatives:
  - to have failed to reach
  - to be lacking
  lexicon: BDAG
  rationale: Perfect infinitive of ὑστερέω in this context means failing to attain
    the promised goal. 'Fallen short' is idiomatic and fits the warning context.
