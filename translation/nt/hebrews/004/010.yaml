id: HEB.4.10
reference: Hebrews 4:10
source:
  edition: SBLGNT
  text: ὁ γὰρ εἰσελθὼν εἰς τὴν κατάπαυσιν αὐτοῦ καὶ αὐτὸς κατέπαυσεν ἀπὸ τῶν ἔργων
    αὐτοῦ ὥσπερ ἀπὸ τῶν ἰδίων ὁ θεός.
translation:
  text: For the one who has entered his rest has himself also rested from his works,
    just as God did from his own.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who has entered God’s rest.' The pronoun 'his' most likely refers
      to God in the context of Hebrews 3–4.
    reason: alternative_reading
  - marker: b
    text: Or 'ceased from his works.' The Greek verb is cognate with 'rest' in this
      passage, so the translation keeps the repeated rest-language.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ... εἰσελθὼν
  chosen: the one who has entered
  alternatives:
  - whoever entered
  - the one entering
  lexicon: BDAG
  rationale: The article with the aorist participle functions substantivally, referring
    to a person characterized as having entered. 'The one who has entered' preserves
    the generic singular force and the completed aspect better than a simple finite
    clause.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation grounding the previous statement. 'For'
    is the most natural concise English connective here.
- source_word: κατάπαυσιν
  chosen: rest
  alternatives:
  - resting place
  - cessation
  lexicon: BDAG
  rationale: In Hebrews 3–4 κατάπαυσις is a key thematic term referring to God's rest,
    not merely a location. 'Rest' preserves the theological and intertextual connection
    to the surrounding argument and Genesis 2.
- source_word: αὐτοῦ (after κατάπαυσιν)
  chosen: his
  alternatives:
  - God's
  - its
  lexicon: BDAG
  rationale: The pronoun is grammatically ambiguous in isolation, but in context most
    naturally refers to the rest just mentioned as belonging to God ('his rest'),
    echoing 4:1, 4:3, and 4:5. Rendering it as 'his' preserves the Greek wording without
    over-specifying in the main text.
- source_word: καὶ αὐτὸς
  chosen: has himself also
  alternatives:
  - also has
  - he too has
  lexicon: BDAG
  rationale: 'The combination adds emphasis and comparison: the one who entered also
    personally shares in cessation from works. ''Has himself also'' preserves both
    the emphatic αὐτός and the additive καί in idiomatic English.'
- source_word: κατέπαυσεν
  chosen: rested
  alternatives:
  - ceased
  - found rest
  lexicon: BDAG
  rationale: Given the repeated wordplay with κατάπαυσις, 'rested' keeps the lexical
    connection visible. 'Ceased' is possible, especially with ἀπό, but would weaken
    the thematic repetition of rest language.
- source_word: ἀπὸ τῶν ἔργων αὐτοῦ
  chosen: from his works
  alternatives:
  - from his deeds
  - from his labors
  lexicon: BDAG
  rationale: ἔργα is broadly 'works/deeds.' 'Works' is the most direct rendering and
    leaves open whether the reference is to human efforts generally, not specifically
    meritorious deeds.
- source_word: ὥσπερ
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: ὥσπερ marks a clear comparison with God's resting. 'Just as' expresses
    the comparative force naturally.
- source_word: τῶν ἰδίων
  chosen: his own
  alternatives:
  - his own works
  - what was his own
  lexicon: BDAG
  rationale: The adjective ἰδίων stands substantivally after ἀπό and refers elliptically
    to God's own works. English requires completion of the sense; 'his own' is retained
    with 'did from his own' to mirror the Greek ellipsis while remaining intelligible.
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The explicit subject at the end of the clause
    is retained in sense, though English places 'God' before 'did' for naturalness.
