theological_decisions:
- issue: Referent of 'his rest' (αὐτοῦ)
  chosen_reading: '''his rest'' refers to God''s rest, into which the believer enters.'
  alternative_readings:
  - '''his rest'' refers to the person''s own rest'
  rationale: Within Hebrews 3–4, the repeated phrase is God's rest, grounded in God's
    own Sabbath rest. This reading best fits the immediate context and the comparison
    'just as God did from his own.' The main text keeps the pronoun 'his' rather than
    replacing it with 'God's,' preserving the Greek while allowing the contextual
    referent to stand.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
