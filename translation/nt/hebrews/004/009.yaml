id: HEB.4.9
reference: Hebrews 4:9
source:
  edition: SBLGNT
  text: ἄρα ἀπολείπεται σαββατισμὸς τῷ λαῷ τοῦ θεοῦ·
translation:
  text: So then, a Sabbath rest remains for the people of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sabbath observance.' The Greek term σαββατισμός is rare and explicitly
      echoes Sabbath language; here it likely denotes a Sabbath-like rest that remains
      for God's people.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  chosen: So then
  alternatives:
  - therefore
  - consequently
  - then
  lexicon: BDAG
  rationale: Inferential particle drawing a conclusion from the preceding argument.
    'So then' preserves the logical force in natural modern English without sounding
    overly formal.
- source_word: ἀπολείπεται
  chosen: remains
  alternatives:
  - is left
  - is reserved
  - still remains
  lexicon: BDAG
  rationale: Present passive/middle form here conveys that something continues to
    be available or left over. 'Remains' is concise and idiomatic, fitting the author's
    argument about an ongoing rest.
- source_word: σαββατισμός
  chosen: Sabbath rest
  alternatives:
  - Sabbath observance
  - Sabbath celebration
  - sabbatism
  lexicon: BDAG
  rationale: The noun is rare and denotes a Sabbath-like rest/observance. 'Sabbath
    rest' best preserves both the lexical connection to Sabbath and the contextual
    emphasis on eschatological rest in Hebrews 3–4. 'Sabbath observance' is possible
    but can sound narrower and more ritualized than the context requires.
- source_word: τῷ λαῷ
  chosen: for the people
  alternatives:
  - to the people
  lexicon: BDAG
  rationale: 'The dative is naturally rendered here as advantage/benefit: the rest
    remains ''for'' God''s people. This is more idiomatic in English than ''to the
    people'' and fits the sense of something available to them.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  lexicon: BDAG
  rationale: A straightforward genitive of possession/relationship. 'Of God' is the
    standard concise rendering and preserves the covenantal identity of the people
    in context.
