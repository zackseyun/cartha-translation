theological_decisions:
- issue: Meaning of σαββατισμός in Hebrews 4:9
  chosen_reading: An ongoing Sabbath-like rest that remains available for God's people,
    expressed as 'Sabbath rest.'
  alternative_readings:
  - A literal Sabbath observance
  - A purely metaphorical spiritual rest with no Sabbath resonance
  rationale: The term itself explicitly evokes Sabbath, and the surrounding argument
    links God's rest, the seventh day, and the believer's promised rest. Rendering
    it 'Sabbath rest' preserves that theological tension without collapsing it into
    either a merely literal weekly observance or an entirely de-Sabbatized abstraction.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
