theological_decisions:
- issue: Force of the Psalm 95 oath citation
  chosen_reading: 'Translate the oath idiom as an emphatic negation: ''They shall
    never enter my rest.'''
  alternative_readings:
  - Render more literally as 'If they enter my rest' with the negation implied by
    oath context
  rationale: The Greek reproduces a Semitic oath formula whose plain sense in context
    is exclusion from God's rest. Translating the idiom rather than preserving the
    surface conditional avoids misleading English readers while not adding doctrinal
    content beyond the text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Temporal/aspectual nuance of believers entering rest
  chosen_reading: Use present 'enter' rather than exclusively future 'will enter.'
  alternative_readings:
  - '''are entering'''
  - '''will enter'''
  rationale: 'The present tense in context supports the author''s already/not-yet
    argument: believers presently enter God''s rest by faith, without denying future
    consummation. The translation preserves this tension rather than collapsing it
    into a purely future reading.'
  doctrine_reference: Translation philosophy §3
