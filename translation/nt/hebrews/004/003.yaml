id: HEB.4.3
reference: Hebrews 4:3
source:
  edition: SBLGNT
  text: εἰσερχόμεθα γὰρ ⸀εἰς κατάπαυσιν οἱ πιστεύσαντες, καθὼς εἴρηκεν· Ὡς ὤμοσα ἐν
    τῇ ὀργῇ μου, Εἰ εἰσελεύσονται εἰς τὴν κατάπαυσίν μου, καίτοι τῶν ἔργων ἀπὸ καταβολῆς
    κόσμου γενηθέντων,
translation:
  text: For we who have believed enter the rest, just as he has said, “As I swore
    in my wrath, ‘They shall never enter my rest,’” although his works were finished
    from the foundation of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'If they will enter my rest,' an oath formula meaning 'They
      shall certainly not enter my rest' or 'They shall never enter my rest.'
    reason: alternative_reading
  - marker: b
    text: Or 'his works had been completed from the foundation of the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσερχόμεθα
  chosen: enter
  alternatives:
  - are entering
  - enter into
  lexicon: BDAG
  rationale: 'Present middle/passive indicative first plural is best rendered as a
    present with gnomic/current force here: believers enter God''s rest. English simple
    present is natural and preserves the author''s argument better than a progressive.
    ''Enter into'' is possible but unnecessarily heavy in English.'
- source_word: κατάπαυσιν
  chosen: the rest
  alternatives:
  - rest
  - resting place
  lexicon: BDAG
  rationale: The noun refers to the eschatological/divine rest under discussion in
    the context. Rendering with the article in English ('the rest') reflects the specific
    rest already introduced in the discourse, even though the first occurrence here
    is anarthrous in Greek.
- source_word: οἱ πιστεύσαντες
  chosen: we who have believed
  alternatives:
  - we who believe
  - those who have believed
  lexicon: BDAG
  rationale: 'The aorist participle denotes those characterized as having believed.
    Because the finite verb is first person plural, the participle is brought into
    apposition with ''we'': ''we who have believed.'' This preserves both the aspectual
    sense and the author''s self-inclusion.'
- source_word: καθὼς εἴρηκεν
  chosen: just as he has said
  alternatives:
  - as he has said
  - just as he said
  lexicon: BDAG
  rationale: The perfect εἴρηκεν suggests a statement with abiding force; English
    present perfect captures this well.
- source_word: Ὡς ὤμοσα ἐν τῇ ὀργῇ μου
  chosen: As I swore in my wrath
  alternatives:
  - As I swore in my anger
  lexicon: BDAG
  rationale: '''Wrath'' better preserves the solemn judicial force of ὀργή in this
    citation context than the milder ''anger.'''
- source_word: Εἰ εἰσελεύσονται εἰς τὴν κατάπαυσίν μου
  chosen: They shall never enter my rest
  alternatives:
  - If they enter my rest
  lexicon: BDAG
  rationale: 'This is the idiomatic oath formula inherited from the Hebrew of Psalm
    95:11, where εἰ with the future functions as a strong negation: ''they shall certainly
    not / shall never enter.'' A literal ''if they enter'' would obscure the sense
    in English, so the idiomatic force is translated in the main text.'
- source_word: καίτοι
  chosen: although
  alternatives:
  - and yet
  - though
  lexicon: BDAG
  rationale: 'Marks concession: despite the oath concerning rest, God''s works had
    already been completed. ''Although'' is clear modern English.'
- source_word: τῶν ἔργων ... γενηθέντων
  chosen: his works were finished
  alternatives:
  - the works having come into being
  - the works having been done
  - his works had been completed
  lexicon: BDAG
  rationale: The genitive absolute states that the works were already brought about/completed.
    'Were finished' is idiomatic and echoes the creation context. Supplying 'his'
    is contextually warranted because the works are God's works.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: from the foundation of the world
  alternatives:
  - since the foundation of the world
  lexicon: BDAG
  rationale: This is the standard idiom for the world's founding/creation. 'From the
    foundation of the world' is the most transparent and traditional without being
    archaic.
