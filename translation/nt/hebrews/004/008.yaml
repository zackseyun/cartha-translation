theological_decisions:
- issue: Referent of Ἰησοῦς in Hebrews 4:8
  chosen_reading: Joshua, son of Nun
  alternative_readings:
  - Jesus
  rationale: Historic Christian orthodoxy affirms Jesus Christ, but this verse's argument
    concerns Israel's entry into the land under Joshua. Translating Ἰησοῦς as 'Jesus'
    here would obscure the author's historical point. Because the Greek name-form
    is the same, the alternative is preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names; Preserve theological tension
    rather than resolve it'
