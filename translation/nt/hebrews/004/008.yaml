id: HEB.4.8
reference: Hebrews 4:8
source:
  edition: SBLGNT
  text: εἰ γὰρ αὐτοὺς Ἰησοῦς κατέπαυσεν, οὐκ ἂν περὶ ἄλλης ἐλάλει μετὰ ταῦτα ἡμέρας.
translation:
  text: For if Joshua had given them rest, God would not have spoken later about another
    day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Jesus.'' The name-form Ἰησοῦς can refer to either Jesus or Joshua;
      here the context clearly points to Joshua son of Nun.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς
  chosen: Joshua
  alternatives:
  - Jesus
  lexicon: BDAG
  rationale: Although the Greek form Ἰησοῦς can refer either to Jesus or to Joshua,
    the context is the entry into Canaan under Joshua, contrasted with a later promise
    of rest in Psalm 95. Rendering it as 'Joshua' reflects the referent intended in
    Hebrews 4:8. The alternative 'Jesus' is preserved in a footnote because the Greek
    form is identical.
- source_word: κατέπαυσεν
  chosen: had given ... rest
  alternatives:
  - had caused ... to rest
  - had brought ... to rest
  lexicon: BDAG
  rationale: The verb καταπαύω means to cause to cease or to give rest. In this context,
    with αὐτούς as object and the broader argument about God's rest, 'had given them
    rest' is idiomatic English that preserves the causative sense.
- source_word: οὐκ ἂν ... ἐλάλει
  chosen: would not have spoken
  alternatives:
  - would not be speaking
  - would not have said
  lexicon: BDAG
  rationale: The combination of οὐκ ἂν with the imperfect ἐλάλει expresses a contrary-to-fact
    result in past time. 'Would not have spoken' best conveys the conditional force
    in natural English.
- source_word: περὶ ἄλλης ... ἡμέρας
  chosen: about another day
  alternatives:
  - concerning another day
  - about a different day
  lexicon: BDAG
  rationale: The phrase refers to a subsequent day of rest still held out by God.
    'Another day' is the most natural rendering and fits the author's argument that
    Joshua did not exhaust the promise.
- source_word: μετὰ ταῦτα
  chosen: later
  alternatives:
  - after these things
  - afterward
  lexicon: BDAG
  rationale: The phrase marks temporal sequence. 'Later' is concise, natural English
    and captures the sense that God spoke subsequently, after Joshua's time.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation supporting the previous statement. 'For'
    preserves the logical connection in a formal yet readable way.
