id: HEB.4.11
reference: Hebrews 4:11
source:
  edition: SBLGNT
  text: σπουδάσωμεν οὖν εἰσελθεῖν εἰς ἐκείνην τὴν κατάπαυσιν, ἵνα μὴ ἐν τῷ αὐτῷ τις
    ὑποδείγματι πέσῃ τῆς ἀπειθείας.
translation:
  text: Therefore, let us make every effort to enter that rest, so that no one may
    fall by the same pattern of disobedience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same example of unbelief.' The noun can be understood in light of
      the wilderness generation's refusal to trust God, though the Greek term more
      directly means 'disobedience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σπουδάσωμεν
  chosen: let us make every effort
  alternatives:
  - let us be diligent
  - let us strive
  lexicon: BDAG
  rationale: The aorist subjunctive in hortatory use calls for an exhortation. σπουδάζω
    conveys earnestness, diligence, and zealous effort. 'Make every effort' is idiomatic
    modern English that preserves the force without sounding wooden; 'be diligent'
    is possible but slightly less action-oriented in this context.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument about God's rest and Israel's
    failure. 'Therefore' best preserves the logical connection in clear English.
- source_word: εἰσελθεῖν
  chosen: to enter
  lexicon: BDAG
  rationale: Aorist infinitive of purpose/complement after σπουδάσωμεν. 'Enter' is
    the direct and natural rendering.
- source_word: ἐκείνην τὴν κατάπαυσιν
  chosen: that rest
  alternatives:
  - that place of rest
  lexicon: BDAG
  rationale: κατάπαυσις in Hebrews refers to the divinely promised rest developed
    in the surrounding context. 'That rest' preserves the demonstrative emphasis and
    links back to the previously discussed rest without over-specifying it.
- source_word: ἵνα μὴ
  chosen: so that ... no one may
  alternatives:
  - lest ... anyone should
  lexicon: BDAG
  rationale: Introduces negative purpose/result. 'So that ... no one may' is natural
    modern English and preserves the warning force.
- source_word: ἐν τῷ αὐτῷ ... ὑποδείγματι
  chosen: by the same pattern
  alternatives:
  - in the same example
  - by the same sort of example
  lexicon: BDAG
  rationale: ὑπόδειγμα can mean example, pattern, or warning example. Here it refers
    back to Israel's precedent in the wilderness. 'Pattern' communicates repeated
    model or precedent more clearly in English than 'example,' while 'by' expresses
    the instrumental/sphere nuance of ἐν idiomatically.
- source_word: πέσῃ
  chosen: may fall
  alternatives:
  - might fall
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα μή in a warning context. 'May fall' is a
    straightforward rendering and keeps the solemn admonitory tone.
- source_word: τῆς ἀπειθείας
  chosen: of disobedience
  alternatives:
  - through disobedience
  - of unbelief
  lexicon: BDAG
  rationale: ἀπείθεια commonly denotes disobedience, though in Hebrews it is closely
    related to unbelief. Because the noun is genitive modifying ὑποδείγματι, 'pattern
    of disobedience' best reflects the Greek structure. 'Unbelief' is interpretive
    and should be preserved only as an alternative note because the immediate lexical
    sense is disobedience.
