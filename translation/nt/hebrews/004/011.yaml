theological_decisions:
- issue: Relation of ἀπείθεια to the wilderness generation's failure
  chosen_reading: Render ἀπείθεια as 'disobedience' in the main text while acknowledging
    'unbelief' as a contextual alternative.
  alternative_readings:
  - unbelief
  rationale: Hebrews closely links unbelief and disobedience in its exposition of
    Psalm 95, but the lexical value of ἀπείθεια here is more directly 'disobedience.'
    This preserves the text's wording without collapsing the theological relationship
    into a single interpretive gloss.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
