id: HEB.4.14
reference: Hebrews 4:14
source:
  edition: SBLGNT
  text: Ἔχοντες οὖν ἀρχιερέα μέγαν διεληλυθότα τοὺς οὐρανούς, Ἰησοῦν τὸν υἱὸν τοῦ
    θεοῦ, κρατῶμεν τῆς ὁμολογίας·
translation:
  text: Therefore, since we have a great high priest who has passed through the heavens—Jesus
    the Son of God—let us hold fast to our confession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who has gone through the heavens.' The Greek uses the plural 'heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες
  chosen: since we have
  alternatives:
  - having
  - because we have
  lexicon: BDAG
  rationale: The participle introduces the basis for the exhortation κρατῶμεν. In
    natural English, 'since we have' best conveys the logical force without sounding
    wooden, while preserving the causal/inferential connection.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument. 'Therefore' preserves the
    formal logical connection more clearly than 'so' and is idiomatic in exhortational
    discourse.
- source_word: ἀρχιερέα μέγαν
  chosen: a great high priest
  alternatives:
  - a high priest who is great
  - the great high priest
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the noun-adjective phrase.
    The anarthrous construction does not require 'the' in English here; 'a great high
    priest' fits the discourse while preserving the qualitative emphasis on Jesus'
    exalted priesthood.
- source_word: διεληλυθότα τοὺς οὐρανούς
  chosen: who has passed through the heavens
  alternatives:
  - who has gone through the heavens
  - who has passed into heaven
  lexicon: BDAG
  rationale: The perfect participle indicates a completed action with abiding significance.
    'Passed through the heavens' closely reflects διέρχομαι with the plural οὐρανούς
    and avoids collapsing the imagery into the less precise singular 'heaven.'
- source_word: τοὺς οὐρανούς
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: BDAG
  rationale: The Greek is plural, and 'the heavens' preserves both the form and the
    elevated cosmological language of the text. 'Heaven' is possible idiomatically
    but loses the plural nuance.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: τὸν υἱὸν τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is a christological title and should be translated, not paraphrased.
    'The Son of God' preserves the formal title and its theological weight in the
    argument.
- source_word: κρατῶμεν
  chosen: let us hold fast
  alternatives:
  - let us hold firmly
  - let us keep hold of
  lexicon: BDAG
  rationale: The present subjunctive in hortatory use calls for ongoing perseverance.
    'Hold fast' is idiomatic, readable, and appropriately weighty for the exhortation.
- source_word: τῆς ὁμολογίας
  chosen: to our confession
  alternatives:
  - to the confession
  - to our profession
  - to what we confess
  lexicon: BDAG
  rationale: With κρατέω, English idiom commonly supplies 'to' ('hold fast to'). 'Confession'
    best captures ὁμολογία as the believers' public acknowledgment of faith. 'Our'
    is contextually implied in English because the exhortation is addressed to the
    community, though the Greek article is not a possessive pronoun.
