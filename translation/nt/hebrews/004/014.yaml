theological_decisions:
- issue: Rendering the christological title υἱὸς τοῦ θεοῦ
  chosen_reading: the Son of God
  alternative_readings:
  - God's Son
  rationale: The formal title is retained to preserve the explicit christological
    confession of the verse without reduction or paraphrase. This aligns with historic
    orthodoxy and the translation philosophy of translating titles for meaning.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Whether to render τοὺς οὐρανούς in a way that minimizes cosmological imagery
  chosen_reading: the heavens
  alternative_readings:
  - heaven
  rationale: The plural is preserved to maintain the text's imagery of Jesus' exalted
    passage through the heavenly realms, without importing a more systematized cosmology
    than the text itself states.
  doctrine_reference: Translation philosophy §1; §3
