theological_decisions:
- issue: Rendering ἀπείθεια in a warning/rest context
  chosen_reading: because of disobedience
  alternative_readings:
  - because of unbelief
  rationale: The term can overlap semantically with unbelief in contexts of refusal
    to heed God's word, but its core sense is disobedience. To preserve theological
    tension rather than collapse disobedience into mere cognitive unbelief, the main
    text keeps 'disobedience' and preserves 'unbelief' in a footnote.
  doctrine_reference: Translation philosophy §3; Contested terms principle of preserving
    tension where ambiguity is genuine
