id: HEB.4.6
reference: Hebrews 4:6
source:
  edition: SBLGNT
  text: ἐπεὶ οὖν ἀπολείπεται τινὰς εἰσελθεῖν εἰς αὐτήν, καὶ οἱ πρότερον εὐαγγελισθέντες
    οὐκ εἰσῆλθον δι’ ἀπείθειαν,
translation:
  text: Therefore, since it remains for some to enter it, and those who formerly had
    the good news proclaimed to them did not enter because of disobedience,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of unbelief.' The Greek word can denote refusal to believe as
      expressed in disobedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ οὖν
  chosen: Therefore, since
  alternatives:
  - Since, then
  - Therefore, because
  lexicon: BDAG
  rationale: The combination is inferential and explanatory, linking this verse to
    the prior argument. 'Therefore, since' preserves both the logical conclusion (οὖν)
    and the causal/setup force of ἐπεί.
- source_word: ἀπολείπεται
  chosen: it remains
  alternatives:
  - it is left
  - there remains
  lexicon: BDAG
  rationale: The present passive conveys continuing availability. 'It remains' is
    idiomatic English and preserves the sense that the opportunity is still open.
- source_word: τινὰς
  chosen: for some
  alternatives:
  - some
  - certain ones
  lexicon: BDAG
  rationale: With the infinitive εἰσελθεῖν, the sense is that entry is still available
    to some persons. 'For some' makes the English syntax natural while preserving
    the indefinite reference.
- source_word: εἰσελθεῖν εἰς αὐτήν
  chosen: to enter it
  alternatives:
  - to enter into it
  - to enter therein
  lexicon: BDAG
  rationale: The infinitive phrase refers back to God's rest from the preceding context.
    'Enter it' is clear modern English without adding 'rest' beyond the immediate
    Greek wording.
- source_word: αὐτήν
  chosen: it
  alternatives:
  - that rest
  lexicon: BDAG
  rationale: The pronoun refers anaphorically to the previously mentioned rest. The
    main text keeps the pronoun as in Greek; the referent is clear from context.
- source_word: οἱ πρότερον εὐαγγελισθέντες
  chosen: those who formerly had the good news proclaimed to them
  alternatives:
  - those who formerly received the good news
  - those who were formerly evangelized
  lexicon: BDAG
  rationale: The passive participle of εὐαγγελίζω means to have good news announced/proclaimed.
    This rendering preserves the passive force and avoids the overly ecclesiastical
    'evangelized.' 'Formerly' reflects πρότερον.
- source_word: οὐκ εἰσῆλθον
  chosen: did not enter
  alternatives:
  - failed to enter
  lexicon: BDAG
  rationale: A straightforward aorist negation. 'Did not enter' is more formally transparent
    than 'failed to enter,' which can slightly shift emphasis.
- source_word: δι’ ἀπείθειαν
  chosen: because of disobedience
  alternatives:
  - because of unbelief
  - on account of disobedience
  lexicon: BDAG
  rationale: ἀπείθεια commonly denotes disobedience, though in this context it is
    closely related to unbelief. 'Disobedience' best preserves the lexical sense while
    allowing the broader Hebrews context to supply the faith dimension.
