theological_decisions:
- issue: Force of 'Today' in the argument about God's rest
  chosen_reading: Render 'Today' as the divinely appointed present opportunity for
    response, without narrowing it to a mere calendar date.
  alternative_readings:
  - Treat 'Today' as only the historical day of the psalmist's speech
  - Treat 'Today' as an exclusively eschatological day
  rationale: The verse argues that God still designates an open day of response long
    after the wilderness period. The translation preserves the rhetorical and theological
    force of the citation without importing a more systematized doctrine of time than
    the text itself states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of ἐν Δαυὶδ
  chosen_reading: Translate as 'through David'
  alternative_readings:
  - '''in David'' as a reference to the book/section associated with David'
  - '''in the psalm of David'''
  rationale: The phrase is somewhat idiomatic. 'Through David' best communicates that
    God speaks by means of David in the cited psalm, while avoiding a wooden rendering
    that would be unclear in English. This does not require a stronger claim about
    authorship than the text's wording supports.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
