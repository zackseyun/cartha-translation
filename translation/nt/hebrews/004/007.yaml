id: HEB.4.7
reference: Hebrews 4:7
source:
  edition: SBLGNT
  text: πάλιν τινὰ ὁρίζει ἡμέραν, Σήμερον, ἐν Δαυὶδ λέγων μετὰ τοσοῦτον χρόνον, καθὼς
    ⸀προείρηται, Σήμερον ἐὰν τῆς φωνῆς αὐτοῦ ἀκούσητε, μὴ σκληρύνητε τὰς καρδίας ὑμῶν·
translation:
  text: 'Again he appoints a certain day, “Today,” saying through David after so long
    a time, just as has been said before: “Today, if you hear his voice, do not harden
    your hearts.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in David,” that is, in the Davidic psalm.
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  chosen: Again
  alternatives:
  - once more
  - another time
  lexicon: BDAG
  rationale: 'Signals repetition/resumption in the argument: God is designating a
    day anew. ''Again'' is concise and natural in English.'
- source_word: τινὰ ἡμέραν
  chosen: a certain day
  alternatives:
  - a particular day
  - some day
  lexicon: BDAG
  rationale: The indefinite τις with ἡμέραν points to a specific-but-unspecified day.
    'A certain day' preserves that nuance better than the vaguer 'some day.'
- source_word: ὁρίζει
  chosen: appoints
  alternatives:
  - sets
  - determines
  - designates
  lexicon: BDAG
  rationale: In context God is fixing/designating a day in salvation history. 'Appoints'
    captures the authoritative setting of the day and reads naturally.
- source_word: Σήμερον
  chosen: Today
  alternatives:
  - today
  lexicon: BDAG
  rationale: Retained as the named day from Psalm 95 and capitalized within quotation
    marks to reflect its rhetorical force as the designated day.
- source_word: ἐν Δαυὶδ λέγων
  chosen: saying through David
  alternatives:
  - speaking in David
  - saying in David
  lexicon: BDAG
  rationale: The idiom likely means speaking in the Davidic psalm / through David
    as the human agent. 'Through David' is idiomatic English and conveys mediated
    speech without over-specifying authorship mechanics.
- source_word: μετὰ τοσοῦτον χρόνον
  chosen: after so long a time
  alternatives:
  - after such a long time
  - after so much time
  lexicon: BDAG
  rationale: Expresses the long interval after the wilderness generation. 'So long
    a time' is natural and preserves the emphasis.
- source_word: καθὼς προείρηται
  chosen: just as has been said before
  alternatives:
  - as has been said before
  - just as it has been said previously
  lexicon: BDAG
  rationale: The perfect passive indicates a prior statement with continuing relevance.
    'Has been said before' captures both prior utterance and present applicability.
- source_word: ἐὰν τῆς φωνῆς αὐτοῦ ἀκούσητε
  chosen: if you hear his voice
  alternatives:
  - if you should hear his voice
  - if you listen to his voice
  lexicon: BDAG
  rationale: Standard rendering of the conditional clause from Psalm 95. 'Hear' preserves
    the biblical idiom, which implies responsive hearing, without paraphrasing to
    'obey.'
- source_word: μὴ σκληρύνητε
  chosen: do not harden
  alternatives:
  - do not become hard
  - do not make hard
  lexicon: BDAG
  rationale: Conventional and accurate rendering of the prohibitive aorist subjunctive,
    preserving the warning against obstinacy.
- source_word: τὰς καρδίας ὑμῶν
  chosen: your hearts
  lexicon: BDAG
  rationale: Standard biblical anthropological expression for the inner person, will,
    and disposition; no paraphrase is needed.
