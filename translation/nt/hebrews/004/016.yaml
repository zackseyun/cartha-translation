theological_decisions:
- issue: Nuance of παρρησία in approaching God
  chosen_reading: with boldness
  alternative_readings:
  - with confidence
  rationale: The verse emphasizes free, unreserved access to God through the high-priestly
    ministry of Jesus. 'Boldness' preserves the stronger relational and rhetorical
    force of παρρησία without importing presumption.
  doctrine_reference: 'Translation philosophy: preserve source meaning in readable
    modern English; preserve theological tension rather than flatten lexical force.'
- issue: Rendering of χάρις in the second clause
  chosen_reading: grace
  alternative_readings:
  - favor
  rationale: Although χάρις can mean 'favor,' 'grace' better preserves the theological
    texture of Hebrews and the lexical consistency expected for this key term. The
    context concerns divine beneficence, and 'grace' is both accurate and theologically
    weighty without exceeding the text.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
