id: HEB.4.12
reference: Hebrews 4:12
source:
  edition: SBLGNT
  text: Ζῶν γὰρ ὁ λόγος τοῦ θεοῦ καὶ ἐνεργὴς καὶ τομώτερος ὑπὲρ πᾶσαν μάχαιραν δίστομον
    καὶ διϊκνούμενος ἄχρι μερισμοῦ ψυχῆς ⸀καὶ πνεύματος, ἁρμῶν τε καὶ μυελῶν, καὶ
    κριτικὸς ἐνθυμήσεων καὶ ἐννοιῶν καρδίας·
translation:
  text: For the word of God is living and active, and sharper than any double-edged
    sword, piercing to the division of soul and spirit, of joints and marrow, and
    able to judge the thoughts and intentions of the heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'penetrating'; the Greek participle conveys passing through or reaching
      deeply within.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'soul and spirit' should not be taken here as requiring a particular
      doctrine of human composition; the text emphasizes the word of God's penetrating
      reach into the deepest inner life.
    reason: alternative_reading
  - marker: c
    text: Or 'discerning the thoughts and intentions of the heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ζῶν
  chosen: living
  alternatives:
  - alive
  lexicon: BDAG
  rationale: Predicate adjective/participle describing ὁ λόγος. 'Living' is the established
    and most natural adjectival rendering in English, preserving the ongoing vitality
    implied by the present participle.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this verse as grounding the preceding exhortation. 'For' best
    preserves the explanatory force without overinterpreting the logic.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - God's word
  lexicon: BDAG
  rationale: Standard, transparent rendering of the genitival phrase. Retains possible
    breadth of reference to God's utterance/message without narrowing it to Scripture
    alone or to the personal Logos of John 1.
- source_word: ἐνεργὴς
  chosen: active
  alternatives:
  - effective
  - powerful
  - at work
  lexicon: BDAG
  rationale: '''Active'' is concise, idiomatic, and pairs well with ''living.'' ''Effective''
    is possible but sounds more interpretive; ''powerful'' overlaps with ideas not
    explicit in the adjective itself.'
- source_word: τομώτερος ὑπὲρ πᾶσαν μάχαιραν δίστομον
  chosen: sharper than any double-edged sword
  alternatives:
  - more cutting than any two-edged sword
  lexicon: BDAG
  rationale: Comparative adjective with ὑπέρ expressing comparison. 'Double-edged
    sword' is clear modern English for δίστομον while preserving the image.
- source_word: διϊκνούμενος
  chosen: piercing
  alternatives:
  - penetrating
  - passing through
  lexicon: BDAG
  rationale: Present middle participle continuing the sword imagery. 'Piercing' is
    vivid and natural, preserving both motion and penetration without becoming overly
    technical.
- source_word: ἄχρι μερισμοῦ
  chosen: to the division
  alternatives:
  - as far as the division
  - to dividing
  lexicon: BDAG
  rationale: ἄχρι marks extent, and μερισμός denotes division/separation. 'To the
    division' keeps the metaphorical force and avoids making the participle itself
    do all the semantic work.
- source_word: ψυχῆς καὶ πνεύματος
  chosen: of soul and spirit
  alternatives:
  - of life and spirit
  lexicon: BDAG
  rationale: Traditional and lexically straightforward rendering. The phrase is preserved
    without forcing a technical anthropological distinction beyond what the text states.
- source_word: ἁρμῶν τε καὶ μυελῶν
  chosen: of joints and marrow
  alternatives:
  - of joints and marrows
  lexicon: BDAG
  rationale: Parallel genitives extending the imagery of deep penetration. Singular
    'marrow' is idiomatic English though the Greek is plural.
- source_word: κριτικὸς
  chosen: able to judge
  alternatives:
  - discerning
  - judging
  - critical of
  lexicon: BDAG
  rationale: The adjective denotes capacity for evaluating/judging. 'Able to judge'
    makes the predicative sense explicit in smooth English and avoids the narrower
    psychological nuance of 'discerning' alone.
- source_word: ἐνθυμήσεων
  chosen: thoughts
  alternatives:
  - reflections
  - deliberations
  lexicon: BDAG
  rationale: Refers to inward thoughts or reasonings. 'Thoughts' is broad and natural
    in English.
- source_word: ἐννοιῶν
  chosen: intentions
  alternatives:
  - plans
  - conceptions
  - attitudes
  lexicon: BDAG
  rationale: Distinguishes this term from ἐνθυμήσεων by rendering it as 'intentions,'
    highlighting inward aims or designs rather than mere mental activity.
- source_word: καρδίας
  chosen: of the heart
  alternatives:
  - of the inner person
  lexicon: BDAG
  rationale: Retains the biblical anthropological term 'heart' as the center of inner
    life, rather than flattening it into an abstract paraphrase.
