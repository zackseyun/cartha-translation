theological_decisions:
- issue: Referent of 'the word of God'
  chosen_reading: Rendered generically as 'the word of God' without specifying Scripture,
    preached message, divine utterance, or the personal Word.
  alternative_readings:
  - Scripture
  - God's spoken promise/judgment
  - the Son/Logos
  rationale: The immediate context in Hebrews emphasizes God's speaking and the efficacy
    of his utterance, but the phrase should not be narrowed beyond the Greek. The
    translation preserves the text's breadth and theological resonance rather than
    resolving the referent dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Anthropological implication of 'soul and spirit'
  chosen_reading: Kept as 'soul and spirit' without implying a fixed dichotomous or
    trichotomous anthropology.
  alternative_readings:
  - A technical distinction between separable human components
  - A rhetorical expression for the deepest interiority
  rationale: The verse uses paired terms in a metaphor of penetrating discernment.
    Translation should preserve the wording while avoiding doctrinal overstatement
    about human constitution.
  doctrine_reference: Do not import doctrinal claims the text does not make.
