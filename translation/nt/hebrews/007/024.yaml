id: HEB.7.24
reference: Hebrews 7:24
source:
  edition: SBLGNT
  text: ὁ δὲ διὰ τὸ μένειν αὐτὸν εἰς τὸν αἰῶνα ἀπαράβατον ἔχει τὴν ἱερωσύνην·
translation:
  text: But he, because he remains forever, holds the priesthood permanently.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holds the priesthood unchangeably' or 'has a non-transferable priesthood.'
      The Greek adjective can carry either nuance; in context, the point is that because
      he lives forever, his priesthood does not pass to another.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - But this one
  - But he himself
  lexicon: BDAG
  rationale: The article functions substantivally, referring back to Jesus in contrast
    with the many former priests in the preceding context. 'But he' gives the adversative
    force of δέ and reads naturally in English.
- source_word: διὰ τὸ μένειν αὐτὸν
  chosen: because he remains
  alternatives:
  - because he continues
  - on account of his remaining
  lexicon: BDAG
  rationale: διά with the articular infinitive expresses cause. μένω here denotes
    continuing in existence, in context contrasting mortal priests. 'Because he remains'
    preserves both the causal construction and the durative sense.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - into the age
  lexicon: BDAG
  rationale: The idiom means enduring without end. 'Forever' is idiomatic modern English
    and adequately conveys the temporal force without wooden literalism.
- source_word: ἀπαράβατον
  chosen: permanently
  alternatives:
  - unchangeable
  - non-transferable
  - inviolable
  lexicon: BDAG
  rationale: The adjective modifies 'priesthood' and can mean either not passing to
    another or not subject to change/violation. In this context, where the contrast
    is with priests who die and are replaced, the sense is that his priesthood remains
    in his possession permanently. 'Permanently' communicates the contextual force
    in clear English while avoiding overcommitting to a narrower technical gloss in
    the main text.
- source_word: ἔχει τὴν ἱερωσύνην
  chosen: holds the priesthood
  alternatives:
  - has the priesthood
  - possesses the priesthood
  lexicon: BDAG
  rationale: ἔχω with ἱερωσύνην indicates possession or holding of priestly office.
    'Holds the priesthood' is idiomatic English for retaining an office and fits the
    argument of the passage.
- source_word: ἱερωσύνην
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: BDAG
  rationale: The noun denotes the office or status of priesthood. 'Priesthood' is
    the standard and clearest rendering in this context.
