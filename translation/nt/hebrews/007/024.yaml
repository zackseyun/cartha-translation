theological_decisions:
- issue: Sense of ἀπαράβατον in relation to Christ's priesthood
  chosen_reading: Rendered contextually as 'permanently' to emphasize that Jesus'
    priesthood does not pass away or transfer because he lives forever.
  alternative_readings:
  - unchangeable priesthood
  - non-transferable priesthood
  rationale: The verse supports the permanence of Jesus' priestly office without requiring
    a more technical doctrinal formulation in English. The translation preserves the
    author's contrast with mortal, successive priests and avoids importing later theological
    precision beyond the text's immediate argument. Because the lexical ambiguity
    is real, alternatives are preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
