theological_decisions:
- issue: Whether the verse describes Melchizedek as literally eternal and parentless,
    or as presented that way in the biblical record for typological purposes
  chosen_reading: The wording is translated so that the descriptors are preserved,
    while 'being made like the Son of God' signals the author's typological argument
    based on scriptural portrayal rather than asserting that Melchizedek is ontologically
    identical with or prior to the Son.
  alternative_readings:
  - Melchizedek is a Christophany or preincarnate appearance of the Son
  - Melchizedek is literally without parents and eternal in his own being
  rationale: Hebrews' argument turns on the Genesis narrative's silence regarding
    Melchizedek's ancestry and death, making him a fitting type of the Son's enduring
    priesthood. The passive ἀφωμοιωμένος indicates likeness to the Son, not identity
    with him. The translation preserves the text's tension without importing a stronger
    doctrinal conclusion than the Greek requires.
  doctrine_reference: Preserve theological tension rather than resolve it.
