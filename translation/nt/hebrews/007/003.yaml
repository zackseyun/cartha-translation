id: HEB.7.3
reference: Hebrews 7:3
source:
  edition: SBLGNT
  text: ἀπάτωρ, ἀμήτωρ, ἀγενεαλόγητος, μήτε ἀρχὴν ἡμερῶν μήτε ζωῆς τέλος ἔχων, ἀφωμοιωμένος
    δὲ τῷ υἱῷ τοῦ θεοῦ, μένει ἱερεὺς εἰς τὸ διηνεκές.
translation:
  text: without father, without mother, without genealogy, having neither beginning
    of days nor end of life, but being made like the Son of God, he remains a priest
    perpetually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without recorded genealogy.' The point is that Genesis gives no genealogical
      record for Melchizedek, which Hebrews uses typologically.
    reason: lexical_alternative
  - marker: b
    text: Or 'for all time' or 'forever.' The phrase emphasizes the enduring character
      of his priesthood in the scriptural presentation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπάτωρ
  chosen: without father
  alternatives:
  - fatherless
  lexicon: BDAG
  rationale: A privative adjective meaning lacking a father. 'Without father' is more
    precise and less potentially misleading than 'fatherless,' which in English can
    imply abandonment rather than absence from recorded lineage.
- source_word: ἀμήτωρ
  chosen: without mother
  alternatives:
  - motherless
  lexicon: BDAG
  rationale: Parallel to ἀπάτωρ. 'Without mother' preserves the formal symmetry of
    the Greek triad and avoids emotional connotations of 'motherless.'
- source_word: ἀγενεαλόγητος
  chosen: without genealogy
  alternatives:
  - without recorded genealogy
  - ungenealogized
  lexicon: BDAG
  rationale: The term denotes lacking genealogy or genealogical record. 'Without genealogy'
    is concise and close to the Greek; the context in Hebrews concerns the absence
    of recorded ancestry in the Genesis account, not a metaphysical denial of actual
    parentage.
- source_word: μήτε ἀρχὴν ἡμερῶν μήτε ζωῆς τέλος ἔχων
  chosen: having neither beginning of days nor end of life
  alternatives:
  - having neither a beginning of days nor an end of life
  lexicon: BDAG
  rationale: This participial clause is rendered fairly literally to preserve the
    elevated style and the paired negation. The anarthrous English is natural and
    reflects the Greek idiom.
- source_word: ἀφωμοιωμένος
  chosen: being made like
  alternatives:
  - resembling
  - having been made like
  lexicon: BDAG
  rationale: Perfect passive participle from ἀφομοιόω. 'Being made like' preserves
    the passive force better than 'resembling' and avoids implying identity between
    Melchizedek and the Son of God. The perfect aspect suggests an abiding comparison
    grounded in the scriptural portrayal.
- source_word: τῷ υἱῷ τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: Standard christological title. The article is naturally represented in
    English as 'the Son of God.'
- source_word: μένει
  chosen: he remains
  alternatives:
  - he continues
  lexicon: BDAG
  rationale: Present tense of μένω conveys continuing state. 'Remains' fits the argument
    from the enduring scriptural presentation of Melchizedek.
- source_word: ἱερεὺς
  chosen: a priest
  lexicon: BDAG
  rationale: Straightforward rendering of the noun; the anarthrous form is naturally
    rendered 'a priest' in English.
- source_word: εἰς τὸ διηνεκές
  chosen: perpetually
  alternatives:
  - forever
  - continually
  - for all time
  lexicon: BDAG
  rationale: The phrase means continuously or permanently. 'Perpetually' preserves
    the durative force without overcommitting to a metaphysical claim beyond the author's
    typological argument. 'Forever' is possible but can sound more absolute than the
    immediate literary point requires.
