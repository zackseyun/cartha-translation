theological_decisions:
- issue: Meaning of τελείωσις in Hebrews' priestly argument
  chosen_reading: Rendered as 'perfection' with its cultic-theological force left
    intact rather than reduced to mere moral improvement or simple completion.
  alternative_readings:
  - completion
  - full access to God
  rationale: The verse argues that if the Levitical priesthood could bring the intended
    consummation, no further priest would be needed. 'Perfection' preserves the theological
    tension and lets the broader context define the term.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referent of αὐτῆς in ἐπ’ αὐτῆς νενομοθέτηται
  chosen_reading: The pronoun refers to the Levitical priesthood.
  alternative_readings:
  - the law
  - the covenantal arrangement more generally
  rationale: The nearest suitable feminine antecedent is 'priesthood,' and the parenthetical
    clause explains that the people's legal arrangement was founded on that priestly
    system. This best fits the syntax and argument.
  doctrine_reference: Translation philosophy §1
