id: HEB.7.11
reference: Hebrews 7:11
source:
  edition: SBLGNT
  text: Εἰ μὲν οὖν τελείωσις διὰ τῆς Λευιτικῆς ἱερωσύνης ἦν, ὁ λαὸς γὰρ ἐπ’ ⸀αὐτῆς
    ⸀νενομοθέτηται, τίς ἔτι χρεία κατὰ τὴν τάξιν Μελχισέδεκ ἕτερον ἀνίστασθαι ἱερέα
    καὶ οὐ κατὰ τὴν τάξιν Ἀαρὼν λέγεσθαι;
translation:
  text: Now if perfection had been through the Levitical priesthood—for on its basis
    the people had received the law—what further need was there for another priest
    to arise according to the order of Melchizedek and not be spoken of according
    to the order of Aaron?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for under it the people had been given the law.' The Greek phrase may
      be rendered more formally, but the sense is that Israel's legal arrangement
      was founded on the Levitical priesthood.
    reason: lexical_alternative
  - marker: b
    text: Or 'another priest to arise in the order of Melchizedek and not be called
      in the order of Aaron.'
    reason: alternative_reading
lexical_decisions:
- source_word: τελείωσις
  chosen: perfection
  alternatives:
  - completion
  - perfecting
  lexicon: BDAG
  rationale: In Hebrews, the term carries cultic and salvific force beyond mere completion,
    referring to the bringing of people into the intended state of full access/fitness
    before God. 'Perfection' best preserves that theological weight without over-paraphrasing.
- source_word: διὰ τῆς Λευιτικῆς ἱερωσύνης
  chosen: through the Levitical priesthood
  alternatives:
  - by means of the Levitical priesthood
  lexicon: BDAG
  rationale: διά with the genitive indicates means or instrumentality. 'Through' is
    natural English and preserves the argument that the priesthood would have been
    the means if perfection were attainable that way.
- source_word: ἐπ’ αὐτῆς
  chosen: on its basis
  alternatives:
  - under it
  - upon it
  lexicon: BDAG
  rationale: The feminine pronoun most naturally refers to the Levitical priesthood.
    The phrase explains that the people's legislation was grounded on that priestly
    system. 'On its basis' makes the logical relation explicit in idiomatic English.
- source_word: νενομοθέτηται
  chosen: had received the law
  alternatives:
  - had been legislated
  - had been given the law
  lexicon: BDAG
  rationale: The perfect passive/middle of νομοθετέομαι here means to be given law
    or placed under a legal arrangement. 'Had received the law' is idiomatic and reflects
    the completed state resulting from that legislation. 'Had been legislated' is
    too wooden in English.
- source_word: τίς ἔτι χρεία
  chosen: what further need was there
  alternatives:
  - what need still remained
  - why was there still a need
  lexicon: BDAG
  rationale: This idiom introduces a rhetorical question about necessity. 'What further
    need was there' is clear, preserves the rhetorical force, and fits the inferential
    flow.
- source_word: κατὰ τὴν τάξιν Μελχισέδεκ
  chosen: according to the order of Melchizedek
  alternatives:
  - in the order of Melchizedek
  lexicon: BDAG
  rationale: This is the established and semantically precise rendering of κατά +
    τάξις in this context, denoting pattern, category, or appointed order. 'According
    to' preserves the formal correspondence.
- source_word: ἕτερον ... ἱερέα
  chosen: another priest
  alternatives:
  - a different priest
  lexicon: BDAG
  rationale: ἕτερον can stress another of a different kind, but in English 'another
    priest' is sufficiently natural here, with the following contrast to Aaron's order
    making the distinction clear.
- source_word: ἀνίστασθαι
  chosen: to arise
  alternatives:
  - to appear
  - to be raised up
  lexicon: BDAG
  rationale: In this context the verb refers to the emergence or appointment of a
    priest. 'To arise' is concise and preserves the biblical register without forcing
    a resurrection sense.
- source_word: καὶ οὐ ... λέγεσθαι
  chosen: and not be spoken of according to the order of Aaron
  alternatives:
  - and not be called according to the order of Aaron
  - and not be designated according to the order of Aaron
  lexicon: BDAG
  rationale: λέγεσθαι here concerns how the priest is described or designated. 'Be
    spoken of' is slightly broader and avoids sounding merely nominal; it preserves
    the contrast in classification between Melchizedek's order and Aaron's.
- source_word: Μελχισέδεκ / Ἀαρών
  chosen: Melchizedek / Aaron
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
