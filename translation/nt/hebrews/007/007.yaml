id: HEB.7.7
reference: Hebrews 7:7
source:
  edition: SBLGNT
  text: χωρὶς δὲ πάσης ἀντιλογίας τὸ ἔλαττον ὑπὸ τοῦ κρείττονος εὐλογεῖται.
translation:
  text: Now beyond all dispute, the lesser is blessed by the greater.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without any dispute' or 'without contradiction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς δὲ πάσης ἀντιλογίας
  chosen: Now beyond all dispute
  alternatives:
  - And without any dispute
  - But apart from all contradiction
  - Without question
  lexicon: BDAG
  rationale: The idiom introduces a proposition regarded as self-evident. 'Beyond
    all dispute' is natural modern English and preserves the force of χωρὶς + genitive
    ('without/apart from') with πάσης ἀντιλογίας ('any contradiction/dispute'). δέ
    is rendered with 'Now' to mark a mild discourse transition without overstating
    contrast.
- source_word: τὸ ἔλαττον
  chosen: the lesser
  alternatives:
  - the inferior
  - the smaller
  lexicon: BDAG
  rationale: 'The neuter substantive comparative functions generically: ''the lesser
    one/thing.'' In context of rank and priestly superiority, ''the lesser'' best
    captures comparative status without importing moral inferiority.'
- source_word: ὑπὸ τοῦ κρείττονος
  chosen: by the greater
  alternatives:
  - by the superior
  - by the better
  lexicon: BDAG
  rationale: With ὑπό + genitive, this marks agency in the passive clause. κρείττων
    in Hebrews often carries the sense of superiority or greater status; 'the greater'
    is concise and fits the argument about hierarchical blessing.
- source_word: εὐλογεῖται
  chosen: is blessed
  alternatives:
  - receives a blessing
  - is spoken well of
  lexicon: BDAG
  rationale: The present passive indicates the subject receives blessing. In this
    context of Melchizedek blessing Abraham, 'is blessed' is the most direct and idiomatic
    rendering. The lexical sense 'speak well of' is too weak for the covenantal/priestly
    context.
