theological_decisions:
- issue: Nature of the comparison between 'lesser' and 'greater'
  chosen_reading: 'A general principle of rank is stated: the one of lower status
    is blessed by the one of higher status.'
  alternative_readings:
  - A merely social convention without theological weight
  rationale: Within Hebrews 7, the statement supports the author's argument for Melchizedek's
    superiority to Abraham and thus the superiority of the priesthood associated with
    him. The translation preserves the comparative language of status without adding
    interpretive expansion beyond the text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
