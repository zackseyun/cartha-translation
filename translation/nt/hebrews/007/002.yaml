id: HEB.7.2
reference: Hebrews 7:2
source:
  edition: SBLGNT
  text: ᾧ καὶ δεκάτην ἀπὸ πάντων ἐμέρισεν Ἀβραάμ, πρῶτον μὲν ἑρμηνευόμενος βασιλεὺς
    δικαιοσύνης ἔπειτα δὲ καὶ βασιλεὺς Σαλήμ, ὅ ἐστιν βασιλεὺς εἰρήνης,
translation:
  text: to whom Abraham also apportioned a tenth of everything. First, his name is
    translated King of Righteousness, and then also King of Salem, that is, King of
    Peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a tithe.' The Greek literally says 'a tenth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'King of Justice.' The Greek word can mean 'righteousness' or 'justice';
      here the main text follows the project's default rendering 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - for whom
  lexicon: BDAG
  rationale: Dative relative pronoun referring back to Melchizedek; 'to whom' fits
    the sense of Abraham giving the tithe to him.
- source_word: δεκάτην
  chosen: a tenth
  alternatives:
  - a tithe
  lexicon: BDAG
  rationale: Literally 'a tenth.' This is transparent and natural English, while still
    conveying the tithe concept. 'A tithe' is possible but slightly more interpretive.
- source_word: ἀπὸ πάντων
  chosen: of everything
  alternatives:
  - from all things
  - from everything
  lexicon: BDAG
  rationale: 'Idiomatic English for the genitive idea after ἀπό in this context: Abraham
    gave a tenth out of the whole spoil/whole amount. ''Of everything'' is concise
    and natural.'
- source_word: ἐμέρισεν
  chosen: apportioned
  alternatives:
  - divided
  - distributed
  - gave
  lexicon: BDAG
  rationale: The verb literally involves dividing or apportioning. 'Apportioned' preserves
    that nuance better than the flatter 'gave,' while remaining readable.
- source_word: πρῶτον μὲν
  chosen: First
  alternatives:
  - first of all
  - in the first place
  lexicon: BDAG
  rationale: Marks the first element in a two-part explanation; concise English is
    sufficient.
- source_word: ἑρμηνευόμενος
  chosen: his name is translated
  alternatives:
  - being translated
  - being interpreted
  lexicon: BDAG
  rationale: The participle introduces the meaning of Melchizedek's name/title. Supplying
    'his name' makes the English explicit and natural without changing the sense.
- source_word: βασιλεὺς δικαιοσύνης
  chosen: King of Righteousness
  alternatives:
  - king of righteousness
  - King of Justice
  lexicon: BDAG
  rationale: A title, so capitalized in English. For δικαιοσύνη, the doctrinal default
    is 'righteousness,' though 'justice' is a lexical possibility; here the traditional
    and contextually fitting sense is retained.
- source_word: ἔπειτα δὲ καὶ
  chosen: and then also
  alternatives:
  - then also
  - after that also
  lexicon: BDAG
  rationale: Preserves the sequential explanatory structure from the Greek.
- source_word: βασιλεὺς Σαλήμ
  chosen: King of Salem
  alternatives:
  - king of Salem
  lexicon: BDAG
  rationale: Σαλήμ is a place name and is transliterated per translation philosophy;
    the phrase is a title and so capitalized.
- source_word: ὅ ἐστιν
  chosen: that is
  alternatives:
  - which means
  - which is
  lexicon: BDAG
  rationale: Introduces an explanatory gloss of 'Salem'; 'that is' is idiomatic and
    suitably formal.
- source_word: βασιλεὺς εἰρήνης
  chosen: King of Peace
  alternatives:
  - king of peace
  lexicon: BDAG
  rationale: A title explaining Salem's meaning; capitalization matches the preceding
    titular phrases.
