theological_decisions:
- issue: Rendering δικαιοσύνη in a titular/name-explanation context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file gives δικαιοσύνη the default rendering 'righteousness,'
    with 'justice' preserved in footnotes where relevant. In this verse the author
    is explaining Melchizedek's name/title, and 'King of Righteousness' best matches
    both the lexical default and established theological resonance without importing
    extra interpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative
    ''justice'' preserved in footnotes where relevant'
