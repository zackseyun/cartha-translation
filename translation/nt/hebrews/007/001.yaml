id: HEB.7.1
reference: Hebrews 7:1
source:
  edition: SBLGNT
  text: Οὗτος γὰρ ὁ Μελχισέδεκ, βασιλεὺς Σαλήμ, ἱερεὺς τοῦ θεοῦ τοῦ ὑψίστου, ⸀ὁ συναντήσας
    Ἀβραὰμ ὑποστρέφοντι ἀπὸ τῆς κοπῆς τῶν βασιλέων καὶ εὐλογήσας αὐτόν,
translation:
  text: For this Melchizedek, king of Salem, priest of God Most High, met Abraham
    as he was returning from the slaughter of the kings and blessed him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “priest of the Most High God.”
    reason: lexical_alternative
  - marker: b
    text: Or, “from defeating the kings.” The Greek more literally says “from the
      slaughter of the kings.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτος γὰρ
  chosen: For this
  alternatives:
  - For this one
  - Now this
  lexicon: BDAG
  rationale: γάρ is explanatory, linking back to the previous argument, so 'For' preserves
    the logical connection. Οὗτος with the proper name is naturally rendered 'this'
    rather than omitted, retaining the demonstrative emphasis.
- source_word: Μελχισέδεκ
  chosen: Melchizedek
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: βασιλεὺς Σαλήμ
  chosen: king of Salem
  alternatives:
  - king of Shalem
  lexicon: BDAG
  rationale: βασιλεύς is straightforwardly 'king.' Σαλήμ is conventionally transliterated
    'Salem'; this also preserves the Genesis 14 connection recognizable to readers.
- source_word: ἱερεὺς τοῦ θεοῦ τοῦ ὑψίστου
  chosen: priest of God Most High
  alternatives:
  - priest of the Most High God
  lexicon: BDAG
  rationale: Both are possible in English. 'God Most High' follows the Greek order
    more closely while remaining natural. It preserves ὕψιστος as a divine title modifying
    God.
- source_word: συναντήσας
  chosen: met
  alternatives:
  - encountered
  lexicon: BDAG
  rationale: Aorist participle describing Melchizedek's action toward Abraham. 'Met'
    is the most natural and contextually precise rendering in English.
- source_word: Ἀβραὰμ
  chosen: Abraham
  rationale: Standard English transliteration of the personal name.
- source_word: ὑποστρέφοντι
  chosen: as he was returning
  alternatives:
  - returning
  - when he returned
  lexicon: BDAG
  rationale: Present participle in the dative modifying Abraham, contemporaneous with
    the meeting. 'As he was returning' captures the ongoing action and reads naturally
    in English.
- source_word: ἀπὸ τῆς κοπῆς τῶν βασιλέων
  chosen: from the slaughter of the kings
  alternatives:
  - from defeating the kings
  - from the massacre of the kings
  lexicon: BDAG
  rationale: κοπή literally denotes a cutting down/slaughter. 'Slaughter' preserves
    the force of the noun better than the more interpretive 'defeat,' while fitting
    the military context of Genesis 14.
- source_word: εὐλογήσας αὐτόν
  chosen: and blessed him
  lexicon: BDAG
  rationale: Aorist participle coordinated with συναντήσας, expressing the second
    action Melchizedek performed toward Abraham. 'Blessed him' is the standard and
    accurate rendering.
