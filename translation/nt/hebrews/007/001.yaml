theological_decisions:
- issue: Rendering the divine title τοῦ θεοῦ τοῦ ὑψίστου
  chosen_reading: priest of God Most High
  alternative_readings:
  - priest of the Most High God
  rationale: This is a stylistic rather than doctrinal choice. The chosen rendering
    stays close to Greek word order while preserving the recognized divine title without
    importing additional theological nuance.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English.'
