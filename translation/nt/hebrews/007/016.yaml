theological_decisions:
- issue: Meaning of σαρκίνης in contrast with ἀκαταλύτου
  chosen_reading: Rendered as 'fleshly' to denote bodily/genealogical, mortal qualification rather than moral sinfulness.
  alternative_readings:
  - physical
  - bodily
  - carnal
  rationale: The verse contrasts priestly qualification based on external, mortal lineage regulations with qualification based on the power of indestructible life. Translating with a moral sense ('sinful') would import a doctrinal claim the text does not make.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Rendering ἀκαταλύτου
  chosen_reading: Rendered 'indestructible' in the main text.
  alternative_readings:
  - endless
  rationale: This preserves both durability and incapacity for dissolution, not merely unending duration. The traditional 'endless life' is worth preserving in a footnote because of familiarity and possible contextual fit.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
