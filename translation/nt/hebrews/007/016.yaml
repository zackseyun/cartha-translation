  from: a law of fleshly commandment
  to: a law defined by a fleshly commandment
  rationale: The phrase 'a law of fleshly commandment' is a literal rendering of the Greek genitive construction (νόμον ἐντολῆς) but is slightly awkward and ambiguous in English. The genitive is likely one of apposition or characteristic ('a law which is/consists of a fleshly commandment'). The suggested rewrite clarifies this relationship, making it explicit that the law's nature is defined by this type of commandment, thereby improving readability without altering the core meaning or lexical choices.
