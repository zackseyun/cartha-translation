id: HEB.7.16
reference: Hebrews 7:16
source:
  edition: SBLGNT
  text: ὃς οὐ κατὰ νόμον ἐντολῆς ⸀σαρκίνης γέγονεν ἀλλὰ κατὰ δύναμιν ζωῆς ἀκαταλύτου,
translation:
  text: who has become such not according to a law defined by a fleshly commandment, but according to the power of an indestructible life,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of a physical requirement' or 'of a bodily commandment.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'of an endless life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a law of fleshly commandment'.
    reason: previous_rendering
lexical_decisions:
- source_word: ὃς
  chosen: who
  alternatives:
  - he who
  lexicon: BDAG
  rationale: Relative pronoun referring back to the one spoken of in the previous verse; 'who' is natural English and preserves the syntactic link.
- source_word: κατὰ νόμον
  chosen: according to a law
  alternatives:
  - on the basis of a law
  - in accordance with law
  lexicon: BDAG
  rationale: κατά with the accusative here expresses standard or basis. The anarthrous νόμον is best rendered 'a law' rather than 'the law,' since the focus is on legal principle rather than specifically the Mosaic law as a named entity.
- source_word: ἐντολῆς σαρκίνης
  chosen: of fleshly commandment
  alternatives:
  - of a fleshly command
  - of bodily regulation
  - of physical requirement
  lexicon: BDAG
  rationale: 'The genitive likely qualifies νόμον: a law characterized by a commandment that is σαρκίνη. ''Fleshly'' preserves the lexical link to σάρξ-family language without importing the moral sense ''sinful nature''; here it points to outward, bodily, genealogical qualification. ''Commandment'' is more precise than the broader ''requirement,'' though the latter is a viable interpretive alternative.'
- source_word: σαρκίνης
  chosen: fleshly
  alternatives:
  - physical
  - bodily
  - earthly
  lexicon: BDAG
  rationale: σαρκίνος means 'made of flesh' or 'belonging to flesh.' In this context it contrasts with 'indestructible life,' so 'fleshly' best preserves the source imagery and theological contrast while avoiding the misleading moralized sense of 'sinful.'
- source_word: γέγονεν
  chosen: has become such
  alternatives:
  - has become
  - came to be
  - has been made
  lexicon: BDAG
  rationale: 'Perfect tense indicates a present state resulting from prior action. ''Has become such'' makes explicit the implied predicate from context: he has become priest in this way. This is slightly interpretive but reflects the ellipsis naturally in English.'
- source_word: ἀλλὰ κατὰ δύναμιν
  chosen: but according to the power
  alternatives:
  - but on the basis of the power
  - but in accordance with the power
  lexicon: BDAG
  rationale: Maintains the antithetical parallel with the earlier κατὰ phrase. 'According to the power' is idiomatic and preserves the rhetorical contrast.
- source_word: ζωῆς ἀκαταλύτου
  chosen: of an indestructible life
  alternatives:
  - of an endless life
  - of an imperishable life
  lexicon: BDAG
  rationale: ἀκατάλυτος denotes what cannot be dissolved, destroyed, or brought to an end. 'Indestructible' is more lexically transparent than the traditional 'endless,' which narrows the idea to duration alone. The phrase points to the Messiah's life as unconquerable and not subject to termination.
