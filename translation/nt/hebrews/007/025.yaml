theological_decisions:
- issue: Semantic scope of εἰς τὸ παντελές
  chosen_reading: Rendered as 'completely' in the main text
  alternative_readings:
  - forever
  - to the uttermost
  rationale: The phrase can mean completely, utterly, or for all time. In context,
    both the completeness of salvation and its enduring efficacy are supported by
    the following clause about his perpetual life. To preserve theological tension
    rather than over-resolve it, the main text uses 'completely' and a footnote preserves
    the traditional and temporal alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological
    tension rather than resolve it)
