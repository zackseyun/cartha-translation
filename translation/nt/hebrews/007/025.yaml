id: HEB.7.25
reference: Hebrews 7:25
source:
  edition: SBLGNT
  text: ὅθεν καὶ σῴζειν εἰς τὸ παντελὲς δύναται τοὺς προσερχομένους δι’ αὐτοῦ τῷ θεῷ,
    πάντοτε ζῶν εἰς τὸ ἐντυγχάνειν ὑπὲρ αὐτῶν.
translation:
  text: Therefore he is also able to save completely those who draw near to God through
    him, since he always lives to intercede for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'save forever'; traditionally, 'save to the uttermost.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  chosen: Therefore
  alternatives:
  - Hence
  - For this reason
  lexicon: BDAG
  rationale: Marks an inference from the preceding argument about Jesus' permanent
    priesthood; 'Therefore' is natural English and preserves the logical connection.
- source_word: καὶ
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: BDAG
  rationale: 'Retains the additive force linking this consequence to the prior discussion:
    not only does he hold his priesthood permanently, he is also able to save.'
- source_word: σῴζειν
  chosen: to save
  alternatives:
  - to rescue
  - to deliver
  lexicon: BDAG
  rationale: Standard rendering of σῴζω in a soteriological context; 'save' preserves
    both theological weight and lexical continuity.
- source_word: εἰς τὸ παντελές
  chosen: completely
  alternatives:
  - forever
  - to the uttermost
  - entirely
  lexicon: BDAG
  rationale: παντελές can denote completeness and, by extension in some contexts,
    perpetuity. Here 'completely' best captures comprehensive saving without importing
    a narrower temporal sense into the main text. The traditional alternative 'to
    the uttermost' and the temporal nuance 'forever' are worth preserving in a footnote.
- source_word: δύναται
  chosen: is able
  alternatives:
  - can
  - has power
  lexicon: BDAG
  rationale: Expresses capability grounded in his enduring priesthood. 'Is able' is
    idiomatic and slightly weightier than 'can'.
- source_word: τοὺς προσερχομένους
  chosen: those who draw near
  alternatives:
  - those who come
  - those approaching
  lexicon: BDAG
  rationale: προσέρχομαι in Hebrews often has cultic and relational overtones of approaching
    God in worship/access. 'Draw near' preserves this recurring Hebrews language better
    than the flatter 'come'.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by means of him
  lexicon: BDAG
  rationale: 'Conveys mediation: access to God is through Jesus as priest.'
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - before God
  lexicon: BDAG
  rationale: Dative with προσέρχομαι naturally yields 'draw near to God'; this is
    the standard and clearest English expression.
- source_word: πάντοτε ζῶν
  chosen: since he always lives
  alternatives:
  - always living
  - because he always lives
  lexicon: BDAG
  rationale: The participial clause gives the basis for his saving ability. Rendering
    with 'since' makes the causal relation clear in natural English while preserving
    the durative force of πάντοτε and ζῶν.
- source_word: εἰς τὸ ἐντυγχάνειν
  chosen: to intercede
  alternatives:
  - to make intercession
  - to plead
  lexicon: BDAG
  rationale: Infinitive of purpose/result tied to his ongoing life. 'Intercede' is
    concise, accurate, and readable modern English.
- source_word: ὑπὲρ αὐτῶν
  chosen: for them
  alternatives:
  - on their behalf
  lexicon: BDAG
  rationale: ὑπέρ here denotes representation/benefit. 'For them' is idiomatic; 'on
    their behalf' is a viable fuller alternative.
