theological_decisions:
- issue: Idiomatic representation of Levi's descent from Abraham
  chosen_reading: Retain the concrete idiom 'in the loins of his father' in the main
    text
  alternative_readings:
  - he was still in the body of his ancestor
  - he was still in his father's seed
  rationale: The verse argues representationally that Levi was present in Abraham
    in an ancestral/procreative sense. Preserving the idiom keeps the author's logic
    visible without importing a more technical theological explanation into the translation
    itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Identification of 'his father'
  chosen_reading: Translate as 'his father' rather than explicitly 'Abraham'
  alternative_readings:
  - his ancestor Abraham
  rationale: Although the referent is Abraham, the Greek text says 'his father.' Keeping
    the pronoun and noun structure avoids adding specificity not present in the wording,
    while the context supplies the identity.
  doctrine_reference: Translation philosophy §§1, 5
