id: HEB.7.10
reference: Hebrews 7:10
source:
  edition: SBLGNT
  text: ἔτι γὰρ ἐν τῇ ὀσφύϊ τοῦ πατρὸς ἦν ὅτε συνήντησεν αὐτῷ ⸀Μελχισέδεκ.
translation:
  text: For he was still in the loins of his father when Melchizedek met him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'he was still in the body of his ancestor.' The
      Greek literally says 'in the loins of his father,' an idiom for ancestral descent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Conveys continued prior state at the time of the meeting; 'still' is
    natural modern English here.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Marks explanatory connection to the previous verse; 'for' preserves the
    discourse function without overinterpreting causation.
- source_word: ἐν τῇ ὀσφύϊ
  chosen: in the loins
  alternatives:
  - in the body
  - in the womb/seed
  lexicon: BDAG
  rationale: The idiom refers to ancestral descent/procreative origin. 'Loins' preserves
    the concrete metaphor of the Greek better than a flattened paraphrase.
- source_word: τοῦ πατρὸς
  chosen: of his father
  alternatives:
  - of the father
  lexicon: BDAG
  rationale: The possessive sense is required in English and refers to Levi's father
    in the argument, namely Abraham.
- source_word: ἦν
  chosen: was
  alternatives:
  - existed
  lexicon: BDAG
  rationale: Simple imperfect of 'to be'; 'was' is the most direct and idiomatic rendering.
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time that
  lexicon: BDAG
  rationale: Standard temporal conjunction introducing the time of Melchizedek's encounter
    with Abraham.
- source_word: συνήντησεν
  chosen: met
  alternatives:
  - encountered
  lexicon: BDAG
  rationale: Aorist verb meaning 'met' or 'encountered.' 'Met' is concise and fits
    the Genesis allusion naturally.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - Abraham
  lexicon: BDAG
  rationale: Dative pronoun referring to Abraham. The pronoun is retained in the main
    text because the Greek uses a pronoun, while the referent is clear from context.
- source_word: Μελχισέδεκ
  chosen: Melchizedek
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
