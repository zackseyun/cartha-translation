theological_decisions:
- issue: Referent and evaluative force of the verse
  chosen_reading: The verse emphasizes Melchizedek's greatness by noting that even
    Abraham, identified as the patriarch, gave him a tenth.
  alternative_readings:
  - The verse could be read with stronger emphasis on the superior status implied
    by receiving a tithe from Abraham.
  rationale: The Greek plainly argues for Melchizedek's greatness through Abraham's
    act, but the translation should state only what the verse itself says and leave
    the fuller theological inference to the surrounding context.
  doctrine_reference: Preserve theological tension rather than resolve it.
