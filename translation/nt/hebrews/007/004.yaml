id: HEB.7.4
reference: Hebrews 7:4
source:
  edition: SBLGNT
  text: Θεωρεῖτε δὲ πηλίκος οὗτος ⸀ᾧ δεκάτην Ἀβραὰμ ἔδωκεν ἐκ τῶν ἀκροθινίων ὁ πατριάρχης.
translation:
  text: Now consider how great this man was—to whom Abraham the patriarch gave a tenth
    from the spoils.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a tithe.' The Greek literally says 'a tenth.'
    reason: lexical_alternative
  - marker: b
    text: The Greek term can denote spoils of war, possibly the choicest portion of
      the plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θεωρεῖτε
  chosen: consider
  alternatives:
  - see
  - observe
  - behold
  lexicon: BDAG
  rationale: Present imperative/plural calling the audience to attentive reflection.
    'Consider' is natural modern English and preserves the exhortational force better
    than the more visual 'see' or archaic 'behold.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here marks a mild transition rather than strong contrast. 'Now' signals
    the discourse shift smoothly in English.
- source_word: πηλίκος
  chosen: how great
  alternatives:
  - how important
  - how exalted
  lexicon: BDAG
  rationale: The term expresses magnitude or greatness. 'How great' is the most direct
    and idiomatic rendering in context, leaving the nature of the greatness to the
    argument that follows.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this person
  lexicon: BDAG
  rationale: Refers to Melchizedek in the preceding context. Supplying 'man' makes
    the English natural and reflects the masculine singular reference without overinterpreting.
- source_word: ᾧ
  chosen: to whom
  alternatives:
  - to this one, to whom
  lexicon: BDAG
  rationale: Dative relative pronoun introducing the relative clause governed by 'gave.'
    'To whom' is the straightforward English equivalent.
- source_word: δεκάτην
  chosen: a tenth
  alternatives:
  - a tithe
  lexicon: BDAG
  rationale: Literally 'a tenth.' This is clearer for modern readers while still transparent
    to the source. 'Tithe' is a valid alternative but can carry later institutional
    associations not required by the immediate wording.
- source_word: Ἀβραὰμ
  chosen: Abraham
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ἔδωκεν
  chosen: gave
  alternatives:
  - offered
  lexicon: BDAG
  rationale: Aorist active indicative of δίδωμι; 'gave' is the plain and sufficient
    rendering.
- source_word: ἐκ τῶν ἀκροθινίων
  chosen: from the spoils
  alternatives:
  - from the top of the spoils
  - from the best of the plunder
  - from the choicest spoils
  lexicon: BDAG
  rationale: ἀκροθίνια refers to spoils taken in war, often the top or choicest portion.
    'From the spoils' is concise and idiomatic in English; the nuance of 'choicest'
    is possible but not certain enough to force into the main text.
- source_word: ὁ πατριάρχης
  chosen: the patriarch
  alternatives:
  - the forefather
  lexicon: BDAG
  rationale: A title for Abraham emphasizing his ancestral status. 'The patriarch'
    is the standard and accurate rendering.
