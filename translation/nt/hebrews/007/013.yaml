id: HEB.7.13
reference: Hebrews 7:13
source:
  edition: SBLGNT
  text: ἐφ’ ὃν γὰρ λέγεται ταῦτα φυλῆς ἑτέρας μετέσχηκεν, ἀφ’ ἧς οὐδεὶς προσέσχηκεν
    τῷ θυσιαστηρίῳ·
translation:
  text: For the one about whom these things are said has belonged to another tribe,
    from which no one has attended at the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has shared in another tribe' or 'has come from another tribe.' The Greek
      verb can denote participation or association; here it refers to tribal affiliation.
    reason: lexical_alternative
  - marker: b
    text: Or 'has served at the altar.' The expression refers to priestly attendance
      or service connected with the altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφ’ ὃν
  chosen: about whom
  alternatives:
  - with reference to whom
  - of whom
  lexicon: BDAG
  rationale: 'With λέγεται ταῦτα, ἐπί + accusative here expresses reference or relation:
    the person concerning whom these statements are made.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Introduces an explanatory ground for the previous statement; 'For' preserves
    the argumentative flow.
- source_word: λέγεται ταῦτα
  chosen: these things are said
  alternatives:
  - this is said
  - such things are spoken
  lexicon: BDAG
  rationale: Passive present is best preserved; plural ταῦτα is naturally rendered
    'these things.'
- source_word: φυλῆς ἑτέρας
  chosen: another tribe
  alternatives:
  - a different tribe
  - another clan
  lexicon: BDAG
  rationale: φυλή in this context refers to one of Israel's tribes. ἑτέρας emphasizes
    a different tribe from the priestly one under discussion.
- source_word: μετέσχηκεν
  chosen: has belonged to
  alternatives:
  - has shared in
  - has had a part in
  - has come from
  lexicon: BDAG
  rationale: Perfect tense indicates a settled association up to the present argument.
    In context, the sense is tribal affiliation rather than generic participation,
    so 'has belonged to' is the clearest English rendering.
- source_word: ἀφ’ ἧς
  chosen: from which
  alternatives:
  - from whom
  lexicon: BDAG
  rationale: Refers back to φυλή, so the impersonal 'which' is appropriate.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  - not one person
  lexicon: BDAG
  rationale: Straightforward negated indefinite; 'no one' is natural and formal enough
    for the context.
- source_word: προσέσχηκεν τῷ θυσιαστηρίῳ
  chosen: has attended at the altar
  alternatives:
  - has served at the altar
  - has officiated at the altar
  - has given attention to the altar
  lexicon: BDAG
  rationale: The verb προσέχω literally involves giving attention or attaching oneself
    to something, but in cultic context it refers to attendance/service connected
    with the altar. 'Attended at the altar' preserves the verbal image without over-specifying
    priestly actions.
- source_word: θυσιαστηρίῳ
  chosen: altar
  alternatives:
  - place of sacrifice
  lexicon: BDAG
  rationale: Standard rendering in sacrificial context; clear and conventional.
