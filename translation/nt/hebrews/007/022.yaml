id: HEB.7.22
reference: Hebrews 7:22
source:
  edition: SBLGNT
  text: κατὰ ⸀τοσοῦτο ⸀κρείττονος διαθήκης γέγονεν ἔγγυος Ἰησοῦς.
translation:
  text: By so much, Jesus has become the guarantor of a better covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testament.' The Greek word can mean either 'covenant' or, in some contexts,
      'will/testament'; here 'covenant' best fits the argument about priesthood and
      oath.
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ τοσοῦτο
  chosen: By so much
  alternatives:
  - Accordingly
  - To that extent
  - By this much
  lexicon: BDAG
  rationale: The idiom κατά + accusative of degree expresses measure or extent. 'By
    so much' preserves the comparative force linking this verse to the preceding argument,
    while remaining natural English.
- source_word: κρείττονος
  chosen: better
  alternatives:
  - superior
  lexicon: BDAG
  rationale: κρείττων is a key comparative term in Hebrews. 'Better' is the standard,
    clear rendering and fits the epistle's repeated contrastive rhetoric better than
    the slightly more formal 'superior.'
- source_word: διαθήκης
  chosen: covenant
  alternatives:
  - testament
  lexicon: BDAG
  rationale: In Hebrews, διαθήκη can bear the sense 'covenant' or, in some contexts,
    'will/testament.' Here the priestly and oath context points to God's covenantal
    arrangement rather than a last will. 'Covenant' best matches the immediate argument
    and broader biblical theology.
- source_word: γέγονεν
  chosen: has become
  alternatives:
  - became
  - has been made
  lexicon: BDAG
  rationale: The perfect of γίνομαι indicates a completed action with continuing result.
    'Has become' preserves that aspect better than the simple past 'became' and is
    more direct than the passive-like 'has been made.'
- source_word: ἔγγυος
  chosen: guarantor
  alternatives:
  - surety
  - guarantee
  lexicon: BDAG
  rationale: ἔγγυος denotes one who guarantees or stands as security for an obligation.
    'Guarantor' is precise and understandable in modern English. 'Surety' is traditional
    but less accessible; 'guarantee' would shift from person to abstract concept.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Standard English transliteration of the personal name Ἰησοῦς, in keeping
    with the translation philosophy of transliterating names.
