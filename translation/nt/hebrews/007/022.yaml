theological_decisions:
- issue: Meaning of διαθήκη in Hebrews 7:22
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: Although Hebrews later exploits the semantic overlap of διαθήκη, this
    verse is embedded in the argument about Jesus' priesthood and the oath establishing
    a better covenantal order. Rendering it 'covenant' avoids importing the 'last
    will' nuance prematurely while preserving the author's theological contrast with
    the Levitical arrangement.
  doctrine_reference: Translation philosophy §1, §3; Contested terms table does not
    list διαθήκη, so context governs.
