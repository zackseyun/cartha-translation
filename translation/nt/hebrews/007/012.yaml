id: HEB.7.12
reference: Hebrews 7:12
source:
  edition: SBLGNT
  text: μετατιθεμένης γὰρ τῆς ἱερωσύνης ἐξ ἀνάγκης καὶ νόμου μετάθεσις γίνεται.
translation:
  text: For when the priesthood is changed, of necessity there is also a change of
    law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there is also a change of the law,' explicitly pointing to the Mosaic
      Law that established the Levitical priesthood.
    reason: alternative_reading
lexical_decisions:
- source_word: μετατιθεμένης
  chosen: is changed
  alternatives:
  - is transferred
  - is altered
  - is replaced
  lexicon: BDAG
  rationale: Genitive absolute participle from μετατίθημι, indicating a change/removal
    from one arrangement to another. 'Is changed' is clear modern English and preserves
    the causal-temporal force with γάρ. 'Transferred' is possible but can sound too
    spatial or administrative; the context is a shift in priestly order.
- source_word: ἱερωσύνης
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: BDAG
  rationale: Refers to the institution/office of priesthood rather than merely an
    individual priestly act. 'Priesthood' is the standard and most natural rendering
    in this argument about Levitical versus Melchizedekian priestly order.
- source_word: ἐξ ἀνάγκης
  chosen: of necessity
  alternatives:
  - necessarily
  - inevitably
  lexicon: BDAG
  rationale: 'The phrase expresses logical necessity: given a change in priesthood,
    a corresponding change in law must follow. ''Of necessity'' preserves the formal
    argumentative tone of Hebrews while remaining understandable.'
- source_word: νόμου
  chosen: law
  alternatives:
  - the law
  lexicon: BDAG
  rationale: νόμος here most naturally refers to the legal order governing priesthood,
    especially the Mosaic law. The anarthrous Greek does not require the English article,
    and 'law' keeps the statement slightly broader while still fitting the Mosaic
    context. The alternative 'the law' is viable and worth preserving in a footnote
    because readers may hear a specific reference to the Mosaic Law.
- source_word: μετάθεσις
  chosen: a change
  alternatives:
  - a transfer
  - a removal
  lexicon: BDAG
  rationale: Cognate with μετατιθεμένης and denotes a corresponding change. 'A change'
    best captures the conceptual parallel in idiomatic English. 'Transfer' is less
    natural here, and 'removal' may overstate the nuance.
- source_word: γίνεται
  chosen: there is
  alternatives:
  - comes about
  - takes place
  - occurs
  lexicon: BDAG
  rationale: γίνομαι here introduces the resulting state/event. 'There is' yields
    natural English in the existential construction 'there is also a change of law'
    and preserves the logical force of the sentence.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: Links the change in law as the necessary corollary to the change in priesthood.
    'Also' is the most straightforward rendering of the additive force.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: γάρ connects this verse as an explanation of the preceding argument.
    'For' preserves the discourse relation in a concise, formal way suitable to Hebrews.
