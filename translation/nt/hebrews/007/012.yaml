theological_decisions:
- issue: Scope of νόμος in relation to priesthood
  chosen_reading: Rendered as 'law' in the main text, allowing the immediate sense
    of the legal order governing priesthood while still naturally including the Mosaic
    law in context.
  alternative_readings:
  - the law, explicitly referring to the Mosaic Law
  rationale: The verse argues that a change in priesthood entails a corresponding
    legal change. In context, Hebrews is discussing the Mosaic legal framework, but
    the Greek anarthrous νόμου does not require an overly narrowed English rendering.
    Preserving 'the law' in a footnote maintains the contextual specificity without
    over-translating the article.
  doctrine_reference: Translation philosophy §§1, 3, 5
