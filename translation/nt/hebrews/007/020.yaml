id: HEB.7.20
reference: Hebrews 7:20
source:
  edition: SBLGNT
  text: Καὶ καθ’ ὅσον οὐ χωρὶς ὁρκωμοσίας (οἱ μὲν γὰρ χωρὶς ὁρκωμοσίας εἰσὶν ἱερεῖς
    γεγονότες,
translation:
  text: And inasmuch as this was not without an oath (for they indeed have become
    priests without an oath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not apart from an oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective linking this statement to the preceding argument;
    retained explicitly for discourse flow.
- source_word: καθ’ ὅσον
  chosen: inasmuch as
  alternatives:
  - to the extent that
  - since
  lexicon: BDAG
  rationale: This idiom introduces the basis or measure of the argument. 'Inasmuch
    as' preserves the formal argumentative tone of Hebrews better than the simpler
    'since,' while remaining natural English.
- source_word: οὐ χωρὶς ὁρκωμοσίας
  chosen: not without an oath
  alternatives:
  - not apart from an oath
  - not without swearing an oath
  lexicon: BDAG
  rationale: χωρίς with the genitive means 'without/apart from,' and ὁρκωμοσία denotes
    an oath-taking or sworn declaration. 'Not without an oath' is concise, idiomatic,
    and preserves the emphatic negation.
- source_word: ὁρκωμοσίας
  chosen: an oath
  alternatives:
  - a sworn oath
  - oath-taking
  lexicon: BDAG
  rationale: The noun refers to the act or reality of oath-confirmation. 'An oath'
    is the most natural English rendering in this context.
- source_word: οἱ μὲν γὰρ
  chosen: for they indeed
  alternatives:
  - for on the one hand they
  - for indeed they
  lexicon: BDAG
  rationale: μέν...δέ structure continues across the sentence into the next verse;
    here μέν is anticipatory and γάρ explanatory. 'For they indeed' preserves both
    the explanatory force and the contrast-setting function without overloading the
    English.
- source_word: χωρὶς ὁρκωμοσίας
  chosen: without an oath
  alternatives:
  - apart from an oath
  lexicon: BDAG
  rationale: Repeated phrase should be rendered consistently within the verse.
- source_word: εἰσὶν ἱερεῖς γεγονότες
  chosen: have become priests
  alternatives:
  - were made priests
  - are priests having become
  lexicon: BDAG
  rationale: The periphrastic construction with εἰμί + γεγονότες emphasizes resultant
    state from a completed event. 'Have become priests' is natural English and preserves
    the sense that they entered priestly office.
