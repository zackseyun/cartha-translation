theological_decisions:
- issue: Referent of the contrast between prior priests and the priest established
    by oath
  chosen_reading: The verse contrasts Levitical priests, who became priests without
    an oath, with Jesus' priesthood, established with an oath, without importing further
    doctrinal conclusions into this verse alone.
  alternative_readings:
  - A broader contrast between old-covenant priesthood generally and the Messiah's
    eternal priesthood
  rationale: The immediate context in Hebrews 7 develops the superiority of Jesus'
    priesthood through Psalm 110:4. This verse itself states the oath contrast and
    should not be expanded beyond that explicit claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
