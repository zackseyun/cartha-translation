id: HEB.7.26
reference: Hebrews 7:26
source:
  edition: SBLGNT
  text: Τοιοῦτος γὰρ ἡμῖν ⸀καὶ ἔπρεπεν ἀρχιερεύς, ὅσιος, ἄκακος, ἀμίαντος, κεχωρισμένος
    ἀπὸ τῶν ἁμαρτωλῶν, καὶ ὑψηλότερος τῶν οὐρανῶν γενόμενος·
translation:
  text: 'For such a high priest was indeed fitting for us: holy, innocent, undefiled,
    separated from sinners, and having become higher than the heavens.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set apart from sinners.' The phrase highlights his moral purity and
      exalted status as high priest.
    reason: lexical_alternative
  - marker: b
    text: Or 'exalted above the heavens.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοιοῦτος
  chosen: such
  alternatives:
  - this kind of
  - such as this
  lexicon: BDAG
  rationale: Demonstrative adjective pointing back to the kind of high priest just
    described; 'such' is idiomatic and preserves the anaphoric force.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding argument.
- source_word: ἡμῖν
  chosen: for us
  alternatives:
  - to us
  lexicon: BDAG
  rationale: With ἔπρεπεν, the dative is naturally rendered 'for us,' expressing suitability
    in relation to believers.
- source_word: καὶ ἔπρεπεν
  chosen: was indeed fitting
  alternatives:
  - was fitting
  - was also fitting
  - befitted
  lexicon: BDAG
  rationale: The imperfect ἔπρεπεν expresses what was suitable/appropriate; καί here
    intensifies or adds emphasis rather than simply coordinating, so 'indeed' captures
    the force in natural English.
- source_word: ἀρχιερεύς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering of the cultic office in Hebrews.
- source_word: ὅσιος
  chosen: holy
  alternatives:
  - devout
  - pious
  lexicon: BDAG
  rationale: In this context describing the moral and cultic purity of Jesus as high
    priest, 'holy' is the clearest English equivalent, though 'devout' is possible
    in some contexts.
- source_word: ἄκακος
  chosen: innocent
  alternatives:
  - guileless
  - without malice
  - harmless
  lexicon: BDAG
  rationale: Conveys moral blamelessness and absence of evil intent. 'Harmless' can
    sound weak or merely nonviolent; 'innocent' better fits the priestly characterization.
- source_word: ἀμίαντος
  chosen: undefiled
  alternatives:
  - unstained
  - unpolluted
  lexicon: BDAG
  rationale: Preserves the purity language with likely cultic resonance; 'undefiled'
    is both clear and theologically weighty.
- source_word: κεχωρισμένος ἀπὸ τῶν ἁμαρτωλῶν
  chosen: separated from sinners
  alternatives:
  - set apart from sinners
  lexicon: BDAG
  rationale: Perfect participle indicates a state of separation. 'Separated from sinners'
    is the most direct rendering; context suggests moral/exalted distinction, not
    denial of Jesus' earthly association with sinners.
- source_word: ὑψηλότερος τῶν οὐρανῶν
  chosen: higher than the heavens
  alternatives:
  - exalted above the heavens
  lexicon: BDAG
  rationale: Comparative adjective with genitive is straightforwardly 'higher than
    the heavens.' 'Exalted above the heavens' is interpretive and smoother, but the
    more literal comparative is preferred in the main text.
- source_word: γενόμενος
  chosen: having become
  alternatives:
  - becoming
  - having been made
  lexicon: BDAG
  rationale: Aorist middle participle is best represented as 'having become,' indicating
    the resultant exalted status without specifying agency beyond the broader context.
