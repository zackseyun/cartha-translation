theological_decisions:
- issue: Relation of Jesus to sinners in 'separated from sinners'
  chosen_reading: The phrase denotes Jesus' moral purity and exalted status, not a
    denial that he associated with sinners during his earthly ministry.
  alternative_readings:
  - A purely spatial separation from sinful people
  - A post-ascension separation only
  rationale: The immediate string of predicates emphasizes priestly fitness, purity,
    and exaltation. Rendering the phrase straightforwardly while avoiding over-interpretation
    preserves the text's theological tension and coherence with the Gospels.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Force of γενόμενος with 'higher than the heavens'
  chosen_reading: Rendered as 'having become higher than the heavens' to reflect exaltation
    language without implying a change in divine nature.
  alternative_readings:
  - '''being higher than the heavens'' as a stative description'
  - '''having been exalted above the heavens'' with explicit passive nuance'
  rationale: The participle marks a historical/resultative movement into exalted status
    in salvation history. The wording must not suggest adoptionism or a change in
    Christ's divine identity; it refers to his exalted priestly position.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon
    (451 AD)'
