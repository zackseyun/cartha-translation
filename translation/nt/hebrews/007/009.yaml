theological_decisions:
- issue: Representative participation of Levi in Abraham's action
  chosen_reading: The wording preserves the author's argument that Levi, in some sense,
    paid tithes through Abraham, without specifying a later doctrinal mechanism beyond
    the text.
  alternative_readings:
  - Levi is viewed corporately in his ancestor Abraham
  - Levi is said to pay tithes only in a rhetorical or figurative sense
  rationale: The verse argues for Melchizedek's superiority over the Levitical order
    by treating Abraham as Levi's representative ancestor. The translation keeps the
    mediated language 'through Abraham' and the qualifier 'so to speak,' preserving
    the text's tension without flattening it into either strict literalism or mere
    metaphor.
  doctrine_reference: Preserve theological tension rather than resolve it.
