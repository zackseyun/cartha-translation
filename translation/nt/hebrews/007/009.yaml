id: HEB.7.9
reference: Hebrews 7:9
source:
  edition: SBLGNT
  text: καὶ ὡς ἔπος εἰπεῖν, δι’ Ἀβραὰμ καὶ Λευὶ ὁ δεκάτας λαμβάνων δεδεκάτωται,
translation:
  text: And, so to speak, through Abraham even Levi, who receives tithes, has been
    tithed,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as one might say' / 'as it were.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has paid tithes.' The Greek is passive ('has been tithed'), expressing
      that Levi is regarded as having paid tithes through Abraham.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ἔπος εἰπεῖν
  chosen: so to speak
  alternatives:
  - as one might say
  - as it were
  lexicon: BDAG
  rationale: Idiomatic expression introducing a qualified or figurative way of speaking.
    'So to speak' is natural modern English and preserves the author's rhetorical
    softening better than the more archaic 'as it were.'
- source_word: δι’ Ἀβραὰμ
  chosen: through Abraham
  alternatives:
  - in Abraham
  - by Abraham
  lexicon: BDAG
  rationale: διά with the genitive normally expresses agency or instrumentality. Here
    the argument is that Levi is represented in Abraham's action, so 'through Abraham'
    best captures mediated participation without overinterpreting it.
- source_word: καὶ Λευὶ
  chosen: even Levi
  alternatives:
  - Levi also
  lexicon: BDAG
  rationale: καί here has an additive/emphatic force in the argument. 'Even Levi'
    conveys the surprising extension of the point more idiomatically than 'Levi also.'
- source_word: ὁ δεκάτας λαμβάνων
  chosen: who receives tithes
  alternatives:
  - the one receiving tithes
  - the one who collects tithes
  lexicon: BDAG
  rationale: Present participle used substantivally to describe Levi in his priestly
    role. 'Who receives tithes' is smooth English and preserves the ongoing characteristic
    function.
- source_word: δεκάτας
  chosen: tithes
  alternatives:
  - tenths
  lexicon: BDAG
  rationale: Standard cultic/economic term for a tenth given; 'tithes' is the established
    and accurate English equivalent in this context.
- source_word: δεδεκάτωται
  chosen: has been tithed
  alternatives:
  - has paid tithes
  - has given a tenth
  lexicon: BDAG
  rationale: 'Perfect passive indicates a completed action with present argumentative
    force: Levi stands as one who has been made to pay tithes in Abraham. ''Has been
    tithed'' preserves the passive form and the author''s compressed logic better
    than the more interpretive active paraphrase ''has paid tithes.'''
