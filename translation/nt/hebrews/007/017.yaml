id: HEB.7.17
reference: Hebrews 7:17
source:
  edition: SBLGNT
  text: ⸀μαρτυρεῖται γὰρ ὅτι Σὺ ἱερεὺς εἰς τὸν αἰῶνα κατὰ τὴν τάξιν Μελχισέδεκ.
translation:
  text: 'For it is testified: “You are a priest forever according to the order of
    Melchizedek.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “after the order of Melchizedek.”
    reason: lexical_alternative
  - marker: b
    text: Quotation from Psalm 110:4.
    reason: cross_reference
lexical_decisions:
- source_word: μαρτυρεῖται
  chosen: it is testified
  alternatives:
  - he testifies
  - it is witnessed
  - it is declared
  lexicon: BDAG
  rationale: Present passive/impersonal form; in context introducing scriptural testimony.
    'It is testified' preserves the passive and the sense that Scripture bears witness,
    without over-specifying the subject.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connective giving the reason or support for the preceding statement.
    'For' is the most natural concise English equivalent here.
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the testimony, here a direct citation from
    Psalm 110:4. English punctuation with a colon reads more naturally than retaining
    'that' before a quotation.
- source_word: Σὺ
  chosen: You
  lexicon: BDAG
  rationale: Second-person singular pronoun, emphatic in position. English 'You' adequately
    carries the direct address of the citation.
- source_word: ἱερεὺς
  chosen: a priest
  lexicon: BDAG
  rationale: Predicate nominative identifying the addressee's role. The indefinite
    article is required by natural English though absent in Greek.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: Idiomatic expression meaning perpetually. 'Forever' is clear modern English
    and captures the temporal force better than a more wooden 'for the age.'
- source_word: κατὰ τὴν τάξιν
  chosen: according to the order of
  alternatives:
  - after the order of
  - in the manner of
  lexicon: BDAG
  rationale: Standard phrase indicating correspondence to a pattern or ordered category.
    'According to the order of' is clear and sufficiently formal; 'after the order
    of' is traditional but less natural in contemporary English.
- source_word: Μελχισέδεκ
  chosen: Melchizedek
  lexicon: BDAG
  rationale: Personal name, so transliterated per translation philosophy rather than
    translated.
