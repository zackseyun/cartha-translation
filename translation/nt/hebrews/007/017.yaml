theological_decisions:
- issue: Rendering the Psalm citation's priestly designation without importing later
    doctrinal explanation
  chosen_reading: Retain the direct statement 'You are a priest forever according
    to the order of Melchizedek' as a citation of scriptural testimony.
  alternative_readings:
  - Expand to 'high priest' for theological clarity
  rationale: The Greek text says 'priest,' not 'high priest,' in this verse. Although
    Hebrews develops Jesus as high priest, importing 'high' here would go beyond the
    source text and improperly resolve theology by expansion.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
