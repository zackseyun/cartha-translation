id: HEB.7.28
reference: Hebrews 7:28
source:
  edition: SBLGNT
  text: ὁ νόμος γὰρ ἀνθρώπους καθίστησιν ἀρχιερεῖς ἔχοντας ἀσθένειαν, ὁ λόγος δὲ τῆς
    ὁρκωμοσίας τῆς μετὰ τὸν νόμον υἱόν, εἰς τὸν αἰῶνα τετελειωμένον.
translation:
  text: For the law appoints men as high priests who have weakness, but the word of
    the oath, which came after the law, appoints a Son, perfected forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Son.' Greek has 'a Son' without the article, emphasizing the contrast
      with 'men' while still referring to Jesus in context.
    reason: alternative_reading
  - marker: b
    text: Or, 'made perfect forever'; the verb can also carry the sense 'brought to
      completion' or, in priestly context, 'consecrated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  chosen: the law
  alternatives:
  - Law
  lexicon: BDAG
  rationale: In Hebrews this refers to the Mosaic law/cultic legislation. Lowercase
    'law' is natural English while still signaling the Torah-based priestly system.
- source_word: καθίστησιν
  chosen: appoints
  alternatives:
  - makes
  - installs
  lexicon: BDAG
  rationale: In context of priestly office, 'appoints' best conveys formal establishment
    in office without sounding wooden.
- source_word: ἀνθρώπους
  chosen: men
  alternatives:
  - human beings
  - people
  lexicon: BDAG
  rationale: Gender-accurate rendering is appropriate because the referent is the
    historical Levitical high priesthood, which was male. This also matches the source's
    concrete reference rather than a generic abstraction.
- source_word: ἀρχιερεῖς
  chosen: high priests
  alternatives:
  - chief priests
  lexicon: BDAG
  rationale: The singular office is represented across successive holders; plural
    'high priests' is the natural rendering here.
- source_word: ἔχοντας ἀσθένειαν
  chosen: who have weakness
  alternatives:
  - who are weak
  - subject to weakness
  lexicon: BDAG
  rationale: This preserves the participial construction and the noun ἀσθένεια. 'Weakness'
    in Hebrews includes human frailty and susceptibility, not merely physical illness.
- source_word: λόγος
  chosen: the word
  alternatives:
  - the statement
  - the declaration
  lexicon: BDAG
  rationale: Here λόγος refers to the spoken/scriptural pronouncement embodied in
    God's oath. 'Word' preserves the biblical register and links to the cited oath
    tradition.
- source_word: ὁρκωμοσίας
  chosen: the oath
  alternatives:
  - the sworn oath
  lexicon: BDAG
  rationale: Straightforward rendering of the genitive; the phrase means the word
    characterized by or containing the oath.
- source_word: τῆς μετὰ τὸν νόμον
  chosen: which came after the law
  alternatives:
  - which was after the law
  - after the law
  lexicon: BDAG
  rationale: This relative-like English expansion makes explicit that the oath was
    given later than the law, matching the argument of Psalm 110 in Hebrews.
- source_word: υἱόν
  chosen: a Son
  alternatives:
  - the Son
  - son
  lexicon: BDAG
  rationale: Anarthrous υἱόν lacks the article. 'A Son' preserves the qualitative
    force and contrast with 'men' while still clearly referring to the unique Son
    in context. 'The Son' is a possible contextual rendering but is less formally
    tied to the Greek wording.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: Idiomatic rendering of the prepositional phrase in this context of enduring
    priesthood.
- source_word: τετελειωμένον
  chosen: perfected
  alternatives:
  - made perfect
  - brought to completion
  - consecrated
  lexicon: BDAG
  rationale: The perfect passive participle should be preserved. In Hebrews τελειόω
    carries the sense of being brought to the intended completeness/fitness for priestly
    ministry. 'Perfected' is concise and keeps the theological resonance; 'consecrated'
    is interpretive and better preserved in a footnote.
