theological_decisions:
- issue: Rendering of anarthrous υἱόν in contrast with ἀνθρώπους
  chosen_reading: a Son
  alternative_readings:
  - the Son
  - son
  rationale: The verse contrasts law-appointed human high priests with the oath-appointed
    Son. Because υἱόν is anarthrous, the translation preserves that form with 'a Son'
    while capitalizing 'Son' to reflect the immediate christological context in Hebrews.
    This avoids flattening the Greek into a fully definite title while maintaining
    orthodox christological reference.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 4
- issue: Meaning of τετελειωμένον in Hebrews' priestly theology
  chosen_reading: perfected forever
  alternative_readings:
  - made perfect forever
  - consecrated forever
  rationale: The translation preserves Hebrews' own terminology of perfection/completion
    rather than resolving it into only cultic consecration. This maintains the theological
    tension of the term's semantic range in Hebrews while keeping the wording accessible.
  doctrine_reference: Translation philosophy §§1, 3, 6
