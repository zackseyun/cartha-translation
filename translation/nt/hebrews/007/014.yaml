theological_decisions:
- issue: Reference of 'our Lord'
  chosen_reading: The phrase refers to Jesus, whose tribal descent is from Judah and
    whose priesthood therefore does not derive from Levi.
  rationale: The immediate context in Hebrews argues for Jesus' priesthood according
    to Melchizedek rather than Levitical descent. The translation leaves the referent
    as 'our Lord' without adding 'Jesus,' preserving the text while recognizing the
    contextual identification.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §2 (translate
    titles)'
- issue: Force of ἀνατέταλκεν
  chosen_reading: A metaphor of arising/springing up from Judah, referring to lineage/origin
    rather than resurrection.
  alternative_readings:
  - has risen (which could be misconstrued as resurrection)
  rationale: In context the author is discussing tribal descent and priestly qualification,
    so the verb concerns origin from Judah. 'Has arisen' preserves the lexical image
    without importing resurrection as the main sense.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension without importing claims)
