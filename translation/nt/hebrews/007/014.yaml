id: HEB.7.14
reference: Hebrews 7:14
source:
  edition: SBLGNT
  text: πρόδηλον γὰρ ὅτι ἐξ Ἰούδα ἀνατέταλκεν ὁ κύριος ἡμῶν, εἰς ἣν φυλὴν ⸂περὶ ἱερέων
    οὐδὲν⸃ Μωϋσῆς ἐλάλησεν.
translation:
  text: For it is evident that our Lord has arisen from Judah, a tribe about which
    Moses said nothing concerning priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has sprung up from Judah.' The Greek verb evokes the image of rising
      or springing up; here it refers to origin from the tribe of Judah, not primarily
      to resurrection.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόδηλον
  chosen: it is evident
  alternatives:
  - it is clear
  - it is obvious
  - it is plain
  lexicon: BDAG
  rationale: Impersonal predicate adjective introducing a statement of obvious fact.
    'It is evident' is natural modern English and preserves the force without sounding
    overly colloquial.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding argument. 'For' is
    concise and suitable in this logical context.
- source_word: ἐξ Ἰούδα
  chosen: from Judah
  alternatives:
  - out of Judah
  - from the tribe of Judah
  lexicon: BDAG
  rationale: The preposition marks origin/descent. 'From Judah' is sufficiently clear,
    while the following clause explicitly mentions 'tribe,' so repeating 'tribe' here
    would be unnecessarily interpretive.
- source_word: ἀνατέταλκεν
  chosen: has arisen
  alternatives:
  - has sprung up
  - has come forth
  - has descended
  lexicon: BDAG
  rationale: Perfect tense of ἀνατέλλω literally evokes rising/springing up. 'Has
    arisen' preserves the metaphor and works idiomatically for lineage/origin in English.
    'Has descended' would over-interpret toward genealogy; 'has sprung up' is vivid
    but less natural in contemporary Bible English.
- source_word: ὁ κύριος ἡμῶν
  chosen: our Lord
  alternatives:
  - the Lord of us
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per doctrinal guidance on contested terms.
    The possessive pronoun is naturally placed before the title in English.
- source_word: εἰς ἣν φυλήν
  chosen: a tribe about which
  alternatives:
  - with reference to which tribe
  - into which tribe
  lexicon: BDAG
  rationale: This relative phrase introduces the tribe just named and sets up Moses'
    silence regarding priesthood. Rendering with 'about which' captures the idiomatic
    force in English better than a more wooden construction.
- source_word: περὶ ἱερέων οὐδὲν
  chosen: nothing concerning priests
  alternatives:
  - nothing about priests
  - nothing concerning priesthood
  lexicon: BDAG
  rationale: The Greek speaks specifically 'concerning priests,' not the abstract
    institution 'priesthood.' 'Concerning priests' is slightly more formal and matches
    the prepositional phrase well.
- source_word: Μωϋσῆς ἐλάλησεν
  chosen: Moses said
  alternatives:
  - Moses spoke
  - Moses declared
  lexicon: BDAG
  rationale: λαλέω commonly means 'speak/say.' 'Said' is the most natural English
    in this context and avoids stiffness while preserving the sense.
