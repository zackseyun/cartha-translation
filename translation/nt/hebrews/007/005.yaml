id: HEB.7.5
reference: Hebrews 7:5
source:
  edition: SBLGNT
  text: καὶ οἱ μὲν ἐκ τῶν υἱῶν Λευὶ τὴν ἱερατείαν λαμβάνοντες ἐντολὴν ἔχουσιν ἀποδεκατοῦν
    τὸν λαὸν κατὰ τὸν νόμον, τοῦτ’ ἔστιν τοὺς ἀδελφοὺς αὐτῶν, καίπερ ἐξεληλυθότας
    ἐκ τῆς ὀσφύος Ἀβραάμ·
translation:
  text: And those from the sons of Levi who receive the priesthood have a commandment
    according to the law to collect a tenth from the people—that is, from their brothers—even
    though they too have come from Abraham’s loins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their fellow Israelites.” The Greek says “their brothers,” using masculine
      kinship language for fellow members of the people.
    reason: lexical_alternative
  - marker: b
    text: Or “are descended from Abraham.” Literally, “have come out from Abraham’s
      loins.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν ἐκ τῶν υἱῶν Λευὶ
  chosen: those from the sons of Levi
  alternatives:
  - those of the sons of Levi
  - the descendants of Levi
  lexicon: BDAG
  rationale: Retains the partitive sense of ἐκ and the familial language of υἱῶν rather
    than flattening to simply 'Levites.' This preserves the author's focus on those
    specifically drawn from Levi's line for priestly service.
- source_word: τὴν ἱερατείαν λαμβάνοντες
  chosen: who receive the priesthood
  alternatives:
  - who receive the priestly office
  - who take the priesthood
  lexicon: BDAG
  rationale: λαμβάνοντες is best rendered as 'receive,' indicating appointment/possession
    rather than self-assumption. 'Priesthood' is natural and sufficiently formal for
    ἱερατεία.
- source_word: ἐντολὴν ἔχουσιν
  chosen: have a commandment
  alternatives:
  - have a command
  - are commanded
  lexicon: BDAG
  rationale: Keeps the nominal construction of the Greek rather than converting it
    fully into a verbal paraphrase. 'Commandment' reflects ἐντολή with legal-covenantal
    force.
- source_word: ἀποδεκατοῦν
  chosen: to collect a tenth
  alternatives:
  - to take tithes from
  - to tithe
  lexicon: BDAG
  rationale: The verb means to take a tenth from others, not to give a tenth oneself.
    'Collect a tenth' is clear modern English and avoids the ambiguity of English
    'tithe' as either giving or receiving.
- source_word: τὸν λαὸν
  chosen: the people
  alternatives:
  - the people of Israel
  - the nation
  lexicon: BDAG
  rationale: A straightforward rendering of λαός. The immediate apposition clarifies
    that this refers to their fellow Israelites, so no expansion is needed in the
    main text.
- source_word: κατὰ τὸν νόμον
  chosen: according to the law
  alternatives:
  - in accordance with the law
  - under the law
  lexicon: BDAG
  rationale: Preserves the standard legal/normative sense of κατά with the accusative
    and keeps the Mosaic-law context explicit.
- source_word: τοῦτ’ ἔστιν
  chosen: that is
  alternatives:
  - namely
  - that is to say
  lexicon: BDAG
  rationale: Natural English for an explanatory apposition.
- source_word: τοὺς ἀδελφοὺς αὐτῶν
  chosen: their brothers
  alternatives:
  - their brothers and sisters
  - their fellow Israelites
  - their brethren
  lexicon: BDAG
  rationale: Per the gender-accurate policy, ἀδελφοὺς is rendered 'brothers' because
    the Greek is masculine and the context is kinship within Israel. The broader representative
    sense can be noted in a footnote rather than neutralized in the main text.
- source_word: καίπερ
  chosen: even though
  alternatives:
  - although
  - despite the fact that
  lexicon: BDAG
  rationale: Captures the concessive force clearly in modern English.
- source_word: ἐξεληλυθότας ἐκ τῆς ὀσφύος Ἀβραάμ
  chosen: they too have come from Abraham’s loins
  alternatives:
  - they too are descended from Abraham
  - they too have come from Abraham's body
  lexicon: BDAG
  rationale: Preserves the concrete ancestral idiom ἐκ τῆς ὀσφύος while remaining
    intelligible. 'Loins' is somewhat formal but still readable and reflects the bodily
    descent imagery important to the argument in Hebrews 7.
