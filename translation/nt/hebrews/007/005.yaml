theological_decisions:
- issue: Rendering of kinship language in a representative Israelite context
  chosen_reading: their brothers
  alternative_readings:
  - their fellow Israelites
  - their brothers and sisters
  rationale: The Greek uses masculine ἀδελφούς in a kinship/covenantal sense. Following
    the doctrine's gender-accurate policy, the main text keeps 'brothers' rather than
    neutralizing the term, while a footnote can clarify the broader referent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Retention of bodily descent idiom
  chosen_reading: have come from Abraham’s loins
  alternative_readings:
  - are descended from Abraham
  rationale: The verse's argument depends on shared physical descent from Abraham.
    Preserving the bodily idiom maintains the rhetorical force of the comparison between
    Levi's sons and their fellow Israelites.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
