theological_decisions:
- issue: Nature of the contrast between the Levitical priests and Jesus' priesthood
  chosen_reading: The verse is rendered to stress the multiplicity of former priests
    due to mortality, preparing for the contrast with Jesus' enduring priesthood in
    the next verse, without importing additional doctrinal conclusions.
  alternative_readings:
  - A more interpretive rendering could explicitly mention the Levitical priesthood
    in the main text
  rationale: The Greek itself does not name 'Levitical' here, though the context makes
    it clear. The translation preserves the textual argument without adding explanatory
    material to the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
