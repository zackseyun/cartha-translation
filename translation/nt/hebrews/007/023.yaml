id: HEB.7.23
reference: Hebrews 7:23
source:
  edition: SBLGNT
  text: Καὶ οἱ μὲν πλείονές εἰσιν γεγονότες ἱερεῖς διὰ τὸ θανάτῳ κωλύεσθαι παραμένειν·
translation:
  text: And they indeed have become many priests, because they are prevented by death
    from remaining in office,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there have been many priests.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from remaining'; the sense in context is remaining in the priestly
      office.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν πλείονές εἰσιν γεγονότες ἱερεῖς
  chosen: they indeed have become many priests
  alternatives:
  - there have been many priests
  - the former priests were many in number
  lexicon: BDAG
  rationale: The construction emphasizes the plurality of priests under the former
    order in contrast with the singular priesthood of Christ in the following verse.
    'Have become many priests' preserves the perfect participle γεγονότες and the
    predicate sense, while remaining natural English. 'Indeed' reflects μέν and anticipates
    the contrast with δέ in v. 24.
- source_word: διὰ τὸ θανάτῳ κωλύεσθαι
  chosen: because they are prevented by death
  alternatives:
  - because death prevents them
  - because they were hindered by death
  lexicon: BDAG
  rationale: 'διά with the articular infinitive gives the reason. The passive infinitive
    κωλύεσθαι is well represented by ''are prevented,'' and θανάτῳ is instrumental:
    death is the means/cause that stops them.'
- source_word: παραμένειν
  chosen: from remaining in office
  alternatives:
  - from continuing
  - from remaining
  lexicon: BDAG
  rationale: In this priestly context, παραμένειν means to continue or remain in one's
    role. 'In office' makes explicit the contextual sense without adding a new idea,
    clarifying that the issue is continuance in priestly service rather than mere
    physical location or existence.
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Moreover
  lexicon: BDAG
  rationale: A simple connective best reflects the Greek and maintains the flow of
    argument from the preceding context.
