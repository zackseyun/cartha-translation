theological_decisions:
- issue: Nuance of ἕτερος in relation to the priesthood
  chosen_reading: another priest
  alternative_readings:
  - a different priest
  rationale: The verse argues for a priest distinct from the Levitical order, patterned
    after Melchizedek. 'Another priest' is idiomatic and sufficient, while the stronger
    nuance 'different priest' is preserved as an alternative lexical possibility without
    overstating the contrast in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
