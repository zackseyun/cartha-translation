id: HEB.7.18
reference: Hebrews 7:18
source:
  edition: SBLGNT
  text: ἀθέτησις μὲν γὰρ γίνεται προαγούσης ἐντολῆς διὰ τὸ αὐτῆς ἀσθενὲς καὶ ἀνωφελές,
translation:
  text: For there is indeed a setting aside of the former commandment because of its
    weakness and uselessness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the preceding commandment' or 'the commandment that went before.'
    reason: lexical_alternative
  - marker: b
    text: That is, ineffective for bringing the perfection discussed in the surrounding
      context (see Heb 7:19), not a claim that God's prior revelation was evil in
      itself.
    reason: cross_reference
lexical_decisions:
- source_word: ἀθέτησις
  chosen: setting aside
  alternatives:
  - annulment
  - abrogation
  - rejection
  lexicon: BDAG
  rationale: The noun denotes nullification or cancellation. 'Setting aside' is clear
    modern English and preserves the legal-force sense without sounding overly technical.
    It also fits the argument about the prior commandment being superseded.
- source_word: μὲν γὰρ
  chosen: For there is indeed
  alternatives:
  - For on the one hand there is
  - For indeed there is
  lexicon: BDAG
  rationale: μέν with γάρ signals an explanatory development with a forward-looking
    contrast completed in the next verse. English does not require a rigid 'on the
    one hand' here, but 'indeed' preserves the discourse marker while keeping the
    sentence natural.
- source_word: γίνεται
  chosen: there is
  alternatives:
  - there comes to be
  - there occurs
  - takes place
  lexicon: BDAG
  rationale: In this impersonal construction, γίνομαι introduces the fact of an occurrence
    or state. 'There is' is idiomatic English for the existential sense here.
- source_word: προαγούσης ἐντολῆς
  chosen: the former commandment
  alternatives:
  - the preceding commandment
  - the earlier commandment
  - the commandment that went before
  lexicon: BDAG
  rationale: The participle προαγούσης literally means 'going before' or 'preceding.'
    In context it refers to the prior legal command associated with the Levitical
    priesthood. 'Former commandment' is natural English and accurately reflects temporal
    priority.
- source_word: διὰ τὸ αὐτῆς ἀσθενὲς καὶ ἀνωφελές
  chosen: because of its weakness and uselessness
  alternatives:
  - because it was weak and unprofitable
  - because of its weakness and ineffectiveness
  lexicon: BDAG
  rationale: 'διά with the articular adjective construction gives the reason: because
    of the commandment''s being weak and unhelpful. ''Weakness and uselessness'' closely
    mirrors the two substantivized adjectives and preserves the sharpness of the author''s
    evaluation.'
- source_word: ἀσθενές
  chosen: weakness
  alternatives:
  - weak
  - powerless
  - ineffective
  lexicon: BDAG
  rationale: The term indicates lack of strength or efficacy. Rendering it as the
    noun 'weakness' matches the Greek substantival construction and pairs well with
    'uselessness.'
- source_word: ἀνωφελές
  chosen: uselessness
  alternatives:
  - unprofitableness
  - ineffectiveness
  - unhelpfulness
  lexicon: BDAG
  rationale: The adjective means not beneficial or not useful. 'Uselessness' is the
    most direct nominal rendering in contemporary English, though the context is specifically
    cultic ineffectiveness rather than absolute worthlessness in every sense.
