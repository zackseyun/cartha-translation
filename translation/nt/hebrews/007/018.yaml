theological_decisions:
- issue: Scope of the criticism of the 'former commandment'
  chosen_reading: The verse states that the former commandment is set aside because
    of its weakness and uselessness in accomplishing the argument's priestly/perfection-related
    purpose, without implying that God's law was evil or mistaken.
  alternative_readings:
  - A broader claim that the Mosaic law as a whole is simply worthless
  - A softened reading that avoids any real negative assessment
  rationale: The immediate context (Heb 7:11, 19) concerns the inadequacy of the prior
    priestly arrangement to bring perfection. The translation preserves the text's
    strong language ('weakness and uselessness') while not importing a totalizing
    theological claim beyond the author's argument.
  doctrine_reference: Preserve theological tension rather than resolve it
