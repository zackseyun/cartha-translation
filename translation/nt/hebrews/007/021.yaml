theological_decisions:
- issue: Rendering the Psalm 110:4 quotation about the Son's priesthood
  chosen_reading: The verse is translated to emphasize that this priesthood is established
    by God's oath and is permanent.
  alternative_readings:
  - A more formal rendering could preserve the aorist as 'The Lord swore' rather than
    'has sworn'.
  rationale: Hebrews' argument in context contrasts the Levitical priests, appointed
    without an oath, with the Son, appointed by divine oath. The translation preserves
    that theological contrast without importing later doctrinal formulations beyond
    the text.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: κύριος →
    Lord'
