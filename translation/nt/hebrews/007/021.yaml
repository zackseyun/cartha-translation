id: HEB.7.21
reference: Hebrews 7:21
source:
  edition: SBLGNT
  text: ὁ δὲ μετὰ ὁρκωμοσίας διὰ τοῦ λέγοντος πρὸς αὐτόν· Ὤμοσεν κύριος, καὶ οὐ μεταμεληθήσεται,
    Σὺ ἱερεὺς εἰς τὸν ⸀αἰῶνα),
translation:
  text: but this one became a priest with an oath through the one who said to him,
    “The Lord has sworn and will not change his mind, ‘You are a priest forever.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “The Lord swore and will not change his mind.” The Greek
      aorist Ὤμοσεν can be rendered either “swore” or “has sworn.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: but this one
  alternatives:
  - but he
  - but the one
  lexicon: BDAG
  rationale: The article with δέ contrasts this priest with the former priests in
    the previous verse. 'This one' preserves the contrastive, somewhat elliptical
    Greek better than a bare 'he.'
- source_word: μετὰ ὁρκωμοσίας
  chosen: with an oath
  alternatives:
  - by an oath
  - accompanied by an oath
  lexicon: BDAG
  rationale: The phrase indicates attendant circumstance or means. 'With an oath'
    is idiomatic English and preserves the contrast with v. 20, where the Levitical
    priests were made priests without an oath.
- source_word: διὰ τοῦ λέγοντος πρὸς αὐτόν
  chosen: through the one who said to him
  alternatives:
  - through him who said to him
  - by the one saying to him
  lexicon: BDAG
  rationale: διά with the genitive indicates agency/instrumentality. The articular
    participle refers to God as the speaker of the cited Scripture. 'Through the one
    who said to him' is natural English while retaining the mediated/scriptural formulation
    of the Greek.
- source_word: Ὤμοσεν κύριος
  chosen: The Lord has sworn
  alternatives:
  - The Lord swore
  lexicon: BDAG
  rationale: This is a citation of Psalm 110:4 LXX. English often renders such solemn
    scriptural declarations with the present perfect ('has sworn') to convey the abiding
    force of the oath, though the Greek aorist could be rendered 'swore.' 'Lord' follows
    the project's default for κύριος.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - LORD
  - Master
  lexicon: BDAG
  rationale: Per doctrine guidelines, κύριος is normally rendered 'Lord.' Although
    the quotation ultimately reflects YHWH in Psalm 110:4, the Greek text here reads
    κύριος, and the project's contested-terms table sets 'Lord' as the default for
    κύριος.
- source_word: οὐ μεταμεληθήσεται
  chosen: will not change his mind
  alternatives:
  - will not relent
  - will not regret it
  lexicon: BDAG
  rationale: μεταμέλομαι here expresses reversal of stated intention, not moral repentance.
    'Will not change his mind' is clear modern English and fits the oath context.
    'Relent' is possible but can imply softening from judgment; 'regret it' is narrower.
- source_word: Σὺ ἱερεὺς
  chosen: You are a priest
  alternatives:
  - You are priest
  lexicon: BDAG
  rationale: The explicit copula is not present in Greek but is naturally supplied
    in English. The predicate nominative identifies the addressee's priestly status.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for the age
  - for eternity
  lexicon: BDAG
  rationale: In this idiom, εἰς τὸν αἰῶνα means enduring perpetually. 'Forever' is
    the most natural English rendering and captures the temporal force without wooden
    literalism.
