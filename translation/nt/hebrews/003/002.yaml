id: HEB.3.2
reference: Hebrews 3:2
source:
  edition: SBLGNT
  text: πιστὸν ὄντα τῷ ποιήσαντι αὐτὸν ὡς καὶ Μωϋσῆς ⸀ἐν τῷ οἴκῳ αὐτοῦ.
translation:
  text: who was faithful to the one who appointed him, just as Moses also was in all
    his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the one who made him.' The Greek verb can mean 'made,' but here likely
      carries the sense 'appointed' or 'commissioned.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'in all his house,' closely echoing Numbers 12:7;
      others read simply 'in his house.' The phrase likely refers to God's house.
    reason: textual_variant
lexical_decisions:
- source_word: πιστὸν ὄντα
  chosen: who was faithful
  alternatives:
  - being faithful
  - faithful
  lexicon: BDAG
  rationale: The accusative participial phrase modifies Jesus from v.1 and is best
    rendered as a relative clause in natural English. 'Faithful' is the standard sense
    of πιστός here, denoting reliability/faithfulness rather than 'believing.'
- source_word: τῷ ποιήσαντι αὐτὸν
  chosen: to the one who appointed him
  alternatives:
  - to the one who made him
  - to him who appointed him
  lexicon: BDAG
  rationale: ποιέω can mean 'make' or 'do,' but in this context of commissioning for
    office (with comparison to Moses and the following discussion of household stewardship),
    'appointed' best reflects the sense without implying that the Son was created.
    The dative is rendered with 'to' after 'faithful.'
- source_word: ὡς καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - even as
  lexicon: BDAG
  rationale: This comparative construction links Jesus' faithfulness with Moses'.
    'Just as ... also' communicates the comparison clearly in contemporary English.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: ἐν τῷ οἴκῳ αὐτοῦ
  chosen: in all his house
  alternatives:
  - in his house
  - in his household
  lexicon: BDAG
  rationale: The phrase echoes Numbers 12:7 (LXX), where Moses is faithful 'in all
    my house.' Many manuscripts of Hebrews include πάντι/ὅλῳ, and English tradition
    often reflects that fuller wording. Given the strong intertextual echo and the
    likely intended sense of household/house as God's house, 'in all his house' preserves
    the scriptural resonance. 'House' is retained rather than 'household' because
    the following verses develop the house imagery theologically.
