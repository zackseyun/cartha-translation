theological_decisions:
- issue: Meaning of ποιήσαντι with reference to the Son
  chosen_reading: appointed
  alternative_readings:
  - made
  rationale: Rendering ποιήσαντι as 'made' is lexically possible but in this context
    can misleadingly suggest creation of the Son rather than appointment/commissioning.
    In light of the immediate argument about Jesus' role and faithfulness, 'appointed'
    best captures the contextual sense while remaining faithful to the Greek's semantic
    range.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy §1 original-language primacy over translation
    tradition'
- issue: Referent of αὐτοῦ in 'his house'
  chosen_reading: God's house, expressed as 'his house'
  alternative_readings:
  - Moses' house
  rationale: Within the comparison, the likely referent is the one who appointed him,
    i.e., God, and the phrase echoes Numbers 12:7 about Moses being faithful in God's
    house. The pronoun is left as 'his' in the main text to preserve the Greek form
    and the intertextual resonance without over-specifying.
  doctrine_reference: Translation philosophy §3 preserve theological tension rather
    than resolve it
