theological_decisions:
- issue: Rendering of ἀπιστία in relation to the contested term πίστις
  chosen_reading: unbelief
  alternative_readings:
  - faithlessness
  rationale: The immediate context in Hebrews 3 emphasizes Israel's failure to believe
    and trust God's promise, making 'unbelief' the clearest main-text rendering. However,
    'faithlessness' captures the covenantal disloyalty nuance and is preserved in
    a footnote to maintain theological tension without over-resolving the term.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation
    philosophy #3'
