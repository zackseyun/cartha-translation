id: HEB.3.19
reference: Hebrews 3:19
source:
  edition: SBLGNT
  text: καὶ βλέπομεν ὅτι οὐκ ἠδυνήθησαν εἰσελθεῖν δι’ ἀπιστίαν.
translation:
  text: And we see that they were not able to enter because of unbelief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "faithlessness." The Greek term can denote not only lack of belief but
      also unfaithful refusal to trust.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Thus
  lexicon: BDAG
  rationale: Standard connective carried over straightforwardly; 'And' preserves the
    discourse flow from the preceding argument without adding inferential force beyond
    the Greek.
- source_word: βλέπομεν
  chosen: we see
  alternatives:
  - we observe
  - it is evident
  lexicon: BDAG
  rationale: Present active indicative is naturally rendered 'we see.' This keeps
    the author's rhetorical conclusion vivid and direct; more interpretive options
    like 'it is evident' are possible but less formally tied to the first-person plural
    verb.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of what is seen. In idiomatic English it could
    be omitted, but retaining 'that' preserves the clause structure clearly.
- source_word: οὐκ ἠδυνήθησαν
  chosen: they were not able
  alternatives:
  - they could not
  lexicon: BDAG
  rationale: This rendering preserves the verbal idea of ability/inability in δύναμαι.
    'They could not' is idiomatic and slightly tighter, but 'were not able' more transparently
    reflects the Greek wording.
- source_word: εἰσελθεῖν
  chosen: to enter
  alternatives:
  - to go in
  lexicon: BDAG
  rationale: The aorist infinitive of εἰσέρχομαι is best rendered 'to enter' in this
    context, referring to entering the promised rest/land as developed in the passage.
- source_word: δι’
  chosen: because of
  alternatives:
  - through
  - on account of
  lexicon: BDAG
  rationale: With the accusative ἀπιστίαν, διά expresses cause or reason here. 'Because
    of' is the clearest modern English equivalent.
- source_word: ἀπιστίαν
  chosen: unbelief
  alternatives:
  - faithlessness
  - lack of faith
  lexicon: BDAG
  rationale: ἀπιστία commonly denotes unbelief or lack of faith/trust. In this context,
    the emphasis is their refusal to believe God's word, so 'unbelief' is the most
    natural rendering. Because it is semantically related to the contested term πίστις,
    alternatives such as 'faithlessness' are worth preserving, but the default family
    rendering favors 'faith'/'unbelief' unless context strongly demands otherwise.
