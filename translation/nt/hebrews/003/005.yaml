id: HEB.3.5
reference: Hebrews 3:5
source:
  edition: SBLGNT
  text: καὶ Μωϋσῆς μὲν πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ ὡς θεράπων εἰς μαρτύριον τῶν λαληθησομένων,
translation:
  text: And Moses indeed was faithful in all his house as a servant, for a testimony
    of the things that would be spoken later,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his whole household.' The Greek keeps the 'house' imagery that Hebrews
      continues in the following verses.
    reason: lexical_alternative
  - marker: b
    text: Or 'of the things that were to be spoken.' The phrase points forward to
      later divine revelation.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Also
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the verse's continuity with the
    preceding comparison between Jesus and Moses.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: μὲν
  chosen: indeed
  alternatives:
  - on the one hand
  - (implicit/untranslated)
  lexicon: BDAG
  rationale: Marks the first side of a contrast completed in the next verse by δέ.
    'Indeed' preserves the anticipatory contrast in natural English.
- source_word: πιστὸς
  chosen: faithful
  alternatives:
  - trustworthy
  lexicon: BDAG
  rationale: '''Faithful'' is the standard and contextually apt rendering for Moses''
    reliability in God''s service.'
- source_word: ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  chosen: in all his house
  alternatives:
  - in his whole household
  lexicon: BDAG
  rationale: Retains the house/household metaphor from Numbers 12:7 and the immediate
    context in Hebrews 3. 'House' is preferable because the metaphor extends beyond
    a domestic household to God's people/order.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces Moses' role or capacity; 'as' is the most natural rendering
    for role designation.
- source_word: θεράπων
  chosen: servant
  alternatives:
  - attendant
  - minister
  lexicon: BDAG
  rationale: θεράπων denotes a servant/attendant, often with honorable nuance, and
    is distinct from δοῦλος. 'Servant' preserves the dignity of Moses' role without
    importing the stronger bonded sense associated with δοῦλος.
- source_word: εἰς μαρτύριον
  chosen: for a testimony
  alternatives:
  - as a testimony
  - for testimony
  lexicon: BDAG
  rationale: 'Expresses purpose/result: Moses'' faithful service functioned as testimony.
    ''For a testimony'' is clear and sufficiently formal.'
- source_word: τῶν λαληθησομένων
  chosen: of the things that would be spoken later
  alternatives:
  - to the things that would be spoken
  - of the things that were to be spoken
  - concerning the things that would later be spoken
  lexicon: BDAG
  rationale: Future passive participle points to realities later spoken by God, likely
    in the fuller revelation centered in the Son. 'Would be spoken later' makes the
    futurity explicit and reads naturally in English.
