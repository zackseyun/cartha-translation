theological_decisions:
- issue: Meaning of 'his house' in relation to Moses
  chosen_reading: '''his house'' is retained as the biblical metaphor for the sphere
    of God''s household in which Moses served, without resolving it into merely a
    literal domestic household.'
  alternative_readings:
  - '''his household'' as a more explicitly communal rendering'
  rationale: The immediate context in Hebrews 3 develops 'house' as God's people/household,
    echoing Numbers 12:7. Retaining 'house' preserves the intertextual and theological
    linkage without overexplaining in the main text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of θεράπων
  chosen_reading: Moses is called a 'servant,' not a 'slave.'
  alternative_readings:
  - attendant
  - minister
  rationale: Unlike δοῦλος, θεράπων carries a more honorable, specialized service
    nuance. Rendering it 'servant' preserves the distinction that supports the contrast
    with the Son in the next verse.
  doctrine_reference: Translation philosophy §1, §5
