theological_decisions:
- issue: Rendering of ἀπειθήσασιν in a warning passage
  chosen_reading: those who were disobedient
  alternative_readings:
  - those who disobeyed
  - those who did not believe
  rationale: The immediate context in Hebrews 3 interrelates unbelief and disobedience,
    but this verse uses ἀπειθέω rather than ἀπιστέω. To preserve the lexical distinction
    and theological tension, the main text renders the term as disobedience while
    allowing the belief-related nuance to remain implicit from context rather than
    importing it into the translation.
  doctrine_reference: Translation philosophy §3, §5
