id: HEB.3.18
reference: Hebrews 3:18
source:
  edition: SBLGNT
  text: τίσιν δὲ ὤμοσεν μὴ εἰσελεύσεσθαι εἰς τὴν κατάπαυσιν αὐτοῦ εἰ μὴ τοῖς ἀπειθήσασιν;
translation:
  text: And to whom did he swear that they would not enter his rest, if not to those
    who were disobedient?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to those who disobeyed.' The Greek participle can emphasize the act
      of refusing obedience; in context, this disobedience is closely related to unbelief
      (cf. Heb 3:19).
    reason: lexical_alternative
lexical_decisions:
- source_word: τίσιν
  chosen: to whom
  alternatives:
  - to which ones
  - to whom indeed
  lexicon: BDAG
  rationale: Dative plural interrogative referring to persons; 'to whom' is idiomatic
    English and preserves the rhetorical question.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here links with the preceding argument and continues the rhetorical
    sequence. 'And' is natural in English without overstating contrast.
- source_word: ὤμοσεν
  chosen: did he swear
  alternatives:
  - swore
  - took an oath
  lexicon: BDAG
  rationale: Aorist of ὀμνύω means to swear or take an oath. 'Did he swear' fits the
    interrogative structure and keeps the solemn force.
- source_word: μὴ εἰσελεύσεσθαι
  chosen: that they would not enter
  alternatives:
  - not to enter
  - that they should not enter
  lexicon: BDAG
  rationale: 'After ὀμνύω, the infinitive clause expresses the content of the oath.
    English commonly renders this as indirect discourse: ''that they would not enter.'''
- source_word: εἰς τὴν κατάπαυσιν αὐτοῦ
  chosen: his rest
  alternatives:
  - into his rest
  - his resting place
  lexicon: BDAG
  rationale: κατάπαυσις in Hebrews carries the thematic sense of God's rest. 'His
    rest' is concise and natural; the verb 'enter' already implies movement, so 'into'
    is unnecessary in English.
- source_word: εἰ μὴ
  chosen: if not
  alternatives:
  - except
  - unless
  lexicon: BDAG
  rationale: In this rhetorical question, εἰ μὴ introduces the expected answer. 'If
    not' preserves the Greek structure and rhetorical force.
- source_word: τοῖς ἀπειθήσασιν
  chosen: to those who were disobedient
  alternatives:
  - to those who disobeyed
  - to the unbelieving
  - to those who were unpersuaded
  lexicon: BDAG
  rationale: Aorist participle of ἀπειθέω denotes refusal to obey, often with the
    nuance of unbelief expressed in disobedience. In this context, 'were disobedient'
    best matches the warning theme and avoids collapsing the term into mere intellectual
    unbelief.
