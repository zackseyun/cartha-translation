id: HEB.3.15
reference: Hebrews 3:15
source:
  edition: SBLGNT
  text: ἐν τῷ λέγεσθαι· Σήμερον ἐὰν τῆς φωνῆς αὐτοῦ ἀκούσητε, Μὴ σκληρύνητε τὰς καρδίας
    ὑμῶν ὡς ἐν τῷ παραπικρασμῷ.
translation:
  text: as it is being said, “Today, if you hear his voice, do not harden your hearts
    as in the rebellion.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as in the provocation,” echoing the traditional rendering of the Psalm
      95 quotation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λέγεσθαι
  chosen: as it is being said
  alternatives:
  - while it is said
  - in the saying
  - as it is said
  lexicon: BDAG
  rationale: The articular infinitive with ἐν is temporal/circumstantial. The present
    passive infinitive suggests an ongoing citation or continuing relevance. 'As it
    is being said' preserves that aspect more transparently than the more idiomatic
    but less explicit 'as it is said.'
- source_word: Σήμερον
  chosen: Today
  alternatives:
  - This day
  lexicon: BDAG
  rationale: Standard temporal adverb; 'Today' is natural and preserves the urgency
    of the quoted Psalm.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a conditional clause with the aorist subjunctive. 'If' is
    the normal English equivalent in this exhortational citation.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - the voice of him
  lexicon: BDAG
  rationale: A straightforward genitive construction. 'His voice' is idiomatic English
    and preserves the personal address of God in the quotation.
- source_word: ἀκούσητε
  chosen: you hear
  alternatives:
  - you should hear
  - you listen to
  lexicon: BDAG
  rationale: Aorist subjunctive in the conditional clause is best rendered with simple
    present English in this proverbial/exhortational context.
- source_word: Μὴ σκληρύνητε
  chosen: do not harden
  alternatives:
  - do not make hard
  - do not become hard
  lexicon: BDAG
  rationale: The prohibition echoes the LXX wording of Psalm 95:8. 'Do not harden'
    is the established and accurate rendering, whether understood transitively ('harden
    your hearts') or permissively ('let not your hearts be hardened').
- source_word: τὰς καρδίας ὑμῶν
  chosen: your hearts
  lexicon: BDAG
  rationale: Direct object of the prohibition. 'Hearts' retains the biblical anthropological
    sense of the inner person, not merely emotions.
- source_word: ὡς ἐν τῷ παραπικρασμῷ
  chosen: as in the rebellion
  alternatives:
  - as in the provocation
  - as in the bitter rebellion
  lexicon: BDAG
  rationale: παραπικρασμός refers to the rebellion/provocation in the wilderness,
    echoing Psalm 95 and Israel's defiance. 'Rebellion' communicates the event clearly
    in modern English; 'provocation' is more traditional but less transparent.
