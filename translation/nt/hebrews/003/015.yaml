theological_decisions:
- issue: Rendering παραπικρασμός in a Psalm 95 quotation
  chosen_reading: rebellion
  alternative_readings:
  - provocation
  rationale: The term alludes to Israel's wilderness defiance against God. 'Rebellion'
    better communicates the moral and covenantal force for modern readers, while 'provocation'
    is preserved in a footnote because of translation tradition and intertextual familiarity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
