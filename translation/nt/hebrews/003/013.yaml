theological_decisions:
- issue: Mutual exhortation language and gender/inclusivity
  chosen_reading: one another
  alternative_readings:
  - yourselves
  rationale: The Greek reflexive pronoun is plural and reciprocal in sense. Rendering
    'one another' communicates the communal obligation without obscuring the source
    meaning. This aligns with the project's gender-accurate approach by avoiding an
    unnecessarily literal English form that could sound individualistic rather than
    mutual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Interpretation of τὸ Σήμερον
  chosen_reading: “Today” as a scriptural/theological time of present response
  alternative_readings:
  - today in a merely ordinary temporal sense
  rationale: In Hebrews 3 the term echoes Psalm 95 and carries theological weight
    as the present opportunity to respond to God. Quotation marks preserve that intertextual
    force without overexplaining in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
