id: HEB.3.13
reference: Hebrews 3:13
source:
  edition: SBLGNT
  text: ἀλλὰ παρακαλεῖτε ἑαυτοὺς καθ’ ἑκάστην ἡμέραν, ἄχρις οὗ τὸ Σήμερον καλεῖται,
    ἵνα μὴ σκληρυνθῇ ⸂τις ἐξ ὑμῶν⸃ ἀπάτῃ τῆς ἁμαρτίας·
translation:
  text: But encourage one another every day, as long as it is called “Today,” so that
    none of you may be hardened by the deceitfulness of sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Today” echoes Psalm 95 and refers to the present time in which God’s call
      must be answered.
    reason: cross_reference
  - marker: b
    text: Or “exhort one another.” The Greek verb can mean encourage, exhort, urge,
      or comfort depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Instead
  - Rather
  lexicon: BDAG
  rationale: Marks a strong contrast with the preceding warning; 'But' is the most
    natural English adversative here.
- source_word: παρακαλεῖτε
  chosen: encourage
  alternatives:
  - exhort
  - urge
  - comfort
  lexicon: BDAG
  rationale: The verb can cover exhortation, encouragement, and comfort. In this context
    of mutual perseverance against unbelief, 'encourage' communicates the ongoing
    strengthening function in readable modern English without sounding overly harsh
    or technical.
- source_word: ἑαυτοὺς
  chosen: one another
  alternatives:
  - yourselves
  lexicon: BDAG
  rationale: Though formally 'yourselves,' in reciprocal contexts with a plural imperative
    it idiomatically means mutual action. 'One another' best conveys the reciprocal
    force in natural English.
- source_word: καθ’ ἑκάστην ἡμέραν
  chosen: every day
  alternatives:
  - day by day
  - each day
  lexicon: BDAG
  rationale: This phrase denotes daily repetition. 'Every day' is clear, natural,
    and preserves the habitual sense.
- source_word: ἄχρις οὗ
  chosen: as long as
  alternatives:
  - until
  - while
  lexicon: BDAG
  rationale: Here the phrase introduces the continuing period during which the exhortation
    remains urgent. 'As long as' better captures the durative force than a simple
    endpoint-focused 'until.'
- source_word: τὸ Σήμερον
  chosen: it is called “Today”
  alternatives:
  - the 'Today' is called
  - today remains
  lexicon: BDAG
  rationale: The article plus adverb functions substantivally, echoing Psalm 95's
    'Today.' Rendering with quotation marks preserves its scriptural, thematic force.
    Supplying 'it is called' yields idiomatic English while retaining the passive
    verb.
- source_word: καλεῖται
  chosen: is called
  alternatives:
  - is named
  lexicon: BDAG
  rationale: A straightforward passive rendering that preserves the Greek wording
    and the scriptural allusion.
- source_word: ἵνα μὴ
  chosen: so that ... may not
  alternatives:
  - lest
  lexicon: BDAG
  rationale: Expresses purpose with negative result to be avoided. 'So that ... may
    not' is clear modern English; in the final sentence it is smoothed to 'so that
    none of you may be...'.
- source_word: σκληρυνθῇ
  chosen: may be hardened
  alternatives:
  - become hardened
  lexicon: BDAG
  rationale: The passive preserves the sense that hardening happens to a person under
    sin's influence. 'May be hardened' is concise and faithful.
- source_word: τις ἐξ ὑμῶν
  chosen: none of you
  alternatives:
  - any one of you
  - someone among you
  lexicon: BDAG
  rationale: With μή after ἵνα, the indefinite τις is naturally rendered in English
    as a negated distributive expression. 'None of you' is idiomatic and accurately
    conveys the warning's scope.
- source_word: ἀπάτῃ τῆς ἁμαρτίας
  chosen: by the deceitfulness of sin
  alternatives:
  - by sin's deceit
  - by the deception of sin
  lexicon: BDAG
  rationale: 'The dative is best taken instrumentally: the means by which hardening
    occurs. ''Deceitfulness'' captures the character of sin as deceptive, a common
    NT emphasis, and is a standard, clear rendering.'
