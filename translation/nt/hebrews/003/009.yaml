id: HEB.3.9
reference: Hebrews 3:9
source:
  edition: SBLGNT
  text: οὗ ⸀ἐπείρασαν οἱ πατέρες ὑμῶν ⸂ἐν δοκιμασίᾳ⸃ καὶ εἶδον τὰ ἔργα μου
translation:
  text: where your fathers tested me in trial and saw my works,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where your fathers tested me by testing' or 'put me to the test.' The
      phrase ἐν δοκιμασίᾳ is difficult and may express manner or means.
    reason: lexical_alternative
  - marker: b
    text: 'Some translations make the next clause concessive: ''and yet saw my works''
      or ''though they saw my works.'' Greek has simply ''and saw.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  chosen: where
  alternatives:
  - when
  lexicon: BDAG
  rationale: Relative adverb referring back to the wilderness setting in the preceding
    verse/quotation. 'Where' is the most natural spatial sense here, though some English
    versions smooth it to 'when' from the Hebrew-influenced source context.
- source_word: ἐπείρασαν
  chosen: tested
  alternatives:
  - tried
  - put to the test
  lexicon: BDAG
  rationale: πειράζω here denotes testing/proving in a negative, provocative sense
    toward God, echoing Psalm 95. 'Tested' is concise and standard without over-paraphrasing.
- source_word: οἱ πατέρες ὑμῶν
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: BDAG
  rationale: A direct rendering of the masculine plural with second-person possessive.
    'Fathers' preserves the source wording and the covenantal/historical register;
    'ancestors' is possible but less formally aligned.
- source_word: ἐν δοκιμασίᾳ
  chosen: in trial
  alternatives:
  - by testing
  - to the test
  - in a test
  lexicon: BDAG
  rationale: The phrase is textually and syntactically difficult. δοκιμασία can denote
    testing, trial, or the act/state of proving. 'In trial' preserves the prepositional
    form and avoids collapsing it into an interpretive paraphrase. Because English
    readers may also understand an instrumental nuance, that alternative is preserved
    in a footnote.
- source_word: καὶ εἶδον
  chosen: and saw
  alternatives:
  - though they saw
  lexicon: BDAG
  rationale: A straightforward coordination in the Greek. Some translations make the
    relation concessive ('and yet saw' / 'though they saw') from the Psalm context,
    but the Greek conjunction is simply καί, so the main text keeps 'and saw'.
- source_word: τὰ ἔργα μου
  chosen: my works
  alternatives:
  - what I did
  - my deeds
  lexicon: BDAG
  rationale: ἔργα is best rendered 'works' here, referring to God's acts in the wilderness.
    'What I did' is more dynamic, but 'my works' better preserves the lexical form
    and biblical resonance.
