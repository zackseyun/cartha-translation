theological_decisions:
- issue: Object of the testing
  chosen_reading: tested me
  alternative_readings:
  - tested
  rationale: Although the explicit object 'me' is not written in this clause in SBLGNT,
    the quotation context from Psalm 95 and the flow of the sentence make God the
    understood object. Supplying 'me' yields natural English and reflects the sense
    of the source without adding doctrinal content beyond the quotation's referent.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
