theological_decisions:
- issue: Conditional clause and perseverance
  chosen_reading: The verse is rendered with a real condition ('if indeed we hold firm...') without importing a specific doctrinal system about perseverance, apostasy, or evidential assurance.
  alternative_readings:
  - 'A strongly evidential reading: perseverance proves prior participation'
  - 'A conditional-security reading: participation is maintained only if perseverance continues'
  rationale: The Greek presents a conditional statement but does not itself settle later theological debates about the mechanics of perseverance. The translation preserves the tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T03:23:53Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/nt/hebrews/003/014.json
  category: awkward_english
  tier: 1
  from: hold firm to the end the beginning of our assurance
  to: hold the beginning of our assurance firm to the end
  rationale: The current word order is unnatural in modern English, postponing the object ('the beginning of our assurance') after an adverbial phrase. This structure can make the sentence difficult to parse. In the Greek, 'firm' (βεβαίαν) is an adjective modifying 'the beginning' (τὴν ἀρχὴν). The suggested rewrite restores a more standard English syntax (verb-object-adjective) which clarifies that 'firm' describes 'the beginning of our assurance', not the action of holding.
