id: HEB.3.14
reference: Hebrews 3:14
source:
  edition: SBLGNT
  text: μέτοχοι γὰρ ⸂τοῦ Χριστοῦ γεγόναμεν⸃, ἐάνπερ τὴν ἀρχὴν τῆς ὑποστάσεως μέχρι τέλους βεβαίαν κατάσχωμεν.
translation:
  text: For we have become sharers in the Messiah, if indeed we hold the beginning of our assurance firm to the end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participants in the Messiah' or 'partakers of the Messiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'confidence.' The Greek term can also mean 'assurance' or, in some contexts, 'substance' or 'reality.'
    reason: lexical_alternative
  - marker: c
    text: Or 'hold firm to the end the beginning of our assurance'.
    reason: previous_rendering
lexical_decisions:
- source_word: μέτοχοι
  chosen: sharers
  alternatives:
  - partners
  - participants
  - partakers
  lexicon: BDAG
  rationale: The adjective/substantive denotes those who share in something. 'Sharers' is natural modern English and preserves the participatory sense without the archaic feel of 'partakers.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: This conjunction gives the reason or explanation for the preceding warning/exhortation. 'For' is concise and fits the discourse flow.
- source_word: τοῦ Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like designation. Here the genitive after μέτοχοι is titular and theological rather than name-like.
- source_word: γεγόναμεν
  chosen: have become
  alternatives:
  - have come to be
  - are
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from a past event. 'Have become' preserves both the ingressive sense and the continuing result better than a simple 'are.'
- source_word: ἐάνπερ
  chosen: if indeed
  alternatives:
  - if
  - provided that
  lexicon: BDAG
  rationale: The particle adds emphasis to the condition. 'If indeed' reflects that force better than bare 'if' while remaining readable.
- source_word: ἀρχὴν
  chosen: the beginning
  alternatives:
  - the first part
  - the initial
  lexicon: BDAG
  rationale: The noun means 'beginning' or 'start.' The phrase points to the initial state or confidence held at the outset.
- source_word: ὑποστάσεως
  chosen: assurance
  alternatives:
  - confidence
  - reality
  - substance
  lexicon: BDAG
  rationale: In this context the term most likely refers to a confident stance or assurance rather than metaphysical 'substance.' 'Assurance' communicates that sense clearly in modern English, while a footnote preserves the common alternative 'confidence.'
- source_word: μέχρι τέλους
  chosen: to the end
  alternatives:
  - until the end
  lexicon: BDAG
  rationale: This prepositional phrase marks perseverance through the full course. 'To the end' is idiomatic and concise.
- source_word: βεβαίαν
  chosen: firm
  alternatives:
  - steadfast
  - secure
  - sure
  lexicon: BDAG
  rationale: The adjective describes something stable and secure. 'Firm' is clear, idiomatic, and pairs naturally with 'hold.'
- source_word: κατάσχωμεν
  chosen: we hold
  alternatives:
  - we hold fast to
  - we retain
  - we keep hold of
  lexicon: BDAG
  rationale: The aorist subjunctive in the conditional clause conveys retaining or maintaining possession. 'Hold' with 'firm' and the object order yields natural English while preserving the sense of perseverance.
