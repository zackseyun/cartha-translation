theological_decisions:
- issue: Whether ἀπιστίας should be rendered as 'unbelief' or 'faithlessness'
  chosen_reading: unbelief
  alternative_readings:
  - faithlessness
  rationale: Although ἀπιστία can denote lack of faith or unfaithfulness, the immediate
    context in Hebrews 3 emphasizes failure to believe God's word and warning from
    Israel's unbelief. Rendering it 'unbelief' best fits the discourse while not foreclosing
    the moral dimension.
  doctrine_reference: 'Contested terms: πίστις default ''faith''; related noun here
    is rendered in line with that semantic domain.'
- issue: Whether ἀποστῆναι should be rendered with the stronger theological term 'apostatize/fall
    away'
  chosen_reading: turning away
  alternative_readings:
  - falling away
  - becoming apostate
  rationale: The Greek verb can support stronger renderings, but the main text should
    not import a later technical theological category unless the context requires
    it. 'Turning away' preserves the warning's seriousness while remaining lexically
    transparent.
  doctrine_reference: Preserve theological tension rather than resolve it.
