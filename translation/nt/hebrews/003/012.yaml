id: HEB.3.12
reference: Hebrews 3:12
source:
  edition: SBLGNT
  text: βλέπετε, ἀδελφοί, μήποτε ἔσται ἔν τινι ὑμῶν καρδία πονηρὰ ἀπιστίας ἐν τῷ ἀποστῆναι
    ἀπὸ θεοῦ ζῶντος,
translation:
  text: Watch out, brothers, lest there be in any of you an evil heart of unbelief
    in turning away from the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine plural ἀδελφοί, which can address
      a mixed group of fellow believers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an evil, faithless heart.'
    reason: alternative_reading
  - marker: c
    text: Or 'in falling away' / 'in departing' from the living God.
    reason: alternative_reading
lexical_decisions:
- source_word: βλέπετε
  chosen: Watch out
  alternatives:
  - Take care
  - See to it
  lexicon: BDAG
  rationale: Present active imperative, second person plural, giving a warning. 'Watch
    out' is natural modern English and preserves the force of alertness better than
    a flatter 'see.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Vocative plural. Per doctrine, gender-accurate over gender-neutral:
    the Greek form is masculine plural and often representative. ''Brothers'' preserves
    the source form; inclusivity can be noted in a footnote.'
- source_word: μήποτε
  chosen: lest
  alternatives:
  - so that not
  - that ... not
  lexicon: BDAG
  rationale: Introduces a warning about a possible undesirable outcome. 'Lest' is
    concise and fits the admonitory tone, though slightly formal; it remains clear
    in context.
- source_word: ἔσται ἔν τινι ὑμῶν
  chosen: there be in any of you
  alternatives:
  - there should be among you
  - any one of you should have
  lexicon: BDAG
  rationale: Future middle of εἰμί with ἐν + dative τις expresses the possibility
    that such a condition may arise in any member of the audience. 'There be in any
    of you' closely follows the Greek structure without becoming wooden.
- source_word: καρδία
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: BDAG
  rationale: Biblically, 'heart' denotes the inner center of thought, will, and affection.
    Retaining 'heart' preserves the theological and anthropological resonance of the
    Greek.
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Describes moral corruption, not mere deficiency. 'Evil' is the most direct
    and weighty equivalent.
- source_word: ἀπιστίας
  chosen: of unbelief
  alternatives:
  - unbelieving
  - of faithlessness
  lexicon: BDAG
  rationale: Genitive most naturally characterizes the heart as marked by unbelief.
    'Unbelief' fits the immediate context of warning from Israel's example in Hebrews
    3. 'Faithlessness' is possible lexically but less fitting here.
- source_word: ἐν τῷ ἀποστῆναι
  chosen: in turning away
  alternatives:
  - by falling away
  - in departing
  - when turning away
  lexicon: BDAG
  rationale: Articular infinitive with ἐν can express circumstance or result closely
    tied to the evil heart's expression. 'In turning away' preserves the Greek construction
    while leaving the precise nuance appropriately broad. 'Falling away' is more interpretive
    and can import later theological categories.
- source_word: ἀποστῆναι
  chosen: turning away
  alternatives:
  - departing
  - falling away
  - becoming apostate
  lexicon: BDAG
  rationale: The verb means to withdraw, depart, or turn away. 'Turning away' is clear,
    idiomatic, and serious without over-specifying formal apostasy terminology in
    the main text.
- source_word: ἀπὸ θεοῦ ζῶντος
  chosen: from the living God
  alternatives:
  - from a living God
  lexicon: BDAG
  rationale: Anarthrous θεοῦ in this construction is definite in context. 'The living
    God' is a recognized biblical expression and contrasts the true God with dead
    idols.
