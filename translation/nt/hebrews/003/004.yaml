theological_decisions:
- issue: Whether the final clause should be rendered in a way that weakens or obscures
    the identification of God as the builder of all things
  chosen_reading: The one who built all things is God
  alternative_readings:
  - God is the one who built all things
  rationale: The Greek clause ὁ δὲ πάντα κατασκευάσας θεός identifies God as the universal
    builder. The translation preserves that explicit theological claim without adding
    metaphysical explanation beyond the text. The chosen wording also keeps the contrastive
    argument structure intact.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
