id: HEB.3.4
reference: Hebrews 3:4
source:
  edition: SBLGNT
  text: πᾶς γὰρ οἶκος κατασκευάζεται ὑπό τινος, ὁ ⸀δὲ πάντα κατασκευάσας θεός.
translation:
  text: For every house is built by someone, but the one who built all things is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  chosen: every
  alternatives:
  - each
  - all
  lexicon: BDAG
  rationale: 'With singular οἶκος, πᾶς is distributive: ''every house'' rather than
    ''all house'' or the more wooden ''each house.'' This is natural English and preserves
    the general principle being stated.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanatory ground for the preceding argument. 'For'
    best preserves the logical connection in a concise, standard English form.
- source_word: οἶκος
  chosen: house
  alternatives:
  - household
  - home
  lexicon: BDAG
  rationale: The immediate context in Hebrews 3 plays on οἶκος both literally and
    metaphorically. Here the proverb-like statement works with the concrete image
    'house,' which also supports the ensuing theological analogy. 'Household' would
    over-interpret the metaphor at this point.
- source_word: κατασκευάζεται
  chosen: is built
  alternatives:
  - is constructed
  - is prepared
  lexicon: BDAG
  rationale: The passive present indicates that a house comes into being through a
    builder. 'Is built' is idiomatic, clear, and fits the architectural imagery better
    than the more technical 'is constructed' or broader 'is prepared.'
- source_word: ὑπό τινος
  chosen: by someone
  alternatives:
  - by someone or other
  - by a certain one
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency. The indefinite pronoun τις is naturally
    rendered 'someone,' expressing the general truth that every house has a builder.
- source_word: ὁ δὲ
  chosen: but the one who
  alternatives:
  - and the one who
  - now the one who
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' best captures the shift
    from the general principle to its climactic theological application. Rendering
    ὁ with the participle as 'the one who' preserves the substantival force.
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  - the whole universe
  lexicon: BDAG
  rationale: πάντα is broad and comprehensive. 'All things' is the standard rendering
    that preserves the scope without importing a more interpretive phrase like 'the
    whole universe.'
- source_word: κατασκευάσας
  chosen: built
  alternatives:
  - constructed
  - made ready
  lexicon: BDAG
  rationale: The aorist participle refers to the one responsible for bringing all
    things into ordered existence. Using 'built' maintains lexical continuity with
    κατασκευάζεται earlier in the verse and preserves the argument's analogy.
- source_word: θεός
  chosen: God
  lexicon: BDAG
  rationale: θεός is anarthrous here but functions predicatively/appositionally in
    identifying the builder of all things. 'God' is the straightforward and contextually
    required rendering.
