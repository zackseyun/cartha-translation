id: HEB.3.10
reference: Hebrews 3:10
source:
  edition: SBLGNT
  text: τεσσεράκοντα ἔτη· διὸ προσώχθισα τῇ γενεᾷ ⸀ταύτῃ καὶ εἶπον· Ἀεὶ πλανῶνται
    τῇ καρδίᾳ· αὐτοὶ δὲ οὐκ ἔγνωσαν τὰς ὁδούς μου·
translation:
  text: For forty years, therefore, I was provoked with this generation, and said,
    ‘They always go astray in their heart, but they have not known my ways.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was angry with this generation'; the Greek verb can express strong
      displeasure, even revulsion.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in their heart' (singular), likely treating the generation as a collective
      whole; many English versions render 'in their hearts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεσσεράκοντα ἔτη
  chosen: For forty years
  alternatives:
  - Forty years
  lexicon: BDAG
  rationale: Carries over the temporal phrase from the Psalm citation context. English
    idiom naturally supplies 'for' to express duration, while preserving the accusative
    of extent of time.
- source_word: διὸ
  chosen: therefore
  alternatives:
  - so
  - for this reason
  lexicon: BDAG
  rationale: Marks the inferential/resultative force of the conjunction. 'Therefore'
    preserves the formal connection to the preceding clause while remaining natural
    in English.
- source_word: προσώχθισα
  chosen: I was provoked
  alternatives:
  - I was angry
  - I loathed
  - I was disgusted
  lexicon: BDAG
  rationale: The verb denotes strong displeasure or revulsion toward someone. 'Was
    provoked' preserves the affective force without overinterpreting it as mere emotional
    anger or stronger disgust. It also aligns well with the citation's covenantal
    complaint context.
- source_word: τῇ γενεᾷ ταύτῃ
  chosen: with this generation
  alternatives:
  - at this generation
  - by this generation
  lexicon: BDAG
  rationale: 'The dative after the verb is rendered idiomatically with ''with'' in
    English: ''provoked with this generation.'' This keeps the referent concrete and
    echoes biblical idiom without becoming unnatural.'
- source_word: καὶ εἶπον
  chosen: and said
  alternatives:
  - and I said
  lexicon: BDAG
  rationale: The first-person subject is already clear from context; English can omit
    the explicit pronoun while preserving the direct divine speech.
- source_word: Ἀεὶ
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: Straightforward adverb of continual pattern. 'Always' is the most natural
    and direct rendering.
- source_word: πλανῶνται
  chosen: go astray
  alternatives:
  - wander
  - are led astray
  - err
  lexicon: BDAG
  rationale: Middle/passive form here expresses ongoing deviation. 'Go astray' captures
    moral-spiritual wandering in accessible English and fits the allusion to Israel's
    persistent unbelief.
- source_word: τῇ καρδίᾳ
  chosen: in their heart
  alternatives:
  - in heart
  - in their hearts
  lexicon: BDAG
  rationale: The singular 'heart' reflects the Greek singular and can function corporately
    of the generation as a whole. 'In their heart' preserves that collective singular
    better than the more individualized plural 'hearts'.
- source_word: αὐτοὶ δὲ
  chosen: but they
  alternatives:
  - and they
  - yet they themselves
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding description. 'But they' captures
    the adversative force cleanly; the emphatic pronoun is sufficiently represented
    by English word order and contrast.
- source_word: οὐκ ἔγνωσαν
  chosen: have not known
  alternatives:
  - did not know
  - have not understood
  - did not come to know
  lexicon: BDAG
  rationale: The aorist in a scriptural citation can be rendered with English present
    perfect to express the enduring reality of their failure up to the point of judgment.
    'Known' preserves relational/covenantal knowledge better than merely cognitive
    'understood.'
- source_word: τὰς ὁδούς μου
  chosen: my ways
  alternatives:
  - my paths
  lexicon: BDAG
  rationale: A common biblical metaphor for God's manner of acting and prescribed
    course. 'My ways' is the established and semantically accurate rendering.
