theological_decisions:
- issue: Divine displeasure in προσώχθισα
  chosen_reading: Rendered as 'I was provoked' rather than a stronger interpretive
    gloss such as 'I loathed' or a flatter one such as 'I was angry.'
  alternative_readings:
  - I was angry
  - I loathed
  rationale: The verse expresses God's real covenantal displeasure toward the wilderness
    generation, but the translation should not intensify or soften the force beyond
    what the Greek warrants. 'Provoked' preserves the tension of divine response to
    persistent unbelief without importing a more developed doctrinal account of divine
    emotions.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Collective singular in τῇ καρδίᾳ
  chosen_reading: Rendered as 'in their heart' with singular 'heart.'
  alternative_readings:
  - in their hearts
  rationale: The Greek singular likely treats the generation corporately. Preserving
    the singular avoids unnecessary interpretive individualization while remaining
    understandable in English.
  doctrine_reference: Original-language primacy over translation tradition; consistency
    of key terms, or documented exception.
