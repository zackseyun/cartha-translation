theological_decisions:
- issue: Rendering the oath formula Εἰ εἰσελεύσονται
  chosen_reading: 'Explicit negative oath: ''They shall never enter my rest.'''
  alternative_readings:
  - 'More formally literal: ''If they shall enter my rest'''
  rationale: A strictly literal rendering would obscure the established Greek/Hebrew
    oath idiom and could mislead readers into hearing a simple condition rather than
    a solemn denial. The explicit negation preserves the text's force without adding
    doctrinal content.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering κατάπαυσις in context
  chosen_reading: rest
  alternative_readings:
  - resting place
  rationale: Hebrews develops κατάπαυσις as a theological motif connected to Psalm
    95 and God's own rest. 'Rest' preserves that tension and intertextual continuity
    without prematurely narrowing it to land, heaven, or subjective peace.
  doctrine_reference: Translation philosophy §3, §5
