id: HEB.3.11
reference: Hebrews 3:11
source:
  edition: SBLGNT
  text: ὡς ὤμοσα ἐν τῇ ὀργῇ μου· Εἰ εἰσελεύσονται εἰς τὴν κατάπαυσίν μου.
translation:
  text: as I swore in my wrath, ‘They shall never enter my rest.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'If they will enter my rest,' an oath formula meaning,
      'They shall certainly not enter my rest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - so
  lexicon: BDAG
  rationale: Introduces the quotation formula in a comparative/declarative sense tied
    to the preceding citation context. 'As' is concise and idiomatic in English.
- source_word: ὤμοσα
  chosen: I swore
  alternatives:
  - I took an oath
  - I vowed
  lexicon: BDAG
  rationale: Aorist of ὀμνύω denotes swearing an oath. 'I swore' is the most direct
    and natural rendering.
- source_word: ἐν τῇ ὀργῇ μου
  chosen: in my wrath
  alternatives:
  - in my anger
  lexicon: BDAG
  rationale: ὀργή denotes anger/wrath. 'Wrath' better preserves the solemn judicial
    force of the divine response in this warning context.
- source_word: Εἰ εἰσελεύσονται
  chosen: They shall never enter
  alternatives:
  - If they enter
  - Surely they will not enter
  lexicon: BDAG
  rationale: 'This is the Semitic oath formula εἰ + future, elliptical for a strong
    negation: ''if they enter...'' meaning ''they shall certainly not enter.'' English
    must make the idiomatic force explicit rather than leave a misleading conditional.'
- source_word: εἰς τὴν κατάπαυσίν μου
  chosen: my rest
  alternatives:
  - into my rest
  - my resting place
  lexicon: BDAG
  rationale: κατάπαυσις refers to rest, especially the divinely given rest in the
    Psalm/Hebrews argument. 'My rest' is clear and preserves the theological motif;
    omitting 'into' yields more natural English after 'enter'.
