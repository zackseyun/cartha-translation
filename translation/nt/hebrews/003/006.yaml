theological_decisions:
- issue: Whether to render Χριστός as title or name-like form
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The verse contrasts Moses with God's greater agent in salvation history;
    the titular sense is active and fits the project's default rendering for Χριστός
    where context supports it.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title;
    Christ where name-like)'
- issue: How strongly to express the conditional clause ἐὰν ... κατάσχωμεν
  chosen_reading: if we hold fast
  alternative_readings:
  - provided that we hold fast
  - if indeed we hold fast
  rationale: The Greek states a real condition tied to perseverance, but the translation
    should not import a denominationally loaded account of perseverance or apostasy.
    'If' preserves the theological tension without resolving it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
