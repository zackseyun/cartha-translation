id: HEB.3.6
reference: Hebrews 3:6
source:
  edition: SBLGNT
  text: Χριστὸς δὲ ὡς υἱὸς ἐπὶ τὸν οἶκον αὐτοῦ· ⸀ὃς οἶκός ἐσμεν ἡμεῖς, ⸀ἐὰν τὴν παρρησίαν
    καὶ τὸ καύχημα τῆς ⸀ἐλπίδος κατάσχωμεν.
translation:
  text: But the Messiah was faithful as a Son over his house, whose house we are,
    if we hold fast our boldness and the boast of our hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah.' The Greek title Χριστός can function either
      as a title ('Messiah') or as a name-like designation ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'confidence' for 'boldness.' The Greek παρρησία can denote frankness,
      openness, or confident boldness.
    reason: lexical_alternative
  - marker: c
    text: Or 'the confidence of hope' or 'the exultation of hope.' The Greek καύχημα
      can mean 'boast,' 'ground of boasting,' or 'exultant confidence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name in this contrast with Moses, following
    the project's default for Χριστός where context supports titular force.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the preceding statement about Moses in v. 5; 'But'
    best conveys the adversative force in English.
- source_word: ὡς υἱὸς
  chosen: as a Son
  alternatives:
  - as son
  lexicon: BDAG
  rationale: Retains the qualitative/comparative force of ὡς while preserving the
    anarthrous υἱός naturally in English. Capitalized 'Son' because the referent is
    the Messiah in a christological context, not to add doctrine beyond the text.
- source_word: ἐπὶ τὸν οἶκον αὐτοῦ
  chosen: over his house
  alternatives:
  - over his household
  - over the house
  lexicon: BDAG
  rationale: ἐπί with the accusative here conveys authority/superintendence ('over').
    οἶκος can mean either physical house or household; in this context of God's people
    as God's house, 'house' preserves the metaphor and echoes the immediate context.
    'His' most naturally refers to God from the Moses/house imagery, though the syntax
    also allows relation to the Son's house; the English preserves the pronoun without
    over-resolving the theological nuance.
- source_word: ὃς οἶκός ἐσμεν ἡμεῖς
  chosen: whose house we are
  alternatives:
  - and we are his house
  - which house we are
  lexicon: BDAG
  rationale: A natural rendering of the relative clause that keeps the metaphor intact.
    'Whose' is smoother modern English than 'which house,' while still reflecting
    the genitival relationship implied by the relative construction.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - provided that
  lexicon: BDAG
  rationale: Introduces a real conditional clause without importing a stronger interpretive
    framework than the Greek requires.
- source_word: παρρησίαν
  chosen: boldness
  alternatives:
  - confidence
  - openness
  lexicon: BDAG
  rationale: παρρησία in Hebrews often carries the sense of confident boldness before
    God and in confession. 'Boldness' preserves the term's forthright, courageous
    nuance better than the flatter 'confidence' in this context.
- source_word: καύχημα
  chosen: the boast
  alternatives:
  - the confidence
  - the reason for boasting
  - the exultation
  lexicon: BDAG
  rationale: καύχημα denotes that in which one boasts or glories. 'Boast' is more
    lexically transparent than smoothing it to 'confidence,' and it preserves the
    rhetorical force of exultant pride grounded in hope.
- source_word: τῆς ἐλπίδος
  chosen: of our hope
  alternatives:
  - of hope
  lexicon: BDAG
  rationale: Although ἡμῶν is not explicit, English idiom naturally supplies 'our'
    because the surrounding first-person plural frame ('we are,' 'we hold fast') makes
    the possessive implicit. This clarifies without materially expanding the sense.
- source_word: κατάσχωμεν
  chosen: we hold fast
  alternatives:
  - we hold firmly
  - we retain
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν expresses the condition of persevering retention.
    'Hold fast' is idiomatic, faithful, and preserves the exhortational force common
    in Hebrews.
