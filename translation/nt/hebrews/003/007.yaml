id: HEB.3.7
reference: Hebrews 3:7
source:
  edition: SBLGNT
  text: Διό, καθὼς λέγει τὸ πνεῦμα τὸ ἅγιον· Σήμερον ἐὰν τῆς φωνῆς αὐτοῦ ἀκούσητε,
translation:
  text: 'Therefore, just as the Holy Spirit says: “Today, if you hear his voice,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διό
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument.
    'Therefore' is natural modern English and preserves the logical connection.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  - even as
  lexicon: BDAG
  rationale: Introduces a comparison/citation formula. 'Just as' preserves the rhetorical
    force slightly better than the flatter 'as'.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: 'Present tense in citation formula is best rendered as a vivid present
    in English: ''says.'' This also reflects the ongoing scriptural voice.'
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Spirit himself
  lexicon: BDAG
  rationale: Standard and precise rendering of the articular phrase. No added emphasis
    beyond the Greek is warranted.
- source_word: Σήμερον
  chosen: Today
  alternatives:
  - This day
  - Today—
  lexicon: BDAG
  rationale: Direct temporal adverb from the Psalm citation. Capitalized here because
    it begins the quoted material.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - whenever
  - if indeed
  lexicon: BDAG
  rationale: Conditional particle introducing the protasis of the citation. 'If' is
    the most direct and idiomatic rendering.
- source_word: τῆς φωνῆς αὐτοῦ
  chosen: his voice
  alternatives:
  - the sound of his voice
  lexicon: BDAG
  rationale: Genitive object with ἀκούω is idiomatically rendered in English as 'hear
    his voice.' 'Voice' preserves the personal, covenantal sense better than 'sound.'
- source_word: ἀκούσητε
  chosen: you hear
  alternatives:
  - you should hear
  - you listen to
  lexicon: BDAG
  rationale: Aorist subjunctive in a present general condition after ἐὰν is naturally
    rendered 'if you hear.' 'Listen to' would over-interpret the nuance beyond the
    lexical core of hearing.
