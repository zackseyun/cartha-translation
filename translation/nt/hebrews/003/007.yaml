theological_decisions:
- issue: Speaker attribution in the Psalm citation
  chosen_reading: The quotation is introduced as the speech of the Holy Spirit.
  alternative_readings:
  - The Holy Spirit speaks through Scripture/the psalmist
  rationale: The Greek explicitly says 'the Holy Spirit says.' The translation preserves
    this direct attribution without softening it to a merely human speaker, while
    not expanding beyond the text into a fuller doctrine of inspiration.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
