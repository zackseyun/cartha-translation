id: HEB.3.1
reference: Hebrews 3:1
source:
  edition: SBLGNT
  text: Ὅθεν, ἀδελφοὶ ἅγιοι, κλήσεως ἐπουρανίου μέτοχοι, κατανοήσατε τὸν ἀπόστολον
    καὶ ἀρχιερέα τῆς ὁμολογίας ἡμῶν ⸀Ἰησοῦν,
translation:
  text: Therefore, holy brothers, sharers in a heavenly calling, consider Jesus, the
    apostle and high priest of our confession,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Brothers'' here addresses the whole believing community, including women.'
    reason: cultural_note
  - marker: b
    text: Or 'participants in the heavenly calling.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''consider the one we confess: Jesus, the apostle and high priest.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅθεν
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: BDAG
  rationale: Inferential conjunction drawing a conclusion from the preceding argument
    (especially 2:17–18). 'Therefore' is natural modern English and preserves the
    logical force.
- source_word: ἀδελφοὶ ἅγιοι
  chosen: holy brothers
  alternatives:
  - holy brothers and sisters
  - holy siblings
  lexicon: BDAG
  rationale: Vocative plural with masculine form. Per gender-accurate policy, 'brothers'
    best matches the Greek form while still functioning representatively for the Christian
    community; inclusivity can be noted in a footnote rather than neutralized in the
    main text. 'Holy' is attributive and covenantal, marking them as consecrated people.
- source_word: κλήσεως ἐπουρανίου
  chosen: of a heavenly calling
  alternatives:
  - of the heavenly calling
  - of a call from heaven
  lexicon: BDAG
  rationale: Genitive phrase modifying μέτοχοι. Anarthrous construction is well represented
    by 'a heavenly calling'; 'heavenly' can denote origin and character. 'Calling'
    preserves the theological sense of divine summons without over-paraphrase.
- source_word: μέτοχοι
  chosen: sharers
  alternatives:
  - partners
  - participants
  - partakers
  lexicon: BDAG
  rationale: Denotes those who share in something. 'Sharers' is clear, modern, and
    avoids the archaic feel of 'partakers' while preserving participation language
    important in Hebrews.
- source_word: κατανοήσατε
  chosen: consider
  alternatives:
  - fix your thoughts on
  - carefully consider
  - pay close attention to
  lexicon: BDAG
  rationale: Aorist imperative calling for focused, attentive reflection. 'Consider'
    is concise and idiomatic; stronger paraphrases are possible but go beyond the
    lexical core.
- source_word: ἀπόστολον
  chosen: apostle
  alternatives:
  - one sent
  - envoy
  - messenger
  lexicon: BDAG
  rationale: Here uniquely applied to Jesus in the sense of one sent by God. 'Apostle'
    preserves the title's theological resonance and intertextual connection to sending,
    while alternatives are explanatory rather than translational.
- source_word: ἀρχιερέα
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: Standard rendering for the Jewish cultic office and a major theme in
    Hebrews. 'High priest' is established, accurate, and accessible.
- source_word: τῆς ὁμολογίας ἡμῶν
  chosen: of our confession
  alternatives:
  - whom we confess
  - of the faith we profess
  - of our profession
  lexicon: BDAG
  rationale: 'Genitive phrase most naturally linked to both titles: Jesus is the apostle
    and high priest belonging to or associated with the confession believers make.
    ''Confession'' preserves the verbal and communal sense without narrowing it to
    subjective faith alone.'
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name Ἰησοῦς, following
    the policy to transliterate names.
