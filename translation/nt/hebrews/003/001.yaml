theological_decisions:
- issue: Gendered address in ἀδελφοὶ
  chosen_reading: Render as 'brothers' in the main text, with inclusive force noted
    in a footnote.
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The Greek is grammatically masculine plural and likely addresses the
    whole believing community. Per doctrine, gender-accurate rendering is preferred
    over gender-neutral smoothing; inclusivity is preserved by annotation rather than
    by replacing the source-form in the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Force of ἀπόστολον applied to Jesus
  chosen_reading: Retain the title 'apostle' rather than paraphrasing it.
  alternative_readings:
  - envoy
  - one sent
  rationale: The verse explicitly applies ἀπόστολος to Jesus. Retaining the title
    preserves the text's theological and literary force without importing later ecclesial
    office distinctions into the translation itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
