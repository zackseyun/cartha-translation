theological_decisions:
- issue: Christological comparison between Jesus and Moses
  chosen_reading: The verse states that Jesus is worthy of more glory than Moses by
    analogy to a builder having more honor than the house.
  alternative_readings:
  - A weaker reading that treats the comparison as merely functional rather than implying
    Jesus' superiority over the covenant structure associated with Moses
  rationale: The syntax explicitly compares 'this one' with Moses and grounds that
    comparison in the builder-house analogy. The translation preserves the argument
    without over-specifying the theological conclusion beyond the text, while still
    allowing the strong christological force of the passage to stand.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it.
