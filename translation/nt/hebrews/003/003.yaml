id: HEB.3.3
reference: Hebrews 3:3
source:
  edition: SBLGNT
  text: πλείονος γὰρ ⸂οὗτος δόξης⸃ παρὰ Μωϋσῆν ἠξίωται καθ’ ὅσον πλείονα τιμὴν ἔχει
    τοῦ οἴκου ὁ κατασκευάσας αὐτόν·
translation:
  text: For this one has been counted worthy of more glory than Moses, just as the
    one who built the house has greater honor than the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greater glory than Moses.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' here continues the metaphor for God''s people developed in the
      surrounding context; ''household'' is a possible alternative, but ''house''
      better preserves the builder-house comparison in this verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: this one
  alternatives:
  - he
  - this man
  lexicon: BDAG
  rationale: The demonstrative points back to Jesus in the immediate context while
    retaining the Greek's explicit deictic force. 'This one' preserves the contrast
    with Moses more transparently than simply 'he'.
- source_word: πλείονος ... δόξης
  chosen: more glory
  alternatives:
  - greater glory
  lexicon: BDAG
  rationale: The genitive construction with comparative adjective is naturally rendered
    'more glory' in English. 'Glory' fits δόξα in this honor-status comparison and
    preserves the theological weight of the term.
- source_word: παρὰ Μωϋσῆν
  chosen: than Moses
  alternatives:
  - compared with Moses
  - beyond Moses
  lexicon: BDAG
  rationale: With a comparative, παρά commonly marks the standard of comparison. 'Than
    Moses' is the most idiomatic and direct rendering.
- source_word: ἠξίωται
  chosen: has been counted worthy
  alternatives:
  - has been deemed worthy
  - has deserved
  lexicon: BDAG
  rationale: The perfect passive indicates a present standing resulting from prior
    evaluation. 'Has been counted worthy' preserves both the passive voice and the
    evaluative sense without implying intrinsic merit too strongly.
- source_word: καθ’ ὅσον
  chosen: just as
  alternatives:
  - inasmuch as
  - to the extent that
  lexicon: BDAG
  rationale: Here the phrase introduces the basis or proportional analogy for the
    comparison that follows. 'Just as' gives clear modern English while preserving
    the argumentative structure.
- source_word: πλείονα τιμὴν
  chosen: greater honor
  alternatives:
  - more honor
  lexicon: BDAG
  rationale: τιμή in this context denotes honor or esteem. 'Greater honor' is idiomatic
    English and matches the comparative logic of the verse.
- source_word: τοῦ οἴκου
  chosen: the house
  alternatives:
  - the household
  lexicon: BDAG
  rationale: Although οἶκος can mean 'household,' the immediate metaphor in this verse
    contrasts a builder with a house. 'House' preserves the imagery, while the broader
    covenant-community sense is developed by context.
- source_word: ὁ κατασκευάσας αὐτόν
  chosen: the one who built the house
  alternatives:
  - the builder of it
  - the one who prepared it
  lexicon: BDAG
  rationale: κατασκευάζω can mean build, construct, or prepare. In the house metaphor,
    'built' is the clearest and most natural choice. Repeating 'the house' rather
    than 'it' improves English clarity while preserving the referent of αὐτόν.
