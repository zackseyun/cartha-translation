theological_decisions:
- issue: Rendering of the Psalm 95 historical allusion
  chosen_reading: Translate the Greek event nouns descriptively as 'the rebellion'
    and 'the day of testing' rather than replacing them with Hebrew place-names in
    the main text.
  alternative_readings:
  - as at Meribah, on the day at Massah in the wilderness
  rationale: Hebrews cites the Greek wording of Psalm 94(95):8 LXX, where the Hebrew
    place-names are represented by interpretive nouns. Following original-language
    primacy, the main text should reflect the Greek text before us. Because the Hebrew
    background is important for readers, the place-name alternative is preserved in
    a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
