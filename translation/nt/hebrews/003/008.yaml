id: HEB.3.8
reference: Hebrews 3:8
source:
  edition: SBLGNT
  text: μὴ σκληρύνητε τὰς καρδίας ὑμῶν ὡς ἐν τῷ παραπικρασμῷ, κατὰ τὴν ἡμέραν τοῦ
    πειρασμοῦ ἐν τῇ ἐρήμῳ,
translation:
  text: do not harden your hearts as in the rebellion, on the day of testing in the
    wilderness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew place-names behind Psalm 95:8, 'as at Meribah,
      on the day at Massah in the wilderness.'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ σκληρύνητε
  chosen: do not harden
  alternatives:
  - do not make hard
  - do not become hardened
  lexicon: BDAG
  rationale: Aorist active subjunctive with μή in a prohibitive construction is naturally
    rendered as a direct prohibition, 'do not harden.' The active voice supports addressing
    the hearers' culpable response rather than a passive state.
- source_word: καρδίας
  chosen: hearts
  lexicon: BDAG
  rationale: Standard biblical anthropological term for the inner person—will, thought,
    and disposition—not merely emotion. 'Hearts' is the natural and established English
    equivalent.
- source_word: ὑμῶν
  chosen: your
  rationale: Second person plural possessive; English 'your' preserves the direct
    address to the community.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces comparison with Israel's past conduct. 'As' is slightly more
    formal and fits the scriptural citation style.
- source_word: ἐν τῷ παραπικρασμῷ
  chosen: in the rebellion
  alternatives:
  - in the provocation
  - at Meribah
  lexicon: BDAG
  rationale: παραπικρασμός denotes provocation or rebellion. In this Psalm 95 allusion,
    the sense is Israel's rebellious provocation of God. 'Rebellion' communicates
    the event and moral force clearly in modern English. 'Provocation' is more literal
    but less natural; 'at Meribah' would import the Hebrew place-name rather than
    translate the Greek noun.
- source_word: κατὰ τὴν ἡμέραν
  chosen: on the day
  alternatives:
  - during the day
  - in the day
  lexicon: BDAG
  rationale: κατά with accusative here is temporal. 'On the day' is idiomatic English
    and preserves the temporal reference.
- source_word: τοῦ πειρασμοῦ
  chosen: of testing
  alternatives:
  - of trial
  - of temptation
  lexicon: BDAG
  rationale: πειρασμός can mean testing, trial, or temptation depending on context.
    Here, in the wilderness narrative and Psalm 95 citation, the emphasis is the testing
    episode, not inward enticement to sin. 'Testing' best fits the historical reference
    and avoids misleading moral narrowing.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος in this biblical context conventionally refers to the wilderness
    of Israel's wandering. 'Wilderness' better preserves the scriptural resonance
    than 'desert,' which can sound overly geographic and less covenant-historical.
