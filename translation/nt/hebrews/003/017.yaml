id: HEB.3.17
reference: Hebrews 3:17
source:
  edition: SBLGNT
  text: τίσιν δὲ προσώχθισεν τεσσεράκοντα ἔτη; οὐχὶ τοῖς ἁμαρτήσασιν, ὧν τὰ κῶλα ἔπεσεν
    ἐν τῇ ἐρήμῳ;
translation:
  text: And with whom was he angry for forty years? Was it not with those who sinned,
    whose bodies fell in the wilderness?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose carcasses fell in the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσώχθισεν
  chosen: was he angry
  alternatives:
  - was he provoked
  - was he offended
  - did he loathe
  lexicon: BDAG
  rationale: The verb προσοχθίζω denotes being angry or indignant toward someone.
    'Was he angry' is clear modern English and fits the rhetorical question. More
    literal but less natural options like 'was he provoked' or stronger options like
    'loathed' are possible, but 'angry' best balances accuracy and readability in
    context.
- source_word: τεσσεράκοντα ἔτη
  chosen: for forty years
  lexicon: BDAG
  rationale: This accusative expression is idiomatic for duration of time. 'For forty
    years' is the natural English rendering.
- source_word: ἁμαρτήσασιν
  chosen: those who sinned
  alternatives:
  - those who committed sin
  - the ones who sinned
  lexicon: BDAG
  rationale: The aorist participle refers to the people characterized here by their
    sinful act(s) in the wilderness generation. 'Those who sinned' is straightforward
    and idiomatic.
- source_word: κῶλα
  chosen: bodies
  alternatives:
  - limbs
  - carcasses
  - corpses
  lexicon: BDAG
  rationale: κῶλα literally refers to limbs or members of the body, but in this wilderness-judgment
    context it idiomatically refers to the fallen bodies/carcasses of the Israelites
    (echoing Num 14 and 1 Cor 10:5). 'Bodies' communicates the sense clearly in modern
    English without sounding overly harsh or archaic. 'Carcasses' is a traditional
    rendering and preserves the severity, but is less natural in contemporary English;
    it is preserved in a footnote.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - fell dead
  - lay fallen
  lexicon: BDAG
  rationale: The singular verb with neuter plural subject is standard Greek syntax.
    'Fell' preserves the verbal imagery and alludes to death/judgment without overtranslating.
    'Fell dead' would make explicit what is implied but not directly stated by the
    verb alone.
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: ἔρημος here refers to the wilderness wanderings of Israel. 'Wilderness'
    better preserves the biblical-theological setting than 'desert,' which can sound
    too narrowly geographical.
