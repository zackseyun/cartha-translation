theological_decisions:
- issue: Referent of the implied subject of προσώχθισεν
  chosen_reading: he = God
  rationale: The subject is implicit from the surrounding context and refers to God.
    English requires an explicit pronoun for natural style in this question. This
    does not add a new theological claim but makes explicit what the Greek context
    assumes.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
