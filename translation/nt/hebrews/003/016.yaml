theological_decisions:
- issue: Sense of παραπικραίνω in the wilderness-generation context
  chosen_reading: Render as 'rebelled' rather than a more literal 'provoked'
  alternative_readings:
  - provoked
  - embittered
  rationale: The verse alludes to Israel's rebellion against God after hearing his
    voice. 'Rebelled' communicates the theological and narrative force of the action
    in contemporary English without adding content beyond the context. A more literal
    rendering is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without paraphrase beyond warrant.'
