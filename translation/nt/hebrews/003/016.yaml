id: HEB.3.16
reference: Hebrews 3:16
source:
  edition: SBLGNT
  text: τίνες γὰρ ἀκούσαντες παρεπίκραναν; ἀλλ’ οὐ πάντες οἱ ἐξελθόντες ἐξ Αἰγύπτου
    διὰ Μωϋσέως;
translation:
  text: For who were the ones who heard and rebelled? Was it not all those who came
    out of Egypt through Moses?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard and provoked' (or 'embittered'). The Greek verb can be rendered
      more literally this way, but here it refers to Israel's rebellious provocation
      of God in the wilderness.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνες
  chosen: who were the ones
  alternatives:
  - who
  - which ones
  lexicon: BDAG
  rationale: Introduces a rhetorical question about the identity of the rebels. 'Who
    were the ones' brings out the plural, specific reference more clearly in natural
    English than bare 'who,' while preserving the interrogative force.
- source_word: γὰρ
  chosen: For
  alternatives:
  - indeed
  - now
  lexicon: BDAG
  rationale: Marks explanation or support for the preceding argument. 'For' best preserves
    the logical connection in a concise way.
- source_word: ἀκούσαντες
  chosen: heard
  alternatives:
  - having heard
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle modifying the subject of the main verb. English idiom
    commonly compresses this to 'heard' in coordination with the main verb, while
    retaining the temporal sense that they heard before rebelling.
- source_word: παρεπίκραναν
  chosen: rebelled
  alternatives:
  - provoked
  - embittered
  - were rebellious
  lexicon: BDAG
  rationale: In this wilderness context the verb refers to provoking God through disobedience.
    'Rebelled' communicates the covenantal defiance more clearly for modern readers
    than the more literal but less transparent 'provoked' or 'embittered.' The connection
    to Israel's rebellion in the wilderness is preserved.
- source_word: ἀλλ’ οὐ πάντες
  chosen: Was it not all
  alternatives:
  - But was it not all
  - Indeed, was it not all
  lexicon: BDAG
  rationale: The phrase introduces the expected answer to the rhetorical question.
    In English, 'Was it not all' captures the force naturally. The adversative ἀλλά
    here functions idiomatically in the rhetorical question rather than as a strong
    contrast requiring a separate 'but' in translation.
- source_word: οἱ ἐξελθόντες
  chosen: those who came out
  alternatives:
  - those who went out
  - the ones who came out
  lexicon: BDAG
  rationale: Aorist participle used substantivally. 'Those who came out' is natural
    English and fits the exodus context.
- source_word: ἐξ Αἰγύπτου
  chosen: of Egypt
  alternatives:
  - from Egypt
  lexicon: BDAG
  rationale: With 'came out,' English idiom prefers 'out of Egypt.' This preserves
    the spatial sense of ἐξ.
- source_word: διὰ Μωϋσέως
  chosen: through Moses
  alternatives:
  - by Moses
  - under Moses' leadership
  lexicon: BDAG
  rationale: διά with the genitive commonly indicates agency or instrumentality. 'Through
    Moses' preserves the Greek wording and avoids over-expanding the phrase interpretively.
