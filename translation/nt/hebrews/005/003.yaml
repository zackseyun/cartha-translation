theological_decisions:
- issue: Antecedent of 'because of this'
  chosen_reading: The phrase refers to the high priest's weakness mentioned in the
    previous verse, grounding his obligation to offer for his own sins.
  alternative_readings:
  - It could be taken more generally as 'because of this office/situation.'
  rationale: The nearest and most coherent antecedent is the weakness described in
    Heb 5:2. This fits the argument that the earthly high priest shares the frailty
    of those for whom he ministers.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Supplying 'sacrifices' with 'to offer'
  chosen_reading: The English text includes 'sacrifices' to make the cultic action
    explicit.
  alternative_readings:
  - Leave it as 'to offer' without an object.
  rationale: The verse is in a sacrificial-priestly context, and English normally
    expects an object with 'offer.' This addition clarifies rather than interprets
    beyond the source, since sacrificial offering is plainly in view.
  doctrine_reference: Optimal equivalence; readable modern English, not archaic or
    academic.
