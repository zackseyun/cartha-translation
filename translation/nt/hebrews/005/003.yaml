id: HEB.5.3
reference: Hebrews 5:3
source:
  edition: SBLGNT
  text: καὶ ⸂δι’ αὐτὴν⸃ ὀφείλει, καθὼς περὶ τοῦ λαοῦ, οὕτως καὶ περὶ ⸀αὑτοῦ προσφέρειν
    ⸀περὶ ἁμαρτιῶν.
translation:
  text: And because of this he is obligated, just as for the people, so also for himself,
    to offer sacrifices for sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'because of it,' referring back to the high priest's weakness
      in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ αὐτὴν
  chosen: because of this
  alternatives:
  - because of it
  - for this reason
  lexicon: BDAG
  rationale: The feminine pronoun refers back to the high priest's weakness in the
    previous verse. 'Because of this' is natural English and preserves the causal
    force of διά with the accusative without over-specifying the antecedent in the
    main text.
- source_word: ὀφείλει
  chosen: he is obligated
  alternatives:
  - he ought
  - he is bound
  lexicon: BDAG
  rationale: Conveys duty/obligation more clearly than the softer 'ought.' The context
    is priestly requirement, not mere advisability.
- source_word: καθὼς ... οὕτως καὶ
  chosen: just as ... so also
  alternatives:
  - as ... so also
  - just as ... likewise
  lexicon: BDAG
  rationale: Preserves the correlative comparison structure of the Greek in readable
    English.
- source_word: τοῦ λαοῦ
  chosen: the people
  alternatives:
  - the people of Israel
  lexicon: BDAG
  rationale: λαός here refers to the covenant people in the Levitical high-priestly
    context. 'The people' is sufficiently precise without importing an explanatory
    expansion into the main text.
- source_word: περὶ ἑαυτοῦ
  chosen: for himself
  alternatives:
  - on his own behalf
  lexicon: BDAG
  rationale: Idiomatic English that captures the reflexive sense. 'On his own behalf'
    is possible but more cumbersome.
- source_word: προσφέρειν
  chosen: to offer sacrifices
  alternatives:
  - to offer
  lexicon: BDAG
  rationale: Although the direct object is not explicit in Greek, in sacrificial context
    προσφέρειν commonly means to offer sacrificial gifts/offerings. Supplying 'sacrifices'
    makes the sense clear in English without distorting the cultic context.
- source_word: περὶ ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - concerning sins
  - as a sin offering
  lexicon: BDAG
  rationale: In sacrificial contexts περί + genitive with ἁμαρτιῶν commonly denotes
    offerings made with reference to sins. 'For sins' is concise and natural. 'As
    a sin offering' is interpretive and would over-specify the construction here.
