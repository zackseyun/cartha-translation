id: HEB.5.10
reference: Hebrews 5:10
source:
  edition: SBLGNT
  text: προσαγορευθεὶς ὑπὸ τοῦ θεοῦ ἀρχιερεὺς κατὰ τὴν τάξιν Μελχισέδεκ.
translation:
  text: having been designated by God as a high priest according to the order of Melchizedek.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been called by God a high priest' or 'having been appointed by
      God high priest.'
    reason: lexical_alternative
  - marker: b
    text: This echoes Psalm 110:4, where the priesthood is said to be 'according to
      the order of Melchizedek.'
    reason: cross_reference
lexical_decisions:
- source_word: προσαγορευθεὶς
  chosen: having been designated
  alternatives:
  - having been addressed
  - having been named
  - having been appointed
  - being called
  lexicon: BDAG
  rationale: Aorist passive participle of προσαγορεύω. In this context it introduces
    the divine act of publicly identifying or declaring Jesus' status. 'Designated'
    preserves the passive force and the formal sense of being named/declared, while
    fitting the flow from the previous verse. 'Appointed' is possible but can overstate
    installation language beyond the verb itself.
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - by God the Father
  lexicon: BDAG
  rationale: ὑπό with the genitive marks personal agency in the passive construction.
    The text says simply 'by God'; adding 'the Father' would be interpretive and exceeds
    the wording.
- source_word: ἀρχιερεὺς
  chosen: a high priest
  alternatives:
  - high priest
  lexicon: BDAG
  rationale: 'Standard rendering of ἀρχιερεύς. The anarthrous Greek predicate nominative
    after the participle is naturally rendered in English with the indefinite article
    here: ''as a high priest.'' This avoids implying one high priest among many in
    a merely generic sense while still reading naturally in English.'
- source_word: κατὰ
  chosen: according to
  alternatives:
  - in accordance with
  - after
  lexicon: BDAG
  rationale: In this construction κατά expresses conformity or correspondence. 'According
    to' is the most transparent and idiomatic rendering in English.
- source_word: τὴν τάξιν
  chosen: the order
  alternatives:
  - the arrangement
  - the rank
  - the pattern
  lexicon: BDAG
  rationale: In Hebrews, τάξις in the phrase 'according to the order of Melchizedek'
    refers to an order, kind, or patterned priestly category rather than a mere sequence
    or arrangement. 'Order' preserves the established conceptual link with Psalm 110:4
    and the argument of Hebrews.
- source_word: Μελχισέδεκ
  chosen: Melchizedek
  alternatives:
  - Melchisedek
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name. This follows the
    instruction to transliterate names rather than translate them.
