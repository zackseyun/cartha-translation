theological_decisions:
- issue: Whether to render the participle in a way that implies ontological change
    or merely public declaration
  chosen_reading: having been designated by God as a high priest
  alternative_readings:
  - having been appointed by God high priest
  - being called by God a high priest
  rationale: The verse presents God's declaration/recognition of the Son's priestly
    status in the flow of Hebrews' argument, not a denial of his preexistence or dignity.
    'Designated' preserves the text's wording without importing a stronger sacramental
    or institutional nuance than necessary.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language
    primacy over translation tradition.
