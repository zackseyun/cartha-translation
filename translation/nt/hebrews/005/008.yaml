id: HEB.5.8
reference: Hebrews 5:8
source:
  edition: SBLGNT
  text: καίπερ ὢν υἱός, ἔμαθεν ἀφ’ ὧν ἔπαθεν τὴν ὑπακοήν,
translation:
  text: Although he was a Son, he learned obedience from what he suffered,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Though he was the Son.' The Greek has simply 'Son' without the article;
      English may render it either way depending on whether one emphasizes idiom or
      explicit definiteness.
    reason: alternative_reading
  - marker: b
    text: '''He learned obedience'' speaks of learning through lived suffering, not
      of correction from prior disobedience.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  chosen: Although
  alternatives:
  - though
  - even though
  lexicon: BDAG
  rationale: 'Concessive particle introducing a contrast: despite his status as Son,
    he nevertheless learned obedience through suffering. ''Although'' is natural modern
    English and preserves the concessive force.'
- source_word: ὢν
  chosen: he was
  alternatives:
  - being
  lexicon: BDAG
  rationale: Present participle of εἰμί linked with υἱός. English idiom prefers a
    finite clause here ('he was a Son') rather than the more wooden 'being a Son.'
- source_word: υἱός
  chosen: a Son
  alternatives:
  - son
  lexicon: BDAG
  rationale: Anarthrous noun used predicatively. Capitalized 'Son' reflects the christological
    reference in context to Jesus' filial identity, while retaining the indefinite
    English article required by idiom after 'was.'
- source_word: ἔμαθεν
  chosen: he learned
  alternatives:
  - he came to learn
  lexicon: BDAG
  rationale: Aorist of μανθάνω straightforwardly means 'learned.' The wording should
    not be weakened or paraphrased away; the verse states real experiential learning
    in relation to obedience.
- source_word: ἀφ’ ὧν
  chosen: from what
  alternatives:
  - from the things that
  - by what
  lexicon: BDAG
  rationale: 'The preposition ἀπό with the relative pronoun expresses source or basis:
    he learned obedience from the things he suffered. ''From what'' is concise and
    idiomatic.'
- source_word: ἔπαθεν
  chosen: he suffered
  alternatives:
  - he experienced suffering
  lexicon: BDAG
  rationale: Aorist of πάσχω, denoting actual suffering endured. The simple verb 'suffered'
    is both accurate and weighty.
- source_word: τὴν ὑπακοήν
  chosen: obedience
  alternatives:
  - the obedience
  lexicon: BDAG
  rationale: The article is present in Greek, but English idiom normally omits it
    with abstract nouns in this construction. 'Obedience' best captures ὑπακοή as
    responsive submission to God's will.
