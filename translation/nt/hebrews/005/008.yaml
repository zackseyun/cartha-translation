theological_decisions:
- issue: How to render Christ's filial status in relation to his learning
  chosen_reading: Although he was a Son
  alternative_readings:
  - Though he was the Son
  - Son though he was
  rationale: The verse affirms Jesus' true sonship while also stating that he learned
    obedience through suffering. The translation preserves both truths without diminishing
    either his deity or his genuine human experience, in keeping with Nicene and Chalcedonian
    orthodoxy. 'A Son' follows the anarthrous Greek and natural English predicative
    usage, while capitalization signals the specific christological referent.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Definition of Chalcedon
    (451 AD)'
- issue: Whether 'he learned obedience' implies prior disobedience or moral deficiency
  chosen_reading: Retain the direct wording 'he learned obedience' without explanatory
    expansion
  alternative_readings:
  - he learned what obedience costs
  - he learned obedience in experience
  rationale: The Greek text says 'he learned obedience' and should not be paraphrased
    to avoid theological tension. In context, this denotes experiential learning through
    suffering, not movement from sin to righteousness. The translation preserves the
    text's wording and tension rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
