theological_decisions:
- issue: Christological sense of τελειωθεὶς in relation to Jesus
  chosen_reading: Rendered as 'having been made complete' to express vocational/teleological
    completion rather than moral perfecting.
  alternative_readings:
  - having been perfected
  rationale: Within orthodox Christology, the verse must not be translated in a way
    that implies Jesus moved from moral sinfulness to holiness. Hebrews uses τελειόω
    for consecration/completion unto priestly role and redemptive goal. The chosen
    wording preserves this theological tension and avoids importing a denial of Christ's
    sinlessness while staying close to the Greek.
  doctrine_reference: 'Affirmations: Nicene Creed; Definition of Chalcedon; Translation
    philosophy §3'
- issue: Scope and condition in 'to all who obey him'
  chosen_reading: Kept the obedience language explicit without softening it to 'believe
    in him' or expanding it into a doctrinal system.
  alternative_readings:
  - to all who listen to him
  - for all who obey him
  rationale: The Greek explicitly says 'those obeying him.' The translation preserves
    the text's stated condition and does not collapse obedience into a narrower or
    broader denominational formulation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
