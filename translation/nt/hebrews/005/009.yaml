id: HEB.5.9
reference: Hebrews 5:9
source:
  edition: SBLGNT
  text: καὶ τελειωθεὶς ἐγένετο ⸂πᾶσιν τοῖς ὑπακούουσιν αὐτῷ⸃ αἴτιος σωτηρίας αἰωνίου,
translation:
  text: and, having been made complete, he became the source of eternal salvation
    to all who obey him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having been perfected' or 'having been brought to completion.' The
      Greek likely refers to being brought to the full completion of his priestly
      and redemptive role, not to moral improvement.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the author' or 'the cause' of eternal salvation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τελειωθεὶς
  chosen: having been made complete
  alternatives:
  - having been perfected
  - having been brought to completion
  lexicon: BDAG
  rationale: Aorist passive participle of τελειόω. In Hebrews this term often carries
    the sense of being brought to the intended goal or completion, not moral improvement
    from imperfection. 'Made complete' preserves that teleological sense in accessible
    English; 'perfected' is traditional but can mislead modern readers into implying
    prior moral defect.
- source_word: ἐγένετο
  chosen: he became
  alternatives:
  - he came to be
  - he was made
  lexicon: BDAG
  rationale: 'γίνομαι here marks resultant state or role: after being made complete,
    he ''became'' the source/cause of salvation. ''Became'' is the most natural and
    direct rendering.'
- source_word: πᾶσιν τοῖς ὑπακούουσιν αὐτῷ
  chosen: to all who obey him
  alternatives:
  - for all who obey him
  - to everyone obeying him
  lexicon: BDAG
  rationale: The dative phrase is best rendered with an English prepositional phrase
    indicating beneficiaries. ὑπακούω means 'obey' or 'listen submissively/respond
    obediently.' 'All who obey him' is clear, idiomatic, and preserves the present
    participle's ongoing or characteristic force.
- source_word: αἴτιος
  chosen: the source
  alternatives:
  - the cause
  - the author
  lexicon: BDAG
  rationale: αἴτιος denotes one who is responsible for causing something. 'Source'
    communicates causal agency clearly in modern English without the potential ambiguity
    of 'author' (which may sound literary) or the stiffness of 'cause'.
- source_word: σωτηρίας
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία in Hebrews carries its established theological sense of salvation.
    'Deliverance' is possible lexically but would understate the soteriological register
    of the context.
- source_word: αἰωνίου
  chosen: eternal
  alternatives:
  - everlasting
  - age-long
  lexicon: BDAG
  rationale: αἰώνιος here modifies salvation and is most naturally rendered 'eternal.'
    'Everlasting' is possible but less natural in contemporary style; 'age-long' is
    too interpretively loaded and non-idiomatic here.
- source_word: καὶ
  chosen: and
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: The conjunction simply links this statement with the preceding context.
    'And' preserves the Greek connection without over-interpreting the discourse relation.
