id: HEB.5.7
reference: Hebrews 5:7
source:
  edition: SBLGNT
  text: ὃς ἐν ταῖς ἡμέραις τῆς σαρκὸς αὐτοῦ δεήσεις τε καὶ ἱκετηρίας πρὸς τὸν δυνάμενον
    σῴζειν αὐτὸν ἐκ θανάτου μετὰ κραυγῆς ἰσχυρᾶς καὶ δακρύων προσενέγκας καὶ εἰσακουσθεὶς
    ἀπὸ τῆς εὐλαβείας,
translation:
  text: who, in the days of his flesh, having offered up both prayers and petitions
    with loud cries and tears to the one able to save him from death, and having been
    heard because of his reverent submission,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because of his godly fear.'
    reason: lexical_alternative
  - marker: b
    text: '''Save him from death'' may also be understood as ''save him out of death,''
      that is, deliver him through resurrection.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις τῆς σαρκὸς αὐτοῦ
  chosen: in the days of his flesh
  alternatives:
  - during his earthly life
  - in the days of his mortal life
  lexicon: BDAG
  rationale: Retains the concrete term σάρξ as 'flesh' per the project's default for
    literal uses of sarx. The phrase idiomatically refers to Jesus' incarnate earthly
    life, but the main text preserves the Greek's embodied emphasis rather than interpreting
    it more loosely as merely 'earthly life.'
- source_word: δεήσεις
  chosen: prayers
  alternatives:
  - supplications
  lexicon: BDAG
  rationale: A general term for urgent requests made to God. 'Prayers' is natural
    English and pairs well with the more specific ἱκετηρίας, while 'supplications'
    is preserved as an alternative nuance.
- source_word: ἱκετηρίας
  chosen: petitions
  alternatives:
  - supplications
  - appeals
  lexicon: BDAG
  rationale: Distinguishes this term from δεήσεις without becoming overly archaic.
    'Petitions' conveys earnest entreaties; 'supplications' is a viable but more traditional
    alternative.
- source_word: πρὸς τὸν δυνάμενον σῴζειν αὐτὸν ἐκ θανάτου
  chosen: to the one able to save him from death
  alternatives:
  - to him who was able to save him out of death
  - to the one able to deliver him from death
  lexicon: BDAG
  rationale: '''The one able'' reflects the substantival participle. ''Save him from
    death'' preserves the ambiguity of ἐκ θανάτου: either preservation from dying
    or deliverance out of death. The wording avoids prematurely resolving whether
    the reference is to Gethsemane, resurrection, or both.'
- source_word: μετὰ κραυγῆς ἰσχυρᾶς καὶ δακρύων
  chosen: with loud cries and tears
  alternatives:
  - with a strong cry and tears
  - with loud crying and tears
  lexicon: BDAG
  rationale: Natural modern English that still reflects the intensity of the singular
    κραυγῆς modified by ἰσχυρᾶς. 'Loud cries' communicates force without awkwardness.
- source_word: προσενέγκας
  chosen: having offered up
  alternatives:
  - offering up
  - having presented
  lexicon: BDAG
  rationale: The aorist participle is best represented as antecedent or attendant
    to the main verbal idea. 'Offered up' preserves sacrificial resonance often present
    in προσφέρω, fitting Hebrews' priestly context, without overstating cultic imagery.
- source_word: εἰσακουσθεὶς
  chosen: having been heard
  alternatives:
  - having been answered
  - being heard
  lexicon: BDAG
  rationale: The passive participle means that his plea was heard favorably. 'Having
    been heard' is more textually precise than 'answered,' since the latter may imply
    a specific form of response not stated explicitly.
- source_word: ἀπὸ τῆς εὐλαβείας
  chosen: because of his reverent submission
  alternatives:
  - because of his godly fear
  - on account of his reverence
  lexicon: BDAG
  rationale: εὐλάβεια can denote reverence, piety, or godly fear. 'Reverent submission'
    communicates the sense in accessible English and avoids suggesting sinful fear
    in Jesus, while preserving the relational posture toward the Father. The traditional
    alternative 'godly fear' is preserved in a footnote because it remains a plausible
    and important rendering.
