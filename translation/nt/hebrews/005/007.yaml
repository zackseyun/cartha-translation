theological_decisions:
- issue: Meaning of ἀπὸ τῆς εὐλαβείας in relation to Jesus
  chosen_reading: because of his reverent submission
  alternative_readings:
  - because of his godly fear
  - because of his reverence
  rationale: The phrase is semantically debated. The chosen rendering preserves orthodox
    Christology by expressing Jesus' filial reverence without implying improper fearfulness,
    while still reflecting the lexical range of εὐλάβεια. The alternative 'godly fear'
    is preserved in a footnote rather than excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Scope of 'save him from death'
  chosen_reading: retain the broader phrase 'save him from death' without specifying
    whether this means rescue from dying or deliverance through resurrection
  alternative_readings:
  - save him out of death
  - keep him from death
  rationale: The Greek ἐκ θανάτου can support either rescue from death or deliverance
    out of death. Given Hebrews' theology and the immediate context, narrowing the
    phrase would over-interpret the text. The translation therefore preserves the
    ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
