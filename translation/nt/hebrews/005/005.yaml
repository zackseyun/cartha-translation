theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in an argument about appointment to priestly
    office. Following the doctrine's contested-terms guidance, 'Messiah' better preserves
    the title's meaning in context.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah''
    where title; ''Christ'' where name-like'
- issue: Implication of 'today I have begotten you' in a christological context
  chosen_reading: Retain the citation as written without interpretive expansion
  alternative_readings:
  - Paraphrastic renderings that specify enthronement, resurrection, or eternal generation
    in the main text
  rationale: The verse quotes Psalm 2:7 and should be translated directly rather than
    made to settle later theological debates in the main text. Historic orthodoxy
    is preserved by not translating against the text, while avoiding doctrinal over-specification.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
