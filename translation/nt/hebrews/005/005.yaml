id: HEB.5.5
reference: Hebrews 5:5
source:
  edition: SBLGNT
  text: Οὕτως καὶ ὁ Χριστὸς οὐχ ἑαυτὸν ἐδόξασεν γενηθῆναι ἀρχιερέα, ἀλλ’ ὁ λαλήσας
    πρὸς αὐτόν· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε·
translation:
  text: 'So also the Messiah did not glorify himself to become high priest, but the
    one who spoke to him: “You are my Son; today I have begotten you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: Quotation from Psalm 2:7.
    reason: cross_reference
  - marker: c
    text: Or 'did not honor himself.' The Greek verb can carry the sense of honor
      or glory.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως καὶ
  chosen: So also
  alternatives:
  - In the same way also
  - Likewise
  lexicon: BDAG
  rationale: Marks the comparison with the preceding discussion about priestly appointment;
    'So also' is concise and natural while preserving the inferential force.
- source_word: ὁ Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Used as a title rather than a name here. Per doctrine guidance, Χριστός
    is translated 'Messiah' where title sense is active, which fits the argument about
    divinely appointed office.
- source_word: οὐχ ἑαυτὸν ἐδόξασεν
  chosen: did not glorify himself
  alternatives:
  - did not honor himself
  - did not exalt himself
  lexicon: BDAG
  rationale: δοξάζω commonly means 'glorify' or 'honor.' 'Glorify himself' preserves
    the lexical link and the reflexive construction, while fitting the contrast with
    divine appointment. 'Honor himself' is possible but less directly tied to the
    Greek verb.
- source_word: γενηθῆναι ἀρχιερέα
  chosen: to become high priest
  alternatives:
  - to be made high priest
  - to become a high priest
  lexicon: BDAG
  rationale: γενηθῆναι with predicate accusative naturally conveys entering a role
    or status. 'To become high priest' is idiomatic and accurate. The article is absent
    in Greek, but English idiom favors 'high priest' without 'a' in this office-title
    context.
- source_word: ἀλλ’ ὁ λαλήσας πρὸς αὐτόν
  chosen: but the one who spoke to him
  alternatives:
  - but he who spoke to him
  - but the one who said to him
  lexicon: BDAG
  rationale: 'The ellipsis is supplied naturally in English: the contrast is between
    self-glorification and divine action. ''The one who spoke to him'' preserves the
    substantival participle and leaves the subject reverently implicit as God from
    the quotation context.'
- source_word: Υἱός μου εἶ σύ
  chosen: You are my Son
  alternatives:
  - My Son are you
  lexicon: BDAG
  rationale: Standard English word order best conveys the emphatic declaration without
    awkwardness. Capitalized 'Son' reflects the direct messianic/filial address in
    context, not an added doctrinal claim beyond the quotation.
- source_word: ἐγὼ σήμερον γεγέννηκά σε
  chosen: today I have begotten you
  alternatives:
  - today I have become your father
  - today I have fathered you
  lexicon: BDAG
  rationale: '''Begotten'' is the most theologically and intertextually precise rendering
    for γεννάω in this Psalm 2:7 citation, preserving the wording familiar to christological
    discussion. More idiomatic alternatives risk overinterpreting the metaphor or
    weakening the citation''s formal character.'
