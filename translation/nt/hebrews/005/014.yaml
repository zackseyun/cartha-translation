theological_decisions:
- issue: Meaning of τελείων in a spiritual-growth context
  chosen_reading: the mature
  alternative_readings:
  - the perfect
  - the full-grown
  rationale: The context contrasts immature believers with those advanced in discernment,
    not a class of morally flawless people. Rendering as 'the mature' preserves the
    exhortational force and avoids importing a perfectionist theology the text does
    not require.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
