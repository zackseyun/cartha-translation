id: HEB.5.14
reference: Hebrews 5:14
source:
  edition: SBLGNT
  text: τελείων δέ ἐστιν ἡ στερεὰ τροφή, τῶν διὰ τὴν ἕξιν τὰ αἰσθητήρια γεγυμνασμένα
    ἐχόντων πρὸς διάκρισιν καλοῦ τε καὶ κακοῦ.
translation:
  text: But solid food is for the mature, who because of practice have their powers
    of discernment trained to distinguish both good and evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through habit' or 'because of habitual use.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the senses'; here the word refers metaphorically to a person's
      perceptive faculties.
    reason: lexical_alternative
lexical_decisions:
- source_word: τελείων
  chosen: the mature
  alternatives:
  - the full-grown
  - the perfect
  - adults
  lexicon: BDAG
  rationale: Genitive plural with implied persons, contrasted with infants in the
    immediate context (5:13). 'The mature' best captures developed spiritual adulthood
    without suggesting sinless perfection, while preserving the adjective's sense
    of completeness/maturity.
- source_word: στερεὰ τροφή
  chosen: solid food
  alternatives:
  - firm food
  lexicon: BDAG
  rationale: A natural English rendering of the metaphor contrasting milk and more
    substantial nourishment. 'Solid food' is idiomatic and preserves the image.
- source_word: διὰ τὴν ἕξιν
  chosen: because of practice
  alternatives:
  - through habit
  - because of habitual use
  lexicon: BDAG
  rationale: ἕξις denotes habit, practice, or acquired disposition. In context it
    refers to repeated exercise leading to moral-spiritual discernment. 'Because of
    practice' is clear modern English and reflects causation through repeated use.
- source_word: τὰ αἰσθητήρια
  chosen: their powers of discernment
  alternatives:
  - their senses
  - their faculties of perception
  lexicon: BDAG
  rationale: Literally 'sense organs/faculties,' but here used metaphorically for
    inner perceptive faculties. 'Powers of discernment' makes the metaphor intelligible
    in English while fitting the following phrase about distinguishing good and evil.
- source_word: γεγυμνασμένα ἐχόντων
  chosen: have ... trained
  alternatives:
  - having ... trained
  - have ... exercised
  lexicon: BDAG
  rationale: 'The perfect passive participle γεγυμνασμένα with ἐχόντων expresses a
    settled condition: they possess faculties that have been trained/exercised. English
    finite wording (''have ... trained'') communicates the resultant state naturally.'
- source_word: πρὸς διάκρισιν
  chosen: to distinguish
  alternatives:
  - for discernment
  - for distinguishing
  lexicon: BDAG
  rationale: διάκρισις means distinction/discernment. With πρός it expresses purpose
    or result. 'To distinguish' reads smoothly and directly connects with the object
    pair 'good and evil.'
- source_word: καλοῦ τε καὶ κακοῦ
  chosen: both good and evil
  alternatives:
  - good and evil
  lexicon: BDAG
  rationale: The correlative τε καὶ is well represented by 'both ... and ...'. The
    phrase denotes moral discrimination, echoing familiar biblical language without
    adding interpretive content.
- source_word: δέ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the previous statement about milk being for infants.
    'But' best signals the adversative force in context.
