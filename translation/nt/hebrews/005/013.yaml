theological_decisions:
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine file specifies 'righteousness' as the default rendering
    of δικαιοσύνη, with 'justice' preserved in a footnote where relevant. In this
    verse, 'righteousness' better matches the context of spiritual maturity and doctrinal
    formation, while still allowing the broader semantic range to be noted.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative
    ''justice'' preserved in footnotes where relevant'
- issue: Gender representation in νήπιος ... ἐστιν
  chosen_reading: for he is an infant
  alternative_readings:
  - for such a person is an infant
  - for that person is an infant
  rationale: The Greek is grammatically masculine singular in a generic construction.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language. 'He' reflects the source form while functioning generically in English
    literary style.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over
    gender-neutral'
