id: HEB.5.13
reference: Hebrews 5:13
source:
  edition: SBLGNT
  text: πᾶς γὰρ ὁ μετέχων γάλακτος ἄπειρος λόγου δικαιοσύνης, νήπιος γάρ ἐστιν·
translation:
  text: For everyone who partakes of milk is unskilled in the word of righteousness,
    for he is an infant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the message of righteousness' or 'the word about righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς
  chosen: everyone
  alternatives:
  - everyone who
  - all who
  lexicon: BDAG
  rationale: Used a distributive sense, referring to each person in the class described.
    'Everyone' is natural English and preserves the generic force.
- source_word: ὁ μετέχων
  chosen: who partakes of
  alternatives:
  - who shares in
  - who lives on
  - who has a share in
  lexicon: BDAG
  rationale: 'The participle with article functions substantivally: ''the one who
    partakes.'' ''Partakes of'' keeps the metaphor of consuming milk without overinterpreting
    it as exclusive dependence (''lives on'').'
- source_word: γάλακτος
  chosen: milk
  lexicon: BDAG
  rationale: Literal 'milk' is retained because the author is using a pedagogical
    metaphor already established in context; no need to paraphrase.
- source_word: ἄπειρος
  chosen: unskilled
  alternatives:
  - inexperienced
  - unacquainted
  - ignorant
  lexicon: BDAG
  rationale: Conveys lack of proficiency or experience rather than total ignorance.
    'Unskilled' fits the maturity metaphor and reads naturally with the following
    genitive phrase.
- source_word: λόγου δικαιοσύνης
  chosen: the word of righteousness
  alternatives:
  - the message of righteousness
  - the word about righteousness
  lexicon: BDAG
  rationale: Rendered formally to preserve the compact Greek expression and its possible
    breadth. 'Word' can denote message/teaching, and the genitive 'of righteousness'
    is left somewhat open rather than narrowed to one interpretive option.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, with 'justice' preserved as an alternative where relevant. Here 'righteousness'
    best fits the moral/spiritual maturity context in Hebrews.
- source_word: νήπιος
  chosen: an infant
  alternatives:
  - a child
  - a baby
  lexicon: BDAG
  rationale: The term denotes immaturity. 'Infant' preserves the sharpness of the
    metaphor better than the broader 'child' and is more idiomatic here than 'baby'.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Both occurrences are explanatory. 'For' preserves the argumentative flow
    of the Greek without over-smoothing.
