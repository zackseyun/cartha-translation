id: HEB.5.6
reference: Hebrews 5:6
source:
  edition: SBLGNT
  text: καθὼς καὶ ἐν ἑτέρῳ λέγει· Σὺ ἱερεὺς εἰς τὸν αἰῶνα κατὰ τὴν τάξιν Μελχισέδεκ,
translation:
  text: just as he also says in another place, “You are a priest forever according
    to the order of Melchizedek,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'elsewhere.' The Greek literally says 'in another,' with 'place' understood.
    reason: lexical_alternative
  - marker: b
    text: Or 'after the order of Melchizedek.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς καὶ
  chosen: just as he also
  alternatives:
  - as also
  - just as also
  lexicon: BDAG
  rationale: Renders the comparative formula naturally in English while preserving
    both καθώς ('just as/as') and καί ('also'). The phrase introduces a second scriptural
    citation parallel to the previous one.
- source_word: ἐν ἑτέρῳ
  chosen: in another place
  alternatives:
  - in another
  - elsewhere
  lexicon: BDAG
  rationale: The dative with ἐν and the adjective ἕτερος is elliptical, referring
    to another passage of Scripture. 'In another place' makes the implied noun explicit
    in idiomatic English without over-paraphrasing.
- source_word: λέγει
  chosen: he says
  alternatives:
  - it says
  lexicon: BDAG
  rationale: The singular present 'he says' reflects the common NT idiom of treating
    Scripture, and ultimately God as speaker, as a living present voice. This preserves
    the personal subject implied by the Greek better than the impersonal 'it says,'
    though that remains a viable alternative.
- source_word: Σὺ
  chosen: You
  lexicon: BDAG
  rationale: Direct second-person singular address from the Psalm citation is preserved.
- source_word: ἱερεὺς
  chosen: a priest
  lexicon: BDAG
  rationale: Standard rendering of ἱερεύς. The anarthrous Greek is naturally rendered
    with the English indefinite article in predicative position.
- source_word: εἰς τὸν αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: Idiomatic rendering of the phrase meaning enduring perpetually. 'Forever'
    is the clearest modern English equivalent here.
- source_word: κατὰ τὴν τάξιν
  chosen: according to the order of
  alternatives:
  - after the order of
  - according to the pattern of
  lexicon: BDAG
  rationale: Traditional and contextually precise rendering for the priestly category
    or arrangement denoted by τάξις. 'According to the order of' is clear modern English
    and preserves the typological force of the Psalm citation.
- source_word: Μελχισέδεκ
  chosen: Melchizedek
  alternatives:
  - Melchisedek
  lexicon: BDAG
  rationale: Standard English transliteration of the proper name, following the instruction
    to transliterate names rather than translate them.
