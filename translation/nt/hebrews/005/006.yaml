theological_decisions:
- issue: Speaker reference in the citation formula
  chosen_reading: Rendered λέγει as 'he says,' leaving the subject implicitly God
    speaking in Scripture.
  alternative_readings:
  - Rendered impersonally as 'it says,' with Scripture as the grammatical subject
  rationale: Hebrews commonly presents Scripture as the present speech of God. Using
    'he says' preserves that theological and rhetorical force without adding an explicit
    subject not present in the Greek.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of τάξις in the Melchizedek citation
  chosen_reading: '''order'' as a priestly order/category rather than merely ''manner''
    or ''pattern.'''
  alternative_readings:
  - manner
  - pattern
  rationale: In Hebrews' argument, Psalm 110:4 grounds a distinct priesthood associated
    with Melchizedek. 'Order' best preserves the canonical and theological linkage
    without flattening it into a vague comparison.
  doctrine_reference: Affirmations; Translation philosophy §5
