theological_decisions:
- issue: Gendered representative language in ἀνθρώπων
  chosen_reading: Render both instances as 'men' in the main text
  alternative_readings:
  - human beings
  - people
  rationale: The verse describes the high priest as taken from among men and appointed
    on behalf of men. Because the historical priestly office in view is male and the
    Greek uses masculine representative language, 'men' best matches the source and
    the project's gender-accurate policy. An inclusive alternative is worth preserving
    in a footnote for modern readers.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
