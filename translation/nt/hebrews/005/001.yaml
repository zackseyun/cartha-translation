id: HEB.5.1
reference: Hebrews 5:1
source:
  edition: SBLGNT
  text: Πᾶς γὰρ ἀρχιερεὺς ἐξ ἀνθρώπων λαμβανόμενος ὑπὲρ ἀνθρώπων καθίσταται τὰ πρὸς
    τὸν θεόν, ἵνα προσφέρῃ δῶρά τε καὶ θυσίας ὑπὲρ ἁμαρτιῶν,
translation:
  text: For every high priest, being taken from among men, is appointed on behalf
    of men in the things pertaining to God, so that he may offer both gifts and sacrifices
    for sins,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among human beings' and 'on behalf of people.' The Greek uses masculine
      representative language here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς
  chosen: every
  alternatives:
  - each
  - all
  lexicon: BDAG
  rationale: Distributive singular with ἀρχιερεύς; 'every high priest' best reflects
    the generic statement about the office.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Marks explanation/support for the preceding argument; 'for' is the most
    natural concise connective in English.
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the Jewish cultic office in Hebrews.
- source_word: ἐξ ἀνθρώπων λαμβανόμενος
  chosen: being taken from among men
  alternatives:
  - chosen from among men
  - taken from among human beings
  lexicon: BDAG
  rationale: The participle is passive and modifies 'high priest'; 'being taken' preserves
    the verbal form. 'Men' is retained as gender-accurate representative language
    in keeping with the source and the project's policy, since the priestly office
    in view is male and also representative of humanity.
- source_word: ὑπὲρ ἀνθρώπων
  chosen: on behalf of men
  alternatives:
  - for men
  - on behalf of people
  lexicon: BDAG
  rationale: ὑπέρ here expresses representation/benefit. 'On behalf of' makes the
    mediatorial sense explicit without overtranslation. 'Men' matches the repeated
    ἀνθρώπων and preserves the source's gendered phrasing.
- source_word: καθίσταται
  chosen: is appointed
  alternatives:
  - is designated
  - is established
  lexicon: BDAG
  rationale: In this context of priestly installation, 'is appointed' is idiomatic
    and accurately conveys being put into an office.
- source_word: τὰ πρὸς τὸν θεόν
  chosen: in the things pertaining to God
  alternatives:
  - in matters relating to God
  - over things concerning God
  lexicon: BDAG
  rationale: This idiom refers to matters of worship/service directed toward God.
    'The things pertaining to God' stays close to the Greek while remaining readable.
- source_word: ἵνα προσφέρῃ
  chosen: so that he may offer
  alternatives:
  - in order that he may offer
  - to offer
  lexicon: BDAG
  rationale: ἵνα with subjunctive expresses purpose; 'so that he may offer' preserves
    that purpose nuance.
- source_word: δῶρά τε καὶ θυσίας
  chosen: both gifts and sacrifices
  alternatives:
  - gifts as well as sacrifices
  lexicon: BDAG
  rationale: τε καὶ is well represented by 'both ... and ...'. Retaining both nouns
    preserves the cultic breadth of offerings.
- source_word: ὑπὲρ ἁμαρτιῶν
  chosen: for sins
  alternatives:
  - on behalf of sins
  - concerning sins
  lexicon: BDAG
  rationale: In sacrificial context, ὑπέρ with ἁμαρτιῶν is idiomatically 'for sins,'
    indicating offerings made with reference to sins.
