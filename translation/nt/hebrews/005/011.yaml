theological_decisions:
- issue: Referent of Περὶ οὗ
  chosen_reading: The phrase refers primarily to the subject matter under discussion
    rather than directly to a person.
  alternative_readings:
  - The phrase refers to Melchizedek personally ('about whom')
  rationale: The immediate context has just mentioned Melchizedek by name, so a personal
    referent is grammatically possible. However, the clause 'we have much to say'
    naturally introduces a broader topic for exposition, and the following complaint
    concerns the audience's inability to receive teaching. Rendering 'About this'
    preserves the discourse-level sense without foreclosing the connection to Melchizedek.
  doctrine_reference: Preserve theological tension rather than resolve it
