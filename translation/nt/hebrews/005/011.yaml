id: HEB.5.11
reference: Hebrews 5:11
source:
  edition: SBLGNT
  text: Περὶ οὗ πολὺς ἡμῖν ὁ λόγος καὶ δυσερμήνευτος λέγειν, ἐπεὶ νωθροὶ γεγόνατε
    ταῖς ἀκοαῖς·
translation:
  text: About this we have much to say, and it is hard to explain, since you have
    become dull in hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "About whom"; the Greek relative pronoun could refer personally to Melchizedek,
      though here it likely points more broadly to the subject under discussion.
    reason: alternative_reading
  - marker: b
    text: Or "hard to interpret" or "difficult to expound."
    reason: lexical_alternative
  - marker: c
    text: Or "sluggish in hearing"; the phrase refers to being slow or unresponsive
      in receiving instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ οὗ
  chosen: About this
  alternatives:
  - Concerning which
  - About whom
  lexicon: BDAG
  rationale: The relative pronoun can refer back either to the subject matter just
    mentioned or, less likely, to a person. In context (the preceding discussion of
    Melchizedek and Christ's priesthood), the author is introducing a topic for further
    exposition, so 'About this' is the most natural English. 'Concerning which' is
    more formal but less readable; 'About whom' is possible if taken personally, but
    the discourse focus is the matter under discussion.
- source_word: πολὺς ἡμῖν ὁ λόγος
  chosen: we have much to say
  alternatives:
  - the message is lengthy for us
  - there is much discourse for us
  lexicon: BDAG
  rationale: Literally, 'the word/discourse is much to us.' Idiomatic English requires
    restructuring. 'We have much to say' preserves the sense that the author has extensive
    material to present without woodenly retaining λόγος as 'word' or 'discourse'.
- source_word: δυσερμήνευτος
  chosen: hard to explain
  alternatives:
  - hard to interpret
  - difficult to expound
  lexicon: BDAG
  rationale: The adjective denotes something difficult to interpret or explain. Because
    it is paired with the infinitive λέγειν ('to say/speak'), 'hard to explain' fits
    the author's emphasis on communicating the subject, not merely interpreting it
    privately. 'Difficult to expound' is accurate but less natural for modern readers.
- source_word: λέγειν
  chosen: to explain
  alternatives:
  - to say
  - to speak
  lexicon: BDAG
  rationale: Although λέγω commonly means 'say' or 'speak,' here it works with δυσερμήνευτος
    in an idiomatic construction about verbal exposition. English expresses this best
    as 'hard to explain.' This is a context-driven rendering rather than a denial
    of the verb's basic sense.
- source_word: ἐπεὶ
  chosen: since
  alternatives:
  - because
  - for
  lexicon: BDAG
  rationale: The conjunction gives the reason the matter is hard to explain. 'Since'
    is natural and preserves the causal force without sounding overly formal.
- source_word: νωθροὶ
  chosen: dull
  alternatives:
  - sluggish
  - lazy
  - slow
  lexicon: BDAG
  rationale: The term conveys sluggishness or dullness, especially in responsiveness.
    In this context of receptivity to teaching, 'dull' communicates the metaphor clearly
    in modern English. 'Sluggish' is possible and appears again in Hebrews 6:12, but
    here 'dull in hearing' is a familiar and intelligible collocation.
- source_word: γεγόνατε
  chosen: have become
  alternatives:
  - have come to be
  - are
  lexicon: BDAG
  rationale: 'The perfect tense indicates a resulting state reached over time, not
    merely a present condition. ''Have become'' preserves that development: they were
    not always this way, but now are.'
- source_word: ταῖς ἀκοαῖς
  chosen: in hearing
  alternatives:
  - in your hearing
  - in your ears
  - in listening
  lexicon: BDAG
  rationale: ἀκοή can mean hearing, the faculty of hearing, or the act of listening.
    Here it refers metaphorically to receptivity to instruction. 'In hearing' is concise
    and preserves the metaphor. 'In your hearing' makes the possessive explicit though
    it is not present in Greek; 'in listening' is interpretive.
