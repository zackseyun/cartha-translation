theological_decisions:
- issue: Nature of the people's failure described by ἀγνοοῦσι καὶ πλανωμένοις
  chosen_reading: The verse refers to those who sin in ignorance and by straying,
    without narrowing the statement to a technical sacrificial category only.
  alternative_readings:
  - A more technical allusion to unintentional sins under the Levitical system
  rationale: The wording certainly resonates with priestly categories from the Old
    Testament, but the Greek expression itself is broader than a strict technical
    term. The translation therefore keeps the general language of ignorance and straying
    rather than importing a narrower doctrinal limitation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἀσθένεια in relation to the high priest
  chosen_reading: human weakness/frailty
  alternative_readings:
  - physical weakness specifically
  - moral weakness specifically
  rationale: In Hebrews this term can include the full range of human frailty associated
    with mortal limitation. Rendering it simply as 'weakness' preserves that breadth
    and avoids forcing the text into either a purely physical or purely moral sense.
  doctrine_reference: Do not import doctrinal claims the text does not make.
